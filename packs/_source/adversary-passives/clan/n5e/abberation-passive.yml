  dae:
    macro:
      name: Abberation Passive
      img: icons/creatures/tentacles/tentacle-eyes-yellow-pink.webp
      type: script
      scope: global
      command: |-
        const version = "1.0.0";
        try {
          const lastArg = args[args.length - 1];

          // Ensure the options exist and prevent the macro from re-triggering during update loops
          lastArg.options = lastArg.options || {};
          if (lastArg.options.onUpdateCalled) return;

          // Get the actor from the arguments
          const actor = game.actors.get(lastArg.actorId);
          if (!actor) {
            ui.notifications.error("Actor not found for the macro.");
            return;
          }

          // Ensure the actor is an adversary
          if (actor.system.details?.npcType !== "adversary") {
            ui.notifications.error("This macro only applies to adversary creatures.");
            return;
          }

          // Retrieve the rank of the adversary
          const rank = actor.system.details.rank?.toLowerCase();
          if (!rank) {
            ui.notifications.error("Rank not found for this adversary.");
            return;
          }

          // Define Tenacity Dice by rank
          const tenacityByRank = {
            drank: 1,
            crank: 2,
            brank: 3,
            arank: 4,
            srank: 5,
          };

          const baseTenacityDice = tenacityByRank[rank] || 0;
          const tenacityDice = baseTenacityDice * 3;

          // Set the base tenacity and additional tenacity gain flag
          await actor.setFlag("n5eb", "aberrationTenacityDice", tenacityDice);

          ui.notifications.info(`Aberration passive applied: ${tenacityDice} Tenacity Dice, with +3 gain each turn.`);
        } catch (err) {
          console.error(`Aberration Passive Macro ${version}`, err);
        }
      author: R0hw7EUsG7OzIhgn
