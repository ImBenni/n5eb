    value: >-
      <p><span style="font-family:Signika">This adversary as a bonus action can activate the signature power of the
      Hoshi clan, the Kujaku Mode, gaining the following benefits; Additionally, this adversary can take traits from the
      Star Shinobi affiliation pool. </span></p><ul><li><p><span style="font-family:Signika">+1 to AC
      </span></p></li><li><p><span style="font-family:Signika">Resistance to chakra damage </span></p></li><li><p><span
      style="font-family:Signika">Jutsu you cast are enhanced by your Star Chakra, gaining one the following benefits
      per casting; </span></p><ol><li><p><span style="font-family:Signika">+1 bonus to attack rolls and Save DC
      </span></p></li><li><p><span style="font-family:Signika">Bonus to damage equal to this adversaries level, once per
      casting.</span></p></li></ol></li></ul>
