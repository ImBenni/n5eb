  description:
    value: >-
      <p><span style="font-family:'Trebuchet MS'">This Adversary is the most prolific of the Leaf with the Byakugan,
      gaining the following benefits; </span></p><ul><li><p><span style="font-family:'Trebuchet MS'">500 Feet of Chakra
      Sight &amp; 360 degrees of vision, able to see things without turning around or averting eyes.
      </span></p></li><li><p><span style="font-family:'Trebuchet MS'">Can see through up to 5 feet of material.
      </span></p></li><li><p><span style="font-family:'Trebuchet MS'">Gains a 1d4 bonus to saving throws vs Genjutsu
      with the Visual Keyword. - Can see a creatures nature release, if any. </span></p></li><li><p><span
      style="font-family:'Trebuchet MS'">Unarmed damage die is 2d6 and deals chakra damage.</span></p></li></ul>
