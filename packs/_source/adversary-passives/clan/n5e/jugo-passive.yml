system:
  description:
    value: >-
      <p>This Adversary can use Strength in place of Intelligence for Jugo clan Ninjutsu. Furthermore, This Adversary is
      the progenitor of the Cursed Mark, using it to power up your rage. This Adversary gains a feature called Rage
      Stacks. </p><p>Once per Round, when the Adversary would take damage from an attack roll, it gains a rank of Rage
      Stacks. When you gain 1 Rank of Rage Stack, you gain a +1 to your Strength or Constitution Ability Score (Your
      choice), the adversary does not increase their hp through these. You can gain a max of half your level in Rage
      Stacks</p>
