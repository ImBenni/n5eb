system:
  description:
    value: >-
      <p><span style="font-family:'Trebuchet MS'">This Adversary can peer through the darkness with its Kurugan,
      granting it the following benefits;</span></p><ul><li><p><span style="font-family:'Trebuchet MS'">Bonus to AC
      equal to half its Wisdom Mod.</span></p></li><li><p><span style="font-family:'Trebuchet MS'">Action: Select up to
      three hostile creatures granting them disadvtange on their next Strength, Dexterity or Constitution save, or
      reduce their AC against allied creatures attacks by -2, until the beginning of your next
      turn.</span></p></li><li><p><span style="font-family:'Trebuchet MS'">Bonus Action: Select one allied creature
      (Excluding yourself) granting them advantage on their next Strength, Dexterity or Consitution
      save.</span></p></li><li><p><span style="font-family:'Trebuchet MS'">Reaction: This Adversary can dodge one attack
      or jutsu that would affect it. This can be done once per round.</span></p></li></ul>
