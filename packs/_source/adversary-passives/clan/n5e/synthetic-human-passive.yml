system:
  description:
    value: >-
      <p>You have access to a special Transformation known as Corrupted Chakra Mode. As a Bonus Action, you can enter
      this form for the next minute. You gain the following benefits: </p><ul><li><p>You gain 30 feet of Tremorsense and
      while a creature is within your tremorsense you cannot be surprised by them. </p></li><li><p>You gain temporary
      hit points and chakra points equal to your level. </p></li><li><p>When you would deal poison damage, you deal
      extra damage equal to your proficiency bonus </p></li><li><p>You are immune to the slowed and weakened
      conditions.</p></li></ul>
