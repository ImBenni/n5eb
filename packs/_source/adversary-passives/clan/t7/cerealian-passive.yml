    value: >-
      <p>This adversary possesses the Evolved Eye of the Cerealian Clan, granting them the following benefits while
      active; </p><ul><li><p>120ft of Chakra Sight and a +5 to Passive Perception and Passive Insight
      </p></li><li><p>This adversary can see the vitals and exact hit points of creatures. </p></li><li><p>This
      adversary gains a +1 to critical threat range and increases the range of all its jutsu by 20ft. </p></li><li><p>On
      this adversaries turn, it can designate one creature as their <strong>Target</strong> until the end of the turn.
