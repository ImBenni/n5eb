    value: >-
      <p>By Spending <strong>3 Tenacity die</strong> and its <strong>Action</strong>, this Adversary can create a chakra
      surge. </p><hr /><p>When it does, all hostile creatures within 30 feet of this adversary must make a Constitution
      or Wisdom saving throw (your choice) vs your highest save DC. On a failure, they lose the ability to cast jutsu
      with their Actions or Bonus Actions until the end of your next turn. Once you use this Ability, you must spend 5
      Tenacity die to recharge it.</p>
