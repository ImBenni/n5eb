system:
  description:
    value: >-
      <p>By Spending <strong>4 Tenacity die</strong>, this Adversary can Overpower the next Ninjutsu they cast. The
      Overpowered jutsu adds the tenacity die to its damage and imposes a 1d4 penalty to creatures forced to make a
      saving throw against the jutsu cast. Additionally, if the jutsu cast scores a critical hit, increase the attacks
      damage die by 1 step.</p>
