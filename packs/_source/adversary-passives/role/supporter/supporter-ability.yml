system:
  description:
    value: >-
      <p>By Spending <strong>5 Tenacity die</strong> and a <strong>Full-Turn-Action</strong>, this Adversary can create
      a rejuvinating pulse. When it does, all allied creatures within 30 feet of it (including itself) loses 3 ranks of
      all conditions it may be afflicted by. If the condition has no ranks, then that condition is cleansed. Once this
      adversary uses this ability, it cannot do so again until it takes a Full-Turn-Action to recharge this effect.</p>
