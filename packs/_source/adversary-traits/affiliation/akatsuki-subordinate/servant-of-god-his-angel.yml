name: Servant of God & His Angel
type: feat
img: icons/magic/light/beam-rays-blue.webp
system:
  description:
    value: "<p>This adversary has learned from God and his Angel how to exert their will on their enemies.\_<br />As an action, all hostile creatures within 90 feet of this adversary must make a Strength saving throw vs Ninjutsu save DC.\_<br />On a failed save, affected creatures are thrown to the ground taking [Half Level]d10 bludgeoning damage and being prone.\_<br />A creature prone in this way cannot stand or move, or make handseals.\_<br />They can as an action remake this saving throw to end this effect on them.\_<br />This trait can be used twice per combat</p>"
