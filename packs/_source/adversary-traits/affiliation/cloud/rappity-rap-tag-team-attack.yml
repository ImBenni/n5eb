name: Rappity, Rap, Tag Team Attack
type: feat
img: icons/creatures/abilities/stinger-spine-horn-blood.webp
system:
  description:
    value: >-
      <p><span data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;You and another allied creature who begins combat
      with the same hostile enemy, that shares this trait, becomes a tag team duo. As a full turn action, taken on each
      tag team duo's turn in the same round, both simultaneously cast a Jutsu with the Combination Keyword at the
      beginning of the following round, regardless of the initiative count. This jutsu's casting cannot be reacted to
      and deals bonus damage equal to the casters combined level. (Recharge 5-6)&quot;}"
