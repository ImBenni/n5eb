system:
  description:
    value: "<p>This Adversary has the Cults [McGuffin], an iconic, vile, legendary or historical artifact, that holds an extreme significance to the cult as a whole.\_<br />While holding it, the power of their faith courses through them.\_<br />This creature gains the benefit of one of the Following Jutsu while in its possession:</p>\n<p>Bestial Art: Predator</p>\n<p>Earth Release: Stone Dragon</p>\n<p>Wind Release: Gryphons Talons &amp; Lions Roar</p>\n<p>Fire Release: Blazing Fervor</p>\n<p>Water Release: Trident, Lightning Release: Kingmaker, or Wolves Companionship.\_</p>\n<p><br />Regardless of the Jutsu Chosen, at the end of each of this creatures turn, their maximum hit points are reduced by an amount equal to its Level.</p>"
