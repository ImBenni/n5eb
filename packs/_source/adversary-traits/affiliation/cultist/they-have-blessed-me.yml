  description:
    value: "<p>While engaged in combat with a creature whom this creatures cult considers a hostile entity or target, this adversary gains the benefits of the Song of War B-Rank Genjutsu.\_<br />This trait can be temporarily deactivated if this adversary is targeted by a special effect such as B-Rank Chakra dispel or Uzumaki Break.\_<br />You can change the effect or jutsu needed to one your party has such as a specific condition, Action or damage type.\_<br />The aura is deactivated until the end of this adversaries next turn.</p>"
