name: THEY HAVE CURSED YOU!
type: feat
img: icons/magic/symbols/runes-star-pentagon-orange.webp
system:
  description:
    value: "<p>When engaged in combat with a creature whom this creatures cult considers a hostile entity or target, all creatures within 30 feet of this adversary, who begins its turn within range, must make an Intelligence saving throw to resist the effects of the Shadow Monsters Genjutsu.\_<br />This creature must spend chakra each turn equal to twice its normal costs to maintain its effects otherwise it immediately ends.\_<br />This trait can be temporarily deactivated if this adversary is targeted by a special effect such as C-Rank Chakra dispel or Uzumaki Break.\_<br />You can change the effect or jutsu needed to one your party has such as a specific condition, Action or damage type.\_<br />The aura is deactivated until the end of this adversaries next turn.</p>"
