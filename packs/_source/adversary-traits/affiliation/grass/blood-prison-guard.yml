name: Blood Prison Guard
type: feat
img: icons/magic/light/beam-rays-blue.webp
system:
  description:
    value: "<p>Hostile creatures who would be considered criminals to the Land of Weeds or the Grass Village, begin combat with a Blood Prison mark.\_<br />Each time you deal damage to the hostile creature, they gain another mark, once per turn.\_<br />If a creature has 5 or more marks on them, the Blood Prison Seal appears.\_<br />This seal is treated as if the hostile creature was the target of the Uzumaki Art: River Dam Seal, regardless of their current condition.\_<br />The DC to resist this casting is your Ninjutsu Save DC.\_<br />Regardless of a pass or fail, a creature is cleansed of all Blood Prison Marks.</p>"
