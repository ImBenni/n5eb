  description:
    value: "<p>Hostile creatures cannot gain information about you.\_<br />They cannot learn your Traits, resistances, hit point totals, they cannot recognize jutsu that you would cast, and cannot tell how injured you are, if at all.\_<br />Additionally, you are immune to effects that would cause you to expose anything your Country or village considers a secret, you would sooner die than expose it.</p>"
