name: My Pain, is your Pain
type: feat
img: icons/magic/symbols/runes-star-pentagon-orange.webp
system:
  description:
    value: >-
      <p><span data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;This adversary marks a creature when initiative
      is rolled. The marked creature is considered Marked for Pain. A creature marked in this way, whom this adversary
      deals at least 10% of its Hit points to with Slashing or Piercing damage, has the mark take effect for the next
      minute. While the mark is in effect, the marked creatures maximum hit points is reduced by half of all damage this
      adversary takes.&quot;}"
