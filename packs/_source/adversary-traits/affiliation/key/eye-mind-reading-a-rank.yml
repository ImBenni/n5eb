name: Eye Mind Reading [A-Rank]
type: feat
img: icons/magic/symbols/squares-3d-green.webp
system:
  description:
    value: "<p>So long as this adversary can see, they can replace the need for handsigns with blinking.\_<br />Additionally, as an action, by looking at a creature, they can read their minds, knowing any form of information they can find in a user's minds.\_<br />Additionally, they can choose to purposely erase or rewrite their own memory at will using this trait as an action.\_<br />Alternatively, they can attempt to do the same to a creature they can see and touch.\_<br />While maintaining contact with a creature, the affected creature must make an Intelligence saving throw vs Ninjutsu or Genjutsu save DC.\_<br />On a failed save, this adversary can select one memory, event, jutsu, feature or trait, and seal it away from the affected creature preventing them from remembering how to use it, until said creature spends at least 1 week of DT recuperating from this trait.</p>"
