name: Demonic Mist
type: feat
img: icons/skills/ranged/arrow-flying-broadhead-blue.webp
system:
  description:
    value: "<p>When a jutsu is cast that would attempt to obscure or hide a hostile creature, as a reaction, you can mist mark them for the next minute.\_<br />While Mist marked in this way, a creature cannot gain the benefits of being hidden from you and you are always aware of their location.\_<br />A creature can remove the Mist mark by making a Dexterity (Stealth) check vs your Passive Perception +10.\_<br />On a success, the mist mark is removed, and cannot be applied to them for 24 hours.</p>"
