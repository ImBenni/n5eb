name: Rainy Days
type: feat
img: icons/equipment/head/mask-carved-bird-grey-pink.webp
system:
  description:
    value: "<p>While engaged in combat with a creature whom the Land of Pipes or the Rain Village considers a hostile entity, you begin to experience flash backs of the death and desolation your village/country has experienced and you vow to NEVER allow that to happen again.\_<br />When rolling initiative, select one hostile creature.\_<br />That creature becomes Rain marked.\_<br />You will exclusively target and attack a Rain marked creature until they are dead.\_<br />Additionally, while in the Land of Pipes, you cannot lose concentration on jutsu you cast as a result of damage on being incapacitated.</p>"
