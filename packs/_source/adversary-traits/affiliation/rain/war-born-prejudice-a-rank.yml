name: War Born Prejudice [A-Rank]
type: feat
img: icons/magic/symbols/squares-3d-green.webp
system:
  description:
    value: "<p>You have lived through multiple invasions of your country as a child and dismisses the idea of hostile threats to your home any longer.\_<br />When a hostile creature would attempt to make a saving throw to resist a Jutsu you casts, you can empower the jutsu cast to become a War Born Jutsu.\_<br />A jutsu enhanced in this way, is upcasted twice, at no cost.\_<br />Additionally, the save DC to resist is increased by +1 your level.\_<br />This empowerment can only be used twice per encounter.</p>"
