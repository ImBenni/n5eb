name: Zero-Tails [S-Rank]
type: feat
img: icons/magic/symbols/squares-3d-green.webp
system:
  description:
    value: "<p>This adversary is partially inhabited by the sealed, and corrupted spirit of the Zero-Tails.\_<br />This adversary can, as a bonus action, manifest a number of spectral arms to assist it in performing jutsu, making attacks or defending it.\_<br />If this adversary manifest spectral arms in this way, at the end of each hostile creatures turn, the spectral arms perform on of the following; Unarmed melee attack with a 15ft range; +[Level + Half Prof] to hit, dealing [Level/4]d8 bludgeoning damage, Cast a Jutsu this adversary knows of C-Rank or lower, Make a grapple attempt with a range of 15ftc, treating its Athletics bonus as a +[Level+prof].\_<br />Alternatively, as a reaction the arms can wrap around this adversaries body granting it [Prof]d10 temporary hit points until the end of the current turn.</p>"
