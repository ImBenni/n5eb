system:
  description:
    value: "<p>You have a micro chakra engine attached to your person.\_<br />This engine generates a powerful barrier protecting you.\_<br />This barrier has a number of hit points equal to [Level x 10].\_<br />It intercepts all damage this adversary would take and is resistant to all Damage types, except psychic, and is immune to chakra damage.\_<br />trait can be temporarily deactivated if this adversary is targeted by a special effect such as B-Rank Chakra dispel or Uzumaki Break.\_<br />You can change the effect or jutsu needed to one your party has such as a specific condition, Action or damage type.\_<br />This trait is deactivated until the end of this adversaries next turn.</p>"
