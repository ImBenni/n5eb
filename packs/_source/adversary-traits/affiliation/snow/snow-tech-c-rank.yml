name: Snow Tech
type: feat
img: icons/skills/melee/strike-axe-blood-red.webp
system:
  description:
    value: "<p>You have a Kunai Launcher that fires Kunai and Shuriken at lethal speeds.\_<br />In place of one of this creatures attacks, it can make a 'Kunai Barrage' attack, using your Taijutsu attack bonus, dealing a number of d6s equal to half your level in piercing or slashing damage.\_<br />Alternatively, you can set the weapon to burst fire as an Action, releasing a cluster of weapons in a cone.\_<br />All creatures in a 30-foot cone originating from you must succeed a Dexterity saving throw vs.\_<br />your Taijutsu Save DC, taking a number of d4s equal to half your level in piercing or slashing damage or half as much on a successful save.</p>"
