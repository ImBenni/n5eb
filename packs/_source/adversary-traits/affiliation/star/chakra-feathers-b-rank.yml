name: Chakra Feathers
type: feat
img: icons/creatures/webs/web-spider-glowing-purple.webp
system:
  description:
    value: "<p>As a Bonus action, this Adversary can manifest a plume of chakra, attached to its back, that take the shape of feathers, similar to a peacocks.\_<br />This creature has 5 Feathers upon activation.\_<br />This plume of chakra lasts until the end of combat or until all 5 feathers have been spent.\_<br />As a bonus action when this adversary would cast a jutsu they can spend a feather to increase the damage die by 1 step, or increase its initial save DC by +2.\_<br />Alternatively, as an Action they can spend 2 Feathers to strike at a creature like large blades.\_<br />Make a Ranged Ninjutsu or Genjutsu attack, dealing [Prof]d10 force damage on a hit.</p>"
