    value: "<p>This adversary has fused itself with the Star Meteorite.\_<br />They manifest a powerful Chakra Beast under their control that acts as a bonus action on its turns.\_<br />This beast has the same statistics as Earth Release: Stone Dragon, but is resistant to all damage except Chakra, Force or Psychic, and has a bonus to AC equal to Half this adversaries Prof.\_<br />Additionally, any Recharge abilities the beast may have can be instantly recharged if this creature would spend 30 Chakra to do so.</p>"
