  description:
    value: "<p>The first time this creature would fall to 0 Hit points, they reactively draw the symbol of the Star village on the ground.\_<br />Their body dies, but their spirit solidifies onto the material plane.\_<br />This spirit using all of their same statistics of their living body, but cannot be harmed by any damage type except Chakra, Force or Psychic.\_<br />Their Spirit has a number of hit points equal to half of maximum and unlimited Chakra.\_<br />Regardless of its remaining or current hit points, it dies and passes on to the other world after a number of rounds equal to [Charisma modifier + 1d4].</p>"
