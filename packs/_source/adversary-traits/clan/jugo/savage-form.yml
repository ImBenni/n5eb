name: Savage Form
type: feat
img: icons/magic/symbols/squares-3d-green.webp
system:
  description:
    value: >-
      <p><span data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;This adversary can enter a save form, imbued and
      enhanced by Raw Nature Energy as a bonus action for the next minute. While in this form, this adversary makes all
      Strength, Dexterity and Constitution saving thows at advantage. These saving throws cannot be made at
      disadvantage. Additionally, melee damage dealt by this adversary while in this form, increases by 1 Step. Finally,
      this adversary gains the Berserk condition for the duration of this form.&quot;}"
      data-sheets-userformat="{&quot;2&quot;:13241,&quot;3&quot;:{&quot;1&quot;:0},&quot;6&quot;:{&quot;1&quot;:[{&quot;1&quot;:2,&quot;2&quot;:0,&quot;5&quot;:{&quot;1&quot;:2,&quot;2&quot;:0}},{&quot;1&quot;:0,&quot;2&quot;:0,&quot;3&quot;:3},{&quot;1&quot;:1,&quot;2&quot;:0,&quot;4&quot;:1}]},&quot;7&quot;:{&quot;1&quot;:[{&quot;1&quot;:2,&quot;2&quot;:0,&quot;5&quot;:{&quot;1&quot;:2,&quot;2&quot;:0}},{&quot;1&quot;:0,&quot;2&quot;:0,&quot;3&quot;:3},{&quot;1&quot;:1,&quot;2&quot;:0,&quot;4&quot;:1}]},&quot;8&quot;:{&quot;1&quot;:[{&quot;1&quot;:2,&quot;2&quot;:0,&quot;5&quot;:{&quot;1&quot;:2,&quot;2&quot;:0}},{&quot;1&quot;:0,&quot;2&quot;:0,&quot;3&quot;:3},{&quot;1&quot;:1,&quot;2&quot;:0,&quot;4&quot;:3}]},&quot;10&quot;:1,&quot;11&quot;:4,&quot;12&quot;:0,&quot;15&quot;:&quot;Georgia&quot;,&quot;16&quot;:9}">This
      adversary can enter a save form, imbued and enhanced by Raw Nature Energy as a bonus action for the next minute.
      <br />While in this form, this adversary makes all Strength, Dexterity and Constitution saving thows at advantage.
      <br />These saving throws cannot be made at disadvantage. Additionally, melee damage dealt by this adversary while
      in this form, increases by 1 Step. <br />Finally, this adversary gains the Berserk condition for the duration of
      this form.</span></p>
