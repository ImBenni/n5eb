img: icons/magic/symbols/squares-3d-green.webp
system:
  description:
    value: >-
      <p>As an action, on this adversary's turn, they may impose a Charisma saving throw vs its Cursed Art Save DC at
      disadvantage at a creature they can see. On a failed save, the creature is considered Glitched for the next
      minute. A Glitched creature, at the start of each of its turns, must roll a d4, suffering an effect until the
      start of their next turn based on their result;</p><p>1: The creature loses access to one feature they have
      (Adversary's choice)</p><p>2: The creature replaces any d20s they roll, with 2d10s</p><p>3: The creature swaps its
      Physical and Mental ability scores in order. (Strength, Dexterity, Constitution with Intelligence, Wisdom,
      Charisma)</p><p>4: The creature uses its lowest ability modifier in place of its Ninjutsu, Genjutsu, Taijutsu and
      Bukijutsu attack bonus, save DC, and calculations that use it.</p>
    chat: ''
