name: Liberation Boost
type: feat
_id: KrW3ffolWJGBddEy
img: icons/skills/targeting/target-strike-triple-blue.webp
system:
  description:
    value: >-
      <p>When this adversary would roll Initiative, all of its allies are afflicted with a Curse of Liberation for the
      duration of the combat. Curse of Liberation: This creature gains immunity to two Condition types (Physical,
      Elemental, Mental, Sensory). In exchange it cannot inflict conditions of any type, but jutsu or Arts it casts that
      would inflict conditions on a failed save, now inflicts a stack of Liberty. Liberty: For every stack of Liberty,
      an affected creature suffers a -1 Penalty to its AC and attack bonus, up to a maximum of 5 stacks. This effect can
      be ended if the affected creature spends its turn targeting themselves with a Jutsu or Art that Restrains, Stuns,
      Paralyzes or Grapples and willingly fails the save or using a Jutsu or Art with the Fuinjutsu keyword of B- Rank
      or higher targeting themselves and making a Ninshou check vs this adversaries Cursed Art Save DC.</p>
