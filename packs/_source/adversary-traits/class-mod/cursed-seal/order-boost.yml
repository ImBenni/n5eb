system:
  description:
    value: >-
      <p>As an action, on this adversaries turn, it can mark one creature with a Subjugation Seal. A creature marked
      with this seal, who would cast a Jutsu or use a Class or Clan feature must make a Charisma save vs Cursed Art DC.
      On a failure, they double the cost of the Jutsu, spend an additional use of the feature, doubles the cost of the
      feature or have the feature sealed until the end of this creatures next turn, if the feature does not have a use
      limit or expend a special resource.</p>
