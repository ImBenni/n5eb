name: Duality
type: feat
img: icons/magic/light/explosion-star-small-blue-yellow.webp
system:
  description:
    value: >-
      <p><span data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Creatures you are bonded with can  share their
      power with you. Bonded creatures can spend their action sharing their power with you, granting you a bonus to your
      next attack roll, damage roll, or save DC. (Pick two). Each time a bonded creature shares their power with you,
      roll 2d8 recording the result. When you choose to use the power they gave you, take the total of all d8's rolled
      as a result of this feature. If you apply this bonus to attack rolls, add half the result to the next attack roll,
      if your attacks result is 10 or higher than your targets AC, you treat it as a critical hit. If you apply this
      bonus to Damage, you deal additional damage equal to the result. If you apply the bonus to Save DC's increase your
      save DC's by one-third the result until the end of your next turn.&quot;}"
      data-sheets-userformat="{&quot;2&quot;:33567725,&quot;3&quot;:{&quot;1&quot;:0},&quot;5&quot;:{&quot;1&quot;:[{&quot;1&quot;:2,&quot;2&quot;:0,&quot;5&quot;:{&quot;1&quot;:2,&quot;2&quot;:0}},{&quot;1&quot;:0,&quot;2&quot;:0,&quot;3&quot;:3},{&quot;1&quot;:1,&quot;2&quot;:0,&quot;4&quot;:1}]},&quot;6&quot;:{&quot;1&quot;:[{&quot;1&quot;:2,&quot;2&quot;:0,&quot;5&quot;:{&quot;1&quot;:2,&quot;2&quot;:0}},{&quot;1&quot;:0,&quot;2&quot;:0,&quot;3&quot;:3},{&quot;1&quot;:1,&quot;2&quot;:0,&quot;4&quot;:1}]},&quot;8&quot;:{&quot;1&quot;:[{&quot;1&quot;:2,&quot;2&quot;:0,&quot;5&quot;:{&quot;1&quot;:2,&quot;2&quot;:0}},{&quot;1&quot;:0,&quot;2&quot;:0,&quot;3&quot;:3},{&quot;1&quot;:1,&quot;2&quot;:0,&quot;4&quot;:3}]},&quot;9&quot;:0,&quot;10&quot;:1,&quot;11&quot;:4,&quot;12&quot;:0,&quot;15&quot;:&quot;Georgia&quot;,&quot;16&quot;:9,&quot;28&quot;:1}">Creatures
      you are bonded with can share their power with you. <br />Bonded creatures can spend their action sharing their
      power with you, granting you a bonus to your next attack roll, damage roll, or save DC. (Pick two). <br />Each
      time a bonded creature shares their power with you, roll 2d8 recording the result. <br />When you choose to use
      the power they gave you, take the total of all d8's rolled as a result of this feature. <br />If you apply this
      bonus to attack rolls, add half the result to the next attack roll, if your attacks result is 10 or higher than
      your targets AC, you treat it as a critical hit. <br />If you apply this bonus to Damage, you deal additional
      damage equal to the result. <br />If you apply the bonus to Save DC's increase your save DC's by one-third the
      result until the end of your next turn.</span></p>
