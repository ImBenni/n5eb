  description:
    value: >-
      <p>When this adversary would take damage from a hostile creature, that hostile creature is marked with Hatred.
      Attacks this adversary makes against creatures marked with Hatred gain a 1d4 bonus. When a creature marked with
      Hatred makes a saving throw against a Jutsu or Art this Adversary casts, they suffer a 1d4 penalty to their
      save.</p>
