system:
  description:
    value: >-
      <p>When this adversaries ally would take damage from a hostile creature, this adversary gains a rank Cursed Love.
      When they would see an ally reduced to 0 hit points and killed, they gain 10 ranks of Cursed Love. When this
      creature would gain 10 ranks of Cursed Love, they spend all accumulated ranks and enter a berserkers rage, fueled
      by Love. While in this rage, attacks they make are all at advantage and ignores penalties. This Rage lasts until
      the end of their next turn.</p>
