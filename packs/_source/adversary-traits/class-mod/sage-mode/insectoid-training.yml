  description:
    value: >-
      <p>This adversary can spend 5 Sage Chakra to disperse and become a swarm of insects of its choice, until the
      beginning of its next turn or Elite action (its choice). While in this state, it cannot cast Jutsu or Arts that
      require hand signs (HS) or Mobility (M), but it gains immunity to damage and effects that originate from attack
      rolls and gains the ability to fly.</p>
