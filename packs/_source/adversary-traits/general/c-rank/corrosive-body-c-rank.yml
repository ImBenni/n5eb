system:
  description:
    value: "<p>Each time a creature touches or deals damage as the result of a melee attack to you, it takes 2d6 Acid damage.\_<br />Additionally, any weapon used to strike you suffers a permanent and cumulative −1 penalty to damage rolls.\_<br />The weapon is destroyed if the penalty ever reaches −5.\_<br />Casting Mending would remove all penalty stacks.</p>"
