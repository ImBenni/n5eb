  description:
    value: "<p>When initiative is rolled, mark 1 hostile creature.\_<br />A creature marked in this way, remains marked for the duration of this encounter or until killed.\_<br />An unconscious creature loses any marks.\_<br />Only one creature can be marked at a time.\_<br />While a creature is marked, add 1d4 to attack and damage rolls against the marked creature and suffer a 1d6 penalty to attack and damage rolls against creatures who are not marked.</p>"
