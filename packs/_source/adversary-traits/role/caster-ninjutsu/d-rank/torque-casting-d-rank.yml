name: Torque Casting
type: feat
img: icons/skills/movement/feet-winged-boots-brown.webp
system:
  description:
    value: "<p>When you would cast a Ninjutsu or Genjutsu while you have an Elemental Condition, you can reduce the rank of that condition by 1, converting some of its left-over energy into chakra for your jutsu.\_<br />Your jutsu gains the release keyword from the damage type needed to inflict the condition and increase the damage by 1 damage die.\_<br />You can do this once per round.</p>"
