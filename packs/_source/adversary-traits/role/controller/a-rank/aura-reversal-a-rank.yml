    value: "<p>All hostile creatures within 30ft, who would have a bonus to their attacks or damage as a result of a Jutsu or class feature, it is instead turned into a penalty.\_<br />This trait can be temporarily deactivated if this adversary is targeted by a special effect such as A-Rank Chakra dispel or Uzumaki Break.\_<br />You can change the effect or jutsu needed to one your party has such as a specific condition, Action or damage type.\_<br />The aura is deactivated until the end of this adversaries next turn.</p>"
