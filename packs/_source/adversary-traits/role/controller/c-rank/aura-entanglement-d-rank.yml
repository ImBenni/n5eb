system:
  description:
    value: "<p>The ground in a 30ft radius around this adversary is treated as difficult terrain for hostile creatures.\_<br />Each hostile creatur e that starts its turn in that area must succeed on a Strength saving throw vs DC 10 + Level or have its speed reduced to 0 until the end of their current turn.\_<br />This trait can be temporarily deactivated if this adversary is targeted by a special effect such as C-Rank Chakra dispel or Uzumaki Break.\_<br />You can change the effect or jutsu needed to one your party has such as a specific condition, Action or damage type.\_<br />The aura is deactivated until the end of this adversaries next turn.</p>"
