name: King Of The Hill [S-Rank]
type: feat
img: icons/magic/symbols/squares-3d-green.webp
system:
  description:
    value: "<p>When you are the only creature alive or conscious, while outnumbered by hostile enemies.\_<br />You gain advantage on all Attack rolls, Ability checks and saving throws so long as you are not adjacent to more than 2 hostile creatures.\_<br />This trait can be temporarily deactivated if this adversary is targeted by a special effect such as S-Rank Chakra dispel or Uzumaki Break.\_<br />You can change the effect or jutsu needed to one your party has such as a specific condition, Action or damage type.\_<br />The aura is deactivated until the end of this adversaries next turn.</p>"
