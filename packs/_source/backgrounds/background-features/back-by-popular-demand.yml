name: Back By Popular Demand
type: feat
img: icons/magic/symbols/cog-glowing-green.webp
system:
  description:
    value: >-
      <p>You can always find a place to perform, usually in an inn or town square but possibly with a circus, at a
      theater, or even in a noble's court.</p><p>At such a place, you receive free lodging and food of a modest or
      comfortable standard (depending on the quality of the stablishment), as long as you perform each night.</p><p>In
      addition, your performance makes you something of a local figure.</p><p>When strangers recognize you in a town
      where you have performed, they typically take a liking to you, while you easily blend in to the local
      population<br /></p>
