name: Discovery
type: feat
img: icons/magic/symbols/cog-glowing-green.webp
system:
  description:
    value: >-
      <p>The seclusion of your hermitage gave you access to a unique and powerful discovery.</p><p>The nature of this
      revelation depends on the nature of your seclusion.</p><p>You might have discovered a great truth about the world
      or the nature of Chakra, a fact that has long been forgotten, a relic of the past that could rewrite history, or a
      place unseen for ages.</p><p>It might be information that would be damaging to the people who or consigned you to
      exile, and hence the reason for your return to society.</p><p>Work with your GM to determine the details of your
      discovery and its impact on the campaign.</p>
