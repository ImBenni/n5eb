  description:
    value: >-
      <p>You always seem to rise to the expectations of others when a challenge arises.</p><p>Whenever you are
      confronted with a challenge or difficult situation, you seem to be able to gain some sliver of insight on it after
      just one attempt, passing or failing it.</p><p>This insight is a hint at how this particular challenge works or
      doesn't work, that others around you may not understand, but you now do.</p>
