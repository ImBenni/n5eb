  description:
    value: >-
      <p>Thanks to your noble birth, people are inclined to think the best of you.</p><p>You are welcome in high
      society, and people assume you have the right to be wherever you are.</p><p>The common folk make every effort to
      accommodate you and avoid your displeasure, and other people of high birth treat you as a member of the same
      social sphere.</p><p>You can secure an audience with a local noble if you need to, when you announce your clan or
      family.</p>
