name: Entertainer
type: background
img: icons/skills/social/diplomacy-writing-letter.webp
system:
  description:
    value: >-
      <p>You thrived in front of an audience, knowing how to entrance them, entertain them, and even inspire
      them.</p><p>Your poetics can stir the hearts of those who hear you, awakening grief or joy, laughter or
      anger.</p><p>Your music raises their spirits or captures their sorrow.</p><p>Your dance steps captivate, your
      humor cuts to the quick.</p><p>Whatever techniques you used; your art is your life.</p><hr /><p><strong>Skill
      Proficiencies:</strong> Acrobatics, Performance</p><p><strong>Tool Proficiencies:</strong> Disguise
      kit</p><p><strong>Equipment:</strong> A Love letter from someone you used to be close to, A Costume from an event
      prior, Wallet containing 100 Ryo.</p><p><strong>Equipment Pack:</strong> Infiltrator's or Captain's Pack (Choose
      one).</p><hr /><p><strong>FEATURE: BACK BY POPULAR DEMAND</strong></p><p>You can always find a place to perform,
      usually in an inn or town square but possibly with a circus, at a theater, or even in a noble's court.</p><p>At
      such a place, you receive free lodging and food of a modest or comfortable standard (depending on the quality of
      the stablishment), as long as you perform each night.</p><p>In addition, your performance makes you something of a
      local figure.</p><p>When strangers recognize you in a town where you have performed, they typically take a liking
      to you, while you easily blend in to the local population</p><hr /><p><strong>ENTICING
      PERSONALITY</strong></p><p>Select one:</p><p>• Increase any ability score by +1. (<strong>Recommended</strong>:
      Intelligence, Charisma)</p><p>• Gain a feat from Chapter 13: Customization options.</p><p>Regardless of the feat
      chosen, you do not gain an ability score improvement from the feat you select. (<strong>Recommended</strong>:
      General, Skill, Genjutsu)</p>
