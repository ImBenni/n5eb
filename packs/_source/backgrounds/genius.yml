name: Genius
type: background
img: icons/skills/social/diplomacy-writing-letter.webp
system:
  description:
    value: >-
      <p>You are someone who was raised with a notion of greatness about you.</p><p>Always placed on a pedestal above
      your peers for your intelligence, skills or natural born ability.</p><p>Before Coming to the academy, you had such
      an aptitude for success that strangers, parents, and teachers alike all placed you in a league of your
      own.</p><p>You have proven that to be the case up until this point and you will most likely continue to prove it
      moving forward.</p><p>Whether you choose to continue the path people have assumed you would, or shift focus is
      your own choice.</p><p>You have memories of both good and bad experiences with this assumption of genius about
      you.</p><p>Memories like these are something you may cherish or despise, regardless, you are a Genius through and
      through.</p><hr /><p><strong>Skill Proficiencies:</strong> Choose two from Ninshou, Martial Arts, Illusions
      </p><p><strong>Tool</strong> <strong>Proficiencies:</strong> One of your choice.</p><p><strong>Equipment:</strong>
      One Bingo Book Passed down to you from someone of importance, 1 Blank Jutsu Scrolls, A Wallet Containing 100
      Ryo.</p><p><strong>Equipment Pack:</strong> Traveler's or Captain's Pack (Choose one).</p><hr
      /><p><strong>FEATURE: MEETING EXPECTATIONS</strong></p><p>You always seem to rise to the expectations of others
      when a challenge arises.</p><p>Whenever you are confronted with a challenge or difficult situation, you seem to be
      able to gain some sliver of insight on it after just one attempt, passing or failing it.</p><p>This insight is a
      hint at how this particular challenge works or doesn't work, that others around you may not understand, but you
      now do.</p><hr /><p><strong>LEAGUE OF YOUR OWN</strong></p><p>Select one:</p><p>• Increase any ability score by
      +1. (<strong>Recommended:</strong> Intelligence, Wisdom)</p><p>• Select Gain a feat from Chapter 13: Customization
      options.</p><p>Regardless of the feat chosen, you do not gain an ability score improvement from the feat you
      select. (<strong>Recommended:</strong> General, Skill, Clan)</p>
    chat: ''
