name: Hard Worker
type: background
img: icons/skills/social/diplomacy-writing-letter.webp
system:
  description:
    value: >-
      <p>You were someone who always had to prove to themselves and others that you are worth your weight and
      space.</p><p>You always had to work twice as hard and twice as long to see results, but the results are beginning
      to show.</p><p>You never had the natural talent of your peers, no, you had peerless determination and persistence
      to push through all of the challenges you were faced with to make it to this point, while also looking forward to
      the next day to get better.</p><p>You have reached a level of discipline that your peers can't imagine, so you can
      keep up you're training on your own time while not lagging behind when you do decide to take a break.</p><hr
      /><p><strong>Skill Proficiencies:</strong> Acrobatics, Athletics</p><p><strong>Tool Proficiencies:</strong>
      Weaponsmith Kit</p><p><strong>Equipment:</strong> Set of Body weights that weigh 50+ lbs. for each part of your
      body, 3 Books containing training strategies, Training Gi, A Wallet Containing 100 Ryo.</p><p><strong>Equipment
      Pack:</strong> Crafter's or Traveler's Pack (Choose one).</p><hr /><p><strong>FEATURE: FOCUS AND
      GRIT</strong></p><p>You have trained yourself in such a way that you have absorbed multiple tomes of knowledge in
      whatever you worked your butt off to excel in.</p><p>You are able to quickly bond with people who have the same
      drive and determination as you, and even garner immediate audiences and conversations with those people.</p><p>You
      are also able to reference and call out different books, strategies, and texts to catch the attention of those who
      have read those texts or follow those strategies.</p><hr /><p><strong>AMAZING DISCIPLINE</strong></p><p>Select
      one:</p><ul><li><p>Strength +1 or Dexterity +1</p></li><li><p>Select one Feat from chapter 13: Customization
      options, with the General, Skill or Taijutsu Category. Regardless of which feat you pick, you do not gain an
      ability score improvement from any feat you select.</p></li></ul>
