name: Hermit
type: background
img: icons/skills/social/diplomacy-writing-letter.webp
system:
  description:
    value: >-
      <p>You lived in seclusion-either in a community or alone- for a formative part of your life.</p><p>In your time
      apart from society, you found quiet, solitude, and perhaps some of the answers you or your family were looking
      for.</p><hr /><p><strong>Skill Proficiencies:</strong> Animal Handling, History</p><p><strong>Tool
      Proficiencies:</strong> Choose one between Poison Kit, Medicine Kit, Trappers
      Kit</p><p><strong>Equipment:</strong> A diary of your experiences, a winter blanket, a set of common clothes, a
      poison kit, and 100 Ryo</p><p><strong>Equipment Pack:</strong> Explorer's or Crafter's Pack (Choose one).</p><hr
      /><p><strong>FEATURE: DISCOVERY</strong></p><p>The seclusion of your hermitage gave you access to a unique and
      powerful discovery.</p><p>The nature of this revelation depends on the nature of your seclusion.</p><p>You might
      have discovered a great truth about the world or the nature of Chakra, a fact that has long been forgotten, a
      relic of the past that could rewrite history, or a place unseen for ages.</p><p>It might be information that would
      be damaging to the people who or consigned you to exile, and hence the reason for your return to
      society.</p><p>Work with your GM to determine the details of your discovery and its impact on the campaign.</p><hr
      /><p><strong>SECLUDED</strong></p><p>Select one:</p><p>• Wisdom +1 or Constitution +1.</p><p>• Select one Feat
      from chapter 13: Customization options, with the General, Skill or Ninjutsu Category. Regardless of which feat you
      pick, you do not gain an ability score improvement from any feat you select.</p>
    chat: ''
