name: Noble
type: background
img: icons/skills/social/diplomacy-writing-letter.webp
system:
  description:
    value: >-
      <p>You understand wealth, power, and privilege.</p><p>You carry a noble title within your family or the village,
      and your family wields significant political influence.</p><p>You might be a pampered aristocrat's child
      unfamiliar with manual labor, a former merchant's child just elevated to the nobility, or an honest, hard-working
      clansman who cares deeply about the people who live and work in your clan's district.</p><p>Work with your GM to
      come up with an appropriate title and determine how much authority the clan carries, as well as their influence on
      you.</p><p>Is your family old and established, or was its title only recently bestowed? How much influence do they
      wield, how do people regard them?</p><hr /><p><strong>Skill Proficiencies:</strong> Persuasion,
      Insight</p><p><strong>Tool Proficiency:</strong> Security Kit</p><p><strong>Equipment:</strong> A set of fine
      clothes, a signet ring, your clan's emblem, and a wallet containing 100 Ryo</p><p><strong>Equipment Pack:</strong>
      Captain's or Crafter's Pack (Choose one).</p><hr /><p><strong>FEATURE: POSITION OF PRIVILEGE</strong></p><p>Thanks
      to your noble birth, people are inclined to think the best of you.</p><p>You are welcome in high society, and
      people assume you have the right to be wherever you are.</p><p>The common folk make every effort to accommodate
      you and avoid your displeasure, and other people of high birth treat you as a member of the same social
      sphere.</p><p>You can secure an audience with a local noble if you need to, when you announce your clan or
      family.</p><hr /><p><strong>ROYALTY</strong></p><p>Select one:</p><p>• Increase any ability score by +1.
      (<strong>Recommended:</strong> Wisdom, Charisma)</p><p>• Gain a feat from Chapter 13: Customization
      options.</p><p>Regardless of the feat chosen, you do not gain an ability score improvement from the feat you
      select. (<strong>Recommended:</strong> General, Skill, Clan)</p>
