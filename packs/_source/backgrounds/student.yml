system:
  description:
    value: >-
      <p>You were identified as someone with untapped potential at a very young age and were taken in as an
      apprentice.</p><p>You were taken from your home to be trained either by the Master who found you.</p><p>You seldom
      ever see your biological family, and were raised and educated surrounded by the trappings of the shinobi code
      taught to you by your master.</p><p>Now, you have set out into the greater world, seeking to use what you have
      learned.</p><hr /><p><strong>Skill Proficiencies:</strong> Acrobatics, Choose one Ninshou, Martial Arts,
      Illusions.</p><p><strong>Tool Proficiencies:</strong> Forensics Kit</p><p><strong>Equipment:</strong> A set of
      Common clothes, a Book full of teachings from your master, 1 Blank Jutsu Scroll, the last Letter you received from
      your master and a wallet containing 100 Ryo</p><p><strong>Equipment Pack:</strong> Explorer's or Infiltrator's
      Pack (Choose one).</p><hr /><p><strong>FEATURE: THE MASTER'S NAME</strong></p><p>You were formally trained in the
      art of shinobi, and the name of those that trained you can open doors.</p><p>You can usually gain an audience with
      another Shinobi Leader, simply by dropping the name of your Master or Masters School.</p><p>Furthermore, you can
      usually find a place to stay among Monks or Shinobi Temples, unless you show yourself to be a danger to
      them.</p><p>You may also have access to resources from those who taught you, whether that is access to your
      school's libraries and facilities, or simply the ability to correspond with your Master and ask him or her for
      advice.</p><hr /><p><strong>WELL LEARNED</strong></p><p>Select one:</p><p>• Increase any ability score by +1.
      (<strong>Recommended:</strong> Dexterity, Intelligence)</p><p>• Gain a feat from Chapter 13: Customization
      options.</p><p>Regardless of the feat chosen, you do not gain an ability score improvement from the feat you
      select. (<strong>Recommended:</strong> General, Skill, Ninjutsu)</p>
