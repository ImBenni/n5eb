name: Urchin
type: background
img: icons/skills/social/diplomacy-writing-letter.webp
system:
  description:
    value: >-
      <p>You grew up on the streets alone, orphaned, and poor.</p><p>You had no one to watch over you or to provide for
      you, so you learned to provide for yourself.</p><p>You fought fiercely over food and kept a constant watch out for
      other desperate souls who might steal from you.</p><p>You slept on rooftops and in alleyways, exposed to the
      elements, and endured sickness without the advantage of medicine or a place to recuperate.</p><p>You've survived
      despite all odds, and did so through cunning, strength, speed, or some combination of each.</p><hr
      /><p><strong>Skill Proficiencies:</strong> Sleight of Hand, Stealth</p><p><strong>Tool Proficiencies:</strong>
      Disguise kit</p><p><strong>Equipment:</strong> A Map of the Village you grew up in, A Token of intimate value to
      you, Set of Basic Clothing, Wallet containing 100 Ryo</p><p><strong>Equipment Pack:</strong> Infiltrator's or
      Crafter's Pack (Choose one).</p><hr /><p><strong>FEATURE: VILLAGE OF SECRETS</strong></p><p>You know the secret
      patterns and flows to cities and can find passages through the urban sprawl that others would miss.</p><p>When you
      are not in combat, you (and companions you lead) can travel between any two locations in the city twice as fast as
      your speed would normally allow.</p><hr /><p><strong>DESPERATE LIFESTYLE</strong></p><p>Select one:</p><p>•
      Increase any ability score by +1. (Recommended: Dexterity, Charisma)</p><p>• Gain a feat from Chapter 13:
      Customization options.</p><p>Regardless of the feat chosen, you do not gain an ability score improvement from the
      feat you select. (Recommended: General, Skill, Genjutsu)</p>
