  - sort: 500000
    name: Ninja-Net
    type: text
    _id: GAjZJvKYVBW99twp
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>NINJA-NET The Ninja Net is a new phenomenon within the world of Naruto, while it may not be wholly canonical
        for the purpose of this conversion and system, it is a relatively new and novel technology.</p><p>The Ninja-Net,
        while new is not something that is shared evenly or even distributed freely throughout the Ninja
        world.</p><p>Ninja net as a concept is basically a collection of data servers that share and communicate
        information over communication systems such as phone lines or wireless systems such as Bluetooth or radio
        links.</p><p>For the most part the Ninja-Net has become a global commodity, allowing civilians to purchase food
        on the net and have it picked up and delivered all without leaving their homes.</p><p>It also gave birth to a
        set of new potential threats to a village, something called Hackers.</p><p>Hacking has become a new school of
        focus for Shinobi to excel in, learning how to breach an enemy system and take control, all the while maintain
        complete anonymity.</p><p>Throughout most of the Ninja world the Ninja net is unique to each country and is
        broken down into three categories: Regional, National, Militarized.</p><p>The breakdown of these three are as
        follows;</p><p></p><p>Regional.</p><p>Regional Ninja-Net systems are usually hosts to basic webpages, chat rooms
        and message boards that primarily connect villagers to one another over relatively long distances of up to 50
        Miles.</p><p>Most Regional Ninja-Net systems are powered by newer and more technologically powerful companies
        and organizations which strive to get their products out to the public via a new sensation called
        Ads.</p><p>Most of these systems are protected by D and C-Rank security
        systems.</p><p></p><p>National.</p><p>National Ninja-Net systems are more advanced and far more pretty to look
        at.</p><p>With national 36 design standards enforced across each nation individually, this is the network that
        most politicians, including the Kage, use to communicate with other Countries National Ninja-Net
        systems.</p><p>National Systems are normally limited to the country they are housed under and have to go through
        dozens of security clearance checks prior to even opening a video call with someone else in another
        country.</p><p>While these systems are used for international communication, these systems don’t normally hold
        critical information on it directly, but the security systems in place normally range into the B and A-Rank
        levels.</p><p></p><p>Militarized.</p><p>The Militarized Ninja-Net are highly advanced systems that keep the
        entirety of a countries militaries connected.</p><p>These systems are the ones that can spell doom for a squad
        of shinobi who finds themselves in enemy territory.</p><p>These systems, unlike the previous two can be spread
        worldwide and localized at the drop of a hat.</p><p>Most of these systems are running due to secretly installed
        Data Server Scrolls, server terminals that create highly efficient networks that can allow a Shinobi in the Land
        of Water to communicate with their commanders in the Land of Earth almost instantaneously.</p><p>These systems
        are mission critical to keep online and usually hold the breath of a countries Secrets, but due to such
        importance they are usually protected by a series of different S-Rank security measures.</p><p></p><p>Ninja-Net
        Security.</p><p>The Ninja net for all of its luster is still an exploitable system when challenged by the right
        tools.</p><p>That’s why most Ninja-Net systems are designed with security systems to protect it, its users, and
        the files that live on its network.</p><p>When a foreign entity is able to gain access to a network it usually
        spells doom for that system and any secrets on it.</p><p>So counter hackers or security systems are used to
        find, punish and eject such entities.</p><p>While a creature is on a network it is not supposed to be on, for
        every 10 minutes it remains it must make a Check using whatever means it used to gain access to the system vs a
        Counter Hack DC located on the Ninja Net System Table.</p><p>On a failed check they gain a -2 Penalty to all
        subsequent checks.</p><p>After 3 failed Counter Hack checks, they are ejected from the system for the next 24
        Hours and their physical location becomes known to the system owners.</p><img
        src="systems/n5eb/assets/content/cheat-sheets/ninja-net-system-rank.webp" /><p></p>
