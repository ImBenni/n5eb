system:
  description:
    value: >-
      <p>Starting at 3rd Level, when using Aburame clan jutsu you can choose to either deal the jutsu's listed damage or
      deal Chakra damage to the target creature.</p><p>When you do, you gain a number of temporary Chakra points equal
      half to the rank of the jutsu cast. (D-Rank: 2, C-Rank: 3, B-Rank: 4, A-Rank: 5, S-Rank: 6).</p><p>This temporary
      Chakra lasts for 1 minute. If you would deal Chakra damage to a creature who has 0 Chakra, you instead deal twice
      the result as Poison damage</p>
