system:
  description:
    value: >-
      <p>As part of the activation of this jutsu, you select one creature you can see within range. The target creature
      becomes swarmed by parasitic beetle as they land on them and begins to attempt to burrow into their skin. The
      target makes a constitution saving throw at the beginning of each of its turns for the next minute as they resist
      having the beetles burrow into them.</p><p>Each time a creature fails this saving throw, they gain a rank of
      Envenomed, Weakened and Dazzled for the next 10 minutes. A creature who fails this saving throw 5 or more times
      begins to experience a violent outburst of constantly reproducing beetles as they escape through the targets skin
      and flesh taking 10d12 poison damage and 12d10 Chakra damage.</p><p>A creature who succeeds their saving throw 5
      or more times ends this jutsu immediately.</p><p>Once you cast this jutsu, you cannot cast it again until you
      spend at least 10 minutes nurturing a new parasitic giant insect.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above A-Rank, increase the cost of this jutsu by 3, the damage by 2d12 poison and 2d10 Chakra
      damage.</p>
