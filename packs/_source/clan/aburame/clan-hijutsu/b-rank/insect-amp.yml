system:
  description:
    value: >-
      <p>You fill your insects with an intense surge of Chakra enhancing their overall potential and abilities</p><p>For
      the duration, when you would cast an Aburame Hijutsu that deals damage, its increase is increased by +1 damage die
      and now adds your ninjutsu ability modifier if it did not already.</p><p>Additionally, if an Aburame Hijutsu you
      cast would increase the base cost of a creatures jutsu, that base cost penalty is increased by an amount equal to
      the rank of the Hijutsu cast. (D-Rank: +4, C-Rank: +6, B-Rank: +8, A- Rank: +10, S-Rank: +12)</p>
