name: Parasitic Insect Cloud
type: spell
img: systems/n5eb/assets/content/clans/aburame.webp
system:
  description:
    value: >-
      <p>Your insects create a noxious gas that is exuded from your body. When you cast this jutsu, you select an area
      you can see within range and the gas is moved to this area. Creatures in the path of the gas on the way to the
      chosen location, and creatures who start their turn in the gas, must make a Constitution saving throw, becoming
      poisoned and taking 5d8 poison damage on failure, or taking half damage and suffering no effects on a success. At
      the beginning of a creatures turn where they start inside the gas they repeat the saving throw. As a bonus action
      on each turn thereafter, for this jutsu's duration you may move this cloud 30 feet.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and damage by 2d8</p>
