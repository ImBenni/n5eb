name: Insect Clone
type: spell
img: systems/n5eb/assets/content/clans/aburame.webp
system:
  description:
    value: "<p>Your variation of the shadow clone technique, where you create a single clone of yourself formed out of Insects, called an Insect Clone.\_<br />This clone does not have any weapons or tools and cannot speak.\_<br />Insect Clones are able to cast up to 2 D-Rank Aburame Clan Hijutsu but cannot maintain concentration on any jutsu.\_<br />After the clone reaches 0 Hit points, performs 2 Aburame clan Hijutsu, its Summoner has ended its turn more than 120 feet away or is dismissed as a bonus action the jutsu ends.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3.\_<br />If this jutsu is cast at A-Rank, increase the rank of jutsu Insect clones can cast to C-Rank.</p>"
