name: Insect Jar Technique
type: spell
img: systems/n5eb/assets/content/clans/aburame.webp
system:
  description:
    value: >-
      <p>Your insects swarm around you and allied creatures creating a 10-foot barrier centered on you. The barrier
      erected has 4d10+12 hit points, and intercepts damage meant for you or any creature within the barriers area. This
      barrier lasts until the beginning of your next turn and creatures within the barriers area cannot be targeted by
      jutsu or effects that require line of sight</p><p>When this barrier is erected, all creatures of your choice are
      ejected from its area, being pushed to the closest space on the outside of the barriers area</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and hit points by
      2d10+6</p>
