name: Insect Sphere
type: spell
img: systems/n5eb/assets/content/clans/aburame.webp
system:
  description:
    value: >-
      <p>You send a swarm of insects to entrap a target creature. The target must make a Dexterity saving throw. On a
      failed save they are restrained as you deal 4d4 poison damage to the restrained target at the end of each of your
      turns. Restrained creatures can make a Strength saving throw at the end of each of their turns. On a success, the
      jutsu ends on them.</p><p>While restrained in this way Jutsu the creature casts has its base cost increased by +4.
      If the jutsu requires hand seals (HS) as a component, its base cost increases by an additional +4</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, damage by 2d4 and the
      jutsu cost penalty by +2 for each cost increase instance.</p>
