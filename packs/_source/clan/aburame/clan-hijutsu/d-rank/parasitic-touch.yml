system:
  description:
    value: >-
      <p>You coat your hands with toxic chakra siphoned from the insects hosted in your body. Make two melee Ninjutsu
      attacks, dealing 2d8 poison damage on a hit.</p><p>A creature hit by both attacks must succeed on a Dexterity
      saving throw or gain one rank of Envenomed. It also has disadvantage on its next attack roll targeting you, or you
      gain advantage on the next saving throw it imposes, whichever happens first before the end of its next
      turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost by 3 and the damage
      by 1d8.</p>
