system:
  origin:
    land: fire
    village: hidden-leaf
  description:
    value: >-
      <p>The Akimichi Clan is one of the four noble clans of Konohagakure. Many of their clan's techniques revolve
      around the manipulation of their body weight and size through the use of Yang Release. Members of the clan possess
      great physical strength and are able to quickly convert calories into Chakra, which they then use in their various
      secret techniques. Most of these techniques rapidly consume the user's Chakra during use, and maintaining them
      during a prolonged battle can be tiring. For this reason, the Akimichi have high Chakra levels and eat a lot in
      order to build up or replenish their Chakra reserves. As a tribute, members of the clan wear the kanji for "food"
      on their clothing. If standard calories aren't enough for a battle, Akimichi can use the clan's three colored
      pills to convert excess fat into Chakra, at the cost of one's health.</p><hr /><p><strong>Ability Score
      Increase:</strong> +2 Con, +1 Str</p><p><strong>Speed:</strong> Your base walking speed is 30
      feet.</p><p><strong>Skill Proficiencies:</strong> Athletics, Survival</p><hr /><p><strong>Akimichi Clan
      Jutsu:</strong> The Akimichi have access to a separate list of jutsu unique to their Clan. You can add these jutsu
      to your jutsu list instead of selecting jutsu from the Normal jutsu list. </p><p><strong>Lunch Breaks:</strong>
      When you take a short rest, you regain additional Hit Points equal to twice your current
      <em><strong>Calories</strong></em><strong>. Calories:</strong> At first level you have a set number of Calories
      equal to your Level+ your constitution modifier (Min.1). You gain 1 Calorie every level hereafter. You regain a
      number of calories equal to your constitution modifier after a short Rest, and all calories after a long or Full
      Rest. You can spend these Calories to use Clan Jutsu or Clan Features.</p><hr /><p><strong>Food Pills:</strong> At
      3rd Level, the you gain access to a special form of military food pills. These Pills enhance the intensity of your
      metabolism allowing for powerful bonuses based on which pill you take. The Pills can be taken in whichever order
      you wish once you gain access to them. Regardless, if you ever take two of these pills during a single initiative,
      one minute after consumption you must make a DC 18 Constitution Save. On a failure you gain 4 ranks of Weakened
      for the next 10 minutes, which cannot be removed, unless by a Jutsu that removes conditions of at least B-Rank
      cast on you. You gain each pill at the described levels. </p><p>If you would consume all three pills, after 1
      minute you enter the unconscious condition. Every 10 minutes thereafter, you must make a DC 23 Constitution save.
      If you fail this save three times in 1 hour, you drop to 0 hit points and begin Dying. While dying in this way,
      you cannot regain hit points. The only way to be stabilized is to have a Jutsu, with the
      <em><strong>Medical</strong></em> keyword that removes conditions of at least A-Rank cast on you. If you are not
      stabilized within 1 hour after entering this state, you die. Beginning at 18th level, you cannot fall unconscious
      as a result of consuming all three pills. </p><p><strong>• Green Spinach Pill:</strong> At 3rd level, you gain the
      green spinach pill. As a Bonus action you can eat this pill. Upon consumption, you must spend 3 calories. When you
      do, you gain +4 to your Strength ability score, +2 to your constitution saving throws, and temporary hit points
      equal to your level, for the next minute. You can gain the benefit for this pill, twice per rest. </p><p><strong>•
      Yellow Curry Pill:</strong> At 7th Level, you gain the yellow curry pill. As a Bonus action you can eat this pill.
      Upon consumption, you must spend 5 calories. When you do, increase the damage die of all unarmed attacks and
      Taijutsu you cast by 1 Step (d4&gt; d6&gt; d8&gt; d10&gt; d12) for 1 minute. You can gain the benefit of this
      pill, twice per long rest. </p><p><strong>• Red Chili Pill:</strong> At 11th Level, you gain the Red Chili Pill.
      As a Bonus action you can eat this pill. Upon consumption, you must spend 7 Calories. Increase the damage die of
      Unarmed attacks by +1, and Akimichi Clan Jutsu by +2, for 1 minute. You can gain the benefit of this pill, twice
      per long rest.</p><hr /><p><strong>Fat Insulation:</strong> Beginning at 15th level, your fat protects you from
      harmful conditions. When you would suffer the Shocked or Chilled conditions you can spend 4 Calories to end one of
      such conditions. </p><p><strong>Master Metabolic Manipulation:</strong> At 18th level you reduce the calorie cost
      of all Akimichi Clan Jutsu by 2 (Min of 1)</p>
