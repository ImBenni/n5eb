system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Akimichi Clan, Level 4+</p><p>You have undergone rigorous training to
      condition your body to absorb nutrition from anything. You gain the following benefits;</p><p>• When you would eat
      a consumable, such as a Blood Pill, Military Ration Pill, or any other ingestible consumable item, you regain 1d4
      calories. You can regain calories this way twice per short rest.</p><p>• You have resistance to the Poisoned and
      Weakened Condition rolling advantage on all saving throws and checks made to resist such conditions.</p><p>•
      Poison damage you take from the Envenomed condition is reduced by 1 step (D6&gt;D4</p><p>• You gain advantage on
      skill checks and Saving throws to resist environmental Hazards &amp; Conditions</p>
