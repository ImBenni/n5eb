name: Butterfly Bullet Bomb
type: spell
img: systems/n5eb/assets/content/clans/akimichi.webp
system:
  description:
    value: >-
      <p>As part of the requirements for this jutsu, you must have either Full-Body-Expansion or Butterfly Mode jutsu
      active. You forcibly convert all of your remaining calories into Chakra and funneling it into your fist as you
      attempt to make a devastating single attack. Reduce your remaining calories to 0. Make a melee taijutsu attack
      against a creature in range. On a hit, you deal 10d10 Bludgeoning + 1d10 additional damage for every Calorie you
      had remaining before this jutsu's casting and all creatures in a 30-foot cone behind the target creature must make
      a Dexterity saving throw, taking half the damage dealt as bludgeoning damage, being knocked back 20 feet and
      becoming staggard on a failed save. After the conclusion of this jutsu, Butterfly Mode ends immediately, and you
      cannot regain Calories until you take a long rest.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      A-Rank, Chakra cost of this jutsu by 3 and the initial damage by 2d10.</p>
