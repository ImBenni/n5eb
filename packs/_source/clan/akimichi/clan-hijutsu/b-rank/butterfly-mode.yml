name: Butterfly Mode
type: spell
img: systems/n5eb/assets/content/clans/akimichi.webp
system:
  description:
    value: "<p>You release Chakra from your back as it forms into the shape of butterfly wings and becomes visible to the naked eye of your design.\_<br />For the duration of this jutsu, you cannot use the Full-Body-Expansion jutsu and you gain immunity to poison damage.\_<br />You increase the damage you deal making melee weapon or unarmed attacks or casting Akimichi Hijutsu using strength, by an amount equal to Xd6 (X= your Proficiency Bonus).\_<br />If you would cast a Taijutsu that isn't an Akimichi clan Hijutsu, you instead increase the damage by half the bonus damage die, you would if it were an Akimichi Hijutsu.\_<br />This bonus damage can be applied no more than twice per round.\_<br />You also gain advantage on strength and constitution and saving throws, and Strength based ability and skill checks When this jutsu ends, you lose all remaining Calories and cannot gain calories until you complete a long rest.</p>"
    chat: ''
