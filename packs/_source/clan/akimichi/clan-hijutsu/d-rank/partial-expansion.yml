system:
  description:
    value: >-
      <p>If you spend Calories to activate this jutsu, you do not have to spend chakra to maintain this jutsu for the
      duration. You temporarily expand a portion of your body enhancing the impact potential of each unarmed attack.
      Your unarmed attack range is 10 feet for the duration and your unarmed damage die becomes a d8.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the chakra cost of this jutsu by 3 or the Calorie
      cost by 1. When cast at B-Rank, increase the damage by 1d8 (2d8). When cast at S-Rank, increase the damage by 2d8.
      (3d8).</p>
    chat: ''
