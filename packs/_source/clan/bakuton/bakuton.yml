name: Bakuton
type: race
_id: svtStocIxACTBCd7
img: systems/n5eb/assets/content/items/bakuton.webp
system:
  description:
    value: >-
      <p>The Bakuton Clan is a clan without a clear family name, but one with a fearsome history and purpose. Members of
      this clan can be found in villages, across the country, and are used to great effect in different military
      institutions. The Bakuton Family line is one of power, and absolute authority. These shinobi are known to control
      a battlefield through force alone, and very few can say they would stand a chance against one in a headto-head
      match.</p><hr /><p><strong>Ability Score Increase:</strong> +2 Con, +1 Int</p><p><strong>Speed:</strong> Your base
      walking speed is 30 feet.</p><p><strong>Skill Proficiencies:</strong> Chakra Control, and your choice between
      Ninshou or Martial Arts</p><p><strong>Explosion Release Affinity:</strong> You begin with either Earth or
      Lightning Release Affinity. (Pick one)</p><hr /><p><strong>Explosive Techniques:</strong> The Bakuton Clan has
      access to a separate list of Jutsu unique to their Clan. You can add these Jutsu to your jutsu list instead of
      selecting jutsu from the Normal jutsu list(s). They do not need both Nature Release's to use their Clan
      jutsu.</p><hr /><p><strong>Branch Style:</strong> At 1st level, you realize which part of the Bakuton branch style
      you hail from. From time long immemorial the Bakuton blood split creating diverging family traits. You can learn
      Clan jutsu with the corresponding Branch style Keyword. This cannot be changed later on. </p><p><em><strong>•
      Artistic Style:</strong></em> One with the ability to mold clay, stone and other inorganic material into malleable
      catalyst for your Explosion Release given the title</p><p><em><strong>• Reckless Style:</strong></em> One with the
      ability to manipulate and create explosions on command within their physical reach, but at an increased potency.
      </p><p><strong>Cataclysmic:</strong> Beginning at 1st level, Hijutsu you cast deals double damage to structures,
      constructs and objects. At 11th level, four times damage, and at 18th, six times damage.</p><hr
      /><p><strong>Concussive Blasts [Changed]:</strong> Beginning at 3rd level, your high ordinance blasts leave your
      enemies reeling. You gain a number of shrapnel Dice, which are d6's equal to your proficiency bonus. When you
      would roll damage for a Bakuton clan Hijutsu, you can increase that damage by spending shrapnel die, up to your
      remaining amount, rolling the spent die and adding the result to the damage dealt. You regain spent die when you
      complete a short or long rest.</p><p>Beginning at 7th level, you can add your Ninjutsu ability modifier to your
      Bakuton Hijutsu, if you did not already, twice per turn. Beginning at 11th level, your shrapnel die size increases
      by 1 step to a d8. </p><p>Beginning at 15th level, you have learned to create more focused and compressed
      explosions. Whenever you would spend Shrapnel die to increase the damage of your Bakuton Hijutsu, the total damage
      ignores resistance and Damage reduction and you can choose one creature for each shrapnel die spent making them
      immune to your jutsu's effect until the end of the current turn. </p><p>Beginning at 18th level, whenever you roll
      an 8 or higher on your shrapnel die, you can roll that die again, adding the new roll to the previous roll as
      additional force damage. If you would roll the maximum amount again, you can repeat this process until you don't
      roll the maximum.</p><hr /><p><strong>Explosion Release [Changed]:</strong> The Bakuton clan has a unique talent
      for manifesting Explosion Release due to their close affinity to both Earth and Lightning Release. Beginning at
      7th level you gain the second Nature release you didn't select from Explosion Release Affinity clan trait and when
      casting a Bakuton Clan Hijutsu or Ninjutsu with the Earth or Lightning release keywords, you can change the damage
      type if any to force and increase the size of the area of effect by +15ft, if it has one.</p>
