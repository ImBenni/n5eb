name: Concussive Blasts
type: feat
_id: MDxqTj4TYhET7Thx
img: icons/magic/fire/explosion-fireball-large-red-orange.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, your high ordinance blasts leave your enemies reeling. You gain a number of shrapnel
      Dice, which are d6's equal to your proficiency bonus. When you would roll damage for a Bakuton clan Hijutsu, you
      can increase that damage by spending shrapnel die, up to your remaining amount, rolling the spent die and adding
      the result to the damage dealt. You regain spent die when you complete a short or long rest.</p><p>Beginning at
      7th level, you can add your Ninjutsu ability modifier to your Bakuton Hijutsu, if you did not already, twice per
      turn. Beginning at 11th level, your shrapnel die size increases by 1 step to a d8.</p><p>Beginning at 15th level,
      you have learned to create more focused and compressed explosions. Whenever you would spend Shrapnel die to
      increase the damage of your Bakuton Hijutsu, the total damage ignores resistance and Damage reduction and you can
      choose one creature for each shrapnel die spent making them immune to your jutsu's effect until the end of the
      current turn.</p><p>Beginning at 18th level, whenever you roll an 8 or higher on your shrapnel die, you can roll
      that die again, adding the new roll to the previous roll as additional force damage. If you would roll the maximum
      amount again, you can repeat this process until you don't roll the maximum.</p>
