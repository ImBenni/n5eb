name: Explosion Release Atomic Missile
type: spell
img: systems/n5eb/assets/content/clans/bakuton.webp
system:
  description:
    value: >-
      <p>Reckless Style</p><p>You propel yourself at a target within range. The target can be a space, a creature,
      object or structure as your use your explosion release launches you like a missile. While propelling yourself,
      your chakra rotates you furiously like a bullet as smoke begins to trail behind you, as you ram into your target
      causing a reckless explosion on impact.</p><p>All creatures, objects and structures within 60 feet of the target,
      excluding you must succeed a Dexterity saving throw. On a failed save taking your unarmed damage + 10d8 force
      damage or half as much on a successful save.</p><p>Additionally, all creatures within 15 feet of the target
      excluding you must succeed a Constitution Saving Throw. On a failed save, they take 6d8 Force damage and all
      equipment they are carrying or wearing of Greater Quality or lower is destroyed, or they take half as much damage
      and no other effects on a success.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase
      the cost of this jutsu by 3 and damage by 2d8.</p>
