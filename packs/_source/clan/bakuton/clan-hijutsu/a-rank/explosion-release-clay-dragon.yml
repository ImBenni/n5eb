name: Explosion Release Clay Dragon
type: spell
img: systems/n5eb/assets/content/clans/bakuton.webp
system:
  description:
    value: "<p>Artistic Style</p><p>You weave your handsigns, summoning a huge dragon formed from clay, earth or another inorganic earthen substance of your description. You cannot lose concentration on this jutsu as a result of a failed concentration check. You command the dragon telepathically and it only listens to you. It enters the initiative directly after you and requires no action to command it. It is proficient in all saving throws, using your ninjutsu ability modifier as its proficiency bonus and uses your ninjutsu attack bonus or save DC for effects that require it. You may as a bonus action or reaction cause the dragon to use its Detonation ability.<br />The dragon has the following Statistics;<br />At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and Hit points by 2d10 + 15\_</p><p></p>"
