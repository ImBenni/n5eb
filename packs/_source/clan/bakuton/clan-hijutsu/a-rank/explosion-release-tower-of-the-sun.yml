system:
  description:
    value: >-
      <p>You release the chakra limiters in your body, and create a monstrous, tower shaped explosion using your body as
      its catalyst. You die, and leave behind no corpse.<br />All creatures within 500 feet of you must make a
      Constitution saving throw, taking 200d4 + 100 Force damage on a failed save or half as much on a success.
      Unattended objects and structures within range of this jutsu are instantly destroyed.<br />At Higher Ranks: For
      each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and damage by 25d4 +25.</p>
