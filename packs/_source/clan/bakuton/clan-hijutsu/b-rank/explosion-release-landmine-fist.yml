name: Explosion Release Landmine Fist
type: spell
img: systems/n5eb/assets/content/clans/bakuton.webp
system:
  description:
    value: >-
      <p>Reckless Style</p><p>As a part of the activation of this jutsu, you must have Explosion Release: Fury! active.
      You gather a frightening amount of chakra into your fist, before slamming it into an opponent. Make a melee
      taijutsu attack. On a hit, you deal your [Unarmed Damage] + 8d6 Force damage. Each creature in a 10-foot cone
      behind the initial target must make a Dexterity saving throw, On a failed save, creatures take the same damage the
      original creature took. On a success, they take half damage.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above B-Rank, increase the cost of this jutsu by 3, damage by 2d6 and the size of the cone by 5 feet.</p>
    chat: ''
