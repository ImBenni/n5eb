name: Explosion Release Clay Flight
type: spell
img: systems/n5eb/assets/content/clans/bakuton.webp
system:
  description:
    value: >-
      <p>Artistic Style</p><p>You mold clay, earth or another inorganic earthen substance into the shape of a single
      bird of your description that you then inject your chakra into through a special chakra seal. You do not lose
      concentration of this jutsu as a result of failing a concentration check. This bird grows in size until it is
      large enough to carry one creature on its back and has the capability to aid you in battle. This bird is
      proficient in all saves and uses half of your ninjutsu ability modifier as its proficiency bonus.</p><p>You can
      command the bird as a bonus action on your turn. Additionally, you can as a reaction command the bird to use its
      Detonate ability. The bird has the following statistics;</p><p></p>
