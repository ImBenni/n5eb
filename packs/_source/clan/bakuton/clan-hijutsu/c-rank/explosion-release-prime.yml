name: Explosion Release Prime
type: spell
img: systems/n5eb/assets/content/clans/bakuton.webp
system:
  description:
    value: >-
      <p>You seal explosive chakra into a non- chakra enhanced medium or smaller object that you touch, priming it to be
      detonated on your command.</p><p>Anytime during the duration of this jutsu, you can use an action, bonus action,
      or Reaction to detonate any number of objects affected by this jutsu, if you have line of sight each of them. Upon
      detonation, each creature within 15 feet of it must make a Dexterity saving throw, or take 3d8 Force damage. A
      creature in the area of more than one fiery burst is affected up to three times. Objects within the radius of the
      blast take damage as well.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3 and damage by 2d8.</p>
