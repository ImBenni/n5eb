name: Explosion Release Repelling Blast
type: spell
img: systems/n5eb/assets/content/clans/bakuton.webp
system:
  description:
    value: "<p>You hold up an opened palm, and launch forth an explosion, precise enough to send projectiles flying back at their senders. Reduce the damage of the attack by 5d6 + your Ninjutsu Modifier. If this reduces the damage to 0, the attacking creature becomes the target of the attack, using your damage reduction result as damage so long as they are within range. This jutsu can transfer the attack's effects as well. Additionally, if this reduces the damage of a melee attack to 0, the attacking creature must make a Strength save. On a failed save, a weapon of Greater or lesser quality is destroyed.<br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and damage reduction by 2d6 and the quality of a melee weapon that can be destroyed is increased by 1 step.\_</p>"
    chat: ''
