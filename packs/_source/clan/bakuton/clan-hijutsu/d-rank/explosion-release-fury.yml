name: Explosion Release Fury
type: spell
img: systems/n5eb/assets/content/clans/bakuton.webp
system:
  description:
    value: >-
      <p>Reckless Style</p><p>You begin to channel explosive chakra throughout your body, making everything you touch
      explode on contact, giving you an advantage in hand-to- hand combat.</p><p>For the duration your [Unarmed Damage]
      becomes 2d6 and instead deals force damage. The first time each turn when you would deal [Unarmed Damage] to a
      creature with DR (damage reduction) as a result of Armor, you reduce their total DR by -2 for the next minute.
      This effect can stack up to 3 times. A creature whose DR is reduced by this jutsu can spend an Action restore
      their DR back to its original value.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank or higher, the DR penalty increases to -3.
      If this jutsu is cast at S-Rank, the damage die becomes 3d6</p>
