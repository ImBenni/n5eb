    value: "<p>Reckless Style</p><p>You channel explosive chakra into one of your fists, before swinging out in a furious haymaker. Make a taijutsu attack against a creature or object within range. On a hit, you deal your unarmed damage + 6d4 force damage. Additionally, the target must make a Strength saving throw, being pushed back 15 feet, falling prone and being Dazed on a failed save.<br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 2d4. If this jutsu is Cast at B-Rank or higher, the number of attacks you can make is increased to two.\_</p>"
