  description:
    value: >-
      <h2>Blood Architects</h2><p>The Chinoike is a clan that was active in the land of lightning then exiled to the
      valley of hell in the land of hot water which then led to peace for generations until a civil war broke out and
      many of the Chinoike clan died.</p><p>In the present day, only a few Chinoike remain, scattered throughout the
      world.</p><hr /><h3>Chinoike Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Wis or Int, +1
      Dex</p><p><strong>Speed</strong>: You base walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>:
      Illusions, pick one Chakra Control or Ninshou</p><p><strong>Passive Affinity</strong>: You begin with the Water
      release affinity.</p>
