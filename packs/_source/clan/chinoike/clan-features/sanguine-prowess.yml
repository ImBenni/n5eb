system:
  description:
    value: >-
      <p>Beginning at 1st level, you begin to understand how to manipulate iron present in liquids and develop an
      affinity towards techniques with blood. </p><p>When you would cast a jutsu with the Water Release keyword, as part
      of the same action, you can cut yourself and release a small amount of blood, losing 1d4 hit points (this does not
      count as damage). In exchange, the jutsu cast gains the benefit of being near a sufficient source of water, if
      applicable. If not applicable, reduce the cost of the jutsu by -2 (Min. 1)</p><p>Starting at 3rd level, your
      control over blood in conjunction with water release chakra improves, becoming far more complex and intricate.
      </p><p>When a jutsu would benefit from this feature, you can grant the jutsu, once per casting, an additional die
      of damage, healing, or a +1 to Save DC. At 11th level, you can pick a 2nd benefit, though you cannot select the
      same benefit twice</p>
