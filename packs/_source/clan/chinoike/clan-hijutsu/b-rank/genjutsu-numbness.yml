name: Genjutsu Numbness!
type: spell
img: systems/n5eb/assets/content/clans/chinoike.webp
system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu, you must have the Ketsuryūgan clan feature active. Make a
      ranged genjutsu attack against one creature in range. On a hit, you make a creature feel invincible, distracting
      them from the fact that their body has been compromised.</p><p>Each time the creature takes damage while this
      jutsu is active, if they possess damage reduction, their damage reduction value is treated as half, otherwise,
      they take an extra 1d6 + your Genjutsu ability modifier in necrotic damage, which cannot be reduced. A creature
      cannot be under this jutsu's effects multiple times</p><p>This jutsu's effects can trigger a number of times equal
      to your proficiency bonus, after which this jutsu ends</p>
