name: Genjutsu Blood Lake!
type: spell
img: systems/n5eb/assets/content/clans/chinoike.webp
system:
  description:
    value: >-
      <p>A genjutsu that causes the target to experience a drowning sensation, exhausting themselves as if their body
      truly underwent physical trauma. Select one target within range. This creature must succeed a Wisdom saving
      throw.</p><p>If this jutsu is used while your Ketsuryūgan is active, all creatures within 5 feet of the target, of
      your choice, must also make this saving throw.</p><p>Critical Success: The creature is able to resist this jutsu
      effects, and cannot be affected by this jutsu for 1 minute</p><p>Success: The creature is able to resist this
      jutsu's effects.</p><p>Failure: The creature loses sight of their surroundings, and sees a small fissure open
      underneath their feet, revealing a red ocean. The creature falls into water and feels as though it has been
      trapped for several days, constantly trying to escape and not drown. The creature gains 2 ranks of Exhaustion for
      1d4 rounds.</p><p>Critical Failure: Same effects as a failure, but the target takes 4d8 psychic damage, and the
      Exhaustion lasts for 1d4+2 rounds. They also gain 3 ranks of Exhaustion.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the range by 15 feet, and the duration of the
      Exhaustion condition by 1 round.</p>
