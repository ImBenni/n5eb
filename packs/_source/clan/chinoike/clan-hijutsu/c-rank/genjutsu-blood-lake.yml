    description: >-
      <p>Some special abilities and environmental hazards, such as and the long-term effects of freezing or scorching
      temperatures, can lead to a special condition called exhaustion.</p><p>If an already exhausted creature suffers
      another effect that causes exhaustion, its current level of exhaustion increases by 1 rank.</p><p>An effect that
      removes exhaustion reduces its rank by 1. Finishing a long rest reduces a creature’s exhaustion level by 1,
      provided that the creature has also ingested some food and drink. When a creature exceeds 10 ranks of exhaustion,
      they die.</p><p>For every rank of exhaustion, a creature has all of the following statistics are reduced by 1, and
      for every two ranks of exhaustion a creatures speed is reduced by 5;</p><ul><li><p>Armor
      Class</p></li><li><p>Ability Checks</p></li><li><p>Skill Checks</p></li><li><p>Saving Throws</p></li><li><p>Attack
      Rolls</p></li><li><p>Damage Rolls</p></li><li><p>Save DC’s</p></li></ul>
