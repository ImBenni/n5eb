name: Red Death
type: spell
img: systems/n5eb/assets/content/clans/chinoike.webp
system:
  description:
    value: >-
      <p>You infuse a weapon or dagger from the Blood Daggers hijutsu and enhanced it with vile blood, so potent that it
      appears almost black. Once this jutsu is cast, until the end of your next turn, the next weapon attack or Ninjutsu
      attack made with your weapon (whichever it uses), deals an additional 3d10 cold damage. The creature must also
      make a Constitution saving throw, gaining 1 rank of bleeding, or Lacerated if they are currently lacerated on a
      failed save. Once you land this attack, this jutsu ends.</p><p>If this jutsu is used while your Ketsuryugan is
      active, this jutsu's damage also deals damage to the creature's chakra points, and on a failed save the creature
      becomes unable to recover hit or chakra points until the end of your next turn.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d10</p>
