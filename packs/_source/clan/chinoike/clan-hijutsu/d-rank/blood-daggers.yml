name: Blood Daggers
type: spell
img: systems/n5eb/assets/content/clans/chinoike.webp
system:
  description:
    value: >-
      <p>You manipulate the water and iron in the atmosphere to make two iron
      -rich aqua daggers that swirl around you in the air. As a bonus action,
      you can send out one dagger at a creature within 60 feet. Make a ranged
      ninjutsu attack, dealing 3d4 + your Ninjutsu ability modifier in piercing
      damage on hit. Once all daggers have been thrown, this jutsu ends. If your
      Ketsuryūgan is active while this jutsu is active, on a successful hit the
      affected creature makes a Constitution saving throw gaining a rank of
      bleed on a failure. At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cat
      at C-Rank or higher, increase the number of daggers this jutsu generates
      by +1. If this jutsu is cast at B-Rank or higher, increase its damage die
      to a d6. If this jutsu is cast at A-Rank or higher, increase the number of
      daggers this jutsu generates by +1. If this jutsu is cast at S-Rank
      increase its damage die to a d8.</p>
