name: Genjutsu Ketsuryugan
type: spell
img: systems/n5eb/assets/content/clans/chinoike.webp
system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu, you must have the Ketsuryūgan clan feature active. You look
      into the eyes of a creature and utilize your Ketsuryūgan to make your genjutsu more effective</p><p>As part of
      casting this jutsu, you can cast any D-Rank Genjutsu that you have on your jutsu known list, at no additional
      chakra cost. The jutsu must have a casting time of 1 action or bonus action, must not have the range of self, and
      must not have the NT or M components, to be used with this jutsu. The range of the genjutsu cast becomes the range
      of this jutsu and can only affect the target you are making eye contact with. This jutsu can be used without
      breaking stealth.</p><p>Your Genjutsu gains a +1 to attack, damage die, and initial Save DC. If the Genjutsu
      allows the creature to repeat their saving throw to end the jutsu's effect, the next time they would do so, they
      roll at disadvantage</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 4 and the rank of the Genjutsu that can be cast by 1 (D&gt;C&gt;B&gt;A&gt;S).C-Rank</p>
