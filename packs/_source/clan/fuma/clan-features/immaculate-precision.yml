name: Immaculate Precision
type: feat
img: systems/n5eb/assets/content/clans/fuma.webp
system:
  description:
    value: >-
      <p>Fuma Clansmen are known for their superior skill using throwing weapons. </p><p>Beginning at 1st level, when
      making a ranged weapon attack or casting a Bukijutsu that requires ranged attacks you can use Dexterity in place
      of Strength for your Taijutsu Ability Modifier. </p><p>Beginning at 3rd level, you increase the damage dice of
      Shuriken by +1. Fuma-Shuriken gain this bonus at 7th level and Monster Shuriken at 11th level.
      </p><p>Additionally, Jutsu and effects that would multiply your [Weapons Damage] die by any amount, excluding
      critical hits, instead increases your damage die by an amount equal to the following; (Double: +1, Triple: +2,
      Quadruple: +3, Quintuple: +4, Sextuple: +5.)</p>
    chat: ''
