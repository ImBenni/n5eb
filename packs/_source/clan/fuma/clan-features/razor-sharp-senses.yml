name: Razor Sharp Senses
type: feat
img: systems/n5eb/assets/content/clans/fuma.webp
system:
  description:
    value: >-
      <p>Fuma Clansmen are expected to predict the trajectory of an attack long before they even draw their weapon,
      allowing them to bounce attacks off of unsuspecting surfaces. <br />Beginning at 3rd level, twice per short rest,
      when you would miss a ranged weapon, or taijutsu attack that uses a weapon with the Thrown Property, you can
      remake the attack roll, taking the second result.</p>
