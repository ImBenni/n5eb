system:
  description:
    value: >-
      <p>The perfected and secret art of the Fuma Clan. The most lethal of their Falling Heaven series of jutsu. The
      user takes their Shuriken and line it with Chakra thin enough to separate Water molecules, and coats the blades of
      their weapon in such an aura before launching it with enough force to momentarily cut through gravity itself
      making the weapon immune to the forces of gravity for a short time. Make one Ranged Taijutsu Attack and compare
      the result to each creature's AC in range (10-Foot Wide, 90-feet long). On a hit they take [Weapons Damage] +10d12
      Slashing damage</p>
