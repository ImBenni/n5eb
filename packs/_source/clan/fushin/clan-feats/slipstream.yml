system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Fūshin Clan, Level 4+</p><p>You have learned to flow like the wind when you
      move. You gain the following benefits;</p><p>• Increase your Intelligence or Dexterity score by 1, to a maximum of
      20.</p><p>• Your speed increases by 10 feet. You increase your movement speed by an additional 5 feet for each
      jutsu with the Wind Release keyword you are concentrating on</p><p>• While you are concentrating on a jutsu with
      the Wind Release Keyword you don't provoke opportunity attacks</p>
