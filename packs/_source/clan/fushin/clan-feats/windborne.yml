system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Fūshin Clan</p><p>The wind itself has adopted you as one of its own. You
      gain the following benefits</p><p>• Increase your Intelligence or Dexterity score by 1, to a maximum of 20</p><p>•
      You can use Dexterity instead of Intelligence as your casting modifier for Fūshin Clan Hijutsu</p><p>• You ignore
      difficult terrain and visual obstructions created by wind or jutsu with the Wind Release Keyword.</p><p>• You gain
      a +1d8 bonus to clash checks when clashing with a jutsu with the Wind Release keyword</p>
