system:
  description:
    value: >-
      <p>Also, at 7th level, your wind moves at such speeds that it tears through most defenses. Your wind damage
      ignores resistance and disperses vapors, gases, and fogs that can be dispersed by strong winds.</p><p>At 11th
      level, your wind's speed is unmatched, once per rest, when a creature would cast a Reaction against a wind release
      jutsu you cast, you can force them to make a Dexterity saving throw against the jutsu save DC, being unable to
      take their reaction on a failed save.</p><p>At 15th level, after you have used this feature, you may spend 5
      chakra to use it again. A jutsu can only force this save once per casting</p>
