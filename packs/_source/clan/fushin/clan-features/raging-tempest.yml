  description:
    value: >-
      <p>Beginning at 3rd level, your wind has started to wander, almost gaining a mind of its own. When you would cast
      a Ninjutsu with the Wind Release Keyword, that has an area of effect, you may increase the area by 5 feet in every
      direction. </p><p>Starting at 18th level, this increases by an additional 10 feet and you may also double the
      range of the jutsu.</p>
