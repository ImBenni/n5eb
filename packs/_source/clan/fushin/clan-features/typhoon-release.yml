system:
  description:
    value: >-
      <p>The Fūshin clan has a unique talent for manifesting Typhoon Release, a powerful variant of Wind Release that
      tears through most defensives. </p><p>Beginning at 7th level, when casting a Ninjutsu with Wind Release Keyword,
      you can change the damage type to wind, and you increase your jutsu's damage die by 1 step.
      (d4-&gt;d6-&gt;d8-&gt;d10-&gt;d12)</p><p>Beginning at 15th level, once per turn, when you would deal wind damage,
      you inflict 1 rank of bleed.</p>
