system:
  description:
    value: >-
      <p>You condense a rampaging ball of wind before throwing it, causing it to explode. Make a ranged ninjutsu attack
      against the target. On a hit, the target takes 7d8 wind damage. Hit or miss, the target and each creature within
      15 feet of it must succeed on a Constitution saving throw or take 4d4 wind damage and becoming dazed until the end
      of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3 and damage by 1d8 and 1d4 respectively.</p>
