name: Typhoon Release Vicious Vortex
type: spell
img: systems/n5eb/assets/content/clans/fushin.webp
system:
  description:
    value: >-
      <p>You unleash a rotating force of wind that drags everything to its center. Each creature in a 15-foot radius
      sphere centered on you, other than you, must make a Strength saving throw. On a failed save, creatures and objects
      take 5d6 wind damage and are pulled to the center being knocked prone or half as much damage and no additional
      effects on a successful save. This jutsu deals double damage to structures and objects.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6
      and radius by 5 feet.</p>
