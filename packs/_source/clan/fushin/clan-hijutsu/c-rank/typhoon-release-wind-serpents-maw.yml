name: Typhoon Release Wind Serpent's Maw
type: spell
img: systems/n5eb/assets/content/clans/fushin.webp
system:
  description:
    value: >-
      <p>You create a maw of wind that roars pushing back all in its path. Creatures in range must succeed a Strength
      saving throw being knocked back 30ft. and taking 4d8 wind damage and suffering 1 rank of bleed on a failed save.
      On a successful save, creatures take half as much damage and no additional effects. If a creature knocked back by
      this jutsu collides with a solid object, their movement is stopped, taking the damage they would have taken as if
      they had fallen an equal distance</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3 and increase the damage by 1d8 and knock back by 5 feet</p>
