system:
  description:
    value: >-
      <p>You release an explosion of wind protecting you with a burst of air. Until the start of your next turn, you
      have a +4 Bonus to AC including the triggering attack. Creatures who are within 10ft. of you when you cast this
      jutsu must succeed a Strength saving throw, taking 2d6 wind damage and push to the edge of this jutsu's radius
      into a space that can hold them on a fail.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and increase the radius by 5 feet.</p>
