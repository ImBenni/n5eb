system:
  description:
    value: >-
      <p>You conjure a blast of wind that launches upwards from under a creature that you can see within range. The
      target must succeed a Dexterity saving throw taking 2d8 wind damage and being knocked up 30ft., falling prone on a
      failed save and half as much on a successful save and no further effects.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the number of targets this jutsu
      can affect by +1 and the damage by 1d8.</p>
