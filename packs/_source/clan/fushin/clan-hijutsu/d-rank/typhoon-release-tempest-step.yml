name: Typhoon Release Tempest Step
type: spell
img: systems/n5eb/assets/content/clans/fushin.webp
system:
  description:
    value: >-
      <p>You coalesce a powerful gust of wind at your feet, allowing for a burst of quick movement. Choose an unoccupied
      space within 30 feet in any direction, including up. Each creature you pass within 5 feet of during this movement
      must make a Dexterity saving throw, being knocked prone on a failed save. This movement does not provoke an attack
      of opportunity.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and increase the distance you move by 10 feet.</p>
