system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Futton Clan, level 8+</p><p>You can boil, boil, and boil, and never run out of steam.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Strength or Intelligence score by 1, to a maximum of 20.\_</p><p><br />• You gain an additional +1 Boil points.\_</p><p><br />• As an Action, you can convert your Chakra into boil points.\_<br />For every 10 Chakra you spend, you generate 1 Boil Point. <br />You cannot have more than your maximum number of Boil Points using this ability.</p>"
