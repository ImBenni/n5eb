img: systems/n5eb/assets/content/jutsu-icons/boil-release.webp
system:
  description:
    value: >-
      <p>The Futton clan has a unique talent for manifesting Boil Release due to their close affinity to both Fire and
      Water Release. </p><p>Beginning at 7th level you gain the second Nature release you didn't select from Boil
      Release Affinity clan trait and can learn Ninjutsu that deals Acid damage. </p><p>Also, at 7th level, when casting
      a jutsu with either Fire or Water release keywords, creatures you damage lose all of their temporary hit points
      before proceeding with damage calculations. Additionally, you can change the damage type of jutsu you cast with
      the Fire or Water release keywords, if any to Acid. </p><p>When you would reach 11th level, your Boil release, can
      evolve a creature corroded condition to a new level, called Deteriorate. When a creature with 5 ranks of the
      corroded condition would gain another rank of the corroded condition, the instead begin to Deteriorate, losing all
      ranks of corroded as it is replaced with 1 rank of Deteriorate. A Deteriorating creature suffers the following
      effects.</p><ul><li><p>A Deteriorating creature is counted as having 5 ranks of corroded for the purposes of
      interacting with feature, traits and jutsu and cannot gain ranks of the Corroded condition while they are
      Deteriorating.</p></li><li><p>A Deteriorating creature gains a -10 penalty to its DR (Damage reduction) and cannot
      gain additional DR for the duration</p></li><li><p>A Deteriorating creature gains a -5 penalty to all Constitution
      based checks and saves.</p></li><li><p>A Deteriorating creature loses all Resistances it has for the
      duration.</p></li><li><p>A Deteriorating creature can spend a Full-Turn action in an attempt to clean the broiling
      chakra from themselves, by making a DC 23 Dexterity saving throw to cleanse themselves.</p></li></ul>
    chat: ''
