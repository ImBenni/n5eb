name: Corrosive Aura
type: feat
img: systems/n5eb/assets/content/clans/futton.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, your highly corrosive chakra has the ability to melt through almost
      anything.</p><p>When you would deal Acid damage to a creature who has a bonus to their AC as a result of a Jutsu
      or feature that costs chakra, you deal additional damage equal to twice your proficiency bonus. </p><p>At 11th
      level, this aura extends to all Boil Release Jutsu you would cast.<br />Futton Clan Hijutsu you cast that deals
      Acid Damage ignores Resistance. <br />his increases to Immunity beginning at 18th level.</p>
