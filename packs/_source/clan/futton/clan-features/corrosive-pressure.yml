system:
  description:
    value: >-
      <p>Beginning at 1st level, your highly corrosive chakra has the ability to melt through almost anything.
      </p><p>You can learn Jutsu that deals Acid damage or inflicts the corroded Condition. Additionally, when you would
      deal Acid damage to a construct or structure you pierce any DR (damage reduction) it has, if any. </p><p>Starting
      at 11th level, this pressure enables Futton clan Hijutsu you cast that to ignore resistance to the damage it
      deals. </p><p>Beginning at 18th level, Futton clan hijutsu you cast, treats immunity as a resistance.</p>
