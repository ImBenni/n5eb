name: Boil Release Acidic Dragons Breath
type: spell
img: systems/n5eb/assets/content/clans/futton.webp
system:
  description:
    value: >-
      <p>You fire a beam of acid in a straight line spreading a massive wave of corroding acid. Creatures in a 30-foot
      long, 5-feet wide line in front of you must make a Dexterity saving throw, taking 8d8 Acid damage, and gaining 2
      ranks of Corroded on a failed save, or half as much on a successful one. Also, creatures, excluding you, within 5
      feet of the beam must succeed a constitution saving throw taking 6d6 Acid damage and 1 rank of corroded on a
      failed save.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this
      jutsu by 3 and damage by 2d8 and 2d6.</p>
