  description:
    value: >-
      <p>You coat your body in a highly compressed cloak of steam, that you then shape into a stinger the same shape as
      a Scorpions stinger. Make a melee Taijutsu attack. On a hit, you deal your unarmed + 5d12 acid damage and the
      target gains +1 rank of Corroded.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase
      the cost of this jutsu by 3 and damage by 1d12.</p>
