system:
  description:
    value: >-
      <p>You compress your boiling chakra into your body rapidly amplifying your physical strength to a great degree.
      You do not need to spend chakra to maintain concentration on this jutsu and you cannot lose concentration of it
      when you take damage. If you use Strength as your Taijutsu ability score, your [Unarmed Damage] die becomes
      3d6</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank. If this jutsu is cast at A-Rank or
      higher, your [Unarmed Damage] die instead becomes 3d8.</p>
