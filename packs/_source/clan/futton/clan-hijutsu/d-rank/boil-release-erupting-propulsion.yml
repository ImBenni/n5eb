name: Boil Release Erupting Propulsion
type: spell
img: systems/n5eb/assets/content/clans/futton.webp
system:
  description:
    value: >-
      <p>You expel a powerful jet stream of mist from your body that jets you forward allowing you to strike a creature
      with accelerated force. As a part of the activation of this jutsu, you may select a space, you can see within your
      movement speed range, that is adjacent to a hostile creature, and immediately move to that space. Make a melee
      taijutsu attack against the target creature dealing your [Unarmed Damage] + 2d8 on a hit. On a hit target creature
      must make a Constitution saving throw, being pushed 15 feet and falling prone on a failed save.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and damage by 2d8</p>
