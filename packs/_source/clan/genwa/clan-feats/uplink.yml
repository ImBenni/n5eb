system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Genwa Clan</p><hr /><p>Your mind is constantly flooded with new information
      from your surrounding environment, due to the over fluxing nature of Data Release. You dedicate time to meditate
      and focus your kekkei genkai's energy to utilize its potential. You gain the following benefits;</p><p>• Increase
      your Intelligence or Dexterity score by 1, up to a maximum of 20</p><p>• All of your ability scores are counted as
      being +2 higher, for the purpose of casting higher ranked Sensory jutsu through any ability score
      restrictions</p><p>• You can learn and create jutsu with the Sensory keyword in half the time</p>
