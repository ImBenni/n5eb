system:
  description:
    value: >-
      <p>You release a pulse of Data Release from yourself which can causes an angel or demonic construct to materialize
      and fight alongside you. When you cast this jutsu, choose between a Data Angel or Data Demon. Your choice affects
      the appearance and abilities of your construct. Angels appear as winged centurion knights, meant to aid the weak.
      Demons appear as monsters, meant to punish the wicked.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 4, and the number of constructs created by +1. You can choose
      whether these additional constructs are Angels or Demons.</p>
