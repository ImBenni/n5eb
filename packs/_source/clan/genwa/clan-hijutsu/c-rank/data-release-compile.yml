name: Data Release Compile
type: spell
img: systems/n5eb/assets/content/clans/genwa.webp
system:
  description:
    value: >-
      <p>You generate a stream of Data release which flows down your arms which converges into either a large broadsword
      of opake blue chakra, or two large claws of translucent red chakra. You cannot lose concentration of this jutsu as
      the result of taking damage or failing a concentration check. On your turn, you can spend 3 chakra to switch your
      weapon to the other weapon this jutsu provides</p><p>• Data Sword: This sword deals 2d6 force damage and possesses
      the Deadly, Finesse, Light, and Versatile (d8) properties. This sword uses Intelligence for attack and damage
      rolls. This sword can cast any Bukijutsu that does not require a ranged weapon, and that deals Slashing
      damage.</p><p>• Data Claws: These claws deal 3d4 force damage and possess the Critical, Finesses, Light, and
      Unarmed properties, and can use Intelligence for attack and damage rolls.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and gain a +1 to unarmed/weapon attack and
      damage rolls with your Data Sword/Data Claws.</p>
