name: Data Release VPN
type: spell
img: systems/n5eb/assets/content/clans/genwa.webp
system:
  description:
    value: >-
      <p>You quickly cover a willing creature within reach in a reservoir of Data Release chakra, generating an
      obscuring aura to immerse the creature. For the duration, the creature does not produce sound and is Invisible,
      until they make an attack, deal damage, or receive damage.</p><p>At the end of each of your turns (or every 10
      minutes, if not in combat), you must spend 4 chakra, plus +1 chakra for each instance of this jutsu you have
      active at a time. Creatures under this jutsu's effects can mentally communicate with each other across any
      distance.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu
      by 3, the range you can affect creatures from by 10 feet, and the number of creatures you can affect during this
      jutsu's initial casting by +1.</p>
