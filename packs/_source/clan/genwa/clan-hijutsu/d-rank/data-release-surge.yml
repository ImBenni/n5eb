name: Data Release Surge
type: spell
img: systems/n5eb/assets/content/clans/genwa.webp
system:
  description:
    value: >-
      <p>You weave signs to manifest your Data Release chakra behind you, forming into holographic wings of a color of
      your choice. Until the start of the next turn, you gain flying speed equal to your movement speed, can hover, and
      ignore difficult terrain. Also, when you first cast this jutsu, you may take the Dash or Disengage actions, as
      part of the same action</p><p>For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3. If cast to C-Rank or higher, you can choose to concentrate on this jutsu, giving it a casting time of
      Concentration, up to 1 minute.</p><p>If cast to B-Rank or higher, you can concentrate on this jutsu for 10
      minutes, and when you Dash or Disengage as part of casting this jutsu, gain +30ft of movement speed until the
      start of your next turn.</p><p>If cast to A-Rank or higher, this jutsu no longer requires you to concentrate on it
      to benefit from it for 10 minutes.</p><p>If cast to S-Rank or higher, your movement speed is increased by +30ft
      for the duration of the jutsu, and when you Dash or Disengage as part of casting this jutsu, +30ft (60ft total)
      until the start of your next turn.</p>
