name: Data Release Torrent
type: spell
img: systems/n5eb/assets/content/clans/genwa.webp
system:
  description:
    value: >-
      <p>You outstretch your hand and launch a series of prismatic particles and glitches that cause your arm to appear
      pixelated and emit 10 feet of bright light of any color.</p><p>Make two ranged ninjutsu attacks against a creature
      within 30 feet as you launch blasts of data at them, dealing 2d8 force damage and imposing a Strength saving throw
      on each hit. On a failed save, the creature is knocked back 10 feet and falls prone. A creature knocked prone
      and/or knocked out of this jutsu's range, as a result of this jutsu, does not result in consecutive attack rolls
      made with this jutsu to be made at disadvantage due to the creature being prone, or prevent the creature from
      targeted due to limited range.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3, and the number of attacks made by +1.</p>
