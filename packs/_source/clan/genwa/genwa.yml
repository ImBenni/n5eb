  description:
    value: >-
      <h2>Dimension Walkers</h2><p>The Genwa Clan is a custom homebrew clan created by Blasteroid.</p><p>Formally
      hailing from the Hidden Rain, members of this clan commonly share an affinity with Lightning, and occasionally,
      they can manifest something greater. A powerful nature release transformation known as Data Release, which
      possesses a unique affinity for technology.</p><p>The Genwa formally worked with the Akatsuki to gather
      information during the rule of Hanzo of the Salamander. However, after his defeat and the rise of Pain, the Genwa
      were forced into hiding, eventually splitting from the Rain and scattering themselves among other lands.</p><hr
      /><h3>Genwa Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Int, +1
      Dex</p><p><strong>Speed</strong>: Your base walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>:
      Ninshou, Sleight of Hand</p><p><strong>Extra Language</strong>: Machine-Speak. You can understand and communicate
      with machines.</p><p><strong>Passive Affinity</strong>: You have the Lightning Release Affinity.</p>
