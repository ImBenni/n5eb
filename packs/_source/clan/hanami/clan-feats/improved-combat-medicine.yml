system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hanami Clan</p><p>You have mastered weaving your medical jutsu into your
      combat style, you gain the following benefits:</p><p>• Increase your Strength or Wisdom score by 1, to a maximum
      of 20</p><p>• Choose one jutsu you know with the Medical keyword that deals damage, this jutsu gains the Combo
      keyword as if it was a Taijutsu. You can switch the chosen jutsu out on a long rest</p><p>• When you cast a
      Taijutsu with the Combo keyword, you can cast a Medical jutsu that deals damage as if it were a Finisher. Increase
      the damage die size of the jutsu by 1 step when cast this way</p>
