system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hanami Clan</p><p>Your extreme control over your chakra allows you to resist
      and aid others at resisting genjutsu. You gain the following benefits:</p><p>• Increase your Constitution or
      Wisdom score by 1, to a maximum of 20</p><p>• You learn the Release Genjutsu. When you cast this jutsu the range
      is increased to 60 feet, and you can target any number of creatures in range. For each creature after the first
      that you target increase the cost of the jutsu by 3.</p><p>• Twice per long rest, when you cast a jutsu with the
      Medical keyword on a creature you may also cast the Release Genjutsu as a part of the same action.</p>
