system:
  description:
    value: >-
      <p>Beginning at 3rd level, you have drilled in the fundamentals of both medical and taijutsu. Once per rest, when
      you cast a Taijutsu, or take the Dash, Disengage, or Dodge actions, you can cast a Supportive Medical Jutsu with
      the casting time of one Action, as a bonus action. </p><p>You gain additional uses of this feature at 7th and 15th
      levels.</p>
