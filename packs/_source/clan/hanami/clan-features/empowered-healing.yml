system:
  description:
    value: >-
      <p>Beginning at 3rd level, the potency of your medical chakra allows medical jutsu to go beyond their intended
      design and be even more beneficial. Twice per long rest, when you would use a jutsu with the Medical keyword that
      is Supportive, you may remove all ranks of any one condition affecting the creature as if you used the Restorative
      Ninjutsu, cast at your highest known jutsu rank</p><p>If you would cast a jutsu with the Medical keyword that
      removes conditions, you may spend a use of this feature to leave a remnant of your chakra within the creature,
      making them immune to gaining one condition removed again, from a hostile creature, for the next minute. You gain
      an additional use of this feature at 11th and 18th levels.</p>
