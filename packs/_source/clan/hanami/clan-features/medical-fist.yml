name: Medical Fist
type: feat
_id: rMIPSjG81590h62P
img: systems/n5eb/assets/content/clans/hanami.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, the Hanami are known for their brute strength and combative ability. When you cast a
      jutsu that uses your Unarmed Damage, you gain a +10ft. bonus to range and deal double damage to structures.
      Additionally, your [Unarmed Damage Die] becomes a 1d6.</p><p>When you cast a Hanami Hijutsu, or Ninjutsu with the
      Medical keyword that makes a melee attack roll, you can use Strength as your casting modifier and treat the attack
      as a melee Taijutsu attack, adding your [Unarmed Damage] to the jutsu's first damage roll, if it would not already
      include your unarmed damage.</p><p>Starting at 7th level, your bonus to range becomes +20ft and when you would
      make a check to maintain concentration of a Taijutsu or jutsu with the Medical keyword, you may add your Strength
      modifier to the result</p><p>Starting at 11th level, your bonus to range becomes +30ft, and once per round, as
      part of casting a jutsu with the Taijutsu or Medical keyword that makes an attack, you can make one unarmed
      attack.</p>
    chat: ''
