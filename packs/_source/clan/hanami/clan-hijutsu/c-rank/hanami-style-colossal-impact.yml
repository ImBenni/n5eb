name: Hanami Style Colossal Impact
type: spell
img: systems/n5eb/assets/content/clans/hanami.webp
system:
  description:
    value: >-
      <p>You drive your fist into the stomach of a creature with enough power to lift them off their feet, you then slam
      them into the ground with a massive amount of force. Make a melee taijutsu attack, on a hit you deal your [Unarmed
      Damage] + 3d8 and each creature (excluding you) within 30 feet must make a dexterity saving throw as you slam the
      creature into the ground, taking 3d6 bludgeoning damage on a failed save or half as much on a success. The
      creature you initially attacked has disadvantage on this saving throw and is knocked prone on a failure.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of the jutsu by 3 and increase the
      damage by 1d8 and 1d6.</p>
