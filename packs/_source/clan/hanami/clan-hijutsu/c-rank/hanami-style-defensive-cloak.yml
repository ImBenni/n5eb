name: Hanami Style Defensive Cloak
type: spell
img: systems/n5eb/assets/content/clans/hanami.webp
system:
  description:
    value: >-
      <p>You cover your entire body in vile cloak of medical jutsu, that harms any who touch you. You do not pay
      concentration costs to maintain this jutsu. When a creature hits you with a melee attack, they take 2d6 Necrotic
      damage and you gain temporary hit points equal to half the Necrotic damage dealt.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above C-Rank increase the cost of the jutsu by 3 and increase the damage die by 1 step
      (d6&gt;d8&gt;d10&gt;d12). If you cast this jutsu at A-Rank or higher you instead gain temporary hit points equal
      to the full damage dealt.</p>
