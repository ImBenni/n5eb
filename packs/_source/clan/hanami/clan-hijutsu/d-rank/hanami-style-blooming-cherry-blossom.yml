name: Hanami Style Blooming Cherry Blossom
type: spell
img: systems/n5eb/assets/content/clans/hanami.webp
system:
  description:
    value: >-
      <p>You rush towards a target before unleashing a volley of attacks. Make two taijutsu attacks against a creature
      within range. On a hit you deal your [Unarmed Damage] + 1d6. If you hit with two or more of these attacks the
      target is knocked prone.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu
      Finisher regardless of range, once per turn, using either an Action or Bonus action, ignoring its listed casting
      time.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of the jutsu by 3
      and increase the damage by 1d6. If this jutsu is cast at B- Rank of higher increase the number of attacks by
      +1.</p>
