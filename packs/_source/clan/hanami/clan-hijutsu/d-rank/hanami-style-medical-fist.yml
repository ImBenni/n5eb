name: Hanami Style Medical Fist
type: spell
img: systems/n5eb/assets/content/clans/hanami.webp
system:
  description:
    value: >-
      <p>You coat your hands in medical chakra designed to sap the life force of anyone you touch. Your [Unarmed Damage]
      becomes 1d8 and deals Necrotic damage, when you would hit someone with an unarmed or melee taijutsu attack, you
      gain temporary hit points equal to the damage roll of your Unarmed Damage.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above D-Rank increase the cost of the jutsu by 3 and increase the damage die by 1d8 up to a
      maximum of 3d8. If this jutsu is cast as a B-Rank, you increase the [Unarmed Damage] granted by this jutsu to
      d10s. If cast as an S-Rank, you gain twice as many temporary hit points when you gain temporary hit points this
      way</p>
