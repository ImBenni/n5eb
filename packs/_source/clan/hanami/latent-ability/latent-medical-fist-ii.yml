  description:
    value: >-
      <p>(You must have Latent Medical Fist I) </p><p>At 3rd level, while in the Medical Fist Stance, Ninjutsu you cast
      with the medical keyword that makes a melee attack roll, you may treat Strength as your casting modifier for
      attack and damage rolls (Not Save DC). When cast this way, melee Ninjutsu attacks made count as Melee Taijutsu
      attacks and add your [Unarmed Damage] to the jutsu's first damage roll.</p>
