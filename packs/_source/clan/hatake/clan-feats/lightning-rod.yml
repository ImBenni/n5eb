name: Lightning Rod
type: feat
img: systems/n5eb/assets/content/clans/hatake.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hatake Clan</p><p>You learn to retain some of the Chakra spent, converting
      and molding it into white Chakra. You gain the following benefits</p><p>• Increase your Intelligence or Charisma
      score by 1, to a maximum of 20.</p><p>• When you would cast a jutsu with the Lightning Release keyword without
      spending White Chakra, you may spend a bonus action to gain White Chakra equal to the half of the jutsu's cost.
      You can use this feature twice per long rest</p><p>• When you would take Lightning damage, you can, as a reaction,
      forcefully convert half of the damage taken into White Chakra. You can use this feature once per long rest</p>
