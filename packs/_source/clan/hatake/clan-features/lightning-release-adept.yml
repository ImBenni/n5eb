name: Lightning Release Adept
type: feat
img: systems/n5eb/assets/content/clans/hatake.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, reduce the cost of jutsu with the Lightning Release Keyword by an amount equal to the Rank
      of the jutsu cast. (D-Rank: 1, C- Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5). If you would spend at least 1 White
      Chakra, this cost reduction per rank instead becomes the following. (D-Rank: 2, C-Rank: 3, B- Rank: 4, A-Rank: 5,
      S-Rank: 6).</p><p>Starting at 7th level, your skill with lightning Release has grown to a considerable degree.
      When you could cast a Jutsu with the lightning release keyword and an Overcharge effect, you can choose to spend
      an amount of White Chakra equal to its rank to fulfill the Overcharge requirements to gain their effects.
      (D-Rank/C-Rank: 1 White Chakra (WC), B-Rank/A-Rank: 2 WC, S-Rank: 3 WC)</p>
