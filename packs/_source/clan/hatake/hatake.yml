    value: >-
      <h2>Baring White Fangs</h2><p>The Hatake Clan is an iconic clan from Konoha. It has produced several renowned
      members who have held positions of high authority, including the Sixth Hokage; All known members have also been
      extremely skilled users of Lightning release jutsu.</p><hr /><h3>Hanami Traits</h3><p><strong>Recommended Ability
      Score Increase</strong>: +2 Int, +1 Cha</p><p><strong>Speed</strong>: Your base walking speed is 35
      feet.</p><p><strong>Skill Proficiencies</strong>: Ninshou, Perception</p><p><strong>Passive Affinity</strong>: You
      have Lightning Release Affinity (You can learn Ninjutsu with the Lightning Release
      Keyword)</p><p><strong>Lightning Literacy</strong>: You reduce the ability score requirement to learn and cast
      Jutsu with the Lightning Release keyword by 2. For Ability score requirements, check the SHB, pg.121).</p>
