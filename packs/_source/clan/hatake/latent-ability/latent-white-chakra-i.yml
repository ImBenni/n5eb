system:
  description:
    value: >-
      <p>Beginning at 1st level, you gain a number of White Chakra equal to your level, up to a maximum of 5. If you
      have less than 5 White Chakra total, each time you gain a level you gain +1 White Chakra, until you reach a
      maximum of 5. You can spend White Chakra in place of normal chakra to cast jutsu with the Lightning Release
      keyword. You regain spent White Chakra when you complete a long rest.</p>
