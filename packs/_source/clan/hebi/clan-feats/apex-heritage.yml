name: Apex Heritage
type: feat
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hebi Clan, Level 4+</p><p>You consumed the knowledge passed down by your
      ancestors about the truth of your blood right. You gain the following benefits;</p><p>• Increase your Strength,
      Dexterity or Constitution score by 1, to a maximum of 20.</p><p>• Your tremor sense range is increased to 45
      feet.</p><p>• You gain +1 additional use of the Regeneration clan feature. You gain an additional use at 11th and
      18th levels</p><p>• When you deal poison damage to a creature as a result of weapon damage, until the end of their
      next turn reduce hit points they would regain by an amount equal to your proficiency bonus. This is in addition to
      the 7th level Poison Potency clan feature</p>
