name: Serpentine Affinity
type: feat
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hebi Clan, Level 4+</p><p>You have mastered the art of converting Ninjutsu
      of certain nature affinities into that of a unique nature release called Serpentine Release. You gain the
      following benefits;</p><p>• Select up to 3 Ninjutsu that you know, with a nature release keyword. When you would
      cast one of the selected Jutsu, it loses all nature release keywords and gains the Serpentine Release keyword. You
      can switch the jutsu affected by this feature when you would complete a Full-Rest. Ninjutsu cast with the
      Serpentine Release keyword gain the following effects;</p><p>o The jutsu cast can now deals Poison damage in place
      of its normal damage. Any effects that would trigger based on the jutsu's original damage type as a result of
      class features still trigger</p><p>o Poison damage inflicted by the chosen jutsu forces them to be unable to
      regain Hit or Chakra Points until the end of their next turn. This effect counts as a Physical Condition for the
      purposes of effects jutsu and traits that interacts with conditions.</p><p>o If you would clash with this jutsu,
      you add 1d8 to the result of the check.</p>
