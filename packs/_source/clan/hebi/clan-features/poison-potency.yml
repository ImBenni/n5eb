name: Poison Potency
type: feat
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: >-
      <p>The Hebi clans' rituals, have been ingrained into you, enhancing your knowledge of poisons and their potency
      when you use them. Beginning at 3rd level, you have learned to coat your weapons in a potent poison. As a bonus
      action you coat a weapon you are holding in a type of poison known as the Vipers Venom.</p><p>For the next minute
      your [Weapons Damage] type becomes Poison and twice per turn your weapon deals a bonus +1d4 damage. This increases
      to +1d6 at 11th, and +1d8 at 18th. You can coat a weapon in poison this way twice per rest and a weapon coated in
      this way ignores resistance to Poison damage and still counts as its original damage type for the purpose of
      qualifying for Bukijutsu.</p><p>Beginning at 7th level, when you deal poison damage to a creature when you roll
      your [Weapon Damage] or using Hebi Clan Hijutsu, the affected creature reduces all hit points gained by half until
      the end of their next turn</p>
    chat: ''
