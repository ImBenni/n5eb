name: Regeneration
type: feat
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: >-
      <p>You have learned to tap into your clan's innate ability to enhance its self- regeneration. </p><p>Beginning at
      1st level you can as a bonus action begin to focus on your accelerated regeneration, regaining 1d8+Half your level
      in hit points. On your subsequent turns, you may spend 4 chakra to activate this healing again as a free action
      (this does not expend multiple uses of this feature). This chakra cost cannot be reduced by any means and you
      cannot regain hit points this while at 0 hit points. This increases to 2d8+Half your level at 7th and 3d8 + Half
      your level at 15th. You can activate this feature twice per long rest, regaining one use every short
      rest.</p><p>At 7th level, you are now able to maintain your Regeneration even at 0 hit points, and while your
      Regeneration is active you do not automatically fall unconscious at 0 hit points. The chakra cost to recover hit
      points at 0 hit points through Regeneration is doubled. You also gain an additional use of your Regeneration per
      long rest.</p><p>At 15th level, while you have a Physical condition that has Ranks, you may, while your
      Regeneration is active, forgo the healing you would normally receive on a turn to instead remove all ranks of one
      of these conditions. When you do, until the end of your next turn, against hostile creatures you gain resistance
      to the condition removed and cannot gain this condition without a failed saving throw as your body immediately
      cures you of it.</p>
    chat: ''
