    description: >-
      <p>An <strong>Unconscious</strong> creature has entered a state of total mental remission, or is
      asleep.</p><ul><li><p>An unconscious creature is incapacitated (see the condition), can’t move or speak, and is
      unaware of its surroundings</p></li><li><p>The creature drops whatever it holding and falls
      prone.</p></li><li><p>The creature automatically fails Strength and Dexterity saving throws.</p></li><li><p>Attack
      rolls against the creature have advantage.</p></li><li><p>Any attack that hits the creature is a critical hit if
      the attacker is within 5 feet of the creature.</p></li></ul>
