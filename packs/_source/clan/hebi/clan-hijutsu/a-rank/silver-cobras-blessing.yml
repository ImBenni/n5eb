name: Silver Cobras Blessing
type: spell
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: "<p>You ingest a powerful potent Poison that reduces your current Chakra to 0.\_<br />You gain the Poisoned condition at the conclusion of this jutsu which cannot be removed, resisted, or ignored by any means for the next hour.\_<br />For the next minute you gain the following effects; • You cannot suffer the effects of the Bruised, poisoned, weakened, slowed condition for the duration.\_</p><p><br />• Your Taijutsu ability score increases by any amount equal to your Proficiency bonus.\_</p><p><br />• You can cast all Hebi clan jutsu that you have on your known jutsu list at no cost.\_</p><p><br />• Hebi clan jutsu that have the \"Striking Stance:\" pre-fix can be cast using an action, bonus action or reaction.\_</p><p><br />• You can concentrate on up to 3 different Hebi Clan Jutsu ignoring any effects that would prevent you from maintaining more than one Striking Stances.\_</p><p><br />After one minute, you fall unconscious for the next hour, being unable to be awoken until the hour has passed.\_<br />When you awake, you awake with 1 Chakra.</p>"
