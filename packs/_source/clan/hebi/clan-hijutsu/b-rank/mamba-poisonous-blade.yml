name: Mamba Poisonous Blade
type: spell
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: >-
      <p>You envelop your weapon in a poison only found in the infamous Black Mamba. Twice per turn, your weapon deals
      an additional +2d6 poison damage. Creatures who take poison damage from this weapon must make a constitution
      saving throw, gaining +2 ranks of Envenomed on a failed save.</p><p>A creature Envenomed by this jutsu has
      difficulty taking reactions. When they are first poisoned or envenomed by this jutsu, they cannot take a reaction
      until the beginning of their next turn. At the beginning of each of their turns, they must remake their
      constitution saving throw, losing the ability to take a reaction until the beginning of their following turn on a
      failed save. On a success, they can take reactions as normal.</p>
