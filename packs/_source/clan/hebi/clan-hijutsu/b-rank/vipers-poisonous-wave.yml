name: Vipers Poisonous Wave
type: spell
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: >-
      <p>You create a wave of poisonous Chakra that erupts from your weapon as you swing it. All creatures in a 10-foot
      wide, 30 feet long line must succeed a Dexterity saving throw, taking 6d8 Poison damage and half as much on a
      failed save.</p><p>If the weapon you use is under the effects of Mamba's Poisonous Blade, or the Poison Potency
      Hebi Clan Feature, creatures make their save with a -2 penalty. If the weapon you use is under the effects of both
      Mamba's Poisonous Blade and the Poison Potency Hebi Clan Feature, you instead deal 6d12 Poison damage or half as
      much on a failed save.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3 and damage by 2d8 or 2d10.</p>
