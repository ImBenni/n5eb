name: Poison Cobra Dance
type: spell
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: >-
      <p>You perform a flurry of graceful strikes each with the deadly precision of a cobra's bite. Make two melee
      Taijutsu attacks, dealing your [Weapons Damage] + 2d8. On a hit, the affected creature must make a Strength saving
      throw being knocked prone on a failure.</p><p>If these attacks are made against a creature with ranks of
      envenomed, increase the damage dealt by +1d8</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at A-Rank, increase the number of attacks made
      by +1.</p>
