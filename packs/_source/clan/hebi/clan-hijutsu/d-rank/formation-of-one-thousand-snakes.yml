name: Formation of One Thousand Snakes
type: spell
img: systems/n5eb/assets/content/clans/hebi.webp
system:
  description:
    value: "<p>\_You release a series of blade swings so much so that you create the visage of one thousand snakes coiling around you.\_<br />Your attacks are so viscous that all creatures of your choice in a 15-foot cube originating from you must succeed a dexterity saving throw.\_<br />A creature who fails the save takes double your weapons damage die plus your taijutsu ability modifier or half as much on a successful save.\_<br />If the weapons has two or more base damage die (such as an Odachi's 2d6), you instead add one additional damage die.\_<br />A creature who would fail their saving throw by 5 or more gains 1 rank of bleed.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the dice multiplier by 1.\_<br />(Double or +1 damage die &gt; Triple or +2 damage die &gt; Quadruple or +3 damage die &gt; Quintuple or +4 damage die &gt; Sextuple or +5 damage die).</p>"
