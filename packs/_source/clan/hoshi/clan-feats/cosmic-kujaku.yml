system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hoshi Clan, Level 16+</p><p>You have mastered weaving your medical jutsu
      into your combat style, you gain the following benefits</p><p>• Increase your Constitution or Intelligence score
      by 1, to a maximum of 20.</p><p>• When you activate Kujaku Mode, you may remove a number of ranks of a condition
      affecting you equal to your Constitution modifier (except Star Fatigue)</p><p>• While Kujaku Mode is active, the
      increase to AC becomes +2, and you add half your Constitution modifier (rounded down) to saving throws made
      against hostile Ninjutsu</p>
