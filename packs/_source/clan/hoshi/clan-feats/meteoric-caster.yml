system:
  description:
    value: >-
      <p>Category: Clan, Rare</p><p>Prerequisite: Hoshi Clan, Level 12+</p><p>Your masterful control in Hoshi techniques
      has made your ninjutsu casting both seamless and instinctual. You gain the following benefits</p><p>• Increase
      your Constitution or Intelligence score by 1, to a max of 20.</p><p>• When you would cast a jutsu without the
      Hijutsu keyword, you may spend a number of Star Chakra equal to its rank (D-Rank: 2, C-Rank: 4, B-Rank: 6, A-
      Rank: 8, S-Rank: 10). When you do so you may use Constitution instead of its casting ability for its attack and
      damage rolls as well as Save DC</p><p>• When you spend the full chakra cost of a jutsu using Star Chakra, its
      damage type becomes Force. If the jutsu doesn't deal damage, you instead gain Xd6 temporary hit points, where X
      equals the jutsu's rank (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5), which last until the end of your
      next turn.</p>
