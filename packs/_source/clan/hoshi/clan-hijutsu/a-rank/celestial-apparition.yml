name: Celestial Apparition
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>When you would die, or otherwise be reduced to 0 hit points, you can cast this jutsu to restore yourself to a
      ghostly form as your essence is manifested into pure star chakra. You gain an extra reaction that can only be used
      to cast this jutsu. This reaction cannot be negated by conditions or effects. Once cast, your body dies but you
      become a shimmering spirit comprised of Star Chakra gaining the following;</p><p>• Equipment you carry is
      duplicated in your ghostly form, but when an item is no longer being worn or held by you it vanishes.</p><p>• Your
      unarmed and weapon damage becomes force.</p><p>• You have resistance to all damage besides necrotic, psychic, and
      chakra damage. This resistance cannot be overcome by any means.</p><p>• You cannot regain or spend chakra points
      after this jutsu is cast. Instead, casting only your remaining Star Chakra for all features and jutsu. You regain
      a number an amount of Star Chakra equal to your level. If this amount exceeds your maximum then you gain the
      remainder in temporary hit points</p><p>• Your hit points remain at 0 and cannot exceed this amount, but you gain
      a number of temporary hit points equal to all current chakra you had before casting this jutsu. If you had 0
      chakra, then you can spend a number of Star Chakra to gain temporary hit points (5 temp HP for every 1 Star
      Chakra). If these temporary hit points would reach 0, damage dealt to you reduces your Star Chakra total
      instead</p><p>• You cannot be revived or restored of Hit Points, even after the effects of this jutsu end</p><p>•
      You can immediately take an extra turn, entering yourself into initiative order at that moment.</p><p>• This
      ghostly form lasts for 10 minutes or until you reach 0 temporary hit points and Star Chakra</p>
    chat: ''
