name: Kujaku Art Cosmic Pressure
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>As a prerequisite to this jutsu you must have the Kujaku Mode active. The feathers of your Kujaku Mode bolden
      as your mere presence is fueled by cosmic energy. An aura of distorting starlight surrounds you, and with this
      cosmic presence you exude a calming or frightening pressure.</p><p>Until the jutsu ends, any creature that targets
      you with an attack or hostile jutsu must first make a Wisdom saving throw. On a failed save, the creature must
      choose a new target or lose the attack or jutsu. A creature that fails a save this way also gains one rank of
      Charmed or Fear (pick one) which last for the duration.</p><p>Once a creature succeeds this Wisdom saving throw,
      it becomes immune to this effect until recast this jutsu.</p><p>Also, for the duration, a heavy aura of Star
      Chakra surrounds you in a 20- foot radius. Creatures that enter this radius for the first time or start their turn
      in it must make a Strength saving throw, gaining 1 rank of Slowed on a failed save. A target that fails this save
      is also unable to mold chakra while it remains in the aura. If a creature fails this save by 5 or more, they are
      restrained until the start of its next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      B-Rank, increase the cost of this jutsu by 3 (or 1 star chakra), increase the aura's radius by 5 feet.</p>
