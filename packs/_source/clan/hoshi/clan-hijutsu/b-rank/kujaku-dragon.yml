name: Kujaku Dragon
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>You cannot lose concentration on this jutsu as a result of taking damage. You form a massive swell of star
      chakra that shapes itself into a dragon-like creature composed of pure star chakra in an unoccupied space within
      range. This dragon is a huge-sized construct. You may dismiss the construct at any time, ending this
      jutsu</p><p>As part of the action casting this jutsu, you may command the dragon to move up to 60 feet and make up
      to two attacks at targets within 15 feet of it. On subsequent turns you can command the dragon to move and take
      the attack action as a bonus action. Otherwise the construct defends itself.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 (or 1 star chakra), the construct's hit
      points by 2d8 (or +10) and it deals an extra 1d8 damage with its attacks.</p>
