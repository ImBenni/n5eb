name: Kujaku Art Peacock Wings
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>As a prerequisite to this jutsu you must have the Kujaku Mode active. The feathers of your Kujaku Mode shift
      into two pairs of wings that grant you a flying speed of 60 feet, and can hover. When you cast this jutsu, you may
      choose to force all creatures within a 15-foot radius of you to make a Dexterity save or be knocked prone by the
      beat of your wings.</p><p>Also, you can use an action to make a ranged ninjutsu attack against a target within 60
      feet that you can see, as you launch chakra feathers from your wings. These chakra feathers deal 3d6 + your
      Ninjutsu ability modifier in force damage. A creature hit by this attack reduces its speed by 10 until the end of
      its next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this
      jutsu by 3 (or 1 star chakra), and increase the damage by 2d6.</p>
