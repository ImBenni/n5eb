name: Novacharge
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>You overclock the power of your next Ninjutsu with a surge of Star Chakra. When you cast this jutsu, you spend
      a minimum of 2 Star Chakra and a maximum of 8 Star Chakra, empowering the next Ninjutsu you cast before the start
      of your next turn;</p><p>• 2+ Star Chakra: For every 2 Star Chakra spent, your Ninjutsu deals an additional 1d10
      force damage</p><p>• 2+ Star Chakra: All targets affected by your Ninjutsu must succeed a Constitution saving
      throw or be knocked back a number of feet based on the rank of the Ninjutsu cast (D-Rank: 5ft., C-Rank: 10ft.,
      B-Rank: 20ft., A-Rank: 30ft., S-Rank: 40ft.).</p><p>o If the target fails their save by 5 or more, they are
      Weakened until the end of their next turn.</p><p>• 4+ Star Chakra: Creatures have disadvantage on effects to
      dispel, interrupt, or negate the casting</p><p>• 6+ Star Chakra: Targets make their Constitution saving throw at
      disadvantage</p><p>• 8 Star Chakra: The damage bonus of Novacharge becomes a d12, and adds twice your casting
      modifier</p>
