name: Kujaku Art Feather Slice
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>As a prerequisite to this jutsu you must have the Kujaku Mode active. The feathers of your Kujaku Mode shape
      into blade-like density. Make a melee ninjutsu attack against a target in range, dealing 3d8 + your Ninjutsu
      ability modifier in Force damage and if the target is a creature, it must make a Constitution saving throw or gain
      one rank of Bleeding.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-rank, increase the cost of
      the jutsu by 3 (or 1 star chakra), and it deals an extra 2d8 damage. When you cast this jutsu at B-Rank or above,
      you inflict one more rank of Bleeding.</p>
