name: Kujaku Beast
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>You cannot lose concentration on this jutsu as a result of taking damage. You summon a medium- sized bestial
      construct composed of pure star chakra in an unoccupied space within range. You may dismiss the construct at any
      time which ends the jutsu.</p><p>As part of the action to cast this jutsu, you may command the beast to move up to
      30 feet and attack a single target within 5 feet of it. On subsequent turns you can command the beast to move and
      take the attack action as a bonus action. Otherwise, the construct defends itself</p><p>Synchronize: Two Kujaku
      Beasts within 5 feet of each other can morph together to become stronger. As an action, you can spend half the
      cost of this jutsu to fuse the Beasts together, combining their current hit points and increasing its size
      category by 1, and its damage dice by 1.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 (or 1 star chakra), also increase the construct's hit points by 2d6 (or +8)
      and it deals an extra 1d6 damage. When you cast this jutsu at B-Rank or above, you create one additional
      construct.</p>
    chat: ''
