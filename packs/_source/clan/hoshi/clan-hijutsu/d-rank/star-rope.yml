name: Star Rope
type: spell
img: systems/n5eb/assets/content/clans/hoshi.webp
system:
  description:
    value: >-
      <p>You condense a beam of Star Chakra into a fine, tangible rope. Make a melee Ninjutsu attack roll with reach
      against a target in range, dealing 2d6 slashing damage. On a hit, you may choose to also grapple the target, which
      lasts for 1 minute or until you dismiss it (no action), or it breaks free with a successful Athletics or
      Acrobatics check contested against your Ninjutsu save DC as an action.</p><p>When you hit a target with this
      jutsu, and it's no more than one size categories larger, you can also pull that creature up to 20 feet toward
      you.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      (or 1 star chakra), and the damage by 2d6. If cast to B-Rank or higher, the target becomes restrained in addition
      to being grappled.</p>
