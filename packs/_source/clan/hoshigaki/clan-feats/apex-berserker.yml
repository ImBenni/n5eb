name: Apex Berserker
type: feat
img: systems/n5eb/assets/content/clans/hoshigaki.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Hoshigaki Clan, Level 12+</p><p>You have learned to tap into this bestial ferociousness within you.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.\_</p><p><br />• While you are gaining the benefits of Shark Skinned Predator, you can perform your Apex Gaze as a bonus action.\_</p><p><br />• While you are gaining the benefits of Shark Skinned Predator, you are immune to the Fear and Charmed Conditions.\_</p><p><br />• While you are gaining the benefits of Shark Skinned Predator, you have advantage with weapon attacks against targets with the bleeding condition.\_</p><p><br />• While you are gaining the benefits of Shark Skinned Predator, creatures who make contested grapple checks against you, make their checks at disadvantage.</p>"
