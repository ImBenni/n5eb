name: Lifeforce Connection
type: feat
img: systems/n5eb/assets/content/clans/hoshigaki.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Hoshigaki Clan, Wielder of a Legend, Level 12+</p><p>You've put enough of yourself into your Apex Weapon that it has become part of you, resonating with your chakra and becoming one with your body.\_<br />You gain the following benefits:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.\_</p><p><br />• You always know where your Apex Weapon is located as long as it is within 10 miles of you.\_<br />You can sense everything within 10 feet of your weapon as if you were there yourself.\_</p><p><br />• You can spend a use of Ravenous Chakra to consume chakra through your weapon.\_<br />For the next minute, once per turn, when you would deal weapon damage with your Apex Weapon, it deals chakra damage to the target equal to the weapons damage die.\_<br />You gain the same amount as temporary chakra points.\_</p><p><br />• When you would use your Ravenous Chakra clan feature on a creature whose level is greater than or equal to your own, they are an Elite or Solo adversary or if they have a higher Constitution ability score, when you would deal chakra damage to them, you increase the damage dealt by 1 damage die.\_<br />If the target has multiple resources that can be spent like chakra (Such as White Chakra, Calories, or even Reserve Cells), you also reduce that resource by 2 for each instance of chakra damage you deal.</p>"
