name: Shark Tooth
type: feat
img: systems/n5eb/assets/content/clans/hoshigaki.webp
system:
  description:
    value: "<p>Category: Clan Prerequisite: Hoshigaki Clan, Level 8+ </p><p>Your Body has begun to adapt to deep sea exploration and the hunt.\_<br />Your teeth grow sharper and more serrated.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.\_</p><p><br />• You gain proficiency in Strength saving throws while you are submerged in water.\_</p><p><br />• You gain access to a Bite Attack.\_<br />You can replace one or more of your attacks made with the attack action, with this bite attack.\_<br />Your bite attack has the following statistics and abilities:</p><p> • Deals 3d4 + Strength piercing damage.\_</p><p><br /> • Creatures who take damage from your bite, must make a Strength saving throw vs your Taijutsu save DC, being grappled on a failed save.\_<br />You can only grapple one creature at a time this way.\_</p><p><br /> • When you deal 12 or more damage with a single bite attack, the target gains one rank of bleeding.</p>"
