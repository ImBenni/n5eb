name: Symbiotic Shark
type: feat
img: systems/n5eb/assets/content/clans/hoshigaki.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Hoshigaki Clan</p><p>You are one with the water and creatures that live inside it.\_<br />Like pieces of a puzzle in an ecosystem, you help each other survive.\_<br />You gain the following benefits:</p><p></p><p>• Increase your Intelligence score by 1, to a maximum of 20.\_</p><p><br />• You can now command simple minded aquatic creatures, such as fish or sharks.\_</p><p><br />• When casting the Summoning Technique to summon a Shark tribe member, you can increase the cost by +5.\_<br />When you do you double their speed and they gain Temporary hit points equal to your level.\_</p><p><br />• When you would cast a jutsu with the Combination keyword with the help of your summoned creature, you can use your Constitution in place of your Charisma when calculating any bonuses granted by the combination jutsu.\_<br />When you would use your Constitution in this way, the cost cannot be reduced as a result of having more creatures as a part of the casting, only being divided evenly amongst all creatures and not gaining any additional cost reduction benefits.</p>"
