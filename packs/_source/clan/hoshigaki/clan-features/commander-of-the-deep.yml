name: Commander of the Deep
type: feat
img: systems/n5eb/assets/content/clans/hoshigaki.webp
system:
  description:
    value: "<p>Beginning at 1st level, aquatic creatures have an affinity with people of your clan.\_</p><p>You can communicate simple ideas with beasts that can breathe Water.\_</p><p>They can understand the meaning of your words, though you have no special ability to control them directly.\_</p><p>Starting at 7th level you learn the Summoning Technique D-Rank ninjutsu with a contract with the Shark tribe.\_</p><p>You can cast this jutsu ignoring ability score requirements.\_</p><p>The Shark tribe you are contracted with are a bit more powerful than other shark tribes.\_<br />This shark tribe gains additional ASI points equal to its rank.\_<br />(D-Rank: +2, C-Rank: +3, B-Rank: +4, A-Rank +5, S-Rank: +6).\_</p><p>Additionally, when you summon these sharks, they are summoned in a large bubble of Water that they use for land travel, using their swimming speed to traverse the land.\_<br />If they ever end their turns more than 60 feet away from you and they are not in a body of Water that is not this bubble, they are automatically unsummoned.</p>"
    chat: ''
