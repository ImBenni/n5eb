name: Ravenous Chakra
type: feat
img: systems/n5eb/assets/content/clans/hoshigaki.webp
system:
  description:
    value: >-
      <p>Your body yearns to consume the Chakra of others. The stronger your enemies, the stronger you can become, using
      their energy to fuel you. </p><p>Beginning at 3rd level, when you cast a jutsu with the Water release keyword, the
      jutsu also deals Chakra damage equal to the result. You gain a number of temporary Chakra points equal to the rank
      of the Jutsu cast (D-Rank: 2, C- Rank: 3, B-Rank: 4, A-Rank: 5, S-Rank: 6). You can use this feature twice per
      initiative roll. This increases to three times at 15th level.</p><p>Beginning at 11th level, your jutsu can also
      consume the Chakra in other techniques as your jutsu becomes more shark like. If you would clash with a jutsu
      while using this feature, you gain a bonus to the clash check equal to 1d6. If you win the clash check, your jutsu
      deals additional damage equal to twice the losing Jutsu's cost.</p>
    chat: ''
