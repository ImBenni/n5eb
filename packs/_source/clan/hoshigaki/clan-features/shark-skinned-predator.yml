name: Shark Skinned Predator
type: feat
img: systems/n5eb/assets/content/clans/hoshigaki.webp
system:
  description:
    value: "<p>Beginning at 1st level, your skin begins to resemble that of a sharks becoming tougher and more resilient.\_</p><p>You can use your Constitution instead of Dexterity to calculate your Armor Class.\_<br />Starting, at 11rd level, you tap into your innate bloodline limit, allowing you to become one with your inner apex predator.\_</p><p>As a bonus action on your turn, you enter a shark like form, growing large gills on your neck, large wing like fins grow from your shoulders down to your wrists, you grow webs between your fingers, your hair, if any fuses into your scalp, as your head, shoulders, and neck fuse into each other as your spine also grows into a long tail like appendage.\_</p><p>You cannot cast Ninjutsu that does not have the Water Release Keyword.\_<br />For the next minute you gain the following benefits:</p><ul><li><p>You can as an action perform a special action known as the <strong>Apex Gaze</strong> against a single creature you can see within 60 feet of you<br /><strong>Apex Gaze</strong>. Targets must make a Wisdom saving throw vs your Taijutsu or Ninjutsu save DC (Your choice). On a failure, the target gains 2 ranks of Demoralized</p></li><li><p>You have advantage on Strength &amp; Constitution Checks.</p></li><li><p>You gain a +2 bonus on Strength &amp; Constitution Saving throws.</p></li><li><p>You gain a swim speed and Water walking speed of twice your movement speed</p></li><li><p>You gain 30 feet of true sight while submerged underwater</p></li><li><p>When you make a melee attack using strength, you gain a bonus to damage equal to your Constitution modifier.</p></li><li><p>You have resistance to Bludgeoning, Piercing, or Slashing damage. (Pick 2, This can't be changed later)</p></li></ul><p>Once you enter this form, you must complete a rest before you are able to enter this form again. You gain an additional use of this form beginning at 18th level</p>"
