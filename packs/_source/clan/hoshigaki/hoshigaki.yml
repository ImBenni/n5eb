  description:
    value: >-
      <h2>The Tailless Beast</h2><p>The Hoshigaki Clan is a clan that hails from the Land of Water and is famous for all
      the wrong reasons. Every prominent member of their clan has betrayed their home village in more than one way. But
      this does not brand them all as traitors, instead it has caused a vast majority of them to branch out and move to
      other villages to break the stigma of their history.</p><hr /><h3>Hoshigaki Traits</h3><p><strong>Recommended
      Ability Score Increase</strong>: +2 Con, +1 Str</p><p><strong>Speed</strong>: Your base walking speed is 30
      feet.</p><p><strong>Skill Proficiencies</strong>: Animal Handling, Athletics</p><p><strong>Weapon
      Proficiencies</strong>: Great Axe, Naginata, Odachi (Greatsword), Scythe,
      Tetsubo</p><p><strong>Dark</strong><strong>Vision</strong>: You have Darkvision up to 30
      feet.</p><p><strong>Passive Affinity</strong>: You have Water Release Affinity (You can learn Ninjutsu with the
      Water Release Keyword)</p><p><strong>Water Literacy</strong>: You reduce the ability score requirement to learn
      and cast Jutsu with the Water Release keyword by 2. For Ability score requirements, check the SHB, pg.121).</p>
