name: Go With The Flow
type: feat
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: >-
      <p>Category: Clan<br />Prerequisite: Hozuki Clan</p><p><br />You've adapted more to using water jutsu, making
      yourself better at manipulating your own water. <br />You gain the following Benefits:</p><p><br />• Increase your
      Intelligence or Constitution score by 1, to a maximum of 20.</p><p><br />• When you would cast a Jutsu with the
      Water Release Keyword while gaining the benefits of a sufficient source of water you can instead forgo the
      benefits to gain 10 Temporary Hit Points. This THP stacks with THP gained from the Reflective Surface Clan
      Feature.</p><p><br />• You can concentrate on a Third jutsu, but all jutsu you are concentrating on must have the
      water release keyword.</p>
