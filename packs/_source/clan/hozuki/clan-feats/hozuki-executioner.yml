system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hozuki Clan, Level 4+</p><p>You have focused purely on your martial
      techniques, combining your water release into your blade work to refine your executioner style. You gain the
      following benefits:</p><p>• Increase your Strength score by 1, to a maximum of 20.</p><p>• You learn the Hozuki
      Blade Hijutsu. It no longer requires you to spend chakra to maintain concentration on it</p><p>• A number of times
      per rest equal to your proficiency bonus, when you would cast a ninjutsu with the Water Release keyword that
      requires at least one attack roll while concentrating on the Hozuki Blade jutsu, you can instead make the attack
      rolls with your Hozuki Blade, immediately summoning it to your hand to do so.</p><p>The jutsu loses the HS
      component, gaining the M component and the W (Hozuki Blade) components, and gains the Bukijutsu keyword. Once per
      casting, you can add your Hozuki Blade's damage to the damage roll of one of the jutsu's attacks.</p>
