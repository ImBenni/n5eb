  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Hozuki Clan, Level 12+</p><p>You adapted more to using Water jutsu, making yourself better at manipulating your own Water.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.\_</p><p><br />• Ninjutsu, you cast with the Water Release keyword and no other nature release keyword, can use your Constitution as your Ninjutsu ability modifier.\_</p><p><br />• Your other Hijutsu gain the benefits of you Hydrofication even when you are not concentrating on it</p>"
