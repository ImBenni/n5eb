name: Made of Water
type: feat
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: >-
      <p>Starting at 1st level, your body counts as a sufficient source of water to reduce the cost of Water release
      Jutsu you cast (You cannot gain the alternative effect of a Water Release Jutsu using this feature). </p><p>If the
      Jutsu cast cannot have its cost reduced by having a sufficient source of water, you instead reduce the cost of
      ninjutsu with the Water Release Keyword by an amount equal to the Rank of the jutsu cast. </p><p>(D-Rank:
      1,C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5).<br /></p>
