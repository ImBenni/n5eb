name: Demon Wave
type: spell
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must have Hydrofication currently active. You end your
      concentration on that jutsu and this one takes its place. You retain all effects of Hydrofication, including extra
      effects given to other jutsu and add this jutsu's effects to them. You cannot lose concentration of this jutsu as
      the result of failing a concentration check.</p><p>You create and merge with a larger body of Water, increasing
      your size to huge and increasing your Strength score by +4 and Constitution score by +2. When you cast a jutsu
      with the Water Release keyword, it always gains the benefits of any alternative effects the jutsu could receive as
      the result of being cast near a source of water (excluding cost reduction) and are upcast by +1 ranks for free. If
      this would cause the jutsu to be cast beyond S-Rank, apply the effects of the upcast an additional time (if
      applicable).</p><p>Additionally, as a reaction when you see an allied creature within 10 feet of you, targeted for
      an attack, you can interpose for that ally changing the target of that attack to you.</p>
    chat: ''
