name: Water Balloon
type: spell
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: "<p>You create a puddle of Water mixed with oil, producing bubbles that float around you.\_<br />These bubbles are then launched at a 15-foot cube of area within range with enough speed to cause concussive damage.\_<br />Creatures of your choice, who first enter the chosen area or who begin their turn within it must succeed a Dexterity saving throw taking 4d10 bludgeoning damage and being Dazed or half as much on a successful save.\_<br />As an action on your turn, you can choose to move the target area up to 30 feet in any direction within range.\_<br />If you are currently using the Hydrofication Jutsu, increase the damage die by 1 step.\_<br />(d10 &gt; d12).\_<br />At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and damage by 2d10.</p>"
