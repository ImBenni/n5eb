name: Hozuki Blade
type: spell
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: "<p>You weave together streams of Water to create a sword of solidified Water in your hand.\_<br />This construct sword lasts until the jutsu ends.\_<br />It counts as a simple melee weapon with which you are proficient.\_<br />It deals 3d6 + your Strength or Dexterity modifier in either cold, Slashing, Piercing or Bludgeoning damage on a hit and has the Versatile (d8), Deadly and Finesse properties.\_<br />You choose the damage type at the time of casting this jutsu.\_<br />In addition, when you use the sword to attack a target that is at least halfway submerged in Water, you make the attack roll with advantage.\_<br />If you are currently using the Hydrofication Jutsu, the dice size increases by one step (d6 &gt; d8 &gt; d10 &gt; d12).\_<br />If you drop the weapon, it dissipates at the end of the turn.\_<br />Thereafter, while the jutsu persists, you can use a bonus action to cause the sword to reappear in your hand.\_<br />If you would cast a jutsu that would allow you to deal this weapons damage that is under the effects of this jutsu, you only deal this jutsu's damage once, after which you default to 2d6 (or d8, if holding with two hands)</p>"
    chat: ''
