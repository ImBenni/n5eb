name: Water Blob
type: spell
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: "<p>A target creature you can see within range must succeed on a Dexterity saving throw or they are now grappled with their head being submerged in a bubble of Water, made from your body.\_<br />While grappled this way, they begin to suffocate.\_<br />While suffocating this way, it is difficult to maintain concentration on jutsu and must make a Constitution (Chakra Control) check to maintain concentration, losing the jutsu on a failure.\_<br />A creature begins to drown after a number of rounds equal to its Constitution modifier (Min 1).\_<br />While grappled in this way, when a creature attempts to escape this grapple, they can spend their action to make their Strength (Athletics) or Dexterity (Acrobatics) checks contested by either your Strength (Chakra Control), or Constitution (Chakra Control) check.\_<br />At the start of its first turn after these rounds and the beginning of each of its turns it remains grappled, it takes necrotic damage equal to 4d8 + Your Ninjutsu ability modifier.\_<br />If you are currently using the Hydrofication Jutsu, skill checks made to escape the grapple is made with a 1d4 penalty.</p>"
