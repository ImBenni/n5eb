name: Great Water Arm
type: spell
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: "<p>You quickly enlarge your main arm by moving the Water in your body.\_<br />Make a melee Ninjutsu or Taijutsu attack with the weapon used to cast this jutsu.\_<br />On a hit, you deal your weapons damage + 2d8 and force a target to make a Strength saving throw.\_<br />On a failed save, they are knocked back 15 feet and are dazed.\_<br />On a success, nothing happens.\_<br />If you are gaining the effects of the Hydrofication Hozuki clan Jutsu, increase the damage die by 1 step.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3.\_<br />If this jutsu is cast at C-Rank or higher, increase the damage by 1d8.\_<br />If this jutsu is cast at B-Rank or higher, increase the number of attacks made by +1.\_<br />If this jutsu is cast at S-Rank, increase the damage die by one step.</p>"
