name: Water Muscles
type: spell
img: systems/n5eb/assets/content/clans/hozuki.webp
system:
  description:
    value: >-
      <p>You empower your muscles by controlling the Water inside your body. This jutsu does not cost Chakra to maintain
      concentration. For the duration damage dealt with attacks and jutsu that rely on your Strength adds 2d4 for their
      damage rolls. You can only gain the benefit of this bonus damage, twice per turn</p><p>Additionally, you can add
      +4 to skill checks that use your Strength modifier in any way.</p><p>If you are currently benefitting from the
      Hydrofication Clan jutsu, the damage bonus instead becomes 5d4</p><p>At Higher Ranks: For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage bonus by 1d4.</p>
