system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Hyūga Clan</p><p>You train with members of the other branch of your clan, you gain the following benefits:</p><p></p><p>• Increase your Dexterity or Wisdom score by 1, to a Maximum of 20.\_</p><p><br />• You can learn jutsu from the opposite branch.\_<br />If you are a main branch, you can learn side branch Hyūga Jutsu.\_<br />If you are a side branch you can learn main branch Hyūga Jutsu.\_</p><p><br />• You learn one additional Hyūga clan Hijutsu that you qualify for.\_</p><p><br />• You can create and learn Hyūga clan Hijutsu in half the required time and with half the required cost.</p>"
