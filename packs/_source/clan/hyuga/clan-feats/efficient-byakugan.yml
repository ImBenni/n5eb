name: Efficient Byakugan
type: feat
img: systems/n5eb/assets/content/clans/hyuga.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Hyūga Clan, Level 4+</p><p>You have found a way to Reduce the strain the
      Byakugan has on you. You gain the following benefits;</p><p>• Increase your Dexterity or Wisdom score by 1, to a
      maximum of 20</p><p>• You gain 1 additional Byakugan ability from the Byakugan clan feature. You gain an
      additional one when you would reach 15th level</p><p>• Your Byakugan can now tell when a creature is under the
      effect of a Ninjutsu, Taijutsu, Genjutsu, feature or trait that costs Chakra of any type.</p>
