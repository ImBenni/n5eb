name: 8-Trigrams 128 Palms
type: spell
img: systems/n5eb/assets/content/clans/hyuga.webp
system:
  description:
    value: >-
      <p>Side Branch</p><p>This is the result of years of training and trying to achieve greater techniques than the
      main branch usually allows. This is the absolute peak of the Hyūga Gentle Fist technique within the Side Branch.
      As part of the requirements of this jutsu you must have Byakugan active and be benefitting from the Gentle Fist
      Stance and have the 8-Trigrams 64 palms learned.</p><p>Make a three melee Taijutsu attack, comparing the result
      against all creatures of your choice AC within 10 feet of you as you dash between each one striking faster than
      the eye can see. On a hit, you deal your [Unarmed Damage] +3d8 Chakra damage and dealing half of the chakra damage
      dealt, as force damage the targets hit points and you can choose to either Disrupt III or Block III their chakra
      pathways. If the target creature has 0 Chakra, you instead deal double the result as force damage.</p><p>Disrupt
      III: You increase the cost of all jutsu they cast by +15, until the end of your next turn.</p><p>Block III: You
      force the target creature to make a constitution saving throw, becoming unable to mold Chakra for 3 of their turns
      (or Elite Actions). They can remake the saving throw to remove this effect at the end of their turns.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and damage by
      1d8. If this jutsu is cast at S-Rank, creatures you strike suffer increased effects from Disrupt III and Block
      III.</p><p>Disrupt III: You increase the cost of all jutsu they cast by +20, until the end of your next
      turn.</p><p>Block III: You force the target creature(s) to make a constitution saving throw, becoming unable to
      mold Chakra for 4 of their turns (or Elite Actions).</p>
