name: Lion Palm
type: spell
img: systems/n5eb/assets/content/clans/hyuga.webp
system:
  description:
    value: "<p>Main Branch</p><p>The ultimate culmination of the Main Branches research and training.\_<br />You release Chakra from your hands coating and molding it into two guardian lions with a visible but intimidating presence.\_<br />For the Duration of this jutsu, you do not spend Chakra to maintain this jutsu.\_<br />As part of the requirements of this jutsu you must have Byakugan active and be benefitting from the Gentle Fist Stance.\_<br />Additionally, unarmed attacks using the Gentle Fist Stance and Hyūga Clan Hijutsu that make Melee Taijutsu attacks use a D10 damage die, Hyūga Clan Hijutsu have their costs reduced by -3 &amp; Hyūga clan jutsu deal an extra damage die on a hit.\_<br />As a Bonus action on your turn, you can make a Ranged Taijutsu attack on a creature you can see up to 30 feet away, firing off one of the Lions on your hand at them like a missile.\_<br />On a Hit, you deal 3d10 + Taijutsu ability modifier in Force damage.</p>"
