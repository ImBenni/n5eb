name: 8-Trigrams 64 Palms
type: spell
img: systems/n5eb/assets/content/clans/hyuga.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu you must have Byakugan active and be benefitting from the Gentle Fist
      Stance. You perform the Hyūga clan final maneuver of the Gentle fist. Make a single melee Taijutsu attack,
      comparing the result against all creatures of your choice AC, within 5 feet of you. On a hit, you deal your
      [Unarmed Damage] + 3d8 Chakra damage and half of the chakra damage dealt as force damage and you can choose to
      either Disrupt II or Block II their chakra pathways. If the target creature has 0 Chakra, you instead deal double
      the result as force damage</p><p>Disrupt II: You increase the cost of all jutsu they cast by +9, until the end of
      your next turn</p><p>Block II: You force the target creature to make a constitution saving throw, becoming unable
      to mold Chakra for 2 of their turns (or Elite Actions).</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and damage by 1d8 and if you use Disrupt II increase the cost
      of their next jutsu by an additional +6. If this jutsu is cast at B-Rank or higher, you instead make 2 attacks and
      creatures you strike with both attacks suffer increased effects from Disrupt II and Block II. This jutsu cannot
      make more than 2 attacks by any means per casting</p><p>Disrupt II: You increase the cost of all jutsu they cast
      by +12, until the end of your next turn.</p><p>Block II: You force the target creature(s) to make a constitution
      saving throw, becoming unable to mold Chakra for 3 of their turns (or Elite Actions). They can remake the saving
      throw to remove this effect at the end of their turns.</p>
    chat: ''
