name: Giant Palm Rotation
type: spell
img: systems/n5eb/assets/content/clans/hyuga.webp
system:
  description:
    value: >-
      <p>Main Branch</p><p>The perfected form of the "Palm Rotation" taught only to those of the main branch of the
      Hyūga clan. As part of the requirements of this jutsu you must be benefitting from the Gentle Fist Stance. This
      creates a dome of visible blue Chakra, repelling everything of your choice up to 15 feet away in a radius centered
      on you.</p><p>Until the start of your next turn, you and all creatures you have selected to not be affected by
      this jutsu within 10 feet of you benefit from this Jutsu's effects. You &amp; affected allies gain a +4 bonus to
      AC. If any of you are subject to a jutsu that requires you to make a Strength, Dexterity or Constitution saving
      throw you make the save at advantage. Creatures benefiting from this jutsu cannot benefit from bonuses to AC from
      other Reactions.</p><p>Hostile creatures who are within 10 feet of you when you cast this jutsu must succeed a
      Strength saving throw against your Taijutsu Save DC taking 4d8 Force damage and being knocked back 10 feet on a
      failed save.</p>
