name: One-Body Blow
type: spell
img: systems/n5eb/assets/content/clans/hyuga.webp
system:
  description:
    value: "<p>Side branch</p><p>You release Chakra from every Chakra point in the body creating a shockwave originating from you knocking creatures around you away from you.\_<br />First, if you are under the effect of a jutsu, feature, trait or action that would allow you to make a skill check or saving throw to end any of the triggering conditions, you automatically succeed the skill check or saving throw.\_<br />Finally, all creatures of your choice, within 10ft of you must make a Strength saving throw, being knocked prone on a failed save and becoming unable to mold Chakra for until the end of your next turn. They can remake the saving throw to remove this effect at the end of their turns</p>"
