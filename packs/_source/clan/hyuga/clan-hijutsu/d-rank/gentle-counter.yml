system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you must be gaining the benefits of the Gentle Fist Stance. You instantly
      react to an incoming attack. When you are damaged with a melee attack, you may roll 1d8 + Your Unarmed attack
      bonus. Reduce the damage you received by the result.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and reduce damage by an additional 2d8.</p>
