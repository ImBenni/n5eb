name: Palm Rotation
type: spell
img: systems/n5eb/assets/content/clans/hyuga.webp
system:
  description:
    value: >-
      <p>You spin at a violent speed, while releasing Chakra from every Chakra point on your body. Creating a dome of
      blue Chakra repelling most attacks. Until the start of your next turn you have a +4 Bonus to AC. If you are
      subject to a jutsu that requires you to make a Strength or Dexterity saving throw you make the save at advantage.
      Creatures who are within 5 feet of you when you cast this jutsu must succeed a Strength saving throw, taking 2d8
      Force damage and being pushed back 5 feet on a failed save.</p>
    chat: ''
