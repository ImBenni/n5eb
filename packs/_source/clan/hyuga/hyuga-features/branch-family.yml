system:
  description:
    value: >-
      <p>At first Level, choose which part of the Hyūga Family you reign from. This cannot be changed later
      on.</p><p></p><p>• <strong>Main House:</strong> The Head portion of the family considered the "royal" part of the
      clan overall. This Portion of the clan Focuses on the Hyūga clan's secret techniques. If you select this branch of
      the family, you will have access to the main house's Hyūga clan techniques. This is due to the fact, most main
      branch Hyuga's do not become ninjas or shinobi in the classical sense instead becoming staff in the Villages
      information council.</p><p><strong>• Side House:</strong> The guardian/protector portion of the Hyūga clan. They
      are generally made to be like servants to the main house while inside the Hyūga villa. While not given access to
      the entirety of the Hyūga clan's secret techniques, they have formulated their own advanced versions of the
      general gentle fist and 8 trigram techniques.</p>
