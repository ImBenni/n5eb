name: Gentle Fist Stance
type: feat
_id: 0xtmg0ap868qBs4b
img: icons/magic/lightning/fist-unarmed-strike-blue-green.webp
system:
  description:
    value: >-
      <p>The Gentle Fist is the premiere fighting style for the Hyūga clan. Starting at a young age, both main and side
      branch clansmen are trained in this art of Taijutsu. The primary focus is on injecting chakra into an opponent's
      chakra network disrupting the flow of a creature's chakra network. Beginning at 1st level, you can use Dexterity
      instead of Strength while in this stance, for the attack and damage rolls of unarmed strikes and Hyūga Clan
      Taijutsu attack rolls and Save DC's calculations.</p><p>Also, at 1st level your <strong>[Unarmed Damage]</strong>
      becomes a d6 and deals chakra damage. This becomes 2d6 at 7th level and a 3d6 at 11th level. When you deal chakra
      damage to a creature with 0 chakra, you instead deal an equal amount of force damage to their hit points.
      Alternatively, you can choose to deal bludgeoning damage to a creatures in this stance, if you do, your damage die
      is 1d6. You deal half damage to constructs and undead while in this stance. Starting at 3rd level, while in this
      stance, once per turn, when you would increase the cost of a hostile creatures jutsu, you may add 1d4 to the cost
      increase. This increases to 1d6 at 11th level and 1d8 at 18th. Beginning at 7th level if you deal Chakra damage
      with this stance and the target has 0 Chakra, you instead deal double force damage to the targets hit points.</p>
    chat: ''
