system:
  description:
    value: >-
      <h2>The Villages Strongest</h2><p>The Hyūga Clan is one of the four noble clans of Konoha as well as the strongest
      clan in the village. All members born into this clan possess the Byakugan, a bloodline trait that gives them
      extended fields of vision and the ability to see through solid objects and even the Chakra circulatory system,
      amongst other things. Members of this clan also possess an innate ability which allows them to excel Chakra from
      any of the tenketsu in their body. The Hyūga clan are descendants from the Ōtsutsuki clan, specifically from
      Hamura Ōtsutsuki's lineage. As a result, they are also distant cousins of the Uchiha, Senju, Uzumaki, and Kaguya
      clans. They are considered to be one of, if not currently, the most powerful clan in Konoha. Their fame and
      prowess stretch far and wide, leading others to both praise and covet their abilities.</p><p>The clan is separated
      into two parts: the main house and the branch house, a system that protects the secrets of the Byakugan from
      outsiders. The main house runs the family while the branch house protects it.</p><hr /><h3>Hyūga
      Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Wis, +1 Dex</p><p><strong>Speed</strong>:
      Your base walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>: Perception,
      Insight</p><p><strong>Dark Vision</strong>: Even without the power of a fully active Byakugan, you have Darkvision
      up to 30 feet.</p><p><strong>Hyūga Hijutsu</strong>: You know 1 additional Hyūga Clan DRank Jutsu, this does not
      count against your jutsu known.</p>
