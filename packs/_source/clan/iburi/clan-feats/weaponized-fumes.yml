system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Iburi Clan</p><p>You have become so adept at manipulating smoke that you are
      able to formulate the particles necessary in the air to create a weapon without spending much, if any, chakra. You
      gain the following benefits;</p><p>• Increase your Intelligence score by +1, up to the maximum of 20.</p><p>• You
      gain a special natural weapon known as Smoke Shot. This weapon counts a ranged weapon and cannot have seals. This
      weapon uses your Ninjutsu attack bonus and has a range of (30/60). On a hit, you deal 1dX fire damage, where X is
      equal to double your Intelligence modifier (Min. 1d4 / Max. 1d12)</p><p>• Select a damage type between
      Bludgeoning, Slashing, and Piercing. Your Smoke Shot weapon's damage now counts as the damage type you chose for
      the purpose of casting Bukijutsu that require a ranged weapon of a specific damage type.</p>
