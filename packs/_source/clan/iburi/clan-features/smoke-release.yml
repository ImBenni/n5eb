system:
  description:
    value: >-
      <p>The Iburi clan has a unique talent of manifesting Smoke Release, an augmentative release that improves the area
      of effect of fire, and its destructive capabilities. Starting at 7th level, when you cast a jutsu with the Fire
      Release Keyword, you can give affected creatures a -2 penalty to one saving throw against the jutsu or your
      Will-O-Wisps feature.</p><p>Beginning at 15th level, twice per long rest, when you deal Fire damage, you
      automatically blind all affected creatures until the end of each of their turns.</p>
