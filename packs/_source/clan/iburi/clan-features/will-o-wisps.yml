folder: ax8k8ePGcvZ5QK8c
name: Will-O-Wisps
type: feat
_id: 0sbIIKsDoFhBWgaP
img: systems/n5eb/assets/content/clans/iburi.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, your clan's kekkei genkai grants you unparalleled control over the smoke created by
      fire. When you target a creature with a jutsu with the Fire Release keyword that requires an attack roll, you can
      spread the smoke and cinders produced by the fire to creatures within 5 feet of the original target, excluding you
      and the target. Each creature that would be affected must make a Dexterity saving throw, taking half the damage
      dealt to the original target on a failed save, or none on a success.</p><p>The range of this effect increases to
      10 feet at 11th level. You can use this feature a number of times equal to half your proficiency bonus, rounded
      up, per long rest. At 15th level, this becomes your full proficiency bonus.</p>
    chat: ''
