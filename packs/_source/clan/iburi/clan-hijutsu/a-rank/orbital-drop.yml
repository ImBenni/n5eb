name: Orbital Drop
type: spell
img: systems/n5eb/assets/content/clans/iburi.webp
system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu, you must be benefitting from the Smoke Form hijutsu. You
      move up to your movement speed at a space within range and send yourself high into the air with a burst of smoke.
      Your body splits into 3 pillars of smoke that rise tangent to each other 200 feet into the air. As the smoke
      pillars rise, they are set on fire from the friction in the air. These pillars merge and reform into your body,
      and you begin hurling back down to earth like a missile</p><p>As you hit the ground, you create a massive
      explosion, annihilating creatures within a 120-foot sphere. Each creature within range must make a Dexterity
      saving throw, taking 10d10+10 Fire damage, gaining 3 ranks of Burned, and becoming blinded until the end of their
      next turn on a failed save. On a successful save, creatures take half damage and gain only 1 rank of Burned. If a
      creature possesses any ranks of Burned prior to being affected by this jutsu, this jutsu ignores any resistances
      and immunities to Fire damage the creature may have.</p><p>The area this jutsu effects permanently becomes
      difficult terrain, and as this jutsu concludes, your Smoke Form jutsu automatically ends.</p>
