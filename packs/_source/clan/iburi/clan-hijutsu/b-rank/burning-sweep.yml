name: Burning Sweep
type: spell
img: systems/n5eb/assets/content/clans/iburi.webp
system:
  description:
    value: >-
      <p>You aggressively slash the air in front of you, creating two large pillars far in front of you that generate a
      large gust of wind and ash. You then use smoke to levitate into the air, creating two more pillars in front of you
      at your sides, creating a 25-foot long, 65- foot wide, 30-foot high cube.</p><p>Creatures caught in the awesome
      forces of smoke and wind within this jutsu's range must make a Dexterity saving throw, as the pillars return to
      your arms and you expel the energy towards them all. Creatures that cannot be moved make this saving throw at
      advantage.</p><p>Creatures who fail their saving throw against this jutsu take 9d6+9 Fire damage and gain 1 rank
      of Burned. Creatures who fail their saving throw by 5 or more have the wind knocked out of them, reducing their
      movement speed to 0 until the end of their next turn.</p><p>If you are currently receiving the benefits of the
      Smoke Form hijutsu, creatures of Medium size or smaller make this jutsu's saving throw at disadvantage, and the
      damage increases by 1 step.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3, and the damage by 1 step (1d6&lt;1d8&lt;1d10&lt;1d12).</p>
