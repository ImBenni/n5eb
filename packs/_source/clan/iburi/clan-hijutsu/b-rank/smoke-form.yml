system:
  description:
    value: >-
      <p>You turn yourself and your clothes into smoke for the duration of this jutsu. You still appear mostly the same,
      however, smoke continues to perspire off your body and fall to the ground beneath you, like a reservoir. When you
      move, your body quickly shifts into smoke.</p><p>For the duration of this jutsu, you do not provoke attacks of
      opportunity when you move, and are able to pass through small gaps and cracks, large enough for air to get
      through. You are also immune to fall damage.</p><p>Your weapon attacks deal an additional die of fire damage, once
      per turn, and you gain immunity to fire damage, whilst also gaining vulnerability to Wind damage. Your AC
      increases by +1, and the Iburi Clan hijutsu you cast other than this one have their cost reduced by 2 (Min.
      1).</p>
