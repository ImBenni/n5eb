name: Smoke Aegis
type: spell
img: systems/n5eb/assets/content/clans/iburi.webp
system:
  description:
    value: >-
      <p>You see an ally within range begin to succumb to peril and quickly move to protect them. Select a creature you
      could reach with your full movement</p><p>You morph your body into smoke and manifest in the space your ally was
      in, your smoke form producing gusts that push them 5 feet behind you. If this jutsu was done in response to an
      attack roll, the attack automatically hits you and you raise both arms up and form a smoke barrier with 5d6
      temporary hit points. If this jutsu was used in response to a failed save, the creature you protected no longer
      suffers the effects of a failed save, and you roll the saving throw in their place at disadvantage, with a +2
      bonus to the saving throw result.</p><p>If you reduce the attacks damage to 0, or succeed the saving throw, you
      immediately counter with a melee Ninjutsu attack, dealing your unarmed damage in fire damage and knocking the
      creature back 15 feet on hit.</p><p>If you are currently receiving the benefits of the Smoke Form hijutsu, you can
      move to a creature within double your movement speed, your barrier gains 5d8+your Ninjutsu ability modifier in
      temporary hit points if it is an attack, or gain a +3 bonus to the saving throw.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the temporary hit points gained by 1
      die, or the save bonus by +1 (Pick one)</p>
    chat: ''
  source:
