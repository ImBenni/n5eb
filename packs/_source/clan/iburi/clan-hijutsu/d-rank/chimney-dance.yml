name: Chimney Dance
type: spell
img: systems/n5eb/assets/content/clans/iburi.webp
system:
  description:
    value: >-
      <p>Your feet begin to release small cinders which convert the air surrounding them into smoke which you use to
      propel your movement. For the duration, your movement speed increases by 10 feet and you gain an additional
      reaction per round. This reaction can only be used to take attacks of opportunity. Creatures provoke attacks of
      opportunity if they move in or out of 10 feet of you. If you hit with an attack of opportunity, you deal an extra
      1d8+1 of Fire damage.</p><p>If you are currently receiving the benefits of the Smoke Form jutsu, you make attacks
      of opportunity at advantage, and the bonus damage increases to a d10.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If cast to B-Rank or higher, increase the
      damage by 1d8+1 and you can use your movement speed to fly and can hover. If cast to S-Rank, increase the damage
      by 1d8+1 and you gain an extra reaction which you can only use to take an attack of opportunity.</p>
