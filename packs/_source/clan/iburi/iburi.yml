system:
  description:
    value: >-
      <h2>Born of Ash</h2><p>The Iburi Clan is a seclusive clan scattered all throughout the Land of Fire. Members of
      this clan possess a powerful kekkei genkai that allows them to transform themselves into smoke. In the past, this
      versatile ability proved to be a curse rather than a blessing, as it could not be controlled, causing some of the
      Iburi to be dispersed and killed in the winds. This burden, however, was resolved by one of the Leaf's legendary
      Sannin, granting the later generations mastery over their power.</p><hr /><h3>Iburi
      Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Int, +1 Con</p><p><strong>Speed</strong>:
      Your base walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>: Chakra Control,
      Survival</p><p><strong>Passive Affinity</strong>: You begin with the Fire release affinity.</p><p><strong>Fire
      Literacy</strong>: Your Ninjutsu ability score is counted as being +2 higher, for the purpose of casting jutsu of
      BRank or higher with the Fire Release Keyword through any ability score restrictions (SHB, pg.104).</p>
