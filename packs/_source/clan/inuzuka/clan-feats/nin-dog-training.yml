name: Nin-Dog Training
type: feat
img: systems/n5eb/assets/content/clans/inuzuka.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Inuzuka Clan</p><p>You Train with your Nin-Dog enhancing its potential and
      allowing it to last longer in a fight, you gain the following benefits:</p><p>• Increase both your Strength or
      Dexterity score by 1, to a maximum of 20. Increase any of your Nin-Dog's ability scores by 1, up to their
      associated ability score maximum for their level.</p><p>• Your Nin-Dog's Hit Point maximum increases by your
      level. Their hit point maximum is increased by +1 each time you would gain a level</p><p>• Your Nin-Dog can learn
      1 Inuzuka clan Hijutsu that you qualify for, without you needing to know it</p><p>• You and your Nin-Dog are
      always able to sense each other's location so long as you are both within 10 miles of each other</p>
