system:
  description:
    value: >-
      <p><strong>Beast Master:</strong> Starting at 1st level you have a canine companion raised and bred by the Inuzuka
      clan known as a <strong>Nin-Dog</strong>. Your Nin-Dog possesses the same statistics as a Dog/Wolf summon of
      D-Rank. When the Nin-Dog would reach levels 8, 12, 16 and 20 it would become the associated rank, gain 1 new
      Special feature of the appropriate rank and increase its Jutsu slots to the listed value. Your Nin-Dog mechanics
      are as follows;</p><ul><li><p>Shares your level</p></li><li><p>Proficient in all saving
      throws</p></li><li><p>Cannot learn jutsu like a Dog/Wolf summon, instead knowing all Inuzuka Clan Hijutsu you
      know.</p></li><li><p>Your Nin-Dogs <strong>Toughness</strong> is 10</p></li><li><p>You calculated your Nin-Dogs AC
      as follows: <strong>12+Half Nin-Dogs Level + Nin-Dogs Defensive Ability score.</strong></p></li><li><p>At levels
      4, 8, 12, 16 and 20 your Nin-Dog gains +8 ability score increases following its associated max ability score with
      its rank as seen in the Dog/Wolf summon table.</p></li><li><p>Your Nin-Dogs size begins as small, grows to medium
      when it reaches 8th level and grows to Large at 12th .</p></li><li><p>Your Nin-Dog regain half of their spent
      Jutsu Slots on a short rest and all of their spent slots on a long rest.</p></li><li><p>If your Nin-Dog spends all
      of its <strong>Jutsu Slots</strong>, it does not vanish or become unsummoned like a normal summoned
      creature.</p></li></ul>
