img: icons/creatures/abilities/fang-tooth-blood-red.webp
system:
  description:
    value: >-
      <p>Beginning at 11th level, you gain expertise on initiative checks. When you would roll for initiative, you or
      your Nin-Dog can cast an Inuzuka Clan jutsu as part of rolling for initiative, ignoring the Jutsu's listed casting
      time, but only one of you can do this. The jutsu cast cannot target an allied or hostile creature aside from you
      or your Nin-Dog. Finally at 18th level, when either you or your Nin-Dog casts an Inuzuka Clan jutsu and the other
      has not acted, the other can use their reaction to cast the same Inuzuka clan jutsu targeting the same
      creature.</p>
