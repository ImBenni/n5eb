system:
  description:
    value: "<p>As part of the requirements of this jutsu you must have the Four Legs Technique active or your Nin-Dog must have Beast-Human Clone active.\_<br />You or your nin-dog begin to spin at an accelerated rate attempting a spiraling body slam.\_<br />Move up to 30 feet into an adjacent space next to the target creature and make a melee Taijutsu attack against it, so long as you can see or smell it within range.\_<br />On a hit, you deal 2d6 slashing and 2d6 bludgeoning damage.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and damage by 1d6 for each damage type.</p>"
