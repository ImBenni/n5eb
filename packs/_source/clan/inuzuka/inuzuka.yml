system:
  description:
    value: >-
      <h2>The Most Loyal</h2><p>The Inuzuka Clan or Inuzuka Family is a family of shinobi in Konoha known for their use
      of ninja-dogs as fighting companions and are easily identified by the distinctive red fang markings on their
      cheeks. The members are given their own canine partner(s) when they reach a certain age. Thereafter, the shinobi
      and their dog(s) are practically inseparable. The shinobi and canine allies fight using Cooperation Ninjutsu,
      which takes advantage of their teamwork and their sharp claws and teeth. The clan members are also able to
      communicate with canines. The members of this clan, much like their canine partners, have greatly enhanced senses,
      especially their sense of smell</p><hr /><h3>Inuzuka Traits</h3><p><strong>Recommended Ability Score
      Increase</strong>: +2 Str or Dex, +1 Wis</p><p><strong>Speed</strong>: Your base walking speed is 35
      feet.</p><p><strong>Skill Proficiencies</strong>: Animal Handling, Acrobatics </p><p><strong>Extra
      Language</strong>: Dog-Speak, you can speak to &amp; understand canine creatures.</p><p><strong>Inuzuka
      Hijutsu</strong>: You Nin-Dog knows 1 Inuzuka Clan DRank Jutsu, that you do not need to add to your known jutsu
      list.</p>
