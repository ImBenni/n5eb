name: Guardian Spirit
type: feat
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Jiton Clan, Level 12+</p><p>The metal dust or sand you manipulate has
      seemingly gained a will of its own. The Absolute Defense, it guards your blind-spots and protects you from harm.
      You gain the following benefits;</p><p>• You have advantage on saving throws against effects that would move you
      against your will, and reduce the distance of any knock-back effects by half</p><p>• You gain a number of special
      reactions, you may use these reactions even when surprised, and they do not count as using your reaction for the
      round. You may use these features a number of times equal to your proficiency bonus per long rest. Using this
      feature while surprised expends two uses. </p><p>o When targeted by an attack roll, you can cause that attack to
      have disadvantage against you. </p><p>o When making a saving throw against an effect that would have a reduced
      effect on a successful save, you can roll 1d6 and add the result to your save. If you succeed, you instead take no
      damage and no additional effects.</p>
