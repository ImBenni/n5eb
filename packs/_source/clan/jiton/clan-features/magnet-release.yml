name: Magnet Release
type: feat
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: >-
      <p>The Jiton clan has a unique talent for manifesting Magnet Release due to their close affinity to both Earth and
      Wind Release. </p><p>Beginning at 7th level you gain the second Nature release you didn't select from Magnet
      Release Affinity clan trait. </p><p>Also, at 7th level, twice per turn, when casting a jutsu with either Earth or
      Wind Release keywords, you can change the damage type to earth and increase the damage die by 1 step, up to a
      maximum of D12. (D4&gt;D6&gt;D8&gt;D10&gt;D12).</p>
