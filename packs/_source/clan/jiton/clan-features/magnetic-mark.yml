name: Magnetic Mark
type: feat
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: >-
      <p>Using their abilities often, Jiton clan members develop a natural magnetic field that they can use offensively
      or defensively. </p><p>Beginning at 3rd level, when you would affect another creature with any of your Jiton clan
      Hijutsu, you mark that creature until the end of your next turn. While the creature is marked by you, you always
      know their location, and the creature cannot benefit from being hidden from you. </p><p>While the marked creature
      is within 60 feet of you, if another creature (including you) misses it with an attack made with a metal weapon,
      or the target succeeds on a saving throw against any Jiton clan Hijutsu, once per turn you can spend your reaction
      to allow the creature to reroll the attack roll, or force the target to reroll their saving throw</p><p>At 7th
      level, if a marked creature hits you or a creature you can see within 5 feet of you with an attack, you can spend
      your reaction to impose a 1d6 penalty to triggering creatures attack roll. If the attack still hits, the target
      gains resistance to the triggering attack's damage. </p><p>At 15th level, the penalty increases to 1d10.</p>
