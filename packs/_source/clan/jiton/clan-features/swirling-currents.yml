name: Swirling Currents
type: feat
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: >-
      <p>Also at 3rd level, your magnetic field constantly slows metal objects thrown or fired at you. You have
      resistance to bludgeoning, piercing, or slashing damage from ranged weapons (weapon and Taijutsu attacks). You
      select which one of these damage types each time you complete a long rest. </p><p>At 11th level, you have
      resistance to all three damage types from ranged weapons.</p><p>At 18th level, your magnetic field has grown
      strong enough that you have a natural resistance to all bludgeoning, piercing, or slashing damage.
      </p><p>Additionally, each time you complete a rest, select a damage type between wind or earth. You gain
      resistance to the chosen damage type until you complete a rest.</p>
