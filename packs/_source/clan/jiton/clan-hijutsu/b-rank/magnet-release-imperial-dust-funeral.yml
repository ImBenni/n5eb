name: Magnet Release Imperial Dust Funeral
type: spell
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: "<p>Using your magnetism, you summon a wall of dust particles of your description (Gold, Iron, Sand, Salt, Gravel) into existence at a point you choose within range. You can make the wall up to 250 feet long. 250 feet high, and 50 feet thick. The wall lasts for the duration.</p><p>When the wall appears, each creature within its area must make a strength saving throw. On a failed save, a creature takes 5d8 earth damage, or half as much damage on a successful save. At the start of each of your turns after the wall appears, the wall, along with any creatures in it, moves 50 feet away from you. Any Huge or smaller creature inside the wall or whose space the wall enters when it moves must succeed on a Strength saving throw or take 4d8 earth damage. A creature can take this damage only once per round.</p><p>At the end of the turn, the wall's height is reduced by 50 feet, and the damage creatures take from the jutsu on subsequent rounds is reduced by 1d8. When the wall reaches 0 feet in height, the jutsu ends. A creature caught in the wall can attempt to move within it, but every foot moved costs 3 feet of movement. Because of the force of the wave, the creature must make a successful Strength (Athletics) check against your ninjutsu save DC in order to move at all. If it fails the check, it can't move. A creature that moves out of the area falls to the ground.\_</p>"
