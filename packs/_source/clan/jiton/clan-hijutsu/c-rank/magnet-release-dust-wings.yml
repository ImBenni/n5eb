name: Magnet Release Dust Wings
type: spell
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: "<p>You form a mass of dust particle of your description (Gold, Iron, Sand, Salt, Gravel) on your back, forming massive wings of your design and description.</p><p>While this jutsu is active, you gain a flying speed of 30 feet, and can cover. Additionally, you can use an action to do one of the following;</p><p>Dust Feathers: You form dust particles from your wings of the same material into darts. Make a ranged ninjutsu attack against a target within 60 feet of you, that you can see. If the creature is marked with your Magnetic Mark feature, you can target them as if you can see them, even if you are blinded or in darkness and even ignoring full cover. On a hit, the target takes 2d8 piercing damage and 2d8 earth damage.</p><p>Dust Spear: You form your wings into a giant spear of dust. Make a ranged ninjutsu attack against a target within 30 feet of you that you can see. If the creature is marked with your Magnetic Mark feature, you can target them as if you can see them, even if you are blinded or in darkness and even ignoring full cover. On a hit, the target takes 4d8 piercing damage and 4d8 earth damage. Additionally, each creature within 10 feet of the target must make a Dexterity saving throw. On a failed save, a creature takes 4d8 bludgeoning damage and is pushed back 10 feet. On a success, a creature takes half as much damage and is not pushed back.</p><p>Using Dust Spear, uses all of the dust in your wings, ending this jutsu immediately after resolving its effects.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. When you use Dust Feathers, make an additional attack with it for every rank you casted this jutsu above C-Rank. When you use Dust Spear, increase the Piercing earth and bludgeoning damage by 1d8 each.\_</p>"
