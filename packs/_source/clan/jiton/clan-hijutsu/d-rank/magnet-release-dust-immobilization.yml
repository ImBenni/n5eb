name: Magnet Release Dust Immobilization
type: spell
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: >-
      <p>You touch an object that weighs no more than 10 pounds, and use dust of your description (Gold, Iron, Sand,
      Salt, Gravel) to create a chakra seal to affix it in place. You and the creatures you designate when you cast this
      jutsu, can move the object normally.</p><p>If the object is fixed in the air, it can hold up to 4000 pounds in
      weight. More weight causes the object to fall, otherwise, a creature can use an action to make a Strength
      (Athletics) check against your Ninjutsu save DC.</p><p>On a success the creature can move the object up to 10
      feet. If the object is more 20 feet or more from its original position, the seal breaks, ending this
      jutsu.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3. When you cast this jutsu at C-Rank, the DC to move the object increases by 5, it can carry up to 8000 pounds of
      weight, and the duration is increases to 24 hours. If you cast this jutsu at A-Rank or Higher, the DC to move the
      object increases by 10, it can carry up to 20,000 pounds of weight, and the duration becomes permanent until
      dispelled.</p><p></p>
