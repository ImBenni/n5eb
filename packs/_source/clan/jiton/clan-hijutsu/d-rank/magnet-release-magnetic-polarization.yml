name: Magnet Release Magnetic Polarization
type: spell
img: systems/n5eb/assets/content/clans/jiton.webp
system:
  description:
    value: "<p>You focus your magnetic chakra on a point within range. Your chakra then expands to fill a 20-foot cube from that point, magnetizing any objects and creatures within that area when you cast this jutsu. Each target must succeed on a constitution saving throw or become magnetized for the duration. Unattended objects automatically fail this saving throw. While Magnetized any attack rolls against the target has advantage if the attacker uses weapons made of metals and the affect targets have their speed, if any, reduced by 15 feet.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and increase the size of the cube by 10 feet.\_</p>"
