  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Jugo Clan, Level 12+</p><p>Your potency in your Enhanced Form is so overwhelming you can alter your body's size:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.\_</p><p><br />• While you are gaining the benefits of Raw Chakra Form, you become large sized, your reach increases by 5ft and your bulk limit is multiplied by 2.\_</p><p><br />• While you are gaining the benefits of Raw Chakra Form, the first time you take damage each turn, you reduce it by an amount equal to your Raw Chakra Die + Proficiency Bonus</p>"
