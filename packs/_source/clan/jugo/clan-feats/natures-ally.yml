name: Nature's Ally
type: feat
img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Jugo Clan</p><p>Your raw Chakra has connected you to the animal kingdom:</p><p></p><p>• Increase your Wisdom score by 1, to a maximum of 20.\_</p><p>• You can add Jutsu with the Medical keyword that restores hit points, grants temporary hit points, removes conditions, grants resistance/Immunity, grants damage reduction or grants bonuses (Ex. Such as to damage) your jutsu list.</p><p><br />• You have ability to communicate with animals and understand what they are saying.\_<br />Animals are inclined to be friendly towards you, and will often assist in helping you complete tasks.\_<br />Furthermore, you are able to cast the Beast Senses jutsu at no cost as if you knew it.</p>"
