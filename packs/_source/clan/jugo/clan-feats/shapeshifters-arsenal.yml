name: Shapeshifter's Arsenal
type: feat
img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Jugo Clan</p><p>You have learned to transform your arms into weapons to utilize in combat, freeing the need to wield any ever:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.\_</p><p><br />• As a bonus action, you can transform one or both of your arms into a melee weapon you are proficient in.\_<br />If the weapon is two-handed, you must use both your arms.\_</p><p><br />• Weapons made this way count as unarmed strikes for the purposes of the Jūgo Clan's abilities and jutsu</p><p></p><p>• By spending 2 Raw Chakra die, you may grant one of your weapon hands a melee weapon property it does not normally possess and increases its damage by the result until the end of your next turn.</p>"
