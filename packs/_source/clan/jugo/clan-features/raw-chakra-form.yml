system:
  description:
    value: >-
      <p>Starting at 3rd level, you can warp Raw Chakra to alter your body temporarily, allowing you to tap into a Raw,
      unfocused and untamed version of Sage Mode. </p><p>Your Raw Chakra Form turns your skin gray, and enhances your
      strength, speed, and durability. You may enter this form as an Action, twice per long rest, for up to 1 minute.
      You can transform an additional time per long rest at 11th and 18th levels. For its duration you gain the
      following benefits;</p><ul><li><p>When making a Strength Ability check or saving throw, add 1d4. This becomes a d6
      at 11th level.</p></li><li><p>As a part of transforming and entering your Raw Chakra Form, you gain Temporary hit
      points equal to twice your character level. Beginning at 7th level, when you transform you can spend Raw Chakra
      die to gain additional temporary hit points equal to twice the result. This cannot be done after
      transforming.</p></li><li><p>Your unarmed damage die becomes 1d8 unless already higher. If it is higher, increase
      the die size by 1 step. (1d10&gt;1d12). Also, your unarmed strikes are chakra enhanced.</p></li><li><p>Your Jutsu
      Clan Hijutsu lose any Hand sign (HS) component</p></li><li><p>Your speed increases by 5ft. This bonuses increases
      to 10ft at 7th, and 15ft at 15th</p></li><li><p>Beginning at 11th level, when initiative is rolled, by spending 1
      Raw Chakra die, you may transform immediately as a part of your initiative roll while adding the result to the
      initiative check. You do not gain this benefit while surprised</p></li><li><p>At 18th level, you cannot be moved
      by a hostile effect, by any means</p></li><li><p>At 18th level, you are immune to the Slowed, and weakened
      conditions</p></li></ul>
