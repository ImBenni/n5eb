img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: >-
      <p>Resting both your arms together, you transform them into a single, large chakra cannon. You cannot reduce this
      jutsu's cost by any means.</p><p>As part of casting this jutsu, you can choose to fire the cannon. The cannon
      shoots a beam in a 90ft cone that reduces a creatures Temporary Hit Points to 0, then deals 12d10 Force Damage. A
      successful saving throw halves their Temporary Hit Points and deals half damage instead.</p><p>After the initial
      casting, you are able to choose to maintain the cannon. If you do, you gain the following effects:</p><p>• Your
      Speed is set to 0.</p><p>• You gain 10 DR against all damage (excluding Psychic)</p><p>• You cannot be moved,
      knocked prone or stunned in any way.</p><p>• As a Full Turn on your turn, you may choose one of the two options
      below:</p><p>o You fire the cannon in the same spot. Every creature in range must succeed a Constitution Saving
      Throw or have their Temporary Hit Points reduced to 0 and take 12d10 Force Damage. A successful save halves their
      Temporary Hit Points and halves the damage taken.</p><p>o You re-aim the cannon, turning up to 90 degrees. Every
      creature caught within the beam as it moves (still a 90ft cone) must succeed a Dexterity Saving Throw or lose any
      Temporary Hit Points and take 6d10 Force Damage. A successful save halves their Temporary Hit Points and halves
      the damage taken.</p><p>At the start of each of your turns, you may choose to end this jutsu and de-form the
      cannon. You do not always have to fire the cannon each turn.</p><p>The concentration cost cannot be reduced or
      ignored by any means, but you only pay the concentration cost if you fire the cannon.</p><p>Raw Chakra Form: If
      you cast this jutsu within your</p><p>Raw Chakra Form, you can move 10ft each turn before or after
      firing.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by
      3, the range by 10 feet, and the damage by 2d10.</p>
