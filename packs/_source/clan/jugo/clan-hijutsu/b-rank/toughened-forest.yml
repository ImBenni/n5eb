name: Toughened Forest
type: spell
img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: >-
      <p>Hardening raw chakra over your body, your body grows thick scales. For the duration, your AC increases by +1
      and when you would take non-psychic damage, reduce it by 6. If you are wearing medium armor, you reduce
      non-psychic damage by 4 instead. If wearing heavy armor, you reduce non-psychic damage by 2 instead.</p><p>While
      you benefit from this jutsu, you have advantage on Constitution Saving Throws.</p><p>Raw Chakra Form: When you are
      in your Raw Chakra Form and benefiting from this jutsu, you do not spend Chakra to concentrate on it.</p><p>At
      Higher Ranks: For each rank above B-Rank you cast this jutsu, increase the cost by 3 and the Damage Reduction by
      3. If wearing medium armor, increase it by 2 instead. If wearing heavy armor, increase it by 1 instead</p>
