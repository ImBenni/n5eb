name: Warp Beam Reflection
type: spell
img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: >-
      <p>Aiming cannons from out of your chest, you attempt to produce so much fire-power you can push back an attack.
      When a creature makes a ninjutsu attack roll at you, by casting this jutsu you can propel it back. Make a ninjutsu
      attack roll. If your attack roll is higher than theirs, you are not hit by the attack, instead sending it back at
      them. The pushed back attack deals the full damage it would have and any other effects that the jutsu you
      reflected dealt. You must cast this jutsu before the creature makes its attack roll.</p><p>Raw Chakra Form: If you
      cast this justu within Raw Chakra Form, you have advantage on the Ninjutsu Attack Roll.</p>
