name: Chakra Cannon Overdrive
type: spell
img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: >-
      <p>Your usage of the Chakra Cannon has grown, allowing you to use it in more versatile ways. This jutsu has two
      alternative casting uses:</p><p>• As an Action, you may fire a 60ft line of energy from your arm, dealing 5d8
      Force Damage to every creature within range. Each creature within the area must succeed a Dexterity Saving Throw
      to half the damage.</p><p>• As part of making any melee attack, taijutsu attack or bukijutsu attack, you may
      instead cast this jutsu, which becomes the D-Rank Hijutsu, Chakra Cannon. If the attack you are replacing would
      gain any benefits to the Attack Roll, gain them. You do not gain any damage bonuses from the attack you
      replace.</p><p>Raw Chakra Form: If you cast this jutsu when within your Raw Chakra Form, add half your
      Constitution Modifier damage to the 60ft line.</p><p>At Higher Ranks: For each rank you cast this justu above
      C-Rank, increase the cost of this jutsu by 3, and the line effect damage by 2d8</p>
