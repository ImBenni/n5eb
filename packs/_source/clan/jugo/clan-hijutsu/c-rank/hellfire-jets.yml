name: Hellfire Jets
type: spell
img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: >-
      <p>As part of moving, you may cast this jutsu, forming jets at your back. Until the end of your turn, your speed
      increases by 20ft. Additionally, your Jump Distance and Height during this turn are multiplied by x4.</p><p>When
      you use Hellfire Jets, you may choose to float, not falling until the start of your next turn. You may float for
      two rounds this way before you automatically start to fall and must touch a surface with your legs to propel
      yourself again. You may also float to ignore the penalty to speed of Water and Climbing.</p><p>Raw Chakra Form: If
      you cast this Jutsu when within your Raw Chakra Form, until the start of your next turn, you reduce all Area of
      Effect damage by half your Strength Score, provided you can move.</p>
    chat: ''
