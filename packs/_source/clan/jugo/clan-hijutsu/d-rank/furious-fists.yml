name: Furious Fists
type: spell
img: systems/n5eb/assets/content/clans/jugo.webp
system:
  description:
    value: >-
      <p>You grow jets at the back of your elbows or ankles, enhancing unarmed attacks with the power of chakra
      thrusters. For the duration, melee unarmed/ weapon attacks, melee Taijutsu attacks or grapple attacks you make
      deal an additional 1d8 force damage, up to three times per turn.</p><p>Raw Chakra Form: When you are in your Raw
      Chakra Form and benefiting from this jutsu, you do not spend Chakra to concentrate on it.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost by 3. If this jutsu is cast at B-Rank or higher
      increase the damage by 1d8 and creatures you hit gain 1 rank of Bruised, once per creature per round. If this
      jutsu is cast at S-Rank you ignore resistance to bludgeoning damage, and treat immunity as resistance</p>
