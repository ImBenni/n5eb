  description:
    value: >-
      <h2>Monstrous Oppressors</h2><p>The Jugo clan does not hold many members due to their unique power and often, far
      more unique personalities. Those that find themselves gifted with this ability often lose themselves to madness
      and turn into raging monsters on the battlefield. Able to call on durability and health at a simple beckon call,
      these shinobi should not be taken lightly</p><hr /><h3>Jugo Traits</h3><p><strong>Recommended Ability</strong>
      Score Increase: +2 Str, +1 Con</p><p><strong>Speed</strong>: Your base walking speed is 35
      feet.</p><p><strong>Skill Proficiencies</strong>: Athletics, Acrobatics.</p><p><strong>Jugo Hijutsu</strong>: You
      know 1 additional Jugo Clan D-Rank Jutsu, this does not count against your Jutsu known.</p>
