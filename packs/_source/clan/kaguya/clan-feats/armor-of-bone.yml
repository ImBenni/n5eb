name: Armor Of Bone
type: feat
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Kaguya Clan</p><p>You've learned to use your clan techniques not to just create extensions of your body but to fortify your body itself:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.\_</p><p><br />• While you are gaining the benefits of the Dance of the Larch clan Hijutsu, you gain a bonus to your AC equal to half of your Constitution ability modifier. </p><p>• Once per turn, if you would cast Dance of the Willow while you are benefiting from this feats bonus to AC, you add the damage Dance of the Larch would do to your damage roll. </p><p>• max of 10 Skeletal slots in this way.</p>"
