name: Battle Hardened
type: feat
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Kaguya Clan, Level 4+</p><p>Through many battles, you have developed strategies to overwhelm your enemies with frightening accuracy.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Strength or Dexterity score by 1, to a maximum of 20.\_</p><p><br />• You can gain advantage on a Kaguya clan Hijutsu's attack if you are targeting a creature who has targeted you within the last round.\_<br />You can gain advantage in this way twice per rest.\_</p><p><br />• When you make a melee weapon attack against a creature where your attack result is 5 higher than the target AC, on a successful hit where you deal damage, you reduce the targets speed by half, until the end of their next turn.\_</p><p><br />• You have learned to maneuver in a way that increases your combat range.\_<br />All attacks made with your Bone Weapons gain the Reach property.\_<br />If the weapon already has the Reach property, it instead gains a second rank of Reach.</p>"
