name: Calcified Armory
type: feat
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Kaguya Clan, Level 4+</p><p>Your skeleton is perfection. Your bone is Art.
      You gain the following Benefits;</p><p>• Increase your Strength or Dexterity score by 1, to a maximum of
      20.</p><p>• Your skeleton is a work of art. So much so that you learn how to infuse Weapon or Armor seals directly
      on it with intense focus and training. You gain 4 Skeletal slots, which you can use to place purchased weapon or
      Armor seals directly on your Skeleton</p><p>o If Weapon seals, their effects apply to all Bone Weapons you
      create</p><p>o If Armor seals, any Armor bonuses is treated as flat bonuses to your AC. You cannot gain the
      benefit of Armor seals if you are wearing armor that has its own Armor seals.</p><p>• You can take this feat more
      than once. Each time you do, you gain +3 additional Skeletal slots. You can have a max of 10 Skeletal slots in
      this way</p>
