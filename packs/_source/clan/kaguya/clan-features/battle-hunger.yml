system:
  description:
    value: >-
      <p>The Kaguya clan are known for their bloodlust in battle constant battles have awakened this from within you.
      Beginning at 11th level, you have learned to tap into the lust for battle, blacking out your thoughts, entering a
      state of known to the Kaguya as your Lust for Battle. You remain in this state for 1 minute, until you are
      incapacitated, knocked unconscious, are calmed down in some other way or spend a bonus action to end this status.
      Once you use this feature, you cannot do so again until you finish a rest</p><img
