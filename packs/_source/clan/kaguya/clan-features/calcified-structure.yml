name: Calcified Structure
type: feat
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: >-
      <p>The Kaguya clan were known for their alien and almost foreign bone and body structure, making it exceedingly
      difficult to truly know how any Kaguya functioned as they were all unique and different in their own way.
      </p><p>Beginning at 3rd level, this unique trait materializes within you. Whenever you would make a saving throw
      against a hostile creature using a Jutsu with the Medical or Inhaled keywords you gain a +2 bonus to the result.
      This bonus is further increased to+4 at 11th. Beginning at 15th level When you would pass a saving throw vs a
      jutsu with the Medical or Inhaled keywords, you instead suffer no effects.</p>
    chat: ''
