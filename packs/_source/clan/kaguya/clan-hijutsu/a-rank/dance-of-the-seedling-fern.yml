name: Dance of The Seedling Fern
type: spell
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: >-
      <p>The perfected and final dance of the Kaguya clan. The Sixth and final dance is also the most devastating and
      deadly. By means of this technique you focus and empower your bones before sending them through the ground around
      you, expanding them and having them rise like trees in a forest. Creatures in range other than you, must make a
      Dexterity saving throw taking 11d8 Piercing damage on a failed save, or half as much on a successful
      one.</p><p>The bone forest remains for 1 minute after casting this jutsu. The bone pillars are 10 to 15 feet tall
      and occupy a portion of each space in range. Creatures moving within the affected area must spend 3 feet of
      movement for every 1 feet traveled (5 traveled costs 15 feet of speed). You can fuse into and teleport freely
      throughout the bone forest, up to twice per turn. Bone pillars have 45 hit points. If a bone pillar takes damage
      while you're inside, you take any remaining damage the bone pillar could not. At the end of the 1-minute duration
      after this jutsu was cast, the bones dissolve into clay like clumps.</p>
    chat: ''
