name: Dance of the Setsugekka
type: spell
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: >-
      <p>When you would strike a creature, you leave behind a small bone fragment inside of them that you then cause to
      grow and expand.</p><p>As a part of the same action used to cast another Kaguya clan Hijutsu that deals damage to
      a creature, you can cast this jutsu forcing them to make a Constitution saving throw. On a failed save you leave
      behind the bone fragment. On a success you are unable to leave it behind</p><p>A creature who failed their
      Constitution saving throw begins to experience their internal organs being stabbed by the growing bone mass,
      taking 3d8 Necrotic damage that ignore damage reduction</p><p>For the next minute the affected creature remakes
      this saving throw at the beginning of each of its turns taking 3d8 Necrotic damage on a failed save or no damage
      on a success.</p><p>A creature can attempt to dig out this fragmented bone from them by making a Strength
      (Medical) check vs your Taijutsu Save DC, forcibly removing it on a success. A creature can only be under the
      effects of this jutsu once at any given time.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3. If cast at A-Rank increase the damage by 1d8.</p>
