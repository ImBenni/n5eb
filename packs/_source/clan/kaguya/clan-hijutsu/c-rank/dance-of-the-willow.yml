system:
  description:
    value: >-
      <p>As a reaction to being hit you twirl, spin, and gracefully retaliate against your attacker. Make a melee
      taijutsu attack vs the triggering creature. On a hit you deal your [Weapons damage] + 1d8 and can move up to 10
      feet in any direction of your choice. At the conclusion of your attack as a result of this jutsu, you gain an
      additional reaction which can only be used to cast this jutsu</p><p>At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d8 for each hit.</p>
