name: Ten Finger Drilling Bullets
type: spell
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: >-
      <p>You clasp your hands together pointing your fingers in any direction of your choice firing them all at once
      with enough of a combined force to rip through even chakra barriers. You finger bullets like a shotgun burst in a
      30-foot cone originating from you. All creatures in range must make a Dexterity saving throw taking 6d4 piercing
      damage and gains 2 ranks of Bleeding on a failed save or half as much damage and no additional effects on a
      success.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by
      3 and damage by 2d4.</p>
