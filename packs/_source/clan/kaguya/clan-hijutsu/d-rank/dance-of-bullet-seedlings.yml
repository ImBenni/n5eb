name: Dance of Bullet Seedlings
type: spell
img: systems/n5eb/assets/content/clans/kaguya.webp
system:
  description:
    value: >-
      <p>You outstretch a free hand and fire off the bones in your fingers like bullets with enough force to tear
      through armor and flesh like paper. You fire a collection of bone bullets. You can select up to three creatures
      within range that you can see. Make a single ranged taijutsu attack, comparing the result against the selected
      creatures AC. On a hit, a target takes 5d4 Piercing damage.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 the damage by 2d4 and the number of creatures you can
      target by +1.</p>
