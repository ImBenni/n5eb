    value: >-
      <p>You extract bones to a greater degree, allowing them to stick out in a variety of positions, creating a
      makeshift lethal but protective armor. You gain 12 temporary hit points. If a creature hits you with a melee
      attack while you have these hit points, the creature takes 8 piercing damage that pierces DR.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the temporary hit
