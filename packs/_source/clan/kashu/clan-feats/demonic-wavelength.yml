  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Kashu Clan, Level 8+</p><p>You harness your dark chakra to enhance the power
      of your clan's Hijutsu. You gain the following benefits;</p><p>• Increase your Intelligence or Wisdom score by +1,
      to a maximum of 20</p><p>• When a jutsu you cast would benefit from your Reckless Genjutsu clan feature and
      requires an attack roll, you also increase the critical threat range by the same amount.</p><p>• If a jutsu you
      cast would benefit from your Reckless Genjutsu clan feature and doesn't require an attack roll, you may instead
      increase the bonus up to a maximum of 5 instead of 3.</p>
