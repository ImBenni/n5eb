system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Kashu Clan, Level 8+</p><p>Your Auditory Ninja Tool can now be used to
      further amplify you genjutsu. You gain the following benefits;</p><p>• Increase your Intelligence or Wisdom score
      by +1, to a maximum of 20</p><p>• When you would cast a jutsu that uses your Auditory Ninja Tool and requires an
      attack roll, you may spend 5 chakra as part of the same action to double the range.</p><p>• When you would cast a
      jutsu that uses your Auditory Ninja Tool that has an area of effect, you may spend 10 chakra as part of the same
      action to double the size of the area.</p>
