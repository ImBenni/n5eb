system:
  description:
    value: >-
      <p>Starting at 7th level, you gain a +1 bonus to your Genjutsu attack bonus when using Genjutsu with the Auditory
      keyword. This increases to +2 at 15th level.</p><p>Also at 7th level, when you would cast a Genjutsu that does not
      have the Auditory keyword, you can spend increments of 3 chakra to remove one sensory keyword from the genjutsu,
      excluding the tactile keyword. If you remove all other sensory keywords this way, the jutsu gains the Auditory
      keyword.</p>
