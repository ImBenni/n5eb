name: Demonic Instrument Trio Requiem
type: spell
img: systems/n5eb/assets/content/clans/kashu.webp
system:
  description:
    value: >-
      <p>You summon 1 of 3 legendary Doki to your aid. Doki can be controlled on your turn using your bonus action while
      equipped with your Auditory Ninja Tool.</p><p>As a Bonus action on your turn, you can dismiss all summoned Doki.
      If a Doki is reduced to 0 Hit Points it unsummons, and you cannot summon the same Doki until you complete a full
      rest. Additionally, you can not summon the same Doki more than once per long rest and you cannot have more than
      one of the same Doki summoned at a time.</p><p>While your Doki is within 5 feet of an ally, and that ally is
      targeted by an attack, you can use your reaction to command the Doki to interpose the attack, becoming its new
      target</p><p>Some Doki abilities may require a saving throw, in which case the DC is equal to your Ninjutsu or
      Genjutsu Save DC.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this
      jutsu by 5 and the number of Doki summoned by 1. You cannot summon more than 1 of the same Doki this way</p>
