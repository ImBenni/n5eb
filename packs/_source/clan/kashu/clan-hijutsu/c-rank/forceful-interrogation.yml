name: Forceful Interrogation
type: spell
img: systems/n5eb/assets/content/clans/kashu.webp
system:
  description:
    value: >-
      <p>You reach into the mind of your target, latching onto the most delicate parts of their brain speaking an
      incomprehensible language, compelling them to spill their cuts.</p><p>Select a creature in range, the target must
      make a Charisma saving throw, on a failed save, whenever they are asked a question, they must answer completely
      and truthfully, otherwise they take 7d4 psychic damage and gain 1 rank of disorientation</p><p>A creature under
      the effects of this Genjutsu remakes their saving throw each time they respond to a question. If the creature
      answers truthfully, they make the save at advantage. If they lie or refuse to answer, they instead make the save
      at disadvantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this
      jutsu by 3 and the damage by 2d4.</p>
