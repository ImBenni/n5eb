name: Demonic Instrument Amped Shot
type: spell
img: systems/n5eb/assets/content/clans/kashu.webp
system:
  description:
    value: >-
      <p>You focus your chakra into your Auditory Ninja Tool to unleash a powerful sound wave at an enemy. Make a ranged
      Genjutsu attack. On hit the target takes 3d8 + your Genjutsu ability modifier in psychic damage and must succeed a
      Wisdom saving throw or gain 1 rank of Disorientation</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3. If cast to C-Rank or higher, increase the damage die of this
      jutsu by 1 step, to a maximum of a d12. If cast to B-Rank or higher, increase the number of attacks made by +1. If
      cast to A-Rank or higher, increase the damage die of this jutsu by 1 step, to a maximum of a d12. If cast to
      S-Rank, increase the number of attacks made by +1.</p>
