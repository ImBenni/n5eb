name: Demonic Instrument Psychic Enhancement
type: spell
img: systems/n5eb/assets/content/clans/kashu.webp
system:
  description:
    value: >-
      <p>You enhance the power of your Auditory Ninja Tool by focusing your chakra through it, it resonates with a
      deadly tune. Attacks with your Auditory Ninja Tool use your Genjutsu ability modifier for attack rolls. Creatures
      hit by your Auditory Ninja Tool take 3d4 + your Genjutsu ability modifier psychic damage and, once per round, must
      make an Intelligence saving throw gaining 1 rank of Disorientation on a failed save.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage die by 1 step
      (d4&gt;d6&gt;d8&gt;d10&gt;d12). If cast to B-Rank or higher, this jutsu's duration becomes 10 min.</p>
