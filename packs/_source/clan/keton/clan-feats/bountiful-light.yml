name: Bountiful Light
type: feat
_id: BQT04L7ZmhEpQLyF
img: systems/n5eb/assets/content/clans/keton.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Keton Clan, Level 4+</p><p>You have discover how into imbue light into your
      jutsu. You gain the following benefits;</p><p>• Increase your Constitution or Intelligence score by 1, to a
      maximum of 20.</p><p>• When you cast a jutsu with the Fire or Lightning Release keyword that creates an area of
      effect such as a line or cone, you may use one usage of your Enlightening Grasp feature. If you do so than your
      jutsu gains the following effect;</p><p>o "The center of your Jutsu becomes a source of bright light in a 20-foot
      radius and dim light for an additional 20 feet for 1 minute. The light can be colored as you like."</p><p>• Light
      created by your Enlightening Grasp feature now lasts up to 1 hour. If you spend 5 chakra the duration is increased
      to 12 hours</p><p>• You can now dismiss any source of light created by you as a free action. When you dismiss a
      source of light you gain an Energy Die</p>
