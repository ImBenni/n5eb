system:
  description:
    value: >-
      <p>Beginning at 1st level, you gain the ability to use your clan's kekkei genkai to produce light in any object
      you touch. As an action, you can place your palm on an object no larger than10 feet in any dimension. For the next
      10 minutes, the object sheds bright light in a20-foot radius and dim light for an additional 20 feet. The light
      can be colored as you like. If the object is completely covered in something opaque, the light is
      blocked</p><p>You can spend 5 chakra to increase the duration of this feature on an object effected from 10
      minutes to1 hour. You can dismiss the light from as many objects you have affected with this feature as an action.
      If you target an object being held or worn by a hostile creature, the creature must succeed a Dexterity saving
      throw vs. your Ninjutsu Save DC to avoid this feature</p><p>You can use this feature a number of times equal to
      your proficiency bonus per short rest. Alternatively, you can spend 5 chakra (no action required) to gain an
      additional number of uses equal to half your proficiency bonus</p>
