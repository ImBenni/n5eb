system:
  description:
    value: >-
      <p>The Keton clan has a unique talent for manifesting Plasma Release due to their close affinity to Fire Release
      and Lightning Release. Starting at 7th level, you gain the second nature release you didn't choose from the Plasma
      Release Affinity clan trait</p><p>Also at 7th level, when casting a jutsu with the Fire or Lightning Release
      keywords, you can change the damage type to fire damage. When casting a Keton Clan Hijutsu, you can reduce the
      cost of the jutsu by 2 (Min. 1).</p>
