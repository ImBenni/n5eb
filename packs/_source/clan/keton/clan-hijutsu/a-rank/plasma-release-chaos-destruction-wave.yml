name: Plasma release Chaos Destruction Wave
type: spell
img: systems/n5eb/assets/content/clans/keton.webp
system:
  description:
    value: >-
      <p>You cusp both hands, charging an orb of growing plasma before finally releasing it in a 120- footlong,
      10-foot-wide line of destruction. All creatures within range must make a Dexterity saving throw, taking 9d10+9
      lightning Damage on a failed save or half on a success. A creature with the burned condition makes this saving
      throw at disadvantage.</p><p>Creatures who fail their Dexterity saving throw must make a Constitution saving throw
      at disadvantage, becoming burned, and becoming stunned the end of their next turn on a failed save.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3, and increase
      the damage by 3d10+3.</p>
