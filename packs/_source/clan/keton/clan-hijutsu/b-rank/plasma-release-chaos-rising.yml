name: Plasma Release Chaos Rising
type: spell
img: systems/n5eb/assets/content/clans/keton.webp
system:
  description:
    value: >-
      <p>(This jutsu cannot score a critical hit.) You send plasma chakra into your limbs and prepare an assault on a
      target. Make 3 melee ninjutsu attacks on a target creature, dealing 3d8+3 fire damage and knocking them 10 feet
      into the air on each hit (You rise with the creature). If you hit with 2 or more attacks, the creature becomes
      Shocked until the end of their next turn. If you hit with all 3 attacks, the creature becomes burned for the same
      duration.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu
      by 3. If cast to S-Rank, increase the damage by 1d8+1.</p>
