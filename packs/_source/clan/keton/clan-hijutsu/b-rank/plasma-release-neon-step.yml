name: Plasma Release Neon Step
type: spell
img: systems/n5eb/assets/content/clans/keton.webp
system:
  description:
    value: >-
      <p>You transform your entire body into Neon. Your movement speed is doubled, ranged attacks have disadvantage to
      hit you, and you may use your reaction to teleport to a source of bright light if that source of light is within a
      range equal or less than your movement speed away from you. Doing this causes this jutsu to end and the light
      source to dissipate.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost by
      3. If this jutsu is cast to A-Rank or higher, using the special reaction granted by this jutsu no longer
      automatically ends it the first time you use this reaction per casting. If this jutsu is cast to S-Rank, your
      movement speed is instead tripled.</p>
    chat: ''
