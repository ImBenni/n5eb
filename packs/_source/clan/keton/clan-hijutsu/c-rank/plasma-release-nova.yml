    description: >-
      <p><strong>Max Ranks</strong>: 5</p><hr /><p>A Shocked creature’s nervous system has been flooded with
      electricity, causing muscle spasms and brain fog.</p><ul><li><p>A <strong>Shocked</strong> creature who takes a
      reaction, takes 1d6 Lightning damage, for each rank it has, once per turn.</p></li><li><p>A
      <strong>Shocked</strong> creature who takes a Reaction to cast a jutsu must first make a DC 8 Flat check. On a
      failure, they double the cost of the jutsu. For rank of shocked beyond the first, increase this DC by +1 (Max DC
      12).</p></li><li><p>A creature resistant to Lightning damage makes their flat check at advantage and also has
      resistance to this condition. A creature immune to Lightning damage has immunity to this
      condition.</p></li><li><p>A creature can spend an Action to make a DC 15 Constitution (Survival) Check to ground
