name: Plasma Release Nova
type: spell
img: systems/n5eb/assets/content/clans/keton.webp
system:
  description:
    value: >-
      <p>You create an orb of Plasma chakra in your hands before throwing it at a point centered in range. This orb then
      erupts into an explosion of plasma. All creatures within 30 feet of the target location must make a Dexterity
      Saving Throw, taking 4d10+4 lighting damage and gaining 1 rank of shocked or burned (caster's choice) on a failed
      save, or half damage and no effects on a success.</p><p>Following the explosion, the center of the explosion is a
      source of bright light in a 30-foot radius and dim light for an additional 30 feet for 1 minute. The light can be
      colored as you like.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3 and the damage by 2d10. If this jutsu is cast at A rank or higher, creatures who fail the saving
      throw are affected by both conditions</p>
