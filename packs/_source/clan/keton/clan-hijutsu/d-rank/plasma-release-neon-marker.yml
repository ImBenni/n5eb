name: Plasma Release Neon Marker
type: spell
img: systems/n5eb/assets/content/clans/keton.webp
system:
  description:
    value: >-
      <p>You cover your hand with neon lightning up the area around you, before quickly striking a creature within
      range. Make a Melee Ninjutsu Attack against a creature within range. On a hit, the target takes 3d6+3 lightning
      damage and the target creature sheds bright light in a 20-foot radius and dim light for an additional 20 feet for
      1d4 rounds. The light can be colored as you like</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3, the damage by 2d6+2 and die which determines the number of rounds
      the target is lit increases by 1 step. (1d4&gt;1d6&gt; 1d8&gt;1d10&gt;1d12)</p>
