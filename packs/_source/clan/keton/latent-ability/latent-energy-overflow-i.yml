name: Latent Energy Overflow I
type: feat
_id: hokv4ALjoJPudP4q
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, each time you would take damage that is not self-inflicted or cast a jutsu with the
      Fire or Lightning Release keywords, you gain an Energy Die at the start of your next turn, which are d4s. Whenever
      you cast a jutsu with the Fire or Lightning Release keywords, you can spend any number of Energy Die, adding it to
      the damage roll. When you use Energy Die this way, your jutsu creates dim light for a number of feet equal to the
      distance your jutsu traveled, until the end of the turn. You can hold a maximum amount of Energy Die equal to half
      your proficiency bonus, rounded down.</p>
