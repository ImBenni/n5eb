img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, as an action, you can place your palm on an object, that's not being held or worn by a
      hostile creature, no larger than 10 feet in any dimension. For the next 10 minutes, the object sheds bright light
      in a 10-foot radius and dim light for an additional 10 feet. You can spend 5 chakra to increase the duration of
      this feature on an object effected from 10 minutes to 1 hour. You can dismiss the light from as many objects you
      have affected as an action. You can use this feature a number of times equal to half your proficiency bonus per
      long rest.</p>
    chat: ''
