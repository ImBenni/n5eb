img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Konjiki Clan, Level 4+, You cannot have the Corroded Steel feat.</p><p>You
      have learned how utilize the Earth Release portion of your unique Steel Release to its full potential, allowing
      your enhanced and forged weapons to innately gain the benefits of seals. You gain the following benefits;</p><p>•
      Increase your Dexterity or Intelligence score by 1, to a maximum of 20.</p><p>• You gain proficiency in Crafting
      and Weaponsmith kits, gaining +1 ranks of Mastery if already proficient.</p><p>• All Konjiki Hijutsu gain the
      Bukijutsu keyword.</p><p>• When first select this feat, select two D-Rank and one C-Rank Weapon Seals. Weapons you
      enhance or make with Steel Release, gain the benefits of these seals, not counting against their Seal Slots. You
      cannot stack seals of the same name/type. You can change your selected seals on a full rest.</p>
