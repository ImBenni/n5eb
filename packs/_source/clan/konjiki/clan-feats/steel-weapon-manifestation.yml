name: Steel Weapon Manifestation
type: feat
_id: LgflQaEEKm10Z7ux
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Konjiki Clan</p><p>You have trained to improve the strength of your Yin
      chakra to form and enhance your weapons with steel release. You gain the following benefits;</p><p>• Increase your
      Dexterity or Intelligence score by 1, to a maximum of 20</p><p>• You gain proficiency in Martial Weapons and the
      Martial Arts skill</p><p>• As a bonus action, you can manifest any weapon you are proficient in, forming it out of
      steel. Weapons you create this way impose disadvantage on checks made to disarm you or break the weapon.
      Alternatively, you can select one weapon you are currently wielding and enforce it with steel. A weapon enforced
      with steel gains all of the aforementioned benefits, and a +1 to attack and damage rolls. Weapons created last for
      1 hour. Weapons enforced remain as such for 1 minute.</p><p>• Bukijutsu you cast using a weapon you have created
      out of steel, or that is enforced with steel, can benefit from Konjiki features that would provide a bonus to
      attack, temporary hit points, AC, or DR</p>
