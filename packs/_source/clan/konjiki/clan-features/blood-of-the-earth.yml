system:
  description:
    value: >-
      <p>Beginning at 3rd level, when you are wearing Light or Medium Armor you can use Intelligence in place of
      Dexterity for your Armor Class and you ignore difficult terrain while you are on land, always being able to sense
      the best possible path to take to navigate out of a less than optimal situation.</p><p>At 11th level, while you
      are on land you gain a tremor sense of 60 feet.</p>
