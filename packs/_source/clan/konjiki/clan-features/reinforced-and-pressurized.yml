system:
  description:
    value: >-
      <p>Beginning at level 11th level, you can enhance constructs made from your chakra, when you cast a jutsu with the
      earth release keyword that creates a construct or gives Temporal Hit Points, the construct or the target creature
      gains an additional amount of Temp Hit Points or Hit Points equal to your Character Level. Additionally,
      constructs created with the Earth Release keyword lose any vulnerabilities or inability to defend against
      Lightning Release or Genjutsu. Starting at 18th level you instead add twice your character level to the hit points
      or temporary hit points gained.</p>
