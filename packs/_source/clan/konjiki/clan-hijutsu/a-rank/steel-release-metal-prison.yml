name: Steel Release Metal Prison
type: spell
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>You constrict and bind a creature with metal, choose one creature in range, they must make a Strength saving
      throw, being Restrained by the metal prison. While restrained this way, the creature has full cover, and if they
      attempt to cast a jutsu with the HS component, they must succeed a Ninshou check at disadvantage against your
      Ninjutsu Save DC or else the jutsu fails to be cast and the chakra is wasted. The metal prison has an AC equal to
      your Ninjutsu Save DC and 120 Hit Points. The metal prison is resistant to all damage excluding lightning damage.
      A creature can attempt to remake the Strength Saving throw at the end of each of their turns to end being
      restrained.</p><p>Each time a creature fails the Strength saving throw the DC increases by 1 to a max of +5</p>
