name: Steel Release Steel Suit
type: spell
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>You wrap a thin sheet of metal around your body to greatly increase your defensive capabilities. You cannot
      lose concentration on this jutsu as a result of damage. For the duration of this Jutsu you gain 10d10 Temp hit
      points. These Temporary Hit points reduce any damage taken by -5 excluding lightning damage.</p><p>Also, while you
      have temporary Hit Points granted by this jutsu you are counted as an Earthen Construct and deal +2d10 additional
      damage on all unarmed and melee weapon attacks, twice per turn. When the temporary Hit Points provided by this
      jutsu reach 0 the jutsu ends</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3 and the temporary hit points by 1d10.</p>
