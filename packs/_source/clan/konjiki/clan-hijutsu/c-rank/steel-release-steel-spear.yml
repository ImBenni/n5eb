      ninjutsu attack, dealing 6d8 [X] damage.</p><p>If you score a critical hit with this jutsu's attack roll, the
      steel spear splinters and explodes, tripling the damage dice, instead of doubling them.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage by 2d8, and this
