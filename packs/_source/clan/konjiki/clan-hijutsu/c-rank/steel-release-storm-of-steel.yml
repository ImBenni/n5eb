name: Steel Release Storm of Steel
type: spell
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>You create a massive quantity of steel weapons above you in a 30-foot radius. All hostile creatures that start
      their turn or enter this area for the first time on their turn must make one of the following saving throws based
      on your selected damage type between Bludgeoning, Piercing, or Slashing damage with your Weapon Formation feature.
      On a successful saving throw, creatures take half damage and no effects.</p><p>• Bludgeoning (Constitution): On a
      failure, creatures take 4d10 bludgeoning damage and are Dazed</p><p>• Piercing (Strength): On a failure, creatures
      take 6d6 piercing damage and are grappled for the duration</p><p>• Slashing (Dexterity): On a failure, creatures
      take 5d8 slashing damage and are Lacerated.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d10/1d6/1d8 respectively</p>
