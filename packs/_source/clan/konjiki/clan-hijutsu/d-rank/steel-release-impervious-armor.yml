name: Steel Release Impervious Armor
type: spell
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>You quickly turn your skin into a steel-like material before suffering a hostile effect. For the duration, you
      gain resistance to the triggering damage and gain 1d6+your Ninjutsu ability modifier in temporary hit points.
      These temporary hit points do not protect you from Lightning damage. You also gain advantage on Strength and
      Constitution saving throws for the duration.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the temporary hit points gained by 2d6.</p>
