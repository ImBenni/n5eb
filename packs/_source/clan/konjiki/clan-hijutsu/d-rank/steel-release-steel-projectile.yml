system:
  description:
    value: >-
      <p>You create an object made of steel and launch it at high speed towards a target within range, make a ranged
      ninjutsu attack, dealing 3d10 + your Ninjutsu ability modifier in [X] damage on hit and reducing the result of
      their next saving throw by 1d4.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3. If cast to B-Rank or higher, increase the number of attacks made by +1. If cast to
      S-Rank, increase the number of attacks made by +1. The saving throw reduction does not stack.</p>
