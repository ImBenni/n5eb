system:
  description:
    value: >-
      <p>You manifest numerous thrown weapons such as Shuriken or Kunai at a point within 60 feet and unleash all of
      them upon all targets within a 15-foot sphere. All creatures within range must make a Dexterity saving throw,
      taking 3d8 [X] damage and gaining one rank of a specified condition on a failed saving throw, or half damage and
      no effects on a successful saving throw. The condition gained depends on the damage type of this jutsu
      (Bludgeoning/Earth=Bruised, Slashing=Bleeding, Piercing=Weakened).</p><p>At Higher Ranks: For each rank for each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 2d8.</p>
