name: Illusory Focus
type: feat
img: systems/n5eb/assets/content/clans/kurama.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Kurama Clan, Level 4+</p><p>YYou have trained yourself to the point where
      you can concentrate on genjutsu almost subconsciously. You gain the following benefits.</p><p><br />• Increase
      your Wisdom or Charisma score by 1, to a maximum of 20.</p><p>• When you make a Constitution (Chakra Control)
      check to maintain concentration on a Genjutsu, add your Genjutsu Resistance bonus to the check.</p><p>• You can
      concentrate on up to 3 Genjutsu of C-Rank or lower at once. If you are concentrating on any Jutsu that isn't a
      Genjutsu of C-Rank or lower, you can only concentrate on 2 jutsu as normal.</p>
