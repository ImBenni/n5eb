name: Onijutsu
type: feat
img: systems/n5eb/assets/content/clans/kurama.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level you learn how to manipulate your Genjutsu using the Kurama clans secret Kekkei Genkai
      known as Onijutsu. Born once every 10 generations, the Kurama's Onijutsu manifests in the form of Onijutsu Coils.
      These Coils are proof of the Kurama's ability to bend fiction into truth. You have a number of Coils equal to your
      Level, per Long Rest. You know two of the following Onijutsu of your choice. You gain another one at 7th, 11th,
      and 18th Levels. When casting a Genjutsu you may spend 1 Coil or 5 Chakra to use the listed Onijutsu. You can use
      up to two Onijutsu at once with any Genjutsu
      casting.</p><ul><li><p>@UUID[Compendium.n5eb.clan.Item.t77Nwcbt1Jh0x4N4]{Careful Onijutsu}: When you cast a
      Genjutsu that forces creatures to make a saving throw, you can protect some of those creatures from the Genjutsu's
      effects. Select up to 3 creatures, each creature selected becomes immune to the Genjutsu's effects for its
      duration.</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.tbQmeMenT8uxDHUs]{Punishing Onijutsu}: When your target
      rolls a save against a Genjutsu that you cast, you manifest the illusion into one with more weight by forcing the
      target to roll an additional d20, using the lowest result of all d20
      results.</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.xWItrkVDvcvpFRgs]{Infectious Onijutsu}: When a creature
      would take damage from a Genjutsu you cast, you can spread the pain. Select one creature you can see within 15
      feet of the target, forcing them to make an Intelligence saving throw vs your Genjutsu save DC dealing half of the
      listed damage on a failed saving
      throw.</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.9pO67Bzw7M8Xpmi1]{Overwhelming Onijutsu}: When a creature
      would critically fail a saving throw for a Genjutsu you cast, you treat the Genjutsu cast as if you had upcasted
      it by 1 rank. If they would fail by 10 or more you treat the Genjutsu cast as if you had upcasted it by 2 ranks,
      ignoring rank limitations.</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.lRgmKj8kMcXtawzR]{Quickened Onijutsu}:
      When you cast a Genjutsu with the casting time of 1 action, you can change the casting time to 1 bonus action for
      this casting.</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.QAcskN7OY4d3EyrU]{Subtle Onijutsu}: When you cast a
      Genjutsu you can cast it without handseals or Chakra seal
      components</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.zAUPL1gSiunc3urW]{Tenacious Onijutsu}: When a creature
      would attempt to dispel or interrupt a genjutsu that you are casting or have casted they reduce their check made
      to accomplish the task by 1d6</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.yKDuzUvgoE7pKWc4]{Authoritative
      Onijutsu}: When you would cast a Genjutsu with a sensory keyword that a target would be immune to, you ignore
      their immunity affecting them anyway</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.EIBJCAvqLrscqreJ]{Cursed
      Onijutsu}: When you would cast a Genjutsu that requires a saving throw, you can select a another Genjutsu of
      D-Rank or lower that you know. If the target of the Genjutsu fails, they suffer the effects of the second genjutsu
      as if they failed the save even if they critically failed their original
      save.</p></li><li><p>@UUID[Compendium.n5eb.clan.Item.g48aU3CZ1qqbvJJD]{Elemental Onijutsu}: When a creature would
      take damage from a Genjutsu you cast, you can choose to change the damage type to any one of the following; Earth,
      Wind, Fire, Cold, Lightning, Acid, Poison or Necrotic.</p></li></ul>
    chat: ''
