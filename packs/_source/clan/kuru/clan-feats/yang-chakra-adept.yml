  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Kuru Clan, Level 8+</p><p>You have begun to master the other half of your
      Yin/Yang Release. You gain the following benefits</p><p>• Increase your Constitution score by 1, to a maximum of
      20.</p><p>• Taijutsu and Bukijutsu you cast pierces half of a creatures Jutsu based damage reduction</p><p>• By
      spending 1 Hit die when you would make a concentration check, Taijutsu and Bukijutsu you concentrate on cannot be
      ended as a result of failing that concentration check.</p>
