name: Yin Chakra Mastery
type: feat
img: systems/n5eb/assets/content/clans/kuru.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Kuru Clan</p><p>You've mastered the imitation of nature release jutsu with your Yin Chakra.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Constitution or Wisdom score by 1, to a maximum of 20</p><p></p><p>• Choose one of the 5 nature releases: Earth, Wind, Fire, Water, Lightning.\_<br />You can add jutsu of the corresponding Keyword to your jutsu list.\_<br />However, when you do so, the jutsu loses the nature release keyword, gaining the Yin Release keyword.\_</p><p><br />• Ninjutsu with the Yin Release keyword deals necrotic damage in place of any damage types they list.\_<br />Any effects that would trigger based on the jutsu's original damage types still trigger.\_</p><p><br />• Ninjutsu with the Yin Release keyword are treated as Kuru clan Hijutsu, for the purpose of interacting with Kuru clan features.</p>"
