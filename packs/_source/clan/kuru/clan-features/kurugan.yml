name: Kurugan
type: feat
img: systems/n5eb/assets/content/clans/kuru.webp
system:
  description:
    value: >-
      <p>The Kurugan is known as the Eyes that see through fate. This dojutsu has the ability to peer into the future
      ever so slightly but only from the user's point of view. Beginning at 3rd level, you can activate this renowned
      dojutsu for 10 minutes as a Bonus action.</p><p>For the duration of your Kurugan you gain a +1 bonus to your
      Wisdom Saving throws. This bonus increases to +2 at 11th level and +3 at 15th level. You lose this bonus when you
      are Blinded.</p><p>Also, when you would make a Charisma based skill check, you gain a bonus equal to half of your
      Wisdom modifier as you can foresee a creatures' intentions. You can also discern the exact age of objects,
      structures, and materials.</p><p>You can use the following Kuru Clan Features a number of times equal to your
      proficiency bonus, per long rest.</p><ul><li><p>@UUID[Compendium.n5eb.clan.Item.HlqT01BT23m7R4mV]{Action}: You
      peer fully into the future calling out the events to your allies just before it happens. You and a number of
      allies who can hear you gain a +2 bonus to their AC and on the next saving throw they make before the beginning of
      your next turn. Beginning at 7th level, your allies can use your foresight to aid their offensive attacks gaining
      a +4 bonus to their first attack roll before the beginning of your next turn.</p></li><li><p>Bonus Action: You
      peer partially into the future while still maintaining partial awareness on the present. Add your Wisdom modifier
      to your next attack roll before the end of the current turn.</p></li><li><p>Reaction: You glance into the future
      to give yourself enough information to make the right move to reduce the chance of suffering a debilitating
      effect. you gain advantage on all saving throws until the start of your next turn. Beginning at 7th level, you can
      instead choose to gain a +5 bonus to AC, until the beginning of your next turn. Beginning at 18th level you can
      foresee the worst future and react to prevent it. The next hostile attack or effect would reduce your hit points
      to 0 is avoided as you gain immunity to the attack or effect until the end of the current
      turn.</p></li></ul><p>Beginning at 7th level, when you activate your Kurugan you can spend an additional 10 chakra
      as part of the activation. If you do you also activate the Pierce the Veil Kuru Clan jutsu as a part of the same
      action used to activate the Kurugan</p>
    chat: ''
