name: Unfettered Foresight
type: spell
img: systems/n5eb/assets/content/clans/kuru.webp
system:
  description:
    value: "<p>(As a part of the casting of this Jutsu you must have the Kurugan active.) You release all limiters on your Kurugan, allowing you to freely see all possible events pertaining to you, filtering through thousands of possible futures.</p><p>For the duration of your Kurugan, you cannot be surprised by anything, your skill checks &amp; saving throws have advantage. All other hostile creatures have disadvantage on attack rolls against you for the duration.</p><p>You always know what time it is, and the exact moment a minor event will happen, such as a bell ringing, or someone's name being called in your vicinity. Additionally, you can, as an action touch one creature you can reach, and peer into their immediate future, casting Sealing Art: Divination Technique at no cost ignoring the HS, CM, CS components, allowing you to see their future.</p><p>If you have Pierce the Veil active, your Kurugan features have no use limit for the duration. At the conclusion of this jutsu, you expend all uses of your Kurugan features until you complete a long rest.\_</p>"
    chat: ''
  source:
