name: Dark Rift
type: spell
img: systems/n5eb/assets/content/clans/kuru.webp
system:
  description:
    value: >-
      <p>You attempt to send one creature that you can see within range into a pocket dimension made entirely of
      imaginary chakra. The target must make a Charisma saving throw. On a failed save, the targets consciousness is
      banished into a dimension of fiction seeing only what you want them to see. Their body is left behind as it
      becomes Stunned for the duration and is treated as a vegetable until their consciousness returns. If a creature
      affected by this jutsu is classified as an Elite or Solo they make their saving throw at advantage.</p><p>A
      creature who fails this saving throw, while unaware of what is happening to their body, if they would take damage
      they remake their saving throw for each instance of damage taken.</p><p>If the targets mind must remain there for
      the entire duration of the jutsu, when they return, their mind suffers a shocks from the shift of illusion back to
      reality taking 10d10 psychic damage</p>
