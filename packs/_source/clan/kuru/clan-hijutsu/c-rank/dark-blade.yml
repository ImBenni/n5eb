system:
  description:
    value: "<p>Your entire arm erupts into black shadowy chakra that extends into a shadowy blade. This chakra sword lasts until the Jutsu ends. It counts as a simple melee weapon with which you are proficient. It deals 3d8 necrotic damage on a hit and has the finesse, light, and thrown properties (range 20/60). In addition, when you use the weapon to attack a target in dim light or darkness, you make the attack roll with advantage.</p><p>If you drop the weapon or throw it, it dissipates at the end of the turn. Thereafter, while the jutsu persists, you can use a bonus action to cause the weapon to reappear covering your hand.\_</p>"
