  description:
    value: "<p>Dark chakra washes over a creature you strike, draining vitality from it.\_<br />Make a melee ninjutsu attack dealing 4d10 necrotic damage.\_<br />If the target creature has Temporary hit points you first drain all temporary hit points they have, gaining them as temporary hit points for yourself.\_<br />Then, you gain hit points equal to half the necrotic damage dealt.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d10.</p>"
