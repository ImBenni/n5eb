system:
  description:
    value: >-
      <p>A line of spiraling black chakra 60 feet long and 5 feet wide emanates from you in a direction you choose. Each
      creature in range must make a Charisma saving throw. On a failed save, creatures take 4d8 Necrotic damage and gain
      1 rank of Concussed as they begin to rapidly age and revert back to their normal age suffering shock, or half as
      much damage on a pass.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3 and damage by 2d8.</p>
