name: Dark Isolation
type: spell
img: systems/n5eb/assets/content/clans/kuru.webp
system:
  description:
    value: "<p>As part of the activation of this jutsu, you must have the Kurugan class feature active.\_<br />Using the abilities granted by your Kurugan, you begin to summon a tangible manifestation of loneliness to cloak the target, dragging it into a void of pure isolation.\_<br />Select one creature you can see within range.\_<br />All creatures allied to the target within 60 of it, must make a Wisdom saving throw.\_</p><p><br />Success:</p><p>Affected creatures resist this jutsu's effects, being able to see their ally</p><p></p><p>Failure:</p><p>Creatures allied to the target can no longer see them.\_<br />They are still aware they are present, but are unable to interact with them.\_</p><p><br />Critical Failure:</p><p>Same as failure, but they forget the target exists for the duration.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1</p>"
