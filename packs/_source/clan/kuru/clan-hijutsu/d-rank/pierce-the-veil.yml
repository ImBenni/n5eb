name: Pierce The Veil
type: spell
img: systems/n5eb/assets/content/clans/kuru.webp
system:
  description:
    value: >-
      <p>As part of the activation of this jutsu, you must have the Kurugan class feature active. Also, you cannot lose
      concentration on this jutsu as a result of failing a concentration check. By focusing your chakra into your eyes,
      you are able to pierce the veil far more accurately. For your Kurugan's duration, you gain the following
      benefits;</p><p>• You can calculate your AC with Wisdom instead of Dex</p><p>• When you use your bonus action
      Kurugan feature, the target of your next attack roll, cannot gain the benefits of a Reaction that grants them a
      bonus to AC.</p><p>• By spending 1 minute focusing, you can immediately cast Sealing Art: Divination Technique at
      half of its listed cost ignoring the HS, CM, CS components. Additionally, you can cast Sealing Art: Divination
      Technique in this way twice per casting of this jutsu ignoring the limitation of seeing into the future as listed
      in the jutsu itself, once per long rest.</p>
    chat: ''
