name: Spiraling Dark Wall
type: spell
img: systems/n5eb/assets/content/clans/kuru.webp
system:
  description:
    value: >-
      <p>A Spiraling wall of black chakra appears to protect you. Until the start of your next turn, you gain a +3 bonus
      to AC and 8 DR (damage reduction) including against the triggering attack.</p><p>Also, you gain immunity to
      Psychic damage vs Genjutsu with the Visual, Auditory and/or Tactical keywords. This doesn't affect Genjutsu with
      Inhale.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3 and DR by +4.</p>
