system:
  description:
    value: >-
      <h2>The Wolf's Curse</h2><p>The Kuru Clan is a Custom Homebrew Clan, created by Kingsare4ever. The Kuru Clan also
      known as the Shadow Clan, or the Dark Clan were seen as an influential family of Monks, prophets and fortune
      tellers from the Land of Wolves. After migrating south through the rest of the Shinobi world, their offspring
      began to pick up the ways of Ninshou and ninjutsu.</p><p>The Kuru Clan have access to a very powerful Dojutsu
      known as the Kurugan, the Eyes that See through Darkness. This Dojutsu carries the unique trait of limited
      foresight on a creature or object that they can see. They also learned how to harness the properties of Yin Chakra
      to a great effect allowing them to mold their chakra into almost any shape and even grant it different properties
      usually reserved for Nature release techniques without having to learn the appropriate Nature Release.</p><hr
      /><h3>Kuru Traits</h3><p><strong>Ability Score Increase</strong>: +2 Wis, +1 Con</p><p><strong>Speed</strong>:
      Your base walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>: Insight, Chakra
      Control</p><p><strong>Tool Proficiencies</strong>: You are proficient with Forensic kits</p>
