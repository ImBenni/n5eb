name: Speed Blitz
type: feat
_id: 0ovRekS7kotZrbvN
img: icons/magic/lightning/bolt-strike-sparks-yellow.webp
system:
  description:
    value: >-
      <p>After intense training you learn to use your speed to grant you additional techniques. You gain the following
      Benefits;</p><p> • You gain the following Supernatural Speed Options. </p><p>o Soaring Rush: When you roll
      initiative, you can spend any number of Speed Die, adding the result to your Initiative. If you are the first to
      go in initiative as a result of this, you have advantage on the first attack roll you make.</p><p> o Reflexive
      Assault: As a reaction at the end of your turn, you can spend 3 Speed Dice to gain an additional action. Doing
      this more than once per long rest, increases your exhaustion by 1 rank.</p><p>o One with the Wind: After casting a
      Jutsu with the Wind Release keyword, you can spend 1 speed die increasing your speed by 5 times the result until
      the end of the current turn, you also ignore all difficult terrain until the end of the current turn.</p>
