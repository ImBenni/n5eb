  description:
    value: >-
      <p>When you would move, you instead choose a location you can see within your movement speed range. Spend one
      Speed Die, you teleport to the desired location. If you were to make a melee weapon attack against a creature
      within 5 feet of you, you roll 1d8, adding the result to your attack roll.</p>
