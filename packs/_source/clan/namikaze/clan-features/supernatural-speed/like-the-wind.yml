system:
  description:
    value: >-
      <p>When you would deal Wind damage to a creature as a result of casting a Jutsu with the Lightning or Wind Release
      Keywords, you may spend a Speed Die, increasing the damage dealt by the result, and as a part of the same action
      used to cast the jutsu, you teleport behind the target and gaining a bonus to your next attack roll against the
      same target equal to the result of your roll.</p>
