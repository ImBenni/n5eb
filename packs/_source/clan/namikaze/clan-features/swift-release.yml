system:
  description:
    value: >-
      <p>The Namikaze clan has a unique talent for manifesting Swift Release due to their close affinity to both Wind
      and Lightning Release. </p><p>Beginning at 7th level you gain the second Nature release you didn't select from
      <strong>Swift Release Affinity</strong> clan trait. When casting a jutsu with either Lightning or Wind Release
      keywords, you can change the damage type to Wind. </p><p>Also, at 7th level, twice per turn, when you would deal
      Wind damage, you add your proficiency bonus to the damage roll.</p>
