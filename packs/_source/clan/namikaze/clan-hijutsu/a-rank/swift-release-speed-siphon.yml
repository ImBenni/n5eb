name: Swift Release Speed Siphon
type: spell
img: systems/n5eb/assets/content/clans/namikaze.webp
system:
  description:
    value: "<p>Your mastery of Swift Release allows you to remove speed from one creature within range.\_<br />Select a creature you can see within range.\_<br />You begin to attempt to drain them of their movement and speed.\_<br />Target creature, at the beginning of each of their turns, must make a Constitution saving throw.\_<br />On a failed save, they gain 2 ranks of Weakened and Slowed.\_<br />While the target is slowed or weakened in this way, the target cannot gain bonuses to speed by any means.\_<br />The target also has disadvantage on all attack rolls, skill checks and saving throws except Constitution skill checks and saving throws, as its speed, reaction time, and movement ability to being taken away.\_<br />Finally, if a target tries to cast a jutsu, it must first make a Constitution saving throw.\_<br />On a failed save the target fails the jutsu's casting, and the Chakra is wasted as if they cast the jutsu.\_<br />A target suffering from this speed siphoning make a constitution saving throw at the end of each of its turns.\_<br />On a successful save, they remove 1 rank of the Slowed or Weakened conditions, of their choice.\_<br />The target gains an additional application of the slowed or weakened condition each time it fails its saving throw.</p>"
