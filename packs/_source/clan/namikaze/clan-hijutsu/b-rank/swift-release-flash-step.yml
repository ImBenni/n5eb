name: Swift Release Flash Step
type: spell
img: systems/n5eb/assets/content/clans/namikaze.webp
system:
  description:
    value: "<p>You focus your chakra into your legs, granting you an immeasurable amount of speed, leaving the view of all until you're prepared for your next move. You cannot lose Concentration on this Jutsu as a result of damage. Roll a d20 at the end of each of your turns for the duration of the jutsu. On a roll of 11 or higher, you vanish from your current location, moving at hyper speed. At the start of your next turn, and when the jutsu ends if you are still running, you return to an unoccupied space of your choice that you can see within 10 feet of the space you vanished from. If no unoccupied space is available within that range, you appear in the nearest unoccupied space chosen at random. You can dismiss this jutsu as an Action.</p><p>\_While moving at hyper speed, your chakra flow to your senses are lightly restricted. You can only see shades of gray, and you can't see anything more than 60 feet away from the space you vanished. You can't affect anything while in this state either.</p>"
