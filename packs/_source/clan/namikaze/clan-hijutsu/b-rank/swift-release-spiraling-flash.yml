name: Swift Release Spiraling Flash
type: spell
img: systems/n5eb/assets/content/clans/namikaze.webp
system:
  description:
    value: "<p>You can briefly become faster than the eye can see as you go to strike a selection of targets.\_<br />Select a number of creatures within range, up to an amount equal to your proficiency bonus.\_<br />Make a melee Ninjutsu attack against each target.\_<br />On a hit, a target takes 7d8 Wind damage.\_<br />For every successful attack you make, you gain a +1 bonus to your next Saving throw or skill check, up to a maximum of +5, until the end of your next turn.\_<br />Additionally, after all attacks have been made, you can then teleport to an unoccupied space you can see within 5 feet of one of the targets you hit or missed.</p>"
