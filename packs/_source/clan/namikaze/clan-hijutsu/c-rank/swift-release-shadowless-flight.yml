system:
  description:
    value: >-
      <p>You imbue yourself with incredible speed, enhancing your physical form. Until the start of your next turn, once
      per turn, you can make an additional weapon or unarmed attack when you use your action to make at least one
      Taijutsu, weapon or unarmed attack. This additional attack ignores resistances, and if it is made against a target
      that used a Taijutsu or made a weapon attack as part of its last turn, you have advantage on the attack roll.
      Additionally, while this jutsu is active, you impose disadvantage on melee attacks against you.</p>
