name: Swift Release Thunder Flash
type: spell
img: systems/n5eb/assets/content/clans/namikaze.webp
system:
  description:
    value: "<p>You focus Chakra into your legs and rush forward with explosive power.\_<br />As a part of casting this jutsu, you move to the last unoccupied space in a 30-foot long, 10-foot-wide line from your starting position.\_<br />This movement does not provoke opportunity attacks.\_<br />Each creature you pass through during this movement must make a Dexterity saving throw, taking 6d6 Wind damage on a failed save, and half as much on a successful one.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage by 2d6 the distance you move by 10 feet.</p>"
