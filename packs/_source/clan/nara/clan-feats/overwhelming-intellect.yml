name: Overwhelming Intellect
type: feat
img: systems/n5eb/assets/content/clans/nara.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Nara Clan, Level 8+</p><p>You mind is so potent; your thoughts alone include ways to supersede those around you.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Intelligence score by 1, to a maximum of 20.\_</p><p><br />• Once per Long Rest, you can recover a use of your Coordinate clan feature by completing a short rest. </p><p>• You can now spend a use of your Master Tactician clan feature to give one allied creature a Tactical Die as a Bonus action, on your turn. When you do, they can choose to add it to any one; Attack roll, Saving throw, Skill/Ability check of their choice. An allied creature can retain this Tactical Die until either the end of Initiative, or 1 minute has passed, whichever comes first. </p><p>• You can spend a use of your Genius Potential clan feature to take any one Skill-Action, that costs an Action, as a Bonus Action</p>"
