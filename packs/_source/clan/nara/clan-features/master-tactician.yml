img: icons/magic/sonic/bell-alarm-red-purple.webp
system:
  description:
    value: >-
      <p>Descendants of the Nara Clan are unusually tactical. They are able to offer guidance both inside and outside of
      battle using their amazing wit and cleverness. </p><p>Beginning, at 3rd level, you can provide a Tactical Die
      (D4), to any ally that fails an attack roll, saving throw or skill/ability check, that you can see within 60 feet
      of you, as a reaction. When you do, they roll the die and add the result to their failed attack, save or
      skill/ability check. You can use this clan feature a number of times equal to your proficiency bonus per long
      rest. </p><p>At 11th Level, the die becomes a d6 and at 18th level a d8.</p>
