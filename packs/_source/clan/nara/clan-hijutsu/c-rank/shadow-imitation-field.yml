name: Shadow Imitation Field
type: spell
img: systems/n5eb/assets/content/clans/nara.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the Shadow Possession Jutsu. You expand your shadow in
      a 20-foot radius circle centering from you capturing all creatures within it who are on the same surface as you.
      All Creatures in the radius upon activation, must make a Strength saving throw, being restrained and being unable
      to take actions on a failed save for the duration. On an affected creatures turn, they can make a Strength saving
      throw to break free from this jutsu, ending its effect on them.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the radius by 5ft.</p>
