name: Shadow Sewing Needle
type: spell
img: systems/n5eb/assets/content/clans/nara.webp
system:
  description:
    value: "<p>As part of the requirements of this jutsu, you must know the Shadow Possession Jutsu.\_<br />You materialize your shadow but splinter and sharpen them into needle-like spikes.\_<br />You create 5 needle-like threads of shadow.\_<br />Make a single ranged ninjutsu attack against up to 5 target creatures within range, once each.\_<br />On a hit, you deal 2d6 piercing damage.\_<br />You can choose to send more than one tendril towards a single creature.\_<br />If you do, increase the damage of your attack by 1d6 for each additional tendril targeting them.\_<br />Regardless of the number of tendrils targeting a single creature, you only ever make a single ranged ninjutsu attack per creature targeted.\_<br />On a successful hit, affected creatures must make a Strength saving throw.\_<br />For every two tendrils targeting the same creature, increase the initial save DC by +1.\_<br />On a failed save they fall under the effects of the Shadow Possession Nara Clan Jutsu.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of tendrils by 1.</p>"
