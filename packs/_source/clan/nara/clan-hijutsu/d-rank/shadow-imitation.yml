  description:
    value: "<p>As part of the requirements of this jutsu, you must know the Shadow Possession Jutsu. You manipulate your shadow and stretch it outwards, attempting to fuse your shadow with a willing creature. As a reaction, you grant the target creature your shadow is attached to a +2 to their AC and an advantage on Dexterity saving throws until the end of the current turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the AC Bonus by +1.\_</p>"
