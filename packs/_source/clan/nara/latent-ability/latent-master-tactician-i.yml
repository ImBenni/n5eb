  description:
    value: >-
      <p>Beginning at 7th level, once per turn, as a bonus action, you can provide one allied creature a tactical die
      (D4). They can use this die and add it to any one attack roll, skill check or saving throw. This die lasts for 1
      hour and an ally can only have one tactical die at a time. You can provide tactical die in this way twice per long
      rest.</p>
