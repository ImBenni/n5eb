system:
  description:
    value: >-
      <p>This Nindo is one of resilience. When you would fail a saving throw from a hostile source that would reduce you
      to half your maximum hit points or less, you can choose to automatically succeed instead. If you do, you instead
      suffer no damage or effects that would normally be inflicted on a success. You cannot gain the benefits of this
      feature more than once per Short or Long Rest.</p>
