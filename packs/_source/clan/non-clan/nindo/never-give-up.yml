system:
  description:
    value: >-
      <p>This Nindo is one of perseverance. The first time you are reduced to 0 Hit points by a hostile creature, you
      are instead reduced to 1 Hit point. You cannot go below this 1 hit point until the end of your next turn. When you
      fall unconscious or enter the dying condition, you roll your Death saving throws at advantage. You cannot gain the
      benefits of this feature more than once per rest.</p>
