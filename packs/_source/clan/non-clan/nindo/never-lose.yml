system:
  description:
    value: >-
      <p>This Nindo is one of power. When you would lose a clash with a hostile creature, you can choose to reroll your
      check at advantage. If you win using this reroll, you increase the damage of your jutsu by +X damage die, where X
      equals half your proficiency bonus, if it deals damage. If you still fail, you do not suffer from the effects of
      losing a clash check, but you cannot gain the benefit of this feature until you complete a rest.</p>
