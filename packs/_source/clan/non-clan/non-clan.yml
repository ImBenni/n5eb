  description:
    value: >-
      <h2>Limitless Potential</h2><p>Those who are a part of no bloodline or large recognized family are known as
      Non-Clanners or Non-Clan for short. They are the most numerous of the Naruto World and are the primary people who
      end up creating new clans and families for generations to come. They show the most potential and have the largest
      room for growth. They don't have many limitations in regards to what's expected of them so they have the freedom
      to try new things and build an identity unique to themselves.</p><hr /><h3>Non-Clan
      Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 to any Ability Score, +1 to any other
      Ability Score not selected previously (or +1 to any 3 Ability Scores.).</p><p><strong>Speed</strong>: Your base
      walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>: Pick any 2 Skills to gain proficiency
      in.</p><p><strong>General Literacy</strong>: You reduce the ability score requirement to learn and cast all jutsu
      by 2. For Ability score requirements, check the SHB, pg.121).</p><p><strong>Unremarkable Legacy</strong>: You
      cannot take Feats with the Clan Category, under any circumstances.</p><p></p>
