name: Storming Waves
type: feat
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Ranton Clan, Level 4+</p><p>You learn to more masterfully control the Water half of Water Release.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Dexterity or Intelligence score by 1, to a maximum of 20.</p><p>• Ninjutsu you cast with the Water Release keyword are exponentially more conductive. Once per casting, a creature with the Chilled condition takes additional lightning damage equal to your proficiency bonus when they would take lightning damage.</p><p>• Ninjutsu you cast with the Water Release keyword are passively charged with storm release chakra. Once per turn, when you would cast a jutsu with the keyword, you can spend 1 Chakra die. When you do, you increase the damage die by 1 step (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p>"
