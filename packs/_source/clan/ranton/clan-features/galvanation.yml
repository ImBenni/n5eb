system:
  description:
    value: >-
      <p>At 11th level, you can evolve a creatures shocked condition to a new level, called Galvanized. When a creature
      with 5 ranks of the shocked condition would gain another rank of the shocked condition, they instead become
      Galvanized. A Galvanized creature suffers the following effects.</p><ul><li><p>A Galvanized creature loses all
      ranks of the shocked condition, is counted as Shocked 5 for the purposes of interacting with features, traits and
      jutsu and cannot gain ranks of shocked condition while they are Galvanized.</p></li><li><p>A Galvanized creature
      takes 5d6 Lightning when they would take a Reaction.</p></li><li><p>A Galvanized creature cannot cast jutsu with
      the Mobility (M) component.</p></li><li><p>The Galvanized condition lasts for 1 minute.</p></li></ul>
