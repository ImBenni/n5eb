name: Shocking Storm
type: feat
img: icons/magic/lightning/bolts-salvo-clouds-sky.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, when you would cast a jutsu with the Water release keyword, you may supercharge it with
      lightning once per turn. </p><p>By spending 3 chakra, you may increase the Save DC of the jutsu by +1, change the
      damage to lightning damage (or retain the jutsu's original damage type if you wish), and on a failed save,
      creatures gain 1 rank of Shocked.</p>
