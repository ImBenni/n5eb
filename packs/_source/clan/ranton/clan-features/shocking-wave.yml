system:
  description:
    value: >-
      <p>Also, at 1st level, Hijutsu you cast that deals lightning damage to a creature currently under the effects of
      the chilled condition takes +1 lightning damage for each rank of chilled that creature has.<br />Beginning at 11th
      level, this bonus damage increases to +2. Beginning at 18th level, this bonus damage increases to +3.</p>
