system:
  description:
    value: >-
      <p>The Ranton clan has a unique talent for manifesting Storm Release due to their close affinity to both Water and
      Lightning Release. </p><p>Beginning at 7th level you gain the second Nature release you didn't select from
      <em><strong>Storm Release Affinity</strong></em> clan trait. </p><p>Also, at 7th level, once per turn, when
      casting a jutsu with either Water or Lightning Release keyword, you can change the damage type to Lightning and
      increase the damage by +2 damage dice. This increases to +3 dice at 18th level.</p>
