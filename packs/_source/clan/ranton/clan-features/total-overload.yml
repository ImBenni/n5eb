name: Total Overload
type: feat
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: >-
      <p>Beginning at 7th level, your lightning is able to pierce through even the strongest of defenses, and your water
      is able to be utilized with upmost efficiency. When you would deal lightning damage, you ignore resistance and
      treat immunity as resistance. When you would cast a jutsu with the Water Release keyword near a sufficient source
      of water, gain both benefits the jutsu could receive for being near a sufficient source of water. </p><p>At 18th
      level, you completely ignore immunity to Lightning damage, and once per turn when you deal damage with a jutsu
      with the Water Release keyword, the target must succeed a Constitution saving throw or become shocked for 1
      minute</p>
