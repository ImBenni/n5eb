system:
  description:
    value: "<p>Beginning at 1st level, you hail from one of two different styles of Storm Release.\_<br />Either Storm Style, or Laser Style.\_<br />Storm style utilizes Lightning Charged Water to create powerful shocking tides, while laser style prioritizes the fluid properties of Water to create beams of Lightning.\_<br />Select between either <strong>Storm Style\_</strong>or <strong>Laser Style</strong><br />Once chosen, this cannot be changed later.\_</p><p>Your chosen style grants you access to different Ranton Clan Hijutsu and some unique Ranton Clan features with the corresponding style keyword as follows:</p><ul><li><p><strong>Storm Style</strong>:</p><ul><li><p><strong>Shocking Wave</strong>: Beginning at 1st level, Hijutsu you cast that deals Lightning damage gains a +10 foot bonus to range. At 11th level, this range increases becomes a +20 feet and if the jutsu possesses an area of effect, such as a line, cone, or radius, its area is increased by 10 feet in all directions.</p></li><li><p><strong>Shocking Storm</strong>: Beginning at 3rd level, when you would cast a jutsu with the Water Release keyword, you may supercharge it with lightning once per turn. By spending 3 chakra, you may increase the Save DC of the jutsu by +1, change the damage to lightning damage (or retain the jutsu's original damage type if you wish), and on a failed save, creatures gain 1 rank of Shocked.</p></li></ul></li><li><p><strong>Laser Style</strong>:</p><ul><li><p><strong>Pervasive Lightning</strong>: Beginning at 1st level, Ranton Hijutsu you cast that requires you to make an attack, gains a +1 bonus to hit against a creature with ranks of shocked, twice per casting. This bonus increases to +2 at 11th level.</p></li><li><p><strong>Pervasive Jolts</strong>: Beginning at 3rd level, when you would cast a jutsu with the Lightning Release keyword, you may reduce the cost by 2, if you are near a sufficient source of Water</p></li></ul></li></ul>"
