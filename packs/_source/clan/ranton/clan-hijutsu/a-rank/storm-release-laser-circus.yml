system:
  description:
    value: >-
      <p>Laser Style</p><p>You Fire an absurd amount of Lightning beams towards up to 10 targets of your choice. You
      make a ranged ninjutsu attack per creature, against your selected target(s) within range. You can direct any
      number of these beams towards a single target or many, up to the number of beams you fire (Still making a single
      attack roll per creature). On a hit, you deal 1d12 per beam directed at a target, plus your Ninjutsu ability
      modifier. These beams ignore cover.</p>
