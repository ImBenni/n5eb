name: Storm Release Raging Wave
type: spell
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: "<p>Storm Style</p><p>An advanced version of Water Release: Maelstrom, you expel an enormous amount of Water from your mouth, simultaneously charging it with Lightning, and making it swirl in a 30-foot radius around you.\_<br />Until the jutsu ends, this area is difficult terrain for any creature except you, and any creature that starts its turn there or moves there for the first time on their turn must succeed on a Strength saving throw.\_<br />On a failed save, a creature takes 7d10 Lightning damage and is pushed 15 feet away from the center of the area.\_<br />On a successful save, a creature takes half as much damage, and is only pushed 5 feet away.\_<br />Additionally, a creature that starts its turn in the area or moves there for the first time on their turn must also succeed on a Constitution saving throw, gaining 3 ranks of shocked and 1 rank of weakened on a failed save.</p>"
