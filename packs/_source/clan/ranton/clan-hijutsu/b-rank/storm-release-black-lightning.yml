name: Storm Release Black Lightning
type: spell
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: >-
      <p>You manifest a surge of black lightning chakra from your body, boosting your storm release to new heights. This
      jutsu's effects change depending on your chosen Style with the Twin Style Clan Feature. You do not need to spend
      chakra to maintain concentration of this jutsu.</p><p>• Storm Style: Your Lightning Release takes on a black color
      as an aura of black electricity surrounds you. For the duration, when you deal lightning damage or cast a jutsu
      with the Lightning Release keyword, you may spend 3 chakra to grant the following benefits;</p><p>o +1 bonus to
      Save DC.</p><p>o +2d6 bonus to damage, up to two times per casting. If the target is Shocked, this bonus becomes
      +2d8. o Grant the Lightning Release jutsu the benefits of any Overcharge effects it may possess.</p><p>• Laser
      Style: You form a blade of water and violently mash both your Lightning and Water Release chakra natures to create
      a black blade of electrified lightning known as the Laser Blade. This weapon counts as any melee weapon of your
      choice that you are proficient in (choose which weapon upon casting), gaining the weapon's properties and the
      following benefits;</p><p>o Weapon attacks made with the Laser Blade count as Ninjutsu attacks for the purpose of
      interacting with features, and may use your Ninjutsu ability modifier for attack and damage rolls.</p><p>o The
      weapon's damage die is replaced with 3d8 lightning damage. If used as a component in a Bukijutsu, after your
      weapon's damage is dealt the first time in the Bukijutsu's casting, it is lowered to 2d8 for the rest of the
      casting.</p><p>o If you hit a hostile creature wielding a non- chakra enhanced weapon that is benefitting from a
      bonus to AC from a feature, jutsu, or trait that requires this weapon, you slice right through their weapon,
      destroying it.</p>
