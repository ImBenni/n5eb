name: Storm Release Lightning Splash
type: spell
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: >-
      <p>Storm Style</p><p>You throw a bubble of Lightning at a point you can see within range. The bubble explodes
      filling a 25-foot cube. Creatures within range, must succeed a Constitution saving throw, taking 4d8 Lightning
      damage and being shocked on a failed save or half as much damage on a successful one and no additional
      effects.</p><p>Creatures who take damage from this jutsu that already have ranks of shocked increases the damage
      they take by 1 die step.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, and damage by 2d8.</p>
