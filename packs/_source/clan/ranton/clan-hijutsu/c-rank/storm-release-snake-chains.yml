name: Storm Release Snake Chains
type: spell
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: >-
      <p>Select one target creature you can see within range as snakes made of Water &amp; Lightning shoots towards the
      target, attempting to restrain them. Target creature(s) must make a Dexterity saving throw. On a failed save, they
      become restrained for the duration, unable to make handseals, and gain 2 ranks of Shocked. Restrained creatures
      make a Constitution saving throw at the end of each of their turns, ending this jutsu's effects on a successful
      save.</p><p>Additionally, if the target is standing on a body of Water when making their saving throws vs this
      jutsu's effects, they make their saving throw with a -2 penalty.</p><p><br />At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and you may choose one additional creature to
      target with this jutsu.</p>
