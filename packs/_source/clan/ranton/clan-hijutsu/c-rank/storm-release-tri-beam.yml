name: Storm Release Tri-Beam
type: spell
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: >-
      <p>Laser Style</p><p>You form your storm Chakra into a small sphere in front of you, which then Fires outward into
      a 60- foot line originating from you. Make a single ranged Ninjutsu attack comparing your result to the AC of each
      creature in range, dealing 4d10 Lightning damage and forcing affected creatures to make a Constitution saving
      throw, gaining +1 rank of Shocked on a failed save.</p><p>The Chakra then reforms into a ball in front of you. For
      the duration of this jutsu, you can use an action on each subsequent turn to Fire this wave again in any
      direction, but always in a 30-foot line, originating from yourself.A creature with ranks of shocked takes an
      additional 1d10 Lightning damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3, and the damage by 2d10.</p>
