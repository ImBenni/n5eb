name: Storm Release Laser Beam
type: spell
img: systems/n5eb/assets/content/clans/ranton.webp
system:
  description:
    value: >-
      <p>Laser Style</p><p>(This jutsu cannot score a critical hit) You conjure a beam of lightning and water that bends
      around corners and piercing its targets with lethal efficiency. Make one ranged Ninjutsu attack against all
      creatures within a 30- foot line, comparing your attack roll result against each creature's AC (You do not make
      this attack at disadvantage if used within 5 feet of a target), dealing 5d6 lightning damage if your result
      matches or exceeds their AC.</p><p>If a creature within range has the Shocked condition, this jutsu bends and
      shifts ignoring its normal Attack direction, and coiling and moving to target the shocked creature. This jutsu can
      target up to two shocked creatures this way.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3, and damage by 2d8.</p>
