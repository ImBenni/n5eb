system:
  description:
    value: >-
      <p>You empower the triggering jutsu, pouring more lightning chakra into it. It gains one of the following effects
      (Your choice).</p><p>• Gain a +2 bonus to the triggering jutsu's first attack roll. If this attack beats a
      creatures AC by 5 or more, you may make a second attack, with the same bonus, targeting a second creature, within
      the triggering jutsu's range.</p><p>• Gain a +1 bonus to the triggering jutsu's Save DC. If a creature would fail
      the triggering jutsu's save DC by 5 or more, they gain +1 rank of Shocked, and you may select one additional
      creature within 60 feet of you, forcing them to make the triggering jutsu's saving throw as if they were in its
      radius or original target.</p>
