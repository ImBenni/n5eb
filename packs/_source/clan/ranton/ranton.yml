  description:
    value: >-
      <h2>Laser Focused</h2><p>The Ranton Clan is a clan that hails proudly from the Land of Lightning. Known to work
      closely with the Raikage, but not limited to that one country. Their bloodline has spread widely throughout the
      continent, they are for sure reliable allies, and even greater enemies. When given a task, they are usually
      focused to a fault, on accomplishing a goal.</p><hr /><h3>Ranton Traits</h3><p><strong>Recommended Ability Score
      Increase</strong>: +2 Dex, +1 int</p><p><strong>Speed</strong>: Your base walking speed is 35
      feet.</p><p><strong>Skill Proficiencies</strong>: Ninshou, Nature.</p><p><strong>Storm Release Affinity</strong>:
      You begin with either Water or Lightning Release affinity. (Pick one)</p>
