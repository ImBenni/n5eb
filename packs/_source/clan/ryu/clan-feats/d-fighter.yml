name: D-Fighter
type: feat
img: systems/n5eb/assets/content/clans/ryu.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Ryu Clan, Level 12+</p><p>When you enter your Dragons Rage, the tips of your
      hair also gains the color of your dragons elemental affinity and begins to stand up on its own and exhibit
      properties similar to that of your chosen affinity such as sparks of electricity or embers of fire jumping. You
      gain the following benefits;</p><p>• Ryu clan jutsu you cast that grants you temporary hit points or deals damage
      of any type, increases their total results by your Proficiency bonus.</p><p>• Your Dragon Claws damage die and all
      Ryu Clan jutsu you cast increases their damage die by 1 step. (D4&gt;D6&gt;D8&gt; D10&gt;D12).</p><p>• While you
      are gaining the benefits of Dragons Rage, you can choose to reduce the Concentration cost of Ryu Hijutsu to 0,
      however while you are doing so you also cannot concentrate on anything except Ryu Clan Jutsu.</p>
    chat: ''
