system:
  description:
    value: >-
      <p>Born with the blood of dragons running through your veins you have the natural affinity with one of the 5
      Dragons your clan worships. </p><p>Beginning at 1st level, Choose between
      <strong>Earth,</strong><strong></strong><strong>Wind,</strong><strong></strong><strong>Fire,</strong><strong></strong><strong>Water</strong>
      and <strong>Lightning</strong>. <br />You gain that Elemental Affinity and all of your Ryu Clan jutsu takes on
      your chosen element. <br />You cannot go back and change this element later.</p>
