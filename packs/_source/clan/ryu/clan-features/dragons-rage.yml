name: Dragon's Rage
type: feat
img: systems/n5eb/assets/content/clans/ryu.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, you learn how to call upon the boiling rage that's innate to your bloodline. As an
      action, you unleash your elemental dragons' wrathful energy, causing scales made of Chakra to form. Your eyes also
      begin to glimmer. Your scales and eyes are all a color that matches your chosen nature release from your
      @UUID[Compendium.n5eb.clan.Item.0kc6zmzOSZjsLcOF]{Blood of the Dragon} clan feature. (Brown = Earth, Emerald =
      Wind, Red = Fire, Blue = Water, Gold = Lightning).</p><p>Your transformation lasts for 1 minute or until you end
      it as a bonus action.</p><p>For the duration you gain a +1 to your AC, you can cast all Ryu clan Hijutsu using
      Constitution as your Ninjutsu ability modifier, and your unarmed attacks made using your Dragon Claws can use
      Constitution for attack and damage rolls. You can activate your Dragon's Rage once every 10 minutes.</p><p>At 7th
      level your rage reaches new heights. You can activate your Dragon Rage feature as a bonus action. While benefiting
      from your Dragon's Rage, your claw attacks damage die increases by +1 twice per turn, you gain resistance to your
      chosen nature releases damage type, your speed increases by +10 and once per turn, you can deal extra damage of
      your chosen nature releases damage type to one target, equal to your character level when you deal damage to it
      with an attack or jutsu.</p><p>Starting at 11th level you begin to exhibit more draconic features. Your bonus to
      AC becomes a +2, your Dragon Claws damage die increases by +2 twice per turn, Ninjutsu you cast of your chosen
      nature release has their cost reduced by 2 (Min 1.).</p><p>Starting at 15th level your Dragon Claws damage die
      increases by +3 twice per turn, Ryu Clan Jutsu you cast while benefiting from Dragon's Rage ignores resistance and
      their concentration cost is reduced by half.</p><p>At 18th level you have fully bonded to the nature affinity your
      Dragon represents. Ryu Clan Jutsu you cast can no longer be ended as a result of damage or failing a concentration
      check.</p>
