name: Dragons Ascension
type: spell
img: systems/n5eb/assets/content/clans/ryu.webp
system:
  description:
    value: "<p>You keep all of your Chakra inside you not allowing any of it to leak out enhancing your physical attributes past their limits, matching your physical prowess to that of a Dragons.\_<br />Your Strength, Dexterity and Constitution all becomes 24 for the duration.\_<br />Your speed is doubled and you gain more feral sounding speaking patterns.\_<br />You gain a +2 bonus on Intelligence and Charisma saving throws.\_<br />You lose the ability to cast and concentrate on Non-Ryu Clan jutsu for the duration.\_<br />When this jutsu ends, make a constitution save vs a DC 20 + 1 for every round this jutsu remained active.\_<br />On a failure, you fall to the ground prone and stunned for a number of minutes equal to rounds you had this jutsu active.\_<br />If you cast this jutsu while you are gaining the benefits of Dragons Rage, Dragons Wrath or Dragons Cloak you reduce the cost of this jutsu by 4 for each one currently active.\_<br />Additionally, if you are gaining the benefits of Dragons Wrath and/or Dragons Cloak you no longer need to maintain concentration on that jutsu but you still gain its benefits for the duration of this jutsu</p>"
