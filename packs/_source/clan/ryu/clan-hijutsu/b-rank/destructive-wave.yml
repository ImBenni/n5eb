  description:
    value: "<p>(This jutsu deals the same damage type as the nature release chosen by your Blood of the Dragon Clan Feature) You collect your Elemental energy into your body and compress it into a single spot like your mouth or hands and prepare to Fire in all directions by striking the ground creating a shockwave the Fires out in all directions overwhelming all enemies.\_<br />Each creature you choose within 30-feet of you must succeed a constitution saving throw or take 10d6 damage and be knocked prone on a failed save or half as much on a successful one.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, damage by 2d6 and size of the area by 10 feet.</p>"
