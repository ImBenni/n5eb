name: Dragon Cloak
type: spell
img: systems/n5eb/assets/content/clans/ryu.webp
system:
  description:
    value: "<p>You cover your body in Chakra and mold it until its visible to the naked eye.\_<br />Your Chakra then begins to bubble and boil until it takes the shape of a dragon like shell the covers your entire form.\_<br />You are still visible inside the shell of Chakra.\_<br />For the duration, you gain 30 Temporary Hit Points, your unarmed attacks deal an additional die of damage and you gain a +2 bonus on Constitution and Wisdom saving throws while you still have temporary hit points from this jutsu.\_<br />If you cast this jutsu while you are gaining the benefits of Dragons Rage or Dragons Wrath, you reduce the cost of this jutsu by 3 for each one currently active.\_<br />Additionally, if you are gaining the benefits of Dragons Wrath you no longer need to maintain concentration on this jutsu but you still gain its benefits for the duration of this jutsu.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and Temporary Hit points by 15.</p>"
