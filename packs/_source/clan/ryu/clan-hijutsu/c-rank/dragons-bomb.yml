name: Dragons Bomb
type: spell
img: systems/n5eb/assets/content/clans/ryu.webp
system:
  description:
    value: "<p>(This jutsu deals the same damage type as the nature release chosen by your Blood of the Dragon Clan Feature) You collect Chakra into a sphere about the size your body before compressing it into one about the size of a golf ball.\_<br />You take this super compressed ball of Chakra and ram it into your target creating a shockwave that affects creatures and objects near the target creature.\_<br />Make a melee ninjutsu attack.\_<br />On a hit, you deal 4d10 damage.\_<br />The target creature and all creatures, excluding you, in a 15-foot radius around the target must make a constitution saving throw, being pushed back 15 feet from the shockwave.\_<br />Creatures who fail the Constitution save takes 3d6 damage and falls prone on a failed save or half as much on a successful save.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the initial damage by 2d10, and the Shockwave damage by 1d6.</p>"
