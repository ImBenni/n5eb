system:
  description:
    value: >-
      <p>You amplify your body with your Nature affinity, creating a light but harmless aura and effect symbolizing your
      Chakra. For the duration Increase your AC by +1, increase your movement speed by +20 and you gain a +2 bonus on
      Strength and Dexterity saving throws for the duration.</p><p>If you cast this jutsu while you are gaining the
      benefits of Dragons Rage, you reduce the cost of this jutsu by 2.</p><p>Additionally, if you are gaining the
      benefits of Dragons Rage the duration of this Jutsu becomes 1 Minute.</p>
