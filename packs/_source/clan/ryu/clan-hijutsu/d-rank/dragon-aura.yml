name: Dragon Aura
type: spell
img: systems/n5eb/assets/content/clans/ryu.webp
system:
  description:
    value: >-
      <p>You create a whipping aura of elemental Chakra that surrounds you and extends out up to 15 feet from you. For
      the duration, creatures within range take damage equal to your Ninjutsu ability modifier each turn they begin
      inside the aura. Also, creatures who would make a saving throw while within your aura against a jutsu of the same
      nature release as the aura reduce the result of their saving throw by 1.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the size of the aura by 5 feet. Increase
      the saving throw penalty to -2 at B-Rank and -3 at S-Rank.</p>
    chat: ''
