system:
  description:
    value: >-
      <p>(You must have Latent Blood of the Dragon &amp; Latent Dragon Claws I)</p><p>Beginning at 7th level, you can as
      an Action, enter your Dragons Rage state. This transformation lasts for 1 minute and cannot be ended early. For
      the duration, you gain a +1 bonus to your AC and can make unarmed attacks with Dragon Claws using Constitution in
      place of Strength. You can do this once every 10 minutes.</p>
