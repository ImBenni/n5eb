system:
  description:
    value: >-
      <h2>Wrath of a Dragon</h2><p>The Ryu Clan is a custom, homebrew clan made by Kingsare4ever.</p><p>This Clan hails
      from the land of Lightning but has roots in multiple countries across the continent. They have a unique Kekkei
      Genkai that manifests extremely early, known as the Blood of the Dragon. This Bloodline trait allows most Ryu Clan
      members to manifest a Nature Release extremely early, and even use it to enhance themselves without the need for
      jutsu to focus this Chakra.</p><p>Their Nature Release Chakra is known to be far more potent and extremely
      volatile in nature compared to others. This Kekkei Genkai also has a negative trait, that manifests in the
      youngest of the clan the most, their anger and rage is unmatched. They have short emotional fuses that sends them
      flying into blind rages that makes them attack their enemy relentlessly, but not without tact, or strategy.</p><hr
      /><h3>Ryu Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Int, +1
      Con</p><p><strong>Speed</strong>: Your base walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>:
      Ninshou, Chakra Control</p><p><strong>Weapon Proficiencies</strong>: You are proficient with Katana's.</p>
