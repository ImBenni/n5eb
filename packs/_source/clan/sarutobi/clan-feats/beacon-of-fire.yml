name: Beacon Of Fire
type: feat
img: systems/n5eb/assets/content/clans/sarutobi.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Sarutobi Clan, Level 8+</p><p>Your presence on the battlefield is felt by all, and your sheer willpower to push through a tough situation helps other find confidence within themselves as well.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Charisma score by 1, to a maximum of 20.\_</p><p><br />• When you would spend Focus Points, all allied within 30 feet of you, gain a +X bonus to their next attack roll, saving throw or skill check before the end of their next turn, where X equals the number of Focus Points spent in a single instance.\_</p><p><br />• By spending an additional +1 Focus Point when you activate an ability granted by your Inheritors of the Will of Fire clan feature, you may select one ally within 30 feet of you.\_<br />They gain the same bonus or effect until the end of their next turn.\_</p><p><br />• As a reaction, you can spend 2 Focus Points to reroll any saving throw or skill check, against any 1 condition you are currently suffering from.</p>"
