name: Combination Master
type: feat
img: systems/n5eb/assets/content/clans/sarutobi.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Sarutobi Clan, Level 8+</p><p>Through hard work, training, and sheer luck, you are able to imitate a Kekkei Genkai using your natural born Nature Affinities.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Intelligence score by 1, to a maximum of 20.\_</p><p><br />• You may learn or create jutsu with both nature Release Keywords granted by your Advanced Nature Transformation clan feature.\_<br />Select one clan, whose Hijutsu have both nature releases you have as a result of your Advanced Nature Transformation clan feature.\_<br />You can learn their Hijutsu, but they lose the Hijutsu keyword for you only.\_<br />Jutsu learned in this way can only be learned through spending downtime.\_</p><p><br />• You can spend 2 Focus Points to forcefully combine Nature Releases.\_<br />A jutsu you cast with only 1 Nature Release, gains another nature release that you can cast, dealing an additional 3 damage die worth of damage of the second nature Releases damage type.</p>"
