  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Sarutobi Clan, Level 12+</p><p>Your mastery of the elements expands beyond that of even other Sarutobi clan members.\_<br />Having now learnt or mastered up to 3 elements, your arsenal of jutsu far wider.\_<br />You gain the following Benefits:</p><p></p><p>• Select one nature release you do not have.\_<br />You gain the chosen nature release and it gains the benefits of your Advanced Chakra Control clan feature.\_</p><p><br />• You learn 1 additional D-Rank, C-Rank and B-Rank jutsu with the same nature release chosen by this feature.\_<br />These jutsu do not count against your jutsu known limitation.\_<br />Beginning at 16th level, you learn 1 additional A-Rank jutsu following the same limitations.</p>"
