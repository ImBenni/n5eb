system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Sarutobi Clan, Level 4+</p><p>The Fire inside you begins to grow, even
      affecting those around you, making your will infectious. You gain the following Benefits;</p><p>• Increase your
      Strength, Intelligence, or Wisdom score by 1, to a maximum of 20.</p><p>• You can spend 2 Focus Points to
      automatically upcast a jutsu without spending Chakra if able.</p><p>• You can spend 2 Focus Points to regain a
      number of hit points equal to Xd6 where X is your Proficiency Bonus.</p><p>• You can spend 3 Focus Points to
      automatically succeed a saving throw</p>
