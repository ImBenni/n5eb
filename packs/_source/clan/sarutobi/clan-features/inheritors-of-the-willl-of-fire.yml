system:
  description:
    value: >-
      <p>As a Sarutobi, you have inherited the Will of Fire from your forefathers. Beginning at 3rd level, you have
      found that Focus and Determination is what makes a shinobi strong. </p><p>You gain a number of <em><strong>Focus
      points</strong></em> equal to your proficiency bonus per long rest. </p><p>These Focus Points can be spent to do
      the following;</p><ul><li><p>Spend 1 Focus to gain a +2 Bonus on an Attack Roll</p></li><li><p>Spend 1 Focus to
      gain a +2 Bonus on a Saving Throw</p></li><li><p>Spend 1 Focus to gain a +2 Bonus on a skill
      Check</p></li><li><p>Spend 3 Focus to gain an Immediate reaction, even with an ability or Jutsu that is an
      action.</p></li><li><p>Spend 3 Focus to automatically Succeed a Death Saving throw.</p></li></ul>
