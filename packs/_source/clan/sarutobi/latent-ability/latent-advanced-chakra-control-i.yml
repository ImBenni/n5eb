system:
  description:
    value: >-
      <p>Beginning at 3rd level, Select between the following; Ninjutsu, Genjutsu, Taijutsu or Bukijutsu, you can use
      Jutsu with the select Keyword with a level of efficiency others wish they had. You may reduce the cost of the
      select combination of keywords by 1. If Ninjutsu, select between the following keywords that you have access to;
      (Earth, Wind, Fire, Water, Lightning) Release. </p><p>If Taijutsu or Bukijutsu, select between the following
      keywords; Combo or Finisher. </p><p>If Genjutsu, select between the following Keywords; Auditory, Inhaled,
      Tactile, and Visual.</p>
