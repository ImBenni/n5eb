name: Hashirama's Legacy
type: feat
img: systems/n5eb/assets/content/clans/senju.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Senju Clan, Level 4+</p><p>The blood of the First Hokage, runs through your veins, providing you unmatched vitality.\_<br />You cannot take this feat if you have another Legacy Senju clan feat.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Strength or Constitution score by 1, to a maximum of 20.</p><p>• Whenever you would regain hit points as a result of spending Hit die, targeting yourself with jutsu, features or Items that restore hit points, or using the Mitotic Regeneration clan feature, you regain additional hit points equal to your Constitution modifier once per casting, item use or feature activation up to twice per rest.</p><p>• Increase your Hit Point total by your level. Whenever you would gain a level here after increase your hit point total by +1.</p><p>• Constructs, Structures and creatures summoned or made by your Senju clan Hijutsu gain a +1 bonus to their AC and +10 bonus hit points.</p>"
