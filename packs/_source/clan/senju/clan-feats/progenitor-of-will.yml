name: Progenitor Of Will
type: feat
img: systems/n5eb/assets/content/clans/senju.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Senju Clan, level 8+</p><p>You have a will that isn't formed through training, events or circumstances.\_<br />This will be born as a result of your lineage.\_<br />Your will is passed down from generation to generation.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Constitution or Wisdom score by 1, to a maximum of 20.\_</p><p><br />• When you would cast a Senju Hijutsu using your Constitution as your Ninjutsu ability modifier, you add it to your damage rolls.\_</p><p><br />• You cannot have your memories of your allied creatures altered or manipulated in any way.\_<br />A creature who would attempt to do so finds it impossible to alter them by any means.\_</p><p><br />• You cannot be forced to harm or betray your allies as the result of a Jutsu that would normally cause you to act against your will.\_<br />If a creature would forcefully command or control you to act against your will, in an attempt to betray or harm any creature you consider an ally, you are able to ignore those commands and automatically prevent yourself from acting towards such a goal, regardless of the rank of jutsu cast</p>"
    chat: ''
  source:
