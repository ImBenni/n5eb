system:
  description:
    value: "<p>Beginning at 1st level, you learn to create a reservoir of Chakra in form of Senju Cells.\_<br />These cells are a byproduct of your exceptional bloodline which allows you to remain healthy and ready for battle.\_</p><p>You have a number of Senju Cells equal to your level per long rest.\_You can spend these cells to accomplish any of the following:</p><ul><li><p>As a bonus action, you can spend any number of cells, regaining 1d6 + Constitution modifier hit points, per cell spent.\_<br />This increases to a d8 at 11th level.\_</p></li><li><p>As a bonus action, you can spend any number of cells to remove 1 rank of any Physical or Elemental condition you are under the effects of, per cell spent.\_</p></li><li><p>Beginning at 7th level, As a reaction to your hit points falling to 0 or lower, you can spend 5 cells to instead fall to 1 hit point.</p></li></ul>"
