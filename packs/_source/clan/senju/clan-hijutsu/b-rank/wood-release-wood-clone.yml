name: Wood Release Wood Clone
type: spell
img: systems/n5eb/assets/content/clans/senju.webp
system:
  description:
    value: "<p>You clap your hands together as you inject chakra into the ground conjuring clones made of wood.\_<br />This is an even more advanced Version of the Shadow Clone Technique, where you manifest clones made of hardened, malleable and dense wood known as a Wood Clone.\_<br />You can conjure up to 6 Wood Clones at once, each costing 10 chakra per clone.\_<br />Wood Clones act at once and all attempt to perform the same command give.\_<br />If commanded to perform the help action, they can only help the Summoner.\_<br />Wood Clones are conjured with a replica of any weapons you have on you at the time of creation that is also made from chakra enhanced wood.\_<br />When a Wood Clone makes an attack using this weapon or an unarmed attack it deals 1d10+Ninjutsu ability modifier earth damage regardless of the attack used.\_<br />It can make up to 2 attacks using its action.\_<br />All Wood Clones have 15 Hit Point and can use all Senjutsu Hijutsu on your known list of C-Rank or lower up to twice, each.\_<br />Wood Clones use your Constitution save bonus for all saving throws.\_<br />After the clone reaches 0 Hit points, performs 2 Senju clan Hijutsu or is dismissed as a bonus action, the jutsu ends.</p>"
