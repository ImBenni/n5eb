system:
  description:
    value: "<p>You clap your hands together as you inject Chakra into the ground conjuring a massive wooden serpentine dragon.\_<br />You command the Dragon and it only listens to you (no action needed), acting at the end of each of your turns.\_<br />It is proficient in all saving throws, using your Ninjutsu ability modifier as its Proficiency bonus and uses your ninjutsu attack bonus or save DC for effects that require it.\_<br />You may as a Bonus action, or reaction cause the dragon to use its Detonation ability.\_<br />It rolls initiative as it has its own turns, using your Ninjutsu Ability Modifier as its Initiative, and uses the following Statistics:</p>"
