name: Wood Release Hobi Technique
type: spell
img: systems/n5eb/assets/content/clans/senju.webp
system:
  description:
    value: >-
      <p>You clap your hands together as you inject Chakra into the ground. You conjure a massive wooden dome that is a
      Quake Shard of your design and description. All creatures of your choice are protected, while other creatures whom
      you did not select are pushed out from the protection of this structure to the edge, on a space that can hold them
      harmlessly. The structure intercepts all damage except from Genjutsu.</p><p>The structure breaks line of sight as
      all affected creatures gain total cover for the duration. The structure splinters and dissolves at the beginning
      of your next turn. A creature can leave the protection of the structure, but cannot reenter it once they leave.
      The structure has 30 Hit points.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3, and the Hit Points of the Structure by +10</p>
