system:
  description:
    value: "<p>You clap your hands together as you inject Chakra into the ground.\_<br />You conjure multiple hands of wood that jut from the ground and attempt to grapple up to two creatures you can see within range.\_</p><p>Target creature must succeed a Dexterity saving throw, being grappled.\_On a successful save, no further effects.\_</p><p>A grappled creature must also make a Strength saving throw being pulled prone as the hands retract into the ground dragging the creature to the ground with it.\_On a successful save, they remain standing.\_</p><p>A grappled or prone creature can make a Strength saving throw as an action on their turn to end the effect.\_</p><hr /><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and select one additional creature for this jutsu to affect.</p>"
