system:
  description:
    value: "<p>You change the structure of your arms or legs into that of Chakra enhanced wood.\_<br />You transform your appendage into a fork of multiple branches.\_<br />Make a melee Ninjutsu attack against a creature you can see within range.\_<br />On a hit you deal 2d8 Earth damage and the target must make a Strength saving throw.\_</p><p>On a <strong>failed save</strong>, they are grappled by you until they either escape or you choose to release them. A creature grappled by you can be pulled 10 feet closer towards you as a bonus action on each of your turns.\_</p><p>A grappled creature can spend its action to remake its saving throw to escape this grapple on a success.\_</p><hr /><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, damage by 2d8 and range by 10 feet.</p>"
