  description:
    value: "<p>You clap your hands together as you inject Chakra into the ground giving birth to a host of roots, and plants that surge upwards filling a 30-foot cube originating from you with bulging wood and roots.\_<br />\_All creatures of your choice treat the area as difficult terrain and cannot take the dash or dodge actions while inside the radius.\_<br />Additionally, Senju clan Hijutsu you cast while inside the area of this jutsu ignores temporary hit points and structures that would intercept damage for a creature.</p><p><br />\_At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the size of the cube by 10 feet.</p>"
