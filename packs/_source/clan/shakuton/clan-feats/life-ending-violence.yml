system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Shakuton Clan, Level 8+</p><p>The motes of flame you manifest can burn away anything in their path.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Intelligence score by 1, to a maximum of 20.</p><p>• Your Scorch Die increase in size by 1 Step. (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p><p>• Shakuton Hijutsu you cast that affects an area, increases the size of the affected area by +10 feet.</p><p>• For every 2 Scorch die you spend as part of casting a Jutsu that deals fire damage, you reduce the cost to maintain concentration on the chosen jutsu by -1.</p>"
