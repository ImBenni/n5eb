name: Scorching Aura
type: feat
_id: nDZ6o9kLnw1S2zYp
img: icons/magic/fire/flame-burning-yellow-orange.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, when you would deal Fire damage to structures or constructs made of organic material
      (wood, grass, flesh etc.) they make their saving throw at disadvantage.</p><p>Beginning at 11th level, you have
      learned to leverage your Superheated Chakra to benefit your allies as well. When an allied creature within 30 feet
      of you would cast a jutsu, you may spend a Scorch Die, giving their jutsu the Fire Release keyword for this
      casting. A creature who's jutsu you have augmented in this way, gains the benefit of your
      @UUID[Compendium.n5eb.clan.Item.c5xKoSjHlqlDFkRG]{Scorching Heat} clan feature as if they had it, spending your
      Scorch Die, when they would spend any.</p><p>Beginning at 15th level, when you would spend at least two Scorch Die
      on a jutsu, either yours or an allies, you increase the damage die of the jutsu cast by 1 step
      (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p><p>Beginning at 18th level, when you would use this feature on an allied
      creature, the next ninjutsu they cast that would deal damage or force a creature to make a saving throw, its
      damage is increased by 1 step and it also forces an affected creature to make a Constitution saving throw, being
      burned on a failed save.</p>
