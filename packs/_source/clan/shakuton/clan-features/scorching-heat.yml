folder: 8fDD2VdyoCYR9QbC
name: Scorching Heat
type: feat
img: systems/n5eb/assets/content/items/image-2024-08-09-222328735-removebg-preview.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, your super- heated Chakra has granted you the ability to super heat other jutsu with
      it. You gain a number of Scorch Die, which are D4's, equal to your proficiency bonus. </p><p>When you would deal
      Fire damage, you may spend a number of Scorch Die, which when rolled is either; Added to the total Fire damage
      dealt, ignoring resistances, or if a creature would make a saving throw of any type to resist an effect or
      condition imposed by a jutsu with the Fire or Wind Release Keyword, they reduce their saving throw by half of the
      result of your Scorch Die (Min 1). </p><p>You regain spent Scorch Die when you would take a rest of any type.</p>
    chat: >-
      <p>when rolled is either; Added to the total Fire damage dealt, ignoring resistances, or if a creature would make
      a saving throw of any type to resist an effect or condition imposed by a jutsu with the Fire or Wind Release
      Keyword, they reduce their saving throw by half of the result of your Scorch die (Min 1)</p>
