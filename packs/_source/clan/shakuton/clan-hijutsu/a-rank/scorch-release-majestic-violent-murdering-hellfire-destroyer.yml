name: Scorch Release Majestic Violent Murdering Hellfire Destroyer
type: spell
img: systems/n5eb/assets/content/clans/shakuton.webp
system:
  description:
    value: >-
      <p>You conjure an innumerable number of globes of superheated flame, fusing them, to create a single massive
      sphere of super-heated flame.</p><p>Make a ranged ninjutsu attack against a target you can see within range,
      dealing 8d12+8 Fire damage on a hit.</p><p>Regardless if you hit or miss, all other creatures within 60 feet of
      the original target must succeed a Constitution Saving Throw taking 3d12+3 Fire damage and being Burned on a
      failed save.</p><p>Creatures who's hit points are reduced to 0 as a result of this jutsu are turned to dust and
      leave behind only a shadow of their physique stained in ash on the ground or wall.</p><p>You can spend motes
      created by the Scorch Release: Scorching Murder to enhance this jutsu. For every mote spent, increase both
      instances of damage by 1d12+1. You can spend up to 6 motes this way.</p>
