system:
  description:
    value: "<p>YYou conjure globes of superheated flame that you use to manifest a massive ball of super-heated flame about 8 feet in diameter.\_<br />You then slam this ball into the ground directly under you attempting to incinerate everything near you.\_<br />All creatures, excluding you, within the radius must succeed a Constitution Saving Throw. On a failed save, they take 10d8+10 Fire damage and gain 2 ranks of Burned or half as much damage on a success</p><p>You can spend motes created by the Scorch Release: Scorching Murder to enhance this jutsu. For every two motes spent this way, you select one creature to be unaffected by this jutsu and increase this jutsu's damage by 2d8. You can spend up to 4 motes this way. You can spend up to 4 motes this way</p><p><br />At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, and the radius by 15 feet.</p>"
