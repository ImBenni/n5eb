system:
  description:
    value: "<p>You conjure globes of superheated flame that you then compress into a sphere the size of a basketball.\_<br />You then throw this sphere into the air before clapping your hands together to focus, releasing the super-heated flames into the air like rain filling a 15- foot cube you can see.\_<br />All creatures within range must succeed a Constitution Saving Throw. On a failed save they take 4d4+4 Fire Damage and gain 2 ranks of the Burned condition. On a successful save they take half as much damage and gain 1 rank of the Burned condition until the end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 2d4, and the size of the cube by 5 feet.</p>"
