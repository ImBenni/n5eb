  description:
    value: "<p>You cannot lose concentration on this jutsu as a result of damage.\_<br />You conjure multiple globes of superheated flame and coat your fist and feet in them for the duration.\_<br />When you first cast this jutsu and as an Action on each subsequent turn for this jutsu's duration, you can make a single Melee Ninjutsu Attack. On a hit, you deal 4d6+4 Fire damage and the target creature gains the Burned condition.</p><p>When you make the attack granted by this Jutsu, you can spend motes created by the Scorch Release: Scorching Murder. For every three motes spent, you can make one additional attack. You can spend 6 motes in this way.</p>"
