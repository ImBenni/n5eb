    description: >-
      <p><strong>Max Ranks</strong>: 5</p><ul><li><p>A Burned Creature or object takes 1d8 fire damage for each rank it
      has, at the start of each of their turns.</p></li><li><p>A Burned creature takes a -2 penalty to Concentration
      Checks for each rank it has.</p></li><li><p>Creatures that are immune to fire damage is immune to this
      condition.</p></li><li><p>This condition lasts for the duration of the effect that inflicted it or 1 minute has
      passed, whichever comes first. A Creature can spend an Action to make a DC 15 Dexterity (Survival) Check to put
      out the flames. On a successful check, the condition ends or submerging themselves fully into a body of
      water.</p></li></ul>
