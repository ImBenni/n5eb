system:
  description:
    value: "<p>You conjure globes of superheated flame and create a stream of superheated flame, burning everything in your path.\_<br />You Fire a 30-foot cone of flame destroying everything in your way.\_<br />Creatures in range, must succeed a Dexterity saving throw, taking 5d8+5 Fire damage and being burned on a failed save or half as much on a successful save.\_<br />Creatures who fail this saving throw by 5 or more also drop any metal items they are holding.\_<br />If they would pick up these items before the end of their next turn they take 1d8 Fire damage.\_<br />Creatures who fail this saving throw by 10 or more find it hard to breathe as all the air evaporates from their lungs as they become stunned until the end of their next turn.\_<br />You can spend motes created by Scorch Release: Scorching Murder, for each mote spent, all creatures within range suffer a -1 penalty to their saving throw.\_<br />You can spend up to 5 motes this way.\_</p><p><br /><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and damage by 2d8+2.</p>"
