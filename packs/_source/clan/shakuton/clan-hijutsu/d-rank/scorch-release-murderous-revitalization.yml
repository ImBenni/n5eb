    value: "<p>You conjure multiple globes of superheated flame, revitalizing a creature you touch.\_<br />They regain 3d6 hit points.\_<br />If you spend 3 motes created by @UUID[Compendium.n5eb.clan.Item.A6A40tokpWswO90Y]{Scorch Release: Scorching Murder}, they also reduce their Exhaustion by 1 rank. A creature who died as a result of Exhaustion cannot have their Exhaustion reduced by this jutsu.</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and hit points regained by 2d6.</p>"
