system:
  description:
    value: >-
      <p>You create 4 motes of superheated flame that circle around you like mini satellites. As a bonus action on each
      of your turns, you can spend a mote, allowing you to make a ranged Ninjutsu attack, throwing it at a creature you
      can see within 30 feet. On a hit, target creature takes 3d8+3 Fire damage and must succeed a Constitution saving
      throw, being Burned on a failed save. Once all motes have been expended this jutsu immediately ends.</p><p>You can
      alternatively spend the motes created by this jutsu to fuel other Scorch Release jutsu you cast, enhancing their
      effects.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above D-Rank, increase the cost
      of this jutsu by 3, the number of motes you create by 3 and damage of this jutsu by 1d8+1.</p>
