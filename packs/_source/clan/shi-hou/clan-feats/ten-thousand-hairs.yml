name: Ten Thousand Hairs
type: feat
_id: QtTM48dS7W78fSqW
img: systems/n5eb/assets/content/clans/shi-hou.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Shi Hou Clan, Level 12+</p><p>After studying more about your ancestral
      heritage, you are one of the few members of your clan to unlock this special technique; creating afterimages from
      strands of hair.</p><p>When you would target a creature with a Taijutsu that deals damage, you can spend
      additional Inner Chi equal to that jutsu's rank, (D=2, C=4, B=6, A=8, S=10) and a hair will fly from your body,
      briefly creating an afterimage of yourself to perform the jutsu again. When the jutsu is cast this way, all damage
      done is halved, the jutsu doesn't benefit from any additional jutsu used to increase this jutsu's damage or chance
      to hit and cannot inflict any conditions. Afterimages also cannot cast Taijutsu that would cause it to die or to
      gain a negative condition on itself (such as Exhaustion).</p><p>A jutsu can benefit from this feature up to once
      per casting</p>
