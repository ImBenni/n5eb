name: 72 Earthly Transformations
type: feat
_id: OkAqh1vLBUax6BBo
img: systems/n5eb/assets/content/clans/shi-hou.webp
system:
  description:
    value: >-
      <p>As a member of the Shi Hou clan you can tap into your ancestral powers and utilize an unique adaptation of the
      transformation technique to empower your taijutsu. Beginning at the 3rd level you gain 3 of the following Simple
      Transformations. </p><p>Transformations that require a saving throw, use your Taijutsu Save DC. </p><p>To activate
      this feature you must spend 1 additional Inner Chi as a part of casting a Taijutsu. You can only use one Simple,
      Advanced, or Mythical Transformation once per casting.</p><hr /><ul><li><p><strong>Bear Form</strong>: When you
      would cast a Taijutsu that makes a single attack, on a hit the creature must succeed a Strength saving throw or
      fall prone, and reduce their movement speed to 0 until the start of their next turn.</p></li><li><p><strong>Bull
      Form</strong>: When you cast a Taijutsu that requires at least one melee attack, creature(s) hit by this jutsu
      must succeed a Strength save or be knocked 30 feet into the air.</p></li><li><p><strong>Hawk Form</strong>: When
      you cast a Taijutsu on your turn, until the end of the current turn, you cannot have your speed reduced by any
      means (Including from Conditions).</p></li><li><p><strong>Owl Form</strong>: When you would cast a Taijutsu with a
      duration of 1 minute or longer, for the duration of the Taijutsu, you may use your Taijutsu ability modifier for
      Perception, Insight, and Investigation checks (this enables you to use Monkey's Paw with these checks). You also
      gain darkvision equal to your normal sight range and can take the Search Action as a bonus action for the
      duration.</p></li><li><p><strong>Snake Form</strong>: When you would cast a Taijutsu that makes a single attack,
      the damage type becomes piercing and on hit the target must succeed a Constitution save or become envenomed for 1
      minute.</p></li></ul><hr /><p>Beginning at the 7th level you gain access to 2 of the following Advanced
      Transformations. </p><p>These transformations require 2 additional Inner Chi to be spent as part of casting a
      Taijutsu.</p><ul><li><p><strong>Mink Form</strong>: When you would cast a Taijutsu with more than one attack roll,
      with each successful attack roll you increase the damage rolls of the jutsu by +1, up to a maximum damage bonus
      equal to your proficiency bonus.</p></li><li><p><strong>Tiger Form</strong>: When you cast a Taijutsu that makes
      two or less attacks, increase the critical threat range by +2.</p></li><li><p><strong>Turtle Form</strong>: When
      you would cast a Taijutsu that covers an area of effect or requires no more than two attack rolls, gain temporary
      hit points equal to half the damage dealt until the start of your next turn. Taijutsu affected by this form cannot
      score a critical hit.</p></li><li><p><strong>Wolf Form</strong>: When you would cast a jutsu with more than one
      attack roll, the damage type becomes slashing and upon the conclusion of the jutsu, the target must make a
      Constitution saving throw with a penalty equal to the number of attacks they were hit by using your jutsu. On a
      failed saving throw, the creature gains ranks of bleeding equal to this penalty.</p></li></ul><hr /><p>Beginning
      at the 15th Level you may choose one of the following legendary transformations for your 72 Earthly
      Transformations. </p><p>These transformations are considered Mythic Transformations require 4 additional Inner Chi
      to be spent as part of a jutsu's casting to use.</p><ul><li><p><strong>Dragon Form</strong>: When you would cast a
      damage dealing Taijutsu, your jutsu deals an additional amount of damage equal to twice the number of the jutsu's
      damage die, and has its damage type changed to fire, once per casting. (Ex. A jutsu that deals 6d10 bludgeoning
      damage, now deals 6d10+12 fire damage).</p></li><li><p><strong>Pegasus Form</strong>: When you would cast a
      taijutsu, if it does damage, change the damage type to wind. You also gain a flight speed equal to your movement
      speed until the end of the current turn.</p></li><li><p><strong>Phoenix Form</strong>: When you would cast a
      Taijutsu as a reaction, regain hit points equal to your Taijutsu Save DC</p></li></ul>
