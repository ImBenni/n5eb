system:
  description:
    value: >-
      <p>The Shi Hou clan has always been gifted with miraculous chakra control as a result of their Sage ancestry.
      </p><p>Beginning at 3rd level, you gain 10 Inner Chi. You gain 1 additional Inner Chi at each level. Inner Chi can
      be used in place of chakra for the casting of Taijutsu. When you would cast a Taijutsu with at least an amount of
      Inner chi equal to its rank, (D=1, C=2, B=3, A=4, S=5) that jutsu gains either 1 additional damage die (once per
      casting) or gains +1 to hit (pick one).</p><p>While concentrating on jutsu that you cast with Inner Chi, pay
      concentration cost as if you had cast it with normal chakra. When you would gain the benefit of a short rest, you
      regain Inner Chi equal to half your maximum. All Inner Chi replenishes on a long rest.</p>
    chat: ''
