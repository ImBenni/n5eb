system:
  description:
    value: >-
      <h2>Taoist Spirit</h2><p>The Shí Hóu Clan is a custom homebrew clan created by StruggledKiller. The Shi Hou are a
      peaceful clan hailing from a small village in the Land of Earth. From birth, members of this clan are
      exceptionally strong, manifesting immense chakra unlike any other clan and an unusual Kekkei Genkai, a monkey-like
      tail. The Shi Hou tend to keep to themselves, however, time and time again during Great Shinobi wars they lend
      their strength. They believe themselves descendants of the first Human Sage, who trained under the Primate
      Tribe.</p><hr /><h3>Shí Hóu Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Con, +1 Str or
      Dex</p><p><strong>Speed</strong>: Your base walking speed is 35 feet</p><p><strong>Skill Proficiencies</strong>:
      Chakra control, Pick one between: Ninshou, Martial
      Arts.</p><p><strong>Weapon</strong><strong>Proficiencies</strong>: Quarterstaff</p>
