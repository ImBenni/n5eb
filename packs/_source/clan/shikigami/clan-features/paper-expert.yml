name: Paper Expert
type: feat
img: systems/n5eb/assets/content/clans/shikigami.webp
system:
  description:
    value: >-
      <p>You learn to draw out the power of paper-based ninja tools. </p><p>Beginning at 3rd level, when you would use a
      Breaching Tag, Paper Bomb, Explosive Tag Ball, Flash Tag or Poison Gas Tag, the DC of these Tags are modified and
      are now equal to your Ninjutsu Save DC, if your Ninjutsu save DC would be higher than the listed Ninja tools Save
      DC.</p><p>Beginning at 7th level, when you would use a Breaching Tag, Paper Bomb, Explosive Tag Ball, Flash Tag or
      Poison Gas Tag you can enhance them by infusing your chakra into them up to a number of times equal to your
      Proficiency Bonus, spending 5 Chakra for each bonus. You cannot select a single bonus more than 3
      times</p><ul><li><p><strong>Bonus Damage<br /></strong>If the enhanced item deals damage, increase the damage
      dealt by 2 damage die of each damage type for each application of this bonus.<br />If this bonus is used with a
      Flash Tag, you also deal 4d6 Lightning damage on a failed save or half as much on a failed save. <br />If used
      with a Poison Gas tag, you also deal 4d6 poison damage on a failed save or half as much on a failed
      save.</p></li><li><p><strong>Bonus DC <br /></strong>Increase the Items save DC by +2</p></li><li><p><strong>Bonus
      Radius<br /></strong>Increase the affected range or radius by 10 feet for each application of this
      bonus.</p></li></ul>
