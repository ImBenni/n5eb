name: Papercraft
type: feat
img: systems/n5eb/assets/content/clans/shikigami.webp
system:
  description:
    value: >-
      <p>The Shikigami Clan learns to craft with paper from a young age. </p><p>Beginning at 1st level, when you would
      gain the benefits of a short or long rest, you can craft up to two of the following with no additional resources
      required. </p><p>Additionally, you reduce the ryo cost and downtime cost to craft the following Items during
      downtime by half. </p><p>This does not stack with other features that reduce downtime cost to craft the following
      items:</p><ul><li><p>Breaching Tag</p></li><li><p>Paper Bomb</p></li><li><p>Explosive Tag
      Ball</p></li><li><p>Flash Tag</p></li><li><p> Poison Gas Tag</p></li></ul><p>Ninja tools crafted this way do not
      have any bulk, and last for 24 hours before becoming inert.</p><p>Beginning at 11th level when you would use this
      feature to craft a ninja tool, you instead can craft four. </p><p>Beginning at 18th level this ncreases to
      six.</p><p>Additionally, if you have a Demolitions Kit, you can spend 10 minutes and 1 use of it to create one of
      the listed items at the Greater Quality. </p><p>When you would gain the benefit of this feature over the course of
      a short rest, you can spend 2 uses of your Demolitions Kit to create two additional items. </p><p>When you would
      gain the benefit of a long rest, you can spend 3 uses of your Demolitions Kit to create five additional items.
      </p><p>When you would gain the benefit of Downtime to create the listed Items, you create twice the amount you
      would normally make.</p>
