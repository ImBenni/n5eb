name: Dance of the Shikigami
type: spell
img: systems/n5eb/assets/content/clans/shikigami.webp
system:
  description:
    value: >-
      <p>With your mastery of paper, you turn yourself into a paper angel, with a body untouchable by mundane weaponry
      and the ability to take to the skies. Until this jutsu ends, you gain the following benefits:</p><p>• You gain
      Resistance to bludgeoning, piercing, and slashing damage.</p><p>• You gain a flying speed of 60 feet.</p><p>You
      can use your Bonus Action to select a space you can see up to 60 feet away. All creatures in a 15-foot cube
      centered on this space must succeed a Dexterity Saving Throw. On a failed save, creatures take 6d8 Piercing damage
      and gains the Lacerated condition, or half as much damage on a successful saving throw. You have advantage on
      checks to maintain Concentration on this Jutsu.</p>
