name: Origami Servitor
type: spell
img: systems/n5eb/assets/content/clans/shikigami.webp
system:
  description:
    value: >-
      <p>You use origami to create a paper animal, such as a crane or butterfly, and send it out to gather information.
      The Origami you create, is a tiny object with a flying speed of 60 feet and a stealth bonus equal to your Ninjutsu
      Save DC. While this jutsu is active, you may spend an action to see and hear as if you were in the same location
      as your origami. While doing this your body is incapacitated and unaware of its surrounding. Any damage to your
      body returns your senses.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost
      by 3, the range your Origami can travel by 250 feet, and increase their Stealth Bonus by +2. If this jutsu is
      casted at B-Rank, increase the Duration to 8 hours and 24 hours at A-Rank.</p>
