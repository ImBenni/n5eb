name: Paper Clone
type: spell
img: systems/n5eb/assets/content/clans/shikigami.webp
system:
  description:
    value: "<p>You conjure a clone made of paper, similar to the Shadow Clone Technique, but more durable to a space it can occupy within 10 feet of you, known as a Paper Clone.\_<br />Paper Clones are made of paper and weighs 1/10th of the casters weight.\_<br />You may create up to 2 Paper Clones, each costing 8 chakra.\_<br />Paper Clones have Immunity to bludgeoning, piercing and slashing damage, Vulnerability to fire damage and can cast up to two C-Rank and lower Shikigami Clan Hijutsu before this jutsu ends.\_<br />Paper Clones made using this jutsu cannot create a Clones of its own.\_<br />Paper Clones cannot concentrate on jutsu.\_<br />If a Paper Clone casts a jutsu that requires more than 1 attack roll upon casting, it only makes one attack.\_<br />If multiple clones attack the same creature, you do not make multiple attack rolls.\_<br />You instead choose a lead clone and it gains a +1d4 bonus to its damage roll(s), for each additional clone that is aiding it.\_<br />Paper Clones can change their color to blend in with any surface as an Action.\_<br />When it does it can make a Stealth check using your Ninshou or Stealth, whichever is higher.\_<br />Paper Clones are automatically dispelled if it enters a body of water.\_<br />Paper Clones can make a melee weapon attack with its action.\_<br />If it does it deals 1d8 slashing damage.</p>"
