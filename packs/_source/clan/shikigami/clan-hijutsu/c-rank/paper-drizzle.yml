name: Paper Drizzle
type: spell
img: systems/n5eb/assets/content/clans/shikigami.webp
system:
  description:
    value: >-
      <p>You briefly form a pair of papery wings, which rain Senbon, made of paper on an area of your choosing, that you
      can see within range. Each creatures in the target area, must succeed a Dexterity saving throw, taking 4d10
      piercing damage on a failed save, or half as much on a successful on.</p><p>While under the effects of Dance of
      Shikigami, you can choose to only affect hostile creatures within the area of effect, and increase the radius of
      the jutsu to a 45-foot cube.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the
      cost by 3 and the damage by 2d10.</p>
