name: Paper Trap
type: spell
img: systems/n5eb/assets/content/clans/shikigami.webp
system:
  description:
    value: >-
      <p>You take a chakra seal, and infuse it with your chakra, making it very similar to a breaching tag. Each time
      you cast this jutsu, you create 2 of such tags. These tags must be prepped and set on a solid surface and can only
      be activated as a Reaction. Each trap takes 10 minutes to prep and set.</p><p>You do not spend chakra to make such
      a paper trap, you instead must spend 5 chakra to activate the trap. For every trap you activate, you must spend 5
      chakra. All creatures within 30 feet of the trap when detonated must succeed a Dexterity saving throw. On a failed
      save the creature takes 4d6 fire damage. A creature who fails a saving throw suffers a -2 penalty to each
      subsequent saving throw they make against other Paper traps (This penalty stacks). A creature can be affected by
      up to 10 Paper traps at once.</p>
    chat: ''
