system:
  description:
    value: >-
      <h2>A Work of Art</h2><p>The Shikigami Clan is not a clan bound by blood as much as it is a clan bound by
      ideology. This Shikigami clan has no surname, and do not share any connecting tissue outside of the passed down
      secrets of Papercraft. This family works more like a coven of members more so than a bloodline, with senior and
      elder members teaching their children and bringing in those from outside the clan into the fold.</p><hr
      /><h3>Shikigami Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Int, +1
      Dex</p><p><strong>Speed</strong>: Your base walking speed is 30 feet.</p><p><strong>Skill Proficiencies</strong>:
      Sleight of Hand, Performance</p><p><strong>Tool Proficiencies</strong>: Weaponsmiths Kit, Demolitions Kit</p>
