name: Crystal Release Crystal Fruit
type: spell
img: systems/n5eb/assets/content/clans/shoton.webp
system:
  description:
    value: >-
      <p>You manifest a pink, blue, red, or green crystal dome around a creature of your choice within range designed to
      protect or trap a creature.</p><p>If this jutsu is cast targeting a willing creature, you manifest the crystal
      dome around them almost instantly. This dome intercepts all attacks and damaging effects except Genjutsu.</p><p>If
      this jutsu is cast targeting an unwilling creature, that creature makes a Dexterity saving throw being encased in
      the dome on a failed save. While inside the crystal dome, it intercepts all attacks and damaging effects except
      Genjutsu.</p><p>The dome an AC equal to your Ninjutsu save DC, Resistance to Cold Damage and Vulnerability to
      Lightning Damage and a number of Hit point equal to 6d8+15. A creature cannot willingly pass through the crystal,
      requiring it to be destroyed, dispelled, removed in order to move from the creatures current space.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost by 3 and the number of hit points
      the Dome has by 1d8+5.</p>
