name: Crystal Release Crystal Prison
type: spell
img: systems/n5eb/assets/content/clans/shoton.webp
system:
  description:
    value: >-
      <p>You manifest a pink, blue, red, or green crystalline structure, completely encasing a creature you touch
      within. This jutsu's cost and concentration costs cannot be reduced by any means except by Crystal Release: Jade
      Crystal Hexagonal Pillars.</p><p>Make a melee ninjutsu attack. On a hit, the target must succeed a Constitution
      saving throw, on a failed save you infuse your target with your Crystal Release Chakra for the next minute. At the
      beginning of each of its turns must succeed a Constitution (Chakra Control) check vs your Ninjutsu Save DC for the
      duration.</p><p>Each time a creature fails, their cellular structure begins to resemble that of a Crystal.</p><p>A
      creature who fails one or more times gains one rank of the Slowed Condition as it becomes hard to move the way
      they want.</p><p>A creature who fails two or more times gains the restrained condition as their cells begin to
      take on a crystalline make up solidifying and crystallizing them.</p><p>A creature who fails three or more times
      becomes incapacitated as their body is overtaken by crystalline cells.</p><p>A creature who fails five or more
      times becomes Petrified permanently, until you recast this jutsu on them, or a Ninjutsu with the medical Keyword
      that removes conditions of any type is cast on them at A-Rank or Higher.</p><p>If their Petrified figure is damage
      or destroyed in anyway, the creature petrified, is immediately killed, with no way to be revived.</p>
