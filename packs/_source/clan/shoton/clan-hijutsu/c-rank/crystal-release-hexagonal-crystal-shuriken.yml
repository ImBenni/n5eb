name: Crystal Release Hexagonal Crystal Shuriken
type: spell
img: systems/n5eb/assets/content/clans/shoton.webp
system:
  description:
    value: >-
      <p>You manifest a d6 stack of pink, blue, red, or green crystal shuriken. These shuriken have no bulk, and you can
      only ever have 1 Stack at a time. If you manifest another stack, the previous stack dissolves.</p><p>These
      shuriken have the same range as normal shuriken, deals a d8 earth damage and have the Deadly 3 weapon property.
      Weapon attacks made with these shuriken can be made using your Ninjutsu attack bonus. They also count as
      components for bukijutsu that require a ranged slashing weapon. If you score a critical hit with these shuriken,
      they shatter and splinter dealing half the damage dealt to all creatures within 5 feet of the original
      target.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost by 3 and the size
      of the stack by 1 step (D6&gt;D8&gt;D10&gt;D12)</p>
