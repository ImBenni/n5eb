name: Crystal Release Jade Crystal Hexagonal Pillars
type: spell
img: systems/n5eb/assets/content/clans/shoton.webp
system:
  description:
    value: >-
      <p>You manifest five, large pink, blue, red or green crystalline pillars around the edge of this jutsu's radius,
      with you in the center. Each of these pillars for the duration, counts as a Quake Shard.</p><p>For the duration,
      you and creatures of your choice within this jutsu's radius gains the following benefits</p><p>• Jutsu cast, with
      the Earth Release keyword, of a rank equal to or lower than this jutsu, can be cast without the Hand Seal (HS)
      requirements.</p><p>• Jutsu cast, with the Earth Release Keyword, that requires concentration, reduce
      concentration costs by -1. (Min 1.)</p><p>• Allied creatures, excluding yourself gain 6 DR (damage
      reduction)</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost by 3 and the DR
      by +2. If cast at A- Rank or above increase the cost reduction for concentrating on Earth Release jutsu to -2 (Min
      1.)</p>
