      harm and damaging creatures that get too close.</p><p>Ranged attacks against you deals reduced damage equal to
      2d6. This damage reduction doesn't count against lightning damage.</p><p>Creatures of your choice, who begins or
      ends its turn within 5 feet of you, take 3d6 earth damage.</p><p>At Higher Ranks: For each rank you cast this
