system:
  description:
    value: >-
      <p>You create a layer of crystalline chakra across your body designed to act as a second skin protecting you from
      powerful blows and crippling attacks.</p><p>You gain 4 DR (damage reduction) vs all sources, except Lightning.
      While you are gaining the benefit of this jutsu, you are counted as a Quake Shard of your own creation.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost by 3. If this jutsu is cast at
      B-Rank or higher, increase the DR to 8. If cast at A-Rank or higher, the duration, instead becomes 10 minutes. If
      cast at S-Rank or higher, increase the DR to 12</p>
