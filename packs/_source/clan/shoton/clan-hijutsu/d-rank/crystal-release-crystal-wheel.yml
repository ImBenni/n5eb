  description:
    value: >-
      <p>You manifest pink, blue, red, or green crystal ring around yourself that you cause to spin like a buzzsaw
      around you.</p><p>For this jutsu's duration, you increase your Movement speed by 5 x your Ninjutsu ability
      modifier, you ignore difficult terrain and creatures who would make an attack of opportunity against you takes 10
      earth damage as the crystal ring slashes into them as you pass them.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above D-Rank increase the cost by 3 and the damage by 5.</p>
