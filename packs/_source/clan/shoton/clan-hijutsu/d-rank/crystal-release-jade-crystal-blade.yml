system:
  description:
    value: >-
      <p>You manifest pink, blue, red, or green crystal blades on either arm of yours.</p><p>As an action on each of
      your turns, you can make two melee ninjutsu attacks against a creature you can see within 5 feet of you. On a hit,
      you deal 2d8 earth damage.</p><p>If you successfully hit a creature with both attacks, the target gains 2 ranks of
      bleeding.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost by 3 and the
      damage by 1d8.</p>
