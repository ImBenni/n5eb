system:
  description:
    value: >-
      <h2>Diamonds In The Rough</h2><p>The Shoton Clan is a clan that hails from the land of Sound. A Clan without a
      clear family name, but one which has produced many of prominent shinobi. This clan has an extreme affinity for
      earth release allowing them to convert any matter into crystals with enough chakra control. They have been known
      to serve the Otokage at some point in history, but its members have long since spread and assimilated into
      different villages and formed a multitude of different family names, becoming most prominent in the land of earth
      most recently.</p><hr /><h3>Shoton Traits</h3><p><strong>Recommended Ability Score Increase: </strong>+2 Con, +1
      Cha</p><p><strong>Speed: </strong>Your base walking speed is 30 feet.</p><p><strong>Skill Proficiencies:</strong>
      Nature, Survival</p><p><strong>Crystal Release Affinity:</strong> You begin with Earth Release Affinity</p>
