system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Synthetic Human Clan</p><p>You have used your immune system to improve the
      effectiveness of your poisons, making them even harder to overcome. You gain the following benefits;</p><p>•
      Increase your Intelligence or Wisdom score by 1, to a maximum of 20.</p><p>• Whenever you force a creature to make
      a Constitution Saving Throw to gain the envenomed or poisoned condition, the DC is increased by 1.</p><p>• You can
      create Poison in half the time and half the Ryo cost</p>
