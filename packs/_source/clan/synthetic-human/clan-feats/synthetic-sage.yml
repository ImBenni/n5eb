system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Synthetic Human Clan, Level 8+</p><p>You have attained greater control over
      your Corrupted Sage Chakra. You gain the following benefits;</p><p>• Increase your Dexterity or Intelligence score
      by 1, to a maximum of 20.</p><p>• While grappling a creature using your Soft Physique Modification feature, your
      movement speed is no longer reduced.</p><p>• While in your Corrupted Sage Mode, you gain the following
      benefits;</p><p>o The range of your Soft Physique Modification feature is increased by +10ft.</p><p>o Upon
      entering your Corrupted Chakra Mode, you gain additional number of temporary hit points and temporary chakra
      points equal to your proficiency bonus.</p><p>o Poison damage you deal is increased by 1 step, and ignores
      resistance to Poison damage (and treats immunity to Poison damage as resistance).</p>
