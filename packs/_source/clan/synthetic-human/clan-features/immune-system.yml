name: Immune System
type: feat
_id: SEheQJ7r92rXzfmm
img: systems/n5eb/assets/content/clans/synthetic-human.webp
system:
  description:
    value: >-
      <p>Beginning at 7th level you have a high resistance to poison and sickness. You are Resistant to Poison damage.
      Additionally, you roll at advantage to resist the effects of viruses and diseases on your body.</p><p>At 11th
      level your immune system is far greater than the others around you. Reduce all poison damage by your proficiency
      bonus. Additionally, you become immune to any virus or disease that you have overcome in the past, and you can
      provide antibodies to others via a blood transfusion. For each blood transfusion you create you must spend 1 hit
      die. When a creature uses a blood transfusion, they gain advantage to all saving throws to resist the effects of
      viruses and diseases for 1 hour.</p><p>At 18th level you gain immunity to poison damage and effects caused by
      Poison Damage</p>
    chat: ''
