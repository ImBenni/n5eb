img: systems/n5eb/assets/content/clans/synthetic-human.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, your body allows you to move in unnatural ways. By dislocating your body's joints and
      then using chakra to manipulate them, you are capable of extending and flexing in a supernatural way. </p><p>You
      can extend your arms 15 feet away whenever you want. While in combat, you may activate this feature as a free
      action. </p><p>While gaining the benefit of this feature, your unarmed attack range is 15 feet and you have
      advantage on grapple checks. </p><p>You may use Acrobatics instead of Athletics for those grapple checks. While
      gaining the range benefit, you suffer a -2 penalty to Taijutsu attacks. The range of this feature increases by 5
      feet at 7th, 11th, and 15th levels.</p>
    chat: ''
