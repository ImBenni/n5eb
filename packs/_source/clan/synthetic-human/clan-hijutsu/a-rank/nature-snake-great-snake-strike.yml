        description:
          value: >-
            <p>An evolved version of the Nature Release: Nature Snake Hijutsu. The user generates multiple snake
            constructs of chakra to swarm and attack all creatures in a 60-foot cone, originating from a point within 60
            feet. All creatures within range must make a Strength saving throw, taking 8d10 force damage and being
            knocked prone. Creatures who fail this saving throw by 5 or more become restrained until the start of their
            next turn, as they are constricted and restrained by snakes. On a successful saving throw, creatures take
            half as much damage and no further effects.</p><p>Alternatively, if you have access to a Nature Release, you
            may pick one of the following effects, replacing this jutsu's normal effects (excluding the fail by 5 or
            more effect);</p><p>• Earth: Creatures instead take 4d10 bludgeoning and 4d10 earth damage, and gain 2 ranks
            of Bruised on a failed saving throw.</p><p>• Wind: This jutsu gains an additional 30 feet of range and
            increases the size of its cone by +10ft. Creatures instead take 5d6 slashing and 5d6 wind damage and gain
            one rank of Bleeding on a failed saving throw.</p><p>• Fire: Creatures instead 14d4+14 fire damage and gain
            1 rank of Burned on a failed saving throw.</p><p>• Water: Creatures instead take 10d6 cold damage and gain 1
            rank of Chilled, fall prone, and are knocked back 15 feet on a failed saving throw. The affected area
            becomes a source of water for the next minute for jutsu of B-Rank or lower.</p><p>• Lightning: Creatures
            instead take 6d12 lightning damage and are Shocked and Weakened for 1d4 rounds on a failed saving throw
            (roll once, for all affected creatures)</p>
