name: Nature Release Nature Snake
type: spell
img: systems/n5eb/assets/content/clans/synthetic-human.webp
system:
  description:
    value: >-
      <p>The user creates a snake construct of chakra, sending it towards an enemy. Make a ranged ninjutsu attack, on a
      hit, the target takes 4d6 force damage and must make a constitution or be knocked back 30 ft. Alternatively if you
      have an elemental keyword, you may instead pick one of the following effects based on the Nature Release
      selected</p><p>• Earth: Target Creature takes 2d10 bludgeoning damage and 2d8 earth Damage and must also make a
      Constitution saving throw gaining the Weakened condition until the end of their next turn on a failure.</p><p>•
      Wind: The jutsu gains a Range of 60 Feet and deals 3d6 slashing and 3d6 wind damage.</p><p>• Fire: Target creature
      takes 2d8 force and 2d8 fire damage, and all creatures in a 25-foot cone behind the target creature must also make
      a Constitution saving throw, gaining two ranks of the burned condition on a failed save</p><p>• Water: Target
      creature takes 2d10 cold and 2d10 bludgeoning damage and is forced to make a Strength saving throw. On a failed
      save, the target creature is knocked back by 15 feet and becomes prone.</p><p>• Lightning: Target creature takes
      2d8 force and 2d8 lightning damage, and must make a Constitution saving throw, being Shocked for 1d4 rounds on a
      failed save.</p>
