name: Striking Shadow Snake Assault
type: spell
img: systems/n5eb/assets/content/clans/synthetic-human.webp
system:
  description:
    value: >-
      <p>The user buries his hands and summons a large amount of snakes that emerge from underground. Creatures in this
      radius must succeed a Dexterity saving throw, taking 2d8 piercing and 2d8 poison damage and must make a
      Constitution saving throw, gaining one rank of Envenomed on a Failure. On a successful dexterity save the creature
      only takes half damage. This jutsu ignores total cover.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and increase each damage type by 1d8 piercing.</p>
