name: Binding Glare Snake Spell
type: spell
img: systems/n5eb/assets/content/clans/synthetic-human.webp
system:
  description:
    value: >-
      <p>The user summons up to two snakes which crawl out from one's sleeves. Up to two creatures of your choice within
      the range of your unarmed attack must succeed a Dexterity saving throw, gaining the restrained condition until
      this jutsu ends and taking 2d8 bludgeoning damage on a failure. A restrained creature can attempt to end being
      restrained by succeeding a Strength saving throw on their turns.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d12. If cast at B-Rank, increase
      the amount of creatures to 3 and the radius by 5 feet. If cast at S-Rank, increase the amount of creatures to 4
      and the radius by 5 feet</p>
