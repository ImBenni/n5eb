    value: >-
      <p>In response to being harmed, the user's body disintegrates into dozens of small snakes and reform in the same
      spot moments later. Until the start of your next turn, you have a +4 Bonus to AC, including against the triggering
      attack. If a melee attack were to miss you thanks to this AC increase the creature who missed must succeed a
