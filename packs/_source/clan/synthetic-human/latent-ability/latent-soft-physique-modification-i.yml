system:
  description:
    value: >-
      <p>(You must have Latent Designated Existence) </p><p>Beginning at 1st level, you can spend 2 chakra to dislocate
      your body's joints and extend them up to 15 feet away. You can do this at any point during combat (no action
      required). While benefitting from this feature, your unarmed attack range is 15 feet, and you have advantage on
      grappling checks (can use Acrobatics instead of Athletics for grappling). However, while benefitting from this
      feature, you cannot use a weapon, Taijutsu attack rolls you make are at disadvantage, and you cannot benefit from
      any stances. You can end this feature at any point on your turn.</p>
