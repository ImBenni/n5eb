name: 6-Armed Predator
type: feat
img: systems/n5eb/assets/content/clans/tsuchigumo.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Tsuchigumo Clan, Level 4+</p><p>Your body begins to become more arachnid
      like when needed. You gain the following benefits;</p><p>• Increase your Strength or Dexterity score by 1, to a
      maximum of 20.</p><p>• As a Bonus Action, through body augmentation, you grow an additional 4 arms, 2 on either
      side in front and behind your original arms. With these additional arms, you can wield additional Web Weapons,
      occupying each hand, when applicable.</p><p>• A number of times equal to your Wisdom Modifier per Short Rest, when
      you take the Attack Action, you can make an additional attack using one web weapon you are holding. You can make
      this additional attack once per turn.</p>
