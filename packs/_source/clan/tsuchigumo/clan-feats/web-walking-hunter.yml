name: Web-Walking Hunter (Ch)
type: feat
img: systems/n5eb/assets/content/clans/tsuchigumo.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Tsuchigumo Clan, Level 4+</p><p>You are a nimble combatant, skilled in the
      underhanded ways of your people. You gain the following benefits;</p><p>• Increase your Dexterity or Wisdom score
      by 1, to a maximum of 20.</p><p>• You gain a climbing speed equal to your movement speed, and ignore difficult
      terrain created by jutsu you cast (automatically succeeding on their saving throws, if any). You can also wall
      walk without expending additional movement.</p><p>• While your Third Eye is active, you gain +X ranks of Mastery
      to your Stealth checks, up to the maximum Mastery for your level (X = 1/3rd your proficiency bonus).</p><p>• When
      using the Third Eye clan feature, you gain 120 feet of Darkvision.</p>
