name: Web-Weaving Predator
type: feat
img: systems/n5eb/assets/content/clans/tsuchigumo.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Tsuchigumo Clan, Level 8+</p><p>Creatures caught in your webs are far more vulnerable to your attacks as they find themselves totally defenseless.\_<br />You gain the following benefits:</p><p></p><p>• Increase your Strength, Dexterity or Intelligence score by 1, to a maximum of 20.\_</p><p><br />• Hostile creatures currently restrained, grappled or within difficult terrain as a result of a Tsuchigumo clan Hijutsu you cast are far more vulnerable than they believe they are, suffering a -2 penalty to their AC against you for the duration of the aforementioned effects.\_</p><p><br />• When you make a melee or ranged weapon or Taijutsu attack targeting a creature currently restrained, grappled or within difficult terrain as a result of a Tsuchigumo clan Hijutsu you cast, if your attack results are 10 or greater than the targets AC, you increase the attacks damage by +2 damage die.\_<br />This bonus damage die is not multiplied if you score a critical hit.</p>"
    chat: ''
