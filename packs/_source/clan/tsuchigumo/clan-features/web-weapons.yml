name: Web Weapons
type: feat
img: systems/n5eb/assets/content/clans/tsuchigumo.webp
system:
  description:
    value: >-
      <p>Also at 1st level, as a bonus action you can generate enough webbing to create Web weapons. </p><p>All Web
      Weapons have the Multiattack and Lethal 1 weapon properties. When you make a Web Weapon, you create any simple
      melee weapon or any simple or martial ranged weapon with the Ammunition property, that does not have the Heavy
      weapon property. </p><p>Weapons with the Ammunition property that you creature do not need to roll ammunition die
      as you create new ammunition from your webs with each attack.</p>
