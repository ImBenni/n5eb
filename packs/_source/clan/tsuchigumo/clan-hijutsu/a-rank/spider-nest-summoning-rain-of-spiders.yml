system:
  description:
    value: >-
      <p>You draw out one of your clans secret summoning scrolls, releasing a large nest of spiders that all attack in a
      30-foot radius, 60 feet tall cylinder centered on you. Creatures in the target area must make a Strength Saving
      Throw, being Restrained &amp; Incapacitated for the duration, on a failed save. Creatures affected by this jutsu
      can make an Athletics Check vs your Ninjutsu Save DC to escape at the end of each of their turns.</p>
