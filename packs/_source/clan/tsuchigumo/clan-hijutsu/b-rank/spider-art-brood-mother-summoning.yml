name: Spider Art Brood Mother Summoning
type: spell
img: systems/n5eb/assets/content/clans/tsuchigumo.webp
system:
  description:
    value: >-
      <p>Keywords: Hijutsu, Ninjutsu, Fuinjutsu</p><p>You weave handseals as you summon your clans ancestral protector,
      the Brood Mother Arachnid. This is a Large creature that acts on its own at the end of each of your turns. You can
      give it direction as a bonus action on your turn, in which if you do it gains a bonus +2 to its attacks and checks
      as a result of receiving direction, otherwise it will act in your favor attempting to cause harm to your enemies
      as seen in its stat block. It uses your Ninjutsu attack bonus and Save DC when an effect calls for it.</p><p>If it
      is killed, it is unsummoned and must spend at least 1 week regenerating, before it can be summoned again.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the Brood
      Mothers Arachnids hit points by 30</p>
