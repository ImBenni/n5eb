name: Spider Web Area
type: spell
img: systems/n5eb/assets/content/clans/tsuchigumo.webp
system:
  description:
    value: "<p>(You must know the Web Bind Tsuchigumo Clan Jutsu to cast this jutsu) You take time to spread a network of extremely thin and almost invisible webs.\_<br />For the duration of this jutsu creatures who enter the radius of this jutsu immediately alert you to their presence and location regardless of their stealth check.\_<br />You can also as an action target one creature whom you can see while both you and them are in the radius of your jutsu.\_<br />By ending this jutsu you attempt to ensnare the target by focusing on them and taking direct control of the webbing.\_<br />The target creature must succeed a Dexterity saving throw at disadvantage, coming under the effects of the Web Bind Tsuchigumo Clan Jutsu on a failed save and no further effects on a successful one.</p>"
