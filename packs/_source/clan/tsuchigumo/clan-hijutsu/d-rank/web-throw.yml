name: Web Throw
type: spell
img: systems/n5eb/assets/content/clans/tsuchigumo.webp
system:
  description:
    value: >-
      <p>You knead sticky webbing in your mouth and spit it out towards a creature you can see within range latching on
      to them and preparing to pull or throw them up to 30 feet from their original location. Target creature must make
      a Strength saving throw. On a failed save choose a space up to 30 feet away from the target creatures current
      space as you use your web to forcibly throw them into the selected space dealing 3d6 bludgeoning damage</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the
      distance you can throw a creature by 10 feet and the damage by 2d6.</p>
