img: icons/magic/control/debuff-chains-orb-movement-blue.webp
system:
  description:
    value: >-
      <p>As a reaction, select one creature you can see casting a jutsu whose rank is equal to or less than your
      Intelligence (or Wisdom) modifier.</p><p>This jutsu cannot have the Hijutsu keyword and you cannot copy a ninjutsu
      with a nature release or the medical keyword if you don't have access to them.</p><p>This jutsu is temporarily
      added to your jutsu list until you either copy another jutsu or take a rest.</p><p>Alternatively, you can also
      attempt to learn the jutsu if you succeed on a DC (13 + Jutsu Rank) ability check using the Jutsu's corresponding
      ability score (Ninjutsu, Genjutsu, or Taijutsu ability score).</p><p>On a success you permanently add the jutsu to
      your known list.</p><p>On a failure, you don't learn it and cannot attempt to again until you complete a long
      rest.</p><p>You can learn a number of jutsu this way equal to your proficiency bonus.</p><p>If you attempt to
      learn a jutsu while you already have the maximum possible learned from this feature, you unlearn one of the jutsu
      learned this way, replacing it. <strong>(D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5)</strong></p>
