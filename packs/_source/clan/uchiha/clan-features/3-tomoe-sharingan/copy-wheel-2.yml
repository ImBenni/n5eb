system:
  description:
    value: >-
      <p>You can only take this Sharingan ability if you have
      <strong>@UUID[Compendium.n5eb.clan.Item.3VC2Wsp6kJ8P3s2K]{Copy Wheel 1}.</strong></p><p>You can instead learn the
      jutsu, you're attempting to copy permanently, if you succeed a DC <strong>(15 + Jutsu Rank, D-Rank: 1, C-Rank: 2,
      B- Rank: 3, A-Rank: 4, S-Rank: 5)</strong> ability check using the jutsu's corresponding ability score (Ninjutsu,
      Genjutsu, or Taijutsu ability score).</p><p>On a success you add the Jutsu to your known list.</p><p>On a failure,
      you do not copy it, and cannot reattempt to until you complete a long rest.</p>
