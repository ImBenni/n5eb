system:
  description:
    value: >-
      <p>You can only take this ability If you already have
      <strong>@UUID[Compendium.n5eb.clan.Item.hXOZav8z7CAcokCY]{Sharingan Dodge 2}.</strong></p><p>When targeted by an
      attack, by spending 10 Chakra as a reaction, you instead can just cause the triggering attack to miss.</p><p>If
      you must make a Dexterity saving throw, you can choose to instead succeed taking no damage and suffering no
      effect.</p><p>This can only be done if you are not restrained or prone.</p>
