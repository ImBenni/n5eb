system:
  description:
    value: >-
      <p>If you have the <strong>@UUID[Compendium.n5eb.clan.Item.NMYwooTfaKFnTHYu]{Uchiha Awaiting Stance}</strong> Clan
      Jutsu on your known Jutsu list, when a creature's attack would miss you, you are able to, as a reaction, use the
      jutsu's effects as if they missed you while you had it casted at D-Rank, at no Chakra cost. </p><p>Beginning at
      9th level, you treat this casting a C-Rank, and B- Rank at 13th level. You may use this stance a number of times
      equal to your Taijutsu Ability Modifier pershort rest.</p>
