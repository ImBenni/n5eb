  description:
    value: >-
      <p>If you have the <strong>@UUID[Compendium.n5eb.clan.Item.3PYjuvOCfWOXVFWu]{Uchiha Shuriken Rain}</strong> clan
      jutsu on your known jutsu list, if you use both your action and bonus action to throw aweapon with the multiattack
      property, you instead treat it as if you casted the Jutsu at D-Rank at no Chakra Cost. </p><p>Beginning at 9th
      level, you treat this casting a C-Rank, and B-Rank at 13th level. You may use this feature a number of times equal
      to your Taijutsu Ability Modifier per short rest.</p>
