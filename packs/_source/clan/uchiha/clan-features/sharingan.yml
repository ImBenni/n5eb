system:
  description:
    value: >-
      <p>One of the Hidden Leaf Village's 2 great dojutsu. The Sharingan is an eye of extreme potential and flexibility.
      </p><p>At 3rd level you gain access to the <strong>@UUID[Compendium.n5eb.clan.Item.2B09h9ByO7heBR21]{1 Tomoe
      Sharingan}</strong>. You gain access to more tomoe as you reachigher levels. Activating your Sharingan costs a
      bonus action and remains active for 10 minutes. </p><p>You may only use abilities gained from this clan feature
      while it is active. You can use these abilities three times per Short Rest. </p><p>You gain an additional uses per
      Short Rests at 7th and 11th levels. You may spend 10 Chakra while your Sharingan is active to reset the number of
      uses you have as if you took a short rest.</p>
