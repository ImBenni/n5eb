name: Uchiha Flame Spiral
type: spell
img: systems/n5eb/assets/content/clans/uchiha.webp
system:
  description:
    value: >-
      <p>The ultimate Uchiha Fire Release. As part of the requirements of this jutsu, you must have the Sharingan
      active. You conjure three flaming tornados. Each tornado is a column with a radius of 5 feet, and a height of 30
      feet. Creatures within the tornadoes areas when you cast this jutsu and whose space the tornadoes pass through
      must make a Dexterity saving throw taking 10d10+10 Fire damage on a failed save or half as much on a successful
      one.</p><p>Additionally, a creature who would make a saving throw to resist the effects of this jutsu must also
      make a constitution saving throw, being burned on a failed save.</p><p>As a bonus action on each of your turns,
      you may command each tornado separately, moving them up to 60 feet each. A tornado cannot occupy the same space as
      another tornado. A creature cannot be affected by more than 1 tornado per turn.</p><p>The Flaming tornados can be
      dispersed with enough force. The Flaming Tornados has an AC equal to your Ninjutsu save DC, and hit points equal
      to ten times your Ninjutsu Ability Modifier. The Flaming Tornado counts as a flaming construct, has vulnerability
      to cold damage, and when damaged by Wind damage, regains hit points equal to the damage the jutsu would have
      dealt.</p>
