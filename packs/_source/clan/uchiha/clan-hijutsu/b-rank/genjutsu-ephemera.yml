name: Genjutsu Ephemera
type: spell
img: systems/n5eb/assets/content/clans/uchiha.webp
system:
  description:
    value: "<p>As part of the requirements of this jutsu, you must have the Sharingan clan feature active.\_<br />You look towards a target creature and attempt to place them into powerful illusion designed to torture them if they choose to not follow your command.\_<br />You can give them any 1-word command that they can reliably accomplish in 6 seconds.\_<br />If the command would cause harm to them in some way, this jutsu automatically ends.\_<br />If they submit to the command they perform it and continue to perform it, even if they already completed it.\_<br />They would repeat the same action forgetting that they already did the task for the duration.\_<br />If they choose to resist the command they must make a Wisdom saving throw.\_</p><p><br />Critical Success:</p><p>This jutsu ends and the target becomes immune to this jutsu for the next minute.\_</p><p><br />Success:</p><p>This jutsu ends and the target resists its effects.\_</p><p><br />Failure:</p><p>The target begin to experience a massive torrent of torturous visions of your choice, that both you and they can see.\_<br />Their fears, concerns, desires and regrets begin to materialize on the targets body in a variety of different ways of your description.\_<br />Each turn they begin not completing your request, they take 5d10 psychic damage, gain 1 rank of Concussed and 1 rank of confused.\_</p><p><br />Critical Failure:</p><p>Same as failure, but the damage die instead becomes a d12.</p>"
