    description: >-
      <p><strong>Max Ranks</strong>: 5</p><p>A Confused creature has difficulty distinguishing friend from foe and
      experiences lapsing judgement.</p><ul><li><p>A Confused creature suffers a -1 penalty to all Wisdom based checks,
      attack rolls, and saving throws for each rank it has.</p></li><li><p>A Confused creature who would target hostile
      or friendly creature with an attack, jutsu, feature or trait (even themselves) must first make a DC 8 Flat check.
      On a failure, they must target the closest creature to them, ignoring allied or hostile distinctions. For rank of
      Confused beyond the first, increase this DC by +1 (Max DC 12).</p></li><li><p>A Confused creature cannot choose
      targets when a jutsu, feature or trait would allow them to pick. All creatures in range become the target,
      ignoring ally or hostile distinctions.</p></li><li><p>As an Action, a Confused creature can make a DC 15
      Intelligence ability check, ending this condition on a success.</p></li></ul>
