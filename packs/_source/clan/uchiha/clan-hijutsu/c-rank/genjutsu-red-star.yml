name: Genjutsu Red Star
type: spell
img: systems/n5eb/assets/content/clans/uchiha.webp
system:
  description:
    value: "<p>You attempt to put a group of creatures under a unique and powerful Genjutsu.\_<br />The sun turns red and begins to slowly approaching.\_<br />Select a space you can see within range.\_<br />All creatures in a 20-foot radius sphere centered on this space must make a Wisdom saving throw.\_</p><p><br />Success:</p><p>This jutsu ends and the target resists its effects.\_</p><p><br />Failure:</p><p>creature gains 2 rank of fear against the sun and will try to escape any source of light opting to move into total darkness.\_<br />It must spend its entire turn looking for cover or concealment from all light sources.\_<br />A creature that begins its turn under any source of light takes psychic damage equal to 5d8 and remakes their save at the end of each of their turns, ending this genjutsu on a success.\_</p><p><br />Critical Failure:</p><p>Same as failure, but the target also takes 2d8 additional psychic damage for each rank of fear they have at the beginning of its turn.</p>"
