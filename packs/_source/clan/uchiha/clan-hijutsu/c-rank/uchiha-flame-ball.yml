system:
  description:
    value: >-
      <p>This is a unique variation of the "<strong>Fire Release: Great Fireball</strong>" Jutsu. </p><hr /><p>You Fire
      a stream of Fire 5 feet wide and up to 60 feet long in a straight line originating from you. This Fire stops at a
      space of your choice along this distance and expands into a large 20-foot radius sphere of blazing orange flame
      centering on the selected space. All creatures in both this Jutsu's stream and blazing sphere, must succeed a
      Dexterity saving throw. On a failed save they take 11d4+11 Fire damage and the burned condition on a failed save
      or half as much on a success.</p><hr /><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and damage by 2d4+2.</p>
