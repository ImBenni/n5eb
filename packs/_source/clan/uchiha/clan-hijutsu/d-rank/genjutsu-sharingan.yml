system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <strong>Sharingan</strong> clan feature active.
      </p><hr /><p>By making eye contact with a creature while your Sharingan is active, you are able to cast any
      Genjutsu of D-Rank or lower that you could learn at no additional Chakra cost with the Visual keyword, that does
      not require mobility (M), a Chakra seal (CS), a weapon (W) or ninja tools (NT) components and cannot have a range
      of self. </p><p>The genjutsu cast must have a casting time of 1 action or bonus action. The range of the genjutsu
      becomes the range of this jutsu and can only affect the target creature you are looking at. This can be done
      without breaking stealth.</p><hr /><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 4 and the rank of the Jutsu that can be cast by 1
      (D&gt;C&gt;B&gt;A&gt;S)</p>
