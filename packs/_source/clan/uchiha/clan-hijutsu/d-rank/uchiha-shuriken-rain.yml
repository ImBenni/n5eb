system:
  description:
    value: >-
      <p>You consume a stack of shuriken or Kunai, and launch them at once into the air. Creatures in the target area,
      must succeed a Dexterity saving throw. On a failed save, the target creature(s) take 5d4 Slashing damage and
      become restrained in place until the end of their next turn as they are pinned to the closest surface to them or
      half as much damage and no additional effects on a successful save.</p><hr /><p><strong>At Higher Ranks</strong>:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and damage by 2d4.</p>
