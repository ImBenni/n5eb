  description:
    value: >-
      <h2>The Curse of Hatred</h2><p>The Uchiha clan is one of the four noble clans of Konohagakure, reputed to be one
      of the village's strongest because of their Sharingan and natural battle prowess. After helping found Konoha
      decades ago, the Uchiha grew increasingly isolated from the village's affairs, culminating in most of their deaths
      during the Uchiha clan downfall. After the 4th great ninja war, they began to find footing and regrow. There are
      quite a few Uchiha now in the present day, though not as many who are shinobi.</p><hr /><h3>Uchiha
      Traits</h3><p><strong>Ability Score Increase</strong>: +2 Dex or Int, +1 Int or Wis (You cannot choose Int for
      both ASI's)</p><p><strong>Speed</strong>: Your base walking speed is 30 feet.</p><p><strong>Skill
      Proficiencies</strong>: Insight, Pick one between: Ninshou, Martial Arts, Illusions</p><p><strong>Passive
      Affinity</strong>: You have Fire Release affinity</p>
