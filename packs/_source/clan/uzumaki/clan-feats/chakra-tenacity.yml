name: Chakra Tenacity
type: feat
img: systems/n5eb/assets/content/clans/uzumaki.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Uzumaki Clan, Level 8+</p><p>Your Chakra pool isn't just vast, it's also immensely resilient to attack.\_<br />You gain the following Benefits:</p><p></p><p>• Increase your Constitution score by 1, to a maximum of 20.\_</p><p><br />• You gain resistance to chakra damage or chakra reduction- based effects.\_</p><p><br />• Your chakra cannot be absorbed by a hostile effect or attack.\_</p><p><br />• Your chakra costs cannot be increased by hostile effects.\_</p><p><br />• When you would attempt to cast jutsu while you are unable to mold Chakra, you can make a DC 10 + the rank of the jutsu, Constitution check to cast it, as if you could mold Chakra.\_<br />(D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S- Rank: 5.)</p>"
    chat: ''
