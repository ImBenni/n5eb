    value: >-
      <p>Category: Clan<br />Prerequisite: Uzumaki Clan, Level 12+</p><p><br />You've conditioned your body to generate
      more chakra as your push your limits.<br />You gain the following benefits:</p><p><br />• Increase your
      Constitution score by 1, to a maximum of 20.</p><p><br />• Your chakra point maximum increases by an amount equal
      to twice your level.</p><p><br />• When you gain a level and you benefit from the Wellspring of Chakra Clan
      feature, you double the bonus to your total chakra.</p>
