system:
  description:
    value: >-
      <p>Uzumaki's have a special secondary network of Chakra all their own known as their Chakra reserves. This reserve
      of Chakra can be call upon at will to slowly revitalize your normal Chakra pool. </p><p>Starting at 1st level, you
      materialize this second pool of Chakra, known as <em><strong>Reserve Cells</strong></em>. These cells are a
      product of this special secondary network allows you to remain fully charged and prepared for battle.</p><p>You
      have a number of <em><strong>Reserve Cells</strong></em> equal to your level per long rest. You can spend these
      cells to accomplish any of the following;</p><ul><li><p>As a bonus action, you can spend any number of cells,
      regaining 1d8 Chakra points, per cell spent. This increases to a d10 at 11th level.</p></li><li><p>When you would
      take a rest, you can spend up to two cells to regain additional +2 Chakra per chakra die
      rolled.</p></li><li><p>Beginning at 7th level, when you would take Chakra damage, you can, as a reaction, spend up
      to 3 cells to reduce damage taken by an amount equal to 1d10 + constitution, per cell spent.</p></li></ul>
    chat: ''
