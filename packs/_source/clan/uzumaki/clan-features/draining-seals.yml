name: Draining Seals
type: feat
_id: d2s22Kpqgr70TSLE
img: icons/sundries/documents/document-symbol-triangle-pink.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, when a creature gains any number of ranks of the <strong>Sealed</strong> condition, they
      increase the cost of their next jutsu by +2 for each rank of <strong>Sealed</strong> they gained. </p><p>Beginning
      at 7th level when a creature would fail a saving throw against a Jutsu you cast with the Fuinjutsu keyword, they
      take Chakra damage equal to the rank of the Fuinjutsu cast. <em><strong>(D-Rank: 10, C-Rank: 15, B-Rank: 20,
      A-Rank: 25, S-Rank: 30)</strong></em>. </p><p>Finally at 15th level, creatures with ranks of the
      <strong>Sealed</strong> condition that passes their saving throw vs a Fuinjutsu you cast takes half of the listed
      chakra damage this feature deals.</p>
