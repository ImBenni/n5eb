system:
  description:
    value: "<p>Using your knowledge of seals and Fuinjutsu, you surgically attempt to dismantle and break all jutsu you see within range, that is currently being maintained or is active.\_<br />As part of the activation of this jutsu, select a space you can see with range make a Ninjutsu ability check against a DC (13+ rank of the jutsu, D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5).\_<br />On a success you understand the inner workings of all active Ninjutsu and Genjutsu of the result rank or lower in range and how to break them, immediately ending its effects.\_<br />You decide which jutsu you want to affect when you cast this jutsu.</p>"
