name: Adamantine Barrier
type: spell
img: systems/n5eb/assets/content/clans/uzumaki.webp
system:
  description:
    value: >-
      <p>You expertly weave a net creating an impregnable barrier using your adamantine sealing chains.</p><p>The
      barrier appears at a point you can see within range. It can be free floating or resting on a solid surface. You
      form it into a sphere with a 15-foot radius. It lasts for the duration.</p><p>If the wall cuts through a
      creature's space when it appears the creature is pushed to one side of the wall. (You decided which side)</p><p>If
      a hostile creature attempts to move through the barrier without the caster's permission, it must make a charisma
      saving throw. On a failed save, it cannot push through the barrier for the remainder of the
      turn.</p><p>Additionally, for the duration of the jutsu, any creatures outside the barrier who targets a creature
      inside the barrier with an attack or jutsu, must make a charisma saving throw. On a failed save the creature must
      choose a new target outside of the barrier, or lose the attack or jutsu. Area of effects can still move through
      the barrier as if it wasn't there.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3 and increase the size of the barrier by 5ft.</p>
    chat: ''
