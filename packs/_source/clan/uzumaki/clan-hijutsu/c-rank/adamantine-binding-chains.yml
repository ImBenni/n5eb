name: Adamantine Binding Chains
type: spell
img: systems/n5eb/assets/content/clans/uzumaki.webp
system:
  description:
    value: >-
      <p>Your body produces 4 large chakra-based chains from your back that you control as if they were extensions of
      your body. They act on your order all at the same time, targeting the same creature. As a bonus action on your
      turn, you may have the chakra chains act using either of the following abilities.</p><p>• Whip: Make a ranged
      Ninjutsu attack against a target creature, dealing 4d10 Chakra Damage on a hit.</p><p>• Bind: Select one creature
      you can see within range. The target creature must make a Strength Saving Throw. On a failed save, their movement
      is reduced by half and cannot make hand signs (HS). Additionally, the affected creature cannot gain bonuses to
      their movement or take the Dash action for the duration. A creature can remake the saving throw to end this effect
      as an Action.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this
      jutsu by 3, the damage by 2d10 and the number of creatures you can target with Bind by +1.</p>
