system:
  description:
    value: >-
      <p>You inscribe a Chakra seal onto the palm of your hand and manifest one large Chakra-based chain from a location
      of your choice on your body. Make a ranged Ninjutsu attack against a creature you can see within range, as your
      Chakra chain smashes into them, dealing 4d6 force damage and increasing the base cost of their next jutsu cast by
      +5</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3,
      damage by 2d6 and the base cost increase by +5.</p>
