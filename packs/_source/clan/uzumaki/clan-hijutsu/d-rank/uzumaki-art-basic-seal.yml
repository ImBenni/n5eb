name: Uzumaki Art Basic Seal
type: spell
img: systems/n5eb/assets/content/clans/uzumaki.webp
system:
  description:
    value: >-
      <p>You inscribe a Chakra seal onto the palm of your hand and create a three-point seal formation and attempt to
      seal away a large portion of a target creature's Chakra by slamming the seal onto the creature for a limited time.
      Make a melee ninjutsu attack. On a hit, the target takes 4d6 chakra damage and gains a rank of Sealed.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the chakra
      damage by 2d6. If this jutsu is cast at B-Rank or higher, increase the number of ranks of Sealed by 1. If this
      jutsu is cast at S-Rank increase the number of ranks of Sealed by 2.</p>
