system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Vesper Clan</p><p>You learn how to use weaponry alongside your Vesper Clan
      Techniques. You gain the following benefits;</p><p>• Using your dark powers with weaponry, you learn a new Vesper
      Hijutsu, Tool of Night.</p><p>• When you score a Critical Hit against a creature with a weapon attack or Taijutsu
      attack, it gains 1 rank of Fear against you, once per turn, per creature.</p><p>• When you cast a Bukijutsu while
      benefitting from the Claws of Night jutsu, you may pay half the cost of the Bukijutsu again to deal an additional
      1d8 Necrotic Damage, once per casting. Increase this damage by 1 dice for each rank it is cast beyond
      D-Rank.</p><p>• When you would benefit from Claws of Night to due Vampyr, you may choose to instead benefit from
      Tool of Night, with the Necrotic damage being increased to 1d8.</p>
    chat: ''
