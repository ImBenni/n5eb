system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Vesper Clan, Level 8+</p><p>Your body becomes able to mend wounds, seemingly
      on its own. The blessing of the sage bat dwells within you, allowing you to make the darkness into your ally. You
      gain the following benefits;</p><p>• Increase your Constitution by +1, to a maximum of 20.</p><p>• Your bodies
      natural ability to heal over time has become greatly accelerated. As a bonus action, you may spend up to 3 hit
      die. Roll each hit die spent, and gain the result as hit points.</p><p>• When you would lose concentration of the
      Vampyr jutsu as the result of damage, you may spend 5 chakra to automatically succeed the concentration
      check.</p><p>• Twice per long rest, while you are in Darkness or are under Moonlight, you may turn invisible for 1
      minute or until you deal damage, cast a jutsu that would break stealth, or take damage.</p>
