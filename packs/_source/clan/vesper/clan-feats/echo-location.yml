name: Echo-Location
type: feat
img: systems/n5eb/assets/content/clans/vesper.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Vesper Clan</p><p>Attuning yourself more into your Sage Bat ancestry, you
      develop a knack for perceiving the world using soundwaves alone. You gain the following benefits;</p><p>• Increase
      your Wisdom or Charisma by +1, to a maximum of 20.</p><p>• You have gained the ability to create a high frequency
      noise that bounces around the area and gives you pinpoint knowledge of the environment. At the start of your turn,
      you may activate this ability. Until the end of your turn, you gain Blindsight with a range of 100ft. If you use
      this ability within a cavern or other confined area where noise can easily travel, the range is instead 160ft. You
      may use this ability a number of times equal to your Proficiency bonus, and regain all uses on a Short
      Rest.</p><p>• You gain proficiency in Perception, or +1 ranks of Mastery if already proficient.</p><p>• Your
      Passive Perception when using sound is increased by +5.</p>
