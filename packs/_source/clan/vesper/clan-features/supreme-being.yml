name: Supreme Being
type: feat
_id: rPb79vbd4sUS41w0
img: systems/n5eb/assets/content/clans/vesper.webp
system:
  description:
    value: >-
      <p>At 18th level, you gain additional features to your Superior Being feature;</p><p>• If you would roll below a
      13 on the d20 on an initiative roll, you treat your d20 roll as a 13. You may also cast a single Vesper Hijutsu,
      Taijutsu, or Genjutsu with a duration greater than instant that does not affect a hostile creature, as part of
      rolling initiative.</p><p>• Any Vesper clan features or jutsu that would be inhibited by Sunlight to any degree,
      lose this weakness. Any Vesper clan features or jutsu that require darkness can now be used to their full power
      regardless of the current light level.</p><p>• Once per round, you may command a creature Charmed by you to one
      Action that they are able to take. Each time you command a creature this way, they may reattempt their saving
      throw to end the Charmed condition after the Action is performed.</p>
    chat: ''
