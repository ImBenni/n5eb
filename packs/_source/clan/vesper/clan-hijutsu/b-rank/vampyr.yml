name: Vampyr
type: spell
img: systems/n5eb/assets/content/clans/vesper.webp
system:
  description:
    value: >-
      <p>You tap deep into your bloodline, unleashing a similar power to what the great Bat Sage once had, becoming a
      true creature of darkness. For the duration, gain the following features;</p><p>• You gain a +2 bonus on all
      Strength, Dexterity and Charisma skill checks and saving throws.</p><p>• You benefit from the Claws of Night jutsu
      at no extra cost and the damage of the claws increases to 2d8.</p><p>• Your Speed increases by 15ft, and you do
      not provoke attacks of opportunity.</p><p>• Once per turn, you may deal an additional 2d4 Necrotic Damage when
      dealing damage of any kind.</p><p>If you are within Dim Light or Darkness, you gain additional benefits;</p><p>•
      Increase the bonus to Strength, Dexterity, and Charisma skill checks and saving throws by +1 (+3), and gain this
      bonus on attack rolls made using these ability scores.</p><p>• Increase your movement speed further by +15
      feet.</p><p>• Each time a creature would gain any ranks of Charmed or Fear from you, increase the total by 1</p>
