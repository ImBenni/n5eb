name: Misty Leap
type: spell
img: systems/n5eb/assets/content/clans/vesper.webp
system:
  description:
    value: >-
      <p>Your form turns into that of a fine mist. You may move up to 40ft in any direction, including up. You are able
      to fit through small gaps with ease. At the end of this movement, you return to your normal state. If you cast
      this jutsu whilst moving against heavy wind, you only move up to half the maximum distance.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the distance you
      move by 20 feet.</p>
