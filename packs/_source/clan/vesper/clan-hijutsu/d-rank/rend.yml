name: Rend
type: spell
img: systems/n5eb/assets/content/clans/vesper.webp
system:
  description:
    value: >-
      <p>To cast this jutsu, you must be benefitting from the Claws of Night jutsu. You lash out at a creature with your
      claws, attempting to unleash the blood within.</p><p>Make 2 melee Taijutsu Attacks, each dealing your [Unarmed
      Damage] + 1d6 Necrotic Damage, but do not add your ability modifier to the damage dealt. For every two attacks you
      hit with this jutsu, the target gains 1 rank of Bleeding.</p><p>Until the end of the current turn, you may target
      one affected creature with a Taijutsu with the Finisher keyword, as an action or bonus action, regardless of
      range, ignoring the jutsu's listed casting time.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3. If cast to C-Rank or higher, add half your ability modifier to the
      damage of this jutsu. If cast to B-Rank or higher, make an additional attack with this jutsu. If cast to A-Rank or
      higher, you instead add your full ability modifier to the damage of this jutsu. If cast to S-Rank or higher, make
      an additional attack with this jutsu</p>
