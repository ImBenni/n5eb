  description:
    value: >-
      <h2>Nocturnal Hunters</h2><p>The Vesper are a custom homebrew clan created by Schmeelo.</p><p>Tracing their
      origins back to a family that accepted a blood pact with a Sage Bat, those of the Vesper Clan find themselves
      gifted with features akin to a bat, but also enhanced strength and speed. Preferring the night to day, they prowl
      the streets of villages to find their targets.</p><hr /><h3>Vesper Traits</h3><p><strong>Recommended Ability Score
      Increase</strong>: +2 Cha, +1 Str or Dex</p><p><strong>Speed</strong>: Your base walking speed is 30
      feet.</p><p><strong>Skill Proficiencies</strong>: Acrobatics, Stealth</p><p><strong>Visual Literacy</strong>: All
      ability scores are counted as being +2 higher, for the purpose of casting Higher Ranked Genjutsu with the Visual
      Keyword through any Ability Score Restrictions.</p><p></p>
