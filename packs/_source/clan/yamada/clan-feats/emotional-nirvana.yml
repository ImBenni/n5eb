system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Yamada Clan, Level 8+</p><p>You have refined your control over your
      emotions. You gain the following benefits:</p><p>• Increase your Wisdom score by +1, to a maximum of 20.</p><p>•
      You gain an additional number of Balance Die equal to your Wisdom modifier (Min. 1).</p><p>• When you would roll
      for initiative and have no Balance Die remaining, you regain 2 Balance Die.</p><p>• When you roll a 1 or 2 on a
      Balance Die you may reroll it taking the second result. You can benefit from this feature no more than twice per
      round.</p>
