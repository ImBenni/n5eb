system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Yamada Clan, Level 12+</p><p>Your swordsman skills have reached their
      absolute peak, you have been granted the name Asaemon. You gain the following benefits:</p><p>• Increase your
      Strength or Dexterity score by +1, to a maximum of 20.</p><p>• Once per turn, when dealing damage with a Katana or
      Odachi, you may roll the damage twice and take whichever result.</p><p>• When you use Single-Swing Style I or
      Single-Swing Style II to make one attack instead of multiple, you may spend 5 chakra or 1 Balance die to treat it
      as if you made one additional attack with the feature or jutsu</p>
