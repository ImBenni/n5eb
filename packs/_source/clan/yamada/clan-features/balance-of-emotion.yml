name: Balance of Emotion
type: feat
_id: f5qL4uuBCotPzZNF
img: systems/n5eb/assets/content/clans/yamada.webp
system:
  description:
    value: >-
      <p>At 3rd level, as a Yamada you have learned to find the balance in between emotions, you gain a new resource
      called Balance die, which are d6's. You have a number of Balance die equal to half your level (rounded up).
      </p><p>You can spend Balance die on the following effects once per turn and regain any spent Balance die on a Long
      Rest.</p><ul><li><p>Balanced Edge: When you deal damage with a weapon or taijutsu attack using a Katana or Odachi,
      you can spend any number of Balance die you have remaining, adding them to the damage roll. Balanced Focus: When
      you make a weapon or Taijutsu attack using a Katana or Odachi and would roll a natural 1 on the d20, you may spend
      2 Balance Die, rerolling the d20 and taking the higher result for the attack. If you score a hit this way, add one
      of the Balance die rolled to the damage dealt.</p></li><li><p>Balanced Precision: When you make a weapon or
      taijutsu attack using a Katana or Odachi. You may spend 1 Balance die, adding it to the attack
      roll.</p></li><li><p>Balanced Insight: When you force a creature to make a saving throw with a bukijutsu using a
      Katana or Odachi, you can spend and roll 1 Balance die, adding half the result to your Save
      DC.</p></li></ul><p>When you reach 15th level, you may use 2 of these effects per turn</p>
