system:
  description:
    value: >-
      <p>Finally at 18th level, you have perfected your ability to cut off all emotion from your blade, acting solely on
      instinct. You can enter the Empty Blade form as a bonus action on your turn by spending 5 Balance Die, while in
      this form you gain the following benefits:</p><p>• Your Katana and Odachi deal an additional die of
      damage.</p><p>• If you start your turn with no Balance Die, you gain a number equal to half your Wisdom Modifier
      (min 1).</p><p>• You can declare all of your actions for the turn, and then condense all attacks from them into
      one single decisive swing dealing all damage and effects. This feature works across actions and jutsu.</p><p>You
      can maintain this stance for 1 minute, after which you are emotionally drained and can no longer use your Balance
      of Emotion clan feature until you complete a full rest.</p>
