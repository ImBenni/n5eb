system:
  description:
    value: >-
      <p>Beginning at 15th level, when you cast a Bukijutsu that uses a Katana or Odachi that has multiple attacks, you
      may choose to instead make one attack and deal the damage from all attacks. If you were to score a Critical Hit
      while using this feature, you do not double all damage dice, only the damage dice of what would have been the
      first attack</p>
