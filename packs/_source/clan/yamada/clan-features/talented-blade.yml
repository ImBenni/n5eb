system:
  description:
    value: >-
      <p>Beginning at 1st level, when you deal damage with a Katana or Odachi using Strength or Dexterity you add half
      (rounded down) of the other ability modifier to the damage. This increases to the full modifier at 15th level. You
      cannot add the same modifier more than once to a damage roll this way.</p><p>Also, you may use Dexterity when
      calculating the Attack, Damage, and Save DC of your Yamada Hijutsu.</p>
