name: Multi-Swing Style Third Cut
type: spell
img: systems/n5eb/assets/content/clans/yamada.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast directly after you hit with Multi-Swing Style: Second Cut and must target the same
      creature. After performing the diagonal slash, you bring your sword upward in the opposite direction creating an
      "X" slash across their chest. Make a melee taijutsu attack on a creature within range. On a hit you deal your
      weapons damage + 6d10 and the target must succeed a Constitution saving throw or become stunned until the end of
      their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this
      jutsu by 3 and the damage by 1d10.</p>
