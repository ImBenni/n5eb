name: Multi-Swing Style Second Cut
type: spell
img: systems/n5eb/assets/content/clans/yamada.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast directly after you hit with Multi-Swing Style: First Cut and must target the same
      creature. After slashing the creature's stomach, you bring the blade up and attempt to strike diagonally across
      their chest. Make a melee taijutsu attack on a creature within range. On a hit you deal your weapons damage + 4d8
      and the target must make a Constitution saving throw gaining 2 ranks of bleed on a failure. If they roll a 1 or 2
      on the saving throw, they instead gain 4 ranks of bleed.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d8</p>
