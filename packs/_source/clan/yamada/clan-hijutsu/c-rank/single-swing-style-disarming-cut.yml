name: Single-Swing Style Disarming Cut
type: spell
img: systems/n5eb/assets/content/clans/yamada.webp
system:
  description:
    value: >-
      <p>You attempt to disarm an opponent. Make a melee taijutsu attack on a creature within range. On a hit you deal
      your weapons damage + 6d6 , and the target must make a Strength saving throw dropping their weapon on a failure.
      If you roll 4 or more 6's on a d6, with this jutsu's damage die, you cut off the creature's arm at the
      elbow.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and the damage by 1d6.</p>
