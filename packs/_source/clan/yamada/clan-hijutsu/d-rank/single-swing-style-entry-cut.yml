system:
  description:
    value: >-
      <p>You quickly dash forward as you draw your sword with the intent to finish the battle before it begins. Make a
      melee taijutsu attack on a creature within range. On a hit you deal your weapons damage + 2d6. If this attack
      scores a critical hit the creature is counted as surprised for the first round of combat.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 the damage by 1d6, and the
      critical threat range by +1.</p>
