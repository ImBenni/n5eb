name: Single-Swing Style Quick Cut
type: spell
img: systems/n5eb/assets/content/clans/yamada.webp
system:
  description:
    value: >-
      <p>Keywords: Bukijutsu, Hijutsu</p><p>You strike so fast your enemy doesn't have time to react. Make a melee
      taijutsu attack on a creature within range. On a hit you deal your weapons damage + 3d6. If the target would cast
      a Jutsu as a Reaction to the damage you deal, the cost of their jutsu is increased by +6 due to the strain
      required to keep up with your strike. If their jutsu or choice of reaction, does not cost chakra, they must spend
      12 chakra to take their reaction.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3 and the damage by 2d6 and the extra cost to take a reaction by +4.</p>
