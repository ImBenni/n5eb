  description:
    value: >-
      <h2>Single-Swing Style</h2><p>The Yamada are a custom homebrew clan created by KadenUchiha. The Yamada are sword
      testers and executioners, who spend their lives honing their ability to kill an opponent with a single swing. They
      often work as executioners as their ability to easily decapitate someone makes the prisoners suffer as little as
      possible. As part of their training, they spend a great deal of time deepening their understanding of the human
      body, it is not uncommon to find a Yamada working in the morgue dissecting corpses to better understand the ways
      to slice a human. When performing executions, the Yamada clan's doctrine is that the condemned should not feel any
      pain or emotions coming from their swords and that they must try to hone their skills to perform an ideal cut that
      falls within that category.</p><hr /><h3>Yamada Traits</h3><p><strong>Recommended Ability Score Increase</strong>:
      +2 Dex, +1 Str or Wis</p><p><strong>Speed</strong>: Your base walking speed is 30 feet</p><p><strong>Skill
      Proficiency</strong>: Martial Arts, Medicine</p><p><strong>Tool Proficiency</strong>: Medicine
      Kit</p><p><strong>Weapon Proficiency</strong>: Katana, Odachi</p>
