    value: "<p>Category: Clan</p><p>Prerequisite: Yamanaka Clan</p><p>You've learned to adapt your mental acuity to keep your opponent's guessing, you gain the following benefits:</p><p></p><p>• Increase your Wisdom or Charisma by 1, to a maximum of 20.\_</p><p><br />• You may use your Charisma instead of Wisdom as your Genjutsu ability modifier.\_</p><p><br />• You gain a Yamanaka Boon that you qualify for.\_</p><p><br />• You can learn and create Yamanaka Hijutsu in half the time.</p>"
