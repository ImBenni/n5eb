system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Yamanaka Clan, Mind Body Transfer, Mind Body Disturbance, Level 16+</p><p>You've learned how to combine the two most prolific jutsu in your clans history, manifesting a unique capability with both.\_<br />You gain the following Benefits:</p><p></p><p>• When you would cast Mind Body Transfer or Mind Body Disturbance, you may cast the other as a part of the same action, but they must be cast at the same rank.\_<br />You can cast them both in this way twice per long rest.\_</p><p><br />• When you would cast both Mind Body Transfer and Mind Body Disturbance in the same action, you must combine them both into a new jutsu known as Psycho Mind Flux.\_<br />The new jutsu cast is cast at the same rank as the previous two jutsu, and its cost is the combined cost of them both.</p>"
