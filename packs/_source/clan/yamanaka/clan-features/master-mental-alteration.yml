name: Master Mental Alteration
type: feat
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: "<p>Yamanaka are masters of mental afflictions and alterations.\_<br />Starting 11th level, when a creature would critically fail a saving throw against a Genjutsu you cast, you can inflict them with one a unique Mental condition known as Stupefied.\_<br />A Stupefied creature suffers the following effects.\_</p><ul><li><p>A stupefied creature suffers a -1 penalty to all Intelligence based ability checks, skill checks, attack rolls, and saving throws.\_</p></li><li><p>A stupefied creature increases the cost of jutsu they cast by +2.\_</p></li><li><p>A stupefied creature cannot concentrate on more than one jutsu at a time.\_</p></li><li><p>A stupefied creature can be afflicted further with multiple applications of this condition.\_If a stupefied creature suffers another rank of stupefied.\_<br />They suffer another penalty to Intelligence based ability checks, skill checks, attack rolls and saving throws and further increase the cost of jutsu they cast.\_</p></li><li><p>At the end of a stupefied creatures turn, they make a DC 15 check Wisdom ability check ending this condition on a success.</p></li></ul>"
    chat: ''
  source:
    custom: ''
    rules: n5eb
    book: Naruto 5e
