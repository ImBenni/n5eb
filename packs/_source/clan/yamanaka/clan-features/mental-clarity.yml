name: Mental Clarity
type: feat
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: "<p>The Yamanaka are adept at mind control, suggestion, alteration, and affliction, making them far more suited to resist such attempts.\_</p><p>Starting at 7th level, you gain a 1d4 bonus to all saving throws against Genjutsu with the Unaware keyword, and advantage on Insight checks against creatures attempting to lie to you.\_</p><p>Beginning at 11th level as a bonus action, you can target one creature you can see within 60 feet and make a Wisdom or Charisma (Insight) check vs a DC (8 + their level) to learn either the targets Wisdom or Charisma score.\_<br />You can do this a number of times equal to your proficiency bonus per long rest</p>"
