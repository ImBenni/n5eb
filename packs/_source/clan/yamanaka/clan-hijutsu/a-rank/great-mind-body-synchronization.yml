name: Great Mind-Body Synchronization
type: spell
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: >-
      <p>You focus all of your being inwards, and open your mind to all willing creatures within a mile of you,
      establishing a telepathic link, with the ability to transfer information and lend aid at the speed of
      thought</p><p>Until the jutsu ends, you and the targets are aware of all creatures under the effects of this
      jutsu, and can instantaneously share words, images, sounds, and other sensory messages with any number other
      creatures affected by this jutsu, and the recipient is aware of who communicates with them.</p><p>Additionally,
      when an affected creature casts a Ninjutsu or Genjutsu, they use the highest Ninjutsu or Genjutsu ability modifier
      for attack rolls and save DC.</p><p>Lastly, the passive perception and passive insight of each creature affected
      increases by half of your proficiency bonus, and their AC is increased by +1</p>
