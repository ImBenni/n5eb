name: Mind Puppet Switch Cursed Seal
type: spell
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: >-
      <p>You take a puppet, doll, or an item of humanoid shape, no smaller than 1 size category of the target and place
      a secret Yamanaka sealing jutsu on the item. You can only have one such item created at a time and creating
      another destroys the existing item. You create conditions and triggers for the seal beforehand and place them on
      the item. Once placed, when a creature triggers the chakra seal, the triggering creature must immediately succeed
      a Charisma Saving throw against your Genjutsu or Ninjutsu save DC (Whichever is higher).</p><p>On a failed save,
      the target creature's consciousness is sealed inside of the item used. While sealed, the target creatures' body
      immediately becomes Incapacitated as their consciousness is now locked away inside of an object of the user's
      choice. They do not have the capacity to make any further saves unless their original body is damaged, in which
      case they can attempt a Charisma Saving Throw to escape. If the item is destroyed this jutsu ends and the
      creature's consciousness attempts to re-enter their body. If the body is dead, their consciousness is trapped
      wandering unable to bind to anyone or anything, they are effectively dead and cannot be revived</p>
