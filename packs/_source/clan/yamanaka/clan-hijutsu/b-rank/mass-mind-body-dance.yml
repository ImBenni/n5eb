name: Mass Mind Body Dance
type: spell
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: "<p>You issue a course of action (limited to a sentence or two) and influence up to 6 creatures of your choice that you can see and can hear you within range. Each target must make a Charisma saving throw against your Genjutsu save DC. On a failed save it pursues the course of action to the best of its ability. A creature cannot be ordered to harm themselves in any way or be made to perform an action that they know would harm themselves as a result.\_</p><p>The commanded action will continue to be attempted the entire duration. If the activity is completed in a shorter time, the jutsu immediately ends. Creatures are fully conscious of their actions, but cannot stop themselves for the duration of this jutsu.</p><p>If a creature would take damage of any kind for the duration, they remake the Saving throw at Advantage.</p>"
