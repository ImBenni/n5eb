name: Mind Body Augmentation
type: spell
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: >-
      <p>Using the Yamanaka clans propensity for mental exploration, you are able to enhance the mental receptors of a
      willing creature you can touch, within range. Pick one between Intelligence, Wisdom and Charisma. For the
      duration, the affected creature gains proficiency in the chosen ability scores saving throw. A creature that
      already has proficiency in the chosen score instead gains a +2 bonus to saving throws made with said
      score.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by
      3. If this jutsu is cast at A-Rank, you may select +1 additional creature.</p>
    chat: ''
