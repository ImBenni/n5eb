name: Mind Clone Technique
type: spell
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: >-
      <p>You split your consciousness into two identical clones of each other. You then perform the mind body transfer
      as normal on up to two target creatures you can see within range. Both creatures must make a Charisma save against
      your Genjutsu save DC. On a failed save target creature, you transfer your consciousness into your target's body
      for 1 minute. They are controlled by you as if their body was yours. On a successful save, you fall prone until
      the beginning of your next turn unable to move or act otherwise until your consciousness returns to your body.
      Each body is controlled by a separate consciousness and therefore do not know what the other is thinking but will
      act as you would for the duration.</p>
