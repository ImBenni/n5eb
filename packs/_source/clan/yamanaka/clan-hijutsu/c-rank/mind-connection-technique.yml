system:
  description:
    value: >-
      <p>You create a temporary telepathic link between yourself and a willing creature with which you are familiar and
      within range. Until the jutsu ends, you and the target can instantaneously share words, images, sounds, and other
      sensory messages with one another and the target recognizes you as the creature it is communicating with. The
      target must be able to understand the messages and pictures you are sending it in order for it to comprehend your
      intentions.</p>
