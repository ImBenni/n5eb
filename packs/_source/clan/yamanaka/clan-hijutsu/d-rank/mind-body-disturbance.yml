system:
  description:
    value: >-
      <p>You perform a modified version of the Mind body transfer technique on a humanoid creature you can see within
      range disassociating the mind and bodies activities and then forcing them to reset causing a significant amount of
      Psychic damage to the creature. Target creature must succeed a Charisma saving throw. On a failed save target
      creature takes 3d8 Psychic Damage and is Dazed or half as much damage on a successful one.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D- Rank, increase the cost of this jutsu by 3 and damage by 2d8</p>
