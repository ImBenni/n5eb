name: Mind Detection Technique
type: spell
img: systems/n5eb/assets/content/clans/yamanaka.webp
system:
  description:
    value: >-
      <p>Using the Yamanaka Clan family teachings, you manifest a minor telepathic field around yourself. You become
      aware of all creatures who are capable of sentient thought within 90 feet of you. While you are aware of a
      creature presence it does not automatically reveal them from stealth but you do become aware of the direction they
      are in relation to you. Creatures whom you are not familiar with or whom you have sensed before with this jutsu
      are immediately recognizable, being able to distinguish who they are from memory alone.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at C-Rank,
      the duration becomes 10 minutes. If this jutsu is Cast at B-Rank, the radius becomes 500 feet. If this jutsu is
      cast at S-Rank, the radius becomes 1 mile.</p>
