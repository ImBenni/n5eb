  description:
    value: >-
      <h2>Impossible To Pin Down</h2><p>The Yamanaka Clan is a family of shinobi found in Konohagakure. They specialize
      in mind related techniques, and they own and run a flower shop in the village. They traditionally lead the Konoha
      Barrier Team. The members of this clan specialize in mind-related techniques which makes them experts at
      intelligence gathering, espionage and interrogation amongst other things. They have also displayed sensory
      abilities and their techniques include transferring their consciousness, reading minds and communicating
      telepathically. The Yamanaka clan has a special relationship with the Akimichi and Nara clan. For generations,
      members of these three families have formed an "Ino–Shika–Chō Trio", named after the first part of the names of
      the members.</p><hr /><h3>Yamada Traits</h3><p><strong>Recommended Ability Score Increase</strong>: +2 Wis or Cha,
      +1 Int</p><p><strong>Speed</strong>: Your base walking speed is 30 feet.</p><p><strong>Skill
      Proficiencies</strong>: Illusions, Insight</p><p><strong>Yamanaka Hijutsu</strong>: You know 1 additional Yamanaka
      Clan D-Rank Jutsu.</p>
