system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Yoton Clan, Level 8+</p><p>Blazing chakra runs through your blood, making you far more powerful than anyone else could even fathom.\_<br />You gain the following benefits:</p><p></p><p>• Increase your Intelligence or Constitution score by 1, to a maximum of 20.\_</p><p><br />• Yoton clan Hijutsu you cast deals additional damage equal to your Constitution modifier, once per casting.\_</p><p><br />• When you would make a Strength or Constitution saving throw, you may add your Intelligence modifier.\_<br />You can do this twice per long rest.\_</p>"
