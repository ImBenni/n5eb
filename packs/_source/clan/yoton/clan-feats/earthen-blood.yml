name: Earthen Blood
type: feat
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: "<p>Category: Clan</p><p>Prerequisite: Yoton Clan, Level 4+</p><p>Earthen chakra runs through your veins, as you learn to balance the hardened nature release within.\_<br />You gain the following benefits:</p><p></p><p>• Increase your Intelligence or Constitution score by 1, to a maximum of 20.\_</p><p><br />• Select one damage type from the following; Wind, Earth or Water.\_<br />Your Calcified Skin clan feature now applied to the selected damage type.\_<br />You cannot change this once selected.\_</p><p><br />• Yoton clan jutsu you cast has their range increased by 10 feet. If the jutsu affects a line, cube, radius, sphere or cylinder, then increase its size by 10 feet</p><p><br />• You are immune to Environmental conditions and hazardous traps related to Fire or Heat.</p>"
