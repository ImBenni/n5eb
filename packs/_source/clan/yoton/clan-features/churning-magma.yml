name: Churning Magma
type: feat
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: "<p>Beginning at 3rd level, your Chakra has the same density and heat produced by lava itself granting you a slight resiliency to such damage.\_<br />When you would take Fire damage, you reduce the damage received by your proficiency bonus.\_</p><p>When you would reach 11th level, your magma release can evolve a creatures burned condition to a new level, called Molten.\_<br />When a creature with 5 ranks of the burned condition would gain another rank of the burned condition, they instead become Molten, losing all ranks of burned as it is replaced with 1 rank of Molten.\_<br />A Molten creature suffers the following effects.\_</p><ul><li><p>A Molten creature is counted as burned for the purposes of interacting with features, traits and jutsu and cannot gain ranks of the burned or Chilled condition while they are Molten.</p></li><li><p>A Molten creature takes 5d8 Fire damage at the beginning of each of their turns.</p></li><li><p>Once per turn, a molten creature takes an additional 15 Earth damage when they would take Earth damage.</p></li><li><p>Creatures that are immune to both Fire and Earth damage is immune to this condition.</p></li><li><p>A creature can spend an Action to make a DC 21 Dexterity save to put out the flames. On a successful save, the condition ends or submerging themselves fully into a body of Water.</p></li></ul>"
    chat: ''
