name: Lava Release
type: feat
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: >-
      <p>The Yoton bloodline has a unique talent for manifesting lava release, due to their close affinity to both Earth
      and Fire Release. Beginning at 7th level, you gain the second nature release you didn't select from Lava Release
      Affinity and you can safely walk across Lava and other dangerous hazards without sustaining harmful effects while
      Water walking. Also, at 7th level, when you would cast a jutsu with either Earth or Fire Release keywords that
      would deal damage, you can change the damage type to Fire. Also, once per casting, when using a Yoton Hijutsu or
      Ninjutsu with the Earth or Fire release keyword, it can take up to two qualities of the following, each time you
      cast such a jutsu. You can use this feature to enhance your jutsu a number of times equal to your proficiency
      bonus per long rest:</p><p>• Molten Rock: Increase your jutsu's damage by +1 damage die. This bonus increases to
      +2 at 15th level.</p><p>• Acidic Mud: A creature who takes damage from or fails a saving throw from a jutsu cast,
      they gain 1 rank of corroded.</p><p>• Corrosive Quicklime: As a part of casting this jutsu, you may force an
      affected creature to make a Strength saving throw. On a failed save the target creature(s) become restrained, as
      they are frozen in place by hardening lava. They can remake their save at the end of each of their turns to end
      the restrained condition inflicted by this feature.</p><p>• Vulcanized Rubber: When you would summon a structure
      or Earthen construct you can reinforce it, making it resistant to Lightning damage and giving it bonus hit points
      or temporary hit points equal to twice your proficiency bonus.</p><p>• Malleable Onyx: Malleable Onyx [Changed]:
      As part of the same action used to cast a jutsu that would create a construct or structure meant to intercept
      damage for you or another creature you may comprise it entirely of onyx. The structure gains 8 DR vs all damage.
      This increases to 12 at 11th level and 16 at 18th level.</p>
