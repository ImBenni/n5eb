system:
  description:
    value: >-
      <p>You punch the ground and conjure an eruption of lava and magma, enough to fill a 45-foot cube originating from
      you. All creatures in range, must succeed a Dexterity saving throw taking 10d10 Fire damage and gaining 1 rank of
      Burned, Corroded and Bruised on a failed save and half as much damage on a successful save.</p><p>Additionally,
      the affected area becomes filled with lava, pooling until it is covered in a thin sheet of it. For the next 10
      minutes, this area is treated as hazardous terrain filled with lava. Creatures, structures and constructs that
      would begin their turn in or would enter this hazardous area for the first time on their turn take 1d10 Fire
      damage and must succeed a Constitution Saving Throw or gain 1 rank of Burned and Weakened.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3, damage by 2d10, and the cube
      size by 15 feet.</p>
