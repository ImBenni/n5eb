name: Lava Release Lava Chakra Mode
type: spell
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: "<p>You coat your body in lava release Chakra, gaining a multitude of benefits.\_<br />You cannot lose concentration on this jutsu as a result of damage:</p><p>• You gain a +2 bonus to AC.</p><p>• You gain 10 temporary hit points at the beginning of each of your turns.</p><p>• You gain Immunity to Fire and Earth damage.</p><p>• You gain resistance to bludgeoning, piercing, slashing and Wind damage</p><p>• You gain Vulnerability to cold damage.</p><p>• You count as a Quake Shard for jutsu or features that you use that require them.</p><p>• At the end of each of your turns, adjacent creatures of your choice takes 5 Fire damage. This pierces DR (damage reduction)</p><p>• Your [Unarmed Damage] becomes 2d6 Fire damage.</p><p>• Successful melee attacks against you deal 10 damage to the attacking creature. This pierces DR (damage reduction).</p><p>• Yoton clan Hijutsu increases their damage die by 1 step. (D4&gt;D6&gt;D8&gt;D10&gt;D12).</p><p>• When you would create difficult terrain using a jutsu with the Earth Release keyword, the affected spaces become lava pools, dealing 1d10 Fire damage to creatures who begin their turns in them.</p><p>• When you would create an area of effect using a Jutsu with the Fire Release keyword, the affected space becomes superheated with molten stone until the beginning of your next turn. Creatures who begin their turn in this area gain 1 rank of the burned condition.</p><p><br />At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and temporary hit points by +5.</p>"
