name: Lava Release Scorching Stream Rock
type: spell
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: "<p>\_You coat your hand in Lava release Chakra as you punch forward creating a super-heated shockwave with enough heat to melt rock.\_<br />All creatures structures and constructs in a 60 feet long, 5 feet wide line directly in front of you must succeed a Dexterity saving throw taking 8d8 Fire damage on a failed save and gaining the burned and corroded condition.\_<br />On a successful save, you instead deal half damage.\_<br />All Structures that are destroyed by this jutsu melt becoming a molting pool of fluid that acts like Lava.\_<br />Its space becomes difficult terrain.\_<br />A creature that attempts to move through the affected space takes 2d10 Fire damage and gains the burned and corroded conditions.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of the jutsu by 3, and damage by 2d8.</p>"
