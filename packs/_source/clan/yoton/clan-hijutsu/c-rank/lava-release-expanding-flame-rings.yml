name: Lava Release Expanding Flame Rings
type: spell
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: "<p>You use Lava release Chakra to augment a Shuriken or Chakram that you have turning it into a bright red glowing piece of metal that keeps the shape of the Ninja tool used.\_<br />You then throw them with extreme force.\_<br />Make a ranged Ninjutsu (or Taijutsu) attack.\_<br />On a hit, you deal your weapons damage + 3d10 Fire damage.\_<br />All creatures within 10 feet of the original target (excluding you) must succeed a Dexterity saving throw, taking 2d10 Fire damage on a failed save or half as much on a successful one.\_<br />If a Shuriken is used for this jutsu, you reduce your ammunition die by 1 step.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and the damage by 2d10</p>"
