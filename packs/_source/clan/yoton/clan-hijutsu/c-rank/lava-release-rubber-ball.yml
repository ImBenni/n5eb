system:
  description:
    value: >-
      <p>You quickly spit out a blob of rubber designed to protect your target. The target creature gains 20 Temporary
      hit points until the beginning of their next turn. If they were targeted by a melee attack, the triggering
      creature makes a Strength check vs your Ninjutsu save DC, being pushed back 15 feet on a failed check.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost by 3, and the temporary Hit points
      by 10.</p>
