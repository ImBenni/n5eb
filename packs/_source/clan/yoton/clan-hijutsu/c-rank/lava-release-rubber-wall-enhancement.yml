name: Lava Release Rubber Wall Enhancement
type: spell
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: "<p>You slam your hands onto the ground where rubber erupts from the ground directly in front of you.\_<br />The wall is 15 feet tall, 15 feet wide, and 10 feet thick.\_<br />The wall is an Quake Shard, with an AC equal to your Ninjutsu save DC, temporary hit points equal to 5d8+15 and resistance to piercing and slashing damage, with immunity to bludgeoning damage.\_<br />If this wall is anchored to another structure, such as a wall or tree, the wall and the structure it is attached to gains additional temporary hit points equal to your Ninjutsu ability score and gains resistance to piercing and slashing damage, immunity to bludgeoning damage and loses any vulnerability to lighting damage, if any.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and the temporary hit points by 1d8+5.</p>"
