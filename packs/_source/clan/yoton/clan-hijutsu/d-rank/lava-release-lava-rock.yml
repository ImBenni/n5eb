system:
  description:
    value: "<p>\_You combine Fire and Earth Release Chakra in your palm conjuring a mass of lava, that you launch at a target you can see within range.\_<br />Make a ranged ninjutsu attack, on a hit you deal 2d8 Fire and 2d8 Earth damage and the lava splashes outward.\_<br />All creatures within 10 feet of the original target must make a Dexterity saving throw taking 1d6 Fire and 1d6 Earth damage on a failed save.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the attacks damage by 1d8 and 1d6 of each damage type respectively.</p>"
