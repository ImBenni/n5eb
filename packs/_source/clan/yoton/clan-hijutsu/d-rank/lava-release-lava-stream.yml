  description:
    value: "<p>You combine Fire and Earth Release Chakra in your mouth before releasing a stream of lava in a cone in front of you.\_<br />All creatures in the radius of this jutsu must make a Dexterity saving throw, taking 2d6 Fire and 2d6 Earth damage and being burned on a failed save or half as much damage on a successful one.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and damage by 1d6 of each damage type and the range by 10 feet.</p>"
