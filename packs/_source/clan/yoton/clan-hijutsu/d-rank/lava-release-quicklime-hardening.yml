name: Lava Release Quicklime Hardening
type: spell
img: systems/n5eb/assets/content/clans/yoton.webp
system:
  description:
    value: >-
      <p>You gather Lava Release Chakra in your mouth, before spitting out a glob of quicklime at a target. Make a
      Ranged Ninjutsu Attack against a target you can see within range. On a hit, you deal 3d6 fire damage and the
      target must make a Constitution saving throw, gaining the slowed condition on a failed save.</p><p>If a creature
      slowed by this jutsu is affected by a Ninjutsu with the Water Release Keyword of D-Rank or higher, they must
      succeed a Strength saving throw, being petrified until the end of their next turn.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and damage by 2d6.</p>
