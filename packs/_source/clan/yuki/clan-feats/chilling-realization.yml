name: Chilling Realization
type: feat
img: systems/n5eb/assets/content/clans/yuki.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Yuki Clan, Level 8+</p><p>You move so swiftly you seem to be gliding on Ice.
      You gain the following Benefits;</p><p>• Increase your Dexterity score by 1, to a maximum of 20.</p><p>• While on
      water, ice or snow, you ignore the difficult terrain or movement penalty it impairs and instead gain a +15 bonus
      to your movement speed.</p><p>• When a creature fails a saving throw against a Jutsu you cast and gains a rank of
      Chilled as a result, they also gain a rank of Weakened until the end of their next turn.</p><p>• When you would
      make a Dexterity Saving Throw, you gain a +2 bonus to the save so long as you are standing on ice, snow, or
      water.</p>
