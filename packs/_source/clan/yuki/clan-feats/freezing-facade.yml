name: Freezing Facade
type: feat
img: systems/n5eb/assets/content/clans/yuki.webp
system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Yuki Clan</p><p>You become accustomed to the cold and all that comes with
      it. You gain the following Benefits;</p><p>• Increase your Intelligence or Constitution score by 1, to a maximum
      of 20.</p><p>• You can use your Intelligence for Stealth, Deception and Persuasion checks.</p><p>• You ignore any
      perception-based penalties a cold environment would inflict.</p><p>• You ignore difficult terrain created by jutsu
      with the Water Release or Wind Release keywords.</p><p>• When you would make a saving throw against a jutsu with
      the Water Release or Wind Release keywords and fail, you can spend 1 Chakra die to remake the save. </p><p>You can
      do this twice per long rest.</p>
