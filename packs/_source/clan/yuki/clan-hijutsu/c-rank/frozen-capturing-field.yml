name: Frozen Capturing Field
type: spell
img: systems/n5eb/assets/content/clans/yuki.webp
system:
  description:
    value: >-
      <p>The ground erupts outward from you covering a 30-foot cube across the ground freezing the feet of creatures in
      range. Creatures in range must make a Dexterity saving throw, being restrained and gaining a rank of chilled on a
      failed save. Creatures captured in this jutsu can make strength saving throw as an action on their turn to escape
      this jutsu.</p><p>The area this jutsu affects leaves behind an Ice- covered ground being treated as difficult
      terrain. Creatures who enter this area of this jutsu must make a Dexterity saving throw to avoid falling prone on
      the slippery surface of the ice. The Ice remains until melted or 1 hour has passed.</p>
