name: Ten Thousand Ice Petals
type: spell
img: systems/n5eb/assets/content/clans/yuki.webp
system:
  description:
    value: >-
      <p>You freeze Water and air in front of you while launching it forwards creating an innumerable onslaught of ice
      daggers that tears through everything in a 40-foot cone. Creatures in range must make a Dexterity saving throw. On
      a failed save, creatures take 4d8 cold damage and gain 1 rank of chilled on a failure or half as much on a
      success.</p><p>If a construct, structure or object would take damage from this jutsu, it takes double damage as
      its structural integrity is affected by the extreme cold.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d8. If this jutsu is cast at A-Rank or
      higher the increase the ranks of chilled inflicted to +2.</p>
