name: Ice Daggers
type: spell
img: systems/n5eb/assets/content/clans/yuki.webp
system:
  description:
    value: >-
      <p>You collect Water particles from the air itself and freeze them into daggers made of ice, before you throw them
      at a target creature. Make a ranged ninjutsu attack dealing 3d6 cold damage on a hit</p><p>Regardless of a
      successful hit or not, all creatures excluding this jutsu's caster within 10 feet of the target must make a
      Dexterity saving throw, taking 2d6 cold damage and inflicting 1 rank of Chilled on a failed save or half as much
      on a success.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and the damage by 1d6 for each instance of damage.</p>
