system:
  description:
    value: >-
      <p>You quickly materialize a dome of ice protecting yourself and creatures within 5 feet of you. The dome of Ice
      intercepts all attacks until the start of your next turn absorbing the damage until it shatters. Any excess damage
      is transferred to you. The dome has an AC equal to your Ninjutsu Save DC and 25 Hit points.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the Domes Hit points by
      10</p>
