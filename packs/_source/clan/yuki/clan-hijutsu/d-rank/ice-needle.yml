name: Ice Needle
type: spell
img: systems/n5eb/assets/content/clans/yuki.webp
system:
  description:
    value: >-
      <p>You Conjure water into the shape of a thin sword like construct in your free hand. You do not spend chakra to
      maintain concentration on this jutsu. The blade is 5 feet long, the handle is 1 foot long. The design of the blade
      can be whatever you decide. If you let go of the blade it disperses into water again. You can use your action to
      make a Melee Ninjutsu or Taijutsu attack with the Ice Sword. On a hit, the target takes 2d10+Ninjutsu Ability
      Modifier cold damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3. If this jutsu is cast at C-Rank, increase the damage by 1d10. If this jutsu is cast at B-Rank,
      increase the number of attacks you can make with this weapon to two. If this jutsu is cast at S-Rank, increase the
      number of attacks you can make with this weapon to three.</p>
    chat: ''
