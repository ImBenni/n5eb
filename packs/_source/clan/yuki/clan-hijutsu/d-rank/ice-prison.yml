name: Ice Prison
type: spell
img: systems/n5eb/assets/content/clans/yuki.webp
system:
  description:
    value: >-
      <p>You release a stream of jagged Ice crystals forward before they explode upward into a mist and resolidify over
      a creature freezing them in place. Select one target creature in range. Target creature makes a Dexterity save
      being stunned for the duration and gains a rank of Chilled as a result of being encased in ice on a failed
      save.</p><p>A creature stunned inside the ice is deafened but can otherwise see everything they normally could
      while frozen.</p><p>The ice trapping the creature has an AC equal to your Ninjutsu save DC and 10 Hit points. If
      its hit points are reduced to 0 this jutsu ends. Any excess damage is dealt to the target creature. The target
      creature on its turn, makes a Strength saving throw to break out of the ice at the end of its turns.</p>
