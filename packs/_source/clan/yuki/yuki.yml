system:
  description:
    value: >-
      <h2>Cold To The Bone</h2><p>The Yuki Clan is a family of shinobi found in the Land of Water. They were almost
      wiped out due to a massive Kekkei Genkai revolt held in the country. Many died, and because of this their
      bloodline splintered. They no longer share a common family name, and are generally known as a family that in
      combat are nigh unbeatable.</p><hr /><h3>Yuki Traits</h3><p><strong>Recommended Ability Score Increase</strong>:
      +2 Dex or Int, +1 Int or Cha (Int cannot be chosen as the +1 ASI, if it was chosen for the +2
      ASI.)</p><p><strong>Speed</strong>: Your base walking speed is 30 feet.</p><p><strong>Skill
      Proficiencies</strong>: Chakra Control, Ninshou</p><p><strong>Ice Release Affinity</strong>: You begin with either
      Wind or Water Release Affinity. (Pick one)</p>
