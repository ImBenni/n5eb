system:
  description:
    value: >-
      <p>Beginning at 10th level, you have dealt with your fair share of rotten or out of date food. You can identify
      poisonous food or drink from a glance along. <br />You also gain advantage on saving throws made to resist the
      poisoned or envenomed conditions. </p><p>Beginning at 14th level, your allies have also experienced a series of
      different dishes of your make and have developed a refined pallet. <br />Whenever an allied creature would
      complete a rest of any type while within 30 feet of you, they gain advantage on saving throws made to resist the
      poisoned or envenomed conditions for the next 8 hours.</p>
