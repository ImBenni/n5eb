name: Chakra Disruption
type: feat
_id: 9eaUSxgdlllEhJPt
img: icons/magic/control/debuff-chains-ropes-purple.webp
system:
  description:
    value: >-
      <p>Starting at 1st level, you have learned to restrain some of your enemies Chakra when they are affected by your
      Genjutsu. Once per rest, when a creature is affected by a Genjutsu that you cast, you can disrupt their chakra
      until the end of their next turn. When you do, the next jutsu they cast has its cost increased by an amount equal
      to the original cost of the Genjutsu used. If you would attempt to use this feature an additional time after your
      limit, you must spend 1 chakra die, allowing you to use this feature as normal </p><p>Beginning at 5th level, you
      can choose to instead completely disable a creatures ability to mold chakra. If the target creature would fail
      their saving throw, they lose the ability to mold Chakra when casting jutsu of a rank lower than the jutsu
      affecting them for the duration of the Genjutsu cast. </p><p>You gain an additional use of either of this features
      effects at 7th and 14th levels.</p>
