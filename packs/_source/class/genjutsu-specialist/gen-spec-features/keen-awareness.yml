system:
  description:
    value: >-
      <p>For a Genjutsu Specialist, details are the foundations of constructing proper Genjutsu. At 5th level when you
      gain this feature, you gain the ability to accurately recall anything you've seen or heard within the last month.
      </p><p>Additionally, when you would succeed a Saving throw vs a Genjutsu cast by a hostile creature by 5 or more,
      you regain 1 spent <strong>Actualization Die</strong>. When you do, you can spend your reaction to cast 1 Genjutsu
      that you know with the casting time of 1 Action. </p><p>Additionally, you reduce the downtime needed to create or
      learn Genjutsu by half.</p>
