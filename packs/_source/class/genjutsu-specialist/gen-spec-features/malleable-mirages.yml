system:
  description:
    value: >-
      <p>Starting at 2nd level, you have learned how to manipulate fragments of reality itself imbuing you with unique
      capabilities that some might even consider unnatural. At 2nd level you learn two <strong>Mirages</strong> of your
      choice, found at the end of this Class. You learn one additional Mirage at 4th, 6th, 8th, 10th , 12th, 14 th ,
      16th , 18th, &amp; 20th levels. Additionally, when you gain a level in this class, you can choose one of the
      Mirages you know and replace it with another <strong>Mirage</strong> that you could learn at that level. A level
      prerequisite in a Malleable Mirage refers to Genjutsu Specialist Level, not character level.</p>
