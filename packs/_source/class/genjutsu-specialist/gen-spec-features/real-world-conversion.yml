name: Real World Conversion
type: feat
_id: POGdngRz8vBrQKVF
img: icons/magic/movement/trail-streak-pink.webp
system:
  description:
    value: >-
      <p>Starting at 5th level, you have learned to infuse your creativity with enough chakra to make things beyond the
      bounds happen. By tapping into your reserves of <strong>Actualization die</strong> you are able to create a
      multitude of additional effects based on the needs of the moment. These moments are known as
      <strong>Conversions</strong>. Select one <strong>Conversion</strong> of your choice. You can select an additional
      <strong>Conversion</strong> beginning at 9th and 15th levels.</p><hr /><h3>Actualized Alteration</h3><p>When you
      would cast a Genjutsu that requires a saving throw, you may spend 1 Actualization dice. When you do, you may
      change the required saving throw to either Intelligence, Wisdom or Charisma. You can use this
      <strong>Conversion</strong> twice per long rest. </p><hr /><h3>Actualized Duplicity</h3><p>You can spend 1
      Actualization dice as an action to create an illusory duplicate of yourself. This illusion is a perfect duplicate
      of yourself that lasts for 1 minute or until you lose your concentration (as if you were concentrating on a
      jutsu). The illusion appears in an unoccupied space that you can see within 30 feet of you. As a bonus action on
      your turn, you can move the duplicate up to 30 feet to a space you can see, but it must remain within 120 feet of
      you. For the duration, you share all sense with your duplicate and can cast Genjutsu as if you were in the
      duplicates space. Additionally, when both you and your illusion are within 5 feet of a creature that can see the
      illusion, you have advantage on attack rolls against the creature, given how distracting the illusion is to the
      target. </p><hr /><h3>Actualized Perception</h3><p>When a creature that would fail a saving throw, but not
      critically fail, as a result of a genjutsu you cast, you may spend up to 2 Actualization Die. When you do, roll
      the die reducing their save by half the result (Min 1.), potentially causing them to critically fail. </p><hr
      /><h3>Actualized Perfection</h3><p>As a Bonus Action, you can spend 1 <strong>Actualization Die</strong> when you
      would cast a Genjutsu of at least C-Rank or lower. When you do, if the Genjutsu requires you to roll dice to deal
      damage, heal, increase/reduce damage reduction or provide temporary hit points. You add the actualization die to
      the roll, interpreting the results as normal. </p><hr /><h3>Actualized Power</h3><p>When you could cast a Genjutsu
      targeting a single creature that would inflict a condition of any type, and the target creature has resistance or
      immunity to the condition, you may spend 1 Actualization die to ignore that resistance or immunity for that
      jutsu's casting.</p>
