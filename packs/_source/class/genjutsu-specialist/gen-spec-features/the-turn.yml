name: The Turn
type: feat
_id: N1emRFvKhvazE6Zr
img: icons/magic/time/arrows-circling-pink.webp
system:
  description:
    value: >-
      <p>Beginning at 11th level, once per long rest, when a creature would succeed on their saving throw, but not
      critically succeed their saving throw against a Genjutsu you cast, you can force them to suffer the effects of a
      failure. </p><p>Starting at 15th level you may use this ability once per short rest. </p><p>Finally, beginning at
      20th level, when you would use this feature they instead suffer the effects of a critical failure, if the jutsu
      cast has such a failure condition.</p>
