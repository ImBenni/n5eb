name: Hallucinatory Instrument
type: feat
_id: RsB7vgY1ZXIjwmLX
img: icons/tools/instruments/lute-gold-brown.webp
system:
  description:
    value: >-
      <p>Your Illusions are the result of an instrument you have an affinity for. Select an Instrument you like of your
      description and design. You can, as a Bonus Action, when casting a Genjutsu with the Auditory keyword, that deals
      damage or inflicts a penalty on a hostile creature, use your instrument to change it range from whatever is
      listed, to <strong>Self (15- Foot Cone)</strong> or <strong>Self (10-Foot Radius Sphere)</strong>. All creatures,
      excluding you, in the radius, are affected so long as they are not deafened. </p><p>Starting at 7th level, you
      gain the <strong>@UUID[Compendium.n5eb.class.Item.1xOiQXrgWDzIngKc]{Song of the End}</strong> Malleable
      Mirage.</p><p>Finally, beginning at 11th level when a hostile creature critically fails a saving throw from a
      Genjutsu you cast with the Auditory Keyword, you regain 1 spent <strong>Actualization Die</strong>. You can only
      regain 1 <strong>Actualization die</strong> in this way per turn.</p>
    chat: ''
