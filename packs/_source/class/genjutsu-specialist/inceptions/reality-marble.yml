name: Reality Marble
type: feat
_id: i069w6em8mShXwRh
img: icons/magic/control/buff-flight-wings-purple.webp
system:
  description:
    value: >-
      <p>The chakra cost of concentrating on genjutsu is reduced by an amount equal to its rank. (D-Rank: 1, C-Rank: 2,
      B-Rank: 3, A-Rank: 4, S-Rank: 5).</p><p>While you are concentrating on a genjutsu, as an action you can select a
      new target for that genjutsu. New targets selected by this feature must make the original saving throw as if they
      were the original target of the genjutsu when it was originally cast. This feature does not extend the duration of
      the genjutsu you are concentrating on.</p><p>Starting at 7th level, you gain the
      <strong>@UUID[Compendium.n5eb.class.Item.rhZRh41A5tdomnyT]{Persistent Genjutsu} </strong>Malleable Mirage.
      Finally, beginning at 11th level, when 2 or more hostile creatures would fail a saving throw against a Genjutsu
      you cast or are concentrating on, you regain <strong>1 Actualization Die</strong>. The hostile creatures do not
      need to fail their saving throws at the same time, only fail their saving throws against the same Genjutsu that
      you have cast and are concentrating on, such as when you use this Inception feature. You can only regain 1 spent
      <strong>Actualization die</strong> in this way per turn.</p>
