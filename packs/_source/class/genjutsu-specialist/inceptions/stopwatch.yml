system:
  description:
    value: >-
      <p>As a Bonus Action, when you would gain the benefit of a Genjutsu that would grant you a bonus to your to hit,
      skill checks, saving throws or AC, you can choose to activate your stop watch. When you do, at the beginning of
      each turn, roll 1d12, reducing this die by 1 step each time you would roll a 1, 2 or
      3.</p><p>(D12&gt;D10&gt;D8&gt;D6&gt;D4&gt;0). While you have this die you are treated as displaced. Conditions
      that you would gain from hostile effects while you are displaced do not affect you until you are no longer
      displaced. Once you use this feature you cannot gain its benefits for 1 hour.</p>
