folder: BibCK2wyG6VpDTdI
name: Temporal Stopwatch
type: feat
_id: KeZlzAPRB7ApkDBj
img: icons/magic/time/clock-stopwatch-white-blue.webp
system:
  description:
    value: >-
      <p>Your Illusions are the result of a stopwatch you have made a distinct bond with. This stopwatch is mundane and
      can be in any form you choose, be it a wrist watch, a circular pocket watch a necklace. As a Bonus Action, when
      you would gain the benefit of a Genjutsu that would grant you a bonus to your to hit, skill checks, saving throws
      or AC, you can choose to activate your stop watch. When you do, at the beginning of each turn, roll 1d12, reducing
      this die by 1 step each time you would roll a 1, 2 or 3.</p><p>(D12&gt;D10&gt;D8&gt;D6&gt;D4&gt;0). While you have
      this die you are treated as displaced. Conditions that you would gain from hostile effects while you are displaced
      do not affect you until you are no longer displaced. Once you use this feature you cannot gain its benefits for 1
      hour. </p><p>Beginning at 7th level, you gain the
      <strong>@UUID[Compendium.n5eb.class.Item.isIF3gmdygr6UjmW]{Pause}</strong> Malleable Mirage. </p><p>Finally,
      beginning at 11th level when a hostile creature would fail a saving throw vs a Genjutsu you cast that would
      inflict a Penalty to their attack rolls, skill checks, saving throws, or their AC by 5 or more, you regain 1
      <strong>Actualization die</strong>. You can only regain 1 <strong>Actualization die</strong> in this way per
      turn.</p>
    chat: ''
