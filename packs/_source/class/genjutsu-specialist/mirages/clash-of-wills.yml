system:
  description:
    value: >-
      <p><strong>Prerequisite</strong>: Illusionary Weapon</p><hr /><p>Whenever you would deal damage to an enemy
      creature with a genjutsu or weapon attack, you can use your Bonus Action to disrupt their chakra. The target must
      make a Wisdom saving throw against your genjutsu save DC. If they fail, their concentration saving throws are made
      at disadvantage until the end of your next turn and if the target is not maintaining concentration on a jutsu, it
      takes 1d4 psychic damage.</p>
