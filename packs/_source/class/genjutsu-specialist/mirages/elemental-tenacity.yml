system:
  description:
    value: >-
      <p><strong>Prerequisite</strong>: Elemental Manifestation</p><hr /><p>Whenever you would take damage from a jutsu
      with your nature release keyword, you can use your Reaction to absorb the jutsu. The damage is negated, and
      instead you gain temporary hit points equal to half of the damage you would have taken before resistances &amp;
      immunities.</p><p>The amount of temporary hit points received at one time cannot exceed three times your genjutsu
      ability modifier.</p><p>You can use this mirage twice per long rest.</p>
