system:
  description:
    value: >-
      <p><strong>Prerequisite</strong>: Elemental Manifestation</p><hr /><p>You perform a meditative ritual during a
      short or long rest. When you do so, choose either Dexterity or Strength saving throws. When you make a saving
      throw of this type, you can use your Reaction to gain advantage on that saving throw and cast a D-rank Genjutsu,
      with a casting time of one action. Once you use this mirage, you cannot do so again until you finish a short or
      long rest.</p>
