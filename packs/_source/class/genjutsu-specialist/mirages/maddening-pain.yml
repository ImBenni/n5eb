system:
  description:
    value: >-
      <p><strong>Prerequisite</strong>: Pain, Doubled Pain or Unlimited Pain Genjutsu, Phantasmal Force</p><hr /><p>As a
      Bonus Action, you can spend 5 Chakra, doing so can cause a crippling amount of mental pain to a creature affected
      with the <strong>Pain</strong>, <strong>Doubled Pain</strong> or <strong>Unlimited Pain
      Genjutsu</strong>.</p><p>When you do, you deal the maximum damage with the aforementioned Genjutsu affecting them.
      Additionally, their effects can trigger from any attack, not just yours until the end of your turn.</p>
