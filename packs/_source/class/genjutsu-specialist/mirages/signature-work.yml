system:
  description:
    value: >-
      <p><strong>Prerequisite</strong>: 9th Level</p><hr /><p>You can, as an action, cast <strong>Programmed
      Illusions</strong>, at half cost. When you cast this genjutsu, you can choose a D-Rank or lower genjutsu that you
      know, the illusion can cast the genjutsu once per minute as a part of its programming. It uses your Genjutsu
      ability for attack rolls and saving throw DC's and treats your character level as your own.</p><p>If you grant a
      genjutsu to the illusion and the illusion would suffer damage as if it were real, it is immediately dispelled.
      Once you cast this genjutsu using this mirage, you can't do so again until you finish a long rest.</p>
