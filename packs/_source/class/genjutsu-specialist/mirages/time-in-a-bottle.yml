system:
  description:
    value: >-
      <p><strong>Prerequisite</strong>: Temporal Stopwatch, 17th level</p><hr /><p>As an action, you can select a space
      you can see within 90 feet. All creatures within a 5-foot radius sphere centering on the selected space must
      succeed a Wisdom saving throw. A creature can willingly fail this saving throw. On a failed save, you can make
      them perform one of the following;</p><ul><li><p>Reverse: On the affected creatures next turn, they repeat the
      last set of actions they completed, regardless of what it was, even targeting the same space, even if no creatures
      are occupying it.</p></li><li><p>Pause: Creatures are stunned until the end of their next
      turn.</p></li><li><p>Fast Forward: Creatures immediately perform their turn as if it was their turn in the
      initiative order.</p></li></ul><p>You can use this Malleable Mirage once per long rest.</p>
