name: Defensive Tactics
type: feat
_id: Juwkd51dHLLGooez
img: icons/equipment/shield/heater-stone-orange.webp
system:
  description:
    value: >-
      <p>Also beginning at 6th Level, you learn how to fight defensively against your targets, leading them into a false
      sense of security in confrontations against you. <br />You gain one of the following features of your choice You
      gain a second choice at 11th level and a third choice at 17th level.</p><ul><li><p><strong>Escaping
      Danger</strong>: Attacks of opportunity and attacks made as a result of a creatures reaction, against you are made
      at disadvantage.</p></li><li><p><strong>Unbroken Will</strong>: You have advantage on saving throws to resist any
      Mental or Sensory Condition.</p></li><li><p><strong>Hunter's Revenge</strong>: When you are hit by a creature's
      attack, the next time you deal damage to that creature you can Lethal Attack ignoring its normal trigger
      requirements.</p></li><li><p><strong>Evasion</strong>: When you are subjected to an effect, that allows you to
      make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on a saving
      throw, and only half damage if you fail.</p></li></ul>
    chat: ''
