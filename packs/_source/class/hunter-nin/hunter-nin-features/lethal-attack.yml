system:
  description:
    value: >-
      <p>Finally, at 1st level, you know how to exploit a foes distraction, drop in guard, and moment of hesitation.
      </p><p>Once per turn, you can deal an extra 1d8 damage to one creature you hit with an attack if you have
      advantage on the attack roll or if another enemy of the target is within 5 feet of it, that enemy isn't
      incapacitated, and you don't have disadvantage on the attack roll. </p><p>The amount of extra damage increases as
      you gain levels in this class, as shown in the lethal attack column of the Hunter-Nin Table.</p>
