name: Primary Target
type: feat
_id: UirjKCP6jclrMUPj
img: icons/skills/targeting/crosshair-arrowhead-blue.webp
system:
  description:
    value: >-
      <p>Finally, at 2nd level, you have experience researching, tracking, and hunting. You can effectively read and
      track any creature you come across. Once when rolling initiative, you can select any creature you can see within
      120 feet and mark it as your <strong>Primary Target</strong> at no action cost. You can then spend a bonus action
      to mark another creature you can see within range. You can only have one creature marked as your <strong>Primary
      Target</strong> at a time.</p><p>Creatures remain marked until they reach 0 Hp, or you mark another creature.
      While marked, you gain the following benefits;</p><ul><li><p>You have Advantage on Wisdom checks made to track or
      search for your <strong>Primary Target</strong> so long as they are within the same countries borders as
      you.</p></li><li><p>You become aware of one of the following in regards to a marked creature. In order to gain
      additional knowledge, you must reapply <strong>Primary Target</strong> to the creature or subsequent
      turns;</p><ul><li><p>One damage immunity they have and if it is the result of a feature, jutsu or
      trait.</p></li><li><p>One damage resistance they have and if it is the result of a feature, jutsu or
      trait.</p></li><li><p>Their current Damage reduction value.</p></li></ul></li></ul>
    chat: ''
