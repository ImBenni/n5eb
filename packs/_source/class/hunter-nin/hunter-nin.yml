  description:
    value: >-
      <p>As a Hunter-Nin, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit Dice:</strong>
      1d10 per Hunter-Nin level<br /><strong>Hit Points</strong> <strong>at 1st Level and beyond:</strong> 10 + your
      constitution modifier<br /><strong>Hit Points at Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier
      per Hunter-Nin level after 1st.</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice:</strong> 1d8 per Hunter-Nin
      level<br /><strong>Chakra Points</strong> <strong>at 1st Level:</strong> 8 + your constitution modifier<br
      /><strong>Chakra Points at Higher Levels:</strong> 1d8 (or 5) + your Constitution modifier per Hunter-Nin level
      after 1st.</p><hr /><h3>Proficiencies</h3><p><strong>Armor:</strong> Light armor<br /><strong>Weapons:</strong>
      All Simple Weapons, Broadsword, Iron Claw, Jitte, Katana, Odachi, Scythe, Battle Wire, Knuckle Blades, Chakram,
      Longbow, Fuma-Shuriken<br /><strong>Ninja Tools:</strong> Disguise Kit, Forensics Kit, Forgery Kit<br
      /><strong>Saving Throws:</strong> Dexterity, Intelligence, Wisdom<br /><strong>Skills: </strong>Stealth, Choose
      four other skills of your choice.</p><h1>Hunter-Nin
      Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency Bonus</th><th>Features</th><th>Lethal
      Attack</th><th>Jutsu Known</th><th>Highest Rank Jutsu
