system:
  description:
    value: >-
      <p>Your teacher, master or rival seems to always have a plan A, B, C, D and E. You will never be caught without an
      answer again. Once per rest, you can select one tool, kit, or weapon of greater quality, that you are able to pull
      from a Back-up scroll that you always had this entire time. The tool, Kit or weapon can only be used once,
      regardless of the circumstance. Once used the Tool, kit or weapon breaks or becomes inert.</p>
