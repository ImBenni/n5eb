system:
  description:
    value: >-
      <p>You have taken to caring for plants of any or all types. It calms you and grants you a deeper understanding of
      the biomes the plants come from. Select two of the following locations; <strong>Land of Fire, Land of Earth, Land
      of Lightning, Land of Water, Land of Wind, Land of Snow, Minor Lands </strong><em><strong>(any 3)</strong></em>.
      You gain a +1d6 bonus to all Nature and Survival checks made within the chosen lands.</p><p>You can select this
      Pattern multiple times, selecting different locations.</p>
