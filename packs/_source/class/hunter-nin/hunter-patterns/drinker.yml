system:
  description:
    value: >-
      <p>You have taken up the unhealthy pastime of drinking alcohol. The drink burns your throat and has a bitter
      aftertaste, but you find it oddly liberating. This drinking habit has granted you the ability to convert your Hit
      die into additional uses of any <strong>Hunter-Nin</strong> class feature that has a use limit.</p><p>For every 2
      Hit dice spent, you gain 1 additional use of any one <strong>Hunter-Nin</strong> class feature.</p>
