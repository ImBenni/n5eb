system:
  description:
    value: >-
      <p>You always over prepare. So much so that you over pack, bring too much of the same thing, or are always more
      prepared than the next person. When you would complete a rest of any type. Roll one d20. Record the results.
      Whenever you or another creature would make a skill check using Dexterity, Wisdom or Charisma you can replace
      their original d20 result with the d20 you previously rolled, spending that roll.</p>
