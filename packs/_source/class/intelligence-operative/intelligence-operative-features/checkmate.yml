system:
  description:
    value: >-
      <p>Starting at 20th level, after many battles and conflicts, you have mastered when to, and when not to reveal
      your hand. As a bonus action, all allies gain the Checkmate condition. This condition cannot be cleansed and has a
      number of charges equal to your proficiency bonus. </p><p>A charge is expended when an affected creature fails a
      saving throw or you end your turn. Once all charges are expended, they lose this condition. Once you use this
      feature, you cannot do so again until you complete a long rest.</p><hr
      /><p><strong>Checkmate</strong></p><p>Creatures with the Checkmate condition gain the following benefits for its
      duration.</p><ul><li><p>While you are Checkmated plans you activate does not cost Brave Orders.</p></li><li><p>A
      Checkmated creature gains immunity to Conditions inflicted by hostile creatures.</p></li><li><p>A Checkmated
      creature treats critical hits as regular hits.</p></li><li><p>A Checkmated creature cannot gain disadvantage or
      penalties to any d20 roll it makes.</p></li><li><p>A Checkmated creature gains double the benefit from currently
      active plans. If a plan provides any bonuses, those values are doubled. If the plan provides additional special
      actions, they can be used an additional time before ending. If the plan has a use limit, that use limit is
      increased by +1.</p></li></ul>
