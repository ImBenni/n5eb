            <p>As an Intelligence Operative, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit
            Dice:</strong> 1d8 per Intelligence Operative level<br /><strong>Hit Points at 1st Level and
            beyond:</strong> 8 + your constitution modifier<br /><strong>Hit Points at Higher Levels:</strong> 1d8 (or
            5) + your Constitution modifier per Intelligence Operative level after 1st.</p><hr /><h3>Chakra
            Points</h3><p><strong>Chakra Dice:</strong> 1d10 per Intelligence Operative level<br /><strong>Chakra Points
            at 1st Level:</strong> 10 + your constitution modifier<br /><strong>Chakra Points at Higher Levels:</strong>
            1d10 (or 6) + your Constitution modifier per Intelligence Operative level after 1st.</p><hr
            /><h3>Proficiencies</h3><p><strong>Armor:</strong> Light armor, medium armor<br /><strong>Weapons:</strong>
            Simple Weapons, Fuma Shuriken, Knuckle Blades<br /><strong>Ninja Tools:</strong> Pick four<br
            /><strong>Saving Throws:</strong> Dexterity, Intelligence, Charisma<br /><strong>Skills:</strong>
            Investigation, Choose three from Chakra Control, Crafting, Ninshou, Persuasion, Illusions, Insight,
            Intimidation, History, Perception, Martial Arts</p><h1>Intelligence Operative
            Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency Bonus</th><th>Features</th><th>Plans
