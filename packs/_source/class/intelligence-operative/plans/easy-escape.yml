img: icons/svg/wingfoot.svg
system:
  description:
    value: >-
      <p><strong>Base Plan:</strong> Allied creatures within 90 feet of you, increase their movement speed by +20 feet
      when they are moving away from hostile creatures. Hostile creatures within 90 feet of you have disadvantage on
      attacks of opportunities against you and allied creatures. This lasts a number of rounds equal to your Proficiency
      bonus.</p><p><strong>Enhanced Plan:</strong> If a Brave order is used to enhance this plan, you and allied
      creatures can use the Dash action as a bonus action and a reaction. This brave order enhancement lasts for the
      remaining time this plan is active.</p>
