img: icons/svg/clockwork.svg
system:
  description:
    value: >-
      <p><strong>Base Plan:</strong> You may select one allied creature, who can both see and hear you. You may move
      them up or down in the initiative order, by one spot, until the end of combat. This plan immediately ends unless
      enhanced. A creature affected by this enhancement cannot be affected again until the end of their next
      turn.</p><p><strong>Enhanced Plan:</strong> If a Brave order is used to enhance this plan you also select 1
      hostile creature and move them up or down in the initiative order, by one spot, until the end of combat. This plan
      then immediately ends. A creature affected by this enhancement cannot be affected again until the end of their
      next turn.</p>
