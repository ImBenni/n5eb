system:
  description:
    value: >-
      <p><strong>Base Plan:</strong> All allied creatures within 60 feet of you that would deal damage to a Prone
      creature deal additional damage equal to twice your Proficiency Bonus. This lasts for a number of rounds equal to
      your Proficiency Bonus.</p><p><strong>Enhanced Plan:</strong> If a Brave order is used to enhance this Plan
      hostile creatures within 60 feet of you need to spend their full movement speed standing up from Prone. This brave
      order enhancement lasts for the remaining time this plan is active.</p>
