img: icons/svg/bridge.svg
system:
  description:
    value: >-
      <p><strong>Base Plan:</strong> All allied creatures within 60 feet of you ignore difficult terrain, increase their
      movement speed by 15 feet and can move across Water and walls without a movement penalty. This lasts a number of
      rounds equal to your proficiency bonus.</p><p><strong>Enhanced Plan:</strong> If a Brave order is used to enhance
      this plan, allies also cannot have their speed reduced by conditions or effects. This brave order enhancement
      lasts for the remaining time this plan is active.</p>
