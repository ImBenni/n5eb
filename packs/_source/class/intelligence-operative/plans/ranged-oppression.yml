      treated as if they have partial cover. This lasts for a number of rounds equal to your Proficiency
      Bonus.</p><p><strong>Enhanced Plan:</strong> If a Brave order is used to enhance this plan, ranged attack rolls
      gain disadvantage. This lasts for the remaining time this plan is active.</p>
