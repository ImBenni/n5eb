name: Medical Doctrine
type: feat
_id: MXMmJIeo1jilceee
img: icons/sundries/scrolls/scroll-rolled-tan.webp
system:
  description:
    value: "<p><span style=\"font-family:Signika, sans-serif\">Starting at 3rd Level your experience in medical based jutsu has ascended to a point where your jutsu has begun to slowly become infused with those beliefs, making them stronger and vice versa.\_</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">Select one of the following doctrines in which you gain the doctrines effects or abilities listed.\_</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">You can select a second Doctrine when you would reach 13th level.\_</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">You cannot change this choice one made.</span></p><hr /><p><strong>LONG LIFE, SHORT DEATH</strong></p><p>You believe that your patients should benefit from a much longer life span, but when they are dying, they should not delay the process longer than it needs to be. You've seen what agony looks like and you want no parts of it. When you would heal a creatures hit points, by any amount they gain temporary hit points by an amount equal to the rank of the jutsu cast. A creature can only gain temporary hit points in this way twice per rest. (D-Rank: 5, C-Rank: 10, B-Rank: 15, A-Rank: 20, S-Rank: 25.)</p><hr /><p><strong>NEVER ON THE FRONT LINES</strong></p><p>You believe deeply that medical ninja do not belong on the front lines and so did your master or mentor. You embody this philosophy and do everything in your power to live this truth. Whenever you are within 10 feet of a hostile creature, you can take the dash or disengage actions as a bonus action.</p><hr /><p><strong>NOT ALLOWED TO DIE</strong></p><p>You believe that medical shinobi deaths should be the absolute last thing to happen on the battlefield. Beyond all other circumstances, you are not allowed to die before your team does. So long as another allied creature is initiative and they have 1 or more hit points, once per rest, you ignore effects of jutsu, features or traits from hostile creatures that would automatically kill you or reduce you to 0 hit points, instead being reduced to 1 hit point.</p><hr /><p><strong>UNTIL THEIR HEART STOPS</strong></p><p>You believe deeply that medical ninja should continue to administer healing to all members of their party, no matter how dire or how hopeless it is, until they stop breathing, even against their allies wishes. Twice per rest, a creature other than yourself, who regains hit points as a result of a jutsu you cast, who are currently under the effects of a hostile inflicted condition, makes their next saving throw or skill check to end said condition at advantage.</p>"
