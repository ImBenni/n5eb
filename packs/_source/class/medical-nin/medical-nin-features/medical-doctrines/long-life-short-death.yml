name: Long Life, Short Death
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>You believe that your patients should benefit from a much longer life span, but when they are dying, they should not delay the process longer than it needs to be.\_</p><p>You've seen what agony looks like and you want no parts of it.\_</p><p>When you would heal a creatures hit points, by any amount they gain temporary hit points by an amount equal to the rank of the jutsu cast.\_</p><p>A creature can only gain temporary hit points in this way twice per rest.\_<br />(D-Rank: 5, C-Rank: 10, B-Rank: 15, A-Rank: 20, S- Rank: 25.)</p>"
