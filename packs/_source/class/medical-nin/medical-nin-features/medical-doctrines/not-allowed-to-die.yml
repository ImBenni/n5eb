name: Not Allowed To Die
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>You believe that medical shinobi deaths should be the absolute last thing to happen on the battlefield.\_</p><p>Beyond all other circumstances, you are not allowed to die before your team does.\_</p><p>So long as another allied creature is initiative and they have 1 or more hit points, once per rest, you ignore effects of jutsu, features or traits from hostile creatures that would automatically kill you or reduce you to 0 hit points, instead being reduced to 1 hit point.</p>"
