name: Until Their Heart Stops
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>You believe deeply that medical ninja should continue to administer healing to all members of their party, no matter how dire or how hopeless it is, until they stop breathing, even against their allies wishes.\_</p><p>Twice per rest, a creature other than yourself, who regains hit points as a result of a jutsu you cast, who are currently under the effects of a hostile inflicted condition, makes their next saving throw or ability check to end said condition at advantage.</p>"
