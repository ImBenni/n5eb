folder: UBASh6CnPhvTnXbD
name: Preserve/Take Life
type: feat
_id: cTCxsdZk9kD39laJ
img: icons/magic/life/heart-cross-strong-purple-orange.webp
system:
  description:
    value: "<p><span style=\"font-family:Signika, sans-serif\">Starting at 5th Level you have gained the experience needed to save lives, even those in mortal danger or take them, even the ones who are furthest from death's door.\_</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">You learn both <strong>@UUID[Compendium.n5eb.class.Item.Q5VGpvdrICvP2uIS]{Preserve Life}</strong> and <strong>@UUID[Compendium.n5eb.class.Item.aj2yszYTmjhWq0Ww]{Take Life}</strong>.\_</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">Some Tenets grant you additional effect as you advance in this class.\_</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">Regardless, you can use Preserve Life or Take Life twice between rests.\_</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">You gain an additional use at 9th, 13th and 17th levels.</span></p><hr /><p><strong>@UUID[Compendium.n5eb.class.Item.Q5VGpvdrICvP2uIS]{PRESERVE LIFE}</strong></p><p>As an action you release a pulse of medical release Chakra, designed to safeguard creatures around you with healing energies. This energy can restore a total number of hit points equal to 5 times your Medical Nin Level and resets the count of all failed death saving throws. Choose any number of creatures within 30 feet of you and divide those hit points amongst them. This feature can restore no more than half of its hit point maximum. You cannot use this feature on an undead or construct.</p><hr /><p><strong>@UUID[Compendium.n5eb.class.Item.aj2yszYTmjhWq0Ww]{TAKE LIFE}</strong></p><p>When you deal damage to a creature using a Jutsu with the medical keyword, you release corroding energies, meant to inflict gruesome damage. Select one affected creature. That creature takes additional damage equal to 5 + twice your Medical-Nin level.</p>"
