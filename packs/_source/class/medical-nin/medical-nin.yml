    value: >-
      <p>As a Medical-Nin, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit Dice:</strong>
      1d8 per Medical-Nin level<br /><strong>Hit Points at 1st Level and beyond:</strong> 8 + your constitution
      modifier<br /><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your Constitution modifier per
      Medical-Nin level after 1st.</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice:</strong> 1d10 per Medical-Nin
      level<br /><strong>Chakra Points at 1st Level:</strong> 10 + your constitution modifier<br /><strong>Chakra Points
      at Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier per Medical-Nin level after 1st.</p><hr
      /><h3>Proficiencies</h3><p><strong>Armor:</strong> Light armor, medium armor<br /><strong>Weapons:</strong> All
      Simple Weapons<br /><strong>Ninja Tools:</strong> Medicine Kit, Poison Kit<br /><strong>Saving Throws:</strong>
      Strength, Wisdom, Charisma<br /><strong>Skills:</strong> Medicine, Chakra Control, Choose two from History,
      Insight, Perception, Illusions, Ninshou</p><h1>Medical-Nin
