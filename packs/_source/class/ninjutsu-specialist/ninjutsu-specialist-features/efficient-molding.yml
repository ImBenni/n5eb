name: Efficient Molding
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 3rd Level, you learn how to bend your chakra to suit your needs while casting Ninjutsu, without the
      Combination keyword.<br />You gain two of the following Efficient Molding options of your choice.</p><p>You gain
      another one at 5th, 9th, 13th and 18th Ninjutsu specialist levels.</p><p>You can only use one Efficient Molding
      option on a Ninjutsu without the Combination keyword when you cast it, unless otherwise noted.<br />You can use
      any mix of efficient moldings you have 2 times per rest.<br />You gain an additional use of your moldings at 9th,
      and 15th levels.</p><p>If you would use a molding any additional times more than your listed limitation, you must
      spend chakra listed as the Alternate cost.</p><p>When you would level up in this class, you may swap your current
      Moldings.</p>
