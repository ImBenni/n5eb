name: Jutsu Breaker
type: feat
img: icons/magic/defensive/shield-barrier-deflect-teal.webp
system:
  description:
    value: "<p>Beginning at 5th Level, you learn how to overwhelm your opponent's jutsu with pure force.\_</p><p>When you would see a creature within 90 feet of you cast a Ninjutsu that would deal damage of any type, you may as a reaction cast a Ninjutsu you know with a casting time of 1 action.\_</p><p>When you do, if the jutsu you cast doesn't have the clash keyword it gains the clash keyword.\_</p><p>You automatically initiate a clash with the triggering creatures jutsu even if their jutsu doesn't have the clash keyword.\_</p><p>You may use this feature twice per rest.\_</p><p>You gain an additional use of this feature at 11th and 17th level.</p>"
