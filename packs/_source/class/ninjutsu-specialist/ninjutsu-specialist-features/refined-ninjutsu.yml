name: Refined Ninjutsu
type: feat
img: icons/commodities/tech/metal-blue.webp
system:
  description:
    value: "<p>Also, at 1st level, you can select an amount of Ninjutsu that you know without the Combination keyword equal to the number shown for Refined Jutsu in the class table above, increasing the Save DC or the amount of either damage done by the chosen jutsu by 1 die.\_</p><p>This feature happens once per casting of the Refined Jutsu.\_</p><p>You choose which benefit you gain each time you cast the jutsu, but before the jutsu would affect a creature.\_</p><p>You can change your Refined Ninjutsu when you would take a long rest.\_</p><p>At 9th level, you increase the Save DC or die by 2 instead of 1, and at 17th level, you increase Save DC or die by 3 instead of 2.</p>"
