system:
  description:
    value: >-
      <p>As a Ninjutsu Specialist, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit
      Dice:</strong> 1d6 per Ninjutsu Specialist level<br /><strong>Hit Points at 1st Level and beyond:</strong> 6 +
      your constitution modifier<br /><strong>Hit Points at Higher Levels:</strong> 1d6 (or 4) + your Constitution
      modifier per Ninjutsu Specialist level after 1st.</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice:</strong>
      1d12 per Ninjutsu Specialist level<br /><strong>Chakra Points at 1st Level:</strong> 12 + your constitution
      modifier<br /><strong>Chakra Points at Higher Levels:</strong> 1d12 (or 7) + your Constitution modifier per
      Ninjutsu Specialist level after 1st.</p><hr /><h3>Proficiencies</h3><p><strong>Armor:</strong> Light armor<br
      /><strong>Weapons:</strong> All Simple Weapons<br /><strong>Ninja Tools:</strong> Alchemist Kits, Hackers Kit<br
      /><strong>Saving Throws:</strong> Intelligence, Wisdom, Charisma<br /><strong>Skills:</strong> Ninshou, Choose
      four from Insight, Investigation, History, Stealth, Perception, Chakra Control.</p><h1>Ninjutsu Specialist
      Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency Bonus</th><th>Features</th><th>Refined
      Ninjutsu</th><th>Efficient Molding</th><th>Jutsu Known</th><th>Highest Rank Jutsu
      Known</th></tr></thead><tbody><tr><td>1st</td><td>+3</td><td>Chakra Recovery, Refined
      Ninjutsu</td><td>2</td><td>-</td><td>6</td><td>D-Rank</td></tr><tr><td>2nd</td><td>+3</td><td>Ninjutsu
      Tradition</td><td>2</td><td>-</td><td>7</td><td>D-Rank</td></tr><tr><td>3rd</td><td>+3</td><td>Efficient
