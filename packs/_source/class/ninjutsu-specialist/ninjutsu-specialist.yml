        name: Ninjutsu Specialist
        type: class
        img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
        system:
          description:
            value: >-
              <p>Ninjutsu Specialists focus on shaping chakra into techniques that solve problems at range, control the
              battlefield, or overwhelm enemies with precise elemental and non-elemental jutsu.</p> <h3>Quick Build</h3>
              <p>Make Intelligence your highest ability score, followed by Constitution or Dexterity. Orochimaru's
              Observation Compendium recommends Sarutobi, Uchiha, Uzumaki, or Non-Clan as common clan choices.</p>
              <h3>Hit Points and Chakra</h3> <p><strong>Hit Dice:</strong> 1d6 per Ninjutsu Specialist level.<br
              /><strong>Hit Points at 1st Level:</strong> 6 + your Constitution modifier.<br /><strong>Hit Points at
              Higher Levels:</strong> 1d6, or 4, + your Constitution modifier per Ninjutsu Specialist level after
              1st.</p> <p><strong>Chakra Dice:</strong> 1d12 per Ninjutsu Specialist level.<br /><strong>Chakra at 1st
              Level:</strong> 12 + your Constitution modifier. <br /><strong>Chakra at Higher Levels:</strong> 1d12, or
              7, + your Constitution modifier per Ninjutsu Specialist level after 1st.</p> <h3>Proficiencies</h3>
              <p><strong>Armor:</strong> Light armor.<br /><strong>Weapons:</strong> All simple weapons.<br
              /><strong>Ninja Tools:</strong> Alchemist Kits and Hackers Kits.<br /><strong>Saving Throws:</strong>
              Intelligence, Wisdom, and Charisma.<br /><strong>Skills:</strong> Ninshou, plus four from Insight,
              Investigation, History, Stealth, Perception, and Chakra Control.</p> <h3>Jutsu Casting</h3> <p>Ninjutsu
              uses Intelligence, Genjutsu uses Wisdom, and Taijutsu uses Strength for attack rolls and save DCs.</p>
              <h3>Level 1 Features</h3> <p>@UUID[Compendium.n5eb.class.Item.n5ebJutsuCast001]{Jutsu Casting},
              @UUID[Compendium.n5eb.class.Item.n5ebChakraRec001]{Chakra Recovery}, and
              @UUID[Compendium.n5eb.class.Item.n5ebRefinedNin01]{Refined Ninjutsu}.</p>
