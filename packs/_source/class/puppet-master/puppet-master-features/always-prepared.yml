system:
  description:
    value: >-
      <p>Beginning at 15th level, you always come prepared for whatever mission you take.</p><p> You and your Puppet
      Tool gain an additional +5 to your maximum bulk (Or you gain a +10 to your max bulk if you do not have a
      Puppet).</p><p> Twice per full rest, while taking a short or long rest, you can convert up to 1 charge of a
      Toolkit or one Medical pill to be as if it was a Toolkit or Medical Pill of one quality higher.</p><p>
      Alternatively, using this feature, you can convert it to be two uses of a lower quality Toolkit or Medical
      pill.</p><p> Additionally, you can change your Puppet Upgrades as if you took a long rest, during a short rest
      instead, so long as the Upgrades being exchanged are of a tier equal to or less than the current rank
      chosen.</p><p> At 18th level, after a rest of any type, you can select and create a temporary version of an
      Upgrade from your Puppet Technique you are qualified to take but do not have.</p><p> This Upgrade must be of
      Silver tier or lower.</p><p> You have this Upgrade until you complete a rest, during which you can select a
      temporary Upgrade with this feature again.</p><p></p>
