system:
  description:
    value: >-
      <p>Beginning at 3rd level, your study of chakra-enhanced items and crafting allows you to easily equip
      seals.</p><p> Your Puppet Tool gains a number of seal slots equal to 2 + your Proficiency Bonus.</p><p> You can
      place both Armor and Weapon seals on your puppet (Weapon Seals affect its natural weapons and Upgrades
      simultaneously.) </p><p>If you do not have a Puppet Tool, select 1 weapon or armor you have to gain the benefits
      of this feature.</p><p> This Weapon or Armor can be resealed without destroying it.</p><p> Additionally, you
      reduce the downtime and ryo needed to craft chakra-enhanced items by -25%.</p><p> You also increase weekly market
      value for crafting non-chakra- enhanced items by +50 Ryo.</p><p> At 13th level, the downtime and ryo reduction
      increases to -50%, and you increase your weekly market value by +100 Ryo instead.</p><p></p>
