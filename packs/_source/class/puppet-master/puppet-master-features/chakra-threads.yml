system:
  description:
    value: >-
      <p>Beginning at 1st level, as a Puppet Master you learn the Chakra Hands E-Rank Ninjutsu for free.</p><p> When you
      cast this jutsu, it takes the form of strings that extend from your fingertips.</p><p> Chakra Hands no longer
      costs chakra nor an action to cast, and its duration becomes 10 minutes.</p><p> The maximum weight your strings
      can lift is multiplied by your Proficiency Bonus.</p><p> At 9th level, losing the ability to mold chakra does not
      prevent you from using your Chakra Threads.</p><p></p>
