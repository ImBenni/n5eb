      checks that you aren't proficient in, and you can take the Help action as a Bonus Action.</p><p> When you take the
      Help action to assist an ally in attacking a creature (your Puppet Tool counts as an allied creature), the target
      of the attack can be within 30 feet, instead of 5 feet, provided your ally can see and hear you.</p><p></p>
