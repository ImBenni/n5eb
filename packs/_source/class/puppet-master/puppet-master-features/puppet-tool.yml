folder: HJk0TfREy0Yo2Pg5
name: Puppet Tool
type: feat
_id: I0EQX6b1JHvqSEOx
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, you craft a Puppet Tool to carry out your orders and protect you.</p><p> Your Puppet
      Tool starts with the statistics below; You learn the Mending E-Rank Ninjutsu, which does not count against your
      known.</p><p> A Puppet Tool acts under your command via your chakra threads, thus, if you are unable to make
      Chakra Threads, you cannot control your Puppet.</p><p> You can command a Puppet to move on your turn, and you can
      spend your action or Bonus Action to command a Puppet to take an action and Bonus Action, once per turn.</p><p> A
      Puppet has one Bonus Action per round, and it can only be used to activate upgrades or Puppet Master
      features.</p><p> You can also use your Reaction, to have your Puppet take a Reaction.</p><p> A Puppet Tool
      increases one of its ability scores by +2, or two ability scores by +1, when you gain an Ability Score
      Improvement/Feat from this class.</p><p> A Puppet Tool can have no more than 20 in an ability score as
      normal.</p><p> While connected to a Puppet Tool or in contact with it, as an action, you can cast the Mending
      Ninjutsu to restore a number of its hit points equal to 2d6 + half your Puppet Master level.</p><p> This die
      increases to 2d8 at 9th level and 2d10 at 15th level of this class.</p><p> Alternatively, you can cast Mending for
      its entire duration while within 5 feet of the Puppet Tool.</p><p> If you do, it recovers half of its maximum hit
      points.</p><p> After healing the Puppet Tool this way, if it isn't destroyed after 1 minute, your chakra pulls it
      back together, regaining its full hit points.</p><p> On a full rest, you can spend 1 charge of an Armorsmith or
      Weaponsmith kit to scavenge an existing Puppet Tool to create a new one, or completely replicate a destroyed
      Puppet.</p><p> You store your Puppet Tool in a special reusable weapon scroll.</p><p> You can store your Puppet
      Tool into this scroll as an action, and you can release it as part of rolling initiative or at any point on your
      turn.</p><p> The size of the scroll reflects the puppet's size.</p><p> Starting at 6th level when you do not
      command a Puppet you are connected to on your turn, that puppet takes the dodge action.</p><p> You also do not
      need to use your Reaction to command a Puppet to take its Reaction.</p><p></p>
