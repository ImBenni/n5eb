system:
  description:
    value: >-
      <p>While Puppet Masters possess unique and powerful bukijutsu in the form of a puppet, they are aware of the
      obvious flaw of their technique: placing all of their cards into another body which can be destroyed.</p><p> As
      such, Puppet Masters prepare for this outcome by adopting Tactics to use that do not require their Puppet to
      function.</p><p> These Tactics can be found at the end of this class description.</p><p> Beginning at 2nd level,
      you gain one tactic.</p><p> At 11th level, you gain a second tactic.</p><p> You can change your chosen tactics
      when you gain a level in this class.</p><p></p>
