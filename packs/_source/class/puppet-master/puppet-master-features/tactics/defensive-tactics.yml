system:
  description:
    value: >-
      <p>You prioritize defense and survivability.</p><p> Reduce the cost of any jutsu with the casting time of 1
      Reaction that would provide you with any bonuses to saving throws, AC, or grant you damage reduction or temporary
      hit points, by an amount equal to the jutsu's rank.<br /> (D-Rank: 1, C-Rank: 2,B-Rank: 3, A-Rank: 4, S-Rank: 5)
      </p><p>At 11th level, when using any jutsu that gives you a bonus to saving throws or AC as a Reaction, for the
      first save you make or first attack against you, increase your saving throw or AC by half your Intelligence
      Modifier.</p><p> For jutsu that give damage reduction or temporary hit points, increase the amount gained by twice
      your Intelligence Modifier, once per casting.</p><p></p>
