system:
  description:
    value: >-
      <p>You prioritize adaptability and aiding your allies.</p><p> Select a number of skills equal to your Intelligence
      Modifier.</p><p> Your Puppet Tool can use your skill bonuses in place of their own for these skills.</p><p> If you
      do not have a Puppet Tool that could benefit from this tactic, choose two skills you are not proficient in.</p><p>
      While you have this tactic, you are proficient with these skills.</p><p> At 11th level, when you would use a
      Skill-Based Action (Chapter 6., SHB) that would normally require you to use your action, you may instead perform
      it with your Bonus Action.</p><p></p>
