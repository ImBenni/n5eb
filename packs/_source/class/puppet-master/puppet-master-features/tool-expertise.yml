system:
  description:
    value: >-
      <p>Starting at 7th level, you double your Proficiency Bonus with checks using tools and kits you have proficiency
      in that are granted by this class (This is Mastery). </p><p>You can also seal 5 extra bulk into an item scroll, as
      you enhance its sealing properties.</p><p>Additionally, when you use a jutsu scroll you can choose to use your
      relevant modifier instead of the static jutsu attack and Save DC calculations.</p>
