system:
  description:
    value: >-
      <p>Techniques: All, Perfect </p><p></p><p>An armament first created by the renowned puppet master, Shugi
      Gizo.</p><p> You install a small blaster inside of your Puppet, Armor, or Weaver Gloves that can be fitted with
      either oil or water to launch a blast of fire or water respectively.</p><p> Choose one of the following options;
      You can select this upgrade a second time to gain the other option.</p><p> You can use this upgrade a number of
      times equal to half your Proficiency Bonus per long rest.</p><p> X is equal to your Proficiency
      Bonus.</p><p></p><p> • Fire Ray.</p><p> Ranged Weapon Attack: Range 120ft, one target.</p><p> Hit: Xd4 +
      Nin/Tai/Gen ability modifier in Fire damage.</p><p> On a roll of a 18-20, inflict 1 rank of Burned until the end
      of the creature's next turn.</p><p> This weapon can be refilled before resting by finding a source of
      oil.</p><p></p><p> • Water Ray.</p><p> Ranged Weapon Attack: Range 120ft, one target.</p><p> Hit: Xd4 +
      Nin/Tai/Gen ability modifier in Cold damage.</p><p> On a roll of a 18-20, inflict 1 rank of Chilled until the end
      of the creature's next turn.</p><p> This weapon can be refilled before resting by finding a source of water, that
      does not come from a jutsu.</p><p></p>
