name: Chakra Sealing Trap
type: feat
_id: tY13uHkMyBrHnd1V
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Red, Perfect </p><p></p><p>Your Puppet Tool is fitted with a device that allows
      it to suppress the chakra of others, as well as its own.</p><p> This upgrade can be used offensively or
      supportively.</p><p> Once you have used this upgrade you cannot use it again until you take a rest.</p><p> This
      ends early if your Puppet reaches 0 hp.</p><p> Alternatively, this upgrade can be activated without taking a rest
      by spending 6 chakra.</p><p></p><p> Offensively: </p><p>Your Puppet Tool emits a 30-foot destabilizing aura for 1
      minute.</p><p> When a hostile creature within range would cast a jutsu, it must make a Constitution saving
      throw.</p><p> On a failed save, they spend an additional amount of chakra equal to half the cost of the
      jutsu.</p><p> Creatures who fail by 10 or more by double the cost.</p><p></p><p> Supportively: </p><p>As an
      action, your Puppet Tool performs the Suppress Chakra Skill Based Action, using your chakra control bonus, with a
      +1d4 bonus.</p><p> When your Puppet Tool does this, it suppresses the chakra of all allied creatures within 30
      feet of it.</p><p> This effect persists as long as the allied creature remains within 120ft of the Puppet
      Tool.</p><p> This lasts for 1 hour, or until your Puppet Tool enters combat.</p><p></p>
