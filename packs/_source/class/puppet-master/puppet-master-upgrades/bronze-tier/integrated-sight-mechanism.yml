    value: >-
      <p>Techniques: Black, Blue, Green, Red </p><p></p><p>You fit yourself and your Puppet Tool with a visual
      connection mechanism.</p><p> As an action on your turn, you can blind yourself to your surroundings in order to be
      able to see through your Puppet Tool's vision, gaining any special sight your Puppet Tool has, but losing any you
      have yourself.</p><p> You can maintain this visual connection for up to 1 minute, or you can end it early as a
      Bonus Action on your turn.</p><p></p>
