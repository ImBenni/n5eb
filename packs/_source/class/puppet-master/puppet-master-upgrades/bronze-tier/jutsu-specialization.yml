name: Jutsu Specialization
type: feat
_id: lkypaDMflNECjfKs
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Red </p><p></p><p>You install a mechanism to enable your Puppet Tool to utilize
      jutsu.</p><p> Your Puppet Tool gains access to two D- Rank Ninjutsu, Taijutsu, or Bukijutsu that you know, once
      knew, or that one of your allies knows (as long as you can access the same keywords).</p><p> The jutsu learned
      must have a casting time of 1 action, Bonus Action, or Reaction, and a duration of instant (Bonus Action jutsu use
      the Puppet's action to cast).</p><p> You can change the jutsu the Puppet knows on a long rest.</p><p> For those
      who follow the Red or Green Technique, Puppets that acquire this upgrade can also learn Ninjutsu or Genjutsu, with
      a maximum duration of 1 minute.</p><p> Your Puppet Tool has disadvantage on concentration checks, and shares your
      concentration slots.</p><p> All jutsu your Puppet Tool casts uses your chakra.</p><p> For Ninjutsu and Genjutsu,
      it uses either your or its own Ninjutsu and Genjutsu ability modifier to calculate its Ninjutsu and Genjutsu
      attack bonus and Save DC respectively.</p><p> Taijutsu and Bukijutsu use only the Puppet's statistics for
      calcuating its Taijutsu attack bonus and Save DC.</p><p> This upgrade can be taken multiple times, either giving
      it to the same Puppet Tool for it to gain 2 more jutsu of a rank attributed to the upgrade tier, or to a different
      Puppet.</p><p></p><p> At Later Levels: You can take this upgrade as a Silver, Gold, or Platinum tier upgrade to
      grant your Puppet Tool access to jutsu up to C-Rank, up to B-Rank, or up to A- Rank.</p><p></p>
