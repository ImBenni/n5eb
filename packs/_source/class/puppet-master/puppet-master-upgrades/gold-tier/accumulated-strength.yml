img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Blue, White, Perfect </p><p></p><p>You have begun to see the strings that tie the world itself
      together, expanding your brain to adjust these strings to new possibilities.</p><p> As a Bonus Action you can
      connect your strings to inanimate object(s) to increase your striking power.</p><p> Make an Intelligence (Chakra
      Control) check based on the size of the object; small 10, medium 15, huge 20, gargantuan 25 on a success you
      coalesce the mass into a weapon you can use.</p><p> When you or someone connected to your strings would make a
      melee attack you can embolden it with your object(s), increasing the damage by an amount of die equal to the size,
      +1 small, +2 medium etc.</p><p> you can do this twice per round.</p><p> You can maintain this mass of object(s)
      for a number of rounds equal to your Proficiency Bonus.</p><p> Each application of extra damage as a result of
      this upgrade reduces the duration by 1 round.</p><p> If you can no longer maintain this mass of objects(s) becomes
      too heavy to bear and falls into an unusable glob of debris.</p><p></p>
