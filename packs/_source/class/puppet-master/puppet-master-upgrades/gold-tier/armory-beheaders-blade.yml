system:
  description:
    value: >-
      <p>Techniques: All </p><p></p><p>A macabre upgrade first invented by the eccentric Puppet Master Yu
      Igarashi.</p><p> It uses one's own lifeforce to enhance the user or their puppet's power.</p><p> As a Bonus
      Action, you can activate this upgrade.</p><p> When you do, select one of you or your puppet's melee weapons,
      losing Hit Points equal to the weapon's damage + 2d8, transforming it into a large, bloody scythe, and gaining the
      following benefits for 1 minute; • This weapon deals an extra 2d8 necrotic damage, twice per turn.</p><p> • The
      weapon's reach is increased by 5 feet.</p><p> • Attacks made with the weapon have a +1 to attack and damage
      rolls.</p><p> • Once per round, when the wielder of the weapon scores a critical hit, the target must succeed a
      Constitution Saving throw or be stunned until the end of their next turn.</p><p> • When a creature would be
      reduced to 0 hit points by this weapon, they immediately die, being beheaded and unable to be revived by any means
      short of an S- Rank jutsu.</p><p></p>
