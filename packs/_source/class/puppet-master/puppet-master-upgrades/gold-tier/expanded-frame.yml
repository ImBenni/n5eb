system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Red </p><p>Prerequisite: Enhanced Durability </p><p></p><p>You reinforce and
      expand your Puppet Tool's frame.</p><p> Your Puppet increases its size category by one, up to a maximum of
      Large.</p><p> The Puppet gains advantage on Strength checks and Strength saving throws, and gains 5 damage
      reduction against all damage types, excluding fire.</p><p> Additionally, if your Puppet is large after taking this
      upgrade, it increases the damage die of its weapons (and upgrades) by +1.</p><p> You can take this upgrade
      multiple times, once for each Puppet Tool you have.</p><p></p>
