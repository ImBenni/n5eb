system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Purple, Red </p><p>Prerequisite: Eye Lights </p><p></p><p>You improve upon the
      light mechanisms within your Puppet's eyes.</p><p> You can choose to double the areas of both sources of light
      when your Puppet uses the Eye Light upgrade.</p><p> Regardless of whether it is active, your Puppet Tool can use
      your skill bonuses for Search action checks, and also has advantage on Search action checks.</p><p> Once per rest,
      on your turn (no action required) you can allow yourself to see through both your Puppet Tool's perspective and
      your perspective simultaneously.</p><p> If either of you can see the other, you are both immune to being
      surprised, blinded, and dazzled, and the first attack roll made against either of you per turn is at
      disadvantage.</p><p> This effect lasts for 1 minute or until you dismiss it on your turn.</p><p> If you dismiss it
      early, you can reactivate it again later.</p><p></p>
