system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Red, White </p><p>Prerequisite: Countermeasures </p><p></p><p>You install a
      tiny electronic device that surges your Puppet Tool (or you if you practice the White Technique) with chakra to
      restabilize itself.</p><p> At the start of your next turn after they fell to 0 hit points, they can make a
      Constitution saving throw against a DC equal to half the damage remaining after they fall to 0 hit points.</p><p>
      On a success, they revive at 1 hit point instead.</p><p> For those that practice the White technique, you have a
      +1d6 bonus to death saving throws for the next 3 death saving throws you make after this upgrade activates.</p><p>
      Once this upgrade activates it cannot activate again until you take a long rest.</p><p></p>
