system:
  description:
    value: >-
      <p>Techniques: All </p><p></p><p>A weapon first created by Kurayami Nara.</p><p> You craft a chakra fueled speaker
      into your Puppet Tool.</p><p> Your Puppet Tool as an action can spend 6 chakra to release a 15-foot radius or
      15-foot cone (pick one) of deafening sound.</p><p> All creatures within range must make a Constitution saving
      throw, taking 6d8 force and becoming Deafened on a failure, or half damage and no effects on a success.</p><p> A
      creature deafened by this upgrade remakes the saving throw to remove the deafened condition at the end of each of
      their turns.</p><p> Creatures who fail their saving throw by 10 or more are Stunned until the start of their next
      turn.</p><p></p>
