system:
  description:
    value: >-
      <p>Techniques: All </p><p></p><p>You craft a cannon into a part of your puppet meant to channel your chakra into a
      single blast of destructive power.</p><p> When your puppet takes the attack action, it can spend 15 of your chakra
      to unleash a 60-foot line, 5-foot wide beam of pure chakra in a direction of your choice.</p><p> Each creature
      caught in the line must make a Dexterity saving throw, taking 12d12 force damage and being knocked prone on a
      failed save.</p><p> Or no damage on a successful save or effects.</p><p></p>
