system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Purple, Red </p><p>Prerequisite: For those who practice the Purple technique,
      your Armor Type must be a Steel Fortress.</p><p></p><p> You rig your puppet to explode in the event it is
      destroyed to deal significant damage.</p><p> When your puppet tool is reduced to 0 hit points, the tags attached
      to it explodes.</p><p> Each creature within 30 feet of the puppet tool must make a Dexterity saving throw, taking
      15d4+15 fire damage on a failed save, or half as much on a successful one.</p><p> Once this happens the puppet and
      all its parts are destroyed beyond repair.</p><p> For those who practice the Purple technique, you eject yourself
      45 feet away from your Armor when you use this upgrade.</p><p></p>
