system:
  description:
    value: >-
      <p>Techniques: Blue, Green, Purple </p><p></p><p>Your force of will continues to fuel your Puppets to battle even
      as your mind weakens and your body begins to wither.</p><p> If you fall unconscious while commanding your Puppet
      Tools, your Puppet Tools are still able to act as if you were commanding them.</p><p> You also do not need to make
      death saving throws at the start of each of your turns until all of your Puppets reach 0 hit points.</p><p> For
      those who practice the Purple technique, this upgrade can also apply while wearing your Juggernaut Armor, granting
      you the ability to continue moving and taking actions on your turn, though you are unable to cast jutsu not
      granted by an upgrade.</p><p> If you also have the Juggernaut Slayer upgrade, this upgrade can trigger after that
      upgrade ends.</p><p></p>
