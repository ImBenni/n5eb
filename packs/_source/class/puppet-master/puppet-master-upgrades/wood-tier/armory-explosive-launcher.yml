system:
  description:
    value: >-
      <p>Techniques: All, Perfect </p><p></p><p>An ideal armament for dealing with large crowds of foes or inconvenient
      structures, first crafted by Ajisai Haruno.</p><p> You install a launching mechanism of your own description in
      your Puppet Tool, Juggernaut Armor, or Weaver Gloves.</p><p> This launcher can hold up to 3 Explosive
      Tools.</p><p> When the one equipped with this upgrade would take the attack action, they can replace one attack to
      launch one of these explosives at a creature within 60ft.</p><p> Loading this upgrade with explosives takes an
      action.</p><p> At Higher Levels: This upgrade can be taken using higher tier upgrade slots.</p><p> For each tier
      this upgrade is taken at above Wood tier, increase the number of explosive tools this upgrade can hold by
      +1.</p><p></p>
