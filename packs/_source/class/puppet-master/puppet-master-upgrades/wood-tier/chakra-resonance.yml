system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Red</p><p></p><p>You have developed a system to share your chakra to your
      Puppet in place of yourself.</p><p>When you cast a jutsu with a range of Self or Touch, you can, in place of
      yourself, originate the casting of the jutsu in your Puppet's space, allowing it to benefit from the jutsu as if
      you cast it.</p><p>This Upgrade does not work with jutsu that would create objects, structures, or summon
      creatures.</p><p>(For those who follow the Green Technique, only one Matryoshka body can gain the benefits of this
      Upgrade.)</p><p></p><p>At Later Levels: You can choose to take this upgrade as a Silver tier upgrade.</p><p>If you
      do, when you cast a jutsu with a range of Self, you and your Puppet always simultaneously benefit.</p><p></p>
