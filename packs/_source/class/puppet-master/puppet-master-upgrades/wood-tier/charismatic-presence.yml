system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Purple, Red, Perfect </p><p></p><p>You're skilled at using your Puppet Tool as
      a way to get what you want out of a conversation.</p><p> While engaged in a social conversation and your Puppet
      Tool is present nearby (or you are wearing your Juggernaut Armor), you can choose to give yourself proficiency in
      Persuasion , Performance, or Intimidation temporarily.</p><p> If you are already proficient, you gain a +1d6 bonus
      to the roll.</p><p> A creature can be affected by this upgrade twice per hour.</p><p> You must narrate the context
      for what you or your Puppet is doing to gain the benefits of this upgrade (Ex.</p><p> Intimidating a foreign
      invader, your Puppet gives a threatening stare; You are trying to impress someone, and your Puppet gives them a
      smile).</p><p></p>
