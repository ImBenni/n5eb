  description:
    value: >-
      <p>Techniques: All, Perfect </p><p></p><p>Your Puppet Tool is equipped with useful jutsu to aid you or your allies
      in a pinch.</p><p> Twice per rest, your Puppet Tool may cast the Release or Escape Technique on an allied creature
      within 30ft as an action or Bonus Action.</p><p> For those who practice the White or Purple techniques, if you are
      the one being targeted for this upgrade, as long as you are wearing your Weaver Gloves or Juggernaut Armor, you
      can use this upgrade at the start of your turn (no action required), once per turn.</p><p></p>
