system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Purple </p><p></p><p>Your Puppet Tool must be Large to benefit from this
      upgrade.</p><p> You fit your Puppet Tool with hydraulic mechanisms that can allow it to put more force when
      obstacles come in its way.</p><p> Your Puppet Tool now deals double damage to constructs, structures, and objects
      with its Natural Weapons, Upgrades, and Jutsu.</p><p> If your Puppet already does this, it instead deals triple
      damage.</p><p> For those who follow the Purple technique, this upgrades benefits apply to you if you are wearing
      your Juggernaut Armor and it is an Iron Shell or Steel Fortress.</p><p></p>
