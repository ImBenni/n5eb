system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Red </p><p></p><p>You install a mechanism to restrain its targets.</p><p> When
      your puppet attempts to grapple a creature, it applies your Proficiency Bonus to the roll (or twice your
      Proficiency Bonus if the Puppet Tool already has this ability).</p><p> When you successfully grapple a creature
      with this upgrade, the target creature is restrained, and your puppet still has the rest of its appendages for
      other uses.</p><p> Additionally, it can move its restrained target without any reduction of its movement
      speed.</p><p></p>
