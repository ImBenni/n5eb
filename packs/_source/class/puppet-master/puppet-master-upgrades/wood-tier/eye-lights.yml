system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Purple, Red, Perfect </p><p></p><p>You install small light producing mechanisms
      in your Puppet's eyes.</p><p> On your turn (no action required), you can activate or deactivate these
      lights.</p><p> While active, your Puppet emits 15 feet of bright light and 30 feet of Dim Light, in the shape of a
      line or cone (you pick).</p><p> While these lights are active, your Puppet cannot be blinded and raises its
      Passive Perception by +2.</p><p> You can take this upgrade multiple times, once for each Puppet you
      have.</p><p></p>
