    value: >-
      <p>Techniques: Blue, Green, Purple </p><p></p><p>You fit your Puppet Tool with a small device that can record what
      your Puppet Tool sees as well as what it hears.</p><p> Your Puppet Tool can record up to 1 hour of footage (spread
      throughout one or multiple recordings), before it begins to overwrite its stored data.</p><p> As an action on your
      turn, you can have your Puppet Tool project a holographic render of what it has seen and play any audio that would
      accompany it.</p><p></p>
