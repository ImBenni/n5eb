  description:
    value: >-
      <p>Techniques: Blue, Green, Red, Perfect </p><p></p><p>The eyes/sensors of your Puppet Tool are able to move
      quickly to analyze an incoming threat.</p><p> When your Puppet Tools take the Read the Enemy action, they can use
      your skill proficiencies for whatever checks they require, and spread any benefits they would receive to you, and
      any allies within 5 feet of them.</p><p> If you take the Read the Enemy action, all of your Puppets always gain
      its benefits.</p><p></p>
