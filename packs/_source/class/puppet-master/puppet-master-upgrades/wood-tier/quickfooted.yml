system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Red, Perfect </p><p></p><p>You invest in parts that are both light-weight and
      flexible.</p><p> Your Puppet increases its movement speed by 15 feet, and gains proficiency in the Athletics and
      Acrobatics skills.</p><p> You can take this upgrade multiple times, once for each Puppet.</p><p> Additionally,
      your Puppet can take the dash action as a Bonus Action.</p><p> When your Puppet would Dash, its jumping speed is
      doubled until it stops moving.</p><p></p>
