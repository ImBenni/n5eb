system:
  description:
    value: >-
      <p>Techniques: Black, Blue, Green, Perfect </p><p></p><p>You install clever mechanisms to allow your Puppet Tool
      to change its size.</p><p> As an action or Bonus Action on your turn, you can have your Puppet become one size
      smaller or one size larger, to a minimum of small and a maximum of huge.</p><p> Activating this upgrade again
      reverts your Puppet's size.</p><p> While your Puppet Tool is one size smaller, it gains a +1 to Dexterity saves
      and can move through spaces occupied by other creatures larger than it.</p><p> While your Puppet Tool is one size
      bigger, it increases its AC by +1 but lowers its movement speed by 5 feet.</p><p></p>
