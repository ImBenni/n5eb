system:
  description:
    value: >-
      <p>Techniques: All </p><p></p><p>Select one Fighting Stance from Chapter 13: Customization options.</p><p> Your
      Puppet Tool gains this Fighting Stance.</p><p> Puppets are able to use Bonus Action stance abilities.</p><p> For
      those who follow the Black or Green Technique, you can select this upgrade multiple times, once for each Puppet
      Tool you have.</p><p> For those who follow the Red Technique, this upgrade is given to 2 Puppet Tools you possess
      when acquired (though your Puppets can have two different Fighting Stances).</p><p> You can select this upgrade
      again if you acquire 2 more Puppets.</p><p> For those who follow the Purple or White Technique, you yourself gain
      a fighting stance, only when wearing your Juggernaut Armor or Weaver Gloves respectively.</p><p></p>
