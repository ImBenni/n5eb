            your constitution modifier</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice:</strong> 1d10 per Puppet
            Master level<br /><strong>Chakra Points at 1st Level:</strong> 10 + your constitution modifier<br
            /><strong>Chakra Points at Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier per Puppet
            Master level after 1st.</p><hr /><h3>Proficiencies</h3><p><strong>Armor:</strong> Light armor, Medium
            armor<br /><strong>Weapons:</strong> All Simple Weapons, Battle Wires, Hand Crossbows, Heavy Crossbows,
            Fuma-Shuriken<br /><strong>Ninja Tools:</strong> Armorsmith Kit, Weaponsmith Kit<br /><strong>Saving
            Throws:</strong> Strength, Constitution, Intelligence<br /><strong>Skills:</strong> Crafting, Choose three
