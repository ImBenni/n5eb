system:
  description:
    value: >-
      <p>As a Puppet Master, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit Dice:</strong>
      1d8 per Puppet Master level<br /><strong>Hit Points at 1st Level and beyond:</strong> 8 + your constitution
      modifier</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice:</strong> 1d10 per Puppet Master level<br
      /><strong>Chakra Points at 1st Level:</strong> 10 + your constitution modifier<br /><strong>Chakra Points at
      Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier per Puppet Master level after 1st.</p><hr
      /><h3>Proficiencies</h3><p><strong>Armor:</strong> Light armor, Medium armor<br /><strong>Weapons:</strong> All
      Simple Weapons, Battle Wires, Hand Crossbows, Heavy Crossbows, Fuma-Shuriken<br /><strong>Ninja Tools:</strong>
      Armorsmith Kit, Weaponsmith Kit<br /><strong>Saving Throws:</strong> Strength, Constitution, Intelligence<br
      /><strong>Skills:</strong> Crafting, Choose three from Chakra Control, Deception, History, Insight, Intimidation,
      Investigation, Ninshou, Perception, Nature, Sleight of Hand, Stealth</p><h1>Puppet Master
      Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency Bonus</th><th>Features</th><th>Wood
      Tier</th><th>Bronze Tier</th><th>Silver Tier</th><th>Gold Tier</th><th>Platinum Tier</th><th>Jutsu
