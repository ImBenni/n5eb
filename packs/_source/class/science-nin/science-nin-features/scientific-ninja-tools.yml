name: Scientific Ninja Tools
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Also, at 2nd Level you gain the knowledge on how to build Scientific Ninja Tools.</p><p>These tools are a step
      above what a normal ninja can create, and as such take a lot of mental prowess to accomplish.</p><p>You gain a
      number of Creation Points as shown in the Science-Nin Table.</p><p>Scientific Ninja Tools can be created,
      upgraded, and replaced during a Long Rest.</p><p>Each has a Creation Point cost that it takes up and a CCD chakra
      drain that must be spent to activate it.</p><p>If a tool has prerequisites, you must meet them to install
      it.</p><p>However, you only need to pay the difference in their Creation Point Cost.</p><p>You can install the
      modification while you meet its prerequisites.</p><p></p>
