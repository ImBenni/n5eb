system:
  description:
    value: >-
      <p>As a Science-Nin, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit Dice:</strong>
      1d8 per Science-Nin level<br /><strong>Hit Points at 1st Level and beyond:</strong> 8 + your Constitution
      modifier</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice:</strong> 1d10 per Science-Nin level<br
      /><strong>Chakra Points at 1st Level:</strong> 10 + your Constitution modifier<br /><strong>Chakra Points at
      Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier per Science-Nin level after 1st.</p><hr
      /><h3>Proficiencies</h3><p><strong>Armor:</strong> Light armor, Medium Armor<br /><strong>Weapons:</strong> Simple
      Weapons, All Scientific Ninja Tools<br /><strong>Ninja Tools:</strong> 3 of your choice<br /><strong>Saving
      Throws:</strong> Dexterity, Constitution, Intelligence<br /><strong>Skills:</strong> Choose four from Ninshou,
      Insight, Investigation, Nature, Crafting, Athletics, History, Stealth, Perception, Medicine, Chakra
      Control.</p><h1>Science-Nin Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency
      Bonus</th><th>Features</th><th>Creation Points</th><th>Jutsu Known</th><th>Highest Rank Jutsu
      Known</th></tr></thead><tbody><tr><td>1st</td><td>+3</td><td>@UUID[Compendium.n5eb.class.Item.QZ5C1HlkJe66qTYK]{Shinobi
      of Science}, @UUID[Compendium.n5eb.class.Item.8nuVPf36DLHecovR]{Chakra Cell
      Enhancement}</td><td>-</td><td>6</td><td>D-Rank</td></tr><tr><td>2nd</td><td>+3</td><td>@UUID[Compendium.n5eb.class.Item.YjwUwbRLVjY84cK1]{Chakra
      Containment Device}, @UUID[Compendium.n5eb.class.Item.cR2QJqI5t2DS19H8]{Scientific Ninja
      Tools}</td><td>4</td><td>7</td><td>D-Rank</td></tr><tr><td>3rd</td><td>+3</td><td>@UUID[Compendium.n5eb.class.Item.9W60MXT5V6cEpqYG]{Scientific
      Inquiry}</td><td>6</td><td>8</td><td>D-Rank</td></tr><tr><td>4th</td><td>+4</td><td>Ability Score
      Improvement/Feat</td><td>8</td><td>8</td><td>D-Rank</td></tr><tr><td>5th</td><td>+4</td><td>@UUID[Compendium.n5eb.class.Item.hk1ZcPXJ300dXKJl]{Extra
      Attack}, @UUID[Compendium.n5eb.class.Item.zVxIROnY67DC6Rrh]{The Right
      Tool}</td><td>10</td><td>9</td><td>C-Rank</td></tr><tr><td>6th</td><td>+4</td><td>@UUID[Compendium.n5eb.class.Item.9W60MXT5V6cEpqYG]{Scientific
      Inquiry}
      (2)</td><td>12</td><td>10</td><td>C-Rank</td></tr><tr><td>7th</td><td>+5</td><td>@UUID[Compendium.n5eb.class.Item.hZdrtFK5uQyWASu5]{Yhprum's
      Law}</td><td>14</td><td>11</td><td>C-Rank</td></tr><tr><td>8th</td><td>+5</td><td>Ability Score
      Improvement/Feat</td><td>16</td><td>11</td><td>C-Rank</td></tr><tr><td>9th</td><td>+5</td><td>@UUID[Compendium.n5eb.class.Item.9W60MXT5V6cEpqYG]{Scientific
