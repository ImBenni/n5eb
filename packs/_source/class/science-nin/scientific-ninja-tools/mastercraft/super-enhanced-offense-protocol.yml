name: Super Enhanced Offense Protocol
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Cost: 32 Creation Points</p><p>Drain: 30 CCD Chakra</p><p></p><p>As a bonus action you may enhance all weapons within 30 ft with energy from the system.\_</p><p>Choose between acid, cold, fire, lightning, poison or wind.\_</p><p>Weapon attacks deal an additional 2d6 damage of this type for a minute.\_</p><p>You must pay 10 CCD Chakra at the start of your turn to maintain this effect.\_</p><p>As an action you may shoot a chakra beam at a target within 30ft.\_</p><p>Make a Ninjutsu Attack roll This attack deals Force damage equal to 6d6 + your Intelligence modifier.\_</p><p>On a Successful attack you can spend 10 additional Chakra to force the target to make a Strength save.\_</p><p>On a failure, it is sent flying back a number of feet equal to 5 x your Intelligence modifier, taking appropriate falling damage if it collides with an obstacle.\_</p><p>Huge or larger creatures gain advantage on this saving throw and are only pushed back half the distance.</p>"
