    value: "<p>Cost: 2 Creation Point</p><p>Drain: 5 CCD Chakra</p><p></p><p>You integrate a booster in your body that enhances your jutsu's that deal Earth damage.\_</p><p>While wielding this amplifier, when a creature takes Earth damage from a jutsu you cast, you can activate this amplifier.\_</p><p>The target creature takes additional Earth damage equal to your Intelligence modifier.\_</p><p>You can use this amplifier a number of times equal to your Intelligence modifier (a minimum of once).\_</p><p>You regain all expended uses when you complete a short or long rest</p>"
