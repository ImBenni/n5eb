name: Autonomous Ninja Tools
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Cost: 4 Creation Points</p><p>Drain: 5 CCD Chakra</p><p></p><p>You learn how to craft small sentry turrets shaped like globes that can adhere to any surface, called A.N.Ts.\_</p><p>As an action or bonus action (your choice), you can spend the Drain of this upgrade and throw a sentry to a point you can see within 60 ft.\_</p><p>At the end of each of your turns, a deployed sentry automatically targets a hostile creature within 30 feet of it.\_</p><p>If multiple targets are available, one is chosen at random.\_</p><p>The target must make a Dexterity saving throw.\_</p><p>On a failed save, it takes 1d6 damage of your choice (decided when thrown) A.N.\_</p><p>Ts have 1 hit point, an AC equal to your Ninjutsu Save DC, and can be repaired over the course of a long rest.\_</p><p>Each sentry lasts for 1 minute before deactivating.\_</p><p>You can maintain a number of sentries equal to your Intelligence modifier.\_</p><p>If a Sentry is destroyed until it is repaired your limit is decreased by 1 for every destroyed sentry.</p>"
