name: Enhanced Explosive Amplifier
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Prerequisite: Explosive Amplifier</p><p>Cost: 4 Creation Points</p><p>Drain: 5 CCD Chakra</p><p></p><p>You fine tune your Explosive Amplifier.\_</p><p>When you activate this amplifier, you can spend additional CCD Chakra.\_</p><p>The target creature is also ignited for 1 minute.\_</p><p>At the start of each of its turns, the creature takes additional fire damage equal to your Intelligence modifier and then makes a Dexterity saving throw against your Ninjutsu Save DC, ending this effect on a success.\_</p><p>If the target or a creature within 5 feet of it uses an action to put out the flames, or if some other effect douses the flames, the effect ends.</p>"
