  description:
    value: "<p>Beginning at 7th level, you have found a jutsu that you specialize in better than anyone else who may have come before.\_</p><p>Select one Jutsu you know of B-Rank or Lower.\_</p><p>You gain one of the following benefits of your choice when using the chosen Jutsu.\_</p><p>You may switch which jutsu this feature affects whenever you would learn a new jutsu from leveling up in this class.\_</p><p>You can select a second Signature effect and Jutsu to gain the benefits of both effects beginning at 15th level.</p><hr /><ul><li><p>@UUID[Compendium.n5eb.class.Item.A9fyOhggclvN9pXE]{Signature Power}</p></li><li><p>@UUID[Compendium.n5eb.class.Item.3KBuzZAcyLd5EYRu]{Signature Ramping}</p></li><li><p>@UUID[Compendium.n5eb.class.Item.obvRMj1Qcky6T1U6]{Signature Control}</p></li></ul>"
