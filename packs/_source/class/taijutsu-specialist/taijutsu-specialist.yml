system:
  description:
    value: >-
      <p>As a Taijutsu Specialist, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit
      Dice</strong>: 1d12 per Taijutsu Specialist level<br /><strong>Hit Points at 1st Level and beyond</strong>: 12 +
      your constitution modifier<br /><strong>Hit Points at Higher Levels</strong>: 1d12 (or 7) + your Constitution
      modifier per Taijutsu Specialist level after 1st.</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice</strong>:
      1d6 per Taijutsu Specialist level<br /><strong>Chakra Points at 1st Level</strong>: 6 + your constitution
      modifier<br /><strong>Chakra Points at Higher Levels</strong>: 1d6 (or 4) + your Constitution modifier per
      Taijutsu Specialist level after 1st.</p><hr /><h3>Proficiencies</h3><p><strong>Armor</strong>: Light armor, medium
      armor<br /><strong>Weapons</strong>: Simple weapons, Combat Bracers, Iron Claws, Nunchaku, Tonfa, Knuckle Blades,
      Battle Wire<br /><strong>Ninja Tools</strong>: Disguise Kit, Trapper Kit<br /><strong>Saving Throws</strong>:
      Strength, Dexterity, Charisma<br /><strong>Skills</strong>: Martial Arts, Choose three from Acrobatics, Chakra
      Control, History, Insight, Investigation, Nature, Stealth, Perception, Medicine.</p><h1>Taijutsu Specialist
      Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency Bonus</th><th>Martial Die</th><th>Martial
      Techniques</th><th>Features</th><th>Jutsu Known</th><th>Highest Rank Jutsu
      Known</th></tr></thead><tbody><tr><td>1st</td><td>+3</td><td>-</td><td>-</td><td>Martial Defense, Unarmed
      Technique, Taijutsu
      Stance</td><td>6</td><td>D-Rank</td></tr><tr><td>2nd</td><td>+3</td><td>1</td><td>4</td><td>Martial Adept,
      Enhanced Movement</td><td>6</td><td>D-Rank</td></tr><tr><td>3rd</td><td>+3</td><td>1</td><td>4</td><td>Taijutsu
      Style</td><td>7</td><td>D-Rank</td></tr><tr><td>4th</td><td>+4</td><td>1</td><td>4</td><td>Ability Score
      Improvement/Feat</td><td>7</td><td>D-Rank</td></tr><tr><td>5th</td><td>+4</td><td>1</td><td>4</td><td>Martial
      Defense (2), Extra
      Attack</td><td>8</td><td>C-Rank</td></tr><tr><td>6th</td><td>+4</td><td>2</td><td>4</td><td>Unarmed Technique (2),
      Taijutsu Style (2)</td><td>8</td><td>C-Rank</td></tr><tr><td>7th</td><td>+5</td><td>2</td><td>5</td><td>Evasion,
      Chakra Enhanced
      Strikes</td><td>9</td><td>C-Rank</td></tr><tr><td>8th</td><td>+5</td><td>2</td><td>5</td><td>Ability Score
      Improvement/Feat</td><td>9</td><td>C-Rank</td></tr><tr><td>9th</td><td>+5</td><td>2</td><td>5</td><td>Martial
      Defense (3), Taijutsu Style
      (3)</td><td>10</td><td>B-Rank</td></tr><tr><td>10th</td><td>+6</td><td>3</td><td>5</td><td>Unbreakable
      Will</td><td>10</td><td>B-Rank</td></tr><tr><td>11th</td><td>+6</td><td>3</td><td>6</td><td>Unarmed Technique (3),
      Flow of Battle</td><td>11</td><td>B-Rank</td></tr><tr><td>12th</td><td>+6</td><td>3</td><td>6</td><td>Ability
      Score
      Improvement/Feat</td><td>11</td><td>B-Rank</td></tr><tr><td>13th</td><td>+7</td><td>3</td><td>6</td><td>Martial
      Defense (4), Master of
      Persistence</td><td>12</td><td>A-Rank</td></tr><tr><td>14th</td><td>+7</td><td>4</td><td>6</td><td>Taijutsu Style
      (4)</td><td>12</td><td>A-Rank</td></tr><tr><td>15th</td><td>+7</td><td>4</td><td>6</td><td>Perfect
      Body</td><td>13</td><td>A-Rank</td></tr><tr><td>16th</td><td>+8</td><td>4</td><td>6</td><td>Ability Score
      Improvement/Feat</td><td>13</td><td>A-Rank</td></tr><tr><td>17th</td><td>+8</td><td>4</td><td>6</td><td>Martial
      Defense (5), Taijutsu Style
      (5)</td><td>14</td><td>S-Rank</td></tr><tr><td>18th</td><td>+8</td><td>5</td><td>6</td><td>Perfect
      Mind</td><td>14</td><td>S-Rank</td></tr><tr><td>19th</td><td>+9</td><td>5</td><td>7</td><td>Ability Score
