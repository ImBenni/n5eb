name: Superior Weapon Flurry
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Beginning at 14th level, you gain an advanced level of proficiency with one of your Flurry
      Techniques.</p><p>Select two of the following benefits. You gain an additional benefit at 18th
      level.</p><ul><li><p>Your Enhanced Deflection flurry technique now lasts until the beginning of your next
      turn.</p></li><li><p>Your Enhanced Deflection allows you to choose to add a third of your maximum Flurry Die to
      your AC instead.</p></li><li><p>Your Perceptive Augmentation now lasts until the end of your next
      turn.</p></li><li><p>Your Perceptive Augmentation now grants you the effects of the Dash
      action.</p></li><li><p>Your Chained Reaction can now add two Flurry Die</p></li></ul>
