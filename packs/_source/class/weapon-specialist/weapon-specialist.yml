            <p>As a Taijutsu Specialist, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit
            Dice</strong>: 1d10 per Weapon Specialist level<br /><strong>Hit Points at 1st Level and beyond</strong>: 10
            + your constitution modifier</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice</strong>: 1d8 per Weapon
            Specialist level<br /><strong>Chakra Points at 1st Level</strong>: 8 + your constitution modifier<br
            /><strong>Chakra Points at Higher Levels</strong>: 1d8 (or 5) + your Constitution Modifier per Weapon
            Specialist level after 1st.</p><hr /><h3>Proficiencies</h3><p><strong>Armor</strong>: Light armor, medium
            armor, Heavy Armor<br /><strong>Weapons</strong>: All Simple and Martial Weapons<br /><strong>Ninja
            Tools</strong>: Trapper Kit, Poison Kit, Weaponsmith Kit, Armorsmith Kit<br /><strong>Saving
            Throws</strong>: Strength, Dexterity, Constitution<br /><strong>Skills</strong>: Martial Arts, Choose three
            from Acrobatics, Athletics, Crafting, History, Intimidation, Perception, Sleight of Hand, Stealth,
            Survival</p><h1>Weapon Specialist Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency
