name: Cursed Arts [Lvl 1]
type: feat
_id: F6WXmbqktbNwI9Ca
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Finally, at 1st level of this class mod, you also have been gifted with the knowledge of Cursed Arts. Cursed
      Arts are alternative versions of jutsu you currently know. They are mechanically distinct from normal Jutsu. You
      begin knowing 2 Cursed Arts and gain more as you gain levels in this class mod following the Cursed Seal table at
      the beginning of this class mod. </p><p>Select two Jutsu you currently know of B-Rank or lower. You create a
      cursed version of these jutsu with the Corrupted prefix attached to it (Ex. Lightning Release: Chidori, becomes
      Lightning Release: Corrupted Chidori or just Corrupted Chidori.). You do not lose the original version of these
      jutsu and can still cast them as normal; you just gain a Corrupted version of it as a Cursed Art. Cursed Arts have
      a unique cost structure when compared to normal jutsu or even normal jutsu cast using Cursed Chakra. The following
      is how much Cursed Arts with the Corrupted prefix costs based on their original Rank. These arts can still be
      upcasted as if it were a normal jutsu, up to S-Rank, but its cost is calculated as follows.</p><p> o D-Rank: 2
      Cursed Chakra,</p><p>    C-Rank: 4 Cursed Chakra,</p><p>    B-Rank: 7 Cursed Chakra,</p><p>    A-Rank: 10 Cursed
      Chakra,</p><p>    S-Rank: 15 Cursed Chakra. </p><p>Your Cursed Arts are differentiated further than just their
      name. Each Cursed Art you know gains two Corrupted boosts which modifies them by giving them additional effects,
      enhances them or changes the core functionality of the jutsu entirely. These boosts cannot be changed later unless
      otherwise stated within this class mod. You cannot apply a boost to the same Cursed Art more than once unless
      otherwise stated.</p><p>Depending on the jutsu you convert into Arts you will require an attack roll or saving
      throw. Additionally, normal jutsu you cast using Cursed Chakra use your Cursed Art Attack Bonus/Save DC
      calculation. Cursed Arts, regardless of duration, cannot last outside of your Cursed Seal Release duration.
      </p><p>To calculate your Cursed Art, Save DC and Attack bonus, do the following; </p><p>Cursed Art Save DC = 10 +
      half your character Level + your Proficiency bonus; </p><p>Cursed Art Attack Bonus = Half your character Level +
      your Curse Seal class mod level + Your Proficiency bonus;</p>
