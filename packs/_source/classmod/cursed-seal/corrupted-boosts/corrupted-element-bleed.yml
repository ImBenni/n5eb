system:
  description:
    value: >-
      <p>Your Art has a latent elemental effect. This can only be added to an Art that deals Damage or imposes a
      condition as a result of a failed Saving throw. When a creature would fail your arts Saving throw or you
      successfully score a hit with your Art, they gain 1 rank of the following Cursed Elemental conditions. This
      condition is treated as its original condition for the purposes of interacting with Class Mod features that
      interact with conditions. This condition cannot be cleansed by anything short of an S- Rank jutsu with the medical
      keyword that removes conditions or an Art that removes condition. </p><p>If your Art already inflicts the Bleed
      condition, it instead gains ranks of Cursed Hemorrhage equal to the number of ranks of Bleed it would normally
      inflict. If your Art does not inflict ranks of Bleed, then it inflicts 1 rank of Cursed Hemorrhage.</p><p>CURSED
      HEMORRHAGE </p><p>• For each rank of Cursed Hemorrhage a creature has, it takes 1d8 necrotic damage at the end of
      each of its turns. This damage reduces their maximum hit points and chakra. </p><p>• For every 10ft a creature
      moves while it has ranks of Cursed Hemorrhage, it gains 3 additional ranks. </p><p>• Creatures whom begin their
      turns within 10ft of a Hemorrhaging creature, that it considers its allies, gain 1 rank of Cursed Hemorrhage.</p>
