name: 'Corrupted Element: Corroded & Envenomed'
type: feat
_id: 45mR2ll1YR2CUlBn
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Art has a latent elemental effect. This can only be added to an Art that deals Damage or imposes a
      condition as a result of a failed Saving throw. When a creature would fail your arts Saving throw or you
      successfully score a hit with your Art, they gain 1 rank of the following Cursed Elemental conditions. This
      condition is treated as its original condition for the purposes of interacting with Class Mod features that
      interact with conditions. This condition cannot be cleansed by anything short of an S- Rank jutsu with the medical
      keyword that removes conditions or an Art that removes condition.</p><p>If your Art already inflicts the Corroded
      or Envenomed conditions, it instead gains ranks of Cursed Rot equal to the number of ranks it would normally
      inflict. If your Art does not inflict either of these conditions, then it inflicts 1 rank of Cursed
      Rot.</p><p>CURSED ROT (CORRODED/ENVENOMED) </p><p>• A creature with ranks of Cursed Rot that makes an attack or
      cast a Jutsu that requires Mobility (M) or Weapon (W) components, they lose Resistance and immunity (if they have
      it) to the damage type their attack or jutsu used, and gain vulnerability against the damage type, for a number of
      their turns equal to their ranks in this condition. </p><p>• A creature with Cursed Rot that would regain hit
      points, chakra points, or cleanse conditions that aren't Cursed Rot, loses Tenacity die each time any of the
      aforementioned things happen. </p><p>• A creature with Cursed Rot cannot gain the benefit of Blind Sight, Chakra
      Sight, Darkvision or Truesight.</p>
