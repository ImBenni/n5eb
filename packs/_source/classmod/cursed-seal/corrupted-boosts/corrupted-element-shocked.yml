name: 'Corrupted Element: Shocked'
type: feat
_id: VhY9ddPwHTTHAl3e
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Art has a latent elemental effect. This can only be added to an Art that deals Damage or imposes a
      condition as a result of a failed Saving throw. When a creature would fail your arts Saving throw or you
      successfully score a hit with your Art, they gain 1 rank of the following Cursed Elemental conditions. This
      condition is treated as its original condition for the purposes of interacting with Class Mod features that
      interact with conditions. This condition cannot be cleansed by anything short of an S- Rank jutsu with the medical
      keyword that removes conditions or an Art that removes condition.</p><p>If your Art already inflicts the Shocked
      condition, it instead gains ranks of Cursed Voltage equal to the number of ranks of Shocked it would normally
      inflict. If your Art does not inflict ranks of Shocked, then it inflicts 1 rank of Cursed Voltage.</p><p>CURSED
      VOLTAGE </p><p>• A creature with ranks of Cursed Voltage gains a -2 penalty to their proficiency bonus for each
      rank it has. </p><p>• A creature with ranks of Cursed Voltage cannot use Features or traits that cost an Action,
      Bonus Action or Reaction.</p><p>• A creature with ranks of Cursed Voltage automatically fails all Skill-Based
      Actions it attempts or is forced to make.</p>
