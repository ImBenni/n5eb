system:
  description:
    value: >-
      <p>You can only gain this Boost if your Art has the Fuinjutsu Keyword. Your Art doesn't just seal its victims
      movements or body, it places restrictions on the very soul. Creatures whom fails a saving throw vs your Art, or
      whom your score a successful hit against cannot cast jutsu of a specific rank.</p><p>On a hit or a hostile
      creatures failed save, select one Jutsu rank of your choice. The affected creature cannot cast jutsu, whose
      original rank is the rank you chose.</p>
