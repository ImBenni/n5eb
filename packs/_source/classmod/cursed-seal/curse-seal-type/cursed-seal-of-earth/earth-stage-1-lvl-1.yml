system:
  description:
    value: >-
      <p>You gain access to this stage of power when you have at least 1 rank of Corruption, and have at least 1 level
      in this class mod. Your markings begin to creep across the user's body originating from the location of the curse
      seal, in the shape of contorting and parallel lines, tattooing themselves across half of your body. These markings
      glow a flaming red for brief moments burning the power of Earth into your body, granting the following benefits;
      </p><p>• Hijutsu, Cursed Arts with the Hijutsu keyword and Clan feature you cast/use that provide bonuses to
      damage or damage reduction gains additional benefits based on the circumstances of the bonus. If a Hijutsu or
      Cursed Art could gain the benefit of two or more of these effects, either on its own or in combination with a clan
      feature, you must select the one it benefits from.</p><p> o Damage Dice</p><p>    ▪ Increase Damage Die step:
      Increase the number of damage dice rolled by +2, twice per casting. (Ex. Aburame Insect Amp, Akimichi Yellow Curry
      Pill, Inuzuka Savage Attack etc.)</p><p>    ▪ Once per casting: Increase the number of bonus damage die by your
      level in this class mod + 2. (Ex. Ranton Shocking Wave, Ranton Storm Release, Shoton Crystallization Die
      etc.)</p><p> o Damage Reduction</p><p>    ▪ Damage Reduction Die: Increase the number of dice rolled by +2, twice
      per casting. (Ex. Aburame Insect Amp, Akimichi Yellow Curry Pill, Inuzuka Savage Attack etc.)</p><p>    ▪ Increase
      Damage Reduction Die step: Increase the number of dice rolled by +2, twice per casting.</p><p>    ▪ Flat Damage
      Reduction: Increase the damage reduced by three times your level in this class mod, once per turn.</p><p> o Static
      Damage</p><p>    ▪ +1/2/3: This bonus damage is treated instead as +3/6/9 at the appropriate levels (Ex. Hebi
      Poison Potency, Kaguya Battle Hungry etc.)</p><p>    ▪ Proficiency to Damage: This bonus damage is doubled, once
      per turn/casting.</p><p>    ▪ Ability Modifier to Damage: Doubles the chosen ability modifier.</p>
