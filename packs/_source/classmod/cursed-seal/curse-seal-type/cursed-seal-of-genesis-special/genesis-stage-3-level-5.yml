  description:
    value: >-
      <p>You gain access to this Stage of power when you have at least 20 ranks of Corruption and are level 5 in this
      class mod. Your cursed chakra takes root deep within your very essence completely reshaping who you were as you
      become someone new.</p><p>• All Benefits of Cursed Seal of Genesis Stage 1 &amp; 2.</p><p>• You gain all Dominant
      Mutations.</p><p>• You gain Damage reduction equal to three times your level in this class mod.</p><p>• When you
      would roll a Raw Chakra die, you treat any roll less than 6, as 6.</p>
