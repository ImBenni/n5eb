img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>You gain access to this stage of power when you have at least 1 rank of Corruption, and have at least 1 level
      in this class mod. Your markings begin to creep across your body originating from the location of your cursed
      seal. They take the shape of black embers tattooing themselves across half of your body. These markings glow a
      flaming red for brief moments burning the power of Heaven into your body, granting the following benefits;</p><p>•
      Clan features you have that have use limits gain additional uses based on its type. All Additional uses granted by
      this class mod are always consumed first. (If the feature partially refreshes on a short rest and fully refreshes
      on a long rest, it is counted as a Short Rest for this class mod feature.)</p><p>o Dice-Based</p><p>▪ Short Rest:
      Additional dice equal to your level in this class mod +2. If the feature (Ex. Bakuton Shrapnel Dice, Jugo Raw
      Chakra Dice etc.)</p><p>▪ Long Rest: Additional dice equal to your half level in this class mod (Min 1). (Namikaze
      Speed Dice etc.)</p><p>o Chakra-Like</p><p>▪ Short Rest: Additional special resources equal to twice your level in
      this class mod +5 (Ex. Hatake White Chakra</p><p>▪ Long Rest: Additional special resources equal to your level in
      this class mod +2. (Ex. Uzumaki Reserve Cells)</p><p>• Special: If you use Uzumaki Reserve Cells while your Curse
      Seal is active, the Chakra is immediately converted into Cursed Chakra, but instead you only regain half the
      result of the dice as Cursed Chakra.</p><p>o Limited Use</p><p>▪ Per Activation: Additional uses per activation
      equal to half your level in this class mod. (Ex. Uchiha Sharingan abilities.)</p><p>▪ Short Rest: Additional short
      rest uses equal to your level in this class mod +2 (Ex. Aburame Bug Host, Akimichi Green Spinach Pill, Hebi Poison
      Potency etc.)</p><p>▪ Long Rest: Additional Long rest uses equal to your level in this class mod (Min 1). (Ex.
      Hoshigaki Ravenous Chakra, Hozuki Water Reservoirs etc.)</p>
