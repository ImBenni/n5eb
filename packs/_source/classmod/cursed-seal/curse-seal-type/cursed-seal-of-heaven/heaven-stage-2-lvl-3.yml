name: Heaven Stage 2 [Lvl 3]
type: feat
_id: XMjW4Q8gnkWjHwji
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>You can gain access to this Stage of power when you have at least 10 ranks of Corruption and are level 3 in
      this class mod. Your cursed seal covers your entire body, turning it a darker hue of your current skin tone. Your
      hair grows and reaches down your back. The neutral color of your eyes become yellow, with the whites of your eyes
      turning black. Your nails on both your hands and feet grow into claws as you gain the following benefits from this
      cursed seal;</p><p>• All benefits of Stage 1. </p><p>• Cursed Arts you use gain a +1 bonus to their Critical
      threat range. </p><p>• When you score a critical hit with a Cursed Art you may roll 3d12, recovering the result as
      hit points. You regain half the result as Cursed Chakra no more than twice per Full-Rest. </p><p>• Select one Clan
      feature that can interact with a Ninjutsu, Genjutsu, Taijutsu or Bukijutsu. Then select one Cursed Art with the
      Corrupted prefix. This clan feature, for the duration of your Cursed Seal Release: Stage 2, can benefit this
      Cursed Art as if it were still a Ninjutsu, Genjutsu, Taijutsu or Bukijutsu ignoring normal Keyword
      limitations.</p>
