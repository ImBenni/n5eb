system:
  description:
    value: >-
      <p>You gain access to this stage of power when you have at least 1 rank of Corruption, and have at least 1 level
      in this class mod. Your markings begin to creep across the user's body originating from the location of the curse
      seal, in the shape of lines spreading out in a jagged, zigzag pattern centering on the user's heart originating
      from the location of your cursed seal. These markings glow a flaming red for brief moments burning the power of
      the Underworld into your body, granting the following benefits;</p><p>• Hijutsu, Cursed Arts with the Hijutsu
      keyword and Clan features you cast/use that provide damage reduction, bonus AC, self-healing or temporary Hit
      points gains additional benefits based on the circumstances of the bonus.</p><p>o Damage Reduction</p><p> ▪ Damage
      Reduction Die: Increase the number of dice rolled by +2, twice per casting.</p><p> ▪ Increase Damage Reduction Die
      step: Increase the number of dice rolled by +2, twice per casting.</p><p> ▪ Flat Damage Reduction: Increase the
      damage reduced by three times your level in this class mod, once per turn.</p><p>o Armor Class (AC)</p><p> ▪
      Concentration (Or longer than 1 round): This AC bonus is increased by an amount equal to half your level in this
      Class mod (Min. 1)</p><p> ▪ 1 Round: This AC Bonus is increased by an amount equal to your level in this class
      mod.</p><p> ▪ End of Turn: This AC Bonus is increased by an amount equal to your level in this class mod
      +2.</p><p>o Temporary Hit Points</p><p> ▪ Rolling Dice: Increase the number of dice rolled by +2, twice per
      casting. (Ex. Insect Jar Technique etc.)</p><p> ▪ Flat Temporary Hit Points: Increase the THP by five times your
      level in this class mod, once per casting. </p><p>o Self-Healing</p><p> ▪ Rolling Dice: Increase the number of
      dice rolled by +2. (Ex. Hebi Regeneration.)</p>
