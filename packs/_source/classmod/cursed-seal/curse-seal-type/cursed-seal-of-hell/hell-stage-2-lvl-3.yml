system:
  description:
    value: >-
      <p>You can gain access to this Stage of power when you have at least 10 ranks of Corruption and are level 3 in
      this class mod. Your cursed seal covers your entire body, turning it a reddish hue. Your muscles bulge in
      terrifying ways enabling you to accomplish things previously impossible. The neutral color of your eyes become
      yellow, with the whites of your eyes turning black. You gain the following benefits from this cursed seal;</p><p>•
      All benefits of Stage 1.</p><p>• All Hijutsu &amp; Cursed Arts that create constructs structures that have hit
      points or interpose damage for you, now grant those structures and constructs +10 damage reduction from all
      sources.</p><p>• Each time you would reduce damage you would take to less than half of its original value as a
      result of Damage reduction, Resistance, or intercepting structures or constructs, you gain 5d6 temporary hit
      points that last for the duration of this Stage.</p><p>• Select any combination of 4 Physical, Elemental or Mental
      conditions. You gain immunity to those conditions while in this Stage.</p>
