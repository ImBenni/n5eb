system:
  description:
    value: >-
      <p>A cursed seal developed in secret by Karin Uzumaki during the Blank period after the 4th great shinobi war.
      These cursed seals were developed based on the trauma Karin developed during the Kusagakure war with Iwagakure.
      She used leftover research from Orochimaru to create a Cursed seal with the sole intent of supporting those on the
      front lines, while also not suffering any wounds themselves, much like Karin and her mother did during that war.
      This seal soothes over the mind of its hosts to enable them to function in dire situations using exclusively logic
      and suppressing emotional responses. This curse seal solidifies itself on the user in its dormant state as a
      Sakura flower growing over a crescent moon. In the land of Fire, Sakura's symbolizes peace and healing.</p>
