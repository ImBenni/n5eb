system:
  description:
    value: >-
      <p>You can gain access to this Stage of power when you have at least 10 ranks of Corruption and are level 3 in
      this class mod. Your cursed seal covers your entire body, turning it a shade of midnight blue as your hair instead
      becomes an ashy white. The neutral color of your eyes become yellow, with the whites of your eyes turning black.
      You gain the following benefits from this cursed seal;</p><p>• All benefits of Stage 1.</p><p>• All Class feature
      that reduce damage increases the value of that damage reduction by an amount equal to your level in this class mod
      +5, once per turn.</p><p>• All Class features that grants temporary hit points increases the amount of temporary
      hit points gained by five times your level in this class mod, once per turn.</p><p>• All Class features that grant
      bonuses to AC or Saving throws increases the bonus by an amount equal to half your level in this class mod.</p>
