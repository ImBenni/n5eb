name: War Stage 1 [Lvl 1]
type: feat
_id: AW2EHcwWoYVqKIif
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>You gain access to this stage of power when you have at least 1 rank of Corruption, and have at least 1 level
      in this class mod. Your markings begin to creep across your body originating from the location of your cursed
      seal. They take the shape of Higanbana flowers blooming across your body with the crescent moon centering itself
      either on your face or chest. These markings glow a flaming red for brief moments burning the power of War into
      your body, granting the following benefits;</p><p>• Select one Clan or Class feature that when used only benefits
      yourself. Select a number of willing, allied creatures within 30ft of you. These allied creatures gains an
      imitation of this selected feature for their use. If the selected feature has limited uses that recharge on a
      Short Rest, they gain 2 uses/dice/charges to make the feature function. If it recharges on a Long rest, they gain
      1. If it recharges with either a short or long rest, it is treated as if it recharges on a short rest for use
      count. If the feature recharges upon activation, they gain 3 uses. Once all uses have been expended or your Curse
      Seal Release ends, they lose the benefit of this class mod effect until they complete a Long Rest. If the feature
      has no use limit, it gains one, being only able to be used/grant its benefits 3 times per Long rest.</p><p>o
      Clan/Class Features.</p><p> ▪ If the imitation feature requires another feature to function, then it cannot be
      shared. (Ex. Weapon Specialist, Battle Techniques requires the Weapon Flurry class feature to function).</p><p> ▪
      If the Imitation feature grants additional abilities, they gain the same options that you have access too. (Ex.
      Scout-Nin, Superior Arbitration, grants a selection of maneuvers. The allied creature gains the same option of
      maneuvers that you have access to.)</p><p> ▪ If the Imitation feature grants access to additional Jutsu, the
      allied creature gains access to those jutsu and can cast them no more than twice per Long Rest.</p>
