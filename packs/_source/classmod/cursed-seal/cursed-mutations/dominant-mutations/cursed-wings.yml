name: Cursed Wings
type: feat
_id: fzdirl9D1hYRbrg9
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>While your Cursed Seal Release is active at no less than Stage 2, your back begins to mold, twist and contort
      until large wings sprouts from your back. These wings are of a design of you or your Patrons choice, such as
      fleshy bat wings or webbed hands.</p><p>While you have these wings, you gain a 30ft flying speed and when you
      would attempt a grapple, you gain advantage on any checks made in relation to this action.</p><p>Cursed Action: As
      a Cursed Action when you would take damage, you can use these wings to intercept some damage you take. Reduce
      damage you take from this triggering instance of damage by 5d10. Once you reduce damage in this way, you cannot
      take this action again until you spend a Cursed Action on your following turn reconstituting your
      wings.</p><p>Mutation Boost: You can further Mutate these wings by investing another Mutation. When you do, your
      fly speed increases to 60ft or your normal movement speed, whichever is higher. When you would take your Cursed
      Action to intercept incoming damage, you instead roll 7d12.</p>
