system:
  description:
    value: >-
      <p>Dominant Mutations grant you a special action which you can take, once per turn called a Cursed Action. This
      Cursed Action when taken can be used to active this Mutations ability as listed. A Cursed Action when taken does
      not consume your Action, Bonus action or Reaction, but may act similar in functionality to any of these three
      actions.</p><p>Regardless of which Dominant Mutation(s) you gain, once you use one Cursed Action you cannot use
      another Dominant Mutation(s) abilities until the beginning of your next turn. Dominant Mutations can be further
      enhanced with a Mutation Boost. This can only be done by spending an additional Mutation known granted by this
      class mod.</p>
