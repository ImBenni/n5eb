name: Cursed Beginnings
type: feat
_id: eZ3PdBexLkNfP388
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Category: Class Mod </p><p>Prerequisite: Level 8+, Inflicted by a Patron. </p><p>You have been cursed by a
      powerful Patron, inflicted with a mark symbolizing their influence and control. This mark has yet to grow in
      strength to its full potential, making some experts call it an Imperfect binding. You gain the following
      benefits:</p><p>• Once per Full-Rest, you can spend a Full-Turn Action to enter Imperfect Stage 1. When you do,
      your cursed seal marks grow across a small portion of your body granting you this variants bonuses. You can remain
      in this state for no more than 10 minutes.</p><p>• While in Imperfect Stage 1 you gain 3 Cursed Charges and the
      Stage 1 benefits of having your Cursed Seal Release active, but not your Curse Seal Types Stage 1 benefits. You
      can spend these charges to cast a Cursed Art.</p><p>• You gain 2 Cursed Arts. These Arts can have no more than 2
      boosts each.</p><p>• You gain 1 Minor Order.</p><p>• You are treated as if you have 5 ranks of Corruption. You do
      not gain any of the benefits or penalties associated with having ranks of Corruption.</p>
