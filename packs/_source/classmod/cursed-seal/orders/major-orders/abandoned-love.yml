img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Patrons future for you has you abandoning the few things that you once valued. Your friends, family, or
      even your soul mate.</p><p>When you gain this order, your Patron looks for the closest individual in your heart
      and orders you to abandon that love or relationship, severing it for the foreseeable future. This must be done
      face to face with that individual.</p><p>Unlike other orders, this Order does not require you to make an ability
      check to resist. If you disobey your Patron will decide if the punishment should match the disrespect. Your GM
      will secretly roll 5d20. If the total of the rolls is less than 50, the Patron will plan to kill this chosen
      creature. If the result is greater than 50, they will replace this Order with another one. If the result is
      exactly 50. They leave this order in your DNA with no negative consequences.</p>
    chat: ''
