name: Demon Time
type: feat
_id: 9AmUuUIU6MwtO0VT
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Patron desires blood. Most of it, they want from other people.</p><p>When you engage in a combat that has
      innocent civilians in the vicinity, while you do not need to actively attack them, you are ordered to kill no less
      than 1 innocent civilian in such a conflict, even if only as collateral damage.</p><p>If you would resist this
      Order you must make a Charisma Ability Check vs your Cursed Patron DC. On a success, you are able to disobey. When
      you do your Patron admonishes your weakness and strips you of the ability to do anything but cause harm. Jutsu you
      cast that does not directly deal damage, cannot be cast while in combat, until your next Full-Rest.</p>
    chat: ''
