name: Destroying The Past
type: feat
_id: zskiPu3cbpCyUyO3
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Patron goals have mostly had effects on the past, present and future in some way. But you must do what you
      can to destroy the past that would expose them. You must act to destroy everything that would connect your Patron
      to any past acts.</p><p>Your Patron will communicate with you and inform of you of what they want destroyed. This
      can range from an item, location, weapon or even a living creature. When destroying a creature, you must leave
      nothing that can be examined. If you have no jutsu or ability which can turn a creature to ash, your Cursed seal
      will do that for you when you would reduce the targets hit points to 0. Unfortunately the soul of that individual
      will be sealed into your Cursed seal in the process.</p><p>If you would resist this Order you must make a Charisma
      Ability Check vs your Cursed Patron DC. On a success, you are able to disobey. When you do your Patron responds by
      actively disavowing your actions. They will show you the pain of the past, by making you forget yours. Your Patron
      reads your memories and selects one creature and steals it from you, replacing it images and visions of that
      individual being killed by your hand.</p>
