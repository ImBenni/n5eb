name: Misery Loves Company
type: feat
_id: 9biMZVpGMoREifVL
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Patron desires strong individuals on their side. The stronger the better. Your Patron will occasionally
      contact you with orders to find a specific individual who is both strong and competent and mark them with an
      extension of your cursed seal.</p><p>When you gain this order, your Patron grants you with a special ability to
      grant others the Curse mark in their stead at their order. This ability can only be applied to select creatures of
      your Patrons choice as an Action on your turn while that creature has one of the following conditions; Dying,
      Unconscious, Restrained, Stunned, or Paralyzed.</p><p>If you would resist this Order you must make a Charisma
      Ability Check vs your Cursed Patron DC. On a success, you are able to disobey. When you do, your Patron expresses
      their anger by taking away something you consider pivotal to your essence. They select one clan or class feature.
      Each time you would use the chosen clan or class feature, you must roll a D20. On a roll of 11 or lower, the
      feature doesn't activate or function correctly. Once you roll 5d20 in this way, this penalty no longer applies
      until it is applied again. This penalty can stack.</p>
    chat: ''
