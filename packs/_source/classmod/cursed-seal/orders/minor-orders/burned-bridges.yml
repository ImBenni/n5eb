name: Burned Bridges
type: feat
_id: SN8RTeO4tNOXE1kj
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>When meeting people, you may encounter a person whom your Patron once tried to entice over to their side but
      failed due to that person having no reason to switch sides. You are ordered to find ways to ruin that person's
      life, be it secretly assassinating their loved ones, falsifying infidelity, and causing long term turmoil in their
      lives. This is a long form order that isn't expected to be complete in a short period of time, but progress must
      be made in some way at least once per week, when able. You can choose to spend DT to accomplish these tasks
      gaining bonuses to any checks needed to accomplish your goal equal to +3 for each DT spent.</p><p>If you would
      resist this Order or fail to progress this order in a timely manner, your Patron imbalances your chakra network at
      the most inopportune times. Once per combat, the GM may choose to secretly roll a d20. On an even result, the next
      jutsu or Art you cast, has their cost quadrupled. This penalty persists until you comply with this order.</p>
