name: Forbidden Knowledge
type: feat
_id: mngHJaqb6bAJ84Iz
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Patron has a deep desire to learn as many secrets as possible. You are tasked with the longstanding order
      to be a field collector of samples for his research. Fortunately for you, your targets are living, and don't need
      to die to complete this task...most of the time.</p><p>Once per mission, when exploring a new town, city, land,
      region or country, your patron will communicate with you telepathically of a specific clan they wish to gather
      more information on. You are tasked with collecting a blood sample from a member of this clan. This will lead to
      your Patron finding a way to either incorporate this clans secrets into his techniques or abilities or the clan
      may be later captured and made into subservient subjects of your Patron.</p><p>If you would resist or fail to
      complete any of the tasks provided by your Patron in a new location as per this Order in a timely manner, your
      Patron makes using your own Bloodline techniques difficult to use. Jutsu you use with the Hijutsu keyword have
      their costs tripled. In order to reverse this penalty you must travel to a previously visited location and
      accomplish this goal.</p>
