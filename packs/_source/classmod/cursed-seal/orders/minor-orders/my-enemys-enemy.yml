folder: q7S32Ks54A5acHyt
name: My Enemy's, Enemy
type: feat
_id: RXdYvbdna4i1PfLA
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>When you would encounter a strong or influential creature who is an enemy of one of your Patrons enemies, you
      are ordered to share with your Patron the information you have of this person, so that your Patron may meet them
      and form a partnership with them in some way. You must share the knowledge of this person to your Patron within
      24hr's of learning of their existence. This does not apply to your close allies such as your Captain or
      Kage.</p><p>With time your Patron will sway this person to their side so long as this person is not already an
      enemy of your Patron.</p><p>If you would resist this Order, you begin to suffer sparks of paranoia. The first
      round of every combat you participate in, you gain the Maddened condition.</p>
    chat: ''
