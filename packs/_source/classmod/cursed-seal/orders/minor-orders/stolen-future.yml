name: Stolen Future
type: feat
_id: WYqnAWGNh59LTfp3
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>When you would encounter a person who is of a similar age to you who seems to be down on their luck or in some
      way suffering from emotional trauma, you are ordered to convince them to join with your Patron to change their
      lives for the better, to gain strength to alter their position in life. Potentially betraying their home, village,
      friends and family.</p><p>If you would resist this Order, your Patron pumps poison through your veins at the
      beginning of each combat you have from your Cursed Seal. When you would roll initiative, you gain 3 ranks of
      Envenomed. This envenomed condition ignores immunity and resistance, and cannot be cleansed and ends itself at the
      end of combat and only deals damage to you in combat. Outside of combat, you are beset with constant feelings of
      pain and sickness giving you a 1d6 penalty on Strength, Dexterity and Constitution Checks, until you comply with
      this Order.</p>
    chat: ''
