name: Stolen History
type: feat
_id: yw5h6cMhJXzvdS2W
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Patron's rivals are numerous and sometimes, entire clans are on their lists of people to make suffer.
      Whenever you would become aware of a clan due to your Patrons occasional monologuing, and its combative history
      with your Patron, you are ordered to create turmoil and chaos for its future generations. You must find and
      destroy all physical copies of the Clans historical documents and any elderly individuals who would have the
      ability to recreate it. This is a long form order that isn't expected to be complete in a short period of time,
      but progress must be made in some way at least once per week, when able. You can choose to spend DT to accomplish
      these tasks gaining bonuses to any checks needed to accomplish your goal equal to +3 for each DT spent.</p><p>If
      you would resist this Order or fail to progress this order in a timely manner, your Patron makes resting
      difficult. The first time you would take a short &amp; long rest per mission, you gain no benefits from either.
      This penalty persists until you comply with this order.</p>
