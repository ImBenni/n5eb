name: Thin Line
type: feat
_id: TEWBfIBn6onpYFlo
img: icons/magic/symbols/circled-gem-pink.webp
system:
  description:
    value: >-
      <p>Your Patron has made it extremely difficult for you to walk the line that you do. You must convince your
      allies, friends or even family to join your Patron. The chosen individual will be told to you by your Patron when
      they select them. This is a long form order that isn't expected to be complete in a short period of time, but
      progress must be made in some way, when able, either by convincing them of the positives of your Patrons Goals.
      This does not require you to expose your connection to your Patron, but you are to convince them that their goals
      align with your Patron, even if you never provide the Patrons name or identity.</p><p>If you would resist this
      Order, your Patron won't give you a penalty. Instead they will randomly select one person you would least want to
      bring into the dangerous life your Patron forces. Your Patron will then attempt to either turn them into a
      follower or kidnap them. If this transpires, you suffer a permanent -1 penalty to all Ability checks vs your
      Cursed Patron DC so long as that kidnapped person is held by your Patron.</p>
    chat: ''
