system:
  description:
    value: >-
      <p>Orders are commands twisted into your DNA by your Cursed Patron. These orders take shape in different ways,
      both Minor and Major.</p><p>Minor orders are commands that are always active and you are compelled to complete
      them when the occasion arises. Resisting a Minor order requires no check and can be done at will, but will trigger
      the Patrons penalty.</p><p>Major orders are orders that often only come up no more than once per mission, Week or
      Month (GM dependent). Major Orders, when followed always automatically grant 1 rank of Corruption. Resisting a
      Major Order, is always followed by a Charisma Ability Check vs your Cursed Patron DC. This check cannot be remade
      by any means once passed or failed. You do not need to remake a resistance check for the same reason more than
      once per Long rest.</p>
    chat: ''
