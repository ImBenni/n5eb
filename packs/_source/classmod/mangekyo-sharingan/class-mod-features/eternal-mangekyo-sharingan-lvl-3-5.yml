name: Eternal Mangekyo Sharingan [Lvl 3 & 5]
type: feat
_id: nLd8m8EK1CHK8ikQ
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>When you would qualify to reach 3rd level in this class mod, you encounter the first true roadblock to true
      power. The Eternal Mangekyō Sharingan (Called EMS moving forward) is a power fabled and sought after by the upper
      echelon of the Uchiha. This power comes at a great price. Severing the ties of blood. In order to gain this
      elusive power, you must have Light remaining and do one of the following;</p><p>• Take the Mangekyō Sharingan from
      a direct blood relative (Parent, Sibling, Child).</p><p>• Collect the spiritual essence of a close friend, mentor
      or lover who recently died. (This essence can only be gained from a willing individual or individuals waning
      spirit and is bound to you until consumed. Once consumed, this individual can never be revived by any form of
      Jutsu or ability of conventional means and only as a result of an Art level technique.)</p><p>o Note. This is not
      a canon way to get Mangekyō Sharingan, and is instead added here as a "good" alignment alternative to prevent
      players being forced to commit heinous acts to achieve it.</p><p>Until either of the listed tasks are complete,
      you cannot gain the benefits of the Eternal Mangekyō Sharingan class mod feature. You do not need this class mod
      feature to progress in this class mod.</p><p>When you have either a relatives Mangekyō Sharingan or a loved ones'
      Spiritual Essence, you must complete a ritual which consumes both your own Mangekyō Sharingan and the chosen
      relatives Mangekyō Sharingan (or Spiritual Essence), fusing them into a pair of Eternal Mangekyō Sharingan that
      replace your current eyes.</p><p>This ritual takes 20 weeks to complete and stopping or interrupting it early
      forces you to start over from the beginning losing all the time already spent. This time can be reduced by 8 weeks
      with a single DC 30 Medicine check made by another creature assisting you in performing the ritual. Failing this
      check does not increase the time needed.</p><p>Upon completion of the ritual, you can never lose Light as a result
      of overusing your class mod features as your Light becomes eternal. But this influx of power doesn't leave you
      free to abuse this power.</p><p>In the place of Light, you instead must now manage your Darkness. Class mod
      features that would cost Light, now instead increase your Darkness, equal to the listed value. The maximum number
      of darkness you can gain before losing yourself to your power is 200. This Darkness while present, can be
      exercised from you with an Uchiha Clan Ritual only known by the upper echelons of the clan itself. But performing
      this ritual is long and not always viewed as worth it. For every 1 DT spent performing this ritual, you remove 2
      Darkness.</p><p>Finally, you gain the following benefits of the EMS;</p><p>• Activating your Mangekyō Sharingan
      class mod feature results in you instead activating the Eternal Mangekyō Sharingan (EMS).</p><p>• Your EMS can
      remain active for up to 1-Hour.</p><p>• You retain all benefits of the Mangekyō Sharingan class mod feature unless
      otherwise specified.</p><p>o Your Mangekyō Sharingan AC bonus becomes +4.</p><p>o Your Mangekyō Sharingan
      Dexterity saving throw bonus becomes +4.</p><p>• You gain +1 additional Mangekyō Art Charge per Art, per
      Full-Rest.</p><p>• You gain immunity to effects that would give you a dice-based penalty to d20 rolls you
      make.</p><p>• You gain immunity to effects that would inflict a condition or impose penalties from a Jutsu or Art
      with the Genjutsu and Visual keywords. If the Jutsu or Art has 2 or more additional Sensory keywords (Auditory,
      Inhale, Tactile) you instead only gain a +4 bonus to the save.</p><p>Beginning at 5th level of this class mod,
      your EMS has reached a zenith in power and capability. This stage of your MS has granted you insight into
      utilizing your abilities well beyond their normal limitations. You gain the following;</p><p>• You gain +1
      additional Mangekyō Art Charge per Art, per Full-Rest</p><p>• You can use your Susanoo Manifestation class mod
      feature +1 additional times per Full-Rest.</p><p>• Your Susanoo Weapon gains 1 additional Weapon Ability.</p>
