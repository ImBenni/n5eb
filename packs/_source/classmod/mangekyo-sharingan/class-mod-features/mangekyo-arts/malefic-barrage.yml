system:
  description:
    value: >-
      <p>Alternative Cost: 8 Light</p><p>You use your Sharingan to manifest telekinetic weapons and armaments from sheer
      will alone. These telekinetic weapons once manifest form physical constructs that dissipate and dissolve soon
      after use.</p><p>Choose a point you can see within range as you then decide how you want to deliver your assault.
      Choose between Cylinder or Cone.</p><p>If you choose Cylinder, a cyclone of telekinetic weapons swarm and manifest
      in a 40-foot radius that is 100-feet tall centered on the point you selected.</p><p>If you chose a cone, the cone
      extends out 90 feet from you.</p><p>Regardless of the shape of your assault, creatures in range must make a
      Dexterity saving throw. On a failed save they take 20d8 slashing damage and becomes restrained for the next
      minute. A restrained creature makes Strength saving throws with a d6 penalty to escape at the end of their turns.
      Finally, the affected area becomes difficult terrain for the next minute.</p><p>Kineticist Synergy: If you have
      the Kinetic Type class mod feature, increase the damage die to a d10 and creatures who fail their saving throw
      gains 3 ranks of Weakened.</p>
