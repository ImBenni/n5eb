system:
  description:
    value: >-
      <p>Alternative Cost: 6 Light</p><p>Your Sharingan amplifies your already exceptional physical abilities to
      compensate for its otherworldly perceptive capabilities.</p><p>You move with such speed that you instantly appear
      into a space up to four times your movement speed in distance. All creatures of your choice within 5 feet of you
      when you end this movement become targets for your flurry of strikes. Make 3 melee Mangekyō Art Attacks. On a hit
      you deal your unarmed (or Weapon) damage + 6d6 and the target creatures gain 1 rank of slow for each successful
      hit you make.</p>
