name: Malefic Burst
type: spell
_id: wCYNCblDszZYVLQP
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 6 Light</p><p>Your Mangekyō Sharingan's latent power is used to enhance your innate chakra
      transformations. When you gain this art, choose one keyword from the following list that you have access to. This
      choice cannot be changed later;</p><p>Keyword: Earth Release, Wind Release, Fire Release, Water Release, Lightning
      Release, Medical.</p><p>After making your choice, your MS augments and fuses it with one of your most prevalent
      emotions causing the visual aspects of the release to contort into something new entirely (Colors could include
      green for envy, white for pride, blue for hope, or black for hatred.).</p><p>You can then manifest and manipulate
      this release into a powerful burst of raw force and energy. Select a space you can see within range as you create
      a burst of this energy affecting all creatures of your choice forcing them to make a Dexterity saving throw. On a
      failed save affected creatures take 16d8 damage of a type associated with your chosen keyword. Creatures who fail
      this save by 5 or more gain 1 rank of a Malefic condition associated with your nature.</p><p>Evokers Synergy: If
      you have the Evoker Type class mod feature, reduce the Alternative Cost of this art by 3.</p><p>Chimeric Synergy:
      If you have the Chimeric Type class mod feature, this art loses the Ninjutsu keyword but gains the Genjutsu
      keyword. Additionally, on a failed save creatures gain 2 ranks of Confused. If a creature failed by 5 or more,
      they instead gain 5 ranks of Confused and make checks to end the condition using a D12, in place of a
      d20.</p><p>Susanoo Art: If this art is cast as a Susanoo Art, the range is doubled, and the radius is increased by
      20-feet. Additionally, the damage is increased to 16d10.</p>
