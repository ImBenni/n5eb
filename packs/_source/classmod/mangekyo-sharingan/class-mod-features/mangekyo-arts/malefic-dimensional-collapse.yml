name: Malefic Dimensional Collapse
type: spell
_id: MoSOj9CmVCpFVwdV
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 8 Light</p><p>Description: You use your chakra to command and dominate the forces of time and
      space gaining the ability to make and control dimensional space. You always have a pocket dimension that this
      Mangekyō Art may refer to. This pocket dimension is yours and yours alone. This dimension is 500 feet in diameter
      in the shape of a sphere. If this dimension is ever destroyed, another one forms when you would gain the benefit
      of a Full-Rest. If you have another Mangekyō Art that would utilize a pocket dimension, they are always the same
      dimension as this one.</p><p>You may select one creature you can see within range. The select creature must make a
      Dexterity saving throw. On a failed save the target take 20d6 force damage that ignores damage reduction and
      resistance as they are crush by a collapsing dimensional rift. On a successful save they instead take
      half.</p><p>A creature who fails this save by 5 or more is shunted into a space of your choice within range as
      they are thrown through the dimensional rifts into their new location.</p><p>Evokers Synergy: If you have the
      Evoker Type class mod feature, you can target up to two creatures at once.</p><p>Chimeric Synergy: If you have the
      Chimeric Type class mod feature, this art loses the Ninjutsu keyword but gains the Genjutsu and Fuinjutsu keyword
      and the following things change; The saving throw becomes Charisma and creatures who fail by 5 or more have their
      chakra network forcibly shut down for 1d4 of their turns as they cannot mold chakra (CM) during that time.</p>
