system:
  description:
    value: >-
      <p>Alternative Cost: 5 Light</p><p>Description: You use your chakra to command and dominate the forces of time and
      space gaining the ability to make and control dimensional space. You always have a pocket dimension that this
      Mangekyō Art may refer to. This pocket dimension is yours and yours alone. This dimension is 500 feet in diameter
      in the shape of a sphere. If this dimension is ever destroyed, another one forms when you would gain the benefit
      of a Full-Rest. If you have another Mangekyō Art that would utilize a pocket dimension, they are always the same
      dimension as this one.</p><p>As a reaction to a creature dealing damage to you as a result of an attack or you
      failing (or passing) a saving throw, you can displace your mass to your pocket dimension. While your mass is
      displaced in this way, you gain immunity to all damage and effects that would target or affect you, excluding
      damage and effects from Genjutsu. While displaced creatures can see you, and you them, but you cannot interact
      with each other. This displacement lasts until the end of the current turn.</p><p>Evokers Synergy: If you have the
      Evoker Type class mod feature, this art lasts until the end of the next turn.</p>
