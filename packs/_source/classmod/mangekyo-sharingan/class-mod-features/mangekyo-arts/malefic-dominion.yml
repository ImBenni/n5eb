system:
  description:
    value: >-
      <p>Alternative Cost: 8 Light</p><p> You use your chakra to command and dominate the forces of time and space
      gaining the ability to make and control dimensional space. You always have a pocket dimension that this Mangekyō
      Art may refer to. This pocket dimension is yours and yours alone. This dimension is 500 feet in diameter in the
      shape of a sphere. If this dimension is ever destroyed, another one forms when you would gain the benefit of a
      Full-Rest. If you have another Mangekyō Art that would utilize a pocket dimension, they are always the same
      dimension as this one.</p><p>As a bonus action, you may warp yourself and/or another willing creature within range
      to your pocket dimension.</p><p>If you would attempt to warp unwilling creature(s) in this way, you instead must
      spend an Action. You may attempt to warp all unwilling creatures of your choice within range. All unwilling
      creatures withing range must make a Dexterity saving throw as they pull away from you moving 5ft away from you in
      any direction. Creatures with a Passive perception lower than your Mangekyō Art Save DC, makes their save at
      disadvantage.</p><p>Evokers Synergy: If you have the Evoker Type class mod feature, increase the radius to
      15ft.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod feature, this art loses the Ninjutsu keyword
      but gains the Genjutsu and Fuinjutsu keyword and creatures who fail their saving throw also gain 5 ranks of
      Concussed.</p>
