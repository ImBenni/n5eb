name: Malefic Empowered Assault
type: spell
_id: CS87TfkrLn8erHzG
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 6 Light</p><p>Description: You use your Sharingan to recall and even theorize techniques
      you've never seen but your Sharingan concludes is absolutely feasible.</p><p>You bend and contort your body in
      ways only an Uchiha could, while following up with a powerful flurry of strikes against a single creature you can
      see within range. Make two melee Mangekyō Art Attacks. On each successful hit, you deal your unarmed or (weapon) +
      5d10 damage.</p><p>If you scored at least one successful hit on a target creature, you gain advantage on your next
      two Mangekyō Art Attacks against that creature, before the end of your next turn.</p><p>If you score two
      successful hits on the same creature in the same casting, you gain advantage on your next two Mangekyō Art Attacks
      against that creature, before the end of your next turn and the target creature gains vulnerability against the
      next melee Mangekyō Art Attack you make before the end of your next turn.</p><p>Kineticist Synergy: If you have
      the Kinetic Type class mod feature, when you cast Uchiha Great Assault you can make +1 additional attack and melee
      attacks against you suffer a 1d8 penalty until the beginning of your next turn.</p><p>Susanoo Art: If this art is
      cast as a Susanoo Art, the damage dice is increased to 7d12.</p>
