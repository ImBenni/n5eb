system:
  description:
    value: >-
      <p>Alternative Cost: 5 Light</p><p>Your Mangekyō Sharingan's latent power is used to enhance your innate chakra
      transformations. When you gain this art, choose one keyword from the following list that you have access to. This
      choice cannot be changed later;</p><p>Keyword: Earth Release, Wind Release, Fire Release, Water Release, Lightning
      Release, Medical.</p><p>After making your choice, your MS augments and fuses it with one of your most prevalent
      emotions causing the visual aspects of the release to contort into something new entirely (Colors could include
      green for envy, white for pride, blue for hope, or black for hatred.). The augmented release becomes yours and
      yours alone as you must now select 3 Ninjutsu you know with the chosen keyword.</p><p>When you cast this Art, the
      chosen jutsu gains the following benefits;</p><p>• Malefic and Clash keywords.</p><p>• Increase damage dealt by +4
      damage die, twice per cast.</p><p>• Increase size of Area of effect by 10 feet.</p><p>• If the jutsu would
      increase the damage of subsequent attacks (ex. Flame Coat) the damage bonus is increased by either +2 damage die
      or +10 additional damage if the jutsu provides no additional damage die, twice per turn.</p><p>Evokers Synergy: If
      you have the Evoker Type class mod feature, you can instead select 5 Ninjutsu.</p><p>Kineticist Synergy: If you
      have the Kinetic Type class mod feature, you can instead select 3 Taijutsu or Bukijutsu. The chosen jutsu gains
      the nature release (or medical) keyword you originally chose in addition to the Malefic and Clash
      keywords.</p><p>Susanoo Art: If this art is cast as a Susanoo Art, the range is doubled, the damage is increased
      by +4 damage die.</p><img src="systems/n5eb/assets/content/cheat-sheets/malefic-illumination-keywords.webp" />
