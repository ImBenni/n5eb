system:
  description:
    value: >-
      <p>Alternative Cost: 8 Light</p><p>Description: You use your Sharingan to recall and even theorize techniques
      you've never seen but your Sharingan concludes is absolutely feasible.</p><p>Select a Taijutsu or Bukijutsu you
      know or could cast if you knew, of A-Rank or lower, with a casting time of 1 Action, 1 Bonus Action, or 1
      Reaction. You can cast that jutsu spending the corresponding action when casting it as a result of this Art. Jutsu
      cast in this way are upcast to A-Rank and increases their damage die by +4 and +2 if they would make more than two
      attacks. If a jutsu cast would require concentration, you may concentrate on that jutsu following its listed
      rules, spending the normal concentration chakra cost as normal.</p><p>Kineticist Synergy: If you have the Kinetic
      Type class mod feature, you do not spend chakra to maintain concentration on Taijutsu or Bukijutsu you
      cast.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod feature, this art loses the Taijutsu &amp;
      Bukijutsu keywords but gains the Genjutsu and Tactile keywords. Additionally, conditions you would inflict as a
      result of jutsu cast with this Art, you can choose to instead inflict an equivalent number of ranks of either;
      Concussed, Confused, Slowed, or Dazzled.</p>
