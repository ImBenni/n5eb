system:
  description:
    value: >-
      <p>Alternative Cost: 5 Light</p><p>Your Mangekyō Sharingan's latent power is used to enhance your innate chakra
      transformations. When you gain this art, choose one keyword from the following list that you have access to. This
      choice cannot be changed later;</p><p>Keyword: Earth Release, Wind Release, Fire Release, Water Release, Lightning
      Release, Medical.</p><p>After making your choice, your MS augments and fuses it with one of your most prevalent
      emotions causing the visual aspects of the release to contort into something new entirely (Colors could include
      green for envy, white for pride, blue for hope, or black for hatred.).</p><p>Make a ranged Mangekyō Art attack as
      you manifest and fire bolts of Malefic chakra towards a creature of your choice within range. On a hit, you deal
      10d12 and the target must make a Constitution saving throw vs the Malefic condition associated with your chosen
      release.</p><p>Evokers Synergy: If you have the Evoker Type class mod feature, you can make up to two attacks,
      targeting the same or different creatures.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod
      feature, this art loses the Ninjutsu keyword but gains the Genjutsu keyword. Additionally, creatures who fail
      their saving throw are Stunned until the end of their next turn or next Elite Action.</p><p>Susanoo Art: If this
      art is cast as a Susanoo Art, the range is doubled, the damage is increased by +6 damage die and affects all
      creatures within 10 feet of the original target.</p>
