name: Malefic Moon Eater
type: spell
_id: tXmy8gEdzCWdTtgB
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 7 Light</p><p> You use your Sharingan to drill deep into the subconsciousness of a creature
      whom you can see and is looking at you. By making eye contact with a creature while your Mangekyō Sharingan is
      active you are able to inject a powerful illusion deep into the minds of your target.</p><p>When you would see a
      creature begin their turn, you are able to create a swift illusion rewiring their brains forcing them to see
      friends as foe and foes and friends. Affected creatures are forced to make an Intelligence saving throw. If the
      target creature does not have Chakra sight or blindness, they make their saving throw by rolling 2d10, in place of
      a d20. Rolling a 1 with either of the aforementioned dice counts as a natural 1.</p><p>This Art cannot be cast if
      there is only 1 hostile creature in initiative with you.</p><p>Chimeric Synergy: If you have the Chimeric Type
      class mod feature you can choose between Wisdom, Intelligence or Charisma saving throw upon
      casting.</p><p>Success: Affected creature is able to resist this Art's effects and maintain their sense of
      self.</p><p>Failure: Affected creatures mind is rewritten and they can only see their allies as enemies and their
      enemies as their allies. They continue the rest of their turn with this in mind. At the end of their turn, this
      effect ends.</p><p>Critical Failure: Same effect as failure but this lasts for 1d4 of their turns.</p>
