name: Malefic Moon Shatter
type: spell
_id: r97NYtD84zvfZwwK
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 6 Light</p><p> You use your Sharingan to drill deep into the subconsciousness of a creature
      whom you can see and is looking at you. By making eye contact with a creature while your Mangekyō Sharingan is
      active you are able to inject a powerful illusion deep into the minds of your target.</p><p>Select one creature
      you can see within range. You become aware if the target creature is under the effect of any Ninjutsu, Genjutsu,
      Taijutsu or Bukijutsu that provides it a boost, controls it, or grants it additional actions. You attempt to
      forcibly break that creature out of it. The target creature must make a Charisma saving throw. If the target
      creature does not have Chakra sight or blindness, they make their saving throw by rolling 2d10, in place of a d20.
      Rolling a 1 with either of the aforementioned dice counts as a natural 1.</p><p>Chimeric Synergy: If you have the
      Chimeric Type class mod feature you can target +2 additional creatures.</p><p>Success: Affected creature is able
      to resist this Art's effects and maintain their sense of self.</p><p>Failure: Affected creatures mind palace is
      broken into and you are able to forcibly end all jutsu they are benefiting from that they cast regardless of its
      duration.</p><p>Critical Failure: Same effect as failure, and the affected creature cannot cast those jutsu again
      until they finish a rest of any type.</p>
