name: Malefic Moon Weaver
type: spell
_id: MhwcsO4zO0kfmOgY
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 4 Light</p><p>You use your Sharingan to drill deep into the subconsciousness of a creature
      whom you can see and is looking at you. By making eye contact with a creature while your Mangekyō Sharingan is
      active you are able to inject a powerful illusion deep into the minds of your target.</p><p>All creatures of your
      choice that you can see within range, is assailed by a pulse of malefic chakra that bends their minds to your will
      as they find themselves at some point in their past and are forced to witness you murdering or harming those close
      to them as they experience a fit of psychosis. Affected creatures are forced to make an Intelligence saving throw.
      If the target creature does not have Chakra sight or blindness, they make their saving throw by rolling 2d10, in
      place of a d20. Rolling a 1 with either of the aforementioned dice counts as a natural 1.</p><p>Chimeric Synergy:
      If you have the Chimeric Type class mod feature increase the size of the radius to 30 feet.</p><p>Success:
      Affected creature is able to resist this Art's effects and maintain their sense of self but still suffer the
      strain of this effect, taking 8d8 psychic damage.</p><p>Failure: Affected creatures mind is forced to believe this
      tragic event actually took place. This immediate rewriting of the targets memories deals 12d8 psychic damage to
      the target and that memory is forcibly altered for the next 10d10 days.</p><p>Critical Failure: Same effect as
      failure, but affected creature instead takes 16d8 psychic damage and their memories are permanently overwritten
      unless confronted with direct proof that indiscriminately proves the memory to be wrong.</p>
