folder: lAKW2wIWtDO9Aor8
name: Malefic Recording
type: spell
_id: r8cZ36txWtIT6ZSK
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 20 Light</p><p>You use your Sharingan to drill deep into the subconsciousness of a creature
      whom you can see and is looking at you. By making eye contact with a creature while your Mangekyō Sharingan is
      active you are able to inject a powerful illusion deep into the minds of your target.</p><p>Select one creature
      you can see within range. You begin to record this moment in time, memorizing both you and the targets physical
      sensations. As a reaction to your target taking an Action, Bonus Action or Reaction a second time since you cast
      this Art, you attempt to trap them into a never-ending loop, repeating the same events that transpired between
      when you activated this Art, and when you took your Reaction. The target must make a Charisma saving
      throw.</p><p>If the target creature does not have Chakra sight or blindness, they make their saving throw by
      rolling 2d10, in place of a d20. Rolling a 1 with either of the aforementioned dice counts as a natural
      1.</p><p>Once you cast this Art, you cannot cast it again until you spend 2 Mangekyō Art Charges to recharge its
      effects.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod feature you can select +1 additional
      creature this can affect.</p><p>Critical Success: Affected creature is able to resist this Art's effects and
      maintain their sense of self.</p><p>Success: Affected creature is able to resist only some of this Art's effects
      and maintain only some of their sense of self. They repeat the same actions on their next turn, targeting the same
      space(s), after which this effect ends.</p><p>Failure: Affected creatures mind is trapped in an infinite loop.
      They are forced to repeat the same action in their mind forever, until they abandon their current ambitions or
      Drive. If the creature does not have ambitions, such as a beast who survives and works off of instincts, like a
      wolf, lion, or cat. This Art immediately fails. A creature who attempts to release them from this illusion makes
      all attempts rolling an additional d20, and taking the lowest result.</p><p>Critical Failure: Same effect as
      failure but the target is trapped forever with no hopes of escape, even with help.</p>
