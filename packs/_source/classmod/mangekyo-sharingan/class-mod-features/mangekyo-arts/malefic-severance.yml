system:
  description:
    value: >-
      <p>Alternative Cost: 9 Light</p><p>You use your Sharingan to drill deep into the subconsciousness of a creature
      whom you can see and is looking at you. By making eye contact with a creature while your Mangekyō Sharingan is
      active you are able to inject a powerful illusion deep into the minds of your target.</p><p>Select one creature
      you can see within range overwhelming their visual senses with malefic chakra and shutting down their visual
      abilities. The target creature must make an Intelligence saving throw. If the target creature does not have Chakra
      sight or blindness, they make their saving throw by rolling 2d10, in place of a d20. Rolling a 1 with either of
      the aforementioned dice counts as a natural 1.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod
      feature you can target +2 additional creatures.</p><p>Success: Affected creature is able to resist this Art's
      effects and maintain their senses. They becomes Blinded until the end of their next turn.</p><p>Failure: Affected
      creatures visual senses are shut down. Affected creature becomes blinded for the duration of your Mangekyō
      Sharingan. If the affected creature would cast the Release Genjutsu, they remake their saving throw as normal,
      instead of following that jutsu's language.</p><p>Critical Failure: Same effect as failure, but the target becomes
      blind for 1 day.</p>
