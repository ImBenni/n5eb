name: Malefic Stances
type: spell
_id: vaas7sXoJ6msjMIx
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 8 Light</p><p>Description: You use your Sharingan to recall and even theorize techniques
      you've never seen but your Sharingan concludes is absolutely feasible.</p><p>You enter a wholly unique stance that
      best works with your physical capabilities. Unlike normal Taijutsu or Bukijutsu Stances, this stance to enabled as
      a result of the enhanced perceptive capabilities. While in this stance, you gain the following benefits;</p><p>•
      Your unarmed and weapon damage die becomes 2d10.</p><p>• As an Action you can cast Uchiha Great Assault or Uchiha
      Shuriken Rain at A-Rank at no additional cost.</p><p>• You can cast Uchiha Awaiting Stance at no additional cost
      using its normal casting time.</p><p>• When a creature would take a reaction that would result in you making a
      saving throw or taking damage, you gain 1 additional reaction which you must spend in an attempt to either
      interrupt their ability, casting or attack, or you must spend it to grant yourself a bonus to your saving throw,
      ability checks, AC, Temporary hit points or Damage reduction to reduce the impact of it.</p><p>• You gain the
      Multiattack (3) action.</p><p>o Multiattack (2). As an Action on your turn, you can make 3 weapon attacks.</p><p>•
      This stance lasts until you end your MS or you enter a different Taijutsu or Weapon Stance.</p><p>Kineticist
      Synergy: If you have the Kinetic Type class mod feature, when you cast Uchiha Great Assault you can make +1
      additional attack.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod feature, this art loses the
      Taijutsu &amp; Bukijutsu keywords but gains the Genjutsu and Tactile keywords and you can cast Uchiha Awaiting
      Stance as a reaction to a Saving throw as a result of a Jutsu or Art with the Genjutsu keyword and the saving
      throw bonuses the jutsu grants applies to that saving throw.</p>
