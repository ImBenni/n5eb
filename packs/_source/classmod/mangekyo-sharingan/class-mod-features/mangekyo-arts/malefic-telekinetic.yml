system:
  description:
    value: >-
      <p>Alternative Cost: 10 Light</p><p>You use your Sharingan to create telekinetic connections to a distinct weapon
      type. Select a weapon you are proficient with. All weapons that are not being held that is the same weapon type
      can be manipulated by you using your telekinetic connection</p><p>Make a Ranged Mangekyō Art Attack targeting a
      creature you can see within range as all telekinetically controlled weapons are amassed and launched in to strike
      that creature. On a hit, you deal 15d6 bludgeoning, piercing or slashing damage to the target creature and all
      other creatures within 10 feet of the original target must make a Dexterity saving throw, taking 10d6 damage of
      the same type on a failed save or half as much on a success.</p><p>Your original target and all creatures who
      failed their saving throw gains 5 ranks of Lacerated, Bruised or Concussed, your choice.</p><p>Kineticist Synergy:
      If you have the Kinetic Type class mod feature, increase the damage die to a d8 and the radius all other creatures
      can be affected to 20 feet.</p>
