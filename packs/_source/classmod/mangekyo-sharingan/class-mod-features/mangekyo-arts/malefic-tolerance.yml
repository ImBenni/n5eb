name: Malefic Tolerance
type: spell
_id: dkKQwoObRhHAnHb3
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Alternative Cost: 9 Light</p><p>You use your Sharingan to drill deep into the subconsciousness of a creature
      whom you can see and is looking at you. By making eye contact with a creature while your Mangekyō Sharingan is
      active you are able to inject a powerful illusion deep into the minds of your target.</p><p>Select one creature
      you can see within range overwhelming their nervous system with malefic chakra and shutting down their sensory
      capabilities. The target creature must make a Wisdom saving throw. If the target creature does not have Chakra
      sight or blindness, they make their saving throw by rolling 2d10, in place of a d20. Rolling a 1 with either of
      the aforementioned dice counts as a natural 1.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod
      feature the range of this Art becomes Self (10-foot radius) and now affects all creatures of your choice within
      range.</p><p>Success: Affected creature is able to resist this Art's effects and maintain their senses. They
      become Staggered until the end of their next turn.</p><p>Failure: Affected creatures muscular senses are shut down
      as cannot add their proficiency bonus to any d20 roll that uses your Strength, Dexterity or Constitution, for the
      duration.</p><p>Critical Failure: Same effect as failure, but the target also cannot add the corresponding ability
      score to the d20 rolls either.</p>
