system:
  description:
    value: >-
      <p>Alternative Cost: 5 Light</p><p> Your Mangekyō Sharingan's latent power is used to enhance your innate chakra
      transformations. When you gain this art, choose one keyword from the following list that you have access to. This
      choice cannot be changed later;</p><p>Keyword: Earth Release, Wind Release, Fire Release, Water Release, Lightning
      Release, Medical.</p><p>After making your choice, your MS augments and fuses it with one of your most prevalent
      emotions causing the visual aspects of the release to contort into something new entirely (Colors could include
      green for envy, white for pride, blue for hope, or black for hatred.).</p><p>This can only be cast while you or
      your Susanoo are wielding a Susanoo Weapon. The weapon increases its damage die by 1 step and half of the damage
      it deals is applied to all hostile creatures adjacent to you.</p><p>Kineticist Synergy: If you have the Kinetic
      Type class mod feature, you can make one additional attack with your Susanoo Weapon per Malefic Attack
      action.</p><p>Chimeric Synergy: If you have the Chimeric Type class mod feature, this art loses the Ninjutsu
      keyword but gains the Genjutsu keyword and ignores structures and constructs that intercept damage.</p>
