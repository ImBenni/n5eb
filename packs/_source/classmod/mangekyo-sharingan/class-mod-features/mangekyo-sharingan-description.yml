name: Mangekyo Sharingan [Description]
type: feat
_id: 5HmAXwwOg7mE9XUM
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Unlocking the power of the Mangekyō Sharingan is not something to envy. When you see a Mangekyō Sharingan it is
      the result of trauma suffered for a second time but to a greater degree. It has long been thought that the owner
      of the Mangekyō needed to kill their closest friend, creating a twisted state of thought for many years. This has
      since been raised out of the minds of current Uchiha, while most of the text still remains it is noted as being
      inaccurate. But this does not always work unfortunately.</p><p>This Mangekyō Sharingan is a powerful evolutionary
      Dojutsu that has the power to bend the rules of Chakra and the world around the user to its whims. The Mangekyō
      Manifests a series of abilities, usually unique to the user in either eye, and once a user has reached the peak of
      power, they tend to unlock a 3rd, ultimate Mangekyō Art.</p><p>The Mangekyō Sharingan is a tool that can be used
      for both plot &amp; Mechanical relevance. Both the GM and the Player can benefit from including this into the
      narrative.</p><p>The Mangekyō Sharingan has been designed to fit into any story. The Mangekyō Sharingan is a mid
      to late game class mod that, if used, should come with moderation and consideration for other players and keeping
      balance with Power levels. This class mod Should only be gained by characters who have all 3 tomes of the
      Sharingan, which is normally gained at level 11. While this is a powerful Class Mod and should not be handed out
      freely without careful consideration into enemy choice.</p><p>GAINING THE MANGEKYŌ SHARINGAN</p><p>Gaining the
      Mangekyō Sharingan should always be a struggle and filled with trials and tribulations. This Advancement and power
      is not something that should come easy, or should be planned for, their power should only come as the result of a
      major emotionally traumatic event in the characters life. As there is no direct path to attaining it, the decision
      for when it's unlocked is wholly in the hands of the GM and/or players as they build the world. While there are no
      hard-set rules around unlocking it, it can prove difficult to come up with something on the fly. There will be a
      few different options that can be set up by the GM. While this list will include options, it should not be taken
      as the only possible options and GM's are encouraged to work with Players to find a system they want to use to
      unlock this.</p><p>LEVELING UP THE MANGEKYŌ SHARINGAN</p><p>Leveling up the Mangekyō Sharingan (MS) is a difficult
      task, unlike normal shinobi classes that require the player to gain XP to reach their next level, the MS requires
      the user to consistently use it, train it, and master its power. But the more the Eye is used, the greater the
      risk of losing the Light of the Sharingan permanently. This risk comes into play each time the player makes use of
      this power. The MS requires the player to make a significant commitment to using the power of the
      Dojutsu.</p><p>By spending time training with the MS in short bursts, the user can reliably increase their
      proficiency with their MS with little risk. Alternatively by aggressively giving into their Hatred, they can
      forcibly progress their MS at a much faster rate than normal. But this comes at the risk of losing themselves to
      the curse of the Uchiha, also known as Uchiha Madness, Sharingan Psychosis and The Curse of Hatred.</p><p>When you
      gain this class mod, you and the GM decides on which path your character is following to grow their MS. This
      choice should not be changed later primarily to maintain narrative consistency. The risk of using both systems
      interchangeably is that it can be manipulated to a cunning player attempting to game the system.</p><p>TRAINING
      AND EFFORT</p><p>If following the training method, at each of the listed character level minimum requirements
      found on the Mangekyō Sharingan class mod table on the following page, in order to progress to the next level,
      characters must spend 20 downtime exclusively training their MS to progress to the next level.</p><p>HATRED AND
      MALICE</p><p>If following the path of escalating hatred, characters must have a set of other creatures, concepts
      or ideas that they hate with unrivaled loathing. So much so that encountering it sends their characters into a
      self-imposed seething rage. These chosen creatures, concepts or ideas must be connected in some way either
      directly or loosely (Ex. Sasuke's Hatred began with his brother Itachi and then extended to Danzo, and then the
      Leaf Village and then the structure of Shinobi.).</p><p>Following this path you must actively kill or destroy each
      of these things as they present themselves to you crushing everything in your path in order to level up to the
      next level of this class mod. The GM and player should work together to enable the MS user to level up at a
      similar pace to other class mod users in the party if following this path.</p><p>LIGHT &amp; DARKNESS OF THE
      MANGEKYŌ SHARINGAN</p><p>When you first gain access to the Mangekyō Sharingan, your eye forms and you develop a
      unique power generally unique to you and most other Mangekyō Sharingan users known as a Mangekyō Art. Utilization
      of these Arts drains a limited resource known as Light from ones Sharingan. Light, unlike other class mod
      resources does not regenerate and once lost, is permanently gone. The MS user who uses this class mod to the point
      of reaching 0 Light becomes permanently blind and loses both their Sharingan clan feature and this class
      mod.</p><p>If you would gain the Eternal Mangekyō Sharingan you can no longer lose Light. You instead can only
      gain Darkness. If you would gain 200 Darkness, you lose yourself to this Darkness as the Uchiha's curse takes over
      your mind as you becomes blinded by revenge and power. This causes your character to effectively becomes
      functionally an NPC and a villain within your current or future narrative.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/mangekyo-sharingan-unlock-ideas.webp" /><img
      src="systems/n5eb/assets/content/cheat-sheets/mangekyo-sharingan.webp" />
