name: Mangekyo Sharingan [Lvl 1 & 3]
type: feat
_id: Wnaz2wbXNcZIU5aM
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level of this class mod, you have unlocked the power of the Mangekyō Sharingan (MS). When the
      Mangekyō Sharingan is activated, your usually tomoe filled Sharingan morphs into a design of your choice.
      </p><p>As a Bonus action, you activate and materialize your Mangekyō Sharingan. Activating your MS while tide
      turning pulls from your physical stamina. Each time you activate your MS, you spend 2 Hit Die and reduce your
      maximum hit die by 2. If you do not have enough Hit die to activate your MS, you simply cannot activate it. Your
      MS can remain active for no longer than 1 minute per activation. Your maximum Hit die pool is restored when you
      complete a Full-Rest. </p><p>You gain all the benefits of your Sharingan Clan feature for the duration you have
      the MS active. Additionally, your Sharingan abilities granted by your Sharingan clan feature have additional uses
      equal to your level in this class mod +3. </p><p>Finally, while your MS is active, you experience the true power
      of your Sharingan. Your perceptive abilities are magnified and you can utilize your emotions to further enhance
      your combat potential. You also gain the following benefits; </p><p>• You gain a +2 Bonus to your AC. This
      increases to +3 at 3 rd level in this class mod. </p><p>• You gain a +2 Bonus to Saving throws vs Jutsu and Arts
      with the Genjutsu keyword. This increases to +3 at 3rd level in this class mod. If the Jutsu or Art has 2 or more
      additional Sensory keywords (Auditory, Inhale, Tactile) you instead only gain a +2/+3 bonus to the save. </p><p>•
      You gain a +2 Bonus to Dexterity saving throws. This increases to +3 at 3rd level in this class
      mod.</p><p>Beginning at 3rd level in this class mod, your proficiency in your MS has reached its peak allowing you
      to maintain it for an extended period of time. You gain the following benefits; </p><p>• Your Mangekyō Sharingan
      can remain active for up to 10 minutes per activation. </p><p>• You gain immunity to effects that would give you a
      dice-based penalty to any d20 based roll you make. </p><p>• When a hostile creature would roll more than 1 dice
      when making an attack against you, reduce the number of dice they roll by 1, starting with the smallest die.</p>
    chat: ''
