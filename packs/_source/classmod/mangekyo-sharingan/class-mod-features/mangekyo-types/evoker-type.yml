name: Evoker Type
type: feat
_id: UfsAIxFRXdZlZKnh
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>An Evoker type Mangekyō is a Ninshou centric variation of this Dojutsu. Evoker Mangekyō types are defined by
      their close association with effects and abilities that can be easily mistaken for high level Ninjutsu. These
      effects can range from enhancing a user's Nature Release, developing space time ninjutsu, and unique chakra shape
      transformations.</p><p>Mangekyō Sharingan's that are this type grant its users the following unique abilities.
      Additionally, Mangekyō arts with the Evoker keyword gain their listed bonus effects.</p><p>• Evokers Amp: When you
      would cast a Mangekyō Art with the Ninjutsu keyword, you can spend 2 Chakra die. When you do, the art's damage die
      is increased by +5 and ignores damage reduction. If the jutsu would make more than one attack due to its casting,
      the damage die is instead increased by +2.</p><p>• Evokers Insight: When you take the Read the Enemy, Identify
      Ninjutsu/Genjutsu/ Taijutsu/ Bukijutsu, or Aggressive Foresight action on a creature casting a Jutsu or Art, you
      can use your Mangekyō Art Attack Bonus in place of your original skill bonus gaining their normal benefits on a
      success and treating yourself as if you have resistance vs the jutsu cast due to understanding its fundamental
      weaknesses until the beginning of your next turn.</p><p>• Evokers Synergy: When an allied creature would cast a
      Ninjutsu with the Combination keyword, regardless if you have the associated nature release or not, you can aid
      them. If you don't have the required nature releases you must use your level in this class mod to calculate your
      Charisma modifier for the purposes of the jutsu's additional effects.</p>
