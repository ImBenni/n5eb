system:
  description:
    value: >-
      <p>Also, beginning at 1st level of this class mod, your Mangekyō Sharingan begins filled with Light. Light
      functions as a very limited resource for your MS. You begin with 100 Light. You only spend Light you have when you
      have gone over your use limits for your Mangekyō Arts. If you would reach 0 Light, or spend more Light then you
      have remaining, your MS loses its light. You becomes permanently blinded and cannot have this condition removed by
      any means. Additionally, you lose this class mod and your Sharingan Uchiha clan feature and all feats that
      required your Sharingan to function.</p>
    chat: ''
