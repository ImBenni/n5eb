name: Half-Body Manifestation (Armor) [Lvl 3]
type: feat
_id: BYKfYm06toI8bfgC
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level of this class mod, you have learned to manifest a more solid version of your Malefic
      Armor, covering a larger portion of your body granting you protections in the same way samurai armor would to its
      wearer.</p><p>As a Reaction on your turn, you manifest your Malefic Armor in the shape of battle armor. This
      battle armor can consist of gauntlets, grieves, shoulder pads helmets etc. If you would attempt to summon this
      Susanoo form when you have no remaining uses, you can spend 5 Light to manifest it for 1 minute.</p><p>While in
      this form, you must maintain concentration on this form as if it were a Jutsu. You can only lose concentration on
      this manifestation as a result of an Art that would force you to automatically lose concentration on things you
      are concentrating on. This armor grants you ever growing benefits and abilities;</p><p>• At the beginning of each
      of your turns, you can gain temporary hit points equal to half your character level. While you have temporary hit
      points as a result of this armor you gain resistance to bludgeoning, piercing, slashing and chakra damage.</p><p>•
      You gain Damage reduction equal to your level in this class mod + 7.</p><p>• Strength and Dexterity saving throws
      you make use your Mangekyō Attack Bonus in place of your saving throw bonuses.</p><p>• Your speed is increased by
      an amount equal to 10 times your level in this class mod.</p><p>• As an action, you can take the Malefic Attack
      action. When you do, you make a number of weapon attacks equal to half your level in this class mod (min 1.) + 2.
      These attacks use your Susanoo Weapon in place of any other weapon you have.</p><p>o Attacks made as a result of
      the Malefic Attack action ignores damage reduction and On a successful hit, the target must make a Constitution
      saving throw, gaining 2 ranks, of one of the following conditions of your choice. (You decide on the inflicted
      condition on a successful hit, not on a failed save.)</p><p>▪ Bruised</p><p>▪ Lacerated</p><p>▪ Weakened</p><p>▪
      Concussed</p><p>▪ Confused</p><p>▪ Dazzled</p><p>Alternatively, you can spend your Malefic Attack action to cast
      one Susanoo art.</p><p>• As a bonus action, you can Malefically Overdrive yourself using your Malefic Armor as the
      catalyst. You can Malefically Overdrive yourself no more than once per rest due to the stress the Susanoo places
      on you. If you would Malefically Overdrive yourself beyond this limitation, your body is brutalized by the strain
      and you must roll a d20. On a roll of 9 or higher, your bones crack, and your muscles become ripped as you gain 2
      ranks of Exhaustion, Concussed &amp; Weakened until you complete a Full-Rest, unable to be removed by normal
      means. While you are Malefically Overdriven, you gain the following and benefits for the next minute.</p><p>o You
      gain immunity to all Genjutsu with the Auditory or Inhale keyword (Pick one, this cannot be changed later.) as the
      mass of chakra that surrounds you blocks opposing chakra from reaching your ears or olfactory senses in any
      meaningful way.</p><p>o Your Armor Class becomes equal to your Mangekyō Save DC if it is lower than it. If your
      Armor Class is equal to or higher than your Mangekyō Save DC, you instead increase your AC by +2.</p><p>o You gain
      immunity to the following conditions for the duration (If you would have these conditions prior to gaining this
      benefit, this does not remove them, only make you immune to their effects for the duration.);</p><p>▪ Death Dying
      and Disabled: Incapacitated, Unconscious, Petrified.</p><p>▪ Death Dying and Disabled: Incapacitated, Unconscious,
      Petrified.▪ Elemental: Pick 1 (Once picked, cannot be changed later.)</p><p>▪ Physical: Dazed, Paralyzed,
      Stunned.</p>
