folder: MU7weaEYLgBKzp0h
name: Partial Manifestation (Avatar) [Lvl 2]
type: feat
_id: 3aJE98pNpIXeo6z2
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>You begin with the ability to manifest your Susanoo in pieces using a variety of actions. You can manifest your
      Malefic Avatar as a Bonus action on your turn. When you call on your Malefic Avatars patrial manifestation, you
      can spend a variety of your actions to manifest it in different ways for the duration. Your Malefic Avatar is of
      any color and design of your choice. Different aspects of your Susanoo will follow this same design pattern. If
      you would attempt to summon this Susanoo form when you have no remaining uses, you can spend 3 Light to manifest
      it for 1 minute.</p><p>• Action: You manifest your Susanoo's arms. Your Susanoo's arms are in a skeletal design
      holding a melee weapon. This weapon has a range of 10ft, and uses your Mangekyō Art attack bonus. You can make up
      to two melee attacks using this action. On each successful hit, you deal 5d6 + half your character level, in force
      damage. On each successful hit, the target creature gains 1 rank of bruised. A Bruised creature makes a Strength
      saving throw at the beginning of their next turn. On a success, they remove 1 rank of bruised, on a failure, the
      rank of bruised remains for 1 minute or until removed.</p><p>Action: You manifest your Susanoo's arms. Your
      Susanoo's arms are in a skeletal design holding a ranged weapon. This weapon has a range of 90ft, and uses your
      Mangekyō Art attack bonus. You can make up to two ranged attacks using this action. On each successful hit, you
      deal 4d6 + half your character level, in force damage. On each successful hit, the target creature gains 1 rank of
      Lacerated.</p><p>• Action: You can manifest your Susanoo's ribcage. This ribcage, regardless of the spaces between
      each rib guards you from serious damage. Until the end of your next turn, you gain 20 damage reduction from all
      sources.</p><p>• Bonus Action: You can manifest your Susanoo's arms. Your Susanoo's reach out and attempt to grab
      a creature no more than 15ft away from you that you can see. Make a melee Mangekyō Art attack. On a success the
      target is grappled and may attempt to make a Strength saving throw to escape. On a success they end the grappled
      condition. On a failure, they are restrained by your Susanoo and are held in place. A restrained creature remakes
      their saving throw at the end of each of their turns, escaping on a success.</p><p>• Reaction: You can manifest
      your Susanoo's ribcage. This ribcage, regardless of the spaces between each rib intercepts incoming damage. You
      gain 6d6 + your character level in temporary hit points until the end of the current turn. While you have
      temporary hit points granted by this ability, you have immunity to chakra damage, resistance to damage from
      attacks or jutsu that deals elemental damage (Earth, Wind, Fire, Cold or Lightning) or has a nature release
      keyword or bludgeoning piercing or slashing damage.</p>
