system:
  description:
    value: >-
      <p>"This bejeweled weapon is said to have been forged on the bridge between worlds. Each time it strikes its
      target, it slashes at the threads of fate."</p><p>Weapon Ability: Each time you successfully score a hit with this
      weapon against a creature, you impose a -1 penalty to its all of its saving throws until the beginning of your
      next turn.</p><p>If you would begin your turn within 5 feet of a hostile creature who is benefiting from a Jutsu
      or Art that another creature cast upon it, your weapon vibrates and revels the thread of fate binding the two. If
      you score a successful hit against the target, you slash at this thread forcing both the target and the creature
      who originally cast the jutsu or Art on them to make a contested Charisma check against each other. If their
      results are not within 5 points of each other, the jutsu or Art immediately ends and the original target gains
      immunity to that jutsu or Art for the next 10 minutes as the threads of fate are restoring itself.</p>
    chat: ''
