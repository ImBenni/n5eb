system:
  description:
    value: >-
      <p>"This ethereal weapon manifests its hosts subconscious into physical form forming a small army of self that
      cannot be matched."</p><p>Weapon Restriction: None.</p><p>Special Restriction: Chimeric Type</p><p>Weapon Ability:
      This weapons damage type changes, to Psychic. When you deal damage with this weapon, your weapon conjures an
      illusory duplicate of you and your Susanoo. This duplicate is obviously translucent and flickers in and out of
      existence. You can manifest up to 5 illusory duplicates at a time. For each duplicate you have increase your AC by
      +1 and your Mangekyō Attack Bonus by half the result.</p><p>When you have five (5) or more illusory duplicates
      active at any single time, you can, as an action in place of one of your attacks granted by the Malefic Attack
      action, make a Chimeric Volley.</p><p>Chimeric Volley. Yourself and all of your duplicates make a strike targeting
      the same creature. Make your attack with this Susanoo Weapon. For every +1 you have over your targets AC, an
      illusory clone also strike the target, hitting and overwhelming them with illusory energy reducing their next X
      D20 roll(s) by 1d4 for every illusory clone that strikes the target. (X = your level in this class mod)</p>
