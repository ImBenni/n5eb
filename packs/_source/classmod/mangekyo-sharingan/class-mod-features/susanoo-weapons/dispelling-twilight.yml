name: Dispelling Twilight
type: feat
_id: pXDQkCg7piAjrnaZ
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>"This ethereal weapon was known to stave off the scorching heat of the sun and the freezing cold of the
      moon."</p><p>Weapon Restriction: Defensive.</p><p>Weapon Ability: Each time you successfully score a hit with this
      weapon against a creature, this weapon gains a fragment of War. Each time you would take damage, this weapon gains
      a fragment of Peace. You can have a max of 5 for either. When this weapon has accumulated 5 fragments of war, you
      can as a reaction, spend accumulated fragments to interrupt and dispel any Jutsu that's being cast that would deal
      damage. When this weapon has accumulated 5 fragments of peace, you can as a reaction, spend accumulated fragments
      to interrupt and dispel any Jutsu that's being cast that would heal, cleanse conditions, provide bonuses or grants
      advantage in any way. Spending motes cost no action or reaction.</p><p>When you would begin your turn with 5
      fragments of both War and Peace, you can coalesce both these into a powerful monochrome light. For the duration of
      your Susanoo, when you (and by extension your Susanoo) would gain no more than 2 rank of any condition, you
      instead gain 0. If you would gain 3 or more ranks of any condition, you instead gain 2 less ranks of the select
      condition.</p>
