system:
  description:
    value: >-
      <p>"This ethereal weapon captures the latent desires within its wielder and evolves to becomes the perfect tool to
      evoke change in fate."</p><p>Weapon Restriction: None.</p><p>Special Restriction: Evoker Type</p><p>Weapon
      Ability: This weapons damage type changes, to one damage type to match a Ninjutsu or nature release you have
      access to. When you deal damage with this weapon, your weapon surges with your unrestrained power. Increase your
      next attacks damage with this weapon by +1 damage die. This stacks up to 3 times, and resets at the beginning of
      your next turn.</p><p>As an Action, in place of the Malefic Attack action, you can magnify your strength using
      your chosen damage type. When you do, for 1d4 of your following turns, in place of one of the attacks granted by
      your Malefic Attack action, you make an Evoker Strike.</p><p>Evoker Strike. On a hit you release all stored energy
      dealing Xd10 additional damage to all other hostile creatures within 25 feet of your original target. (X = Twice
      your level in this class mod.) Additionally, all creatures affected by your Evoker Strike, must make a Dexterity
      saving throw. On a failed save they gain 3 ranks of the associated damage types condition based on the following
      chart.</p><img src="systems/n5eb/assets/content/cheat-sheets/evokers-ambition-damage-to-condition-chart.webp" />
