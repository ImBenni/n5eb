system:
  description:
    value: >-
      <p>"This weapon was said to have been forged from the heart of a saint who ascended to the pure lands. As a result
      this weapon has the potential to bring back the souls of the deceased."</p><p>Weapon Restriction:
      Melee.</p><p>Weapon Ability: This weapon can be used in an unorthodox way, when striking a creature, you can
      choose to close wounds, instead of make them. You can choose to use attacks as a result of your Malefic Action to
      target allied creature. If they are willing they can choose to automatically be hit. You still make your attack to
      see if you can score a critical hit. On a hit, the target regains hit points equal to the result of the damage. A
      creature can only be healed in this way, once per turn, and only if they have more than 0 hit points.</p><p>A
      creature who has died within the last 10 minutes with an intact corpse, soul is still lingering and can be seen
      beginning to depart from its mortal vessel. As a Full-Turn action, you can swipe this weapon across their soul,
      forcing them back into their body, reviving them. A creature revived in this way are permanently treated as if
      they have 3 failed death saves at all times. These failed death saves cannot be removed by any means. A creature
      can only be revived by this weapon, once.</p>
