name: Mistaken Birth
type: feat
_id: 06I7o0ZRgdz7dKds
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>"This paltry looking weapon is often mistaken for other weapons of legend, leading to the soul of the weapon to
      feel like its construction was a mistake. This envy leads to it stealing the purpose of other weapons away in
      order to give itself purpose"</p><p>Weapon Restriction: Ranged.</p><p>Weapon Ability: Each time you successfully
      score a hit with this weapon against a creature, this weapon gains a fragment of purpose. When this weapon has
      accumulated 5 fragments of Purpose it steals away one Feature, trait, jutsu or ability the target had at random
      (Roll 1d4, selecting a feature/trait on a 1 or 2, jutsu on a 3, or Special ability/action on a 4. Once the stolen
      category, is decided, you randomly steal one of the listed. Roll a die to determine the stolen item.). This stolen
      feature, trait, jutsu or ability is henceforth called the Stolen Purpose. You gain the Stolen Purpose and can
      cast/activate it as a Mangekyō Art with its own pool of uses. The affected creature loses the Stolen Purpose and
      cannot gain access to it again until your Susanoo ends, after which you lose it as well. You can only have one
      Stolen Purpose at a time.</p><p>As a bonus action you can call the true name of your weapon causing its memories
      to flood into itself, reminding it of its true and original purpose. The next attack you make with this Susanoo
      Weapon that successfully strikes a hostile creature and scores 10 or more over their AC, before the end of your
      next turn you are able to select one of the following categories and sealing it away, causing the target to lose
      access to the chosen category of abilities for 1d4 of its turns; Ninjutsu, Genjutsu, Taijutsu, Bukijutsu,
      Features, Clan Traits or Role Traits. Once you use this ability, you cannot do so again until you reactivate your
      Susanoo.</p>
