system:
  description:
    value: >-
      <p>"This ethereal weapon, despite being ancient, imitates the destructive power or a modern tool of
      war."</p><p>Weapon Restriction: Ranged.</p><p>Weapon Ability: Each time you successfully score a hit with this
      weapon against a creature, this weapon gains an Ethereal Ammunition (Max 5). For each Ethereal Ammunition you have
      this way, increase your to hit and damage rolls with this weapon by +1. When you would deal damage with this
      weapon, while you have 5 Ethereal Ammunition, you a special shot of energy is manifested and fired in conjunction
      with your normal attack. On a hit with this weapons attack, a follow-up bolt strike the same target, reducing one
      of their ability scores by 1d4 for the duration of your Susanoo. Roll 1d6 to determine the Ability score (1 –
      Strength, 2- Dexterity, 3- Constitution, 4- Intelligence, 5- Wisdom, 6- Charisma)</p><p>When you would begin your
      turn with 5 Ethereal Ammunition you can choose to prepare them all for a volley of strikes. When you do, Choose
      one creature within range, and make a single attack with this weapon. Then roll 1d6 to determine the effect of the
      remaining Ethereal Ammunition.</p><p>1. This attack cannot miss and adds +5 damage die</p><p>2. This attack can
      target 5 additional creatures using the same attack result vs each new targets AC</p><p>3. This attack treats the
      target as vulnerable for this damage roll.</p><p>4. This attack Stuns the target until the end of the next
      turn.</p><p>5. This attack deals 250 chakra damage to the target.</p><p>6. Roll two more times, gaining two
      effects. Reroll if you get 6 again.</p>
