name: Sealing Edge
type: feat
_id: AELXF34PLsAEw0aS
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>"This ethereal weapon is enchanted with fragments of its users soul, allowing it to seal anything it
      pierces."</p><p>Weapon Restriction: None.</p><p>Weapon Ability: When you deal damage with this weapon, you deal
      Chakra damage to the creature equal to the original damage it dealt. Once per turn, if you would deal damage to a
      creature who has no chakra, it must make a Level Save. On a failed save, the target is sealed into your weapon.
      (Level Save: The target makes a d20 roll and adding its level to calculate the result).</p><p>A target whom is
      sealed into your weapon is transported to a pocket dimension only accessible through teleportation as a result of
      a Jutsu of A-Rank or higher with the Fuinjutsu keyword or an Art that allows a creature to teleport with the
      Fuinjutsu keyword. A sealed creature is Stunned, Paralyzed, Incapacitated and Unconscious and loses any immunities
      it has against these conditions. Only one target can be sealed into your weapon at a time. If you would seal
      another creature into your weapon, the previously sealed creature is immediately released, but with no knowledge
      of how much time has passed between now and when they were sealed or any events that have transpired between then
      and now.</p>
