name: Mangekoy Sharingan Feats [Description]
type: feat
_id: OFiAYKsw8JtueAvA
img: systems/n5eb/assets/content/eyes/mangekyo-sharingan.webp
system:
  description:
    value: >-
      <p>The following are a list of Feats designed with a lower power-level in mind. These feats are a part of the
      overall Class Mod category of feats. These feats are intended to give the user the feel of the Mangekyō Sharingan
      without oppressively shifting the balance of a normal level 1-20 play through.</p><p>Here are the following rules
      and requirements in regards to even gaining these Class Mod feats.</p><p>• Each Class Mod feat after the first
      costs 25 downtime worth of training with your MS.</p><p>• A character must have at least the 3rd tomoe of the
      Sharingan clan feature.</p><p>• A character can only access these feats if it witnesses one of its loved ones was
      killed in front of them.</p><p>• All Arts, features and abilities you gain from a Class Mod feat can be used in
      any Mangekyō Sharingan variant you have access to. (Imperfect, Adept, etc.)</p><p>• All Mangekyō Sharingan
      variants have a unique set of bonuses and effects, which can be found on the Mangekyō Sharingan Variants table at
      the end of these feats.</p><p>• You can activate and exit any Mangekyō Sharingan variant as a Bonus
      action.</p><p>• Regardless of the Mangekyō Sharingan variant you access, they all share the same Full-Rest
      recharge limitation.</p><p>• You gain one Mangekyō Type to embody.</p><p>• Mangekyō Art Charges are a special
      resource intended to allow you to cast Mangekyō Arts or Activate your Susanoo.</p><p>o Each Mangekyō Sharingan
      variant has its own Mangekyō Art Charge pool and limitations on what you can spend your charges on.</p><p>•
      Mangekyō Arts cast with Mangekyō Art Charges rolls half their dice values for damage, healing and damage
      reduction.</p><img src="systems/n5eb/assets/content/cheat-sheets/mangekyo-sharingan-variants.webp" />
