system:
  description:
    value: >-
      <p>Sage Art Type: Ability </p><p>Base Sage Chakra Cost: 4 Sage Chakra </p><p>Reduced Sage Chakra Cost: 3 Sage
      Chakra </p><p>You use your Senjutsu to provide yourself with a massive bonus to your Evasive potential.
      </p><p>Once per turn, when you are the target of an attack, you can spend the listed Sage Chakra. When you do, you
      can do one of the following;</p><p>• Gain a bonus to your AC equal to half of your proficiency bonus, as you move
      in ways to mitigate the incoming damage against this triggering attack. If you would avoid the triggering attack,
      you can use this effect from this ability an additional time this turn. </p><p>• Treat a Critical hit as a normal
      hit by swiftly avoiding a vital strike. This always supersedes other traits, feats and features.</p>
