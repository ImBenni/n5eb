system:
  description:
    value: >-
      <p>Sage Art Type: Ability </p><p>Base Sage Chakra Cost: 4 Sage Chakra </p><p>Reduced Sage Chakra Cost: 2 Sage
      Chakra </p><p>You use your Senjutsu to provide you with a massive bonus to your Toughness. </p><p>Once per turn,
      by spending the listed Sage Chakra. When you do you gain one of the following effects that boosts your resistance
      to damage.</p><p>• You gain Damage Reduction (DR) equal to your character level against one creatures attacks for
      the duration of that creatures turn (Elite Actions count as one turn for such a creature) </p><p>• Select any one
      damage type, you gain resistance to the chosen damage type until the beginning of your next turn. </p><p>• Select
      any one Physical or Elemental condition, you gain immunity to that condition until the end of the current
      turn.</p>
