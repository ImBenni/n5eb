      on your turn, by spending the listed Sage Chakra. When you do, you gain one of the listed effects.</p><p>• An
      additional action on your turn. You can gain this benefit once per Sage Mode activation. </p><p>• An additional 2
      bonus actions on your turn. You can gain this benefit twice per Sage Mode activation. </p><p>• An additional
      Reaction (This can be done even if it is not your turn).</p>
