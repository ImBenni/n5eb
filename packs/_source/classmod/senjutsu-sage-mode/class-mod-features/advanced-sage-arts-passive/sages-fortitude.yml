system:
  description:
    value: >-
      <p>Sage Art Type: Passive </p><p>You have tuned your Senjutsu to the point where it not only permeates throughout
      your body, providing your abilities based on your affinity, but you also use it to amplify your physical
      endurance. </p><p>Once per turn, on your turn, you can activate or deactivate this passive. At the beginning of
      each turn you have this passive active; you spend the listed Sage Chakra Cost. This cost is spent even if you
      decide to end the passive at the beginning of your turn. You gain the following Benefits;</p><p>• Sage Chakra
      Cost: 6 Sage Chakra. </p><p>• Reduced Sage Chakra Cost: 4 Sage Chakra. </p><p>• Your Constitution Score becomes
      24. </p><p>• You gain bonus Damage reduction (DR) equal to twice your level in this class mod. </p><p>• Once per
      long rest, when you activate this passive, you gain a number of temporary hit points equal to your Constitution
      modifier times 10 (Max 100.). These temporary hit points persist between activations of Sage Mode and only refresh
      after a long rest. </p><p>• When you would pass a Constitution saving throw by 5 or more, you gain 1 Will of Fire.
      You can gain 1 Will of Fire in this way every short rest.</p>
