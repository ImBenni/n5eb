system:
  description:
    value: >-
      <p>Sage Art Type: Passive </p><p>You have tuned your Senjutsu to the point where it not only permeates throughout
      your body, providing your abilities based on your affinity, but you also use it to amplify your stamina and
      overall ability to last in battle. </p><p>Once per turn, on your turn, you can activate or deactivate this
      passive. At the beginning of each turn you have this passive active; you spend the listed Sage Chakra Cost. This
      cost is spent even if you decide to end the passive at the beginning of your turn. You gain the following
      Benefits;</p><p>• Sage Chakra Cost: 4 Sage Chakra. </p><p>• Reduced Sage Chakra Cost: 2 Sage Chakra. </p><p>•
      Senjutsu you cast have their Sage Chakra costs reduced by 1, (Min 1.) </p><p>• At the beginning of each of your
      turns, you regain Xd6 hit points so long as you have more than 25 hit points at the start of that turn (X = Twice
      your class mod level, this cannot be switched with other passives that allow you to substitute a chosen ability
      modifier). </p><p>• At the beginning and end of each of your turns, you can make a DC 25 Constitution saving
      throw. On a success, you end any one condition currently affecting you.</p>
