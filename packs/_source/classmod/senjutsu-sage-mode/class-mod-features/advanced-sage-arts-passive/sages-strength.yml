system:
  description:
    value: >-
      <p>Sage Art Type: Passive </p><p>You have tuned your Senjutsu to the point where it not only permeates throughout
      your body, providing your abilities based on your affinity, but you also use it to amplify your Strength.
      </p><p>Once per turn, on your turn, you can activate or deactivate this passive. At the beginning of each turn you
      have this passive active; you spend the listed Sage Chakra Cost. This cost is spent even if you decide to end the
      passive at the beginning of your turn. You gain the following Benefits;</p><p></p><p>• Sage Chakra Cost: 6 Sage
      Chakra. </p><p>• Reduced Sage Chakra Cost: 4 Sage Chakra. </p><p>• Your Strength Score becomes 24. </p><p>•
      Increase your Sage Art Attack Bonus by +2. • Increase your unarmed and Weapon damage die by +1. </p><p>• Class Mod
      features that reference your Class mod level for calculations now can use your base Strength modifier in place of
      class mod level. This does not stack with other passives that perform similar effects but with different ability
      modifiers. This also does not count for Senjutsu Attack or Save DC calculation.</p>
