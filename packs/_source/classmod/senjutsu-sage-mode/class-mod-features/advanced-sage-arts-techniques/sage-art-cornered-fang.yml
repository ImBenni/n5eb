system:
  description:
    value: >-
      <p>Reduced Cost: 3 Sage Chakra</p><p>You use Sage Chakra to manipulate your physical strength augmenting it beyond
      the pale.</p><p>When a hostile creature is within range, you strike out in a stance reminiscent to that of your
      Tribes battle stance. Make a melee Senjutsu attack, dealing your three times your unarmed damage die + 6d12 and
      the target creature must make a Strength saving throw being Staggered on a failed save.</p><p>If you cast this Art
      while adjacent to 2 or more hostile creatures, you instead compare your attack result to the AC of all adjacent
      hostile creatures affecting them as if they were the original target of this art as well.</p><p>Sage Affinity
      Synergy: If you have the Carnivoran Senjutsu class mod feature, when you cast this Senjutsu, you may utilize the
      techniques that your tribe has entrusted you with. If you do, you instead make 2 attacks comparing the results and
      affecting each creature as normal.</p>
