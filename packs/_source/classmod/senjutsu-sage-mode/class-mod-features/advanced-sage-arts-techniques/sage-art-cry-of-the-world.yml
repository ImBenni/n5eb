system:
  description:
    value: >-
      <p>Reduced Cost: 7 Sage Chakra</p><p>You use Sage Chakra to manipulate the atmosphere in a violent show of force
      and power. You inhale and exhale releasing a cyclone of force ripping at the very fabric of another creatures
      being.</p><p>All creatures in range must make a Strength saving throw. On a failed save affected creatures takes
      10d8 force damage and all Jutsu or Role Trait based effects currently affecting them are dispelled. If a trait is
      dispelled, it is dispelled until the end of the affected creatures next turn.</p><p>Sage Affinity Synergy: If you
      have the Avian Senjutsu class mod feature, when you cast this Senjutsu, you may utilize the techniques that your
      tribe has entrusted you with. If you do, a creature also finds that even clan- based features or traits with a
      persisting effect, ends. (Ex. Sharingan, Byakugan, Bone Weapons, Raw Chakra Form, etc.)</p>
