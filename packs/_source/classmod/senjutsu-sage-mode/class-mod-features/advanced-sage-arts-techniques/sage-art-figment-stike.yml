system:
  description:
    value: >-
      <p>Reduced Cost: 7 Sage Chakra</p><p>You use Sage Chakra to manipulate the power of your next strike, bending the
      laws of the world to fit you needs. Your next attack is augmented based on the type of weapon you are
      using.</p><p>Melee Weapon: Make a melee Senjutsu attack, rolling 2 additional d20, taking the lowest result. On a
      hit you deal 20 times, your weapons damage.</p><p>Ranged Weapon: Make a ranged Senjutsu attack. Regardless of the
      result, you automatically score a hit dealing 5 times your weapons damage die, in damage.</p><p>Sage Affinity
      Synergy: If you have the Primate Senjutsu class mod feature, when you cast this Senjutsu, you may utilize the
      techniques that your tribe has entrusted you with. If you do, the melee attack instead rolls 1 additional d20 and
      the ranged attack can target 1 additional creature of your choice within range.</p>
