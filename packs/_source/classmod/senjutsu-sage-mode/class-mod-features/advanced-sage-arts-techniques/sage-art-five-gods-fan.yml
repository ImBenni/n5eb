system:
  description:
    value: >-
      <p>Reduced Cost: 6 Sage Chakra</p><p>You conjure a Summoning circle to one of the 5 elemental mountains. Select
      one nature release that you currently have access to. If you don't know any nature release, roll a 1d6, taking one
      of the following results;</p><p>You summon an ever-billowing amalgamation of that element. Select up to 4
      creatures including yourself to not be affected by this Sage Art. All creatures affected, must make a Constitution
      saving throw to resist the mounting effects of this surge of elemental force. On a failed save, a creature takes
      16d10 of the corresponding damage type and gains 5 ranks of listed condition. On a successful save, creatures take
      half damage and instead gain 3 ranks of the listed condition.</p><p>Sage Affinity Synergy: If you have the Earth,
      Wind, Fire, Water or Lightning Senjutsu class mod feature, when you cast this Senjutsu, you may further infuse it
      with your advanced nature transformation. If you do, this Senjutsu's duration becomes Concentration, up to 1
      minute, its range becomes Self (80ft Cube) and A creature who enters this radius for the first time on their turn,
      begins or ends their turn within the radius must make their saving throw vs this Senjutsu's effects.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/five-gods-fan-elemental-chart.webp" />
