system:
  description:
    value: >-
      <p>Reduced Cost: 6 Sage Chakra</p><p> You and your allied Sage Beast use a potent combination of techniques with a
      specific outcome. You can only cast this jutsu if you are within 5 feet of a Sage Beast of A-Rank or higher that
      is allied with you and they want to aid you and they are able to cast a Ninjutsu. When this jutsu is cast, any
      aiding Sage Beast must spend a jutsu slot and be unable to take Actions or Reactions until it is commanded to
      recover by its summoner. A recovering Sage Beast is unable to act until the beginning of its summoners next turn
      after being commanded to recover.</p><p>First, Select one Damage type you can inflict using a Ninjutsu or
      Senjutsu. Second, select one damage type each aiding Sage Beast can deal from a Ninjutsu they can cast. For each
      damage type selected, select one of the listed effects from the Sage Art: Goemon table below applying its effects.
      All affected creatures must make a Dexterity saving throw taking 6d8 of each damage type on a failed save or half
      as much on a success and the listed effects found with each damage type.</p><p>If you are within 5ft of two or
      more allied Sage Beasts when you cast this Senjutsu and they want to aid you, select one additional damage type
      and increase the damage by 6d8 of the selected damage type for each additional Sage Beast after the
      first.</p><p>Sage Affinity Synergy: If you have the Earth, Wind, Fire, Water or Lightning Senjutsu class mod
      feature, when you cast this Senjutsu, you may further infuse it with your advanced nature transformation. If you
      do, creatures who make a saving throw against this Senjutsu, suffers a 1d4 penalty to their save.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/sage-art-goemon-damage-combination.webp" />
