system:
  description:
    value: >-
      <p>Reduced Cost: 4 Sage Chakra</p><p> You stick your hand onto the ground, releasing a pulse of Sage Chakra. All
      creatures of your choice within range, must make a Constitution saving throw. On a failed save creatures are
      infected with your Sage Chakra for the duration, becoming unable to spend normal chakra to cast Ninjutsu or
      Genjutsu. If they would attempt to cast a Ninjutsu or Genjutsu, they can only do so if they have a chakra like
      resource that allows them to do so (Ex. White Chakra, Celestial Chakra, Sage Chakra, etc.)</p><p>Sage Affinity
      Synergy: If you have the Reptilian Senjutsu class mod feature, when you cast this Senjutsu, you may utilize the
      techniques that your tribe has entrusted you with. If you do, all creatures who failed their saving throw also
      immediately lose the benefits of all Jutsu and non- class mod effects currently affecting them as those effects
      end. If an effect had a duration of any type and did not come from a class mod it ends and is sealed for the
      duration, unable to be activated unless this Art ends. This Art has no effects on Adversaries of higher level than
      the caster, or if the Adversary is classed as a Solo.</p>
