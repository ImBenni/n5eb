folder: uuWsvr4SleZah3pq
name: 'Sage Art: Inorganic Reincarnation'
type: spell
_id: 6rsdFcKwH1DHZJFH
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Reduced Cost: 7 Sage Chakra</p><p>You use Sage Chakra to enslave objects with no life functions such as the
      earth, water, metals, or wood, giving you the ability to make drastic alterations to the immediate area. An area
      in size, equal to a 100- foot cube, that you touch, gain seemingly sentient movement at your discretion. For the
      duration of this Art, you can do the following as either your Action or Reaction while within the affected
      area.</p><p>Sage Affinity Synergy: If you have the Dragon Senjutsu class mod feature, when you cast this Senjutsu,
      you may utilize the techniques that your tribe has entrusted you with. If you do, you can also choose to spend
      your full movement or Bonus action to activate any of the following effects.</p><p>• You can raise or lower an
      area no larger than a 10-foot cube up or down, up to 25 feet in elevation. If this is done as a reaction to a
      damaging jutsu or art, this cube counts as an Earthen construct that intercepts incoming damage for you or an
      allied creature and has 5d6 + 35 Hit points.</p><p>• Erect or flatten a wall up to 25 feet tall, 5 feet thick, and
      15 feet long. If this is done targeting a wall, construct or structure created by a Jutsu, that wall, construct or
      structure is dispelled as if targeted by Sealing Art: Chakra Dispel at S-Rank.</p><p>• You can move through the
      ground and walls so long as it is large enough to hold you and for you to move through it, as you would through
      water. You move at half speed while moving through these inorganic structures and you gain 25 feet of tremorsense
      centered on your position within the structure.</p><p>• Have the ground and other inorganic objects within the
      cube attack your enemies. Select up to 3 creatures, all of whom must make a Dexterity saving throw. On a failed
      save they take 8d8 Earth, Bludgeoning, Slashing or Piercing damage (Your choice) and are grappled by the
      environment itself or half as much damage and no further effects on a success. A grappled creature can attempt to
      escape following the rules for grappling using your Senjutsu Save DC as the target number to beat.</p><p>• Make a
      patch of ground no larger than a 15-foot cube soften and malleable as it attempts to swallow your enemies like
      quicksand, or soft putty. Affected creature(s) must make a Strength saving throw being restrained on a failed
      save. A creature who fails this saving throw by 5 or more also begins drowning, gaining 1 rank of exhaustion at
      the beginning of each of their turns they remain drowning. A creature restrained in this way can use an action to
      remake their saving throw to escape being restrained in this way.</p>
