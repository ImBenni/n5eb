system:
  description:
    value: >-
      <p>Reduced Cost: 5 Sage Chakra</p><p>You use Sage Chakra to generate a beam of light sharp enough to cut through
      anything. This beam moves at the speed of light and is almost impossible to dodge. All creatures in a 30-foot cone
      must make a Dexterity saving throw, taking 15d10 slashing damage on a failed save or half as much on a
      success.</p><p>If a creature who's passive perception is less than 25 makes a saving throw against this Art, they
      make their save at Disadvantage. If a creature passes this save by 10 or more, they take no damage from this
      art.</p>
