system:
  description:
    value: >-
      <p>Reduced Cost: 4 Sage Chakra</p><p>You use Sage Chakra to manipulate your stomach acid manipulating it functions
      similar to that of a poison or venom and then expel it in a violent blast of destructive mist melting and
      destroying all in its path.</p><p>Select the type of stomach acid manipulation you want to use when casting this
      Art, imposing its effect. Regardless of the type of manipulation, all creatures in range must make a Constitution
      saving throw.</p><p>Sage Affinity Synergy: If you have the Insectoid Senjutsu class mod feature, when you cast
      this Senjutsu, you may utilize the techniques that your tribe has entrusted you with. If you do, increase the
      damage die by 1 step, to a d10 and after casting this Art it leaves a 15ft cube filled with your chosen damage
      type for 1 minute. All creatures who begin their turn in or would enter the affected area for the first time on a
      turn, must make a Constitution saving throw, suffering the listed effect on a failed save.</p><p>• Acidic
      Destruction: On a failed save, creatures take 14d8 Acid damage and gain 4 ranks of Corroded or half as much damage
      and half as many ranks on a success.</p><p>• Venomous Destruction: On a failed save, creatures take 14d8 Poison
      damage and gain 4 ranks of Envenomed or half as much damage and half as many ranks on a success.</p><p>• Eroding
      Destruction: On a failed save, creatures takes 14d8 Necrotic damage and gain 4 ranks of Concussed or half as much
      damage and half as many ranks on a success.</p>
