name: 'Sage Art: Mountain Carving Ball'
type: spell
_id: NCCc0U0NmJ4IC1iN
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Reduced Cost: 4 Sage Chakra</p><p>Description: You generate a massive 15-foot ball of Sage Chakra. You impart
      enough Sage Chakra into this ever- spiraling ball of energy to easily carve a mountain.</p><p>Make a melee
      Senjutsu attack against a creature in range. On a hit, the target creature takes 24d8 force damage. All Creatures
      (excluding you, the original target and up to 4 creatures of your choice) in a 30-foot radius sphere, centering on
      the original target must make a Dexterity saving throw. On a failed save, they take 12d8 force damage and are
      pushed back 60ft on a failed save, or half as much damage and only pushed back 30ft on a success.</p><p>Sage
      Affinity Synergy: If you have the Earth, Wind, Fire, Water or Lightning Senjutsu class mod feature, when you cast
      this Senjutsu, you may further infuse it with your advanced nature transformation. If you do, increase the radius
      of this Senjutsu to 50ft and after damage calculation, the surrounding area in a 500ft radius will be devastated
      by the concentrated elemental force of this Art leaving behind one of the following effects based on its damage
      type for no longer than 10 minutes.</p><p>• Earth: The terrain within the is littered with standing, free
      floating, and slowly erupting stalagmites, which count as Earthen Constructs. Being thrown into or touching one of
      these stalagmites causes them to explode in a 10ft radius dealing 6d6 earth damage to all creatures in
      range.</p><p>• Wind: The terrain is surrounded by a massive storm that aggressively spreads the misfortunes of
      creatures within. At the beginning of each hostile creatures turn, all creatures within 5ft of them gain 1 rank of
      all Elemental conditions they have.</p><p>• Fire: Twenty, 10ft cubes of super-heated spiraling flame appear in the
      area, manifesting in areas of your choice, that automatically inflicts 2 ranks of the Burned condition if a
      creature passes through or begins it turn within 5 feet of its space.</p><p>• Cold: The entire space is filled
      with 10ft deep water.</p><p>• Lightning: At the beginning of each hostile creatures turn, they must roll a d12. On
      any roll less than 5, they are struck by lightning dealing 6d6 lightning damage and inflicting 1 rank of
      Shock.</p>
