folder: uuWsvr4SleZah3pq
name: 'Sage Art: Pacification of the Grounds'
type: spell
_id: alSQIrICdNbYeibq
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Cost: Special</p><p>You use Sage Chakra and Fuinjutsu to create a powerful sealing tag. You place this sealing
      tag on any surface you can reach. This tag cannot be placed on a creature.</p><p>Once placed, the sealing tag
      erects a barrier that varies on its strength based on how much Sage Chakra was committed to this Arts casting.
      Spend Sage Chakra in multiples of 5 up to three times. For every 5 Sage Chakra spent this way, the Barrier grows
      in size, strength, and potency.</p><p>5 Sage Chakra: A barrier is erected from the sealing tag in a 10-foot radius
      sphere, centered on the sealing tag. This barrier lasts for 10 minutes, even if you exit Sage mode. If the walls
      of this barrier cuts through a hostile creatures space, it pushes them to the outside of the wall. If a creature
      attempt to move through the barrier without the casters permission, it must make a Charisma Saving throw. On a
      failed save, it cannot push through the barrier. Additionally, for the duration, any offensive attack, jutsu or
      Art cast, that would attempt to pass through your barriers walls, must deal at least 75 damage to penetrate the
      barrier, otherwise, it cannot extend into or through the barrier.</p><p>10 Sage Chakra: As above, but the barriers
      radius is a 15-foot radius sphere, it lasts for 1 hour even if you exit sage mode, and the barriers wall, as it
      expands from the sealing tags space, all creatures of your choice, are pushed to the barriers edge, creatures who
      make a Charisma Saving throw as a result of this art, makes it at disadvantage, and finally, any offensive attack,
      jutsu or Art cast must deal 150 damage to penetrate the barrier.</p><p>15 Sage Chakra: This barrier is erected
      from the sealing tag in a 20-foot radius sphere, centered on the sealing tag. This barrier lasts for 10 hours,
      even if you exit Sage mode. As the barriers walls expands from the sealing tags space, all creatures of your
      choice, are pushed to the barriers edge. Creatures cannot pass through the barriers space without the casters
      permission unless their level is higher than your Senjutsu Save DC. Finally, any offensive attack, jutsu or Art
      cast, that would attempt to pass through your barriers walls, must deal at least 200 damage to penetrate the
      barrier, otherwise, it cannot extend into or through the barrier</p>
