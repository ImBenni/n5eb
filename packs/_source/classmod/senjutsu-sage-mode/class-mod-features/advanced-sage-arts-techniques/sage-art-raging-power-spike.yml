system:
  description:
    value: >-
      <p>Reduced Cost: 7 Sage Chakra</p><p>You use Sage Chakra to instantly magnify the next Senjutsu you cast before
      the end of the turn you cast this Senjutsu.</p><p>Before the end of the current turn, the next Art you cast gains
      2 of the following benefits. All of these effects only trigger once per casting.</p><p>• Damage die is increased
      by +5.</p><p>• Adds twice your character level to damage rolled</p><p>• Reduces affected creatures saves by
      1d6.</p><p>• Gain a +3 Critical threat range.</p><p>• Ignores up to your character level in Damage
      Reduction.</p><p>• Ignores all Temporary hit Points.</p><p>• Affected creature immediately ends concentration on
      all jutsu or Arts.</p><p>• Doubles the ranks of all conditions a creature is affected with, if able.</p><p>• Deals
      double damage if affected creatures critically fail their saving throw (Save result is 10 or more under the Save
      DC.)</p><p>Sage Affinity Synergy: If you have the Insectoid Senjutsu class mod feature, when you cast this
      Senjutsu, you may utilize the techniques that your tribe has entrusted you with. If you do, you instead select 3
      benefits.</p>
