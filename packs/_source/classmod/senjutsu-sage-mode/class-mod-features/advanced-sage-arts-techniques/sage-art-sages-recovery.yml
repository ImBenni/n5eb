system:
  description:
    value: >-
      <p>Reduced Cost: 3 Sage Chakra</p><p> You use Sage Chakra to instantly heal most damage inflicted on yourself or
      your allies. Select up to three creatures in range to be affected by this Art. All affected creature regains 50
      Hit points and you immediately cleanse them of any 1 condition affecting them. A creature can only be healed by
      this Art no more than three times per long rest. If a creature would be healed an additional time beyond the
      third, they only regain 25 hit points and no further effects.</p><p>Additionally, until the end of each affected
      creatures next turns, if they would gain 1 rank of any condition, it immediately ends without taking hold, as your
      residual healing energies protect them.</p><p>Sage Affinity Synergy: If you have the Amphibian or Herbavorian
      Senjutsu class mod feature, when you cast this Senjutsu, you may utilize the techniques that your tribe has
      entrusted you with. If you do, you instead cleans up to 2 conditions.</p>
