folder: uuWsvr4SleZah3pq
name: 'Sage Art: Sage''s Saber'
type: spell
_id: iUpRMMc1yZmI1RT5
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Reduced Cost: 3 Sage Chakra</p><p> You use Sage Chakra to turn any weapon into a Sage weapon. For the duration,
      while a creature is using this Sage Weapon, its damage die becomes 2d10 and gains the Deadly 2 weapon property and
      they can take the following special actions while using this Sage Weapon based on if its melee or ranged. If a
      creature other than you is using your Sage Weapon and would use a special action that requires a Senjutsu attack,
      they use your Senjutsu attack bonus.</p><p>Sage Affinity Synergy: If you have the Primate Senjutsu class mod
      feature, when you cast this Senjutsu, you may utilize the techniques that your tribe has entrusted you with. If
      you do, All special actions granted by this art, that replaces an attack granted by the attack action, can instead
      replace all attacks granted by the Attack action. This benefit does not extend to Sage Release Burst or Sage
      Release Point.</p><p>MELEE SAGE WEAPON</p><p>Sage Release Strike: In place of one of your attacks granted by the
      Attack action while wielding a melee Sage Weapon, you can swing it with the force of your tribe. Make a melee
      Senjutsu attack, dealing twice your weapons damage on a hit and making the target make a Constitution saving
      throw, being Staggered until the end of their next turn on a failed save.</p><p>Sage Release Wave: In place of one
      of your attacks granted by the Attack action while wielding a melee Sage Weapon, you can swipe it horizontally or
      vertically in a swift motion releasing a compressed wave of force. Make a ranged Senjutsu attack with a range of
      30 feet, dealing your weapons damage on a hit.</p><p>Sage Release Burst: In place of one of your attacks granted
      by the Attack action while wielding a melee Sage Weapon, you swing it downward in the direction of your target,
      releasing a violent wave of force. All creatures in a 60-foot cone originating from you must make a Dexterity
      saving throw, taking four times your weapon damage, in force damage on a failed save or half as much on a success.
      Structures, constructs and terrain take triple damage. You can use this special action, once per casting of this
      art.</p><p>RANGED SAGE WEAPON</p><p>Sage Release Scatter: In place of one of your attacks granted by the Attack
      action while wielding a ranged Sage Weapon, you can strike with it creating multiple duplicates of your shot. Make
      a single ranged Senjutsu attack, comparing the result against up to 4 creatures of your choice AC, dealing damage
      on a success as normal.</p><p>Sage Release Pincer: In place of one of your attacks granted by the Attack action
      while wielding a ranged Sage Weapon, you can throw it skyward causing it to splinter and rain down. All creatures
      in a 15ft cube centering on a space within your weapons range must make a Dexterity saving throw taking three
      times your weapons damage on a failure, or half as much on a success.</p><p>Sage Release Point: In place of one of
      your attacks granted by the Attack action while wielding a ranged Sage Weapon, you target one creature within that
      weapons range and fire or throw your weapon turning it into what looks like a shooting star. The target creature,
      and all creatures in a 10-foot wide, 90-foot-long line in between you and the target must make a Dexterity saving
      throw. On a failed save, taking four times your weapon damage, in force damage or half as much on a success.
      Structures, constructs and terrain take triple damage. You can use this special action, once per casting of this
      art.</p>
    chat: ''
