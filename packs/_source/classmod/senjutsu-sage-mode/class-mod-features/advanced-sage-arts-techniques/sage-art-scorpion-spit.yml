name: 'Sage Art: Scorpion Spit'
type: spell
_id: 8dtGiY1OKG4ZJ3tM
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Reduced Cost: 3 Sage Chakra</p><p>You use Sage Chakra to manipulate your stomach acid manipulating it functions
      similar to that of a poison or venom and then expel it in a violent blast of deteriorating liquid.</p><p>Select
      the type of stomach acid manipulation you want to use when casting this Art, imposing its effect. Make a ranged
      Senjutsu attack dealing 18d6 of the chosen damage type and forcing the target make a Constitution saving throw vs
      the damage types secondary effects.</p><p>Sage Affinity Synergy: If you have the Insectoid Senjutsu class mod
      feature, when you cast this Senjutsu, you may utilize the techniques that your tribe has entrusted you with. If
      you do, increase the number of attacks you make by +1. Each attack can target a different creature if you so wish.
      If both attacks target the same creature, instead increase the first attacks damage by 9d6, instead of making an
      additional attack.</p><p>• Acid Damage: On a failed save, creatures lose all Damage reduction until the end of
      their next turn.</p><p>• Poison Damage: On a failed save, creatures lose proficiency in 2 random saving throws
      until the end of their next turn. Roll a d6 twice recording the result as those are the saving throws they lose
      all proficiency bonuses to. If you roll the same result twice, roll again until you no longer have the same
      result. (1 – Strength, 2-Dexterity, 3-Constitution, 4-Intelligence, 5-Wisdom, 6-Charisma)</p><p>• Necrotic Damage:
      On a failed save, creatures reduce their AC by their Constitution modifier until the beginning of their next
      turn.</p>
