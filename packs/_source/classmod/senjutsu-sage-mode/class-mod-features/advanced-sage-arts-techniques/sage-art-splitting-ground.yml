name: 'Sage Art: Splitting Ground'
type: spell
_id: HkxhnSBwbcwQrsTA
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Reduced Cost: 7 Sage Chakra</p><p>You use Sage Chakra to magnify your strength to engage in powerful downward
      kick with enough force to destroy most guards and protections. This Senjutsu can only be used as a Senjutsu
      Finisher and targets all creatures who can be targeted by a Finisher.</p><p>Make a melee Senjutsu attack against
      all valid creatures within range ignoring any bonus to AC, Damage Reduction or Temporary Hit points as a result of
      an Art or Jutsu. Compare your attack results against the AC of all Valid targets.</p><p>On a hit, you deal eight
      (8) times your unarmed damage dice. All temporary hit points, damage reduction or bonuses to AC as a result of an
      Art or Jutsu immediately ends and cannot be regained until the end of the targets next turn.</p><p>Additionally,
      all target(s) must make a Strength saving throw, being launched into the ground on a failed save. Creatures
      launched into the ground, that falls 10 or more feet, increase the falling damage die to a d8 and they take three
      times the falling damage.</p><p>Sage Affinity Synergy: If you have the Amphibian Senjutsu class mod feature, when
      you cast this Senjutsu, you may utilize the techniques that your tribe has entrusted you with. If you do, you
      instead deal twelve (12) times your unarmed damage die in damage.</p>
