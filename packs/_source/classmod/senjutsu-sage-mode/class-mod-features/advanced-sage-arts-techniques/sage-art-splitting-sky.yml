system:
  description:
    value: >-
      <p>Reduced Cost: 3 Sage Chakra</p><p>You use Sage Chakra to magnify your strength and kick so hard that you can
      use the air itself as a step to launch yourself into the air, but not before you attempt to uppercut and bring
      your enemy with you.</p><p>Make a melee Senjutsu attack, against a creature within range ignoring any bonus to AC
      as a result of an Art or Jutsu. On a hit, you deal five (5) times your unarmed damage die and you launch the
      target creature 100 feet into the air as you follow behind them.</p><p>A creature, other than you, takes falling
      damage if they are unable to prevent themselves from falling.</p><p>Until the end of your turn, the target can be
      targeted by Senjutsu with the Finisher keyword regardless of the range of the Senjutsu with the Finisher keyword
      has.</p>
