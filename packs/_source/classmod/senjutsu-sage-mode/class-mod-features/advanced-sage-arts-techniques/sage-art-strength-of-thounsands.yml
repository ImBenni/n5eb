system:
  description:
    value: >-
      <p>Reduced Cost: 7 Sage Chakra</p><p>You use Sage Chakra to enhance a creatures mind, body and spirit. When they
      breathe in they can feel the strength of all nature around them, granting them the strength of thousands. You
      cannot target yourself with this Art.</p><p>Select one allied creature you can reach. For the duration, their
      Strength, Dexterity, Intelligence, Wisdom or Charisma (their choice) set to 30 and they gain 10 damage reduction.
      The affected creature cannot gain bonuses to their chosen ability score from any other source for the same
      duration. If they would, at the end of the turn that they gain that bonus, this Art causes a violent feedback,
      causing that statistic to drop to 5, but it remains at this value, permanently.</p><p>Sage Affinity Synergy: If
      you have the Carnivoran Senjutsu class mod feature, when you cast this Senjutsu, you may utilize the techniques
      that your tribe has entrusted you with. If you do, you may select yourself for this Art.</p>
