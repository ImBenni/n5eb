system:
  description:
    value: >-
      <p>Reduced Cost: 4 Sage Chakra</p><p>You use Sage Chakra to place yourself under a powerful Illusory Senjutsu.
      While you are aware you are under this illusion you have no desire to break yourself free from it.</p><p>For the
      duration, if you would fall under the effects of a jutsu, Art, or Condition that would prevent you from taking an
      Action, Bonus Action, Reaction, or special action granted by a Jutsu or Art, you can spend 2 Hit Die to force your
      body to break those limitations allowing you to take those actions until the end of this turn.</p><p>Sage Affinity
      Synergy: If you have the Rodent Senjutsu class mod feature, when you cast this Senjutsu, you may utilize the
      techniques that your tribe has entrusted you with. This Art can also be cast as a Reaction, with the trigger being
      'When you would fall under the effects of a Jutsu, Art, or condition that would prevent you from taking an Action,
      Bonus Action, Reaction, or special Action granted by a Jutsu or Art. Regardless of the cast time chosen, you only
      spend 1 Hit Die to break those limitations and take the restricted action.</p>
