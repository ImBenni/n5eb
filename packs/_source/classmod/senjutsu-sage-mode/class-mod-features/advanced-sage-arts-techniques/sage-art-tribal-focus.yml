system:
  description:
    value: >-
      <p>Reduced Cost: 4 Sage Chakra</p><p> You use Sage Chakra to manifest an aura of focus enhancing both yourself and
      your allies. All creatures of your choice in range, when this Art is cast gains a +3 bonus to all D20 based rolls
      that they would make. A creature can gain the benefit of this bonus no more than five times per short rest, before
      the stress of this enhancement weighs on them. A creature under the effects of this Art who would attempt to gain
      this bonus an additional time beyond the fifth, prior to a short rest, gains 1 rank of Exhaustion.</p><p>Sage
      Affinity Synergy: If you have the Herbavorian Senjutsu class mod feature, when you cast this Senjutsu, you may
      utilize the techniques that your tribe has entrusted you with. If you do, the bonus instead becomes +5.</p>
