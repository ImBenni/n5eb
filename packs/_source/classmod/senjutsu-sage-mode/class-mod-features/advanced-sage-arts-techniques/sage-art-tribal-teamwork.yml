system:
  description:
    value: >-
      <p>Cost: Special</p><p> You can only cast this art while you are in contact with an A-Rank or higher Sage Beast
      that you have summoned and whose size is small or smaller. When you cast this jutsu they become attached to your
      body, becoming unable to move or take reactions. While attached to you, you can cast Ninjutsu or Genjutsu the Sage
      Beast knows with your Sage Chakra.</p><p>Additionally, you can command the Sage Beast, to spend its action and 1
      Jutsu slot to focus, gathering Sage Chakra for you. You regain 1d4 Sage Chakra. If you are at least 5th level in
      the Senjutsu (Sage Mode) class mod, you instead regain 1d6.</p><p>Regardless, a Sage Beast can only ever gather
      Sage Chakra for you in this way 5 times per Full-Rest.</p>
