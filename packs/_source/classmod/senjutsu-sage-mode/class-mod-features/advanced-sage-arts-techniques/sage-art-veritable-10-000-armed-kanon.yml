system:
  description:
    value: >-
      <p>Cost: Special</p><p>You use Sage Chakra and Fuinjutsu to Conjure ultimate construct. You manifest a giant
      statue in the form of a representation of your Sage Tribe. When you summon Kan'on if you have less than 50 Sage
      Chakra, you immediately exit Sage Mode and this Art fails to cast. If you have 50 or more Sage Chakra, you reduce
      it by 25, at the beginning of each of your turns.</p><p>The size of this construct is of titanic proportions,
      occupying a 30-foot cube as its single space. The description and design of it is of your choice. This Sage art
      can only be unsummoned by being destroyed, by you ending concentration, or by its own effects.</p><p>This
      construct has 10,000 hands originating from its back in countless concentric rows, while its two main hands, paws,
      or claws are clasped, as if in prayer.</p><p>When summoned, you are place on top of the constructs head, out of
      reach of most entities.</p><p>The construct has the following Statistics, and acts in your place on your turn. You
      cannot act while this construct is active. It acts on your turn, being able to use your Action, Bonus action,
      movement or reaction as you see fit. The turn this construct is summoned, it can act as if you had 1 Action
      remaining.</p>
