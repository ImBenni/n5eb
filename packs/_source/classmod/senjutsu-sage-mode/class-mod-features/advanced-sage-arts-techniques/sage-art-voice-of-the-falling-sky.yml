img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Reduced Cost: 7 Sage Chakra</p><p> You use Sage Chakra to manipulate the atmosphere in a violent show of force
      and power. All creatures of your choice in range, must make a Strength saving throw as a cyclone of Sage Chakra
      swallows everything within it. This Art can only be cast once per short rest as the strain of it makes it
      difficult to use in quick succession.</p><p>Sage Affinity Synergy: If you have the Avian Senjutsu class mod
      feature, when you cast this Senjutsu, you may utilize the techniques that your tribe has entrusted you with. If
      you do, you instead make a Critical success only possible if beating the DC by 10 or more, and a Critical failure
      possibly by failing the DC by 3 or more.</p><p>Critical Success (Beat the DC by 5 or more): Affected creature is
      able to resist this Art's effects.</p><p>Success: Affected creature is able to resist most of this Art's effects
      but cannot resist it entirely They gain 2 ranks of all listed Elemental conditions.</p><p>Failure: Affected
      creature is thrown 30 feet into the air and gaining 3 ranks of all listed Elemental conditions (Burned, Chilled,
      Corroded, Envenomed &amp; Shocked). Conditions gained in this way cannot be ended as a result of damage like in
      the case of Chilled.</p><p>Critical Failure (Fail the DC by 5 or more): Affected creature suffers the same effect
      as a failure but instead gain 5 ranks of all listed Elemental and Physical conditions. (Elemental: Burned,
      Chilled, Corroded, Envenomed &amp; Shocked) (Physical: Bruised, Bleeding, Lacerated, Weakened)</p>
