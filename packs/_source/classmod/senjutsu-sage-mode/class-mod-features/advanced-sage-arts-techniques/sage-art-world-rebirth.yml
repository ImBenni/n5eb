system:
  description:
    value: >-
      <p>Reduced Cost: 5 Sage Chakra</p><p>You use Sage Chakra to enhance your cellular recovery speed. This allows you
      to keep fighting long after you should have fallen. For the duration, at the beginning of each of your turns you
      regain 10d10+10 hit points. Reduce the amount of hit points regained at the end of each of your turns, by 1
      die.</p><p>Sage Affinity Synergy: If you have the Reptilian Senjutsu class mod feature, when you cast this
      Senjutsu, you may utilize the techniques that your tribe has entrusted you with. If you do, increase the healing
      die by 1 step, to a d12.</p>
