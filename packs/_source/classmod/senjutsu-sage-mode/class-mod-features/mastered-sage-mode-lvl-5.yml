name: Mastered Sage Mode [Lvl 5]
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Beginning at 5th level in this class mod, you have mastered Sage Mode and paved a way for yourself to complete
      knowledge and wisdom of the sage arts. Sage Chakra you gather remains in your body for 8 hours before it
      harmlessly disperses from your person. </p><p>Additionally, while in this state, you have an increased master with
      your Senjutsu. All listed costs and benefits found under the Sage Mode class feature are slightly adjusted as
      follows.</p><p>• Jutsu you cast while in Sage Mode now cost an amount equal to their Rank, regardless of
      circumstance.</p><p> o D-Rank: 2 Sage Chakra, C-Rank: 4 Sage Chakra, B-Rank: 6 Sage Chakra, A-Rank: 9 Sage Chakra,
      S-Rank: 12 Sage Chakra.</p><p> o Jutsu you cast in Sage Mode, that deals damage, heals, grants Damage reduction or
      temporary hit points, increases the number of dice rolled by +4, once per casting.</p><p>• Your Senjutsu Infusion
      benefits are also adjusted as follows</p><p> o Damage, Healing, Damage reduction or temporary hit point die,
      increased by +4, once per casting.</p><p> o Ranks of a condition applied, increased by +2.</p>
