name: Amphibian Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your iris change to match the shape of your tribes. Your eyes gain distinct coloring around them and even
      possibly, gills or webbed hands. You gain the following Abilities and Passives;</p><p>AMPHIBIAN ABILITIES </p><p>•
      Once per turn, when you would spend Sage Chakra to cast a Ninjutsu or Taijutsu that requires you to make an attack
      roll, you can make one additional attack as part of that jutsu's casting. </p><p>• Once per turn, when you would
      cast a Senjutsu you can spend an additional 3 Sage Chakra. When you do, creature(s) who would make a saving throw
      against it, makes their save with a 1d6 penalty.</p><p></p><p>AMPHIBIAN PASSIVES </p><p>• You can breathe
      underwater as you can air and gain a swimming speed equal to your movement speed. </p><p>• You can sense the
      intents of creatures up to 30 feet away from you such as Hostility, Cooperativeness, Indifference, Concern or
      Anger. This does not reveal a creatures location nor can you tell where the intent is coming from. </p><p>•
      Taijutsu and Unarmed attacks you make with a range of 5 feet (or Touch), have their range increased by 10
      feet.</p><p></p>
