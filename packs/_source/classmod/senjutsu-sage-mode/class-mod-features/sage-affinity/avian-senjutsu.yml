name: Avian Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your iris's change to match the shape of your tribes. Your nose becomes slightly slimmer and your physique
      becomes noticeably slimmer. You gain the following Abilities and Passives;</p><p></p><p>AVIAN ABILITIES </p><p>•
      Once per turn, when you would cast a Senjutsu you may half its cost. This can be done once per Sage Art, per Long
      Rest. </p><p>• Once per turn, when you would use an Advanced Sage Art Ability you may retain its benefits until
      the end of your next turn.</p><p></p><p>AVIAN PASSIVES </p><p>• You become immune to all Sensory conditions.
      </p><p>• You are always under the effects of Wind Release: Feather Fall. • Ninjutsu or Senjutsu you cast, with an
      area of effect, increases its size by 5 feet.</p>
