name: Carnivoran Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your skin becomes slightly darker in tone. Your cheeks and arms gain distinct chakra-based markings on them as
      your muscles become distinctly bulkier. Your canine teeth become noticeably sharper and more profound. You gain
      the following Abilities and Passives;</p><p></p><p>CARNIVORAN ABILITIES </p><p>• Once per turn, on your turn, you
      may spend 3 Sage Chakra to mark one hostile creature you can see within 60 feet of you for the next hour. This
      marked creature is considered Predator Marked and treated as marked for any one Clan or Class feature you have
      that would mark a creature in a similar way (Pick one. Ex. Hunter- Nin's Primary Target or Intelligence
      Operative's Exploit Weakness).</p><p> o A Predator Marked creature always leaves tracks that only you can see.
      Even if they are flying you can see a trail of Sage Chakra that trails behind them for the duration. This does
      leave behind a trail for a creature that has teleported. </p><p>• Once per turn, when you would cast a Ninjutsu or
      Taijutsu that requires you to make an attack roll, you can make one additional attack as part of that jutsu's
      casting.</p><p></p><p>CARNIVORAN PASSIVES </p><p>• Select 2 damage types from the following. You gain Resistance
      to the chosen damage type. Once chosen, this cannot be changed later. (Bludgeoning, Piercing, Slashing, Earth,
      Wind, Fire, Cold, Lightning, Acid, Poison, Necrotic, Force, Psychic) </p><p>• Select 1 special sense. You gain the
      selected sense. (Darkvision 30ft, Keen Smell, Keen Sight, Keen Hearing) </p><p>• You become immune to the Deafened
      &amp; Blind conditions.</p>
    chat: ''
