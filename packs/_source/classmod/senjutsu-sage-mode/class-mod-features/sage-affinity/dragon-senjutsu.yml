name: Dragon Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>The whites of your eyes darken and become black. You grow horns on the crown of your head and your skin becomes
      scaly like that of a reptile. You gain the following Abilities and Passives;</p><p></p><p>DRAGON ABILITIES
      </p><p>• Once per turn, when you would cast a Jutsu or Senjutsu with the Fuinjutsu keyword, you can spend an
      additional 3 Sage Chakra. If you do, the jutsu or Sage Art cast cannot trigger reactions or be interrupted by
      hostile effects. </p><p>• Once per turn, when you would make a Saving throw against a Genjutsu or Art with the
      Genjutsu keyword, you can spend 3 Sage Chakra to gain a 1d8 bonus to the saving throw.</p><p></p><p>DRAGON
      PASSIVES </p><p>• At the end of each of your turns, you reduce the rank of all Physical conditions you have by 1.
      </p><p>• Jutsu with the Fuinjutsu keyword can be cast without Hand Signs (HS) or Chakra Seals (CS). Pick one when
      casting. </p><p>• You cannot be seen by creatures currently gaining the benefits of Chakra Sight or True Sight.
      You are treated as invisible against them.</p>
