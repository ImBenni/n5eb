name: Earth Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>You gain colored tattoo's on your skin of your description. Your body becomes heavier and you begin to sense
      all stone, earth, and naturally occurring metallic substances around you. Your iris's take on a geometric shape
      and small earthen substances react to your presence by moving or floating around you. You gain the following
      Abilities and Passives;</p><p></p><p>EARTH ABILITIES </p><p>• Once per turn, you can spend 3 Sage Chakra to cast
      Earth Release: Bedrock Skin. Casting in this way treats the jutsu as an A-Rank and only lasts until the end of the
      current turn. This does not spend your reaction. </p><p>• Once per turn, when a construct or structure you
      summoned with a Ninjutsu with the Earth Release keyword or Senjutsu that summons a construct or structure would
      take damage, you can spend 3 Sage Chakra. When you do the construct or structure gains bonus damage reduction (DR)
      equal to twice your proficiency bonus for that damage calculation.</p><p></p><p>EARTH PASSIVES </p><p>• You cannot
      be moved or teleported against your will. Effects that would attempt to do so automatically fail. • You have
      Immunity to the Bruised and Weakened Conditions. </p><p>• Your unarmed and weapon damage types can be changed to
      Earth. </p><p>• Constructs and Structures you create as a result of Jutsu or Arts you cast lose all
      vulnerabilities it may have and gains immunity to cold damage, and resistance to Bludgeoning, piercing and
      Slashing damage.</p>
