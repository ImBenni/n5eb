name: Fire Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your hair begins to glow hot orange and the tips begin to move like embers. You become warm or hot to the
      touch. Your Iris's begin to flicker like flames and you produce an aura of harmless flames and heat around you.
      You gain the following Abilities and Passives;</p><p></p><p>FIRE ABILITIES </p><p>• Once per turn, you can spend 3
      Sage Chakra to cast Fire Release: Hellfire Rejection. Casting it in this way treats the jutsu as an A-Rank and the
      size of the sphere by 10 feet. This does not spend your reaction, but you must still satisfy its casting time
      trigger. </p><p>• Once per turn, when you would cast a Jutsu or Senjutsu that deals Fire damage, you can spend 3
      Sage Chakra. When you do, the fire is transformed into Sage Fire, a fire whose heat and power is only surpassed by
      the flames of Amaterasu. The Jutsu or Sage Art has the following effect added. If the Jutsu would inflict the
      Burned condition, it is replaced with this instead.</p><p> o Affected creatures must make a constitution saving
      throw. On a failed save they gain 1 rank of Smoldering.</p><p> ▪ A smoldering creature or object takes 12 fire
      damage at the beginning of each of their turns that ignores Fire resistance for the next minute.</p><p> ▪
      Smoldering can be applied to a creature up to 5 times total. Each application increases the fire damage by 12, up
      to a maximum of 60 fire damage at max ranks.</p><p> ▪ A creature cannot maintain concentration or cast jutsu that
      requires concentration for the duration of this condition.</p><p> ▪ A creature can spend a Full-Turn-Action to
      make a DC 25 Dexterity (Survival) check to put out the flames. These flames cannot be extinguished by submerging
      themselves in water.</p><p></p><p>FIRE PASSIVES </p><p>• You have immunity to the Burned and Chilled Conditions.
      </p><p>• Fire damage you deal ignores non- Art based Damage reduction (DR).</p><p>• Your unarmed and weapon damage
      types can be changed to Fire. </p><p>• You cannot lose concentration on Jutsu or Senjutsu with the Fire Release
      keyword that deals damage.</p>
