name: Herbavorian Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your skin becomes slightly lighter in tone. Your cheeks puff slightly and body gain distinct chakra-based
      markings on them as your muscles become distinctly leaner. Your eyes take on the shape of your tribes. You gain
      the following Abilities and Passives;</p><p></p><p>HERBAVORIAN ABILITIES </p><p>• Once per turn, on your turn, you
      may spend 5 Sage Chakra to mark up to two allied creatures of your choice. These creatures becomes apart of your
      Herd. Creatures who are part of your Herd gain the following benefits;</p><p> o Attacks against them cannot gain
      advantage from traits, features or conditions.</p><p> o While within 10 feet of you, they gain advantage on one
      saving throw of your choice, which you choose when you activate this feature, which cannot be changed unless you
      activate this feature again.</p><p> o Creatures cannot gain a boost to their critical threat range against them.
      </p><p>• Once per turn, when you would cast a Jutsu or Senjutsu that would provide a boost to an allied creatures
      (excluding yourself) Attack rolls, damage rolls, AC, damage reduction or temporary hit points, you can spend 2
      Sage Chakra. When you do, you can select one addition willing creature (excluding yourself) to gain the benefit as
      well for the same duration.</p><p></p><p>HERBAVORIAN PASSIVES </p><p>• Select 1 damage type and 1 Sensory or
      Mental condition from the following lists. You and all allied creatures beginning their turns within 10 feet of
      you, gain immunity to the chosen damage type and Condition until the beginning of their next turns. Once chosen,
      this cannot be changed later.</p><p> o Damage: Earth, Wind, Fire, Cold, Lightning, Acid, Poison, Necrotic, Force,
      Psychic</p><p> o Mental/Sensory: Berserk, Charmed, Concussed, Confused, Fear, Slowed, Blinded, Deafened. </p><p>•
      Select 1 special sense. You gain and allied creatures who begin their turns within 10 feet of you gain the
      selected sense until the beginning of their turns. (Darkvision 30ft, Keen Smell, Keen Sight, Keen Hearing)
      </p><p>• You become immune to the Stunned &amp; Paralyzed conditions.</p>
