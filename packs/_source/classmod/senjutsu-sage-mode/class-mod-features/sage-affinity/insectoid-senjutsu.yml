name: Insectoid Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your eyes become honeycombed like that of an insect. Your skin darkens and hardens similar to that of an
      exoskeleton. You gain the following Abilities and Passives;</p><p>INSECTOID ABILITIES </p><p>• Once per turn, you
      can spend 3 Sage Chakra to coat one weapon or striking instrument (Ex. Hands, Legs, Claws or Teeth) within 5 feet
      of you, in a potent sage poison, granting it the effects of Medical Release: Poison Weapon at A-Rank, for the next
      minute. This does not cost an Action. </p><p>• Once per turn, when you would cast a Jutsu or Senjutsu that would
      deal Acid, Poison or Necrotic damage, you can spend up to 5 Sage Chakra. When you do the Jutsu or Art cast
      inflicts all affected creatures with 1 rank of Envenomed and Corroded for each Sage Chakra spent on this
      ability.</p><p></p><p>INSECTOID PASSIVES </p><p>• You are Resistant to Acid and Poison damage and Immune to the
      Poisoned, Envenomed, and Corroded Conditions.</p><p>• When you would take acid or poison damage, you are instead
      healed an amount of Hit points equal to the damage you would take, once per turn. </p><p>• You are immune to the
      surprised condition and creatures cannot gain advantage on attacks against you as a result of being hidden from
      you.</p>
