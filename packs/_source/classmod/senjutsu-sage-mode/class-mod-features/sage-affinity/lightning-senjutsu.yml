name: Lightning Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your hair stands up as the tips glow yellow like lightning bolts. Your iris's begin to exhibit electric like
      movement and designs as your eyes become yellow. You naturally generate an aura of harmless sparking electricity
      around you. You gain the following Abilities and Passives;</p><p></p><p>LIGHTNING ABILITIES </p><p>• Once per
      turn, you can spend 3 Sage Chakra to cast Lightning Release: Enhanced Ability, with its Overcharge effect. When
      you do, it is treated as being cast at A-Rank, can affect allies creatures up to 15 feet away from you and you can
      select which benefit each allied creature gains. When cast this way, its effects last until the beginning of your
      next turn. </p><p>• Once per turn, when you cast a jutsu or Senjutsu with the Lightning release keyword you can
      spend 3 Sage Chakra. When you do the jutsu or Art cast gains the Onerem effect.</p><p> o Onerem. When this jutsu
      or Art is cast, as a bonus action or reaction, you can cause it to become Onerem. When you do the jutsu or Art
      turns your enemies strengths into a weakness. If this jutsu or Art would deal damage to a creature with temporary
      hit points or Damage reduction, increase the damage dealt by +1 damage die, for every multiple of 10 they have in
      either value, up to a maximum of +10 damage die.</p><p></p><p>LIGHTNING PASSIVES </p><p>• You have immunity to the
      Shocked and Slowed conditions. </p><p>• You cannot lose concentration on Jutsu or Senjutsu that provides boosts,
      buffs or bonuses to yourself. </p><p>• Your unarmed and weapon damage types can be changed to Lightning. • Allied
      creatures who begin their turn within 10 feet of you reduce their ranks of shock by 1. For each rank of shock that
      you reduce in this way, you regain 2 Sage Chakra. You can regain Sage Chakra in this way, no more than 5 times per
      long rest.</p>
