name: Rodent Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your nose becomes pointed as your iris's shrink to small beads. You grow a flesh like tail made of chakra. You
      gain markings under your eyes emblematic of your tribe as whiskers grow near the center of your face. You gain the
      following Abilities and Passives;</p><p></p><p>RODENT ABILITIES </p><p>• Once per turn, you can spend 2 Sage
      Chakra to cast either Sensing Technique, Thunderous Screech, Wind Release: Blurring Wind, Earth Release: Mole
      Movement or Water Release: Water Blending as if cast at A-Rank. Being cast in this way does not cost an action of
      any type but their effects last until the end of the turn cast </p><p>• One per turn, when you would be targeted
      by a hostile effect you can spend up to 5 Sage Chakra. When you do, If you would make a saving throw, you instead
      gain a bonus to your saving throws equal to the number of Sage Chakra spent. If you would pass a save in this way
      you become unaffected by the jutsu, art or effect targeting you. These bonuses last until the end of the current
      turn.</p><p></p><p>RODENT PASSIVES </p><p>• When you succeed on any Dexterity or Intelligence saving throw, you
      ignore its effects for the remainder of that turn. If you fail a saving throw you only take half damage. If you
      would critically fail a saving throw you treat it as a normal failure. </p><p>• You are immune to the Grappled and
      Restrained conditions. </p><p>• You ignore difficult terrain and cannot have your movement speed reduced by
      hostile effects.</p>
