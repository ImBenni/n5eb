name: Wind Senjutsu
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Your hair begins to flow on its own as if there is a strong breeze always near you. Your iris's take the shape
      of a spiraling tornado as you gain tattoo's on your arms and hands symbolic of the wind itself. The more chakra
      you have the more harmless wind you can generate. You gain the following Abilities and Passives.</p><p></p><p>WIND
      ABILITIES </p><p>• Once per turn, on your turn, you can spend 2 Sage Chakra to cast Wind Release: Blurring Wind at
      no action cost. If cast in this way, its duration becomes 'Concentration, until dispelled or Sage Mode ends.' Its
      effects can trigger twice per turn and works even if the target does not rely on sight or has Truesight. While
      maintaining concentration in this way, you do not spend Sage Chakra to maintain concentration on it. </p><p>• Once
      per turn, when you would cast a Jutsu or Senjutsu that deals wind damage or has the wind release keyword you can
      spend 3 Sage Chakra to sharpen or strengthen the wind to the point of manifesting Sage Breezes. A jutsu or Sage
      Art enhanced in this way doubles all ranks of Bleed it inflicts and then instead inflicts the target with
      Lacerated, the range of Swirl increases to 15 feet and spreads Mental conditions, and doubles the distance of
      knock back, if any.</p><p></p><p>WIND PASSIVE </p><p>• You have immunity to the Bleeding, Exhausted and Dazed
      Conditions. (Effects that inflict ranks of exhaustion that you use or activate still inflicts their ranks and
      imposes those effects as normal.) </p><p>• You can never suffer fall damage or effects that would cause fall
      damage like effects. </p><p>• Your unarmed and weapon damage types can be changed to Wind. </p><p>• Allied
      creatures who begin their turn within 5 feet of you that have ranks of an Elemental condition, reduce those ranks
      by an amount equal to your levels in this class mod, once per long rest.</p>
