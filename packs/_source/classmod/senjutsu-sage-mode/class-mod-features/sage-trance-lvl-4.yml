name: Sage Trance [Lvl 4]
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Beginning at 4th level of this Class Mod you have learned the Secret art of Sage Trance. You can take the
      Gather Nature Energy action without reducing your movement to 0. If you do choose to still reduce your movement to
      0, you instead roll at advantage. </p><p>Sage Chakra you gather remains in your body for 1 hour before it
      harmlessly disperses from your person. While Sage chakra remains in your body, you can actively enter and exit the
      form while you have Sage Chakra within you. When you do, you retain the value of Sage Chakra you had when you
      exited the form.</p>
