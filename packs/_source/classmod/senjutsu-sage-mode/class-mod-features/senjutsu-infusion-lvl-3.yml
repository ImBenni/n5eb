name: Senjutsu Infusion [Lvl 3]
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level of this Class Mod select one Ninjutsu, Genjutsu, Taijutsu or Bukijutsu that you know of
      B-Rank or lower. That jutsu gains the Senjutsu keyword and becomes a Senjutsu. When cast in Sage Mode the cost of
      this Senjutsu becomes 5 Sage Chakra. This Senjutsu can be cast while not in Sage Mode, using its normal cost. If
      cast while not in Sage Mode, it gains the following benefits.</p><p>• Can use your Senjutsu Attack Bonus.</p><p>•
      Can use your Senjutsu Save DC.</p><p>• Damage, Healing, Damage reduction or temporary hit</p><p>point die,
      increased by +2, once per casting.</p><p>• Ranks of a condition applied, increased by +1.</p>
