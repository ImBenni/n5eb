name: Adept Sage
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Category: Class Mod </p><p>Prerequisite: Level 13+, Expertise in Nature </p><p>You have completed the training
      needed to access the next level of your sage training, Adept Sage Mode. You gain the following benefits: </p><p>•
      Once per Full-Rest, you can spend a Full-Turn Action to enter Adept Sage Mode. When you do, you take on some
      physical aspects reminiscent of your Sage tribe, but less severe and body defining. You can remain in this state
      for no more than 10 minutes. </p><p>• While in Adept Sage Mode you gain 7 Sage Art Charges. You can spend these
      charges to enhance your jutsu, cast a Senjutsu, or activate an Advanced Sage Art: Ability. </p><p>• You gain 1
      Advanced Sage art: Ability.</p>
