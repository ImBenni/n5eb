system:
  description:
    value: >-
      <p>Category: Class Mod </p><p>Prerequisite: Level 10+, Expertise in Chakra Control </p><p>You have completed the
      training needed to access the elite and powerful Sage Mode, but due to your inexperience this Sage mode is often
      called Imperfect. You gain the following benefits: </p><p>• Once per Full-Rest, you can spend a Full-Turn Action
      to enter Imperfect Sage Mode. When you do, you take on some physical aspects reminiscent of your Sage tribe, such
      as webbed hands, gills, furry body or even an elongated face. You can remain in this state for no more than 10
      minutes. </p><p>• While in Imperfect Sage Mode you gain 5 Sage Art Charges. You can spend these charges to enhance
      your jutsu or cast a Senjutsu. </p><p>• You gain 2 Advanced Sage Art: Techniques that cost no more than 6 Sage
      Chakra.</p>
