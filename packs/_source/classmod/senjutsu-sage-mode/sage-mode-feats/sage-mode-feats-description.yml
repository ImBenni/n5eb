name: Sage Mode Feats [Description]
type: feat
_id: DklDVYDfGxOFyl0d
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>The following are a list of Feats designed with a lower power-level in mind. These feats are a part of the
      overall Class Mod category of feats. These feats are intended to give the user the feel of Sage Mode without
      oppressively shifting the balance of a normal level 1-20 play through.</p><p>Here are the following rules and
      requirements in regards to even gaining these Class Mod feats.</p><p>• Each Class Mod feat costs 25
      downtime.</p><p>• A character must have at least a 20 or higher in one or more Ability Scores.</p><p>• A character
      can only access these feats if offered training by a Sage tribe or another Sage mode user.</p><p>• All techniques,
      abilities and passives you gain from a Class Mod feat can be used in any Sage Mode variant you have access to.
      (Imperfect, Adept, etc.)</p><p>• All Sage Mode variants have a unique set of bonuses and effects, which can be
      found on the Sage Mode Variants table at the end of these feats.</p><p>• You can exit any Sage Mode variant as a
      Bonus action.</p><p>• Regardless of the Sage Mode variant you access, they all share the same Full-Rest recharge
      limitation.</p><p>• You gain one Sage Affinity to embody. If you have a summoning contract with a tribe of sage
      beast you gain the Summon Type of that tribe as your Sage Affinity. Alternatively, if you have a Nature release,
      you can select an Elemental Affinity as your Sage affinity. This option is permanent and cannot be changed
      later.</p><p>o You can activate their Abilities by spending your normal chakra or Sage Art Charges.</p><p>• Sage
      Art Charges are a special resource intended to allow you to cast Senjutsu or activate Abilities or
      Passives.</p><p>o Each Sage Mode variant has its own Sage Art Charge pool and limitations on what you can spend
      your charges on.</p><p>o You can cast normal Ninjutsu, Genjutsu, Taijutsu and Bukijutsu by spending these charges.
      When you do they becomes enhanced. Enhanced jutsu gain some benefits which can be found in the Sage Mode Variants
      table.</p><p>• Senjutsu charges cannot be used to enhanced jutsu with the Combination keyword.</p><p>• Senjutsu
      cast with Sage Art Charges rolls half their dice values for damage, healing and damage reduction.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/sage-mode-variants.webp" />
