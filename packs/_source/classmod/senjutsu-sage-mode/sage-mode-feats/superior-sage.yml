name: Superior Sage
type: feat
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Category: Class Mod </p><p>Prerequisite: Level 17+, Expertise in Illusions </p><p>You have completed the
      training needed to access the next level of your sage training, Superior Sage Mode. You gain the following
      benefits: </p><p>• Once per Full-Rest, you can spend a Full-Turn Action to enter Superior Sage Mode. When you do,
      you take on eyes similar to your Sage tribes. You can remain in this state for no more than 10 minutes. </p><p>•
      While in Superior Sage Mode you gain 9 Sage Art Charges. You can spend these charges to enhance your jutsu, cast a
      Senjutsu, activate an Advanced Sage Art: Ability or Passive. </p><p>• You gain 1 Advanced Sage art: Ability,
      Technique or Passive, your choice. If a Technique, the cost of it can be no more than 7 Sage Chakra.</p>
