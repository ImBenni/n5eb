name: Sage of Six Paths Mode
type: feat
_id: ltkSQ3aOaw57wgXe
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>Beginning at 6th level in this class mod, you have tapped into the Sage of Six Paths power. His chakra courses
      through you, and all Sage Chakra in your body becomes Six Paths Chakra. This Chakra acts exactly like Sage chakra,
      except you gain a few additional benefits while you have it. </p><p>When you enter Sage Mode, you instead enter
      Sage of Six Paths Mode. You gain all the benefits of all features prior, but also the following; </p><p>• For
      every 1 Sage of Six paths Chakra, you spend casting any jutsu, or paying the cost of any feature or feat, you
      treat the chakra spent as 5. </p><p>• For every 1 Sage of Six paths Chakra, you spend casting any Sage Art:
      Technique, you treat the Sage Chakra spend as 3. </p><p>• Sage Arts: Abilities have their cost reduced to 1.
      </p><p>• Sage Arts: Passives no longer cost chakra to maintain.</p>
