system:
  description:
    value: >-
      <p>You gain access to a very small list of extremely powerful, but limited use Arts, known as Six Path Arts.
      </p><p>These arts fall into one of 3 categories; Abilities, Passives and Techniques. </p><p>The Six Path Arts you
      learn define what it means to be a Sage. These Arts can all, only ever be used once. </p><p>Six Path Arts may
      require an Attack Roll or Saving throw. Also, while gaining the benefits of Sage of Six Paths Mode, Jutsu and Sage
      Arts you cast with Sage of Six Paths Chakra are treated as Six Path Arts. If casted this way, using your Six Path
      attack Bonus and Save DC, they gain any bonuses that trigger as a result of using Six Path Arts. </p><p>To
      calculate your Six Path Arts, Save DC and Attack bonus, do the following; </p><p>Six Path Art Save DC = 15 + Half
      your character level + Proficiency bonus; </p><p>Six Path Art Attack Bonus =Half Your character Level + your
      Senjutsu (Sage Mode) class mod level + Your Proficiency bonus;</p>
