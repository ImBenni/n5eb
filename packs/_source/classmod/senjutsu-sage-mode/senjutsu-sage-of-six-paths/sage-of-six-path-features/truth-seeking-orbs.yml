folder: Gxl4LOOA8LKKw0LS
name: Truth Seeking Orbs
type: feat
_id: 77O82JE1wdFzau2C
img: systems/n5eb/assets/content/jutsu-icons/sage-mode.webp
system:
  description:
    value: >-
      <p>You gain access to powerful, orbs of malleable black chakra, which can alter their form and characteristics in
      various ways. Though only the size of a fist, each hides within it, the power to destroy ones very soul.
      </p><p>You gain nine (9) such orbs of power. </p><p>While not in use, these orbs float behind you in a circular
      formation. You cannot create new orbs once any of them are used, spent, or destroyed. </p><p>While you have at
      least one orb, you have access to all Nature Releases. Select 1 Jutsu of each Nature Release you currently do not
      have, even ignoring Hijutsu limitations, temporarily adding them to your known jutsu list for the duration of your
      Sage of Six Paths Mode. </p><p>While you have at least one Truth Seeking Orb, you can spend them to complete the
      following task(s);</p><p>• As an Action, you may;</p><p> o Spend 1 Orb: Cast any one Jutsu of your choice,
      automatically upcasted to S-Rank, at no additional chakra cost. They always deal the maximum possible
      damage.</p><p> o Spend 1 Orb: You manifest the Sword of Nunoboko. This sword is a large, double-helix shaped sword
      for the next hour. Only you have proficiency in this weapon. It uses your Six Path Art attack bonus when making
      attacks with it. You can make 3 attacks with this weapon when you take the Attack action with it. On a hit, you
      reduce the targets maximum hit point and chakra points by 10d8 + your character level.</p><p> o Spend 2 Orbs: Cast
      any one Sage Art of your choice, at no additional cost. They always deal the maximum possible damage.</p><p> o
      Spend 2 Orbs: Create two large arms of condensed black Chakra. These arms are of your design and shape. They last
      for the duration of your Sage of Six Paths Mode. Your unarmed attacks have a reach of 60 feet, your unarmed damage
      becomes 12d8. You can make 4 unarmed attacks when you take the attack action.</p><p> o Spend 3 Orbs: Create a
      large bubble surrounding yourself or a creature you can see within 120 feet of you. They become immune to all
      damage and effects, allied or hostile, until the end of your next turn. </p><p>• As a Reaction, you may;</p><p> o
      Spend 1 Orb: Select one creature you can see casting a Jutsu or an Art, that does not use Sage Chakra. It fails to
      cast.</p><p> o Spend 2 Orbs: Create a barrier around yourself, becoming immune to Jutsu, features and Arts, that
      don't use Sage Chakra, until the beginning of your next turn.</p>
