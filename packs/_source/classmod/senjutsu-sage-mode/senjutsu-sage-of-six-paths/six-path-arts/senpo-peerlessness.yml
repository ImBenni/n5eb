system:
  description:
    value: >-
      <p>Sage Art Type: Ability </p><p>You use your Six Path chakra to ensure victory. </p><p>Once per turn, when you
      would cast a Six path Art, you may select one creature. They become Vulnerable to your Damage and when they make
      any saving throws or ability checks against you, they roll 4d20, taking worst result. They cannot gain advantage
      or disadvantage on the roll. Also, they lose all Immunities and Resistances. </p><p>This lasts until the end of
      your turn and can only be used once.</p>
