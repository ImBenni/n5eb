system:
  description:
    value: >-
      <p>Cost: 1 Six Path Chakra</p><p>You use Six Paths Chakra to generate a single black rod, in an attempt to stab a
      creature, you can see within range. This rod, extends from your palm.</p><p>Make a melee Six Path Art Attack. On a
      hit the target must succeed a constitution saving throw. On a failed save, they turn to dust.</p><p>After this
      arts casting, for the next 7 Days, after this Arts casting, you progressively grow in age becoming more fragile.
      On the Seventh Day, you turn to dust. Your spirit remains, watching over the world, as the new Sage of Six paths,
      watching and waiting to grant the next savior to grant your powers to.</p>
