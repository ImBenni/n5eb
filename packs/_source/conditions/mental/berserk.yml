system:
  description:
    value: >-
      <p><strong>Max Ranks</strong>: 5</p><hr /><p>A Berserk creature has experienced a temporary loss in sanity,
      causing them to act rabid to a varying degree. This condition is typically the result of a Genjutsu or
      mind-altering poison.</p><ul><li><p>A Berserk creature must use all action(s) and movement to attack/harm the
      creature nearest to it that it can perceive as if that creature was a mortal enemy. If multiple creatures are
      potential targets, it picks one at random.</p></li><li><p>When a creature moves out of a berserk creature's reach,
      it provokes an opportunity attack.</p></li><li><p>A Berserk creature has a -1 penalty to all Charisma based
      attacks, checks and saving throws for each rank it has.</p></li><li><p>Creatures that are immune to the charmed
      condition are also immune to the berserk condition. A Jutsu which cures the charmed condition also cures this
      Condition.</p></li><li><p>A Berserk creature loses 1 rank of Berserk at the end of each of its turns as its mind
      slowly clears.</p></li></ul>
