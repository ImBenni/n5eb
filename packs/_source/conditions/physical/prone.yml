img: systems/n5eb/icons/svg/statuses/prone.svg
system:
  description:
    value: >-
      <p>A Prone creature is face down on the ground, offering greater protection against ranged attacks but an immense
      vulnerability to melee attacks.</p><ul><li><p>A prone creature's only movement option is to crawl which they can
      do, up to half their movement speed unable to gain any bonuses to their speed, unless it stands up and thereby
      ends the condition.</p></li><li><p>The creature has disadvantage on melee attack rolls.</p></li><li><p>The
      creature has disadvantage on ranged attack rolls against targets within 30 feet.</p></li><li><p>An attack roll
      against the creature has advantage if the attacker is within 5 feet of the creature or the weapon used has the
      reach property. Otherwise, the attack roll has disadvantage.</p></li></ul>
