    value: >-
      <p><strong>Max Ranks</strong>: 5</p><hr /><p>A Weakened creature is unable to exert their maximum physicality and
      effort as they have had the wind blown out of them.</p><ul><li><p>A <strong>Weakened</strong> creature reduces
      damage it deals with attacks and Jutsu by -4 for each rank it has.</p></li><li><p>A <strong>Weakened</strong>
      creature has a -1 penalty to Strength saving throws.</p></li><li><p>The <strong>Weakened</strong> condition last
      for the duration of its duration or 1 minute has passed, whichever comes first.</p></li></ul>
