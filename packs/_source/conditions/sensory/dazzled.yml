  description:
    value: >-
      <p><strong>Max Ranks:</strong> 5</p><ul><li>A <strong>Dazzled</strong> creature's eyes become overloaded with
      flashes of color, causing a -2 penalty to checks that rely on sight for each rank it has.</li><li>A Dazzled
      creature suffers a -2 penalty to attack rolls for each rank it has and cannot gain advantage on ranged attack
      rolls.</li><li>A Dazzled creature reduces the range of jutsu it casts and ranged attacks it makes by 15 feet for
      each rank it has, to a minimum of 5 feet.</li><li>A Dazzled creature can make a DC 15 Constitution ability check
      as an action to remove all ranks of this condition.</li></ul>
