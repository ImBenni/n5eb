name: Chakra Guidance
type: feat
img: icons/magic/symbols/ring-circle-smoke-blue.webp
system:
  description:
    value: >-
      <p>Category: Chakra </p><p>You've learned to utilize your gift with Chakra in a specific unique way.</p><p> You
      gain the following benefits.</p><p>• Increase your Wisdom or Charisma score by 1, to a maximum of 20.</p><p>•
      Choose a skill in which you are proficient.</p><p> When you make a skill check with the chosen skill, you can use
      your Wisdom or Charisma modifier in place of its original ability score.</p><p>• Jutsu, you encounter are far
      easier to deal with due to your unique quirks with Chakra.</p><p> When you would attempt to interrupt or dispel a
      jutsu another creature cast or are currently concentrating on, you gain a 1d4 bonus towards any checks you make
      towards interrupting or dispelling their jutsu.</p><p>• Jutsu, you cast are far more difficult to recognize, and
      therefore more difficult to plan against.</p><p> When a creature would attempt to interrupt or dispel a jutsu you
      cast or are concentrating on, they take a 1d4 penalty to any checks made to do either of those.</p><p></p>
