name: Chakra Pressure
type: feat
img: icons/magic/symbols/ring-circle-smoke-blue.webp
system:
  description:
    value: >-
      <p>Category: Chakra </p><p>You have a very powerful Chakra aura.</p><p> You gain the following benefits: </p><p>•
      Increase your constitution score by 1, to a maximum of 20.</p><p>• Select between; Ninjutsu, Genjutsu, Taijutsu or
      Bukijutsu.</p><p> Jutsu you use that have one of the aforementioned keywords, that require a creature make a
      Saving throw, cannot add Jutsu based bonuses to their save unless the jutsu granting the bonus is of a rank higher
      than the jutsu you originally cast.</p><p>• Your chakra is heavy and carries a weight unlike any other.</p><p>
      Jutsu you cast with the chakra molding (CM) component, that summons a creature, construct or object with hit
      points or temporary hit points.</p><p> That creature, construct or object gains a number of additional hit points
      equal to twice your constitution modifier (min 2.) </p><p>• Your chakra-based constructs are more difficult for
      enemies to disrupt or dispel.</p><p> When a creature would attempt to interrupt or dispel a jutsu or feature you
      cast that would summon a creature, construct or object with hit points or temporary hit points, increase their DC
      to do so by +2.</p><p></p>
