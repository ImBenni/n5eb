name: Endurance, Latent
type: feat
img: icons/magic/symbols/ring-circle-smoke-blue.webp
system:
  description:
    value: >-
      <p>Category: Chakra </p><p>You have a great deal of chakra within you ready to come out.</p><p> You gain the
      following benefits; </p><p>• Increase your Constitution score by 1, to a maximum of 20 • When you roll a Chakra
      Die to regain chakra points, you treat all 1's as 2's.</p><p>• Your chakra point maximum increases by an amount
      equal to your level when you gain this feat.</p><p> Whenever you gain a level thereafter, your chakra points
      maximum increases by an additional 1 chakra point.</p><p>• As a full turn action, you can draw on the well of
      chakra within yourself.</p><p> You can spend a number of chakra die up to your level.</p><p> When you do, roll all
      chakra die spent, gaining chakra points equal to the result.</p><p> You then gain 1 rank of exhaustion for the
      next hour.</p><p></p>
