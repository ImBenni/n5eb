name: Endurance, Realized
type: feat
img: icons/magic/symbols/ring-circle-smoke-blue.webp
system:
  description:
    value: >-
      <p>Category: Chakra </p><p>Prerequisite: Endurance, Level 8+ </p><p>The chakra reserves you have, are
      significantly more volumous than previously thought.</p><p> You gain the following benefits; </p><p>• Increase
      your Constitution score by 1, to a maximum of 20.</p><p>• You gain resistance to Chakra Damage.</p><p>• Your
      chakra point maximum increases by an amount equal to your level when you gain this feat.</p><p> Whenever you gain
      a level thereafter, your chakra points maximum increases by an additional 1 chakra point.</p><p>• Your Chakra
      point maximum cannot be reduced by hostile effects</p>
