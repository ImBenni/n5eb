name: Bloodline, Latent
type: feat
img: icons/magic/symbols/blood-drop-splatter-red.webp
system:
  description:
    value: >-
      <p>Category: Clan, Rare</p><p><strong>Prerequisite:</strong> You must take your first instance of this feat between
      levels 1 and 4. If you are level 5 or higher, you cannot take this feat for the first time.</p><p>You have the
      blood of a famous clan, granting you fleeting usage of their secret techniques. You gain the following
      benefits:</p><ul><li>Select any one clan except your current clan or Non-Clan.</li><li>You gain 10 Bloodline
      Points, which can be spent to purchase Bloodline Ability entries from the chosen clan's latent ability
      list.</li><li>You retain any unspent Bloodline Points.</li><li>You can take this feat no more than
      twice.</li><li>You cannot take this feat a second time until you are level 12 or higher. When you do, you gain
      additional Bloodline Points for the same clan you originally selected with this feat.</li></ul><p>The clan packs
      contain the purchasable Bloodline Ability entries under each clan's latent ability folder.</p>
