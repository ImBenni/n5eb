name: Chef Trainee
type: feat
img: icons/magic/symbols/cross-circle-blue.webp
system:
  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Cooking-Ninja </p><p>Prerequisite: Intelligence 15 +, Level 5+, You
      cannot have Levels in the Cooking-Nin Class.</p><p></p><p> You have begun to train under the best of the best to
      master the art of Cooking.</p><p> While training you begin to imitate them to the best of your ability.</p><p> You
      begin to learn to cook in ways you couldn't prior.</p><p> You gain the following benefits.</p><p> • You gain
      Proficiency in Cooking Tools.</p><p> • You gain a Cooking Dice Equal to 1d4.</p><p> • You Can create 3 Snacks as
      if you had used the Shinobi Snacks feature and you regain these Snacks at the end of a short rest.</p><p> • You
      gain the Cooking Tool Infusion feature as though you were a Level 1 Cooking Nin.</p><p></p>
