  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Cooking-Ninja </p><p>Prerequisite: Chefs Expert, Level 15+.</p><p></p><p>
      You have continued to train to better master the art of Cooking.</p><p> This training has culminated in you being
      defined as a specialist.</p><p> • You may create an additional Snack.</p><p> • Your Cooking Dice becomes
      1d8.</p><p> • Your Cooking Tool gains an 11th level property.</p><p> • You gain the Food for the Soul class
      feature.</p>
