name: Knights Expert
type: feat
_id: Z5aae8iqzIp4TGIL
img: icons/magic/symbols/cross-circle-blue.webp
system:
  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Knight </p><p>Prerequisite: Level 10+, You have begun to truly live by
      the Chivalrous Code, and you have begun to realize the meaning of Honour; • You gain Mastery in Martial
      Arts.</p><p></p><p>• You gain an enhanced effect from the Order of Old you chose previously, call an
      Honour.</p><p>• Honour of The Blade.</p><p>You understand what it means to live by the blade and die by the
      blade.</p><p>As a reaction to initiative being rolled, you can challenge a hostile creature in the
      initiative.</p><p>If they accept, they also spend a reaction and you both make a weapon attack roll
      immediately.</p><p>If you roll higher then their attack roll AND hit, you deal your weapons damage die and gain
      the Victorious benefit.</p><p>If you roll higher but miss the attack, nothing happens.</p><p>If they reject the
      challenge, you regain your reaction.</p><p>If they roll higher then you, you gain the Defeated condition.</p><p>If
      they also hit, they deal their weapons damage die.</p><p>• Honour of The Spear.</p><p>You understand the benefits
      of having the range advantage and using it for momentum.</p><p>When you hit a creature with a melee attack you can
      challenge them to strike back.</p><p>If they do not hit you with an attack by the start if your next turn, you are
      Victorious.</p><p>If they do land an attack against you, you are instead Defeated.</p><p>• Honour of The
      Hammer.</p><p>You have faith in your power, no one else can compare.</p><p>When a creature would target you with a
      melee weapon attack you can spend your reaction and let it you hit.</p><p>You then can roll your weapons
      damage.</p><p>If you deal more damage then they dealt to you, you reduce the damage to 0 and gain
      Victorious.</p><p>If you roll less damage, you take the full damage and become Defeated.</p><p>• Honour of The
      Morningstar You understand that momentum is the key to battle and as a Knight of the Morningstar you must keep
      it.</p><p>When initiative is rolled, you can use your reaction to mark a creature as your target.</p><p>If you
      land a Taijutsu or weapon attack against that creature 3 times before the end of your first turn, you are
      Victorious.</p><p>If you are unable to, you instead are Defeated.</p><p>• Honour of The Bow.</p><p>You abide by
      the code of your order to strike true, always.</p><p>When you would make a second ranged Taijutsu or weapon attack
      on the same turn against the same target, you can call your shot to land exactly where the last one did.</p><p>You
      make your attack with a -5 penalty.</p><p>On a successful attack, your attack deals an additional die of damage,
      and you are Victorious.</p><p>If you miss, you are Defeated.</p>
