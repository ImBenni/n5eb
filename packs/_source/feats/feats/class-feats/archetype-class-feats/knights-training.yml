name: Knights Training
type: feat
_id: tD9V0sjRTtbjYXz8
img: icons/magic/symbols/cross-circle-blue.webp
system:
  description:
    value: >-
      <p>Category: Archetype</p><p>Archetype: Knight</p><p>Prerequisite: Level 5+, Strength or Dexterity 14+, Charisma
      14+ You have studied the codes and martial prowess of the Orders of Old from the Land of
      Chivalry.</p><p></p><p>While learning, you have found new ways to vanquish your foes.</p><p>• You gain Proficiency
      in Martial Arts.</p><p>• Select three Bukijutsu C-Rank or lower.</p><p>These jutsu gain the Technique keyword and
      are treated as Techniques for other features and abilities from the Knight Archetype line of feats.</p><p>You can
      switch these jutsu when you level up in a class.</p><p>• You gain an enhanced effect from one of the following 5
      Orders of Old from within the Land of Chivalry.</p><p></p><p>- Order of The Blade.</p><p>You learn the footwork
      needed to expand your lethal range while maintaining a solid foundation.</p><p>All weapons in the Blade Weapons
      Group gain a rank of the Reach property.</p><p>When using a Technique, this increases by an additional
      rank.</p><p></p><p>- Order of The Spear.</p><p>You learn how to balance potential and kinetic energy to keep
      momentum on your side.</p><p>All weapons in the Polearm Weapon Group gain the Winding Property.</p><p>Taijutsu
      attacks from a Technique can also utilize the Winding Property.</p><p></p><p>- Order of The Hammer.</p><p>You
      learn to concentrate all your force into the point of impact, ensuring a complete transfer of energy and
      power.</p><p>All weapons in the Power Weapon Group gain the Heavy property.</p><p>If it already had the Heavy
      Property, you instead add full Strength modifier to [Weapon Damage] rolls when casting a Technique</p><p></p><p>-
      Order of The Morningstar You learn to make sure to not waste any momentum in your attacks, each drop of energy in
      your attack being used for victory.</p><p>All weapons of the Flail Weapon Group gain the Mulitattack
      property.</p><p>When casting a Technique, you can use the Mulitattack property as a part of the same
      action.</p><p></p><p>- Order of the Bow.</p><p>You learn to make sure each strike lands exactly where it needs to,
      finding the chink in any armor.</p><p>All weapons in the Thrown and Ammunition Weapon Groups gain the Tactical
      property.</p><p>When casting a Technique, the target creature always has 1 rank of a Physical Condition.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/knights.webp" />
