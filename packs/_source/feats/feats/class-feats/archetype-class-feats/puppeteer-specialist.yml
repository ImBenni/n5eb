system:
  description:
    value: >-
      <p>Category: Archetype</p><p>Archetype: Puppet Master</p><p>Prerequisite: Puppeteer Expert, Level 15+ Your study
      under the elders of the Sunagakure's renowned Puppet Masters has come to a close, and what you have accomplished
      in such a short span of time is exemplary.</p><p></p><p>Though not a true Puppeteer, your work shall be recorded
      to aid in training the next generation of curious shinobi such as yourself.</p><p>Your training has culminated
      into you being defined as a specialist.</p><p>• You gain one Puppet Upgrade of Gold tier or lower.</p><p>• You
      gain the 15th level advancement for the Puppet Tool feature.</p><p>• You gain the second 6th level feature of your
      chosen Puppet Technique.</p><p>You do not gain any higher-level advancements it may present.</p><p></p>
