name: Weapon Arts Expert
type: feat
img: icons/magic/symbols/cross-circle-blue.webp
system:
  description:
    value: "<p>Category: Archetype</p><p>Archetype: Weapon Specialist</p><p>Prerequisite: Weapon Arts Training, Level 10+</p><p>\_</p><p>You have continued to train to better master the art of Bukijutsu.\_</p><p>This training has culminated into you being defined as an Expert.\_</p><p><br />• Select one Flurry Technique from the 2nd level Weapon Flurry class feature that you did not select prior.\_<br />You gain the ability to use the chosen Flurry Technique.\_</p><p><br />• Select one weapon type you have proficiency with such as Katana's, Short Swords, etc.\_<br />The chosen weapon becomes your Weapon Focus.\_<br />Your Weapon Focus gains a +1 bonus to attack and damage rolls, if it doesn't already.\_</p><p><br />• Select one Weapon Trait found on the chart under the Weapon Focus class feature.\_<br />Your Weapon Focus gains the chosen trait, following the set requirements.</p>"
