  description:
    value: "<p>Category: Class</p><p>Prerequisite: At least 12+ levels in Science-Nin</p><p>\_</p><p>You want to learn the other paths of science, not just your own major.\_<br />You gain the following benefits:</p><p>\_</p><p>• You can select one other Scientific Ninja Tool from another subclass, that you do not have, of Creation point cost 8 or lower, gaining access to it.\_<br />You cannot change this choice, once made.\_</p><p>• You can take this feat multiple times, selecting a different subclass and Scientific Ninja tool with each selection..</p>"
