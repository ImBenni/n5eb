system:
  description:
    value: >-
      <p>Category: Class</p><p>Prerequisites: At least 12+ Levels in Puppet Master, The Moment I Understood class feat,
      16+ Constitution</p><p></p><p>You've finally managed it, a way to be unending, by sealing your heart and soul into
      a container your body will no longer ever be a detriment to you.</p><p>You've become a living puppet.</p><p>You
      gain the following benefits;</p><p>• You gain 2 additional upgrades that can be up to Silver tier.</p><p>These
      upgrades must be fitted into yourself as specified in The Moment I Understood.</p><p>• You no longer need to eat,
      breathe, drink, or sleep, and are immune to suffocation and poison.</p><p>• When you would receive healing from a
      medical jutsu, you may use the first bullet of The Moment I Understood and spend hit die to regain hit points
      immediately as part of regaining hit points.</p><p>• When taking a short rest, you regain a number of hit dice
      equal to 1/4th your maximum number of hit dice.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/crimson-technique.webp" />
