name: Tools To Carry On A Legacy
type: feat
img: icons/magic/symbols/cross-circle-blue.webp
system:
  description:
    value: >-
      <p>Category: Class</p><p>Prerequisite: At least 4+ levels in Puppet Master</p><p>To carry on the legacy of the
      Puppet Masters who came before you, you must strive to make your armament stronger and better.</p><p>You are able
      to push your creations one step further, fitting more in, more efficiently.</p><p>You gain the following
      benefits;</p><p>• You gain one Wood tier upgrade.</p><p>• You gain an additional Bronze tier upgrade at 9th Level
      of Puppet Master.</p><p>• You gain an additional Silver tier upgrade at 14th Level of Puppet Master.</p><p>• You
      gain an additional Gold or Platinum tier upgrade at 19th Level of Puppet Master.</p>
