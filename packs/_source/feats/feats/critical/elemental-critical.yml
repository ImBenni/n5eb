name: Elemental Critical
type: feat
_id: ws29XgvqJaGvlzZb
img: icons/magic/symbols/mask-yellow-orange.webp
system:
  description:
    value: >-
      <p>Category: Critical Prerequisite: Level 4+, At least one Nature Affinity.</p><p> You learn to infuse your nature
      affinity into your powerful blows.</p><p> You gain the following benefits: </p><p>• Select one of the
      following.</p><p>  - Ninjutsu attacks </p><p>  - Taijutsu attacks </p><p>• Once per round, when you score a
      critical hit with the chosen attack type, the target creature gains 1 rank of one of the listed conditions based
      on the Nature affinities you have if it is a Ninjutsu attack, or the affinities you have if it is a Taijutsu
      attack.</p><p>  - Earth – Bruised.</p><p>  - Wind – Bleed.</p><p>  - Fire – Burned.</p><p>  - Water –
      Chilled.</p><p>  - Lightning – Shocked.</p><p> • You can take this feat more than once, each time selecting a
      different attack type</p>
