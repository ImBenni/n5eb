system:
  description:
    value: >-
      <p>Category: Critical </p><p>Every blow that hits your enemies make you feel closer to victory, making you shake
      in excitement.</p><p> You gain the following benefits: </p><p>• Allied creatures within 20 feet of you gain a +1
      bonus to their critical threat range so long as they do not have any bonuses to their critical threat range due to
      another Critical Feat.</p><p>• When you or an allied creature score a critical hit on a creature that reduces
      their hit points to 0, you gain the Fanatics Rush special action.</p><p> You can gain this special action, once
      per round.</p><p>  </p><p>- Fanatics Rush.</p><p> On your turn, you can take this special action to regain
      1d6+your proficiency bonus hit points and make one weapon attack.</p><p></p>
