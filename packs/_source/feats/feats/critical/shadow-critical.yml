name: Shadow Critical
type: feat
_id: eirchd7I4UPOi0Ew
img: icons/magic/symbols/mask-yellow-orange.webp
system:
  description:
    value: >-
      <p>Category: Critical </p><p>Prerequisite: Level 4+ </p><p>When you score a critical hit.</p><p> You absorb the
      vitality of your fallen foes.</p><p> You gain the following benefits: </p><p>• When you score a critical hit with
      a melee attack against a hostile creature, that is not a Ninjutsu or Genjutsu attack, you may regain hit points
      equal to twice your Constitution modifier.</p><p> You may gain this benefit three times per rest.</p><p>• Once per
      combat, when you reduce a hostile creature to 0 hit points with a melee attack, that is not a Ninjutsu or Genjutsu
      attack, you may regain hit points equal to your Constitution score.</p><p>  - If the attack was a critical hit,
      regain twice the amount of hit points and remove 1 failed Death Saving Throw you possess, if any.</p><p></p>
