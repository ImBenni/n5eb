system:
  description:
    value: >-
      <p>Category: Critical </p><p>Prerequisite: Level 8+ </p><p>When you score a critical hit.</p><p> You inflict
      terror into your foes.</p><p> You gain the following benefits: </p><p>• Select one of the following; </p><p> -
      Ninjutsu attacks </p><p> - Genjutsu attacks </p><p>• Once per round, when you score a critical hit, the affected
      creature gains 1 rank of fear.</p><p>• You can take this feat more than once, each time selecting a different
      attack type.</p><p></p>
