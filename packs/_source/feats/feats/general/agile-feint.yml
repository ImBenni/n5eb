name: Agile Feint
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General </p><p>You know how to use your agility to grant you advantage and your opponent's
      disadvantage.</p><p> You gain the following benefits: </p><p>• Increase your Dexterity score by 1, to a maximum of
      20 </p><p>• Reduce the Bulk of all Light Armors by 1.</p><p> • You can use the Feint Skill-Action, with Dexterity
      (Acrobatics) and without Mastery in Deception.</p><p> You may perform the Feint Skill-Action before making an
      attack, as part of the same action.</p><p> • When a creature misses you with a melee attack you can use your
      reaction to make an attack of opportunity against the triggering creature.</p><p></p>
