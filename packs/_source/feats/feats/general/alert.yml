name: Alert
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General </p><p>Always on the Lookout for Danger, you gain the following benefits:</p><p>• You Gain a
      +5 bonus to Initiative</p><p>• You may add your Wisdom modifier in place of Dexterity to your Initiative
      bonus.</p><p>• You can't be surprised while you are conscious.</p><p>• You become aware of any creature casting a
      jutsu with Hand Seals (HS) within 60 feet of you.</p><p>This does not immediately tell you the creatures'
      location, instead you only know that Hand Seals (HS) were made with the intent to cast a Jutsu.</p><p>• You have
      advantage on checks made to find hidden creatures.</p><p>• Other Creatures do not gain advantage on attack rolls
      against you as a result of being hidden from you.</p><p></p>
