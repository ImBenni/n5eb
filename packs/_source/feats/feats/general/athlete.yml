name: Athlete
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General </p><p>You have undergone extensive physical training to gain the following benefits:
      </p><p>• Increase your Strength or Dexterity score by 1, to a maximum of 20.</p><p> • You gain a Swim, climbing
      and wall running speed equal to your normal speed </p><p>• Increase your maximum bulk by +5.</p><p>• Long Jump
      increased to 10 + Strength Score and High Jump increased to 5 + Strength Score.</p><p>• You have advantage on
      grapple checks against creatures whose strength score is lower than yours.</p><p></p>
