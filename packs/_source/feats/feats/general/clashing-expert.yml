name: Clashing Expert
type: feat
_id: PrV669YzUmdpQbp0
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General</p><p>Prerequisite: Clashing Adept Feat, Level 12+</p><p>You have mastered the art of
      Clashing, gaining the following benefits;</p><p>• You gain +1 ranks of Mastery in the Skill selected with the
      Clashing Adept feat.</p><p>• While in a Jutsu Clash and Bloodied (below 50% of your maximum hit points), you gain
      a +1d4 bonus to your Clash checks.</p><p>Additionally, for every failed Death saving throw you possess, increase
      your Clash Checks by +1.</p><p>• When you lose a Jutsu Clash, you do not become Concussed, and gain resistance to
      the damage dealt.</p><p>• When you succeed a Jutsu Clash, you can choose to knock the target prone.</p><p>• You
      may denote two additional jutsu you know as Clashing Jutsu.</p><p>Additionally, once per long rest when you
      initiate a Clash with your Clashing Jutsu, you may declare this clash to be your Fated Clash.</p><p></p><p>Fated
      Clash.</p><p>You always treat your Clash as a Best of 3, regardless of the rank of the jutsu used.</p><p>You may
      also clash with Arts, regardless of your jutsu's rank.</p><p>Lastly, if the creature you are Clashing with would
      boost their Clash Checks with any form of dice- based bonus (such as Tenacity Die), you roll the same amount of
      bonus die, of the same die size, to your Clash Checks.</p><p></p>
