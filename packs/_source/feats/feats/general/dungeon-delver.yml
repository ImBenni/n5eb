name: Dungeon Delver
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General</p><p>Alert to the hidden traps and secret doors found in many dungeons, you gain the
      following benefits:</p><p>• Increase your Intelligence or Wisdom score by 1, to a maximum of 20.</p><p>• You have
      advantage on Perception and Investigation checks made to detect the presence of traps.</p><p>• You have advantage
      on saving throws made to avoid or resist traps.</p><p>• You have resistance to the damage dealt by traps.</p><p>•
      You can search for traps as a bonus action, instead of an Action.</p><p></p>
