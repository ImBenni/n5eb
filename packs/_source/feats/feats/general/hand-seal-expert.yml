name: Hand Seal Expert
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General </p><p>You've practiced utilizing Ninjutsu &amp; Genjutsu in close quarters and in contested
      conflicts, learning techniques that grant you the following benefits: </p><p>• Increase your Intelligence or
      Wisdom score by 1, to a maximum of 20.</p><p>• When making a ranged Ninjutsu or Genjutsu attack while you are
      within 5 feet of a hostile creature, you do not have disadvantage on the attack roll.</p><p>• When a creature
      would attempt to interrupt a jutsu you cast on your turn, they must attempt the ability check to interrupt
      regardless if they have a feature or jutsu that says otherwise.</p><p> They increase the DC to interrupt your
      jutsu by +2.</p><p></p>
