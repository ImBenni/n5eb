name: Heavy Armor Mastery
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General </p><p>Prerequisite: Proficiency with Medium Armor, Level 4+ </p><p>You have trained to
      master the use of heavy armor, gaining the following benefits: </p><p>• You gain proficiency with heavy
      armor.</p><p> If you are already proficient with heavy armor, instead increase your Strength or Constitution score
      by 1, to a maximum of 20.</p><p>• Select 4 Damage types from the following list; Earth, Wind, Fire, Cold,
      Lightning, Force, Acid, Poison, Necrotic.</p><p> Heavy armor you wear applies its Reinforced value vs the chosen
      damage types.</p><p></p>
