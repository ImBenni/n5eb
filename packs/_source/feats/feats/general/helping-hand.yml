name: Helping Hand
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General </p><p>Your presence in a scrap tends to elevate your comrades.</p><p> You gain the following
      benefits: </p><p>• You can use the Help action as a bonus action.</p><p>• When you use the Help action to aid an
      ally in attacking a creature, increase the range of the Help action by 10 feet.</p><p>• You can help a creature
      with a skill check you are not proficient in.</p><p>• You can help two allies targeting the same creature within
      range when you use the Help action this way.</p><p></p>
