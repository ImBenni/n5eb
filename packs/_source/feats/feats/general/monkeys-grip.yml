name: Monkey's Grip
type: feat
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p>Category: General </p><p>Prerequisite: Level 4+ </p><p>Your make-do skills and superb Chakra molding let you
      use everyday objects in unforeseen ways.</p><p> You gain the following Benefits; </p><p>• Increase your Strength
      score by 1, to a maximum of 20.</p><p>• You are proficient with improvised weapons, and attacks with them count as
      Chakra enhanced for the purpose of overcoming resistances and immunities.</p><p>• Once per turn, when you attack
      with an improvised weapon, you may add a bonus equal to your intelligence modifier to the damage roll.</p><p>• You
      may replace a Bukijutsu's Weapon components with any item your DM considers a close enough replacement.</p>
