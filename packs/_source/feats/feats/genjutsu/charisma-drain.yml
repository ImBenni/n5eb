name: Charisma Drain
type: feat
img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p>Category: Genjutsu </p><p>Prerequisite: Level 12+ </p><p>Each illusion you manifest, sucks the charisma, charm,
      or intimidating factors from their target.</p><p> You gain the following benefits: </p><p>• Increase your Wisdom
      or Charisma score by 1, to a maximum of 20 </p><p>• When a creature would fail the saving throw of a Genjutsu you
      cast or you score a successful hit with a Genjutsu attack the target suffers a -1 penalty to their next Charisma
      saving throw.</p><p> This can stack up to -5.</p><p>• When a creature would suffer a -1 penalty to their next
      Charisma saving throw as a result of this feature, you gain a +1 bonus to your next Charisma saving throw.</p><p>
      This can stack up to +5.</p><p>• When a creature would fail the saving throw of a Genjutsu you cast by 5 or more,
      they gain vulnerability to the next instance of psychic damage they take.</p><p></p>
    chat: ''
