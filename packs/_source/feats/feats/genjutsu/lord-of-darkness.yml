name: Lord Of Darkness
type: feat
img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p>Category: Genjutsu </p><p>Prerequisite: Puppets of Darkness, Shadow Bite or Weapons of Darkness, Level 4+
      </p><p>Weaving darkness into and out of both your Genjutsu, and the minds of your enemies.</p><p> The shadows
      become your friend.</p><p> The oldest friend one could ask for.</p><p> You gain the following benefits: </p><p>•
      The prerequisite genjutsu can deal Necrotic damage.</p><p> Your choice when the jutsu is cast.</p><p>• The
      prerequisite jutsu inflicts 1 rank of Dazzled when it deals damage.</p><p>• If you score a critical hit with the
      prerequisite genjutsu, you can choose to inflict the Confused condition.</p><p>• Twice per rest, you can choose to
      cast one of the prerequisite jutsu as a bonus action.</p><p> If you could already cast the prerequisite jutsu as a
      bonus action, you can instead cast it at no action cost.</p><p></p>
