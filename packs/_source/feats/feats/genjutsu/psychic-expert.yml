name: Psychic Expert
type: feat
img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p>Category: Genjutsu </p><p>Prerequisite: Level 8+ </p><p>You can feel every migraine. Every headache. Every
      painful thought.</p><p> When casting a Genjutsu that deals damage, you gain the following benefits: </p><p>•
      Increase your Wisdom or Charisma score by 1, to a maximum of 20 </p><p>• Once per turn, when a creature under the
      effects of a Genjutsu you cast would remake a saving throw to end the Genjutsu's effects, they make their saving
      throw with a -1d4 penalty.</p><p>• Once per turn, when a hostile creature would take damage, you can choose to
      Mentally Scar the creature.</p><p> A creature who is mentally scarred suffers a -1d4 penalty to end any Mental
      condition they are under the effects of.</p><p>• Genjutsu you cast that requires an attack roll, has their range
      increased by 30 feet.</p><p></p>
