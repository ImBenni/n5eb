name: Psychosis Adept
type: feat
img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p>Category: Genjutsu</p><p>Prerequisite: Pain, Doubled Pain or Unlimited Pain, Level 4+</p><p>You've become adept
      at causing immense psychotic pain to others minds.</p><p>The advanced techniques you've learned while delving into
      this specialty has granted you the following benefits:</p><p>• The prerequisite jutsu does not cost chakra to
      maintain concentration, if they do.</p><p>• When the prerequisite jutsu deals damage, add your genjutsu ability
      modifier to the damage rolled.</p><p>• If an affected creature would be reduced to 0 hit points as a result of the
      prerequisite jutsu, you can choose another creature within 10 feet of the original target to target, moving the
      jutsu to that new target.</p><p>• Creatures cannot end the effects of the prerequisite genjutsu on themselves with
      a jutsu of equal level to it.</p>
