name: Psychosis Master
type: feat
img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p>Category: Genjutsu </p><p>Prerequisite: Psychosis Expert, Level 12+ </p><p>You've become a master at breaking
      the minds of your adversaries.</p><p> Enemies fall into mental coma's when they do battle with you.</p><p> You
      gain the following benefits: </p><p>• The Pain genjutsu damage die becomes a d6.</p><p>• The Doubled Pain genjutsu
      triggers whenever the target takes damage from a source other than you, once per turn.</p><p>• The Unlimited Pain
      genjutsu can force the target to make an Intelligence or Wisdom saving throw to resist its effects.</p><p> You
      decide the saving throw when the jutsu is cast.</p><p>• You can concentrate on all 3 prerequisite genjutsu at once
      If you would end the effect of Doubled Pain as a result of Unlimited Pain you instead maintain concentration on
      it, while also gaining the upgraded benefits of Unlimited Pain.</p><p></p>
    chat: ''
