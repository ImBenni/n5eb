name: Sensory Specialization
type: feat
img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p>Category: Genjutsu </p><p>You have begun to specialize in a subset of illusions of your choice.</p><p> You gain
      the following benefits: </p><p>• Select one Sensory Keyword (Auditory, Visual, Inhaled).</p><p> You may ignore
      Hand Seal (HS) requirement for Genjutsu of C-Rank of lower with your chosen keyword.</p><p>• You deal additional
      damage with Genjutsu with your chosen Sensory Keyword, equal to its rank.</p><p> (D-Rank: 1, C-Rank: 2, B-Rank: 3,
      A-Rank: 4, S-Rank: 5) </p><p>• You reduce the chakra cost of Genjutsu with your chosen Sensory keyword by an
      amount equal to its rank.</p><p> (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S- Rank: 5).</p><p> Multiple effects
      with rank-based reduction do not stack.</p><p>• You can take this feat multiple times, each time selecting a
      different sensory keyword.</p><p></p>
