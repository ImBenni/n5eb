system:
  description:
    value: >-
      <p>You have trained and become well versed in medical jutsu putting you above the average user of the style.
      Increase your Wisdom score by 1, to a maximum of 20.</p><ul><li><p>Jutsu with the Genjutsu Keyword gain a + 1 to
      their DC.</p></li><li><p>Jutsu with the Genjutsu Keyword that you would create or modify have their Chakra cost
      reduced by 1.</p></li><li><p>While you are concentrating on only Jutsu that contain the Genjutsu keyword all
      concentration costs are reduced by 1.</p></li><li><p>All features of this feat do not stack with other adept
      feats</p></li></ul>
