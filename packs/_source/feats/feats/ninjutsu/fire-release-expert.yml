name: Fire Release Expert
type: feat
img: icons/magic/symbols/runes-star-blue.webp
system:
  description:
    value: >-
      <p>Category: Ninjutsu </p><p>Prerequisite: Level 8+, Fire Release Keyword </p><p>Your mastery with fire natured
      chakra is so great, flames you conjure burn twice as hot, with half the effort.</p><p> When casting a Ninjutsu
      with the fire release keyword, you gain the following benefits: </p><p>• Increase your Intelligence score by 1, to
      a maximum of 20.</p><p>• For every fire damage dice you roll, you pierces through 1 of a creatures DR (damage
      reduction), up to a max of 10.</p><p>• When you would cast a Ninjutsu with the fire release keyword that creates a
      Cone, sphere or line, you can increase the size of the area or length of the line by 10 feet.</p><p>• A jutsu
      cannot benefit from more than one "X" Release Expert feat at a time.</p><p></p>
