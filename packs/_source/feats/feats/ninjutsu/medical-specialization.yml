name: Medical Specialization
type: feat
img: icons/magic/symbols/runes-star-blue.webp
system:
  description:
    value: "<p>Category: Ninjutsu</p>\n<p>Prerequisite: Medical Keyword</p>\n<p>You have begun to specialize in a particular medical chakra of your choice.\_<br />You gain the following benefits:</p>\n<p>\_</p>\n<p>• Select one medical damage type (Acid, Necrotic, Poison).\_<br />You may ignore Hand Seal (HS) requirement for Ninjutsu, with the medical keyword of C-Rank of lower with your chosen damage type.\_</p>\n<p><br />• You deal additional damage with Ninjutsu with your chosen damage type, equal to its rank.\_<br />(D-Rank: 1, C- Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5)</p>\n<p>\_</p>\n<p>• You reduce the chakra cost of Ninjutsu, with the medical keyword with your chosen damage type by an amount equal to its rank (D-Rank: 1, C-Rank: 2, B- Rank: 3, A-Rank: 4, S-Rank: 5).\_<br />Multiple effects with rank-based reduction do not stack.\_</p>\n<p><br />• You can take this feat multiple times, each time selecting a different damage type.</p>"
