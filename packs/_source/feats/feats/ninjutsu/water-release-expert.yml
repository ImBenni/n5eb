name: Water Release Expert
type: feat
img: icons/magic/symbols/runes-star-blue.webp
system:
  description:
    value: >-
      <p>Category: Ninjutsu </p><p>Prerequisite: Level 8+, Water Release Keyword </p><p>You can feel every droplet of
      water and every molecule of chakra flowing within each drop.</p><p> You can squeeze efficiency out of every
      drop.</p><p> When casting a Ninjutsu with the water release keyword, you gain the following benefits: </p><p>•
      Increase your Intelligence score by 1, to a maximum of 20 </p><p>• When you are near a sufficient source of water
      that can be used to reduce the cost of the given jutsu cast, reduce the cost by 3, instead of 2.</p><p>• When a
      ninjutsu you cast with the water release keyword deals damage to at least one creature, you can choose to leave
      behind a small source of water within 5ft of one of the affected creature(s).</p><p> The source of water can be
      used to activate effects that requires a sufficient source of water no more than once, which then drains the water
      source.</p><p>• A jutsu cannot benefit from more than one "X" Release Expert feat at a time.</p><p></p>
