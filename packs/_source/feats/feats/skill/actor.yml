name: Actor
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>Skilled at mimicry and dramatics, you gain the following benefits: </p><p>• Increase
      your Charisma score by 1, to a maximum of 20.</p><p>• You gain proficiency in the Performance Skill.</p><p> If you
      are already proficient, you instead gain Mastery.</p><p>• When your Charisma (Performance) check is 5 or higher
      than a non-hostile creatures Passive Insight, they gain 1 rank of Charm towards you, until the end of this
      conversation.</p><p> They can only gain 2 ranks of charm towards you this way.</p><p>• You can cast Voice Change
      ignoring its components and at no cost.</p><p> When cast this way, you instead roll a d8.</p><p>• While
      performing, you can try to distract one humanoid you can see who can see and hear you.</p><p> Make a Charisma
      (Performance) check contested by the humanoid's Wisdom (Insight) check.</p><p> If your check succeeds, you grab
      the humanoid's attention enough that it makes Wisdom (Perception) and Intelligence (Investigation) checks with
      disadvantage until you stop performing.</p><p></p>
    chat: ''
