name: Animal Handler
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>You master the techniques needed to train and handle animals.</p><p> You gain the
      following benefits: </p><p>• Increase your Wisdom score by 1, to a maximum of 20.</p><p>• You gain proficiency in
      the Animal Handling skill.</p><p> If you are already proficient, you instead gain Mastery.</p><p>• By spending 1
      week of downtime with a normal animal, you can make a DC 20 Wisdom (animal handling) check.</p><p> On a success,
      you bond with the animal.</p><p> It becomes permanently helpful to you unless you do something egregious to break
      your bond.</p><p> Bonding with a new animal breaks any previous bonds.</p><p> New Animals do not know all your
      previous bonded animals jutsu, if any.</p><p>• By spending 1 or more weeks of downtime with a bonded animal, you
      can teach it one D-Rank or higher Taijutsu that you know.</p><p> You can spend 1 downtime per rank of jutsu
      (D-Rank: 1, C-Rank: 5, B-Rank: 10, A-Rank: 20, S-Rank: 50).</p><p> It uses its bite and claws in place of punches
      or kicks.</p><p> A creature can only learn 3 Taijutsu this way.</p><p>• You can use a bonus action on your turn to
      command your bonded animal within 60 feet of you that can hear you.</p><p></p>
