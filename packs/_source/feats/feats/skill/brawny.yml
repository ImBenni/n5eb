name: Brawny
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>You've become stronger, gaining the following benefits: </p><p>• Increase your Strength
      score by 1, to a maximum of 20.</p><p>• You gain proficiency in the Athletics skill.</p><p> If you are already
      proficient, you instead gain Mastery.</p><p>• Increase your maximum bulk by +10.</p><p>• Once per rest, you may
      make a Strength based ability or skill check, attack roll or saving throw at advantage.</p><p>• Thrown weapons
      that use Strength, double both range increments.</p><p></p>
