name: Chef
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>Time and effort spent mastering the culinary arts has paid off.</p><p> You gain the
      following benefits: </p><p>• Increase your Wisdom score by 1, to a maximum of 20.</p><p>• You gain proficiency
      with a Cooking Kit or Survival (Pick one).</p><p> If you are already proficient, you instead gain Mastery.</p><p>•
      Over the course of a short rest, you can cook special food, with a cooking kit.</p><p> This special food is of
      your description and creatures consume this food during the short rest.</p><p> They regain additional hit points
      equal to your Survival Bonus and, for the next 8 hours or until your next rest they temporarily increase their
      maximum hit points by 10.</p><p> You can cook special food in this way twice per long rest.</p><p>• Over the
      course of a long rest, you can cook a special full course meal for your team with a cooking kit.</p><p> This
      special meal takes 1 hour to consume and spoils at the end of your long rest.</p><p> Creatures who partake in the
      meal are cured of all diseases and poisons and make their next 2 Constitution saves at advantage.</p><p> This
      benefit lasts for 24 hours.</p><p></p>
    chat: ''
