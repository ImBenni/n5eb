name: Chemist
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill</p><p>You have studied the secrets of chemistry and are an expert in its practice, gaining the
      following benefits:</p><p>• Increase your Intelligence score by 1, to a maximum of 20.</p><p>• You gain
      proficiency with the Alchemist kit or Investigation. (Pick One).</p><p>If you are already Proficient, you instead
      gain Mastery.</p><p>• When you would make an Intelligence (Investigation) check, and have at least one charge of
      Alchemist Kit to collect DNA, evidence or any remains from a location, you reduce the DC set by the DM by
      -2.</p><p>• Over the course of a short rest, you can develop different chemical compounds, using a Forensics Kit,
      which you then use to create one of the following of base quality; Chili Pepper Bomb, Smoke Bomb, Military Ration
      Pill or Chakra Pill.</p><p>• Over the course of a long rest, you can develop a special chemical with an Alchemist
      Kit called White water.</p><p>White water has 2 charges and expires after 8 hours.</p><p>If a creature drinks this
      White water, they gain one of the following benefits for the next hour; 60ft Chakra Sight, 60ft Darkvision, 20ft
      Tremor Sense or 10ft Blindsight.</p><p></p>
