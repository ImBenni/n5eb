name: Elite Agility
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>Prerequisite: Dexterity 20, Level 10+ </p><p>You have the reflexes of one who can see
      things before they happen, granting the following benefits: </p><p>• You gain a 1d4 bonus to all Dexterity saving
      throws you make.</p><p>• Choose two Dexterity skills which you already have proficiency in.</p><p> When you make a
      skill check using these skills, you treat any roll of 9 or lower on the d20 as a 10.</p><p>• You gain Mastery in
      one Dexterity Skill of your choice which you already have proficiency in.</p><p>• Increase your initiative by +5
      and your movement speed by +10.</p><p>• If a creature would have disadvantage on an attack against you, you can
      choose to make them roll an additional d20, using the lowest roll.</p><p> Once you use this ability twice, you
      must complete a rest before using it again.</p><p></p>
