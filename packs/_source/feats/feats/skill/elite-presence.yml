name: Elite Presence
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>Prerequisite: Charisma 20, Level 10+ </p><p>You have the presence of the most affluent
      of leaders, granting the following benefits: </p><p>• You gain a 1d4 bonus to all Charisma saving throws you
      make.</p><p>• You gain Mastery in one Charisma Skill which you already have proficiency in.</p><p>• Allied
      creatures within 20 feet of you cannot gain ranks of fear or charm.</p><p> Creatures who have such conditions who
      speak to you for at least 1 minute, immediately lose such conditions and become immune to gaining them from the
      creature that inflicted it upon them for the next 24 hours.</p><p>• As an action, you can attempt to impose your
      Elite Presence upon another creature.</p><p> So long as the creature you are interacting with is of equal or lower
      level than you, are not hostile and can hear and see you, each minute they are interacting with you, they gain a
      -2 penalty to all Wisdom and Charisma skill checks made against you.</p><p> These penalties immediately end if
      they become hostile to you in any way.</p><p></p>
    chat: ''
