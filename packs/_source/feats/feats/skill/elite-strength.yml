name: Elite Strength
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill</p><p>Prerequisite: Strength 20, Level 10+</p><p>You have the strength that legends tell of,
      granting the following benefits:</p><p>• You gain a 1d4 bonus to all Strength saving throws you make.</p><p>• You
      gain Mastery in one Strength Skill which you already have proficiency in.</p><p>• You ignore the two-handed
      property of weapons with which you are proficient.</p><p>• You can attempt to use your Elite Strength to complete
      normally impossible acts of Strength.</p><p>Choose one of the following acts of superhuman Strength to
      complete.</p><p>Once your use one of these features, you must complete a rest before you can do so again.</p><p>-
      Hold the Line.</p><p>As an action, you ready yourself for anything until the end of your next turn.</p><p>When a
      creature would make an attack against you, force you to make a saving throw of any type or use a feature or trait
      targeting you, you immediately act at no further action cost.</p><p>You exert strength rivaling fables and
      myths.</p><p>If you are the target of an attack, jutsu, feature or would be affected by such, you reach your hands
      out and grapple with strands of logic.</p><p>Make a Strength ability check, adding half your character level to
      the result vs the triggering creatures attack roll or Save DC.</p><p>On a success, you dispel the attack, jutsu or
      effect.</p><p>This triggers a number of times equal to your Strength modifier before the beginning of your next
      turn.</p><p>- Herculean.</p><p>As a bonus action, for the next minute, you can move anything you can put your
      hands on.</p><p>You can Grapple, Shove, and Trip gargantuan or smaller creatures as if they were your
      size.</p><p>- Unfallen.</p><p>As a reaction to a structure or construct falling or collapsing within 5ft of you,
      you can exert your strength, preventing it from falling for the next minute.</p><p>Regardless of how many hit
      points a structure has left, while you are holding it, it cannot collapse in on itself.</p><p></p>
