name: Master Of Disguise
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>You have honed your ability to shape your personality and visage into that of others
      with a surprising level of detail.</p><p> You gain the following benefits: </p><p>• You gain proficiency with the
      disguise kit.</p><p>• You gain proficiency with performance.</p><p> If you are already proficient, you instead
      gain Mastery.</p><p>• You can make Charisma (Performance) checks in place of Deception checks.</p><p>• When you
      are mimicking a target, you have advantage on performance checks made to impersonate that target.</p><p>• Reduce
      the time it takes to make a disguise when using a disguise kit by a factor of up to 10.</p><p> Plain disguises now
      only take 1 minute.</p><p> Elaborate disguises now only take 10 minutes, and exquisite disguises now only takes 1
      hour.</p><p></p>
