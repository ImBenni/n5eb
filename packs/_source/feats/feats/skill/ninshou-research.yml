name: Ninshou Research
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>You have begun to deep dive into the lore, mechanics and purpose of Ninjutsu.</p><p> You
      gain the following benefits: </p><p>• Increase your Intelligence by 1, to a maximum of 20.</p><p>• You gain
      proficiency in the Ninshou skill.</p><p> If you are already proficient, you instead gain Mastery.</p><p>• When you
      would make an Identify Ninjutsu check, you reduce the DC, by 5.</p><p>• If you would attempt a Read the Enemy
      check, on a creature casting a Ninjutsu, you no longer need to see a creatures using Handsigns to attempt this
      check, and you increase the AC bonus you would gain to +3.</p><p>• You reduce the downtime needed to learn
      Ninjutsu using the self-taught method by an amount equal to the rank of the jutsu.</p><p> (D-Rank: 1, C-Rank: 2,
      B-Rank: 3, A-Rank: 4, S-Rank: 5.)</p>
