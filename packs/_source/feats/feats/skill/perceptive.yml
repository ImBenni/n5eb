name: Perceptive
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>You hone your senses until they become razor sharp.</p><p> You gain the following
      benefits: </p><p>• Increase your Wisdom score by 1, to a maximum of 20.</p><p>• You gain proficiency in the
      Perception skill.</p><p> If you are already proficient, you instead gain Mastery.</p><p>• Being in a lightly
      obscured area doesn't impose disadvantage on your Wisdom (Perception) checks if you can both see and hear.</p><p>•
      You have a +5 bonus to your passive Wisdom (Perception) and passive Intelligence (Investigation) scores.</p><p>•
      If you can see a creature's mouth while it is speaking a dialect you understand, you can interpret what it's
      saying by reading its lips.</p><p></p>
