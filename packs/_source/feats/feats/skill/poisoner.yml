name: Poisoner
type: feat
img: icons/magic/symbols/fleur-de-lis-yellow.webp
system:
  description:
    value: >-
      <p>Category: Skill </p><p>You have studied the secrets of poisons and toxins, gaining the following benefits:
      </p><p>• Increase your Intelligence by 1, to a maximum of 20.</p><p>• You gain proficiency with the poisoner's
      kit.</p><p> If you are already proficient, you instead gain Mastery.</p><p>• Reduce the DC to create Poisons by an
      amount equal to your Ninjutsu ability modifier.</p><p>• You can apply a poison to a weapon as a part of the same
      action use to attack with the weapon, once per turn.</p><p>• During a short rest, you can infuse your chakra into
      a single dose of poison.</p><p> To use this benefit, you must have a poisoner's kit &amp; have a poison of any
      type.</p><p> You can only have one infused poison this way.</p><p> This infused poison can use either its listed
      Save DC or your Ninjutsu Save DC (You decide.).</p><p> Additionally, if it deals damage, it deals additional
      damage equal to an amount of damage die, equal to half of your proficiency bonus.</p><p></p>
    chat: ''
