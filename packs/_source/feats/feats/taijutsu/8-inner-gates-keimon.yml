name: '8-Inner Gates: Keimon'
type: feat
img: systems/n5eb/assets/content/jutsu-icons/inner-gates.webp
system:
  description:
    value: >-
      <p><strong>Category</strong>: Taijutsu, Rare</p><p><strong>Prerequisite</strong>: 8-Inner Gates: Seimon, Taijutsu
      Ability Score of 18+, Level 10+.</p><hr /><p>You have learned more masterful technique of the Eight Inner Gates,
      learning to unlock 3 more powerful gates of Inner power; Shomon, Tomon and Keimon.</p><p>You must currently be
      gaining the benefit of Seimon, in order to activate Shomon.</p><p>You must complete a rest to gain the benefit of
      any Gate granted by this feat a second time.</p><p>If you would attempt to gain the benefit of a Gate granted by
      this feat a second time without taking a rest, you instead must spend 2 hit die to do so, which are not recovered
      until you complete a full- rest.</p><p>When you would end the activation of or be forced to end any 8-Inner gate,
      you gain all Ranks of any Fatigue and Weakened listed.</p><p>After ending any gate granted by this feature, you
      lose one rank of Fatigue every 1 hour;</p><ul><li><p>Shomon.</p><ul><li><p>Str: +2 o Con: +2</p></li><li><p>Speed:
      +10</p></li><li><p>+2 Rank of Fatigue</p></li></ul></li><li><p>Tomon.</p><ul><li><p>Str: +4 o Speed:
      +10</p></li><li><p>AC: +1 o Extra Action.</p></li><li><p>+1 Rank of
      Fatigue</p></li></ul></li><li><p>Keimon.</p><ul><li><p>Str: +4 o Con: +2</p></li><li><p>Spend 2 hit Dice,
      regaining the result. This can only be used once per short rest.</p></li><li><p>+2 Rank(s) of
      Fatigue.</p></li></ul></li></ul><p></p><img src="systems/n5eb/assets/content/cheat-sheets/fatigue-chart.webp"
      /><p></p>
