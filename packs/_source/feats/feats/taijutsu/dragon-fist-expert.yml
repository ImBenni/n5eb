name: Dragon Fist Expert
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu</p><p>Prerequisite: Dragon Fist Stance, Level 4+</p><p>You have trained under the teachings
      of the land of Dragons either directly or by descension, gaining the following benefits:</p><p>• Increase your
      Strength or Dexterity score by 1, to a maximum of 20.</p><p>• While you are in the Dragon Fist Stance, your
      [Unarmed Damage] die becomes a d8.</p><p>• Taijutsu you know, that requires the Dragon Fist Stance to be cast, and
      up to two additional Taijutsu you know, that requires you to make no more than two attacks become Dragon Fist
      Taijutsu.</p><p>Dragon Fist Taijutsu you cast gains the Hungry Dragon trait.</p><p></p><p>- Hungry
      Dragon.</p><p>Once per casting, when you deal your [Unarmed Damage] to a hostile creature, you steal a fraction of
      their chakra.</p><p>You regain Temporary Chakra points equal to half the result of one of your [Unarmed Damage]
      die rolled (if more than 1.).</p><p>This temporary Chakra lasts until the beginning of your next turn.</p><p></p>
