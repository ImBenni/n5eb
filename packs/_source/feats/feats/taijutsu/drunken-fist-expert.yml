name: Drunken Fist Expert
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu</p><p>Prerequisite: Drunken Fist Stance, Level 4+</p><p>You have trained under the teachings
      of the Monks of inebriation either directly or by descension, gaining the following benefits: </p><p>• Increase
      your Strength or Dexterity score by 1, to a maximum of 20.</p><p>• While you are in the Drunken Fist Stance, your
      [Unarmed Damage] die becomes a d8.</p><p>• Taijutsu you know that requires the Drunken Fist Stance to be cast, and
      up to two additional Taijutsu that you know, that requires you to make no more than two taijutsu attacks become
      Drunken Fist Taijutsu.</p><p>Drunken Fist Taijutsu you cast gain the Gin &amp; Tonic trait.</p><p></p><p>- Gin
      &amp; Tonic.</p><p>Once per casting, when you deal your [Unarmed Damage] to a hostile creature, you are able to
      slip a taste of a special drink enhancing the unpredictability of your attacks.</p><p>Until the beginning of your
      next turn, creatures within 10 feet of you cannot gain feature, jutsu or trait-based bonuses to their melee attack
      rolls targeting you.</p><p></p>
