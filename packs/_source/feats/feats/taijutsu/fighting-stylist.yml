name: Fighting Stylist
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu </p><p>You adopt a particular style of fighting as your specialty, gaining the following
      benefits: </p><p>• Increase your Strength or Dexterity score by 1, to a maximum of 20.</p><p>• Choose one of the
      Fighting Stances from Chapter 13.</p><p>• If you possess a Fighting Stance from a Clan Feature you possess, you
      still count as being in this Clan Fighting Stance while using a different Fighting Stance, for the purpose of
      casting jutsu only (and vice versa).</p><p> This does not allow you to qualify for features or feats that are
      dependent on you being in a specific stance.</p><p>• You can select this feat multiple times.</p><p> You can't
      take a Fighting Stance option more than once, even if you later get to choose again.</p><p></p>
