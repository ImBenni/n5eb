name: Lancer Training
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Bukijutsu</p><p>You have trained under the teachings of the land of Reeds either directly or by
      descension, gaining the following benefits:</p><p>• Increase your Strength or Constitution score by 1, to a
      maximum of 20.</p><p>• You gain proficiency in one set of equipment as these weapons become known as Lance
      Weapons.</p><p>- Spears, Naginata &amp; Battle Armor o Chained Spear, Sasumata &amp; Battle Armor </p><p>• Lance
      Weapons gain the Deadly 2 and increase their rank of Reach by +1.</p><p>• You cannot be disarmed of your Lance
      Weapon and they cannot be broken while you are wielding them.</p><p>• When you take the attack action using a
      Lance weapon, you can in place of one of the attacks made with said action, make a Lance Attack.</p><p>Lance
      Attacks are weapon attacks that target all creatures in a cone directly in front of you with a length equal to
      your weapons range as your repeated stab forward, comparing the single attack roll with all targets AC, dealing
      weapon damage as normal.</p><p></p>
