name: Ninja Slayer
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu </p><p>You have practiced techniques useful in melee combat against Shinobi Ninjutsu &amp;
      Genjutsu, gaining the following benefits: </p><p>• When a creature within your weapons range would casts a
      Ninjutsu or Genjutsu, you can use your reaction to make an attack of opportunity using your weapon targeting the
      triggering creature.</p><p>• When you damage a creature that is concentrating on a Jutsu, that creature has
      disadvantage on skill checks made to maintain concentration.</p><p>• You have advantage on saving throws against
      Ninjutsu &amp; Genjutsu cast by creatures within 10 feet of you.</p><p></p>
