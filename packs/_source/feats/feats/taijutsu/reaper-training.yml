name: Reaper Training
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Bukijutsu </p><p>You have trained under the teachings of the land of Graves either directly or by
      descension, gaining the following benefits: </p><p>• Increase your Strength or Dexterity score by 1, to a maximum
      of 20.</p><p>• You gain proficiency in one set of equipment as these weapons become known as Reaper
      Weapons.</p><p>  - Kama, Kusarigama, Scythe &amp; Shinobi Jacket.</p><p>  - Triple-Bladed Scythe &amp; Synthetic
      Weave.</p><p>• Reaper Weapons increase their Deadly rank by +2 and their Critical rank by +1.</p><p>• You cannot
      be disarmed of Reaper Weapon and they cannot be broken while you are wielding them.</p><p>• When you take the
      attack action using a Reaper weapon, in place of one attack made with your attack action you can make a Reaping
      Attack.</p><p> Reaping Attacks are weapon attacks that inflict one rank of Lacerated on a successful hit that
      deals weapon damage to a creature's hit points.</p><p></p>
