name: Ronin Training
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Bukijutsu </p><p>You have trained under the teachings of the land of Iron either directly or by
      descension, gaining the following benefits: </p><p>• Increase your Strength or Dexterity score by 1, to a maximum
      of 20.</p><p>• You gain proficiency in one set of equipment as these weapons become known as Ronin
      Weapons.</p><p>  - Hand Crossbow, Chokuto &amp; Ronin Armor.</p><p>  - Short Bow, Katana &amp; Ronin
      Armor.</p><p>  - Long Bow, Tachi &amp; Ronin Armor.</p><p>• Ronin Weapons gain Blocking 1, Lethal +1 and
      Multiattack weapon properties.</p><p>• You cannot be disarmed of your Ronin Weapon and they cannot be broken while
      you are wielding them.</p><p>• When you take the attack action using a Ronin Weapon, in place of one attack made
      with your attack action you can make a Ronin Attack.</p><p> Ronin Attacks are weapon attacks that deal more damage
      the less armor a creature has.</p><p> On a hit against a creature with medium armor, deal an additional 1d4
      damage.</p><p> On a hit against a creature with Chakra armor, deal an additional 1d6 damage.</p><p> On a hit
      against a creature with Light armor, deal an additional 1d8 damage.</p><p> On a hit against a creature with no
      armor, deal an additional 1d10 damage.</p><p></p>
