name: Serpent Fist Expert
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu</p><p>Prerequisite: Serpent Fist Stance, Level 4+</p><p>You have trained under the teachings
      of the serpent masters in the land of grass, gaining the following benefits:</p><p>• Increase your Strength or
      Dexterity score by 1, to a maximum of 20.</p><p>• While you are in the Serpent Fist Stance, your [Unarmed Damage]
      die becomes a d8.</p><p>• Taijutsu you know that requires the Serpent Fist Stance to be cast, and up to two
      additional Taijutsu that you know, that requires you to make no more than two taijutsu attacks become Serpent Fist
      Taijutsu.</p><p>Serpent Fist Taijutsu you cast gain the Rattling trait.</p><p></p><p>- Rattling.</p><p>When a
      hostile creature would trigger an attack of opportunity from you, cast a jutsu that requires handsigns within 5ft
      of you or stand up from prone while adjacent to you, you can cast this jutsu, as a reaction.</p><p></p>
