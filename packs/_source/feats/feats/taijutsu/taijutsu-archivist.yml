name: Taijutsu Archivist
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu </p><p>Prerequisite: Level 4+ </p><p>Your Focus in the heat of Combat and mastery of Martial
      arts, allow you weave taijutsu together with much greater skill.</p><p> You gain the following benefits: </p><p>•
      Increase your Strength or Dexterity score by 1, to a maximum of 20.</p><p>• You learn an additional taijutsu that
      you qualify for.</p><p> This does not count against your Jutsu Known.</p><p>• The next time you would hit 5th,
      9th, or 13th level, you learn one additional Taijutsu of 1 rank lower than your highest known jutsu rank </p><p>•
      If you take this feat after you have passed the previously stated levels, you instead gain 1 additional D-Rank if
      passed 5th level, 1 additional C-Rank if passed 9th level, and one additional B-Rank if passed 13th
      level.</p><p></p>
