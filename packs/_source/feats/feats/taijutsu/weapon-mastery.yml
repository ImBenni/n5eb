name: Weapon Mastery
type: feat
_id: hnQvWBMUmCW3Cyzj
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu </p><p>You have practiced extensively with a single weapon, expanding your capabilities with
      it greatly, gaining the following benefits: </p><p>• Increase your Strength or Dexterity score by 1, to a maximum
      of 20.</p><p>• Select one weapon, with which you are proficient.</p><p> Then select one weapon property from the
      following list.</p><p> The chosen weapon gains the chosen weapon property while you are wielding it or increases
      the rank of the chosen weapon property by +1 while you are wielding it.</p><p>  - Critical (Max 3) </p><p>  -
      Deadly (Max 3) </p><p>  - Tactical o Winding </p><p>• You can take this feat more than once, picking the same
      weapon and property, different weapon, different property or different weapon, same property.</p><p></p>
