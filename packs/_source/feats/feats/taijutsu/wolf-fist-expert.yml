name: Wolf Fist Expert
type: feat
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p>Category: Taijutsu</p><p>Prerequisite: Wolf Fist Stance, Level 4+</p><p>You have trained under the teachings of
      the Land of Wolves either directly or by descension, gaining the following benefits:</p><p>• Increase your
      Strength or Dexterity score by 1, to a maximum of 20.</p><p>• While you are in the Wolf Fist Stance, your [Unarmed
      Damage] die becomes a d8.</p><p>• Taijutsu you know that requires the Wolf Fist Stance to be cast, and up to two
      additional Taijutsu that you know, that requires you to make no more than two taijutsu attacks become Wolf Fist
      Taijutsu.</p><p>Wolf Fist Taijutsu you cast gain the Howl trait.</p><p></p><p>- Howl.</p><p>Once per casting, when
      you deal [Unarmed Damage] to a creature, all allies within 15 feet of you, excluding yourself are inspired by your
      aggressive assault, gaining a Xd4 bonus to the next instance of damage dealt to the same creature as the result of
      a Taijutsu attack, before the beginning of your next turn. (X = your proficiency bonus.)</p>
