name: Dragon Fist Stance
type: feat
img: icons/skills/melee/unarmed-punch-fist-yellow-red.webp
system:
  description:
    value: >-
      <p>You have learned to enter a powerful stance, becoming more defensive focused on avoiding and blocking
      damage.</p><p> • Your [Unarmed Damage] die becomes a d6.</p><p> • While in this stance, you gain the Reinforced
      armor property if you weren't already benefiting from it.</p><p> Your Reinforced value is equal to your Taijutsu
      ability modifier.</p><p> • As a bonus action, select one creature you can see or hear within 30 feet of
      you.</p><p> You gain a +2 bonus to your AC until the start of your next turn vs the select creature.</p><p></p>
