    value: >-
      <p>You have learned how to fight with the precision and ferociousness of a serpent: You fight with your fingers
      held to a point as your stab into an opponent's pressure points like needles during acupuncture.</p><p>• Your
      Unarmed damage becomes a d6 and piercing.</p><p>• Your unarmed attacks gain the Tactical weapon property </p><p>•
