name: Polearm Stance
type: feat
img: icons/skills/melee/weapons-crossed-swords-yellow-teal.webp
system:
  description:
    value: >-
      <p>Requirement: Melee, Polearm Weapon Group You master the use of weapons with a long reach, capable to striking
      enemies at a slight distance from you.</p><p>You gain the following benefits;</p><p>• When you take the Attack
      action, you can use a bonus action to make a one melee weapon attack with the opposite end of the
      weapon.</p><p>The weapon's damage die for this attack is a one-step lower than the current damage die of the
      weapon.</p><p>(D12&gt;D10&gt;D8&gt;D6&gt;D4) </p><p>• Other creatures provoke an opportunity attack from you when
      they enter or exit your reach.</p><p></p>
