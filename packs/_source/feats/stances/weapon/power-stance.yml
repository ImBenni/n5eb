system:
  description:
    value: >-
      <p>Requirement: Melee, Power Weapon Group You master the art of Power attacks.</p><p> All weapons with the ability
      to shatter bones and crack stone are treated s extensions of your fists and feet.</p><p> You gain the following
      benefits: </p><p>• When you take the Ready action on your turn and make a melee attack as part of that readied
      action, on a hit, the target creature is knocked prone.</p><p> Attempting to stand from being knocked prone in
      this way costs an Action, not movement.</p><p> • Whenever you have scored a critical hit with a melee weapon
      attack that deals damage, the target gains 1 rank of bruised.</p><p></p>
