name: Sharpshooter Stance
type: feat
img: icons/skills/melee/weapons-crossed-swords-yellow-teal.webp
system:
  description:
    value: >-
      <p>Requirement: Ranged Weapon You can make shots that others find difficult.</p><p>You gain the following
      benefits; </p><p>• As a bonus action you may target a creature you can see within your weapons range.</p><p>The
      next weapon attack made against the target creature is made at advantage and ignores up to three-quarters
      cover.</p><p>• When you are targeted with a ranged weapon attack that you can see, you may as a reaction, make a
      ranged weapon attack vs the triggering creatures ranged weapon attack result.</p><p>If your result is higher than
      theirs, you divert their attack by knocking their attack out of the sky or off course.</p><p></p>
