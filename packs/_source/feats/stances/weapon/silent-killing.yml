system:
  description:
    value: >-
      <p>Requirement: Deadly, Hidden or Lethal Weapon property You have learned how to strike with ruthless efficiency
      while producing no sound when you bring about death.</p><p> You gain the following benefits while you are heavily
      obscured or hidden from a creature;</p><p>• Weapon attacks you make against a creature you are heavily obscured or
      hidden from ignore half of the targets DR (damage reduction).</p><p> • The first weapon attack you make against a
      creature you are hidden from grants you 1 rank of Mastery to the attack.</p><p></p>
