system:
  description:
    value: >-
      <p>Requirement: Flail Weapon Group You have learned how to fight with chains, wires and whips meant to overwhelm
      your enemy with arcing strikes.</p><p> You gain the following benefits.</p><p> • Your weapon gains the Grapple
      property if it did not already have it.</p><p> • When you deal damage with a weapon attack, you can move the
      target creature 5ft in any direction of your choice.</p><p> • When making a weapon attack, targeting a creature
      grappled or restrained by your weapon, increase your [Weapons Damage] die by 1 step.</p><p>
      (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p>
