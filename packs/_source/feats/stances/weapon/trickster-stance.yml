system:
  description:
    value: >-
      <p>Requirement: Finesse, Trip, Thrown or Hidden Weapon property You have become a hazard on the battlefield all on
      your own, mastering hit and run tactics.</p><p> You gain the following benefits: </p><p>• When you take the Hide
      action, if you have an explosive tool, you can, as part of the same action used to hide, set that explosive tool.
      </p><p>(This does not count for explosive tools that takes longer than an Action to set or detonate.) </p><p>You
      can choose to spend your reaction to trigger/detonate this explosive tool.</p><p> This does not reveal your
      location if you are unseen or hidden.</p><p> • When you would score a critical hit against a creature, you can
      Dash as part of the same action used to make the attack and score the attack.</p><p></p>
