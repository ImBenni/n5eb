        <p>FIRE RELEASE Fire Release is the most common of the five nature transformations in the leaf village and land
        of fire, but those who can use it are able to knead chakra and set fire to anything. Fire Release is almost
        always used offensively and has very few defensive applications. Some shinobi use it to damage massive areas and
        harm large groups of foes. Fire Release is commonly exhaled from the user's mouth. Although Fire Release has
        naturally amazing power, it suffers from high chakra cost and is difficult to control flames after use.</p>

        <p>Fire Release is naturally strong against Wind Release and weak against Water Release Prerequisite: You must
        have the Fire Release Affinity to learn jutsu with the Fire Release Keyword.</p>

