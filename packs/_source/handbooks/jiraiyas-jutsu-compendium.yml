        <p>Classification: Genjutsu Rank: C-Rank Casting Time: 1Action Duration: Special Keywords: Genjutsu, Auditory,
        Unaware Description: You suggest a course of activity (limited to a sentence or two) and use genjutsu to
        influence a creature you can see within range that can hear and understand you.</p>

        <p>Creatures that can't be Charmed are immune to this effect.</p>

        <p>The suggestion must be worded in such a manner as to make the course of action sound reasonable.</p>

        <p>Asking the creature to stab itself, throw itself onto a spear, immolate itself, or do some other obviously
        harmful act ends the jutsu. The target must make a Wisdom Saving Throw.</p>

