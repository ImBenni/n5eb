        <h2>Jutsu Slots and Casting</h2>

        <p>Summons, unlike normal shinobi utilize their chakra in a vastly different way to players. Summons utilize a
        simplified system of casting called Jutsu Slots.</p>

        <p>Jutsu Slots are basically a limited form of Jutsu casting, where, while summons can have whatever jutsu they
        are permitted to have, they can only cast as many combinations of their selected jutsu a number of times per
        summoning, equal to their current slot limit. Jutsu's of different ranks cost a different number of slots equal
        to its rank. D-Rank: 1 Slot, C-Rank: 2 Slots, etc., up to SRanks: 5 slots.</p>

        <p>Summons with lower Toughness values tend to have higher Jutsu slots for casting.</p>

        <p>Summons only have one concentration slot.</p>

        <p>Summons are incapable of casting jutsu with the Combination keyword alone. They must always cast as part of a
        group, and they themselves cannot be the initial caster of such jutsu. They can only provide aid and assist in
        casting.</p>

        <h2>Summon Duration</h2>

        <p>A summon can remain active for as long as it has Jutsu slots. Summons cannot regain spent Jutsu slots until
        they complete a long rest in its home plane or region.</p>

        <p>Resting with its summoner will only restore its Hit Points, but never restoring its spent jutsu slots. When a
        summon has spent all of its available Jutsu slots, it is immediately unsummoned to their home plane where they
        recover both their Hit Points and spent Jutsu slots over the course of 8 hours.</p>

        <p>If it is summoned before a full 8 hours passes, it regains no jutsu slots or Hit Points as their rest was
        interrupted. A summon with free will, or one who is ordered to, can unsummon itself as a full-round action.</p>

        <h2>Summon Hit Point Recovery</h2>

        <p>As stated in the above section, summons recover Hit Points when they rest. Due to a summons lack of Hit Die,
        instead of rolling to calculate their Hit Points recovered, summons always recover the following based on the
        type of rest taken in their summoner's world; Short Rest. They recover their Toughness times half their
        level.</p>

        <p>Long Rest. Half of their maximum Hit Points.</p>

        <h2>Summon Roles</h2>

        <p>Summons, much like adversaries encompass different roles, based on the tribe they hail from. Most summon
        tribes generally have two distinct roles their members embody. When developing a Summon you will have a choice
        between two different Roles. These roles will help identify what this particular summons goal is in combat.</p>

        <p>The following are the list of roles a summon can have and what those roles mean for the summoned
        creature;</p>

        <ul><li>Striker: Melee focused; combat summon. This</li></ul>

        <p>summon has the Multiattack feature, being able to make two attacks using its natural or held weapons.</p>

        <ul><li>Caster: Ranged caster, combat summon. This</li></ul>

        <p>summon gains additional Jutsu Slots, equal to its rank. (D-Rank/C-Rank: +1, B-Rank/A-Rank: +2, SRank: +3)</p>

        <ul><li>Controller: Debuff/crowd control, combat</li></ul>

        <p>summon. This summon gains a bonus to their Save DC equal to their rank when summoned (D-Rank/C-Rank: +1,
        SUMMONS SPECIAL SENSES B-Rank/A-Rank: +2, S-Rank: +3) Below are a list of special senses that a summon may</p>

        <ul><li>Defender: Defensive, combat summon. This have and what they do if they are not described in
        the</li></ul>

        <p>summon gains a bonus to its AC equal to their Shinobi handbook. rank when summoned. (D-Rank/C-Rank: +1, B-
        Keen Smell. Advantage on Perception Checks requiring Rank/A-Rank: +2, S-Rank: +3) Smell</p>

        <ul><li>Lurker : Stealth based; combat summon. This Keen Hearing. Advantage on Perception Checks</li></ul>

        <p>summon prioritizes surprise attacks and stealth requiring sound. tactics. This summon gains the Lethal Attack
        Keen Sight. Advantage on Perception Checks requiring trait, being able to deal additional damage, vision. when
        they score an attack on a surprised creature. Different tribes have alternative conditions to trigger this
        effect. It costs a number of Jutsu Slots equal to the Summons Rank to trigger this effect. (D-Rank/C-Rank: 1
        Slot, B-Rank/A-Rank: 2 Slots, S-Rank: 3 Slots)</p>

        <ul><li>Supporter: Support based combat summon.</li></ul>

        <p>This summon increases healing done or Temporary Hit Points gained by +X dice, equal to their rank when
        summoned. (D-Rank/CRank: +1, B-Rank/A-Rank: +2, S-Rank: +3)</p>

        <h2>Commanding a Summon</h2>

        <p>Summons are powerful assets in battle. Though due to this Strength, they have certain limitations placed on
        them. Summons do not have the same suite of actions as a PC.</p>

        <p>Summons have 1 Action and 1 Reaction per round.</p>

        <p>They can spend their action to cast jutsu or use skills or abilities or activities that normally cost a Bonus
        action.</p>

        <p>Effects and abilities that would grant them an additional actions do not work on them.</p>

        <p>You can command a summon as your Bonus action.</p>

        <p>When you do you can give it directions on what to do with its movement and Action. Summons do not need to be
        commanded to use their Reaction, if they have one.</p>

        <p>They also do not need to be commanded to move, if you have not commanded them to do such. If you do not issue
        a summon a command, it can only move and take the dodge action.</p>

        <h2>Death and Injury</h2>

        <p>When a summon is reduced below 0 Hit Points, it is defeated and returns to its original plane of
        existence.</p>

        <p>Summoned creatures will rest and recover naturally while in their home plane, and when summoned again will be
        summoned with their current HP and CP, meaning summoning one too quickly after it was defeated will summon it in
        an injured state.</p>

        <p>When a summons HP reaches 0, if it would take additional damage equal to half its maximum HP, it starts dying
        (as normal characters do), but has a chance each round to return to its home plane, where it automatically
        stabilizes and starts recovering naturally. (Roll 1d20, on a roll 15 or greater they unsummon themselves).</p>

        <p>If a summon would die they cannot be summoned again, and most likely the structure of the tribe changes.</p>

        <p>If a summon does not return to its home plane, it dies and can never be summoned again. Its body does not
        return to its home plane. If the summoner is slain, a summoned creature without free will return to its home
        plane.</p>

        </section>

