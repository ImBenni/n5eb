        <div class="n5eb-source-chip">Source: Jiraiya's Jutsu Compendium, PDF pages 260-282</div>

        <p>UKIJUTSU Bukijutsu (Literally meaning: sword hidden in the hand techniques) pertains to techniques that
        entail the throwing of shuriken, Kunai, Senbon, or any other number of hand-held weapons. Bukijutsu can be used
        in combination with Taijutsu, ninjutsu, and/or chakra flow in order to create more devastating techniques
        Special Effect: Chain. Jutsu with this keyword are a link in the dance of steel, and as such have steps: 1, 2,
        and 3. Jutsu with the Chain X keyword have different effects when cast in a chain. The first jutsu you cast with
        the Chain keyword is considered Chain 1. The next is considered Chain 2, and then Chain 3. Once you cast a Chain
        3, your chain resets to 0. You cannot cast a Jutsu with this keyword that has the same name, more than once per
        chain. Your Chain value cannot be raised outside your turn, and casting a Jutsu without the chain keyword
        interrupts your chain, resetting it to 0.</p>

        <p>D-RANK: 2-CROSS STRIKE Classification: Bukijutsu 1 -SHOT CRUSHING BLOW Rank: D-Rank Casting Time: 1 Action
        Range: Weapon Range Rank: D-Rank Duration: Instant Components: W (Melee Bludgeoning), M Duration: Instant Cost:
        4 Chakra Components: W (Melee Bludgeoning), M Keywords: Bukijutsu Cost: 4 Chakra Description: You perform a
        double striking slash with Keywords: Bukijutsu your weapon, attacking two different angles forming an
        Description: You perform a rising strike with your &quot;X&quot; at the intersections of the attack. Make two
        Melee weapon striking and crushing the target from below. Taijutsu Attacks using your weapon dealing your Make a
        Melee Taijutsu Attack using your weapon, Weapon's Damage. On each hit, the target must also dealing your
