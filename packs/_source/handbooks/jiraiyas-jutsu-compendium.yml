        <div class="n5eb-source-chip">Source: Jiraiya's Jutsu Compendium, PDF pages 100-117</div>

        <p>WATER RELEASE Water Release jutsu are most easily performed using existing water sources, such as lakes or
        rivers. Users can also create water within their bodies with chakra, which they expel from their mouths, though
        this is generally regarded as a testament of skill.</p>

        <p>Water Release is typically used offensively, doing battering damage because of the sheer volume of water or
        slicing damage because of the water's high pressure. Water Release can be used to trap targets, such as
        imprisoning them with dense water or ensnaring them with sticky water. Water is a common option, with users
        surrounding themselves with water to be protected from harm. Alternatively, users can hide themselves from
        opponents with thick mist to obscure vision or water droplets to render the user invisible.</p>

        <p>Water Release is naturally strong against Fire Release and weak against Earth Release.</p>

        <p>Prerequisite: You must have the Water Release Affinity to learn jutsu with the Water Release Keyword.</p>

        <p>D-RANK: WATER RELEASE: ENCOURAGING DROPLETS: THIRST</p>

