        <div class="n5eb-source-chip">Source: Jiraiya's Jutsu Compendium, PDF pages 118-134</div>

        <p>LIGHTNING RELEASE Lightning Release jutsu are the most complicated of the 5 nature transformations to
        produce. Users must vibrate their chakra to create sparks and eventually jolts of lightning, guiding and
        controlling it with chakra. Users of Lightning Release, usually cannot create lightning inside their bodies
        instead opting to create it on the surface of their skin and focus it into points or use their own lightning to
        guide natural lightning produced in thunder clouds, though this is very difficult and is generally regarded as a
        testament of true skill is completed. Lightning Release is typically used offensively, doing Piercing Damage
        when applied to a weapon, or doing massive electrical damage when hitting a creature. Lightning Release can be
        used to trap targets, such as ensnaring them with static electricity numbing their body and preventing them from
        moving.</p>

        <p>Defensively, Lightning is an uncommon option, with users surrounding themselves with Lightning to be
        protected from harm, although this is very difficult as lightning generally cannot be made uniform, but it is a
        testament to the users Nature Change skill.</p>

        <p>Lightning Release is naturally strong against Earth Release and weak against Wind Release.</p>

        <p>Prerequisite: You must have the Lightning Release Affinity to learn jutsu with the Lightning Release
        Keyword.</p>

