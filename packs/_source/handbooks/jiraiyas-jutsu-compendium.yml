        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Jiraiya's Jutsu Compendium, PDF pages 4-49</div>

        <p>INJUTSU NON-ELEMENTAL Non-Elemental Ninjutsu are ninjutsu that do not require Nature Release mastery or
        investment. These jutsu are more focused on versatility and chakra manipulation and control, such as increasing
        your movement speed by pooling chakra to the soles of your feet before taking off. Although a lot of these
        techniques are not as complicated as using a nature transformation, they are still extremely useful when on
        missions not requiring high level combat. There are Higher level Non-Elemental Jutsu such as Rasengan, the
        pinnacle chakra molding without elemental chakra. Non-Elemental Ninjutsu have no advantages or disadvantage
