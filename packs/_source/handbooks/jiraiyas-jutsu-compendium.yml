        <div class="n5eb-source-chip">Source: Jiraiya's Jutsu Compendium, PDF pages 50-66</div>

        <p>EARTH RELEASE Earth Release is one of the basic elemental nature transformation techniques and allows the
        user to manipulate the surrounding earth for offensive and defensive purposes or create it; be it dirt, mud, or
        rock.</p>

        <p>Earth Release techniques have the ability to change the strength and composition of the earth from being as
        hard as metal to as soft as clay as well as manipulating their density, making them heavier or lighter. This
        includes allowing the user to travel through ground and rock in various ways which can be essential for both
        transportation and for setting up attacks or creating defenses or for offence. Indeed, this makes earth
        techniques one of the most versatile of the elemental techniques. Pre-existing earth is not necessary though,
        for the user can create it with their own chakra.</p>

        <p>Earth Release is naturally strong against Water Release and weak against Lightning Release.</p>

        <p>Prerequisite: You must have the Earth Release Affinity to learn jutsu with the Earth Release Keyword.</p>

        <p>Special Effect: Some Earth Release Jutsu create or interact with Quake Shards, gaining unique benefits and
        allowing for synergy with other Earth Release Jutsu, as long as the Quake Shard was created by you! Also, all
        structures and Constructs made by a Ninjutsu with the Earth Release Keyword have Resistance to Cold Damage and
        Vulnerability to Lightning Damage, even if the jutsu does not specifically state this, including creatures that
        temporarily count as Constructs. While Constructs made to intercept damage also have these Vulnerabilities and
        Resistances, they only apply to the Construct, any penetrating damage is taken as normal.</p>

