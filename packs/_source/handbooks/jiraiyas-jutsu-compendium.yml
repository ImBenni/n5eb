        <p>ENJUTSU O ne of the main jutsu categories which uses chakra. Unlike ninjutsu, the effects of Genjutsu are not
        real, being only sensory illusions experienced by those who fall victim to it. Genjutsu falls under the broad
        category of Yin Release. A Genjutsu is created when a ninja controls the chakra flow of a target's cerebral
        nervous system, thereby affecting their five senses; this is frequently used to create false images and/or trick
        the body into believing it has experienced physical pain.</p>

        <p>Special Effects: Genjutsu isn't tangible and cannot be physically blocked. Barriers, blanket Damage
        Reduction, Resistance and Immunity from Jutsu cannot block or reduce damage from Genjutsu unless granted by a
        Genjutsu. Most Genjutsu that require a Saving Throw will have the effects of a Critical Success, Success,
        Failure or Critical Failure listed A creature who Critically Fails, follows the effect of only a Critical
        Failure, not a Failure as well, unless otherwise specified. The following are the breakdowns for how to
        calculate each.</p>

        <ul><li>Critical Failure: Saving throw result is 5 or more, lower than the Save DC.</li><li>Failure: Fail to
        meet or beat the Save DC.</li><li>Success: Beat the Save DC.</li><li>Critical Success: Beat the Save DC by 5 or
        more</li></ul>

        <p>E-RANK:</p>

