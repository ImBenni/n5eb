  - name: Tsunade's
    type: text
    _id: v9ONUcVkobCptYyE
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <article class="n5eb-handbook n5eb-handbook-amber ">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">3.10 Changelog</p>

        <h1>Tsunade's</h1>

        <p class="n5eb-handbook-subtitle">3.02 to 3.10 changes grouped by source book.</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img src="systems/n5eb/assets/content/handbooks/changelog-cover.webp"
        alt="Tsunade's" /></figure>

        </header>

        <section class="n5eb-related">

        <h2>Related Foundry Entries</h2>

        <div class="n5eb-related-grid"><div class="n5eb-related-card"><span
        class="n5eb-related-title">General</span><span
        class="n5eb-related-meta">Feat</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.clan.Item.9rHYPVxGMR5694YE]{Aburame}</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Aburame</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.clan.Item.svtStocIxACTBCd7]{Bakuton}</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Bakuton</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.clan.Item.z0WFONqYw7sunKlF]{Ranton}</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Ranton</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.clan.Item.ZhdyWXUWSQu2AWDB]{Chinoike}</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Chinoike</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.clan.Item.duGJoQZnACLF1Spa]{Futton}</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Futton</span><span
        class="n5eb-related-meta">Clan</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.clan.Item.8RqOdDBEv4lrsxjr]{Hebi}</span><span
        class="n5eb-related-meta">Clan</span></div></div>

        </section>

        <section class="n5eb-change-group">

        <h2>General</h2>

        <ul><li>Clan dice options which reduce saves or add damage are now capped at 3 dice.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Aburame</h2>

        <ul><li>Chakra Consumption/Insect Focus was completely replaced by a reworked Insect Focus with additional
        scaling bug choices.</li>

        <li>Insect Sphere now uses Strength for both saves, and damage increased to d6s.</li>

        <li>Parasitic Destruction now inflicts Envenomed rather than Sealed.</li>

        <li>Spindle Formation was replaced with the new jutsu Parasitic Touch.</li>

        <li>Insect Clones concentrating on them is now free, and they are allowed to concentrate on jutsu.</li>

        <li>Insect Jamming was replaced with Volatile Swarm.</li>

        <li>Parasitic Giant Insect is now a single burst of damage and conditions, whose detonation time can be
        altered.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Bakuton</h2>

        <ul><li>Art Is An Explosion now increases shrapnel dice by +1 size.</li>

        <li>Concussive Blasts is limited to 2 shrapnel dice per cast. The 18th-level feature specifies that cones,
        cubes, and spheres have their sizes increased.</li>

        <li>Clay Chase Down only affects a creature once per casting.</li>

        <li>Clay Birds now concusses instead of knocking prone and blinding.</li>

        <li>Atomic Missile now only affects non-equipped weapons and armor.</li>

        <li>Fury now only affects armor DR.</li>

        <li>Clay Flight had its HP halved, and detonate is an action.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Ranton</h2>

        <ul><li>Storming Rain now gives only 1 resistance.</li>

        <li>Secondary Discharge special cost is now the original jutsu's base cost.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Chinoike</h2>

        <ul><li>Sanguine Prowess HP spent now scales with jutsu rank.</li>

        <li>Ketsuryugan necrotic damage immunity moved to 11th level; action and reaction effects were revised.</li>

        <li>Blood Pact blood patrons were renamed Blood Bonded Allies.</li>

        <li>Bloodletting Weaponry upcasts were altered significantly, with the base extra attack moved to S-rank.</li>

        <li>Blood Daggers additional daggers on upcast were removed in exchange for a multi.</li>

        <li>Red Death casting time changed to special, as a bonus action or free action if used as part of Blood
        Daggers.</li>

        <li>Blood-Clot Strike is now contested against an actual check instead of a passive DC.</li>

        <li>Genjutsu Numbness increased range and added concentration.</li>

        <li>Sanguine Adept changed in accordance with Sanguine Prowess.</li>

        <li>Efficiency Ketsuryugan no longer gives Dazzled immunity.</li>

        <li>Tethered Plasma changed significantly.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Futton</h2>

        <ul><li>Corrosive Aura was removed, as it was supposed to be replaced by Corrosive Pressure.</li>

        <li>Boiling Power damage reduced to 2d6.</li>

        <li>Broiling Rage now gives only 1 resistance.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Hebi</h2>

        <ul><li>Adaptive Body Camouflage bonus reduced to -3, and cannot stack with normal Body Camouflage.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Hoshi</h2>

        <ul><li>Star Chakra jutsu cast with star chakra can be dispelled by jutsu of equal rank, and their clash bonus
        is only half Constitution modifier.</li>

        <li>Hypnotic Dance now only charms on a critical failure.</li>

        <li>Star Chakra Resilience temporary HP reduced to twice the jutsu's rank rather than thrice it.</li>

        <li>Cosmic Pressure can no longer charm.</li>

        <li>Cosmic Kujaku no longer grants a bonus to saves against ninjutsu.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Hyuga</h2>

        <ul><li>8-Trigrams Spiraling Heaven Palms only ignores DR with Hyuga taijutsu and Gentle Fist unarmed
        strikes.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Hanami</h2>

        <ul><li>Healing Cloak now requires concentration.</li>

        <li>Medical Fist now only grants temporary HP.</li>

        <li>Medical Fist feature Strength bonus capped, and the once per turn attack is limited to attacking with
        medical jutsu.</li>

        <li>Offensive Cloak can deal damage up to three times per turn.</li>

        <li>Refined Chakra Network now grants a reroll rather than an autopass.</li>

        <li>Improved Combat Medicine is now a level 8+ feat, and no longer increases damage.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Jiton</h2>

        <ul><li>Dust Coat starting AC increased by +1, but now only applies half your proficiency bonus and lasts until
        your next short or long rest.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Kaguya</h2>

        <ul><li>Shikotsumyaku Stance no longer grants additional attacks to Dance of the Willow.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Kuru</h2>

        <ul><li>Spiraling Dark Wall now gives resistance instead of immunity.</li>

        <li>Yang Chakra Adept lets you reroll rather than autopass.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Nara</h2>

        <ul><li>Coordinate initiative bonus removed.</li>

        <li>Shadow Possession resave is now at end of turn rather than as an action.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Namikaze</h2>

        <ul><li>Flash Step now has a duration of 1 minute and requires concentration.</li>

        <li>Swift Shield now gives only 1 resistance.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Senju</h2>

        <ul><li>Foo Dog Heads damage reduced to 4d6.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Uchiha</h2>

        <ul><li>Madara's Hatred no longer provides a bonus to saving throws.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Uzumaki</h2>

        <ul><li>Chakra Reserves is no longer a dice resource, instead allowing you to Draw Reserves as an action,
        gaining additional chakra on a successful check.</li>

        <li>Monstrous Reserves no longer doubles Wellspring of Chakra bonus chakra.</li>

        <li>Adamantine Barrier makes a creature immune after succeeding once.</li>

        <li>Uzumaki Stubbornness no longer grants an additional reaction.</li>

        <li>River Dam Seal DC reduced to 25.</li>

        <li>Adamantine Binding Chains no longer removes hand seals and halves movement, but restrains.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Tsuchigumo</h2>

        <ul><li>Spider Brood Summoning is now limited to 2 broodlings.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Shi Hou</h2>

        <ul><li>Immortal Techniques removed.</li>

        <li>Seiten Taisei removed as a feat and moved to be Shi Hou's 18th-level feature.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Shakuton</h2>

        <ul><li>Violent Slaughtering Flame DC increase cost increased to 2 motes, max motes increased to 6.</li>

        <li>Hellfire Murder base damage reduced to 6d8+6.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Shikigami</h2>

        <ul><li>Shikigami Traits now grants an additional D-rank hijutsu.</li>

        <li>Papercraft now increases the quality of created tools, scales as you level, and no longer mentions
        downtime.</li>

        <li>Divine Shikigami all effects except breaching tag now have a once per turn limit.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Shoton</h2>

        <ul><li>Crystal Soul additional concentration slots only apply for jutsu which create quake shards.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Yamada</h2>

        <ul><li>Empty Blade instead allows you to maximize damage dice on your bukijutsu.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Yuki</h2>

        <ul><li>Twin Dragon Whirlwind now grants ranged attacks disadvantage, and inflicts Chilled on those within the
        whirlwind.</li></ul>

        </section>

        </article>
