  - name: Shinobi's Handbook
    type: text
    _id: I05hb7KwX80WZf1o
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <article class="n5eb-handbook n5eb-handbook-amber ">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">3.10 Changelog</p>

        <h1>Shinobi's Handbook</h1>

        <p class="n5eb-handbook-subtitle">3.02 to 3.10 changes grouped by source book.</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img src="systems/n5eb/assets/content/handbooks/changelog-cover.webp"
        alt="Shinobi's Handbook" /></figure>

        </header>

        <section class="n5eb-related">

        <h2>Related Foundry Entries</h2>

        <div class="n5eb-related-grid"><div class="n5eb-related-card"><span
        class="n5eb-related-title">General</span><span
        class="n5eb-related-meta">Feat</span></div></div>

        </section>

        <section class="n5eb-change-group">

        <h2>General</h2>

        <ul><li>All characters start with an additional 10 HP and Chakra.</li>

        <li>Saving Throw based effects which do not directly state they affect Death Saves, do not.</li>

        <li>Negate, Counter, Dispel, and Interrupt have been codified.</li>

        <li>Kit and other DCs adjusted for Mastery.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Chapter 5: Equipment</h2>

        <ul><li>Unarmed weapons have all had their damage dice changed to 1d4, to match the unarmed keyword text.</li>

        <li>The costs of armor have been equalized across categories.</li>

        <li>The strength requirements of armor were readjusted to even numbers.</li>

        <li>Jonin/Elite Armor had their properties switched.</li>

        <li>Lethal is limited to 5 ranks.</li>

        <li>Evocation can no longer be used as a component for any jutsu.</li>

        <li>Hidden Blade gained Hidden and Finesse properties.</li>

        <li>Chili Pepper Bomb rarities beyond the base were removed.</li>

        <li>Angel's Breath no longer inflicts conditions on a success.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Chapter 7: Adventuring and Missions</h2>

        <ul><li>Downtime and Ryo payout per mission has been reduced.</li>

        <li>Learning a language now only costs 2 DT.</li>

        <li>Gaining an armor proficiency now costs 12 DT.</li>

        <li>Armor seals which increase AC can no longer stack.</li>

        <li>Medical/Elemental Seals S-rank +1 damage die no longer applies to taijutsu attacks.</li>

        <li>Researching Compounds is now an optional rule.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Chapter 8: Combat</h2>

        <ul><li>Clarified that you can normally only ever have 1 reaction per round, and cannot react to the same
        trigger more than once.</li>

        <li>All mentions of Paralyzed have been removed.</li>

        <li>All mentions of the Poisoned condition have been replaced with Envenomed.</li>

        <li>Condition language updated to have a standard condition lasting no longer than 1 minute unless otherwise
        specified.</li>

        <li>Jutsu cost doubling added to the effect multiplication list, meaning cost doublings can no longer be
        stacked.</li>

        <li>Stealth being broken by moving out of obscurement is further clarified.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Chapter 13: Customization Options</h2>

        <ul><li>The Jutsu Customization System has been temporarily removed for significant redesign.</li>

        <li>All armor feats have been removed.</li>

        <li>Medical Release: Support and Medical Release: Combat have been merged.</li>

        <li>Performer is a new skill feat for performance, allowing you to spend time playing an instrument to gain
        advantage and provide temporary HP during rests.</li>

        <li>Elite Presence now gives -1 per minute, capped at -5.</li>

        <li>Alert now just adds your full proficiency bonus to initiative.</li>

        <li>Lord of Darkness no longer automatically gives Dazzled, instead requiring a once per turn Wisdom
        save.</li></ul>

        </section>

        </article>
