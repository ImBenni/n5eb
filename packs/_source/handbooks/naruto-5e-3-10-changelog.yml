    image: {}
    text:
      format: 1
      content: >-
        <article class="n5eb-handbook n5eb-handbook-amber ">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">3.10 Changelog</p>

        <h1>Orochimaru's</h1>

        <p class="n5eb-handbook-subtitle">3.02 to 3.10 changes grouped by source book.</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img src="systems/n5eb/assets/content/handbooks/changelog-cover.webp"
        alt="Orochimaru's" /></figure>

        </header>

        <section class="n5eb-related">

        <h2>Related Foundry Entries</h2>

        <div class="n5eb-related-grid"><div class="n5eb-related-card"><span
        class="n5eb-related-title">General</span><span
        class="n5eb-related-meta">Feat</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.class.Item.Cus3fIFh3GSOLCV1]{Cooking-Nin}</span><span
        class="n5eb-related-meta">Class</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Cooking-Nin</span><span
        class="n5eb-related-meta">Class</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Cooking-Nin</span><span
        class="n5eb-related-meta">Subclass</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.class.Item.JPHQ5INKvAiKxriY]{Hunter-Nin}</span><span
        class="n5eb-related-meta">Class</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Hunter-Nin</span><span
        class="n5eb-related-meta">Class</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Hunter-Nin</span><span
        class="n5eb-related-meta">Subclass</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.class.Item.n5ebNinSpec00001]{Ninjutsu Specialist}</span><span
        class="n5eb-related-meta">Class</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Ninjutsu Specialist</span><span
        class="n5eb-related-meta">Class</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Ninjutsu
        Specialist</span><span class="n5eb-related-meta">Subclass</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.class.Item.6TxLk91QYckjBOY8]{Scout-Nin}</span><span
        class="n5eb-related-meta">Class</span></div>

        <div class="n5eb-related-card"><span
        class="n5eb-related-title">Scout-Nin</span><span
        class="n5eb-related-meta">Class</span></div></div>

        </section>

        <section class="n5eb-change-group">

        <h2>General</h2>

        <ul><li>All instances of movement speed doubling have been changed to +30 ft. increases.</li>

        <li>All classes who previously learned 15 jutsu from their class now learn 20.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Cooking-Nin</h2>

        <ul><li>War Cook now allows you to choose a cooking tool to count as a weapon type of your choice, and can be
        taken up to twice.</li>

        <li>Mega HP Up instead allows a healed creature to attempt a skill check to remove a condition.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Hunter-Nin</h2>

        <ul><li>Blade's Prey flat-footed effect clarified to give a temporary -1 AC.</li>

        <li>Greed's Shell can now be used with Heavy Armor.</li>

        <li>Vice Assassination Techniques now all require a Constitution save.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Int-Op</h2>

        <ul><li>Favored Plan no longer allows double plans, instead letting you use a Crafting or Trappers Kit check for
        passive perception and detecting hidden objects or creatures.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Ninjutsu-Specialist</h2>

        <ul><li>Potent Ninjutsu instead maximizes up to 3 damage dice on a jutsu.</li>

        <li>Fire Release Master now only affects the jutsu's original damage dice.</li>

        <li>Limitless Casting can no longer be refreshed by spending chakra dice.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Scout-Nin</h2>

        <ul><li>Absolute Authority can now be used with Heavy Armor.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Sci-Nin</h2>

        <ul><li>The Defender of Tomorrow, Today now only deals damage up to twice per turn, and only requires 1 charge
        to use.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Taijutsu Specialist</h2>

        <ul><li>Chakra Frenzy can now be used with Heavy Armor.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Weapon-Specialist</h2>

        <ul><li>Focused Efficiency was restored.</li>

        <li>Chakra Strike now scales based on jutsu rank.</li>

        <li>Chaining Adept was removed and replaced with Arsenal of War.</li></ul>

        </section>

        <section class="n5eb-change-group">

        <h2>Witch's Training Archetype</h2>

        <ul><li>Renamed the feature Witches Training, the ability to upcast a spell twice with a reaction instead of
        spending chakra, to Spellcaster.</li>

        <li>Swapped which feats gave access to the Ritual keyword and Spellcaster feature.</li></ul>

        </section>

        </article>
