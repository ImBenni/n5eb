        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 99</div>

        <p>TAIJUTSU/BUKIJUTSU CREATION RULES STEP TWO: TAIJUTSU/BUKIJUTSU PREREQUISITE(S) &amp; RESTRICTIONS The second
        step of developing your Taijutsu or Bukijutsu is to figure out the base requirements, how this new jutsu is
        activated regarding its components, and whether it will be a ranged or melee jutsu.</p>

        <p>The first step to figuring out which type of jutsu you are creating is deciding on the classification of your
        jutsu. Is it a Taijutsu, or a Bukijutsu?</p>

        <h2>@UUID[Compendium.n5eb.jutsus.Item.N24GygwnfUyX3vLe]{Taijutsu}</h2>

        <p>Martial technique that utilizes the casters body. These techniques enable a user to fight beyond the normal
        limits of man and push into new heights of martial prowess.</p>

        <h2>@UUID[Compendium.n5eb.jutsus.Item.Eyv024pTgAA2WzPm]{Bukijutsu}</h2>

        <p>Martial technique that requires weapons of some sort.</p>

        <p>While not more powerful than Taijutsu, these techniques are inherently more versatile due to the variety of
        weapons a shinobi can utilize when using them.</p>

        <p>COMPONENT KEYWORDS PREREQUISITES Component Keyword Notes Chakra Molding (CM) (Mandatory for Nature Release)
