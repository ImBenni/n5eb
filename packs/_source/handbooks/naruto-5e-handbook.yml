        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-5-equipment-26.webp" alt="Active Inventory" /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 27</div>

        <p>ACTIVE INVENTORY BASIC SUPPLIES In addition to inventory slots, you can freely carry a The right gear at the
        right time can make all the limited number of basic supplies. One ration pack, one difference between life and
        death. But how do you keep thermos, one wallet. track of what your carrying? This section introduces inventory
        Slots, object bulk, and new systems to help • Ration Case: Stores up to 1 week of basic food rations. you
        manager your inventory. (All Credit goes to Giffy • Thermos: Holds enough liquid for 1 person, for 1 day.</p>

        <p>Glyph for laying the groundwork for this system rework) • Wallet: Holds up to 10,000 Ryo in any denomination
        of currency.</p>

        <p>These three basic supply containers don't occupy any inventory slots, and by extension have no Bulk
        associated with them. If you carry more copies of these 3, they would each occupy 1 bulk and cost 5 Ryo
