        <h1>Preparing Missions</h1>

        <p class="n5eb-handbook-subtitle">PDF page 178</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-the-dungeon-master-173.webp" alt="Preparing Missions"
        /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 178</div>

        <p>PREPARING MISSIONS TREASURE Your adventure should give out an amount of treasure A mission is a
        self-contained collection of story that's appropriate to the characters' level. You can dole elements,
        characters and setting that become the basis out treasure in all kinds of ways. Treasure can be items for the
        story you and the other players tell. Think of the carried by adversaries, rewards from a patron, or simply
        mission as an outline for your own story. You'll have the rewards for completing the mission within the given
        major beats you want to include, some consistent time limits. It's best to spread treasure throughout a
        characters and themes you want to convey, but all sorts mission rather than stockpiled In a single hoard. This
        of things can change during the process of turning the gives the players incremental rewards, letting their
        outline into a completed story. characters advance in frequent small steps rather than You might use a published
        mission from the giant leaps separated by many hours of play. community or come up with your own as your prepare
        for your game sessions.</p>

        <h2>Creating Missions</h2>

        <p>Building your own mission is much more challenging that using a published mission from the community, but it
        lets your express yourself, be even more creative, and tailor the game directly to the players and their
        characters. Later sections in this book, include guidelines for building and running encounters, placing
        treasure, and setting appropriately difficult challenges, all to help you construct your own missions.</p>

        <p>Mission plotting can start at many different points.</p>

        <p>You might begin with a particular antagonist, then construct a mission that fits their villains theme and
        leads the group to them. Alternatively, you could start with an interesting location for exploration, then
        populate it with adversaries and challenges appropriate to the setting.</p>

        <h3>Locations</h3>

        <p>Memorable setting that includes mysterious and foreign locations for players to visit and elicit the players'
        curiosity. Exploring each location should be a treat in itself, not just a chore the players must complete to
        get from one fight to the next. As you create a locale, picture it in your mind's eye and write down minor
        details you can include as you narrate the game. Describing the decoration, natural landmarks, wildlife,
        peculiar smells, and even temperature changes make a place feel more real.</p>

        <p>Beyond monsters and loot, your locations include environment-based challenges, from environmental conditions
        like blizzards to puzzles, trap's, or other hazards. These challenges should suit your missions location; walls
        of brambles in a castle ruin overrun with vegetation, pools of acid in a cursed swamp, or mystical trap's in the
        tomb of a paranoid daimyo. Rules for environments and hazards appear later in this book.</p>

        <h3>Encounters</h3>

        <p>A robust set of encounters forms the backbone of your campaign. Encounters often feature combat,
        environmental hazards, and social encounters in which the players duel with other creatures, the world, and with
        their words. The rules for building encounters appropriate to your groups level begin later in this book.</p>

        <p>Some missions have a clear and direct path of progression, with encounters occurring at specific times or in
        a specific order. Others, such as a dungeon filled with interconnected rooms the group can investigate in any
        order, are nonlinear, and the group can face encounters in any order-or even avoid them entirely.</p>

        <p>Most adventures are somewhere in between, with some keystone encounters you know the characters will need to
        content with, but others that are optional.</p>

        </section>

