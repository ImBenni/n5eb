        <h3>Class Features</h3>

        <p>When you gain a new level in a class, you get its features for that level. A few features, however, have
        additional rules when you're multiclassing: Extra Attack, Superiority Die and Unarmored Defense. The Ability to
        cast Jutsu (Ninjutsu, Taijutsu, and Genjutsu) is inherent to all player characters regardless of class, you
        instead have a predetermined maximum amount of Jutsu You can know.</p>

        <h4>@UUID[Compendium.n5eb.class.Item.R4zU1zpTBJtx2qkI]{Extra Attack}</h4>

        <p>If you gain the Extra Attack class feature from more than one class, the features don't add together. You
        can't make more than two attacks with this feature.</p>

        <h4>Superiority Die</h4>

        <p>If you gain superiority dice of any type (from another class, you instead gain one additional die to your
        existing pool of dice.</p>

        <h4>Unarmed Defense</h4>

        <p>If you already have the Unarmed Defense feature, you can't gain it again from another class.</p>

        <h4>@UUID[Compendium.n5eb.class.Item.n5ebJutsuCast001]{Jutsu Casting}</h4>

        <p>Your capacity for Jutsu Casting depends partly on your combined levels in all your classes and partly on your
        individual levels in those classes. Once you have levels from more than one class, use the rules below. If you
        multiclass but don't pick a class that gains more or less jutsu than your current classes Tier then ignore these
        rules.</p>

        <p>JUTSU KNOWN &amp; HIGHEST LEVEL KNOWN.</p>

        <p>You determine how many Jutsu you know and at what rank, based on the following requirements in this order:
        Your Character level, determines the Highest Rank known, following either classes Highest Rank jutsu known. You
        determined the number of jutsu known using the following chart.</p>

