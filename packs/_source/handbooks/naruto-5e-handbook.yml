        <h2>Exploring</h2>

        <p>Players who desire exploration want to experience the wonders that a fantasy world has to offer. They want to
        know what's around the next corner or hill. They also like to find hidden clues and treasure. Engage players who
        like exploration by;</p>

        <ul><li>Dropping clues that hint at things yet to come.</li><li>Letting them find things when they take the time
        to</li></ul>

        <p>explore.</p>

        <h2>Optimizing</h2>

        <p>Players who enjoy optimizing their characters' capabilities like to fine-tune their characters for peak
        combat performance by gaining levels, new features, and magic items. They welcome any opportunity to demonstrate
        their characters' superiority. Engage players who like optimization by;</p>

        <ul><li>Ensuring steady access to downtime to learn new</li></ul>

        <p>Jutsu or for Training.</p>

        <ul><li>Using desired items as adventure hooks.</li><li>Including encounters that let their characters</li></ul>

        <p>shine.</p>

        <ul><li>Providing quantifiable rewards, like experience</li></ul>

        <p>points, for noncombat encounters.</p>

        <h2>Problem Solving</h2>

        <p>Players who want to solve problems like to scrutinize NPC motivations, untangle a villain's machinations,
        solve puzzles, and come up with plans. Engage players who like to solve problems by;</p>

        <ul><li>Including encounters that emphasize</li></ul>

        <p>problem-solving.</p>

        <ul><li>Rewarding planning and tactics with in-</li></ul>

        <p>game benefits.</p>

        <ul><li>Occasionally allowing a smart plan to</li></ul>

        <p>grant an easy win for the players.</p>

        <ul><li>Creating NPCs with complex motives.</li></ul>

        <h2>Storytelling</h2>

        <p>Players who love storytelling want to contribute to a narrative. They like it when their characters are
        heavily invested in an unfolding story, and they enjoy encounters that are tied to and expand an overarching
        plot. Engage players who like storytelling by;</p>

        <ul><li>Using their characters' backgrounds to help</li></ul>

        <p>shape the stories of the campaign.</p>

        <ul><li>Making sure an encounter advances the</li></ul>

        <p>story in some way.</p>

        <ul><li>Making their characters' actions help steer future</li></ul>

        <p>events.</p>

        <ul><li>Giving NPCs Ambitions, Drives, Goals and Fears that</li></ul>

        <p>the shinobi can exploit.</p>

