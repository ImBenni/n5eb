        <h3>Betrayal</h3>

        <p>NPCs, even allies, can shift allegiances. They might betray, fail, or sell out their companions, which can
        make for a meaningful story event. If an NPC is betraying the party in some way, lay groundwork early on so the
        players don't feel ambushed by the twist. If the players can look back and see a clear path to this result, it
        is likely they'll feel the decision makes sense in the context of the story. Try to give the NPC a
        &quot;tell&quot; or a paper trail they can detect.</p>

