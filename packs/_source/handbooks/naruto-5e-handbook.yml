        <p>DM's can choose to utilize that original form of Alternatively, you can use the fixed value shown in your
        progression. class entry, which is the average result of the die roll (rounded up).</p>

        <p>When your Constitution modifier increases by 1, your hit points maximum increases by 1 for each level you
