        <h1>The Order of Combat</h1>

        <p class="n5eb-handbook-subtitle">PDF page 111</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-8-combat-111.webp" alt="The Order of Combat" /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 111</div>

        <p>The shrieks of kunai cutting through the air flying overhead.</p>

        <p>The clash of an Uchiha's Fireball colliding against a Hyuga's Palm Rotation. The crackle of lightning
        emanating from a powerful shinobi's hands as he yells in despair. The sharp tang of blood in the air, cutting
        through the stench of vile monsters. Roars of fury, shouts of triumph, cries of pain.</p>

        <p>Combat in D&amp;D can be chaotic, deadly, and thrilling.</p>

        <p>This chapter provides the rules you need for your characters and monsters to engage in combat, whether it is
        a brief skirmish or an extended conflict in a dungeon or on a field of battle. Throughout this chapter, the
        rules address you, the player or Game Master. The Game Master controls all the monsters and nonplayer characters
        involved in combat, and each other player controls an adventurer. co o l an also mean the character or monster
        that you</p>

        <h2>Bonus Actions</h2>

        <p>Various class features, Jutsu, and other abilities let you take THE ORDER OF COMBAT an additional action on
        your turn called a bonus action. The A typical combat encounter is a clash between two sides, a Flurry of Blows
        feature, for example, allows a Taijutsu flurry of weapon swings, feints, parries, footwork, Ninjutsu Specialist
        to take a bonus action. You can take a bonus casting, Genjutsu Illusions, and Taijutsu techniques. The action
        only when a special ability, Jutsu, or other feature of game organizes the chaos of combat into a cycle of
        rounds the game states that you can do something as a bonus and turns. A round represents about 6 seconds in the
        game action. You otherwise don't have a bonus action to take. You world. During a round, each participant in a
        battle takes a can take only one bonus action on your turn, so you must turn. The order of turns is determined
        at the beginning of a choose which bonus action to use when you have more than combat encounter, when everyone
        rolls initiative. Once one available. everyone has taken a turn, the fight continues to the next You choose when
        to take a bonus action during your turn, round if neither side has defeated the other. unless the bonus action's
        timing is specified, and anything that deprives you of your ability to take actions also SURPRISE prevents you
        from taking a bonus action.</p>

