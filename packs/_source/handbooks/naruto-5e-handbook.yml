        <p>3 - - 10 350 Others go into more detail, using accents, mannerisms, or acting. 4 D-Rank - 15 400 Because NPCs
        have smaller roles than PCs, imparting 5 D-Rank 1 19 500 enough information to convey their identities while
        they 6 D-Rank 2 26 650 interact with the party can be challenging. When you create an NPC, start by integrating
        a single &quot;hook&quot; into 7 D-Rank 3 31 750 their concept: a widowed merchant, a refugee from a 8 C-Rank 4
        37 1000 distant realm, or a child who constantly asks awkward 9 C-Rank 5 42 1250 questions. Each hints at a
