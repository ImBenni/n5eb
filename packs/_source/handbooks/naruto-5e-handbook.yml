        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 12</div>

        <ol><li>DETERMINE ABILITY SCORES</li></ol>

        <p>ABILITY SCORES AND MODIFIERS Much of what your character does in the game depends d100 Result d100 Result on
        his or her six abilities: Strength, Dexterity, Constitution, Intelligence, Wisdom, and Charisma. Each 1 -5 16-17
        +3 ability has a score, which is a number you record on your 2-3 -4 18-19 +4 character sheet.</p>

        <p>4-5 -3 20-21 +5 The six abilities and their use in the game are 6-7 -2 22-23 +6 described in the Using
        Ability Scores chapter. The Ability Score Summary table provides a quick reference for what 8-9 -1 24-25 +7
        qualities are measured by each ability, what clan 10-11 0 26-27 +8 increases which abilities, and what classes
        consider each ability particularly important.</p>

        <p>12-13 +1 28-29 +9 To generate your character's six ability scores, you 14-15 +2 30 10 would use the following
        set of scores; 15, 14, 13, 12, 11, 10. This is called the Standard Array.</p>

        <p>Using this set of scores allows you to generate a character who can specialize in something while also
        presenting flaws that they can grow from This presents a well-rounded character with both strengths and
        weaknesses.</p>

        <p>If you prefer a more randomized approach, you can instead Roll four 6-sided dice and record the total of the
        highest three dice on a piece of scratch paper. Do these five more times, so that you have six numbers.</p>

        <p>Now take your six numbers and write each number beside one of your character's six abilities to assign scores
        to Strength, Dexterity, Constitution, Intelligence, Wisdom, and Charisma. Afterward, make any changes to your
        ability scores as a result of your clan choice.</p>

        <p>After assigning your ability scores, determine your ability modifiers using the Ability Scores and Modifiers
        table. To determine an ability modifier without consulting the table, subtract 10 from the ability score and
        then divide the result by 2 (round down). Write the modifier next to each of your scores.</p>

