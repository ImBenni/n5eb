        <article class="n5eb-handbook n5eb-handbook-crimson n5eb-handbook-wiki n5eb-handbook-wiki-page">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">Section</p>

        <h1>Social Attitudes</h1>

        <p class="n5eb-handbook-subtitle">PDF page 71</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-7-adventuring-missions-64.webp" alt="Social Attitudes"
        /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 71</div>

        <p>SOCIAL ATTITUDES Within the confines of the game, there will be times where players will encounter different
        NPCs with a variety of different goals and dispositions towards them or the things they are doing. To help
        simplify this process, the following are a list of attitudes that NPC's can have towards players. All creatures,
        are assumed to be Indifferent to player characters (Rank 3) unless otherwise specified, from rivalling villages,
        from opposing organizations or any other narrative focused rationale.</p>

        <p>ATTITUDES Rank Attitude Effect 1 Hostile A hostile creature is one that seeks to actively harm a character,
        either physically, emotionally, politically or financially. A creature with this attitude will never help the
        object of its hostility.</p>

        <p>2 Unfriendly A creature that is unfriendly actively dislikes and specifically distrusts that character. A
        creature with this attitude will avoid receiving aid or helping the creature it is unfriendly towards, but won't
        turn it down if their life is in danger.</p>

        <p>3 Indifferent A creature that is indifferent to a character doesn't really care one way or the other about
        that character. Assume a creature's attitude to a given character is indifferent unless specified otherwise.</p>

        <p>4 Friendly A creature that is friendly to a character likes that character. The character can attempt to make
        a request of a friendly creature, and the friendly creature is likely to agree to a simple and safe request that
        doesn't cost it much to fulfill. If the character or one of their allies uses hostile actions against the
        creature, the creature reduces its attitude rank by 2 or more depending on the severity of the hostile action,
        as determined by the GM.</p>

        <p>5 Helpful A creature that is helpful to a character wish to actively aid that character. It will accept
        reasonable requests from that character, as long as such requests aren't at the expense of the helpful
        creature's goals or quality of life. If the character or one of their allies uses a hostile action against the
        creature, the creature reduces its attitude rank by 3 or more depending on the severity of the hostile action,
        as determined by the GM.</p>

