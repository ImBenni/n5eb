        <p>Previously characters would gain hit points by rolling Each time you gain a level, you gain 1 additional Hit
        &amp; their hit die and adding their constitution modifier, but Chakra Die. Roll both of those Die, add your
        Constitution this resulted in lower than recommended hit point modifier to the rolls separately, and add the
