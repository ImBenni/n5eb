        <summary>Extracted tables from PDF pages 126-134</summary>

        <div class="n5eb-table-wrap"><table><thead><tr><th></th><th>USING COMBINATION JUTSU AS
        INTENDED</th><th></th></tr></thead><tbody><tr><td></td><td>Within Naruto 5e, there are many effects that allow
        characters to</td><td></td></tr><tr><td></td><td>modify jutsu in many ways, such as increasing the damage
        die</td><td></td></tr><tr><td></td><td>or die step of the jutsu, among other
        bonuses.</td><td></td></tr><tr><td></td><td>With Jutsu with the Combination keyword, the intended is
        that</td><td></td></tr><tr><td></td><td>these Jutsu are cast as they are. Unless Combination jutsu
        are</td><td></td></tr><tr><td></td><td>directly specified in a feature, these jutsu are not intended
        to</td><td></td></tr><tr><td></td><td>modified in such ways as they are already crafted
        with</td><td></td></tr><tr><td></td><td>powerful effects that may become far too extreme
        in</td><td></td></tr><tr><td></td><td>manipulated.</td><td></td></tr></tbody></table></div>

