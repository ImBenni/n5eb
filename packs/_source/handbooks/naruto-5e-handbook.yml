        hostility.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>3</th><th>Indifferent</th><th>A creature that is indifferent
        to a character doesn't really care one way or the other about that character. Assume a creature's
        attitude</th></tr></thead><tbody><tr><td></td><td></td><td>to a given character is indifferent unless specified
        otherwise.</td></tr></tbody></table></div>

