        <h3>Purchasing Encounters</h3>

        <p>Once you have the experience (XP) budget set, the next thing that you should do is figure out what type of
        encounters you want in your mission.</p>

        <p>You can figure this out by purchasing different types of encounters that you can tweak to fit your campaigns
        narrative or theme. Encounters do not need to always be combat and can instead by social or even
        environmental.</p>

        <p>The following are the different types of encounters that can be purchased and what they can entail. If a
        particular Encounter multiplies its XP by the rank of the mission it is multiplied by the following values
        (D-Rank: 1, C-Rank:2, BRank: 3, A-Rank: 4, S-Rank:5) SOCIAL ENCOUNTERS:</p>

        <ul><li>Hostile Social Encounter: 10xp times the rank of the</li></ul>

        <p>aggressive discussions with potentially hostile creatures or groups. The focus of this encounter should be to
        potentially avoid conflict by disarming the situation or even potentially escaping.</p>

        <ul><li>Diplomatic Social Encounter: 10xp times the rank of the</li></ul>

        <p>discussions with neutral creatures or groups. The focus of this encounter can be to convince a group to aid
        you, or even dissuade a group from becoming hostile towards another party.</p>

