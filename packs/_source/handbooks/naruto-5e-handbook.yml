    image: {}
    text:
      format: 1
      content: >-
        <article class="n5eb-handbook n5eb-handbook-crimson n5eb-handbook-wiki n5eb-handbook-wiki-page">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">Section</p>

        <h1>6. Choose Your Jutsu</h1>

        <p class="n5eb-handbook-subtitle">PDF page 14</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-1-step-by-step-character-10.webp" alt="6. Choose Your
        Jutsu" /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 14</div>

        <ol><li>CHOOSE YOUR JUTSU</li></ol>

        <p>Your class determines how many jutsu your character knows at each given level. Most clans also provide you
        with an additional list of jutsu you can pull from just for being a part of the given clan.</p>

        <h2>Jutsu Rank</h2>

        <p>Every Jutsu has a Rank from E-Rank to S-Rank. A Jutsu's Rank is a general indicator of how powerful it is,
        with a lowly burst of speed at E-Rank and the powerful explosion at S-Rank.</p>

        <p>E-Rank Jutsu are simple but effective techniques that characters can cast almost passively. They are lowest
        ranked and the simplest in design and function. The higher a Jutsu's Rank, the higher Level a Shinobi must be to
        use that Jutsu. Jutsu Rank and character level don't correspond directly. Typically, a character has to be at
        least 17th level, not 6th level, to cast a S-Ranked Jutsu.</p>

        <h2>Jutsu Known</h2>

        <p>Before a shinobi can use a jutsu, he or she must have the jutsu learned, or must have access to the jutsu in
        a chakra item. Once a jutsu is learned, it is always prepared. The number of jutsu a shinobi can have at any
        given time depends on the character's level.</p>

        <p>When you learn a Jutsu, either E-Rank, D-Rank, or higher, you choose from the list of Jutsu provided in
        Chapters 9 through 11. You can learn Jutsu from any level up to your Highest Level jutsu known, including E-Rank
        Jutsu. The total number of jutsu you learn in this way can't exceed your Jutsu Known for your class at the level
        you are in the class.</p>

        <p>If a Jutsu is granted to you by a class feature or a Feat that Jutsu does not count against your Jutsu known
        and you can't voluntarily unlearn it. If you already know that Jutsu, you may learn an additional Jutsu that is
        available to you.</p>

        <h2>Chakra Points</h2>

        <p>Regardless of how many Jutsu a shinobi knows, he or she can cast only a limited number of Jutsu before
        resting.</p>

        <p>Manipulating Chakra and channeling it through you, even as a simple jutsu is physically and mentally taxing,
        and higher ranked Jutsu are even more so. Thus, each shinobi class's description includes a Chakra die to show
        how much chakra that class generally gains per level compared to the next. For example, the 3rd-level Ninjutsu
        Specialist has 3d12 Chakra die, meaning on average someone of that class would have 21(7+7+7 the Average of a
        d12 Die 3 times for each level) chakra before considering their Constitution Modifier and any Clan or Class
        Features.</p>

        <p>When a character casts a Jutsu, he or she expends a number of chakra points based on the cost of the jutsu to
        cast it. All Jutsu and some features as well have a cost, meaning more time and care has to be put into deciding
        what jutsu to use and when while in difficult situations and circumstances.</p>

        </section>

