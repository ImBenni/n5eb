      content: >-
        <article class="n5eb-handbook n5eb-handbook-crimson n5eb-handbook-wiki n5eb-handbook-wiki-page">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">Section</p>

        <h1>5. Choose Equipment</h1>

        <p class="n5eb-handbook-subtitle">PDF page 13</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-1-step-by-step-character-10.webp" alt="5. Choose
        Equipment" /></figure>

        </header>


        <section class="n5eb-related">

        <h2>Open in Foundry</h2>

        <div class="n5eb-related-grid"><div class="n5eb-related-card"><span
        class="n5eb-related-title">@UUID[Compendium.n5eb.items.Item.Yrn3nOcUdGRd5yDV]{Weapons}</span><span
        class="n5eb-related-meta">Item</span></div></div>

        </section>

        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 13</div>

        <ol><li>CHOOSE EQUIPMENT</li></ol>

        <p>Your class determines your character's starting equipment, including weapons, armor, and other shinobi gear.
        Record this equipment on your character sheet. All such items are detailed in the Equipment section.</p>

        <h2>Armor Class</h2>

        <p>Your Armor Class (AC) represents how well your character avoids being wounded in battle. Things that
        contribute to your AC include the armor you wear, your Dexterity modifier &amp; how proficient you have become
        through experience. Not all character's wear armor however.</p>

        <p>Your character's base AC equals 10 + his/her Dexterity modifier + half of his/her Proficiency Bonus (Rounded
        Down) + Armor Bonus. Record your AC on your character sheet.</p>

        <p>Your character needs to be proficient with armor to wear and use them effectively, and your armor
        proficiencies are determined by your class. There are drawbacks to wearing armor if you lack the required
        proficiency, as explained in the Equipment section.</p>

        <p>Some Jutsu and class features give you a different way to calculate your AC. If you have multiple features
        that give you different ways to calculate your AC, you choose which one to use.</p>

        <h2>@UUID[Compendium.n5eb.items.Item.Yrn3nOcUdGRd5yDV]{Weapons}</h2>

        <p>For each weapon your character wields, calculate the modifier you use when you attack with the weapon and the
        damage you deal when you hit. When you make an attack with a weapon, you roll a d20 and add your proficiency
        bonus (but only if you are proficient with the weapon) and the appropriate ability modifier.</p>

        <ul><li>For attacks with melee weapons, use your Strength</li></ul>

        <p>modifier for the attack and damage rolls. A weapon that has the finesse property, such as a Katana, can use
        your Dexterity modifier instead.</p>

        <ul><li>For attacks with ranged weapons, use your Dexterity</li></ul>

        <p>modifier for attack and damage rolls. A weapon that YOUR CHARACTERS ABILITIES • has the thrown property, such
        as Darts, can use your Strength modifier instead.</p>

        <p>Take your character's ability scores and Clan into account as you flesh out his or her appearance and
        personality. A very strong character with low Intelligence might think and behave very differently from a very
        smart character with low Strength.</p>

        <p>For example, high Strength usually corresponds with a burly or athletic body, while a character with low
        Strength might be scrawny or plump.</p>

        <p>A character with high Dexterity is probably light and slim, while a character with low Dexterity might be
        either gangly and awkward or heavy and thick-fingered.</p>

        <p>A character with high Constitution usually looks healthy, with bright eyes and abundant energy. A character
        with low Constitution might be sickly or frail.</p>

        <p>A character with high Intelligence might be highly inquisitive and studious, while a character with low
        Intelligence might speak simply or easily forget details.</p>

        <p>A character with high Wisdom has good judgment, empathy, and a general awareness of what's going on. A
        character with low Wisdom might be absent-minded, foolhardy, or oblivious.</p>

        <p>A character with high Charisma exudes confidence, which is usually mixed with a graceful or intimidating
        presence. A character with a low Charisma might come across as abrasive, inarticulate, or timid.</p>

        </section>

