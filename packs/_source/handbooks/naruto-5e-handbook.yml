        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 135</div>

        <p>C 10-12: N /G /T /B INJUTSU ENJUTSU AIJUTSU UKIJUTSU</p>

        <h2>Jutsu Compendium</h2>

        <p>While supporting the system, for over a year now, the volume of Jutsu options has grown to an amazing size,
        well over 1000 Options.</p>

        <p>This may seem daunting, but unlike base 5e or other RPG systems, these Jutsu are categorized by Type, Rank,
        and Alphabetized. Moving forward all Generic jutsu will be located within Jiraiya's Jutsu Compendium.</p>

        <p>This is done for two reasons, one, to keep the size of the Shinobi Handbook maintainable, and two, to make
        updates easier and more manageable so that updating 1 jutsu doesn't require checking over multiple different
        books.</p>

        </section>

