        <h2>Passive Features</h2>

        <p>has a duration, they last until they're depleted or you finish Passive Features are any abilities that
        require no input a long rest. from the creature to gain their benefit. They are features that are always active,
        either for free or if some condition is met (Such as equipping armor to gain damage reduction).</p>

        <h3>Examples of Passive Features in N5e</h3>

        <p>Most effects in Naruto 5e are considered Passive Features, with some examples listed below.</p>

        <ul><li>Proficiency/Expertise</li><li>Passive bonuses to resources such as Critical Threat</li></ul>

        <p>Range, Maximum Hit Points, Maximum Chakra Points, AC, etc</p>

        <ul><li>Passive effects that grant a user access to some form</li></ul>

        <p>of ability (Gaining a Nature Release or the Medical keyword).</p>

        <ul><li>Damage Reduction as the result of wearing armor</li></ul>

        <p>and/or from a trait, feature, or seal, that does not require any resource to activate.</p>

        <h2>Feature Type Precedence</h2>

        <p>While this section attempts to provide encompassing examples for what causes a feature to be classified as
        Passive or Active, there may be cases where a feature falls within the grey, where it can be argued that it is
        either Type or perhaps both.</p>

        <p>In such cases, the Active feature typing always takes priority over the Passive typing.</p>

