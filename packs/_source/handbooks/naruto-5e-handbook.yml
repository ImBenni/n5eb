      content: >-
        <article class="n5eb-handbook n5eb-handbook-crimson n5eb-handbook-wiki n5eb-handbook-wiki-page">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">Main Rulebook</p>

        <h1>What's Different</h1>

        <p class="n5eb-handbook-subtitle">PDF pages 7-9</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-whats-different-7.webp" alt="What's Different" /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF pages 7-9</div>

        <p>HAT IFFERENT Currency has been changed to Ryo, with roughly 1 gp = 1 Ryo.</p>

        <p>While this expansion will utilize the core ruleset of 5th Magic items are reskinned as Chakra enhanced items,
        Edition, there are significant differences that will be with rarities designed to mimic those of the Naruto
        illustrated here, broken down by Chapter.</p>

        <p>Universe. Equipment functions similarly, with the CHARACTER'S CHAPTER 6: USING ABILITY SCORES Reskinned to
        fit the setting. Generally, the same, with the exception of skills; Arcana has been changed into Ninshou, with
        Illusion, Martial Arts, Crafting and Chakra Control being new skills.</p>

        <p>Races relabeled to Clans, all of which are brand new.</p>

        <p>Reskinned to fit the setting, but remains mostly the same BACKGROUNDS with some slight changes.</p>

        <p>For the most part, these are reskinned from 5E with some CHAPTER 8: COMBAT modifications to fit the setting
        and some omissions, but with one major difference; each background now offers an Mostly identical with some
        reskinning, new mechanics Ability score increase or Free Feat as a part of the and slight changes to damage
        types. background itself.</p>

        <p>Additionally, backgrounds no longer have personality</p>

        <h3>Clash Mechanic</h3>

        <p>traits but are instead replaced with an Ambition system. A new mechanic that is supposed to represent
        situations where two abilities or jutsu from opposing sides are used MODIFICATIONS Keyword that are used in the
        same turn (Or round depending on the Jutsu/Ability) initiates a clash. When a There are nine classes. Taijutsu
        Specialist, Ninjutsu clash is initiated the opposing users of either ability or Specialist, Genjutsu Specialist
        and Scout-Nin are mostly jutsu must make opposing Checks using certain skills reskinned, with some variation to
        fit the setting. depending on the ability/jutsu used.</p>

        <p>Intelligence Operative utilizes a homebrew of Plans and</p>

        <ul><li>Ninjutsu Clash: Ninshou check vs an opposing Ninshou</li></ul>

        <p>Planning Die. Weapon Specialist is based off of Paladin, check.</p>

        <p>Hunter-Nin is based on Rogues and Medical-Nin is based</p>

        <ul><li>Taijutsu Clash: Marital Arts check vs an opposing</li></ul>

        <p>off of Cleric.</p>

        <p>Martial Arts check.</p>

        <p>All Classes have access to Jutsu, a redesigned version of Spellcasting. While all classes have access to
        these Wind and Earth are new damage types, Thunder has Jutsu, all classes are broken down into three tiers of
        how been combined with force damage. Radiant Damage has many Jutsu they have. Those three tiers are: High Jutsu,
        been combined with Lightning Damage; Force &amp; Necrotic Medium Jutsu and Low Jutsu tiers. Depending on the
        Tier Damages description is being reskinned to fit the setting. the class is placed into the class is given
        additional subMechanics/Resources to make up for the lower Jutsu</p>

        <h3>Elemental Advantage</h3>

        <p>pool. A new mechanic that is supposed to represent situations where a creature will use an ability or
        Ninjutsu that has High Jutsu Tier: 0 Additional Resources/Mechanics one of 5 Nature affinities (Earth, Wind,
        Fire, Water,</p>

        <ul><li>Ninjutsu Specialist Lightning) against another ability or Ninjutsu that has a</li><li>Medical-Nin
        Superior or Inferior Nature affinity against it. With the 5</li></ul>

        <p>Nature Affinities each one is Strong or weak to another Medium Jutsu Tier: 1 Additional Resources/Mechanics
        with some being neutral to one another. When this</p>

        <ul><li>Scout-Nin interaction happens the user of the Superior element</li><li>Intelligence Operative makes
        their attack roll or Clash check at advantage, while</li></ul>

        <p>the user of the inferior element rolls normally.</p>

        <p>Low Jutsu Tier: 2-3 Additional Resources/Mechanics</p>

        <ul><li>Taijutsu Specialist The following is the circle of Elemental Superiority; ('&gt;'</li><li>Weapon
        Specialist means the nature affinity to the left of this symbol is</li><li>Genjutsu Specialist superior to the
        nature affinity on the right of it.)</li><li>Hunter-Nin Fire &gt; Wind &gt; Lightning&gt; Earth&gt; Water &gt;
        Fire</li></ul>

        <p>Classes also provide a new Resource called Chakra in the same way they provide Hit points. Chakra is used in
        almost all cases in regards to Jutsu and you regain Chakra during short or long rests in the same way you regain
        hit points. You gain Chakra Die as you level in the same way you gain hit die. When you level, you either roll
        your Chakra die + your constitution modifier to gain more chakra, or you take the average + your constitution
        modifier to gain more chakra.</p>

        <p>There are three major changes in this section:</p>

        <ol><li>Spells are now called Jutsu. (Cantrips are now called</li></ol>

        <p>E-Rank Jutsu and have a minor cost associated with them.)</p>

        <ol><li>Jutsu are now Ranked instead of Leveled. Ranging</li></ol>

        <p>from E-Rank up through S-Rank. Each rank Corresponds to Spell ranks in its design. a. E-Rank: Cantrips b.
        D-Rank: 1st-2nd Level Spells c. C-Rank: 3rd-4th Level Spells d. B-Rank: 5th-6th Level Spells e. A-Rank: 7th-8th
        Level Spells f. S-Rank: 9th Level Spells</p>

        <ol><li>Spellcasting has been separated into Ninjutsu,</li></ol>

        <p>Taijutsu &amp; Genjutsu Casting. Ninjutsu, Taijutsu, &amp; Genjutsu use Chakra, which regenerates on a short
        rest using Chakra die or half of your maximum on a long rest. a. Ninjutsu uses Intelligence and in rare cases
        constitution as its Casting stat. b. Taijutsu uses Strength (or Dexterity depending on the class) as its casting
        stat. c. Genjutsu uses Wisdom (or Charisma CHAPTER 10-12: NINJUTSU, TAIJUTSU, &amp; GENJUTSU LIST Chapter 10-12
        is broken up into 3 different chapters to keep Ninjutsu, Taijutsu and Genjutsu separate.</p>

        <p>OPTIONS Chapter 13 is designed to offer players the full list of feats, fighting styles, and other
        customization options your game can benefit from.</p>

        <p>This chapter is more use to the GM than the players, in that it offers premade ordinary and heroic
        characters, as well as statistics for the characters proper to the Naruto series, including popular names such
        as Naruto Uzumaki, Sakura Haruno, Kakashi Hatake, Sasuke Uchiha, and even Orochimaru.</p>

        <h2>Bingo Book (Monster Manual)</h2>

        <p>There is a Monster Manual in development. This should provide a variety of new enemy types, prolific and
        generic low- and high-level enemies created in this system.</p>

        <h2>Kage Guide (DM Guide)</h2>

        <p>There is a DM's guide currently in development alongside the Monster manual. This book will provide a list of
        variable rules, ways to design campaigns, how to handle events such as the Chunin exam, a comprehensive list of
        Chakra enhanced Items, loot tables and how to handle Factions, Village Ranks Mission tables and much more.</p>

        </section>

