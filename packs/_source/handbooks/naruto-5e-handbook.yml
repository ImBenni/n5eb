        too distracted and physically hampered by your armor for Jutsu casting.</p>

        <p>WHAT IS A JUTSU?</p>

        <p>CASTING A JUTSU A Jutsu is a discrete or blatantly obvious effect, a shaping of chakra from one's body that
        creates a desired effect. In casting When a character casts any Jutsu, the same basic rules are a Jutsu, a
        character carefully constructs the desired effect followed, regardless of the character's class or the Jutsu's
        effects. using their chakra, and then releases it, all in the span of a few seconds.</p>

        <p>Each Jutsu's description in chapters 10, 11, and 12 begins with a block of information, including the Jutsu's
        name, Jutsu can be versatile tools, powerful weapons, or protective Rank, Chakra Cost, prerequisites (if it has
        any), casting wards. They can deal damage or heal it, impose or remove time, range, and duration. The rest of a
        Jutsu entry describes conditions (see Conditions), drain life energy away, and restore life to the dead. the
        Jutsu's effect.</p>

        <p>A great number of Jutsu exist and over time many have been CASTING A JUTSU AT A HIGHER RANK created and
        forgotten. An ancient Ninjutsu technique may exist in a long-lost Ninja Scroll. When a shinobi casts a Jutsu,
        that jutsu is normally locked to whatever rank it is casted it. But in some special cases,</p>

        <h2>Jutsu Known</h2>

        <p>some jutsu can be upcasted to higher ranks if you can both learn &amp; cast jutsu of at least one rank higher
