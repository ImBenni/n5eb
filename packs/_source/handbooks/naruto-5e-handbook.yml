        <h2>Portraying NPCS</h2>

        <p>BEGINNING AT HIGHER LEVELS Although the PCs are the stars of the game, NPCs make Weapon/ Armor the world
        around the PCs vibrant. They can become a Level C.E.I Seals Downtime Ryo part of the story, sometimes for years,
