        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-14-allies-adversaries-166.webp" alt="Chapter 14: Allies
        &amp; Adversaries" /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 166</div>

        <p>he World of Naruto is full of unique characters.</p>

        <p>Friends and Foes if you will. These characters fill the world with unique perspectives and traits.</p>

        <p>Below we will detail how this game differentiates both Friends and Foes.</p>

        <p>While we generally differentiate between the types of NPC's the players will encounter, it is also beneficial
        to set expectations in how the rest of the world is structured.</p>

        <p>You can find the evergrowing Bingo Book for the Naruto 5e System here.</p>

        <p>Why did we move the Adversaries in this section? To help in making room for all of the following content.</p>

        </section>

