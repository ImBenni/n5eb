      content: >-
        <article class="n5eb-handbook n5eb-handbook-crimson n5eb-handbook-wiki n5eb-handbook-wiki-page">

        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">Section</p>

        <h1>Wealth</h1>

        <p class="n5eb-handbook-subtitle">PDF page 26</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-5-equipment-26.webp" alt="Wealth" /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Naruto 5e Handbook, PDF page 26</div>

        <p>T he marketplace of a large city or village teems with buyers and sellers of many backgrounds and for
        WEAPONS, ARMOR AND OTHER EQUIPMENT many reasons: shady merchants trying to sell off As a general rule, undamaged
        weapons, armor, and other curious wares they've found on their travels (or trying to equipment fetch half their
        cost when sold in a market. steal from careless travelers), up and coming Used weapons and armor aren't always
        in good enough technologists, selling various scientific ninja tools, condition to sell, but can be kept and
        modified for shinobi weaponsmiths and samurai armor smiths. In the personal use if you are or can find a
        Weaponsmith good largest cities, almost anything imaginable is offered for enough to complete such a task. sale,
        from exotic spices and luxurious clothing to</p>

        <h3>Chakra Enhanced Items</h3>

        <p>scientific ninja tools and cutting-edge vehicles.</p>

        <p>For a shinobi or samurai, the availability of armor, A Chakra Enhance item is an item that either is infused
        weapons, and other adventuring gear is of paramount with either an Sealsmith's Enhancement Seal or has a +1
        importance, since proper equipment can mean the or higher bonus to either; difference between life and death in
        a stronghold or the • Attack and Damage Rolls provided via an untamed wilds. This chapter details the mundane
        and Enhancement Seal, A Clan or Class Feature, or a Jutsu. exotic merchandise that shinobi commonly find useful
        • Armor Class provided via an Enhancement Seal, A Clan in the face of the threats that the worlds of D&amp;D
        present. or Class Feature, or a Jutsu.</p>

        <p>VARIANT: STARTING WEALTH BY CLASS A weapon that gains any bonuses from Feats or Fighting styles do not count
        as chakra enhanced in any Class Funds way.</p>

        <p>All 5d6 x 25 Ryo GEMS, JEWELRY, AND VALUABLE ARTIFACTS.</p>

        <p>These items retain their full value in the marketplace, and you can either trade them in for Ryo or use them
        as WEALTH currency for other transactions. For exceptionally valuable treasures, the GM might require you to
        find a Wealth generally appears in the form of Ryo. The Land of buyer in a large city or even another
        country.</p>

        <p>Iron and Land of Moon each have their own mints, but in most countries, Ryo is interchangeable. Other trade
        goods, gemstones, artifacts, and property can reflect your character's financial well-being. Members of the
        lower-class trade in goods, bartering for what they need and paying taxes in raw materials. Members of the
        nobility trade either in legal rights, such as the rights to a mine, a port, or a company, or in high
        denomination credits. Only merchants, adventurers, and those offering professional services for hire commonly
        deal in ryo.</p>

        <h2>Currency</h2>

        <p>Ryo comes in a variety of denominations: from a single Ryo coin to paper bills with predefined values up to
        Solid Ryo Bars worth an incredible value. While the Land of Iron and Moon have their own currencies, in most
        Countries they can be used interchangeably.</p>

        <p>With ten ryo, a character can buy a day's worth of food, some common clothing, a Bingo Book, or a glow rod. A
        skilled (but not exceptional) artisan can earn 100 Ryo a day. A Genin can earn on average, up to 100 Ryo a day
        with on D-Rank Missions. Ryo is the standard unit of measure for wealth. When merchants discuss deals that
        involve goods or services worth hundreds or thousands of ryo, the transactions don't usually involve the
        exchange of individual bills. Rather, ryo is a standard measure of value, and the actual exchange is in letters
        of credit, or valuable goods.</p>

        <h2>Selling Treasures</h2>

        <p>Opportunities abound to find treasure, equipment, weapons, armor, and more in the dungeons you explore.</p>

        <p>Normally, you can sell your treasures and trinkets when you return to a Village or other settlement, provided
        that you can find buyers and merchants interested in your loot.</p>

        </section>

