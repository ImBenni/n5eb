        <header class="n5eb-handbook-hero">

        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">Main Rulebook</p>

        <h1>Chapter 10-12: Ninjutsu/Genjutsu/Taijutsu/Bukijutsu</h1>

        <p class="n5eb-handbook-subtitle">PDF page 135</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/main-chapter-10-12-ninjutsu-genjutsu-taijutsu-bukijutsu-135.webp"
