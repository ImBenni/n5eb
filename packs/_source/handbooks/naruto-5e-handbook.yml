        <p>creature for up to 1 hour before needing to remake score. You add half your proficiency bonus, rounded down,
        this check. to all saving throws you do not have proficiency in. This does not count as having proficiency in
        such a save.</p>

        <p>The Difficulty Class for a saving throw is determined by the effect that causes it. For example, the DC for a
        saving throw allowed by a Jutsu is determined by the caster's Ninjutsu, Taijutsu, or Genjutsu casting ability
        and proficiency bonus. The result of a successful or failed saving throw is also detailed in the effect that
        allows the save. Usually, a successful save means that a creature suffers no harm, or reduced harm, from an
        effect.</p>

