        <p>Puppet Master +1 Every 2 Levels.</p>

        <p>Cooking-Nin +1 Every 2 Levels.</p>

        <p>Science-Nin +1 Every 2 Levels.</p>

        <h4>Jutsu Modifiers</h4>

        <p>While each class provides you with modifiers for each of your 3 differing types of Jutsu, multiclassing can
        seemingly complicate things. To simplify this, you only follow the Jutsu Save DC and Jutsu Modifiers of the
        class you have the most levels in, as that class is what you have put most of your focus on. In the event you
        have an equal level in 2 or more classes, you select the class you want to use, Jutsu Save/Jutsu modifiers. You
        cannot pick and choose; you must select a class suite of saves/modifiers.</p>

