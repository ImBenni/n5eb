        <p>This upgrade can't benefit from your Grandmaster Manipulation feature.</p>

        <p>COMBINED STRENGTH Your connection with a creature allows you to innately understand their thoughts. You do
        not need to use your Reaction to cast a combination jutsu cast by a creature you are connected to, once per
        turn. Additionally, you can use intelligence instead of charisma for combination effects.</p>

        <p>FORCEFUL SUPPRESSION Prerequisite: Grappling Threads When you grapple a creature with Grappling Threads they
        become restrained for the duration. Additionally, attempts to break out of your threads are made at
        disadvantage.</p>

        <p>MERCILESS THREADS LETHAL STRINGS (NEW!) Techniques: White Techniques: White Prerequisite: Chakra Slash You
        are able to channel additional chakra through your Your mastery over your threads is nearing its peak, and
