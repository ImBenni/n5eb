        <h3>@UUID[Compendium.n5eb.subclass.Item.LLmAexs9olJIrWsP]{Full-Metal Shinobi}</h3>

        <p>When you choose this Inquiry at 3rd Level you replace the skin of your body with flexible chakra material
        that allows for easier experiments.</p>

        <p>Your AC calculation while unarmored is now 10 + your Proficiency Bonus +Intelligence Modifier. You can also
        spend chakra from your CCD to heal yourself as a Bonus Action. You heal at a rate of 10 CCD chakra to 5 health.
        At Level 6 you choose to gain resistance to either Bludgeoning, Piercing, or Slashing damage. At Level 9 you can
        choose another. At Level 14 you gain the last that you did not choose.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.D1EfTo7t1cp5GA65]{Edge runner}</h3>

        <p>Also, at 3rd Level you gain Mastery in Armorsmith Toolkits. This toolkit gains additional charges equal to
        your Intelligence Modifier. Your body also comes with a number of upgrade slots equal to your Proficiency
        Bonus.</p>

        <p>During a Long Rest you can install any upgrade, besides a Shinjutsu, that you meet the requirements for.
        These Shinobi-Ware Upgrades will be detailed at the end for this subclass.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.cQheJEZHTgbjgjUD]{Glorious Evolution}</h3>

        <p>Starting at 6th level, you have expanded upon the simple science of the era and have embraced your body as
        the start of the new era. During a rest of any type, you can use 2 charges of your Armorsmith Kit to evolve a
        Refined upgrade. You can only have two Evolved Upgrades at a time. An Evolved Upgrade does not count against
        your slot limits and has its Creation point cost reduced by 2. At 9th Level you can instead choose a Greater
        Upgrade. At Level 14 you can chose a Superior Upgrade.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.1VEbnrH8Hpk162fK]{In His Image}</h3>

        <p>Beginning at 9th level, You further enhance your body to copy the peak of shinobi-kind: the Ōtsutsuki. You
        create a seal of your design and place it on the palm of your hand.</p>

        <p>As an Action you can spend 20 CCD chakra and activate this seal. You must pay 5 CCD chakra at the start of
        your turns to keep the seal active. The seal remains active for 1 minute or until you do not pay the CCD chakra
        cost, whichever comes first. While this seal is active you gain the following benefits;</p>

        <ul><li>Your AC of your Full Metal Shinobi AC is increased by 2</li><li>Your Jutsu attack rolls have an
        increased critical threat</li></ul>

        <p>range of +1</p>

        <ul><li>You have driven your human body to the edge of</li></ul>

        <p>present and future, and run that edge beautifully. You gain 1 Shinjutsu Upgrade the first time you activate
        this ability. You can not change this later. You can only use this Shinjutsu while your seal is active.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.YA58Jtmz4cy6cMQL]{Ever Evolving}</h3>

        <p>Beginning at 14th level, you have further upgraded your seal to always be improving, always evolving. You can
        spend Creation Points equal to the rank of an Armor Seal to instantly apply it to your Full Metal Shinobi armor.
        You can change this seal with a Full turn Action, including choosing no seal to gain the creation points back
        and remove the seal.</p>

