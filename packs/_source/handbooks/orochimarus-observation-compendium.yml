        <h2>Character Inspirations</h2>

        <p>When designing this class, it was built with the intent to allow players to utilize food and other edible
        items to allow them to support and protect them team in a variety of unique ways. This class was almost entirely
        designed by @Have a nice day Please#2982, also known as @Habdu.</p>

        <p>CLASS FEATURES COOKING TOOL INFUSION As a Cooking-Nin, you gain the following class features. Beginning at
        1st level, you learn to infuse a myriad of cooking tools with chakra, allowing them to be used in HIT POINTS
        combat.</p>

        <p>Hit Dice: 1d8 per Cooking-Nin level You gain a Cooking Tool: a frying pan, or other item of Hit Points at 1st
        Level: 8 + your constitution modifier your description that fits your personal way of cooking.</p>

        <p>Hit Points at Higher Levels: 1d8 (or 5) + your You are proficient in cooking tools. Your cooking tool
