        <h2>@UUID[Compendium.n5eb.class.Item.WmXmFrIgGMAnN6I0]{Signature Technique}</h2>

        <p>Beginning at 10th level, you temporarily commit to a technique that assists you in dealing with a variety of
        scenario's. When you complete a rest, select one of the following which helps in building out your already broad
        skillset. Beginning at 18th level, you can instead gain the benefit of two of these options.</p>

        <h3>Hidden Technique</h3>

        <p>You can remain perfectly still for long periods of time to set up ambushes. As an Action while you are at
        least lightly obscured, you can attain perfect stillness. When you do, you and all allies within 5 feet of you
        become invisible, along with any equipment they are wearing or carrying and any creatures who would attempt to
        make any checks to search or look for you or creatures under the effect of this feature, suffer a -10 penalty to
        checks made to complete such a task until the start of your next turn if in combat or until you would move more
        than half your movement speed if outside of combat.</p>

        <p>While you are gaining this benefit, if you haven't moved since your last turn, you and allies affected by
        this feature cannot be found as a result of Tremorsense, jutsu with the sensory keyword or chakra sight. If you
        or an allied creature attacks a creature while benefiting from this feature, the attacking creatures attack
        scores a critical hit if the attack result is at least 5 or greater than the targets AC. Once a critical hit has
        been scored in this way, it cannot be triggered again until you complete a long rest.</p>

        <h3>Aggressive Technique</h3>

        <p>You are able to fight for longer periods of time. You gain the ability to extend your fighting potential, in
        the form of controlled breathing.</p>

        <p>On your turn, as a Bonus Action, you can spend 2 Hit die to breathe in deeply, regaining hit points equal to
        1d10 + your scout level.</p>

        <p>Alternatively, you can as a Bonus Action spend 2 Chakra die to breathe in deeply, regaining chakra points
        equal to 1d10 + half your scout level.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.KHwY5ViPxs2H1TN0]{Tactical Technique}</h3>

        <p>You have a much higher affinity with tactics and planning out your movement and actions.</p>

        <p>Creatures cannot make opportunity attacks targeting you or allied creatures within 10 feet of you.</p>

        <p>Additionally, yourself and allies who begin their turns within 10 feet of you can take the Dash action as a
        Bonus Action.</p>

