        <p>INTELLIGENCE OPERATIVE CREATING AN An Aburame directs his allies to take very specific positions INTELLIGENCE
        and tells them how to win this upcoming battle. After they OPERATIVE take a position, they act according to his
        plans, each event happening in sequence like he planned, all When creating an Intelligence Operative consider a
        few culminating into the confrontation with the Warlord. things about how the character thinks and acts. Do they
        With a trained eye for detail, Sarutobi looks over the plan ahead or do they plan in the moment? How are their
        room he and his allies are trapped in. After a few seconds relationships with their allies and how do they
        interact he figures it out. He walks directly through the wall after with them both on and off of missions? Do
        they actively figuring out that they were trapped within a Genjutsu take charge or do they only act when it's a
        last resort? and noticing the smallest off-center details. These What made the character so bound to strategy?
        Did they shinobi, different as they might be, are connected by one train under another very skilled tactician
        and never beat common factor, they are geniuses in their own right, them in a game of chess (Shogi)? Or did you
        never lose a able to read the room, see the way it's built and figure game and followed this path in order to
        get a real out that the room isn't a room, but a cage or trap. The challenge?</p>

        <p>Intelligence operatives are the team leaders, planners, and the brains behind the greatest teams in the
        shinobi QUICK BUILD world. You can make an Intelligence Operative quickly by following these suggestions. First,
        put your highest CHARACTER INSPIRATIONS ability score in Intelligence, followed by Dexterity or Charisma.
        Second, choose the Nara, Yamanaka or NonWhen designing this class, it was built with the intent to Clan, Clans.
        allow players to harness and feel like masters of strategy through the use of the mechanics presented in this
        class.</p>

        <p>The Mechanics presented in this class were made to imitate the tactical plans of characters such as:
        Shimamura Nara, Kakashi Hatake, Tobirama Senju, Itachi Uchiha, Kabuto Yakushi &amp; Orochimaru.</p>

        <p>CLASS FEATURES STRATEGIC TIMING As an Intelligence Operative, you gain the following class Starting at 1st
        level, the you may use your Intelligence features. Modifier in place of your Dexterity Modifier to roll
        Initiative.</p>

        <p>HIT POINTS Additionally, when taking the Read the Enemy action, Hit Dice: 1d8 per Intelligence Operative
