        <p>Also at 3rd level, to complement your fighting style you are always moving to either keep your distance or
        put on the pressure. You learn the Body Flicker and Chakra Leaping Ninjutsu. This does not count against your
        known jutsu. You can cast these jutsu using chakra from your CCD.</p>

