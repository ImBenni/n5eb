        <h3>@UUID[Compendium.n5eb.subclass.Item.Ye7o7c4NsUQ0GBUX]{Nightmare incarnates}</h3>

        <p>Starting at 6th Level, twice per rest, you can cast a Genjutsu of C-Rank or lower that deals damage with the
        Casting time of 1 action, as a Bonus Action. You gain an additional use of this feature at 10th and 13th
        levels.</p>

        <p>Additionally, beginning at 13th level you can cast a B-rank or lower genjutsu using this feature.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.YLM1leQD6AANZgOp]{Psyche Breaker}</h3>

        <p>Starting at 10th level, select two Genjutsu that you know that deal damage. As a Bonus Action to casting the
        chosen Genjutsu, affected creatures suffer a lingering mental fragmentation resulting in a -1 penalty to their
        AC, for 1 minute. This penalty can stack up to 3 times on affected creatures. This penalty can be removed with
        any Jutsu that would remove mental conditions being cast at C-Rank or higher.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.qsOfi9NCcdJvqTFR]{Corrupt Psyche}</h3>

        <p>Beginning at 10th Level, when you would cast a Genjutsu that deals damage to no more than one hostile
        creature per casting, you can spend 2 Actualization Die. When you do, hostile creatures of your choice within 10
        feet of the original creature must make an Intelligence Saving Throw vs your Genjutsu Save DC. On a failure,
        they take the damage of the Genjutsu as if they were the original targets.</p>

        <p>On a success, they suffer no further effects.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.WajlqU8e3JoYlHoO]{Vindictive Thoughts}</h3>

        <p>Starting at 14th Level, when a creature you can see within 30 feet of you makes an attack roll against you.
        As a Reaction you can create a Genjutsu aura to cause intense pain to the activating creature. The attacker must
        make a Charisma save vs your Genjutsu Save DC.</p>

        <p>On a Failed Save, the attacker's attack is stopped and they also take Xd8 Psychic damage, where X equal your
        Proficiency Bonus. On a successful save you cannot use this feature on the attacker again until you finish a
        long rest.</p>

