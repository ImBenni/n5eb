        <h3>@UUID[Compendium.n5eb.subclass.Item.0SturDDFHoEcTeDL]{Owls Teachings}</h3>

        <p>Also at 10th level, you have begun to also learn from another creed of Hunters, known as the Owls. Their
        teachings guide you down the road of a shinobi, deeper than most others would dare travel.</p>

        <p>While observing a creature, you can as an action, make an Insight check vs the targets Passive Deception (10
        + Charisma (Deception) Bonus). On a success, you can see through them, almost as if looking into their spirits
        directly. You can select one of the following, granting you this boon for the next minute. You cannot use this
        feature on the same creature no more than once, every hour.</p>

        <ul><li>A creature who would even attempt to lie, makes you</li></ul>

        <p>instantly aware of their trickery.</p>

        <ul><li>A creature who would have hostile intentions towards</li></ul>

        <p>you or anyone near them, makes you instantly aware of their malice.</p>

        <ul><li>A creature who would have romantic or admiration-</li></ul>

        <p>based feelings towards you or anyone near them, makes you instantly aware of their feelings.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.w1WE4inBHYpMqact]{Shinobi's Karma: Will}</h3>

        <p>Beginning at 14th level, your strength of will has reached levels incomparable to other Hunters of your
        caliber. You gain proficiency in Charisma saving throws.</p>

        <p>Additionally, saving throws you make against a Genjutsu that would Restrain, incapacitate, slow or stun you
        are made at advantage.</p>

