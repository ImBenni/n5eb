        Bukijutsu. As a part of the same action used to attack, you can spend a use of your Prosthetic attachments. On a
        hit you deal an additional 3d6 poison damage. The target must make a constitution saving throw. On a failed
        save, they gain the envenomed condition for 1 minute. If you score a critical hit with this attack, the target
        instead gains 3 ranks of the Envenomed condition.</p>

        <p>Shinobi Your arm is equipped with a firecracker that is made for disorienting your foes. As a Bonus Action
        you can force every creature in a 10Firecracker foot cube originating from you to make a Wisdom saving throw. On
        a failed save, they become dazed and blinded until the beginning of their next turn.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.qXa9aOBVkx9xIrK6]{Devotion to the Creed}</h3>

        <p>Also at 14th level, your devotion to your creed has exceeded all others. When you would complete a rest, WOLF
        TECHNIQUES select one Adversary Class (Caster, Controller, Defender, Beginning at 10th level, you have learned
        both to value Lurker, Generalist, Striker or Supporter). You become patience, but at the same time that
        hesitation leads to aware whenever an adversary with that class is within defeat. You have become privy to a
        series of elite 120 feet of you and where they are. techniques taught only to members of your creed who If you
        would engage them socially, your training has have survived as long as you have. Select 1 of the led to you
        researching as much as possible in regards to following jutsu. The selected jutsu are now counted as interacting
        with them. You can choose to use your your Wolf Techniques. The jutsu selected are added to Wisdom in place of
        Charisma when making a Charisma your Jutsu known and also gain their listed effects. You based skill check.
        Additionally, you gain a 1d6 bonus to can cast a jutsu counted as your Wolf Technique, by all such checks made
        to interact with them. spending two uses of your Prosthetic Attachment instead of spending chakra. A jutsu cast
        in this way ignores its KAGES DIE TWICE component requirement, instead being able to be cast At 17th level, your
        sheer spirit and resolve to keep using any weapon and is always cast as if it were B-Rank. fighting allows you
        to defy even death itself. Once per</p>

