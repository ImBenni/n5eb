        <p>Prerequisite: Pain, Doubled Pain or Unlimited Pain Genjutsu When a creature under the effects of any of the
        prerequisite Genjutsu takes damage, they take chakra damage equal to the result of the roll of the
        aforementioned jutsu, once per turn.</p>

        <h2>@UUID[Compendium.n5eb.class.Item.XuS5Bj57Vr5TjvWn]{Vicious Illusion}</h2>

        <p>Prerequisite: Illusionary Weapon You can attack with your Illusionary Weapon twice, instead of once, whenever
        you take the attack action on your turn.</p>

        <h2>@UUID[Compendium.n5eb.class.Item.01vTNVACHlYcSEmo]{Voice of an Old Friend}</h2>

        <p>You can communicate telepathically with a willing creature up to 1 Mile away from you. You must know the
        creature's general location, and the target creature can resist this effect if they choose.</p>

