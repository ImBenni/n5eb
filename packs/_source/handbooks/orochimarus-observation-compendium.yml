        <p>Strength Modifier Taijutsu attack modifier = your Proficiency Bonus + your EXTRA ATTACK Beginning, at 5th
        Level, you can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h2>@UUID[Compendium.n5eb.class.Item.QZ5C1HlkJe66qTYK]{Shinobi of Science}</h2>

        <p>Starting at Level 1, You dedicate yourself to always THE RIGHT TOOL being the smartest in the room. When
        making a Also, at 5th Level You have learned how to think 10 steps contested Intelligence Skill check with
        another creature, ahead of everyone else. Once per short rest, you can while both of you are using Intelligence,
        you are reveal that you predicated the current situation. You can considered to have an additional rank of
        Mastery in that pull a scroll from your inventory that has one basic skill. If you already have 3 ranks of
        Mastery, you instead quality toolkit with a single charge. This can only be used gain advantage. by you and
        loses its charge after being used or in 10 minutes, whichever comes first.</p>

        <h2>@UUID[Compendium.n5eb.class.Item.hZdrtFK5uQyWASu5]{Yhprum's Law}</h2>

        <p>Starting at 7th level, you understand that Reality is simply a chance of probabilities. Most follow Murphy's,
        saying what can go wrong will. You follow Yhprum's Law. What can work, will work. You can add half your
        Proficiency bonus, rounded down, to any Skill check you make that doesn't already include it.</p>

        <h2>@UUID[Compendium.n5eb.class.Item.288RZEtXx1Js4e6s]{Calculated Response}</h2>

        <p>Starting at 10th level, you've gained the ability to come up with solutions under pressure. When you or
        another creature you can see within 30 feet of you makes a Skill check or a saving throw, you can use your
        reaction to add your Intelligence modifier to the roll.</p>

        <p>At Level 15, you also use this feature to subtract your Intelligence Modifier from an enemy creature's Skill
        check or saving throw.</p>

        <p>You can use this feature a number of times equal to your Intelligence modifier (minimum of once). You regain
        all expended uses when you finish a long rest.</p>

        <h2>@UUID[Compendium.n5eb.class.Item.TJR6aNfBo6rU5xs9]{Infused Genius}</h2>

        <p>Starting at the 11th Level, you being to outfit your tools with better tools. You can select one Scientific
        Ninja Tool of Creation Point Cost 8 or lower. The selected tool is then attached to one weapon or armor of your
        choice. Twice per long rest the holder of this weapon or wearer of the armor can use the tool, as if it was
        wielded by you, at no chakra cost.</p>

        <p>You can have anumber of Infused Tools equal to your Intelligence modifer. During a Long rest you can switch
        the Scientific Ninja Tool, or reattach it to a new weapon or armor.</p>

        <h2>@UUID[Compendium.n5eb.class.Item.LnglUdbUyfS8Zwp7]{Mixed Studies}</h2>

        <p>At the 18th Level you expand your field of study to encompass another Inquiry. You gain the 3rd Level
        features of another Scientific Inquiry. You cannot select the one you chose at 3rd Level.</p>

