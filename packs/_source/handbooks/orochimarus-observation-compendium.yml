        <p>Beginning at 7th level, your instinctive Agility lets you dodge out of the way of certain area effects. When
        a Jutsu allows you to make a Dexterity save to take only half damage, you instead take no damage and suffer no
        effects if you succeed on a saving throw, and only half damage if you fail.</p>

