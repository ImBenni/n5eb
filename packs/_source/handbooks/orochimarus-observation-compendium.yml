        <h2>Puppet Master Tactics</h2>

        <p>AGILE TACTICS You prioritize staying as far as you can from battle. You can take the Disengage or Dash
        actions as a Bonus Action, and can take the Hide action even when lightly obscured.</p>

        <p>At 11th level, the first attack you make per round while Hidden does not automatically reveal you This
        includes attacks made with your</p>

        <h2>@UUID[Compendium.n5eb.class.Item.I0EQX6b1JHvqSEOx]{Puppet Tool}</h2>

        <p>DEFENSIVE TACTICS You prioritize defense and survivability.</p>

        <p>Reduce the cost of any jutsu with the casting time of 1 Reaction that would provide you with any bonuses to
        saving throws, AC, or grant you damage reduction or temporary hit points, by an amount equal to the jutsu's
        rank. (D-Rank: 1, CRank: 2,B-Rank: 3, A-Rank: 4, S-Rank: 5) At 11th level, when using any jutsu that gives you a
        bonus to saving throws or AC as a Reaction, for the first save you make or first attack against you, increase
        your saving throw or AC by half your Intelligence Modifier. For jutsu that give damage reduction or temporary
        hit points, increase the amount gained by twice your Intelligence Modifier, once per casting.</p>

        <p>HELPFUL TACTICS (CHANGED/NEW) You prioritize adaptability and aiding your allies. You or your Puppet Tool may
        take the Help Action as a bonus action. When you take the Help action to assist an ally in attacking a creature
        (your Puppet Tool counts as an allied creature), the target of the attack can be within 30 feet, instead of 5
        feet, provided your ally can see and hear you.</p>

        <p>At 11th level, select three Skill-Based Actions (Chapter 6., SHB) that require an Action to use. You may use
        these Skill-Based Actions as a bonus action, instead of an Action. You may swap the Skill-Based Actions selected
        for this effect on a rest of any type.</p>

        <p>OFFENSIVE TACTICS You prioritize offensive capability over everything else. Once per turn, you can add your
        Intelligence Modifier to an instance of damage you deal yourself or with your Puppet Tool. You can also make 1
        weapon attack as a Bonus Action.</p>

        <p>At 11th level, you can add your Intelligence Modifier to an attack you or your puppet makes up to twice per
        turn.</p>

        <p>RESOURCEFUL TACTICS You prioritize preparation over everything else. You gain proficiency in an additional 2
        Toolkits, and gain a +1d4 to any rolls to craft or utilize any Toolkit-based actions.</p>

        <p>You can also use Explosive Tools as a Bonus Action, a number of times equal to your Intelligence Modifier per
        long rest.</p>

        <p>At 11th level, this becomes every short rest.</p>

