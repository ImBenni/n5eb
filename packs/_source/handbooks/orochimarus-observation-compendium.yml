        <h2>Character Inspirations</h2>

        <p>When designing this class, it was built with the intent to allow players to take on the role of a generalist,
        someone who may not specialize in any particular field such as ninjutsu, Genjutsu or Taijutsu. But someone who
        can use them all to a varying degree and find success. While other classes can use all 3 forms of jutsu, this
        class is designed with the ability to enhance them on a case-bycase basis using Superiority Dice if needed.
