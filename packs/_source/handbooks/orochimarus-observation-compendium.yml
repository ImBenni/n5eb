        <h3>@UUID[Compendium.n5eb.subclass.Item.i0VIX3vV0xhR9vDQ]{Secondary C.C.D}</h3>

        <p>Beginning at 9th level, you have outfitted your Scientific Ninja Beast with its own Chakra Containment
        Device, when you would regain chakra into your C.C.D you may choose to instead store it into your Scientific
        Ninja Beast.</p>

        <p>When you are within 5 feet of your S.N.B you can use a bonus action to withdraw any amount of chakra stored
        in its C.C.D. Your S.N.B's Chakra Containment Device can hold an amount of chakra equal to your Science-Nin
        level x 5.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.fbDMP95YzIpTBuFr]{Improved Servos}</h3>

        <p>Also at 9th level, you have built upon the foundation of your Scientific Ninja Beast. Your Scientific Ninja
        Beast can now take both an Action and Bonus Action instead of one or the other.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.HdjrHI6xF75YeZ1s]{Artificial Sentience}</h3>

        <p>Starting at 14th level, you have upgraded the Artificial Intelligence in your Scientific Ninja Beast allowing
        it to act of its own volition and communicate freely, it now enters initiative directly after your turn instead
        of you needing to command it as a bonus action, and can speak any language you know.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.K1xXKfpVDCI28feO]{Regenerative Armor}</h3>

        <p>At 17th level, you have installed nano-machines in your S.N.B that can heal its injuries. As a bonus action
        your S.N.B can spend any number of Hit Die to heal itself, for each Hit Die spent this way roll the die and add
        your S.N.B's Constitution modifier to the result. When you use this ability, you can choose to spend any number
        of creation points you have remaining, for each creation point spent this way add an additional 1d4 to the
        amount of hit points regained. Additionally, when your S.N.B is reduced to 0 hit points you may spend 2 creation
        points, it instead stops at 1 and cant fall below 1 until the end of its next turn.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.uLlpbGEh9u6q54Nl]{The Future of Shinobi: S.N.B}</h3>

        <p>Finally at 20th level, you have realized that the S.N.B. is the future of Shinobi, choose 3 S.N.B. Upgrades,
        your Scientific Ninja Beast permanently gains these upgrades and they no longer take an upgrade slot or cost
        creation points. You must still meet the prerequisites for these upgrades to gain the benefits of them.</p>

