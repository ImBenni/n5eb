        <h2>Character Inspirations</h2>

        <p>When designing this class, It was designed with the intent of using and creating the tools of the future. A
        player would be the inventor of the party, always making sure they had the tools for the mission. Characters
        whom this class was designed after are as follows; Denki, Kawaki, Ao, Boruto. This class was entirely designed
        by @ Artemys#2642, also known as @ Lord First, Artemys Yuki.</p>

        <p>CLASS FEATURES CHAKRA CELL ENHANCEMENT As a Science-Nin, you gain the following class features. Also at Level
