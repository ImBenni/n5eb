        <h2>@UUID[Compendium.n5eb.class.Item.R4zU1zpTBJtx2qkI]{Extra Attack}</h2>

        <p>Beginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your
        turn. Attacks you make with the Attack action count as Chakra enhanced.</p>

