        range and effectiveness. During a short or long rest, you can expend a use of your demolitions kit to seal an
        explosive ninja tool, other than a Breaching Tag, into the casing of a B.I.M. The range and DC of the explosive
        ninja tool is changed to that of a B.I.M, but otherwise function identically to a normal explosive ninja tool of
        that type and now also counts for subclass features interacting with B.I.Ms.</p>

