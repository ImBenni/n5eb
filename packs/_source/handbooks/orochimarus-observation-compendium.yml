        <p>creature to eat this Snack, making a Melee Ninjutsu a creature, you may make an attack with this Weapon
        Attack. On a hit the creature immediately takes xd6 as a Bonus Action, until the end of your Turn.</p>

        <p>Fire damage, where X equals your Proficiency Bonus, Starting at 6th level, your Cooking Tool gains an gains 2
        Ranks of Burned, and must Succeed a additional weapon property of your choice; Constitution saving throw or gain
        an additional +2 Ranks of Burned</p>

        <ul><li>Marked In Flame: When you deal Fire damage to a</li></ul>

        <p>creature you may Flamemark them. A Flamemarked creature sheds 10ft of Dim, and Bright, Light, cannot be
        Hidden from you, and increases Fire damage they take by your Cooking Dice, once per Turn. Only one creature can
        be Flamemarked at a time.</p>

        <ul><li>My Kitchen: You may spend half your Movement to</li></ul>

        <p>Teleport to any Fire/burning Object/Space, or within 5ft of a Burned target, within 30ft, once per Turn.</p>

        <ul><li>Defensive Burn: Once per Round, when a creature</li></ul>

        <p>misses you with an attack you may punish them by setting the creature ablaze. They gain +1 Rank of Burned, +2
        Ranks if they missed by 3 or more, or +3 Ranks if they missed by 6 or more. You may use this Feature a number of
        times equal to your Charisma Modifier per Long Rest.</p>

        <p>Beginning at 11th level, your Cooking Tool gains one additional weapon property of your choice;</p>

        <ul><li>Enflamed Justice: When you would use a Snack to deal,</li></ul>

        <p>or increase, damage, you may increase the damage by +1 for each damage Dice rolled, up to half your charisma
        modifier (rounded up).</p>

        <ul><li>Double Fist It: You gain an additional Reaction at the</li></ul>

        <p>start of each of your Turns, which may only be used to eat a Snack, which you would normally be able to eat
        as a Reaction.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.JefCjTgYGY8IVbKE]{Too Hot to Handle}</h3>

        <p>Starting at 5th Level your affinity for fire melts into your very body and allowing you to become one with
        the very flames. When you miss with an attack, the Target takes 1 Fire damage for each damage Dice that would've
        been rolled.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.SlhCEjNfvGq1aYgC]{Nova Aura}</h3>

        <p>At 9th level, your snacks naturally relaxing effects extends to their aroma, granting you an additional
        Aura.</p>

        <p>You may activate this Aura once, then twice at 14th level, per Long Rest without spending a use of your
        Auras.</p>

        <p>Smoldering Scent: When a creature within this Aura would be inflicted with any number of ranks of burned, the
        creature this Aura is centered on gains 1 Nova Point, up to twice per turn. Additionally, they gain the
        following abilities, for the next minute, or until they have no Nova Points, even after this Aura ends:</p>

        <ul><li>2: Reduce the Cost a Fire release Jutsu you would cast</li></ul>

        <p>by -2.</p>

        <ul><li>3: Change the damage type of an attack you would</li></ul>

        <p>make to fire, and, if the attack doesn't have the Blaze property, it gains it.</p>

        <ul><li>4: When you damage a creature</li></ul>

        <p>within 5 feet of you, you may force a creature within 5 feet of them to make a Dexterity saving throw or take
        half the damage the original creature did on a failure.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.MyMupIO1iTqb9NpN]{Heat of My Soul}</h3>

        <p>Beginning at 13th level, the heat has melted into your soul, making your heart rush with the sound of
        flames.</p>

        <p>While Concentrating on a Jutsu with the Fire release Keyword you gain the following effects, as the heat
        bolsters you.</p>

        <ul><li>You gain Advantage on Concentrating saving throws,</li></ul>

        <p>for Fire release Jutsu.</p>

        <ul><li>You may make 2 attacks with your Cooking Tool</li></ul>

        <p>weapons as a Bonus Action.</p>

        <ul><li>At the Start of your Turn, you may inflict +1 Rank of</li></ul>

        <p>Burned on yourself. Additionally, Fire damage cannot force you to make a Concentration Check.</p>

        <h3>@UUID[Compendium.n5eb.subclass.Item.qQkQXbNjMRWzWk9J]{Heavenly Flame}</h3>

        <p>Beginning at 17th level, you gain Resistance to Fire damage, or Immunity if you already have Resistance.</p>

        <p>Additionally, when you would inflict a Rank of Burned on yourself, you may increase the Ranks inflicted by
        +1.</p>

        <p>Finally, once per Long Rest, you may immediately give yourself, and each creature within 15ft of you, 4 Nova
        Points.</p>

        </section>

