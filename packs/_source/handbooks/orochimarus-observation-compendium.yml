        <h2>Character Inspirations</h2>

        <p>When designing this class, it was built with the intent to allow players to both heal their allies but also
        protect them in the front lines. This class features a fine line between both support and combat in its 3
        subclasses.</p>

        <p>The intent was to capture the varied techniques shown by the few medical ninja in the series, such as: Sakura
        Haruno, Tsunade, Kabuto Yakushi, Orochimaru &amp; Shizune CLASS FEATURES REJUVENATING REST As a Medical-Nin, you
