        <h2>Character Inspirations</h2>

        <p>When designing this class, it was built with the intent to allow players to utilize ninja puppets of
        different types, specializing in one or two. Players would be able to create and utilize puppets for stealth or
        combat, while keeping themselves a little safer than others, or use them to gain new abilities for themselves.
        The characters this class is pulling inspiration from are as follows: Kankuro, Sasori, and Chiyo.</p>

