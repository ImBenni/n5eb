        Taijutsu and stances, allowing for a variety of fighting styles as shown in the Naruto series and other Manga
        series.</p>

        <p>Players would be able to match or exceed their allies in combat, close range and even close distance better
        than most other classes are able. The characters this class is pulling inspiration from are as follows: Rock
