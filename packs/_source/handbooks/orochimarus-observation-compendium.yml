        <h3>Ninjutsu</h3>

        <h2>@UUID[Compendium.n5eb.class.Item.9W60MXT5V6cEpqYG]{Scientific Inquiry}</h2>

        <p>Ninjutsu save DC = 8 + your Proficiency Bonus + your Intelligence Modifier Starting at 3rd level, choose an
        Inquiry that you pour Ninjutsu attack modifier = your Proficiency Bonus + your your hours of study into to use
        in combat. The Scientific Intelligence Modifier Inquiry you choose grants you features at 3rd, 6th, 9th, 14th,
