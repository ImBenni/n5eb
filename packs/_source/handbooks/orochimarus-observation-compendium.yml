        next damage roll before the Additionally, whenever you would grapple a creature end of their next turn. with
        your thread weapons they are instead restrained. Furthermore, if you have Antagonistic Connection, then SEVER
        THE CONNECTION at the start of each of the affected creature's turns, you may cause them to deal 2d10 necrotic
        damage Techniques: White immediately, which ignores passive damage reduction.</p>

        <p>Prerequisite: Antagonistic Connection You may also cause this affect to occur when creatures While connected
        to a hostile creature via chakra thread, fail a saving throw against one of your Interwoven you can violently
        sever the connection. As a Bonus Upgrades or an effect that uses your Thread Weapon. This Action, you can spend
        10 chakra to force a creature to damage cannot be dealt to a single target no more than make a Constitution
        Saving Throw dealing 6d8 force once per round. damage and inflicting a rank of lacerated on a failed save, or
        half as much on a successful one. A creature who RESILIENT STRINGS is forced to make a Concentration check as a
        result of Techniques: White this upgrade, makes it at disadvantage. Prerequisite: Thread Force and Thread
        Weapons SYMBIOTIC MIND Your minute control over creatures you are attached to allows them to narrowly escape
        dangerous situations.</p>

        <p>When a creature who is attached to one of your strings is Creatures connected to your threads gain a bonus to
        gain forced to make a saving throw or skill check or suffer a Constitution (Chakra Control) made to maintain
        from a Physical condition, they make saving throws or concentration equal to your intelligence modifier. skill
        checks at advantage.</p>

        <p>Additionally, you can spend the cost of the jutsu again to maintain concentration.</p>

        <p>GOLD TIER CHAKRA CHANNELER Prerequisite: Chakra Pathway You can make any jutsu you cast that has a range of
        self target a creature connected to your threads instead of you. Jutsu that create constructs or summon
        creatures, objects, or structures do not benefit from this upgrade.</p>

        <p>Additionally, while connected to a creature you can spend your Reaction to enable them to react unless they
        are unconscious or petrified.</p>

        <p>Finally, you can cast jutsu with the casting time of 1 Reaction, as if you were the connected creature. This
        first time you do this on an ally other than yourself, per round, does not cost your Reaction.</p>

        <p>JUDGEMENT CHAINS You have learned to solidify your chakra strings into chains to further execute your will.
        As an action, while you are connected to a hostile creature you can force them to make a Constitution saving
        throw at disadvantage, removing their chakra molding and restraining them on a failed save. Creatures who are
        restrained by this upgrade can attempt to break out as an action versus the listed Save DC at disadvantage.</p>

        <p>You can maintain this upgrade for up to 1 minute, or until you lose concentration on it, as if concentrating
        on a jutsu.</p>

        <p>PLATINUM TIER AUGMENTED POWER Techniques: White Prerequisite: Assisted Power You deepen your focus and bring
        your puppeteering to a new level. As an action you infuse even more chakra into your strings, almost overloading
        them with power. Until the end of their next turn, creatures of your choice attached to your strings make any
        attack roll, skill check, or saving throw they make at advantage.</p>

        <p>On subsequent turns you may maintain this feature as a Bonus Action. They lose this boost if you move your
        threads to another creature, you become incapacitated, you die, or you lose concentration, as if concentrating
        on an S-Rank jutsu.</p>

        <p>DEVOUR PREY Prerequisite: Inevitable Feast When a creature has 1 or more ranks of fear as a result of
        Inevitable Feast you can begin to devour them.</p>

        <p>As an action you can make a melee ninjutsu attack roll while you are in the area created by Spider's Web
        dealing 6d12 force damage and reducing the opponent's chakra by half the damage dealt.</p>

        <p>For each rank of fear a creature has as a result of Inevitable Feast increases the damage by 1d12.</p>

        <p>Creatures with 2 or more ranks of fear as a result of Inevitable Feast count as surprised when targeted by
        this attack.</p>

        <p>MARIONETTE MANIPULATION You have learned to control your body with your own strings, allowing you to perform
        flawless movements free of error. As an action you can begin to puppeteer your own body.</p>

        <p>For the next minute, your speed is increased by +30, you gain a +2 bonus to AC, you have advantage on
        Dexterity saving throws and on a successful save you take no damage and suffer no effect.</p>

        <p>You gain the benefits of being connected to your own threads. You also gain one additional Reaction and Bonus
        Action. While you are puppeteering yourself, you may not connect your strings to an allied creature. After 1
        minute you become stunned until the end of your next turn and suffer 1 rank of exhaustion.</p>

