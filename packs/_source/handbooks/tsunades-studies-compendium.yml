        <p>cast on them, they lose concentration on all jutsu they are concentrating on.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.MVGS3fAsgV9Qh2u1]{Psycho Mind Flux}</h3>

        <p>Prerequisite: Yamanaka Clan, Mind Body Transfer, Mind Body Disturbance, Level 16+ You've learned how to
        combine the two most prolific jutsu in your clans history, manifesting a unique capability with both. You gain
        the following Benefits;</p>

        <ul><li>When you would cast Mind Body Transfer or Mind Body</li></ul>

        <p>Disturbance, you may cast the other as a part of the same action, but they must be cast at the same rank.</p>

        <p>You can cast them both in this way twice per long rest.</p>

        <ul><li>When you would cast both Mind Body Transfer and</li></ul>

        <p>Mind Body Disturbance in the same action, you must combine them both into a new jutsu known as Psycho Mind
        Flux. The new jutsu cast is cast at the same rank as the previous two jutsu, and its cost is the combined cost
        of them both.</p>

