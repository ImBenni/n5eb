        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Tsunade's Studies Compendium, PDF page 103</div>

        <p>KAGUYA CLAN Kamira ejects a bone of hers from her shoulder creating a short sword. She's wounded. Weakened,
        and outgunned. She is standing against her Jonin teacher who has fallen prey to a Genjutsu. Her teammates
        already downed by the overwhelming power of their Sensei. Kamira thinks to herself, that she needs to survive to
        save her friends, and stop her sensei. She reaches deep and draws a second short sword made of bone from her
        ribcage. She dashes in towards him. He parries her attacks easily. She pushes through her pain and begins to
        perform one of her Clans infamous Dance Arts. She cuts at his knees, ankles and elbows to disable him.</p>

        <p>Catching him off guard she is able to fell her obviously superior sensei, before passing out herself.
        -Tatsunami Aburame The Long Road, Ch. 16 excerpt.</p>

        <h2>Savage Battle Instincts</h2>

        <p>The Kaguya Clan was an Extinct clan known for their savage battle tactics and archaic values.</p>

        <p>There are stories of Kaguya who loved war so much, they would enter battles and conflicts purely to show off
        their fighting prowess. The ability to manipulate their own bone structure creating weapons of their own bodies
        gives them amazing and powerful taijutsu/bukijutsu fighting skills.</p>

