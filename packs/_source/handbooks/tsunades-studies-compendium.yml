        <div class="n5eb-handbook-hero-copy">

        <p class="n5eb-handbook-eyebrow">Clans</p>

        <h1>Legacy Content</h1>

        <p class="n5eb-handbook-subtitle">PDF pages 250-256</p>

        </div>

        <figure class="n5eb-handbook-hero-media"><img
        src="systems/n5eb/assets/content/handbooks/tsunade-legacy-content-250.webp" alt="Legacy Content" /></figure>

        </header>



        <section class="n5eb-topic-body n5eb-chapter-body">

        <div class="n5eb-source-chip">Source: Tsunade's Studies Compendium, PDF pages 250-256</div>

        <p>LEGACY CONTENT</p>

        <h2>Bloodline, Latent</h2>

        <p>Category: Clan, Rare Prerequisite: Level 4+ You have the blood of a famous clan, granting you fleeting usage
        of their secret techniques. You gain the following Benefits:</p>

        <ul><li>Select any one clan except your current clan and non-</li><li>clan.</li><li>You gain access to the clans
        Jutsu list up to C-Rank</li></ul>

        <p>Jutsu.</p>

        <ul><li>You gain latent clan features as shown on the</li></ul>

        <p>Bloodline chart.</p>

        <ul><li>This feature does not allow you to take Features with a</li></ul>

        <p>Prerequisite of your selected Clan.</p>

        <h2>Bloodline, Realized</h2>

        <p>Prerequisite: Bloodline, Realized, Level 12+ You have the Blood of a Famous Clan, and continued use of it
        begins to grant you an evolving usage of their secret Techniques and access to more of their bloodline
        traits.</p>

        <p>You gain the following Benefits:</p>

        <ul><li>You gain access to the clans Jutsu list up to A-Rank</li><li>You gain Realized clan features as shown on
        the</li><li>This feat allows you to take other feats with a</li></ul>

        <p>ART CREDIT This picture comes from the following website.</p>

        <p>BLOODLINE, LATENT CHART (LEGACY) Latent Bloodline's Latent Feature Latent Feature effect Aburame Latent
        Insect You have learned to call upon insects, like a pure blooded Aburame. You gain the Chakra Consumption &amp;
        Chakra Sense Control Clan feature. When you would use Chakra Consumption, you instead deal half as much chakra
        damage. You also gain the Insect-Speech trait.</p>

        <p>Akimichi Latent Calorie You gain Calories as if you had the Calories clan feature. You have a number of
        calories equal to Half your Level + Your Control constitution Modifier. You can spend these calories to use Clan
        Jutsu. You regain spent calories after a long rest.</p>

        <p>Bakuton Latent You have learned to create Explosions using your chakra alone. Choose to gain either Earth or
        Lightning Nature Release Explosion affinity. Additionally, pick between Artistic Style or Reckless Style. You
        can learn Bakuton Clan Hijutsu with the chosen Release Keyword. Beginning at 7th level, when you would cast a
        Jutsu with the Nature release you previously chose, you increase the size of its area of effect by +5ft in all
        directions if it has one, and can instead choose to deal Force Damage. Beginning at 15th level, when you would
        deal force damage, you increase the damage dealt by your Constitution modifier.</p>

        <p>Chinoike Latent You have begun to develop an affinity for using blood to empower your jutsu. When you cast a
        jutsu with the Water Ketsuryūgan Release keyword, as part of the same action, you can cut yourself and release a
        small amount of blood, losing 3 hit points (this does not count as damage). In exchange, you may grant the jutsu
        the benefits of being near a sufficient source of water, if applicable. If not applicable, reduce the chakra
        cost by -1. Beginning at 7th level, you gain the Blood Pact Clan Feature.</p>

        <p>Fuma Latent Accuracy You have picked up on your innate ability to tap into a latent sense of superior skill.
        When making a ranged attack with Shuriken's, Fuma Shuriken's and Monster Shuriken or Fuma Clan Bukijutsu, you
        gain a +1 Bonus to damage rolls. This bonus increases to +2 at 11th, and +3 at 18th. You also gain the Razor
        Sharp Senses Clan Feature which only works with Shuriken's, Fuma Shuriken's and Monster Shuriken's for you.</p>

