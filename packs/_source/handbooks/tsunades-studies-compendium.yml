        <p>The Hatake Clan is an iconic clan from Konoha. It has produced several renowned members who have held
        positions of high authority, including the Sixth Hokage; All known members have also been extremely skilled
        users of Lightning release jutsu.</p>

        <h3>Hatake Traits</h3>

