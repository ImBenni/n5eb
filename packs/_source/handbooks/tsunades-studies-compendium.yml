        <p>Persona Latent Supreme 1 Beginning at 3rd level, you gain 45 feet of Darkvision. Additionally, while under
        the cover of darkness Nightvision I you may move up to your full movement speed while in stealth.</p>

        <p>Latent Supreme 2 (You must have Latent Supreme Nightvision I) Starting at 7th level, you can perceive color
        through Nightvision II your darkvision. Additionally, you may use Stealth Skill-Based Actions as a bonus action
        while in Dim Light or Darkness.</p>

        <p>Latent Superior 2 Beginning at 3rd level, your movement speed increases by 5 feet and your climbing speed is
        equal to Being I your movement speed.</p>

        <p>Latent Superior 3 (You must have Latent Superior Being I) Beginning at 7th level, you can spend 3 chakra to
        gain Being II advantage on any Strength check to push, pull, or drag objects.</p>

        <p>Latent Superior 4 (You must have Latent Superior Being II) Beginning at 11th level, as a reaction, you may
        spend 3 Being III chakra to gain advantage on a Strength or Dexterity saving throw.</p>

        <p>Latent Genjutsu 3 (You must have Latent Superior Being I) Beginning at 7th level, you gain a +2 bonus to
        saving throws Resilience against Genjutsu with the Visual keyword.</p>

        <p>Latent Enthralling 2 (You must have Latent Superior Being I) Beginning at 11th level, creatures charmed by
        your Vesper Strength I Hijutsu make their next check or saving throw to end the condition at disadvantage.</p>

        <p>Latent Enthralling 3 (You must have Latent Enthralling Strength I) Beginning at 11th level, once per rest
        when a creature Strength II would fail a saving throw against a Genjutsu you cast, you can automatically charm
        the target. A Creature charmed this way does not stop being charmed the first time you would damage them after
        charming them this way.</p>

        <p>Latent Supreme 1 (You must have Latent Superior Being II) Beginning at 18th level, you gain a +1d4 bonus to
        initiative Being I checks, and may cast a single Vesper Hijutsu that not affect a hostile creature with a
        duration greater than instant as part of rolling initiative.</p>

        <p>Latent Supreme 3 (You must have Latent Supreme Being I) Beginning at 18th level, any Vesper Clan features
        that Being II would be inhibited by sunlight to any degree, lose this weakness.</p>

        <p>D-Rank Hijutsu 2 You gain the ability to learn D-Rank Vesper Clan Hijutsu.</p>

        <p>C-Rank Hijutsu 2 (You must have D-Rank Hijutsu) You gain the ability to learn C-Rank Vesper Clan Hijutsu.</p>

        <p>B-Rank Hijutsu 3 (You must have C-Rank Hijutsu) You gain the ability to learn B-Rank Vesper Clan Hijutsu.</p>

        <p>A-Rank Hijutsu 3 (You must have B-Rank Hijutsu) You gain the ability to learn A-Rank Vesper Clan Hijutsu.</p>

        <p>Vesper Clan Feats 5 You gain the ability to learn Clan Feats, with Vesper Clan as a Prerequisite.</p>

        <p>LATENT YAMANAKA Bloodline Bloodline Ability Name Point Cost Ability description Latent Mental Boon I 2
