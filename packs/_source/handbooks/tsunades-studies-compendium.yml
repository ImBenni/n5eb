        where only pain and suffering exist for all those under the effects of this genjutsu. All creatures within range
        must make a Wisdom save.</p>

        <p>Critical Success: The target suffers no effects and is immune to this genjutsu for the next 24 hours.</p>

        <p>Success: The target takes no damage and suffers no additional effects.</p>

        <p>Failure: The target takes 10d8 Psychic damage, and is restrained as threads wrap around them.</p>

        <p>Critical Failure: The target takes 10d8 Psychic damage, and is restrained and cannot take actions as threads
        wrap around them.</p>

        <p>Creatures under the effects of this genjutsu are Blind and Deaf to all other creatures outside the caster. At
        the end of a creatures turn they may remake the save to end the effects of this genjutsu on themselves otherwise
        taking an additional 10d8 damage. If a creature under the effects of this genjutsu takes any damage besides
        psychic damage, they immediately remake the save at advantage. If a creature has 0 chakra, this jutsu instead
        deals 20d8 psychic damage.</p>

