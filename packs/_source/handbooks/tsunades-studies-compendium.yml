        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.Q0RcBnGlSalJIV5q]{Improved Combat Medicine}</h3>

        <p>Category: Clan Prerequisite: Hanami Clan, Level 8+ You have mastered weaving your medical jutsu into your
        combat style, you gain the following benefits:</p>

        <ul><li>Increase your Strength or Wisdom score by 1, to a</li></ul>

        <p>maximum of 20.</p>

        <ul><li>Choose one jutsu you know with the Medical keyword</li></ul>

        <p>that deals damage, this jutsu gains the Combo keyword as if it was a Taijutsu. You can switch the chosen
        jutsu out on a long rest.</p>

        <ul><li>When you cast a Taijutsu with the Combo keyword, you</li></ul>

        <p>can cast a Medical jutsu that deals damage as if it were a Finisher.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.51E4lT6HAG6TuSWr]{Mass Release}</h3>

        <p>Prerequisite: Hanami Clan Your extreme control over your chakra allows you to resist and aid others at
        resisting genjutsu. You gain the following benefits:</p>

        <ul><li>Increase your Constitution or Wisdom score by 1, to a</li><li>You learn the Release Genjutsu. When you
        cast this</li></ul>

        <p>jutsu the range is increased to 60 feet, and you can target any number of creatures in range. For each
        creature after the first that you target increase the cost of the jutsu by 3.</p>

        <ul><li>Twice per long rest, when you cast a jutsu with the</li></ul>

        <p>Medical keyword on a creature you may also cast the Release Genjutsu as a part of the same action.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.MiMcnaCtgYIvXimE]{Refined Chakra Network}</h3>

        <p>Prerequisite: Hanami Clan, Level 12+ Some Hanami Clan members have an innate talent for optimizing how they
        use their chakra; you are one such member. you gain the following benefits:</p>

        <ul><li>Increase your Strength, Constitution, or Wisdom score</li></ul>

        <p>by 1, up to the maximum of 20.</p>

        <ul><li>When you cast a Taijutsu, you may apply the Blessed</li></ul>

        <p>or Unhindered Hanami Boons to yourself, as part of the casting. Alternatively, if you cast a Taijutsu that
        makes an attack roll or imposes a saving throw, you may apply to the Fragile or Dispirited Hanami Boons.</p>

        <ul><li>Reduce the cost to maintain concentration on jutsu</li></ul>

        <p>with the Taijutsu or Medical keyword by -2, to a minimum of half.</p>

        <ul><li>If you were to fail a Chakra Control check to maintain</li></ul>

        <p>concentration, you can choose to spend 1 Chakra Die to reroll the concentration check, taking the second
        result.</p>

        <ul><li>Reduce the cost of Ninjutsu with the Medical</li></ul>

        <p>keyword by an amount equal to its rank (D-Rank = 1, C-Rank = 2, B-Rank = 3, A-Rank = 4, S-Rank = 5)</p>

