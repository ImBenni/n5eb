        vulnerable than they believe they are, suffering a -2 penalty to their AC against you for the duration of the
        aforementioned effects.</p>

        <ul><li>When you make a melee or ranged</li></ul>

        <p>weapon or Taijutsu attack targeting a creature currently restrained, grappled or within difficult terrain as
        a result of a Tsuchigumo clan Hijutsu you cast, if your attack results are 10 or greater than the targets AC,
        you increase the attacks damage by +2 damage die. This bonus damage die is not multiplied if you score a
        critical hit.</p>

