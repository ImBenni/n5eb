        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.TboIIG73xQfG6l5C]{Branch Family Training}</h3>

        <p>Category: Clan Prerequisite: Hyūga Clan You train with members of the other branch of your clan, you gain the
        following benefits:</p>

        <ul><li>Increase your Dexterity or Wisdom score by 1, to a</li></ul>

        <p>Maximum of 20.</p>

        <ul><li>You can learn jutsu from the opposite branch. If you</li></ul>

        <p>are a main branch, you can learn side branch Hyūga Jutsu. If you are a side branch you can learn main branch
        Hyūga Jutsu.</p>

        <ul><li>You learn one additional Hyūga clan Hijutsu that you</li></ul>

        <p>qualify for.</p>

        <ul><li>You can create and learn Hyūga clan Hijutsu in half the</li></ul>

        <p>required time and with half the required cost.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.9WhgVINGMzcWTu44]{Efficient Byakugan}</h3>

        <p>Prerequisite: Hyūga Clan, Level 4+ You have found a way to Reduce the strain the Byakugan has on you. You
        gain the following benefits;</p>

        <ul><li>You gain 1 additional Byakugan ability from the</li></ul>

        <p>Byakugan clan feature. You gain an additional one when you would reach 15th level.</p>

        <ul><li>Your Byakugan can now tell when a creature is under</li></ul>

        <p>the effect of a Ninjutsu, Taijutsu, Genjutsu, feature or trait that costs Chakra of any type.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.mtyc1nJoboN0zcNt]{Precise Strikes}</h3>

        <p>Prerequisite: Hyūga Clan, Level 8+ You have learned to use your Gentle fist in conjunction with your Byakugan
        far more accurately than others of similar level. You gain the following benefits;</p>

        <ul><li>Once per casting, when you would deal Chakra damage</li></ul>

        <p>to a creature as a result of Hyūga Hijutsu, the target must make a Constitution saving throw vs your Taijutsu
        save DC. On a failed save they lose 1 Tenacity die, if they have any.</p>

        <ul><li>Once per casting, when you would choose to either</li></ul>

        <p>Disrupt or Block using a Hyūga clan Hijutsu, if you spend 1 Chakra die, you can use both effects.</p>

        <ul><li>When you would choose to deal damage to a creatures</li></ul>

        <p>hit points, you increase your [Unarmed Damage] to 2d6. This increases to 3d6 at 11th level.</p>

