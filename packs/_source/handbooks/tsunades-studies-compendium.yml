        die or save DEMONS SECOND COMING DC by 2 and at 18th level, increase the damage die or save DC by 3.</p>

        <p>The Hozuki Clan is a relatively small clan that hails from the Reflective Surface: Beginning at 7th level,
        whenever you Land of Water. While the clan itself is small, it has had cast a Ninjutsu with the Water Release
        Keyword, gain an prominent members, whom have attained the rank of 7 amount of Temporary Hit points equal to the
        rank of jutsu Swordsmen and garnered a notoriety of being excellent used, until the beginning of your next turn.
        (D-Rank: 3, Cswordsman and even better assassins. The Hozuki clan has a Rank: 6, B-Rank: 10, A-Rank: 15, S-Rank:
        20). unique trait, allowing them to turn their body into a liquid When you reach 15th level the amount of
        temporary hit form passively. Though due to this extreme affinity with the points gained becomes the following;
        (D-Rank: 5, C-Rank: Water Release affinity, they have lost the ability to access 10, B-Rank: 15, A-Rank: 20,
        S-Rank: 25) the Lightning Release Affinity, in its entirety.</p>

        <h3>Hozuki Traits</h3>

        <p>Recommended Recommended Ability Score Increase: +2 Str, +1 Int Speed: Your base walking speed is 30 feet.</p>

        <p>Skill Proficiencies: Martial Arts, Chakra Control.</p>

        <p>Water Release Affinity: You begin with the Water Release affinity (You can learn Ninjutsu with the Water
        Release Keyword.) Lightning Release Inability: You cannot use or Learn Ninjutsu with the Lightning Release
        Keyword Swimming Speed: Your base swimming speed is 30 feet.</p>

        <h3>Hozuki Features</h3>

        <p>Hozuki Techniques: The Hozuki Clan has access to a separate list of Jutsu unique to their Clan. You can add
        these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list(s).</p>

        <p>Amphibious: You can breathe air and Water.</p>

        <p>Water Dependency: The Hozuki has a dependency on Water, they must consume at least a gallon of Water or
        immerse themselves in Water for one hour each day. If the Hozuki fails to do this they suffer 1 level of
        exhaustion at the end of that day. The Hozuki, can recover from this exhaustion by drinking a gallon of Water or
        immersing yourself in Water for at least 1 hour.</p>

        <p>Made of Water: Starting at 1st level, your body counts as a sufficient source of Water to reduce the cost of
        Water release Jutsu you cast (You cannot gain the alternative effect of a Water Release Jutsu using this
        feature). If the Jutsu cast cannot have its cost reduced by having a sufficient source of Water, you instead
        reduce the cost of ninjutsu with the Water Release Keyword by an amount equal to the Rank of the jutsu cast.
