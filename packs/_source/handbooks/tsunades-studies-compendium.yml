        <p>Wellspring of Chakra: Uzumaki's are known for their massive reserves of Chakra. Beginning at level 1,
        increase your Chakra point total by 2, thereafter, each time you gain a level, increase your Chakra point total
        by 2.</p>

        <p>Chakra Reserves: Uzumaki's have a special secondary network of Chakra all their own known as their Chakra
