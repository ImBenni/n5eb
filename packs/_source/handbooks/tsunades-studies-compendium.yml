        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.YfLbtoajACTCK229]{Nin-Dog Training}</h3>

        <p>Category: Clan Prerequisite: Inuzuka Clan You Train with your Nin-Dog enhancing its potential and allowing it
        to last longer in a fight, you gain the following benefits:</p>

        <ul><li>Increase your Strength or Dexterity score by 1, to a</li></ul>

        <p>maximum of 20. Increase any of your Nin-Dog's ability scores by 1, up to their associated ability score
        maximum for their level.</p>

        <ul><li>Your Nin-Dog's Hit Point maximum increases by your</li></ul>

        <p>level. Their hit point maximum is increased by +1 each time you would gain a level.</p>

        <ul><li>Your Nin-Dog can learn 1 Inuzuka clan Hijutsu that</li></ul>

        <p>you qualify for, without you needing to know it.</p>

        <ul><li>You and your Nin-Dog are always able to sense each</li></ul>

        <p>other's location so long as you are both within 10 miles of each other.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.BEKQdMp48uODy711]{Specialized Training}</h3>

        <p>Your Nin-Dog has gone through intense training with the clan, returning to you to show you the results;</p>

        <ul><li>Your Nin-Dog gains a feat. This feat must be from the</li></ul>

        <p>General, Chakra, Critical, or Taijutsu category (Except Taijutsu Archivist)</p>

        <ul><li>Your Nin-Dog gains 1 Dog/Wolf Special feature that</li></ul>

        <p>they qualify for.</p>

        <ul><li>Your Nin-Dog gains any one, nature release you have,</li></ul>

        <p>and learns 1 Jutsu of C-Rank or lower with this Nature Release Keyword. This jutsu cannot have the Fuinjutsu
        Keyword or the Chakra Seal (CS) Component. You can switch this jutsu over 1 week of downtime.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.GKBDfAjaboniMt7E]{Weaponized Nin-Dog}</h3>

        <p>Your Nin-Dog has passed specialized training that allows them to use conventional weaponry. They gain the
        following benefits.</p>

        <ul><li>Your Nin-Dog gains proficiency in simple and martial</li></ul>

        <p>weapons, in addition, their mouth counts as a hand for the purpose of holding weapons. A Nin-Dog can't use
        his bite attack while holding a weapon this way. A Nin-Dog can make a weapon attack in place of any Bite attack
        they would make. Your Nin-Dog may use the damage die of its Bite, in place of the damage die of a weapon it
        wields, if it is higher.</p>

        <ul><li>Your Nin-Dog learns up to two Taijutsu or Bukijutsu</li></ul>

        <p>following your maximum rank known limitations. You and your dog can spend 1 week of Downtime switching these
        jutsu with another.</p>

        <ul><li>You can teach your Nin-Dog new Taijutsu or Bukijutsu</li></ul>

        <p>this way, by spending 3 weeks of downtime with them, being able to learn a maximum total of 5
        Taijutsu/Bukijutsu in this way.</p>

        </section>

