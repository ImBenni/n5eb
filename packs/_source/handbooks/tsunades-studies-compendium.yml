        <h3>@UUID[Compendium.n5eb.clan.Item.IR13VbYvy2UTqSyn]{Kujaku Flourish}</h3>

        <p>Prerequisite: Hoshi Clan, Level 4+ You have mastered weaving your medical jutsu into your combat style, you
        gain the following benefits:</p>

        <ul><li>Increase your Constitution or Intelligence score by 1,</li></ul>

        <p>to a max of 20.</p>

        <ul><li>While you have temporary hit points as a result of</li></ul>

        <p>activating Kujaku Mode, you also have resistance to bludgeoning, piercing, and slashing damage.</p>

        <ul><li>Your Kujaku Mode's colors may alter depending on</li></ul>

        <p>your nature release. If you have a nature release, you gain resistance to that nature for the duration of
        your Kujaku Mode. When you spend the Star Chakra cost to cast a Hoshi Hijutsu, you can change its damage type to
        match that nature. If you have more than one nature release when you activate Kujaku Mode, you choose one nature
        release at a time to benefit from this feat. If you don't have a nature release, you instead gain resistance to
        Force.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.6b7YDzkfPwspyVDG]{Meteoric Caster}</h3>

        <p>Category: Clan, Rare Prerequisite: Hoshi Clan, Level 12+ Your masterful control in Hoshi techniques has made
        your ninjutsu casting both seamless and instinctual. You gain the following benefits;</p>

        <ul><li>When you would cast a jutsu without the Hijutsu</li></ul>

        <p>keyword, you may spend a number of Star Chakra equal to its rank (D-Rank: 2, C-Rank: 4, B-Rank: 6, ARank: 8,
        S-Rank: 10). When you do so you may use Constitution instead of its casting ability for its attack and damage
        rolls as well as Save DC.</p>

        <ul><li>When you spend the full chakra cost of a jutsu using</li></ul>

        <p>Star Chakra, its damage type becomes Force. If the jutsu doesn't deal damage, you instead gain Xd6 temporary
        hit points, where X equals the jutsu's rank (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5), which last
        until the end of your next turn.</p>

