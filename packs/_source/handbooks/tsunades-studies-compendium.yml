        <h2>We Never Miss</h2>

        <p>The Fuma Clan is a traveling clan that stays within the borders of the Land of Fire. Many of their clan's
        techniques revolve around the manipulation of weapons but most prolifically, the Fuma-Shuriken. Members of the
        clan possess visual prowess and are able to quickly analyze the angles of attacks increasing the probability to
        hit with a weapon, which they then use in their various secret techniques. If standard weapons aren't enough for
        a battle, Fuma can use the clan's secret Bukijutsu to overwhelm their opponents even defeating enemies who prove
        to be resistant to normal weapon attacks.</p>

        <h3>Fuma Traits</h3>

        <p>Recommended Recommended Ability Score Increase: +2 Dex, +1 Wis Speed: Your base walking speed is 30 feet.</p>

        <p>Skill Proficiencies: Perception, Martial Arts Weapon Proficiencies: You are proficient with all simple and
        martial ranged weapons and ranged weapons with the Thrown property.</p>

        <h3>Fuma Features</h3>

        <p>House of Flying Daggers: The Fuma have access to a separate list of Jutsu unique to their Clan. You can add
        these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list.</p>

        <p>Specialized Tools. The Fuma may be known for their Shuriken but they are masters of all Ninja Tools. You may
        attach Paper Bombs to any weapon with the Thrown Keyword, not just Kunai. At 3rd Level, you may also attach
        Battle Wire to weapons with the Thrown property and give it the Returning Keyword and at 7th level, weapons you
        attach a Battle Wire to also gain the grapple property.</p>

        <p>Immaculate Precision: Fuma Clansmen are known for their superior skill using throwing weapons. Beginning at
        1st level, when making a ranged weapon attack or casting a Bukijutsu that requires ranged attacks you can use
        Dexterity in place of Strength for your Taijutsu Ability Modifier.</p>

        <p>Beginning at 3rd level, you increase the damage dice of Shuriken by +1. Fuma-Shuriken gain this bonus at 7th
