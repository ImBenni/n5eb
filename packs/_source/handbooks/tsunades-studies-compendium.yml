        <p>Make a melee Ninjutsu attack against the target. On a hit the seal wraps itself around the target warping the
        seals on them into a new and unique seal known as the River Dam Seal.</p>

        <p>River Dam Seal. This hyper powerful seal causes the target to lose all ranks of the Sealed condition as this
        effect replaces them. Creatures with this seal placed upon them suffer the following effects;</p>

        <ul><li>A creature with the River Dam Seal is counted as having 5</li></ul>

        <p>ranks of the Sealed condition for the purposes of interacting with features, traits and jutsu and cannot gain
        ranks of the Sealed condition while they have the River Dam Seal.</p>

        <ul><li>A creature with the River Dam Seal increases the base</li></ul>

        <p>chakra cost of all Jutsu, features and traits that cost chakra by +15.</p>

        <ul><li>A creature with the River Dam Seal suffers a -5 penalty to</li></ul>

        <p>all of their Ninjutsu &amp; Genjutsu Save DCs.</p>

        <ul><li>A creature can spend a Full Turn Action to make a DC 25</li></ul>

        <p>Ninshou check to remove this condition.</p>

        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.6nx8IqaERz4MKWwF]{Chakra Tenacity}</h3>

        <p>Category: Clan Prerequisite: Uzumaki Clan, Level 8+ Your Chakra pool isn't just vast, it's also immensely
        resilient to attack. You gain the following Benefits;</p>

        <ul><li>Increase your Constitution score by 1, to a maximum of 20.</li><li>You gain resistance to chakra damage
        or chakra reduction-</li></ul>

        <p>based effects.</p>

        <ul><li>Your chakra cannot be absorbed by a hostile effect or</li></ul>

        <p>attack.</p>

        <ul><li>Your chakra costs cannot be increased by hostile effects.</li><li>When you would attempt to cast jutsu
        while you are unable</li></ul>

        <p>to mold Chakra, you can make a DC 10 + the rank of the jutsu, Constitution check to cast it, as if you could
        mold Chakra. (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, SRank: 5.)</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.M8HJe70cNnLbnQLT]{Monstrous Reserves}</h3>

        <p>Prerequisite: Uzumaki Clan, Level 12+ You've conditioned your body to generate more Chakra as your push your
        limits, you gain the following benefits:</p>

        <ul><li>Double the bonus chakra provided by your Wellspring of</li></ul>

        <p>Chakra Clan feature.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.utLP9PqtK4PIuMtw]{Uzumaki Sealing Adept}</h3>

        <p>Prerequisite: Uzumaki Clan, Level 4+ You have found some secrets regarding the Uzumaki Clan Sealing
        techniques that you thought impossible.</p>

        <p>You gain the following Benefits;</p>

        <ul><li>Increase your Intelligence or Constitution score by 1,</li></ul>

        <p>to a maximum of 20.</p>

        <ul><li>Uzumaki Hijutsu you cast cannot be interrupted by an</li></ul>

        <p>opposing creature's jutsu.</p>

        <ul><li>Increase the Chakra damage you deal as a result of</li></ul>

        <p>Ninjutsu with the Fuinjutsu by an amount equal to your Ninjutsu ability modifier.</p>

        </section>

