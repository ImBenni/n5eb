        <p>Any creature of your choice, that enters the jutsu's area for the first time on a turn or starts its turn
        there must make a constitution saving throw. The creature takes 4d10 piercing damage and 4d10 earth damage on a
        failed save becoming Envenomed, or half as much damage on a successful one.</p>

        <p>If an Envenomed creature fails this saving throw, the creature becomes stunned instead. If a creature fails
        this saving throw while stunned in this way, the creature instead becomes unconscious. A creature rendered
        unconscious from this jutsu no longer takes damage from it.</p>

        <p>A creature that is stunned or unconscious as a result of this jutsu and is no longer within this jutsu's
        range, can make a constitution saving throw at the end of each of its turns. On a success, an unconscious
        creature becomes stunned instead and a stunned creature ends its stunned condition.</p>

        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.prHXsZOqdgkqYrqr]{Iron Poisoning}</h3>

        <p>Category: Clan Prerequisite: Jiton Clan, Level 8+ You have learned to imbue deadly poison within your
        jutsu.</p>

        <p>You gain the following benefits</p>

        <ul><li>Increase your Constitution or Intelligence score by 1, to a</li></ul>

        <p>maximum of 20.</p>

        <ul><li>When you use your Magnet Release feature to change the</li></ul>

        <p>damage type of a jutsu with the Wind or Earth Release keywords to Earth, you can change it to poison
        instead.</p>

        <ul><li>Once per turn, when you deal poison damage, you can</li></ul>

        <p>force the target to make a Constitution saving throw vs your Ninjutsu Save DC, becoming Envenomed for 1
        minute on a failed save. You can use this feature a number of times equal to your Ninjutsu ability modifier per
        long rest.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.3b4YekcVwbcThU8p]{Guardian Spirit}</h3>

        <p>Prerequisite: Jiton Clan, Level 12+ The metal dust or sand you manipulate has seemingly gained a will of its
        own. The Absolute Defense, it guards your blind-spots and protects you from harm. You gain the following
        benefits;</p>

        <ul><li>You have advantage on saving throws against effects</li></ul>

        <p>that would move you against your will, and reduce the distance of any knock-back effects by half.</p>

        <ul><li>You gain a number of special reactions, you may use</li></ul>

        <p>these reactions even when surprised, and they do not count as using your reaction for the round. You may use
        these features a number of times equal to your proficiency bonus per long rest. Using this feature while
        surprised expends two uses. o When targeted by an attack roll, you can cause that attack to have disadvantage
        against you. o When making a saving throw against an effect that would have a reduced effect on a successful
        save, you can roll 1d6 and add the result to your save. If you succeed, you instead take no damage and no
        additional effects.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.rrbTK7FVXUPCGZXL]{Magnetic Pull}</h3>

        <p>Category: Clan Prerequisite: Jiton Clan, Level 4+ You use your magnetic Chakra to pull attacks towards your
        jutsu. You gain the following benefits;</p>

        <ul><li>When you cast a Jiton Clan Hijutsu that deals damage,</li></ul>

        <p>you can give it the Clash Keyword.</p>

        <ul><li>When you initiate a clash with a Jiton Clan Hijutsu,</li></ul>

        <p>you roll an additional 1d6, adding it to the result of the clash check.</p>

        <ul><li>When a creature you have marked with your</li></ul>

        <p>Magnetic Mark clan feature, casts a ninjutsu or Taijutsu, you can use your reaction to become the target of
        the jutsu and immediately cast a Jiton clan Hijutsu that deals damage, initiating a clash. You can use this
        feature twice per long rest.</p>

        </section>

