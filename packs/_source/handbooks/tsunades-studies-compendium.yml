        <p>Category: Clan Prerequisite: Ranton Clan, Level 4+ You learn to more masterfully control Storm Release. You
        gain the following Benefits;</p>

        <ul><li>Increase your Dexterity or Intelligence score by 1, to a</li></ul>

        <p>maximum of 20.</p>

