        <p>Range: 60 feet Duration: Concentration, up to 1 minute Components: HS, CM Cost: 12 Chakra Keywords: Hijutsu,
        Genjutsu, Visual, Unaware Description: As part of the requirements of this jutsu, you must have the Sharingan
        clan feature active. You look towards a target creature and attempt to place them into powerful illusion
        designed to torture them if they choose to not follow your command. You can give them any 1-word command that
        they can reliably accomplish in 6 seconds. If the command would cause harm to them in some way, this jutsu
        automatically ends. If they submit to the command they perform it and continue to perform it, even if they
        already completed it. They would repeat the same action forgetting that they already did the task for the
        duration.</p>

        <p>If they choose to resist the command they must make a Wisdom saving throw.</p>

        <p>Critical Success: This jutsu ends and the target becomes immune to this jutsu for the next minute.</p>

        <p>Success: This jutsu ends and the target resists its effects.</p>

        <p>Failure: The target begin to experience a massive torrent of torturous visions of your choice, that both you
        and they can see. Their fears, concerns, desires and regrets begin to materialize on the targets body in a
        variety of different ways of your description. Each turn they begin not completing your request, they take 5d10
        psychic damage, gain 1 rank of Concussed and 1 rank of confused.</p>

        <p>Critical Failure: Same as failure, but the damage die instead becomes a d12.</p>

        <h2>A-Rank:</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.40GnW3lie7bYPBCP]{Uchiha Flame Spiral}</h3>

        <p>Classification: Hijutsu Rank: A-Rank Casting Time: 1 Action Range: 120 feet Cost: 20 Chakra Keywords:
        Hijutsu, Ninjutsu, Fire Release Description: The ultimate Uchiha Fire Release. As part of the requirements of
        this jutsu, you must have the Sharingan active. You conjure three flaming tornados.</p>

        <p>Each tornado is a column with a radius of 5 feet, and a height of 30 feet. Creatures within the tornadoes
        areas when you cast this jutsu and whose space the tornadoes pass through must make a Dexterity saving throw
        taking 10d10+10 Fire damage on a failed save or half as much on a successful one.</p>

        <p>Additionally, a creature who would make a saving throw to resist the effects of this jutsu must also make a
        constitution saving throw, being burned on a failed save.</p>

        <p>As a bonus action on each of your turns, you may command each tornado separately, moving them up to 60 feet
        each. A tornado cannot occupy the same space as another tornado. A creature cannot be affected by more than 1
        tornado per turn.</p>

        <p>The Flaming tornados can be dispersed with enough force. The Flaming Tornados has an AC equal to your
        Ninjutsu save DC, and hit points equal to ten times your</p>

        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.dhcFNF4ngcXmb6CI]{Constant Progression}</h3>

        <p>Category: Clan Prerequisite: Uchiha Clan, Level 4+ You've trained yourself to constantly evolve past your
        current limitations, you gain the following benefits:</p>

        <ul><li>Increase your Dexterity or Intelligence score by 1, to a</li></ul>

        <p>maximum of 20.</p>

        <ul><li>You gain an additional adaptation from the Advanced</li></ul>

        <p>Adaptation clan feature that you qualify for.</p>

        <ul><li>You can create and learn Uchiha clan Hijutsu in half</li></ul>

        <p>the required time.</p>

        <ul><li>You can take this feat up to three times.</li></ul>

        <h3>@UUID[Compendium.n5eb.clan.Item.WnN1rbt9b5w4b9Ey]{Madara's Hatred}</h3>

        <p>Prerequisite: Uchiha Clan, Level 8+ The blood of the ghost of the Uchiha, runs directly through your veins.
        Be it a decedent or some other direct blood relation, providing you with unmatched passion, pride and arrogance.
        You gain the following benefits;</p>

        <ul><li>While you are gaining the benefit of the Sharingan clan</li></ul>

        <p>feature, you can choose to, as an Action, spend 1 Chakra die, to enter a state of fervor until the end of
        your next turn. This is known as the Curse of Hatred. While you are in this state of fervor, you can spend 1
        Chakra die at the end of the turn it would expire to extend its benefits until the end of your following turn.
        You can extend its duration in this way until you have expended all Chakra die. If you would attempt to extend
        its duration while you have no Chakra die, you can choose to instead spend 2 Hit die in its place.</p>

        <p>You gain the following effects; o You gain a +1d4 bonus to Taijutsu attacks o When you would deal damage to a
        creature using an Uchiha clan Hijutsu or a weapon attack, you add your proficiency bonus to the damage dealt,
        twice per turn. o You gain a +2 bonus to your AC o You gain a +2 bonus to all saving throws. o You gain a +2
        bonus to all skill checks</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.0gKAIdekarDFNATK]{Mastered Sharingan}</h3>

        <p>Prerequisite: Uchiha Clan, Level 12+ Through intense training, you can push the limits of your Sharingan
        beyond the pale. You gain the following Benefits;</p>

        <ul><li>The cost to regain the uses of your Sharingan is now 5</li></ul>

        <p>Chakra.</p>

        <ul><li>You gain 1 additional ability from your 1-Tomoe Sharingan.</li><li>You gain 1 additional ability from
        your 2-Tomoe Sharingan.</li></ul>

        </section>

