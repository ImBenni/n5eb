        <p>Skill Proficiencies: Ninshou, Chakra Control Weapon Proficiencies: You are proficient with Katana's.</p>

        <h3>Ryu Features</h3>

        <p>Dragon Clan Jutsu: The Ryu Clan have access to a separate list of Jutsu unique to their Clan. You can add
        these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list.</p>

        <p>Blood of the Dragon: Born with the blood of dragons running through your veins you have the natural affinity
        with one of the 5 Dragons your clan worships. Beginning at 1st level, Choose between Earth, Wind, Fire, Water
        and Lightning Release. You gain the ability to learn and cast jutsu with the chosen nature release and all of
        your Ryu Clan jutsu gains your chosen keyword. You cannot go back and change this element later.</p>

        <p>Dragon's Claws: Beginning at 3rd level, you learn to form your Chakra into claws on both your hands and feet
        of your description. This makes your unarmed attacks Chakra enhanced and far more powerful than normal. Your
        unarmed damage die becomes a d6 and deals the same damage type as the nature release chosen with your Blood of
        the Dragon class feature (Water = cold). Your unarmed damage die becomes a d8 at 11th level and a d10 a 18th
        level.</p>

