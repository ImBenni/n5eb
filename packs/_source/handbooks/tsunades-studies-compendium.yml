        instead deal half as much chakra damage. You also gain</td></tr><tr><td></td><td></td><td>the Insect-Speech
        trait.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Bakuton</th><th>Latent Explosion Release</th><th>You have
        learned to create Explosions using your chakra alone. Choose to gain either Earth or Lightning Nature
        Release</th></tr></thead><tbody><tr><td></td><td></td><td>affinity. Additionally, pick between Artistic Style or
        Reckless Style. You can learn Bakuton Clan Hijutsu with the chosen</td></tr><tr><td></td><td></td><td>Keyword.
        Beginning at 7th level, when you would cast a Jutsu with the Nature release you previously chose, you
        increase</td></tr><tr><td></td><td></td><td>the size of its area of effect by +5ft in all directions if it has
        one, and can instead choose to deal Force Damage. Beginning</td></tr><tr><td></td><td></td><td>at 15th level,
        when you would deal force damage, you increase the damage dealt by your Constitution
        modifier.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Fuma</th><th>Latent Accuracy</th><th>You have picked up on
        your innate ability to tap into a latent sense of superior skill. When making a ranged attack
        with</th></tr></thead><tbody><tr><td></td><td></td><td>Shuriken's, Fuma Shuriken's and Monster Shuriken or Fuma
        Clan Bukijutsu, you gain a +1 Bonus to damage rolls. This</td></tr><tr><td></td><td></td><td>bonus increases to
        +2 at 11th, and +3 at 18th. You also gain the Razor Sharp Senses Clan Feature which only works
        with</td></tr><tr><td></td><td></td><td>Shuriken's, Fuma Shuriken's and Monster Shuriken's for
        you.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Futton</th><th>Latent Boil Release</th><th>You have learned
        to boil chakra using your latent abilities. Choose to gain either Fire or Water Nature Release
        affinity.</th></tr></thead><tbody><tr><td></td><td></td><td>Beginning at 7th level, when you would cast a Jutsu
        with the Nature release you previously chose, you can instead choose</td></tr><tr><td></td><td></td><td>to deal
        acid damage and if it is a Futton Hijutsu, you pierce any DR (Damage Reduction) a target has with your
        damage</td></tr><tr><td></td><td></td><td>roll. At 15th level, when you deal Acid Damage, all affected targets
        reduce any Temporary Hit Points they possess by half</td></tr><tr><td></td><td></td><td>your proficiency bonus,
        before proceeding with damage calculations.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Hanami</th><th>Latent Combative Medicine</th><th>You have
        begun to mix your combative prowess with your medical training. You gain the Combat Medicine Clan
        feature</th></tr></thead><tbody><tr><td></td><td></td><td>up to 3rd level. When you cast a jutsu that uses your
        [Unarmed Damage], its range is increased by +10ft. You may also use</td></tr><tr><td></td><td></td><td>Strength
        as your casting modifier for Hanami Hijutsu you cast. At 11th level, once per long rest when you are forced
        to</td></tr><tr><td></td><td></td><td>make a Physical saving throw, you may make a Strength saving throw
        regardless of the saving throw prompted.</td></tr><tr><td></td><td></td><td>Alternatively, you may spend the use
        of this ability to make a Wisdom saving throw when you are forced to make
        a</td></tr><tr><td></td><td></td><td>Mental saving throw regardless of the saving throw prompted. At 18th level,
        you gain an additional use of this ability.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Hebi</th><th>Latent Regeneration</th><th>You gain 30 feet of
        Darkvision and 15 feet of Temorsense. You also gain the Snake Speech Clan Feature. Twice per
        rest,</th></tr></thead><tbody><tr><td></td><td></td><td>as a bonus action you can focus on self-regeneration,
        regaining 1d6+half your character level in hit points. Beginning at</td></tr><tr><td></td><td></td><td>11th
        level, this increases to 2d6 + half your character level in hit points, and at 18th level, 3d6 + half your
        character level in</td></tr><tr><td></td><td></td><td>hit points.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Hoshigaki</th><th>Latent Shark Tooth</th><th>You gain the
        Aquatic Adaptation and Amphibious Clan Features, up to 11th level. You also gain the Brute Strength
        and</th></tr></thead><tbody><tr><td></td><td></td><td>Commander of the Deep Clan Features, up to 7th
        level.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Hyūga</th><th>Latent Byakugan</th><th>You have unlocked a
        dulled version of the Legendary Byakugan. You are treated as a Side Branch member for
        the</th></tr></thead><tbody><tr><td></td><td></td><td>purpose of Jutsu selection. You can spend 5 Chakra to
        activate your Latent Byakugan as a bonus action for up to 10</td></tr><tr><td></td><td></td><td>minutes. You
        gain the All-Seeing White Eye and 360° Vision features while the Byakugan is active. The chakra
        sight</td></tr><tr><td></td><td></td><td>granted by All-Seeing White Eye is 250 feet, as opposed to 500
        feet.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Inuzuka</th><th>Latent Beast Master</th><th>You have learned
        to befriend canine's and partner with them developing an unbreakable Kinship. You gain the
        Dog-</th></tr></thead><tbody><tr><td></td><td></td><td>Speech trait, and gain the Beast Master Clan feature.
        Your Nin-dog does not gain the unique AC calculation of this Clan</td></tr><tr><td></td><td></td><td>feature,
        does not gain the 11th level benefits of their breed, and can only regain Jutsu Slots on a short rest, once per
        long</td></tr><tr><td></td><td></td><td>rest. 250</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Jiton</th><th>Latent Magnet Release</th><th>You have begun to
        tap into your latent Nature Release Affinities. Choose to gain either Earth or Wind Nature
        Release</th></tr></thead><tbody><tr><td></td><td></td><td>affinity. Beginning at 7th level, when casting a jutsu
        with either Earth or Wind Release keywords, you can change the</td></tr><tr><td></td><td></td><td>damage type,
        if any, to earth, and increase the damage dice by 1 step. At 15th level, when you deal earth damage,
        you</td></tr><tr><td></td><td></td><td>can add your Constitution modifier to the damage
        roll.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Kaguya</th><th>Latent Bone Weapons</th><th>You have learned
        to manipulate parts of your bone structure. You gain the Bone Weapons Clan Feature up to 7th level.
        At</th></tr></thead><tbody><tr><td></td><td></td><td>11th level, you gain the Battle Hunger
        feature.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Keton</th><th>Latent Plasma Release</th><th>You have learned
        to generate Plasma Release. Choose to gain either Lightning or Fire Nature Release affinity. You
        gain</th></tr></thead><tbody><tr><td></td><td></td><td>access to the Enlightening Grasp Clan feature. You can do
        this a number of times equal to half your Prof. Beginning at</td></tr><tr><td></td><td></td><td>7th level, when
        you would cast a Jutsu with the Nature release you previously chose, you can change the damage type,
        if</td></tr><tr><td></td><td></td><td>any to Fire. Beginning at 15th level, when casting a Keton Hijutsu you can
        reduce the cost of the jutsu by 2 (Min 1).</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Kurama</th><th>Latent Genjutsu Molding</th><th>You have
        gained the ability to tap into latent ability to distort reality. You learn one of the Onijutsu from the
        Onijutsu</th></tr></thead><tbody><tr><td></td><td></td><td>Clan feature. You gain a second one at 11th level and
        a third at 18th. You cannot gain the Authoritative or
        Punishing</td></tr><tr><td></td><td></td><td>Onijutsu.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Namikaze</th><th>Latent Swift Release</th><th>You have
        learned to generate Swift Release. Choose to gain either Lightning or Wind Nature Release affinity.
        Increase</th></tr></thead><tbody><tr><td></td><td></td><td>your movement speed by 5 feet. This increase happens
        again at 7th and 18th levels. Beginning at 7th level, when you would</td></tr><tr><td></td><td></td><td>cast a
        Jutsu with the Nature release you previously chose, you can change the damage type, if any to Wind. Beginning
        at</td></tr><tr><td></td><td></td><td>15th level, when you deal Wind damage, you can add your Dexterity modifier
        to the damage roll.</td></tr></tbody></table></div>

        <div class="n5eb-table-wrap"><table><thead><tr><th>Ranton</th><th>Latent Storm Release</th><th>You have learned
        to create Beams of energy akin to lasers using your chakra alone. Choose to gain either Water
        or</th></tr></thead><tbody><tr><td></td><td></td><td>Lightning Nature Release affinity. Choose between Storm
        Style or Laser Style. You can learn Hijutsu with the chosen</td></tr><tr><td></td><td></td><td>Keyword.
        Beginning at 7th level, when you would cast a Jutsu with the Nature release you previously chose, your
        jutsu</td></tr><tr><td></td><td></td><td>deals an additional die of damage, once per casting. Beginning at 15th
        level, this instead becomes +2 die of damage.</td></tr></tbody></table></div>

        <p class="n5eb-source-note">30 additional extracted tables were omitted from this page to keep it readable.</p>

        </details>

        </section>

