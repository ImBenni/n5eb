        <h3>Senju Traits</h3>

        <p>Recommended Recommended Ability Score Increase: +2 Con, +1 Str Speed: Your base walking speed is 30 feet.</p>

        <p>Skill Proficiencies: Chakra Control, Ninshou.</p>

        <p>Wood Release Affinity: You begin with either Earth or Water Release Affinity. (Pick one)</p>

        <h3>Senju Features</h3>

        <p>Wood Techniques: The Senju Clan has access to a separate list of Jutsu unique to their Clan. You can add
        these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list(s). They do not need both
        Nature Release's to use their Clan jutsu.</p>

        <p>Built Different: Beginning at 1st level, the Senju are known for their downright gargantuan stamina.</p>

        <p>Increase your Hit Point total by 2. Every level thereafter each time you gain a level, increase your hit
        point total by 2.</p>

        <p>Mitotic Regeneration: Beginning at 1st level, you learn to create a reservoir of Chakra in form of Senju
        Cells.</p>

        <p>These cells are a byproduct of your exceptional bloodline which allows you to remain healthy and ready for
        battle.</p>

        <p>You have a number of Senju Cells equal to your level per long rest. You can spend these cells to accomplish
        any of the following;</p>

        <ul><li>As a bonus action, you can spend any number of cells,</li></ul>

        <p>regaining 1d6 + Constitution modifier hit points, per cell spent. This increases to a d8 at 11th level.</p>

        <ul><li>As a bonus action, you can spend any number of cells</li></ul>

        <p>to remove 1 rank of any Physical or Elemental condition you are under the effects of, per cell spent.</p>

        <ul><li>Beginning at 7th level, As a reaction to your hit points</li></ul>

        <p>falling to 0 or lower, you can spend 5 cells to instead fall to 1 hit point.</p>

        <p>Sacred Body: Beginning at 3rd level, you learn to leverage your stamina to manage your Senju Hijutsu.</p>

        <p>You may use Constitution as your Ninjutsu ability modifier of Senju Hijutsu that you cast.</p>

