        <p>BLOODLINE LATENTS</p>

        <h2>Bloodline, Latent</h2>

        <p>Category: Clan, Rare Prerequisite: You must take your first instance of this feat between levels 1 and 4. If
        you are level 5+, you cannot take this feat for the first time.</p>

        <p>You have the blood of a famous clan, granting you fleeting usage of their secret techniques. You gain the
        following benefits:</p>

        <ul><li>Select any one clan except your current clan or Non-Clan.</li><li>You gain 10 Bloodline Points, which
        can be spent to</li></ul>

        <p>purchase bloodline abilities from the chosen clan. You can find the listed abilities below. You retain any
        unspent points.</p>

        <ul><li>You can take this feat no more than twice.</li><li>You cannot take this feat a second time until you are
        level</li></ul>

        <p>12+. When you do, you gain additional bloodline points for the same clan you originally selected with this
        feat.</p>

        <p>ART CREDIT This picture comes from rooty1997 on r/Naruto subreddit.</p>

        <p>LATENT ABURAME Bloodline Ability Bloodline Name Point Cost Ability description Latent Bug Host I 2 Beginning
        at 1st level, twice per long rest, you can add 1d4 to any constitution saving throw.</p>

        <p>Latent Bug Host II 3 (You must have Latent Bug Host I) Beginning at 7th level, the bonus increases to a
        d6.</p>

        <p>Latent Chakra Sense I 2 Beginning at 1st level, by spending 1 minute, you can sense creatures that can
        utilize chakra within 500 feet of you, and what direction they are in.</p>

        <p>Latent Chakra Sense II 3 (You must have Latent Chakra Sense I) Beginning at 11th level, The range increases
        to 1 mile.</p>

        <p>Latent Chakra 2 Beginning at 3rd level, when you would cast an Aburame Clan Hijutsu, that deals damage, you
