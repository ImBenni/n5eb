        <p>Latent Inhuman 5 Beginning at 15th level, you gain proficiency in Constitution saving throws. If you are
        already Lifeforce proficiency, you instead gain a +1 bonus to your constitution saving throw bonus.</p>

        <p>Latent Chakra 2 Beginning at 3rd level, you learn to manifest a pool of Latent Reserve Cells. You gain a
        number of Reserves I Reserve Cells equal to your level, up to a maximum of 5 Reserve cells which can only be
        spent as a Action action on your turn, to regain 4 chakra points per cell spent.</p>

        <p>Latent Chakra 3 (You must have Latent Chakra Reserves I) Beginning at 11th level, your maximum number of
        Reserve Reserves II Cells increases to 10.</p>

