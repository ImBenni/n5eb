        Jutsu. or when a target fails a saving throw against any type of jutsu you cast or any type of attack you
        make.</p>

        <h3>Yamanaka Features</h3>

        <p>Yamanaka Techniques: The Yamanaka have access to a separate list of Jutsu unique to their Clan. You can add
        these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list.</p>

        <p>Mental Connections: Beginning at 1st level, Yamanaka clan jutsu you cast can use Charisma in place of Wisdom
        as their Genjutsu ability modifier.</p>

        <p>Mental Boon: Beginning at 3rd level, your experience with Yamanaka Jutsu grows. You gain 1 Mental Boon of
        your choice. Your boon options are detailed at the end of the Clan description. You gain an additional boon, at
        7th, 11th, 15th and 18th levels. Each time you gain a level, you can choose one of the boons you know and
        replace it with another boon you qualify for.</p>

        <p>Mental Clarity: The Yamanaka are adept at mind control, suggestion, alteration, and affliction, making them
        far more suited to resist such attempts. Starting at 7th level, you gain a 1d4 bonus to all saving throws
        against Genjutsu with the Unaware keyword, and advantage on Insight checks against creatures attempting to lie
        to you.</p>

