        <h3>Fūshin Traits</h3>

        <p>Recommended Recommended Ability Score Increase: +2 Int, +1 Dex Speed: Your base walking speed is 30 feet.</p>

        <p>Skill Proficiencies: Ninshou, Chakra Control Passive Affinity: You have the Wind Release Affinity.</p>

        <p>Wind Literacy: Your Ninjutsu ability score is counted as being +2 higher, for the purpose of qualifying for
        jutsu of B-Rank or Higher with the Wind Release Keyword.</p>

        <h3>Fūshin Features</h3>

        <p>Typhoon Techniques: The Fūshin have access to a separate list of Jutsu unique to their Clan. You can add
        these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list(s).</p>

        <p>Wind Release Simplicity: Starting at 1st level, when creating or learning Ninjutsu with the Wind Release
        Affinity reduce the time it takes to complete the task by half. This does not stack with other similar
        effects.</p>

        <p>Go With The Flow: Beginning at 1st level, when you cast a Ninjutsu with the Wind Release keyword, you ignore
        half cover. Also at 1st level, you reduce falling damage by half as the wind naturally protects you.</p>

        <p>Starting at 11th level, you also ignore 3⁄4's cover.</p>

        <p>Also at 11th level, you can spend your reaction to take no damage from fall as you are cradled in a
        collection of wind.</p>

        <p>Raging Tempest: Beginning at 3rd level, your wind has started to wander, almost gaining a mind of its
        own.</p>

        <p>When you would cast a Ninjutsu with the Wind Release Keyword, that has an area of effect, you may increase
        the area by 5 feet in every direction. Starting at 18th level, this increases by an additional 10 feet and you
        may also double the range of the jutsu.</p>

        <p>Swirling Cyclone: Beginning at 3rd level, your ability to control the currents and direction of wind is
        enhanced tremendously due to your Typhoon Release. When you cast a Ninjutsu with the Wind Release keyword that
        does not utilize the Swirl mechanic, you may spend 3 chakra to give it this mechanic, once per casting.</p>

