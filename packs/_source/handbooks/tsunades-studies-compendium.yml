        <p>Passive Affinity: You begin with the Fire release affinity.</p>

        <p>Fire Literacy: Your Ninjutsu ability score is counted as being +2 higher, for the purpose of casting jutsu of
        BRank or higher with the Fire Release Keyword through any ability score restrictions (SHB, pg.104).</p>

        <h3>Iburi Features</h3>

        <p>Iburi Techniques: The Iburi Have access to a separate list of Jutsu unique to their Clan. You can add these
        Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list.</p>

        <p>Fire Release Simplicity: When creating or learning Ninjutsu with the Fire Release affinity, reduce the time
        it takes to complete the task by half. This does not stack with other similar effects.</p>

        <p>Ashen Resilience: Starting at 1st level, your clan's unique kekkei genkai grants you the ability to control
        the smoke within and nearby your body. Whenever you take knockback, the distance is always halved.</p>

        <p>You also add a +1d4 bonus to saving throws against Genjutsu with the Inhale keyword, as your smoke body
        naturally filters out toxins.</p>

        <p>Starting at 3rd level, your body becomes more tolerant to flame. Whenever you take fire damage, you reduce
        the damage taken by -3. At 7th level, your resilience to fire improves. You gain resistance to fire damage.</p>

        <p>Starting at 11th level, you gain immunity to the Burned condition and you can attempt to end the Burned
        condition on an allied creature within 15 ART CREDIT Misaki Yata from K Project</p>

