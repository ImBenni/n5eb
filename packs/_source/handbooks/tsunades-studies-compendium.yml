        <h3>Hatake Features</h3>

        <p>White Chakra: The Hatake Clan are extremely proficient Chakra molders. They innately have the ability to call
        upon a unique source of Chakra called White Chakra.</p>

        <p>Beginning at 1st level, you have 5 White Chakra which you can only spend on Jutsu with the Lightning Release
        keyword. You gain 1 White chakra every level. When you finish a short rest you regain half of your spent white
        chakra. Your White chakra pool is fully refilled on a long rest.</p>

        <p>Lightning Release Simplicity: Beginning at 1st level.</p>

        <p>When creating or learning jutsu with the Lightning Release Affinity, reduce the time it takes to complete the
        task by half.</p>

