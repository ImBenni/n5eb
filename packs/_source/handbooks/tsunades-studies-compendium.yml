        <p>Reflective Frost Dispersal. As a reaction to creatures attempting to move more than 10 feet while inside the
        radius the mirrors, you make two melee/ranged Ninjutsu attacks, dealing 4d6 cold damage to the target and
        reducing their movement speed to 0.</p>

        <p>The first time you use this reaction per round, you gain two additional reactions until the start of your
        next turn (Taking Elite Actions does not remove these reactions early). These reactions can only be used to take
        this special reaction again.</p>

        <p>Creatures inside the radius of your jutsu can move freely throughout the radius of it. A creature who wishes
        to leave the radius can make a Dexterity save attempting to squeeze through your mirror.</p>

        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.1rcsHqjAcTNsH3nY]{Chilling Realization}</h3>

        <p>Category: Clan Prerequisite: Yuki Clan, Level 8+ You move so swiftly you seem to be gliding on Ice. You gain
        the following Benefits;</p>

        <ul><li>Increase your Dexterity score by 1, to a maximum of</li></ul>

        <p>20.</p>

        <ul><li>While on water, ice or snow, you ignore the difficult</li></ul>

        <p>terrain or movement penalty it impairs and instead gain a +15 bonus to your movement speed.</p>

        <ul><li>When a creature fails a saving throw against a Jutsu</li></ul>

        <p>you cast and gains a rank of Chilled as a result, they also gain a rank of Weakened until the end of their
        next turn.</p>

        <ul><li>When you would make a Dexterity Saving Throw, you</li></ul>

        <p>gain a +2 bonus to the save so long as you are standing on ice, snow, or water.</p>

        <h3>Freezing Façade</h3>

        <p>Prerequisite: Yuki Clan You become accustomed to the cold and all that comes with it. You gain the following
        Benefits;</p>

        <ul><li>Increase your Intelligence or Constitution score by 1,</li></ul>

        <p>to a maximum of 20.</p>

        <ul><li>You can use your Intelligence for Stealth, Deception</li></ul>

        <p>and Persuasion checks.</p>

        <ul><li>You ignore any perception-based penalties a cold</li></ul>

        <p>environment would inflict.</p>

        <ul><li>You ignore difficult terrain created by jutsu with the</li></ul>

        <p>Water Release or Wind Release keywords.</p>

        <ul><li>When you would make a saving throw against a jutsu</li></ul>

        <p>with the Water Release or Wind Release keywords and fail, you can spend 1 Chakra die to remake the save.</p>

        <p>You can do this twice per long rest.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.kYBjPco6cyosaxmE]{Frigid Frost}</h3>

        <p>Prerequisite: Yuki Clan, Level 4+ You exert so much Ice release chakra when you cast your clan jutsu that it
        becomes impossible to dodge and must instead be resisted. You gain the following Benefits;</p>

        <ul><li>Increase your Intelligence score by 1, to a</li></ul>

        <p>maximum of 20.</p>

        <ul><li>Yuki clan Hijutsu you cast with a</li></ul>

        <p>range of Self (Range), can have their size increased by 10 feet when cast.</p>

        <ul><li>Yuki clan Hijutsu you cast that</li></ul>

        <p>would force a creature to make a Dexterity saving throw, you can choose to instead make them make a Strength
        saving throw.</p>

        <ul><li>Creatures who fail a Strength</li></ul>

        <p>saving throw against a Yuki clan Hijutsu you cast, become bruised.</p>

