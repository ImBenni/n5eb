        <h3>Shoton Traits</h3>

        <p>Recommended Recommended Ability Score Increase: +2 Con, +1 Cha Speed: Your base walking speed is 30 feet.</p>

        <p>Skill Proficiencies: Nature, Survival Crystal Release Affinity: You begin with Earth Release Affinity</p>

        <h3>Shoton Features</h3>

        <p>Crystal Release: The Shoton Clan has access to a separate list of Jutsu unique to their Clan.</p>

        <p>You can add these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list(s).</p>

        <p>One with Earth: Shoton's are known for being rash, headstrong and stubborn. These personality traits tend to
        bleed into their affinity for earth Release Jutsu. Beginning at first level, you may use Charisma as your
        Ninjutsu ability modifier when casting Ninjutsu with the Earth Release Keyword.</p>

        <p>Crystalline Stone: Beginning at 1st level, your crystalline techniques allow you to reinforce any earth based
        jutsu that produces Quake Shards. Quake Shards you summon as a result of Ninjutsu with the Earth release keyword
        gains 3 DR (damage reduction) vs all sources except for Lightning &amp; psychic damage. This increases to 6 DR
        at 11th level.</p>

        <p>Rock Hard Stability: Starting at 3rd level, when you are under the effects of a Ninjutsu with the Earth
        Release Keyword, you gain a +1 Bonus to your Constitution Saving throws. This bonus increased to a +2 at 11th
        level and a +3 at 18th level.</p>

        <p>Crystalized Focus: Starting at 7th level, you have learned how to reinforce the molecular structure of Stone,
        Crystal and other earth-based materials.</p>

