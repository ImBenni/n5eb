        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.yAoyAgA5fsL8dZsO]{Intelligent Design}</h3>

        <p>Category: Clan Prerequisite: Nara Clan, Level 4+ Your genius is so great, that it sometime scares you. You
        gain the following Benefits;</p>

        <ul><li>Increase your Intelligence score by 1, to a maximum of</li></ul>

        <p>20.</p>

        <ul><li>You may select two skills to gain proficiency in.</li><li>You can active your Coordinate clan feature as
        a Bonus</li></ul>

        <p>Action on your turn.</p>

        <ul><li>When you would complete a short rest, you regain 2</li></ul>

        <p>uses of the Master Tactician clan feature. You can regain uses of this feature once per long rest.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.y3CHJu10SfVuxZ6a]{Lazy Savant}</h3>

        <p>Prerequisite: Nara Clan You're a prodigy, yet lazy. You know how to win the game, but playing it is just too
        much trouble. You find yourself taking longer to get ready, though this laziness brings out your best. You gain
        the following Benefits;</p>

        <ul><li>Increase your Intelligence or Constitution score by 1, to</li></ul>

        <p>a maximum of 20.</p>

        <ul><li>You may select two different skills to gain +1 ranks of</li></ul>

        <p>Mastery in. If this feat causes you to reach the ranks of Mastery limitation for your level, you do not
        benefit from the ranks of Mastery this feat gives you until you are of the appropriate level.</p>

        <ul><li>When you would take a short rest, you may double the</li></ul>

        <p>length of time it takes you to finish. When you do, you may roll 2 bonus Hit and Chakra die and regain the
        result. (You gain this benefit when you complete a Long rest as well.)</p>

        <ul><li>Over the course of a short or long rest, you can roll</li></ul>

        <p>1d20, record the result. When a creature you can see or hear would make an attack, skill check or saving
        throw, you may switch their d20 result, with your previously recorded result. You may gain the benefit of this
        feature twice per Long-Rest.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.kYtM7c1pFSWpG3bc]{Overwhelming Intellect}</h3>

        <p>Prerequisite: Nara Clan, Level 8+ You mind is so potent; your thoughts alone include ways to supersede those
        around you.</p>

        <p>You gain the following Benefits;</p>

        <ul><li>Increase your Intelligence score by 1, to a</li></ul>

        <p>maximum of 20.</p>

        <ul><li>Once per Long Rest, you can recover a use of</li></ul>

        <p>your Coordinate clan feature by completing a short rest.</p>

        <ul><li>You can now spend a use of your Master Tactician clan</li></ul>

        <p>feature to give one allied creature a Tactical Die as a Bonus action, on your turn. When you do, they can
        choose to add it to any one; Attack roll, Saving throw, Skill/Ability check of their choice. An allied creature
        can retain this Tactical Die until either the end of Initiative, or 1 minute has passed, whichever comes
        first.</p>

        <ul><li>You can spend a use of your Genius Potential clan feature</li></ul>

        <p>to take any one Skill-Action, that costs an Action, as a Bonus Action.</p>

