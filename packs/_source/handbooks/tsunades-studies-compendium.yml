        result. If the fire you use this ability on does not come from a jutsu based source, you add your Intelligence
        and Constitution modifier to the result.</p>

        <p>The fire is immediately extinguished. You cannot use this ability if the fire exists on a hostile creature as
        the result of a jutsu they cast, and can absorb smoke this way once per long rest.</p>

