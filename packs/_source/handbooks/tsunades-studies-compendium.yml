        <h3>Hoshigaki Features</h3>

        <p>Aquatic Adaptation: You have a Swimming and Water walking speed equal to your walking speed.</p>

        <p>Amphibious: You can breathe air and Water.</p>

        <p>Water Release Simplicity: When creating or learning Ninjutsu with the Water Release affinity reduce the time
