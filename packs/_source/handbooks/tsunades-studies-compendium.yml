        <h3>Jiton Traits</h3>

        <p>Recommended Recommended Ability Score Increase: +2 Int, +1 Con Speed: Your base walking speed is 30 feet.</p>

        <p>Skill Proficiencies: Ninshou, Survival.</p>

        <p>Magnet Release Affinity: You begin with either Earth or Wind Release Affinity. (Pick one)</p>

        <h3>Jiton Features</h3>

        <p>Magnet Techniques: The Jiton Clan has access to a separate list of Jutsu unique to their Clan. You can add
        these Jutsu to your jutsu list instead of selecting jutsu from the Normal jutsu list(s). They do not need both
        Nature Release's to use their Clan jutsu.</p>

        <p>Dust Layer: Beginning at 1st level, the first time each turn you deal earth damage with a Hijutsu you cast,
        it coats the target in a thin layer of dust, imposing a -1 Penalty to checks and saving throws made to resist
        Jutsu with the Earth Release Keyword until the end of your next turn. This penalty does not stack. Beginning at
        11th level, this penalty can stack up to 2 times, and each application resets its duration. Finally at 18th
        level this penalty can stack up to 3 times and each application resets its duration.</p>

        <p>Magnet Release: The Jiton clan has a unique talent for manifesting Magnet Release due to their close affinity
        to both Earth and Wind Release. Beginning at 7th level you gain the second Nature release you didn't select from
        Magnet Release Affinity clan trait. Also, at 7th level, twice per turn, when casting a jutsu with either Earth
        or Wind Release keywords, you can change the damage type to earth and increase the damage die by 1 step, up to a
        maximum of D12. (D4&gt;D6&gt;D8&gt;D10&gt;D12).</p>

        <p>Magnetic Mark: Using their abilities often, Jiton clan members develop a natural magnetic field that they can
        use offensively or defensively. Beginning at 3rd level, when you would affect another creature with any of your
        Jiton clan Hijutsu, you mark that creature until the end of your next turn. While the creature is marked by you,
        you always know their location, and the creature cannot benefit from being hidden from you. While the marked</p>

