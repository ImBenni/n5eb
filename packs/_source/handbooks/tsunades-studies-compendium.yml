        <h3>@UUID[Compendium.n5eb.clan.Item.WuDSrkZU5Y1MZIKk]{Dragon Cloak}</h3>

        <p>Classification: Hijutsu Rank: B-Rank Casting Time: 1 Action Range: Self Duration: Concentration, up to 1
        Minute Components: HS, CM Cost: 14 Chakra Keywords: Hijutsu, Ninjutsu Description: You cover your body in Chakra
        and mold it until its visible to the naked eye. Your Chakra then begins to bubble and boil until it takes the
        shape of a dragon like shell the covers your entire form. You are still visible inside the construct of Chakra.
        For the duration, you gain 30 Temporary Hit Points, your unarmed attacks deal an additional die of damage and
        you gain a +2 bonus on Constitution and Wisdom saving throws while you still have temporary hit points from this
        jutsu.</p>

        <p>If you cast this jutsu while you are gaining the benefits of Dragons Rage or Dragons Wrath, you reduce the
        cost of this jutsu by 3 for each one currently active.</p>

        <p>Additionally, if you are gaining the benefits of Dragons Wrath you no longer need to maintain concentration
        on this jutsu but you still gain its benefits for the duration of this jutsu.</p>

        <p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and
        Temporary Hit points by 15.</p>

        <h2>A-Rank:</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.Jb1lV8phUHRiIQAO]{Dragons Ascension}</h3>

        <p>Rank: A-Rank Duration: 1 minute Cost: 20 Chakra Description: You keep all of your Chakra inside you not
        allowing any of it to leak out enhancing your physical attributes past their limits, matching your physical
        prowess to that of a Dragons. Your Strength, Dexterity and Constitution all becomes 24 for the duration. Your
        speed is doubled and you gain more feral sounding speaking patterns. You gain a +2 bonus on Intelligence and
        Charisma saving throws. You lose the ability to cast and concentrate on Non-Ryu Clan jutsu for the duration.</p>

        <p>When this jutsu ends, make a constitution save vs a DC 20 + 1 for every round this jutsu remained active. On
        a failure, you fall to the ground prone and stunned for a number of minutes equal to rounds you had this jutsu
        active. of Dragons Rage, Dragons Wrath or Dragons Cloak you reduce the cost of this jutsu by 4 for each one
        currently Dragons Wrath and/or Dragons Cloak you no longer need to maintain concentration on that jutsu but you
        still gain its benefits for the duration of this</p>

        <h2>Clan Feats</h2>

        <h3>@UUID[Compendium.n5eb.clan.Item.gvBlSGLgzW6q6uR1]{D-Fighter}</h3>

        <p>Category: Clan Prerequisite: Ryu Clan, Level 12+ When you enter your Dragons Rage, the tips of your hair also
        gains the color of your dragons elemental affinity and begins to stand up on its own and exhibit properties
        similar to that of your chosen affinity such as sparks of electricity or embers of fire jumping. You gain the
        following benefits;</p>

        <ul><li>Ryu clan jutsu you cast that grants you temporary hit</li></ul>

        <p>points or deals damage of any type, increases their total results by your Proficiency bonus.</p>

        <ul><li>Your Dragon Claws damage die and all Ryu</li></ul>

        <p>Clan jutsu you cast increases their damage die by 1 step. (D4&gt;D6&gt;D8&gt; D10&gt;D12).</p>

        <ul><li>While you are gaining the benefits of Dragons</li></ul>

        <p>Rage, you can choose to reduce the Concentration cost of Ryu Hijutsu to 0, however while you are doing so you
        also cannot concentrate on anything except Ryu Clan Jutsu.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.8rhme79NxjikMWQW]{Dragon's Blood}</h3>

        <p>Prerequisite: Ryu Clan, Level 4+ You have learned to tap into the blood of the dragons that run through your
        veins, controlling it like you would any normal chakra flowing through you. You gain the following Benefits;</p>

        <ul><li>Increase your Strength, Dexterity, or Constitution score</li></ul>

        <p>by 1, to a maximum of 20.</p>

        <ul><li>You can use Intelligence in place of Strength for unarmed</li></ul>

        <p>attacks and damage, using your Dragon Claws damage die.</p>

        <ul><li>While you are wielding a Katana, you can spend 1 Chakra</li></ul>

        <p>Die. When you do, for the next minute your Katana becomes bathed in draconic chakra, increasing its damage
        die by +1, twice per turn.</p>

        <ul><li>Ryu clan Hijutsu you cast, that initiate a clash, you always</li></ul>

        <p>roll at Advantage.</p>

        <h3>@UUID[Compendium.n5eb.clan.Item.tbgg5Gh2HP2oZBK0]{True Dragons Blood}</h3>

        <p>Prerequisite: Ryu Clan, Level 8+ The power of the Dragon's rage within you has bubbled forth manifesting in
        ways other Ryu Clan members could only dream of. You gain the following Benefits;</p>

        <ul><li>Select a Second nature release from the Blood of the</li></ul>

        <p>Dragon clan feature. Ryu Hijutsu now deal half of your original nature releases damage and half of your new
        dragon's damage. If the damage value is odd, your original damage type will always deal the most damage between
        the split.</p>

        <ul><li>All Ryu clan jutsu deal an additional die of damage, while</li></ul>

        <p>you are benefiting from Dragons Rage clan feature. (If they deal damage)</p>

        <ul><li>When you activate Dragons Rage, you may roll a Chakra</li></ul>

        <p>Die, gaining three times the result as both Temporary Hit and Chakra Points for the duration of your Dragons
        Rage.</p>

        <p>Temporary Hit Points gained in this way can be added to Ryu Clan Hijutsu that grant Temporary Hit Points.</p>

