        <p>Hijutsu, you can conjure a source of water that fill a space that can hold it. This source of water can be
        used to cast Ninjutsu with the Water release keyword.</p>

        <ul><li>Ranton Hijutsu you cast reduces their cost by an</li></ul>

        <p>amount equal to their rank. (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5.)</p>

