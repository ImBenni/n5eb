              <p>The most basic member of the "Dirty group" a loose organization where many bandits and cutthroats
              associate themselves</p><p>Even if not a specifc order, its more of a freelancing for criminal but by
              associating themselves with the order then they can at least recognize and discuss with each other and
              avod in fighting…at least in normal circumstance since there are no specific rules for this
              "association".</p><p>The bandit is mostly a poor man or woman who simply had no choice and went into crime
              to survive.</p><p>Most often they are poor people, for different reasons, which pushed them to choose
              crime.</p><p>They rarely become violent to the point of killing someone and only prefer to get paid…in
              fact if they get their money they even will let the targets be.</p>
