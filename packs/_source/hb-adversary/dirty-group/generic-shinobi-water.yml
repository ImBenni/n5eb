  - name: Water Release Water Clone
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/water.webp
    system:
      description:
        value: >-
          <p>You conjure a clone made of water similar to the Shadow clone technique but with far less power, known as a
          Water Clone. Water Clone's weigh half as much as the caster. You can create up to two Water Clones when
          casting this jutsu, each costing 8 chakra to conjure.</p><p>Water Clones can cast ninjutsu with the Water
          Release keyword that you know of D-Rank, following normal Clone keyword restrictions. Additionally, if a
          damaging jutsu the Water Clone cast would use a damage die larger than a d4, the damage die the clone uses
          becomes a d6 instead. Water Clones, can move across water without chakra but cannot move vertically along
          non-water-based surfaces. If a Water Clone uses a weapon or unarmed attack, regardless of the weapon the clone
          uses, it deals 1d8 cold damage.</p><p>If a Water Clone casts a jutsu that requires more than 1 attack roll
          upon casting, it only makes one attack. If multiple water clones attack the same creature, you do not make
          multiple attack rolls. You instead choose a lead clone and it gains a +1d6 bonus to its damage roll(s), for
          each additional clone that is aiding it.</p><p>At Higher Ranks: For each rank you cast this jutsu above
          C-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at A-Rank, increase the rank of jutsu
          water clones can cast to C-Rank.</p>
