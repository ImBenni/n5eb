      description:
        value: >-
          <p>Paper Bombs are cheap, low-damage bombs used mainly by Shinobi personnel, mercenaries, bounty hunters, and
          adventurers.</p><p> Explosive Tags can be set to detonate on impact or set with a timer that lasts several
          seconds before detonating.</p><p> Explosive Tags have a thrown range of 30 feet.</p><p> As an action, you can
          throw an Explosive Tag at a point you can see within range.</p><p> Each creature within 10 feet must make a
          Dexterity saving throw taking the listed damage on a failed save, or half as much as on a successful
          one.</p><p> This item is 1 Bulk Paper bombs can be affixed to Kunai.</p><p> When they are the range of the
          Paper bomb becomes wholly reliant on the kunai itself.</p><p> When affixed.</p><p> The next time the affixed
          Kunai would deal damage to a creature, the paper bomb explodes.</p><p> A creature who took damage from the
          kunai prior to it detonating makes their saving throw at disadvantage.</p><p> Paper bombs can also be secretly
          affixed to another creature, primed and ready to detonate.</p><p> In order to do this, make a Dexterity
          (Sleight of hand) check vs the targets AC or Passive Perception whichever is higher.</p><p> On a success the
          paper bomb is attached to them and can be detonated as a bonus action.</p><p> On a failure it is not affixed
