    img: icons/sundries/documents/document-symbol-skull-tan.webp
    system:
      description:
        value: >-
          <p><span dir="ltr">Poison Tags are used to flush enemies out of cover through poisoning
          them.</span></p><p><span dir="ltr"> Poison Tags have a range equal to 30 feet + your Strength modifier x
          5.</span></p><p><span dir="ltr"> As an action, you can throw a Poison tag at a point you can see within
          range.</span></p><p><span dir="ltr"> The tag explodes in a 15ft radius sphere of green fog centered the chosen
          point.</span></p><p><span dir="ltr"> The fog spreads around corners, counts as heavily obscured and lasts for
          1 minute or until a breeze or gust of wind disperses it.</span></p><p><span dir="ltr"> When a creature enters
