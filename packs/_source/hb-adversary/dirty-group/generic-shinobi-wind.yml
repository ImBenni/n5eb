  details:
    biography:
      value: >-
        <p>These shinobis are in theory from various villages and due to various circumstances, at times even orders,
        they behave like ronins or take a couple of extra contracts on the side to round up their ryo count.</p><p>Many
        of them do not wish to fully join the other side of the law…but a man gotta live so one contract here or there
        on the side might not be the worst thing right? as long as they don't get caught.</p><p>They usually try to
        avoid anything that might get them recognized or found, and often even refuse certain missions because they
        might get them found out easaily.</p><p>But when they accept a contract, either because of an awesome pay hard
        to refuse or because they were ordered or considered the mission doable, they can be quite a nuisance and a
        powerhouse due to their shinobi training.</p>
