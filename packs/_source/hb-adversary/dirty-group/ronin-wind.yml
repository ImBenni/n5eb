          causing slow blood loss if untreated.</p><ul><li><p>At the start of their turn, a bleeding creature takes 1d4
          necrotic damage for each rank of Bleed they have.</p></li><li><p>A Bleeding creature cannot gain the benefits
          of a rest.</p></li><li><p>As an Action, a Bleeding creature may attempt to stop the bleeding by succeeding on
          a DC 15 Medicine check.</p></li><li><p>A creature who would gain a sixth (or more) ranks of the Bleeding
          condition immediately gains 5 ranks of the Lacerated condition, ending the Bleeding
          condition.</p><ul><li><p>The first time per rest a Bleeding creature would gain the Lacerated this way, they
          must succeed a DC 11 flat check, immediately taking the damage of their Lacerated ranks as they suffer a great
