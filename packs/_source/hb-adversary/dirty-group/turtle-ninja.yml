  details:
    biography:
      value: >-
        <p>These "shinobi wannabe" watched too many cartoons or perhaps heard too many stories about mutant ninjas or
        shinobis that depicted them as something they are not.</p><p>As such many of these people, unable to join the
        shinobi ranks due to them being severely unprepared for it, decided to make their own story come true and built,
        bought or stole a big shield which they modified with time and effort.</p><p>This bit shield is a peculiar piece
        of work which allows them to protect themselves very well but it also has a secret blade that comes out of one
        end to attack enemies.</p><p>These people are mostly doing "dirty" work only because its the only way to make a
        living with them having basically no useful skill if not their dreams and the effort they put on it.</p><p>They
        try to resemble shinobi but they often fail at doing that and they can't even use particularly powerful jutsu,
        usually just some basic stuff they caught along the way.</p><p>In a way they are somewhat on the innocent side
        of things, doing any job that does not put their life at risk and that does not involve heavy crimes.</p>
