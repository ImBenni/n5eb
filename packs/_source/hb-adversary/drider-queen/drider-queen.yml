  - name: Spider Web Unrolling
    type: spell
    img: systems/n5eb/assets/content/clans/tsuchigumo.webp
    system:
      description:
        value: >-
          <p>You knead sticky webbing in your hand in preparation for when a creature moves enough to catch them in a
          compromising position. The triggering creature must make a Dexterity saving throw. On a failed save they are
          restrained and knocked prone on a failed save as the sticky web restricts movement.</p><p>As a bonus action on
          your turns, you can pull the restrained creature up to 15ft closer to you. A creature restrained by this jutsu
          finds it difficult to break out using pure strength due to the tensile strength of the webs. The Webs holding
          the creature has an AC of 5 and 12 hit points with immunity to Bludgeoning and piercing damage. If the webs
          are reduced to 0 hit points this jutsu immediately ends. A creature can choose to spend its action to make a
          Strength saving throw at disadvantage to end this jutsu's effect on them</p><p>At Higher Ranks: For each rank
          you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the hit points of the web by
          +12.</p>
        chat: ''
      source:
        custom: ''
      activation:
        type: reaction
