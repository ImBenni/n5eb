  - name: Needle Jizo
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
    system:
      description:
        value: >-
          <p>You activate the roots of your hair causing your hair to grow at a heightened rate, while you control it to
          wrap around your body and harden with spiked, needle like hair protruding from it., For the duration, your
          movement speed is reduced to 0, each time a creature makes a melee attack against you while within 10 feet of
          you, they take 3d6 piercing damage, this includes the triggering attack.</p><p>At Higher Ranks: For each rank
          you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d6</p>
