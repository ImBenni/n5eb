        value: >-
          <p>You manifest a pale white-colored flame and use it to enhance your Fire Release Jutsu for the
          duration.</p><p>For the duration, Jutsu you cast with the fire release keyword rerolls all Attack rolls of
          1~5, taking the second result. Also, Jutsu you cast with the fire Release keyword rerolls all Damage rolls of
          1 or 2, taking the second result.</p><p>You choose when to apply this effect to a jutsu you cast. You may use
