  details:
    biography:
      value: >-
        <p>Ghosts are ex shinobi that were abandoned or betrayed by their own clan/village.</p><p>They are a lot more
        malleable when it comes to fighting and obedience, less martial and more free willed.</p><p>Still they have a
        huge respect for the Wraith and they will do their best to see whatever missions he gave them through, similar
        to how a kage or clan lead would give them missions.</p><p>Due to them being shinobi they have a variety of
        jutsu at their disposal and can fight a lot better than the other members, which often places them in spots of
        command or leader of missions due to their more open minded strategies and less martial behavior, to command the
        troops a lot better and efficient.</p><p>Ghosts are very dangerous on their own as well.</p>
