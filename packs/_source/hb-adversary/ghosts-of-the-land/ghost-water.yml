items:
  - name: Water Release Water Prison
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/water.webp
    system:
      description:
        value: >-
          <p>You create a dense spiraling bubble of water around a creature, capturing them inside and restraining
          movement and preventing them from performing Jutsu. Target creature makes a Dexterity saving throw, being
          restrained and captured on a failed save. The user must maintain contact with the sphere holding the captive
          inside. Losing contact causes the jutsu to end immediately.</p><p>The sphere has an AC equal to your Ninjutsu
          save DC, 10 hit points, and creatures captured inside the Sphere cannot make Hand Seals or make attacks and
          find it difficult to breathe. The sphere intercepts all damage meant for the target, has vulnerability to
          earth damage, and once it reaches 0 hit points, this jutsu immediately ends.</p><p>At the end of each of their
          turns they make a Strength saving throw. On a success they force their way out with brute force. The bubble
          containing a creature can be moved as an Action on behalf of the caster, as they drag it with them as part of
          their movement. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you
          can choose to make a captured creatures Saving throws to escape this jutsu at disadvantage.</p>
        chat: ''
      source:
        custom: ''
