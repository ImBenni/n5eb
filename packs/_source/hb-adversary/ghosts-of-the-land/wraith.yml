  details:
    biography:
      value: >-
        <p>Leader of the Ghosts Of The Land, a mercenary association of old shinobi, fighters and similar members that
        were once part of the great clans or villages involved in their fights.</p><p>After being abandoned, ignored and
        forgotten by those that once were their brethren and refused aid by the clans that once were their allies or
        their own, these men decided to become the "ghosts" of the land, mercenaries with no association nor care for
        the morals or rules of those inhabiting it.</p><p>As long as the pay is good, the deeds would be done and the
        better paying one is the one that gets to hire these battle hardened members.</p><p>Wraiths is the founder of
        the order several years ago and since then has been guiding the order to various type or jobs, always avoiding
        suicide missions and too troublesome jobs that would put them into a position where they would get too involved
        with dangerous stuff and rituals.</p><p>His gang has little to no morals…same as those that destroyed all their
        ever had and left them there to die and as such does not care what type of job he is offered…if it is within his
        standards of trouble and well paid…they will take care of it.</p><p>Wraiths is often silent and stoic, speaking
        little with those he deems not worth his time…but if the chance comes up and he needs to interact with people
        himself he has no issue doing so for the betterment of his own gang or to clear things out.</p><p>Despite his
        gang's violent tendencies, Wraith is actually very calculated and strategic, rarely risking doing something that
        would put his gang in trouble or danger and would often prepare elaborate strategies before going into
        missions.</p>
