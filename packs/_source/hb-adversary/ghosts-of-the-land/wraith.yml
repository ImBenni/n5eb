    system:
      description:
        value: >-
          <p>As a part of casting this jutsu you must currently be gaining the benefit of Royal Guard. After you reduce
          damage you take to 0, as a result of Royal Guard, you must end its effects, replacing them with this jutsu's
          effects.</p><p>At the end of your next turn, this jutsu then ends. You do not need to spend chakra to maintain
          concentration of this jutsu.</p><p>• You gain a number of temporary hit points equal to the damage reduced as
          a result of Royal Guard.</p><p>• Your movement speed is increased by +20 feet.</p><p>• Your next Strength or
          Dexterity based check gains a +10 bonus. Once used you cannot gain this effect until this jutsu's next
          casting.</p><p>• The next time you would deal damage with a Taijutsu attack, you can choose to end this jutsu,
