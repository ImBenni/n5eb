        value: "<p>If you spend Calories to activate this jutsu, you do not have to spend Chakra to maintain this jutsu for the duration.\_<br />You temporarily expand your entire body growing in size.\_<br />For the Duration you increase your Size by 1 Category (Medium &gt; Large &gt; Huge).\_<br />You also increase the damage you deal using Akimichi clan jutsu that use strength by xd4 (X= your Strength Modifier).\_<br />This bonus damage can be applied no more than twice per turn.\_<br />You also gain advantage on all Constitution saving throws.\_<br />You can cast this Jutsu a second time, increasing your size by 1 category to a maximum of Huge.\_<br />This makes the Cost of maintaining this jutsu become 8 Chakra per round.\_<br />If you become huge as a result of this Jutsu, the bonus damage your Akimichi clan jutsu deals instead becomes Xd6.\_<br />Also, creatures make saving throws against Akimichi Clan Jutsu you cast at disadvantage</p>"
