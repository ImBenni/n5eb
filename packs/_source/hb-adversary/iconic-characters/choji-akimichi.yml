  details:
    biography:
      value: >-
        <section id="secret-Ocy2xJPW5TccZpO3" class="secret"><p>Chōji is a very kind, polite, and caring person. These
        characteristics are said to be his greatest strength by both his father Chōza and his former teacher Asuma
        Sarutobi while his greatest weakness was his lack of self-confidence.[8] He is easily motivated by the prospect
        of food, and becomes highly agitated when somebody calls him "fat" (he refers to himself as "big-boned" and
        "chubby"). Asuma would say that he is just "pleasantly plump". However, he does not hide his love for food, and
        his near constant hunger is also an annoyance to his teammates, as eating often comes before other necessities
        such as stealth and teamwork. Food can also make him over-react about silly things, such as who gets the last
        chip, or when Akamaru tried to take his chips, and he refuses to let anyone else eat the last chip in the bag,
        even in battle-situation.[9] Chōji also tends to eat a lot when he's angry. Since Part II of the series,
        however, his eating habits are more controlled and no longer interfere with his duties as a shinobi.</p><p>Chōji
        has a long-standing friendship with Shikamaru. The two have complete trust in each other, with Shikamaru being
        one of the few people to look past Chōji's lack of athleticism, and see that he had a kind heart; recognising
        Chōji's true strength. Because of this, Chōji has unwavering faith and loyalty to Shikamaru and, if necessary,
        would give his life for him, which nearly happened during his battle with Jirōbō. Chōji also cares deeply for
        his mentor, Asuma, and had a difficult time in fighting him during the Fourth Shinobi World War, due to not
        wanting to hurt his own teacher,[10] even when Asuma called Chōji "fat" in an attempt to anger him.[11]</p><p>As
        stated by his father and teacher, Chōji greatly lacked confidence in himself and his abilities which often times
        hindered his actions or even progression in some aspects.[8] During the Fourth Shinobi World War, however, Chōji
        was able to overcome these issues and become one of the major contributing factors in the Allied Shinobi Forces
        turning the tide of the battle in their favour.[11]</p><p>As an adult, Chōji is shown to be very laid back and
        jovial. He is also shown to be a loving husband towards Karui, and an extremely doting father towards his
        eccentric daughter Chōchō. However, he maintains a competitive side, with Chōchō frequently challenging him to
        eating contests. During her Chūnin exam, Chōji is shown to gleefully cheer her on while also expressing concern
        for her well-being when she faces the skilled genin Shinki.</p></section>
