  - name: Magnet Release Dust Shield
    type: spell
    img: systems/n5eb/assets/content/clans/jiton.webp
    system:
      description:
        value: >-
          <p>You draw dust particles around yourself of your description (Gold, Iron, Sand, Salt, Gravel) to create a
          wall made entirely of the substance of choice, in any design of your choosing. This wall protects you from
          damage and can even protect other willing creatures.</p><p>As an Action, you can manifest this dust shield
          surrounding either yourself or another willing creature within 30 feet of you. If the affected creature moves
          from its current space at all, this jutsu ends. While active, a creature gains a Dust Shield. This Dust shield
          protects them from all attacks, from any direction. This Dust shield has an AC equal to your Ninjutsu save DC,
          is treated as a Quake Shard, has total of 15 Hit points and remains until dispelled, the creature moves out of
          its current space, or the Dust shields hit points are reduced to 0</p><p>Alternatively, as a reaction when you
          or an allied creature within 30 feet of you, would take damage, and neither of you are already under the
          effect of this jutsu, you can protect that creature, granting them a Dust Shield that has 15 Hit points and
          lasts until the start of their next turn.</p><p>Regardless of how you cast this jutsu, the Dust shield created
          by this jutsu has resistance to Cold, Fire and Earth Damage, but Vulnerability to Lightning Damage.</p><p>At
          Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the
          Dust Shield Hit points by 15. When you cast this jutsu a B-Rank or higher, affected creature cannot be moved
          by any means if you don't want them to be, while gaining the benefits of this jutsu.</p>
