        value: "<p>You form a mass of dust particle of your description (Gold, Iron, Sand, Salt, Gravel) and release it from your current position. All creatures within 15 feet of you of your choice when you cast this jutsu, must succeed a constitution saving throw, taking 4d10 earth damage on a failed save, or half as much on a successful one. This damage happens once per casting.</p><p>A creature that fails this saving throw becomes magnetized for the duration. While a creature is magnetized in this way, you can use your bonus action and choose a point, object or other creature within 60 feet of the magnetized creature that you can see. When\_ you do, you forcefully attempt to pull a magnetized creature in a straight line towards the target, ending in an unoccupied space as close to the target as possible (even if that space is in the air). The magnetized creature must succeed a Strength saving throw to resist this effect. If the creature is marked as a result of the Magnetic\_ ark Jiton Clan feature, they make this saving throw at disadvantage. You can choose any number of magnetized creatures to\_ attempt pull towards that same point, object or other\_ creature. A magnetized creature can use its action to repeat their saving throw to end the magnetized condition on themselves on a successful save.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the damage by 2d10 and the range by 5 feet.\_</p>"
