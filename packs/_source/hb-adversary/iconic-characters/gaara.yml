  details:
    biography:
      value: >-
        <section id="secret-mI6Vma2ePubb9bPj" class="secret"><p>Gaara was consistently warm to others during his early
        life. Although most of Suna's villagers feared and despised him, he was able to persevere due to the love that
        he felt from Yashamaru and his mother. His father, Rasa, believed these niceties were impeding Gaara's
        development as a jinchūriki and as such had both taken from him: he ordered Yashamaru to try and kill Gaara and,
        if he were to fail, to tell Gaara that neither he nor Gaara's mother had ever loved him. Rasa's plan succeeded,
        as following Yashamaru's death Gaara stopped trying to connect with people. Rather, Gaara focused on himself,
        driven solely by his own desires and his own survival.</p><figure><div><div><div><p></p><p>During his years of
        caring only about himself, Gaara becomes infamously known as "Gaara of the Sand Waterfall" (砂瀑の我愛羅, Sabaku no
        Gaara, English TV: Gaara of the Desert). Though he outwardly appears calm, "Gaara of the Sand Waterfall" is
        deeply unbalanced, completely unmoved by others' pleas for mercy and, in certain situations, driven mad with
        bloodlust. This behaviour is partly due to Shukaku, whose voice Gaara alone can hear in his head, who encourages
        violence at every opportunity, and who torments Gaara with threats to take control of his body if he falls
        asleep, thus making Gaara an insomniac. But Shukaku is not wholly responsible: Gaara simply hates other people
        for existing, believing that so long as they are alive they are a threat to his own life. His purpose,
        therefore, is to kill anyone who is strong or whom he perceives as similar to himself, as only by killing them
        can he assert his own existence. With those who do not interest him, Gaara is typically withdrawn and silent.
        When he must interact with them, he does so with open disregard for their feelings and often threatens to kill
        them, even his own siblings, if they become too much of a nuisance to him. Due to the sand's automatic defense
        preventing Gaara from suffering any real pain, when he first sustained his first true injury at the hands of
        Sasuke Uchiha's Chidori, Gaara became even more unstable at the time, completely losing control of himself to
        Shukaku.</p></div></div></div></figure><p>Gaara's background is very similar to that of Naruto Uzumaki: both
        have been jinchūriki since the day they were born, both were hated and scorned by almost everyone in their
        village, and both were raised without a parent's love. But whereas Gaara eventually gave up on other people,
        Naruto continued trying to win the acknowledgement of his peers and village, pursuits he eventually succeeds at.
        Whereas Gaara seeks strength only in protecting himself, Naruto seeks strength in protecting the friends he
        makes. When the two fought during the Konoha Crush and Naruto defeats Gaara, Gaara took this as proof that his
        own choices in life were wrong; he had surrendered to his difficult circumstances too easily. From that point
        onward he starts moving away from "Gaara of the Sand Waterfall" and started emulating Naruto instead, improving
        his relationships with his siblings, making friends within Suna and without, and finding something that he's
        willing to give his life to protect. His relationship with Shukaku did improve somewhat when he told the tailed
        beast he used to hate it, but was grateful to the beast because he was able to meet Naruto due to the painful
        life Shukaku made him endure. He also developed more sympathy for even enemies, as he pitied Kimimaro's
        emptiness and loneliness as a motivation to serve someone as evil as Orochimaru.</p><p>Gaara becomes Suna's
        Kazekage by the start of Part II, signalling the success of his emulation of Naruto. As Kazekage, Gaara becomes
        much wiser than most people his age when he took on the role. He forgave his father for trying to assassinate
        him as he was only trying to protect the village. Gaara also gains a new purpose in life by dedicating all his
        energy towards serving the village and those who live there. Although he retained some detractors, most of the
        villagers adore him and will do what they can to help him reform Suna and the rest of the world. Even this
        reform is very much inspired by Naruto, as he wishes for the Five Kage and their hidden villages to cooperate
        and benefit from each other in the same way that he has benefited from Naruto's influence. Gaara believes in
        forgiving past differences and strife, abandoning antiquated concepts of "honour" that only promote isolation,
        and serving a purpose greater than one's self. As in Suna, this unity that Gaara advocates is slow to catch on,
        for a time only gaining support from Naruto's own Konohagakure. By the time of the Fourth Shinobi World War,
        however, the Five Kage are convinced by Gaara and this in turn starts trickling down into the larger Allied
        Shinobi Forces. Despite his history of cruelty and young age during his ascent to Kazekage, Gaara attains the
        love of his people by showcasing his idealism, compassion and willingness to reform himself. A man of few words,
        Gaara leads by example, an assertive, thoughtful and collected presence in the heat of diplomacy and battle, who
        willingly puts his life on the line for his friends and allies. Gaara's way with words, astuteness and integrity
        earn him the respect of the older, more experienced Kage. Gaara's touching speech before the Allied Shinobi
        Forces produces a resounding response and is able to mend the rift between the Five Great Shinobi Countries.
        Gaara's superlative leadership abilities lead to his posting as Regimental Commander of the Allied Shinobi
        Forces.</p><figure><div><div><div><p></p></div></div><p>Gaara feels indebted to Naruto for how significantly
        he's changed since his time as "Gaara of the Sand Waterfall"; he considers Naruto his closest and first friend
        and believes all the tragedies of his childhood were worthwhile since they led him to meet Naruto. He takes part
        in the Fourth Shinobi World War not simply because he believes Akatsuki must be stopped, but because by doing so
        he can keep Naruto safe. Gaara's desire to protect Naruto, at times, means acting against Naruto's wishes: he
        knows Naruto would want to participate in the Fourth Shinobi World War to protect his loved ones, but feels
        Naruto would be safer if he were forbidden from doing so. Just like before, however, Naruto's desire to protect
        his friends gets through to Gaara, as he does not argue with his participation in the war after accepting he
        made an error in judgement. Gaara often cites his own experiences as "Gaara of the Sand Waterfall" during his
        interactions with Sasuke and others who suffer hate and loneliness, explaining the missteps that he didn't
        realise he'd made until he met Naruto so that they, in turn, might realise their own. His words do not always
        convince them, but Gaara is able to empathise with their choices and, as with Sasuke, he even wonders if Naruto
        could get through to them, just as Naruto got through to him. Despite his stoic demeanour, Gaara is empathetic
        and in touch with his emotions, freely shedding tears at Sasuke's refusal to change his ways, and at the
        revelation of his mother's love for him.</p></div></figure><p>As an adult, Gaara becomes wiser. When some of the
        current Kage expressed concerns about leaving the next generation to handle the threat they would soon face
        because these were peaceful times they were growing up in, Gaara calmly says each generation having little faith
        in the next one is not an uncommon thing. His empathy has also deepened, as he was able to understand Shinki
        needed love to help his out-of-control Magnet Release, hugging him in their first meeting and adopting him to
        give Shinki the happy family Gaara himself didn't have. Despite this, Gaara can be quite strict and blunt with
        his adopted son, urging Shinki not to attack Momoshiki Ōtsutsuki due to their gap in power, bluntly telling
        Shinki he was nowhere near Momoshiki's level.</p><p>Gaara retains some social awkwardness as an adult. His
        nephew Shikadai Nara noted Gaara tends to give strange gifts when he visits.</p></section>
