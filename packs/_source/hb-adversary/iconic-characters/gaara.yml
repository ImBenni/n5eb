  - name: Earth Release Earth Clone
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/earth.webp
    system:
      description:
        value: >-
          <p>A modified version of the Shadow Clone Technique that allows the user to create a solid construct from
          soil, rock and sand in their own image. The clone weights 6 times as much as the user and cannot swim (or
          drown). You can summon a single Earth Clone. The Earth Clone must be standing on the same surface as you to
          complete a task set by you. The Earth Clone counts as an Quake Shard.</p><p>The Earth clone has 20 hit points
          and Immunity to Genjutsu based effects, Psychic &amp; Poison damage, Resistance to Bludgeoning, Earth &amp;
          Cold Damage and Vulnerability to lightning damage.</p><p>Your clone has a single replica of any melee weapons
          you have on you at the time of creation that is also made from the same materials that constitute it's made
          from. When the clone makes an attack using this weapon or an unarmed strike it deals 1d8 earth damage. It can
          make up to 2 attacks using its action. The Earth Clone cannot cast jutsu, but you can cast a ninjutsu, that
          you know with the Earth Release keyword through your earth clone as if the clone is casting it
          itself.</p><p>Creatures who have chakra sight can immediately tell the clone is made of earth and can
          distinguish the clone from the original.</p><p>At Higher Ranks: For each rank you cast this jutsu above
          C-Rank, increase the cost of this jutsu by 3 and the clones Hit points by 15.</p>
