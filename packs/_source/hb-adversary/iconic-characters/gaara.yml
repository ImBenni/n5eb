          points equal to your Ninjutsu save DC. This jutsu ends early if you don armor of any type, change your AC
          calculation source or you end it as a bonus action.</p><p>If you lose all temporary hit points granted by this
          jutsu; as a bonus action, you can pay 5 chakra to gain temporary hit points equal to your Ninjutsu save
          DC.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
          3. When you cast this jutsu at B-Rank, Your AC begins its calculation with 14. When you cast this jutsu at
          S-Rank, Your AC begins its calculation with 15</p>
