        value: "<p>You create a large hand of dust particles of your description (Gold, Iron, Sand, Salt, Gravel) in an unoccupied space you can see within range. The hand lasts for the jutsu's duration, and it moves at your command, mimicking the movements of your own hand. The hand is an object that has AC 20 and hit points equal to your hit point maximum. If it drops to 0 hit points, the jutsu ends. It has a\_ strength of 26 (+8) and a Dexterity of 10 (+0).</p><p>The hand doesn't fill its space. When you cast this jutsu, and as a bonus action on your subsequent turns, you can move the hand up to 60 feet and then cause one of the following effects with it.</p><p>Clenched Fist: The hand strikes one creature or object within 5 feet of it. Make a melee ninjutsu attack for the hand using your game statistics. On a hit the target takes 4d8 earth damage.</p><p>Forceful Hand: The hand attempts to push a creature within 5 feet of it in a direction you choose. Make a check with the hand's Strength contested by the Strength (Athletics) check of the target. If the target is Medium or smaller, you have advantage on the check. If you succeed, the hand pushes the target up to 5 feet plus a number of feet equal to 5 times your ninjutsu ability modifier. The hand moves with the target to remain within 5 feet of it.</p><p>Grasping Hand: The hand attempts to grapple a Huge or smaller creature within 5 feet of it. You use the hand's Strength score to resolve the grapple. If the target is Medium or smaller, you have advantage on the check. While the hand is grappling the target, you can use a bonus action to have the hand crush it. When you do so, the target takes bludgeoning damage equal to 2d6 + your ninjutsu ability modifier. Interposing Hand: The hand interposes itself between you and a creature you choose until you give the hand a different command. The hand moves to stay between you and the target, providing you with half cover against the target. The target can't move through the hand's space if its Strength score is less than or equal to the hand's Strength score. If its Strength score is higher than the hand's Strength score, the target can move toward you through the hand's space, but that space is difficult terrain for the target.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, and the damage from the clenched fist option by 2d8, and the grasping hand by 2d6.</p>"
