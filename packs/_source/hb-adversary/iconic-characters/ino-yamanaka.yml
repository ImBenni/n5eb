  details:
    biography:
      value: >-
        <section id="secret-RuwLLOFUfyxBRHEI" class="secret"><p>From a young age, Ino has been a confident, bold, and
        outspoken girl who had a mild-temper and occasionally lashed out at others if their personal habits bothered
        her.[9] At the same time, she was by nature very friendly and loyal to her allies, usually more motivated than
        her team-mates, and tended to take charge of them, a characteristic she would later pass on to her son, Inojin.
        Shikamaru, despite finding most girls "troublesome", typically offers no resistance to Ino's forceful behaviour,
        being unwilling to deal with her reaction if things don't happen her way.[10] She is also prideful in her
        appearance and often tries to lose weight by dieting in the hopes that it will make her more attractive to boys;
        she even jokingly suggests that Chōji should do the same to attract girls.[11] Ino is quite knowledgeable about
        different types and meanings of flowers, sometimes making analogies to them when talking.[12]</p><p>Despite her
        assertiveness and uppity demeanour, Ino is a compassionate and kind person at heart, having been raised to
        embody the meaning of the bush clover: a blunt, candid love who treasures the bonds with her friends.[13] It is
        these qualities that earned Sakura Haruno's friendship, defending Sakura from bullies who teased her and helping
        her become confident. Their warm friendship developed into a bitter rivalry over the following years, fuelled by
        competition for Sasuke's affections, ninjutsu and even trading insults, with Ino as "Ino-pig" (いのぶた, Ino-buta)
        and Sakura as "Forehead Girl" (デコリーン, Dekorīn, English TV: Billboard Brow). After the Chūnin Exams, Ino becomes
        impressed by Sakura's growth and they rekindle their friendship, while maintaining their rivalry on more amiable
        terms. She cares greatly for her teammates as well, being relieved that they survived after the failed Sasuke
        Recovery Mission,[14] promising her sensei Asuma Sarutobi to look after them after he dies,[15] and during the
        Fourth Shinobi World War, encouraging them to stay strong in the face of danger.[16] By the time of his death,
        Inoichi believed that Ino had truly blossomed into the bush clover of the Yamanaka Clan, and is proud of her
        bonds with her friends.</p><figure><div><div><div><p></p></div></div><p>Ino had the same infatuation for Sasuke
        that most other girls in their Academy class had, due to his good looks and cool personality. Even after
        Sasuke's defection from Konoha, Ino largely retained her feelings for him in Part II and she cried when he was
        declared an international criminal,[17] and pictured him as the "love" the bush clover symbolism during the
        Fourth Shinobi World War.[18] Ino meets Sai in Part II, who not only replaces Sasuke on Team 7, but also
        strongly resembles him in appearance. For this reason, Ino becomes immediately smitten with him, flirting with
        him when first introduced and blushing when Sai called her beautiful.[19] Although her Infinite Tsukuyomi dream
        reveals she likes the idea of Sasuke and Sai fighting over her, Ino's affections ultimately shift toward Sai,
        showing a deeper desire to know more about him as she risks her life to save him in Shikamaru Hiden. Sai
        reciprocates Ino's feelings and the two marry years later, having a son, Inojin. Even after many years together
        Ino's love for Sai is as strong as ever, occasionally acting as love-struck as she did when they first
        met.</p></div></figure><p>As a mother, Ino's personality is relatively the same, but she has greater respect for
        her clan and its traditions, insisting they be passed down to the next generation to form a new Ino–Shika–Chō.
        However, she firmly believes in not pushing her son Inojin in a career path he does not want, recognising that
        all people mature at their own rate and in their own ways, openly trusting her son to find his own path as a
        ninja. Ino strongly respects her father and tries her best to carry on his will in leading the clan.
        [20</p></section>
