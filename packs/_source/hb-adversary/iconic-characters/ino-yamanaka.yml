          to flicker orange.</p><p>Select one creature you are aware of, that can hear you within range, forcing them to
          make a Wisdom saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect,
          becoming immune to further castings of this jutsu for the next 10 minutes.</p><p>Success: Affected creature is
          able to resist this jutsu's effects.</p><p>Failure: The affected creature must spend its bonus action, on each
          of its turns calmly but in a harmful way scratch at its arms, drawing wounds upon it, dealing 1d8+ the targets
          Strength modifier slashing damage. They then remake their saving throw vs this jutsu, ending it on a
          successful save.</p><p>Critical Failure: Same as failure, but they instead must spend their action, not their
          bonus action, and they deal 2d6 + the targets Strength modifier slashing damage.</p><p>At Higher Ranks: For
          each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures
