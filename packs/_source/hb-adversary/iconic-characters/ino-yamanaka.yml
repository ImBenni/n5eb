  - name: Mind Body Transfer
    type: spell
    img: systems/n5eb/assets/content/clans/yamanaka.webp
    system:
      description:
        value: >-
          <p>You perform the Yamanaka Clans most prolific jutsu invading the mind and body of a target creature and
          overwriting their consciousness with your own. Target one creature you can see within range with sentient
          thought such as another Human, animal, or anything that fits the previous sentient thought pre- requisite.
          Puppets, inanimate objects and even some foreign creatures may be immune to this jutsu such as Mutants or
          Demons. Be sure to Check with your DM to see what may not be applicable.</p><p>The select creature must make a
          Charisma saving throw. On a Failed save, you transfer your consciousness into your target's body for 1 minute.
          Once you possess a creature's body, you control it and act on its turns, using its body. While you are
          inhabiting the body of another creature, you gain the following;</p><p>• When making Attack rolls, skill
          checks or Casting Jutsu you know that uses Strength, Dexterity or Constitution, you instead use the statistics
          of the creature who's body you are occupying.</p><p>• When making Attack rolls, skill checks, or Casting Jutsu
          you know that uses Intelligence, Wisdom or Charisma, you continue to use your own statistics.</p><p>• You
          retain the benefit of your own class and clan features. You cannot activate or cast class features or jutsu
          that would inflict negative conditions on the host body, such as Exhaustion.</p><p>• You gain access to any
          General or Clan traits the creature may have that you are aware of.</p><p>• You do not have access to any
          Class or Role Traits/Features that the creature may have.</p><p>• You retain access to your own list of
          Hijutsu, Ninjutsu, Taijutsu, Bukijutsu and Genjutsu.</p><p>• You do not gain access to the host creatures list
          of Jutsu under any circumstances. But you can end concentration on jutsu they were concentrating on or gaining
          the benefit from.</p><p>• If the host body takes any damage, they immediately attempt another saving throw,
          ending this effect on a successful save. On a successful save, you fall unconscious until the beginning of
          your next turn at which time your consciousness returns to your body.</p><p>• The host does not count as
          willing to effects that they would not normally be willing for.</p><p>• Your body is left where you last were
          before you cast this ability. It is functionally unconscious until you end this technique in which case you
          leave the creatures body and return to yours. If your body is damaged in any way while you are inhabiting
          another creature's body, you immediately return to it.</p>
        chat: ''
