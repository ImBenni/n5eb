  - name: Command
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
    system:
      description:
        value: >-
          <p>You speak a one-word command to a creature you can see within range. The target must succeed on a Wisdom
          saving throw or follow the command on its next turn. The jutsu has no effect if the target is undead, if it
          doesn't understand your language, or if your command is directly harmful to it. Some typical commands and
          their effects follow. You might issue a command other than one described here. If you do so, the GM determines
          how the target behaves. If the target can't follow your command, the jutsu ends.</p><p>• Approach: The target
          moves towards you by the shortest and most direct route, ending its turn if it moves within 5 feet of
          you.</p><p>• Drop: The creature drops whatever it is holding and then ends its turn.</p><p>• Grovel: The
          target falls prone and then ends its turn.</p><p>• Flee: The target turns and spends its turn moving away from
          you by the fastest means available.</p><p>• Halt: The target doesn't move or take actions. A flying creature
          stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance
          needed to remain in the air.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
          the cost of this jutsu by 3 and the number of creatures you target by +1.</p>
