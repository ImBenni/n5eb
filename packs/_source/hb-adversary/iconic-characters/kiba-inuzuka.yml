  - name: Dynamic Marking
    type: spell
    img: systems/n5eb/assets/content/clans/inuzuka.webp
    system:
      description:
        value: "<p>Your Nin-Dog leaps into the air, and spins while releasing Chakra charged urine over the area.\_<br />Creatures in a 10-foot radius centered on the Nin-Dog are covered in the Urine.\_<br />Affected creatures exude a faint but obvious stench that can be tracked by you or your Nin-Dog.\_<br />For the duration, you &amp; your nin- dog have blindsight when searching for or attacking creatures affected by this jutsu.\_<br />When you make a perception check to find an affected creature, you gain advantage on the roll.\_<br />Also, when you or your Nin-Dog make an attack using an Inuzuka clan jutsu against an affected creature, roll a 1d4, adding the result to your attack roll.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the radius of this jutsu, by 5ft.</p>"
