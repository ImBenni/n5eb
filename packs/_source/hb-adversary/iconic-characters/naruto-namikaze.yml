  - name: Rasengan
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
    system:
      description:
        value: >-
          <p>You collect chakra into your hand generating a powerful sphere of spiraling chakra to strike an enemy with.
          You do not spend chakra to maintain concentration on this jutsu. Beginning at the start of your next turn, you
          can spend your action to make a melee ninjutsu attack against a creature within range. On a hit, you deal 5d8
          force damage and the target makes a Strength saving throw. On a failed save they are knocked Back 30ft
          becoming Dazed and Concussed. This jutsu only ends on a successful hit. If a creature knocked back by this
          jutsu collides with a structure or construct, their movement stops, taking damage as if they had fallen an
          equal distance.</p><p>At Higher Ranks: For each rank above C-Rank, increase the cost by 3 and the damage by
          3d8 and the knock back distance by 10 feet. If this Jutsu is cast at B-Rank or higher, you can make the melee
          ninjutsu attack the turn you cast it. You may also add a nature release keyword, changing this jutsu's damage
          type to match the nature release you currently can use. You gain the following benefits depending on the
          Nature Release chosen:</p><p>• Earth: The target takes earth damage is bruised &amp; gains the weakened
          condition until the end of their next turn.</p><p>• Wind: The Rasengan gains a range of 60 Feet and you can
          instead make a ranged ninjutsu attack targeting a creature within that range. On a hit, the target takes wind
          damage and the Rasengan expands. All Creatures, except the original target, in a 15-foot radius sphere
          centered on the original target must make a Dexterity saving throw, taking the damage of this jutsu as well on
          a failed save.</p><p>• Fire:The target takes fire damage and 1 rank of burned, and all creatures in a 30-foot
          cone behind the target creature must make a Constitution saving throw, gaining the burned condition on a
          failed save.</p><p>• Water: Target creature takes cold damage and makes their saving throw at disadvantage. On
          a failed save, they are knocked back twice the distance, taking falling damage if they hit a solid
          surface.</p><p>• Lightning: The attack made has advantage and on a hit, the target creature take lightning
          damage and gains the Shocked condition.</p>
