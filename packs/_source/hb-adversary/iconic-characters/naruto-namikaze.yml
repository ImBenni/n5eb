  details:
    biography:
      value: >-
        <section id="secret-zZ0OxovbCoPrVNAv" class="secret"><p>Naruto is noted as boisterous, exuberant, and
        unorthodox, quite similar to Hashirama Senju.[24] He inherited his mother's verbal tic, as he ends his sentences
        with "Dattebayo!" (だってばよ!) when emotional. Though he responds best to competition and is not afraid to ask for
        assistance, Naruto is relatively naïve and slow to understand principles or situations. He often requires an
        oversimplified analogy in order to grasp explanations[25] and can even prove forgetful.[26] Naruto is aware of
        his faults and admits he acts strong to mask his embarrassment and frustration about them.[27][28] Despite his
        naivety, Naruto can be quite observant, picking up on things others miss and retaining information casually
        gathered through conversation.[29]</p><p>Growing up as an orphan who suffered years of hatred and social
        isolation has influenced Naruto's character in a number of ways: he is heedless to formality and social
        standings, addressing certain people with nicknames instead of honourifics, although by the time of his
        adulthood, Naruto has slightly outgrown this trait.[30][31] He has picky eating habits of ramen, his favourite
        food; he has a perverted side that manifests as attempts to peep into women's baths, although these moments are
        rare.[32] Despite his quirks and the criticism they earn him to the point of being labelled the ultimate problem
        child, Naruto is said to have a personality that draws people to him,[33] inspiring friendship and loyalty
        through acts of genuine kindness that could change a person's world view and thus built meaningful relationships
        that he lacked in early life; the Sage of Six Paths believes Naruto's kindness is a special gift that allows him
        to save Kurama from its hatred.[34] Naruto deeply cherishes these bonds and will go to great lengths to protect
        them, best seen with Sasuke after his defection from Konoha.</p><p>Another of Naruto's prominent traits is his
        desire for acknowledgement; his pranks around the village were for people to notice him, even if it meant by
        scolding him. Therefore, he dreamed of one day becoming Konoha's Hokage, the epitome of acknowledgement and
        respect from everyone in the village.[35] Knowing his dream is a long, arduous and seemingly impossible path,
        Naruto developed his own nindō of never going back on his word. This life-long philosophy serves as the
        cornerstone of Naruto's great self-confidence; he believes he can accomplish any goal with enough hard work and
        perseverance, no matter what. This trait guides him in many aspects of life, such as his promise to bring Sasuke
        back to Konoha. Over time, his goal to be Hokage grew from a desire for the acknowledgement of others to a
        desire to help and protect the people close to him, which Tobi attributed to the Will of Fire.[36] His nindō has
        since been reinforced by his understanding that shinobi were meant to endure through hardships.[37] His belief
        in hard work and perseverance made him detest shortcuts to achieving, as he disqualified his son from the Chūnin
        Exams for using the banned Kote, and expressed disgust at Momoshiki and Kinshiki Ōtsutsuki for their reliance on
        harvesting from Chakra Fruits to lazily gain power.[38]</p><p>After the death of his master Jiraiya, talking to
        his father Minato and listening to Nagato's tragic story, Naruto grew to understand the destructive cycle of
        hatred and he vowed to break it in order to bring true peace to the world.[39] To that end, his participation in
        the Fourth Shinobi World War is not only to protect his friends but also to bear and erase the world's hatred
        all by himself. After encountering a reincarnated Itachi Uchiha, however, Naruto realises that he cannot handle
        everything alone and that he must allow his friends to support and fight alongside him. As he does so in war's
        climax, his fighting spirit inspires the Allied Shinobi Forces to join him and keep fighting to end the war as
        well, ultimately becoming an example for many people to admire, follow, and believe
        in.[40][41]</p><figure><div><div><div><p>Naruto first met Hinata Hyūga when they were children, where his open
        kindness and courageous spirit earned him her admiration, which grew into love. On his part, Naruto remained
        mostly oblivious to Hinata's feelings for him and even considered her "weird" because of her shyness around him
        and his socially ostracised childhood. However, that change during the Chūnin Exams in Part I when they began to
        interact more and support each other, causing Naruto to like her as a friend.[42] In Part II, as Hinata becomes
        willing to risk her life to protect Naruto, he, in turn, sees her as an actively strong person despite his
        speechlessness at her love confession. Naruto grew to love Hinata subconsciously. Still, he was unaware of it
        because he kept "fighting" for Sakura, which was just another way for him to compete with Sasuke. During The
        Last: Naruto the Movie, Naruto finally recognises the love that Hinata has always had for him, causing him to
        become more bashful and protective of her, just as she was for him. Realising that she alone has ever had faith
        in him and that she has always been there for him, he reciprocates her feelings and desires to be with her for
        the rest of his life. This new-found desire made him willing to make healthier lifestyle choices such as eating
        vegetables and reeling in his impulsiveness, something others have had little success with
        doing.</p></div></div></div></figure><p>As an adult, Naruto becomes wiser and more mature, though he retains
        some of his negligence for honourifics.[43] Although he finally achieves his dream of becoming Hokage, its many
        tasks would often overwhelm Naruto to the point of him being unable to spend time with his family. He admits
        that part of this stems was from not having grown up with a father himself, making him unsure of how to interact
        appropriately with his children.[44] Naruto also tends to be more responsible in his duties as Hokage than as a
        father. Nevertheless, Naruto profoundly loves his family, as he creates shadow clones to tend to them while he's
        busy, protects them in times of danger, spends time with them when he can, and expresses pride in his children's
        successes.[38] He adopts Hiruzen's philosophy that everyone in the village is his family, believing that genuine
        relationships are made up of love rather than blood relations.[45] His refusal to give his son any special
        treatment due to their blood-relationships, along with the insistence that the boy professionally addresses him
        as "Seventh" or "Hokage" while in the office, is a testament of Naruto's lack of bias and prejudice.[38]
        Likewise, even in the face of people close to him committing horrible deeds, Naruto remains loyal to them,
        pushing aside his grief enough to see the nature of what they did.[46] However, after facing Momoshiki Ōtsutsuki
        and realising how his overly-committed nature serving the entire village was significantly affecting his own
        family's happiness, Naruto came to accept that he needed to give them more attention. As such, by allowing more
        help from others, Naruto was able to enjoy more time with his family, restoring the same healthy relationship he
        had with them before he became Hokage.</p><figure><div><div><div><p></p></div></div><p>Although he struggled to
        overcome the hatred of people and the shinobi world, seeking to achieve the peace that his master Jiraiya
        dreamed of so much, Naruto was also not free from his own hatred. When Naruto understands that it is necessary
        to definitively master the power of the Nine-Tails, he goes to the Island Turtle and discovers the Falls of
        Truth as part of the process. There, Naruto encounters his darker half: Dark Naruto (闇ナルト, Yami Naruto).[47]
        This was the personification of all of Naruto's negative feelings, such as the grudge he secretly still held
        against the villagers of Konoha who had always rejected him since childhood. Dark Naruto was the Nine-Tails'
        favourite aspect of Naruto, claiming him to be the "real" Naruto. No matter how much he resisted, the Nine-Tails
        would tap into the hatred that existed hidden in the depths of his heart.[48] Naruto's conclusion to dealing
        with his inner hatred was not to ignore him, but rather accept his existence, understanding that this same
        grudge was what made him get to where he was and value his entire journey up until that moment.[49] This whole
        process served as basis for Naruto to shape who he truly wanted to be from then on.</p></div></figure></section>
