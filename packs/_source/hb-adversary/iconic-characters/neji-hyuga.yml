    system:
      description:
        value: >-
          <p>Main Branch</p><p>The perfected form of the "Palm Rotation" taught only to those of the main branch of the
          Hyūga clan. As part of the requirements of this jutsu you must be benefitting from the Gentle Fist Stance.
          This creates a dome of visible blue Chakra, repelling everything of your choice up to 15 feet away in a radius
          centered on you.</p><p>Until the start of your next turn, you and all creatures you have selected to not be
