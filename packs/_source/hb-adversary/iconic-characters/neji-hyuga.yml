  details:
    biography:
      value: >-
        <section id="secret-DQbtINeBQhCjrEAs" class="secret"><p>As a child, Neji was kind and prone to smiling; on
        Hinata's third birthday, he confided to his father that he thought she was cute.[10] He lost these qualities
        after his father's death, growing serious and cold, more mature than most his age. For years he was driven by a
        fatalistic belief that his and everyone else's fates were determined from birth and were inescapable. He
        perceived his own destiny as being that of a rare talent, causing him to arrogantly place himself above those he
        believes are "weaker" than himself. He also perceived that his talents would always be handicapped by mandatory
        servitude to the Hyūga's main house, which he resented and it fuelled his animosity towards the main house and
        its members.</p><p>Neji shared his philosophy about fate with those he met, gladly telling them when they are
        straying from the paths that have been set out for them by, for example, trying to exceed their natural
        limitations or trying to defeat him in combat when they lack any obvious ability to do so. When he shared his
        philosophy with Hinata, she concluded that his insistence upon destiny was actually a sore spot for him that
        caused him inner suffering: he so badly wanted to prove himself to the main house yet feels incapable of doing
        so. Neji attempted to kill her in anger for her words. Naruto Uzumaki also disagreed with Neji, claiming that
        Neji was not realising his destiny because he was in fact holding himself back. Neji initially scoffed at
        Naruto's suggestion, but he was forced to reevaluate when Naruto, a "failure", defeats him, a "genius", in a
        fight.</p><p>From his experience with Naruto, Neji felt that fate is not inescapable but that, rather, one's
        destiny is what one makes of it; he felt indebted to Naruto for releasing him from his prior "darkness". The
        destiny Neji ended up selecting for himself was to become strong enough to never lose again, although his
        inevitable destiny would soon come to hold true. In pursuit of this goal he trained with his teammates, whose
        own dreams he became supportive of, and later with members of the main house, whom he gradually started mending
        relations with. Over time his desire to get stronger became as much a motivation to never lose as it is to
        protect his friends and family. In particular, he embraced his responsibility as a member of a branch house to
        keep Hinata safe, showing greater concern for her than anyone else in combat situations and,[11] ultimately,
        giving his life to save hers.</p><p>Birds were often used to characterise Neji's philosophy and growth: while he
        felt bound by destiny and the cursed seal on his forehead, he described his personal experiences as being like a
        caged bird;[12] after being defeated by Naruto, he observed to his father's memory how many birds there were
        freely flying in the world;[13] when trying to overcome the limitations of his Byakugan, he observed birds at a
        distance but could never spot the one at his blind-spot;[14] after his death, the Allied Shinobi Forces took on
        a bird formation in his memory.[15]</p></section>
