  details:
    biography:
      value: >-
        <section id="secret-ztgsF33J8TaTadg3" class="secret"><p>Under Guy's leadership, Lee has acquired a number of his
        sensei's personality traits: he is energetic, optimistic, and hot-blooded, and shows the epitome of a "nice
        guy". He believes that one cannot dislike food and shows strong dedication to his promises; when this promise is
        broken, just barely, he assigns himself arduous training to prevent it from happening again. Lee speaks
        respectfully to others, never using contractions or swear words and always addressing people with appropriate
        honourifics (except his teammates, since Lee feels they are close enough to be spoken to informally). He also
        carries a small book and pencil to recall advice that Guy gives him over time.</p><p>Despite his passionate
        nature, Lee has also shown strong instincts, staying focused at the task at hand and rarely losing his
        composure. He has a keen sense of honour and respects his opponents, refusing to hold grudges against those who
        have defeated him, and returning favours to those that have helped him. This was shown by his befriending of
        Gaara, forgiving him for crushing his arm and leg — injuries that nearly ended his career as a shinobi. Lee
        feels others should show the same respect towards their opponents, and is disgusted whenever someone is
        unnecessarily cruel to their enemies.</p><p>One of Lee's recurring themes throughout the series is his drive to
        succeed, believing with enough hard work and perseverance, he can surpass a natural genius. He can be prone to
        depression when faced with setbacks. Neji, Lee's more talented teammate and rival, found Lee's efforts to be in
        vain, believing a "failure" could never defeat a "genius". As such, Lee became determined to defeat Neji in
        order to prove him wrong, though was met with defeat every time. When Neji himself was defeated by Naruto
        Uzumaki, another so-called "failure", he rejects his belief in fate and now holds great respect for Lee,
        believing that he will surpass the gifted with enough work.</p><figure><div><div><div><p>During Part I, Lee
        revealed he had feelings for Sakura Haruno. Although she did not reciprocate his feelings and even considered
        him weird, she later become more appreciative and friendly towards him after he helped saved her from the
        Otogakure genin during the Chūnin Exams. After the exams, Lee's interest in Sakura went largely unaddressed in
        the manga, though it is sometimes referenced in the anime; while having a match with Lee, Naruto transformed
        into Sakura, distracting Lee long enough for Naruto to attack him.[13] However, Lee's Infinite Tsukuyomi dream
        was of winning Sakura's affections, implying he still had romantic feelings for her. These feelings apparently
        have changed by adulthood, as Lee ended up marrying someone else and had a son named Metal
        Lee.</p></div></div></div></figure></section>
