  details:
    biography:
      value: >-
        <section id="secret-JKO6m2lCQg2FI7vz" class="secret"><p>As a child, Sakura was insecure and highly
        self-conscious about her large forehead, covering it with her bangs. It was not until she met Ino, who defended
        her from bullies and became her friend, that she become more self-confident. At the start of Part I, Sakura
        typically gives the outward impression of being polite to her superiors, considerate of her peers, and confident
        in herself. She has occasional moments of bashfulness around Sasuke and competitiveness around Ino, but
        otherwise appears quite collected. This reservation, though never disingenuous, frequently masks how Sakura
        feels: in certain situations, she has pronounced feelings of frustration and anger. Rather than display these
        emotions to others, she projects them inward, allowing a manifestation of who she truly is — what is labelled
        "Inner Sakura" (内なるサクラ, Uchi Naru Sakura) — to have the opinions Sakura wants to keep to herself. Inner Sakura,
        whose appearances are marked by an exclamation of "Shannarō!", is in a sense a personality separate from Sakura
        herself, a fact that allows her to overcome the Mind Body Switch Technique.[11] At other times, Sakura and Inner
        Sakura are indistinguishable from each other, usually with regards to Naruto. If Naruto says or does something
        that annoys or upsets her, Sakura responds with violence, a reaction that under other circumstances would be
        delegated to Inner Sakura.</p><figure><div><div><div><p></p></div></div></div><p>As Part I progresses, Sakura
        becomes increasingly exposed to the realities of the shinobi world, difficulties for which she cannot rely upon
        Inner Sakura to cope with alone. When she was an Academy student, Sakura succeeded through studying alone to the
        point of pride. As a shinobi, however, this is proven insufficient as missions cannot be truly completed merely
        with book smarts, and it is necessary to be able to fight so that other shinobi will not kill her or her
        teammates. The latter makes Sakura particularly disappointed in herself, as she is unable to contribute much in
        battle and must rely on Naruto and Sasuke to save her. She sets out to change this about herself, dedicating
        nearly three years of training to making herself as capable as Naruto and Sasuke; in the meantime, she becomes
        willing to sacrifice herself to protect them, coming to value them both very deeply.[12] She looks to Naruto as
        a model for this goal, inspired by his rapid growth and his determination to be there for her and all those he
        held dear. When Sakura realises that she is as rude to Naruto as Sasuke usually is to her at his urging, she
        starts treating him better, cheering for his accomplishments, and confiding her hopes and fears with
        him.</p></figure><p>Inner Sakura makes one appearance at the very start of Part II and then is never seen in the
        series again.[13] This is because Sakura is finally in touch with her feelings and is willing to express what
        she's thinking, a self-comfort she picked up during her training with Tsunade. However, this has also made her
        more emotional and impulsive at times. Her desire to catch up in strength with Naruto and Sasuke, her
        protectiveness of them, and her need to prove her worthiness as a ninja, brings forth this dark side of her more
        easily which often leads her to attack her opponents and get rescued by her teammates.[14] Minato, at one point,
        witnessing Sakura's outburst on Naruto when he asked if she was his girlfriend, noted that she reminded him of
        his own wife.[15] However, Sakura no longer thinks poorly of Naruto, but nevertheless expresses her anger and
        displeasure with him whenever Naruto's immaturity and idiotic traits surface, often lashing out with violence,
        demonstrating a very obdurate and stiff-necked nature. Regardless, Sakura has deep respect and trust towards
        Naruto's skills as a ninja, angrily reprimanding and threatening Sai when he, although deliberately to test
        Sakura's faith in Naruto, deemed Naruto weak. Yet, she is ever-worrying for his safety and well-being to the
        point of easily feeling overwhelming guilt, and values him as one of her closest friends. Sai eventually points
        out that he believes Naruto knows Sakura too well for his own good, constantly placing himself in personal peril
        out of his feelings for her so that Sakura will be happy. Sakura is moved to tears by this, feeling unbearably
        guilty for what she feels she had put Naruto through. Despite her attempts to take responsibility for herself
        during the Summit by trying to deal with Sasuke herself, she still finds herself relying on him due to her shaky
        resolve, nearly costing Sakura her life. She ultimately settles for doing whatever she can for him, trying to do
        more in supporting him and his decisions concerning Sasuke, trying to do more to help him bear the challenges of
        being a jinchūriki and fighting at his side whenever possible. She is helped in this goal by Tsunade's
        influence, who trained her to have a contempt for losing and an unbending will;[16] she will place herself at
        risk so that others don't need to and to assure her allies' victory.[17]</p><figure><p>Despite Sakura violently
        reprimanding not only Naruto, but occasionally Konohamaru Sarutobi for their perverted tendencies, Sakura
        herself has a perverted side which she often keeps hidden. When Konohamaru showcased his Sexy: Girl on Girl
        Technique, Sakura displayed her disgust at the technique, but Konohamaru quickly countered by quickly creating
        the Sexy: Boy on Boy Technique to spite her, and instead of admonishing Konohamaru for it, Sakura was
        immediately drawn to the technique, responding with a pleasured screech upon seeing the technique, with the two
        cloned individuals resembling Sai and Sasuke. However, Sakura is embarassed of her own perverted nature, and
        upon realising her reaction was noticed by Team 7, she quickly tried to make an excuse, but Konohamaru's
        suspicions that Sakura is just as much a pervert as he and Naruto are is all but
        confirmed.[18]</p></figure><p>Sakura has been in love with Sasuke since childhood and initially focuses on
        getting his attention above everything else. Her initial infatuation for him was rooted in his good looks, and
        calm, collecting attitude, and his rejections failed to deter her. Despite being grateful of her loving him
        after she confesses to stop him from defecting from Konoha, Sasuke rejects her but thanks her before
        leaving.[19] This rejection deeply upsets Sakura, driving her to plea for Naruto to bring Sasuke home and, when
        Naruto fails, motivating her to become stronger so that she can bring Sasuke back herself.[20] She tries to
        separate herself from her feelings when Sasuke becomes an international criminal, attempting to kill him to
        prevent a war,[21] but her love for him proved to be too great for her to harm him.[22] Even at the end of the
        Fourth Shinobi World War, Sakura holds out hope that she may mean something to him.[23] Despite Sasuke's crimes,
        Sakura was able to forgive him after he sincerely apologised to her for how much he hurt her. She was also
        surprised when he exhibited a much softer point with her and began poking her on the forehead, an affectionate
        gesture he picked up from his brother.[24]</p><p>After marrying Sasuke, Sakura became very loyal to him and even
        refused to leave his side while she was pregnant with their daughter, Sarada. Sakura raises Sarada on her own
        due to Sasuke being away on his mission for many years, and she frequently reassures Sarada that Sasuke loves
        them both and will return home once his mission is over. She is also very patient and wise as her love and
        patience for Sasuke never faded even though Sarada was barely a toddler when he left. Although Sakura is very
        supportive of Sasuke's duties, she is disappointed when he teases her by refusing to show her affection.
        Likewise, even after years married, Sakura remains as smitten with Sasuke's good looks as ever.[25] As a mother,
        Sakura is loving and protective, and has a very close relationship with her daughter and will praise her for her
        achievements just as quickly as she admonishes her for wrongdoing.</p></section>
