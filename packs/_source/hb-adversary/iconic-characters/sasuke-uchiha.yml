        value: >-
          <p>As part of the requirements of this jutsu, you must have the Sharingan active. You may immediately attempt
          to make a Standard Jutsu ability check using your Genjutsu Ability modifier vs the triggering
          Genjutsu.</p><p>On a success, you end the Genjutsu affecting you or another creature as it becomes Deflected.
          When you do you must select another targeting within range, that you can see and make eye contact with. The
          target creature must make a Wisdom saving throw.</p><p>Success: The target resists this jutsu's
          effects.</p><p>Failure: Affected creatures falls under the effect of the Deflected Genjutsu as if you had cast
          it. They follow the original Failure effect of that Genjutsu.</p><p>Critical Failure: Same as failure, but the
          target follows the original Critical Failure effect of that Genjutsu. If that Genjutsu had no critical failure
          effect, they instead becomes Restrained for the Genjutsu's original duration. A restrained creature is unable
          to make hand signs and begins to remake their saving throw at the end of each of their turns to end this
          effect on them</p>
