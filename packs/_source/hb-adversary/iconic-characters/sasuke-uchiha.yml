          target must succeed a Strength saving throw being pushed back 15 feet and being knocked prone on a failed
          save.</p><p>• Fire: Each creature within a 5-foot radius sphere of the target creature must succeed a
          Dexterity saving throw, being burned on a failed save.</p><p>• Cold: Each creature within a 5-foot radius
          sphere of the target creature must succeed a Constitution saving throw, being chilled on a failed
          save.</p><p>• Lightning: The target must succeed a Constitution saving throw, being shocked until the end of
          their next turn.</p><p>• Force: Changed damage die to d8. The target must succeed a Dexterity saving throw
