                allowIncapacitated=true,
                label=Save to overcome Demoralized
              priority: 20
              type: add
        description: >-
          <p><strong>Max Ranks</strong>: 5</p><hr><p>Creatures who would gain ranks of <strong>Fear</strong> (<strong>or
          Frightened</strong>), gain ranks of <strong>Demoralized</strong>. A <strong>Demoralized</strong> creature is
          disturbed by a particular target in some fashion, making them seek to avoid interaction with them if possible.
          This heightened stress causes the defenses of the Demoralized target to wane.</p><ul><li><p>A
          <strong>Demoralized</strong> creature suffers a -1 penalty to its saving throws, for each rank they
          have.</p></li><li><p>A <strong>Demoralized</strong> creature must make concentration checks at the beginning
          of each of their turns to maintain concentration on their jutsu.</p></li><li><p>At the end of a
          <strong>Demoralized</strong> creatures turn they make a DC 13 Charisma ability check. On a success, they
          remove 1 rank of <strong>Demoralized</strong>. After 10 minutes, a creature who still has ranks of
          <strong>Demoralized</strong>, loses all ranks of <strong>Demoralized</strong> it has
          remaining</p></li><li><p>As an action, a <strong>Demoralized</strong> creature can make a DC 20 Charisma
          ability check to remove all ranks of <strong>Demoralized</strong> it has.</p></li></ul>
