  details:
    biography:
      value: >-
        <section id="secret-9SY0xhACPUSmsDq9" class="secret"><p>Shikamaru is naturally a lazy person and his inclination
        is to do as little work as possible. As an Academy student and even during his early career as a genin,
        Shikamaru is able to get away with this, spending his days sleeping, watching the clouds, or playing games of
        shōgi and Go. Even when told by many that he could be a great Hokage, he stated that he didn't want to deal with
        such responsibilities.[13] His goal is to live unremarkably, free of anything of noticeably good or bad, and
        then to die just as unremarkably as he lived.[14] When he is faced with the potential for conflict or
        commitment, he responds first by saying, "how troublesome," and then by trying to find some way out of it,
        either by pretending to be indisposed or even outright saying that he doesn't want to do whatever it
        is.[15]</p><p>Although Shikamaru describes himself as "the number one coward",[16] he has a strong moral compass
        and dedication to his friends. It is these qualities that earned Chōji Akimichi's friendship, as Shikamaru was
        one of the first people to look past his weight and find value in who he naturally was.[10] It is also these
        qualities that force Shikamaru to move away from his lazy pursuits, as he finds himself volunteering to do work
        or to sacrifice himself if it will in some way benefit his allies.[16] Such selflessness, once displayed during
        the Konoha Crush, exacerbates his "troublesome" situations: he is given the responsibility of leading his
        friends into battle, for which reason he does everything that he can to keep them safe, for which reason he is
        given even more responsibility over even more of his friends, and so on. He still clings to his lazy origins as
        much as he can; even if he can't spend his entire day being idle, he at least avoids having long-term goals or
        confessing any particular pleasure in the duties he's assigned.</p><p>Shikamaru undergoes a rapid maturity after
        the death of his teacher, Asuma Sarutobi, whose loss forces Shikamaru to recognise that the world is not safe
        that he cannot be kept protected from it forever. After avenging Asuma, Shikamaru takes it upon himself to do
        all that he can to make things better for future Konoha generations, especially Asuma's then-unborn daughter,
        Mirai; such is the Will of Fire. He may still balk at the prospect of the work he must do, but he no longer runs
        from it, even going so far as to argue in favour of difficult choices if it will guarantee his friends' and
        village's survival.[17] In Shikamaru Hiden, he describes his new goal in life as, rather than living
        unremarkably himself and watching the clouds all the time, to instead make a world where his children or
        grandchildren can live that way if they choose to.</p><figure><div><div><div><p>One of the more "troublesome"
        things that runs throughout Shikamaru's life is the subject of women thanks to his experiences with the women he
        knows: his mother, Yoshino, his teammate, Ino Yamanaka, and his frequent companion, Temari. He describes each of
        them as aggressive, demanding, and sometimes even scary. Shikamaru tries to treat women delicately, being
        non-confrontational or at least polite to them and never asking anything of them that he believes he can do
        himself. During Part I, he generally believes he can do anything himself, and as such is mortified if and when a
        woman needs to assist him in any way; his frustrations are similar when he repeatedly finds himself facing
        female opponents.[18] Because his father, Shikaku, has similar views and experiences with women, Shikamaru asks
        him for help in understanding them. Shikaku explains that men destroy themselves without a woman's influence and
        that women, despite how they may act, are kind to the men they love.[19] As with most things, Shikamaru resists
        entanglements with women as much as he can; his Infinite Tsukuyomi dream world sees him successfully avoiding
        marriage entirely. However, upon realising in Shikamaru Hiden that Temari is one of the most important things in
        the world to him, he ultimately marries her and even has a son with her, Shikadai. Ironically, his relationship
        with Temari became very similar to his parents, where he once mocked Shikaku for being "whipped", which he
        himself became.</p></div></div></div></figure><p>Overtime, having come to recognise Naruto's great contributions
        to the village despite his own hardships, Shikamaru came to sympathise for him, deciding to be there to support
        him much like the Second Hokage did for his older brother. His newfound goal became to aid Naruto in his goal of
        becoming Hokage and act as his personal adviser. Ultimately, as an adult, Shikamaru succeeds in this goal, often
        handling many duties to lighten the workload for Naruto as Hokage. At the same time, he still holds much of his
        original carefree nature from youth. He is not very strict with his son, viewing his acting out and/or
        punishments at school as a learning curve for him, trusting that Shikadai will find his way.[20] He is a man of
        conviction and drive, always pushing himself to protect his village. His mental fortitude is proven very strong,
        able to put some resistance against Ada's allure. In adulthood (in the manga), he also picked up Asuma's
        interest in smoking.</p><p>Per his role as Naruto's adviser, Shikamaru possesses a more methodical and somewhat
        draconian viewpoint and mindset in regards to the safety of Konohagakure. Occasionally clashing with Naruto's
        more humble and carefree outlook, Shikamaru often attempts to handle matters by considering anything or anyone
        mysterious or unknown as potential threats, such as suggesting Kawaki be placed under heavy supervision at all
        times when the latter first arrived in Konoha, to the point where Naruto commented it felt like Shikamaru
        advocated for confinement. Likewise, when a potential war between Iwagakure with Kirigakure against the Land of
        Flowers with Kumogakure almost came to be, Shikamaru immediately threatened to kill both Kurotsuchi and Chōjūrō
        when they accused Konoha of secrecy and plotting, much to Naruto's great displeasure and anger. Shikamaru even
        went as far as to order Mirai to allow Tentō Madoka to be kidnapped by the Mujina Bandits in order to place his
        father Ikkyū, the daimyō of the Land of Fire, under Konoha's debt once they managed rescue him.[21] Nevertheless
        he still continues to support Naruto's decision regardless of his own option.[22]</p><p>After being affected by
        Ada's Omnipotence and having his memories of Boruto and Kawaki switched, like most of the rest of the world,
        Shikamaru grew to hold a grudge and anger at Boruto for his false crime of killing Naruto. Sarada and Sumire
        both also noticed that Shikamaru's personality had changed slightly, having become irreducible and more
        stubborn, especially when it came to giving Boruto the benefit of the doubt or lifting his execution order.[8]
        This only relented when he received a report that Amado independently considered the possibility that his
        memories had been altered, and offered Boruto covert assistance.[9] As Hokage, Shikamaru was shown to prioritise
        even more the will of Konoha's citizens and their safety, since during Code's invasion, he gave priority to
        evacuating the civilians and protecting them from the Claw Grimes than trying to capture Boruto when the same
        appeared in the village.[23</p></section>
