  - name: Shadow Possession
    type: spell
    img: systems/n5eb/assets/content/clans/nara.webp
    system:
      description:
        value: >-
          <p>The famous Shadow possession of the Nara Clan allows the user to mold chakra into their shadow, controlling
          it. Select one creature you can see within range. Target creature has to make a Dexterity Saving throw. On a
          failed save they are restrained for the duration of the jutsu and they cannot take actions. They make the
          exact same physical movements you make. You cannot make them attack themselves, nor can you make them cast
          jutsu of any type. They mirror your movements and gestures and nothing else. As an action on the affected
          creatures turn, they can make a Strength saving throw to end this Jutsu's effect on them.</p><p>The Shadow
          possession jutsu is unique in that it is most affected by the time of day and the amount of available light a
          Nara is in. In Dim Light, this Jutsu's range is reduced by half. In complete darkness, this jutsu cannot be
          used.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu
          by 3, the range of this jutsu by 15ft and creatures no longer make the exact same physical movements you make
