        value: "<p>Using the Insects that are inhabiting your body, you create a cocoon large enough to hold you and hang from any surface that can hold you for a variety of scenarios both in and out of combat.</p><p>\_<br />Out of Combat: This cocoon is Waterproof and can be used as a Sleeping bag allowing you to hover above the ground, away from land creatures who can't reach you.\_<br />While inside your Cocoon, you look like a large insect going through metamorphosis not garnering the attention of other creatures.\_<br />If used as a part of a Short Rest, you recover the maximum possible hit points or Chakra from hit dice and Chakra dice rolled.\_<br />If used as part of a long rest, you recover additional hit points equal to your level + proficiency bonus.\_</p><p><br />In-Combat: By spending 3 Chakra, for the next minute, you can assume a defensive position within your cocoon suspending yourself in a stealthy position.\_<br />While in this stealthy position stealth checks are made with 1d8 bonus to the check.\_<br />Any movement or action used to complete any task other than maintaining your stealth immediately ends stealth and this jutsu's bonus.</p>"
