  - name: Medical Release Wall of Bees
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/medical.webp
    system:
      description:
        value: >-
          <p>You weave together a mixture of summoning seals and summon forth a wall of angry, irrational and
          non-compromising bees.</p><p>The wall is 5 feet thick, 15 feet high and up to 30 feet long. The wall must be
          continuous and at least 5 feet thick along its entire length. You select where the wall of bees appear and the
          entire length must be within your line of sight and within this jutsu's range from you.</p><p>A creature that
          starts within the bee's wall or that gets within 5 feet of the wall of bees agitates the insects and are
          swarmed by them and must make a constitution saving throw against their assault. On a failed save they take
          5d6 poison damage and are incapacitated until the end of the current turn. On a successful save they take half
          damage and suffer no additional effects.</p>
