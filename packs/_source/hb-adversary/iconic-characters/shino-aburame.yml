  details:
    biography:
      value: >-
        <section id="secret-5Y3ozTHr7TKzGa7D" class="secret"><p>Since his early childhood, Shino has been a calm,
        collected, and solitary person, who is quite mysterious. Shino is portrayed as being somewhere between merely
        stoic and matter-of-fact, rarely ever smiling or showing emotion at all; rather than thank his teammates for
        congratulating him on his victory in the preliminaries, he told them that he expected them to do the same. He
        also has a tendency of holding grudges and being rather intimidating, such as seen when Naruto failed to
        recognise him at the start of Part II (which is fair as the only visible part of his face were his sunglasses),
        but easily recognised Kiba and Hinata regardless. He still holds that grudge to this day. Shino seems to be
        aware of these odd personality traits; in the anime, when he ate food poisoned with a chemical that forced him
        to laugh, he menacingly told Naruto to forget it had ever happened. In his adulthood, however, Shino seems to
        have outgrown these traits, openly smiling and laughing in front of others.</p><figure><div><div><div><p>His
        interest in insects only helps him strengthen this viewpoint; by spending most of his spare time watching them,
        and often making analogies to insects when talking, people have come to identify Shino as "creepy", and tend to
        dislike being in his company for prolonged periods of time. In his Infinite Tsukuyomi dream, Shino dreamt that
        he found a new giant-sized species of bugs and tamed it as his own. Despite occasionally arguing with Kiba due
        to their personality differences, Shino has a very strong sense of connection with his teammates and allies.
        This was first seen when he promised Sasuke Uchiha to help him fight Gaara after dealing with Kankurō, but
        regretted not being able to uphold that promise after being poisoned.</p></div></div></div></figure><p>Shino is
        also very brave as he and his teammates were terrified after seeing Gaara's powers during the second stage of
        the Chūnin Exams, but he still resolved to help Sasuke in any way he could with Gaara. He also regretted being
        unavailable and therefore unable to help with retrieving Sasuke. From that point onwards, he resolved to work on
        his teamwork skills with Kiba and Hinata. He even helped Hinata to improve her abilities, and is one of the few
        people, besides Naruto, who openly professes confidence in her. The fruits of his efforts are seen in the anime,
        where Shino was able to carry out a mission successfully while also keeping others safe. He also proves to be
        able to understand his teammates' inner workings, sensing when the slightest of things is wrong with either of
        them. During the Fourth Shinobi World War, he also went out of his way to keep his teammate's chakra flow active
        through the use of his insects.</p><p>Shino speaks in a curious fashion, as noted by both Naruto and Kiba. He
        speaks in a manner most simply described as "nitpicking" and uses the word 'because' (なぜなら, nazenara) a great
        deal. To others, his manner of speaking seems like over concern with the trivial points of a conversation which
        could be left unsaid, or, providing information that will leave questions that could possibly be asked — already
        answered.[7][8]</p><p>Shino is fairly confident in his abilities and that he will win a battle, and tends to try
        to communicate this to an opponent for their own well-being. Still, Shino enjoys fighting, and dislikes being
        denied a chance to battle a skilled opponent, as seen when he went out of his way during the Konoha Crush to
        fight Kankurō, after the latter had forfeited to avoid revealing his puppets' secrets.</p><p>In the anime, it
        was shown that Shino will panic when confronted with insectivorous animals or plants (with Shino himself
        likening it to psychological torture).[9] He will also fall into despair showing saddened expressions — atypical
        of him — to the point where he almost cries and even refuses to continue his mission to avoid losing any more
        insects. Similarly, in adulthood, Shino's passion for teaching shows a noticeable distress when his students
        fail to listen to him or damage happens to the Academy.[10] Also, while still generally maintaining a composed
        and straightforward attitude, is shown able to relax and enjoy himself in more common activities. As a teacher,
        Shino is very compassionate with his students, as he insisted on caring for Sumire Kakei despite her actions
        that harmed many people.</p></section>
