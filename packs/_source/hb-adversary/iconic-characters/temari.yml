    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/wind.webp
    system:
      description:
        value: >-
          <p>You create a spiraling sphere of wind chakra with a collection of cutting blades within it. Creatures in
          range must succeed a Strength Saving throw being pulled towards you and taking 4d6 Wind Damage and gaining 2
          ranks of bleeding. Or half as much on a successful save and no ranks of bleeding.</p><p>Creatures who fail
          their saving throw, are pulled towards you, ending their movement within 5 feet of you, and causing Swirl.
          They are then caught in a violent explosion of the cutting wind, being knocked back 20 feet and taking an
          additional 2d6 Wind Damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
          the cost of this jutsu by 3, the damage by 1d6 and the amount of initial bleed gained by +1.</p>
