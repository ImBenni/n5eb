  - name: Wind Release Wall of Wind
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/wind.webp
    system:
      description:
        value: >-
          <p>A wall of strong wind rises from the ground at a point you choose within range. You make the wall up to 50
          feet long, 15 feet high, and 1 foot thick. You can shape the wall in any way you choose so long as it makes
          one continuous path along the ground. The wall lasts for the duration.</p><p>When the wall appears, each
          creature within its area must make a Strength saving throw. A creature takes 4d8 Slashing damage on a failed
          save, or half as much damage on a successful one.</p><p>The strong wind keeps fog, smoke, and other gases at
          bay. Small or smaller flying creatures or objects can't pass through the wall. Loose, lightweight materials
          brought into the wall fly upward. Arrows, bolts, and other ordinary projectiles launched at targets behind the
          wall are deflected upward and automatically miss. Large objects such as boulders and similar objects and
          attacks can penetrate it. Creatures in gaseous form can't pass through it. Fire ignites the Wall of wind
          leaving it as a massive wall of fire. If this happens the caster of Wall of wind loses all control of it and
          counts as the jutsu ending.</p>
