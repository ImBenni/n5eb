  details:
    biography:
      value: >-
        <section id="secret-G2HVQ2Zrxbx4bBEc" class="secret"><p>Temari is a prudent, stoic and blunt individual who is
        rarely afraid to speak her mind, a trait she would later pass on to her son. In Part I, similar to her siblings,
        she was rather dismissive with a cruel streak which was demonstrated when Gaara killed Team Shigure; she simply
        smiled and waved goodbye to them before they were crushed.[10] However, Temari seems to value peace, as she
        questioned the reasoning of starting a war with Konoha in Part I, and was saddened by the countless lives that
        would be lost as a result. In Part II, her value for peace increased, as she acts as a diplomatic liaison
        between Sunagakure and Konohagakure to prepare for the next Chūnin Exams, as well as by risking her life several
        times during the Kage Summit and the Fourth Shinobi World War to save her comrades, it didn't matter if they
        were from her village or not as it initially did for other shinobi.</p><figure><div><div><div><p>During the
        Chūnin Exams, it is revealed that the one person she is afraid of is Gaara. When Gaara and Kankurō were
        fighting, she showed a light, happy, mood to make sure Gaara didn't harm her or Kankurō. Despite this, during
        the short time between then and the Sasuke Retrieval Arc, she no longer expressed fear around him, having been
        one of the first to accept the new Gaara. Like Kankurō, her relationship with Gaara has greatly improved after
        he sought redemption after being reformed by Naruto. Temari is shown to be a loving sister who deeply cares for
        her siblings: when Gaara was captured by the Akatsuki, she hurried back to the village to save him; and when
        Kankurō was poisoned, she watched over him until he had recovered. In the anime, as revealed from her Infinite
        Tsukuyomi dream, Temari cares greatly for her siblings and her greatest desire is for them to trust and rely on
        her.[11]</p><p>Temari frequently appears alongside Shikamaru Nara. Though they were opponents during the Chūnin
        Exams, they came to each others' aid at different points in Part I. Despite her usual tough demeanour, she has a
        tendency to show a softer nature around Shikamaru, such as showing sympathy for him after his father scolded him
        for questioning if he should be a ninja after the Sasuke Uchiha rescue mission failed.[12] When Naruto returned
        to Konoha at the start of Part II and saw the two of them walking together, he asked them if they were on a
        date, which both of them denied.[13] Later, after Shikamaru had escorted her to the village gates near the
        beginning of Part II, she told him that he should take his duties more seriously, and to quickly become a jōnin
        like herself.[14] This topic was continued when she was assigned to the Fourth Division of the Allied Shinobi
        Forces with Shikamaru. She tells him to "look alive" and act more like a leader now that he was essentially the
        division's acting general in Gaara's place.[15] In the anime, it is implied that Temari has feelings for
        Shikamaru, as she became very flustered when Yukata and Matsuri made note of it.[8] This would turn out to be
        true, as after the war, she was clearly angered by how Shikamaru would not tell her the secret mission he was
        about to do, apparently having considered them to be able to confide in each other anything, to the point of
        slapping him and crying. She eventually started a relationship with Shikamaru and eventually even married him
        and gave birth to their son Shikadai.</p><p>Temari is shown to be quite strict as a mother, as she was very
        upset to hear him get involved in any trouble at school and sharply tells him to give his uncle, Gaara, a proper
        greeting. She is not above physically disciplining her son.[16] She is also shown to have just the same
        relationship with her husband as Shikaku and Yoshino Nara, her parents-in-law, had, with Shikamaru becoming
        "whipped" by Temari just like Shikaku was by Yoshino. She is annoyed by Shikamaru's lack of discipline towards
        their son and finds it unacceptable. She is also just as annoyed whenever he focuses too much on teaching their
        son shōgi to the point of resorting to violence, as shown when she blasted both him and Shikadai out of the
        house after they repeatedly ignored her due to being so focused in playing shōgi. Overall, she is shown to be
        the matriarch of her family, as both men greatly fear her wrath and she is easily able to guess their inner
        thoughts.</p></div></div></div></figure><p>She also became very loyal to the Nara clan, caring very much about
        the clan's future and reputation.[17] At same time, she is not without having a carefree side, smiling at
        watching her son compete in the Chūnin Exams and chuckling after seeing her son forfeit in an manner almost
        identical to Shikamaru during their own match years earlier. While strict and fully willing to admonish her son
        in public, as she did when Shikadai showed hesitance to engage the Byakuya Gang as her backup, she does have
        limits to what she is willing to push her son into, as she disapproved of Shikamaru sending Shikadai to capture
        Boruto and Sarada thinking it would be too much for him to fight his friends. She also blushed when Shikamaru
        stated at times he wanted to eat with his family.</p></section>
