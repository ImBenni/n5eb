  - name: Wind Release Whirlwind Spear
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/wind.webp
    system:
      description:
        value: >-
          <p>You mold a projection made of wind release chakra that floats next to you. This projection can take the
          shape of any spear or piercing like object such as an arrow, lance, sword or anything you prefer. You then
          launch this projection in a straight line, piercing through all creatures in a 5-foot wide, 120-foot lone line
          originating from you.</p><p>All creatures in range must make a Dexterity Saving throw taking 5d6 wind Damage
          and causing Swirl on a failed Save or half as much on a successful one.</p><p>The first creature your
          projection would pass through that has the burned, chilled, corroded, shocked or envenomed condition has that
          condition exacerbated. That creature takes 2d10 fire damage if they are burned, cold damage if they are
          chilled, acid damage if they are corroded, lightning damage if they are shocked or poison damage if they are
          envenomed. On a successful save no additional damage is done.</p><p>At Higher Ranks: For each rank you cast
          this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d6 and 1d10.</p>
        chat: ''
      source:
        custom: ''
      activation:
        type: action
        cost: 1
        condition: ''
      duration:
