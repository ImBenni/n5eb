  details:
    biography:
      value: >-
        <section id="secret-T0IsTq6YONRlwyn2" class="secret"><p>Tenten is depicted as naturally inquisitive and
        observant, with a personal dream to become a legendary kunoichi like Tsunade. This has led to her to become
        strongly opinionated about women, defending that girls can be just as skilled as boys in taijutsu when Neji
        thought otherwise. Tenten exhibits a distaste for weakness or being overly dependent on other people. Though she
        can be quite fierce at times,[8] Tenten is kind and caring toward others, comforting her friends when they are
        going through a hard time.[9]</p><p>Being around her overly enthusiastic teammates, particularly Might Guy and
        Rock Lee, Tenten is often left exasperated at their antics and wishes they would behave more maturely; her
        Infinite Tsukuyomi dream actually depicts this. She is more easy-going and dislikes having to travel for whole
        days[10] or continue training when she is already tired, for which reason she enjoys her days-off from missions.
        However, she cares greatly about her team, helping to go save Lee during the Chūnin Exams when he didn't report
        back at their base. She also held great respect for her other teammate Neji Hyūga and often helped him
        train.</p><p>Naturally Tenten, who was a ninja-tool user, loves ninja weapons to the point that she collects
        every ninja tool from all over the world as a hobby. Moreover, her hobby developed so much that she even opened
        a full-fledged ninja tool shop.[11] She also appears to have a fascination with the supernatural, believing in
        ghosts and the like.[12]</p></section>
