      value: >-
        <section id="secret-t136intcFgpidmFJ" class="secret"><p>As a child, Udon was an easy-going and quiet
        individual.[1] He usually looks very sleepy, and is always seen with a drip of snot hanging from his nose. Udon
        has stated many times that he loves math, as he is sometimes seen writing math problems during class. As an
        adult, he is a very collected and straight-forward man who is shown to be keen minded and perceptive. As a
        teacher, he has a strict but fair teaching style and is not above punishing his students for making mistakes
        that could have cost them dearly. Overall, his students view him as "cool", and were surprised to hear how
        awkward he was as a child.[3]</p></section>
