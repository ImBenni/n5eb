items:
  - name: Solar Powered / Sage Core (Optional)
    type: feat
    _id: 4cyHWMsFf8G5Zz8k
    img: icons/magic/symbols/symbol-lightning-bolt.webp
    system:
      description:
        value: >-
          <p>Exceptional made guardians are made of a material capable of absorbing light, sun or various type of
          natural energy to recharge their chakra reserves.</p><p>Some even have Sage core, a weird core made by some
          genius that learned from sage creature and made a core capable of absorbing chakra from the surrounding and
          recharge themselves even in the absence of any type of natural resource.</p><p>This usually is a long process
          and can take one or more days, even a week, to fully recharge (half for the sage core).</p><p>But after about
          5/6 hours they have enough to reactivate themselves and go into a better position to recharge or retreat.</p>
