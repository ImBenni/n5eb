  - name: A Resemblance Of A Soul
    type: feat
    _id: TteEOKzCobgCvWSp
    img: icons/magic/symbols/runes-star-pentagon-blue.webp
    system:
      description:
        value: >-
          <p>Guardians are in theory constructs made out of chakra and a peculiar metal that has special qualities to
          it.</p><p>Still guardians can, exceptionally, develop a conscience and become independent.</p><p>Roll a
          D20.</p><p>Normal golems can become sentient on a nat 20.</p><p>Superior golems can become sentient on a 17 ~
          20</p><p>Supreme golems with sage corest can become sentient on a 15 ~20.</p><p>This dice should be roll in
          case major events or impacts shake the guardian to its core.</p><p>Some examples are:</p><p>Being almost
          destroyed or reaching 0 HP, Being hit by an attack that takes away 50+HP in one hit after reductions, being
          deactivated for a long time and then getting some chakra back by someone, developing a bond with
          someone.</p><p>All of these events can occur in such a dice roll.</p><p>On DM discretion he can also lower the
          DC or even make the guardian already sentient if needed be.</p><p>Once the guardian is sentient he will decide
          what to to do and if to follow the last order given to him.</p>
