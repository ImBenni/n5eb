        obtain.</p><p>Still these beings obey their owner' orders which they need to imprint their chakra into so they
        get registered.</p><p>These creatures then stick to their orders to a T and make sure everything they are told
        to do…is done.</p><p>These beasts, once their chakra is consumed, become inactive and must be recharged to
        become active again.</p><p>Still they have ways ot auto recharging as well since, the more elevated models, have
