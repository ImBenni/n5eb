  details:
    biography:
      value: >-
        <p>Masters of the blade and expert of duels, these samurais travel or offer their services to those in need, at
        times out of their good heart and at times for a price.</p><p>They are surely not assassins and do not break the
        law if they can avoid it, plus they often fight more for what they believe rather what they are paid
        for.</p><p>They are also incredibly honorable and fair and they dislike being lied or taken for fools…they are
        even capable of rebelling against those that pay them if they find out that they fooled them into doing
        something or told them false info to get what they want out of them.</p><p>Samurai are incredibly powerful
        fighters and can easaily take care even a shinobi or two.</p><p>A group of samurai are incredibly dangerous to
        fight.</p>
