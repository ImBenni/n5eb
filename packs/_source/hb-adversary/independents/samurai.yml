          instinctively use your hand or feet to not only attempt to parry the attack, but to also drive the attack into
          the ground, getting it stuck and opening the triggering creature up to a counter attack.</p><p>When you are
          hit with a melee attack, make a melee Taijutsu attack, if your attack result is higher than the triggering
          creatures, their attack and all other attacks made as part of the same action misses and you make a single
          melee attack against them dealing your [weapons damage] and reducing the creature's AC by 1d4 until the start
          of their turn.</p><p>If they attacked with a weapon, their weapon falls from their hands on the ground within
