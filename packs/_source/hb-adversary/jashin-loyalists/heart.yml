  details:
    biography:
      value: >-
        <p>The hearts are sacrifices that Jashin himself chose to give life and energy to.</p><p>These beings were once
        faithful servants of Jashin and offered their own life to him, as such they were reward with a cursed but
        eternal life, untouched by the passage of time.</p><p>Hearts can actually take out their own hearts and offer it
        to jashin for aid.</p><p>These beings are often used for their capacity to understand complex ordered and
        execute them somewhat faithfully.</p><p>The hearts keep the blind loyalty to Jashin even after they lost their
        mortal life.</p>
