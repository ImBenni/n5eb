  - name: Sealing Art Curse
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
    system:
      description:
        value: >-
          <p>You infuse chakra into a chakra seal as you attempt to mark a creature you can touch with the seal of
          pestilence. You do not need to spend chakra to maintain Concentration on this jutsu.</p><p>You touch a
          creature, and that creature must succeed on a Charisma saving throw or become cursed for the duration of the
          jutsu. When you cast this jutsu, choose the nature of the curse from the following options:</p><p>• Choose one
          Ability Score. While cursed, the target has disadvantage on ability checks, skill checks and saving throws
          made with that ability score.</p><p>• While cursed, the target has disadvantage on attack rolls against
          you.</p><p>• While cursed, the target must make a Wisdom saving throw at the start of each of its turns. If it
          fails, it wastes its action that turn doing nothing.</p><p>• While cursed, your attacks and jutsu deal an
          extra 1d8 necrotic damage to the target.</p><p>• While cursed, the target cannot regain hit points.</p><p>•
          While cursed, the target loses all special senses it has.</p><p>• While cursed, reduce the targets movement
          speed by half.</p><p>• While cursed, the target must speak all of their thoughts verbally as loud as
          possible.</p><p>• While cursed, the target gains 1 rank of Demoralized while it is within 20 feet of a
          specific object or structure of the casters choice.</p><p>• At the GM option, you may choose an alternative
          curse effect, but it should be no more powerful than those described above. The DM has final say on such a
          curses effect.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of
