  - name: Demonic Possession
    type: feat
    _id: EYdvWJN5zV7RCXFl
    img: icons/magic/unholy/silhouette-evil-horned-giant.webp
    system:
      description:
        value: >-
          <p>The hollow, once brought to 0 HP, will fall down lifeless, but the body must be taken out, sealed,
          destroyed or make sure it cannot be used by the demon again.</p><p>Otherwise after 3 turns the demon can
          possess another body, which will regain half of its HP and Chakra (the body will recover fully after 1
          hour).</p><p>If the demon does not find a body within the next hours then it will go back to where it
          originated.</p><p>Each body can be used up to twice after the first time is taken down before it becomes too
          battered to be functional anymore.</p>
