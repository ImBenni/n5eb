  - name: Medical Release Grim Siphon
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/medical.webp
    system:
      description:
        value: >-
          <p>You weave summoning seals together and infuse them with medical release chakra manifesting the hand of the
          Reaper of death. The hand siphons a small fraction of your life force to summon it, but it grants you a great
          deal of power in return.</p><p>Select one creature you can see within range, that creature must make a
          Charisma saving throw, taking 2d8 + your ninjutsu ability modifier necrotic damage, and depending on the
          targets classification different effects would be applied to them.</p><p>If the target is classified as a
          player character, they lose 1 hit die on a failed save or half as much damage and no hit die loss on a
          success. Another creature of your choice that it within 20 feet of your target regains hit points equal to the
          damage dealt.</p><p>If the target is classified as an Adversary, they lose 1 Tenacity die, and you gain it for
          1 minute, able to use it as a bonus to one ability check, skill check or saving throw.</p><p>At Higher Ranks:
          For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by
          1d8.</p>
