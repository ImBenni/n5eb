  details:
    biography:
      value: >-
        <p>The immortal monk who made a deal with a powerful demon for eternal life.</p><p>Jashin started his cult by
        promising eternal life to those worthy and he kept his promise….he simply never mentions that the life he can
        give is one hollow and cursed, one where mortality will be given in exchange of power.</p><p>Jashin has always
        been very tied to his own life after the incident that took him to agree with the demon.</p><p>The demon said
        that he will get his soul after he is gone, does not matter if it never happens, and Jashin thought he used the
        demon…but he knew little that the demon was simply waiting for the right time…the time when he will use Jashin
        as a gateway.</p><p>Jashin to this day has a strong followng and many still chant his name.</p>
