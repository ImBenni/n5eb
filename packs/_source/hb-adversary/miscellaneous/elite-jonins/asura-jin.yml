  details:
    biography:
      value: >-
        <blockquote><p>Asura Jin nasceu em um pequeno e insignificante clã da Vila Oculta da Folha. Desde jovem, sua
        imensa força física era evidente. Enquanto outras crianças lutavam com o treinamento básico, Asura as superava
        facilmente, seu corpo aparentemente construído para o combate. Essa força bruta, combinada com uma implacável
        determinação em aperfeiçoar suas habilidades, rapidamente chamou a atenção dos anciãos da vila.</p><p
        data-sourcepos="3:1-3:437">Sob a tutela de renomados mestres de Taijutsu, Asura aprimorou suas habilidades,
        desenvolvendo um estilo de luta brutal e eficiente. Seus movimentos eram fluidos e explosivos, seus golpes,
        devastadores. No entanto, sua personalidade permanecia tão rígida quanto seu regime de treinamento. Ele encarava
        todas as tarefas, todas as missões, com uma seriedade solene, muitas vezes deixando seus companheiros perplexos
        com sua falta de humor.</p><p data-sourcepos="5:1-5:407">Apesar de sua natureza solitária, Asura era um shinobi
        leal, sempre colocando as necessidades da vila acima das suas. Sua reputação como uma força imparável no campo
        de batalha cresceu, tornando-o um valioso ativo para a Vila da Folha. No entanto, sua inabalável dedicação à
        força e ao dever muitas vezes o deixava cego às nuances da interação humana, uma falha que ocasionalmente
        atrapalhava seu progresso.</p></blockquote>
      public: >-
        <p>Asura Jin é um Jonin da Vila da Folha. Suas proezas em taijutsu são contadas com contos aéreos que beiram o
        absurdo, como uma lenda. Rumores dizem que treinou com o falecido Might Guy, antes de sua luta fatal contra a
        Besta de Nove Caudas, onde morreu, dispersando o chakra da besta e salvando milhares de vidas inocentes.</p>
