  - name: 'Medical Release: Adept Healing'
    type: spell
    img: icons/magic/life/healing-jutsu.jpg
    system:
      description:
        value: >-
          <p><strong>Keywords</strong>: <em>Ninjutsu, Medical</em></p><p>You cover your hands in chakra that glows with
          a warm green hue, reactivating a creature's cells reproductive process closing their wounds. This jutsu is
          unique unto itself in that it can be cast in one of three variations with each taking more time to cast than
          the last. This jutsu has no effect on Undead or constructs.</p><p>• 1 Action: When cast, this Jutsu's range
          becomes Touch and an affected creature regains a number of hit points equal to 3d8.</p><p>• 1 Bonus Action:
          When cast, this jutsu range becomes Self (15ft radius) and all creatures of your choice in range regains 8 hit
          points.</p><p>• 1 Full-Turn Action: When cast, this jutsu's range becomes Self (30ft radius) and all creatures
          of your choice in range regains 3d8+5 hit points</p><p><strong>At</strong> <strong>Higher</strong>
          <strong>Ranks</strong>: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
          and healing by +1 dice. If you do not roll dice for healing when casting this jutsu, you instead increase the
          healing by +4.</p>
        chat: ''
      source:
        custom: ''
