  - name: 'Water Release: Hidden Mist'
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/water.webp
    system:
      description:
        value: "<p>\_You conjure a cloud of water particles condensing into a large cloud of mist. Creatures inside this cloud of mist cannot see more than 5 feet away from them, gaining disadvantage on Wisdom (Perception) checks to see and Attacks made while inside the cloud of mist that rely on sight. Creatures outside the mist also have disadvantage when attacking other creatures who are inside the mist.</p><p>Also, when this jutsu is cast, select one creature, whom you can see. That creature becomes mist marked. For the duration of this jutsu, a creature mist marked is always perceived by you while they are in the hidden mist, cannot benefit from being hidden while inside the hidden mist and you do not gain disadvantage on attack rolls against them. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to instead select an additional creature to be mist marked.\_</p>"
