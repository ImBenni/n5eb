  details:
    biography:
      value: >-
        <blockquote><p>Quando era pequena, os pais de Tsuchiya Noboru fugiram das terras da névoa para escapar de uma
        dívida com a compania Gatou. Eles viviam dizendo como a vila da folha era o melhor lugar para se estar, que ela
        iria protegê-los dos homens maus que estavam os seguindo.</p><p>Quando chegaram na vila da folha, foram
        acolhidos como refugiados após alguns dias sendo interrogados gentilmente a mando do terceiro Hokage, Hiruzen
        Sarutobi.</p><p>Entretanto, após alguns dias vivendo nos subúrbios de Konoha, Tsuchiya e sua família foram
        atacadas dentro de casa por capangas do Gatou, buscando seu dinheiro. Seus pais acabaram falecendo, mas fora
        salva por agentes ANBU aparentemente de última hora.</p><p>Os agentes ANBU rapidamente acolheram e recrutaram a
        jovem na Academia Ninja, notando sua ampla reserva de chakra e afinidade natural por ninjutsu de
        cura.</p></blockquote>
      public: >-
        <p>Tsuchiya Noboru é primeira descendente de imigrantes da terra da névoa. É leal à vila da folha, embora não
        concorde com muitos dos seus métodos recentes.</p>
