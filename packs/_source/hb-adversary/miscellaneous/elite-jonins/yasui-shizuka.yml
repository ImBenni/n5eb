  details:
    biography:
      value: >-
        <p>Após a revolução Uchiha 6 anos atrás, Shizuka passou a ser considerada o maior prodígio em Genjutsu da vila
        da folha, cargo previamente ocupado por Yuhi Kurenai, que faleceu durante o combate. Chunin aos 11 anos e Jonin
        aos 17, há rumores de que Shizuka tenha usado de métodos pouco éticos para ascender tão rápido na hierarquia
        shinobi.</p><p>O mero fato de ter abraçado a nova ordem e conquistado uma posição militar de prestígio diz tanto
        sobre o seu senso de ética quanto suas habilidades.</p><p>Shizuka aprecia a beleza e a delicadeza, se portando
        como uma pessoa frágil a todo momento, tanto por gosto estético quanto como estratégia, se posando como uma
        ameaça menor do que ela seja.</p><p>Ela tem tendências psicopáticas, não se preocupando em preservar a dignidade
        da vida humana nem em missão e nem no seu dia-a-dia.</p><p>Vendo o potencial em Hotaru, Shizuka tem o objetivo
        de transformá-la em uma máquina mortífera a seu controle, usando Genjutsu para aos poucos alimentar seu ódio e
        revanchismo enquanto a coloca em posição de poder, e eventualmente tomar para si os seus olhos.</p>
      public: >-
        <p>Yasui Shizuka nasceu e cresceu na vila da folha. É uma das Jonins mais jovens de Konoha, fiel ao centro de
        poder, seja já quem o ocupe.</p>
