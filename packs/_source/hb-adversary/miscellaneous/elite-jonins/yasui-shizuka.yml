  - name: False Visions
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
    system:
      description:
        value: >-
          <p>You begin to create false visions that a creature will see regardless of what is really happening. Select
          one creature that you can see within range. The target creature must succeed an Intelligence saving
          throw.</p><ul><li><p><strong>Success</strong>: Affected creature is able to resist this jutsu's
          effects.</p></li><li><p><strong>Failure</strong>: Affected creature becomes blinded, but begins to hallucinate
          seeing only what you declare they see. Describe what the affected creature will see other creatures do on
          their respective turns. This can be anywhere from attempting to cast a jutsu, attempt to attack them, go in
          another direction, attempt to hide or anything they would be able to see. When they take damage, the damage is
          dealt as normal, and they remake the saving throw ending this jutsu on a
          success.</p></li><li><p><strong>Critical</strong> <strong>Failure</strong>: Affected creature suffers the
          effects of a failure but instead they make their saving throw to end this jutsu with a 1d4 penalty to the
          result.</p></li></ul><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For each rank you
          cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target
