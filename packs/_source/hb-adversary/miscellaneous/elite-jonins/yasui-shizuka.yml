  - name: Mind Spike
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
    system:
      description:
        value: >-
          <p>You reach into the mind of one creature you can see within range. Make a ranged Genjutsu Attack as you
          launch a psychic lance into the mind of the target. On a hit, the target takes 5d8 psychic damage and must
          make a Wisdom saving throw.</p><ul><li><p><strong>Success</strong>: Affected creature is able to resist this
          Genjutsu's effects.</p></li><li><p><strong>Failure</strong>: Affected creature's location is always known by
          the caster. The affected creature cannot gain the benefit of being hidden from the caster. If the affecter
          creature is invisible, it begins to glow a bright neon purple to you, allowing the caster to ignore any effect
          granting the creature invisibility</p></li><li><p><strong>Critical</strong> <strong>Failure</strong>: Affected
          creature suffers the effect of failure, and their location is also always known by one other<br />creature of
          the casters choice.</p></li></ul><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For
