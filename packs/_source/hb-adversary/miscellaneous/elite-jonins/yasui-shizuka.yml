    system:
      description:
        value: >-
          <p>You create a visual image of your own description that grabs and restrains a creature you can see within
          range. The target must succeed a Wisdom Saving throw. This jutsu has no effect on undead, constructs, plants,
          or Demons.</p><ul><li><p><strong>Success</strong>: Affected creature is able to resist this genjutsu's
          effects.</p></li><li><p><strong>Failure</strong>: Affected creature becomes paralyzed for the duration. A
          paralyzed creature remakes their save at the end of each of its turns or when it takes damage, ending this
          jutsu's effect on it, on a success.</p></li><li><p><strong>Critical</strong> <strong>Failure</strong>: Same
