  - name: Human Boulder
    type: spell
    img: systems/n5eb/assets/content/clans/akimichi.webp
    system:
      description:
        value: "<p>You expand your body like a balloon retracting your arms and legs inside your fat.\_<br />You use your Chakra to spin your body like a bowling ball while also preventing yourself from getting dizzy.\_<br />You hurl yourself in a straight line towards a target creature and crush everyone else in your way.\_<br />Move yourself up to 30 feet in a straight line, ending your movement occupying the space of the target creature.\_<br />Make a melee taijutsu attack against the target creature dealing 2d12+your strength modifier bludgeoning damage on a successful hit.\_<br />The target creature is moved to the closest space of your choice within 5 feet that it can occupy.\_<br />Creatures in your path, whom you pass through must make a dexterity saving throw, taking 4d6 bludgeoning damage on a failed save and half as much on a successful one.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the Chakra cost of this jutsu by 3 or the Calorie cost by 1 and damage by 2d12 and 2d6.\_<br />If this jutsu is cast at B-Rank or higher your hair spikes as you deal an additional 4d6 piercing damage to the target creature and creatures you pass through.\_<br />If this jutsu is cast at S-Rank, increase the distance you can move up to 90 feet, being able to move in any direction and turn corners.\_<br />Creatures can only be affected by this jutsu no more than twice if you would pass over them more than once using this additional movement.</p>"
