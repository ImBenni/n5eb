      description:
        value: "<p>A flash of lightning erupts from your hands towards a creature of your choice within range. Make a ranged ninjutsu attack against the target. On a hit the target takes 3d8 lightning damage, and the next attack roll made against the target before the end of your next turn has advantage, thanks to the streak of electricity guiding the next attack to the target.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to overcharge its effects. When you do this jutsu instead becomes a 60 foot long, 5-foot-wide line. All creatures in range must make a Dexterity saving throw, taking 3d8 lighting damage on a failed save or half as much on a success. Regardless of a pass or fail, the next attack roll made against affected creatures before the end of your next turn has advantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d8.</p><p>\_</p>"
