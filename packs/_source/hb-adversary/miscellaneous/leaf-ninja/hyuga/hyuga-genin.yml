  - folder: 4m4qtZMho0KbzRCR
    name: Byakugan
    type: feat
    _id: UV62NQo9v556EIRJ
    img: systems/n5eb/assets/content/eyes/byakugan.webp
    system:
      description:
        value: >-
          <p>One of the hidden Leaf village's 2 great dojutsu. The Byakugan is an eye of extreme refined focus. At 1st
          level you can spend 5 Chakra to activate the Byakugan as a bonus action which remains active for up to 1 hour.
          You may deactivate and reactivate the Byakugan during this time period with no additional cost. While active
          the Byakugan gains the following benefits:</p><p>• <strong>All Seeing White Eye:</strong> You have 500 feet of
          Chakra sight while out of combat and half of that, while in combat. You gain the ability to see a creature's
          Chakra nature, if any. You can see through material up to 10 feet thick. creatures cannot be obscured to you
          in any way if you can see through the obstruction.</p><p>• <strong>360° Vision:</strong> You can see in a
          360-degree field around you up to half your Chakra sight range, originating from you in combat. While out of
          combat, your field of vision increases to match your Chakra sight range. You can see without having to turn
          your head or avert your eyes.</p><p>At 3rd Level, while training with your Byakugan, you gain one of the
          following additional features that further exemplify your skill with the Dojutsu. At 11th and 18th Level you
          may select an additional feature from this list.</p><p><strong>• Combat Insight [Changed]</strong>: You gain
          amazing combat senses while your Byakugan is active. If you are proficient in Dexterity saving throws you gain
          a +2 bonus to them. If you are not proficient, you gain a +1 bonus instead.</p><p><strong>• Combative
          Vision:</strong> You also add your Wisdom ability modifier to the first unarmed attack roll, using the Gentle
          Fist Stance, you make on each of your turns.</p><p><strong>• Immense Distance:</strong> Doubles the range of
          Chakra sight to 1,000ft. You can see things up to 1 mile away as if the were within 50 feet of
          you.</p><p><strong>• Penetrative Vision [Changed]:</strong> You can see through obstructions up to 30 feet
          thick within your Chakra sight range. You gain a +2 bonus to Perception while your Byakugan is
          active.</p><p><strong>• Perceptive Insight [Changed]:</strong> You can discern a creature from any clones they
          may make, regardless of the clone used. Additionally, you gain advantage on checks made with the See through
          lies skill-action.</p><p><strong>• Perceptive Predictions [Changed]</strong>: You gain unmatched predictive
          combat senses. When you would cast a Hyūga Hijutsu as a reaction to taking damage, the jutsu gains a bonus 4
          DR, based on the rank it is cast for the duration for the jutsu. (D-Rank/C-Rank: 4 DR, B-Rank/A-Rank: 8 DR,
          S-Rank: 12 DR).</p><p><strong>• Perceptive Resilience [Changed]</strong>: Increase your resistance to
          misdirection. When making a Wisdom saving throw against Genjutsu with the Visual Keyword, you gain a +2 bonus
          if you are proficient in Wisdom saving throws. If you are not proficient you gain a +1 bonus instead. These
          saves cannot be made at disadvantage.</p>
