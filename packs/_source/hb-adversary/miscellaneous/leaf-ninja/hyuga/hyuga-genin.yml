items:
  - name: Palm Strike
    type: spell
    img: systems/n5eb/assets/content/clans/hyuga.webp
    system:
      description:
        value: >-
          <p>As part of the requirements of this jutsu, you must be benefiting from the Gentle Fist Stance. Once per
          turn, you cast this jutsu when you would deal Chakra Damage with a melee attack. When this jutsu is cast you
          deal an additional 3d8 chakra damage and you can choose to either Disrupt I or Block I their chakra
          pathways</p><p>If you deal Chakra damage to a creature that has 0 Chakra, you instead deal double the
          resulting Chakra damage as force damage.</p><p>Disrupt I: You increase the cost of all jutsu they cast by +3,
          until the end of their next turn.</p><p>Block I: You force the target creature to make a Constitution Saving
          Throw, becoming unable to mold Chakra until the start of your next turn on a failed save. They can remake the
          saving throw to remove this effect at the end of their turns</p><p>At Higher Ranks: For each rank you cast
          this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 2d8 and if you use Disrupt I
          increase the cost of their next jutsu by an additional +3.</p>
