  - name: Beast Human Clone
    type: spell
    img: systems/n5eb/assets/content/clans/inuzuka.webp
    system:
      description:
        value: "<p>Your Nin-Dog uses the advanced transformation technique, transforming to look exactly like you, with notable differences.\_<br />They still need to be on all fours and they cannot talk, so they make poor replacements for infiltration.\_<br />While in this form, when your Nin-Dog is within 15 feet of you and either of you, are the target of an attack, the other one, not being targeted, can switch places with the target of the attack and make an unarmed or natural weapon attack (their choice) as a reaction.\_<br />If the result of their attack roll is higher than the triggering creature's attack was a melee attack, the creature automatically takes damage attributed to the attack type you or your Nin-Dog chose.\_</p><p><br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the distance the special reaction can be used by 10 feet.\_<br />If this jutsu is cast at B-Rank, while you are within 15 feet of your Nin-Dog, if you cast an Inuzuka Clan Hijutsu that has a casting time of \"1 Action, 1 Bonus Action\", you can choose to only spend 1 action.\_<br />If you do, both you and your Nin-Dog cast the jutsu simultaneously, attempting to target the same creature.</p>"
