  - name: Hallucinatory Terrain
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
    system:
      description:
        value: >-
          <p>You make natural terrain in a 150-foot cube in range look, sound, and smell like some other sort of natural
          terrain. Thus, open fields or a road can be made to resemble a swamp, hill, crevasse, or some other difficult
          or impassable terrain. A pond can be made to seem like a grassy meadow, a precipice like a gentle slope, or a
          rock-strewn gully like a wide and smooth road. Creatures within the area aren't changed in appearance. The
          tactile characteristics of the terrain are unchanged. Creatures entering the area are likely to see through
          the Illusion. If the difference isn't obvious by touch, a creature examining the Illusion can attempt a Wisdom
          (Illusion) check against your Genjutsu save DC to disbelieve it.</p>
