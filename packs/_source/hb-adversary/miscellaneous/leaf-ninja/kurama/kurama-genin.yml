  - name: Insinuation
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
    system:
      description:
        value: >-
          <p>You unleash a torrent of conflicting desires into the mind of one creature you can see within range,
          impairing its ability to make decisions. The target must succeed an Intelligence saving throw</p><p>Success:
          Affected creature is able to resist this Jutsu's effect but still takes 1d12 Psychic damage.</p><p>Failure:
          Affected creature takes 2d12 psychic damage and makes their chakra control check to maintain concentration at
          disadvantage.</p><p>Critical Failure: Affected creatures takes 3d12 + Genjutsu Ability modifier psychic damage
          and loses concentration on a jutsu with the lowest cost they are currently concentrating on</p><p>At Higher
          Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by
          1d12.</p>
