    name: 'Swift Release: Expedience'
    type: spell
    _id: 0iOYHoBKvzdxDEYj
    img: systems/n5eb/assets/content/items/swift.webp
    system:
      description:
        value: >-
          <p>You focus your chakra, granting yourself</p><p>immense speed. This allows you to act faster than
          almost</p><p>anyone else on the battlefield. For the duration you can</p><p>use one of the listed effects once
          per turn at no action</p><p>cost on your turn. You can benefit from this Jutsu a</p><p>number of times equal
          to your Ninjutsu Ability Modifier</p><p>per casting[Min 1].</p><p><strong>Evasive Maneuvers:</strong> Before
          the start of your next turn,</p><p>the first attack made against you is made at</p><p>Disadvantage and the
          first Dexterity Saving Throw you</p><p>make is at Advantage.</p><p><strong>Deduce:</strong> Make a Perception
          or Investigation Check</p><p>against the AC of a creature you can see. On a success,</p><p>before the start of
          your next turn, the next attack you</p><p>make targeting that creature has a +1 to its Critical</p><p>Threat
          Range and the next Jutsu you cast increases its</p><p>Save DC by +1 for the first saving throw it forces
          the</p><p>creature to make.</p>
