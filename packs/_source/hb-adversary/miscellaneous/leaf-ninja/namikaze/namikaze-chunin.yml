  - name: Swift Release Mirror Image Technique
    type: spell
    img: systems/n5eb/assets/content/clans/namikaze.webp
    system:
      description:
        value: "<p>You mold your Wind and Lightning Release chakra into very convincing clones of yourself. Three clones of yourself appear in your space. Until the jutsu ends, the clones move with you and mimic your actions, shifting positions at hyper speed so it's impossible to track which image is real. You can use your bonus\_ action to dismiss the clones.</p><p>Each time a creature targets you with an attack during the jutsu's duration, roll a d20 to determine whether the attack instead targets on of your clones. If you have three clones, you must roll a 6 or higher to change the attack's target to a clone. With two clones, you must roll an 8 or higher. With one clone, you must roll an 11 or higher. If the creature that targets you has true sight or tremor sense, you make this roll with disadvantage.</p><p>A clone's AC equals 10 + your Dexterity modifier + half your proficiency bonus. If an attack hits a clone, the clone is destroyed. A clone can only be destroyed only by an attack that hits it. It ignores all other damage and effects. The jutsu ends when all three clones are destroyed.</p>"
