      description:
        value: "<p>As part of the requirements of this jutsu, you must know the Shadow Possession Jutsu. By molding chakra into your shadow, you are able to give it a shape as it stands up from the ground, but it retains an extremely thin width. Your shadow stands as tall as you and follows your every whim. It cannot grab or carry anything nor can it touch or interact. This jutsu is extremely useful for\_ istractions and misdirection. This jutsu can be used from stealth without revealing your location and can also be used alongside a stealth roll.\_</p>"
