  - name: Poison Tag
    type: consumable
    img: https://assets.forge-vtt.com/bazaar/core/icons/sundries/documents/document-symbol-skull-tan.webp
    system:
      description:
        value: >-
          <p>Poison Tags are used to flush enemies out of cover through poisoning them.</p><p> Poison Tags have a range
          equal to 30 feet + your Strength modifier x 5.</p><p> As an action, you can throw a Poison tag at a point you
          can see within range.</p><p> The tag explodes in a 15ft radius sphere of green fog centered the chosen
          point.</p><p> The fog spreads around corners, counts as heavily obscured and lasts for 1 minute or until a
          breeze or gust of wind disperses it.</p><p> When a creature enters the fog's area for the first time on a turn
          or starts its turn there, it must make a Constitution saving throw, being Poisoned and taking 1d8 poison
          damage on a failed save, or half as much damage and no addition effects on a successful one.</p><p> Constructs
          and Creatures wearing appropriate protective equipment are unaffected.</p><p> This item is 1 Bulk Poison Tags
          can be affixed to Kunai.</p><p> When they are the range of the Poison Tag becomes wholly reliant on the kunai
          itself.</p><p> When affixed.</p><p> The next time the affixed Kunai would deal damage to a creature, the
          Poison Tag detonates.</p><p> A creature who took damage from the kunai prior to it detonating makes their
          saving throw at disadvantage</p>
