          less mental fortitude than a human. Select a single target creature that you can see within range. Target
          creature must succeed an Intelligence saving throw against your Genjutsu save DC, becoming friendly towards
          you and becoming more inclined to complete tasks for you for the duration, on a failed save.</p><p>The
          affected creature will fight for you if asked. While they are friendly towards you, you can command them with
          both verbal and non-verbal actions. You can also understand things about them, such as them being happy,
          scared, or excited.</p>
