    type: spell
    img: icons/magic/light/beam-rays-blue-small.webp
    system:
      description:
        value: >-
          <p>You manifest a 4-inch sphere of pure chakra at a creature you can see within range. Make a ranged ninjutsu
          attack. On a hit, the target takes 3d6 damage. If you have a nature release, this jutsu gains a single nature
          release keyword that you can cast and it's damage type becomes the corresponding nature releases damage type
          (Water = Cold). If you do not have a nature release this jutsu instead deals Force
          Damage.</p><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For each rank you cast this
          jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d6. Additionally, you gain one of
          the following benefits based on the Damage type of this jutsu.</p><p>• Earth: The target must succeed on a
          Strength saving throw being Bruised on a failed Save.</p><p>• Wind: The target must succeed a Strength saving
          throw being pushed back 15 feet and being knocked prone on a failed save.</p><p>• Fire: Each creature within a
          5-foot radius sphere of the target creature must succeed a Dexterity saving throw, being burned on a failed
          save.</p><p>• Cold: Each creature within a 5-foot radius sphere of the target creature must succeed a
          Constitution saving throw, being chilled on a failed save.</p><p>• Lightning: The target must succeed a
          Constitution saving throw, being shocked until the end of their next turn.</p><p>• Force: Changed damage die
          to d8. The target must succeed a Dexterity saving throw being Dazed.</p>
