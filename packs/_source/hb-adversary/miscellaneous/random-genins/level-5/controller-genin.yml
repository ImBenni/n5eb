  - name: Mind Sliver
    type: spell
    img: icons/magic/control/energy-stream-link-blue.webp
    system:
      description:
        value: >-
          <p>You inject a disorienting spike of chakra into the mind of one creature you can see within range. Make a
          Ranged Genjutsu attack, dealing 1d6 psychic damage. The target must also succeed an Intelligence saving throw.
          On a failed save, until the end of its next turn, it must roll a d4 and subtract the number from the first
          saving throw they make for the duration.</p><p><strong>At</strong> <strong>Higher</strong>
          <strong>Levels</strong>: This Jutsu's proficiency increases as you increase in level rolling an additional 1d6
          when you reach 5th level (2d6), 11th level (3d6), 17th level (4d6)</p>
