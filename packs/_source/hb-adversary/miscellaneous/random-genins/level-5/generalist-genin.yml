  - name: Iron Strike
    type: spell
    img: icons/skills/melee/earthquake-fist.jpg
    system:
      description:
        value: >-
          <p>You punch with enough force to tear through any defense your enemy might have. Make a taijutsu attack. On a
          hit, they take your [Unarmed Damage] + 2d6. If the target would cast a Jutsu as a Reaction to the damage you
          deal, the cost of their jutsu is increased by +4 due to the strain required to keep up with your strike. If
          their Jutsu does not cost chakra, they must spend 10 chakra to take their reaction.</p><p>If this jutsu is
          used as a Finisher, you instead deal your [Unarmed Damage] + 4d6 and the cost of Reaction jutsu cast vs you is
          instead increased by +8.</p><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For each
          rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 1d8 and the cost
          increase of Reaction jutsu by +4.</p>
