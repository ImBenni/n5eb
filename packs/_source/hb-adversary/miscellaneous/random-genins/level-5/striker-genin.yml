items:
  - name: Leaf Kick
    type: spell
    img: icons/skills/melee/roundhouse.webp
    system:
      description:
        value: >-
          <p>You deliver a single falling kick, strong enough to bring the environment crumbling down around you. Make a
          Melee Taijutsu attack against a creature within range. On a hit you deal your Unarmed damage + 1d12 and the
          target must make a Strength saving throw. On a failed save they gain 1 rank of Slowed until the end of their
          next turn.</p><p>If this jutsu is used as a <em><span style="text-decoration:underline">Finisher</span></em>,
          you instead deal your [Unarmed Damage] + 3d12 and on a failed save the target falls prone as your force them
          into the ground shattering it, causing the area within a 10ft cube originating from you to be treated as
          difficult terrain.</p><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For each rank you
          cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and damage by 1d12.</p>
