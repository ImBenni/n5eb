    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
    system:
      description:
        value: >-
          <p>You release a pulse of chakra targeting all hostile creatures within 30 feet of you causing them feel deep
          seeded regret or dread. All hostile creature of your choice within 30 feet of you must succeed a Charisma
          saving throw as their mind is wrought with negative thoughts.</p><ul><li><p><strong>Success</strong>: No
          further effects.</p></li><li><p><strong>Failure</strong>: Affected creatures suffers a 1d4 penalty to all
          attack roll, saving throws and checks it makes for the duration.</p></li><li><p><strong>Critical</strong>
