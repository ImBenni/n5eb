          <p>You slam your open palm onto the ground creating a 10-foot tall, 5 foot wide and 1-foot-thick
          @UUID[Actor.gdxWkFx9ROkKmbOR]{Stone Wall} directly in front of the creature you are protecting granting them
          total cover.</p><p>This wall acts as an Quake Shard occupying a space of your choice within 5 feet of the
