    system:
      description:
        value: >-
          <p>This technique is taught to every student of the academy. Using this technique, the user assumes the form
          of a creature, object or animal of the same size category as they are or smaller. They may freely designate
          the specifics of their new form <em>(such as height, weight, hair texture and color, skin tone, etc.)</em>.
          This transformation is purely cosmetic and an illusion. When you use a Charisma based skill action in an
          attempt to deceive, lie or misguide another creature, you use this new form, so long as it is relevant to your
          act, to enhance that lie with convincing movements and gestures. If you are not benefiting from the
          <strong>Voice Change</strong> Genjutsu active, you gain only half of the following bonus. </p><p>While
          transformed, when you use a Charisma based skill action in an attempt to deceive, lie or misguide another
          creature, you use this new form, so long as it is relevant to your act, you can add+4 to the checks made. You
          can gain this bonus, once per round, or once every minute if in combat or a social scene.</p>
