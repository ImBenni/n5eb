  - name: Advanced Transformation
    type: spell
    img: icons/weapons/thrown/fuma-shuriken-summon.jpg
    system:
      description:
        value: >-
          <p>An advanced form of the transformation technique. When cast you transform your body into a physical object
          such as a weapon or object of Small or Medium size. While transformed into an object you take on its physical
          properties and function as this object. If transformed into a weapon you also take on its weapon<br
          />properties. Others can wield and use you as a weapon so long as you maintain concentration on this jutsu.
          You cannot transform into any object that separates into multiple pieces, disconnects or has multiple moving
          mechanical parts, such as an electric fan or a Safe. If you do, these additional pieces or functions do not
          work or<br />cannot be moved by any means.</p><p>While transformed you cannot move or act or speak. You are
          aware of your immediate surroundings and can hear as normal, but are unable to cast jutsu or make attacks of
          any kind while transformed.</p><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For each
          rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. When Cast at B-Rank you can
