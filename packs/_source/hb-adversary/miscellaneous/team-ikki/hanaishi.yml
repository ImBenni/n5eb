    type: spell
    img: icons/commodities/flowers/lotus-pink.webp
    system:
      description:
        value: "<p>You grasp a hand full of poisonous Lotus petals, spreading them enough to fill a 20-foot cube originating from yourself in a dance of serenity. A creature who's failed this jutsu's save once before, cannot be affected again for 1 minute.</p><p>As they flutter in front of you, all creatures within range must make a Charisma saving throw to as the pollen begins to affect their emotional state.</p><ul><li><p><strong>Critical</strong> <strong>Success</strong>: Affected creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu until the end of the casters next turn.</p></li><li><p><strong>Success</strong>: Affected creature is able to resist most of this jutsu's effects.</p></li><li><p><strong>Failure</strong>: Affected creature enters a calm and less hostile state, lacking a drive for combat. For the duration, calmed creatures cannot take a hostile action towards another creature. This jutsu immediately ends if another creature would attempt to take a hostile action towards another creature that this affected creature can see. This does not prevent them from acting in their self-interest, but instead only prevents them from directly engaging in hostile actions.\_</p></li><li><p><strong>Critical</strong> <strong>Failure</strong>: Same as failure, but this jutsu's duration is increased to 10 minutes.</p></li></ul>"
