  - name: 'Lotus: Shameful Petals'
    type: spell
    img: icons/commodities/flowers/lotus-blue.jpg
    system:
      description:
        value: >-
          <p>You grasp a hand full of poisonous Lotus petals, spreading them in a unique way. Select two points you can
          within range as you fill two, 5-foot radius's with a petal dance of bitterness. A creature who's failed this
          jutsu's save once before, cannot be affected again for 1 minute.</p><p>As they flutter, all creatures within
          range must make a Charisma saving throw to as the pollen begins to affect their emotional
          state.</p><ul><li><p><strong>Critical</strong> <strong>Success</strong>: Affected creature is able to resist
          this jutsu's effect, becoming immune to further castings of this jutsu until the end of the casters next
          turn.</p></li><li><p><strong>Success</strong>: Affected creature is able to resist most of this jutsu's
          effects.</p></li><li><p><strong>Failure</strong>: Affected creature enters a shameful state of mind as for the
          duration, unable to gain the benefit of jutsu based Damage reduction. An affected creature remakes this saving
          throw at the end of each of its turns, ending this jutsu's effects on a
          success.</p></li><li><p><strong>Critical</strong> <strong>Failure</strong>: Same as failure, but they also
          cannot gain the benefit of bonuses to AC as a result of Jutsu.</p></li></ul>
        chat: ''
