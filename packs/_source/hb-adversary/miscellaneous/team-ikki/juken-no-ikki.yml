  - name: Musabori
    type: weapon
    img: icons/weapons/swords/musabori.jpg
    system:
      description:
        value: >-
          <p><strong>Properties:</strong> <em>Finesse, Versatile (d10), Deadly</em></p><section class="secret"
          id="secret-DXMqqJxDcVPGOhED"><ul><li><p><span
          style="font-family:Eater"><em>Cursed:</em></span></p><ul><li><p>This item is cursed, and attuning to it
          extends the curse to you. <span style="text-decoration:underline"><span style="text-decoration:underline">You
          cannot be disarmed by any means</span></span> besides dismembering. Musabori is cursed with the Reaper Death
          Seal's chakra, and thus allows the wielder to wield a fraction of its power.</p></li><li><p>A creature hit by
          this weapon must make a Constitution Saving Throw using your Taijutsu DC. On a fail, this weapon siphons 1d4
          Hit/Tenacity Dice from the target. If the target has 0 Hit/Tenacity Dice, it deals additional Necrotic damage
          equal to your level.</p></li><li><p>Once per Long Rest you can cast the
          @UUID[Compendium.n5eb.jutsus.Item.pNRpIoEyJCxyqwRS]{Grim Legion} Ninjutsu regardless of prerequisites at <span
          style="text-decoration:underline"><span style="text-decoration:underline">no Chakra or Hit Dice
          cost</span></span>. The spirits manifested look like all the people slain by this sword, as if their tormented
          souls are trapped within the blade itself.</p></li><li><p>Furthermore, while attuned to this sword, you <span
          style="text-decoration:underline"><span style="text-decoration:underline">cannot die</span></span>. When your
          Hit Points fall to 0, you skip the Death Saving throw phase and instead return to life with half your maximum
          HP. The only way to properly kill its wielder is to drop its HP to 0 while they're affected by a hostile jutsu
          with the Fuinjutsu keyword.</p></li></ul></li></ul><p></p><blockquote><p>Originally wielded by the forgotten
          Eight member of the Seven Ninja Swordsmen of the Mist, this blade emanates cursed chakra to the point where it
          is visible to the naked, untrained eye. It invokes strong feelings of unease and anxiety on those that are
          unfortunate enough to gaze upon it.</p></blockquote></section>
        chat: ''
