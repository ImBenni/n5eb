  - name: Soul Puppet
    type: feat
    system:
      description:
        value: >-
          <p>This adversary is a Soul Puppet, designed to serve the will of its master. This puppet cannot move further
          than 60ft. from its Puppet Master.</p><p>It is controlled by its Puppet Master with its Bonus
          Action:</p><ul><li><p>The Soul Puppet has an Action, Reaction and can move up to its movement points, <span
          style="text-decoration:underline"><span style="text-decoration:underline">never straying further than
          60ft.</span></span> of this Adversary.</p></li><li><p>The Soul Puppet is considered incorporeal to all but the
          puppet master, and thus has no physical form, being invisible to the naked eye and immune to Bludgeoning,
          Piercing and Slashing damage.</p></li><li><p>Furthermore, this Adversary is immune to Acid, Necrotic, Poison
          and Psychic damage and has Resistance to Chakra and elemental damage (Cold, Earth, Fire, Wind and
          Lightning).</p></li></ul><p>This adversary can take a reaction without any input from its Puppet Master. If
          its Puppet Master is unable to take actions, it cannot take actions either.</p>
