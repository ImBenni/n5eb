  - name: Soul Weaver
    type: feat
    system:
      description:
        value: >-
          <p>This Adversary is a puppet master specialized in controlling yin and yang chakra. It can control a Soul
          Puppet with its Bonus Action using Chakra Threads.</p><ul><li><p>The Soul Puppet has an Action, Reaction and
          can move up to its movement points, <span style="text-decoration:underline"><span
          style="text-decoration:underline">never straying further than 60ft.</span></span> of this
          Adversary.</p></li><li><p>The Soul Puppet is considered incorporeal to all but the puppet master, and thus has
          no physical form, being invisible to the naked eye and immune to Bludgeoning, Piercing and Slashing
          damage.</p></li></ul><p>A character with Chakra Sight can see the Chakra Threads you emit from your fingers,
          and an amorphous chakra flame in place of the puppet. Only this adversary and characters with True Sight can
          see the Soul Puppet's true form.</p><p>Finally, a creature with Chakra Sight that deals Chakra Damage may
          <span style="text-decoration:underline"><span style="text-decoration:underline">target the Chakra
          Threads</span></span> directly.</p><ul><li><p>The attacking creature may trigger a contested roll using its
          attack roll against your Chakra Control skill check.</p><ul><li><p>If successful, the Threads are severed, and
          the Soul Puppet is incapacitated until this Adversary reattaches it using a Full-Turn
          Action.</p></li></ul></li></ul>
