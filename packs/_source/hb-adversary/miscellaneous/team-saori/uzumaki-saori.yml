          for the duration. After 1 week this jutsu immediately ends. A creature can attempt to make an Intelligence
          (Ninshou) check vs your Ninjutsu save DC as a Full-Turn Action on their turn to end this jutsu's effect on
          them.</p><p>If this jutsu is currently affecting a creature with ranks of the Sealed condition, any Saving
