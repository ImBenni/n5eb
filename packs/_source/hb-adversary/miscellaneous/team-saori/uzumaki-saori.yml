    type: spell
    img: icons/clans/five-pronged-uzumaki-seal.jpg
    system:
      description:
        value: >-
          <p>An advanced version of the Uzumaki Art: Basic Seal, requiring two chakra seals layered on top of one
          another and reinforced with a 5-point seal of your design, made to lock away chakra for powerful
          creatures.</p><p>Make a melee ninjutsu attack against a creature within range. On a hit, the target is infused
          with the 5-pronged seal. For the duration, the first time the affected creature casts a Ninjutsu or Genjutsu
