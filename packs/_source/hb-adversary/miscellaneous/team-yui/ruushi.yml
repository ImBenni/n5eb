  - name: Chakra Tentacles
    type: spell
    img: icons/creatures/tentacles/tentacles-thing-green.webp
    system:
      description:
        value: >-
          <p>You create squirming tentacles of chakra that fill a 20-foot cube on a surface that you can see within
          range. When a creature enters the affected area for the first time or starts its turn there, they must succeed
          a Dexterity saving throw. On a failed save they take 3d6 bludgeoning damage and are restrained for the
          duration. A creature restrained by this jutsu takes 3d6 bludgeoning damage at the beginning of each of its
          turns. A creature restrained by this jutsu can use its action to make a Strength or Dexterity ability check
          (it's choice). On a success, it free's itself.</p><p><strong>At</strong> <strong>Higher</strong>
          <strong>Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
