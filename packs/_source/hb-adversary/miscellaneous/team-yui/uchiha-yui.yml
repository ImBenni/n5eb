  - name: '[Sharingan] Hypnosis'
    type: spell
    img: icons/magic/control/hypnosis-mesmerism-pendulum.webp
    system:
      description:
        value: "<p>You make a few subtle hand signs as you attempt to lull a creature into a deep sleep. Select a creature you can see within range. The target must make a Wisdom saving throw. A creature who is currently in combat is immune to this jutsu's effects.</p><ul><li><p><strong>Critical Success</strong>: Affected creature is able to resist this jutsu's effects.</p></li><li><p><strong>Success</strong>: Affected creature is slowed until the end of the next turn as they are only slightly drowsy.</p></li><li><p><strong>Failure</strong>: Affected creature begins to daydream. They become blind and deafened to all events and happenings that is further than 10 feet away from them. Anything that would affect them or the area within 10 feet of them would break them from this day dream.</p></li><li><p><strong>Critical Failure</strong>: Affected creature falls asleep, unconscious for the next 10 minutes. A creature who is asleep in this way can be awoken by yells, screams or loud sounds or by being physically shaken or taking damage of any type.</p></li></ul><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.\_</p>"
