  - folder: ldaRergewJ9aTcdP
    name: Style Points
    type: feat
    img: icons/svg/S-Rank.jpg
    system:
      description:
        value: >-
          <p>At the beginning of your turn you must roll a d6, comparing the result with the Style table below. The
          number rolled corresponds to a specific Stylish Action, which is what you must do in your turn in order to
          gain an increment in Style Points.</p><ul><li><p>Style Points can increase once per round up to a maximum of
          S-Rank. Any increments obtained during S-Rank are lost.</p></li><li><p>Once per round, whenever you take
          damage, is Restrained or otherwise Disabled (Stunned, Petrified, Incapacitated, Unconscious), you downgrade
          your Style Points by one point. Style Points last until they're downgraded, in which case their duration
          resets. After combat ends, all Style Points are lost.</p></li><li><p>The Style Points effects are all
          cumulative, meaning while in the S-Rank, you are also under the influence of the effects of the A, B, C and
          D-Ranks.</p></li></ul><table><tbody><tr><td data-colwidth="68"><p style="text-align:center"><strong>d6
          Result</strong></p><hr /></td><td><p style="text-align:center"><strong>Stylish Action</strong></p><hr
          /></td></tr><tr><td data-colwidth="68"><p style="text-align:center"><strong>1</strong></p></td><td><p
          style="text-align:center">Spend your entire turn trash-talking the enemy.</p></td></tr><tr><td
          data-colwidth="68"><p style="text-align:center"><strong>2</strong></p></td><td><p
          style="text-align:center">Make a successful grapple/shove/trip attempt against an enemy.</p></td></tr><tr><td
          data-colwidth="68"><p style="text-align:center"><strong>3</strong></p></td><td><p
          style="text-align:center">Use a taijutsu/bukijutsu as a <em>Finisher</em>.</p></td></tr><tr><td
          data-colwidth="68"><p style="text-align:center"><strong>4</strong></p></td><td><p
          style="text-align:center">Hit two or more enemies in a single turn.</p></td></tr><tr><td data-colwidth="68"><p
          style="text-align:center"><strong>5</strong></p></td><td><p style="text-align:center">Make an improvised
          weapon attack roll against an enemy.</p></td></tr><tr><td data-colwidth="68"><p
          style="text-align:center"><strong>6</strong></p></td><td><p style="text-align:center">Nothing. You immediately
          increase your Style Points by 1 rank.</p></td></tr></tbody></table><p><strong>Style
          Effects:</strong></p><ul><li><p><strong>D-Rank:</strong></p><ul><li><p>You gain +2 AC.</p></li><li><p>You add
          1d4 to attack rolls with improvised weapon
          attacks.</p></li></ul></li><li><p><strong>C-Rank:</strong></p><ul><li><p>You gain another +1
          AC.</p></li><li><p>You may attempt to Grapple as a free action after hitting an enemy with an melee
          unarmed/melee improvised weapon attack.</p></li></ul></li><li><p><strong>B-Rank:</strong></p><ul><li><p>You
          gain +10 feet of movement.</p></li><li><p>You may add your proficiency bonus to improvised attack damage
          rolls.</p></li></ul></li><li><p><strong>A-Rank:</strong></p><ul><li><p>You gain another +10 feet of
          movement.</p></li><li><p>You gain an additional action during your turn that can only be used to make a single
          weapon attack.</p></li></ul></li><li><p><strong>S-Rank:</strong></p><ul><li><p>You gain +1 AC and all attack
          rolls are made with Advantage. While in the S-Rank, you automatically heal 1d10 + half your level in Hit
          Points and half as much in Chakra Points at the start of your turn. This effect can only trigger once per
          round.</p></li></ul></li></ul><p></p><blockquote><p>A unique fighting style that utilizes hand-to-hand combat
          and improvised weaponry in order to always come out on top, linking one unpredictable attack after another,
          respecting the ebb and flow of battle. While in the zone, practitioners of this martial art are nigh
          impossible to predict, and some have been seen fighting for hours before exhaustion.</p></blockquote>
