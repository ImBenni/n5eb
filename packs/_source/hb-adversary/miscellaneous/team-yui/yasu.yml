  - name: Dempsey Roll
    type: spell
    img: icons/skills/melee/boxing-guard.jpg
    system:
      description:
        value: >-
          <p>You take a boxers stance, when you are confronted by a melee attack from a creature within 5 feet of
          you.</p><p>Until the beginning of your next turn, each melee attack that targets you, you can spend 4 chakra.
          When you do, you attempt to duck and weave granting yourself a +2 Bonus to your AC against the triggering
          creature and then immediately make one unarmed attack in response to the triggering melee attack. This bonus
          to AC stacks up to twice.</p><p><strong>At</strong> <strong>Higher</strong> <strong>Ranks</strong>: For each
          rank you cast this jutsu above D-Rank increase the activation cost of this jutsu by 3. If this jutsu is cast
          at B-Rank, increase the AC bonus by +1.</p>
