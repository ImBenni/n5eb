  - name: Sensing Technique
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
    system:
      description:
        value: >-
          <p>You are able to knead chakra in such a way that you can begin to sense other creatures chakra signatures
          clearly when you try. You can only cast this jutsu on your turn, and casting it does not cost action economy.
          When this jutsu is cast, for the duration, you gain access to a unique special action called Sense Chakra.
          This special action can be gained and used in addition to other special actions you gain and use. This special
          action counts as a Skill-Action and both a Constitution and Wisdom based skill.</p><p>Sense Chakra. As a Bonus
          action, you can make a Perception check using either Constitution or Wisdom vs the Passive Chakra control
          (Chakra control bonus + 10) of all creatures within 30 feet of you. On a success, you gain the benefit of the
          Chakra Sensing special sense against them for the duration until they either have 0 chakra or they make and
          succeed their Suppress Chakra skill action.</p><p>At Higher Ranks: For each rank you cast this jutsu above
          D-Rank, increase the cost of this jutsu by 3 and the range of the Sense Chakra skill action by 30ft.</p>
