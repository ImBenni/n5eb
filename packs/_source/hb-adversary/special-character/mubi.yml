      description:
        value: "<p>As part of the requirements of this jutsu you must have the Four Legs Technique active.\_<br />As part of the activation of this jutsu, make two melee Taijutsu attacks against a target creature in range.\_<br />On a hit you deal unarmed damage + 2d6.\_<br />If you hit with both attacks, the target creature must succeed a strength saving throw, being knocked prone on a failed save.\_<br />You also gain an additional Bonus action until the end of this turn.\_</p><p>You may only gain a Bonus Action as a result of this Jutsu once per round.</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3.\_<br />If this jutsu is cast at B-Rank or higher, increase the number of attacks made by +1.\_<br />If this jutsu is cast at S-Rank, increase the number of attacks made by +1</p>"
