  details:
    biography:
      value: >-
        <p>Mubi is a special nin dog that refused to have any sort of master, he refused and did not took any of the
        inuzuka as its master.</p><p>On the other side has respect for the head clan and listens to him.</p><p>Smart,
        quick and skilled, Mubi often helps around the clan grounds and even trains some of the nin dogs.</p><p>Mubi
        trained a lot and managed to become resilient to chakra damage due to his origina as a chakra animal and cannot
        be freightened or charmed as he is incredibly prideful and does not allow to be put down either.</p><p>Mubi is
        incredibly independent and dows what he wishes unless the leader says anything about it.</p><p>He is, according
        to rumors, capable of talking but he refuses to do so.</p>
