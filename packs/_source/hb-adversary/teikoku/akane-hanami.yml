  details:
    biography:
      value: >-
        <p>Akane is a shinobi that decided to join the empire after being kicked out of her own village for her strength
        and doing this the "direct way" which often ended up with victims or killings.</p><p>Akane is not really an
        incredibly ruthless woman, but she simply was still getting used to her newfound strength and it took her a
        while to learn how to use it properly.</p><p>Ironically now she kind of hates killing and even learned medical
        jutsu to heal those in need.</p><p>Despite that she is still a deadly adversary but the empire welcomed her
        after she saved a couple of their troops and one of their commander were in trouble after getting a lot of heavy
        wounds.</p><p>After that she always served them as she is very much loved and appreciated by the people of the
        kingdom.</p>
