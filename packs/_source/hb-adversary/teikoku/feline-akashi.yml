      value: >-
        <p>Feline is a very friendly girl that joined the effort in protecting her people against the shinobi
        threat.</p><p>She knows very well what shinobi are made of and the only reason she accepted Akane is because she
        saved her life and her troops's.</p><p>Feline is peppy and friendly but does not trust shinobi, in fact she sort
