items:
  - folder: w8bfWqi87gJKGpvX
    name: Iron Web Dome
    type: spell
    _id: 0Mat7WrMbVj8VC6g
    img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
    system:
      description:
        value: >-
          <p>You whip your weapon around at high speeds, creating a dome to defend against attacks. You can set the
          radius of this doom up to your weapons range. The Dome has an AC equal to your Taijutsu Save DC and Hp equal
          to twice your [weapons damage] and intercepts all damage originating outside the dome. A creature who hits the
          dome with a melee attack and fails to break it takes damage equal to your [weapon's damage die].</p><p>At
          Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. If this
          jutsu is cast at A-Rank, a creature who hits with it a melee attack instead takes twice your [weapons damage
          die] in damage, regardless of if it breaks or not.</p>
