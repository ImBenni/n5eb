          for the next 24 hours.</p><p>If the target creature succeeds 3 saves they reject the earth chakra from their
          body ending the effects of this jutsu. If this jutsu is used on a creature previously affected by this jutsu
          within 24 hours, they make each constitution saving throw at advantage.</p><p>At Higher Ranks: For each rank
