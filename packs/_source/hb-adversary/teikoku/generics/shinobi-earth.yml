  - name: Earth Release Earthen Grasp
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/earth.webp
    system:
      description:
        value: >-
          <p>You select a 5-foot-square of unoccupied space on the ground that you can see within range. A medium sized
          hand made from earth, soil and dust forms and reaches for one creature you can see within 10 feet of it. The
          target must make a Strength saving throw. On a failed save, the target takes 2d6 earth damage and is both
          grappled and restrained for the Jutsu's duration. A creature grappled in this way has one of their hands bound
          and is unable to form Hand Seals or use Chakra Seals with it.</p><p>As a bonus action, you can cause the hand
          to crush the restrained target, dealing 2d6 earth damage.</p><p>As an action on their turn, the restrained
          target can remake the saving throw. On a success, the target escapes and is no longer restrained by the
          hand.</p><p>As an action, you can cause the hand to reach for a different creature or to move up to 30 feet to
          a different unoccupied space that you can see. This movement must be along the same or connected surface the
          hand is attached to. The hand releases a restrained target if you do either. This hand counts as an Quake
          Shard.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu
          by 3, the number of Earthen hands that can target other creatures by +1 and increase the damage by 1d6.</p>
