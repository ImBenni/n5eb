        value: >-
          <p>You focus Earth Release chakra throughout one of your limbs until it darkens into a dark brown hue and
          gains the texture of solid stone. You then use this darkened ligament to strike at a creature with enough
          force to tear through almost anything.</p><p>Make a melee ninjutsu attack against a creature within range. On
          a hit, you deal 10d6 Earth damage and marking the creature with a mark of petrification.</p><p>A creature
          marked this way makes Constitution saving throws at the beginning of each of their turns for the next minute.
          On a failure its skin begins to harden at the point of impact as their body begins to petrify. If the creature
