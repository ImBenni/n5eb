items:
  - name: Fire Release Pyronado
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/fire.webp
    system:
      description:
        value: >-
          <p>You bathe your weapon in Fire Release Chakra and throw it, spinning the weapon like boomerang. The Weapon
          spins around you striking all creatures who come within 5 feet of you for the first time or begin their turns
          there. The first time each turn a Creature enters its range must succeed a Dexterity saving throw. On a failed
          save they take damage equal to your weapons damage + 6d6+6 and the burned condition or half as much and no
          additional effects on a successful save.</p><p>At Higher Ranks: For each rank you cast this jutsu above
          B-Rank, increase the cost of this jutsu by 3 and the radius of this jutsu by 5 feet.</p>
