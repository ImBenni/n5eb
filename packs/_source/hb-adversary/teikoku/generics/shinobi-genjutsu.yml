      description:
        value: "<p>You manifest a vertical slash of psionic chakra from your hand that you whip towards your enemies. Make a ranged Genjutsu attack, with a +1 to its critical threat range. On a hit you deal 3d6+ your genjutsu ability modifier in psychic damage and the affected\_ creature must make an Intelligence saving throw. If this jutsu scores a critical hit, the target suffers the effects of a Critical failure, regardless of their saving throw results.</p><p><br />Critical Success: Affected creature is able to resist this jutsu's effects.</p><p><br />Success: Affected creature gains 1 rank of Confused until the beginning of their next turn</p><p><br />Failure: Affected creatures gains 1 rank of Confused until the end of their next turn.</p><p><br />Critical Failure: Affected creatures gains 1 rank of Confused, Dazzled and Concussed.</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the number of creatures you can target by +1 and the damage by 1d6.</p>"
