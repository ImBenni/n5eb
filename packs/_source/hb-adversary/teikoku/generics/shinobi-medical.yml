  - name: Medical Release Spores of Ruin
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/medical.webp
    system:
      description:
        value: >-
          <p>You begin to generate poisonous medical chakra and release it, creating a massive wave of infectious spores
          of your design.</p><p>All creatures of your choice within range must make a Constitution saving throw. On a
          failed save creatures take 5d8 poison damage, becomes poisoned, and gains 1 rank of envenomed. On a successful
          save creatures take half damage and suffer no further effect.</p><p>Additionally, creatures who failed their
          save begin to exhibit bouts of a terrifying disease of your making. Black fungus begins to grow from their
          skin. Black ooze begins to leak from their eyes, mouth and ears. Creatures who would touch the affected
          creature also becomes exposed to this disease making a constitution saving throw, suffering the effects of
          this jutsu as normal.</p><p>At the beginning and end of an envenomed creatures turn they suffer the effects of
          the envenomed condition.</p><p>Finally, a jutsu with the medical keyword that removes conditions of B-Rank or
          higher can end this effect. If the caster must touch or be in contact with the patient to cast the jutsu, then
          the caster must make a saving throw as they become exposed to the effects of this jutsu as well.</p><p>At
          Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the
          damage by 1d8.</p>
