  - name: Medical Release Grim Reality
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/medical.webp
    system:
      description:
        value: >-
          <p>You weave summoning seals together and infuse them with medical release chakra manifesting the cloak,
          weapon and presence of the Reaper of death. He demands a large payment for you borrowing his power, so he
          takes it by stripping you of a large portion of your life force.</p><p>You cannot lose concentration on this
          jutsu as a result of damage and you cannot end concentration of this jutsu on other creatures turn, instead
          only being able to end it, at the end of one of your own turns. Additionally, this jutsu cannot be dispelled
          or interrupted by another creatures jutsu, by any means, except by a jutsu of S-Rank. At the beginning of each
          of your turns, instead of spending chakra to maintain concentration, you must spend a Hit die.</p><p>You don
          the cloak, and blade of the reaper. The Cloak of the reaper grants you an AC equal to your Ninjutsu save DC if
          your current AC is lower. The blade of the reaper is a construct weapon, in the form of either a tanto or
          scythe, which you choose when you cast this jutsu. If tanto, the weapon deals 2d6 + Ninjutsu ability modifier
          necrotic damage, and scores a critical hit on a roll of 18~20. If scythe, the weapon deals 2d8 +Ninjutsu
          ability modifier necrotic damage, has reach 2, Deadly, and Two-Handed. Regardless of the weapon chosen you can
          as an action make two melee ninjutsu attacks using the construct weapons.</p><p>Finally, if you would cast
          another jutsu with the Medical keyword, that has the Grim pre-fix, you can spend Chakra die in place of hit
          dice as a part of their cost, additionally, if you would force a creature to lose hit dice, you regain one hit
          die for each creature who lost hit dice. You lose all gained hit die at the end of this jutsu's duration.</p>
