              type: add
        description: >-
          <p><strong>Max Ranks</strong>: 5</p><hr><p>A <strong>Envenomed</strong> creature (sometimes called Poisoned)
          has been exposed to some kind of venom or toxin, causing their vitality and immune health to drop
          rapidly.</p><ul><li><p>An <strong>Envenomed</strong> creature or object takes 1d6 poison damage for each rank
          it has, at the start of each of their turns for the duration of this condition</p></li><li><p>An
