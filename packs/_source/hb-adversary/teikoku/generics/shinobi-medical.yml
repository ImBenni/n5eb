      description:
        value: "<p>You create a 5-foot diameter floating sphere of dense chakra in an unoccupied space you can see within range.</p><p>As a bonus action on your turn, you can command the sphere to move up to 30 feet and make a single melee ninjutsu attack against a creature within 5 feet of it. On a success, the target takes 2d8 damage.</p><p>If you have a nature release, this jutsu gains a single nature release keyword that you can cast and it's damage type becomes the corresponding nature releases damage type (Water = Cold). If you do not have a nature release this jutsu instead deals Force Damage.</p><p>• Earth: As an action on your turn or when the jutsu ends, you can cause one or more spheres to explode. Each creature within 15-feet of the spheres space(s) must make a Dexterity saving throw. On a failed save the creature takes gains 1 bruised and concused.</p><p>• Wind: Each creature hit by a sphere must succeed a Strength saving throw being knocked back 20 feet on a failed save.</p><p>• Fire: Each creature who begins their turns within 5 feet of the sphere must succeed a Constitution saving throw, being burned on a failed save.</p><p>• Water: Your sphere can move through allied spaces. When it does, roll its damage die, granting the creature(s) who's space it moved through temporary hit points equal to the result. A creature can only gain temporary hit points this way once per turn.</p><p>• Lightning: Each creature hit by a sphere must succeed a Constitution saving throw, being shocked.</p><p>• Force: The damage die becomes a d10.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 the damage by 1d8 and the number of spheres created by +1, controlling each sphere independently with the same action. A creature can only be affected by two spheres each turn. Additionally, you can change the Nature Release and corresponding Damage type to one you currently know.\_</p>"
