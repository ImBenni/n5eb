items:
  - name: Water Release Wall of Water
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/water.webp
    system:
      description:
        value: >-
          <p>You conjure up a wall of water on the ground at a point you can see within range. You can make the wall up
          to 30 feet long, 10 feet high, and 5 feet thick in any shape you want so long as each piece of wall is
          connected to another piece. The wall deforms and becomes a mass of water when the jutsu ends, filling each
          space it occupied with a Source of water that can be used for Water Release Ninjutsu, of C-Rank or lower, once
          each. The wall's space is difficult terrain if creatures attempt to pass through it. The water wall has an AC
          equal to your Ninjutsu save DC and a number of Hit points equal to 6d4 + Your Ninjutsu Save DC, with
          resistance to Fire damage.</p><p>If used near a sufficient source of water, reduce the chakra cost of this
          jutsu by 2 or you can choose to instead make creatures take 2d8 Cold damage the first time they move through
          the wall on their turn.</p>
