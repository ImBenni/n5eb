    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/water.webp
    system:
      description:
        value: >-
          <p>You manipulate your water release chakra molding it until you manifest a single gargantuan shark that you
          then launch at a creature within range, leaving a trail of devastation in its path.</p><p>The shark is
          propelled in a straight line towards a single target creature. Make a Ranged Ninjutsu Attack. On a success
          they take cold damage equal to 10d8, and gain 2 ranks of Chilled.</p><p>All creatures the shark would pass
          through while traveling to the target creature would suffer some effect as well. All creatures except the
          target creature in a 15-foot wide, up to 120-foot line makes a Dexterity saving throw. The line ends early if
          the space the original target creature was occupying is less than 120 feet away from when the jutsu was cast.
          On a failed save they take 6d8 cold damage and 1 rank of chilled. Or half as much on a successful save and no
          additional effects.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost
          of this jutsu by 3 and the damage by 2d8.</p>
