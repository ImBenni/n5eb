        value: >-
          <p>You collect all water within 120 feet of you as it collects into the air creating storm clouds that can
          fill a 90-foot cube, at a point you can see within 120 feet of you. This jutsu fails, if you can't see a point
          in the air where the storm cloud could appear (for example, if you are in a room that can't accommodate the
          cloud.).</p><p>When you cast the ninjutsu, choose a point you can see within range, a hail of sharpened water
