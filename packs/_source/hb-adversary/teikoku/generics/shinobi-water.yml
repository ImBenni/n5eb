  - name: Water Release Shark Bomb
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/water.webp
    system:
      description:
        value: >-
          <p>This jutsu cannot be used without a source of water nearby deep enough to fit a medium sized creature. As a
          bonus action on your turn, you create a Shark construct made of solidified water. The Shark has an AC equal to
          your Ninjutsu Save DC and has 30 (10d6) Hit Points and has a swim speed of 40. You control this Shark and can
          direct it do any of the following actions:</p><p>Attack: As an Action or bonus action on your turn, the shark
          attempts to bite into a creature currently submerged, standing near, or standing on top of the body of water
          it currently inhabits. Make a Melee Ninjutsu Attack, on a Hit, the target creature takes 8d8 Cold damage. On a
          successful hit, the target creature must succeed a Strength saving throw being grappled by the shark on a
          failed save. The shark can only grapple one creature at a time.</p><p>Impede: As a reaction action on your
          turn, the shark can attempt to impose disadvantage on a target creature by swiftly attacking and getting in
          the way of their next attack.</p><p>Explode: As an action on your turn, the shark can explode creating a
          powerful shockwave of water in a 15-foot cube. Creatures in range must succeed a Dexterity saving throw,
          taking 6d10 cold damage on a failed save or half as much on a successful one.</p><p>At Higher Ranks: For each
          rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and increase the damage your shark
          deals by 1d8.</p>
