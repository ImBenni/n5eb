items:
  - name: Wind Release Palm Vortex
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/wind.webp
    system:
      description:
        value: >-
          <p>You create a localized vortex of cutting wind. All creatures within range must succeed a Dexterity saving
          throw to avoid being horrendously slashed. On a failed save creatures take 3d6 wind damage and being pulled 5
          feet closer to you or half as much on a successful save and no additional affects.</p><p>If a creature is
          currently affected by any elemental condition, you trigger the residual elemental energies, igniting them
          again. A creature under the effects of an elemental condition makes their saving throw at Disadvantage. On a
          failed save such a creature instead takes 3d8 + Your Ninjutsu Ability Modifier damage, of their select
          conditions type.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
          this jutsu by 3, the damage by 1d6 or 1d8.</p>
