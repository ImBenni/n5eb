    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/wind.webp
    system:
      description:
        value: >-
          <p>You raise your hand and generate an intensely dense torrent of wind that circles around you, creating a
          bubble of wind that envelops your entire body.</p><p>The bubble of wind that envelops you has a number of hit
