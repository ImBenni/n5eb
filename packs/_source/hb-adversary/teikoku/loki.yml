items:
  - name: Fatal Blow
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
    system:
      description:
        value: >-
          <p>As part of casting this jutsu, your target must be prone, restrained, or incapacitated.</p><p>You take a
          great leap bringing your weapon into a spiraling ascent towards a target. The target must make a Dexterity
          saving throw. On a failed saving throw, they take your [Weapon's Damage] + X damage to their hit points, and
          half as much as chakra damage. The value of X is decided by your current chain. Also on a failed saving throw,
          roll a d20. On an 18-20, double this jutsu's damage die.</p><p>On a successful saving throw, the target
          completely avoids your saving throw as they roll out of the way.</p><p>If this jutsu is cast while under a
          lightning storm, your weapon is struck magnificently with a strike of lightning as you ascend and is imbued
          with the wrath of the sky. This jutsu's damage type becomes lightning and its damage die is increased by +2,
          and the range you must roll on the d20 to double this jutsu's damage die is increased by +1. These special
          effects can also be triggered if your weapon is under the effects of a Jutsu with the Lightning Release
          keyword.</p><p>You may cast this jutsu Chain 1, 2, or 3, depending on your current chain number, which
          determines this jutsu's damage and effects. Casting this jutsu breaks your current chain upon its
          conclusion.</p><p>• Chain 1: You may cast this jutsu as a Chain 1 if your Chain number is 0 or 1. This jutsu's
          damage becomes 5d10.</p><p>• Chain 2: You may cast this jutsu as a Chain 2 if your Chain number is 1 or 2.
          This jutsu's damage becomes 6d10, and the target makes their saving throw with disadvantage.</p><p>• Chain 3:
          You may cast this jutsu as a Chain 3 if your Chain number is 2 or 3. This jutsu's damage becomes 7d12, the
          target makes their saving throw with disadvantage, and the range you must roll on the d20 to double this
          jutsu's damage die is increased by +1.</p>
