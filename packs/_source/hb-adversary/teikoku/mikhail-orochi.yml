  details:
    biography:
      value: >-
        <p>Mikhail is an expert gunsmith and gun user that was paid by the empire to work for them.</p><p>He is sort of
        a mercenary but not because of that he lacks loyalty.</p><p>He has little hatred for shinobi tho as he is
        somewhat neutral to the entire conflict and cares mostly for himself and for his own bank account.</p><p>He
        learned and collected quite several trinkets to use in combat and he is very well treated by the empire, making
        him hardly to betray them and change squads.</p><p>He is an expert with all weapons, especially firearms and can
        easily take care of target from afar if needed be.</p><p>But if things become hairy he usually tries diplomacy
        before using one of his trinkets to get out of dodge…a thing he does a couple of times before giving up the
        cause and going on his way.</p><p>He is also somewhat of a casanova and likes to sway over girls to his
        cause.</p>
