  - name: Falling Dragon
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
    system:
      description:
        value: >-
          <p>As part of the activation of this jutsu, the target creature must be airborne or falling.</p><p>You leap
          upwards following an airborne or falling target. You curl your body into a ball as you spin faster and faster
          before you find yourself above the target. You uncurl yourself as your perform a spinning drop kick, sending
          the target creature crashing down.</p><p>Make a melee taijutsu attack against the airborne or falling
          creature. On a hit, you deal your [Unarmed Damage] + 3d6, sending them crashing down into the ground landing
          prone.</p><p>If this jutsu is used as a Finisher, you instead deal your [Unarmed Damage] + 3d6 bludgeoning
          damage. You then come falling after them at great speeds, making a second melee taijutsu attack, slamming both
          of your feet into the prone creature. On a hit, you deal 3d6 bludgeoning damage.</p><p>At Higher Ranks: For
          each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the damage by 1d6.</p>
