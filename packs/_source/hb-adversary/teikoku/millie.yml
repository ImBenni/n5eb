  details:
    biography:
      value: ''
      public: >-
        <p>Millie's mother was a servant for the old king of which Krone had a crush with, he know little that after she
        left because of a love affair, she was actually pregnant and it was an excuse.</p><p>Millie knows she is the
        daughter of Krone but as of now she simply works a one of his commanders, preferring a life in servitude rather
        than one in luxury as she cannot accept what her mother did to his father.</p><p>So as repentance she works
        under him, obeying almost any order and making sure he is both safe and sound mentally.</p><p>Millie learned a
        lot in this continent and even seemed to have taken up the shinobi's fighting style and becoming a formidable
        fighter.</p><p>Apparently Loki knows about her.</p><p>Millie on her side is very silent and direct, almost cold,
        giving up on her emotions and feelings to follow his father's order without showing any betrayal for how she
        actually feels like, making sure she does not reveal her actual origins.</p>
