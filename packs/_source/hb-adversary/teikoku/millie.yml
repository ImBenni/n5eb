          <p>This jutsu can only be cast as a Taijutsu Finisher. As a part of casting this jutsu, you must currently be
          under the effects of the Dragon Stance.</p><p>You interlock your hands and perform a powerful strike to the
          targets core while both hands are imitating the bottom and top half of a dragons maw.</p><p>Make two melee
          taijutsu attacks, dealing your [Unarmed Damage] + 3d8. For each successful hit the target must make a Strength
          saving throw. On each failed save, the target creature suffers a 1d4 penalty to their melee attacks, and skill
          checks that use Strength or Dexterity until the end of your next turn.</p><p>If this jutsu is used as a
          Finisher, you instead my three melee taijutsu attacks.</p><p>At Higher Ranks: For each rank you cast this
          jutsu above B-Rank increase the cost of this jutsu by 3 and the damage by 1d8.</p>
