  details:
    biography:
      value: >-
        <p>An old commander of the old king, a powerful and strict commander that trained many elite soldiers for the
        empire.</p><p>He is a tought but happy go lucky man that likes to laugh and drink, often passing his time in the
        inn or in places where booze flow freely.</p><p>He is still unbeaten in terms of alcohol
        resilience.</p><p>Sumano is also quite ok with battles and a very defensive bastard, hard to deal with, but he
        is not full of bloodlust, he dislikes killing where possible…preferring more of a prisoner result.</p><p>He is
        always smoking and seem to take any enemy lightly.</p><p>He is actually incredibly powerful but never unleashes
        all of his power unless his life is in danger.</p><p>Otherwise he toys with enemy and if he gets defeated he
        recognized their valor and strength and deal with the aftermath later….but if needed he will go back to fighting
        if the enemy are particularly cruel.</p>
