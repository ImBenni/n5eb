  details:
    biography:
      value: >-
        <p>Flame foot soldiers are black foot soldiers who were chosen as special units that were experimented on and
        got special mutations allowing them to breathe special elemental releases similar to how the Ryu clan
        does.</p><p>The flame soldiers are incredibly harsh fighter, difficult to take down and hard to control as their
        temperament is shorter in terms of patience and higher in terms of rage.</p><p>They are usually sent sparringly
        in missions due to them being somewhat unpredictible by in case of intruders or trroublesome enemies they are
        sent as a unit to sow chaos on the battlefield and, hopefully, take care of them.</p><p>At times they are sent
        with black foot soldiers as reinforcements, bodyguards or as plan B so they can take care of business while they
        keep the enemy busy.</p>
