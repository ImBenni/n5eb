  details:
    biography:
      value: >-
        <p>After various failures of their troops, Shredder decided to rely on more competent troops.</p><p>The mecha
        foot soldiers are often either entirely mechanical or biomechanical with some of the more loyal foot soldiers
        giving themselves to the modifications.</p><p>Mecha foot soldiers are incredibly resilient, skilled and
        dangerous but also complex to make, making their number somewhat low.</p><p>These troops are some of the worst
        to find in the battlefield as they can take on several adversaries at once.</p><p>Their bodies are also enhanced
        and empowered making them harder to take down.</p><p>They usually operate on their own or with small units of
        mecha foot soldiers on some of the most important missions.</p>
