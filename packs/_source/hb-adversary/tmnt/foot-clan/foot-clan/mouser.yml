  - name: Imma Bite You!
    type: weapon
    _id: IPg1Dcyv2Nyxtc8O
    img: icons/creatures/abilities/mouth-teeth-crooked-blue.webp
    system:
      description:
        value: >-
          <p>The mouse can jump up to half his speed to bite a target, usually aiming for the hands.</p><p>If the attack
          hits the mouser automatically attaches to the target, making that had incapable of attacking, doing hand signs
          or anything else while the mouse is attached to it.</p><p>Subsequent turns the mouse can use its action to
          automatically deal damage to a target if he is attached to it.</p><p>A creature can get rid of the mouser by
          sacrificing his action to do a contested acrobatics/athletics check.</p><p>If the mouser gets attacked, the
          damage it receives is shared with the target it is attached to.</p>
