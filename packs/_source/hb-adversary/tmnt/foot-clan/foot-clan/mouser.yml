  details:
    biography:
      value: >-
        <p>Mousers are little rodent looking construct that usually attack in packs, often of 4 or 5 units if not more,
        and they usually try to jump at the enemy to grapple their arms, not only causing pain because of their metal
        teeth, but also because they cannot use the hand anymore for attacks or jutsus.</p><p>The mousers is pretty
        simple minded and just goes blindly to the attack, somewhat focusing only on the enemy but still being aware of
        the terrain around them.</p>
