          <p>You take a wide stance with your weapon before dashing to deliver a single thrust at the enemy at a great
          speed, with the intent to ram them through. Make a weapon attack against a target creature in range. You gain
          a +1 to your attack roll for every 30 feet you moved, to a max of +5. On a hit you deal your [weapons damage]
          and + 1d10 for every 30 feet you moved to strike them, to a max of 3d10. If you deal 20 damage or more with
          this jutsu, the target creature also gains a rank of Bleeding and Slowed until the end of your next
          turn.</p><p>At Higher Ranks: For every rank you cast this jutsu above D-Rank, increase the cost by 3 and your
          movement speed by 30 feet.</p>
