        details:
          biography:
            value: >-
              <p>Roadkill Rodney is a small robot that is equipped with a laser and electic lasso.</p><p>They are
              incredibly annoying and come usually in pairs of 2 or 3 units at a time.</p><p>They keep moving back and
              forth, usually away from the enemy, and they keep trying to hit them with lasers or catching them with
              lasso, blocking them and electrocuting them into submission.</p><p>They are smarter than the mouser but
              mostly because they can manuever easier with their one weel and high mobility plus they can analyze the
              terrain better.</p>
