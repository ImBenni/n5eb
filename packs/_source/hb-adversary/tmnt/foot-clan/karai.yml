        value: >-
          <p>As a part of the activation of this jutsu, you must have a weapon in both hands that meet this Bukijutsu' s
          component requirements.</p><p>You raise both of your weapons blocking an incoming flurry of attacks in a
          powerful guarded stance.</p><p>You gain a +4 bonus DR vs all melee and ranged attacks (Excluding from
          Genjutsu). Each time the same creature makes an attack targeting you, after the triggering attack, you gain an
          additional +2 DR vs all of their melee and ranged attacks.</p><p>At the conclusion of the triggering creatures
          action used to make the triggering attacks, you immediately send all of that built up defense back at them.
