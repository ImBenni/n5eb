  details:
    biography:
      value: >-
        <p>Karai is a young but very skilled kunoichi trained by shredder personally.</p><p>She is incredibly smart and
        cunning but hr young age can be seen in how she likes to have everything under control and her mocking
        statements in under any type of circumstances, additionally she is known to be somewhat of a rebel, remnants of
        her teenage years that just recently somewhat ended.</p><p>Karai, taught like if she was shredder's daughter, is
        in fact master splinter's daughter before he became a mutant, a thing she barely remembers as she was just a
        baby.</p><p>With time Karai also got some experimentation done to her, that mostly gave her some poison saliva
        and immunity to poisons in general plus some additional bonuses physically.</p><p>Karai is also very strategic
        and before moving s he usually likes to know the situation quite well to avoid having regrets and dooming her
        own self afterwads, trying to make moves only when she is sure about the situation so she can plan
        ahead.</p><p>Karai is know to be one of the elites of the foot clan and often the right hand of shredder but she
        still seems to care and have hesitation for people that lost their parents or people who have more integrity
        than his adoptive father shredder.</p>
