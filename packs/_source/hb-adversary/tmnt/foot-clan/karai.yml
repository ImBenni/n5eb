    img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
    system:
      description:
        value: >-
          <p>You jump and perform a series of kicks that keep you suspended in the air. While performing these kicks,
          you create an image of a butterfly's wings.</p><p>Make a melee taijutsu attack against all creatures of your
          choice who are adjacent to you, comparing your resolve vs their AC. On a hit, you deal your [Unarmed Damage] +
          2d4 and forcing all creatures you hit to make a Strength saving throw gaining 1 rank of concussed on a failed
          save.</p><p>If this jutsu is used as a Finisher, all creatures in a 15- foot cube originating from you make a
          Strength saving throw. On a failure save they take your [Unarmed Damage] + 2d8, gain 1 rank of concussed, and
          are knocked prone. On a successful save they take half damage and no further effects. After targets make their
          saving throws, select an unoccupied space up to 15 feet away that can hold you as you move into this space
          without triggering attacks of opportunity.</p><p>At Higher Ranks: For each rank you cast this jutsu above
          D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at C-Rank or higher, increase the damage
          dealt by 2d4 or 1d8. If this jutsu is cast at B-Rank or higher, increase the number of attacks or ranks of
          concussed by +1. If this jutsu is cast at A-Rank or higher increase the damage dealt by 2d4 or 1d8. If this
          jutsu is cast at S-Rank, creatures cannot benefit from Jutsu based bonuses to their AC or Strength saving
          throw.</p>
