  - name: Multiuse Shotgun
    type: feat
    _id: yzr5SZwMGvx6OxdQ
    img: icons/weapons/guns/gun-double-barrel.webp
    system:
      description:
        value: >-
          <p>Leatherhead's shotgun is not really just to spit out pellets to attack targets, but it can be loaded with
          different type of ammunitions, the shotgun itself is modified to shoot at single target rather than multiple,
          sacrificing spread for range.</p><p>Stats are made for the pellet version but the DC is made for the extra
          type of ammo.</p><p>Leatherhead can forgo one of his attacks with pelles but instead do the
          following:</p><p></p><p>Net</p><p>Leatherhead throws a net in a 15x15 ft square, each creature in the area
          must make a dex. saving throw becoming restrained on a failure. They can repeat this check at the end of the
          next turn.</p><p></p><p>Smoke</p><p>Leatherhead can shoot smoke bombs to cover a 20x20 square area within 50
          ft of his position when shooting. Anyone inside has their vision reduced to 5ft or otherwise be considered
          blinded outside of that range.</p><p></p><p>Flare</p><p>Leather head can shoot a flare up in the air which can
          reach up to 500 ft total which can be used by allies or reinforcements to pinpoint their
          location.</p><p></p><p>Propulsion</p><p>By overcharging the shotgun he can send himself flying in any
          direction he wishes for about 25 ft (15 if he tries to go up). This takes an extra attack to "recalibrate" the
          shotgun which is needed after the excessive gunpowder used.</p><p></p><p>Elemental Pellets</p><p>Leather head
          has a couple of elemental pellets which he can use from the usual ones, he has usually 3 for each element for
          a total of 15 but he can switch the quantities in case of need and he knows he might not use certain elements.
          The attack is the same as for the pellets just the damage changes type.</p>
