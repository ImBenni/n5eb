  details:
    biography:
      value: >-
        <p>Results of mutations from an unknown force, Leatherhead was a simple crocodile raised by a gentle girl but
        was later sent away because her parents were scared of him.</p><p>Growing up, after being experimented on, he
        escaped one day from that dimension, destroying the portal behind him, and now found himself alone in a world
        that, despite familiar, was unknown to him.</p><p>Leatherhead is actually very kind and due to his
        experimentation very self-loathing especially when people consider him a monster.</p><p>This changed when he was
        found by Karai, which despite her initial ironic comments on him, understood fast the feelings and past of the
        giant reptile.</p><p>With kindness and understanding Karai befriended him quite fast and he swore to protect her
        as long as he lived…as long as she does not abandon him which is a thing he still fears.</p><p>When in trouble
        Leatherhead will always run to her side to protect or retrieve her.</p><p>Despite his tenderness, he is an
        extremely powerful fighter with various tricks in his repertoire, often competing with the most skilled of
        fighter.</p><p>Leatherhead is known to go into rages when Karai is heavily hurt or he is angered and these rages
        can become quite destructive even if he regrets his action afterwards.</p><p>The only one able to calm him, to
        this day, is only Karai which, even within his rage, he won't hurt but protect even more fiercely.</p>
