          Dexterity &amp; Constitution based attack rolls and checks for each rank they have.</p></li><li><p>A Bruised
          creature takes +4 bonus damage from all sources of bludgeoning or earth damage for each rank they have, once
          per turn.</p></li><li><p>Creatures that are immune to bludgeoning or Earth damage are immune to this
