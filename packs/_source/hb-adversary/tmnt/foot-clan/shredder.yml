  details:
    biography:
      value: >-
        <p>The leader of the foot clan and an incredible fighter himself, Shredder uses cunning, tricks, ninjutsu and
        incredible strength to take care of any obstacle that shows itself in front of him.</p><p>Shredder is incredibly
        shrewd and capable of conquering many to his side, charismatic and skilled he always has the upper
        hand.</p><p>Additionally he also experimented on himself giving him a mutant body capable of taking a lot of
        punishment and opening more options in his fighting style.</p><p>He builded a following called the foot clan
        and trianed many of the mpersonally before resorting to a more technological option due to their
        incompetence.</p><p>He is often serious, stoic and intimidating just with his presence, often commanding respect
        by his voice resounding in the air.</p><p>He treats Karai like a daughter despite her rebellious nature and
        knowing she is not actually her actual daughter but seem to have somewhat of little standing for Leatherhead,
        but he avoids him or insulting him to avoid his fits of rage.</p><p>When in need Shredder can become Super
        Shredder by channeling all of his mutant power, becoming a monster that many would never wish to confront.</p>
