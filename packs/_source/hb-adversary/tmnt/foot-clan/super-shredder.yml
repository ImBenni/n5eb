    img: icons/magic/control/silhouette-aura-energy.webp
    system:
      description:
        value: >-
          <p>As a reaction, Super Shredder enters a counter stance until the start of his next turn.</p><p>In this
          stance he will counterattack every type of jutsu or attack he receives with one of his own.</p><p>If he gets a
          melee attack, he will counterattack with an iron claw attack.</p><p>If he gets a ranged attack he will throw a
          shuring.</p><p>If he gets hit by a jutsu he can use any of his elemental skills.</p><p>He can only use 1
          elemental jutsu per instance of this counter stance, additional jutsu give him either advantage to saving
          throws or an additional 5 DR to the damage he would receive.</p>
