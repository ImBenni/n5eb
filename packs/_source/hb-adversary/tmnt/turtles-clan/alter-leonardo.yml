  - name: Leaf Hot Wind
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
    system:
      description:
        value: >-
          <p>This jutsu can only be used as a Taijutsu Finisher. You begin to perform a series of roundhouse kicks with
          enough force to ignite the air around your legs turning them into flaming kicks as your tear through
          everything in your path. </p><p>Select a space within range that you can see and move to that location
          regardless of other creatures in your path. All creatures of your choice who you would pass through on your
          way to the location must make a Dexterity Saving Throw taking 3d6 Fire damage and gaining 2 ranks of the
          Burned condition on a failed save or only half damage and no further effects on a successful save.</p><p>If
          you end your movement within 5 feet of a hostile creature, make a Taijutsu Attack against a target, dealing
          your [Unarmed Damage] + 7d10 Fire damage. The target must make a Strength Saving Throw gaining 3 ranks of
          Bruised on a failed save.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the
          cost of this jutsu by 3 and the damage of your targeted attack damage by 1d10.</p>
