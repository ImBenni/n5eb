        value: >-
          <p>You manifest a ring of water that creates a reflective film similar to that of a mirror. When you are
          targeted with a jutsu, you quickly raise this mirror showing your targets reflection. First, you make a
          Ninjutsu ability Check. The DC equals 13 + the Jutsu's Rank. (C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank:
          5)</p><p>On a success, you then spend a number of chakra casting this jutsu equal to your targets cost of
          casting a jutsu + the Jutsu's Rank (D-Rank: +2, C-Rank: +5, B-Rank: +8, A-Rank: +11, S-Rank: +14.) and your
          mirror reflects the jutsu cast at you back onto them. Any attack rolls, they make now count as targeting
          themselves, and on a hit, they take their own damage. Saving throws, you would have to make; they instead make
          as if they were the target suffering their jutsu's effects as normal.</p><p>On a failure, your mirror
          shatters, ending this jutsu.</p>
