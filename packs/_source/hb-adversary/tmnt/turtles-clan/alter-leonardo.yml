  - name: Breath of Water Wheel
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
    system:
      description:
        value: "<p>Keywords: Bukijutsu, Water Release</p><p>You begin to collect and manifest water release chakra until it laces the striking portion of your weapon. The water release chakra\_ begins to transform into streams of water, capable of being seen and felt as you perform a vertical or lateral spin forward, attacking in a circular motion. When casting this jutsu, you can choose to make a lateral or vertical spin.</p><p>• Lateral Spin: Make one melee Taijutsu attack against a creature in your weapons range. Each creature within your weapons range, of your choice, must make a saving throw. On a hit or failed save, you deal your [weapons damage] + 5d6 cold damage and affected creatures gain 1 rank of chilled or half as much damage on a successful save. A creature whom you target that is either Dazed or chilled grants you a 1d4 bonus to hit. A creature whom you force to make a saving throw that is either Dazed or chilled suffers a 1d4 penalty to their saving throw.</p><p>• Vertical Spin: Move to a space within 20 feet of you in a straight line. Each creature you pass through must make a Dexterity saving throw, taking your weapons damage + 7d4 cold damage, and being dazed on a failed save or half as much on a successful one. If a creature is within 5 feet of where you end your movement, and did not make a saving throw as a result of this jutsu, you can make a single melee taijutsu attack targeting them. On a hit, you deal your weapons damage + 7d4 cold damage, knocking them prone.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank\_ ncrease the cost of this jutsu by 3 and the \_damage by 1d6 or 1d4.</p>"
