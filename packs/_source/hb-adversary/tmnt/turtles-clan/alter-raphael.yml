items:
  - name: Fire Release Fire Devastation
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/fire.webp
    system:
      description:
        value: >-
          <p>You breathe a stream of fire onto the target area which then expands into a massive ball of fire,
          incinerating everything in its radius. You fire a 120-cone-of super-heated flame. You can choose when the cone
          stops before reaching its maximum distance.</p><p>All creatures in the steam flames must make a Dexterity
          saving throw, taking 14d6+14 Fire Damage and gaining the 2 ranks of the burned condition on a failed save or
          half damage on a successful one.</p><p>Flammable objects and creatures caught in the radius are turned to ash
          if reduced to 0 Hit points. The affected area remains on fire at the conclusion of the jutsu.</p><p>At Higher
          Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and increase the
          damage by 1d6+1.</p>
