  - name: Breath of Flame Undulation
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
    system:
      description:
        value: "<p>You begin to collect and manifest fire release chakra until it laces the striking portion of your weapon. The fire release chakra begins to transform into gouts of flame that erupt off of your weapon with a glorious flickering.</p><p>You then choose to either spin your weapon in\_ a circular fashion, either striking multiple enemies at once or blocking and deflecting incoming hostile and harmful attacks and effects depending on the\_ action used to cast this jutsu.</p><p>Action: You spin striking all creatures within range attempting to decapitate them. All creatures of your choice must succeed a dexterity saving throw. Depending on the severity of their failure they suffer additional effects. On a successful save, they take half<br />of the following damage; Weapons damage + 4d6 fire damage.<br />● Failed by 1~4: Weapon Damage + 4d6 fire damage.</p><p>● Failed by 5~9: Weapon Damage + 6d6 fire damage and 1 rank of burned.</p><p>● Failed by 10~14: Weapon Damage + 8d6 fire damage and 2 ranks of burned.</p><p>● Failed by 15+: Weapon Damage + 8d6 fire damage and 3 ranks of burned. 17</p><p>Reaction: You and all creatures of your choice within range reduce incoming damage by your weapon damage + 4d6. This damage\_ Reduction is doubled against fire or wind damage.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage reduced by 1d6. If this jutsu is cast at B-Rank, increase the radius of this jutsu to 15 feet. If this jutsu is cast at S-Rank, increase the radius of this jutsu to 20 feet.\_</p>"
