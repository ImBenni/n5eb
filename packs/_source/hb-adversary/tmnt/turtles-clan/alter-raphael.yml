      description:
        value: >-
          <p>You build up chakra into the sole of your feet, until each step you take crushes the ground you walk on.
          You cannot lose concentration on this jutsu as a result of damage.</p><p>For the duration, you gain a special
          reaction called Rakshasa's Sole, which you can take when you would make a Strength or Dexterity saving throw
          from a Ninjutsu or Taijutsu cast that has the shape of a Sphere, Cylinder, Cone or Line.</p><p>Rakshasa's
          Sole. When you take this reaction, you perform a round house kick, striking the Jutsu initiating a Clash. You
          make this Clash check at advantage and can reroll 1's and 2's taking the second result. If you win the clash
          check, you deal damage equal to 3 times your Unarmed Damage.</p><p>At Higher Ranks: For each rank you cast
          this jutsu above C-Rank increase the cost of this jutsu by 3. If you cast this jutsu at B-Rank if you win the
