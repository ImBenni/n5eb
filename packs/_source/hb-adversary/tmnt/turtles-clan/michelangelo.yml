    biography:
      value: >-
        <p>The jokester and free spirit of the turtles group.</p><p>Michelangelo is the spirit of the party and the one
        that has always ready an ironic comment or coy observation, expert in pissing off others or…often…his
        brothers.</p><p>That said michelangelo is also quite charismatic and has a natural magnetic personality that
        attract others and sustains them.</p><p>He is often also the comedic relief or the one that relaxes tense
        situations…even if heh as his limits when his brothers reach critical conflicts…but he is often the one to start
        or encourage the re-unification of their group.</p>
