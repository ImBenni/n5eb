  - name: Fifth Heavenly Breath Respire
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
    system:
      description:
        value: >-
          <p>As a requirement to activate this jutsu, you must have Fourth Heavenly Breath: Wheeze currently active. You
          end your concentration on that jutsu and this one takes its place. You retain all of the effects and duration
          of that jutsu, stacking them with this jutsu's effects.</p><p>You increase your veins and arteries size and
          blood flow twenty-fold. The aura that surrounds you begins to glow far more intensely as it begins to spin.
          Your first two taijutsu attacks per turn are made at advantage, deal 1d8 bonus damage, and you gain 20
          temporary hit points which stack with other THP granted by Heavenly Breath taijutsu.</p><p>Upon ending this
          jutsu, you gain 1 rank of the weakened condition and one rank of the slowed condition until you finish a long
          rest. This cannot be removed or ended early except by a jutsu with the Medical keyword of A-Rank or
          higher.</p>
