  details:
    biography:
      value: >-
        <p>The wise, skilled and very fatherly master of the turtles.</p><p>Always with a wisdom to share with his
        "sons" he always tries to guide them towards the right path, making sure they solve their issues and troubles
        through their problems.</p><p>He is also an incredibly skilled fighter, using no weapon but relying on his bare
        hands to teach his children the way.</p><p>He is very attached to the turtles but has his humor and dad ways to
        do things at times, which does not stay right with the turles as at times he can be somewhat strict…but is
        always to guide them or teach them important lessons.</p>
