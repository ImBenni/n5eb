  details:
    biography:
      value: >-
        <p>This angry looking primate is the result of a combination between the chi hou and jugo genes which results in
        what is basically a deranged beast that attacks anything in his path.</p><p>Goro has little to no conscience
        left from his human part, mostly resuming to be a ravish beast.</p><p>With some time and traning Kazuki was able
        to subdue and even somehow speak to him using Nalik.</p><p>Luckily he was able to use the little one to convince
        the bigger primate to stay put and help them in their plans.</p><p>Goro is sometimes used in missions but only
        when Nalik is involved.</p><p>Otherwise Goro is just a powerful beast capable of taking down several troops on
        his own thanks to his experimentations.</p>
