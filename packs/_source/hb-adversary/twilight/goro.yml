  - name: Thousand-Armed Murder
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
    system:
      description:
        value: >-
          <p>An Advanced version of the "Arms of Buddha" Ninjutsu. This advanced version keeps the Golden Buddha
          materialized out of golden chakra. This Buddha stands behind its user with a calm and peaceful face, however
          whenever the user gets angry or intends to attack, the spirit turns red and grows fangs and its appearance
          becomes akin to a demon and attacks its users' enemies with its 1000 hands or protects its user when
          attacked.</p><p>As a Bonus action, make a Melee Ninjutsu Attack against a creature you have already made an
