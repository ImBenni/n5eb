  details:
    biography:
      value: >-
        <p>Kazuki was member of the order since a long time ago and saw his founder try, and often fail, various
        experiment.</p><p>With his brilliant mind and capable intellect he tried to help him but he was often
        disregarded because his aims were above what his original creator was, which was to create the perfect being
        combining the powers of multiple clans into one being.</p><p>Rekka was one of his first "big failures" while the
        others came a little later down the line.</p><p>Eventually, they understood that combining genes or skills like
        that was unsuccessful but they could take some specific characterstics from specific clans that have special
        powers, like the special eyes from various clans, the Chi hou animalistic spirit or the kaguya's
        gifts.</p><p>With time the founder reached the summit of his research and started to work on a "prototype" which
        was Yato Yamada, a young boy he had rescued from the streets and will become the next evolution of his
        researches.</p><p>During various experimentation tho, Kazuki became tired of hiis behavior and treatmeant of the
        people he experimented on and assassinated him…but at that point Yato was already on the run and doing whatever
        he felt like in the outside world.</p><p>Realizing that the best results of his predecessor were important,
        started to hunt both Yato and any peculiar specimens that might allow his new research to bring new
        results.</p><p>Differently from his predecessor, Kazuki is a lot more logical with his experiments and even more
        successful as he showed when he experimented and improved Maruta.</p><p>With hopes for a better treatment…and
        maybe a cure, many of the failed experiments decded to follow his leadership and decided to become loyal to
        him.</p><p>Kazuki wshes to make the perfect creature, capable of usng multple powerful sklls to become a power
        that nobody can ignore and cement his place in the world, perhaps even above everyone else…but more than anythng
        he is making experiments to become the perfect being…by taking every successful results and making himself more
        and more powerful until he will be above everyone else.</p><p>Altho he is very egoistical, he is also very
        logical and calm, always analyzing situations and creating strategies with incredible complexity and
        results.</p><p>Despite all that he is trying to help the experiments but…not as his main goal…but mostly as a
        side research when his main one is on hold or if he gets any breakthrough during his main experiments.</p><p>He
        is as of now the de factor leader of the twilight order and is focusing on capturing interesting subjects to
        further his studies.</p>
