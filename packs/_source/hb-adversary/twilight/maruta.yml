  details:
    biography:
      value: >-
        <p>Maruto is actually a volunteer to the experiments which were incredibly successful.</p><p>Not only he has his
        clan's skill but he also gain the Yuki's gift and skills making him an incredbly deadly adversary.</p><p>Maruta
        is always euphoric and uppity, almost like if he was under bloodlust and hyperactivity.</p><p>He is very
        aggressive and has a short temper and has no issue attacking anyone who he does not like.</p><p>Despite that,
        due to his personal gratitude, he is incredibly obedient to Kazuki who made him the way he is, making him more
        powerful and giving him new purpose.</p><p>As of now he serves faithfully as a sort of second in command or
        field commander for the more heavy missions.</p><p>The experimentation made him an incredibly harsh
        adversary.</p>
