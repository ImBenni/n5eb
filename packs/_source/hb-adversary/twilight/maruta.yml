  - name: Tearing Dragon Fierce Tiger
    type: spell
    img: systems/n5eb/assets/content/clans/yuki.webp
    system:
      description:
        value: "<p>You conjure a large Tiger or dragon made of snow or ice you make. Upon casting this jutsu choose which creature you summon which determines how the Jutsu works and its range and effect radius.</p><p>• Tiger: The Tiger forms and begins to rush at a target creature. If there is any water or Water Release Jutsu in between you and the target creature, it immediately freezes, ending the jutsu. Creatures submerged within water or gaining the benefits of a water release jutsu with a range of Self or Touch must succeed a Dexterity save, gaining 2 ranks of chilled on a failed save. Upon reaching the target, the Ice Tiger then explodes firing ice shards in a 30-foot radius centering on the target. All creatures in the radius must succeed a Dexterity saving throw taking 12d4 Cold damage and gaining 1 rank of Chilled on a failed save or half as much damage and no further effects on a successful save.</p><p>• Dragon: The Dragon forms and begins to rush at a target creature. If there is any water or Water Release Jutsu in between you and the target creature, it immediately freezes, ending the jutsu. Creatures submerged within water or gaining the benefits of a water release jutsu with a range of Self or Touch must succeed a Dexterity save gaining 2 ranks of chilled on a failed save. Upon reaching the target, the dragon slams into the target creature. Creatures in a 90-foot long, 10-foot-wide line, originating from you, must succeed a Strength saving throw taking 8d6 cold damage, gaining 1 rank of chilled and are push back 10 feet on a failed save or half as much damage and no further effects on a\_ successful save.</p>"
