  details:
    biography:
      value: >-
        <p>Born as a combination between the Inuzuka/Izuno(cat clan), Chi Hou and Hoshigaki, Nalik is a peculiar beastly
        combination of almost animal instinct.</p><p>Sadly due to his young age is also quite weak versus the others
        members of the order.</p><p>Naliks is capable of traveling and scout efficiently thanks to his tail and animal
        characteristics, capable of efficiently flying by rotating his tails, climb, swim and even burrow.</p><p>As such
        often nalik is used to scoute and spy being very sneaky and athletic.</p><p>He is capable of fighting by by
        nature he prefers to run if possible.</p><p>Due to his modifcations his sense are quite evolved, gving him a
        couple of edges.</p>
