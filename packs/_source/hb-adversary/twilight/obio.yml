    system:
      description:
        value: "<p>You infuse chakra into a chakra seal as you attempt to mark an object you can see with the seal of false life.</p><p>This jutsu creates false life. A creature from nothingness. A servant formed from the world around you. Choose a pile of rocks, dried bones, leaves, wood or any other inanimate objects that you can reach while casting this jutsu. Temporarily reduce your Maximum Chakra by 10 for each puppet you create. You cannot reduce the cost of this jutsu by more than half. For each puppet that dies, or you lose control of, you increase your maximum chakra by 10, up to your original maximum.</p><p>You place a seal on the objects as they conjoin to form a mimicry of life, raising a construct creature. The creature becomes a construct with the following statistics (When a feature or ability asks for Rank of jutsu use the following; C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5)</p><p>On each of your turns, you can use a bonus action to mentally command any creature you've created with this jutsu if the creature is within 60 feet of you. You can control up to 4 Creatures at a time this way. (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile\_ creatures. Once given an order, the creature continues to follow it until its task is complete.</p><p>The creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain the control of the creature for another 24 hours, you must cast this jutsu on the creature again before the current 24-hour period ends. The use of the jutsu reasserts your control over up to four creatures you have animated with this spell, rather than animating a new one. Recasting the jutsu in this way on an already summoned construct does not reduce your maximum chakra a second time.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number hit points your construct has by 10.</p>"
