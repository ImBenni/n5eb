  details:
    biography:
      value: >-
        <p>Obio s a weird combinaton between Konan's skll to control paper, Sharingan and a failed byakugan implantation
        which left him technically blind on his other eye…but with a permanent chakra  sight, capable of seeing their
        nature releases and their chakra if they are within a certain distance.</p><p>Obio, due to his weird
        experiments, is very temperamental and somewhat angry, very hard to keep his calm and resorts to violence very
        often.</p><p>Still he can be understood with enough care but as he is a hard boy to take care of.</p><p>Obio
        possess peculiar and half skills from all of his experiments, capable of emulating some powers from his eyes and
        combinations but he seems to mostly have control of his paper craft skills.</p>
