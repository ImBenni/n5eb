          <p>Keywords: Ninjutsu, Bukijutsu</p>

          <p>You throw a single weapon, when you do, you quickly multiply it five-fold, creating multiple copies of it
          while in transit. Creatures within this jutsu's range must succeed a Dexterity saving throw taking 5dX + your
