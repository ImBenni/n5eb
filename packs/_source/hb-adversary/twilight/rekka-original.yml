  details:
    biography:
      value: >-
        <p>Rekka is a girl that has been experimented one heavly with various skills but due to various issues with
        compatibilty, most of her abiltes come and go.</p><p>Despite that, her worst experimentation was made with the
        kaguya genes, her bones are out of control and as such her bandages are made to seal them and avod her going
        berserke wth her bones becoming similar to spikes and grow uncontrollably in all directons.</p><p>Rekka per se
        is calm and very much in control of herself, agitating herself rarely but she is also the more caring of the
        group, helping and guiding both Nalik and Obio.</p><p>Rekka is one of the first to be experimented on and had
        the worst compatibilty, from those experiment great progresses were made but sadly her life as is now is a mess
        that is hard to fix due to her varying powers.</p><p>It is unknown the amount of powers she has mixed within
        her…even her original clan is at this point unknown and her memories of that was lost a long time
        ago.</p><p>Still she seems to be able to control every element but even that comes and goes.</p><p>She the
        oldest member previous to the takeover of the new leader.</p>
