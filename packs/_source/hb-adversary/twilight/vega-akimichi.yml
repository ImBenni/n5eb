    type: spell
    img: systems/n5eb/assets/content/clans/akimichi.webp
    system:
      description:
        value: "<p>As part of the requirements of this jutsu, you must already have either Partial Expansion or Full- Body-Expansion jutsu active.\_</p><p><br />Chakra erupts from the palm of your hand to the point of it becoming visible.\_</p><p><br />This Chakra increases the weight, muscle density and impact of your palms.\_</p><p><br />As a part of the activation of this jutsu, make a Melee Taijutsu Attack.\_</p><p><br />On a Hit, you deal your unarmed damage + 5d8.\_</p><p><br />Regardless if you hit or not, all creatures, excluding the original target creature, within 10-fee of the original target, must make a Dexterity saving throw, taking 4d8 bludgeoning damage on a failed save or half as much on a successful one.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, chakra cost of this jutsu by 3 or the Calorie cost by 2 and the Damage by 2d8 .</p>"
