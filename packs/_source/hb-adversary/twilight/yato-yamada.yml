  details:
    biography:
      value: >-
        <p>found on the street by the leader of the twilight order, Yato has been raised by him but also was his main
        subject to experiments.</p><p>After the countless failures and issues with past experiments, the ex leader
        managed to make something remarkable but not perfect.</p><p>Yato has been enhanced with one eye of the Chinoike,
        the bone structure reinforced by the gakuya and his mind discipline using the chi hou focus.</p><p>After these
        modifcations, and a life trainng as a weapon, Kazuki killed Yato's teacher and gude, leaving him without a
        purpose or objective, even without a protecton.</p><p>Luckly Kazuki realized somewhat late about his ex leader's
        successes and Yato was already gone when he came to get him back.</p><p>Now yato is free to do as he please,
        with a powerful body, mind and excellent skills to aid him, he can confront anyone without many
        issues.</p><p>That being said Yato is still immature and cocky, often trying to get what he wants with strength
        and violence rather than eloquence or other less destructive ways.</p><p>Even in terms of instruction he is
        somewhat early, knows how to read at a basic level and his math skills are not the most developed…since they
        were unneded for his development as a weapon.</p><p>Yato is a free spirit that takes what he wants and has an
        innate curiosity about new techniques and things he can learn, even if it means risking it a little for
        that.</p><p>He is an incredibly fast learned when it comes to combat and can adapt and learn even complex
        techniques in a short time.</p><p>Due to his mind and body being heavily modified he is even capable of
        resisting the detrimental effects of the 8 gates, getting much lowers consequences and even able to avoid death
        of the last gate as long as he does not try that too often one after another.</p>
