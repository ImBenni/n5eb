items:
  - name: Chakra Shield
    type: spell
    img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
    system:
      description:
        value: >-
          <p>You manifest a swirling barrier of chakra around you protecting you from the triggering attack. You gain 12
          Temporary Hit points. If you have a nature release, this jutsu gains a single nature release keyword that you
          can cast, and additional effects base on the Nature release. Your shield gains one of the following benefits
          based on the chosen nature release. If you do not have a nature release this shield instead has 16 Temporary
          Hit Points.</p><p>• Earth: This jutsu gains the Construct keyword. Your shield has resistance to Cold damage,
          vulnerability to lightning Damage and once cast leaves behind an Quake Shard in a 5ft cube within 5ft of
          you.</p><p>• Wind: Your shield has resistance to Lightning Damage, vulnerability to Fire Damage and once cast
          all creatures of your choice within 5 feet of you gains 1 rank of bleed.</p><p>• Fire: Your shield has
          resistance to Wind Damage, Vulnerability to Cold Damage and all creatures within 10 feet of you takes fire
          damage equal to your Ninjutsu ability modifier.</p><p>• Water: Your shield has resistance to fire damage,
          vulnerability to earth damage and if this jutsu is cast near a sufficient source of water, reduce the cost of
          this jutsu by -2.</p><p>• Lightning: Your shield has resistance to Earth damage, vulnerability to wind damage
          and you gain a +2 to Dexterity saving throws until the beginning of your next turn.</p><p>At Higher Ranks: For
          each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the temporary hit points
          you gain by +6.</p>
