  - name: Single-Swing Style Disarming Cut
    type: spell
    img: systems/n5eb/assets/content/clans/yamada.webp
    system:
      description:
        value: >-
          <p>You attempt to disarm an opponent. Make a melee taijutsu attack on a creature within range. On a hit you
          deal your weapons damage + 6d6 , and the target must make a Strength saving throw dropping their weapon on a
