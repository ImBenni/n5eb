system:
  description:
    value: >-
      <p>This Adversary gains the ability to control their anger and use it to protect themself. As a free action, this
      adversary may clear itself of up to a number of Berserk ranks it has equal to half it's Proficiency Bonus. For
      each rank of Berserk cleared, this adversary gains 10 temporary hit points for the next minute. If a creature
      besides you were to clear ranks of Berserk, you still gain temporary hit points.</p>
