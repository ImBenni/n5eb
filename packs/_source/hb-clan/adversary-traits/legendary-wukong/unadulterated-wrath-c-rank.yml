system:
  description:
    value: >-
      <p>This Adversary may enter into a form of wrath and anger as a bonus action for the next minute. While in this
      form, the Adversary can not be moved against their will, increase their unarmed damage by 1 die, deals an
      additional 2 damage for each rank of Berserk they have, and can not be banished ot teleported against their will.
      At the beginning and end of the Adversary's turn while in this form, they gain 1 rank of Berserk, this does not
      apply to Elite Actions.</p>
