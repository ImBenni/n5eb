img: systems/n5eb/assets/content/clans/asagami.webp
system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Asagami Clan, level 8+<br />You have found
      that pain becomes a good weapon when used by the right hands, you gain the following:</p><ul><li>increase your
      intelligence or wisdom score by 1, to a maximum of 20.</li><li>When you critically hit with Vector Control: Bend
      the target suffers the effects of a failed save.</li><li>When you kill a creature using Asagami Clan Hijutsu,
      enemies within 30 feet of the target must make a wisdom saving throw, gaining a rank of fear on a failed save. A
      creature repeats their saving throw at the end of each of their turns, ending the condition on itself on a
      success. A creature that succeeds this saving throw becomes immune to this ability for the next 24
      hours.</li></ul>
    chat: ''
