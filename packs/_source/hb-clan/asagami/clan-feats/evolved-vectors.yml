      benefits:</p><ul><li>Increase your wisdom by 1, to a maximum of 20.</li><li>You may use your Wisdom instead of
      Intelligence as your ninjutsu ability modifier for Asagami clan jutsu.</li><li>You gain an Asagami evolution of
      your choice.</li><li>You can learn and create Asagami hijutsu in half the time.</li></ul>
