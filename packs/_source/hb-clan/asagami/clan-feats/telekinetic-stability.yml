system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Asagami Clan, level 12+<br />You are
      skilled at controlling your vectors, allowing you to give them more precise commands, you gain the
      following:</p><ul><li>Twice per rest, when you are forced to make a strength saving throw, you may instead make an
      intelligence saving throw.</li><li>You gain a hovering speed of 30 feet. You can hover up to 5 feet from the
      ground.</li><li>You become immune to the prone condition.</li><li>You can concentrate on up to 3 Asagami clan
      hijutsu at once.</li></ul>
