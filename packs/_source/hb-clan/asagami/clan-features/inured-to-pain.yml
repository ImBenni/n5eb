system:
  description:
    value: >-
      <p>Due to the sadistic nature of the clan members, the Asagami clan subjects their children to a special ritual
      that reduces their ability to feel pain. Starting at 7th level, when you would gain any condition, you may delay
      the effects of that condition until your next turn as a free action. You may delay conditions this way a number of
      times equal to your Intelligence ability modifier per short rest.</p><p>Starting at 15th level, the ritual not
      only makes you more resistant to pain, but also turns the return of pain into a sign that you are still alive. You
      ignore the first rank of any condition that can have more than one rank.</p>
