system:
  description:
    value: >-
      <p>Using a great amount of Vectors, you try to break apart everythin in an area by tearing it beyond recognition.
      Choose two points you can see within range, within 60ft of eachother you bend and twist everything in a 15ft wide
      line that connect both points.</p><p>All creatures inside this line must make a strength saving throw, taking 8d12
      necrotic damage and gaining a rank of lacerated on a failed save, half as much damage on a success. A creature
      that fails this save by 5 or more takes 2d12 additional damage and must make a constitution saving throw, being
      unable to use its hands or legs (your choice) on a failed save. A casting of restorative of B-rank or higher can
      restore the use of these limps.</p><p>Walls inside the line and within 5ft of it take 8d12 necrotic damage that
      ignores resistance and immunity, and terrain within the same area becomes difficult terrain. Unattended non-chakra
      enhanced objects within the line are broken beyond repair. Unattended chakra enhanced object of the same rank as
      this jutsu or less are left unusable until a creature spends a week of DT repairing it.</p><p>If you use this
      jutsu against a creature you have <strong>lifted</strong>, it takes 2d12 additional damage, and makes the
      constitution saving throw regardless of their strength saving throw result.</p><p><strong>At Higher
      Ranks</strong>: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and the
      damage</p>
