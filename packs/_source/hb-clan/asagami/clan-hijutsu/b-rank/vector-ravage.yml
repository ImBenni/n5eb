system:
  description:
    value: >-
      <p>You send out your vectors to indiscriminately wreak havoc on everything close to you, all creatures within
      range must make a dexterity saving throw, taking 6d10 necrotic damage and becoming weakened on a failed save, or
      taking half as much damage on a success. A creature weakened by this jutsu makes a constitution saving throw at
      the end of each of their turns, ending this condition on a success.</p><p>A <strong>Lifted</strong> creature
      instead takes 6d12 necrotic damage and gains 2 ranks of weakened on a failed save, half as much damage and ranks
      on a success.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3 and the damage by 1d10 and 1d12 respectively.</p>
