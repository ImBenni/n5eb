system:
  description:
    value: >-
      <p>You use the complete might of your vectors to hold down a creature in place. This jutsu can be cast as an
      action or reaction.</p><ul><li><strong>Action:</strong> choose one creature within range, it must succeed a
      strength saving throw or become <strong>Lifted</strong> and Stunned for the duration. A creature lifted this is
      way cannot have the lifted condition ended due to the effects of an Asagami Clan Hijutsu. An affected creature
      makes a strength (athletics) check at the start of each of their turns, ending the effects of this jutsu on itself
      on a success.</li><li><strong>Reaction:</strong> When you would take damage, be pushed or gain a condition, You
      may spend a reaction to force the triggering creature must make an strength saving throw, on a failed save, the
      creature becomes <strong>Lifted</strong> and stunned until the start of their next turn and the triggering action
      is <strong>interrupted</strong>.</li></ul>
