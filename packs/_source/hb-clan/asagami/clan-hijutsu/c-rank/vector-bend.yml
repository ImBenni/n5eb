name: Vector Bend
type: spell
_id: pC6FIItj94CzAMF4
img: systems/n5eb/assets/content/clans/asagami.webp
system:
  description:
    value: >-
      <p>You order your vectors to twist the limps of a creature you can see within range. Make a ranged ninjutsu
      attack, dealing 5d10 necrotic damage on a hit. Also on a hit, choose between an arm or leg:</p><ul><li>Arm: the
      target must make a constitution saving throw, on a failed save, it drops whatever is holding, unable to use that
      hand until the end of your next turn.</li><li>Leg: the target must make a constituion saving throw, on a failed
      save, it falls prone unable to stand up until the end of your next turn.</li></ul><p>If you use this jutsu against
      a creature you have <strong>lifted</strong>, you may give yourself advantage on the attack roll or give it
      disadvantage against the saving throw, and the condition ends.</p><p><strong>At Higher Ranks</strong>: For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage by 1d10, and the number of
      targets by 1.</p>
