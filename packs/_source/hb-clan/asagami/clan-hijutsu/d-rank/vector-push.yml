system:
  description:
    value: >-
      <p>You make a simple push with your Vectors. Make a melee ninjutsu attack against a target within range, pushing
      it 30 feet and knocking it prone on a hit. A target that collides with a solid object has their movement stopped,
      and takes falling damage equal to the distance they could not move.</p><p>If you use this jutsu against a creature
      you have <strong>lifted</strong>, one attack automatically hits and doubles the distance that target is pushed,
      and the condition then ends.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the number of attacks by 1.</p>
