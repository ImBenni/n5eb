  description:
    value: >-
      <h3 id="hunter-of-beasts">Hunter of Beasts</h3><p><em>From the beginning, House Belmont was a wellfare of
      knowledge for those in their family to be able to be a force of good in the world. By killing the creatures of the
      night. Going to lengths others would never want or dream of. There will always be hardship with this path. But,
      maybe. Once in a lifetime, you'll find your true purpose, and kill a creature that needs to be put
      down.</em></p><h4 id="belmont-traits">Belmont Traits</h4><p><strong>Ability Score Increase:</strong> +2 to Str or
      Dex, +1 Con<br /><strong>Speed:</strong> Your base walking speed is 35 feet.<br /><strong>Skill
      Proficiencies:</strong> Martial Arts, Survival, or Nature. <br /><strong>Weapon Proficiencies:</strong> Whip and
      Morningstar.</p>
