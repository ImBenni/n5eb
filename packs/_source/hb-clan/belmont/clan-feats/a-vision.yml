system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Belmont Clan, Level 8+<br />Sometimes you
      have to dig deeper to see more than the average person. You gain the following benefits.</p><ul><li><p>Increase
      your Dexterity, Stength, or Wisdom, by +1 to a maximum score of 20.</p></li><li><p>When you use your
      <strong>Message From The Past</strong> feature to glimpse into the past, you can freeze the moment in time. You
      may stay there for as long as you wish to survey the area with no time passing in the real world, gaining True
      Sight to a range of 30 feet as your eyes adjust to the surrounding area. Your sight immediately returns to normal
      once you leave the vision.</p></li></ul>
