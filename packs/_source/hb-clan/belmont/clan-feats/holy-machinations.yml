system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Belmont Clan, Level 12+<br />Preparation
      and Practice are the tenants of power which lead the Belmonts to living so long in the hellscape of their lives.
      You gain the following benefits.</p><ul><li><p>Increase your Dexterity, Stength, or Wisdom, by +1 to a maximum
      score of 20.</p></li><li><p>As a Bonus Action, you can augment your Morningstar with a seal of holy power against
      any one of your <strong>Hunter's Bane</strong> creature types, when you do, you can double your weapons damage
      modifier for one minute against that type.</p></li><li><p>When you create <strong>Holy Water</strong> on a rest,
      you can choose to ignore the requirement of spending chakra dice, once per rest, doing this lets you create an
      additional <strong>Holy Water</strong> along with the normal amount you could make.</p></li></ul>
