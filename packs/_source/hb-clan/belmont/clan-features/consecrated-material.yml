system:
  description:
    value: >-
      <p>House Belmont has ancient techniques of soaking weapons in holy water and imbuing weapons with seals of God to
      drive creatures of the night away. Beginning at 11th level, on a short rest, you can make a special type of
      medicine by spending an amount of chakra die equal to the created amount, called <strong>Holy Water</strong>
      creating this liquid requires a Survival check vs DC 20+ the amount you wish to make, <strong>(2 Holy Water: +3 to
      DC, 3 Holy Water: +5 to DC, 5 Holy Water: +7 to DC)</strong> <br />Additionally as a bonus action, you can either
      douse your weapon in <strong>Holy Water</strong> or throw it at an enemy. When applied to your weapon, you roll
      with advantage on all attacks against your <strong>Hunter's Bane</strong> creature type for 1 minute, when thrown,
      they must make a Dexterity saving throw against your Taijutsu save DC, or take 8d6 Fire damage on a failure that
      ignores resistance and treats immunity as resistance (these do not stack) and gain 3 ranks of burn, on a success
      they take half damage and suffer no additional effects.</p>
    chat: ''
