img: systems/n5eb/assets/content/clans/belmont.webp
system:
  description:
    value: >-
      <p>The Belmonts have a supernatural talent for discerning the secrets surrounding mysterious relics or places
      touched by evil. Beginning at 7th level, whenever you make a check to recall information about the sinister or
      tragic history of an object you are touching or your current location, you have advantage on the check.
      Additionally, if you succeed by the DC by 5 or more. You are transported to the time of the tragedy in a 12 second
      vision. While you are here you have blindsight and your speed is reduced to zero in the real world, you may not do
      anything to interact with the real world at all while you're in the vision. You may only look into visions of
      objects once per object.</p><p></p>
