system:
  description:
    value: >-
      <p>A staple of House Belmont has always been the Morningstar. Since you were a child you've had extensive training
      in whip like weapons. Addtionally at 1st level, during a short rest, you may take two Whips and make a
      Morningstar. The Morningstar is a 2d6 weapon, with Finesse, Trip, Grapple, Deadly, and Reach 2. Only those of
      House Belmont can be proficient in this weapon.</p><p></p>
