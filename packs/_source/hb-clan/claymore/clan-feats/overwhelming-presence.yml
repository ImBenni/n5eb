system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Claymore Clan<br />You have an air of
      danger about you that makes you harder to approach. You gain the following benefits:</p><ul><li>Increase your
      Strength, Dexterity, or Constitution score by 1, to a maximum of 20.</li><li>You can use any
      <em><strong>Physical</strong></em> ability score when making an Intimidation check or when making a Saving throw
      to resist the Fear condition.</li><li>When you roll initiative, you may take the <strong>Demoralize</strong> Skill
      Action against all hostile creatures within 30 feet of you.</li></ul>
