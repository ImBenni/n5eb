system:
  description:
    value: >-
      <p>You are a creation of man and have the flesh of a being fused with your own, leaving you terribly scarred but
      you are all the stronger for it.</p><p>Starting at 1st level, you gain the following benefits:</p><ul><li><p>You
      can go twice as long without needing to eat, drink, or sleep.</p></li><li><p>You are immune to disease, cannot be
      envenomed, and have resistance to poison damage.</p></li><li><p>You add half your Constitution modifier (rounded
      up) to Death Saving Throws, and you are immune to forced movement if it would move you a distance equal to or less
      than your Strength or Dexterity Score multiplied by 3.</p></li><li><p>Your Strength or Dexterity Score can be used
      for the purposes of calculating lifting capacity, bulk calculations, and jumping. The ability score used for this
      feature is multiplied by 1.5 for the previously listed purposes.</p></li><li><p>Your aging slows to a halt
      somewhere in your mid-20s, preserving your youthfulness and speed.</p></li></ul>
