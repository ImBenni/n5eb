folder: y2HnBGxKpA37sQHm
name: Epithet of the Worthy
type: feat
_id: iR89Md1hCZIHFbkx
img: systems/n5eb/assets/content/clans/claymore.webp
system:
  description:
    value: >-
      <p>Staring at 18th level, you have gained a title for your most defining trait.</p><p>You choose a statistic when
      you reach 18th level, this choice cannot be changed.</p><ul><li><p><strong>Epithet of Strength</strong>: You have
      been deemed the strongest on the battlefield, and you make sure to keep it that way. You have advantage on
      Strength saving throws and ability/skill checks, your strength score cannot be lowered, and you become immune to 3
      <em><strong>Physical</strong></em> conditions.</p></li><li><p><strong>Epithet of Dexterity</strong>: Your speed is
      unparalleled leaving all that would face you in the dust. You have advantage on Dexterity saving throws and
      ability/skill checks, your movement speed cannot be reduced by hostile effects, and you gain a +5 bonus to
      iniatitive.</p></li><li><p><strong>Epithet of Constitution</strong>: Your toughness makes your enemies think you
      are unkillable. You have advantage on Constitution saving throws and ability/skill checks, your maximum hit and
      chakra points cannot be reduced, and you gain DR equal to your Constitution Ability
      Modifier.</p></li><li><p><strong>Epithet of Intelligence</strong>: Your intellect threatens even the greatest of
      tactians on the war zone. You have advantage on Intelligence saving throws and ability/skill checks, you cannot
      gain penalties on Intelligence saving throws and ability/skill checks, and you gain a +2 to all
      checks.</p></li><li><p><strong>Epithet of Wisdom</strong>: Your foresight makes you almost seem like a prophet.
      You have advantage on Wisdom saving throws and ability/skill checks, you cannot be surprised nor have your ability
      to take reactions negated, and you gain 120 feet of blindsight.</p></li><li><p><strong>Epithet of
      Charisma</strong>: You are constantly calm, and even in the toughest of times you have a smile. You have advantage
      on Charisma saving throws and ability/skill checks, you cannot be controlled against your will, and you add your
      Charisma Ability Modifier to contested checks.</p><p></p></li></ul>
