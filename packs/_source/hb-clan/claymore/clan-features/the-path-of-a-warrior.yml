folder: y2HnBGxKpA37sQHm
name: The Path of a Warrior
type: feat
_id: By30SOdlX4P2IWnw
img: systems/n5eb/assets/content/clans/claymore.webp
system:
  description:
    value: >-
      <p>Beginning at 15th level, your skills have been polished to the point where you have distinct prowess in certain
      areas, differentiating you from your peers. You are classified as a <strong>Defensive Type</strong> or an
      <strong>Offensive Type</strong> allowing you to be a stalwart wall in the heat of battle, or a devastating weapon
      to be used upon your enemies.</p><p>You choose your type when you reach 15th level, this choice cannot be
      changed.</p><ul><li><p><strong>Defensive Type</strong>: You have heightened durability and the ability to even
      regrow limbs if given enough time. You gain the following benefits:</p><ul><li>You gain a +1 bonus to your AC and
      you gain damage reduction equal to half of your proficiency bonus (rounded up).</li><li>Jutsu that grant any
      bonuses to saving throws, grant you damage reduction, or temporary hit points have their value increased by 1.5
      times, once per turn.</li><li>By spending 3 hit die you may gain 10 hit points and regrow a lost limb over the
      course of 1 minute. Regrowing this limb requires concentration as if concentrating on a B-Rank
      Bukijutsu.</li></ul></li></ul><ul><li><p><strong>Offensive Type</strong>: You have heightened physicality and your
      blade can even cut through the mightest of foes. You gain the following benefits:</p><ul><li>You gain a reroll all
      1s and 2s when rolling damage and damage you deal with your Claymore ignores resistance and treats immunity as
      resistance.</li><li>Jutsu that deal damage have their damage die increased by +1, if the jutsu does not have any
      damage die attached you may instead add half your proficiency bonus (rounded up), twice per casting.</li><li><p>By
      spending 3 hit die you may invigorate your body with newfound power for 1 minute. You gain a +2 bonus to attack
      and damage rolls. This boon requires concentration as if concentrating on a <br />B-Rank
      Bukijutsu.</p></li></ul></li></ul>
