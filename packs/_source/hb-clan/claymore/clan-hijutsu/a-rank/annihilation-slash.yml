system:
  description:
    value: >-
      <p>You vow to destroy your target with every fiber of your being. As part of casting this jutsu, you may move up
      to your movement speed toward the target. Movement as a result of this jutsu does not trigger reactions. Make a
      melee Taijutsu attack against the target, dealing your weapon's damage + 10d12. On a hit, you may also choose to
      force a target hit by this attack to make a Strength saving throw or be knocked back 100 feet. If a creature
      collides with a solid object, their movement is stopped, and they take falling damage equal to the distance they
      would have fallen.</p><p>A creature who is reduced to 0 hit points as a result of this jutsu has some vital organ
      cut in two, whether it be the heart, brain, or other organ.</p><p>If you would target an Unnatural Being with this
      attack, you make this attack at advantage, gain 3 additional damage dice on a hit, and they make their saving
      throw at disadvantage.</p>
