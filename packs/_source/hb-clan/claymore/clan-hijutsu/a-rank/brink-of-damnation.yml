name: Brink of Damnation
type: spell
_id: m5ImRDq5FFyq2QMr
img: systems/n5eb/assets/content/clans/claymore.webp
system:
  description:
    value: >-
      <p>As a requirement for casting this jutsu, you must have failed all of your death saving throws, instantly died,
      or experienced severe emotional turmoil that causes your psyche to break. Your body begins to morph and change
      into a being much more powerful than your current self—whether or not this was a correct decision is up to
      you.</p><p>You lose yourself, the one thing you said you would never do. You vowed you wouldn't be like them. You
      lied.</p><p>You gain the following effects:</p><ul><li><p>Your hit points are restored as if you have taken a full
      rest.</p></li><li><p>You gain 5 ranks of the Berserk condition. If you or another creature attempts to remove
      these ranks of Berserk from you, they may only remove 1 rank at a time, and you can only lose Berserk ranks this
      way once per round. This jutsu ends when you have 0 ranks.</p></li><li><p>Your size becomes Large, and all your
      Physical Ability Scores are increased by +4.</p></li><li><p>You gain a natural weapon of your choice equal to the
      damage of your Claymore that has all the same properties.</p></li><li><p>Your movement speed is increased by 60
      feet.</p></li></ul><p>At the conclusion of this jutsu, you gain 5 ranks of exhaustion, have your hit points set to
      1, and are knocked unconscious for 1 hour.</p><p>You may only do this twice before you go too far and may never
      come back...</p>
