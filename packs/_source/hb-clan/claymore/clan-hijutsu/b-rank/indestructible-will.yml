system:
  description:
    value: >-
      <p>You hone your will to one as indestructible as your blade. You gain a +1 bonus to your AC and taijutsu attacks.
      You cannot lose concentration as a result of failing a Chakra Control Check.</p><p>Additionally, when you would
      gain ranks of a condition you gain 1 less rank and once per turn, you may make a Martial Arts check against the DC
      of the triggering effect to end the condition. You may do this thrice per casting.</p>
