system:
  description:
    value: >-
      <p>By rapidly shifting your sword's position, you create a wave of force that shreds even the air around you. All
      creatures of your choice within range must make a Dexterity saving throw with a d4 penalty. On a failed save a
      creature takes your weapon's damage + 5d12 and gains a rank of weakened, lacerated, and slowed.</p><p>If a
      creature fails this saving throw by 3 or more they suffer an additional rank of lacerated.</p><p>If a creature
      fails this saving throw by 5 or more they suffer an additional rank of each weakened.</p><p>If a creature fails
      this saving throw by 10 or more they suffer an additional rank of slow condition.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and increase
      the damage by 1d12. If this jutsu is cast at S-Rank increase the saving throw penalty to a d6.</p>
