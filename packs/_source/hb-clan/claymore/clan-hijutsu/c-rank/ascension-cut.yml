system:
  description:
    value: >-
      <p>As a requirement for casting this jutsu, you must have moved at least 15 feet in a straight line toward the
      target. You plant your feet into the ground and dash forward, using your momentum to fling yourself and your
      opponent into the air. Make a melee Taijutsu attack, dealing your weapon's damage + 1d8 and launching your
      opponent 30 feet into the air. You then make a second attack, dealing your weapon's damage + 2d8 as you perform an
      overhead slash that sends your opponent back into the ground.</p><p>A creature hit with both attacks must make a
      Strength saving throw or suffer fall damage and be knocked prone.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d8 for
      each instance.</p>
