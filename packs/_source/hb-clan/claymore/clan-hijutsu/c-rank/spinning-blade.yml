system:
  description:
    value: >-
      <p>You enter a wide stance and swing your blade wto smite your foes in one fell swoop. All creatures of your
      choice within range must make a Dexterity saving throw or take your weapon's damage + 6d4 and suffer 1 rank of
      bleed. On a pass a creature takes half as much damage and suffers no additional effects. If a creature fails this
      saving throw by 3 or more they instead gain a rank of lacerated.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage by 2d4, and the ranks of
      bleed or lacerated by 1.</p>
