system:
  description:
    value: >-
      <p>You grip your claymore tightly and wind it behind your back, preparing
      to deliver a strike that will wipe away all in front of you. Make a melee
      Taijutsu attack against a creature within range and all creatures of your
      choice adjacent to them. You make a separate attack for each creature,
      dealing your weapon's damage + 2d10. On a hit, a creature must make a
      Strength saving throw or be knocked Prone.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3 and increase the damage by 1d10. If this jutsu
      is cast at B-Rank or higher, a creature who fails the saving throw
      inflicted by this jutsu is also Dazed.</p>
