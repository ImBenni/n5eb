img: systems/n5eb/assets/content/clans/claymore.webp
system:
  description:
    value: >-
      <p>You bring up your claymore in an attempt to parry an oncoming attack
      and leave yourself in a more defensive stance. Make a melee Taijutsu
      attack at advantage against the triggering attack. If your attack result
      is higher than the triggering creature's, their attack misses, and all
      subsequent attacks are made at disadvantage.</p><p>If your attack is lower
      than the attack that triggered this jutsu, your AC is increased by +2
      until the start of your next turn. If the result of your attack beats
      theirs by 5 or more, they become Dazed until the start of your next
      turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and the result of
      your attack roll by +1. If this jutsu is cast at B-Rank or higher, you may
      deal your weapon's damage + the difference in your attack rolls to the
      creature who triggered this jutsu on a success.</p>
