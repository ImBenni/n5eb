system:
  description:
    value: >-
      <p>By lifting your claymore directly above your head, the blade even blocks out the sun before dropping it down
      onto your foe. Make a melee Taijutsu attack, dealing your weapon's damage + 3d8. On a hit with this jutsu, you may
      choose to knock them back a number of feet equal to your Taijutsu Ability Modifier × 5 or twice as far on a
      critical hit.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3 and the damage by 2d8. If this jutsu is cast at B-Rank or higher, you gain advantage on
      the attack, and the knockback is doubled.</p>
