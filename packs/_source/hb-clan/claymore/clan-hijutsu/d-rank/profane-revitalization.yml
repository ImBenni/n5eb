name: Profane Revitalization
type: spell
_id: vPfvTLQWYsG3nfPf
img: systems/n5eb/assets/content/clans/claymore.webp
system:
  description:
    value: >-
      <p>Through the creation process of your body, you have gained the ability to close wounds with sheer willpower
      alone. The power of this technique corresponds to how much time you can allocate to it, even within the heat of
      battle.</p><p><strong>1 Action:</strong> You gain 3d10 hit points and are healed of 1 Physical condition if the
      jutsu or effect was of a rank equal to or lower than what this jutsu was cast, removing all ranks, if
      any.</p><p><strong>1 Bonus Action:</strong> You gain 4d6 hit points and gain 10 damage reduction to the next
      instance of bludgeoning, piercing, or slashing damage you take.</p><p><strong>1 Reaction:</strong> You gain 5d4
      hit points and gain a +2 to the next Physical saving throw you make.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the amount healed by
      1 die. If cast at B-Rank or higher, the Action heals 2 Physical conditions, the Bonus Action damage reduction
      lasts for 2 instances, and the Reaction Physical saving throw bonus is increased to +4.</p>
