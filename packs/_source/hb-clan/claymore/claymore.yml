  description:
    value: >-
      <h3 id="a-vow-to-protect">A Vow to Protect</h3><p>The name "Claymore" is not one those known as Claymores have
      named themselves. It is a title granted to them by those who witness their strength and their weapons that almost
      seem to dwarf the size of their body. They hunt down monstrosities and demons alike, an endless march towards a
      path that very few had carved of their own violation.</p><h4 id="claymore-traits">Claymore
      Traits</h4><p><strong>Ability Score Increase:</strong> +2 to an Ability Score, +1 to any other Ability Score.
      <em>(Recommended: +2 Str or Dex, +1 Con)</em><br /><strong>Speed:</strong> Your base walking speed is 35 feet<br
      /><strong>Skill Proficiencies:</strong> Martial Arts, Athletics<br /><strong>Weapon Proficiencies:</strong> You
      are proficient in all weapons in the Blade Weapon Group.</p>
