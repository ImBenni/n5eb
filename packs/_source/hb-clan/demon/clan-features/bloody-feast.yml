system:
  description:
    value: >-
      <p>All creatures must feed, and so do you, At 1st level, as an action on your turn, or at the conclusion of combat
      you may consume the corpses of the fallen (only 1 when doing so as an action), regaining a number of hit die back
      equal to the proficiency bonus(s) of those you consumed (up to your maximum) this may only be done to humanoids,
      while this may grant you additional strength, know that doing so comes at a cost, You will lose your humanity,
      which you may never get back.</p>
