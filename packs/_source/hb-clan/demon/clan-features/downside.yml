name: Downside
type: feat
_id: t3pkLeKCJh69GLOd
img: systems/n5eb/assets/content/clans/demon.webp
system:
  description:
    value: >-
      <div class="page" id="p2" data-index="1"><div class="columnWrapper"><p>Unlike most clans the Demon clan comes with
      a downside, while this may seem harsh, keep in mind that this clan is made to be played in games where the usual
      time of travel and combat is night, while they can still work in games based in the daylight, it may be difficult
      at earlier levels.</p><p><strong>Sun sensitivity:</strong> starting at level 1 demons will begin to take fire
      damage while in direct sunlight = (their level + times they have transformed since their last full rest - their
      constitution modifier) (minimum of 1 damage), this damage is done at the end of each of their turns, or for every
      minute outside of combat while in direct sunlight (DM's discretion) Damage dealt by sunlight cant be reduced in
      any way. (bypasses immunity)</p><p><strong>Sun resistance:</strong> Starting at level 7 the damage taken by the
      sun will be halved (rounded up) (minimum of 1) as your body passively regenerates the health you are
      losing.</p></div></div><div class="page" id="p3" data-index="2"><div class="columnWrapper"><p><strong>Demonic
      stomach:</strong> Starting at 1st level Demons do not need to eat to survive, but if a demon doesnt eat at least a
      pound of human flesh for x weeks (x = your constitution modifier) their regeneration dice reduces in size by 1
      step (min 1d4) a demon will recover 1 lost step of their regeneration die for every pound of flesh they
      eat.</p></div></div>
