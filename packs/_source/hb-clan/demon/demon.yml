    value: >-
      <h2 id="stalkers-of-the-night">Stalkers Of The Night:</h2><p>The Demon clan isnt necessarily a clan so to speak,
      they are a people with a common sickness, or disease, given to them by the king of demons. due to this they do not
      hail from a specific land, instead they are a collection of people from different walks of life and different
      traditions all united under the almighty Demon King.</p><h2 id="demon-traits">Demon
      Traits</h2><p><strong>Recommended Ability Score Increase:</strong> +2 Constitution , +1 Strength or
      Dexterity</p><p><strong>Speed:</strong> Your Base walking speed is 35ft</p><p><strong>Skill
