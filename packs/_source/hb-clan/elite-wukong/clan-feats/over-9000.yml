system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Elite Wukong Clan, Level 8+<br />Your
      power level is immeasurable, beyond what you could've ever dreamed. Your chakra causes the ground to shake, the
      water to quiver, the clouds to part. You gain the following benefits;</p><ul><li>Increase your Constitution score
      by 1, up to the maximum of 20.</li><li>You gain another <strong>Talent</strong> for your <em><strong>Prideful
      Focus</strong></em> feature.</li><li>When your <em><strong>Zenkai Boost</strong></em> is activated, you regain a
      number of hit points and chakra points equal to the amount of temporary hit points and temporary chakra points
      gained, respectively.</li><li>You learn the <em>Oppressive Aura</em> Ninjutsu. If you already possessed this
      jutsu, you can select another D-Rank Ninjutsu that you qualify for. When you cast Oppressive Aura, it gains the
      Hijutsu keyword, its area of effect is increased by 10 feet, and creatures who fail the saving throw take force
      damage equal to your level. Alternatively, you can forgo any negative effects this jutsu can bring to grant
      yourself advantage on an Intimidation or Persuasion check.</li></ul>
