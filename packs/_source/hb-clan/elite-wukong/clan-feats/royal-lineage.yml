name: Royal Lineage
type: feat
_id: 6kzjlNQVhLXZTGr0
img: systems/n5eb/assets/content/clans/elite-wukong.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Elite Wukong Clan, Level 4+</p><p>Within
      your cells contains the purest of Elite Wukong blood, tying you closer to the fabled Wukong ancestor than the
      majority of your clan. You gain the following benefits:</p><ul><li><p>Increase your Strength, Dexterity, or
      Intelligence score by 1, up to the maximum of 20.</p></li><li><p>You can take this feat multiple
      times.</p></li><li><p>Select one of your known Talents from your Prideful Focus feature. This Talent becomes known
      as an Elite Talent, gaining the following benefits:</p><p><strong>Battleborn Elite:</strong> Select between
      Ninjutsu, Genjutsu, Taijutsu, or Bukijutsu. Once per casting, when you deal damage with your chosen jutsu type,
      you can increase the damage by 1 step.</p><p><strong>Mental Elite:</strong> You gain an additional number of uses
      of your Mental Talent feature equal to half your proficiency bonus, rounded up. Use of this feature against
      Genjutsu also grants you advantage.</p><p><strong>Tenacious Elite:</strong> You can use this feature to clash an
      additional time. The DC to trigger your Zenkai Boost feature is lowered to 22. Additionally, when your Zenkai
      Boost is triggered, select one creature you can see. Until the end of combat, each time the creature damages you,
      you gain a +1 bonus to damage rolls and 1 point of damage reduction against them. This resets at the end of each
      of your turns.</p></li></ul>
