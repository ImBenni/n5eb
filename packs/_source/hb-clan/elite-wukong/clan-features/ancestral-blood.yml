folder: VOASv0Ppgjkelrr7
name: Ancestral Blood
type: feat
_id: qoJ74DrYwavsQfxR
img: systems/n5eb/assets/content/clans/elite-wukong.webp
system:
  description:
    value: >-
      <p>The Elite Wukong, compared to the Low-Class Wukong, are far more in touch with their roots. You are born with a
      brown primate-like tail that you keep wrapped around your waist most of the time. Beginning at 1st level, your
      Tail is strong enough to hold small items such as Lanterns or small thrown weapons such as Kunai or Shiruken,
      while keeping your hands free. If holding the latter, you can as a bonus action make a ranged weapon attack with a
      weapon with the Thrown property. In the event you lose your tail, it grows back after 24 hours.</p><p>Beginning at
      3rd level, your Tail improves your body's strength and maneuverability. When making a Strength or Dexterity skill
      check, you can add your proficiency bonus to the roll if you wouldn't already. This feature does not apply if you
      are rolling as part of a clash, or rolling for Stealth.</p><p>Beginning at 7th level, as a bonus action, you can
      attempt to grapple a creature within 5 feet of you with your tail. (See rules for grappling). If you succeed this
      grapple, you quickly wrap your tail around your leg and flip them over, knocking them prone. The next attack that
      targets the creature gains a +3 bonus to attack and damage rolls.</p>
