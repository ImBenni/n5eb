system:
  description:
    value: >-
      <p>The Elite Wukong are known for being exceptional shinobi from a very early age. Starting at 1st level, when you
      would roll a Hit Die or Chakra Die to regain HP or chakra, you may roll an extra hit or chakra die (This does not
      spend one) and add it to the result. You can do this a number of times equal to half your proficiency bonus, per
      long rest.</p><p>Starting at 7th level, you are immune to hostile effects that would reduce hit points or chakra
      points you would regain.</p>
