system:
  description:
    value: >-
      <p>Your skill on the frontlines exceeds all other shinobi. You gain a +2 to initiative rolls and your unarmed
      damage die becomes a 1d6. If it already a 1d6, it increases by 1 step. Starting at 11th level, whenever you deal
      your unarmed damage, you may add half your proficiency bonus, rounded up, to the damage roll. You may do this up
      to twice per turn. Starting at 18th level, your bonus to initiative becomes a +4.</p>
    chat: ''
