system:
  description:
    value: >-
      <p>Your mental acuity crushes all who are feebleminded. You gain an additional D-Rank hijutsu of your choice, and
      your Passive Perception and Passive Insight increases by an amount equal to half your proficiency bonus. When you
      would make a Wisdom or Charisma saving throw, you can change it to an Intelligence saving throw. You may do this
      once per short rest. You gain an additional use of this feature at 11th and 18th levels.</p>
