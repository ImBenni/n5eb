folder: VOASv0Ppgjkelrr7
name: Prideful Focus
type: feat
_id: nYED7V6oTi6U6Cqt
img: systems/n5eb/assets/content/clans/elite-wukong.webp
system:
  description:
    value: >-
      <p>The Elite Wukong are known for being extremely prideful and arrogant. They do not hesitate to showcase their
      incredible strength when they can. Beginning at 3rd level, you gain and dedicate your pride to one of the
      following <strong>Talents</strong>; At 15th level, you gain a 2nd
      <strong>Talent.</strong></p><ul><li><strong>Battleborn Talent.</strong> Your skill on the frontlines exceeds all
      other shinobi. You gain a +2 to initiative rolls and your unarmed damage die becomes a 1d6. If it already a 1d6,
      it increases by 1 step. Starting at 11th level, whenever you deal your unarmed damage, you may add half your
      proficiency bonus, rounded up, to the damage roll. You may do this up to twice per turn. Starting at 18th level,
      your bonus to initiative becomes a +4.</li><li><strong>Mental Talent:</strong> Your mental acuity crushes all who
      are feebleminded. You gain an additional D-Rank hijutsu of your choice, and your Passive Perception and Passive
      Insight increases by an amount equal to half your proficiency bonus. When you would make a Wisdom or Charisma
      saving throw, you can change it to an Intelligence saving throw. You may do this once per short rest. You gain an
      additional use of this feature at 11th and 18th levels.</li><li><p><strong>Tenacious Talent:</strong> Your
      stubbornness to never back down yields to no one. Once per short rest, you can cast any jutsu that requires an
      attack roll or imposes a saving throw, and casting of 1 action, as a reaction, granting it the clash keyword. If
      the jutsu already has the clash keyword, add a 1d4 to your clash check. Starting at 11th level, once per turn,
      while you are at 50% or less of your current hit points, you can roll a Constitution (Survival) check against a DC
      of 25. (This check cannot benefit from expertise.) On a success, you activate your <em><strong>Zenkai
      Boost</strong></em>. <br />Starting at 18th level, when you initiate a clash, you roll at advantage.</p></li></ul>
