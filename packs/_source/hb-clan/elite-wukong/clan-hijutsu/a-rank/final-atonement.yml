system:
  description:
    value: >-
      <p>A forbidden jutsu that goes against the prideful, arrogant nature of the Elite Wukong. This jutsu is used, not
      for one's self, but to preserve the future and safety of those you hold dear. You weave but a single sign, an
      ancient hand sign from the Wukong of old. The primordial technique causes nature energy to begin manifesting and
      gather inside yourself. The sky darkens and you become the brightest source of light.</p><p>As the energy gathers,
      you will is spoken through it. All allied creatures within 150 feet of you have their movement speed replenished
      and quadrupled until the end of the turn and gain an immediate reaction which allows them to take their
      movement.</p><p>With a loud battle cry, you unleash all of the energy you have gathered inside of yourself,
      generating a gargantuan explosion that takes up a 150-foot sphere. All creatures in range take 75d4 + the result
      of all of your remaining hit die + 100 force damage, ignoring resistance, immunity, and damage reduction.
      Unattended objects and structures within range of this jutsu are vaporized. As the dust settles, you die, your
      corpse becoming petrified in stone, becoming a testament to your final noble act.</p><p></p>
