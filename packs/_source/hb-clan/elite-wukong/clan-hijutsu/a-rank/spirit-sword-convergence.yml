name: Spirit Sword Convergence
type: spell
_id: 1HRamICMY6lTC4ii
img: systems/n5eb/assets/content/clans/elite-wukong.webp
system:
  description:
    value: >-
      <p>You take a weapon in hand and raise it high into the sky, pouring your chakra and mixing it with the energy of
      nature. This jutsu can be cast even with a broken weapon. Your weapon grows massively in size and begins radiating
      light of your chakra color. You gain the following benefits for the duration of this jutsu; When you cast this
      jutsu, allies within 60 feet of you, other than you, can lend you 10 chakra (no action required) to enhance this
      jutsu further.</p><p>This jutsu lasts for 5 rounds, plus an additional round for each ally that assists you in
      casting this jutsu, other than yourself. If 3 or more allies assist you, this jutsu no longer requires
      concentration. The casting time of this jutsu is a full turn action, is reduced by 1 step for each ally that
      assists you. (1 Full Turn Action&gt;1 Action&gt;1 Bonus Action)</p><ul><li>Your weapon deals an additional die of
      damage, and gains a +1 to attack and damage rolls for each allied creature that assists you (Max. +3). If 3 or
      more allies assist you, once per turn, when you make an attack with this weapon, you can make an additional weapon
      attack.</li><li>Your weapon increases its critical threat range by +1 for weapon and taijutsu attacks. For each
      ally that assists you, increase this bonus by +1 (Max. +3). If 3 or more allies assist you, you ignore immunity to
      critical hits.</li><li>Your weapon gains the Blocking, Deadly, and Reach properties. For each ally that assists
      you, you gain an additional rank of reach. If 3 or more allies assist you, your ranks of reach also increase the
      range of Bukijutsu.</li><li>Your weapon is instantly repaired, cannot be broken, and emits 20 feet of bright light
      and 40 feet of dim light. For each ally that assists you, you increase both light sources by 20 feet. If 3 or more
      allies assist you, this light dispels chakra-enhanced darkness.</li><li>Your movement speed is doubled, and you
      ignore difficult terrain. For each ally that assists you, increase your movement speed by +20 feet. If 3 or more
      allies assist you, you are immune to all effects that would lower your movement speed.</li><li>You gain 7
      temporary hit points at the start of each of your turns (this does not stack with itself). For each ally that
      assists you, increase the temporary hit points gained by +7. If 3 or more allies assist you, while you have these
      temporary hit points, reduce all damage you receive by -5.</li><li>You gain a +1 bonus to all saving throws. For
      each ally that assists you, increase this bonus by +1 (up to a +3). If 3 or more allies assist you, you cannot
      make saving throws at disadvantage.</li></ul>
