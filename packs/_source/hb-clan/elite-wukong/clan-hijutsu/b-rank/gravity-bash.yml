img: systems/n5eb/assets/content/clans/elite-wukong.webp
system:
  description:
    value: >-
      <p>You quickly raise your hand to the sky and charge up a large amount of chakra which shoots high into the sky,
      sending dirt and other small debris flying all around you. The beam rapidly compresses into the sphere and you
      charge at a creature within range of your full movement and make a melee Taijutsu attack. On hit, you deal 6d10
      force damage and the creature must make a Strength saving throw, becoming dazed until the end of their next turn
      and being knocked back 60 feet. If a creature knocked back by this jutsu collides with a solid object, their
      movement is stopped, taking falling damage as if they had fallen an equal distance.</p><p>If this jutsu is used as
      a <em><strong>Finisher</strong></em>, this jutsu now deals 8d10 force damage and the creature makes their saving
      throw at disadvantage, gaining the effects of a failed save and knocked back an additional 30
      feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost by
      3, the damage by 1d10 respectively, and the knockback by 15 feet.</p>
