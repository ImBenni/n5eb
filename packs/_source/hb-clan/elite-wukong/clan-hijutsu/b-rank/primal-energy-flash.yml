folder: WunbCJxHNCCFRiFR
name: Primal Energy Flash
type: spell
_id: bns1lEpMEgfpDX6Q
img: systems/n5eb/assets/content/clans/elite-wukong.webp
system:
  description:
    value: >-
      <p>You take a charging stance, outstretching both of your arms at your sides and beginning to charge bright golden
      chakra all around yourself. For the duration of this jutsu, you emit 60 feet of bright light and 60 feet of dim
      light thereafter. Additionally, if this jutsu is used while in midair, your momentum is stopped, allowing you to
      hover in place.</p><p>At the start of your next turn as an action, you can fire out a 10-foot wide, 60-foot long
      beam of chakra at a creature within range. Make a ranged ninjutsu attack and compare the result against each
      creature's AC. On a hit, the creature takes 7d12 force damage and becomes burned. This jutsu then ends. If you
      score a critical hit with this jutsu only the first target hit by this jutsu, suffers the effects of the critical
      hit.</p><p><strong>Charge:</strong> When this jutsu is cast and at the start of consecutive turns after casting,
      you can choose to delay your attack, instead spending your action to continue charging the attack. For each turn
      you spend charging this jutsu, the jutsu deals an additional die of damage, increases its width by 5 feet, its
      length by 15 feet, and deals additional effects, listed below. You can charge this jutsu a number of times equal
      to half your proficiency bonus before this jutsu ends early.</p><ul><li><strong>1 Charges:</strong> Affected
      creatures are Burned and Dazed.</li><li><strong>2 Charges:</strong> Affected creatures gain 2 ranks of Burned and
      are Dazed.</li><li><strong>3 Charges:</strong> Affected creatures gain 2 ranks of Burned, and are Incapacitated
      until the start of their next turn.</li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage by 1d12.</p>
