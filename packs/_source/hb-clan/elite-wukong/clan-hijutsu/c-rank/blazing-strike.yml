system:
  description:
    value: >-
      <p>You cannot ignore this jutsu's HS requirement. You make weird but necessary hand seals in order to build up
      heat in your hands, after it's done you quickly fire the energy at a creature within range. Make a ranged ninjutsu
      attack, dealing 9d4 fire damage and giving 1 rank of Burned on a hit.</p><p>Until the end of your turn, the target
      can be targeted by Jutsu with the <em><strong>Finisher</strong></em> keyword or Elite Wukong Bukijutsu or Taijutsu
      regardless of range, once per turn, using either an Action or Bonus action, ignoring its listed casting
      time.</p><p>If you cast a Jutsu that makes attacks this way, and hit all attacks that it makes, you may use your
      reaction to blast the creature with a final burst of energy, dealing three times your proficiency bonus as fire
      damage against the target.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3, the damage by 1d4, and the range by +15ft. If cast to B-Rank or higher, if
      the reaction of this jutsu reduces the target to 0 hit points, they are immediately killed.</p>
