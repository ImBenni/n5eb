system:
  description:
    value: >-
      <p>You curl your fingers and clasp your hands together so that the palm of one hand is on the back of the other.
      You begin gathering an incredible amount of energy, so potent that it singes your eyebrows and hair ever so
      slightly. You then fire a 45-foot-long, 5-foot-wide fuchsia-colored beam of chakra. If this jutsu is used while in
      midair, your momentum is stopped, allowing you to hover in place. You do not spend chakra to maintain
      concentration of this jutsu.</p><p>Make a ranged Ninjutsu attack against a creature within range, dealing 6d8
      force damage on a hit. All creatures whose space your line passes through must make a Dexterity saving throw,
      taking the damage of this jutsu on a failed save or half as much on a success. This jutsu then
      ends.</p><p><strong>Charge:</strong> When this jutsu is cast and at the start of consecutive turns after casting,
      you can choose to delay your attack, instead spending your action to continue charging the attack. For each turn
      you spend charging this jutsu, it deals an additional 2 die of damage and increases the damage dealt by 1 step.
      You can charge this jutsu a number of times equal to half your proficiency bonus before this jutsu ends
      early.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, the damage by 1d8, and the length of the line by 10 feet.</p>
