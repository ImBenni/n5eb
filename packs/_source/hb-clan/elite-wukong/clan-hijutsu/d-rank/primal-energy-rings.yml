img: systems/n5eb/assets/content/clans/elite-wukong.webp
system:
  description:
    value: >-
      <p>A technique developed for catching swifty opponents, such as the Low-Class Wukong. You weave a simple sign,
      outstretching your index and middle finger together, causing rings of chakra to form and bind a creature. Select
      one creature in range. The creature must make a Strength saving throw, becoming restrained for the duration on a
      failed save. If the creature is within 10 feet of a wall or wall-like surface, you can bind the creature against
      that wall. If used on an airborne creature, they make their saving throw at disadvantage.</p><p>At the start of
      each of the creature's turns they can make a Strength or Dexterity (Martial Arts) check against your Ninjutsu Save
      DC, breaking free on a success.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3, the range by 15 feet, and the creature<br />gains a -1 penalty to
      their initial saving throw for each rank this jutsu is upcast to.</p>
