system:
  description:
    value: >-
      <p>You channel the primal energy within you and dash toward a creature at full speed for a resounding strike with
      your blade. Move up to your movement speed toward a creature you could reach with your weapon. This does not
      provoke an attack of opportunity. Make a melee Taijutsu attack against the creature, dealing your weapon's damage
      + 2d8. On a successful hit, you gain the benefit of the Disengage action until the start of your next
      turn.</p><p>Until the end of your next turn, you can target one affected creature with a Bukijutsu Finisher or
      Elite Wukong Hijutsu Finisher, regardless of range, once per turn, using either an Action or Bonus Action,
      ignoring its listed casting time.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the damage by 1d8. If cast at B-Rank or higher, increase the
      number of attacks made by +1. If cast at S-Rank or higher, increase the number of attacks made by +1.</p>
