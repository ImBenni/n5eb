  description:
    value: >-
      <h3 id="prideful-legacy">Prideful Legacy</h3><p>The Elite Wukong are a prideful sort that boast powerful chakra
      techniques and possess a unique kekkei-genkai in form of a monkey-like tail. This unassuming attribute is rumored
      to showcase their connection to the fabled Wukong Ancestor, proving their superiority and strength over the
      Low-Class Wukong. Some legends even state that this tail can lead to a power capable of destroying entire
      villages.</p><h4 id="elite-wukong-traits">Elite Wukong Traits</h4><p><strong>Ability Score Increase:</strong> +2
      Str or Int, Con +1 (Your choice)<br /><strong>Speed:</strong> Your base walking speed is 30 feet. <br
      /><strong>Skill Proficiencies:</strong> Chakra Control; Pick one between Athletics or Martial Arts.<br
      /><strong>Armor Proficiency:</strong> You are proficient in Medium armor.</p>
