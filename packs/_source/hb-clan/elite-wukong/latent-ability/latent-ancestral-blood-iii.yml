system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent Ancestral Blood II</strong>)</em> </p><p>Beginning at 11th level, as a bonus
      action, you can attempt to grapple a creature within 5 feet of you with your tail. If you succeed this grapple,
      you quickly flip them over, ending your grapple. The next attack targeting this creature adds your proficiency
      bonus to the damage roll.</p>
