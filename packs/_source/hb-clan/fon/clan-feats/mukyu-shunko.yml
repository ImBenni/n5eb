system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Fon Clan, Level 16+, Onmitsu Tradition:
      Shunkō <br />You resolve to fully complete your Shunkō technique, unlike those <br />of your sister clan. As such,
      your technique becomes enhanced, your energy infinitely revolving around your body. You gain the following
      benefits:</p><ul><li><p>While in combat, your <em><strong>Way of Onmitsu: Shunkō</strong></em> jutsu's duration
      changes to Concentration, Special, it no longer requires chakra <br />to maintain, and it can instead be cast as
      an Action.</p></li><li>Once per rest, while concentrating on <em><strong>Way of Onmitsu: Shunkō</strong></em>,
      when you would be reduced to 0 hit points or be instantly killed, you can end your concentration on the jutsu to
      instead be reduced to 1 hit point. You cannot go below this 1 hit point until the end of your next
      turn.</li><li>While concentrating on <em><strong>Way of Onmitsu: Shunkō</strong></em>, you ignore Resistance to
      damage and conditions you inflict.</li><li><p>While concentrating on <em><strong>Way of Onmitsu:
      Shunkō</strong></em>, you reduce the cost of jutsu you cast by an amount equal to their rank. <br /><em>(D/C-Rank:
      2; B/A-Rank: 3; S-Rank: 4)</em></p></li></ul>
