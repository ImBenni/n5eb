name: Onmitsu Tradition Shunko
type: feat
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Fon Clan or Shihōin Clan, Level 10+ <br
      />You've trained in the ultimate technique of the Onmitsukido, the powerful battle form known as Shunkō . You
      learn the <em><strong>Way of Onmitsu: Shunkō</strong></em> jutsu if you do not already know it, gain a Nature
      Release purely for the sake of this jutsu's effects if you do not already have at least one to utilize, and you
      gain the following benefits:</p><ul><li>You gain an additional concentration slot that can only be used to
      concentate on the <em><strong>Way of Onmitsu: Shunkō</strong></em> jutsu.</li><li>While concentrating on
      <em><strong>Way of Onmitsu: Shunkō</strong></em>, you can spend 5 chakra to gain advantage on a Strength,
      Dexterity, or Charisma Saving Throw you make, once per round.</li><li>While concentrating on <em><strong>Way of
      Onmitsu: Shunkō</strong></em>, you can change the saving throw that a jutsu you cast forces to a Charisma Saving
      Throw instead of the original type of saving throw.</li><li>While concentrating on <em><strong>Way of Onmitsu:
      Shunkō</strong></em>, you can spend 5 chakra to gain advantage on a Clash check, and gain advantage on saving
      throws against being Concussed and/or Incapacitated.</li><li>Once per rest, while concentrating on <em><strong>Way
      of Onmitsu: Shunkō</strong></em>, if you would be Incapacitated, you can spend Chakra Die equal to the rank of the
      triggering effect to delay the condition's effect until the end of your next turn. <em>(D/C-Rank: 2; B/A-Rank: 4;
      S-Rank: 6)</em></li></ul>
    chat: ''
