name: Onmitsu Tradition Stealth
type: feat
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Fon Clan or Shihōin Clan, Level 4+ <br
      />(You cannot have the 'Onmitsu Tradition: Force' feat) <br />You've mastered the teachings of the Onmitsukido
      that couple quick and silent strikes with high mobility. You gain the following benefits:</p><ul><li>Once per
      turn, you can deal an additional Xd4 damage to a creature you hit with an attack if you have advantage on the
      attack roll, if another enemy of the target is within 5 feet of it, or if they are Surprised. <em>(X = 1 + half
      your Proficiency Bonus)</em></li><li>You add half your Dexterity Ability Modifier to initiative
      rolls.</li><li>While out of combat, when you would make a Stealth check, all results of 5 or lower on the d20
      instead become 5.</li><li>You gain advantage on your initiative check if at least one creature was unaware of your
      presence when combat began.</li><li>You gain the ability to teach up to two other creatures Onmitsukidō Hijutsu
      you know of a rank one lower than your highest jutsu known as according to your class table, up to B-Rank. Both
      you and the chosen creatures must spend the Downtime required to learn the jutsu as you must instruct them in the
      ways of your clan.</li></ul>
    chat: ''
