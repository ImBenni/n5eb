name: Shunpo Expert
type: feat
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Fon Clan or Shihōin Clan, Level 8+ <br
      />(You must have the <em><strong>Way of Onmitsu: Shunpo</strong></em> jutsu on your jutsu list) <br />Your Shunpo
      knowledge and experience enables you to travel at high speeds for long periods of time. You gain the following
      benefits:</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Your Travel Pace
      doubles, and you can travel at Fast Pace with no penalties.</li><li>When you cast <em><strong>Way of Onmitsu:
      Shunpo</strong></em>, you gain a +1d4 bonus to the next attack roll you make, twice per round.</li><li>While you
      are gaining the benefits of a jutsu that increases your movement speed, you cannot make Dexterity checks with
      penalties, excluding disadvantage.</li><li>You reduce the cost and concentration cost of jutsu that increase your
      movement speed by -1. This reduction can reduce the concentration cost of the jutsu to 0.</li></ul>
    chat: ''
