name: Shunpo Master
type: feat
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Fon Clan or Shihōin Clan, Level 12+,
      Shunpo Expert <br />Your speed is unrivaled by many, and your movements use the least amount of steps possible to
      achieve their execution. You gain the following benefits:</p><ul><li>Increase an ability score of your choice by
      1, to a maximum of 20.</li><li>Twice per rest, as a part of rolling initiative, you can cast one jutsu of C-Rank
      or lower that increases your movement speed.</li><li><p>You gain additional movement speed equal to the rank of
      the highest rank jutsu you are concentrating on. <br /><em>(D/C-Rank: 5; B/A-Rank: 10; S-Rank:
      15)</em></p></li><li>Once per round, when you damage a creature that has a movement speed that is less than half
      of yours, you can force them to make a Wisdom Saving Throw vs your Taijutsu Save DC. On a failure, they become
      Confused.</li></ul>
    chat: ''
