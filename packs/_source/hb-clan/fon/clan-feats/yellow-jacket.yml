name: Yellow Jacket
type: feat
_id: pPvIhU5YvltHLl59
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Fon Clan <br />The sting of your weapons
      is far more vicious than your peers, setting you far apart from them in lethality. You gain the following
      benefits:</p><ul><li>You become proficient with Poisoner's Kits. If you are already proficient, you instead gain
      expertise. You can make their checks with your Dexterity Ability Modifier.</li><li>You reduce the DC to create
      poisons by an amount equal to 1+ half your Dexterity Ability Modifier, poisons you create gain an additional
      number of uses equal to half your Proficiency Bonus, and poisons you create can have their DC calculated by 8 +
      your Dexterity Ability Modifier + your Proficiency Bonus.</li><li>When you would make a weapon attack, you can
      apply a poison you've created to your weapon as a part of the same action.</li><li><p>Once per round, when you
      would suffer the effects of a poison or disease, take Poison damage, or become Envenomed, you can inject yourself
      with a back-up counter-poison from your weapon and lose hit points equal to half your weapon's base damage die.
      <br />If you do, you neutralize the poison or disease and nullify it, gain Resistance to the damage, or gain 2
      less ranks of Envenomed.</p></li></ul>
