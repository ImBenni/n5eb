name: Flight of the Hornet
type: feat
_id: 57TZrd47Lk0TRkgN
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p>At 7th level, you've adapted your speed and skill to strike harder and faster than ever before. While gaining
      the benefits of a Taijutsu or Bukijutsu with a range of Self, you gain a bonus to your movement speed equal to the
      rank of the jutsu. <br /><em>(D/C-Rank: 10; B/A-Rank: 15; S-Rank: 20)</em></p><p>This additional movement speed
      can be used to move vertically as if you are flying, and if you end your turn without expending it you can hover
      in mid-air.</p><p>At 11th level, while gaining the benefits of a Taijutsu or Bukijutsu with a range of Self, if
      your passive Stealth exceeds a creature's passive Perception, they increase the chakra cost of reactions taken
      against you by an amount equal to the rank of the jutsu you are gaining the benefits of. <br /><em>(D/C-Rank: 15;
      B/A-Rank: 25; S-Rank: 35)</em></p><p>At 15th level, while gaining the benefits of a Taijutsu or Bukijutsu with a
      range of Self, if your passive Stealth exceeds a creature's passive Perception by 5 or more, once per round you
      can choose to treat yourself as being Invisible to them for the purposes of an attack or treat them as being
      Blinded for the purposes of a saving throw they would make.</p>
