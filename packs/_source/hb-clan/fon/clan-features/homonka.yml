system:
  description:
    value: >-
      <p>At 11th level, you've upgraded your poisons into a lethal venom, infusing it with your soul to bring your
      enemies to a swift and harsh end. When a creature suffering from 5 ranks of Envenomed would gain another rank of
      the condition they instead become <em><strong>Marked for Death</strong></em>, losing all ranks of Envenomed and
      instead gaining 1 rank of <em><strong>Marked for Death</strong></em>. Such a creature is marked with a black crest
      of your design that appears at the place you last hit them, and proceeds to suffer the following
      effects:</p><ul><li>A creature that is <em><strong>Marked for Death</strong></em> is counted as Envenomed for the
      purposes of interacting with jutsu, features, and traits, and cannot gain ranks of the Envenomed condition while
      <em><strong>Marked for Death</strong></em>.</li><li>A creature that is <em><strong>Marked for Death</strong></em>
      takes your weapon's damage in Poison damage the first time each turn it would move or cast a jutsu.</li><li>A
      creature that is <em><strong>Marked for Death</strong></em> cannot gain the benefit of Resistance.</li><li>A
      creature that is <em><strong>Marked for Death</strong></em> constantly approaches their end as your poisons begin
      to seep into their body and soul. A creature that is <em><strong>Marked for Death</strong></em> gains 1 rank of
      <em><strong>Mortality</strong></em> each time you deal Poison damage to them as the result of a successful attack
      roll or failed saving throw, once per turn. If you critically hit them, or if they fail a saving throw you force
      by 5 or more, they gain 3 ranks of Mortality instead.</li></ul><blockquote><h5 id="mortality-">Mortality:</h5><p>A
      creature can have a maximum number of ranks of Mortality equal to their Constitution or Charisma Ability Modifier,
      whichever is higher. When this limit is met or exceeded, the creature dies instantly and their body distintegrates
      until no trace is left. This effect does not trigger on creatures that are of a higher level than you, or on Solo
      adversaries. Ranks of Mortality only persist for as long as the creature is Marked for Death.</p></blockquote>
