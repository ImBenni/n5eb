name: Hornet Stinger
type: feat
_id: becKM3FrIUJrCfEP
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p>Starting at 1st level, you are naturally attuned to certain weapons rather than others, and are able to wield
      them as if they were extensions of your body. You can grant melee weapons you wield that deal Piercing damage the
      Unarmed and Finesse properties. When you do, you are still treated as being unarmed for the purposes of
      interacting with jutsu, features, and traits, and you can change your unarmed damage and damage you deal with
      Taijutsu or Bukijutsu to Piercing damage.</p><p>Also, your unarmed damage die becomes 1d6 if it is not already. If
      it already is, it increases by one step. It increases by one step at 7th level, 11th level, and again at 18th
      level, to a maximum of 2d6.</p>
    chat: ''
