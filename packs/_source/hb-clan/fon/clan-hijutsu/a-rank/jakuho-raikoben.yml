folder: J8hOP2n3PeBfGf0A
name: Jakuho Raikoben
type: spell
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p><em>(You must be a member of the Fon clan to learn and cast this jutsu.)</em> Once per Long Rest, you can begin
      preparing to execute your clan's last resort, an extremely destructive technique that contradicts all your clan
      stands for.</p><p>As an Action, you reduce your movement speed to 0 for the duration of this jutsu and pour your
      energy and killing intent into your weapon, which transforms it into a massive cruise missile. As a Bonus Action,
      you select a creature, object, or area you know the location of within a mile. You lock on to <br />the target,
      firing the missile that avoids all obstacles in the <br />path to reach it. Make a ranged Taijutsu attack against
      the target, gaining advantage if it has any ranks of Envenomed. This attack automatically hits a target
      <em><strong>Marked for Death</strong></em>. Regardless of a hit or miss the missile detonates at the area, causing
      all creatures in a 120 foot radius sphere to make Dexterity Saving Throw, taking Xd12+X Force damage on a failure
      or half as much on a success. <em>(X = the result of your weapon's damage die, rerolling all 1s, 2s, and
      3s)</em></p><p>A target hit by the initial attack rolls at disadvantage. A target <em><strong>Marked for
      Death</strong></em> automatically fails. All objects, structures, and non-sentient constructs within range, as
      well as any and all creatures reduced to 0 hit points by this jutsu are atomized. This jutsu then ends.</p>
