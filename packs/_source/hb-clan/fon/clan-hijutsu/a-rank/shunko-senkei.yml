folder: J8hOP2n3PeBfGf0A
name: Shunko Senkei
type: spell
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p><em>(To cast this jutsu, you must be gaining the benefits of the</em> <em><strong>Way of Onmitsu:
      Shunkō</strong></em> <em>jutsu.)</em> You generate a powerful and pressurized burst of energy that explodes
      outwards into a design of your choice that you can then manipulate into a powerful attack. You can cast this jutsu
      twice per casting of the <em><strong>Way of Onmitsu: Shunkō</strong></em> jutsu.</p><p>When you cast this jutsu,
      you select one of the following shapes for it: 60 foot tall, 20 foot radius cylinder; 60 foot long, 10 foot wide
      line; 30 foot radius sphere centered on you.</p><p>Regardless of shape, this jutsu forces creatures in range other
      than you to make a Dexterity Saving Throw, dealing Xd6 + X Force damage that ignores Resistance and causes them to
      become Dazed on a failure or half as much on a pass. <em>(X = the result of your unarmed damage die, rerolling all
      1s and 2s.)</em> This jutsu deals the maximum possible amount of damage to objects, structures, and constructs
      within range.</p><p>This jutsu can gain one benefit depending on the nature release keyword that your Shunkō
      possesses, if it has any. Any changes to your appearance linger until Shunkō ends:</p><ul><li><strong>Kōjin Senkei
      (Fire):</strong> You create a burst of pressurized energy on your back in the shape of wings, then create a
      massive explosion of concentrated fire. The damage type becomes Fire and inflicts 2 ranks of Burned on a failure.
      A creature with 5 ranks of Burned that fails their saving throw cannot maintain concentration while
      Burning.</li><li><strong>Fūjin Senkei (Wind):</strong> You create a ferocious gale of energy that wreathes your
      limbs, then expel it outwards to decimate your foes by releasing a sonic burst. The damage type becomes Wind and
      it inflicts 2 ranks of Lacerated on a failure. A creature with 5 ranks of Lacerated that fails their saving throw
      cannot remove the condition without spending a Full Turn Action to do so.</li><li><strong>Raijin Senkei
      (Lightning):</strong> You create a circle of electrical energy in the shape of drums attached to your back as your
      hair rises up to form horns. You then unleash a giant electrical burst. The damage type becomes Lightning, and it
      inflicts 2 ranks of Shocked on a failure. A creature with 5 ranks of Shocked that fails their saving throw is
      Stunned until the start of their next turn.</li><li><strong>Ryūjin Senkei (Water):</strong> You pool together a
      torrent of cold energy that creates a whirling set of armor around you that then explodes forth like a ravenous
      tide. The damage type becomes Cold and it inflicts 2 ranks of Chilled on a failure. A creature with 5 ranks of
      Chilled that fails their saving throw becomes Restrained until they spend a Full Turn Action to free
      themselves.</li><li><strong>Dojin Senkei (Earth):</strong> You create fixtures of rigid energy that coats your
      fists or legs, that fly outwards and detonate like devastating earthquakes that even rock the sky. The damage type
      becomes Earth and it inflicts 2 ranks of Bruised on a failure. A creature that is Staggered that fails their
      saving throw gains an additional rank of Staggered, though they can have no more than two ranks in this
      way.</li></ul>
    chat: ''
