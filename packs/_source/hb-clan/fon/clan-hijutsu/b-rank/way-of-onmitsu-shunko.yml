name: Way of Onmitsu Shunko
type: spell
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p>An advanced battle technique achieved by blending the techniques of Taijutsu and Ninjutsu together, driving
      elemental power into one's arms and legs that can be controlled and fired. This jutsu should only be cast whilst
      unarmored, as its casting will destroy any armor that you are currently wearing. You cannot lose concentration on
      this jutsu while conscious unless you are Incapacitated or cannot pay its concentration cost if it requires one to
      be maintained.</p><p>When you first learn this jutsu, select one elemental nature release keyword you have access
      to. If you do not have access to any, you can choose to make this selection if you ever were to obtain one. This
      selection cannot be changed later.</p><p>This jutsu can gain the nature release keyword you chose when cast, and
      for the duration you can cast jutsu with that nature release keyword using your Taijutsu Ability
      Modifier.</p><p>This jutsu can be cast with 0 movement, and if you are Grappled or Restrained when you cast it,
      the condition(s) immediately end as a part of this jutsu's casting. When you cast this jutsu, all creatures of
      your choice within 10 feet of you must make a Dexterity Saving Throw, taking Xd6 Force damage on a failure or half
      as much on a success. <br /><em>(X = your Taijutsu Ability Modifier)</em></p><p>Additionally, this jutsu grants
      you the following benefits for its duration, some of which depend on the nature release keyword this jutsu
      possesses:</p><ul><li>You can calculate your AC as 14 + your Proficiency Bonus + your base Taijutsu Ability
      Modifier.</li><li>You gain Resistance to Force damage, as well as the damage type of the nature release keyword
      this jutsu possesses, if any.</li><li>Once per turn, you can Dash at no action economy cost.</li><li>Your Taijutsu
      and Bukijutsu that use weapons with the Unarmed property increase their damage die by one step, to a maximum of a
      d12.</li><li><p>If you are unable to cast jutsu with the M component, when you would cast a jutsu you can pay
      chakra equal to the rank of the jutsu to treat it casting as if your speed was not hindered, once per round. <br
      /><em>(D/C-Rank: 6; B/A-Rank: 9; S-Rank: 12)</em></p></li><li>Jutsu you cast with the HS or CS component that use
      your Taijutsu Ability Modifier can replace those components with the M component or add the M
      component.</li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase
      the cost by 3, the radius of the initial explosion by 5 feet, and the damage die of the initial explosion by one
      step. If this jutsu is cast at A-Rank or higher, jutsu with the M component treat Immunity to conditions they
      apply as Resistance. If this jutsu is cast at S-Rank, jutsu with the M component cannot have their damage reduced
      below half and cannot be negated or interrupted when cast.</p>
