name: Way of Onmitsu Utsusemi
type: spell
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p>You move at a blinding speed, so much so that you leave behind an afterimage that seems to take the damage for
      you before disappearing at the very last second.</p><p>You gain a +5 to your AC or +3 to saving throws until the
      start of your next turn. Once per turn, if an attack would miss you or you would succeed a saving throw, you can
      move up to half of your movement speed.</p><p>Once, during this duration, you can make a Martial Arts check vs a
      creature's passive Insight if that creature would miss you with an attack or you would succeed a saving throw that
      they forced you to make. If you have expertise, you instead gain a +1d4 bonus and advantage on the roll.</p><p>On
      a success, you leave behind an afterimage that tricks the creature, causing them to believe you have not moved
      from your position until the end of your next turn or until you take a hostile action towards
      them.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost by
      3. If this jutsu is cast at S-Rank, increase the AC and saving throw bonuses provided by +1.</p>
    chat: ''
