name: Way of Onmitsu Takigoi
type: spell
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p>A technique utilized to create exploitable openings within an opponent. When you cast this jutsu, until the
      start of your next turn when you would be targeted or damaged by an attack, you can make a Martial Arts check vs
      the target's attack roll, once per turn. If you have expertise, you add a +1d4 bonus instead of doubling your
      Proficiency Bonus. On a success, you reduce the damage you taken by your unarmed damage + 4d4, as you manuever
      your body to impede their strike. If you succeed the check by 5 or more, you can move up to half your base
      movement speed, making an Attack of Opportunity against the triggering creature. If you would succeed by 10 or
      more, you instead stop the attack completely, taking no damage and suffering no effects from it.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost by 3 and the damage
      reduction by 1d4. If this jutsu is cast at A-Rank or higher, increase the damage reduction die by one step.</p>
