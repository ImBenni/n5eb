name: Way of Onmitsu Tsurigaki
type: spell
img: systems/n5eb/assets/content/clans/fon.webp
system:
  description:
    value: >-
      <p>You use a hostile creature's body as leverage for yourself, allowing you to counter and use their strike as a
      pivot point for your own. Increase your AC by +4 for the triggering attack. If this would cause the attack to
      miss, you can make an Attack of Opportunity against them as a part of the same action with a +1 to its critical
      threat range.</p><p>On a successful hit, the target creature takes your weapon's damage and is knocked 15 feet
      away from you and makes a Strength Saving Throw, falling Prone and becoming Dazed until the end of their next turn
      on a failure.</p>
    chat: ''
