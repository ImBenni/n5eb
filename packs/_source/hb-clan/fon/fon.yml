  description:
    value: >-
      <h3 id="fatal-stingers">Fatal Stingers</h3><hr /><p>The Fon clan are a group of fighters that train to eliminate
      their enemies in as few strikes as possible, the greatest of them able to reduce this amount all the way down to
      two. They do not seek out beauty in battle, they do not seek out virtue in death, and they do not think of their
      lives as their own. Because they desire to protect that which must be protected, they cut their foes down from
      behind.</p><h3 id="fon-traits">Fon Traits</h3><hr /><ul><li><strong>Ability Score Increase:</strong> +2 to an
      ability score, +1 to any other ability score. <em>(Recommended: +2 Dex, +1
      Cha)</em></li><li><strong>Speed:</strong> Your base walking speed is 35 feet.</li><li><strong>Skill
      Proficiencies:</strong> You gain 2 skill proficiencies of your choice.</li><li><strong>Hornet Venom:</strong> You
      are eligible to learn jutsu that deal Poison damage or apply ranks of the Envenomed condition, regardless of their
      other keyword requirements. (This does not include the Hijutsu keyword.)</li></ul>
