system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Fujou Clan, 8+<br
      /><strong>Description</strong>: You awake one of the clan's most rare techniques, the ability to see beyond your
      eyes. You gain the following:</p><ul><li><p>While your <strong>Tatarigan</strong> is active, you can choose one
      point within 200 feet of you as an action to activate <strong>Overlooking View</strong>. You become able to see as
      if standing in that point. While <strong>Overlooking View</strong> is active, you are blinded from your
      surroundings unless they can be seen from this point. You can return to your normal view as a bonus
      action.</p></li><li><p>While using <strong>Overlooking View</strong>, Genjutsu you cast that do not require NT
      components originate from the Point of View of <strong>Overlooking View</strong>.</p></li><li><p>While using
      <strong>Overlooking View</strong>, genjutsu you cast that do not require NT components and require an attack roll
      ignore half cover and three-quarter cover.</p></li></ul>
