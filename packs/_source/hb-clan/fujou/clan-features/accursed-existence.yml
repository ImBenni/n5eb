system:
  description:
    value: >-
      <p>Starting at 7th level, Your ability to hold to precious life becomes stronger, as your cursed bloodline will
      not allow you to die. Once per turn, when you cast a Fujou clan Hijutsu, you recover hit points equal to the
      jutsu's rank (D=2, C=4, B=6, A=8, S=10). Starting at 18th levels, the hit points regained by this feature are
      doubled.</p>
