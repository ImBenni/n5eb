system:
  description:
    value: >-
      <p>You whisper a deadly song, as your victim enters a state of drowsiness. Choose one creature you can see within
      range, it must make a intelligence saving throw at the start of each of its turns.</p><p>A creature that fails
      this saving throw once, becomes slowed for the duration. And gains an additional rank of slowed each time it fails
      this save.</p><p>A creature that fails this save 3 times, becomes weakened and dazed for the duration.</p><p>A
      creature that fails this save 5 times, becomes unconscious until awakened by a <strong>restorative</strong> or
      similar jutsu of A-rank or higher, that can heal mental conditions.</p><p>A creature that suceeds their saving
      throw 3 times, end this jutsu on itself and becomes immune to it for the next 24 houts.</p>
