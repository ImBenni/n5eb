system:
  description:
    value: >-
      <p>You whisper words of defeat, as a creature within range fails spectacularly. Choose one creature you can see
      within range, that is making an attack roll, it must make a wisdom saving
      throw:</p><ul><li><strong>Success</strong>: No effect.</li><li><strong>Failure</strong>: Until the start of your
      next turn, whenever the creature would miss an attack, it takes the attack's damage.</li><li><strong>Critical
      Failure</strong>: As a failure, but the triggering attack misses and deals maximum damage.</li></ul>
