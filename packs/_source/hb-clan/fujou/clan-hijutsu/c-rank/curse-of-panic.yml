system:
  description:
    value: >-
      <p>You whisper words of mayhem, as terror spreads within enemy ranks. Choose one creature you can see within
      range, it must make an intelligence saving throw:</p><ul><li><p><strong>Success</strong>: No
      effect.</p></li><li><p><strong>Failure</strong>: The affected creature becomes berserk and cannot make hand seals
      (HS) for the duration. A creature under the effect of this jutsu repeats their saving throw at the end of each of
      their turns, ending the effect of this jutsu on a success.</p></li><li><p><strong>Critical Failure</strong>: As a
      failure, but the repeated saving throws are made at disadvantage.</p></li></ul><p><strong>At higher
      ranks:</strong> For each rank above C-rank, increase this jutsu's cost by +3, and the amount of creatures it can
      affect by +1.</p>
