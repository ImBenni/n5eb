folder: ZvtavbsPk9p8FuGe
name: Curse of Flight
type: spell
_id: 9HW6OWKbnRp00VWi
img: systems/n5eb/assets/content/clans/fujou.webp
system:
  description:
    value: >-
      <p>You whisper words of defenestration, as a creature within range is
      filled with a desire to fly away. Choose one creature you can see within
      range, it must make a wisdom saving
      throw:</p><ul><li><strong>Success</strong>: No
      effect.</li><li><strong>Failure</strong>: On its next turn, the target
      must use all its movement to get to the highest possible place it can
      reach on that turn, and throw itself to the ground. If there is no place
      high enough it can reach that would deal fall damage, the target drops
      whatever it is holding and falls prone.</li><li><strong>Critical
      Failure</strong>: As a failure, but the target must also spend its action
      and bonus action dashing or using the faster route to gain height. If
      there is no place high enough it can reach that would deal fall damage, it
      drops whatever it is holding, falls prone, and has its speed reduced to 0
      until the end of their next turn.</li></ul><p><strong>At higher
      ranks:</strong> For each rank above D-rank, increase this jutsu's cost by
      3, and the number of affected creatures by +1.</p>
