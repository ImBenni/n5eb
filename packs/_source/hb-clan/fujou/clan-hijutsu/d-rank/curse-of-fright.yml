system:
  description:
    value: >-
      <p>You whisper words of repulsion, as a creature within range becomes horrified by your pressence. Choose one
      creature you can see within range, it must make a wisdom saving throw:</p><ul><li><strong>Success</strong>: No
      effect.</li><li><strong>Failure</strong>: The target gains a rank of fear against you and must spend all its
      movement trying to get away from you for the duration. an affected creature repeat their saving throw at the end
      of each of their turns, ending this genjutsu on itself on a success.</li><li><strong>Critical Failure</strong>: As
      a failure, but the target must also spend its action or bonus action to get away, and only can repeat their saving
      throw if you are no longer within its line of sight.</li></ul><p><strong>At higher ranks:</strong> For each rank
      above D-rank, increase this jutsu's cost by 3, and the number of affected creatures by +1.</p>
