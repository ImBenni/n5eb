folder: oQoL7d9XB0T9ChMs
name: Skill Transfer
type: feat
_id: ZOfmzuMQPyAbsh2i
img: systems/n5eb/assets/content/clans/geisha.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Geisha Clan, Level 12+ <br />Using a rare
      technique that few Geisha know, and that you were given the honor to wield, you are able to absorb your
      bodyguard's skill once he is taken down or if he gives it up willingly (the bodyguard will disappear temporarily
      for this combat).<br />The bodyguard must be up when casting this skill or must go down in the combat you are
      using this skill.<br />If your bodyguard is taken out or willingly accepts this transfer, you gain the
      following:</p><ul><li>You gain any higher stat that your bodyguard has above yours.</li><li>You gain proficiency
      in his weapons and a copy made of pure chakra of his weapon (with the possibility to use its basic attack like
      Heavy Punch, Slash and Stab, Chakra Bolt, Illusory Attack), but with damage becoming force and you gain half of
      his current HP as temporary HP.</li><li>You gain half your level of the jutsu he knows, but only to a rank lower
      than his maximum (min. D rank).</li><li>Your AC increases to match his. If your AC is already higher, you gain +2
      AC.</li><li>Your saving throws increase to match your bodyguard's. If yours are higher, you gain +2.</li><li>Your
      movement increases by 15 feet.</li><li>You gain an extra action to use during your turn. This action can be used
      to make an attack action, cast a jutsu with a casting time of a bonus action or less, or use it to
      dash/disengage.</li></ul><p>This can be done once per day and lasts until the combat is over. If the bodyguard was
      unconscious, he follows the usual rules.<br />If he disappeared due to the usage of this skill, he will reappear
      after a short rest.</p>
    chat: ''
