system:
  description:
    value: >-
      <p>As a Geisha, you specialize in the arts that define your clan. Choose one of the following paths, as this will
      shape your progression and abilities.<br />Once selected, your chosen path will also allow you to learn jutsu
      related to it in half the usual time, but will double the learning time for the other two categories (These
      effects do not stack with similar ones).</p><ul><li><strong>Dancer:</strong> You master the art of moving with
      grace, precision, and elegance. You can use your Charisma for Taijutsu and
      Bukijutsu.</li><li><strong>Strategic:</strong> You learn logical games like Shogi and become a captivating
      intellectual companion for those who seek a challenge. You can use your Charisma for
      Ninjutsu.</li><li><strong>Eloquence:</strong> You learn the power of words and beauty, setting the perfect
      atmosphere for engaging discussions and charming company. You can use your Charisma for Genjutsu</li></ul>
