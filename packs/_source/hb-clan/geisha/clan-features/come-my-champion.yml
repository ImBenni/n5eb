img: systems/n5eb/assets/content/clans/geisha.webp
system:
  description:
    value: >-
      <p>At level 7, you can recall your bodyguard even if they have already been defeated by using the special seal
      applied to them.<br />Your bodyguard will reappear within 5 ft of your position with half of their max HP and half
      of their chakra.<br />After combat, your bodyguard will suffer 3 exhaustion points, which will be reduced by 1 per
      long rest or fully recovered during a full rest.<br />These exhaustion points cannot be cured or reduced by any
      means except by the bodyguard's own traits.<br />You can only recall your bodyguard once per full rest or after
      they have recovered from all of their exhaustion points.</p>
