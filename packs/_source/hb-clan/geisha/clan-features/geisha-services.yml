name: Geisha Services
type: feat
_id: KzXbNvEqhauOESnN
img: systems/n5eb/assets/content/clans/geisha.webp
system:
  description:
    value: >-
      <p>Starting at 1st level, you begin to spread your presence and reputation as a Geisha, making people speak highly
      of you wherever you go.<br />During downtime, you can work as a Geisha and get paid for it. Not only that, but you
      can also "sow rumors" (Team 7 - Kakashi's Logbook on Kage Strategy) for free during your working time, using your
      performance for this activity.<br />The following table is indicative; the DM can modify it based on their needs
      and world settings:</p><p></p><ul><li>D rank – DC 14 – Duration: 2 DT – 500 Ryo</li><li>C rank – DC 17 – Duration:
      4 DT – 1200 Ryo</li><li>B rank – DC 21 – Duration: 8 DT – 2750 Ryo</li><li>A rank – DC 25 – Duration: 10 DT – 3850
      Ryo</li><li>S rank – DC 28 – Duration: 12 DT – 5100 Ryo</li></ul><p></p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-downtime-20.webp" /><p></p><p>At level 7, you gain access to a
      special case that allows you to create items using unique reagents known only to the Geisha clan.<br />This
      special case can produce consumables (pills, tools, poisons, etc.) of any type up to a total value of 50 Ryo per
      level.<br />The items you create can range in rarity, with greater rarity available at level 5, superior rarity at
      level 10, and supreme rarity at level 15.</p><p>Additionally, the special case can create simple weapons or ammo.
      These items will only last for the day, as they are made from materials that deteriorate afterwards.<br />Once the
      amount of Ryo used has been expended, the special case needs a full rest to recharge with the necessary
      reagents.</p>
