img: systems/n5eb/assets/content/clans/geisha.webp
system:
  description:
    value: >-
      <p>At level 15, you become the representation of the ideal Geisha, earning the prestigious title of Tayu, one of
      the highest and most respected titles in the Clan.<br />No Geisha, except for the Okiya and matrons stands above
      you, and even the matrons deeply respect you, considering you the most precious girl in the Clan, to be protected
      at all costs.<br />As a result, you are granted access to every social event, with no one daring to refuse your
      presence. Even high nobles or leaders will find it difficult to decline your esteemed attendance.<br
      />Additionally, you can now use your "Come My Champion" Trait without needing a rest or suffering any
      repercussions. Your bodyguard will return fully healed with max HP and chakra, and will not suffer exhaustion
      after combat.<br />You can use this ability once per long rest.<br />Furthermore, you gain advantage on any
      Charisma saving throws you are subjected to.<br />Your natural beauty transcends mortal limitations, increasing
      your Charisma maximum by 2 and boosting your current Charisma by 2 as well.</p>
    chat: ''
