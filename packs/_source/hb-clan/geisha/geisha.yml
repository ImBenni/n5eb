system:
  description:
    value: >-
      <h2 id="the-geisha-clan">The Geisha Clan</h2><p>The Geisha clan emerged after the war era and quickly gained
      renown in the years that followed.<br />Their exceptional talents earned them a sacred place of their own, much
      like the revered domains of the sage beasts, a breathtaking sanctuary known as Hanamachi, or the Flower Town.<br
      />This place serves as the heart of the clan, where aspiring Geisha undergo their final stages of training under
      the watchful eyes of the Okiya, revered leader of the clan.<br />Over time, this all-female clan expanded its
      influence far and wide, becoming highly respected by everyone, from commoners to nobles and leaders. (Created By
      Liviu50)</p><h3 id="geisha-traits">Geisha Traits</h3><p><strong>Recommended Ability Score Increase:</strong> +2
      Cha, +1 secondary stat.<br /><strong>Speed:</strong> Your base walking speed is 25 ft.<br /><strong>Skill
      Proficiencies:</strong> Performance and choose 1 between ninshou, martial arts or illusions.<br /><strong>Extra
      Language:</strong> Standard + two extra dialects of your choice.<br /><strong>Beauty Literacy:</strong> As a
      Geisha, you specialize in the arts that define your clan. Choose one of the following paths, as this will shape
      your progression and abilities.<br />Once selected, your chosen path will also allow you to learn jutsu related to
      it in half the usual time, but will double the learning time for the other two categories (These effects do not
      stack with similar ones).</p><ul><li><strong>Dancer:</strong> You master the art of moving with grace, precision,
      and elegance. You can use your Charisma for Taijutsu and Bukijutsu.</li><li><strong>Strategic:</strong> You learn
      logical games like Shogi and become a captivating intellectual companion for those who seek a challenge. You can
      use your Charisma for Ninjutsu.</li><li><strong>Eloquence:</strong> You learn the power of words and beauty,
      setting the perfect atmosphere for engaging discussions and charming company. You can use your Charisma for
      Genjutsu.</li></ul>
