    value: >-
      <p><strong data-start="63" data-end="76">Category:</strong> Clan<br data-start="81" data-end="84" /><strong
      data-start="84" data-end="101">Prerequisite:</strong> Ghoul Clan, Level 16+<br data-start="123" data-end="126"
      />You have become what many ghouls envy, developing a second Kagune. You gain the following benefits:<br
      data-start="225" data-end="228" />• Increase your Constitution score by +1, to a maximum of 20.<br
      data-start="289" data-end="292" />• You gain another Kagune type aside from the one you previously selected.<br
      data-start="366" data-end="369" />• You gain the Invigorated Cell feature of your Second Kagune.<br
      data-start="431" data-end="434" />• When you activate your Kagune, both become active.</p>
