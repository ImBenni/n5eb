system:
  description:
    value: >-
      <p><strong data-start="64" data-end="77">Category:</strong> Clan<br data-start="82" data-end="85" /><strong
      data-start="85" data-end="102">Prerequisite:</strong> Ghoul Clan, You must take this feat between levels 1 and 4.
      If you are level 5+, you cannot take this feat.<br data-start="210" data-end="213" />You were not born a ghoul,
      instead being born human and becoming a ghoul later in life. You gain the following benefits:<br data-start="333"
      data-end="336" />• Increase your Constitution score by +1, to a maximum of 20.<br data-start="397" data-end="400"
      />• Your Kagune deals an additional amount of damage equal to your Constitution modifier.<br data-start="487"
      data-end="490" />• When you use the Ghoulish Regeneration RC Cell ability, you instead regain a number of hit
      points equal to 1.5x the number of RC Cells spent (Rounded Up).</p>
