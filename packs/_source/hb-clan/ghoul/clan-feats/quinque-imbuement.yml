system:
  description:
    value: >-
      <p><strong data-start="63" data-end="76">Category:</strong> Clan<br data-start="81" data-end="84" /><strong
      data-start="84" data-end="101">Prerequisite:</strong> Ghoul Clan<br data-start="112" data-end="115" />You have
      learned to imbue a weapon with your Kagune, transforming it into a more powerful version called a Quinque. You
      gain the following benefits:<br data-start="263" data-end="266" />• Increase your Strength or Dexterity score by
      +1, to a maximum of 20.<br data-start="336" data-end="339" />• While you are wielding a weapon with which you are
      proficient, you may use a Bonus Action to imbue it with your Kagune for 1 minute. While a weapon is imbued with
      your Kagune, its damage becomes your Kagune's damage.<br data-start="557" data-end="560" />• While wielding a
      weapon imbued with your Kagune, you cannot be disarmed of it, and it cannot be broken.<br data-start="665"
      data-end="668" />• You cannot activate your Kagune while it is imbued into a weapon.</p>
