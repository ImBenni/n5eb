system:
  description:
    value: >-
      <p><strong data-start="63" data-end="76">Category:</strong> Clan<br data-start="81" data-end="84" /><strong
      data-start="84" data-end="101">Prerequisite:</strong> Ghoul Clan, Level 12+<br data-start="123" data-end="126"
      />Your RC Cells have evolved to flow seamlessly into your Chakra network and brain, expanding your ability to
      utilize them in more unique ways. You gain the following benefits:<br data-start="300" data-end="303" />• Increase
      your Constitution score by +1, to a maximum of 20.<br data-start="364" data-end="367" />• When you use Ghoulish
      Regeneration, you can choose to instead regain Chakra Points.<br data-start="452" data-end="455" />• You can use
      Ghoulish Resilience when you would fail an Intelligence, Wisdom, or Charisma saving throw.<br data-start="559"
      data-end="562" />• You can use Ghoulish Strength to instead reduce damage received by three times the number of RC
      Cells spent.</p>
