name: Invigorating Cells
type: feat
_id: b97EBkD69GOFIh1f
img: systems/n5eb/assets/content/clans/ghoul.webp
system:
  description:
    value: >-
      <p><strong data-start="102" data-end="120">At 11th Level,</strong> you have found a way to further your use of
      your RC Cells, you gain the following option for using your RC Cells:<br data-start="234" data-end="237" />•
      <strong data-start="239" data-end="263">Ghoulish Resilience:</strong> When you would fail a Strength, Dexterity,
      or Constitution saving throw, you can spend 3 RC Cells to reroll the save, taking the second result.<br
      data-start="407" data-end="410" />• <strong data-start="412" data-end="431" data-is-only-node>Ghoulish
      Blitz:</strong> When you take the attack action with your Kagune, you can spend 2 RC Cells to make an additional
      attack. Starting at 15th level, you can use this twice per turn.</p><p data-start="597" data-end="1257">You also
      gain an additional effect dependent on your Kagune type:<br data-start="662" data-end="665" />• <strong
      data-start="667" data-end="677">Ukaku:</strong> When initiative is rolled you can spend any number of RC Cells
      adding them to your initiative modifier.<br data-start="781" data-end="784" />• <strong data-start="786"
      data-end="798">Koukaku:</strong> When you would be reduced to 0 Hit Points and have your Kagune active, you can
      spend 5 RC Cells to block the attack, preventing you from dying, reducing the damage to 0. Your Koukaku breaks
      after using this ability.<br data-start="1014" data-end="1017" />• <strong data-start="1019"
      data-end="1031">Rinkaku:</strong> When you would use the Ghoulish Regeneration RC Cell ability, you add your
      Constitution modifier to the amount of hit points gained each turn.<br data-start="1174" data-end="1177" />•
      <strong data-start="1179" data-end="1190">Bikaku:</strong> Choose one option from the above. This choice cannot be
      changed.</p>
