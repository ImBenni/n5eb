folder: tlbpEEa4ff87iKeL
name: Kagune
type: feat
_id: wdpG7VqQGA7aP1O8
img: systems/n5eb/assets/content/clans/ghoul.webp
system:
  description:
    value: >-
      <p>At 3rd level, you have awakened your Kagune, a unique natural weapon. Choose between the following options,
      Additionally, choose between Bludgeoning, Piercing and Slashing, Your Kagune deals the chosen damage type. This
      cannot be changed later.</p><p data-start="363" data-end="774"><strong data-start="363"
      data-end="373">Ukaku.</strong> Ukaku type Kagune manifest from the shoulder area in a feather-like pattern and are
      used to make multiple highspeed attacks by firing crystal-like shards of condensed RC Cells. Your Ukaku is a
      ranged natural weapon that deals 2d6 damage, and has the following properties; Range 60/120, Multiattack. Your
      Ukaku has a number of Hit Points equal to your Constitution Modifier times 10 and an AC of 20.</p><p
      data-start="776" data-end="1191"><strong data-start="776" data-end="788">Koukaku.</strong> Koukaku type Kagune
      manifest from below the shoulder blade forming a weapon out of highly condensed RC Cells. The high density of RC
      Cells in a Koukaku makes it a great defensive weapon. Your Koukaku is a melee natural weapon that deals 2d8
      damage, and has the following properties; Blocking, Trip. Your Koukaku has a number of Hit Points equal to your
      Constitution Modifier times 20 and an AC of 25.</p><p data-start="1193" data-end="1648"><strong data-start="1193"
      data-end="1205">Rinkaku.</strong> Rinkaku type Kagune manifest from the back around the waist creating a tentacle
      like form. The RC Cells that make up a Rinkaku are extremely malleable making for a weapon with extreme striking
      power but a very fragile form. Your Rinkaku is a melee natural weapon that deals 2d12 damage, and has the
      following properties; Critical, Reach 3. Your Rinkaku has a number of Hit Points equal to your Constitution
      Modifier times 5 and an AC of 15.</p><p data-start="1650" data-end="2054"><strong data-start="1650"
      data-end="1661">Bikaku.</strong> Bikaku type Kagune manifest from the coccyx in a more traditional tail. The
      Bikaku is a balanced point between the other three Kagune making it a very versatile weapon. Your Bikaku is a
      melee natural weapon that deals 2d10 damage, and has the following properties; Finesse, Grapple, Reach 2. Your
      Ukaku has a number of Hit Points equal to your Constitution Modifier times 5 and an AC of 15.</p><p
      data-start="2056" data-end="2185">You can activate your Kagune as a Bonus Action, and it remains active for 1
      minute or until you deactivate it as a free action.</p><p data-start="2187" data-end="2594">Your Kagune is not
      affected by area of effects, and any healing you receive also restores your Kagune's Hit Points. As a reaction to
      being targeted by an attack, you can use your Kagune to intercept an attack, it becomes the new target of the
      attack and suffers all effects and damage on hit. If your Kagune reaches 0 Hit Points, then it breaks being unable
      to be activated until you complete a long rest.</p><p data-start="2596" data-end="2690">You can activate your
      Kagune a number of times equal to your Constitution modifier per rest.</p><p>Starting at 15th level, your Kagune
      has grown in strength. Your Kagune gains an additional die of damage, and the following properties depending on
      your Kagune type:</p><p data-start="271" data-end="563"><strong data-start="271" data-end="281">Ukaku.</strong>
      Your Kagune gains the Disarm property.<br data-start="320" data-end="323" /><strong data-start="323"
      data-end="335">Koukaku.</strong> Your Kagune gains the Reach 1 property.<br data-start="375" data-end="378"
      /><strong data-start="378" data-end="390">Rinkaku.</strong> Your Kagune gains the Deadly property.<br
      data-start="429" data-end="432" data-is-only-node /><strong data-start="432" data-end="443">Bikaku.</strong>
      Choose 1 property from the other options or between the Multiattack, Blocking, Trip, Critical, or Reach 3
      properties.</p>
