name: Kakuja
type: feat
_id: mrmNTAOZG39qp25n
img: systems/n5eb/assets/content/clans/ghoul.webp
system:
  description:
    value: >-
      <p><strong data-start="98" data-end="148">When a Ghoul's RC Cell count reaches its peak,</strong> their Kagune
      goes through a mutation able to transform itself into a more powerful exoskeleton-like armor called a <strong
      data-start="264" data-end="275">Kakuja.</strong> Starting at <strong data-start="288" data-end="303">18th
      level,</strong> you can don your Kakuja as an Action, also activating your Kagune. While your Kakuja is active you
      gain the following benefits:</p><p data-start="435" data-end="675">• The damage of your Kagune increases by
      <strong data-start="476" data-end="486">1 die.</strong><br data-start="486" data-end="489" />• Your Kagune <strong
      data-start="503" data-end="524">cannot be broken.</strong><br data-start="524" data-end="527" />• Your <strong
      data-start="534" data-end="605">AC equals 10 + your Constitution modifier + your proficiency bonus.</strong><br
      data-start="605" data-end="608" />• You <strong data-start="614" data-end="673">regain 1d4 RC Cells at the start
      of each of your turns.</strong></p><p data-start="677" data-end="961">Your Kakuja remains active for <strong
      data-start="708" data-end="721">1 minute.</strong> At the start of each of your turns, you must make a <strong
      data-start="774" data-end="834">Wisdom saving throw vs a DC of 10 + the number of rounds</strong> since you have
      donned your Kakuja. On a <strong data-start="875" data-end="891">failed save,</strong> you gain the <strong
      data-start="905" data-end="926">berserk condition</strong> until the end of your next turn.</p><p data-start="963"
      data-end="1114">You can <strong data-start="971" data-end="1010">don your Kakuja once per long rest.</strong> You
      can spend <strong data-start="1025" data-end="1039">3 Hit Dice</strong> to regain the ability to don your Kakuja
      without completing a long rest.</p>
