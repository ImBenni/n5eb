system:
  description:
    value: >-
      <p>Also at 1st level, you are naturally suited for hunting prey. You gain a Bite attack, which deals 1d6 Piercing
      damage and uses your Strength or Dexterity for attack and damage rolls. Additionally, As an Action, you may
      consume a deceased human regaining a number of RC Cells equal to the rank of the creature (Minion: 1, Standard: 3,
      Elite: 5, Solo: 10). You can regain a number of RC Cells in this way equal to 3 times your Constitution modifier
      per long rest.</p>
