  description:
    value: >-
      <h3 data-start="101" data-end="128"><strong data-start="105" data-end="126">A LIFE IN SHADOWS</strong></h3><p
      data-start="129" data-end="594">Ghouls. Man-eating "monsters" that live throughout human society, doing their best
      to blend in. While some people will tell you that all ghouls are evil creatures that should be exterminated, that
      isn't the case for every ghoul. It is true, however, that ghouls must eat humans to survive, but they also share
      many similar traits with humans, having the same physical appearance and intelligence, with the exception being
      their inner biology, mentality, and diet.</p><h3 data-start="596" data-end="618"><strong data-start="600"
      data-end="616">GHOUL TRAITS</strong></h3><p data-start="619" data-end="1058"><strong data-start="619"
      data-end="646">Ability Score Increase:</strong> +2 Constitution, +1 Strength or Dexterity<br data-start="688"
      data-end="691" /><strong data-start="691" data-end="701">Speed:</strong> Your base walking speed is 30 feet<br
      data-start="736" data-end="739" /><strong data-start="739" data-end="761">Skill Proficiency:</strong> Stealth,
      Survival<br data-start="779" data-end="782" /><strong data-start="782" data-end="796">Man-Eater:</strong> Due to
      the nature of being a Ghoul, you cannot sustain yourself on regular food and must instead feed on humans. You
      multiply the amount of time you can go without eating by 5, but in order to satiate your hunger, you must eat at
      least a pound of human flesh.</p>
