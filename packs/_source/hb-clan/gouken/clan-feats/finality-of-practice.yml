name: Finality of Practice
type: feat
_id: N14C0ZlTgh4rJxEg
img: systems/n5eb/assets/content/clans/gouken.webp
system:
  description:
    value: >-
      <p><strong data-start="51" data-end="64">Category:</strong> Clan<br data-start="69" data-end="72" /><strong
      data-start="72" data-end="89">Prerequisite:</strong> Gouken Clan, Level 12+</p><p data-start="116"
      data-end="1066">The burden of being a true master of fighting, is that there will always be those who try to
      oppose you. You are the pinnacle, the peak, that they all will try to reach. While in combat, once per long rest,
      as an action, you can mark an enemy as your true rival, and you become their true rival, until you or the rival is
      reduced to 0 hit points, you both gain the following:<br data-start="491" data-end="494" />• You gain a +3 to
      attack and damage rolls against your True Rival<br data-start="560" data-end="563" />• Attacks you make against
      your True Rival have a +1 Critical Threat Range<br data-start="637" data-end="640" />• Whenever your True Rival
      misses you with an attack roll, you can, as a free action, make a single Unarmed Attack against them.<br
      data-start="768" data-end="771" />• Your True Rival cannot be hidden from you by any means, and you automatically
      critically succeed checks to recall information, follow their tracks, and Wisdom (Perception) checks against
      them.<br data-start="965" data-end="968" />• While your True Rival is alive, you cannot gain the benefit of
      Healing, or Long or Short Rests</p><p data-start="1068" data-end="1455">Adversely, while this feature is active,
      you gain the following negatives, while the creature you marked with this feature does not:<br data-start="1200"
      data-end="1203" />• Enemies who aren't your true rival gain a +2 to attack rolls against you<br data-start="1277"
      data-end="1280" />• You have Disadvantage on attack rolls against creatures who aren't your true rival<br
      data-start="1364" data-end="1367" />• You cannot expend Ki Die to affect a creature with a Jutsu who isn't your
      true rival</p>
