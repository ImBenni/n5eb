    value: >-
      <p><strong data-start="51" data-end="64">Category:</strong> Clan<br data-start="69" data-end="72" /><strong
      data-start="72" data-end="89">Prerequisite:</strong> Gouken Clan, Level 10+, a fighting or weapon stance.<br
      data-start="142" data-end="145" />Your fighting style is unique, and nobody can predict your striking stance.<br
      data-start="220" data-end="223" />• Choose one fighting or weapon stance that you know, you are always considered
      to be under this stance, even when you would enter another stance. You cannot change what stance is selected when
      you take this feat at any time.<br data-start="448" data-end="451" />• Whenever you reduce a creature to 0 hit
      points, you regain 1 Ki die.</p>
