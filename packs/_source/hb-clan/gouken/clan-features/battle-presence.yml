system:
  description:
    value: >-
      <p>Starting at 1st level, you have become a force to be reckoned with on the battlefield. You gain a number of
      d4's called "Ki Dice" that you can spend while in combat. You have a number of these dice equal to your
      Proficiency modifier. You regain all expended Ki Dice at the end of a short rest. At 3rd level, your Ki Dice
      increases to a d6, at 7th level it becomes a d8, at 11th level it becomes a d10, and at 18th it becomes a d12.</p>
