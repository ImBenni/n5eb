system:
  description:
    value: >-
      <p>This technique is a more advanced version of the Glimmer Dragon technique. Until the end of your next turn,
      whenever a creature would score a critical hit against you, including the critical hit that triggered this Jutsu,
      that attack's damage is reduced to 0. Each time an attack is prevented this way, you may expend a Ki Die to make
      an attack against them or cast a Gouken Hijutsu or Taijutsu of C-Rank or lower that only targets
      them.</p><p><strong>Empower:</strong> When you would make an attack from this Jutsu, you may expend a Ki Die,
      rolling it and adding the result to the attack roll.</p><p><strong>At Higher Ranks:</strong> For each rank above
      B-Rank, this Jutsu costs 3 more chakra. At A-Rank, you may cast a Jutsu of B-Rank or lower, and at S-Rank, you may
      cast a Jutsu of A-Rank or lower when you deflect an attack.</p>
