system:
  description:
    value: >-
      <p>You attempt to strike right at your opponent's heart. Make a Taijutsu melee attack. On a hit, the target takes
      2d4 + your Unarmed damage as necrotic damage and is Weakened until the end of their next turn.</p><p>If this Jutsu
      is cast as a Finisher, instead make a Taijutsu Melee attack. On a hit, the target takes 4d4 + your Unarmed damage
      as necrotic damage and is Weakened and Dazed until the end of your next turn.</p><p>If you roll 3 or more 4's on
      the d4 of this Jutsu's damage, the creature's chakra is reduced by an amount equal to twice the damage of this
      Jutsu.</p><p><strong>Empower:</strong> When casting this Jutsu, you may expend a Ki Die to increase the damage die
      by 1.</p>
