system:
  description:
    value: >-
      <p>You ready yourself for combat and steel your mind for battle.</p><p>For the duration of this Jutsu, while not
      wearing armor, your AC is 10 + your Constitution Modifier + your Taijutsu or Ninjutsu ability modifier. If your
      Constitution or Taijutsu or Ninjutsu ability modifiers are above 20 (+5), they are treated as being 20 (+5) for
      the purposes of this Jutsu instead.</p><p><strong>Empower:</strong> While this Jutsu is active, as a reaction to a
      creature making an attack roll against you, you may expend a Ki Die to increase your AC by 2 against the
      triggering attack.</p>
