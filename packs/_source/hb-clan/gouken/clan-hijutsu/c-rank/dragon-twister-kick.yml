system:
  description:
    value: >-
      <p>This Jutsu cannot score critical hits. You begin an upward spin of deadly kicks. Make 1d4 Melee Taijutsu
      attacks against a creature within range. On a hit, you deal your Unarmed Damage.</p><p><strong>Empower:</strong>
      You may expend a Ki Die as you cast this Jutsu, increasing the number of attacks by 1.</p><p><strong>At Higher
      Ranks:</strong> For each rank above C-Rank, increase the cost of this Jutsu by 3 Chakra and increase the dice step
      of the die used to determine the number of attacks by 1 (d4 &gt; d6 &gt; d8).</p>
