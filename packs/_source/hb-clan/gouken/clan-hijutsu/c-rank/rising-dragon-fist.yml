system:
  description:
    value: >-
      <p>You attempt to strike a devastating blow, launching your target into the air. Make a melee Taijutsu attack
      against a target in range. On a hit, that creature takes your unarmed damage as force damage, and you and they are
      launched 15 feet into the air for each hit landed. They must then make a Constitution Saving Throw. On a failed
      save, they are stunned until the end of your turn.</p><p>Until the end of your turn, you can target one affected
      creature with a Taijutsu Finisher regardless of range, once per turn, using either an Action or Bonus Action,
      ignoring its listed casting time.</p><p><strong>Empower:</strong> When you cast this Jutsu, you may expend a Ki
      Die. If you do, make an additional attack against the target.</p>
