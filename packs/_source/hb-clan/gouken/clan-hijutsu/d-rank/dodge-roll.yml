system:
  description:
    value: >-
      <p>You duck and weave as best as you can. You gain a +2 to the triggering Dexterity saving
      throw.</p><p><strong>Empower:</strong> If you spend a Ki Die when casting this Jutsu, you gain an additional +1 to
      that save.</p><p><strong>At Higher Ranks:</strong> For each rank above D-Rank, this Jutsu costs 3 more chakra and
      adds an additional +1 to the saving throw. At A-Rank, you instead gain the bonus to Dexterity saving throws until
      the end of your turn.</p>
