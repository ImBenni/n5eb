system:
  description:
    value: >-
      <p>You summon a ball of fury in your palm. Make a Ranged Taijutsu or Ninjutsu attack against a creature within
      range. On a hit, you deal 2d12 Force Damage.</p><p><strong>Empower:</strong> When you cast this Jutsu, you may
      expend a Ki Die. If you do, double its range and add an additional die of damage.</p><p><strong>At Higher
      Ranks:</strong> For each rank above D-Rank, this Jutsu costs 3 more chakra, and you may make an additional attack
      against a different creature in range.</p>
