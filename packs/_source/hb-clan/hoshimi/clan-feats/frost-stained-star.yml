system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan</p><hr /><p><strong>Prerequisite</strong>: Hoshimi Clan, Level 4+</p><hr
      /><p>Most members of the Hoshimi clan have blood on their hands, due to their history of swordsmanship.
      Frost-laden blood.</p><ul><li>Increase your Dexterity or Wisdom Score by +1, up to a maximum of +20.</li><li>Up to
      twice per round, when an allied creature inflicts a <strong>Hunt Target(s)</strong> with an <em>Elemental</em> or
      <em>Physical</em> Condition, you regain 1 <strong>Frozen Dice</strong>.</li><li>Increase the size of your
      <strong>Frozen Dice</strong> by 1 category. (d6 &gt; d8 &gt; d10 &gt; d12)</li><li>Increase the amount of
      <strong>Frozen Dice</strong> you can spend on the effects of <em>Freezing Chakra</em> by +1.</li></ul>
