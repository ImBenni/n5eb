system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan</p><hr /><p><strong>Prerequisite</strong>: Hoshimi Clan, Level 16+</p><hr
      /><p>The traditions and techniques of the Hoshimi clan make you unrivaled at your combat
      style.</p><ul><li>Increase your Dexterity or Wisdom Score by +1, up to a maximum of +20.</li><li>You gain 1
      additional benefit of the <em>Inherited, Trained, Mastery</em> Feature. You cannot choose a benefit you have
      already chosen.</li><li>Increase the size of your <strong>Frozen Dice</strong> by 1 category. (d6 &gt; d8 &gt; d10
      &gt; d12)</li><li>Increase the amount of <strong>Frozen Dice</strong> you can spend on the effects of <em>Freezing
      Chakra</em> by +1.</li></ul>
