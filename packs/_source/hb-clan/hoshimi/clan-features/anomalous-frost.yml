folder: slCms0icPW2Z8vtB
name: Anomalous Frost
type: feat
_id: s0vvXkeRYSOt4QyU
img: systems/n5eb/assets/content/clans/hoshimi.webp
system:
  description:
    value: >-
      <p>At 11th level, when you inflict ranks of Chilled on a creature, you can spend <strong>Frozen Dice</strong>
      equal to the amount of ranks the creature gained. The affected creature loses all gained ranks of Chilled and they
      are replaced by an equal amount of ranks of <strong>Frosted</strong>.</p><p>A creature ranks of
      <strong>Frosted</strong> suffers the following effects.</p><ul><li>Ranks of Frosted are counted as ranks of
      Chilled for the purposes of interacting with features, traits, and jutsu.</li><li>A Frosted creature remains
      Frosted for 10 minutes.</li><li>Whenever a Frosted creature would take Cold Damage, they take an additional 1d4
      Cold Damage for each rank of Frosted they have.</li><li>If a Frosted Creature would cast a jutsu with the Wind
      Release or Water Release Keyword, the cost of the jutsu is increased by 2 for each rank of Frosted they have, and
      they take 1 Cold Damage.</li><li>A creature can only have up to 5 ranks of
      Frosted.</li><li><strong>Abberations</strong> cannot remove this condition through the effects of a
      jutsu.</li><li><strong>Monstrosities</strong> cannot remove this condition through a jutsu of B-Rank or
      lower.</li></ul>
