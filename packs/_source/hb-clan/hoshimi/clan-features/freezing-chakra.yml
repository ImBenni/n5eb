name: Freezing Chakra
type: feat
_id: rjzUUomtosjJMUFo
img: systems/n5eb/assets/content/clans/hoshimi.webp
system:
  description:
    value: >-
      <p>At 3rd level, the Hoshimi clan gains access to a resource called <strong>Frozen Dice</strong>, which are d6s.
      You gain an amount of <strong>Frozen Dice</strong> equal to your Character Level. You can spend your
      <strong>Frozen Dice</strong> for any of the following;</p><ul><li>When you would cast a Jutsu that has an effect
      that can be activated by paying additional Chakra, you can roll up to 2 Frozen Dice and reduce the additional
      Chakra cost by the rolled amount.</li><li>You can use your Bonus Action to spend a Frozen Dice and gaining
      Temporary Hit Points equal to twice the result of the Frozen Die.</li><li>When you would make a Melee Weapon
      Attack or Melee Taijutsu Attack with a weapon, you can spend 1 Frozen Dice to treat the weapon's damage type as
      Cold Damage, and add the Frozen Dice to the weapon's damage.</li><li>When you would deal damage to a creature with
      ranks of the Chilled condition using a Bukijutsu, you can spend an amount of Frozen Dice up to the amount of
      Chilled ranks to deal an additional 1d8 Cold Damage per Frozen Dice spent.</li></ul><p>You can spend up to 1
      additional <strong>Frozen Dice</strong> on each of these effects at 7th, 11th, 15th and 18th level.</p><p>You
      regain half of your spent <strong>Frozen Dice</strong> upon finishing a Short Rest, and all of your spent
      <strong>Frozen Dice</strong> upon finishing a Long or Full Rest.</p>
