name: Frosted Blades
type: feat
_id: X5NgJvJlwhyp33JU
img: systems/n5eb/assets/content/clans/hoshimi.webp
system:
  description:
    value: >-
      <p>Also at 1st level, the members of the Hoshimi clan utilize their kekkei genkai through weaponry. When you learn
      a Bukijutsu, you can give it the Water Release and Wind Release Keywords, and can change any conditions inflicted
      to Chilled. Additionally, if that jutsu requires a target to be affected by a specific Condition (except for
      prone, restrained, and grappled), the required condition becomes Chilled.</p><p>If the Bukijutsu already has an
      Elemental Release Keyword, its pre-existing Keywords are replaced with Wind and Water Release, its damage type is
      changed to Cold, and any Elemental Conditions become Chilled.</p><p>Starting from 3rd level, once per round, when
      you deal damage with a Bukijutsu that has the Water Release and Wind Release Keywords against an
      <strong>Abberation</strong> or <strong>Monstrosity</strong>, you can force the affected creature(s) to make a
      Constitution Saving Throw against your Taijutsu Save DC, gaining 1 rank of Chilled and taking 3d4 Cold Damage on a
      failed save. If the affected creature is an <strong>Abberation</strong>, they take half damage on a successful
      save. This becomes 3d6 Cold Damage at 11th level, and 3d8 at 18th level.</p>
