img: systems/n5eb/assets/content/clans/hoshimi.webp
system:
  description:
    value: >-
      <p>At 15th level, You can bring yourself deeper into the heritage and teachings of the Hoshimi clan. You gain 1 of
      the following benefits;</p><ul><li><strong>Mastery of the Blade.</strong> You gain 1 rank of Mastery in 1 Melee
      Weapon you are proficient in.</li><li><strong>Mastery of the Hunt.</strong> You gain 1 rank of Mastery in the
      Survival, Investigation, and Perception skills. If you do not have proficiency in them, you instead gain
      proficiency.</li><li><strong>Mastery of the Frost.</strong> You gain a +2 bonus to Concentration checks and Clash
      checks made involving jutsu you cast with both the Water Release and Wind Release Keywords.</li></ul><p>You can
      choose an additional bonus at 18th level. You can choose the same bonus twice.</p>
