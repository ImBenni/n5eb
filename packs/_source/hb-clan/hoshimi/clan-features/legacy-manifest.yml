system:
  description:
    value: >-
      <p>At 18th level, you've fully mastered the Hoshimi clan's techniques and legacy, granting you the following
      benefits;</p><ul><li>You regain 1 <strong>Frozen Dice</strong> at the start of each of your turns in
      combat.</li><li>When you spend <strong>Frozen Dice</strong> on your turn, you gain resistance to Cold Damage and
      Wind Damage until the start of your next turn.</li><li>Once per combat, you can force a creature to make a Saving
      Throw against a Hoshimi clan Hijutsu at Disadvantage with a -1d4 penalty by spending 3 <strong>Frozen
      Dice</strong>.</li></ul>
