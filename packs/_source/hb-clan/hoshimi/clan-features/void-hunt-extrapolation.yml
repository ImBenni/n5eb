img: systems/n5eb/assets/content/clans/hoshimi.webp
system:
  description:
    value: >-
      <p>Also starting at 7th level, when your <strong>Hunt Target</strong> is reduced to 0 Hit Points, you can
      immediately choose another creature you can see to become your <strong>Hunt Target</strong>. Additionally, when
      you initially select a creature to become a <strong>Hunt Target</strong>, you can select 2 creatures instead. You
      can choose to mark the same creature multiple times, each time selecting a different creature type.</p><p>At 11th
      level, you can instead select 3 creatures.</p><p>At 15th level, when a <strong>Hunt Target</strong> is reduced to
      0 Hit Points, you gain <strong>Frozen Dice</strong> equal to the rank of the adversary (D-Rank = 1, C-Rank = 2,
      B-Rank = 3, A-Rank = 4, S-Rank = 5).</p>
