system:
  description:
    value: >-
      <p>You unleash a massive amount of frost release chakra through your weapon, before moving at a high speed to
      slash all around an area. All creatures of your choice within range must make a Dexterity Saving Throw, taking
      [Weapons Damage] + 12d8 Cold Damage on a failed save and gaining 2 ranks of chilled, or half as much damage and no
      ranks of chilled on a successful one.</p><p>You can spend 10 additional chakra to sheath your weapon afterwards,
      relasing a finishing flurry of ice slashes in the same area. Forcing all creatures within range to make a
      Dexterity Saving Throw, taking 5d8 Cold Damage on a failed save.</p><p>This Jutsu ignores resistances and treats
      immunities as resistance for <strong>Abberations</strong>. Additionally, if an <strong>Abberation</strong> fails
      both saving throws by 5 or more, they are stunned until the end of their next turn.</p><hr /><p><strong>At Higher
      Ranks</strong>: For each rank you cast this justu above A-Rank, increase the cost by 3, and the damage by 2d8 and
      2d8 respectively.</p>
