system:
  description:
    value: >-
      <p>You coat your weapon in frost release chakra, and use it to slash an area you can see at a distance. Select a
      space you can see within range. All creatures within 5 feet of this space must make a Dexterity Saving Throw. On a
      failed save, a target takes [Weapons Damage] + 4d8 Cold and gains 1 rank of chilled, or half as much and no ranks
      of chilled on a success.</p><p>Additionally, you can choose to spend an additional 6 Chakra to use this jutsu
      again targeting the same space, forcing all creatures to repeat the saving throw. You can do this twice per
      casting.</p><p><strong>Abberations</strong> take an additional +1d6 Cold Damage for each rank of Chilled they
      have. <strong>Monstrosities</strong> take an additional +1d4 Cold Damage for each rank of Chilled they
      have.</p><hr /><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above B-Rank increase the
      cost of this jutsu by 3 and the number of spaces you can select by +1. A creature can only be affected by one
      instance this jutsu at a time.</p>
