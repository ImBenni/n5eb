system:
  description:
    value: >-
      <p>You charge up your frost release chakra even more inside your weapon's sheath before releasing it, slashing an
      area in front of you at lightning fast speeds. Make a Melee Taijutsu Attack and compare the result against the AC
      of all creatures within range. On a hit, creatures take [Weapons Damage] + 3d6 Cold Damage and gain 1 rank of
      Chilled. You then regain 1 <strong>Frozen Dice</strong> if you hit 5 or more creatures.</p><p>You can choose to
      spend an additional 10 Chakra, to dash through the area you cut and unleash a finishing flurry around you. Move to
      an unoccupied space within 5 feet of the end of this jutsu's range. All creatures of your choice must make a
      Dexterity Saving Throw, taking 4d8 Cold Damage on a failed save, or half as much on a successful one. If a
      creature fails this save 10 or more, or rolls a natural 1 on the saving throw, you regain your reaction.</p><hr
      /><p><strong>At Higher Ranks</strong>: For each rank you cast this justu above B-Rank, increase the cost by 3, and
      the damage by +2d6. If this Jutsu is cast at S-Rank, you can instead choose to change this jutsu's range to a
      120-foot cone.</p><div class="block imageMaskCorner22"
      style="--offsetX:50%;--offsetY:-60%;--rotation:0"><p></p></div>
