system:
  description:
    value: >-
      <p>You move towards a creature within range and make a passing strike at them. Move to an unoccupied space within
      your weapon's range of the target and make a Melee Taijutsu Attack, dealing your [Weapons Damage] + 4d8 Cold
      Damage and inflicting 2 ranks of Chilled on a hit.</p><p>When you cast this jutsu, you can spend an additional 8
      Chakra to force all creatures of your choice within a 15-foot radius centered on yourself after the attack to make
      a Dexterity Saving Throw, taking 4d6 Cold Damage and gaining 1 rank of Chilled on a failed save, or half as much
      damage and no ranks of Chilled on a successful one.</p><hr /><p><strong>At Higher Ranks</strong>: For each rank
      you cast this justu above C-Rank, increase the cost by 3, the damage by 2d8 and 1d6 respectively, and the range by
      5 feet.</p>
