system:
  description:
    value: >-
      <p>You make a swift slash, unleashing a circular spinning wave of frost release chakra around you, paired with
      multiple slashes of entirely frost that can parry incoming attacks.</p><p>If this Jutsu was cast as an Action,
      each creature of your choice within range must make a Dexterity Saving Throw, taking [Weapons Damage] + 5d6 Cold
      Damage and gain 1 rank of Chilled on a failed save, or half as much and no ranks of chilled on a successful one.
      Then, until the start of your next turn, you gain a +1 bonus to your AC.</p><p>If this Jutsu was cast as a
      Reaction, make a Melee Taijutsu Attack Roll. If your roll is equal to or higher than the incoming attack roll, the
      Attack Misses, and you gain a +4 bonus to your AC until the start of your next turn. If your attack missed and you
      got hit, you instead gain a +2 bonus to your AC until the start of your next turn.</p><hr /><p><strong>At Higher
      Ranks</strong>: For each rank you cast this justu above C-Rank, increase the cost by 3, and the damage by 2d6. If
      this Jutsu is cast at A-Rank, increase the AC bonus from the reaction effect from +4 to +5.</p>
