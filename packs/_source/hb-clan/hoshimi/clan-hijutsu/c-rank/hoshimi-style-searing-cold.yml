system:
  description:
    value: >-
      <p>You compress and condense your frost release chakra and force it out of your body, allowing your chakra to
      freely react to your body and weapons movements. For the duration of this jutsu, you gain the following
      benefits;</p><ul><li>You can use the damage effect of <em>Frosted Blades</em> twice per round, instead of once per
      round.</li><li>When you score a critical hit with a Melee Weapon Attack or Melee Taijutsu Attack that would deal
      Cold Damage, the affected creature gains 1 rank of Chilled.</li><li>As a Reaction to inflicting 1 or more ranks of
      Chilled to a creature, once per turn, you can spend 8 Chakra to cause the ice to erupt. When you do, the affected
      creature (if there are multiple, choose 1) must make a Constitution Saving Throw, taking 1d6 Cold Damage for each
      rank of Chilled they have. They then lose all ranks of Chilled, and you regain an amount of <strong>Frozen
      Dice</strong> equal to the removed Chilled ranks.</li></ul><hr /><p><strong>At Higher Ranks</strong>: For each
      rank you cast this justu above C-Rank, increase the cost by 3. If this Jutsu is cast as a B-Rank, increase your
      Critical Range with Hoshimi Clan Jutsu by +1 (To a maximum of 16-20). If this Jutsu is cast at A-Rank, you no
      longer need to spend your Reaction for this jutsu's 3rd bullet point. If this Jutsu is cast at S-Rank, increase
      your Critical Range with Hoshimi Clan Jutsu by an additional +1 (To a maximum of 16-20).</p>
