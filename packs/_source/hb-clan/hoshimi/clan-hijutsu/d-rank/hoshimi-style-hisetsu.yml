system:
  description:
    value: >-
      <p>You rush forward and unleash a series of slashes along the path. Select an unoccupied space within range. You
      dash through while slashing at a high speed to that location. This movement does not provoke attacks of
      opportunity. All creatures you pass through must make a Dexterity Saving Throw, taking [Weapons Damage] + 1d6 Cold
      on a failed save, or half as much on a successful one.</p><p>When you cast this jutsu, you can pay the cost of
      this jutsu again to return to the starting position when you cast this jutsu, forcing all creatures to make the
      saving throw again, taking [Weapons Damage] + 1d6 Cold on a failed save, or half as much on a successful
      one.</p><p>If this jutsu is cast, and affects a <strong>Abberation</strong>, they gain 1 rank of Chilled.</p><hr
      /><p><strong>At Higher Ranks</strong>: For each rank you cast this justu above D-Rank, increase the cost by 3, the
      range by 10 feet, and the damage by 1d6 and 1d6 respectively.</p>
