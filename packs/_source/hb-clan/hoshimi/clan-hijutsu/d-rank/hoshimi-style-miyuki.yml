system:
  description:
    value: >-
      <p>You make a swift, arcing slash with your weapon, unleashing a small wave of frost from your blade. You can move
      up to 15 feet as a part of casting this jutsu. Make a Melee Taijutsu Attacking dealing your [Weapon's Damage] +
      2d6 Cold. Regardless of if you hit or miss, you gain DR equal to your Taijutsu Ability Modifier (Max: 10) against
      all damage (except psychic) until the start of your next turn.</p><p>When you cast this jutsu, you can spend an
      additional 5 Chakra to gain a bonus to Dexterity Saving Throws equal to your Taijutsu Ability Modifier (Max: 10)
      until the start of your next turn, instead of DR.</p><p>If this Jutsu is used against an
      <strong>Abberation</strong> or <strong>Monstrosity</strong>, you deal an additional 1d6 Cold Damage.</p><hr
      /><p><strong>At Higher Ranks</strong>: For each rank you cast this justu above D-Rank, increase the cost by 3, the
      damage dealt by 2d6, and the additional damage dealt against <strong>Abberation</strong> and
      <strong>Monstrosities</strong> by 1d6.</p>
