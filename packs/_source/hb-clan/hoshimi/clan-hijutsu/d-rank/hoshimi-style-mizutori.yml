system:
  description:
    value: >-
      <p>You empower your body with your frost release chakra to move at much faster speeds. Move up to your movement
      speed to a point you can see within range, that you could move to. This movement counts as teleportation.</p><p>If
      this jutsu was used as a reaction, you instead move up to half of your movement speed. If this was used against an
      Attack, the attack gains disadvantage on the attack roll. If this was used against a Saving Throw, you gain
      advantage on the save.</p>
    chat: ''
  source:
    custom: ''
    rules: n5eb
