system:
  description:
    value: >-
      <p>You sheath your weapon and begin to charge up frost release chakra around the blade before drawing your blade,
      unleashing 3 large frost slashes in an arc in front of you. Each creature of your choice within range must make a
      Dexterity Saving Throw, taking your [Weapon's Damage] + 2d6 Cold Damage and gaining 1 rank of Chilled on a failed
      save, or half as much and no ranks of cold on a successful one.</p><p>When you cast this jutsu, you can spend 5
      Chakra to hold the sheathed stance, instead of unleashing it instantly. When held like this, increase your AC by
      +3 until the start of your next turn. At the start of your next turn, you unsheath the sword, dealing this jutsu's
      damage, with +2 damage dice, and inflicts 1 additional rank of Chilled.</p><p>If this jutsu is cast against an
      <strong>Abberation</strong> or <strong>Monstrosity</strong>, they take a -1d4 penalty to the Saving Throw.</p><hr
      /><p><strong>At Higher Ranks</strong>: For each rank you cast this justu above D-Rank, increase the cost by 3, the
      damage by 2d6, and the range of the cone by 15 feet.</p>
