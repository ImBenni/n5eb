  description:
    value: >-
      <h3 id="legacy-of-swordmasters">Legacy of Swordmasters</h3><p>The Hoshimi clan are descendants of the Yuki-clan
      that fled to the Land of Frost during the civil war in the Land of Water. These individuals trained to mold their
      chakra and ice release through their weapons. With time, their ice release diminished into frost.</p><hr
      /><p>These descendants now exist as a clan of skilled swordsman in the Land of Frost that specialize in hunting
      down non-human threats with the return of the otsutsuki.</p><hr /><h3 id="hoshimi-traits">Hoshimi Traits</h3><hr
      /><p><strong>Recommended Ability Score Increase:</strong> +2 Dex, +1 Wis</p><hr /><p><strong>Speed:</strong> Your
      walking walking speed is 35 feet</p><hr /><p><strong>Skill Proficiencies:</strong> Chakra Control, Survival</p><hr
      /><p><strong>Frost Release Affinity:</strong> You begin with either Wind or Water Release Affinity. (Pick one)</p>
