system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Hylia Clan, Courage Path, Level 4+ <br
      />Through intense training and prayer, you awaken more power from the seal of Courage, giving you the following
      benefits;</p><ul><li>Increase your Dexterity or Charisma scores by +1, up to the maximum of 20.</li><li>When you
      would reroll a natural 1, your new result is unable to be a 1. If it is, reroll until it is not.</li><li>Choose
      two weapons that you are proficient in. These weapons become <strong>Master Weapons</strong> for you.
      <strong>Master Weapons</strong> can only ever be wielded by you, are unbreakable, and Bukijutsu you cast with a
      <strong>Master Weapon</strong> can use your weapon's attack bonus in place of your taijutsu attack
      bonus.</li><li>While moving, as an action you can spend 10 Chakra to summon an ethereal horse known as the
      <em><strong>Hylian Steed.</strong></em> You, and a creature you are holding, automatically mount your steed when
      summoned as it appears below you. You can unsummon the Hylian Steed as an action. If your Hylian Steed dies, it is
      unsummoned, and cannot be summoned for 1 hour. The Hylian Steed uses the following statistics;</li></ul>
