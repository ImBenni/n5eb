system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Hylia Clan, Power Path, Level 8+ <br
      />Through intense training and prayer, you awaken more power from the seal of Power, giving you the following
      benefits;</p><ul><li>Increase your Strength or Constitution scores by +1, up to the maximum of 20.</li><li>You can
      now use two of your Calamity Die abilities per turn, though you cannot use the same ability twice in the same
      turn.</li><li>Once per casting, when you cast a Hylia Hijutsu that requires concentration, you can spend 1
      <em><strong>Calamity Die</strong></em> to ignore the chakra cost of the jutsu for a number of rounds equal to half
      the die result (Min. 1).</li><li>Twice per long rest, when you spend <em><strong>Calamity Die</strong></em>, you
      can give yourself a bonus to your next damage roll equal to the result of all die rolled on your turn, and a bonus
      to AC equal to the start of your next turn equal to half the result of the highest die rolled on your
      turn.</li></ul>
