system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Hylia Clan, Wisdom Path <br />Through
      intense training and prayer, you awaken more power from the seal of Wisdom, giving you the following
      benefits;</p><ul><li>Increase your Intelligence or Wisdom scores by +1, up to the maximum of 20.</li><li>You gain
      proficiency in Wisdom or Intelligence saving throws (pick one).</li><li>Ninjutsu you cast with the
      <em>Sensory</em> or <em>Fuinjutsu</em> keyword, automatically gain the benefits of your <em><strong>Goddess
      Artifact</strong></em> for free.</li><li><p>When you use your <em><strong>Goddess Artifact</strong></em>, you gain
      additional benefits;</p><ul><li>A golden aura of chakra surrounds you when used. You gain a number of temporary
      hit points equal to the cost of the jutsu for 1 minute.</li><li>You ignore the CM component of your
      jutsu.</li><li>Creatures have disadvantage on checks to dispel, counter, or interrupt your jutsu and double the
      chakra cost to active such effects (If there is no chakra cost associated with their effect, they must expend an
      amount of chakra equal to your level to use it).</li></ul></li></ul>
    chat: ''
