system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Hylia Clan, Level 12+ <br />The seal
      marked on your palm from birth begins to glow and change, allowing you access to the abilities and seal of another
      path of the Hylia clan, granting you the following benefits;</p><ul><li>Increase any ability score by +1, up to
      the maximum of 20.</li><li>Select another Path from the <em><strong>Path of Fate</strong></em> that you did not
      choose. You gain the full benefits of this seal and 1 Hylia clan jutsu with the keyword of the path you
      chose.</li></ul>
