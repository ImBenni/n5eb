name: Divine Element
type: feat
_id: RGf7LDcW0o5mGV4I
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>Beginning at 7th level your connection with the divine grows. Select one of the following nature releases
      <strong>Earth</strong>, <strong>Wind</strong>, <strong>Fire</strong>, <strong>Water</strong>,
      <strong>Lightning</strong>, or the <strong>Medical</strong> keyword. You gain access to jutsu with your chosen
      release's keyword, or the medical keyword.</p><p>When you cast a Hylia clan jutsu that deals damage, you can
      change the damage type to that of your Divine Element (Water=Cold, Medical=Poison), giving the jutsu your
      element's keyword. If you cast a jutsu that already has your element's keyword, reduce the cost of the jutsu by 2
      (Min. 1)</p><p>At 15th level, you have +3 bonus to checks to maintain concentration of jutsu with your element's
      keyword, and negate any detrimental effects or interactions jutsu with your element may have against the superior
      element. If you instead picked the <strong>Medical</strong> keyword, Medical jutsu you cast give an additional die
      of healing, and when absolving creatures of effects or conditions that call for a medical jutsu of a specific
      rank, medical jutsu you cast counts as if was cast at S-Rank.</p>
    chat: ''
