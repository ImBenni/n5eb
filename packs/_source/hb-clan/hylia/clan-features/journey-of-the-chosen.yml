system:
  description:
    value: >-
      <p>Members of the Hylia Clan are known for having good fortune when accomplishing their endeavors, which they
      acquit to their strong faith.</p><p>Starting at 1st level, select one of the following: <em>Training</em>,
      <em>Jutsu Learning/Creation</em>, or <em>Seal Crafting</em>. The downtime needed to complete any task in the
      category you chose is reduced by 1 week (The downtime to complete a task can never be reduced below 1 Week). This
      downtime reduction increases to 2 weeks at 7th level and 3 weeks at 15th level.</p><p>At 7th level, the ryo cost
      for the activity you chose is reduced by half, as you always find a way to make ends meet.</p><p>At 15th level,
      you select another one of the listed activities to gain the benefits of this feature.</p>
