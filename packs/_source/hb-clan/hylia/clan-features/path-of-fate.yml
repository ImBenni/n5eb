img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>At 1st level, select which seal was marked onto your palm as a child. This cannot be changed later
      on.</p><ul><li><em><strong>Seal of Power:</strong></em> Those marked with the Seal of Power have an intense drive
      to grow mighty and strong. Above all else, strength is the most important factor in one's life. You gain access to
      Hylia Clan jutsu with the <strong>Power</strong> keyword.</li><li><em><strong>Seal of Wisdom:</strong></em> Those
      marked with the Seal of Wisdom aspire to be great scholars. Typically the most wealthy with this seal, as their
      fortune aids them to grow and develop wonderous techniques with their chakra. You gain access to Hylia Clan jutsu
      with the <strong>Wisdom</strong> keyword.</li><li><em><strong>Seal of Courage:</strong></em> Those marked with the
      Seal of Courage are innately altruistic. They typically train to become great Shinobi, not out of a desire for
      strength, but out of a desire to protect the common people, no matter what. You gain access to Hylia Clan jutsu
      with the <strong>Courage</strong> keyword.</li></ul>
