name: Bow of Light
type: spell
_id: 6A2Ykg7LSjuZnU64
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p><em>This jutsu cannot be cast while benefitting from the Hylia Clan A-Ranks for the <strong>Power</strong> or
      <strong>Courage</strong> paths.</em></p><p>You conjure up a heavenly bow of primordial strength known as the
      <em><strong>Bow of Light</strong></em>. This bow, of your own design, can only be wielded by you and possesses the
      Deadly, Finesse, Light, and Range (150/300) properties. The weapon damage of this bow is 2d8 force damage, and
      this bow can use your Ninjutsu attack bonus for weapon/Taijutsu attacks. The Bow of Light can be used as a
      component in any Bukijutsu that requires a ranged weapon, disregarding damage type requirements.</p><p>Attacks
      with the <em><strong>Bow of Light</strong></em> can never be made at disadvantage, and its damage cannot be
      reduced by more than 5 (including resistance and immunity). This bow and ammunition radiate with 30 feet of bright
      light and 60 feet of dim light which pierces chakra-enhanced darkness.</p><p>As an action or reaction, you can
      summon forth the full power of your Seal and imbue it into the Bow of Light. Once you use either of these actions,
      this jutsu immediately ends.</p><p><strong>Action:</strong> You fire a great shot from the Bow of Light in a
      120-foot long, 10-foot wide line. Make one ranged taijutsu attack and compare the result against the AC of each
      creature within range. If your result matches or exceeds their AC, they take 8d10 force damage and are knocked
      back 15 feet and fall prone. If you score a critical hit with this attack, only the first creature hit suffers the
      effects of the critical hit.</p><p><strong>Reaction:</strong> You fire a shot from the Bow of Light to deliver
      finality to conflict. Make one ranged taijutsu attack against a creature within the Bow of Light's normal range.
      You feel as though you are in slow motion, giving intense focus and advantage on your attack roll. On a hit, the
      creature 12d12 force damage. If this reduces the creature to 0 hit points they are immediately killed and banished
      from the material plane.</p>
