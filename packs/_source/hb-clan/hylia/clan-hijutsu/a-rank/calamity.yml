folder: HjqJNIiJmFEi1mRE
name: Calamity
type: spell
_id: pQLLeGagI54al6tw
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p><em>This jutsu cannot be cast while benefitting from the Hylia Clan A-Ranks for the <strong>Wisdom</strong> or
      <strong>Courage</strong> paths.</em></p><p>An aura of darkness surrounds you, taking the appearence of an feral
      firey demon. For the duration, the sky above becomes dark, and the moon turns blood red if it is present. You gain
      the following benefits; Once this jutsu ends, you gain 2 ranks of Exhaustion and 2 ranks of
      Weakened.</p><ul><li>You become Huge, and are classifed as a Demon.</li><li>Increase all movement speeds you
      possess by +40ft.</li><li>At the start of each of your turns, roll 2d10. Gain the result as both hit points and as
      temporary hit points.</li><li>You have advantage on rolls to resist <em><strong>Physical</strong></em>
      conditions.</li><li>Creatures that attack you while within 15 feet take 2d10 fire and necrotic damage as your
      flames jump at them.</li><li>Gain a +15ft bonus to range for unarmed/Taijutsu attacks.</li><li>Your unarmed damage
      die increases by +1, and deals fire and necrotic damage. Once per turn, when you cast a Taijutsu or make an
      unarmed attack, make an additional unarmed attack.</li><li>The <em>Focus Spirit</em> and <em>Phantom's
      Embrace</em> hijutsu, if cast, no longer require concentration for you to gain their benefits and last until this
      jutsu ends.</li><li><p>Lastly, you gain access to the following <em><strong>Calamitious Techniques</strong></em>.
      These techniques require either an Action or Bonus Action to perform, though on your turn you may perform each
      technique once, per casting of this jutsu, without spending any actions. You cannot use more than one Technique
      per turn without spending action economy. <br /> <strong>Calamity Fireball (Action):</strong> You throw a ball of
      black fire at a point within 60ft. Creatures within 20ft of the ball must make a Dexterity saving throw, taking
      6d8 fire and necrotic damage and being Burned, Corroded, and Weakened. On a success, creatures take only half
      damage. <br /> <strong>Calamity Roar (Action):</strong> You let out a loud primal roar. All creatures within 30
      feet of you, other than you, must succeed a Charisma saving throw or gain 1 rank of Fear. You then teleport to
      each creature who failed and make an unarmed attack, dealing an additional 4d8 fire damage. <br
      /> <strong>Calamity Step (Bonus Action):</strong> You morph into a gaseous beast and violently move to a space
      within 90ft however you wish, passing through creatures if they are in your path. Each creature you pass through
      must make a Strength saving throw. On a failure, target's fall prone and take 3d8 necrotic damage. On a success,
      target's take half as much damage and no further effects. <br /> <strong>Calamity's Ruin (Bonus Action):</strong>
      You punch the air and send out 4, 10-foot radius globules of flame within 90 feet at different spaces, which last
      until the end of your next turn. Creatures that enter or start their turn in a glob take 15 fire damage, and must
      succeed a Constitution saving throw or gain 2 ranks of Burned.</p></li></ul>
    chat: ''
