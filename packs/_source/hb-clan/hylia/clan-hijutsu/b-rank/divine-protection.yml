system:
  description:
    value: >-
      <p>You channel the divine protection of the gods into yourself with your chakra seal. For the duration, a crystal
      spiraling blue aura surrounds you. You become proficient in one saving throws of your choice and reduce all damage
      you receive by -3. You also negate the damage of conditions that would deal damage to you, such as Burned,
      Bleeding, etc, or effects that would deal extra damage for having a conditon.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost by 3 and the damage reduction by
      1. At S-Rank, you gain proficiency in a 2nd saving throw.</p>
