name: Ethereal Boomerang
type: spell
_id: 3ldnwfYCFZ4vvVBO
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>You take a shuriken or chakram in hand and infuse it with the chakra of your seal, changing its
      behavior.</p><p><strong>Action:</strong> Make a ranged taijutsu attack on up to 3 different creatures within range
      as you throw the boomerang in an arc. On a hit, the creature takes your weapon's damage + 3d12 force damage and
      must make a Constitution saving throw, becoming Dazed on a failure. When this jutsu is used this way, you can
      choose to infuse a nature release or the medical keyword into it, changing its damage and
      effects.</p><ul><li><strong>Earth:</strong> The boomerang deals earth damage and on a failed save creatures gains
      2 ranks of Bruised.</li><li><strong>Wind:</strong> The boomerang deals wind damage and on a failed save creatures
      gain 3 ranks of Bleeding.</li><li><strong>Fire:</strong> The boomerang deals fire damage and on a failed save,
      creatures gain 1 rank of Burned, and are blinded until the end of their next turn.</li><li><strong>Water:</strong>
      The boomerang deals cold damage and creatures make their saving throw at disadvantage, becoming Chilled on a
      failure.</li><li><strong>Lightning:</strong> The boomerang deals lightning damage and on a failed save, creatures
      gain 2 ranks of Shocked.</li><li><strong>Medical:</strong> The boomerang deals poison damage and on a failed save,
      creatures become Poisoned for 1d4 rounds.</li></ul><p><strong>Reaction:</strong> You target up to 3 objects that
      can be interacted with within range. If the object is tiny or small, you can have the boomerang bring it back to
      you. This jutsu deals no damage or effects, cannot miss, and costs 1 chakra per target in place of its listed cost
      when cast this way.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank,
      increase the cost by 3, and either the damage by 1d12 or number of targets by +1 (Pick one).</p>
