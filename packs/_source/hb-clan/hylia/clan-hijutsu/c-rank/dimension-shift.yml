folder: 4qVcdfxKoiJDlM54
name: Dimension Shift
type: spell
_id: 8YYcIL11cAu7i0d6
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>As part of casting this jutsu, you must be able to make contact with a flat surface that could hold a
      silhouette of a creature of your size. You form hand signs and then touch a surface, placing a large seal on the
      area, which begins pulling you inside of it. You become a 2D illustration of yourself, your back flush to the
      wall. Your field of vision is halved to 180 degrees, allowing you to see what is in front and at your sides in the
      3D world.</p><p>While in this state, you cannot cast jutsu, but you can move up to your movement speed along the
      walls, able to go through even the smallest of cracks. You do not make noise and have a chakra signature so faint
      that only a Sensory jutsu of B-Rank or higher, or True Sight, can detect you. You have advantage on checks to
      maintain stealth and only have to roll for stealth when you move if a creature could notice you move.</p><p>If a
      creature would destroy a surface that you are on, this jutsu immediately ends, and you lose hit points equal to
      the damage dealt to the surface.</p>
