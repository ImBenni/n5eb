system:
  description:
    value: >-
      <p>You manifest a small crystal of chakra in your palm and in quick succession smash it into the ground below you,
      releasing a sphere of energy all around you. Creatures of your choice within a 20-foot radius must make a
      Dexterity saving throw, taking 4d12 force damage and falling prone on a failed save, or half damage on a
      success.</p><p>When you cast this jutsu, you may choose to infuse a nature release keyword or the medical keyword
      into it. If you do, this jutsu's damage changes to the damage type associated with your keyword (Water = Cold,
      Medical = Poison), and this jutsu inflicts an additional conditon on a failed save. <em>(Earth = Bruised, Wind =
      Bleeding, Fire = Burned, Water = Chilled, Lightning = Shocked, Medical = Envenomed)</em></p><p>If this keyword
      infused into this jutsu is your <em><strong>Divine Element</strong></em>, you can choose which targets are
      affected by this jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C- Rank,
      increase the cost by 3, and the damage by 2d12.</p>
