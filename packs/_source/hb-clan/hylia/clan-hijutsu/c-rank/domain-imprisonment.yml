system:
  description:
    value: >-
      <p>You channel the power of your chakra seal to send out a wave of energy to seal a creature. Select one creature
      within range. This creature must make a Charisma saving throw, at disadvantage if they are an Aberration, Beast,
      Demon, Monstrosity, Plant, or Undead.</p><p>On a failure, the creature is trapped in a crystal barrier. They are
      incapacitated, and their movement speed becomes 0.</p><p>At the start of each of their turns and whenever they
      take damage from a source other than this jutsu, they remake the saving throw, breaking free and ending this jutsu
      on a success. If they fail this saving throw again at the beginning of their turn, they take 2d12 force damage and
      2d12 chakra damage.</p>
