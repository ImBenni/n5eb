system:
  description:
    value: >-
      <p>You channel a golden, heavenly orb of chakra and send it towards a willing creature within range, absolving
      them from their pain. The creature regains 4d6 hit points and is cured of all ranks of any one condition affecting
      them from a jutsu of equal rank or lower, if any, excluding the following conditions. <em>(Exhaustion, Grappled,
      Restrained, Invisible, Incapacitated, Unconscious).</em></p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the healing by 1d6, and the number of
      creatures you can target by 1.</p>
