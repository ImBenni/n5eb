system:
  description:
    value: >-
      <p>Fiery chakra begins to emerge from your feet, gradually traveling up your body until it reaches your head,
      forming a demonic looking skull of your design, which releases incredibly potent chakra all around you.</p><p>For
      the duration of this jutsu, you gain 30 feet of flying speed, and up to twice per turn when you deal damage that
      either includes your unarmed damage or that is a damage roll with a Hylia Hijutsu, you deal an additional +1d10
      force damage. Lastly, you have +2 bonus to saving throws against <em>Mental</em> and <em>Sensory</em> conditions,
      and have resistance to psychic damage.</p><p>If you cast this jutsu while <em>Force Spirit</em> is currently
      active, or if you cast Force Spirit while this jutsu is active, you gain the benefits of Force Spirit for the
      duration of this jutsu.</p>
