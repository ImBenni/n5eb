system:
  description:
    value: >-
      <p>A massive amount of dark chakra begins to emanate from your body and soul, converging into your fist as you aim
      to strike a creature.</p><p>Make a melee Taijutsu attack. On a hit, you deal your unarmed damage + 4d10 necrotic
      damage, and the creature must succeed on a Wisdom saving throw or gain 1 rank of Fear until the end of your next
      turn. This jutsu scores a critical hit on a 19-20.</p><p>If you successfully score a critical hit with this jutsu,
      the creature automatically fails their Wisdom save and is also knocked back 20 feet.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage
      by 3d10, the critical threat range by +1, and the ranks of Fear by +1.</p>
