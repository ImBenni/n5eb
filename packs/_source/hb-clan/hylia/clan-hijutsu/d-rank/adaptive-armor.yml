name: Adaptive Armor
type: spell
_id: 7XTgTgdbSORv6UG7
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>You form a barrier of chakra around your armor which materializes more protective material to aid you. The
      appearance of this jutsu is up to your discretion.</p><p>For the duration, you gain a +1 bonus to AC and +3 DR
      against all sources of damage. Alternatively, you may choose to forgo the either AC bonus or DR bonus to instead
      infuse a nature release, or the medical keyword, into this armor.</p><p>Doing so grants you resistance to your
      chosen element/keyword's damage type (Water=Cold/Medical= Poison). and advantage against saving throws associated
      with the element/keyword <em>(Earth=Bruised, Wind=Bleeding, Fire=Burned, Water=Chilled, Lightning=Shocked,
      Medical= Poison)</em>.</p><p>If your chosen element/keyword is your <em><strong>Divine Element</strong></em>, you
      gain immunity to its damage type and condition.</p><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above D-Rank, increase the cost by 3. At C-Rank, this jutsu's duration becomes 10 minutes. At B-Rank,
      this jutsu's duration becomes 1 hour and no longer requires concentration. At A-Rank, you benefit from both the AC
      and DR, regardless or whether you infuse an element or not. At S-Rank, this jutsu duration becomes 8 hours.</p>
