system:
  description:
    value: >-
      <p>In response to being damaged, you quickly call upon the wise power of your seal and form a spinning crystalline
      blue barrier to defend yourself. Reduce the damage taken by 4d8 + your ninjutsu ability modifier. Hostile
      creatures within 5 feet of you must succeed a Dexterity saving throw or take 4d8 force damage.</p><p>If this jutsu
      reduces the damage of a ranged attack to 0 or lower, you can contest the attack roll with a Ninshou check (if you
      have expertise, roll a +1d4 bonus in place of expertise). If you succeed, the attack is deflected back at the
      target if they are within 120, dealing half damage and no effects on a hit.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost by 3, and the damage reduction
      by a 2d8+2.</p>
