system:
  description:
    value: >-
      <p>A signature Hylia clan jutsu used primarily to aid in endeavors that require intense and arduous exploration.
      You place a small orb of green chakra in front of you. This orb emits a 5-foot radius of bright light and a
      10-foot radius of dim light.</p><p>For 10 chakra, as a full turn action on your turn when you are within 5 miles
      of the orb, you and all willing creatures within 5 feet of you are teleported to the location of the orb. This
      jutsu then ends.</p>
