folder: GAJzSunpyXuyvcfU
name: Malicious Shockwave
type: spell
_id: SsU6VozANr75CDmz
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>You drive your fist into the ground below, sending a shockwave of dark energy in a 15-foot cone. All creatures
      within range must make a Dexterity saving throw, taking your unarmed damage + 2d6 force damage on a failure or
      half as much damage on a success.</p><p>After performing the shockwave, you may select one affected creature and
      impose a Charisma saving throw. If you choose to impose a saving throw, this jutsu gains a duration of
      Concentration, up to 1 minute. Otherwise, it gains a duration of Instant.</p><p>If you are benefiting from the
      <strong>Phantom's Embrace</strong> or <strong>Calamity</strong> jutsu, you can target 1 additional creature with
      the Charisma saving throw for each jutsu active.</p><ul><li><p><strong>Success:</strong> This jutsu's effects end
      on the target, and they remove all ranks of Fear as the illusion
      disappears.</p></li><li><p><strong>Failure:</strong> The target sees a distant mirage of a demonic, eldritch beast
      made of smoke approaching them. The target gains 1 rank of Fear for the duration and increases the cost of all
      their jutsu by twice their ranks of Fear. At the start of each of the target's turns, they may repeat the saving
      throw, gaining another rank of Fear on a failure.</p></li><li><p><strong>Critical Failure:</strong> Same effects
      as a failure, but the target sees the beast at their feet following their every move. For the duration, the
      creature's speed is halved and cannot be increased, they cannot Dash, Disengage, or Dodge, and they suffer a
      penalty to all attack rolls equal to their ranks of Fear. Targets who critically fail make their next repeat
      saving throw at the end of their next turn, not at the start.</p></li></ul><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the length of the cone by 5
      feet, and the damage by 2d6.</p>
