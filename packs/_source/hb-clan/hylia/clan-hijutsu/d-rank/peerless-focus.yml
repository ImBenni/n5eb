name: Peerless Focus
type: spell
_id: IImRbOAbAKrcuwru
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>Those who march down the path of courage are exceptional with a blade, and you are no different. After casting
      this jutsu, when you take the attack action increase the number of attacks you can make with a weapon by +1. For
      every hit that lands with the attack action, increase your attack bonus by +1 until the end of the
      turn.</p><p><strong>At Higher Levels:</strong> For each rank you upcast this jutsu, increase the cost by 3. If
      upcast to C-Rank, if you hit with at least 2 attacks you can force the target creature to make a Strength saving
      throw, knocking them prone and back 15 feet on a failure.</p><p>If upcast to B-Rank, this jutsu gains the Combo
      keyword and you can target one affected creature with a Bukijutsu <em><strong>Finisher</strong></em> as a
      reaction, regardless of range, once per turn, ignoring its listed casting time. All boosts to attack and critical
      threat range from this jutsu apply to the Finisher cast.</p><p>If upcast to A-Rank, increase the number of attacks
      you make with the attack action by +1.</p><p>If upcast to S-Rank, for each attack you land with your weapon your
      critical threat range increases by +1 until the end of the turn.</p>
