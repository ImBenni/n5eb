img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>Using the divination powers of the Wisdom Seal, you find a noble spirit
      within your domain of existance and anoint them with a set of knightly
      armor to serve you. A Large <em><strong>Phantom Knight</strong></em> of a
      design of your description forms next to you. This jutsu can be cast as an
      action or bonus action for different
      effects;</p><p><strong>Action.</strong> If this jutsu is cast as an
      action, the knight charges forth in a 60-foot line making a sweeping
      attack against all creatures of your choice that it passes through (The
      Phantom Knight may pass through another creature's space). Make one melee
      Ninjutsu attack and compare the result against each creature's AC. On a
      hit, you deal 3d10 force damage and creature's must succeed a Strength
      saving throw or be knocked back 20 feet and gain 2 ranks of Bleeding. The
      knight then disappears and this jutsu then ends.</p><p><strong>Bonus
      Action</strong> If this jutsu is cast as a bonus action, the knight
      remains where it was summoned and you declare a situation that must occur
      before the knight will attack. Examples including commanding the knight to
      attack when a creature enters within a certain range of you, or when you
      would hit a creature with a melee attack. Regardless, the knight can only
      move 30 feet before dispersing, and when it attacks, it can only target
      one creature as if this jutsu was cast as an Action.</p><p><strong>At
      Higher Ranks:</strong> For each rank this jutsu is cast above D-Rank,
      increase the cost of this jutsu by 3, and increase the range the knight
      can travel by 15 feet, and the damage by 2d10 (if used an Action) or 1d10
      (if used as a Bonus Action).</p>
