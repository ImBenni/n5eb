name: Z-Target
type: spell
_id: p5RFQtssKn94gpy6
img: systems/n5eb/assets/content/clans/hylia.webp
system:
  description:
    value: >-
      <p>You utilize the latent power of your seal to source information about a foe from the divine. Once per round,
      you can target a creature within range and make an Insight, Martial Arts, or Survival check (Pick one) vs. a DC
      equal to 5 + the creature's level. Casting this jutsu does not break stealth, and this jutsu counts as a
      Skill-Action using the ability score associated with the skill chosen.</p><p>On a success, you gain the benefits
      of the <strong>Read the Enemy</strong> Skill Action against the target until the start of your next turn, and you
      learn new information about your target. The more you succeed this check by, the more useful and relevent the
      information should be, as detailed below.</p><p>If fighting the same or like enemies, such as a band of monsters
      or a group of shinobi from the same village, the information garnered should be more generalized and less specific
      to the particular individual this jutsu is cast on.</p><ul><li><strong>Match or exceed the DC by 1-4:</strong> You
      learn the enemy's name, level, as well as a short description of their fighting style and
      history.</li><li><strong>Exceed the DC by 5 or more:</strong> Additionally, you learn the adversary's race and
      affiliation, as well as hints as to what this creature's weakness may be, or warnings for tactics that should be
      avoided against this foe.</li><li><strong>Exceed the DC by 10 or more:</strong> Additionally, you learn the
      creature's adversary role and number of Tenacity Die and Legendary Resistances. You also may learn more
      detrimental or secretive information about the creature.</li></ul><p>Once you sucessfully use this jutsu on a
      particular creature, you cannot do so on them again until you complete a long rest.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/hb-z-target.webp" />
