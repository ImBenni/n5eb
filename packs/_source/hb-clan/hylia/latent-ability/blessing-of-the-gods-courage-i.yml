system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent Fated Path</strong> for <strong>Path of Courage</strong>)</em> </p><p>You
      gain proficiency in 2 weapons of your choice. You have advantage on saving throws to avoid being charmed or
      frightened, and neither condition can be automatically given to you without a saving throw. Lastly, when you roll
      a natural 1 on an attack roll, ability check, or saving throw, you can reroll and take the 2nd result. You can do
      this twice per long rest.</p>
