system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent Blessing of the Gods (Courage) I</strong>)</em> </p><p>Beginning at 11th
      level, you gain immunity to the Charmed and Frightened conditions, and can reroll natural 1s an additional time
      before needing a long rest. Your movement speed increases by 5 feet. You also ignore resistance and treat immunity
      as resistance when attacking Aberrations, Beasts, Demons, and Monstrosities, and up to two times per turn, gain a
      2d6 bonus to damage rolls against these types of adversaries.</p>
