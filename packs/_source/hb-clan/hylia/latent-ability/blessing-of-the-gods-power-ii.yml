system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent Blessing of the Gods (Power) I</strong>)</em> </p><p>Beginning at 11th level,
      you gain 30 feet of Darkvision and Tremorsense, and increase your maximum chakra points by half your proficiency
      bonus, rounded up. You can now use the <strong>Peerless Power</strong> ability for your <em><strong>Calamity
      Die.</strong></em> Twice per long rest, when you would begin your turn and have no Calamity Die remaining, you can
      spend 1 chakra die to regain half your maximum Calamity die, rounded up.</p>
