system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent Fated Path</strong> for <strong>Path of Wisdom</strong>)</em>
      </p><p>Beginning at 3rd level, you gain proficiency in one toolkit or skill of your choice. If you select a
      toolkit or skill you are already proficient in, you instead gain expertise. Additionally, choose between the
      Sensory or Fuinjutsu keywords. Your ability scores are counted as being +2 high for the purposes of casting
      Ninjutsu of your chosen keyword's type, and you can learn Ninjutsu with your chosen keyword in half the time.
      Finally, you gain the <strong>Goddess Artifact</strong> blessing of the Wisdom Branch. Adding the Goddess Artifact
      as a component to your Ninjutsu requires 3 chakra, and doing so allows you to ignore the HS and CS components,
      treat all 1s rolled on your jutsu's damage/healing die as 2s, and increase the damage/healing die by 1.</p>
