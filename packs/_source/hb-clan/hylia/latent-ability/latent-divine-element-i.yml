system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent Blessing of the Gods (Power), (Wisdom), or (Courage) II</strong>)</em>
      </p><p>Beginning at 7th level, select nature release picking between Earth, Wind, Fire, Water, or Lightning. You
      gain access to jutsu with your chosen keyword. When you cast a Hylia Hijutsu, you can add your chosen element's
      keyword and change the damage type to that of your element (Water=Cold). If you cast a jutsu that already has your
      element's keyword, reduce the cost of the jutsu by -1 (Min. 1)</p>
