system:
  description:
    value: >-
      <h3 id="about-this-clan">About this Clan</h3><p>Hi! Blast here. Firstly, I would like to just thank you for
      checking out this document. Every view means a lot!</p><p>This clan has been out for some time now, around 6
      months, and I'm updating it on 10/30/22. A lot has changed for the better with this clan, but I wanted to make a
      brief introduction to explain the clan and address the concerns people have had with its design. If you have any
      questions or concerns with this clan, feel free to hit me up! :)</p><h3 id="what-is-the-hylia-clan-">"What is the
      Hylia Clan?"</h3><p>The Hylia clan is one of my most ambitious projects. It is a <strong>3</strong> branch clan
      inspired by the Legend of Zelda series. The 3 branches featured focus on the 3 pieces of the Triforce; Power,
      Wisdom, and Courage.</p><p>The majority of the clan's features are shared and the 3rd level feature,
      <strong>Blessing of the Gods</strong>, and hijutsu, are where clan members diverge.</p><p>This design of this clan
      pushes players towards a direction with their piece of the triforce (The actual lore of this clan has been written
      to not clash with the world of Naruto) and over time, players unlock the other pieces of the triforce and
      integrate it into their kit. Yes, you can acquire all 3 pieces of triforce in this clan, i.e, <em>all 3
      branches</em>.</p><h3 id="wouldn-t-3-branches-make-this-clan-too-powerful-">"Wouldn't 3 branches make this clan
      too powerful?"</h3><p>This is a reasonable question. Short answer, <em>maybe</em>. Going into this clan all that
      time ago, I was aware that the premise had the potential to get out of hand. You get so much with this clan by the
      end, I had to design it with care.</p><p>The "Branch distinct" features, in my opinion, are very average on their
      own. Nothing they have is truly spectacular on its own, and they nowhere near the kits of clans such as Shakuton,
      Uchiha, Uzumaki, Inuzuka, etc, that all boast an incredible amount of synergy.</p><p>This was an intentional
      decision made by me, as I wanted the powers to feel a bit lackluster on their own, but shine brightly when brought
      together. I should also note that the ability to acquire all 3 branches was balanced around the <em><strong>length
      of time</strong></em> it would take to accomplish.</p><p>You get one branch at 3rd level, need a 12th level feat
      to a second branch, and finally, you get the last branch at 18th. By the time you get your 2nd and 3rd branches,
      the intent is that the party overall has gotten so much stronger that a Hylia doesn't feel out of place or out of
      line with their own power.</p><h3 id="can-i-play-with-just-1-2-branches-">"Can I play with just 1-2
      Branches?"</h3><p>You can certainly do this if you like, though I believe you should try the clan as is first.
      That being said, this clan would not hold up if you only took 1 branch, both in terms of features and hijutsu (a
      lot of this clan's hijutsu is utility). I recommend playing with 2 branches by removing the 18th level feature,
      and I would also give players this extra jutsu <br />on the right as a 2nd A-Rank to accommodate for the power
      they have lost by not having the other branch(s).</p>
