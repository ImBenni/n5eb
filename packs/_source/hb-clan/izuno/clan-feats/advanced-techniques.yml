system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Izuno Clan Level 4+<br />You have learned
      to use your techniques in new and creative ways, enhancing their basic design and adding your own
      flair:</p><ul><li><p>Pounce: You've learned how to infuse your release with your pounce, making it even more
      dangerous than simply jumping onto the enemy. If the target fails its saving throw, they gain one rank of a status
      effect based on the element used: Fire: Burn, Water: Chilled, Lightning: Shocked, Earth: Bruised, Wind: Bleed,
      Non-Elemental: Concussed.</p></li><li>Cat Reflexes: You've honed your reflexes, making you faster and harder to
      hit. The bonuses to your AC are increased by 1, and your saving throw dice become D6.</li><li>Lick Wounds: You've
      learned to mix a small amount of medical chakra into your saliva, even if you don't have medical release. The
      amount recovered from each lick increases by an additional 2d8.</li></ul>
