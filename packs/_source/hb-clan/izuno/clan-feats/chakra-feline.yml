system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Izuno Clan Level 12+<br />You can coat or
      manifest ears, tail, eyes, and claws in your own unique colored chakra signature, granting you several
      advantages:</p><ul><li>You gain an additional Hijutsu that you qualify for (this does not count toward your total
      jutsu known).</li><li>Your claws deal an additional rank of Critical property and they deal two additional Bleed
      ranks on a critical hit.</li><li>You can use the Light property even on bonus action attacks.</li><li>Your speed
      increases by an additional 15 ft.</li><li>Your claws deal an additional die of damage.</li></ul>
