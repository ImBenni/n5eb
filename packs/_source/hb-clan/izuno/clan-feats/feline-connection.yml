name: Feline Connection
type: feat
_id: tD6PhFsvEPoQKzmt
img: systems/n5eb/assets/content/clans/izuno.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Izuno Clan Level 4+<br />You learn a
      special call similar to the Summoning Jutsu, allowing you to summon a feline companion of your choice (a cat from
      T7 for reference, but lion, tiger, and similar creatures also work).<br />Once per long rest, you can summon one
      of these creatures.<br />These creatures are summoned at D rank with basic statistics, using a character level
      based on the creature's rank, with average stats (16) or custom-made by the DM.<br />The creature's rank will
      increase as follows: Rank C at level 7, Rank B at level 11, Rank A at level 15, Rank S at level 18. <br />The
      summoned creature will stay for up to 1 hour, and you can ask it to assist in combat, similar to a standard
      summon. <br />Additionally, you can take momentary control of your companion, while you lose control of your body,
      similar to the Yamanaka's Bestial Mind Domination or Mind-Body Transfer jutsu.</p>
