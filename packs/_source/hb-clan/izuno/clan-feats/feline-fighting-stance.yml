name: Feline Fighting Stance
type: feat
_id: XKYBL5juyKALuprC
img: systems/n5eb/assets/content/clans/izuno.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Izuno Clan<br />You've begun to learn how
      to use your gifts in a more focused manner, drawing inspiration from a specific feline creature. You can only
      choose one of these stances, but you can take this feat multiple times to gain additional
      ones:</p><p><strong>Tiger Stance:</strong> You focus on raw strength to overwhelm your
      enemies:</p><ul><li>Increase the damage of your Claws by 1 step (1d8 → 1d10 → 1d12).</li><li><p>Your claws gain an
      additional critical property (up to a maximum of 3). <br />On a critical hit, you inflict a rank of fear on the
      target, this can happen only once per turn.</p></li><li>You deal additional damage to targets with fear stacks,
      equal to 1d4 per rank of fear once per round.</li></ul><p><strong>Panther Stance:</strong> You focus on silence
      and surprise attacks:</p><ul><li>When you attack a creature with advantage from being hidden or if the creature is
      surprised, your claws deal an additional damage die.</li><li>If an ally is within 5 ft. of the enemy, you deal an
      additional 1d4 damage with your claws.</li><li>Your Pounce, instead of knocking the target prone, allows you to
      make a flurry of claw attacks. If the target fails their saving throw, you deal critical damage with your
      claws.</li></ul><p><strong>Cheetah Stance:</strong> You focus on speed and agility:</p><ul><li>You are incredibly
      quick with your hands, allowing you to make one additional melee attack after casting a jutsu, once per turn. This
      attack cannot benefit from traits like Light.</li><li>Your Pounce can now be used to escape danger. You no longer
      require a target for your Pounce action. If you Pounce on a target, you can jump up to half your movement speed
      away from the target to an unoccupied space within that range (this extra jump does not provoke attack of
      opportunity). You can do this regardless of whether the target succeeds or fails their saving throw.</li><li>You
      gain an additional 10 movement speed.</li></ul>
