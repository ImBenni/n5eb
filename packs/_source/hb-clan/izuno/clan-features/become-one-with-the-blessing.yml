system:
  description:
    value: >-
      <p>Starting at level 15, you fully unleash your blessing at its maximum potential.<br />This power-up can be
      activated once per full rest, lasts for 1 minute, and grants you the following benefits:</p><ul><li>Your
      <em><strong>Physical</strong></em> scores each increase by 4.</li><li>Your claw attacks deal an additional damage
      die, and you inflict an additional rank of bleeding on a hit or a critical hit.</li><li>Your blindsight increases
      to 60 ft.</li><li>You gain temporary hit points equal to your proficiency bonus × 10.</li><li>You have advantage
      on your claw attacks.</li><li>You gain 10 Damage Reduction (DR) to all damage types.</li></ul>
    chat: ''
