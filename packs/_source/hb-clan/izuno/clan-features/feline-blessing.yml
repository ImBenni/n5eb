folder: 3xAk1rVqItY4YHRB
name: Feline Blessing
type: feat
_id: uy1OsPCzEKVm8MUY
img: systems/n5eb/assets/content/clans/izuno.webp
system:
  description:
    value: >-
      <p>At level 1, your ancient blessing grants you several cat-like attributes and skills. You may use your Dexterity
      for this clan's jutsu and gain the following abilities:</p><ul><li><p><strong>Claws:</strong> You possess sharp
      claws that serve as your primary weapon. Your unarmed attacks deal 1d8 slashing damage and have the following
      traits: unarmed, critical, hidden, finesse and light.<br />When you score a critical hit with your claws, you
      inflict 1 rank of bleeding.<br />Additionally, your claws count as both a weapon for Bukijutsu (for melee slashing
      or piercing attacks only) and an unarmed weapon for Taijutsu.<br />At level 7, your claws improve to 1d10 damage
      and gain the multiattack property. You may add your ability modifier to the extra attack and apply any bonuses
      from this clan's feats.</p></li><li><p><strong>Cat Ears/Chakra Infused Ears:</strong> Your enhanced hearing grants
      you a bonus on initiative rolls equal to +2, this bonus increases to a +4 at level 5, additionally and you cannot
      be surprised unless you are deafened.<br />You have 10 feet of blindsight, and as a bonus action, you can close
      your eyes and focus solely on your hearing, extending your blindsight to 30 feet while your eyes remain closed.
      You cannot benefit from blindsight from this feature while Deafened.</p></li><li><p><strong>Quick
      Flexibility:</strong> Your speed and agility allow you to interact with items swiftly. You can use pills or ninja
      tools with a bulk of 1 or less as follows:<br />As a free item interaction (once per turn) if the original use
      requires a bonus action or as a bonus action if the original use requires an action.<br />The range of these items
      is halved when used in this manner.</p></li><li><p><strong>Cat Eyes:</strong> Your feline vision grants you 60 ft.
      of darkvision.<br />Additionally, you gain proficiency in Perception.</p></li></ul>
