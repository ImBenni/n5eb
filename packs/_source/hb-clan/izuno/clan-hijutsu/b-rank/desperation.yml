system:
  description:
    value: >-
      <p>You can only use this jutsu when you are bloodied (at or below 50% HP). As you sense the danger to your life,
      you become incredibly aggressive.<br />You coat your entire body with a powerful golden chakra that enhances your
      physical abilities, granting you the following benefits:</p><ul><li>You can attack twice instead of once when you
      would use your reaction for an attack of opportunity.</li><li>Your claw attacks gain an additional 1d6 to both
      attack and damage rolls.</li><li>You can gain advantage on one <strong>physical</strong> saving throw per round on
      any effect that would damage you.</li><li>You gain damage reduction against all damage types up to half your
      proficiency bonus.</li><li>You cannot lose concentration to this jutsu due to damage.</li></ul>
