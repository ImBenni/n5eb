system:
  description:
    value: "<p>You leap at a creature within 15 ft. of your current position, avoiding opportunity attacks. As you pounce, you slash at the target before immediately springing toward another creature within 15 ft. of the previous one. You can continue this chain attack for up to 5 creatures, you cannot jump back to previously chosen targets. <br />Targets must make a Dexterity saving throw, on a failure, they take double your unarmed damage.<br />On a success, you land within 5 ft. of the target and cannot continue jumping to another.<br />If you successfully reach your final target, you land in the nearest free space within 5 ft. of that creature.</p><p>\_ \_ <strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the chakra cost by 3 and the number of targets by 2.<br />At A-Rank, your attack deals triple your unarmed damage.</p>"
