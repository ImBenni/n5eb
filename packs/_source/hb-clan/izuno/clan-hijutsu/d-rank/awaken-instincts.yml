system:
  description:
    value: "<p>You awaken your predatory instincts, marking one creature within 60 ft. as your prey. You gain the following advantages against your marked target:</p><ul><li>You have advantage on Survival checks to track or locate them.</li><li>Your unarmed attacks gain a +2 bonus to hit.</li><li>You have advantage on Perception checks related to your prey.</li><li><p>If your prey is bloodied (≤50% HP), your unarmed attacks deal +2 additional damage.</p></li></ul><p>\_ \_ <strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the chakra cost by 3 and the number of targets by 1 every 2 ranks.</p>"
