system:
  description:
    value: >-
      <p>You begin to purr loudly, radiating a soothing aura that calms those around you.<br />Every creature within a
      15 ft. radius must make a Wisdom saving throw against your Genjutsu Save DC.<br />On a failure, affected creatures
      become more relaxed and friendly toward you.<br />They cannot gain advantage on Intimidation, Deception, or
      Persuasion checks against you.<br />Additionally, they subtract 1d6 from their Persuasion and Deception checks
      when interacting with you.<br />Creatures that are immune to charm are unaffected by this jutsu.</p>
