system:
  description:
    value: >-
      <h2 id="the-izuno-clan">The Izuno Clan</h2><p><em>The Izuno clan is a distant rival of the Inuzuka clan, having
      chosen to learn from their feline counterparts rather than fight alongside them, a challenging thing anyway as
      cats are well-known for their independence.<br />The clan tends to be more isolated and less unified, preferring a
      nomadic lifestyle and settling wherever they find a favorable location.<br />Their techniques, particularly their
      powerful claws, are infamous for being deadly to those unprepared to face them.<br />Many speculate that their
      feline traits and remarkable abilities come from an ancient blessing bestowed upon them by a powerful sage
      beast.<br />(Created By Liviu50)</em></p><h3 id="izuno-traits">Izuno Traits</h3><p><strong>Recommended Ability
      Score Increase:</strong> +2 Dex, +1 Con.<br /><strong>Speed:</strong> Your base walking speed is 35 ft and you
      have a climbing speed equal to your walking speed.<br /><strong>Skill Proficiencies:</strong> You gain proficiency
      in Stealth and one between Acrobatics or Athletics.<br /><strong>Extra Language:</strong> Standard, Feline-Speech
      and fire dialect.<br /><strong>Izuno Hijutsu:</strong> You know an additional D-Rank jutsu from the Izuno Clan
      Jutsu List (This does not count towards your total jutsu known).</p>
