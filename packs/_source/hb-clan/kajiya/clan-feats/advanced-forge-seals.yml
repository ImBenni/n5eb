system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Kajiya Clan, Level 12+</p><p>Your mastery
      of the forge has reached its peak.</p><ul><li><p>Increase your Charisma by 1, to a maximum of
      20.</p></li><li><p>You learn the <strong>Forge Seal: Sharpening</strong> and <strong>Forge Seal: Advanced
      Reinforcement</strong> jutsu, which do not count against your known jutsu list.</p></li><li><p>You are able to
      cast these jutsu on a number of weapons or armor sets equal to half your proficiency bonus, rounded
      up.</p></li></ul>
