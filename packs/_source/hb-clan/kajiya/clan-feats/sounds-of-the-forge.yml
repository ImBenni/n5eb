system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Kajiya Clan</p><p>You've learned how to use
      the loud clangs of working metal in combat.</p><ul><li><p>Increase your Strength by 1, to a maximum of
      20.</p></li><li><p>Bludgeoning damage you deal while casting Kajiya Bukijutsu or while using a Forge Hammer may be
      converted to Force Damage, which deals double damage to constructs and objects.</p></li><li><p>Enemies that would
      gain ranks of Burned as a result of Kajiya Hijutsu may instead gain the Deafened condition or ranks of
      Concussed.</p></li></ul>
