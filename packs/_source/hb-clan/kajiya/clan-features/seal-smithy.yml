name: Seal Smithy
type: feat
_id: kYAU6jTaCV6D5hbZ
img: systems/n5eb/assets/content/clans/kajiya.webp
system:
  description:
    value: >-
      <p><strong data-start="56" data-end="73">Seal Smithing</strong> is an ancient part of Kajiya Clan history, and
      they all are taught the art of making Seals. Beginning at 3rd level, by spending a charge of your Armorsmith or
      Weaponsmith Kit and an hour in an enclosed space, you can convert that space into a <strong data-start="317"
      data-end="346">Temporary Sealsmith Forge</strong> that lasts <strong data-start="358" data-end="370">24
      hours</strong>.</p><p data-start="375" data-end="693">For this duration, you may craft <strong data-start="408"
      data-end="433">Weapon or Armor Seals</strong> (depending on which kit paid the price) at <strong data-start="477"
      data-end="510">half of their listed Ryo cost</strong>, applying them immediately. Additionally, <strong
      data-start="553" data-end="573">Weapons or Armor</strong> that you craft have <strong data-start="594"
      data-end="616">+1 extra Seal Slot</strong> per item. At <strong data-start="630" data-end="644">11th
      level</strong>, items you craft have <strong data-start="667" data-end="690">+2 extra Seal Slots</strong>.</p>
