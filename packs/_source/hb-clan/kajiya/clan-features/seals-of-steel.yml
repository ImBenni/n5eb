system:
  description:
    value: >-
      <p><strong data-start="73" data-end="91">Expert casters</strong> among the <strong data-start="102"
      data-end="112">Kajiya</strong> have a secret <strong data-start="127" data-end="148">sealing technique</strong>
      that allows them to turn <strong data-start="174" data-end="220">physical material into Fire Release
      Chakra</strong> at a moment's notice.</p><p data-start="246" data-end="440">Beginning at <strong data-start="259"
      data-end="272">7th level</strong>, when in <strong data-start="282" data-end="308">possession of a weapon</strong>
      that has an <strong data-start="321" data-end="343">unfilled Seal Slot</strong>, as an <strong data-start="351"
      data-end="361">Action</strong>, you may <strong data-start="371" data-end="395">add a Dismantle Seal</strong> to
      that item by spending a <strong data-start="423" data-end="437">Chakra Die</strong>.</p><p data-start="442"
      data-end="654">As a <strong data-start="447" data-end="462">Free Action</strong> while casting a <strong
      data-start="479" data-end="501">Fire Release jutsu</strong> of <strong data-start="505" data-end="523">one rank
      lower</strong> than your <strong data-start="534" data-end="551">maximum known</strong>, you may <strong
      data-start="561" data-end="598">pay the chakra cost of that jutsu</strong> by <strong data-start="602"
      data-end="625">destroying a weapon</strong> with a <strong data-start="633" data-end="651">Dismantle
      Seal</strong>.</p>
