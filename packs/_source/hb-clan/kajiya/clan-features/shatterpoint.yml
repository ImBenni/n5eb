system:
  description:
    value: >-
      <p><strong data-start="0" data-end="66">The ability to look at an object and assess its breaking point</strong> is
      a skill any <strong data-start="82" data-end="95" data-is-only-node>craftsman</strong> should have. The <strong
      data-start="113" data-end="143">masters of the Kajiya Clan</strong> can do this with <strong data-start="161"
      data-end="171">people</strong>.</p><p data-start="176" data-end="482" data-is-last-node
      data-is-only-node>Beginning at <strong data-start="189" data-end="203">18th level</strong>, whenever a target
      <strong data-start="223" data-end="239">fails a save</strong> against a <strong data-start="250"
      data-end="259">jutsu</strong> you cast that contains either the <strong data-start="294" data-end="310">Fire
      Release</strong> or <strong data-start="314" data-end="327">Fuinjutsu</strong> Keywords, you may choose to <strong
      data-start="356" data-end="378">completely destroy</strong> either <strong data-start="386" data-end="400">one
      weapon</strong> they have <strong data-start="411" data-end="446">equipped or in their possession</strong>, or
      <strong data-start="451" data-end="464">any armor</strong> they are wearing.</p>
