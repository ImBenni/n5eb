system:
  description:
    value: >-
      <p>You begin to circulate your chakra throughout your entire network as pure fire and place a seal on your armor
      to contain the raging inferno. This fire begins to focus strongly on the body's natural chakra points and leaks
      out as rogue tongues of flame. For the duration of this jutsu:</p><ul><li><p>You gain immunity to Bludgeoning and
      Fire damage.</p></li><li><p>All Fire or Bludgeoning damage you deal treats immunity as resistance and ignores
      regular resistance.</p></li><li><p>Hostile creatures who come within 10 feet of the caster of this jutsu must make
      a Constitution Save, gaining 2 ranks of Burned on a fail and 1 rank on a success.</p></li><li><p>The effects of
      all Weapon and Armor Seals you are benefiting from are doubled.</p></li><li><p>You may not lose concentration on
      this jutsu as a result of damage</p></li></ul>
