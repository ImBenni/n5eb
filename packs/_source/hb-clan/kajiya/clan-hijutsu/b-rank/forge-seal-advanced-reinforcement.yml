system:
  description:
    value: >-
      <p>Placing a seal on a target in range, you further improve the condition of their armor. For the duration, while
      benefiting from armor that has the Advanced Reinforcement Seal, you may add your Strength Mod to the wearer's AC.
      Only one set of armor at a time may benefit from this jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank
      you upcast this jutsu above B-Rank, increase the cost of this jutsu by 3. If cast at A-Rank, this jutsu instead
      lasts 10 minutes. If cast at S-Rank, this jutsu instead lasts 1 hour.</p>
