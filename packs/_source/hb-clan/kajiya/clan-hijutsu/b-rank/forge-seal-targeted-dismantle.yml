_id: U8kQ4WBlh7tCUq2L
img: systems/n5eb/assets/content/clans/kajiya.webp
system:
  description:
    value: >-
      <p>Placing a seal on your wrist and focusing on a weapon or armor set in range, you can attempt to disrupt the
      functions of any seals that the target is benefiting from. The target must make a Charisma Saving Throw, suffering
      a -1 penalty for each Equipment Seal they are benefiting from. On a failure, any seals they are benefiting from
      are destroyed. On a success, the target only loses the benefits of the Equipment Seals until the start of their
      next turn. Targeted equipment that is not being used or equipped can either have all Equipment Seals deactivated
      permanently or may be destroyed entirely.</p>
