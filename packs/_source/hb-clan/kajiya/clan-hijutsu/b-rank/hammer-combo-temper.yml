system:
  description:
    value: >-
      <p>Concentrating all the chakra you can onto the tip of your weapon, you strike at a target in range with
      advantage, attempting to remove all essence of heat from them. On a hit, you deal your weapon damage + your
      Strength Mod. If the target you're attacking is suffering from any ranks of the Burned condition, they take an
      additional 3d6 damage for each rank of Burned they are suffering from, and all ranks of Burned they have are
      turned into ranks of Weakened.</p><p><strong>At Higher Ranks:</strong> For each rank you upcast this jutsu above
      B-Rank, increase the cost of this jutsu by 3 and the amount of additional damage dealt for each rank of Burned
      converted by 2d6.</p>
