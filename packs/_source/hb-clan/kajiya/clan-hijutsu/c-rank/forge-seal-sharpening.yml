system:
  description:
    value: >-
      <p>By touching a weapon, you place a seal of Sharpening on it. The weapon becomes a +1 weapon for the duration and
      gains 1 rank of the Deadly property. Only one weapon at a time may benefit from this jutsu.</p><p><strong>At
      Higher Ranks:</strong> For each rank you upcast this jutsu above C-Rank, increase the cost of this jutsu by 3. If
      cast at B-Rank, the weapon becomes a +2 weapon. If cast at A-Rank, the weapon gains a second rank of Deadly. If
      cast at S-Rank, the weapon becomes a +3 weapon with 3 ranks of Deadly.</p>
