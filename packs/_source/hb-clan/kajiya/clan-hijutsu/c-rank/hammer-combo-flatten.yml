system:
  description:
    value: >-
      <p>Coating your weapon in flames, you swing your weapon with a strong, targeted strike intending to force your
      target to move a certain way. Make a single melee attack, dealing your weapon's damage + 2d6 fire damage on a hit.
      Targets hit by this jutsu must make a Strength Saving Throw against your Ninjutsu or Taijutsu Save DC (whichever
      is highest), being pushed back 10 feet and gaining one rank of Burned on a fail, and only being pushed back 10
      feet on a success. Targets who fail the save by 5 or more points are also knocked prone.</p><p><strong>At Higher
      Ranks:</strong> For each rank you upcast this jutsu above C-Rank, increase the cost of this jutsu by 3, increase
      the fire damage dealt by 2d6, and the amount of pushback by 5 feet.</p>
