name: Forge Seal Heat Metal
type: spell
_id: K6ANP5uTpwiRyIVI
img: systems/n5eb/assets/content/clans/kajiya.webp
system:
  description:
    value: >-
      <p>Choose a metal object, such as a metal weapon or a suit of heavy or medium metal armor, that you can see within
      range. You form a seal connecting to that object on your wrist, causing the object to glow red-hot. Any creature
      in physical contact with the object takes 2d8 fire damage when you cast this jutsu. Until the jutsu ends, you can
      use a bonus action on each of your subsequent turns to cause this damage again. If a creature is holding or
      wearing the object and takes the damage from it, the creature must succeed on a Constitution saving throw or drop
      the object if it can. If it doesn't drop the object, it has disadvantage on attack rolls and ability checks until
      the start of your next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you upcast this jutsu above
      D-Rank, increase the cost by 3 and increase the amount of damage dealt by 1d8.</p>
