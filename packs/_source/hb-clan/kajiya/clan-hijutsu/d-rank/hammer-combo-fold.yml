system:
  description:
    value: >-
      <p>Coating your weapon in flames, you batter an enemy in range with your
      melee weapon, intending to soften up their defenses. Make 3 melee attacks,
      dealing your weapon's damage + your Strength Mod, plus 1d6 fire damage for
      each additional attack that lands. If 2 attacks land, the target gains one
      rank of Burned for every 2 attacks that hit, and the next attack or jutsu
      made against that target is made at advantage.</p><p><strong>At Higher
      Ranks:</strong> For each rank you upcast this jutsu above D-Rank, increase
      the cost of the jutsu by 3 and the number of attacks made by 2.</p>
