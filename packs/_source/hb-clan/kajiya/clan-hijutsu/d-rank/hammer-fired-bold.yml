system:
  description:
    value: >-
      <p>Placing a seal onto the air in front of you and then striking it with a weapon, you fire off a bolt of molten
      fire. Make a ranged Ninjutsu attack against a target within range. On a hit, deal 3d6 + Str Mod fire damage.
      Enemies hit by this jutsu must make a Con Saving Throw, gaining one rank of Burned on a failed
      save.</p><p><strong>At Higher Ranks:</strong> For each rank you upcast this jutsu beyond D-Rank, increase its cost
      by 3 and the damage dealt by 2d6. If cast at B-Rank or above, targets who fail their saves gain 2 ranks of
      Burned.</p>
