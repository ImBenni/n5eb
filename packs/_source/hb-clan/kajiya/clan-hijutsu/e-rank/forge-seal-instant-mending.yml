    value: >-
      <p>This version of Mending is specific to the Kajiya Clan and only works on metallic objects. By casting this
      jutsu, you create a seal on a metallic object, infusing it with the Mending ninjutsu. As soon as an item with the
      Instant Mending seal is damaged, the seal activates and repairs the object as if the Mending ninjutsu was cast on
      said damage.</p>
