system:
  description:
    value: >-
      <p>Beginning at 15th level, when in possession of a weapon that has an unfilled Seal Slot, as an action you may
      add a Dismantle Seal to that item by spending a Chakra Die. As a free action while casting a Fire Release jutsu of
      one rank lower than your maximum known, you may pay half the chakra cost rounded up of that jutsu by destroying a
      weapon with a Dismantle Seal.</p>
