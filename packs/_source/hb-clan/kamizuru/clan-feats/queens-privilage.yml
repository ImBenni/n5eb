    value: >-
      <p><strong>Category</strong>: Clan <br /><strong>Prerequisite</strong>: Kamizuru Clan <br />You've adopted the way
      your insects harness chakra, you gain the following benefits;</p><ul><li>Increase your Wisdom score by 1, to a
      maximum of 20.</li><li>You may use your Wisdom instead of Intelligence as your Ninjutsu ability modifier when
      casting Kamizuru Clan Hijutsu.</li><li>You learn one additional Kamizuru Hijutsu that you qualify for.</li><li>You
      can learn and create Kamizuru Hijutsu in half the time.</li><li><p>You gain resistance to Poison
      Damage.</p></li></ul>
