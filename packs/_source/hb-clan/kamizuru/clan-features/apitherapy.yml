name: Apitherapy
type: feat
_id: pxCcB5URprnPZpvG
img: systems/n5eb/assets/content/clans/kamizuru.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, you learn to utilize your hive's specific breed to the fullest. Over the course of a
      rest you may control your hive to produce unique medicinal materials to aid you or your allies in combat. These
      consumables have a bulk of 1 and expire after one week. You may only produce one consumable per rest. At 11th
      level, you produce two consumables instead of one. At 18th, you produce three.</p><ul><li><em><strong>Kamizuru
      Honey</strong></em>: Your hive produces a consumable called <strong>Kamizuru Honey</strong>. As a bonus action, a
      creature can consume a single <strong>Kamizuru Honey</strong> which increases with potentcy as you gain levels. At
      1st level, the consumable regains 1d6 hit points. At 3rd level, this healing becomes 1d6 + Wisdom Mod. At 7th
      level, this healing becomes 2d6 + Wisdom Mod. Finally, at 11th level, this healing becomes 3d6 + Wisdom Mod. +
      Prof. Bonus. You cannot gain the benefit of this consumable more than thrice in a single 24-hour
      Period.</li><li><em><strong>Kamizuru Toxin</strong></em>: Your hive produces a consumable poison called
      <strong>Kamizuru Toxin</strong>. This poison can only be applied to weapons as a bonus action, and is only
      expended when striking a creature. Once expended in this way, the poison is no longer able to be applied by the
      weapon without being reapplied. <strong>Kamizuru Toxin</strong> increases with potentcy as you gain levels. At 1st
      level, this weapons next instance of damage deals an additional 1d8 poison damage. At 3rd level, when a creature
      would take poison damage from this feature they must make a Constitution Saving Throw using your Ninjutsu Save DC,
      on a failed save the creature gains one rank of <em><strong>Envenomed</strong></em>. At 7th level, the poison
      damage is increased to 2d8 and the poison gains two uses before being removed from your inventory. At 11th level,
      on a failed save creatures gain two ranks of <em><strong>Envenomed</strong></em> instead of one.</li></ul>
