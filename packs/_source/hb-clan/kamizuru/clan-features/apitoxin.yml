system:
  description:
    value: >-
      <p>Beginning at 11th level, your hive's venom has evolved to deadly potency, called <strong>Apitoxin</strong>.
      When a creature with 5 ranks of the envenomed condition would gain another rank of envenomed due to a Kamizuru
      Clan Hijutsu, they instead gain a rank of <strong>Apitoxined</strong>. An <strong>Apitoxined</strong> creature
      suffers the following effects;</p><ul><li>A creature suffering from <strong>Apitoxined</strong> is counted as
      <em><strong>Envenomed</strong></em> for the purposes of interacting with Features, Traits, and Jutsu.</li><li>At
      the beginning of an <strong>Apitoxined</strong> creatures turn, they take 1d6 poison damage per rank of
      <strong>Apitoxined</strong>.</li><li>A creature with ranks of <strong>Apitoxined</strong> gains one rank of
      <strong>Apitoxined</strong> at the end of its turn.</li><li>An <strong>Apitoxined</strong> creature cannot gain
      the benefits of a rest.</li><li>A creature immune to Poison damage is immune to the <strong>Apitoxined</strong>
      condition.</li><li>A creature can spend an Action to make a DC 21 Constitution save to purge all stacks of
      <strong>Apitoxined</strong>.</li><li>Outside of combat, every 10-minutes a creature suffers the effects of this
      condition as if a turn has passed in combat.</li></ul>
