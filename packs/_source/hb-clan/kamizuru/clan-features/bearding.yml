system:
  description:
    value: >-
      <p>Starting at 7th level, your hive accumulates around your body in attempt to regulate your temperature. You gain
      advantage on all checks or saving throws as a result of a cold or warm environment.</p><p>Additionally, whenever
      you would be attempting to make an Intimidation (Charisma) check against a creature you may instead use your
      Animal Handling (Wisdom) as your hive aggressively buzzes.</p><p>At 11th level, when a creature would fail an
      Intimidation check as a result of your <em><strong>Bearding</strong></em> clan feature they gain 1 rank of
      <strong>Demoralized</strong>.</p>
