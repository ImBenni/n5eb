system:
  description:
    value: >-
      <p>Beginning at 3rd level, you learn to focus on and specialize in a specific type of Hymenoptera. Select the
      Hymenoptera you wish to specialize in and gain the feature it comes with. You may select another type at 7th,
      11th, and 15th level.</p><ul><li><em><strong>Honey Bees:</strong></em> When a creature would be healed or gain
      temporary hit points as a result of a Kamizuru Clan Hijutsu, increase the amount equal gained by your Wisdom
      Mod.</li><li><em><strong>Hornets:</strong></em> You can choose to ignore resistance to Poison Damage using
      Kamizuru Clan Hijutsu.</li><li><em><strong>Wasps:</strong></em> Increase the DC of Kamizuru Clan Hijutsu by
      +1.</li><li><em><strong>Yellowjackets:</strong></em> You reduce the cost of Kamizuru Clan Hijutsu by an amount
      equal to its rank. (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5).</li></ul>
