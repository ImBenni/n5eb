system:
  description:
    value: >-
      <p>You stick your right thumb into the palm of your left hand summoning your clans most fearsome ally, the Queen
      Bee. This is a Huge creature that acts on its own at the end of each of your turns. You can give it direction as a
      bonus action on your turn, in which if you do it gains a bonus +2 to its attacks and checks as a result of
      receiving direction, otherwise it will act in your favor attempting to cause harm to your enemies as seen in its
      stat block. It uses your Ninjutsu attack bonus and Save DC when an effect calls for it. It is proficient in all
      Saving Throws and uses your proficiency bonus when applying the bonus.</p><p>If it is killed, it is unsummoned and
      must spend at least 1 week regenerating, before it can be summoned again.</p><p><strong>At Higher Ranks</strong>:
      For each ranks you cast this jutsu above A-Rank, increase the cost by 3 and the Queen Bees hit points by 30.</p>
