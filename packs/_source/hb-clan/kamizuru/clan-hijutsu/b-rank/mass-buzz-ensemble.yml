system:
  description:
    value: >-
      <p>You channel your chakra into your hive as they begin to perform a symphony of buzzing. Creatures that enter the
      area for the first time or start their turn within the area suffer the following effects;</p><p>If an ally
      creature would be affected by the jutsu, they are cleansed of any Mental or Sensory conditions of rank, equal to
      or lower than what this jutsu was cast, and gain 4d8 temporary hit points. If the ally creature is affected by a
      Genjutsu, they gain advantage on their next saving throw.</p><p>If a hostile creature would be affected by the
      jutsu, they must make a Wisdom Saving throw. On a failed save, hostile creatures who fail the saving throw gain 2
      ranks of <strong>Demoralized</strong> and must spend its entire turn exiting the radius. If the creature is unable
      to exit the radius they are unable to remove ranks of <strong>Demoralized</strong>.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, the
      temporary hitpoints gained by 2d8 and the radius by 5 feet.</p>
