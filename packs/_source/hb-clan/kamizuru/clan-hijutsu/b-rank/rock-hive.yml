folder: jQoHJYfgTBxaJBmF
name: Rock Hive
type: spell
_id: RfEtRHvrPVprXoLe
img: systems/n5eb/assets/content/clans/kamizuru.webp
system:
  description:
    value: >-
      <p>You conjure a giant hive made of rock, honey and beeswax that has a hexagon-like pattern. This hive has a
      variety of purposes ranging from trapping your enemies to feed to your larva or creating a structure for your
      allies to shelter themselves in. When this jutsu is initially cast you can choose to be ontop of the structure or
      inside.</p><p>The Rock Hive is a structure with 6d10 + 10 HP and an AC equal to your Ninjutsu Save DC. The
      structure has a diameter of 180 feet (sphere), 5ft thick, and is 50 feet tall. This structure has resistance to
      Bludgenoning, Piercing, and Slashing and vulnerability to Lightning.</p><p><em><strong>In-combat</strong></em>:
      This jutsu duration becomes "Concentration, up to 10 min." You summon 4 Giant Larva inside the Rock Hive which
      survive on pure instinct. These Giant Larva must be spawned in at least 80ft apart from eachother. You command the
      Giant Larva with a Bonus Action. The Giant Larva may only attack creatures if they are within the radius of the
      Rock Hive. They use your Ninjutsu attack bonus, Save DC, ability modifier, or Saving Throw Proficiencies when
      needed.</p><p><em><strong>Out-of-Combat</strong></em>: This jutsus duration becomes 24 hours. You conjure a Rock
      Hive to be used as shelter for you and your allies to protect you from the elements. This structure provides food
      for up to 10 people which can only be eaten while inside the Rock Hive. This user can dismiss the structure as an
      Action.<br /></p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3 and increase the structures hit points by 2d10 + 10 and the amount of Giant Larva summoned
      by +1.</p>
