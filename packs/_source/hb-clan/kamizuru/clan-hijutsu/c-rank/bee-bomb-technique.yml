system:
  description:
    value: >-
      <p>You command your hive to swarm to a creature while carrying Explosive Tools, who then immediately explode,
      catching all creatures in a 15-foot radius sphere. Your hive can carry 2 Explosive Tools of your choice. Each of
      these creatures must make a Dexterity saving throw. On a failed save, they suffer 2d6 poison damage + the effects
      of the explosive tool attached, or half as much on a success. This does spend a use of each explosive tool
      used.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3, the damage by 1d6, the radius by 5 feet, and the number of Explosive Tools attached by +1.</p>
