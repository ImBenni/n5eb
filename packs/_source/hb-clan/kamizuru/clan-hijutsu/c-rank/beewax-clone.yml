system:
  description:
    value: >-
      <p>Your variation of the shadow clone technique, where you create a single clone of yourself formed out of
      Beeswax, called a <em><strong>Beeswax Clone</strong></em>. This clone does not have any weapons or tools and
      cannot speak. <em><strong>Beeswax Clone</strong></em> are able to cast up to 2 D-Rank Kamizuru Clan Hijutsu but
      cannot maintain concentration on any jutsu.</p><p>After the clone reaches 0 Hit points, performs 2 Kamizuru Clan
      Hijutsu, its Summoner has ended its turn more than 120 feet away or is dismissed as a bonus action the jutsu ends
      leaving behind a pile of Beeswax.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at A-Rank, increase the rank of jutsu Beeswax
      clones can cast to C-Rank.</p>
