system:
  description:
    value: >-
      <p>You command your hive to swarm near you to shoot their poisonous stingers at your enemies in a 60-foot line
      that's 10 feet wide. Creatures in range must make a Dexterity saving throw. On a failed save, creatures take 4d8
      poison damage and gain 1 rank of Envenomed on a failure or half as much on a success.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the
      damage by 2d8. If this jutsu is cast at A-Rank or higher the increase the ranks of Envenomed inflicted to +2.</p>
