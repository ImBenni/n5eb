system:
  description:
    value: >-
      <p>You command your hive to swarm and sting a single target you can see
      within range. Make a ranged ninjutsu attack. On a hit, they take 4d6
      Poison damage and must make a Constitution saving throw, gaining a rank of
      <strong>Envenomed</strong> on a failed save.</p><p>Additionally on a
      successful hit, the affected creature takes 2d6 Poison damage at the start
      of their turns for the duration of this Jutsu. This creature can end the
      effects of this Jutsu early by removing the stinger as an Action, Bonus
      Action, or Reaction.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and
      increase the damage by 1d6 and targets by +1.</p>
