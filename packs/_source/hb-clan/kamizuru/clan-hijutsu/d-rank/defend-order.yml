system:
  description:
    value: >-
      <p>Your hive immediately swarms to your protection covering your body in a cloak of defensive bees. You gain 18
      temporary hit points until the beginning of your turn. If a creature hits you with a melee attack while you have
      these hit points, once per turn must make a Constitution saving throw, gaining a rank of Envenomed on a failed
      save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3 and increase temporary hit points gained by +8. If this jutsu is cast at B-Rank, increase the
      ranks of Envenomed inflicted to +2. At S-Rank, increase the ranks of Envenomed inflicted to +3.</p>
