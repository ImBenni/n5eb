system:
  description:
    value: >-
      <p>You command your hive to swarm to you or your allies aid. Your hive lands on an ally creature to spit at their
      injuries with a special saliva to accelerate the healing process.</p><p>Select one creature that you can see
      within range. When this jutsu is initially cast, that creature regains a number of hit points equal to 3d8. For
      the duration of the jutsu, the creature regains 1d8 at the start of each of its turn. As a bonus action, you may
      move the hive to a different ally creature within range.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the healing by +1 die. If this
      jutsu is cast at B-Rank, you may select a second creature to gain the benefits of this jutsu. At S-Rank, you may
      select a third creature.</p>
