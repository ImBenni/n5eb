system:
  description:
    value: >-
      <p>You command your hive to swarm around your enemy and attempt to
      encapsulate them in a mold of honey.</p><p>Select one create you can see
      within range. That creature must make a Dexterity saving throw as honey is
      sprayed at them by countless bees. On a failed save, the target becomes
      <strong>Slowed</strong> for the next minute. A creature
      <strong>Slowed</strong> this way counts as being within difficult
      terrain.</p><p>A creature slowed by this jutsu can as a Action on their
      turn make a Strength (Athletics) check vs your Ninjutsu Save DC to end
      this jutsu's effects on them.</p><p><strong>At Higher Ranks</strong>: For
      each range you cast this jutsu above D-Rank, increase the cost of the
      jutsu by 3 and targets by +1. Alternatively, you can choose to target the
      same creature twice. If you do, the creature only makes their saving throw
      once and on a failed saving throw, the target is also
      <strong>Restrained</strong> until the start of their next turn.</p>
