    description: >-
      <p>A <strong>Restrained</strong> creature has been completely pinned in
      place, unable to move from their space.</p><ul><li><p>A restrained
      creature’s speed becomes 0, and it can’t benefit from any bonus to its
      speed.</p></li><li><p>Attack rolls against the creature have advantage,
      and the creature’s attack rolls have disadvantage.</p></li><li><p>The
      creature has disadvantage on Dexterity saving throws.</p></li></ul>
