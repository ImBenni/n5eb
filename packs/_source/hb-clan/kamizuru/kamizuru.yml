  description:
    value: >-
      <h2 id="kamizuru-clan">KAMIZURU CLAN</h2><p><em>The battlefield lay in shadow, a low hum reverberating as if the
      earth trembled under countless wings. Above, swarms of gilded wings wove through the sky—a shimmering tapestry of
      bees that the Kamizuru of the Hidden Stone commanded with a mastery both beautiful and terrifying, claiming the
      skies as their own.</em></p><p></p><div style="text-align:right"><p>~ Kaname Uzumaki, <em>Tales of the Sister, Ch.
      8, excerpt</em>.</p></div><p></p><hr /><h3 id="the-beekeepers">THE BEEKEEPERS</h3><hr /><h4
      id="kamizuru-traits">KAMIZURU TRAITS</h4><p><strong>Ability Score Increase</strong>: +2 Wis, +1 Int <br
      /><strong>Speed</strong>: Your base walking speed is 30 feet. <br /><strong>Skill Proficiencies</strong>: Animal
      Handling, Medicine. <br /><strong>Extra Language</strong>: Insect-Speak, you can understand and speak to
      insects.</p>
