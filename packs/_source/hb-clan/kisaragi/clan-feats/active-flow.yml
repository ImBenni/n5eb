img: systems/n5eb/assets/content/clans/kisaragi.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Kisaragi Clan, level 8+ <br
      /><strong>Description:</strong> Careful planning and aggressive tactics allow you to further gain control of the
      battlefield. You gain the following benefits:</p><ul><li>Increase your Dexterity or Intelligence score by 1, to a
      maximum of 20.</li><li><p>At the end of each round, if you have not used a reaction, you gain a rank of
      <em><strong>Active Flow</strong></em>, up to a maximum of 3 until combat ends. You may use one <em><strong>Active
      Flow</strong></em> to either:</p><ul><li>Take an additional reaction, which may only be used to cast a Hijutsu or
      Bukijutsu when a creature would provoke an Attack of Opportunity. The jutsu must have a casting time of 1 action,
      and requires a Ninjutsu or Taijutsu attack, and must only target that creature.</li><li>Gain 2 <em><strong>Heat
      Points</strong></em>.</li><li>Add an additional die to the next instance of damage you would
      deal.</li></ul></li></ul>
    chat: ''
