  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Kisaragi Clan <br
      /><strong>Description:</strong> Like those before you, you carry on the ideals of your family to uphold what you
      believe is just. You gain the following benefits:</p><ul><li>Increase your Dexterity or Intelligence score by 1,
      to a maximum of 20.</li><li>You can learn Kisaragi Clan Hijutsu in half the time necessary.</li><li>When you would
      spend <em><strong>Heat Points</strong></em>, you may instead choose to spend Hit Die in place of <em><strong>Heat
      Points</strong></em>. If you would spend Hit Die this way, you take damage equal to the result of the roll of each
      Hit Die spent.</li></ul>
