folder: ME2HAwOVFMqgBQiZ
name: Overdrive-Frost End
type: feat
_id: DltAWvFNfGgrEEuq
img: systems/n5eb/assets/content/clans/kisaragi.webp
system:
  description:
    value: >-
      <p>The Kisaragi Clan has a unique talent for manifesting Ice Release due to their close affinity to both Water and
      Wind Release. Beginning at 7th level, you gain the second nature release you didn't select from the Ice Release
      Affinity clan trait. When casting a jutsu with either Water or Wind Release keywords, you can change the damage
      type to Cold.</p><p>Also, at 7th level, up to twice per turn, when a creature would take Cold damage from you, you
      may force them to make a Constitution saving throw vs your Ninjutsu save DC. On a failed save, they gain 1 rank of
      <em><strong>Chilled</strong></em>.</p><p>Beginning at 11th level, when a creature with 5 ranks of
      <strong>Chilled</strong> would gain another rank of <em><strong>Chilled</strong></em> from you, they become
      <em><strong>Restrained</strong></em> until their turn next round or until they take damage, whichever comes first.
      When a creature is <em><strong>Restrained</strong></em> this way you may choose to either gain <strong>1
      </strong><em><strong>Heat Point</strong></em> or immediately cast a non-Reaction Kisaragi Clan Hijutsu as a
      <strong>Bonus Action</strong> or <strong>Reaction</strong>, granting it the <em><strong>Chain X</strong></em>
      keyword, ignoring its casting time, and reducing the damage by 2 dice (min. 1dX).</p><p>Beginning at 15th level,
      when a creature with <em><strong>Chilled</strong></em> would be hit by Cold damage you dealt, you may instantly
      deal an additional 1d6 Cold damage per rank of <em><strong>Chilled</strong></em> they have.</p>
