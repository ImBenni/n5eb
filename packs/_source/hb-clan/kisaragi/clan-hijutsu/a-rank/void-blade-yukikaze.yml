system:
  description:
    value: >-
      <p><em>You quickly react to draw your blade, immediately predicting the enemy attack, and freezing them in their
      tracks with a single flash.</em><br />  When you would take damage, you may reduce the damage taken by your
      [Weapon's Damage] + 4d6, and immediately move up to your movement speed in a straight line forward.<br />  All
      creatures you pass through must make a Dexterity saving throw. On a failed save, they are
      <em><strong>Stunned</strong></em> and gain a rank of <em><strong>Chilled</strong></em> until the end of their turn
      next round, or no additional effects on success.<br />  When a creature <em><strong>Stunned</strong></em> by this
      Jutsu is damaged in any way, they are no longer <em><strong>Stunned</strong></em>, and take 2d6 Cold damage per
      rank of <em><strong>Chilled</strong></em> they have and lose all ranks of <em><strong>Chilled</strong></em>.</p>
