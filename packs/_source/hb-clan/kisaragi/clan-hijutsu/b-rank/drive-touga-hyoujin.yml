folder: hAI5VfhS7I8F8oXC
name: Drive Touga Hyoujin
type: spell
_id: eT3NThmKPFXh0XuH
img: systems/n5eb/assets/content/clans/kisaragi.webp
system:
  description:
    value: >-
      <p><em>You swing your blade down in front of you, unleashing a vertical wave of icy chakra upon those in front of
      you.</em><br />  Creatures in a 30 foot long, 5 foot wide area in front of you must make a Dexterity saving throw,
      taking 6d12 Cold Damage on a failed save, or half as much on success. Additionally, if this jutsu is cast as a
      <em><strong>Chain 3</strong></em>, a creature with ranks of <em><strong>Chilled</strong></em> that fails their
      Dexterity save takes an additional 1d6 for each rank of <em><strong>Chilled</strong></em> they suffer
      from.</p><p><em><strong>EX Skill.</strong></em> When you would cast this jutsu, you may also spend <strong>1
      </strong><em><strong>Heat Point</strong></em> to lower it's casting time to 1 Bonus Action and replacing the
      <em><strong>Chain 3</strong></em> keyword with <em><strong>Chain X</strong></em>. When this jutsu is granted the
      <em><strong>Chain X</strong></em> keyword it gains the following effects:<br />  If this jutsu is cast as a
      <em><strong>Chain 1</strong></em>, instead of a <em><strong>Chain 3</strong></em>, you deal an additional 6d12
      Cold Damage. However, you cannot cast any jutsu with a <em><strong>Chain</strong></em> keyword for the next 3
      rounds. <br />  If this jutsu is cast as a <em><strong>Chain 2</strong></em>, instead of a <em><strong>Chain
      3</strong></em>, you instead deal 3d12 Cold Damage and knock all creatures hit by this back 30 feet on a failed
      save, or half as much with no additional effect on success.</p>
