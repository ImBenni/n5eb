system:
  description:
    value: >-
      <p><em>You swing your weapon down overhead, and quickly attempt to swing at their legs to catch your target off
      guard. </em><br />  Make two melee Taijutsu attacks against a creature within range using your weapon. The target
      creature must pass a Perception check against your second attack roll. On failure, you make the attack at
      advantage. On a hit, you deal your weapons damage + 2d6.</p><p>If this jutsu is cast as a <em><strong>Chain
      1</strong></em>, a creature hit by both attacks is knocked <em><strong>Prone</strong></em>.<br />  If this jutsu
      is cast as a <em><strong>Chain 2</strong></em>, you gain +10 foot bonus to your movement speed for the next 2
      rounds.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and the damage by 1d6.</p>
