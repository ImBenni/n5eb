img: systems/n5eb/assets/content/clans/kisaragi.webp
system:
  description:
    value: >-
      <p><em>You draw your weapon in a circular motion to freeze your enemy
      before slashing again to shatter the ice.</em><br />  Make two melee
      Taijutsu attacks dealing your weapons damage. On each hit, the target must
      also succeed a Constitution saving throw, gaining 1 rank of
      <em><strong>Chilled</strong></em> on a failed save.</p><p>If this jutsu is
      cast as a <em><strong>Chain 1</strong></em>, you gain a +1 bonus to your
      next attack roll.<br />  If this jutsu is cast as a <em><strong>Chain
      2</strong></em>, make an additional melee Taijutsu attack which also
      knocks the creature back 15 feet on a failed Constitution saving throw,
      instead of gaining an additional rank of
      <em><strong>Chilled</strong></em>.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and the target suffers a -1 penalty on their save.</p>
