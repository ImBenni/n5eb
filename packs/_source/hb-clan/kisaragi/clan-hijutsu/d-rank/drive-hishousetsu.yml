system:
  description:
    value: >-
      <p><em>You thrust your arm out, creating an ornate snowflake to catch your
      enemies off guard.</em> <br />  In a space within 5 feet of you, you
      create an Ice Construct which gives 1 rank of
      <em><strong>Chilled</strong></em> and deals 2d6 Cold Damage to creatures
      that make contact with it. This construct has an AC equal to your Ninjutsu
      save DC, and 10 HP. Each time a creature makes contact with this Ice
      Construct, the construct loses 5 HP. You may choose to manifest this
      construct on a space which a creature occupies.<br />  If you do, the
      creature must pass a Dexterity saving throw to move 5 feet in any
      direction to avoid the construct. Upon a failure, the creature is knocked
      5 feet back in a direction of your choice, taking 2d6 Cold Damage and
      gaining 1 rank of <em><strong>Chilled</strong></em>, and becoming
      <em><strong>Restrained</strong></em> afterwards until their turn next
      round, or until they take damage, whichever comes first.</p><p>If this
      jutsu is cast as a <em><strong>Chain 1</strong></em>, the target creature
      gains 1 additional rank of <em><strong>Chilled</strong></em> on contact
      with the construct.<br />  If this jutsu is cast as a <em><strong>Chain
      2</strong></em>, you gain a +1 bonus to your attack rolls for the next 2
      rounds.</p><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above D-Rank, increase the cost of this jutsu by <em>1
      <strong>Heat Point</strong></em> and increase the construct's HP by 5 and
      Cold damage by 2d6.</p>
