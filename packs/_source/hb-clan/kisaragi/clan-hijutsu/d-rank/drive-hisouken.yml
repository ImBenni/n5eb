system:
  description:
    value: >-
      <p><em>You fire an ornate blade of ice straight towards your target.</em><br />  For every 10 feet this blade
      travels, it deals 1d6 less Cold Damage. Make a Ranged Jutsu Attack, on a hit, you deal 4d6 Cold Damage (min. 1d6).
      <br />  <em><strong>EX Skill.</strong></em> When you would cast this jutsu, you may also spend <strong>1
      </strong><em><strong>Heat Point</strong></em> to lower it's casting time to 1 Bonus Action and replacing the
      <em><strong>Chain 1</strong></em> keyword with <em><strong>Chain X</strong></em>. When this jutsu is granted the
      <em><strong>Chain X</strong></em> keyword it gains the following effects:<br />  If this jutsu is cast as a
      <em><strong>Chain 1</strong></em>, you gain advantage on your next attack roll.<br />  If this jutsu is cast as a
      <em><strong>Chain 2</strong></em>, the target creature takes half damage from this jutsu, but gains 1 rank of
      <em><strong>Chilled</strong></em> when hit.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6 and range by 10ft.</p>
