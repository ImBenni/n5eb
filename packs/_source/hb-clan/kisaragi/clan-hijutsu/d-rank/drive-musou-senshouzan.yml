folder: P0jxeoCAOzLGa5OR
name: Drive Musou Senshouzan
type: spell
_id: jxKwSlTJUXGA7uHE
img: systems/n5eb/assets/content/clans/kisaragi.webp
system:
  description:
    value: >-
      <p><em>You quickly materialize an ornate icicle blade and ride on it
      attempting to collide it into your target.</em><br />  You dash in a
      straight line, up to your remaining movement speed. If this movement would
      be interrupted due to a creature in your path, they must make a Dexterity
      saving throw to avoid the collision. On a failed save, they take 2d10 Cold
      damage, and you end your movement in the space before you hit them.
      Additionally, you may choose to make a melee weapon attack dealing your
      weapon's damage.<br />  If you do not choose to make a melee weapon attack
      this way, you gain advantage on your next weapon attack. <br /> 
      <em><strong>EX Skill.</strong></em> When you would cast this jutsu, you
      may also spend <strong>1 </strong><em><strong>Heat Point</strong></em> to
      lower it's casting time to 1 Bonus Action and replacing the
      <em><strong>Chain 1</strong></em> keyword with <em><strong>Chain
      X</strong></em>. When this jutsu is granted the <em><strong>Chain
      X</strong></em> keyword it gains the following effects:<br />  If this
      jutsu is cast as a <em><strong>Chain 1</strong></em>, the target creature
      gains 1 rank of <em><strong>Chilled</strong></em>, and is knocked back 15
      feet on a failed save.<br />  If this jutsu is cast as a <em><strong>Chain
      2</strong></em>, you may make an additional melee weapon attack, for a
      total of two weapon attacks.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3, and the Cold damage dealt by 1d10.</p><p></p>
