    value: >-
      <h3 id="cold-justice">Cold Justice</h3><hr /><p>The Kisaragi clan -- a proud family of Samurai from the Land of
      Iron who are known for their unwavering loyalty to keeping order. Though they are few in number, they hold their
      head high, and are able to easily back their words up using force through their unique variant of Ice Release in
      combination with Bukijutsu.</p><h3 id="kisaragi-traits">Kisaragi Traits</h3><hr /><ul><li><strong>Recommended
      Ability Score Increase:</strong> +2 Dex, +1 Int</li><li><strong>Speed:</strong> Your base walking speed is 30
      feet.</li><li><strong>Skill Proficiencies:</strong> Intimidation, Ninshou.</li><li><strong>Weapon
      Proficiencies:</strong> Katana, Tachi.</li><li><strong>Ice Release Affinity:</strong> You begin with either
      <strong>Water</strong> or <strong>Wind</strong> <strong>Release</strong> Affinity. (Pick one)</li></ul>
