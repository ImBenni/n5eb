system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kōsoku Clan, Level 4+ <br />You fight for
      others, putting your speed to the test to protect them. You gain the following benefits;</p><ul><li>Increase your
      Will of Fire maximum to 5.</li><li><p>When an ally within 30 feet of you would be the target of an attack, as a
      reaction you may impose the attack as if you were the target and attempt to clash it, regardless if the jutsu has
      the clash keyword or not. On a success the attack is completely negated and the target gains the concussed
      condition. You are considered to cast a taijutsu of a rank determined by your movement
      speed.</p><ul><li>D-Rank:0-60 feet</li><li>C-Rank:65-95 feet</li><li>B-Rank:100-195 feet</li><li>A-Rank:200-295
      feet</li><li>S-Rank:300+ feet</li></ul></li></ul>
