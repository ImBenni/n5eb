    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kōsoku Clan, Level 8+ <br />You fight with
      a sense of momentum, going with the flow of combat. You gain the following benefits;</p><ul><li>When you dodge an
      attack, you increase your ac by +1 until the beginning of your next turn, this stacks up to two
      times.</li><li>When you make an attack and miss, increase your next attack roll by +1.</li><li>When you fail a
      dexterity saving throw, increase the next save by 1d4.</li></ul>
