system:
  description:
    value: >-
      <p>At 1st level, you're always set to show off your speed. As a bonus action you may take the dash action. If you
      already gain this benefit from a class feature, you also gain the benefits of the disengage action when you take
      the dash action.</p><p>At 11th level, you can give yourself the benefits of the dash action at the start of your
      turn. You may do this an amount of times equal to your dexterity modifier per long rest. At 18th level, you
      recover this on any rest.</p>
