img: systems/n5eb/assets/content/clans/kusoku.webp
system:
  description:
    value: >-
      <p>Your speed is by no means easy to stop, slow just isn't your style. At 7th level, your movement speed cannot be
      reduced by more than half, excluding the <em><strong>restrained</strong></em> or
      <em><strong>grappled</strong></em> conditions. Additionally, your movement speed can benefit from any number of
      multiplicative effects, instead of just one. At 15th, if you would spend your action and bonus action casting
      Kōsoku clan hijutsu, as a reaction you may cast a Kosoku clan hijutsu with the casting time of an action. You may
      do this an amount of times equal to your dexterity modifier per long rest. At 18th level, you gain immunity to the
      <em><strong>slowed</strong></em> condition and your reaction cannot be taken away or negated by a condition,
      feature, or jutsu.</p>
    chat: ''
