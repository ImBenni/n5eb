name: Speed with Style
type: feat
_id: OBySon2bA5wr23M9
img: systems/n5eb/assets/content/clans/kusoku.webp
system:
  description:
    value: >-
      <p>You hold pride in your clan's innate speed and you leverage on your foes. At 3rd level, you gain benefits based
      on the intensity of your speed. If you would apply for both features, you may select one of these features to gain
      the benefit of. You may swap which you'd benefit from as a free action on your turn. At 11th level, you may
      benefit from both of these features at once.</p><ul><li><strong>Stylish Executioner:</strong> You gain an
      additional reaction that can only be used to make an attack of opportunity. If this were an unarmed strike,
      increase its damage die by 1 step. You cannot use this reaction on a creature whose dexterity modifier is higher
      than yours.</li><li><strong>Swift Step:</strong> While your movement speed is the highest compared to all other
      creatures within a combat, you're always under the effects of the disenegage action. When an attack misses you,
      you may move 10 feet in any direction.</li></ul>
    chat: ''
