system:
  description:
    value: >-
      <p>You channel your speed into a catastrophic destructive power source. You then exert this power into a chaotic
      blast. Every creature in range must make a Constitutiton saving throw. On a failed saving throw, creatures take
      8d4+30 force damage. On a success, a creature takes half damage. A creature who's HP reaches 0 as a result of this
      jutsu immediately dies, being evaporated into the essence of your speed.</p><p>Depending on how high your movement
      speed is when you cast this jutsu becomes empowered; All effects listed below stack with one
      another.</p><ul><li>Over 100+ feet: Increase the damage dealt by +10.</li><li>Over 150+ feet: On a failed saving
      throw, creatures gain 3 ranks of bleeding.</li><li>Over 200+ feet: Increase the damage dealt by +10.</li><li>Over
      300+ feet: Double this jutsu's radius.</li><li>Over 500+ feet: Creatures make their saving throw against this
      jutsu at disavantage, and cannot gain advantage on this jutsu's saving throw by any means.</li></ul>
    chat: ''
