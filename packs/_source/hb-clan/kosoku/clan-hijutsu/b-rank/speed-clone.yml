name: Speed Clone
type: spell
_id: Cf0gtfRgzluxzguZ
img: systems/n5eb/assets/content/clans/kusoku.webp
system:
  description:
    value: >-
      <p>You are able to manifest clones from your sheer speed. You are only able to summon one clone at a time. Clones
      you cast have HP equal to your dexterity score at the time of casting. The clone's AC is equal to your Taijutsu
      save DC. This clone spawns in a space within 5 feet of you that can hold it. You cannot directly control this
      clone. When you make an unarmed attack, weapon attack, or cast a taijutsu with the wind release keyword, your
      clone casts the same jutsu targeting a creature within 5 feet of your target. Attacks from your clone compare your
      original attack result to their targets AC. The Clone always moves with you, staying within 5 feet of you and is
      unable to be forcefully pulled away from you. The clone can benefit from any Kōsoku feature that you have
      active.</p>
    chat: ''
