system:
  description:
    value: >-
      <p>You kick someone after dashing around at a near untrackable speed. Make a taijutsu attack against a target in
      range, on a hit you deal your unarmed damage+4d4. Regardless of a hit or miss, you move to a space within 5 feet
      of the target. This movement does not provoke attack of opportunities. If your movement speed is equal to or
      greater than double the target's movement you gain +1 critical threat range on this attack. If your movement speed
      is equal to or greater than triple the target's movement speed, they cannot react to this attack. <br /><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and
      the damage by 2d4.</p>
