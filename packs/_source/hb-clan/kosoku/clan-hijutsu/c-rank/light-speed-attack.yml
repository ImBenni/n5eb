system:
  description:
    value: >-
      <p>You charge up energy to blaze through the battlefield and blitz those too slow to keep up. While this jutsu is
      active, as an action you can make a melee taijutsu attack against any targets within range. All targeted creatures
      compare their AC vs your attack result On a hit a creature takes your unarmed damage + 4d6 force damage. If your
      movement speed is equal to or greater than twice your target's movement speed the target must make a strength
      saving throw. On a failed save, they gain the dazed condition. <br /><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d6.</p>
