system:
  description:
    value: >-
      <p>You perform a lateral axe kick on someone after dashing towards them. Make a taijutsu attack against a target
      within range dealing your unarmed damage+ 3d8. Regardless of a hit or miss, you move to a space within 5 feet of
      the target. This movement doesn't provoke attacks of opportunity.</p><p>If this jutsu is casted as a
      <em><strong>Finisher</strong></em>, the target must be at least 10 feet above the ground. On a hit the target is
      sent to the ground, taking fall damage as if they fell from that height and gains the concussed
      condition.</p><p>If this jutsu lands a critical hit, the damage dealt is multiplied by 1.5 instead of by 2. The
      target then bounces off the ground and is launched 20 feet into the air until the end of the next turn. While in
      the air this way, you or an ally can target the affected creature with a taijutsu
      <em><strong>Finisher</strong></em> regardless of range, oncce per turn, using either an Action or Bonus action,
      ignoring its listed casting time. <br /><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the damage by 2d8</p>
