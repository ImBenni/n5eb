system:
  description:
    value: >-
      <p>You perform a swift attack that propels you towards a target creature you can see with extreme accuracy. Make a
      Taijutsu Attack. On a hit target creature takes your unarmed damage + 2d8 Bludgeoning damage. If your movement
      speed is equal to or greater than twice your target's movement speed, this attack is made at advantage. Regardless
      if you hit or miss, you end your movement within 5 feet of the original target. <br /><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the
      number of attacks by +1.</p>
