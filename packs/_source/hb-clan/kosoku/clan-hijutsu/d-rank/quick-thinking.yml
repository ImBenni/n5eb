system:
  description:
    value: >-
      <p>You run hundreds of scenarios in your head in a single moment, figuring out how to best deal with incoming
      damage. You gain +5 AC to the triggering attack or advantage on the triggering dexterity saving throw. Until the
      beginning of your next turn,all other attacks made against you have disadvantage and you have advantage on
      dexterity throws. Additionally, you gain an additional reaction which can only be used for the <em><strong>Read
      The Enemy</strong></em> reaction.</p><p></p>
