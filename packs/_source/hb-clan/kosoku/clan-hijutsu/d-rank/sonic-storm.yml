system:
  description:
    value: >-
      <p>You kick the air, releasing a powerful gust of wind that violently erupts on contact. Make a ranged taijutsu
      attack against a creature within range. On hit this jutsu deals your unarmed damage + 2d10 Wind damage.
      Additionally regardless of a hit or miss, creatures of your choice within 10 feet of the original target must make
      a dexterity saving throw. On a fail they take damage equal to the 2d10. <br /><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 2d10 and
      1d10 respectively.</p>
