name: Chaos Control
type: spell
_id: aWQWx75nQuAjc1FT
img: systems/n5eb/assets/content/clans/kusoku.webp
system:
  description:
    value: >-
      <p>You use your chakra to completely hinder your foe's movement. Select a creature within range of this jutsu.
      They must make a charisma saving throw. On a success they gain one rank of slowed until the beginning of their
      next turn. On a failed save, they get two ranks of slowed. As an action on your next turn, you can force this
      creature to make the same save again. If you do not do this, the creature automatically loses one rank of the
      slowed condition. If a creature gains 5 ranks of slowed from this jutsu they lose all stacks and gain the
      incapacitated condition until the end of their next turn. After this happens, this jutsu immediately ends. A
      creature who is slowed by this jutsu can make a charisma save using an action or bonus action on their turn. If
      they pass this save or they reach 0 ranks of the slowed condition then this jutsu immediately ends.</p><p></p>
