system:
  description:
    value: >-
      <p>You form a spear made of chakra, then shoot it at blinding speed to temporarily hinder an unfortunate target.
      Make a ranged ninjutsu attack on a creature in range. On hit, it deals 4d10 force damage. The creature must also
      make a constitution saving throw. On a fail they take an additional 2d10 force damage and gain a rank of the
      shocked condition. <br /><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and the damage by 2d10.</p>
