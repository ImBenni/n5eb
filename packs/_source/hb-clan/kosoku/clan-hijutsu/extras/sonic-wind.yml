system:
  description:
    value: >-
      <p>You create a small tornado that dissipates as fast as it forms. Creatures in range must make a dexterity saving
      throw, on a fail they take 4d6 wind damage. Creatures who failed this save must also make a strength saving throw.
      On a failed save any weapons the creatures are holding are knocked out of their hands and sent flying directly at
      them, dealing their weapon damage + 1d8 wind damage. <br /><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d6 and 1d8 respectively.</p>
