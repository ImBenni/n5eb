  description:
    value: "<h3 id=\"faster-than-light\">Faster Than Light</h3><p>The Kōsoku clan is a rival clan to the Namikaze. Residing in many villages across the land, they hold a begrudging respect for the Namikaze clan. Most usually take on a nomadic life style while others use their speed to assist villages in many situations.</p><h4 id=\"k-soku-traits\">Kōsoku Traits</h4><p>\_\_\_\_<strong>Ability Score Increase:</strong> +2 Dex, +1 Cha</p><p><strong>Speed:</strong> Your base walking speed is 35 feet.</p><p><strong>Skill Proficiencies:</strong> Acrobatics, Perception</p><p><strong>Wind Release Affinity:</strong> You begin with Wind Release affinity.</p><p><strong>Wind Release Literacy:</strong> You reduce the ability score requirement to learn and cast Jutsu with the Wind Release keyword by 2.</p>"
