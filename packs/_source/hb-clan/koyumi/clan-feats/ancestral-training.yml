system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Koyumi Clan, Level 12+<br />Even outside of
      combat you commune with your ancestors for guidance and training, resulting in a strengthened bond. You gain the
      following benefits:</p><ul><li>You can use your <strong>Help from Beyond the Grave</strong> clan feature an
      additional time before needing to rest.</li><li>While you are gaining the benefits of your <strong>Help from
      Beyond the Grave</strong> clan feature you cannot lose concentration on bukijutsu as a result of failing a
      concentration check.</li><li>If you would gain the benefits of <em>The Warrior</em> you also gain an additional
      attack when you take the Attack Action.</li><li>If you would gain the benefits of <em>The Assassin</em> you also
      gain a bonus to Initiative equal to your Taijutsu Ability Modifier.</li><li>If you would gain the benefits of
      <em>The Seer</em> you also gain advantage on Charisma, Intelligence, and Wisdom saving throws.</li></ul>
