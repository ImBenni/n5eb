  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Koyumi Clan<br />Even while they are not
      directly with you, you can still feel their presence. You gain the following benefits:</p><ul><li>Increase your
      Strength, Dexterity, or Wisdom score by 1, to a maximum of 20.</li><li>You gain expertise in either martial arts
      or perception checks and you cannot make either check at disadvantage.</li><li>Twice per rest, you may gain
      advantage on any d20 roll, as your ancestors guide your path.</li></ul>
