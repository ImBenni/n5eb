folder: SqORtQN69SCDzr9f
name: Ancient Aptitude
type: feat
_id: oF3pShAxZwKZWiK5
img: systems/n5eb/assets/content/clans/koyumi.webp
system:
  description:
    value: >-
      <p>Since the inception of your clan, your family line has always had mastery over the bow, almost using it like a
      force of nature more than a weapon.</p><p>Beginning at 1st level, when making a ranged weapon attack or casting a
      Bukijutsu that requires ranged attacks or a ranged weapon, you can use Dexterity in place of Strength for your
      Taijutsu Ability Modifier. Also at 1st level, all bows you wield gain 2 properties of your choice from the
      following list: <em>Blocking</em>, <em>Critical</em>, <em>Deadly</em>, <em>Hidden</em>, <em>Lethal</em>, or
      <em>Multiattack</em>. Additionally, your bows have their damage die increased by one step, and you cannot be
      disarmed.</p><p>Starting at 7th level, your weapons are imbued with so much chakra they cannot be broken and have
      their ranges doubled.</p><p>Starting at 15th level, you gain 1 additional property and when you would miss a
      ranged weapon or taijutsu attack you may choose to reroll the attack, once per round.</p><pre><code></code></pre>
