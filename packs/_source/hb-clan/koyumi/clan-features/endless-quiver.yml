system:
  description:
    value: >-
      <p>Beginning at 3rd level, you have gained access to a special quiver that your family has made for generations.
      Using fuinjutsu, your quiver can hold an almost infinite amount of ammo. Your ammunition die starts at a d12 and
      any time a feature or jutsu would require you to use all of your ammunition you instead reduce your ammunition die
      step by 1.</p>
