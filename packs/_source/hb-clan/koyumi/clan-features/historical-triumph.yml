system:
  description:
    value: "<p>Beginning at 11th level, due to your clan's techniques being ingrained in your soul through\_countless hours of practice, you have learned to perform them with a fluidity that requires much less energy. When you cast a Koyumi clan hijutsu you can reduce the cost of the jutsu by 2 to a minimum of 1.</p><p>Additionally, once per turn when you cast a Koyumi clan hijutsu you can upcast the jutsu by one rank, for no additional cost. You may use this feature a number of times equal to your\_Wisdom modifier to a minimum of 1.</p>"
