name: God Slaying Arrow
type: spell
_id: VuRpFGS31W5z1oHd
img: systems/n5eb/assets/content/clans/koyumi.webp
system:
  description:
    value: >-
      <p>When you cast this jutsu you automatically reduce your ammunition stack by one step.</p><p>You pull back your
      bow string with all your might almost snapping the string with the force. You step back, indenting the ground and
      cracking the earth off of sheer pressure. As you release the arrow you imbue it with enough power to topple the
      gods themselves. Make a ranged taijutsu attack dealing your weapon's damage + 15d8 force damage as the arrow
      impales them.</p><p>On a hit a creature must make a Wisdom saving throw at disadvantage as even their soul is
      pierced by the arrow. On a failed save any jutsu that require chakra to maintain end, and they lose access to
      chakra molding for 1d4+1 rounds. If a creature is reduced to 0 hit points as a result of this jutsu their soul is
      shattered by the arrow, never to be seen again.</p><p>All creatures in a 15 foot wide line between you and the
      target creature must make a Dexterity saving throw taking 10d4 slashing damage on a failed save and half as much
      on a success, as the wind slices the air around them.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast <br />this jutsu above A-Rank, increase the cost of this jutsu by 3 and increase the damage by 2d8 and 3d4
      respectively.</p>
