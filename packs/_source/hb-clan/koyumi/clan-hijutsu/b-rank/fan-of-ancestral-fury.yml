system:
  description:
    value: >-
      <p>When you cast this jutsu you must spend one ammunition stack.</p><p>You make a line of arrows on the string of
      your bow firing them off in a cone in front of you, devastating armies in an instant. Each and every arrow fueled
      and guided by the righteous fury of your forefathers. Make an attack roll against all creatures of your choice
      within range, dealing your weapon's damage + 10d4 on a hit. Objects, structures, and constructs take double damage
      and all but full cover is ignored.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      <br />B-Rank, increase the cost of this jutsu by 3 and increase the damage by 2d4. If this jutsu is cast at
      S-Rank, increase the damage die by one step.</p>
