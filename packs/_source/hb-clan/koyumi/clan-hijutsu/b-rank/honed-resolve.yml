system:
  description:
    value: >-
      <p>You begin to focus your chakra into the tips of your arrows, enhancing your every shot as if you would shot
      through your target with killing intent. For the duration you gain the following benefits:</p><ul><li>You gain a
      +1d6 bonus to attack and damage rolls with ranged weapon and taijutsu attacks.</li><li>Twice per turn, when you
      hit a creature with a ranged weapon or taijutsu attack you can force them to make a Constitution saving throw or
      gain 1 rank of lacerated.</li><li>When you score a critical hit with a ranged weapon or ranged taijutsu attack you
      ignore resistance, damage reduction, and temporary hit points. If the target is immune to the damage your jutsu,
      you instead treat their immunity as resistance.</li></ul><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above <br />B-Rank increase the cost of this jutsu by 3 and the size of the die by 1 step.</p>
