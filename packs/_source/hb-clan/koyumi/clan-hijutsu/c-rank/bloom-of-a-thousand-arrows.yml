name: Bloom of a Thousand Arrows
type: spell
_id: CBc7In7QOhtZEY2n
img: systems/n5eb/assets/content/clans/koyumi.webp
system:
  description:
    value: >-
      <p>When you cast this jutsu you must spend one ammunition stack.</p><p>You fill your bow with enough arrows to
      almost collapse under the weight, before spinning in place and releasing the congretation of arrows at such a
      speed it is like an explosion going off. All creatures other than you within range must make a Dexterity saving
      taking your weapons damage + 3d12 and having their movement speed reduced by half until the end of their next turn
      on a failed save. On a success they take half damage and suffer no effects.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above <br />C-Rank, increase the cost of this jutsu by 3 and
      increase the damage by 1d12. If this jutsu is cast at B-Rank, increase the radius by 15 feet. If this jutsu is
      cast at S-Rank, a creature who fails the saving throw of this jutsu has their movement speed reduced to 0.</p>
