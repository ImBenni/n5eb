name: Hachiman's Spirit
type: spell
_id: Bafw4vw9WPpx8Rs4
img: systems/n5eb/assets/content/clans/koyumi.webp
system:
  description:
    value: >-
      <p>You focus on your training and pull out your true strength, entering a form of tranquility. Your pupils dilate
      and your movements become like running water. For the duration you gain the following benefits:</p><ul><li>You
      gain advantage on all skill and ability checks regarding bukijutsu.</li><li>You increase your movement speed by an
      amount equal to your taijutsu ability modifier times 5.</li><li>You roll damage dice twice, taking the highest
      result.</li><li>You can cast ranged bukijutsu with the clash keyword, as a reaction.</li></ul><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above <br />C-Rank increase the cost of this jutsu by 3. If this
      jutsu is cast at B-Rank, you cannot roll skill and ability checks regarding bukijutsu at disadvantage.</p><p>If
      this jutsu is cast at A-Rank, you instead double the movement speed bonus. If this jutsu is cast at S-Rank, you
      may cast a jutsu with the <em><strong>Finisher</strong></em> keyword as a Finisher without needing to set it up
      with a combo.</p>
