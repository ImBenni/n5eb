system:
  description:
    value: >-
      <p>You quickly knock an arrow into your bow and release a shot that moves wildly in the air, making it harder to
      predict. Make a ranged taijutsu attack at advantage, dealing your weapon's damage + 2d10. If this jutsu scores a
      critical hit you double all non-dice damage bonuses.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above <br />D-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d10. If this
      jutsu is cast at B-Rank, increase the amount of attacks by +1. If this jutsu is cast at S-Rank, increase the
      amount of attacks by +2.</p>
