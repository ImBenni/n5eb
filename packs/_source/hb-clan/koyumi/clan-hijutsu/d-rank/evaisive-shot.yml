system:
  description:
    value: >-
      <p>You see danger coming and choose to attack and defend at the same time. Until the start of your next turn, you
      gain a +3 bonus to your AC and advantage on Dexterity saving throws. Once per round, when a creature would miss
      you with an attack or you would succeed on a Dexterity saving throw you may move 10 feet and make a ranged
      taijutsu attack dealing your weapon's damage. This movement does not provoke attacks of
      opportunity.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank,
      increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank, if you are subjected to an effect, that
      allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on
      a saving throw, and only half damage if you fail. If this jutsu is cast at S-Rank, the once per round clause of
      this jutsu is changed to once per turn.</p>
