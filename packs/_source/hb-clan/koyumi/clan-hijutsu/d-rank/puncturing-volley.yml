system:
  description:
    value: >-
      <p>When you cast this jutsu you must spend one ammunition stack.</p><p>You swiftly gather a collection of arrows
      and pull back your bow preparing to rain down destruction leaving a pillar of arrows in your wake. Select a space
      you can see within range. All creatures of your choice within 15 feet of the select space, who are not under total
      cover from a structure must make a Dexterity saving throw, taking your weapons damage + 2d8.</p><p>Until the end
      of your turn, you can target one affected creature with a Bukijutsu <em><strong>Finisher</strong></em> regardless
      of range, once per turn, using either an Action or Bonus action, ignoring its listed casting
      time.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank, increase the
      cost of this jutsu by 3 and the damage by 1d8. If this jutsu is cast at B-Rank, you may cast this jutsu as a
      reaction. If this jutsu is cast at S-Rank, you may cast this jutsu as a free action, once per turn.</p>
