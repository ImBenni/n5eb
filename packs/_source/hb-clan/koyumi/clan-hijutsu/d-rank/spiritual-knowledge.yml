img: systems/n5eb/assets/content/clans/koyumi.webp
system:
  description:
    value: >-
      <p>Using the dormant chakra in your bow, you partially channel the energy of your ancestors through it, granting
      you knowledge from their lives. For the duration you gain the following benefits:</p><ul><li>Difficult terrain
      doesn't slow your group's travel and if you are traveling alone, you can move stealthily at a normal
      pace.</li><li>Your group cannot become lost.</li><li>Your group cannot be surprised and your group is aware of any
      environmental threats, such as natural disasters.</li><li>You learn the types of flora and fauna within 1 mile of
      you, including their medicinal effects for the flora, and the behavior patterns for the fauna.</li><li>When you
      forage, you find twice as much food as you normally would.</li><li>While tracking other creatures, you also learn
      their exact number, their sizes, and how long ago they passed through the area.</li></ul><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank, increase the cost of this jutsu by 3. This
      jutsu's duration becomes 8 Hours at C-Rank, This jutsu's duration becomes 24 Hours at B-Rank.</p><p>If you cast
      this jutsu at A-Rank you gain advantage on all stealth, survival, nature, and perception checks.</p><p>If you cast
      this jutsu at S-Rank you gain access to the "memories" of the land. You can peer through the memories of your
      ancestors, seeing significant events that occurred in the area within the past 100 years, learning about previous
      inhabitants, climactic battles, or powerful jutsu that shaped the land.</p>
