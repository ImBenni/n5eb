system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Legendary Wukong Clan, Level 4+<br
      /><em>Your anger affects every aspect of your fighting style, causing your outbursts to become all the more
      common.</em> You gain the following benefits:</p><ul><li>Increase your Strength score by 1, to a maximum of
      20.</li><li>Once per long rest, whenever you are reduced to 0 HP and would have at least half your maximum in
      Berserk ranks, you automatically enter <strong>Wrathful Form</strong> even if you have no more uses of said
      transformation and gain a amount of temporary hit points equal to your proficiceny bonus times 5. When you enter
      Wrathful Form in this way, you instantly gain maximum ranks of Berserk.</li><li>Whenever you take damage that
      would equal at least 25% of your maximum hp or gain maximum ranks of Berserk, you may spend your reaction to enter
      into <strong>Wrathful Form</strong>.</li><li>While in <strong>Wrathful Form</strong>, you increase the maximum
      number of <strong>Ikari Dice</strong> you can store at once by 2.</li></ul>
