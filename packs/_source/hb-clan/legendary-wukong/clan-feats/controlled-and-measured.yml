name: Controlled and Measured
type: feat
_id: xirU9a9pAbMnGa10
img: systems/n5eb/assets/content/clans/legendary-wukong.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Legendary Wukong Clan, no My Cherished
      Ones feat, and you must take this feat between levels 1 and 4. If you are level 5+, you cannot take this feat. <br
      /><em>On the surface you seem calm and collected, however deep within lies a monster ready to rampage, tearing
      apart all in your path.</em> You gain the following benefits:</p><ul><li>Increase your Strength or Wisdom score by
      1, to a maximum of 20.</li><li>The number of times you may use your <strong>Control Mechanism (CM)</strong> per
      long rest becomes your full proficiency bonus. Additionally, at the conclusion of a short rest you regain half the
      uses of your CM.</li><li>While you are under the effects of <strong>Wrathful Form</strong> and you have maximum
      ranks of Berserk, you may spend a Bonus Action to shatter your <strong>Control Mechanism (CM)</strong>. You are
      unable to use your CM in any way until your next long rest. For the remaining duration of your Wrathful Form, you
      increase your unarmed damage die by +1 and you automatically gain 1 <em><strong>Ikari Die</strong></em> at the end
      of each of your turns.</li><li>You are unable to have ranks of Berserk cleared from you as a result of Jutsu or
      Features from outside of this clan unless you have less then half your maximum ranks of Berserk. If you have any
      more then this number of ranks, you must make a Wisdom Saving Throw against the Jutsu or Feature if it doesn't
      already have a Saving throw.</li></ul>
    chat: ''
