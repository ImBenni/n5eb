name: Hulking Fiend
type: feat
_id: d4IbsuXuijJWtqtX
img: systems/n5eb/assets/content/clans/legendary-wukong.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Legendary Wukong Clan, Level 12+<br
      /><em>You are a devil walking the earth, a creature of mass and power that is built to conquer.</em> You gain the
      following benefits:</p><ul><li>Increase your Strength or Constitution score by 1, to a maximum of
      20.</li><li>While under the effects of <strong>Wrathful Form</strong>, you instead increase your size category to
      Huge.</li><li>Once per round, in place of a unarmed attack, you may spend a minimum of 2 <strong>Ikari
      Dice</strong> to perform a <strong>Compress</strong> action. You make a Atheletics or Martial Arts check against
      the target creature's Atheletics or Acrobatics check. On a success, you grab hold of and grapple the creature,
      dealing your [Unarmed Damage Die] and adding all spent Ikari Dice to the damage total. If a creature were to begin
      their turn while grappled in this way, they take 1 Ikari Die worth of damage, the damage type of this being based
      off your unarmed damage.</li><li>Twice per long rest, whenever you successfully perform the <strong>Crush</strong>
      or <strong>Compress</strong> action, you may spend 3 Ikari Dice to cast the <em><strong>Gigantic
      Rage</strong></em> or <em><strong>Bloody Slam</strong></em> jutsu as a Bonus Action, counting them as Finishers
      when doing so.</li></ul>
