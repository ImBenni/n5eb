system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Legendary Wukong Clan, Level 8+<br
      /><em>Your power overflows within you constantly, seeking for a quick way to expend itself.</em> You gain the
      following benefits:</p><ul><li>Increase your Constitution score by 1, to a maximum of 20.</li><li>Whenever you
      cast the <em><strong>Rising Rage</strong></em> Hijutsu, you may spend an additional Chakra Die as apart of casting
      the jutsu, gaining an additional rank of Berserk and heal an amount of hp equal the amount of chakra
      regained.</li><li>Over the course of a rest, you instantly roll one Hit or Chakra die regaining the result as
      usual. This does not spend the die.</li><li>Once per casting, when you cast a Hijutsu that deals damage while in
      <strong>Wrathful Form</strong>, you may spend 1 Hit Die and roll it, adding the result to the damage.</li></ul>
    chat: ''
