name: True Anger Awakening Outrage
type: feat
_id: yVOO7BaplwcNbZIK
img: systems/n5eb/assets/content/clans/legendary-wukong.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Legendary Wukong Clan, Level 16+, Anger
      Awakening Feat <br /><em>Your anger further evolves, allowing you to break past any form of preset limitations
      yoyu had before. You gain the following benefits:</em></p><ul><li>Whenever you were to enter <strong>Wrathful
      Form</strong> as a result of being reduced to 0 HP, you no longer need any ranks of Berserk to do so and you
      instead gain a number of temporary hit points equal to your proficiency bonus times 10.</li><li>Twice per
      <strong>Wrathful Form</strong>, whenever you land a critical hit on a creature with a unarmed attack, Taijutsu, or
      Hijutsu you cast, you may spend up to 5 <strong>Ikari Dice</strong> to heal an amount of HP equal to half the
      result.</li><li>While in <strong>Wrathful Form</strong> and your HP is at 50% or below your maximum, your Ikari
      Dice increase their die step by 1.</li><li><p>Whenever you enter <strong>Wrathful Form</strong> you gain 1
      <strong>Spark of Outrage</strong>. You may spend the Spark of Outrage on the following effects, you lose the Spark
      of Outrage at the end of Wrathful Form if you did not use it:</p><ul><li>You may spend it to cast a Hijutsu with
      the casting time of a Action or Bonus Action in the middle of another creature's turn.</li><li>You may spend it
      and select a Taijutsu you know that deals damage, until the end of the current turn the Taijutsu counts as a
      Hitjutsu and gains the Finisher keyword. If you do so, you may spend any number of Ikari Dice, increasing the
      damage die by +1 for each die spent, up to a maximum of +5.</li><li>You instantly gain maximum ranks of
      Berserk.</li></ul></li></ul><p></p>
