system:
  description:
    value: >-
      <p>You gather all your rage and power into a single small ball within your hand before releasing it directly
      toward a target location. The ball then expands, consuming all that would remain within its path.</p><p>Select a
      space within range. All creatures within 50 feet must make a Constitution Saving Throw, taking 7d12 + Xd8 Force
      Damage (X equals your current ranks of Berserk) on a failure. On a success, they take half damage. Any space
      affected by this jutsu becomes difficult terrain.</p><p>At the conclusion of this jutsu, if you do not have
      maximum ranks of Berserk, you gain 2 ranks. If you cast this jutsu while at maximum ranks of Berserk and an
      affected creature were to use a reaction jutsu of any kind, you initiate a clash with them even if their jutsu
      does not have the Clash keyword, rolling your choice of Martial Arts or Ninshou. Any creature that clashes with
      this jutsu receives a penalty to their clash check equal to half your Ninjutsu or Taijutsu ability
      modifier.</p><p><strong>Wrathful Form:</strong> If you are currently benefiting from Wrathful Form, you roll clash
      checks with this jutsu at advantage, being unable to roll at disadvantage.</p>
