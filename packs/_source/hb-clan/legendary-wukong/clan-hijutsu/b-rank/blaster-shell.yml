system:
  description:
    value: >-
      <p>You launch a massive volley of energy, designed to overwhealm and completely destroy your enemies
      defenses.</p><p>You make a number of ranged Ninjutsu attacks equal to your Ninjutsu, up to a maximum of 5 attacks.
      On a hit, you deal 2d4 force damage and lower the target's damage reduction by 2 until the beginning of your next
      turn. If a creature were to have 0 damage reduction, you instead add your Ninjutsu Ability Modifier to damage
      dealt. If you hit a single creature with multiple attacks, this jutsu gains additional
      effects.</p><ul><li><strong>2 Attacks:</strong> You gain 1 rank of Berserk.</li><li><strong>4 Attacks:</strong>
      All previous effects and the target creature must make a Constitution Saving Throw at the conclusion of this
      jutsu, gaining a number of Concussed ranks equal to half the number of attacks you landed using this
      jutsu.</li><li><strong>5 Attacks:</strong> All previous effects and if the target creature fails the pervious
      Constitution Saving Throw by 5 or more, they are unable to react to any actions you take until the end of the
      current turn.</li></ul><p><strong>Wrathful Form:</strong> If you are currently benefitting from Wrathful Form, you
      instead reduce a creature's damage reduction by 4 for each attack you hit.</p>
