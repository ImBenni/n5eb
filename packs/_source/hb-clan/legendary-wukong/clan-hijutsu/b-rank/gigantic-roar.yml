name: Gigantic Roar
type: spell
_id: rA5KQTSBULjPy1vF
img: systems/n5eb/assets/content/clans/legendary-wukong.webp
system:
  description:
    value: >-
      <p>You begin to gather large amounts of energy inside yourself, letting it swell and build until your body can no
      longer hold it.</p><p>You fire 3 beams of bright green energy, each being 5-foot wide and 60-foot long lines,
      which you may choose to fire in any directions of your choice. These beams are not allowed to intersect with one
      another. Each creature caught in range of one of these beams must make a Dexterity Saving Throw, taking 6d6 force
      damage and being pushed to the end point of the beam on a failure. If a creature were to collide with a wall as a
      result of the jutsu, they take an amount of fall damage equal to the remaining distance the beam would have sent
      them.</p><p>Alternatively, you may choose to instead fire one single beam in a 10-foot wide, 120-foot long line in
      a single direction, forcing all creatures in range to make a Constitution Saving Throw, taking 12d6 force damage
      and being pushed to the end point of the beam on a failure. If a creature were to collide with a wall as a result
      of the jutsu, they take an amount of fall damage equal to the remaining distance the beam would have sent
      them.</p><p><strong>Wrathful Form:</strong> If you are currently benefiting from Wrathful Form, you increase the
      length of beams by 20 feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      B-Rank, increase the cost of this jutsu by 3 and the damage by 2d6.</p>
