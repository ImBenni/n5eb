system:
  description:
    value: >-
      <p>You release a ball of raw green energy, that after contact then expands outwards into several small
      explosions.</p><p>You make a single ranged ninjutsu attack against a creature within range, dealing 4d10 force
      damage and all creatures within 10 feet of the target creature must make a Dexterity Saving Throw, they take half
      the damage of the attack on a failure, they take half of that damage on a success.</p><p><strong>Wrathful
      Form:</strong> If you are currently benefitting from Wrathful Form, you add your Ninjutsu or Taijutsu modifier to
      damage dealt and you may instead force all creatures within 20 feet of the target creature to make the Dexterity
      Saving Throw.</p><p><strong>At Higher Levels:</strong> For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3 and the damage by 2d10.</p>
