system:
  description:
    value: >-
      <p>You unleash a mass of energy all around you, creating a small dome that then creates several smaller balls of
      energy that explode, harming all creatures within a 15-foot sphere of you.</p><p>All creatures within range must
      make a Constitution saving throw, on a failure they take 3d8 force damage and are knocked back a number of feet
      equal to your Ninjutsu Ability Modifier times 5, on a success the creature takes no damage but is still knocked
      back half the usual amount. If the target would hit a solid surface as a result of this knockback, they take 1d6
      bludgeoning damage for each 10 feet they were knocked back.</p><p><strong>Wrathful Form:</strong> If you are
      currently benefitting from Wrathful Form, this Jutsu adds your [Unarmed Damage] to the damage dealt and knocks
      creatures back an additional 10 feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3, the damage by 2d8, and the radius sphere by 5 feet. If this
      jutsu is cast at B-Rank or higher, you deal half damage on a success. If this jutsu is cast at S-Rank or higher,
      if a creature fails their saving throw by 5 or more, you double the knock back they receive.</p>
