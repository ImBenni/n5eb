system:
  description:
    value: >-
      <p>You get into a readied position and launch yourself a straight line toward's someone.</p><p>You make a melee
      taijutsu attack against the target, on a hit you deal your [Unarmed Damage] + 2d6 Bludgeoning damage. Regardless
      of the result, you move up to 30 feet, ending your movement within 5 feet of the original target.</p><p>Until the
      end of your turn, you can target one affected creature with a Taijutsu or Hijutsu Finisher regardless of range,
      once per turn, using either an Action or Bonus action, ignoring its listed casting time.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the
      damage by 2d6.</p>
