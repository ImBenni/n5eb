system:
  description:
    value: >-
      <p>You take a moment to let your anger flow, rejuvernating you and your reserves.</p><p>When you cast this justu
      you gain 1 rank of Berserk and you roll the spent chakra die, adding your Constitution Ability Modifier to the
      total, regaining the result in chakra. You may cast this jutsu when having ranks of Berserk, ignoring the 1st
      bullet point of the condition. You may only cast this justu while in combat, once per
      round.</p><p><strong>Wrathful Form:</strong> If you are currently benefitting from Wrathful Form, you may perform
      this Jutsu as a bonus action and when you cast it you instantly benefit from the first bullet point of Wrathful
      Form, spending <strong>Ikari Dice</strong> as usual.</p>
