  description:
    value: >-
      <h3 id="overflowing-power">Overflowing Power</h3><p>A Legendary Wukong is a Wukong of great legend, often times
      being seen as nothing more then a story of strength and triumph within Wukong society. However, the legends hold
      some truth to them, once every 1000 years a Wukong is born that is destined for great power. However, along side
      this legend is a darker side, as the Legendary Wukong is also often said to hold a deep hatred within their very
      nature, often fighting against their very nature and rage. There can only ever be a single true Legendary Wukong
      at any given time, but there are those who show traits in relation to the legends as well.</p><h4
      id="wukong-legendary-traits">Wukong (Legendary) Traits</h4><p><em><strong>Recommended Ability Score
      Increase:</strong></em> +2 Str, +1 Con<br /><strong>Speed:</strong> Your base walking speed is 30 feet.<br
      /><strong>Skill Proficiencies:</strong> Atheletics, Chakra Control</p>
