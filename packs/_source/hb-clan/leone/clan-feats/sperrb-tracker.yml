system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Leone Clan, level 4+<br />Your already
      impressively sharp senses through pratice, have been increase to the next level. You gain the following
      benefits;</p><ul><li><p>Increase your Dexterity or Wisdom by +1, to a maximum of 20.</p></li><li>You gain
      proficiency in survival, investigation or perception. If you have proficiency in all the aforementioned skills
      already, you instead gain expertise in one of those skills.</li><li>You are able to sense all packmates
      approximate locations up to 100ft and exact location within 25ft due to your familarity with them.</li><li><p>Any
      special senses you have visual range increases by 15ft.</p></li><li>You can see up to 500ft away as if was 100ft
      away from you.</li></ul>
