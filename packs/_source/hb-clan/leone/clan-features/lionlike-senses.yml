system:
  description:
    value: >-
      <p>Beginning at 1st level, your senses are passively honed to a razor sharp degree. You gain expertise in
      Perception and you roll an addtional 1d6 when rolling Perception, Investigation and Survival checks that uses your
      sight, smell or hearing to track and/or find other creatures.<br /> At 7th level you roll initiative at advantage,
      provided you are not surprised. You also gain 30ft of tremorsense.</p>
