name: Pack Leader
type: feat
_id: R11E7AQ1KwUEXMbg
img: systems/n5eb/assets/content/clans/leone.webp
system:
  description:
    value: >-
      <p>Finally at 1st level, you lead your "pride" from the front as your success and confidence spreads to the ones
      you feel close to. At the end of a long rest you choose a number of allies equal to half your proficiency bonus
      rounded up, these allies are referred to as <em><strong>packmates</strong></em>. You gain the following
      benefits;</p><ul><li><p>As a reaction to a packmate making a saving throw or being targeted by an attack within
      your movement speed, you may interpose yourself infront of them. You make the save in place of them or become the
      new target for the attack, you take all the damage and effects of the jutsu or attack would have been given to
      your ally instead. You may do this twice per long rest.</p></li><li><p>When you would attack a creature within 5ft
      of an packmate, you both gain a 1d4 to two attack rolls per turn while you and that packmate are in this range.
      This does not stack with itself.</p></li><li>As a bonus action you let out a ferocious roar, you and all packmates
      within 30ft gain advantage on their next saving throw and attack roll until the end of your next turn. You may do
      this once per long rest.</li></ul>
    chat: ''
