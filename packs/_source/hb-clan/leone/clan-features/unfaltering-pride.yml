name: Unfaltering Pride
type: feat
_id: 7eMhvqqX1eNaEboB
img: systems/n5eb/assets/content/clans/leone.webp
system:
  description:
    value: >-
      <p>At 15th level your mind and body are the embodiment of the lion, forever engaged with hunt. Choose a physical
      contidtion that isn't Stunned, Prone Restrained or Grappled. You gain immunity to that condtition, this can not be
      changed later. Also if you would lose a limb excluding your head while you are <strong>Beastlike
      Appearance</strong>, you regain it at the start of your next turn. This becomes 1 minute when you are not
      transformed.</p><p>At 18th level, whenever you would fail your last death saving throw or be instantly killed you
      instead ignore it and immediately gain hit points up to half your maximum. This ability activates once per long
      rest.</p>
