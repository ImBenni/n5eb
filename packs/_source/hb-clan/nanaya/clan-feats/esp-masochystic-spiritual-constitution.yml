  description:
    value: >-
      <h4 id="esp-masochystic-spiritual-constitution">Esp: Masochystic Spiritual
      Constitution</h4><p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Nanaya Clan, level 12+, No
      other feat with the <strong>Esp</strong> preffix<br /><strong>Description</strong>: Your latent psychic abilities
      have finally manifested, now you are a walking demon-detection device as your body reacts to the presence of
      inhuman creatures near you. You gain the following benefits:</p><ul><li>Your <strong>detect inhuman</strong>
      feature increases its range to 120ft, and you know the general direction of inhumans within
      range.</li><li>Creatures affected by your <strong>detect inhuman</strong> feature cannot be hidden from
      you.</li><li>When you see a creature affected by your <strong>detect inhuman</strong> feature, you can spend a
      bonus action to roll a perception check against the creature's deception check. On a success, you learn 2 clan or
      general traits the creature has.</li><li>Twice per rest, when you see a creature affected by your <strong>detect
      inhuman</strong> feature, you can spend an action to gain one clan or general trait it has, for the duration of
      the encounter. If you do not know which traits it has, the DM chooses one trait at random. If you know which
      traits it has, you can pick one.</li></ul>
