system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Nanaya Clan, level 12+, No other feat with
      the <strong>Esp</strong> preffix<br /><strong>Description</strong>: Your latent psychic abilities have finally
      manifested, they show you visions of possible futures which you can alter to your advantage. You gain the
      following benefits:</p><ul><li>You cannot be surprised.</li><li>Your reaction cannot be taken away or have their
      cost increased by jutsu of B-rank or less, features or traits.</li><li>When you finish a long rest, roll 2d20.
      These become your precognition die. You can replace any d20 rolls made by you or a creature you can see within
      30ft of you with one of your precognition die. Once you replace one roll this way, the precognition die is
      spend.</li></ul>
    chat: ''
