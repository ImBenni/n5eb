name: Esp Pure Eyes of Emotion
type: feat
_id: 6ZEmZ55nT8dWjnYI
img: systems/n5eb/assets/content/clans/nanaya.webp
system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Nanaya Clan, level 12+, No other feat with
      the <strong>Esp</strong> preffix<br /><strong>Description</strong>: Your latent psychic abilities have finally
      manifested, giving you the power to physically see through lies. You gain the <strong>Pure Eyes of
      Emotion</strong>. You may spend 10 chakra as a bonus action to activate the <strong>Pure Eyes of Emotion</strong>
      for 10 minutes, while these eyes are active, you gain the following:</p><ul><li>You gain 60ft of Chakra Sight.
      This chakra sight can penetrate up to 10ft of wall.</li><li>When you take the <strong>read the enemy</strong>
      action and succeed, you recover the reaction spend.</li><li>You always known when a genjutsu is cast and when a
      creature you can see is under a genjutsu.</li><li>You gain advantage on charisma-based skill and ability checks,
      and insight checks.</li><li>You know the current mood of all creatures you can see, and their disposition towards
      you.</li></ul>
    chat: ''
