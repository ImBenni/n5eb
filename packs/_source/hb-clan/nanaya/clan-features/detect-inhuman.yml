name: Detect Inhuman
type: feat
_id: QFnTAKv9POnroYyO
img: systems/n5eb/assets/content/clans/nanaya.webp
system:
  description:
    value: >-
      <p>Starting at 1st level, you know when a demon, undead, monstruosity, aberration or sage creature is within 30ft
      of you, you know a inhuman entity is within this range, and a rough estimate how far it is, but not its exact
      location nor creature type. You identify the creature type of a inhuman once it enters your line of sight.</p><p>A
      creature under the effect of the <strong>Suppress Chakra</strong> Skill Action or under the effect of a sensory
      jutsu, feature or trait that would hide their presence (Such as the <em>Nondetection</em> jutsu) cannot be
      detected by this feature.</p>
