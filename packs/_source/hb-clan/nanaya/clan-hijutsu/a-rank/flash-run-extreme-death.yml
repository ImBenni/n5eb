system:
  description:
    value: >-
      <p>The final technique of the Nanaya, once a target has been secured, you jump over it, and put your hands to grab
      its head, trying to behead it in one quick trust.</p><p>You teleport within 5ft of a creature you can see, that
      you have damaged with a Nanaya clan hijutsu this round, and force it to make an strength saving throw, dealing
      11d10 necrotic damage and making it dazed and confused until the end of their next turn on failed save, half as
      much damage on a success. A creature reduced to 0 hit points due to this jutsu dies instantly, as its head and
      spine are thorn out and held in your hand.<br /><strong>At higher ranks:</strong> For each rank above A-rank,
      increase this jutsu's damage by 2d10.</p>
