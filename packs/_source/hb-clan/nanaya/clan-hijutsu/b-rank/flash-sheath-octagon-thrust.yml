system:
  description:
    value: >-
      <p>You take a low stance, before running towards your target, while moving you make a series of quick strikes
      against your opponents.</p><p>You move up to this jutsu's range, without provoking attacks of opportunity, passing
      through creatures that stand on your way. All creatures whom you pass through while on the way to the select
      location are the targets of your attacks. Make a melee taijutsu attack for each creature you pass through while
      moving, dealing your dealing your [weapon's damage] + 4d8 on a hit. You end your movement in the selected space.
      In addition, affected creatures gain a rank of lacerated for each die of damage they took from your <strong>Flash
      Sheath Stance</strong> or <strong>Latent Flash Sheath</strong> feature.</p><p><strong>At higher ranks:</strong>
      For each rank above B-rank, increase this jutsu's damage by 2d8.</p>
