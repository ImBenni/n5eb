system:
  description:
    value: >-
      <p>You take a low stance, as you aim your weapon to your target's heart, then launch yourself on an attack that
      could end the fight.</p><p>Move up to this jutsu's range, without provoking attacks of opportuniy, then make a
      melee taijutsu attack against a creature you can see within 5ft of you, dealing your [weapon's damage] + 6d10, and
      forcing the target to make a constitution saving throw, becoming stunned until the end of its next turn on a
      failed save.<br /><strong>At higher ranks:</strong> For each rank above B-rank, increase this jutsu's damage by
      1d10.</p>
