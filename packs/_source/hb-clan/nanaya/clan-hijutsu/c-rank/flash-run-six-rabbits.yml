system:
  description:
    value: >-
      <p>You contort your body as you make a kick, trying to propel your opponent and yourself up in the air.</p><p>You
      move adjacent to a creature within range and force it to make an strength saving throw, on a failed save, it takes
      5d6 bludgeoning damage and both of you are thrown 30ft into the air. You do not take falling damage from this
      distance. On a successful save, the target takes half as much damage.<br /><strong>At higher ranks:</strong> For
      each rank above C-rank, increase this jutsu's damage by 1d6 and the range by 5ft. Starting at A-rank, the target
      is assaulted by a mirror image of your movement, and makes their saving throw at disadvantage.</p>
