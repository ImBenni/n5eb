system:
  description:
    value: >-
      <p>By using the roof, wall, falling debris or a nearvy creature as a support, you redirect your fall and make it
      propel your next attack.</p><p>You must be Airborne to cast this jutsu. You move in any direction up to this jutsu
      range, and one creature whom you pass through while on the way to the select location is the targets of your
      attack. Make a melee taijutsu attack, dealing your [weapon's damage] + 5d6. If the target is in the air you make
      this attack at advantage.<br /><strong>At higher ranks:</strong> For each rank above C-rank, increase this jutsu's
      damage by 2d6.</p>
