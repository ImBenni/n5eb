system:
  description:
    value: >-
      <p>You make a series of Slashes that cut anyone that comes near your weapon.</p><p>Make a melee taijutsu attack
      against each creature of your choice within your weapon's melee range. On a hit, a target takes your [weapon's
      damage] + 3d6.</p><p>Regardless of a hit or miss, the chosen creatures must make an strength saving throw, gaining
      a 1d6 penalty on attack rolls until the start of your next turn on a failed save.</p><p><strong>At higher
      ranks:</strong> For each rank above B-rank, increase this jutsu's damage by 1d6 and the weapon's range by 5ft.</p>
