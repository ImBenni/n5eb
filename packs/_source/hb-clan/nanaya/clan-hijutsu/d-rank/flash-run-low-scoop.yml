system:
  description:
    value: >-
      <p>Before you are hit with an attack, you make an acrobatic roll and continue with your own attack.</p><p>Make a
      melee taijutsu attack contested by the triggering attack roll, if your attack roll is higher, the triggering
      attack misses and you can move up to half your movement speed toward the triggering creature, dealing your
      [weapon's damage] + 3d6 and ending its current action.<br /><strong>At higher ranks:</strong> For each rank above
      D-rank, increase this jutsu's cost by 3, and the damage by 2d6. Starting at B-rank, you can move up to your
      movement speed. Starting at S-rank, you can move up to twice your movement speed</p>
