system:
  description:
    value: >-
      <p>You make a series of basic slashing with your weapon, trying to draw
      blood with each hit.</p><p>Make a melee taijutsu attack against a creature
      you can see within range, on a hit, the target takes your [weapon's
      damage] + 4d4 and must make a constitution saving throw.</p><p>On a failed
      save, the target gains a rank of bleed, plus an additional rank for each
      die of damage it took from your <strong>Flash Sheath Stance</strong> or
      <strong>Latent Flash Sheath</strong> feature.</p><p><strong>At higher
      ranks:</strong> For each rank above D-rank, increase this jutsu's damage
      by 2d4.</p>
