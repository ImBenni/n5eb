  description:
    value: >-
      <p>You make a series of wide slashes, cutting all creatures in one direction.</p><p>Make a melee taijutsu attack,
      compare the result to the AC of all creatures on a 15ft cone in front of you. dealing your [weapon's damage] + 1d6
      on a hit.<br />If at least one creature was hit by this jutsu, you can spend a bonus action to casting this jutsu
      again, at the same rank, targeting a single creature, at half its cost.<br /><strong>At higher ranks:</strong> For
      each rank above D-rank, increase this jutsu's damage by 2d6.</p>
