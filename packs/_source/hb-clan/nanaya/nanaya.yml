      <h3 id="determined-demon-hunters">Determined Demon Hunters</h3><p>The Nanaya Clan is a family of assassins,
      although specialized in the use of Common Tools as weapons, using movility and special senses to detect, pursue
      and kill their prey. The Nanaya honed these abilities to fight with outsider threats, but a knife in the troath or
      a stick on the brain are lethal to anything living.</p><h4 id="nanaya-traits">Nanaya Traits</h4><p><strong>Ability
      Score Increase</strong>: +2 Str or Dex, +1 Wis.<br /><strong>Speed</strong>: Your base walking speed is 35
      feet.<br /><strong>Skill Proficiencies</strong>: Perception, Athletics.</p>
