system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Level 12+, Ningyo Clan</p><p>You have
      developed your voixe into a tool more powerful than any weapon, usesble for both offensive and
      defense</p><ul><li>Increase your Cha or Con by +1</li><li>Any Creature affected by an <em>Audible</em> Genjutsu
      you are concentrating on is treated as having 1 Rank of <em>Charmed</em> against you.</li><li>Whenever a creature
      fails a saving throw against a Genjutsu you cast that doesnt deal damage, they immediately take damage from any
      ranks of <em>Chilled</em> they have.</li><li>You can expend and roll one use of your Ballad die when you cast an
      Audible Genjutsu. All Concentrations checks made to maintain concentration on that Jutsu, may add the result to
      the check.</li></ul>
