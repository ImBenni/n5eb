  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Ningyo Clan</p><p>Your Hair and Skin have a
      scaely finish to them, naturally shiny and slippery finish, that many find unique and pretty</p><ul><li>You have
      gain +1d4 Bonus to Charisma check and saving throws while not in dim light or darkness.</li><li>You have advantage
      on rolls made to end the Restrained Condition</li><li>The first time you are hit with a melee attack per turn, the
      target must make dexterity saving throws vs your Genjutsu Save DC. On a Fail, They are knocked prone.</li></ul>
