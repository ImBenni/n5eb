name: Monsters of the Deep
type: feat
_id: 53GLSy17iuiJVYpE
img: systems/n5eb/assets/content/clans/ningyo.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Level 8+, Ningyo Clan</p><p>Your bond and
      understanding of Aquatic Life is not limited to those most Shinobi are familiar with, extending to even the
      deepest parts of the Ocean. You gain access to the follow Traits to select from when making use of your <em>Marine
      Biology</em> Clan feature</p><ul><li>You Develop an antenna from the top of your head, that glows like an Angeler
      Fish. You emit Dim light in a 30ft radius. When you deal damage with a <em>Water Release</em> Jutsu does not
      inflict a Condition, on hit or a failed save, you can inflict 1 Rank of the Confused or Dazzled Conditions. You
      cannot inflict more than 2 Ranks of these conditions on one Creature using this effect</li><li>Your grow two large
      tentcles out of your back that you can walk on, or even use to cast Jutsu. You can cast D-Rank or Lower Jutsu with
      the <em>Water Release</em> Keyword, as a Bonus action, at D-Rank,but increase its cost by +3 Chakra, and you
      ignore difficult terrain</li><li>You grow in a little in size, mimicing the Sperm Whale, built to withstand grest
      pressure. At the start of your turn, if you are below 50% HP, You gain temporary hit points equal to your
      proficiency Bonus. You also gain a +1d6 bonus to constitution saving throws and ability checks.</li><li>You Grow
      wings like that of a Sea Angel. You gain a 30ft flying speed, but you must end your turn on the ground, or fall.
      The transparent wings also allow you to recover from the prone condition on your turn, without spending any
      movement.</li></ul>
    chat: ''
