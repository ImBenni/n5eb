name: Aquatic Allure
type: feat
_id: pp173iKsfEViSqnO
img: systems/n5eb/assets/content/clans/ningyo.webp
system:
  description:
    value: >-
      <p>Regardless of Physical Appearance, all Members of your clan are known to have a alluring appeal to them found
      in their voice, be that like the shimmer of a Sunlit Beach, or the Depth and Mystery of a Deep Trench, Whenever
      you succeed a Persuasion or Deception check against a creature, they Gain 1 Rank of Charmed Against you for the
      next 8 hours.</p><p>Starting at 7th level, you can spend a Bonus Action and 3 Chakra to infuse Chakra into a
      sonng, ending any one mental condition on an ally within 30ft. If near a sufficent body of water, you do not need
      to spend Chakra to activate this feature</p><p>Starring at 15th Level, you can Spend an Action on your turn to
      begin Singing a magical song that, being to life images of the sea to all nearby, for the next minute. Allied
      Creatures within 60ft of you have Advantage on saving throws made because of GenJutsu. All Hostile Creatures
      within 60 must make a Saving throw VS your Gensjutsu Save DC. On a failed save, they slowly begin to drown, as
      your song is so beautiful it puts them under a powerful Gensjutsu. They Gain 1 Rank of Exhaustion. At the end of
      each of their turns, they must remake the saving throw, gaining 1 additional rank of Exhaustion on a failed save.
      Upon making 3 Successful Saves, they loose all ranks of exhaustion, and are immune to your song for the next 8
      Hours. You may use this feature this way once per rest.</p>
