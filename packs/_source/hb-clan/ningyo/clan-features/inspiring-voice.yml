system:
  description:
    value: >-
      <p>Your voice has become a potent, inspiring presence for your allies. Starting at 7th level, You have a number of
      Ballad die equal to your Charisma Modfier +1, thats are d6's. As a Bonus Action on your turn ,you can grant an
      within ally a Ballad die, for the next 10 minutes, as your Ballad inspires them to meet the opera you spun. They
      can spend this Ballad die to add the result to any attack roll, saving throw, or skill check they make. You regain
      all Balld die on a long rest.</p><p>Starting at 18th level, you may grant Ballad die as a reaction, once per turn,
      without spending a reaction.</p>
