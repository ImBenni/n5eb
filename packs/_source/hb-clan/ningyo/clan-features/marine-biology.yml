name: Marine Biology
type: feat
_id: l4ZlzusiV99Fefqp
img: systems/n5eb/assets/content/clans/ningyo.webp
system:
  description:
    value: >-
      <p>You have learned to use your Chakra to mimic many features of the Animals you have lived with at Sea, granting
      you many possible Boons in Battle. Starting at 3rd level, When you finish a rest, you may select one of the
      following traits to gain the benefits of, until you take a rest. Once per turn, You may spend 3 at the start of
      your turn (or at any time outside of Combat) to swap this trait with another.</p><ul><li><p>You gain the long tail
      of a Manta Ray. As a reaction to being targeted with a Melee attack, you may swipe your tail. Increase your AC by
      +3 until the start of your turn. If this would cause any attacks to miss, the target takes Xd4 lighting Damage (X
      = Your proficiency Bonus)</p></li><li><p>Your skin oozes a wet, clear goo, like a clown fish. You gain resistance
      to poison and lighting Damage.</p></li><li><p>Your nose grows slightly pointer, as you enhance your agility like a
      Marlin. You gain +15 Movement speed, and may use your Reaction as if it were an additional Bonus
      action.</p></li><li><p>You manipulate your saliva glands and mouth muscles to emulate that of an Archer Fish. As
      An action on your turn, you can spend up to 2 Chakra, to a max of 2. Make one Ranged Ninjutsu attack for every
      Charka point spent, using Charisma as your Ninjutsu Ability Modifier. On hit, deal 1d10 + Your Ninjutsu Ability
      Modifier cold damage, and the target is knocked back 5 feet. At 7th level, you can spend up to 6, up to 8 at 11th
      level, and up to 10 at 18th level</p></li><li><p>You can alter the shade of your skin like that of a cuttleFish.
      You gain proficiency in stealth, and can take the hide action as a bonus action, even if you don't have
      cover</p></li><li><p>You gain the regenerative abilities of a Starfish. As a bonus action on your turn, you can
      spend a number of hit dice up to half your level (Rounded Down). You regain a number of hit points equal to the
      roll. You can choose to spend two hit die to instead end one Physical Condition on yourself</p><div class="block
      imageMaskCorner19" style="--offsetX:-50%;--offsetY:-63%;--rotation:0"><p></p></div></li></ul><div
      class="columnSplit"><p></p></div><ul><li>You develop scales like a fish to cover your body. You gain damage
      reduction equal to your proficiency bonus for two damage types of your choosing, except psychic or necrotic, that
      you select each time you select this trait.</li><li>You develop the echolocation abilities of a Dolphin. You gain
      60ft of Blindsight, and increase the range of your <em>Audible</em> Genjutsu by 30ft.</li><li>You Develop the Hard
      Shell of Turtle on your back. Your AC is calculated at 10+Proficiency Bonus+Con Mod while not wearing armour. As a
      Bonus action on your turn, you can retreat into your shell, gaining resistance to bludeoning , peircing, and
      slashing damage until the start of your next turn. You cannot take a reaction the turn you do
      this</li></ul><p>Starting at 11th level, you may select 2 traits at the end of a rest.</p>
