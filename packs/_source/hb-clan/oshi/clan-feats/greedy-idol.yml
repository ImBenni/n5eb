folder: gTgrDnkWdiLmrc87
name: Greedy Idol
type: feat
_id: 6F87xXu4sWuiBsyX
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Oshi Clan, Level 12+, Heart-Melting
      Idol</p><p>Your fans enjoy your performances so much that they've become willing to donate their skills to assist
      you. Completely willingly, of course. You gain the following benefits:</p><ul><li><p>Increase your Charisma or
      Intelligence score by 1, up to a maximum of 20.</p></li><li><p>Twice per long rest, when a Fan would fail a saving
      throw caused by an Oshi Hijutsu, you can select one of their saving throw proficiencies. For the duration of that
      Hijutsu, they lose that proficiency, becoming unable to add their proficiency at all to that saving throw, and you
      gain it. If the duration was instant, this lasts for 1d4 rounds. If you would gain a proficiency that you already
      have, you instead gain a +1d4 bonus. Only one proficiency may be gained in this way at a time.</p></li><li><p>When
      a Fan would fail a saving throw caused by an Oshi Hijutsu, you can select one of their skill or tool
      proficiencies. For the duration of that Hijutsu, they lose that proficiency, and you gain it. If the duration was
      instant, this lasts for 1d4 rounds. If you would gain a proficiency that you already have, you instead gain
      expertise, or a +1d4 if you already have expertise. Only one proficiency may be gained in this way at a
      time.</p></li><li><p>Once per long rest, as an Action on your turn, you can select a number of your Fans equal to
      your Charisma modifier. Any effects causing them to become your Fan end, and for the next minute, you increase
      your Charisma score by +1 for every 2 Fans affected, to a maximum of +4.</p></li></ul>
    chat: ''
