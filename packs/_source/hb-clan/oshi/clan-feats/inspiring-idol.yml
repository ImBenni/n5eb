system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Oshi Clan</p><p>You are a font of
      inspiration to those around you, especially while performing, allowing you to more easily engage in your craft.
      You gain the following benefits:</p><ul><li><p>Increase your Charisma score by 1, up to a maximum of
      20.</p></li><li><p>You can use Deception or Performance in place of Persuasion.</p></li><li><p>You gain a number
      of Inspiration Die, which are d6s equal to your Charisma modifier per long rest (minimum 1). Once per turn, you
      can apply one of these d6s to one skill check, attack roll, or saving throw that an allied creature other than
      yourself within 60 feet of you that can hear you would make.</p></li><li><p>Once per long rest, as an action, you
      can end all ranks of Charmed affecting a creature, gaining Inspiration Die equal to the number of ranks that
      creature was affected by.</p></li></ul>
