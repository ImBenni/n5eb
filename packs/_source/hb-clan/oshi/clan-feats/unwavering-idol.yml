folder: gTgrDnkWdiLmrc87
name: Unwavering Idol
type: feat
_id: hs0qciDzJ0RyuZfZ
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Oshi Clan, Level 10+</p><p>Your mind has
      grown incredibly resilient and strong, granting you the ability to carry on your performance even when others of
      similar skillsets would not. You gain the following benefits:</p><ul><li><p>Increase your Charisma or Intelligence
      score by 1, up to a maximum of 20.</p></li><li><p>You cannot be controlled against your will, your mental state
      cannot be altered by non-conditional effects, and your personality and disposition cannot be changed unless you
      allow it.</p></li><li><p>Genjutsu you cast bypass effects that would prevent creatures from being affected by
      them. (This does not bypass damage and condition immunities.)</p></li><li><p>When a creature would cast a Genjutsu
      with or without the Unaware keyword against you or an allied creature, you can make a Deception check vs. their DC
      + 5. On a success, that jutsu loses the benefit of the Unaware keyword if it has it, and allied creatures gain a
      +1 to saving throws against that jutsu until the start of your next turn. This increases to a +2 at 11th level and
      a +3 at 15th level.</p></li><li><p>If you would pass an Intelligence, Wisdom, or Charisma saving throw from a
      hostile effect, you suffer no effects and gain a +1 bonus to saving throws of that type until the start of your
      next turn. This increases to a +2 at 11th level and a +3 at 15th level.</p></li></ul>
    chat: ''
