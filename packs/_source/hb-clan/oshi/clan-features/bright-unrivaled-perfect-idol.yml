folder: ogcSoO7aEThsYTWq
name: Bright, Unrivaled, Perfect Idol
type: feat
_id: U2uSTnTUpW4V9sYp
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>Starting at 11th level, you've grown to become a shining light of inspiration, and people you influence begin
      to stop caring whether you speak the truth or not. You treat immunity to the Charmed condition as resistance, and
      creatures that can see your Starry-Eyed Lies clan feature cannot gain the benefit of jutsu, features, traits, or
      other effects that would outright prevent them from gaining ranks of Charmed.</p><p>Additionally, when you would
      inflict one or more ranks of Charmed on a creature, they gain another rank from this feature, once per turn. When
      a creature would reach 5 ranks of Charmed that were all inflicted by you, they lose all acquired ranks, instead
      gaining 1 rank of Overcharm. An Overcharmed creature suffers the following effects:</p><ul><li><p>An Overcharmed
      creature is counted as Charmed for the purposes of interacting with features, traits, and jutsu and cannot gain
      ranks of the Charmed condition while Overcharmed.</p></li><li><p>An Overcharmed creature always counts as a
      willing creature for the purposes of interacting with your jutsu, features, and traits.</p></li><li><p>An
      Overcharmed creature is unaware that you have charmed them and will consider you and your allies as their most
      trusted allies for the duration that they are Overcharmed.</p></li><li><p>An Overcharmed creature can be commanded
      as a bonus action on your turn to take an Action or a Bonus Action if they have not taken either this round, and
      if they are normally hostile to you, they will spend all of their reactions to protect you, if
      able.</p></li><li><p>An Overcharmed creature will do their best to spread their inflated opinion of you to others.
      Once per turn, a creature damaged by an Overcharmed creature must make a Charisma saving throw vs. your Genjutsu
      Save DC, gaining 1 rank of Charmed by you and their attacker. They remake this saving throw at the end of each of
      their turns.</p></li><li><p>An Overcharmed creature is immune to Fear from sources other than you and cannot be
      controlled by creatures other than you.</p></li></ul><p>Unless otherwise stated, a creature remains Overcharmed
      until you deal damage to them directly, 10 minutes pass, or a creature allied to them makes a DC 20 Charisma
      ability check as an action to break them free, whichever happens first</p>
