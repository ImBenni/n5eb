img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>Starting at 18th level, you've reached the peak of your stardom, being able to reach hearts across the world
      with your influence. You ignore immunity to the Charmed condition, and you automatically succeed skill checks made
      to socially interact with creatures that are not outwardly hostile toward you. Also, you are always treated as
      being under the effects of Glibness.</p><p>Additionally, once per short rest, when you would inflict more than one
      rank of Charmed on a hostile creature, you may choose to Overcharm them. If done out of combat, a creature
      Overcharmed in this way can spread the condition to other creatures merely by saying your name.</p><p>Finally,
      while in combat with creatures you have Overcharmed, those creatures gain access to jutsu you know for the
      duration of their Overcharm and can utilize your Attack bonuses and Save DCs for their calculations.</p>
    chat: ''
