folder: ogcSoO7aEThsYTWq
name: Greatest Kind of Lie Love
type: feat
_id: dxpsWiYcFYcN4hKC
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>Starting at 15th level, you're near the summit of what it is to be an idol, your facade becoming nigh
      unbreakable, and your influence growing to unimaginable heights. Your mind cannot be read by hostile effects, and
      creatures can never discern your true intentions against them, always being inclined to believe you have their
      best intentions at heart until you prove otherwise.</p><p>Additionally, while out of combat, you can cast a
      variant of the Geas Genjutsu as if you knew it, ignoring its components and making it an Oshi Clan Hijutsu. When
      you do, it gains the Unaware keyword, and a creature who fails their saving throw becomes Overcharmed for the
      duration. When its duration would end, the creature must make a Charisma saving throw vs. your Genjutsu Save DC.
      On a failure, they suffer the effects of the jutsu again.</p><p>Creatures under the effects of this variant of
      Geas cannot act against your instructions. If a creature under the effects of this jutsu would enter combat with
      you, the effects are suppressed until the conclusion of that combat. You can cast Geas in this way a number of
      times equal to your Charisma modifier per long rest.</p>
