img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>Starting at 1st level, your words and acts become more influential. You gain a +1d4 bonus to Charisma skill
      checks. This becomes +1d6 at 7th level and +1d8 at 11th level. If you succeed on a Charisma skill check against a
      creature in a social encounter by 5 or more, they gain 1 rank of Charmed for the next ten minutes.</p><p>Also at
      1st level, you can use Charisma as your ability modifier for all Oshi Hijutsu and Genjutsu you cast.</p>
