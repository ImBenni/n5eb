folder: ogcSoO7aEThsYTWq
name: Starry-Eyed Lies
type: feat
_id: IGiRy0tm7wl95ICy
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you've learned that lying is the truest form of love, having no true concept of it for
      yourself. Your eyes take on a starry pattern of a color of your choice. When you would socially interact with a
      creature that can see your eyes, you can use Deception in place of a required skill check. Alternatively, when
      casting a Genjutsu with the Visual or Auditory keywords, you can ignore any HS or CS components. You can use these
      effects a combined number of times equal to your Proficiency Bonus per rest.</p><p>Additionally, you gain
      advantage on saving throws against the Charmed and Berserk conditions, and creatures have disadvantage on Insight
      checks made against you. At 7th level, you cannot be Charmed.</p>
    chat: ''
