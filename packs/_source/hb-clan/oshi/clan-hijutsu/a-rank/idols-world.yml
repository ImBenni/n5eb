name: ☆Idol's World☆
type: spell
_id: HG8R5cBHisKM0S0a
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>When one or more creatures that can see your Starry-Eyed Lies clan feature would fail the saving throw of a
      Genjutsu you cast, you can cast this jutsu. When you do, for the duration of that Genjutsu, those creatures gain 2
      ranks of Charmed and 2 ranks of Slowed, and are mentally shoved into a dimension filled with a crowded concert
      where you and you alone perform. These creatures can still see creatures that they'd normally be able to see, but
      the rest of their vision is blocked by the concert, rendering them unable to see the terrain around
      them.</p><p>You can choose to make the crowd mentally shove creatures around on your turn, making affected
      creatures take Xd6 + X unreducible psychic damage that treats immunity as resistance as if they had damaged
      themselves at the start of each of their turns (X = your Genjutsu ability modifier). At the end of each of their
      turns, affected creatures must make a Charisma saving throw, further gaining 1 rank of Charmed and Slowed on a
      failure.</p><p>This jutsu's effects and conditions last until the conclusion of the effects of the Genjutsu that
      triggered it. If the duration was instant, this jutsu's effects instead last for 1d4 of your
      turns.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the cost
      by 3. If this jutsu is cast at S-Rank, increase the damage die by 1 step.</p>
