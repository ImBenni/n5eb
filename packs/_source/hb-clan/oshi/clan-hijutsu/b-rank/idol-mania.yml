name: ☆Idol Mania☆
type: spell
_id: 3X7rfm7B5QKROxHg
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>You speak honeyed words, attempting to influence a number of creatures of your choice up to double your
      proficiency bonus within range that can hear and understand you. Creatures that are immune to being Charmed are
      immune to this jutsu's effects. Each creature must make a Wisdom saving throw. A creature can willingly choose to
      fail this saving throw.</p><ul><li><p><strong>On a failure:</strong> You are treated as being invisible to them
      until you directly damage them for the first time, as mirages of you acting in a manner of your description fill
      their vision. They suffer effects based on whether they are allied to you or hostile to
      you.</p><ul><li><p><strong>Allied:</strong> Allied creatures gain 5 ranks of Charmed and a bonus equal to half of
      your Genjutsu ability modifier (rounded up) to their Attack Rolls, Damage Rolls, Saving Throws, and Skill Checks,
      up to three times per turn. Allied creatures do not see the mirages you
      create.</p></li><li><p><strong>Hostile:</strong> Hostile creatures gain 2 ranks of Charmed and a penalty equal to
      half of your Genjutsu ability modifier (rounded up) to their AC, Attack Rolls, Damage Rolls, Saving Throws, and
      Skill Checks, up to three times per turn.</p></li></ul></li></ul><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above B-Rank, increase the cost by 3. If cast at S-Rank, the bonus becomes equal to your
      Genjutsu ability modifier.</p>
