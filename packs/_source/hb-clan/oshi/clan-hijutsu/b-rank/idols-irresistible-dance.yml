name: ☆Idol's Irresistible Dance☆
type: spell
_id: V7poPwhsmHi4lzqf
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>You choose a creature in range to join your routine. That creature then begins to perform a special dance, of
      your description. Creatures that are immune to being Charmed are immune to this jutsu's effects.</p><p>A dancing
      creature must use all its movement to dance without leaving its space and has disadvantage on attack rolls and
      Dexterity saving throws. While affected by this jutsu, creatures allied to you have advantage on attack rolls
      against it. As an action, a dancing creature makes a Wisdom saving throw to regain control of itself. On a
      successful saving throw, this jutsu ends.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above B-Rank, increase the cost by 3 and the number of creatures you can force to dance by +1.</p>
