system:
  description:
    value: >-
      <p>You quickly brush off a hostile effect in order to keep the show going, deflecting any harm back onto your
      enemies. You immediately regain Xd4 + X hit points (X = your Genjutsu ability modifier) and can clear yourself of
      all instances of one condition of your choice that you are suffering from.</p><p>Then, one hostile creature within
      range must make a Charisma saving throw, taking the result of your healing as psychic damage that ignores
      resistance and being Dazed on a failure, or half as much and no additional effects on a success.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost by 3 and the die step by
      1.</p>
