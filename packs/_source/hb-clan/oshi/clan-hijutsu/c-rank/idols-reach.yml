name: ☆Idol's Reach☆
type: spell
_id: 3poIVlQwn9xeKalE
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>You reach out and break down the barriers of communication, allowing your words to spread to those who would
      normally be unable to understand them. For the duration, you grant a creature that you touch with this jutsu the
      ability to understand any spoken language it hears. Also, when the target speaks, any creature that knows at least
      one language and can hear the target understands what it says. Additionally, this jutsu allows the target to
      communicate mentally with creatures that do not know any languages, and the target understands those creatures
      clearly.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3. If this jutsu is cast at B-Rank, it instead lasts for 8 hours. If this jutsu is cast at
      A-Rank, it lasts for 24 hours. If this jutsu is cast at S-Rank, it lasts until dispelled.</p>
