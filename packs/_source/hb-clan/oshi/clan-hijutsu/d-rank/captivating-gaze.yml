img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>As a part of the requirements of this jutsu, there must be a creature within range that can see your
      Starry-Eyed Lies clan feature. You make eye contact with a creature that can see your Starry-Eyed Lies, attempting
      to trap them in a world decorated with your stardom. The target creature must make a Charisma saving
      throw.</p><ul><li><p><strong>On a failure:</strong> They lose concentration on any jutsu or features they were
      maintaining, reduce their movement speed to 0, and they become Charmed and Dazed until the end of their next
      turn.</p></li><li><p><strong>On a success:</strong> Their movement speed is instead reduced by
      half.</p></li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost by 3, the number of targets by +1, and the range by +15 feet.</p><hr />
