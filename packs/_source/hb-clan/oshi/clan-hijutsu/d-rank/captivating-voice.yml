folder: Z6LA9aAZTCNsoOe0
name: ☆Captivating Voice☆
type: spell
_id: lLVM8Iys4wSNZ5W2
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>You create a ringing voice, an illusory melody of your voice to make contact with a creature whom you've heard
      speak before that is on the same plane of existence as you. As a part of the casting of this jutsu, the nearest
      functioning communication device within 100 feet of the target begins to ring with a tune of your choice. If there
      is no suitable device close enough to the target, this jutsu fails.</p><p>The target must make a Charisma saving
      throw, being compelled to answer your call on a failure and gaining 1 rank of Charmed, or becoming able to ignore
      the call on a successful save. Once the connection is established, the call is crystal clear and cannot be dropped
      until the conversation has ended or the jutsu's duration ends. You can end the conversation at any time, but the
      target must succeed on a Charisma saving throw as an action to end the conversation.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost by 3. If this jutsu is cast at
      B-Rank or higher, it applies another rank of Charmed on a failure and no longer requires a functioning
      communication device, instead being able to create the call sound entirely in the target's mind.</p>
    chat: ''
