folder: Z6LA9aAZTCNsoOe0
name: ☆Idol's Gift☆
type: spell
_id: SPPGY5ogPBCdDBx0
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>As a part of the casting of this jutsu, you must speak a word, phrase, or sentence. Once per turn, you
      skillfully reshape the memories of listeners in your immediate area, so that each creature of your choice within
      range that can hear and understand you forgets everything you said within the last 6 seconds. Roll a Charisma
      (Deception) check vs. the creature with the highest passive Insight within range that you wish to
      deceive.</p><ul><li><p><strong>On a success:</strong> Those creatures then remember that you actually said the
      words you speak as a part of this jutsu's casting.</p></li><li><p><strong>On a failure:</strong> Creatures whose
      passive Insight is higher than the result of your check hear both phrases. Creatures whose passive Insight you
      exceed with your check gain 1 rank of Charmed.</p></li></ul><p>A creature who has forgotten a phrase in this way
      can be targeted by a Genjutsu Break specifically intended to restore their memory of the phrase, regaining it on a
      success.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      by 3 and the radius by 5 feet.</p>
