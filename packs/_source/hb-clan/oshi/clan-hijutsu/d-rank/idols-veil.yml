name: ☆Idol's Veil☆
type: spell
_id: bjcRUftFk8DDcDUl
img: systems/n5eb/assets/content/clans/oshi.webp
system:
  description:
    value: >-
      <p>An advanced adaptation of the Transform and Voice Change Genjutsu. You assume the form of an alter ego, an Idol
      persona. You designate the specifics of your new form (height, weight, hair texture and color, skin tone, etc.),
      and your voice changes to any tone of your choice for the duration. You do not lose any of your personal abilities
      or features, or a jutsu. Regardless of specifics, your eyes remain unchanged. This transformation appears
      completely real, holding up to all manner of physical, visual, and auditory inspection. Only a creature with True
      Sight can see through this jutsu's effects.</p><p>When performing a Charisma skill check in an attempt to deceive,
      lie, or misguide another creature, you gain advantage and a bonus to the check equal to your proficiency bonus,
      once per round.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost by 3. If cast at C-Rank, it lasts for up to 10 minutes. If cast at B-Rank, it lasts for up to 1 hour. If
      cast at A-Rank or higher, it lasts until dispelled, and True Sight can no longer see through it.</p>
