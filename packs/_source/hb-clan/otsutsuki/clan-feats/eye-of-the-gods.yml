system:
  description:
    value: >-
      <p><strong data-start="0" data-end="18">Category: Clan</strong><br data-start="18" data-end="21" /><strong
      data-start="21" data-end="63" data-is-only-node>Prerequisite: Ōtsutsuki Clan, Level 4+</strong></p><p
      data-start="67" data-end="189">You have trained your Byakugan to advance its potency, enhancing its visual prowess
      and unlocking more of its potential.</p><ul data-start="191" data-end="609" data-is-last-node
      data-is-only-node><li data-start="191" data-end="253">Increase your Intelligence score by 1, to a maximum of
      20.</li><li data-start="254" data-end="412">While your Byakugan is active, you may use your Intelligence instead
      of Wisdom for any Wisdom-based ability checks or saving throws you are proficient in.</li><li data-start="413"
      data-end="609" data-is-last-node data-is-only-node>Your Byakugan gains one of the following features from the
      Hyuga clan: Combat Insight, Immense Distance, Penetrative Vision, Perceptive Insight, Perceptive Predictions, or
      Perceptive Resilience.</li></ul>
