system:
  description:
    value: >-
      <p><strong data-start="0" data-end="18">Category: Clan</strong><br data-start="18" data-end="21" /><strong
      data-start="21" data-end="63" data-is-only-node>Prerequisite: Ōtsutsuki Clan, Level 8+</strong></p><p
      data-start="67" data-end="172">While mortals walk upon the ground, you soar above them, allowing them to bask in
      your godly abilities.</p><ul data-start="174" data-end="605" data-is-last-node data-is-only-node><li
      data-start="174" data-end="236">Increase your Intelligence score by 1, to a maximum of 20.</li><li
      data-start="237" data-end="415">When you gain a flying speed from your Space Bodies feature, the speed increases
      to 60 ft. While flying this way, attacks of opportunity against you are made at disadvantage.</li><li
      data-start="416" data-end="605" data-is-last-node data-is-only-node>You have a permanent hover speed equal to your
      walking speed and can hover 5 ft off the ground. While hovering, you reduce fall damage you take by your level +
      your Intelligence modifier.</li></ul>
