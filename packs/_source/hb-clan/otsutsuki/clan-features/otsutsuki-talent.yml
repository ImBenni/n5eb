system:
  description:
    value: >-
      <p><strong data-start="90" data-end="116">Beginning at 3rd level</strong>, you gain access to a series of
      abilities that come naturally to the Ōtsutsuki. Pick one from the list below. You gain an additional ability at
      7th and 18th level.</p><ul data-start="284" data-end="1415"><li data-start="284" data-end="497"><strong
      data-start="286" data-end="312">Innate Chakra Shaping:</strong> When you finish a Long Rest, select a number of
      Ninjutsu equal to your Ninjutsu modifier that you know, without the Fuinjutsu keyword. You ignore the HS component
      for those Ninjutsu.</li><li data-start="498" data-end="857"><strong data-start="500" data-end="517">Chakra
      Tools:</strong> Select one Bukijutsu you know. While benefiting from your Advanced Chakra Tool Hijutsu, you can
      cast that Bukijutsu using your Ninjutsu ability modifier for attack, damage, and save DC calculations. Once you
      select this Bukijutsu, you cannot unlearn it. You can select this option more than once, picking a different
      Bukijutsu each time.</li><li data-start="858" data-end="1021"><strong data-start="860" data-end="879">Nature
      Release:</strong> You gain a nature release of your choice, choosing from Fire, Water, Earth, Wind, or Lightning.
      This option can be selected multiple times.</li><li data-start="1022" data-end="1415"><strong data-start="1024"
      data-end="1042">Chakra Absorb:</strong> As an action, you can attempt to absorb chakra from a creature within 5
      feet of you. The creature must make a Constitution saving throw vs. your Ninjutsu save DC. On a failure, you
      reduce their chakra by 1d8 + your Intelligence modifier, and you regain chakra equal to the same amount. You can
      do this a number of times equal to your Intelligence modifier per long rest.</li></ul>
