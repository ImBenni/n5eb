folder: IVBXrhwMqOyy2d7r
name: Dimensional Tear
type: spell
_id: tty0v9xgXjlqfIV7
img: systems/n5eb/assets/content/clans/otsutsuki.webp
system:
  description:
    value: >-
      <p>You tear open the very fabric of reality itself, ripping a hole in space to another dimension, allowing its
      contents to fall into your current dimension. As an action, select one of the following options:</p><ul
      data-start="206" data-end="1952"><li data-start="206" data-end="774"><p data-start="208" data-end="774"><strong
      data-start="208" data-end="216">Acid</strong>: You pull open a portal to a world of acid, creating a puddle of
      acid with a 30-foot radius sphere on the ground, at a point you can choose within range. Each creature in the
      designated area must make a Dexterity saving throw or take 10d8 Acid damage and gain 1 rank of corrode. On a
      successful save, they take half as much damage. Additionally, creatures that start their turn within the pool must
      make a Constitution saving throw, taking 3d8 Acid damage on a failed save, and gaining 1 rank of corrode. On a
      successful save, they take half as much damage.</p></li><li data-start="776" data-end="1291"><p data-start="778"
      data-end="1291"><strong data-start="778" data-end="786">Lava</strong>: The sky rips open, and lava begins to pool
      onto the ground, creating an area of molten rock in a 60-foot cube at a point you can see within range. Each
      creature within the area must make a Dexterity saving throw, or take 10d6 Fire damage and gain 1 rank of burn and
      1 rank of corroded, or half as much damage on a successful save. Additionally, creatures that begin their turn
      within the cube must make a Constitution saving throw or take 3d6 Fire damage, and gain 1 rank of burn and 1 rank
      of corroded.</p></li><li data-start="1293" data-end="1952" data-is-only-node><p data-start="1295"
      data-end="1952"><strong data-start="1295" data-end="1302">Ice</strong>: A portal rips the air in two and a
      chilling cold runs through, freezing the ground directly below it in a 15-foot radius sphere at a point you can
      see within range. This area is considered difficult terrain for any creature touching the floor. Each creature
      within the radius must make a Dexterity saving throw or take 12d4 Cold damage and gain 2 ranks of chilled and 1
      rank of slowed, or take half as much damage on a successful save. Each creature that starts its turn in the area
      must make a Constitution saving throw or take 4d4 Cold damage, and gain 2 ranks of chilled and 1 rank of slowed.
      On a successful save, they take half as much damage.</p></li></ul><p data-start="1954" data-end="2126"
      data-is-only-node><strong data-start="1954" data-end="1973">At higher ranks</strong>: For each rank you cast this
      Jutsu above A-Rank, increase the cost by 3, add 2 additional dice of damage, and 1 more stack of the appropriate
      condition.</p>
