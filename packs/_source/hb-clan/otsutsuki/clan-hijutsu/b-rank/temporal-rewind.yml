name: Temporal Rewind
type: spell
_id: 56hNHlX5pqwG2woG
img: systems/n5eb/assets/content/clans/otsutsuki.webp
system:
  description:
    value: >-
      <p>You momentarily tap into the powers of the Rinnegan, adjusting time and space to undo a foolish move on your
      part. When you miss with an attack roll, the creature is immune to the damage you dealt, or a creature succeeds on
      a saving throw against a Jutsu, Feature, or Ability you used, you can rewind your personal timeline, regaining the
      action you spent to perform the action.</p><p data-start="381" data-end="652" data-is-only-node>Any resources you
      used for the action, such as chakra or Ki, remain spent, but you regain the action itself. This ability allows you
      to correct a critical failure and continue your battle with a chance to redo your approach, though the cost
      remains for whatever was used.</p>
    chat: ''
