system:
  description:
    value: >-
      <p>You create multiple weapons made out of Chakra and hurl them at your opponent. Select two weapons and make a
      number of ranged Ninjutsu attacks equal to the number of weapons created towards a creature of your choice within
      range. On a hit, you deal the weapon's damage die + your Ninjutsu modifier and apply any properties it may
      have.</p><p data-start="337" data-end="480" data-is-last-node data-is-only-node><strong data-start="337"
      data-end="357">At higher ranks:</strong> For each rank you cast this Jutsu above C-Rank, increase the cost by 3
      and increase the number of weapons you create by 1.</p>
