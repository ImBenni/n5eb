system:
  description:
    value: >-
      <p>You create giant chakra manifestations of your own arms behind you, which begin to fly forward in a rapid
      assault against all creatures in range. Each creature within the cone must make a Dexterity Saving Throw or take
      5d8 + your Ninjutsu ability modifier force damage, and are knocked back 15 feet. On a successful save, they take
      half damage and aren't knocked back.</p><p data-start="371" data-end="624">As an action on each of your turns, you
      can continue the barrage of punches. You may move before this as well as change the direction of the cone, but
      must remain still while the fists attack. This Jutsu deals double damage to structures and constructs.</p><p
      data-start="626" data-end="767" data-is-last-node data-is-only-node><strong data-start="626" data-end="646">At
      higher ranks:</strong> For each rank you cast this Jutsu above C-Rank, increase the cost by 3, the damage by 1d10,
      and the knockback by 5 feet.</p>
