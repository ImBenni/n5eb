system:
  description:
    value: >-
      <p>You craft a weapon of your choice made out of pure chakra. The weapon can be any color or design of your
      choice. Weapons you create float behind you while you are not wielding them. While wielding this weapon, you can
      use your Ninjutsu ability score for attack and damage rolls using this weapon, and you are always proficient in
      the type of weapon you create.</p><p data-start="363" data-end="657" data-is-last-node data-is-only-node>At higher
      ranks: For each rank you cast this Jutsu above D-Rank, increase the cost by 3 and the number of weapons you create
      by 1. If this Jutsu is cast at B-Rank, you gain a +1 bonus to attack and damage rolls made with the weapon. If the
      Jutsu is cast at S-Rank, this bonus increases to a +2.</p>
