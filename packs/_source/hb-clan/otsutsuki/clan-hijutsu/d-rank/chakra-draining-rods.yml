system:
  description:
    value: >-
      <p>You create a black rod made of chakra, designed to drain the chakra of all those it impales. Make a ranged
      Ninjutsu attack on a creature you can see within range. On a hit, the creature takes 2d6 + your Intelligence
      modifier piercing damage, and the creature is impaled for the duration. For each rod the creature is impaled with,
      the creature takes 1d6 chakra damage at the start of their turn.</p><p data-start="398" data-end="516">As an
      action, an impaled creature can make an Athletics check against your Ninjutsu save DC to remove one of the
      rods.</p><p data-start="518" data-end="646" data-is-last-node data-is-only-node>At higher ranks: For each rank you
      cast this Jutsu above D-Rank, increase the cost by 3 and the number of attacks you make by 1.</p>
