folder: WjYphB21qHLl9NTH
name: Hair Whips
type: spell
_id: 8dI9PGSghSs6l8xQ
img: systems/n5eb/assets/content/clans/otsutsuki.webp
system:
  description:
    value: >-
      <p>Your hair extends like tendrils from atop your head, waving and
      whipping around violently. As an action, you can send your strands of hair
      forward, doing one of the following:</p><ul data-start="177"
      data-end="839"><li data-start="177" data-end="444"><p data-start="179"
      data-end="444"><strong data-start="179" data-end="199">Piercing
      Attack:</strong> Sending several strands forward in a sharp point to
      pierce your enemies. Make a ranged Ninjutsu attack. On a hit, the target
      takes 3d8 + your Ninjutsu modifier in piercing damage. As an action on
      each of your turns, you can make another attack.</p></li><li
      data-start="448" data-end="839"><p data-start="450" data-end="839"><strong
      data-start="450" data-end="471">Restraint Attack:</strong> Your hair
      attempts to wrap around a creature's limbs like restraints, holding them
      in place. A creature must make a Strength saving throw. On a failure, they
      become restrained. A creature restrained this way takes 2d8 chakra damage
      at the start of their turn. A creature remakes their saving throw at the
      end of each of their turns, ending the restraint on a
      success.</p></li></ul><p data-start="841" data-end="1012"
      data-is-last-node data-is-only-node><strong data-start="841"
      data-end="861">At higher ranks:</strong> For each rank you cast this Jutsu
      above D-Rank, increase the cost by 3, the damage dealt by 1d8, or you can
      target an additional creature to restrain.</p>
