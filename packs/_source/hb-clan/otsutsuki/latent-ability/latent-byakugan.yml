system:
  description:
    value: >-
      <p>Beginning at 3rd Level, you can spend 10 chakra to activate your latent Byakugan. It remains active for up to
      10 minutes. You may activate and deactivate the Byakugan during this time period with no additional cost.</p><p
      data-start="219" data-end="569" data-is-last-node data-is-only-node>While active, you gain 120 feet of Chakra
      Sight while out of combat and 60 feet of Chakra Sight while in combat. You can see through material up to 5 feet
      thick. Creatures cannot be obscured to you in any way if you can see through the obstruction. Additionally, you
      can see 360 degrees around you without having to turn your head or avert your eyes.</p>
