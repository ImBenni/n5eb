    value: >-
      <p>The Ōtsutsuki are a clan that hails from far beyond the stars and dimensions—a concept beyond the comprehension
      of the average person. They travel to different worlds, planting seeds that sprout into grand trees bearing fruit
      infused with the energy of that world.</p><p data-start="268" data-end="416" data-is-last-node
      data-is-only-node>The Ōtsutsuki are known to devour these fruits, stripping the planet of life before moving on to
      another dimension, repeating the process once more.</p><p></p><p>CLAN TRAITS</p><p>Ability Score Increase: +2 Int,
      +1 Con.</p><p>Speed: Your base walking speed is 30 feet. You have a hover speed of 30 feet.</p><p>Skill
      proficiencies: Chakra Control, History</p><p>Ōtsutsuki Hijutsu: You know 1 additional Ōtsutsuki Clan D-Rank Jutsu.
