system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Reiuji Clan, Level 4+<br
      /><strong>Description</strong>: You can control your radiant chakra to drive the heat of battle the way you
      desire. You gain the following Benefits;</p><ul><li>Increase your Intelligence score by 1, to a maximum of
      20.</li><li>Reiuji clan hijutsu that give ranks of weakened can instead give ranks of burn. You can deside how
      many of these weakened ranks become burn.</li><li>While concentrating on jutsu with the fire release keyword, you
      gain a 1d4 bonus on concentration checks and saving throws against jutsu that would end your concentration. this
      becomes a 1d6 bonus when concentrating on two or more jutsu.</li></ul>
