system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Reiuji Clan, level 8+<br
      /><strong>Description</strong>: Your radiant release gives you a greater efficiency over lightning, and let you
      power yourself with it. You gain the following Benefits;</p><ul><li>You gain Lightning Nature Release Affinity.
      You are now able to add jutsu with the corresponding Keyword to your jutsu list. If you already have this nature
      release, you can learn a lightning release that doesnt count towards your jutsu known.</li><li>Concentration cost
      of jutsu with the lightning release keyword is reduced by 1.</li><li>As a bonus action, you may activate
      <strong>energy conversion</strong>. For the next minute, creatures that gain a rank of weakened due to Reiuji clan
      jutsu or features, also gain a rank of shocked. Once you use this, you cannot use energy conversion again until
      completing a short rest.</li></ul>
    chat: ''
