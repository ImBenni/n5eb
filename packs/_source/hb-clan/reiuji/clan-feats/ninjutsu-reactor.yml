    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Reiuji Clan<br
      /><strong>Description</strong>: You have taped on a near-limitless reserve of radiant chakra within you. You gain
      the following Benefits;</p><ul><li>Increase your Constitution score by 1, to a maximum of 20.</li><li>Reiuji clan
      hijutsu you cast deal additional damage equal to your constitution modifier.</li><li>Once per rest, you can cast
      one D-rank Reiuji clan hijutsu, without spending chakra.</li><li>As long as you have more than 0 chakra, you don't
      get tired from strenuous activity.</li></ul>
