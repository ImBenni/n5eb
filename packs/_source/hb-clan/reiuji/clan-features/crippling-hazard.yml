system:
  description:
    value: >-
      <p>Also at 7th level, you become able to empower your attacks in such a way the also depower your enemies. You
      ignore resistance to the weakened condition, and when a creature would fail a saving throw against a Reiuji clan
      hijutsu you cast, they gain a rank of weakened for the next minute. Jutsu that do not require a saving throw force
      a constitution saving throw when you hit with an attack. A creature can make this save once per turn.</p><p>At
      11th level, You ignore immunity to the weakened condition, instead an affected creature makes their save at
      advantage.</p>
