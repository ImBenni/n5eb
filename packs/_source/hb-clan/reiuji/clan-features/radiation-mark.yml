system:
  description:
    value: >-
      <p>Starting at 3rd level, creatures affected or within the area of jutsu with the Fire, Lightning or Wind release
      keyword you cast shed bright light for 5 feet and dim light 5 feet beyond that, This light stays for one round or
      until the jutsu ends, whichever last longer, and makes it impossible for the affected creatures to benefit from
      being invisible or be hidden.</p>
