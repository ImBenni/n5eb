system:
  description:
    value: >-
      <p>You release all of your Radiant Chakra in a single, fiery ray. All creatures in a line 20 feet wide and up to
      120 feet long must make a Constitution save, taking 14d8 Necrotic damage and gaining 2 ranks of weakened on a
      failed save, All ranks of this condition the creature currently has become permanent, and can only be cured by a
      jutsu of A-rank or higher. A creature takes half as much damage on a success. Creatures other than you within 5
      feet of the jutsu must make a wisdom saving throw, or become blinded for 1 minute as the light overwhelms their
      eyes.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above A-Rank, increase the cost of
      this jutsu by 3 and damage by 2d8 and targets gain an additional rank of weakened on a failed save.</p>
