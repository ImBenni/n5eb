system:
  description:
    value: >-
      <p>Dim, greenish light spreads within a 30-foot-radius sphere centered on you. The light spreads around corners,
      and it lasts until the jutsu ends.<br />When a creature moves into the jutsu's area for the first time on a turn
      or starts its turn there, that creature must succeed on a Constitution saving throw or take 4d10 Necrotic damage,
      and it gains one rank of exhaustion, taking half as much damage on a success. Any levels of exhaustion caused by
      this jutsu go away when the jutsu ends.</p>
