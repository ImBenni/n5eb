system:
  description:
    value: >-
      <p>You concentrate chakra in a orb in your hand and prepare it to unleash it in an explosion of radioactive
      energy. You release this chakra in a 30-feet radius on a point within range. Creatures in its path must make a
      Constitution saving throw, taking 8d8 Necrotic damage and gaining 2 ranks of weakened until the end of your next
      turn on a failed save, or half as much damage on a success.<br />Spaces affected by this jutsu becomes difficult
      terrain, creatures that start their turn or move for the first time on their turn inside of it must make a
      constitution saving throw or gain a rank of weakened. A casting of restorative at C-rank cleans a 10ft cube of
      difficult terrain from this jutsu's effects.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this
      jutsu above B-Rank, increase the cost of this jutsu by 3 and damage by 2d8.</p>
