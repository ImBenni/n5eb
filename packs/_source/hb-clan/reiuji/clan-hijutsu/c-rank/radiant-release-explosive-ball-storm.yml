system:
  description:
    value: >-
      <p>You concentrate radiant chakra within yourself, and then release it on an explosion of Radiant chakra. All
      creatures on a 20ft radius centered on yourself must make a constitution saving throw, taking 6d6 necrotic damage
      and being dazed on a failed save, half as much damage on a successs. Creatures with ranks of weakened take 6d8
      necrotic damage instead.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and increase the damage by 2d6 and 2d8.</p>
