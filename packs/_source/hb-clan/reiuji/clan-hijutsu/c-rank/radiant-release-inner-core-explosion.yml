system:
  description:
    value: >-
      <p>You supercharge your chakra flow, increase the damage output of your allies at the expense of your own health.
      For the duration, when an allied creature within 60ft of you, other than yourself, would cast a jutsu that deal
      damage, increase the damage by 2d8 once per turn. also for the duration you take 2d6 necrotic damage that cannot
      be reduced by any means at the start of each of your turns. You may end this jutsu as a bonus
      action.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, the damage bonus by 1d8, and the damage you take by 1d6.</p>
