system:
  description:
    value: >-
      <p>You use your Radiant Chakra to increase the fighting ability of your allies, Allied creatures within range gain
      10 temporary hit points and a +2 bonus to strength, dexterity and constitution saving throws. Temporary hit points
      gained this way last for the duration and are regained at the start of each of your turns.</p><p><strong>At Higher
      Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the radius
      by 5ft. Starting at A-rank, they also gain a +2 bonus to intelligence, wisdom and charisma saving throws.</p>
