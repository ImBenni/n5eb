system:
  description:
    value: >-
      <p>You use your radiant chakra on yourself, supercharging your chakra flow at the expense of your own health. For
      the duration, add one damage die to weapon attacks and jutsu you cast, twice per turn, and also for the duration
      you take 1d8 necrotic damage that cannot be reduced by any means at the start of each of your turns. You may end
      this jutsu as a bonus action.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3. Starting at A-rank, increase the damage die of jutsu you cast and
      weapon attacks by 1.</p>
