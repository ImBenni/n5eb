system:
  description:
    value: >-
      <p>Your Radiant release chakra starts leaking from you, taking its toll on other creature's bodies. When you
      activate this jutsu Creatures within range must succeed a Constitution saving throw or gain a rank of weakened for
      the duration, a weakened creature can make another constitution save at the end of each of its turns, losing this
      rank on a success, a creature that leaves the jutsu area has advantage on these saving throws. A creature makes
      the saving throw when it enters the aura for the first time on a turn or ends its turn there.<br /><strong>At
      Higher Ranks</strong>: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and
      the radius by 5ft.</p>
