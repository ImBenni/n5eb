    value: >-
      <h3 id="assured-destruction">Assured Destruction</h3><p>The Reiuji clan is an small, secretive group of the land
      of lightning, who pass down the secrets of Radiation release from master to apprentice, this technique allows them
      to enhance their fire release with lightning and wind release to make even more potent effects.</p><h4
      id="reiuji-traits">Reiuji Traits</h4><p><strong>Ability Score Increase</strong>: +2 Con, +1 Int<br
      /><strong>Speed</strong>: Your base walking speed is 30 feet.<br /><strong>Skill Proficiencies</strong>: Chakra
      Control, Athletics<br /><strong>Radiant Release Affinity</strong>: You begin with Fire Release Affinity.<br
      /><strong>Radiant Hijutsu</strong>: You know 1 additional Reiuji Clan D-Rank Jutsu, this does not count against
