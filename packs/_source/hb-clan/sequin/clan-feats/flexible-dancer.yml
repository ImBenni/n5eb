system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Sequin Clan, 4th level <br />No matter the
      dance, you're always able to fit it into your style as you are a professional dancer of course. You gain the
      following benefits;</p><ul><li>Increase your Charisma by 1, to a maximum of 20.</li><li>You gain expertise in
      Performance, and during a long rest, you may choose one jutsu that you know which has the word "Dance" within its
      name. When choosing this jutsu, it uses your Charisma modifier for casting if it doesn't already, and is affected
      by your Professional Dancer feature.</li><li>All Dance Performance jutsu and jutsus with the word "Dance" in their
      name have their chakra cost reduced by half of your Charisma modifier rounded up (min 1.) to a minimum of
      1.</li></ul>
    chat: ''
