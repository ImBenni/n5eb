system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Sequin Clan, 12th level <br />You've
      become an expert at using multiple tools, as you don't want to waste your amazing dancing skills on every enemy
      you see. You gain the following benefits;</p><ul><li>You may choose 3 weapons that you are proficient in. These
      weapons deal an additional dice of damage and are able to use your Charisma modifier for attack and damage
      rolls.</li><li>Ranged jutsu within jutsu scrolls that you utilize gain an additional number of range equal to your
      Charisma modifier times 5.</li><li>When rolling for the amount of health/chakra restored from taking a blood or
      chakra pill, twice per long rest you may choose to take the maximum amount.</li></ul>
