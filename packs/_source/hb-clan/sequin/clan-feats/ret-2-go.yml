    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Sequin Clan <br />Chakra or no, you're
      always Ret 2 Go, going forward towards adventure with a smile on your face. You gain the following
      benefits;</p><ul><li>Increase your Charisma or Dexterity by 1, to a maximum of 20.</li><li>Your speed increases by
      10 feet and you gain proficiency in Acrobatics, gaining expertise if you already have it.</li><li>You can learn
      and create Sequin clan hijutsu in half the time.</li></ul>
