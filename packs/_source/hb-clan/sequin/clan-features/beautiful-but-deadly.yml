folder: kGPLtdlQKW9QIO8v
name: Beautiful But Deadly
type: feat
_id: u4AS7PEaqgn7oPMT
img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, your silky smooth hair isn't just for show, as chakra naturally runs through it causing
      it to be both mesmerizing and powerful. You have a natural hair-whip weapon that deals 1d6 slashing damage and has
      the Light, Range 1, Finesse, and Deadly keywords. It counts as a whip for jutsu requirements. Additionally, you
      may choose to add either Silky Cream or Shampoo to your hair, not being able to change this choice once
      picked.</p><ul><li><p>Silky Cream: Your hair is much smoother than before, allowing you to attack enemies at a
      faster pace. When making an attack with your hair-whip, you may make two attacks instead of
      one.</p></li><li><p>Shampoo: Your hair has been strengthened from the power of Shampoo, causing those who are hit
      by it to feel even more pain. Your hairwhip gains the Critical keyword and adds your proficiency bonus to its
      damage.</p></li></ul><p>At 11th and 18th level, the damage of your weapon increases by 1d6 to a maximum of 3d6.
      Additionally at 11th level, your natural weapon is counted as chakra enhanced and gains the upgraded version of
      your respective choice.</p><ul><li><p>Super Silky Cream: The cream works wonders for your hair, making your
      attacks even faster as enemies are even surprised at its smoothness. The amount of attacks you can make are now
      three instead of two. Additionally, you may make one of your attack rolls at advantage per
      turn.</p></li><li><p>Super Shampoo: The strength of your hair has increased once more, allowing you to really put
      the hurt on your enemies. Your hairwhip now adds double your modifier for damage rolls, and its damage die is
      increased to a d8. Additionally, the damage dealt ignores resistance and treats immunity as
      resistance.</p></li></ul><p>Finally at 18th level, you gain the final version of your respective
      upgrades.</p><ul><li><p>Mega Silky Cream: Your hair is the smoothest its ever been, stunning your enemies with its
      beauty before stunning them when you inevitably beat them down before they can blink. You may now make four
      attacks with the attack action. Additionally, for a number of rounds equal to half of your Charisma modifier
      rounded up (min 1.), enemies that aren't hit by you are counted as having 1 rank of Charmed against you. Finally,
      you are able to make two of your attack rolls at advantage per turn.</p></li><li><p>Mega Shampoo: Power courses
      through your hair as its the deadliest its ever been, making enemies think twice before trying to tussle with you.
      The damage dice for your weapon is increased to a d10. Additionally, you now add triple your modifier for damage
      rolls and damage dealt now ignores immunity and DR. Finally, enemies hit by your natural weapon must make a Wisdom
      saving throw against your Sequin jutsu DC. On a failure, they gain 1 rank of Fear as the thought of being hit by
      your monsterously strong hair shakes them to their core. They must remake the save at the end of their turns to
      get rid of this effect.</p></li></ul>
    chat: ''
