name: No Powers, No Problem!
type: feat
_id: B06Fr05yFO66E9Bw
img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>Starting at 7th level, sometimes you have to rely on tools when your powers aren't working properly, leading
      you to squeeze out every usage of each item you use. Explosive tools and jutsus provided by jutsu scrolls deal an
      additional dice of damage and adds your Charisma modifier to the result. Additionally, blood and chakra pills add
      an additional number of dice equal to half of your Charisma modifier rounded down (min 1.) when utilized by you.
      At 18th level this extends to military ration pills. Additionally, tools and jutsu scrolls now add double your
      charisma modifier to the result.</p>
    chat: ''
