name: Professional Dancer
type: feat
_id: a0Snn7aujO2ENzvS
img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, your skills as a dancer are second only to your skills as a shinobi. When casting a
      jutsu of the Dance Performance lineage or a Sequin Clan hijutsu, you may use your Charisma modifier. Additionally,
      the DCs for these jutsus are increased by 1. At 3rd level, when casting the prerequisite jutsu, you may add your
      Charisma modifier to the damage roll. Additionally, the DC increase is now by 2. At 11th level, the DC increase is
      now by 3. Additionally, you are counted as always being under the effects of Dance Performance: Neutral Stance at
      its highest rank as long as you have chakra, not having to pay concentration costs.</p>
    chat: ''
