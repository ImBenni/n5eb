system:
  description:
    value: >-
      <p>Also at 1st level, your unique DNA allows you to transform with much more ease than the average shinobi,
      reducing the strain it puts upon your chakra network. When casting a jutsu that alters your body (such as
      Transform or Advanced Transformation) or alters your Physical stats (Strength, Dexterity, or Constitution), it has
      its cost reduced by 1 to a minimum of 1. This reduction increases by 1 at 7th and 13th level, to a maximum of
      3.</p>
