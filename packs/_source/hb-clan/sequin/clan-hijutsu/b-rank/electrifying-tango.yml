system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, the area around you sparkling to life as your
      appearance takes on a more eel-based look. Hostile creatures within range must make a constitution saving throw,
      taking 6d10 lightning damage as well as 3 ranks of shocked on a failure, taking half on a success and 1 rank of
      shocked. Additionally, when using this jutsu for the purposes of powering machinery, you are treated as having a
      +15 bonus on the relevant check.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      B-Rank, increase the cost by 3, the amount of damage by 1d10, the range by 15 feet, and the bonus by 5.</p>
