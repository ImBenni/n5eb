system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, wrapping around your allies as you take on the
      form of a dryad that provides your friends with a quick respite. Allied creatures within range gain a number of
      hit points equal to 3d12 + your Charisma modifier, and are cleared of any Physical conditions affecting them.
      Additionally, undead creatures within range take double the amount of healing as damage.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost by 3, the amount of healing by
      1d12, and the range by 10 feet.</p>
