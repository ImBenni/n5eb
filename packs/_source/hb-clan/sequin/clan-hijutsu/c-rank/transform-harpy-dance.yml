img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, transforming you into a fluffy harpy with a bit of
      a feather-dropping problem. While concentrating on this jutsu, you are unable to cast jutsu or make weapon
      attacks. Additionally, you gain the following benefits;</p><ul><li>You gain a flight speed equal to twice your
      movement speed, being able to dash as a bonus action which triples your flight speed. When you would end your turn
      in the air, you are able to hover in place or flutter down harmlessly.</li><li>As an action, you are able to make
      a talon attack which uses your natural weapon dice and bonuses, making a melee ninjutsu attack against a creature
      in range.</li><li><p>Additionally, while you are within this transformation you can choose to spend a full-turn
      action sending out stiff feathers towards your enemies. When doing this, hostile creatures must make a dexterity
      saving throw, taking 4d6 slashing damage and 2 ranks of bleeding on a failure, taking half damage on a success.
      After this, you are able to recall the feathers back to you, having them make another dexterity save with the same
      conditons. Creatures that failed the first saving throw make this one at disadvantage.</p></li></ul><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost by 3, the damage dealt by
      1d6, the range by 15 feet, and the ranks of bleeding by 1.</p>
