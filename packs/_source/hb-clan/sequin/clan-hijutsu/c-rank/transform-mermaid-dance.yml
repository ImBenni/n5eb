name: Transform Mermaid Dance!
type: spell
_id: EskDJBeJY1lyDWLv
img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, transforming you into an agile mermaid. While
      concentrating on this jutsu, you are unable to cast jutsu but are able to make weapon attacks. Additionally, you
      gain the following benefits;</p><ul><li>You gain swimming speed equal to twice your movement speed, being able to
      dash as a bonus action which triples your swimming speed, but your on-land movement speed is halved.</li><li>While
      underwater, you have advantage on all dexterity-based rolls and attack rolls that you make.</li><li><p>As an
      action, you cause hostile creatures within range to make a constitution saving throw, as you create giant bubbles
      aimed to drop down upon them. On a failure, affected creatures take 5d8 cold damage, only taking half the damage
      on a success. Additionally, they are Restrained and take 1 rank of chilled, having to remake the save at the start
      of their next turns while this jutsu is active. Creatures that are either underwater or standing atop a water
      source make this save at disadvantage.</p></li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above C-Rank, increase the cost by 3, the damage dealt by 1d8,the range by 15 feet, and the rank of
      chilled by 1. If cast at A-Rank and above, they are additionally Stunned until the end of their next turn on a
      failure.</p>
