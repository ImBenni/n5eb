name: Transform Spider Dance!
type: spell
_id: 1YRm1GvP9btOEmVz
img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, transforming you into a spooky spider with a tough
      exterior. While concentrating on this jutsu, you are unable to cast jutsu or make weapon attacks. Additionally,
      you gain the following benefits;</p><ul><li>You gain a number of DR equal to your Charisma modifier. Additionally,
      darkness counts as dim light and dim light counts as bright light for you.</li><li>You gain a climbing speed equal
      to twice your movement speed, being able to dash as a bonus action which triples your climbing speed.
      Additionally, you are able to hang off of ceilings a number of feet equal to your movement speed.</li><li><p>As an
      action, you are able to send a ball of poisonous venom towards an enemy within range, making a ranged ninjutsu
      attack dealing 10d4 poison damage on a hit. Additionally, they must make a constitution saving throw, gaining 2
      ranks of Envenomed on a failure and none on a success.</p></li></ul><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above C-Rank, increase the cost by 3, the damage dealt by 2d4, the range by 10 feet, and
      the ranks of Envenomed by 1.</p>
