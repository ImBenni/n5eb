name: Transform Bat Dance!
type: spell
_id: Mq3bMOffozvCTjrR
img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, transforming you into a bat with rather great
      scouting abilties. While concentrating on this jutsu, you are unable to cast jutsu or make weapon attacks.
      Additionally, you gain the following benefits;</p><ul><li>You count as one size smaller and gain a +1 bonus to
      your AC.</li><li>You gain a flying speed equal to your movement speed and gain a Darkvision range of 60
      feet.</li><li><p>As an action you can choose to let out a chakra-pulse sonar, revealing any invisible creatures
      within your Darkvision range.</p></li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above D-Rank, increase the chakra cost by 3, and increase your Darkvision range by 30 feet.</p>
