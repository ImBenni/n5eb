system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, transforming you into a fiesty crab with
      pinchy...pinchers! While concentrating on this jutsu, you are unable to cast jutsu or make weapon attacks.
      Additionally, you gain the following benefits;</p><ul><li>You count as one size smaller and gain a +3 bonus to
      your AC.</li><li>You are able to breathe underwater and gain a swimming speed equal to your movement
      speed.</li><li><p>As an action you may attempt to claw up an enemy, making a melee ninjutsu attack against an
      enemy within range. On a hit, you deal 3d4 slashing damage and grant 1 rank of bleeding. Alternatively, you can
      attempt to grapple your enemy, making the same attack roll but giving the Grappled condition on a successful hit.
      Affected creatures must make a Strength save against your Sequin DC.</p></li></ul><p><strong>At Higher
      Ranks:</strong> or each rank you cast this jutsu above D-Rank, increase the chakra cost by 3, and increase the
      damage by 1d4. If cast at B-rank or higher, creatures make the save at disadvantage.</p>
