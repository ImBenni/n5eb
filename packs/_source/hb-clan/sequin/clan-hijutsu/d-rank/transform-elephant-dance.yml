img: systems/n5eb/assets/content/clans/sequin.webp
system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, transforming you into a bulky elephant with
      amazing strength. While concentrating on this jutsu, you are unable to cast jutsu or make weapon attacks.
      Additionally, you gain the following benefits;</p><ul><li>You count as one size larger and gain 3 DR against
      bludgeoning, slashing, and piercing damage.</li><li>Due to your heaviness, you are unaffected by difficult terrain
      caused by heavy winds.</li><li><p>As an action, you may make a melee ninjutsu attack against a creature within
      range. Upon hitting, you deal 2d10 bludgeoning damage and knock them 10 feet back. You may also use this action to
      move heavier objects with much more ease, granting advantage on strength or dexterity based checks for such an
      occasion.</p></li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the chakra cost by 3, the damage dealt by 1d10, the DR by 3, and the knockback by 10 feet.</p>
