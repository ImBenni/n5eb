system:
  description:
    value: >-
      <p>You shake your body to a phantom beat as chakra shrouds you, transforming you into a lively monkey with
      surprising agility. While concentrating on this jutsu, you are unable to cast jutsu or make weapon attacks.
      Additionally, you gain the following benefits;</p><ul><li>You count as one size smaller and gain a +2 bonus to
      your AC.</li><li>Your movement speed increased by 10 feet. Additionally, you gain a climbing equal to your
      movement speed.</li><li><p>As an action you may perform a straight-line dash through your enemies, having them
      make a dexterity saving throw as you shoot straight towards them dealing 2d8 bludgeoning damage on a
      failure.</p></li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the chakra cost by 3, increase the damage by 1d8, and the range by 10 feet. If cast at B-rank or higher,
      creatures make the save at disadvantage.</p>
