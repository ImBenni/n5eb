system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Usagi Clan Level 12+ <br />You become even
      more powerful in your brutal techniques.</p><ul><li>You gain +1 to your strength or dexterity.</li><li>No creature
      can react to your brutal techniques (Savage Bite, Brutal Kick and Killer Combo), additionally they ignore temp
      Hp.</li><li>Your Brutal techniques also deal an additional multiplier of damage (x2 becomes x3 etc).</li><li>Based
      on how successful your techniques are in hitting your target (0-4, 5-9, 10+ for your savage bite and brutal kick,
      or 0-3, 4-7 and 8-10+ for your killer combo) they inflict an additional 1, 2 and 4 ranks of hopeless
      respectively.</li></ul>
    chat: ''
