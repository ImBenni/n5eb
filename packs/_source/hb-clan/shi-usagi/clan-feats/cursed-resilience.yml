system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Usagi Clan Level 8+ <br />Thanks to your
      curse, your are capable of shaking off any type of troublesome conditions that affects you to reach and take out
      your target, you gain the following:</p><ul><li>+1 to constitution, strength or dexterity.</li><li>You can ignore
      1 rank of any status effect.</li><li>You can, as an action, cleanse 1 effect from yourself of any type as your
      curse reacts against them by using 5 hp per rank removed(Conditions like Lacerated and similar add +5 to their
      values).</li><li>You gain resistance to poison/envenomed conditions and damage.</li><li>You cannot go below 0 HP
      from poisoning unless they are A rank or higher (if a poison below A rank brings you to 0 HP you are stable and do
      not need to roll death saves).</li></ul>
    chat: ''
