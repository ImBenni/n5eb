system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Usagi Clan <br />You are a natural talent
      when it comes to your clan's characteristics, you gain the following bonuses:</p><ul><li>Your bite and kick
      attacks crit on a 18 instead of 19 and they increase their ranks to the next tier
      (1d4-&gt;1d6-&gt;1d8-&gt;1d10-&gt;1d12).</li><li>You gain 1 mastery rank in deception and
      intimidation.</li><li>Thanks to your big and developed ears you cannot be surprised.</li><li>You gain the Earth
      Release Mole Movement, but the movement you are allowed is equal to your base walking speed, this jutsu does not
      count towards the limit of jutsu you know.</li></ul>
    chat: ''
