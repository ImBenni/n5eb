    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Usagi Clan <br />You are a born predator
      and feel a thrill on hunting your victims.<br />Your Prey marks now gain additional bonuses:</p><ul><li>You can
      apply your mark on the same creature even if a full day has not yet passed, 8 hours will do instead.</li><li>A
      creature can now be crit an additional time per application of the mark.</li><li>Double the range of your hunter
      instincts trait and now it lasts for 4h.</li></ul>
