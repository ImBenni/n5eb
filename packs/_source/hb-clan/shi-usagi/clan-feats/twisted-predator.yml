system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Usagi Clan Level 4+ <br />You are
      incredibly dangerous and horrible to lock eyes with. <br />When you are hunting you gain the
      following:</p><ul><li>Gain +1 to strength of dexterity.</li><li>Now when a creature is marked as prey they also
      gain 1 rank of hopeless.</li><li>The max amount of hopeless ranks a creature can have is doubled.</li><li>If you
      manage to surprise attack a creature, they gain 2 ranks of hopeless.</li><li>Damage dealt by your hopeless ranks
      is increased to 1d8 for attacks and 1d10 for jutsu.</li></ul>
