img: systems/n5eb/assets/content/clans/shi-usagi.webp
system:
  description:
    value: >-
      <p>At level 3, when you reduce a creature to 0 HP, a surge of brutality takes over, driving you to continue the
      hunt. You can immediately move up to half your speed.<br />If this movement brings you within range of a hostile
      creature, you can make a free attack with your kick or bite. This attack critically hits on a roll of 15 or
      higher.<br />Every other creature within 15 feet must make a Wisdom saving throw against your highest DC. On a
      failure, they gain 1 rank of Hopeless.<br />You can do this up to your proficiency bonus creatures per short
      rest.</p>
