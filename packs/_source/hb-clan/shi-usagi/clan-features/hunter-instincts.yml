folder: w6OjBsyzIpqeRiKT
name: Hunter Instincts
type: feat
_id: DTJhk6ZlFYuvR5uI
img: systems/n5eb/assets/content/clans/shi-usagi.webp
system:
  description:
    value: >-
      <p>At level 1, you gain the ability to mark creatures as your prey, honing your instincts to track and hunt them
      down.<br />As a bonus action you can mark a number of creatures up to your proficiency modifier if they are within
      30 feet of you. Each creature can only be marked once per day, and the mark lasts for 1 hour. You can use this
      trait a number of times equal to your proficiency modifier per long rest.<br />Each marked creature grants you the
      following benefits:</p><ul><li>You always know the exact location of your prey if they are within 120 feet. You do
      not need to see them to sense their presence, and you can attack them without disadvantage, even in darkness or if
      they are invisible.</li><li>Marked creatures instinctively become more cautious around you. You gain a 1d6 bonus
      to Persuasion, Intimidation, or Deception checks made against them.</li><li>If your prey moves beyond your
      120-foot sensing range, you have advantage on checks to track them. You can follow the unique chakra trail they
      leave behind while marked.</li><li>You can automatically score a critical hit against a marked creature once per
      application of this mark per action made (does not apply to multiple hit type techniques or jutsu).</li></ul>
    chat: ''
