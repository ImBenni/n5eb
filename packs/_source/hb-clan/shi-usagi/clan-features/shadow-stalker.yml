name: Shadow Stalker
type: feat
_id: GoMU0vTZeouP4jO6
img: systems/n5eb/assets/content/clans/shi-usagi.webp
system:
  description:
    value: >-
      <p>At level 7, you revel in the fear of your enemies, using it to fuel your relentless pursuit, turning fear into
      utter despair.<br />As a bonus action, instead of walking, you can teleport behind a hostile creature within your
      movement speed range that you can see. This teleportation provokes attacks of opportunity as normal.<br />The
      target must make a Wisdom saving throw against your highest DC. On a failure, they gain 1 rank of Hopeless.<br
      />You ignore resistance in applying hopeless ranks and treat immunity as resistance.<br />As a bonus action, you
      can convert any ranks of Fear that you personally inflicted into ranks of Hopeless.<br />You cannot do this twice
      or more to the same creature in the same round.</p>
    chat: ''
