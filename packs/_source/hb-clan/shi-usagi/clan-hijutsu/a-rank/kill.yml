system:
  description:
    value: >-
      <p>You set your sights on a single creature with one intent: to kill. Channeling all of your rage and predatory
      instincts, you unleash a devastating attack.<br />The target must make a Constitution saving throw against your
      Taijutsu DC. If they have 50 HP or less, they make this saving throw with disadvantage. On a failure, if the
      creature is under 50 HP, they are instantly torn to shreds and die. On a success, they take 10d12 Force damage
      that cannot be reduced, ignores resistances, and treats immunities as resistance.<br />If the creature has more
      than 50 HP, they take 10d12 Force damage on a failure, along with 1 rank of Lacerated and Staggered. On a success,
      they take half damage but no conditions. This damage cannot be reduced, ignores resistances, and treats immunities
      as resistance.<br />This jutsu completely ignores temporary HP, bonuses to saving throws, and any external effects
      that would assist in the saving throw.</p>
