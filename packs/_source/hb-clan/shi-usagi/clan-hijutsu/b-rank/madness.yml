system:
  description:
    value: >-
      <p>Your mind succumbs to the thrill of the hunt as your curse takes full control. You fully transform into a
      deranged humanoid sage creature (wererabbit), your bloodshot eyes a warning of the carnage to come.<br />If Frenzy
      or Fervor is active, their bonuses apply in addition to this jutsu, their duration refreshes and you must not pay
      the concentration on it anymore. Effects:</p><ul><li>Gain 5 ranks of Berserker, which persist while this jutsu is
      active regardless of immunities to the condition.</li><li>Increase your speed by 30 feet.</li><li>Gain advantage
      on all Strength, Dexterity, and Constitution saving throws.</li><li>All attacks and jutsu crit on a 15, regardless
      of their base value.</li><li>You cannot concentrate on jutsu while in this form.</li><li>Every creature that sees
      your transformation gains 2 ranks of Hopeless.</li><li>Against creatures with at least 10 ranks of Hopeless, you
      gain advantage on attacks.</li></ul><p>After this jutsu ends, you gain 5 ranks of Exhaustion, which can only be
      removed one per long rest. You cannot lose this jutsu's concentration as the result of being attacked.</p>
