system:
  description:
    value: "<p>You slam your foot into the ground, releasing your chakra and causing powerful spikes to burst forth from the point of impact. These spikes continue to sprout along a 30-foot long line in front of you, with the line being 10 feet wide.<br />Every creature within the affected area must make a Dexterity saving throw. On a failure, they take 3d12 earth damage; on a success, they take half damage. This area becomes difficult terrain, though you are not affected by it.<br />Any creature failing the saving throw also gains 1 rank of Bruised. <br />A creature can spend 10m to fix the difficult terrain area.<br />\_ \_ <strong>At Higher Ranks:</strong> For each rank above C-Rank that you cast this jutsu, the chakra cost increases by 3, the line length increases by 10 feet, the damage increases by 2d12. <br />On B-Rank, the width of the line becomes 15 feet. On A-Rank, the target gains 2 ranks of Bruised instead of 1.</p>"
