system:
  description:
    value: "<p>You create a massive rabbit-shaped maw made of earth, which lunges forward and bites down on everything within a 30-foot cone.<br />Every creature in the area must make a Constitution saving throw. On a failure, they take 4d10 earth damage and gain 1 rank of Bleeding. On a success, they take half damage and no additional effects.<br />The affected area becomes difficult terrain, though you are not affected by it.<br />A creature can spend 10m to fix the difficult terrain area.<br />\_ \_ <strong>At Higher Ranks:</strong> For each rank above C-Rank, the chakra cost increases by 3, the cone range extends by 15 feet, and the damage increases by 2d10. At A-Rank, the target gains 2 ranks of Bleeding instead of 1.</p>"
