system:
  description:
    value: "<p>You empower your legs with chakra and charge at your target, delivering a devastating dropkick with all your might. As part of this jutsu, you can use any remaining movement to close the distance to your chosen target. For every 10 feet you move toward the creature, this jutsu gains an additional damage die.<br />The target must make a Dexterity saving throw. On a failure, the creature takes 3d8 damage plus your kick damage, is knocked back 20 feet, and falls prone. For every 10 feet you ran toward the target, the creature subtracts 1 from their saving throw result.<br />\_ \_ <strong>At Higher Ranks:</strong> For each rank above D-Rank that you cast this jutsu, the chakra cost increases by 2, and the damage increases by 2d8.</p>"
