system:
  description:
    value: >-
      <p>Your body succumbs further to the curse, transforming you into a feral embodiment of your clan's legacy. Your
      skin grows furrier, your eyes turn savage, and your movements become wild and erratic, as if you're teetering on
      the edge of madness.<br />While in this state, you gain the following benefits:</p><ul><li>+1 to attack rolls,
      attack damage, and jutsu DC.</li><li>+1 to AC.</li><li>Your speed increases by 10 ft.</li><li>At the start of your
      turn, you gain temporary HP equal to 1d6 + your proficiency modifier.</li></ul><p>This form marks your descent
      into pure, instinct-driven brutality, where the lines between hunter and beast blur completely.<br />You cannot
      lose this jutsu's concentration as the result of being attacked.</p>
