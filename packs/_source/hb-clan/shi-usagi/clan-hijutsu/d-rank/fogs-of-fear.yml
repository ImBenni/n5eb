folder: IG7lYp0d2zRG94LS
name: Fogs Of Fear
type: spell
_id: N5DFpZbrduTlwntn
img: systems/n5eb/assets/content/clans/shi-usagi.webp
system:
  description:
    value: >-
      <p><span style="font-family:BookInsanityRemake">You release a dense fog from your last known position, a physical
      manifestation of your curse. Creatures inside the fog cannot see further than 10 feet ahead of them, gaining
      disadvantage on attacks made while inside the fog.<br
      style="box-sizing:border-box;-webkit-print-color-adjust:exact;color:rgb(0, 0,
      0);font-family:BookInsanityRemake;font-size:12.8504px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;background-color:rgb(238,
      229, 206);text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial" />While
      within this fog, you can hide as a bonus action, when you do so, you have advantage on your stealth check as
      neither your shadow nor your outlines are visible to others. Any hostile creature inside the fog must make a
      Wisdom saving throw against the casters Genjutsu DC at the start of their turn. On a failure, they gain 1 rank of
      fear. Creatures affected by fear within the fog cannot lose ranks of fear normally and they can only remove all
      ranks by making a DC 15 Wisdom saving throw as an action. These restrictions apply only while within the radius of
      the fog.</span></p><p><span style="font-family:BookInsanityRemake"><strong
      style="border:0px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:inherit;font-variant-east-asian:inherit;font-variant-alternates:inherit;font-variant-position:inherit;font-variant-emoji:inherit;font-weight:bold;font-stretch:inherit;font-size:12.8504px;line-height:inherit;font-family:BookInsanityRemake;font-optical-sizing:inherit;font-size-adjust:inherit;font-kerning:inherit;font-feature-settings:inherit;font-variation-settings:inherit;vertical-align:baseline;margin:0px;padding:0px;box-sizing:border-box;-webkit-print-color-adjust:exact;letter-spacing:-0.02em;color:rgb(0,
      0,
      0);orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;background-color:rgb(238,
      229, 206);text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial">At Higher
      Ranks:</strong> For each rank above D-Rank that you cast this jutsu, the chakra cost increases by 4, and radius
      increases by 5 ft and the saving throw DC to remove all ranks of fear increases by 2.</span></p>
