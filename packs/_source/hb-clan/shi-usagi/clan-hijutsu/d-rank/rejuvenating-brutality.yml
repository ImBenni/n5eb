system:
  description:
    value: "<p>You take pleasure in brutalizing your downed enemies, savoring their agony and the sight of their blood. You can use your action to attack a creature that is downed, regardless of whether you kill it or not (unless you are in a berserk state).<br />You heal for 2d8 HP if you do not kill the target, or 3d10 HP if you do. If you kill the target, every creature within 25 feet that can see you must make a Wisdom saving throw or gain 1 rank of fear.<br />You can only use this once per downed creature.<br />\_ \_ <strong>At Higher Ranks:</strong> For each rank above D-Rank that you cast this jutsu, increase the chakra cost by 3 and the healing by 1d8/1d10 respectively.</p>"
