system:
  description:
    value: >-
      <h2 id="the-shi-usagi-clan">The Shi Usagi Clan</h2><p>The Usagi clan traces its origins to an ancient hunting
      lineage, one marked by a terrible curse, though they claim to have turned it into a blessing.<br />According to
      legend, after driving several species to extinction, they were cursed by a powerful sacred sage beast,
      transforming them into the very prey they once hunted, a rabbit. Unlike the Izuno or Inuzuka clans, who bond with
      animals or inherit bestial traits, the Usagi clan retains a mostly human appearance, aside from a few distinct
      rabbit-like features such as fluffy tails or elongated ears. However, the curse did far more than alter their
      appearance.<br />Feared across the lands, the Usagi clan is infamous for its assassins and mercenaries often
      ruthless, sadistic killers who leave little behind of their victims. Their reputation has given rise to countless
      chilling legends, solidifying their place as one of the most feared clans. Even when gravely wounded, their
      members often dismiss injuries with a smirk and the words, "Tis but a scratch," as their insatiable bloodlust and
      adrenaline dull the pain.<br />(Created By Liviu50)</p><h3 id="shi-usagi-traits">Shi Usagi
      Traits</h3><p><strong>Recommended Ability Score Increase:</strong> +2 Con, +1 Dex.<br /><strong>Speed:</strong>
      Your base walking speed is 40 ft. <br /><strong>Skill Proficiencies:</strong> You gain proficiency in two between
      persuasion, intimidation, acrobatics and athletics.<br /><strong>Extra Language:</strong> Standard + Earth
      dialect.<br /><strong>Cursed Release:</strong> You gain the earth release. <br /><strong>Usagi Hijutsu:</strong>
      You know an additional D-Rank jutsu from the Usagi Clan Jutsu List(This does not count towards your total jutsu
      known).</p>
