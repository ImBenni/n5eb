system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Shihōin Clan <br />You've learned a
      manner of mimicry said to be practiced by very few clan members. You gain the following benefits:</p><ul><li>You
      gain proficiency in Deception. If you are already proficient, you instead gain expertise.</li><li>You can make a
      Deception check using your Strength or Dexterity in place of Charisma.</li><li>Select 1 type of Sage Beast. You
      gain the ability to transform into that type of Sage Beast as listed in the D-Rank Fanged Seal, except with no
      limit on the duration. Your size category is Small at all times in this form and you can end it at will. While
      transformed, true sight cannot determine that you have changed your form.</li><li>Select one D-Rank Feature from
      the Sage Beast you selected. Twice per rest, you can spend 5 chakra to gain the benefits of that feature until the
      end of your next turn, replacing any references to natural weapons with your unarmed strikes and treating yourself
      as the summoner.</li></ul>
