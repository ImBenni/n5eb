img: systems/n5eb/assets/content/clans/shihoin.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Shihōin Clan, Level 16+, Shunpo Master
      <br />Your mastery of Shunpo is unequaled, unrivaled. You exemplify the aspects of the swiftest members of your
      clan. You gain the following benefits:</p><ul><li>Your <strong>Body and Spirit</strong> clan feature now increases
      your movement speed by 5 times your Proficiency Bonus.</li><li>You may gain one benefit you gain from your
      <strong>Adaptive Footwork</strong> clan feature from being Armored while you are Unarmored, and vice versa. The
      chosen options can be changed during a Long Rest.</li><li>Once, at the start of each of your turns before any
      other action is taken, you can immediately take the Dash action at no action cost.</li><li>When you would take the
      Dash action, you can force the next creature that you make an attack against or force to make a saving throw to
      make an Insight check vs your passive Martial Arts. On a failure, they are Surprised until the end of the current
      action. A creature can only be Surprised in this way twice per rest.</li></ul>
    chat: ''
