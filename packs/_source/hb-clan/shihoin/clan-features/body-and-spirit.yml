name: Body and Spirit
type: feat
_id: qcurLkgJ16ExD4Ze
img: systems/n5eb/assets/content/clans/shihoin.webp
system:
  description:
    value: >-
      <p>Also at 1st level, your body and spirit have developed more natural energy and power, requiring more energy to
      be brought forward as a result. You gain the following benefits:</p><ul><li>Increase your movement speed by an
      amount equal to 5 times half your Proficiency Bonus.</li><li>Decrease your Chakra Die size by one step, to a
      minimum of d6, and increase your Hit Die size by one step, to a maximum of a d12. If your Chakra Die is unable to
      decrease past a d6, you do not gain the benefits of this step increase.</li><li>Weapon attacks you make, Taijutsu
      and Bukijutsu, as well as Athletics and Martial Arts checks you make can use Charisma in place of Strength for all
      calculations.</li><li><p>At 3rd level, you reduce the cost of jutsu with a range of Self by an amount equal to
      their rank. <br /><em>(D-Rank: 1; C-Rank: 2; B-Rank: 3; A-Rank: 4; S-Rank: 5)</em></p></li></ul>
