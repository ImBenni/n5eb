folder: IMHmzHqxloIRgAqz
name: Powerful Physique
type: feat
_id: 9PJz2nw6v7bbw0MR
img: systems/n5eb/assets/content/clans/shihoin.webp
system:
  description:
    value: >-
      <p>At 1st level, you have developed an incredibly athletic physique after intense training, allowing you to
      utilize both your outer and inner strength in tandem. You add your Strength and Charisma Ability Modifiers to
      calculations involving your carrying, push, drag, and lifting capacities and limits, and can use your Charisma
      Ability Modifier in place of Strength for the purposes of qualifying for armor, items, weapons, and other
      equipment. Additionally, while unarmed or while wielding weapons with the Unarmed property, you can change your
      unarmed damage and damage you deal with Taijutsu or Bukijutsu to Force damage.</p><p>Also, your unarmed damage die
      becomes 1d6 if it is not already. If it already is, it increases by one step. It increases by one step at 7th
      level, 11th level, and again at 18th level, to a maximum of 2d6.</p>
    chat: ''
