system:
  description:
    value: >-
      <p><em>(You must be a member of you Shihōin to learn and cast this jutsu, and this jutsu can only be cast as a
      Finisher.)</em> You leap up and perform an intense barrage of super-sonic punches. Make a number of melee or
      ranged Taijutsu attacks equal to your your base Taijutsu Ability Modifier against a single creature within range.
      On a hit, you deal your unarmed damage + 1d4. The damage of these attacks cannot be reduced by more than half, and
      they treat AC bonuses gained against them as being halved. If at least three attacks hit, that creature must make
      a Constitution Saving Throw, having any armor they are wearing destroyed on a failure.</p><p>The resonance from
      the attacks then detonates and the force travels outwards. All creatures within a 60 foot radius of the initial
      target except you, including the initial target must make a Strength Saving Throw, taking Xd6+X Bludgeoning damage
      and falling Prone on a failure, or half as much on a success. <br /><em>(X = the number of attacks you hit the
      initial target with)</em></p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank,
      increase the cost by 3. If this jutsu is cast at S-Rank, the number of attacks made is instead 1.5x your base
      Taijutsu Ability Modifier.</p>
