folder: WHjL51r7z7Q5Oo28
name: Way of Onmitsu Windmill
type: spell
_id: euNJu0d9FdsSd5jT
img: systems/n5eb/assets/content/clans/shihoin.webp
system:
  description:
    value: >-
      <p>You throw your body into the air, making a shearing movement with your legs that allows you to strike with
      devastating force. This jutsu can be executed with a backwards movement or a sideways movement, changing effects
      depending on the method chosen:</p><ul><li><strong>Backwards</strong>: You use your movement to catch your
      opponent off guard. Make a melee Taijutsu attack against a hostile creature within range, dealing your unarmed
      damage + 3d8 on a hit. As a part of making this attack, you can make a Martial Arts check vs the target's passive
      Perception. If you have expertise, you add a +1d4 bonus instead of doubling your Proficiency Bonus. On a success,
      you make this attack with advantage, and on a hit the target creature becomes Concussed and
      Confused.</li><li><strong>Sideways</strong>: You use your movement to add more driving force behind your strike.
      Make a melee Taijutsu attack against a hostile creature within range, dealing your unarmed damage + 4d6 on a hit.
      On a successful hit, an affected creature must make a Strength Saving Throw, being knocked 30 feet in a direction
      of your choice on a failure. If they impact a surface more than 10 feet thick, they become Restrained in it and
      make a Strength Saving Throw to break free at the end of each of their turns.</li></ul><p>Regardless of the method
      chosen, until the end of your turn, you can target one affected creature with a Taijutsu or Bukijutsu
      <em><strong>Finisher</strong></em> regardless of range, once per turn, using either an Action or Bonus action,
      ignoring its listed casting time.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the cost by 3, and the damage by either 2d8 or 2d6 respectively.</p><p></p>
