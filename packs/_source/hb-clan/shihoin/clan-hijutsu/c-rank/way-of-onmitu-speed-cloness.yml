name: Way of Onmitu Speed Cloness
type: spell
_id: bs5wx24JiTqKR5wC
img: systems/n5eb/assets/content/clans/shihoin.webp
system:
  description:
    value: >-
      <p>As a part of the requirements of this jutsu, you must know the <em><strong>Way of Onmitsu: Shunpo</strong></em>
      Jutsu. Utilizing Shunpo, you move so quickly throughout the area that you create a number of fleeting clones of
      yourself equal to twice your Proficiency Bonus that are completely indistinguishable from your real self, even
      with true sight. They each perfectly mimic your movements and speech, and must each occupy their own individual
      spaces within the range of this jutsu.</p><p>Until the start of your next turn, you are treated as being Invisible
      to any creature that can see or sense you whose passive Perception is equal to or lower than half of your base
      movement speed rounded down to the nearest five feet.</p><p>If their passive Perception would be lower than this
      value by 5 or more, your attacks against them gain a +1 bonus to their critical threat range for the duration of
      this jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the
      cost by 3, and the radius by 5 feet.</p>
