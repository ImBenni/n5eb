system:
  description:
    value: >-
      <p>A specialized movement technique which allows the user to move faster than the eye can follow. When you would
      move, you can cast this jutsu to instead teleport to the space you would've traveled to with your
      movement.</p><p>As a part of this jutsu's casting, you can spend 3 chakra to gain +10 movement speed or a +1 bonus
      to Dexterity checks until the end of the current turn.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above D-Rank, increase the optional cost by 3, and the bonus movement speed by 5 feet. If this
      jutsu is cast at B-Rank, you instead gain a +2 to Dexterity checks. If this jutsu is cast at S-Rank, you instead
      gain a +3 to Dexterity checks.</p><p></p>
