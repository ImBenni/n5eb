img: systems/n5eb/assets/content/clans/shihoin.webp
system:
  description:
    value: >-
      <p>You shift your posture into a neutral stance to minimize extraneous movements, allowing you to move silently,
      swiftly, and efficiently. For the duration, you gain a +1d4 bonus to Dexterity (Acrobatics) and Dexterity
      (Stealth) checks. Any movement you make and objects/surfaces you touch or impact become silent, and you leave no
      tracks or traces of your movement, becoming unable to be tracked by means other than jutsu with the Sensory
      keyword cast at a rank that exceeds the rank this jutsu was cast at.</p><p>While in combat, this jutsu requires
      concentration to maintain.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost by 3. If this jutsu is cast at C-Rank or higher, increase its duration to up to 10 minutes. If
      this jutsu is cast at B-Rank, increase the skill check bonus to 1d6. If this jutsu is cast at A-Rank or higher,
      increase its duration to up to 1 hour. If this jutsu is cast at S-Rank, increase the skill check bonus to 1d8.</p>
