system:
  description:
    value: >-
      <p>You hold your hand out to the side, performing a simple yet effective
      throw that violently flips a target creature upside down, knocking the
      wind out of them.</p><p>Once per round, when you would hit a creature with
      a melee attack, or a creature would attempt to or successfully Grapple or
      Restrain you, you can cast this jutsu to force them to make a Dexterity
      Saving Throw vs. your Martial Arts check. If you have expertise, you add
      +1d4 instead of doubling your Proficiency Bonus.</p><p>On a success, you
      knock them Prone and they become Weakened, and their attempt to Grapple or
      Restrain you fails if they had tried to do so.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost by 3. If this jutsu is cast at B-Rank, you gain a +2 bonus to the
      Martial Arts check. If this jutsu is cast at S-Rank, you gain a +3 bonus
      to the Martial Arts check.</p>
