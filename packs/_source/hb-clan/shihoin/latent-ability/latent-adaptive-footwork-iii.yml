  description:
    value: >-
      <p>(You must have <em><strong>Latent Adaptive Footwork II</strong></em> ) </p><p>Beginning at 11th level, while
      armored if your passive Martial Arts exceeds a creature's passive Insight, they cannot gain the benefits of the
      Read the Enemy skill action, or any other similar jutsu, feature, or trait that would provide them information on
      actions you take, and while unarmored the Weakened condition only reduces damage you deal by half the condition's
      listed value</p>
