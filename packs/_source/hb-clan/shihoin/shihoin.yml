  description:
    value: >-
      <h3 id="defenders-of-the-realm">Defenders of the Realm</h3><hr /><p>The Shihōin clan are a group of powerful
      spiritual combatants that wield esoteric techniques in melee combat, with members of it wielding intense power
      that impose a great pressure upon the battlefield. Merging blinding agility with unparalleled force, members of
      the clan push their bodies to the limit and past it to protect what they treasure.</p><h3
      id="shih-in-traits">Shihōin Traits</h3><hr /><ul><li><strong>Ability Score Increase:</strong> +2 to an ability
      score, +1 to any other ability score. <em>(Recommended: +2 Str/Cha, +1
      Cha/Str)</em></li><li><strong>Speed:</strong> Your base walking speed is 35 feet.</li><li><strong>Skill
      Proficiencies:</strong> You gain 2 skill proficiencies of your choice.</li><li><strong>Soul Affinity:</strong> You
      become eligible to add jutsu with one Elemental Nature Release keyword of your choice to your jutsu
      list.</li></ul>
