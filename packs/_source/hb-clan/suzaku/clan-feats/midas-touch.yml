  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Suzaku Clan, level 4+</p><p>You've
      manifested your your clan's hidden medical affinity, allowing you to blend together an understanding of
      both.</p><ul><li>You may add jutsu with the Medical Keyowrd that restores hit points, grants, temporary hit points
      or removes conditions to your jutsu list.</li><li>When creating or learning jutsu with the Fire Release or Medical
      Keyword, reduce the time it takes to compelte the task by half.</li><li>Jutsu with the Fire Release and Medical
      keyword which forces a creature to spend their hit die may instead use your hit die instead for their
      requirements.</li></ul>
