system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Suzaku Clan,</p><p>You have learned how to
      temper your flames allowing them to flicker but never die.</p><ul><li>Increase your Wisdom or Charisma score by 1,
      to a maximum of 20.</li><li>You now add your Charisma modifier to checks for maintaining concentration for jutsu
      with the fire release keyword.</li><li>Whenever you inflict the burned condition on a creature, the DC for putting
      out the flames is equal to the DC of your suzaku clan Hijutsu or 16, whichever is higher.</li></ul>
