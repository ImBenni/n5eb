  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Suzaku Clan, level 12+, Phoenix Release
      Clan Feat</p><p>You've nurtured your fragil spark into its truest form, shedding the bonds which held you
      back.</p><ul><li>Your Latent Regeneration Clan Feature now grants you temporary Hit Points equal to the full
      amount of hit points lost or the total result of any hit die expended.</li><li>When you use a jutsu with the
      Medical keyword or a jutsu with the Fire Release keyword, you may add the other keyword to the jutsu cast. You may
      only use this feature a number of times equal to your charisma modifier.</li></ul>
