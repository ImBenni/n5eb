name: Burning Bright
type: feat
_id: eCXeUqtvpenip2Cb
img: systems/n5eb/assets/content/clans/suzaku.webp
system:
  description:
    value: >-
      <ul><li>You've learned how to tap into your inner flame, which burns within all descendants of the Phoenix,
      allowing your flames to burn hotter than any sun. Beginning at 3rd level, whenever you use a jutsu with the fire
      release keyword, you may expend a hit die to fan the flames further. You may choose one of the following
      effects:</li></ul><ul><li><em><strong>Heat Raiser:</strong></em> You may inflict the burned condition on the
      creature. If they already had the condition, you may instead apply one additional rank
      instead.</li><li><em><strong>Pyromania:</strong></em> You may increase the DC of the Jutsu by 1 for every hit die
      expended.</li><li><em><strong>Measured Burst:</strong></em> You may increase the attack roll of the Jutsu by 2 for
      every hit die expended.</li><li><em><strong>Blazing Surge:</strong></em> Whenever you clash against a jutsu, you
      may gain a +2 bonus to the check for each hit die expended. You may also instead expend a hit die to add the clash
      keyword to a jutsu you use with the fire release keyword.</li><li><em><strong>Conflagration:</strong></em>
      Whenever you damage a creature using a jutsu that only targets one creature, you may cause another creature within
      10ft of them to make a dexterity saving throw against your ninjutsu DC or take damage equal to your Charisma
      modifier times your half proficiency bonus (rounded up) or no damage on a successful save. You may target an
      additional creature for every extra hit die expended.</li></ul><p>You may expend 1 additional hit die at the 7th,
      11th, 15th, and 18th levels. Finally, at 11th level, you may now choose an additional effect from your burning
      bright feature by expanding at least one hit die for both effects.</p>
    chat: ''
