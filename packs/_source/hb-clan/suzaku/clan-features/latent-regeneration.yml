system:
  description:
    value: >-
      <p>Though the Suzaku clan's true healing capabilities have long since been lost, remnants still linger within
      their blood. Beginning at 1st level, whenever you use a Suzaku Clan Feature or Hijutsu which expends a hit die or
      uses Hit points for cost, you will regain temporary Hit points equal to half of the hit points lost (rounded
      down), or half of the expended hit die (rounded down). These temporary hit points lasts until depleted or until
      you finish a long rest.</p>
