system:
  description:
    value: >-
      <p>Whispers of the true destructive might of the Phoenix exist in legends scattered throughout the elemental
      nations. You place both of your hands together and create a small mote of energy between them of raw destructive
      force. The immediate area and the land stretching for miles is assailed by a sudden heatwave as you channel your
      wrath incarnate before firing a beam leaving nothing but ash in its wake. Choose a single point within 1 mile of
      you and fire your beam causing all creatures within a 60ft radius to make a constitution saving throw. On a
      failure, they take 10d8 Fire damage and are blinded for 1d4 rounds or half as much on a success and not blinded.
      Any creature whose hit points are reduced to 0 as a result of this jutsu, are turned to ash and any objects
      including equipment of C-Rank or lower are immediately destroyed. The damage dealt by this jutsu cannot be reduced
      by any means and bypasses any resistances and immunities.</p><p><strong>At Higher Ranks</strong>: For every rank
      you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and increase the damage of this jutsu by an
      additional 3d8.</p>
