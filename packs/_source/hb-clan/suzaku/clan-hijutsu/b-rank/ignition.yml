system:
  description:
    value: >-
      <p>Calling upon your inner flame, you focus chakra upon a singular creature which you can see and unlease a
      devistating spontanious combustion. As a reaction whenever a creature affected by the burned condition takes
      damage from the condition, you ignite them causing a massive inferno to comsume them. The creature must make a
      constitution saving throw or immedietly take damage from the burned condition twice and ending the condition on
      them. On a sucessful save they only take half the damage dealt. Additionally, if a creature is reduced to 0 hit
      points by this jutsu, any creature within 5ft of them must also make a dexterity saving throw or take damage as if
      they had the burned condition of the same rank as the original target of this jutsu.</p>
