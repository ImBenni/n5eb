system:
  description:
    value: >-
      <p>You focus your blazing chakra inwards slowly amassing as your skin radiates heat and steam before releasing it
      all in a fiery explosion. All creatures within a 15ft radius of you must make a Strength saving throw, or take 5d8
      fire damage, be knocked back a number of feet based on their location prior to resolving this jutsu, and be dazed
      for one round. Creatures within 5ft of you are knocked back 10ft, and creatures within 10ft are knocked back 5ft.
      On a successful save enemies take half damage, are not knocked back nor dazed. This Jutsu ignites flammable
      objects that aren't being worn or carried.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this
      jutsu above B-Rank, increase the cost of this jutsu by 3 and increase its damage dealt by 2d8 fire damage.</p>
