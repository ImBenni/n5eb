system:
  description:
    value: >-
      <p>Molding your unique chakra, you mold a pair of flaming wings of your description on your back. While this jutsu
      is active, you gain a flying speed equal to your movement speed, your movement does not incur attacks of
      opportunity. Additionally, you can use an action to do the following;</p><p><em><strong>Bird Bomb</strong></em>:
      If you are below 60ft in the air, you hastily fly upward before diving down at breakneck speeds. Choose an area
      within 60ft of you; all creatures within 10ft of the area must make a Dexterity Saving throw or take 3d8 fire
      damage and 3d8 bludgeoning damag. Using Blazing Wings this manner ends this jutsu immediately after resolving its
      effects.-</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3. Increase your flying speed by 15ft, and for every rank you cast this jutsu above C-Rank.
      When you use Bird Bomb, increase its damage by an additional 1d8 fire and bludgeoning damage for every rank you
      cast this jutsu above C-Rank.</p>
