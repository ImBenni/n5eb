system:
  description:
    value: >-
      <p>Calling upon your inner fire, you use to harness your chakra in a regenerative manner to shed the ashes of your
      ailments. As a reaction whenever you are under the effects of any elemental condition, bleeding, lacerated,
      weakened, charm, or fear you may remove up to two ranks of the condition from you. You may only choose one of the
      following conditions.</p><p><strong>At Higher Ranks</strong>: For every rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3, and you may cleanse up to one additional rank of the conditions from
      yourself. When cast at A rank, you may now choose to cleanse the stunned or paralyzed conditions.</p>
