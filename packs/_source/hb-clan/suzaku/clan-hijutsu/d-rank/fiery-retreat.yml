system:
  description:
    value: >-
      <p>You focus your chakra in your feet causing a burst of flames propelling yourself backward. As a bonus action,
      you may gain the benefits of the disengauge action and increase your movement speed by 15.</p><p>Alternativley, as
      a reaction whenver you are targeted for an attack which you can see, you unleash a torrent of flames increasing
      your AC by 2 for the triggering attack and causing any creatures within a 10ft cone in front of you to make a
      dexterity Saving throw, or take 2d12 fire damage. On a successful save, creatures take half damage. You then
      propel yourself back up to 15ft away from the direction of your flames. This movement does not provoke attacks of
      opportunity.</p><p><strong>At Higher Ranks</strong>:For each rank you cast this jutsu above D-rank, increase the
      cost of this jutsu by 3, and increase the fire damage by 1d6, increase the AC bonus by 1 and movement speed by
      15.</p>
