system:
  description:
    value: >-
      <p>The Great Phoenix has always been synonymous with spreading warmth on all who encounter them, you took this a
      bit literally. As a reaction whenever you see an ally using a jutsu with the Fire Release Keyword, you may expend
      a hit dice to enhance their own jutsu, choosing one effect from your Burning Bright Feature to apply to
      it.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above D-rank, expend 1 additional
      hit dice and choose one additional effect to apply to the ally's jutsu. Additionally, when choosing a different
      effect you can apply the same effect more than once.</p>
