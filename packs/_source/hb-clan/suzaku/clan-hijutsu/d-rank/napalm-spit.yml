system:
  description:
    value: >-
      <p>By combining your saliva with your clan's unique chakra, you imbue it
      with fire-like properties for an unexpected assault. You fire two bolts of
      your chakra imbued saliva at a target or one for two targets. Make two
      ranged ninjutsu attacks against the target. On a hit, the target takes
      fire damage equal to 1d6+2 for each bolt. Each time you deal damage to a
      creature with this jutsu, it must make a Constitution saving throw,
      gaining the burned condition on a failed save. A flammable object hit by
      this jutsu ignites if it isn't being worn or carried.</p><p><strong>At
      Higher Ranks</strong>:For each rank you cast this jutsu above D-rank,
      increase the cost of this jutsu by 3, and increase the damage per bolt by
      1d6+2</p>
