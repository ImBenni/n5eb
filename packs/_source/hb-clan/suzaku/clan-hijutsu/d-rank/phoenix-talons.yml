system:
  description:
    value: >-
      <p>You mold your chakra in the form of fiery claws that emerge from your hands or feet, befitting your design and
      description. For the duration, your unarmed strikes deal an additional 1d4 fire damage on hit. Additionally, as a
      reaction, when you are targeted for a melee attack by a creature you can see, you may strike strike first, making
      a single unarmed strike against the creature before their attack that targetted you.</p><p><strong>At Higher
      Ranks</strong>:For each rank you cast this jutsu above D-rank, increase the cost of this jutsu by 3, and increase
      the damage bonus by 1d4.</p>
