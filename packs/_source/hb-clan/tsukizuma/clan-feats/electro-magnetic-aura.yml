system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Tsukizuma Clan, Level 12+</p><p>Through
      extensive use and training in your Sulong form, you have magnified its innate lighting release potential,
      manifesting as an protective, electromagnetic aura, rebelling metal and residual chakra. You can enter your Sulong
      form an additional time per short rest, but if you do, you gain 3 ranks of exhaustion when the transformation
      ends. While in your Sulong form, you also gain the following benefits</p><ul><li>You can select 2 additional
      Lightning Release Jutsu to become Taijutsu as part of your Sulong form Clan Feature, with one gaining the Combo
      keyword, and the other the Finisher keyword, gaining +2 Damage die when used as a Finisher.</li><li>The First
      Weapon attack or Bukijutsu attack roll that targets you per turn, is made at disadvantage.</li><li>As a Reaction
      to any Jutsu with an elemental keyword being cast within 5ft of you (Including yourself), you can reduce the
      damage die by half your proficiency bonus.You gain temporary Chakra points equal to the result of the reduced
      damage die (Does not stack with other sources of temporary chakra)</li><li>Entering your Sulong form removes all
      Mental, Physical, and Elemental conditions effecting you</li></ul>
