img: systems/n5eb/assets/content/clans/tsukizuma.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Tsukizuma Clan, Level 4+</p><p>You have
      learned to harness the electricity leaking off your attacks, allowing you to store even more of a charge in your
      enemies, giving you a degree of control over the electricity you store in them. When you cause a creature to
      become <em>Ionised</em>, choose one of the following effects to apply to them. This effect lasts until the
      creature loses the <em>Ionised</em> Condition. Starting at 12th level, you may choose a 2nd effect.</p><ul><li>The
      first time they move, they take damage equal to your unarmed damage die in Lightning damage.</li><li>Has
      disadvantage on Melee attack rolls against any anyone but you</li><li>Disadvantage on Saving throws to resist the
      <em>Shocked</em> Condition</li><li>Cannot take reactions in response to Jutsu with the <em>Lightning Release</em>
      Keyword</li></ul>
