system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Tsukizuma Clan, Any Taijutsu Stance, Level
      8+</p><p>You have begun to mix a fighting style you have studied, with a fighting style that you feel your blood
      calling you to take. Your Stance has evolved into that of the Vacuum fist, a style of fighting exclusive to those
      with the Blood of the Moon Goddess. While under the effects of a fighting stance, you also gain the following
      bonuses</p><ul><li>Increase the Range of your unarmed attacks and taijutsu by 5ft.</li><li>When you cast a
      Taijutsu that requires two or more attack rolls, you can pay 3 additional Chakra Increase the number of attacks
      made by +1. If it was one attack roll, you can instead pay 3 additional chakra to make one unarmed attack against
      one creature you are targeting, as part of the casting</li><li>Creatures you deal Unarmed Damage to are knocked
      back 5 feet in a direction of your choosing</li></ul>
