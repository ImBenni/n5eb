system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Tsukizuma Clan, Level 4+</p><p>The
      Tsukizuma clan have a close connection to animals, especially those that live and function most effectively at
      night. By studying these hunters, you have learned from them, adopting techniques to rest more efficiently, and
      making your hunting more effective. You have the following benefits</p><ul><li>You may add an additional +1d4 to
      all stealth, deception, and slight of hands checks.</li><li>Whenever you take a short rest, you can choose to
      spend additional Hit and Charka die in intervals of 2. For each 2 Die spent, you regain a use of a feature that
      only resets on a long rest.</li><li>Unless you are both blinded and deafened, you are not affected either
      condition.</li><li>You can select one Hunter Exploit from the Hunter-Nin Class. You gain access to this exploit.
      This cannot be changed. You learn one additional exploit at 12th level.</li></ul>
