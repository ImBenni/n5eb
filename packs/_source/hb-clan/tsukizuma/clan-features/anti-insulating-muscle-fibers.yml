folder: Zh819rOXwc12rS1h
name: Anti-Insulating Muscle Fibers
type: feat
_id: UbMGJdRyzw5Uwm1T
img: systems/n5eb/assets/content/clans/tsukizuma.webp
system:
  description:
    value: >-
      <p>Your Muscles are so packed with electricity, it can be seen leaking off you whenever you move, and you can
      weaponize this. Creatures you deal unarmed damage too, or fail a saving throw caused by a Taijustu you cast, are
      <em>Ionized</em> until the start of your next turn. All instances of Unarmed damage dealt to <em>Ionized</em>
      Creatures are treated as Lighting Damage for the purposes of overcoming resistances and damage reduction, and deal
      an additional 1d6 Lightning Damage. This becomes 2d6 at 7th level, and 3d6 at 15th Level</p><p>Starting at 3rd
      Level, You gain a +1 AC to your AC for every 35 ft you move each turn, until the start of your next turn. Max
      Bonus is equal to 1/2 your Proficiency Bonus (Rounded Down).</p><p>Starting at 11th Level, increase your Crit
      range when targeting <em>Ionized</em> Creatures by +1, and you may replace any Condition caused by a Taijutsu you
      cast against an <em>Ionised</em> Creature, with an equal amount of the <em>Shocked</em> Condition</p><p></p>
