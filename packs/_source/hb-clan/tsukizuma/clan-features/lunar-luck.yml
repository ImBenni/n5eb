name: Lunar Luck
type: feat
_id: yX1Zu4MsoSxuAGwL
img: systems/n5eb/assets/content/clans/tsukizuma.webp
system:
  description:
    value: >-
      <p>Members of the Tsukizuma clan are known to be incredibly lucky said to be the interference of the Moon Goddess
      in times of need, as a blessing to her descendents</p><p>Starting at 1st Level, you gain 2 Lunar Luck dice.
      Whenever you roll a d20, you can choose to store the result in your Lunar Luck Die, before knowing the consequence
      of the roll, and immediately reroll, taking the second result. For the next Minute, you can spend your Lunar Luck
      die in place of any roll of a d20 you would make, using the Number stored as if you had rolled it. If you would
      score a critical hit using this Feature, half the additional damage die. You gain additional Lunar Luck die at
      7th, 11th and 15th level. You regain all your Lunar Luck die on a Short Rest, and all Lunar Luck die you have
      remaining are lost.</p>
    chat: ''
