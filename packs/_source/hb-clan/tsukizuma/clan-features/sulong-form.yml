name: Sulong Form
type: feat
_id: RpTCc3NM6MKWG9HL
img: systems/n5eb/assets/content/clans/tsukizuma.webp
system:
  description:
    value: >-
      <p>The Moon Goddess blood flows through the veins of the Usagi, allowing them to access her power for short times,
      and entering the famed "Sulong State".</p><p>Starting at 3rd level, twice per long rest, you can enter your Sulong
      State as a Bonus action, for 1 Minute. While in this State, Your hair turns white and your skin begins to emit a
      shining glow. Your unarmed damage die becomes a 2d6, regardless of features or traits from class or clan, and
      increases your movement by +15, and AC by +1. When you enter your Sulong State, select up to 2 Lighting Ninjutsu
      you know.</p><div class="columnSplit"><p></p></div><p>For the Duration of your Transformation, one of these justu
      gains the Combo Keyword, and the other Gains the Finisher Keyword, and both lose the Ninjutsu keyword, and gain
      the Taijutsu keyword. If used as a Taijustu Finisher, this Justu gains +2 to its damage die</p><p>Starting at 11th
      Level, your unarmed die becomes 3d6, and increases your movement speed by another +15, and AC by +1. Once per
      turn, on your turn, you can spend any amount of movement to teleport that far instead. Creatures within 10 feet of
      you after you teleport must make a constitution saving throw vs your Taijustu Ability Modifier, gaining 1 Rank of
      Shocked on a fail.</p><p>Starting at 18th level, your Unarmed becomes 4d6 and increases your movement speed by a
      further +15, and AC by +1. Lighting Damage you deal ignore damage reduction and temporary Hit Points. At the end
      of the turn, you pmay spend 20 Chakra. If you do, Until the start of your next turn, as a reaction, you can take
      an additional turn. You can only do this once per short rest, regardless of how many times you transform.</p>
