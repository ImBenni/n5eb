system:
  description:
    value: >-
      <p>Select one of the Following Jutsu: <em>Graceful Cat, Forceful Bull, Rushing Lion, Wise Turtle</em>., When
      rolling Initive, you can cast this Jutsu, and if you do, you do not need to pay Concentration Cost to maintain it,
      and cannot have your concentration ended on it except by dismissing it, or falling Unconscious. You may use this
      Feature twice per rest. You can change which Jutsu you can cast using this Feature after you Finish a long
      Rest.</p><p>Starting at 7th Level, may upcast these Jutsu, using the upcasting table listed at the bottom of the
      Tsukizuma Clan.</p><p>Starting at 15th level, these Jutsu no longer require concentration, and their Duration
      becomes 10 minutes.</p><img src="systems/n5eb/assets/content/cheat-sheets/hb-wild-nature-upcast-table.webp" />
