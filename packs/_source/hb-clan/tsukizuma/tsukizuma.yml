  description:
    value: >-
      <h3 id="the-moon-goddesss-children">The Moon Goddess's Children</h3><p>The Tsukizuma clan are a homebrew clan
      created by Shanas, to provide players with more options for Taijutsu and Lightning Release focused clans. The
      Tsukizuka has myths of their Origin, a Man from the Land of Lighting who caught the attention of the Moon Goddess
      after he rescued her in the form of a Rabbit in the mountains. Their children were born with her blessing,
      manifesting powerful lightning release and animal-like traits. But despite this divine origin, most Tsukizuka are
      Easy-Going, if a bit rowdy, and most enjoy life in the lowland of the Land of Lightning, tending to farm and
      enjoying a simple life. Those that take up the path of the Shinobi, however, are known to put the fear of the
      Goddess into any unfortunate enough to fight them.</p><h4 id="tsukizuma-traits">Tsukizuma
      Traits</h4><p><strong>Ability Score Increase:</strong> +2 Str or Dex, +1 Dex or Wis (You Cannot pick Dex for
      Both)<br /><strong>Speed:</strong> Your Base walking speed is 35 Feet<br /><strong>Skill Proficiencies:</strong>
      Pick 2 of Nature, Survival, Perception<br /><strong>Nature Affinity:</strong> You have a Lighting Affinity, and
      can Learn Jutsu with the Lighting Release Keyword<br /><strong>Enhanced Senses:</strong> Your Enhanced senses have
      granted you 30ft of Blindsight.</p>
