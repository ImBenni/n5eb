name: Bear Fist Expert
type: feat
_id: acLkISqCUWaO4Vv9
img: systems/n5eb/assets/content/clans/ursari.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu <br /><strong>Prerequisite:</strong> Bear Fist Stance, Level 8+ <br />You
      have trained under the teachings of the Land of Bears either directly or by descension, gaining the following
      benefits;</p><ul><li>Increase your Strength or Dexterity score by 1, to a maximum of 20.</li><li>While you are in
      the <em><strong>Bear Fist Stance</strong></em>, you unarmed damage die becomes a d8.</li><li>You gain a +1d6 bonus
      to Grapple contests and impose a -2 penalty against checks and saving throws made from creatures attempting to
      escape a grapple from you.</li><li><p>Taijutsu you know that requires the <em><strong>Bear Fist
      Stance</strong></em> to be cast, and up to two additional Taijutsu that you know, that imposes a saving throw on
      creatures become <em><strong>Bear Fist Taijutsu</strong></em>. <em><strong>Bear Fist Taijutsu</strong></em> you
      cast gain the <em><strong>Usari Wrath</strong></em> trait.</p><ul><li><em><strong>Usari Wrath.</strong></em> On a
      failed save, cause targets to be placed under the effects of the <em><strong>Bear Fist Stance's</strong></em>
      intimidation ability (you choose which effect occurs for each creature). Additionally, creatures that fail are
      knocked back 10 feet.</li></ul></li></ul>
