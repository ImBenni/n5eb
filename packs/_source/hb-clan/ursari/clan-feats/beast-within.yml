system:
  description:
    value: >-
      <ul><li><strong>Category:</strong> Clan</li><li><strong>Prerequisites:</strong> Ursari Clan 4+</li></ul><p>You
      untether a mighty beast within, unleashing your power beyond its max.</p><ul><li>Increase your Strength or
      Constitution score by 1, to a max of 20.</li><li>When you roll initiative and don't have any uses of
      <strong>Grizzly Endurance</strong> left, you regain 1 use but the die becomes a d4.</li><li>Whenever you are
      reduced to 0 hit points by hostile damage, you can make a Constitution saving throw. The DC for this saving throw
      is equal to half the damage taken, or 10, whichever is higher. On a success, you are reduced to 1 hit point
      instead and gain 1 rank of Exhaustion. Each time you use this, increase the DC by 5 until your next full
      rest.</li></ul>
    chat: ''
