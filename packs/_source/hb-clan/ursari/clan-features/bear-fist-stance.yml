folder: 7WbmVVqjTB6dRT9s
name: Bear Fist Stance
type: feat
_id: toCLwaRrULIPPAoC
img: systems/n5eb/assets/content/clans/ursari.webp
system:
  description:
    value: >-
      <p>Also at 1st level, Ursari clan members boast a unique style of taijutsu, one that utilizes great ferocity and
      posturing.</p><ul><li>Your Unarmed damage die becomes a d6 while not wielding a weapon in either
      hand.</li><li>While in this stance, you gain the Grapple weapon property if you weren't already benefiting from
      it.</li><li>When you take the attack action, you can forgo an attack to instead intimidate a target. The target
      must succeed a Wisdom saving throw against your Taijutsu Save DC, or gain one of the following effects; You can
      choose to use your Charisma modifier instead of your Taijutsu ability modifier to calculate your Taijutsu Save DC
      for this ability. Once a target is affected by this ability it cannot be affected by it again for the next
      hour.</li></ul><p><strong>Apex Might.</strong> You rise to match your enemy's strength. You have resistance to the
      damage of the next attack the target makes until the end of your next turn.</p><p><strong>Cower in Fear.</strong>
      You compel the target to flee in fear from you. It must use its action next turn to dash in the opposite direction
      of you.</p><p><strong>Tremble in Fear.</strong> It gains ranks of Fear equal to half your Strength or Charisma
      modifier (rounded down) until the end of its next turn.</p><p><strong>Predator's Pride.</strong> You have
      advantage on your first attack roll against the target until the end of your next turn.</p><p>At 7th level, the
      grizzly might of your Ursari power bear's its true claws; while in this stance you gain a +2 bonus to unarmed
      damage and strength checks. This becomes a +3 at 11th, and a +4 at 18th level.</p>
