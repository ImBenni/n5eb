system:
  description:
    value: >-
      <p>Starting at 3rd level, your thick skin and barbearic stamina allows you to shrug off lethal blows. As a
      reaction when you take any damage except psychic, you can reduce that damage by 2d10 + your Character Level. This
      feature can be used once per rest. Alternatively, when you are forced to make a Strength or Constitution save, you
      can expend a use of this feature to roll a 1d10 and add half to the result.</p><p>At 11th level, you also gain
      resistance to the triggering damage until the start of your next turn. This feature can be used twice per
      rest.</p><p>Finally, at 18th level, this damage reduction cannot be ignored by any means. Additionally, you also
      gain temporary hit points equal to the amount rolled. While you have these temporary hit points, you also have
      resistance to the triggering damage.</p>
