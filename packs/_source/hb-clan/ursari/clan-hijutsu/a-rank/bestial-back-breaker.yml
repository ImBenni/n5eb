folder: gQWKWobhSilkAUdz
name: Bestial Back-Breaker
type: spell
_id: v2qTK9vkA6oFMD41
img: systems/n5eb/assets/content/clans/ursari.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Bear Fist
      Stance</strong></em>. This jutsu can only be cast as a Finisher.</p><p>With all your terrific and unearthly
      strength, you hoist a creature you have grappled or restrained above your head. A chanting chorus of roars
      encircles you ominously as you bring the creature swiftly down on your knee, striking its spine with ferocious
      chakra. You deal double your Unarmed damage and the target must make a Constitution saving throw. On a failure, it
      takes 8d10 bludgeoning damage, gains two ranks of Slowed and Weakened, and becomes Stunned for 1 minute. On a
      success, a target takes half damage and gains 1 ranl of Slowed and Weakened for 1 minute.</p><p>A creature can
      repeat the save at the end of each of its turns. If a creature fails its initial save by 5 or more against this
      jutsu, it perpetually suffers its ranks of Slowed and Weakened until healed by a Medical jutsu of A-Rank or
      higher.</p><p>If the creature you target with this jutsu is also the target for your <em><strong>Bear Fist
      Stance's</strong></em> <em><strong>Apex Might</strong></em> or <em><strong>Predator's Pride</strong></em> feature,
      it suffers a penalty to this saving throw equal to half the result of 1 die's worth of your unarmed damage
      die.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the cost of
      this jutsu by 3 and increase the damage by 2d10.</p>
