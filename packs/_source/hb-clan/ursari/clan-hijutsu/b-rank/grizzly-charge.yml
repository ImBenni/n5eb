name: Grizzly Charge
type: spell
_id: OgMC14C8cgECPseN
img: systems/n5eb/assets/content/clans/ursari.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Bear Fist
      Stance</strong></em>.</p><p>Glowing bear claws of chakra manifest over your hands and feet as as you snarl
      wickedly. As part of casting this jutsu, you can move up to 30 feet in the direction of your target. The target
      makes a Strength saving throw, falling prone on a failure, on a success it is not knocked prone. Then make two
      melee taijutsu attacks against the same target. On each hit, you deal your unarmed damage + 3d8 slashing. If you
      reduce the target to 0 hit points, you can move up to half your speed and make a one more taijutsu attack against
      a target in reach. If the creature you target with this jutsu is also the target for your <em><strong>Bear Fist
      Stance's</strong></em> <em><strong>Apex Might</strong></em>, <em><strong>Tremble in Fear</strong></em>,
      <em><strong>Predator's Pride</strong></em> feature, on each hit, you instead deal your unarmed damage + 3d10
      slashing and the target must make a Wisdom saving throw, gaining 1 rank of Fear against you on a failed
      save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3, and increase the damage of each attack by 1d8.</p>
