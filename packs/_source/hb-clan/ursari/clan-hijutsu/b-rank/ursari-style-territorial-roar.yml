name: Ursari-Style Territorial Roar
type: spell
_id: RwOnX1Uh275BDcWq
img: systems/n5eb/assets/content/clans/ursari.webp
system:
  description:
    value: >-
      <p>Gathering chakra in your lungs and throat, you release a chilling roar that stumbles and frightens your
      enemies. All hostile creatures to you within a 120 ft. radius that can either see or hear you make a Wisdom saving
      throw. You may use Strength in place of Intelligence as your ninjutsu ability when casting this jutsu. A creature
      that fails this save gains three ranks of Fear for 1 minute, repeating the save at the end of each of its
      turns.</p><p>While a creature has these ranks of Fear and you are within line of sight, it cannot willingly move
      closer to you and cannot gain advantage by any effects. A creature that fails the initial save by 5 or more is
      Stunned until the end of its next turn. You gain 2 Temporary Hit Points and Chakra Points for every target that
      fails this saving throw as you feed on the fear surrounding you.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, and the ranks of Fear inflicted by
      1.</p>
