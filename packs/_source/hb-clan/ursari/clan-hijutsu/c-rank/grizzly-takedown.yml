system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the Bear Fist Stance. You raise your mighty
      fists to subdue an enemy. Make a melee taijutsu attack. On a hit, you deal your Unarmed damage + 2d10 and the
      target must succeed a Strength saving throw. On a failed save, the creature becomes Grappled by you. If the save
      failed by 5 or more, it instead is Restrained by you.</p><p>If the creature you target with this jutsu is also the
      target for your Bear Fist Stance's Apex Might or Predator's Pride feature, this attack deals a critical hit on a
      19-20.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu Finisher regardless
      of range, once per turn, using either an Action or Bonus Action, ignoring its listed casting time.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by
      1d10.</p>
