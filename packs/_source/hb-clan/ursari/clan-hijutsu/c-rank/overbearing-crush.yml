system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Bear Fist
      Stance</strong></em>.</p><p>You bear all your crushing strength into squeezing the life out of a creature in your
      grasp. You deal your Unarmed damage, and the creature must make a Strength saving throw. On a failed save, the
      target gains 1 rank of Bruised. On a success, it suffers no additional effect</p><p>If the creature you target
      with this jutsu is also the target for your <em><strong>Bear Fist Stance's</strong></em> <em><strong>Apex
      Might</strong></em> or <em><strong>Predator's Pride</strong></em> feature, it suffers a penalty to this saving
      throw equal to half the result of 1 die's worth of your unarmed damage die.</p><p>If this jutsu is used as a
      <em><strong>Finisher</strong></em>, this jutsu deals double your unarmed damage. On a failed save, the target
      becomes Dazed in addition to its rank of Bruised and it is unable to speak or hold its breath for the next
      minute.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and the ranks of Bruised inflicted by +1.</p>
