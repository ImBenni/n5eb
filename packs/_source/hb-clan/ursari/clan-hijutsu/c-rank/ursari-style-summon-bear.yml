system:
  description:
    value: >-
      <p>When you cast this jutsu you can create up to 2 Ursari Grizzlies at once costing 10 Chakra per bear. No more
      than two bears can be summoned at one time. Ursari Grizzlies act as part of your turn as a bonus action. You can
      command each Bear to perform up to 1 Action and 1 Move action each. If a bear has not received a specific command,
      then it defends itself to the best of its ability. When a Ursari Grizzly is summoned, it disappears after 1 hour
      or until it reaches 0 hit points. Refer to the <strong>Ursari Grizzly</strong> stat block for use.</p>
