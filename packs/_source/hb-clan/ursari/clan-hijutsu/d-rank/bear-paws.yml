system:
  description:
    value: >-
      <p>You focus chakra into your hands and feet turning them bear-like. For the duration of this jutsu you gain the
      following benefits:</p><ul><li>Increase your Unarmed damage die by 1 step
      (d4&gt;d6&gt;d8&gt;d10&gt;d12).</li><li>You add +1d4 to Strength-based checks and saves.</li><li>For the duration
      of this jutsu, you ignore difficult terrain and your wall walking, water walking, and climbing speed becomes equal
      to your movement speed.</li><li>Tracks you leave behind appear identical to that of a bear's. A successful Ninshou
      check against your Ninjutsu save DC determines they are unnatural and the product of transformation jutsu.
      Otherwise, any trail you leave behind is indistinguishable.</li></ul>
