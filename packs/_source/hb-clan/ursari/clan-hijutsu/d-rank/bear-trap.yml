img: systems/n5eb/assets/content/clans/ursari.webp
system:
  description:
    value: >-
      <p>As you prepare a trap to be sprung, you infuse its mechanism with chakra to increase its effectiveness. This
      jutsu's casting time equals how long it takes to prepare the trap being used as a component. The chakra poured
      into the trap lasts for 24 hours. When the trap is activated during the duration of this jutsu, it gains an
      additional effect: the trap deals damage equal to double your unarmed attack, and its DC gains a bonus equal to
      your Strength Modifier. If the trap was a restraining trap, the target must make a Constitution save or gain a
      rank of Slowed. If the trap was a weapon trap, its damage is chakra-enhanced and also deals chakra damage equal to
      half the trap's total damage</p>
    chat: ''
