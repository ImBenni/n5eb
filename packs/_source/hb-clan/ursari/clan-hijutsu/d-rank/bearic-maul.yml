system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Bear Fist
      Stance</strong></em>. You do not add your ability modifier to your unarmed damage with this jutsu.</p><p>Primal
      fury consumes your mind in the moment as you make a mad dash at your prey. As part of casting this jutsu you can
      move up to 20 feet then make three melee taijutsu attacks against a target in reach. On each hit, you deal your
      unarmed damage + 1d4 slashing. If at least one of these attacks hit then the target must make a Constitution
      saving throw, gaining 1 rank of Bleeding on a failed save.</p><p>If the creature you target with this jutsu is
      also the target for your <em><strong>Bear Fist Stance's</strong></em> <em><strong>Apex Might</strong></em> or
      <em><strong>Predator's Pride</strong></em> feature, on each hit, you instead deal your unarmed damage + 1d6
      slashing and the target must make a Constitution saving throw for each successful hit, gaining 1 rank of Bleeding
      on a failed save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3 and the number of taijutsu attacks by +1.</p>
