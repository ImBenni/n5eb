name: Ursari-Style Territorial Sense
type: spell
_id: VtMRS0IcFMleo5Vv
img: systems/n5eb/assets/content/clans/ursari.webp
system:
  description:
    value: >-
      <p>You pool chakra into your sense of smell and hearing, enhancing your naturally perceptive abilities. You know
      the general location of all creatures with chakra in a 1-mile radius of you.</p><p>While tracking creatures with
      chakra, you also learn their exact number, their sizes, a general threat assessment (easy, medium, or deadly
      target), and how long ago they passed through an area. You cannot be surprised by creatures you are tracking.
      While outside of combat, you do not pay the chakra cost of maintaining this jutsu.</p><p>You can sense the exact
      location of creatures within 60 feet of you, and they cannot benefit from being hidden from you.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the
      long range chakra sense increases by 1-mile per rank, and the short range sense increases by 30 feet per rank.</p>
