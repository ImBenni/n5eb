  description:
    value: >-
      <h3 id="grizzly-warriors">Grizzly Warriors</h3><p>The Ursari are a shinobi clan originating from the Land of
      Bears. Proud and reclusive, they are often mistaken for barbarians or tribesmen rather than honorable shinobi.
      Nonetheless, the Ursari take great pride in being the strongest clan in their country. Much like the Inuzuka clan
      of Konohagakure, the Ursari share a profound bond with bears of all kinds. It is even speculated that the head of
      the Ursari Clan is a Sage Beast bear in disguise.</p><h4 id="ursari-traits">Ursari Traits</h4><hr
      /><ul><li><strong>Ability Score Increase:</strong> +2 Str, +1 Con or Cha</li><li><strong>Speed:</strong> Your base
      walking speed is 30 feet.</li><li><strong>Skill Proficiencies:</strong> Athletics,
      Intimidation</li><li><strong>Ursari Clan Jutsu:</strong> You know 1 additional Ursari Clan D-Rank Jutsu, this does
      not count against your jutsu known.</li></ul>
