system:
  description:
    value: "<p>Category:\_Clan<br />Prerequisite:\_Walker Clan, level 12+<br />Through many weeks of practice your proficiency with your Sword of Exorcism has brought about a greater efficiency and new methods with which to attack with it. You gain the following benefit;</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Your Sword of Exorcism gains the thrown (45/90) and returning properties.</li><li>If at the beginning of your turn while your Sword of Exorcism is summoned you would not have it in your hand you can pay 1 chakra to instantly teleport it to you.</li><li>You reduce the activation and per turn cost of the Sword of Exorcism by 1.</li><li>Once per rest when you would use the Sword of Exorcisms chakra damage function you can instead choose to do 100% of the original damage in chakra damage instead of 50%.</li></ul>"
