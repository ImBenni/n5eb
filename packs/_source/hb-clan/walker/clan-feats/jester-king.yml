system:
  description:
    value: "<p>Category:\_Clan<br />Prerequisite:\_Walker Clan, level 8+<br />Your control over and synchronization rate with Crown Clown have both increased significantly bringing out a much higher potential. You gain the following benefit;</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Crown Clowns health is now calculated as 4 times your character level.</li><li>Crown Clown is now proficient in all skills that you are.</li><li>Cross Grave (Crown Shield) and Cross Grave (Crown Guard) now grant you a bonus to saving throws equal to half your con mod (rounded up) for the duration.</li><li>The first time per round that a creature under the effects of Cross Grave (Crown Shield) would be affected by a hostile area of effect they cause a 5ft wide line originating from themself aimed the opposite direction of the center/point of origin of the area of effect to be excluded from the area. If the area of effect does not have a center/point of origin this feature doesn't work against it.</li><li>You can now pay 7 chakra to use Cross Grave (Crown Shield) if you would be out of uses.</li></ul>"
