system:
  description:
    value: "<p>Category:\_Clan<br />Prerequisite:\_Walker Clan<br />Your body has adapted even further to the presence of your Innocence (Cross). You gain the following benefit;</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>You can now calculate both athletics and acrobatics by constitution.</li><li>You may now scale your jump height and carrying capacity by constitution.</li><li>Your speed increases by 5 feet.</li><li>You increase your hit points by total by 1 per your level. Every time thereafter each time you gain a level, increase your hit point total by 1.</li></ul>"
