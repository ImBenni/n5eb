system:
  description:
    value: "<p>Category:\_Clan<br />Prerequisite:\_Walker Clan, level 16+<br />You gained a long used tool of the Noah clan, The Ark, a tool capable of surviving the world ending disasters. You gain the following benefit;</p><ul><li>You gain The Ark which is a pocket dimension that is your proficiency bonus times 1000ft across and when you first gain this feature or The Arks space would increase you can decide what its interior is like filling it with any simple structures or landscape. The Ark can have a number of entrances equal to your proficiency bonus which you can place one of once per full rest. If you would attempt to place an entrance while at your maximum you may choose one of the previously set entrances to erase in order to place the new one. Whenever you are at an entrance to The Ark or inside of it you can choose to leave it open or close. It takes 10 minutes in order to place a new door to The Ark and one minute to open or close or open an individual entrance.</li></ul>"
