folder: p6sGtHlr8nX3y3Go
name: Crown Clown
type: feat
_id: OPycQxEJGzAm8R9O
img: systems/n5eb/assets/content/clans/walker.webp
system:
  description:
    value: >-
      <p>Some will gain this power due to a need for more power or perhaps their Innocence (Cross) was pushed too far
      and destroyed in the process, regardless the Crown Clown is what happens when a member of the Walker clan is
      forced to reforge and remake their arm. The Crown Clown is an entity you control but is also a manifestation of
      your Innocence (Cross)s power. At 7th level you gain the Crown Clown which you can summon as a free action on your
      turn and it can be manifested for a total of 10 minutes per long rest. Regardless of the number of rounds that it
      remains active, you spend 1 minute of this limit per activation. Your Crown Clown has two states and when you
      summon it you can choose which state it is in and you can switch its state as a bonus action. Crown clowns first
      state is its free spirit state, while in this state it has one action and reaction but it cannot cast any jutsu
      and while in combat its turn is always taken either during or directly after yours. If Crown Clown would ever
      reach zero hit points while in its free spirit state It is immediately unsummoned and cannot be summoned into its
      free spirit state again until it has hit points again. Crown Clown regains all missing hit points at the end of a
      short rest and if when you would summon Crown Clown it would have less than its maximum hit points you may expand
      a hit dice rolling it adding your constitution modifier granting it that many hit points. Crown clowns second
      state is its Masquerade state, while in this state you are cloaked in Crown Clown itself and you gain the
      following benefits while it is in this state: You gain a + 1 to AC and all saving throws. This becomes a +2 at
      15th level.</p><ul><li>You gain the same senses that Crown Clowns free spirit state has.</li><li>You gain the
      Clown Belt and Clown Belt Movement features from Crown Clowns free spirit state.</li><li>You increase your
      movement speed by 5 times your proficiency bonus.</li><li>You gain access to all of Crown Clown (Free spirit)s
      actions.</li><li>Crown Clowns hit points now act as a secondary source of hit points for you. When a creature
      would hit you you can choose to have instead hit Crown Clown, if the damage would exceed Crown Clowns remaining
      hit points you take the remaining damage.</li><li>At 11th level you gain an additional action for the duration
      which can only be used to do something crown clown could do except for the dodge action.</li><li>At 11th level you
      gain a flying speed equal to your movement speed.</li><li>At 15th level all weapons granted by the Walker Clan
      gain +1 dice.</li><li>At 18th level Crown Clowns hit points have resistance to all damage from Aberrations,
      Celestials, Demons, Otsutsuki and Monstrosities.</li></ul>
    chat: ''
