folder: p6sGtHlr8nX3y3Go
name: Cursed Eye
type: feat
_id: nDv05M8OzemLVmpr
img: systems/n5eb/assets/content/clans/walker.webp
system:
  description:
    value: >-
      <p>Whether it be through a curse, a forced operation or a tragic accident this eye always seems to be gained under
      terrible circumstances but no matter how it's been it always seems to be a part of the Walker clan. Also at 1st
      level you must designate one of your eyes to become your cursed eye, when you do this a permanent tattoo like mark
      appears around it. Once you gain this ability you are automatically alerted when Aberrations, Celestials, Demons,
      Otsutsuki or Monstrosities would be within 60 feet of you and you now count as having true sight towards those
      creature types for the purposes of seeing through invisibility and seeing their true forms though this does not
      leave you blind to their disguises instead you see their true form float in the air behind them. At 7th level you
      are now automatically alerted when Aberrations, Celestials, Demons, Otsutsuki or Monstrosities would be within
      1000 feet of you and you now gain advantage on checks made to find creatures of those types within this area.
      Additionally at 7th level once per long rest you can grant an allied creature Within 10 feet of you the benefits
      of this eye up to 1st level for 10 minutes.</p><p><br /></p>
