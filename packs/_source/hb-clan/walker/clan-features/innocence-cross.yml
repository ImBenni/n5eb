name: Innocence (Cross)
type: feat
_id: bFATKFQqlBCmHdKo
img: systems/n5eb/assets/content/clans/walker.webp
system:
  description:
    value: "<p>Your innocence weapon has finally reached a combat ready state. Starting at 3rd level you designate one of your arms as your Innocence(Cross), when you do this the chosen arm takes on a unique inhuman looking appearance. As an object interaction on your turn you can choose to transform your Innocence(Cross) into one of its several combat forms:</p><p>Cross α (alpha):\_Your Innocence (Cross) takes the form of a larger armored and clawed hand. It has the following statistics: Cross α (alpha), 1d10, Slashing, Reach 1, Grapple, Trip, Disarm, Multiattack, Unarmed, Blocking, Blade. At the end of your turn you can choose to defend one creature within 5 feet of you until the beginning of your next turn you lose the benefits of this weapons blocking property instead granting it to the creature you have chosen to defend so long as they remain within 5 feet of you. At 11th level this weapon gains the critical property, another rank of the reach and blocking property and its damage becomes 2d6.</p><p>Cross β (beta):\_Your Innocence (Cross) takes the form of an energy firing cannon. It has the following statistics: Cross β (beta), 2d4, Force, Range (60/120), Deadly, Multiattack, Tactical, Blade. At 11th level this weapon gains the critical property, another rank of the Deadly property, its range becomes Range (90/180) and its damage becomes 2d6.</p><p>Cross Spear:\_The end of your Innocence (Cross) takes the form of an energy sword. It has the following statistics: Cross Spear, 2d6, Force, Deadly, Multiattack, Critical, Reach 1, Blade. At 11th level this weapon gains the blocking property, another rank of the Critical property and its damage becomes 2d8.</p><p>After the initial activation you can change its form once per turn as a free action. Weapon attacks, unarmed attacks, taijutsu and bukijutsu that use this weapon as well as all Walker Clan hijutsu may use constitution for attack, damage and save DC's calculations. Your Innocence (Cross) can be imbued with weapon seals and has a number of slots equal to your proficiency bonus.</p><p><br /></p>"
