name: Noah
type: feat
_id: xBtMgW1PHcHdd5GK
img: systems/n5eb/assets/content/clans/walker.webp
system:
  description:
    value: "<div><div><p>You realize there is a second personality dwelling within your mind but this is not split personality disorder no this is an entirely different person, a Noah which is a being from centuries ago which is attempting to reincarnate into your body. Despite this you have managed to take control of the situation and now have something of a symbiotic relationship with the Noah. Starting at 15th level you gained a second consciousness within you known as a Noah. The Noah has its own mental ability scores and proficiencies. It uses your Proficiency Bonus, mental ability score values and number of mental skill proficiencies for its own. When you first gain this feature, you select which of your mental ability score values will act as its ability scores, and which mental skill proficiencies it acquires. A number of times equal to your constitution modifier when you would attempt to do anything that would require a mental ability score you can\_utilize your Noah\_and choose to use the Noah's instead, you regain half (Rounded up) of your uses of this feature on a short rest and all on a long rest.<br />Additionally as a free action on your turn you can spend 3 charges of your Noah feature to enter your\_Noah form\_as you synchronize yourself with the Noah. This form lasts for one minute during which you have the following benefits:</p><ul><li>You may swap to your Noah's mental ability scores and skill proficiencies for the duration. For the duration of this form you can spend a bonus action to swap between yours and the Noah's mental ability scores and between yours and the Noah's mental ability scores and proficiencies skill proficiencies. If you would be using the Noah's ability scores and attempt to utilize your Noah you instead treat your normal ability scores and proficiencies as the Noah's for the sake of this feature.</li><li>You regain half your level in HP at the beginning of your turns.</li><li>All Walker clan features that would deal damage can now deal necrotic damage instead.</li><li>When you gain this feature you select one jutsu of each rank that can deal necrotic damage, you can cast the selected jutsu while in your Noah form so long as you could already cast jutsu of that rank. You do not need to meet any keyword prerequisites except for hijitsu for the jutsu you select with this feature.</li></ul></div></div><div><div><ul><li>While below 50% HP you reduce the cost of jutsu you cast by one per their rank (This can only stack with one other form of cost reduction).</li><li>You become immune to poison damage.</li><li>For the duration of this form you count as an Aberration, Celestial and Otsutsuki.</li></ul><p>You can deactivate this form as a free action on your turn.</p></div></div>"
