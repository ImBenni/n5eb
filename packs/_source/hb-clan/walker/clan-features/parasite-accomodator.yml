system:
  description:
    value: >-
      <p>Although you have yet to fully unlock your innocence weapon, the effects of it being a part of your body are
      already visible and distinguish your physical abilities as above those of normal people. Starting at 1st level
      Increase your Hit Point total by 1. Every time thereafter each time you gain a level, increase your hit point
      total by 1. Additionally you can now scale either athletics or acrobatics by constitution (You cannot change this
      choice once it has been made).</p>
