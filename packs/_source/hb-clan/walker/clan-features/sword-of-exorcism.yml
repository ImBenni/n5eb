name: Sword of Exorcism
type: feat
_id: xbPOqKewLTisrfna
img: systems/n5eb/assets/content/clans/walker.webp
system:
  description:
    value: >-
      <p>Your proficiency with your Innocence (Cross) has exceeded what was thought to be your 100% and has granted you
      the ability to transform it into the sword of exorcism a broadsword with a cross emblazoned on the faces of the
      blade that is designed for combating demons and other such creatures. Starting at 11th level you gain the Sword of
      Exorcism which you can summon on your turn for 5 chakra as an object interaction by transforming the arm you
      selected with Innocence (Cross) into it. You must pay 3 chakra at the start of every turn that your Innocence
      (Cross) is in this form. The Sword of Exorcism has the following statistics: Sword of Exorcism, 2d10, Slashing or
      Force, Deadly, Blocking, Critical, Heavy, Reach 1, Blade. Weapon attacks and jutsus that use your Sword of
      Exorcism can always careful cast around any non Aberrations, Celestials, Demons, Otsutsuki or Monstrosities, it
      can Interact with any non physical creatures such as ghosts or phantasms, It can be used in place of Cross Spear
      for any Walker clan hijutsu, it can use constitution for the heavy property and it counts as your Innocence
      (Cross) and an odachi for the sake of interacting with features and jutsus. Additionally a number of times per
      rest equal to your constitution modifier when you would deal damage with this weapon you can deal additional
      damage as chakra damage equal to half the original damage, You do not need to expend the use of this feature to
      activate it when you would deal damage to a Aberrations, Celestials, Demons, Otsutsuki or Monstrosity.</p><p><br
      /></p>
