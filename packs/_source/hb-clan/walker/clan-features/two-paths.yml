system:
  description:
    value: "<p>Some focus on their powers as a Noah vessel to become a true Noah, others focus on honing their Innocence (Cross) in order to become the greatest exorcist, regardless it is now when you must choose which path you will walk. Starting at 18th level select one of the following abilities:</p><p>The 14th Noah:\_You hone your powers as a Noah vessel to the point that you have now reached a permanent synchronization with them. Starting at 18th level your Noah form no longer costs anything to activate and its duration becomes until deactivated.</p><p>Black order general:\_Your powers as an accommodator have reached levels only matched by one of the great generals. Starting at 18th level the Sword of Exorcism no longer costs chakra to activate or maintain and the additional action granted to you by Crown Clowns Masquerade state can now be utilized to cast a Walker clan hijutsu of one rank lower than what you could normally cast.</p>"
