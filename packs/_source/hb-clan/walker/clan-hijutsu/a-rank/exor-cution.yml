system:
  description:
    value: "<p>You make a single unwavering strike against your foe with the intent to destroy all evil in your path and the power to decimate your opponent not just physically but also spiritually. Make a melee Taijutsu attack against a creature within range dealing your weapons damage + 10d8 and force them to make a constitution saving throw gaining a rank of slowed on a failure and nothing on success. Additionally creatures hit by this jutsu take an amount of spirit damage equal to 20% of the damage rolled with this jutsu. Spirit damage is dealt to an affected creature's chakra pool and is dealt to all special class mod based chakra-like resources such as sage chakra, dark chakra, light chakra and draconic chakra. If a creature's class mod would instead use a charge based system for casting class mod arts they instead lose one charge.<br />If this jutsu is cast as a Chain 2, you the amount of spirit damage to 25%. If this jutsu is cast as a Chain 3 the damage dice of this jutsu become d10s.<br />At Higher Ranks:\_For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and damage by 2d10. If this jutsu is cast at S-Rank you roll damage an additional time taking the highest result against Aberrations, Celestials, Demons, Otsutsuki and Monstrosities.</p>"
