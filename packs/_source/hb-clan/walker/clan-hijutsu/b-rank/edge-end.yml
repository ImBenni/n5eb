  description:
    value: "<p>You focus all your energy into a single finger pointing it at the top of a creature's head and then drawing a line downwards which after which the line will erupt with energy seeking to annihilate your foe. Make a melee Taijutsu attack, dealing your weapons damage + 7d10 and the target must make a constitution saving throw gaining 2 ranks of weakened on a field save and one rank on a success. If a creature hit with this jutsu is an Aberration, Celestial, Demon, Otsutsuki or Monstrosity they gain a number of ranks of sealed equal to the ranks weakened they would gain.<br />At Higher Ranks:\_For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, damage by 2d10 and ranks of weakened by 1.</p>"
