system:
  description:
    value: "<p>Using your Innocence (Cross) you etch a cross into your foe leaving it to erupt with energy. Make a melee taijutsu attack dealing your weapons damage +3d10 and damage from this jutsu instantly kills any minions classified as Aberrations, Celestials, Demons, Otsutsuki or Monstrosities.<br />Additionally you can choose to delay the damage until the start of the affected creatures next turn, however if they would no longer be in the space they were in when hit with Engrave they avoid the damage. Doing this grants this jutsu additional damage equal to 1 dice per its rank (C-Rank: +2, B-Rank: +3, A-Rank: +4, S-Rank: +5).<br />At Higher Ranks:\_For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and damage by +2d10. If this jutsu is cast at A-Rank and you choose to delay the damage the insta kill effect will then also work on standards below 50% HP of the same classifications.</p>"
