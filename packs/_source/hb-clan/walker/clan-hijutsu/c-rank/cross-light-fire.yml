system:
  description:
    value: "<p>Your Cross β (beta) grows to size similar to that of a cannon and then builds up and releases a massive amount of purifying energy. Creatures within the area must make a dexterity saving throw or take your weapons damage damage +4d8 and gain a rank of Dazzled until the end of their next turn on a failed save and half as much damage and no conditions on a success.<br />This jutsu has 2 range options which you can pick between when casting it. Pick between 90 foot long 5 foot wide line or 45 foot long 10 foot wide line.<br />At Higher Ranks:\_For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, damage by 2d8 and length of the area by 10ft for the first option and 5ft for the second. If this jutsu is cast at A-Rank they gain 2 ranks of dazzled on a failed save.<br /></p>"
