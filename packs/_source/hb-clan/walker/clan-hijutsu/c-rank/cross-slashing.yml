system:
  description:
    value: "<p>You make two swift strikes with your Cross Spear one vertical and one horizontal ending in the shape of a cross. Make two melee taijutsu attacks dealing your weapons damage damage +2d6.<br />Both attacks are treated as being made simultaneously meaning all effects that would only apply once per turn or jutsu applied to both of these attacks and all damage is treated as one instance.<br />If you would have already casted a chain jutsu this round, this jutsu's casting time becomes a bonus action. If this jutsu is cast as a Chain 2, you can cast a Chain X jutsu as a bonus action this turn. If this jutsu is cast as a Chain 3 the target creature gains a rank of dazzled if you hit with both attacks.<br />At Higher Ranks:\_For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and damage of both attacks by +2d6.</p>"
