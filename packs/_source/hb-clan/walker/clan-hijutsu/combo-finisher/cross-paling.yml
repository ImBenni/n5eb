  description:
    value: "<p>You fire off a volley of energy palings with your Innocence (Cross). Make 2 ranged taijutsu attacks against any creatures in range dealing your weapons damage +1d6 and for every two hits you land with this jutsu on a single creature they gain 1 rank of bleed.<br />Until the end of your turn, you can target one affected creature with a Bikijutsu Finisher regardless of range, once per turn, using either an Action or Bonus action, ignoring its listed casting time.<br />At Higher Ranks:\_For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of attacks by +1. If this jutsu is cast at A-Rank the damage increases by +1 dice.</p><p><br /></p>"
