system:
  description:
    value: "<p>You make two swift strikes with your Cross Spear one vertical and one horizontal ending in the shape of a cross. Make two melee taijutsu attacks dealing your weapons damage damage +2d6. Both attacks are treated as being made simultaneously meaning all effects that would only apply once per turn or jutsu applied to both of these attacks and all damage is treated as one instance.<br />If this jutsu is used as a Finisher, you make two melee taijutsu attacks dealing your weapons damage damage +2d8 and if both attacks hit the affected creature gains a rank of dazzled.<br />At Higher Ranks:\_For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and damage of both attacks by +2d6.</p><p><br /></p>"
