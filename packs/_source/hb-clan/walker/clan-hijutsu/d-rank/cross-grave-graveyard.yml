  description:
    value: "<p>You build up energy inside of your Innocence (Cross) and then slam it into the ground causing the built up energy to be unleashed on the area around you. All creatures in the radius must make a constitution saving throw taking your weapons damage +2d8 or half as much on a failure.<br />At Higher Ranks:\_For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by +2d8 and the radius by 5ft. If this jutsu is cast at C-Rank the damage from it now instantly kills any minions classified as Aberrations, Celestials, Demons, Otsutsuki or Monstrosities.</p>"
