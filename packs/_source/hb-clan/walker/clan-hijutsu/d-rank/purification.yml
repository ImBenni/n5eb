system:
  description:
    value: "<p>As a Parasite Accommodator you have the power to channel your innocence through your body to purge yourself of negative effects. You remove a total number of ranks of any of the following conditions equal to your constitution modifier (Corroded, Poisoned/Envenomed, Bleeding, Lacerated, Weakened).<br />At Higher Ranks:\_For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and if cast at C-Rank it now affects the following conditions (Concussed, Confused, Slowed, Sealed, Dazzled). At S-Rank this jutsu becomes Concentration, up to 1 minute and the effects of this jutsu activate at the beginning of each of your turns.</p>"
