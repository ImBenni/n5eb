name: Latent Innocence (Cross)
type: feat
_id: ji4FuG0Mr0vv7MMn
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: "<p>(You must have\_Latent Parasite Accommodator) Starting at 3rd level you designate one of your arms as your Innocence(Cross), when you do this the chosen arm takes on a unique inhuman looking appearance. As an object interaction on your turn you can choose to transform your Innocence(Cross) into one of its several combat forms. After the initial activation you can change its form once per turn as a free action. Weapon attacks, unarmed attacks, taijutsu and bukijutsu that use this weapon as well as all Walker Clan hijutsu may use constitution for attack, damage and save DC's calculations. Your Innocence (Cross) can be imbued with weapon seals and has a number of slots equal to half your proficiency bonus.</p>"
