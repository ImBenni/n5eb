system:
  description:
    value: "<h3>Keep walking</h3><p>'Keep walking, you must keep walking' is a common phrase used by the Walker clan usually to motivate themselves during times of strife and difficulty. Those of the Walker clan often live difficult lives, some are persecuted for their abnormal looking arm, others fall under the burden of responsibility that often comes with it and this difficulty almost seems to be a necessity as it seems that their cursed eye only ever awakens due to a painful situation.</p><div><p></p></div><h4>Walker traits</h4><p>Ability Score Increase:\_+2 to any ability score, +1 to any other ability score. (Recommended: +2 Con, +1 Any)<br />Speed:\_Your base walking speed is 35 feet.<br />Skill Proficiencies:\_Chakra control and your choice of either Survival, Sleight of hand or Insight.<br />Nightvision:\_You have 60 feet of dark vision you can see in all forms of low light as if it were daytime</p>"
