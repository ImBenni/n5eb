  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Yome Clan, 4+ <br />Through constant use,
      you've pushed your prowess with the Shizukugan to greater heights. You gain the following
      benefits;</p><ul><li>Increase your Wisdom score by 1, to a max of 20.</li><li>The cost of activating your
      <em><strong>Shizukugan</strong></em> is 0.</li><li>You gain 1 additional Shizukugan ability from the
      <em><strong>Shizukugan</strong></em> clan feature.</li><li>While your Shizukugan is active, you have True Sight to
      a range of 30 feet.</li></ul>
