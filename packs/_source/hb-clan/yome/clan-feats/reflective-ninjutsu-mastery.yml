img: systems/n5eb/assets/content/clans/yome.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Yome Clan, level 10+ <br />You have
      cultivated a powerful symbiosis with the Star Chakra you've absorbed, granting more fluidity with its use than
      ever before. You gain the following benefits;</p><ul><li>Increase your Intelligence or Wisdom score by 1, to a max
      of 20.</li><li>Once per turn when you cast a ninjutsu with the Water Releast keyword, while your Shizukugan is
      active, increase its damage die by 1 or its save DC by 1 (your choice).</li><li>Reduce the cost to maintain
      ninjutsu with the Water Release keyword by an amount equal to their rank <em><strong>(D-Rank: 1, C-Rank: 2,
      B-Rank: 3, A-Rank: 4, S-Rank: 5.)</strong></em>. Water Release Ninjutsu concentration costs can be reduced to 0,
      regardless of what other features dictate.</li></ul>
    chat: ''
