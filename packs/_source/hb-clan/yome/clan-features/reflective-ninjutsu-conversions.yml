system:
  description:
    value: >-
      <p>Starting at 7th level, select two Genjutsu with the Visual keyword of C-Rank or lower that you qualify for and
      add them to your known jutsu list. You do not need to meet ability score requirements to learn the chosen jutsu.
      The selected jutsu do not count against your jutsu known limit and are converted into Ninjutsu, losing their
      Genjutsu keywords and instead gaining the Ninjutsu, Water Release keywords.</p><p>A jutsu converted this way
      retains all effects detailed in its jutsu description except it uses your Ninjutsu attack bonus, ability score and
      save DC for all calculations. You can change which jutsu you convert this way when you complete a
      Full-Rest.</p><p>At 15th level, you can select an additional Genjutsu of A-Rank or lower.</p>
