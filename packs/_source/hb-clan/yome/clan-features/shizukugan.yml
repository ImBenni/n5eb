folder: rSXIbRQ8yaatXj0G
name: Shizukugan
type: feat
_id: Wo10k6iHjpNuXY2w
img: systems/n5eb/assets/content/clans/yome.webp
system:
  description:
    value: >-
      <p><strong>Shizukugan</strong>: One of the rare dojutsu of the Hidden Sand Village, the Shizukugan is renowned for
      its unparalleled clarity and reflective abilities. Beginning at 1st level, you can activate the Shizukugan by
      spending 5 Chakra as a bonus action. This causes your pupils to dilate significantly, streamlining the absorption
      of natural light in one of two dilation modes. When you activate this dojutsu you decide which mode to benefit.
      You can alternate modes as a bonus action. The Shizukugan remains active for up to 1 hour, and you can deactivate
      and reactivate it during this period at no extra cost. While active, the Shizukugan grants the following features
      in addition to your active dilation mode:</p><ul><li><em><strong>Clearwater Vision</strong></em>: You gain a +5
      bonus to perception checks relying on sight, and you increase both your passive perception and passive
      investigation by +5. Additionally, you're able to see through water-based obstructions such as fog or mist with
      perfect clarity. While you're able to see a target and aren't blinded, you also ignore up to three-quarters
      cover.</li><li><em><strong>Flash Burn</strong></em>: Due to your heightened clarity, your eyes are susceptible to
      sudden flashes of bright light. You have disadvantage on saving throws against effects that generate intense light
      that inflict the blinded condition, such as a flash tag.</li></ul><p>Dilation Modes:</p><p><em><strong>Wide
      Mode:</strong></em> While there is sufficient moisture in the air or sources of water nearby, you can use your
      action to focus your sight in a given direction. For the next minute, so long as you have a clear line of sight,
      you can see through the reflection of any sources of water -- even one as small as a droplet of water -- for a
      number of miles equal to your proficiency bonus. While using this sight through a source of water, that source
      sparkles and changes color slightly to match the hue of your iris'.</p><p><em><strong>Narrow
      Mode:</strong></em></p><ul><li><p><em><strong>Water Droplet Reflection Sight:</strong></em> While there is
      sufficient moisture in the air or sources of water nearby, you can <br />use your action to focus your sight in a
      given direction. Until the end of your turn, so long as you have a clear line of sight, you can see through the
      reflection of any sources of water -- even one as small as a droplet of water -- to a maximum range of 1 mile
      times your proficiency bonus. While using this sight through a source of water, that source sparkles and changes
      color slightly to match the hue of your iris'.</p></li></ul><p>At 3rd level, you further develop the reflective
      abilities of the Shizukugan. You gain two of the following additional features. At 11th, 15th, and 18th level you
      may select one additional feature from this list.</p><ul><li><p><em><strong>Combat Clarity:</strong></em> You
      learn to utilize the <br />clarity granted by the Shizukugan to <br />augment your evasiveness. You gain <br />a
      +1 bonus to your Initiative and AC <br />for every sufficient Source of Water <br />within 60 feet of you, to a
      maximum <br />of 3.</p></li><li><p><em><strong>Water Visionary:</strong></em> Your ability to peer through <br
      />reflections from the Shizukugan allows you to cast Water ninjutsu subtly. Once per turn, you may cast a ninjutsu
      with the Water Release keyword of C-Rank or lower from a sufficient source of water within the jutsu's range. When
      you do so, you double its chakra cost, and the jutsu is considered cast from that point as if you were standing
      there. If the creature's passive perception is less than 10 + your ninjutsu ability modifier, then you make your
      attack roll at advantage. If you ninjutsu cast requires a saving throw instead of an attack roll, the creature
      makes its save with disadvantage.</p></li><li><p><em><strong>Tiny Source:</strong></em> Your ability to perceive
      such small sources of water enable you to use them to greater effect. Twice per activation of the Shizukugan,
      while there is at least moisture in the air you, when casting a ninjutsu with the Water Release keyword it gains
      the benefit of being near a sufficient source of water, if applicable. If not applicable, reduce the cost of the
      jutsu by -2 (Min. 1).</p></li></ul><ul><li><em><strong>Relecting Iris:</strong></em> The reflective abilities of
      your Shizukugan grant you incredible awareness. You add your Wisdom modifier twice to Perception checks relying on
      sight, and increase both your Passive Perception and Investigation by +5. You cannot be surprised.</li></ul>
    chat: ''
