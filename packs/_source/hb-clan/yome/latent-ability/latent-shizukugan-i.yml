system:
  description:
    value: >-
      <p>Beginning at 3rd Level, you can spend 10 chakra to activate your latent Shizukugan as an action. It remains
      active for up to 1 minute. You may activate and deactivate the Shizukugan during this time period with no
      additional cost. While active you gain 120 feet of Chakra sight while out of combat and 60 feet of chakra sight
      while in combat. You ignore up to half cover. As a Full-turn-action, you may see up to 1 mile away using water
      sources to do so. While using this sight through a source of water, that source changes its color to match the hue
      of your iris'.</p>
