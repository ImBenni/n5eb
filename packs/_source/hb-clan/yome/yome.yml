  description:
    value: >-
      <h3 id="oasis-seekers">Oasis Seekers</h3><p>The unforgiving Demon Desert in the Land of Wind has forever been a
      harsh land, yet the residents of Sunagakure flourish. In days long past, when desert tribes wandered aimlessly, it
      was the Yome clan who led others to safety. Once considered nomads, the Yome possessed a unique ability: the
      Shizukugan, granting them the power to detect hidden oases. The farseeing eyes of the Yome clan played a pivotal
      role in the establishment of the Village's location.</p><h4 id="yome-traits">Yome Traits</h4><hr
      /><ul><li><p><strong>Ability Score Increase:</strong> +2 Wis, +1 Dex</p></li><li><p><strong>Speed:</strong> Your
      base walking speed is 30 feet.</p></li><li><p><strong>Skill Proficiencies:</strong> Perception, Chakra
      Control.</p></li><li><strong>Passive Affinity:</strong> You have Water Release affinity.</li></ul>
