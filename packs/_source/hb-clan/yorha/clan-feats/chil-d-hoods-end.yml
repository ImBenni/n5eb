system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> YoRHa Clan, Level 12+ <br />You have
      trusted and been betrayed, been lied to and discovered the truth, and obtained a level of experience and maturity
      that far exceeded the limits of what your creators intended. You gain the following benefits:</p><ul><li>You
      cannot be Charmed or Frightened/Demoralized by any means unless you allow yourself to be.</li><li>A number of
      times equal to half of your proficiency bonus rounded up per full rest, when you would upcast a jutsu, it is
      upcast to the maximum rank possible at no additional cost. You can spend two uses of this feature to instead
      upcast to one rank beyond your maximum rank, ignoring limitations. If this feature is used on an S-Rank Jutsu, you
      gain a +1 bonus to any damage or healing done for each die rolled.</li><li>You cannot lose concentration on jutsu
      by any means aside from running out of chakra or being incapacitated.</li><li>While looking at a creature within
      60 feet of you, you become aware of their highest and lowest ability score.</li></ul>
    chat: ''
