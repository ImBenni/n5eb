name: Emotions Are Prohibited
type: feat
_id: cYN4Isf9FhgIXaVm
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> YoRHa Clan <br />Your emotions were
      designed to be well hidden behind a steely veneer, making your purpose that much more clear. You gain the
      following benefits:</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>You gain
      proficiency in Deception. If you are already proficient, you instead gain expertise.</li><li>You can make a
      Deception check using either your Intelligence, Dexterity, or Constitution in place of Charisma</li><li>Your
      emotional state cannot be discerned unless you allow it, and creatures lower level than you have disadvantage on
      Insight checks to discern your intentions. Creatures equal to your level or higher instead have a penalty to these
      same checks equal to half your proficiency bonus rounded up.</li><li><p>When you would kill a creature, you can
      roll a Deception check vs a DC equal to 10+the level of the highest level hostile combatant in initative. On a
      success, all creatures that can see you or the killed creature within 30 feet become
      <em><strong>Disheartened</strong></em> until the end of your next turn. <br />Allied creatures have a +1d6 bonus
      to damage rolls against <em><strong>Disheartened</strong></em> creatures, up to twice per turn.</p></li></ul>
