system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> YoRHa Clan, B Designation, Level
      12+</p><p>You've unlocked recordings embedded deep within your programming of a future that will come to pass,
      unless you take measures to prevent it. You gain the following benefits:</p><ul><li><p>You can now add jutsu with
      the Medical Release keyword to your list. Select a number of Medical Release jutsu you qualify for equal to half
      your proficiency bonus. You learn them and treat these jutsu as YoRHa Hijutsu. These jutsu cannot be changed
      later.</p></li><li><p>If a creature would die and become unable to be revived by any means, you can rebuild a
      version of them in a new body using your memories. During a full rest, you can construct a replacement body for
      them as if you had cast the <strong>Mental Clone</strong> jutsu. The body uses your base Strength, Dexterity, and
      Constitution ability scores.</p></li><li><p>During a long rest, you may download your memories of them into this
      replacement body, bringing them back to life. When you do, the highest rank of jutsu they are able to cast is
      permanently lowered by one, and if they used a jutsu, feature, feat, or trait that directly resulted in their
      demise (e.g., the 8th Gate of Death), they lose access to that feature and all related ones, becoming unable to
      learn or utilize them again. A creature can only be resurrected in this way once.</p></li></ul>
    chat: ''
