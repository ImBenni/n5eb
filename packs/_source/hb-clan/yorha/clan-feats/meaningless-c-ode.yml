system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> YoRHa Clan, <em><strong>A</strong></em>
      Designation or <em><strong>E</strong></em> Designation, Level 12+ <br />You've reached the zenith of what it means
      to bear your designation, granting you new perspective of the beauty of the world. You gain the following
      benefits:</p><ul><li>You cannot be affected by jutsu, features, traits, or any other effect that would cause you
      to act against your will.</li><li>Creatures equal to your level or lower gain 1 rank of Fear against you whenever
      they would attempt to lie or misguide you.</li><li>Your Weight of the World clan feature's effects now extend to
      the Genjutsu keyword in its entirety.</li><li>If you have <em><strong>A</strong></em> as your designation, you can
      activate or deactivate your Berserk State at will as a free action, the number of hit points you lose is halved,
      and your Dexterity bonus is increased by a further +2.</li><li>If you have <em><strong>E</strong></em> as your
      designation, you can select up to two creature types or clan, or one creature in specific and one affiliation. If
      you select a creature or affiliation you know of, your bonuses apply to all creatures allied to them.
      Additionally, you cannot lose concentration on jutsu that use your YoRHa Weapon as a component.</li></ul>
    chat: ''
