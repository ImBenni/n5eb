system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> YoRHa Clan, A Designation, Level
      8+</p><p>Your experience with your designation has granted you a heightened state of mind somewhat frightening to
      others. Nevertheless, you continue to tread paths that they could not fathom going down. You gain the following
      benefits:</p><ul><li><p>Increase an ability score of your choice by 1, to a maximum of 20.</p></li><li><p>Your
      Berserk State can now be accessed once per rest as an Action or Bonus Action and can last for a
      minute.</p></li><li><p>While in your Berserk State, your Strength modifier increases to be equal to your Dexterity
      or Intelligence modifier, ignoring your ability score for its duration.</p></li><li><p>Once per turn, when making
      an attack roll or a saving throw while in your Berserk State, you can treat the result of the d20 as if it had
      rolled 1 higher.</p></li><li><p>When you reduce a creature's hit points to 0 during your Berserk State, you can
      choose to instantly kill them. When you do, you regain hit points equal to twice your Constitution modifier. This
      healing can occur a number of times equal to your Constitution modifier per long rest.</p></li></ul>
