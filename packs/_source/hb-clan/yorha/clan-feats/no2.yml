system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> YoRHa Clan, <em><strong>B</strong></em>
      Designation, level 4+ <br />(You cannot have the 'True Designation' feat.) <br />The original basis of the 'B'
      designation, you were truly designed to specialize in close-ranged combat, enabling quicker dashing capabilities
      within your system, as well as a special "Berserk" feature. You gain the additional designation of
      <em><strong>A</strong></em>(Attacker), granting you the following benefits:</p><ul><li>Increase an ability score
      of your choice by 1, to a maximum of 20.</li><li>YoRHa weapons you wield gain two additional weapon properties of
      your choice, which can be changed when you alter your weapon's form.</li><li>You can Dash as a free action, once
      per turn. When you do, you also gain the benefits of the Disengage action.</li><li><p>Once per long rest, as an
      action, you can enter the <em><strong>Berserk State</strong></em> for a number of your turns equal to your
      proficiency bonus. When you do, you increase your movement speed by +30, increase your Dexterity or Intelligence
      ability score by +2, gain a +1 to your AC, you cannot be instantly killed by hostile effects, and being grappled
      or restrained only halves your movement.<br />However, you lose an amount of hit points at the start of each of
      your turns equal to triple your proficiency bonus. For the duration of the Berserk State, you cannot be healed by
      any means aside from Blood Pills, which you can gain the benefits of a number of times equal to half of your
      proficiency bonus for the duration.</p></li></ul>
    chat: ''
