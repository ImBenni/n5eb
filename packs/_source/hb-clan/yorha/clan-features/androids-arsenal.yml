system:
  description:
    value: >-
      <p>Starting at 7th level, your YoRHa weapons become stronger and more versatile. As an object interaction, you can
      switch the form of your Weapon of Virtue or Cruelty to a different type of melee weapon, or if you are a B
      designation, a different type of ranged weapon, and it can deal bludgeoning or piercing damage in place of
      slashing damage.</p><p>Additionally, your YoRHa weapons treat immunity to conditions they would apply as
      resistance, ignore resistance to their damage, and increase the turn-based limitations of jutsu-based boosts,
      boons, and other similar benefits applied to them by one. At 15th level, your YoRHa weapons ignore immunity to
      damage they deal.</p><p>At 11th level, your YoRHa weapon gains a +1 to its critical threat range against creatures
      suffering from three or more ranks of conditions you've inflicted. At 15th level, this bonus increases to +2.</p>
    chat: ''
