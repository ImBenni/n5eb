name: Intelligent Design
type: feat
_id: PWZQ7wjKeTCef9An
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>You were constructed, rather than being naturally born, and your body is more refined than a normal human's as
      a result. Starting at 1st level, you gain the following benefits:</p><ul><li><p>You do not need to eat or drink,
      but can still do so if you wish.</p></li><li><p>You are immune to disease, cannot be poisoned, and have resistance
      to poison damage.</p></li><li><p>You do not need to sleep and cannot be put to sleep.</p></li><li><p>You add your
      Constitution modifier and your choice between your Dexterity or Intelligence modifier to calculations involving
      your carrying, push, drag, and lifting capacities and limits.</p></li><li><p>You add your Dexterity score when
      determining your jump distance and can jump while not grounded, using the air itself as a platform, but only once
      before you must land on a surface.</p></li><li><p>Bukijutsu, YoRHa Hijutsu, Athletics, and Martial Arts checks can
      use Dexterity or Intelligence for their calculations.</p></li></ul>
