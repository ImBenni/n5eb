system:
  description:
    value: >-
      <p>At 15th level, you designate an ultimate goal for yourself that will drive you until you lose sight of it,
      complete it, or fail. For that duration, this feature is active, granting you the following benefits while you
      fight specifically to achieve that goal:</p><ul><li><p>You gain +30 movement speed, a +2 bonus to your AC, attack
      rolls, damage rolls, and all saving throws.</p></li><li><p>YoRHa Hijutsu you cast cost two less
      chakra.</p></li><li><p>Your Pod increases two of its ability scores by +2.</p></li><li><p>If you would die or be
      instantly killed, so long as a corpse remains, your Pod can revive you at the start of your next turn with 20 hit
      points, so long as it is intact. This can occur twice per full rest.</p></li></ul>
    chat: ''
