name: Weight of the World
type: feat
_id: kspurilRWgkIZzZv
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>At 11th level, you finally open your eyes to the world. You become immune to the blinded condition, gaining 60
      feet of true sight, chakra sight, and darkvision.</p><p>Additionally, you can always tell when a creature is
      lying, and have advantage on Insight checks to discern a creature's intentions towards you. You can calculate
      Insight with Intelligence or Dexterity in place of Wisdom.</p><p>This increases to 120 feet of each sight at 15th
      level. Also at 15th level, you become immune to Genjutsu with the Visual or Auditory keywords. (Select one between
      the two.)</p>
