name: Extermination Blade
type: spell
_id: Cdv0FWyiNK3RBGGx
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>You perform a backflip onto a floating platform of solid light created by your Pod, then launch yourself
      forward in a flash to execute a soaring dropkick. This jutsu can only be cast as a Finisher.</p><p>Make a melee
      Taijutsu attack, ignoring penalties and AC bonuses. If the target creature is suffering from three or more ranks
      of conditions inflicted by you, the attack is made at advantage.</p><p>On a hit, you deal 3d8 bludgeoning damage
      and perform a flurry of strikes. Make three melee Taijutsu attacks, dealing your weapon's damage die on a hit. If
      at least two attacks hit, you carry the creature 60 feet into the air with your strike, then teleport up to them
      to follow through with a maelstrom of high-speed attacks.</p><p>Make a number of melee Taijutsu attacks equal to 1
      + your proficiency bonus. On a hit, you deal half your proficiency bonus (rounded up) in unreducible force damage.
      If at least three of these attacks hit, you grapple the target's head between your legs, using your momentum to
      flip them through the air, attempting to slam them back to the ground.</p><p>The target makes a Strength saving
      throw with a -1 penalty for each attack that hit them (maximum of -5). On a failure, they are sent spiraling
      downward to the ground, increasing falling damage taken by one step. Just before landing, you let go and teleport
      safely down to the ground away from the target as they slam into the ground behind you.</p>
    chat: ''
