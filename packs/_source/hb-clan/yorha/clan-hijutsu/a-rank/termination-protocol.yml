name: Termination Protocol
type: spell
_id: AA4icuH6blHePXwG
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <hr /><p>You remove the source of your consciousness from your body, your Black Box, beginning preparations for a
      true end.</p><p>As a part of casting this jutsu, you can spend a bonus action and half of your maximum chakra and
      hit points to extract your Black Box from your body. While doing so, you lose access to all YoRHa clan features
      and jutsu, so long as it remains outside of your body. You can use a bonus action to place the Black Box back
      inside of your body.</p><p>While it is extracted, as an action, you may spend all of your remaining chakra to
      permanently destroy the Black Box in a manner of your choosing, causing a wide-ranging explosion to emanate from
      you. You die, unable to be revived by any means, and the resulting explosion disintegrates your corpse and all
      items you had on you.</p><p>All creatures caught within the radius of this explosion must make a Constitution
      saving throw, rolling 3d20, taking the lowest result of all die rolled and rerolling any result on the die above
      an 18. On a failure, they are reduced to 0 hit points. On a success, they take an amount of force damage that
      treats immunity as resistance equal to double your maximum hit points + double your maximum chakra
      points.</p><p>Unattended objects, structures, and constructs are instantly destroyed, and you leave behind a
      crater of a size equal to the explosion.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above A-Rank, increase the radius by one mile. If this jutsu is cast at S-Rank, multiply the radius by 10.</p>
