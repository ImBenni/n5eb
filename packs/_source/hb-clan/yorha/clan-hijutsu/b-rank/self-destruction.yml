name: Self-Destruction
type: spell
_id: kT2ivGHG2kZnPPtV
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>You invoke your innate ability to self-destruct, releasing a wave of explosive force in the area immediately
      around you.</p><p>All creatures within range must make a Constitution saving throw with a penalty equal to half
      the result of your hit die, taking unreducible force damage equal to your maximum hit points + half of your
      maximum chakra points, as well as being Dazed for the next minute, Weakened, and knocked prone on a failure, or
      half as much and only being knocked prone on a success.</p><p>At the conclusion of this jutsu, your hit points are
      set to 1, armor you are wearing of Superior or lower quality is atomized, and you become unconscious. While
      unconscious in this way, you cannot regain consciousness or be healed for the next minute, after which you can
      only be healed up to half of your maximum hit points until you complete a long rest.</p><p>While you are
      unconscious in this way, your Pod acts autonomously in your place, and allied creatures can use it to perform
      YoRHa Hijutsu that require it as a component as if they knew them, ignoring the YoRHa weapon
      component.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3 and the hit die spent and applied to the penalty by 1.</p>
