img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>You perform a brutal assault, beginning with a strong slashing attack and following up with a kick meant to
      send your opponent soaring backward. Make a melee Taijutsu attack, dealing your weapon's damage + 3d6 on a hit.
      Regardless of a hit or miss, you then kick the target. They must make a Strength saving throw, being knocked back
      30 feet on a failure or half as much on a success.</p><p>After this initial attack, you command your Pod to create
      two solid light duplicates of itself, which then follow through with supercharged energy beams. Your Pod makes
      three Ranged Taijutsu attacks against the target creature, dealing its weapon's damage on a hit.</p><p>If two or
      more attacks would hit, the creature must then make a Wisdom saving throw, falling prone and becoming Blinded
      until the start of your next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the damage by 2d6.</p>
