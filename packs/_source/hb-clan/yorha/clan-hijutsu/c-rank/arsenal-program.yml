name: Arsenal Program β
type: spell
_id: EoaMIlaJNn0OkbuT
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>You access a secondary specialized arsenal within your Pod's programming, granting you a more diverse selection
      of combative options. Once, during the duration of this jutsu, your Pod can grant you one of the following
      benefits, at which point this jutsu then ends:</p><ul><li><em><strong>A080 - Wave:</strong></em> Your Pod
      generates a powerful shockwave by slamming into the ground from an elevated height. Select a point within 60 feet
      of you. All creatures within 15 feet of this point must make a Dexterity saving throw, being knocked 30 feet into
      the air on a failure. Until the end of your next turn, all allied creatures within 30 feet can target one affected
      creature with a Taijutsu or Bukijutsu <em><strong>Finisher</strong></em> regardless of range, once per turn, using
      an action, bonus action, or reaction.</li><li><em><strong>A140 - Gravity:</strong></em> Your Pod unleashes a blast
      that drags in any enemies in the vicinity. Select one point within 90 feet of you. All hostile creatures within 30
      feet of that point must make a Strength saving throw, being pulled as close as possible to the center on a failure
      and reducing their movement speed by half until the end of your next turn, or being moved half as much on a
      success. Until the end of your next turn, all allied creatures within 30 feet can target one affected creature
      with a Taijutsu or Bukijutsu <em><strong>Finisher</strong></em> regardless of range, once per turn, using an
      action, bonus action, or reaction.</li><li><em><strong>A150 - Volt:</strong></em> Your Pod creates a field of
      shocking energy around a single enemy that builds up over time for an explosion. Select one creature within 60
      feet of you. Your Pod begins to orbit that creature, staying within 5 feet of them and becoming unable to receive
      commands until the end of your next turn. As a bonus action on your next turn, you can cause this energy to
      detonate, immediately dealing Xd4+X lightning damage to them and inflicting them with two ranks of shocked. (X =
      your Dexterity or Intelligence modifier)</li><li><p><em><strong>A130 - Bomb:</strong></em> Your Pod throws a
      volley of small, explosive charges that detonate after a set period of time. Select one creature within 60 feet of
      you. The bombs then fly towards the target. At the start of that creature's next turn, they must make a Dexterity
      saving throw, taking Xd4+X force damage and becoming Dazed and Burned on a failure, or half as much and no effects
      on a success. <br />(X = your Dexterity or Intelligence modifier)</p></li><li><em><strong>R060 - P
      Shield:</strong></em> Your Pod deploys a protective barrier around you specifically geared to protect you from
      melee atacks. Until the end of your next turn, you reduce damage taken from melee attacks by your Pod's weapon's
      damage, up to twice per turn.</li><li><em><strong>R070 - M Shield:</strong></em> Your Pod deploys a circular
      protective barrier around you that is specifically geared to protect yourself from ranged attacks. Until the end
      of your next turn, you reduce damage taken from ranged attacks by your Pod's weapon's damage, up to twice per
      turn.</li></ul>
    chat: ''
