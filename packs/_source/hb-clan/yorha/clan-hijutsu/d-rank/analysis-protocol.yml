name: Analysis Protocol
type: spell
_id: gO1y6INRrftGRAgl
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>You aptly command your Pod to focus its efforts toward scanning and examining the enemy, searching for their
      openings and weak points. Once per round, you can cast this jutsu to have your Pod perform a <strong>Defensive
      Scan</strong> or an <strong>Offensive Scan</strong>, granting one of the listed effects below depending on your
      choice:</p><hr /><h3><strong>Defensive Scan:</strong></h3><ul><li><p>Your Pod performs the <strong>Read the
      Enemy</strong> skill-based action when a creature would take any action, requiring no action cost and no
      components to trigger. In place of a skill check, it rolls 1d20 + half your character level + your proficiency
      bonus. On a success, you are immediately informed of the details of the action, and all allied creatures within 30
      feet of you that can hear you gain the benefits of a success.</p></li></ul><hr /><h3><strong>Offensive
      Scan:</strong></h3><ul><li><p>Your Pod rolls 1d20 + half your character level + your proficiency bonus and
      compares the result to the passive Deception of a creature within 120 feet of you. On a success, all allied
      creatures within 30 feet of you that can hear you gain a +1d4 bonus to their next attack roll against the targeted
      creature.</p></li></ul><hr /><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and gain a +2 bonus to the roll.</p>
