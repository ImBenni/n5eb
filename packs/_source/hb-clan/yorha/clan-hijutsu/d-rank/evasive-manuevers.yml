name: Evasive Manuevers
type: spell
_id: RJZV5fq5eGQAGnet
img: systems/n5eb/assets/content/clans/yohra.webp
system:
  description:
    value: >-
      <p>You swiftly dodge out of the way of an incoming hostile attack, attempting to completely avoid any harmful
      effects to you. You gain a +3 to your AC and Dexterity saving throws until the start of your next turn.</p><p>For
      the duration, twice per turn when an attack would miss you or you would succeed on a Dexterity saving throw, you
      can move up to half of your movement speed and make an attack of opportunity against a creature within your
      weapon's range.</p><p><strong>At Higher Ranks:</strong></p><p>For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3.</p><p>If this jutsu is cast at B-Rank or higher, increase the bonus to +5.
      Additionally, once per casting, you gain an additional reaction that can only be used to take the Attack action or
      cast a YoRHa Hijutsu without a Special casting time of a rank equal to or less than the rank this jutsu was
      cast.</p><p>If this jutsu is cast at A-Rank or higher, increase the bonus to +7.</p>
