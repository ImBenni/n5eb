system:
  description:
    value: >-
      <p>Once per turn, when you would hit a creature with a weapon attack, you
      can cast this jutsu to gain a +1d4 bonus to the damage roll. You can then
      make an additional weapon attack as part of the same action that does not
      add your ability modifier to its damage. You can choose to apply one of
      the following benefits to additional attacks made in this way and can
      select a different benefit for each attack made. You can only use each of
      this jutsu's benefits twice per casting:</p><hr /><h3><strong>Striking
      Assault:</strong></h3><ul><li><p>On a successful hit, the target must make
      a Constitution saving throw, becoming Bruised on a failure. If this attack
      critically hits, the saving throw is made at
      disadvantage.</p></li></ul><hr /><h3><strong>Slashing
      Assault:</strong></h3><ul><li><p>The attack cannot be made at
      disadvantage, and on a critical hit, the target's AC is reduced by 1 until
      the end of your next turn.</p></li></ul><hr /><h3><strong>Severing
      Assault:</strong></h3><ul><li><p>On a successful hit, the target must make
      a Strength saving throw. On a failure, they become Slowed. If this attack
      critically hits, the saving throw is made at
      disadvantage.</p></li></ul><hr /><p>Twice per casting, this jutsu gains
      additional effects based on whether <strong>Virtue</strong> or
      <strong>Cruelty</strong> is active:</p><hr
      /><h3><strong>Virtue:</strong></h3><ul><li><p>Attacks made as a result of
      this jutsu treat the creature's AC as being -1 lower for each unique
      condition you have applied to them, to a maximum of -5.</p></li></ul><hr
      /><h3><strong>Cruelty:</strong></h3><ul><li><p>If an attack made by this
      jutsu would exceed the target's AC by 5 or more, that attack is treated as
      a critical hit.</p></li></ul><hr /><p><strong>At Higher
      Ranks:</strong></p><p>For each rank you cast this jutsu above D-Rank,
      increase the cost by 3 and the number of additional attacks you can make
      per casting by +1.</p><p>If this jutsu is cast at B-Rank or higher,
      additional attacks made can apply half of your ability modifier to their
      damage.</p><p>If this jutsu is cast at S-Rank, additional attacks made can
      instead add your full ability modifier to their damage.</p>
