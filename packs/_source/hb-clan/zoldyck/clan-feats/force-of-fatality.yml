system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Zoldyck Clan, Level 16+</p><p>You have become a force that even other
      assassins shiver at the sight of. You gain the following Benefits;</p><ul><li><p>Increase your STR or CON score by
      1, to a maximum of 20.</p></li><li><p>You reduce the chakra cost of all Jutsu by 2. Additionally, if a Jutsu would
      have you make multiple attack rolls, make one additional attack that deals half damage.</p></li><li><p>Whenever
      you score a critical hit with a weapon or Taijutsu attack, roll one additional damage die. If the additional
      damage die rolls its maximum value, roll an additional die.</p></li></ul>
