system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Zoldyck Clan, Level 1+</p><p>You have spent more time training than most.
      This makes you far more skilled than even other Zoldycks. You gain the following Benefits;</p><ul><li><p>Choose
      one skill you are proficient in, you gain a +3 Bonus to the chosen skill.</p></li><li><p>Twice per rest, you can
      cast a Taijutsu, Ninjutsu, Genjutsu, or Zoldyck Clan Hijutsu with a casting time of an Action, as a Bonus
      Action.</p></li><li><p>You reduce the cost of all Zoldyck Clan Hijutsu by 1 to a minimum of 1
      Chakra.</p></li></ul>
