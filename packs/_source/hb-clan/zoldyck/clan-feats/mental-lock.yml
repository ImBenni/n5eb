system:
  description:
    value: >-
      <p>Category: Clan</p><p>Prerequisite: Zoldyck Clan, Level 4+</p><p>Your teachings to never fight a battle you
      can't win have been ingrained into your mind, manifesting as a Fuinjutsu within your brain. You gain the following
      Benefits;</p><ul><li><p>Increase your WIS or CHA score by 1, to a maximum of 20.</p></li><li><p>When you take the
      Dash action, you do not provoke attacks of opportunity once per turn.</p></li><li><p>Once per Long Rest as an
      Action when facing an enemy who is higher level than you, your seal activates and you gain 1 additional turn. You
      may not use any actions on this extra turn to deal damage to a creature. Dashing on this additional turn moves you
      an extra 20 feet. You gain 2 ranks of exhaustion until your next long rest at the conclusion of this additional
      turn.</p></li></ul>
