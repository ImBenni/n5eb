    value: "<p><span style=\"font-family:Lexend,sans-serif\"><strong>\_</strong>The lethal damage a Zoldyck Assassin can sustain makes people question whether they are even human. At 15th level, you can ignore the negative effects of up to 2 ranks of exhaustion during combat. However, you still suffer the effects outside of combat.</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\">Additionally, you can treat a critical hit against you as a normal hit once per rest.</span></p>"
