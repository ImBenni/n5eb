system:
  description:
    value: >-
      <p><span style="font-family:Lexend,sans-serif">As you progress, you make yourself even more deadly. At 3rd level,
      choose between the <em><strong>Multiattack</strong></em>, <em><strong>Disarm</strong></em>,
      <em><strong>Deadly</strong></em>, <em><strong>Lethal, Trip</strong></em>, or <em><strong>Grapple</strong></em>
      properties. Your unarmed strikes gain the chosen property and increase their critical threat range by
      +1.</span></p><p dir="ltr" style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><span
      style="font-family:Lexend,sans-serif">Additionally, you have advantage on checks and saving throws against being
      poisoned, envenomed, or diseased by a D-Rank Feature or Jutsu. This increases to C-Rank at the 7th level, B-Rank
      at 11th level, and A-Rank at 15th level.</span></p>
