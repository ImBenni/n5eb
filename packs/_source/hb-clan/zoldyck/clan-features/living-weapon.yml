system:
  description:
    value: "<p><span style=\"font-family:Lexend,sans-serif\">You've been taught how to make your body a weapon itself. Beginning at 1st level, the damage die for your unarmed strikes becomes 1d4. The damage die becomes 1d6 at 3rd level, 1d8 at 7th level, 1d10 at 11th level, 1d12 at 15th level, and 2d6 at 18th level. At the beginning of your turn, you can choose for your unarmed damage to be bludgeoning, piercing, or slashing damage.\_</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\">If your unarmed damage die is already higher than this when you reach the required level, you instead add +1 to your unarmed damage rolls.\_</span></p>"
