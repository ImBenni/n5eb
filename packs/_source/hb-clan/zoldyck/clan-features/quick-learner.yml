system:
  description:
    value: "<p><span style=\"font-family:Lexend,sans-serif\">\_Your training has sharpened your mind as well as your body. Beginning at 3rd level, choose between Taijutsu, Genjutsu, or Ninjutsu. You reduce the downtime needed to learn jutsu and feats of that type by 2 weeks to a minimum of 1. This increases to 3 weeks at 7th level and to 4 weeks at 11th level.\_</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\">Additionally, twice per rest when making a skill check you are proficient in, you can treat a d20 roll of 9 or lower as a 10.</span></p>"
