img: systems/n5eb/assets/content/clans/zoldyck.webp
system:
  description:
    value: >-
      <p><span style="font-family:Lexend,sans-serif">A trained Zoldyck is a blur of movement to even the most trained
      eye. Beginning at 7th level, once per round when you make a melee attack and there is cover or a structure within
      30 feet of you, you can make a Stealth check against the target's perception check as a reaction. On a success,
      you may teleport in a flash of movement behind the cover or structure, and you are hidden from the creature.
      Attacking, or breaking stealth while hidden causes you to become revealed as normal.</span></p>
