folder: CzgdHNAOQV9f8MzL
name: Assassin Technique Dragon Dive
type: spell
_id: OXNPsSHmiuK0RmrX
img: systems/n5eb/assets/content/clans/zoldyck.webp
system:
  description:
    value: "<p><span style=\"font-family:Lexend,sans-serif\">As part of the activation of this jutsu, you must be at least 30 feet in the air.\_</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:10pt\"><span style=\"font-family:Lexend,sans-serif\">You channel your chakra into creating a massive dragon head made of raw chakra above your target. Upon reaching its peak, the dragon head shatters into hundreds of smaller dragons that rain down upon the area below.</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:10pt\"><span style=\"font-family:Lexend,sans-serif\">Choose a point within 500 feet of you. All creatures within a 100-foot radius centered on that point must make a Dexterity saving throw against your Ninjutsu Save DC. This jutsu ignores all cover and destroys all structures within range. On a failed save, creatures take 10d10 piercing damage and 5d6 force damage as the dragons pierce through the area. On a successful save, creatures take half as much damage. Additionally, creatures who fail the save by 5 or more reduce their maximum health and chakra by half the damage taken.</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:10pt\"><span style=\"font-family:Lexend,sans-serif\">The rain of dragons leaves the area difficult to traverse. The area becomes difficult terrain.\_</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:10pt\"><span style=\"font-family:Lexend,sans-serif\"><strong>Upcast</strong>: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 Chakra, the radius by 20 feet, and the damage of both the piercing and force damage by 1d10 and 1d6.</span></p>"
