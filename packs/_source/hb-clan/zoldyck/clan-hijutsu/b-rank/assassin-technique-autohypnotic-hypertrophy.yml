system:
  description:
    value: "<p>You use Genjutsu chakra throughout your body to \"Flip the Switch\" and remove limiters normally present. For the duration, your muscles are in a frenzied state and all of your senses are honed, granting the following benefits:</p><ul><li><p>Your movement speed increases by 20 feet and you move an extra 15 feet when you use the Dash action.\_</p></li><li><p>Your long and high jump distances are doubled.</p></li><li><p>You gain a +2 bonus to AC and Dexterity saving throws.</p></li><li><p>You gain a +2 bonus to all Strength-based checks and saving throws. Additionally, your unarmed strikes deal an extra 1d6 damage.</p></li><li><p>At the beginning of your turn, you can choose to gain an additional Bonus Action or Reaction.</p></li></ul><p>After the duration expires, you gain 1d3 ranks of exhaustion.</p>"
