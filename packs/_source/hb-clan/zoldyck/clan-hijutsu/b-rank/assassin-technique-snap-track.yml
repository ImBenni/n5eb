system:
  description:
    value: >-
      <p>You lock onto a target within range and focus all of your chakra into moving as fast as possible for a limited
      time. Make an unarmed attack against a creature within range. On a hit, you can target another enemy within 30
      feet of the original target. Make an unarmed attack against the second target using the same attack roll. If this
      hits, this chaining effect can continue to a third target if there is one within range. All target creatures hit
      take your unarmed damage times 2 and must make a STR save. On a failure, their vertebrae are snapped, they gain
      the Dazed condition, and gain 3 ranks of Weakened until they succeed a Medicine Check against your Taijutsu Save
      DC.</p><p>If this jutsu is used as a Finisher, the damage dealt ignores resistance and immunity.</p><p>Upcast: At
      Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the number
      of attacks made against each target by 1.</p>
