system:
  description:
    value: "<p>You sharpen your nails and perform a strike to the vital organs of a target at blinding speed. Make an unarmed attack against a target within range. This attack has a +1 Bonus to the Critical threat range of the attack. On a hit you deal your unarmed damage + 5d4. On a critical hit, the target creature permanently has 1 rank of Weakened until they are targeted by a Jutsu with the Medical Keyword of C-Rank or higher that removes conditions.</p><p>If this jutsu is used as a Finisher, you instead make an unarmed attack against the target, dealing your unarmed damage + 9d4.</p><p>If you roll 8 or more 4's with this jutsu's damage die, the target creature must make a CON save against your Taijutsu Save DC or be immediately killed as you remove their heart.\_</p><p>Upcast: At Higher Ranks: For each rank you cast this jutsu</p><p>above C-Rank, increase the cost of this jutsu by 3 and damage die by 1d4.</p>"
