system:
  description:
    value: "<p>You channel Genjutsu chakra through precise pressure points on the target's body with a flurry of strikes, causing their nervous system to believe it is shutting down. Make four unarmed attacks against a target. On a hit, you deal your unarmed damage die and reduce their AC by 1 for each successful hit for 1d4 rounds.\_</p><p>If this jutsu is used as a Finisher, you re-roll 1s and 2s on the attack and damage rolls. Additionally, if the target is hit by at least 3 attacks from this, they must make a CON save against your Taijutsu Save DC with a -1 penalty for every two hits. On a failed save, they also reduce their STR and DEX ability scores by half the number of times they were hit (rounded down) for the duration.</p><p>Upcast: At Higher Ranks: For each rank you cast this jutsu above</p>"
