system:
  description:
    value: "<p>You focus all of your chakra into their arms as they become a blur of movement like writhing serpents. Until the end of your next turn, creatures of your choice that enter, or end their turn within a 10ft radius from you must make a DEX save or take your unarmed damage die + 3d6 Slashing Damage and gain 1 rank of bleeding, taking half damage and no additional effects on a success.\_</p><p>For the duration, you reduce damage dealt to you or allies within range by 3d6.</p><p>If a creature rolls a 1 or 2 on the D20 to save against this jutsu, their body is torn apart and they instead gain 1 rank of Lacerated and reduce their Constitution score by 1d4 until they, or another creature succeeds a DC 30 Medicine Check to end this.</p><p>Upcast: At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the range by 10 feet, and damage dealt/reduced by 1d6.</p>"
