system:
  description:
    value: "<p>You focus your chakra throughout every fiber of your body to achieve physical feats normally impossible for the human body. For the duration, you have a +3 to strength checks and can grapple creatures up to 2 size categories larger than yourself. Additionally, your melee attacks gain the following benefits based on the damage type inflicted:</p><ul><li><p>Bludgeoning: If you hit a creature twice in the same round with this damage type, they must make a CON save. Either gaining 1 rank of bruised on a fail or falling prone until the end of their next turn(your choice).</p></li><li><p>Slashing: If you hit a creature twice in the same round with this damage type, they must make a CON save. Gaining 1 rank of bleeding on a failed save until the end of their next turn.\_</p></li><li><p>Piercing: If you hit a creature twice in the same round with this damage type, they must make a CON save. Gaining 1 rank of Weakened on a failed save until the end of their next turn.</p></li></ul><p>Upcast: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the ranks inflicted by 1.</p>"
