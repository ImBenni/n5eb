system:
  description:
    value: "<p><span style=\"font-family:Lexend,sans-serif\"><strong>\_</strong>Your killer intent fills the air as your eyes flush with a dark hue and a menacing aura of your description surrounds you. All hostile creatures that can see you within range must make a Charisma save or gain 1 rank of fear and slowed for the duration as they start to lose the will to fight against such an inhuman threat. Affected creatures can remake the saving throw at the end of their turn.</span></p><p><span style=\"font-family:Lexend,sans-serif\"><strong>Upcast: </strong>For each rank you cast this jutsu above D-rank, you increase the cost by 3 and deal 1d8 Psychic damage to the creature on their turn while affected. When cast at B-rank, increase the damage by 1d8 and inflict 1 more rank of fear and slowed. When cast at A-Rank, increase the damage by 1d8 and inflict 2 more ranks of fear and slowed. When cast at S-Rank, creatures have disadvantage on saving throws to end the effect.</span></p>"
