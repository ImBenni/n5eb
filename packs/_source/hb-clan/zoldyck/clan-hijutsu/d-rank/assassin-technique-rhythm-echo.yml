system:
  description:
    value: "<p><span style=\"font-family:Lexend,sans-serif\"><strong>\_</strong>You utilize a basic application of the Phantom Step technique to cause creatures of your choice within range to believe you have cloned yourself many times over. For a number of rounds equal to your Dexterity Modifier, you gain the benefits of Half Cover. Additionally, if you succeed on a Stealth check against a creature within range while this is active, you re-roll 1s and 2s on attack and damage rolls against them.</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\">This technique deactivates if you are grappled, prone, restrained, or otherwise unable to move more than half your movement speed.</span></p>"
