system:
  description:
    value: >-
      <p><span style="font-family:Lexend,sans-serif">Beginning at 1st level, your unarmed strikes gain the
      <em><strong>Finesse</strong></em> property and the damage die for your unarmed strikes becomes 1d4. The damage die
      becomes 1d6 at 3rd level, 1d8 at 7th level, 1d10 at 11th level, 1d12 at 15th level, and 2d6 at 18th level. At the
      beginning of your turn, you can choose for your unarmed damage to be bludgeoning, piercing, or slashing
      damage.</span></p>
