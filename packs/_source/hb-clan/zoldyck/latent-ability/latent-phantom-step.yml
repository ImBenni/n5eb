name: Latent Phantom Step
type: feat
_id: dTAvpPthuit35HVA
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p><span style="font-family:Lexend,sans-serif">At 1st level, you can spend your movement speed on your turn to add
      to the range of a melee attack. For example, if you have 20 movement speed left on your turn and choose to add
      that to the range of a Taijutsu that requires an attack roll, that Taijutsu now has +20 to its range. If you are
      under the effects of a dash, the extra movement speed granted can also be used for this.</span></p><p dir="ltr"
      style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><span
      style="font-family:Lexend,sans-serif">Alternatively, you can perform a silent waltz and spend your movement speed
      to add +2 to a Dexterity-based check for every 15 feet of movement spent</span></p>
