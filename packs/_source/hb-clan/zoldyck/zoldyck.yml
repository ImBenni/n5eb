  description:
    value: "<p>Unparalleled Efficiency\_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ \_ .</p><p>In a secluded area of the world only known to the members themselves, there exists a clan of expert assassins known as the Zoldyck Clan. Shrouded in secrecy, the one thing known about this family worldwide is they aren't enemies you'd want to make, they aren't cheap, and if you end up catching a high price on your head, a Zoldyck is sure to find you soon…</p><p></p><p><span style=\"font-family:Lexend,sans-serif\">Zoldyck Traits:</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\"><strong>Ability Score Increase: </strong>+2 Dex or Str, +1 Con or Wis</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\"><strong>Speed: </strong>Your base walking speed is 30 feet</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\"><strong>Skill Proficiencies: </strong>Stealth, Pick one between: Acrobatics, Athletics, Sleight of Hand, or Martial Arts</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\"><strong>Assassin Training: </strong>You gain access to Zoldyck Clan jutsu known as Assassin Techniques</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Lexend,sans-serif\"><strong>Zoldyck Talent: </strong>You know 1 additional D-Rank Assassin Technique, Taijutsu, or Non-Elemental jutsu. This does not count against your jutsu known.</span></p>"
