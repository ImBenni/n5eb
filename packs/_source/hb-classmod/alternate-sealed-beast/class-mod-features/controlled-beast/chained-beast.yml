system:
  description:
    value: >-
      <p>Beginning at 3rd level in this class mod, you've started repurposing your seal for optimal efficiency.
      Repairing the seal becomes easier and the amount of chakra that can be accessed increases, becoming almost too
      much to handle. Inside your seal, chains spring up around your Sealed Beast and a thin trail of chakra can be seen
      leaking out. The amount of Seal Bleed you can repair after a week of downtime is instead 4d4. This increases to
      6d4 at 5th level of Sealed Beast. Also, your Seal Bleed is reduced by 1 whenever you would take a Long Rest. While
      you are in Controlled Rage, you must attempt to remake your Withdraw Check to continue to gain Twisted Chakra.</p>
