system:
  description:
    value: >-
      <p>You've started modifying your Seal for optimal functionality, seeing your Sealed Beast as a tool or battery for
      your own purposes. You begin tightening the bindings on your captive and sucking them dry of their chakra. A seal
      modified in this way may be designed to torture the Sealed Beast to make it harder for them to resist you, or to
      carve physical openings into them to more easily funnel out their energy.</p><p>This path is locked to characters
      that pursue power above all else, even if it's for what they see as a necessity or a just cause. Once chosen you
      cannot go back. Your Desperate Rage is far more intense and dangerous, either from your own uncontrollable urge to
      use your beast to its full potential, the massively increased flow of Twisted Chakra through your body, or the
      Sealed Beast's burning vengeance and hatred for you in the few moments it can influence you.</p>
