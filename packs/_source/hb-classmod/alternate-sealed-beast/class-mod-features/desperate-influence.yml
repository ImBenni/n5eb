folder: B5BJzsZx9ki2WtoU
name: Desperate Influence
type: feat
_id: dCNtqHJRshJRnpBh
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>While you are under the effects of Desperate Rage, your Seal is at its weakest. More and more Twisted Chakra
      enters your system either from your own emotional state and desire for power, or your Sealed Beast's
      machinations.</p><ul><li>At the end of each of your turns, you remake the Desperate Rage Check to regain control
      of your body. On a success, you end Desperate Rage and enter Controlled Rage. On a failure, you must remake your
      Bargain or Withdraw Check, repeating your choice at the start of Desperate Times, gaining more Twisted Chakra and
      Seal Bleed as a result.</li><li>At any point if you run out of Twisted Chakra while benefiting from Desperate
      Rage, you immediately remake your Bargain or Withdraw Check, ending Desperate Rage on a failure. If you are making
      a Withdraw Check, you cannot choose to withdraw less than your check result would allow.</li><li>If you cannot see
      the creature that triggered your Desperate Rage, you can make your Desperate Rage Check at
      advantage.</li><li>After you enter Desperate Rage, you can't enter it again until you take a Short
      Rest.</li><li>Beginning at 3rd level of this Class Mod, the first time you would succeed a Desperate Rage Check,
      you instead fail. This can happen once per Long Rest.</li><li>At 5th level of this Class Mod, you have
      disadvantage on Desperate Rage Checks.</li></ul>
