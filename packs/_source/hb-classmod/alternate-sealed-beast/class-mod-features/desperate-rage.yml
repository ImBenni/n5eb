folder: B5BJzsZx9ki2WtoU
name: Desperate Rage
type: feat
_id: ctwO3jrKkKwDY6GX
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level of this class mod, the beast inside you has figured out a perfect time to attempt to
      take control, such as when you've acquired its chakra while being close to losing consciousness or desperate for
      the power your beast can grant you. When you successfully obtain Twisted Chakra after triggering the Desperate
      Times feature, you must make a Charisma Ability check vs your Desperate Rage DC, known as a Desperate Rage Check.
      You cannot gain the benefit of any bonus to Charisma or this check outside this Class Mod.</p><p>Desperate Rage DC
      = 11 + (Sealed Bleed ÷ 10)</p><p>On a failure, you enter a Desperate Rage as the Sealed Beast's chakra overwhelms
      your mind and personality. You begin to strongly resemble your Sealed Beast, becoming distinctly inhuman both in
      behavior and physical mutations. If you succeed your Desperate Rage Check, you instead enter Controlled Rage. You
      gain the following benefits during Desperate Rage:</p><ul><li>When you enter Desperate Rage, you regain a number
      of Hit Points equal to 30 times your level in this Class Mod.</li><li>If your Strength and Dexterity Ability
      scores are below 20, they become 20 for the duration. If they are already 20, increase them by 2.</li><li>Your
      Unarmed Damage Die becomes a d12.</li><li>Vermillion Jutsu you cast have their damage increased by two steps. This
      becomes three steps at 3rd level of this Class Mod. If this would increase the damage beyond a d12 you instead
      gain a +1 to damage for each die rolled.</li><li>Your movement speed is increased by 30 feet.</li><li>You gain a
      +2 bonus to Saving Throws.</li><li>You must use every action you have to attempt to deal damage or kill, or to
      directly increase your chances of dealing damage or killing, ignoring all other abilities.</li><li>You must attack
      your currently targeted creature until they are dead or dying, starting with the creature that triggered your
      Desperate Rage, unconcerned with collateral damage. If a creature damages you or attempts to harm you, you can
      target them for 1 round before you must go back to targeting the triggering creature. If no creature has attempted
      to harm you or you have killed your target, you instead target the nearest hostile creature.</li><li>Twice per
      Desperate Rage, you gain an additional Action which can only be used to enter a Twisted Chakra Cloak.</li></ul>
