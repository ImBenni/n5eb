system:
  description:
    value: >-
      <p><strong>Desperate times call for desperate measures.</strong> Beginning at 1st level of this Class Mod, you've
      first learned how to access the beast inside.</p><p>When you fall to <strong>0 hit points</strong>, see an
      <strong>ally or close friend</strong> reduced to <strong>0 hit points</strong>, or experience <strong>extreme
      grief</strong> (Player + DM discretion), your emotional turmoil grants you access to your <strong>mind
      palace.</strong></p><p>Here, you can <strong>contact your captive</strong> and either <strong>ask for</strong> or
      <strong>force out</strong> their power.</p>
