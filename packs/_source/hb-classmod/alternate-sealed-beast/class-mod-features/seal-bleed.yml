folder: B5BJzsZx9ki2WtoU
name: Seal Bleed
type: feat
_id: baOnb4A3oYUbnXoh
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>For every two Batches of Twisted Chakra you gain with a Withdraw or Bargain Check, you gain 1 Seal Bleed. For
      every 10 Seal Bleed you have, you decrease your Withdraw DC by 1. Seal Bleed cannot be restored by any means
      outside of this class mod feature.</p><p>You do learn how to reduce damage the seal takes by fixing the seal ever
      so slightly by using your knowledge of Fuinjutsu. When you would gain the benefit of 1 week of Downtime, you may
      spend this time repairing the seal. You or a willing creature must make two checks, and must pass both in order to
      successfully repair the seal's bleed. If another creature makes the checks, your Downtime is still spent. You must
      succeed a Constitution (Chakra control) check and an Intelligence (Ninshou) check vs a DC 20. You cannot gain the
      benefit of any bonuses to these checks outside this Class Mod. If you succeed in both checks, roll 2d4 reducing
      the amount of Seal Bleed you have accumulated.</p><p>If at any time your Seal Bleed surpasses the maximum allowed
      by your Class Mod table, your Seal fails and your Sealed Beast is released, resulting in your death. If you have
      acquired 20 or more Seal Bleed at any time, your seal has become damaged beyond repair. Your Seal Bleed cannot be
      reduced below 10. If you have had 30 or more Seal Bleed at any time your seal bleed cannot be reduced below 20 and
      if you have had 40 or more Seal Bleed at any time, your seal bleed cannot be reduced below 30.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/hb-sealed-bleed-table.webp" />
