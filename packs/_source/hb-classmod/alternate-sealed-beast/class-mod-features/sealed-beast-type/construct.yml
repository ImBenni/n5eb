system:
  description:
    value: >-
      <p><strong>Elementals, Artificial beings, Mechanical Engines, and other beasts that constitute a non-organic make
      up.</strong></p><p>This Construct within you was specifically designed to be a weapon of mass destruction. A tool
      of unrivaled power. An engine of devastation. This Construct was placed inside you to incubate. Your use of this
      construct grants it the experience needed to accomplish its goals one day.</p><p>This beast doesn't have a wish.
      It doesn't want or need as much as it has a primary directive. It cannot be reasoned with, nor does it have any
      rational outside of its primary directives.</p><ul><li>Your Twisted Chakra has a more artificial feel to it,
      resulting in unnatural colors and hues. Your chakra moves in a less fluid way, instead moving in purely geometric
      methods such as triangles or squares.</li><li>Your Twisted Chakra Cloak takes on a shape exactly like what the
      final form of the Sealed Construct is within you. Whether that be an Elemental or a pseudo-mechanical
      construct.</li><li>Your Twisted Chakra Cloak grants you the Construct creature type, in addition to
      humanoid.</li><li>Your Vermilion Arts has a geometric, non-natural feel to them.</li></ul>
