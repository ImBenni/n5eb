system:
  description:
    value: >-
      <p><strong>A Yokai, An Abyssal Fiend, A Kappa, A Devil from the deepest reaches of the underworld or a corrupted
      individual who's been consumed by the Celestial Doctrine of Yomi (Underworld).</strong></p><p>This Beast is one
      you may be familiar with from the series proper of Naruto. Massive engines of death and destruction. These beasts
      harbor unmatched power, chakra, force, and authority. This beast may have been placed inside you, for you to act
      as a prison for one of these beasts. To keep it locked away so the current generation no longer needs to deal with
      it.</p><p>You have been used as a stopgap between the previous generation and the next. This beast wants nothing
      more than to escape. Threatening you, urging you to use its power. Begging you to just die so it can be free. This
      beast is generally the most hostile.</p><ul><li>Your Twisted Chakra is wild and sinister. It has an air of
      destruction and power behind it. Your chakra may become more hostile in its color palette; Red, Orange, Black,
      Dark Green etc.</li><li>Your Twisted Chakra Cloak takes on the shape of the beast inside you. It may take you
      through a series of stages. Growing tails, wings, arms, legs, heads etc.</li><li>Your Twisted Chakra Cloak grants
      you the Demon creature type, in addition to humanoid.</li><li>Your Vermilion Arts has a wild and sinister feel to
      them. People in the presence of these arts generally do not feel safe.</li></ul>
