folder: peBI9oSTtW8nf8om
name: Monstrosity
type: feat
_id: FfooYWK51Xtj2ubq
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p><strong>A beast born out of an abnormal marriage of nature and circumstance.</strong> A Tarrasque, a Chimera,
      an Androsphinx. A mistake (or curse) born of the world itself. A creature of this type was sealed away as a
      last-ditch effort to keep its power in check. You just happen to be the only one those in power were willing to
      sacrifice at the time.</p><p>These beasts do not have rationales or even language. They are a mix of both
      intelligent and primal creatures who are scared, angry, and driven by the primal need to escape. You may be able
      to take advantage of their situation; the more you take from them, the more room they have to fight back. These
      beasts, while hostile, are not intentionally so. Their hostility comes from their primal instincts reacting as if
      they were a caged bird.</p><ul><li>Your Twisted Chakra is a primal and wildly powerful source of strength. Your
      chakra gains a wild, untamed, and primal feel to it. It may take on a brown, green, grey, or yellow hue to
      it.</li><li>Your Twisted Chakra Cloak takes on the shape of the Monstrosity inside you. It becomes more solid.
      More real. More alive the stronger your chakra cloak becomes, gaining more defining features of the
      monstrosity.</li><li>Your Twisted Chakra Cloak grants you the Monstrosity creature type, in addition to
      humanoid.</li><li>Your Vermilion Arts become primal in nature, harboring the power of the world itself. When used,
      it feels like the world itself is fighting alongside you.</li></ul>
