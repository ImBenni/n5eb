name: Phantasm
type: feat
_id: qJ7E83HawxOkJg7I
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p><strong>A beast who has no physical form.</strong> A specter. A Ghoul. A Phantom. A spirit who does not belong
      on this side. This beast is one whose strength and power have posed an existential threat to the living. A
      long-dead shinobi or samurai's spirit. The soul of a demon. The soul of an Ōtsutsuki. The spirit of a long-dead
      deity.</p><p>This Phantasm's very existence brings the threat of destruction by its very nature. These Phantasms
      are usually only sealable within the bodies of strong-spirited individuals—those whose wills may be powerful
      enough to stave off the attempted possessions by the Phantasm. While this Phantasm may be the spirit of such a
      person or creature, it does not house any of their previous ambitions, feelings, goals, or restrictions. This
      Phantasm carries the face and lingering memories of that person, but not their humanity. It wants nothing more
      than to return to the world of the living, even if it has to wear you as its new skin.</p><ul><li>Your Twisted
      Chakra is ethereal in nature, carrying the power of the spirit currently sealed inside you. Its past strength is
      your new strength.</li><li>Your Twisted Chakra Cloak takes on an ethereal look and forms a shell that has a
      similar silhouette to the spirit's past life.</li><li>Your Twisted Chakra Cloak grants you the Undead creature
      type, in addition to humanoid.</li><li>Your Vermilion Arts become ethereal in nature, harboring a ghastly power
      that carries the memories of the spirit inside you. You may garner some of these memories through use.</li></ul>
