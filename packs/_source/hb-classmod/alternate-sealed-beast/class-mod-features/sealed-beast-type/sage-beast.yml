system:
  description:
    value: >-
      <p><strong>A rogue Sage Toad from Mount Myōboku, a hyper-dangerous Sage Snake from Ryūchi Cave.</strong> These
      beasts are extremely powerful and, on rare occasions, cannot be reasoned with or stopped by normal means. So,
      sealing them away becomes the best and only viable option.</p><ul><li><strong>Your Twisted Chakra</strong> is
      Sage-like in nature, carrying the unique traits of raw Nature Energy in its purest form. Your power is the raw
      power most sages strive after.</li><li><strong>Your Twisted Chakra Cloak</strong> takes on a regal and Sage-like
      look. This chakra wraps itself into a shape that closely resembles the Sage beast inside you.</li><li><strong>Your
      Twisted Chakra Cloak</strong> grants you the Sage Beast creature type, in addition to
      humanoid.</li><li><strong>Your Vermilion Arts</strong> have a powerful calm attached to them. People in the
      presence of these arts generally feel a sense of hope or despair, depending on how they are used.</li></ul>
