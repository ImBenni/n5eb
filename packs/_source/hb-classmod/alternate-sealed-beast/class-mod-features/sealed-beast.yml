system:
  description:
    value: >-
      <p><strong>When you finally gain the Sealed Beast Class Mod, you gain the following class mod
      features.</strong></p><p>Beginning at the first level of the Sealed Beast Class mod, you either realize or come
      into contact with this dormant beast within you for the first time. This beast should start out as extraordinarily
      hostile towards you, either because of a natural hate towards humans or simply because you hold them captive and
      make them powerless.</p><p>At this point, you finally get to see the beast up close and are able to discern its
      racial traits. Select the type of beast inside you. Work with your DM so that this choice goes along with the
      narrative being put forth.</p><p>The beast within you can potentially provide you with a series of unique benefits
      based on its type. While you and the DM will be the final decision-makers in regards to what is sealed inside you,
      you do have some leeway in how that beast will benefit you mechanically.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/hb-sealed-beast-table.webp" />
