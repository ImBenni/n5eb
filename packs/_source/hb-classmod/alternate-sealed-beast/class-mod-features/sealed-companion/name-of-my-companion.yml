img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>At 4th level of this Class Mod, if you have no more than 15 Seal Bleed and are in a scenario or fight where you
      have found common ground with your Sealed Beast, you can choose to take this feature. When you do, you and the
      Sealed Beast have become friends. Your bonds have grown to a point where your Sealed Beast has shared its true
      name with you, whatever that may be. Your Sealed Beast is always willing to grant you Twisted Chakra. As a result,
      your chakras have melded, and its chakra has much fewer negative effects on your body.</p><p>When you gain this
      feature, you advance to the fifth level of the Sealed Beast Class Mod.</p><p>You no longer gain Seal Bleed from
      Bargain Checks and lose the Desperate Influence and Desperate Rage Class Mod features, instead immediately
      entering Controlled Rage.</p><p>As a Bonus Action, you can exchange chakra with your Sealed Beast. For every 10
      Chakra you spend, you receive 40 Twisted Chakra. When you do this, you can immediately enter Controlled Rage
      without triggering Desperate Times.</p><p>Also, you count as 1 Stage lower for the purposes of receiving downsides
      after exiting a Twisted Cloak.</p>
