folder: cLYopfICdWnPAJzl
name: Scratch My Back
type: feat
_id: V4jH4zxJxXVqpf6P
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>At 3rd level of this Class Mod, if you have no more than 10 Seal Bleed and are in a scenario or fight where you
      have found common ground with your Sealed Beast, you can choose to take this feature. You have shown your Sealed
      Beast that you and it can negotiate. You have become far more amicable compared to where you once were. You have
      shown your Sealed Beast that you can be viewed as an ally, and not someone it must be wary of.</p><p>When you gain
      this feature, you advance to the fourth level of the Sealed Beast Class mod.</p><p>By willingly being granted
      chakra instead of forcing it out, your seal is far less damaged. You count as having 20 less Seal Bleed for the
      purposes of the Sealed Bleed Table and Desperate Rage DC. This does not count for all other features, such as
      Unleashed Beast or requirements for Sealed Companion features.</p><p>Also, your Twisted Cloak's bonuses to
      Vermilion Attack Bonus and Vermilion Save DC are reduced by 2. However, your Twisted Cloaks have a decreased cost
      equal to 10 times your Sealed Companion Level (minimum 10) and no longer increase your Desperate Rage
      DC.</p><p>Once per Long Rest, when you roll initiative, you can enter your mind palace and make a Bargain Check.
      On a success, you enter Controlled Rage.</p>
