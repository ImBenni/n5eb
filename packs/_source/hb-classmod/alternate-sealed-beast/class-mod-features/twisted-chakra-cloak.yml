folder: B5BJzsZx9ki2WtoU
name: Twisted Chakra Cloak
type: feat
_id: 3pSKSZJo7EujjQEb
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>Twisted Chakra swells and encircles you, twisting and coiling around your very being. Your Chakra cloak takes
      the shape of your Sealed Beast based on how far you've progressed in this class mod. Twisted Hit Points are a
      special type of Hit Point that take damage in place of you, but only after depleting any Temporary Hit Points.
      Twisted Hit Points can't be recovered by any means outside of reactivating this feature.</p><p>You count all
      Twisted Hit Points gained from Twisted Chakra Cloaks as part of your total and maximum Hit Points. This class mod
      feature lasts until the end of your Desperate Rage or Controlled Rage, until one minute has passed, or until you
      are knocked unconscious, even if all Twisted Hit Points are depleted. Downsides gained from Twisted Chakra Cloaks
      can't be prevented, removed, or healed through other means.</p><p>After exiting your Twisted Cloak, you gain the
      following downsides as it eats at your body:</p><ul><li>After exiting Twisted Cloak, Stage 2 or higher, reduce
      your Maximum Hit Points by Xd10 until you take a Long Rest. (X = Twice the highest Twisted Cloak Stage you were
      in.)</li><li>After exiting Twisted Cloak, Stage 3 or higher, you gain the <strong>Slowed</strong> and
      <strong>Weakened</strong> conditions for Xd4 hours. (X = The highest Twisted Cloak Stage you were
      in.)</li><li>After exiting Twisted Cloak, Stage 4 or higher, you gain 3 ranks of <strong>Exhaustion</strong> until
      you take a Long Rest.</li></ul>
    chat: ''
