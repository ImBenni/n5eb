folder: B5BJzsZx9ki2WtoU
name: Twisted Cloak, Stage 1
type: feat
_id: xyicBAXSvYyo050N
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>Beginning at 2nd level in this class mod, you have reached a point where the swelling of Twisted Chakra has
      reached a boiling point.</p><p>As a Bonus Action, while you are under the effects of <strong>Desperate
      Rage</strong> or <strong>Controlled Rage</strong> and have a Twisted Chakra pool of at least 200 Twisted Chakra,
      you are able to spend <strong>30 Twisted Chakra</strong> to enter this Twisted Chakra Cloak Stage. When you do,
      your Chakra Cloak takes on an infantile shape in its best attempt to facilitate the look and feel of your Sealed
      Beast. You gain the following benefits:</p><ul><li>Your <strong>Speed</strong> is increased by 15.</li><li>Your
      <strong>Strength</strong> and <strong>Dexterity</strong> increase by +2.</li><li>You gain a +2 Bonus to all
      <strong>Saving Throws</strong>.</li><li>As an Action, you can make <strong>2 Vermilion Attacks</strong> dealing
      <strong>4d6 + Proficiency</strong> Bludgeoning, Piercing, or Slashing damage (DM Discretion) using claws made of
      chakra.</li><li>You gain a +2 bonus to your <strong>Vermilion Attack Bonus</strong> and <strong>Vermilion Save
      DC</strong>.</li><li>Your <strong>melee attacks</strong> increase their range by 5 feet.</li><li>You gain
      <strong>50 Twisted Hit Points</strong>.</li><li>You regain <strong>5 Hit Points</strong> at the start of your
      turn.</li><li>You can cast <strong>Tier 1 Vermilion Art Techniques</strong></li></ul>
    chat: ''
