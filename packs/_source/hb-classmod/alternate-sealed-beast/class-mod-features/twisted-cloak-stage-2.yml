name: Twisted Cloak, Stage 2
type: feat
_id: OYcC1NxfuZwHJwPQ
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level in this class mod, you gain access to the second level of your <strong>Twisted Chakra
      Cloak</strong>. Your <strong>Twisted Cloak</strong> begins to grow in similarities to your Sealed Beast, becoming
      more powerful and reflecting its features.</p><p>As a <strong>Bonus Action</strong>, while you are under the
      effects of <strong>Desperate Rage</strong> or <strong>Controlled Rage</strong> and have a <strong>Twisted Chakra
      pool</strong> of at least <strong>300 Twisted Chakra</strong>, you can spend <strong>60 Twisted Chakra</strong> to
      enter this <strong>Twisted Chakra Cloak Stage</strong>, gaining the following benefits:</p><ul><li>Your
      <strong>Speed</strong> is increased by 30.</li><li>Your <strong>Strength</strong> and <strong>Dexterity</strong>
      increase by +2.</li><li>You gain a <strong>+3 Bonus</strong> to all <strong>Saving Throws</strong>.</li><li>As an
      <strong>Action</strong>, you can make <strong>2 Vermilion Attacks</strong> dealing <strong>5d6 +
      Proficiency</strong> Bludgeoning, Piercing, or Slashing damage (DM Discretion) using claws made of
      chakra.</li><li>You gain a <strong>+4 bonus</strong> to your <strong>Vermilion Attack Bonus</strong> and
      <strong>Vermilion Save DC</strong>.</li><li>Your <strong>melee attacks</strong> increase their range by <strong>10
      feet</strong>.</li><li>You gain <strong>75 Twisted Hit Points</strong>.</li><li>You regain <strong>10 Hit
      Points</strong> at the start of your turn.</li><li>You can cast <strong>Tier 2 Vermilion Art
      Techniques</strong>.</li><li>While in this Twisted Chakra Cloak Stage, your <strong>Desperate Rage DC</strong>
      increases by 1.</li></ul>
