folder: B5BJzsZx9ki2WtoU
name: Twisted Cloak, Stage 4
type: feat
_id: rHngJ06RIfB28N6B
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>At <strong>5th level</strong> in this class mod, you gain access to what makes your <strong>Sealed
      Beast</strong> such a terror, and you have complete understanding of the power you have within you. Your
      <strong>Twisted Chakra</strong> takes on a more complete form. It solidifies and becomes less a construct of
      chakra and more its own entity that you drive.</p><p>As a <strong>Bonus Action</strong>, while you are under the
      effects of <strong>Desperate Rage</strong> or <strong>Controlled Rage</strong> and have a <strong>Twisted Chakra
      pool</strong> of at least <strong>500 Twisted Chakra</strong>, you may spend <strong>120 Twisted Chakra</strong>
      to enter this <strong>final stage</strong> of your <strong>Twisted Chakra Cloak</strong>, gaining the following
      benefits:</p><ul><li>Your <strong>speed</strong> is increased by <strong>80</strong>.</li><li>Your
      <strong>Strength</strong> and <strong>Dexterity</strong> increase by <strong>+6</strong>.</li><li>You gain a
      <strong>+5 Bonus</strong> to all <strong>Saving Throws</strong>.</li><li>As an <strong>Action</strong>, you can
      make <strong>2 Vermilion Attacks</strong> dealing <strong>6d10 + Proficiency</strong> Bludgeoning, Piercing, or
      Slashing damage (DM Discretion) using claws made of chakra.</li><li>You gain a <strong>+8 bonus</strong> to your
      <strong>Vermilion Attack Bonus</strong> and <strong>Vermilion Save DC</strong>.</li><li>Your <strong>melee
      attacks</strong> increase their range by <strong>25 feet</strong>.</li><li>You gain <strong>200 Twisted Hit
      Points</strong>.</li><li>You gain <strong>resistance</strong> to <strong>all damage</strong>.</li><li>You regain
      <strong>20 Hit Points</strong> and <strong>20 Twisted Hit Points</strong> at the start of your turn.</li><li>You
      can cast <strong>Tier 4 Vermilion Art Techniques</strong>.</li><li>While in this <strong>Twisted Chakra
      Cloak</strong> Stage, your <strong>Desperate Rage DC</strong> increases by <strong>3</strong>.</li></ul>
    chat: ''
