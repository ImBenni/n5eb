name: Twisted Cloak, Stage 5
type: feat
_id: sn5F4ehh7QI6hngt
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>At <strong>5th level</strong> in this class mod, you gain the ability to manifest your <strong>Sealed
      Beast</strong> as a full-on <strong>Chakra Construct</strong>. This represents the pinnacle of your bond with the
      beast, where it is no longer merely a source of power, but a full, tangible entity that you can
      summon.</p><p><strong>As a Full Turn Action</strong>, while you are under the effects of <strong>Desperate
      Rage</strong> or <strong>Controlled Rage</strong> and have a <strong>Twisted Chakra pool</strong> of at least
      <strong>800 Twisted Chakra</strong>, you may spend <strong>150 Twisted Chakra</strong> to enter this alternative
      stage of your <strong>Twisted Chakra Cloak</strong>, gaining the benefits of your <strong>Twisted Avatar</strong>
      for the next minute.</p><p><strong>While summoned</strong>, you are inside the head or core of your
      <strong>Twisted Avatar</strong>. You cannot be directly targeted, damaged, or affected by any means for the
      duration of this form.</p><p>While in this state, <strong>your Twisted Avatar</strong> acts on your turn, and it
      can use your <strong>Action</strong>, <strong>Bonus Action</strong>, <strong>Movement</strong>, or
      <strong>Reactions</strong> as you see fit.</p>
