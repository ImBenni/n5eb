folder: B5BJzsZx9ki2WtoU
name: Vermilion Arts
type: feat
_id: S7u37O56a2WJrRJs
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>Beginning at the 1st level of this class mod, you have an innate understanding on how to utilize a Vermilion
      Art. Secret techniques and abilities that happen to be monstrously powerful and unique to the beast within you.
      These arts fall into one of 3 categories: Abilities, Passives, and Techniques. The Vermilion Arts you gain help
      define the type of Sealed beast within you. You can gain the benefits of some of your Vermilion Arts while not
      even benefitting from any active class mod features. While some you can only benefit from while you have certain
      class mod features active.</p><p>Select the Vermilion Arts that define the beast inside you. You cannot switch
      these once learned.</p><p>You must select one Technique for every level you gain in this Class Mod. You calculate
      your Vermilion attack bonus and Save DC as follows:</p><ul><li>Vermilion Save DC = 11 + Your Level in this Class
      Mod + Your Proficiency Bonus.</li><li>Vermilion Attack Bonus = 8 + Your Proficiency Bonus.</li></ul><p>Some of
      your Jutsu have become so natural to you that you are able to use them even while Desperate Rage has consumed your
      mind. Select one Jutsu that you know that deals damage on a successful Attack Roll or failed Saving Throw. It
      becomes a Vermilion Jutsu for the duration of Desperate Rage, using your Vermilion Save DC and Vermilion Attack
      Bonus if they are higher. You can pick an additional Jutsu at each level of this Class Mod.</p>
