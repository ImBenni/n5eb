system:
  description:
    value: >-
      <p>When you would cast a jutsu using Twisted Chakra, the jutsu cast erupts with the power of your sealed beast. As
      a Bonus Action, while casting a Jutsu of any type, using Twisted Chakra, choose one of the following: • If your
      jutsu deals damage or heals hit points, you can increase the damage or healing dice by 2 steps. (D4 &gt; D6 &gt;
      D8 &gt; D10 &gt; D12). • If your jutsu summons a structure, creature, or construct with hit points, it gains
      additional hit points equal to your Proficiency bonus times the rank of your jutsu cast. (D-Rank: 1, C-Rank: 2,
      B-Rank: 3, A-Rank: 4, S-Rank: 5) • If your Jutsu requires a saving throw of any type, affected creatures cannot
      gain advantage.</p>
    chat: ''
