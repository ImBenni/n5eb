img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>When a hostile creature would attempt to cast a jutsu, make an attack, or use an ability, feature or trait that
      targets. You may as a Reaction spend 25 Twisted Chakra. When you do, for the next minute, you release enough
      chakra to tinge the air itself with a weight of malice and authority. All hostile creatures who are within 120
      feet of you, who do not target you with any jutsu, ability, feature or trait they use, adds 2d20 to their attack
      rolls taking the lower of the result. If their jutsu, ability, feature or trait does not require an attack roll,
      then they instead must succeed a Wisdom Saving throw, doubling the cost of their jutsu, ability, feature or trait
      (if any).</p>
    chat: ''
