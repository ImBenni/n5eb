folder: neVsegCpmgW1j5Yt
name: Vermilion Defiance
type: feat
_id: BH1SA2JadnqEaof4
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>When you would make a saving throw as a result of being within a Jutsu's target area, you may as a reaction
      roar with the ferocity only your sealed beast could conjure. When you do, you spend multiples of 5 twisted chakra.
      For every 5 twisted chakra you spend, you reduce the damage you would take by 4d12.</p><p>If you reduce the damage
      you would take to 0, the triggering creature(s) must succeed a Strength saving throw. On a failed save, the target
      is assaulted by a wave of force originating from your roar, being thrown back 60 feet in a straight line. They can
      spend their reaction to make a Dexterity (Acrobatics) check vs Your Vermilion Save DC. On a success, they land
      standing upright. On a failed check, they land prone.</p><p>If they would hit a wall as a part of being thrown
      back, they make this Check at disadvantage, instead taking triple falling damage as if they fell the distance they
      had remaining.</p><p>Additionally, if at any point you cannot Mold chakra (CM), as an Action you can spend 15
      Twisted Chakra to regain the ability to Mold Chakra regardless of the conditions imposed on you.</p>
