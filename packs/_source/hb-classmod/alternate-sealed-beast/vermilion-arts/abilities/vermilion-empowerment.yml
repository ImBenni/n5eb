system:
  description:
    value: >-
      <p>Your Twisted Chakra empowers jutsu you to shred through any defense that stands in your way. By spending an
      additional 10 Twisted Chakra, whenever you cast a Vermilion Art or activate a feature, creatures who are the
      target of or would make a saving throw against the effect of any Art or feature you use cannot benefit from any
      bonuses to their AC, saving throw, Ability checks, Temporary hit points, Damage reduction, Resistance or immunity
      from any Jutsu they may cast or are currently under the effects of. (Ex. Substitution Technique, Bless, Absorb
      Heat, etc.)</p>
