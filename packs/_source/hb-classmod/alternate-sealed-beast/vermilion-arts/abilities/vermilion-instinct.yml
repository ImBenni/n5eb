system:
  description:
    value: >-
      <p>Your Sealed beasts' instincts becomes your own. You instinctually know where attacks come from almost as if you
      had a 6th sense for these things. Once per round, when you would be hit with an attack, you may spend 1 Twisted
      Chakra to increase your AC by 1, up to the difference between your AC and the rolled attack +1, against that
      attack. If the attack was a critical Hit, if you raise your AC to an amount equal to the Critical hits result +5,
      you treat it as a miss.</p>
