system:
  description:
    value: >-
      <p>Your Twisted chakra repairs damage from even the most extreme damage. While gaining the benefits of your
      Twisted Chakra Cloak, as a Bonus Action, you may spend 5 Twisted Chakra, recovering 5d8+5 Hit Points or ending 1
      condition (excluding exhaustion) you are currently under the effects of immediately.</p><p>By spending 10 Twisted
      Chakra, you can regain one use of a Clan or Class Feature which has more than three uses, regains them on a Short
      Rest, and for which you have reached the use limit for.</p><p>Additionally, by spending 30 Twisted Chakra, while
      gaining the benefits of your Twisted Chakra Cloak, Stage 2 or higher, you can regenerate a missing organ or limb
      even if it is permanently crippled. Alternatively, you can end an effect you are under as long as it can be healed
      by casting a Medical Jutsu of S-Rank or lower.</p>
