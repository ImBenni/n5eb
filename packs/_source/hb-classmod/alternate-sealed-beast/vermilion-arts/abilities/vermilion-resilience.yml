system:
  description:
    value: >-
      <p>Your Sealed beasts' resistances become your own. As a Bonus Action, you can spend 15 Twisted Chakra, granting
      you resistance to up to 3 damage types from the following for your Dormant Rages Duration: Bludgeoning, Piercing,
      Slashing, Fire, Cold, Wind, Earth, Lightning, Acid, Poison, Force, Necrotic, and Psychic.</p><p>You can only gain
      the benefit of this Vermilion Art once per casting. If you cast this Vermilion Art again, you do not gain 3
      additional resistances, instead choosing 3 new resistances to replace your old resistances.</p>
