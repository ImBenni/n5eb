name: Devilish Claws
type: feat
_id: 06aZQw8IZ5WW4iyg
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>Your Twisted Chakra forms claws that allow you greater destructive power.</p><p>You gain the following benefits
      only when you are gaining the benefits of Desperate Rage or Twisted Chakra Cloak:</p><p>• You can, as a Bonus
      Action, make an additional 2 unarmed attacks if you spent your action making unarmed attacks.<br />• When you hit
      a creature two or more times in a single turn using an unarmed attack, the target creature makes a Constitution
      saving throw, being Dazed on a failed save until the end of your next turn.<br />• You can make opportunity
      attacks without spending a reaction.</p><p>You gain the following benefits while you are under the effects of
      Twisted Chakra Cloak:</p><p>• You can add your Dexterity modifier to one of your claw attacks once per turn.<br
      />• A creature triggers an opportunity attack from you for every 10 feet they move within your melee range.<br />•
      Your claw attacks add your Sealed Beast Level to their damage rolls.</p>
