name: Devilish Flames
type: feat
_id: KHOR5MVvHa1dvjj4
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>Your Twisted Chakra has the ability to ignite like flames.</p><p>You gain the following benefits at all times,
      even without benefiting from any other Class Mod feature:</p><p>• You gain the Fire Release Affinity. Select 3
      Jutsu with the Fire Release keyword that you qualify for. Add them to your known Jutsu list immediately as if
      innately taught by your Sealed Beast. (If you have any preexisting Nature Release affinities, you also qualify for
      Jutsu with both the Fire Release Nature Release and the pre-existing Nature Release keywords.)</p><p>You gain the
      following benefits while you are under the effects of Desperate Rage or Twisted Chakra Cloak:</p><p>• Ninjutsu you
      cast with the Fire Release keyword cannot be negated or countered.<br />• You can cast Ninjutsu with the Fire
      Release keyword of B-Rank or lower without Handsigns (HS) components.<br />• Jutsu you cast with the Fire Release
      keyword ignore Damage Reduction and Resistance, and treat Immunity as Resistance.<br />• Creatures who are
      vulnerable to Fire damage instead take four times as much damage from your Fire Release Jutsu</p>
