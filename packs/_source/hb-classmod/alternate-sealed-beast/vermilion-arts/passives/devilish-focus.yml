system:
  description:
    value: >-
      <p>You can feel the ebb and flow of Twisted Chakra within you. You can feel how it meshes with your normal chakra,
      and every so often, you can feel it leak out into your normal chakra supply.</p><p>You gain the following benefits
      at all times, even without benefiting from any other Class Mod feature:</p><p>• Ninjutsu and Taijutsu you cast
      gain a +1 bonus to attack rolls.<br />• Genjutsu you cast gain a +1 bonus to save DCs.</p><p>You gain the
      following benefits while you are under the effects of Desperate Rage or Twisted Chakra Cloak:</p><p>• Ability
      checks made using Constitution are made at advantage.<br />• Ninjutsu and Genjutsu you cast do not cost chakra to
      concentrate on.</p>
