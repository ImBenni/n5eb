system:
  description:
    value: >-
      <p>Your Twisted Chakra reinforces your strength, allowing you to reach higher limits of your physical
      prowess.</p><p>• You gain a +2 bonus to your Strength ability score. You gain an additional +1 bonus equal to the
      Twisted Chakra Cloak stage you are benefiting from.<br />• Your maximum bulk is increased by 10.<br />• When you
      take damage from a melee attack, you can, as a reaction, reduce the damage taken by twice your Strength
      modifier.</p><p>You gain the following benefits while you are under the effects of Desperate Rage or Twisted
      Chakra Cloak:</p><p>• Vermilion Arts that require a melee attack of any type increase their damage die by +1.<br
      />• Unarmed attacks that you make cannot be made at disadvantage by any means.<br />• You can never be moved in
      any direction against your will.</p>
