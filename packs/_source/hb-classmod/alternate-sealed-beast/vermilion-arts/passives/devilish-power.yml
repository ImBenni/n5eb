system:
  description:
    value: >-
      <p>You are able to output a massive amount of force inherent to you due to your Twisted Chakra. This power acts
      like a steroid with seemingly no drawback. This strength feels bottomless.</p><p>You gain the following benefits
      while you are under the effects of Desperate Rage or Twisted Chakra Cloak:</p><p>• Taijutsu and Bukijutsu you cast
      apply your Proficiency bonus to damage rolls.<br />• Attacks, Jutsu, or Features that use your Strength and
      Vermilion Arts ignore Damage Reduction and Resistance and treat Immunity as Resistance.<br />• Taijutsu and
      Bukijutsu you are concentrating on cannot be ended by damage, being Incapacitated, or losing the ability to mold
      chakra.</p>
