folder: 1M8Ky2qsnELTvEZM
name: Devilish Presence
type: feat
_id: lIuMROAFgu9qyveC
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>The twisted chakra has found a way to move in and out of you, avoiding detection from the Seal. This chakra
      continues to flow around you in such a way that it reacts and begins to influence those around you.</p><p>You gain
      the following benefits at all times, even without benefiting from any other Class mod feature:</p><p>• You gain
      proficiency in Intimidation. If you already have proficiency, you instead add your Sealed Beast level to any
      ability check made to Intimidate.</p><p>You gain the following benefits while you are under the effects of
      Desperate Rage or Twisted Chakra Cloak:</p><p>• When you take an action to Intimidate a creature, all creatures of
      your choice within 90 feet of you can immediately feel your presence and the bloodlust it presents. Select
      creatures must succeed a Wisdom saving throw against your Vermilion Save DC. On a failure, they gain 3 ranks of
      fear against you for the next hour. Creatures with Chakra sight make this save at disadvantage. A creature
      affected by this feature, regardless of whether they pass or fail, becomes immune to further application of it for
      24 hours. You can use this feature once per short rest.</p><p>• When you would be banished, teleported, or moved
      by any means and you are required to make a saving throw of any type, you instead succeed automatically, suffering
      no effects. When a hostile creature would be banished, teleported, or moved by any means and they are within 30
      feet of you, you can spend 15 Twisted Chakra for each banished, teleported, or moved creature, forcing each one to
      make a Strength saving throw against your Vermilion Save DC. On a failed save, you pull them within 5 feet of you
      and they cannot be banished, teleported, or moved by anything else, except you, until the end of your next
      turn.</p>
    chat: ''
