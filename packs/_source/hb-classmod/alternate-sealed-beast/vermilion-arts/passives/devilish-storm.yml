system:
  description:
    value: >-
      <p>Your Twisted chakra has the ability to vibrate and electrocute like jolts of lightning.</p><p>You gain the
      following benefits at all times, even without benefiting from any other Class mod feature:</p><p>• You gain the
      Lightning Release Affinity. Select 3 Jutsu with the Lightning Release keyword that you qualify for. Add them to
      your known jutsu list immediately as if innately taught by your Sealed Beast. (If you have any preexisting Nature
      Release affinities, you also qualify for Jutsu with both the Lightning Release Nature Release and the pre-existing
      Nature Release keywords.)</p><p>You gain the following benefits while you are under the effects of Desperate Rage
      or Twisted Chakra Cloak:</p><p>• Ninjutsu you cast with the Lightning Release keyword cannot be negated or
      countered.<br />• You can cast Ninjutsu with the Lightning Release keyword of B-Rank or lower without Handsigns
      (HS) Components.<br />• Jutsu you cast with the Lightning Release keyword ignore Damage Reduction and Resistance,
      and treat Immunity as Resistance.<br />• Creatures who are vulnerable to Lightning damage instead take four times
      as much damage from your Lightning Release Jutsu.</p>
