system:
  description:
    value: >-
      <p>Your Twisted chakra has found a way to enhance your will. Your ability to push through has virtually tripled,
      and your ability to push forward with your ambition has also been magnified further.</p><p>You gain the following
      benefits at all times, even without benefiting from any other Class mod feature:</p><p>• You gain a +2 bonus to
      all Intelligence, Wisdom, and Charisma Saving throws.<br />• You have a +2 bonus to all Saving throws against
      Jutsu and Arts with the Fuinjutsu keyword.</p><p>You gain the following benefits while you are under the effects
      of Desperate Rage or Twisted Chakra Cloak:</p><p>• As a Bonus Action, you may spend 10 Twisted Chakra to
      immediately end any one Genjutsu effect on you.</p>
