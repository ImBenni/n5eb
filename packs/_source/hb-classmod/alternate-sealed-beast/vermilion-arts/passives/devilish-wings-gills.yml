system:
  description:
    value: >-
      <p>Your Twisted Chakra forms wings, gills, or claws that allow you the ability of special movement such as flight,
      swimming, or burrowing.</p><p>You gain the following benefits only when you are gaining the benefits of Twisted
      Chakra Cloak:</p><p>• You gain a flying, burrow, or swimming speed equal to your speed. (Choose one)<br />• When
      you would trigger an attack of opportunity while flying, swimming, or burrowing, the triggering attack is made at
      disadvantage.<br />• You can, as a reaction, use your wings or chakra arms to intercept an attack that would deal
      damage to you. Your wings have 40 hit points. When their hit points are reduced to 0, they are destroyed until you
      use a Full Turn Action and 15 Twisted Chakra to regenerate them.</p>
