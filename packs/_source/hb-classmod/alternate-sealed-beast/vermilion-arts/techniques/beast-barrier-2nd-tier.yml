system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a large barrier. All creatures of your choice in range other than you are
      treated as if they are sharing in all Twisted Hit Points you currently have left and become immune to the damage
      and all associated effects while you still have Twisted Hit Points.</p><p>If multiple creatures would take damage
      from a single casting of a jutsu or effect, you instead take the highest instance of damage, reducing your Twisted
      Hit Points by the result.</p>
    chat: ''
