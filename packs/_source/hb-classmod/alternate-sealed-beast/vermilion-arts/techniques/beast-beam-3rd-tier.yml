system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a 15-foot wide, 500-foot-long beam of destruction. All creatures who are in
      this beam's path must succeed a Dexterity Saving Throw.</p><p>On a failed save, creatures take 26d12 Necrotic
      damage. Additionally, any creature who failed their saving throw by 10 or more has all non-chakra enhanced weapons
      and equipment immediately destroyed by the destructive property of this Vermilion Art. On a successful save,
      creatures take half damage and suffer no further effects.</p><p>When you use this Vermilion Art, you cannot use it
      again until 1d4 of your turns have passed.</p><p><strong>Tier X</strong>: You can magnify your Vermilion Art
      beyond its base power. By increasing its Twisted Chakra cost by 5, you increase the Tier of this Art by 1. If you
      do, double the length of the line and increase its damage by 4d12 per tier.</p>
