folder: EyHfXjRUmFukBQmM
name: Beast Bomb 3rd Tier
type: spell
_id: WTIXpYw66ny1CM2k
img: systems/n5eb/assets/content/jutsu-icons/jinchuuriki.webp
system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a sphere of compressed malice, created from both Yin and Yang Release along
      with your blood. This ball compresses in your mouth before you release it like a cannon towards your
      target.</p><p>Make a Ranged Vermilion Attack dealing 30d12 Necrotic damage. Additionally, on a hit, the target is
      moved in a straight line until it reaches the end of this Art's range, and all creatures within 30 feet of the
      target's new location, excluding the target, must succeed on a Dexterity saving throw. On a failed save, they take
      20d10 Necrotic damage, or half as much on a successful save, as the Beast Bomb detonates.</p><p>If you miss your
      attack, your attack does not dissipate harmlessly. Instead, it continues in a straight line until it reaches the
      end of its range, or until it strikes another creature in its path or a structure. When it does, it explodes,
      forcing all creatures within 30 feet of its ending position to make a Dexterity saving throw. On a failed save,
      they take 20d10 Necrotic damage, or half as much on a successful save.</p><p>A straight line 15 feet wide and up
      to 500 feet long between you and your attack's ending destination is now counted as difficult terrain as your
      Beast Bomb tears through everything in its path.</p><p>When you use this Vermilion Art, you cannot use it again
      until 1d4 turns of your turns have passed.</p><p><strong>Tier X:</strong> You can magnify your Vermilion Art
      beyond its base power. By increasing its Twisted Chakra cost by 5, you increase the Tier of this Art by 1. If you
      do, double its range and increase the damage done by 4d12 and 4d10 respectively per tier.</p>
