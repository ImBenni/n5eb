system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a volley of smaller, less focused Beast Bombs. Roll 8d4. You generate that
      many smaller spheres of power that you fire wildly in a cone in front of you. All creatures in this cone's radius
      must succeed on a Dexterity saving throw. On a failed save, they take xd8 Necrotic damage, or half as much on a
      successful save. (X = The result of your 8d4 Roll.)</p><p><strong>Tier X:</strong> You can magnify your Vermilion
      Art beyond its base power. By increasing its Twisted Chakra cost by 5, you increase the tier of this art by 1. If
      you do, increase the size of the initial die by 1 step. (D6 &gt; D8 &gt; D10 &gt; D12)</p>
