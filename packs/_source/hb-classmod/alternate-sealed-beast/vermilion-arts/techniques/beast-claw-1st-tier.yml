system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a massive arm of chakra, usually in the shape of a claw or beast maw. Make a
      Melee Vermilion Attack. On a hit, you deal 16d12 Necrotic damage.</p><p>The target creature is then marked until
      the end of your next turn with your Twisted Chakra. If you attack a creature marked with your Twisted Chakra, you
      have advantage on the first attack roll made against them. If they would make a saving throw to resist a Vermilion
      Art you cast, they make the save at disadvantage.</p><p><strong>Tier X:</strong> You can magnify your Vermilion
      Art beyond its base power. By increasing its Twisted Chakra cost by 5, you increase the tier of this art by 1. If
      you do, increase the damage done by 6d12 per tier.</p>
