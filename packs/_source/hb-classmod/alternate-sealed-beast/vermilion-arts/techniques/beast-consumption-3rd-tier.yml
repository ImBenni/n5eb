system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a massive maw of chakra in the same shape as your beast's head or something
      similar, as it catches the attack in its mouth, consuming the chakra that constitutes the jutsu.</p><p>You ignore
      all damage and effects the jutsu would impose, instead gaining Twisted Hit Points equal to the amount of damage
      you would have taken, repairing any missing Twisted Hit Points your Twisted Chakra Cloak might be missing. Any
      excess past your maximum Twisted Hit Points becomes Temporary Hit Points.</p><p>When you use this Vermilion Art,
      you cannot use it again until 1d4 turns of your turns have passed.</p>
