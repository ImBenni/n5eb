system:
  description:
    value: >-
      <p>You use Twisted Chakra to upheave and destabilize an entire area. Your Twisted Chakra begins to seep into all
      creatures with chakra. Creatures within range must succeed a Constitution Saving Throw. On a failed save, they
      double the cost of all jutsu, features, and traits until the end of their next turn as your Vermilion chakra eats
      away at their chakra network. On a successful save, they instead cannot reduce the cost of any jutsu, features, or
      traits until the end of your next turn.</p>
