system:
  description:
    value: >-
      <p>You use the strength Twisted Chakra provides you to propel yourself faster than anything naturally occurring in
      nature can, going so far as to shatter sound and even crack the air. You extend your arm attempting to Lariat a
      creature you can see within range. Make a Melee Vermilion Attack against the target. On a hit, you slam your arm
      into them with all of the built-up force and inertia you've garnered from your movement. The target takes 30d8
      Necrotic Damage and must succeed a Strength saving throw. On a failed save, it is knocked prone and Dazed until
      the end of your next turn.</p>
