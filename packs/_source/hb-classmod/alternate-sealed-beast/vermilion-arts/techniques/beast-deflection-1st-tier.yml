system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a massive arm, shield, tail, or other appendage that your beast would have.
      When you do, you immediately use this appendage to smack away an attack that would have dealt damage to you,
      completely converting its force into a shockwave. Roll 10d12 + Your Character Level, reducing the damage you would
      take by the result. Then, the triggering creature and all creatures in a 15-foot cone must succeed a Dexterity
      saving throw, taking damage equal to the amount you reduced the triggering attack by.</p>
