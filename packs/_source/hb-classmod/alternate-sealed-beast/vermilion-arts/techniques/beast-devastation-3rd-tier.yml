system:
  description:
    value: >-
      <p>You use Twisted Chakra to undo the fabric of what is real and what isn't, as your beast's will is forced upon
      the world itself. Select a space you can see within 120 feet of you. You generate a temporary construct of chakra
      emulating your Sealed beast, which performs a series of attacks on the area before then dissipating. All creatures
      (except you) in a 90-foot cube on the chosen space must do one of the following:</p><ul><li><p><strong>Strength
      Saving Throw:</strong></p><ul><li>On a failed save, each target is crushed beneath the weight of your Sealed
      beast's chakra construct, taking 25d12 Necrotic Damage, or half as much on a successful
      one.</li></ul></li><li><p><strong>Dexterity Saving Throw:</strong></p><ul><li>On a failed save, each target takes
      30d10 Necrotic Damage, or 1/3rd as much on a successful one.</li></ul></li><li><p><strong>Constitution Saving
      Throw:</strong></p><ul><li>On a failed save, each target takes 38d8 Necrotic Damage, or 1/4th as much on a
      successful one.</li></ul></li></ul><p>A creature who is reduced to 0 hit points by this Art is turned into Twisted
      Chakra and consumed by your Twisted Chakra Cloak, unable to be revived by any means. You regain 10 Twisted Hit
      Points for each creature killed by this Art.</p>
