system:
  description:
    value: >-
      <p>You use Twisted Chakra to create a field of influence around yourself. You do not pay Chakra cost to maintain
      this Vermilion Art. For the duration, you are aware of all creatures and effects within the radius. You cannot be
      surprised. Attacks against you deal reduced damage equal to twice your level in this class mod. Creatures in this
      radius always count as being seen or heard for the purpose of casting jutsu or Vermilion Arts.</p><p>This Art can
      be dispelled by effects that would end a jutsu's duration. If attempted, use your Vermilion Art DC.</p>
