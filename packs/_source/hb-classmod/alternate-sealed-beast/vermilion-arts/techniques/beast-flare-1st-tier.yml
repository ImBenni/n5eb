system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a gargantuan explosion of deteriorating Twisted chakra. All creatures within
      range must succeed a Constitution saving throw, taking <strong>15d12 Necrotic damage</strong> on a failed save and
      becoming <strong>blinded</strong> until the end of their next turn, <strong>weakened</strong> for the next minute,
      and <strong>dazed</strong> for the next hour.</p><p><strong>Tier X:</strong> You can magnify your Vermilion Art
      beyond its base power. By increasing its Twisted Chakra cost by 5, you increase the tier of this Art by 1. If you
      do, increase the size of the sphere by 20 feet and its damage by 3d12 per tier.</p>
