system:
  description:
    value: >-
      <p>You use Twisted Chakra to generate a shockwave of force when you roar. All creatures who are in this cone must
      succeed a <strong>Strength Saving throw</strong>. On a failed save, creatures are thrown back <strong>90
      feet</strong>, falling prone and being dazed until the end of your next turn. If they would stop their movement by
      impacting a structure or another creature, both creatures and structures take <strong>double falling
      damage</strong> as if they fell an equivalent distance.</p><p><strong>Tier X:</strong> You can magnify your
      Vermilion Art beyond its base power. By increasing its Twisted Chakra cost by 5, you increase the tier of this Art
      by 1. If you do, increase the size of the cone by <strong>20 feet</strong> per tier.</p>
