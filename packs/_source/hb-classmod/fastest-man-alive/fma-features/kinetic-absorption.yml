name: Kinetic Absorption
type: feat
_id: 1RFErFP4L2yfXtvO
img: systems/n5eb/assets/content/items/7796026653.webp
system:
  description:
    value: >-
      <p>You have learned to absorb the energy around you, enhancing your speed even more. When you take lightning
      damage, you increase your movement speed by the amount of damage you take rounded up to the nearest 10th, this
      boost ends on your turn. You may also, as an action, cause everyone within 15ft of you to make a constitution
      saving throw, on a fail, their movement speeds are halved and you increase your movement speed by the amount they
      lost. You also have advantage on the first attack roll made against one of the people you siphoned</p><p>At level
      4 of this class mod, If your movement speed is over 400ft after you do this, you release a powerful burst of
      energy, everyone within 40ft of you must make a strength save, on a fail they take Xd8 Force damage, X being your
      movement speed divided by 30, rounded down, on a failed save, and they are pushed 15ft back, as well as being
      knocked prone. On a successful they take half damage, and are only pushed 10ft back. Everyone within 10 miles
      hears a deafining burst. Everyone within 200ft of the burst, including you mut make a constitution saving throw,
      on a failed save they are deafened.</p>
    chat: ''
