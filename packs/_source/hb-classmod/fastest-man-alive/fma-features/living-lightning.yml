system:
  description:
    value: >-
      <p>At 2nd level of this class mod, you begin to collect an aura of lightning around you while this class mod is
      active. You have a seperate pool of hit points that is equal to 50 times your level in this class mod. And when
      somoene hits you while this is active, they take 1d6 lightning damage. This pool of hit points is immune to
      lighnting damage, and replenishes on a long rest.</p><p>at 5th level, you gain it for 100 times your level in this
      class mod, and the damage increases to 1d10.</p><p>When you would take lightning damage this hit pool recovers HP
      equal to half of the lightning damage dealt instead of taking damage. This occurs even if it was already at 0.</p>
