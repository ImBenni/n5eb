system:
  description:
    value: >-
      <p>Every time you level up this class mod you increase your movement speed by the amount stated in the table
      above. You also can do the following on your turn, while you have swift release chakra.</p><p>When you dash you
      can spend 5 Kinetic chakra to triple your movement speed instead.</p><p>When you take the dodge action you can
      spend 5 kinetic chakra to impose a minus 3 penalty to any attack rolls made against you.</p><p>When you take the
      disengage action, you can spend 5 chakra to increase your movement speed by 20ft.</p>
