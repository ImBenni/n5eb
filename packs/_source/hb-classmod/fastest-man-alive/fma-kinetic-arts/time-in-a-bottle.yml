system:
  description:
    value: >-
      <p><strong>Cost:</strong> 30 Kinetic Chakra, and you gain 10 Drained points</p><p><strong>Potential
      Energy:</strong> You gain 5 Potential Energy</p><p>You Increase your speed, and perception of the world for one
      round, everything goes completely still, your movement speed is tripled, but to you it feels as if you are moving
      normally. You can take 1d4+1 rounds, but the art ends the moment you effect another creature negatively, including
      damage, negative effects, etc. But you can move people around. You also can magnify this art by gaining an
      additional 5 ranks of drain, and adding an additional 1d4+1 rounds. For every two magnifications, you gain an
      additional 5 drain on top of the already added drain.</p>
