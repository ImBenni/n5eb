system:
  description:
    value: >-
      <p><strong>Cost:</strong> 15 Kinetic Chakra, and you gain 3 Drained points</p><p><strong>Potential
      Energy:</strong> You gain 2 Potential Energy</p><p>Everyone within the 150ft cone, must make a strength save as
      you violently rotate your arms. On a failure, they are pushed back 30ft, and take 5d8 bludgeoning and 5d8 wind
      damage as they are tossed around in the wind. For every person within the the tornado, you add an extra 1d8 damage
      of each type when rolling. All fire is put out within the cone, as you suck out a lot of the air within the
      cone.</p>
