name: Control Mechanism
type: equipment
_id: PRIW5ol0xFM3s1Fq
img: icons/equipment/neck/torc-striped-blue.webp
system:
  description:
    value: >-
      <p>You gain a new item known as the <em><strong>Control Mechanism (CM)</strong></em>. The flavor for this item is
      up to the player/DM and can be anything from a shock collar to a magical crown. The CM has a number of charges
      equal to half your proficiency bonus per rest. Anytime you are under the Berserk condition, you may spend 1 charge
      to clear yourself of any number of ranks of Berserk. For each rank of Berserk you clear as a result of this item,
      you gain +5 Temporary Hit Points until the end of the current combat.</p>
