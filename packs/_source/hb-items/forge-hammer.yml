system:
  description:
    value: >-
      <p>a Forge Hammer and equip it. </p><p>Forge Hammers are small blacksmith hammers in appearance, deal 1d6 + your
      Strength Mod in Bludgeonin damage, have the Light and Thrown (30/60) properties, and belong to the Power weapon
      group. </p><p>While equipped, you cannot be disarmed of your Forge Hammer, and it cannot be destroyed by way of
      jutsu. </p><p>Stronger kits produce stronger Forge Hammers, with each stage of kit greater adding a +1 to the
      Forge Hammer (Greater Charge = +1, Superior Charge = +2, Supreme Charge = +3). </p><p>Beginning at 11th level,
      your Forge Hammers base damage becomes 1d10 + your Strength Mod.</p>
