name: Goddess Artifact
type: equipment
_id: nsorJupo3NgoJXhx
img: icons/commodities/treasure/broach-crown-gold.webp
system:
  description:
    value: >-
      <p>This artifact can be any item of your description, weighs 1 bulk, and if for any reason it is destroyed or
      lost, it returns to you at the conclusion of a rest or after 12 hours have passed. This artifact has a number of
      charges equal to your proficiency bonus per long rest. When you cast a Ninjutsu, you may spend 1 charge (or 3
      chakra, if you have no charges remaining) to add your Goddess Artifact as a component, granting your jutsu the
      following benefits;</p><ul><li>You ignore the HS and CS components.</li><li>You gain a +1d6 bonus to clash
      checks.</li><li>Your jutsu gains an additional two die of damage or healing, once per casting.</li><li>Your jutsu
      can target an additional creature (if it could already target multiple creatures for its rank) or increases its
      range and area of effect by 15 feet and 5 feet respectively (Pick one).'</li><li>You treat any 1s or 2s rolled on
      jutsu's damage or healing die, as 3s.</li></ul>
    chat: ''
