items:
  - name: Clown Belt
    type: feat
    _id: 78gbcDzYvAoBskvX
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p><span style="font-family:Times New Roman">Crown Clown Has a natural weapon known as the clown belt which
          has the following statistics: Clown Belt, 2d6, Piercing, Reach X (X= Your proficiency bonus), Disarm, Trip,
          Grapple, Winding, Tactical, Blade. Weapon attacks and bukijutsu that use this weapon may use constitution for
          attack, damage and save DC's calculations. Additionally this weapon gains all the benefits of any seals that
          Innocence(Cross) is gaining the benefits of.</span></p>
        chat: ''
