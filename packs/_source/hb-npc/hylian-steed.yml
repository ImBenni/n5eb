  - name: Ethereal Form
    type: feat
    _id: um5tahWvvnmC1Q9p
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>The Hylian Steed can carry up to 2 medium sized creatures, or 1 large creature. The Hylian Steed protects
          itself and its riders from the first 60 feet of fall damage, afterwhich both the rider and mount take fall
          damage as normal. In combat, the Hylian Steed disappears at the end of its summoner's turn. The Hylian Steed
          also disappears if you are unmounted from it and it cannot see you for an entire minute. When the Hylian Steed
          disappears, all riders and objects it was carrying fall gently to the ground.</p>
        chat: ''
