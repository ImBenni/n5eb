    system:
      description:
        value: >-
          <p>The Hylian Steed ignores difficult terrain, has double its normal jump height, and has a water walking
          speed equal to its movement speed. While mounted on the Steed, the rider can spend their bonus action, a
          number of times equal to your Charisma modifier (Min. 1) per long rest, to double to Steed's movement speed
