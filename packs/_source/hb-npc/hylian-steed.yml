  - name: Sage Beast
    type: feat
    _id: fTEpdLXKhdUUSzp7
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>Your Hylian Steed takes the hit die, skill proficiencies, statistics, and summon features of the <a
          href="https://homebrewery.naturalcrit.com/share/19qNYpTtJV0OFJoliy1pe-lrAkw6Xz4jRh76oE-t7ppvi">Horse
          Summon</a> (This summon can be found in the Team 7 Compendium) of the Summoning Technique. Your Steed's rank
          counts as your highest known jutsu rank. Ability score improvements and summon features your Steed takes,
          cannot be changed once distributed. Your Steed's size can never be greater than large. The Hylian Steed begins
          with all 3 D-Rank features of the Horse Summon, and gains an additional rank based feature each time your rank
          would increase. The Hylian Steed cannot take traits that would allow it to deal damage or attack, as it cannot
          attack itself (It may take traits that would enable a rider to boost their attack or damage roll,
          however).</p>
        chat: ''
      source:
        custom: ''
        rules: n5eb
        book: Homebrew
