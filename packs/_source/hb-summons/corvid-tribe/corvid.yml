system:
  description:
    value: >-
      <p>Corvid are sociable and clever creatures, known for their ability to form bonds and their somewhat
      opportunistic nature. The Corvids follow those with a clear mind and whose ends justify their means.</p><hr
      /><p><strong>Summon Type</strong>: Avian</p><p><strong>Toughness</strong>: 6</p><p><strong>Defensive Ability
      Score</strong>: Dexterity</p><p><strong>Saving Throws</strong>: Intelligence, Wisdom,
      Dexterity</p><p><strong>Creature Skills</strong>: Acrobatics, Insight, Stealth</p><p><strong>Creature
      Senses</strong>: Darkvision (90ft), Keen Sight</p><hr /><h2
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);margin:0px 0px
      0.5rem;padding:0px;font-weight:normal;font-size:1.5em;border-bottom:1px solid
      var(--color-underline-header);color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"><span
      style="font-family:Signika, sans-serif">Roles</span></h2><ul><li><p
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif"><strong>Controller</strong>: This summon gains a bonus to their Save DC
      equal to their rank when summoned (D-Rank/C-Rank: +1, B-Rank/A-Rank: +2, S-Rank:
      +3)</span></p></li><li><p><strong>Lurker</strong>: <span style="font-family:Signika, sans-serif">This summon gains
      the <strong
      style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
      var(--color-scrollbar-track)">Lethal Attack</strong> trait, being able to deal additional damage, when they score
      an attack on a surprised creature. Different tribes have alternative conditions to trigger this effect. It costs a
      number of Jutsu Slots equal to the Summons Rank to trigger this effect. (D-Rank/C-Rank: 1 Slot, B-Rank/A-Rank: 2
      Slots, S-Rank: 3 Slots)</span></p></li></ul>
