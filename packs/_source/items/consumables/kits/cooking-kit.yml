name: Cooking Kit
type: tool
img: icons/containers/bags/satchel-worn-leather-red.webp
system:
  description:
    value: >-
      <p>This kit includes all of the necessary implements to prepare and serve food for up to six people at any single
      time.</p><p>Proficiency with this kit lets you add your proficiency bonus to any skill checks you make to identify
      or create food or involved with using this kit.</p><p>While you have proficiency with this kit you can also use it
      to do the following; Cook meals with beneficial effects, Create cooked food rations and Military Ration
      Pills.</p><hr /><p><strong>Cooking Meal.</strong></p><p>By spending 1 charge, you can spend one hour of leisure
      time or the duration of a short rest cooking a reinvigorating meal for up to six creatures.</p><p>A creature who
      would benefit from this meal gains a number of temporary hit points equal to the Quality of this cooking
      kit.</p><p>(Base: 15, Greater: 20, Superior: 30, Supreme: 45).</p><hr /><p><strong>Creating Cooked Food
      Rations.</strong></p><p>By spending 1 charge, you can spend 1 hour of leisure time or the duration of a short rest
      creating and maintaining dried meats, veggies and herbs condensed into an edible block of foodstuff similar in
      texture to a cookie, known as a Cooked Food Ration.</p><p>Creatures who eat this Food Ration are satiated and do
      not need to eat for the next 24 hours.</p><p>At the conclusion of this period of time spend doing this, you create
      5 food rations.</p><hr /><p><strong>Military Ration Pills.</strong></p><p>By spending at least 1 charge, you can
      spend 1 hour of leisure time or the duration of a short rest creating and maintaining special herbs, minerals and
      other nutrient rich foods condensed into an edible ball of foodstuff similar in texture to a cookie, known as a
      Military Ration Pill.</p><p>When you do, you create a number of single use Military Ration pills of a quality
      equal to the quality of this Kit, equal to the number of charges spent.</p><p></p>
