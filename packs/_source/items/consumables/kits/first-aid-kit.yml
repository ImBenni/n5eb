name: First Aid Kit
type: tool
img: icons/containers/bags/sack-simple-leahter-green.webp
system:
  description:
    value: >-
      <p>A common First Aid Kit can be stocked with recovery potions, and contains bandages, bone stabilizers,
      antiseptics, and other essentials for the treatment of wounds.</p><p>As an action, you can expend two uses of the
      kit to stabilize a creature that has 0 hit points, without needing to make a Wisdom (Medicine) check which
      automatically removes one failed death save, if any.</p><p>Alternatively, this First Aid Kit can be used over the
      course of a Short or Long rest.</p><p>When used in this way spend 1 use of this First Aid Kit per creature you
      want this kit to affect.</p><p>Affected Creatures gain an additional 2d4 Hit points back over the course of its
      short or 3d6 Hit points over the course of its long rest.</p><p></p>
