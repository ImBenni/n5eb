name: Superior Disguise Kit
type: tool
img: icons/containers/bags/pack-silver-purple.webp
system:
  description:
    value: >-
      <p>This pouch of cosmetics, hair dye, and small props lets you create disguises that change your physical
      appearance without the use of the Transformation Jutsu.</p><p>Proficiency with this kit lets you add your
      proficiency bonus to any skill checks you make to create a disguise.</p><p>While you have proficiency and access
      to this Kit you can do the following; Create a Disguise of varying complexity.</p><p>When creating a disguise of
      any type, you spend one charge of this kit and create a small satchel or collection of clothing, materials and
      whatever else needed to don the disguise.</p><p>You cannot don your disguise and your armor, unless armor is a
      part of the disguise.</p><p>When you would don any disguise you've previously made, it takes 30 minutes of
      preparation and work to apply the disguise.</p><p>Creating a disguise will place its wearer into a variety of
      situations where their identity can be compromised.</p><p>A creature suspicious of a disguised individual or group
      of individuals can make a Wisdom (Insight) vs the creator of the Disguises Intelligence or Charisma (Disguise Kit)
      to see through the disguise.</p><p>A creature who fails their insight check may lower their suspicions for the
      moment, but it does not make those wearing the disguise immune to any further checks.</p><hr /><p><strong>Plain
      Disguise (1 Charge).</strong></p><p>A simple change like a superficial scar, a costume change or applying a small
      temporary tattoo.</p><p>These are quick to make and only take 10 minutes to develop the disguise.</p><hr
      /><p><strong>Elaborate Disguise (2 Charges).</strong></p><p>Somewhere between being very fast and time consuming
      to assemble.</p><p>In 1 hour or over the course of a short rest, you can create a large tattoo, dye your hair, or
      put on complex dresses like those huge ballroom gowns or craft extremely convincing copies of seemingly exclusive
      articles of clothing.</p><p>Doubling the time, it takes to make this type of disguise gives all Insight checks
      made to see through this disguise disadvantage.</p><hr /><p><strong>Exquisite Disguise (3
      Charges).</strong></p><p>Requiring the most work, taking its creator a minimum of 4 hours to create.</p><p>These
      disguises include things like using makeup to give yourself an entirely new face, creating entirely new costumes,
      or creating a new persona for a performance.</p><p>Doubling the time, it takes to make this type of disguise gives
      all Insight checks made to see through this disguise disadvantage.</p><p></p><p>Gain a +1d4 bonus to Charisma
      checks while disguised and reduce the time to done a disguise to 1 minute.</p>
