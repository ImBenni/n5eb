name: Superior Medicine Kit
type: tool
img: icons/containers/bags/pouch-leather-yellow.webp
system:
  description:
    value: >-
      <p>This kit includes all of the necessary implements to perform complex medical inquiries and procedures while not
      in a medical facility supported by sterilized environments, allowing you to diagnose and even treat issues such as
      broken bones, open wounds and even providing immediate care to people who are on death's door making death saving
      throws.</p><p>Proficiency with this kit lets you add your proficiency bonus to any skill checks you make to
      perform medical tasks, light healing, condition treatment, stabilization and create Blood Pills.</p><hr
      /><p><strong>Medical Check Up (1 Charge).</strong></p><p>By spending 1 charge over the course of 10 minutes, you
      are able to assess the current status of up to 6 creatures informing them of all conditions, diseases, poisons or
      effects, affecting them at the moment, and how to cure/remove it.</p><hr /><p><strong>Light Patch up (X
      Charge(s)).</strong></p><p>You select one creature within 5 feet of you.</p><p>For the next 10 minutes, you spend
      time patching them up.</p><p>Spend any number of charges.</p><p>For each charge spent, the creature regains 2d4
      hit points.</p><hr /><p><strong>Full Fix up (2 Charges).</strong></p><p>You select one creature within 5 feet of
      you.</p><p>As an action, you stab them with an adrenal fluid meant to stave off death.</p><p>Remove one failed
      death save from them.</p><hr /><p><strong>Stabilization (3 Charges).</strong></p><p>Select one creature who is
      dying or making death saving throws within 5 feet of you.</p><p>By spending 3 charge, you are able to stabilize
      them at 0 hit points.</p><p>Doing this removes up to 2 failed death saves.</p><hr /><p><strong>Condition Treatment
      (3 Charges).</strong></p><p>Select one creature who is within 5 Feet of you.</p><p>Over the course of 10 minutes
      to 1 hour you are able to treat a creature curing them of a number of conditions they are currently under the
      effects of.</p><p>Roll 1d6.</p><p>The result is the number of minutes spent performing such a treatment times
      10.</p><hr /><p><strong>Blood Pill Creation (2 Charge(s)).</strong></p><p>By spending at least 2 charge, you can
      spend 1 hour of leisure time or the duration of a short rest creating blood increasing stimulants in the form of a
      pill, known as a Blood Pill.</p><p>When you do, you create a number of single use Blood pills of a quality equal
      to the quality of this Kit, for every 2 Charges spent, you create one single use Blood Pill.</p><p></p><p>Rank of
      Condition Removed A-Rank.</p><p></p><p>Can use this Kit to gain the benefit of an equal Quality Antidote Kit and
      Medkit.</p>
