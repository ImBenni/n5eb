name: Supreme Alchemist Kit
type: tool
img: icons/containers/bags/pouch-leather-leaf-green.webp
system:
  description:
    value: >-
      <p>This Kit contains all the necessary implements to create and test the properties of different chemicals
      solutions and concoctions.</p><p>These implements would include a variety of different stable elements, mixing
      solutions, and stabilizing tablets.</p><p>Proficiency with this kit allows you to add your proficiency bonus to
      all checks involving this kit and also allows you to do the following; Test Chemical Properties, Create Compounds,
      Create Concoctions and Create Chemical bombs.</p><hr /><p><strong>Create Chemical Bombs (X
      Charge(s)).</strong></p><p>By spending 1 hour or over the course of a short rest and up to 2 charges, you spend
      time mixing a collection of different solutions together.</p><p>When you do you can create a number of the
      following up to the number of charges spent of a quality equal to the quality of this kit; Smoke Bombs, Ice Bombs
      or Chili Pepper Bombs.</p><hr /><p><strong>Create Chemical Compounds.</strong></p><p>By spending at up to 2
      charges, you spend 1 hour of leisure time or the duration of a short rest mixing and maintaining a stable compound
      meant to reinvigorate a user's Chakra network, known as a Chakra Pill.</p><p>When you do, you create a number of
      single use Chakra pills of a quality equal to the quality of this Kit, equal to the number of charges
      spent.</p><hr /><p><strong>Test Chemical properties (1 Charge).</strong></p><p>By spending 4 hours or over the
      course of a long rest, you can take any object or consumable comprised of a liquid or solid matter and do
      alchemical analysis on it.</p><p>When you do, you become aware of its benefits, risks, limitations, and what kit
      can be used to recreate it, if any.</p>
