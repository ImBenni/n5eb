name: Supreme Armorsmith Kit
type: tool
img: icons/containers/bags/pouch-leather-gold-grey.webp
system:
  description:
    value: >-
      <p><span dir="ltr">This Kit contains all the necessary implements to create armor of varying
      types.</span></p><p><span dir="ltr">Proficiency with this kit allows you to add your proficiency bonus to all
      checks involving this kit and also allows you to do the following; Craft Armor and Armor Seals.</span></p><p><span
      dir="ltr">While you have access to this kit, each time you would attempt to Craft armor or an Armor Seal, you
      spend a charge of your Armorsmith kit as some tools break, become brittle or have wear and tear on
      them.</span></p><p><span dir="ltr">This kit grants a creature the ability to create up to C- Rank Armor
      Seals.</span></p><p><span dir="ltr">Higher quality Armorsmith Kits, will allow a creature to create higher ranked
      armor seals at reduced ryo OR downtime costs as seen on the Armorsmith Chart on the following
      page.</span></p><p><span dir="ltr">If this would reduce the total downtime cost of an item to 0, you would instead
      only spend 1 week.</span></p><p></p><p>Swift Craft DC: 18</p><p></p><p><span dir="ltr">Gain a +1d4 bonus to all
      checks made to create Armor or Armor Seals, increase the per week Market value contribution on items you are
      crafting with this kit by 150 Ryo and when you make a Swift Craft check, increase the Ryo Bonus to 200 for every
      +3 you get over the listed DC.</span></p>
