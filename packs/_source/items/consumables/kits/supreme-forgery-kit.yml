name: Supreme Forgery Kit
type: tool
img: icons/containers/bags/pack-leather-silver-pink.webp
system:
  description:
    value: >-
      <p>This small box contains a variety of papers and parchments, pens and inks, seals and sealing wax, gold and
      silver leaf, and other supplies necessary to create convincing forgeries of physical documents.</p><p>Proficiency
      with this kit lets you add your proficiency bonus to any skill checks you make to do the following; create a
      physical forgery of a document, Badges, ID's, and signatures.</p><p>A creature who interacts with your forgeries
      may attempt to see through it if they are unsure of its validity.</p><p>If they do, they make an Intelligence
      (Investigation) check vs an Intelligence, Dexterity, or Wisdom (Forgery Kit) check (DM's choice based on the type
      of forgery.)</p><p>A creature who fails cannot find any issues or faults with the forgery.</p><hr
      /><p><strong>Simple Forgeries (1 Charge).</strong></p><p>A simple forgery is a quick and typically uninvolved
      forging of a signature, creating a simple letterhead or copying the handwriting of another
      individual.</p><p>Simple forgeries take no more than 10 minutes and require an example of what is being
      forged.</p><hr /><p><strong>Complicated Forgeries (2 Charges).</strong></p><p>A complicated forgery is a forgery
      that requires more involvement from the preparer.</p><p>This includes perfectly copying or rewriting an entire
      handwritten document of no more than one page, while adding or removing text, words or sentences.</p><p>Creating
      new letterheads with gold or silver foil.</p><p>Copying a complex drawing or sketch.</p><p>Or recreating the frame
      of a wax seal.</p><p>A complicated forgery requires no more than 1 hour an example of what is being forged.</p><hr
      /><p><strong>Exquisite Forgeries (3 Charges).</strong></p><p>Exquisite Forgeries involve expert skill and insight,
      along with vast amounts of time and patience.</p><p>Over the course of 8 hours or a long rest, you can recreate
      any multiple page document regardless of length, create old and new wax seals, create impossible to distinguish ID
      cards for a single creature, recreate portraits.</p><p>Some tasks may require more than 8 hours of uninterrupted
      work and instead may require multiple days of work (DM's discretion).</p><p></p><p>Gain a +1d4 bonus to
      Intelligence checks made with this kit, by spending an additional charge, you can reduce the DC of the check by -1
      for every charge spent).</p>
    chat: ''
