name: Supreme Security Kit
type: tool
img: icons/containers/bags/pack-leather-strapped-tan.webp
system:
  description:
    value: >-
      <p>A security kit includes the tools and mechanical components necessary to bypass electronic and mechanical
      locks.</p><p>It includes sensor devices, a specialized Radio link designed to detect silent alarms, a small file,
      a set of lockpicks, a small mirror mounted to an elongated handle, a set of narrow-bladed scissors, and a pair of
      pliers.</p><p>Proficiency with these tools let you to do;</p><hr /><p><strong>Pick locks (1
      Charge).</strong></p><p>By spending a minimum of 1 Action based on Lock Quality as shown on the Locks
      Table.</p><p>Make five Dexterity, Intelligence or Wisdom (Security Kit) check vs the Lock DC, you can choose to
      roll all at once or one at a time.</p><p>By spending additional charges, you gain a +2 bonus to your Security Kit
      check results for each charge spent.</p><p>You must spend the charges prior to making the check.</p><p>If you
      chose to roll all five checks at once you can pre-spend as many charges as you desire, then apply each +2 bonus to
      each die then add your Dexterity, Intelligence or Wisdom (Security Kit) bonus to each result to speed things
      up.</p><p>Based on the amount of failures you have vs the quality of the lock, you either pass and successfully
      unlock the lock or fail and break the locks inner workings jamming it.</p><hr /><p><strong>Disarm Traps (2
      Charges).</strong></p><p>As an action you begin to attempt to disarm a live trap.</p><p>Make a single Dexterity,
      Intelligence or Wisdom (Security Kit) check vs the Disarm DC of the target trap.</p><p>On a success you disarm the
      trap.</p><p>On a failure the trap triggers making you the triggering creature.</p><p>By spending additional
      charges, you gain a +2 bonus to your Security Kit check results.</p><p></p><p>Gain a +1d4 bonus to two checks made
      to pick a lock or one check to disarm a trap and reduce the DC of Disarming traps by 2 and reduce the time to pick
      a lock by 1d10 minutes (Min of 1 Round.).</p>
