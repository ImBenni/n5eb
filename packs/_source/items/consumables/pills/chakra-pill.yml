system:
  description:
    value: >-
      <p><span id="page201R_mcid13" class="markedContent"><span dir="ltr">An edible pill that contains a drug designed
      to super </span><span dir="ltr">charge the person who consumes it, bodies, stamina </span><span
      dir="ltr">recovery.</span> </span></p>

      <p><span id="page201R_mcid13" class="markedContent"><span dir="ltr">Consuming a chakra pill takes a bonus action.
      </span></span></p>

      <p><span id="page201R_mcid13" class="markedContent"><span dir="ltr">A Creature who takes this pill regains Chakra
      points </span><span dir="ltr">equal to the quality of the pill consumed.</span></span></p>

      <p><span id="page201R_mcid14" class="markedContent"><span dir="ltr">A creature can only regain chakra artificially
      in this </span><span dir="ltr">way a limited number of times.<br />You can regain chakra </span><span
      dir="ltr">using this consumable 5 times per long rest. </span></span></p>

      <p><span id="page201R_mcid14" class="markedContent"><span dir="ltr">If you</span> <span dir="ltr">would
      </span><span dir="ltr">attempt to consume this pill any additional time after </span><span dir="ltr">this use
      limit, you spend 1 chakra die, and regain 1d4+1.</span></span></p>
