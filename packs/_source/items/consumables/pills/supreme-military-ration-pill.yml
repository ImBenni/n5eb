name: Supreme Military Ration Pill
type: consumable
img: icons/commodities/gems/pearl-beige-smooth.webp
system:
  description:
    value: >-
      <p><span id="page201R_mcid9" class="markedContent"><span dir="ltr">An edible pill that contains a drug designed to
      super </span><span dir="ltr">charge the</span> <span dir="ltr">person who consumes it, bodies, </span><span
      dir="ltr">regeneration speed.</span> </span></p>

      <p><span id="page201R_mcid9" class="markedContent"><span dir="ltr">Consuming a military ration pill </span><span
      dir="ltr">takes a bonus action.</span> </span></p>

      <p><span id="page201R_mcid9" class="markedContent"><span dir="ltr">A</span> <span dir="ltr">c</span><span
      dir="ltr">reature who takes this pill gains </span><span dir="ltr">Temporary</span> <span dir="ltr">Hit</span>
      <span dir="ltr">&amp; Chakra</span> <span dir="ltr">points</span> <span dir="ltr">equal to the quality
      </span><span dir="ltr">taken</span> <span dir="ltr">for 1 hour.</span></span></p>

      <p><span id="page201R_mcid9" class="markedContent"> <span dir="ltr">Taking another dosage of this item does
      </span><span dir="ltr">not</span> <span dir="ltr">stack.</span> <br /><span dir="ltr">I</span><span
      dir="ltr">nstead, it will replace however much you </span><span dir="ltr">originally had. </span></span></p>

      <p><span id="page201R_mcid9" class="markedContent"><span dir="ltr">You cannot gain the benefit of this Pill
      </span><span dir="ltr">more than twice in a single 24</span><span dir="ltr">-</span><span dir="ltr">hour
      Perio</span><span dir="ltr">d.</span></span></p>
