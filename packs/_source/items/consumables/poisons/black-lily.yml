system:
  description:
    value: "<p><span dir=\"ltr\">This poison is crafted from the mysterious Black lotus Lilly.</span></p><p><span dir=\"ltr\"> This flower is so poisonous, when it grows it usually kills all wildlife within 1 mile of it.</span></p><p><span dir=\"ltr\"> This flower is known to grow once every year in the Black Forest, in the land of fire.</span></p><p><span dir=\"ltr\"> A creature subjected to this poison must succeed a DC 23 Constitution saving throw taking 15d8 poison damage every hour for the next 5 hours and gains the poisoned condition.</span></p><p><span dir=\"ltr\"> If a creature is within 5 feet of another creature while breathing, the unaffected creature has to succeed a DC 18 Saving throw suffering the same effects as the original creature.</span></p><p><span dir=\"ltr\"> This poison can be nullified by a Jutsu or effect of no less than S-Rank.</span></p><p></p><p>\_</p><p><span dir=\"ltr\">Effective Rank: S-Rank</span></p><p><span dir=\"ltr\">Poison Craft DC: 36</span></p>"
