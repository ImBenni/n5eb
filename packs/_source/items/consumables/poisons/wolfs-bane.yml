      damage, and being slowed for the duration of the poison or half as much on a successful save.</p><p>A creature
      subjected to this poison via a weapon attack must succeed a DC 16 constitution saving throw taking 5d6 poison
      damage on a failed save and half as much on a success.</p><p></p><p>Effective Rank: C-Rank</p><p>Poison Craft DC
      25</p>
