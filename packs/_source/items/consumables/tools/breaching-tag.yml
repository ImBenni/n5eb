name: Breaching Tag
type: consumable
img: icons/sundries/documents/document-symbol-rune-brown.webp
system:
  description:
    value: >-
      <p>A Ninja Tag used to blow holes in larger structures, a breaching Tag creates a devastating explosion.</p><p>
      Installing a breaching Tag takes 1 minute.</p><p> The tag can be set with a 6-second timer, or detonated remotely
      using a remote detonator seal within 250 Feet of the set Tag.</p><p> This item is 1 Bulk Once detonated, the
      breaching charge explodes, damaging the section of wall up its attached, up to 10 feet wide, 10 feet tall, and 5
      feet thick.</p><p> Each creature within 20 feet must make a Dexterity saving throw taking the listed damage on a
      failed save, or half as much on a successful one.</p><p> A construct makes this save with disadvantage.</p><p> If
      the breaching charge is installed on the construct, it automatically fails the saving throw and takes the maximum
      possible damage.</p><p> Finally, all constructs and structures take triple damage from this item.</p>
