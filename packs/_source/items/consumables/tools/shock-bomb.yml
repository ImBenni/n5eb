name: Shock Bomb
type: consumable
img: icons/commodities/gems/pearl-storm.webp
system:
  description:
    value: >-
      <p>Shock Bombs are usually used when the object of a mission is to detain, capture, or subdue rather than
      kill.</p><p> Shock Bombs have a range equal to 30 feet + your Strength modifier x 5.</p><p> As an action, you can
      throw a Shock Bomb at a point you can see within range.</p><p> Each creature within 10 feet must make a DC 15
      Dexterity saving throw.</p><p> A creature takes 4d6 lightning damage on a failed save, or half as much as on a
      successful one.</p><p> Additionally, on a failed save, the creature is shocked until the end of its next
      turn.</p><p></p>
