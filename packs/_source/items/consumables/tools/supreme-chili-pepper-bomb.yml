system:
  description:
    value: >-
      <p><span dir="ltr">A small sphere the size of a golf ball that when thrown against a solid surface, explodes into
      a Thick red mist up to 10 feet high and 5 feet wide before dissipating within 1 minute.</span></p><p><span
      dir="ltr"> When used creates a hazy red fog that doesn't obscure vision, but causes a direct nasal stimulation to
      creatures in its radius.</span></p><p><span dir="ltr"> All creatures in the affected area who begins its turn in
      the mist, can remake any saving throw to resist or end a genjutsu at the beginning of their turns, regardless of
      the effects of the genjutsu itself.</span></p><p><span dir="ltr"> A creature can only gain the benefit of this
      item twice per use.</span></p><p><span dir="ltr">Grants Advantage on Genjutsu+1d12 to Saves.</span></p>
