name: Supreme Flash Tag
type: consumable
img: icons/sundries/documents/document-symbol-lightning-brown.webp
system:
  description:
    value: >-
      <p>Flash tags are paper bombs repurposed to create an extreme source of white light meant to cause temporary
      visual impairment.</p><p>Flash Tags can be set to detonate on impact or set with a timer that lasts several
      seconds before detonating.</p><p>Flash Tags have a range equal to 30 feet.</p><p>As an action, you can throw a
      Flash Tag at a point you can see within range.</p><p>Each creature within 10 feet must make a Wisdom saving
      throw.</p><p>A creature becomes blind until the end of their turn on a Failed save or suffer no negative effects
      on a successful save.</p><p>This item is 1 Bulk Flash Tags can be affixed to Kunai.</p><p>When they are the range
      of the Flash Tag becomes wholly reliant on the kunai itself.</p><p>When affixed.</p><p>The next time the affixed
      Kunai would deal damage to a creature, the Flash Tag detonates.</p><p>A creature who took damage from the kunai
      prior to it detonating makes their saving throw at disadvantage.</p><p>Blinded for 1d4 rounds.</p>
