name: Supreme Poison Tag
type: consumable
img: icons/sundries/documents/document-symbol-skull-tan.webp
system:
  description:
    value: >-
      <p><span dir="ltr">Poison Tags are used to flush enemies out of cover through poisoning them.</span></p><p><span
      dir="ltr"> Poison Tags have a range equal to 30 feet + your Strength modifier x 5.</span></p><p><span dir="ltr">
      As an action, you can throw a Poison tag at a point you can see within range.</span></p><p><span dir="ltr"> The
      tag explodes in a 15ft radius sphere of green fog centered the chosen point.</span></p><p><span dir="ltr"> The fog
      spreads around corners, counts as heavily obscured and lasts for 1 minute or until a breeze or gust of wind
      disperses it.</span></p><p><span dir="ltr"> When a creature enters the fog's area for the first time on a turn or
      starts its turn there, it must make a Constitution saving throw, being Poisoned and taking 1d8 poison damage on a
      failed save, or half as much damage and no addition effects on a successful one.</span></p><p><span dir="ltr">
      Constructs and Creatures wearing appropriate protective equipment are unaffected.</span></p><p><span dir="ltr">
      This item is 1 Bulk Poison Tags can be affixed to Kunai.</span></p><p><span dir="ltr"> When they are the range of
      the Poison Tag becomes wholly reliant on the kunai itself.</span></p><p><span dir="ltr"> When
      affixed.</span></p><p><span dir="ltr"> The next time the affixed Kunai would deal damage to a creature, the Poison
      Tag detonates.</span></p><p><span dir="ltr"> A creature who took damage from the kunai prior to it detonating
      makes their saving throw at disadvantage</span></p><p><span dir="ltr">Extra 5 rank of Envenom</span></p>
    chat: ''
