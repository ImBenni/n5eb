name: Deadfall Trap [S]
type: consumable
img: icons/magic/earth/projectiles-stone-salvo.webp
system:
  description:
    value: >-
      <p>A weight-sensitive plate buried underneath sand or a sensitive wire holding a boulder, large tree or some other
      Large object over a cliff ledge, causing it to fall on targets within 45 feet of the target space.</p><p>Select a
      15-foot cube shaped space as the trigger space, if this trap is set to a trigger.</p><p>Next select a 15-foot
      wide, 60-foot line that this trap affects.</p><p>All ranges and spaces must be selected prior to the activation of
      this trap.</p><p>All creatures in the lines range must make a Saving throw, taking 2d10 + (5 times Rank)
      bludgeoning damage, or half as much on a success.</p><p></p><p>Build DC: 31</p><p>Notice/Disable DC:
      24</p><p>Toolkit Req to create/disable: Trappers kit</p>
