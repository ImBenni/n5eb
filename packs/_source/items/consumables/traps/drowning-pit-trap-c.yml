name: Drowning Pit Trap [C]
type: consumable
img: icons/environment/traps/steel.webp
system:
  description:
    value: >-
      <p>A trapdoor covers a 10-foot- square pit that's 30 feet deep and has 5 feet of water at the bottom.</p><p>Four
      water spouts in the walls connect to hidden water tanks.</p><p>Each water spout extends out of a different wall, 6
      inches from the top of the pit.</p><p>A creature who walks onto the trap door triggers this trap.</p><p>The
      triggering creature falls into the pit and takes falling damage.</p><p>A creature can attempt to make their saving
      throw to avoid falling in on a success.</p><p>Regardless the trapdoor then immediately closes shut, and this trap
      rolls Initiative using a +10 bonus.</p><p>As an action and Bonus action the trap fills the pit with 5 feet of
      water for each action spent.</p><p>This trap loses its bonus action when 2 of the water spouts are disabled, and
      its Action when all 4 of the water spouts are disabled.</p><p>If the pit would fill with water up to the top (30
      feet), the trap stops filling with water, and the creature inside begins drowning.</p><p>This trap can be reset by
      reengaging the door and refilling the water tanks.</p><p></p><p>Build DC: 19</p><p>Notice/Disable DC:
      19</p><p>Toolkit Req to create/disable: Trappers kit</p>
