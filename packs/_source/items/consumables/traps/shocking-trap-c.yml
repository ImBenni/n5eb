system:
  description:
    value: >-
      <p>You create an explosive trap that utilizes multiple Shock Bombs of the same type that all explodes with a
      creature enters the traps space , or when the trap is manually triggered.</p><p>This trap is set on a 5-foot
      space.</p><p>All creatures within 10 feet of this trap when it is triggered makes its saving throw taking 8d6
      lighting damage on a failed save or half as much on a success.</p><p>A creature who fails their saving throw by 5
      or more, takes double damage.</p><p></p><p>Build DC: 19</p><p>Notice/Disable DC: 18</p><p>Toolkit Req to
      create/disable: Hackers kit + 2 Shock Bombs</p>
