system:
  description:
    value: >-
      <p>You create a trap that utilizes multiple small weapons (Kunai, Shuriken, Senbon etc.) that all fire
      overwhelming the target space when a creature enters the traps square, or when the trap is manually
      triggered.</p><p>This trap is set on a 5-foot space.</p><p>All creatures within 15 feet of this trap when it is
      triggered makes its saving throw taking 9d4 Slashing or Piercing damage (Pick one) on a failed save or half as
      much on a success.</p><p>A creature who fails their saving throw by 5 or more, takes double damage and gains 2
      ranks of bleeding.</p><p></p><p>Build DC: 15</p><p>Notice/Disable DC: 16</p><p>Toolkit Req to create/disable:
      Trappers kit + Weapon Scroll</p>
