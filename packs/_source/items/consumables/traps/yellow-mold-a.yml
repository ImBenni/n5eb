system:
  description:
    value: >-
      <p>You cultivate a poisonous spore of mold that assaults nearby creatures.</p><p>This trap is triggered when a
      creature moves into the molds space, damages, or fails to disable the mold.</p><p>When the trap is triggered, all
      creatures within 10 feet are exposed to the mold.</p><p>They must make a Saving throw every turn for the next
      minute.</p><p>Each failed save inflicts them with 1 rank of the envenomed condition, which persists for 24
      Hours.</p><p></p><p>Build DC: 27</p><p>Notice/Disable DC: 26</p><p>Toolkit Req to create/disable: Cooking Kit</p>
