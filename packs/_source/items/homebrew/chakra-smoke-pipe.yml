name: Chakra Smoke Pipe
type: weapon
img: icons/sundries/misc/pipe-bone.webp
system:
  description:
    value: >-
      <p>A chakra empowered smoke pipe, due to its small nature the materials used make it easy and cheap to
      manufacture. <br />It is said that the natural chakra of the body is capable of influencing this pipe and make it
      work even without herbs or tabacco. <br />Even if possible to use in the traditional way, those who can infuse a
      tiny chakra into it, will make it work without the necessary herbs, it is said that each chakra release gives off
      different scents and taste. <br />The basic chakra apparently gives off a taste and smell of vanilla or mint but
      results vary on the user.</p>
