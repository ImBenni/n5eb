folder: Hh9rkM90eYXBcRAJ
name: Weights Of Youth
type: equipment
_id: MSNcEjzG9BBiOknk
img: icons/commodities/metal/pin-cottar-steel.webp
system:
  description:
    value: >-
      <p>Training Weights are specially designed weights intended to aid Shinobi in their training by effectively adding
      a handicap.</p><p>The idea behind training weights is that by training with them equipped, a Shinobi is able to
      master combat with these restrictions, allowing them to perform significantly better once removed than if they
      trained without them.</p><p>You can equip a one as an Action.</p><p></p><p>Wearing a Training Weight:</p><p>While
      wearing a Training Weight, you suffer a penalties to movement speed (Min. 5ft), as well as attack rolls, skill
      checks, and saving throws that rely on Strength or Dexterity.</p><p>Also, while wearing a Training Weight, you
      reduce the Downtime needed to learn, create, or modify Taijutsu and Bukijutsu by as specified
      amount.</p><p></p><p>Removing a Training Weight:</p><p>You may remove your Training Weights as a bonus
      action.</p><p>When you do, if you've worn the weight for at least one day and remove it starting from the 3rd
      round of combat, you gain the benefits of that specific weight's Might for the next 3 rounds in combat.</p><p>You
      can only benefit from Might, from any weight, once per full rest.</p><p></p><p>Adapting to a Weight:</p><p>After a
      specified length of time as denoted your DM, your character become accustomed to the weight provided by your
      Training Weights, preventing you from gaining any bonuses or detriments from Training Weights of that specific
      weight or lower.</p><p>There is no set amount of rules to determine if a character has become accustomed to a
      training weight, though variables such as "How long as this character been using this weight?", "How many
      Taijutsu/Bukijutsu have they learned with these weights?", "How many times has this character removed these
      weights in combat?"</p><img src="systems/n5eb/assets/content/cheat-sheets/training-weights.webp" /><p></p>
