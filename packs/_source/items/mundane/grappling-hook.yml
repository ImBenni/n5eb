name: Grappling Hook
type: tool
img: icons/tools/fishing/hook-multi-steel-brown.webp
system:
  description:
    value: >-
      <p><span dir="ltr">You can throw a grappling hook with a rope tied to it to make a climb easier, when wall walking
      is out of the question.</span></p><p><span dir="ltr">To anchor a grappling hook, make a Strength or Dexterity
      (Survival) check vs the anchors DC, which is based on the target anchoring condition.</span></p><p><span
      dir="ltr">On a success, your hook has a firm hold, but if you fail by 5 or more, the hook seems like it will hold
      but actually falls when you're partway up.</span></p><img
      src="systems/n5eb/assets/content/cheat-sheets/grappling-hook-dc.webp" /><p></p><p></p>
