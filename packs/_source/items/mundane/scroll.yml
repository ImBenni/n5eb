name: Scroll
type: loot
img: icons/sundries/scrolls/scroll-bound-black-tan.webp
system:
  description:
    value: >-
      <p>ITEM SCROLL</p><p>This scroll is designed with the intent to seal, and store up to 5 Bulk worth of tools,
      objects, or miscellaneous items.</p><p>Items can be stored in this scroll at a rate of 1 bulk per 10 minutes of
      downtime or during downtime.</p><p>You could also purchase these scrolls with items already sealed into
      them.</p><p>Such scrolls usually only have a single object sealed inside of it.</p><p>The more rare or expensive
      the item, the scroll usually will reflect this cost but with an additional tax for the time used to seal the
      item.</p><p>Item Scrolls can be withdrawn from as a bonus action.</p><p></p><p>WEAPON SCROLL</p><p>This scroll is
      designed with the intent to seal, and store Single weapons of no greater than 5 Bulk.</p><p>Weapons sealed this
      way usually require 1 hour of prep time to seal into a scroll due to their size in comparison to smaller items in
      an Item Scroll.</p><p>Weapons seals inside of a Weapon scroll can be summoned from the scroll on command as a
      bonus action.</p><p>Doing this does destroy the scroll in the process.</p><p>When you store Weapons with the
      ammunition quality, you store 1 full stack (1d8 Ammunition Die) of the weapons in a scroll.</p><p>You can as a
      Bonus action restore your Ammunition die of that weapon type, by expending a weapon scroll, with those weapons
      sealed inside them.</p><p>Doing this does destroy the scroll in the process.</p><p></p><p>JUTSU SCROLL</p><p>A
      Jutsu scroll bears the words, formula's and concepts behind a single Ninjutsu or Genjutsu, written in a mystical
      cipher.</p><p>If you have a jutsu sealed inside the scroll on your known jutsu list, you can read and cast the
      stored jutsu as an action without providing any additional components.</p><p>Otherwise, you require a Ninshou for
      Ninjutsu or Illusion for Genjutsu, skill check to determine the jutsu sealed inside the scroll.</p><p>The DC
      equals 15 + The Jutsu's rank (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S- Rank: 5).</p><p>This DC can be
      increased or decreased at the DM's discretion based on the probability of you seeing or hearing about this jutsu
      if at all.</p><p>Scrolls found or purchased with a Jutsu sealed inside the Scroll have a predefined Save DC and
      attack bonus based on the rank of the jutsu used.</p><p>If you want to seal a Jutsu inside a blank Jutsu scroll,
      it requires a Ninshou or Illusions check based on the jutsu sealed, and Downtime to do it.</p><p>Once a Jutsu
      Scroll has been used, it is destroyed.</p><p></p><img src="systems/n5eb/assets/content/cheat-sheets/scrolls.webp"
      />
