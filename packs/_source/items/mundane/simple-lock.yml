name: Simple Lock
type: loot
img: icons/sundries/misc/lock-bronze-reinforced.webp
system:
  description:
    value: >-
      <p>A mundane but extremely common accessory which is employed all across the ninja world for mechanical and most
      standard non-electronic doors or latches.</p><p>All locks are made of Steel or Iron and have an AC of 20 with a
      number of hit points equal to 15 x their Quality multiplier.</p><p>All locks regardless of quality requires a
      Security Kit to pick and all has its own lockpick DC, number of allowable failed attempts before the lock jams and
      breaks, and total time needed to complete the process.</p><p>All locks require a total of 5 checks using the
      Security Kit to complete the challenge (This only spends one use of the Kit).</p><p>Unlike most other ability
      challenges, a creature only fails if they fail to meet the Lockpick DC a number of times equal to the Failed
      attempts column on the Lock(s) table.</p><p>If a lock is broken or destroyed, depending on the type of lock broken
      or destroyed it may permanently seal or prevent normal entry into the container or area the lock was used to
      seal.</p><img src="systems/n5eb/assets/content/cheat-sheets/locks.webp" />
