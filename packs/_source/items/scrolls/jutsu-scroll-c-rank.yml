system:
  description:
    value: >-
      <p>A Jutsu scroll bears the words, formula's and concepts behind a single Ninjutsu or Genjutsu, written in a
      mystical cipher. If you have a jutsu sealed inside the scroll on your known jutsu list, you can read and cast the
      stored jutsu as an action without providing any additional components.</p><p>Otherwise, you require a Ninshou for
      Ninjutsu or Illusion for Genjutsu, skill check to determine the jutsu sealed inside the
      scroll.</p><p><strong>Downtime Cost: </strong>3-Weeks<strong><br />Save DC: </strong>17<strong><br />Attack
      Bonus:</strong> +9</p><p>This DC can be increased or decreased at the DM's discretion based on the probability of
      you seeing or hearing about this jutsu if at all. Scrolls found or purchased with a Jutsu sealed inside the Scroll
      have a predefined Save DC and attack bonus based on the rank of the jutsu used. If you want to seal a Jutsu inside
      a blank Jutsu scroll, it requires a Ninshou or Illusions check based on the jutsu sealed, and Downtime to do it.
      Once a Jutsu Scroll has been used, it is destroyed.</p>
