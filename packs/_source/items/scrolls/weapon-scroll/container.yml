      in</p><p>comparison to smaller items in an Item Scroll. Weapons seals inside</p><p>of a Weapon scroll can be
      summoned from the scroll on command</p><p>as a bonus action. Doing this does destroy the scroll in the
      process.</p><p>When you store Weapons with the ammunition quality, you store</p><p>1 full stack (1d8 Ammunition
