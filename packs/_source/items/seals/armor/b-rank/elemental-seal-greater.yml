system:
  description:
    value: >-
      <p>Armor imbued with this seal gains a +1 to AC and can apply its Damage reduction (if any) to elemental
      damage.</p><p>When this seal is added to your armor, select one Nature Release from the following list.<br />You
      cannot change this choice, once made;</p><ul><li><p>Earth Release – Earth Damage</p></li><li><p>Wind Release –
      Wind Damage</p></li><li><p>Fire Release – Fire Damage</p></li><li><p>Water Release – Cold
      Damage</p></li><li><p>Lightning Release – Lightning Damage</p><hr /></li></ul><p>If the armor this seal is applied
      to has no innate Damage Reduction, then you instead apply half of its armor bonus as if it was Damage reduction to
      the chosen damage type.</p><p></p>
