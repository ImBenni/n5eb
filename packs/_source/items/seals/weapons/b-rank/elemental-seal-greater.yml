system:
  description:
    value: >-
      <p>Weapons imbued with this seal can have its damage type changed by its wielder at will.</p><p>When this seal is
      added to your weapon, select one Nature Release from the following list.<br />You cannot change this choice, once
      made;</p><ul><li><p>Earth Release – Earth Damage</p></li><li><p>Wind Release – Wind Damage</p></li><li><p>Fire
      Release – Fire Damage</p></li><li><p>Water Release – Cold Damage</p></li><li><p>Lightning Release – Lightning
      Damage</p></li></ul><p>Once per turn, as an object interact action, the holder can switch this weapons damage type
      to the chosen Nature releases damage type.</p><p>The weapon still qualifies for Bukijutsu that its original damage
      type would allow it to be cast with and deals an additional 1d4 of their chosen nature releases, damage
      type.</p><p>This does not stack with other Seals that grant dice-based bonuses to damage rolls.</p><p></p>
