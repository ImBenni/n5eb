name: Barrier Seal (Refined)
type: consumable
img: icons/magic/symbols/runes-carved-stone-red.webp
system:
  description:
    value: >-
      <p>Weapons imbued with this seal can be used to set up barriers in a 5-foot cube around its user.</p><p>As an
      action or reaction to taking damage or failing a saving throw vs a Ninjutsu, Taijutsu, Genjutsu or Bukijutsu, the
      holder can activate this ward, erecting a Barrier large enough to protect only themselves or another
      creature.</p><p>This barrier reduces the damage the target takes by an amount equal to this weapon wielders level,
      until the end of the current turn.</p><p>This seal comes with 3 charges per long rest and each activation of the
      Barrier consumes one charge.</p><p>Once all charges are expended, the Barrier cannot be used.</p><p>You regain one
      charge on a short rest.</p><p></p>
