name: Luminary Seal (Refined)
type: consumable
img: icons/magic/symbols/runes-carved-stone-red.webp
system:
  description:
    value: >-
      <p>Weapons imbued with this seal are capable of glowing with a luminescent light while in the wielders hand using
      their chakra.</p><p>As a bonus action, you may cause an emission of dim light in 15 feet and bright light in 5
      feet to come from your weapon for the next hour, once per rest.</p><p>Depending on whether your weapon is melee or
      ranged, you gain access to an additional effect while this light is active:</p><ul><li><p>Melee: As an action, you
      may make a weapon attack at a target within your weapon's range +15ft.</p><p>On a hit you deal your [Weapon's
      Damage].</p><p>If you can make more than one weapon attack with the attack action, without the aid of jutsu,
      increase the damage die of this attack by +1 for each attack beyond one you could make.</p><p>The damage dealt is
      force damage.</p></li><li><p>Ranged: All attacks with your ranged weapon produce the same light of this seal where
      they travel and where they land.</p><p>As an action, you may make a weapon attack at a target within your weapon's
      range.</p><p>On a hit you deal your [Weapon's Damage].</p><p>If you can make more than one weapon attack with the
      attack action, without the aid of jutsu, increase the damage die of this attack by +1 for each attack beyond one
      you could make.</p><p>The damage dealt is force damage.</p></li></ul>
