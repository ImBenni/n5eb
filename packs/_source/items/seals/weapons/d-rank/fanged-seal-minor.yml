system:
  description:
    value: >-
      <p>While etched with this seal, the weapon glows a faint orange color during full moons.</p><p>Select one
      Carnivoran summon type found in the Summoning Jutsu Chapter of Jiraiya's Jutsu Compendium.</p><p>As an action, the
      wielder can transform into a D-Rank Sage Beast without any of its Special Features or the ability to cast its
      Jutsu specialty once per long rest.</p><p>When the wielder transforms their armor, weapons and items fuse into
      them for the duration.</p><p>You retain your AC, ability scores, proficiencies and languages but you gain the
      creatures special senses (if any), special movement speeds, the ability to communicate with it and other animals
      of its type (Carnivoran) and its natural weapons.</p><p>You can remain in this form for 10 minutes.</p><p></p>
