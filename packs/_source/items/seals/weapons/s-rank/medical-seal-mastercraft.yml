system:
  description:
    value: >-
      <p>Weapons imbued with this seal can have its damage type changed by its wielder at will.</p><p>When this seal is
      added to your weapon, select one Medical Release damage type from the following list.</p><p>You cannot change this
      choice, once made;</p><ul><li><p>Acid Damage</p></li><li><p>Necrotic Damage</p></li><li><p>Poison
      Damage</p></li></ul><p>Once per turn, as an object interact action, the holder can switch this weapons damage type
      to the chosen Nature releases damage type.</p><p>The weapon still qualifies for Bukijutsu that its original damage
      type would allow it to be cast with and increases its damage by +1 weapon damage die that deal their chosen damage
      type.</p><p>This does not stack with other Seals that grant dice-based bonuses to damage rolls.</p>
