system:
  description:
    value: >-
      <p><strong>EVOCATION</strong></p><p>This property is exclusive to Combat Scrolls.</p><p>When you first gain a
      weapon with this property, select one Ninjutsu, Genjutsu or Weapon you have access to that deals damage.</p><p>You
      seal an echo of that Jutsu or weapon into this weapon as this [Weapons Damage] type becomes the damage type of the
      Jutsu or Weapon echo you sealed, but does not add your ability modifier to damage rolls and you can make no more
      than 1 attack with this weapon when you take the attack action.</p><p>If you sealed a Ninjutsu Echo, you make
      attacks using your Ninjutsu attack bonus.</p><p>If you sealed a Genjutsu Echo, you make attacks using your
      Genjutsu Attack bonus.</p><p>If you sealed a Weapon, you make attacks using your Taijutsu attack bonus.</p><p>At
      character levels 5, 11 and 17, increase the damage this weapon uses by +1 damage die (2dX/3dX/4dX).</p><p>While
      wielding this weapon, it fulfils all Chakra Seal (CS) and Scroll requirements (Both weapon scroll and Blank
      Scrolls).</p><p>This weapon cannot be used as part of the casting of a Bukijutsu.</p>
