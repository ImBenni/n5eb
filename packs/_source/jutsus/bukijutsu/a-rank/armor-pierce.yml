system:
  description:
    value: >-
      <p>You prepare a full power shot, putting all of your weight and momentum behind it. If this jutsu is cast
      targeting a creature who is gaining the benefit of the Dodge action, you do not make the attack at disadvantage.
      If this jutsu is cast targeting a creature who is gaining the benefits of Temporary hit points, Damage Reduction
      or Resistance, you ignore them for this attacks and damage rolls. Make a ranged Taijutsu attack dealing your
      [weapons damage] + 6d8.If you critically hit with this attack, you reduce the targets DR from armor by half until
      it is repaired.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by +4, if this jutsu is cast as
      a Chain 3, increase the damage die by an additional +2.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above A-Rank, increase the cost of this jutsu by 3 and the damage by 2d8.</p>
