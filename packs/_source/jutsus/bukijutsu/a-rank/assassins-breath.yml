system:
  description:
    value: >-
      <p>You enter a state of utmost stillness, moving no muscles not even your lungs. You take in a large breath and
      hold it, preparing for a perfect shot while regulating your body with you own Chakra instead of breathing. During
      this time you can't speak or breathe as you remain as absolutely still as possible to take your shot.</p><p>While
      this jutsu is active, the [weapons damage] of your thrown weapons is rolled at advantage, and deals an additional
      die of damage (Two if your die size is a D4) additionally, for each Weapon and Taijutsu attack you hit while
      benefitting from this jutsu you deal additional damage equal to your proficiency bonus twice per creature, per
      turn. Finally, at the end of each of your turns, you must make a Chakra Control check to upkeep this stance
      benefits, where the DC equals 13+Number of rounds this jutsu has been active</p>
