system:
  description:
    value: >-
      <p>You strike your foe into the air before quickly following up with a strike to slam them down. A target creature
      in range must make a Strength Saving Throw, taking your [weapons damage] on a failure. You then can make a Melee
      Taijutsu attack at advantage against a creature who fails, dealing your [weapons damage] +6d10 on a success and
      knocking them prone and inflicting 2 ranks of weakened.</p><p>At Higher Ranks: For each rank you cast this above
      A- Rank, increase the cost by 3. If this jutsu is cast at S- Rank, you can instead force all creatures in weapons
      range to make the Strength Saving Throw.</p>
