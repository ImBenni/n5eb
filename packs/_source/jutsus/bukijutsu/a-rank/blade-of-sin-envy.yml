system:
  description:
    value: >-
      <p>You seek to emulate the power of one of the Seven Deadly Sins of Humanity in your blade, imbuing the Sin of
      Envy inside the edge. Make a Melee Taijutsu attack against a creature in range. On a hit you deal your [weapons
      damage] +5d8 and if the target creature is gaining any type of positive buff from a jutsu, feature or trait they
      must make a Constitution Saving Throw. On a failed save any dice-based benefits they receive from the jutsu
      feature or traits is reduced by 1 step (d12&gt;d10&gt;d8&gt;d6&gt;d4&gt;0)and you gain a d4 bonus of the same
      benefit until the end of your next turn</p><p>If this jutsu is cast as a Chain 2, increase the damage die by +5,
      if this jutsu is cast as a Chain 3, additionally you reduce their benefits by 2 steps and you gain a d6 bonus
      instead.</p><p>At Higher Ranks: For every rank you cast this jutsu above A-Rank, increase the cost by 3 and the
      damage by 2d8.</p>
