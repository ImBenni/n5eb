name: Blood Shot
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>Your blood begins to rush as you prepare a shot using ammunition with this rush. Until the start of your next
      turn, any time you would deal damage to a creature with a ranged weapon, which deals piercing damage, the creature
      gains 1 rank of bleeding.</p><p>A creature cannot gain more than 5 ranks of bleeding in this way, as a result of
      this jutsu.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank increase the cost of this jutsu
      by 3. Starting at S-rank, the duration becomes concentration, up to 1 minute, and a creature cannot gain more than
      5 ranks of bleeding from this jutsu per turn.</p>
