name: Breath of Moon Catastrophe
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You collect and manifest a dark chakra until it laces the striking portion of your weapon, curving it like a
      crescent moon. Each swing creates distortions in the area, devastating the terrain and manifesting waves of force
      capable of obliterating everything in its path. All creatures in a 30-foot-cone, originating from you, must make a
      Dexterity saving throw, taking 5d12 slashing damage on a failed save, or half as much on a success. Until the end
      of your next turn, you can cast a Bukijutsu with the "Breath of Moon Prefix "using either your Action, Bonus
      Action or Reaction, ignoring its listed casting time.</p>
    chat: ''
