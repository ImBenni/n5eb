system:
  description:
    value: >-
      <p>You collect and manifest a dark chakra until it laces the striking portion of your weapon, curving it like a
      crescent moon. Each swing creates distortions in the area, devastating the terrain and manifesting waves of force
      capable of distorting space, removing all in its way. Make a melee Taijutsu attack, dealing your [weapons damage]
      + 7d12 ignoring Resistance and treating immunity as resistance. Until the end of your next turn, you can cast a
      Bukijutsu with the "Breath of Moon Prefix"using either your Action, Bonus Action or Reaction, ignoring its listed
      casting time</p>
