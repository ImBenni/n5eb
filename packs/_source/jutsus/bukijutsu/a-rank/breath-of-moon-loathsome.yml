name: Breath of Moon Loathsome
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You collect and manifest a dark chakra until it laces the striking portion of your weapon, curving it like a
      crescent moon. Each swing creates distortions, devastating the terrain and manifesting waves of force. You swing
      your weapon twice with such ferocity, that the space around you distorts removing the distance between you and
      another creature. Select a creature you can see within range as you cut through the distance, teleporting to a
      space adjacent to the target that can hold you. Make two melee Taijutsu attacks, dealing your [weapons damage] +
      4d12. Until the end of your next turn, you can cast a Bukijutsu with the "Breath of Moon Prefix"using either your
      Action, Bonus Action or Reaction, ignoring its listed casting time</p>
    chat: ''
