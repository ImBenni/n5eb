system:
  description:
    value: >-
      <p>You first launch a fist full of throwing weapons towards a target to break their focus. Make a ranged Taijutsu
      attack. On a hit, you deal your thrown [weapons damage] + 3d8, which is then follow up with a Powerful
      Swing.</p><p>Make a melee Taijutsu attack, dealing your [weapons damage] + 6d10. If your first attack hits, this
      one is made at advantage.</p><p>If this jutsu would score a critical hit, you can choose to either maximize damage
      or double your damage die as normal.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank,
      increase the cost of this jutsu by 3 and Damage by 1d8 &amp; 1d10, respectively.</p>
