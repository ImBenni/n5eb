name: Deadly Ranged Connection
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You perform a series of quick attacks with enough force to penetrate steel. Make 3 ranged Taijutsu attacks
      against a target within range, dealing your [weapons damage die] + 3d4 and gains the bleeding condition on each
      hit.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by +4, if this jutsu is cast as a Chain 3,
      increase the damage die by an additional +2, additionally, if you land all attacks, the creature suffers a rank of
      lacerated, in place of any bleed.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank increase
      the cost of this jutsu by 3 and the number of attacks by +1</p>
