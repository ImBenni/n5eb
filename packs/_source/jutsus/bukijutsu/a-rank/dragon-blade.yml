  description:
    value: >-
      <p>You coat your blade in flowing chakra in the shape of a fierce dragon that guides your strikes. Until the start
      of your next turn, your weapon deals 2 additional damage dice in force damage, double your movement speed, and
      increase your AC by +1.</p><p>Additionally, when you reduce a creature's hit points to 0, you can make a single
      melee weapon attack. You can make this additional attack a number of times equal to your Taijutsu ability modifier
      (Max of 5).</p>
