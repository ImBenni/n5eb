system:
  description:
    value: >-
      <p>You aim your weapon and coat it in a twisting chakra that and then becomes a pair of dragons that spiral around
      each other when you fire, expanding until the weapon is completely obscured. All creatures in a 90 feet long, 15
      feet wide line, originating from you, must make a Dexterity saving throw taking 8d10 force damage on a failed
      save, or half as much damage on a successful one.</p><p>At Higher Ranks: For every rank you cast this jutsu above
      A-Rank, increase the cost by 3 and the damage by 2d10</p>
