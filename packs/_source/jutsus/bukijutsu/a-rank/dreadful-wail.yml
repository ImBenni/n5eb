system:
  description:
    value: >-
      <p>The practitioner assumes a balanced stance, distributing weight evenly between both feet to enable fluid
      movement and swift transitions. The grip on the weapon is firm yet flexible, allowing for precise control during
      both the throwing motion and flight trajectory adjustments. With a fluid motion, the practitioner launches the
      weapon with precision, directing its path toward the intended target.</p><p>The weapon slices through the air with
      remarkable speed, generating a distinct whistling sound as it accelerates towards its destination. Select one
      target within your weapons range, and make a single Taijutsu Attack against them, this attack cannot be made at a
      disadvantage.</p><p>On a hit, the weapon is thrown with formidable force enough to overcome any armor, Ignoring up
      to 10 DR and resistance, treating immunity as Resistance and dealing [weapons damage] + 6d8. If you beat the
      targets AC by 5 or more, they suffer a -1 to their AC for the duration of the combat.</p><p>If this jutsu is cast
      as a Chain 2, increase the damage die by +4, if this jutsu is cast as a Chain 3, increase the damage die by an
      additional +2, additionally, this jutsu ignores full DR</p><p>At Higher Ranks: For each rank you cast this above
      A- Rank, increase the cost by 3, the damage by 2d8. Starting at S-rank, this jutsu ignores immunity</p>
