name: Eclipsed Sun Impacts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You move with purpose and your weapon follows a predestined path. You strike fast enough to leave ripples in
      the air and surrounding gasses as your weapon ignites upon impact. Make a melee Taijutsu attack, dealing your
      [weapons damage] + 6d8. The target also gains 2 ranks of burned.</p><p>If this jutsu is cast as a Chain 2,
      increase the damage die by +6, if this jutsu is cast as a Chain 3, increase the damage die by 1 step.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and Damage by
      1d8.</p>
