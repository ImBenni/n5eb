    value: "<p>As a part of casting this jutsu, you must have a nature release or be able to cast a jutsu with a nature release keyword.</p><p>When you would suffer the effects of any elemental damage, you can call upon your own nature release to attempt a violent counter strike.</p><p>Roll your weapons damage die + Xd12, where x is your proficiency bonus, and record the result.</p><p>If your result is higher than the\_ damage you would take, you immediately counter the triggering\_ damage effect as if you had won a clash, dealing the result to all creatures of your choice within 10 feet of you.\_</p>"
