system:
  description:
    value: "<p>You inject chakra into every muscle you have and begin to exercise mental control over your body moving at the speed of thought. For the duration, increase your initiative by +10, moving yourself up in the initiative count based on this new bonus.</p><p>When you make Dexterity saving throws roll an additional 2d20 and take the highest roll. You cannot gain advantage on Dexterity saving throws. You also gain one additional Reaction and Bonus action.<br />When this jutsu ends, you are moved down 3 spaces in the initiative count and become stunned until the end of your next turn.\_\_</p>"
