    value: >-
      <p>You swing your blade from such a low angle it's almost as if it rose from the hells themselves. Make a melee
      Taijutsu attack against a target creature in range, dealing your [weapons damage] +9d6 slashing damage and
      inflicting 1 rank of lacerated against the target. If the target has any stacks of Laceration, they trigger
      immediately, dealing its damage.</p><p>At Higher Ranks: For each rank you cast this above A- Rank, increase the
      cost by 3, and the attacks damage by 2d6 and the ranks of Lacerated by 1.</p>
