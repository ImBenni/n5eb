system:
  description:
    value: >-
      <p>You lash out with your chained weapon, aiming to debilitate and restrain a foe within reach before presenting
      them to your allies to be maimed.</p><p>Select a creature within range, make a contested grapple check where you
      use your weapon attack bonus in place of athletics, whichever is higher. If a creature becomes grappled by this
      jutsu, they take your [weapons damage] + 2d6 you immediately move them anywhere within your weapon range. For each
      Ally that they pass by, that ally may take a reaction to take an attack of opportunity or cast a Bukijutsu of
      Chain 2 or lower targeting the grappled creature.</p><p>At Higher Ranks: For each rank you cast this above A-Rank,
      increase the cost of this jutsu by 3 and allies may make two attacks of opportunity with one reaction, or cast a
      Bukijutsu of Chain 3 in place of chain 2</p>
