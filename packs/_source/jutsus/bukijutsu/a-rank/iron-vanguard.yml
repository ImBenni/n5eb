system:
  description:
    value: >-
      <p>You whip your flail into the air, rotating it at breakneck speeds until you create an impenetrable barrier of
      steel and chain When you or an ally within range would be targeted by an attack or take damage you quickly leap
      into action by spinning your weapon in order to deflect and hamper incoming attacks. Allies gain +5 AC to the
      triggering attack, and +3 to AC for any other attacks they are subjected to while this jutsu persists,
      additionally, they reduce all incoming damage by your Taijutsu ability score twice a turn.</p>
