name: Killer Bee
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You hold 5 of your weapons in the gaps between your armpits, the hinge joints of your arms and legs, and various other places; before placing a final Tanto in your mouth, leaving your hands completely\_ free. This jutsu allows for quick and unpredictable attacks, that catch your enemies off-guard. While under the effects of this jutsu, you cannot concentrate on any other jutsu.</p><p>This jutsu provides you\_ the following benefits;</p><p>• Melee weapon attacks you make cannot be reacted to.</p><p>• As a reaction you can deflect an attack against you, adding +5 to your AC against the triggering attack. If this would cause the attack to miss, you can make a melee weapon attack as a part of the same reaction, as long as the target is within range.</p><p>• As a bonus action, you can make 2 melee weapon attacks.</p><p>• As an action you can take the dash action and make 3 melee weapon attacks.</p><p>• As a full turn action, you make use of all of your weapons and strike with them. Make five melee weapon attacks, once with each weapon. If they all hit, the creature is stunned until the end of their next turn.</p><p>• All of these benefits are only applicable while using Tanto. Switching to a different weapon or even holding a weapon that is not a Tanto will automatically end this jutsu.\_</p>"
