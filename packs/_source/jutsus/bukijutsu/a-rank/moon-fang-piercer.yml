system:
  description:
    value: >-
      <p>You Stab your weapon through the air, creating shockwave after shockwave of piercing power.</p><p>Select one
      space you can see within range, all creatures within 15ft of it must make a Dexterity saving throw, taking
      [weapons damage] +2d10 damage on a failed save, half as much damage on a success.</p><p>If this jutsu is cast as a
      Chain 2, increase the damage die by +2, if this jutsu is cast as a Chain 3, increase the damage die by an
      additional +1, additionally, a creature of your choice affected by the jutsu takes and additional +2 die of
      damage</p><p>At Higher Ranks: For each rank above A-rank, increase the cost of this jutsu by 3, and the damage by
      2d10</p>
