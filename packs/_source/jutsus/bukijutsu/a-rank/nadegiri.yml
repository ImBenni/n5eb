system:
  description:
    value: >-
      <p>You make an attack so fast and precise that the target does not notice it as happened until it is too late,
      strong enough to destroy enemies taller than buildings, hiding behind the thicker steel. Make a melee Taijutsu
      attack, if the target of this jutsu is huge or bigger, you make this attack at advantage, on a hit, you deal your
      [weapons damage] + 8d6 Piercing damage. If your attack beats the creatures AC by 5 or more, you ignore all DR
      (Damage Reduction) that creature has.</p><p>At Higher Ranks: For each rank above B-rank, increase the cost of this
      jutsu by 3, and the damage by 2d6, starting at A-rank, this jutsu ignores Resistance and threats immunity as
      resistance.</p>
