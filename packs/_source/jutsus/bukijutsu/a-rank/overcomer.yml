system:
  description:
    value: >-
      <p>You dash forward, swinging your weapons side to side as you charge with the power to overcome a frontline of
      any army that stands before you. Make one attack roll and compare to the AC of all hostile creatures in a 60 foot
      long, 15-foot-wide line in front of you as you dash to the end of the line.</p><p>This movement does not trigger
      Attacks of opportunities against anyone except for those who are within 10 feet of you when you cast this jutsu.
      On a hit, you deal your [weapons damage] +4d6 and all creatures hit must make a Strength Saving Throw. On a failed
      save they are knocked prone and thrown to be within 5 feet of you at the end of the line. If that space is
      occupied they move to the next available and closest space.</p><p>If this jutsu is cast as a Chain 2, increase the
      damage die by +3, if this jutsu is cast as a Chain 3, increase the damage die by an additional +2, and its initial
      movement no longer triggers Attacks of opportunity</p><p>At Higher Ranks: For every rank you cast this jutsu above
      A-Rank, increase the cost by 3, the range by 30 feet and the damage by 2d6</p>
