system:
  description:
    value: >-
      <p>Pride Fall requires the practitioner to tap into their inner pride, drawing Strength from their conviction and
      determination to emerge victorious in combat As the practitioner engages in combat, they channel their prideful
      energy into each strike, imbuing their attacks with potent force and intensity.</p><p>Select one creature you can
      see within weapons range for, and the following effects apply to that target only, if you take a turn and fail to
      damage or target your marked creature, this jutsu immediately ends. For the Duration, Bukijutsu with the (Thrown)
      keyword have their DC increased by +2.</p><p>Furthermore, whenever you would cast a Bukijutsu with a Thrown Weapon
      that makes an Attack roll, you may make one Weapon Attack as a part of the same action.</p>
