system:
  description:
    value: >-
      <p>As a reaction to a creature moving within 5 feet of you, you perform a reactionary backflip with your weapon
      swinging defensively as you do. Move up to your movement away in any direction. This movement does not provoke an
      attack of opportunity. Also, make a melee weapon attack against the triggering creature, dealing three times your
      weapons damage die on a successful hit</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank,
      increase the cost of this jutsu by 3 and increase the Damage to four times your weapons damage.</p>
