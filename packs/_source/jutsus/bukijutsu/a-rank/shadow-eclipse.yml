system:
  description:
    value: >-
      <p>You fire your weapon with such a high arc that it eclipses the sun and moon themselves, using the shadows
      generated to mask its approach as you let it hover there. You can cast this jutsu and delay it, in doing so you
      lose access to the weapon until it resolves. Make a Melee Taijutsu against a target creature in range at the start
      of the jutsu casting, dealing your [weapons damage] + 4d12. For every other turn after the first, this jutsu's
      damage grows by 2d12, but can never roll more jutsu damage die than your character level.</p>
