name: Shadow Rush
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You cloak yourself in an inky dark aura meant to accelerate your movement. You make a Dash towards your target
      creature in range, attempting to stab them first as you impact them then using their body as a Launch pad, jumping
      into the air directly after.</p><p>First, move up to 90 feet in any direction towards a creature you can see
      within range, ending your movement within 5 feet of them. Second, make a melee Taijutsu attack against the target
      creature, on a hit the target takes your [weapons damage] + 3d4. Target creature must make a Constitution save to
      resist allowing you to leap off of their body. On a failed save, you leap half your movement speed into the air.
      You are able to, as a part of this action, cast a bukijutsu with the Chain X keyword.</p>
