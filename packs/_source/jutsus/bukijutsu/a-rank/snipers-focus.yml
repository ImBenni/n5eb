name: Sniper's Focus
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You take a relaxed stance drawing your weapon back and preparing for a full force attack. You spend your turn
      preparing this attack until the beginning of your next turn. You cannot take a bonus action or reaction after
      using this jutsu.</p><p>At the start of your next turn, you fire with full force. All creatures in a line 5 feet
      wide and 100 feet long originating from you must make a Dexterity saving throw at disadvantage, taking your
      [Weapon's damage] + 6d12 damage of your weapon's type.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above A-Rank increase the cost of this jutsu by 3, and the Save DC of this jutsu by +1</p>
