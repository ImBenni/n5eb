system:
  description:
    value: >-
      <p>An advanced variation of the "Hidden Shadow Shot" you prepare Two Thrown weapons in your hand launching them at
      the same time feigning that they are aimed at the same person. Your weapons collide mid-air, sending the other one
      to hit a new target instead.</p><p>Select two targets, and make one attack roll targeting both of them. Select one
      target, and that target must make a Perception check versus your attack roll, on a fail they are unable to notice
      the incoming switch-up attack, and cannot react to the attack roll. On hit, both enemies take double your [weapons
      damage die] + 4d6 damage, inflicting 2 ranks of bleed on hit.</p><p>If this jutsu is cast as a Chain 2, increase
      the damage die by +3, if this jutsu is cast as a Chain 3, increase the damage die by an additional +2, and
      inflicts 2 ranks of lacerated on hit in place of bleed.</p><p>At Higher Ranks: For each rank you cast this above
      A- Rank, increase the cost by 3, the damage by 2d6 and the ranks of bleeding by 2</p>
