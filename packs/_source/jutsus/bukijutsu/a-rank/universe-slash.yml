  description:
    value: >-
      <p>You fire your weapon with the might of the universe itself, meaning nothing can stand in your way. Make a
      Ranged Taijutsu attack against a target you know is in range. You do not have to have a line of sight to the
      target but they cannot be hidden. This attack ignores THP and DR and all constructs and structures between you and
      the target are destroyed immediately. You do not roll this attack at disadvantage to the dodge action. On a hit
      you deal your twice your [weapons damage] and the target creature must make a Constitution Saving Throw or gain 2
      ranks of lacerated.</p>
