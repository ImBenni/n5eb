system:
  description:
    value: >-
      <p>You spin your weapon slowly, letting the end of it clink against the other end or the ground, it's slow grind
      eliciting fear from those around you. For the duration, creatures who start their turn within 30 feet of you must
      make a Wisdom Saving throw on a failed save; they become Uneasy until the end of your next turn. You gain the
      following benefits against an Uneasy enemy:</p><p>• Your weapon attacks against an Uneasy target deal an extra 1d8
      force damage</p><p>• You can always react against an Uneasy Enemy as long as you can still act, regardless of
      circumstance.</p><p>• An Uneasy Enemy always triggers an Attack of Opportunity when they leave your range,
      regardless of circumstance.</p><p>• An Uneasy Enemy has disadvantage on attack rolls not against you.</p><p>At
      Higher Ranks: For every rank you cast this jutsu above B-Rank, increase the cost by 3, and range by 15 feet.</p>
