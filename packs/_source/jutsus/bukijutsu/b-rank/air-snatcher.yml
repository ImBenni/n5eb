system:
  description:
    value: >-
      <p>You fire your weapon with enough force to rip the air out of your opponent. Make a Ranged Taijutsu attack
      Against a creature in range, dealing your [weapons damage] +5d10 and reducing the target creature's speed by 10
      feet on a hit and until the end of their next turn, the target creature also has disadvantage on their next
      Constitution Saving Throw.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by 2. If this jutsu
      is cast as a Chain 3 increase the damage die by an additional +2</p><p>At Higher Ranks: For each rank you cast
      this jutsu above B rank, increase the cost by 3 and the damage by 1d10.</p>
