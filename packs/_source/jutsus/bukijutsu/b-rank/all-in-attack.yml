system:
  description:
    value: >-
      <p>You lead your allies to capitalize on a brief moment where the enemy is left completely open. To cast this
      jutsu you must have at least 1 ally within 30 feet who can join in on the casting. If that ally has benefited from
      Baton Pass in this combat, they can immediately join the casting without needing to spend a reaction. All casters
      make two Melee Taijutsu attacks against the target creature, dealing [weapons damage] +3d8 on a hit. If the target
      is hit with at least 1 attack from all creatures it gains 2 ranks of weakened and bruised. If all attacks are
      successful, it instead gains 5 ranks of weakened and bruised. If this jutsu would reduce a target creatures health
      to 0, they are instead killed immediately.</p><p>Combination: When this jutsu is cast, it gains additional effects
      based on who has the highest Charisma modifier between both casters.</p><p>• +0-1: No Change.</p><p>• +2-3: The
      damage die of the jutsu increases to a d10.</p><p>• +4-5: The damage die of the jutsu increases to a d12</p>
