name: Amputation Punishment
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You leap over your opponent while hooking your blade being an enemy's limbs and pulling violently to sever them. Make a melee taijutsu attack, dealing your weapons damage + 5d8 and the target must succeed a Dexterity saving throw. On a failed save the target loses mobility and function in one of their arms being unable to hold things, form handseals or manipulate objects with it until they complete a rest.</p><p>A jutsu that removes conditions, cast at C-Rank or Higher can heal the targets arm(s), granting it mobility and function.</p><p>If a creature has both arms disabled by\_ this jutsu, and would have an arm disabled for the second time, they make a constitution\_ \_saving throw. <span style=\"font-family:var(--font-primary)\">On a failed save, one of their arms is amputated.\_</span></p>"
