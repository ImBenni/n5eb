system:
  description:
    value: >-
      <p>You quickly shift the momentum of the fight by creating an opening for an ally. You can give an ally within
      range an additional reaction to cast a Chain X Bukijutsu or a Taijutsu with the Finisher keyword, or make a weapon
      attack against the triggering creature. If the preceding jutsu was a critical hit, this jutsu casting time becomes
      1 Bonus Action or Reaction.</p><p>If this jutsu is cast as a Chain 2, the allied creature can then cast this jutsu
      at no cost as a reaction if they hit, targeting another creature other then you. If this jutsu is cast as a Chain
      3 The second allied creature can then target a third different allied creature with this jutsu on a hit</p>
