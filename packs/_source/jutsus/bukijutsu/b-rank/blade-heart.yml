name: Blade Heart
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must have a weapon from the Blade weapon group
      equipped.</p><p>Your heart and your blade become one. As a bonus action on your turn or as a reaction to taking
      damage, you can assume your parrying stance until the beginning of your next turn gaining its benefits. While in
      this Parrying stance, you gain a +2 bonus to your AC and Dexterity saving throws. If you are disarmed this jutsu
      immediately end.</p><p>Additionally, when you score a critical hit using your weapon with a weapon or Taijutsu
      attack, the target gains 1 rank of lacerated.</p>
