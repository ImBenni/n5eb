    description: >-
      <p><strong>Max Ranks</strong>: 1</p><hr /><p>A <strong>Staggered</strong> creature has been completely overwhelmed
      by pain or has otherwise had their battle stance shaken.</p><ul><li><p>A <strong>Staggered</strong> creature is
      counted as Bruised 5 for the purposes of interacting with Features, Traits and Jutsu and cannot gain Ranks of
      Bruised for the duration.</p></li><li><p>A <strong>Staggered</strong> creature cannot take the Disengage, Dash or
      Dodge Actions or Reactions.</p></li><li><p>A <strong>Staggered</strong> creature takes a -5 penalty to all
      Strength, Dexterity and Constitution based Attack rolls and checks.</p></li><li><p>A <strong>Staggered</strong>
      creature takes +20 bonus damage from all sources of bludgeoning or earth damage, once per turn.</p></li><li><p>A
      <strong>Staggered</strong> creature, remains staggered until they spend one Full-Turn-Action gathering themselves,
      losing the Staggered condition at the beginning of their following turn after this Full-Turn Action.</p></li></ul>
