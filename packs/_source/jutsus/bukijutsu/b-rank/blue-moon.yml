system:
  description:
    value: >-
      <p>You whip your weapon before channeling so much chakra into the end it looks like a blue moon at the end of your
      weapon. Make 3 Melee Taijutsu attacks against a creature in range dealing your [weapons damage die] +2d8. If you
      are successful with at least 2, you force the affected creature to make a Constitution saving throw, becoming
      staggered on a failed save.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by 2. If this jutsu
      is cast as a Chain 3 increase the damage die by an additional 1 step</p><p>At Higher Ranks: For every rank you
      cast this jutsu above B-Rank, increase the cost by 3, and the damage by 1d8</p>
