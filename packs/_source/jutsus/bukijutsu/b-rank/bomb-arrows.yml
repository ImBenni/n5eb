system:
  description:
    value: >-
      <p>You spend time carefully attaching explosives to your ammunition, delicately enough so that none accidentally
      explode, pushing your ammo pouch to its max capacity.</p><p>If you would make a Ranged Taijutsu or Weapon attack
      while this Jutsu is active you may spend 3 chakra to detonate one of your preplaced bombs, hit or miss every
      creature within bomb range of the target must make a Dexterity save versus your Taijutsu DC, taking the Ninja
      Tools damage on a failure, or half on pass</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank,
      increase the cost of this jutsu by 3, the cost of activation by 1, and you may attach Explosive Tag-Bombs of one
      higher quality per rank upcast</p>
