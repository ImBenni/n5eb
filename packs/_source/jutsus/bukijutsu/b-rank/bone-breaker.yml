system:
  description:
    value: >-
      <p>You aim your blow to break a bone, to maim your foe and hobble them in this fight. Make a melee Taijutsu attack
      at disadvantage as you aim your blow at a specific location. On a hit, you deal your [weapons damage] and choose a
      which bone you broke below:</p><p>Shoulder: The target creature has disadvantage on Melee attacks until they are
      either healed with a Medical jutsu cast at B-Rank or higher or spend a Full Turn Action setting it back into
      place.</p><p>Shin: Target creature takes 1d6 force damage for every 5 feet they willingly move. They also have
      disadvantage on Saving Throws that would forcibly move them</p>
