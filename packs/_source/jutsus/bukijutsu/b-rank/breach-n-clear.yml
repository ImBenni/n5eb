system:
  description:
    value: >-
      <p>You Hastily take out a collection of breaching tags and attach them to your weapon, throwing and embedding it
      into a Construct or Structure in front of you. Select a Construct or Structure within range, Make a Ranged
      Taijutsu attack, dealing you [weapons damage] + 6d6 Fire and 6d6 Bludgeoning on hit. Any construct reduced to 0 HP
      as a result of this Jutsu cannot be remade without acquiring entirely new materials.</p><p>At Higher Ranks: For
      each rank you cast this Jutsu above B rank, increase the cost of the Jutsu by 3, and you equip Breaching tags of a
      higher variety, if done, increase the Fire and Bludgeoning damage by 2d6 each.</p>
