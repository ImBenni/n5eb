name: Breath of Ash Dust
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest fire release chakra until it laces\_ the striking portion of your weapon. The fire release chakra begins\_ to transform into gouts of ash and smoke that erupt off of you, and\_ your weapon with a glorious and wrathful flickering.</p><p>Select a creature you can see within range. You fire in a straight line towards them. All creatures in a straight line, 10 feet wide, between you and the target becomes the target of this attack.</p><p>Make one ranged taijutsu attack. All creatures whose space your line passes through become the target of this attack comparing their AC vs your attack result. On a successful attack you deal your\_ weapons damage+8d4+8 Fire Damage. If you score a critical hit\_ with this attack, only one creature of your choice suffers the effects\_ of a critical hit.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the cost of this jutsu by 3 and the damage by 1d4+1. If this jutsu is cast at S-Rank, if you score a critical hit with this attack, all creatures suffer the effects of the critical hit.\_</p>"
