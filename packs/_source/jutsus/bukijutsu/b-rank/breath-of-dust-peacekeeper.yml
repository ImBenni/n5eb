name: Breath of Dust Peacekeeper
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to collect and manifest earth release chakra until it laces the striking portion of your weapon. The
      earth release chakra begins to magnify the weight and striking power of your attacks allowing you crush anything
      in your path with little difficulty. Select one creature you can see within range as you strike with a flurry of
      weapon attacks followed by manifestations of earth release chakra of your design. Make 2 Taijutsu Attacks, dealing
      your Weapon's Damage + 3d8. Whether these attacks are Ranged or Melee is determined by the weapon being used. A
      creature you hit with 2 or more attacks using this jutsu must make a Strength Saving Throw. On a failed save you
      disable one of their legs or arms (your choice). A creature with a disabled leg cannot move effectively, causing
      them to be unable to cast jutsu with a Mobility (M) component, Dash, dodge, disengage or move while Prone. A
      creature with a disabled arm cannot use that arm to wield weapons, fulfill jutsu hand seals (HS) requirements or
      Grapple for the next minute. A jutsu which removes conditions cast at B-Rank or higher can restore a leg or arm
      disabled by this jutsu. At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the cost of this
      jutsu by 3 and the damage by 1d8.</p>
