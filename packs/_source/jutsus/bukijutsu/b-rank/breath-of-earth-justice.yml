name: Breath of Earth Justice
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest earth release chakra until it laces the striking portion of your weapon. The earth release chakra\_ begins to magnify the weight and striking power of your attacks\_ allowing you crush anything in your path is little difficulty. You\_ utilize a powerful barrage of strikes from a series of differing angles doing great damage.</p><p>Select one creature you can see within range as you strike with a flurry of weapon attacks followed by manifestations of earth release chakra of your design. Make 2 melee taijutsu attacks using your weapon, dealing your weapons damage + 3d10 earth damage.</p><p>A creature you hit with 2 or more attacks using this jutsu must succeed a Strength saving throw as you disable one of their arms (your choice) on a failed save. A creature with a disabled arm\_ in this way cannot use that arm to wield weapons, fulfill jutsu hand seals (HS) requirements or grapple for the next minute. A jutsu\_ which removes conditions cast at B-Rank or higher can restore the disabled arm.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the cost of this jutsu by 3 and the damage by 1d8.\_</p>"
