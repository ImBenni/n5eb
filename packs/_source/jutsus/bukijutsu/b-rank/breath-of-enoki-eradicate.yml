system:
  description:
    value: "<p>You begin to collect and manifest medical chakra until it laces the\_ striking portion of your weapon. The medical chakra begins to\_ cause your weapon to glow with a soft pink hue.</p><p>Select a creature you can see within range as you release waves of medical chakra following the same concepts of chakra scalpels into each of your attacks.</p><p>Make 3 ranged taijutsu attack with your weapon, dealing your\_ weapons damage + 3d4 poison damage, you do not add your ability modifier to the damage dealt. You can make these attacks at\_ different creatures or all at the same one.</p><p>When a creature takes poison damage from this jutsu, they must make a Constitution saving throw, gaining 1 rank of Envenomed, Corroded and Weakened. A creature who takes poison damage from this jutsu more than once, repeats the saving throw at a stacking -1\_ penalty to their Constitution saving throw for each subsequent successful attack.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the cost of this jutsu by 3 and the damage by 1d4.\_</p>"
