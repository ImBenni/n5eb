    description: >-
      <p><strong>Max Ranks</strong>: 5</p><hr /><p>A <strong>Envenomed</strong> creature (sometimes called Poisoned) has
      been exposed to some kind of venom or toxin, causing their vitality and immune health to drop
      rapidly.</p><ul><li><p>An <strong>Envenomed</strong> creature or object takes 1d6 poison damage for each rank it
      has, at the start of each of their turns for the duration of this condition</p></li><li><p>An
      <strong>Envenomed</strong> creature suffers a -1 penalty to their AC for each rank it has.</p></li><li><p>An
      <strong>Envenomed</strong> creature cannot gain the benefits of a rest.</p></li><li><p>Creatures that are immune
      to poison damage are immune to the envenomed condition.</p></li><li><p>Outside of combat, every hour a creature
      suffers the effects of this condition as if a turn has passed in combat.</p></li></ul>
