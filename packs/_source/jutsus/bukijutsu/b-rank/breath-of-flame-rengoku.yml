name: Breath of Flame Rengoku
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to collect and manifest fire release chakra until it laces the striking portion of your weapon. The
      fire release chakra begins to transform into gouts of flame that erupt off of you, and your weapon with a glorious
      and wrathful flickering.</p><p>Select a space you can see within range that passes through one or more creatures
      in a 10-foot wide, 60- foot-long line, originating from you.</p><p>You move to a space at the end of this line
      that can hold you leaving behind a bright, powerful and burning gout of flame in your wake. Make one melee
      Taijutsu attack. All creatures whose space your line passes through become the target of this attack comparing
      their AC vs your attack result. On a successful attack you deal your [weapons damage] + 6d6+6 Fire Damage. If you
      score a critical hit with this attack, only one creature, of your choice suffers the effects of a critical
      hit.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the cost of this jutsu by 3
      and the damage by 1d6. If this jutsu is cast at S-Rank, if you score a critical hit with this attack, all
      creatures suffer the effects of the critical hit.</p>
