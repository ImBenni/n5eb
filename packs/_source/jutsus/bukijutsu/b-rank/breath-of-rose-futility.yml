name: Breath of Rose Futility
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to collect and manifest medical chakra until it laces the striking portion of your weapon. The
      medical chakra begins to create a visage of a poisonous flowers as your move your weapon.</p><p>Select one create
      you can see within range you begin to move around them, imitating the movements of a throned stem striking them
      with each passing gesture.</p><p>Make three melee Taijutsu attack with your weapon, dealing your [weapons damage
      die] + 2d6 poison damage.</p><p>A creature who you successfully hit with at least one attack granted by this
      jutsu, must make a Constitution saving throw gaining 1 rank of lacerated and envenomed on a failed save. A
      creature hit with three attacks makes this save at disadvantage.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above B-Rank increase the cost of this jutsu by 3 and the damage by 1d6.</p>
