system:
  description:
    value: >-
      <p>You begin to collect and manifest wind release chakra until it laces the striking portion of your weapon. The
      wind release chakra begins to spiral around the user's weapon creating whipping torrents of wind. You you're your
      attack, like a corkscrew, rotating it in drill like motion, allowing the wind Release to create a massive and
      powerful spiraling funnel.</p><p>All creatures of your choice in a 5-foot wide, 60-foot line originating from you
      must make a Dexterity saving throw, taking your [weapons damage] + 8d4 wind damage and 1 ranks of lacerated on a
      failed save or half as much and no ranks of lacerated on a success.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above B-Rank increase the cost of this jutsu by 3 and the damage by 1d4.</p>
