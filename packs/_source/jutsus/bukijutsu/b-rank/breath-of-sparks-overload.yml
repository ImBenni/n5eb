name: Breath of Sparks Overload
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to collect and manifest lightning release chakra until it laces the striking portion of your weapon.
      The lightning release chakra begins to collect and spark off of your weapon and body with violent jolts. You
      prepare for a powerful singular shot as your lightning follows behind your attack in the image of a beast of your
      description.</p><p>Select one creature you can see within range. Make one ranged Taijutsu attacks, dealing your
      [weapons damage] + 5d10 lightning damage. If the target has any ranks of the Shocked condition, you make your
      attacks at advantage. If your beats the creatures AC by 10 or more, the creature cannot take a reaction until the
      end of the current turn, and you ignore any Damage Reduction they are benefiting from.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above B-Rank increase the cost of this jutsu by 3 and the damage by 1d10.</p>
