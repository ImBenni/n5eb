system:
  description:
    value: >-
      <p>You feint out of your attack, ending the previous jutsu, and instead slam your weapon to break down whatever
      wall was thrown against you.</p><p>Make a Melee Taijutsu attack targeting the construct or structure. If it is
      THP, you have disadvantage on this attack roll. On a hit you deal your [weapons damage] +5d12. Constructs and
      Structures take double damage from this attack. If you reduce the Construct, Structure, or THP to 0, you gain an
      additional reaction which can be used to recast the jutsu that was used to cast this one. If you do not reduce it
      to 0, you instead regain half of the previous jutsu chakra usage back.</p>
