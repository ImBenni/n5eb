system:
  description:
    value: >-
      <p>You perform 2 powerful throws with enough force to leave a gash in any armor made by the hands of man. Make two
      ranged Taijutsu attacks against a single creature dealing your [weapons damage] + 3d6 with each hit. If you
      successfully hit a creature with both attacks, you tear open their guard removing any chance they could defend
      themselves from you. A creature who is hit by both attacks, cannot gain the benefit of bonuses to AC or Temporary
      hit points as a result of Armor, Jutsu, features or traits against you until the end of your next turn.</p><p>If
      this jutsu is cast as a Chain 2, increase the damage die by 1 step. If this jutsu is cast as a Chain 3 increase
      the damage die by +3.</p>
