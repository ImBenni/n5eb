system:
  description:
    value: >-
      <p>You aim your blow directly at the temple of your foe, looking to scramble their brain like an egg. Make a
      ranged Taijutsu attack, dealing twice your [weapons damage] on a hit and forcing the creature to make a
      Constitution Saving Throw. On a fail, the target creature gains 2 Ranks of Concussed. If they do not clear these
      ranks of Concussed in 1 minute, they become permanent until cleared by a Medical jutsu cast at A- Rank or
      higher.</p><p>If this jutsu is cast as a Chain 2, increase the damage die of your weapon by 1 step. If this jutsu
      is cast as a Chain 3 increase the damage die by an additional 1 step</p>
