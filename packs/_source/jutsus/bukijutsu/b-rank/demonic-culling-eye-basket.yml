system:
  description:
    value: >-
      <p>You spin your weapon with chakra and quickly surround your target within the spin. As it envelopes your target
      you tighten the circle around them, conforming into a sphere like pattern before sinking into them from above in a
      15-foot radius around them. All creatures in range must succeed a Strength saving throw taking [weapons damage]
      +6d8 damage, becoming prone and restrained on a failed save, and only half damage with no conditions on a success.
      At the start of their turn, they may remake the save, ending the conditions on a success.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage by 1d8</p>
