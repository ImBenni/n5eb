name: Earth Spider Sewing
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You lace an area with razor sharp wires less than a foot above\_ ground level. Trapping, damaging, and hindering all creatures who aren't aware of them or their locations exactly.</p><p>For the duration,\_ select a space the size of a 60-foot cube to fill with razor sharp wires. Select creatures that you can see to be unaffected by this jutsu.</p><p>For the duration, creatures who enter the radius of this jutsu move as if the area this jutsu inhabits is difficult terrain.</p><p>Creatures who cast Jutsu with a Mobility (M) component, must\_ succeed a Dexterity saving throw being restrained by the wires as they get wrapped up inside of them on a failed save.</p><p>Creatures who make weapon attacks must succeed a Strength saving throw, having their weapon caught on a wire and being unable to complete the attack on a failed save.\_</p>"
