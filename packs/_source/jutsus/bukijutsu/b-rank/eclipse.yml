system:
  description:
    value: "<p>You enter a stance that prevents others from capitalizing on any openings as your weapon sits firmly grasped in both hands. For the\_ duration, bukijutsu and weapon attacks made with a weapon that deals bludgeoning damage also forces the target to make a constitution saving throw. On a failed save the target(s) gain 1 rank of Weakened and becomes dazed until the end of your next turn. If a creature gains a rank of weakened this way, the duration of any\_ previous ranks of weakened is increased to the end of your next turn. You can only force a creature to make a constitution save this way once per turn.\_</p>"
