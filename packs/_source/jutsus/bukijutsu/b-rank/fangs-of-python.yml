system:
  description:
    value: >-
      <p>The chthonic enemy of the sun's hatred swells within you; it's seething rage like poison to your chakra. Make a
      ranged Taijutsu attack toward a target within range. On a hit, you deal your [weapons damage] + 4d8 necrotic
      damage. This jutsu gains additional effects if it is used between 12:00pm to 2:00pm; If this is the case, then
      this jutsu instead deals double your [weapon's damage] + 6d8 on a hit and the target must succeed a Constitution
      saving throw or gain 2 ranks of Envenomed.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by 1
      step. If this jutsu is cast as a Chain 3 increase the damage die by an additional 1 step</p><p>At Higher Ranks:
      For each rank you cast this jutsu above B rank, increase the cost by 3. If this jutsu is cast at A rank, the time
      you may gain the additional benefits of the day extends to 4:00 pm. If this jutsu is cast at S rank, you may draw
      on the last sources of daylight of the setting sun. The time you may gain the additional benefits of the day
      extends to 6:00 pm, and this jutsu deals an additional 2d8 damage.</p>
