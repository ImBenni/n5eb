system:
  description:
    value: >-
      <p>The former Titan of the moon's pride swells within you; its ancient serenity calms your chakra to a still pond.
      Make a ranged Taijutsu attack toward a target within range. On a hit, you deal your [weapons damage] + 3d10 cold
      damage. This jutsu gains additional effects if the current phase of the moon is a Full Moon. If this is the case,
      then this jutsu instead deals double your [weapon's damage] + 6d12 on a hit and the target must succeed a
      Constitution saving throw or gain 3 ranks of Concussed.</p><p>If this jutsu is cast as a Chain 2, increase the
      damage die by 2 If this jutsu is cast as a Chain 3 increase the damage die by an additional +1.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above B rank, increase the cost by 3. If this jutsu is cast at A rank,
      you may gain the Full Moon benefits on a Half Moon. If this jutsu is cast at S rank, you may gain the Full Moon
      benefits on a Crescent Moon, and this jutsu deals an additional 2d12 Damage.</p>
