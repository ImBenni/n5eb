system:
  description:
    value: >-
      <p>(This jutsu cannot crit) You stab forward with frightening accuracy, hitting the 8 chakra cores on your foe to
      disrupt their inner harmony. Make 8 Melee Taijutsu attacks, each dealing your [weapons damage die]. This jutsu
      gains additional effects for how many successful attacks you made. You gain all benefits you qualify for:</p><p>•
      1-2: Target creature loses the total damage in chakra as well.</p><p>• 3-4: Target creature has disadvantage on
      concentration checks made to maintain jutsu for the next minute.</p><p>• 5-7: Target creature can only concentrate
      on one jutsu for the next minute.</p><p>• 8: Target creature cannot concentrate on any jutsu for the next
      minute.</p><p>This jutsu's effects can end early if the target is healed with a medical jutsu of A-Rank or higher,
      or they spend a full turn action making a Chakra Control check vs your Taijutsu save DC.</p>
