system:
  description:
    value: "<p>You take a solid striking form and perform 2 powerful slashes with enough force to leave a gash in the ground below the blade. The first slash is downward creating the gash in the ground, the second slash is upward creating a high-pitched singing sensation from the edge of the blade. Make two melee taijutsu attacks against a single creature dealing your weapons damage + 4d6 with each hit.\_</p><p>If you successfully hit a creature with both attacks, you tear open their guard removing any chance they could defend themselves from you. A creature who is hit by both attacks, cannot gain the benefit of bonuses to AC or Temporary hit points as a result of Armor, Jutsu, features or traits against you until the end of your\_ next turn.</p>"
