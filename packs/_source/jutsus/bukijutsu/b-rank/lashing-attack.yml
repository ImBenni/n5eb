  description:
    value: >-
      <p>You make a series of attacks with your weapon, each one using the force of the last to deliver a greater
      blow.</p><p>Make 5 Melee Taijutsu attacks against a creature in range rolling one damage roll, depending on how
      many of them hit</p><p>• 1 hit: [weapons damage] +6d4 damage.</p><p>• 2 hits: [weapons damage] +6d6 damage and 1
      rank of bleed.</p><p>• 3 hits: [weapons damage] +6d8 damage and 2 ranks of bleed.</p><p>• 4 hits: [weapons damage]
      +6d10 damage, 4 ranks of bleed and knocked prone.</p><p>• 5 hits: [weapons damage] +6d12 damage, 6 ranks of bleed,
      dazed and prone.</p><p>At Higher Ranks: For every rank you cast this jutsu above B-Rank, increase the cost by 3,
      and the damage by 1dx.</p>
