system:
  description:
    value: >-
      <p>You ready your weapon in a neutral stance before you unleash your combined knowledge and skill in martial arts
      into one attack that flows into the next. Roll xD8, where X equals the number of Chains you cast uninterrupted
      before this jutsu, using the highest die rolled. Make a number of Melee Taijutsu attacks equal to the highest die
      rolled against a target creature in range, dealing your [weapons damage] +1d4 on a hit. If you hit the creature at
      least two times, they must make a Constitution Saving throw or be Dazed. If they fail by 5 or more they are Dazed
      for one minute. For every two attacks that hit past the first two, they make this save with a -1 penalty.</p><p>If
      this jutsu is cast as a Chain 2, increase the damage die by 1 step. If this jutsu is cast as a Chain 3 increase
      the damage die by an additional 1 step</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank,
      increase the cost of this jutsu by 3 and the die used to determine the number of attacks by 1 step.</p>
