system:
  description:
    value: >-
      <p>You funnel all of your Strength into the striking section of your weapon, with all the might of the ferocious
      Oni. For the duration your weapon attacks with a Power weapon deal an additional 1d8 Bludgeoning damage and your
      Taijutsu attacks with a Power weapon have a +1 critical threat range.</p><p>At Higher Ranks: For every rank you
      cast this jutsu above B-Rank, increase the cost by 3, the damage die by a step and the critical threat range by
      +1.</p>
