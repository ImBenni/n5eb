system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must have a weapon from the Polearm weapon group
      equipped.</p><p>This weapon gains +1 rank of the reach property.</p><p>All Bukijutsu you cast, that requires an
      attack roll or forces another creature to make a saving throw, that deals damage, gain pierce (5) for the
      duration.</p><p>Additionally, when you score a critical hit using your weapon with a weapon or Taijutsu attack,
      the target falls prone and reduces their movement speed by 15ft until the end of their next turn.</p>
