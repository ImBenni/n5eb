system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must have a weapon from the Power weapon group
      equipped.</p><p>Your heart and your power weapon become one. When you would strike an enemy with a successful
      weapon attack, once per turn, you can force them to make Strength saving throw. On a failed save they gain 1 rank
      of bruised.</p><p>Additionally, when you score a critical hit using your weapon with a weapon or Taijutsu attack,
      the target gains 1 rank of concussed.</p>
