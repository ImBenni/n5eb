    description: >-
      <p><strong>Max Ranks</strong>: 5</p><ul><li><p>A Bruised creature suffers a -1 penalty to all Strength, Dexterity
      &amp; Constitution based attack rolls and checks for each rank they have.</p></li><li><p>A Bruised creature takes
      +4 bonus damage from all sources of bludgeoning or earth damage for each rank they have, once per
      turn.</p></li><li><p>Creatures that are immune to bludgeoning or Earth damage are immune to this
      condition.</p></li><li><p>A creature who would gain a sixth (or more) ranks of the Bruised condition immediately
      becomes Staggered, ending the Bruised Condition.</p></li><li><p>A Creature can spend an Action to make a DC 15
      Strength (Medicine) Check to end this condition by applying the appropriate amount of pressure to the
      wound.</p></li></ul>
