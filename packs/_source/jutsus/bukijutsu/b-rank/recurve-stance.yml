system:
  description:
    value: >-
      <p>Chakra courses through your body and out into your weapon, causing you to retain some control of your shots
      even after they have soared through the air, curving and bending them in ways many would deem impossible. You
      don't need to spend Chakra to maintain concentration on this Jutsu. For the duration of this Jutsu your Ranged
      Weapon attacks ignore half cover, and treat 3/4ths cover as half cover, if an enemy summons a construct to
      intercept your attack, you deal double damage to that construct. If an enemy reacts with a Jutsu, Feature, or
      trait that increases their AC, you may spend 2 chakra to reroll the attack without any bonuses aside from your
      ability modifier and proficiency, potentially turning the miss into a hit.</p><p>At Higher Ranks: For Rank you
      cast this jutsu above B-rank, increase the cost of this jutsu by 3. Startint at A-rank, you ignore 3/4 cover.
      Starting at S-Rank, you gain a +2 bonus to rerolled attacks.</p>
