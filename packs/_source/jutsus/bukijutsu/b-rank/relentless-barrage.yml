system:
  description:
    value: >-
      <p>You steady yourself in your stance, streaming your chakra into your fingertips in preparation to overwhelm your
      opponents with a steady stream of brutal strikes.</p><p>As an Action on your turn, you may make two ranged
      Taijutsu attacks against a target within range, dealing [weapons damage] + 3d6. Each time you take this action on
      subsequent turns, deal an additional 1d6 damage. Should you reach 6d6 Bonus damage as a result of activating this
      jutsu multiple times, your next Ranged Taijutsu attack automatically crits.</p>
