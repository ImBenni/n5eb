system:
  description:
    value: >-
      <p>You whip your weapon into a sphere around you before you let it erupt out with a large burst. All creatures
      within your weapons range must make a Strength Saving throw. On a failure they are pulled within 5 feet of you. On
      a success they are only pulled up to 10 feet towards you. After, all creatures within 5 feet of you must make
      Constitution Saving throw as the small gale around you erupts, dealing your [weapons damage] +2d12 and being
      knocked prone.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by +2. If this jutsu is cast as a
      Chain 3 increase the damage die by an additional +2.</p><p>At Higher Ranks: For every rank you cast this jutsu
      above B-Rank, increase the cost by 3, and the damage by 1d6</p>
