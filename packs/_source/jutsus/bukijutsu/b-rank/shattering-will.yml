system:
  description:
    value: >-
      <p>You slam your weapon on the ground delivering a mighty blow designed to instill fear in your opponents.
      Creatures in range other than you, must succeed a Dexterity saving throw taking your [weapons damage] +4d6
      Bludgeoning damage and being knocked prone on a failed save, or half as much on a successful one and suffering no
      other effects. Regardless of whether a creature passes or fails, all hostile creatures within range must make a
      Wisdom saving throw, gaining 1 rank of fear on a failed save, gaining disadvantage if they fail the Dexterity
      saving throw.</p><p>If this jutsu is cast as a Chain 2, this jutsu deals an additional 6 damage die, if this jutsu
      is cast as a Chain 3, increase the damage die by an additional +4.</p>
