system:
  description:
    value: "<p>You manifest multiple shots of ammunition with your chakra, before loading them into your weapon and firing them. Select a number of creatures equal to your Taijutsu ability modifier. Make a single ranged taijutsu attack, using the result vs each of their Armor Class values. You do not roll ammunition die when casting this jutsu.</p><p>On a hit, you deal your weapons damage + 4d8, each target must succeed a constitution saving throw or be knocked prone and restrained by your shot.</p><p>A restrained creature can, as an action, attempt to remove the construct shot from themselves by making a Strength saving throw.\_</p>"
