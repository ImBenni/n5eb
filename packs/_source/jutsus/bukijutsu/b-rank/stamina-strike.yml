system:
  description:
    value: >-
      <p>You whip your weapon before slamming it into the center of your enemy, looking to ruin their flow and stamina.
      Make a Melee Taijutsu attack against a creature in range, dealing your [weapons damage] +4d6 damage and the target
      creature must make a Constitution Saving Throw. If you crit this attack, the target creature automatically fails
      this save. On a failed save, the target creature becomes Dazed until the end of their next turn and loses an
      amount of chakra equal to the jutsu damage rolled.</p><p>If this jutsu is cast as a Chain 2, increase the damage
      die by +6, if this jutsu is cast as a Chain 3, increase the damage die by an additional +4.</p><p>At Higher Ranks:
      For every rank you cast this jutsu above B-Rank, increase the cost by 3, and the damage by 1d6.</p>
