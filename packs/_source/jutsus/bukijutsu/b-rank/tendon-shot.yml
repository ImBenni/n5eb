system:
  description:
    value: >-
      <p>You take a quick assessment of the enemies movements, their fighting styles, do they use kicks? Punches?
      Weapons? All of them can be disabled if you know where to strike, and you do. Make a Ranged Taijutsu attack
      against a target within range, on hit, deal your [weapons damage die] + 8d4. On hit the target must also make a
      Constitution saving throw, on a fail, you've pierced a tendon or nerve relating to their fighting style, roll a
      1d4+1. The affected creature has disadvantage on that many Taijutsu and/or weapon attacks.</p><p>At Higher Ranks:
      For Rank you cast this jutsu above B- rank, increase the cost of this jutsu by 3, the die size of the 1d4+1 by 1,
      and the damage by 1d4</p>
