system:
  description:
    value: >-
      <p>You throw your weapon around yourself, causing a whirlwind of steel and blood up to the end of your range. All
      creatures in a sphere around you with a radius up to your weapons range need to make a Dexterity and Strength
      Saving Throw. On a failed Dexterity Saving throw they take your [weapons damage] + 2d6 and gain 2 ranks of
      bleeding, taking half damage and 1 rank of bleeding on a success. On a failed Strength Saving throw, they are
      thrown to the outer edge of the sphere.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by+2,
      additionally, this jutsu inflicts and additional rank of bleed on failure, if this jutsu is cast as a Chain 3,
      increase the damage die by an additional +3, additionally, this jutsu inflicts an additional rank of bleed on a
      success and failure, up to 3 total.</p><p>At Higher Ranks: For every rank you cast this jutsu above B-Rank,
      increase the cost by 3, and the damage by 1d6.</p>
