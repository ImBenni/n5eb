system:
  description:
    value: >-
      <p>You spin your weapon, pooling the light and dark energies into the two different ends before you strike out
      with one of them.</p><p>Yin Strike: Make a Melee Taijutsu attack, dealing your [weapons damage] on a hit. You can
      then force the creature to make a Constitution Saving Throw. On a failed save they must spend and roll 1d4 Hit die
      and you heal half of the rolled amount. You can only heal from this jutsu once per creature per rest.</p><p>Yang
      Strike: Make a Melee Taijutsu attack, dealing your [weapons damage] on a hit. You can then force the creature to
      make a Constitution Saving Throw. On a failed save they must roll 1d4 Hit die and they lose that much in current
      and maximum HP. A creature can only lose maximum HP from this jutsu once per rest.</p><p>At Higher Ranks: For
      every rank you cast this jutsu above B-Rank, increase the cost by 3 and the hit die rolled by 1.</p>
