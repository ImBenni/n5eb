  description:
    value: >-
      <p>You use the air itself to slash all who stand before you. As you swing your sword you launch an air- compressed
      cross slash, spiraling forward. All creatures in the area of effect must make a Constitution Saving throw, taking
      twice your [weapons damage] on a failure, and gaining 1 rank of Bleeding, or half as much damage on a
      success.</p><p>If this jutsu is cast as a Chain 2, increase the rank of bleeding by 1. If this jutsu is cast as a
      Chain 3 creatures gain disadvantage on their saving throw.</p>
