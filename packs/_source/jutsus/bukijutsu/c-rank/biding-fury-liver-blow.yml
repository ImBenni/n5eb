system:
  description:
    value: >-
      <p>(Must be under the effects of a Binding Fury Stance to cast) You aim a strong blow right at your enemies liver,
      looking to make them lose the will to fight, if only for a moment. Make a melee Taijutsu attack, dealing your
      [weapons damage] +2d10 on a hit. On a hit, the target creature must also make a Constitution Saving throw. On a
      failed save their focus is shattered, ending any concentration jutsu cast at a lower rank then this jutsu and
      gaining a rank of Bruised. You can spend a Fury when casting this jutsu to increase the save DC by 1, per Fury
      Spent, up to a max of 5 Fury.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by 1. If this
      jutsu is cast as a Chain 3 make an additional attack</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and damage by 1d12, and the max Fury that can be spent by
      2.</p>
