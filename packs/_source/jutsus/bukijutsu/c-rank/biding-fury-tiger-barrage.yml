system:
  description:
    value: >-
      <p>(Must be under the effects of a Binding Fury Stance to cast) You lash out with your weapon with the ferocity of
      a tiger, aiming to turn a foe into mincemeat. Make 2 melee Taijutsu attacks, comparing the results to all
      creatures in a X-Foot Cone in front of you, where X equals the ranks of Reach your weapon has, times 15ft. On a
      hit you deal your [weapons damage] +1d12. You can spend 2 Fury to make an extra melee Taijutsu attack. You can
      spend up to 6 Fury in this way.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by 1. If this
      jutsu is cast as a Chain 3 increase the damage die by an additional +1</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and damage by 1d12, and the max Fury that can
      be spent by</p>
