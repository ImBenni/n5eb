      dealing your [weapons damage] +1d8 poison damage, do not add your ability modifier to the damage dealt. On a hit a
      creature must make a Constitution saving throw, gaining 1 rank of envenomed on a failed save, a creature can make
      this save once per casting.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the
