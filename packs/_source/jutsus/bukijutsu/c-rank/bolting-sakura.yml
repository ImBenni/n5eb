    value: >-
      <p>You close your defenses as you guard your body with your weapon. You do not need to spend Chakra to maintain
      concentration on this jutsu. When you activate this jutsu, you enter this guarded form until the start of your
      next turn, you can reenter this form by spend an action on your turn. While in guarded form, increase your AC by
      half of your Taijutsu attack bonus (Rounded down).</p>
