name: Bounding Blossom
type: spell
_id: bPU65u5Q06uXRKDt
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>(you must move at least 10 feet before casting this jutsu, and you must jump in the same direction you moved)
      You leap into the air and strike down with the butt of your polearm, scattering your foes and leveling the ground.
      After landing from your leap, all creatures within a 20-foot radius sphere from you must make a Strength Saving
      Throw, taking 4d10 damage and being knocked prone on a failed save, and half as much and no further effects on a
      successful save. If you land in the same space a creature is occupying then they make their save at disadvantage
      and you can add your [weapons damage] to the damage of this jutsu.</p><p>If this jutsu is cast as a Chain 2,
      increase the damage die by 1. If this jutsu is cast as a Chain 3 increase the damage die by an additional
      +2</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and
      damage by 1d10. If this jutsu is cast at A-Rank, creatures who fail also become Staggered</p>
