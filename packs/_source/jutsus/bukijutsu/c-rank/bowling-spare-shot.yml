img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You throw your weapon at an angle to bounce and make an impossible shot possible. Make a ranged Taijutsu attack
      against a creature in range. On a hit you deal your [weapons damage] +2d8 and then you can target another creature
      that you can draw a straight line to from the first target creature, no longer then your weapons range, as if it
      originated from the first target creature. Make a second ranged Taijutsu attack, dealing [weapons damage] +2d6 on
      a hit. Any creature between the two target creatures must make a Dexterity saving throw, taking [weapons damage]
      +2d4 on a failed save, and no damage on a successful one.</p><p>If this jutsu is cast as a Chain 2, increase all
      the damage die by 1. If this jutsu is cast as a Chain 3 increase all the damage die of this jutsu by 1
      step</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and the damage by 1d12.</p>
