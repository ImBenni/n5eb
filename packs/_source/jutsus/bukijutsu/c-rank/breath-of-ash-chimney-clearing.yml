name: Breath of Ash Chimney Clearing
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest fire release chakra until it laces the striking portion of your weapon. The fire release chakra begins to transform into gouts of ash that emanates from your weapon. You then choose to fire directly into the sky.</p><p>When you do, your weapon releases a funnel of flame that erupts from you as you manifest a 30-foot high, 10- foot-wide funnel of flame. All creatures excluding you must succeed a Dexterity saving\_ throw. Depending on the severity of their failure they suffer\_ additional effects. On a successful save, they take half of the\_ following damage; Weapons damage + 5d6 fire damage.</p><p>● Failed by 1~4: Weapon Damage + 5d6 fire damage.</p><p>● Failed by 5~9: Weapon Damage + 6d6 fire damage and 1 rank of burned.</p><p>● Failed by 10~14: Weapon Damage + 7d6 fire damage and 2 ranks of burned.</p><p>● Failed by 15+: Weapon Damage + 8d6 fire damage and 3 ranks of burned.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage by 1d6. If this jutsu is cast at B-Rank, increase the radius of this jutsu by 5 feet. If this jutsu is cast at S-Rank, increase the radius of this jutsu by 10 feet.\_</p>"
