system:
  description:
    value: "<p>You begin to collect and manifest chakra until it laces the striking portion of your weapon. The chakra begins to manifest in the form of any beast of your choice in any color that can be seen plainly by others.</p><p>You begin to swing wildly and unpredictably, fueled by instinct and primal urges. Make two melee taijutsu attack. On a hit, you your weapons damage + 2d6. When you deal damage with this jutsu, you impost an effect based on the damage type of the weapon used.</p><p>• Bludgeoning: Target creature makes a Strength saving throw, becoming bruised and gaining 1 rank of the weakened condition until the end of their next turn on a failed save.</p><p>• Piercing: The creature must make a Constitution saving throw, becoming dazed and having their movement speed reduced by -15,\_ until the end of their next turn on a failed save.</p><p>• Slashing: The creature must make a Dexterity saving throw, gaining 2 ranks of bleeding on a failed save.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage by 1d6.\_</p>"
