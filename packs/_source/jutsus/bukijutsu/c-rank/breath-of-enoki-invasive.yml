name: Breath of Enoki Invasive
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to collect and manifest medical chakra until it laces the striking portion of your weapon. The
      medical chakra begins to cause your weapon to glow with a soft pink hue. You make a single attack, either directly
      injecting poison into a target, or into the ground, releasing a burst of poisonous fumes. If you cast this Jutsu
      using a melee weapon, you make a single Melee Taijutsu Attack targeting a creature within range. Depending on the
      accuracy of your attack, the poison is increasingly more effective. - Beat AC by 1~4: Weapon's Damage + 2d6 Poison
      Damage and 1 rank of Corroded. - Beat AC by 5+: Weapon's Damage + 4d6 Poison Damage and 1 rank of Corroded. If you
      cast this Jutsu using a ranged weapon, s elect a space you can see within range. All creatures within 10 feet of
      the chosen space, must make a Constitution Saving Throw. Depending on the severity of their failure, the poison is
      increasingly more effective. - Failed by 1~4: 5d6 Poison Damage and 1 rank of Envenomed. - Failed by 5+: 6d6
      Poison Damage and 1 rank of Envenomed. At Higher Ranks: For each rank you cast this jutsu above C-Rank increase
      the cost of this jutsu by 3 and the damage by 1d6.</p>
