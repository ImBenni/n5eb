name: Breath of Fog Smog
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest Illusionary chakra until it radiate off of your weapon similar to that of a thick smog, of a color of your choosing. The chakra begins to take the same consistency as a thick gas that makes it difficult to see through.</p><p>You generate this smog centered on you that expands outward up to 10 feet and goes around corners. This smog follows you and cannot be blown away by strong winds. Creatures other than you, cannot see through this smog and you are treated as being fully obscured\_ visually against them. When a creature enters the smog the effects of this jutsu no longer affect them, allowing them to see you clearly as if the smog was no longer there. Creatures, creatures attacks and jutsu can still pass through this haze, entering and/or exiting it.</p><p>The first time each turn you would make an attack or cast a jutsu while maintaining this jutsu, your Weapons or Taijutsu's critical threat range is increased by +1.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the number of creatures you can target with this jutsu by +1.\_</p>"
