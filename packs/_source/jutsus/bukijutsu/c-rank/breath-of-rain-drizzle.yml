name: Breath of Rain Drizzle
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest water release chakra until it laces the striking portion of your weapon. The water release chakra begins to transform into streams of water, capable of being seen and felt as you perform a zigzag or curved attack, attacking in an irregular motion. When casting this jutsu, you can choose to make a Zigzag or Curved attack.</p><p>• Zigzag: Make one ranged taijutsu attack against a creature in your\_ weapons range. Each creature within of your choice, between you and your target must make a Dexterity saving throw. On a hit or failed save, you deal your weapons damage + 4d6 cold damage and<br />affected creatures gain 1 rank of chilled or half as much damage on a successful save. A creature whom you target that is either Dazed or chilled grants you a 1d4 bonus to hit. A creature whom you force to make a saving throw that is either Dazed or chilled suffers a 1d4 penalty to their saving throw.</p><p>• Curved: You fire off a curved shot, capable of bypassing defenses. Make one ranged taijutsu attack. This attack ignores boosts to AC as a result of features, traits or jutsu. On a hit, you deal twice your weapons damage die</p><p>+ 3d8 cold damage, and being dazed on a failed save or half as much on a successful one.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage by 1d6 or 1d8.\_</p>"
