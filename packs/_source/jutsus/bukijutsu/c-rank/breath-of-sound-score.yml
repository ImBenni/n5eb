name: Breath of Sound Score
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest chakra until it manifest into the shape of a sound note of your choice, hovering over your eyes as you begin to listen to all of the sounds created as a result of battle.</p><p>For the duration you do not spend chakra to maintain this jutsu, instead you must spend a bonus action to maintain it. Choose one of the following tempos when you cast this jutsu. You can the\_ benefit of this tempo until the beginning of your next turn.</p><p>At the beginning of each of your turns thereafter, you can select a\_ ifferent tempo if you would like.</p><p>• Moderato: You strike with great force to the strum of the battle. The first time each turn you would deal damage with a melee weapon or taijutsu attack you make with a bukijutsu with the Breath of Sound prefix, you add your level to the damage dealt.</p><p>• Allegretto: Breath of Sound bukijutsu you cast has their save DC increased by +1d4.</p><p>• Vivacissimo: You speed yourself up to strike at the right time, when they are at the most vulnerable. You have advantage on the\_ first melee weapon or taijutsu attack you make with a bukijutsu with the Breath of Sound prefix, each turn.</p><p>• Andante: You match your pace to your opponents to defend and parry perfectly against their every move. You gain a special reaction which can only be used when you would take damage from an attack, or make a Strength or Dexterity saving throw. If used against an attack, make a contested melee taijutsu attack. If your attack is higher than theirs, their attack misses. If used against a saving\_ throw, you add your weapons damage to the first saving throw made, each turn.\_</p>"
    chat: ''
