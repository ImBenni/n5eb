system:
  description:
    value: >-
      <p>You begin to collect and manifest lightning release chakra until it laces the striking portion of your weapon.
      The lightning release chakra begins to collect and spark off of your weapon with violent jolts. You prepare for a
      volley of attacks as you attack multiple times, enhanced by lightning. Make two Taijutsu Attacks using, dealing
      your Weapon's Damage Dice + 3d6 Lightning Damage. Whether these attacks are Ranged or Melee is determined by the
      weapon being used. If the target any ranks of the Shocked condition, you make your attacks at advantage. If you
      cast this Jutsu using a ranged weapon, the additional 3d6 damage is reduced to d4's. At Higher Ranks: For each
      rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage dealt by 1d6/1d4.</p>
