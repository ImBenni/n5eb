system:
  description:
    value: >-
      <p>You lace your weapon with lightning release chakra and make two Taijutsu attacks, dealing your weapon damage
      dice plus 3d6 lightning damage on a hit. Whether the attacks are ranged or melee is determined by the weapon
      used.</p><p>If the target has any ranks of the Shocked condition, you make these attacks with advantage. If cast
      using a ranged weapon, the additional 3d6 damage becomes 3d4.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost by 3 and the damage by 1d6 or 1d4.</p>
