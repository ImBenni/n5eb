system:
  description:
    value: "<p>You begin to collect and manifest lightning release chakra until it laces the striking portion of your weapon. The lightning release chakra begins to collect and spark off of your weapon with violent jolts. You prepare for a volley of attacks as you strike multiple\_ times, enhanced by lightning.</p><p>Make two melee taijutsu attacks using your weapon, dealing your weapons damage + 3d6 lightning damage,\_ you do not add your ability modifier to the damage dealt.</p><p>If the target any ranks of the Shocked condition, you make your attacks at advantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage dealt by 1d6.\_</p>"
