system:
  description:
    value: "<p>You raise your weapon to block incoming damage at its source. When you would take damage you raise your weapon's in a cross-guard fashion. You reduce the first instance of incoming damage each turn by your [weapons damage] + 3d6. When you do, you reinforce your next attack with the force sent towards you. Until the end of your next turn, each time you reduce an incoming attacks damage by any amount, you increase your next attacks critical threat range by +1.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage reduced by 1d6.\_</p>"
