system:
  description:
    value: >-
      <p>You whip your weapon into a frenzy, ready to strike down your foes in rapid succession. Make a melee Taijutsu
      attack against the closest enemy within range, dealing twice your [Weapon's Damage] on a hit. If there are
      multiple close enemies, select one.</p><p>If you reduce a creature to 0 hit points using this jutsu, you can move
      to the next closest enemy and make another melee Taijutsu attack. This cycle can repeat multiple times until you
      run out of movement, miss, or fail to reduce a creature to 0 hit points. Each time you make a melee Taijutsu
      attack after the first, you suffer a -3 penalty to the next attack you make with this jutsu.</p>
