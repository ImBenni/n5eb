      normal limitations.</p><p>For the duration, you cannot lose concentration of this jutsu as a result of damage, and
      twice per turn, when you would deal damage with a weapon or Taijutsu attack, you increase your [weapons damage
      die] by +1.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu
      by 3. If this jutsu is cast at A-Rank, you instead increase your [weapons damage die] by +2.</p>
