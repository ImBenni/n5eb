system:
  description:
    value: >-
      <p>(You must cast this jutsu after damaging a target with an Ammunition weapon) You attuned your ammunition to
      your opponent's chakra signature, helping guide your weapons to their intended recipients.</p><p>Make a contested
      Chakra Control check using your Taijutsu ability modifier versus the target creature. On a success, you gain the
      following benefits for the duration of this jutsu;</p><p>• The creature has disadvantage on Stealth checks against
      you and your allies</p><p>• Once per round, when you miss a ranged weapon or Taijutsu attack against the target
      creature with a weapon with the Ammunition property, you can reroll the attack with half of your usual attack
      bonus. This reroll cannot crit.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3. At B- Rank, the duration becomes 10 minutes and you can reroll a missed attack once
      per turn. At S-Rank the duration becomes 1 hour and you can reroll a missed attack twice per turn.</p>
