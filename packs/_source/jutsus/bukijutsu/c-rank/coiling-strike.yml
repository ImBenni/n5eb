system:
  description:
    value: >-
      <p>Using the force from your previous attack, you coil around your weapon, compounding the force into another
      powerful strike. You can move to any unoccupied space within twice your weapons range and then make a melee
      Taijutsu attack targeting a creature you can reach, dealing your [weapons damage] +xd4, where X is the base damage
      dice of the previous jutsu and inflict 2 ranks of Bleeding. If the creature has taken piercing damage from a
      Bukijutsu you have cast this turn, you have advantage on this attack and increase the damage die by 1 step.</p>
