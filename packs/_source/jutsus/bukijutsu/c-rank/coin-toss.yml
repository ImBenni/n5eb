img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You toss a 50 Ryo coin into the air within 15 feet of you to augment the trajectory of your next attack,
      improving its effectiveness with style. After casting this jutsu, your next ranged weapon or ranged Taijutsu
      attack (as part of a Bukijutsu) is aimed at the coin, bouncing off of it before being redirected to your intended
      target, causing the attack roll to be made at advantage, gains a +1 bonus to critical threat range, and ignores up
      to three-quarters cover. Using this jutsu destroys the 50 Ryo coin.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above C-Rank, increase the cost of this jutsu by 3. If cast to B-Rank or higher, increase the bonus to
      critical threat range to +2 and on a critical hit the target gains 1 rank of Lacerated. If cast to S-Rank or
      higher, increase the bonus to critical threat range to +3 and on a critical hit the target gains 2 ranks of
      Lacerated.</p>
