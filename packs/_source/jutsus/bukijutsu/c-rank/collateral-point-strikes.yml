    value: >-
      <p>By forcing your chakra into an arrow at the moment of release, you can splinter the arrow into multiple parts.
      Choose a number of creatures up to your Taijutsu modifier, make a ranged Taijutsu attack against each target, on a
      hit, you deal your weapon's damage + 1d4, increasing the dice by 1d4 for each successful hit against each unique
      target (up to a max of 3d4)</p><p>At Higher Ranks: For each rank you cast this jutsu above C-rank increase the
      cost by 3 and the damage by 1d4 and max by 1d4.</p>
