  description:
    value: "<p>You take your bow as you rapidly fire a swarm of shots into directly into your target with enough force to tear holes in steel and concrete. Make a single ranged taijutsu attack, dealing your weapons damage +6d4.</p><p>If you roll 6 or more 4's on a d4, with this Jutsu's damage die, you tear through the targets body, leaving them with a gaping wound. Affected creature gains 5 ranks of lacerated. The medicine check DC to remove lacerated is increased to 30.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and Damage by 2d4.\_</p>"
