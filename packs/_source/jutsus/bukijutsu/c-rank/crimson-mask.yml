    description: >-
      <p>• A <strong>Blinded</strong> creature cannot target another creature with effects that require them to “target
      a creature they can see” unless they have a special sense that does not require sight, such as <strong>Tremor
      Sense</strong> or <strong>Chakra Sensing</strong>.</p><p>• A blinded creature can’t see and automatically fails
      any check that requires sight.</p><p>• A <strong>Blinded</strong> creature has disadvantage on Dexterity saving
      throws.</p><p>• Attack rolls against a <strong>Blinded</strong> creature have advantage, and a
      <strong>Blinded</strong> creature’s attack rolls have disadvantage without the aid of a special sense that does
      not require sight, such as <strong>Tremor Sense</strong> or <strong>Chakra Sensing</strong>.</p><p>• A creature
      can willingly close their eyes as a free action for an extended period of time. Doing so imposes this Condition on
      them until the beginning of their next turn, they cannot reopen their eyes until then, unless they are forced to
      do so by some other means.</p>
