system:
  description:
    value: >-
      <p>You throw your weapon to cut right above your target's eyes, blinding them with a crimson mask of their blood.
      Make a ranged Taijutsu attack against a target creature in range. On a hit you deal your [weapons damage] +1d6.
      The target creature then must make a Constitution saving throw, gaining a rank of Bleeding on a failure. While
      they have this rank of bleeding they also suffer from the Blinded condition.</p><p>If this jutsu is cast as a
      Chain 2, increase the damage die by 2. If this jutsu is cast as a Chain 3 increase the damage die by 1
      step.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and increase the number of creatures you can target by +1.</p>
