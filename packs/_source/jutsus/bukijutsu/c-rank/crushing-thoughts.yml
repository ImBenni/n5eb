name: Crushing Thoughts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the Crushing Stance.</p><p>You begin to focus
      on ways to crush your opponent using the power of blunt strikes.</p><p>For the duration of this jutsu, you gain
      pierce (6) against heavy armor, and pierce (4) against medium armor.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above C-Rank, increase the cost of this jutsu by 3. At A-rank increase the ranks of pierce by +2 and +1
      (8 and 4 respectively). At S-rank, increase the ranks of pierce by +4 and +2 (10 and 5 respectively).</p>
