  description:
    value: "<p>You take your bow as you rapidly first a swarm of shots into the sky before they begin to rain down up to your weapons range away, in a 15-foot radius sphere centered on a point of your choice. Each bolt\_ or arrow is tethered to you as your chakra is used as a binding\_ hain.</p><p>Creatures in the radius of this jutsu must succeed a Dexterity saving throw taking your weapons damage + 3d8, being restrained by the bolts or arrows pinning them to the ground on a failed save until the beginning of their next turn or only half as much damage on a successful save.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of spaces you can select by +1.\_</p>"
