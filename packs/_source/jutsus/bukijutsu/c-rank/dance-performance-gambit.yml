system:
  description:
    value: >-
      <p>You enter a focused but extremely passive stance with a looser grip on your weapon and more chakra around the
      edge and the soles of your feet, letting gravity and speed take the wheel. You do not spend chakra to maintain
      concentration on this jutsu. You can only drop concentration of this jutsu as a bonus action on your
      turn.</p><p>For the duration, if you move more than 20 feet before making an attack with your weapon, you increase
      your critical threat range by +1 and Your [weapons damage die] is also increased by +1.</p><p>For the duration of
      this jutsu, melee attacks against you have a +1 critical threat range.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank or higher
      increase the [weapons damage die] by +1. If this jutsu is cast at A-Rank or higher, increase the weapons critical
      threat range by +1. If this jutsu is cast at S-Rank, increase both by an additional +1.</p>
