system:
  description:
    value: >-
      <p>You whip your weapon with the Strength to create a small twister at your command. All creatures in your weapon
      range in a sphere around you must make a Strength Saving Throw or take your [weapons damage] +2d8 and be thrown
      back 30 feet.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by 1. If this jutsu is cast as a
      Chain 3 increase the damage die by an additional +1</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3, the damage by 1d8 and the number of feet thrown in the air by
      10.</p>
