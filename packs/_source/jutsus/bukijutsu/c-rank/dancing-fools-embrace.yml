system:
  description:
    value: >-
      <p>You whip your weapon with the finesse to wrap around your enemies and bring them into a tight and lethal
      embrace. All hostile creatures in range must make a Strength Saving Throw or be pulled within 5 feet of you and
      become restrained and take your [weapons damage]. While you have a creature restrained in this way, you cannot use
      the weapon used to cast this jutsu for attacks or other jutsu.</p><p>As a Bonus action, while you have a creature
      restrained by this jutsu, you can immediately tighten the embrace, dealing 3d10 damage. A creature can remake this
      save as an action and at the end of their turns to end the Restrained condition.</p><p>If this jutsu is cast as a
      Chain 2, increase the damage die by 1. If this jutsu is cast as a Chain 3 increase the damage die by an additional
      +1</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and
      the range by 5 feet.</p>
