name: Earth Breaker
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You slam your weapon into the ground with enough force to upheave the earth. Creatures in a 20- foot cube originating from you must succeed a Dexterity saving throw taking 3d8 bludgeoning damage and is knocked prone on a failed save.</p><p>If a creature falls prone within your weapons attack range when you cast this bukijutsu, you may, as a part of casting this jutsu, make a melee taijutsu attack against the prone target dealing your weapons damage + 2d12 Bludgeoning on a hit.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d8 and 1d12 respectively.\_</p>"
