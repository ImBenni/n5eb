system:
  description:
    value: "<p>As a part of the activation of this jutsu, you must have a weapon in both hands that meet this bukijutsu component requirements. You take your weapon and infuse chakra into the heels of your feet and use the increased power to penetrate whatever is in your way. Make two melee taijutsu attacks against up to two enemies within 5 feet of you dealing your weapons damage + 3d6, you do not add your ability modifier to damage.</p><p>Affected creatures must make a constitution saving throw having their AC is reduced by 1d4 for each successful hit, until the end of your next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of attacks by +1.\_</p>"
