  description:
    value: >-
      <p>You Flip the grip of your weapon to perform another attack but in the opposite fashion. You immediately cast
      the Bukijutsu you previously cast as an Action this turn, as a bonus action. When you do cast this Bukijutsu,
      increase the cost by +3.</p><p>When cast as part of a chain. You can cast the last bukijutsu you cast, regardless
      of chain casting limits. You can only use Front Beheading once per chain.</p>
