system:
  description:
    value: "<p>As a requirement to activate this jutsu, you must currently be in the Throwing Stance. </p><p>You begin to embody the legendary shinobi and tactician Fuma Kotaro. His technique begin to radiate from you. Select a number of creatures you can see within range, equal to\_ your proficiency bonus.</p><p>Make one ranged taijutsu attack against each creature, dealing your weapons damage + 2d12. Additionally, for each successful hit, you gain special resource called Hojo dice which are D4's. These dice last until the end of your next turn and you can give them to allied creatures which they can choose to use as bonuses to their next attack, damage or skill check roll. A creature can only ever have two dice at a time.\_</p>"
