system:
  description:
    value: >-
      <p>You enter the stance of a batter and swing your weapon towards your target making a Taijutsu melee attack. On a
      hit, you deal your [weapons damage] + 3d8 and makes a Constitution Saving throw. On a failed save they are knocked
      back 40 feet. If a creature knocked back by this jutsu collides with a solid object, their movement is stopped,
      taking falling damage as if they had fallen an equal distance.</p><p>At Higher Ranks: For each rank you cast above
      C- rank, increase the cost by 3, the critical threat range by +1 and the distance the enemy would be knocked back
      by 20 ft. If upcast to B-Rank or higher, if you score a critical hit with this jutsu, the creature automatically
      fails their Constitution save.</p>
