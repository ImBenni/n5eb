system:
  description:
    value: "<p>You swipe your weapon upwards with enough force to create an updraft. This updraft manifests a cylinder of force. You create a 30- foot-high, and 15-foot-wide cylinder originating from you.</p><p>Creatures in this cylinder must make a Strength saving throw or be thrown upwards, towards the top of the cylinder. At the end of your\_ turn, creatures and objects thrown upwards fall to the ground,\_ landing prone, taking fall damage, and gaining 1 rank of weakened until the end of their next turn.</p><p>If this jutsu is cast as a Chain 2, you can cast a Chain X jutsu as a bonus action this turn. If this jutsu is cast as a Chain 3 they instead fly 90 feet into the air.</p>"
