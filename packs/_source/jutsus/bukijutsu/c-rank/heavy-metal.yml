name: Heavy Metal
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You ensure the armor your wearing is the most potent thing on the battle field by using its coverage to
      intercept all incoming damage.</p><p>Until the start of your next turn, you have a +4 bonus to AC against the
      triggering creature, and a +2 bonus to your AC against all other attacks targeting you.</p><p>Additionally, if the
      armor you have has the Reinforced property, you increase your Reinforced value by +4.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage you reduce by
      2.</p>
