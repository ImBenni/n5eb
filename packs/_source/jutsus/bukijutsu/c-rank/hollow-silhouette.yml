system:
  description:
    value: >-
      <p>As you spin your weapon and move towards the target you sidestep back and forth quickly into their blind sides,
      leaving only an outline of you to see. Make a contested Stealth check against the target creature's Perception. On
      a success you can immediately move to be within 5 feet of them and you gain advantage on the next attack roll you
      make against them this turn. On a failure you have disadvantage on the next attack roll against them this
      turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and the range by 15 feet.</p>
