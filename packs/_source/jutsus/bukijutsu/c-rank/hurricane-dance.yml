name: Hurricane Dance
type: spell
_id: bUdIrAtHyjrdD827
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You throw your weapon in a circle around you, slicing at all around you and making it hard to even stand near
      you. All creatures in a 15-foot radius around you must make a Dexterity saving throw when this jutsu is cast. On a
      failed save they take 5d6 slashing damage and lower their movement speed by 20 feet. On a successful save they
      take half damage and no further effects.</p><p>At the start of a creature who failed this save turn they must make
      a Constitution saving throw. On a failed save they take an additional 3d6 slashing damage and cannot move towards
      you this turn as the weapons slash into their tendons.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank increase the cost of this jutsu by 3 and the damage by 1d6.</p>
