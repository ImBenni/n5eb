name: Moderate Reflexes
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to make full use of the balance in mobility and protection your armor provides.</p><p>For the
      duration, you gain a +10 bonus to your movement speed, and if the armor you have has the Reinforced property, its
      value increases by +3.</p><p>Additionally, you add half of your Armor bonus to your Strength saving throws,
      rounded down.</p><p>If you are ever knocked prone, restrained or grappled, this jutsu immediately ends.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the movement
      speed bonus by +5 and the Damage Reduction by +2.</p>
    chat: ''
