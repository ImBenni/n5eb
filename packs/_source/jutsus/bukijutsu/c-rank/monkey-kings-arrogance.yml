name: Monkey Kings Arrogance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You spin your weapon around yourself with enough force to create updrafts and powerful winds. But all of the weapon spinning is\_ mostly for show as you then use your weapon to launch your allies like missiles towards a creature of your choice helping them crash\_ into them.</p><p>Select up to two allied and willing creatures within your weapons range. They are thrown a number of feet up to 10 x your Taijutsu ability modifier. If they would end this movement within 5 feet of a hostile creature, they can spend their reaction to cast a Jutsu that requires a melee attack, that has a casting time of 1 Action,\_ targeting the hostile creature.</p><p>Additionally, the creatures you throw gain a bonus to their melee attack roll, equal to your weapons damage die.\_</p>"
