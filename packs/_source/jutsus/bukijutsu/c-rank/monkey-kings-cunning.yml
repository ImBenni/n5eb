  description:
    value: "<p>You spin your weapon around in a series of distracting twirls before you strike as your targets arm and leg joints disabling their\_ mobility\_ and striking power.</p><p>Make two melee taijutsu attacks using your weapon, dealing your weapons damage + 2d10. If at least two attacks using this jutsu are\_ successful, you reduce the targets speed by -10 and they have a -1\_ penalty to strength and Dexterity based Saving throws, skill checks and attack rolls until the end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3, the movement speed penalty by -5 and the saving throw, ability check and attack roll penalty by -1.\_</p>"
