name: Multishot Bow Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You quickly prepare multiple shots from your bow of choice, ready to fire on hostile creatures.</p><p>You skillfully knock two arrows or bolts into your bow as you prepare to fire. Until the beginning of your\_ next turn, when you deal damage with your bow, you roll your weapons damage die twice adding the results together with your ability modifier on a hit. You only roll your ammunition die once per attack as usual.</p><p>Also, creatures within the range of your weapon provoke attacks of opportunity for you the first time they move. You gain additional reactions equal to your Taijutsu ability modifier, that you can only use to make a ranged taijutsu attack if a creature triggers attacks of opportunity until the beginning of your next turn.\_</p><p>Creatures hit by your attacks of opportunity using your bow, have their movement reduced to 0, until the beginning of their next turn.\_</p>"
    chat: ''
