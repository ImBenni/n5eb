system:
  description:
    value: >-
      <p>You perform a series of thrusts with your weapon with enough force to penetrate steel, sending powerful
      piercing shockwaves up to 15 ft in a straight line stopping at the first creature hit. Make a melee Taijutsu
      attack against a target within range, dealing your [weapons damage] + 2d10 and gains the bleeding condition, and
      all creatures in a 15-foot line behind the target takes damage equal to half of the result.</p><p>If this jutsu is
      cast as a Chain 2, increase the damage die by 2. If this jutsu is cast as a Chain 3 increase the damage die by 1
      step</p>
