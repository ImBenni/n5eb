name: Nobunaga's Rage
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>As a requirement to activate this jutsu, you must currently be in the Heavy Weapon Stance. Your eyes glaze over with a blood fueled\_ rage, for but a moment.</p><p>Select one creature you can see within your weapons range, as you swipe it towards them with such speed and ferocity that the ground, air, and even water crackles and ignites from the force of your\_ attack alone.</p><p>You can choose to either make a melee taijutsu attack using the weapon or force the creature to make a Strength saving throw.If you make a melee taijutsu attack, on a hit, you deal your weapons damage + 8d6</p><p>The select creature must succeed a Strength saving throw taking your weapons damage +6d6 on a failed save or half as much on a successful save.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the damage by 1d6.\_</p>"
