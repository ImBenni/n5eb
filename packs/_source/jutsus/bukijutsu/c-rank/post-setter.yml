    value: >-
      <p>You plunge your weapon into the foot of your target, rooting them to the ground. Make a melee Taijutsu attack
      against a creature in range. On a hit deal your [weapons damage] and they become Restrained until the start of
      your next turn. While they are restrained you cannot use this weapon. While they are restrained an allied creature
