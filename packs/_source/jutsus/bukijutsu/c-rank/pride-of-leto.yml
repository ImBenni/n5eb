system:
  description:
    value: >-
      <p>You funnel your chakra into the point of your weapon, feeling the pride of the mother of the twin archers in
      your bones, unleashing a scatter of shots toward a creature within range. Roll 1d4, choose any number of targets
      to hit with an attack based on the roll. (You may attack the same target more than once.) Make a ranged Taijutsu
      attack for each shot. On a hit, you deal your [weapon's damage]. You do not add your ability modifier to the
      damage roll.</p><p>If this jutsu is cast as a Chain 2, you can add your ability modifer to up to 2 damage rolls.
      If this jutsu is cast as a Chain 3 you instead roll a 1d6 for choosing targets.</p><p>At Higher Ranks: For each
      rank, you cast this jutsu above C-rank, increase the cost by 3. If this jutsu is cast at A-rank or higher,
      increase the damage die of your weapon by 1.</p>
