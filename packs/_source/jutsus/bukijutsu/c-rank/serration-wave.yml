system:
  description:
    value: >-
      <p>You swing your weapon in a wide arc meant to impede movement and lockdown your enemies. All creatures in a
      45-foot cone in front of you must make a Dexterity Saving Throw. On a failed save they take your [weapons damage]
      +2d4 and lose half their movement speed until the end of their next turn. On a success they take half damage and
      do not suffer any additional effects.</p><p>At Higher Ranks: for every rank above C-rank this jutsu is cast,
      increase the chakra cost by 3 and damage die by 1 step. If this is cast at A-Rank they instead lose all movement
      on a failed save and half on a success.</p>
