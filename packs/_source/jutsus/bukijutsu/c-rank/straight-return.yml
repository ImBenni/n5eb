system:
  description:
    value: >-
      <p>You quickly pull-on attached chakra or iron strings to pull your weapon back, looking to catch your enemies off
      guard. All creatures in a straight, 5-foot-wide line from you to your weapon must make a Dexterity Saving Throw,
      taking your [weapons damage] +2d6 on a failed save and being knocked prone, taking half as much and no further
      effects on a success. If you miss a creature with a ranged attack before casting this jutsu, they have
      disadvantage on this saving throw, being lulled into a false sense of security.</p><p>If this jutsu is cast as a
      Chain 2, increase the damage die by 1. If this jutsu is cast as a Chain 3 increase the damage die by an additional
      +1</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and
      the damage die by 1d6</p>
