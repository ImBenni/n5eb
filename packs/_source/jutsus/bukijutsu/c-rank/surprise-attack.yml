system:
  description:
    value: >-
      <p>As a requirement for casting this jutsu, you must target a willing creature within 5 feet who knows Advanced
      Transformation and is currently in the form of a ranged slashing weapon. You throw your ally in an easily
      avoidable trajectory to catch your enemy off guard. Make a ranged Taijutsu attack vs target creatures Passive
      Perception.</p><p>On a success, your attack is seen as genuine and they believe that you have just missed. Your
      ally can then, as a reaction, revert into their original form and make a weapon attack or cast a jutsu with a
      casting time of 1 action. This attack is made at advantage and they are treated as surprised against this attack.
      On a failure, your ally can still use their reaction to complete the jutsu, however they make their attack at
      disadvantage.</p>
