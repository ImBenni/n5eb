system:
  description:
    value: >-
      <p>You must be under the effects of Sword Aura: Red to cast this jutsu. You Strengthen your Sword Aura, flooding
      more chakra into your sword, the striking portion flaring orange from the mixing of chakra. Sword Aura: Red ends
      and you replace the effects with this jutsu'. Your weapon now has pierce (8). Twice per turn when you deal
      [weapons damage], you can force all creatures in your weapons range to make a Strength Saving Throw, taking 2d10
      Fire damage on a failed save and they are knocked prone from the force of the blast. If a creature fails this save
      twice in the same turn, they also gain a rank of Concussed.</p>
