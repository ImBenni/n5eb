  description:
    value: >-
      <p>You throw your weapon with such ferocity, it is if a wrecking ball swings from your hand. All creatures in a
      5-foot-wide line stretching from you to a point no more than your weapons normal range must make a Strength Saving
      Throw. On Failure they take your [weapons damage] +2d10 and are knocked prone. On a success they only take half
      damage and no additional effects.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3 and the damage by 1d10.</p>
