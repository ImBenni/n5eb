system:
  description:
    value: "<p>As a requirement to activate this jutsu, you must be in the Equilibrium Stance. You cannot lose concentration on this jutsu as a result of damage.</p><p>Your weapon is equal parts a tool, an extension of your body and your true self. You take a stance reminiscent of the legendary\_ Samurai Yasuke, in which you gain a +1 bonus to all of your saving throws, +1 bonus to your Bukijutsu's critical threat range and your weapons gain the reach property, if they did not already.</p><p>Additionally, if you would clash with another creature while using a Bukijutsu while gaining the benefits of this jutsu, add your weapons damage die to your clash check result.</p>"
