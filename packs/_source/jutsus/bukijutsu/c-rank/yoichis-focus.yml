    value: "<p>You focus your mind and eyes on a target of your choice.</p><p>Make a ranged taijutsu attack, targeting one creature you can see dealing your weapons damage. This attack has a +1 bonus to critical threat range. If you score a critical hit with this attack, you multiply your weapons damage die by 3.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3. If you cast this jutsu at A-Rank and score a critical hit, you multiply your weapons damage die by 4.\_</p>"
