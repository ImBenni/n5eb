  description:
    value: >-
      <p>You aim to cripple your target by aiming at the weak point in their armor. Target one creature in range that is
      wearing armor. Make a Martial Arts check vs their AC. If you roll higher than their AC, you have noticed their
      weak spots in their armor. For the duration you ignore any DR from their Armor and their AC is reduced by 1. This
      jutsu ends early if you lose sight of them.</p>
