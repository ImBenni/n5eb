system:
  description:
    value: >-
      <p>You seek to emulate the power of one of the Seven Deadly Sins of Humanity in your blade, imbuing the Sin of
      Sloth inside the edge. Make a melee Taijutsu Attack against a creature in range. On a hit you deal your [weapons
      damage]+1d8. The target creature must make a Constitution saving throw. On a failure, they move down the
      initiative tracker as they lose the motivation to act as fast as before.</p><p>If this jutsu is cast as a Chain 2,
      it deals an additional 2d8 damage. If this jutsu is cast as a Chain 3 has disadvantage on its Constitution Saving
      throw.</p><p>At Higher Ranks: For every rank you cast this jutsu above D-Rank, increase the cost by 3 and the
      damage by 1d12. Starting at A-rank, if the target is the last in initiative when they would fail their saving
      throw, they instead cannot move or act until the end of their next turn.</p>
