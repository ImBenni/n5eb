name: Blunt Strike
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You ready your weapon before you bludgeon the weapon with your chakra and aim for your target's core striking
      at the center of their chest.</p><p>Make a ranged Taijutsu Attack using your weapon, dealing your [weapon's
      damage] + 2d4 but as bludgeoning damage. On a hit, the target must succeed a Constitution saving throw. On a
      failed save, the target is Dazed and if they would make a concentration check to maintain a Genjutsu or Ninjutsu,
      they roll an additional 1d8, reducing their check by the result.</p><p>At Higher Ranks: For each rank, you cast
      this jutsu above D-Rank increasing the cost of this jutsu by 3 and the damage by 2d4.</p>
