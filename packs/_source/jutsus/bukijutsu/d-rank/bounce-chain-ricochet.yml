system:
  description:
    value: >-
      <p>You make your attack with the aim that it hits as many people as possible. Make a ranged Taijutsu Attack
      against a creature in range On a hit, you deal your [weapon's damage]+1d8. On a hit, you can make a second ranged
      Taijutsu Attack against another creature in range with a -2 penalty to the attack roll. If this second attack
      hits, you can make a third attack against a creature in range, this time with an additional -2 penalty.</p><p>At
      Higher Ranks: For every rank you cast this jutsu above D-Rank, increase the cost by 3 and the damage by 1d8.</p>
