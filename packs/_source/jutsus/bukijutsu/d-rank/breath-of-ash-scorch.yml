name: Breath of Ash Scorch
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest fire release chakra until it laces the striking portion of your weapon. The fire release chakra begins to transform into gouts of ash that emanate off of your weapon with a menacing haze. Select a creature you can see in range and make a<br />single ranged taijutsu attack, with a +1 bonus to your critical threat range. On a hit, you deal your weapons damage + 2d6 fire damage and the target is overwhelmed by the ash causing them to be\_ blinded until the beginning of their next turn, or the first time\_ they\_ are targeted by an attacked before their turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the damage by 1d6. If this jutsu is cast at B-Rank, you can target a second creature with this jutsu. If this jutsu is cast at S-Rank, you can target a third creature with this jutsu.</p>"
