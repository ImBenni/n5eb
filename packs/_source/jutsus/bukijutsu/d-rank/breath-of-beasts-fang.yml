system:
  description:
    value: "<p>You begin to collect and manifest chakra until it laces the striking portion of your weapon. The chakra begins to manifest in the form of any beast of your choice in any color that can be seen plainly by others.</p><p>You begin to swing wildly and unpredictably, fueled by instinct and primal urges. Make two melee taijutsu attacks, dealing your\_ eapons damage + 1d6, you do not add your ability modifier to the\_ amage rolled. </p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3. If this jutsu is cast at C-Rank or higher, increase the damage by 1d6. If this jutsu is cast at B-Rank increase the number of attacks by +1. If this jutsu is cast at S-Rank increase the number of attacks by +2.\_</p>"
