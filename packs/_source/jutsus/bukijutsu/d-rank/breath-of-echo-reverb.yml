system:
  description:
    value: "<p>You begin to collect and manifest chakra until it manifest into the shape of a sound note of your choice, hovering over the striking portion of your weapon. This note can be seen plainly by any other creature who can manipulate chakra. </p><p>You fire two powerful shots creating an explosion of sound able to disorient your foes on\_ contact. Make two ranged taijutsu attacks, dealing your weapons damage. On each hit, the target and all creatures within 5 feet of\_ them, must make a wisdom saving throw, being dazzled on a failed save.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the damage by 1d4. If this jutsu is cast at C-Rank or higher, increase the number of attacks by +1. If this jutsu is cast at B-Rank or higher, the target is also dazed on a failed save.\_</p>"
