name: Breath of Sparks Jolt
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You begin to collect and manifest lightning release chakra until it laces the striking portion of your weapon. The lightning release chakra begins to collect and spark off of your weapon with violent jolts. You prepare for multiple powerful shots. </p><p>Roll 1d4, recording the result. Select a number of creatures you can see within range equal to the result, as you fire off a volley of lightning charged shots to each.</p><p>Make a ranged taijutsu attack against each target creature, dealing twice your weapons damage die + 1d8 lightning damage. You do not add your ability modifier to the damage dealt.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the initial die used to determine the number of target creatures by 1 step\_ (D4&gt;D6&gt;D8&gt;D10&gt;D12). If this jutsu is cast at C-Rank or higher, increase the damage by 1d8. If this jutsu is cast at B-Rank or higher, increase your weapons damage die by 1. If this jutsu is cast at A-Rank or higher, increase the damage by 1d8. If this jutsu is cast at S-Rank, increase your weapons damage die by 1.\_</p>"
    chat: ''
