name: Breath of Thunder Flash
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to collect and manifest lightning release chakra until it laces the striking portion of your weapon.
      The lightning release chakra begins to collect and spark off of your weapon with violent jolts. You prepare for a
      single powerful strike.</p><p>Select a creature you can see that you could reach using your full movement. Move
      into a space adjacent to the target creature within your movement range.</p><p>Make a single melee taijutsu attack
      against the target creature. On a hit, you deal your weapons damage + 2d10 lightning damage and if the target is
      benefiting from temporary hit points, you deal damage to the creatures hit points and temporary hit points
      simultaneously. You do not add your ability modifier to the damage dealt.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the damage by 1d10. If this jutsu is cast at
      C-Rank, you can select a second creature within 30 feet of your original target and move into a space adjacent to
      them making a second attack. If this jutsu is cast at B-Rank, select a third creature within 30 feet of the second
      target and move into a space adjacent to them making a third attack. If this jutsu is cast at A-Rank or higher,
      select a fourth creature within 30 feet of the third target and move into a space adjacent to them making a
      fourth<br />attack.</p>
