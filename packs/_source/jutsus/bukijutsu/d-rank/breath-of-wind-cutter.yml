system:
  description:
    value: "<p>You begin to collect and manifest wind release chakra until it laces the striking portion of your weapon. The wind release chakra begins to spiral around the users weapon creating whipping torrents of wind. You use this enhanced field of wind to propel you towards your enemy.</p><p>Make a three melee taijutsu attacks against one creature you can see within range. On a hit, you deal your weapons damage die, in wind damage, but you do not add your ability modifier to your weapons damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the number of attacks by +1.\_</p>"
