system:
  description:
    value: >-
      <p>You ready several attacks before unleashing all of them out in front of you. All creatures in a 30-foot cone
      originating from you, must make a Dexterity saving throw. On a failed save you deal your [weapons damage] + 1d6.
      or half as much on a success. If you have to roll your weapons ammunition die, roll twice, taking the lower
      result.</p><p>If this jutsu is cast as a Chain 2, it deals an additional 1d6 damage. If this jutsu is cast as a
      Chain 3 the additional damage becomes 2d8</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d6.</p>
