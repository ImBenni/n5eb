system:
  description:
    value: >-
      <p>You imbue your weapon with chakra, turning it into a hazard even after it lands. Make a ranged taijutsu attack,
      on a hit you deal your [weapons damage] +1d6. Regardless of the result, the weapon shatters and its pieces create
      a minefield in a 10ft radius around the target, that last until the start of your next turn. The first time a
      creature would move within this radius, it takes 2d4 slashing damage.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and both damages by 1d6.</p>
