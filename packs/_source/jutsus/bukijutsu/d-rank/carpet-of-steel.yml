system:
  description:
    value: >-
      <p>You ready a stack of your weapons and scatter them across the ground in up to 45 feet away in a 20-foot cube.
      The area becomes difficult terrain and creatures that move while inside the area suffer 1d4 Piercing Damage for
      every 5 feet they move within the area. Spaces that have already been traversed are no longer difficult terrain
      and no longer deal damage if moved through again.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the radius of the jutsu by 5 feet.</p>
