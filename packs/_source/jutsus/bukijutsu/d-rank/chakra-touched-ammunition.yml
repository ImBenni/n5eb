name: Chakra Touched Ammunition
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You lace all of your ammunition with chakra, enhancing both its lethality and efficiency.</p><p>For the
      duration, whenever you would deal damage with the affected weapon with the ammunition property, you add an
      additional 1d4 damage of the weapon's type, twice per turn.</p><p>Additionally, when you would roll your
      ammunition die, roll an additional ammunition die, taking the higher result.</p><p>Finally, if you would cast a
      jutsu that spend a whole ammunition die, you can choose to instead end this jutsu, and not spend the die.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3. If this jutsu
      is cast at C-Rank, increase the damage to 2d4. If this jutsu is cast at A-Rank or higher, increase the damage to
      3d4</p>
    chat: ''
