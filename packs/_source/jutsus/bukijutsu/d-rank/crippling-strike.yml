name: Crippling Strike
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You focus your weapons attack on crippling your enemy, to make them far less effective than they are currently.</p><p>Make a melee or ranged taijutsu attack based on the weapon used for this jutsu, dealing your weapons damage. On a hit, the target must make a Strength saving throw. On a failed save they are Dazed and weakened, and are also knocked prone.</p><p>Additionally, if you score a critical hit with this jutsu, they make their saving throw at disadvantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the weapon damage die by 1.\_</p>"
