name: Dance Performance Neutral Stance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You draw your weapon, taking on a light stance, like that of a dancer's. For the duration of this jutsu, any Bukijutsu you cast with Dance Performance in its name has an increased critical threat range. Increase the critical threat range of taijutsu attack rolls of the aforementioned jutsu by +1.</p><p>If the jutsu instead forces a saving throw, a creature that rolls a 1 or 2 on the d20 for their save takes double damage if they fail.</p><p>At Higher Ranks: For each rank you cast this jutsu\_ above D-Rank increase the cost of this jutsu by 3. If this jutsu is cast at C-Rank, increase the critical threat range by +1. If this jutsu is cast at A-Rank, increase the critical threat range by +2 and if the creature would roll a 5 or lower on the d20 for the saving throw, they are considered vulnerable</p>"
    chat: ''
