system:
  description:
    value: "<p>You swing your weapon in a wide arc striking all creatures in the arc.</p><p>Make a melee taijutsu attack. All creatures of your choice, within your weapons range originating from you become the target of this attack, comparing your attack result to their AC as if you attacked each one individually. On a hit, you deal your weapons damage + 2d4 and each creature must succeed a Dexterity saving throw. On a failed save they are knocked prone.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the damage by 2d4.\_</p>"
