name: Debilitating Shot
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to throw weapons rapidly targeting your enemies pressure point to puncture them. Make a ranged
      Taijutsu Attack dealing your [weapon's damage] + 4d4. The target must also make a Constitution saving throw,
      gaining 1 rank of weakened on a failed save as your senbons lodge themselves into their joints, or half as much
      damage on a successful save.</p><p>A creature weakened by this jutsu can, as an action make a Wisdom (Survival)
      check vs your Taijutsu save DC to remove the lodged senbons on a success.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by
      +1.</p>
