system:
  description:
    value: "<p>You prep two separate attacks to go off in a single attack.</p><p>Before the end of your current turn, the next time you would make a ranged weapon attack, you make an additional one as a part of the same action, that must target another creature. Additionally, this additional attack benefits from any effects that would normally only affect the first or one weapon attack.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank, increase the number of additional attacks to two. If this jutsu is cast at S-Rank, increase the number of additional attacks to three.\_</p>"
