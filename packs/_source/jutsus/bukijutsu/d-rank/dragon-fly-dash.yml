name: Dragon Fly Dash
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You launch your weapon towards an allied creature you can see in range, ordering them to strike with it in your place. Select one\_ willing creature you can see in range and you throw your chosen weapon to them. Until the end of the current turn, the weapon thrown retains all bonuses and effects as if you were wielding it.</p><p>The target creature can spend their reaction to make one melee taijutsu attack, targeting a creature in their range, dealing the weapons damage + your ability modifier.</p><p>As a part of the same reaction, the allied creature can choose to throw your weapon back to you.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the number of attacks they<br />make by +1.\_</p>"
