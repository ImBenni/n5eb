system:
  description:
    value: >-
      <p>You charge a thrusting attack before lashing at with precise timing to deal a lethal blow to your enemy. Make a
      Martial Arts check versus a target creature in range's AC. If you roll higher, this jutsu gains advantage on the
      attack roll. Move up to the target creature and make a Melee Taijutsu Attack. This movement cannot provoke an
      attack of opportunity. On a hit, you deal your [weapons damage] and the creature must make a Constitution saving
      throw. On a failed save they cannot react until the end of the current turn.</p><p>If this jutsu is cast as a
      Chain 2, you gain advantage on your Martial Arts check. If this jutsu is cast as a Chain 3 you deal twice your
      weapons damage on a hit.</p><p>At Higher Ranks: For every rank you cast this jutsu above D-Rank, increase the cost
      by 3 and the damage by 1d8.</p>
