name: Enhanced Blocking
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You brace your weapon and enter a more guarded stance. You cannot lose concentration of this jutsu as a result
      of damage.</p><p>For the duration, while you are wielding a Polearm type weapon, you gain an additional +1 bonus
      to AC.</p><p>Additionally, any bonuses to AC you have as a result of the blocking property or weapon seals, you
      add that bonus to the first Strength or Dexterity saving throw you would make each round.</p><p>Also, for the
      duration of this jutsu, you can spend your reaction when you would take damage, to reduce the damage you take by
      twice your [weapons damage die]. If you reduce the damage to 0, you gain an additional reaction until the start of
      your next turn that can only be used to cast this jutsu again.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above D-Rank increase the cost of this jutsu by 3 and the damage you reduce by 1 [weapons damage die].</p>
