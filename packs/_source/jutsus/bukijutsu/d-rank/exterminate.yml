system:
  description:
    value: >-
      <p>You strike twice in a X-shape in an attempt to hamper your opponent's ability to attack back. Make Two melee
      Taijutsu Attacks. On a hit you deal your [weapon's damage die] +1d12. If both attacks are successful, your
      opponent must make a Constitution saving throw. On a failure they have a -2 to all attack rolls until the end of
      their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3, the damage by 1d12, and the Attack roll penalty by 1.</p>
