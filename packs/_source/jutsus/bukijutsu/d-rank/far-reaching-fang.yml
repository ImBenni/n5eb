system:
  description:
    value: >-
      <p>Your weapon is just an extension of yourself, it is your fang to defend what needs defending. You flood your
      weapon with chakra to enhance its ability to fly far and it's damage power. Make a Ranged Taijutsu Attack against
      a creature in range. On a hit you deal your [weapons damage] +2d10 and the target creature must make a Strength
      Saving throw or be knockback 15 feet. If they hit a structure or construct, they are pinned to it, being grappled
      to the wall until they use an action to free themselves</p><p>At Higher Ranks: For every rank you cast this jutsu
      above D-Rank, increase the cost by 3 and the damage by 1d8. If cast at B-rank, they are knocked back an additional
      15 feet. If cast at S-rank, they are knocked back an additional 15 feet.</p>
