system:
  description:
    value: >-
      <p>As a part of the activation of this jutsu, you must have a weapon in both hands that meet this bukijutsu
      component requirements. You make two swinging cuts in a single stoke by swinging both of your weapons
      inward.</p><p>Make a two Taijutsu attacks against up to two enemies within 5 feet of you, dealing the [weapons
      damage] + 1d4, and the target must make a Strength saving throw to avoid being disarmed of their weapon or item
      they are holding.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and the damage by 1d4.</p>
