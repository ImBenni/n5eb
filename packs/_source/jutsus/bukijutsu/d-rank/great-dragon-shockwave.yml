  description:
    value: >-
      <p>You quickly raise and slice down with your blade with such force that it creates a shockwave. Make a Melee
      Taijutsu Attack against a target creature in range. On a hit, you deal your [weapons damage] +1d8. All creatures
      within range other than the target must make a Strength saving throw or be knocked back 15 feet.</p><p>At Higher
      Ranks: For every rank you cast this jutsu above D-Rank, increase the cost by 3 and the damage by 1d8</p>
