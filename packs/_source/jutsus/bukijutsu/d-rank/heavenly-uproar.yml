  description:
    value: >-
      <p>You swing upwards with a rising force to the heavens before swinging back down to bring your opponent crashing
      to the earth. Make a melee Taijutsu Attack against a creature in range. On a hit, you deal your [weapons damage]
      and the creature must make a Strength saving throw. On a fail, you make a second melee Taijutsu Attack that deals
      your [weapons damage] +1d12 on a hit. On a success, you make the attack but at disadvantage, and you cannot gain
      an advantage on this attack by any means.</p>
