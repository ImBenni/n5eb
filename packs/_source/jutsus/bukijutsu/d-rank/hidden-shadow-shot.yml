system:
  description:
    value: >-
      <p>You throw your weapon however hiding in its Shadow is the true attack. Make a ranged Taijutsu Attack against a
      creature in range. The target creature must make a Perception check versus a Dc of 10+your Sleight of Hand. On a
      fail, this attack gains advantage and they cannot react. On a hit, you deal your [weapon's damage].</p><p>If this
      jutsu is cast as a Chain 2, it deals an additional 2d6 damage. If this jutsu is cast as a Chain 3 the additional
      damage becomes 2d8</p><p>At Higher Ranks: For every rank you cast this jutsu above D-Rank, increase the cost by 3.
      If this jutsu is cast at B-Rank increase the number of attacks by 1. At S- Rank this jutsu gains an additional
      attack.</p>
