system:
  description:
    value: >-
      <p>Placing a single, sheathed sword upright and listening to the "breath" of your opponent, you rapidly unsheathe,
      attack while passing by your target, and then re- sheathe your sword. Make a melee Taijutsu Attack against a
      creature in range. On a hit, you deal your [weapons damage] +1d10. If you beat your opponent's AC by 10 they
      cannot react to this jutsu.</p><p>At Higher Ranks: For every rank you cast this jutsu above D-Rank, increase the
      cost by 3 and the damage by 1d10. If this jutsu is cast at B-Rank, you only need to beat the AC by 5 to make the
      attack unable to be reacted to. If this is cast at S-Rank, you gain advantage on the roll. If you already have
      advantage this jutsu's casting cannot be reacted to.</p>
