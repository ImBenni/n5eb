system:
  description:
    value: >-
      <p>You thrust your weapon into your enemy, and keep it there. Make a melee Taijutsu Attack. On a hit deal your
      [weapons damage]. You then can choose to keep it there. Doing so means you cannot attack with that weapon while it
      is Impaled, however the target creature becomes grappled by your weapon. While they are grappled you can use your
      bonus action to twist the weapon, dealing your [weapons damage die]. You also can add your [weapons damage die] to
      all rolls to maintain the grapple. A creature can choose to instead forcible remove themselves from the weapon as
      an action, automatically escaping the grapple but gaining 2 ranks of bleeding.</p><p>At Higher Ranks: For every
      rank you cast this jutsu above D-Rank, increase the cost by 3 and the damage die by 1. If this jutsu is cast at
      B-Rank you have advantage on checks to maintain the grapple. If this jutsu is cast at S- Rank, they instead gain
      two tanks of Lacerated for forcible ending the grapple.</p>
