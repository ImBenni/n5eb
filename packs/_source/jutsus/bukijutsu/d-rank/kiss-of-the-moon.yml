system:
  description:
    value: >-
      <p>You send out your attack in a high arc that disappears from your opponent's eyes and falls as if from the moon
      itself. Make a Ranged Taijutsu Attack against a creature in range. They must make a Wisdom save equal to your
      Taijutsu Save DC. On a failed save this attack gains advantage as they lose sight of the attack as it rises up and
      falls back down. On a success it gains disadvantage as they keep track of it. On a hit you deal your [weapons
      damage] +2d6.</p><p>At Higher Ranks: For every rank you cast this jutsu above D-Rank, increase the cost by 3 and
      the number of creatures you can target by one</p>
