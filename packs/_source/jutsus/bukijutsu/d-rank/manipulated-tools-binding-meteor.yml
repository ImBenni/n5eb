name: Manipulated Tools Binding Meteor
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You summon forth a weighted chain from your \_weapon scroll and use it to restrain multiple targets you can see within range. Make a melee taijutsu attack against up to three targets, who are within 25 feet of one another. On a hit you grapple them and chain them to each other. Creatures chained together cannot move more than 25 feet from one another.</p><p>Additionally, creatures chained together can, as an action, make a Dexterity (Acrobatics) or (Sleight of Hand) check vs your Taijutsu save DC, escaping the chains on a success. A creature who fails this check makes it harder to escape for other chained creatures. All other chained creatures who attempt to escape after another\_ \_creature has failed, suffers a -2 penalty to their check, until the end of their next turn.</p><p>This penalty stacks.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.\_</p>"
