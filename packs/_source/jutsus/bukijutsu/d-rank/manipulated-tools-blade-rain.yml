name: Manipulated Tools Blade Rain
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You unravel your weapon scroll in the air, and reflexively summon forth a series of swords, knives and spears that rain down bombarding a space you can see within range.</p><p>All creatures in a 15-foot radius sphere originating from a point you can see within range, must succeed a Dexterity saving throw. On a failed save, they take 3d6 + your taijutsu ability modifier in piercing damage or half as much on a success. Additionally, the affected area becomes difficult terrain until after creature moves through it. The first time a creature would walk through any affected space would take 1d4 damage from the scattered bladed weaponry left behind protruding from the ground.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank\_ increase the cost of this jutsu by 3 and the damage by 1d6.\_</p>"
