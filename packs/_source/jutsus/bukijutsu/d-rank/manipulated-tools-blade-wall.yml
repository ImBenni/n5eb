  description:
    value: "<p>You unravel your weapon scroll in a 10-foot circle around you as you simultaneously summon a series of bladed weapons from it. All creatures in a 10-foot radius centering on you must succeed a Dexterity saving throw. On a failed save they take 3d8 piercing damage and they cannot upcast jutsu they cast until the end of their next turn on a failed save and gaining the bleeding condition or half damage on a successful save and no further effect.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the radius by 5 feet and the damage by 1d8.\_</p>"
