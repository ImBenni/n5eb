name: Monkey Kings 10000 Hairs
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You bathe your weapon in chakra until the chakra around it forms and shapes itself to resemble the famed Ruyi Jingu Bang. A legendary staff used by the fabled monkey king, Son Wukong. You cannot lose concentration as a result of damage.</p><p>For the duration, when you would take the attack action or cast a Bukijutsu with the Monkey Kings prefix with your weapon, you can choose to give it the Reach X property, where X equals your taijutsu ability modifier and twice per turn when you would deal damage with a weapon attack, or taijutsu attack you deal bonus damage equal to 1d6.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank, increase the bonus damage to 2d6. If this jutsu is cast at S-Rank, increase the bonus damage to 3d6.\_</p>"
