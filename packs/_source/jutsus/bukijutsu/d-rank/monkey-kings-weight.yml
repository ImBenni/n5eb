name: Monkey Kings Weight
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You fill your weapon with enough chakra to multiply its weight well over 10 times its normal weight. You cannot lose concentration on this jutsu as a result of damage.</p><p>For the duration of this jutsu, you multiply the weight of your bludgeoning weapon just before impact, while resetting its weight back to normal after impact. Each time you would deal damage with a melee Taijutsu attack under the effects of this jutsu, increase its [weapons damage die] by 1 step. (D4&gt;D6&gt;D8&gt;D10&gt;D12).</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank, increase the damage die by 2 steps. If this jutsu is cast at S-Rank, increase the damage die by 3 steps.\_</p>"
    chat: ''
