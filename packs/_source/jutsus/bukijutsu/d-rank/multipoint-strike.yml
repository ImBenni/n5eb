system:
  description:
    value: >-
      <p>You lash out with a flurry of attacks meant to completely overwhelm your enemy in the blink of an
      eye.</p><p>You make a series of pinpoint strikes and multiple parts of your targets body. Make a single melee or
      ranged Taijutsu attack that multiplies in effectiveness as you repeat the same motion over and over. On a hit, you
      deal your [Weapons Damage] +2 additional damage die.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank increase the cost of this jutsu by 3 and the bonus damage die by +1.</p>
