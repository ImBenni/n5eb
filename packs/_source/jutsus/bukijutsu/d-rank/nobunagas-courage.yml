name: Nobunaga's Courage
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You unleash a monstrous roar, filled with contempt and rage, while wielding your polearm weapon. This fills you
      with such animosity and anger that you become far more courageous and begin to imitate the look of the famed
      warrior, Oda Nobunaga causing great fear to your enemies and instilling great honor in your allies.</p><p>All
      allies who are within range that can hear you, the first time that they would gain any ranks of the following
      conditions for the next minute; Charmed, Daze, Fear. They do not, instead becoming immune to the jutsu, feature,
      trait or effect that affected them, until the end of that turn.</p><p>All hostile creatures who are within range
      that can hear you, must succeed a Charisma saving throw. On a failed save, the first time they would take damage
      from any weapon attacks you make using your Polearm weapon, they gain 1 rank of any of the following (Your
      choice), for the next minute, or until they spend an Action to remake their saving throw to end this effect on
      them;</p><p>• Dazed</p><p>• Fear</p><p>• Weakened</p>
