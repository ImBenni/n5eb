    value: >-
      <p>You spend a full ammunition die to overwhelm your enemy with a wall of arrows, darts, bolts, shuriken, kunai or
      Senbon.</p><p>All creatures in a 30-foot cone originating from you, must succeed a Dexterity saving throw. On a
      failed save, they take Xd4 damage of your chosen weapons type, where X equals the size of the die spent. (D4=4,
      D6=6, D8=8, D10=10, etc.)</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost
      of this jutsu by 3 and the damage die by 1 step. (D4&gt;D6&gt;D8&gt;D10&gt;D12</p>
