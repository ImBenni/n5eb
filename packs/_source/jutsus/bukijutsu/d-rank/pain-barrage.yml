system:
  description:
    value: >-
      <p>You leap in the air and spin while striking all targets in the area. Choose up to 10 creatures you can see
      within range. Roll your ammunition stack twice, taking the higher result. All selected creatures must succeed a
      Dexterity saving throw. On a failed save select creatures takes Xd4+Taijutsu ability modifier of your chosen
      [weapons damage] type. (X = The result of your ammunition stack.) Or half as much on a successful save.</p><p>You
      then land in an unoccupied space you can see within the range of this jutsu. This jutsu spends the ammunition
      stack entirely.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and the damage by 2d4</p>
