system:
  description:
    value: "<p>You prepare a cluster of paper bombs which are consumed in the casting of this jutsu, in between your fingers on both hands and launch them at a single Target covering them in the prepared Bombs.</p><p>A target you can see within range, makes a Dexterity saving throw, taking 7d4 Fire Damage on a failed save or half as much on a successful one.</p><p>Creatures within 10ft of the target creature, excluding the target\_ creature, also make the Dexterity Save, taking 5d4 Fire damage on a failed save or half as much on a successful one.</p><p>For every quality of item used above the basic item quality, you increase this jutsu's damage by 4d4.\_\_</p>"
