    value: >-
      <p>You quickly try to recover after your miss by pumping chakra into your arms to rebound the opposite way. You
      can remake the same attack at disadvantage targeting the same creature.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank, you instead
      make the attack normally. If it is cast at S-Rank you make it advantage.</p>
