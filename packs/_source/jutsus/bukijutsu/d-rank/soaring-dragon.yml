system:
  description:
    value: >-
      <p>You swing as hard as you can upward while also jumping yourself, aiming to slice your opponent into the air
      with you. Make a melee Taijutsu Attack against a creature in range. On a hit, you deal your [weapons damage] +2d4
      and they rise into the air with you 30 feet.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by
      2. If this jutsu is cast as a Chain 3 make an additional attack</p><p>At Higher Ranks: For every rank you cast
      this jutsu above D-Rank, increase the cost by 3 and the damage by 2d4.</p>
