system:
  description:
    value: >-
      <p>This jutsu does not cost chakra to maintain concentration on it. You begin to lace your weapons with chakra
      before firing. The first ranged weapon attack made with a Ranged Piercing weapon each turn, has a bonus to its
      critical threat ranged equal to +1.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank or higher increase the critical threat range
      by +1. If this jutsu is cast at S-Rank, increase the critical threat range by +1.</p>
