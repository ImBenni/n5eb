name: Soul Mark
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You fire off every receptor in your mind and eyes locking onto one creature you can see within range.</p><p>For
      the duration, select one creature to soul mark. The selected creature cannot benefit from three fourths or half
      cover. When you would deal damage with a weapon attack, you deal an additional 1d10 damage of your [weapons
      damage] type.</p><p>A creature remains marked until it reaches 0 hit points or you can no longer see it. Once a
      creature is no longer marked, you must recast this jutsu to soul mark them again.</p><p>While this jutsu has a
      target, any time you would make a weapon attack targeting another creature not soul marked, you reduce damage
      dealt by 1d6.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this
      jutsu by 3 and the number of creatures you can mark by +1.</p>
