system:
  description:
    value: >-
      <p>You quickly cancel out your Bukijutsu and use that energy to prepare for another. You cancel your last jutsu
      before its effects can take place and take a cross guard. If the creature would make an attack as a reaction you
      are hit regardless of the roll. If you would take damage from the creatures reaction you reduce the damage by the
      damage of the Bukijutsu that was canceled. If you would reduce this damage to 0, the next Bukijutsu you cast is
      automatically upcast by 1 rank.</p><p>At Higher Ranks: For every rank you cast this jutsu above D-Rank, increase
      the cost by 3 and the damage by 1d8.</p>
