  description:
    value: >-
      <p>Your stab your spear forward, flooded with chakra meant to either harm flesh or sunder steel. Make a Melee
      Taijutsu Attack against a creature in range. On a hit, you can either deal your [weapons damage], or reduce their
      Damage Reduction by an amount equal to your damage until the beginning of your next turn.</p><p>If this jutsu is
      cast as a Chain 2, you can do both without having to choose. If this jutsu is cast as a Chain 3 make an additional
      attack.</p>
