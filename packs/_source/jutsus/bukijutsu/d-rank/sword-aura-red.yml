system:
  description:
    value: >-
      <p>You begin to unlock the ability to create a Sword Aura, a path only master swordsmen could even hope to follow.
      You send a controlled flood of chakra into your sword, the striking portion flaring red from the chakra. Your
      blade pierces 4 dr for the duration. When you would deal damage to a creature with this weapon, once per turn you
      can force them to make a Strength Saving throw. On a failed save they take 1d10 Fire damage and are knocked prone
      as your blade explodes with force</p>
