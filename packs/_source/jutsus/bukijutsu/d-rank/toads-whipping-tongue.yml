name: Toads Whipping Tongue
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu does not cost chakra to maintain concentration on it. You enhance your weapon with chakra to control
      its trajectory mid attack. For the duration, weapon attacks you make with a Flail Weapon have a +1 to attack and
      damage rolls, an additional application of reach, and has a +2 bonus on Trip and Grapple attempts.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If cast at C-Rank or
      higher, the weapon instead has a +2 to attack and damage rolls. If cast at B-rank or higher, the weapon gains an
      addition application of reach. If cast at A-Rank of higher, the weapon has a +3 bonus to attack and damage rolls.
      If cast at S-Rank, the weapon has a +10 bonus to trip and grapple attempts.</p>
    chat: ''
