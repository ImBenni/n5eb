name: Weapon Break
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You quickly react to being hit by using your weapon to catch the attacking weapon at a vulnerable angle. The
      creature who triggered this reaction must succeed a Dexterity saving throw, having their weapon break on a failed
      save.</p><p>If the triggering creatures weapon has a bonus to attack and/or damage rolls or a weapon enhancement
      seal, it can only be broken by a weapon which has an equal or greater bonus to attack and/or damage rolls or an
      equal or greater ranked weapon enhancement seal.</p>
