name: Weapon Deflect
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You enter a defensive stance with your weapon, parrying any incoming attack. You gain a +2 bonus to your AC
      until the beginning of your next turn. Until the end of your next turn, the next Bukijutsu you cast with the Chain
      keyword, increases its damage by +2 damage dice.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-rank, increase the cost of the jutsu by 3. If this jutsu is cast at B-rank, increase the AC bonus by +1 and the
      damage bonus by +1 damage die. If this jutsu is cast at S-Rank, increase the AC bonus by +2 and the damage bonus
      by +2 damage dice.</p>
    chat: ''
  source:
