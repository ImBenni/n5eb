name: Yosaku Strike
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: "<p>You swing your weapon with enough force to create a lateral wave of cutting force. Creatures in a 15-foot cone in front of you must succeed a Dexterity saving throw.</p><p>On a failed save you deal your weapons damage + 3d4 on a failed save or half as much on a successful one. You do not add your ability modifier to the damage.</p><p>Creatures who are within 5 feet of you when you cast this jutsu make their save at disadvantage.</p><p>If this jutsu is cast as a Chain 2, you can add your ability modifer to the damage roll. If this jutsu is cast as a Chain 3 increase the damage die by 1 step</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and range of this jutsu by 5 feet.\_</p>"
    chat: ''
