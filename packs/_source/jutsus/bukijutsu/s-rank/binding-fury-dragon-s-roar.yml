system:
  description:
    value: >-
      <p>(Must be under the effects of a Binding Fury Stance to cast) You unleash all of your pent of fury into an
      endless flurry of attacks. Make 3 melee Taijutsu attacks against a targeted creature. On hit, deal your [weapons
      damage] +2d10. If all 3 of these attacks hit you can spend 1 Fury to make an additional attack dealing your
      [weapons damage die] against the same creature. You can continuously spend 1 Fury to make an additional attack
      against the creature until you miss an attack roll or you make 10 attack rolls, whichever comes first.</p><p>If
      this jutsu is cast as a Chain 2, increase the damage die by +3, if this jutsu is cast as a Chain 3, increase the
      damage die by an additional +2, and each attack made as a result of spending *Fury* deals an additional 1d6 damage
      on hit.</p>
