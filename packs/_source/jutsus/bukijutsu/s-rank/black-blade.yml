system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu, your weapon must be under the effects of a jutsu that would
      provide it an increase to damage in any way, such as the jutsu Lightning Release: Static Weapon, Mortal Draw, Fire
      Release: Flame Coat, etc.</p><p>You take your already enhanced weapon and funnel more powerful chakra within it,
      causing it to radiate intense black chakra. You move to a space within 120 feet in any path of your choosing. For
      every 30 feet you move, you jump in the air and send a slash of black chakra in a 45-foot long, 15-foot-wide line.
      All creatures within range of one of these lines must make a Dexterity saving throw, on a failed save they take
      your [weapon's damage die] + 2d8 damage of the damage type of the jutsu that buffs your damage (This jutsu ignores
      restrictions that prevent damage bonuses from jutsu to apply multiple times), or half much damage on a success. A
      creature makes a save for each line that passes through its space.</p><p>A creature that fails this saving throw
      by 5 or more lowers their maximum hit points by half the damage dealt for the next minute. This effect can be
      removed early by a medical effect that removes conditions of S- Rank or higher. If this occurs, the effected
      creature cannot suffer the fall by 5 or more effect of this jutsu for the next minute.</p>
