name: Breath of Sun Heat Haze
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You begin to collect and manifest a bright chakra until it laces the striking portion of your weapon, causing
      it to shine, like the rising sun. This chakra then begins to glow brightly with enough intensity to nullify any
      chakra based or natural darkness until the end of your current turn. This shine creates a hazy illusion of all
      movement you make.</p><p>To cast this jutsu, you must be under the effect of Breath of Sun: Raging Sun or Breath
      of Sun: Fake Rainbow. After casting this jutsu, Raging Sun and Fake Rainbow end.</p><p>Make a melee weapon attack
      as quickly or slowly as you like. Regardless of the result of the attack, you automatically hit. You can roll to
      hit and declare the attack a hit or a miss, and the target can choose to react accordingly as they normally would,
      but regardless of the result or any penalties they impose or bonuses they gain, you automatically hit, dealing
      your [weapons damage] + 12d12. This jutsu cannot gain the benefits of a critical hit, damage dice multiplication
      or alteration effects. This jutsu cannot benefit from bonuses to damage as a result of other jutsu, class or clan
      features.</p>
    chat: ''
