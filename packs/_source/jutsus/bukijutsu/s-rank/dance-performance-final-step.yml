name: Dance Performance Final Step
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You finish your battle dance by moving faster than the eye can see, affecting anything in your sight. Make two
      melee or ranged Taijutsu attacks. Compare the results against each creature of your choice that you can see within
      range, seemingly teleporting between each space, ending in an unoccupied space you can see.</p><p>This movement
      does not provoke opportunity attacks. Each hit deals your [weapons damage] + 5d6, and each creature you hit gains
      2 ranks of lacerated.</p><p>Additionally, if you cast a jutsu with Dance Performance in the name as part of a
      chain, you can cast this jutsu as a reaction, treating it as a Chain 3.</p>
