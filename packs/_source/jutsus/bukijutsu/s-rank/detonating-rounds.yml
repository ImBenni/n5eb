name: Detonating Rounds
type: spell
_id: 5DONizadxwiavksJ
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You infuse your chakra into your ammo set with a trigger to erupt into a lethal explosion. For the next minute
      your ammo stack inflicts a rank of Primed on each successful weapon or Taijutsu attack from the ammo stack. A
      creature cannot have more than 10 ranks Primed. As a Bonus Action or a Reaction, you can detonate all Primed ranks
      on all creatures you can see, dealing 2d12 Force damage for every prime stack detonated. A creature can spend an
      action on their turn to make a Sleight of Hand check versus your Taijutsu Save DC to remove all ranks of Primed on
      them. You cannot detonate the stacks of Primed a creature has as a reaction while they are taking this action.</p>
