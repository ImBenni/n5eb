system:
  description:
    value: >-
      <p>You spin your weapon with a cruel smile and reel back to deliver a deadly swing that would dismantle apart any
      devil. Make one Melee Taijutsu attack targeting Each creature in a 20-foot radius sphere. Dealing your [weapons
      damage] +8d6 force damage and gain 2 ranks of weakened and 2 ranks of Lacerated on a failed save. If a creature is
      concentrating on a jutsu and takes damage the concentration immediately ends if it is below S-Rank or the creature
      has a higher level then you. If it does not immediately end, then they still make their concentration check at
      disadvantage. If this jutsu clashes with another jutsu, you gain advantage on the clash check and the triggering
      creature gains disadvantage.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by +6, and one
      additional rank of Weakened and Lacerated if this jutsu is cast as a Chain 3, increase the damage die by an
      additional +2, and two additional ranks of lacerated, and one additional rank of weakened</p>
