system:
  description:
    value: >-
      <p>You grasp two of the scrolls sealed with ammunition into them and unfurl them in a double helix formation as
      you jump 60 feet into the air. The sealed ammunition creates a blanket of steel above your opponent, enough to
      block out the sun. All creatures in a 30-foot radius originating from you, other than you, must succeed a
      Dexterity saving throw taking 35d4 piercing damage on a failed save or half as much on a successful save. You take
      no falling damage and land on your feet.</p>
