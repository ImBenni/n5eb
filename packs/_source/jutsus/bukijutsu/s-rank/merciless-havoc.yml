system:
  description:
    value: >-
      <p>You slam your weapon down into your opponent and quickly follow up with a flurry of strikes. Each swing creates
      a spectral visage of your weapon that passes through all enemies in front of you. Make 7 melee Taijutsu attacks vs
      the AC of all targets in this jutsu's range. On hit, targets take your [weapons damage die] +1d4. A target that is
      hit by all 7 attacks is knocked prone and has their movement speed reduced to 0 until the end of their next turn.
      These attacks cannot score a critical hit.</p><p>If this jutsu is cast as a Chain 2, increase the damage by 2
      steps, if this jutsu is cast as a Chain 3, increase the damage die by an additional 2 steps.</p>
