name: Mortal Defiance
type: spell
_id: qgQ2qaAuSRJc1O8u
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>You keep your weapon spinning, using it as an anchor to tie you to this mortal coil for a bit longer, even
      using it as a set of strings to puppet yourself sometimes. This jutsu's duration is until you die or stabilize.
      For the duration, you roll your death saves at the end of your turn and you gain the following effects:</p><p>• If
      you damage a creature with the weapon used to cast this jutsu. You gain advantage on the death saving
      throw.</p><p>• If you reduce a creature to 0, you instantly succeed a death saving throw.</p><p>• If you are
      damaged while in this state, you do not take a failed a death saving throw, instead you roll that death saving
      throw with disadvantage. You cannot gain advantage on this death save by any means.</p><p>• If you score a natural
      20 on an attack roll. You are immediately stabilized with 1 HP.</p><p>• If you go a turn without damaging a
      creature, you do not roll the death saving throw at the end of your turn, you instead take 1 failed death saving
      throw.</p>
