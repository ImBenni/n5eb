name: Mortal Draw
type: spell
img: systems/n5eb/assets/content/jutsu-icons/bukijutsu.webp
system:
  description:
    value: >-
      <p>As a part of this jutsu, you impale yourself with your weapon, coating it in your blood, reduce your current
      hit die to 0, and you take 4d12 necrotic damage to yourself that cannot be reduced in any way.</p><p>You cannot
      lose concentration on this jutsu as a result of damage.</p><p>As a result, your weapon becomes a living embodiment
      of your lifeforce extending in range and enhancing its lethality. For the duration your weapon's range is doubled,
      deals +4d12 necrotic damage twice per turn, ignores resistances and immunity, and deals double damage to
      structures and constructs.</p>
