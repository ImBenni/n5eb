system:
  description:
    value: >-
      <p>You jab your weapon into your opponent's torso, then twirl it above your head at rapid speeds manipulating the
      air pressure around you, pulling nearby enemies in. Make a melee Taijutsu attack, on hit, the target takes your
      [weapons damage], then all creatures within your weapons reach+10 feet must a Strength saving throw. Creatures
      that fail take damage equal to your [weapons damage die] +3d8 and are pulled 15 feet toward you, or half as much
      damage on success with no additional effects.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by
      +3, if this jutsu is cast as a Chain 3, increase the damage die by an additional +1, and your weapon reach extends
      to +15 feet for this casting</p>
