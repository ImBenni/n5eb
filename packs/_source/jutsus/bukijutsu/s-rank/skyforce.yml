system:
  description:
    value: >-
      <p>(To cast this jutsu, the target must be airborne) You fuel your weapon with sapping chakra, then leap into the
      air and strike your opponent in their abdomen. Make a melee Taijutsu attack against an airborne target. On hit
      they take your [weapons damage] +5d8. A creature hit by this jutsu also takes double fall damage as they are sent
      plummeting into the ground. If you reduce a creatures to 0 hit points with this jutsu, regain health equal to the
      amount of damage dealt with this jutsu.</p><p>If this jutsu is cast as a Chain 2, increase the damage die by +5,
      if this jutsu is cast as a Chain 3, increase the damage die by an additional +5</p>
