system:
  description:
    value: >-
      <p>You leap into the air while slashing relentlessly, Striking everyone and everything around your multiple times.
      Make 3 melee Taijutsu attacks. All creatures within 25-feet of you of your choice are targets. The result of the 3
      attacks represent the rolls made in attempts to get over each creature's AC. On each successful hit, target
      creature(s) takes your [weapons damage die] + 3d10 Slashing Damage. If you roll a critical hit all creatures
      suffer the effects of the critical hit</p>
