    description: >-
      <p><strong>Max Ranks</strong>: 100</p><hr /><p>A <strong>Lacerated</strong> creature has suffered a major wound on
      their body and begins to bleed profusely, the rushing blood causing the wound to grow in intensity with each
      passing second.</p><ul><li><p>A <strong>Lacerated</strong> creature is counted as <strong>Bleeding</strong> for
      the purposes of interacting with Features, Traits and Jutsu</p></li><li><p>At the beginning of a
      <strong>Lacerated</strong> creatures turn, they take 1d6 necrotic damage per rank of Lacerated they
      have.</p></li><li><p>A <strong>Lacerated</strong> creature that gains ranks of Bleeding, gains ranks of Lacerated
      instead.</p></li><li><p>A <strong>Lacerated</strong> creature cannot gain the benefits of a
      rest.</p></li><li><p>As an Action, A <strong>Lacerated</strong> creature may attempt to stop the Laceration by
      succeeding on a DC 20 Medicine check with a Medicine Kit.</p></li><li><p>A creature with ranks of lacerated gains
      one rank of laceration at the end of its turns.</p></li><li><p>A creature immune to the bleeding condition is
      immune to the lacerated condition.</p></li><li><p>Outside of combat, every 10-minutes a creature suffers the
      effects of this condition as if a turn has passed in combat.</p></li></ul>
