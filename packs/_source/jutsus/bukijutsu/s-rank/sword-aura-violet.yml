system:
  description:
    value: >-
      <p>You must be under the effects of a Sword Aura to cast this jutsu. You use the built-up chakra in your blade to
      have it explode out in a violent violet explosion as you slash down, raining your sword aura over a wide area,
      striking all who stand before you. All creatures of your choice within the area of this jutsu must make a
      Dexterity Saving Throw or take your [weapons damage] +3d6 and gain 3 ranks of Lacerated as you rain down violet
      swords made of your sword aura. On a success they take half damage and instead gain 2 ranks of bleeding.</p><p>If
      this jutsu is cast as a Chain 2, increase the damage die by +4, if this jutsu is cast as a Chain 3, increase the
      damage die by an additional +2, and an additional rank of lacerated</p>
