name: Earth Release Added/Reduced Weight
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You use your chakra to temporarily manipulate the weight of something you touch. Objects and structures, you
      touch increase in weight drastically, increasing 10 times in total weight.</p><p>Objects and structures you touch
      that occupy a space no larger than a 60-foot cube, cannot handle the strain of their own weight and begin to
      shatter and break shattering into super heavy rubble.</p><p>If used on an unwilling creature, make a Melee
      Ninjutsu attack on a creature. On a hit target creatures' weight is doubled, gaining +15 bulk, and has their speed
      reduced to 0 feet. As an action on each of an affected creatures turn, they can make a Strength saving throw to
      end this Jutsu's effect on them.</p><p>If used on a willing creature, you reduce their weight to 0 as they gain a
      60-foot flying speed. If flying in this way, you do not need to spend chakra to maintain concentration on this
      jutsu.</p>
