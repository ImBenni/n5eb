name: Earth Release Calcite Tenacity
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You create a surge of Earth Release Chakra and use it to amplify a willing creature you can reach within range.
      Once successfully cast, you do not need to see where the target is and must remain within 120 feet of
      them.</p><p>The target creature gains 4 DR and advantage on Strength &amp; Constitution saving throws</p><p>If the
      target creature falls under a condition inflicted by a jutsu cast by a creature other than you, you may spend your
      reaction to immediately end the condition.</p><p>Additionally, if the target creature falls to 0 hit points, you
      can as a reaction choose to instead heal them by an amount equal to 7d8 + 20 Hit points, when you do this jutsu
      immediately ends.</p>
