system:
  description:
    value: >-
      <p>You create a field of potent Earth Release Chakra that permeates through you and a number of Quake Shards of
      your choice within range 30 feet of you.</p><p>Select creatures of your choice within 30 feet of yourself or an
      Quake Shard affected by this jutsu, gain a layer of earth release chakra that solidifies into the shape of armor
      of your description. Select creatures gains Temporary Hit Points equal to three times your Ninjutsu Save
      DC.</p><p>The temporary hit points you grant them has Immunity to Cold Damage, resistance to Bludgeoning,
      Piercing, Slashing and Vulnerability to Lightning damage.</p>
