name: Earth Release Gravity Break
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You focus a large amount of chakra into a 50 wide and 100-foot-high cylinder centered on a point within range.
      All creatures and objects that aren't somehow anchored to the ground in the area begin to fall upward and reach
      the top of the area when you cast this ninjutsu. A creature can make a Strength saving throw to grab onto a fixed
      object it can reach or anchor themselves to the ground using a weapon to stab into the ground or wedge themselves
      into place, thus avoiding the fall. If a creature prevents themselves from falling by using a weapon they must
      make Strength saving throws at the beginning of each of their turns, falling on a failure.</p><p>If a solid object
      (Such as a ceiling) is encountered in this fall, falling objects and creatures strike it just as they would during
      a normal downward fall. If an object or creature reaches the top of the area without striking anything, it remains
      there, oscillating slightly, for the duration. At the end of the duration, affected objects and creatures fall
      back down.</p>
