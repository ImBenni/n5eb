name: Earth Release Starfall Wake
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You manifest a series of shimmering shards of earth 300 feet in the air that floats above you for the
      duration.</p><p>As an Action, Bonus Action, or Reaction you can call down these shard to bombard a space you can
      see within range. A creatures within 10 feet of the selected space must succeed a Dexterity saving throw taking
      9d8 Earth damage on a failed save or half as much on a successful one. A creature who would make a second saving
      throws in the same turn as the result of this jutsu instead would take 9d6 Earth damage on a failed save or half
      as much on a successful one. A creature who would make a third saving throws in the same turn as the result of
      this jutsu instead would take 9d4 Earth damage on a failed save or half as much on a successful one.</p>
