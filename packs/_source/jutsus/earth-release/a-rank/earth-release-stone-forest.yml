name: Earth Release Stone Forest
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You focus a large amount of chakra into the palms of your hands and place them on the ground. You create a
      field of spiked earth in a 30-foot cube originating from you. Creatures of your choice caught in range must make a
      Dexterity saving throw, taking 10d8 Earth Damage on a failed save, and half on a successful one.</p><p>The area
      that was affected by the jutsu is now plagued by massive Stone spikes that reach as high as 10 feet and criss
      cross into a forest of spikes making it difficult terrain to traverse. Creatures inside the affected area roll at
      disadvantage when making Wisdom checks to perceive something. The affected area counts as a Single Quake
      Shard</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3
      and the damage by 1d8.</p>
