name: Earth Release Bottomless Swamp
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You select a space within range that you can see as a swamp-like pool begins to form as it fills a 60 ft Cube.
      This mud pool is difficult terrain, cannot be traversed using water walking techniques, and prevents creatures
      from dashing. Creatures caught in the radius when this jutsu is cast, enters the radius, or begins their turns
      there must make a Strength saving throw at the beginning of each of their turns for the duration.</p><p>Each
      consecutive failure imposes additional penalties and effects on the target creature(s). On a success a creature
      remove one of the failure conditions in the reverse order they received them.</p><p>• On the first failure, a
      creature is restrained as their feet have been sucked below the surface leaving their knees and above
      exposed.</p><p>• On a second failed save, half of the creature's body is submerged and creatures restrained by
      this jutsu also automatically fail Dexterity saving throws.</p><p>• On a third failed save, the creature is
      dragged below the surface. A creature pulled below the surface is counted as suffocating and can only survive a
      number of their turns equal to its Constitution modifier before it enters the dying condition. If this jutsu is
      ended, the surface of the Swamp hardens back into stone. They are no longer restrained but they are still in a
      thick swamp, suffocating.</p><p>If this jutsu is ended, creatures trapped in the swamp are pushed to the surface
      and released as the ground gradually reforms to its original consistency and form.</p>
    chat: ''
