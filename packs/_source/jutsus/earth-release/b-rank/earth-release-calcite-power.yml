name: Earth Release Calcite Power
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You create a surge of Earth Release Chakra and use it to amplify a willing creature you can reach within range.
      Once successfully cast, you do not need to see where the target is and must remain within 120 feet of
      them.</p><p>Jutsu the target creature casts becomes amplified by your Earth Release Chakra. Jutsu, they cast for
      the duration deals an additional 3d8 Earth Damage once per turn, Clashes made with their jutsu cannot be made at
      disadvantage, and the Save DC for the jutsu they cast increase by +2.</p><p>Additionally, if the target attempts
      to cast a Jutsu with the Earth Release Keyword, reduce the cost of their jutsu by 2.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at S-Rank
      increase the bonus damage by 1d8.</p>
