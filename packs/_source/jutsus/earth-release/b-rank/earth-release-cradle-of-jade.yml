name: Earth Release Cradle of Jade
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You surround a creature you can see within range with Earth Release Chakra in an attempt to protect them. When
      a you or a creature you can see within range would take damage, you can spend your reaction encasing them in
      chakra that quickly solidifies as Crystalline Jade right before impact.</p><p>The Crystalline jade reduces the
      incoming damage by 10d6. The Crystalline jade has resistance to Cold Damage, and Vulnerability to Lightning
      Damage. The Crystalline jade then dissolves at the beginning of the affected creatures turn.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage
      reduction by 1d6.</p>
