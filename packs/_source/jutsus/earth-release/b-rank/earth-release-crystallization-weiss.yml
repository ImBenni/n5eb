name: Earth Release Crystallization Weiss
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You create a cage of earth release chakra that you use in an attempt to trap and capture a target
      creature.</p><p>Select one creature you can see within range. Target creature must succeed a Constitution saving
      throw at the beginning of each of their turns for the duration as you attempt to encase them into a shard of
      Crystal.</p><p>A creature who fails 1 save begins to have crystal form across their body as they gain the Weakened
      condition. A creature who fails 2 saves begins to slow as their joints are overtaken by minerals, gaining the
      grappled Condition. A creature who fails 3 saves begins to be overtaken as they find it difficult to move gaining
      the restrained condition. A creature who fails 4 saves feels the crystals overtaking them as they gain the stunned
      condition. A creature who fails 5 saves becomes petrified for 24 hours.</p><p>A creature who passes 3 saves
      immediately ends this Jutsu's effect on them and become immune to it for 24 hours.</p>
