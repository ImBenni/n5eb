    description: >-
      <p>A <strong>Petrified</strong> creature is transformed, along with any object it is wearing or carrying, into a
      solid inanimate substance (usually stone). Its weight increases by a factor of ten, and it ceases aging. An
      incredibly rare condition usually associated with high level Earth release, Kinjutsu, or forbidden dark
      magic.</p><ul><li><p>The creature is incapacitated (see the condition), can’t move or speak, and is unaware of its
      surroundings.</p></li><li><p>Attack rolls against the creature have advantage.</p></li><li><p>The creature
      automatically fails Strength and Dexterity saving throws.</p></li><li><p>The creature has resistance to all
      damage.</p></li><li><p>The creature is immune to poison and disease, although a poison or disease already in its
      system is suspended, not neutralized.</p></li></ul>
