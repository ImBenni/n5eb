name: Earth Release Earth Prison Dome
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: "<p>You create a dome of earth around a target or targets in a 10-foot sphere in front of you. Creatures in the targeted radius can make a Dexterity save. On a success, they can move half of their movement. On a failure, they do not get a chance to move.</p><p>Creatures captured inside the dome begin to have their chakra drained at the beginning of each of their turns. Each creature reduces their current chakra by 2d10+Your Ninjutsu ability modifier at the beginning of each of its turns. Half of the result is then\_ transferred to the caster of this jutsu.</p><p>The dome of earth has an AC equal to the users Ninjutsu Save DC and has 40 Hit Points and counts as an Quake Shard. The dome regains 2d8 Hit points at the start of each of your turns so long as it has more than 0 hit points. The Dome is Vulnerable to lightning Damage and resistant to cold damage. If the dome takes lightning damage, it does not regenerate hit points at the start of your next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the initial hit points by 10.</p>"
