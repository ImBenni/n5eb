name: Earth Release Iron Skinned Spear
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You focus Earth Release chakra throughout one of your limbs until it darkens into a dark brown hue and gains
      the texture of solid stone. You then use this darkened ligament to strike at a creature with enough force to tear
      through almost anything.</p><p>Make a melee ninjutsu attack against a creature within range. On a hit, you deal
      10d6 Earth damage and marking the creature with a mark of petrification.</p><p>A creature marked this way makes
      Constitution saving throws at the beginning of each of their turns for the next minute. On a failure its skin
      begins to harden at the point of impact as their body begins to petrify. If the creature fails this saving throw
      three times their body fully hardens as they become petrified turning fully into stone for the next 24
      hours.</p><p>If the target creature succeeds 3 saves they reject the earth chakra from their body ending the
      effects of this jutsu. If this jutsu is used on a creature previously affected by this jutsu within 24 hours, they
      make each constitution saving throw at advantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      B-Rank, increase the cost of this jutsu by 3 and the walls hit points by 1d6.</p>
