name: Earth Release Lapis Dominion
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You release earth release chakra from your body touching everything within a 90-foot cube originating from you.
      For the duration, you do not need to spend chakra to maintain this jutsu.</p><p>When you cast this jutsu you erect
      walls of Lapis made of Earth Release chakra 30 feet high and 10 feet thick on the outside edges of this jutsu's
      range. These walls have an AC equal to your Ninjutsu save DC and a number of hit points equal to 10 times your
      proficiency bonus.</p><p>Earth Release Jutsu you cast while within your jutsu's radius cost 2 less to cast and 1
      less to maintain.</p><p>When you cast this jutsu, select a number of creatures within your jutsu's range. Those
      creatures are immune to this jutsu effects. All other creatures who begin their turns in your jutsu range or enter
      your Jutsu's range for the first time must succeed a Strength saving throw.</p><p>On a failed Strength saving
      throw the target is affected by the monumental weight your chakra enforces on the area and gains 1 rank of
      weakened and become unable to maintain concentration on a Jutsu that does not have the Earth Release Keyword until
      the end of their next turn.</p>
