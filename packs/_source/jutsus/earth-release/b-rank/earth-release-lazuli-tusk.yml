name: Earth Release Lazuli Tusk
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You generate an Quake Shard in the form of some tusked or horned creature of your description and manipulate it
      to ram into a target creature of your choice within range.</p><p>Make a Melee Ninjutsu Attack against a target
      creature within range, as the Quake Shard attempts to ram the target. On a hit, you deal 3d10 Piercing damage and
      3d10 Earth Damage.</p><p>Once this jutsu ends, the Quake Shard stands in place occupying a 5-foot cube. The
      construct weighs 500 pounds, and can be used as partial cover. It counts as an Quake Shard of your creation while
      remaining as a part of the environment until destroyed or otherwise moved.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the number of Quake Shards you summon.
      Each Quake Shard must target a different creature.</p>
