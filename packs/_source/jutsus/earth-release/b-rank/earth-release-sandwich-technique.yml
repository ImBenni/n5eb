name: Earth Release Sandwich Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You conjure two massive constructs of earth of your design and description that is large in size on either side
      of a single creature you can see in range and slam them into one another with the creature in the middle. Target
      creature and all creatures within 5 feet of them must succeed a Strength saving throw being crushed and taking 6d6
      earth damage and being bruised on a failed save or half as much on a successful one. The Constructs of Stone
      remain as Quake Shards.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost
      of this jutsu by 3 and the damage by 1d6.</p>
