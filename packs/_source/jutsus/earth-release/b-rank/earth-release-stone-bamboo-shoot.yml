name: Earth Release Stone Bamboo Shoot
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You conjure 4 reinforced spears of earth that all converge on a single creature you can see within range from 4
      different points surround the target creature. Make a Ninjutsu Attack on the target creature dealing 6d10 Earth
      damage as they attempt to skewer the target. A 20-foot radius cube centering on the target creature becomes
      difficult terrain and creatures cannot take the dash, dodge or disengage actions while within an area of difficult
      terrain created by this jutsu.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3 and the damage by 1d10.</p>
