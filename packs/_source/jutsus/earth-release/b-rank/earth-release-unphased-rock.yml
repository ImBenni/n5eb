system:
  description:
    value: >-
      <p>You mark a single stone you are holding with chakra as you bind a piece of yourself to it for the duration.
      Select two Skill proficiencies or 1 Save Proficiency. This stone becomes imbued with that knowledge and
      experience, as you temporarily lose that proficiency for the duration or until you end this jutsu as a bonus
      action.</p><p>A creature who is holding this stone with one hand gains these proficiencies for the duration. While
      holding this stone you cannot make handseals or use Chakra seals with the same hand holding the stone.</p>
