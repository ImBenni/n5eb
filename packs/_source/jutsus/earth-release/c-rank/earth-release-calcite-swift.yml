name: Earth Release Calcite Swift
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You create a surge of Earth Release Chakra and use it to amplify a willing creature you can see within range.
      Once successfully cast, you do not need to see where the target is and must remain within 120 feet of
      them.</p><p>Target creatures Dexterity becomes 20 for the duration if it is not already. They gain Proficiency in
      Dexterity saving throws and their speed is increased by 20 feet.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above C-Rank, increase the cost of this jutsu by 3 and their speed by 10 feet.</p>
