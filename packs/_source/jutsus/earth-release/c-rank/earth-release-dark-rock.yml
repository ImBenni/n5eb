name: Earth Release Dark Rock
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: "<p>You slam your palms into the ground as the immediate area becomes blackened. A single Quake Shard is erected from the ground at a point of your choice within range. The structure is black and cold to the touch and emanates a light obstructing aura.</p><p>The Structure absorbs all light within 15 feet of it creating a blackened field that cannot be seen through to the other side. Creatures within that radius are immediately blinded and cannot see while within the radius and cannot be seen by creatures outside the radius either. A creature who touches the structure can see through the blackened field as if it wasn't there at all and loses the blinded condition so long as they remain within contact with the structure.\_</p><p>The structure has an AC and hit point value equal to your Ninjutsu save DC. If the structure is destroyed the jutsu immediately ends.</p>"
