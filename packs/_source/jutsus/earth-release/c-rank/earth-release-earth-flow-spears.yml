name: Earth Release Earth Flow Spears
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>Choose a point you can see on the ground within range. A Fountain of spiked earth molded from the ground erupts
      in a 10-foot cube. Each creature in that area must make a Dexterity saving throw. A creature takes 3d12 earth
      damage on a failed save, or half as much damage on a successful one.</p><p>The affected area is now considered
      difficult terrain until it is cleared, which requires 10 minutes of work.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d12.</p>
