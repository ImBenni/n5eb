name: Earth Release Geo Rockblade
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You manifest a Geo weapon made from pure Earth Release chakra of your design and make by picking up a single
      stone. This stone reshapes and reforms until it takes the shape of the weapon you chose. You gain proficiency in
      the Stone Weapon made and the Stone weapon gains all that weapons properties.</p>

      <p>If you create a weapon without the Two-Handed Property, the weapon deals 2d6 + your Ninjutsu Ability Modifier
      earth damage.</p>

      <p>If you create a weapon with the Two-Handed property, the weapon deals 2d8 + your Ninjutsu Ability Modifier
      earth damage.</p>

      <p>If another creature takes this weapon and attempts to use it, it loses one damage die.</p>

      <p>You can dismiss this weapon as a bonus action or reaction.</p>
