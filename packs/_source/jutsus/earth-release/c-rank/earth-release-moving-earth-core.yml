name: Earth Release Moving Earth Core
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You are able to amplify constructs made of earth causing them to become far more potent, tough, and durable.
      Select one Quake Shard you can see and reach. By touching it, you infuse it with a surge of Earth Release chakra,
      amplifying it. Quake Shards you cast this jutsu on, gains the following benefits;</p><p>• Bonus 2d10 + Your
      Ninjutsu ability modifier in Hit points or Temporary hit points.</p><p>• Reduces incoming damage by 1d8 +
      3</p><p>• Deals 2d6 bonus earth damage if it scores a hit with one of its attacks, once per turn.</p><p>If you
      target an area without an Quake Shard, you can manipulate the terrain a bit, moving it up to 15 feet higher or
      deeper, or forming it into a simple structure of your choice within a 15-foot cube.</p>
