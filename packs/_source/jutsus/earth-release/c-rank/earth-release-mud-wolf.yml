name: Earth release Mud Wolf
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You focus on conjuring a beast made of pure earth release chakra. By fusing your earth release chakra with the
      surrounding dirt, earth and other earthen like minerals, you are able to conjure two mud wolves. Mud wolves are
      Quake Shards.</p><p>The Wolves have the following stats and act as a bonus action on your turn and use your
      Ninjutsu attack bonus or Ninjutsu Save DC when an effect calls for it. When you command them, all wolves currently
      active acts at the same time, and attempt to perform the same actions against either the same creature or
      different creatures determined by you.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3, the number of Wolves you Summon by +1 and the wolves hit points by +10.</p>
