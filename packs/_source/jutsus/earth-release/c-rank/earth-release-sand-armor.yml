name: Earth Release Sand Armor
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>An extremely protective and dense layer of sand surrounds you and takes on the same texture and color of your
      clothes, skin and item blending in with your clothing perfectly. For the duration of this jutsu you gain 20
      Temporary hit Points. While you have these temporary hit points you gain resistance to Bludgeoning, Piercing, and
      Slashing, Cold and Earth damage as the sand protects you. Lightning damage bypass the Temporary hit points granted
      by this jutsu.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this
      jutsu by 3 and the Temporary Hit points by 15.</p>
