name: Earth Release Sand Coffin Binding
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You call forth a collection of sand, dust and pebbles to surround and capture a creature you can see within
      range in order to crush it.</p><p>The target creature must succeed a Dexterity saving throw. On a failure, target
      creature is stunned and held 5 feet off the ground by this jutsu. They are surrounded by a mass of sand, dust and
      pebbles. Damage done to them from sources other than this jutsu are reduced by half.</p><p>As an action, on a
      following turn after capturing a creature in this jutsu, the user may compress a captured creature crushing them
      dealing 5d12 earth damage.</p><p>At the end of a captured creatures turns they makes a Strength saving throw check
      vs your save dc to escape regardless of being stunned.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d12 respectively</p>
