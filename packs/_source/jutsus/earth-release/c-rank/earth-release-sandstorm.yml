name: Earth Release Sandstorm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You conjure a powerful localized spiraling vortex of earth, dust and sand around Quake Shards. This localized
      storm is 10 feet wide and 15 feet tall. You can select one Quake Shard you can see in range. Creatures who begin
      their turn within the storms area, excluding the construct, must make a Strength saving throw taking 4d6 earth
      damage and being knocked prone on a failed save. A creature in the radius of 2 or more storms is only affected by
      one at a time.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this
      jutsu by 3 and the damage by 1d6 or the number of constructs you can target to conjure the storm around.</p>
