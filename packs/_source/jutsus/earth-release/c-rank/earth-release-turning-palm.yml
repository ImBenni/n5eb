name: Earth Release Turning Palm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You place your palm onto any surface of earth and cause the earth to splinter, break, and shift. The surface
      you placed your hand on is now considered difficult terrain and cannot be fixed unless this same ninjutsu is used
      on the affected space to reverse the effect. If The surface of earth you are targeting is less than 10 feet thick,
      when the ground is shifted it may collapse into the open space, causing all standing on it to fall with
      it.</p><p>Additionally, if a Ninjutsu with the earth release keyword is cast within the splintered area, creatures
      who would make a saving throw to resist the jutsu's effects, suffers a 1d4 penalty to their saving throws.</p>
    chat: ''
