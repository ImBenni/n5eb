name: Earth Release Calcite Might
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You create a surge of Earth Release Chakra and use it to amplify a willing creature you can see within range.
      Once successfully cast, you do not need to see where the target is and must remain within 120 feet of
      them.</p><p>Target creatures Strength becomes 18 for the duration if it is not already. Their Unarmed, Weapon, and
      Taijutsu Attacks deal an additional 1d6 Earth Damage and you always know when they take damage and their current
      condition even if you cannot see them for the duration.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and the number of creatures affected by +1.</p>
    chat: ''
