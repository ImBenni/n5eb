name: Earth Release Dominus Banner
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You coat your weapon in earth chakra, before raising it above you and releasing its golden chakra into the
      shape of a banner, as a pulse of golden chakra enhances the weapons of your allies converting your defense into
      their offence. You cannot lose concentration of this jutsu as a result of damage.</p><p>For the duration, one
      weapon you and each allied creature affected by this jutsu is wielding is enhanced by your golden earth chakra.
      Enhanced weapons deal an additional 1d4 Earth damage twice per turn and grants its wielder +3 Damage Reduction vs
      all damage except Lightning.</p><p>If you or affected allied creatures let go of their weapon or it is taken from
      its original wielder, the golden chakra disperses.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank or higher, increase the bonus damage
      to 2d4 and the damage reduction to +6. If this jutsu is cast at S-Rank, increase the bonus damage to 3d4 and the
      damage reduction to +9.</p>
