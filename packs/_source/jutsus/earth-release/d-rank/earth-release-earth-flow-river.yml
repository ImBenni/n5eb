name: Earth Release Earth Flow River
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You transform the surface in front of you into a mud river. The river created is a 30-foot cone, that sweeps
      creatures off of their feet and carries them to the end of the cone furthest away from the caster.</p><p>Creatures
      in the path of the mud slide must make a Strength saving throw. On a failed save they are swept up and moved to
      the end of the stream, falling prone being disarmed of any weapons or items they are holding and having their
      speed reduced by 10 feet until the end of their next turn. On a successful save, no effects.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the size of the
      cone by 5ft and the speed they are reduced by 5 feet.</p>
