  description:
    value: >-
      <p>You generate Shards of earth and levitate them around yourself, creating a field of stone debris to protect
      you. For the duration of this jutsu, ranged attacks are made as if you are under half cover, with the floating
      earth around you.</p><p>Also, creatures of your choice treat all spaces within 10 feet of you as difficult
      terrain. This floating earth counts as a single Quake Shard while active.</p>
