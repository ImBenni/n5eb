    value: "<p>You cause a tremor in the ground on a 20-foot cube centering on a point you can see within range.</p><p>Each creature other than you in that area must make a Dexterity saving throw. On a failed save, a creature takes 2d8 earth damage is knocked prone. If the ground in that area is loose earth or stone, it becomes difficult terrain until it is cleared, which takes about 10 minutes of work.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d8 and the radius by 5 feet.</p>"
