system:
  description:
    value: "<p>You amplify constructs made of earth causing them to manifest an aura of Earth Release Chakra. Select an Quake Shard of your creation within range. All creatures of your choice within 60 feet of the chosen construct gains a +1 bonus to their AC, as you decrease the weight of the chosen creatures allowing them to move faster and with less resistance. A creature can be affected by no more than 2 aura created by this jutsu.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. Casting this jutsu at B-Rank, increase the AC bonus to +2. Casting this jutsu at S-Rank, increase the AC bonus to +3.</p>"
