name: Earth Release Geo Resonance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You amplify constructs made of earth causing them to manifest an aura of Earth Release Chakra. Select an Quake
      Shard of your creature within range. All creatures of your choice within 60 feet of the chosen construct must
      succeed a Strength saving throw each turn they start in the aura of a Construct. If a creature is within 2
      different aura created by this jutsu they make a single Saving throw.</p><p>On a failed save, a creature's AC is
      reduced by 1 until the beginning of their next turn as you increase the weight of the chosen creatures forcing
      them to move slower.</p><p>A creature can be affected by no more than 2 Auras created by this jutsu.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. Casting this
      jutsu at B-Rank, increase the AC penalty to -2. Casting this jutsu at S-Rank, increase the AC bonus to -3.</p>
