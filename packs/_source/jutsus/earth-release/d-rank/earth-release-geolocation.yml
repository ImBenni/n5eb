      gain tremor sense. Creatures who move under the surface that you are standing on are perceived by you with your
      tremor sense.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3. If cast at C- Rank Increase the duration to 1 hour. If cast at B-Rank; 8 Hours. If cast at A-Rank 24
