name: Earth Release Golden Gems
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You solidify your Earth Release chakra into 3 small Shimmering Crystalline Gems. The Gems can be any color you
      choose and they float around you for the duration. You can spend your gems to enhanced other Earth release jutsu.
      By spending 1 Golden Gem, when you cast a Ninjutsu with the Earth Release keyword, you are able to enhance it in
      one the following ways:</p><p>• Reinforce: If the jutsu cast summons a construct or structure that intercepts
      damage, increase its Hit points by 1d10.You can spend up to 5 gems in this way.</p><p>• Harden: If the jutsu cast
      would grant a creature temporary hit points, increase the amount gained by 1 dice.</p><p>• Solidify: If the jutsu
      cast would deal damage, increase the damage dealt by 1 damage die.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above D-Rank, increase the cost of this jutsu by 3 and you generate 1 additional Gem.</p>
