name: Earth Release Headhunter Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>While burrowing under a target, you can attempt to drag them under leaving them submerged in the earth with
      only their head being exposed. Target creature makes a Dexterity saving throw to avoid being snatched into the
      ground and restrained. If you are hidden from the target and they are unaware of your presence they make this save
      at disadvantage. Creatures who are restrained by this jutsu can make a strength (athletics) check vs your Ninjutsu
      Save DC as an action on their turn to escape the ground, ending the restrained condition.</p>
