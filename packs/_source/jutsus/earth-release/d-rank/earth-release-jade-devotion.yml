system:
  description:
    value: >-
      <p>You release a surge of earth release chakra that permeates you and your allies. All willing creatures of your
      choice within a 10-foot sphere centering on you, gain 4d6 temporary hit points and resistance to bludgeoning
      piercing and slashing damage so long as they have temporary hit points granted by this jutsu. Creatures who have
      temporary hit points granted by this jutsu count as Quake Shards created by you.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and temporary hit points by 1d6.</p>
