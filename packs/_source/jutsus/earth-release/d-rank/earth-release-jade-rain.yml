name: Earth Release Jade Rain
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>By weaving your handseals together you create a seal made completely of shimmering earth Release Chakra in the
      air above you. This seal then alters its angle before you release a swarm of shimmering shards of sharpened
      stone.</p><p>All creatures in a 15-foot wide, 90-foot-long line originating from you must succeed a Dexterity
      saving throw, taking 6d6 earth damage on a failed save or half as much on a successful one.</p><p>Combination: If
      this jutsu is cast as a Combination jutsu with 2 or more casters you increase the damage die by 3.</p><p>Any
      creature who assists in casting this jutsu as a combination jutsu increases the damage of this jutsu by one step
      based on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2: D8, +3-4: D10, +5:
      D12).</p>
