name: Earth Release Rising Rock Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You tear two large chunks of stones from the ground using the strength of your chakra alone, hurling them at a
      single target. Make two ranged ninjutsu attacks against the target dealing 2d8 Earth damage on a hit.</p><p>The
      two large chunks of stone remain after being hurled, being counted as an Quake Shard, occupying two spaces of your
      choice within 5 feet of the original target.</p><p>Select two spaces within 5 feet of you when you cast this
      jutsu. These two spaces from which you pulled the stones from count as difficult terrain until cleared, which
      takes at least 10 minutes of work.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3. When this jutsu is cast at B-Rank, increase the number of attacks by +1. When this
      jutsu is cast at S-Rank, increase the number of attacks by +1.</p>
