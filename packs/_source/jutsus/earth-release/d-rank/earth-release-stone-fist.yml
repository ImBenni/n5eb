name: Earth Release Stone Fist
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: "<p>You encase a single arm in rock, enabling yourself to strike with hardened punches, while also protecting yourself from direct contact. For the duration of this jutsu, when you take the attack action, you instead deal you deal your Unarmed Damage +2d6 earth damage. This Jutsu's benefits cannot be applied to any Taijutsu or Bukijutsu cast under any circumstances.</p><p>\_For the duration of this jutsu one of your hands are occupied and cannot be used to make Hand Signs (HS) or use Chakra Seals (CS). Also, when you strike a creature with the encased arm, it does not count as direct contact with them.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. When this jutsu is cast at B-Rank, increase damage by 1d6. When this jutsu is cast at S-Rank, increase damage by 1d6.</p>"
