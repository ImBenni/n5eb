system:
  description:
    value: >-
      <p>Upon completion you select 4 different points you can see within range. Each creature in a 30- foot radius
      sphere centered on the point you select must make a Dexterity Saving Throw against your Ninjutsu Save DC. Massive
      Chunks of stone earth and mud comes raining upon the selected areas. A creature takes 10d10 Bludgeoning &amp;
      10d10 Earth Damage and is Dazed and knocked Prone on a failed save, or half as much damage on a successful one. A
      creature can only be affected by one meteor per casting.</p>
