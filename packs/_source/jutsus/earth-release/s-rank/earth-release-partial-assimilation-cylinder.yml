name: Earth Release Partial Assimilation Cylinder
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>When you cast this Jutsu, and as an Action on following turns for its duration you can form a cylinder 10 Feet
      in diameter and 25 feet long by using chakra to generate molecule sized earth particles. Anyone in the cylinder
      will begin to be deconstructed on a molecular level. Creatures that start their turn within this cylinder must
      make a Dexterity Saving Throw. On a failure a creature takes 14d10 Force Damage. If a creature is reduced to less
      than ½ of their hit points by this damage the user decides on which appendage the target creature lost. (Arm or
      Leg). If a creature is reduced to 0 Hit Points, they are turned to dust and are immediately killed.</p>
    chat: ''
