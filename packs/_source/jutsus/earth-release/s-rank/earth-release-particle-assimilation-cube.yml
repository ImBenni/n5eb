name: Earth Release Particle Assimilation Cube
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You form a cube 5 Feet in diameter by using chakra to generate molecule sized earth particles. The Cube glows
      white. You can throw the cube up to 30 feet or attempt to hit someone with it. Anyone hit by the cube will begin
      to be deconstructed on a molecular level. Make a melee or ranged Ninjutsu Attack. On a hit a creature takes 16d12
      Force Damage. If a creature is reduced to less than ½ of their hit points by this damage, the user decides on
      which appendage the target creature lost. (Arm or Leg). If a creature is reduced to 0 hit points, they are turned
      to dust and are immediately killed.</p>
