name: Earth Release Star Shatter
type: spell
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You create a single star shaped Quake Shard in the sky, 1 mile in the air before you cause it to shatter.
      Select a space you can see within range. All creatures of your choice within 120 feet of the selected space must
      make a Strength saving throw as the weight of a dying star is thrust upon them.</p><p>On a failed save they are
      Stunned and knocked Prone as they become unable to move and find it hard to even breathe.</p><p>A creature who
      begins their turn in this space, ends their turn in this space, or enters this space for the first time must make
      the Strength saving throw.</p><p>A creature Stunned by this jutsu takes 9d8 Earth damage at the beginning of their
      turn. A creature Stunned by this jutsu takes 9d8 Earth damage at the end of their turns if they do not make the
      saving throw to end this jutsu's effects.</p><p>A stunned creature makes a Strength Saving Throw at the end of
      their turns (They do not automatically fail as a result of being Stunned). On a successful save, they end the
      Stunned condition on themselves.</p>
