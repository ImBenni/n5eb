name: Fire Release Crimson Butterfly
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a swarm of Fire Release projectiles in the shape of a butterflies swarm. This swarm occupies a
      90-foot cube centered on a space you can see within range and can occupy the spaces of multiple creatures as they
      flutter around them. At the end of your next turn, all butterflies in the cube explode violently.</p><p>Creatures
      caught in the explosion (including casters) make a Dexterity saving throw at disadvantage. On a failed save they
      take 9d10+9 fire damage and gain 2 ranks of the burned condition. On a successful save they take half damage and 1
      rank of the burned condition.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the
      cost of this jutsu by 3 and the size of this jutsu by 10 feet and the damage by 1d10+1.</p>
