name: Fire Release Delayed Fire Missile
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>A beam of yellow light flashes from your hands, then condenses to linger in your hand as a glowing bead for the
      duration. When this jutsu ends, either because your concentration is broken or because you decide to end it, the
      bead blossoms with a low roar into an explosion of flame that spreads around corners.</p><p>Each creature in a
      20-foot radius sphere centered on that point must make a Dexterity saving throw. A creature takes fire damage
      equal to the total accumulated damage on a failed save, or half as much damage on a successful one.</p><p>The
      jutsu base damage is 12d8+12. If at the end of your turn, the bead has not yet detonated, the damage increases by
      6d8+6.</p><p>As an action, you can make a Ranged Ninjutsu attack throwing the bead at a creature or object causing
      it to detonate on a hit. On a miss the target creature gets advantage on its dexterity saving throw.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and increase
      the base damage and damage increase by 1d8+1.</p>
