name: Fire Release Great Fire Absorption
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You create a vacuum of chakra, absorbing lingering fire from the surrounding area collecting it towards
      yourself converting it into chakra and using this new chakra to heal wounds. Lingering fire or objects on fire are
      all extinguished and it is absorbed into you. You heal 10 Hit points for every source of fire occupying a 5-foot
      cube that is absorbed this way. Fire cannot be generated or maintained in the radius of this jutsu until the
      beginning of your next turn.</p>
