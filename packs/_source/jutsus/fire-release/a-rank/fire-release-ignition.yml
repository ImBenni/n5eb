name: Fire Release Ignition
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You expel your chakra into a 60-foot radius centering from you. All flammable objects, cloth, metals or
      otherwise things that can heat up or be set to blaze, is ignited instantly. Metal glows red hot, clothing is
      caught in a flash flame, and flammable objects are burning.</p><p>Creatures of your choice must make a
      constitution saving throw being unable to fend of this swarm of chakra as they are set ablaze gaining 3 Ranks of
      the burned condition. Creatures who gain ranks of the burned condition in this way makes their Survival check at
      disadvantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this
      jutsu by 3. If upcast to S-Rank, creatures who would take damage from the burned condition, they instead take the
      maximum possible damage.</p>
