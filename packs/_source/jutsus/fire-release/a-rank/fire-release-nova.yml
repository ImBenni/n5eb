name: Fire Release Nova
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You select a space you can see within range. This space manifests a sphere of pure fire release chakra. The
      sphere begins to pull in all creatures within 120 feet of it as if it were a gravity well.</p><p>All creatures
      within a 120 feet radius of the space you selected must succeed a Strength saving throw, being pulled up to 90
      feet towards the space. On a successful save, they are instead pulled 45 feet.</p><p>Creatures who end this
      movement within 30 feet of the sphere must succeed a Constitution saving throw as a wave of heat overwhelms them.
      On a failed save creatures take 50d4 + 50 Fire Damage. On a successful save they take Half. A creature who's hit
      points are reduced to 0 as a result of this jutsu, are turned to ash.</p><p>Combination: If this jutsu is cast as
      a Combination jutsu with 2 or more casters increase the targeted damage by 10d4+10.</p><p>Any creature who assists
      in casting this jutsu as a combination jutsu increases this Jutsu's damage potential based on the highest Charisma
      Modifier within the group of casters. (+0-2: No Change, +3-4: Increase the range of this jutsu by +80 feet, and
      the radius by +20 feet, +5: Increase the range of this jutsu by +250 feet, the radius by +60 feet and damage by
      25d4+25.)</p>
