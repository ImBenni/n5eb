system:
  description:
    value: >-
      <p>You manifest a colorless flame that you ingest before you exhale outward spraying it across a massive range.
      All creatures in range must succeed a Constitution saving throw. On a failed save they gain the burned condition.
      Creatures burned by this jutsu also gain the Weakened condition for the same duration as their burned condition
      persists.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu
      by 3 and the range my 5 feet.</p>
