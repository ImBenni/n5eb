name: Fire Release Crossfire
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You weave handsigns as you select one space you can see within range. The point you choose erupts with 4
      different 5 feet wide, 60 feet long beams of blazing heat that fire in different directions that all originate
      from the point you chose. No beam can fire in the same direction and must all fire at the same time.</p><p>All
      creatures who are in the range of any beam fired must succeed a Dexterity saving throw taking 12d6+12 fire damage
      and gaining 3 ranks of the burned condition on a failed save or half as much damage on a successful
      save.</p><p>Combination: If this jutsu is cast as a Combination jutsu with 2 or more casters increase the targeted
      damage by 3d6+3. Any creature who assists in casting this jutsu as a combination jutsu increases this Jutsu's area
      of effect size based on the highest Charisma Modifier within the group of casters. (+0-2: No Change, +3-4:
      Increase the width of the jutsu by 5 feet, +5: Increase the width of the jutsu by 10 feet.)</p>
