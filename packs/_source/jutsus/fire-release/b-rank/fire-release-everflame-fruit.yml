name: Fire Release Everflame Fruit
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a 1 apple sized gem or shard of Fire Release Chakra infused with Medical Release Chakra that feels
      scalding to touch. You spend all of your Chakra Die, rolling and recording the result.</p><p>A creature can use
      its bonus action to eat the gem. Eating a gem forces a creature to roll all of its Hit die, spending them all. A
      creature can also spend an action feeding this to a dead or dying creature who's been dead for no longer than 1
      minute.</p><p>The creature regains Hit points equal to the result of their Hit Die + The casters Chakra die
      roll.</p><p>A creature can gain the benefits of this jutsu once per long rest. If a creature attempts to gain the
      benefits of this jutsu more than once per long rest, each time after the second, they take an amount of fire
      damage equal to three times the casters Ninjutsu Save DC + Twice their constitution score. This damage cannot be
      resisted or reduced by any means.</p>
