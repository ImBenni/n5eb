name: Fire Release Fire Wall
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You create a standing wall of fire, 1 foot thick, up to 60 Feet long, and 20 feet tall. When the wall appears,
      each creature within its area must make a Dexterity saving throw. On a failed save, a creature takes 5d10+5 fire
      damage, or half as much damage on a successful save.</p><p>One side of the wall, selected by you when you cast
      this jutsu, deals 5d10+5 fire damage to each creature that ends its turn within 10 feet of that side or inside the
      wall. A creature takes the same damage when it enters the wall for the first time on a turn or ends its turn
      there. The other side of the wall deals no damage.</p>
    chat: ''
