name: Fire Release Great Flame Bomb
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You knead chakra in your stomach and superheat it until you exhale it from your gut at insane speeds and force.
      Creatures within 5 feet of you must make a strength saving throw being thrown back 10 feet on a failed
      save.</p><p>You fire a Stream of blue hot fire in a 10-foot wide, 120-foot-long line directly in front of you
      causing objects and the environment within 5 feet of you to be set on fire.</p><p>Creatures in must make a
      Dexterity saving throw, taking 9d6+9 Fire damage and 2 ranks of the burned condition on a failed save or half as
      much damage on a success. Objects within 10 feet of the stream of fire ignite if they are not being worn or held.
      The stream leaves behind a line of blue fire from you to the end of the 120-foot path. The fire remains for 1
      minute and will spread until put out.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank,
      increase the cost of this jutsu by 3 and increase the damage by 1d6+1.</p>
