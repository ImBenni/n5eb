name: Fire Release Heavenly Flame
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You compress all of your Fire Release chakra onto the surface of your skin and release it when you hit a
      creature with an unarmed attack creating a targeted explosion of white-hot flame. As a part of the action to cast
      this ninjutsu, make a melee ninjutsu attack, against one creature within range, otherwise the jutsu
      fails.</p><p>On a hit, the target suffers your unarmed attacks effects as normal and take 6d12+6 fire damage as
      the fire erupts on contact. The target creature must succeed a constitution saving throw, gaining two ranks of the
      burning condition and falling prone on a failed save.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at S-Rank, increase the number of
      attacks it makes by +1.</p>
