name: Fire Release Investiture of Flame
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>Flames race across your body, shedding bright light in a 30-foot radius and dim light for an additional 30 feet
      for the Jutsu's duration. The flames don't harm you or any allied creature. Until the jutsu ends, you gain the
      following benefits:</p><p>• You are immune to fire &amp; wind damage.</p><p>• Resistant to Bludgeoning, piercing
      and slashing damage.</p><p>• Vulnerable to Cold damage.</p><p>• Speed is increased by 15 feet.</p><p>• Any hostile
      creature that moves within 10 feet of you on any turn, begins it turn or ends its turn there, takes 2d10 fire
      damage.</p><p>• You can use your bonus action to create a line of fire, 15 feet long and 5 feet wide extending
      from you in a direction you choose. Each creature in the line must make a Dexterity saving throw. A creature takes
      4d12+4 fire damage and gains the burning condition on a failed save, or half as much damage on a successful
      one.</p>
