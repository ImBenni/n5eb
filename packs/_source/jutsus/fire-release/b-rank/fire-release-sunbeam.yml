name: Fire Release Sunbeam
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: "<p>You create a beam of brilliant white-hot light that flashes forth from you in a 5-foot-wide, 60-foot line. Each creature in the line must make a constitution saving throw. On a failed save, a creature takes 6d10+6 fire damage and are blinded until the end of your next turn. On a successful save they take half as much damage and no further effects. You can create a new beam of light as your action on any turn until this jutsu ends. For the duration, you shine bright light in a 30-foot radius and dim light for an additional 30 feet. This light is equivalent to sunlight.\_</p>"
