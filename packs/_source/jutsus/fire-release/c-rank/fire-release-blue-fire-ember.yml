name: Fire Release Blue Fire Ember
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a sapphire-colored ember into a solid but flickering form. This flame appears in a willing
      creature of your choices hand within range. This flame lasts an hour and causes no harm to the creature and can be
      given or carried by any other creature you designate as a holder.</p><p>A holder of this flame may as their bonus
      action coat themselves in this blue flame granting them a fast burning but dense shield of flame for a short time.
      Until the beginning of their next turn, they gain a number of Temporary Hit points equal to 3d8 + 10.</p><p>Melee
      attacks that strike the creature deals 10 fire damage to all creatures within 10 feet of them as the fire sparks
      off of them.</p><p>These Temporary Hit Points are Vulnerable to Cold damage and Resistant to Wind and Fire
      damage.</p><p>When the creature would take Cold Damage, this armor instead takes double damage.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the Damage by
      5.</p>
