name: Fire Release Burning Gaze
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You direct your gaze at an object or creature within range. Your eyes begin to glow a violent bright red and
      the target erupts into flames for the duration. An object begins to burn as flames engulf it. A creature must
      succeed a Dexterity saving throw gaining the burning condition for the duration. While you are concentrating on
      this jutsu, creatures currently suffering from the burned condition that you can see, cannot extinguish the fires
      that are burning them.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3 and the number of ranks of burned granted on a failed save by +1.</p>
