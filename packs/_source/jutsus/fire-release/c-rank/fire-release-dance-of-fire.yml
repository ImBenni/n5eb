name: Fire Release Dance of Fire
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a super dense barrier of flame around yourself and all creatures within range.</p><p>This barrier
      of flame has 12 hit points, An AC equal to your Ninjutsu Save DC and counts as a Flaming Structure. Creatures
      outside of the radius of this barrier cannot see pass through it. Creatures who target this barrier of flame with
      a melee attack from either side or hit you an attack while outside of it and within 15 feet of it, take 12 Fire
      Damage.</p><p>This barrier cannot move and intercepts all attacks and Jutsu, taking damage if any would attempt to
      pass through the walls exterior.</p><p>This wall is resistant to Wind and Fire Damage and vulnerability to Cold
      damage. Jutsu with the Wind Release Keyword cannot initiate a clash with it by any means.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and its hit points and damage
      by 8.</p>
