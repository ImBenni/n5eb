system:
  description:
    value: >-
      <p><strong>Description:</strong> You knead chakra in your stomach and superheat it until you exhale it from your
      gut at terrifying speeds, leading to you being unable to truly control its path. You fire a Stream of superheated
      fire in a 5-foot wide, 120- foot-long line directly in front of you. Creatures in its path must make a Dexterity
      saving throw, taking 6d8+6 Fire damage on a failed save or half as much on a success. Objects within 5 feet of the
      stream of fire ignite if they are not being worn or held. The stream leaves behind a line of fire from you to the
      end of the 120-foot path. The fire remains for 1 minute or until extinguished.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase
      the</p><p>damage by 1d8+1.</p>
