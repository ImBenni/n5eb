name: Fire Release Everflame Seeds
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a 2 gems of Fire Release Chakra infused with Medical Release Chakra that feel hot to the touch.
      You spend 2 of your Chakra Die, rolling and recording the result.</p><p>A creature can use its bonus action to eat
      one gem. Eating a gem forces a creature to roll 2 Hit die, spending them both.</p><p>The creature regains Hit
      points equal to the result of their Hit Die + The casters Chakra die roll.</p><p>A creature can gain the benefits
      of this jutsu twice per long rest. If a creature attempts to gain the benefits of this jutsu more than twice per
      long rest, each time after the second, they take an amount of fire damage equal to the result of the casters
      Chakra Die roll + Constitution Score. This damage cannot be resisted or reduced by any means.</p>
    chat: ''
