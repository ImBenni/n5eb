name: Fire Release Explosive Clone
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You conjure a clone comprised of fire release chakra, made to look exactly like you called an Explosive Clone.
      This clone cannot take the attack action or cast jutsu. When this clone takes damage or you dismiss it as a
      reaction, it explodes violently.</p><p>All creatures within 15 feet of the clone when it explodes must succeed a
      Dexterity saving throw, taking 7d6+7 fire damage, gaining 1 rank of the burned condition and being thrown back 10
      feet. On a successful save the they only take half damage.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6+1.</p>
