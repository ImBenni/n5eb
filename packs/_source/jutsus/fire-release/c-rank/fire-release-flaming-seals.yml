name: Fire Release Flaming Seals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>This jutsu places a flaming seal on a willing creature you touch and creates a chakra connection between you
      and the target until the jutsu ends. If this jutsu is cast again while a previous instance of it is active, the
      previous casting and its effects automatically end.</p><p>When the target is within 90 feet of you, it gains a +1
      bonus to all saving throws, resistance to fire damage and you always know what conditions are affecting the
      creature (if any).</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3. If this jutsu is cast at A-Rank, increase the bonus by +1. If this jutsu is cast at S-Rank,
      increase the bonus by +2.</p>
    chat: ''
