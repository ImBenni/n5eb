name: Fire Release Heavenly Prison
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You take a chakra seal and imprint your chakra onto it making a melee Ninjutsu Attack against a creature; On a
      hit the target creature is branded with a Fire Release chakra seal. While branded with this seal, creatures have
      extreme difficulty molding chakra. If a creature attempts to cast a jutsu that requires Chakra Molding (CM), they
      must succeed a constitution saving throw taking 5d8+5 Fire damage on a failure, and half as much on a
      success.</p><p>On a failure, the brand burns them, restricting chakra flow as they lose the ability to mold chakra
      until the beginning of their next turn.</p><p>Creatures can make a Ninshou skill Check as an action vs your
      Ninjutsu save DC to break the seal ending this jutsu.</p>
    chat: ''
