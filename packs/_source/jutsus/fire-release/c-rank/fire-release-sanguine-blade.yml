name: Fire Release Sanguine Blade
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a sanguine-colored flame and mold it into a large melee weapon of your description that floats
      near you upon its creation.</p><p>When you cast this jutsu, you can make a melee ninjutsu attack against a
      creature within 10 feet of the weapon. On a hit, the target takes fire damage equal to 3d6 + 3.</p><p>As a bonus
      action, you can command the weapons to move up to 30 feet and repeat the attack against a creature within 10 feet
      of it.</p><p>A target currently burned or chilled suffer exasperated effected.</p><p>Burned: A burned creature
      gain an additional rank of the burned condition.</p><p>Chilled: A chilled creature loses the chilled condition
      suffering from a sudden shift in temperatures taking 2d6 Necrotic Damage as a result. This immediately ends the
      Chilled condition on the creature.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3 and the weapon gains a bonus +1 to attack and Damage rolls.</p>
