name: Fire Release Absorb Heat
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You generate a vacuum of chakra absorbing the heat from the surrounding area and create a thin layer of fire
      chakra to protect yourself. You gain resistance to the triggering instance of damage.</p><p>If the triggering
      damage or any further attacks that target you are melee attacks and the triggering creature was no more than 10
      feet away when this jutsu was cast, the triggering creature takes 6 fire Damage until the beginning of your next
      turn.</p><p>If the triggering damage was fire, you also gain +5 DR vs fire damage until the start of your next
      turn. If the triggering damage was cold, this jutsu fails to activate.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3, damage dealt as a result of a melee attack by
      +4 and the range a creature can be to take the damage by 5 feet..</p>
