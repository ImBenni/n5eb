name: Fire Release Ash Cloud
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You inhale and knead fire chakra in your lungs to create a cloud of ash. You exhale the ash into a target area
      within range that you can see. The Cloud of ash remains until blown away or dissipates which can take up to 10
      minutes. Creatures inside the target area have disadvantage on attacks while inside the cloud, and are treated as
      if in total darkness. Creatures making ranged attacks inside the cloud cannot see creatures inside.</p>
