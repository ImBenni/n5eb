name: Fire Release Blazing Ember
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest motes of fire in the palms of each of your hands. Make two Ranged Ninjutsu attacks. These attacks
      can target one creature or two. If targeting multiple creatures make a single Ranged Ninjutsu attack against
      each.</p><p>On a successful hit you deal 3d4+3 fire Damage. If a creature affected by the Burned condition is hit
      by both attacks, they immediately suffer the damage of their condition.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank increase the
      number of attacks you can make by +1. If this jutsu is cast at S-Rank increase the number of attacks you can make
      by +2.</p>
