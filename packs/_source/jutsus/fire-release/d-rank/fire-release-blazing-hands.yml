name: Fire Release Blazing Hands
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You hold your hands out and fire a sheet of flame from your hands. Each creature in a 15-foot cone must make a
      Dexterity saving throw. A creature takes 5d4+5 fire damage on a failed save, or half as much damage on a
      successful one. This fire ignites any flammable objects in the area that aren't being worn or carried.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase
      the damage by 1d4+1.</p>
