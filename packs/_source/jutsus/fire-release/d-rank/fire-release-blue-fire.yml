name: Fire Release Blue Fire
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a sapphire-colored flame around a willing creature you can see within range protecting them. You
      can see a gout of blue hot flame erupts around them creating a barrier of heat.</p><p>Until the beginning of the
      creatures next turn, ranged attacks deal reduced damage equal to 2d4+2. Melee attacks deal reduced damage equal to
      2d4+2 and deals 3d6+3 in fire damage to the attacking creature once per turn.</p><p>If the attacking creature
      would deal Cold Damage, this jutsu is immediately extinguished, ending it before any damage reduction or damage
      could be dealt.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3, the damage reduction by 1d4+1 and damage done by 1d6+1.</p>
