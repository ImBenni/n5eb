name: Fire Release Erupting Flame
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You Focus chakra into the target area and create a hot spot directly under a target creature you can see in
      range. The target must succeed on a Dexterity saving throw or take 3d8+3 Fire Damage. The target gains no benefits
      from cover against this jutsu.</p><p>A creature who fails their saving throw by 5 or more gains 2 ranks of the
      burned condition.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and increase the damage by 1d8+1.</p>
