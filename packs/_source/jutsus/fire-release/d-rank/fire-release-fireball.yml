  description:
    value: >-
      <p>You breathe a stream of fire onto the target area which then expands into a ball of fire burning all in its
      range. Target creatures in range makes a Dexterity saving throw, taking 4d6+4 Fire Damage on a failed save or half
      as much on a success save. Flammable objects caught in the radius ignites if it isn't being held or
      carried.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3 and increase the damage by 1d6+1, and the radius by 5ft.</p>
