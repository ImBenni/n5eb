name: Fire Release Flame Coat
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You engulf a weapon in fire chakra, coating it in a flame that enhances the lethality of the weapon. If you let
      go of the weapon or it is taken from you, the fire disperses. You cannot lose concentration of this jutsu as a
      result of damage.</p><p>While you maintain concentration on this jutsu, you can engulf another weapon you are
      holding as a bonus action. A weapon enflamed by you, deals an additional 1d8+1 fire damage twice per turn. The
      fire sheds bright light in a 20- foot radius and dim light for an additional 10 feet.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank
      or higher, increase the damage to 2d8+2. If this jutsu is cast at S-Rank, increase the damage to 3d8+3.</p>
