name: Fire Release Flame Whip
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You conjure a flaming whip to strike at a creature you can see up to 20-feet away from you. Make a melee
      ninjutsu attack, dealing 2d10+2 fire damage. The target must succeed a Dexterity saving throw, being pulled 10
      feet towards you. If a creature who failed the saving throw ends their movement within 5 feet of you, they fall
      prone and gain the burning condition.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and 0increase the damage by 1d10+1.</p>
