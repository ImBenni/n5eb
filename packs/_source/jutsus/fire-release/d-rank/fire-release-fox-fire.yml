name: Fire Release Fox Fire
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>A flickering flame appears in your hand. The flame remains there for the duration and harms neither you or your
      equipment. The flame sheds bright light in a 20-foot radius and dim light for an additional 10 feet. The jutsu
      ends if you dismiss it. You can also attack with the flame.</p><p>As an Action you can make a Ranged Ninjutsu
      attack on a creature you can see within 30 feet of you. On a hit, the target begins to glow with a soft, warm, and
      glowing radiance. While glowing in this way, this jutsu's duration becomes Concentration, until the end of your
      next turn, and creatures have advantage on melee attacks targeting the creature.</p>
    chat: ''
