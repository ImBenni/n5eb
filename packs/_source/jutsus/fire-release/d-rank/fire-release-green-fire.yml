name: Fire Release Green Fire
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest an emerald-colored flame and mark a creature you can see within range with it.</p><p>For the
      duration, when the target would make a Saving throw against a jutsu with the fire Release Keyword, they roll and
      additional 1d4. Reducing their saving throw by the result.</p><p>If the marked creature would take fire damage
      from an attack that you make, you deal an additional 1d6+1 fire damage.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of marked creatures by +1.</p>
