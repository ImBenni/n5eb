name: Fire Release Passionate Flames
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a fuchsia-colored flame and place it on a wounded creature you can see within range.</p><p>Target
      creature rolls 2 Hit Die, spending one. When they do, they recover the result + Your Ninjutsu ability
      modifier.</p><p>After casting the target creature gains resistance to Fire Damage until the end of your next
      turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      and the number of Hit die rolled and spent by 1.</p>
