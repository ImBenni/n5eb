system:
  description:
    value: >-
      <p>You create 8 rays of fire and hurl them at targets within range. You can hurl up to 2 at a single target,
      otherwise you can target up to 8 targets. Make a ranged ninjutsu attack for each ray. On a hit the target takes
      2d4+2 fire damage. If a creature <strong>is hit by both attacks it must make a Constitution Saving Throw</strong>,
      gaining the <strong>Burned</strong> condition on a failed save.</p>
