    value: "<p>You manifest a highly flammable ember of fire release chakra. You can throw this ember onto any unworn or held highly flammable material or substance causing it to immediately go up in flames. The fires created by this jutsu grow in size as normal fire would and are not controlled by you. These flames are so hot they evaporate all water from sources that are not created by a Jutsu with the Water Release keyword of at least D-Rank or Higher. These flames extinguish themselves after 10 minutes.\_</p>"
