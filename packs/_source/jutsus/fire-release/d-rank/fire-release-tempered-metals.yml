name: Fire Release Tempered Metals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You superheat a single weapon or stack of weapons or ammunition. For the next minute these weapons glow red hot
      and to all creatures but you are scalding hot to the touch.</p><p>Weapons affected by this jutsu gains a +1 bonus
      to attack and damage rolls and their damage die is increased by one step for the duration.
      (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p><p>At the conclusion of this jutsu, the weapon becomes brittle, unusable and
      breaks.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3. When this jutsu is cast at B-Rank, the bonus becomes +2 and the damage die is increased by an additional step.
      When this jutsu is cast at S-Rank, the bonus becomes +3 and the damage die is increased by an additional step.</p>
