system:
  description:
    value: >-
      <p>You manifest a pale white-colored flame and mold it to coat your hands. For the duration, you do not need to
      spend chakra to maintain concentration on this jutsu.</p><p>For the duration, Jutsu you cast with the fire release
      keyword always forces affected creatures to make a <strong>Constitution saving throw</strong>. On a failed save
      they gain the <strong>burned</strong> condition. On a successful save no further effects or conditions are imposed
      as a result of this jutsu.</p><p>Creatures who gain the burned condition as a result of this jutsu, instead must
      beat a <strong>DC 20</strong> Dexterity (Survival) Check to end the condition.</p>
