name: Fire Release Wildfire
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You manifest a multicolored flame and fire a stream of it towards a creature you can see within range. Target
      creature must succeed a Dexterity saving throw. On a failed save they gain 1 rank of the burned condition, and
      take 2d12+2 Fire Damage. On a successful save they take half damage and no further effects.</p><p>If the target
      already had the burned condition, on a failed save, they instead immediately take damage from the burned condition
      they have and take 3d12+3 fire damage with no further effects. On a successful save they take half damage and no
      further effects.</p>
