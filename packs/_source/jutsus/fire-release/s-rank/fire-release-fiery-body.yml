name: Fire Release Fiery Body
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You temporarily transform your body into living flame. You gain immunity against Wind, fire, bludgeoning,
      piercing and slashing damage and the blind and deafened conditions. You gain vulnerability to Cold
      damage.</p><p>When you would take fire damage or suffer an effect cause by a jutsu with only the fire release
      keyword, you instead regain hit points equal to half the amount of damage it would normally deal. Your melee
      attacks deal an additional 10d4+10 fire damage, twice per turn.</p><p>Your body burns so brightly that creatures
      within 120 feet of you who do not avert their gaze or close their eyes at the beginning of their turns, gain the
      blinded condition until the end of their turn.</p><p>Jutsu you cast that have the Fire Release Keyword have their
      save DC's increase by +1. If you enter water, you are surrounded by a 5-foot radius of steam and bubbles that
      grant you partial concealment but you also take 4d6 cold damage each round you remain in the water.</p>
