name: Fire Release Phoenix Blessing
type: spell
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You touch a willing creature, passing on your flame. A creature you touch regains a number of hit and Chakra
      Points equal to your maximum hit and Chakra Points respectively. They gain a number of Temporary Hit Points equal
      to their Maximum Hit Points and a number of Temporary Chakra Points equal to their Maximum Chakra Points. You end
      all conditions on the target and they feel immediately revitalized, gaining Advantage on all ability checks, Skill
      Checks, Saving Throws, and attack rolls for the next minute. After this minute duration, your Maximum Hit &amp;
      Chakra Points become 0, and cannot be increased by any means.</p>
