name: Black Sunshine
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You hold up a jewel or other crystalline object as it disappears, leaving behind a sphere of pulsing purple
      chakra.</p><p>The orb radiates an ominous purple light that affects all creatures within a 60-foot radius centered
      on you, that moves with you.</p><p>All creatures of your choice within range who begin their turn within this
      jutsu's radius must succeed a Wisdom saving throw. On a failed save you become invisible to them for the
      duration.</p><p>Additionally, Creatures you designate become invisible at the same time you do to the same
      creatures who fail their wisdom saving throw if they're within 60 feet of you and if light from the orb can reach
      the space they occupy. An invisible creature casts a faint purple shadow. A creature attempting to find these
      faint shadows can as an action make a Wisdom (Perception) check vs your Genjutsu save DC. On a success they can
      see and track the shadows allowing them to target them, making attacks at disadvantage vs invisible
      creatures.</p><p>A creature repeats their saving throw at the end of each of their turns becoming immune to their
      jutsu until the end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank
      increase the cost of this jutsu by 3 and the radius of this jutsu by 15.</p>
