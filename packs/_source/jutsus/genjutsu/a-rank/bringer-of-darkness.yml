name: Bringer of Darkness
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You release a surge of chakra from yourself attempting to remove the sight, Sound, and Tactile senses of all
      creatures in a 30 Foot Radius centering on you. Each creature within range must succeed a Wisdom saving throw,
      becoming Blind, Deafened and being unable to even feel when they are touching or being touched on a failed save.
      Creatures who attempt to enter the radius or end their turns in the radius of this jutsu must make the Wisdom save
      as well. Creatures who are affected by this jutsu are still affected even if they leave the radius of this jutsu
      until they succeed their Wisdom save. At the end of each of their turns, creatures may make a Wisdom save to
      resist the effects of this jutsu.</p>
