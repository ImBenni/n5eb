name: Devils Assaults
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You speak words of aggression and pain against one creature that can hear you within range. Affected creature
      begins to see illusionary duplicates of you as they make a barrage of martial attacks against them. Make 3 Ranged
      Genjutsu attacks dealing psychic damage equal to 2d12 + Your genjutsu ability Modifier on a successful
      hit.</p><p>If you successfully score at least two genjutsu attacks using this jutsu, the next genjutsu attack you
      make against the same creature is at advantage and you reroll 1's and 2's for damage, taking the second result,
      even if it is a 1 or a 2.</p><p>f you successfully score at least three attacks, the target must succeed a
      Charisma Saving Throw or gain a rank of Concussed.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      A-Rank increase the cost of this jutsu by 3 and the number of genjutsu attacks by +1</p>
