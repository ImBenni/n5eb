name: Die
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You utter a word of absolute authority commanding a creature to attack itself with its most potent attack.
      Target creatures whom can see and hear you within range, must succeed a Charisma saving throw.</p><p>Critical
      Success: Affected creature is able to resist this jutsu's effects and becomes immune to this jutsu until the end
      of their next turn.</p><p>Success: Affected creature is able to resist this Jutsu's effects.</p><p>Failure: On the
      affected creatures next turn, they must cast a jutsu or make an attack of the casters choice, targeting
      themselves. If commanded to perform an attack they do not know or are able to perform, they perform the last
      offensive damaging attack they used in combat, but on themselves. If they have not performed any damaging actions
      this combat, they instead take 8d10 psychic damage.</p><p>Critical Failure: Same as Failure but affected creature
      automatically scores a critical hit against themselves on the first attack made.</p>
