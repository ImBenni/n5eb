name: Geas
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You place a genjutsu based command on a creature that you can see within range, forcing it to carry out some
      service or refrain from some action or course of activity as you decide. If the creature can understand you, it
      must succeed on a Wisdom saving throw or become charmed by you for the duration.</p><p>While the creature is
      charmed by you, it takes 9d10 psychic damage each time it acts in a manner directly counter to your instructions,
      but no more than once each day. A creature that can't understand you is unaffected by the genjutsu. You can issue
      any command you choose, short of an activity that would result in certain death. Should you issue a suicidal
      command, the genjutsu ends. You can end the spell early by using an action to dismiss it.</p>
