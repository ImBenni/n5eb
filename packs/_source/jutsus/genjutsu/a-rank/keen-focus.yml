name: Keen Focus
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You touch a creature within reach who you can see. For the duration you maximize their focus and enhance their
      mental efficiency.</p><p>For the duration target creature increase their critical threat range by +1.</p><p>Also,
      when affected creatures score a critical hit on a creature, they increase their damage die by 1 step.
      (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p><p>Additionally, the first time an affected creature would fall to 0 hit points,
      they instead fall to 1 hit point. This jutsu then immediately ends.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above A-Rank increase the cost of this jutsu by 3 and the critical threat range by +1. If this jutsu is
      Cast at S-Rank, If the next jutsu the affected creature cast that scores a critical hit, they instead add 2
      additional damage die to the roll.</p>
