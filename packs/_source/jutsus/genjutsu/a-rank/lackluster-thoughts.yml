name: Lackluster Thoughts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You speak unfocused words and statements of indecision into a chakra seal before you then attempt to implant
      them into the mind of a creature you can see within range.</p><p>Select creature within range must succeed an
      Intelligence Save at the beginning of each of their turns. On a failed save, they instead spend their turn doing
      completely unproductive activities such as drawing in the sand fixing the straps on their armor, counting their
      kunai and shuriken or verbally planning out scenario's in elaborate 10 step plans.</p><p>If a creature succeeds
      their Intelligence Save by 10 or more, this jutsu immediately ends on them and they become immune to this genjutsu
      for 1 hour.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank increase the cost of this jutsu
      by 3 and the number of creatures this jutsu can target by +1.</p>
