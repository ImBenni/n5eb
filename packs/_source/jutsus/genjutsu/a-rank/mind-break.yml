name: Mind Break
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You Target a creature and attempt to shatter their psyche by subjecting them to a yearlong mental torture
      session on them in the span of 6 seconds. Target creature must make an Intelligence saving throw.</p><p>Critical
      Success: Affected creature is able to resist this jutsu's effects and becomes immune to this jutsu until the end
      of their next turn.</p><p>Success: Affected creature takes 5d12 psychic damage.</p><p>Failure: Affected creature
      takes 10d12 psychic damage.</p><p>Critical Failure: Affected creature takes 13d12 psychic damage.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and the damage by
      1d12.</p>
