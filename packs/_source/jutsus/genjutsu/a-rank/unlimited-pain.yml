name: Unlimited Pain
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You target a creature and maximize their nervous systems sensitivity to pain.</p><p>One creature you can see within range must make an Intelligence saving throw. On a failed save, for the duration, Once per turn, when the affected creature takes psychic damage, they take an additional 3d8 damage.\_</p><p>Additionally, whenever a creature deals damage to the affected creature they reroll 1's and 2's, taking the second result.</p><p>If this jutsu is cast on a creature who is currently under the effects of the Doubled Pain is targeted with this jutsu, they make their saving throw at disadvantage and if they fail the saving throw, you lose concentration on the doubled pain genjutsu and this jutsu instead deals an additional 4d8 psychic damage, and you reduce the concentration cost of this jutsu by half for the duration.\_</p><p>If a creature is targeted by the Unrelenting Pain genjutsu while under the effects of this genjutsu, they make their saving throw at disadvantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank increase the cost of this jutsu by 3 and the number of creatures this jutsu can target by +1.</p>"
