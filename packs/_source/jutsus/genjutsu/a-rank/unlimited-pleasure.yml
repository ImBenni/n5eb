name: Unlimited Pleasure
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You target willing creature(s) and maximize their nervous systems sensitivity to pleasure and
      recouperation.</p><p>Three creature(s) you can see within range who would gain temporary hit points as a result of
      a Genjutsu, also regains a number of hit points equal to the number of temporary hit points gained.</p><p>If the
      Genjutsu cast that gains temporary hit points has the Medical keyword, increase the die rolled by 1 step and
      reroll all 1's and 2's, taking the second result. (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p><p>At Higher Ranks: For each
      rank you cast this jutsu above A-Rank increase the cost of this jutsu by 3 and the number of creatures this jutsu
      can target by +2.</p>
