name: Bless
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You release a pulse of chakra targeting all allied creatures within 30 feet of you causing them feel deep
      seeded Pride or ambition. Whenever an allied creature makes an attack roll, saving throw, or skill check during
      this jutsu's duration, they can roll an additional 1d4 and add the number rolled to their Attack, Saving throw, or
      skill check.</p><p>This jutsu's cost cannot be reduced below 1, by any means.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the radius by 10 feet. If cast at
      S-Rank the die becomes a d6.</p>
