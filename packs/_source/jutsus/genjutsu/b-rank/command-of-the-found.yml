name: Command of The Found
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You issue a single command, no longer than 25 words, directed at a single creature whom you can see who's name
      you include in your command. If the creature can hear you, they must succeed a Charisma saving throw. If you
      command a creature to enter hazardous terrain, or to injure itself, it remakes its charisma saving throw each time
      it takes damage or suffer any effects fall under any conditions, immediately ending this jutsu on a success, or
      completing the task as commanded. Once completed, this jutsu then immediately ends.</p><p>Success: Affected
      creature is able to resist this genjutsu's effects.</p><p>Failure: Affected creature becomes charmed by you and
      must attempt to complete whatever command you issued to them by any means necessary for the
      duration.</p><p>Critical Failure: Same effect as failure, but affected creature instead rationalizes the command
      as being beneficial to both themselves and for you, seeing it as mutually beneficial. At the end of this jutsu's
      duration, they lose any will or drive to complete the task.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above B-Rank increase the cost of this jutsu by 3 and the number of creature you can target with this jutsu
      by +1.</p>
