name: Compulsion
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>Creatures of your choice that you can see within range and that can hear you must make a Wisdom saving throw. A
      target automatically succeeds on this saving throw if it can't be charmed.</p><p>Success: Affected creature is
      able to resist this genjutsu's effects.</p><p>Failure: For the duration, you can spend a bonus action on each of
      your turns to designate a direction. The affected targets must use as much of its movement as possible to move in
      that direction on its next turn. It can take its action before it moves. After moving in this way, it can remake
      its saving throw to try and end this effect. They cannot be compelled to move into an obviously hazardous terrain,
      such as a fire pit, but it will provoke an attack of opportunity.</p><p>Critical Failure: Same effect as failure,
      but affected creature can be commanded to move into a hazardous terrain.</p>
    chat: ''
