name: Dark Lotus Field
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you must have fertile soil which can facilitate a flowers growth. You take
      your poisonous flower and infuse a dose of poisonous chemicals into the flower itself before you plant the flower
      into the soil and infuse your chakra into it giving it life and influencing the potency of the poison this jutsu
      produces.</p><p>If this flower, before or after being planted is killed or destroyed, this jutsu immediately ends,
      requiring you to recast it. The flowers look like a sacred lotus with black petals. Creatures looking for this
      flower, if they are proficient in Nature, Medicine, or Survival they may make any of the aforementioned skill
      checks vs your Genjutsu Save DC being able to find it on a success. If the creature is not proficient, they
      instead make a Wisdom (perception) check with a -5 penalty, to their check. If your flower is in a bed of other
      sacred lotuses, regardless if they are proficient or not, they take a -5 Penalty to their check. The flower has 10
      Hit point and an AC of 15.</p><p>At the conclusion of casting this jutsu you can infuse different volumes of
      chakra into the soil and roots facilitating different effects.</p><p>11 Chakra: This flower grows, producing black
      flower buds in the shape of a sacred lotus flower. As an action, for 10 minutes, while you are within 100 feet of
      this flower, the flower blooms releasing a black poisonous, but odorless cloud. All creatures within 60 feet of
      the flower of your choice must make an Intelligence saving throw at the beginning of each of their turns. On a
      failed save they become envenomed for the next hour. A creature envenomed as a result of this jutsu takes a -2
      penalty to their attack and damage rolls, saving throws, skill checks. Additionally, the poisoned creature treats
      all Genjutsu you cast as if it has the unaware keyword. After 10 minutes or after the flower is destroyed, this
      jutsu ends.</p><p>22 Chakra: You gain all previous chakra costs effects. In addition, you can activate this jutsu
      while you are within 250 feet of the flower and it affects all creatures of your choice within 120 feet of
      it.</p><p>33 Chakra: You gain all previous chakra costs effects. In addition, affected creatures instead have a -5
      penalty to their attack and damage rolls, and any psychic damage they would take deals additional psychic damage
      equal to twice your Genjutsu ability modifier. If any psychic damage you deal, adds your Genjutsu ability
      modifier, this jutsu's damage is in addition to it.</p><p>44 Chakra: You gain all previous chakra cost effects. In
      addition, genjutsu you cast while within 250 feet of your flower, does not require you to spend chakra to maintain
      concentration for up to 1 Hour. Additionally, any genjutsu you cast that requires concentration, instead has its
      duration become 1 hour, while within 250 feet of your flower so long as your flower is still alive. After 1 hour,
      or after the flower is destroyed, this jutsu ends.</p>
