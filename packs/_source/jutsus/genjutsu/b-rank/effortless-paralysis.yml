name: Effortless Paralysis
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You create a visual image of your own description that grabs and restrains a creature you can see within range.
      The target must succeed a Wisdom Saving throw. This jutsu has no effect on undead, constructs, plants, or
      Demons.</p><p>Success: Affected creature is able to resist this genjutsu's effects.</p><p>Failure: Affected
      creature becomes paralyzed for the duration. A paralyzed creature remakes their save at the end of each of its
      turns or when it takes damage, ending this jutsu's effect on it, on a success.</p><p>Critical Failure: Same effect
      as failure, but affected creature also only makes its saves when it takes damage.</p>
