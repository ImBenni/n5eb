name: Encroaching Darkness
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You cause menacing shadows to invade an area, centered on a point you can see within range. Creatures become
      unable to see Bright or dim light as it seems to vanish before their eyes. Any jutsu or effect of C-Rank or lower
      that would create light, does not produce visible light for creatures within range to see.</p><p>Yourself and up
      to 3 creatures of your choice are immune to this jutsu's effects and are treated as if being concealed by darkness
      against creatures who are under this jutsu's effects.</p><p>A creature can, on their turn as an Action, make a
      Wisdom saving throw. On a successful save, they can see through the darkness until the beginning of their next
      turn.</p><p>If a jutsu of B-Rank or higher is cast within this jutsu's area of effect that produces light, this
      jutsu immediately ends.</p>
