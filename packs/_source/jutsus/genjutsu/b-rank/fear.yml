name: Fear
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You project a phantasmal image of a creature's worst fears. Each creature in a 15-foot cube originating from
      you must succeed a Wisdom saving throw.</p><p>Critical Success: Affected creature is able to resist this
      Genjutsu's effects and becomes immune to this jutsu until the end of its next turn.</p><p>Success: Affected
      creature is able to resist this genjutsu's effects.</p><p>Failure: Affected creature drops whatever they are
      holding and gains 2 ranks of fear for the duration, and at the beginning of each of a frightened creatures turns,
      they must spend as many actions as possible to move away from the caster, unless there is nowhere to move. A
      frightened creature remakes their save at the end of each of their turns to end this jutsu's
      effect.</p><p>Failure: Affected creature drops whatever they are holding and gains 2 ranks of fear for the
      duration, and at the beginning of each of a frightened creatures turns, they must spend as many actions as
      possible to move away from the caster, unless there is nowhere to move. A frightened creature remakes their save
      at the end of each of their turns to end this jutsu's effect.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above B-Rank, increase the cost of this jutsu by 3 and the number of targets by +1.</p>
