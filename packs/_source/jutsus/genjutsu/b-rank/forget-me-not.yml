name: Forget Me Not
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a poisonous flower that you are holding. When you release the flower, all creatures
      except yourself within 5 feet of the flower are hit with a powerfully potent, yet odorless plume of poisonous
      pollen laced with your chakra. Creatures within range must succeed a Constitution and Intelligence saving throw,
      in that order.</p><p>On a Failed Constitution saving throw, the affected creature becomes poisoned for 1 hour
      (This cannot become envenomed) and a creature poisoned by this jutsu makes the next saving throw at
      disadvantage.</p><p>On a failed Intelligence saving throw, they lose all memory of the past 24 hours, for the next
      hour as it becomes a haze. This memory is still there, but clouded and hazy. If they attempt to remember, they
      must succeed an Intelligence save throw at disadvantage.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above B-Rank increase the cost of this jutsu by 3. When you cast this jutsu at A-Rank, on a failed save, their
      memory is permanently clouded over by this jutsu until Dispelled.</p>
