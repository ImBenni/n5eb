name: Frenzy Blades
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You collect and build all of your madness and instability and focus it into the shape of floating blades of
      your design. These blades oscillate around you and can be commanded to strike at your command. You manifest 4 of
      such blades.</p><p>When you would deal damage with a Genjutsu with the 'Frenzy' prefix, you subconsciously fire a
      blade made by this jutsu, making a ranged genjutsu attack at advantage, dealing 4d8 psychic damage on a
      hit.</p><p>Alternatively, as a bonus action, you can command one of these blades to strike your enemies. Make a
      ranged Genjutsu attack, dealing 5d8 psychic damage on a hit.</p><p>A creature who takes damage from this jutsu
      must make an Intelligence saving throw.</p><p>Success: Affected creature is able to resist this jutsu's secondary
      effects.</p><p>Failure: Affected creatures falls prone and falls into a bit of insanity as their eyes begin to
      swell and their thoughts slow down, as they gain the Slowed condition until the end of their next
      turn.</p><p>Critical Failure: Affected creature falls prone and falls into a bout of insanity as their eyes begin
      to swell and their thoughts slow down, as they gain the Slowed condition for the duration.</p>
