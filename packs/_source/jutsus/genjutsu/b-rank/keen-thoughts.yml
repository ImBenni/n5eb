name: Keen Thoughts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You touch a creature within reach who you can see. For the duration you increase their focus and enhance their
      mental efficiency.</p><p>For the duration target creature gain a +1 to their critical threat range with Genjutsu
      attacks.</p><p>Additionally, when they score a critical hit with a genjutsu attack, add 2 additional damage die to
      the damage roll.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the cost of this
      jutsu by 3 and the critical threat range by +1. If this jutsu is cast at S-Rank, when they score a critical hit
      with a genjutsu attack, you instead add 5 additional damage die to the roll.</p>
