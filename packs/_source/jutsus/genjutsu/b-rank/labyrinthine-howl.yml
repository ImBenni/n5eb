name: Labyrinthine Howl
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You let loose the howl of a ravenous beast, causing each hostile creature within range that can hear you to
      make a Wisdom saving throw.</p><p>On a failed save, a creature believes it has been moved into a labyrinth and is
      under attack by a savage beast of your description.</p><p>An affected creature on its turn must decide to face the
      beast head on or defend itself from the beast. A creature that faces the beast takes 8d6 psychic damage and this
      jutsu ends. A creature that defends itself from the beast falls prone and is stunned until the beginning of its
      next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the cost of this jutsu
      by 3 and the damage by 2d6.</p>
