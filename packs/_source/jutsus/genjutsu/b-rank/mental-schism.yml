name: Mental Schism
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a second mind. A second 'you'. This second mind exists and functions independently of your primary
      mind. It cannot control or influence your physical body, but it able to perform mental actions freely. On each of
      your turns, this second mind gains 1 action and 1 reaction, which is can only use to complete purely mental task
      such as making any Intelligence or Wisdom based skill checks, Read the Enemy, Search, or cast any E-Rank Ninjutsu
      or Genjutsu that doesn't require hand signs (HS) or Ninja tools (NT).</p>
