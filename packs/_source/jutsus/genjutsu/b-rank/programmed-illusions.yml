name: Programmed Illusions
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>After placing your specially made Genjutsu chakra seal onto a surface of your choice, the chakra seal creates
      an illusion of an object, creature, or some other visible phenomenon within range that activates when a specific
      condition occurs. This Genjutsu was imperceptible until then. It must be no larger than a 30-Foot cube, and you
      decide when you cast the Genjutsu how the illusion behaves and what sounds it makes. The scripted performance can
      last up to 5 minutes. But will repeat from the beginning.</p><p>When the condition you specify occurs, the
      illusion springs into existence and performs in the manner you described. Once the Illusion finishes performing,
      it repeats from the beginning continuing until the condition of the illusion being cast is no longer
      met.</p><p>Physical interaction with the image reveals it to be an illusion, because things can pass through it. A
      creature that uses its action to examine the illusion can determine that it is an illusion with a successful
      Genjutsu (Wisdom) check against the Jutsu save DC. If a creature discerns the illusion for what it is, the
      creature can see through the image, and any noise it makes sounds hollow to the creature.</p>
    chat: ''
