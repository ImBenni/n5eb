name: Sealing Art Cursed Tongue Seal
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>As a part of the activation of this jutsu. The target must currently be incapacitated or willing. Over the
      course of a minute, you tattoo a seal on a target creatures' tongue. You select 1 topic, which you wish for the
      target creature to be unable to speak of. Once this jutsu is casted the target creature becomes unable to speak,
      write, or willing reveal information on or about the topic you chose. A creature can attempt to undo the effects
      of this jutsu by making a Ninshou check against your Genjutsu Save DC + 5. An affected creature cannot gain a
      bonus to this check as the result of a jutsu. Each attempt takes 1 hour. On a successful check the target creature
      becomes able to speak on the topic freely again.</p>
    chat: ''
