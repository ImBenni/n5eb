name: Sealing Art Imprisoned Thoughts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest an illusory seal, designed to seal away thoughts and memories. Select one creature whom you can
      see within range. That target must make a Charisma saving throw.</p><p>Success: Affected creature is able to
      resist this jutsu's effects.</p><p>Failure: Affected creature has their thoughts sealed. The last jutsu they cast,
      cannot be recast for the duration, each attempt leading to it failing and the chakra still being
      spent.</p><p>Critical Failure: Affected creature suffers the same effects of a Failure, and also cannot cast any
      jutsu that both you and it has on its known jutsu list.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.</p>
