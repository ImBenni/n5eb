name: Slow
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You alter the perception of time for up to six creatures of your choice in a 40-foot cube within range. Each
      target must make an Intelligence saving throw.</p><p>Critical Success: Affected creature is able to resist this
      jutsu's effects.</p><p>Success: Affected creature becomes slow until the end of their next turn.</p><p>Failure:
      Affected creatures gains 1 rank of slow for the next minute. A slowed creature remakes their saving throw at the
      end of each of their turns, ending this jutsu's effects on themselves.</p><p>Critical Failure: Same as Failure,
      but they gain 2 ranks of slow, instead of 1.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      B-Rank, increase the cost of this jutsu by 3 and the number of targets by 2.</p>
