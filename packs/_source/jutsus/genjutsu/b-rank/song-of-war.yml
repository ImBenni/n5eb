name: Song of War
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You begin to hum or sing a tune of battle designed to make those who hear it want to engage in endless
      conflict. All allied creatures of your choice within range begins to experience this lust for battle.</p><p>For
      the duration, you do not spend chakra to maintain this jutsu, instead you must spend a bonus action on subsequent
      turns to maintain it.</p><p>Select Creature(s) gain the following until the beginning of your next turn.</p><p>•
      +5 Bonus to Ninshou, Illusions, and Martial Arts skill checks.</p><p>• +3 Bonus to Initiative Count. If This would
      put your initiative score above another creature, move up 1 step in the turn order.</p><p>• +2 Bonus to Attack
      &amp; Damage rolls &amp; Saving throws.</p>
