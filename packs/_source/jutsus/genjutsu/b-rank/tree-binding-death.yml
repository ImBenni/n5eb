name: Tree Binding Death
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You create the illusion of the target being completely bound by a growing tree as you vanish from sight. You
      will remain invisible to all the target creature's senses as it is affected by the Genjutsu. The illusion will
      remain until the target takes damage or resists the Genjutsu. Select up to 3 Target creatures you can see within
      range, each target must succeed a Wisdom save.</p><p>Critical Success: Affected creature is able to resist this
      jutsu's effects and becomes immune to this jutsu until the end of their next turn.</p><p>Success: Affected
      creature becomes Slowed until the end of the next turn.</p><p>Failure: Affected creatures becomes incapacitated,
      blind, deafened and grappled for the duration. Affected creatures remakes their saving throws at the end of each
      of their turns to end this Jutsu's effects on them.</p><p>Critical Failure: Same as Failure, but affected
      creatures are stunned instead of incapacitated.</p>
