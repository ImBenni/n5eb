    description: >-
      <p>• A <strong>Deafened</strong> creature can’t hear and automatically fails any check that requires
      hearing.</p><p>• A <strong>Deafened</strong> creatures has a -10 penalty to their Perception.</p><p>• Creatures
      currently Hidden from a <strong>Deafened</strong> creature do not need to reroll Dexterity (Stealth) Checks to
      maintain Stealth against them.</p><p>• Wisdom based Checks, attacks and saving throws are made at
      disadvantage.</p><p>• A creature can willingly cover their ears for an extended period of time as a bonus action.
      Doing so imposes this Condition on them and occupies both hands until the beginning of their next turn.</p>
