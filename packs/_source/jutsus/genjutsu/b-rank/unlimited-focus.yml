system:
  description:
    value: >-
      <p>You touch a willing creature who you can see. You impart upon them a focusing genjutsu designed to enhance
      their perception and reactionary abilities.</p><p>For the duration, affected creature gains the following;</p><p>•
      Adds 1d6 to any Constitution (Chakra Control) check they make</p><p>• They gain an additional Bonus
      action.</p><p>• When they would make an Intelligence or Charisma Saving throw vs a Genjutsu, they roll an
      additional 1d4 adding the result to their saving throw.</p>
