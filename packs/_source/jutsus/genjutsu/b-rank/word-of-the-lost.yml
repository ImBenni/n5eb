name: Word of The Lost
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You utter a few words of destitution directed at a single creature whom you can see who's name you include in
      your statement. If the creature can hear you, they fall under the effects of this jutsu as they suffer a series of
      mental flashes and fractured memories for this jutsu's duration.</p><p>At the beginning of an affected creatures
      turn they make an Intelligence saving throw. On a failure, the creature suffers a number of fracture's based on
      the severity of their failure.</p><p>• Failed by 1~4: They gain 1 Fracture.</p><p>• Failed by 5~9: They gain 2
      Fractures.</p><p>• Failed by 10~14: They gain 3 Fractures.</p><p>• Failed by 15+: They gain 4 Fractures.</p><p>A
      creature suffers a number of effects based on the number of fractures they have.</p><p>• A creature with 2 or more
      fractures cannot cast jutsu of</p><p>A-Rank or Higher. This limitation grows in severity for every 2 Fractures a
      creature has. (4 Fractures; B-Rank or Higher, 6 Fractures; C-Rank or Higher, 8 Fractures; D-Rank or
      Higher.)</p><p>• A creature with 3 or more fractures cannot maintain concentration on more than one jutsu at a
      time.</p><p>• A creature with 5 or more fractures cannot recognize their allies and views all creatures as
      hostile.</p><p>• A creature with 7 or more fractures doubles the cost of all jutsu they cast.</p><p>• A creature
      with 9 or more fractures lose the ability to cast jutsu with the Hand Sign (HS) component.</p><p>• A creature with
      10 or more fractures instead permanently retain all fractures and becomes a mental vegetable moving forward. They
      can attempt to make an Intelligence saving throw once every 30 Days. On a success they reduce the number of
      fractures they have by -3.</p>
    chat: ''
