system:
  description:
    value: "<p>A powerful Genjutsu, that puts a creature under an illusion only using words and speech. While in the Genjutsu, the target can be easily swayed by their will and self-assurance. Select a target creature you can see within range; the target must succeed a Charisma saving throw.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: They are also more inclined to believe the worst-case scenario and are more willing to go against their better judgement and their own goals.</p><p>Critical Failure: Affected creature suffers the effects of a failure and becomes paranoid of all other creatures excluding the caster for the duration.\_</p>"
