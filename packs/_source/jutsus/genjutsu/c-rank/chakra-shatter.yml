name: Chakra Shatter
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attempt to break the concentration of a creature in the process of casting a Jutsu that requires handsigns
      by creating an illusion that throws off their focus, creating an imbalanced chakra flow within them.</p><p>This
      jutsu counts as an Interrupt. You force the creature to deal with a powerful chakra disrupting illusion. If the
      jutsu cast is of a Rank equal to or lower than this jutsu when you cast it, you make a contested Illusions check
      vs the targets Ninshou or Illusion check (If Ninjutsu, they make a Ninshou check. If Genjutsu, they make an
      Illusions check).</p><p>If the Jutsu is of a higher rank, they make their check at advantage. If you win the
      contested skill check, their jutsu's casting fails, has no effect and the jutsu that failed cannot be cast until
      the end of that creatures following turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3.</p>
