name: Circular Movement
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You release an odorless poison into the air that you then manipulate to affect up to two creatures you can see
      within range.</p><p>Each of the selected creatures must make a Intelligence saving throw. On a failed save, they
      become poisoned.</p><p>A creature poisoned as a result of this jutsu is both unaware they are poisoned and also
      cannot willingly move further than 30 feet from their current position, regardless of the direction they move in.
      When a creature attempts to move further than 30 feet from their current position, they instead spend their
      remaining movement walking backwards, moving back to their starting position. A creature moving backwards is
      unaware they are moving backwards, instead believing they are still moving forwards and the distance between them
      and the location they are attempting to move to is growing infinitely for the duration.</p><p>If a creature
      poisoned as a result of this jutsu is cured of the poisoned condition, this jutsu also ends on them
      immediately.</p>
