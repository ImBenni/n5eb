name: Corruption Cruelty
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You collect and build illusionary chakra, attempting to mentally scar them with a seal of cruelty.</p><p>Select
      one creature you can see within range, forcing them to make a Charisma saving throw.</p><p>Success: Affected
      creature is able to resist most of this jutsu's effects.</p><p>Failure: Affected creatures are marked with a seal
      of cruelty, corrupting and burning through their psyche. At the beginning of each of their turns, this seal forces
      their mind to discharge large chunks of chakra, dealing 3d6 chakra damage. Affected creatures can, as an action,
      remake their saving throw to end this jutsu's effects.</p><p>Critical Failure: Same as failure, but the chakra
      damage is increased to 5d6.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3 and the number of target creatures by +1.</p>
