name: Corruption Loathing
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You collect and build illusionary chakra, attempting to mentally inject a level of self-loathing on your
      foes.</p><p>Select one creature you can see within range, forcing them to make a Charisma saving
      throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming immune to further
      castings of this jutsu for the next 10 minutes.</p><p>Success: Affected creature is able to resist most of this
      jutsu's effects.</p><p>Failure: Affected creatures who would make a Strength saving throw, must instead make a
      Strength ability check, once per round. A creature under this effect, remakes their saving throw at the end of
      each of their turns, to end this jutsu's effect on them.</p><p>Critical Failure: Same as failure, but the target
      must now make that ability check up to twice per round if forced.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of target creatures by +1.</p>
