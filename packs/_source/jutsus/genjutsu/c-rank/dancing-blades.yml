name: Dancing Blades
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>When you cast Dancing blades, you create four Illusionary copies of a weapon you are currently holding. This
      illusionary weapon floats within 5 feet of you hovering spinning and circling around you, while mimicking your
      attacks.</p><p>As an action, you may spend one of your illusionary weapons to slam into a creature within range.
      Make a Ranged Genjutsu attack targeting a creature up to 60 feet away. On a hit you deal 2d10 + Your Genjutsu
      ability modifier.</p><p>When you are hit by a melee attack that exceeds your AC by 1-3, one of your illusory
      weapons parries the attack, preventing you from taking damage and destroying the illusory weapon.</p><p>When you
      are hit by a melee attack that exceeds your AC by 4-6, you take half damage from the triggering attack and one
      illusory weapon is destroyed.</p><p>If you make a genjutsu attack that scores a hit, while this jutsu is active,
      one of your illusory weapons also strike the target dealing psychic damage equal to 1d10.</p><p>An attacker must
      be able to see you, in order to see the illusory weapons to be affected by this jutsu. This jutsu has no effect if
      you are invisible, hidden, in total darkness or if the attacker is blinded.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of illusory weapons you
      summon by +1.</p>
