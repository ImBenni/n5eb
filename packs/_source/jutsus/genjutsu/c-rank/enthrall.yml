name: Enthrall
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You weave a distracting string of words, causing creatures of your choice that you can see within range and
      that can hear you to make a Wisdom saving throw. Any creature that can't be charmed succeeds on this saving throw
      automatically, and if you or your companions are fighting the target creature, it has advantage on the
      save.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature
      gains disadvantage on Wisdom (Perception) and Wisdom (Insight) checks made to perceive and interact with any other
      creature other than the caster of this genjutsu for the duration or until the target can no longer hear you. This
      genjutsu ends if you stop communicating with the creature for longer than 6 seconds.</p><p>Critical Failure:
      Affected creature suffers the effects of a failure but instead automatically fail all Wisdom (perception) and
      Wisdom (Insight) checks made to perceive and interact with other creatures, only seeing the caster and ignoring
      all others.</p>
