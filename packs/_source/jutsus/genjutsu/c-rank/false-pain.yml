name: False Pain
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You speak words of reinforcement. Select up to two willing creatures other than yourself that you can see
      within range. Each of the selected creatures pain receptors becomes dulled and numb, becoming unable to feel the
      pain or sickness they felt prior. For this jutsu's duration, all damage they would take is delayed, until this
      jutsu ends. They record all damage they would normally take over the course of the encounter as normal.
      Additionally, they ignore the effects of the Weakened, Dazed, Incapacitated, and poisoned conditions for this
      jutsu's duration. If any of the aforementioned conditions duration would last beyond this jutsu's duration, they
      begin suffering the effects of that condition as normal. At the end of this jutsu's duration, affected creatures
      take psychic damage equal to the total delayed damage they have recorded at once. This damage ignores resistance
      and immunity.</p>
    chat: ''
