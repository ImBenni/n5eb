name: Flower Petal Escape
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>An advanced version of the "Feather Burst" Genjutsu. When you are hit your body breaks into a swarm of flower
      petals of your own description, while you regroup yourself from a stealthy position. When you are struck by an
      attack you may roll 2d4, reducing the triggering creatures attack bonus by the result, potentially causing the
      attack to miss, making any damage you took prior never actually happen.</p><p>As part of the activation of the
      jutsu, regardless if you are hit or not; Make a Dexterity (Stealth) or Wisdom (Stealth) check vs the triggering
      creatures Passive perception. On a success, you immediately moving up to your movement speed away without
      triggering an attack of opportunity and you become hidden from the triggering creature if you end your movement in
      a space where you are at least partially covered.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and reduce attack bonus further by 1d4.</p>
