name: Genjutsu Break
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>Choose one creature, object, or Genjutsu effect within range. Any Genjutsu of equal rank or lower is
      transferred into the Chakra seal used in this jutsu's casting, immediately ending its effect on the affected
      creature(s), or object(s). For each Genjutsu of higher rank, affecting the target, make an ability check using
      your Genjutsu ability. The DC equals 12 + The Jutsu's Rank. Rank (B-3, A-4, S-5). On a successful check, the
      Genjutsu is transferred to the Chakra seal and can be stored for no more than 10 minutes.</p><p>For the duration
      of this hour, you can attempt to transfer this genjutsu to another creature within 5 feet of you by spending an
      action to make a Melee Genjutsu attack against a creature within 5 feet of you. On a hit the Sealing tag is
      applied to the target, and at the beginning of its next turn they must make a saving throw against the original
      save DC to resist its effects as if the jutsu were originally cast on them.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. The removed jutsu has no effect if its
      rank is less than or equal to the rank of this jutsu when you cast it.</p>
