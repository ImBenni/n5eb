name: Hypnotic Patterns
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You create a twisting pattern of colors that weaves through the air inside a 30-foot cube within range. The
      pattern appears for a moment and vanishes. Each creature in the area who sees the pattern must make a Wisdom
      saving throw.</p><p>Critical Success: Affected creature is able to resist this Jutsu's effects, gaining advantage
      against this jutsu's effects if cast against them a second time within the next hour.</p><p>Success: Affected
      creature is able to resist most of this jutsu's effects.</p><p>Failure: Affected creature becomes enamored by the
      colors, being unable to leave the radius of the cube and having their movement speed reduced by half.
      Additionally, they cannot maintain concentration on more than one jutsu while enamored in this way. They remake
      their saving throws at the end of each of their turns, ending this jutsu on themselves on a success. The Jutsu
      ends for an affected creature if it takes any damage.</p><p>Critical Failure: Affected creature suffers the same
      effect as a failure but also becomes incapacitated as their movement speed is reduced to 0 for the duration. The
      Jutsu also ends for an affected creature if it is moved more than 10 feet against its will.</p>
