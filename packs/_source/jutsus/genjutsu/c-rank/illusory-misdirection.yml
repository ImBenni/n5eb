name: Illusory Misdirection
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You conjure a beautiful illusory creature of your description. All creatures who aren't blinded within 30 feet
      of the conjured illusion must succeed a Charisma saving throw. On a failed save they become charmed by the
      illusory creature for the duration.</p><p>As a bonus action, on your turn, you can reveal that the creature you
      created, is actually not what the charmed creatures believed it to be, while still having the same beautiful
      features as when you created them. Affected creatures must succeed a Charisma saving throw. On a failed save, they
      are in shock from the realization of the creature turning into something else entirely, as they become dazed for
      1d4 rounds. On a success they steel themselves, ending the charmed condition. Regardless, when you reveal the
      illusory creatures true nature, regardless if affected creatures pass or fail, this jutsu immediately ends.</p>
