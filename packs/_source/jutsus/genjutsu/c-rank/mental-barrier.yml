system:
  description:
    value: >-
      <p>You protect your mind with a wall of looping, repetitive thought. As a reaction, when you would make a saving
      throw against a Genjutsu without the Unaware keyword, you gain a 1d6 bonus in one of the following saving throws
      Intelligence, Wisdom, or Charisma, until the end of the current turn. You also gain resistance to Psychic damage
      for the duration.</p>
