name: Mental Shield
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest an armor of illusory chakra that shields and protects you from assaults of other psychic based
      attacks or effects.<br />You reduce all incoming psychic damage by 5, if you would reduce psychic damage to 0
      while gaining the benefits of this jutsu, and the hostile jutsu or effect would also attempt to inflict an effect
      or condition, you ignore that effect or condition.<br />At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the psychic damage reduction by 5.</p>
