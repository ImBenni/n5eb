name: Mental Taunt
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You create a sound of attraction. Meant to force creatures to focus on you against their will. Select a
      creature within range and force them to make a Charisma saving throw.</p><p>Success: Affected creature is able to
      resist this jutsu's effects.</p><p>Failure: Affected creature must target you with any jutsu they cast until the
      end of their next turn.</p><p>Critical Failure: Same effect as failure, and they cannot cast jutsu or used
      features, effects or items that would heal them.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.</p>
    chat: ''
