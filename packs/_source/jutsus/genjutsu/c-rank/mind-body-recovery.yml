name: Mind-Body Recovery
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You soothe a target's suffering and pain by making their mind unaware of it while also raising their tolerance
      for pain. Select up to 3 willing Creatures within range. Target creatures gain 3d6+5 Temporary Hit points for the
      duration. When this jutsu ends they lose any remaining temporary Hit points from this jutsu.</p><p>Additionally,
      you are able to remove one mental condition of C-Rank of lower.<br />At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the temporary hit points by 1d6+3 and the rank of
      mental condition you can remove by one.</p>
