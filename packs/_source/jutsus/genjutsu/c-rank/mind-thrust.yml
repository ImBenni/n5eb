name: Mind Thrust
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You thrust a blade formed through your genjutsu into the mind of one creature you can see within range. The
      target must succeed an Intelligence saving throw.</p><p>Success: Affected creature is able to resist this
      Genjutsu's effects.</p><p>Failure: Affected creature's takes 2d8 psychic damage, and it can't take a reaction
      until the end of its next turn.</p><p>Critical Failure: Affected creature takes 3d8+Genjutsu ability modifier
      psychic damage, it can't take a reaction until the end of its next turn and At the beginning of the targets next
      turn, they must make an Intelligence saving throw. On a failed save, the target must choose to either move, take
      an action, or a bonus action. It can only do one of the three.<br />At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.</p>
