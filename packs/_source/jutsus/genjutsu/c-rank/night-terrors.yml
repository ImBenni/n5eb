name: Night Terrors
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You amplify the fear that lurks in the heart of all creatures. As a part of casting this jutsu, you must target one creature who currently has at least 1 rank of fear. The target creature must succeed a Charisma saving throw. On a failed save, any genjutsu currently affecting them, that would inflict, or has inflicted the fear condition immediately ends.<br />The target creatures current ranks of fear double. If they have 3 or more ranks when they fail this jutsu's saving throw, their ranks of fear instead immediately becomes 5 for the duration.</p><p>A creature who has any number of fear ranks as a result of this jutsu cannot gain additional ranks of fear from other sources.<br />Additionally, affected creature remake their Charisma saving throw at the end of each of their turns. On a successful save they remove all ranks of fear and ends this jutsu's effects on themselves. Alternatively, when you lose concentration on this jutsu, the affected creature immediately loses all ranks of fear.<br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.\_</p>"
    chat: ''
