name: Outflank
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>Select one creature you can see within range. For the duration, when you make a genjutsu attack against the
      creature, an illusory double of you attempts the same attack.<br />When you make a Genjutsu attack of any type
      targeting the select creature for the duration, your illusory double attacks with the same attack from a different
      angle. Make a second Genjutsu attack against the creature with the same bonuses to your attack (if any), if your
      initial attack misses. On a successful hit, they take half damage and suffer any additional effects as normal.<br
      />Additionally, as a reaction when an allied creature performs an attack targeting the same creature, you can
      create an illusory double of your allied creature performing the same attack. The attacking allied creature makes
      their attack at advantage.<br />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and the number of creatures you can target by +1.</p>
    chat: ''
