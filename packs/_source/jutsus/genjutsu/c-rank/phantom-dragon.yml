name: Phantom Dragon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You touch one willing creature within range. All creatures of your choice who can see them within 120 feet, see
      your ally as they transform into dragon of your description of large size.</p><p>While looking at this illusion,
      observers make a Wisdom saving throw to see through it. On a failed save, they see your ally as a large dragon for
      the duration.</p><p>When you ally attempts to attack or cast a jutsu of any type, the illusory dragon looks as if
      it is performing the jutsu itself, be it breathing fire, performing an aggressive martial attack or creating
      illusions using its draconic aura.</p><p>When your affected ally deals damage to a creature, who sees them as an
      illusory dragon, they deal an additional 3d10 psychic damage to affected creatures, once per turn.
      195</p><p>Alternatively, as an action on their turn, the affected ally can perform a ferocious roar. All creatures
      within 120 feet excluding you and other creatures who have seen through this genjutsu must make a Charisma saving
      throw. On a failed save they gain 1 rank of fear for the next minute against the illusory dragon. A creature who
      has ranks of fear as a result of this jutsu can spend their action to remake the charisma save removing all ranks
      of fear they have on a success.</p>
