name: Poison Lotus Field
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you must have fertile soil which can facilitate a flowers growth. You take
      your poisonous flower and infuse a dose of poisonous chemicals into the flower itself before you plant the flower
      into the soil and infuse your chakra into it giving it life and influencing the potency of the poison this jutsu
      produces.</p><p>If this flower, before or after being planted is killed or destroyed, this jutsu immediately ends,
      requiring you to recast it. The flowers look like a sacred lotus with purple petals. Creatures looking for this
      flower, if they are proficient in Nature, Medicine, or Survival they may make any of the aforementioned skill
      checks vs your Genjutsu Save DC being able to find it on a success. If the creature is not proficient, they
      instead make a Wisdom (perception) check with a -5 penalty, to their check. If your flower is in a bed of other
      sacred lotuses, regardless if they are proficient or not, they take a -5 Penalty to their check. The flower has 1
      Hit point and an AC of 5.</p><p>At the conclusion of casting this jutsu you can infuse different volumes of chakra
      into the soil and roots facilitating different effects.</p><p>8 Chakra: This flower grows, producing purple flower
      buds in the shape of a sacred lotus flower. As an action, for the next minute, while you are within 90 feet of
      this flower, the flower blooms releasing a potent poisonous, but odorless gas. All creatures within 60 feet of the
      flower of your choice must make an Intelligence saving throw at the beginning of each of their turns. On a failed
      save they become poisoned. A creature poisoned as a result of this jutsu who would make a saving throw or skill
      check as the result of, or against a Genjutsu you cast, must roll an additional 1d4, reducing their saving throw
      or ability check by the result. Additionally, the poisoned creature treats all Genjutsu you cast as if it has the
      unaware keyword. After 1 minute or after the flower is destroyed, this jutsu ends.</p><p><br />16 Chakra: You gain
      all previous chakra costs effects. In addition, you can activate this jutsu while you are within 120 feet of the
      flower and it affects all creatures within 90 feet of it.</p><p>24 Chakra: You gain all previous chakra costs
      effects. In addition, affected creatures instead rolls 2d4, reducing their saving throw or ability check by the
      result and any psychic damage they would take deals additional psychic damage equal to twice your Genjutsu ability
      modifier if it doesn't already add your Genjutsu ability modifier to the damage rolls.</p><p>32 Chakra: You gain
      all previous chakra cost effects. In addition, genjutsu you cast while within 250 feet of your flower, does not
      require you to spend chakra to maintain concentration for up to 10 minute. Additionally, any genjutsu you cast
      with a duration of concentration, up to 1 minute, instead becomes 10 minutes, while within 250 feet of your
      flower. After 10 minutes, or after the flower is destroyed, this jutsu ends.</p>
