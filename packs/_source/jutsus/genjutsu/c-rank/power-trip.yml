name: Power Trip
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You mentally track all of the pain you've experienced this encounter. Record the difference between your
      current hit points and your maximum hit points.</p><p>On your next turn, if you would deal psychic damage to a
      creature, you can spend a number of chakra up to the amount recorded. When you do, the target who took the psychic
      damage takes additional damage equal to the amount of chakra spent.</p><p><br />Once this jutsu is cast and you
      successfully deal bonus damage with its effects, you cannot cast it again until at least 10 minutes have
      passed.</p>
