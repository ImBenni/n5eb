name: Powerful Calm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You release a Genjutsu aura originating from you completely suppressing creatures in a 60-foot sphere centering
      on you, aggressive feelings for 4d8 Minutes. If the target is attacked, damaged or the end of the rolled time
      passes, creatures return to being hostile to whomever they were hostile to before with compressed and compounded
      rage. Creatures in the target area must succeed a Charisma saving throw, losing all will to fight for the rolled
      duration on a failed save. On a success, creatures remain aggressive and cannot be affected by this Genjutsu again
      for 24 hours.</p>
