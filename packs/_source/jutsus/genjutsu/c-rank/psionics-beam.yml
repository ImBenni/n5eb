name: Psionics Beam
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a wave of psionic chakra that disorients creatures that are touched by it.</p><p>All creatures of
      your choice in a 5-feet wide, 60-feet long line, originating from you must make an Intelligence saving
      throw.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature
      takes 2d10 psychic damage and becomes confused.</p><p>Critical Failure: Affected creature takes 3d10 psychic
      damage and gains 2 ranks of confused.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d10.</p>
