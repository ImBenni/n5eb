system:
  description:
    value: >-
      <p>You manifest a shockwave of psionic chakra and release it into an omnidirectional wave around you. All
      creatures of your choice in a 30-foot radius, originating from you must make an Intelligence saving
      throw.</p><p><br />Success: Affected creature is able to resist this jutsu's effects.</p><p><br />Failure:
      Affected creature takes 3d8 psychic damage and becomes dazzled.</p><p><br />Critical Failure: Affected creature
      takes 5d8 psychic damage and affected creatures gains 3 ranks of dazzled.</p><p><br />At Higher Ranks: For each
      rank you cast this jutsuabove C-Rank, increase the cost of this jutsu by 3 and the damage by 1d8.</p>
