name: Psionics Dark Pulse!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a shockwave of psionic chakra and release it into a dark wave of mental force.</p><p><br />All
      creatures in a 30-foot cone, originating from you must make an Intelligence saving throw.</p><p><br />Success:
      Affected creature is able to resist this jutsu's effects.</p><p><br />Failure: Affected creature takes 4d6 psychic
      damage and at the beginning of their next turn must roll a d8. On a roll of 1 or 2 their next jutsu fails to cast.
      They still spend the chakra as normal.</p><p><br />Critical Failure: Affected creature takes 6d6 psychic damage
      and their next jutsu fails to cast, they spend double the chakra cost as normal.</p><p><br />At Higher Ranks: For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the range of the cone by 5
      feet.</p>
