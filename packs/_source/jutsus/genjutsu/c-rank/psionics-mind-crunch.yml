name: Psionics Mind Crunch!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest fangs of black psionic chakra that bite into your enemies thoughts. Make a ranged Genjutsu attack.
      On a hit you deal 2d10 psychic damage and the affected creature must make an Intelligence saving
      throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effects.</p><p><br />Success:
      Affected creatures AC is reduced by 1, until the end of their next turn.</p><p><br />Failure: Affected creatures
      AC is reduced by 2, until the end of their next turn.</p><p><br />Critical Failure: Affected creatures AC is
      reduced by 2, two ranks of concussion and they cannot take reactions until the end of their next turn.</p><p><br
      />At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the
      number of creatures you can target by +1.</p>
