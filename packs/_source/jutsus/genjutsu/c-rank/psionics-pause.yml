name: Psionics Pause!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a pulse of illusory chakra that delays a creatures synaptic response time to events. Select one
      creature you can see within range, forcing them to make an Intelligence saving throw.</p><p><br />Critical
      Success: Affected creature is able to resist this jutsu's effects and becomes immune to this jutsu's effects for
      1d4 of its turns.</p><p><br />Success: Affected creature is able to resist this jutsu's effects.</p><p><br
      />Failure: Affected creature decides on their actions on their turn, but can only actively take them at the end of
      the next creatures turn. If the affected creature would target a creature who is no longer in range, their jutsu
      fails to cast.</p><p><br />Critical Failure: Affected creature decides on their actions on their turn, but they
      can only actively take them on initiative count 0.</p><p><br />At Higher Ranks: For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at A-Rank, increase the number of
      creatures this jutsu can target by +1.</p>
