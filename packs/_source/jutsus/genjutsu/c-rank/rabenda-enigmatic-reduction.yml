name: Rabenda Enigmatic Reduction
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You grasp a hand full of poisonous Rabenda flower buds, enhancing them with your chakra and spreading its
      spores into a storm filling a 20-foot cube originating from yourself. As they flutter in front of you, all
      creatures who begin their turns within range must make a Charisma saving throw to as the pollen begins to intrude
      on their subconscious.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming
      immune to this jutsu's casting for the duration.</p><p>Success: Affected creature is able to resist most of this
      jutsu's effects.</p><p>Failure: Affected creature who casts a jutsu suffers a temporary reduction to their casting
      stat, for the remainder of this jutsu's duration. Each time an affected creature casts a Jutsu while in this
      jutsu's area suffers a -1 penalty to all checks, saves, attack rolls, and saving throws associated with that
      ability score. This penalty stacks up to a maximum of -3. A creature suffering such a penalty, can spend its
      Action to remake this jutsu's saving throw, ending its effects.</p><p>Critical Failure: Same as failure, but the
      maximum penalty is increased to -5</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3 and the size of the radius by 5 feet.</p>
