name: Ringing Bell Distortion
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attach a bell to a thrown weapon and select up to 3 spaces within range to throw them. The bells ring out
      diluting the sense of all creatures who can hear them in a 20-foot radius from each of the selected locations,
      causing them to see hallucinations of your design such as seeing multiple mirages of you, or seeing their own
      allies in your place. All creatures in the target radiuses must succeed an Intelligence Saving throw, gaining
      disadvantage on all attacks and providing advantage to all creatures targeting it for an attack for the
      duration.</p>
    chat: ''
