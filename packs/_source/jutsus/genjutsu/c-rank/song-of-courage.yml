name: Song of Courage
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You begin to hum or sing an inspirational tune designed to make those who hear it believe they can achieve
      anything. All creatures of your choice within range begins to experience this refreshing delusion.</p><p><br />For
      the duration, you do not spend chakra to maintain this jutsu, instead you must spend a bonus action on subsequent
      turns to maintain it.</p><p><br />Creatures who begin their turns within range gain immunity to the fear condition
      until the beginning of their next turn. Additionally, creatures who have to make saving throws against a jutsu a
      hostile creature has cast, cannot make the saving throw at disadvantage.</p><p><br />Finally, the affected
      creature ignores any penalties to their rolls as a result of a hostile creatures jutsu or effects.</p><p><br />At
      Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the radius
      by 5.</p>
