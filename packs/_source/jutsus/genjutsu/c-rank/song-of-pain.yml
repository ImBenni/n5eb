name: Song of Pain
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You begin to hum or sing a tune of pain and suffering designed to make those who hear it experience bouts of
      pain that they can only wish would end.</p><p><br />For the duration, you do not spend chakra to maintain this
      jutsu, instead you must spend a bonus action on subsequent turns to maintain it.</p><p><br />Creatures who begin
      their turns within range who attempts to cast a jutsu with the Mobility (M) keyword, must succeed an Intelligence
      Saving throw. On a failed save, if they experience extreme muscle pain in parts of the body you see them
      attempting to utilize, causing them to lose the jutsu attempted.</p><p><br />At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the radius by 5.</p>
