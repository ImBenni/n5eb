name: Song of Respite
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You begin to hum or sing a tune of restoration and healing designed to make those who hear it feel as if their
      wounds are closing and being mended.</p><p><br />For the duration, you do not spend chakra to maintain this jutsu,
      instead you must spend a bonus action on subsequent turns to maintain it.</p><p><br />All allied creatures of your
      choice within range gains a number of temporary hit points equal 1d4+ your Genjutsu Ability Modifier at the
      beginning of each of your turns.</p><p><br />Temporary Hit points gained as a result of this jutsu remain for up
      to 1 minute after this jutsu ends.</p><p><br />At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and the radius by 5.</p>
