name: Thought Shield
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You weave a clouding veil over the mind of one creature you touch. For the duration, the target's mind can't be
      read or detected, creatures can't telepathically communicate with the target unless the target allows it, and the
      target has advantage on saving throws against any effect that would determine whether it is telling the
      truth.</p><p><br />Additionally, the target has advantage on the first Intelligence or Wisdom saving throw it
      makes against a Genjutsu. Regardless if you pass or fail the save, this jutsu then ends on that creature.</p>
