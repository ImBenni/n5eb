name: True Light
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>Your body releases a golden radiance that spreads out from you, providing bright light up to 30 feet away. Any
      creature or object in the area of bright light that are invisible, transformed, or hidden as a result of a
      Genjutsu of C-Rank or Lower, they are immediately revealed. Likewise, any Genjutsu with the Visual keyword of
      C-Rank or lower within 30 feet of you becomes feeble and transparent as their illusory nature becomes
      obvious.</p><p>A creature who's Genjutsu would be revealed to be an illusion may as a reaction make a Wisdom
      (Illusions) check at disadvantage vs your Genjutsu save DC. On a success, their Genjutsu retains is shape and form
      without revealing its true nature.</p><p>A hostile creature attempting to cast a Genjutsu of C- Rank or lower that
      has the visual keyword, while within the bright light, must make a Wisdom saving throw. On a failed save, any
      creature who would make a saving throw as a result of their Genjutsu, makes their saving throw at
      advantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu
      by 3 and the rank of jutsu this jutsu affects to a rank equal to the rank you cast this jutsu at</p>
