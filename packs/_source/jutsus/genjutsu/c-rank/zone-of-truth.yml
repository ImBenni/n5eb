name: Zone of Truth
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You create a chakra filled zone that guards against deception in a 30-foot sphere centered on a point of your
      choice within range. Until the genjutsu ends, a creature that enters the jutsu's area for the first time on a turn
      or starts its turn there must make a Charisma saving throw. You know whether each creature succeeds or fails on
      its saving throw.</p><p>Critical Success: Affected creature is able to resist this Genjutsu's effects and you are
      unaware if it passed or failed the save.</p><p>Success: Affected creature is able to resist some of this jutsu's
      effects but they still find it difficult to lie. They suffer a 1d4 penalty to Deception checks.</p><p>Failure:
      Affected creature find it very difficult to speak any deliberate or intentional lies as they show a look of
      obvious discomfort and suffers a 1d6 penalty to Deception checks.</p><p>Critical Failure: Affected creature
      becomes unable to speak if they would lie.</p>
