name: Bane
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You release a pulse of chakra targeting all hostile creatures within 30 feet of you causing them feel deep
      seeded regret or dread. All hostile creature of your choice within 30 feet of you must succeed a Charisma saving
      throw as their mind is wrought with negative thoughts.</p><p>Success: No further effects.</p><p>Failure: Affected
      creatures suffers a 1d4 penalty to all attack roll, saving throws and checks it makes for the
      duration.</p><p>Critical Failure: Affected creatures suffers a 1d6 penalty to all attack roll, saving throw and
      skill checks it makes and it cannot gain the benefit of jutsu that provide bonuses to it of the same rank or lower
      for the duration</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and the radius by 10-feet. If cast at B-Rank the die increases by one step. If cast at S-Rank, the die
      increases by two steps.</p>
