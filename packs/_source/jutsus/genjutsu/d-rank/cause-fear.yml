name: Cause Fear
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You awaken a sense of mortality in one creature you can see within range after releasing\_ home potent aromas from incents you spread and use as the catalyst for your genjutsu. A construct or undead is immune to this effect. The target must succeed a Wisdom saving throw at the beginning of each of its turns for the duration.</p><p>Critical Success: This jutsu ends on the affected creatures, removing all ranks of fear granted by this jutsu.</p><p>Success: Affected creature does not gain a rank of fear.</p><p>Failure: Affected creatures gains one rank of fear against the caster until this jutsu ends.</p><p>Critical Failure: Affected creatures gains two ranks of fear against the caster until this jutsu ends and falls prone from the shock.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and select 1 additional creature who must all be within 30 feet of each other when you target them.</p>"
