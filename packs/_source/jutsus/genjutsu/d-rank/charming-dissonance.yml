name: Charming Dissonance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attempt to suppress strong emotions in up to 3 creatures who can see and hear you within range. You speak
      with a reverberating confidence that quells their fears, anger, and confusion. Up to 3 creatures you choose must
      make a charisma saving throw; A creature can choose to fail this saving throw if it wishes. If a creature fails
      its saving throw, choose one of the following effects.</p><p>• You can suppress any effect causing a target to be
      charmed or feared. When this jutsu ends, any suppressed effect resumes, provided that its duration has not
      expiredin the meantime.</p><p>• Alternatively, you can make a target indifferent about creatures of your choice
      that it is hostile towards. This indifference ends if the target or its allies are attacked. When this jutsu ends,
      the creature becomes hostile again.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and select 1 additional creature.</p>
