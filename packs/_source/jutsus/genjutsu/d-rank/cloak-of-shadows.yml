name: Cloak of Shadows
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You cloak a willing creature you touch in illusionary darkness, granting it a +1d4 bonus to Hide or Sneak
      attempts vs creatures that rely on sight for the duration.</p><p>Additionally, if cast in Dim Light or Darkness,
      creatures attempting an Identify Genjutsu action, make their check at disadvantage.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If cast at B-Rank, the duration
      increases to "up to 10 minutes" and no longer costs chakra to maintain concentration. If cast at A-Rank, this
      jutsu's duration becomes 1 Hour and no longer requires concentration.</p>
    chat: ''
