name: Compelled Duel
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You attempt to compel a creature into a duel. They see you as the only worthy foe in the area and will do everything they can to fight you and only you, while becoming indifferent towards other combatants. One creature that you can see must make a wisdom saving throw.</p><p>Success: Affected creature ignores this jutsu and suffers no effects.</p><p>Failure: Affected creature becomes drawn to you suffering a -1d6 penalty to all attacks rolls against creatures other than you for the duration. A compelled creature must remake their saving throw at the end of each of its turns to end this effect on them. This jutsu ends if you attack any other creature or if a friendly creature to you, would assist you in any way.</p><p>Critical Failure: Affected creatures becomes drawn to you, becoming unable to target any other creature other than you for the duration. This jutsu ends if you attack any other creature or if a friendly creature to you would assist you.</p><p>\_</p>"
