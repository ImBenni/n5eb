name: Confidence
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You select up to 3 willing creatures in range, that you can see, reinforcing their confidence in themselves,
      allowing them to act with little to no hesitation. For the duration, whenever a target creature makes an Ability
      check, they add +2 to the result. The first time the succeed on an Ability check, this jutsu ends.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast
      at B-Rank, this bonus instead becomes a +3. If this jutsu is cast at S-Rank, this bonus instead becomes a +4.</p>
