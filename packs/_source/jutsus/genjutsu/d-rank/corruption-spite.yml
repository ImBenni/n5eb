name: Corruption Spite
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You collect and build illusionary chakra, attempting to mentally disable the physical strengths of your
      foes.</p><p>Select one creature you can see within range, forcing them to make a Charisma saving
      throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming immune to further
      castings of this jutsu for the next 10 minutes.</p><p>Success: Affected creature is able to resist most of this
      jutsu's effects.</p><p>Failure: Affected creatures suffer a -2 penalty to all Strength based attack and damage
      rolls.</p><p>Critical Failure: Same as failure, but the penalty is reduced by an additional -2.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the penalty by an
      additional -1.</p>
