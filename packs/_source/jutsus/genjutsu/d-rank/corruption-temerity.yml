name: Corruption Temerity
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You collect and build illusionary chakra, attempting to suppress their boldness in combat.</p><p>Select one
      creature you can see within range, forcing them to make a Charisma saving throw.</p><p>Critical Success: Affected
      creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu until the end of
      the casters next turn.</p><p>Success: Affected creature is able to resist most of this jutsu's
      effects.</p><p>Failure: Affected creature loses the benefit of jutsu based bonuses to speed, becoming unable to
      benefit from them for the duration. An affected creature remakes their saving throw at the end of each of their
      turns.</p><p>Critical Failure: Same as failure, but this also extends into class and class features as
      well.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      and the number of creatures you can target by +1.</p>
