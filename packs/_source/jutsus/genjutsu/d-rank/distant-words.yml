name: Distant Words
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You implant a message within an object in range, a message that is uttered when a trigger condition is met. Choose an object that you can see and that isn't being worn or carried by another creature. Then speak the message, which must be 25 words or less, though it can be delivered over as long as 10 minutes. Finally, determine the circumstance that will trigger the jutsu to deliver your message. When that circumstance occurs, a disembodied voice can be heard originating from the object and recites the message in your voice and at the same volume you spoke.</p><p>When you cast this jutsu, you can have the jutsu end after it delivers its message, or it can remain and repeats its message whenever the trigger occurs. The triggering circumstance can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the object.</p><p>For example, you could instruct the illusion to speak when any creature moves within 30 feet of the object or when a silver bell rings within 30 feet of it.</p><p>\_</p>"
