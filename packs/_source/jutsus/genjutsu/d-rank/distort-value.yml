  description:
    value: "<p>When you cast this Genjutsu target an object no more than 1 foot on a side,\_ toubling the objects perceived value by adding an illusionary flourish or reducing its perceived value by half with the help of illusionary dents or scratches. Anyone examining the object must roll an investigation or Illusions check against your genjutsu save DC to see through this genjutsu.<br />At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the size of the object by 5.</p><p>\_</p>"
