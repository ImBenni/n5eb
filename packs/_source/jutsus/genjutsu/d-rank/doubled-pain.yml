    value: >-
      <p>You target a creature and amplify their nervous system, enhancing all instances of pain to a massive degree.
      Select a target creature you can see within range. For the duration, whenever you deal damage using a Genjutsu,
      you deal an additional 1d8 Psychic damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
