name: Environmental Affinity
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>The environment seems to shift and swirl around you. For this jutsu's duration, creatures looking at you see the natural terrain moving at your beck and call giving them pause. If cast while you are not in combat, this jutsu lasts for 1 hour. For that duration, you make your next initiative roll at advantage. If cast while in combat, this jutsu's duration becomes Concentration, Up to 1 Minute, and creatures that target you with an attack or jutsu treat you as if you are in half cover. If the terrain is not natural and instead industrial such as a concrete hallway, steel floors, or anything similar, a creature makes a Wisdom (Illusions) check vs your Genjutsu Save DC at advantage, gaining immunity to this jutsu for the duration.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. When casted at B-Rank this jutsu no longer requires concentration.</p><p>\_</p>"
