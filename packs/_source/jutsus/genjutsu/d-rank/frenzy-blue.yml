name: Frenzy Blue
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You collect and build illusionary chakra, attempting to inflict a fit of depressing madness causing your eyes
      to glow blue.</p><p>Select one creature you are aware of, that can hear you within range, forcing them to make a
      Wisdom saving throw</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming
      immune to further castings of this jutsu for the next 10 minutes.</p><p>Success: Affected creature is able to
      resist this jutsu's effects.</p><p>Failure: If the affected creature would make a saving throw for the duration,
      on a failed save, they after suffering the triggering jutsu's effects, they fall prone and have their movement
      speed reduced by half, until the end of their next turn. Creatures remake their saving throw against this jutsu,
      at the end of each of their turns.</p><p>Critical Failure: Same as failure, but their speed is instead reduced to
      0.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and
      the number of creatures you can target by +1.</p>
