name: Frenzy Cyan
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You collect and build illusionary chakra, attempting to inflict a fit of unstable madness meant to break the
      minds of creatures in the affected areas, as their eyes flash a cyan color.</p><p>Select one creature you are
      aware of, that can hear you within range, forcing them to make a Wisdom saving throw</p><p>Critical Success:
      Affected creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu for the
      next 10 minutes.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: If the
      affected creature attempts to take an action or bonus action, it must make a Wisdom ability check vs a DC 13. On a
      failure, they stand still laughing manically, wasting the attempted action. On a success, they can take their
      actions as normal. This effect ends at the end of the affected creatures turn.</p><p>Critical Failure: Same as
      failure, but the ability check DC is increased to 16.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and the size of the cube by 5 feet.</p>
