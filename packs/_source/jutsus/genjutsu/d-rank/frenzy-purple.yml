img: GenjutsuSymbol.png
system:
  description:
    value: >-
      <p>You collect and build illusionary chakra,,attempting to touch the madness building deep in the,psyche of your
      foes causing their eyes to glow purple. Select one creature you are aware of, that can hear you within range,
      forcing them to make a Wisdom saving throw.</p><p><strong>Critical Success:</strong> Affected creature is able to
      resist this jutsu's effect, becoming immune to further castings of this jutsu for the next 10
      minutes.</p><p><strong>Success:</strong> Affected creature is able to resist this jutsu's secondary
      effects.</p><p><strong>Failure:</strong> Affected creatures falls into a momentary madness. The next time they
      would cast a jutsu that deals damage, they must target a creature they consider an allied creature, before the end
      of their next turn.</p><p><strong>Critical Failure:</strong> Same as failure, but they also must cast a jutsu of
      at least C-Rank on their next turn if they have access to a jutsu of such rank. If they only have access to D-Rank
      jutsu, they instead cast one of these.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and the number of creatures you can target by +1.</p>
