name: Frenzy Silver
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You collect and build illusionary chakra, attempting to inflict a fit of twisted psychosis, causing your eyes to flash silver.</p><p>Select one creature you are aware of, that can hear you within range, forcing them to make a Wisdom saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu for the next 10 minutes.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: The affected creature finds it difficult to maintain focus on anything if they would take damage. When the target would take damage, for the duration, they automatically fail their\_ concentration check</p><p>Critical Failure: Same as failure, but when they lose concentration of a jutsu while under this jutsu's effects, they take 2d6 psychic damage, for each jutsu they lose concentration of.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1 and the critical failure damage by 1d6.</p>"
