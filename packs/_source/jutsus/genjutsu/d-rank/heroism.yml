system:
  description:
    value: >-
      <p>A willing creature you touch is imbued with heroic bravery. Until the genjutsu ends, the creature is immune to
      the fear condition and gains temporary hit points equal to twice your Genjutsu ability modifier at the start of
      each of its turns. When the Genjutsu ends, the target loses any remaining temporary hit points.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of
      creatures affected by this jutsu by 1.</p>
