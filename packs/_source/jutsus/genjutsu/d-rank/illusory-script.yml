name: Illusory Script
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You take a Chakra Seal and write upon it as you imbue your chakra into the parchment. For the duration, you and
      any creatures you designate when you cast the jutsu, can see the writing as it should be. To all others, the
      writing appears as if it were written in an unknown or foreign script that is unintelligible. Alternatively, you
      can cause the writing to appear to be an entirely different message, written in a different hand and language,
      though the language must be one you know. Should the jutsu be dispelled, the original script and the illusion both
      disappear. A creature with chakra sight or truesight can read the hidden message.</p>
    chat: ''
