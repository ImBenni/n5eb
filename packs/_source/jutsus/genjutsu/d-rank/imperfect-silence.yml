name: Imperfect Silence
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>Select a space you can see in a 60-foot radius. All creatures in and attempting to enter a 30-foot sphere
      centering on your selected space must succeed an Intelligence Saving throw.</p><p>Success: Affected creature is
      able to resist this Jutsu's effect being able to hear other creatures while within the spheres
      radius.</p><p>Failure: Affected creatures becomes deafened and unable to hear other creatures who are also inside
      the spheres radius. If an affected creature leaves the radius this jutsu's effect ends on them.</p><p>Critical
      Failure: Affected creatures become deafened for the duration. A deafened creature must remake their intelligence
      saving throw at the end of each of their turns to end this jutsu's effect on themselves.</p>
