name: Ineptitude
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You bend the minds of a target creature making them less capable than they once were. Select one creature that
      you can see within range. The target must succeed a Charisma saving throw.</p><p>Success: Affected creature is
      able to resist this Jutsu's effect.</p><p>Failure: Affected creature suffers a 1d6 penalty to attack
      rolls.</p><p>Critical Failure: Affected creatures suffers a 1d8 penalty to attack rolls.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If cast at B-Rank, increase
      the penalty by 1 die. If cast at S- Rank, increase the penalty by 2 dice.</p>
