name: Light Blindness
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You target a creature you can see in range and attempt to switch its brains\_ perception of light. The target creature must succeed an Intelligence Save. If this jutsu is cast on a creature who is not benefiting from Bright Light prior to this jutsu's casting, this jutsu gains the Unaware Keyword for the duration.</p><p>Success: Affected creature is able to resist this Jutsu's effect.</p><p>Failure: Affected creature treats Bright light as Dim light, and Dim light as total darkness for the duration.</p><p>Critical Failure: Affected creatures treat Bright Light as total darkness for the duration.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of targets by +1.</p>"
