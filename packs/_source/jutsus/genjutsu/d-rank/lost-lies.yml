name: Lost Lies
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You bind your chakra to a Chakra seal and mark an area. Your chakra radiates in a 15-foot cube centering on the
      chakra seal you placed. For the duration of this jutsu, creatures that start their turn, or enter the Chakra seals
      area for the first time must succeed a Charisma saving throw. On a failed save, the creature cannot speak a
      deliberate lie while in the radius, instead being unable to speak at all when they attempt to do so.</p>
