name: Lotus Anxious Petals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You grasp a hand full of poisonous Lotus petals, spreading them in a unique way. Select a space you can within
      range as you fill a 10-foot cube with a petal dance of revulsion. A creature who's failed this jutsu's save once
      before, cannot be affected again for 1 minute.</p><p>As they flutter in front of you, all creatures within range
      must make a Charisma saving throw to as the pollen begins to affect their emotional state.</p><p>Critical Success:
      Affected creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu until
      the end of the casters next turn.</p><p>Success: Affected creature is able to resist most of this jutsu's
      effects.</p><p>Failure: Affected creatures enters a state of panic. For the duration, creatures must spend its
      action to take the Dash action. At the end of an affected creatures turns, remake their saving throw, ending this
      effect on a success. If it cannot move or has a movement speed of 0, this jutsu immediately ends.</p><p>Critical
      Failure: Same as failure, but the target must also spend its bonus action to make an Athletics check vs a DC 15,
      to gain an additional +10 movement speed.</p>
