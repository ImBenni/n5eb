name: Lotus Bitter Petals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You grasp a hand full of poisonous Lotus petals, spreading them in a unique way. Select two points you can
      within range as you fill two, 5-foot radius's with a petal dance of bitterness. A creature who's failed this
      jutsu's save once before, cannot be affected again for 1 minute.</p><p>As they flutter, all creatures within range
      must make a Charisma saving throw to as the pollen begins to affect their emotional state.</p><p>Critical Success:
      Affected creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu until
      the end of the casters next turn.</p><p>Success: Affected creature is able to resist most of this jutsu's
      effects.</p><p>Failure: Affected creature enters a bitter state of mind as for the duration, if a creature allied
      to themselves, within their movement speed range would take damage from an attack, they must spend their reaction
      to interpose the attack, becoming the new target. At the end of an affected creatures turns, remake their saving
      throw, ending this effect on a success.</p><p>Critical Failure: Same as failure, but they gain an additional
      reaction which can only be used to interpose attacks targeting their allies.</p>
