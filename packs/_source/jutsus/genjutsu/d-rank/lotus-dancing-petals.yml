name: Lotus Dancing Petals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You grasp a hand full of poisonous Lotus petals, spreading them around yourself in a dance of despair. Once
      this jutsu is cast, you cannot cast it again until the end of your next turn.</p><p>As they flutter around you,
      all creatures within range must make a Charisma saving throw to realize they should hold their breath before
      inhaling the poisonous pollen.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect,
      becoming immune to further castings of this jutsu until the end of the casters next turn.</p><p>Success: Affected
      creature is able to resist most of this jutsu's effects, but still takes 2d6 poison damage.</p><p>Failure:
      Affected creature inhales a mass of poisonous petal pollen taking 3d6 poison damage and are begin to cough and
      retch in an attempt to remove the pollen from their breathing passages. Creatures who failed this save lose
      concentration of any Ninjutsu they are concentrating on for the duration. As an action on an affected creatures
      turn, they can make a Constitution check vs a DC 13. On a success, this jutsu's effects end.</p><p>Critical
      Failure: Same as failure, but if the target attempts the ability check to end its effects, all creatures who are
      currently unaffected by this jutsu, within 10 feet of the retching target must also make the DC 11 Constitution
      ability check. On a failure, they suffer the effects of this jutsu's failure. On a success, they suffer no
      effects.</p>
