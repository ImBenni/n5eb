name: Lotus Gloom Petals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You grasp a hand full of poisonous Lotus petals, throwing them in a straight line in a dance of gloom. A
      creature who's failed this jutsu's save once before, cannot be affected again for 1 minute.</p><p>As they flutter
      in front of you, all creatures within range must make a Charisma saving throw to as the pollen begins to affect
      their emotional state.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming
      immune to further castings of this jutsu until the end of the casters next turn.</p><p>Success: Affected creature
      is able to resist most of this jutsu's effects.</p><p>Failure: Affected creature enters a gloomy state of mind as
      for the duration, they cannot cast jutsu that would grant creatures other than itself a bonus to attack, damage,
      speed, skill or ability checks. If they are currently concentrating on such a jutsu, they lose concentration on
      it. Affected creatures can spend its Action to make a DC 13 Wisdom ability check to end this jutsu's effects on
      them.</p><p>Critical Failure: Same as failure, but this jutsu's duration is increased to 10 minutes.</p>
