name: Lotus Guilty Petals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You grasp a hand full of poisonous Lotus petals, spreading them in a unique way by throwing them against a
      creature you can see within range.</p><p>As they flutter, the target creature must make a Charisma saving throw to
      as the pollen begins to affect their emotional state.</p><p>Critical Success: Affected creature is able to resist
      this jutsu's effect, becoming immune to further castings of this jutsu until the end of the casters next
      turn.</p><p>Success: Affected creature is able to resist most of this jutsu's effects.</p><p>Failure: Affected
      creature enters a guilty state of self-loathing. For the duration, creatures cannot lie and must answer any
      questions as truthfully as possibly. If asked a question, it spends it Action answering the first question it is
      asked. Creatures can only ask questions on their turn. This jutsu then ends.</p><p>Critical Failure: Same as
      failure, but they also must spend their bonus action answering the second question asked.</p>
