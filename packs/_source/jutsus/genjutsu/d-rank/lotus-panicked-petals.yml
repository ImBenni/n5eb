name: Lotus Panicked Petals
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You grasp a hand full of poisonous Lotus petals, spreading them in a unique way throwing them against a
      creature you can see attempting to interrupt the casting of another creatures jutsu. This jutsu's casting is
      treated as an attempt to Interrupt a creatures jutsu.</p><p>As they flutter, select creature in range must make a
      Charisma saving throw to as the pollen begins to affect their emotional state.</p><p>Critical Success: Affected
      creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu until the end of
      the casters next turn.</p><p>Success: Affected creature is able to resist most of this jutsu's effects, but still
      increases the cost of the jutsu they cast by +3</p><p>Failure: Affected creature increases the cost of the jutsu
      they cast by +6.</p><p>Critical Failure: Affected creature increases the cost of the jutsu they cast by
      +9.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      and the cost of the affected creatures jutsu by +2.</p>
