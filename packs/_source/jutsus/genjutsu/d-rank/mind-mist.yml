name: Mind Mist
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You release a mist formed of illusory chakra as you suppress the targets mental combat potential. One creature
      of your choice within range must succeed a Wisdom saving throw.</p><p>Success: Affected creature is able to resist
      this jutsu's effects.</p><p>Failure: Affected creature becomes poisoned and reduces the damage they deal by 1d6
      for the duration.</p><p>Critical Failure: Affected creature becomes poisoned and reduces the damage they deal by
      1d8 for the duration.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3 and the damage reduction by 1d6 or 1d8.</p>
