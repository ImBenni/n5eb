name: Night Bitter Feelings
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a potent but powerful sense of spite or hatred in the form of illusionary chakra, and impose it on
      a hostile creature you can see in range who has just gained a rank of either a Mental or Sensory condition, that
      can have more than 1 rank.</p><p>The target creature must make an Intelligence saving throw.</p><p>Critical
      Success: Affected creature is able to resist this jutsu's effect, becoming immune to this jutsu's secondary
      effects until the end of your next turn.</p><p>Success: Affected creature is able to resist this jutsu's negative
      effects.</p><p>Failure: Affected creatures gains 1 additional rank of the same condition.</p><p>Critical Failure:
      Same as failure, but the target instead gains 2 additional ranks of the same condition.</p>
