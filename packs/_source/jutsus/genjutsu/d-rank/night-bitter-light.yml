name: Night Bitter Light
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a potent but powerful sense of friendliness or comradery in the form of illusionary chakra, and
      impose it on a hostile creature you can see in range who is casting a jutsu with range.</p><p>The target creature
      must make an Intelligence saving throw. This counts as Interrupting this jutsu's casting.</p><p>Critical Success:
      Affected creature is able to resist this jutsu's effect, becoming immune to this jutsu's secondary effects until
      the end of your next turn.</p><p>Success: Affected creature is able to resist this jutsu's negative
      effects.</p><p>Failure: Affected creatures must select a new target, even if this means they would have to select
      a creature allied to them. They cannot select the same creature they previously did to trigger this jutsu's
      reaction.</p><p>Critical Failure: Same as failure, the target must now select a creature allied to themselves,
      even if a creature hostile to it is also in range.</p>
