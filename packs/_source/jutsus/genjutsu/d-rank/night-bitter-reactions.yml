system:
  description:
    value: "<p>You manifest a potent but powerful sense of sluggishness in the form of illusionary chakra, and impose it on a target creature you can see in range who has taken damage. This reactions effects takes place before the target creatures reaction-based effects, if any.</p><p>The target creature must make an Intelligence saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming immune to this jutsu's effects until the end of your next turn.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creatures thought speed is reduced. They become unable to take reactions until the end of the current turn.</p><p>Critical Failure: Same as failure, but they cannot takereactions until\_ the beginning of their next turn.</p>"
