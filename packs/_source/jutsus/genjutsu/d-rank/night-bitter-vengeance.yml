name: Night Bitter Vengeance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a potent but powerful sense of hyper aggressiveness in the form of illusionary chakra, and impose
      it on an allied creature you can see in range who has taken damage, excluding yourself.</p><p>They gain a boost to
      their aggressiveness, increasing their bonus to attack and damage rolls by 1d6 until the end of their next
      turn.</p><p>At the conclusion of their next turn though, they suffer a bit of psychosis, forcing them to make an
      Intelligence saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect,
      becoming immune to this jutsu's secondary effects until the end of your next turn.</p><p>Success: Affected
      creature is able to resist this jutsu's negative effects.</p><p>Failure: Affected creature suffers a small but
      painful feedback, taking 2d6 psychic damage.</p><p>Critical Failure: Same as failure, but they also gain a 1d6
      penalty to their attack and damage rolls until the end of their next turn.</p>
