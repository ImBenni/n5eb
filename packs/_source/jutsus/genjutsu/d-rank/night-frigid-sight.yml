name: Night Frigid Sight
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest an aura of chilling illusionary chakra centered on you affecting all creatures of your choice
      within range forcing them to make an Intelligence saving throw. If the target has Chakra sight, they do not gain
      advantage on this saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect,
      becoming immune to this jutsu's effects for the next 10 minutes.</p><p>Success: Affected creature is able to
      resist this jutsu's effects.</p><p>Failure: If the affected creature has Chakra sight or Darkvision, they gain 2
      ranks of Dazzled while inside of the radius of this jutsu so long as they are gaining the benefits of said special
      senses, as the illusionary chakra overwhelms their visual senses.</p><p>Critical Failure: Same as failure, but
      affected creatures also lose Chakra sight or Darkvision for the duration of this jutsu.</p>
