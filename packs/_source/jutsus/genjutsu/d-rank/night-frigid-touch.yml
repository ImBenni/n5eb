name: Night Frigid Touch
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You manifest a beam of chilling illusionary chakra from within yourself, affecting all creatures of your choice in a 5-foot wide, 30-foot line, originating from you within range forcing them to make an Intelligence saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming immune to this jutsu's effects for the next 10 minutes.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature is overwhelmed by the illusionary chakra, as they find it difficult to feel and thus cannot distinguish pain from healing. The next Genjutsu that would affect them for the duration, gains the Unaware keyword, this jutsu then ends.</p><p>Critical Failure: Same as failure, but they also take 3d6 psychic damage at the beginning of each of their turns for the duration. A creature who critically failed this jutsu's saving throw remakes its save at the end of each of its turns, ending this jutsu's critical\_ failure damage on a success.</p>"
