name: Night Frigid Words
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a wave of chilling illusionary chakra from your words alone, affecting all creatures of your
      choice within range forcing them to make an Intelligence saving throw.</p><p>Critical Success: Affected creature
      is able to resist this jutsu's effect, becoming immune to this jutsu's effects for the next 10
      minutes.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature
      is overwhelmed by the illusionary chakra, as they find it difficult to hear and thus are distracted. They become
      Deafened to all sound not originating from you.</p><p>Critical Failure: Same as failure, but affected creatures
      also gain a 1d4 penalty to all saving throws against Genjutsu with the Auditory keyword for the duration.</p>
