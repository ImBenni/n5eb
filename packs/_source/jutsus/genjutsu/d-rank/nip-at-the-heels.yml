name: Nip At The Heels
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You slam your hands onto the ground creating an illusory puff of smoke as a pack of wild dogs that look
      aggressive rush in and nip at one creature you can see within range, which must make an Intelligence saving throw.
      A target that is at least 10 feet off the ground (in a tree, flying, and so forth) or has any senses, features or
      active jutsu that would give it advantage to its Wisdom (Perception), has advantage on the saving
      throw.</p><p>Success: Affected creature is able to resist this Jutsu's effect.</p><p>Failure: Affected creature
      has disadvantage on Attack rolls and skill checks against one other creature of your choice as it becomes
      distracted by the attacking dogs. At the end of each of its turns, the target remakes its saving throw, ending the
      effect on itself on a successful save.</p><p>Critical Failure: Same as Failure and the affected creature(s) who
      would cast a jutsu with the Hand Sign (HS) or Mobility (M) components would take 2d8 psychic damage as the dogs
      bite into them.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and the number of creatures you can target by +1.</p>
