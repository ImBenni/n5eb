name: Painful Vision
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You target one creature you can see within range as you begin to intensify their\_ ensitivity to light. The target creature must succeed a Wisdom saving throw.</p><p>Critical Success: Affected creature is able to resist this Jutsu's effect.</p><p>Success: Affected creature is able to resist most of this jutsu's effects but gains sunlight sensitivity, causing them to suffers a -2 penalty to Attack rolls while in bright light until the end of their next turn.</p><p>Failure: At the beginning of an affected creatures turn that they take 2d8 + your Genjutsu ability modifier in psychic damage. If they are in dim light, they instead take 2d6 + your Genjutsu ability modifier in psychic damage. At the end of each of the affected creatures turns they remake the saving throw, ending this jutsu on a success.</p><p>Critical Failure: At the beginning of an affected creatures turn that they take 3d8 + your Genjutsu ability modifier in psychic damage. If they are in dim light, they instead take 3d6 + your Genjutsu ability modifier in psychic damage. At the end of each of the\_ affected creatures turns they remake the saving throw, ending this jutsu on a success. If they are in bright light, they remake their saving throw at disadvantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 1d8 or 1d6, and the number of creatures you can target by +1.</p>"
