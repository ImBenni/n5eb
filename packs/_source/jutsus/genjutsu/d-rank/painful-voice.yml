name: Painful Voice
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You cup your hands and scream through the opening on the other end. All creatures that can hear you in a
      30-foot cone originating from you must succeed a Wisdom Saving throw.</p><p>Critical Success: Affected creature is
      able to resist this Jutsu's effect.</p><p>Success: Affected creature is able to resist most of this jutsu's
      effects but becomes deafened until the end of their next turn.</p><p>Failure: Affected creature takes 4d6 psychic
      damage.</p><p>Critical Failure: Affected creature takes 4d8+Genjutsu ability modifier psychic damage.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by
      1d6 or 1d8 and the range by 5 feet.</p>
