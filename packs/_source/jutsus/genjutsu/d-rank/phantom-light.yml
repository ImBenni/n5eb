name: Phantom Light
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You touch a single object that measure less than 10 feet in every dimension. Until this Jutsu ends, you and up
      to 3 other creatures can see Bright light originating from that object in a 20-foot radius, and dim light for
      another 20 feet. The light can be colored as you like. Only you and the selected creatures can gain benefit from
      this artificial light source. You can use your bonus action to dismiss this jutsu.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the number of objects you can affect
      with this jutsu by +1.</p>
