name: Psionics Confusion!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attempt to shatter the string of thought a creature has, instilling severe confusion while also causing
      them mental pain through inconsistency. Select one target within range. They must make a Wisdom saving
      throw.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature
      gains 1 rank of Confusion.</p><p>Critical Failure: Affected creature gains 1 rank of Confusion, and the first
      check made to end the condition is increased by 2.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.</p>
