system:
  description:
    value: >-
      <p>You manifest blades formed of illusionary chakra, that rend through a creatures mental defenses. Make a ranged
      Genjutsu attack dealing 4d8 psychic damage. If this jutsu is cast while within 10 feet of the target creature,
      increase the critical threat range of this attack by +1.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3, the damage by 1d8. If this jutsu is cast at B-Rank, increase
      the critical threat range by +1. If this jutsu is cast at S- Rank, increase the critical threat range by +2.</p>
