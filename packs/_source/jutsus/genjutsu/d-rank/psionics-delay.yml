system:
  description:
    value: >-
      <p>You manifest a delayed sound that remains humming for a few moments before vanishing. You then select one
      creature whom you can see within range. At the end of your next turn this jutsu takes effect. If the target
      creature has cast a jutsu of any type on their next turn, they take 3d12 psychic damage.<br />At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d12.</p>
