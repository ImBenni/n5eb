name: Psionics Drain!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attempt to drain the mental power of a hostile creature you can see, making it more difficult for them to
      think clearly in the moment.</p><p>Select one hostile creature you can see within range, forcing them to make an
      Intelligence saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect,
      becoming immune to further castings of this jutsu for the next 10 minutes.</p><p>Success: Affected creature is
      able to resist this jutsu's effects.</p><p>Failure: The hostile creature takes 3d6 psychic damage, and suffers a
      1d4 penalty on all Intelligence based attack rolls and skill checks for the next minute.</p><p>Critical Failure:
      Same as Failure, but damage is increased to 5d8.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the damage by 1d6 and 1d8, respectively.</p>
