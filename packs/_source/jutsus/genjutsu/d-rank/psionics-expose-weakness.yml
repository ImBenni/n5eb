system:
  description:
    value: >-
      <p>You attempt to expose the weakness of your foes by making them unconsciously expose themselves. Select one
      creature you can see within range, forcing them to make an Intelligence Saving throw.</p><p>Success: Affected
      creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature immediately begins to move in
      unnatural and clumsy ways. Attacks targeting the creature gains a 1d4 bonus to hit, once per turn, per
      creature.</p><p>Critical Failure: Same as failure, but they also reduce their AC by 1, for the duration.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number
      of creatures you can target by +1.</p>
