name: Psionics False Future
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attempt to force a vision of a false future onto a target, causing them to make a poorly informed
      decision.</p><p>Select one hostile creature you can see within range, forcing them to make an Intelligence saving
      throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming immune to further
      castings of this jutsu for the next 10 minutes.</p><p>Success: Affected creature is able to resist this jutsu's
      effects.</p><p>Failure: The hostile creature must spend its reaction, to move no less than 30 feet, if it can,
      into a space it would move into if its turn were right now.</p><p>Critical Failure: Same as failure, but its
      movement speed it reduced by half after its movement ends, until the end of its next turn.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures
      this can target by +1.</p>
