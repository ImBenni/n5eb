name: Psionics Fortress
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You conjure a suit of illusionary armor. This armor grants you a +1 bonus to your AC. If you would be the
      target of a Genjutsu attack, you instead treat this bonus as a +2.</p><p>If a creature manages to score a hit with
      a melee weapon or taijutsu attack against you, you force them to make an Intelligence saving throw as you send
      back a psychic feedback.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure:
      Affected creature immediately falls prone and drops their weapon, if any. This does not prevent damage. This Jutsu
      then ends.</p><p>Critical Failure: Same as failure, but their movement speed is also reduced to 0, until the end
      of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3. If this jutsu is cast at B-Rank, you gain 5 Psychic Damage reduction for this jutsu's duration.
      If this jutsu is cast at S-Rank, you gain 10 Psychic Damage reduction for this jutsu's duration.</p>
