name: Psionics Hostile Transfer
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attempt to transfer the negative mental conditions of an allies creature to a hostile one. Select one
      allied creature you can see within range who has ranks of a Mental condition. When you do, select one hostile
      creature you can see within range, forcing them to make an Intelligence saving throw.</p><p>Success: Affected
      creature is able to resist this jutsu's effects.</p><p>Failure: The Hostile creature gains one of the Mental
      conditions the allied creature has, (your choice)</p><p>Critical Failure: The hostile creature gains all Mental
      conditions the allied creature has, and the allied creature loses each mental condition the hostile creature
      gains.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      and the number of hostile creatures you can target by +1.</p>
