name: Psionics Meditate!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You steady your thoughts, finding balance and inner peace in the moment of battle. For the duration, you gain a
      1d4 bonus to Genjutsu attacks and deal an additional 1d6 psychic damage with Genjutsu you cast.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast
      at B-Rank, increase the to hit and damage bonus by 1 die step (1d6, 1d8). If this jutsu is cast at S- Rank,
      increase the to hit and damage bonus by 1 die step (1d8, 1d10).</p>
