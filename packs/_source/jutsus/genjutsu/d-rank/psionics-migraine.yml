name: Psionics Migraine!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You outstretch your hand and select a target within range. The target creature must make an Intelligence saving
      throw. If their Intelligence ability score is 12 or less, they make this save at disadvantage.</p><p>Success:
      Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature sees their body swell
      and experience an extraordinary amount of pain as their head feels like it will explode. They take 4d4 psychic
      damage and until the end of their next turn, they suffer a -10 penalty to their speed.</p><p>Critical Failure:
      Affected creature sees their body swell and experience an extraordinary amount of pain as their head feels like it
      will explode. They take 6d4 psychic damage and until the end of their next turn, they suffer a -20 penalty to
      their speed and the next jutsu they cast and concentration cost they pay, cost is doubled, before the end of their
      next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu
      by 3, the damage by 1d4 and the number of creatures they can target by +1.</p>
