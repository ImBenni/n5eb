name: Psionics Pulse
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You manifest a pulse of thought, meant to inflict pain and disorient everyone near you.</p><p>All creatures of
      your choice, within range must make an Intelligence saving throw.</p><p>Success: Affected creature is able to
      resist this jutsu's effects.</p><p>Failure: Affected creature takes 3d4 psychic damage and is forced to move back
      10 feet away from you.</p><p>Critical Failure: Affected creature takes 5d4 psychic damage and is forced to move
      back 25 feet away from you.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3, damage by 1d4 and radius by 5 feet.</p>
