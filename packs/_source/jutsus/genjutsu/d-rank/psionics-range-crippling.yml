name: Psionics Range Crippling
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You attempt to reduce a creatures effective combat range by clouding their vision and imposing visual
      limitations upon them</p><p>Select one hostile creature you can see within range, forcing them to make an
      Intelligence saving throw.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure:
      Affected creature gains 2 ranks of Dazzled for the duration. Ranks of Dazzled inflicted by this jutsu does not go
      away at the end of the affected creatures turns, instead only going away when this jutsu ends</p><p>Critical
      Failure: Same as failure, but also if the creature would cast a jutsu or make an attack with a range, greater than
      15 feet, reduce the range of the jutsu or attack by 10 feet.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures this can target by +1 and the
      range reduction of a critical failure by 5 feet.</p>
