name: Psionics Shared Thoughts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You attempt to see into and share the<br />thoughts of a creature you can see, seeing what they are<br />thinking or planning.</p><p>Select one creature you can see within range, forcing them to make an Intelligence saving throw.</p><p>Critical Success: Affected creature is able to resist this jutsu's effect, becoming immune to further castings of this jutsu for the next 10 minutes. Additionally, they become aware someone tried to peer into their mind.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: The hostile creature begins to unknowingly share their thoughts with you. At the beginning of each of its turns, the DM informs you of the jutsu they are casting, actions they are taking or the thoughts it has during its turn only. If the target would cast a jutsu or make an attack, you gain the benefit of a successful Read the Enemy reaction. At the end of each of the targets turns, it remakes it saving throw, while still unaware it is sharing thoughts with you.\_</p><p>Critical Failure: Same as Failure, but the target does not get to remake its saves until it becomes aware it is under the effects of this Genjutsu.</p>"
    chat: ''
