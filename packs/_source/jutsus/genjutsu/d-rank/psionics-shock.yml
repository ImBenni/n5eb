system:
  description:
    value: >-
      <p>You release a powerful jolt of psionic chakra meant to overwhelm the sensory receptors of a creature. One
      creature of your choice within range must succeed an Intelligence saving throw.</p><p>Success: Affected creature
      is able to resist this jutsu's effects.</p><p>Failure: Affected creature takes 6d4 psychic damage. This damage
      ignores Resistance and treats Immunity as resistance.</p><p>Critical Failure: Affected creature takes 6d6 psychic
      damage and becomes Dazed. This damage ignores Damage Reduction and ignores Resistance and treats Immunity as
      resistance.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu
      by 3 and the damage by 1d4 or 1d6 or the number of creatures you can target by +1.</p>
