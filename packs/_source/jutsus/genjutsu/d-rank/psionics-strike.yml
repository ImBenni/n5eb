name: Psionics Strike!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You coat the hands and feet of a creature you touch in psionic energy. Making each strike harm both the body
      and mind simultaneously. When they would deal damage with an unarmed attack, they deal an additional 1d10 psychic
      damage, once per turn. If they would score a critical hit while gaining the benefits of this jutsu, you can choose
      to convert all damage dealt with the attack into psychic damage.<br />At Higher Ranks: For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d10.</p>
    chat: ''
