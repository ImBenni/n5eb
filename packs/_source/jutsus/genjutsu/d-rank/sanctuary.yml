name: Sanctuary
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You weave chakra creating a hazy ward of illusions protecting a creature within range against attack. Until
      this jutsu ends, any creature who targets the warded creature with an attack or a jutsu must first succeed a
      Wisdom saving throw. On a failed save, the creature must choose a new target or lose the attack or jutsu. This
      ward does not protect against area effects, such as a Fire Release: Fireball or any similar jutsu. If the warded
      creature makes an attack or casts a jutsu that affects a creature, this jutsu ends.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the number of creatures you
      target with this jutsu by +1.</p>
    chat: ''
