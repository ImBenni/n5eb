name: Sealing Art Delusions
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You infuse chakra into chakra seals as you attempt to mark a creature you can see in range with the seal of the desires.</p><p>The target creature must succeed a Charisma Saving throw. On a failed save, the target is marked with the seal of desires as they begin to see flashes and visions of the things they want most in life causing them to freeze in place, focusing on the things before them.</p><p>For the duration, a creature who is marked with this seal, at the beginning of each of their turns remake the saving throw, being stunned until the end of their turn on a failed save. On a successful save, they resist the seals effects, ending this jutsu. If the target would take damage, they repeat the saving throw to end this jutsu. Another creature who can touch the affected target, can attempt a Wisdom (Illusions) check vs your Genjutsu save DC to forcefully end this jutsu on them</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If Cast at B-Rank, increase the number of creatures you target with this jutsu to 2. If Cast at S-Rank, increase the number of creatures you target with this jutsu to 3.\_</p>"
