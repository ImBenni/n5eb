name: Sealing Art Sweet Dreams
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You infuse chakra into chakra seals as you attempt to mark a willing creature you can see in range with the seal of the rest. For the duration, as a bonus action you can force the creature to experience a hyper accelerated sleep pattern. The target creature gains some of the benefit of a short rest allowing them to spend hit die to recover hit points. The affected creature does not regain any features or resources that would reset or be recovered on a short rest.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the number of creatures you target with this jutsu by +1.</p><p>\_</p>"
