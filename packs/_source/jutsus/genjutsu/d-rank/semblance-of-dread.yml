name: Semblance of Dread
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You morph your visage into that of a faceless monstrosity known as
      Nyarlathotep. This visage can be of your own description as this
      monstrosity has no known singular description. For the duration, any
      creature within 20 feet of you becomes unable to willingly move closer to
      you unless it makes a successful Wisdom saving throw at the start of its
      turn. Constructs and undead are immune to this effect. Additionally, you
      gain advantage on saving throws to resist the fear condition.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3 and the radius by 5 feet.</p>
