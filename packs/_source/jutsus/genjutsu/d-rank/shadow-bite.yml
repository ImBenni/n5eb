name: Shadow Bite
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You create a single momentary needle of darkness that erupts upwards from a creatures shadow that you can see
      within range. Make a ranged Genjutsu attack. On a hit you deal psychic damage equal to 4d6 + Your Genjutsu ability
      modifier and reducing their speed by 10 until the start of your next turn. A creature who's speed is reduced in
      this way cannot benefit from additional speed for the duration of their speed reduction.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the number of creatures you
      can target by +1, the damage by 1d6 and the speed reduction by -5.</p>
