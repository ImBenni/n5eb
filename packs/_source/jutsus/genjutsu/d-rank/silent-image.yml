name: Silent Image
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 15-
      foot cube. The image appears at a spot within range and lasts for the duration. The image is purely visual; it
      isn't accompanied by sound, smell, or other sensory effects. You can use your action to cause the image to move to
      any spot within range. As the image changes location, you can alter its appearance so that its movements appear
      natural for the image. For example, if you create an image of a creature and move it, you can alter the image so
      that it appears to be walking. Physical interaction with the image reveals it to be an illusion, because things
      can pass through it, causing the Genjutsu to immediately end.</p>
    chat: ''
  source:
