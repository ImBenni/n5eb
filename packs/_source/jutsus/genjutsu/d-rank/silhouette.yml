system:
  description:
    value: >-
      <p>You create a shadow play against a screen or wall. The surface can encompass up to 100 square feet and does not
      have a singular point of origin, instead making use of all the shadows that mundane objects and structures give
      off. The number of creatures that can see the shadow play equals your Genjutsu ability modifier. The shadowy
      figures make no sound but they can dance, run, move, kiss, fight, and so forth. Most of the figures you can
      creature are based on create you may have seen before.</p>
