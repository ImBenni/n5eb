name: Soft Spoken Song
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You begin to hum a tune or speak a phrase of your choice. When you do, all willing creatures within 30 feet of
      you begin to feel revitalized by your melody. </p><p>For the duration, you do not spend chakra to maintain this
      jutsu, instead you must spend a bonus action on subsequent turns to maintain it. </p><p>Creatures who begin their
      turns within range, gain advantage on Saving throws to resist Genjutsu with the Auditory Keyword, regardless of
      any other keywords the Jutsu may have.</p><p>Additionally, Genjutsu with the Auditory and Unaware Keywords, lose
      the unaware keyword when affecting creatures benefiting from this jutsu.</p>
