name: Song of the Ancient
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You begin to hum or sing an erratic tune in an unintelligible language designed to send those who hear it into
      a short bout of madness. When you do, all creatures within a 20-foot radius of you begin to experience bouts of
      madness. For the duration, you do not spend chakra to maintain this jutsu, instead you must spend a bonus action
      on subsequent turns to maintain it. Creatures who begin their turns within range must succeed an intelligence
      saving throw.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected
      creature gains the madness condition until the end of their next turn.</p><p>Critical Failure: Affected creature
      gains the madness condition for 1d4 of their turns.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the radius by 5.</p>
