system:
  description:
    value: >-
      <p>You hum or sing an erratic tune in an unintelligible language, sending creatures within a 20-foot radius into
      bouts of madness. For the duration, you do not spend chakra to maintain this jutsu, but you must spend a bonus
      action on later turns to maintain it.</p><p>Creatures that begin their turns within range must make an
      Intelligence saving throw. On a failure, the creature gains the madness condition until the end of its next turn.
      On a critical failure, the creature gains madness for 1d4 of its turns.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost by 3 and the radius by 5 feet.</p>
