name: Startle
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You weave together an image designed to startle and scare a creature but for a moment. Select one creature you
      can see withing range, target must succeed a Charisma saving throw. A creature immune to being frightened is
      immune to this jutsu's effects.</p><p>Success: Affected creature is able to resist this jutsu's
      effects.</p><p>Failure: Affected creature is spooked ending concentration on one jutsu it is concentrating on with
      the highest base cost.</p><p>Critical Failure: Affected creature is spooked ending concentration on all jutsu it
      is concentrating on.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3 and the number of creatures you can target by +1.</p>
