name: Thought Rejection
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You take a snapshot of the pain you feel, and attempt to inject it into the mind of a creature within range.
      Select a point you can see within range, where you send your psychic projection, which then explodes affecting all
      creatures within 10 feet of the chosen point. All affected creatures must make a Wisdom saving
      throw.</p><p>Success: Affected creature is able to resist this jutsu's effects.</p><p>Failure: Affected creature
      takes 4d6 psychic damage.</p><p>Critical Failure: Affected creature gains 1 rank of Dazzled and takes 4d6 psychic
      damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3 and the damage by 1d6.</p>
