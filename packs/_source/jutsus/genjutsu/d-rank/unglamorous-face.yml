name: Unglamorous Face
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>A willing creature you touch, has its face twisted until it becomes as mundane as possible. So much so that
      they become absolutely un-unique and incapable of standing out.For the duration, they become unrecognizable and
      become unable to be pointed out in a crowd. A creatureattempting to see through this illusion must succeed a
      Wisdom (Insight) or Wisdom (Illusions) check vs your Genjutsu Save DC. On a success, they become immune to this
      genjutsu's effects for the next hour.</p>
