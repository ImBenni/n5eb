name: Weapons of Darkness
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You conjure daggers made of darkness and fear. When they strike a target creature it instills them with a
      terrible sense of dread. The blade is similar in size and shape to a Kunai, and it lasts for the Duration. These
      daggers are simply illusions but feel extremely real if they strike a creature. You can throw them up to 60 feet
      before they dissipate. You can spend your action to Make a melee or ranged Genjutsu attack against a target
      creature in range. On a hit, the target creature takes 5d4 Psychic damage. If you throw the illusionary dagger, it
      dissolves and reforms in your hand after colliding with a creature or surface.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is Cast at C-Rank or
      higher, increase the damage by 1d4. If this jutsu is cast at B-Rank, you can make two attacks instead of one. If
      this jutsu is cast at A-Rank or higher, you may add your Genjutsu ability modifier to the damage dealt. If this
      jutsu is cast at S-Rank, you can make three attacks instead of one.</p>
    chat: ''
