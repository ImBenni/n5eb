name: Clone Technique
type: spell
_id: n5ebCloneTech001
img: systems/n5eb/assets/content/items/shadow-clone.webp
system:
  description:
    value: >-
      <p>The most basic clone technique that is taught in most academies across the ninja world. By using this
      technique, the user creates 2 duplicates of themselves. The clones stay near you and disappear when attacked. The
      clones appear by the user's side and cannot stray more than 5 feet away from the original. The duplicates look
      like the user and are perfect duplicates, but they cannot speak or perform any action that requires having a body,
      like lifting an object or attacking a creature. Once touched by another creature or object or violently shaken, it
      disappears in a puff of smoke. </p><p>After Activation, as a reaction you make a creature attacking you roll an
      additional 1d6, subtracting the result from their total attack roll. Doing this causes one of your clones to be
      struck regardless of the attack missing or hitting you. After the duration or both of your clones have been
      struck, this jutsu immediately ends. Any creature using a Jutsu with the Sensory Keyword or that can see through
      Genjutsu are not affected by this jutsu. </p><p><strong>At Higher Levels</strong>: This Jutsu's proficiency
      increases as you increase in level. When you reach 5th level create 3 duplicates, 11th level (4 duplicates), 17th
      level (5 duplicates)</p>
