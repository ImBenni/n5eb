name: Distant Echo
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: "<p>You create a sound within range that lasts for the duration. The sound also ends if you dismiss it as an action or use this jutsu again. The sound you create can be any volume, ranging from a whisper to a scream. It can be your voice or another sound you have heard before such as another person's voice, a lion's roar or a shattering vase. The sound continues unabated throughout the duration or you can make discrete sounds at different times before the jutsu ends.\_</p><p>At Higher Levels: This Jutsu's proficiency increases as you increase in level. At 5th level select 1 additional location for the sound to originate. 11th level, 2 additional locations, 17th level, 3 additional locations.</p>"
    chat: ''
