name: Doubt
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>For the duration, you have advantage on all Intimidation checks directed at one creature you touch that you are
      interacting with. When the jutsu ends the creature may realize that you used a jutsu to influence its mood if it
      doesn't fit your previous relationship. A creature prone to violence might attack you if they realize this.
      Another creature may seek retribution in other ways (At the DM's discretion), depending on the nature of your
      interactions.</p>
