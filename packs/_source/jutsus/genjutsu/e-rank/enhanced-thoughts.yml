name: Enhanced Thoughts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You focus chakra toward different parts of your mind to enhance your ability to process information. When you
      fail a skill check using a mental ability score (Intelligence or Wisdom), you can add+2 to that failed check,
      potentially turning a failure, into a success. Once you cast this jutsu, you cannot do so again for 10
      minutes</p><p>At Higher Levels: This Jutsu's skill reinforcement increases as you increase in level. This bonus
      increases by +2 at 5th Level (+4), 11th level (+6), 17th level (+8)</p>
