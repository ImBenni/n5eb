name: Feather Burst
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>A simple illusion of sight. When hit by an attack, the opponent sees you burst into black raven feathers
      reforming at your current location. When hit by a melee attack, roll 1d8 reducing damage taken by the result and
      move 10 feet away. This movement does not provoke attacks of opportunity.</p><p>At Higher Levels: This Jutsu's
      proficiency increases as you increase in level rolling 1d8 when you reach 5th level (2d8), 11th level (3d8), 17th
      level (4d8)</p>
