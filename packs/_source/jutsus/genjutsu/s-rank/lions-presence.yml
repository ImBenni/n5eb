name: Lions Presence
type: spell
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You exude the courage of the infallible kings of the jungle.</p><p>All hostile creatures within range must
      succeed a charisma saving throw. On a failed save, for the duration they gain the following while within range of
      you;</p><p>• Affected creatures cannot score critical hits.</p><p>• Affected creatures have a -5 penalty to attack
      rolls, skill checks and ability checks.</p><p>• Affected creatures cannot maintain concentration on more than 1
      Jutsu.</p><p>• Affected creature loses resistance and immunity to the Fear condition.</p><p>• Affected creature
      becomes vulnerable to psychic damage.</p>
