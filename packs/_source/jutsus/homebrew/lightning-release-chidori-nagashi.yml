system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must know the <strong>Lightning Style: Chidori
      Jutsu.</strong></p><p>You release the Chidori in every direction, this electrical current flows from the user's
      entire body allowing them to affect multiple enemies. Creatures within a 15ft radius must succeed on a
      Constitution Saving Throw or take 2d10 Lightning Damage and Become Restrained on a Failed save or Half as much on
      a Successful save with no other effects.</p><p><strong>At Higher Ranks:</strong> When upcasted to any rank above
      C-Rank, Up the cost of this Jutsu by +3 and damage by +2d8.</p>
