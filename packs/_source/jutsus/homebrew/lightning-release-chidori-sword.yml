      lethality of your weapon; while this is active, any weapon or Bukijutsu attack made with the imbued sword will
      have a +2 to hit and Deal an additional damage die.</p><p><strong>At Higher Ranks:</strong> Increase the Cost of
      this Jutsu by +3 and the Additional Damage Die by One, and the Hit Bonus by +2 for each rank cast above
      C-Rank.</p>
