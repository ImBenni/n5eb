folder: hcs8fQjM9WJyQRdJ
name: 'Rasengan: Spiralling Vortex'
type: spell
img: Spiralling.webp
system:
  description:
    value: "<p><strong>Description:</strong> As part of the requirements for casting this jutsu you must have <strong>Rasengan</strong> on your jutsu known list.<br />\_</p><p>You collect chakra into the palm of both of your hands to form a large powerful sphere of spiraling chakra to strike an enemy with. You do not spend chakra to maintain concentration on this jutsu. Starting next turn, You can spend your action to make an Melee Ninjutsu Attack against a creature within range. On a Hit the Rasengan grows in size dealing 6d8 Force Damage and the Target makes a Strength Saving Throw. On a failed save they are knocked back 45 Feet becoming Dazed and Gaining 3 Ranks of Bleeding. This jutsu only ends on a successful hit. If a creature knocked back by this jutsu collides with a structure or construct, their movement stops, taking damage as if they had fallen an equal distance.</p><p><strong>At Higher Ranks:</strong> For each rank above B-Rank, increase the cost by 3 and the damage by 3d8 and the knock back distance by 10 feet. If this Jutsu is cast at A-Rank or higher, you can make the melee ninjutsu attack the turn you cast it. You may also add a nature release keyword, changing this jutsu's damage type to match the nature release you currently can use. You gain the following benefits depending on the Nature Release chosen.</p>"
    chat: ''
