        mode: 0
        value: bleeding
        priority: 0
    description: >-
      <p><strong>Max Ranks</strong>: 5</p><ul><li><p>At the start of their turn, a bleeding creature takes 1d4 necrotic
      damage for each rank of Bleed they have.</p></li><li><p>A creature who would gain a sixth Rank of the Bleeding
      condition immediately gains 1 rank of the <em><strong>Lacerated</strong></em> condition in place of the additional
      rank of bleeding.</p></li><li><p>A bleeding creature cannot gain the benefits of a rest.</p></li><li><p>The
      creature may attempt to stop the bleeding by succeeding on a DC 15 Medicine check.</p></li><li><p>Outside of
      combat, every 10-minutes a creature suffers the effects of this condition as if a turn has passed in
      combat.</p></li></ul>
    tint: '#ffffff'
    transfer: false
    statuses:
