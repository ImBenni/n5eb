name: Lightning Release Crackle
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You manifest your Lightning release until it's a storm your holding in your hands.</p><p>You supercharge a
      willing creature you touch tripling their heart rate, blood flow, nerve reactions and cognitive
      functions.</p><p>When cast the target regains 20 Hit points and gains 8d12 Temporary Hit points for 1
      minute.</p><p>While concentrating on this jutsu, the target creatures movement speed is increased by 25 feet, they
      gain an additional Reaction, Advantage on Dexterity, Wisdom &amp; Intelligence Ability Checks, skill checks and
      Saving throws, and the first melee attack they make each turn, is at advantage.</p><p>At the end of this jutsu's
      duration the target creatures body reels from the shock of being overworked becoming Stunned for 1d4 of their
      turns.</p>
