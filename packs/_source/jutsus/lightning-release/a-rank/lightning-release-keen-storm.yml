name: Lightning Release Keen Storm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You manifest your Lightning release until you can condense the sparks onto a weapon you are touching.</p><p>A
      weapon you touch, becomes guided by your masterful lightning control. For the duration, you can make melee
      Ninjutsu attacks in place of weapon attacks made with this weapon. Melee Ninjutsu attacks made as a result of this
      jutsu deals 2d12 lightning damage and scores a critical hit on a roll of 18-20. If you score a critical hit on a
      creature with ranks of shocked, you trigger the conditions damage.</p>
