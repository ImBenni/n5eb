name: Lightning Release Lightning Clone
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>A modified version of the Shadow Clone Technique that allows the user to create a clone made of solid
      lightning. Lightning Clones have no measurable weight and explode if exposed to a body of water. You can only
      create up to 2 Lightning Clones each costing 16 Chakra to conjure. Lightning Clones must remain within 120 feet of
      the caster. If the cast ends its turn more than 120 feet away from a Lightning Clone it explodes.</p><p>Lightning
      Clones can cast up to 2, B-Rank or lower Ninjutsu with the lightning release keyword that you know, following
      normal Clone keyword restrictions. Lightning Clones have Immunity to Genjutsu, Psychic &amp; Poison damage,
      Resistance to Bludgeoning, Earth and Lightning Damage but Vulnerability to Wind Damage. It has a movement speed
      equal to your movement speed.</p><p>Creatures who have chakra sight can tell the clone is made of lightning and
      can distinguish the clone from the original.</p><p>When Lightning Clones have 0 hit points, have used 2 ninjutsu
      with the lightning release keyword, been exposed to a body of water, its Summoner has ended its turn more than 120
      feet away, or been dismissed as a bonus action, it surges for a brief moment before exploding. Creatures within 20
      feet of the clone when it explodes must make a Constitution saving throw taking 10d6 lightning damage and being
      stunned until the end of their next turn on a failed save or half as much damage on a successful one.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and the damage
      by 2d6.</p>
