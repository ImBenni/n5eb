name: Lightning Release Lightning Dragon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>Your chakra twists and forms into a long dragon made of pure lightning, This dragon flies in a straight line of
      your choice. This creature occupies a space 10 feet wide and extends up to 90 feet. Creatures in the path of this
      dragon must succeed a Dexterity saving throw, taking 8d10 lightning Damage or half as much on a failed
      save.</p><p>A creature who fails their dexterity saving throw against this jutsu must also make a Constitution
      Saving throw, becoming blind and deaf on a failed save until the end of their next turn.</p><p>Overcharge. When
      you cast this jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to
      overcharge its effects. When you do, this jutsu gains the Construct keyword, and the dragon remains on the field
      as a huge construct made of lightning, with an AC equal to your ninjutsu save DC and hit points equal to 5 x your
      ninjutsu ability score. It has vulnerability to wind damage, Immunity to Earth Damage, and if it would take
      Lightning Damage, it instead restores its hit points by the amount of damage it would take. As an action on each
      of your turns, you can command it to perform the effect of this jutsu again in any line extending from its current
      space. Otherwise, it does nothing. You must concentrate on this jutsu to maintain this construct's form</p><p>At
      Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and increase
      the damage by 1d10.</p>
