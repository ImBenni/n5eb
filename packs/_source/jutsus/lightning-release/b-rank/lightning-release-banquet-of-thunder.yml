name: Lightning Release Banquet of Thunder
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You discharge 3 jolts of lightning that tears through the ground shooting in a straight line 10 feet wide and
      60 feet long. The ground the lightning travels through becomes difficult terrain. Creatures in the path of this
      lightning must make a Dexterity saving throw, taking 6d6 lightning damage and gaining 1 rank of shocked and
      weakened on a failed save or half as much damage on a successful one.</p><p>Overcharge. When you cast this jutsu
      with its listed casting time, you can choose to spend your Bonus Action or Reaction to overcharge its effects.
      When you do this jutsu's range shifts becoming a 60ft cone. Once you use this overcharge effect, you cannot do so
      again until you spend at least 1 Chakra die to recharge it as a Bonus action on your turn or by completing a rest
      of any type.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this
      jutsu by 3 and increase the damage by 1d6.</p>
