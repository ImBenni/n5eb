name: Lightning Release Chained Lightning
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You create a bolt of lightning that arcs towards a target of your choice that you can see within range. Three
      bolts then leap from the first target to as many as three other targets, each of which must be within 30 feet of
      the first target. A target can be a creature or an object that be targeted by only one of the bolts. A target must
      make a Dexterity saving throw, taking 6d10 lightning damage on a failed save, or half as much on a successful
      one.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend your Bonus
      Action or Reaction to overcharge its effects. When you do a creature gains one rank of the shocked condition for
      each creature who previously failed their saving throws</p><p>At Higher Ranks: For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3 and one additional bolt leaps from the first target to another
      target.</p>
