name: Lightning Release False Darkness
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You release a massive wave of lightning capable of disintegrating stone and creatures alike. Creatures in a
      30-foot cone originating from you must make a constitution saving throw taking 10d4 lightning damage, are blinded
      for 1 minute, on a failed save or half as much on a success. Creatures blinded by this jutsu remake their saves at
      the beginning of each of their turns.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you
      can choose to spend your Bonus Action or Reaction to overcharge its effects. When you do, on a failed save,
      affected creatures are also deafened and gain 2 ranks of concussed for the same duration they are
      blinded.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by
      3 and the damage by 1d4 and the size of the cone by 5 feet.</p>
