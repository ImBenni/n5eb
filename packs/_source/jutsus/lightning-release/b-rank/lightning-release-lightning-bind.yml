name: Lightning Release Lightning Bind
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You set up 3 Chakra seals within 15 feet of one another in a triangle formation and fill them with Lightning
      Release chakra. You decide on a triggering action such as a creature entering the triangle, saying a specific
      word, or even making a certain hand Seal and the 3 tags will create a 3-point barrier made of Lightning Release
      Chakra. Trapping whomever is in the barrier inside. The Barrier has 60 (10d12) Hit Points and a 13 AC. Creatures
      inside the Barrier cannot mold chakra and if a creature attempts to exit the interior of the barrier by force,
      they must make a DC 16 Constitution save, taking 5d8 Lightning Damage on a failed save or half as much on a
      successful one. Creatures interacting with the Outside of the barrier do not suffer adverse effects although they
      cannot pass through the barrier without attempting to break it.</p>
    chat: ''
