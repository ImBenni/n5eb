name: Lightning Release Penance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra to amplify and bring out, the last spark of willpower from within a
      fallen creature.</p><p>A Creature you touch who has been dead no longer than 1 minute has their essence touched.
      Make a Ninshou Check vs DC (15 + 1 for every round the target has been dead.) On a success, they awake, gaining 1
      Hit points and a number of temporary hit points equal to 6d10. These temporary hit points last for 1 minute. When
      the creature runs out of temporary hit points granted by this jutsu, they fall unconscious for 24 hours, unable to
      awaken by any means. A creature can be revived by this jutsu no more than once per full rest.</p><p>So long as a
      creature have temporary hit points as a result of this jutsu, they gain a bonus to their Strength, Dexterity and
      Constitution saving throws equal to your Ninjutsu Ability Modifier, their Strength, Dexterity, and Intelligence
      ability scores are increased to 20, and any damage they deal is instead Lightning Damage that cannot be
      resisted.</p>
