name: Lightning Release Raging Storm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You manifest your Lightning release until its covering the body of an allied creature that is not yourself.
      Select one willing creature you can see within range. The target creature is engulfed in a raging torrent of
      lightning. For this duration, Jutsu the creature casts deals additional lightning damage equal to 3d8, once per
      turn. They gain Resistance to Earth Damage a +20 bonus to their speed, and advantage on Dexterity saving
      throws.</p><p>Additionally, Concentration checks they make are made at advantage as you assist in managing their
      chakra flow.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this
      jutsu by 3 and the number of targets this jutsu can affect by +1.</p>
    chat: ''
