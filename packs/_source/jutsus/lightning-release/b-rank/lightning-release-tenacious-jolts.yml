name: Lightning Release Tenacious Jolts
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra forming a jolt of lightning that you use to strike a creature within
      range.</p><p>Make a ranged ninjutsu attack. On a hit you deal 5d10 Lightning damage. The target must make a
      Constitution saving throw. On a failed save the affected creature becomes shocked and dazed.</p><p>Overcharge.
      When you cast this jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to
      overcharge its effects. When you do, then all creatures within 10 feet of the target of your choice must make the
      same saving throw, taking 5d8 lighting damage on a failed save or half as much on a success.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage by
      1d10.</p>
