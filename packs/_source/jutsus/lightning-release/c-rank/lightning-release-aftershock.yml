    value: >-
      <p>You conjure your lightning release chakra to generate a jolt of electricity in an attempt to double up on the
      effects of the previous jutsu you cast.</p><p>As a reaction, when you would deal lightning damage to a creature
      you may recast the jutsu targeting the same creatures or affecting the same area. The jutsu recast in this way
      have their cost doubled. If the jutsu recast has the special cost, then it costs an additional +3 Chakra.</p>
