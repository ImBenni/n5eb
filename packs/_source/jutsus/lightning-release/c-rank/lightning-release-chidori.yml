img: icons/magic/lightning/projectile-orb-blue.webp
system:
  description:
    value: >-
      <p>This powerful assassination technique focuses lightning Chakra into one of your hands, which will be unable to
      hold items while charged, but can still be used to make hand seals without harm. You do not need to spend chakra
      to maintain concentration with this jutsu. As an action on your next turn, you can use your action to make a Melee
      Ninjutsu Attack on a target creature within range. </p><p>On a hit, the target creature takes 5d10 Lightning
      Damage and this jutsu ends. This Jutsu has a +1 critical threat range. </p><p><strong>Overcharge.</strong> When
      you cast this jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to
      overcharge its effects. When you do, this jutsu evolves in power, becoming the Raikiri, gaining the following
      benefits until this jutsu ends; Bonus +20 speed, 1d4 bonus to hit, and on a critical hit, increases damage die by
      1 step. </p><p><strong>At Higher Ranks:</strong> If this Jutsu is upcasted to at least B Rank you immediately
      perform the Melee Ninjutsu attack instead of waiting till your next turn. For each rank above C-Rank, increase the
      cost by 3, increasing the damage done by 2d10 and Critical threat range by +1.</p>
