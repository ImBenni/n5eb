name: Lightning Release Lightning Current
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You slam your hand onto the ground and release lightning from your body that surges outwards up to 30 feet in
      all directions from you. Creatures in this radius who are not behind total cover must make a Constitution saving
      throw, taking 4d6 lightning damage and gains 1 rank of shocked. On a successful save the creature only takes half
      damage.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend your
      Bonus Action or Reaction to overcharge its effects. When you do a creature who fails their saving throw becomes
      unable to make handsigns until the end of their next turn, as electricity overwhelms their central nervous
      system</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and increase the damage by 1d6.</p>
