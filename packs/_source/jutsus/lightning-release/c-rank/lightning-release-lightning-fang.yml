name: Lightning Release Lightning Fang
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You extend both of your hands into the air, releasing a mass of Lightning chakra into the sky creating thunder
      clouds. As an action on your turn, you can select a space within range that you can see, Lightning Strikes the
      area. All creatures within 5 feet of the target space must succeed a Dexterity Saving throw taking 3d10 Lightning
      Damage on a failed save, or half as much on a successful one. A creature can only be affected by one lightning
      strike at a time.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend
      your Bonus Action or Reaction to overcharge its effects. When you do a creature who fails their saving throw has
      their legs begins to seize up on them, reducing their walking speed to 5 feet, bringing it to a crawl, until the
      end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and select one additional target space.</p>
