name: Lightning Release Lightning Flash
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You coat a weapon with the thrown quality in lightning release chakra, increasing the lethality and piercing
      power of the weapon and throwing them in rapid succession.</p><p>When you would make a ranged weapon attack with a
      thrown weapon you can enhance them with lightning release increasing their damage by 1d8 lightning
      Damage.</p><p>Overcharge. When you cast this jutsu, as a bonus action or reaction, you can overcharge its effects.
      When you do the lightning damage you deal ignores Damage Reduction and Temporary Hit Points as your attacks
      penetrate even the strongest defense.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d8.</p>
