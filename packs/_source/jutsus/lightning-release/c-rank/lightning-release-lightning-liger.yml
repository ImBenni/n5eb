name: Lightning Release Lightning Liger
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra to summon a Beast formed of Lightning, that fit your
      description.</p><p>Make a Ranged Ninjutsu attack against a creature within range. On a success they take lightning
      damage equal to 4d8+ your Ninjutsu Ability Modifier.</p><p>Additionally, the target must make a Constitution
      saving throw. On a failed save they gain 1 rank of shocked.</p><p>If a target is already shocked, you make your
      attack roll at advantage and ignore cover as the lightning beast zig zags across the field to get the best vantage
      to attack.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend your
      Bonus Action or Reaction to overcharge its effects. When you do, select a second creature to target with this
      jutsu.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and the damage by 1d8.</p>
