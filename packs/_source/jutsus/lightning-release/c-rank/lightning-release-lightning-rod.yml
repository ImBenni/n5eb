name: Lightning Release Lightning Rod
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra creating a lightning release lance, staff or polearm of your
      description. This projected polearm has a reach of 10 feet, the trip, deadly and thrown (90/120)
      properties.</p><p>For the duration of this jutsu you do not need to spend chakra to maintain concentration on this
      jutsu.</p><p>While wielding this polearm you gain the following options using the corresponding
      actions</p><p>Action: Make a Melee Ninjutsu attack dealing 4d10 lightning damage on a hit.</p><p>Action: Make a
      Ranged Ninjutsu attack, throwing the lance targeting a creature you can see, within throwing range, dealing
      lightning damage equal to 5d6 + Ninjutsu ability modifier. Regardless of a hit or miss, the lance then explodes,
      creatures within 20 feet of the target must succeed a Dexterity saving throw, taking 3d8 lightning damage on a
      failed save or half as much on a successful save. The Jutsu then ends.</p><p>Bonus Action: You compress your
      polearm into its most basic form using it to supercharge the next jutsu you cast with the Lightning Release
      Keyword before the end of your turn. The next jutsu you cast with the Lightning Release Keyword that has a casting
      time of 1 Action has its cost reduced by half and deals additional damage equal to your Ninjutsu ability modifier.
      This jutsu then ends.</p><p>Reaction: You spin your polearm in an attempt to deflect incoming attacks. Roll 1d6.
      You gain a bonus to your AC equal to the result and a bonus to your Strength and Dexterity saves equal to half of
      the result (Min 1.) until the beginning of your next turn.</p>
    chat: ''
