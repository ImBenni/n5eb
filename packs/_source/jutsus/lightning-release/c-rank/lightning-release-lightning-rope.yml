name: Lightning Release Lightning Rope
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra to manifest a rope made of lightning.</p><p>Make a ranged ninjutsu
      attack against a single creature you can see within range. On a successful hit, the target becomes restrained for
      the duration and gains 1 rank of shocked. A creature Restrained by this jutsu takes lightning damage equal to your
      Ninjutsu Ability Modifier at the beginning of each of their turns.</p><p>A creature restrained by this jutsu may
      make a Strength saving throw once on their turns as an action to end this jutsu's effects on them on a
      success.</p><p>While maintaining concentration on this jutsu you must hold the lightning rope with one hand within
      range. Letting it go immediately ends this jutsu.</p><p>Overcharge. When you cast this jutsu with its listed
      casting time, you can choose to spend your Bonus Action or Reaction to overcharge its effects. When you do, all
      creatures who fail the initial saving throw gain 1 additional rank of shocked</p><p>At Higher Ranks: For each rank
      you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target
      with this jutsu by +1.</p>
