name: Lightning Release Lightning Step
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You teleport yourself to an unoccupied space you can see within range. Immediately after you disappear, a
      thunderous boom sounds, and each creature within 10 feet of the space you left and the space you appeared must
      make a constitution saving throw, taking 3d10 Lightning damage on a failed save, or half as much damage on a
      successful one. Thunder can be heard up to 300 feet away.</p><p>You can bring along object as long as their weight
      doesn't exceed what you can carry. You can also teleport one willing creature of your size or smaller who is
      carrying gear up to it carrying capacity. The creature must be within 5 feet of you when you cast this jutsu, and
      there must be an unoccupied space within 5-feet of your destination space for the creature to appear in;
      otherwise, the creature is left behind.</p><p>Overcharge. When you cast this jutsu with its listed casting time,
      you can choose to spend your Bonus Action or Reaction to overcharge its effects. When you do a creature who fail
      their saving throw have their speed reduced by the amount of damage they took, rounded down to the nearest 5-foot
      increment until the end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and increase the damage by 1d10.</p>
