name: Lightning Release Lightning Uppercut
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra coating it around your hands or legs and using it as a guiding force
      when striking.</p><p>Make a ranged ninjutsu attack. On a hit lighting explodes upwards from under the target
      dealing lightning damage equal to 4d8, and knocking them 20 feet into the air. They do not take falling damage
      unless they fall more than 20 feet in this circumstance.</p><p>Until the end of your turn, the target can be
      targeted by Jutsu with the Finisher keyword regardless of range, once per turn, using either an Action or Bonus
      action, ignoring its listed casting time.</p><p>Overcharge. When you cast this jutsu with its listed casting time,
      you can choose to spend your Bonus Action or Reaction to overcharge its effects. When you do, the next Ninjutsu
      you cast with the lightning release keyword before the end of your next turn, increases its damage dice by
      +2.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3,
      the damage by 1d8.</p>
