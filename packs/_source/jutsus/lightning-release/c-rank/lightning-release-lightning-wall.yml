name: Lightning Release Lightning Wall
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra until you create a wall of lightning that you can place on a solid
      surface or suspend midair. You can make the wall up to 90 feet long, 60 feet high and 5 feet thick, or a ringed
      wall up to 40 feet in diameter, 60 feet high, and 5 feet thick. This wall is opaque and lasts for the
      duration.</p><p>When the wall appears, each creature within its area must make a Dexterity saving throw. On a
      failed save, a creature takes 8d8 lighting damage and becomes shocked or half as much damage and no further
      effects on a successful save.</p><p>On both sides of the wall each creature that ends its turn within 10 feet of
      it takes 8d8 Lighting damage and must make a Constitution saving throw gaining 1 rank of shocked on a failed save.
      A creature takes the same damage and gains the same condition when it enters the wall for the first time or ends
      its turn there.</p><p>The wall has a number of hit points equal to the collective total of all Casters Ninjutsu
      Save DC. Resistance to Earth Damage and Vulnerability to Wind Damage.</p><p>Its casters can decide to allow Jutsu
      to pass through only one side of the wall if they choose.</p><p>Combination: If this jutsu is cast as a
      Combination jutsu with 2 or more casters increase the damage by 1d8.</p><p>Any creature who assists in casting
      this jutsu as a combination jutsu increases this Jutsu's defensive abilities based on the highest Charisma
      Modifier within the group of casters. (+0-1: No Change, +2-3: Increase the walls Hit points by 15. +4-5: Increase
      the walls Hit points by 45).</p>
