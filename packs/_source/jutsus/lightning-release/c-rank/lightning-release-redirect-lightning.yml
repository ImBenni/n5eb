name: Lightning Release Redirect Lightning
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>When you cast this jutsu, you spend chakra equal to the triggering jutsu's cost. As you are targeted by
      lightning, you create s similar charge of lightning release chakra inside of you to redirect the attack. You gain
      Resistance to the Lightning Damage until the beginning of your next turn, and make a melee Ninjutsu attack vs. the
      target's attack roll or Save DC (depending on whether you were targeted by an attack or saving throw).</p><p>If
      you succeed, you redirect their attack at another single target within range, dealing half the damage of the
      triggering creature's attack (or saving throw), but no other effect.</p>
    chat: ''
  source:
    custom: ''
