name: Lightning Release Spider Web
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You create a Web like pattern on the ground out of Lightning chakra expanding outwards in a 15-foot cube at a
      space of your choice within range. Creatures who begin their turns or enters the webs space must make a
      Constitution saving throw. On a failed save affected creatures gain +1 rank of Shocked. A creature who has gained
      ranks of Shocked as a result of this jutsu, who begins their turn in this jutsu's area of effect, becomes
      Incapacitated until the end of their turn.</p><p>Overcharge. When you cast this jutsu with its listed casting
      time, you can choose to spend your Bonus Action or Reaction to Overcharge its effects. When you do, a Shocked
      creature who begins their turn in the affected area takes 3d12 Lightning damage.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, increase the size of the cube by 5
      feet and damage dealt while overcharged by 1d12</p>
