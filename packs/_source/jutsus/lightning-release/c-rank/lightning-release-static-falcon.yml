name: Lightning Release Static Falcon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You generate a mass of Lightning chakra and release it in the form of a bird. This bird then flies towards a
      target creature you can see within range, before it explodes, discharging electricity in a 15-foot cube with a
      loud thunderous boom. This thunderous boom can be heard up to 300 feet away.</p><p>Creatures in the affected area
      must make a Constitution save, taking 6d6 Lightning damage and gains 1 rank of shocked on a failed save, and half
      as much on a successful save.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can
      choose to spend your Bonus Action or Reaction to overcharge its effects. When you do a creature shocked by this
      jutsu must make a Constitution (Chakra control) check at the start of each of their turns for the duration of the
      shocked condition, or be unable to move more than 5 feet on their turns.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6.</p>
