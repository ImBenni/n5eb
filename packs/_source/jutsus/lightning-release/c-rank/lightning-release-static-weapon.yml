system:
  description:
    value: >-
      <p>A Weapon you touch becomes enhanced with lightning release chakra. For the duration, the weapon has a +1 bonus
      to attack rolls and deals an extra damage die in lightning damage each time you deal this [Weapons Damage] to a
      hostile creature, any number of times per turn. You cannot lose concentration of this jutsu as a result of
      damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by
      3 and the number of weapons this can affect by +1.</p>
