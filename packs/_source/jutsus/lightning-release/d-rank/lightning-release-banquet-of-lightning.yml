name: Lightning Release Banquet of Lightning
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You Place your palm on the ground and conduct a jolt of lightning that runs through it towards a target
      creature in range. This jutsu ignores cover and can go around corners. Target creature must make a Constitution
      save, taking 3d6 Lightning Damage and gaining 1 rank of shocked on a failed save and only half damage on a
      successful one.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend
      your Bonus Action or Reaction to overcharge its effects. When you do, a creature who fails their saving throw is
      also slowed for the same duration that they are shocked</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6 and the number of creatures you
      can target by +1.</p>
