name: Lightning Release Circuit Breaker
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra to generate a jolt of electricity in an attempt to shock a creature
      within range. Make a Ranged Ninjutsu Attack, on a hit, you deal 1d6 Lightning Damage. If the target creature is
      currently concentration on a Jutsu they make their check at disadvantage. If the target has a jutsu active that
      doesn't require concentration and they are not currently concentration on a jutsu, they lose the benefits of that
      jutsu until the end of their next turn.</p><p>Overcharge. When you cast this jutsu with its listed casting time,
      you can choose to spend your Bonus Action or Reaction to overcharge its effects. When you do, increase the damage
      dealt by 2 steps and add your Ninjutsu ability modifier</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and the amount of attacks you make by +1.</p>
