name: Lightning Release Electromagnetic Annoyance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra to generate a wave of electricity. Each creature in a 20-foot cube
      originating from you must succeed a Constitution saving throw being Shocked until the end of their next turn on a
      failed save. If a creature is already shocked, they make this save at disadvantage.</p><p>A creature who is
      shocked and gains another rank of shock as a result of this jutsu has their shocked condition duration increased
      to 1 minute.</p><p>Overcharge. When you cast this jutsu, as a bonus action or reaction, you can overcharge its
      effects. When you do, all creatures who fail their saving throw have their speed reduced by 10 for the duration of
      the shocked condition.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3 and the cube by 5 feet.</p>
