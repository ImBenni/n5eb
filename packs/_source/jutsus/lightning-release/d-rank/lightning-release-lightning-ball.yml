name: Lightning Release Lightning Ball
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You generate multiple small floating globes of lightning chakra. You fire them all off as once rapidly at a
      singular target. Make a Ranged Ninjutsu attack. If the target creature is wielding a metallic weapon, you make
      this attack at Advantage. On a hit, the target creature takes 6d4 Lightning Damage and forces the creature to make
      a Constitution saving throw. On a failed save it gains 1 rank of shocked.</p><p>Overcharge. When you cast this
      jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to overcharge its
      effects. When you do you create a second set of lightning globes, and you must select a second creature to target
      with this jutsu.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and increase the number of attacks you can make by +1.</p>
