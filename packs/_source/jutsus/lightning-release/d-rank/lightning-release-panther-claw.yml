name: Lightning Release Panther Claw
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra and mold it around your arms until you conjure a projection of your
      description.</p><p>Make a Melee Ninjutsu attack. On a hit you deal 2d10 Lightning Damage.</p><p>If the target has
      at least 1 rank of shocked your damage die becomes d12.</p><p>If the target has at least 2 ranks of shocked you
      also increase your critical range to 19~20.</p><p>If the target has at least 3 ranks of shocked you also add your
      Ninjutsu Ability Modifier to the damage you deal.</p><p>If the target has at least 5 ranks of shocked, you make an
      additional melee ninjutsu attack.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can
      choose to spend your Bonus Action or Reaction to overcharge its effects. When you do, you may add your Ninjutsu
      ability modifier to the damage dealt.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d10.</p>
