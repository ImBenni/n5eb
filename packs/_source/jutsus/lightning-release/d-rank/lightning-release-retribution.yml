name: Lightning Release Retribution
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra and mold it to form a defensive instrument of your choice; This can
      be a great sword, shield, wall, or a version of yourself made of lightning. This jutsu cannot be triggered by
      Psychic or Chakra damage.</p><p>When you would take damage, you gain Temporary Hit Points equal to half of your
      Ninjutsu Save DC (rounded down). While you have Temporary hit points gained by this jutsu, you have resistance to
      Earth Damage and Vulnerability to Wind Damage.</p><p>Each time you take damage until the end of the current turn
      you build up lightning release chakra. You must keep track of all damage taken until the end of the current turn.
      If your hit points are reduced to 0 while this jutsu is active, it immediately ends.</p><p>At the end of the
      current turn, you discharge all of the built-up Lightning Release chakra. All creatures within a 15-foot radius
      sphere must succeed a Dexterity saving throw, taking lightning damage equal to the damage you've taken + 3d6 on a
      failed save or half as much on a successful save.</p><p>If a creature is shocked, they make their saving throw at
      disadvantage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3 and the damage by 1d6.</p>
