name: Lightning Release Spark
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure your lightning release chakra to generate a spark of willpower from within a creature.</p><p>A
      Creature you touch gains 1 Hit point and a number of temporary hit points equal to 2d6 + Your Ninjutsu ability
      Modifier. These Temporary hit points last for 1 minute.</p><p>Additionally, the creature gains resistance to
      Lightning damage so long as they have Temporary hit points granted by this jutsu.</p><p>Overcharge. When you cast
      this jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to overcharge its
      effects. When you do, the first time you would take lightning damage while benefiting from temporary hit points
      (THP) as a result of this jutsu, you instead gain bonus THP equal to half the damage dealt.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the temporary Hit points
      by 1d6.</p>
