name: Lightning Release Thor's Mark
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You send a negatively charged spark of Lightning release chakra to attach itself to a target creature you can
      see within range marking it. You do not need to spend chakra to maintain concentration on this jutsu. Until the
      jutsu ends you deal an extra damage die to the target whenever you hit it with Ninjutsu with the Lightning Release
      Keyword. You also have advantage on Wisdom (Perception) or (Survival) checks you make to track or find the
      target.</p><p>If a creature marked with this jutsu reaches 0 hit points you may move the mark to another creature
      as a bonus action.</p>
    chat: ''
