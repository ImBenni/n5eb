name: Lightning Release Thunder Tempest
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>A wave of electrical force sweeps out from you. Each creature in a 25-foot cone originating from you must make
      a Strength saving throw. On a Failed save a creature takes 4d4 Lightning Damage are pushed back 10 feet and
      shocked. On a successful save, the creature takes half as much damage and isn't pushed.</p><p>Overcharge. When you
      cast this jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to overcharge
      its effects. When you do a creature who fails their saving throw has their initiative score reduced by 1d4,
      falling in the initiative order accordingly as a result. A creature can only have their initiative changed twice
      as a result of this effect.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3 and increase the damage by 2d4 and knock back distance 5ft.</p>
