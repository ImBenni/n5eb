name: Lightning Release Great Snake Lightning
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You collect lightning into two massive spheres covering each hand before compressing them into globes the size
      of golf balls. You then perform a chakra molding shape using the balls of lightning, turning them into two snakes
      of your description that coil around one another as they fly towards a target of your choice that you can see
      within range. Make a ranged ninjutsu attack, dealing 10d12 lightning damage. On a hit, the Lightning then explodes
      outwards in a 30-foot radius sphere centering on the target creature. All other creatures within 30 feet of the
      target must make a Constitution saving throw, being stunned until the end of your next turn.</p><p>Overcharge.
      When you cast this jutsu with its listed casting time, you can choose to spend your Bonus Action or Reaction to
      overcharge its effects. When you do, you may select a second target for this jutsu.</p>
