      damage. You coat your body in a perfectly balanced layer of lightning release chakra, enhancing your damage
      resistance, your movement speed, and your overall striking power. Increase your AC by +3, reduce all damage you
      take except Wind by 8, increase your movement speed by 50 feet, and all melee attacks you make except Genjutsu
