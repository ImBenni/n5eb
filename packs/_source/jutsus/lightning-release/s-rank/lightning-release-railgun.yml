name: Lightning Release Railgun
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You manifest your Lightning release chakra infusing it into the metallic object so much so that electricity
      radiates up to 60 feet off of it and glows white. Electronic tools and appliances begin to overload and
      short-circuit.</p><p>You then create a circular barrel made of Lightning release chakra to stabilize the metallic
      object as you launch it through the barrel causing unrivaled destruction to anything in its path.</p><p>All
      Creatures, objects and structures in a 15-foot wide, 500-foot line must succeed a Dexterity saving throw. A
      shocked creature makes their saving throw at disadvantage.</p><p>On a failed a creature takes lightning damage
      equal to 12d10, is knocked prone and becomes dazed for the next minute. If a creature is shocked, they instead
      take 16d10 and become stunned for the next minute. Objects and structures take the maximum possible
      damage.</p><p>On a successful save, a creature takes half of 12d10. If the creature is shocked, they instead take
      half of 16d10.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend
      your Bonus Action or Reaction to overcharge its effects. When you do, this jutsu ignores cover and creatures
      cannot make their saving throws with advantage</p>
