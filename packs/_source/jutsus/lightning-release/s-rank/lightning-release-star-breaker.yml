name: Lightning Release Star Breaker
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You manifest your Lightning release chakra infusing it into hundreds of chakra seals for the casting
      time.</p><p>You and all casters designate a single target you can see within range. Upon casting the jutsu you
      fire a massive beam of compressed Lighting Release chakra on the target.</p><p>All casters make a ranged ninjutsu
      attack targeting the same target taking the highest result.</p><p>On a hit, you deal 50d12 Lightning Damage. All
      Creatures, objects and Structures within 1 mile must succeed a Dexterity saving throw at disadvantage, taking 50d8
      lightning damage on a failed save and half as much on a successful save. Structures and Objects take double
      damage.</p><p>Combination: If this jutsu is cast as a Combination jutsu with 2 or more casters reduce the cost by
      -2.</p><p>Any creature who assists in casting this jutsu as a combination jutsu increases this Jutsu's offensive
      abilities based on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2: Increase
      damage by 5d12 and 5d8. +3: Increase damage by 10d12 and 10d8. +4: Increase damage by 15d12 and 15d8. +5: Increase
      damage by 25d12 and 25d8.).</p>
