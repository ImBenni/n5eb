name: Lightning Release Thunderclap Arrow
type: spell
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You conjure a mass of lightning into the shape of an arrow, that you launch into the air before commanding it
      to crash into the ground. Choose a point within range for the arrow to land that creates a vertical explosion into
      the shape of a cylinder 60 feet wide and 100 feet high. All creatures within range must make a Dexterity saving
      throw, taking 15d10 lightning damage on a failed save . Creatures must also succeed a Constitution Saving Throw
      being Stunned until the end of their next turn on a failed save. This jutsu ignores Resistance to Lightning
      Damage.</p><p>Overcharge. When you cast this jutsu with its listed casting time, you can choose to spend your
      Bonus Action or Reaction to overcharge its effects. When you do, each creature in a 10ft wide line between you and
      the target space must make a Dexterity save, taking 10d6 lightning damage on a failed save. All damage from this
      jutsu ignores Resistance, Damage Reduction and Temporary Hit Points.</p>
