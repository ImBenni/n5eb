name: Medical Release Aura of Power
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>Intense chakra lashes out from you and coalesces in a soft radiance of blue light in a 30-foot radius around
      you. Allied creatures of your choice in the radius when you cast this jutsu have advantage on all saving throws
      against Ninjutsu. Hostile creatures within this radius have disadvantage on saving throws against Ninjutsu cast
      from within this jutsu's radius.</p><p>Also, when an affected hostile creature hits an affected allied creature
      with a melee attack, your Aura of Power flashes with extreme pressure. The attacker must succeed on a Strength
      saving throw or be incapacitated until the end of their next turn.</p>
