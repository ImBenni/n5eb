name: Medical Release Casualty Puppet
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>As a part of the casting of this jutsu, you must have a creature who has been dead no longer than 10 minutes
      available to you. You place a chakra seal onto the corpses body. When you do you perform a ritual absorbing its
      memories fully into the seal, then placing the chakra seal on yourself.</p><p>For this jutsu's duration, you gain
      access to all of the memories and Jutsu, that the creature knew. While you have the chakra seal attached to you,
      you cannot end this jutsu early.</p><p>Your mind begins to feel hazy and clouded. At the beginning of each of your
      turns while in combat, or every minute while not in combat. You must succeed a Charisma saving throw vs a DC
      (Original Creatures Level + Their Proficiency Bonus). On a failed save, you act as they would until the end of
      their turn.</p>
