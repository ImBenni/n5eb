name: Medical Release Corrosive Plume
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You mold acidic chakra into the shape of flower on a point that you can see within range. This flower then
      begins to grow and bloom at a violent rate. All creatures within 30 feet of the flower when it blooms must make a
      Dexterity saving throw, taking 12d6 acid damage and gaining 2 ranks of the corroded condition.</p><p>A creature
      who fails their saving throw, who has 5 ranks of corroded has vulnerability to acid damage from this
      jutsu.</p><p>Armor, weapons and items that are not being held are immediately dissolved if they do not have a
      seal, or chakra-based effect of A-Rank or higher cast upon it or infused into it.</p><p>Creatures reduced to 0 hit
      points as a result of this jutsu are dissolved into a mass of acidic goop, unable to be revived.</p>
