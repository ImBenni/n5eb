system:
  description:
    value: >-
      <p>You clasp your hands releasing a shockwave of healing energy in a 30-foot radius sphere centering on you. You
      heal up to 8 creatures a total of 200 hit points being split evenly between them while also gaining advantage on
      saving throws and resistance to the next instance of damage they take, until the end of your next turn.</p><p>If
      you would target less than 3 creatures with this jutsu, they can only recover up to 40 hit points each this
      way.</p>
