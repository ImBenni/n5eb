system:
  description:
    value: >-
      <p>This is a perfected sensory ninjutsu based on the principles from "Kagura's Mind Eye". This jutsu digs further
      instead targeting a creature's emotions to track and keep notice of them from up to 100 feet away. You are able to
      immediately tell the emotional state or intentions of a creature within range. A Creature who attempts to hide
      these emotions must make a Deception check against your Ninjutsu Save DC. You can sense discomfort, enjoyment,
      anger, and even killing intent.</p>
