name: Medical Release Regenerate
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You touch a creature and stimulate its natural healing ability. The target regains 4d8+15 hit points. For the
      duration of the jutsu, the target regains 1 hit point at the start of each of its turns (10 hit points per
      minute).</p><p>The targets severed body members (fingers, legs, tails, and so on), if any, are restored after 2
      minutes. If you have the severed part and hold it to the stump, the jutsu instantly causes the limb to knit to the
      stump.</p>
    chat: ''
