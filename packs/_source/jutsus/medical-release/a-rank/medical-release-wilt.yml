name: Medical Release Wilt
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You infuse necrotic chakra into a surge of medical chakra, designed to suck the life from a target
      creature.</p><p>You draw the life force of all creatures of your choice within range, that you can see. Each
      creature in the area must make a Constitution Saving throw. Construct and undead aren't affected. Plants,
      Celestials, and Demons make this saving throw at disadvantage.</p><p>A creature takes 10d8 Necrotic Damage and are
      marked with the seal of extraction for the next minute, or half as much damage and no additional effects on a
      successful save.</p><p>A creature marked with the seal of extraction takes 5 additional Necrotic damage each time
      they would take damage from any source for the duration. Plants, Celestials, and Demons instead take 10 additional
      Necrotic damage each time they would take damage from any source for the duration.</p><p>A creature marked with
      the seal of extraction can as an action attempt to remove the seal by making an Intelligence (Ninshou) check vs
      your Ninjutsu save DC, removing it early on a success. Plants, Celestials, and Demons make this skill check at
      disadvantage.</p>
