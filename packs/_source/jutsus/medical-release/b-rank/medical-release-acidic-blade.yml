name: Medical Release Acidic Blade
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You draw out acidic chakra and coat it over a weapon you can reach. When you do, for the duration, twice per
      turn when a successful attack is made with the weapon, it deals an additional 2d8 acid damage. You cannot lose
      concentration of this jutsu as a result of damage.</p><p>Once per turn, creatures who take acid damage as a result
      of this jutsu, make a Constitution saving throw. On a failed save, they gain 1 rank of the Corroded
      Condition.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu
      by 3. If this jutsu is cast at S-Rank, increase the damage this jutsu deals by 1d8.</p>
