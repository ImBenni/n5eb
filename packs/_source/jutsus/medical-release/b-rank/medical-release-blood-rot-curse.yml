name: Medical Release Blood Rot Curse
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You weave necrotic chakra into a special wavelength, invisible to even creatures with Chakra sight. When you
      cast this jutsu roll all spent hit die. Recording the result.</p><p>You touch a creature who's hit points are not
      full and bestow a curse. The cursed target must make a Charisma saving throw. You can attempt to bestow the curse
      in a concealed manner not revealing your intentions by making a Stealth check vs the targets passive insight. On a
      success, the target is unaware of the curse you placed on them.</p><p>The curse takes effect immediately, for a
      number of days, equal to half result of your spent hit die, the target cannot regain hit points except as a result
      of long and full rests, if and when they would take Acid, Poison or Necrotic damage, they take 2d4 additional
      damage of that same type. Additionally, if a creature is poisoned or envenomed, they make whatever ability checks,
      or saving throws to remove the chosen condition at disadvantage.</p><p>Finally, this jutsu's effect can only be
      removed by a Ninjutsu with the Fuinjutsu keyword of B-Rank or higher that dispels jutsu based effects.</p>
