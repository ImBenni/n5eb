name: Medical Release Body Pathway Derangement
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You coat your fingertips in chakra and attempt to strike an opponent at the nape of their neck sending a surge
      of chakra through their central nervous system mixing up signals from their brain to the rest of their bodies.
      Make a Melee Ninjutsu Attack. On a hit, the target creature must make a constitution saving throw.</p><p>On a
      failed save, the target creature's speed is halved, it takes a -2 Penalty to AC, automatically fails Dexterity
      saving throws and cannot use reactions. On its turn, it can either use an action or bonus action, not both.
      Regardless of the creature's abilities or jutsu descriptions, it can't make more than one attack during its turn.
      If the creature wants to use an action to make an ability save to end this effect, they must instead roll an
      Intelligence save.</p>
