name: Medical Release Dead Heartbeat Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>When casting this jutsu, you must have fully intact corpse of a humanoid creature. You perform a type of
      surgery designed to induce a false heartbeat. At the conclusion of this jutsu's casting, the corpse begins to move
      at your behest. You must stay within 90 feet of the corpse while facilitating its temporary revival.</p><p>All
      wounds, and damage the corpse had prior to this jutsu's casting remains. The corpse you use this on only retains
      their memories. They can regain their personalities if you instead extend this jutsu's casting time to 1
      Week.</p><p>The corpse cannot disobey you, and must not act in any way that would bring you harm. The corpse has 1
      Hit points and calculates its AC as normal. It cannot cast jutsu, or use features by any means. The corpse remains
      active until you dismiss this jutsu as a bonus action or begin concentrating on any other jutsu or feature. A
      corpse can only be temporarily be brought back this way once ever using this jutsu.</p>
    chat: ''
