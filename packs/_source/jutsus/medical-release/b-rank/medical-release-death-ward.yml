name: Medical Release Death Ward
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You draw your chakra seal onto a talesman or scroll and place it onto a creature granting it a measure of
      protection from death. The first time the target would drop to 0 hit points as a result of taking damage, the
      target instead stops to 1 hit point, and the jutsu ends. If the jutsu is still in effect when the target is
      subjected to a hostile effect that would kill it instantly without dealing damage (Except Exhaustion), that effect
      is instead negated against the target, and the jutsu ends.</p>
    chat: ''
