name: Medical Release Grim Calling
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You weave summoning seals together and infuse them with medical release chakra manifesting the head of the
      Reaper of death. His fangs bite into you and draw out a fragment of your spirit turning it into a temporary source
      of necrotic power.</p><p>It screeches a spectral wail that penetrates to the souls of most creatures, calling and
      pulling on their spiritual selves. All creatures within range must make a Charisma saving throw. On a failed save,
      creatures take 6d8 necrotic damage and depending on the classification of the affected creature, alternative
      effects take place.</p><p>At Higher Ranks:For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3 chakra. If this jutsu is cast at S-Rank, you spend 1 additional hit die and increase the damage by
      2d8, and the number of hit die lost to 1d8 or the number of Tenacity die lost to 4.</p>
