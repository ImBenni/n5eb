name: Medical Release Reconstructive Hand
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You coat your hand in cell manipulating Medical chakra. You can attempt to manipulate the cellular integrity of
      a creatures cells.</p><p>As an action on your turn, you can touch a willing creature you can reach. When you do,
      you can jumpstart their cellular regenerative process. The creature regains hit points equal to 3d8 + Your
      ninjutsu ability Modifier. Afterwards, for the next minute, the creature regains 5 hit points at the beginning of
      each of their turns.</p><p>Alternatively, as an action you can attempt to touch a hostile creature you can reach.
      Make a melee ninjutsu attack. On a successful hit, they take 5d10 Necrotic Damage and become compromised. A
      compromised creature must make a constitution saving throw at the beginning of each of their turns for the next
      minute. Any jutsu or affect that would remove conditions can end the compromised condition on a creature.</p><p>A
      compromised creature who succeeds three saving throws first, ends this condition. A compromised creature who fails
      three saving throws first, has their cells begin to fail and rupture. They permanently gain two ranks of
      Exhaustion and the weakened, and dazed conditions. A creature who gains these conditions this way can have them
      removed only be a casting of; Restorative at A-Rank, Regenerate, Medical Aura and remain within the Aura for no
      less than 1 week straight, Medical Release: Heal or Reconstructive Hand on them no less than 3 times in an 8-hour
      period.</p>
