name: Medical Release Revival
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You send a surge of healing chakra through a creature that has been dead for no more than 1 minute that didn't
      die of old age, isn't undead, and not missing its head. You make a Medicine skill Check vs DC (20 + 1 for every
      round the target has been dead.) The target returns to life with 1 Hit Point. Missing body parts are not returned.
      Internal organs are healed and regenerated. This jutsu cures all normal diseases affecting the creature when it
      dies. This jutsu does not remove ranks of exhaustion a creature has accumulated prior to death.</p><p>Once a
      creature has been revived in this way, they cannot be revived again in the same way for 30 days, as their body
      simply cannot handle the strain of being forced back from the dead in such a fashion.</p>
    chat: ''
