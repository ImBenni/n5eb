name: Medical Release Strength of 100
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You use finely controlled chakra across your body, granting you strength of over 100 people. Your strength
      becomes 20 for the Duration. Your jump height and distance are doubled. You gain Advantage on Strength &amp;
      Constitution based ability checks, skill checks, and saves. When you make an unarmed attack, you deal 3d10
      Bludgeoning damage.</p><p>After you end this jutsu, you suffer the consequences of pushing your body to its limit.
      Your movement speed is halved, you gain disadvantage on Strength &amp; Constitution ability and skill checks.
      These lasts until you take a short rest.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d10.</p>
