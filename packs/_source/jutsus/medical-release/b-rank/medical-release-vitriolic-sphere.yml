name: Medical Release Vitriolic Sphere
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You point at a place within range, and conjure a glowing 1-foot ball of bubbling acid that streaks to the
      chosen location and explodes in a 15-foot radius sphere. Each creature in that area must make a Dexterity saving
      throw taking 10d4 Acid damage and 5d4 Acid damage at the end of its next turn and gains 1 rank of corrosion. On a
      successful save, a creature takes half the initial damage and suffer no further effects.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the initial damage by 2d4
      and the lingering damage by 1d4.</p>
