name: Medical Release Acid Spray
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You take a vial of poison ingesting and using your fine control of chakra, blend it with your stomach acid that
      you spray out like a jet in a straight line. Creatures in range must make a Dexterity saving throw. On a failed
      save, affected creatures take 6d4 Acid Damage and gain 1 rank of Corroded and they take another 2d4 Acid damage at
      the start of their next turn. On a success the target takes half as much damage and suffer no additional
      effects.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by
      3 and the initial and delayed damage by 2d4.</p>
