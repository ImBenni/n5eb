    value: "<p>You infuse medical chakra into yourself as you release it as an aura of supporting energy.</p><p>For this jutsu's duration, anytime you or a non-hostile creature in this jutsu's radius would take damage from a hostile creature, they immediately regain 8 Hit points. A creature can only be healed by this jutsu 5 times per casting, after which this jutsu no longer\_ effects them.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and\_ the maximum number of times a creature can be healed by this jutsu by +2.</p>"
