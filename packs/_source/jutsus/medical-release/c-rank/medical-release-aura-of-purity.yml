    value: >-
      <p>You infuse medical chakra into yourself as you release it as an aura of cleansing energy.</p><p>You release a
      potent wave of medical release chakra. All creatures within range who are currently under the effects of a Mental
      or Sensory conditions as a result of a jutsu of equal rank or lower, has all stacks (if any) of their condition
      removed, cleansing them.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3. Listed conditions inflicted by jutsu of equal rank or lower are removed.</p>
