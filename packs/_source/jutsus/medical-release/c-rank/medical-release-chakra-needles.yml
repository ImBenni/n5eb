system:
  description:
    value: >-
      <p>You create needles formed from your chakra and launch them at a creature you can see within range. Make a
      Ranged Ninjutsu check. Target creature takes 6d6 Necrotic damage on a hit and must succeed a constitution saving
      throw, losing 10 movement speed until the end of their next turn on a failed save.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, damage by 1d6 and reduce target
      movement by 5.</p>
