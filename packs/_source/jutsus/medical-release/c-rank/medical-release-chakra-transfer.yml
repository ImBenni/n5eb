name: Medical Release Chakra Transfer
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You place your hand on a creature and share your chakra with them, transferring it to them. Spend a number of
      Chakra die up to your proficiency bonus. When you do roll the spent die, recording the result and adding your
      Constitution modifier. Transfer the result to a willing creature. Chakra die spent in this way cannot be regained
      until you complete a long rest. If the creature is affected by a Genjutsu, they gain advantage on their next
      saving throw.</p>
    chat: ''
