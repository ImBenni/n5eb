      energy.</p><p>All creatures in a 30-foot long, 10-foot-wide line originating from you, must make a Constitution
      saving throw, taking 6d4 necrotic damage or half as much on a success. Creatures who failed, take 4d4 necrotic
      damage at the beginning of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
