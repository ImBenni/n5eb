name: Medical Release Encroaching Entropy
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You weave necrotic and decaying medical release chakra together and manifest it into a point you can see within
      range. The point expands until it is occupying a 20-foot radius sphere, forcing all creatures within its radius to
      make a constitution saving throw. On a failed save creatures take 3d8 necrotic damage and have their maximum hit
      points reduced by the same amount. On a successful save they take half damage and suffer no further
      effects.</p><p>A creature who's hit point maximum is reduced as a result of this jutsu, must make a constitution
      saving throw at the beginning of each of its turns, taking an additional 2d8 necrotic damage and having their
      maximum hit points reduced by the same value, taking only no damage on a successful save.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and both instances of damage
      by 1d8.</p>
