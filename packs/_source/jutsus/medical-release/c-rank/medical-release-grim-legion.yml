name: Medical Release Grim Legion
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You weave summoning seals together and infuse them with medical release chakra and a portion of your spirit,
      manifesting a summoning tag that you throw into a space you can see within range. From the chakra seal an echoing
      call of shadowy figures of your choice begin to manifest filling a 10-foot cube, which counts as difficult
      terrain. The creatures resemble once living entities you once knew. Whenever a creature starts its turn inside the
      cube, or within 5 feet of it, or enters the cube for the first time on its turn, the conjured shadows all
      strike.</p><p>Affected creatures make a Strength saving throw, taking 4d10 necrotic damage and dragging them 5
      feet towards the center of the cube and depending on the type of creature that fails the save, the following
      happens. A creature affected by either of the following effects cannot be affected by it again, until the end of
      this casters next turn;</p><p>• If the creature is considered a player character, it reduces the number of hit die
      it has by 1d4. If a creature affected by this jutsu has 0 Hit die, they take additional necrotic damage equal to
      your level on a hit.</p><p>• If the creature is considered an adversary, it loses 1 Tenacity die.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 chakra and the size of
      the cube by 5 feet. If this jutsu is cast at A-Rank, you spend 1 additional chakra die, increase the damage by
      2d10 and affected creatures are knocked prone prior to being dragged in closer.</p>
    chat: ''
