name: Medical Release Medical Aura
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>Life preserving Medical Chakra radiates from you in an aura with a 30-foot radius. Until this jutsu ends, the
      aura moves with you, centered on you. Each non-hostile creature in the aura, (including you) has resistance to
      necrotic and poison damage and becomes immune to the bleeding and envenomed conditions.</p><p>A creature's hit
      point maximum while within the aura cannot be reduced by hostile effects.</p><p>Additionally, creatures roll at
      advantage when makingsaving throws to resist an Elemental condition.</p><p>Lastly, a non-hostile, living creature
      regains 1 hit point when it starts its turn in the aura with 0 hit points. A creature can only regain hit points
      this way a number of times equal to its constitution modifier per long rest (Min 1.)</p>
    chat: ''
