name: Medical Release Metallic Rust
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You begin to generate acidic medical chakra and attempt to press it onto a creature, object or item of your
      choice.</p><p>Make a melee ninjutsu attack against a creature you can reach. On a hit, you deal 6d4 acid damage
      and the target becomes covered in acid becoming corroded.</p><p>A creature wearing armor suffers a permanent -1
      penalty to its AC bonus on a failed save. An Armor whose AC bonus is reduced to 0 is destroyed. Armor whose AC is
      suffering a penalty can be fixed by casting the Mending jutsu on it, removing all penalties or with 1 hour of work
      with an Armorsmith kit.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and the damage by 2d4.</p>
