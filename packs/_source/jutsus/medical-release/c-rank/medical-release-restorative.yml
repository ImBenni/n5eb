system:
  description:
    value: >-
      <p>Your hands glow with a warm blue hue as you touch a willing creature filtering out impurities and fixing
      debilitating conditions, they are suffering from with precise chakra control. Creatures suffering from an
      Elemental, Physical, Mental or Sensory condition from the use of a jutsu or effect of a rank, equal to or lower
      than what this jutsu was cast, are healed of one of those conditions, removing all ranks, if any.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. The number of
      conditions with a different name removed increases by +1.</p>
