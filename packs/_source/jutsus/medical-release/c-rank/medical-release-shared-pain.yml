name: Medical Release Shared Pain
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest a self-sustaining illusion designed to help soothe the mental scars of battle. Select one willing
      allied creature within range. You share your pain with them, reducing the damage you take by half, and inflicting
      psychic damage on the target ally equal to the damage you took.<br />At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of allies you can target by +1. You
      instead divide the damage you take, by the number of allied creatures you target with this jutsu.</p>
    chat: ''
