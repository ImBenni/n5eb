name: Medical Release Transfer of Life
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You sacrifice your life for another. Select one creature who has been dead for no longer than 10 Minutes whom
      you can reach. This jutsu cannot be used by Clones, Constructs or Undead.</p><p>When you do, you begin
      transferring all of your life energy into them. The creature regains all of its hit points equal to your current
      hit points. A creature revived as a result of this jutsu has all ranks of Exhaustion removed from
      them.</p><p>Reduce your Maximum hit points to 0, which cannot be increased by any means.</p>
    chat: ''
