name: Medical Release Venomous Reflux
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You begin to generate poisonous medical chakra and release it, causing it to erupt under a creature you can see
      within range.</p><p>Select one creature you can see within range. The target creature must make a constitution
      saving throw as poison erupts around them. On a failed save, they take 3d8 poison damage and cannot take reactions
      until the end of their next turn as they are coughing and hacking the poisonous gas back up trying to eject it
      from their bodies. On a successful save they take half damage and no further effects.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of creatures you
      can target by +1.</p>
