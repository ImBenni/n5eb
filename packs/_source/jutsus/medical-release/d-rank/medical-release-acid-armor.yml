name: Medical Release Acid Armor
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest acidic chakra in the form of a highly dangerous aura of chakra that intercepts attacks for you and
      harms those who would try to touch you. You gain 14 temporary hit points. Creatures who would deal damage with a
      melee attack take 6 acid damage each time they would deal damage, while you have temporary hit points granted by
      this jutsu. A creature who would strike you with a weapon attack or unarmed strike whose rank is equal to or less
      than the rank this jutsu was cast at has their weapon suffer a permanent -1 penalty until fixed by the Mending<br
      />ninjutsu. An unarmed attack such as your fists or legs can be fixed with any jutsu with the medical keyword that
      restores hit points or removes conditions. A weapon or limb which has reached a -5 penalty breaks, being destroyed
      by all of the acid covering it.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3 and the temporary hit points by 7 and the acid damage by 3.</p>
    chat: ''
