name: Medical Release Acid Beam
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest acidic chakra in the form of a powerful beam meant to melt through everything in its path. All
      creatures in a 60-foot long, 5-foot-wide line originating from you must make a Dexterity saving<br />throw. On a
      failed save, you deal 3d6 acid damage and at the beginning of an affected creature's next turn, they take 3d4 acid
      damage. Constructs and structures made of earth, metal or wood take double damage as the acid eats through
      them.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      and the damage by 1d6 and 1d4.</p>
