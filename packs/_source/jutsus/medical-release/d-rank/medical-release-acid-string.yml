name: Medical Release Acid String
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest acidic chakra in the form of barbed wires, enough to fill a 20-foot cube originating from you. For
      the duration, creatures, excluding you, who would begin their turn or enter for the first time on their turn, the
      affected area, they take 7 acid damage and an additional 7 acid damage for every 5 feet they would move through
      the affected area. A creature cannot take damage from the same 5 by 5-foot square more than once per
      round.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      and the size of the affected area by 5 feet.</p>
