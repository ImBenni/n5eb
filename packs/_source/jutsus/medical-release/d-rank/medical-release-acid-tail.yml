name: Medical Release Acid Tail
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest acidic chakra in the form of a beast's tail, be it a massive dragon tail, or large lions tail.
      Make one melee ninjutsu attack. Compare the result of your attack against all creatures in a 15-foot cone,
      originating from you. For each success, you deal 2d6 + 1d6 acid damage, for each additional creature hit after the
      first. Additionally, all creatures you deal damage to must succeed a Strength Saving throw. On a failed save,
      creatures are knocked prone and gain 1 rank of corroded.</p>
