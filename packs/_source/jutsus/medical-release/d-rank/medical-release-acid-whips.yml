name: Medical Release Acid Whips
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest acidic chakra in the form of two whips of acid designed to grapple and melt into your
      foes.</p><p>Make two ranged ninjutsu attack, dealing 2d6 acid damage on a hit. Additionally, creature you hit must
      make a Strength saving throw. On a failed save, they become grappled by you and your acid whips for the duration.
      A creature grappled by your acid whips takes 1d6 acid damage at the beginning of each of their turns.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number
      of attacks you make by +1.</p>
