name: Medical Release Acidic Cleanse
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You learn to bend acidic substances to you will, molding and manipulating them like puppets on a
      string.</p><p>All creatures within 15 feet of you who are under the effects of the corroded condition has their
      condition ended, as you collect all of the left-over acid into a ball above your head. The ball floats for up to 1
      minute or until used.</p><p>The next time you would cast a jutsu that would deal acid damage you can spend the
      ball of acid, upcasting the jutsu by 1 rank at no cost, ignoring upcasting limitations.</p>
