system:
  description:
    value: >-
      <p>You begin to generate a surge of twisted medical release chakra designed to shatter the bones and splinter the
      muscles of your target.</p><p>A creature you can reach must make a Strength saving throw. On a failed save their
      bones twist and their muscles spasm as they take 4d8 necrotic damage and they cannot use their arms to hold a
      weapon until the end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3, the damage by 1d8.</p>
