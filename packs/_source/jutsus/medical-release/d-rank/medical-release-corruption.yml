name: Medical Release Corruption
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You begin to generate a surge of twisted medical release chakra designed spread like a curse, draining all
      creatures in range. Select a space you can see within range. You manifest a 5-foot radius field of corruption. At
      the beginning of each of your turns for the duration, the size of the field grows by 5 feet.</p><p>All creature
      who begins their turns within the affected area or first enter the affected area on their turns, must make a
      Charisma saving throw. On a failed save creatures take 3d12 necrotic damage and no damage on a successful
      save.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3,
      the damage by 1d12.</p>
