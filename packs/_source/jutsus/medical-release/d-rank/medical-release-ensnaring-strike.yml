name: Medical Release Ensnaring Strike
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>The next time you hit a creature with a melee or ranged weapon or unarmed attack before this jutsu ends, you
      inject chakra into your enemy's muscles attempting to restrict their movements. The target must make a Strength
      saving throw or be restrained until the end of their next turn. A large or larger creature has advantage on the
      saving throw. While restrained by this jutsu, the target takes 1d8 poison damage at the start of each of its
      turns.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3
      and the damage by 1d8</p>
