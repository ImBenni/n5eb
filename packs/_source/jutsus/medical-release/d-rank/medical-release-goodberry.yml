name: Medical Release Goodberry
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>With fine chakra control, you can touch up to 5 fruits or nuts that are then infused with medical release
      chakra for the duration. A creature can use its action to eat any of the 5 affected food items. Eating a food
      infused with this jutsu restores 1 hit point and provides enough nourishment to sustain a creature for one day. A
      creature cannot benefit from this jutsu more than twice per longest. The infused food loses its potency if they
      have not been consumed within 24 hours of casting this jutsu.</p>
    chat: ''
