name: Medical Release Grim Mask
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: "<p>You weave summoning seals together and infuse them with medical release chakra manifesting the mask of the Reaper of death. The mask siphons a small fraction of your life force to don it, but it grants you a great deal of power in return. You cannot lose concentration of this jutsu as a result of damage.</p><p>Attacks you make deal an additional 1d4 necrotic damage for the duration. If an attack you make or jutsu you cast would deal necrotic damage as a part of its casting or through its lingering effects, the additional damage instead becomes a 1d8.\_</p><p>Additionally, an attack you make that scores a critical hit or one where you roll the maximum damage possible on the die, if your target is classified as a player character, it loses 1 hit die. If your target is classified as an Adversary, it loses 1 Tenacity die.</p>"
