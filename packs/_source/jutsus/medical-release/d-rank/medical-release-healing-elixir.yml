name: Medical Release Healing Elixir
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You use your medical kit to assist in creating a healing elixir which is contained in a simple vial that
      appears in your hand. The elixir retains its potency for the duration or until its consumed. As an action, a
      creature can drink the elixir or administer it to another creature. The drinker regains 3d4+3 hit points and
      immediately ends the Poisoned or removes 2 ranks of the Bleeding condition.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. When you cast this Jutsu at B-Rank, the
      drinker instead regains 3d8+6 Hit points and immediately ends the Poisoned, Dazed, Weakened or removes 4 ranks of
      the Bleeding condition. When cast at S-Rank, the drinker regains 3d12+9 and ends any single condition excluding
      Exhaustion, Prone, or Invisible.</p>
