name: Medical Release Honey Bee Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You summon a large swarm of bees made of poisonous medical release chakra that swarm and sting a single target
      that you can see within range.</p><p>Make a ranged ninjutsu attack. On a hit, you deal 2d6 Poison damage and the
      target must succeed a Constitution saving throw. On a failed save the targets joints begin to seize up for the
      next minute.</p><p>At the beginning of the target creatures turn they roll 1d12. On a roll of 1 or 2 the pain
      keeps them from moving Stunning them until the end of their turn. The target remakes the constitution save at the
      end of each of their turns ending this on a success. A Jutsu or effect that ends the poison condition can also end
      this condition.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3, the damage by 1d6 and the number of targets by +1.</p>
