name: Medical Release Poison Bullet
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You inhale air, as your saliva begins to build while pumping medical release chakra into it, putrefying the
      liquid until it becomes a poisonous substance that you can eject from your mouth like bullets. Make a ranged
      ninjutsu attack, dealing 3d6 poison damage. On a hit a creature damaged by this jutsu suffers a 1d4 penalty to
      their next attack roll or skill check until the end of their next turn. This penalty does not stack.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu
      is cast at B-Rank, the number of attacks you make by +1. If this jutsu is cast at S-Rank, the number of attacks
      you make by +2.</p>
