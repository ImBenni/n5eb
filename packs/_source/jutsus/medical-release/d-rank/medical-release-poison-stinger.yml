system:
  description:
    value: >-
      <p>You infused Medical Chakra on a thrown weapon as you putrefy it. Make a ranged ninjutsu attack against a
      creature within range. On a hit, the target takes your weapons damage + 2d6 Poison damage and must succeed a
      Constitution saving throw. On a failed save they are poisoned for 1 minute.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d6.</p>
