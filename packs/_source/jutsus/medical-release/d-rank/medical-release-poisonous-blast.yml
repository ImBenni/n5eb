  description:
    value: "<p>You mold medical release chakra in your belly to imitate the heat and power of the fire release nature transformation, before releasing it as a blast of sickly green or dark purple chakra from your hands or mouth.</p><p>All creatures in a 10-foot radius sphere centered on a point you can see within range, must succeed a Dexterity saving throw. On a failed save, creatures take 2d8 poison damage and gain the envenomed condition. On a successful save, creatures take half damage and no further effects.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 1d8 and the radius of the sphere by 5 feet.</p>"
