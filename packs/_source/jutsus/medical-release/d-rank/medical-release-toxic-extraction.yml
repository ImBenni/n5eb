name: Medical Release Toxic Extraction
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You can manipulate any substance comprised of toxic materials or poisonous components, much like a water
      release master, bending water to their whims. As an action on your turn, a creature you touch can have the poison,
      toxins or venoms drawn out of them through their skin. The substance coalesces into a mote of poison which you can
      choose to place into a vial, retaining it for later use, or dispersing it harmlessly.</p><p>The extracted poison
      retains its potency for the next 10 minutes and can be applied to a weapon or used as a component for another
      jutsu that requires it or a Poisoners kit.</p>
    chat: ''
