name: Medical Release Toxic Fangs
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You coat your hands in a poisonous liquid and use your medical release chakra to maintain its viscosity and
      lethality. For the duration, your hands, feet or teeth are coated in a heavily poisonous substance, ready to be
      used as striking instruments.</p><p>For the duration, you can spend your action to make a melee ninjutsu attack.
      On a hit you deal 3d4 poison damage and once per turn, you can force the target creature to make a Constitution
      saving throw. On a failed save, the target gains 1 rank of envenomed.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 1d4. If this jutsu is cast at
      B-Rank the number of attacks you can make becomes two. If this jutsu is cast at S-Rank, the number of attacks you
      can make becomes three.</p>
