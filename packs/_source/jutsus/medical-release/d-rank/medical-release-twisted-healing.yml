name: Medical Release Twisted Healing
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You begin to generate a surge of twisted medical release chakra designed to reverse the effects of healing,
      even making it detrimental to do so.</p><p>When you see a creature begin to mend their wounds, or have their
      wounds mended by another within range, you can swiftly prevent it. Roll 4d6, you reduce the amount of hit points
      regained by the result.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost
      of this jutsu by 3, the number of targets by +1, and the healing prevented by 1d6.</p>
