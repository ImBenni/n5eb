name: Medical Release Venomous Shards
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You mold medical release chakra in your hands to imitate the substance and structure of the earth release
      nature transformation, before releasing it as a quake of sickly green or dark purple crystalline structures from
      the ground itself.</p><p>All creatures in a 15-foot cube originating from you, must succeed a Constitution saving
      throw. On a failed save, creatures take 2d12 poison damage and have their movement speed reduced by 10 feet for
      the next minute. On a successful save a creature takes half damage and no further effect. A jutsu or effect that
      would end the poisoned condition, can also remove this effect.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 1d12 and the size of the cube by 5 feet.
      If this jutsu is cast at B-Rank and above on a failed save this jutsu also inflicts the envenomed condition. If
      this jutsu is cast at A-Rank and above, on a failed save this jutsu also leaves the affected area as difficult
      terrain.</p>
