      Constitution saving throw. On a failed save they take 3d6 necrotic damage.</p><p>Additionally, one creature of
      your choice ithin the chosen area regains 3d6 hit points.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3, the damage by 1d6 and the hit points regained by 1d6.</p>
