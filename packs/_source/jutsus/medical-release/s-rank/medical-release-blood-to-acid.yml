    description: >-
      <p><strong>Max Ranks</strong>: 5</p><hr /><p>A <strong>Corroded</strong> creature has been exposed to some kind of
      acidic compound, causing their flesh and equipment to wither and deteriorate if left untreated.</p><ul><li><p>A
      <strong>Corroded</strong> creature gains a -2 penalty to its DR (damage reduction) for each rank it
      has.</p></li><li><p>A <strong>Corroded</strong> creature gains a -1 penalty to all Constitution based checks &amp;
      saves for each rank it has.</p></li><li><p>A creature can end the corroded condition by using their action making
      a DC 15 Dexterity or Constitution Ability Check or submerging themselves fully into a body of water.</p></li></ul>
