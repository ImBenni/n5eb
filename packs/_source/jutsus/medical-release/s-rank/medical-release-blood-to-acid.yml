name: Medical Release Blood to Acid
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You mold acidic into a form of your choice before attempting to infuse it into a creature you can see within
      range, turning all of their blood into acid, destroying them from the inside.</p><p>Select one creature you can
      see within range. The target must make a Constitution saving throw, taking 10d12 + 40 acid damage on a failed save
      as all of their blood is turned to acid. A creature who passes the save only takes half damage and suffer no
      further effects.</p><p>A creature who failed their saving throw converts all ranks of bleeding or lacerated into
      corroded and ignores the stack limitations found in the condition until this effect is ended on them. At the
      beginning of each of its turns, it must make a Constitution saving throw or be stunned until the beginning of its
      next turn from the never-ending pain it experiences. A creature who has had its blood turned into acid gains a
      rank of corroded in place of any ranks of bleeding.</p><p>Additionally, it suffers 10d4 acid damage every hour as
      their acidic blood constantly destroys them from the inside. Its blood can be turned back to normal with a casting
      of this jutsu again targeting it, or by casting another ninjutsu with the medical keyword that removes conditions
      at S-Rank.</p>
