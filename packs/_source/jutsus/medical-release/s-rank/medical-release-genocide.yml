name: Medical Release Genocide
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You begin to generate corrupted medical chakra and infuse it with pure prejudice and malice towards a creature
      and their bloodline.</p><p>Select the name of a Clan or a specific creature if you are unsure of their clan. The
      target must be of a level equal to or lower than your own as you fire a blast of Necrotic chakra that cannot miss,
      so long as you can see them. The target must succeed a constitution saving throw. For every condition with a
      different name, they are under the effects of, they suffer a -2 penalty to their save. On a failure, the target
      takes 10d10+50 necrotic damage, or half as much on a successful save.</p><p>At the beginning of the affected
      creatures turn, pass or fail, tendrils of necrotic chakra leap out from that creature, up to 100 feet, to all
      other creatures that share the targets clan, or bloodline based on what you chose. All such creatures, excluding
      the original target, must make constitution saving throws, taking 50 necrotic damage on a failed save, or half as
      much on a success.</p><p>At the beginning of a creature who fails their saving throws from the tendrils, more
      tendrils leap out from them with the same restrictions an additional 100 feet repeating the previous process, but
      excluding all creatures who were previously affected by the jutsu. This affect repeats until no other creatures
      who share the original targets clan or bloodline are within range of the tendrils.</p>
