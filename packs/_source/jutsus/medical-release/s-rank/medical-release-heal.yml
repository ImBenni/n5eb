name: Medical Release Heal
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest and release a torrent of Medical chakra that flows out from you into injured creatures of your
      choice. You cannot reduce the cost of this jutsu by any means. You restore up to 500 hit points, divided as you
      choose among any number of creatures that you can see within range. Creatures healed by this jutsu are also cured
      of all diseases and any effect that inflicts conditions, regardless of the effects restriction or limitation. This
      jutsu has no effect on undead or constructs. Once cast, this jutsu cannot be cast again until you complete a Full
      Rest.</p>
