name: Medical Release Impending End
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You manifest and release a torrent of putrid Medical chakra that flows out from you into creatures of your
      choice. You cannot reduce the cost of this jutsu by any means. Creatures with 80 Hit points or less within range
      die as their heart stops, their blood thins, and their cells forget the functions they normally are tasked
      with.</p><p>Creatures who have between 81 and 100 Hit points, can feel their body begin to suffer from necrosis as
      they attempt to resist. These creatures make a Constitution saving throw. On a failed save, they become crippled
      by the pain. A creature crippled by the pain, speed can never be higher than 10, they have disadvantage on all
      rolls using Strength or Dexterity, and if they attempt to cast a jutsu of any type they must succeed a
      Constitution saving throw vs your Ninjutsu Save DC, on a failed save, they take 8d8 necrotic damage that ignores
      Temporary Hit points, Resistance and Immunity as their chakra network is attacked by the necrosis, temporarily
      reducing their Maximum chakra by the result as well. A crippled creature is crippled permanently, or until they
      have a Jutsu that removes conditions casted on them a S-Rank.</p>
    chat: ''
