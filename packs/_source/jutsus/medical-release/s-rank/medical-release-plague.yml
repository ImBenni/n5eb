name: Medical Release Plague
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You begin to generate poisonous, venomous and toxic medical chakra and infuse it directly into the air itself.
      Yourself and 10 other creatures of your choice are immune to the effects of this jutsu. Once this jutsu is cast,
      it continues to permeate the affected area forever after casting.</p><p>Dark green, purple and black clouds fill
      the air, as a foul smell of poison and toxins sail in the wind. A low moan can always be heard. Each creature who
      are under the clouds when this jutsu is cast must make a Constitution saving throw. A creature who is already
      suffering from a disease or who is poisoned or envenomed makes their saves at a -5 penalty. On a failed save, a
      creature gains 5 ranks of the envenomed condition and they are permanently poisoned unless removed by a Jutsu with
      the medical keyword that removes conditions of S-Rank. This jutsu ignores Immunity to the Poisoned Condition and
      Poison Damage. A creature can never have their hit points reduced below 0 as a result of the envenomed condition,
      instead forced to suffer until killed by other means.</p><p>Creatures who come into contact with a creature who
      was poisoned or envenomed by this jutsu must make the save as if they were under the clouds of this jutsu when
      cast.</p><p>A creature who would wake up from a rest of any type under clouds created by this jutsu must make a
      save as if they were under the clouds of this jutsu when cast.</p><p>The affected area grows by 1 mile every month
      until this jutsu is dispelled. The clouds can only be dispelled by 3 castings of a Ninjutsu with the Fuinjutsu
      keyword cast at S-Rank targeting them from within 10 feet of the original space the jutsu was cast from.</p>
    chat: ''
