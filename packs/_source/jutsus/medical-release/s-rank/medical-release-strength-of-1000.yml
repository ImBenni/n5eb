name: Medical Release Strength of 1000
type: spell
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>As a prerequisite for learning this jutsu you must know the "Strength of 100 Technique" Jutsu. You have
      mastered the "Strength of 100 Technique" perfecting the chakra control needed and finding the most efficient way
      to enhance your physical strength by over 1000 times. For the duration, your strength score Double. Your jump
      distance is multiplied by 4, your movement speed is tripled, you gain advantage on Constitution, Strength and
      Dexterity saving throws, and you regenerate hit points equal to 2d12+ your constitution modifier at the start of
      each of your turns.</p><p>When you make an unarmed attack, you deal an additional 3d10 Bludgeoning damage. When
      this jutsu ends or you deactivate this jutsu, your body experiences a massive shock. You gain 10 ranks of
      Exhaustion which 44 cannot be removed or healed by any means. You must complete at least 4 weeks of Recouperation
      during Downtime to remove them</p>
