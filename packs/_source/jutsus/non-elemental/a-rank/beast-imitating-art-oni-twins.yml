name: Beast Imitating Art Oni Twins
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You draw a picture of two Oni, Demons of your description. Infusing chakra into it as it exits your scroll and
      standing next to you.</p><p>You summon two construct Ink Oni's. The Ink Oni's has the following Statistics using
      your Ninjutsu attack bonus and Save DC for anything that requires an attack or saving throw;</p><p>You may command
      both Ink Oni's as a bonus action on your turn. Each Ink Oni may be commanded to perform different actions. The Ink
      Oni's may take an appropriate bonus actions or reactions if able.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above A-Rank, increase the cost of this jutsu by 3 and the number of Oni's you summon by +1.</p>
