name: Bestial Art Predator
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to mark yourself with the seal of Predation. You cannot
      reduce the cost of this jutsu by any means.</p><p>Your eyes become beast like with your iris looking more feline
      than human. Your muscles grow stronger and leaner, as you encompass a wolves physicality. Your senses grow sharper
      as you can tell the exact distribution of water in the air if you so choose.</p><p>For this jutsu's duration, you
      gain the following benefits;</p><p>• Your Strength, Dexterity and Wisdom becomes 19 if it is not already 19 or
      higher. If a score is 19 or higher already, you instead increase it by +2.</p><p>• You cannot be seen with Chakra
      sight.</p><p>• You gain a bonus to movement speed equal to 10 times your Strength Modifier.</p><p>• Your jump
      distance and height are doubled.</p><p>• Your Unarmed Damage is now 2d6+Str Mod + Dex Mod, Piercing or Slashing
      damage.</p><p>• Attacks of Opportunity you make are at advantage.</p><p>• When you take the Attack Action, you can
      make an additional attack, up to a maximum of three.</p>
