name: Crown of Stars
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You Create 8 Globes of light, that split into groups of 4 as they circle your wrists or ankles. You can use a
      Bonus Action to send one of the globes streaking toward one creature or object within 60 Feet of you. When you do,
      make a ranged Ninjutsu attack. On a hit the target takes 4d12 Force Damage. Whether you hit or miss you spend one
      globe and it vanishes after use. The Jutsu ends early if you expend the last globe or fall unconscious. If you
      have 4 or more globes, they shed a bright light in a 30-foot radius and dim light for an additional 30 feet. If
      you have less than 4, the remaining globes shed dim light in a 30-foot radius.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and the motes' damage by 1d12.</p>
    chat: ''
