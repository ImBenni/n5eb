name: Fission Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>The Fission Technique is a highly advanced ninjutsu which allows you to split your own body into two identical
      — yet entirely independent — duplicates of yourself. You cannot reduce the cost of this jutsu by any
      means.</p><p>Unlike clone techniques that only appear to be similar, the ability is instead a physical separation
      and so does not require hand seals to activate, making it faster in comparison as a result.</p><p>You may make an
      exact copy of yourself, you cut your current and maximum hit and chakra points in half and your clone gains that
      much, this clone is an exact copy of yourself being able to use your Class and Clan features &amp; jutsu.</p><p>If
      you have an expendable feature such as combo points or superiority die the clone gains half the amount you had
      when you casted this jutsu. The clone acts at the end of your turn.</p><p>At the end of this jutsu's duration you
      fuse back together, regaining any hit and chakra points the clone had, restoring your maximum hit and chakra
      points back to normal, and gaining any conditions, poisons or diseases the clone may have had.</p><p>If the clones
      body is destroyed, not whole, transformed (such as petrified) or not on the same plane of existence before
      refusing back together with you, you do not regain any hit or chakra points and your maximum hit and chakra points
      are permanently cut in half. If you can find your clones body and recast this jutsu while touching it, you refuse
      with it as normal.</p>
    chat: ''
