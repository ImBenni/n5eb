name: Lion Mane Needle Hell
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>An advanced version of the "Needle Jizo" Ninjutsu. You create a much thicker and much denser shield of hair
      that covers your entire body that also shoots your hair like needles outwards in a 360-degree area around you with
      enough force to tear boulders apart. You gain +4 AC for the duration of this jutsu and all creatures in a 15
      Foot-radius sphere centered on you, must make a Dexterity saving throw, taking 8d8 Piercing damage on a failed
      save, or half as much on a successful one.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d8</p>
