name: Reverse Seal Summoning
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You mark up to 6 willing Creatures with a chakra seal, marking them with your personal seal formation. With
      this seal, you can, as a bonus action, teleport creatures marked with your seal, to you, from up to 1 mile away.
      You may also Inversely teleport to them, as a bonus action, from up to 300 Feet away, occupying a space within 5
      feet of them that can hold you. Creatures marked can resist being summoned causing this jutsu to fail, if they
      resist you do not spend chakra.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase
      the cost of this jutsu by 3 and multiply the range by 10.</p>
    chat: ''
