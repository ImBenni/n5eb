name: Sealing Art Forcecage
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You impart a scroll with your chakra seal, which conjures an immobile, glowing blue, cube shaped prison
      composed of chakra, springs into existence around an area you choose within range. The prison can be a cage or a
      solid box as you choose</p><p>A prison in the shape of a cage can be up to 20 feet on a side. A prison in the
      shape of a box can be up to 10 feet on a side, creating a solid barrier of chakra that prevents any matter from
      passing through it and blocking any jutsu cast into or out of the area. Both the cage and box shaped barriers have
      200 Hit Points.</p><p>When you can the jutsu, any creature that is completely inside this Jutsu's area is trapped.
      Creatures only partially within the area, or those too large to fit inside the area, are pushed away from the
      center of the area until they are completely outside the area.</p><p>A creature inside the Forcecage can't leave
      it by non- teleportation means. If the creature tries to use teleportation to leave the Forcecage, it must first
      make a Charisma saving throw, on a success the creature can use that jutsu or feature to exit the Forceage. On a
      failure the creature can't exit the Forcecage and wastes the use of the jutsu or effect.</p>
