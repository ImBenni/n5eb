name: Sealing Art Shining Stars Soaring Strike
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>As a part of the requirements to cast this jutsu, you must know the Hollow Stars jutsu. You form two tiny
      objects in the shape of stars, in unoccupied spaces, that you can see within range. Each object has 45 Hit points
      and an AC equal to your Ninjutsu save DC. At the end of each of your turns, each object casts Hollow Stars at
      C-Rank as if you cast them, targeting appropriate locations within range of your choice.</p><p>If these objects
      are destroyed, this jutsu immediately ends.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank,
      increase the cost of this jutsu by 3 and the number of star shaped objects made by +1.</p>
