name: Sealing Art Tethered Essence
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to mark two creatures (excluding yourself) with the seal of
      mirrors.</p><p>Select two creature you can see within range. Each creature must succeed a Charisma Saving throw.
      They make this save at disadvantage if they are within 30 feet of each other. Either creature can willingly fail
      the save. If either creature saves, the jutsu has no effect. If both saves fail, the creatures are linked for the
      duration, regardless of the distance between them. When damage is dealt to one of them, the same damage is dealt
      to the other one. If hit points are restored to one of them, the same number of hit points are restored to the
      other one. If either of the tethered creatures is reduced to 0 hit points, the jutsu ends on both. If the jutsu
      ends on one creature, it ends on both.</p>
    chat: ''
