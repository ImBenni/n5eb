    description: >-
      <p><strong>Max Ranks</strong>: 5</p><hr /><p>A Sealed creature has a limiter on their chakra network, causing
      their chakra to become inefficient and wasteful. This condition is usually the result of a
      Fuinjutsu.</p><ul><li><p>A <strong>Sealed</strong> creature increases the base chakra cost of Ninjutsu &amp;
      Genjutsu by +2, for each rank it has.</p></li><li><p>A <strong>Sealed</strong> creature suffers a -1 penalty to
      all of their Ninjutsu &amp; Genjutsu Save DCs for each rank it has.</p></li><li><p>A creature can spend its action
      to make a DC 15 Ninshou or Illusions check to remove 1 rank of this condition. For every +5 their result is over
      the DC, they remove 1 additional rank of <strong>Sealed</strong>.</p></li></ul>
