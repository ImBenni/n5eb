name: Sealing Art Tobirama's Sword
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You conjure a sword-shaped place of spacial distortion that hovers within range. It lasts for the
      duration.</p><p>When the sword appears, you make a melee ninjutsu attack against a target of your choice within 5
      feet of the sword. On a hit, the target takes 5d10 force damage and gains 1 rank of Sealed.</p><p>Until the jutsu
      ends, you can use a bonus action on each of your turns to move the sword up to 60 feet to a spot you can see and
      repeat this attack against the same target or a different one. If this jutsu scores a critical hit, the target
      instead gains 5 ranks of Sealed</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase
      the cost of this jutsu by 3 and the amount of attacks the sword can make by 1 per round.</p>
