name: Touch of Death
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You come close and begin to touch a willing creature you can reach. This touch can be in the form of a grab,
      kiss, or hug. When you do, you immediately become aware of all nature affinities the creature has if
      any.</p><p>The target creature loses 10d6 Hit Points and you recover the same amount. If the creature has any
      Temporary Hit Points, they lose them and you gain the same amount. Temporary Hit Points you gain as a result of
      this Jutsu last for a minute before disappearing.</p><p>If you attempt to cast this jutsu on an unwilling
      creature, you make a melee Ninjutsu Attack. On a hit, this Jutsu's effects trigger as normal.</p><p>Additionally,
      if you reduce a creatures Hit Points to 0 as a result of this jutsu, you are temporarily able to steal their
      nature release from them, if they have any.</p><p>Until you complete a Long Rest, you randomly gain one of the
      target creature's' nature releases and one random Jutsu of C-Rank or lower, that requires that nature release that
      they knew. You cannot learn additional Jutsu of the stolen nature release unless you already have the chosen
      nature affinity. If you would gain another nature release as a result of this jutsu, you instead replace the
      previous nature release and jutsu known.</p>
    chat: ''
