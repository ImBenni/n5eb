name: Bestial Art Lycanthrope
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to mark yourself with the seal of wolves.</p><p>Your voice,
      figure, and temperament becomes bestial in nature. You grow fur of any color of your choice covering your arms,
      and your hands become large claws with iron like nails.</p><p>For this jutsu's duration, you gain the following
      benefits;</p><p>• Your Strength becomes 19 if it is not already 19 or higher. If it is 19 or higher already, you
      instead increase your Strength Score by +2.</p><p>• Your Unarmed Damage is now 2d8, but you no longer add your
      ability modifier.</p><p>• You gain a +20 bonus to movement speed.</p><p>• Attacks of Opportunity you make are at
      advantage.</p><p>• When you take the attack action, you can make two attacks instead of one, if you cannot
      already.</p>
