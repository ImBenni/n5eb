system:
  description:
    value: >-
      <p>You sacrifice some of your health to mend other creatures' injuries. Roll any number of d8s up to 6d8, you take
      that much in Necrotic Damage which can't be Reduced or Resisted or be made Immune to in any way, and one creature
      you can reach regains a number of Hit Points equal to twice the Necrotic Damage you take.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the maximum number of d8s
      you can roll by 2.</p>
