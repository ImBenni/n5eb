name: Lion Mane Hunting Predator
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You activate the roots of your hair causing your hair to grow at a heightened rate and granting you full
      control over your hairs movements.</p><p>For the duration of this jutsu you gain additional actions which you can
      take using your hair. For this jutsu's duration, when you would cast Needle Jizo, you may reduce Needle Jizo's
      Cost by -5 or Lion Mane: Needle Hell, reducing its cost by -10. (Both Jutsu to a minimum of 1)</p><p>1
      Action.</p><p>• Attack: You command your hair to lash out attacking a creature you can see within 90 feet of you.
      Make a melee ninjutsu attack. On a success you deal 3d10 piercing and 3d10 bludgeoning damage as your hair
      sharpens and slams into them.</p><p>• Wrap: You command your hair to lash out grabbing a creature you can see
      within 90 feet of you. Make a melee ninjutsu attack. On a success, you grapple and restrain them. A grappled
      creature makes a Strength (Athletics) or Dexterity (Acrobatics) check vs your Ninjutsu save DC to escape. On a
      failed check, they remain grappled and restrained by your hair. You can then move the grappled creature anywhere
      within 90 feet of you as if you were dragging them.</p><p>• Crush and Tear: You command your hair to crush and
      tear into a creature currently grappled by it. A creature grappled by your hair takes 12d6 slashing damage as it
      attempts to tear them apart. A grappled creature immediately gets to attempt their checks to escape after taking
      damage as a result of this action.</p>
    chat: ''
