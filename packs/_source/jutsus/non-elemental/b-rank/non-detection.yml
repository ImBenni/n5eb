name: Non-detection
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>For the duration, you suppress a creatures chakra which lowers their presence and hides them from all manner of
      sensory jutsu. The target can be a willing creature or an object. The target can't be sensed or seen by the Chakra
      Sight or Chakra Sensing special sense as a result of jutsu cast at an equal rank or lower. If a creature would
      gain either of these senses as a result of a feature or trait, this jutsu only works on creatures who is of a
      level equal or lower than the casters.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank,
      increase the cost of this jutsu by 3. If this jutsu is cast at A-Rank, this jutsu can now affect structures and
      small locations no larger than 30 feet by 30 feet. If this jutsu is cast at S-Rank, it can affect locations no
      larger than 100 feet by 100 feet.</p>
