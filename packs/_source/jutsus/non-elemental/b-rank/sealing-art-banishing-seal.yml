name: Sealing Art Banishing Seal
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to send them away with the seal of banishment.</p><p>Choose
      one creature you can see within range as you force them to make a Charisma saving throw or be sent to a pocket
      dimension of your creation. On a failed save they are banished to this pocket dimension. While banished, they are
      incapacitated and are unaware of any actions or happenings in the dimension they were just banished from. When
      this jutsu ends, they are summoned back into the same space they were originally banished from and gain 2 ranks of
      Sealed.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by
      3 and the number of creatures you can target by +1.</p>
