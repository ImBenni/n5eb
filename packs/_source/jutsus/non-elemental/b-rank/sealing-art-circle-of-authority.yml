name: Sealing Art Circle of Authority
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to mark yourself with the seal of domination. You then
      exude a 30-foot radius sphere of authority that other creatures must abide by. This radius follows you.</p><p>For
      this jutsu's duration, anytime a hostile creature in this jutsu's radius would make a saving throw against a jutsu
      you or an allied creature cast, they immediately take a -2 Penalty to their roll.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the radius by 5 feet.</p>
