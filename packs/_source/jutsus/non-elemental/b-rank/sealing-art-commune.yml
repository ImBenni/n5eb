name: Sealing Art Commune
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to mark yourself with the seal of relation.</p><p>You reach
      out into the void. Calling upon the spirit of a single deceased spirit, with whom you have a connection with, be
      it ancestral, legacy, ideals, historical, or antagonistic. The DM allow other forms of relation as well. You
      summon the spirit to the material plane and ask it three questions that can be answered with a yes or no. You must
      ask your questions before the jutsu ends. You the most correct answer possible from to the spirits
      knowledge.</p><p>The spirit is not omniscient, so you may receive unclear or uncertain answers, if a question lies
      beyond the spirits knowledge. In a case where a one-word answer could be misleading or contrary to the spirits
      interests, the DM may offer a short phrase as an answer instead.</p><p>A spirit cannot be summoned this way more
      than once per month.</p>
