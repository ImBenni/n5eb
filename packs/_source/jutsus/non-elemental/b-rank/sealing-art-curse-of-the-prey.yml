name: Sealing Art Curse of The Prey
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You attempt to impose the qualities of a single weak bestial creature. Select one creature within your reach.
      The target must succeed a Charisma saving throw. On a failed save, they gain one of the following bestial
      qualities.</p><p>Swallows Endurance: The creatures bones begin to feel hollow and brittle as their heart begins to
      beat furiously as their blood begins to thin. For the duration, they have a -3 penalty on all constitution saving
      throws, skill checks and ability checks. Additionally, they cannot take the Dash Action and cannot gain additional
      speed by any means.</p><p>Mites Strength: The creatures muscles begin to grow weak and unable to carry weight.
      They gain a -4 Penalty to their Strength ability score and disadvantage on Strength saving throws and attacks made
      with strength.</p><p>Sloth's Grace: The creatures reflexes are shot as they become unable to move gracefully or
      even carry themselves correctly. They gain a -4 penalty to their Dexterity ability score and disadvantage on
      Dexterity saving throws and ability checks. They also take double damage from falling, and they spend their full
      movement trying to stand from Prone.</p><p>Rhinoceros Splendor: The creatures vision, auditory perception and
      sense of smell becomes dull and weak as they gain a -4 Penalty to their Wisdom ability score and disadvantage on
      Wisdom ability checks. Their visual range is cut in half and they cannot hear things more than 30 feet away from
      them.</p><p>Turkey's Cunning: The creatures ability to think through complex matters and concepts becomes muddled.
      They find it hard to remember simple handsigns, colors and even their left from their right. They gain a -4
      Penalty to their intelligence ability score and disadvantage on intelligence saving throws and ability checks.
      They cannot concentrate on more than 1 Jutsu, and the Base Concentration check DC becomes 17.</p><p>Turtles
      Hubris: The creatures ability to exert is fore of will is hindered. They gain a -3 penalty on all charisma saving
      throws, skill checks and ability checks. Additionally, their Deception, Intimidation and Persuasion bonuses are
      reduced to 0.</p>
