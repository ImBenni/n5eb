name: Sealing Art Dimensional Pocket
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: "<p>You infuse chakra into a chakra seal as you attempt to tear open a rift in the fabric of reality, marking out a small space in the void for yourself with the seal of distortion.</p><p>As a part of the casting of this jutsu, you must mark a\_ epresentative space no larger than a 20-foot cube with chakra seals, doing this dictates the exact size of your pocket dimension.</p><p>If this jutsu casting time is interrupted, the jutsu ends and you must restart the process from scratch.</p><p>After successfully casting this jutsu, you create a room in the void, unable to accessed without jutsu that can traverse through dimensions or teleport ignoring space all together.</p><p>This room is one of your design and can look however you describe it. While inside this dimension, you are no longer on the material plane. You are unaware of what's going on, on the material plane. You cannot communicate with or locate people on the material plane. If you exit your room, stepping into the void, you are instantly shunted to a random location on the material plane. This can be anywhere from another country, to the bottom of the ocean, or even 10,000 feet in the sky.</p><p>This room produces no sound and cannot be found by normal means. You can freely access your room, by spending 10 minutes weaving handseals and materializing a gate which takes you directly to this room. The room has 4 walls, and can only ever be 1 floor. It has a single door, which cannot be locked by normal means, which leads to a short bridge feeding into a chakra gate which takes you back to the material plane from the exact location you entered to your room from originally.</p>"
