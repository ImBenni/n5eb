name: Sealing Art Divination Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to peer through the fabric of time, diving future events
      with the seal of perception.</p><p>You must ask a single question concerning a specific goal, event or activity to
      occur within 7 days. The DM offers as truthful a reply as possible. The reply might be a short phrase, a cryptic
      rhyme or an omen. You hear the aforementioned in your own voice as if you are speaking to a future version of
      yourself.</p><p>This jutsu doesn't take into account any possible circumstances that might change the outcome,
      such as the casting of certain jutsu, or the loss or gain of a companion.</p><p>You cannot peer into the future
      this way more than once per week.</p>
