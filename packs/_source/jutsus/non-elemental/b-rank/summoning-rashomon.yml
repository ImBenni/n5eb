name: Summoning Rashomon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You bite your finger drawing blood before using it as a catalyst to summon Rashomon, a 60 feet tall, 30 feet
      wide, and 5 feet thick gate made of iron, brick, chakra and other materials. This wall is erected standing
      straight upward. If you are in an area that cannot fit Rashomon, this jutsu will fail. Rashomon has 100 Hit
      Points.</p><p>The Rashomon unsummons itself after 1 minute, or if this Jutsu is cast again, whichever comes first.
      The Rashomon regains all of its Hit Points over the course of a Long Rest. If the Rashomon is summoned before its
      caster takes a Long Rest, it remains in the same condition it was in when it was unsummoned.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and Rashomon's Hit
      points by +25.</p>
