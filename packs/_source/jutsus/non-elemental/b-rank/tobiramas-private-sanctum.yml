name: Tobirama's Private Sanctum
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You make an area within range secure. This area is a cube that can be as small as 5 feet to as large as 100
      feet on each side. This jutsu lasts for the duration, or until you use an action to dismiss it.</p><p>When you
      cast this jutsu, you decide what sort of security it provides, choosing no more than 2 of the following;</p><p>•
      Sound can't pass through the barrier at the edge of the warded area.</p><p>• The barrier of the warded area
      appears dark and foggy, preventing vision (including Darkvision) through it.</p><p>• Sensors created by Jutsu with
      the Sensory Keyword can't appear inside the protected area or pass through the barrier at its perimeter.</p><p>•
      Nothing can teleport into or out of the warded area.</p><p>• Dimensional travel is blocked within the warded
      area.</p>
