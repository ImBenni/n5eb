name: Beast Imitating Art Bear
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You draw a picture of a bear. Infusing chakra into it as it exits your scroll and standing next to
      you.</p><p>You summon a construct Ink bear. The construct bear has the following Statistics;</p><p>You may command
      the Ink Bear as a bonus action on your turn. The Ink bear may take an appropriate reaction if able, such as attack
      of opportunity.</p><p>The Ink Bear uses your Ninjutsu Attack bonus and Save for all of its attacks and effect save
      DC's</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and the Ink Bears Hit points by 2d10+6.</p>
