system:
  description:
    value: >-
      <p>You touch a willing beast. for the duration of the jutsu, you can use your action to temporarily gain the
      special senses or sensory features of the beast you touch for up to 1 hour. After which this jutsu ends.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the length
      of time you retain the special senses by 1 hour.</p>
