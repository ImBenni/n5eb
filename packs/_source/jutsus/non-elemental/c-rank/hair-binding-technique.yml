name: Hair Binding Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>Using chakra, you activate the roots of your hair and begin to manipulate it freely. Because of the
      malleability of this hair, the user can attempt to grapple creatures completely immobilizing them. Select one
      creature within range. Make a melee ninjutsu attack. On a hit, the target is grappled by you.</p><p>Creatures
      grappled by this jutsu cannot use Chakra Seals (CS). At the end of a restrained creatures turn, they make a
      Strength saving throw, escaping on a success.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 the number of creatures you can target by +1.</p>
