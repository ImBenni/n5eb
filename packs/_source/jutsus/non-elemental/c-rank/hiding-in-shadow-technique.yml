name: Hiding in Shadow Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>As a part of the requirements to cast and maintain this jutsu a creature or object within range must be casting
      a shadow.</p><p>You select a creature, structure or objects shadow within range. Stealthily slipping inside of it,
      and gaining total concealment for this jutsu's duration.</p><p>For the duration of this jutsu, you can see and
      hear from the shadow but cannot act, speak, or move. When the creatures shadow moves, you move along with
      it.</p><p>You may end this jutsu early as a bonus action expelling yourself from the shadow appearing in the
      closest space near the target that can hold you.</p><p>If the target would lose their shadow by any means, this
      jutsu immediately ends as you appear in the closes space near the target that can hold you.</p>
    chat: ''
