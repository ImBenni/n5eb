name: Living Weapon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You touch a weapon an imbue it with your chakra and it begins to float within range and does so for the
      duration or until you dismiss this jutsu.</p><p>When you cast this jutsu you can move the weapon 30 feet an make a
      melee ninjutsu attack against a creature within 5 feet of the weapon. On a hit, the target takes the 2d8 + your
      ninjutsu ability modifier of your weapon's damage type.</p><p>As a bonus action on your turn, you can move the
      weapon up to 20 feet and repeat the attack against a creature within 5 feet of it.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d8.</p>
