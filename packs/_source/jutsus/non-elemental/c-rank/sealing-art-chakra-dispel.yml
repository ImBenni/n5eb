name: Sealing Art Chakra Dispel
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to end a jutsu with the seal of Dispis.</p><p>Choose any
      creature, object, or chakra-based effect you can see as you mark it with your chakra seal. You then attempt to end
      any Ninjutsu or Genjutsu currently affecting it of a rank less than the rank this jutsu was cast at.</p><p>If the
      Jutsu is of a rank equal to this jutsu, you instead must make an ability check, using your ninjutsu ability
      modifier. The DC equals (13 +the rank of the Jutsu, D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5). If the
      jutsu is of a rank higher than this jutsu, you make the ability check at disadvantage, unable to add dice-based
      bonuses to your check.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3</p>
