name: Sealing Art Circle of Defiance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to end a jutsu with the seal of resistance.</p><p>For this
      jutsu's duration, as a bonus action you may select one willing creature within range. That creature gains
      Temporary hit points equal to 2d8 + Your Ninjutsu ability Modifier, until the end of your next turn.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the amount
      of temporary hit points by 1d8 and the number of creatures you can target by +1.</p>
