name: Sealing Art Darkness
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: "<p>You imbue your chakra seal to conjure a field of darkness. You throw your seal at a point you choose within range. The chakra-based darkness spreads from the seal, to fill a 15-foot radius sphere for the duration. The darkness spreads around corners. A creature with Darkvision or Chakra Sight can't see through this darkness, and light created using an effect or jutsu of C-Rank or lower cannot illuminate it. If the point you choose is on an object you are holding or one that isn't being worn or carried, the darkness emanates from it and moves with it. If any of this jutsu's area overlaps with an area of light created by a jutsu of B-Rank or higher this darkness is\_ dispelled.</p>"
