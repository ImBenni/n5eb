    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to mark a creature you can see with the seal of patience.
      This counts as Interrupting a jutsu's casting.</p><p>A creature who you can see within range, who cast a Taijutsu
      or Bukijutsu, must first make a Charisma saving throw. On a failed save the target creatures speed is reduced to 0
