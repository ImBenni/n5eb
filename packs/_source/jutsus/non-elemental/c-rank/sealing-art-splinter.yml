name: Sealing Art Splinter
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to mark a person with the seal of prevention and then
      shatter it causing a fracture in their internal balance of Yin and Yang. A creature you can see within range, must
      make a Charisma saving throw. On a failed save the target creature takes 5d8 Chakra damage, gains 1 rank of Sealed
      and is unable to make Hand Signs (HS) until the end of their next turn.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d8. If this jutsu is cast at
      A-Rank, increase the ranks of sealed to 2.</p>
