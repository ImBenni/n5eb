name: Shadow Clone Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>An Advanced Version of the Clone Genjutsu that creates a solid clone out of thin air using only chakra called a
      Shadow Clone. When a Shadow Clone is killed, it sends its most recent experiences within the last minute as
      thoughts and images to its Summoner. A Shadow Clone presents itself as its own person. A creature looking at a
      Shadow Clone with chakra sight cannot tell that it is not a real person unless otherwise specified.</p><p>This
      jutsu's caster can further enhance its casting. By doing this the caster can create up to 4 Shadow Clones at once,
      each clone after the first costing 3 chakra. All Shadow Clones act at once and attempt to perform the same command
      given. If commanded to perform the help action, they can only help the Summoner. Shadow Clones do not have
      Reactions and each clone has basic versions of your melee or ranged weapons. Weapons your Shadow Clone is summoned
      with that has the ammunition property cannot be given to anyone.</p><p>Shadow Clones can only cast jutsu of C-Rank
      or lower. If multiple shadow clones attack the same creature, you do not make multiple attack rolls. You instead
      choose a lead clone and it gains a +1d4 bonus to its damage roll(s), for each additional clone that is aiding
      it.</p><p>At Higher Ranks: If this jutsu is cast at B-Rank or higher, increase the number of clones you can create
      with this jutsu by 2. If this jutsu is cast at A-Rank, Shadow Clones you summon can cast jutsu of B-Rank or
      lower.</p>
