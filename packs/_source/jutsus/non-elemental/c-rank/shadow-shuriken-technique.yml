name: Shadow Shuriken Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>Keywords: Ninjutsu, Bukijutsu</p>

      <p>You throw a single weapon, when you do, you quickly multiply it five-fold, creating multiple copies of it while
      in transit. Creatures within this jutsu's range must succeed a Dexterity saving throw taking 5dX + your Dexterity
      modifier on a failed save, or half as much on a success. (X equals the original Damage die of the thrown weapon
      d4, d6, d8, d10, d12).</p>

      <p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the
      damage by 2dX.</p>
