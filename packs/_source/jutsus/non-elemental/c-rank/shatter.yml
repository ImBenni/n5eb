name: Shatter
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You place your hands on a solid surface within range before your hand vibrates and releases a massive surge of
      chakra creating a sudden loud ringing noise, that erupts from a point of your choice within range. Each creature
      excluding you, in a 15-foot radius sphere centered on the point of your choice within range must make a
      constitution saving throw, taking 4d6 bludgeoning damage and being dazed on a failed save and half as much on a
      successful one. Constructs have disadvantage on the saving throw, takes double damage and cannot be resistant or
      immune to this jutsu.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3 and the damage by 1d6.</p>
