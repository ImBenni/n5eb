system:
  description:
    value: >-
      <p>You set a chakra seal that expands 30 feet across the ground or surface it is placed on and it releases a very
      faint and mostly undetectable aura of chakra in a 30-foot cube. Until the Jutsu ends, an alarm alerts you whenever
      a creature touches or enters the Seals area. When you set the seal, you can designate creatures that don't set off
      the alarm. You can also choose to make the alarm mental or audible.</p>
