name: Beast Imitating Art Bat
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You inscribe into your scroll the image of a bat to blind you enemies. Make a ranged ninjutsu attack against a
      medium or smaller sized creature. On hit the creature becomes blinded as the bat latches onto their face blocking
      vision.</p><p>As an action on the creatures turn, they can attempt to pull the bat off by making a Strength saving
      throw ending the blinded condition on a successful save.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and this number of attacks this jutsu can make by +1.</p>
