name: Beast Imitating Art Deer
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You draw an image of a herd of deer that charge from your scroll towards your chosen target. Make a ranged
      ninjutsu attack. On a success, the target creature takes 2d8 in Bludgeoning damage and must make a Strength saving
      throw, being knocked prone on a<br />failed save.</p><p>If this jutsu is cast targeting a prone Creature, you do
      not roll disadvantage, instead rolling advantage and dealing an additional 2d6 bludgeoning damage.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by
      1d8.</p>
