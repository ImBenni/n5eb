name: Beast Imitating Art Pidgeon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: "<p>You take your scroll and begin to write a message of any length that you can conceivably write within a 10 minute or less time span. Once complete, the writings manifest into the form of a bird of your description and now carry themselves. You can also cast this jutsu targeting a message already written of 25<br />words or less.</p><p>The bird you create has 1 hp and an AC of 15. You then specify a location that you have previously visited and a recipient who matches a general description. You can also then give the bird a letter, scroll, tag, or similarly small object to deliver to this creature. The construct travels for the duration of the jutsu towards the location, covering no more than 50 miles per 24 hours.</p><p>When the bird arrives, it turns back into the message when provided a scroll to be placed on and delivers any packages to the creature you described. The bird will only release the object to the creature you specified or if killed. The creature dissipates into non-staining ink when the message is delivered or it is killed.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and duration increases by 24 hours. When casting this jutsu at B-Rank or Higher, the bird becomes large in size and is capable of carrying two medium size creatures on its back.</p><p>\_</p>"
