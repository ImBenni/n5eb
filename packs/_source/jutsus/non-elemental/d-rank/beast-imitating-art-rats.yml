name: Beast Imitating Art Rats
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>When you cast this jutsu you draw a horde of rats into your scroll. After 1 minute the picture is finished and
      the rats come to life scattering around. After a 10-minute delay, you can make a Ninshou check. Based on your
      level of success, you become aware of a variety of things within a 1-mile radius.</p><p>• DC 10: You become aware
      of structures that are not hidden within range. This does not inform you of their specific location or size, only
      their general direction.</p><p>• DC 15: You become aware of any non-hidden creatures within range. This does not
      inform you of their specific location or even the type of creature they are, only their general direction.</p><p>•
      DC 20: You become aware of hidden structures within range.</p><p>• DC 25: You become aware of the size of
      Structures and the types of creatures within range.</p><p>• DC 30: You become aware of hidden creatures.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu
      is cast at B-Rank, increase the range of this jutsu to 2 miles. If this jutsu is cast at S-Rank, increase the
      range of this jutsu to 3 miles.</p>
