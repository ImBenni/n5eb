name: Beast Imitating Art Retrieval Hawk
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You hurriedly draw an image of a hawk to retrieve something for you. The hawk breaks out of your scroll and
      attempts to retrieve an object no more than 10 pounds and bring it to a destination of your choosing within
      range.</p><p>The hawk has a fly speed of 45ft, AC of 15 and 1 hp. The hawk must stay within the range of this
      jutsu from the caster at all times and does not require the caster's actions to command aside from its initial
      creation. The destination of delivery can be changed as a bonus action on the casters turn.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the hawks speed by 10 feet,
      the weight it can carry by 10 pounds and this jutsu's range by 30 feet.</p>
