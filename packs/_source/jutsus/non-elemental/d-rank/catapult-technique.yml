name: Catapult Technique
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>Choose one object weighing no more than 1 bulk within range, that isn't being worn or carried. The object flies
      in a straight line up to 90 feet in a direction you choose before falling to the ground, stopping early if it
      impacts a solid surface. If the object would strike a creature that creature must make a Dexterity saving throw.
      On a failed save, the object strikes the target and stops moving. In either case, both the object and the creature
      or solid surface takes 3d8 bludgeoning damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and the maximum bulk of the objects that this jutsu can use increases
      by 1 bulk, and the maximum distance by 10ft. This jutsu's damage also changes depending on the affected object's
      bulk:</p><p>1 Bulk or less: 3d8.</p><p>2 Bulk: 4d8</p><p>3 Bulk: 5d8</p><p>4 Bulk: 6d8</p><p>5 Bulk: 7d8</p>
