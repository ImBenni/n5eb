name: Chakra Skin
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You coat yourself in a Protective aura of chakra, protecting you from damage. When you cast this jutsu, you
      lose the benefits of any Armor you are wearing, utilizing this Jutsu's AC calculation for its duration.</p><p>Your
      AC becomes 13 + your Intelligence Modifier + Half of your proficiency Bonus. This jutsu ends if you dismiss it as
      a Bonus action.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this
      jutsu by 3. If this jutsu is cast at C-Rank or higher, you gain Temporary hit points equal to your Ninjutsu
      ability modifier. As a Bonus action on your turn, you can replenish these Temporary hit points for 5 Chakra. If
      this jutsu is cast at B-Rank or higher, increase the AC this Jutsu grants by +1. If this jutsu is cast at A-Rank
      or higher, the Temporary hit points gained, is instead equal to half of the casters Ninjutsu ability score. If
      this jutsu is cast at S-Rank or higher, increase the AC this Jutsu grants by +2, instead of +1</p>
