name: Lock/Release
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You place a chakra seal on a closed door, window, gate, chest, or other entryway, and it becomes locked for the
      duration. You and creatures you designate when the jutsu is used can open the object normally. You can also set a
      password that when spoken within 5 feet of the object releases the jutsu for 1 minute.</p><p>This jutsu also works
      inversely allowing you to attempt to lock pick using your chakra alone. Make an Intelligence (Chakra Control)
      check vs the Locks DC as if you are picking a lock using a Security kit. Creatures attempting to open the object
      you have locked with this jutsu must make an Athletics check vs your Ninjutsu save DC to force open the
      object.</p>
    chat: ''
