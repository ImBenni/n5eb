name: Oppressive Aura
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You begin to exert chakra into an oppressive aura around yourself with enough intensity to be seen by the naked
      eye and even move loose materials such as dirt, leaves, and water droplets. Creatures who are within 10 feet of
      you upon activation of this jutsu must succeed a Streanth saving throw to not be pushed to their knees and become
      prone for the duration, becoming unable to stand while inside the aura. Creatures knocked prone by this jutsu
      makes a constitution saving throw on their turn to end the effect. If a you, or an affected creature moves outside
      of the aura, the jutsu's effect ends on them immediately. A creature affected by this jutsu, who ends or escapes
      its effects, cannot be affected again until the end of their next turn.</p>
