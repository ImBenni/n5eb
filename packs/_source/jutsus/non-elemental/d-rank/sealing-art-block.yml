name: Sealing Art Block
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you attempt to manifest a seal of protection. When you or a willing
      creature would be the target of, or would make a saving throw or skill check against, any jutsu with the Fuinjutsu
      keyword you enact a defensive ward meant to protect until the beginning of your next turn. They gain a +2 bonus to
      their AC, saving throws, and ninshou checks against jutsu with the Fuinjutsu keyword.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank
      or higher, increase your AC and saving throw bonus to +3. If this jutsu is cast at S-Rank or higher, increase your
      AC and saving throw bonus to +4</p>
    chat: ''
