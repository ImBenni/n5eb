name: Sealing Art Lock
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: "<p>You infuse chakra into a chakra seal as you attempt to mark an object with a seal of objection. You must select either an unattended object or a creature you can see within range who is holding an item. If an unattended item it is instantly bound to the surface it is currently resting on. If a creature holding an object, that creature must succeed a Strength saving throw. On a failed save the object the target is holding is sealed and bound to the nearest surface within range; be it the floor, a wall, or ceiling.</p><p>For the jutsu's duration the item remains bound to that surface unable to be moved by any means.</p><p>A creature within 5 feet of the sealed object may attempt to remove the seal by making an Intelligence (Ninshou) check vs your Ninjutsu save DC. On a successful save they break the seal freeing the item.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the range by 30 feet.</p>"
