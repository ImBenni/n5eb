name: Sealing Art Reverberate
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you mark a weapon you touch with a seal of veneration.</p><p>For the
      duration, this [Weapons Damage] die is increased by +1. If the weapon already rolls more than one die when it
      deals damage, you instead increase the damage die by one step. (d4&gt;d6&gt;d8&gt;d10&gt;d12)</p><p>This weapon
      cannot be targeted with another jutsu or effect that would change its damage type, die, add additional damage die,
      or augment it further by any means. If it is the target of such a jutsu or effect, it shatters.</p><p>If this
      weapon scores a critical hit the seal shatters and you reroll any 1's taking the second result. This jutsu then
      immediately ends.</p>
