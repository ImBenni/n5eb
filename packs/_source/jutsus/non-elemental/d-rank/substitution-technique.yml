      you would take damage you may increase your AC by +3 until the beginning of your next turn. If this bonus would
      cause the triggering attack to miss, you may move up to half of your movement away. If you activate this jutsu as
      a result of making a saving throw, you must still make the saving throw even if your movement would move you to
