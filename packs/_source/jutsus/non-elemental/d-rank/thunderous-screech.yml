name: Thunderous Screech
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You create a focused high-pitched screech that affects creatures in the direct path of the sound waves.
      Creatures in the target area must make a Constitution saving throw. On a failed save their body is rocked by the
      thunderous shockwave of sound. They gain 1 rank of Concussed and lose concentration on any one Jutsu of equal rank
      or lower they were concentrating on. On a successful save they suffer no effects.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the cone size by +5ft.</p>
