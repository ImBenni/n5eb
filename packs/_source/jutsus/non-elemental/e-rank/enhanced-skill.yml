system:
  description:
    value: >-
      <p>You focus chakra toward different parts of your body to enhance your ability to complete different tasks. When
      you fail a skill check using a physical ability score (Strength, Dexterity or Constitution), you can add+2 to that
      failed check, potentially turning a failure, into a success. Once you cast this jutsu, you cannot do so again for
      10 minutes.</p><p>At Higher Levels: This Jutsu's skill reinforcement increases as you increase in level. This
      bonus increases by +2 at 5th Level (+4), 11th level (+6), 17th level (+8)</p>
