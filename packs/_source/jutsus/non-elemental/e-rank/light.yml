name: Light
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You touch one object that is no larger than 10 feet in any dimension. Until the jutsu ends, the object sheds
      bright light in a 10-foot radius and dim light for an additional 10 feet, the light is a soft blue/ Completely
      covering the object with something opaque blocks the light. The jutsu ends if you cast it again or dismiss it as
      an action.</p><p>If you target an object held or worn by a hostile creature, that creature can must make a
      Dexterity saving throw to avoid the jutsu.</p>
