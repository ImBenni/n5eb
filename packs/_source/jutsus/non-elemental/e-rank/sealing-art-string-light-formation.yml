name: Sealing Art String Light Formation
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You use your chakra to create a sealing formation stretching from yourself to a target creature you can see
      within range, in a straight line. Target creatures must make a Charisma saving throw, reducing both your movement
      speed and the targets to 0 on a failed save. This can be used with others targeting the same creature, increasing
      the Save DC by +1 for each additional user. At the end of the target creatures turn, they remake their save.</p>
