    value: "<p>You and 3 other users of this jutsu take position in 4 points, surrounding the area you wish to seal. You each take position in 4 different points no more than 60 feet away from one another and each spend your turn activating this jutsu. When all 4 are complete you bend time and space sealing away the enclosed space in a pocket dimension composed of null space. Creatures trapped in this pocket dimension, are unable to escape unless they perform the same jutsu, or can teleport using the \"Flying Thunder God: Guiding Thunder\", \"Displacement Sealing Trap\", \"Flying Thunder God\", or \"Four Yang Formation\" Ninjutsu.\_</p>"
