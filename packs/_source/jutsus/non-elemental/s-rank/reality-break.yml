name: Reality Break
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You shatter the barriers between dimensions thrusting them into turmoil and madness. The target must make a
      Charisma saving throw or it can't take Reactions until the jutsu ends and must also roll a d10 at the start of
      each of its turns; the number rolled determines what happens to the target as shown on the Reality Break Effects
      table. If used while inside of a pocket dimension created by another jutsu, that dimension collapses on itself,
      being destroyed, and ejects all creatures and objects in it outside the pocket dimension.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/reality-break.webp" />
