name: Sealing Art Impure World Destruction
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You infuse chakra into chakra seals as you attempt to tear into the underworld with the seal of the
      consecration.</p><p>You summon a coffin to act as a gateway to the underworld. The coffin springs open, as shadow
      tendril like hands launch forward piercing the body a creature you can see within range. Make a ranged Ninjutsu
      attack. On a hit, you deal 18d10 necrotic damage.</p><p>If this jutsu reduces a creature to 0 Hit points, their
      soul is torn from their body as it is sealed within the coffin.</p><p>Moving forward, until there is not a soul
      bound to the coffin, whenever you would cast this jutsu, you instead summon an undead construct of the creature
      you originally killed using this jutsu. The construct acts at the end of your turn, and follows your command. It
      can speak freely but cannot willingly act in a way counter to any action you provide it. The construct has half as
      many hit points it had in life, can cast jutsu and use clan features it had in life using your chakra
      instead.</p><p>A construct summoned this way can only remain summoned for 1 minute before being pulled back into
      the coffin at the end of the duration to be saved for later use.</p><p>A construct that is killed while summoned
      does not return to the coffin, instead relinquishing the soul that was bound to it.</p>
