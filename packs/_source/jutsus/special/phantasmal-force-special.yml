  description:
    value: "<p><span id=\"page77R_mcid13\" class=\"markedContent\"><span dir=\"ltr\">Keywords:</span> <span dir=\"ltr\">Genjutsu</span><span dir=\"ltr\">, Tactile</span></span></p>\n<p><span class=\"markedContent\">A beam of shifting Psychic energy of your design or description streaks towards a creature within range.<br />\_Make a ranged genjutsu attack against the target.<br />\_On hit, the target takes 1d10 Psychic damage.<br />\_At Higher Levels: This genjutsu can create more than one beam when you reach higher levels.<br />\_Up to two beams at 5th level, three beams at 11th level, four beams at 17th level.<br />\_You can direct the beams at the same target or different ones.<br />\_Make a separate attack roll for each beam.<br /></span></p>"
