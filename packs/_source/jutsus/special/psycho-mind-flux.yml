  description:
    value: "<p>You combine the two unique Yamanaka clan jutsu into this new one, Psycho Mind Flux.<br />Select one creature you can see within range.<br />It must make a charisma saving throw.</p><p>Critical Success: No further effects.</p><p>Success: Targe take 4d8 psychic damage.</p><p>Failure: Target take 5d8 psychic damage and must make one weapon attack against one of its closest allied creatures.</p><p>Critical Failure: Same as failure, but instead of a weapon attack, the target must cast a damaging jutsu at the highest rank possible against its closest allied creature.</p><p>\_</p><p>At Higher Ranks: for each rank you cast this jutsu above the D-Rank, increase the damage by 4d8 and the number of creatures you can targer by +1.</p><p>\_</p>"
