name: Tool of Night
type: spell
img: icons/magic/symbols/triangle-glowing-green.webp
system:
  description:
    value: >-
      <p>Imbuing your blade with dark and necrotic energies, you greatly enhance its abilities to slice away at foes.
      For the duration of this jutsu, the weapon deals an additional d6 of Necrotic Damage, any number of times per
      turn, and qualifies as the Claws of Night jutsu for all features or jutsu that would reference or require it. You
      may treat Vesper Taijutsu as if they were Bukijutsu. You cannot benefit from Tool of Night and Claws of Night at
      the same time.</p>
