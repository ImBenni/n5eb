system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have at least the "Third Heavenly Breath: Breathe" or any
      of the Heavenly breaths thereafter active and you cannot lose concentration of this jutsu as a result of
      damage.</p><p>For the Duration of your Heavenly breath's, you gain a special action called Combo
      Extension.</p><p>Combo Extension. This special action is regained for the duration of this jutsu, at the beginning
      of each of your turns. For the duration, this special action can be cast a Taijutsu with a Casting time of either
      an Action or Bonus Action or take the Dash action.</p>
