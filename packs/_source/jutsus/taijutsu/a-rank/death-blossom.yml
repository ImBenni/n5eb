name: Death Blossom
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>Keywords: Taijutsu, Finisher</p><p>You strike a downed creature in the chest, in an attempt to stop their
      beating heart with a single strike. This jutsu can only be used against a creature who is dazed, prone and who is
      not a construct.</p><p>Make a melee taijutsu attack. On a hit, the target must succeed a constitution saving
      throw. On a failed save, they take 10d6 in necrotic damage which cannot be reduced by any means or half as much on
      a success.</p><p>If this jutsu is used as a Finisher, on a failed save, the target instead takes 10d6 necrotic
      damage and suffers 5 ranks of lacerated</p><p>If a creature has its hit points reduced to 0 as a result of this
      jutsu or Laceration cause by this jutsu, their heart explodes.</p>
