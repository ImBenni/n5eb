name: Disabling Blow
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You strike at your target's joints attempting to disable them for an extended period of time. Make a taijutsu
      attack against each target within 5 feet of you, of your choice. Each target takes twice your [Unarmed Damage] and
      have their movement speed reduced by half and forcing them to make a Constitution saving throw.</p><p>On a failed
      save, they gain +2 ranks of Weakened and become unable to take reactions against you. An affected creature can
      remake their saving throw at the end of each of their turns to gain the ability to take reactions.</p>
