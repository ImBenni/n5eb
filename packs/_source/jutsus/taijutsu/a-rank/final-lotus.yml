name: Final Lotus
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast as a Taijutsu Finisher</p><p>As part of the requirements of this jutsu, you must
      have at least the "Fifth Heavenly Breath: Respire" or any of the Heavenly breaths thereafter active or at least
      Tomon from the 8 Inner Gates: Keimon Taijutsu Feat.</p><p>The target of this jutsu must be restrained or grappled.
      Make five taijutsu attacks against the target. On a Hit, Target creature takes Unarmed damage +1d6. If all five
      attacks hit, you make a 6th attack. On a hit with the 6th attack, you deal 10d6 Bludgeoning damage and knock the
      target prone. (This Jutsu cannot score a critical hit)</p><p>After this jutsu, you immediately end either your
      Heavenly Breaths or 8 Inner Gates.</p>
