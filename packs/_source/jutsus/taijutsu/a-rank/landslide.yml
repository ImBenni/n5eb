name: Landslide
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a part of the requires to cast this jutsu, you must currently be standing on an incline or slope style
      terrain.</p><p>You take a solid stance and stomp the ground sending out light but effective shockwaves throughout
      the surrounding terrain. All delicate structures, environment, creatures and materials excluding you, within 120
      feet, that is not anchored into the ground at least 1 to 5 feet deep or holding on to something that is anchored
      into the ground, begin to aggressively slide down the incline or slope.</p><p>Once cast, this inclined or slopped
      surface counts as difficult terrain. All stone, must, snow, trees, debris, structures and creatures that begin to
      slide down this incline or slope must succeed a dexterity saving throw at the beginning of each of their turns to
      avoid being struck by other falling debris sliding down the slope with them.</p><p>Things falling or sliding down
      this slope or incline do not stop falling or sliding until the reach solid, flat ground. All objects, environment,
      structures and constructs fall 60 feet per round, while creatures fall 45 feet per round.</p><p>Creatures who fail
      their saving throws are struck with a solid surface or object, structure or creature sliding as a result of this
      jutsu and suffer 4d6 bludgeoning damage per object, structure or creature within 5 feet of them while
      sliding.</p><p>A creature can spend their reaction on another creatures turn to attempt a Strength (Athletics)
      check to slow their decent by half (round down) at the beginning of their next turn.</p><p>A creature no longer
      standing on the inclined or sloped surface at the beginning of their turn does not need to make any athletics
      checks or saving throws due to this jutsu.</p><p>This landslides duration is entirely DM's discretion based on the
      total height of the actual incline or slope and the volume of things that fall in its totality. This jutsu can
      stripe a large section of a mountain side or begin a city threatening avalanche on a snowcapped mountain.</p>
