    value: >-
      <p>You enrich your arms and legs with chakra that increases combat prowess. For the duration, you have advantage
      on attack of opportunities, and twice per turn, your unarmed attacks deal an additional die of damage. Also, up to
      twice per turn, when you make an unarmed attack, target creatures must make a Constitution saving throw or reduce
