name: Sixth Heavenly Breath Gasp
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must have Fifth Heavenly Breath: Respire currently active. You end
      your concentration on that jutsu and this one takes its place. You retain all of the effects and duration of that
      jutsu, stacking them with this jutsu's effects.</p><p>You increase your heart and lung size two-fold. Doing so
      increases your body's ability to filter poisons and provide nutrition throughout. The aura that surrounds you
      begins to glow far more intensely as it begins to coalesce into a storm like formation. Your first two taijutsu
      deal 1d8 bonus damage, and you gain 30 Temporary Hit Points which stack with other Temporary Hit Points granted by
      Heavenly Breath taijutsu.</p><p>Upon ending this jutsu, you gain 2 ranks of the Weakened condition and 1 rank of
      the Slowed condition until you finish a long rest. This cannot be removed or ended early except by a jutsu with
      the Medical keyword of S-Rank.</p>
