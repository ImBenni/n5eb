name: Supreme Pacification
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>An advanced pacification technique meant to completely remove a creature from combat or prevent them from
      entering combat all together.</p><p>As a part of the activation of this jutsu, you must target a single creature
      putting all of your focus upon them. Make a single melee taijutsu attack. On a hit, you immediately grapple and
      restrain the target. The target can spend their reaction to make an opposed Strength (Athletics) check to break
      free immediately ending this jutsu, remaining grappled and restrained on a failed check.</p><p>On an affected
      creatures turn; they must spend an action to attempt to escape by making a Strength saving throw.</p><p>While a
      creature is grappled and restrained this way, they cannot form handseals, perform the help action, or make any
      Strength of Dexterity skill checks.</p><p>Additionally, they cannot speak or make verbal sounds as you have their
      mouth covered as well.</p><p>After 5 rounds, a creature restrained in this way, must begin to make constitution
      saving throws at beginning of each of their turns. On a failed save, they fall unconscious.</p><p>While you are
      grappling a creature in this way, your movement speed is reduced by half, you cannot take the dash action, you
      cannot form handseals, and you cannot concentrate on ninjutsu or genjutsu.</p>
