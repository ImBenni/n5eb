name: Supreme Violence
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You pump chakra through your body until you can puppet your body with your chakra alone allowing you to react
      with but a thought. As a part of the activation of this jutsu you cannot concentrate on any Ninjutsu or Genjutsu
      for the duration of this Taijutsu.</p><p>For the duration you gain a bonus to your AC equal to half of your
      proficiency bonus and you gain a special reaction call Violent Reprisal.</p><p>Violent Reprisal. When a creature
      would make a melee attack with you as their target, you can spend your reaction to cast a Taijutsu with the
      casting time of 1 action that makes no more than two attacks against the triggering creature</p>
    chat: ''
