name: Asakujaku Morning Dove
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast as a Taijutsu Finisher targeting an airborne or falling creature. As a part of
      casting this jutsu, you must be gaining the benefits of at least the Fifth Heavenly Breath: Respire Taijutsu or
      any Heavenly Breath taijutsu of a higher rank. Once this jutsu is cast, you cannot cast it again until you spend
      at least 10 minutes recovering from the strain it places on your body.</p><p>You leap into the air in a
      distinctive stance as air fills your lungs and your muscles bulge from your blood pathways expansion. You begin to
      punch with enough force to imitate falling stars. Each punch create small sonic booms without enough force to be
      felts up to 100 feet away. You strike with enough consistency and technique to create the image of dove from the
      expansion of air surrounding you and your target.</p><p>Make a number of melee taijutsu attacks equal to the
      number of Heavenly Breaths you are benefiting from dealing bludgeoning damage equal to 1d10 + Your taijutsu
      ability modifier on each hit. If you Score at least 5 hits this way, at the conclusion of this jutsu, the target
      is slammed back into the ground and have to make a Constitution saving throw, being stunned until the end of their
      next turn on a failed save.</p>
