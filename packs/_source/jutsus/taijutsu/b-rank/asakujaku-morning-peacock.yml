name: Asakujaku Morning Peacock
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast as a Taijutsu Finisher targeting an airborne or falling creature. As a part of
      casting this jutsu, you must be gaining the benefits of at least the Gate of Tomon from the 8-Inner Gates: Keimon
      Taijutsu feat or Keimon or any 8 Inner gate granted by the 8-Inner Gates: Shimon. Once this jutsu is cast, you
      cannot cast it again until you spend at least 10 minutes recovering from the strain it places on your
      body.</p><p>You leap into the air in a distinctive stance and begin punching the enemy repeatedly, so quickly in
      fact that they are set ablaze by the sheer speed and friction which in turn, creates a peacock-like fan of flames
      around the target.</p><p>Make a number of melee taijutsu attacks equal to your proficiency bonus dealing 1d6
      damage on the first hit, then each successful hit after the first, increase damage die by +1. You cannot add your
      ability modifier to the damage dealt in any way. If you Score at least 5 hits this way, at the conclusion of this
      jutsu, the target is slammed back into the ground, taking falling damage as if they had fallen 50 feet and have to
      make a Constitution saving throw, being stunned until the end of their next turn on a failed save.</p>
