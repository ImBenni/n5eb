name: Full House
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>While falling you change trajectory to instead come down diagonally against a creature within range.</p><p>You
      come down aggressively with the force of a falling star. Move up to 30 feet towards a creature you can see within
      range, ending your movement within 5 feet of the target. Make a melee taijutsu attack dealing your [Unarmed
      Damage] + 4d8.</p><p>If this jutsu is used as a Finisher, you instead deal your [Unarmed Damage] + 7d8 and all
      creatures within 10 feet of the target must make a Strength saving throw as the force of your kick cracks the air
      and creates an unprecedented shockwave. On a failed save the creatures are thrown 10 feet away into a pace that
      can hold them</p>
