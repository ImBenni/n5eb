name: Hunter's Feast
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You hone in on your adversaries physical form, looking for ways to strike them in their vital points. You do
      not need to spend chakra to maintain concentration on this jutsu.</p><p>Make a Taijutsu ability check vs a DC 13 +
      the targets rank (E-Rank: 0, D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5). On a success, you find weak
      points in their form. This jutsu does not work against inorganic creatures such as constructs.</p><p>For the
      duration, while you can see the creature, the first two times each turn you deal your [Unarmed Damage], you deal
      +2d8 necrotic damage to the target.</p><p>If the target would ever leave your line of sight this jutsu immediately
      ends.</p>
