name: Leaf Earth Crush
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You slam your feet into the ground with the Passion of Youth TM, fragmenting and shattering the
      earth.</p><p>All creature in in range must make a Dexterity saving throw to dodge and avoid the spears of stone,
      metal or whatever materials the ground is made of. On a failed save, creatures take 3d8 piercing damage and are
      knocked 25 feet into the air, becoming airborne until the end of the current turn.</p><p>The affected area becomes
      difficult terrain until cleared or restored.</p><p>Until the end of your turn, you can target one affected
      creature with a Taijutsu Finisher regardless of range, once per turn, using either an Action or Bonus action,
      ignoring its listed casting time.</p>
