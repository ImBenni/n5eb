name: Leaf Gust
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You swipe your leg with enough force to create a localized shockwave strong enough to bludgeon creatures and
      objects in range while also blowing them away.</p><p>Creatures and objects in a 30-foot cone originating from you
      must make a Strength saving throw, being knocked up 30 feet into the air on a failed save. An airborne creature
      cannot take a reaction to jutsu you cast with the Finisher keyword before the end of the current turn.</p><p>Until
      the end of your turn, you can target one affected creature with a Taijutsu Finisher regardless of range, once per
      turn, using either an Action or Bonus action, ignoring its listed casting time.</p>
