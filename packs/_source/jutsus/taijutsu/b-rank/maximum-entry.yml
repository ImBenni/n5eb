name: Maximum Entry
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You move at remarkable speeds vanishing like the wind. Choose up to 5 creatures you can see within range. Make
      a melee taijutsu attack against each target. On a hit, a target takes your [Unarmed Damage] + 4d8 and inflict 1
      rank of bruised. You then teleport to an unoccupied space you can see within 5 feet of one of your targets you hit
      or missed.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu Finisher
      regardless of range, once per turn, using either an Action or Bonus action, ignoring its listed casting
      time.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3
      and the number of creatures you can target by +1.</p>
