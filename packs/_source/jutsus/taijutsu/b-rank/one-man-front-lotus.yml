name: One Man Front Lotus
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have at least the "First Heavenly Breath: Inhale" or any of
      the Heavenly breaths thereafter active or any of the 8 Inner Gates class feature active.</p><p>You leap into the
      air before beginning to spin turning yourself into a drill with enough force to create spiraling wind and dust
      that trails you as you come crashing down into a target of your choice that you can see within range. Make a melee
      taijutsu attack against the target, dealing your unarmed damage + 5d6. All creatures within 10 feet of the target
      must succeed a Strength saving throw to avoid being thrown back 10 feet from the force.</p><p>If this jutsu is
      used as a Finisher, you instead make a melee taijutsu attack against the target, dealing your unarmed damage +
      5d12. Additionally, all creatures within 10 feet of the target must succeed a Strength saving throw, being knocked
      back 20 feet from the force, becoming incapacitated from the force and falling prone.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage by 1d8.</p>
