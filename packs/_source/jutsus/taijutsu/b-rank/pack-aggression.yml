name: Pack Aggression
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you must currently be under the effects of the Wolf's Stance.</p><p>You
      ferociously attack a creature with the aggression and ferocity of a pack of wolves. Make two melee taijutsu
      attacks targeting a creature you can see within range dealing your [Unarmed Damage] + 2d6. On each successful hit,
      increase your next attacks critical threat range by +1 for this jutsu's duration.</p><p>If this jutsu is used as a
      Finisher, you instead make three melee taijutsu attacks.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above B-Rank increase the cost of this jutsu by 3 and the damage by 1d6.</p>
