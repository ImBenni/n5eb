name: Passionate Dancing Leaf
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You are filled to the brim with the Passion of Youth TM, and you let it guide your movements.</p><p>All
      creature in a 45-foot cone originating from you must succeed a dexterity saving throw to dodge and avoid the
      plethora of punches and kicks you throw out as you dance across the battlefield, before returning back to place in
      an instant. On a failed save, creatures take 5d6 bludgeoning damage and are knocked prone.</p><p>Until the end of
      your turn, you can target one affected creature with a Taijutsu Finisher regardless of range, once per turn, using
      either an Action or Bonus action, ignoring its listed casting time..</p><p>At Higher Ranks: For each rank you cast
      this jutsu above B-Rank increase the cost of this jutsu by 3, the damage by 1d6.</p>
