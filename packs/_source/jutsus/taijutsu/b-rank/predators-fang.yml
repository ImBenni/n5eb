name: Predators Fang
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast as a Taijutsu Finisher. As a part of casting this jutsu, you must currently be
      under the effects of the Serpent Fist Stance.</p><p>You take both of your hands and shape them into a serpents
      open maw with its fangs showing before you perform a series of strikes meant to break an enemy down.</p><p>Make
      three melee taijutsu attacks, dealing your unarmed damage + 2d8. For each successful hit the target must succeed a
      Strength saving throw. On each failed save, the target creature suffers a -1 penalty to their strength or
      dexterity ability scores for the next minute. A creature whos ability score is penalized in this way can spend a
      full-turn-action to readjust themselves, restoring their ability scores back to normal.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above B-Rank increase the cost of this jutsu by 3 and the number of attacks by
      +1.</p>
