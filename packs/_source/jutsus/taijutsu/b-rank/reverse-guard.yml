name: Reverse Guard
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a Reaction to being hit by a melee attack, Make a Martial Arts check. Your roll becomes your AC until the
      end of this turn and against the triggering attack. If a melee attack would miss you this turn, you can reverse
      the attack on to the target, and the attack now instead targets the triggering creature. If they would miss your
      AC by 10, you gain an additional Reaction which you can use to cast a Taijutsu with the casting time of 1
      action.</p>
    chat: ''
