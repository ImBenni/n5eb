name: Steel Knuckle
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the Iron Fist Stance and this Jutsu can only
      be cast as a Finisher.</p><p>You perform a series of high-powered strikes with full intention to cause harm, break
      bones and crush your enemies. Make a two melee taijutsu attacks. On a hit, you deal your [Unarmed Damage] + 3d12
      and force the target to make a Strength saving throw. On a failed save, you knock them back a number of feed equal
      to 10 x your Strength ability modifier.</p><p>If you knock a creature away from you with any attack granted by
      this jutsu, you gain bonus movement speed up to the number of feet you knocked the target away, 247 which you can
      only use to move to a space within 5 feet of the target that can hold you. If they strike a solid surface that's
      less than 5 feet thick, they tear through it if they have at least 10 or more feet remaining to be knocked back,
      taking 4d6 bludgeoning damage for each surface they go through.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above B-Rank increase the cost of this jutsu by 3, the damage by 1d12 and 1d6</p>
