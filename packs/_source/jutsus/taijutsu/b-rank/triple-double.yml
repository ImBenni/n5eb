name: Triple Double
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You support your allies by breaking your mutual enemies defenses, setting them up for a brutal
      finisher.</p><p>Make a single melee taijutsu attack against a creature within range. On a hit, you deal your
      unarmed damage.</p><p>You grant two allies within 15 feet of you an additional reaction, which they can only use
      to cast a Taijutsu or Bukijutsu with the Finisher keyword that has a casting time of 1 Action.</p><p>Until the end
      of the current turn, up to two allied creatures within 15 feet of you, can target the triggering creature with a
      Taijutsu or Bukijutsu Finisher regardless of range, one per turn each, using a reaction.</p>
