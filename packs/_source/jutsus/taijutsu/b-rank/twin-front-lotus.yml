name: Twin Front Lotus
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast if you have one other caster who is within 15 feet of you. The second caster as a
      part of their reaction moves to a space within 5 feet of you that they can occupy.</p><p>As part of the
      requirements of this jutsu, both you and the second caster must have at least the First Heavenly Breath: Inhale or
      any of the Heavenly Breaths thereafter active or any of the 8 Inner Gates class feature active the target must be
      airborne or falling.</p><p>You and the second caster leap into action grabbing and wrapping the target in you and
      the second casters battle wire as you begin to spin creating a 3-person drill creating dust trails as the three of
      you come crashing down into the ground with the force of a meteor.</p><p>Each caster makes a melee taijutsu attack
      each dealing their unarmed damage + 5d8.</p><p>If this jutsu is used as a Finisher, you both instead make a melee
      taijutsu attack against the target, dealing the attacking creatures unarmed damage + 5d12. Additionally, all
      creatures within 30 feet of the target must succeed a Strength saving throw, being knocked back 20 feet from the
      force and falling prone.</p><p>Combination: When this jutsu is cast, it gains additional effects based on who has
      the highest Charisma modifier between both casters.</p><p>• +0-1: No Change.</p><p>• +2-3: Affected creatures must
      succeed a constitution saving throw vs whichever of the two casters has the higher taijutsu save DC, becoming
      Incapacitated for 1d4 rounds on a failed save.</p><p>• +4-5: Affected creatures must succeed a constitution saving
      throw vs whichever of the two casters has the higher taijutsu save DC, becoming Stunned for 1d4 turns on a failed
      save.</p>
