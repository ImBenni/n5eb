name: 10-Count
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You dash forward to perform a series of rapid but light strikes designed to get your blood flowing.</p><p>Make
      a number of Taijutsu Attacks equal to your Taijutsu Ability Modifier, dealing 1d4 bludgeoning damage, to a maximum
      of 10.</p><p>If you successfully hit a creature with at least 3 of these taijutsu attacks, the next taijutsu you
      cast before the end of your turn gains a +3 bonus to attack and damage rolls.</p><p>Until the end of your turn,
      you can target one affected creature with a Taijutsu Finisher regardless of range, once per turn, using either an
      Action or Bonus action, ignoring its listed casting time.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above C-Rank increase the cost of this jutsu by 3. If cast at B-Rank or higher, increase the damage by +1d4. If
      cast at A-Rank or higher, increase the damage by +1d4. If cast at S-Rank or higher, this jutsu's cast time becomes
      a bonus action.</p>
