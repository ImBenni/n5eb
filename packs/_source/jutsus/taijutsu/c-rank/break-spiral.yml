name: Break Spiral
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You leap onto your back on the ground as your perform a series of spinning kicks resembling a spinning top,
      striking all creatures around you. This jutsu can only be cast as a Finisher.</p><p>All creatures within 5 feet of
      you must make a Dexterity saving throw. On a failed save they take are buffeted by a series of spinning kicks
      taking your [Unarmed Damage] + 6d6 and are knocked prone.</p><p>A creature who failed their saving throw by 5 or
      more are Dazed and must spend their Action to stand from being prone.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the radius of this jutsu by 5 feet.</p>
