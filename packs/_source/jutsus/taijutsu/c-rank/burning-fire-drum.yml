name: Burning Fire Drum
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You reach your hand out and attempt to beat the left lung of a hostile creature.</p><p>Make a melee taijutsu
      attack against the triggering creature. On a hit, their lung swells. For the next minute, when the affected
      creature casts a Jutsu with the Mobility (M) component, they take 2d6 necrotic damage, which ignores Resistance,
      Immunity, Damage Reduction and Temporary Hit Points, as their lung swells more.</p><p>A creature who would trigger
      this Jutsu's damaging effect 5 or more times while under its effects has their lung rupture, dealing 10d6 necrotic
      damage, which ignores Resistance, Immunity, Damage Reduction and Temporary Hit Points and gain 4 ranks of
      Exhaustion for the next 24 hours, this jutsu then immediately ends.</p><p>A creature can spend their action to
      make a Constitution Saving throw to end this jutsu's effects on them. Alternatively, a creature can end this
      effect with any Jutsu with the Medical Keyword, that removes conditions of C-Rank or lower.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3 and the number of creatures
      you can target by +1. If cast at A- Rank or higher, when a creature lung ruptures, they instead take 15d6 Necrotic
      Damage. If cast at S-Rank, creatures make their saving throw to end this jutsu's effects, at disadvantage.</p>
