name: Collier Shoot
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You leap off the ground no more than 5 feet and perform a powerful roundhouse kick targeting a creatures neck
      as you attempt to drag them into the ground. Make a melee taijutsu attack. On a hit, you deal your [Unarmed
      Damage] + 2d8 and the target must make a Strength saving throw. On a failed save, the target is knocked prone and
      is embedded into the ground as you kick them no more than 2 feet into the ground. A creature embedded into the
      ground is counted as Restrained by the ground itself and must make a Strength (Athletics) check vs your Taijutsu
      save DC to pull themselves from the ground.</p><p>Until the end of your turn, you can target one affected creature
      with a Taijutsu Finisher regardless of range, once per turn, using either an Action or Bonus action, ignoring its
      listed casting time.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase the cost of
      this jutsu by 3 and the damage by 1d8.</p>
