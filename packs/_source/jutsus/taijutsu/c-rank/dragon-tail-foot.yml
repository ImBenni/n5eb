name: Dragon Tail Foot
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You perform sweeping kick, before performing a downward vertical kick to slam a target creature into the
      ground. Creatures within 5 feet of you must make a Dexterity saving throw, being knocked prone.</p><p>If a target
      is knocked prone by the effect of this jutsu, select one target and make a single melee taijutsu attack dealing
      your [Unarmed Damage] + 3d6.</p><p>Until the end of your turn, you can target one affected creature with a
      Taijutsu Finisher regardless of range, once per turn, using either an Action or Bonus action, ignoring its listed
      casting time.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this
      jutsu by 3 and the damage by 1d8</p>
