system:
  description:
    value: >-
      <p>After dodging an enemy's melee attack, you leap on their shoulder and attempt to throw them 30 feet in a
      direction of your choice. The target must succeed a Strength saving throw, being thrown 30 feet in a straight
      line, in a direction of your choice.</p><p>A thrown target must succeed a Dexterity saving throw, landing prone on
      a failed save.</p><p>If the target hits a surface such as a wall, ceiling, or large or larger object they take
      damage as if they were falling.</p>
