name: Elementania
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you can only target a creature whom you can target with a Finisher as a result
      of a Jutsu cast with the Combo keyword.</p><p>You bob and weave in and out of a creatures combat range, building
      up momentum, preparing yourself for a massive strike that takes the shape and visage of a roaring elemental
      storm.</p><p>Make a melee taijutsu attack, dealing your [Unarmed Damage] + 4d12. Your attack gains the following
      benefits based on the elemental affinity you wished to imitate (Pick one when you cast this jutsu)</p><p>• Earth:
      The ground and earth around you shakes and upheaves. All creatures within 10 feet of the original target must make
      a Dexterity saving throw, taking 3d6 bludgeoning damage from the erupting earth.</p><p>• Wind: The wind whips and
      whistles as you forcefully move it out of your way. The target must succeed a Strength saving throw, being thrown
      back 15 x your Taijutsu ability modifier, feet on a failed save. If the target would hit a solid surface as a
      result of this knock back. They take 2d6 bludgeoning damage for every 15 feet that they were unable to be
      moved.</p><p>• Fire: Your attack creates such wind resistance that your striking limb ignites into flame on
      impact. Your attack instead deals Fire damage and the target must succeed a Constitution saving throw, gaining 1
      rank of the burned condition on a failed save.</p><p>• Water: Your attack becomes graceful, like flowing water,
      allowing you to strike far more effectively. Reroll all 1's and 2's, taking the second result.<br />• Lightning:
      Your attack is swift, decisive and powerful, like lightning. When your attack hits the target, creatures up to 300
      feet away can hear an audible boom erupt from the point of impact. All creatures, excluding you, within 30 of the
      target creature must succeed a Constitution saving throw, being Dazed until the end of the next turn.</p>
