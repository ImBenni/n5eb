name: Fist Slam
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a part of the activation of this taijutsu, you must target a prone creature. Make a melee taijutsu attack
      against the prone target dealing 6d6 bludgeoning damage and creating a 15-foot-deep hole in the ground while
      leaving them dazed.</p><p>If this jutsu is used as a Finisher, your strike drives home your Strength and ferocity.
      On a hit, you deal 9d6 bludgeoning damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d6</p>
