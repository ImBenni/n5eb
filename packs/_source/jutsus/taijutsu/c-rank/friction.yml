name: Friction
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You move in to finish off your enemy with a powerful debilitating strike.</p><p>Make a melee taijutsu attack.
      On a hit you deal your [Unarmed Damage] and the target must make a Constitution saving throw. On a failed save the
      target is stricken with a crippling affliction causing them to be unable to take the Dash, Dodge, Disengage, Help
      or Ready Action for the next minute.</p><p>If this jutsu is used as a Finisher, you make three melee taijutsu
      attacks. If all three attacks are successful, then the target immediately fails their saving throw and the target
      cannot take the Dash, Dodge, Disengage, Help, Ready, Use an Object, or any Skill-Actions for the next
      minute.</p><p>An affected creature can make spend an action to make a Constitution ability check vs your Taijutsu
      save DC to end this effect early.</p>
