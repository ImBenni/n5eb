name: Heavy Jolt
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You take a low stance as you place all of your weight into your primary leg, before you perform a powerful
      sweeping kick, cracking their air from the weight of it.</p><p>All creatures within 5 feet of your of your choice
      must succeed a Dexterity saving throw. On a failed save, creatures take your unarmed damage + 4d8 and are Dazed
      until the end of their next turn.</p><p>On a successful save they take half damage and no further
      effects.</p><p>If at least one creature fails the saving throw, you can choose to knock that creature back 30
      feet. If you do, you immediately move up to 25 feet, following after them. Your movement does not provoke attacks
      of opportunity, but your targets movement does.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank increase the cost of this jutsu by 3 and the damage by 1d8.</p>
