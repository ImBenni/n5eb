name: Lagging
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You open your hand and angle your fingers until your hand looks more like a claw as you attempt to slam your
      hand into the joints of your enemies to delay their actions.</p><p>Make a melee taijutsu attack. On a hit, you
      deal your unarmed damage and the target must succeed a Strength saving throw. On a failed save, until the end of
      their next turn, If the affected creature attempts any activity that requires an action they must roll a d20. On a
      roll of 11 or more, their action is delayed until their next turn, in which they spend their next action to
      complete this original activity. Regardless of the result, this jutsu then immediately ends.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank increase the cost of this jutsu by 3. If this jutsu is cast
      at B-Rank, reduce the die roll result to 9 or higher to delay the action. If this jutsu is cast at A-Rank, reduce
      the die roll result to 7 or higher to delay the action. If this jutsu is cast at S-Rank, reduce the die roll
      result to 5 or higher.</p>
    chat: ''
