      <p>You charge at your target and unleash a powerful lateral kick, aiming at their head, giving them a concussion.
      Make a taijutsu attack dealing your [Unarmed Damage] + 2d12 on a hit and forcing the target to make a Constitution
      saving throw. On a failed save they gain +1 rank of Concussed.</p><p>At Higher Ranks: For each rank you cast this
