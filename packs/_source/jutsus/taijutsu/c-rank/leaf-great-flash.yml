    description: >-
      <p><strong>Max Ranks</strong>: 5</p><p>A Concussed creature has experienced a traumatic blow causing their mental
      acuity to momentarily decrease as they find themselves struggling to use complex technique.</p><ul><li><p>A
      Concussed creature suffers a -1 penalty to all of their Save DCs for each rank it has.</p></li><li><p>A Concussed
      creature suffers a -1 penalty to all Intelligence based checks, attack rolls and saving throws and checks for each
      rank it has.</p></li><li><p>A concussed creature cannot gain the benefit of a Rest.</p></li><li><p>A creature can
      spend its Action if it has a Medicine kit to make a DC 20 Medicine check, ending this condition on a
      success.</p></li></ul>
