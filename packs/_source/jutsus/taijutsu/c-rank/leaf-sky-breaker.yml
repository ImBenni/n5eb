name: Leaf Sky Breaker
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>When you or an allied creature within range would take damage from a melee attack. You twist your body in a way
      that builds momentum and kinetic energy, before you kick skyward creating a powerful updraft, creating a barrier
      of air between the triggering creature and its target.</p><p>You create a wall of air and pure force. The
      triggering creature must succeed a Strength Saving throw. On a failed save they are thrown 30 feet upwards. Taking
      damage as if they fell at the end of the current turn.</p><p>You grant one ally within 15 feet of you an
      additional reaction which they can only use to cast a Taijutsu with the Finisher Keyword that has a casting time
      of 1 action</p><p>Until the end of the current turn, an allied creature within 15 feet of you, can target the
      triggering creature with a Taijutsu Finisher regardless of range, once per turn, using a Reaction.</p>
    chat: ''
