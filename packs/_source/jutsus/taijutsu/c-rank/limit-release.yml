name: Limit Release
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You press the pressure points of a willing creature you can reach. When you do, you inject a mass of chakra
      into them. Spend a number of chakra die up to a max of an amount equal to twice your proficiency bonus. The target
      must spend an equal number of chakra die, if they are unable this jutsu immediately ends.</p><p>Once both you and
      the target spend chakra die, depending on the amount of chakra die spent between the both of you, the target gains
      different Limiter releasing effects.</p><p>• 2 Chakra Die: The target rolls spent chakra die, dealing additional
      damage equal to the amount rolled, on the first attack they make on their next turn. They are then overcome by
      lethargy as they gain 2 ranks of the Weakened condition until the end of your next turn.</p><p>• 4 Chakra Die: The
      target rolls spent chakra die, adding half the result to their next attack roll and the full result to the damage
      of the same attack they make on their turn. They are then overcome by lethargy as they gain 2 ranks of Weakened
      condition until the end of your next turn.</p><p>• 8 Chakra Die: The target gains 1 Additional action on their
      turn. At the end of their turn, they become stunned until the beginning of their following turn.</p><p>• 16 Chakra
      Die: The target gains 1 Additional Action on their turn and can use their Bonus action to complete an activity
      that requires 1 Action. At the end of their turn, they become stunned for 1d4 rounds.</p><p>• 32 Chakra Die: The
      target gains 1 Additional action on their turn and can use their Bonus Action and Reaction to complete an activity
      that requires 1 Action. At the end of their turn, they become stunned for 1 Minute. This cannot be removed by any
      means.</p>
    chat: ''
