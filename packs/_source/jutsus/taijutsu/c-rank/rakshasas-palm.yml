name: Rakshasa's Palm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You build up chakra into the palm of your hand, until each time you flex your fingers the air crackles with
      thunderous booms.</p><p>Make a melee taijutsu attack against a creature you can see within range, on a hit you
      deal your [Unarmed Damage] + 6d4 and the target must make a Constitution saving throw being Dazed on a failed save
      until the end of their next turn.</p><p>If this jutsu is used as a Finisher, you must instead double the cost to
      cast this jutsu. Make a melee taijutsu attack. On a hit, you deal your [Unarmed Damage] + 10d4. If a structure,
      construct or separate creature would attempt to intercept this jutsu's damage, both the interposing structure and
      the original target takes the listed damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank
      increase the cost of this jutsu by 3 and the damage by 2d4</p>
