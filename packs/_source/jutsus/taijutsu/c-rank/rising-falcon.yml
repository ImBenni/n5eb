name: Rising Falcon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You kick the air or another creature with enough force to propel your entire body in a different
      direction.</p><p>If you choose to kick the air, you propel yourself up to 30 feet in any direction. This movement
      does not provoke attacks of opportunities and if you would end this movement within 5 feet of a hostile creature
      you can perform a powerful sweeping kick by making a single melee Taijutsu attack, dealing your [Unarmed Damage] +
      4d6.</p><p>If you choose to kick another creature, you must pass through or by them as part of your fall or forced
      movement. Make a single melee taijutsu attack. On a hit, you deal your [Unarmed Damage] +4d6, and propel yourself
      up to 30 feet in any direction. This movement cannot provoke attacks of opportunity and if you would end this
      movement within 5 feet of another hostile creature, you can perform a power sweeping kick by making another melee
      taijutsu attack targeting this creature, dealing your [Unarmed Damage] + 4d6.</p>
