name: Scattering Wave
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You inject your fist or foot with a surge of chakra that you use to strike the ground, creating a shockwave of
      force.</p><p>All creatures within 15 feet of you must make a Strength saving throw. On a failed save they take
      your [Unarmed Damage] + 3d6 and are pushed back to the edge of this jutsu's radius, into a space that can hold
      them. If the creatures are stopped from moving by a wall or structure, they take 1d6 damage for every 10 feet of
      movement they had left (min 1d6)</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank increase
      the cost of this jutsu by 3, the damage by 1d6 and this jutsu's radius by +5 feet. If this jutsu is cast at B-Rank
      or higher, all creatures of your choice within 5 feet of you become immune to this jutsu's effects.</p>
