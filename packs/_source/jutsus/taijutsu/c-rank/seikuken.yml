name: Seikuken
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you must currently be under the effects of any Taijutsu Stance, or Stance
      granted by Clan Features such as the Gentle Fist Stance or the Shikotsumyaku Stance. If you are not benefiting
      from any of these stances, this jutsu immediately ends.</p><p>You stand calm and still, emptying your mind. You
      begin to control the entire radius within your arm's length, creating a metaphorical, spherical shield around
      you.</p><p>You do not need to spend chakra to maintain this jutsu, instead you cannot gain the benefit of a Bonus
      action, by any means.</p><p>For the duration, creatures who make a melee attacks targeting you suffer a 1d6
      penalty to their attack rolls and you gain a 1d6 bonus to your melee taijutsu attack rolls targeting a hostile
      creature within 5 feet of you.</p>
