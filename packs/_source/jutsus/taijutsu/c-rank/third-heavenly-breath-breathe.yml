name: Third Heavenly Breath Breathe
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must have Second Heavenly Breath: Panting currently active. You
      end your concentration on that jutsu and this one takes its place, maintaining the same duration limitation and
      Jutsu casting restrictions. You retain all of the effects and duration of that jutsu, stacking them with this
      jutsu's effects</p><p>You increase your lungs capacity eight-fold. Doing so increases your oxygen intake as your
      skin begin to turn red as your blood vessels swell as your muscles and organs begin to swell. Increase your
      taijutsu attack bonus by +1, bonus damage by 1d8 twice per turn, and you gain 10 temporary hit points that stack
      with temporary hit points gained by other Heavenly Breath Taijutsu you cast.</p><p>Upon ending this jutsu, you
      gain 2 ranks of the Weakened condition until your next rest, which cannot be removed by jutsu of C-Rank or
      lower.</p>
