name: Crane Wing Formation
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You leap and perform a swinging attack that creates the visage of a Crane before attempting to contort around a
      target creature within range and forcing them to the ground with this advanced grapple. Make a taijutsu attack
      against the target knocking them prone and grappling them on a hit. You can have a number of creatures grappled as
      you have hands.</p><p>The target grappled with this taijutsu can use their action on their turn to make a Strength
      saving throw to escape the grapple and cannot escape the grapple following normal grapple rules. On a failed save,
      you may make an unarmed attack against the target dealing twice your [Unarmed Damage] on a hit.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast
      at C-Rank or higher, you can select one additional creature to target with this jutsu</p>
