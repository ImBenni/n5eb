name: Cyclone Surge
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You leap into the air, while performing a spinning strike, hitting and knocking all creatures into the air with
      you.</p><p>You leap 15 feet into the air striking all creatures within range. Make a melee taijutsu attack,
      comparing the results to all creatures of your choice within range AC. On a hit, you deal your [Unarmed Damage] +
      2d4 and are thrown 15 feet into the air, becoming airborne until the end of the current turn. An airborne creature
      cannot cast jutsu with the Mobility (M) keyword until they land and take no falling damage as a result of this
      jutsu</p><p>Until the end of your turn, you or an allied creature can target one affected creature with a Taijutsu
      Finisher regardless of range, once per turn, using either an Action, Bonus action or Reaction, ignoring its listed
      casting time.</p>
