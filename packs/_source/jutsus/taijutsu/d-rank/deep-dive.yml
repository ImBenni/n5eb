name: Deep Dive
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You attempt to body slam a creature into the furthest surface from you.</p><p>Make a grapple check against a
      creature you can reach. On a success, you immediately dash with them moving up to your full movement towards the
      furthest surface you can reach (such as a wall). If there are no other surfaces near you, you instead slam them
      into the ground. Regardless of where you slam them, they take bludgeoning damage equal to your unarmed
      damage.</p><p>If you and the target creature are standing on Water or completely submerged when this jutsu is
      cast, you make your grapple check at advantage. On a success, you instead dive straight down up to twice your
      movement speed to the bottom of the body of water slamming them into the body of waters floor dealing bludgeoning
      damage equal to twice your unarmed damage. This jutsu can be used if you are already grappling a creature, instead
      attempting to slam the creature immediately without any additional checks.</p><p>When you successfully slam a
      creature using this jutsu, your grapple ends.</p>
