name: Demon Fist
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>Perform a powerful uppercut with enough force to generate a shockwave that runs along the ground that can deal
      concussive damage.</p><p>Make a ranged taijutsu attack against a creature you can see within range who is
      currently standing on the same surface as you. On a hit, you deal 3d6 bludgeoning damage.</p><p>Until the end of
      your turn, you can target one affected creature with a Taijutsu Finisher regardless of range, once per turn, using
      either an Action or Bonus action, ignoring its listed casting time.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above D-Rank increase the activation cost of this jutsu by 3 and the damage by 1d6.</p>
