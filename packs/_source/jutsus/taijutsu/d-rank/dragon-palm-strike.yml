name: Dragon Palm Strike
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the Dragon Fist Stance.</p><p>You perform a
      myriad of distracting movements before collecting your chakra into your palm for a single powerful thrust,
      striking a creatures core and knocking them away.</p><p>Make a melee taijutsu attack against a creature you can
      see in range. On a hit, you deal your [Unarmed Damage] + 2d4 and push the target back 10 feet.</p><p>If this jutsu
      is used as a Finisher you instead deal [Unarmed Damage] + 2d12 damage and the distance the target is pushed by 10
      feet.</p><p>If the target would hit a solid surface as a result of this push. They take 1d6 bludgeoning damage for
      every 10 feet that they were unable to be moved.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      D-Rank increase the cost of this jutsu by 3 and the damage by 1d4 or 1d12 and the push distance by 5 feet.</p>
