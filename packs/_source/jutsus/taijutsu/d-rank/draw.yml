name: Draw!
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You quickly dash backwards creating distance between yourself and another creature.</p><p>As a as a reaction
      when you would take damage from an attack, you can dodge backwards, moving up to 10 feet away from the triggering
      target in an attempt to escape the attacks range. When you do, make a contested Dexterity saving throw vs the
      attack roll result. On a success the triggering attack misses you. You then immediately move up to 20 feet towards
      the triggering creature, making an unarmed attack, on a hit you deal your [Unarmed Damage] + 2 [Unarmed Damage
      die].</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3
      and the damage by +1 [Unarmed Damage die].</p>
