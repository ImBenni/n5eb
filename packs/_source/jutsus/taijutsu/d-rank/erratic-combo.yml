name: Erratic Combo
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You sway in and out of combat, dancing around your opponent in a drunken stupor throwing them off. Make two
      melee taijutsu attacks against a single creature you can reach. On a hit, you deal 2d6 bludgeoning damage. Each
      time you successfully hit a creature using this jutsu, you increase your AC by +1 until the beginning of your next
      turn.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu Finisher regardless
      of range, once per turn, using either an Action or Bonus action, ignoring its listed casting time.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the damage by
      1d6</p>
