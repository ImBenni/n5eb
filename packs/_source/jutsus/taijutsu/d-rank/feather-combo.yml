name: Feather Combo
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As part of the activation of this jutsu, you must be airborne, falling or be targeting an airborne or falling
      creature.</p><p>You perform an aerial combo, striking out against a creature within range. Make two melee taijutsu
      attacks targeting. On a hit, you deal your [Unarmed Damage]. If you hit the same creature twice, you use the
      momentum of the second strike to propel yourself up to 20 feet in any direction of your choice and land in a space
      that can hold you suffering no falling damage.</p><p>Until the end of your turn, you can target one affected
      creature with a Taijutsu Finisher regardless of range, once per turn, using either an Action or Bonus action,
      ignoring its listed casting time.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase
      the cost of this jutsu by 3 and the damage by +1d6.</p>
