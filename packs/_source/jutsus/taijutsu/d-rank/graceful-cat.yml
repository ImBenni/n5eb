system:
  description:
    value: >-
      <p>You focus chakra throughout your muscles enhancing your physical Dexterity and Cunning. For the duration, your
      Dexterity and Wisdom ability scores becomes 16 if they are lower than 16. You do not suffer fall damage from falls
      less than 30 feet. Your movement speed is increased by +20 feet and you gain a +2 to your passive
      perception.</p><p>When you would cast a Taijutsu with the Combo keyword, you gain +10 bonus to your movement speed
      until the end of the turn you cast it.</p>
