name: Heat Up
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You release a surge of chakra throughout your body, activating your bodies adrenaline production and kicking it
      into high gear for single swift moment while also increasing your bodies sensitivity to pain. You cannot reduce
      the cost of this jutsu by any means.</p><p>The next taijutsu you cast, that requires an attack roll increases its
      damage die by 1 Step until the end of your turn. (D4&gt;D6&gt;D8&gt;D10&gt;D12)</p><p>Additionally, until the
      beginning of your next turn, you gain vulnerability to the next instance of Bludgeoning, Piercing or Slashing
      damage from a hostile creature.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank increase the
      cost of this jutsu by 3. If this jutsu is cast a C-Rank or higher, you reroll all 1's, 2's and 3's taking the
      second result. If this jutsu is Cast at B- Rank or higher, increase damage dies by 1 additional step. If this
      jutsu is cast at A-Rank or higher, the next taijutsu you cast that requires an attack roll ignores Resistance and
      Immunity. If this jutsu is cast at S-Rank, this Jutsu's duration becomes 1 Minute causing the following; Increase
      Taijutsu damage dies by 2 additional seps for the duration and you gain Vulnerability to Bludgeoning, Piercing or
      Slashing, your choice when cast, for the duration.</p>
