system:
  description:
    value: >-
      <p>You perform a high kick combo. Make two Taijutsu attacks, dealing your [Unarmed Damage] + 1d6.</p><p>If this
      jutsu is used as a Finisher, you instead deal your [Unarmed Damage] + 2d6, leap back 15 feet that doesn't provoke
      opportunity attacks. This movement does not provoke opportunity attacks.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the leap back range by 5 feet. If this
      jutsu is cast at B-Rank, increase the damage dealt by 1d6. If this jutsu is cast at S-Rank, increase the damage
      dealt by 2d6.</p>
