name: Noble Impact
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You move in to strike your opponent by taking a regal series of attacks.</p><p>Make four taijutsu attacks
      against a single creature within range. On a hit you deal 1d6 bludgeoning damage.</p><p>If you successfully score
      a hit with at least 2 attacks against one creature, they cannot cast a Jutsu that requires Mobility (M) as an
      Action or Bonus Action, until the end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank increase the cost of this jutsu by 3 and the number of attacks made by +1.</p>
