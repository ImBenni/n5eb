system:
  description:
    value: >-
      <p>As part of the activation of this jutsu, you can only use this taijutsu against a prone target who can be
      targeted by a Finisher.</p><p>You perform a rather acrobatic display of skill. By kicking a prone creature, you
      propel yourself backward while performing a second sweeping kick while moving away. Make two melee taijutsu
      attacks, on a hit you deal your [Unarmed Damage] + 2d10. You then choose a space you can see within 20 Feet,
      leaping to that location, without triggering attacks of opportunity.</p>
