name: Prideful Assault
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the Lion Fist Stance.</p><p>You enter a
      prideful stance showing your overwhelming superiority and power.</p><p>Make two melee taijutsu attacks. On a hit
      you deal your [Unarmed Damage] + 1d6. If your targets have ranks of Fear, increase this Jutsu's damage die by 1
      step.</p><p>If this jutsu is used as a Finisher, you instead deal your [Unarmed Damage] + 1d10 and if you score
      two hits on the target, they must make a Wisdom saving throw, gaining +1 rank of fear on a failed save.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and the damage
      by 1d6 or 1d10. If this jutsu is cast at A-Rank or higher, you can increase the number of attacks by +1.</p>
