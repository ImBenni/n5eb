name: Royal Guard
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You quickly mold your chakra, creating multiple layers of armor from it and raising your guard to nullify an
      attack at the exact moment it would hit you.</p><p>When you would take damage you nullify the impact by meeting it
      with an equal amount of chakra.</p><p>Until the start of your next turn, each time you would take damage, you can
      spend chakra equal to the damage taken, gaining Immunity to the attack or jutsu's damage and effects until the end
      of the current turn. If an effect does not deal damage or cost chakra, this jutsu does not prevent its effects.
      You can activate this Jutsu's effects a number of times equal to your Taijutsu ability modifier, per casting.</p>
    chat: ''
