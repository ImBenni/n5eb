name: Second Heavenly Breath Panting
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must have First Heavenly Breath: Inhale currently active. You end
      your concentration on that jutsu and this one takes its place, maintaining the same duration limitation and Jutsu
      casting restrictions. You retain all of the effects and duration of that jutsu, stacking them with this jutsu's
      effects.</p><p>You increase your lungs capacity fourfold. Doing so increases your oxygen intake even further as
      your body expands and your muscles become more prominent. Increase your taijutsu attack bonus by +1, bonus
      taijutsu damage by 1d8 twice per turn, and you gain 10 temporary hit points.</p>
