    value: >-
      <p>When you deal [Unarmed Damage] to a creature as a result of an Unarmed attack, you can cast this jutsu as part
      of that same attack. When you do, that target must make a Strength saving throw, being restrained on a failed
      save. As an action on the target creatures turn, they may attempt a Strength saving throw to escape your hold.</p>
