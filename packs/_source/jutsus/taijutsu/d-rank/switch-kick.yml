name: Switch Kick
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You leap and perform a swift double kick in an attempt to support your team by queuing up a powerful
      finisher.</p><p>As a part of casting this jutsu, you must have either a Bonus Action or reaction available to use.
      Make two taijutsu attacks against a creature within range dealing your [Unarmed Damage] on a hit.</p><p>If you
      score at least a successful hit with this jutsu, you must spend either your bonus action or reaction. When you do,
      you grant your ally an additional reaction which they can only use to cast a Taijutsu with the Finisher Keyword
      that has a casting time of 1 action.</p><p>Until the end of your turn, you or an allied creature can target one
      affected creature with a Taijutsu Finisher regardless of range, once per turn, using either an Action, Bonus
      action or reaction ignoring its listed casting time.</p>
