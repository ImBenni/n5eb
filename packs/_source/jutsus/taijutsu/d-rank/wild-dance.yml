name: Wild Dance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You first attack your opponent with a kick, which is immediately followed by a punch and another kick, striking
      them at 3 different angles. Make three melee taijutsu attacks. On a hit, each attack deals 1d8 bludgeoning damage
      and push them 5 feet in any direction of your choice. If the target cannot be pushed back because of a structure
      or construct such as a wall or tree, you strike them into it, dealing an additional +1d6 damage.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d8.
      If you cast this jutsu at B-Rank or higher, increase the damage the target takes from striking a wall by 1d6. If
      this jutsu is cast at S-Rank, increase the damage the target takes from striking a wall by 1d6.</p>
