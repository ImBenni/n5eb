name: Black Nerium
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You attempt to press a point on the base of a hostile creatures neck. When you do, you reverse their bodies
      blood flow completely throwing their heart off and causing blood vessels to explode.</p><p>Make a melee taijutsu
      attack. On a hit, the target must make a Constitution saving throw at the beginning of each of their turns for the
      next minute.</p><p>Each time they would fail their saving throw, they suffer a -1 penalty to their Strength,
      Dexterity and Constitution ability checks, skill checks, attack rolls and saving throws for the duration and
      suffer 5d6 necrotic damage which cannot be reduced or resisted by any means.</p><p>A creature who would fail all
      10 saving throws, dies. As every blood vessel in their body collapses.</p><p>A creature who is targeted with a
      Jutsu with the medical keyword that would end conditions or restore hit points cast at S-Rank, has this jutsu's
      effect immediately end.</p>
