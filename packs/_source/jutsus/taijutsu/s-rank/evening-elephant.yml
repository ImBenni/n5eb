name: Evening Elephant
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>Keywords: Taijutsu, Finisher, Clash</p><p>This jutsu can only be cast as a Taijutsu Finisher. This is the
      ultimate culmination of offensive taijutsu. As a part of the activation of this jutsu, you must currently be under
      the effects of at least either Sixth Heavenly Breath: Gasp Taijutsu or 7th Gate of Wonder or higher.</p><p>Make 5
      Taijutsu attacks against a target. Each attack you make is treated as a shockwave that affects all creatures in a
      15-foot-wide, 60 feet line behind your initial target. On a hit, the target creature takes 5d10 bludgeoning
      damage. All creatures behind the target creature must make a Dexterity saving throw taking 5d8 force damage on a
      failed save or half as much on a successful one. (This Jutsu cannot score a critical hit)</p>
