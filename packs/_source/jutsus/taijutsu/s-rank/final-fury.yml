name: Final Fury
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast if you have one other caster who is within 15 feet of you. The second caster as a
      part of their reaction moves to a space within 5 feet of you that they can occupy.</p><p>You and the second caster
      perform a joint combined series of strikes attacking vital points across a targets body.</p><p>Each caster make
      three melee taijutsu attacks, dealing their unarmed damage + 5d8 on a hit. If both casters successfully hit their
      target with all of their attacks the target must succeed a constitution saving throw vs the Taijutsu save DC of
      the caster with the highest DC. On a failed save the target gains 5 stacks of the Weakened condition for the next
      24 hours.</p><p>Combination: When this jutsu is cast, it gains additional effects based on who has the highest
      Charisma modifier between both casters.</p><p>• +0-1: No Change.</p><p>• +2-3: Both casters gain a +2 bonus to
      their taijutsu attack rolls.</p><p>• +4-5: Both casters gain a +2 bonus to their taijutsu attack rolls, +1d4 bonus
      to damage rolls and a +1 bonus to their taijutsu save DC.</p>
