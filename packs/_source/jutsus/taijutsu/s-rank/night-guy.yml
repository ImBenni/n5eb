name: Night Guy
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you must currently have at least the Seventh Heavenly Breath: Exhale or the
      8th Gate of Death from the 8 Inner Gates Taijutsu Specialist, Passionate Youth class feature active.</p><p>You
      begin to emit an enormous amount of red steam, known as the 'Steam of Blood', and your chakra manifests into a red
      burning beast of your description around your body. You then shout an activation word of your choice, before
      dashing forward with such force that space in front of you becomes distorted.</p><p>You may select any creature or
      space you can see or within 120 feet of you. You move in as straight a line as possible. You move through all
      structures, environmental obstructions and anything similar as if you could phase through them. You ignore
      summoned constructs and structures created by Jutsu, features or traits.</p><p>Additionally, the target cannot
      gain the benefits of any Reaction they use until the beginning of their next turn.</p><p>You then kick, with the
      force required to distort time and space. Make a melee taijutsu attack, at advantage, rerolling any result that's
      less than 8 on the die. On a hit, the target must succeed a Strength Saving Throw. On a failure, they are reduced
      to 0 Hit Points and their body is atomized, becoming unable to be revived by any means.</p><p>On a success you
      instead deal Xd12 + 100 bludgeoning damage, where X = the casters level + Proficiency + Taijutsu ability
      modifier.</p><p>At the conclusion of this attack, all of the blood in the users body is boiled out of them,
      forcing the end of their Heavenly breaths and/or 8 Inner Gates, they then begin to turn to ash, crumbling into
      dust over the course of the next minute.</p>
    chat: ''
