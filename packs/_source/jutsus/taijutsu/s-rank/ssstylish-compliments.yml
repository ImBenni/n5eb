name: SSStylish Compliments
type: spell
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You begin to perform a series of extremely disrespectful movements designed to not only show how absolutely
      amazing you are, but how woefully unprepared your enemies are to deal with someone of your caliber.</p><p>While
      you are under the effects of this jutsu you gain the following;</p><p>• For the next minute, each time you would
      score two successful hits on a creature you gain a +1 bonus to your AC and saving throws until the beginning of
      your next turn, to a maximum of +5.</p><p>• For the duration, you cannot suffer penalties to your AC, attack rolls
      or saving throws.</p><p>• When you would succeed a saving throw that would inflict a condition or deal damage, you
      instead suffer no effects or damage.</p><p>• When a creature would miss you with an attack, you may take the
      Attack Action targeting the triggering creature.</p><p>• The first time you would take damage, or suffer any
      hostile creatures effect, this jutsu immediately ends.</p>
