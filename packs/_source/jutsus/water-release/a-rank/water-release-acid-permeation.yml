name: Water Release Acid Permeation
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You collect water from the air, plants, and all sources that contain it as they form bubbles surrounding you in
      a 15-foot radius with you in the center. This radius moved with you.</p><p>When you cast this jutsu, you designate
      any number of creatures you can see to be unaffected by it. An affected creature's speed is halved in the area,
      and when the creature enters the area for the first time on a turn or starts its turn there, it must make a
      Dexterity saving throw as the bubbles explodes like mines spreading freezing acid over the creature. On a failed
      save, the creature takes 8d8 Cold damage and gain 2 ranks of Corroded.</p><p>At Higher Ranks: For each rank you
      cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d8.</p>
