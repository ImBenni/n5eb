name: Water Release Great Hydra Fang
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You manipulate your water release chakra molding it until you manifest 9 massive serpent like heads of your
      description composed of Water.</p><p>As an Action, or bonus action you may command a single hydra head to attack a
      creature you can see within range. This attack can turn corners and ignores all but total cover. Make a Ranged
      Ninjutsu attack on a hit you deal 8d8 cold damage. On a hit or miss the head is spent reducing the number of heads
      you have by 1.</p><p>As a reaction, you can command a single hydra head to protect you from an incoming attack,
      granting you 5d8 temporary hit points against the triggering attack. When you do you reduce the number of heads
      you have by 1.</p><p>Also, as a reaction, you can command 3 hydra heads to encircle you to completely protect you
      from a jutsu or effect that would force you to make a Strength, Dexterity or Constitution saving throw. When you
      do, you instead gain immunity to the triggering jutsu or effect until the end of the current turn. When you use
      this effect, you reduce the number of heads you have by 3.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above A-Rank, increase the cost of this jutsu by 3, the number of Hydra heads by +1.</p>
