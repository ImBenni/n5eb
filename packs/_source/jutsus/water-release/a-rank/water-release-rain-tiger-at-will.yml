name: Water Release Rain Tiger At Will
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You create rain clouds centered on a point of your choice that you can see 100 feet in the air that spreads
      outwards covering a radius up to 10 miles in size. The clouds begin to pour down a heavy rain constantly. Each
      rain drop is connected to the caster's senses informing them of any and all creatures, movements, activities and
      actions that the raindrops come into contact with. This rain is almost entirely seen as natural otherwise. A
      creature with chakra sight can see the chakra in each water drop.</p><p>While the caster will be aware of events
      and actions within the rain, this does not inform them of the exact location within the radius of this jutsu's
      effect range.</p>
    chat: ''
