name: Water Release Water Dragon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You expel a massive quantity of water or pull from a nearby source, conjuring a large Dragon of your
      description from water. The Dragon attempts to ram its target. Make a Ranged ninjutsu attack, on a hit target
      creature 14d6 cold damage. The target creature must make a constitution saving throw, being stunned and knocked
      prone on a failed save until the end of the targets next turn. If used near a sufficient source of water, reduce
      the chakra cost of this jutsu by 2 or you can choose to increase the damage die to a d8.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and increase the damage by
      1d6 for each damage type.</p>
