name: Water Release Water Formation Wall
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>When you or an allied creature within 30 feet of you are targeted by an attack, you expel a massive amount of
      water that you circle around the target like a spinning top. The circling water has 20d6 Hit points until the
      beginning of their next turn. Creatures who are within 5 feet of the target are also protected by your Water
      Formation Wall. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can
      choose to increase the radius of the jutsu to 10 feet.</p>
