name: Water Release Bloody Mist Absorption
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>An advanced variation of the Hidden Mist Technique. This variation requires the user to draw blood from
      themselves cutting their palm, reducing their current Hit points by 5. You release a crimson red mist that fills a
      45-foot-cube originating from you. All creatures inside this mist are heavily obscured and cannot clearly see
      anything more than 5 feet away from them. You know the location of all creatures inside this red mist and all
      creatures except for you suffer the following effects.</p><p>• Creatures who start their turns inside the red
      mist, who have less than their max hit points lose 4 + Half of any bleed damage they take, in chakra.</p><p>•
      Creatures cannot regain Hit points or remove stacks of bleeding while inside the red mist.</p>
