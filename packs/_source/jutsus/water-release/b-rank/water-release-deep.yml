name: Water Release Deep
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You and other casters manipulate Surrounding Water as you artificially manipulated the depth of water
      surrounding yourselves.</p><p>Each Caster of this jutsu manifests a 30-foot radius sphere of water within which
      they gain a 60-foot swim speed and the ability to breathe within each sphere of water created during this jutsu's
      casting.</p><p>Each caster can then select up to 2 creatures other than themselves who will be unable to Drown
      while within this jutsu's radius and gains a swim speed equal to their walking speed while inside any sphere of
      water created during this jutsu's casting. Additionally, the selected creatures do not need to make a Saving throw
      as a result of this jutsu.</p><p>Each creature selected by a caster who casts a Jutsu of any type while within a
      sphere of water created during this jutsu's casting now deals cold damage instead of their jutsu's listed damage
      type.</p><p>Creatures who are within this jutsu's radius when casted must succeed a Dexterity and Constitution
      saving throw. On a failed Dexterity saving throw they are pulled 30 towards the center of the sphere of water. On
      a successful save they are instead floating within the sphere of water in their current position. On a failed
      Constitution saving throw the creature was unable to hold its breath and begins drowning. A drowning creature can
      survive for a number of rounds equal to their constitution Modifier (Min 1) before falling unconscious as a result
      of drowning. If an unconscious creature remains drowning, at the beginning of the unconscious creatures turn, they
      take necrotic damage equal to their level. On a successful save they are able to hold their breath for a number of
      rounds equal to their Constitution Modifier (Min 1.).</p><p>At the beginning of a creatures turn who has exceeded
      the number of rounds they can hold their breath; they begin drowning as if they failed their saving
      throw.</p><p>An unconscious creature who is no longer drowning can be awoken by another creature as a bonus
      action.</p><p>Combination: If this jutsu is cast as a Combination jutsu with 2 or more casters reduce the cost by
      -2.</p><p>Any creature who assists in casting this jutsu as a combination jutsu increases this Jutsu's radius
      based on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2-3: Increase the radius to
      90-foot radius sphere(s), +4-5: Increase the radius to 120-foot radius sphere(s)).</p>
