name: Water Release Explosive Colliding Shockwave
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You expel a small ocean's worth of Water directly into your space covering a 60-foot radius centering on you.
      You stand on top of the water you are expelling, while creatures who are within 60 feet of you must make a
      Strength saving throw to resist being swept away. On a failure, they take 6d8 cold damage and are pushed 30 feet
      away while under the surface of the small ocean you've created. On a success, they remain floating above the
      surface, suffer no damage, but are still pushed away 15 feet from their current position. The water conjured by
      this jutsu maintains a depth of 120 Feet. This water can be used as a source of water for up to 15 Water Release
      Ninjutsu.</p>
    chat: ''
