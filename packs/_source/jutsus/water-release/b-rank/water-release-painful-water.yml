name: Water Release Painful Water
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You manipulate the Water Release Chakra within yourself and mark a creature you can see within range with this
      chakra.</p><p>For the duration, when the creature would take damage from a jutsu with the Water Release Keyword,
      they take additional damage equal to your character level, once per turn.</p><p>Additionally, when a creature
      marked with this jutsu would make a saving throw to resist the chilled condition, they roll 1d8, reducing their
      saving throw by the result.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank increase the
      cost by 3 and the number of creatures you can mark by +1.</p>
