name: Water Release Reflective Droplets Drip
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You manipulate your water release chakra molding it until you envelop yourself into a protected bubble,
      intercepting incoming attacks.</p><p>This bubble barrier protects you from incoming attacks taking the damage you
      would take instead until the beginning of your next turn.</p><p>The bubble in a water structure that has 5d8 +
      Your Ninjutsu ability score hit points. The bubble is Resistant to Fire Damage and Vulnerable to Earth Damage. You
      cannot be targeted by jutsu that does not require an attack roll and when you would make a saving throw from a
      jutsu that affects an area, you make your saving throw at advantage.</p><p>While the bubble has hit points, melee
      attacks made against you, reflect some of that damage back to the triggering creature as cold damage equal to half
      of their attack's damage. This effect does not trigger if the triggering damage type is Earth.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the number of
      hit-points the bubble has by 1d8.</p>
