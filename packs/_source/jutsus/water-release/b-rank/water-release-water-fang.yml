  description:
    value: "<p>You create two spiraling drills of water around a target creature you can see within range. Target creature must make a Dexterity saving throw, taking 8d6 Cold damage, being knocked prone and dazed on a failed save, or half as much damage and no further effects on a success. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to target an additional creature.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6.</p>"
