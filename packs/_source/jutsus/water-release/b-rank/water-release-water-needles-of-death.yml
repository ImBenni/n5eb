name: Water Release Water Needles of Death
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>When a creature makes a Melee attack against you, you stomp the ground\_ collecting a mass of water droplets from the ground and air, sharpening them into needles. The triggering creature must succeed a Dexterity saving throw, taking 8d10 Cold damage and reducing their movement speed by 15 on a failed save and taking half as much damage on a successful one. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can instead make all hostile creatures of your choice, within 15 feet of you when you cast this jutsu, make the saving throw as if they are also targets, taking damage on a failed save or half as much on a success.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d10.</p>"
    chat: ''
