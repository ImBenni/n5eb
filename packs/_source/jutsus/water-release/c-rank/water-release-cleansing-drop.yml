  description:
    value: "<p>\_You manipulate your water release chakra and infuse it with Medical Release Chakra. When you do you create a single drop of water made from this jutsu, and send it to a single willing creature\_ you can see within range allowing them to drink it. A creature who\_ drinks this drop of water who are under any of the following effects from a Jutsu or environmental hazard of Equal Rank or lower, has two of them completely removed at your discretion; Poisoned, Burned, Shocked, Chilled, Dazed.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the amount of targets you can affect by +1.\_</p>"
