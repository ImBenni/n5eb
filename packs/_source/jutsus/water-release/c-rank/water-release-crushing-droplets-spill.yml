name: Water Release Crushing Droplets Spill
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You manipulate your water release chakra hardening it until the waters density becomes too much for most to handle. For the duration, when you would cast a Jutsu with the Water Release Keyword, the strength of the jutsu is modified based on your needs at the moment. Select one of the following effects when you cast the jutsu.</p><p>• Cold Damage you deal with Jutsu with the Water Release Keyword is increased by an amount equal to your Proficiency Bonus. This bonus damage can happen up to twice per turn.\_</p><p>• Attacks made with Jutsu with the Water Release Keyword are made with a bonus to hit equal to 1d4.</p><p>• Creatures who would make a saving throw against a Jutsu you cast with the Water Release Keyword rolls an additional 1d4 reducing their saving throws by the result.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. When you would cast this jutsu at B-Rank you may select a creature within 5 feet of you to gain this jutsu's benefit for the same duration.</p>"
    chat: ''
