    value: "<p>You conjure a bubble filled with water and send it towards a\_ creature's head to enclose it within the bubble removing their ability to breathe unless they can breathe within water. Make a ranged Ninjutsu attack against a creature within range. On a hit the creature begins to suffocate. While suffocating this way, its speed is halved and at the start of each of its turns it experiences oxygen deprivation taking 3d8 necrotic damage that ignores Damage Reduction and Resistance. At end of an affected\_ creatures turn, they make Constitution saving throw. On a success, this jutsu ends.\_</p>"
