name: Water Release Foul Legacy
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You manifest water chakra that bubbles up before you unleash it like a bursting bubble, as a pulse of sapphire
      blue chakra enhances the weapons of your allies. You cannot lose concentration of this jutsu as a result of
      damage.</p><p>For the duration, one weapon you and each allied creature affected by this jutsu is wielding is
      enhanced by your sapphire water chakra. Enhanced weapons deal an additional 2d4 Cold damage twice per turn and
      each time a wielder deals damage to a hostile creature, they regain hit points equal to the bonus cold damage this
      jutsu deals.</p><p>If you or affected allied creatures let go of their weapon or it is taken from its original
      wielder, the sapphire chakra disperses.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3. If this jutsu is cast at A-Rank or higher, increase the damage to 4d4.</p>
