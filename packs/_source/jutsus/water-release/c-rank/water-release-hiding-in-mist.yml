name: Water Release Hiding In Mist
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You begin to turn your body into a collection of water vapor similar in consistency to mist along with
      everything your wearing and carrying for the duration. This jutsu ends if you drop to 0 hit points or chakra. You
      cannot lose concentration of this jutsu as a result of failing a concentration check, or being
      incapacitated.</p><p>While in this form, your only movement method is a flying speed of 20 feet. You can enter and
      occupy the space of another creature. You have resistance to all damage, excluding Earth damage, and you have
      advantage on Strength, Dexterity, and Constitution Saving Throws. You can pass through small holes, narrow
      openings, and even mere cracks, though it treats liquids as though they were solid surfaces. You can't fall and
      remain hovering in the air, even when stunned or otherwise Incapacitated. When rolling stealth to be seen as a
      common cloud of gas, mist or fog, you may roll at advantage.</p><p>While in this form of mist, You can't talk or
      manipulate objects, and any objects it was carrying or holding can't be dropped, used, or otherwise interacted
      with. You cannot attack or cast jutsu while in this form.</p>
