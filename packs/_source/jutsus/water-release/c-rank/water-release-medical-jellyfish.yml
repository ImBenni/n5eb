name: Water Release Medical Jellyfish
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You Conjure water into the shape of a jellyfish and attach it to a creature you touch. For the duration, the jellyfish will continuously inject chakra into whomever it is attached to body to heal them\_ then they take damage. At the beginning of their turn, they recover 4 hit points. This jellyfish has the Same AC as its host, but only 1 hit point. The jellyfish can be targeted by an attack. Alternatively, If the host would make a saving throw to resist a Ninjutsu, Taijutsu or Bukijutsu effect that would damage it, the jellyfish also takes\_ damage equal to the result if its host fails the save. If the Jellyfishes host would fall to 0 hit points, the jelly fish shrivels up and the jutsu ends.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the healing by +1.\_</p>"
