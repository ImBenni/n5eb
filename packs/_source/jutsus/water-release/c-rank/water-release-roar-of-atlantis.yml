name: Water Release Roar of Atlantis
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You manipulate the Water Release Chakra with a creature you touch within range. If used on yourself, you do not need to spend chakra to maintain concentration on this jutsu. For the duration, when the creature cast a Jutsu with the Water Release keyword that deals damage or inflicts a condition of any type, the affected creature becomes Wet. A wet creature remains wet for this jutsu's duration, unless otherwise stated. A wet creature who takes damage from the following damage types triggers the following effects.</p><p>Fire Damage: Once per turn, they take additional fire damage equal\_ to 2dX, where X is the triggering jutsu's damage die. The steam\_ remains until the end of the target creatures next turn. The area the steam occupies is heavily obscured. The target creature is no longer wet.</p><p>Lightning Damage: Once per turn, the creature has the water react to the lightning as the lightnings conductivity is multiplied and all adjacent creatures become targets for this super conduction. They take additional Lightning Damage equal to 2dX, where X is the triggering jutsu's damage die. All creatures who are adjacent to the wet creature makes a Dexterity saving throw taking half of the lightning damage dealt on a failed save or none on a successful save.</p><p>Wind Damage: Once per turn, the creature has the wet condition spread around affecting creatures near them as the water is picked up and thrown around. They take additional cold damage equal to 2dX, where X is the triggering jutsu's damage die. All creatures who are within 10 feet of the wet creature becomes wet as well.\_</p><p>\_</p>"
