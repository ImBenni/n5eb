name: Water Release Water Absorption
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You place a sealing tag on one willing creature you can see within range. When you cast this jutsu, all Water sources the target is in contact with or adjacent to, is absorbed into them and is used to artificially enhance the targets physical ability. If the target is next to a water source comparable to a lake, sea, or ocean this jutsu does not consume all of the water, but up to 1000 gallons.</p><p>For the duration, the creatures Strength Score becomes 20 if it not already. If their strength score is already 20, it instead becomes 22. Their jump distance is doubled. They gain resistance to Bludgeoning damage and the first time each turn, that they would deal unarmed or weapon damage they deal additional damage equal to 2d10. When this jutsu ends, the creature becomes weakened and slowed until the end of their next turn as their body recovers from the over saturation of water in their system.\_</p>"
