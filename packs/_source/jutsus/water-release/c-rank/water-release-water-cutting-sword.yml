name: Water Release Water Cutting Sword
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You Conjure water into the shape of a Sword like projection in your free hand. You do not spend chakra to maintain concentration on this jutsu. The blade is 5 feet long, the handle is 1 foot long. The design of the blade can be whatever you decide. If you let go of the\_ blade it disperses into water again. You can use your action to make a Melee Ninjutsu attack with the Water Sword. On a hit, the target takes 4d8+Ninjutsu Ability Modifier cold damage. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to instead increase the damage die by one step, up to a d10.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. If Cast at A- Rank, you can instead make two attacks with this jutsu as an action.\_</p>"
