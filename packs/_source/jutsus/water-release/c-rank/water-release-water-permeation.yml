name: Water Release Water Permeation
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You place a sealing tag on one willing creature you can see within range. For the next minute they lose physical form as they and all equipment held become a pool of water. As a pool of water, their speed becomes 60 feet, and gain a swim speed of 120 feet. They can squeeze through cracks or disconnected surfaces that are at least 1 millimeter wide. The affected creature cannot make attacks, use handsigns, or mold chakra. The affected creature cannot see, but they gain 60 feet of tremor sense.</p><p>Additionally, the affected creature becomes immune to Cold, Bludgeoning, piercing and Slashing Damage. Resistant to Fire\_ damage, and Vulnerable to lightning Damage.</p>"
