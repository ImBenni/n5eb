  description:
    value: "<p>You manipulate your water release chakra to generate an aquatic beast of your choice that appears to ram into a creature you can see within range. Make a melee ninjutsu attack. On a success you deal 3d6 cold damage and forcing the target creature to make a Constitution saving throw. On a failed save they gain 1 rank of Chilled.</p><p>If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or increase the range to 45 feet</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. When you cast this jutsu at B-Rank the amount of attacks you make becomes 2. When you cast this Jutsu at S-Rank the number of attacks you make becomes 3.\_</p>"
