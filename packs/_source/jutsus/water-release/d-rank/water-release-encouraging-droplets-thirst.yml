name: Water Release Encouraging Droplets Thirst
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You solidify your Water Release Chakra into pure water that floats above your hand. When cast, a willing
      creature within range can as a part of casting this jutsu drink the water. The target gains temporary hit points
      equal to your Ninjutsu save DC and is healed of one of the following conditions from an effect of equal rank or
      lower; Bleeding, Burned, Chilled, Dazed or Poisoned.</p><p>Creatures who gain Temporary hit points from this jutsu
      gain a special action called Encouraged Momentum which goes away at the end of their next turn.</p><p>Encouraged
      Momentum. On your turn, you can use this special action to take the following actions; Dash, Hide, Disengage, or
      Dodge.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3. If cast at B-Rank, increase the number of conditions healed to 2. If cast at S-Rank, increase the number of
      conditions healed to 3.</p>
