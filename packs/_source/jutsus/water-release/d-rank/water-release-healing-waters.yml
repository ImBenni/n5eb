system:
  description:
    value: "<p>\_You collect a mass of water and impart chakra into it and begin to heal a willing creature you can touch with it. This dissolves the water from being used in the healed creatures healing process. Roll 2d8,\_ \_healing the target creature by the total.</p><p>If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to instead remove one of the following conditions in addition to restoring hit points; Bleeding, burned, poisoned or shocked conditions.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the healing by 1d8.</p>"
