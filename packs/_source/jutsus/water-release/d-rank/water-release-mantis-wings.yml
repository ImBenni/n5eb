  description:
    value: "<p>You manifest wings of water that flutter at your command. Until the end of your turn, you gain a 30-foot fly speed. At the end of this jutsu's duration if you have not landed, your wings slow down bringing you gently down onto whatever surface may be directly below you.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. Casting this jutsu at B-Rank, gives it a Concentration, up to 1 minute duration. Casting this jutsu at A-Rank, gives it a Concentration, up to 10- minute duration at no additional chakra cost to maintain concentration.\_</p>"
