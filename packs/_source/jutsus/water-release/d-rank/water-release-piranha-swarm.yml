name: Water Release Piranha Swarm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>When you cast this jutsu, you can make a melee ninjutsu attack against a creature within 5 feet of the swarm.
      On a hit, the target takes 2d4 Cold damage + 2d4 Piercing damage.</p><p>As a bonus action on subsequent turns, you
      can command the swarm to move up to 30 feet and repeat the attack against a creature within 5 feet of it. If you
      cast this jutsu while submerged underwater, the piranha's can instead be commanded to move up to 60 feet instead
      of 30.</p><p>A creature who takes damage from this jutsu must make a Constitution Saving Throw. On a failed save,
      they gain 1 rank of Chilled. A creature who fails by 5 or more also gains 1 rank of Bleeding.</p><p>If used near a
      sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to increase the amount of
      piranhas, increasing their damage by +1d4 of each type.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d4 of each type. When this jutsu is cast at
      A-Rank or higher, increase the ranks of Chilled or Bleed it inflicts by +1</p>
