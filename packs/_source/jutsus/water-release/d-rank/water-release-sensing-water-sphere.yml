system:
  description:
    value: "<p>You collect a mass of water into a sphere from the surrounding area 5 feet in diameter. For the duration of this jutsu you can see\_ movement and activity in a 250-foot radius centering on the sphere.<br />This requires the creature who is moving, to disrupt some source of water (Puddles, bodies of water or rain). This movement or activity creates bubbles inside the sphere relative to the direction of the movement compared to the location of the sphere. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to double the sensory range of this jutsu,\_ allowing you to see movement and activity in a 500-foot radius centered on the sphere.\_</p>"
