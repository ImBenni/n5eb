system:
  description:
    value: "<p>\_You knead chakra with your spit creating a viscous substance similar to syrup. You spit it out at a creature slowing them down from the viscous and sticky nature of the liquid. Make a range ninjutsu attack against a creature you can see within range. On a hit target creature gains 1 rank of the Slowed condition until the end of their next turn. If used near a sufficient source of water,\_ reduce the chakra cost of this jutsu by 2 or you can choose to instead select one additional creature to target with this jutsu when<br />you cast it.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.\_</p>"
