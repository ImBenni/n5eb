name: Water Release Viscous Water Mass
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>\_You extract water from an area near a willing creature you can see within range creating a medium sized shield of water to protect them. The target reduces incoming damage by 4. If this jutsu would reduce Fire Damage you instead reduce the damage by 6. If you would initiate a clash with a Jutsu with the clash keyword, you first check to see if the damage would be reduced to 0 as a result of this jutsu's Damage Reduction. If the fire damage would be reduced to 0, you can then choose to initiate a clash, if you wish. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2, or for the duration, the target also increases their AC by 1</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast a B-Rank, increase the AC bonus by +1 and the DR by +2. If this jutsu Is cast at S-Rank, increase the AC bonus by +2 and the DR by +6.</p>"
