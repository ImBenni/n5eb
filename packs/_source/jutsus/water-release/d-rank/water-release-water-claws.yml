name: Water Release Water Claws
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You manifest water release chakra in the shape of two claws that
      surround your hands, of your design and description. Make two melee
      ninjutsu attacks against a target within range, as you spin, slashing into
      them. On a successful hit, you deal 2d6 Cold damage. Affected creatures
      must make a Constitution Saving throw, gaining 1 rank of Bleed, on a
      failed save.</p><p>If used near a sufficient source of water, reduce the
      chakra cost of this jutsu by 2 or the number of attacks by +1.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3 and the damage by 1d6.</p>
