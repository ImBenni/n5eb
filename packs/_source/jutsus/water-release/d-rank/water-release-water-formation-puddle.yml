system:
  description:
    value: "<p>You generate a Large Puddle of water from your stomach and expel it onto the ground in front of you. This puddle holds no more than 10 gallons of water. You can use this puddle as a source of drinking water, lay a trap, or use it as a source for more complex Water Ninjutsu. You may use the water this Jutsu produces as a Source of Water for no more than 2 water release ninjutsu of C-Rank or Lower, after which, the puddle is no longer usable.</p><p>\_</p>"
