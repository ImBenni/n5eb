    value: "<p>You manipulate and mold chakra to reverberate through a source of fluid, be it mud, poisoned waters, or anything in between. Fluid up to 10 gallons that has your chakra moving through it becomes purified and turns into pure drinking water, free of all impurities or it becomes putrid, undrinkable and poisonous to drink (Your choice). If a fluid is manmade or special in any way, make a Ninshou Skill Check against the DM's set difficulty to see if you can purify/Putrefy it or not.\_</p>"
