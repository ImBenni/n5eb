system:
  description:
    value: "<p>\_You generate multiple shuriken made of water. Make a Ranged Ninjutsu attack against a creature you can see within range, dealing 4d4 cold damage. If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to instead make an additional attack targeting another creature within range.</p><p>. If you score a critical hit with this jutsu the damage die of this jutsu becomes a d8 as they shift into monster water shuriken.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d4.\_</p>"
