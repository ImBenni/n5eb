name: Water Release Whisper
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You send bubbles made from Water Release chakra to fill the inner ear of your allies for the duration. Select up to 3 willing creatures within range to gain the benefits of this jutsu.</p><p>For the duration, affected creatures who would make a Wisdom (Perception) Check adds your Ninjutsu Ability Modifier to their Check. Sound based environmental effects that force a saving throw of any type are made with advantage.</p><p>Additionally, The First Saving throw made against a Genjutsu with the Auditory Keyword add your Ninjutsu Ability Modifier to their saving throw. This jutsu immediately ends after this saving throw.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the number of creatures affected by this jutsu by +2.\_</p>"
