    value: "<p>You create a viscous mass of bubbles and spray it out in a cone 15 feet in front of you creating a slippery ground. Each Creature standing in the area of the jutsu, must make a Dexterity saving throw, falling prone on a failed save. A Creature that enters or ends its turn on a space in the target area must also make a Dexterity saving throw or fall prone. This mass of bubbles remains for 1 minute, or until washed away.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the size of the cone by 10 feet.\_</p>"
