name: Water Release Drown
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You manipulate your water release chakra molding it until you reach a level of control so much so that you are
      able to forcibly turn air into water and vice versa as it is inhaled by other creatures.</p><p>Select up to 7
      creatures you can see within range. Each creature makes a Constitution saving throw. On a Failed save for the
      duration if they can breathe air, they instead can only breathe water. If they can breathe water, they can instead
      only breathe air.</p><p>A creature who is currently in an environment in which they cannot breathe normally, they
      begin to Drown.</p><p>While drowning this way, it can survive for a number of rounds equal to its constitution
      modifier (minimum of 1 round). At the start of its first turn after these rounds, it drops to 0 hit points and is
      dying. A creature who begins their turn dying after falling to 0 hit points as a result of this jutsu, they die.
      While drowning they cannot speak.</p>
