name: Water Release Giant Water Prison Dance
type: spell
img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: "<p>You knead enough water in your stomach and release enough to fill a small ocean. You then control the water creating a massive ball of Water centered around you that extends up to a 60 radius. All\_ creatures in the radius are picked up by the wave of water and pulled into the water sphere. All Creatures inside the Water Sphere must make a Strength saving throw, being captured inside the sphere and unable to escape, on a failed save. When captured this way, the captured creature is considered to be underwater while inside the Water prison. When the User of this Jutsu moves, the water sphere moves with him. Creatures who succeed their strength save, can escape the Water prison if they can make it to the edge of the water sphere.</p>"
