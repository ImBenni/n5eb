name: Wind Release Defiance Storm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You throw a Chakra seal onto the ground before you release the chakra sealed within in creating an aura of
      reinforcing Wind release chakra. Select up to 4 creatures to gain the benefits of this jutsu while inside this
      Jutsu's radius.</p><p>For the duration select creatures within this jutsu's radius makes Strength, Dexterity and
      Wisdom Skill checks and Saving throws at advantage, Ninjutsu they cast of B-Rank or lower has their cost reduced
      by -2 (Min 1.), Taijutsu &amp; Bukijutsu they cast deal additional wind damage equal to your Ninjutsu Ability
      modifier.</p><p>The Chakra Seal used to cast this jutsu can be targeted for attacks, although it is protected by a
      bubble of Wind Release Chakra. It has an AC equal to your Ninjutsu Save DC, and Hit Points equal to twice your
      Ninjutsu Save DC. It has Immunity to Lightning Damage and Vulnerability to Fire Damage. Once Destroyed, this jutsu
      immediately ends.</p>
