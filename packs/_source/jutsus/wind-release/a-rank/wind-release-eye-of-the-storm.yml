name: Wind Release Eye of the Storm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You Create a powerful twisting cyclone of wind that seals yourself and all creatures in this jutsu's Radius off
      from other creatures and effects from outside this jutsu's radius.</p><p>Creatures outside this jutsu's radius
      cannot see into the opaque wall of twisting wind, dust, dirt and chakra. A creature with Chakra sight when looking
      at the wall only sees a wall of chakra and cannot make out anything passed it.</p><p>If a creature attempts to
      pass through the wall, they must succeed a Strength saving throw. On a successful save they pass through the wall.
      On a failed save they take 8d8 wind damage and are thrown back 30 feet. Attacks and Jutsu cannot penetrate this
      jutsu's walls.</p><p>While inside this jutsu's radius, creatures cannot generate electricity preventing them from
      casting Jutsu with only the Lightning Release Keyword.</p><p>If the wall is struck with a Jutsu with the Water
      Release Keyword, the walls becomes wreathed in Water Release Chakra. If this jutsu's walls become wreathed in
      Water Release chakra, creatures within this jutsu's radius cannot generate fire, preventing them from casting
      jutsu with only the Fire Release Keyword.</p><p>If the wall is struck with a Jutsu with the Fire Release Keyword,
      the walls becomes wreathed in Fire Release Chakra. If this jutsu's walls become wreathed in Fire Release chakra,
      creatures within this jutsu's radius cannot generate strong wind, preventing them from casting jutsu with only the
      Wind Release Keyword.</p>
