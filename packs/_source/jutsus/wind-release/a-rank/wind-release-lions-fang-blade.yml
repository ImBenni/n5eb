name: Wind Release Lions Fang Blade
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You mold wind Release Chakra to create a beast made purely of Wind Release Chakra, that has a design and look
      of your description that counts as large.</p><p>Upon its creation, you command it to attack a number of creatures
      up to your Ninjutsu Ability Modifier once each. Make a Melee Ninjutsu attack for each creature it attacks within
      range as it leaps and assaults each creature. On a hit, you deal 2d8 Wind Damage.</p><p>A creature that takes
      damage from the Beast must make a Constitution saving throw being torn apart from the thousands of blades made of
      Wind Release chakra that makes up your Beast. On a failed save they gain 2 ranks of Lacerated and cause
      Swirl.</p><p>At Higher Ranks: For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by
      3, the damage by 1d8 and Lacerated ranks by 3.</p>
