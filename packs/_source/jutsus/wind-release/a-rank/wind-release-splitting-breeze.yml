name: Wind Release Splitting Breeze
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You mold wind Release Chakra to create a blade of wind release chakra that is so compressed it fits into the
      palm of your hand. The amount of power this jutsu exhibits is entirely dependent on the amount of chakra you
      commit to it.</p><p>Spend chakra up to the listed amounts. For every chakra cost milestone hit you deal the listed
      effect. A creature reduced to 0 as a result of this jutsu is bisected at any angle the caster decides;</p><p>20
      Chakra: You make a single melee Ninjutsu attack. On a successful hit, you dealing 20d4 Wind Damage. A creature
      must also make a saving throw gaining 2 ranks of laceration and causing Swirl on a failed save.</p><p>30 Chakra:
      You make a single melee Ninjutsu attack. On a successful hit, you dealing 30d4 Wind Damage. A creature must also
      make saving throw, gaining 4 ranks of laceration and causing Swirl on a failed save.</p><p>40 Chakra: You make a
      single melee Ninjutsu attack. On a successful hit, you dealing 40d4 Wind Damage. A creature must also make a
      saving throw, gaining 6 ranks of laceration and causing Swirl on a failed save.</p>
