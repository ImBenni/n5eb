  description:
    value: >-
      <p>You create a vacuum of air around a willing creature in range that nullifies almost all attacks that would
      aspire to harm you. Until the beginning of your next turn. All Ninjutsu and Taijutsu, Melee and Ranged weapon
      attacks must roll 1d20 when they declare an attack targeting you. On a roll of 8 or greater, the attack is
      diverted or knocked away by the extremely dense wind.</p>
