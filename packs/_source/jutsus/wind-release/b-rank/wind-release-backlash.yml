name: Wind Release Backlash
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create a vortex that spins counterclockwise just before an attack hits you. Make a Ninjutsu Ability Check
      vs the Rank DC of the triggering jutsu. The Rank DC equals 13 + the Jutsu's Rank (D-Rank: 1, C-Rank: 2, B-Rank: 3,
      A-Rank: 4, S-Rank: 5). If you roll Higher, the triggering jutsu's effect is nullified and the caster of the jutsu
      takes the damage and effects of their own Jutsu. On a failure, you take the damage as they break through your
      jutsu.</p>
    chat: ''
  source:
