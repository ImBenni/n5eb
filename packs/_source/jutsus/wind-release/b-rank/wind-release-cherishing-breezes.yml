name: Wind Release Cherishing Breezes
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You inhale once, filling your lungs with Air that you mix medical release chakra. You then attempt to pass this
      air from your lungs into the lungs of another who have either died within the last minute or are dying. This can
      be done in a number of ways such as CPR, a kiss, simply manipulating the air to exit your lungs and enter the
      downed creatures.</p><p>When you do, the dead or dying creature makes a Constitution Saving throw adding 2d4 to
      their roll vs a DC 15 + 1 for each round they have been dead. On a Success, they immediately end the dead or dying
      condition regaining consciousness with 1 Hit Point and a number of Temporary Hit points equal to three times your
      Ninjutsu Save DC. These Temporary hit points last for 10 minutes.</p><p>At Higher Ranks: For each rank you cast
      this jutsu above B-Rank, increase the cost of this jutsu by 3 and the bonus to the creatures Constitution Saving
      throw by 1d4.</p>
