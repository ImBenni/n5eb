    value: "<p>You create a vortex where you can control the strength for the wind. Make a ranged ninjutsu attack targeting a creature you can see within range. On a hit target creature takes 8d6 wind damage and gains 2 ranks of bleed, as the wind slices into them with enough force to upheave the ground upon impact. If there are any sources of fire in the line of fire between you and your target this jutsu ignites into a stream of fire. Increase the damage by 5d4 fire damage.\_</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6</p>"
