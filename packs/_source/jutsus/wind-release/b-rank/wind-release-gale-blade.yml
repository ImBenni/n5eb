name: Wind Release Gale Blade
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create a super thin blade of cutting wind that slices through everything in a continuous line. Select a
      space you can see within range. Then select a second space you can see within 60 feet of the originally selected
      space. Draw a straight line in between both spaces. All creatures who the line passes through or by within 5 feet
      must make a Dexterity saving throw, taking 6d8 wind damage, gaining 3 ranks of bleeding and causing Swirl on a
      failed save or half as much and no additional effects on a successful one.</p><p>At Higher Ranks: For each rank
      you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage by 1d8.</p>
