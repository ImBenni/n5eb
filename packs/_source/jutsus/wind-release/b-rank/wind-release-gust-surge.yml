name: Wind Release Gust Surge
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You punch the ground creating a single point of intense air pressure that explodes outwards blowing away all
      creatures and potentially all attacks.</p><p>All creatures within range of your choice must succeed a Strength
      saving throw. On a failed save they are thrown back to the edge of this jutsu's radius into a space that can hold
      them.</p><p>Creatures who fail their Strength saving throw gains 3 ranks of bruised on a failed save.</p><p>If
      this jutsu is used in reaction to a Ninjutsu or Taijutsu being cast, the shockwave of air pressure reduces the
      damage the jutsu would deal by 5d6 + 15. If the jutsu used does not deal damage the triggering creature must
      succeed a Constitution (Chakra Control) check vs your Ninjutsu save DC. On a success their jutsu is cast as
      normal. On a failure, their jutsu is also blown away as this jutsu negates it.</p><p>If this jutsu is used to
      trigger a clash with a Jutsu with the Fire Release Keyword, you make your clash check at advantage as you are
      pushing all the wind away from you. If you succeed your clash check against a jutsu with the fire release keyword,
      they take an additional 4d8 wind Damage and must succeed a Constitution saving throw being burned on a failed
      save.</p>
    chat: ''
  source:
