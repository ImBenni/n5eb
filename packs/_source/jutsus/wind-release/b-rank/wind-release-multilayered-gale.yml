name: Wind Release Multilayered Gale
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You wave your hands back and forth creating layers of wind that stack on top of one another creating a barrier
      of wind. Your Wall of wind is extremely dense not allowing most things to pass through it. When you create your
      barrier of wind it has 30 Hit points. It occupies your space with you and protects you in all direction, ranged
      attacks targeting you are made at disadvantage. At the start of each of your turns you can enhance this barrier
      regenerating 3d6 of the barriers hit points. This Barrier has a vulnerability to Fire damage, and resistance to
      Lightning damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this
      jutsu by 3 and the initial hit points of the barrier by 10.</p>
    chat: ''
