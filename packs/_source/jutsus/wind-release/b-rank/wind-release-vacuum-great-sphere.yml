name: Wind Release Vacuum Great Sphere
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You generate 3 large Spheres of wind chakra. Choose 3 spaces in range. You send the large wind spheres to these
      areas and they expand outwards with the point you've chosen at the center, 30 feet in diameter. Creatures caught
      in these spheres or who enter them, movement speed is reduced to 0 and they cannot breathe while inside the sphere
      as the pressure prevents them from inhaling successfully.</p><p>Creatures caught in the radius of any sphere can
      make a strength saving throw or continue to have their movement speed reduced to 0. On a successful save, they
      regain half of their movement speed.</p><p>A creature who begins or ends its turn within the radius of a sphere
      must make a constitution saving throw. On a failure, they begin to suffocate, gaining 2 rank of exhaustion. On a
      success, they recover 2 rank of exhaustion caused by this jutsu, if any.</p><p>Upon escaping or ending this
      jutsu's effect on them, they recover from all ranks of exhaustion this jutsu imposed on them.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and select one
      additional space this jutsu affects.</p>
