system:
  description:
    value: >-
      <p>The User must make a Ninjutsu Melee Attack. On a hit, the targeted creature is Grappled and Restrained.
      Additionally, the target has disadvantage on using Jutsu with the HS Component.</p><p> As a Single Seal Reading
      Wind Release takes position on the target's chest, 11 individual ropes of Wind Release emerge from the seal.
      </p><p>The targeted creature must succeed on a Constitution Saving Throw or lose the ability to mold chakra until
      the start of their next turn. </p><p>The target can make a Constitution Saving Throw at the end of each of its
      turns to end the Grappled and Restrained conditions and to remove the disadvantage on using Jutsu with the HS
      Component. </p>
