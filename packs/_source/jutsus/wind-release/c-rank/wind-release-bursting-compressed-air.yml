name: Wind Release Bursting Compressed Air
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You conjure a spiraling vortex of wind chakra around a target creatures weapon. The target creature makes a
      Dexterity saving throw to avoid the collapse of the wind.</p><p>On a failed save they take 3d6 slashing damage as
      they are sliced for holding the weapon, and cause Swirl. If they continue to hold their weapon, they must make
      another save at the beginning of their next turn. On a successful save they take half damage. These additional
      saving throws do not cause Swirl.</p><p>After 3 failed saves the weapon they are holding can't take any more
      damage and shatters sending weapon shrapnel haphazardly flying. Other Creatures within 10 feet of the exploding
      weapon taking 3d6 slashing damage.</p>
    chat: ''
