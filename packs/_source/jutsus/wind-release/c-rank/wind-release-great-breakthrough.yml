name: Wind Release Great Breakthrough
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>ou create a swirling vortex of air in front of you. You compress the air until the pressure explodes forward
      like a cannon in a straight line. Creatures in a 5- foot wide, 60-foot-long line must make a Strength saving
      throw. Creatures take 4d10 Wind damage, are thrown backwards 30 feet away, gain the dazed and prone conditions,
      and cause Swirl on a failed save. On a success they take half damage and no further effects.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase damage by
      1d10 and knock back distance by 10ft.</p>
