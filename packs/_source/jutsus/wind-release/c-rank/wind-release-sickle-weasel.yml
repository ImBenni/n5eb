system:
  description:
    value: >-
      <p>When you take damage you are able to collapse the circling wind around you and the triggering creature causing
      the wind to collide with the hostile creature creating an extremely sharp blade of wind.</p><p>All creatures
      within 20 feet of you makes a Strength saving throw taking 5d8 Wind damage, gain 1 rank of bleed and cause
      <strong>Swirl</strong> on a failed save or half as much on a success.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the initial damage by
      1d8.</p>
