name: Wind Release Vacuum Barrier
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create a swirling vortex of air in front of a creature you can see within range right before take damage.
      The compressed air compresses then explodes pushing attacks and other forces back, protecting the creature. Reduce
      the damage the target creature takes by 2d8+4.</p><p>This Damage Reduction is doubled if the damage is Lightning
      Damage and halved if the damage is Fire Damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the damage reduced by 1d8.</p>
