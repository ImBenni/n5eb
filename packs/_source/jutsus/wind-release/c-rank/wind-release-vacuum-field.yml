name: Wind Release Vacuum Field
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: "<p>You manifest a Seal of wind Release Chakra that glows in the air. The seal then triggers completely removing all evidence of Oxygen and atmosphere from a 30-foot radius sphere centering on you. You and all other casters are immune to this jutsu's effects.</p><p>All creatures who begin their turns in this jutsu's range must succeed a Constitution Saving throw or begin immediately suffocating as they are robbed of their air in their lungs. A Suffocating creature can only survive a number of rounds equal to their constitution modifier before passing out falling unconscious from the lack of air. An unconscious creature in this jutsu's radius automatically takes 5d10 Necrotic Damage. A creature who's hit points are reduced to 0 as a result of this jutsu lungs, heart and other internal organs explode while inside the body. Being unable to be revived without these organs being restored as well. An unconscious creature can regain consciousness when another creature spends an action waking them.</p><p>Combination: If this jutsu is cast as a Combination jutsu with 2 or more casters increase the damage by 2d10.</p><p>Any creature who assists in casting this jutsu as a combination jutsu increases this Jutsu's area of effect size based on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2: Increase the radius by +10 feet, +3: Increase the radius by +15 feet, +4: Increase the radius by +20 feet, +5: Increase the radius by +30 feet).</p><p>\_</p>"
