name: Wind Release Whirlwind Thrust
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create an updraft of cycling wind release chakra that erupts from the ground under a group of creatures.
      Select a space within range. All creatures within 15 feet of the selected space must make a Strength saving throw.
      On a failed save, creatures are thrown 30 feet upwards into the air taking 3d10 wind damage and causing Swirl. If
      a creature cannot safely land, they take falling damage as normal.</p><p>If the space this jutsu is casted
      overlaps with a source of Fire or Water additional effects happen.</p><p>Fire: This Jutsu ignites and becomes a
      flaming whirlwind instead dealing 3d12 fire damage instead of 3d10 Wind Damage. Creatures must also succeed a
      Constitution saving throw gaining the burned condition on a failed save.</p><p>Water: This jutsu becomes swirled
      with a powerful torrent of Water instead dealing 3d12 Cold damage instead of 3d10 Wind Damage. Creatures must also
      succeed a Constitution saving throw gaining the chilled condition on a failed save.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 1d10 or
      1d12.</p>
