name: Wind Release Wind Friction Shatter
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You coat a creature whom you touch body in a layer of spinning air. The air removes most friction from its body
      allowing them to move at breathtaking speeds, with little resistance.</p><p>They gain +1 bonus to their AC, a +20
      bonus to speed, advantage on Dexterity saving throws and they gain the Friction Break special action at the start
      of each of their turns for the duration.</p><p>Friction Break. This special action can be used to either make one
      additional Weapon Attack, Disengage, or use an object action.</p>
