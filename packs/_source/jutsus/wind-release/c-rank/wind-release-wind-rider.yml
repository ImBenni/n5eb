name: Wind Release Wind Rider
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You touch a willing creature you can see within range coating them in Wind Release Chakra. For the duration,
      the target creature gains a 30ft flying speed, but at the end of their turn they must be within 5 feet of the
      ground. The creature cannot suffer falling damage as they are always carried by the wind to a safe landing.
      Additionally, the creature is always floating at least 5 feet off the ground for the duration.</p><p>At Higher
      Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. Starting at A-rank,
      an affected creature no longer needs to end its turn within 5ft of the ground</p>
