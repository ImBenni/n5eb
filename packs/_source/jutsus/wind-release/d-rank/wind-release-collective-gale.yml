name: Wind Release Collective Gale
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You collect wind release chakra and infuse it into your Medical Release technique. One willing creature within
      range breathes in this Medically infused wind.</p><p>For the duration a creature who has breathed this wind does
      not need to breathe, Ignores the effects of 1 rank of Exhaustion and when they would regain hit points as the
      result of a Ninjutsu with the Medical Keyword, they regain an additional 1d4 Hit points.</p><p>At Higher Ranks:
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, Ignores the effects of up to
      1 additional rank of Exhaustion.</p>
