system:
  description:
    value: >-
      <p>You create a condensed bubble of super dense air around you in an attempt to deflect incoming attacks. Roll
      3d8. The result of the roll is the amount of damage your air Bubble can prevent before it bursts. This lasts until
      the beginning of your next turn. Lightning Damage deals half as much damage to your air bubble and Fire Damage
      deals twice as much.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3 and roll an additional 1d8.</p>
