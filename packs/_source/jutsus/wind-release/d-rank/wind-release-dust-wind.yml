name: Wind Release Dust Wind
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You generate a strong wind from your lungs with a single breath. When you exhale you kick up a cloud of dust,
      dirt, and other loose debris in the target radius. Creatures who are in the affected range must make a Wisdom
      Saving throw. On a failed save, affected creatures cause Swirl and are considered blind until the end of their
      next turn on a failed save. On a successful save no further effects are applied.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the size of the cone by 10ft</p>
