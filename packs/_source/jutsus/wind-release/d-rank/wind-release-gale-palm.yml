name: Wind Release Gale Palm
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You clasp your hands together coating your open palms in a powerful gale. You make a Melee ninjutsu attack on a
      target creature or object. On a hit creature take 3d6 Wind Damage and make a Strength saving throw to resist being
      knocked back 20 feet and causing Swirl. On a successful Strength save they suffer no additional effects.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage
      by 1d6</p>
