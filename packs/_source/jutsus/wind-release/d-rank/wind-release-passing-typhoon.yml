name: Wind Release Passing Typhoon
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create a powerful current of strong winds in a 15-foot radius sphere, centering on you. This field of wind
      also follows you.</p><p>For the duration, while within its area, it deafens other creatures, extinguishes
      unprotected flames, becomes difficult terrain to creatures other than you and disperses vapors, gases and fogs
      that can be dispersed by strong winds. Additionally, ranged attacks have disadvantage if they pass into or out of
      the area of this jutsu.</p>
