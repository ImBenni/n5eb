name: Wind Release Peacock Whirlwind
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You generate a strong wind from swiping one of your limbs. A gust of wind is generated in a 30-foot long 5-feet
      wide in a straight line originating from you. Creatures in the line must make a Strength saving throw, taking 2d6
      wind damage, is knocked prone, gains 1 rank of bleeding and causing Swirl on a failed save, and only half damage
      and no further effects on a successful save</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3, the damage by 1d6 and the ranks of bleed by +1.</p>
