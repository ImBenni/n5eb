system:
  description:
    value: >-
      <p>You encircle a willing creature with potent Wind Release Chakra. For the duration, you magnify the targets
      physical capabilities.</p><p>The target creature adds 1d4 to all Strength and Dexterity skill checks and saving
      throws. Their movement speed is increased by 15 feet and melee attacks they make that deal damage deals an
      additional 1d6 Wind Damage.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3 and the number of targets you can affect by +1.</p>
