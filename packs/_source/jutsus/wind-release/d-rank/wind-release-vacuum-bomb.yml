name: Wind Release Vacuum Bomb
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: "<p>You create a single point of high-density air pressure using your Wind Release Chakra before expanding it and creating a series of\_ reactions. All creatures currently affected by an elemental condition who would have a jutsu cast on them that triggers the swirl effect, potentially passes all such conditions around to other creatures near them in an expanded space with more volatility.</p><p>When a creature would have the Swirl effect trigger on them, you can cast this jutsu as a part of the same action. All creatures within 20 feet of the triggering creature who failed their save gains two ranks of all elemental conditions the triggering creature had.</p><p>At Higher Ranks: For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the size of the area affected by 5 feet.</p>"
