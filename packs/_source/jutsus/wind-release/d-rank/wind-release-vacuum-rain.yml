name: Wind Release Vacuum Rain
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create a powerful updraft that sucks the oxygen and air upwards robbing creatures of the ability to breathe
      within range. All casters of this jutsu create a 60-foot tall, 20-foot-wide cylinder that removes all air from
      inside of it replacing it with furiously rotating blade of Wind Release Chakra, centered on a point of your choice
      within range.</p><p>All creatures within the cylinder must succeed a Dexterity and Constitution saving
      throw.</p><p>On a failed Dexterity save they are slashed with wind chakra repeatedly taking 2d6 Slashing Damage
      and 2d6 Wind Damage or half as much on a successful save. A creature makes this saving throw the beginning of each
      turn they begin within this cylinder.</p><p>On a fail Constitution Saving throw they are robbed of their air in
      their lungs as they begin suffocating. A Suffocating creature can only survive a number of rounds equal to their
      constitution modifier before passing out falling unconscious from the lack of air. A creature makes this saving
      throw at the beginning of each turn they begin within cylinder. An unconscious creature can regain consciousness
      when another creature spends an action waking them.</p><p>Creatures inside the cylinder cannot gain the benefits
      of an increase to movement speed and are treated as if they are in difficult terrain.</p><p>Combination: If this
      jutsu is cast as a Combination jutsu with 2 or more casters increase the damage by 2d6 for each damage
      type.</p><p>Any creature who assists in casting this jutsu as a combination jutsu increases this Jutsu's area of
      effect size based on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2: Increase the
      Height by +10 feet and radius to 30 feet, +3: Increase the Height by +20 feet and radius to 40 feet, +4: Increase
      the Height by +30 feet and radius to 50 feet, +5: Increase the Height by +40 feet and radius to 60 feet).</p>
