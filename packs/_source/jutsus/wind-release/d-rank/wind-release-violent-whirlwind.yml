name: Wind Release Violent Whirlwind
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You exhale a powerful stream of wind from your mouth. Creatures caught in the target area must make a Strength
      Saving throw. Creatures take 2d6 Wind Damage, are pushed back 30 Feet, are knocked prone and cause Swirl on a
      failed save or half as much and no additional effects on a successful save. Also, vapors, gases and fogs that can
      be dispersed by strong winds are dispersed immediately.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3. Increase the range of this jutsu by 10ft.</p>
