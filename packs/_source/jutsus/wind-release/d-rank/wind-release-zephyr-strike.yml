system:
  description:
    value: >-
      <p>You move like the wind. For the duration, your movement doesn't provoke opportunity attacks. Your movement
      speed increases by 30 feet until the end of the turn you cast this jutsu. Also, once before the jutsu ends, you
      can give yourself advantage on one attack roll on your turn. On a hit, the attack deals an extra 2d8 wind damage
      and immediately ends this jutsu.</p>
    chat: >-
      <p>: You move like the wind. For the duration, your movement doesn’t provoke opportunity attacks. Your movement
