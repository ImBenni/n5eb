system:
  description:
    value: >-
      <p>A torrent of concussive wind erupts from your hands that explodes forward devastating everything in a 100-foot
      cone in front of you. This jutsu blows everything not tied down away and even upheaves trees and smaller
      structures and buildings. Creatures in its path must succeed a Strength saving throw being thrown back 120 feet on
      a failed save. If the creature hits a structure their movement ends and they take triple the falling damage as if
      they fell the same distance they traveled.</p>
