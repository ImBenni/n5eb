name: Wind Release Spiraling Tempest
type: spell
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You release a surge of Wind Release Chakra that protects and enhances all of your allies for the duration. All
      creatures of your choice within range gain the following;</p><p>• If a creature starts their turns in this jutsu's
      radius, they gain a Bonus +30 Movement speed until the end of their next turns.</p><p>• They gain a +3 bonus to
      Ninjutsu and Taijutsu Attack Rolls.</p><p>• They gain a number of Temporary Hit points equal to your Ninjutsu Save
      DC at the beginning of each of their turns. These Temporary hit points do not stack.</p><p>• Taijutsu they cast
      that has a range of touch, or 5 feet, increases their range by 15 feet, and deals an additional 3d8 Wind
      Damage.</p><p>• Affected Creatures cannot be Dazed or Weakened.</p><p>• Affected creatures gain Resistance to
      Lightning Damage.</p>
