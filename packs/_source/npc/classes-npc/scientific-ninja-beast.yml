    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>The Scientific Ninja Beast is programmed to respond only to its creator; however, it can still perform
          basic functions when not commanded.</p><p> If the Scientific Ninja Beast has not received any commands on a
          turn, it will take the dodge action.</p><p> If its master is incapacitated in any way it will choose an ally
          of theirs who can now use their bonus action to direct the Scientific Ninja Beast.</p><p></p>
