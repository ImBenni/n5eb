  - name: Bio-Organic Identifier
    type: feat
    _id: RuEB7GxVPFzwl8bO
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>Your S.N.B can spend 1 minute analyzing a sample of a substance that is organic in nature, it can identify
          what the substance is, its regional origin, and how old it is.</p><p> Beginning at 15th level, you have
          connected your S.N.B to a DNA database.</p><p> At DM discretion, when your S.N.B successfully identifies a
          substance as blood, it may be able to determine who the blood belongs to.</p><p> If your S.N.B has
          successfully hit the creature with a melee Bite attack and has dealt damage to the targets Hit Points, it can
          automatically recognize the blood.</p><p></p>
