  - folder: eRrJSrsktfTfZZsH
    name: Young Inuit
    type: class
    img: icons/creatures/mammals/wolf-shadow-black.webp
    system:
      description:
        value: >-
          <p>From the Inuzuka @UUID[Compendium.n5eb.clan.Item.uvQdkZlw2ofp6Jfy]{Beast Master}<br />A breed known for its
          hunting skill. This Nin-Dog gains the following;</p><ul><li><p>Proficiency in Investigation and
          Stealth.</p></li><li><p>+1 ranks of Mastery in Perception.</p></li><li><p>+10 increase to their speed and
          ignores difficult terrain.</p></li><li><p>This breed can either Dash or Disengage at no action cost, once per
          round as part of one of their commands.</p></li><li><p>Beginning at 11th level, your Nin-Dog gains the
          benefits of your Wild Sense feature.</p></li></ul><hr /><p>Dogs and wolves are loyal animals. Dogs serve those
          who treat them with kindness and respect. Wolves serve powerful and unnerving leaders.</p><hr
          /><p><strong>Summon Type:</strong> Carnivoran</p><p><strong>Toughness</strong>: 10</p><p><strong>Defensive
          Ability Score</strong>: Dexterity</p><p><strong>Saving Throws</strong>: Strength, Dexterity, Constituation,
          Intelligence, Wisdom, Charisma</p><p><strong>Creature Skills</strong>: Athletics, Perception,
          Insight</p><p><strong>Creature Senses</strong>: Darkvision (30ft), Keen Smell &amp; Hearing</p>
