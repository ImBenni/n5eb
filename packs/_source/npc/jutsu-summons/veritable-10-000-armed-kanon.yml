        value: >-
          <p>As an action, while Kan'on does not have the 10,000 arms attached to its back, it enters a state of bliss
          and regret. </p><p>Kan'on Darts around the battlefield attacking creatures at such a fast pace that most
          wouldn't fathom such a large creature moving this fast. </p><p>Kan'on makes a number of Fist of Repent attacks
          against each hostile creature within 100 feet of it. </p><p>Make one Fist of Repent attack, comparing the
          result to all target creatures AC, dealing Fist of repents damage to each creature a number of times equal to
          the number of creatures Kan'on attacked. </p><p>Additionally, creatures with 0 Chakra takes triples the damage
          dealt as force damage. Once used, Kan'on is unsummoned immediately.</p>
