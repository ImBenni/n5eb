    type: feat
    system:
      description:
        value: >-
          <p>As an action, Kan'on attempts to restrain a target and seal away its chakra. Kan'on takes the Grapple skill
          action. </p><p>On a success, the target must succeed a constitution saving throw. </p><p>On a Failed save,
          their chakra is sealed away, being unable to spend chakra. </p><p>A creature sealed this way cannot spend
