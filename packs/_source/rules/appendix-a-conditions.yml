  - name: Shocked
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><ul><li>A <strong>Shocked</strong> creature who takes a reaction, takes 1d6
        Lightning damage, for each rank it has, once per turn.</li><li>A <strong>Shocked</strong> creature who takes a
        Reaction to cast a jutsu must first make a DC 8 Flat check. On a failure, they double the cost of the jutsu. For
        rank of shocked beyond the first, increase this DC by +1 (Max DC 12).</li><li>A creature resistant to Lightning
        damage makes their flat check at advantage and also has resistance to this condition. A creature immune to
        Lightning damage has immunity to this condition.</li><li>A creature can spend an Action to make a DC 15
        Constitution (Survival) Check to ground themselves, dispersing the electricity in their body ending this
        condition.</li></ul>
