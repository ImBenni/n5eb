  - name: Poisoned/Envenomed
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><ul><li>An <strong>Envenomed</strong> creature or object takes 1d6 poison
        damage for each rank it has, at the start of each of their turns for the duration of this condition</li><li>An
        <strong>Envenomed</strong> creature suffers a -1 penalty to their AC for each rank it has.</li><li>An
        <strong>Envenomed</strong> creature cannot gain the benefits of a rest.</li><li>Creatures that are immune to
        poison damage are immune to the envenomed condition.</li><li>Outside of combat, every hour a creature suffers
        the effects of this condition as if a turn has passed in combat.</li></ul>
