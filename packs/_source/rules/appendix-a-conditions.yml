  - name: Grappled
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <ul><li>A <strong>Grappled</strong> creature’s speed becomes 0, and it can’t benefit from any bonus to its
        speed.</li><li>The condition ends if the grappler is @UUID[.TpkZgLfxCmSndmpb]{Incapacitated}.</li><li>The
        condition also ends if an effect removes the grappled creature from the reach of the grappler or grappling
        effect, such as when a creature is hurled away by the thunderwave spell.</li></ul>
      markdown: ''
