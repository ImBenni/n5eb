  - name: Prone
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <ul><li>A <strong>Prone</strong> creature’s only movement option is to crawl which they can do, up to half their
        movement speed unable to gain any bonuses to their speed, unless it stands up and thereby ends the
        condition.</li><li>The creature has disadvantage on melee attack rolls.</li><li>The creature has disadvantage on
        ranged attack rolls against targets within 30 feet.</li><li>An attack roll against the creature has advantage if
        the attacker is within 5 feet of the creature or the weapon used has the reach property. Otherwise, the attack
        roll has disadvantage.</li></ul>
