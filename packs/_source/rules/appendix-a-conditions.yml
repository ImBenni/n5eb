  - name: Charmed
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><ul><li>A <strong>Charmed</strong> creature increases its attitude to you,
        by 1 rank, for each rank of <strong>Charmed</strong> it has.</li><li>A <strong>Charmed</strong> creatures
        suffers a -2 penalty to Intelligence &amp; Wisdom based skill checks made against its infatuation for each rank
        it has.</li><li>A <strong>Charmed</strong> creature cannot take hostile actions towards the source of its
        infatuations. If they would suffer a hostile effect or damage from the source of its infatuations or one of its
        infatuations allies, they remove all ranks of this condition.es 1 rank of Berserk at the end of each of its
        turns as its mind slowly clears.</li></ul>
