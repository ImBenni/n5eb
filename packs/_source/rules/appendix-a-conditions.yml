  - name: Bruised
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><ul><li>A <strong>Bruised</strong> creature suffers a -1 penalty to all
        Strength, Dexterity &amp; Constitution based attack rolls and checks for each rank they have.</li><li>A
        <strong>Bruised</strong> creature takes +4 bonus damage from all sources of bludgeoning or earth damage for each
        rank they have, once per turn.</li><li>Creatures that are immune to bludgeoning or Earth damage are immune to
        this condition.</li><li>A creature who would gain a sixth (or more) ranks of the Bruised condition immediately
        becomes @UUID[.pOHBhBled5bUrksq]{Staggered}, ending the <strong>Bruised</strong> Condition.</li><li>A Creature
        can spend an Action to make a DC 15 Strength (Medicine) Check to end this condition by applying the appropriate
        amount of pressure to the wound.</li></ul>
