  - name: Blinded
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <ul><li>A <strong>Blinded</strong> creature cannot target another creature unless they have a special sense that
        does not require sight, such as <em><strong>Tremor Sense</strong></em> or <em><strong>Chakra
        Sensing</strong></em></li><li>A <strong>Blinded</strong> creature can’t see and automatically fails any check
        that requires sight.</li><li>A <strong>Blinded</strong> creature has disadvantage on Dexterity saving
        throws.</li><li>Attack rolls against a <strong>Blinded</strong> creature have advantage, and a
        <strong>Blinded</strong> creature’s attack rolls have disadvantage without the aid of a special sense that does
        not require sight, such as <em><strong>Tremor Sense</strong></em> or <em><strong>Chakra
        Sensing</strong></em>.</li><li>A creature can willingly close their eyes as a free action for an extended period
        of time. Doing so imposes this Condition on them until the beginning of their next turn, they cannot reopen
        their eyes until then, unless they are forced to do so by some other means.</li></ul>
    _id: 0b8N4FymGGfbZGpJ
