  - name: Invisible
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <ul><li>An invisible creature is impossible to see without the aid of powers or a special sense. For the purpose
        of hiding, the creature is heavily obscured. The creature’s location can be detected by any noise it makes or
        any tracks it leaves.</li><li>Attack rolls against the creature have disadvantage, and the creature’s attack
        rolls have advantage.</li></ul>
