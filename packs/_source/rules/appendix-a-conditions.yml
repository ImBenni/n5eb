  - name: Staggered
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 1</strong></p><ul><li>A <strong>Staggered</strong> creature is counted as Bruised 5 for
        the purposes of interacting with Features, Traits and Jutsu and cannot gain Ranks of Bruised for the
        duration.</li><li>A <strong>Staggered</strong> creature cannot take the Disengage, Dash or Dodge Actions or
        Reactions.</li><li>A <strong>Staggered</strong> creature takes a -5 penalty to all Strength, Dexterity and
        Constitution based Attack rolls and checks.</li><li>A <strong>Staggered</strong> creature takes +20 bonus damage
        from all sources of bludgeoning or earth damage, once per turn.</li><li>A <strong>Staggered</strong> creature,
        remains staggered until they spend one Full-Turn-Action gathering themselves, losing the Staggered condition at
        the beginning of their following turn after this Full-Turn Action.</li></ul>
