  - name: Dazzled
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><ul><li>A <strong>Dazzled</strong> creatures eyes become overloaded with
        flashes of colors, gaining a -2 penalty to all checks that rely on sight for each rank it has.</li><li>A
        <strong>Dazzled</strong> creature suffers a -2 penalty to attack rolls for each rank it has and cannot gain
        advantage on Ranged attack rolls.</li><li>A <strong>Dazzled</strong> creature reduced the range of Jutsu’s cast
        and ranged attacks made by 15 feet for each rank it has down to a minimum of 5 feet.</li><li>A
        <strong>Dazzled</strong> creature can make a DC 15 Constitution ability check as an action, to remove all ranks
        of this condition.</li></ul>
