  - name: Demoralized/Fear
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><p>Creatures who would gain ranks of <em><strong>Fear (or
        Freightened)</strong></em>, gain ranks of <em><strong>Demoralized</strong></em>.</p><ul><li>A
        <strong>Demoralized</strong> creature suffers a -1 penalty to its saving throws, for each rank they
        have.</li><li>A <strong>Demoralized</strong> creature must make concentration checks at the beginning of each of
        their turns to maintain concentration on their jutsu.</li><li>At the end of a <strong>Demoralized</strong>
        creatures turn they make a DC 13 Charisma ability check. On a success, they remove 1 rank of
        <strong>Demoralized</strong>. For every +2 their result is over the DC, they remove 1 additional rank of fear.
        This ability check can never be made with penalties of any type (including disadvantage). After 10 minutes, a
        creature who still has ranks of <strong>Demoralized</strong>, loses all ranks of <strong>Demoralized</strong> it
        has remaining</li></ul>
