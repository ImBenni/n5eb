  - name: Bleeding
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><ul><li>At the start of their turn, a bleeding creature takes 1d4 necrotic
        damage for each rank of Bleed they have.</li><li>A creature who would gain a sixth Rank of the Bleeding
        condition immediately gains 1 rank of the @UUID[.vjYQe6IQ1lOgLy1U]{Lacerated}condition in place of the
        additional rank of bleeding.</li><li>A bleeding creature cannot gain the benefits of a rest.</li><li>The
        creature may attempt to stop the bleeding by succeeding on a DC 15 Medicine check.</li><li>Outside of combat,
        every 10-minutes a creature suffers the effects of this condition as if a turn has passed in combat.</li></ul>
