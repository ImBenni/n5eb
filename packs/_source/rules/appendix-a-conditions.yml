  - name: Berserk
    type: rule
    title:
      show: true
      level: 2
    text:
      format: 1
      content: >-
        <p><strong>Max Ranks: 5</strong></p><ul><li>A <strong>Berserk</strong> creature must use all action(s) and
        movement to attack/harm the creature nearest to it that it can perceive as if that creature was a mortal enemy.
        If multiple creatures are potential targets, it picks one at random.</li><li>When a creature moves out of a
        berserk creature's reach, it provokes an opportunity attack.</li><li>A <strong>Berserk</strong> creature has a
        -1 penalty to all Charisma based attacks, checks and saving throws for each rank it has.</li><li>Creatures that
        are immune to the charmed condition are also immune to the berserk condition. A Jutsu which cures the charmed
        condition also cures this Condition</li><li>A <strong>Berserk</strong> creature loses 1 rank of Berserk at the
        end of each of its turns as its mind slowly clears.</li></ul>
