name: Fighting Aura
type: feat
_id: j2gV8A4Ywr5L6MWQ
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>At 9th level, your snacks tooth-rotting sweetness extend to their aroma, granting you an additional
      Aura.</p><p> You may activate this Aura once, then twice at 14th level, per Long Rest without spending a use of
      your Auras.</p><p> Battlefield Scent: When a creature would start their turns within this Aura, roll 1d6, and they
      gain one of the following benefits based on the result, until the end of their next turn: </p><p>• 1: Increase
      their next attack roll by +2.</p><p> • 2-3: Increase the next damage they deal by +4.</p><p> • 4-5: The next time
      they damage a creature, ignore half of that creatures DR.</p><p> • 6: Increase their AC against the next attack
      they're targeted with by +2.</p><p> Additionally, if a creature benefiting from this Aura would further increase
      any of the bonuses granted by this Aura (i.e. Casting a Jutsu, or using a feature, that directly increases your AC
      by 3, while benefiting from the 6 option, they reroll their benefit.)</p><p> Finally, the creature this Aura is
      centered on may, as a reaction, end this Aura to choose one option and grant its bonuses to all creatures within
      this Aura, replacing any other options they may be benefiting from.</p><p></p>
