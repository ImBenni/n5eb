name: Swift Snacks
type: feat
_id: 8qGTcxT2roCKc7zN
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>When you choose this Focus beginning at 2nd level, you learn to cook with additional secret ingredients that
      can be used with your Shinobi Snacks class feature.</p><p>All Snacks granted by this subclass can be taken as both
      a Free Action on your turn or as a part of initiative, when you would make an Initiative
      roll.</p><ul><li><p>@UUID[Compendium.n5eb.items.Item.bqTO8VkiOMXpcUm4]{Proscuitto Bushetta}: If used as a part of
      initiative, the creature adds the result of your Cooking Dice to their initiative check and gain a bonus to speed
      equal to 5 x the result until the end of their first turn in combat.<br />If used at any other time increase their
      current initiative by the result, at the end of their
      turn.</p></li><li><p>@UUID[Compendium.n5eb.items.Item.5R2GztegIEa1AXoU]{Juicy Dumpling}: If used as a part of
      initiative, the creature selects one hostile creature they can see.<br />They gain a bonus to their AC and saving
      throws equal to half the result of your Cooking Dice against the selected creature, until the end of the chosen
      creature's second turn in combat.<br />If used at any other time, they can add half the result of your Cooking
      Dice to their next weapon attack.</p></li><li><p>@UUID[Compendium.n5eb.items.Item.U8wUwzkOKPwiaWJx]{Spicy
      Bocconcini}: If used as a part of initiative the creature gains one additional Reaction, total, which can be used
      as normal for a number of rounds equal to half the result of your Cooking Dice.<br />If used at any other time,
      the creature instead gains temporary hit and chakra points equal to the
      result.</p></li><li><p>@UUID[Compendium.n5eb.items.Item.Lcs8SvQeYCDS2Ad3]{Hot Cocoa}: If used as a part of
      initiative the creatures body becomes hot to the touch, from the pure speed of their movements.<br />The creature
      gains resistance to fire and wind damage, and Inflicts a number of Ranks of Bleed and Burned equal to half the
      result of your cooking dice on the first creature they damage before the end of their first turn.<br />If used at
      any other time, the creature instead can reroll their initiative, adding the twice to the result of your Cooking
      Dice and treating this turn as if it were their first this combat.</p></li></ul>
    chat: ''
