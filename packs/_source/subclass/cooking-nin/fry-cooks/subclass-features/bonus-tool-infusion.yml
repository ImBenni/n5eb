folder: XP5L0Uz2c4RLbYFu
name: Bonus Tool Infusion
type: feat
_id: uG5mKYPr60jyFgpR
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>You gain a second Cooking Tool Infusion weapon, following the same structure as your original one, but with
      some custom unique features.</p><p> You gain a cooking tool; this Weapon is a form of a pair of tight-fitting
      Fryer Gloves.</p><p> At second level, this Weapon deals Acid damage and gains one of the following
      properties.</p><p> your cooking tool deals damage equal to your Cooking Dice and you can also use Constitution in
      place of Strength when determining your attack and damage rolls, lastly this Weapon starts out with the Unarmed
      trait: </p><p>• Convert: While holding this Weapon, when you deal cold or fire damage, you can change the damage
      type to acid, increasing the damage dice by +1, once per turn.<br /> If you use this ability on a Jutsu or feature
      that would also give a condition, you can choose for the condition to instead become Corroded.</p><p> • Frying
      Fist: When you would deal damage with a Taijutsu you can change the damage type to Acid and increase the damage
      dice by +1, once per turn.</p><p> • Fry Flip: When you cast a Jutsu with the Water release Keyword you can fry and
      flip it, increase the range of the Jutsu by 15ft and the damage dice by +1, once per turn.</p><p></p><p> Starting
      at 6th level, your cooking tool gains an additional weapon property of your choice.</p><p> • Enhanced Oil:
      Whenever you cast a Jutsu with the Water release Keyword while this item is in your hand, you may as a bonus
      action increase its DC by +1.</p><p> • Acid Absorb: You can use Acid or any other oil-like substance in the place
      of water when casting Water release Jutsu, or creating an area of Acid.<br /> When you do so the Acid, or Jutsu's,
      damage Dice Size is increased by +1 • Acid Sting: Whenever you deal the Corroded condition, increase the damage to
      a D8 and increase the removal DC by +3, lastly it cannot longer be removed by going into water.</p><p></p><p>
      Beginning at 11th level, your cooking tool gains one additional weapon property of your choice.</p><p> • Acid
      Explosion: When you cast a Jutsu with the Water release Keyword that deals Acid damage, you may, twice per Long
      Rest, release a small, 15-foot Radius Sphere, cloud of Acidic haze that lasts until the end of your next
      turn.</p><p> Allied creatures inside this haze treat Water release Jutsu they cast as if there was a source of
      water nearby and reduce the cost of Jutsu with the Water release Keyword by -2 (Min. half cost).</p><p> • Acid
      Obliteration: When you would cast a Taijutsu using this Weapon that deals Acid damage you can use Constitution
      instead of its normal casting stat.</p><p></p>
