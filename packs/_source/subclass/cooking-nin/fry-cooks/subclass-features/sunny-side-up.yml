img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>At 9th level, your fresh fried snacks pop boiling hot grease all over your foes relaxing, granting you an
      additional Aura which you can activate for free once per long rest.</p><p> Deep-Fried Scent: Creatures of your
      choice within this Aura can only attempt to remove ranks of corroded with a Constitution Ability Check.</p><p>
      Additionally, if they would be inflicted with a condition other than corroded, must succeed a Constitution saving
      throw or be inflicted with 1 rank of corroded, once per turn.</p><p> Finally, the creature this Aura is centered
      on may, as a bonus action or reaction, end it early and force creatures of their choice within the Aura to make a
      Constitution saving throw.</p><p> On a failure, they take 1d6 acid damage for each rank of corroded they are
      inflicted with or, if they have no ranks of corroded, be inflicted with 2 ranks.</p><p></p>
