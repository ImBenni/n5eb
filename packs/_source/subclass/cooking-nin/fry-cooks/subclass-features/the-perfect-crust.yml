  description:
    value: >-
      <p>Starting at 13th level, you've learned that higher quality oil produces better results.</p><p>You gain the
      following benefits; </p><p>• Fried Snacks from your Fried Snacks feature that can only be eaten once per Rest, can
      now be eaten three times per Rest.</p><p>• "Fried" pills from your Revv Up Those Friers feature stay crispy for 24
      hours, and once they lose their crispiness, the result is no longer halved and is instead reverted back to normal
      before the pill was fried.</p><p></p>
