name: Bonus Tool Infusion
type: feat
_id: A6jSVrzfuwwo7Pe2
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>At 2nd Level, you gain a second Cooking Tool Infusion weapon, following the same structure as your original
      one, but with some custom unique features.</p><p> You gain a new cooking tool as your Gastrochemist weapon.</p><p>
      Gastrochemist weapons can be anything that fits its mechanics, it can be a metal fist, a lightning lighter,
      flamethrowing pistol, etc.</p><p> Your cooking tool deals damage equal to your Cooking Dice and you can also use
      Intelligence in place of Strength when determining your attack and damage rolls.</p><p> Your weapon damage type
      becomes that of your chosen Nature, and it gains one of the following properties: </p><p></p><p>• Reactive
      Element: When you would cast a Jutsu that deals the damage of the same damage type as your Gastrochemist weapon
      you may add your Cooking Dice to the damage, once per turn.</p><p> • Evocation </p><p>• Hidden </p><p>• Chakra
      Storage: You can store chakra into your Gastrochemist weapon.<br /> You may spend Chakra at the end of a Long Rest
      to Store Chakra into this Weapon, with a maximum stored Chakra of 5, which is Stored until spent.<br /> Chakra
      stored in this Weapon can only be used to cast Jutsu of your Natures Blend Element.</p><p> • Quality Guaranteed,
      Probably: When you would roll your Cooking Dice as a part of an effect gained by the Nature's Blend Feature, if
      your result of your Cooking Dice would be less than the maximum result, increase it by +1, once per
      turn.</p><p></p><p> Starting at 6th level, your cooking tool gains a additional weapon property of your choice;
      </p><p>• Extra Chakra Storage: You can store chakra into your Gastrochemist weapon.<br /> You may spend Chakra at
      the end of a Long Rest to Store Chakra into this Weapon, with a maximum stored Chakra of 10, which is Stored until
      spent.<br /> Chakra stored in this Weapon can only be used to cast Jutsu of your Natures Blend Element.<br /> If
      this Gastrochemist weapon has the Chakra Store Property, replace it with this Property, which does not grant you
      an additional 2nd Level Property, and increase this Property's maximum Stored Chakra to 15.</p><p> • Ranged
      (60/120ft)</p><p>• A Little Extra: When you would cast a Jutsu of your Nature's Blend Element, you may, as a bonus
      action, make an attack against a creature who would be effected by the Jutsu, with your Gastrochemist weapon as an
      Action or Bonus Action.</p><p> On a Hit, you deal weapon damage as normal, and give the creature Disadvantage on
      all saving throws resulting from the Jutsu, or gain Advantage on all attacks, resulting from the Jutsu, against
      the creature.</p><p> • The Ol' Switcheroo: When the damage of a Jutsu, of your Natures Blend Element, would be
      reduced, you may increase its damage by twice your Gastronomist weapon's damage Dice.<br /> Immunity is considered
      damage Reduction for the purposes of this Property.</p><p></p><p> Beginning at 11th level, your cooking tool gains
      one additional weapon property of your choice.</p><p> • Chemical Control: When you would cast a Jutsu of your
      Nature's Blend release, you may reduce its Cost by -2, or -4 if it's above A-Rank (This is applied regardless of
      other Features, Traits, Jutsu, or Cost Reduction effects, other than the Special Cost) • Mega Chakra Store: You
      can store chakra into your Gastrochemist weapon.<br /> You may spend Chakra at the end of a Long Rest to Store
      Chakra into this Weapon, with a maximum stored Chakra of 15, which is Stored until spent.<br /> Chakra stored in
      this Weapon can only be used to cast Jutsu of your Natures Blend Element.</p><p> • If this Gastrochemist weapon
      has the Chakra Store Property, or Extra Chakra Storage Property, replace it with this Property, granting you one
      additional 2nd or 6th level Property, and increasing this Property's maximum Stored Chakra to 20, if you have one,
      or 25 if you have both.</p><p> • Double Tap: Once per Turn, when you would cast a Jutsu of your Nature's Blend
      Element, that has a casting Time of 1 Action, you may instead cast it as a Bonus Action, or a Free Action if
      you've hit with an attack made using the A Little Extra weapon Property this Turn.</p><p></p>
