name: In Touch
type: feat
_id: UjTazBYeiBzYywvw
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>At 17th Level, When you take a Long Rest, you turn yourself to your surroundings, manipulating energy,
      elements, and the world itself, granting you it's power.</p><p> As a Full Turn Action, you may release this
      gathered energy, entering Philosopher's Form and grant yourself the following benefits for the next 10
      Minutes.</p><p> - You gain 10 Chemic Points, which when spent, reduce the number of remaining Minutes that you can
      remain in your Philosopher's Form by the number spent.</p><p> - You gain a Flight Speed equal to twice your
      Walking Speed, the benefits of the Disengage Action, Advantage on 2 saving throws of your choice, Advantage on
      your first attack each Turn, and 40 THP.</p><p> - You may, once per Jutsu, Spend 1 Chemic Point to use any
      Nature's Blend Enhancement without needing to consume a Snack and may apply a Nature's Blend Enhancement to Jutsu
      already benefitting from one, even the same one, in this way.</p><p></p>
