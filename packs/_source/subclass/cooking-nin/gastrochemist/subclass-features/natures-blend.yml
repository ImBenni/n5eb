name: Nature's Blend
type: feat
_id: Nrt2XmJTQ3f6lpci
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>Instead of learning new Snacks, learn how to twist and shape the elements at play into your Jutsu and
      Snacks.</p><p> At 2nd Level, choose one Nature release, which becomes your Nature's Blend release.</p><p> You may
      learn Jutsu from that release normally but may only cast them if you are wielding your Gastrochemist weapon (the
      Cooking Tool gained from this Subclass.</p><p> Additionally, at 2nd Level choose a Jutsu of your Nature's Blend
      release, and give it one of the following Enhancements, which you may use while wielding your Gastrochemist
      weapon.</p><p> You may choose an additional Jutsu to gain an Enhancement at 3rd, 5th, 9thh, 13th, and 17th
      Level.</p><p> • Enhance Texture: When you cast the Jutsu you may spend Chakra equal to half the amount you spent
      to cast the Jutsu, and any Snack that you, or anyone within 5ft of you, have to increase the Jutsu's DC by half
      the result of your Cooking Dice, up to a maximum based on the Justus Rank (D/C-1, B/A- 2, S-3).</p><p> • Enhance
      Kick: When you deal damage with the Jutsu you may spend Chakra equal to half the amount you spent to cast the
      Jutsu, and any Snack that you, or anyone within 5ft or you, have to increase the Jutsu's damage dice by a number
      of your Cooking Dice equal to the Jutsu's Rank (D/C-1, B/A- 2, S-3), or deal the same amount of damage to
      creatures who fail a saving throw against the jutsu if it doesn't have damage Dice, once per casting.</p><p> •
      Enhance Temperature: When you would provide Healing, THP, or DR to a creature with the Jutsu, you may spend Chakra
      equal to half the amount you spent to cast the Jutsu, and any Snack that you, or anyone within 5ft of you, have to
      increase the amount provided by twice the result of your Cooking Dice times the Jutsu's rank (D/C-1, B/A- 2, S-3),
      or by half the result of one of your Cooking Dice if the Jutsu has a duration longer than instant.</p><p> •
      Enhance Aroma: When you would cast this Jutsu, you may spend Chakra equal to half the amount you spent to cast the
      Jutsu, and any Snack that you, or anyone within 5ft of you, have to increase the Jutsu's Range, including the size
      of any Areas Of Effect the Jutsu creates, by 5 x half the result of your Cooking Dice.</p><p></p>
