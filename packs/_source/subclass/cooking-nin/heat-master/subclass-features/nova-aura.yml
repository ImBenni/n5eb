name: Nova Aura
type: feat
_id: SlhCEjNfvGq1aYgC
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>At 9th level, your snacks naturally relaxing effects extends to their aroma, granting you an additional
      Aura.</p><p> You may activate this Aura once, then twice at 14th level, per Long Rest without spending a use of
      your Auras.</p><p> Smoldering Scent: When a creature within this Aura would be inflicted with any number of ranks
      of burned, the creature this Aura is centered on gains 1 Nova Point, up to twice per turn.</p><p> Additionally,
      they gain the following abilities, for the next minute, or until they have no Nova Points, even after this Aura
      ends: </p><p>• 2: Reduce the Cost a Fire release Jutsu you would cast by -2.</p><p> • 3: Change the damage type of
      an attack you would make to fire, and, if the attack doesn't have the Blaze property, it gains it.</p><p> • 4:
      When you damage a creature within 5 feet of you, you may force a creature within 5 feet of them to make a
      Dexterity saving throw or take half the damage the original creature did on a failure.</p><p></p>
