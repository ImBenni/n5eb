name: 'Cooking Tool Infusion: Ladle'
type: feat
_id: Y35MbtkzDFZpuR57
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>You gain a second Cooking Tool Infusion weapon, following the same structure as your original one, but with
      some custom unique features.</p><p>You gain a cooking tool, something big, cool, and protective.</p><hr /><p>At
      2nd level, you can choose a damage type between Bludgeoning, Piercing or Slashing and one following
      properties.</p><p>your cooking tool deals damage equal to your Cooking Dice and you can also use Intelligence in
      place of Strength when determining your attack and damage rolls:</p><p>• Blocking</p><p>• Healing Focus: While you
      are holding this Weapon you can charge your healing through it, when a creature would recover Hit Points from a
      Jutsu or feature you use, they recover extra Hit Points equal to your Cooking Dice.</p><p>• Standing Leap: As a
      Reaction to being attacked, while not wearing heavy armor, you can move a number of feet equal 5 times your
      Proficiency Bonus, causing the attack to miss if you move outside of its range.<br />You may use this feature
      twice per long rest.</p><p>• Wide Guard: When a creature within 10-Feet of you would be the Target of an attack,
      or would make a Strength or Dexterity Saving Throw, you may, as a Reaction, move up to them and give Disadvantage
      on the attack, and all attacks made by the attacking creature against the creature you're defending, or Advantage
      on their saving throw, until the Start of your next Turn, or until they move more than 10-feet away from
      you.</p><hr /><p>Starting at 6th level, your cooking tool gains a additional weapon PROPERTY of your
      choice;</p><p>• Healing Up: While you are holding this Weapon you can charge your healing through it, when a
      creature recovers Hit Points from a Jutsu or Feature provided by you they can instantly move up to 20ft.</p><p>•
      Hero's shield: Your weapon has turned into a Icon for your team.<br />As an Action you may raise your weapon into
      the air inspiring your team, all creatures who can see your weapon increase their AC by +2 and Jutsu DCs, and
      attack rolls, by +1 until the end of their turn.</p><hr /><p>Beginning at 11th level, your cooking tool gains one
      additional weapon property of your choice.</p><p>• Mega Hp Up: Whenever a creature recovers Hit Points while you
      are holding this Weapon, you can also remove one rank of a condition currently affecting them.</p><p>• Take the
      lead: You may, as a Reaction give a creature an additional Reaction, until the end of the current turn.</p><p>•
      Pat on the Back: As an Action, you may instead target a willing teammate within your cooking tools range and give
      them a pat on the back, infusing chakra through your weapon into them.<br />The creature gains a number of
      Temporary Hit Points equal to triple your Cooking Dice.<br />You can only use this feature a number of times equal
      to your charisma modifier per Long Rest.</p><p></p>
