    value: >-
      <p>Beginning at 5th level, you have learned to make even grander displays, when you would Give Them A Show enemies
      within range must make a Wisdom saving throw against your Genjutsu Save DC as if they were targeted by a Genjutsu
      with the Visual Keyword, being Blinded until the end of their next turn on a failed save. </p><p>Additionally, you
      may still affect Blinded creatures with Effects that would normally require them to be able to see, such as Visual
      Genjutsu.</p>
