name: A Satisfying Display
type: feat
_id: HbK1JnzqZBP1U9Ll
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>At 9th level, the astonishing visuals of your snacks creates an aura of awe, granting you an additional
      Aura.</p><p> You may activate this Aura once, then twice at 14th level, per Long Rest without spending a use of
      your Auras.</p><p> Tantalizing Visuals: Creatures of your choice within this Aura, who would fail a saving throw
      against being inflicted with a Mental or Sensory condition, are also inflicted with 1 rank of the dazzled,
      deafened, demoralized, concussed, or confused condition, if they did not condition from failing their saving
      throw.</p><p> Additionally, the creature this Aura is centered on may, as a reaction, end this Aura to force
      creatures of their choice within the Aura to make a Wisdom saving throw.</p><p> On a failure, for 1 round, the
      next time they make a saving throw against a Genjutsu, reduce their success level by 1 (Critical Success -&gt;
      Success -&gt; Failure, etc.) A creature who fails their saving throw against this effect is immune to it for the
      next hour.</p><p></p>
