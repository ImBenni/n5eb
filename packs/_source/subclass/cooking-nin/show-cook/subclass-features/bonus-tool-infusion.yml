name: Bonus Tool Infusion
type: feat
_id: zsg56EVYzYzoRfGK
img: icons/tools/cooking/soup-ladle.webp
system:
  description:
    value: >-
      <p>You gain a second Cooking Tool Infusion weapon, following the same structure as your original one, but with
      some custom unique features.</p><p> You gain a cooking tool, this Weapon is a smoking pipe, or some kind of
      smoking object.</p><p> At 2nd Level, you can choose a damage type between Bludgeoning, Piercing or Slashing and
      one following properties.</p><p> your cooking tool deals damage equal to your Cooking Dice and you can also use
      Intelligence in place of Strength when determining your attack and damage rolls: </p><p></p><p>• Flashy Show:
      While holding this Weapon you can use Intelligence for Performance, Athletics, and Acrobatics Checks </p><p>•
      Flashy Bang: When you would cast a Genjutsu with the Visual Keyword that targets one or more creatures you can
      cause a flashy explosion! All hostile creatures within 5ft of the original Target must also make the saving throw
      as if they were targeted by the Genjutsu.</p><p> • Showtime: Increase the Range of your Give Them A Show Feature
      by 15ft.</p><p></p><p> Starting at 6th level, your cooking tool gains an additional weapon property of your
      choice; </p><p>• Flashy Explosion: When you would use Give Them A Show, you may choose an additional creature to
      gain the benefit of the Snack.</p><p> • Now You See It: When you would cast a Genjutsu without the Visual Keyword,
      you may give it the Visual Keyword.<br /> Additionally, you may, as a Bonus Action increase the DC of a Genjutsu
      you cast by +1.</p><p> • Flashy Smack: When you would make an attack Roll with this Weapon you can use your
      Genjutsu casting Modifier instead of your Intelligence.</p><p></p><p> Beginning at 11th level, your cooking tool
      gains one additional weapon property of your choice; </p><p>• Flashy Armageddon: When you would cast a Genjutsu
      with the Visual Keyword, you may instantly feed one of the Effected creatures a Snack </p><p>• Blinding Style:
      When you would Blind a creature the mere sight of you causes their retinas to burn! At the end of a Blinded
      creatures turn they take a number of Fire damage equal to double your Cooking Dice.</p><p></p>
