system:
  description:
    value: >-
      <p>When you select this focus at 2nd level, you have learned to spice up your cooking with a little dramatic
      flair.</p><p>Instead of creating a Snack in the kitchen, you make it in front of those who will eat it, and just
      seeing your display bolsters them. </p><p>You can use an Action to give the benefits of a Snack to two creatures
      who can see you within 30 feet. </p><p>Expending the Snack in the process Starting at 9th level, this can be used
      as a Bonus Action.</p>
