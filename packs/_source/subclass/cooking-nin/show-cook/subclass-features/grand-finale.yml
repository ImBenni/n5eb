system:
  description:
    value: >-
      <p>Beginning at 13th level, you have begun to start doing riskier tricks, that will make or break your
      routine.</p><p> When you use Give Them A Show you can make magnificent motion captivating your audience.</p><p>
      creatures other than you gain the benefits of the Snack as if you had rolled the maximum of one Snack die, Hostile
      creatures within this range effected by "A feast for the eyes" make this check at Disadvantage.</p><p> You can do
      this once per Long Rest.</p><p> You gain an additional use of this feature at 17th level.</p><p></p>
