system:
  description:
    value: >-
      <p>When you choose this focus beginning at 2nd level, you learn to cook with additional secret ingredients that
      can be used with your Shinobi Snacks class feature.</p><p> These Snacks can only be used through your Give Them A
      Show Feature.</p><p> • Caviar Taco: When a creature observes this Snack, they DR equal gain DR equal to half
      result of the Cooking Dice, for a number of damage instances equal to the result of your Cooking Dice.</p><p> •
      Black Truffle: When a creature observes this Snack, they gain 60 feet of chakra sight for 1 minute.</p><p> • Gold
      Leaf Cherry Ice Cream: When a creature observes this Snack, they may take the Dash and Disengage Actions as a
      Bonus Action, for a number of rounds equal to the result of your Cooking Dice.</p><p> • Coconut Macaroons: When a
      creature observes this Snack, the gain Advantage on the next saving throw they make, for a number of rounds equal
      to the result of your Cooking Dice.</p><p> • Swirly Cakes: When a creature observes this Snack, while under the
      effects of a sensory condition, they have disadvantage on their next saving throw against a Genjutsu you cast, for
      a number of rounds equal to your cooking dice.</p><p></p>
