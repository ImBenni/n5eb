system:
  description:
    value: >-
      <p>At 9th level, the poisonous effects of your snacks extends to a gaseous haze, granting you an additional
      Aura.</p><p> You may activate this Aura once, then twice at 14th level, per Long Rest without spending a use of
      your Auras.</p><p> Toxic Haze: Creatures of your choice who start their turns within this Aura, must succeed a
      Constitution saving throw or be inflicted with 1 rank of envenomed.</p><p> Additionally, the creature this Aura is
      centered on may, as a bonus action or reaction, end this Aura and spend one poison, which can take effect even if
      not ingested, they have, forcing each creature of its choice within this Aura to make a Constitution saving throw,
      against your Aura DC, or be inflicted with the effects of the spent poison on a failure, with no effects on a
      success.</p><p></p>
