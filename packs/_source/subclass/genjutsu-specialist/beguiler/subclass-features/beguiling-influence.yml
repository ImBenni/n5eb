system:
  description:
    value: >-
      <p>Starting at 18th level you have learned to utilize your Genjutsu to bend your foes to your will. Once per
      casting, when a creature would fail a saving throw against a Genjutsu you cast, you can choose to spend 2
      <strong>Actualization Die</strong>. When you do, the affected creature can no longer remake saving throws for the
      jutsu's duration.</p><p>Once you use this feature twice you must complete a long rest before you can use it
      again.</p>
