system:
  description:
    value: >-
      <p>Starting at 2nd level, Genjutsu you cast with the Visual keyword, has its DC increased by +1. This bonus
      increases to +2 at 10th and +3 at 19th levels.</p><p>Also, creatures currently under the effects of a Genjutsu you
      cast with the Visual keyword, see you vanish from their sight. Until the end of your next turn, you become
      invisible to any creature of your choice affected by your genjutsu, as long as you aren't within 10 feet of
      it.</p><p>If you affect multiple creatures with the triggering genjutsu, you can become invisible to a number of
      creatures equal to your Genjutsu ability modifier.</p><p>You can do this twice per rest. You gain an additional
      use of this feature at 10th level.</p>
