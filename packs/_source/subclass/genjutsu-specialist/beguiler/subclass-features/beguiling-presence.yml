  dae:
    macro:
      name: Beguiling Presence
      img: icons/magic/control/silhouette-aura-energy.webp
      type: script
      scope: global
      command: |-
        const version = "1.0.0";
        try {
          const lastArg = args[args.length - 1];
          const actor = game.actors.get(lastArg.actorId);

          if (!actor) {
            ui.notifications.error("Actor not found for the macro.");
            return;
          }

          // Ensure the actor is of the appropriate class
          const subclass = actor.system.details.subclass;
          if (!subclass || subclass !== "YourSubclassIdentifier") { // Replace with actual subclass identifier
            ui.notifications.error("This macro can only be used with the specific subclass.");
            return;
          }

          // Get the actor's level
          const level = actor.system.details.level || 1;

          // Calculate the bonus based on the level
          let bonus = 0;
          if (level >= 2 && level < 10) {
            bonus = 1;
          } else if (level >= 10 && level < 19) {
            bonus = 2;
          } else if (level >= 19) {
            bonus = 3;
          }

          // Set the flag for the visual keyword bonus
          await actor.setFlag("n5eb", "genjutsuVisualDCBonus", bonus);

          ui.notifications.info(`Visual keyword Genjutsu DC bonus set to +${bonus} for ${actor.name} at level ${level}.`);
        } catch (err) {
          console.error(`Visual Keyword DC Bonus Macro ${version}`, err);
        }
      author: R0hw7EUsG7OzIhgn
