system:
  description:
    value: >-
      <p>Starting at 6th level, your visual genjutsu is more potent than most, even penetrating through some defenses
      against it. When you cast a genjutsu with the Visual keyword, you can ignore any effect or ability that would
      allow a creature to automatically succeed against the genjutsu, like true sight or tremor sense.</p><p>You can use
      this feature twice per rest. Alternatively, if you would use this feature an additional time beyond your use
      limit, you can spend 1 <strong>Actualization Die</strong>, using this feature as normal.</p>
