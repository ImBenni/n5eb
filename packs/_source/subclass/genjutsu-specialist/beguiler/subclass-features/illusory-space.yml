img: icons/magic/control/silhouette-fall-slip-prone.webp
system:
  description:
    value: >-
      <p>Starting at 14th level when a creature you can see within 30 feet of you makes an attack roll against you, as a
      reaction, you can create a genjutsu to change their perspective of space. The attacker must make a Charisma saving
      throw against your Genjutsu save DC. On a failed save, the attacker is teleported to a different space they could
      have reasonably reached during their turn, wasting their attack. <br />On a successful save, you cannot use this
      feature on the attacker again until you finish a long rest.</p>
