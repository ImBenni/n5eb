  description:
    value: >-
      <p>Beginning at 10th Level, select two Genjutsu that you know. You may, as a Bonus Action when using the selected
      Genjutsu make the Genjutsu appear to originate from the location of another creature you can see within the
      Genjutsu's range. You can change the selected Genjutsu for this feature whenever you finish a Long Rest.</p>
