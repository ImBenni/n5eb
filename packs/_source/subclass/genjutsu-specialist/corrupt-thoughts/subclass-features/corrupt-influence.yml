name: Corrupt Influence
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Starting at 18th level you have learned to utilize your Genjutsu to break your foes mind and shatter their psyche.\_</p><p>Once per casting, when a creature would fail a saving throw against a Genjutsu you cast that deals damage, you can choose to spend 1 Actualization Die.\_</p><p>When you do, the affected cannot gain the benefit of critically succeeding the save, and suffers a -1 penalty on their saving throw against Genjutsu you cast targeting them for the next minute.\_</p><p>This penalty can stack up to 5 times.</p>"
