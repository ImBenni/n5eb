name: Corrupt Psyche
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Beginning at 10th level, when you would cast a Genjutsu that deals damage to no more than one hostile creature per casting, you can spend 2 Actualization Die.\_</p><p>When you do, hostile creatures of your choice within 10 feet of the original creature must make an Intelligence saving throw vs your Genjutsu save DC.\_</p><p>On a failed save, they take the damage of the Genjutsu as if they were the original targets.\_<br />On a successful save, no further effects.</p>"
