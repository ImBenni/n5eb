img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: >-
      <p>When you choose this path at 2nd Level, you learn to bend your words and make them affect the minds of your
      adversaries. </p><p>Select one creature you can see and as an Action, unleash a string of words laced with subtle
      genjutsu warping the mind of a creature. </p><p>If the target can hear you (Though it need not understand you), it
      must succeed on Wisdom saving throw. On a failed save, they take 2d4 psychic damage and gain a 1d4 penalty to
      their next attack roll it makes before the end of its next turn. </p><p>At Higher Levels: This Ability increases
      in its potency as you gain levels in this class. Beginning at 7th level, this ability increases its damage by 2d4
      and the penalty to 1d4 (4d4/2d4). This increases again by 2d4 damage and 1d4 penalty at 13th (6d4/3d4) and 16th
      (8d4/4d4) levels.</p>
