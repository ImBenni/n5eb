name: Vindictive Thoughts
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Starting at 14th Level, when a creature you can see within 30 feet of you makes an attack roll against you.\_</p><p>As a Reaction you can create a Genjutsu aura to cause intense pain to the activating creature.\_</p><p>The attacker must make a Charisma save vs your Genjutsu Save DC.\_</p><p>On a Failed Save, the attacker's attack is stopped and they also take Xd8 Psychic damage, where X equal your proficiency bonus.\_</p><p>On a successful save you cannot use this feature on the attacker again until you finish a long rest.</p>"
