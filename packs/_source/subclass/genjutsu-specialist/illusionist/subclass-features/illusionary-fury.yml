name: Illusionary Fury
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Starting at 6th Level, when you cast a Genjutsu that has a duration of 1 minute or longer that inflicts a Mental Condition you can spend an actualization die to change the keywords of that genjutsu (If the genjutsu has Auditory, Inhale, Tactile or visual, you can switch one of them with any of the other listed keywords).\_</p><p>Additionally, while using this feature, when you cast a Genjutsu you can double its duration or double the ranks of the Mental Condition inflicted.\_</p><p>Once you use Illusionary Fury in this way you cannot do so again until you finish a long rest</p>"
