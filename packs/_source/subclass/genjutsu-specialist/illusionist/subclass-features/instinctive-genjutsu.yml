name: Instinctive Genjutsu
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Starting at 14th Level, when a creature you can see within 30 feet of you makes an attack roll against you.\_</p><p>As a Reaction you can create a Genjutsu aura to divert the attack to another creature within the attacks range.\_</p><p>The attacker must make a Wisdom save against your Genjutsu Save DC.\_</p><p>On a Failed Save, the attacker must target a creature of your choice within range.\_</p><p>On a successful save you cannot use this feature on the attacker again until you finish a long rest.</p>"
