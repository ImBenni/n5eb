name: Shaping Your World
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>When you choose this path at 2nd Level, you gain the E- Rank Genjutsu, Minor Illusion.\_</p><p>If you already know this genjutsu, you learn a different E-Rank genjutsu of your choice.\_</p><p>The genjutsu you learn this way does not count against your number of jutsu known.\_</p><p>When you would cast Minor Illusion, you can create both sound and an image with a single casting of the jutsu.\_</p><p>Additionally, Minor Illusion costs no chakra to cast.\_</p><p>Genjutsu you cast that do not deal damage has its DC increased by +1.\_</p><p>This bonus increases to +2 at 10th and +3 at 19th levels.</p>"
