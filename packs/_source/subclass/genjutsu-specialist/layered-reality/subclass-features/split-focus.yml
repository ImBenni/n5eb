name: Split Focus
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Beginning, at 6th level, you have learned to better maintain and split your attention between your jutsu.\_</p><p>When you cast a Genjutsu that you must maintain concentration on, you may choose to not have it count against your Concentration limit.\_</p><p>You can only have one jutsu under this effect at a time.\_</p><p>You may do this twice per short rest.\_</p><p>Additionally, you may reduce the concentration cost to maintain a Genjutsu by 1.\_(Min 1.).\_</p><p>This increases to -2 at 10th and -3 at 19th levels</p>"
