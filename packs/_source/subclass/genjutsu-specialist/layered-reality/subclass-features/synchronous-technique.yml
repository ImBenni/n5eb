name: Synchronous Technique
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>When you choose this path at 2nd level, you gain the E- Rank Genjutsu Doubt, if you already know this Genjutsu, you gain another E-Rank Genjutsu you qualify for.\_</p><p>The Genjutsu you learn this way does not count against your Jutsu known.\_</p><p>When you would cast Doubt, a creature becomes incapable of realizing you cast it upon them if neither of you are hostile towards one another at the time of casting.\_</p><p>Also, if Doubt is cast on a creature currently under the effects of a Genjutsu you cast, its range increases to 60 feet, and gains a special duration, which lasts as long as you are currently concentrating on a Genjutsu affecting the same creature.\_</p><p>While a creature is under the effect of the Doubt Genjutsu, they have disadvantage on Insight Checks made against you, and once per turn, when they would make an Intelligence saving throw against a Genjutsu you cast, they reduce their result by 1d4.</p>"
    chat: ''
