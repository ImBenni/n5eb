name: Blinded By Violence
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Starting, at 14th level, you can use your poisons more reactively, protecting yourself by creating a violent monster on the battlefield.\_</p><p>When you are targeted by an attack you can see, you can expend a use of your Misty Kit to force the triggering creature to make a Constitution or Wisdom Saving throw (Your Choice) vs your Genjutsu save DC.\_</p><p>On a failed save, the creature is blinded until the start of their next turn.\_</p><p>At the start of their next turn, they gain the berserk condition.\_</p><p>This condition lasts for 1 minute.\_</p><p>On a successful save you cannot use this feature on the same creature until you finish a long rest.</p>"
