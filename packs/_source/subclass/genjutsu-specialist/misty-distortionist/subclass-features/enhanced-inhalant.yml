name: Enhanced Inhalant
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>When you choose this path at 2nd level, you gain the E- Rank Genjutsu Release, if you already know this Genjutsu, you gain another E-Rank Genjutsu you qualify for.\_</p><p>The Genjutsu you learn this way does not count against your Jutsu known.\_</p><p>When you would cast Release, it gains the NT (Alchemist or Poison Kit) Component, the Inhaled Keyword, and its range becomes Self (5-foot radius).\_</p><p>This radius increases in size as your levels in this class grows., becoming a 10-foot radius at 5th level, 15-foot radius at 11th level, and 20-foot radius at 17th level.\_</p><p>Also, Genjutsu you cast that have the Inhaled Keyword increase their Genjutsu Save DC by +1.\_</p><p>This increases to +2 at 10th, and +3 at 19th.</p>"
