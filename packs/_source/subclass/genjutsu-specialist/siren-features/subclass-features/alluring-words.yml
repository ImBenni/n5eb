name: Alluring Words
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: >-
      <p>When you choose this path at 2nd level, you gain the E- Rank Genjutsu Affection, if you already know this
      Genjutsu, you gain another E-Rank Genjutsu you qualify for. </p><p>The Genjutsu you learn this way does not count
      against your Jutsu known. When you would cast Affection, it loses the Hand Seal (HS) component requirements. Also,
      the target creature does not notice you used a Jutsu to influence their mood. </p><p>Also, Genjutsu you cast that
      have the Auditory Keyword increase their Genjutsu Save DC by +1. This increases to +2 at 10th, and +3 at 19th.</p>
