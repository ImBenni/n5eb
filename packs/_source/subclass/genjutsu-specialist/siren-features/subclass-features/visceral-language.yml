name: Visceral Language
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Also, at 2nd level, you can speak a words of harm or hostility to creatures you are influencing.\_</p><p>As a Bonus action, select one creature under the effects of a Genjutsu you cast, with the Auditory Keyword.\_</p><p>For the duration of the Genjutsu you cast, the target takes 1d6 psychic damage at the start of each of both your own and their turns.\_</p><p>This psychic damage increases to 2d6 at 6th level, 3d6 at 10th, 4d6 at 14th and 5d6 at 18th levels.\_</p><p>Additionally, you can speak words of mending to assist an allied creature you are influencing.\_</p><p>As a bonus action, select a one allied creature under the effects of a Genjutsu you are concentrating on with the Auditory Keyword.\_</p><p>They gain 1d6 temporary Hit Points at the beginning of your turn for the duration of the Genjutsu cast on them.\_</p><p>The increases to 2d6 at 6th level, 3d6 at 10th, 4d6 at 14th and 5d6 at 18th levels.\_</p><p>You can use this feature a combined number of times equal to your Genjutsu Ability Modifier per long rest.</p>"
