name: Words Of Affirmation
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Beginning at 6th level, you can spend 10 minutes extending your chakra to all creatures within 10 feet of you, who can hear you.\_</p><p>Affected creatures gain Temporary Hit Points equal to your level + your Genjutsu ability Modifier, and gain advantage on the next Saving throw made to resist a Genjutsu.\_</p><p>Temporary hit points granted by this feature can stack with temporary hit points granted by the Visceral Language class feature.\_</p><p>Creatures cannot benefit from this feature more than twice per short rest.</p>"
