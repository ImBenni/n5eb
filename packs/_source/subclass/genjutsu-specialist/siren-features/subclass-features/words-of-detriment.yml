name: Words Of Detriment
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Beginning at 10th level, As a bonus action, when you would cast a Genjutsu with any Sensory Keywords, it loses all sensory keywords and gains the Auditory Keyword in their place.\_</p><p>A Genjutsu casted this way creates a distortion in the minds of its targets.\_</p><p>Affected creatures must succeed a Wisdom Saving throw vs your Genjutsu save DC being Weakened and Slowed on a failed save for the next Minute.\_</p><p>A creature who failed this saving throw repeats this Save throw at the beginning of each of their turns to end this effect.\_</p><p>Each time a creature fails this save after the first, they suffer a -1 penalty to their next saving throw, with this penalty stacking up to -5.\_</p><p>You can only use this feature twice per long rest.</p>"
