name: Words Of Repentance
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Starting at 14th level, when a creature whom you can see, and whom can hear you makes an attack roll against you.\_</p><p>As a Reaction, you create an auditory Genjutsu causing the triggering creature to have thoughts of extreme self- harm.\_</p><p>The attacker must succeed a Wisdom saving throw vs your Genjutsu Save DC.\_</p><p>On a failed save, the attacker attacks themselves as if they were the target of their own attack, regardless of the attack used.\_</p><p>On a successful save you cannot use this feature on the attacker again until you finish a short rest.</p>"
