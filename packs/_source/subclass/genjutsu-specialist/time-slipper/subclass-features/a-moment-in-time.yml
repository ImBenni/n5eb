name: A Moment In Time
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Beginning, at 6th level, you learn to augment your own movement, mobility, and speed by altering the movement speeds of those around you.\_<br />As a bonus action you spend 1 Actualization Die.\_<br />When you do you gain one of the following benefits:</p>\n<p>\_</p>\n<p>• You can take the Dash, Disengage or Hide Action.\_</p>\n<p><br />• Roll your spent Actualization Die.\_<br />Your Armor Class increases by an amount equal to half of the result, (Concentration)</p>\n<p>\_</p>\n<p>• You add 1 Actualization die to your Dexterity saving throws. (Concentration)</p>\n<p>\_</p>\n<p>• You can immediately cast 1 Genjutsu that has a casting time of 1 Action, but does not require Concentration.\_</p>\n<p><br />If a benefit has (Concentration), you must concentrate on it as if you were concentrating on a Jutsu, but it does not cost chakra to maintain.</p>"
