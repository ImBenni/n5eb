name: Misread Clocks
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Beginning at 10th level, your understanding of how the mind perceives time, has grown to extreme levels.\_</p><p>When you cast a Genjutsu that requires a Saving throw against a single creature, you may, as a bonus action cause the affected creature(s) to be unable to take a Reaction, in response to the Genjutsu's castings or effects.\_</p><p>You can gain this benefit twice per long rest.\_</p><p>Additionally, while they are under the effects of a genjutsu cast with this feature, if they would attempt to make a reaction in response to an effect from a creature allied to you, they must first roll a 1d10.\_</p><p>If they roll a 6 or higher, they are unable to take their reaction as they miss the timing needed.</p>"
