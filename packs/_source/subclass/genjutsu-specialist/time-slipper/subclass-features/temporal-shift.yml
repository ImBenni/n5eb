name: Temporal Shift
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>When you choose this path at 2nd level, you gain the E- Rank Genjutsu Feather Burst, if you already know this Genjutsu, you gain another E-Rank Genjutsu you qualify for.\_</p><p>The Genjutsu you learn this way does not count against your Jutsu known.\_</p><p>When you would cast Feather Burst, increase the die used to reduce damage to a d12, and after calculating damage, you move 15 feet in any direction without provoking attacks of opportunity.\_</p><p>This movement distances increases as you gain levels in this class, becoming 20ft at 5th level, 25ft at 11th level and 30ft at 17th level.</p>"
