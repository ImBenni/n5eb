name: Time's Influence
type: feat
img: icons/magic/control/hypnosis-mesmerism-eye.webp
system:
  description:
    value: "<p>Beginning at 18th level, when a creature currently under the effects of a Genjutsu you cast that inflicts a penalty on a hostile creatures saving throws, skill checks or attack rolls you can distort their perception of time.\_</p><p>By spending 1 Actualization Die, the target creature currently under the effects of the aforementioned Genjutsu they must make an Intelligence saving throw vs your Genjutsu save DC.\_</p><p>On a failed save, their next turn, they decide on their series of actions, but don't perform them until their following turn, targeting even creatures they may be unable to that they previously could due to their delayed action(s).</p>"
