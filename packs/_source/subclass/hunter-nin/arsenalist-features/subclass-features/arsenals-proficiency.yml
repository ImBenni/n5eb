name: Arsenal's Proficiency
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>At 3rd level, you gain proficiency in Crafting and one of the following:<br />Alchemists, Demolitions or Trappers kits.\_</p><p>Additionally, you can make checks using the aforementioned kits with Dexterity or Wisdom.\_</p><p>Also, you have learned to take the teachings of your villages quartermaster or weapon master.\_</p><p>You become very in tuned with a series of different weapons and tools.\_</p><p>Select four of the following.</p><p></p><p>You can select two more at 10th level:</p><p>• Manipulated Tools: Blade Kick</p><p>• Manipulated Tools: Blade Rain</p><p>• Manipulated Tools: Blade Wall</p><p>• Paper Bombs</p><p>• Explosive Tag Ball's</p><p>• Fire Bomb's • Flash Tag's</p><p>• Ice Bomb's • Poison Tag's</p><p>• Shock Bomb's</p><p>• Weapons with the Thrown Keyword</p><p>• Weapons with the Multiattack Keyword.</p><p>• Weapons with the Light Keyword.\_</p><p>• Weapons with the Finesse Keyword If you select a jutsu, you learn it.\_</p><p><br />Regardless of what you select, the chosen jutsu, items or weapons become a part of your Arsenal.\_</p><p>Weapons, items or jutsu that are a part of your Arsenal can be used in far superior ways compared to other creatures.\_</p><p>A Jutsu learned this way cannot be taught to another creature and cannot be customized, modified or augmented using the Jutsu customization options or any Non-Hunter-Nin class features.\_</p><p><br />Arsenal Jutsu:</p><p>Reduce their cost to cast by -1.\_</p><p>This cost reduction increases to -2 at 10th, and -3 at 17th.\_</p><p>Additionally, if the jutsu would deal damage, it can trigger Lethal Attack even if it doesn't require an attack roll.\_</p><p>The trigger for Lethal Attack instead becomes failing the saving throw.\_</p><p>The Lethal Attack triggered in this way, only affects on creature of your choice.</p><p><br />Arsenal Tools:</p><p>At the end of a rest of any type, roll 1d4 + 1.\_</p><p>You gain a number of your Arsenal Tools equal to the result.\_</p><p>The items can only be used by you, they are of base quality and last until your next rest.\_<br />Increase the dice size by 1 step at 10th and 17th levels.\_</p><p>If the item would deal damage, it can trigger Lethal Attack even if it doesn't require an attack roll.\_</p><p>The Lethal attack triggered in this way, only affects one creature of your choice and only</p><p>happens on a failed saving throw as if you fulfilled the Lethal Attack class features trigger requirements.</p><p>The following tools count for purchased tools as well, not just tools created by this feature.</p><p><br />• Paper Bombs/ Explosive Tag Balls: Increase damage die by 1 Step.\_</p><p>• Fire/Ice/Shock Bomb's: Increase the base range to 60 feet, instead of 30.\_</p><p>• Flash/Poison Tag's: Increase the DC +2.\_</p><p>\_</p><p>Arsenal Weapons:</p><p>Increase the [weapons damage] die by 1 Step and they gain the Hidden Weapon property.\_</p><p>The Weapon also gains a +2 bonus to damage from weapon attacks.\_</p><p>This bonus increases to +4 at 10th and +6 at 17th level.</p>"
