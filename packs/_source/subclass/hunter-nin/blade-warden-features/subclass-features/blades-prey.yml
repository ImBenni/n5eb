name: Blade's Prey
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also at 3rd Level, your tenacity can wear down the most fortuitous foes.</p><p>A creature becomes Flat-Footed
      vs you, if you succeed on a skill check initiated by a Hunters Exploit against them.</p><p>Additionally, when you
      hit a creature with a weapon attack using your Warden Weapon, the creature takes an extra 1d6 damage if it's below
      its hit point maximum.</p><p>This bonus damage happens on each successfully hit.</p><p>Finally, you gain exclusive
      access to the Wardens Assault, Hunter Exploit.</p><p>This does not count against your Exploit Limit.</p>
