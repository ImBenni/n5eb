name: Warden's Proficiency
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Beginning at 3rd Level, you gain proficiency in the Athletics and Intimidation Skills.\_</p><p>You can make any checks with the aforementioned skill using Strength or Dexterity.\_</p><p>Also, you have learned to fully invest into a singular weapon designed to best capitalize on your free-flowing form of combat.\_</p><p>Select one simple weapon type that you have proficiency in, that does not have the Two-Handed or Heavy properties.\_</p><p>This weapon is hereby treated as your Warden Weapon.\_</p><p>A Warden Weapon gains a new weapon property unique to it, that other shinobi wish they knew how to utilize.\_</p><p>Select one Warden Weapon Property from the following granting the weapon the listed property effects.\_</p><p>You can switch your Warden Weapon Technique when you complete a rest of any type.\_</p><p>You can select a second property when you reach 10th level.</p><p>\_</p><img src=\"systems/n5eb/assets/content/cheat-sheets/warden-weapon-property.webp\" />"
