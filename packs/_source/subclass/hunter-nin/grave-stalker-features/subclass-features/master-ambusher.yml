name: Master Ambusher
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Starting at 7th level, you excel at leading ambushes, both socially and in combat.\_</p><p>You can use Smoke Bomb's as a bonus action.\_</p><p>When you and other allied creatures would begin combat while hidden or unseen, you can choose to use your Stealth bonus in place of your own and each allied creatures initiative.\_</p><p>If you begin combat while out of stealth, you have advantage on initiative rolls.\_</p><p>When you or an allied creature within 30 feet of you are engaged in a social encounter and would fail a Charisma based ability check, you can choose to interject, creating a new circumstance, situation, lie or otherwise throwing the person you are speaking to off.\_</p><p>Make a Deception check vs a DC (10 + targets level).\_</p><p>On a success, you shift the conversation, rendering the previous failure as if it never occurred as the target immediately forgets as they are overwhelmed with new information.\_</p><p>You can attempt to interject socially in this way, once every 10 minutes.</p>"
