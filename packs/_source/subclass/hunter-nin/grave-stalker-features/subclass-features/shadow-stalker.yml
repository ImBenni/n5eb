name: Shadow Stalker
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Also at 3rd level, you gain Blindsight out to 20 feet.\_</p><p>When you would make an attack while in an area counted as total darkness until the end of that same turn, you produce no sound or vibrations rendering you unable to be seen, noticed or tracked by creatures with Tremor sense or blind sight.\_</p><p>Additionally, while you are out of combat and following a creature marked as your Primary target while you are Sneaking in Dim light or Darkness, you can dash without breaking stealth as you can, once per round remake a Stealth Check if another creature would succeed on their Wisdom (Perception) check vs your previous Dexterity (Stealth).\_</p><p>Finally, you gain exclusive access to the Shadow Step Hunter Exploit.\_</p><p>This does not count against your Exploit Limit.</p>"
