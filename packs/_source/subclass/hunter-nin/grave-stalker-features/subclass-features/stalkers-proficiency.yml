name: Stalkers Proficiency
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Beginning at 3rd level, you gain proficiency in the Sleight of Hand and Illusion skill.\_</p><p>Additionally, whenever you make a Stealth or Sleight of Hand Check, you make that check at advantage.\_</p><p>Additionally, you can make any checks using the aforementioned skills with Dexterity or Wisdom.\_</p><p>Also, you have learned to take the teachings of the Anbu Black-Ops, Root and Corpse Hunters and attack with the Shadows as your weapon.\_</p><p>You learn the Weapons of Darkness Genjutsu.\_</p><p>When you do, it gains the Bukijutsu Keyword and loses the Visual Keyword.\_</p><p>Your teachings have also taught you how to take this Jutsu and blend in the following techniques making it more thrilling hunts.\_</p><p>Select one of the following Shadow assassination techniques augmenting the Weapons of Darkness jutsu when cast.\_</p><p>A Jutsu with any of the following techniques cannot be taught to another creature and cannot be customized, modified or augmented using the Jutsu customization options or any Non-Hunter- Nin class features.\_</p><p>When you cast this jutsu, while maintaining concentration on it, the weapon summoned counts as a Shadow Weapon.\_</p><p>A Shadow Weapon cannot be broken, can use your attack action to make a Genjutsu or Taijutsu attack against a creature in range, as described in the jutsu text and cannot be used as a component for a Bukijutsu.\_</p><p>You can switch your Shadow Assassination Technique when you complete a rest of any type.\_</p><p>You can select a second technique when you reach 10th level.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/shadow-assassination-technique.webp\" />"
