name: Deceptive Exchange
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Beginning at 10th level, you have closely adapted to the art of poisonous conversation and deceptive tactics.\_</p><p>When you are engaged in a social exchange with a creature and they would attempt to deceive you, they suffer a -5 penalty to their deception check.\_</p><p>You can choose to also make contested Deception check vs their result.\_</p><p>On a success you gleam one piece of truthful information based on the lie or deception they tried to pass off to you.\_</p><p>Additionally, when you would make a Deception ability check against a creature in an attempt to lie or deceive them, you make your check at advantage.\_</p><p>On a success they believe in your deception so much that unless given irrefutable evidence they take your statement as the infallible truth, so long as the deception being made is within reason and does not interfere with events that the target creature has experienced themselves in the past.</p>"
