name: Lick Of Venom
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Beginning at 10th level, you have closely adapted to the art of poisonous combat.\_</p><p>When a creature is poisoned by you, you may choose to apply one of the additional effects:</p><p></p><p>• The creature cannot regain hit points until the end of their next turn.\_<br />• The creatures speed is reduced by half, for the duration of their poisoned condition.\_<br />• If the creature is reduced to 0 hit points, it becomes stable.\_<br />• The creature gains a rank of weakened for the duration of their poisoned condition.\_<br />• The creature is deafened for the duration of their poisoned condition.</p>"
