name: Poisonous Embrace
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Also, at 3rd level your skill with Poisons are better than most.\_</p><p>When you would complete a short rest, while you have access to a Poison Kit, you create 2 vials of Assassins Blood.\_</p><p>This Poison is a special variation, but becomes inert when you would take a rest of any type.\_<br />This Poison is much more potent than a normal.\_</p><p>The DC of this poison becomes equal to your Ninjutsu save DC and the base damage it deals becomes 3d6.\_</p><p>You can apply this poison to your weapon as a part of the action used to make the attack.\_</p><p>The number of Vials you can create and the damage the poison deals increases to 3 vials and 4d6 at 7th level, 4 vials and 5d6 at 11th level and 6 vials and 6d6 at 17th level.\_</p><p>Finally, you gain exclusive access to the Incurable Affliction Hunter Exploit.\_</p><p>This does not count against your Exploit Limit.</p>"
