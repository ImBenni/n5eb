name: Toxic Proficiency
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>At 3rd level, you gain proficiency in Deception and Disguise &amp; Poison Kits.\_</p><p>Additionally, you can make checks using the aforementioned kits with Dexterity or Intelligence.\_</p><p>Also, you have learned to take the teachings of the Black Medics, the Bloody Devils and the Hebi Clan and apply them to your unique form of Combat.\_</p><p>You learn to apply a unique poisonous chakra of your creation to both your weapons and ninjutsu.\_</p><p>This poison comes from combining a series of different poisonous substances within yourself and then exhaling it or infusing it into the attacking weapon or ninjutsu of your choice.\_</p><p>Select one of the following Toxic Assassination techniques augmenting your attacks with a vicious combination of toxins.\_</p><p>As a bonus action on your turn, you can choose to activate this toxic chakra.\_</p><p>When you do, select one ninjutsu you know or one weapon you are holding.\_</p><p>For the next minute that jutsu or weapon is infused with your Toxic chakra, changing its damage type to Poison and gaining additional effects based on the Toxic Assassination technique(s) chosen.\_</p><p>If a ninjutsu chosen would only trigger its effects with a damage type other than Poison, it instead triggers said effects with poison damage.\_</p><p>Once you infused a weapon or ninjutsu with your Toxic chakra, you cannot infuse another weapon or jutsu until 1 minute has passed.\_</p><p>Bukijutsu cast using your infused weapon do not gain your Toxic Assassination techniques effects, as these effects can only trigger with weapon attacks.\_</p><p>You can switch your Toxic Assassination Technique when you complete a rest of any type.\_</p><p>You can select a second technique when you reach 10th level.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/toxic-assassination-technique.webp\" />"
