name: Arrogance's Influence
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Beginning, at 7th level, you have a constant aura of influence around you designed to affect those of your choice with an arrogant mindset.\_</p><p>Creatures of your choice within 30 feet of you, who would attempt to make a Charisma based check may add 1d6 to their check as their self-confidence aids them.\_</p><p>Additionally, whenever a creature who is engaged in a social encounter with you and who is not your ally, would doubt your ability to accomplish a task no matter how simple or mundane, you gain a +5 bonus to any skill check made in attempt to accomplish the task.</p>"
