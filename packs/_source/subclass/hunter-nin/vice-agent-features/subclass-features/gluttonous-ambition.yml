name: Gluttonous Ambition
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Also at 14th level, you have attained an ambitious level of gluttonous intentions.\_</p><p>When you would cast a Genjutsu that would give you a boost, benefit or boon, you can gain the benefit of that Genjutsu twice if ever recast, such as with Bless or Confidence.\_</p><p>When you would gain the benefit of a genjutsu twice in this way, if the genjutsu would require an action, bonus action or reaction in order to maintain their effects, and they both require the same action to maintain, you can spend that action and it would count towards the requirements to maintain both.\_</p><p>Genjutsu that you are gaining the benefit twice from are still counted as separate jutsu when rolling to maintain concentration or chakra cost to maintain concentration.</p>"
