name: Greed's Shell
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, On your turn as a free action you can surround your skin in a sleek metallic looking coat
      of chakra, that is a color and design of your choice.</p><p>This chakra like armor lasts for 1 minute.</p><p>When
      you would activate this armor your skin hardens granting you protection from a limited amount of damage and making
      you far harder to harm.</p><p>You can activate this protective armor a number of times equal to your Proficiency
      Bonus per long rest.</p><p>First, for the duration, while you are not wearing medium or heavy armor, you gain DR
      (damage reduction) vs all sources, equal to your Genjutsu ability modifier.</p><p>Second, you gain 10 temporary
      hit points.</p><p>This increases to 20 at 7th level, 30 at 10th and 40 at 14th levels Also, you gain exclusive
      access to the Fox's Sin, Hunter Exploit.</p><p>This does not count against your Exploit Limit.</p>
