name: Sin's Proficiency
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>When you choose this Creed at 3rd level, you gain proficiency in Persuasion and Insight.\_<br />Additionally, you can make an ability check using either of the skills using Wisdom or Charisma.\_</p><p>Also, you have learned to take the teachings of the greatest interrogators, silver tongues and Beguilers, blending them into your vile and sinful form of combat allowing you to learn to pray on your enemies vices and take advantage of them.\_</p><p>You learn the Shadow Bite Genjutsu.\_</p><p>When you do, it gains the Ninjutsu Keyword, loses the Visual Keyword.\_</p><p>If this jutsu would be cast using your Ninjutsu attack bonus, when you would deal damage, you instead add your Ninjutsu ability modifier, in place of your Genjutsu ability modifier for damage.\_</p><p>If this jutsu would be cast using your Genjutsu attack bonus, you can choose to instead use your Charisma instead of wisdom to calculate this.\_</p><p>Finally, your teachings have also taught you how to blend in the sins of man into this jutsu, making it far more deadly to be struck by it.\_</p><p>Select one of the following Vice Assassination techniques augmenting the Shadow Bite jutsu when cast.\_</p><p>A Jutsu with any of the following techniques cannot be taught to another creature and cannot be customized, modified or augmented using the Jutsu customization options or any Non-Hunter-Nin class features.\_</p><p>You can switch your Vice Assassination Technique when you complete a rest of any type.\_<br />You can select a second technique when you reach 10th level.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/vice-assassiantion-technique.webp\" />"
