system:
  description:
    value: >-
      <p>Beginning at 7th level, you can mark your weapons with a special seal, known as a vorpal seal for 1 minute.
      </p><p>Once you use this feature to mark your weapon (or weapon stack), you cannot use it again for 10
      minutes.</p><p>While marked your weapon gains one of the following effects for the duration;</p><hr
      /><p><strong>Vorpal Passthrough.</strong><br /><span style="font-family:Signika, sans-serif">The first attack you
      make each turn with the weapon ignores temporary hit points &amp; structures or constructs that would intercept
      damage.</span></p><hr /><p><strong>Vorpal Sharpening<br /></strong>The marked [Weapons Damage] die is increased by
      1 step.</p>
