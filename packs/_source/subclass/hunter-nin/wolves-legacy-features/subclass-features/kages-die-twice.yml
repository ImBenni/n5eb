name: Kages Die Twice
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>At 17th level, your sheer spirit and resolve to keep fighting allows you to defy even death itself.\_</p><p>Once per long rest, when your hit points are reduced to 0, you can choose to slowly stand back up, regaining hit points equal to twice your hunter-nin level, and gaining resistance to all damage until the end of your next turn.\_</p><p>Additionally, when you are revived this way, you immediately gain 2 failed death saving throws, which cannot be removed by any means until you complete a long rest.\_</p><p>Alternatively, if you would die, prior to using this ability, once per full rest, you can choose to rise from the ether, ignoring effects that would prevent you from being revived rising with half of your maximum hit points.\_</p><p>If you do, you gain 5 failed death saves, which cannot be removed by any means until you complete a full rest.</p>"
