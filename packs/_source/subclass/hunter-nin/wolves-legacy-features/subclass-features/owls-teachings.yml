name: Owls Teachings
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Also at 10th level, you have begun to also learn from another creed of Hunters, known as the Owls.\_</p><p>Their teachings guide you down the road of a shinobi, deeper than most others would dare travel.\_</p><p>While observing a creature, you can as an action, make an Insight check vs the targets Passive Deception (10 + Charisma (Deception) Bonus).\_</p><p>On a success, you can see through them, almost as if looking into their spirits directly.\_</p><p>You can select one of the following, granting you this boon for the next minute.\_</p><p>You cannot use this feature on the same creature no more than once, every hour.\_</p><p><br />• A creature who would even attempt to lie, makes you instantly aware of their trickery.\_</p><p>• A creature who would have hostile intentions towards you or anyone near them, makes you instantly aware of their malice.\_</p><p>• A creature who would have romantic or admiration- based feelings towards you or anyone near them, makes you instantly aware of their feelings.</p>"
