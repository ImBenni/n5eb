name: Posture Break
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Beginning at 7th level, a creature marked as your Primary Target, who has 3 or more total ranks of any
      condition(s) you ignore half of their DR (Damage Reduction).</p><p>Additionally, if the marked creature has 5 or
      more total ranks of any condition(s) your Lethal Attack damage die increases to a d10.</p>
