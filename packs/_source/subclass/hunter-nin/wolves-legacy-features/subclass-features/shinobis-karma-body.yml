system:
  description:
    value: "<p>Also, at 3rd level, your strength of body has reached new levels compared to other Hunters of your caliber.\_</p><p>Increase the number of failed death saves you need by 2, before you die and you gain advantage on death saves.\_</p><p>Additionally, skill checks or jutsu cast against you in an attempt to grapple, trip or push you are made at disadvantage and on a failed attempt, the triggering creature triggers an attack of opportunity from you that does not spend your reaction.\_</p><p>Also, you gain exclusive access to the Deflection, Hunter Exploit.\_</p><p>This does not count against your Exploit Limit.</p>"
