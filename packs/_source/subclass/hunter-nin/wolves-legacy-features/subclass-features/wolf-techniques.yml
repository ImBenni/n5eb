name: Wolf Techniques
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>Beginning at 10th level, you have learned both to value patience, but at the same time that hesitation leads to defeat.\_</p><p>You have become privy to a series of elite techniques taught only to members of your creed who have survived as long as you have.\_</p><p>Select 1 of the following jutsu.\_</p><p>The selected jutsu are now counted as your Wolf Techniques.\_</p><p>The jutsu selected are added to your Jutsu known and also gain their listed effects.\_</p><p>You can cast a jutsu counted as your Wolf Technique, by spending two uses of your Prosthetic Attachment instead of spending chakra.\_</p><p>A jutsu cast in this way ignores its Component requirement, instead being able to be cast using any weapon and is always cast as if it were B-Rank.\_</p><p><br />• Kunai Assault: X always equals 8.\_<br />• Weapon Deflect: Bonus damage increases to a d10.\_<br />• Weapon Break: Your weapon is treated as a B-Rank or a +2, whichever is higher in the given scenario.\_<br />• Earth Breaker: Increase the saving throw damage die to a d10, and instead make two melee taijutsu attacks against a prone target.\_<br />• Reapers Swing: The Jutsu's casting cannot be reacted to.\_<br />• Triple Windmill Blades: The jutsu's range is increased to 90 feet.\_<br />• Ichimonji: Make one additional attack.\_<br />• Judgement Cut: Reduce the additional cost to target the same space to 4 chakra.</p>"
