name: Wolf's Proficiency
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: "<p>At 3rd level, you have learned to patiently wait for an opponent to slip up and capitalize on it with unforgiving accuracy.\_</p><p>You gain proficiency in the Martial Arts and Insight skill.\_</p><p>Additionally, you can make an ability check using either of the skills using Dexterity or Wisdom.\_</p><p>Also, you have willingly chosen to replace your organic arm with that of a shinobi prosthetic.\_</p><p>An arm made of wood, metal and other synthetic martials that you control using your chakra, that sits in place of your original arm.\_</p><p>This prosthetic is able to be fitted with a tool that can aid you in combat.\_</p><p>Select two of the following Prosthetic Attachments.\_</p><p>You can select two more at 10th level.\_</p><p>If a tool would require a creature to make a Saving throw, you would use your Taijutsu Save DC.\_</p><p>You can use any of your Prosthetic Attachments a number of times equal to your proficiency bonus per rest.\_</p><p>You can switch your chosen Prosthetic Attachments when you complete a rest of any type.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/prosthetic-attachments.webp\" />"
