name: Azure Lockout
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 6th level, you learn to lock your enemies out of their special traits and tactics.\_</p><p>While a hostile creature is marked with your Exploit Weakness and you have a trait it has access to, sealed into your Azure Scroll, as an Action, you can bind the chosen trait.\_</p><p>For the next minute, the marked creature cannot gain the benefits of the bound trait.\_</p><p>You can only have one trait bound this way at a time.\_</p><p>Yourself or allied creatures cannot gain the benefit of traits bound in this way as a result of Azure Hypothesis.\_</p><p>Additionally, at the end of the duration, the bound traits vanishes from your Azure Scroll.</p><p>This binding ability increases in strength as you grow in knowledge.\_</p><p>Beginning at 13th level, you can bind up to two traits.\_</p><p>Starting at 17th level, you can bind up to three.</p>"
    chat: ''
  source:
