name: Sapphire Insights
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 9th level, you learn how to spread the knowledge of an analyzed trait and grant your allies its power.\_</p><p>As an action, you can spend 1 Brave order.\_</p><p>When you do, select one trait in your Azure Scroll.\_</p><p>All allies within 30 feet of you gain the benefit of this Trait.\_</p><p>This activation is treated as a plan, and ends any plans you currently have active if any, and ends if you activate any plans while this is active.\_</p><p>This feature, when activated lasts a number of your turns, equal to your proficiency bonus.\_</p><p>Once you use this feature you cannot do so again until you complete a rest and the trait vanishes from your Azure Scroll.</p>"
