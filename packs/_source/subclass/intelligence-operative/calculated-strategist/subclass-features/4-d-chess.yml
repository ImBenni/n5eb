name: 4-D Chess
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Also, at 17th Level, you are already looking 20 moves ahead while planning for the next battle two weeks from now.\_</p><p>As a bonus action, by expending one Brave Order you gain, one of the following effects:</p><p>\_</p><p>• Shift the Field:</p><p>Up to 5 allied creatures that can see or hear you can move their full movement speed without provoking attacks of opportunities.\_</p><p><br />• Bloody Victory:</p><p>When you or an ally would reduce a hostile creature to 0 hit points before the end of your next turn, upt to 5 allied creatures regain Hit Points equal to the dead creature's Level.\_</p><p><br />• No One Left Behind:</p><p>Allies within 60 feet of you, who would make a Death saving throw on their turn, or who have already died within the last minute, are instead immediately stabilized at 1 Hit Point.\_</p><p>Creatures who gain this features benefits cannot benefit from it again for 24 Hours.\_</p><p><br />• Absolution:</p><p>All allied creatures within 60 feet of you gain a +1d4 bonus to attacks, saving throws, skill and ability checks until the end of your next turn.</p>"
