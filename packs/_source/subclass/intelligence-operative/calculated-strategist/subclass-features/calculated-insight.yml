name: Calculated Insight
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Also, at 3rd level, your calculated assessments allow you to see through a creature's option's.\_</p><p>As a bonus action, Make an Intelligence (Perception) check vs a creature marked with your Exploit Weakness's passive Deception, that you can see within 60 feet.\_</p><p>On a Success, you can see through their tactics, granting you one of the following effects.\_</p><p>You can use this feature twice per initiative.\_</p><p>You gain an additional use at 9th, 13th and 17th levels.\_</p><p><br />• Determine Attack:</p><p>You can cause them to have disadvantage on their next attack against a creature that can see or hear you.\_</p><p></p><p>• Predict Movement:</p><p>You deduce where they are planning to move on their next turn.\_<br />If they do move at all before the end of their next turn, you can command an allied creature to move up to their full movement plus 20 additional feet.\_<br />You can only command one ally to move in this way as a result of this feature.\_</p><p></p><p>• Outwit Response: </p><p>You find an opening in their defenses negating any they may have. The target cannot gain Jutsu based bonuses to their AC as a Reaction until the start of your next turn.</p><p></p><p>• Expose Weakness: </p><p>The targets weakness is exposed. The next instance of damage they take is increased by three times your Proficiency Bonus.</p>"
