name: Calculated Tactics
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 6th Level, you are able to utilize information you have access to, in a far superior way compared to others, capable of creature new and unique plans and tactics based around the known information.\_</p><p>When you have an Adversary whom you have marked with your Exploit Weakness class features; Affiliation, Clan or Role, recorded in your Conflict book, you can use the known information to develop a new tactic based on the information gathered.\_</p><p>You can only gain the benefit of one Tactic at a time.\_</p><p><br />• Affiliation:</p><p>You become aware of the tactics of the enemy if they have any, such as how they normally plan to engage in combat or social encounters and their highest attack bonus (Ninjutsu, Genjutsu, Taijutsu, Weapon.)</p><p><br />• Clan:</p><p>You become aware of up to three random Hijutsu the creature has on their known list as you correctly deduce what they possibly know or don't know and what you should look out for.\_</p><p><br />• Role:</p><p>You become aware of the creatures AC and highest Saving throw bonus.</p>"
    chat: ''
  source:
