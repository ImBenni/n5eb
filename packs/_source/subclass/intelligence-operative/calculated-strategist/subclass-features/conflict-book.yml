name: Conflict Book
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 3rd Level, you have created your own version of the Bingo Book.\_</p><p>Within the pages of this book, you have created specialized Ninja info cards, etching details you surmise from those you analyze.\_</p><p>You gain proficiency in Perception, if you weren't previously.\_</p><p>If you already proficient, you instead gain Proficiency in another Wisdom based Skill.\_</p><p>When you would make a Perception check, you can choose to instead use Intelligence in place of Wisdom.\_</p><p>When you would attempt to Analyze as a result of your Exploit Weakness class feature, you can choose to instead make an Intelligence (Perception) Check. </p><p>Additionally, you can choose to take the Analyze action, as a Bonus Action on your turn. </p><p>On a success, you learn one of the following statistics as it is etched on a new page on a new Ninja info card. Starting at 9th Level, you may learn up to two statistics and three statistics at 17th.</p><p><br />• Adversary Affiliation</p><p>• Adversary Clan</p><p>• Adversary Role</p>"
