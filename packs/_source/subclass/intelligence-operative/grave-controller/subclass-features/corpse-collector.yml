name: Corpse Collector
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 6th level, you learn how to capture the essences of Adversaries that are classed as Minions.\_</p><p>You can capture up to 4 Minions in this way using your Dead Soul Technique class feature, with the 4 Minion classed creatures all occupying a unique slot, that only Minion classed adversaries can occupy.\_</p><p>When you do, they become known as Bound Minions, gaining the Bound Minion stat block found at the end of this class.\_</p><p>You can control up to 2 Bound Minions at a time, commanding both at the same time with a Bonus action.\_</p><p>They each get 30 feet of movement, and 1 Action, which they can use to cast 1 Jutsu they knew in life, up to twice per summoning.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/bound-minion.webp\" />"
