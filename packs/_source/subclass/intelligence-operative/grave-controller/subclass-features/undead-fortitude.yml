name: Undead Fortitude
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 9th level, when you summon a Bound Corpse using the Dead Soul Technique class feature, you can spend 1 Brave Order to manipulate the bodies of foes near your Bound Corpse.\_</p><p>All creatures of your choice within 30 feet of your Bound Corpse must make a Wisdom Saving throw vs your Ninjutsu save DC.\_</p><p>On a failure, each creature gains 2 ranks of Fear, originating from the Bound Corpse.\_</p><p>Additionally, when the Bound corpse reaches 0 temporary hit points, you can spend 1 Brave order.\_</p><p>When you do, it regains Temporary HP equal to your Intelligence Operative level.\_</p><p>You can use this feature twice per long rest.</p>"
