name: Morale Burst/Break
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 9th level, your words and plans can make or break any situation.\_</p><p>When you enhance a plan, you can add your words to hinder your enemies or buffer your allies.\_</p><p>Select one effect when you would enhance your plan.\_</p><p>You can only use this feature once per initiative.\_</p><p><br />Morale Burse:</p><p>All allied creatures within 30 feet of you become analyzed by Exploit Weakness.\_</p><p><br />Morale Break:</p><p>All hostile creatures within 30 feet of you make a contested Wisdom saving throw vs your Intimidation check.\_</p><p>A creature whose save result is less than your check result, gains 2 ranks of Fear against you for 1 minute.</p>"
