name: Perfect Mind
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Beginning at 17th level, your mind becomes an impregnable fortress.\_</p><p>You gain proficiency in Wisdom or Charisma Saving throws (Pick one).\_</p><p>If you already have proficiency in both, choose one.\_</p><p>You instead add twice your proficiency bonus to the chosen Saving throw.\_</p><p>Additionally, when a creature you can see within 60 feet of you would be targeted by a Genjutsu, you can, as a reaction, spend one Brave Order to cast Chakra Shatter and automatically mark the triggering creature with your Exploit Weakness class feature.</p>"
