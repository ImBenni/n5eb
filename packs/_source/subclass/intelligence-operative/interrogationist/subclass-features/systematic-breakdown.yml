name: Systematic Breakdown
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Also, at 3rd level, Genjutsu you cast targeting a creature marked by your Exploit Weakness, can use your Charisma Modifier instead of Wisdom.\_</p><p>Additionally, you gain proficiency with weapons with the grapple property and when you would attempt to grapple a creature marked by your Exploit Weakness, you can use Intelligence (Intimidation) in place of Strength (Athletics) for any grapple checks.\_</p><p>A creature grappled this way is also restrained and makes checks to escape at disadvantage.\_</p><p>Finally, you learn the Bane Genjutsu, if you do not know it already.\_</p><p>If you already know Bane then you instead learn another Genjutsu of equal rank for which you qualify for.\_</p><p>When you would cast Bane, the Jutsu's effects are altered in the following ways:</p><p>\_</p><p>Success:</p><p>Affected Creatures suffers a 1d4 penalty to all attack roll, saving throw, skill and ability checks it makes until the beginning of your next turn.\_</p><p><br />Failure:</p><p>Affected creatures suffers a 1d6 penalty to all attack roll, saving throw, skill and ability checks it makes for the duration.\_</p><p>Additionally, it cannot gain the benefit of the Bless jutsu for the duration.\_</p><p>This creature is treated as if they were under the effect of a Mental and Sensory condition.\_</p><p><br />Critical Failure:</p><p>Same as failure, but the affected creature can now not gain the benefit of Jutsu that would grant it a bonus to attack rolls, damage rolls, saving throws, skill or ability checks.</p>"
