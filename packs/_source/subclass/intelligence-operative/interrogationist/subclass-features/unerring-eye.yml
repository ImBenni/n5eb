name: Unerring Eye
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Beginning at 13th level, your senses are impossible to fool.\_</p><p>You gain a 1d4 bonus on any skill check or saving throw made against Genjutsu with the Visual and/or Auditory Keyword(s).\_</p><p>Additionally, as an action, you can sense the presence of Genjutsu within 30 feet of you, if you are not blinded or deafened.\_</p><p>If the Genjutsu is of a rank you can cast or lower, you learn what it is and if the caster is within 120 feet of you.\_</p><p>If the Genjutsu you sensed as a result of this feature is on your Known jutsu list, you can as a reaction, spend one Brave Order to Cast Genjutsu Break at the highest rank you can cast based on your class table, without expending chakra, as if you know it.</p>"
