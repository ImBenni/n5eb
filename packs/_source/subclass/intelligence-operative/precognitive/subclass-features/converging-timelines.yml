name: Converging Timelines
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you can perceive multiple possible outcomes and futures in a but a moment, and make a
      gamble on which is the most likely.</p><p>At the start of your turn, you may roll 1d6, gaining an effect based on
      the result as shown below.</p><p>You may spend 1 Brave order when you use this feature to give an allied creature
      within 30 feet of you the effect of this feature as well.</p><p>Regardless, you can use either effect of this
      feature a number of times per long rest, equal to your Proficiency Bonus.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/converging-timelines.webp" />
