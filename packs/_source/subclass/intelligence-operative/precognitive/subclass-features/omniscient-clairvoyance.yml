name: Omniscient Clairvoyance
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>Beginning at 17th level, you may expend 1 Brave Order to enter into a trance of sorts, calling upon all of your
      chakra to see into the future of the battle currently playing out.</p><p>All attacks, ability checks, skill checks
      and saving throws you make are at advantage.</p><p>When you would roll on the Converging Timelines Table, you
      instead roll twice and take either result.</p><p>Attacks against you are made at disadvantage.</p><p>This lasts
      for 1 minute, but requires concentration as if you were concentrating on an S-Rank jutsu.</p><p>You may only do
      this once per Long Rest.</p>
