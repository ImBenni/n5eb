name: Precognition
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>When you choose this Strategy at 3rd level, you have learned to use your chakra to see brief glimpses into the future.\_</p><p>You and allied creatures within 30 feet of you are immune to being Surprised.\_</p><p>Additionally, as an action you may spend 1 Brave Order while looking at a creature within 60 feet of you.\_</p><p>You gain far more detailed glimpse into their own future.\_</p><p>For the next hour, you have advantage on Investigation, Insight, and History checks made to track them or learn about them.\_</p><p>You may use your Intelligence modifier for Insight checks made against them.\_</p><p>You also ignore half of AC bonuses as a result of Jutsu cast as a Reaction to your attack and bonuses to AC from Jutsu cast as an Action or Bonus Action on a creature's last turn, but not a change in calculation.</p>"
