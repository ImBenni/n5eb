name: Enhanced Sensory Seals
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Beginning at 6th level, when you would use your Sensory Seals feature, you can choose to spend an additional use of your Sensory seals to either target a second willing creature within range, or to amplify a single creatures sensory seal granting you both with enhanced effects.\_</p><p>If you select another creature this features bonuses are in effect when you and another creature with the mark are within 30 feet or when two creatures with the mark are within 30 feet.\_</p><p></p><p>The following are enhanced effects:</p><p>• Allied Casting: Bonus increased to +2.\_<br />• Allied Combination: Reduction increased to -10.\_<br />• Allied Defense: Bonus increased to +2.\_<br />• Allied Harmony: Bonus increased to +5.\_<br />• Allied Offence: Bonus increased to +6.\_<br />• Allied Perceptions: Additionally, creatures cannot gain a bonus to hit you as a result of a jutsu.\_</p>"
    chat: ''
