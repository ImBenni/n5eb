name: Preternatural Awareness
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>When you choose this Strategy at 3rd level, you realize the innate ability to maintain awareness on things that
      would normally be out of scope for your normal senses.</p><p>You learn the Sensing Technique D-Rank Ninjutsu if
      you don't already know it.</p><p>You can cast this jutsu even when it is not your turn by spending 1 Brave
      order.</p><p>When cast this way, the sensing range of the jutsu is doubled.</p><p>At 13th Level, you instead
      triple the range of the jutsu when cast this way.</p><p>Regardless of when or how you cast the Sensing Technique
      Ninjutsu, when you do, due to your extended knowledge of how it functions, you gain additional benefits from its
      casting.</p><p>The Sense Chakra special action granted by this jutsu, once per casting can be taken on your turn
      as a Free action.</p><p>You can substitute the skill check with an Intelligence (Investigation) in its
      place.</p><p>Additionally, creatures whom chakra you can sense you can tell what nature release a creature has, if
      any, if a creature is concentrating on a jutsu, if they are affected by a jutsu and even the highest rank of jutsu
      they have access to.</p><p>This level of awareness grows as you become more adept at sensory
      skills.</p><p>Beginning at 9th level, you may select one of the following preternatural ability that the Sensing
      Technique Ninjutsu grants you when you cast it.</p><p>You may select another effect at 17th level.</p><p> •
      Creatures whose chakra you can sense, who are currently marked by your Exploit Weakness class feature cannot gain
      the benefits of jutsu based bonuses to attack or damage rolls against you.</p><p> • Creatures whose chakra you can
      sense, who are currently marked by your Exploit Weakness class feature suffer a -5 penalty to contested skill
      checks vs you.</p><p> • Creatures whose chakra you can sense, who are currently marked by your Exploit Weakness
      class feature cannot gain advantage on attacks against any creatures allied to you that can hear you (excluding
      yourself), that are under the effects of your currently active plans.</p><p></p>
