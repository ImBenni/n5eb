name: Sensory Seals
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you bind your extra sensory capabilities to a special sealing tag of your
      creation.</p><p>You have a number of Sensory Tags equal to your Proficiency Bonus.</p><p>You regain spent sensory
      seals at the end of a long rest.</p><p>As a Bonus Action or when you would analyze a creature with Exploit
      Weakness, you can select a willing creature you can see within 60 feet of you and mark them with it, for the next
      minute.</p><p>When you and a creature marked with this seal would roll initiative or are within 30 feet of each
      other, you both gain one of the following benefits.  (You must choose which benefit when you activate this feature
      as this cannot change later.) </p><p>If you would attempt to use this feature on a second creature while you
      currently have another creature marked, the previous creature loses all benefits of this feature and the newly
      marked creature gains them in its place.</p><p> • Allied Casting: When you and an ally are adjacent to the same
      creature, you gain a +1 bonus to Ninjutsu, Genjutsu and Taijutsu attack rolls against them.</p><p> • Allied
      Combination: When you and an ally cast a Jutsu with the Combination keyword, you reduce the original cost of the
      jutsu by -5 (Min 1.) </p><p> • Allied Defense: When you and an ally are adjacent to the same creature, you gain a
      +1 Bonus to AC against that creature.</p><p> • Allied Harmony: You gain a +3 bonus to either all Physical
      (Strength, Dexterity, Constitution) or all Mental (Intelligence, Wisdom and Charisma) Skill Checks.</p><p></p><p>
      Select one set at activation.</p><p> • Allied Offence: When you and an ally are adjacent to the same creature, you
      gain a +4 bonus damage rolls against that creature.</p><p> • Allied Perceptions: Creatures cannot gain advantage
      against you as a result of being Grappled or Restrained.<br />Additionally, creatures' features, jutsu or traits
      grant them no benefits as a result of being adjacent to you or any of their allies while within 5 feet of
      you.</p><p></p>
