name: Commanding Presence
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Also, at 3rd Level, you have learned to exemplify your Shadowhands presence through yourself and vice versa.\_</p><p>You can spend a Brave order as a bonus action, when you do, you and all creatures of your choice within 30 feet of you gains one of the following until the beginning of your next turn:</p><p>• +2 bonus to Attack Rolls</p><p>• +2 bonus to Damage Rolls</p><p>• +2 bonus to Ability Checks</p><p>• +2 bonus to Saving throws</p><p>\_</p><p>The number of bonuses you can choose increases to two beginning at 9th level.\_</p><p>Creatures who have gained a bonus this way who accomplishes one of the following, immediately refunds the Brave order spent on this feature.\_</p><p>A creature can only gain the benefits of this feature twice per long rest.</p><p>\_<br />• Their attack roll is 5 or higher than the targets AC • Their ability check result is 5 or higher than the target DC.\_<br />• Their Saving throw result is 5 or greater that the Save DC.</p>"
