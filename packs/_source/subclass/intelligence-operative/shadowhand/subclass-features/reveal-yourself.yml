name: Reveal Yourself
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 6th Level, you learn to see through the deceptions of man.\_</p><p>When you engage in conversation with a creature in or out of battle, you are able to quickly figure what it is they are aiming to achieve.\_</p><p>You can use Charisma in place of Wisdom for insight checks and when you would make a Charisma (Insight) check against a creature you are speaking to, you do so at advantage.\_</p><p>Alternatively, when you are in combat with a hostile creature, you may as a bonus action, select one creature you can see within 60 feet of you.\_</p><p>When you do, you make a Charisma (Insight) check vs their Charisma (Deception).\_</p><p>On a success, you become aware of all active jutsu, features or effects the creature is currently under, when you do, you can spend 1 Brave Order to immediately end of these effects, regardless if the effect was the result of a jutsu or feature as if you had cast the Sealing Art: Chakra Dispel on it, using your Charisma modifier in place of your Ninjutsu Ability Modifier.</p>"
