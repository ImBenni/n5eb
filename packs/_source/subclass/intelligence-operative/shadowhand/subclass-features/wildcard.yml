  description:
    value: "<p>Beginning at 13th Level, when your Shadowhand or an allied creature within 30 of your Shadowhand would cast a jutsu, you may as a part of the same action it uses to cast that jutsu or make an attack roll, spend a Brave Order.\_</p><p>When you do, the jutsu cast rerolls all 1's, 2's and 3's.\_</p><p>Taking the second result even if the new roll is a 1, 2 or 3.</p>"
