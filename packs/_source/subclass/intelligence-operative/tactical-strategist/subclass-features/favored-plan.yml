name: Favored Plan
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>When you choose this Strategy at 3rd level, you become a master at a singular type of plan.</p><p>Select 1 Plan
      at the end of this class section that you do not know.</p><p>This Plan does not count against your Plans known and
      becomes known as your Favored Plan.</p><p>Twice per Long Rest, by expending 1 Brave Order, you can use this plan
      while another plan is active, granting you both Plans' effects.</p><p>Starting at 9th level you may select a
      second plan that you don't know.</p><p>This plan is also treated as your Favored Plan.</p><p>You can swap you
      Favored Plans for one another without spending a Brave Order.</p><p>You can swap them in this way twice per long
      rest.</p>
