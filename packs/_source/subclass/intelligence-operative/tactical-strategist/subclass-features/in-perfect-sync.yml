  description:
    value: "<p>Starting at 17th Level, you have learned to play off of any other person's strengths and weaknesses, covering for one another forming the perfect team.\_</p><p>By Spending a Brave Order, all allied creatures of your choice within 30 feet of you, for the next minute, gain an additional 1d6 to one of the following; Attack Rolls, Skill Checks, Ability Checks and Saving throws.\_</p><p>You can use this feature twice per long rest.</p>"
