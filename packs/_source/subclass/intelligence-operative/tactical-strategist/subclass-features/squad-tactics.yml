name: Squad Tactics
type: feat
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: "<p>Starting at 6th Level, you learn to enable your team to act with more unity and combine their efforts together.\_</p><p>You may spend a Brave Order granting up to two allies within 60 feet of you, 1d6 to add to their next skill check, Attack Roll, or Saving throw so long as they can both see and hear you.\_</p><p>Creatures you originally targeted with this feature, can use the help action as a bonus action until the end of their turns.\_</p><p>If an affected creature uses the Help Action on another creature, they gain the benefit of Squad Tactics as if they had the feature, as well as pass the bonus onto the creature they Helped.\_</p><p>If a creature gains the benefits of this feature in this way, they instead gain 2d6.</p>"
