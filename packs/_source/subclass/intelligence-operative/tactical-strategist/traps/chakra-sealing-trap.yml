system:
  description:
    value: >-
      <p>After laying this Trap it sits unmoving in a singular spot.</p><p>This trap triggers when a small, or larger
      Creature moves onto the ground or the floor within 5 feet.</p><p>When this trap is trigger, the creature must
      succeed a Constitution Saving Throw, having their chakra heavily restricted on a failed save.</p><p>A Chakra
      Sealed creature increases the cost of the jutsu it casts by three times your Proficiency Bonus until the seal is
      removed.</p><p>As an action on the affected creatures turn, they can make a Strength Saving Throw vs your save DC
      to remove the chakra sealing trap from themselves, after which the chakra sealing effect ends.</p><p>When this
      Trap is Upgraded, the Chakra seal prevents chakra molding until removed.</p><p></p>
