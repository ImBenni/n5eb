system:
  description:
    value: >-
      <p>After laying this Trap it sits unmoving in a singular spot.</p><p>This trap triggers when a small, or larger
      creature moves onto the ground or the floor within 5 feet. </p><p>When this trap is triggered, all creatures in a
      15 foot radius must succeed a Dexterity saving throw, taking xd8 fire damage on a failed save and half as much on
      a successful one. (X=your Proficiency Bonus)</p><p>When this Trap is Upgraded, increase the damage die size to a
      d12.</p>
