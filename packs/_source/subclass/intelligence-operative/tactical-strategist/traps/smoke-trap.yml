name: Smoke Trap
type: consumable
img: icons/environment/traps/trap-jaw-tan.webp
system:
  description:
    value: >-
      <p>After laying this Trap it sits unmoving in a singular spot.</p><p>This trap triggers when a small, or larger
      Creature moves onto the ground or the floor within 5 Feet. </p><p>When this trap is triggered, it releases a thick
      cloud of black soot. </p><p>All creatures in a 15 foot cube centering on the Trap are Blinded until the end of
      their next turn.</p><p>When this Trap is upgraded, The Smoke persists for 1 minute, and creatures are Blinded
      whenever they would enter the cloud for the duration. </p><p>Also, a creature only loses the Blinded condition at
      the end of their next turn after they leave the cloud.</p>
