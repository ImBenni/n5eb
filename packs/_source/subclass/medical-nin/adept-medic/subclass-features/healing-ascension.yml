name: Healing Ascension
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Starting, at 13th Level, when you would regain hit points or would restore hit points to another creature using a jutsu or class feature, you enter a state of Ascension.\_</p><p>This state lasts until the end of your next turn.\_</p><p>The next time you would take damage, you recover a number of hit points equal to your level, and then the ascension state ends.\_</p><p>You can enter the Ascension state, a number of times equal to your Ninjutsu ability modifier per long rest.</p>"
