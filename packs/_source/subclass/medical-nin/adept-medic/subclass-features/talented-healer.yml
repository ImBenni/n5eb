name: Talented Healer
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Also, at 2nd Level, the healing jutsu you cast on others heal you as well.\_</p><p>When you cast a jutsu of D-Rank or higher that restores hit points to a creature other than you, you regain hit points equal to 4 + the Jutsu's Rank.\_(D-Rank = 1, C-Rank = 2, B-Rank = 3, A-Rank = 4, S-Rank = 5).\_</p><p>Starting at 5th level, you can spend a use of Chakra Scalpel, to perform a Surgery over the course of the next minute.\_</p><p>When you do, the target creature regains xd6 where x = your proficiency bonus.\_</p><p>A creature which you've performed surgery on cannot have a surgery performed on them more than twice per full rest.\_</p><p>Beginning at 9th level, when you would restore a creatures hit points, they gain temporary hit points equal to half the hit points they've regained.</p>"
