name: Competent Combatant
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Also 2nd Level, you may use your Wisdom in place of Dexterity when calculating Armor Class (AC).\_</p><p>Additionally, your Chakra scalpel's damage die becomes a d6 and you can choose to make a melee taijutsu attack, in place of a ninjutsu attack.\_</p><p>When you would deal damage with an unarmed attack, you may spend 5 Chakra.\_</p><p>When you do, you instead, double the relevant modifier when calculating damage dealt.\_</p><p>You may do this twice per rest.\_</p><p>Increase the number of uses by one at 5th, 9th, 13th and 17th levels.\_</p><p>Starting at 5th level, you can spend a use of Chakra Scalpel to increase your striking power.\_</p><p>Your unarmed, weapon and all taijutsu attacks have their critical threat range increased by +1 until the end of your turn.\_</p><p>This becomes +2 at 13th level.\_</p><p>Beginning at 9th level when you would use this feature, you may instead triple your relevant modifier applied to the damage dealt.</p>"
    chat: ''
