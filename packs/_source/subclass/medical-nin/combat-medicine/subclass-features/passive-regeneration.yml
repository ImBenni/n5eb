    value: "<p>At 13th Level, your constant focus on enhancing your technique to supplement your allies on the battlefield has led you to learn to passively increase your survivability in combat.\_</p><p>As a Bonus action, you can choose to spend 1 Yin Mote to regain 5d8+ your Ninjutsu ability modifier in hit points to a willing creature you touch.\_</p><p>You can only use this feature a number of times equal to your proficiency bonus per long rest.</p>"
