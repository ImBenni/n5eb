name: 'Yin Seal: Charge'
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Also, at 5th level, you have begun to store medical release Chakra into your muscles, prepping them for when it is time for you to release it in a single bout.\_</p><p>This stored power has the potential to unleash massive shockwaves from the strength of your punches alone.</p><p><br />This stored power is manifested as Yin Motes.\_</p><p>You have a number of Yin Motes, equal to your proficiency bonus per rest.\_</p><p>You can spend these motes to do the following:</p><p>\_</p><p>• When you cast a jutsu with the medical keyword, you may spend 1 mote.\_<br />When you do, as a bonus action, you can cast a Taijutsu of C-Rank or lower with a casting time of 1 action.\_<br />• When you take the attack action, you can spend 2 motes to double your unarmed damage die.\_<br />• When you cast a Taijutsu that deals unarmed damage, you can spend 3 motes to upcast the jutsu by 1 rank, at no additional cost, ignoring upcast limitations.</p>"
    chat: ''
