name: Natural Healing
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Also, at 2nd level, you learn to use the natural veins of Chakra found in the Earth itself and all through nature to heal yourself and your allies at range, though this method is less potent than direct healing.\_</p><p>You have stored a pool of this healing energy represented by a number of d6's equal to your Medical-Nin level.\_</p><p>As a bonus action, you can choose one creature within 60 feet of you and spend a number of those dice.\_</p><p>Roll the spent dice and add them together.\_</p><p>The target regains a number of Hit Points equal to the total.\_</p><p>The target also gains 3 temporary Hit Point per die spent.\_</p><p>You regain all expended dice when you finish a long rest.\_</p><p>Beginning at 5th level, while you are gaining the benefits of your Chakra Scalpel Class feature, each time you would deal damage with your Chakra Scalpel, you regain hit points equal to your Chakra Scalpels damage + Your Ninjutsu ability Modifier.\_</p><p>You can only regain hit points this way once per turn.</p>"
