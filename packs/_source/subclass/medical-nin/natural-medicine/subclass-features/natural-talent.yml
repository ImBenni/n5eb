name: Natural Talent
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Starting at 5th level, you learn the techniques required to play a powerful role in the throes of battle.\_</p><p>You learn the following jutsu as you gain levels in this class according to the Natural Medicine Chart at the end of this class section.\_</p><p>Each jutsu learned also grants you an additional feature pertaining to the jutsu.\_</p><p>Learned jutsu do not count against your jutsu known as seen on your Medical-Nin Class Chart.\_</p><p>Additionally, you have learned to take on the qualities of a member of the tribe you selected from your Summoning Apprentice class feature for short periods of time.\_</p><p>As an Action, you may assume the form of a D-Rank Summon of your Tribe, replacing your own Strength, Dexterity, Constitution, HP and AC with the summoned creatures.\_</p><p>(Your Jutsu List, Chakra Point Maximum, and current Chakra point total does not change.) You also gain any traits the summoned creature you transform into would have at the appropriate rank.\_</p><p>You may remain in this form for a number of hours equal to half of your Medical-Nin level.\_<br />If your new forms hit points are reduced to 0, you immediately revert back to your normal form retaining your original hit points.\_</p><p>You may assume the form of a C-Rank Summon at 9th level, B-Rank at 13th level, and A-Rank at 17th.\_</p><p>You may transform using this feature twice per long rest</p><img src=\"systems/n5eb/assets/content/cheat-sheets/natural-talent.webp\" /><img src=\"systems/n5eb/assets/content/cheat-sheets/natural-medicine.webp\" /><p></p>"
