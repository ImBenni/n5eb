name: Protector Of Nature
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Starting at 13th level, your connection to your summons have become so powerful that they stand ready to defend you even when separated by an infinite distance.\_</p><p>If you are reduced to 0 Hit points or are Incapacitated against your will, you can, immediately as a reaction, before the effects of reaching 0 Hit points or becoming incapacitated take effect, use your Summoning Technique to summon an S-Rank Creature ignoring normal restrictions.\_</p><p>If you do, reduce your Chakra to 0, if you have 30 or less Chakra, otherwise spend Chakra as per usual.\_</p><p>Once summoned, the summoned creature acts in your defense, protecting you and your allies from harm, prioritizing your survival over your allies.\_</p><p>The creature summoned this way unsummons itself 10 minutes after being summoned or when the danger has passed.\_</p><p>Once you use this feature, you cannot use it again until you complete a long rest.</p>"
