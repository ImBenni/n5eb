name: Draining Hexes
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Starting at 13th level, when a creature hexed by you dies, you or another creature you can see within 30 feet of you regains hit points equal to your Medical-Nin level + your proficiency bonus.\_</p><p>When a creature regains hit points with this feature, the hex immediately ends.\_</p><p>Finally, when you fall to 0 hit points due to a melee attack, you may immediately spend 10 Chakra, doing so allows you to take make one attack with your Spiritual Weapon on a creature within range.\_</p><p>Any damage you deal to a target, grants you hit points equal to the damage dealt.\_<br />You can use this feature a twice per rest.</p>"
