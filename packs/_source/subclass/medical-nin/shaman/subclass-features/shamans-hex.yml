name: Shaman's Hex
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Beginning at 2nd level, you learn the secrets of psychosomatic Genjutsu, allowing you to place a hex on someone.\_</p><p>As a bonus action, choose one creature you can see within 30 feet of you.\_</p><p>The target is hexed for 1 minute.\_</p><p>The hex ends early if you die or are incapacitated.\_</p><p>You can transfer this hex as a bonus action on your turn.\_</p><p>Until the hex ends, you gain the following benefits:</p><p>• Once during each of your turns when you hit the hexed target with a melee attack, using a Jutsu with the Medical Keyword, your Spiritual Weapons or with your Chakra Scalpel you can deal extra necrotic damage to the hexed target equal to your proficiency bonus.</p><p>\_<br />• As a reaction when a creature you can see within 30 feet of you and the hexed target suffers a critical hit, you can turn that hit into a normal hit. <br />Any effects triggered by a critical hit do not trigger.\_</p><p><br />You can mark a creature using this feature a number of times equal to your proficiency bonus per rest.</p>"
