name: Altered Strength
type: feat
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: "<p>Also, at 2nd level, you may alter a creatures physiology to strengthen them in a number of ways.\_</p><p>As an action, you may touch a creature, giving them one of the following benefits for the next minute:</p><p>• Once per turn, add your Ninjutsu ability Modifier to their damage roll.\_<br />• Gain 10 Temporary Hit points at the beginning of each of your turns.\_<br />While they have temporary hit points granted by this feature, they gain resistance to one damage type of your choice.\_<br />• Gain a 1d4 bonus to one saving throws they don't have proficiency in.\_<br />• Gain a 1d4 bonus to skill checks they don't have proficiency in.\_</p><p><br />A creature can only gain one benefit from this feature at a time.\_</p><p>You can only have two instances of this feature active on creature(s) at any given time.\_</p><p>If you would try to use this feature a third time, while two other instances are currently active, one of the previous two instances stop at your choice.\_</p><p>Beginning at 5th level, you can spend 1 Chakra Die.\_</p><p>When you do, you use an enhanced version of this feature.\_</p><p>An affected creature can gain up to two benefits of this feature this way.\_</p><p>A creature other than you can gain the benefits of this feature twice per long rest.</p>"
