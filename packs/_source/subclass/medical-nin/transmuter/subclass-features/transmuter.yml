system:
  description:
    value: "<p>Starting at 5th level, you learn the techniques required to play a powerful role in the throes of battle.\_</p><p>You learn the following jutsu as you gain levels in this class according to the Transmuter Chart at the end of this class section.\_</p><p>Each jutsu learned also grants you an additional feature pertaining to the jutsu.\_<br />Learned jutsu do not count against your jutsu known as seen on your Medical-Nin Class Chart.</p><p>Also at 5th level, your Chakra Scalpel deals necrotic damage and you may tear them apart at the molecular level.\_</p><p>Once per turn, when you deal damage with your Chakra Scalpel, you deal additional Necrotic damage equal to your Proficiency bonus.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/transmuter-chart.webp\" />"
