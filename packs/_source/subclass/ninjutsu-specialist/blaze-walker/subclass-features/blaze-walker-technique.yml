system:
  description:
    value: "<p>Starting at 18th level, you learn the ultimate molding technique for fire release ninjutsu called Blaze Walker.\_<br />When you cast a ninjutsu with the Fire Release keyword, you can embolden the jutsu cast.\_<br />You can only use this molding by spending 10 chakra.\_<br />You can use this molding in addition to any other efficient molding you are using.\_<br />This jutsu is automatically upcast to S-Rank at no additional cost, ignores immunity and resistance and increases the damage die of all fire damage dealt by this jutsu and ember marks by 1 step.\_<br />(D4&gt;D6&gt;D8&gt;D10&gt;D12)</p>"
