name: Fire Release Master
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 14th level, when you use Flash Fire to deal additional damage, you may instead double the bonus damage dealt.\_<br />Additionally, when you would cast a Fire Release Jutsu that is currently benefiting from your Refined Ninjutsu class feature, you can double the cost of your jutsu to increase the damage dealt by twice the jutsu's damage dice for a single creature affected by your Jutsu.\_<br />This damage happens once per turn.\_<br />You may use this feature twice per long rest.\_<br />Finally, Ninjutsu you cast with the Fire Release keyword that inflicts the burned condition, saving throws are made at disadvantage.</p>"
