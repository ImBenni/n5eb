name: Fire Release
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>When you choose this tradition at 2nd Level, you gain the ability to learn ninjutsu with the Fire Release
      Keyword.</p><p> If you can already do this you learn 2 additional Fire Release Ninjutsu that you qualify for, one
      of which can be C-Rank or lower.</p><p> You also gain a +1d6 bonus on all Ninshou Checks related to Ninjutsu with
      the Fire Release Keyword and you can learn and create Ninjutsu with the Fire Release Keyword in half the required
      time.</p><p> Finally, when you cast a Ninjutsu with the Fire Release Keyword, you can do one of the following:
      </p><p>• Once per casting, increase the damage dealt by 1d6.<br /> This increases to 2d6 at 10th level and 3d6 at
      18th level.</p><p> • Once per casting, knock an affected creature 10 feet away from the origin point of the
      Jutsu.</p><p></p>
