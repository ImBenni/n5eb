name: Deadly Tradition
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 6th level, you learn to magnify the lethality and power behind your Clans Hijutsu.\_</p><p>When you cast a Hijutsu with the Ninjutsu keyword, you can enact your clans secret traditions, making the jutsu cast far more efficient and lethal to deal with.\_</p><p>Hijutsu with the Ninjutsu keyword that you cast, cannot have their damage reduced by more than half.\_</p><p>Additionally, twice per rest, you can choose to change the casting time of a Hijutsu with the Ninjutsu Keyword with the casting time of one Action, to a Reaction, which you can take when you or an allied creature in range would take damage.\_</p>"
