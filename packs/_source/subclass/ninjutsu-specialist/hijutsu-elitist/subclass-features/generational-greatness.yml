name: Generational Greatness
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 10th level, Jutsu you cast with both the Ninjutsu &amp; Hijutsu Keywords, that are currently
      benefiting from your Refined Ninjutsu class feature gains additional benefits.</p><p>You can use only one of these
      features once per casting.</p><p></p><p>• As a part of the same action used to cast the selected Jutsu, you can
      empower the jutsu cast.<br />If a creature fails their saving throw against your jutsu by 5 or more, regain 1
      Traditional Inertia.<br />You can gain no more than 2 Traditional Inertia per round this way.</p><p>• When you
      would upcast your selected jutsu, you may treat your upcast as if you had upcasted the jutsu twice, up to your
      maximum rank known as detailed in the Ninjutsu Specialist Class table.</p><p>• When you initiate a clash with the
      chosen jutsu, you make your check at advantage.</p>
