name: Hijutsu Adept
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also at 2nd Level, your skill with your clan techniques are far superior to other shinobi of equal caliber to you.\_</p><p>This skill manifests itself in the following way.\_</p><p>Second, once per turn, when you would cast a ninjutsu with the Hijutsu keyword, you can store part of the energy used within yourself as Traditional Inertia.\_</p><p>This inertia can be maintained within you for up to 1 minute or until spent.\_</p><p>You can have up to 5 inertia stored at once.\_</p><p>When you would cast a ninjutsu with the Hijutsu keyword, you can spend any number of inertia.\_</p><p>If you spend inertia, you cannot gain any during the same turn.\_</p><p>For each inertia you use, you increase the potency of your jutsu cast.\_</p><p>Its damage type is changed to the normal damage type of your other Hijutsu if it is not already that damage type (if you have Hijutsu that deal multiple types of damage, choose one type).\_</p><p>You also select one from the following options, of which you can only use one when using inertia:</p><p>\_</p><p>• Reduce the cost to maintain the jutsu by 1 (to a minimum of 1) for every 2-inertia spent.\_</p><p><br />• Immediately use one of your clan resources that have a limited use as part of casting the Hijutsu.\_</p><p><br />• Ignore one component needed to cast the jutsu for every 2-inertia spent.</p>"
