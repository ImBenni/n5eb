name: Hijutsu Master
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 14th Level, when you would use the Deadly Tradition class feature, you may also cast Hijutsu with
      the Ninjutsu Keyword with a casting time of a Bonus Action as a Reaction using that feature.</p><p>Additionally,
      when you would cast a Hijutsu with the Ninjutsu Keyword that is currently benefiting from your Refined Ninjutsu
      class feature, you may ignore Resistance to any damage dealt by the chosen Jutsu and double its range or its area
      of effect size.</p><p>You may only use this feature twice per Long Rest.</p>
