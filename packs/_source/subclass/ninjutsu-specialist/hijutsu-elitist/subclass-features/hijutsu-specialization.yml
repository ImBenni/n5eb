name: Hijutsu Specialization
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>When you choose this Tradition at 2nd level, you learn the secrets behind your clans techniques beyond what is
      taught to most other members.</p><p>You learn an additional Hijutsu with the Ninjutsu Keyword that you qualify
      for.</p><p>You also gain a +1d6 bonus on Ninshou checks related to Hijutsu with the Ninjutsu keyword and can learn
      and create Ninjutsu with the Hijutsu Keyword in half the required time.</p><p>Finally, when you cast a Ninjutsu
      with the Hijutsu Keyword, you can do one of the following:</p><p>• Hijutsu you cast with a range of at-least 5ft,
      has its range increased based on the rank it is cast at. <br />(D-Rank: +5, C-Rank: +10, B-Rank: +15, A-Rank: +20,
      S-Rank: +25)</p><p>• Hijutsu you cast has its cost reduced by an amount equal to its rank when cast.<br />(D-Rank:
      1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5)</p>
    chat: ''
