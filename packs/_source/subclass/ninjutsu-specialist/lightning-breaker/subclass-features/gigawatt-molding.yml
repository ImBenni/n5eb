name: Gigawatt Molding
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also at 6th level, you learn a new and unique efficient molding technique called Gigawatt Molding.\_</p><p>When you cast a Ninjutsu with the Lightning Release keyword, you can embolden the jutsu cast.\_</p><p>You can use this molding in addition to any other moldings you are using and has an Alternate Cost of 5.\_</p><p>All affected creatures within this jutsu's range must make a constitution saving throw being shocked on a failed save.\_</p><p>If the jutsu cast would already force a saving throw then on a failed save creatures gain 1 rank of the shocked condition.</p><p>Additionally, if a creature who is within this jutsu's range is an Aberration, Celestial or Mutant, they cannot take a reaction to this jutsu casting, the damage dealt or conditions inflicted and increase the damage the jutsu deals by 1 damage die.</p>"
