name: Lightning Release Master
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 14th Level, when you use Lightning Tamer to overcharge a jutsu, you gain 2 Lightning Motes with the chosen jutsu's casting.\_</p><p>Additionally, when you would cast a Lightning Release Jutsu that is currently benefiting from your Refined Ninjutsu class feature, targeting a shocked creature, you make your attacks at advantage.\_</p><p>If your jutsu requires a saving throw, they make their saving throw at disadvantage.\_<br />You can only use this feature twice per long rest.\_</p><p>Finally, ninjutsu you cast with the Lightning Release Keyword that inflicts the shocked condition, saving throws suffers a -1d4 penalty to all affect creatures saves.</p>"
