name: Lightning Release
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>When you choose this tradition at 2nd Level, you gain the ability to learn Ninjutsu with the Lightning Release
      Keyword.</p><p> If you can already do this you learn 2 additional Lightning Release Ninjutsu that you qualify for,
      one of which can be C-Rank or lower.</p><p> You also gain a +1d6 bonus on all Ninshou Checks related to Ninjutsu
      with the Lightning Release Keyword and you can learn and create Ninjutsu with the Lightning Release Keyword in
      half the required time.</p><p> Finally, when you cast a Ninjutsu with the Lightning Release Keyword, you can do
      one of the following: • Twice per casting, when making an attack targeting a creature with ranks of Shocked, gain
      a +1 bonus to Ninjutsu Attack Rolls.</p><p> This bonus increases to +2 at 10th Level and +3 at 18th Level.</p><p>
      • Once per casting, when you would Overcharge a Ninjutsu you cast, reduce its cost by an amount equal to its rank
      when cast.</p><p> (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5)</p>
