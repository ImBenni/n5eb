name: Destructive Ichor
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 10th level, Ninjutsu you cast without a Nature Release Keyword, that are currently benefiting from your Refined Ninjutsu class feature gains additional benefits.\_</p><p>You can only use one of these features, once per casting.\_</p><p><br />• As a part of the same action used to cast the selected Jutsu, you may add your ninjutsu ability modifier to one damage roll of the jutsu.</p><p>• As part of the same action used to cast the jutsu, if the jutsu would force a saving throw to resist the bleed, envenomed or corroded conditions, all creatures with said conditions that are making a saving throw vs the jutsu cast, gains +1 rank of the condition they are making a saving throw against on a failure.</p><p>• When you would initiate a clash, you can spend 1 blood vial to make your check at advantage.</p>"
