name: Lifeforce Casting
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also, at 2nd Level, you learn to extract chakra from blood and it as fuel for your ninjutsu, empowering them or making them simpler to cast.\_</p><p>Once per turn, when you would cast a ninjutsu that deals acid, necrotic, or poison damage, you can siphon some of the energy from the jutsu's damage, placing it into a Blood Vial.\_<br />This vial can be of any shape of your description.\_</p><p>A blood vial maintains its potency for up to 1 minute or until spent.\_</p><p>You can have up to 5 vials at once.\_</p><p>When you would cast a ninjutsu that deals acid necrotic or poison damage you can spend any number of blood vials.\_</p><p>If you spend a blood vial spent, increase the potency of your jutsu cast.\_</p><p>Select from one of the following, of which you can only use one when spending vials:</p><p>• Increase the damage dealt by 1d8 for every vial spent.\_<br />• Gain a +1 bonus to the jutsu DC for every two vials spent.\_<br />• Reduce the cost of the jutsu by 1, for every two vials spent.</p>"
