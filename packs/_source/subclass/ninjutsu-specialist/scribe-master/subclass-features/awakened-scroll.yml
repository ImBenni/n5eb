name: Awakened Scroll
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also, at 2nd level, you have bonded with a Ninjutsu scroll of your description and design.\_</p><p>This scroll may hold significance to you or may have been created by you.\_</p><p>This scroll has so much of your chakra poured into it, it has become semi-sentient.\_</p><p>While unable to speak or communicate, it reacts to your thoughts, feelings, and intents.\_</p><p>Additionally, your scroll has two open jutsu seals, which can be used to store a ninjutsu you know or from another source, such as a ninjutsu scroll or a willing creature.\_</p><p>Jutsu stored from another source are limited to 1 rank higher than your highest jutsu rank known.\_</p><p>You learn to create two additional jutsu seals at 6th and 10th levels.\_</p><p>Jutsu you cast from your awakened scroll are cast as if you casted them, using your Ninjutsu attack bonus and Save DC when appropriate.\_</p><p>You do not need to have a Nature Release Affinity or any additional Keyword requirements to cast a Jutsu sealed inside your Awakened scroll.\_</p><p>Once a Jutsu has been cast from your awakened scroll, it vanishes from your Jutsu seal.\_</p><p>Sealing a jutsu inside your Awakened scroll requires 1 hour of copying the jutsu from a Scroll or 1 minute of casting the jutsu into the scroll while simultaneously capturing it within the sealing formula.\_</p><p>If you are the one casting a jutsu into the scroll it only takes 1 action and costs you no chakra to seal it.\_</p><p>While holding this scroll in one of your hands, it grants you the following benefits:</p><p>• While casting Ninjutsu with the Fuinjutsu Keyword, you ignore Chakra Seal (CS) &amp; Chakra Molding (CM) component requirements.\_</p><p>• All Jutsu currently stored in your Awakened Scroll gains the Fuinjutsu keyword • You gain Advantage on Concentration checks made to maintain concentration on a Ninjutsu casted using your Awakened Scroll class feature.</p>"
