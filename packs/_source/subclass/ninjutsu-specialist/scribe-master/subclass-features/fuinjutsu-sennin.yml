name: Fuinjutsu Sennin
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 14th level, your Awakened scroll has become an inanimate doctrine of your psyche and
      personality.</p><p>If you so wish, your life story and memories are scribed into its contents.</p><p>When you
      would use Seal Consumption to consume a Jutsu, you can immediately as a part of the same Reaction used to consume
      it, cast it back at the triggering creature.</p><p>You may do this twice per Long Rest.</p><p>Additionally, when
      you would cast a Ninjutsu from your Awakened Scroll that has a nature release keyword that also deals damage, you
      may double the cost of the selected jutsu to switch the nature release keyword and damage type of the Jutsu cast
      to any other nature release and corresponding damage type that you currently have sealed into one of your scroll's
      Jutsu compartments.</p><p>When you would do this, you also change the casting time to 1 Bonus Action.</p><p></p>
