name: Seal Consumption
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Beginning at 6th level, you learn to capture and scribe jutsu mid combat.\_</p><p>First, when you would take damage or are forced to make a saving throw from a Ninjutsu a hostile creature cast, you may as a reaction tear open your Awakened Scroll.\_</p><p>Make an Ability Check using your Ninjutsu ability modifier.\_</p><p>The DC equals 13 + (D-Rank: 1, C-Rank: 2, B- Rank: 3, A-Rank: 4, S-Rank: 5).\_</p><p>On a success your Awakened Scroll consumes the jutsu sealing it into one of your empty Jutsu seals and preventing the damage you would take.\_</p><p>This jutsu consumption acts as if you countered the casting.\_</p><p>You may do this twice per rest.\_</p><p>Also, jutsu Scrolls you have that contain Ninjutsu can be immediately consumed and transferred to a jutsu seal, a bonus action.\_</p><p>(If you have no empty Jutsu compartments, one of the previous jutsu sealed vanishes as it's replaced with the new consumed Jutsu.)</p>"
