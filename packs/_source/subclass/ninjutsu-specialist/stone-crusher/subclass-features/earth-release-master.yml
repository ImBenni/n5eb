name: Earth Release Master
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 14th Level, when you use Mountain Aegis class feature to protect an ally, you can choose up to
      three creatures to gain its benefits.</p><p>Additionally, when you would cast an Earth Release Jutsu that is
      currently benefiting from your Refined Ninjutsu class feature, you may double the cost of the Jutsu cast to both
      double to range and make all affected terrain cost 3 feet for every 1 feet of movement, that you
      ignore.</p><p>Finally, Ninjutsu you cast with the Earth Release Keyword that generates a Structure, construct, or
      Creature becomes sturdier.</p><p>The structure, construct or creature doubles its hit points or Damage reduction
      (your choice).</p><p>You may use this feature twice per long rest.</p>
