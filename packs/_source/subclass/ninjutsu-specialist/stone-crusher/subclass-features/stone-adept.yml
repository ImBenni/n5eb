name: Stone Adept
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also, at 2nd Level, your affinity with earth release has granted you a powerful physique unlike other Ninjutsu specialist.\_</p><p>Increase your maximum hit points by 2.\_</p><p>Each time you gain a level in this class, you increase your hit point maximum by 1.\_</p><p>Additionally, once per turn, when you or a construct would take damage you are able to manifest a Solid Gem.\_</p><p>A gem remains for up to 1 minute or until spent.\_</p><p>You can have up to 5 Solid Gem's at a time.\_</p><p>When you would cast a Ninjutsu with the Earth Release keyword you can choose to spend any number of gems.\_</p><p>For each gem spent, you increase the potency of your jutsu cast.\_</p><p>Select from one of the following, of which you can only use one of when spending gems:</p><p>• Gain 4 Temporary hit points for each gem spent.</p><p>• If the jutsu would summon a construct that intercepts damage, that structure gains 2 DR (damage reduction) for each gem spent, up until a maximum of 8 DR.</p>"
