name: Tectonic Plate Technique
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also, at 6th Level, you learn a new and unique efficient molding technique called Tectonic Plates.\_</p><p>When you cast a Ninjutsu with the Earth Release keyword, you can embolden the jutsu cast.\_<br />You can use this molding in addition to any other moldings you are using and has an Alternate Cost of 5.\_</p><p>All affected creatures within this jutsu's range must make a Strength saving throw being bruised on a failed save.\_</p><p>If the jutsu cast would already force a saving throw then on a failed save creatures gain 1 rank of the bruised condition.\_</p><p>Additionally, if a creature who is within this jutsu's range is a Demon, Monstrosity or Undead, they lose resistance and immunity to conditions and effects that your jutsu inflicts.</p>"
