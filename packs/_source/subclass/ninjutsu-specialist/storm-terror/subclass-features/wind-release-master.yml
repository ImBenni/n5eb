name: Wind Release Master
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 14th Level, when you use Storm Herald to trigger elemental and physical conditions, you double the triggered conditions damage.\_</p><p>Additionally, when you would cast a Wind Release Jutsu that is currently benefiting from your Refined Ninjutsu class feature, you can double the cost of your jutsu to double the jutsu's range and if it requires a Saving throw, it deals double damage if the target creature fails is Saving throw by 5 or more.\_</p><p>You may use this feature Twice per long rest.</p>"
