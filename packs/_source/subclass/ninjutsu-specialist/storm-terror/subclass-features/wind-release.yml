name: Wind Release
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>When you choose this tradition at 2nd level, you gain the ability to learn ninjutsu with the Wind Release
      Keyword.</p><p>If you can already do this you learn 2 additional Wind Release ninjutsu that you qualify for, one
      of which can be C-Rank or lower.</p><p>You also gain a +1d6 bonus on all Ninshou checks related to ninjutsu with
      the Wind Release Keyword and you can learn and create Ninjutsu with the Wind Release Keyword in half the required
      time.</p><p>Finally, when you cast a ninjutsu with the Wind Release Keyword, you can do one of the
      following:</p><p>• Jutsu you cast with a range of at least 5ft, has its range increased based on the rank it is
      cast at.<br />(D-Rank: +5, C-Rank: +10, B-Rank: +15, A-Rank: +20, S-Rank: +25)</p><p>• Once per casting, jutsu you
      cast that affects an area has the size of that area increased by +5 feet.<br />This increases to +10 at 10th and
      +15 at 18th levels.</p>
