name: Combination Technique
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also, at 6th Level, you learn a new and unique efficient molding technique called Combination Technique.\_</p><p>When you or your summoned creature would cast a Ninjutsu with the Combination keyword, you can embolden the jutsu cast.\_</p><p>You can use this molding in addition to any other moldings you are using and has an Alternate Cost of 5.\_</p><p>You and your Summoned creature can assist each other in casting a jutsu with the Combination keyword regardless of keyword restrictions.\_</p><p>Additionally, you treat your or your summoned creatures charisma modifier as being +1 higher than it normally is for the purposes of enhancing the combination jutsu.</p>"
