name: Summoning Adept
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 6th Level, The Summoning Technique Ninjutsu becomes one of your Refined Ninjutsu if it was not before and as a result, creatures summoned as a result of casting the aforementioned jutsu gain the benefits of the Refined Ninjutsu class feature.\_</p><p>All of the jutsu they know are under the effects of Refined Ninjutsu.\_</p><p>They gain additional Jutsu Slots equal to the Ninjutsu save DC bonus granted by Refined Ninjutsu.\_</p><p>Also, you can cast the Summoning Technique to summon a creature of C-Rank or lower as an action instead of a full- turn-action.\_</p><p>You can summon creatures of B-Rank or lower as an action beginning at 10th level, and A-Rank at 18th level.\_</p><p>You can summon a creature in this way using this feature twice per rest.\_</p><p>If you would attempt to summon a creature as an action after you have expended all uses of this feature, you can do so by spending 1 chakra die.</p>"
    chat: ''
