name: Summoning Master
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 14th Level, your summoned creatures have grown to know your fighting style from countless
      battles.</p><p>When you summon a creature using the Summoning Technique Ninjutsu, it can enter the initiative
      directly after you and no longer needs to be commanded.</p><p>Only one of your summons can benefit from this at a
      time.</p><p>Also, when you command your summons, they gain a Bonus Action they can use that round.</p><p>They
      cannot gain the benefit of additional Bonus Actions.</p><p>The summoned creatures can also perform any Jutsu of
      C-Rank or lower that you know, as if they knew the Jutsu, regardless of the Jutsu's listed Keywords.</p>
