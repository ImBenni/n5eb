name: Elemental Adept
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also, at 2nd level, your frequent study of Ninjutsu has granted you a keen awareness most others lack in elemental-based combat.\_</p><p>Once per turn, when you cast a jutsu with a nature release keyword, you can retain a portion of the chakra used and store it within yourself in the form of an Elemental mote.\_</p><p>An elemental mote remains stored for up to 1 minute, or until spent.\_</p><p>You can have up to 5 motes stored at once.\_</p><p>When you would cast a jutsu with a nature release keyword you can spend any number of motes.\_</p><p>If you do you cannot gain a mote the turn you do.\_</p><p>For each mote spent, you increase the potency of your jutsu cast.\_</p><p>Select from one of the following, of which you can only use one of when spending motes:</p><p>• Impose a -1 penalty to saving throws for every 2 motes spent.\_<br />• Increase the damage dealt by 1d6 for every mote spent.\_<br />• Gain 2 temporary chakra points for each mote spent, which stack with each other up to a maximum of 10.</p>"
    chat: ''
