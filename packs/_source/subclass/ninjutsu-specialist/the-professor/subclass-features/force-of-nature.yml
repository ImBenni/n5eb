name: Force Of Nature
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 10th level, Ninjutsu you cast with any Nature Release keywords you are able to cast that are currently benefiting from your Refined Ninjutsu class feature, gain additional benefits.\_</p><p>• As a part of the same action used to cast the selected Ninjutsu, you gain 1 additional Elemental mote's.\_<br />You can gain bonus motes in this way once per round.\_</p><p>• As a part of the same action used to cast the selected Ninjutsu, you may deal additional damage equal to your Proficiency Bonus.\_</p><p>• If you would lose a Clash with another creature you may spend a reaction to reroll the d20.</p>"
