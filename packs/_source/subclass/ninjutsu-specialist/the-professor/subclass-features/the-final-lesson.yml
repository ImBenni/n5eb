name: The Final Lesson
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Starting at 18th level, you learn the ultimate molding technique for casting multiple ninjutsu with different nature releases called Final Lesson.\_</p><p>When you cast two ninjutsu with different nature release keywords in the same action, you can embolden the jutsu cast.\_</p><p>You can only use this molding by spending 10 chakra.\_</p><p>You can use this molding in addition to any other efficient molding you are using.\_</p><p>These jutsu both gain the benefits of any moldings used with their casting, so long as the molding can reasonably be applied to it.</p>"
