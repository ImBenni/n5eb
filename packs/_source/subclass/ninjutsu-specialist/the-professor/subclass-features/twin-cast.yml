name: Twin Cast
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Beginning at 6th Level, your focus on your elemental versatility has granted you the ability to learn an
      additional nature release.</p><p>Select one nature release you didn't select with your Versatile Release class
      feature and you gain a bonus to your Initiative equal to your Intelligence Modifier.</p><p>Additionally, you have
      learned how to make extended use of your Elemental Motes.</p><p>As an Action you can spend 5 Elemental
      Motes.</p><p>When you do you are able to cast two Ninjutsu with different nature release keywords in the same
      Action.</p><p>You can only cast Jutsu in this way twice per Long Rest, however you regain one use when you take a
      Short Rest.</p>
