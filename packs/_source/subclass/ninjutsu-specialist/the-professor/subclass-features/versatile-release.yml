name: Versatile Release
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>When you choose this tradition at 2nd Level, you gain the ability to learn Ninjutsu with one of the following
      nature release keywords: Earth Release, Wind Release, Fire Release, Water Release, or Lightning Release.</p><p>You
      must select a keyword you do not already have access too.</p><p>You also gain a 1d4 bonus on all Ninshou Checks
      related to Ninjutsu with nature releases that you have the ability to cast.</p><p>Finally, when you cast a
      Ninjutsu with any nature release that you know, you can do one of the following:</p><p>• Twice per casting, when
      making an attack targeting a creature with ranks of an Elemental condition, gain a +1 bonus to Ninjutsu attack
      rolls.<br />This bonus increases to +2 at 10th level and +3 at 18th level.</p><p>• Once per casting, ignore a
      portion of the targets damage reduction equal to the rank of the jutsu cast.<br />(D-Rank: 2, C-Rank: 4, B-Rank:
      6, A-Rank: 8, S-Rank: 10)</p>
    chat: ''
