system:
  description:
    value: "<p>Starting at 10th level, Ninjutsu you cast without any nature release keywords that are currently benefiting from your Refined Ninjutsu class feature gain additional benefits:</p><p>• As a part of the same action used to cast the selected Jutsu, you cleanse your target of any defenses.\_<br />They lose any resistances it may have against its damage type until the end of your next turn.\_</p><p>• As a part of the same action used to cast the selected jutsu, deal additional damage equal to your proficiency bonus.\_</p><p>• When you initiate a clash with the chosen jutsu, you roll your Clash Check at advantage</p>"
