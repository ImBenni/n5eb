name: Void Adept
type: feat
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: "<p>Also at 2nd Level, your skill with chakra molding and raw shaping techniques have becomes far more adequate and sophisticated than others of a similar level.\_</p><p>Once per turn, when you would take damage from a jutsu with a nature release keyword or would cast a ninjutsu without any nature release keywords, you gain one Void Shard.\_</p><p>A shard remains for up to 1 minute or until spent.\_</p><p>You can have 5 shards stored at once.\_</p><p>When you would cast a ninjutsu without a nature release keyword you can do one of the following to increase the Jutsu's potency.\_</p><p>Select one of the following, of which you can only use one of when spending shards:</p><p>By spending 1 Shards, convert all damage dealt into Chakra damage.</p><p>• Increase the cost of the affected creature next jutsu by 5, for each Shard spent.</p><p>• For every mote spent, reduce the cost of the jutsu by 2 Chakra. You can spend up to 3 motes in this way</p>"
    chat: ''
