system:
  description:
    value: >-
      <p>Techniques: Black, Perfect You install blades within your Puppet that aren't immediately visible to the
      eye.</p><p> Your Puppet Tool gains the Hidden Blade natural weapon.</p><p> When your Puppet Tool takes the Attack
      action, it can make an additional attack using its Hidden Blade.</p><p> It can also use the weapon normally if it
      wants, and this weapon can be used as a component in jutsu.</p><p> You cannot use this upgrade in conjunction with
      any upgrades that replace your puppet's attacks when taking the Attack action.</p><p> Hidden Blade: Melee Weapon
      Attack: Ninjutsu or Taijutsu Attack Bonus to hit, reach 5ft.<br /> Hit: 1d6 + your Proficiency Bonus in piercing
      damage.</p><p></p>
