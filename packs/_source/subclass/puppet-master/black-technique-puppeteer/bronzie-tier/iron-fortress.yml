system:
  description:
    value: >-
      <p>Techniques: Black </p><p>Prerequisite: Puppet Tool Constitution score of 16+, Puppet Tool cannot have
      Mechanical Light Shield Block.</p><p></p><p> You enhance your Puppet Tool's shielding and stationary ability by
      installing a grand shield on its body.</p><p> Your Puppet Tool counts as half cover for Medium or smaller
      creatures within 5 feet of it, while between them and the attacker or while riding it.</p><p> Additionally, it
      cannot be moved against its will, while in contact with the ground.</p><p></p>
