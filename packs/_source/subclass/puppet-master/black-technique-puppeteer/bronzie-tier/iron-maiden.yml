system:
  description:
    value: >-
      <p>Techniques: Black </p><p>Prerequisite: You must have Entrapment Mechanism on one of your Puppet
      Tools.</p><p></p><p> A secret execution technique first created by the Puppet Master Kankuro.</p><p> Using your or
      your Puppet Tool's Reaction, while a creature is restrained by the Puppet Tool with the Entrapment Mechanism, the
      Puppet Tool with this Upgrade detaches its head, arms, and legs and brandishes long, slender piercing
      blades.</p><p> The Puppet then thrusts each of these blades through the Puppet Tool restraining the creature,
      piercing the target inside.</p><p> The creature takes 5d10 piercing damage and must succeed a Constitution saving
      throw or gain 1d4+1 ranks of bleeding.</p><p> Your Puppet Tool then reforms, and the Puppet restraining the
      creature releases them.</p><p> This damage ignores resistance, treats immunity as resistance, and ignores all
      damage reduction.</p><p> You may use this Upgrade twice per rest.</p><p> Alternatively, you can spend 10 chakra to
      use this upgrade without taking a rest.</p><p></p>
