system:
  description:
    value: >-
      <p>Techniques: Black </p><p></p><p>After accumulating so much poison in its form, you have given your Puppet Tool
      the ability to expel large quantities as if it were a jutsu.</p><p> Your puppet gains the ability to cast one
      ninjutsu with the Medical keyword of C-Rank or lower that deals poison, acid, or necrotic damage.</p><p> It uses
      your chakra.</p><p> At Later Levels: You can take this Upgrade at higher tiers.</p><p> If you take it as a Silver
      Upgrade, the jutsu can be of B-Rank or lower.</p><p> If you take it as a Gold Upgrade, the jutsu can be of A-Rank
      or lower.</p><p> If you take it as a Platinum Upgrade, your Puppet Tool gains two jutsu instead of one.</p><p></p>
