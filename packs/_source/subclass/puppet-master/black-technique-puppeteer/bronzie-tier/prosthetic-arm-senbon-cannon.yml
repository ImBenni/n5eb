name: Prosthetic Arm Senbon Cannon
type: feat
_id: GU9iE7FFoGSrAp2R
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Black </p><p></p><p>A technique derived from the renowned Puppet Master, Sasori of the Red
      Sand.</p><p> Upon acquiring this Upgrade, you install a large cannon on one of your Puppet's arms.</p><p> As an
      action, you can have your Puppet Tool fire this cannon at a space within 120 feet, sending a massive
      missile.</p><p> If there is a creature in this space, make a ranged attack, dealing your Puppet Tool's natural
      weapon damage on a hit.</p><p> Regardless of a hit or miss, the missile's various compartments open, sending out a
      barrage of tiny senbon at creatures within a 30-foot radius.</p><p> All hostile creatures must make a Dexterity
      saving throw, taking 4d8 piercing damage on a failed saving throw, or half as much damage on a success.</p><p>
      These senbon are also laced with poison.</p><p> Hostile creatures must also make a Constitution saving throw, at
      disadvantage if they failed their Dexterity saving throw, becoming Poisoned for the next minute on a failed
      save.</p><p> You can use this Upgrade twice per rest, though your Puppet must travel to where the missile landed
      and use its action to place it back into itself each time it uses it.</p><p></p>
