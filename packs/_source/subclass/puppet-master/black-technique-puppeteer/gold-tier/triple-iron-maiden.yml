img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Black </p><p>Prerequisite: Iron Maiden </p><p></p><p>When a Puppet Tool with the Entrapment
      Mechanism Upgrade would successfully grapple a creature, you can spend 10 chakra to summon a clone of your Puppet
      Tool to attempt to grapple a different target within 20 feet of the original target, at advantage.</p><p> This
      clone cannot take actions outside of grappling and has a number of hit points equal to your Puppet Master level,
      disappearing if it reaches 0 hp.</p><p> If both targets are restrained, when you use the Iron Maiden upgrade, you
      can have it affect both creatures.</p><p> This only takes one use of Iron Maiden Upgrade.</p><p> Also, your Iron
      Maiden Upgrade is improved with seals that block evil entities.</p><p> Restrained Aberrations, Demons,
      Monstrosities, or Undead have disadvantage on all rolls to break free from your Puppet Tool's Entrapment
      Mechanism.</p><p></p>
