system:
  description:
    value: >-
      <p>Techniques: Black </p><p>Prerequisite: Poison Expulsion System </p><p></p><p>Your Puppet is able to unleash a
      wave of pure toxic destruction, akin to the breath of a dragon.</p><p> By spending 20 chakra, your Puppet Tool can
      use its action to exhale a massive 120-foot cone of poison gas.</p><p> All creatures within range must make a
      Constitution saving throw, at disadvantage.</p><p> On a failed save, a creature takes 12d10 poison damage and
      gains 3 ranks of envenomed.</p><p> A creature is also poisoned and slowed for the duration of their envenomed
      condition.</p><p> On a successful saving throw, a creature takes half damage and only gains 1 rank of
      envenomed.</p><p> This Upgrade ignores immunity to the Poisoned condition, ignores resistance to poison damage,
      and treats immunity to poison damage as resistance.</p><p> The poison gas created by this Upgrade remains in the
      affected area for 10 minutes and the area is considered difficult terrain.</p><p> Moderate wind disperses this gas
      in 8 rounds.</p><p> Strong wind disperses it in 4 rounds.</p><p> While outside the area of effect, a creature can
      remake the saving throw, without disadvantage, at the end of each of their turns, removing 1 rank of envenomed on
      a success, plus an additional rank for every 4 they succeed the saving throw by.</p><p></p>
