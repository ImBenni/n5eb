    value: >-
      <p>Techniques: Black </p><p>Prerequisite: Mechanical Light Shield Block </p><p></p><p>Your Puppet Tool may now use
      this Upgrade in response to itself, an allied creature, or you taking damage.</p><p> When your Puppet Tool uses
      this Upgrade, until the Upgrade ends, it reduces any damage it or the ally it is protecting receives by twice your
      Proficiency Bonus.</p><p> It also grants itself and the ally a +2 bonus to Strength, Dexterity, and Constitution
      saving throws until the Upgrade ends.</p><p></p>
