system:
  description:
    value: >-
      <p>Techniques: Black, Perfect </p><p>Prerequisite: Poison Mist Hell &amp; Needle Wave </p><p></p><p>After using
      the Poison Mist Hell, your Puppet Tool may then use its Needle Wave natural weapon's Multi-Target option as part
      of the same action, affecting all creatures within the poison cloud.</p><p> If you have multiple Puppet Tools with
      the Needle Wave upgrade, you may use your Reaction to have all Puppet Tools target all creatures with their Needle
      Wave as well, increasing the damage dealt by one damage die and imposing a -1 penalty on the Dexterity saving
      throw for creatures for each Puppet Tool that joins after the first.</p><p></p>
