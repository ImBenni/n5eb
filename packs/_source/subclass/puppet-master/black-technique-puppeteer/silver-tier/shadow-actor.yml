name: Shadow Actor
type: feat
_id: Ug5YQaIJUEvekEiv
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Black </p><p></p><p>In order to activate this Upgrade, you and your Puppet Tool must not be within
      line of sight of a creature you can see.</p><p> As an action, you transform your Puppet Tool into a near identical
      clone of yourself and the Puppet moves up to its movement speed and makes a melee attack using any melee weapon or
      Upgrade that would prompt a melee attack.</p><p> This attack scores a critical hit on an 18-20.</p><p> You
      immediately take the Hide action after using this Upgrade, at advantage.</p><p> On a hit, your "clone's" face
      begins to crack, revealing your Puppet's identity.</p><p> The target must then make a Charisma saving throw at
      disadvantage, automatically failing if the Puppet Tool scored a critical hit.</p><p> On a failed save, they are
      Surprised until the end of their next turn.</p><p> An allied creature within 60 feet of the creature and your
      Puppet Tool, can immediately use their Reaction to move, and use a feature or action that would normally require
      their action.</p><p> You can use this Upgrade twice per rest.</p><p> Alternatively, you can spend 10 chakra to use
      this upgrade without taking a rest.</p><p></p>
