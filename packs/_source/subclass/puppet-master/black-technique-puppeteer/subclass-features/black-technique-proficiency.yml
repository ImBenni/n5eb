system:
  description:
    value: >-
      <p>When you choose this technique at 2nd level, you gain proficiency in Chakra Control and Stealth.</p><p> You
      gain proficiency in Poison Kits and you can use your Ninjutsu Save DC for the poison you or your puppets inflict,
      instead of the set DC.</p><p> Additionally, all Poison Kits you buy or make have 2 extra uses.</p><p> Lastly, you
      gain an additional Tactic from the Tactics of the Craft feature.</p><p></p>
