folder: v0ZqMIpa2z7ljyOl
name: Life-Like Puppetry
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you realize that in order for your Puppetry to evolve further, you must find a way to
      emulate the strength of real shinobi within their various mechanisms.</p><p> You are given a choice.</p><p> Choose
      between the following; Your choice cannot be changed later.</p><p></p><p> • Training: By choosing this method, you
      choose to train with the most elite of Shinobi to see how they do things, and how to imitate them with your
      puppets.</p><p> Select one Puppet.</p><p> This Puppet gains 1 level in any class of your choice, excluding this
      class, Ninjutsu/Genjutsu Specialist, Medical-Nin, Science- Nin, and subclasses that grant it a nature release that
      you don't also have.</p><p> Your selection grants the Puppet Tool the skill proficiencies and class/subclass
      features of the class.</p><p> At 11th and 16th levels, you distribute another class level to the same puppet or a
      different puppet, with the same class or a different one.</p><p></p><p> • Bloodline : By choosing this method, you
      have uncovered the macabre acts of Puppet Masters hidden away within secret scrolls.</p><p> You locate Shinobi's
      corpse and integrate their remains into your puppet.</p><p> You are considered as gaining the Bloodline, Latent
      feat, only gaining 6 Bloodline Points and distributing any purchased features amongst your Puppet Tools.</p><p>
      You cannot select the Hoshigaki, Inuzuka, or Kurama clans.</p><p> If you opt to purchase a hijutsu feature, your
      Puppet Tool can select the chosen clan's hijutsu if you have the Jutsu Specialization upgrade.</p><p> At 11th and
      16th levels, you gain 6 more Bloodline Points to distribute amongst your Puppets.</p><p> These can be the same
      clan or different clans.</p><p></p>
