name: Noxious Handiwork
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Starting at 14th level your continuous exposure to poisons has left you more resilient than most.</p><p> You
      gain resistance to poison damage and have advantage on saving throws that would inflict the envenomed
      condition.</p><p> Once per turn, when you or your puppet hit a creature with a weapon or taijutsu attack you can
      spend one use of your Poison Kit to force them to make a saving throw against a poison in your possession.</p><p>
      Alternatively, as an action, your puppet can expend both uses of a poison to produce a cloud of poison in a
      15-foot radius forcing all creatures to make a Constitution saving throw or suffer the effects of the
      poison.</p><p></p>
