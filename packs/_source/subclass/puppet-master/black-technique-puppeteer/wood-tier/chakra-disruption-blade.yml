img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Black, Perfect </p><p></p><p>You fit your Puppet Tool with multiple small compartments of Black
      Iron Sand, which is touted for having potent chakra disrupting abilities.</p><p> Twice per rest, as a Bonus
      Action, you can activate this upgrade.</p><p> When you do, particles of sand swirl around your Puppet Tool for the
      next minute.</p><p> Alternatively, you can spend 5 chakra to activate this Upgrade before taking a rest.</p><p>
      When your Puppet Tool hits with a weapon attack, it deals an extra 1d6 chakra damage, which ignores DR, and once
      per turn, an affected creature must succeed a Constitution saving throw or gain disadvantage on checks to maintain
      concentration and increase the cost of all jutsu they cast by +5 until the end of their next turn.</p><p> A
      creature who fails by 5 or more has their chakra completely disrupted, losing the ability to mold chakra until the
      end of their next turn.</p><p> On a critical hit, creatures make this save with disadvantage.</p><p> At Later
      Levels: You can take this Upgrade as a Silver tier Upgrade.</p><p> If you do, your Puppet Tool gains a +1 bonus to
      critical threat range for weapon attacks while this Upgrade is active.</p><p> If they target a creature
      benefitting or concentrating on a jutsu, this bonus increases to a +2.</p><p></p>
