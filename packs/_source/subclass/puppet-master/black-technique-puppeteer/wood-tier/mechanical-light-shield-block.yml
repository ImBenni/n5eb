system:
  description:
    value: >-
      <p>Techniques: Black, Perfect </p><p></p><p>You build a manipulation shortcut into your Puppet to defend your
      allies.</p><p> As a Reaction, when you, your Puppet Tool, or an ally within range of half your Puppet Tool's
      movement speed would be targeted with an attack, your Puppet moves and unfolds 4 segments down the length of one
      of its arms on all sides, and generates a stream of chakra through each segment to form a barrier.</p><p> The
      triggering creature makes their attack roll at disadvantage.</p><p> Additionally, until the start of the protected
      creature's next turn, the first attack roll made against them or the Puppet per turn, is made at
      disadvantage.</p><p></p>
