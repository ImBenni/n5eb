system:
  description:
    value: >-
      <p>Techniques: Blue </p><p></p><p>You improve upon the design of your Puppet Tool and its Weapon Mode in various
      ways.</p><p> Your Puppet Tool gains specific benefits, based on its Puppet Weapon Type (You do not gain these
      benefits while using its Weapon Mode).</p><p> In addition, your Puppet's Weapon Mode is now unbreakable, and gains
      an extra property of your choice.</p><p> Alternatively, you can choose to gain a +1 to damage rolls with your
      weapon.</p><p> • Drone Weapon: The Drone has advantage on Stealth checks and doesn't provoke attacks of
      opportunity.</p><p> • Ogre Weapon: The Ogre Weapon increases its maximum hit points by your Puppet Master level,
      and reduces all damage it receives by twice its Strength Modifier.<br /> It also ignores damage reduction and
      temporary hit points when damaging a structure, construct, or object.</p><p> • Sentinel Weapon: The Sentinel
      Weapon increases either its Strength or Dexterity score by +2 (pick one).<br /> It also ignores difficult terrain
      and has advantage on saving throws that would hinder its movement speed in any way.</p><p></p>
