system:
  description:
    value: >-
      <p>Techniques: Blue </p><p></p><p>This Upgrade cannot be used while your Puppet is in its Weapon Mode.</p><p> You
      take an Overdrive mechanism used by other Puppet Masters and upgrade it further to enable your Puppet Tool to
      unleash utter destruction.</p><p> When your Puppet Tool has less than half of its maximum hit points, you can
      spend 10 chakra to Overcharge them.</p><p> When you do, your Puppet can immediately take its action as part of the
      same action, and gains additional benefits for the duration, listed below.</p><p> Once this Upgrade ends, your
      Puppet Tool gains 4 ranks of weakened, which can only be removed on a long rest.</p><p> This Upgrade ends after 1
      minute or if your Puppet would stop being bloodied.</p><p> • Your Puppet Tool gains temporary hit points equal to
      your Puppet Master level at the start of each of your turns.</p><p> • Your Puppet Tool increases the damage of any
      weapons it uses by 1 die and by 1 die step.</p><p> • Your Puppet Tool has advantage on Strength and Constitution
      saving throws.</p><p> • Your Puppet Tool ignores resistance, treats immunity as resistance, and ignores half of
      all damage reduction, when attacking a target that you are Locked-On to.</p><p></p>
