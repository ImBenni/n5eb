system:
  description:
    value: >-
      <p>Techniques: Blue </p><p>Prerequisite: Transforming Apparatus </p><p></p><p>While inert, your puppet looks like
      a normal mechanical object of a size equal to its original form.</p><p> Your puppet can transform into a box,
      briefcase, or other similar objects.</p><p> You and your puppet gain proficiency in Deception and Stealth skills;
      if you already have proficiency in these skills, you instead gain Mastery.</p><p> You can make your puppet
      transform as an object interaction as long as you can touch it.</p><p> If you hide your puppet from an enemy they
      are surprised.</p><p></p>
