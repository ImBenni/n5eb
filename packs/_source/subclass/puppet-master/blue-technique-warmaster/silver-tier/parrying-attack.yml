name: Parrying Attack
type: feat
_id: LViaiE9aO60OIc9O
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Blue, Perfect </p><p>Prerequisite: Paladin </p><p></p><p>When you or your Puppet would use the
      Reaction of the Paladin Upgrade against an attack roll, as part of the same Reaction, the one who reacts can
      contest the attack roll of the triggering creature with a melee Taijutsu attack, comparing their result with the
      attacker's roll.</p><p> If this is a melee attack and they succeed, the creature is Dazed (or Staggered if you
      succeed by 5 or more) until the end of the current turn, and they can make one melee attack with your weapon
      against them.</p><p> On a hit, you also knock the creature back 15ft.</p><p> If this is a ranged attack and they
      succeed, the attack is deflected back up to 30 feet in straight line.</p><p> If there is a creature within the
      path of the deflection, they can be hit by the deflected attack.</p><p> Compare the reactor's attack roll to their
      AC.</p><p> If you or your Puppet fail the contest with this Upgrade, reduce the damage reduction of the Paladin
      Reaction to d4s.</p><p> This Upgrade three times per rest before you become too fatigued to execute this tactic
      again.</p><p></p>
