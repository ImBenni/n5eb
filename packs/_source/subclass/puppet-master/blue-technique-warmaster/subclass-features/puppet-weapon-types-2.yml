folder: d7sHu3c3wjTOwZAU
name: Puppet Weapon Types 2
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Below are the available Puppet Weapon types.</p><p>When you select a Puppet Weapon type, you add the prefix of
      the Weapon Type to your puppet's name.</p><p>For each Weapon Type, your Puppet gains a special Weapon Mode, that
      allows it to transform into a living weapon of your wildest creation, inspired by the techniques of a particularly
      interesting group of warriors in the Land of Iron.</p><p>Your Weapon Mode can be anything your heart can dream,
      from a simple katana to something unique like a backpack of spider legs that jab your opponents.</p><p>The rules
      for the Weapon Mode are as follows: On a long rest, select one simple or martial weapon to base your Weapon Mode
      off of.</p><p>You remove all properties from this weapon and rebuild it.</p><p>Select one of the following damage
      die sizes for your weapon.</p><p>Based on your selection, your weapon can be equipped with a specific number of
      weapon properties, that at least one weapon of that type shares (ranged weapons get ranged weapon properties,
      melee weapons get melee weapon properties).</p><p>The damage type of your weapon can be Bludgeoning, Piercing, or
      Slashing (pick one).</p><p>While using this weapon, any weapon seals given the Puppet Tool are active on
      it.</p><p>You cannot command your Puppet Tool, nor can it be targeted by any attack or saving throw.</p><p>You can
      use your Bonus Action to make a single weapon attack with this weapon, or use an Upgrade that makes an attack or
      imposes a saving throw.</p><p>Lastly, your Puppet Tool may use its Weapon Mode as a natural weapon, while you are
      not using it, and you count as your Puppet Tool for any Warmaster features and Warmaster Upgrades that require it
      (aside from Weapon Type features).</p><p>If the weapon is ever broken, the Puppet falls to 0 hit points.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/puppet-weapon-types.webp" /><p></p><p>DRONE WEAPON</p><p>ASI: Wisdom
      score becomes 14.</p><p>+1 to Dexterity score.</p><p>Your Puppet Tool becomes that of a small drone intended for
      reconnaissance and ranged battle.</p><p>Taking elements from some Science-Nin, this weapon type incorporates
      Scientific Ninja Tools, granting you a device that allows you to command the Drone with a special wristband that
      transmits your chakra and thoughts, as opposed to Chakra Threads.</p><p>• The Drone's movement speed is increased
      by 30ft, and it gains a flying speed equal to its movement speed.</p><p>The Drone can be up to 1000 feet away from
      you.</p><p>• As an action or Bonus Action, you can look through the eyes of the Drone.</p><p>While doing so, you
      are blind to your surroundings, and from the Drone, you gain 10x your level in Darkvision (you can still benefit
      from special senses you have while looking through the Drone).</p><p>You can stop looking through the Drone at any
      point (no action needed).</p><p>• The Drone is proficient in Investigation, Perception, Stealth, and Survival, and
      when the Drone would roll a 7 or lower on the d20 with these skills, treat it as an 8.</p><p>• The Drone gains
      access the natural weapon Arrow Missile (counts as a bow).</p><p>Reach 90/180ft, Ammunition. Hit: 1d8 + Strength
      Modifier in piercing damage.</p><p>During a long rest, you can choose to add the Overseer property to the Drone's
      Weapon Mode.</p><p>This does not count against your maximum properties.</p><p>If you do, you gain the following
      benefits while wielding the Weapon;</p><p>• If melee, gain an extra rank of Reach.</p><p>If ranged, attacks within
      your weapon's max range do not have disadvantage.</p><p>• When attacking a creature that would give you a non-
      dice-based penalty to your roll, you can make a Perception check vs.</p><p>a DC 5 + their level to ignore these
      penalties until the end of the turn.</p><p></p><p>OGRE WEAPON</p><p>ASI: +2 to Strength score.</p><p>+1 to
      Constitution score.</p><p>Your Puppet Tool becomes that of a large brute designed to rampage throughout the
      battlefield, inflicting massive destruction to aid the Puppet Master with its large size.</p><p>• The Ogre's size
      is Large.</p><p>It becomes Huge at 14th level.</p><p>• The Ogre applies its Puppet Master's Proficiency Bonus when
      attempting to Grapple a creature, and does not reduce its movement speed when carrying a creature smaller than
      it.</p><p>• The Ogre deals double damage to structures, constructs, and objects.</p><p>Also, the maximum amount
      the Ogre can lift is multiplied by your Proficiency Bonus.</p><p>• The Ogre gains the natural weapon,
      Smash.</p><p>Reach 5ft., Unarmed property, one target. Hit: 3d4 + Strength Modifier in bludgeoning
      damage.</p><p>During a long rest, you can choose to add the Titan property to the Ogre's Weapon Mode.</p><p>This
      does not count against your maximum properties.</p><p>If you do, you gain the following benefits while wielding
      the weapon; • This weapon's damage die increases by 1 step.</p><p>If this would go beyond a 1d12, gain a +1 bonus
      to damage.</p><p>• This weapon's damage rolls ignore up to 3 DR.</p><p></p><p>SENTINEL WEAPON</p><p>ASI: +2 to
      Strength or Dexterity score.</p><p>+1 to Strength or Dexterity score.</p><p>Your Puppet Tool becomes like a
      Sentinel, resembling a human warrior like traditional Puppets, but having more advanced mechanisms that allow it
      to act more akin to a soldier, which befits the Blue technique.</p><p>This Puppet can be Small or Medium in
      size.</p><p>• The Sentinel gains a +1 bonus to attack rolls with weapons it wields, and increase the damage die of
      weapons it wields by 1 step.</p><p>• The Sentinel gains +10 bonus to movement speed, and it's always under the
      effects of the Disengage action.</p><p>• The Sentinel gains an additional Reaction per round, which it can only
      use to make attacks of opportunity.</p><p>Creatures provoke attacks of opportunity from the Sentinel when they
      enter within 5ft.</p><p>of it or an ally within 10ft. of it.</p><p>• The Sentinel can use Dexterity in place of
      Strength for weapons and Bukijutsu.</p><p>During a long rest, you can choose to add the Okizeme property to the
      Sentinel's Weapon Mode.</p><p>This does not count against your maximum properties.</p><p>If you do, you gain the
      following benefits while wielding this weapon;</p><p>• This weapon gains an extra weapon property.</p><p>•
      Bukijutsu and Taijutsu that use this weapon can be cast using Dexterity instead of Strength.</p><p></p>
