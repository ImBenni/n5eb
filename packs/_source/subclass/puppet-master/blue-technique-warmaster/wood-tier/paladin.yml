system:
  description:
    value: >-
      <p>Techniques: Blue, Perfect </p><p></p><p>You invest in extra materials to improve you or your Puppet's
      defense.</p><p>You gain a Warmaster Shield, a simple weapon with the Light, Blocking, Finesse properties, and a
      damage die equal to a 1d6 Bludgeoning.</p><p>Only you or your Puppet can use this shield.</p><p>Wielding this
      shield cannot disqualify you from using a Taijutsu fighting stance that requires you to wield no
      weapons.</p><p>This weapon can be used as a component in Jutsu.</p><p>While equipped, as a Reaction to taking
      damage, you can reduce the damage received by Xd6, where X equals your Proficiency Bonus.</p><p>At Later Levels:
      This upgrade can be taken as a Silver tier Upgrade to grant both you and your Puppet a shield.</p><p></p>
