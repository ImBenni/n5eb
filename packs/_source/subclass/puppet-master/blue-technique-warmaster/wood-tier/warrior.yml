system:
  description:
    value: >-
      <p>Techniques: Blue, Perfect</p><p></p><p>You are skilled at using your weapon in collaborative attacks.
      </p><p>You and your Puppet Tool learn the Dragon Fly Dash Jutsu; this does not count against your Jutsu Known.
      </p><p>For the both of you, this jutsu gains the Taijutsu keyword, and has its range doubled. </p><p>When either
      of you cast Dragon Fly Dash, if the ally hits with at least one attack, they gain the benefits of the Disengage
      action.</p>
