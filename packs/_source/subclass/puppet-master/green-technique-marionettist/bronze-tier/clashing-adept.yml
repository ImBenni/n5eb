system:
  description:
    value: >-
      <p>Techniques: Green </p><p>Prerequisite: Peerless Casting </p><p></p><p>Your Puppets are able to enhance the
      power of chakra to overcome dire odds in a flash.</p><p> Twice per long rest, when your Puppet Tool or an ally
      within 5 feet would be targeted by a Ninjutsu or Genjutsu within 60 feet that would deal damage, your Puppet Tool
      can cast one Ninjutsu or Genjutsu they know or that you know with the casting time of 1 action and immediately
      initiate a clash with the jutsu.</p><p> If the jutsu they cast doesn't have the clash keyword, it gains it.</p><p>
      The triggering creature's jutsu does not need the clash keyword for this to work.</p><p> (Genjutsu clash checks
      use the Illusions skill).</p><p> Also with this upgrade, when an allied creature within 30 feet, other than your
      Puppet, would enter a clash your Puppet may use its Reaction to boost their clash check by +1d6.</p><p></p>
