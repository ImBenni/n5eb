name: Emboldened Elements
type: feat
_id: fdxxnVsfupuFQbSg
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Green </p><p></p><p>Your Puppet Tool is especially capable at molding the chakra of
      elements.</p><p> You can benefit from this upgrade a number of times equal to your Proficiency Bonus per long
      rest.</p><p> When your Puppet casts a Ninjutsu, it can change the damage type of the jutsu to one that corresponds
      to a nature release you or your Puppets possess (Water=Cold).</p><p> This can change up to 1 condition the jutsu
      inflicts, that has ranks, to 1 rank of a condition associated with the chosen element (Earth=Bruised,
      Wind=Bleeding, Fire=Burned, Water=Chilled, Lightning= Shocked).</p><p> Alternatively, if the jutsu already
      possesses the nature release keyword of the element it is changing the damage type to, you can spend a use of this
      upgrade to inflict an additional effect based on the element chosen; These effects apply once per casting.</p><p>
      • Earth Release: The jutsu increases any damage reduction, temporary hit points, or hit points gained by 2 dice,
      once per casting.</p><p> • Wind Release: The jutsu gains the benefits of Swirl if it does not have it.<br /> If it
      does, increase the area of effect of Swirl by 5 feet in all directions.</p><p> • Fire Release: The jutsu deals an
      additional amount of flat damage equal to half the total number of damage die, once per casting.</p><p> • Water
      Release: The jutsu gains the benefits of being near a sufficient source of water.</p><p> • Lightning Release: The
      jutsu gains gains the benefits of being Overcharged.</p><p></p>
