system:
  description:
    value: >-
      <p>Techniques: Green </p><p></p><p>You improve upon the design of your frameworks in various ways.</p><p>The
      Puppet Tool that gains this upgrade, gains a specific benefit depending on their framework; This upgrade can be
      taken multiple times, once for each Puppet you have.</p><p>• Bestial Framework: The Bestial Puppet increases
      another one of its ability scores that it could've increased at 2nd level by +2, and one C-Rank Summon Trait from
      the Sage Beast that it emulates.<br />It cannot take the Pack Tactics trait.</p><p>• Matryoshka Framework: While
      the Matryoshka is attached to a creature, its AC is always equal to the AC of the ally it is on, if the resulting
      AC would be higher than their current AC.<br />Also, these Puppet Tools can continue to act even if the creature
      they are attached to is incapacitated.<br />Lastly, on a failed Strength, Dexterity, or Constitution saving throw,
      the Matryoshka takes only half damage.<br />On a successful saving throw, it takes no damage.</p><p>• Shade
      Framework: When the Shade would cast a Genjutsu with its action, it can make one melee or ranged weapon attack as
      part of the same action (Ranged attacks within 5ft. are not made at disadvantage).<br />Additionally, when the
      Shade casts a Genjutsu, creatures must succeed their DC by 7 or more to critically succeed, and critically fail if
      their result is below their DC by 4 or more.</p><p>• Spellblade Framework: Ninjutsu your Spellblade casts gain a
      +1 bonus to attack rolls and Save DC.<br />Ninjutsu it casts also deal an extra die of damage (once per turn).<br
      />Additionally, when the Spellblade makes its weapon attack as part casting a Ninjutsu, the weapon attack deals an
      extra 2 dice of damage, of a die size and damage type attributed to the Ninjutsu it cast.</p><p></p>
