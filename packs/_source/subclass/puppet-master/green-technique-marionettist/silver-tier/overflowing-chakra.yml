img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Green </p><p>Prerequisite: Chakra Regulators </p><p></p><p>Your Puppet's pseudo-chakra network is
      so full of life that it can barely be contained.</p><p> Your Puppet Tool is immune to effects that would prevent
      it from molding chakra or inhibit it from casting a jutsu in any way.</p><p> Additionally, twice per long rest,
      your Puppet Tool can touch a creature as an action to attempt to remove any of the above-mentioned effects from a
      different creature.</p><p> If the effect is from an ability of B-Rank or lower, it automatically succeeds.</p><p>
      If it is higher, the Puppet Tool makes a Chakra Control check against the DC of the effect causing the inhibiting
      effects, removing it on a success.</p><p></p>
