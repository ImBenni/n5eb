system:
  description:
    value: >-
      <p>Techniques: Green </p><p></p><p>Your Puppet Tool is able to alter how it molds the chakra of Genjutsu it casts
      to result in different effects.</p><p> Your Puppet Tool can change one sensory keyword a Genjutsu it casts or that
      you cast through it to another sensory keyword (Auditory, Inhale, Tactile, Visual) Additionally, when you would
      give Mental or Sensory condition with a Genjutsu, you can change the condition to a different Mental or Sensory
      condition, excluding the following (Berserk, Invisible, Maddened).</p><p> Doing this causes your jutsu to become
      less stable, forcing the swapped condition to last until the end of the creature's next turn instead of the usual
      duration.</p><p></p>
