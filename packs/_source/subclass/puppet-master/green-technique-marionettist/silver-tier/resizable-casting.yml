name: Resizable Casting
type: feat
_id: 7lLBlCijxuudXU25
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Green, Perfect</p><p></p><p>Your Puppets are able to mold chakra in such a precise way that they
      can innovate jutsu techniques that have been perfected over hundreds of years to be even more useful.</p><p>When
      your Puppet Tool casts a Ninjutsu or Genjutsu that creatures an area of effect (Cube, Line, Cone, Cylinder, etc),
      they can modify the shape following the Conversion Rate for the specific Area Shape.</p><p>You cannot lower any
      dimension of the shape (length, height, width, etc) below 5ft.</p><p>Alternatively, they can completely change the
      area of effect to a Basic Area type, listed below.</p><p>When they change to a Basic Area, the jutsu gains an
      additional 30 feet of range.</p><p>You can apply Conversion Rate changes to Basic Areas.</p><p>This upgrade cannot
      be used with jutsu that summon a creature (constructs/structures work fine).</p><img
      src="systems/n5eb/assets/content/cheat-sheets/resizable-casting.webp" /><p></p>
