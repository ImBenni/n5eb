folder: DgOAQdJDfB1HAm6P
name: Big Things Come In Small Packages
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Starting at 17th level, you and your puppets have learned to effectively condense or expand the chakra used for
      techniques, allowing far more versatility.</p><p> When you or your puppets would cast a jutsu, they may increase
      the area by up to 15 feet in each direction.</p><p> Increasing the area of the jutsu this way reduces the amount
      of damage dice rolled by 2.</p><p> Alternatively, when you or your puppets would cast a jutsu they may decrease
      the area by up to 15ft. in each direction (Min. 5ft.).</p><p> Decreasing the area this way increases the amount of
      damage dice rolled by 2.</p><p></p>
