system:
  description:
    value: >-
      <p>Starting at 20th level, your brilliant mind has created puppets that are the models of perfected design for
      Puppet Masters of the Green Technique.</p><p> What you have done will help teach Puppet Masters for
      generations.</p><p> Each long rest, select one Ninjutsu or Genjutsu of B-Rank or lower that you could learn, with
      a casting time of 1 action or Bonus Action, that does not deal damage or affect any other creature.</p><p> Your
      Puppets are now always under the effects of your chosen jutsu as long as you are conscious.</p><p></p>
