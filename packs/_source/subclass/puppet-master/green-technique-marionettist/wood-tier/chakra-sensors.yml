system:
  description:
    value: >-
      <p>Techniques: Green, Perfect </p><p></p><p>You expand upon the light mechanism in your Puppet Tool's eyes to
      allow it to see even more.</p><p> Your Puppet Tool gains 30 feet Chakra Sight.</p><p> While a creature is in your
      Puppet Tool's chakra sight, you, your Puppet Tool, and any allies within 5 feet of your Puppet gain a +1 to AC and
      saving throws to resist this creature.</p><p> You can take this upgrade multiple times, once for each Puppet Tool
      you have (The bonus to AC and saving throws cannot stack with multiple puppets).</p><p> If your Puppet has the Eye
      Lights Upgrade, double the range of the light sources produced, and increase the chakra sight by 15
      feet.</p><p></p>
