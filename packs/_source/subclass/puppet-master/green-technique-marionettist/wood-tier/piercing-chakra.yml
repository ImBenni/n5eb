system:
  description:
    value: >-
      <p>Techniques: Green </p><p></p><p>Jutsu your Puppet Tool casts are able to pierce the defenses of your foes more
      effectively.</p><p> Select one classification of jutsu (Ninjutsu, Genjutsu, Taijutsu, Bukijutsu).</p><p> Jutsu of
      your chosen type your Puppet Tool casts ignore up to -3 DR and deal an extra 3 damage against creatures that have
      temporary hit points.</p><p> You can take this upgrade multiple times.</p><p> A single Puppet can only acquire
      this upgrade twice, selecting different jutsu classifications.</p><p></p><p> At Later Levels: You can take this
      upgrade using a higher tier slot.</p><p> For each tier above Wood, increase the amount of DR ignored and the bonus
      damage by 1.</p><p> If taken using a Bronze or higher tier slot, this upgrade's effects also apply to the Puppet's
      unarmed and weapon attacks, as well as any Armory upgrades.</p><p> If taken using If taken using a Silver or
      higher tier slot, Jutsu of the chosen type the puppet casts ignores resistance.</p><p> If taken using a Gold or
      higher slot, Jutsu of the chosen type also treats immunity as resistance.</p><p></p>
