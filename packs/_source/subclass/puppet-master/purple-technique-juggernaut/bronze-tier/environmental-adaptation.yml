name: Environmental Adaptation
type: feat
_id: ya1sUmgSvfcbTqnF
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Purple, Perfect </p><p></p><p>You install up to two of the following modifications to your armor to
      deal with the cruelty of mother nature.</p><p> Unlike other upgrades, you can change the modifications to your
      armor during a short rest.</p><p> Each of these mods should visually change your armor's appearance.</p><p> •
      All-Season Boots: Your Armor ignores the effects of naturally occurring difficult terrain (Ex. Rugged
      Badlands).</p><p> • Anti-Coating: Your Armor is immune to detrimental effects of naturally occurring poisonous
      environments and protects you from non-jutsu based poisons.</p><p> • Cooling Ooze: Your Armor is immune to any
      detrimental effects from naturally hot environments (Ex. Volcanos, Hot Deserts).</p><p> • Heat Vision: Your Armor
      is fitted with special lenses that allow it in darkness or through smoke.<br /> You gain Darkvision while in any
      form of darkness, and can see through non-jutsu based smoke with no difficulty (Ex. Smoke Bombs, Gas
      Vents).</p><p> • Integrated Heaters: Your Armor is immune to any detrimental effects from naturally cold
      environments (Ex. Snowy Alps) • Oxygen Converters: Your Armor is built to let you swim to great depths.<br /> Your
      swimming speed is equal to your movement speed, and you can breathe underwater for up to X hours before needing a
      rest to clean your armor's filters. (X = Puppet Master level) </p><p></p><p>At Later Levels: You can take this
      Upgrade as a Gold tier upgrade to gain an additional +2 modifications.</p><p></p>
