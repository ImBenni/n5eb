    value: >-
      <p>Techniques: Purple </p><p></p><p>You integrate an ionized layer in your gauntlet, raising the maximum
      destructive capabilities.</p><p> Your Power Fist now deals force damage in addition to its original damage type,
      and has its damage die increased by 1 step. (d4 →d6 →d8 →d10 →d12) </p><p>Also, once per turn, when you score a
      critical hit a powerful shockwave erupts from your Power Fist forcing all creatures within 5 feet other than you
      to make a Strength saving throw against your Ninjutsu or Taijutsu Save DC or be knocked prone.</p><p></p>
