system:
  description:
    value: >-
      <p>Techniques: Purple </p><p></p><p>You install an improved version of the special weapon you made previously into
      your armor.</p><p>Select one of the following options; You can take this upgrade a second time to gain the other
      option.</p><p>Each weapon possesses a special ability to aid you even further, listed below their
      descriptions.</p><p>You can use these abilities a total number of times equal to your Proficiency Bonus, per short
      or long rest.</p><p></p><p>• Arm Blades:</p><p>Twice per round when you hit a creature with your arm blades you
      can pull them out violently.</p><p>A creature must make a Constitution saving throw against your Ninjutsu or
      Taijutsu Save DC or suffer from a rank of bleeding.</p><p>Also, you gain additional uses of your Arm Blades,
      Double Strike special ability equal to half your level.</p><p></p><p>• Axe Tail:</p><p>When you would use
      Deflection you can instead react if an attack hits you, and the AC bonus rerolls 1s and 2s and lasts until the
      start of your next turn.</p><p>Also, you gain additional uses of your Axe Tail, Deflection special ability equal
      to half your level.</p><p></p>
