system:
  description:
    value: >-
      <p>Techniques: Purple</p><p></p><p>You decide that it would be in your best interests to invest in a set of armor
      for one of your comrades as well.</p><p>You craft a another set of Juggernaut Armor for an ally during a full
      rest.</p><p>This armor can be of any armor listed in the Armor Chassis feature. </p><p>This armor draws from your
      total Puppet Upgrade pool, but comes preinstalled with two Wood Tier Upgrades or Bronze tier Upgrades of your
      choice. </p><p>This armor is esoterically designed, preventing any other creature including you from wearing this
      armor.</p>
