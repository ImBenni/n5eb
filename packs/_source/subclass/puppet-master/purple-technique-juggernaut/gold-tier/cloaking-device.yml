system:
  description:
    value: >-
      <p>Techniques: Purple </p><p>Prerequisite: Adaptive Camouflage </p><p></p><p>Your armor is able to hide you from
      even the most trained of eyes.</p><p> While Active Camouflage is active, if you do not move during your turn you
      can use your Reaction to take the Hide action using an Intelligence (Stealth) check.</p><p> You make this check
      with disadvantage if you are within 5 feet of another creature or if you attacked during your turn.</p><p>
      Additionally, if you do not move while hidden, you are counted as invisible to special senses such as chakra
      sight, darkvision, heat vision, tremor sense, and blindsight.</p><p> Finally, once per rest, you are able to cast
      the Invisibility Genjutsu on yourself at no cost nor its concentration cost.</p><p> When you cast Invisibility
      this way, the jutsu's rank is treated as your highest jutsu known rank.</p><p></p>
