system:
  description:
    value: >-
      <p>Techniques: Purple</p><p></p><p>You install a safety mechanism to protect your allies in the event their lives
      are in danger. </p><p>As a Reaction to seeing an allied creature, other than you, fall to 0 hit points within 90
      feet, you quickly eject from your Juggernaut Armor and use your Chakra Threads to throw it towards the creature,
      immediately donning your armor on them.</p><p>When this occurs, the creature is immediately stabilized at 1 hit
      point and is moved a distance equal to twice your movement speed. </p><p>Once you use this upgrade you cannot use
      it again until you finish a long rest.</p>
