name: Mech Pilot
type: feat
_id: zkNLYVNihNE2ySyG
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Purple </p><p>Prerequisite: Your Juggernaut Armor must be a Steel Fortress.</p><p></p><p> You have
      created something truly special.</p><p> As an action, you can activate an enlargement mechanism inside of your
      armor, turning it into a Huge mechanical powerhouse.</p><p> You pilot this mech from the inside.</p><p> You can
      maintain this mech for 1 minute.</p><p> If you go beyond this minute, you can spend 1 Hit and Chakra Die at the
      start of each of your turns to maintain it for an additional round.</p><p> You gain the following benefits while
      this mech is active; Once this upgrade ends, you gain 1 rank of Weakened and Slowed as your armor reverts back to
      normal.</p><p> For every 2 hit die and chakra die you spent to maintain this upgrade, gain an additional rank of
      Weakened and Slowed.</p><p> • You gain a +3 bonus to your AC, and gain damage reduction equal to your Proficiency
      Bonus.</p><p> • Any ammunition spent on upgrades is restored.</p><p> • Your size becomes Huge, and you provide all
      other allied creatures within 10 feet of you gain the benefits of half cover.<br /> You can also house up to two
      allied creatures inside of your armor.<br /> Any effects that target those creatures, must instead target you
      first.</p><p> • You deal an extra die of damage with your Chakra Fist, Power Fist, or Integrated Weapon.<br /> Any
      Armory upgrades you may have, have their damage die increased by 1 step.</p><p> • Your movement speed is doubled,
      and you ignore difficult terrain.</p><p> • You have advantage on saving throws to resist Genjutsu.</p><p> • The
      maximum weight you can lift is multiplied by 100 and you have advantage on checks made to grapple or throw
      creatures that are smaller than you.<br /> You also deal double damage to structures, objects, and
      constructs.</p><p> • You have advantage on Strength and Dexterity skill checks.</p><p> • Against Aberrations,
      Beasts, Constructs, Demons, Monstro sities, Mutants, and Plants, you ignore resistance and treat immunity as
      resistance with damage rolls that include any Armorer Upgrade or upgrade with "Armory" in the name.</p><p></p>
