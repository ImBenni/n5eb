img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Purple </p><p></p><p>You create a fun upgrade to cause a massive amount of disorder amongst your
      foes in the first moments of battle.</p><p> You gain access to the unique natural weapon, Opening Missiles, a
      weapon that fires dozens of small rocket powered bullets from a multitude of compartments in your armor.</p><p>
      This weapon can only be used as an Action, or as a Reaction as part of rolling for initiative.</p><p> If used on
      initiative, this weapon cannot be reacted to.</p><p> This weapon possesses the ammunition property.</p><p> Each
      time you use this weapon, you lower your ammunition die by a step.</p><p> If you run out of ammunition, you cannot
      use this upgrade again until you complete a long rest.</p><p></p><p> Opening Missiles.</p><p> When this weapon is
      used, roll two dice equal in value to your current ammunition die and multiply the result by 5.</p><p> This is the
      total amount of damage the weapon deals.</p><p> For each creature you target, you decide how much of this damage
      you delegate to them, as piercing damage.</p><p> Area Weapon Attack: Dexterity saving throw (vs.</p><p> Ninjutsu
      or Taijutsu Save DC), Reach 120-foot radius, all creatures of your choice.</p><p> Success: Half damage.</p><p>
      Failure: Damage delegated and the creature is knocked prone.</p><p> Critical Failure (Fails DC by -5 or more):
      Same effects as failure + 1 rank of Lacerated.</p><p></p>
