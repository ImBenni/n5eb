name: Armorer's Eye
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, working with your Puppet more closely to craft the perfect set of armor has made you
      more adept at noticing the flaws in the armor of others.</p><p> When facing a hostile creature wearing a set of
      armor either physically or from a jutsu such as Chakra Skin, you can as a Bonus Action make a Perception check
      vs.</p><p> a DC equal to 5 + Twice the armor's bulk (or thrice the jutsu's rank).</p><p> On a success, your next
      attack against the creature ignores their armor or jutsu's bonus to AC, and any damage reduction granted by their
      armor or jutsu .</p><p> If you succeed by 5 or more, increase this attack's critical threat range by +1.</p><p> If
      you succeed by 10 or more, this next attack cannot be reacted to.</p><p> You can do this a number of times equal
      to your Proficiency Bonus per long rest.</p><p></p>
