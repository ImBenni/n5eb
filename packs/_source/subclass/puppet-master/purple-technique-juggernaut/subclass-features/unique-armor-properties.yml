name: Unique Armor Properties
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>ATHLETIC Armor with the Athletic property grants a +1d4 bonus to Acrobatics.</p><p></p><p> MOBILE Armor with
      the Mobile property grants a +5 bonus to movement speed and a +1 bonus to Dexterity skill checks and saving
      throws.</p><p></p><p> POWERFUL BUILD Armor with the Powerful Build property causes the wearer to count as one size
      larger when determining their carrying capacity and weight they can push, drag, or lift.<br /> Additionally, the
      wearer gains a +10 bonus to Bilk, and increases their Strength score by +2, up to a maximum of 22.</p><p></p><p>
      SMART </p><p>Armor with the Smart property enables the wearer to calculate their AC using the Smart AC
      calculation: Smart AC: 10 + your Dexterity Modifier (Min. 1) + your Intelligence Modifier (Min. 1) + half your
      Proficiency Bonus (rounded down).</p><p></p><p> STURDY</p><p> Armor with the Sturdy property enhances Reactions
      that would provide its wearer with damage reduction or temporary hit points.<br /> With such Reactions, add twice
      this armor's Reinforced DR value to the damage reduced or temporary hit points gained.<br /> This property does
      not take effect if the armor's Reinforced DR value would already reduce the damage being received.</p><p></p>
