system:
  description:
    value: >-
      <p>Techniques: Purple, Perfect </p><p></p><p>You lighten your armor allowing for more mobility.</p><p> Increase
      all movement speeds you possess by +10 feet.</p><p> You can take this upgrade twice.</p><p> At Later Levels: You
      can take this Upgrade using a higher tier Upgrade slot.</p><p> If taken at Bronze tier or higher you may Dash as a
      Bonus Action.</p><p> If taken at Gold tier or higher, you gain a +2 bonus to saving throws to resist having your
      movement speed lowered in any way.</p><p></p>
