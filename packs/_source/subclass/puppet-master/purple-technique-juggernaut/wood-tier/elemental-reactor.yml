img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Purple</p><p></p><p>You fit your Puppet Tool with a special elemental reactor which enables you to
      cast jutsu of a specific element.</p><p>Select between Earth, Wind, Fire, Water, or Lightning.</p><p>You gain this
      element's reactor, gaining the jutsu associated with it as long as you meet the level requirement.</p><p>You can
      take this upgrade multiple times, each time selecting a different element.</p><p></p><p>Techniques:
      Purple</p><p>After casting a Jutsu of D-Rank or higher, until the start of your next turn, you have advantage on
      saving throws against being charmed, mind controlled, stunned, or dazed from Genjutsu.</p><p></p><p>At Higher
      Levels: You can take this Upgrade as a Silver tier Upgrade.</p><p>If you do, you can activate the Upgrade by
      spending 3 chakra at the start of your turn, forgoing the need to cast a jutsu.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/elemental-reactor.webp" /><p></p>
