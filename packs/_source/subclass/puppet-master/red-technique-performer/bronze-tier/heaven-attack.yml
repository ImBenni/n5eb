name: Heaven Attack
type: feat
_id: d3pyUtmiouiv01g5
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Red, Perfect </p><p></p><p>On the head of one of your Puppets, you install a series of metallic
      tendrils along its scalp which grant your Puppet the ability to attack numerous opponents with one strike.</p><p>
      When you would command your Puppet Tools using your action, you can, using the Puppet's Reaction when the Puppet
      Tool with this upgrade scores a hit with an unarmed or weapon attack, activate this upgrade.</p><p> When you do,
      the target must succeed a Dexterity saving throw, or gain 2 ranks of Bleeding as the tendrils pierce through
      them.</p><p> Regardless, take the attack roll result and compare it to the AC of all creatures within a set of
      five 10-foot long lines starting from the creature's space (but not including the creature).</p><p> If the attack
      roll matches or exceeds their AC, they take the damage of your Puppet's attack.</p><p> These lines cannot overlap
      except at the origin point and must have 5 feet of space between each other.</p><p> Once you use this upgrade you
      must wait until the end of your next turn to use it again.</p><p></p><p> At Later Levels: For each tier you take
      this upgrade above Bronze, increase the length of the lines by 5 feet and impose a -1 penalty to the triggering
      creature's Dexterity saving throw.</p><p> If taken as a Platinum tUpgrade, you can spend 5 chakra to make the
      attack roll as if you had advantage before you create the five lines.</p><p></p>
