name: Symphony Of Destruction
type: feat
_id: DBJYLTefGJp8nd6f
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Red</p><p></p><p>As an action, you command your Puppets to perform a Bukijutsu you or an allied
      creature knows to execute a perfect symphony of destruction and ruin.</p><p>The Bukijutsu cast cannot have a range
      of self.</p><p>The Bukijutsu gains the Combination keyword and has its chakra cost tripled (its cost also becomes
      Special).</p><p>All of your Puppet Tool's perform this jutsu simultaneously (The jutsu is treated as being cast
      once), and count as individual casters.</p><p>The jutsu cast gains the following text; You cannot participate in
      the combination yourself, though your allies can and your Puppets treat your Charisma Modifier as their
      own.</p><p></p><p>Combination: For every caster that participates in the casting of this jutsu, increase the
      damage die by +1.</p><p> This jutsu gains additional benefits, based on the highest Charisma Modifier among the
      casters.</p><p> • +0-1: No Change.</p><p> • +2-3: The jutsu gains a +2 bonus to attack rolls or Save DC (pick one)
      • +4-5: The jutsu gains a +3 bonus to attack rolls or Save DC (Pick one), and deals an extra 2 die of
      damage.</p><p></p>
