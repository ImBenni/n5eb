name: Three Jewels Suction Crushing
type: feat
_id: 7VPTPDP8XC4gl9ix
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Red </p><p></p><p>As an action, you can spend 15 chakra to command 3 Puppets, or to use 3 Commands
      with the Puppet Swarm, you are able to form your Puppets into a triangle formation, with each vertex representing
      the 三宝 Sanbō (Literally Meaning: Three Sacred Treatures).</p><p> At each vertex of the formation, your Puppets
      open a compartment revealing the symbols for Buddha (仏), Dharma (法), and Sangha (僧).</p><p> In the middle of your
      Puppets, a 60-foot cone tornado forms.</p><p> You cannot use this upgrade while your Puppets are within 15 feet of
      any creature.</p><p> All creatures within range of the tornado must make a Dexterity saving throw against your
      highest Save DC.</p><p> On a failed save, creatures take 14d4 wind damage, gain 1 rank of bleeding and weakened,
      and are pulled 30 feet inside the tornado, stopping at the center of the formation if they reach it.</p><p>
      Constructs, structures, and objects have disadvantage on the saving throw and take double damage.</p><p> On a
      success, creatures take half damage and are only moved 5 feet.</p><p> Creatures who start their turn within the
      center must succeed a Dexterity (Acrobatics) check against your highest Save DC to regain half their movement
      speed, otherwise, it is set to 0 until the start of their next turn.</p><p> This upgrade counts as concentrating
      on an A-Rank jutsu.</p><p> At the start of each of your turns, you can immediately spend 8 chakra to maintain the
      tornado and repeat the saving throw.</p><p> Creatures who make their saving throw in the center do so at
      disadvantage and increase the damage taken by a step.</p><p></p>
