system:
  description:
    value: >-
      <p>Also at 6th level, your control over your puppets is so precise that even enemies get lost in the beauty of
      it.</p><p>Once per turn, when both of your puppets damage to the same creature, you add half your Puppet Master
      level to the damage.</p><p>Also at 6th level, you learn the E-Rank Ninjutsu Sealing Art: String Light Formation.
      </p><p>When you take the attack action, you can cast Sealing Art: String Light Formation as part of the same
      action.</p>
