system:
  description:
    value: >-
      <p>Techniques: Red, Perfect </p><p></p><p>You always keep your instruments of war in good shape, and your puppets
      are included in this care routine.</p><p> On the first turn of combat your puppets have advantage on the first
      attack roll or skill check they make, and the first instance of damage your puppet takes after a long or full rest
      is reduced by your 5 + puppet master level.</p><p> At Later Levels: You can take this upgrade using a higher tier
      upgrade slot.</p><p> For each tier you take this upgrade beyond wood, this upgrade's effects last for one
      additional attack roll/skill check and damage instance.</p><p></p>
