system:
  description:
    value: >-
      <p>Techniques: White </p><p></p><p>When you use your chakra threads to connect to a creature, you can attempt to
      connect to unwilling or hostile creatures as well as willing allied creatures.</p><p> When you attempt to connect
      to an unwilling or hostile creature, the creature must make a Dexterity saving throw against your Ninjutsu or
      Genjutsu Save DC, avoiding the threads on a success.</p><p> A creature can make a Strength saving throw as an
      action against your Ninjutsu or Genjutsu Save DC, breaking out on a success.</p><p> While using this upgrade, you
      are considered to be concentrating on a B-Rank jutsu</p>
