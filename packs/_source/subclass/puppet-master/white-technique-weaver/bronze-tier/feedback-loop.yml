system:
  description:
    value: >-
      <p>Techniques: White</p><p></p><p> Your chakra threads can better connect to a creature's chakra network.</p><p>
      While you are connected to a creature via chakra thread, you can cast one jutsu they know, even if you don't have
      the required keyword prerequisites (such as Medical or any Nature Release).</p><p> You cannot cast a jutsu with
      the Hijutsu keyword in this way.</p><p> You still expend the normal amount of chakra for the jutsu.</p><p> Once
      you cast a jutsu in this way, your connection to that creature ends, as the threads took on too much chakra to
      maintain their structure.</p><p> You can only use this upgrade a number of times equal to your Constitution
      Modifier, and you regain any expended uses when you complete a short or long rest.</p><p></p>
