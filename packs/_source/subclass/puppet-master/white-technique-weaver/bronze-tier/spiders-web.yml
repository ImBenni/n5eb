name: Spider's Web
type: feat
_id: uoLtw6T4sbznAqdj
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: White </p><p></p><p>You can lay your strings out within a 90-foot radius to restrain other
      creatures.</p><p> This action takes 1 minute to complete, and whenever a hostile creature steps on a space that
      you are affecting, they are treated as surprised and must make a Dexterity saving throw against your Ninjutsu Save
      DC at disadvantage, becoming restrained and grappled on a failed save, or jumping back 20 feet on success as they
      avoid becoming grappled by your strings.</p><p> Creatures who possess Chakra Sight or truesight cannot be
      surprised by this upgrade and they do not roll at disadvantage.</p><p> Target creatures can make a Strength
      (Athletics) as an action against your Ninjutsu Save DC to end this effect.</p><p> Regardless of whether the
      creature passes or fails they cannot be affected by this upgrade again.</p><p> This upgrade dissipates after 1
      hour and can be used a number of times equal to your Proficiency Bonus per long rest.</p><p></p>
