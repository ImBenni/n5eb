system:
  description:
    value: >-
      <p>Techniques: White </p><p>Prerequisite: Assisted Power </p><p></p><p>You deepen your focus and bring your
      puppeteering to a new level.</p><p> As an action you infuse even more chakra into your strings, almost overloading
      them with power.</p><p> Until the end of their next turn, creatures of your choice attached to your strings make
      any attack roll, skill check, or saving throw they make at advantage.</p><p> On subsequent turns you may maintain
      this feature as a Bonus Action.</p><p> They lose this boost if you move your threads to another creature, you
      become incapacitated, you die, or you lose concentration, as if concentrating on an S-Rank jutsu.</p><p></p>
