system:
  description:
    value: >-
      <p>Techniques: White </p><p>Prerequisite: Inevitable Feast </p><p></p><p>When a creature has 1 or more ranks of
      fear as a result of Inevitable Feast you can begin to devour them.</p><p> As an action you can make a melee
      ninjutsu attack roll while you are in the area created by Spider's Web dealing 6d12 force damage and reducing the
      opponent's chakra by half the damage dealt.</p><p> For each rank of fear a creature has as a result of Inevitable
      Feast increases the damage by 1d12.</p><p> Creatures with 2 or more ranks of fear as a result of Inevitable Feast
      count as surprised when targeted by this attack.</p><p></p>
