img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: White </p><p></p><p>You have learned to control your body with your own strings, allowing you to
      perform flawless movements free of error.</p><p> As an action you can begin to puppeteer your own body.</p><p> For
      the next minute, your speed is doubled, you gain a +2 bonus to AC, you have advantage on Dexterity saving throws
      and on a successful save you take no damage and suffer no effect.</p><p> You gain the benefits of being connected
      to your own threads.</p><p> You also gain one additional Reaction and Bonus Action.</p><p> While you are
      puppeteering yourself, you may not connect your strings to an allied creature.</p><p> After 1 minute you become
      stunned until the end of your next turn and suffer 1 rank of exhaustion.</p><p></p>
