system:
  description:
    value: >-
      <p>Techniques: White </p><p></p><p>As an action while a creature is connected to your strings, you can boost their
      power with your own manipulation.</p><p> For the next minute, the creature can add 1/3rd your Proficiency Bonus
      (rounded up) to any attack roll, skill check, or saving throw they make.</p><p> They lose this boost if you move
      your threads to another creature, you become incapacitated, you die, or you lose concentration, as if
      concentrating on a B-Rank jutsu.</p><p> This upgrade can't benefit from your Grandmaster Manipulation
      feature.</p><p></p>
