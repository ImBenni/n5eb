name: Dead Mans Atonement
type: feat
_id: cME15Gg3y0Uf7fNO
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: White </p><p>Prerequisites: Antagonistic Connection and one of the following: Forceful Suppression,
      Spider's Web, Judgement Chains </p><p></p><p>While you have a creature restrained by your threads you can force
      them to atone, as an action, by hoisting them in the air by the neck, creating a painful noose out of
      chakra.</p><p> A creature restrained in this way must make a Constitution saving throw at the start of each of
      their turns gaining one rank of exhaustion on a failed save.</p><p> You can maintain this effect on each of your
      turns by spending your Bonus Action.</p><p> Once a creature passes this saving throw they remove one rank of
      exhaustion gained from this upgrade, and if they make this saving throw while they have 0 ranks of exhaustion they
      desperately escape your threads, ending the effect.</p><p> If a creature fails this saving throw 3 times in a row
      they become unconscious until they take damage or a full turn action is used to wake them.</p><p> You may do this
      twice per long rest.</p><p></p>
