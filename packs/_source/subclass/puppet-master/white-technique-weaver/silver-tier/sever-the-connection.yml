system:
  description:
    value: >-
      <p>Techniques: White</p><p> Prerequisite: Antagonistic Connection </p><p></p><p>While connected to a hostile
      creature via chakra thread, you can violently sever the connection.</p><p> As a Bonus Action, you can spend 10
      chakra to force a creature to make a Constitution Saving Throw dealing 6d8 force damage and inflicting a rank of
      lacerated on a failed save, or half as much on a successful one.</p><p> A creature who is forced to make a
      Concentration check as a result of this upgrade, makes it at disadvantage.</p><p></p>
