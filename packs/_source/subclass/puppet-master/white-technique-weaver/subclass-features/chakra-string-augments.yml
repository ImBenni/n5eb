folder: yxgzkRv8FyTzAUDk
name: Chakra String Augments
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Also at 2nd level, you have decided that you have little use for your Puppet Tool, so you decide to shave off
      what you don't need.</p><p> You lose the Puppet Tool class feature and instead gain a set of Weaver Gloves.</p><p>
      You are always adorned with these gloves as they enhance the potency of your Chakra Threads.</p><p> Through these
      gloves, you are able to access the various upgrades of this class.</p><p> Select one the following upgrades
      between Better Bonds, Chakra Pathway, Defensive Manipulation, or Thread Weapon.</p><p> You gain this upgrade for
      free.</p><p> You also gain access to Interwoven Upgrades, which are Upgrades exclusive to the White
      Technique.</p><p> Also, you gain two additional Jutsu of a rank you qualify for, not counting against your
      known.</p><p> You gain 1 more jutsu this way at 6th, 10th, and 14th levels.</p><p></p>
