name: Thread Savant
type: feat
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Starting at 14th level, your ability to manipulate others with your chakra threads is practically
      unmatched.</p><p> Select one jutsu that you know (including jutsu gained through an upgrade) that does not deal
      damage, does not inflict a condition, and has a casting time of 1 action or Bonus Action.</p><p> When you connect
      your Chakra Threads to a creature, you can simultaneously cast your chosen jutsu on the creature.</p><p> This
      feature cannot benefit from your Grandmaster Manipulation feature and you may switch your chosen jutsu at the
      conclusion of a full rest.</p><p></p>
