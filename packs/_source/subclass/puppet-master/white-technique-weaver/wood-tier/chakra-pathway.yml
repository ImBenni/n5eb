system:
  description:
    value: >-
      <p>Techniques: White </p><p></p><p>You can use your chakra threads to move your chakra to another space.</p><p>
      While you are connected to another creature via chakra threads, when you cast a Ninjutsu or Genjutsu, you can do
      so as though you were in that creature's space, but you must use your own senses.</p><p> This upgrade cannot be
      used with jutsu that have a range of Self.</p><p> Also, while connected to a creature you are aware of any jutsu
      based effects or conditions affecting them, if the creature acquires them while you are connected</p>
