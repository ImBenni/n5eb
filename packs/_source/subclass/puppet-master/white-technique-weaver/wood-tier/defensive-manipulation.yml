img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: White </p><p></p><p>As a Bonus Action, you can connect your chakra threads to a willing allied
      creature within 30 feet of you, using the threads to practically ward the creature against attack.</p><p> You can
      maintain this connection for up to 1 minute.</p><p> While connected, any creature who targets the connected
      creature with an attack or harmful jutsu must first make a Wisdom saving throw against you Ninjutsu or Genjutsu
      Save DC.</p><p> On a failed save, the creature must choose a new target or lose the attack or jutsu.</p><p> This
      upgrade doesn't protect the creature from area effects, such as the lightning from Lightning Release: Thunder
      Tempest.</p><p> If the connected creature makes an attack, casts a jutsu that affects an enemy, or deals damage to
      another creature, the threads break and the connection ends.</p><p></p>
