system:
  description:
    value: >-
      <p>Techniques: White, Perfect</p><p></p><p>To better assist your allies in battle, you begin to specialize in
      Medical Release.</p><p>You gain access to jutsu with the Medical keyword, that restore hit points, grant temporary
      hit points, reduce damage, or provide a boost or boon to an allied creature in any way, of D-Rank or
      lower.</p><p>While you have this upgrade, any medical jutsu you cast can be made to target 1 or more specific
      creatures that you are connected to, as long as the jutsu does not have a range of Self.</p><p>If you ever remove
      this upgrade, you do not lose any jutsu you learned but become unable to cast them unless you have access to the
      Medical keyword from another source.</p><p></p><p>At Later Levels: You can take this upgrade as a Bronze, Silver,
      or Gold tier upgrade to gain access to Medical jutsu of up to C-Rank, B-Rank, or A-Rank respectively.</p><p></p>
