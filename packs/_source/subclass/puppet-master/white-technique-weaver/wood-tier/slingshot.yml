system:
  description:
    value: >-
      <p>Techniques: White, Perfect </p><p></p><p>Your proficiency with your chakra threads allows you to catch
      projectiles midair.</p><p> As a Reaction when you would be hit with a ranged weapon attack you can attempt to grab
      the projectile out of the air and fling it back.</p><p> Make a melee weapon attack vs your opponent's attack
      roll.</p><p> If your roll is higher than your opponent's you catch the projectile out of the air.</p><p> If you
      beat your opponent's attack roll you can use that attack roll to attempt the creature who attempted to hit
      you.</p><p></p>
