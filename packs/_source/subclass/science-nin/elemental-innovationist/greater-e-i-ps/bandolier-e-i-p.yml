system:
  description:
    value: >-
      <p>Cost: 8 Creation Points </p><p>CCD Drain: 15 Chakra || Bulk: 5 </p><p></p><p>Effect: When you select this perk,
      you fit your medallion with an amber fluid which reeks of metal and smoke.</p><p> While you have this Perk,
      increase the Clip Size and Reserve of any Weapons of Wonder you possess by half.</p><p> You always gain this
      benefit while you have this Perk, regardless of whether you have spent chakra to activate it.</p><p> While this
      Perk is activated, reduce the chakra cost of all Scientific Ninja Tools you possess by an amount equal to their
      rank (Minor: -2, Refined: -3, Greater: -4, Superior: -5, Supreme: -6).</p><p> Perks, other than this one, reduce
      their chakra cost by half as much.</p><p> Weapons of Wonder, that do not use Ammo, reduce their chakra costs by -4
      (Min. 2).</p><p> Additionally, as a Full Turn Action you may spend increments of 5 chakra from your CCD to gain 1
      Ammo of for Weapon of Wonder you possess, up to an amount equal to half its Clip Size.</p><p> Ammo created this
      way lasts for 1 hour or until the end of combat, and may be used to create Ammo for a particular W.o.W twice per
      rest.</p><p></p>
