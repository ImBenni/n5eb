system:
  description:
    value: >-
      <p>Cost: 8 Creation Points </p><p>CCD Drain: 15 Chakra || Bulk: 4 </p><p></p><p>Effect: When you select this perk,
      you fit your medallion with a strange green fluid that smells completely foreign.</p><p> You may wield two weapons
      as if they had the Light property, so long as neither weapon has the Two- Handed or Heavy properties.</p><p> You
      do not need to wield a weapon with the Versatile property with two hands to gain the benefits of the property, and
      wielding a weapon in two hands does not prevent you from using Hand Signs.</p><p> Lastly, you may gain the
      benefits of two Bukijutsu or Taijutsu stances at the same time (Both stances must be the same type of
      stance).</p><p> You do not increase your Unarmed Damage die multiple times when using stances this way.</p><p>
      Once per round, you may use a Ninja Tool as a Use an Object action.</p><p> You cannot use Explosive Tools or Traps
      this way.</p><p></p>
