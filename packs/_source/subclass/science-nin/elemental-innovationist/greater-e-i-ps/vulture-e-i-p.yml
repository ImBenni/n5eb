system:
  description:
    value: >-
      <p>Cost: 8 Creation Points</p><p> CCD Drain: 15 Chakra || Bulk: 3 </p><p></p><p>Effect: When you select this perk,
      you fit your medallion with a dark orange liquid that smells of orange soda.</p><p> Increase your Passive
      Perception by your Intelligence modifier, and you may take the Hide action as a bonus action.</p><p> You also have
      advantage on checks made to find food or ammunition from the environment or when looting unconscious/dead
      creatures, and gain twice as much ammunition and food as you normally would.</p><p> Lastly, once per round, up to
      3 times per long rest you may do one of the following: • On your turn (no action required), you may gain the
      benefits of the Sensing Technique until the end of your next turn, spending 10 chakra from your CCD.</p><p> • When
      you kill a creature while within 5 feet, you may as a reaction splay their blood in a cloaking mist around
      yourself, spending 10 chakra from your CCD.</p><p> Until the start of your next turn, or when you would affect
      another creature, you gain the benefits of the Invisibility Ninjutsu at B-Rank.</p><p></p>
