system:
  description:
    value: >-
      <p>Cost: 2 Creation Points </p><p>CCD Drain: 5 Chakra || Bulk: 1 </p><p></p><p>Effect: When you select this perk,
      you fit your medallion with a green fluid smelling of lime.</p><p> You may use Intelligence in place of Dexterity
      to calculate your initiative checks, and gain advantage on your initiative check.</p><p> You also may now apply
      the saving throw bonus provided by your Exoskeleton to Dexterity saving throws.</p><p> Once per round, when
      wielding a weapon with the Loading or Returning properties, you may spend 5 chakra from your CCD to reload/return
      the weapon without expending a Use an Object action (If you have a Weapon of Wonder, you may instead replenish its
      Ammo with this effect, without a bonus action).</p><p></p>
