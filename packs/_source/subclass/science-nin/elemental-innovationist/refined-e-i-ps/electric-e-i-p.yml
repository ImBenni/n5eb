system:
  description:
    value: >-
      <p>Cost: 4 Creation Points </p><p>CCD Drain: 10 Chakra || Bulk: 2 </p><p></p><p>When you select this perk, you fit
      your medallion with a light red substance that smells of sweet cherries.</p><p> Twice per round, when a creature
      would take an attack of opportunity against you or you would reload/return a weapon to yourself (or replenish the
      Ammo of your Weapon of Wonder), you may spend 5 chakra from your CCD to send a pulse of electricity to protect you
      in a 5-foot radius.</p><p> Hostile creatures in range must make a Strength saving throw, being Shocked and Slowed
      until the end of their next turn on a failed save.</p><p> If this pulse is used on an attack of opportunity
      against you, you may spend an additional 10 Chakra from your CCD and if you do the triggering creature, on a
      failure, is Stunned until the end of the current turn.</p><p></p>
