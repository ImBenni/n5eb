name: Exoskeleton
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, you spend countless nights developing a new suit of armor known as an
      Exoskeleton.</p><p> You wear this Exoskeleton discreetly beneath your armor and clothing, augmenting your physical
      abilities.</p><p> Your Exoskeleton can only be worn alongside light and medium armor, and weighs 3 bulk.</p><p>
      You may don/doff your Exoskeleton over the course of 1 minute.</p><p> While donned, you may use Intelligence to
      calculate your armor class, increase your maximum jump height by your Intelligence ability score, and count as +1
      size categories larger when determining how much you can push, drag, or lift.</p><p> Lastly, once per round, you
      may spend 10 chakra from your CCD to gain a +1d4 bonus to any Strength or Constitution saving throw you
      make.</p><p></p>
