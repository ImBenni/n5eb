folder: Bvei3CksUplpBC77
name: Perma Perk
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Starting at 14th level, you've made several advancements in your research of your element, allowing you to
      create a special version of E.I.P fluid that is safe for human consumption.</p><p> Select one Perk.</p><p> You or
      an ally you choose may drink this Perk, allowing gaining its benefits without Exoskeleton armor and without
      needing to spend CCD chakra to activate.</p><p> This E.I.P is known as a Permaperk.</p><p> The same E.I.P cannot
      stack with itself.</p><p> However, If the creature gaining this feature's benefits would enter the Dying
      condition, they cease benefiting from the Permaperk until the end of your next rest.</p><p> You may change your
      chosen Permaperk on a full rest, as you also thought to make a concoction capable of reversing its effects.</p><p>
      You cannot choose Wonder E.I.P as your Permaperk.</p><p></p>
