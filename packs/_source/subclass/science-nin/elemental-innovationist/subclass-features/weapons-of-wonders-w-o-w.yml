name: Weapons Of Wonders (W.o.W)
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Starting at 9th level, your genius exceeds your expectations.</p><p> You craft a powerful weapon using your
      element known as a Weapon of Wonder, or W.o.W for short.</p><p> W.o.W's are listed at the end of this
      subclass.</p><p> You begin with one W.o.W, and may gain a 2nd W.o.W at 17th level.</p><p> You may exchange your
      W.o.Ws on a long rest.</p><p> Also at 9th level, while donned with your Exoskeleton, increase your Strength
      ability score by +2 (Max. 22).</p><p></p>
