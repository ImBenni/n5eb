name: Triple-Tap E.I.P
type: feat
_id: vzRfAWPliSnMHA9B
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Cost: 16 Creation Points </p><p>CCD Drain: 20 Chakra || Bulk: 4 </p><p></p><p>Effect: When you select this
      perk, you fit your medallion with a brown fluid, smelling of orange soda.</p><p> A number of times equal to your
      Intelligence modifier per round, when you make a damage roll, you may reroll any damage die used in the
      roll.</p><p> If you roll the highest possible value on a die, increase the total damage dealt by +2.</p><p> If you
      have the Double-Tap E.I.P, increase the value added to the damage dealt if you roll the highest possible value on
      a die to +3 instead of +2, and anytime you would reroll a group of damage die with the Double-Tap E.I.P, you may
      increase the damage die by 1 step.</p><p> Once per round, when you would add a +6 to your damage roll with this
      E.I.P, you may spend 5 chakra from your CCD to apply one of the following effects: </p><p></p><p>• Corruption:
      Select one target your damage roll effects.</p><p> The target must pass a Constitution saving throw or become
      Envenomed by ethereal poison.</p><p> A target envenomed this way must make a Wisdom saving throw the next time
      they make an attack roll before the end of their next turn, having their senses highjacked and forcing them to
      target a creature allied to them or else lose the attack on a failure.</p><p> Alternatively, if the target is
      classified as a Minion or Standard, and is reduced to 0 hit points from your damage roll, you impose this
      Constitution saving throw at disadvantage.</p><p> On a failure, the target becomes Turned until the end of your
      next turn, becoming an Undead creature at 1 hit point under your control.</p><p> On the creatures turn, you take
      control of its actions and movement.</p><p> On your turn, you may expend your bonus action to command it to move
      and take one action.</p><p> At the end of your next turn, a Turned creature dies.</p><p></p><p> • Furnace: Select
      one space affected by your damage roll.</p><p> All creatures within a 15-foot wide, 30-foot cylinder must make a
      Dexterity saving throw as the space erupts into ethereal flames and cinders.</p><p> On a failure, creatures gain 2
      ranks of Burned and take 4d4+4 fire damage.</p><p> Creatures within 5 feet of a target who fails, must also make
      the Dexterity saving throw even if they are outside the area of effect as the fire spreads.</p><p></p><p> •
      Shockwire: Select one target affected by your damage roll.</p><p> That target must succeed a Constitution saving
      throw as a jolt of ethereal lightning sparks from their body.</p><p> On a failure, the target takes 2d10 lightning
      damage, ignoring DR and THP, and becomes shocked.</p><p> Also on a failure, all creatures within a 15-foot cone
      originating from the target's space must make the same Constitution saving throw, suffering the same effects
      (allowing the lightning to continue to spread).</p><p></p><p> • Thunderclap: From a space your damage roll
      affects, a clap of thunder erupts in a 10-foot radius.</p><p> All creatures within 10 feet of the chosen space
      must succeed a Strength saving throw or be Dazed, Concussed, and knocked back 15 feet.</p><p></p><p> • Fireworks:
      If your damage roll used a ranged weapon and reduced at least one target to 0 hit points, then you may cause an
      ethereal duplicate of your weapon to appear above the creature reduced to 0 hit points and target up to 4
      different creatures within the weapon's range +30ft with a ranged weapon attack.</p><p> On a hit, a target takes
      half the damage dealt and no further effects.</p><p></p>
