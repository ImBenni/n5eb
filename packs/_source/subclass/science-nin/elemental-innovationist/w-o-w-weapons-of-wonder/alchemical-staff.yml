folder: v3v78cXJW4XcNpEi
name: Alchemical Staff
type: feat
_id: 0x8nfuD6T29ONexq
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Clip Size: 6 [12]</p><p>You forge an intricate staff fitted with a crystal made of your element which is able
      to miraculously conduct nature release chakra even if you cannot.</p><p>Select one of the following Alchemical
      Staffs below.</p><p>Each staff is a ranged weapon with the Two-Handed, Range (60/120), and Ammo
      properties.</p><p>Alchemical Staffs can be used to make ranged weapon attacks dealing 4d8 [Elemental Damage] on
      hit and spending 1 Ammo each time.</p><p>All Alchemical Staffs can also make a Charged Shot.</p><p></p><p>Charged
      Shot (3 Ammo):</p><p>As an Action, you may fire a Charged Shot from your Alchemical Staff, inflicting its Charged
      Shot effects.</p><p>When you fire a Charged Shot, you may spend your bonus action and/or reaction, and 10 chakra
      from your CCD for each action type taken aside from your Action, to increase the damage dealt by +1 damage die and
      increase any area of effects from your Charged Shot by 5 feet in all directions.</p><p></p><p>ASCENSION:
      ALCHEMICAL STAFF</p><p>If the Alchemical Staff is Ascended, increase the damage of the Alchemical Staff's ranged
      attacks to 5d12.</p><p>You may now use the Alchemical Staffs to make melee weapon attacks with the attack action,
      dealing 3d8 slashing damage on hit.</p><p>Also, reduce the Ammo cost of the Charged Shot by 1 (2
      Ammo).</p><p>Lastly, you gain access to the Alchemical Vigor ability; Alchemical Vigor: Twice per long rest, as an
      action, you may make a ranged attack at a creature in the Dying Condition within 120 feet.</p><p>As opposed to
      harming the creature on a hit, the creature is immediately stabilized and regains 4d10+5 hit
      points.</p><p>Additionally, if this creature was gaining the benefits of a Permaperk, they immediately regain its
      effects.</p><img src="systems/n5eb/assets/content/cheat-sheets/alchemical-staffs.webp" /><p></p>
