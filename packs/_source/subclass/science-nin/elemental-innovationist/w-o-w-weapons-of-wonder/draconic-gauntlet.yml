folder: v3v78cXJW4XcNpEi
name: Draconic Gauntlet
type: feat
_id: G7eLhgPKgYpBV0Dl
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>You forge a mighty gauntlet using your element, granting your fists the strength of dragons.</p><p> This weapon
      has the Deadly, Reach, Trip, and Unarmed properties.</p><p> While equipped, increase your [Unarmed Damage] by +1d6
      force damage, and you may calculate your Unarmed attack and damage rolls with Intelligence instead of
      Strength.</p><p> When you cast a Taijutsu, you may use this Weapon of Wonder as a component, allowing you to cast
      the Taijutsu with chakra with your CCD.</p><p> If you cast a Taijutsu using chakra from your CCD, you may use
      Intelligence as your Taijutsu casting modifier for the duration of the casting.</p><p> Lastly, once per round when
      you make an Unarmed attack with this weapon, you may spend increments of 5 chakra from your CCD to move up to 5
      feet per 5 chakra spent (up to a maximum of 30ft).</p><p> This movement does not provoke attacks of opportunity
      and does not expend your movement speed.</p><p> Each creature of your size or smaller that you would pass through
      with this movement (and that is within 5 feet of you on your sides) must succeed a Dexterity saving throw or be
      knocked away from you 10 feet and take your [Unarmed Damage Die] + X damage die in force damage (X = CCD chakra
      spent divided by 10).</p><p> Creatures who fail by 5 or more are knocked prone and bruised.</p><p></p><p>
      ASCENSION: DRACONIC GAUNTLET</p><p> If the Draconic Gauntlet is Ascended, you use your element to create and give
      life to a small Whelp, a tiny youngling dragon.</p><p> The Whelp rests perched on your Draconic Gauntlet.</p>
