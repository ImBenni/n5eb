folder: v3v78cXJW4XcNpEi
name: Sinister Skull
type: feat
_id: 9AwBvi5DS82l6eOm
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>You take the skull of a deceased creature and spruce it up with your element, imputing it with the
      psychological and psychological properties of your element.</p><p> Select one of the following effects.</p><p> You
      may use the Sinister Skull as an Action, spending 15 chakra from your CCD to trigger these effects.</p><p> Using
      any of these effects takes one concentration slot and requires you to spend 7 chakra as a bonus action at the
      beginning of each of your turns to maintain its effects.</p><p></p><p> • Mesmerizing Skull: </p><p>When you
      activate the Sinister Skull it begins to gently glow while and produce an numbing psychedelic mist.</p><p> All
      creatures of your choice within a 15-foot cone must succeed a Wisdom saving throw or enter a deep trance, dropping
      any items they are wielding and being treated as being Unconscious.</p><p> While "Unconscious" this way, you may
      issue commands any particular affected creatures to follow as if you used the Command Genjutsu on your turn (no
      action require).</p><p> At the end of each of a creature's turns, they may remake this saving throw, ending this
      effect on them.</p><p> If a creature is damaged while Unconscious this way, this effect immediately ends on them
      and they become immune to its effects until their next rest.</p><p></p><p> • Vaporizing Skull: </p><p>When you
      activate the Sinister Skull, it lets out a loud screech and begins emitting a toxic blue smoke in a 15-foot
      radius.</p><p> All creatures of your choice within range must make a Charisma saving throw, becoming Stunned and
      taking Xd4 psychic damage (X = your proficiency bonus) as they begin to levitate in the air writhing in pain at
      the start of each of their turns on a failed save, or taking half damage and no effects on a success.</p><p> At
      the start of each of their turns creatures may remake the saving throw to end this effect on themselves.</p><p>
      Creatures reduced to 0 hit points from this effect are turned into ash.</p><p></p><p> ASCENSION: SINISTER SKULL
      </p><p>If the Sinister Skull is Ascended, you gain access to both variants of the Sinister Skull, however, you may
      only use one effect at a time.</p><p> When you spend chakra and your bonus action to maintain a Skull's effect,
      you may switch its effect.</p><p></p>
