folder: v3v78cXJW4XcNpEi
name: Thunder Cannon
type: feat
_id: 0EtG9hYUjN75iRlt
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Clip Size: 2 [6] </p><p>You create a ginormous weapon capable of generating immense propulsion using your
      element.</p><p> This weapon possesses the Heavy and Two-Handed properties.</p><p> As an Action, you may fire a
      blast from the Thunder Cannon, causing all creatures within a 20-foot cone to make a Strength saving throw at
      disadvantage, being knocked back a certain distance depending on their distance to you (Within 15ft: 30ft of
      knockback, Within 10ft: 60ft of knockback, Within 5ft: 90ft of knockback).</p><p> Also, on a failed save,
      creatures become Dazed.</p><p> Creatures who fail by 5 or more are also knocked prone.</p><p> On a successful
      saving throw, creatures take 3d10 wind damage as they take the full brunt of the blast and are knocked back 10
      feet.</p><p> You may also use this weapon as part of taking the attack action, replacing up to one attack with the
      attack action with a blast from the Thunder Cannon.</p><p> The cone of the Thunder Cannon when used this way is 10
      feet.</p><p> Also, you may fire a blast from the Thunder Cannon as a reaction when you would be targeted by an
      attack roll, affecting a 5-foot cone instead.</p><p> If the triggering creature is within range, they are knocked
      back an additional +30ft on a failure.</p><p> If a ranged attack was made against you, make a ranged Ninjutsu
      attack against it.</p><p> If you match or exceed the triggering attack roll by 1-4, the attack stops in midair and
      fails.</p><p> If you exceed the attack roll by 5 or more, the attack roll is redirected to the closest hostile
      creature within 60 feet of you.</p><p></p><p> ASCENSION: THUNDER CANNON </p><p>If the Thunder Cannon is Ascended,
      the Thunder Cannon now ignores effects that would prevent a creature from being knocked back, and increases the
      length of its cone becomes 30 feet when used as an Action, 20 feet when used as part of the attack action, and 10
      feet when used as a Reaction.</p><p> Additionally, the Thunder Cannon now deals 3d12 wind damage on a success or
      failure, and increases its knockback by +10ft.</p><p> Lastly, when used as a Reaction, you gain advantage on an
      attack rolls made to contest ranged attacks used against you (and may blast the attack back to any hostile
      creature you can see, if you exceed the triggering attack by 5 or more), and may use the Reaction in response to
      you or an allied creature within 15 feet being targeted by an attack roll (sparing any allies from the Thunder
      Cannon's Blast)</p>
    chat: ''
