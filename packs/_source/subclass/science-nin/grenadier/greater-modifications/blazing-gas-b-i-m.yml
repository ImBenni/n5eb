      skin.</p><p> Creatures within a 20-foot-radius sphere of this B.I.M when it explodes must a Constitution saving
      throw dealing 3d12 fire damage and gaining 1 rank of Burned on a failed save or half as much damage and no further
      effects on a success.</p><p> Upgraded: For every 1 Creation Points after the minimum initial cost increase the
      damage die by 1 or increase the ranks of burned by 1.</p><p></p>
