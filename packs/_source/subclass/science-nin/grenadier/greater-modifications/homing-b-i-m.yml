folder: 1RSE5qeaW1PE2pJA
name: Homing B.I.M
type: feat
_id: CgeA8nLq1uHknyUL
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Cost: 8-12 Creation Points </p><p></p><p>You pull out a B.I.M that has a small propeller and a camera attached
      allowing the B.I.M to track creatures around corners.</p><p> You may lock onto a creature as an action or bonus
      action and at the start of the creature's turns it begins moving towards them at 30 feet per turn, exploding if it
      collides with an object.</p><p> If a creature takes the hide action behind full cover before the end of their turn
      they can evade the blast.</p><p> If the B.I.M is not in range of the creature it continues to follow the creature
      until it is explodes.</p><p> When the B.I.M explodes, it dealing 6d6 fire damage in a 5-foot-radius sphere
      explosion.</p><p> Creatures within the radius of the explosion other than the creature that was locked on to must
      make a Dexterity saving throw taking the same damage on a failed save, or half as much on a successful one.</p><p>
      The B.I.M can be destroyed if targeted by an attack, it has 1 hit point and an AC equal to your Ninjutsu save
      DC.</p><p> Upgraded: For every 2 Creation Points after the minimum initial cost increase the damage dice by 1 or
      increase the speed by 15 feet.</p><p></p>
