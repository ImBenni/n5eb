system:
  description:
    value: >-
      <p>Cost: 8-10 Creation Points </p><p></p><p>You throw a B.I.M that explodes into a cloud of razor- sharp
      shrapnel.</p><p> Creatures within a 10-foot-radius sphere must make a Dexterity saving throw.</p><p> On a failed
      save, they take 4d6 slashing damage and gain 1 rank of bleed.</p><p> On a successful save, they take half damage
      and no further effects.</p><p> Upgraded: For every 1 Creation Points after the minimum initial cost increase the
      damage dice by 1 or the ranks of bleed by 1.</p><p></p>
