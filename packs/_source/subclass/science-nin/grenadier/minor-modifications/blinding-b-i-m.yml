system:
  description:
    value: >-
      <p>Cost: 2-6 Creation Points </p><p></p><p>You throw your B.I.M and it emits a blinding white light.</p><p> Each
      creature within 30 feet must make a Wisdom saving throw.</p><p> On a failed save creature becomes blind until the
      end of their turn on a failed save.</p><p> Upgraded: For every 1 Creation Point after the minimum initial cost
      increase the amount of turns a creature is blinded by 1.</p><p> A creature can spend an action to remake the save
      to end the condition early.</p><p></p>
