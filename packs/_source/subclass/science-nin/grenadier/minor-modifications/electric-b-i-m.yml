  description:
    value: >-
      <p>Cost: 2-8 Creation Points </p><p></p><p>You throw a B.I.M and it unleashes a discharge of electricity that
      envelops all around.</p><p> Each creature within 15 feet must make a Constitution saving throw.</p><p> On a failed
      save, a creature takes 3d6 lightning damage and gains 1 rank of shocked or half as much damage and no additional
      effects on a successful one.</p><p> Upgraded: For every 2 Creation Points after the minimum initial cost increase
      the damage dice by 1 or increase the ranks of shocked by 1.</p><p></p>
