system:
  description:
    value: >-
      <p>Cost: 2-8 Creation Points </p><p></p><p>You throw a B.I.M designed to fragment and maim any creatures unlucky
      enough to be standing near it.</p><p> Creatures within a 10-foot-radius sphere must make a Dexterity saving throw,
      taking 2d10 piercing damage and suffering 1 rank of bleed on a failed save, or half as much damage and no
      additional effects on a successful one.</p><p> Upgraded: For every 3 Creation Points after the minimum initial
      cost increase the damage dice by 1 or increase the radius of the explosion by 10 feet.</p><p></p>
