system:
  description:
    value: >-
      <p>Cost: 4-8 Creation Points </p><p></p><p>You pull out your B.I.M and set the timer allowing for timed
      explosion.</p><p> You can start the timer as an action or bonus action and it will explode on the end of the next
      hostile creature's turns.</p><p> Alternatively, you can hold the B.I.M and throw it at the start of your next turn
      where it explodes on contact.</p><p> If you hold onto the B.I.M for 2 turns it explodes in your hand.</p><p>
      Creatures within a 20- foot-radius sphere of this B.I.M when it explodes must a Dexterity saving throw dealing 5d8
      fire damage on a failed save or half as much on a successful one.</p><p> Upgraded For every 1 Creation Point after
      the minimum initial cost increase the maximum turns until it explodes by 1.</p><p></p>
