system:
  description:
    value: >-
      <p>Cost: 4 Creation Points </p><p></p><p>This B.I.M can be set on the floor or a flat wall, allowing for it to be
      placed in a location and triggered remotely.</p><p> This B.I.M takes a bonus action to place and as a part of that
      action you can make an Intelligence (Stealth) check to hide the B.I.M.</p><p> You may active this B.I.M as a bonus
      action or a reaction.</p><p> Alternatively, you can spend an action to rig it to automatically explode when a
      creature enters with 10 feet of the B.I.M.</p><p> When denotated creatures within a 5-foot-radius sphere of the
      B.I.M must make a Dexterity saving throw dealing 10d4 fire damage on a failed save, or half as much on a
      successful one.</p><p></p>
