folder: X1rzZ4YJDdOAjuuu
name: Supercharge
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Beginning at 14th level, your mastery over B.I.Ms has grown to new heights, further refining your creation
      process and throwing technique.</p><p> You can now create B.I.Ms on a short rest and can throw them up to 90
      feet.</p><p> Also at 14th level, you can supercharge your B.I.Ms with chakra from your CCD enhancing their
      effects.</p><p> By spending chakra from your CCD equal to the Creation Point cost you can increase the damage dice
      or save DC by 2.</p><p> When you supercharge a B.I.M if a creature would take no damage when they pass a saving
      throw, or half damage when they would fail a saving throw, they instead take a quarter damage.</p><p></p>
