system:
  description:
    value: >-
      <p>Cost: 12-16 Creation Points </p><p></p><p>The Barrier B.I.M is a B.I.M made for defense, and is typically worn
      as a necklace around a creature's neck, but it can be thrown at half the normal range.</p><p> As a reaction, a
      creature in possession of this B.I.M can emit a barrier of force that intercepts harm that would be inflicted in
      the user.</p><p> Until the start of the user's next turn they are encapsulated in a barrier that has 20 hit
      points, and is resistant to all damage, other than psychic damage.</p><p> While inside the barrier, the user has
      full cover, but creatures on either side can still see inside the barrier.</p><p> When this BIM is thrown, it
      creates a transparent dome around a 15 foot radius sphere.</p><p> Any creature inside this sphere gains the
      effects as if they possessed the B.I.M.</p><p> Upgraded: For every 1 Creation Point after the minimum initial cost
      the barrier gains 5 extra hit points</p>
