name: Gravity Well B.I.M
type: feat
_id: yEhaJ9dFZOntG6gQ
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Cost: 24 Creation Points </p><p></p><p>You throw a B.I.M that detonates and creates a localized gravitational
      anomaly, pulling in matter and creatures.</p><p> The Gravity Well B.I.M opens into a 40-foot-radius sphere and
      last for 1 minute, warping gravity in the area.</p><p> Each creature within that starts their turn within the
      radius must make a Strength saving throw.</p><p> On a failed save, creatures are pulled 20 feet toward the
      epicenter and if they are pulled within 5 feet are restrained for the remaining duration as they struggle against
      the crushing gravity.</p><p> On a successful save, they are only pulled 10 feet and are not restrained, even if
      they are in the epicenter.</p><p> While the well is active, all creatures spend three times as much movement to
      move within the effected area.</p><p> t the start of each of your turns, any restrained creatures take 5d8 force
      damage as the gravitational pressure builds.</p><p> A creature can attempt to break free of the restraint at the
      end of each of their turns by making a Strength saving throw.</p><p></p>
