system:
  description:
    value: >-
      <p>Cost: 24 Creation Points </p><p></p><p>You throw a B.I.M that is designed in a unique X shape that is filled
      with burning acidic gas.</p><p> Your B.I.M expands into 2 lines of acidic flames made in an X formation at a 45
      degree angle.</p><p> This line of flames is 10 feet thick, 90 feet long, and 30 feet tall.</p><p> When the wall
      appears, each creature within its area must make a Dexterity saving throw.</p><p> On a failed save, a creature
      takes 5d6 acid damage and 5d6 fire damage, and gaining 1 rank of burned and corroded on a failed save, or half as
      much damage and no additional effects on a successful one.</p><p> This B.I.M continues to burn losing 1d6 acid and
      fire damage at the end of each of your turns as it cools down.</p><p> Once there are no more damage dice, this
      B.I.M ceases function.</p><p></p>
