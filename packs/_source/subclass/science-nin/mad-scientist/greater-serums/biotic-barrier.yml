  description:
    value: "<p>Cost: 8 Creation Points</p><p>Drain: 10 Maiming CCD Chakra</p><p></p><p>As a reaction to you being an ally within 15 feet being targeted by an attack you drop a canister of Inversion Serum meant to avoid the damage.\_</p><p><br />If Paid with Mending:</p><p>You create a protective barrier that reduces the damage by 2d10.\_</p><p><br />If Paid with Maiming:</p><p>You create a shockwave that forces the triggering creature to make a Strength saving throw.\_<br />Ona failure they take 2d10 Force damage and are knocked back 15 feet.</p>"
