  description:
    value: "<p>Cost: 8 Creation Points</p><p>Drain: 10 CCD Chakra</p><p></p><p>As a Bonus action, You throw a canister of Inversion Serum that can either bolster your allies healing or hamper your enemies.\_</p><p>Select a point within 30 ft</p><p></p><p>\_If Paid with Mending:</p><p>All allies within 15 feet of the selected point gain boosted healing for the next minute.\_<br />Whenever they would regain health they gain 1.5x the amount.\_</p><p><br />If Paid with Maiming:</p><p>All enemies within 20 feet must make a Constitution Saving throw against your highest save DC.\_<br />On a failed save for the next 1d6 rounds all healing they receive is halved.</p>"
