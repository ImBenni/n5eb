name: Biotic Mastery
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>When you choose this Inquiry at 3rd Level you gain Mastery in Poison and Medicine Toolkits.\_</p><p>Each Toolkit gains additional charges equal to your Intelligence Modifier.\_</p><p>Additionally, you split your CCD into two, each leading into an outlet on the palms of your hand.\_</p><p>One hand contains your Mending Device, the other contains your Maiming Device.\_</p><p>your CCD is split into two pools.\_</p><p>You can change the ratio of the two Devices during a long rest in intervals of 5.\_</p><p>For generic Scientific Ninja Tools you can spend the cost from either pool but cannot split the cost between them.\_</p><p>Mending abilities can only spend Mending CCD.\_</p><p>Maiming abilities can only spend Maiming CCD.\_</p><p>You also gain limited access to the Medical Keyword.\_</p><p>You can learn and cast any D-Rank Medical Ninjutsu.</p><p>This increases to any C-Rank Medical Ninjutsu at Level 9 and B-Rank Medical Ninjutsu at Level 14.</p>"
