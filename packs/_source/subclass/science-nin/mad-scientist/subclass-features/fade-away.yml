  description:
    value: "<p>At 6th Level you understand that your life is worth more than others.\_</p><p>As a Bonus action you can spend 15 CCD chakra to move behind an ally within 60 feet of you.\_</p><p>This movement does not trigger attacks of opportunity.\_</p><p>If you or the targeted ally are suffering from any Elemental Conditions, you can spend the cost in Mending CCD to remove up to two ranks of the conditions or the cost in Maiming CCD to give the conditions to an enemy in between you and the targeted ally.</p>"
