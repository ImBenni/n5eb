  description:
    value: >-
      <p>At 17th level, you have gone further than anyone in your field of study.</p><p> Select one Inversion Serum with
      dual effects.</p><p> When you cast a Medical Ninjutsu that restores hit points, also applies to the Mend effects
      of the chosen Inversion Serum.</p><p> If you cast a Medical Ninjutsu that would deal damage, it also applies the
      Maim effects of the chosen Inversion Serum.</p><p> You can change this Serum on a Long Rest.</p>
