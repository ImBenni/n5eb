  description:
    value: "<p>Cost: 24 Creation Points</p><p>Drain: 20 Mending CCD Chakra</p><p></p><p>As an Action, you supercharge an ally's chakra and body.\_</p><p>Choose an ally within 60 feet that you have a clear line of sight towards.\_</p><p>For the next 1d4 Rounds, they become Supercharged.\_</p><p>They heal 2d12 hit points at the start of their turn, They add your Intelligence Modifier to up to two damage rolls they make on their turn and reduce all damage they take by an amount equal to your Intelligence Modifier.\_</p><p>A creature can only benefit from this ability once every minute.</p>"
