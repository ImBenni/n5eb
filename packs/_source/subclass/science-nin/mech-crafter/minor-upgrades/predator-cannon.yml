system:
  description:
    value: >-
      <p>Cost: 2 Creation Points </p><p>Keyword: Weapon </p><p>Drain: 5 CCD Chakra </p><p></p><p>A large rotary cannon
      with multiple barrels that fire piercing rounds to devastate foes.</p><p> It is a Ranged Ammunition Weapon with a
      Range of (90/180), and deals 1d10 + Str in piercing damage.</p><p> Its Ammunition die starts as a d10 and can be
      replenished by spending 5 CCD Chakra.</p><p> As a bonus action, you can spend the CCD Drain and cause the rifle to
      spin rapidly.</p><p> When you do, your speed is halved, and the damage die of the Predator Cannon increases by 1
      step and it doubles its ranges until the end of the turn.</p><p></p>
