system:
  description:
    value: >-
      <p>Cost: 4 Creation Points</p><p> Keyword: Mech </p><p>Drain: 5 CCD Chakra </p><p></p><p>You install handlebars
      along the sides of your Titan to allow up to 2 allies of medium size or smaller to mount it as an action or
      reaction on their turns while they are within 5 feet of it.</p><p> While mounted on you, they move with you and
      gain a bonus to ranged attacks and Strength and Dexterity saving throws equal to half your Intelligence
      modifier.</p><p> When you eject from your Titan, those mounted can also eject with you, landing within the nearest
      space to you that can hold them.</p><p></p>
