  description:
    value: >-
      <p>Cost: 4 Creation Points </p><p>Keyword: Weapon</p><p> Drain: 5 CCD Chakra </p><p></p><p>A large cartridge
      trench gun that has two firing modes and a bayonet attachment.</p><p> It is a both a Melee Blade Weapon with a
      Reach of 10ft and deals: 1d6 + Dex in piercing damage on a hit and a Ranged Ammunition Weapon with a Range of
      (15/30), and deals 2d6 + Dex in bludgeoning damage on a hit.</p><p> Its Ammunition die starts as a d8 and can be
      replenished by spending 10 CCD Chakra.</p><p> As an action you can spend the CCD Drain and make a ranged weapon
      attack with the Leadwall, targeting 1 creature within a 15-foot cone originating from you for every 5 CCD chakra
      spent.</p><p></p>
