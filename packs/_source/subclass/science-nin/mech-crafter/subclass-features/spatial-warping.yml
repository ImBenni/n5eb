system:
  description:
    value: >-
      <p>At 9th level, when using and crafting scrolls, the scrolls gain the following effects: </p><p>• Jutsu scrolls
      you craft now have 2 charges of the jutsu stored within </p><p>• Item scrolls you use can hold twice as much bulk
      </p><p>• You can retrieve weapons from a Weapon Scroll as a free action once per turn.</p><p> Also, when your Mech
      would fall to 0 Hit Points, you can spend a reaction to instead quickly reseal it in your Respawn Scroll and
      restore a number of Hit Points equal three times your Science Nin level.</p><p> You can use this reaction once per
      rest.</p><p></p>
