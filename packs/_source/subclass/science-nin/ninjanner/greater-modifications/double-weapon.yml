name: Double Weapon
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Cost: 8 Creation Points</p><p>Drain: 10 CCD Chakra</p><p>Prerequisite: One Handed Melee Weapon</p><p></p><p>You add an extra blade to a tool of war.\_</p><p>After all, death comes in pairs.\_</p><p>As a Bonus action you can pay the Drain cost and Your weapon gains the Double property for the next minute.\_</p><p>A weapon with this property can be used with one or two hands like a versatile weapon however its two-handed die is one lower than its single-handed die.\_</p><p>Once per turn, When you make a weapon attack with a Double weapon, you can make an additional attack using its Doubled die as a part of the same action.\_</p><p>It also is considered two different weapons for two-weapon fighting</p>"
