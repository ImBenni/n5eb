  description:
    value: "<p>Cost: 8 Creation Points</p><p>Drain: 10 CCD Chakra</p><p></p><p>You pack extra power into your modified weapon.\_</p><p>Once per turn, when you hit with the weapon, you can spend the CCD Chakra Drain to deal an additional 1d8 damage.\_</p><p>If you do so, the weapon makes a loud boom which can be heard 100 feet away.\_</p><p>If you are hidden, Intelligence (Investigation) and Wisdom (Perception) checks made to locate you that rely on sound have advantage.\_</p><p>You can only use this 3 times in a single attack.</p>"
