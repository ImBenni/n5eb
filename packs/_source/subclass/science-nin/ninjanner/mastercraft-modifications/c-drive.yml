name: C-Drive
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Cost: 32 Creation Points</p><p>Drain: 30 CCD Chakra</p><p></p><p>A tool that lets you split the timeline, and jump backwards in time, a technique on par with that of a high-ranking Space Time Ninjutsu.\_</p><p>You install a C-Drive into the center of your weapon.\_</p><p>You can activate this tool as a reaction at the end of your turn.\_</p><p>Once activated, the gadget alters the flow of time, reversing any events or actions that took place during that turn.\_</p><p>You can take your turn again and can choose to take different actions or the same actions as previously, possibly with different results.\_</p><p>Other creatures must do the same thing they did before, even if it doesn't make sense now, as you seem to have predicted their exact action.\_</p><p>Once used, this effect must be recharged and cannot be used again for 1d4 rounds.</p>"
