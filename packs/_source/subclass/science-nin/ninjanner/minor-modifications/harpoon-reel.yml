name: Harpoon Reel
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Cost: 2 Creation Points</p><p>Drain: 5 CCD Chakra</p><p></p><p>You install a secondary fire mode that launches a harpoon attached to a tightly coiled cord.\_</p><p>With this harpoon, you can make a ranged weapon attack with a range of 30/60.\_</p><p>On a hit, it deals 1d6 piercing damage.\_</p><p>This attack can target a surface, object, or creature.\_</p><p>A creature struck by this attack is impaled by the harpoon.\_</p><p>As an action, a creature can attempt to remove the harpoon.\_</p><p>Removing the harpoon requires a Strength ability check vs a DC 8+your Intelligence Modifier.\_</p><p>While the harpoon is stuck in the target, you are connected to the target by a 60-foot cable.\_</p><p>While connected in this manner, you can use your bonus action to activate the reel, pulling yourself to the location if the target is your size or larger.\_</p><p>A creature or object smaller than you is pulled to you.\_</p><p>Alternatively, you can opt to release the cable (no action required).\_</p><p>Once you've used this feature, you can't use it again until you recover and reinsert the harpoon as an action.</p>"
