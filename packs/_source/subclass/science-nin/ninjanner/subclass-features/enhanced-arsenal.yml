name: Enhanced Arsenal
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>When you choose this Inquiry at 3rd Level you gain proficiency in Martial Weapons and Mastery in Weaponsmith Kit and Crafting.\_</p><p>During a Long Rest you can work on your weapons and make an Enhanced Weapon.\_</p><p>You can use your Intelligence Modifier in place of Dexterity for weapon attacks and Bukijutsu using Enhanced Finesse weapons.\_</p><p>This Enhanced Arsenal gains a number of Upgrade Slots equal to your Proficiency Bonus split between any weapon you turn into an Enhanced Weapon.\_</p><p> Your Enhanced Weapons cannot be broken or damaged by any means during a Long Rest you can spend creation points to install an upgrade that you meet the requirements for into the gear.\_</p><p>If a modification has prerequisites, you must meet them to install it.\_</p><p>You can install the modification at the same time that you meet its prerequisites.\_</p><p>These upgrades will be shown at the end of this Inquiry page.</p>"
