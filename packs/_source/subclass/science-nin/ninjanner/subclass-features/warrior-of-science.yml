name: Warrior Of Science
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Starting at 9th level, you have upgraded your CCD to turn any weapon you wield into one of legend.\_</p><p>As an Action you can spend 20 CCD chakra and turn an Enhanced Weapon you are holding into a Legendary Weapon.\_</p><p>You must pay 10 CCD chakra at the start of your turn to maintain this benefit.\_</p><p>A Legendary Weapon you are holding gains the following benefits for one minute:</p><p>\_</p><p>• It gains a +2 to Weapon and Taijutsu Attack Rolls</p><p>\_• Once per turn, when it deals damage to a creature, you can have it ignore all THP and Damage reduction</p><p>\_• You can select one Weapon Property (Besides Heavy, Two-Handed) it has and double its benefits.\_<br />In the case of Thrown it doubles its range.\_<br />In the case of Versatile, increase the damage die by an additional step.\_</p><p>• When you cast a Bukijutsu with the weapon as a component you can double the cost of the Bukijutsu and round up to the nearest interval of 5 and pay it with your CCD.\_<br />If you do the damage is converted to force.</p>"
