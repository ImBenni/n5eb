  description:
    value: "<p>Prerequisite: Chakra Sabre Weapon</p><p>Cost: 16 Creation Points</p><p>Drain: 15 CCD Chakra</p><p></p><p>You have enhanced your chakra Sabre far beyond its limits.\_</p><p>\_While a Chakra Sabre Weapon is active you can activate this upgrade to make it a Superior weapon for the next minute as an object interaction.\_</p><p>\_While it is Superior it ignores Damage reduction and Temporary Hit Points from Armor and Jutsu sources.\_</p><p>\_While this is active you increase the CCD Drain cost at the start of your turn by an additional 5 CCD Chakra.</p>"
