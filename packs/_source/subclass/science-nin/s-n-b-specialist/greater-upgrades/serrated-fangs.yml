system:
  description:
    value: >-
      <p>Cost: 8 Creation Points </p><p>Drain: 10 CCD Chakra </p><p>You modify your Scientific Ninja Beast to be able to
      coat its fangs in spiraling wind.</p><p> Your S.N.B can spend the CCD Drain as a bonus action to coat its
      fangs.</p><p> While its fangs are coated, they deal an additional 1d8 Wind damage.</p><p> This increases to 2d8 at
      13th level and 3d8 at 17th level.</p><p> This overcharge lasts for 1 minute.</p><p> Additionally, when you reach
      13th level, when you hit a creature with a fang attack you can choose to apply a rank of Bleed instead of dealing
      damage.</p><p> Your S.N.B can only benefit from one fang upgrade at a time.</p><p></p>
