system:
  description:
    value: >-
      <p>Cost: 2 Creation Points</p><p>Drain: 5 CCD Chakra</p><p></p><p>You install a mechanism in your Scientific Ninja
      Beast that allows it to launch a stack of kunai or shuriken over a large area.</p><p> When you complete a rest,
      you can put any number of kunai/shuriken stacks into your S.N.B, your S.N.B can hold a number of kunai/shuriken
      stacks equal to your intelligence modifier.</p><p> As an action, your S.N.B can the CCD Drain to use any amount of
      kunai/shuriken stacks to target a 30-foot area within 60 feet, each creature in the area must make a Dexterity
      saving throw, taking 4d4 piercing/slashing damage for each stack of ammunition consumed on a failed or half as
      much on a successful save.</p><p></p>
