system:
  description:
    value: >-
      <p>Also at 3rd level, you gain access to special upgrades for your Scientific Ninja Beast, you can install a
      number of upgrades into your S.N.B equal to your Proficiency Bonus and you can install any upgrades you meet the
      requirements for during a long rest.</p><p> Any upgrades that cost chakra are paid through your C.C.D. When you
      reach 9th level, your S.N.B can instead use its own C.C.D to pay the chakra costs.</p><p></p>
