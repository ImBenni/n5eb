name: Scientific Ninja Beast
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>When you choose this Inquiry at 3rd level, you gain a companion in the form of a synthetic animal of some
      variety.</p><p>When you roll initiative, you can also choose to activate your S.N.B by paying 0 CCD Chakra.</p><p>
      While activate, you can command your Scientific Ninja Beast as an Action or Bonus Action as long as your S.N.B can
      see or hear you, the S.N.B can take one action or bonus action per turn and its movement.</p><p> Your S.N.B is
      proficient in two saving throws of your choice and uses your proficiency bonus, when your S.N.B is forced to make
      a saving throw treat any negative modifiers as +0 for the saving throw.</p><p> You may select an additional Saving
      Throw Proficiency at 14th level.</p><p> If your S.N.B is destroyed you can build a new one over the course of a
      full rest.</p><p> When you would gain an Ability Score increase from this class, you increase one of its ability
      scores by 2, and two other scores by 1.</p><p> Your S.N.B has a number of Hit Die (d8) equal to your Science-Nin
      level.</p><p></p>
