system:
  description:
    value: >-
      <p>Cost: 16 Creation Points </p><p>Drain: 15 CCD Chakra </p><p></p><p>You have installed a large bomb into your
      Scientific Ninja Beast.</p><p> As an action your Scientific Ninja Beast can spend the CCD Drain to initiate a
      self-destruct sequence, at the end of 1 minute the S.N.B will explode.</p><p> Each creature within a 60-foot
      radius of the S.N.B must make a dexterity saving throw, taking 20d8 + 1 for each point of chakra remaining in the
      C.C.D of the S.N.B or half as much on a successful save.</p><p> At any point during the 1- minute countdown the
      S.N.B may use its action to immediately explode.</p><p> You lose any creation points spent on S.N.B upgrades until
      you finish a full rest.</p><p> Alternatively, when your S.N.B is reduced to 0 hit points you may use your reaction
      to trigger the explosion.</p><p></p>
