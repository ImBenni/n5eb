name: Absolute Reflection
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Drain: 30 CCD Chakra </p><p></p><p>You copy the pinnacle of defense worthy of a god.</p><p> As a reaction to
      being targeted with an attack while you are within 5 feet of an allied creature or restrained or grappled hostile
      creature, you can initiate the Reflect.</p><p> If you are within 5 feet of a hostile creature who does not meet
      the criteria, you can make an unarmed strike against them.</p><p> On a success you initiate the Reflect.</p><p>
      Spend the Drain of this Shinjutsu and the triggering creature must make a Wisdom Saving Throw against your highest
      Save DC.</p><p> On a failure they become the new attack target and must make the attack against themselves at
      advantage, On a success they still target you but the attack is made at disadvantage.</p><p> Mastered: You have
      mastered your ability to reflect the intentions of your foes.</p><p> When a creature would fail against this
      Shinjutsu, they instead automatically hit themselves with the triggering attack.</p><p> On a success they instead
      roll to hit themselves at disadvantage.</p><p></p>
