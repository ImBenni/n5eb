system:
  description:
    value: >-
      <p>Drain: 20 CCD Chakra</p><p></p><p>You have begun to awaken a new Shinjutsu, one that looks forward and not
      back.</p><p>However, it is not a power easily controlled.</p><p>As an Action you can spend the drain of this
      Shinjutsu and attempt to peer into the future.</p><p>Make an Intelligence ability check against the Jougan Table,
      the result is what happens.</p><p>Mastered: You have finally awakened the full power of the future and it rules!
      When you would use the Jougan ability you can spend double this Shinjutsu's Drain to skip the roll and get the
      benefits of a 25.</p><img src="systems/n5eb/assets/content/cheat-sheets/jougan.webp" /><p></p>
