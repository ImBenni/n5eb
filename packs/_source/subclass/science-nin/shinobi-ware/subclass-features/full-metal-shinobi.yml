system:
  description:
    value: "<p>When you choose this Inquiry at 3rd Level you replace the skin of your body with flexible chakra material that allows for easier experiments.\_</p><p>Your AC calculation while unarmored is now 10 + your Proficiency Bonus +Intelligence Modifier.\_</p><p>You can also spend chakra from your CCD to heal yourself as a Bonus Action.\_</p><p>You heal at a rate of 10 CCD chakra to 5 health.\_</p><p>At Level 6 you choose to gain resistance to either Bludgeoning, Piercing, or Slashing damage.\_</p><p>At Level 9 you can choose another.\_</p><p>At Level 14 you gain the last that you did not choose.\_</p>"
