name: Glorious Evolution
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you have expanded upon the simple science of the era and have embraced your body as the
      start of the new era.</p><p> During a rest of any type, you can use 2 charges of your Armorsmith Kit to evolve a
      Refined upgrade.</p><p> You can only have two Evolved Upgrades at a time.</p><p> An Evolved Upgrade does not count
      against your slot limits and has its Creation point cost reduced by 2.</p><p> At 9th Level you can instead choose
      a Greater Upgrade.</p><p> At Level 14 you can chose a Superior Upgrade.</p><p></p>
