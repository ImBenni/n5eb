name: Ninjutsu Absorption And Amplification
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Cost: 16 Creation Points</p><p>Drain: 20 CCD Chakra</p><p></p><p>You can absorb Ninjutsu with your left arm or eye.\_</p><p>As A reaction when you are targeted with a Ninjutsu you can spend the CCD chakra drain and initiate a clash.\_</p><p>If you win you absorb the Ninjutsu cast, negating it.\_</p><p>You then can either immediately attack with it using your right eye or arm, but upcasted it one rank higher than it was cast, or add it to your jutsu list until you use it, upcasted to one rank higher than it was cast.\_</p><p>You can only have one stored Ninjutsu at a time and either way when it is cast you pay the cost with your CCD rounded up to the nearest interval of 5.</p>"
