name: Boltzmann Brain
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>At 17th level, you have added a new subroutine to your Hacker's Kit.</p><p>Your victims senses become putty in your hand, as you take control of their Nervous system.\_</p><p>When you cast a Genjutsu with a Hackers Kit that has a casting time of an Action or Bonus Action, you can increase the casting time to a full turn action.\_</p><p>If you do it loses all sensory keywords and gains the Tactile keyword as you hack their brain directly.\_</p><p>A creature who fails a saving throw against a Genjutsu cast in this way is always treated as if they critically failed.</p>"
