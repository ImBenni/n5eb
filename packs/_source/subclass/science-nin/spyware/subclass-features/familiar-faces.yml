name: Familiar Faces
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>Starting at 9th level, you have come to the understanding that a face is nothing but a shell.</p><p> You gain
      Mastery in a Disguise Kit.</p><p> You can spend 1 charge of a disguise kit to cast the Transform Genjutsu as if it
      were on your jutsu list.</p><p> You can spend 5 charges to cast the Advanced Transformation Ninjutsu as if it were
      on your jutsu list, paying 5 CCD chakra.</p><p> Additionally, you have mastered the perfect fusion of Technology
      and Forgery.</p><p> When you would make an Exquisite Forgery, you can spend 2 charges of your Hackers Kit and your
      Forgery Kit and increase the time to 1 week of downtime.</p><p> If you do, you instead make a Mastercraft
      Forgery.</p><p> This Forgery can pass as authentic to any human eye.</p><p> If there is a chakra or electronic
      component to a security check, you can make a Hacker's Kit check vs the DC of the security check to have it pass
      as authentic.</p>
