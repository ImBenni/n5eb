  description:
    value: "<p>At 14th level, you learn how to reroute the chakra from the CCD into your Hackers Kit.\_</p><p>Select one Program.\_</p><p>This becomes your Quick hack.\_</p><p>You always have this program prepared and it does not count against your slot limit or Creation points.\_</p><p>You can now use this program as a Bonus Action without using a Genjutsu, making a Genjutsu Attack roll instead.\_</p><p>If you would use this program while casting a Genjutsu, you reduce its CCD chakra cost by 5.</p>"
