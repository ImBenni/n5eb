name: 'The Future Of Shinobi: Programs'
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: >-
      <p>At Level 20, you have realized that Programs are the future of shinobi.</p><p> As a Full turn action, you can
      expend 7 or more charges of a Hacker's kit and spend 75 CCD Chakra.</p><p> If you do, you let your chakra explode
      outwards, its manifestation mimicking that of computer wires as they seek out all hostile creatures within 60 feet
      of you.</p><p> All hostile creatures must make a Constitution saving Throw against your Genjutsu save DC.</p><p>
      You increase the DC by 1 for every charge spent past 7.</p><p> On a failure they cannot mold chakra for 1d4+2
      turns.</p><p> On a success they cannot mold chakra until the end of their next turn</p>
