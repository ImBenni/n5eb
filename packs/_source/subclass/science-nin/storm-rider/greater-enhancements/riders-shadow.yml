system:
  description:
    value: >-
      <p>Cost: 8 Creation Points </p><p>Drain: 10 CCD Chakra </p><p></p><p>Increase the cost of activating your Air
      Trecks by the CCD Drain of this Enhancement.</p><p> You gain access to your "shadow", the pressure of chakra and
      air that follows you wherever you go that symbolizes your riding.</p><p> You can manifest this "shadow" as a Bonus
      Action when you do so all hostile creatures within 30 feet of you must make a Wisdom saving throw against your
      Ninjutsu Save DC or gain 1 rank of fear for the next minute.</p><p> A creature can only gain 3 ranks of fear from
      this Enhancement.</p><p></p>
