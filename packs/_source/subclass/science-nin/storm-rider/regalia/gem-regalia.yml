  description:
    value: >-
      <p>The pinnacle part of all defensive type riders, the Gem Regalia.</p><p>While equipped with the Gem Regalia you
      can cast ninjutsu with the Earth Release keyword without needing the HS component.</p><p>Your A.Ts now deal earth
      damage and all earth damage you deal ignores resistance.</p><p>Additionally, while equipped with this Regalia you
      reduce all damage you take by an amount equal to your Constitution modifier.</p><p></p>
