system:
  description:
    value: >-
      <p>The pinnacle part of all vibration type riders, the Roar Regalia.</p><p> While equipped with the Roar Regalia
      you can cast genjutsu with the Auditory keyword without needing the HS component.</p><p> Your A.Ts now deal force
      damage and all force damage you deal ignores resistance.</p><p> Additionally, while equipped with this Regalia
      once per turn when you deal force damage you can inflict a rank of Bruised.</p><p></p>
