system:
  description:
    value: >-
      <p>The pinnacle part of all selfless type riders, the Thorn Regalia.</p><p> While equipped with the Thorn Regalia
      you can cast bukijutsu with the piercing component without needing the mobility component.</p><p> Your A.Ts now
      deal piercing damage and all piercing damage you deal ignores resistance.</p><p> Additionally, while equipped with
      this Regalia whenever you are hit with a melee attack a creature takes piercing damage equal to your Constitution
      modifier.</p><p> A creature can only take damage from this Regalia twice per round.</p><p></p>
