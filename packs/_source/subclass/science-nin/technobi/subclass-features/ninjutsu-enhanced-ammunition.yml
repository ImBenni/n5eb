    value: "<p>At 17th level, you have added a new subroutine to your Kote.\_</p><p>Once per turn, When you would make a weapon attack roll with one of your S.E.N.Ts, you can also cast one jutsu with your Kote.\_</p><p>Its range becomes equal to your weapons range.\_</p><p>It uses the same attack result as the weapon attack.\_</p><p>If it has a saving throw, it instead imposes disadvantage on a hit but advantage on a miss.</p>"
