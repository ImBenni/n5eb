name: Shinobi Gauntlet (Kote)
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>When you choose this Inquiry at 6th Level you gain a Shinobi Gauntlet called a Kote.\_</p><p>This Kote allows you to instantly cast jutsu that are sealed in Kote scrolls using chakra from your CCD.\_</p><p>Jutsu cast this way have an increased cost by the rank of the jutsu (D-Rank: +2.\_C- Rank: +4, B-Rank: +8, A-Rank: +16.\_S-Rank: +32.) and retain its casting time.\_</p><p>This Gauntlet lets you cast these sealed jutsu regardless if you can cast it or not.\_</p><p>Jutsu cast this way cannot be upcasted.\_</p><p>It can hold up to your Intelligence Modifier in scrolls at once, and takes a Bonus Action to reload any number of scrolls up to its maximum.\_<br />During a rest, you can prepare Kote Scrolls.\_</p><p>You can store any non-self- targeting, non-Hijutsu, Ninjutsu that you or an ally within 60 feet of you during the rest knows into a Kote Scroll.\_</p><p>You can make a number of scrolls equal to your Intelligence Modifier per rest, and carry an amount equal to your Science Nin Level at a time.\_</p><p>Once used the scroll is consumed permanently.</p><p>Additionally, you have managed to almost master the creation process of a single type of Mechanization.\_</p><p>Choose 1 Mechanization.\_</p><p>It cost half as many creation points to craft.\_</p><p>Additionally, your understanding of the mechanisms of that Mechanization has allowed you to create them on the fly.\_</p><p>That Mechanization can be created as a bonus action using any Ninja tool you have and paying twice the Drain of the Mechanization.\_</p><p>with chakra from your CCD.</p>"
