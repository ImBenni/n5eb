name: The Best Laid Trap
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>When you choose this Inquiry at 3rd Level you gain Mastery in Demolitions and Trappers Kits.\_</p><p>They each gain additional charges equal to your Intelligence Modifier.\_</p><p>When you make a Ninja Tool with your Demolitions Kit you can expend an additional charge per Ninja Tool made and increase the damage die and save DC by 1.\_</p><p>When you create a Trap with your Trappers Kit, you can spend an additional charge to increase the damage die and save DC by 2.\_</p><p>Additionally, you use your wits to create unique effects for your tools and traps.\_</p><p>When you create a Ninja Tool or a trap with your toolkits, you can spend any remaining Creation Points to upgrade its effect with a Mechanization.\_</p><p> You can have a number of Mechanizations equal to your Proficiency Bonus.</p><p>These Mechanizations use your Ninjutsu Save DC and require you to spend a bonus action to arm and activate, spending the CCD Drain.\_</p><p>A Mechanization remains armed for one minute.\_</p><p>Mechanization are listed at the end of this subclass and The creation points spent on a Mechanization are returned once it is consumed or dismantled.</p>"
    chat: ''
