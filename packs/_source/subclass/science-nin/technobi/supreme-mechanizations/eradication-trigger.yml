name: Eradication Trigger
type: feat
img: icons/commodities/tech/tube-chamber-lightning.webp
system:
  description:
    value: "<p>Cost: 24 Creation Points</p><p>Drain: 20 CCD Chakra</p><p></p><p>You craft the tool or trap to go off in a unique X shape that is filled with burning acidic gas.\_</p><p>Your creation expands into 2 lines of acidic flames made in an X formation.\_</p><p>These lines of flames are 10 feet thick, 90 feet long, and 30 feet tall.\_</p><p>When the walls appear, each creature within its area must make a Dexterity saving throw.\_</p><p>On a failed save, a creature takes 3d6 acid damage and 3d6 fire damage, and gains 1 rank of burned and corroded on a failed save, or half as much damage and no additional effects on a successful one.\_</p><p>The walls continue to burn, losing 1d6 acid and fire damage at the end of each of your turns as it cools down.\_</p><p>Once there are no more damage dice, this creation ceases function.</p>"
