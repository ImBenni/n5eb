    value: "<p>Cost: 24 Creation Points</p><p>Drain: 20 CCD Chakra</p><p></p><p>You design your creation to pull creatures toward their demise, before imploding.\_</p><p>When the creation activates creatures within a 30-foot-radius sphere must succeed a Strength saving throw or be pulled 15 feet towards the epicenter of this creation.\_</p><p>After pulling creatures in, it then explodes forcing creatures with 15-foot-radius sphere to make a Dexterity saving throw dealing 4d8 force damage on a failed save.\_</p><p>If a creature fails this saving throw by 5 or more, they take double damage.</p>"
