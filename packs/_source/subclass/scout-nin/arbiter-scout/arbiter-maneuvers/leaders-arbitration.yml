system:
  description:
    value: "<p>Scout-Nin Keyword: Specialized</p><p>As an action, you can spend one superiority die, targeting all creatures of your choice within 60 feet of you.\_</p><p>All selected creatures must succeed a Wisdom or Intelligence saving throw (Your choice) vs your Ninjutsu (or Genjutsu save DC).\_</p><p>On a failed save they become unable to willingly lie, deceive or even speak with a hostile tone or nature towards you and other creatures allied with you, instead preferring to find a middle ground or one both sides can benefit from.</p>"
