name: Leaders Will
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>When you hit a creature with an attack or a creature fails a saving throw
      against a Jutsu you cast you can expend one Superiority Die.</p><p> When you do, if you are under any effects or
      conditions that required you to make a saving throw that you failed.</p><p> You immediately remake the saving
      throw, adding the Superiority Die to the result of your saving throw.</p>
