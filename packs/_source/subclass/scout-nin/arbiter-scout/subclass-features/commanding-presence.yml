name: Commanding Presence
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 9th level, when you would benefit from the Master of Arbitration class feature, the creature whom
      you have made Charisma checks against, makes their contesting checks with a 1d6 penalty.</p><p>Additionally,
      allied creatures under the effect of a Genjutsu, that begin its turn is within 10 feet of you, remake their saving
      throw to end the Genjutsu's effect.</p><p>A creature can only benefit from this feature once per short
      rest.</p><p>Yourself and allied creatures within 10 feet of you that make saving throws to resist Genjutsu gain a
      bonus to their saving throw equal to half of your Charisma Ability Modifier.</p><p></p>
