name: Master Of Arbitration
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Starting at 3rd level, you learn to enforce your presence into any discussion or squabble.\_<br />You gain proficiency in Deception, Intimidation and Persuasion.\_</p><p>Additionally, you may spend a Superiority die when making any Charisma Ability check, adding the result to check.</p><p>Beginning at 6th level, whenever you would succeed on a Charisma based Skill action against a hostile or non- allied creature, you regain 1 Superiority Die.</p><p>You can regain a Superiority Die in this way, once per creature, per rest.</p>"
