name: Who Decided That!?
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Beginning at 20th level, when you would fail a saving throw of any kind, you instead pass, suffering no additional effects twice per short rest.\_</p><p>Additionally, when a creature other than you, within 30 feet of you would fail a saving throw of any kind you may spend a superiority dice.\_</p><p>They instead pass, suffering no additional effects.\_</p><p>A creature can only benefit from this feature once per long rest.</p>"
