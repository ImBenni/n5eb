system:
  description:
    value: "<p>Spend one superiority die to attempt to frighten everything around you.\_</p><p>The next time you would make an attack, you add twice the superiority dies result to the attack's damage roll and all creatures within 20 feet of you, of your choice must make a Wisdom saving throw vs the Save DC (If Weapon or Unarmed, Taijutsu save DC).\_<br />On a failed save, affected creature gains 1 rank of fear.\_</p><p>A creature who would deal damage to you ends the fear condition on itself.</p>"
