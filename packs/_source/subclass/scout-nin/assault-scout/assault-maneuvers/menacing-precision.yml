name: Menacing Precision
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized When you make an attack roll of any type against a creature, you can expend one
      Superiority Die to add the result to the roll.</p><p> You can use this maneuver before or after making the attack
      roll, but before any effects of the attack are applied.</p><p> On a successful hit, you gain half of the original
      roll to the next attack you make before the end of your next turn.</p><p> On a successful hit of the second
      attack, you gain half of the original attacks superior die roll, to the next attack you make before the end of
      your next turn.</p><p></p>
