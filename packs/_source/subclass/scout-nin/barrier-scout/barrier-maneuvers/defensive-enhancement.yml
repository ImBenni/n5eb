name: Defensive Enhancement
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>You can spend one Superiority Die to enhance the defenses of an allied creature you can see other than
      yourself, recording the result.</p><p> When you do, they gain a bonus to their next saving throw equal to half the
      result.</p><p> On a failed save they gain temporary hit points equal to three times the result.</p><p></p>
