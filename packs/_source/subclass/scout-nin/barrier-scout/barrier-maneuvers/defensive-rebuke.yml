name: Defensive Rebuke
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized When you would cast a Jutsu that would grant only you, Damage Reduction, you can
      spend a Superiority Die.</p><p> When you do, all allied creatures within 10 feet of you gain the benefit of the
      jutsu cast, until the end of the current turn, regardless of the jutsu's duration.</p><p> When you would roll to
      determine the damage reduction gained, you add your Superiority Die to the result.</p>
