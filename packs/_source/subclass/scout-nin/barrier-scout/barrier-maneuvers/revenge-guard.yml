name: Revenge Guard
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Scout-Nin Keyword: Specialized</p><p>When you would cast a Jutsu that would grant you, Damage reduction or Temporary hit points, you can spend a superiority die.\_</p><p>When you do, the first instance of damage your Temporary hit points, or your Damage reduction would interact with this turn is echoed outward affecting all hostile creatures within 10 feet of you.\_</p><p>All Hostile creatures of your choice within range must make a Dexterity saving throw against the original DC of the Attack or Jutsu (If Weapon or Unarmed, Taijutsu save DC).\_</p><p>On a failed save they take the same damage inflicted from the attack or jutsu + twice the result of your Superiority die.\_</p><p>On a successful save they take half.\_</p>"
