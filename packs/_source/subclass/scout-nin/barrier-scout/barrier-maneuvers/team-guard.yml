name: Team Guard
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>When you are within 10 feet of an allied creature, you can spend one Superiority Die as a Bonus Action.</p><p>
      All allied creatures, including yourself, within range gain a +2 Bonus to their AC, and all saving throws made
      until the end of your next turn so long as they remain within 10 feet of you.</p><p> If any affected creature
      would take damage you reduce the damage taken by the result of the Superiority Die.</p>
