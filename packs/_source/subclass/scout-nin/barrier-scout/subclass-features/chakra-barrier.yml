name: Chakra Barrier
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Also, at 3rd Level, you learn to manifest a powerful barrier of chakra.</p><p> Whenever you complete a rest of
      any type, you create a Chakra Barrier for yourself or an allied creature that completes this rest with you.</p><p>
      The barrier remains attached to your chosen target until you complete a rest of any type.</p><p> The Chakra
      Barrier has Hit Points equal to twice your character level.</p><p> Your Chakra Barrier's Hit Points are treated as
      Temporary Hit Points but cannot be ignored, removed or dispelled by hostile effects (excluding damage).</p><p>
      Whenever the benefiting creature take damage, the barrier intercepts the damage, taking it in the creature's
      place.</p><p> If this damage reduces the barrier to 0 hit points, the benefiting creature take any remaining
      damage and cannot absorb any further damage until it regains said hit points in one of the following ways:
      </p><p></p><p>• When you would gain Temporary Hit Points you instead cause your Chakra Barrier to regain Hit
      Points equal to the amount of THP you would gain.<br /> If your Chakra Barrier is already at max Hit Points, you
      instead gain the Temporary Hit Points as normal.</p><p> • When you would gain Damage Reduction as a result of a
      Jutsu, you can choose to instead cause your Chakra Barrier to regain Hit Points equal to twice the amount of DR
      you would gain.</p><p> • When you would gain a bonus to your Armor Class, you can choose to instead cause your
      Chakra Barrier to regain Hit Points equal to three times the AC you would gain.<br /> While your Chakra Barrier
      has hit points, you gain a 1d4 bonus to checks made to maintain concentration on Jutsu you cast.</p><p></p><p>
      Beginning at 6th level, once per round, you regain 1 Superiority Die when you would reduce the damage you or an
      allied creature would take to half or less as the result of a class feature or Jutsu.</p>
