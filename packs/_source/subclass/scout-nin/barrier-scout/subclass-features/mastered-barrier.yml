system:
  description:
    value: >-
      <p>Beginning at 14th level, you have mastered your ability to bend, manipulate, enhance and reinforce your Chakra
      Barrier granting you an additional variation to your Projected Barrier class feature called Heavy
      Guard.</p><p></p><p>Heavy Guard.</p><p>By spending 1 Chakra Die, you layer your Chakra Barrier over a number of
      allies within 30 feet of you, equal to your Proficiency Bonus.</p><p>Creatures layered in this way gain Resistance
      to the next instance of damage they take before the end of the current turn.</p><p></p>
