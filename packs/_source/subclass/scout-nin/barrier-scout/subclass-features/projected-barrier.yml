name: Projected Barrier
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd Level, you know how to manipulate your barrier in a variety of different ways such as
      generating a Chakra Sphere or Repelling Burst.</p><p>You can use any combination of these abilities a number of
      times equal to your Proficiency Bonus per Long Rest.</p><p>If you attempt to use this feature any additional times
      it costs 1 Superiority Die or Chakra Die per use.</p><p></p><p>Chakra Sphere.</p><p>As a reaction, you expand your
      Chakra Barrier into a 15-foot-radius centered on you until the start of your next turn.</p><p>Allied creatures of
      your choice inside the barrier that would take damage, reduce the damage they take by one damage die, to a minimum
      of half the damage die rolled. (Min 1.)</p><p>This increases to two at 9th Level and three at 17th
      Level.</p><p></p><p>Repelling Burst.</p><p>As an action, you expand your Chakra Barrier instantly, creating a
      burst of chakra in a 10-foot radius centered on you.</p><p>Each creature of your choice within range must make a
      Strength or Dexterity Saving Throw (Your choice) vs your Ninjutsu Save DC.</p><p>On a failed save, a creature
      takes Xd6 Force damage, is pushed back 10 feet and falls Prone.</p><p>On a success, they take half damage and no
      further effects. (X= Your Proficiency Bonus).</p><p></p>
