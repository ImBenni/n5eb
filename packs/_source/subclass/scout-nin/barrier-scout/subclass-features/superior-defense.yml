name: Superior Defense
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd Level you learn maneuvers that are fueled by a special dice called Superiority
      Dice.</p><p>Maneuvers: You learn three maneuvers of your choice, which are detailed in the Barrier Maneuvers
      Section at the end of this class.</p><p>You earn more at higher levels as shown in the "Maneuvers Known" Column of
      the Superior Defense table.</p><p>Many Maneuvers enhance your allies in some way.</p><p>You can use two Maneuvers
      per turn.</p><p>When you take a long rest, you may switch one maneuver you know for another you qualify
      for.</p><p>Superiority Dice: You have three Superiority Dice, which are d8's, you earn more at higher levels, as
      shown in the Superiority Dice column of the Superior Defense table.</p><p>A Superiority Die is expended when you
      use it.</p><p>You regain all of your expended Superiority Dice after 10 minutes.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/superior-defense.webp" />
