name: Clone Combo
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized</p><p>When you use a melee or ranged attack, if you have at least one clone
      active, you can spend one Superiority Die to have the clones to attack with you, putting their all into it by
      throwing themselves at the enemy.</p><p>Dismiss any number of clones you have active.</p><p>For every clone active
      you gain bonus damage equal to 1 Superiority Die or a +1 save DC for every two clones Dismissed.</p>
