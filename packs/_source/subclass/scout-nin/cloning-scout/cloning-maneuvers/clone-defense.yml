name: Clone Defense
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>When an allied creature is hit with an attack that is within 15 feet of your clone, as a reaction, before the effect of the attack applied to them, you may spend a superiority die to have either yourself or a clone interpose the attack, taking the damage or effect of the attack.\_</p><p>You or the clone must be aware of the attack to use this maneuver.\_</p><p>The protected ally gains a bonus to their AC or All Saving throws equal to half the result of the superiority die, until the beginning of their next turn.</p>"
