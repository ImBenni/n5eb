name: Clone Swap
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>When you or an allied creature would take damage, as a Reaction, you may spend a Superiority Die to have a
      clone within 30 feet of you swap places with you or the allied creature.</p><p>When the clone switches places, it
      instead takes the damage and suffers the associated effects.</p><p></p>
