name: Elite Clone
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Scout-Nin Keyword: Specialized</p><p>When you would summon more than one clone as a result of casting a Jutsu that summons a clone, you can spend a superiority die as a part of the casting.\_</p><p>When you do, you instead only summon one clone, but this clone has the combined total Hit and Chakra points of a number of clones equal to the spent superiority die.\_</p><p>If the clones summoned instead has a limited number of jutsu it can cast, it instead now has an increased limited on that number equal to the sum that all summoned clones would have separately.\_</p><p>This clone adds twice the chosen superiority die to all damage rolls it makes, once per turn for the duration of its existence.\_</p><p>You can only have One clone created by this Maneuver active in this way at a time.</p>"
