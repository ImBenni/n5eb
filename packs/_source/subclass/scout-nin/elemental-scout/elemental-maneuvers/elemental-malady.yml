system:
  description:
    value: "<p>Scout-Nin Keyword: Specialized</p><p>When you cast a Jutsu with your chosen nature release keyword, that deals damage, you may expend one superiority die and add it to the damage dealt or half the result to the Save DC.\_</p><p>If the Jutsu inflicts a condition, it inflicts an additional rank of the condition (If able).</p><p><br />If it doesn't inflict a condition, creatures hit by it must make a Constitution Saving Throw against your relevant Save DC or gain an Elemental Condition until the end of your next turn.\_</p><p>(See Elemental Condition table)</p><img src=\"systems/n5eb/assets/content/cheat-sheets/elemental-condition.webp\" />"
