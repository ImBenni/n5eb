name: Elemental Knowledge
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you have focused your efforts on harnessing your innate Nature Release.</p><p> Select
      one Nature Release (Earth, Wind, Fire, Water, or Lightning Release).</p><p> You gain the ability to cast Jutsu
      with the corresponding Keyword.</p><p> If you could already cast jutsu with the selected keyword, you learn one
      jutsu with the corresponding keyword that you qualify for.</p><p> Also, when you or an allied creature within 30
      feet of you would cast a Ninjutsu that does not have your chosen Nature release, you can spend one Superiority Die
      enhancing the Jutsu, giving it your chosen Nature release Keyword and adding the spent die to the damage
      dealt.</p><p> Beginning at 6th level, once per turn, whenever you score a critical hit with a Jutsu based attack
      or a hostile creature fails a saving throw vs a Jutsu you cast by 5 or more.</p><p> You regain 1 Superiority
      Die.</p><p></p>
