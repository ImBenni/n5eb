name: Elemental Power
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 9th level, the strength of your element is unquestionable.</p><p> When you would deal damage using
      a jutsu, without the Combination keyword, with your chosen nature release keyword, you can spend 2 Superiority
      Die.</p><p> When you do, the jutsu cast deals maximum damage.</p><p> The jutsu cast in this way, cannot score a
      critical hit.</p><p> If the jutsu cast requires an attack roll only the first attack roll that scores a hit gains
      this effect.</p><p></p>
