name: Superior Elements
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Beginning at 3rd level you lean maneuvers that are fueled by a special dice called Superiority Dice.</p><p>Maneuvers:</p><p>You learn three maneuver of your choice, which are detailed in the Elemental Maneuvers Section at the end of this class.\_</p><p>You earn more at higher levels as shown in the \"Maneuvers Known\" Column of the Superior Elements table.\_</p><p>Many Maneuvers enhance an attack in some way.\_</p><p>You can only use two Maneuver per turn.\_</p><p>When you take a long rest, you may switch one maneuver you know for another you qualify for.\_</p><p><br />Superiority Dice:</p><p>You have three superiority dice, which are d6's, you earn more at higher levels, as shown in the Superiority Dice column of the Superior Elements table.\_</p><p>A superiority die is expended when you use it.\_</p><p><br />You regain all of your expended superiority dice after 10 minutes.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/superior-elements.webp\" />"
