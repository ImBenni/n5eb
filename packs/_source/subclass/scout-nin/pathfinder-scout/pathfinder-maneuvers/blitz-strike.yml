name: Blitz Strike
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>While you are gaining the benefits of a jutsu that increases your movement speed, and you would cast a jutsu that requires no more than one melee attack, you can spend a superiority die.\_</p><p>You convert your speed into strength, rolling your superiority die adding three times the result to the damages roll and overwhelming the target on a hit, forcing them to make a Constitution saving throw vs the Jutsu's save DC.\_</p><p>On a failure, they become incapacitated until the end of their next turn.</p>"
