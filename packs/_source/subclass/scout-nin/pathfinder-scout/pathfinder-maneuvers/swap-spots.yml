name: Swap Spots
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Scout-Nin Keyword: Specialized</p><p>When you cast or use a jutsu that allows you to teleport, you can expend a superiority die and choose a creature within the teleport's range.\_</p><p>You swap places with that creature, and if they are a willing ally, you add the result of the superiority die roll to that creature's AC against the next attack targeting them.\_</p><p>If the creature is unwilling, they must succeed on a Charisma saving throw against your Ninjutsu (or Taijutsu) save DC.\_</p><p>On a failed save they swap places with you.\_</p><p>An unwilling creature has their AC reduced by an amount equal to half of the result of your superiority die.</p>"
