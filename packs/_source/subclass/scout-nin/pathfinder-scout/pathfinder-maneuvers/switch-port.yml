name: Switch Port
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Scout-Nin Keyword: Specialized</p><p>When you cast a jutsu that allows you to teleport or grants you and only you, a bonus to your movement speed, you can spend a superiority die and target an allied creature within 10 feet of you.\_</p><p>If the jutsu would teleport you, that creature teleports instead, and can add the superiority die to the next attack roll it makes before the end of its next turn.\_</p><p>If the jutsu would grant you a bonus to your movement speed, they gain the effects of the jutsu instead of you for its listed duration as if they had cast it.\_</p><p>If the jutsu requires concentration, you can choose if they or you will maintain concentration when this maneuver is used.\_</p><p>Once decided, you cannot change who is maintain concentration.</p>"
