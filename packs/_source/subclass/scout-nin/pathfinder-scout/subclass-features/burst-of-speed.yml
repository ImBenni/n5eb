name: Burst Of Speed
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, you can Dash as a Bonus Action.</p><p> Alternatively, once per turn, you can spend half of
      your movement to teleport.</p><p> If you would teleport, you may roll your Superiority Die.</p><p> You can
      teleport a number of feet equal to 10 x the result.</p><p> This movement, counts as a Jutsu that would Teleport
      you or grant you a boost to speed.</p><p> When you would cast a Jutsu that would teleport you or grant you a boost
      to speed you gain a boost to your next attacks damage roll equal to 2d6.</p><p> This bonus increases to 4d6 at 9th
      level and 6d6 at 17th level in this class.</p><p> Additionally, you ignore any Nature Release or Ability score
      restriction/limitation when learning or using Ninjutsu, Genjutsu or Taijutsu that would teleport you or grant you
      a bonus to movement speed.</p><p> Beginning at 6th level, once per turn whenever you roll a 1 or 6 on your
      Superiority Die it is not spent.</p>
