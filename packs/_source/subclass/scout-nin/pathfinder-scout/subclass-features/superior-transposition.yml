name: Superior Transposition
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Beginning at 20th level, you can unleash your accelerated chakra to manifest a field of influence that you control.\_</p><p>Select a space you can see within 120 feet of you.\_</p><p>As a free action on your turn, You manifest a 30-foot radius sphere centered on this point.\_</p><p>Yourself and all creatures and loose objects within this space are subject to your control.\_</p><p>As an Action, bonus action or reaction by spending one superiority die, you can select one creature or object that you can see and attempt to move it to any other space within the radius of the sphere.\_</p><p>The affected creature or object must make a Charisma saving throw vs your Ninjutsu (or Genjutsu) save DC.\_</p><p>On a failed save they are moved to the chosen point, unable to take reactions to this forced movement.</p>"
