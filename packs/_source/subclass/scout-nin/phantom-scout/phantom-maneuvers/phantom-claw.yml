name: Phantom Claw
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>You layer your attack in phantasmal chakra to tear through your target's
      chakra coils.</p><p> By spending one Superiority Die you change the damage type of your next attack to chakra
      damage.</p><p> On a hit, you deal your attacks damage, plus your Phantasmic Power, plus twice the Superiority
      Die's result to the damage total and forcing the target to make an Intelligence saving throw vs the attacks Save
      DC (If Weapon/Unarmed, Taijutsu save DC).</p><p> On a failed save, affected creature(s) gain 3 ranks of
      Confused.</p><p> If you use this Maneuver while you are Hidden or the target is Unaware of you or your location,
      increase the damage to twice your weapon/[Unarmed Damage], plus four times the Superiority Die and increase the
      inflicted ranks of Confused on a failed save to 5 ranks.</p>
