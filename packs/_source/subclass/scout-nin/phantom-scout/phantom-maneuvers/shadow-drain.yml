name: Shadow Drain
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Scout-Nin Keyword: Specialized</p><p>When a creature you can see within 30 feet of you would gain a bonus to hit or damage from a jutsu, feature or trait, you may spend a superiority die.\_</p><p>When you do, you attempt to drain and steal a bit of their power through their shadow, into your own.\_</p><p>They must make a Wisdom saving throw vs your Ninjutsu (or Genjutsu) save DC.\_</p><p>On a failed save, they lose the bonuses granted to hit or damage, while you gain the benefit of that bonus to hit or damage for a number of turns equal to half the result of your superiority die.</p>"
