name: Ghost Walk
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 9th Level, you have learned to make your entire body ethereal, capable of phasing through solid
      matter, like a ghost.</p><p> As a Bonus Action, you assume a spectral form.</p><p> While in this form, you have a
      flying speed equal to half of your movement speed, you can hover and attack rolls have disadvantage against
      you.</p><p> You can also move through creatures, objects and walls as if they were difficult terrain.</p><p> You
      take 1d10 Force damage if you would end your turn inside the space of a creature or an object, and are instead
      shunted out to the nearest unoccupied space if you do so.</p><p> This form does not allow you to pass through
      surfaces, barriers, or walls made by jutsu or reinforced with chakra.</p><p> You can remain in this form for 10
      minutes or until you end it as a Bonus Action.</p><p> Regardless, once you use this feature once, you cannot use
      it again until you complete a Long Rest.</p><p> If you would attempt to use this feature again you must spend a
      Superiority Die each time you would gain its benefits after its initial use.</p>
