name: Phantasm's Grip
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 6th level, you learn to make parts of your body and weapons ethereal to cut through the
      metaphysical manifestations of another.</p><p>When you would deal damage with an attack, you may spend 1
      Superiority Die to cut through their spiritual essence.</p><p>When you do, you force the creature to make a Wisdom
      saving throw vs your Taijutsu (or Genjutsu, your choice) Save DC.</p><p>On a failed save, the target suffers one
      of the following; </p><p>• Take Psychic Damage equal to half of your Phantasmic Power and gain 2 ranks of
      Concussed.</p><p>• Take Necrotic Damage equal to your Phantasmic Power and gains 1 rank of fear until the end of
      their next turn.</p><p>• Take Chakra damage equal to twice your Phantasmic Power and becomes unable to Mold Chakra
      until the end of their next turn.</p><p></p>
