name: Phantom's Power
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Also at 3rd Level, you learn to compress your phantasmic chakra for bursts of ghastly power known as your
      Phantasmic Power, represented as 1d6.</p><p> When a subsequent class feature calls for your Phantasmic Power you
      roll the d6 in addition to any other effects following the rules of the specified features.</p><p> You can only
      use your Phantasmic Power once per turn.</p><p> Your Phantasmic Power grows as you gain levels, becoming 2d6 at
      6th, 3d6 at 9th, 4d6 at 14th, 5d6 at 17th and 6d6 at 20th Level.</p><p> You begin with the ability to use your
      Phantasmic Power to enhance the power of your strikes by ripping at your enemy's chakra essence.</p><p> Once per
      turn, when you would hit a creature with an attack that you had advantage on, you deal additional Necrotic damage
      equal to your Phantasmic Power.</p><p> Beginning at 6th Level, once per round, when you would roll your Phantasmic
      Power, if 2 or more of the dice are the same number, you regain 1 Superiority Die.</p><p></p>
