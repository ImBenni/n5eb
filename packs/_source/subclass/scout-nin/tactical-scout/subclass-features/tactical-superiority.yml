name: Tactical Superiority
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Beginning at 6th level, your training has lead you down a path unexplored by many.\_</p><p>You have made it your job to become the most well-prepared Shinobi in a room full of shinobi some would consider superior to even you.\_</p><p>Select one Maneuver from one of the Following Scout- Nin Subclasses, learning it and adding it to your Maneuvers known, not counting it against your known maneuvers limit.\_<br />If the Maneuver has the Specialized keyword, you cannot take it.\_</p><p>You can select one more Maneuver from the aforementioned subclasses at 14th and 20th levels</p><p>• Arbiter Scout</p><p>• Assault Scout</p><p>• Cloning Scout</p><p>• Defensive Scout</p><p>• Pathfinder Scout</p><p>• Phantom Scout</p>"
