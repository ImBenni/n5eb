name: Change Of Heart
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Beginning at 17th level, your resolve has strengthened, and with it, your Void soul has strengthened as well.\_<br />Your Void soul gains immunity to non-chakra enhanced attacks or resistance to two damage types of your choice (Pick one).\_<br />Alternatively, while you are gaining the benefit of your Tricksters Soul Binding class feature, you gain one of following additional benefits.\_<br />You must complete a long rest to switch which benefit you gain:</p>\n<p>• Messiah.</p>\n<p>When a creature within 60 feet of you would be reduced to 0 hit points or less, you can, as a reaction spend 1 superiority die.\_<br />When you do, they instead fall to 1 hit point, then gain temporary hit points equal to 5 times the result.\_</p>\n<p><br />• Izanagi.</p>\n<p>When you would spend a superiority die targeting an allied creature, if the combined total of their d20 and your superiority die is 20 or greater, they treat it as rolling a natural 20.\_</p>\n<p><br />• Satanael.</p>\n<p>Your superiority die are now D8's and the die used for Tricksters words becomes a d8 as well.</p>"
