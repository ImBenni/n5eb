name: Heat Riser
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Beginning at 9th level, your ability to drag down enemies or to enhance the hearts of your allies have strengthened.\_<br />When you use a Trickster Maneuver on a creature, you may as a part of the same action, use another maneuver targeting the same creature.\_<br />The maneuver selected must either help or hinder the target based on the triggering Maneuver or Tricksters Words Effect.\_<br />You must spend a Superiority die as normal.\_</p>\n<p><br />• If the triggering effect would boost, increase or aid the creature, the additional maneuver must boost, increase or aid the creature in some way.\_</p>\n<p><br />• If the triggering effect would impose a penalty, reduce or hinder the creature, the additional maneuver must impose a penalty, reduce or hinder the creature in some way.</p>"
