name: Tricksters Soul Binding
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>Beginning at 6th level, you learn to fuse with your void soul becoming your true, fully realized self.\_<br />As a bonus action, you can fuse with your Void Soul for up to 1 Minute.\_<br />While fused, you are treated as if you have summoned your Void soul but you cannot summon them as a separate creature with the Void Soul Awakening class feature.\_<br />This form ends early if you are unconscious or die.\_<br />This fusion manifests itself as a helmet or mask of your description.\_<br />While fused you gain the following benefits; You can use this feature once per short rest.\_<br />If you would attempt to gain this benefit again after using it once, you may spend 1 Superiority Die to do so.\_</p><p><br />• Tricksters Potential:</p><p>Once per turn, when you would score a critical hit, roll a natural 20 on a skill or ability check or a hostile creature critically fails vs a Genjutsu you cast, you regain 2 Superiority Die.\_</p><p>• Tricksters Strength:<br />Select one ability modifier your Void Soul has.\_<br />Increase your same ability modifier to match the Void souls, ignoring your listed ability score for the duration.\_</p><p>• Tricksters Spirit:<br />You have advantage on Wisdom and Charisma Saving throws and skill Checks.\_</p><p>• Tricksters Words:<br />You can influence a creature in battle once per turn.\_<br />If influencing an allied creature, they add 1d6 to any one skill check, saving throw or attack roll they make.\_<br />If influencing a hostile creature, they reduce their next skill check, saving throw or attack roll by half of 1d6.\_<br />(Your Choice) You can use Tricksters words in this way a number of times equal to your Charisma Modifier per rest.</p>"
