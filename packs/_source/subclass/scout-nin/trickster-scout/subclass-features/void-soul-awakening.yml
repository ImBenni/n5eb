name: Void Soul Awakening
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you learn a special Fuinjutsu technique to create a Chakra Construct known as a Void
      Soul, a manifestation of your true self, that you can call upon for support, both in and out of combat.</p><p>You
      can name it if you wish as it will always abide by your command regardless of the title you give it.</p><p>This
      chakra construct can be summoned as a Bonus Action and occupies your space alongside you.</p><p>It is visible to
      all creatures who can mold chakra (CM).</p><p>While summoned, you can calculate your AC using your Charisma in
      place of your Dexterity for the duration.</p><p>Once summoned, you can command it by spending your Actions, Bonus
      Actions and Reactions as needed to accomplish the given task.</p><p>Your Void soul uses the following Statistics
      found at the end of this class section; </p><p>Your Void soul has the following rules.</p><p></p><p>• Has a number
      of Jutsu known equal to your Proficiency Bonus.</p><p> - Your Void Soul can only access jutsu which you could
      normally qualify for (Keywords, Hijutsu, etc.), plus one keyword that you don't have access to (Any one nature
      release or medical keyword).</p><p> - Your Void Soul cannot cast Combination Jutsu.</p><p> - You can switch your
      Void Soul's Jutsu known when you would gain a level.</p><p> - It uses its own ability scores for the purpose of
      qualifying for jutsu.<br />These jutsu are added to your known jutsu list, but you cannot cast them, only your
      void soul can.</p><p></p><p>• Movement speed is equal to yours.<br />If you would end your turn more than 120 feet
      away from your Void Soul, it is resummoned in your space.</p><p>• Uses your Chakra when casting its Jutsu.</p><p>•
      Uses your saving throw proficiencies.</p><p>• If you and your Void Soul would make a saving throw against the same
      effect, you only make one save suffering the effects only once, not twice.</p><p></p><p>If the Void soul would
      take damage, you do not need to make a concentration check.</p><p>You can dismiss your Void Soul as a Bonus Action
      on your turn or when you fall unconscious.</p><p>You calculate, your Void soul's Ability Scores based on the
      Strength of your Personality.</p><p>Your Void Soul does not have Ability scores like a normal creature, but
      instead only Ability Modifiers.</p><p>You gain a number points to spend, equal to your Charisma Modifier times 3
      which raises any ability modifier of your Void Soul by +1, of your choice.</p><p>The maximum value of any modifier
      is +6.</p><p></p>
