name: Willpower Surge
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 14th level, your ability to call upon your Void soul has reached a new level of control and
      prowess.</p><p> When casting a jutsu without your Void soul active, you may temporarily call upon your Void
      soul.</p><p> When you do this, your Void soul momentarily comes forth and casts the jutsu for you.</p><p> When
      casted this way the jutsu ignores any Hand Sign (HS) component it may have.</p><p> Additionally, the jutsu deals
      additional damage equal to three times your Charisma Ability Modifier, once per casting.</p><p> Alternatively, if
      you are benefiting from Tricksters Soul Binding when you use this feature, you both cast the jutsu simultaneously
      enhancing it.</p><p> You gain the previous benefit allotted by this feature, though it can now occur up to twice
      per casting.</p><p> Regardless, you may use this feature a number of times equal to your Charisma Ability Modifier
      per long rest.</p><p> If you attempt to use this feature when you have no more uses left, you may spend a
      Superiority Die to use it.</p><p></p>
