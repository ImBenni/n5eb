name: 'Power Up: Concentrate'
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>You spend a Bonus Action and expend a superiority to strengthen the next Ninjutsu or Genjutsu you cast.</p><p>
      The next time you deal damage with a Ninjutsu or Genjutsu, you reroll all 1's and 2's.</p><p> If this maneuver is
      used by your Void soul, or while you are benefiting from Tricksters Soul Binding you also add twice the
      Superiority Die result, rerolling 1's and 2's.</p><p></p>
