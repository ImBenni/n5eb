name: 'Power Up: Focus'
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>You spend a bonus action and expend a superiority to strengthen the next Jutsu you cast.\_</p><p>You roll your superiority die and record the result.\_</p><p>The next time you deal damage with a Jutsu you cast, you increase the damage die by 1 Step.\_</p><p>If this maneuver is used by your Void soul, or while you are benefiting from Tricksters Soul Binding you instead, increase the damage die by two steps and add twice the Superiority die to the damage rolled.</p>"
