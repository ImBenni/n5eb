name: 'Ramp Up: Rakukaja'
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: "<p>In place of one of your attacks made by the Attack action, you spend a superiority to strengthen an allies defense.\_</p><p>Target an allied creature within 20 feet of you and roll your die.\_</p><p>The target's AC is increased by the result against the next attack made against it or it gains a bonus to its next saving throw made equal to the result.\_</p><p>Whichever comes first.\_</p><p>If this maneuver is used by your Void soul, or while you are benefiting from Tricksters Soul Binding you also grant the creature, resistance to one damage type of your choice that lasts a number of its turns equal to the result.</p>"
