name: 'Ramp Up: Sukukaja'
type: feat
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>You spend a Bonus Action and a Superiority Die superiority to strengthen an allies speed.</p><p>Target a
      willing allied creature within 20 feet of you and roll your die.</p><p>The allied creature immediately takes their
      turn (This counts as their turn for the round).</p><p>They gain a bonus to their speed equal to the result x
      5.</p><p>If this maneuver is used by your Void soul, or while you are benefiting from Tricksters Soul Binding you
      instead grant the creature a bonus to movement speed equal to the result x 10 and they gain advantage on the first
      attack roll, skill check, or saving throw they make during the turn you just granted them. (Whichever one comes
      first).</p><p></p>
