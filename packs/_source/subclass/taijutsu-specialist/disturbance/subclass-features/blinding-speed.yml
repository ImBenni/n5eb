name: Blinding Speed
type: feat
_id: wP1z08xHKdR7A2vf
img: icons/magic/control/silhouette-aura-energy.webp
system:
  description:
    value: >-
      <p>When you choose this Style, starting at 3rd level, you focus on overwhelming your enemies with more than they
      could conceivably handle at one time.</p><p>You learn to accomplish this through a series of <strong>Martial
      Techniques</strong>, unique to you and your style of combat. You learn the following two <strong>Martial
      Techniques.</strong></p><h3><strong>Shatter.</strong></h3><p>When a creature is attempting to cast a <strong>Jutsu
      within 15 feet</strong> of you, you may, as a reaction, spend <strong>1 martial die.</strong> When you do, you may
      move up to half your movement speed, ending said movement within 5 feet of the triggering creature. You may then
      choose to make <strong>two unarmed strikes,</strong> attacking their vital points and open defenses with
      precision, meant to prevent their action. If you hit with <strong>both attacks the target creature must succeed a
      Constitution saving throw.</strong> On a failed save you interrupt the jutsu, preventing its casting. The affected
      creatures Chakra is still spent. On a success, the jutsu is cast normally.</p><h3><strong>Unstable
      Core.</strong></h3><p>After you use your action to cast a Taijutsu, you may spend <strong>1 martial die</strong>.
      When you do, you make <strong>two unarmed attacks as a bonus action,</strong> adding your martial die to the
      damage rolls of each attack and forcing a creature to make a <strong>strength saving throw, being knocked prone on
      a failed save.</strong></p>
