system:
  description:
    value: >-
      <p>Also, at 3rd level, you learn to break your opponent's combat flow using your mastery over combos and repeated
      strikes.</p><p>By spending <strong>1 martial die</strong>, you are able to gain an <strong>additional bonus
      action</strong>, which you can use to <strong>cast a Taijutsu or make one additional unarmed attack</strong>
      adding the result of the die to your damage dealt. This can only be done <strong>once per turn and costs no
      action.</strong></p><p>Beginning at 17th level, your martial speed eclipses anyone who would consider themselves
      your rival. By spending 3 martial die, you are able to gain 1 additional bonus action, which you can use to cast a
      Taijutsu, with the Finisher keyword.</p>
