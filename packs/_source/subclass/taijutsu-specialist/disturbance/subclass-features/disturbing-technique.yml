system:
  description:
    value: >-
      <p>Beginning at 20th Level, your technique is so overwhelming that your enemies speak of how you should never be
      faced alone. </p><p>But you've heard the tales and have prepared for such a situation.</p><p>When you would cast a
      Taijutsu that requires you to make <strong>2 or more attacks</strong> and there are at least <strong>two or more
      hostile creatures within the jutsu's range</strong>, you may spend <strong>1 martial die</strong>, granting it the
      <strong>Disturbing</strong> keyword.</p><p>Taijutsu with the Disturbing keyword <strong>doubles the number of
      attacks made with the jutsu,</strong> but the attacks must be <strong>evenly split</strong> amongst all hostile
      creatures within the jutsu's range.</p>
