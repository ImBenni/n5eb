name: Shatter
type: feat
_id: QQELApmYSESKoCKr
img: icons/magic/lightning/bolt-strike-creature-pink.webp
system:
  description:
    value: >-
      <p>When a creature is attempting to cast a Jutsu within 15 feet of you, you may, as a Reaction, spend 1 martial
      die. When you do, you may move up to half your movement speed, ending said movement within 5 feet of the
      triggering creature. You may then choose to make two unarmed strikes, attacking their vital points and open
      defenses with precision, meant to prevent their action. If you hit with both attacks the target creature must
      succeed a Constitution saving throw. On a failed save you interrupt the jutsu, preventing its casting. The
      affected creatures Chakra is still spent. On a success, the jutsu is cast normally.</p>
    chat: ''
