name: Iron Combat
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Also, at 3rd level, you learn to leverage your unique method of protection in the heat of combat, You learn to accomplish this through a series of Martial Techniques, unique to you.\_</p><p>While wielding your Shield, you learn the following two Martial Techniques.\_</p><p><br />Interpose.\_</p><p>When an allied creature within 10 feet of you would take damage from an attack, and you could cast a Taijutsu with a casting time of a Reaction to reduce damage, the attack's to hit, or increase your AC, you can, as a Reaction, spend 1 Martial Dice, to redirect the attack to you, cast the appropriate Taijutsu, and add your Martial Dice to the Damage Reduction, to hit reduction, or AC bonus against the triggering attack.</p><p>\_<br />Shield Bash.\_</p><p>When you make an unarmed attack, you can spend 1 martial die.\_</p><p>If you do, when you hit a creature with an unarmed attack, before the end of the current turn, you may choose to shove the target creature, using your attack roll in place of your athletics check.\_</p><p>If you are successful, you deal your unarmed damage + your martial die and the target creature becomes bruised.</p>"
