name: Iron Fury
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Starting at 14th level, you no longer stand idly by while your allies are hurt.\_</p><p>Twice per rest, as an action, you may spend 4 martial die to enter a combat trance for 1 minute, devoting your mind, body, and soul to safeguard your friends, and show your enemies retribution.\_</p><p>You gain the following benefits for the duration:</p><p>• You have resistance to all damage except Psychic damage.\_<br />• When you use your Iron Heart Feature, you may make two unarmed attacks against the triggering creature as a part of the same action.\_<br />• Your Shield Provides you an additional +1 Bonus to AC while holding it.</p>"
