name: Iron Heart
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Starting at 6th level, you've become comfortable fighting behind your defenses, and have gained the skill and courage needed to use yourself as a shield for your allies.\_</p><p>As a Reaction, when a creature within 5 feet of you is hit by an attack that deals any type of damage, excluding psychic, you may dive in front of them, using your armor and shield to take the brunt of the force.\_</p><p>The damage is reduced by your Unarmed Combat die + your proficiency bonus.\_</p><p>Rather than the initial target, the attack hits you regardless of your AC or other abilities.\_</p><p>At 14th level, you may also target an ally who is no further than your maximum movement speed.\_</p><p>When you do you move towards them ending your movement adjacent to them in a space that can hold you.\_</p><p>Additionally, you can now target an ally who is in the area of effect of a jutsu like Fireball.\_</p><p>When you do, your ally automatically passes their save, taking no further effect, and you gain disadvantage on your save.</p>"
