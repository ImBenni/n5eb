system:
  description:
    value: "<p>When you choose this style starting at 3rd level, your passion for protection has borne fruit.\_<br />You gain proficiency in Heavy Armor, and the Armor smith's Kit.\_</p><p>While wearing heavy armor, you still gain the benefits of Enhanced Movement.\_</p><p>Additionally, your research in metallurgy has allowed you to create an item no other shinobi could or would consider making; A Shield.\_</p><p>Your Shield is a piece of equipment that you gain proficiency in.\_</p><p>Your Shield has 3 Seal slots.\_</p><p>If your shield is ever lost or destroyed, you may craft an exact copy of the previous one using 100 ryo and 1 downtime.\_</p><p>You may only benefit from one shield at a time.\_</p><p>This shield has the following statistics:</p><img src=\"systems/n5eb/assets/content/cheat-sheets/iron-clad-shield.webp\" />"
