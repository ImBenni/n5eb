name: Elemental Cloak
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you have learned to manifest your Elemental Chakra into a full-blown Chakra cloak that
      erupts off of your body.</p><p> When you would gain the benefits of Nature Enhanced Combat you gain the following
      boosts to each Nature Release; </p><p>• Earth Release: Dust, gravel and other Earthen substances begin to form
      around you.<br /> You gain resistance to Earth damage, and gain +4 damage reduction vs all sources (Excluding
      Psychic).</p><p> • Wind Release: Wind whips around you violently.<br /> You gain resistance to Wind damage.<br />
      You gain immunity to effects that would create a cloud, gas or mist as they cannot be sustained within 10 feet of
      you.</p><p> • Fire Release: Your body becomes wreathed in flames.<br /> You become resistant to Fire damage and
      once per turn, creatures of your choice, who deal damage to you with a melee attack or effect with a range of
      touch, takes Fire damage equal to 2 Martial Dice.</p><p> • Water Release: You generate gales of Water that spirals
      around you.<br /> You become resistant to cold damage and effects that would push, pull or knock you prone as the
      result of a save or contested check, add 1 Martial Dice to the roll.</p><p> • Lightning Release: Your body becomes
      clad in Lightning that oscillates violently.<br /> You gain resistance to Lightning damage and when you take the
      dash action, you can make 1 unarmed attack as part of the same action.</p><p></p>
