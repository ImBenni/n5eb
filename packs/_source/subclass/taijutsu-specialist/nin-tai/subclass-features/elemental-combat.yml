name: Elemental Combat
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Also, at 3rd level, you learn to harness your new Elemental Chakra to better enhance your combat potential when utilizing elemental combo's.\_</p><p>When using a Taijutsu while gaining the benefits of the Nature Enhanced Combat class feature the taijutsu used gains the Nature Release Keyword you chose and deals that nature release keywords corresponding damage type.\_</p><p>You learn to accomplish this through a series of Martial Techniques, unique to you and your style of combat.\_</p><p>You learn the following two Martial Techniques.\_</p><p></p><p>Elemental Rush.\_</p><p>Whenever you hit a creature with at least two melee Taijutsu attacks, while gaining the benefits of your Nature Enhanced Combat class feature, you can spend 1 Martial die, allowing you to make two unarmed attacks as a Reaction.\_</p><p>Elemental Crush.\_</p><p>When you would deal damage with a Taijutsu you cast, you may spend any number of Martial die to deal additional damage equal to twice the result.\_</p><p>Once you use this Technique, you have to spend an equal number of Martial die to recharge it.</p>"
