name: Nin-Tai Technique
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Beginning at 20th Level, your technique is so overwhelmingly powerful that your enemies speak of you as if you are a force of nature.\_</p><p>Something that is unavoidable and if encountered, can only be weathered.\_</p><p>When you would cast a Taijutsu that requires you to make no more than 1 attack, you may spend 4 martial die, granting it the Nin-Tai keyword.\_</p><p>Taijutsu with the Nin-Tai keyword scores a critical hit on a D20 roll of a 10 or better.\_</p><p>Once you use this feature, you must spend 4 martial die at the beginning of one of your turns to recharge this feature.</p>"
