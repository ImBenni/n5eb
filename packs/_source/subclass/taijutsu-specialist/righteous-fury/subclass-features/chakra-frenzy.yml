name: Chakra Frenzy
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>When you choose this style starting at 3rd level, you gain the ability to focus your Chakra into a frenzy of berserker energy, provided that you aren't wearing heavy armor.\_</p><p>It empowers you with supernatural combat skills.\_</p><p>You can spend 1 Martial die and a bonus action to enter a Chakra Frenzy for up to 1 minute, gaining the following benefits:</p><p>\_</p><p>• You have advantage on Strength Ability checks, skill checks and Saving throws.\_</p><p><br />• When you make melee weapon attacks using Strength or Dexterity, you gain a bonus to damage rolls equal to your Martial die.\_<br />You choose which ability score when you enter your Chakra frenzy.\_</p><p><br />• You have resistance to bludgeoning, piercing and slashing damage.\_</p><p><br />While your Chakra Frenzy is active, you can only maintain concentration on Jutsu with a range of Self.\_</p><p>Your Chakra Frenzy ends early if you are knocked unconscious or if your turn ends and you have not attacked a hostile creature or forced one to make a saving throw or you have not taken damage since then.\_</p><p>You can also, end your Chakra Frenzy on your turn as a bonus action.</p>"
