name: Frenzied Assault
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>When you choose this Style, starting at 3rd level, your rage, fury and passion is weaponized to overwhelm your targets with pure force.\_</p><p>You learn to accomplish this through a series of Martial Techniques, unique to you and your style of combat.\_</p><p>You learn the following two Martial Techniques.\_</p><p><br />Savage Force.\_</p><p><br />When you score a successful hit on a creature with a Taijutsu attack that deals unarmed damage, you can spend up to 2 Martial die.\_</p><p>When you do you increase the damage of your attack by an amount equal to three times the result of the martial die.\_</p><p>In return the next melee attack that would deal damage to you cannot be reacted to or have its value reduced.\_</p><p><br />Tyrants Savagery.\_</p><p><br />When a creature would deal damage to you, you can spend any number of Martial die.\_<br />When you do record the result.\_</p><p>The next time you would deal damage to that creature you deal additional damage equal to twice the result.</p>"
