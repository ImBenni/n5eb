system:
  description:
    value: "<p>Beginning at 17th level, your passionate anger has reached a zenith so pure, that others who follow this path can only ponder how it is you attained this level of wrath.\_</p><p>While you are gaining the benefits of your Chakra Frenzy class feature, you have become unstoppable.\_</p><p>For the duration of the Chakra Frenzy your speed cannot be reduced, and you are immune to the Berserk, Charmed and frightened, and stunned conditions.\_</p><p>If you are frightened, or stunned, you can still take your bonus action to enter your Chakra Frenzy, immediately ending the aforementioned effects.</p>"
