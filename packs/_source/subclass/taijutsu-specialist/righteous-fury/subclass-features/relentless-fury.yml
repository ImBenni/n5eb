name: Relentless Fury
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Starting at 9th level, your fury can keep you fighting despite grievous wounds.\_</p><p>If you drop to 0 hit points while your Chakra Frenzy is active, you can spend 1 Martial die to not immediately die or fall unconscious.\_</p><p>Make a DC 10 Constitution ability check.\_</p><p>If you succeed, you drop to 1 hit point instead.\_</p><p>Each time you use this feature after the first, the DC increases by 2.\_</p><p>When you finish a short or long rest, the DC resets to 10.\_</p><p>When you reach 17th level, each time you succeed on this ability check, your fury further invigorates you, granting you advantage on any attacks you make until the end of your next turn</p>"
