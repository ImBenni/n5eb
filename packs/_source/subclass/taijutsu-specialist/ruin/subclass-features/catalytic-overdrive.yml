name: Catalytic Overdrive!
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Starting at 9th level, by spending 1 Martial Die at the beginning of each of your turns you are able to push your Catalyst into overdrive until the beginning of your next turn.\_</p><p>While your catalyst is in overdrive, you gain the following benefits:</p><p><br />• +1 bonus to AC.\_<br />• +1d4 bonus to all strength, dexterity and constitution ability checks</p><p>• +1d6 bonus to all taijutsu damage rolls.\_<br />• Bonus to all saving throws against jutsu with keywords chosen with the Anti-Chakra Wavelength class feature equal to 1 Martial die.\_</p><p><br />While your Catalyst is in overdrive, you can only maintain concentration on one jutsu and if you would be incapacitated, stunned, your Catalyst short circuits, being unable to enter an overdrive state for the next 10 minutes.</p>"
