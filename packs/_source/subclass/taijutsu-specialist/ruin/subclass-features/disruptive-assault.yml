name: Disruptive Assault
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Starting at 6th level, you've honed your disrupting combat style to a point where you can easily follow through with your attacks, even when your enemies try their best to resist.\_</p><p>Once per turn, when you deal unarmed damage, you can spend up to two Martial die.\_</p><p>When you do the target takes Chakra damage equal to twice the result.\_</p><p>This increases to three times the result at 14th level and four times the result at 20th.\_</p><p>If the target is gaining the benefit of a jutsu with a keyword chosen as a result of the Anti-Chakra Wavelength class feature, then you add your proficiency bonus to the Chakra damage dealt.</p>"
