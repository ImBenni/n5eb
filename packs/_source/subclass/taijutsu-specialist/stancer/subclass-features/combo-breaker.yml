name: Combo Breaker
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>When you choose this Style, starting at 3rd level, your technique, style and mastery is weaponized to drift and fuse a myriad of fighting styles to defeat your targets with pure grace.\_</p><p>You learn to accomplish this through a series of Martial Techniques, unique to you and your style of combat.\_</p><p>You learn the following two Martial Techniques.\_</p><p><br />Alpha Counter.\_</p><p><br />When a creature misses you with an attack, you may as a reaction spend 1 Martial die.</p><p><br />When you do, you may immediately make two unarmed attacks against the triggering creature, adding the Martial die to the damage rolled.\_</p><p>If at least one of these attacks hit, you force the target creature to make a Strength saving throw, being unable to use a reaction until the beginning of their next turn on a failed save.\_</p><p><br />Dodge Cancel.\_</p><p><br />When you hit a creature with at least two unarmed attacks, you can spend 1 Martial Dice. </p><p>hen you do, until the end of the target creature's next turn, the first attack targeting you each turn suffers a penalty to hit equal to your Martial Dice.</p>"
