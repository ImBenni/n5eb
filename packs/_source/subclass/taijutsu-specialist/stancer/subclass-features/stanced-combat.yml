name: Stanced Combat
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Beginning at 14th level, you've perfected fighting with multiple stances at once.\_</p><p>If you are gaining the benefit of a stance that has a special action, that you can use as a Bonus action (Ex. Serpent Fist's bonus action ability, or Dragon Fist's bonus action ability), you can instead spend 1 Martial die to perform any special bonus action as a part of your Attack action, at no additional cost, once per round, only on your turn.\_</p><p>If a stance you are benefiting from has a special ability that requires An Action, or Full Turn Action, you can instead spend 1 Martial die to perform it as a Bonus action, once per turn.</p>"
    chat: ''
  source:
