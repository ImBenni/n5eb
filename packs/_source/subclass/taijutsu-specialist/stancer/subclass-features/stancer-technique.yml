system:
  description:
    value: "<p>Beginning at 20th Level, your style is so unique and graceful that your enemies speak of you as if you were the originator of the different stances and styles you've blended.\_</p><p>When you would cast a Taijutsu that requires a Taijutsu stance, you may spend 2 martial die, granting it the Stancer keyword.\_</p><p>Taijutsu with the Stancer keyword ignores immunity, bonuses to AC as a result of features, traits and jutsu, penalties to hit, penalties to damage and cost increases.</p>"
