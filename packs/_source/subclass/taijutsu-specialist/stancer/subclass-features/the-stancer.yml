name: The Stancer
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Beginning at 17th level, you have become an absolute master at combining stances into a blended cacophony of fists, kicks and strikes, mixing a variety of different forms into a stance all your own.\_</p><p>Taijutsu you cast that require a Taijutsu stance deals additional damage equal to 1 Martial die and ignore resistance &amp; treat immunity as resistance.\_</p><p>Additionally, while gaining the benefit of your Stance Blending feature, you may add your Intelligence, Wisdom or Charisma modifier (your choice) to the damage of Taijutsu attacks that add your Taijutsu ability modifier.</p>"
