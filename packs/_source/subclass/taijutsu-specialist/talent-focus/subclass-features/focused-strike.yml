name: Focused Strike
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Starting, at 17th level you all it takes is a single strike to completely immobilize and bring an enemy to their knees.\_</p><p>When you would score an unarmed or Taijutsu attack that deals unarmed damage on a creature, you can spend 3 Martial die.\_</p><p>When you do, they must succeed a Strength saving throw.\_</p><p>On a failed save, they are Stunned until the end of their next turn.\_</p><p>Once you use this feature, you must spend 5 Martial die at the beginning of one of your turns or rest for 1 hour to recharge it.</p>"
