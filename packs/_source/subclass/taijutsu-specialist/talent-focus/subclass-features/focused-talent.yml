name: Focused Talent
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>When you choose this Style, starting at 3rd level, your talent and focus is weaponized to completely drive home the point that it doesn't matter how much your enemies train to overcome you, they are out of their league and they need to come to grips with this new reality they find themselves in.\_</p><p>You learn to accomplish this through a series of Martial Techniques, unique to you and your style of combat.\_</p><p>You learn the following two Martial Techniques.\_</p><p></p><p>Redirected Aggression.\_</p><p>When a hostile creature makes a melee or ranged attack and misses, you may as a reaction, immediately spend one Martial die to redirect the missed attack back towards them.\_</p><p>Make a melee or ranged unarmed attack as a part of this reaction, using the attacks original range as your ranged attacks range.\_</p><p>On a hit, the creature suffers the effects of their own attack, as if they attacked themselves.\_</p><p><br />Shatterpoint.\_<br />Once per turn, when you score an unarmed or Taijutsu attack that deals unarmed damage, you can spend 1 Martial die.\_</p><p>When you do, the affected creature must make a Strength Saving throw, losing all temporary hit points or damage reduction-based effects they have, until the beginning of their next turn</p>"
    chat: ''
