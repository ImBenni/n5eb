name: Focused Technique
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Beginning at 20th level, your technique is legendary.\_</p><p>People speak about your abilities and tell stories to each other about you for their own notoriety.\_</p><p>When you would cast a Taijutsu, you may spend 2 martial die, granting it the Focus keyword.\_</p><p>Taijutsu with the Focus keyword forces the target creature to make a constitution saving throw, taking 2d12 damage and gaining 1 rank of weakened for every point below they DC they fail by.\_</p><p>Taijutsu with both the Talent &amp; Focus keywords gain the previous effect and reduces the targets saving throw by an amount equal to the number of keywords the jutsu has gained as a result of Martial Techniques (Ex.\_Brutal, Raw, Devastating, etc.).\_</p><p>Once you use this feature, you must spend 8 Martial die at the beginning of one of your turns or rest for 8 hours to recharge this feature.</p>"
