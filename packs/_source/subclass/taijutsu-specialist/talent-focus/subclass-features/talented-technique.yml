name: Talented Technique
type: feat
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: "<p>Beginning at 6th level, your combat prowess far surpasses everyone else who thinks they are your equal.\_</p><p>When you would cast a Taijutsu, you may spend 1 Martial die, granting it the Talent keyword.\_</p><p>Taijutsu with the Talent keyword deals additional damage die equal to the number of keywords it has a result of Martial Techniques (Ex.\_Brutal, Raw, Devastating, etc.), once per casting.\_</p><p>Once you use this feature, you must spend 2 Martial die at the beginning of one of your turns or rest for 10 minutes to recharge this feature.</p>"
