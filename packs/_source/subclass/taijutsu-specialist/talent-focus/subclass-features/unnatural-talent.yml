system:
  description:
    value: "<p>When you choose this Style starting at 3rd level, you focus all of your effort on surpassing the limits of your body, allowing you to perform more Martial Techniques than normally possible.\_</p><p>You increase your pool of Martial die by +1.\_</p><p>You gain an additional +1 increase to your Martial die pool as you gain levels in this class based on the Unnatural Talent Martial Die Chart.\_</p><p>Additionally, unarmed attacks you make are treated as if they have the Critical, Deadly and Multiattack weapon properties.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/unnatural-talent.webp\" />"
