name: Master Of Aggression
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>At 20th level, your presence on the battlefield is a graceful blur of deadly blades, crippling hammers and
      daring acrobatics.</p><p> Your Strength or Dexterity scores increase by 2.</p><p> Your maximum for those scores
      increases by 2.</p><p> As an Action, by spending 3 Chakra die, you select a space you can see within 90 feet of
      you.</p><p> You spend your movement moving at unreal speeds in a straight line towards the target, ending your
      movement within it, ignoring all difficult terrain or obstructions in your path.</p><p> This movement does not
      provoke attacks of opportunity.</p><p> All creatures of your choice within 10 feet of the path you took becomes
      targets for the following.</p><p> Make a two melee Taijutsu attacks at advantage as if casting a Bukijutsu,
      comparing the results against the lowest AC target amongst all those chosen.</p><p> You can use any of your Flurry
      Techniques effects twice as part of each attack.</p><p> If your attack result is 10 or greater than the target AC
      you treat the attack a critical hit.</p><p> Regardless, on a successful hit, all select creatures take 10dx + your
      Strength or Dexterity ability modifier.</p><p> (X = your [Weapons Damage] die size.).</p><p> A critical hit
      doubles the listed damage die and all affected creatures become Staggered and Incapacitated.</p><p> Incapacitated
      creatures make a Strength saving throw at the end of each of their turns vs your Taijutsu save DC to end the
      Incapacitated condition.</p><p> You can use this feature once per rest.</p><p></p>
    chat: ''
