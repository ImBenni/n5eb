system:
  description:
    value: >-
      <p>When you would reduce a creatures hit points to 0, using a weapon that deals bludgeoning damage, you gain an
      additional action, which you can use to make a single weapon attack.</p><p>This additional attack deals additional
      damage equal to 2 flurry die.</p><p>If you trigger this effect more than once, you continue to add additional
      flurry die with each trigger.</p><p>You can use this feature a number of times equal to your Taijutsu ability
      modifier per long rest.</p>
