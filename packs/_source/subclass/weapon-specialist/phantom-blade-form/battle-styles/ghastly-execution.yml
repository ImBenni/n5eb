system:
  description:
    value: "<p>When you would reduce a creatures hit points to 0 using a melee weapon that does slashing damage, the damage is delayed until the beginning of their next turn.\_</p><p>You gain an additional Action, which can be used to take the attack action using a melee weapon attack that deals slashing damage, targeting another creature you can reach with your remaining movement.\_</p><p>If you would reduce another creatures hit points to 0 using this new attack, delay the damage as you did prior, gaining a new action with the same limitation as before.\_</p><p>You can gain a number of additional actions this way three times per rest.\_</p>"
