  description:
    value: "<p><span style=\"font-family:Signika, sans-serif\">Once per turn, when you target a creature with a melee weapon attack or Bukijutsu, with a weapon that deals slashing damage, you may, cause your blade to gain the properties of a ghost, moving through all defenses at once.\_</span></p><p><span style=\"font-family:Signika, sans-serif\">Roll 1 Flurry Die.\_</span></p><p><span style=\"font-family:Signika, sans-serif\">Reduce the targets Armor Class by half of the result, until the end of your current turn, against only your attacks.\_</span></p><p><span style=\"font-family:Signika, sans-serif\">You may use this stance twice per rest.</span></p>"
