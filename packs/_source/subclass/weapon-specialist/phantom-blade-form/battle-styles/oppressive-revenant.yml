    value: "<p>When you would cast a Bukijutsu with a melee weapon that deals slashing damage, you may as a Bonus Acton release a surge of phantasmal chakra.\_</p><p>All creatures within 15 feet of you must succeed a Constitution Saving throw, being unable to Mold Chakra or make a reaction against you until the end of your next turn.\_</p><p>Creatures affected by this feature, takes additional damage equal to your Flurry die once per turn when they would take damage.\_</p><p>You can use this feature twice per long rest.\_</p>"
