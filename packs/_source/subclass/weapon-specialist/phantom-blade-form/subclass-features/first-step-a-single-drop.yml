name: 'First Step: A Single Drop'
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: "<p>Starting at 6th Level, you have learned that delaying attacks can grow stronger, the longer they are delayed.\_</p><p>When you would delay damage using any Weapon Specialist Class Feature, you may extend the delayed damage up to the end of your next turn.\_</p><p>When you do, the delayed damage dealt increased by an amount equal to 4 flurry die.\_</p><p>You may use this as part of the feature twice per short rest.\_</p><p>Additionally, when you would use a Flurry Technique granted by the Phantom blade subclass, that rolls a flurry die, you roll one additional Flurry die, adding it to the results of any effect used.</p>"
