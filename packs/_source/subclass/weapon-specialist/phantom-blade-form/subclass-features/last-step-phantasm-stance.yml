system:
  description:
    value: "<p>At 20th level, your presence on the battlefield is a ghastly visage of ghoulish attacks, and dastardly blades.\_</p><p>Your Strength or Dexterity (your choice) and Wisdom or Intelligence scores (your choice) increase by 2.\_</p><p>Your maximum for those scores increases by 2.\_</p><p>Additionally, when you would roll flurry die you roll an additional flurry die.\_</p><p>This is in addition to First Step: A Single Drop. </p><p>When you would roll a flurry die, if the result of the roll on the roll is less than 4, The result becomes 4.</p>"
