name: 'Second Step: Overflowing Malice'
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 13th Level, you can use your action to take the Overflowing Malice stance, so long as you have a
      melee weapon that deals slashing damage.</p><p>When you do, you gain a special Reaction call Retribution that can
      only be triggered by creatures within 15 feet of you that take any action or moves.</p><p>This special Reaction,
      when taken does not spend your normal Reaction.</p><p>Retribution.</p><p>Your weapon gains Reach 3 and you make a
      single melee Taijutsu attack against the triggering creature.</p><p>This attack is treated as if you casted a
      Bukijutsu at A-Rank with the Clash keyword, swiping fast enough cut through most forms of matter.</p><p>On a hit,
      you deal twice your [Weapons Damage] and if you are Delaying any damage on that creature as a result of any
      Phantom Blade subclass feature, you immediately trigger that delayed damage.</p>
    chat: ''
