system:
  description:
    value: "<p>As a Bonus action on your turn, you bathe your weapon in your chosen Nature Release.\_<br />For the next minute, your weapons damage counts as both its original damage type, and your chosen nature release's corresponding damage type for the purpose of triggering features or other jutsu you cast.\_</p><p>Additionally, when you deal damage with your weapon as a result of a weapon or Taijutsu attack, you deal additional damage equal to 1 Flurry die of your chosen nature releases type for the next minute.\_</p><p>You can use this feature a number of times equal to your proficiency bonus per long rest.\_</p>"
