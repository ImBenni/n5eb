system:
  description:
    value: "<p>As a Reaction, when you see a creature within 60 feet of you cast a Ninjutsu, Taijutsu, or Bukijutsu that would deal damage, you can cast a Bukijutsu you know with a casting time of 1 Action.\_</p><p>This Bukijutsu gains the Clash keyword if it didn't prior, and you immediately initiate a Clash.\_</p><p>If the triggering Ninjutsu does not have the Clash keyword, they make their Clash check at disadvantage.\_</p><p>You may use this feature twice per short rest.</p>"
