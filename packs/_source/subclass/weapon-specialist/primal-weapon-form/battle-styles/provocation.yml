system:
  description:
    value: "<p>As an action, you select one creature you can see within 30 feet of you.\_</p><p>You mark them with a special nature seal.\_</p><p>For the next minute, each time you score a hit with a Bukijutsu you cast, the seal grows in size, gaining 1 charge.\_</p><p>This special seal can hold up to 10 charges.\_</p><p>As a bonus action on your turn, you can trigger this seal to detonate, dealing 1d8 damage of a type equal to your chosen nature releases corresponding damage type for each charge present when it detonated.\_</p>"
