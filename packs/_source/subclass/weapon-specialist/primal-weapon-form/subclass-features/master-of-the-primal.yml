name: Master Of The Primal
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: "<p>Starting, at 20th level, your presence on the battlefield is an explosion of the elements and weapons.\_</p><p>Your Strength or Dexterity (your choice) and Intelligence scores increase by 2.\_</p><p>Your maximum for those scores also increases by 2.\_</p><p>Additionally, you can use your Action and 3 Chakra die to gain the following benefits for 1 minute.\_</p><p>These effects end early if you are incapacitated or fall to 0 hit points.\_</p><p>Once you've used this feature, you can't use it again until you finish a long rest:</p><p>• You gain Resistance to Slashing, Piercing and Bludgeoning Damage.\_<br />• Once per turn, when an ally takes the attack action within 30 feet of you, you may add 2 Flurry die to their damage roll, of your chosen nature releases damage type.\_<br />• When you cast a Jutsu of your chosen Nature Release, you can take the Attack Action, as a bonus action.</p>"
    chat: ''
