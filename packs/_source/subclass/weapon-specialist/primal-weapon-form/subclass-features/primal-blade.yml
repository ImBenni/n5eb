name: Primal Blade
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Beginning, at 6th level, you learn to manifest a weapon made of pure chakra.</p><p>Once per turn at no action
      cost, you can manifest or unsummon your primal weapon.</p><p>The weapon manifested must be one you have as a
      Weapon Focus.</p><p>This weapon is Chakra Enhanced, its damage counts as both its original weapons damage type and
      as your nature releases corresponding damage type for the purpose of jutsu and Weapon Specialist class feature
      interactions.</p><p>This weapon gains all weapon seals and properties from any one weapon you currently have as
      your Weapon Focus.</p><p>Additionally, you can use up to two Flurry Techniques granted by the Primal Weapon
      subclass while using your Primal Weapon.</p><p>During Primal Weapon, the first ninjutsu you cast that deals your
      nature release's corresponding damage type each turn is treated as having the Chain X keyword.</p><p>Finally, for
      the duration of your Primal Weapon, if yourself or a willing creature casts a Bukijutsu while within 15 feet of
      you, you can spend 5 chakra to enhance it, giving the jutsu cast your chosen nature release keyword, and adding 1
      flurry die to its damage roll.</p>
