  description:
    value: "<p>Starting, at 13th level, the first time each turn, you would inflict your chosen nature releases Primal Effect condition as a result of a Bukijutsu you cast or Weapon special class feature, that condition is magnified, increasing the number of ranks they gain by +1.\_</p><p>Additionally, when a target within range of your weapon fails a saving throw for a jutsu you cast that deals your nature releases corresponding damage type, you can cast a Bukijutsu with the chain keyword as a bonus action that turn.</p><img src=\"systems/n5eb/assets/content/cheat-sheets/primal-effect.webp\" />"
