system:
  description:
    value: "<p>Beginning at 13th Level, you learn to perform miracles with your ranged weapons.\_</p><p>On your first turn in combat, if you are not surprised, you can use your attack action to attack creatures that have not acted yet.\_</p><p>Choose up to 6 creatures that you can see within 90 feet of you.\_</p><p>Make a ranged weapon attack targeting each creature.\_</p><p>On a hit, you deal your weapons damage and can apply a Flurry Technique to each attack made this way.\_</p><p>Once you've used this feature you must complete a rest before you can use it again.</p>"
