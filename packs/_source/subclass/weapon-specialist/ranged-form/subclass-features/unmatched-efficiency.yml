name: Unmatched Efficiency
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: "<p>At 20th Level, you have an unmated efficiency for your agility.\_</p><p>Your Dexterity and Wisdom scores increase by 2.\_</p><p>Your maximum for those scores increases by 2.\_</p><p>Additionally, once per turn if a ranged weapon attack you make, misses a target creature you can treat the miss as a hit.\_</p><p>Alternatively, if you fail a Dexterity or Wisdom saving throw, you may treat it as a success.\_<br />You can use each of these effects twice per rest.</p>"
