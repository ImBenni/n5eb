system:
  description:
    value: >-
      <p>As a Bonus Action, you enter a defensive stance.</p><p>Until the start of your next turn, you gain one of the
      following benefits.</p><p>Once you gain this benefit of this stance twice, you must complete a short rest before
      you can gain its benefits again; • You gain two special Reactions called Defensive Offense &amp; Defensive
      Break.</p><p>You can use either of these Reactions a combined total of twice, before the beginning of your next
      turn.</p><p>- Defensive Offense.</p><p>As a Reaction to a hostile creature making a melee attack targeting you,
      you make a weapon attack targeting the triggering creature.</p><p>- Defensive Break.</p><p>As a Reaction to a
      hostile creatures ranged attack, make a weapon attack.</p><p>If the result of your weapon attack roll is greater
      than the triggering creatures attack total, their attack is negated.</p>
    chat: ''
