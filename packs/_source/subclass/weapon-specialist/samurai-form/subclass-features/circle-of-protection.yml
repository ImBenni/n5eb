name: Circle Of Protection
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>At 6th Level, you learn to fend off attacks directed at you and other nearby creatures.</p><p>If you or a
      creature you can see within 10 feet of you takes damage, as a Reaction, you ward everyone near you.</p><p>Roll 1
      flurry die, recording the result.</p><p>You grant yourself and allied creatures within 10 feet of you; a Bonus to
      AC equal to half the result vs the triggering attack.</p><p>If the attack would still hit, you grant yourself and
      all affected allies DR vs the triggering creature equal to the result until the beginning of your next
      turn.</p><p>You can use this feature twice per short rest.</p>
