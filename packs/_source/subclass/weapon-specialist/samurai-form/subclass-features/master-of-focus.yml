name: Master Of Focus
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: "<p>At 20th level, you might overwhelm even the most implacable of foes.\_</p><p>Your Strength and Constitution scores increase by 2.\_</p><p>Your maximum for these scores increases by 2.\_</p><p>Additionally, as an action, you can spend 3 Chakra die to gain the following benefits for 1 minute:</p><p>\_</p><p>• You have resistance to Slashing, Bludgeoning or piercing damage.\_</p><p>• When an ally within 30 feet of you takes the Attack action, they can make one additional attack as a part of that same action.\_</p><p>• Your attack rolls can't suffer from disadvantage.\_</p><p>• Whenever a creature hits you with a melee attack, it takes force damage equal to half of the damage you take from the attack.\_</p><p>• Enhanced Strikes now counts for Bukijutsu that use chosen weapon.</p>"
