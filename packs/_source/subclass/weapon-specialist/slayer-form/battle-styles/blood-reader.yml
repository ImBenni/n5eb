    value: >-
      <p>As an action select one creature you can see within 120 feet of you and make a Survival Check vs a DC (8 + The
      creatures Level.)</p><p>On a success, you become aware of the creatures current Hit Point total.</p><p>You can use
      this feature once per creature, per short rest.</p><p>If you use this feature against another creature, you lose
      awareness on the previous creatures hit points regardless if you pass or fail.</p>
