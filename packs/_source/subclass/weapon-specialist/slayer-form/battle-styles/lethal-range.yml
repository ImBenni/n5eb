system:
  description:
    value: >-
      <p>When you cast a Bukijutsu that makes a melee Taijutsu attack, increases its range by +10 feet, and deal
      additional damage equal to 1 flurry die.</p><p>If the Bukijutsu makes a ranged Taijutsu attack, increases its
      range by +20 feet and on a hit can benefit from two flurry techniques this turn.</p><p>Once you use this Style,
      you cannot gain its benefits until the end of your next turn.</p>
