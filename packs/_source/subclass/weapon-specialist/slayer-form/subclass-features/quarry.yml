name: Quarry
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 13th level, When you would mark a creature as your Studied Target, you can instead mark them as
      your Quarry.</p><p> You can have no more than one Quarry at a time.</p><p> A creature is marked as your Quarry
      until you complete a rest of any type, they reach 0 hit points, are removed from the same dimension, or you
      removed them as a Bonus Action (Your choice).</p><p> You can trigger up to two Flurry Techniques at once on your
      Quarry as part of the same action, even if they normally have different action costs/requirements.</p><p>
      Additionally, you ignore difficult terrain and your movement speed cannot be reduced by any means when moving in a
      straight line towards your Quarry</p>
