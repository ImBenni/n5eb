name: Slayer Techniques
type: feat
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you learn additional Flurry Techniques that supplement your Slayer Weapon
      Form.</p><p>These Flurry Technique effects all refer to a unique ability which allows them to Study a
      creature.</p><p>A creatures studied by any of these effects are hereby known as a Studied Target for the purpose
      of Class features that refer to it.</p><p>You can only have one Studied Target at a time.</p><p></p><p>Studied
      Crippling.</p><p>Studied Strike.</p>
