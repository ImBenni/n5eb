system:
  description:
    value: >-
      <p>Dogs and wolves are loyal animals. Dogs serve those who treat them with kindness and respect. Wolves serve
      powerful and unnerving leaders.</p><hr /><p><strong>Summon Type:</strong>
      Carnivoran</p><p><strong>Toughness</strong>: 8</p><p><strong>Defensive Ability Score</strong>:
      Dexterity</p><p><strong>Saving Throws</strong>: Dexterity, Intelligence, Wisdom</p><p><strong>Creature
      Skills</strong>: Athletics, Perception, Insight</p><p><strong>Creature Senses</strong>: Darkvision (30ft), Keen
      Smell &amp; Hearing</p><hr /><h3>Roles</h3><p>Dogs/Wolves are extremely wise and intelligent creatures. Capable of
      strategizing with its summoner in a series of tactical options overwhelming their enemies. When creating a
      Summoned creature, select one of the following roles;</p><ul><li><p><strong>Striker</strong>: This Summon has the
      Multiattack trait. <strong>Multiattack</strong>: You can make up to two attacks using your Bite. Bite attacks add
      your Dexterity to damage rolls once per turn.</p></li><li><p><strong>Lurker</strong>: This summon prioritizes
      surprise attacks and stealth tactics. This summon gains the <strong>Lethal Attack</strong> trait. <strong>Lethal
      Attack</strong>: Once per turn, you can deal extra damage to one creature you hit with an attack if another enemy
      of the target is within 5 feet of it. This extra damage is Xd8. (X=Half the summons level)</p></li></ul>
    chat: ''
