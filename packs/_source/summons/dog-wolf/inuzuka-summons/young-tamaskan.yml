system:
  description:
    value: >-
      <p>From the Inuzuka @UUID[Compendium.n5eb.clan.Item.uvQdkZlw2ofp6Jfy]{Beast Master}<br />A breed known for its
      ability to mold Chakra. This Nin-Dog gains the following; </p><ul><li><p>Proficiency in Chakra control and
      Ninshou. </p></li><li><p>+1 ranks of Mastery in Insight. </p></li><li><p>Learns 1 Jutsu of D-Rank following the
      Dog/Wolf Jutsu specialty limits </p></li><li><p>The first jutsu your Nin-Dog casts per short rest, does not spend
      a Jutsu Slot. </p></li><li><p>Beginning at 11th level, this Nin-Dog learns 1 CRank jutsu following the Dog/Wolf
      Jutsu specialty limits</p></li></ul><hr /><p>Dogs and wolves are loyal animals. Dogs serve those who treat them
      with kindness and respect. Wolves serve powerful and unnerving leaders.</p><hr /><p><strong>Summon Type:</strong>
      Carnivoran</p><p><strong>Toughness</strong>: 10</p><p><strong>Defensive Ability Score</strong>:
      Dexterity</p><p><strong>Saving Throws</strong>: Strength, Dexterity, Constituation, Intelligence, Wisdom,
      Charisma</p><p><strong>Creature Skills</strong>: Athletics, Perception, Insight</p><p><strong>Creature
      Senses</strong>: Darkvision (30ft), Keen Smell &amp; Hearing</p>
