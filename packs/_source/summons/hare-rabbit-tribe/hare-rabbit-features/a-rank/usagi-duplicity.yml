system:
  description:
    value: >-
      <p>This summon can spend one of its <strong>Jutsu Slots</strong> to multiply, creating a clone of itself. The
      clone made only has an Action and 40 feet of movement. It performs the same actions and casts the same jutsu the
      summoner commands the summon to perform. Once the clone casts a jutsu, it is unsummoned. This summon can clone
      itself once per long rest.</p>
