system:
  description:
    value: >-
      <p>Lizards are patient and capable warriors. They can be bipeds or quadrupeds, and are suited to a number of
      different tasks. They are often seen as lesser cousins of dragons, a comparison they heavily dislike. Lizards love
      to win, and will only serve those who do not look down upon the weak.</p><hr /><p><strong>Summon Type</strong>:
      Dragon</p><p><strong>Toughness</strong>: 8</p><p><strong>Defensive Ability Score</strong>:
      Strength</p><p><strong>Saving Throws</strong>: Strength, Constitution, Wisdom</p><p><strong>Creature
      Skills</strong>: Athletics, Acrobatics, Stealth</p><p><strong>Creature Senses</strong>: Tremor sense (30ft), Keen
      Smell</p><hr /><h2>Roles</h2><p>Lizards are the tax collectors of the Sage tribes. Their society is heavily run by
      currency and fair exchange. This is expressed in their combat and control-based fighting styles. When creating a
      Summoned creature, select one of the following roles;</p><ul><li><p><strong>Striker</strong>: This Summon has the
      Multiattack trait. </p><p>Multiattack: It can make up to two attacks using its Simple weapon or Tail. These
      attacks add its Dexterity to damage rolls once per turn.</p></li><li><p><strong>Controller</strong>: This summon
      gains a bonus to their Save DC equal to their rank when summoned (D-Rank/C-Rank: +1, B-Rank/A-Rank: +2, S-Rank:
      +3)</p></li></ul>
    chat: ''
