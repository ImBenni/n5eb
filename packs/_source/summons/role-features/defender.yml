  dae:
    macro:
      name: Defender
      img: icons/equipment/shield/kite-wooden-dragon-green.webp
      type: script
      scope: global
      command: |-
        const version = "1.5.0";
        try {
          const lastArg = args[args.length - 1];

          const actor = game.actors.get(lastArg.actorId);
          if (!actor) {
            ui.notifications.error("Actor not found for the macro.");
            return;
          }

          if (actor.system.details?.npcType !== "summon") {
            ui.notifications.error("This macro only applies to summoned creatures.");
            return;
          }

          const rank = actor.system.details.rank?.toLowerCase();
          if (!rank) {
            ui.notifications.error("Rank not found for this summon.");
            return;
          }

          const acBonusByRank = {
            drank: 1,
            crank: 1,
            brank: 2,
            arank: 2,
            srank: 3,
          };

          const additionalAcBonus = acBonusByRank[rank] || 0;
          await actor.setFlag("n5eb", "summonAcBonus", additionalAcBonus);

          ui.notifications.info(`AC bonus set to +${additionalAcBonus} for rank ${rank.toUpperCase()}`);

        } catch (err) {
          console.error(`Defender Macro ${version}`, err);
        }
