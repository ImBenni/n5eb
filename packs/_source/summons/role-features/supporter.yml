  dae:
    macro:
      name: Supporter
      img: icons/magic/life/ankh-shadow-green.webp
      type: script
      scope: global
      command: |-
        const version = "1.0.0";
        try {
          const lastArg = args[args.length - 1];

          // Get the actor
          const actor = game.actors.get(lastArg.actorId);
          if (!actor) {
            ui.notifications.error("Actor not found for the macro.");
            return;
          }

          // Check if the actor is a summon
          if (actor.system.details?.npcType !== "summon") {
            ui.notifications.error("This macro only applies to summoned creatures.");
            return;
          }

          // Retrieve the rank of the summon
          const rank = actor.system.details.rank?.toLowerCase();
          if (!rank) {
            ui.notifications.error("Rank not found for this summon.");
            return;
          }

          // Define the healing/temporary hit points bonus based on the rank
          const healingBonusByRank = {
            drank: 1,
            crank: 1,
            brank: 2,
            arank: 2,
            srank: 3,
          };

          // Get the additional healing bonus dice
          const additionalHealingBonus = healingBonusByRank[rank] || 0;

          // Store the healing bonus in the actor flags
          await actor.setFlag("n5eb", "summonHealingBonus", additionalHealingBonus);

          ui.notifications.info(`Healing/Temp HP bonus dice set to +${additionalHealingBonus} for rank ${rank.toUpperCase()}`);

        } catch (err) {
          console.error(`Support Macro ${version}`, err);
        }
      author: R0hw7EUsG7OzIhgn
