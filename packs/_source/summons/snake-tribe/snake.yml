name: Snake
type: class
img: icons/creatures/reptiles/serpent-horned-green.webp
system:
  description:
    value: >-
      <p>There are few land creatures more dangerous, cunning, and powerful than a snake. The snake is a beast which has
      ties and stories that date back to before time was tracked. The snake's greatest weapon is its cunning and
      powerful body with its sharp fangs to pierce the flesh of its enemies.</p><hr /><p><strong>Summon Type:</strong>
      Dragon</p><p><strong>Toughness</strong>: 10</p><p><strong>Defensive Ability Score</strong>:
      Dexterity</p><p><strong>Saving Throws</strong>: Dexterity, Constitution, Charisma</p><p><strong>Creature
      Skills</strong>: Athletics, Stealth, Perception</p><p><strong>Creature Senses</strong>: Darkvision (60ft), Keen
      Smell</p><hr /><h2>Roles</h2><p>Snakes are often considered the strongest tribe amongst sage beasts, neck in neck
      with Toads. When creating a Summoned creature, select one of the following
      roles;</p><ul><li><p><strong>@UUID[Compendium.n5eb.summons.Item.vl7UtADFlso3wfHo]{Lurker}</strong>: This summon
      prioritizes surprise attacks and stealth tactics. This summon gains the Lethal Attack trait. Lethal Attack: Once
      per turn, you can deal extra damage to one creature you hit with an attack if another enemy of the target is
      within 5 feet of it. This extra damage is Xd8. (X=Half the summons level)
      </p></li><li><p><strong>@UUID[Compendium.n5eb.summons.Item.ZjIHcop42OspRU8Y]{Controller}</strong>: This summon
      gains a bonus to their Save DC equal to their rank when summoned (D-Rank/CRank: +1, B-Rank/A-Rank: +2, S-Rank:
      +3)</p></li></ul>
    chat: ''
