system:
  description:
    value: >-
      <p>Tribe: Rabbit, Insect, Rat, Snake, Spider, Weasel</p><p>Size: Large</p><p>Description: You summon a Digging
      Beast, capable of creating tunnels and to travel under the surface while carring creatures in its mouth or
      stomach.</p><p>This creatures will leave behind a tunnel as they move, and can hold up to 2 creatures inside of
      their mouth at a time, and travel at any speed rate. This creature cannot be affected by Jutsus that could
      increase its speed.</p><p>For each aditional rank above base, increase the size of the creature by one, and the
      number of creatures the summon can hold by 1.</p>
