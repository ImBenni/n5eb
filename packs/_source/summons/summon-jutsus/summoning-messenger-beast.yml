system:
  description:
    value: >-
      <p>Tribe: Rabbit, hawk, Lizard, Rat, Shark, Snake, Toad, Turtle, Weasel.</p><p>Size: tiny</p><p>You summon a
      Messenger Creature, a small and fast beast, capable of covering vast distances in a short amount of
      time.</p><p>When summoned, the you can specify a location that you have previously visited and a recipient who
      matches a general description. You can then give the creature the information to be delivered, the creature will
      not accept to transport any object, and will reject a petition of going into obvious danger, such as enemy
      territory.</p><p>The creature will travel towards the location, covering no more than 150 miles per 24
      hours.</p><p>For each aditional rank above base, increase space the creature can cover in 24 hours by 50
      miles.</p>
