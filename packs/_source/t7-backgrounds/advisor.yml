name: Advisor
type: background
_id: 7tNUkv8HUFi1ivlI
img: icons/magic/control/silhouette-grow-shrink-blue.webp
system:
  description:
    value: >-
      <p>You are an advisor to an important person.</p><p> Perhaps you are the personal advisor to a local lord, or
      maybe you are a lord's military strategist.</p><p> In any case, you are frequently looked to for advice by someone
      with power.</p><p> Your role is not necessarily one of fame and prestige, though it could be.</p><p> It is also
      possible that you help rule from the shadows, whispering your advice to your liege in secret to ensure that he
      makes the right decisions.</p><p> You may even occasionally pen documents on your superior's behalf – with or
      without their knowledge.</p><hr /><p> Skill proficiencies: Persuasion, History </p><p>Tool proficiencies:
      Forensic's Kit </p><p>Equipment: A bottle of black ink, a quill, 3 pieces of parchment, a set of fine clothes, and
      a pouch containing 100 Ryo.</p><p> Equipment pack: Scholar's [★] pack </p><hr /><p>Feature: Position of Power
      </p><p>Because of your position, you command a certain respect.</p><p> People who both know who you are and also
      have a vested interest in pleasing your liege tend to give you the benefit of the doubt and will go out of their
      way not to draw your ire, lest they potentially incur the wrath of your superior.</p><p> Others within the
      organization you are a part of are also likely to curry favor from you however they can.</p><hr /><p> Networker
      </p><p>Select one: Intelligence +1 or Wisdom +1</p><p>Feat from chapter 13: Customization options, with the
      General, Skill, or Genjutsu Category.</p><p> Regardless of which feat you pick, you do not gain an ability score
      improvement from any feat you select.</p><p></p>
