name: Amnesiac
type: background
_id: eyS2hCdxWAT5j0XG
img: icons/magic/symbols/question-stone-yellow.webp
system:
  description:
    value: >-
      <p>One day you awoke, perhaps in a forest or on a sandy beach, with no recollection of what happened to
      you.</p><p> How did you get here? Who were you? These questions elude and boggle your mind.</p><p> Some people
      wish for a fresh start, but you never even got a choice.</p><hr /><p>Skill proficiencies: Insight, Investigation
      </p><p>Tool proficiencies: disguise kit or forgery kit </p><p>Equipment: A set of common clothes, a relic of your
      past which you do not remember, and a belt pouch containing 100 Ryo</p><p>Equipment pack: Martial Artist's [★] or
      Explorer pack </p><hr /><p>Feature: A life once lived </p><p>You once had a home, a family, relationships,
      possessions, but now you are left with nothing but the ability to start anew.</p><p> You are unfamiliar with the
      world around you as well as the people in it.</p><p> You may often need to ask for clarification on things other
      adventurers may know intrinsically.</p><p> Some events, locations, names, phrases, or objects may also trigger you
      to recall small details which could relate to the life you once had, at the discretion of the DM.</p><hr /><p>
      Remnants of the Past </p><p>Select one: Wisdom +1 or Charisma +1 Feat from chapter 13: Customization options, with
      General, Skill, or Clan Category.</p><p> Regardless of which feat you pick, you do not gain an ability score
      improvement from any feat you select.</p><p></p>
