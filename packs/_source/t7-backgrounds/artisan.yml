name: Artisan
type: background
_id: Tr5mjOzrAevFYntY
img: icons/skills/trades/construction-carpentry-hammer.webp
system:
  description:
    value: >-
      <p>Artisans are among the most ordinary people in the world — until they set down their tools and take up an
      adventuring career.</p><p> They understand the value of hard work and the importance of community, but they're
      vulnerable to sins of greed and covetousness.</p><p> Some artisans are part of specialized artisans' guilds
      generally found in cities large enough to support several artisans practicing the same trade.</p><p> However, some
      guilds might instead be loose networks of artisans who each work in a different village around the world.</p><p>
      Work with your DM to determine the nature of your artisan background, to determine from which place you came and
      why you chose to stop being an artisan.</p><hr /><p> Skill proficiencies: Crafting, select one from History or
      Insight </p><p>Tool proficiencies: Weaponsmith Kit or Armorsmith kit </p><p>Equipment: a set of traveler's
      clothes, your chosen artisan tools kit, and a purse containing 100 ryo </p><p>Equipment pack: Crafter's or
      Scientist's [★] pack </p><hr /><p>Feature: Known Artisan </p><p>Your artisan work has become known through the
      places you have visited, and people always trust that your work is well done.</p><p> You can always get a place to
      stay or information in exchange for work.</p><p> If you are associated with an artisan guild, people recognize
      your status and act accordingly.</p><hr /><p> Rewards of a Masterful Creation </p><p>Select one: Intelligence +1
      or Charisma +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Clan
      Category.</p><p> Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
