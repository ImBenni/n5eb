name: Assassin
type: background
_id: f0J342nqcFg1qtJj
img: icons/weapons/daggers/dagger-poisoned.webp
system:
  description:
    value: >-
      <p>You are, or were, a professional assassin or hit-man.</p><p> Your job, possibly even your purpose in life, was
      to kill people without getting caught.</p><p> By luck or talent, you must have been fairly successful; a famous
      assassin is a dead assassin after all.</p><p> Were you born into the profession, or were you otherwise forced into
      it, or did you intentionally take up the dagger? Were you a solo act, or did you work for an agency/guild,
      organized crime group, or private individual? Did you work for money, personal beliefs, to avoid some threat from
      your employer or your own freedom? Were you brainwashed or tortured to do this type of work? Did you receive
      professional training as an assassin, or did you learn it by yourself? Did you hang up the hat, or are you still
      available for hire? Did you enjoy your work? How do you feel about your marks? What do you think of other
      assassins? Were there any really important people you were tasked to kill or were there any missions that were
      especially difficult or memorable? </p><hr /><p>Skill proficiencies: Stealth, Deception </p><p>Tool proficiencies:
      Poison Kit or Disguise Kit </p><p>Equipment: A set of common clothes, traveler's clothes, and fine clothes, and a
      dark robe, each having a hidden pouch sewn into it.<br /> You also have several sheets of paper, an ink pen, and
      flacons of black, red, and invisible ink.<br />Additionally, you have a coin pouch containing 100 Ryo.</p><p>
      Equipment pack: Infiltrator's pack </p><hr /><p>Feature: Alibi </p><p>You have those who will lie for you giving
      you gain alibi when you need it, however they will only lie for you as long as you maintain good relations with
      them and their lies do not endanger themselves.</p><hr /><p>Faceless Death </p><p>Select one: Dexterity +1 or
      Charisma +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Critical
      Category.</p><p> Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
