  description:
    value: >-
      <p>You have experienced countless days of mental, physical, and spiritual agony, and know intimately how you were
      kept alive through it.</p><p>While interrogating a living humanoid, you can make sure that any pain you inflict
      will not kill the individual.</p><p>Additionally, while perceiving such an individual, you may take at least 30
      minutes to attempt (Insight/medical/Investigation) to learn any arcane or biological secrets about their body.</p>
