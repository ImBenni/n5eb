system:
  description:
    value: >-
      <p>You lack the formal education of the higher classes, but for how little you may know there is a great deal that
      you understand.</p><p>You have a practical, working knowledge of astrology and meteorology, and can easily track
      the time and date as well as predict the weather within a few hours, or days if you're lucky.</p><p>You understand
      the "secrets of life"; the needs of life (water, light, air, salt, etc.), the patterns of physical inheritance,
      and the connections between different plants and animals.</p>
