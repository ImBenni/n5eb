img: icons/tools/nautical/steering-wheel.webp
system:
  description:
    value: >-
      <p>When you need to, you can secure free passage on a sailing ship for yourself and your adventuring
      companions.</p><p>You might sail on the ship you served on, or another ship you have good relations with (perhaps
      one captained by a former crewmate).</p><p>Because you're calling in a favor, you can't be certain of a schedule
      or route that will meet your every need.</p><p>Your Dungeon Master will determine how long it takes to get where
      you need to go.</p><p>In return for your free passage, you and your companions are expected to assist the crew
      during the voyage.</p><hr /><p><br /></p>
