system:
  description:
    value: >-
      <p>Due to the status of your sibling, people don't look in your direction if your sibling is
      nearby.</p><p>Everyone is too awestruck by your sibling, and to be blunt, don't give two flying chamber pots about
      you.</p><p>However, you can get certain things for free, like whatever you can get your hands on while no one is
      looking.</p><p>Sometimes you can even get a free room or service by promising the Chosen one will visit an
      establishment.</p><p>If you're lucky, you can even pass yourself off as the chosen one.</p><p>Just watch out for
      complications and consequences.</p>
