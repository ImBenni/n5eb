system:
  description:
    value: >-
      <p>However, you may have earned your prestige or title as a doctor, you are now known to be a person who has sworn
      to do their very best to save lives.</p><p>Your certification as a doctor makes others see you as a nonpartisan
      who often does what is right, no matter the case.</p><p>In instances where there may be fractious conflict between
      neighbors or borders, you, as a doctor, may be the ideal figure to ask to mediate.</p><p>If you require crossing
      into dangerous territory, like one of war or feud, authorities will be more lenient on your plea due to your
      profession providing ample reason in their eyes.</p><p>This is not to say you will always get a free pass, as the
      respect owed to doctors is not always a given in society.</p>
