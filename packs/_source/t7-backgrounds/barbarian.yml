name: Barbarian
type: background
_id: Q8OCRXvomjSte8BW
img: icons/magic/control/fear-fright-monster-grin-red-orange.webp
system:
  description:
    value: >-
      <p>You come from a distant land that lacks any form of centralized civilization.</p><p> A savage land that
      conjured up blizzards, floods, drought, and tempests to flatten, drown, and otherwise destroy you and your
      clan.</p><p> Still, you prevailed for all its murderous intent, however, you give thanks to your homeland.</p><p>
      For whatever reason you have left your homeland.</p><p> Were you forced to leave, or did you leave seeking glory
      and riches? Did you come alone or did your clan follow?</p><hr /><p>Skill proficiencies: Choose two from Stealth,
      Investigation, Animal Handling, Nature, or Survival</p><p> Tool proficiencies: Poison Kit or Security Kit
      </p><p>Equipment: Torn Common cloths, a simple weapon, a prized trophy passed down through your clan, and a pouch
      holding 100 ryo.</p><p> Equipment pack: Explorer or Crafter Pack </p><hr /><p>Feature: Hunter's Instinct
      </p><p>When you travel in the wilderness, you sense when someone or something has caught your trail or
      scent.</p><p> Although you lack the details, you instinctively recognize when your pursuers are within an hour or
      less of your position.</p><hr /><p> Wild Ones </p><p>Select one: Strength +1 or Constitution +1</p><p>Feat from
      chapter 13: Customization options, with the General, Skill, or Taijutsu Category.</p><p> Regardless of which feat
      you pick, you do not gain an ability score improvement from any feat you select.</p><p></p>
