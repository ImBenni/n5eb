img: icons/magic/control/silhouette-hold-change-blue.webp
system:
  description:
    value: >-
      <p>You have spent your life protecting someone else's.</p><p> Perhaps it was a noble, or a powerful crime boss;
      maybe even a brutal warlord.</p><p> Maybe instead of someone more powerful than you, it was a physically weaker
      companion or family member.</p><p> Whatever the case, your life up to this point has been focused around
      protecting someone.</p><hr /><p> Skill proficiencies: Intimidation and Insight or Perception </p><p>Tool
      proficiencies: Forensics </p><p>Kit Equipment: A set of common clothes, an instrument or set of tools with which
      you are proficient, a token from a former student, and a belt pouch containing 100 Ryo </p><p>Equipment pack:
      Martial Artist's Pack [★] </p><hr /><p>Feature: Eye of the Guardian </p><p>You have a keen eye when it comes to
      safety.</p><p> Your companions and yourself can travel at a normal speed through crowds; and you can always pick
      out the safest route to take through a town or city.</p><p> This doesn't account for unseen or hidden dangers,
      such as a lair of vampires hiding in the noble quarter; but you can easily avoid slums and areas where thugs might
      hang around.</p><hr /><p>Practiced Protector </p><p>Select one: Strength.</p><p> +1 or Constitution +1 </p><p>Feat
      from chapter 13: Customization options, with the General, Skill, or Ninjutsu Category.</p><p> Regardless of which
      feat you pick, you do not gain an ability score improvement from any feat you select.</p><p></p>
