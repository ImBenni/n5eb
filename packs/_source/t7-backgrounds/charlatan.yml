name: Charlatan
type: background
_id: STJyvfJKPcSqr9q9
img: icons/magic/control/mouth-smile-deception-purple.webp
system:
  description:
    value: >-
      <p>You have always had a way with people.</p><p> You know what makes them tick, you can tease out their hearts'
      desires after a few minutes of conversation, and with a few leading questions you can read them like they were
      children's books.</p><p> It's a useful talent, and one that you're perfectly willing to use for your
      advantage.</p><p> You know what people want and you deliver, or rather, you promise to deliver.</p><p> Common
      sense should steer people away from things that sound too good to be true, but common sense seems to be in short
      supply when you're around.</p><p> The bottle of pink colored liquid will surely cure that unseemly rash, this
      ointment – nothing more than a bit of fat with a sprinkle of silver dust can restore youth and vigor, and there's
      a bridge in the city that just happens to be for sale.</p><p> These marvels sound implausible, but you make them
      sound like the real deal.</p><hr /><p> Skill proficiencies: Deception, Sleight of Hand </p><p>Tool proficiencies:
      Disguise kit, Forensic kit </p><p>Equipment: A set of fine clothes, a disguise kit, tools of the con of your
      choice (ten stoppered bottles filled with colored liquid, a set of weighted dice, a deck of marked cards, or a
      signet ring of an imaginary duke), and a pouch containing 100 Ryo.</p><p> Equipment pack: Gamer's [★] or
      Entertainer's Pack </p><hr /><p>Feature: False Identity </p><p>You have created a second identity that includes
      documentation, established acquaintances, and disguises that allow you to assume that persona.</p><p>
      Additionally, you can forge documents including official papers and personal letters, as long as you have seen an
      example of the kind of document or the handwriting you are trying to copy.</p><hr /><p> Two Faced </p><p>Select
      one: intelligence +1 or charisma +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill,
      or Genjutsu Category.</p><p> Regardless of which feat you pick, you do not gain an ability score improvement from
      any feat you select.</p><p></p>
