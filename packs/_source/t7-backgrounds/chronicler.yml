system:
  description:
    value: >-
      <p>History is made every day, but not all people care to remember it.</p><p> It is your duty as a chronicler to
      make sure that that history is recorded for future generations.</p><p> You are one of the few who stand against
      ignorance.</p><p> You may be a person obsessed with detail, or maybe a curious scholar looking for all the parts
      of a story you are invested in writing down.</p><p> Whatever the reason you have decided to set out into the world
      to seek out and record all you can find.</p><hr /><p> Skill proficiencies: History, Survival</p><p>Tool
      proficiencies: choose one from Demolition's kit, Forensics' Kit or Trapper's kit </p><p>Equipment: Wooden case
      containing a map to a ruin or dungeon, a set of traveler's clothes, and a purse containing 100 Ryo
      </p><p>Equipment pack: Dungeoneer's pack, Explorer's pack or Scholar's [★] pack </p><hr /><p>Feature: Historical
      Knowledge </p><p>When you enter a ruin or some historical place, you can correctly ascertain its original purpose
      and determine its builders.</p><p> In addition, you have advantage on History checks to remember historical
      information.</p><hr /><p> Know your Past </p><p>Select one: Intelligence +1 or Wisdom +1 Feat from chapter 13:
      Customization options, with the General, Skill, or Chakra Category.</p><p> Regardless of which feat you pick, you
      do not gain an ability score improvement from any feat you select.</p><p></p>
