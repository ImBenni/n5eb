name: Clone
type: background
_id: 7zdTY9m4fvcrVP0d
img: systems/n5eb/assets/content/jutsu-icons/shadow-clone.webp
system:
  description:
    value: >-
      <p>You were created by a cloning jutsu- a work of necromantic ninjutsu that is normally used to escape
      death.</p><p> For whatever reason you were awakened before your original died and you awoke with none of your
      original's memories.</p><p> Your original has not died yet- they are still out there in the world, and you have
      little to no understanding of who they are and what their objectives are.</p><p> Perhaps you have only recently
      awoken.</p><p>Or maybe you have been in this world longer than that? Did you emerge from a vat or chamber that you
      were created in, or was there some other means that you were created by? Did you know the person that you were
      created from, or have the two of you never met, or do you even realize they're still alive? Do you know who
      created you? Was your creator also the person you are cloned from? What purpose were you created for? Will you
      seek out your creator or are you happy to never know the person that shares your face? </p><hr /><p>Skill
      proficiencies: Choose two from Stealth, Investigation, Animal Handling, Nature, or Survival </p><p>Tool
      proficiencies: Forensic Kit or Hacker Kit </p><p>Equipment: a set of common clothes, a tool set and a small pouch
      with 100 Ryo.</p><p> Equipment pack: Explorer or Traveler Pack </p><hr /><p>Feature: Mistaken Identity
      </p><p>Being a perfect copy of someone has its perks.</p><p> Anyone who knew your original will initially think
      you are them.</p><p> They will treat you as your original and, if convinced of that identity, allow you access to
      all that your original would have had access to.</p><p> If you fail to impersonate your original, the person may
      become aware of the deception, and fear you are a doppelganger, disguised spy, illusionist, polymorphed monster,
      or some other horrid thing.</p><hr /><p> Second-Hand Copy </p><p>Select one: Dexterity +1 or Con +1 </p><p>Feat
      from chapter 13: Customization options, with the General, Skill, or Chakra Category.</p><p> Regardless of which
      feat you pick, you do not gain an ability score improvement from any feat you select.</p><p></p>
