name: Courier
type: background
_id: WcjjO1FWCHJ2PvYh
img: icons/skills/movement/feet-winged-boots-brown.webp
system:
  description:
    value: >-
      <p>You are a package courier, a much-needed service in a dangerous world where communication between settlements
      can be difficult.</p><p>You've been far and wide, from the greatest cities to the smallest backwater
      towns.</p><p>The road is your home, and while your travels have often been solitary, yours is a business of
      people.</p><p>This simple fact has exposed you to many different cultures and has allowed you to see the world in
      a way few others can.</p><p>When the journey is difficult, you can always find a path to your destination even if
      one doesn't already exist.</p><hr /><p>Skill proficiencies: Persuasion, Survival </p><p>Tool proficiencies:
      Trapper's Kit or Medicine Kit </p><p>Equipment: A staff, a satchel, two waterproof scroll cases, a map of your
      country or area of origin, a bottle of black ink, a quill, a mysterious letter whose recipient could not be found,
      a set of traveler's cloths, and a pouch containing 100 Ryo.</p><p>Equipment pack: Explorer's pack </p><hr
      /><p>Feature: Contact Network</p><p>Over the years you have built a reputation based on reliability and
      trust.</p><p>Most major settlements contain citizens, business people, politicians, or possibly even criminals
      that you have developed a rapport with.</p><p>These people are often willing to give information to you and may
      also aid you for a favor in return.</p><p>Certain business owners might offer you better prices in thanks for your
      past services.</p><p>Speak with your DM to determine who these people are when entering a major settlement.</p><hr
      /><p>Helpful Mailman </p><p>Select one: Dexterity +1 or Constitution +1</p><p>Feat from chapter 13: Customization
      options, with the General, Skill, or Ninjutsu Category.</p><p>Regardless of which feat you pick, you do not gain
      an ability score improvement from any feat you select.</p><p></p>
