name: Detective
type: background
_id: BKCcuqyXwYr2P9eW
img: icons/tools/scribal/magnifying-glass.webp
system:
  description:
    value: >-
      <p>For a significant portion of your life, you've been searching for answers.</p><p>Mysteries have always
      fascinated you, and solving them has made you become far better at searching for clues and reading
      people.</p><p>What answers were you searching for? Did you always find satisfying answers to your questions, or
      was there one answer that you wish you could forget? Have your inquiries made enemies or friends? In any case,
      it's landed you a job as a detective, perhaps as a paying job for a specific city, perhaps as a wanderer with a
      mystery- solving hobby.</p><hr /><p>Skill proficiencies: Investigation, Insight </p><p>Tool proficiencies:
      Tracking Kit or Security Kit </p><p>Equipment: A detective's badge, a memento taken from a criminal I put away (a
      smoking pipe, a flask or tankard, or a pair of tinted glasses), a magnifying glass, a small pocketbook, an ink
      pen, thieves' tools or a gaming set, a set of common clothes, and a pouch containing 100 Ryo </p><p>Equipment
      pack: Investigator's [★] or Infiltrator's pack </p><hr /><p>Feature: Elementary Knowledge </p><p>You know where to
      find people who know things, or people who know people who know things.</p><p>When you enter a city, you know
      where to search for information about the happenings in the city.</p><p>You also never forget the face of people
      you meet, as you may need them in other cases.</p><hr /><p>Private Eye </p><p>Select one: +1 Intelligence or
      Wisdom +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Genjutsu
      Category.</p><p>Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
