name: Exile
type: background
_id: zMTsUh3r7XKj8TzD
img: icons/magic/control/silhouette-fall-slip-prone.webp
system:
  description:
    value: >-
      <p>You have been singled out as unwelcome in the group or society you were raised in and have therefore been
      isolated.</p><p> Perhaps this was your own choice, rejecting the rules of your society and leaving as a
      conscientious objector, or you simply never fit in and chose to seek someplace you might belong better.</p><p>
      Alternatively, you may have been forcibly ejected for your (mis)deeds or ideas, having done something inexcusable
      or speaking out contrary to those who rule, resulting in banishment.</p><p> Regardless of how it occurred, you are
      no longer a part of your home culture and have had to make your own way in the world.</p><hr /><p> Skill
      proficiencies: Insight, Survival </p><p>Tool proficiencies: Tracking Kit or Disguise Kit </p><p>Equipment: a
      memento from your former life (family crest, official order of rejection, or other keepsake), a walking stick
      (quarterstaff), a compass, a winter blanket, a set of traveler's clothes, and a pouch containing 100
      Ryo.</p><p>Equipment pack: Explorer's pack </p><hr /><p>Feature: Outsider's Perspective </p><p>As an outsider, you
      see society in a different way than most and can better evaluate it from a distance.</p><p> As you spend time in a
      city, town, or tribe, the flaws and advantages of the system become evident to you, and you pick up quickly on
      social dynamics.</p><p> By interacting with locals and moving about the area you are able to determine things like
      the current balance of power, pressing issues and news, if there is unhappiness with the current status quo, and
      who important figures might be.</p><p> However, as an outsider, others are less likely to welcome your criticism
      of their society without good reason.</p><hr /><p> Brand New Life </p><p>Select one: Dexterity +1 or Intelligence
      +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Taijutsu Category.</p><p>
      Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
