system:
  description:
    value: >-
      <p>To this day you have not had a single grand victory in your life.</p><p> You have always come in last place,
      while being left in the dust by your peers.</p><p> You have been told many a time that you should quit being a
      ninja, but there is something that makes you stay.</p><p> Whether it it is to prove those putting you down wrong,
      to prove that you can be a truly great ninja, or to prove one of your rare supporters right.</p><p> Whatever the
      case it is up to you to work hard, so you won't be a failure forever.</p><hr /><p> Skill proficiencies: Choose two
      from Athletics, Acrobatics, or Persuasion </p><p>Tool proficiencies: Trappers Kit or Armorsmith Kit
      </p><p>Equipment: Common cloths, a mementos from one of your supporters, and a pouch containing 100 Ryo.</p><p>
      Equipment pack: Martial Artist's [★] pack </p><hr /><p>Feature: Low Exceptions </p><p>Others have very low
      expectations of you, due to this you are often given much easier tasks than your teammates or are underestimated
      in combat.</p><p> If you show that you are more capable than that person thought, they will begin to treat you
      like they would any other person.</p><hr /><p> Grit of Gold </p><p>Select one: Strength +1 or Dexterity +1
      </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Taijutsu Category.</p><p>
      Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
