name: Famous Lineage
type: background
_id: qoPFAsxopGZRz3fd
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p>For good or for worse, people always associate you with your famous relative.</p><p> Maybe it is the same hair
      or facial structure, it does not matter, people always point out the similarities between the two of you.</p><p>
      You are always in their shadow, waiting to be recognized for your own actions.</p><p> Work with your DM to decide
      why your famous relative is so well known and what are the consequences of this for your character.</p><hr /><p>
      Skill proficiencies: Perception, choose one from Persuasion or Deception </p><p>Tool proficiencies: Forgery Kit or
      Disguise Kit </p><p>Equipment: Disguise kit, a set of fine clothes, and a purse containing 100 Ryo
      </p><p>Equipment pack: Explorer's pack or Captain's pack </p><hr /><p>Feature: Name Dropping </p><p>You know and
      have met any number of powerful people across the land—and some of them might even remember you.</p><p> You might
      be able to wrangle minor assistance from a major figure in the campaign, at the DM's discretion.</p><p>
      Additionally, the common folk treat you with deference, and your heritage and the stories you tell might be good
      for a free meal or a place to sleep.</p><hr /><p> Born in Fame </p><p>Select one: Charisma +1 or Wisdom +1 Feat
      from chapter 13: Customization options, with the General, Skill, or Clan Category.</p><p> Regardless of which feat
      you pick, you do not gain an ability score improvement from any feat you select.</p><p></p>
