img: icons/magic/symbols/star-solid-gold.webp
system:
  description:
    value: >-
      <p>You come from a humble social rank, but you are destined for so much more.</p><p> Already the people of your
      home village regard you as their champion, and your destiny calls you to stand against the tyrants and monsters
      that threaten the common folk everywhere.</p><hr /><p> Skill proficiencies: Chakra Control, Survival.</p><p> Tool
      proficiencies: Trappers Kit or Demolitions Kit.</p><p> Equipment: A tool kit of your choice, a shovel, an iron
      pot, a set of common clothes, and a pouch containing 100 Ryo.</p><p> Equipment pack: Martial Artist's [★] or
      Explorer's Pack </p><hr /><p>Feature: Rustic Hospitality </p><p>Since you come from the ranks of the common folk,
      you fit in among them with ease.</p><p> You can find a place to hide, rest, or recuperate among other commoners,
      unless you have shown yourself to be a danger to them.</p><p> They will shield you from the law or anyone else
      searching for you, though they will not risk their lives for you.</p><hr /><p> For the People </p><p>Select one:
      Strength +1 or Constitution +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or
      Taijutsu Category.</p><p> Regardless of which feat you pick, you do not gain an ability score improvement from any
      feat you select.</p><p></p>
