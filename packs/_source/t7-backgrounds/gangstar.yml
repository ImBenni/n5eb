system:
  description:
    value: >-
      <p>Your life and actions are dictated by one person, the father if you will.</p><p> You do as you are told,
      completing whatever order you are given, whether it be stealing a small gem, or killing a small child.</p><p> The
      lengths you go to don't matter, as long as it is completed.</p><p> Unless...</p><p> You broke free from such a
      thing? Or perhaps you're simply on a quest from command of your superior? Do you wish to continue to act as a dog
      on a leash or live by your own choices and wishes? </p><hr /><p>Skill proficiencies: Choose two from:
      Intimidation, Persuasion, Deception, Investigation, Insight </p><p>Tool proficiencies: Poison Kit or Disguise Kit
      </p><p>Equipment: A knife engraved with the symbol of your godfather, fine clothes, and a belt pouch with 10
      Ryo.</p><p> Equipment pack: Explorer or Crafter Pack </p><hr /><p>Feature: Friend of Mine </p><p>Other mafiosos
      know your face and are scattered all over the land, be it from your clan or another.</p><p> Depending on your
      status, they may attempt to take your life, or do a favor with you, or even become a potential ally.</p><p> Work
      with your DM to talk about your gang relationships with other gang, and details about both you and others
      gang.</p><hr /><p> Wanted by Everyone (Dead or Alive) </p><p>Select one: Intelligence +1 or Wisdom +1 </p><p>Feat
      from chapter 13: Customization options, with the General, Skill, or Critical Category.</p><p> Regardless of which
      feat you pick, you do not gain an ability score improvement from any feat you select.</p><p></p>
