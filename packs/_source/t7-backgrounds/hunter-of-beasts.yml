system:
  description:
    value: >-
      <p>You are a mighty hunter.</p><p> Skilled in the art of tracking down and slaying beasts.</p><p> You make game of
      creatures of the fiercest variety.</p><p> Perhaps because the work is rewarding.</p><p> Or maybe it's the thrill
      of the hunt alone that drives you! It is possible that you have a score to settle or a village to protect.</p><p>
      But in any case, you have embraced your inner apex predator.</p><hr /><p> Skill proficiencies: Choose two from
      Stealth, Investigation, Animal Handling, Nature, or Survival </p><p>Tool proficiencies: Poison Kit or Security Kit
      </p><p>Equipment: A ranged weapon with 20 ammunitions, a book of lore on a specific monster or a story book about
      great hunts, and a small pouch with 100 Ryo.</p><p>Equipment pack: Explorer or Crafter Pack </p><hr /><p>Feature:
      Hunter's Creed </p><p>Woods folk recognize you as someone who works to kill the beasts and monsters that stalk
      their domain.</p><p> Were you all in a city you would be considered a trusted guard stalking the night in search
      of murderers and brigands.</p><p> Rangers, hunters, guides, and other such creatures will provide aid, lodging,
      and are more likely to answer the call to hunt dangerous prey through their respective terrain.</p><hr /><p> On
      the Prowl </p><p>Select one: Dexterity +1 or Wisdom +1 </p><p>Feat from chapter 13: Customization options, with
      the General, Skill, or Critical Category.</p><p> Regardless of which feat you pick, you do not gain an ability
      score improvement from any feat you select.</p><p></p>
