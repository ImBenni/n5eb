system:
  description:
    value: >-
      <p>You have brilliant ideas and then you translate them into reality via technology or chakra.</p><p> You go for
      original content, or at least try to.</p><p> People may find you eccentric and funny or attractive in
      personality.</p><p> Others may decry your practices as unorthodox or dangerous even.</p><p> Inventors vary far and
      wide in aims and specialties, from weaponry, to tinkering, and even the realm of metaphysical, like theorists or
      so-called magicians.</p><hr /><p> Skill proficiencies: History and Crafting </p><p>Tool proficiencies: Demolitions
      kit</p><p> Equipment: A Demolitions Kit, a small assortment of tinkering supplies (springs, cogs, levers, gears,
      valves, ball bearings, etc.), a set of traveler's Clothes, and a wallet holding 100 Ryo.</p><p> Equipment pack:
      Scientist Pack </p><hr /><p>Feature: Mind for Machines </p><p>You have a keen eye and a natural intuition when it
      comes to scavenging materials for new inventions and coming up with inspiration for new ideas.</p><p> When
      investigating and searching your surroundings you are very adept at locating materials that can be used to create
      new machines and may also become inspired with an idea for a new machine to try building.</p><hr /><p> A Good Day
      to Learn </p><p>Select one: Intelligence +1 or Wisdom +1 </p><p>Feat from chapter 13: Customization options, with
      the General, Skill, or Ninjutsu Category.</p><p> Regardless of which feat you pick, you do not gain an ability
      score improvement from any feat you select.</p><p></p>
