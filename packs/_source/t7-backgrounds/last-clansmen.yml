name: Last Clansmen
type: background
_id: fWwLitFZRID9EdFk
img: icons/magic/control/silhouette-hold-change-green.webp
system:
  description:
    value: >-
      <p>You are the last of your clan.</p><p> You were the sole survivor of a major life-threatening event.</p><p>
      Maybe your village or city was attacked by some great evil, or maybe you were tricked by some greater
      power.</p><p> No matter the details, everyone other than you died, and you survived.</p><p> Where were you when it
      happened? What age? Were you a small child, or a young adult? What attacked you? Was it one thing, or a group?
      What effect did this have on you? Were you traumatized, or were you strengthened by it? Did you run away, or did
      you fight it? </p><hr /><p>Skill proficiencies: Survival, Perception </p><p>Tool proficiencies: choose one from
      Weaponsmith's kit, Cooking' Kit or Medicine's kit </p><p>Equipment: A trinket of your past (a necklace, ring,
      sword, severed finger or hair, etc.), a set of worn travelers clothes, a scroll detailing your life up to this
      point, a backpack, and a belt pouch containing 100 tyo.</p><p> Equipment pack: Traveler's pack, Explorer's pack or
      Martial Artist's [★] pack </p><hr /><p>Feature: Lonely Living </p><p>Having survived by yourself for some years,
      you are able to take care of survival necessities by yourself.</p><p> You can make fires, craft shelters, cook
      food, etc.</p><p> without having to make a Survival check.</p><p> Also, you know several townspeople, hunters, and
      shop owners from your travels alone.</p><p> Landmarks and places of interest may also be familiar to you.</p><hr
      /><p> Lone Survivor </p><p>Select one: Dexterity +1 or Intelligence +1 </p><p>Feat from chapter 13: Customization
      options, with the General, Skill, or Clan Category.</p><p> Regardless of which feat you pick, you do not gain an
      ability score improvement from any feat you select.</p><p></p>
