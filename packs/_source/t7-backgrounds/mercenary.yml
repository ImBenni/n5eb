system:
  description:
    value: >-
      <p>As a shinobi who doesn't originate from a shinobi village you fight for coin and glory alone.</p><p>
      Experienced in the ways of battle; you reap its benefits while never being tied down by having to declare your
      loyalty to one of the many warring nations that pay you.</p><p> Any home will be second to the battlefield in your
      heart, and you are free to move and serve who you please.</p><p> You may be famous or infamous, be part of a
      mercenary group, or a lone wolf, but you are always willing to fight - for the right price.</p><p> Whether it be
      for gold, glory, peace, or war, you are never far away from the battlefield, and you always keep your weapons
      sharp.</p><hr /><p> Skill proficiencies: Intimidation, Perception </p><p>Tool proficiencies: Weaponsmith Kit or
      Poison Kit </p><p>Equipment: Proof of the first contract you completed, a set of common clothes, one gaming set of
      choice, belt pouch containing 100 ryo.</p><p> Equipment pack: Traveler's Pack </p><hr /><p>Feature: Hired Blade
      </p><p>As an experienced mercenary you gone on enough missions to have a deep understanding of what you can handle
      and what you can't.</p><p> When hearing the briefing of a mission or a description of a mission you have a vague
      understanding of how difficult the mission should be.</p><hr /><p> Sword for Sale </p><p>Select one: Strength +1
      or Dexterity +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Taijutsu
      Category.</p><p> Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
