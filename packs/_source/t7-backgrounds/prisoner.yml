system:
  description:
    value: >-
      <p>At some point in your past, and for a substantial amount of time, you were incarcerated for a crime.</p><p>
      While the exact details may vary from case to case, all prisoners have this in common, at least.</p><p> Your time
      in prison taught you how such institutions work and gave you various skills that would help anyone make it through
      such an experience.</p><hr /><p> Skill proficiencies: Stealth and Deception or Sleight of hand </p><p>Tool
      proficiencies: Cooking Kit or Disguise Kit </p><p>Equipment: A set of common clothes, a small knife, an easily
      concealed and inexpensive bauble or keepsake, and a pouch containing 100 Ryo.</p><p> Equipment pack: Explorer's
      pack </p><hr /><p>Feature: Scrounger </p><p>Your time locked away has taught you to be resourceful and how to
      thrive with very little.</p><p> You only require 2/3s of the normal amount of materials to craft tools, weapons,
      or any mundane object.</p><hr /><p> Nefarious Core </p><p>Select one: Constitution +1 or Wisdom +1 </p><p>Feat
      from chapter 13: Customization options, with the General, Skill, or Critical Category.</p><p> Regardless of which
      feat you pick, you do not gain an ability score improvement from any feat you select.</p><p></p>
