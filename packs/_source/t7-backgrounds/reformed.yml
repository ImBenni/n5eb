system:
  description:
    value: >-
      <p>You were once a villain, but now you seek to change.</p><p> You search to redeem yourself in the eyes of those
      who you hurt.</p><p> The road is a long one, but it is one that you are going to take.</p><p> Hopefully you are
      given the opportunity to make it up to everyone.</p><hr /><p> Skill proficiencies: Choose two from Stealth,
      Investigation, intimidation, or Perception </p><p>Tool proficiencies: Poison Kit or Security Kit </p><p>Equipment:
      A ranged weapon with 20 ammunitions, a book of lore on a specific monster or a story book about great hunts, and a
      small pouch with 100 Ryo.</p><p> Equipment pack: Explorer or Crafter Pack </p><hr /><p>Feature: Back on the Right
      Side of the Law </p><p>Even though you've given up your lawbreaking habits, you still carry abilities learned in
      carrying out criminal acts.</p><p> You also know where the criminal elements in a city are likely to
      reside.</p><hr /><p> Criminal Past </p><p>Select one: Dexterity +1 or Wisdom +1 </p><p>Feat from chapter 13:
      Customization options, with the General, Skill, or Critical Category.</p><p> Regardless of which feat you pick,
      you do not gain an ability score improvement from any feat you select.</p><p></p>
