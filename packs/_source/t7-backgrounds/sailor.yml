name: Sailor
type: background
_id: MZtM1IC2n7DcSd1L
img: icons/tools/nautical/steering-wheel.webp
system:
  description:
    value: >-
      <p>You sailed on a seagoing vessel for years.</p><p> In that time, you faced down mighty storms, monsters of the
      deep, and those who wanted to sink your craft to the bottomless depths.</p><p> Your first love is the distant line
      of the horizon, but the time has come to try your hand at something new.</p><p> Discuss the nature of the ship you
      previously sailed with your DM.</p><p> Was it a merchant ship, a naval vessel, a ship of discovery, or a pirate
      ship? How famous (or infamous) is it? Is it widely traveled? Is it still sailing, or is it missing and presumed
      lost with all hands? What were your duties on board boatswain, captain, navigator, cook, or some other position?
      Who were the captain and first mate? Did you leave your ship on good terms with your fellows, or on the run?
      </p><hr /><p>Skill proficiencies: Athletics or Acrobatics, Perception </p><p>Tool proficiencies: Choose any one
      tool proficiency.</p><p> Equipment: A belaying pin, 50 feet of silk rope, a lucky charm such as a rabbit foot or a
      small stone with a hole in the center, a set of common clothes, and a pouch containing 100 Ryo.</p><p> Equipment
      pack: Sailor pack [★] </p><hr /><p>Feature: Ship's Passage </p><p>When you need to, you can secure free passage on
      a sailing ship for yourself and your adventuring companions.</p><p> You might sail on the ship you served on, or
      another ship you have good relations with (perhaps one captained by a former crewmate).</p><p> Because you're
      calling in a favor, you can't be certain of a schedule or route that will meet your every need.</p><p> Your
      Dungeon Master will determine how long it takes to get where you need to go.</p><p> In return for your free
      passage, you and your companions are expected to assist the crew during the voyage.</p><hr /><p> Sea Legs
      </p><p>Select one: Strength +1 or Dexterity +1 </p><p>Feat from chapter 13: Customization options, with the
      General, Skill, or Chakra Category.</p><p> Regardless of which feat you pick, you do not gain an ability score
      improvement from any feat you select.</p><p></p>
