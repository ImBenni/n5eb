name: Shinobi Scientist
type: background
_id: sriGWULq9NT2GquK
img: icons/tools/laboratory/vials-blue-pink.webp
system:
  description:
    value: >-
      <p>After the Hidden Villages started to cooperate among themselves, the divide between the ninja and civilian
      world has begun to close.</p><p>Taking advantage of this, you manage to get a opportunity to work with other
      researchers for a Hidden Village or some other organization.</p><p>Work with your DM to decide what your character
      did while working for a Shinobi science group and what are the consequences of this, why did you leave your
      research team behind? </p><hr /><p>Skill proficiencies: Investigation, choose one from Medicine, Ninshou, Martial
      Arts or Illusions </p><p>Tool proficiencies: Forensic kit, Security kit or Hacker's kit </p><p>Equipment: a set of
      common clothes, and a purse containing 100 Ryo </p><p>Equipment pack: Scholar's [★] or Scientist's pack [★]
      </p><hr /><p>Feature: Researcher </p><p>When you attempt to learn or recall a historical or scientific fact, if
      you don't know that information, you know where and from whom you can obtain it.</p><p>Knowing where the
      information can be found doesn't automatically enable you to learn it; you might need to offer bribes, favors, or
      other incentives to induce people to reveal their secrets.</p><p>Your DM might rule that the knowledge you seek is
      secreted away in an inaccessible place, or that it simply can't be found.</p><p>Unearthing the deepest secrets of
      the land can require an adventure or even a whole campaign.</p><hr /><p>Research spirit </p><p>Select one:
      Intelligence +1 or Wisdom +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or
      Ninjutsu Category.</p><p>Regardless of which feat you pick, you do not gain an ability score improvement from any
      feat you select.</p><p></p>
