system:
  description:
    value: >-
      <p>You are an experienced teacher who knows how to best instruct others in an array of disciplines.</p><p>
      Although you have a vast amount of knowledge yourself, pedagogy is the most important tool in your toolbox because
      it allows the rest of your knowledge to spread most efficiently.</p><hr /><p> Skill proficiencies: History,
      Performance </p><p>Tool proficiencies: Forensics Kit </p><p>Equipment: A set of common clothes, an instrument or
      set of tools with which you are proficient, a token from a former student, and a belt pouch containing 100 Ryo
      </p><p>Equipment pack: Scholar's Pack [★] </p><hr /><p>Feature: Knowledge</p><p>If you need information on
      something, you know if there is a book containing that information and where to find it.</p><p> Further, when you
      hear a creature speaking or when you see language written down, you can identify exactly what language is being
      used even if you are not proficient in the language.</p><p> Finally, when you hear music, you know which
      instruments are being used in the performance, even if you are not proficient in their use.</p><hr /><p> Guider of
      the Future </p><p>Select one: Wisdom +1 or Intelligence +1 </p><p>Feat from chapter 13: Customization options,
      with the General, Skill, or Ninjutsu Category.</p><p> Regardless of which feat you pick, you do not gain an
      ability score improvement from any feat you select.</p><p></p>
