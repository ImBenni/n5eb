system:
  description:
    value: >-
      <p>You were brought up in slavery or captivity where you were experimented upon.</p><p>A large portion of your
      history consists of dark dungeons or tower cells, and excruciating tinkering upon your person, either through
      arcane or mundane means.</p><p>You have endured extraordinary events of inhumane science.</p><p>At some point, you
      escaped captivity, through subterfuge, diplomacy, or violence.</p><hr /><p>Skill proficiencies: Medical and
      Insight or sleight of hands </p><p>Tool proficiencies: Poison Kit or Forensics Kit </p><p>Equipment: A set of
      common clothes, a token to remember your home/parents, a pair of manacles, and a pouch containing 100 Ryo
      </p><p>Equipment pack: Scientist's [★] or Infiltrator's pack </p><hr /><p>Feature: First Hand Experience</p><p>You
      have experienced countless days of mental, physical, and spiritual agony, and know intimately how you were kept
      alive through it.</p><p>While interrogating a living humanoid, you can make sure that any pain you inflict will
      not kill the individual.</p><p>Additionally, while perceiving such an individual, you may take at least 30 minutes
      to attempt (Insight/medical/Investigation) to learn any arcane or biological secrets about their body.</p><hr
      /><p>Human Guinea Pig </p><p>Select one: Constitution +1 or Wisdom +1 </p><p>Feat from chapter 13: Customization
      options, with the General, Skill, or Chakra Category.</p><p>Regardless of which feat you pick, you do not gain an
      ability score improvement from any feat you select.</p><p></p>
