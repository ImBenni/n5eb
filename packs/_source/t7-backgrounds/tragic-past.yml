system:
  description:
    value: >-
      <p>Fate has not been kind to you.</p><p>You suffered a tragedy in your past that marked you so deeply that it set
      forward your life goals.</p><p>Work with your DM to decide what tragic event happened in your character's life
      that made them who they are now.</p><hr /><p>Skill proficiencies: Investigation, Survival </p><p>Tool
      proficiencies: Tracking Kit or Security Kit </p><p>Equipment: A memento from your past, a set of common clothes,
      and a purse containing 100 ryo </p><p>Equipment pack: Explorer's pack or Dungeoneer's pack </p><hr /><p>Feature:
      Heart of Darkness </p><p>Those who look into your eyes can see that you have faced unimaginable horror and that
      you are no stranger to darkness.</p><p>Though they might fear you, commoners will extend you every courtesy and do
      their utmost to help you.</p><p>Unless you have shown yourself to be a danger to them, they will even take up arms
      to fight alongside you, should you find yourself facing an enemy alone.</p><hr /><p>Burdened Memory </p><p>Select
      one: Constitution +1 or Wisdom +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or
      Taijutsu Category.</p><p>Regardless of which feat you pick, you do not gain an ability score improvement from any
      feat you select.</p><p></p>
