name: Treasure Hunter
type: background
_id: CR1Arl01jNPrFqli
img: icons/commodities/treasure/bust-pharaoh-gold-blue.webp
system:
  description:
    value: >-
      <p>You've always been an explorer of the unknown, finding old artifacts and treasures lost with the passage of
      time.</p><p>You may be a thief or an archeologist, but you're determined to find any treasure and secrets hidden
      in the world.</p><p>Your keen senses and quick reflexes have led you far and helped you find treasures that others
      would easily miss.</p><hr /><p>Skill proficiencies: Choose two from Investigation, Sleight of Hand, or Acrobatics
      </p><p>Tool proficiencies: Poison Kit or Security Kit </p><p>Equipment: A ranged weapon with 20 ammunitions, a
      book of lore on a specific monster or a story book about great hunts, and a small pouch with 100
      Ryo.</p><p>Equipment pack: Explorer or Crafter Pack </p><hr /><p>Feature: Quick Finder </p><p>You can always find
      rumors of nearby treasures and dungeons.</p><p>Whenever you enter a populated area, you know where to find any
      information related to dungeons, treasures, or bounties.</p><hr /><p>Dungeon Delver </p><p>Select one: Dexterity
      +1 or Charisma +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Ninjutsu
      Category.</p><p>Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
