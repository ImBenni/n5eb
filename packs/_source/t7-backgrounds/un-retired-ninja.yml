name: (Un)Retired Ninja
type: background
_id: KycbpH58Pxj0pZ2l
img: icons/magic/control/fear-fright-mask-orange.webp
system:
  description:
    value: >-
      <p>"I'm getting too old for this stuff." You spent your life as an Ninja, learning the use of many skills and
      basic survival techniques, including how to stay alive in a hostile area.</p><p> You might have been part of a
      famous Team or a less renowned one.</p><p> When you choose this background, work with your GM to determine the
      details of your previous career, and what kind of experiences you had.</p><p> How famous was your previous team
      and how well known are you? What did you learn? What was your group's specialty? </p><hr /><p>Skill proficiencies:
      History, Survival </p><p>Tool proficiencies: Tracking Kit, Forgery Kit or Medicine Kit </p><p>Equipment: A
      grappling hook, one tool with which you are proficient, a memento of an unsuccessful expedition (map to a never
      found treasure, lock of hair from a fallen companion, or another trinket), and a pouch containing your last 100
      Ryo </p><p>Equipment pack: Martial Artist's [★], Explorer, or Infiltrator's pack</p><hr /><p>Feature: Bridges Not
      Yet Burned </p><p>Throughout your adventures you have established a multitude of contacts from all walks of life,
      but the intervening years have seen those relationships strained.</p><p> You may use any feature of any other
      background, but once a particular feature is used, that feature can't be used again until one year has
      passed.</p><hr /><p> Blast from the Past</p><p>Select one: Wisdom +1 or Charisma +1 </p><p>Feat from chapter 13:
      Customization options, with General, Skill, or Ninjutsu Category.</p><p> Regardless of which feat you pick, you do
      not gain an ability score improvement from any feat you select.</p><p></p>
