system:
  description:
    value: >-
      <p>You are a well decorated war veteran, having served in at least one brutal campaign for the honor and glory of
      your village.</p><p> You are generally welcome anywhere inside your land and are treated with respect even by
      those who do not personally like you.</p><hr /><p> Skill proficiencies: Choose two from Survival, Medicine, Animal
      Handling, or Intimidation </p><p>Tool proficiencies: Weaponsmith Kit or Armorsmith Kit </p><p>Equipment: A set of
      fine clothes, a ceremonial weapon gifted to you for your victory, and a pouch with 100 Ryo.</p><p> Equipment pack:
      Explorer or Captain Pack </p><hr /><p>Feature: Hero's reputation </p><p>You can use your rank and history as a
      soldier to gain entry into otherwise private areas of your respective kingdom.</p><p> You can typically gain free
      room and board for yourself within your empire, and with some persuasion might be able to pass this benefit along
      to your current company depending on the size of your party.</p><hr /><p> Village Hero </p><p>Select one:
      Dexterity +1 or Intelligence +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or
      Ninjutsu Category.</p><p> Regardless of which feat you pick, you do not gain an ability score improvement from any
      feat you select.</p><p></p>
