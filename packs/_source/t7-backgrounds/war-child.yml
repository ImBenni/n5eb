name: War Child
type: background
_id: RgS4VmTn9qeRrHAu
img: icons/magic/unholy/strike-body-life-soul-green.webp
system:
  description:
    value: >-
      <p>You grew up in a region ravaged by warfare, where danger lies around every dawn.</p><p> The times you spent
      hiding away from soldiers, fighting back against the assaults, or simply helping those who did so
      unsuccessfully.</p><p> You have left that world behind now, whether the war itself ended or if you simply left
      never to look back.</p><p> But the time spent in war will never let you return to the one you once were.</p><hr
      /><p> Skill proficiencies: Choose two from Athletics, Medicine or Stealth </p><p>Tool proficiencies: choose one
      from Demolition's kit, Cooking' Kit or Trapper's kit </p><p>Equipment: a keepsake from your old home, a set of
      common clothes featuring a hooded cloak, and a pouch containing 100 Ryo.</p><p> Equipment pack: Traveler's pack
      </p><hr /><p>Feature: Threat Assessment </p><p>Your time at war has made you adept at locating the most dangerous
      thing in a hostile situation.</p><p> When the adrenalin kicks in, your senses heighten, and you can quickly tell
      what is the most immediate danger in a hostile situation.</p><hr /><p> Terrorized Survivor </p><p>Select one:
      Dexterity +1 or Wisdom +1 </p><p>Feat from chapter 13: Customization options, with the General, Skill, or Taijutsu
      Category.</p><p> Regardless of which feat you pick, you do not gain an ability score improvement from any feat you
      select.</p><p></p>
