name: Wild Child
type: background
_id: eRRQQRVOrWmo1pYj
img: icons/magic/nature/leaf-juggle-humanoid-green.webp
system:
  description:
    value: >-
      <p>Some people are abandoned or lost when they are young, and subsequently survive in the wild by some freak
      stroke of luck.</p><p> You are one such person.</p><p> Were you raised by animals, or did you survive entirely by
      yourself? Are you an orphan? Did your parents abandon you in the woods because of poverty or apathy? Were you
      accidentally lost when your relatives were walking through the wilderness with you? It is possible you have no
      memory at all of your parents or how you ended up separated from them in the first place.</p><p> After your first
      encounter with humanoids, how did you come to live in humanoid society? Did you seek out other people or were you
      forced away from your home and into a world you had no connection to or understanding of? </p><hr /><p>Skill
      proficiencies: Survival and Animal Handling </p><p>Tool proficiencies: Alchemist Kit, Poisoner's kit
      </p><p>Equipment: A healer's kit, an object you collected from the wilderness such as a shiny stone or seashell, a
      set of traveler's clothes, a patch of fur from an animal, and a large waterskin that can hold two gallons of
      water.</p><p> Equipment pack: Traveler's pack </p><hr /><p>Feature: Scent of the Wild Lands </p><p>Your sense of
      sight and smell was finely tuned during your years in the wild.</p><p> When you enter a forest or thick meadows,
      you can correctly ascertain tracks of any beast or humanoid.</p><p> In addition, you can determine a safe harbor
      closest to you.</p><hr /><p> Strangers Like Me </p><p>Select one: Dexterity +1 or Wisdom +1 </p><p>Feat from
      chapter 13: Customization options, with the General, Skill, or Taijutsu Category.</p><p> Regardless of which feat
      you pick, you do not gain an ability score improvement from any feat you select.</p><p></p>
