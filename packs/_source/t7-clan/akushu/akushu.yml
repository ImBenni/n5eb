  description:
    value: >-
      <p>The Akushū clan are among the most recluse members of the Hidden Rain village, living as outcasts to their
      society. The elders of the Akushū came to this agreement peacefully when they joined the village so their clan's
      volatile traits wouldn't harm others. But as time continued many villagers learned to fear and mistrust the Akushū
      due to isolation, and in turn upcoming generations of Akushū members learned to harbor feelings of resentment --
      believing they will never have a true sense of belonging within the hidden rain village.</p><h4
      id="akush-traits">Akushū Traits</h4><hr /><ul><li><strong>Ability Score Increase:</strong> +2 Int, +1
      Wis</li><li><strong>Speed:</strong> Your base walking speed is 30 feet</li><li><strong>Skill
      Proficiencies:</strong> Crafting, Ninshou</li><li><strong>Toxic Release Affinity:</strong> You begin with Wind
      Release Affinity.</li></ul>
