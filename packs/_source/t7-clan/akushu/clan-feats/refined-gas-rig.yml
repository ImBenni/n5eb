  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Akushū Clan, level 4+ <br />After
      studying the design schematics of your Gas Mask, you've learned to install improvements. You gain the following
      benefits;</p><ul><li>Increase your Intelligence score by 1, to a max of 20.</li><li>You proficiency in Crafting.
      If you already have this proficiency, you instead gain expertise.</li><li>While equipped with your Gas Mask, you
      can breathe in any environment without suitable air such as underwater or a vacuum.</li><li>While equipped with
      your Gas Mask, you can cast the <em>Voice Change</em> genjutsu for 0 chakra, as if you knew it.</li><li>You can
      make repairs or build a new mask during a short or long rest using 100 ryo worth of supplies.</li><li>Your Gas
      Mask gains one Armor Seal slot.</li></ul>
