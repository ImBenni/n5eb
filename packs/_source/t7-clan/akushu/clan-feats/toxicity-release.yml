system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Akushū Clan, level 8+ <br />Your prowess
      with toxic release has progressed to greater limits. You gain the following benefits;</p><ul><li>Increase your
      Intelligence or Wisdom score by 1, to a max of 20.</li><li>When casting a jutsu that deals poison damage, you
      ignore the target's resistance to poison damage and the envenomed condition. If the target is immune, you treat
      immunity as resistance.</li><li>Akushū hijutsu you cast that would damage a creature that already has ranks of
      envenomed or poisoned increases its Save DC or to hit by +1.</li><li>Reduce the chakra cost of concentrating on
      Akushū hijutsu by -2. While you have at least 1 caustic cell, you have advantage on all concentration checks to
      maintain Akushū hijutsu.</li></ul>
    chat: ''
