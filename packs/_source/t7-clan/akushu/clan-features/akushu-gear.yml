system:
  description:
    value: >-
      <p>Beginning at 1st level, members of the Akushū clan possess an unfortunate characteristic where their exhaled
      breath carries toxic fumes. To counteract this, the clan utilizes specialized breathing masks, preventing the
      harmful effects of their breath. While wearing your Gas Mask, you gain immunity to jutsu or conditions caused by
      inhalation. Your mask is custom-fitted for you, and if it breaks or is lost, you can fashion a replacement during
      a Long Rest by spending 250 ryo, given access to a workshop during this period.</p>
