system:
  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif">When casting a Ninjutsu that deals poison damage, you can expend
      1 cell to gain temporary hit points equal to 5 times the rank of the jutsu cast: (D-Rank: 1, C-Rank: 2, B-Rank: 3,
      A-Rank: 4, S-Rank: 5) which last a number of rounds equal to your Ninjutsu modifier (min 1). While you have these
      temporary hit points, creatures that touch you or hit you with a melee attack must succeed a Constitution saving
      throw using your highest DC, becoming Poisoned until the end of its next turn on a failure.</span></p>
