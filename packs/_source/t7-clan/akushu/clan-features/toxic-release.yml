img: systems/n5eb/assets/content/clans/akushu.webp
system:
  description:
    value: >-
      <p>The Akushū clan are feared throughout the Hidden Rain for the chance a member manifests Toxic Release, a putrid
      variant of Wind Release that chokes its victims with caustic air. Beginning at 7th level, when casting a Ninjutsu
      with the Wind Release Keyword, you can change the damage type to poison, it gains the <em>Inhale</em> keyword, and
      add your Intelligence modifier to the damage roll if it doesn't already, and if that jutsu inflicts bleeding, you
      may instead inflict ranks of envenomed. Creatures envenomed by jutsu you cast are unable to speak intelligibly, as
      they cough and wheeze violently.</p><p>Beginning at 15th level, once per turn, when you would deal poison damage,
      you inflict 2 ranks of envenomed.</p>
