system:
  description:
    value: >-
      <p>Also at 1st level, jutsu you cast with the <em>Inhale</em> keyword lose any (NT) components, and can affect
      creatures even if they hold their breath or don't need to breathe.</p><p>Starting at 3rd level, creatures you
      apply envonomed to increase the damage die of the condition by 1 step, up to a maximum of a d12.</p><p>At 18th
      level, when a creature takes damage from the envenomed condition that was inflicted by you, they take an
      additional amount of damage equal to the total ranks of envenomed they possess.</p>
