name: Toxic Release Creeping Death
type: spell
_id: RvUQ7JppK8M3YIuu
img: systems/n5eb/assets/content/clans/akushu.webp
system:
  description:
    value: >-
      <p>Toxic chakra fumes from every inch of your body as you become a walking bomb of toxicity. For the duration, you
      exude a 30-foot radius sphere of pure toxic chakra.</p><p>The sphere spreads around corners and the area is
      heavily obscured. Plants and adversaries less than 1/4th of your level immediately die. Creatures other than you
      that begin their turn or enter the area for the first time on a turn take 10d4 poison damage, then must make a
      Constitution saving throw. On a failed save, it gains 2 ranks of envenomed, and becomes poisoned. At the end of
      each turn a creature remains poisoned this way, it must make another Constitution saving throw, gaining 1 rank of
      Exhaustion on a failed save.</p><pre><code></code></pre><p>A creature that fails the initial saving throw also
      reduces its hit point maximum by an amount equal to the poison damage dealt. This hit point reduction lasts until
      its next long rest or if it is healed by a medical ninjutsu of S-Rank or higher. A creature's hit point maximum
      reduced to 50% or less by this effect becomes enters a pseudo-dying condition. While in this condition it makes
      death saving throws at the start of its turn. After failing all death saves, it is reduced to 0 hit points and
      dies.</p><p>While maintaining concentration, you can use your action on your turn to expel the slow exhaust of
      toxic chakra all at once, causing an abrupt explosion following the rise of a mushroom cloud of poison. All
      creatures within a 120-foot sphere must make a Constitution saving throw, taking 15d6 poison damage on a failed
      save or half as much on a successful save. The jutsu then immediately ends.</p>
    chat: ''
