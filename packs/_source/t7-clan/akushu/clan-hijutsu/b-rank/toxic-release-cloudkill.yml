system:
  description:
    value: >-
      <p>You create a 40-foot-radius sphere of toxic fog centered on a point. The area is heavily obscured and spreads
      around corners. It spreads around corners. It lasts for the duration or until strong wind disperses it.</p><p>When
      a creature enters the area for the first time on a turn or starts its turn there, that creature must make a
      Constitution saving throw. The creature takes 8d8 poison damage and gains 2 ranks of envenomed on a failed save,
      or half as much damage on a successful one and 1 rank of enenomed. Creatures are affected even if they hold their
      breath or don't need to breathe. Plants take double damage from this jutsu.</p><p>While concentrating on this
      jutsu, you can take control of the fog as a bonus action and command it to move 30 feet in any direction you
      choose along the ground. Otherwise, the fog moves 10 feet away from you at the start of each of your turns,
      rolling along the surface of the ground. The vapors, being heavier than air, sink to the lowest level of the land,
      even pouring down openings.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and increase the damage dealt by 2d8, and the size of the sphere by
      10 feet.</p>
