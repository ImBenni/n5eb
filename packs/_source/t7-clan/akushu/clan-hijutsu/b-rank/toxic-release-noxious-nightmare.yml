folder: 89QTb0EKzyT4zLEx
name: Toxic Release Noxious Nightmare
type: spell
_id: PgcM6SL87N4Nmov4
img: systems/n5eb/assets/content/clans/akushu.webp
system:
  description:
    value: >-
      <p>You lace 20-foot radius sphere of air surrounding creatures with hallucinogenic toxins at a point you can see
      in range, melting their minds with toxin fueled fear and misery. Creatures in this area must make a Wisdom saving
      throw. Creatures that fail against this jutsu can repeat the save at the end of each of its turns, ending the
      effects on itself on a success.</p><p><strong>Success:</strong> A creature is
      unaffected.</p><p><strong>Failure:</strong> An affected creature takes 4d12 + genjutsu modifier poison damage and
      gains 1 rank of envenomed, and 1 rank of fear against you for the next minute. Each time the creature takes damage
      from the envenomed condition, it loses grip on its own sanity, reducing its Intellgence and Wisdom by
      -1.</p><ul><li>When a creature reaches 0 Intelligence, it loses the ability to cast Ninjutsu.</li><li>When a
      creature reaches 0 Wisdom, it loses the ability to cast Genjutsu</li><li>When a creature reaches 0 in both scores,
      its mind succumbs to madness and it dies.</li></ul><p><strong>Critical Failure:</strong> An affected creature
      takes 6d12 + genjutsu modifier poison damage and gains 2 rank of envenomed, and 2 rank of fear against you for the
      next minute. Each time the creature takes damage from the envenomed condition, it loses grip on its own sanity,
      reducing its Intellgence, Wisdom, and Charisma scores by -2.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, increase the damage dealt by 2d12, and
      increase the sphere's radius by 10 feet.</p>
