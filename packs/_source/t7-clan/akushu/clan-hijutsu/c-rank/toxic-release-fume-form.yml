system:
  description:
    value: >-
      <p>You begin to emit a foul fog expelling from the open pores of your skin, enshrouding your body. Until the jutsu
      ends, you gain the following benefits:</p><ul><li>You have resistance to bludgeoning, piercing, and slashing
      damage, but vulnerability to wind damage.</li><li>As a bonus action on your turn, you transform fully into fog,
      gaining a flying speed equal to your walking speed. This flying speed lasts until the end of the current turn
      where you harmlessly fall 50 feet. While befitting from this speed, your movement doesn't provoke opportunity
      attacks, and you can pass through narrow openings as small as 1 inch. If you end your movement without enough
      space, you are shunted to the nearest unoccupied space.</li></ul>
    chat: ''
