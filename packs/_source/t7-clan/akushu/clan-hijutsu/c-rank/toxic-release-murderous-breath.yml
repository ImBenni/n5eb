system:
  description:
    value: >-
      <p>You spew a deathly exhale of noxious fumes in a 40-foot cone. All creatures in the area must make a
      Constitution saving throw, taking 8d6 poison damage and gain 1 rank of envenomed on a failed save, or half as much
      damage on a successful save.</p><p>A creature that fails this save also reduces its hit point maximum by an amount
      equal to the poison damage dealt. This hit point reduction lasts until its next long rest or if it is healed by a
      medical ninjutsu of A-Rank or higher.</p><p>A creature's hit point maximum reduced to 50% or less with this jutsu
      also suffers the poisoned condition.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3 and increase the damage dealt by 2d6 and the cone increases its
      range by 10 feet.</p>
