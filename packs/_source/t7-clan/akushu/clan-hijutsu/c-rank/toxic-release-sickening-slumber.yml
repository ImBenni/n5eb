name: Toxic Release Sickening Slumber
type: spell
_id: pmUm8DDv07iPtse3
img: systems/n5eb/assets/content/clans/akushu.webp
system:
  description:
    value: >-
      <p>You lace the air surrounding a creature with hallucinogenic toxins, inducing a sudden wave of nausea and
      fatigue. The creature must make a Wisdom saving throw. Creatures that fail against this jutsu can repeat the save
      at the end of each of its turns, ending the effects on itself on a success.</p><p><strong>Critical
      Success:</strong> The creature is unaffected and is immune to the effects of this jutsu for 1
      hour.</p><p><strong>Success:</strong> The affected creature takes half damage from
      <em>Failure</em>.</p><p><strong>Failure:</strong> The affected creature takes 4d6 + genjutsu modifier poison
      damage and gains 1 rank of envenomed. A creature envenomed this way suffered the effects of slowed as if it had
      equal ranks of both conditions.</p><p><strong>Critical Failure:</strong> The affected creature suffers the same
      effects of <em>Failure</em>, but is also rendered unconscious for the next 10 minutes. A creature who is
      unconscious this way can be awoken if its ranks of envenomed are removed, or by taking damage of any type except
      poison or damage from the envenomed condition.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of creatures you can target by +1.</p>
