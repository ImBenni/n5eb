system:
  description:
    value: >-
      <p>You coat either your fists or a melee weapon within reach with fuming toxic chakra. If coating your fists, you
      may use Intelligence for its attack and damage rolls.</p><p>Your fists or the weapon now deal an additional 1d8
      poison damage on each hit. When you score a critical hit against a creature this way it must succeed a
      Constitution saving throw or become envenomed.</p><p>Creatures you damage with a melee attack enhanced by this
      jutsu that have ranks of envenomed inflicted take an additional 1d6 poison damage for each rank it possesses.</p>
