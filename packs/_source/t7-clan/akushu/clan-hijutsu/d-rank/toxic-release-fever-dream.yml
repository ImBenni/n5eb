system:
  description:
    value: >-
      <p>You lace the air of a toxic bubble with hallucinogenic toxins, inciting
      horrific visuals. You create a 5-foot sphere of invisible toxins at a
      points you can see in range. Creatures within the sphere must make a
      Wisdom saving throw. A creature that fails against this genjutsu can
      repeat the save at the end of each of its turns, ending the effects on
      itself on a success.</p><p><strong>Critical Success:</strong> The creature
      is unaffected and is immune to the effects of this jutsu for 24
      hours.</p><p><strong>Success:</strong> The creature is
      unaffected.</p><p><strong>Failure:</strong> The creature takes 3d4 +
      genjutsu modifier poison damage and gains 1 rank of Fear against you for
      the next minute.</p><p><strong>Critical Failure:</strong> The creature
      takes 3d6 + genjutsu modifier poison damage and gains 1 rank of Fear
      against you for the next minute. While it has this rank of Fear it is
      considered Poisoned.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above D-Rank, increase the cost of this jutsu by 3,
      increase the damage dealt by 2d4 and 2d6 respectively, and the size of the
      sphere increases by 5 feet.</p>
