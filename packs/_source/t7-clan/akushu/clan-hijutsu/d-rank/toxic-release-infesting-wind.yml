system:
  description:
    value: >-
      <p>A gale of toxic gas infects a creature in range, forcing them to
      stumble away from the cloud. The target must succeed a Constitution saving
      throw, or it takes 2d8 poison damage and gains 1 rank of envenomed, and
      moves 5 feet in a random direction if it can move and its speed is at
      least 5 feet. Roll a d4 for the direction: 1, north; 2, south; 3, east; or
      4, west. This movement doesn't provoke opportunity attacks, and if the
      direction rolled is blocked, the target doesn't move.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and increase the damage dealt by
      2d8.</p>
