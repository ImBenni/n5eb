system:
  description:
    value: >-
      <p>You breathe deeply, lacing the air in your lungs with a heavy dosage of
      toxins, then spew a cloudy orb at a target in range. Make a ranged
      ninjutsu attack. On a hit, you deal 4d6 poison damage. Then the target and
      any creature within a 10-foot radius sphere at that point must make a
      Consitution saving throw. On a failed save, creatures take 2d4 poison
      damage and become poisoned until the end of their next turn, or take half
      as much damage on a success.</p><p>The sphere lingers in that space for
      the next minute. Creatures that enter this space for the first time on a
      turn or begin their turn there must succeed a Constitution saving throw or
      take 2d4 poison damage.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by
      3 and increase the damage dealt by 1d6 and 1d4 damage
      respectively.</p><p></p>
