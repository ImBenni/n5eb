system:
  description:
    value: >-
      <p>(You must have <em><strong>Toxic Release II</strong></em> ) </p><p>Beginning at 7th level, when casting a
      Ninjutsu with the Wind Release Keyword, you can change the damage type to poison, it gains the Inhale keyword, and
      adds half your Intelligence modifier to the damage roll if it doesn't already, and if that jutsu inflicts
      bleeding, you may instead inflict ranks of envenomed. Creatures envenomed or poisoned by jutsu you cast are unable
      to speak intelligibly, as they cough and wheeze violently.</p>
