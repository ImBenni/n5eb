img: systems/n5eb/assets/content/clans/cerealian.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Cerealian Clan, Level 4+<br />You train
      your newly evolved eye to enhance your clan's sniping prowess to its limits. You gain the following
      benefits;</p><ul><li>Increase your Intelligence score by 1, to a maximum of 20.</li><li>While your <strong>Evolved
      Eye Awakening</strong> is active, reduce the cost of all Cerealian Hijutsu by -1.</li><li>While your
      <strong>Evolved Eye Awakening</strong> is active, when you score a critical hit on a creature with a ranged
      attack, any Damage Reduction the creature possesses from the armor they possess is reduced by your Intelligence
      modifier for the remainder of combat as you chip a piece of their armor. A creature can only be affected by this
      once per combat.</li><li>At the start of a new round in combat, you may select one ally with a lower initiative
      count than you. During this round, you may take your turn immediately after their turn. On this turn, you gain
      advantage on the first ranged attack roll you make and may immediately activate your <strong>Evolved Eye
      Awakening</strong> feature. You may do this once per long rest.</li></ul>
    chat: ''
