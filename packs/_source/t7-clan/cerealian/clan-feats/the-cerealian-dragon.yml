system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Cerealian Clan<br />You adapt your clan's
      normal patterns in ways to hold your own in hand to hand combat. You gain the following
      benefits;</p><ul><li>Increase your Strength or Dexterity score by 1, to a maximum of 20.</li><li>Cerealian
      features and hijutsu that mention ranged weapon attacks now also apply to your melee weapon attacks and unarmed
      attacks.</li><li>Cerealian features and hijutsu that mention ranged ninjutsu attacks now also apply to your melee
      ninjutsu attacks.</li><li>Your unarmed damage becomes a 1d6, unless it is already higher. If it is, increase it by
      1 step. When you would deal your unarmed damage, you can change the damage to necrotic.</li><li>When casting a
      Cerealian hijutsu you may reduce the range to 5 feet and make the attack a melee ninjutsu attack. If a jutsu
      modified in this way lands a critical hit, you deal an additional 2d12 damage.</li></ul>
