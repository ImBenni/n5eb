system:
  description:
    value: >-
      <p>At 7th level, your natural vision is terrifying. When looking at an item, you can view its craftsmanship.
      You're able to tell whether it is an original product or an imitation of whatever the original was. If looking at
      an object or creature that would have its true appearence obscured, altered, or transformed by a feature, jutsu,
      or trait, you can add a 1d6 to rolls to dechipher its true appearence.</p><p>Also at 7th level, when you would
      make a saving throw against a Genjutsu, on a 19-20, you automatically succeed the save. When you score a critical
      hit on a creature, until the end of your next turn, you gain a bonus to saving throws that creature would impose
      on you equal to half your highest critical threat range bonus, rounded up. </p><p>At 18th level, this becomes your
      full bonus.</p>
    chat: ''
