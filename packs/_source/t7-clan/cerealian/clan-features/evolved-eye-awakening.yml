name: Evolved Eye Awakening
type: feat
_id: 0yt6slfzvJkxJiI5
img: systems/n5eb/assets/content/clans/cerealian.webp
system:
  description:
    value: >-
      <p>At 3rd level, your clan's innate evolved eye is able to enhance itself even further. This allows you to see
      with even higher precision. However, they are not arrogant enough to give it a name. As a bonus action, you may
      spend 5 chakra to activate this eye for 10 minutes. You gain the following benefits.</p><ul><li>You gain 60 feet
      of Chakra sight. This Chakra sight can see the vitals of creatures, allowing you to see the Hit Points of
      creatures within your chakra sight range.</li><li>Advantage on Insight and Perception checks</li><li>+5 to Passive
      Insight and Perception</li><li>+1 Critical Threat Range for all attack rolls</li><li>Cerealian hijutsu have its
      range increased by an amount of feet equal to 5 times your proficiency bonus.</li><li>As a bonus action you can
      lock onto a creature, attacks rolls made against this creature has an additional +2 bonus. However, attack rolls
      made against other creatures are given a -2 penalty. You may lock off a creature at the end of your turn. At 15th
      level, you may lock on to two creatures at a time.</li></ul>
    chat: ''
