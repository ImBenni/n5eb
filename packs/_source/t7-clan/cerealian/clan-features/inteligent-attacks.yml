folder: EWPlPDHEPoJGnVO3
name: Inteligent Attacks
type: feat
_id: nR0RUKwANFsPzGwe
img: systems/n5eb/assets/content/clans/cerealian.webp
system:
  description:
    value: >-
      <p>Also at 1st level, you're trained in deadly ranged combat. When you make a ranged weapon attack, you may use
      your Intelligence modifier for attack and damage rolls.</p><p>At 3rd level, when you would make a ranged weapon
      attack or an attack with Cerealian Hijutsu, you increase the critical threat range by +1.</p><p>At 11th level,
      once per turn when you make a ranged weapon attack, you may choose to aim for an <strong>Arm</strong> or
      <strong>Leg</strong>.</p><ul><li><strong>Arm:</strong> Aiming for the arm gives you a -2 to the attack. However,
      on a hit, you deal an additional 1d6 damage and force a creature to make a Strength saving throw vs your Ninjutsu
      save DC. On a failed save, the creature's arm is rendered useless and is unable to weave handsigns until the end
      of their next turn.</li><li><strong>Leg:</strong> Aiming for the leg gives you a -2 penalty to the attack.
      However, on a hit, you deal an additional 1d6 damage and force a creature to make a Constitution saving throw vs
      your Ninjutsu save DC. On a failed save, the creature's movement speed is reduced by half until the end of their
      next turn.</li></ul>
