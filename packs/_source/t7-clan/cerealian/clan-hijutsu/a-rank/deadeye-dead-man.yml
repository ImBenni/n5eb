name: Deadeye, Dead Man
type: spell
_id: QI5fZKLkP6skCrSy
img: systems/n5eb/assets/content/clans/cerealian.webp
system:
  description:
    value: >-
      <p>To cast this jutsu you must have <strong>Evolved Eye Awakening</strong> active. With your most precise attack,
      you strike at a specific area of a target to unleash a debilitating effect. Make a ranged ninjutsu attack and
      select one of the following limbs, the outcome changing depending on the
      limb;</p><ul><li><p><strong>Head:</strong> On a hit, you deal 10d12+9 Necrotic damage. The Creature must make a
      Constitution save, on a failed save they are blinded and dazed until the end of their next
      turn.</p></li><li><p><strong>Arm:</strong> On a hit, you deal 8d10+7 Force damage. The Creature must make a
      Strength save, on a failed save they cannot use weapons and one arm is completely unusable until the end of their
      next turn.</p></li><li><p><strong>Body:</strong> On a hit, you deal 8d8 Necrotic damage. The Creature must make a
      Constitution save, on a failed save they are paralyzed until the end of their next
      turn.</p></li><li><p><strong>Leg:</strong> On a hit, you deal 8d10+7 Force damage. The Creature must make a
      Dexterity save, on a failed save the creature's movement speed is reduced to 0 and they are slowed until the end
      of their next turn.</p></li></ul><p>If you reduce a creature's HP to 0 with a critical hit, the chosen limb flies
      off in the same instant. In the case of the Body it pierces the heart.</p>
