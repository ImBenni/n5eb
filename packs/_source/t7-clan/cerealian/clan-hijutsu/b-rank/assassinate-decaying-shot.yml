system:
  description:
    value: >-
      <p>You fire a bullet of chakra that lingers in a target. Make a ranged ninjutsu attack. On a hit you deal 6d10+5
      Necrotic damage. At the end of the target's turn it must make a constitution save. At the end of their turn they
      take 1d10 Necrotic damage. They must repeat this save at the end of their turns until they make a successful save.
      On a success, the effects of this jutsu immediately end.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage by 2d10+1.</p>
