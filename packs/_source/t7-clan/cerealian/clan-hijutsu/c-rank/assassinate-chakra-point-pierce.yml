    value: >-
      <p>You strike a creature's chakra point with extreme precision. Make a ranged ninjutsu attack, on a hit you deal
      5d8+4 Necrotic damage and half the result as chakra damage. On a critical hit, you deal an amount of chakra damage
      equal to the amount of necrotic damage dealt.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d8+1.</p>
