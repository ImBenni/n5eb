system:
  description:
    value: >-
      <p>You aim at a point you can see on the ground within range and fire your chakra in the space. In the space
      arises a medium sized spirit of pure ghostly chakra.</p><p>For the duration of this jutsu, when an allied creature
      passes through the spirit or starts their turn in the space heal 2d6+3 Hit Points. This spirit cannot heal
      constructs or undead. Hostile creatures that would pass through or start their turn in the spirit invoke its
      wrath, taking 2d6 Necrotic damage.</p><p>As a bonus action on your turn, you can move a spirit up to 30 feet to a
      space that you can see. A creature can only be affected by a single spirit once per round.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the
      amount of spirits created by +1.</p>
