system:
  description:
    value: >-
      <p>You fire a blast of chakra perfectly configured to weaken a creature's ability to concentrate. Make a ranged
      ninjutsu attack. On a hit you deal 3d10+2 Force damage. Additionally, if the creature is concentrating on a jutsu,
      they reduce their roll by 1d4+1. You can choose to knock out a target with this jutsu, as opposed to dealing a
      lethal blow.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3 and the damage by 2d10+1.</p>
