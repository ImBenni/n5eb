system:
  description:
    value: >-
      <p>You make a finger gun and shoot a powerful chakra bullet. Make a ranged ninjutsu attack against a creature. On
      a hit you deal 3d6+2 Force damage. This bullet ricochets off the original target and to a different one. On a hit,
      select another creature within range, comparing the original attack roll vs the new target's AC. On a hit you deal
      the same rolled damage to the second target. If this jutsu would kill a target, you can choose to just knock them
      out.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3 and the damage by 2d6+1. When casted at B-rank you may chain up to 3 targets. At S-rank this
      becomes 4 targets.</p>
