    value: >-
      <p>You shoot a creature, attempting to harmlessly restrain them. Make a ranged ninjutsu attack against a creature
      in range. On a hit they gain one rank of the Shocked condition. If this jutsu scores a critical hit, the creature
      is also Slowed until the end of their next turn. If a creature is hit with another Cerealian Hijutsu while they
      have a condition from this jutsu, they take an extra 2d12 damage on a crit.</p>
