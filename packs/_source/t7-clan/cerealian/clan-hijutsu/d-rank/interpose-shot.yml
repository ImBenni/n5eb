system:
  description:
    value: >-
      <p>You quickly shoot out a chakra bullet in an attempt to eliminate a ranged threat. Make a ranged ninjutsu attack
      against the attack, if the result is higher than the triggering attack's roll the attack is negated and you
      compare your attack roll to the triggering creature's AC. On a hit you pierce through the target, dealing 4d4+3
      Force damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3 and the damage by 2d4+1.</p>
