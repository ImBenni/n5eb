system:
  description:
    value: >-
      <p>To cast this jutsu you must have <strong>Evolved Eye Awakening</strong> active. You do not need to pay chakra
      as a part of concentrating on this jutsu. You lock onto a creature, not allowing them to leave your
      sight.</p><p>When you hit a creature with a ranged attack or as an action, you are able to lock onto a creature as
      long as you can see them. Otherwise, a target creature is marked for the duration. You gain a 1d4 bonus to all
      ranged weapon attacks and attacks from Cerelian hijutsu against this creature. This creature can not gain benefits
      of becoming invisible or being hidden from you.</p>
