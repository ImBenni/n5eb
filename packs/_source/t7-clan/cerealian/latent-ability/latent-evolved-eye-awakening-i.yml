system:
  description:
    value: >-
      <p>Beginning at 7th level, you can activate your <strong>Evolved Eye</strong> for 1 minute by spending 5 chakra as
      a bonus action. While your evolved eye is active you gain 30 feet of chakra sight, advantage on Insight and
      Perception checks, a +3 bonus to Passive Insight and Passive Perception, a +1 bonus to critical threat range for
      all attack rolls, a bonus to the range of Cerealian hijutsu equal to 5 times half your proficiency bonus.
      Additionally, as a bonus action while your <strong>Evolved Eye</strong> is active, you can <em>Lock On</em> to a
      specific creature. While locked onto a creature, you gain a +2 bonus to attack rolls made against them, and a -2
      penalty to attack rolls against any other creature. You can end your <em>Lock On</em> at the end of your turn.</p>
    chat: ''
