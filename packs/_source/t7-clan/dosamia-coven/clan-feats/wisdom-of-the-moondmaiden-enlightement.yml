system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Dasomia Clan, Level 12+ <br />You embark
      on the final step, trusting the Moonmaiden's teachings and following far enough in her path to open your soul to
      the weave of Magick.</p><ul><li>Your Magick Die becomes d8's.</li><li>You may cast the <em><strong>Aspect of the
      Moonmaiden: Third Eye</strong></em> jutsu as an Action or Bonus Action. When you do, you double the range of its
      Chakra Sight and Blindsight, and can perceive everything outside its range as normal.</li><li>Your body becomes
      infused with the weave of magick which permeates everything, allowing it to flow through you without harm as it
      does all natural life. When you take a rest, gain temporary chakra points equal to twice your Proficiency bonus +
      twice your Charisma ability score. The temporary chakra points stack with other sources of chakra
      points.</li></ul>
