    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Dasomia Clan, Level 4+ <br />You embark on
      the first step, studying ancient Esoterica and incoporating both of the Moonmaiden's paths into your
      heart.</p><ul><li>Increase your Constitution, Charisma or Wisdom score by 1, to a Maximum of 20.</li><li>You can
      learn jutsu from the opposite Path. If follow the path of the Blue Moon, you can learn Blood Moon Hijutsu. If
      follow the path of the Blue Moon, you can learn Blood Moon Hijutsu.</li><li>You learn one additional Dasomia clan
      Hijutsu that you qualify for.</li><li>You can create and learn Dasomia clan Hijutsu in half the required time and
      with half the required cost.</li></ul>
