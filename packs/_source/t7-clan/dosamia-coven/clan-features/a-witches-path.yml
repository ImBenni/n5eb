system:
  description:
    value: >-
      <p>At 1st level, you embody one of two different ancient arcane traditions of Dasomia Coven. You can learn Clan
      Hijutsu with the corresponding Branch style Keyword. This cannot be changed later on.</p><ul><li>Path of the Blood
      Moon: Practiced by those who taken on the <em><strong>Dagger</strong></em> as their <strong>Casting
      Focus</strong>, witches of the Dasomia Coven who embark of the Path of the Blood Moon look upon the Moonmaiden's
      passion and determination to brave the dark unknown without fear but an open mind for guidance.</li><li>Path of
      the Blue Moon: Practiced by those who taken on the <em><strong>Staff</strong></em> as their <strong>Casting
      Focus</strong>, witches of the Dasomia Coven who embark of the Path of the Blue Moon look upon the Moonmaiden's
      serenity and perseverance to ever stride forward on her ten thousand year long journey into the stars for guidance
      .</li></ul>
