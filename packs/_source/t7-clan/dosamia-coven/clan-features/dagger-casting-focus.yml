system:
  description:
    value: >-
      <p>If you select a <em><strong>Dagger</strong></em> as your Casting Focus, you gain a Greater Kunai made with
      metal that takes on the appearance of the starry night sky, shifting as you move and turn it. While wielded by
      you, this Kunai grants you the following benefits:</p><ul><li>You ignore the HS component for all
      Jutsu.</li><li>You increase weapon damage die of this Focus by 2 steps.</li><li>You grant this Focus the
      Returning, Deadly, and the Lethal weapon properties.</li></ul>
