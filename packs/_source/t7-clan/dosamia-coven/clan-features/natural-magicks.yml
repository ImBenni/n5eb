name: Natural Magicks
type: feat
_id: SG475QTCe98ZGjZQ
img: systems/n5eb/assets/content/clans/dasomia-coven.webp
system:
  description:
    value: >-
      <div class="page phb" id="p16"><div class="columnWrapper"><p>Starting at 7th level, you have learned how to touch
      the weave of magick, altering the nature of each spell at whim. This power is represented as a pool of d6's called
      Magick Die. You begin with a number of these Magick die equal to your level. You can spend Magick die on the
      following effects twice per turn and regain any spent Magick die on a long rest.</p><ul><li><strong>Arcana of
      War:</strong> When you deal damage with a Jutsu, you can spend up to five Magick Die, converting all damage done
      to Chakra or Force damage (you choose), adding the result as damage, and reducing the cost of the Jutsu by 1 for
      each Magick die spend (Min 1).</li><li><strong>Ambient Binding:</strong> When you would begin concentrating on a
      Jutsu, you can spend up to two Magick die, reducing the cost of Concentration by half the
      result.</li></ul></div></div><div class="page phb" id="p17"><div class="columnWrapper"><ul><li><strong>Confluence
      of Mana:</strong> When you cast a Jutsu, you can spend up to three Magick Die, turning all terrain within 30 feet
      of you into difficult terrain until the end of your next turn. You gain half cover while within this difficult
      terrain and all other creatures increase the cost of all Jutsu by the result of your Magick die while within this
      difficult terrain, as the ambient nature chakra in the area surges wildly, tearing the earth assunder around
      you.</li><li><strong>Dark Path:</strong> When you would move, you can spend up to four Magick die, teleporting to
      any source of in dim light or darkness that is within a number of feet equal to 5 x the result of the roll. You do
      not need to be aware of this area to teleport to it.</li></ul><p>When you reach 15th level, you gain an additional
      amount of Magick die equal to your Charisma ability modifier and regain all Magick die on a rest.</p></div></div>
