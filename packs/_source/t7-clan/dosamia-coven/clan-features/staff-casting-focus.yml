system:
  description:
    value: >-
      <p>If you select a <em><strong>Staff</strong></em> as your Casting Focus, you gain a Greater Quarterstaff that
      creates small trails of magical, starry darkness as it moves in combat, invoking images of the night sky. While
      wielded by you, this Quarterstaff grants you the following benefits:</p><ul><li>You ignore the HS component for
      all Jutsu.</li><li>You increase weapon damage die of this Focus by 2 steps.</li><li>You grant this Focus the
      Ranged (60/120) weapon property, and the Finesse weapon property.</li></ul>
