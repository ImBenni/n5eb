system:
  description:
    value: >-
      <p>At 18th level, while you are in combat at Night, under the light of the stars and any phase of the moon except
      the new moon, you regain 1 Magick die at the start of each of your turns. Additionally, you can also spend Magick
      die on the following effect:</p><ul><li><strong>Harmonic Convergence:</strong> When you would start your turn, you
      can spend one Magick die, adding twice the result as temporary hit points and chakra points until the start of
      your next turn.</li></ul>
