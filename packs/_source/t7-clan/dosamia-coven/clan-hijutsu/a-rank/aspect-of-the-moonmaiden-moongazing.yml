system:
  description:
    value: >-
      <p>Blue Moon</p><p>As part of the requirements of this jutsu you must be be benefitting from the
      <em><strong>Aspect of the Moonmaiden: Third Eye</strong></em> jutsu.</p><p>You look to the moon and stars, seeing
      the Moonmaiden's path clearly and understanding what you must do to follow. Regardless of the time of time, you
      always are considered to be under a stary sky featuring the cresecent moon, and treat all Magick die as two steps
      higher. At Night, under the light of the stars and any phase of the moon except the new moon, you also reduce the
      cost of all Dasomia Hijutsu by -3 and reroll all 1's on Magick die and Dasomia Hijutsu damage rolls.</p>
