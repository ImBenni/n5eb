system:
  description:
    value: >-
      <p>3 Hit Die per creature</p><p>As part of the requirements of this jutsu you must be under the light of the stars
      and the Full Moon. You invite a number of creatures up to your proficiency bonus to partake in an ancient blood
      ritual, underneath the pale moonlight of the Moonmaiden, inviting them in your Coven.</p><p>Each creature must
      offer up an equal share of their blood, permanently reducing their maximum Hit Die by the amount offered, to take
      part in this Jutsu. This Jutsu lasts until one of its casters is killed outright or fails its final death saving
      throw.</p><p>For the duration of this Jutsu, all creatures may speak telepathically to one another regardless of
      distance, ignore all Keywords for the sake of assisting in a Combination Jutsu, double the any discounts given for
      combination casting a Jutsu, may freely share Hit points and Chakra points with one another as a Bonus Action, and
      gain access to all C rank or lower Hijutsu each caster can cast.</p><p><strong>Combination:</strong> If this jutsu
      is cast as a Combination jutsu with 2 or more casters reduce the cost by -5. Any creature can participate in this
      ritual, regardless of not having access to the appropriate Keywords.</p>
