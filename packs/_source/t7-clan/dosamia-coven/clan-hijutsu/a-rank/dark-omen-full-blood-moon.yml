system:
  description:
    value: >-
      <p>Blood Moon</p><p>As part of the requirements of this jutsu you must be under the light of the stars and any
      phase of the moon except the new moon.</p><p>Dasomian legends have spoken of a Presence sealed away in a prison
      secreted away by the Moonmaiden in the dark side of the moon. You conjure an echo of its presence, imprinted into
      the weave of magick, and offer a sacrifice of your own blood to create of vessel of chakra bond under your control
      for it to inhabit. The moon turns Blood Red as part of casting this Jutsu and the Moon Presence uses your Genjutsu
      attack bonus and Save DC for effects that require it. It rolls initiative as it has its own turns, using your
      Genjutsu ability modifier + Proficiency as its Initiative.</p><p>You can as a bonus action on your turn, so long
      as you are in physical contact with the Moon Presence, you can merge into its head. While you are merged in this
      way you have total Cover against attacks and other effects outside of it.</p>
