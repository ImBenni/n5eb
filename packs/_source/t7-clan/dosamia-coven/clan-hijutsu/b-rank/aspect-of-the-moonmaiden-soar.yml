name: Aspect of the Moonmaiden Soar
type: spell
_id: G53I5yw2FtRDIRMt
img: systems/n5eb/assets/content/clans/dasomia-coven.webp
system:
  description:
    value: >-
      <p>A signature technique of virtually every Coven of the land of Cackles, the Dasomia Coven believes it was the
      Moonmaiden who first taught witches how to fly as she journeyed across the land, sharing her wisdom with many of
      the lesser witches. Channeling the ambient mana into your staff, a broom, or another similarly convenient object,
      you use it to take flight. You do not need to spend chakra to maintain Concentration on this jutsu.</p><p>You
      increase your movement speed by 30 feet, gain a fly speed equal to your movement speed, and can hover. If used
      during exploration or land travel, you treat normal travel pace as Fast travel pace, and you double Fast travel
      paces distances. At Night, under the light of the stars and any phase of the moon except the new moon, you instead
      increase your movement speed by 60 feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3, and the movement speed gained by 15 feet.</p>
