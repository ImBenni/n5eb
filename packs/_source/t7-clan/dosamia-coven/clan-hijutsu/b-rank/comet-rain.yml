system:
  description:
    value: >-
      <p>Blue Moon</p><p>As part of the activation of this jutsu, you must be airborne and flying or hovering at least
      30 feet off the ground. You take the sky, raining magical explosions down into the area beneath you</p><p>You move
      up to your full movement in a straight line. All creatures within 15 feet of the ground you fly over while on the
      way to the select location must make a Dexterity saving throw, taking 8d8 Force damage and being knocked prone, or
      half as much on success.</p><p>The area permanently becomes difficult terrain and is shrouded in a starry
      darkness. A creature with Chakra Sight can't see through this darkness, and light created using an effect or jutsu
      of B-Rank or lower cannot illuminate it.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3, and increase the damage by 2d8.</p>
