system:
  description:
    value: >-
      <p>Blood Moon</p><p>You channel the ambient mana around your vessel before teleporting to anywhere within 10 feet
      of your target, shrouded in a veil of starry darkness before unleashing a combo of multiple simultaneous attacks
      with your spectral blades.</p><p>Make two melee Ninjutsu or Taijutsu attacks, dealing your [weapon damage] + 3d10
      Force damage for each attack. On each hit, the target must succeed a Charisma saving throw, taking half the result
      as Chakra damage on a failed save. At Night, under the light of the stars and any phase of the moon except the new
      moon, increase this jutsu's damage by one step.</p><p>You can spend spectral blades created by <em><strong>Witch
      Blade.</strong></em> For every three spectral blades spent, you can make one additional melee ninjutsu or Taijutsu
      attack. You can spend 6 spectral blades in this way.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and damage of this jutsu by 1d10.</p>
