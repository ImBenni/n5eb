_id: zTCd1XlHCTIlAbbv
img: systems/n5eb/assets/content/clans/dasomia-coven.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu you must be under the light of the stars and any phase of the moon
      except the new moon and be benefitting from the <em><strong>Aspect of the Moonmaiden: Third Eye</strong></em>
      jutsu.</p><p>You study the stars with your Astral third eye, receiving their wisdom through unspoken word and
      ancient promisses. Ask up to three questions that can be answered with a yes or no. You must ask your questions
      before the spell ends. You receive a correct answer for each question.</p><p>The weave of fate shown by the night
      sky is never set in perfect clarity, so you might receive "unclear" as an answer if a question pertains to
      information that lies beyond the reach of celestial knowledge. In a case where a one-word answer could be
      misleading or contrary to the Moonmaiden's interests, the GM might offer a short phrase as an answer instead. If
      you cast this jutsu two or more times before finishing your next full rest, there is a cumulative 25 percent
      chance for each casting after the first that you get no answer. The GM makes this roll in secret.</p>
