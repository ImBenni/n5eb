system:
  description:
    value: >-
      <p>You channel the ambient mana around your vessel before speaking a dark prophecy the creature's true nature.
      Select one creature you can see within range, forcing them to make a Charisma saving throw, as the words begin to
      echo endlessly in their deep subcontious, changing their perception of their body. At Night, under the light of
      the stars and any phase of the moon except the new moon, they instead make their save at disadvantage. <br
      /></p><p><strong>Success:</strong> The affected creature gains 1 rank of the Confused condition until the start of
      your next turn, as their grip on reality momentarily slips.</p><p><strong>Failure:</strong> Affected creature
      takes 4d6 psychic damage and gains 2 ranks of Concussion and Weakened.</p><p><strong>Critical Failure:</strong>
      Affected creature takes 6d6 psychic damage and gains 3 ranks of Concussion and Weakened. <br /></p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the
      number of creatures you can target by +1 and the damage by 1d6.</p>
