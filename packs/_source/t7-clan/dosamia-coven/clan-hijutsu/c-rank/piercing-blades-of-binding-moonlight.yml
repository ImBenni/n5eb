system:
  description:
    value: >-
      <p>Blood Moon</p><p>You conjure a volley of magical swords made out of pure moonlight high up in the sky, before
      calling on them to rain down on your enemies. Target creatures in range makes a Dexterity saving throw, taking
      2d10 Force damage, set their movement speed to 0, and double the cost of all Jutsu for the duration on failure, or
      half as much on a successful save. Creatures can make a Charisma saving throw at the end of each of their turns to
      end all effects. At Night, under the light of the stars and any phase of the moon except the new moon, they
      instead make their saves at disadvantage.</p><p>You can spend spectral blades created by <em><strong>Witch
      Blade</strong></em>, for each spectral blade spent, increase the damage by 2d10. You can spend up to 3 spectral
      blades this way.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3, and damage by 1d10 and the radius by 5ft.</p>
