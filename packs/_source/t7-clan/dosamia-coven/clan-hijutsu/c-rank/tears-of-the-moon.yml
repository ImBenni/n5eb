system:
  description:
    value: >-
      <p>Blue Moon</p><p>You harvest a special blend of herbs at midnight, touched by the Moonmaiden's kiss, and brew
      them into a potent healing potion, ready to be activated at a moment's notice via prayer and an infusion of
      Magick.</p><p>When cast, a willing creature within range can drink the potion as part of casting this jutsu. The
      target gains Hit Points and temporary Chakra Points equal to 4d8 + your Ninjutsu ability modifier. Additionally,
      select one type of condition between <strong>Elemental</strong>, <strong>Physical</strong>,
      <strong>Mental</strong>, or <strong>Sensory</strong>. The target gains resistance to conditions of the chosen
      category for the next minute and removes all ranks of up to 2 conditions of your choice that they may
      possess.</p><p>At night, under the light of the stars and any phase of the moon except the new moon, increase all
      dice rolled as part of this jutsu by one step.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3, and increase the healing and temporary Chakra Points by
      2d8.</p>
