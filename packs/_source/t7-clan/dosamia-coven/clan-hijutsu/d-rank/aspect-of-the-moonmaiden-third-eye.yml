name: Aspect of the Moonmaiden Third Eye
type: spell
_id: 6UIXWfJpZOQztuCT
img: systems/n5eb/assets/content/clans/dasomia-coven.webp
system:
  description:
    value: >-
      <p>You center yourself and open your third eye, allowing you to directly perceive the weave of Magick. For the
      duration, your view of reality shifts. You gain a unique form of chakra sight and blindsight of 30 feet, which
      does not require sight. You can not perceive anything that is more than 30 feet away from you. You also gain
      immunity to genjutsu with the Visual keyword. You can perceive the Nature Affinities other creatures if any, are
      able to perceive how much Chakra a creature has based on an aura they exude, and can now perceive when a creature
      or area is under the effects of a Ninjutsu or Genjutsu of any type.</p><p>Additionally, you can make an Charisma
      (History) check to learn about the history of an object you are touching or your location, potentially causing
      cause you to experience vivid visions of the past connected to the object or location. At Night, under the light
      of the stars and any phase of the moon except the new moon, you increase the range of your chakra sight and
      blindsight to 60 feet and gain a +10 bonus to Charisma (History) checks.</p>
    chat: ''
