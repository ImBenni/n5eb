name: Dark Omen Only Woe
type: spell
_id: zdvJJClefszUrrj8
img: systems/n5eb/assets/content/clans/dasomia-coven.webp
system:
  description:
    value: >-
      <p>You channel the ambient mana around your vessel before speaking a dark prophecy of the future to come. One
      creatures of your choice within 30 feet of you must make a Charisma saving throw, as the shackles of a dark fate
      settle around their soul. At Night, under the light of the stars and any phase of the moon except the new moon,
      they instead make their save at disadvantage. <br /></p><p><strong>Critical Success:</strong> Affected creature is
      able to resist this Jutsu's effect, becoming immune to further castings of this Jutsu for the next 10
      minutes.</p><p><strong>Success:</strong> Affected creatures suffer disadvantage to the first attack roll, saving
      throw, or skill check they make after being affected by this Jutsu.</p><p><strong>Failure:</strong> Affected
      creatures suffer disadvantage to all attack rolls, saving throws, and skill checks they make until the start of
      your next turn.</p><p><strong>Critical Failure:</strong> Affected creatures suffer disadvantage to all attack
      rolls, saving throws, skill checks they make until the start of your next turn and take 2d6 Psychic damage each
      time they fail a roll while under the affects of this Jutsu. <br /></p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If cast at B-Rank, this Jutsu
      instead lasts 2 rounds on Failure or Critical Failure. If cast at S-Rank this Jutsu instead lasts 3 rounds on
      Failure or Critical Failure.</p><p></p>
