system:
  description:
    value: >-
      <p>Blue Moon</p><p>You channel the ambient mana around your vessel before speaking a dark prophecy of the future
      to come. One creature of your choice within 60 feet of you must make an Intelligence saving throw, as the weight
      of their future bears down, threatening to crush them. At Night, under the light of the stars and any phase of the
      moon except the new moon, they instead make their save at disadvantage.</p><p
      class="MsoNormal"><strong>Success:</strong> The affected creature increases the concentration costs of each jutsu
      by +5.</p><p class="MsoNormal"><strong>Failure:</strong> The affected creature increases the concentration costs
      of each jutsu by +5 and reduces their current Hit points by the same amount.</p><p
      class="MsoNormal"><strong>Critical Failure:</strong> The affected creature increases the concentration costs of
      each jutsu by +5, must pay the cost in both Chakra and Hit points, and is forced to concentrate on this Jutsu with
      you. It must use up one of its concentration slots to do so, can not choose to end concentration on this Jutsu,
      and can not lose concentration on this Jutsu.</p><p class="MsoNormal"><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and concentration costs of each Jutsu
      by +5. If cast at B-Rank or higher, increase the number of creatures you can target in range by +1</p>
