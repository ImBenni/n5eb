system:
  description:
    value: >-
      <p>Blood Moon</p><p>As a part of casting this jutsu, you must spend 1 spectral blade created by the
      <em><strong>Witch Blade</strong></em> jutsu. You call a spectral blade to your hand in the moment before an attack
      would hit and parry it. When you are damaged with an attack, you may roll your [weapon damage] + 2d8 and reduce
      the damage you receive by the result.</p><p>If you reduce the damage to 0, you may immediately use the spectral
      blade to attack any creature within 30 feet, as if using it as part of the <em><strong>Witch Blade</strong></em>
      jutsu.</p><p>You can spend spectral blades created by <em><strong>Witch Blade.</strong></em> For each spectral
      blade spent, you maintain the benefits of this jutsu against an additional instance of damage, until the end of
      your next turn. You can spend up to 3 spectral blades this way.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and reduce damage by an additional
      2d8. If cast at B-Rank increase the damage reduction by 1 step. If cast at S-Rank increase the damage reduction by
      2 steps.</p>
