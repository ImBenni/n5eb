system:
  description:
    value: >-
      <p>Blood Moon</p><p>You create 3 spectral blades out of pure chakra that mimics the appearance of your Ichor
      Weapon and circles around you like mini-satellites. As a bonus action on each of your turns, you can spend a
      spectral blade, allowing you to make a melee Ninjutsu or Taijutsu attack, slicing at a creature you can see within
      30 feet. On a hit, the target creature takes your [weapon damage] + 1d10 Force damage and must succeed a Charisma
      saving throw, taking half the result as Chakra damage on a failed save. Once all spectral blades have been
      expended this jutsu immediately ends.</p><p>You can alternatively spend the spectral blades created by this jutsu
      to fuel other <em><strong>Blood Moon</strong></em> Hijutsu you cast, enhancing their effects. If you would recast
      this jutsu, you retain all unspent spectral blades, adding them to your new total.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the number
      of spectral blades you create by 3 and damage of this jutsu by 1d10.</p>
