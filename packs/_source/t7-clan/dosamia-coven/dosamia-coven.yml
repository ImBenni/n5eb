system:
  description:
    value: >-
      <p>Hailing from the Land of Cackles, those of the Dasomia Coven have made their home inside and amidst the flying
      mountain of Witche's Howl, where they guard the strange Ichor-like chakra pools that exist within its heart.
      Secretive but open-minded, most Dasomia witches revered the first Moonmaiden and often are known to often send out
      their young witches on coming-of-age pilgrimages, to see the world and pray on the different facets of the
      moon.</p><h4 id="dasomia-traits">Dasomia Traits</h4><p><strong>Ability Score Increase:</strong> +2 Charisma, +1
      Constitution or +1 Intelligence <br /><strong>Speed:</strong> Your base walking speed is 30 feet. <br
      /><strong>Skill Proficiency:</strong> Nature, History. <br /><strong>Superior Darkvision:</strong> Bound to your
      Coven by blood, you have Darkvision up to 60 feet.</p>
