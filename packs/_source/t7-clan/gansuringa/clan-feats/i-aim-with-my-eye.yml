system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Gansuringa Clan, Level 4+ <br />Those of
      the Gansuringa Clan always find that there is no armor or hide they can not pierce, with steady hand, enough grit,
      and the right equipment. You gain the following Benefits;</p><ul><li>You ignore resistance to Piercing
      damage.</li><li>Hand Crossbows that have the Ammunition weapon property also count as a simple 1d6 bludgeoning
      melee weapon with the finesse property. Heavy Crossbows that have the Ammunition weapon property also count as a
      simple 1d10 bludgeoning melee weapon.</li><li>Damage rolls made with a Crossbow with the Black Powder Ammunition
      weapon property ignore an amount of Damage Reduction equal to half your level.</li><li>When you roll damage with a
      Crossbow you can reroll all 1's.</li></ul>
