name: I Kill With My Heart
type: feat
_id: bia5OYUvmEV1wKX8
img: systems/n5eb/assets/content/clans/gansuringa.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Gansuringa Clan, Level 8+ <br />With
      enough practice and near death experiences, you've become one of the first to grasp black powder's true potential
      and push its use in combat into a lethal art or science. You gain the following Benefits;</p><ul><li>Your Grit die
      increases in size by 1 Step. (D4&gt;D6&gt;D8&gt;D10&gt;D12)</li><li>You add your Wisdom or Charisma Ability
      Modifier (you choose) to Crossbow damage rolls, twice per turn.</li><li>You learn how to replace the Ammunition
      and Heavy properties from your Crossbow, Heavy weapons with the Black Powder Ammunition property, spending 10
      Weaponsmith Kit charges over the course of a long rest. When you do, you increase its base range to
      200/800.</li><li>When using a Crossbow, Hand with the Black Powder Ammunition property, you instead increase its
      base range to 120/480 and now always score a Critical Hit on a Natural 20, regardless of any Features or Jutsu
      that say otherwise.</li></ul>
    chat: ''
