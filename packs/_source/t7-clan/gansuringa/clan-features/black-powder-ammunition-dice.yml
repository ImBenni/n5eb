system:
  description:
    value: "<h3 id=\"black-powder-ammunition-dice\">Black Powder Ammunition dice</h3><p>In a firefight, where each individual bullet matters and one last shot before a reload could mean the difference between life and death, there is no room for uncertainty. You take a D12- this is your Black Powder Ammunition die. You do not roll Black Powder Ammunition Dice. Instead, you reduce its value by one step whenever you use an attack or a Jutsu with a weapon that has the Black Powder Ammunition trait. If you're down to 1 piece of ammunition and you use it, that's it. Remove it from your inventory. <br /></p><blockquote><h5 id=\"-black-powder-ammunition\">\_\_\_\_\_ Black Powder Ammunition</h5><p>\_\_\_\_\_\_\_\_\_\_\_\_\_\_ D12 &gt; D10 &gt; D8 &gt; D6 &gt; D4 &gt; 1</p></blockquote><p></p><h4 id=\"replenishing-black-powder-ammunition\">Replenishing Black Powder Ammunition</h4><p>Finally, each stack of Black Powder Ammunition has a bulk of 1 and can only be crafted using 1 charge of the Weaponsmith Kit over the course of a rest.</p>"
