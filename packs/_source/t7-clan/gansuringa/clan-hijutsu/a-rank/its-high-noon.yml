system:
  description:
    value: >-
      <p><em><strong>(This Jutsu cannot score a critical hit).</strong></em></p><p>You pause and enter a state of
      absolute serenity and determination, remembering the face of your father. For the duration of this jutsu, you do
      not spend Chakra to maintain it.</p><p>Mark up to five creatures within weapon range, reducing your ammunition
      dice by 1 step for each marked creature. At the start of your next turn, make a single ranged Taijutsu attack
      against each marked creature at advantage, regardless of range.</p><p>On a hit, they take your [Weapon Damage] +
      12d12. If you mark and hit only a single creature, that creature takes double damage.</p>
