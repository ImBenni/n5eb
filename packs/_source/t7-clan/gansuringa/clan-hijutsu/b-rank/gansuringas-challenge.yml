system:
  description:
    value: >-
      <p>You call out to a creature, deciding to settle things once and for all in a duel to the death—be it theirs or
      yours. Select one creature you can see within range, forcing them to make a Charisma saving throw. During dusk,
      while the sun is setting and the sky is painted in reds, yellows, and oranges, they instead make their save at
      disadvantage.</p><ul><li><strong>Critical Success:</strong> The affected creature suffers disadvantage on all
      attack rolls made against creatures other than you until the end of their next
      turn.</li><li><strong>Success:</strong> The affected creature suffers disadvantage on all attack rolls made
      against creatures other than you.</li><li><strong>Failure:</strong> The affected creature becomes drawn to you,
      becoming unable to target any other creature besides you for the duration.</li><li><strong>Critical
      Failure:</strong> The affected creature becomes drawn to you, unable to target any other creature besides you for
      the duration. Additionally, once per turn, whenever you use a reaction against the affected creature, you gain
      another reaction.</li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank,
      increase the cost of this jutsu by 3. If cast at S-Rank, you may spend an additional 14 chakra to cast <em>It's
      High Noon</em> as a reaction, targeting only creatures that have failed or critically failed their save against
      this jutsu</p>
