system:
  description:
    value: >-
      <p><em><strong>(This Jutsu cannot score a critical hit).</strong></em></p><p>Drawing your weapon, you become a
      blur of circular motion, sending a devastating amount of lead or iron in all directions with inhuman speed and
      precision.</p><p>Make three ranged Taijutsu attacks, comparing the result against the AC of all creatures of your
      choice within 30 feet of you. On a hit, you deal your [Weapon Damage] + 2d6, and the target gains 1 rank of the
      <strong>Bleeding</strong> condition.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3 and the damage by 1d6.</p>
