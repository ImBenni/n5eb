img: systems/n5eb/assets/content/clans/gansuringa.webp
system:
  description:
    value: >-
      <p>You fight dirty, throwing black powder into your opponent's eyes before striking them with an underhanded or
      unexpected blow. Make one melee Taijutsu attack. On hit you deal your [Unarmed Damage] + 3d10.</p><p>Regardless of
      whether you score a hit or not, ranged attacks made against a creature within 5 feet no longer impose disadvantage
      until the end of your turn, and the next time the creature would take Fire damage or damage from a Crossbow with
      the Black Powder Ammunition weapon property, they must make a Constitution Saving Throw. On Failure, they become
      Blinded until the end of their next turn and gain 2 ranks of the Burned Condition. On success, they instead gain 1
      rank of the Burned condition.</p><p>You spend a full stack of Black Powder Ammunition, as part of using this
      Jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and your damage by 1d10.</p>
