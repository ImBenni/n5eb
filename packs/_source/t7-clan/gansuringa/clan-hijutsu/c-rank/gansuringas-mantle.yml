system:
  description:
    value: >-
      <p>There is that certain something that all legendary Gansuringas seem to have - a presence in this world that
      can't be explained, and is understood by only those around them. You can activate this jutsu at the start of your
      turn. Until the beginning of your next turn you gain a +1d4 bonus to your attack rolls, damage rolls, saving
      throws, ability checks, and skill checks. Furthermore, all creatures must roll 1d20 when they declare an attack
      targeting you. On a roll of 16 or higher, the attack is diverted through what seems like a whimsy of fate or sheer
      dumb, blind luck alone.</p>
