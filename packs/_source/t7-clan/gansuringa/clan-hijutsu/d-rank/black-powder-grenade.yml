system:
  description:
    value: >-
      <p>You toss a bundle of Black Powder high in the air, mixed with various sharp edges of metal, before shooting it
      out of the sky mid fall. Target creatures in range makes a Dexterity saving throw, taking your [Weapon Damage] +
      3d6 Fire damage and one rank of the Burned condition on a failed save or half as much on a success
      save.</p><p>Flammable objects caught in the radius ignites if it isn't being held or carried.</p><p>You spend a
      full stack of Black Powder Ammunition, as part of using this Jutsu.</p><p><strong>At Higher Ranks:</strong> For
      each rank, you cast this Jutsu above D-Rank, increase the cost of this Jutsu by 3 and your damage by 2d6 and
      radius by 5ft.</p>
