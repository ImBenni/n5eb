system:
  description:
    value: >-
      <p>You load a special shot that will immediately explode into a wave of shrapnel upon being fired, showering all
      those before you in a mix of burning black powder residue and metal sharpnel. Creatures in a 15-foot cone in front
      of you must make a Dexterity saving throw. On a failed save you deal your [Weapon Damage] + 2d10 on a failed save
      or half as much on a successful one. Creatures who are within 10 feet of you when you cast this jutsu make their
      save at disadvantage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3, range of this jutsu by 5 feet, and the damage by 2d10.</p>
