system:
  description:
    value: >-
      <p>When the chips are down, lives are on the line, and all bets are off, the records will always show that you
      shot first. You may make a single ranged Taijutsu attack roll. On you, you deal your [Weapon Damage] + 4d4.
      Regardless of whether you score a hit or not, you gain a bonus to initiative equal to 1d4.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank increases the cost of this jutsu by 3 and your
      initiative bonus and damage by 1d4.</p>
