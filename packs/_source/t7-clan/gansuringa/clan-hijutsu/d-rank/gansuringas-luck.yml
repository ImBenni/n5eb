system:
  description:
    value: >-
      <p>Those of the Gansuringa clan often find that when it comes to their survival, luck often seems to follow the
      wake of skill. Until the start of your next turn, you gain a +3 bonus to your AC, and when you would be subjected
      to damage for the first time while benefiting from this Jutsu, you gain 10 Temporary Hitpoints until the end of
      the current turn and may move up to 10 feet in a direction of your choice, without provoking an attack of
      opportunity.</p><p><strong>At Higher Ranks:</strong> For each rank, you cast this Jutsu above D-Rank, increase the
      cost of this Jutsu by 3 and your Temporary hitpoints granted by 10.</p>
