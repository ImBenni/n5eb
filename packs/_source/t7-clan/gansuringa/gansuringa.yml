  description:
    value: >-
      <h3 id="way-of-the-drifter">Way of the Drifter</h3><p>Closer to a handful of nomadic caravans groups and small,
      isolated enclaves than a true Clan, those of the Gansuringa people are few, keeping their ways and knowledge to
      themselves, and passing them on only to their family or those deemed worthy enough of their secrets or weapons.
      The Gansuringa share few things in common save being drifters or the children of drifters. But rather they live
      their life as eccentric inventors, wandering mercenaries or quick witted highwaymen, one thing about those
      individuals is certain: Where they go, infamy is sure to follow.</p><h4 id="gansuringa-traits">Gansuringa
      Traits</h4><p><strong>Ability Score Increase:</strong> +2 Con, +1 Wis or +1 Cha <br /><strong>Speed:</strong> Your
      base walking speed is 35 feet <br /><strong>Skill Proficiency:</strong> Crafting, Perception <br /><strong>Tool
      Proficiency:</strong> Weaponsmith Kit <br /><strong>Weapon Proficiency:</strong> Crossbow, Hand, and Crossbow,
      Heavy</p>
