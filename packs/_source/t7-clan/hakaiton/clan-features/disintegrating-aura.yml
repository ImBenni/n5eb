system:
  description:
    value: >-
      <p>Beginning at 1st level, while you are concentrating on a jutsu with the Fire or Lightning release keywords,
      Hakaiton Hijutsu you cast may have their range increased by 10 feet, or area of effect increased by 5 feet.
      Beginning at 11th level, this increase to range becomes 20 feet and 10 feet respectively. Beginning at 18th level,
      this increase to range becomes 30 feet and 15 feet respectively.</p>
