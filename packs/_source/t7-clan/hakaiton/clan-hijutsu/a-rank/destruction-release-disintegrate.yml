system:
  description:
    value: >-
      <p>A thin ray of destructive chakra springs from your pointing finger to a target that you can see within range.
      The target can be a creature or an object.</p><p>A creature targeted by this jutsu must make a Dexterity saving
      throw. On a failed save, the target takes 14d6 + 40 fire or lightning damage. If this damage reduces the target to
      0 hit points, it is disintegrated.</p><p>A disintegrated creature and everything it is wearing and carrying,
      except chakra-enhanced items, are reduced to a pile of fine gray dust.</p><p>This jutsu automatically
      disintegrates a Large or smaller non-chakra-enhanced object. If the target is a Huge or larger object or creation
      of force, this jutsu disintegrates a 10-foot cube portion of it. A chakra-enhanced item is unaffected by this
      jutsu.</p><p></p>
