system:
  description:
    value: >-
      <p>Fire and lightning chakra arc across your body, shedding dim light in a 15-foot radius for the jutsu's
      duration. The chakra does not harm you. Until the jutsu ends, you gain the following benefits:</p><ul><li>You are
      resistant to fire and lightning damage.</li><li>Your walking speed is doubled.</li><li>Any creature that moves
      within 5 feet of you for the first time on a turn or ends their turn there takes 1d10 fire or lightning damage.
      You choose which type of damage each time this effect happens.</li><li>You can use your action to create a line of
      fire or lightning 15 feet long and 5 feet wide extending from you in a direction you choose. Each creature in the
      line must make a Dexterity saving throw. A creature takes 4d8 damage of the appropriate type on a failed save, or
      half as much damage on a successful one. A creature that fails this save is also weakened until the start of your
      next turn.</li></ul>
