system:
  description:
    value: >-
      <p>A 15-foot radius, 60-foot-high column of destructive energy rises from a point you choose within range. Each
      creature within that area must make a Dexterity saving throw, taking 6d10 fire or lightning damage on a failed
      save, or half as much damage on a successful one. At the end of your turn, the pillar dissipates.</p><p>As an
      action on each of your subsequent turns for the duration of the jutsu, you can raise another pillar at another
      point within range. You can choose which damage type a pillar deals when you summon it.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the
      damage by 2d10.</p>
