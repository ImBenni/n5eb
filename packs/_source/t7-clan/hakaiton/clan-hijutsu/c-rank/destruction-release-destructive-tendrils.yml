system:
  description:
    value: >-
      <p>Dense tendrils of destructive chakra wreathe your body until the jutsu ends, causing you to become heavily
      obscured to others. The chakra turns dim light within 10 feet of you into darkness, and bright light in the same
      area to dim light, though you ignore this effect. Until the jutsu ends, you have resistance to necrotic damage. In
      addition, whenever a creature within 10 feet of you hits you with an attack, the tendrils lash out at that
      creature, dealing 2d8 fire or lightning damage to it. You decide which type of damage each time this effect
      happens.</p>
