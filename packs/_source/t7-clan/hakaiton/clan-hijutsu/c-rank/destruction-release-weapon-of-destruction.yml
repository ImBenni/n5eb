system:
  description:
    value: >-
      <p>You evoke a weapon of pure destructive chakra in your hand. While concentrating on this jutsu, you do not need
      to expend chakra each round to maintain it.</p><p>The weapon takes the form of any weapon with which you are
      proficient, and it lasts for the duration. The form of the weapon is purely cosmetic, as it only ever has a 5-foot
      reach, has no traits from the weapon, and doesn't count as that weapon for any features that key off of that
      weapon type's use. If you let go of the weapon, it disappears, but you can evoke the weapon again as a bonus
      action.</p><p>You can use your Intelligence or Constitution modifier for attack and damage rolls with this weapon,
      and it deals 4d6 + the chosen modifier in fire or lightning damage. You choose which type of damage each time you
      cast this jutsu. The weapon sheds bright light in a 10-foot radius and dim light for an additional 10
      feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3 and the damage by 1d6.</p>
