system:
  description:
    value: >-
      <p>You shape your destructive chakra into an aura of devastation. Each creature other than you that starts its
      turn within the aura or enters it for the first time on their turn must succeed on a Constitution saving throw or
      take 1d12 + your Ninjutsu modifier in fire or lightning damage. Additionally, on a failed saving throw, the next
      time a creature must make a saving throw against a Fire or Lightning Release jutsu you cast, they reduce their
      saving throw by half your Ninjutsu modifier (minimum of 1).</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage by 1d12, and the saving throw
      reduction by 1.</p>
