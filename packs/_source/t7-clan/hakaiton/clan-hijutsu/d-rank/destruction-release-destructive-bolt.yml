system:
  description:
    value: >-
      <p>You hurl an undulating, crackling mass of destructive chakra at one creature in range. Make a ranged ninjutsu
      attack against the target. On a hit, the target takes 3d8 + your Ninjutsu modifier in damage. Choose one of the
      d8s. The number it rolled determines the type of damage: 1-3 is fire, 4-6 is lightning, 7-8 is necrotic.</p><p>If
      you roll the same number on two d8s, the destructive chakra leaps from the target to a different creature of your
      choice within 30 feet of it. Make a new attack roll against the new target, and make a new damage roll, which
      could cause the destructive chakra to leap again. A creature can be targeted only once by this mass of destructive
      energy.</p><p>If you score a critical hit with this jutsu, you do not double all the damage dice; instead, you
      triple your Ninjutsu modifier when making the damage roll.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 1d6.</p>
