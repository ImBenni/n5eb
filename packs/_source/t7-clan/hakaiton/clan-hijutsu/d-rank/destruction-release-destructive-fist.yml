system:
  description:
    value: >-
      <p>You coat your fists and feet in destructive chakra and lash out with powerful strikes. Make two ranged taijutsu
      attacks against creatures within 15 feet of you. On a hit, the target takes 2d8 + your Taijutsu modifier fire or
      lightning damage.</p><p>Alternatively, you can make two melee taijutsu attacks against a creature within 5 feet of
      you. On a hit, the target takes your unarmed damage + 1d8 fire or lightning damage.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the
      number of attacks you make by one.</p>
