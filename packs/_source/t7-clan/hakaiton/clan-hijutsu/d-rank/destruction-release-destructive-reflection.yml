system:
  description:
    value: >-
      <p>Just before taking damage, you blast the effect with your destructive chakra. Reduce the triggering damage by
      2d10 + your Ninjutsu modifier. If you reduce the damage to 0, the creature that triggered this jutsu has their AC
      reduced by 1 until the next attack hits them.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3, the damage reduction by 2d10. At B-Rank, the AC
      reduction is increased by 1. At S-Rank, the AC reduction is increased by 1.</p>
