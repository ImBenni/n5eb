  description:
    value: >-
      <h3 id="destructive-power">Destructive Power</h3><p>The Hakaiton is not a true clan with any particular family
      name, nor any particular land that it originated. However, a number of talented shinobi claim to have manifested
      this advanced nature release. The users of this advanced nature release have an extreme affinity for both fire and
      lightning release, combining them into a force of pure destruction, seemingly erasing weaker forces. This advanced
      nature release is lesser known than others, but their power cannot be denied.</p><h4 id="hakaiton-traits">Hakaiton
      Traits</h4><hr /><ul><li><strong>Ability Score Increase:</strong> +2 Con, +1 Int</li><li><strong>Speed:</strong>
      Your base walking speed is 30 feet.</li><li><strong>Skill Proficiencies:</strong> Chakra Control,
      Insight</li><li><strong>Destruction Release Affinity:</strong> You begin with either Fire or Lightning Release
      Affinity.</li></ul>
