name: Latent Chain of Destruction I
type: feat
_id: eivvZHbPulh4Q2ia
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, you have a number of <em>Chain Dice</em>, which are d4s, equal to half your proficiency
      bonus. When you cast a jutsu that deals damage and has the Fire or Lightning Release keyword, you can spend any
      number of Chain Die, adding the result to the damage roll. If the target fails the saving throw or is hit by the
      attack roll of your jutsu, the jutsu's energy jumps to another target within range of the jutsu. The number of
      additional targets is equal to the amount of Chain Die you spent. Each additional target must make a Dexterity
      saving throw against the DC of whichever jutsu type triggered this effect, taking half the damage of the original
      jutsu on a failed save. You regain spent Chain Dice when you finish a long rest.</p>
    chat: ''
