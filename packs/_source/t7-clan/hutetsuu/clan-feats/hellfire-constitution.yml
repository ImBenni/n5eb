name: Hellfire Constitution
type: feat
_id: IWzFQUb6IdWrLaWY
img: systems/n5eb/assets/content/clans/hutetsuu.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Hutetsuu Clan <br />Your vitality proves
      to be just as powerful a resource to your jutsu as chakra is. You gain the following benefits;</p><ul><li>Increase
      your Constitution score by 1, to a max of 20.</li><li>Your hit point maximum cannot be reduced by hostile
      effects.</li><li>You may expend a use of your <em><strong>Self Immolation</strong></em> clan feature to use hit
      points as a substitute for chakra to fuel class features. This is done at a rate of 2 hit points = 1
      chakra.</li><li>Your <em><strong>Self Immolation</strong></em> clan feature now replenishes its uses after a short
      or long rest.</li><li>When you reduce your hit points to cast a Hutetsuu hijutsu, you gain temporary hit points
      equal to your Constitution modifier (Min. 1) + the rank of the jutsu cast <em>(D-Rank: 2, C-Rank: 3, B-Rank: 4,
      A-Rank: 5, S-Rank: 6)</em> until the start of your next turn. While you have temporary hit points granted by a
      Hutetsuu feature you also have resistance to fire damage. While you have these temporary hit points you take on a
      fiendish appearance, temporarily growing scales, horns, or even a forked tail.</li></ul>
    chat: ''
