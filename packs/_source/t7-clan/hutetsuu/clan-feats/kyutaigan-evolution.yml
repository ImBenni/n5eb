system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Hutetsuu Clan, level 8+ <br />Your adept
      skill and practice with the Kyūtaigan have allowed you to maximize your potential. You gain the following
      benefits;</p><ul><li>Increase your Intelligence or Wisdom score by 1, to a max of 20.</li><li>When you activate
      your Kyūtaigan, it now lasts for up to 1 hour.</li><li>Your Kyūtaigan's Thermal Sight extends to 120 feet while in
      combat, and 250 feet while out of combat.</li><li>The maximum range of your <em><strong>Eyes of the Ever Burning
      Gaze</strong></em> clan feature increases to 60 feet.</li><li>As an action, you may spend 10 chakra or 20 hit
      points to roll a ninshou check against the save DC to end the effect of any chakra-based darkness or illusory
      genjutsu within range of your light.</li></ul>
    chat: ''
