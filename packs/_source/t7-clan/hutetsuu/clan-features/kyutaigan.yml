img: systems/n5eb/assets/content/clans/hutetsuu.webp
system:
  description:
    value: >-
      <p>The Kyūtaigan is an eye of immolation and precise destruction. Starting at 3rd level, you can spend 5 Chakra to
      activate the Kyūtaigan as a bonus action, as your eyes burst into devilish flames. The Kyūtaigan remains active
      for up to 10 minutes, and you may deactivate and reactivate the Kyūtaigan during this time with no additional
      cost. While active the Kyūtaigan gains the following benefits:</p><ul><li><p><em><strong>Thermal
      Sight:</strong></em> You have thermal sight to a range of 60 feet. With this sight you can see through any fire
      without it obscuring your vision. Creatures and objects that produce any amount of heat are outlined in varying
      colors with brighter meaning they are warmer and dimmer meaning they are cooler in heat. Creatures detected in
      this way cannot gain <br />the benefit of cover or be hidden from you. This allows you to detect creatures hidden
      by steam, smoke, gas or even in chakra-based darkness. Your thermal sight is blocked by 10 feet of water, ice, or
      snow, and by 10 feet of water-based obstructions.</p></li><li><p><em><strong>Eyes of the Ever Burning
      Gaze:</strong></em> As a bonus action, or when you activate your Kyūtaigan, you can cause your eyes to shed bright
      light in a 15-foot radius, and dim light for an additional 15 feet. This can be dismissed as a free action. While
      this light persists, as a bonus action you can expand or reduce its radius of bright and dim light by 5 feet each,
      to a maximum of 30 feet or a minimum of 5 feet. Also, while this light is active, ninjutsu you cast with the fire
      release keyword no longer require handsigns.</p></li></ul><p>Starting at 7th level, you steadily evolve the
      abilities of the Kyūtaigan. While your Kyūtaigan is active, you have immunity to cold environmental conditions,
      and creatures within 10 feet of you gain advantage on checks in cold environmental conditions. Ice and rain begin
      to evaporate as it comes in contact with you creating harmless heated steam.</p><p>Upon reaching 15th level, while
      your Kyūtaigan is active, you and creatures within 10 feet of are immune to the chilled condition. Once per turn,
      when a creature you can see would take fire damage from the Burned condition, it also reduces its hit point
      maximum by half the fire damage it dealt.</p>
    chat: ''
