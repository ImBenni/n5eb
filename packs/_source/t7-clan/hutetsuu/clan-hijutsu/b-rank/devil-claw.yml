_id: jH0N1FZ0vbgTVUJ7
img: systems/n5eb/assets/content/clans/hutetsuu.webp
system:
  description:
    value: >-
      <p>You coat one of your arms with a raging claw of fiery chakra. For the duration, when you make an unarmed
      attack, one of those attacks deals an additional 2d10 fire damage and has Reach (2) and Deadly (1). Creatures
      dealt fire damage this way cannot regain hit points until the end of their next turn, unless they're healed by a
      justu of A-rank of higher with the Medical keyword.</p><p>For the duration, when you make an attack roll as part
      of a jutsu you cast with the Fire Release keyword, you can instead make a melee ninjutsu attack with a reach of 15
      feet. On a hit, you deal 2d10 fire damage in addition to the jutsu's damage and effects.</p><p>Fire damage you
      deal this way deals double damage to objects, constructs, and structures.</p><p><em><strong>Self
      Immolation:</strong></em> When you spend the chakra cost using your hit points, you coat both arms with fiery
      chakra. For the duration, when you make an unarmed attack, up to two of those attacks deals an additional 2d10
      fire damage and has Reach (2), Deadly (1), and Multiattack.</p>
    chat: ''
