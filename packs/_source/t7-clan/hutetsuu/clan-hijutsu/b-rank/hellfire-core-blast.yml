system:
  description:
    value: >-
      <p><strong>Cost:</strong> <em>Special</em> (15 Hit Points, <em><strong>Self Immolation</strong></em>)</p><p>A
      stroke of screaming fire forming a line 150 feet long and 15 feet wide blasts out from you in a direction you
      choose. Each creature in the line must make a Dexterity saving throw. A creature takes 8d12+8 fire damage and
      gains two ranks of burned on a failed save and be knocked back to the end of the line and fall prone, or half as
      much damage on a successful save and one rank of burned. A creature that failed this save by 5 or more reduces its
      hit point maximum by half the fire damage dealt, and cannot regain these reduced hit points until it takes a rest
      or is healed by a medical jutsu of A-Rank or higher.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above B-Rank, increase the cost of this jutsu by 3, and increase the damage dealt by 2d12+2. When
      you cast this jutsu at S-Rank, this jutsu's damage cannot be reduced, and you gain 5 temporary hit points for each
      creature that failed the save by 5 or more which lasts for 1 minute.</p>
