folder: Pnt67ZUWcEpAqCDL
name: Genjutsu Ignite Anger!
type: spell
_id: fDkWYJ9IwwhWUbEy
img: systems/n5eb/assets/content/clans/hutetsuu.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Kyūtaigan</strong></em> clan feature
      active. You lock onto a creature you can see within range. You begin to stir the creature's emotions, causing them
      to become angered and irrational as their body spikes with adrenaline. The creature must make a Charisma saving
      throw. Creatures immune to the berserk condition are still affected by this genjutsu The creature can repeat the
      save at the end of each of its turns, ending the effect on itself with a success.</p><p><strong>Success:</strong>
      The creature takes half the damage of Failure and suffers no additional effects.</p><p><strong>Failure:</strong>
      The creature takes 2d6 psychic damage and 2d6+2 fire damage and becomes berserk for the next
      minute.</p><p><strong>Critical Failure:</strong> The creature takes 3d6 psychic damage and 3d6+3 fire damage and
      becomes berserk for the next minute. At the beginning of each of its turns it remains berserk, it gains 1 rank of
      burned if it doesn't already have it. If it has a rank of burned already the creature instead takes fire damage
      equal to the number of ranks of burned it has.</p><p><em><strong>Self Immolation:</strong></em> When you spend the
      chakra cost using your hit points, the creature has disadvantage on its saving throw to end the effects on
      itself.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, and increase the number of creatures you can target by +1.</p>
