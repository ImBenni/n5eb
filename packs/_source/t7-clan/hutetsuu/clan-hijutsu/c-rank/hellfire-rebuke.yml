system:
  description:
    value: >-
      <p>You shift your fiery rage, and the creature that damaged you is momentarily surrounded by hellish flames. The
      creature must make a Dexterity saving throw, taking 4d10 fire damage and gains one rank of burned on a failed
      save, or half as much damage on a successful one.</p><p><strong>Self Immolation:</strong> When you spend the
      chakra cost using your hit points, you create a 10-foot radius sphere centered on the creature
      instead.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, and increase the damage dealt by 1d10.</p>
