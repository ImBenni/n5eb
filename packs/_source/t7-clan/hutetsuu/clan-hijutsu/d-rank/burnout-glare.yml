system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Kyūtaigan</strong></em> clan feature
      active. You focus your burning sight to destroy the incoming attack, reducing the damage by 4d8+4. If the damage
      is reduced to 0, you suffer no further effects. If the damage being reduced is cold, you also create a cloud of
      steam surrounding you in a 20-foot sphere which lasts for 1 minute or until dispersed.</p><p><em><strong>Self
      Immolation:</strong></em> When you spend the chakra cost using your hit points, the damage reduction die becomes a
      d12.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3, and increase the damage reduction by 1d8+1.</p>
