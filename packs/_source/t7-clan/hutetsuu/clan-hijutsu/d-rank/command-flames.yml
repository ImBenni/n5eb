img: systems/n5eb/assets/content/clans/hutetsuu.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Kyūtaigan</strong></em> clan feature
      active. With little more than a glance, you can control any visible flame. You choose a non chakra-enhanced flame
      that you can see within range and that's occupying up to a 5-foot cube. You affect it in up to two of the
      following ways:</p><ul><li>You instantaneously expand the flame 5 feet in one direction, provided that wood or
      other fuel is present in the new location.</li><li>You instantaneously extinguish the flames within the
      cube.</li><li>You double or halve the area of bright light and dim light cast by the flame, change its color, or
      both. The change lasts for the duration of your Kyūtaigan.</li><li>You cause simple shapes — such as the vague
      form of a creature, an inanimate object, or a location — to appear within the flames and animate as you like. The
      shapes last for the duration of your Kyūtaigan.</li><li>You warm up to 5 cubic feet of nonliving material for the
      duration of your Kyūtaigan.</li></ul><p><em><strong>Self Immolation:</strong></em> When you spend the chakra cost
      using your hit points, this jutsu can affect chakra-enhanced flames, including lingering flames cast by jutsu.
      When this jutsu is used to manipulate another creature's jutsu, you must succeed a Chakra Control check against
      their Save DC.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3, and the cube of fire you can command increases by 5 feet, and increase the number of
      effects you can trigger by +1.</p>
    chat: ''
