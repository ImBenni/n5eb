system:
  description:
    value: >-
      <p>You light the air around you with swirling embers in a 15-foot radius sphere centered on you. This sphere sheds
      bright light for 15 feet and dim light for an additional 15 feet. Invisible creatures caught in the sphere are
      illuminated by the embers. Ranged weapon attacks and attack rolls from Water Release jutsu are made at
      disadvantage if they are cast within the sphere or target a creature inside the sphere, nor can Water Release
      jutsu benefit from being near a sufficient source of water.</p><p>For the duration, you can can launch a mote of
      embers at a point you can see in 60 feet, making a ranged ninjutsu attack as a bonus action, dealing 2d4+2 fire
      damage on a hit. On a hit or miss, the area hit by the mote glows with 5 feet of bright light and an additional 5
      feet of dim light, and benefits from the same effects as the sphere. This light lasts for the duration of the
      jutsu.</p><p><em><strong>Self Immolation:</strong></em> When you spend the chakra cost using your hit points,
      hostile creatures with ranks of burned that begin their turn in the sphere take the maximum damage of its burned
      die.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3, and increase the ember mote damage by 2d4+2 and the radius of the sphere increases by 5 feet.</p>
