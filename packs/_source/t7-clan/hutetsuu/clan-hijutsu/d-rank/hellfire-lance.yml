system:
  description:
    value: >-
      <p>You manipulate fire chakra in your hand as it takes the shape of a
      lengthy, flaming rod. Make a ranged ninjutsu attack against a target in
      range. On a hit, you deal 3d8+3 fire damage, and the target gains 1 rank
      of burned.</p><p><em><strong>Self Immolation:</strong></em> When you spend
      the chakra cost using your hit points, you can cause the rod to explode on
      impact, causing all creatures (including the target) in a 5 foot radius to
      make a Dexterity saving throw, taking half the damage on a failure and
      becoming slowed until the end of their next turn.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3, and increase the damage by 1d8+1. When you
      cast this jutsu at B-Rank or above, you make two ranged ninjutsu attacks
      instead.</p>
