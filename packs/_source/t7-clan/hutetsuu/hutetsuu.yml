  description:
    value: >-
      <p>The Hutetsuu hail from the small country of the Land of Hot Water. Hutetsuu tend to live recluse from other
      clan and village members due to the result of their clan's bloodline ability and affinity toward fire release, the
      latter which plagues them with rampant mood swings. These spikes of emotion are made more potent by the activation
      of their dōjutsu, the <em>Kyūtaigan</em>, also known as the Burning Wheel. Once activated, a Hutetsuu's eyes burn
      with fierce intensity.</p><h4 id="hutetsuu-traits">Hutetsuu Traits</h4><hr /><ul><li><strong>Ability Score
      Increase:</strong> +2 Con, +1 Int or Cha</li><li><strong>Speed:</strong> Your base walking speed is 30
      feet.</li><li><strong>Skill Proficiencies:</strong> Intimidation, Perception</li><li><strong>Passive
      Affinity:</strong> You begin with Fire Release Affinity.</li><li><strong>Fire Literacy:</strong> Your Ninjutsu
      ability score is counted as being +2 higher, for the purpose of casting jutsu of B-Rank or higher with the Fire
      Release Keyword through any ability score restrictions (SHB, pg.104).</li></ul>
