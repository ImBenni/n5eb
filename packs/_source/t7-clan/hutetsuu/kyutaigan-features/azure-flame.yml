system:
  description:
    value: >-
      <p>Your eyes burn a precise blue, streamlining the fire of your visual prowess.</p><ul><li>When you activate your
      Kyūtaigan, jutsu you cast with the <strong>Fire Release</strong> keyword that require a ranged attack roll gain a
      <strong>+1 bonus to hit, once per turn</strong>.</li><li>Ranged Hutetsuu hijutsu you cast increase their range by
      <strong>30 feet</strong>.</li><li>The longer your Kyūtaigan remains active, you grow cold and
      calculating.</li></ul><p><strong>At 11th level:</strong><br />As a bonus action, when you cast a jutsu with the
      <strong>Fire Release</strong> keyword, its range becomes equal to the range of your <strong>Thermal
      Sight</strong>. If its range is greater than this, double the jutsu's range instead.</p>
