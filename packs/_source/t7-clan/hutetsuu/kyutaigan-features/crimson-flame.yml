system:
  description:
    value: >-
      <p>Your eyes burn a passionate red, heating the fire of your visual prowess.</p><ul><li>When you activate your
      Kyūtaigan, jutsu you cast with the <strong>Fire Release</strong> keyword that deal damage add an
      <strong>additional damage die</strong>.</li><li>When rolling the damage for Hutetsuu hijutsu you cast,
      <strong>reroll all 1's and 2's</strong>, taking the second result.</li><li>The longer your Kyūtaigan remains
      active, you grow aggressive and vengeful.</li></ul><p><strong>At 11th level:</strong><br />As a bonus action, when
      you deal damage using a jutsu with the <strong>Fire Release</strong> keyword, it cannot have its damage reduced by
      more than <strong>10</strong> by hostile effects.</p><ul><li><strong>Area of effects</strong> created by jutsu
      this way spread around corners.</li></ul>
