system:
  description:
    value: >-
      <p>Your eyes burn a bright orange, energizing the fire of your visual prowess.</p><ul><li>When you cast a jutsu
      with the <strong>Fire Release</strong> keyword, you <strong>double your speed</strong> until the end of your
      turn.</li><li>When you cast a Hutetsuu hijutsu, you <strong>increase your AC by 1</strong> until the start of your
      next turn.</li><li>The longer your Kyūtaigan remains active, you grow cocky and reckless.</li></ul><p><strong>At
      11th level:</strong><br />When you would spend at least <strong>30 feet of movement</strong> on your turn, you can
      choose to convert your charged-up kinetic energy into a <strong>fiery blitz</strong> and teleport up to <strong>30
      feet</strong> of your remaining movement speed as a bonus action.</p>
