system:
  description:
    value: >-
      <p>Beginning at 3rd level, you can spend 10 Chakra to activate the Kyūtaigan as a bonus action. The Kyūtaigan
      remains active for up to 1 minute, and you may deactivate and reactivate the Kyūtaigan during this time with no
      additional cost. While active, you have 30 feet of thermal sight. With this sight you can see through any fire
      without it obscuring your vision. Creatures and objects that produce any amount of heat are outlined in varying
      colors with brighter meaning they are warmer and dimmer meaning they are cooler in heat. Creatures detected in
      this way cannot gain the benefit of cover or be hidden from you. This allows you to detect creatures hidden by
      steam, smoke, gas or even in chakra-based darkness. Your thermal sight is blocked by 5 feet of water, ice, or
      snow, and by 5 feet of water-based obstructions.</p>
    chat: ''
