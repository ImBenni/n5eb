img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, you may use hit points instead of chakra points to cast jutsu with the Fire Release
      keyword. If you cast a jutsu using hit points this way you reduce your current hit points equal to the cost of the
      jutsu. The hit point reduction caused by this feature cannot be ignored in any way. You cannot cast a jutsu that
      restores hit points to yourself, and you cannot regain the hit points lost by this effect until you take a rest.
      You can use this feature a number of times equal to half your proficiency bonus per long rest.</p>
