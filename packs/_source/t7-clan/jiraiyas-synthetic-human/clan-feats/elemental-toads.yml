  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Jiraiya's Synthetic Human Clan Level 8+<br
      />You extend your contract to more exotic toads, capable of molding diferent elements. You gain the following
      benefits;</p><ul><li>You select between Lightning Release and Wind Release. You are now able to add jutsu with the
      corresponding Nature Release to your jutsu list.</li><li>Toads that you summon gain access to Jutsus with the
      corresponding Nature Release</li><li>You learn one jutsu with the corresponding Nature Release that you selected,
      that you qualify for.</li><li>You can take this feat twice, selecting the nature release that you did not select
      the first time.</li></ul>
