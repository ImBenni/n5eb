system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Jiraiya's Synthetic Human Clan Level 4+<br
      />You have mastered the art of Oil Jutsu, making it denser and more flamable. You gain the following
      benefits;</p><ul><li>Increase your Constitution or Intelligence score by 1, to a maximum of 20.</li><li>You reduce
      the cost of Hijutsus with the <em><strong>''Toad Oil''</strong></em> Prefix by an amount equal to its rank.
      (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5).</li><li>Toads you summon can cast their first Hijutsu
      with the <em><strong>''Toad Oil''</strong></em> Prefix without using a Jutsu Slot.</li><li>Creatures affected by
      the Doused condition, imposed by you or your toads, cannot make an Ability Check to end it. Instead, they must
      spend an action while fully submerged in a body of water to remove the condition.</li></ul>
    chat: ''
