system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Jiraiya's Synthetic Human Clan Level 8+<br
      />You train your Toads in the diferent schools of Fuinjutsu. You gain the following benefits;</p><ul><li>Increase
      your Intelligence score by 1, to a maximum of 20.</li><li>Toads that you summon gain access to Hijutsus with the
      <em><strong>''Summoning:''</strong></em> and <em><strong>''Sealing Art:''</strong></em> Prefix.</li><li>Toads you
      summon can cast their first jutsu with the Fuinjutsu keyword without using a Jutsu Slot.</li><li>Toads that you
      summon gain resistance against jutsu with the Fuinjutsu keyword and its damage.</li><li>Hijutsus casted by your
      Toads can now interact with your <em><strong>Frog Stack</strong></em> Clan feature.</li></ul>
