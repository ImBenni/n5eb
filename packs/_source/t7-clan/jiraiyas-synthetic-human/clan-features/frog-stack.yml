system:
  description:
    value: >-
      <p>You learned how to fight in tandem with the toads, granting you confidence while they are nearby. When you
      reach 11th level, while you are within 60ft of a Toad that you summoned or a Hijutsu with the
      <em><strong>''Summoning:''</strong></em> prefix, you gain +2 to Ability Checks, Skill Checks, Saving Throws and
      Attack Rolls, AC and Save DC. This bonus cannot stack with itself.</p><p>The range of this Feature increases to
      120ft at 15th level. By 18th level, the bonus increases to +3, and the range to 180ft.</p>
