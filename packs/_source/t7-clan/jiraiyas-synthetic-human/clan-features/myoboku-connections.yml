system:
  description:
    value: >-
      <p>Your blood has ties to the sage tribe that inhabit Mount Myoboku. Starting at 1st level, you gain access to the
      Jutsu <em><strong>Summoning Technique</strong></em>, becoming capable to summoning toads. Toads that you summon
      gain access to your Hijutsu List up to your Highest Jutsu Rank, except for jutsus with the
      <em><strong>''Summoning:''</strong></em> and <em><strong>''Sealing Art:''</strong></em>
      prefix.</p><p>Additionally, once per Full Rest, you might summon a Toad from any <em><strong>Role</strong></em>,
      ignoring the original limitations of their tribe. This becomes a Long rest at 7th level and a Short rest at 15th
      level.</p><p>Finally, when you reach 11th level you can add another <em><strong>Role</strong></em> to any
      preexisting ones that your summons had.</p>
