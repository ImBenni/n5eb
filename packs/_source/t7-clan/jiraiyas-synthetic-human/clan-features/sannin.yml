system:
  description:
    value: >-
      <p>Beginning at 7th level, you gain a second Nature release that you didn't select from <em><strong>Sage
      Affinity</strong></em> and when you would cast a jutsu with either Fire, Water or Earth Release keywords that
      would deal damage, you can change the damage type to any Nature Release damage granted by this
      Clan.</p><p>Additionally, Toads that you summon gain access to Jutsus with Fire and Earth Nature Release
      Keywords.</p><p>Finally, when you reach 15th level, you gain access to the third Nature Release that you didn't
      select from this clan feature.</p>
