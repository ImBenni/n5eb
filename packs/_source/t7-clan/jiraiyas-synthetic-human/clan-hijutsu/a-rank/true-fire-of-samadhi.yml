system:
  description:
    value: >-
      <p>You set on fire a creature with the flames of purgatory, a fire release jutsu so potent that their flames are
      inextinguishable by wind or water.</p><p>Select a creature within range. The creature must succeed a Charisma
      Saving Throw as you mark them with the a Seal of the purgatory. On a failed save, the creature gain 5 ranks of
      burned that cannot be extinguished by normal means. For the duration of this Jutsu, the creature cannot gain the
      benefit of jutsus with the Medical Release.</p><p>A creature that wants to end this jutsu, must cast a jutsu with
      the Fuinjutsu keyword targeting the original target of this Jutsu and succed a Ninshu Check at disadvantage
      against your Ninjutsu Save DC, ending this Jutsu and removing the Burned ranks on a succesfull check.</p>
