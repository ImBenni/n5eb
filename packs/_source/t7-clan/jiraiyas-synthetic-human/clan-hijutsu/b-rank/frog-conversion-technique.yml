system:
  description:
    value: >-
      <p><em>As part of the requirements for this jutsu, the objective must be under the Paralyzed, Grappled,
      Restrained, or Unconscious condition.</em></p><p>By placing a Seal the forehead of a target you attempt to
      transform it into a frog, not only physically, but mentally as well.</p><p>The target must succeed a Charisma
      Saving Throw being transformed on a failed save, and remaking their saving throw at the end of each of their
      turns. On a success, the jutsu fails and the chakra is lost, unable to attempt to seal the creature again for the
      next 24 hours as the creature is sure that its not a frog. (lmao)</p><p>A creature affected that suffer damage by
      a hostile creature is transformed back to their normal form, ending this Jutsu on the process.</p><p>This jutsu
      disrupts the target's mental state for the duration, and while transformed, will act as a frog.</p>
