system:
  description:
    value: >-
      <p>You mark a 10x10 ft square on the ground with a summoning seal covering the entire area.</p><p>You can activate
      this seal as a Reaction or as a Bonus Action on your turn. The seal will open a one-way portal to the esophagus of
      a massive toad that breathes fire, creating a fire pillar in the area.</p><p>Every creature in the range must
      succeed a Dexterity saving throw, taking 8d8+8 fire damage on a failed save and being Burned, or half as much on a
      successful one. If the creatures on top of the seal are unaware of it, they make the saving throw at
      disadvantage.</p><p>Once activated, the portal keeps burning until the user dispels it as a Bonus Action. A
      creature that first enters or starts its turn inside the area must make another saving throw at the start of each
      of its turns to resist the effects.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3, the size of the area by 5x5 ft, and the damage by 1d8+1.</p>
