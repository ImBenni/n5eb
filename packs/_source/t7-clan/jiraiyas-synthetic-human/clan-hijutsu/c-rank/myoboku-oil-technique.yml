system:
  description:
    value: >-
      <p>The user expels a special mixture of toad oil used by the sage tribe in their training, completely covering one
      creature.</p><p>Select one willing creature within range. The selected creature becomes <strong>doused</strong>,
      gaining one rank of the condition. Additionally, the creature gains advantage on Chakra Control checks and no
      longer needs to make Concentration checks as a result of damage. The creature also gains resistance against the
      Grappled and Restrained conditions imposed by physical means.</p><p>This jutsu ends early if the user loses the
      rank of <strong>doused</strong> by igniting the oil or by cleaning it with water.</p><pre><code></code></pre>
