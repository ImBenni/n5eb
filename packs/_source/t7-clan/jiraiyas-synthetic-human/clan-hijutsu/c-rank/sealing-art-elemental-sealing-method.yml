system:
  description:
    value: >-
      <p>The user pulls a Scroll with a special sealing formula, which has a blank space left in its centre that quickly
      tries to absorb any nearby Nature Release infused chakra. You are able to cast this jutsu in multiple ways; <br
      /></p><p><strong>Action:</strong> Choose any Nature Release-based effect that you can se and reach. You can target
      objects, creatures and even places under the effect of a Jutsu with a Nature Release. Make a Ninshou Check against
      the Ninjutsu Save DC of the jutsu, on a success, you absorb it, ending its effects.<br
      /></p><p><strong>Reaction:</strong> Make a Ninshou Check against the Ninjutsu Save DC of your opponent, on a
      success, you absorb the Jutsu, nullifying its effects.</p><p><br />If the objective of this jutsu has a Nature
      Release Keyword that you have affinity with, the Ninshou Check is made at advantage.</p><p>If the user attempts to
      absorb a Jutsu two ranks higher than this Jutsu, the Sealing fail automatically. (C &gt; B &gt; A &gt; S &gt;
      Art)</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3.</p>
