system:
  description:
    value: >-
      <p>The user erects four pillars from the ground, within 5. Ft of the edges of the area, leaving a 20ft square
      inside. The pillars create a field that paralyses anyone caught inside. Anyone inside the area at the moment of
      casting this jutsu or anyone that enters the area, must succeed a Constitution Saving Throw, being Dazed, Shocked
      and reducing their movement speed to 0 until on a failed save, or reducing their base movement speed by half until
      the end of their next turn on a success.</p><p>A creature that first enter or start their turn inside of the area
      must make another Saving throw at the start of each of his turn in order to resist the effects</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and
      increase the range of the square by 10 ft.</p>
