system:
  description:
    value: >-
      <p>You summon small toads filled with oil and try to place them on a creature. Select one creature within range,
      and make a melee Ninjutsu Attack, on a hit, the toads are placed on the target.</p><p>A creature whos Passive
      Perception is greater than your Ninjutsu Save DC, or that has Chakra Sight or Chakra Sense, are able to notice the
      Toads, and can take them off with an Action.</p><p>The toads and the oil within them can be ignited as a Bonus
      Action or as a Reaction, dealing 3d6+3 fire damage. Alternatively The toads will ignite if the target creature
      suffer any fire or Lightning damage, if this happens, increase the damage die from a d6 to a d8. If in addition to
      this, the creature was already covered in oil from one of your Hijutsus, the damage die increases to a
      d10.</p><p>A creature maked with this jutsu counts as if having one rank of the <em><strong>Doused</strong></em>
      condition.</p><p>When casting this Jutsu, you can spend 5 chakra to summon another toad, increasing the damage of
      this Jutsu by 1d6+1 per additional toad summoned. You can do this up to 5 times.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase
      the damage by 1d6+1</p>
