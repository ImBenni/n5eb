name: Toad Oil Bullet/Spray
type: spell
_id: bFCphYkGpI6MR6er
img: systems/n5eb/assets/content/clans/jiraya-synthetic-human.webp
system:
  description:
    value: >-
      <p>The user converts their chakra into an extremely sticky oil and spits it out of their mouth. You are able to
      cast this jutsu in multiple ways <br /></p><p><strong>Action</strong> You spits it out as a spray, moving your
      head from side to side. Every creature in a 20ft Cone must succeed a Dexterity Saving Throw, on a failure, the
      creature gains one rank of the <em><strong>Doused</strong></em> condition. <br /></p><p><strong>Bonus
      Action:</strong> You focus the oil into a compacted bullet capable of traveling further. Select a creature within
      30 ft that you can see and make a Ranged Ninjutsu attack. On a hit, the creature gains one rank of the
      <em><strong>Doused</strong></em> condition. <br /></p><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the range of the cone by 10ft, or the
      attack by 15ft. If this jutsu is cast at B-Rank, increase the ranks of <em><strong>Doused</strong></em> to 2. If
      this jutsu is cast at S-Rank, increase the ranks of <em><strong>Doused</strong></em> to 3.</p>
