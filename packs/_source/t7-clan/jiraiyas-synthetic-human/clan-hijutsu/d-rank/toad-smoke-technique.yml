system:
  description:
    value: >-
      <p>The user produces a burst of a smoke from their body, forming a thick smokescreen to mask their movements.
      After this reaction is casted, you and all creatures within the smoke screen count as if being heavily obscured,
      unable to be seen.</p><p>Additionally, once the attack that trigger this reaction ends, you are able to move 5ft
      without provoking attacks of opportunity.</p><p>A moderate wind (At least 10 miles per hour) disperses the smoke
      in 4 rounds. A Strong wind (20+ miles per hour) disperses it in one round.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the radius by
      10ft.</p>
