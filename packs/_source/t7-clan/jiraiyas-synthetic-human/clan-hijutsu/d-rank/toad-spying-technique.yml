system:
  description:
    value: >-
      <p>The user places a Kanji of Vision on a summoned or wild toad to access its point of view, seeing and hearing
      everything around the toad as the user's pupils become toad-shaped.</p><p>For the duration of this Jutsu, the user
      is considered both Blind and Deaf, as they are incapable of seeing or hearing with their own body, instead
      perceiving the world through the eyes of the marked creature. The user can end this Jutsu as a Bonus
      Action.</p><p>This Jutsu does not allow the user to control the movement of the creature.</p><p>If the user
      suffers any damage while concentrating on this Jutsu, it immediately ends.</p>
