  description:
    value: >-
      <h3 id="gama-sennin">Gama Sennin</h3><p>From a clone of the legendary sannin, to normal a toad summoner, when
      playing this clan keep in mind that you do not need to be necessarily connected to Jiraiya or Kashin Koji. The
      name of this clan is intended to be a quick way for people to find out what this clan is about. This is your
      story, your tale. Make it worth of Jiraiya's last words.</p><h4 id="jiraiya-s-synthetic-human-traits">Jiraiya's
      Synthetic Human Traits</h4><p><strong>Ability Score Increase:</strong> +2 Int, +1 Con <br
      /><strong>Speed:</strong> Your base walking speed is 30 feet <br /><strong>Skill Proficiencies:</strong> Ninshou,
      Chakra Control <br /><strong>Extra Language:</strong> Toad-Speak, you can understand and speak to Toads and
      Frogs.<br /><strong>Sage Affinity:</strong> You begin with either Fire, Water, or Earth Release Affinity. (Pick
      One)</p>
