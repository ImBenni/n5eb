img: systems/n5eb/assets/content/clans/kageyama.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Kageyama Clan, Level 12+<br />You have
      become feed up with lesser creatures acting as if you are equal to them, and have decided to put them in their
      place. You gain the following benefits:</p><ul><li>When you would roll a die as a result of <em><strong>Prelude to
      Destruction</strong></em> you may choose to lower the die by 1 step, but roll 2 dice instead of 1.</li><li>While
      you are gaining the benefits of your 100% explosion, you gain advantage on genjutsu saving throws.</li><li>While
      you are gaining the benefits of your 100% explosion, you gain an additional reaction which can only be used to
      cast <em><strong>Psionic Barrier</strong></em>.</li><li>When you would take a short rest your percentage is no
      longer lowered, and when you take a long rest your percentage is now lowered by half.</li></ul><p></p>
