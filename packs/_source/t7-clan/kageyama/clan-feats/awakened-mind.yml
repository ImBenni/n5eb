system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Kageyama Clan<br />You have opened your
      mind to new possibilites, changing what you view as possible. You gain the following benefits:</p><ul><li>Increase
      your Intelligence or Wisdom score by 1, to a maximum of 20.</li><li>You learn the <em><strong>Chakra
      Hands</strong></em> and <em><strong>Message</strong></em> jutsu both of which have their range increased to 60
      feet and can be cast for 0 chakra without the HS component.</li><li>When you would succeed on a saving throw
      against a jutsu that would inflict a <em><strong>Mental</strong></em> condition you gain advantage on saving
      throws that would inflict the same condition for 1 minute.</li></ul>
