system:
  description:
    value: >-
      <p>Category: Clan<br />Prerequisite: Kageyama Clan, Level 8+<br />You strengthen your mind in more ways than one.
      You gain the following benefits:</p><p>• Increase your Intelligence or Wisdom score by 1, to a maximum of 20.<br
      />• When you deal damage with a Kageyama clan hijutsu, you add your ninjutsu ability modifier to the damage
      rolled.<br />• While you have temporary hit points, you gain advantage on genjutsu saving throws that would
      inflict a Mental or Sensory condition.</p>
