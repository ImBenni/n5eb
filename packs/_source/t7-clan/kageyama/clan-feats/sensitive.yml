system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Kageyama Clan, Level 4+<br />You are a
      little bit more sensitive than most people, you are quite quick to anger. You gain the following
      benefits:</p><ul><li>Increase your Intelligence or Wisdom score by 1, to a maximum of 20.</li><li>When you would
      roll a die as a result of <em><strong>Prelude to Destruction</strong></em> you reroll 1s and 2s, taking the second
      result.</li><li>Damage you deal while you are in your 100% explosion ignores resistance.</li></ul>
