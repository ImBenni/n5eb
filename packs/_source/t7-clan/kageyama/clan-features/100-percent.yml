system:
  description:
    value: >-
      <p>Here's the revised text with extra spaces removed:</p><p>Starting at 3rd level, if you reach 100%, you can
      enter your 100% Explosion. This explosion enhances your innate abilities to the utmost extreme in exchange for the
      suffering you have endured. For the next minute, you gain the following benefits:</p><ul><li><p>You gain temporary
      hit points equal to 5 times your proficiency bonus.</p></li><li><p>You gain a 1d4 bonus to saving throws you are
      proficient in and a 1d6 bonus to saving throws you aren't proficient in.</p></li><li><p>Increase the damage die of
      Kageyama Clan Hijutsu by 1 step (d4 &gt; d6 &gt; d8 &gt; d10 &gt; d12 &gt; 2d6).</p></li><li><p>Increase the area
      of effect of Kageyama Clan Hijutsu by 10 feet.</p></li><li><p>Decrease the cost of Kageyama Clan Hijutsu by -2
      (minimum 1).</p></li><li><p>You gain the benefits of the Dodge, Dash, and Disengage actions.</p></li></ul><p>Once
      you exit this form, your percentage is set to 0%, and you must complete a full rest before you are able to enter
      this form again. This changes to a long rest at 15th level.</p>
