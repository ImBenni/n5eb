system:
  description:
    value: >-
      <p>Starting at 7th level, you can move things with your mind with little effort. You can spend 5 chakra or use a
      bonus action to restore your use of hand signs, your willpower forcing them to move. Starting at 15th level, you
      ignore the hand sign component.</p><p>Also at 7th level, when you make a saving throw against an effect that would
      inflict a Mental or Sensory condition, you gain a 1d4 bonus to the result.</p>
