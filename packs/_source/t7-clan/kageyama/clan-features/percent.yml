system:
  description:
    value: >-
      <p>Starting at 18th level, while you are in your 100% explosion, each time you take damage, roll 2d12. If your
      percentage would exceed your maximum hit points, you enter ???% mode. Your subconscious takes over, everything
      slows down, and your movement becomes fluid. You retain the benefits of 100% explosion and gain additional
      benefits:</p><ul><li>You gain temporary chakra equal to 5 times your proficiency bonus.</li><li>You gain damage
      reduction equal to your Constitution modifier.</li><li>You can upcast Kageyama clan jutsu 1 rank higher than they
      were cast, at no additional cost.</li><li>You cannot lose concentration as a result of failing a chakra control
      check.</li><li>You gain the benefits of <em>Flight of Focus</em> for free.</li><li><p>If you are reduced to 0 hit
      points, instead of falling unconscious, you remain conscious with 0 hit points.</p><ul><li>You must make death
      saving throws as normal but can continue fighting until you die.</li></ul></li></ul><p>Once you enter this form,
      it lasts for 1 minute. Once it ends, you gain a rank of exhaustion, and you must complete a full rest before you
      can enter this form again.</p>
    chat: ''
