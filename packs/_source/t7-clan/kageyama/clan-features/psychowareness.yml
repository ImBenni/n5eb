system:
  description:
    value: >-
      <p>Starting at 11th level, your psychic prowess has expanded to the point where you can sense those around you,
      even if you cannot see them. You gain 30 feet of blindsight, and if a creature is within your blindsight range,
      they cannot hide from you, nor can they surprise you.</p><p>Additionally, if a creature would force you to make a
      saving throw within this radius, you cannot make the saving throw at disadvantage.</p>
