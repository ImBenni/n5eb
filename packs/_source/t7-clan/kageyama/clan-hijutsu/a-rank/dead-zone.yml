system:
  description:
    value: >-
      <p>You create an aura of superiority that nullifies and deactivates techniques that you deem unsatisfactory. All
      jutsu of your choice, equal to or lower than the rank this jutsu is cast, end. If a jutsu that requires chakra
      molding was cast before entering this radius, it is dispelled as your superior technique snuffs it out
      completely.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the
      cost of this jutsu by 3.</p>
