system:
  description:
    value: >-
      <p>You unleash all of your energy into one gigantic attack that decimates and destroys everything unfortunate
      enough to be in its path. All creatures and objects within 60 feet of you must make a Strength saving throw or
      become dazed, take <strong>24d4 force damage</strong>, and be knocked back to the edge of this jutsu's radius on a
      failed save, or half as much damage on a successful one. If a creature or object collides with another creature or
      object, their movement is stopped, and they take falling damage equal to the distance they would have fallen.
      Structures and objects take double damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above A-Rank, increase the cost of this jutsu by 3, and increase the damage die by 1 step.</p>
