system:
  description:
    value: >-
      <p>You charge a ball of energy in your palm before overloading it and throwing it like a bomb. Choose a point you
      can see within range. Each creature within a 20-foot radius sphere of that space must make a Dexterity saving
      throw or take 6d10 force damage and be dazed on a failed save or half as much on a successful save and no further
      effect. If a creature fails this saving throw by 5 or more they become stunned until the start of their next
      turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />B-Rank, increase the
      cost of this jutsu by 3, the damage by 1d10.</p>
