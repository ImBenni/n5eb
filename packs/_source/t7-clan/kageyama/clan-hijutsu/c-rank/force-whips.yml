name: Force Whips
type: spell
_id: uq6gXgYIxcqMu0I4
img: systems/n5eb/assets/content/clans/kageyama.webp
system:
  description:
    value: >-
      <p>You manifest your chakra into 2 tangible whips used to destroy and defend with equal efficiency. You do not
      spend chakra to maintain concentration with this jutsu. These whips have varied uses depending on the user's
      wishes. As an action you can make a melee ninjutsu attack against a creature within 15 feet. On a hit, you deal
      5d6 force damage and force them to make a Strength saving throw. On a failed save they become restrained and can
      use their action to repeat the saving throw to break out. You can only have two creatures restrained by this jutsu
      at once.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, the damage by 2d6.</p>
