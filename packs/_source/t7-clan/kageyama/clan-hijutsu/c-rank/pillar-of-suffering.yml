system:
  description:
    value: >-
      <p>You use your chakra to force the creatures to suffer as much as humanly possible. Each creature in a 15-foot
      radius, 60-foot-high cylinder centered on a point within range must make a Strength saving throw or take 10d4
      force damage on a failed save or half as much on a successful one.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage by 3d4.</p>
