system:
  description:
    value: >-
      <p>You create a barrier of psychic energy that repels and protects you from things that would otherwise harm you.
      You create a barrier that has 5d6 temporary hit points. You gain advantage on the triggering saving throw and you
      cannot be moved by any means. Any excess damage breaks through and affects the targeted creature as
      normal.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank, increase the
      cost of this jutsu by 3 and increase the number of temporary hit points by 2d6.</p>
