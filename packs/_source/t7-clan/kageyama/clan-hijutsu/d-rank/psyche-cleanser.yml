system:
  description:
    value: >-
      <p>You create a cleansing psychic energy that dispels any negative thoughts and feelings that a creature may be
      feeling. Select one <em><strong>Mental</strong></em> or <em><strong>Sensory</strong></em> condition. An allied
      creature is are healed of one of those conditions, removing all ranks, if any. A creature who has their conditions
      removed in this way gain 2d6 temporary hit points and resistance to psychic damage until the start of your next
      turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank, increase the
      cost of this jutsu by 3 and increase the amount of creatures you can target by +1 and the number of temporary hit
      points by 1d6.</p>
