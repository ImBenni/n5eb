system:
  description:
    value: >-
      <p>You impose your will over another creature force alone. You may force a creature to move 30 feet in any
      direction of your choice. When you do a creature must make a Strenght saving throw or be pushed or pulled 30 feet
      in the direction of your choice. A creature moved this way takes 2d6 force damage and if they collide with a
      creature or object their movement is stopped, taking falling damage equal to the distance they would have
      fallen.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank, increase the
      cost of this jutsu by 3 and increase the distance they are moved by 15 feet.</p>
