name: A Fine Speech
type: feat
_id: qcVlBK39iGXc46Db
img: systems/n5eb/assets/content/clans/kashimo.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kashimo Clan, Level 4+ <br />You take into
      account the words of your opponent, gauging them by their posture and speech of how fine they are as a fighter.
      You gain the following benefits;</p><ul><li>Increase your Dexterity or Charisma score by 1, to a maximum of
      20.</li><li>At the beginning of combat, you may make any Charisma based skill check, for the purpose of asking
      your opponent their name. If they refuse to tell you their name, then this feature does not activate. If they do
      share their name then you must do the same, and whenever that creature would use the same attack or effect you
      gain a +1 to your AC or saving throw against that attack or effect, whichever would apply. This can stack with
      itself up to an amount equal to half your proficiency bonus.</li><li>You cannot gain penalties to Charisma based
      skill checks or Charisma saving throws while fighting a creature who you've exchanged names with.</li></ul>
    chat: ''
