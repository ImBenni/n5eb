img: systems/n5eb/assets/content/clans/kashimo.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Kashimo Clan, Level 16+<br />You've finally
      found the enemy of your lifetime, the one to answer your question to strength. Will they live up to your
      expectation? If they don't, then only a slow quick death will be there for both of you. You gain the following
      benefits;</p><ul><li><p>You can only activate this feature once, and it lasts for 1 minute. After that minute
      passes, your body can no longer hold itself together from the power you've summoned, disintegrating as you die and
      becoming unable to be revived. For that minute you gain the following benefits;</p><ul><li>You gain 100
      <strong>Charges</strong> at the start of each of your turns.</li><li>You increase all Lighting damage you deal by
      3 damage die.</li><li>You gain an additional Action, Bonus action, and Reaction.</li><li>You turn all Ninjutsu
      attacks and damage that comes into contact with you into Lightning damage.</li><li>You now turn all Lightning
      damage you would receive into hit points you recover.</li></ul></li></ul>
