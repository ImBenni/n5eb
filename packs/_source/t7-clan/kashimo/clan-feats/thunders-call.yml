system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kashimo Clan, Level 8+ <br />Your speed
      grows even more, and as it does you being taking advantage of it during combat, being able to unleash more carnage
      against opponents who struggle with how fast you are. You gain the f0llowing benefits;</p><ul><li>Increase your
      Strength or Dexterity score by 1, to a maximum of 20.</li><li>You increase your movement speed by +15
      feet.</li><li>If your movement speed is two times or more than another creature's you then gain an additional
      Action you can use to dash, disengage, or interact with an object.</li><li>You may additionally, twice per long
      rest, cast a jutsu as a Bonus action. Jutsu cast this way increase their cost by +2.</li></ul>
    chat: ''
