folder: OyToNQohOJ94JBmh
name: Turn up the Volume!
type: feat
_id: 3oLYZAK8YaS2YyiA
img: systems/n5eb/assets/content/clans/kashimo.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Kashimo Clan, Level 12+<br />Seeing your
      opponent getting stronger this ignites a spark in you to keep up with them, amping up your output to its limits,
      starting up their living funeral. You gain the following benefits;</p><ul><li><p>When you see a creature phase
      change, activate a B-Rank or higher jutsu that is not instant in its duration, additional enemies enter combat, or
      see a creature down or kill another player you may activate this feature. This can only be done once per combat,
      as you gain the following benefits for the rest of that encounter;</p><ul><li>You gain advantage on checks made to
      find out the way to most efficiently kill a creature.</li><li>You have resistance against the Grappled,
      Restrained, Stunned, and Weakened condition.</li><li>You gain 5 <strong>Charges</strong> at the start of each of
      your turns.</li><li>You increase Lightning damage you deal by 1 step.
      (d4&gt;d6&gt;d8&gt;d10&gt;d12&gt;2d6.)</li><li>Your movement speed cannot be reduced to 0, and if an effect would
      make it 0 then it becomes 5 feet instead.</li><li>At the end of this combat you retain half of the Charges you
      held. These Charges do not disappear until spent.</li></ul></li></ul>
