folder: QiiSSE5rF9jq6JSY
name: Accumulated Voltage
type: feat
_id: kRKlMHfwRJGlSjm1
img: systems/n5eb/assets/content/clans/kashimo.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, you retain the static charge of the lightning you produce, accumulating it into
      <strong>Charges</strong> which can be used for specific techniques. Whenever you use Chakra to deal Lightning
      damage or cast a Jutsu with the Lightning Release Keyword you gain an amount of Charges equal to the Chakra
      spent.</p><p>When a creature dies after you've affected them with one of your <strong>Charge</strong> options you
      regain half of all <strong>Charges</strong> you spent on affecting that creature. These <strong>Charges</strong>
      can only be gained during combat and are lost once combat ends. Once per turn you can spend the listed
      <strong>Charge</strong> and activate that ability.</p><ul><li><strong>1 Charge:</strong> You create sparks which
      adds just a bit more electricity to your attacks. The next instance of Lightning damage you deal adds +1 damage.
      For every 5 <strong>Charges</strong> added to the base cost of this option you can increase the damage by an
      additional +1.</li><li><strong>5 Charges:</strong> You momentarily run a current through an enemy. The next time
      you deal Lightning Damage you force a Constitution saving throw on a creature you damaged, giving them the shocked
      condition until the start of their next turn on a failure.</li><li><strong>15 Charges:</strong> You quicken the
      process of strengthening your Lightning jutsu. You can <em>Overcharge</em> a Lighting release jutsu at no action
      or Reaction cost.</li><li><strong>30 Charges:</strong> Increase the damage die of the next instance of Lightning
      damage you deal by +2.</li><li><strong>50 Charges:</strong> You attempt to put a pause in an enemy's movements.
      Choose a creature within 30 feet of you with ranks of shocked. You force a Constitution saving throw against that
      creature, reducing their speed to 0 on a failure for as long as they have those ranks of shocked. On a success you
      only reduce their speed by half for the same duration.</li></ul><p>At 7th level, your lightning that you emit from
      your body always finds its way back to you, if you produce enough to be seen as a threat. You now gain 1
      <strong>Charge</strong> for every 15 Lightning damage you deal, as you gain the following additional
      <strong>Charge</strong> options;</p><ul><li><strong>75 Charges:</strong> You make your area of effects more
      aggressive in their targeting. Increase the next Jutsu you cast's DC by +2 or give a creature disadvantage on the
      saving throw.</li><li><strong>100 Charges:</strong> You supercharge the electricity in another creature, letting
      it flow longer. Choose one target within 60 feet of you and increase the duration of all their current ranks of
      shocked to last 1 minute.</li><li><strong>125 Charges:</strong> You magnify the lighting courses through your
      weapons and run their damage through the enemy's body continuously. Increase your unarmed damage or weapon damage
      die by 1 step, change their damage to Lightning damage, and increase the damage dealt by the shocked condition to
      2d8. All of these effects end when the current turn ends. (1&gt;d4&gt;d6&gt;d8&gt;d10&gt;d12)</li><li><strong>150
      Charges:</strong> You accelerate your body, moving in the blitz whatever enemy you're facing. Double your movement
      speed and gain a single Action or Bonus action which must be used to make an attack or deal damage. Your movement
      speed remains this way for the next minute.</li></ul><p>At 18th level, your body now emits lightning passively,
      and you have to suppress it manually as to not shock all of your surroundings. You now gain additional
      <strong>Charges</strong> depending on the rank of Jutsu with the Lighting release keyword you cast <em><strong>(D-
      Rank: 1, C- Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5)</strong></em>, and whenever a creature hits you with a melee
      attack you deal lighting damage to them equal to half your proficiency bonus.</p><p>You may now use your
      <strong>Charge</strong> options twice per turn, and gain the following additional options;</p><ul><li><strong>250
      Charges:</strong> You force every creature within 90 feet of you to make a Dexterity saving throw, as you expel
      your accumulated <strong>Charges</strong> in every direction with the purpose of pure destruction. On a failed
      save they take 1.5 the amount of <strong>Charges</strong> used on this ability, and only half on a success. You
      can increase the amount of <strong>Charges</strong> spent on this ability with no limit.</li><li><strong>500
      Charges:</strong> You summon a return bolt from a specified point, with the intention of ending whoever you're
      facing. You pick an amount of damage instances you've dealt during the current combat equal to your Charisma
      modifier. Then, select one target within 30 feet of you, forcing them to make a Dexterity saving throw. On a
      failure they take the combined damage of all your chosen damage instances in lightning damage, or half on a
      success. This damage cannot be resisted or reduced. However, you can instead charge this bolt for additional time.
      For every round after you spent the charges on this feature but didn't launch it you add another damage instance
      to your damage you will deal.</li></ul>
    chat: ''
