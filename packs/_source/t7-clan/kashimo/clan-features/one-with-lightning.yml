folder: QiiSSE5rF9jq6JSY
name: One With Lightning
type: feat
_id: m5Bv3tZVyRId0wGZ
img: systems/n5eb/assets/content/clans/kashimo.webp
system:
  description:
    value: >-
      <p>At 1st level, your body synergizes with lightning more and more, increasing the affinity you have for it
      physically. You reduce all Lightning damage you take by an amount equal to your level.</p><p>At 3rd level, for
      every 5 <strong>Charges</strong> you have you increase your movement speed by 5 feet, up to an amount equal to
      your base movement speed.</p><p>At 7th level, you begin amping up this synergy, gaining resistance to Lightning
      damage and the shocked condition. You are also now able to increase your movement speed by an amount equal to four
      times your base movement speed.</p><p>At 15th level, lightning has become a natural thing within your body, giving
      you immunity to Lightning damage, the shocked condition, and allowing you to increase your movement speed without
      limit when using this feature. Also, whenever you take the Dash Action, you leave behind a trail of lightning for
      the rest of that turn and lasts until the start of your next turn. As a Reaction you may teleport to any point in
      that trail.</p>
    chat: ''
