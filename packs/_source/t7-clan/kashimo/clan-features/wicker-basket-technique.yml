name: Wicker Basket Technique
type: feat
_id: QsK7fdN9Dr9Wnixn
img: systems/n5eb/assets/content/clans/kashimo.webp
system:
  description:
    value: >-
      <p>Beginning at 7th level, you've built up a defense against techniques that would try to ruin the enjoyment of a
      fight by bypassing the stages one should go through to win.</p><p>As a Reaction you create a 10-foot radius sphere
      construct around you, which has 50 hit points, and last until the start of your next turn. You cannot move out of
      this construct while it is up, but while you're in it you cannot suffer penalties to your saving throws if another
      creature would inflict them, you cannot be automatically hit, and you cannot automatically fail saving throws or
      checks. Choose one condition, as you gain resistance against that condition for the duration of this
      feature.</p><p>You can use this feature an amount of times equal to half your proficiency bonus.</p><p>At 18th
      level, you refine this technique to protect you from any abnormalities that would try messing up your body. Your
      construct now has 150 hit points and while you're in it you cannot become vulnerable to any type of damage, you
      cannot lose concentration on Jutsu, you become immune to the petrified and poisoned conditions, and you cannot
      have your maximum hit points or chakra points lowered.</p><p>When choosing a condition to gain resistance against
      from this feature you now become immune to that condition instead of gaining resistance against
      it.</p><p></p><p></p>
