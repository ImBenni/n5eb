system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent Battle Junkie II</strong>)</em> </p><p>Beginning at 15th level, when a
      creature has ranks of Shocked, you can always differentiate their chakra from others and gain an amount of
      Chakra/Blind Sight against them equal to your normal visual range. Additionally, you have advantage on saving
      throws against jutsu that would end or remove you from combat, and gain a +2 bonus to saving throws against jutsu
      with the Fuinjutsu keyword.</p>
