system:
  description:
    value: >-
      <p><em>(You must have <strong>Latent One with Lightning III</strong>)</em> </p><p>Beginning at 15th level, you
      gain immunity to the Shocked condition, and can now increase your movement speed by up to +100ft. with
      <strong>Latent One with Lightning I</strong>. Additionally, whenever you take the Dash action, you leave behind a
      trail of Lightning until the start of your next turn. As a reaction, you may teleport to any point within that
      trail.</p>
