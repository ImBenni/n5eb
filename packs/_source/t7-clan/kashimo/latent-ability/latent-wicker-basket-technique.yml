system:
  description:
    value: >-
      <p>Beginning at 11th level, As a Reaction you create a 10-foot radius sphere construct around you, which has 50
      hit points, and last until the start of your next turn. You cannot move out of this construct while it is up, but
      while you're in it you cannot suffer penalties to your saving throws if another creature would inflict them, you
      cannot be automatically hit, and you cannot automatically fail saving throws or checks. <br />Choose one
      condition, as you gain resistance against that condition for the duration of this feature. <br />You can use this
      feature equal to half your proficiency bonus per long rest.</p>
