system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Kato Clan <br />Your wisdom, modesty, and
      unshaking ideals have led you this far in life, and nothing short of death will stop your dreams. You gain the
      following benefits;</p><ul><li>Increase your Intelligence, Wisdom, or Charisma score by 1, to a max of
      20.</li><li>You gain proficiency in Persuasion and you may use Wisdom instead of Charisma for checks made with
      this skill.</li><li>After every Long Rest, you gain a Will of Fire.</li><li>When you fall to 0 hit points while in
      combat, the closest ally within 60 feet of you that can see you gains a Will of Fire.</li></ul>
    chat: ''
