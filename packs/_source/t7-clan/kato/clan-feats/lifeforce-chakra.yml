system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Kato Clan <br />The lifeforce you impart
      into your jutsu increases its potency. You gain the following benefits;</p><ul><li>Increase your Intelligence or
      Wisdom score by 1, to a max of 20.</li><li><p>When you cast a Ninjutsu with the Medical keyword, you can expend a
      number of chakra die in addition to the chakra cost equal to the rank of the jutsu: <em>(D-Rank: 1, C-Rank: 2,
      B-Rank: 3, A-Rank: 4, S-Rank: 5)</em>. When you do, you may enhance the jutsu in one of the following
      ways:</p><ul><li>You roll all expended dice and distribute the total as temporary hit points among all creatures
      affected by the jutsu (including yourself). These temporary hit points last for 1 minute.</li><li>You roll all
      expended dice and add half the total as chakra damage to all creatures affected by the jutsu.</li></ul></li></ul>
