system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Kato Clan, level 4+ <br />Your clan's
      natural inclination toward medical release grants you impressive healing potential. You gain the following
      benefits;</p><ul><li>Increase your Intelligence or Wisdom, score by 1, to a max of 20.</li><li>You learn one jutsu
      with the Medical keyword at any rank you can cast. This does not count against your jutsu known.</li><li>When you
      cast a jutsu with the Medical keyword with a range of touch, you can extend that jutsu's range up to 30 feet.
      Additionally, if that jutsu targets a creature, you can target one additional creature other than yourself that's
      within range. You can use this ability twice per long rest.</li><li>When you cast a jutsu with the Medical keyword
      that deals Necrotic damage to a creature, that target also takes Chakra damage equal to your proficiency
      bonus.</li></ul>
