name: Soul Possession
type: feat
_id: 4gTs1MuDhVMDbgSo
img: systems/n5eb/assets/content/clans/kato.webp
system:
  description:
    value: >-
      <p>At 11th level, your Spirit Form gains more benefits as you hone your ability with the technique. As an action
      while in your <em><strong>Spirit Form</strong></em> you can attempt to take possession of a creature you can see
      within 5 feet of you. That target must succeed on a Charisma saving throw or become Possessed by you; your Spirit
      Form then disappears. Your <strong>Possession DC</strong> equals 8 + Your Wisdom Modifier + Proficiency Bonus. A
      Possessed creature is incapacitated and loses control of its body. Your Spirit Form now controls the body but
      doesn't deprive the target of awareness. Your Spirit Form can't be targeted by any attack, jutsu, or other effect.
      You retain your Intelligence, Wisdom, and Charisma scores. Otherwise you use the possessed target's statistics,
      but don't gain access to the target's knowledge, clan and class features, or proficiencies.</p><p>The first time a
      Possessed creature takes damage on a turn, and at the end of a Possessed creature's turn, it can reattempt the
      saving throw, ending the possession on itself on a success. Otherwise the possession lasts until the target's body
      drops to 0 hit points, you end it as a bonus action, or you are forced out by another effect. When the possession
      ends, your Spirit Form reappears in an unoccupied space within 10 ft. of the body. The target is immune to your
      Possession for 24 hours after succeeding on the saving throw or after the possession ends.</p>
    chat: ''
