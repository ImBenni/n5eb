img: systems/n5eb/assets/content/clans/kato.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you can cause your true body to momentarily become ethereal similar to your
      <em><strong>Spirit Transformation Technique</strong></em>. As a bonus action, or reaction when you would take
      damage, you can become ethereal, suspending all conditions on yourself and gaining resistance to necrotic, poison,
      and bludgeoning, piercing, and slashing damage. You remain this way until the end of your next turn.</p><p>While
      ethereal, you do not provoke opportunity attacks, your speed increases by 10 feet, and you can move through
      creatures and objects as if they were difficult terrain. If you end your turn occupying the same space as an
      object or creature, you take 2d8 damage and are shunted to the nearest unoccupied space. This feature can be used
      twice per short rest.</p><p>At 15th level, when you activate <em><strong>Spirit Walk</strong></em> you also gain a
      flying speed equal to your walking speed and can hover.</p>
