  description:
    value: >-
      <h3 id="life-understanding">Life Understanding</h3><p>Members of the Kato clan naturally inherit a stronger
      understanding of circumstance and eventualities than most. With their wisdom hardened at an early age, Kato
      clansmen tend to grow up pragmatic or nihilistic. In rare cases though, a Kato member blossoms with optimism and a
      sense of purpose paired with this greater understanding of life. The Kato Clan's greatest skill -- the Spirit
      Transformation Technique -- reflects their greater connection to spirituality and morals of the shinobi
      world.</p><h4 id="kato-traits">Kato Traits</h4><p><strong>Ability Score Increase:</strong> +2 Wis, +1 Int <br
      /><strong>Speed:</strong> Your base walking speed is 30 feet. <br /><strong>Skill Proficiencies:</strong> Chakra
      Control. Choose one between Medicine and Ninshou. <br /><strong>Medical Affinity:</strong> You gain the ability to
      learn jutsu with the Medical keyword.</p>
