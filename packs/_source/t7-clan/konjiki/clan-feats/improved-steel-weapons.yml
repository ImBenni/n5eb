system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Konjiki Clan, Level 4+<br />You have
      trained to improve the strength of your Yin chakra to make your Steel Weapons stronger and more durable. You gain
      the following benefits;</p><ul><li>Increase your Constitution or Intelligence score by 1, to a maximum of
      20.</li><li>All of your Steel weapons you would create are counted as +2 for determining if they would be
      destroyed or harmed by a jutsu or enemy feature.</li><li>You can use Intelligence in place of your Strength
      modifier for weapon attacks using your Steel weapons.</li><li>You may cast bukijutsu using your Intelligence
      Modifier instead of your Strength modifier a number of times equal to your Intelligence modifier per short
      rest.</li></ul><pre><code></code></pre>
