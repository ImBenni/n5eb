system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Konjiki Clan, Level 12+ <br />Your Yin
      Release has reached a level where all your earth release jutsu have overcome the historic weaknesses of the
      element. You gain the following benefits;</p><ul><li>Increase your Constitution or Intelligence score by 1, to a
      maximum of 20.</li><li>Hostile Creatures cannot ignore any difficult terrain created by jutsu with the Earth
      Release Keyword.</li><li>When clashing with a jutsu with the Earth Release Keyword you can never roll at
      disadvantage. Additionally, if you would roll at advantage you instead roll 3d20 taking the highest
      result.</li><li>Konjiki Clan Jutsu you cast, that does not have resistance to Lightning Damage, gain resistance to
      lightning damage.</li></ul>
    chat: ''
