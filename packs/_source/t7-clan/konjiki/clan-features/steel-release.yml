system:
  description:
    value: >-
      <p>Beginning at 7th level, You have gained the ability to enhance normal Earth Release Jutsu by adding piles of
      steel into the earth. When you cast a jutsu with the Earth Release keyword, once per casting, you can choose to
      increase the damage die of the jutsu by 1 step (D4&lt;D6&lt;D8 &lt;D10&lt;D12&lt;D2d6) or gain a +1 to attack
      rolls. Additionally, when casting Konjiki Hijutsu, reduce the cost of the jutsu by -1.</p><p>Lastly, when you cast
      a jutsu with the Earth Release keyword, you can spend an additional amount of chakra equal to the rank of the
      jutsu cast. When you do, increase the AC of the construct by +1 and the construct is no longer vulnerable to
      Lightning damage if was vulnerable. (D-Rank/C-Rank 3; B-Rank/A-Rank 5; S-Rank 7)</p>
