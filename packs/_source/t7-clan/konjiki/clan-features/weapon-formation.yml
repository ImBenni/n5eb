system:
  description:
    value: >-
      <p>Beginning at 1st Level, as a bonus action you can mold your chakra into steel to create a steel weapon. You can
      create any weapon that you have seen before and that is made from a metal. All weapons you create with this
      feature have the <em>Returning</em>, <em>Thrown</em>, and <em>Finesse</em> properties and can only be used by you.
      You're considered proficient in any weapon created with this feature.</p><p>Beginning at 3rd Level you can now
      form your steel to be softer to the point where you can form weapons like whips that are not commonly made out of
      steel.</p><p>At 7th level, all weapons created with this feature gain an additional +1 bonus to attack and damage
      rolls.</p><pre><code></code></pre>
