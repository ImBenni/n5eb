name: Steel Release Metal Prison
type: spell
_id: 5RjevVjg0LkTDfVC
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>You constrict and bind a creature with metal, choose one creature in range, they must make a Strength saving
      throw, being Restrained by the metal prison and unable to cast jutsu with the HS component on a failed Save. The
      metal prison has an AC equal to your Ninjutsu Save DC and 200 Hit Points. The metal prison is resistant to all
      damage excluding lightning damage. A creature can attempt to remake the Strength Saving throw at the end of each
      of their turns to end being restrained. Each time a creature fails the strength saving throw the DC increases by 4
      to a max of +20.</p>
