name: Steel Release Binding Metal Chains
type: spell
_id: N2PxJl8NWx3v5vjH
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>You focus your chakra deep underground creating a huge amount of steel before dozens of steel chains launch
      outside of the surface attempting to restrain those you command them to. Each creature within range that you
      select must make a Dexterity saving throw. On a failed save the target takes 4d8 earth damage and is restrained by
      your chains. For the remainder of the Jutsu if a creature enters the range of your chains or starts there turn in
      the range of the chains while not already being restrained by the chains you may choose for them to make a
      Dexterity saving throw or become restrained and take 4d6 damage. A creature can attempt to stop being restrained
      by the chains by making a Strength Saving throw at the end of each of their turns to end being restrained. The
      area taken up by the chains is counted as difficult terrain.</p><p><strong>At Higher Rank:</strong> For each rank
      you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, and the radius by 10 feet and the damage
      by 2d8 and 2d6 respectively.</p>
