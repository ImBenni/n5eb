system:
  description:
    value: >-
      <p>You wrap a thin sheet of metal around your body to greatly increase your defensive capabilities. You cannot
      lose concentration on this jutsu as a result of damage. For the Duration of this Jutsu you gain 12d10 Temp hit
      points. These Temporary Hit points reduce any damage taken by -5 excluding lightning damage. Additionally, while
      you have temporary Hit Points granted by this jutsu you are counted as an Earthen Construct and deal 1d10
      additional damage on all unarmed and weapon melee attacks. When the temporary Hit Points provided by this jutsu
      reach 0 the jutsu ends.</p><p><strong>At Higher Rank:</strong> For each rank you cast this jutsu above C-Rank,
      increase the cost  of this jutsu by 3 and the temporary Hit Point Dice by 2d10.</p>
