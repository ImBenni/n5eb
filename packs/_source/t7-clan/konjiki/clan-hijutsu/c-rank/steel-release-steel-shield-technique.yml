system:
  description:
    value: >-
      <p>You summon a wall of steel to intercept an attack targeting you or an ally within range. The Steel wall is
      10-foot tall, 15 foot wide, and 1 foot thick.</p><p>This wall acts as a Steel construct occupying a space of your
      choice within 10 feet of you, appearing right before an attack or jutsu would harm you. This has 8d6 Hit points,
      Resistance to all damage types except lightning damage.</p><p>If the damage the wall receives would exceed its hit
      points, when you initially conjure it. The original target takes any remaining damage as normal and the wall is
      destroyed. The wall acts as a structure otherwise. It does not dissolve or vanish instead remaining until
      destroyed.</p><p><strong>At Higher Rank:</strong> For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3, the hit points of the wall by 2d6, and increase the Wide of the Wall by 5ft.</p>
