system:
  description:
    value: >-
      <p>You conjure a massive spear made of steel before sending it flying towards a target creature within range, make
      a ranged ninjutsu attack, dealing 6d8 earth damage on a hit.</p><p>If you score a natural 20, with this jutsu, the
      steel spear splinters and explodes, tripling the damage dice, instead of doubling them.</p><p><strong>At Higher
      Rank:</strong> For each rank you cast this jutsu above <br />C-Rank, increase the cost of this jutsu by 3 and the
      damage by 2d8. If this jutsu is casted at least at A-Rank this jutsu crits on 19-20.</p>
