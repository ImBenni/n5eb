system:
  description:
    value: >-
      <p>Choose a point you can see on the ground within range. A series of Steel pikes rocket upwards from the ground
      in a 15-foot cube. Each creature in that area must make a Dexterity saving throw. A creature takes 3d10 earth
      damage on a failed save, or half as much damage on a successful one. If a creature fails this save by 5 or more
      they gain 2 ranks of bleeding.</p><p><strong>At Higher Rank:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the damage by 2d10.</p>
