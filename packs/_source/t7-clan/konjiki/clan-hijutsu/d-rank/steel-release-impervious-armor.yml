system:
  description:
    value: >-
      <p>You quickly turn your skin into a steel-like material before being hit. Until the start of your next turn, you
      reduce any damage received by your proficency bonus+your ninjutsu modifier. Lightning damage is unaffected by this
      damage reduction. You also gain temporary hit points equal to 2d8 + your ninjutsu ability modifier, and advantage
      on strength and constitution saving throws.</p><p><strong>At Higher Rank:</strong> For each rank for each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the temporary hitpoints gained by 2d8.</p>
