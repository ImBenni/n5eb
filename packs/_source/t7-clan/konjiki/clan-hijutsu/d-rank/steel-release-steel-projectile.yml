system:
  description:
    value: >-
      <p>You create an object made of steel and launch it at high speed towards a target within range, make a ranged
      ninjutsu attack, dealing 3d8 earth damage on hit and reducing the result of their next saving throw by
      1d4.</p><p><strong>At Higher Rank:</strong> For each rank for each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3 and the number of attacks by 1. A creature is only affected by the saving throw
      reduction once per turn.</p>
