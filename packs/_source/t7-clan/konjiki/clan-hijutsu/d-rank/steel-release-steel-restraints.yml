system:
  description:
    value: >-
      <p>You shoot out multiple shackles made of metal at a target creature within range, make a ranged ninjutsu attack
      dealing 2d8 earth damage and forcing the target creature to make a Strength saving throw or gaining the restrained
      condition. A creature can attempt to remake the Strength Saving throw at the end of each of their turns to end
      being restrained. Additionally, if a creature is under the effects of <strong>Steel Release: Steel
      Telekinesis</strong> they make the Strength saving throw at Disadvantage.</p><p><strong>At Higher Rank:</strong>
      For each rank for each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number
      of creatures you can target by 1.</p><p></p>
