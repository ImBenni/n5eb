name: Steel Release Steel Telekinesis
type: spell
_id: 6VVJOqAJPNc0lpVY
img: systems/n5eb/assets/content/clans/konjiki.webp
system:
  description:
    value: >-
      <p>You are able to command Steel from long ranges. You can lift objects made of or connected to steel of Medium
      size or lower. You can even use this to lift and move creatures wearing armor. You select 1 target creature within
      range wearing armor made of metal, forcing them to make a Strength Saving throw. On a failed Save they are
      restrained and moved up to 30 feet in any direction of your choice. On future turns if they are still restrained
      you can use your bonus action to move them up to 30 ft in any direction of your choice. A creature can attempt to
      remake the Strength Saving throw at the end of each of their turns to end being restrained. Additionally, if a
      creature is under the effects of <strong>Steel Release: Steel Restraints </strong>they automatically fail the Str
      saving throw.</p><p><strong>At Higher Rank:</strong> For each rank for each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and the number of creatures you can target by 1.</p>
