  description:
    value: >-
      <h3 id="tempered-will">Tempered Will</h3><p>The Konjiki is a clan from the village hidden in stones, a small
      village in the country between the lands of wind and earth, this clan is known for both their mercenary works in
      those great nations and their special affinity to the materialization of Yin and Earth chakra known as "Steel
      Release".</p><h4 id="konjiki-traits">Konjiki Traits</h4><p><strong>Ability Score Increase:</strong> +2 Int, +1 Str
      or Con <br /><strong>Speed:</strong> Your base walking speed is 30 feet. <br /><strong>Skill
      Proficiencies:</strong> Crafting, Ninshou <br /><strong>Steel Release:</strong> You begin with Earth Release
      Affinity.</p>
