name: Kurashi Armament Training
type: feat
_id: QY2fKuxuK2rrQFKq
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kurashi Clan <br />You learn of another
      School of the Kurashi clan where clan members are trained to utilize weaponry as opposed to investigative
      technique. You decide attending this school would be in your best interest. Gain the following
      benefits;</p><ul><li>You gain proficiency in Matchlock Rifles and Matchlock Pistols. These weapons become known as
      <em><strong>Kurashi Armament</strong></em> for you.</li><li>On a rest, you may choose to modify a
      <em><strong>Kurashi Armament</strong></em> to improve its usability at the cost of its lethality. If you do, until
      your next rest your chosen <em><strong>Kurashi Armament</strong></em> loses the Volatile property, but reduces its
      damage die by -1.</li><li>When you would run out of ammunition for a <em><strong>Kurashi Armament</strong></em>,
      you may as a bonus action spend 3 chakra to summon a creature of shadow to replenish the weapon's ammunition,
      giving you a new stack of ammunition which lasts for 10 minutes or until fully used up.</li><li><p>Once per turn,
      when you would declare an attack with a <em><strong>Kurashi Armament</strong></em>, you may make a <strong>Shadow
      Attack</strong>. When you make a <strong>Shadow Attack</strong>, a creature of shadow emerges and amplifies the
      attack, giving it one of the following effects. Each effect requires you to spend a 5 chakra to take
      effect.</p><ul><li><strong>Binding Shadow:</strong> On a hit, your Shadow Attack bursts. The target must succeed a
      Charisma saving throw against your Ninjutsu, Taijutsu, or Genjutsu Save DC (pick one) or become Restrained and
      Blinded until the end of their next turn as creatures of shadow erupt from your attack and bind
      them.</li><li><strong>Culling Shadow:</strong> Your Shadow Attack is split in two. Select one other target within
      range of your <em><strong>Kurashi Armament</strong></em>. If your attack matches or exceeds their AC, they take
      half the attack's damage.</li><li><strong>Piercing Shadow:</strong> Your Shadow Attack is made at advantage and on
      a hit, you bypass all damage reduction and temporary hit points the creature may have.</li></ul></li></ul>
