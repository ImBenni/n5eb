name: Shadow Weaver
type: feat
_id: MEM1FabqX7AtW5Bs
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kurashi Clan, Level 4+ <br />You study the
      strange jutsu techniques of the Kurashi clan and focus on gaining the utmost efficiency out of your "creatures" of
      shadow. You gain the following benefits;</p><ul><li>Increase your Intelligence, Wisdom, or Charisma score by +1,
      to the maximum of 20.</li><li>Select a number of E-Rank jutsu equal to half your proficiency bonus that you do not
      already know (excluding <em>True Strike</em>). These jutsu are denoted as <em><strong>Shadow Jutsu</strong></em>
      for you. You may treat <em><strong>Shadow Jutsu</strong></em> as Kurashi Hijutsu, and may, once per round, cast a
      Shadow Jutsu without any components nor any actions. You may switch any number of these jutsu on a full
      rest.</li><li>You gain access to a new <em><strong>Kurashi Skill-Based Action</strong></em> known as
      <em><strong>Mold Shadow</strong></em> (see the end of this clan).</li></ul>
