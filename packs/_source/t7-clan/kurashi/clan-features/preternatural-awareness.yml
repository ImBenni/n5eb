folder: Vj7JK0KL3Fm4DKgC
name: Preternatural Awareness
type: feat
_id: v2a4PhyAJNBAcVKQ
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you begin to develop a sense for detecting the unnatural. A number of times equal to
      half your proficiency bonus (rounded up) per long rest, you may as an Action send your shadows out in a radius
      around yourself, equal to 20 times your proficiency bonus in feet.</p><p>Your shadows are able to detect the
      presence of a non-human creature type within the radius, such as an Aberration, Beast, Celestial, Demon, etc. This
      does not tell you their exact location, but will inform you which creature type(s) you are detecting and their
      general direction.</p><p>This feature can also be used to detect if there was recent paranormal, magical, or
      chakra based activity within an area or an object, and may illustrate a faint towards whatever person or thing
      caused these effects.</p><p>A creature under the effects of the <em><strong>Suppress Chakra</strong></em>,
      <em><strong>Skill Based Action</strong></em>, or a Sensory jutsu, feature, or trait that would hide their presence
      (such as the <em>Nondetection</em> jutsu), is undetected by this trait. At 18th level, such effects no longer
      inhibit you from detecting a creature or presence.</p><p>At 7th level, you do not need to spend a use of this
      feature to automatically detect a creature's creature type. You simply require direct eye-contact.</p>
