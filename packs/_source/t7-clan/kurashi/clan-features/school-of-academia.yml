name: School of Academia
type: feat
_id: FimybMrtlWJyAZt1
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: "<p>As a Kurashi, you are taught methods to conduct a proper investigation. Starting at 1st level, select one of the following schools. Each school is based a single mental attribute (Intelligence, Wisdom, Charisma) and grants the following benefits;</p><ul><li><strong>School of Intelligence:</strong> This school places an emphasis on deductive reasoning and logical analysis. When learning Skill category feats using Downtime, reduce the downtime needed by 1/3rd your proficiency bonus.</li><li><strong>School of Wisdom:</strong> This school places an emphasis on observation and careful study. You gain a bonus to Passive Perception and Insight equal to your Wisdom modifier.</li><li><strong>School of Charisma:</strong> This school places emphasis on leadership. You gain the <strong>Well Connected</strong> trait.</li></ul><p><br /> ○ <em><span style=\"text-decoration:underline\">Well Connected:</span></em> <em>Within an hour in a new <br />  \_ town or city, you are able to locate and build <br />  \_ connections to gain access to many kinds of <br />  \_ resources, such as Lodgings, information regarding a <br />  \_ person or object of interest, and where to purchase <br />  \_ goods, both legal and illegal.</em></p><hr /><p>At 15th level, you select a second school for this feature. In addition to the specific benefits of each school, you gain proficiency in all skills associated with the chosen mental attribute, as well as being treated as having expertise for the purpose of qualifying for <em><strong>Skill Based Actions</strong></em> made with this attribute.</p><p>Lastly, you gain access to a list of <em><strong>Skill-Based Actions</strong></em> exclusive to the Kurashi clan, listed at the end of this clan. You know a number of these Skill-Based actions equal to half your proficiency bonus, rounded up.</p><p>Each Kurashi Skill-Based Action has a specific <em><strong>School of Academia</strong></em> attributed to it. While you do not need to have a specific school to acquire a Kurashi Skill-Based action, if you possess the attributed school, you may perform the Skill-Based Action as a bonus action (if it can be performed as an action) and cannot make checks with it at disadvantage.</p>"
