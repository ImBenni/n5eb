folder: fO5pMMAnF30MxziG
name: Call to the Void Deific Shade
type: spell
_id: 1dYckWzwc4WDgGA1
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p>You weave signs and command your entire shadow to move up to 120 feet from you. For the duration of this jutsu,
      your movement speed is halved. Your shadow erupts into a gaseous maniacal being that expands in a 90-foot radius.
      This being represents a Kurashi's deepest fears and repressed emotions. When you would make a concentration check
      for this jutsu, you may spend 6 chakra to automatically succeed the check.</p><p>All creatures inside this radius
      cannot be seen from outside of it (and likewise, creatures within cannot see out of it). All creatures inside this
      radius (other than you) cannot take the Dash, Hide, or Disengage actions and have their speed reduced by -20 feet.
      At the start of your turns, all hostile creatures must make a Charisma saving throw; Targets make this saving
      throw with a -1d4 penalty if this jutsu is used during Sundown/Twilight, or, if at Night, at
      disadvantage.</p><p>Success: Targets take half as much damage (9d8) and gain 1 rank of Fear until the end of their
      next turn.<br />Failure: Targets take 9d8 psychic damage and gain 2 ranks of Fear and Slowed until the end of your
      next turn.<br />Critical Failure: Targets take 10d10 psychic damage and gain 3 ranks of Fear and Slowed until the
      end of your next turn.</p><p>Additionally, while this jutsu is active, treat all other Kurashi Hijutsu as being
      cast during Night, and if any Lesser Shades are present from the <em>Call to the Void: Lesser Shade</em> Hijutsu,
      they become Greater Shades.</p><p>Greater Shades gain a +2 bonus to all ability scores (up to a maximum of 22),
      and gain an extra 20 hp. They also gain additional benefits, depending on their focus.</p><p>Companion Focus: The
      Companion Shade gains a flying speed equal to its movement speed and may carry up two medium or smaller creatures.
      All creatures riding recover 2d10 hit points at the start of each of their turns.<br />Guardian Focus: The
      Guardian Shade gains resistance to all damage, and when it would interpose an attack, it may make one attack using
      Shade Strike against the triggering creature.<br />Warrior Focus: The Warrior Shade gains a +1 to attack and
      critical threat range, and increases the damage die of its weapons by +1. It may also make three attacks with the
      Multiattack trait.</p><p>Once this jutsu ends, you must make a flat d20 check. You cannot add any modifiers to
      this check.</p><p>If your result is 11 or less, you fall prone and are Dazed until the end of your next turn, as
      you begin to have a seizure.<br />If you succeed, you are Concussed but are otherwise stable.</p><p>Regardless of
      your result, gain 1 rank of Fear against yourself.</p>
