folder: tPbRArUr0nN7gJjB
name: Chimeric Adumbration
type: spell
_id: aO2Ri7QsONuz8ton
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p>Using your own creativity, you channel your shadows into various different forms, manifesting a multitude of
      different abilities. As part of this jutsu's casting, you may use any of the following abilities. For the duration
      of this jutsu, you may use any of these abilities as action or bonus action. During Sundown/Twilight, gain
      advantage on concentration checks. During Night, damage cannot make you lose concentration. These effects only
      apply to this jutsu.</p><p><strong>Umbral Breath</strong>:<br />You exhale a wave of <strong>purple flame</strong>
      in a 30-foot cone originating from yourself.</p><ul><li><p>All creatures in range must make a <strong>Dexterity
      saving throw</strong>.</p><ul><li><strong>Success</strong>: Half damage, no
      effects.</li><li><strong>Failure</strong>: Take <strong>5d12 force damage</strong>, and become
      <strong>Dazed</strong> and <strong>Dazzled</strong>.</li></ul></li><li>The affected area becomes <strong>difficult
      terrain</strong> for <strong>1 minute</strong>.</li></ul><p><strong>Umbral Claw</strong>:<br />You manifest a
      <strong>claw of shadow</strong>.</p><ul><li>Make a <strong>melee Ninjutsu (or Genjutsu) attack</strong>, dealing
      your <strong>unarmed damage + 4d10 force damage</strong>.</li><li>This damage is <strong>doubled</strong> against
      structures, constructs, and objects.</li><li><strong>On a hit</strong>: You create a minor ripple in space,
      causing all targets other than yourself within 10 feet to make a <strong>Strength saving throw</strong> or be
      pulled up to 10 feet closer to where the target was hit.</li></ul><p><strong>Umbral Tentacle</strong>:<br />You
      manifest a <strong>tentacle of shadow</strong> over your arm.</p><ul><li>Make a <strong>ranged Ninjutsu (or
      Genjutsu) attack</strong> against a target up to <strong>60 feet</strong> away.</li><li><strong>On a hit</strong>:
      The target is <strong>restrained</strong>, and you may throw them up to <strong>30 feet</strong> in any
      direction.</li></ul><p><strong>Umbral Spores</strong>:<br />You produce <strong>toxic spores</strong> at a point
      within <strong>90 feet</strong>.</p><ul><li><p>All creatures within a <strong>20-foot cube</strong> must make a
      <strong>Wisdom saving throw</strong>.</p><ul><li><strong>Success</strong>: Half damage, no
      effects.</li><li><strong>Failure</strong>: Take <strong>10d4 psychic damage</strong>, and become
      <strong>Confused</strong>.</li></ul></li></ul>
