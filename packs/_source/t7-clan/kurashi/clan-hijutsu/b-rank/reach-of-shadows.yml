folder: tPbRArUr0nN7gJjB
name: Reach of Shadows
type: spell
_id: 3M1GyORntoIYAkmF
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p>A signature jutsu useful for deriving information when all other means seem lost.<br />To cast this jutsu, you
      must be standing near a location where a creature died within the past 72 hours. You weave a single sign,
      conjuring two creatures of shadow to dive into the abyss below where blood was spilled.</p><p>Make an Insight or
      Investigation check vs a DC equal to 10 + the creature's level (Only your DM is aware of DC value). On a failure,
      this jutsu fails as your monsters of shadow come back with nothing.</p><p>On a success, your monsters drag the
      soul of the creature that was killed through the void, holding them aloft in the air, restrained. The soul of the
      creature cannot be damaged and cannot take any actions, but can speak as it has its full intelligence and memory.
      This jutsu fails if the targeted soul is sealed by some effect or thing.</p><p>Every minute, the soul can attempt
      a Charisma saving throw to break free. While conversing with the spirit, twice per casting you can command your
      shadows to slightly harm the soul to intimidate it, giving you or an ally advantage on your next Wisdom or
      Charisma check.</p><p>Once this jutsu ends or the soul breaks free, it returns to the spirit realm and cannot be
      affected by this jutsu again.</p>
