name: Call of the Void Lesser Shade
type: spell
_id: 1Hc0Ye8tzx2ylnMA
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p>You weave signs and command your shadow to split, the fragment moving up to 30 feet away from you and forming
      into a <em><strong>Lesser Shade</strong></em>. A Lesser Shade is a creature of your own description, and uses the
      following statistics; If this jutsu is cast during Sundown/Twilight, gain advantage on checks to maintain
      concentration. If cast during Night, gain the aforementioned effect, and when you roll for concentration, you may
      pay 1/3rd this jutsu's chakra cost to maintain concentration automatically.</p><p>The Lesser Shade is proficient
      in all saving throws, uses your Ninjutsu (or Genjutsu) Attack Bonus and Save DC, and can be commanded as part of
      summoning it and as a bonus action on subsequent turns.</p><p>When you first summon the Lesser Shade, you
      designate its <em><strong>Focus</strong></em>. Select from one of the following below.</p><p><em><strong>Companion
      Focus.</strong></em> Your Companion Shade is geared to assistance and is of Large size. It gains a +20 bonus to
      movement speed, ignores difficult terrain, and shares your skill proficiencies, and it may carry any creature of
      medium size or lower without any reduction to its movement speed.</p><p><em><strong>Guardian Focus.</strong></em>
      Your Guardian Shade is geared towards protection and is of Medium size. It produces a 15-foot aura that grants all
      allies (other than itself) within it +3 DR. The Lesser Shade may, as a reaction, redirect an attack made against
      an ally (other than itself) within 15 feet towards itself. When it does so, it reduces the damage by
      3d8.</p><p><em><strong>Warrior Focus.</strong></em> Your Warrior Shade is geared towards combat and is of Medium
      size. It gains a +1 bonus to attack and damage rolls with its weapons and an additional 15hp.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and
      the hit points of the Lesser Shade by 3d6+8. If cast to A-Rank, you may summon a second <strong>Lesser
      Shade</strong>. This new Lesser Shade must have a different Focus. You can command this new shade at the end of
      your turns, as opposed to a bonus action.</p><p></p>
