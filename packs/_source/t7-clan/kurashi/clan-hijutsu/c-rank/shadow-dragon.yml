system:
  description:
    value: >-
      <div class="page phb" id="p75"><div class="columnWrapper"><p>You pull from the darkness around you and manifest
      the head of a hungry "dragon" above you. This starving dragon hungers and blesses those who feed it.</p><p>All
      hostile creatures within range, up to an amount equal to your Genjutsu ability modiifer must make a Wisdom saving
      throw as the dragon opens its mouth and begins to feast upon their shadows. Creatures that do not have a Shadow,
      or who are of the Nara clan, automatically pass this saving throw. On a failed saving throw, the target is Dazed
      and has their movement speed halved until the end of their next turn.</p><p>The dragon then exhales, releasing a
      spores of mending shadow. All allied creatures within range recover a total of 4d6+4 hit points (divide these hit
      points amongst all allied creatures). For each hostile creature who failed their saving throw, increase the hit
      point total by 1d6+2.</p></div></div>
