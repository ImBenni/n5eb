name: Awaiting Penumbra
type: spell
_id: KwYEj7TutymOm9T6
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p>You attempt to invade another creature's shadow, commanding one of your
      creations to lie in waiting. Select one creature within range. The range
      of this jutsu is doubled during Sundown/Twilight and tripled during Night.
      Casting this jutsu does not break stealth.</p><p>Make an Illusions skill
      check at advantage vs the target's passive perception. On a success, your
      shadow hides within the target's shadow, and your target is unaware this
      has occurred. This jutsu fails against Nara targets or targets that do not
      have a shadow.</p><p>Also on a success, choose between <em><strong>Umbral
      Revenge</strong></em> or <em><strong>Umbral Stalk</strong></em> starting
      from your next turn. If you do not declare an effect within the next
      minute, this jutsu ends early.</p><ul><li><strong>Umbral Revenge:</strong>
      As a bonus action, you command your creation to emerge from the target's
      shadow and attack. Make a melee Ninjutsu attack, dealing 1d12 + your
      Ninjutsu ability modifier in force damage and imposing a Wisdom saving
      throw on a hit. On a failure, the target is Dazzled and Blinded until the
      end of their next turn. The first time this effect is used on a target per
      long rest, the target is Surprised for the duration of the attack. This
      jutsu then ends.</li><li><strong>Umbral Stalk:</strong> You decide to have
      your shadow remain with the target. This jutsu's duration becomes 24 hours
      and for the duration, you are aware of whether the target is conscious as
      well as their general direction. At any point, you may as a Full Turn
      Action manifest your shadow from underneath the target. For the next
      minute, you are blinded to your surroundings, and instead see through the
      eyes of your Shadow Beast, controlling it. The Shadow Beast has 1 hit
      point, an AC equal to your Ninjutsu Save DC, and 60 feet of movement
      speed. The Beast shares your ability scores, skill proficiencies, and
      Kurashi clan features. You may have your Beast explore and interact with
      the environment for the duration. After the duration concludes, the Beast
      is dispelled and this jutsu ends.</li></ul><p><strong>At Higher
      Ranks:</strong> For each rank cast above D-Rank, increase the cost of this
      jutsu by 3, the damage by 1d12, and the number of targets by +1 (You
      decide to use <em><strong>Umbral Revenge</strong></em> or
      <em><strong>Umbral Stalk</strong></em> for each creature; Only one
      creature can be targeted by <em><strong>Umbral Stalk</strong></em> at a
      time.) If cast to B-Rank, the Shadow Beast cannot be detected by jutsu
      with the Sensory keyword.</p>
