system:
  description:
    value: >-
      <p>A large shadow begins to expand from your feet and haunting sounds can
      be heard by other creatures as it nears them. All creatures within range
      must make a Wisdom saving throw. You impose a -1 penalty if this jutsu is
      cast during Sundown/Twilight, and a -2 penalty if this jutsu is used
      during Night. These penalties only apply to this jutsu's initial saving
      throw. Affected creatures may reattempt their saving throw at the end of
      each of their turns.</p><hr /><ul><li><strong>Critical Success:</strong>
      Affected creature is able to resist this jutsu's
      effects.</li><li><strong>Success:</strong> Affected creature is able to
      resist most of this jutsu's effects, being slightly shaken and reducing
      their movement speed by -10 feet until the end of their next
      turn.</li><li><strong>Failure:</strong> Affected creature sees their worst
      fears begin to manifest and take form from the shadow beneath them. For
      the duration, they are Frightened and Slowed, and take 3d4 psychic damage
      at the start of each of their turns.</li><li><strong>Critical
      Failure:</strong> Same effects as a failure, plus an additional rank of
      Fear and Slowed for the duration.</li></ul><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3, the radius by 5 feet, and the damage by
      3d4.</p>
