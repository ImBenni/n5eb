name: Shadow Leap
type: spell
_id: qq6uzUI1qayaldHS
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p>You conjure a beast of shadow and momentarily merge with it, becoming a living shadow as you teleport to a
      source of darkness within range. If you teleport to a space that is not within 10 feet of any hostile creature,
      you may immediately take the <em><strong>Hide</strong></em> action as part casting this jutsu, making your Stealth
      check at advantage. You may use your Ninjutsu ability modifier in place of Dexterity for this check.</p><p>If you
      succeed, for the next minute (concentration) you do not produce sound while you remain in stealth, and as a bonus
      action on subsequent turns you may teleport with this jutsu again and immediately <em><strong>Hide</strong></em>
      once more with no need for additional Stealth checks.</p><p>Alternatively, if you do teleport to a space within 10
      feet of a creature, you do not immediately <em><strong>Hide</strong></em>. Instead, the next attack you make
      against the closest target before the end of the current turn is made at advantage and deals an additional 2d10
      force damage, once per casting. On a hit, you gain the benefits of the Disengage action. This jutsu then
      ends.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of
      this jutsu by 3, and the damage by 1d10.</p>
