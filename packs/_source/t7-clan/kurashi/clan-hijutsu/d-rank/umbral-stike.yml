system:
  description:
    value: >-
      <p>You manifest a limb of a creature of darkness over your arm as you target a creature within range for an
      attack. Make a ranged Ninjutsu attack. You may perform a melee Ninjutsu (or Taijutsu) attack if the target is
      within 10ft.</p><p>On a hit you deal 3d8 force damage. If you choose to deal a melee attack, increase the damage
      dealt by your unarmed damage. Also on a hit, you may use one of the following <em><strong>Skill-Based
      Actions</strong></em> (<strong>Shove</strong>, <strong>Steal</strong>, <strong>Trip</strong>). You may use your
      Ninjutsu ability modifier for these Skill-Based Actions.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If cast to C-Rank or higher, increase the
      damage of this jutsu by 1 step. If cast to B-Rank or higher, increase the number of attacks by +1. If cast to
      A-Rank or higher, increase the damage die of this jutsu by 1 step. If cast to S-Rank, increase the number of
      attacks by +1.</p><p></p>
