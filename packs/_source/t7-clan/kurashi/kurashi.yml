  description:
    value: >-
      <h3 id="seekers-of-truth">Seekers of Truth</h3><p>Believed to be descendents of the Nara clan, or to at least have
      a close history with the Nara, the Kurashi are a clan that primarily resides within the Land of Fire, though they
      can be found in most of the 5 Great Nations as private investigators or police detectives. The Kurashi utilize
      techniques using shadows, manifesting jutsu that seemingly use spirits and other supernatural forces to aid them
      in finding the truth.</p><h4 id="kurashi-traits">Kurashi Traits</h4><p><strong>Ability Score Increase:</strong> +2
      Int or Wis or Cha, +1 Con <br /><strong>Skill Proficiencies:</strong> Acrobatics, Sleight of Hand<br
      /><strong>Speed:</strong> Your base walking speed is 30 feet.</p>
