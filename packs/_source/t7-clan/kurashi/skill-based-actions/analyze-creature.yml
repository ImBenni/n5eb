name: Analyze Creature
type: feat
_id: SbGZHhhypKVpo7CS
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p><strong>Attributed School:</strong> School of Wisdom <br />You attempt to see through a target's facade and
      learn their true strengths, weaknesses, and aspects of character. As an action, make a Wisdom ability check vs a
      DC equal to 8 + the target's rank (E-Rank: 0, D-Rank: 1, C-Rank: 2....). On a success you learn one of the
      following pieces of information, plus an additional piece of info every every 3 you succeed by.</p><ul><li>You
      learn the target's highest ability score.</li><li>Any one item they possess of the highest emotional or material
      value, or relevance to the situation at hand.</li><li>Any emotions the creature is attempting to conceal, such as
      anger, love, stress, etc. You also learn if they lied to you.</li><li>A personality trait you can
      exploit.</li><li>You learn the creature's greatest weakness such as a vulnerability or a more specific weakness
      (DM discretion).</li></ul>
    chat: ''
