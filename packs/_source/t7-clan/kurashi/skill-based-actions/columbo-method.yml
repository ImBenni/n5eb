folder: YjF4IbtQ3upkQjJQ
name: Columbo Method
type: feat
_id: vaOKQ4P7gW2mwFL8
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p><strong>Attributed School:</strong> School of Charisma <br />You have studied the work of former Kurashi
      detectives and have cracked the code of interrogation. Good charisma and clever wordplay. While out of combat, you
      may use this action in one of two ways, <strong>Good Cop</strong> or <strong>Bad Cop</strong>. <em>(DC = 13 + (3 x
      the target's rank))</em> If you fail to use this action, you must wait 1 minute before you can attempt it again on
      that creature.</p><ul><li><strong>Good Cop:</strong> You attempt to persuade a target to give you the info you
      need with your good charm. Make a Performance or Persuasion skill check. If Performance, you pull out a convient
      item that the target likes, such as a can of soda. If you Persuasion, you pretend to be on their side and
      understand their point of view. <strong>Success:</strong> You perform the <em>Make an Impression/ Request</em>
      Skill-Based action as if you passed by 10+, and the target is, unbeknownst to them, Charmed for 1 hour. While
      Charmed this way, you gain advantage on all Performance /Persuasion checks against them.</li><li><strong>Bad
      Cop:</strong> You attempt to intimidate your target either through pain or by sowing doubt. Make a Deception or
      Intimidation skill check. If Deception, you slander and berate your target, perhaps accusing them of a falsehood.
      If Intimidation, you manifest a creature of shadow to quickly attack the target, such as bashing their head into a
      desk (the target gains 1 rank of bleeding). <strong>Success:</strong> You perform the <em>Coerce</em> Skill-Based
      Action as if you succeed by 10+, and the target is, unbeknownst to them, Frightened for 1 hour. While Frightened
      this way, you gain advantage on all Deception/Intimidation checks on them.</li></ul>
