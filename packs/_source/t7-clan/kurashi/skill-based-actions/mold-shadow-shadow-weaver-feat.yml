system:
  description:
    value: >-
      <p><strong>Skill Action: Mold Shadow</strong></p><p>As a <strong>bonus action</strong>, you attempt to mold one of
      your shadows into an object of your description. Make an <strong>Intelligence</strong>, <strong>Wisdom</strong>,
      or <strong>Charisma</strong> ability check (choose one) vs. a <strong>Generic Flat Ability Check DC</strong> as
      determined by your DM (see Chapter 6: Using Ability Scores in the S.H.B). The more intricate the object, the
      higher the DC should be.</p><ul><li><strong>On a success</strong>, you create the chosen object. Objects such as
      Kits, Poisons, and Explosive Tools created this way look identical to their real counterparts but do not function
      as such.</li><li>Objects you create have the same bulk and appear completely real to any
      non-Kurashi.</li><li>Objects made this way last for <strong>1 hour</strong> (you may dispel them early). Upon
      creation, you may spend increments of <strong>1 chakra</strong> to increase the duration by <strong>1
      hour</strong> per chakra spent.</li><li>A creature may use an <strong>action</strong> to closely examine your
      created object, making an <strong>Investigation skill check</strong> vs. your <strong>Kurashi Hijutsu Save
      DC</strong>, discerning the object as fake on a success.</li></ul>
