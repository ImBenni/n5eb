system:
  description:
    value: >-
      <p><strong>Attributed School:</strong> School of Wisdom <br />Over the next 10 minutes, you calm your breathing
      and carefully begin to comb through an object or area, analyzing every crevice and minute detail until its story
      is revealed to you. If studying an area, the area cannot exceed 10 times your proficiency bonus (ft). Make a
      Wisdom ability check vs. a DC equal to 10 + the rank of mission you actively in <em>(No Mission/E-Rank: 0, D-Rank:
      1, C-Rank: 2....)</em></p><p>On a success, if observing an object, you learn where the object was made, who
      previously owned this object, how it found its way into your possession, and one significant personality trait
      about its previous owner.</p><p>If you were observing an area, you can determine the types of people who utilize
      this room, the room's purpose, the routine of events that normally occur in this room and any deviations in this
      routine that may have recently occurred (Such as a fight, presence of a foreign entity, etc). You also learn of
      any secret entrances or contraptions that may exist</p>
