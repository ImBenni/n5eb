folder: YjF4IbtQ3upkQjJQ
name: Suppress Disruption
type: feat
_id: IAQaRq9rCZWNJb8S
img: systems/n5eb/assets/content/clans/kurashi.webp
system:
  description:
    value: >-
      <p><strong>Attributed School:</strong> School of Intelligence <br />You detect that you and your allies abilities
      are being suppressed by a target and act to stop it. When you suspect a hostile creature possesses or is utilizing
      a feature, jutsu, or trait that would negatively affect d20 rolls made by you or your allies in some way (Ex.
      Disadvantage, penalties, etc), you may make an Intelligence ability check as an action vs. a DC of 8 + the
      creature's rank <em>(E-Rank: 0, D-Rank: 1, C-Rank: 2....).</em></p><p>On a success, you learn of all features,
      traits, and jutsu the target has that are causing these penalities and are able to prevent one of these abilities
      from activating for the next minute. If another hostile creature would possess/activate the same ability, they
      also cannot utilize it for the duration. Once you succeed this check, you must wait 1 hour or spend 1 Hit Die
      before you can use <em><strong>Suppress Disruption</strong></em> again.</p>
    chat: ''
