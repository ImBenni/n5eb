system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kuzo Clan, Level 8+ <br />Cloud Release
      chakra flows thru your body allowing you to reach heights that no one else could even fathom. You gain the
      following Benefits;</p><ul><li>Increase your Dexterity score by 1, to a maximum of 20.</li><li>You gain one
      additional Cloud Technique provided by the Cloud Release clan Feature.</li><li>As a bonus action, you can use a
      Second Cloud technique to modify the same Kozu Clan Hijutsu. You can do this a number of times equal to your
      Dexterity Modifier per long rest.</li><li>When you complete a Short Rest, you regain 2 uses of your Cloud Release
      abilities.</li></ul>
