system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kozu Clan, +4 <br />You feel as if you
      belong in the sky as one of the clouds. You gain the following Benefits;</p><ul><li>Increase your Dexterity or
      intelligence score by 1, to a maximum of 20.</li><li>Kozu Clan Jutsu you cast, have their cost reduced by
      2.</li><li>Allied creatures have advantage on passing saving throws against jutsu you cast with the Wind Release
      and/or Water Release Keyword(s).</li><li>When you would make a Dexterity Saving throw, you gain a +2 bonus to the
      save so long as you are above the creature or object forcing you to make the Dexterity Saving throw.</li></ul>
    chat: ''
