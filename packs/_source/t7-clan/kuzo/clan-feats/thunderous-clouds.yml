system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Kuzo Clan, Level 12+ <br />You have
      learned to harness the power of thunder clouds. You gain the following Benefits;</p><ul><li>You gain the ability
      to Learn Jutsu with the Lightning Release Keyword.</li><li><p>You gain the following Cloud Technique. <br
      /><strong>Thunderous Clouds</strong>: You replace all instances of "Wind Damage" with "Lightning damage". You also
      replace all instances of "chilled" with "shocked". Doing this grants the Kuzo Hijutsu the lightning release
      keyword.</p></li><li><p>When you would cast a lightning release jutsu near a sufficient source of water, you may
      either reduce the chakra cost of the jutsu by 2 or you can choose to increase the damage die by 1 step. (max of
      d12).</p></li></ul>
