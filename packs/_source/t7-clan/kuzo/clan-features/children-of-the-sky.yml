system:
  description:
    value: >-
      <p>The Kuzo Clan are known their incredible ability to reach grand heights in a single leap. Starting at 1st
      level, your high jump height is increased to 10 + your Dexterity Ability Score. Your high jump height is increased
      by 10 feet at 11th and 18th levels.</p><p>Additionally at 3rd level, you reduce all damage you would receive from
      falling by your character level. Starting at 15th level you also lower all damage you would take from falling by
      half.</p>
