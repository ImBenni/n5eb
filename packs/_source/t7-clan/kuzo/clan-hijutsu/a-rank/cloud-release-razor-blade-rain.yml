system:
  description:
    value: >-
      <p>You summon a massive dark cloud to fill the sky above you, which begins to unleash an endless barrage of watery
      needles. Each creature of your choice within 90 feet of you must make a Dexterity saving throw, taking 6d10 Wind
      damage and gaining 2 ranks of the bleed and chilled on a failed save.</p><p>Additionally,at the beginning of each
      of your turns, each creature in range of your choice must make a Dexterity saving throw, taking 4d10 Wind damage
      and gaining 1 rank of bleed and chilled on a failed save.</p><p><strong>At Higher Ranks</strong>: For each rank
      you cast this jutsu above A-Rank, increase the cost of this jutsu by 3, the damage by 2d10, and the size of the
      Radius by 30 feet.</p>
