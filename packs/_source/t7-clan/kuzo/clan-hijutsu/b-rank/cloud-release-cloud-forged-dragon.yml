system:
  description:
    value: >-
      <p>You create a massive cloud before using your chakra to mold it into the appearance of a large dragon of your
      description. The Dragon then expands in a cone attempting to engulf all those in its path.</p><p>Each creature in
      a 60-foot cone, originating from you, must make a Dexterity saving throw, taking 7d6 Wind damage, gaining 2 ranks
      of bleed and chilled, and being knocked prone on a failed save. This jutsu deals double damage to objects and
      structures.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above D-Rank, Increase the
      cost of this jutsu by 3 and the damage by 2d6.</p>
