system:
  description:
    value: >-
      <p>You summon a swirling cloud above your head that discharges chucks of hail in all directions.</p><p>Each
      creature within 60 feet of you must make a Dexterity saving throw, taking 3d8 Wind damage and 3d8 Cold damage,
      gaining 2 ranks of bleed and 1 rank of chilled on a failed save, or half as much damage and no additonal effects
      on a succesful save.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above B-Rank,
      Increase the cost of this jutsu by 3, the damage by 2d8, and increase the amount of ranks of either Chilled or
      Bleeding by 1. (Pick One)</p>
