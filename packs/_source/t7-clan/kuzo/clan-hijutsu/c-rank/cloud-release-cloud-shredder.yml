system:
  description:
    value: >-
      <p>You form a small cloud above a target creature within range, which begins to shoot out razor sharp pellets of
      rain down on them forcing the target creature to make a Dexterity saving throw. On a failed save they take 3d8
      Wind damage and gain 1 rank of bleed.</p><p>Additonally, for the duration of the jutsu the target must remake
      their saving throw at the start of each of their turns, taking the damage and gaining an additonal rank of bleed
      on a failed save.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3 and the damage by 1d8.</p><p>If this Jutsu is cast at B-Rank all creatures within 5
      feet of the target must also make the Dexterity saving throw.</p><p>If this Jutsu is cast at A-Rank all creatures
      within 10 feet of the target must also make the Dexterity saving throw.</p><p>If this Jutsu is cast at S-Rank all
      creatures within 15 feet of the target must also make the Dexterity saving throw.</p>
