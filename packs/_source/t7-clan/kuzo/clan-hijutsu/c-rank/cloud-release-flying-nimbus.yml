system:
  description:
    value: >-
      <p>You summon a small cloud below your feet which lifts you off of your feet. You gain a fly speed of 45 feet or
      equal to your normal movement speed (which ever is greater). You also gain the ability to hover in place. You may
      carry 1 other creature of medium size or lower on the cloud.</p><p><strong>At Higher Ranks</strong>: For each rank
      you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the flying speed by 15 feet. If this
      Jutsu is cast at B-Rank it gains a duration of 1 hour. If this Jutsu is cast at A-Rank, you can cast it as a Bonus
      Action, instead of an Action.</p>
