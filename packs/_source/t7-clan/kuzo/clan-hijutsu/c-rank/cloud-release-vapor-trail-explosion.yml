system:
  description:
    value: >-
      <p>You unleash a stream of clouds holding intense sharp winds 5 feet wide and up to 60 feet long in a straight
      line originating from you. This trail of clouds stops at a space of your choice along this distance and expands
      into a large 20-foot radius sphere of slashing hail coming from a cloud centered on the selected space.</p><p>All
      creatures in both this Jutsu's stream and radius, must make a Dexterity saving throw. Taking 4d8 Wind damage and
      gaining 1 rank of bleed and chilled on a failed save, or half as much damage and no additonal effects on a
      success.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and damage by 2d8.</p>
