system:
  description:
    value: >-
      <p>You create a long whip made from a chain of clouds. Make a melee ninjutsu attack against a target in range,
      dealing 4d6 Wind damage and forcing the target creature to make a Strength saving throw, being pulled 10 feet
      towards you and being knocked prone on a failed save.</p><p><strong>At Higher Ranks</strong>: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by 2d6.</p>
