name: Cloud Release Floating Clouds
type: spell
_id: bA6X3VmdRyMRnWdV
img: systems/n5eb/assets/content/clans/kuzo.webp
system:
  description:
    value: >-
      <p>You send a Miniature cloud towards a creature within range. For the duration when that creature would be
      knocked into the air they are knocked upwards an additional 10 feet.</p><p>You can also choose to target an allied
      creature, in which case the cloud hovers near them and when they would be knocked into the air, gently lowers them
      to the ground preventing fall damage.</p><p><strong>At Higher Ranks</strong>: For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and the height the creature would be knocked upwards by 10. If
      this jutsu is casted at B-Rank or higher you may select 1 additional creature to be affected of this jutsu when
      you would cast it.</p>
