name: Cloud Release Fog Cloud
type: spell
_id: R6ptbv391nrv0oiu
img: systems/n5eb/assets/content/clans/kuzo.webp
system:
  description:
    value: >-
      <p>You create a 30-foot-radius sphere of fog centered on a point within range. The sphere spreads around corners,
      and its area is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least
      10 miles per hour) disperses it. Creatures inside this cloud of fog cannot see more than 5 feet away from them,
      gaining disadvantage Attacks made while inside the cloud of fog that rely on sight. Creatures outside the fog also
      have disadvantage when attacking other creatures who are inside the mist.</p><p>Also, when this jutsu is cast,
      select one creature, whom you can see. That creature becomes <em><strong>Fog Marked</strong></em>. For the
      duration of this jutsu, while a fog marked creature is in the cloud it is always perceived by you, cannot benefit
      from being hidden, and you do not gain disadvantage on attack rolls against them. You can move the fog cloud up to
      30 feet as a bonus action on your turn.</p>
