    value: >-
      <h3 id="head-in-the-clouds">Head in the Clouds</h3><p>The Kuzo clan is a family of shinobi that hail from the Land
      of Cloud. The clan has an extreme affinity for the water and wind releases, mixing them, and creating the ability
      to create thick clouds for a multitude of uses. Their power is well respected, with many believing that the land
      of clouds were named after the clan.</p><h4 id="kuzo-traits">Kuzo Traits</h4><p><strong>Ability Score
      Increase:</strong> +2 Dex, +1 Int <br /><strong>Speed:</strong> Your base walking speed is 30 feet.<br
      /><strong>Proficiencies:</strong> Ninshou, Acrobatics <br /><strong>Cloud Release Affinity:</strong> You begin
      with either Wind or Water Release Affinity. (Pick one)</p>
