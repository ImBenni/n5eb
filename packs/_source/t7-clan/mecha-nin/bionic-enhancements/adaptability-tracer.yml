img: systems/n5eb/assets/content/clans/mecha-nin.webp
system:
  description:
    value: >-
      <p>Once per long rest, you may activate this Bionic Enhancement as part of initiative by spending 1 Mecha Die. At
      the start of your turn select a creature you can see within 30 feet of you. Once per turn, when that creature
      targets you with an attack or jutsu, it must first succeed either an Illusion, Martial Art, or Ninshou check
      (based on the trigger) contested against your check using the same skill. On a failure, the attack or jutsu is
      made at disadvantage. A creature that succeeds this contest is immune to this ability for the next
      hour.</p><p><strong>At 15th level:</strong> You add the result of your Mecha Die to these contested skill
      checks.</p>
    chat: ''
