name: Equipment Integration
type: feat
_id: XnKlb77nhcc4v51C
img: systems/n5eb/assets/content/clans/mecha-nin.webp
system:
  description:
    value: >-
      <p>Mecha-nin are intimately connected to their specific hardware, and cannot be transplanted into new forms.
      Cosmetic alterations can be made, however, and equipment can be grafted into a Mecha-nin's chassis. Such built-in
      equipment costs twice as much ryo and takes 1 week of Downtime to properly integrate into the Mecha-nin's system,
      and you must have access to a workshop during this time to accomplish the task. A Mecha-nin can have a total
      number of integrated equipment equal to its proficiency bonus. You ignore the bulk of equipment you have
      integrated this way, and you're always considered to have that equipment in reach. It costs the use of your object
      interaction each turn to cycle between different integrated equipment. If a weapon is integrated this way, it
      gains the Hidden property and you cannot be disarmed of it while you're conscious.</p><p><strong>At 15th
      level:</strong> Integrated weapons and equipment that require an ability modifier to attack or use can use your
      intelligence.</p>
