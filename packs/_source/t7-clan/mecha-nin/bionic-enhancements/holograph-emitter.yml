system:
  description:
    value: >-
      <p>As an action, you can spend 1 Mecha die to shift the visual characteristics of your mechanical body and alter
      your voice modulator. This consumes a concentration slot. For the next hour while maintaining concentration, you
      are considered to be under the effects of the <em>Transform</em> and <em>Voice Change</em>
      genjutsu's.</p><p><strong>At 15th level:</strong> You gain a bonus to charisma skill checks equal to half your
      Mecha Die maximum.</p>
