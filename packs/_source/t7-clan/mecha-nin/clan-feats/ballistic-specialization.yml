system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Mecha-Nin, level 4+ <br />The pentrating
      power of weapons you wield increases. You gain the following benefits;</p><ul><li>Increase your Constitution or
      Intelligence score by 1, to a max of 20.</li><li>Ranged weapon attacks and Mecha-nin jutsu that deal Piercing and
      Slashing damage increase their critical threat range by +1.</li><li>Once per turn, when you deal a critical hit
      against a creature, it either gains 1 rank of Bleeding or Bruised (your choice) which lasts until the end of the
      target's next turn.</li></ul>
    chat: ''
