system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Mecha-Nin Clan <br />You've made
      improvements to the mechancial shape-shifting potential of your form. You gain the following
      benefits;</p><ul><li>Increase your Constitution or Intelligence score by 1, to a max of 20.</li><li>You learn one
      "Mecha-mode" clan jutsu at a rank you can cast.</li><li>Reduce the chakra cost for concentrating on a Mecha-mode
      jutsu by 2 (to a minimum of 1).</li><li>You may spend a number of Mecha Dice equal to the rank of a Mecha-nin clan
      jutsu (D-Rank: 2, C-Rank: 3, B-Rank: 4, A-Rank: 5). To cast a Mecha-mode jutsu without paying its chakra cost.
      When you do so, the jutsu loses the concentration tag.</li></ul>
