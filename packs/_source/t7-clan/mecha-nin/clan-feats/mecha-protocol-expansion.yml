system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Mecha-Nin, level 8+ <br />With your
      internal processing brakes removed, no amount of safety countermeasure can stop you now. You gain the following
      benefits;</p><ul><li>Increase your Constitution or Intelligence score by 1, to a max of 20.</li><li>Increase the
      die size of Mecha Die by one step (&lt;d6&lt;d8&lt;d10&lt;d12).</li><li>When you roll hit dice or chakra dice to
      recover during a rest, if the die size is less than your Mecha Die, it becomes equal to your Mecha Die
      instead.</li><li>When you have 0 Mecha Dice remaining, you may spend 5 chakra and 1 chakra die as an action to
      recover 1 Mecha Die.</li><li>When you spend Mecha Dice for any of its uses, you may add +1 to the result of the
      die.</li></ul><pre><code></code></pre>
