name: Mecha-Mode Unite
type: spell
_id: g3EIt8d1aGLazF5L
img: systems/n5eb/assets/content/clans/mecha-nin.webp
system:
  description:
    value: >-
      <p>Your mechanical body steams as it opens into a hollowed interior, allowing yourself to be worn and wielded by
      another medium-sized creature like a suit of armor. You can't lose concentration on this jutsu as a result of
      damage. Select a willing creature in 5 feet of you as the target of this jutsu. You unite with this creature and
      it becomes your designated pilot. For the duration you're united, you and the pilot benefit from the
      following;</p><hr /><p><strong>Mecha-nin</strong>:</p><ul><li>Your movement becomes 0 for the
      duration.</li><li>Your position in initiative is moved to the pilot's, where both turns are taken
      simultaniously.</li><li>You gain an additional reaction, which can be used to at any time to end this jutsu,
      ejecting the pilot and landing in the nearest unoccupied space from you.</li><li>Your current hit points exist as
      temporary hit points to the pilot. Any damage resistances or immunities you may have function normally with these
      temporary hit point.</li><li>Any physical or elemental condition or effect targeting you does not effect the
      pilot. Any mental condition or effect targeting you instead only effects the pilot.</li></ul><hr
      /><p><strong>Pilot</strong>:</p><ul><li>Increase its movement speed by half of your movement speed.</li><li>Its
      Strength and Dexterity scores become 19. If they're already 19 or higher, they increase by +2 instead.</li><li>The
      pilot shares the same benefits from your Bionic Enhancements and active jutsu. The pilot can also cast any hijutsu
      you know, and doing so must spend your chakra.</li><li>The Pilot may expend chakra from your pool to cast jutsu or
      activate abilities.</li><li>The Pilot's AC becomes equal to your AC, or gains a +1 bonus to its AC, whichever is
      higher.</li><li>The Pilot is considered to have full cover and can't be targeted by attacks or jutsu, unless that
      jutsu has the genjutsu keyword or deals necrotic or psychic damage. Otherwise, such attacks instead target and
      effect the you.</li></ul><p>If your hit or chakra points are reduced to 0, this jutsu immediately ends and the
      pilot is ejected from you.</p>
