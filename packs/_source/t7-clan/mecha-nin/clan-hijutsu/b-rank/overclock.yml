_id: yQNUBeuVAokeHaGM
img: systems/n5eb/assets/content/clans/mecha-nin.webp
system:
  description:
    value: >-
      <p>For a moment you unlock the inhibitors directing the flow of power from your internal chakra core to your
      mechanical systems, amplifying your jutsu in one of the following ways:</p><ul><li><em><strong>Damage
      Amp:</strong></em> If the jutsu deals damage, the damage ignores resistance and cannot be reduced by more than
      half. A creature damaged by this jutsu must succeed a Constitution saving throw, being knocked back 10 feet and
      becoming weakened until its next rest on a failed save.</li><li><em><strong>Rechambered Amp:</strong></em> You
      must use your action to cast the same jutsu next turn, but upcast up to A-Rank, for 0 chakra cost. This cannot be
      used to cast an A-rank clan jutsu.</li><li><em><strong>Chakra Core Amp:</strong></em> You gain temporary hit
      points equal to 5 times your Constitution modifier. These temporary hit points last for 1 minute or until you cast
      this jutsu again.</li><li><em><strong>Targeting Amp:</strong></em> If the jutsu requires an attack roll, gain
      advantage on that roll. If the jutsu instead requires a creature to make a saving throw, you may select an
      affected target to have disadvantage on their initial saving throw.</li><li><em><strong>Thruster
      Amp:</strong></em> If the jutsu grants either an increase of speed or a fly speed, double that amount for its
      duration. While that jutsu remains active, your movement doesn't provoke attacks of opportunity.</li></ul>
    chat: ''
