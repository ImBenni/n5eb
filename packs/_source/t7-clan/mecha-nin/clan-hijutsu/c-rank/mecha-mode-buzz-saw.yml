system:
  description:
    value: >-
      <p>Your mechanical body steams open to reveal a roaring steel saw which expands to a radius of 10 feet centered on
      you. You can't lose concentration on this jutsu as a result of damage. All creatures within the area must make a
      Dexterity saving throw, taking 4d8 slashing damage and gains 1 rank of bleeding on a failed save or half as much
      and no other effect on a success. A creature takes the same damage when it enters the radius for the first time on
      a turn or begins its turn there.</p><p>Non chakra-based objects or structures made of wood, plants, or similar
      material caught in the radius are destroyed.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3, and the damage by 2d8.</p>
