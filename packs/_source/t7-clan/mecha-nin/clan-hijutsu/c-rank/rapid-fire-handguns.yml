system:
  description:
    value: >-
      <p>You blast a spray of bullets from your fingertips. This jutsu has two firing modes. You choose which firing
      mode to use when you cast it:</p><p><strong>Targeted Mode</strong>: Make a ranged ninjutsu attack against a single
      target within 120 feet. On a hit, you deal 6d8 piercing damage. This attacks critical threat range increases by
      +1. On a critical hit, the target gains 1 rank of bleeding.</p><p><strong>Burst Mode</strong>: All creatures in a
      40 foot cone originating from you must make a Dexterity saving throw, taking 8d4 piercing damage and gain 2 ranks
      of slowed on a failed save, or half as much damage on a success and 1 rank of slowed. These ranks last until the
      end of an affected creature's next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above C-Rank, increase the cost of this jutsu by 3, and the damage by 2d8 and 2d4 respectively.</p>
