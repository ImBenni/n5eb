system:
  description:
    value: >-
      <p>You target a creature within range, syphoning its chakra to feed your internal chakra core. The target must
      make a Constitution saving throw. On a failure, it gains two ranks of weakened until the end of its next turn, and
      reduces its chakra point total by 4d6. On a successful save, it only reduces its chakra point total by half that
      amount. You gain temporary chakra by an equal amount which lasts for 1 min.</p><p>While you have temporary chakra
      points from this jutsu, you cannot cast this jutsu again.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and the target reduces its chakra point
      total by an additional 1d6.</p>
