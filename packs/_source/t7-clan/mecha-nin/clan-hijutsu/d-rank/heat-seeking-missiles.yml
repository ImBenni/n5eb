system:
  description:
    value: >-
      <p>You fire three small missiles from your mechanical form. Each missile hits a target of your choice that you can
      see within range. A missile deals 1d4+1 fire damage to its target. The missiles all strike simultaneously, and you
      can direct them to hit one target or several.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3, and create one additional missile.</p>
