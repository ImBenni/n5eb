system:
  description:
    value: >-
      <p>You fire two beams of hot energy from your optical lenses. This jutsu has two firing modes. You choose which
      firing mode to use when cast:</p><p><strong>Heat Ray:</strong> Make a ranged ninjutsu attack against either a
      single target or two adjacent targets within 5 feet of each other in range. On a hit, you deal 3d6 fire damage. If
      attacking two adjacent targets, the damage is split between both. A damaged creature must also succeed a
      Constitution save or gain 1 rank of Burned.</p><p><strong>Concussive Ray:</strong> Make a ranged ninjutsu attack
      against either a single target or two adjacent targets within 5 feet of each other in range. On a hit, you deal
      3d6 force damage. If attacking two adjacent,the damage is split between both. This attack deals double damage to
      structures, constructs, and objects. A damaged creature must also succeed a Constitution save or gain 1 rank of
      Bruised.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      of this jutsu by 3, and the damage by 2d6. When you cast this jutsu at B-Rank or above, inflict 1 additional rank
      of either condition.</p>
