system:
  description:
    value: >-
      <p>Your mechanical form unfolds, adapting you into a configuration optimized for traversing any terrain. You can't
      lose concentration on this jutsu as a result of damage. While this jutsu is active, you gain the following
      benefits:</p><ul><li>Increase your walking speed by 30 feet, and you ignore difficult terrain.</li><li>You can be
      mounted by up to two medium creatures. Creatures mounted this way occupy your space but are not encumbered. They
      are uneffected by jutsu you cast that damage an area surrounding you.</li><li>If you move at least 30 feet
      straight toward a target and hit it with a melee attack or taijutsu on the same turn, it must succeed on a
      Strength saving throw or be knocked prone.</li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above D-Rank, increase the cost of this jutsu by 3, increase the speed by 5 feet and the medium
      creatures you can carry by 1</p>
