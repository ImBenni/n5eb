system:
  description:
    value: >-
      <p>You aim both fists as they rocket forth from your arms at a target in
      range while tethering cables back to you. If the target is a creature, on
      a hit, you deal your unarmed damage + 2d6, and the creature becomes
      grappled by you. Alternatively, you may target a fixed surface such as a
      ledge or wall, or a medium or smaller object within range.</p><p>After a
      successful hit you can choose to retract your fists, which either moves
      you within 5 feet of the target or pulls the target within your reach (if
      applicable). If the target is a creature, it must succeed a Strength
      saving throw or be pulled 30 feet closer to you.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3, the damage increases by 1d6, and increase the
      jutsu's ranges by 10 feet.</p>
