system:
  description:
    value: >-
      <h3 id="the-age-of-machinery">The Age of Machinery</h3><p>Mecha-Nin are not a clan intrinsically, but rather the
      result of years of ingenious tinkering performed discreetly in the Land of Snow. These beings of metal are given
      sentience and personality as a byproduct of its internal chakra core -- its primary source of power. This core is
      designed much like a human heart as it sustains the mecha-nin's body with a steady supply of resources essential
      to its operation. Without its chakra core, a mecha-nin becomes a motionless pile of junk.</p><h4
      id="mecha-nin-traits">Mecha-Nin Traits</h4><hr /><ul><li><strong>Ability Score Increase:</strong> +2 Con, +1 to
      one other ability score of your choice</li><li><strong>Speed:</strong> Your base walking speed is 30
      feet.</li><li><strong>Skill Proficiencies:</strong> Crafting; choose one between Illusion, Martial Arts, and
      Ninshou.</li></ul>
