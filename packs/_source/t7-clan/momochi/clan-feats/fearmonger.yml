system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Momochi Clan<br />The secrets of your
      blood are not that there is a demon within you, but that you are the demon. You are the fear. You are the
      danger.</p><ul><li>Whenever a creature has two or more ranks of fear applied by you, if you would apply another
      rank of fear, you may instead apply a rank, Concussed or Confused.</li><li>If a creature has 5 or more ranks of
      Fear applied by you, and you would apply another. You may strip all ranks of fear away from that creature, and
      instead have that creature make a Wisdom save against your Genjutsu save DC. If they fail, they gain a rank of
      Exhaustion.</li></ul>
    chat: ''
