    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Momochi Clan, Level 8+<br />While you are
      benefitting from your "Inner Demon" clan feature, you are a true force to be reckoned with. Your style of killing
      is utterly unique.</p><ul><li>While benefitting from your <strong>Inner Demon</strong> clan feature, Genjutsus
      with the Bukijutsu keyword you cast gain the Hijutsu keyword, and count as Momochi Hijutsu.</li><li>Momochi
      Hijutsu you cast gain a +2 to attack and damage rolls, or increase their saving throw DC by +2.</li></ul>
