system:
  description:
    value: >-
      <p>Beginning at 11th level, select two Bukijutsu that you know. These selected Jutsu can be converted into a
      Genjutsu, gaining the Genjutsu and Tactile keywords, while still maintaining the Bukijutsu keyword. A Jutsu that
      is converted this way retains all effects detailed in its Jutsu description except it can use your Genjutsu Attack
      bonus, Ability score and Save DC for all calculations. You can change which Jutsu you convert this way when you
      complete a Full Rest. You can choose another two Bukijutsu at 18th level.</p>
