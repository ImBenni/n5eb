name: True Heart's Betrayal
type: feat
_id: xdHMO9HcRHdYRB8E
img: systems/n5eb/assets/content/clans/momochi.webp
system:
  description:
    value: >-
      <p>Even at the face of death, you keep fighting. At 15th level, you now require 5 Death Saving throws in order to
      die, and effects that would cause instant death as the result of a hostile creature (Ex. Heat Snap), now always
      allow you to make a Charisma saving throw at advantage vs. the DC of the effect to avoid instantly
      dying.</p><p>Once per full rest, when you reach 0 hit points and enter the <em><strong>Dying</strong></em> state,
      you can choose to not fall unconscious. If you do, you enter the <em><strong>Undying State</strong></em> until the
      end of the combat. Once you exit this state, you gain +2 Exhaustion. You exit this state early if you regain hit
      points.</p><ul><li><em><strong>Undying State.</strong></em> Your AC becomes 10, and your movement speed is reduced
      by half (cannot go below half), and your HP cannot go below 0 (unless you fail all death saves). On your turn, you
      can only take the attack action and move. You have advantage on the first attack roll you make per turn, and treat
      creatures as vulnerable to your damage once per round. You still make death saving throws as normal, though when
      you make a death saving throw as the result of damage, you make the saving throw at
      advantage.</li></ul><p></p><p></p>
