system:
  description:
    value: >-
      <p>Starting at 7th level, as a bonus action you can awaken the slumbering demon inside of you. For 1 minute, you
      emit a 5-foot aura dark malevolent chakra, gain a +1 bonus to AC, and a number of times equal to half your
      proficiency bonus per activation of this form, when you take the attack action, you can replace one or more
      attacks with a Genjutsu of C-Rank or lower. The Genjutsu must require an attack roll, and cannot have CS or NT
      components or a range of self. You can activate this transformation once per long rest.</p>
