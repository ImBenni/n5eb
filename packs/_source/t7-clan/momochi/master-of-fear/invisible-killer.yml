system:
  description:
    value: >-
      <p>When you cast a jutsu with a duration no greater than one minute, you may activate this technique. Until the
      conclusion of the jutsu, you become almost invisible, imposing disadvantage on all attacks against you and gaining
      advantage on Dexterity (Stealth) checks. If you activate this technique with a jutsu that does not require
      concentration, you must maintain concentration to benefit from this technique.</p>
