system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Mugen Clan, Level 8+ <br />Your Limitless
      Technique exceeds all boundries placed upon, venturing into new territory none before you thought were possible to
      chart. You gain the following benefits;</p><ul><li>Increase your Intelligence ability score by 1, up to the
      maximum of 20.</li><li>Select a number of jutsu up to your Intelligence modifier. When you cast these jutsu, you
      may spend an additional 2 chakra to treat them as Mugen Hijutsu for the duration of the casting. You may switch
      which jutsu benefit from this feature on a long rest.</li><li>You may now use <strong>Fathomless
      Resistance</strong> with Strength saving throws as well.</li></ul><p></p>
