system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Mugen Clan <br />The manifestation of your
      Limitless has adapted to your varied use and mastery of it. You gain the following benefits;</p><ul><li>Increase
      your Intelligence ability score by 1, up the maximum of 20.</li><li>You gain one additional feature from the
      <em><strong>Spectrum</strong></em> clan feature from a level you qualify for.</li><li>Creatures have disadvantage
      on checks made to counter or dispel Mugen Hijutsu.</li><li>You can take this feat twice, gaining a new feature
      from <em><strong>Spectrum</strong></em> each time.</li></ul>
