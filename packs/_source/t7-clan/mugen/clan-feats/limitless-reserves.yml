system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Mugen Clan, level 4+ <br />Your mastery of
      your Clan Techniques has evolved, allowing you to manipulate your own chakra reserves once. This evolution in
      skill grants you the following <br />benefits:</p><ul><li><p>Increase your Constitution or Intelligence ability
      score <br />by 1, up the maximum of 20.</p></li><li><p>Your chakra point maximum increases by an amount equal to
      your level when you gain this feat. <br />Whenever you gain a level thereafter, your <br />chakra points maximum
      increases by an additional 1 chakra points.</p></li><li>You can spend an additional 5 chakra when you cast a Mugen
      Clan Jutsu to roll an additional die from your <strong>Infinity</strong> clan feature and add it to the temporary
      hit points gained. This can only trigger once per turn.</li></ul>
    chat: ''
