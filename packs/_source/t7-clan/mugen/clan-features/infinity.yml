system:
  description:
    value: >-
      <p>Beginning at 3rd level, when you manipulate matter through Limitless, you have learned to intensify the
      Infinity around yourself to shield you from attack at the same time. When you cast a Mugen Clan Hijutsu, you roll
      1d4 + the Rank of the Jutsu (1 for D, 2 for C, 3 for B, 4 for A, 5 for S). You gain that many temporary hit points
      until the start of your next turn. At 15th level, this becomes 1d6 + the rank of the jutsu.</p>
