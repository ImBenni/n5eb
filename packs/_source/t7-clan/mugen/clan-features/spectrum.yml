name: Spectrum
type: feat
_id: HHvZkHLeIcrBQCEN
img: systems/n5eb/assets/content/clans/mugen.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, Limitless manifests in a variety of ways. Choose one of the following
      options:</p><ul><li><strong>Empty Void</strong>: While below half chakra, Mugen Hijutsu no longer cost chakra to
      maintain concentration on and deal an additional die of damage once per casting.</li><li><strong>Infinite
      Speed:</strong> You are able to quickly close the infinite space between you and a point you can see. When you
      would move, you may reduce your movement speed by half to instead teleport to an unoccupied space within your
      movement.</li><li><strong>Limitless Barrier:</strong> You are adept at increasing the space between you and a
      method of attack, using your bloodline ability as opposed to your physicality. When you would make a Dexterity
      saving throw, you may spend 5 Chakra and instead make a Constitution saving throw as a reaction. When you use your
      reaction in this way, you may immediately cast a Mugen Clan Jutsu with the casting time of 1 Reaction. Casting a
      Mugen Hijutsu in this way can only be done a number of times per long rest equal to your Intelligence
      Modifier.</li></ul><pre><code></code></pre><p> At 11th level, your Limitless begins to take on a definite form.
      Choose another of the above options, or one of the ones listed below:</p><ul><li><strong>Attractive Blue:</strong>
      When you would cast a Mugen Hijutsu without the Red keyword, increase the Save DC by 2.</li><li><strong>Boundless
      Crimson:</strong> When you cast a Mugen Hijutsu, you regain hit points equal to the rank of the Jutsu (D-Rank: 1,
      C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5). You cannot gain this benefit if the cost of the jutsu is reduced in
      any way.</li><li><strong>Endless Sky:</strong> When you cast a Mugen Hijutsu, you lower its chakra cost equal to
      the rank of the Jutsu (D-Rank: -1, C-Rank: -2, B-Rank: -3, A-Rank: -4, S-Rank: -5).</li><li><strong>Forceful
      Red:</strong> When you cast a Mugen Hijutsu without the Blue Keyword, once per casting you may deal an additional
      die of damage from the jutsu.</li><li><strong>Greyscale:</strong> You gain resistance to Force damage and can't be
      unwillingly moved.</li></ul><p>At 18th level, you may choose another of the above options, or gain a new one as
      shown below. Some of these require a previous feature in order to take them, as listed in the
      description.</p><ul><li><strong>Abyss of Null:</strong> When you would be targeted by a jutsu, you may use your
      reaction to dispel that jutsu as if by the Chakra Shatter genjutsu which automatically succeeds if possible. You
      may do this twice per long rest.</li><li><strong>Cosmic Lilac:</strong> When you cast a Mugen Hijutsu with the Red
      or Blue keywords, you may immediately cast a Mugen Hijutsu at least one rank lower that has the opposite keyword
      as a bonus action at the cost of the original jutsu cast. You cannot upcast either
      jutsu.</li><li><strong>Singularity:</strong> You are immune to Force damage and cannot have disadvantage on
      Ninjutsu Attacks. You must have Greyscale to select this feature.</li><li><strong>Invisible Blue:</strong> The
      force at which the universe attempts to correct the empty space of matter is astronomical, going at speeds faster
      than even light, causing the area to be imperceivable for a short moment. Increase the Save DC of Mugen Hijutsu
      with the Blue Keyword by 1. You must have Attractive Blue to select this feature.</li><li><strong>Unstoppable
      Red:</strong> The matter condensed into your Red jutsu has vastly increased, forming what could almost be
      considered a mini blackhole. When you deal damage with a Mugen Hijutsu with the Red Keyword, you may add your
      Proficiency Bonus to the damage once per turn. You must have Forceful Red to select this feature.</li></ul>
