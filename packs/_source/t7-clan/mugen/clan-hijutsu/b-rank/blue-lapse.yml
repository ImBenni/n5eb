system:
  description:
    value: >-
      <p>You send forth a large ball of blue to a space within range, which the sphere centers around in a 20-foot
      radius creating a dead zone of matter in the air. As you let this orb dissipate, matter rushes in, also causing
      creatures nearby to be dragged with it.</p><p>Creatures in the radius, or within 5 feet of the radius, must make a
      Strength Saving Throw. On a failed save, they are knocked prone, pulled 30 feet toward the center of the radius
      and take 8d10 Force damage. On a successful save, they take half damage and aren't pulled. If they hit an object,
      structure, or creature from this forced movement, they take 1d4 bludgeoning damage for every 5 feet travelled.</p>
