system:
  description:
    value: >-
      <p>You create a ball of crimson chakra and focus it to a fine point above your fingers, before launching it at a
      creature within range.</p><p>Make a ninjutsu attack against the target creature. On a hit, the target takes 9d8
      Force damage and is dazed until the end of their next turn. If you hit, the warbling ball explodes outward into a
      cone of mass trying to correct itself. Creatures in a 15-foot cone behind the target must make a Dexterity save.
      On a failed save, they take 3d8 Force damage and are pushed back 20 feet. On a success, they take half damage and
      aren't knocked back.</p>
