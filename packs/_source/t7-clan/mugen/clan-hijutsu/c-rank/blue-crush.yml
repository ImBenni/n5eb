system:
  description:
    value: >-
      <p>You surround a creature with nothing, leaving no matter around them. This causes the universe to quickly rush
      into that spot, crushing and disorientating the target. Choose a creature within range, they must make a
      Constitution Saving Throw. On a failed save, they take 6d8 Force damage and are Dazed until the end of their next
      turn. On a successful save, they take half damage and aren't dazed.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost by 3 and the damage by 2d8.</p>
