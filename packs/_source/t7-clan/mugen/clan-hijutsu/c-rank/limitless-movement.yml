name: Limitless Movement
type: spell
_id: 9tohC1W6BqOQQQ7N
img: systems/n5eb/assets/content/clans/mugen.webp
system:
  description:
    value: >-
      <p>You weave together two spots, where you are and a place within range, a small infinity of space between the
      two, and compress them. You must be able to see or are familiar with the chosen spot. Teleporting to that spot, as
      the sudden shift in space sends forth a shockwave of energy. Creatures of your choice within 10 feet of the spot
      you teleported to and from must make a Constitution Saving Throw, taking 6d4 Force damage on a fail, and half as
      much on a success.</p><p>You can bring along object as long as their weight doesn't exceed what you can carry. You
      can also teleport one willing creature of your size or smaller who is carrying gear up to it carrying capacity.
      The creature must be within 5 feet of you when you cast this jutsu, and there must be an unoccupied space within
      5-feet of your destination space for the creature to appear in; otherwise, the creature is left behind.</p><p>All
      attacks made against you, and the creature you brought with if you brought one, are made at disadvantage until the
      start of your next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank,
      increase the cost by 3 and the damage by 1d4. When cast at B-Rank, the Range becomes 500 feet. When cast at
      A-Rank, the range becomes 1 mile. When cast at S-Rank, the range becomes ten miles.</p>
