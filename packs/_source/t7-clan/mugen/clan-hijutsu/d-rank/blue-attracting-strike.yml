system:
  description:
    value: >-
      <p>You coat a fist in Limitless Blue and target a creature within range. The target creature must make a Strength
      Saving Throw, being pulled to a spot adjacent to you. You may then make a Taijutsu attack against that creature so
      long as they are within 5 feet of you. If they failed the Strength Save, you make the attack at advantage. On a
      hit, you deal your Unarmed Damage + 3d6 Force damage.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above D-Rank, increase the cost by 3 and the additional damage by 2d6. At B-Rank, this jutsu gains
      a range of 20 feet. At S-Rank, its range becomes 25 feet.</p>
