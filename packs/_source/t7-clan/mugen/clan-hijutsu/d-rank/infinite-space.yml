system:
  description:
    value: >-
      <p>You quickly utilize the infinite space between anything at all times to your defense, slowing the attack and
      possibly stopping it altogether. Increase your AC by 3 against the triggering attack and all other attacks this
      turn. You gain +1 AC against all attacks after this turn until the start of your next turn.</p><p>Additionally,
      you gain a +2 bonus to Strength, Dexterity, or Constitution saving throws until the start of your next turn. You
      then gain resistance to the triggering effect's damage type(s) until the start of your next turn.</p>
