system:
  description:
    value: >-
      <p>When you hit a creature with an attack or Mugen Hijutsu, you may cast this jutsu as a bonus action. When you do
      so, you intensify the infinity surrounding the creature. The creature must make a Constitution Saving Throw. On a
      failed save, they gain 1 rank of the Slowed condition as they find moving through this limitless space difficult
      and taxing. On a success, they instead just reduce their movement speed by 10 feet. Either effect lasts until the
      end of their next turn.</p>
    chat: ''
