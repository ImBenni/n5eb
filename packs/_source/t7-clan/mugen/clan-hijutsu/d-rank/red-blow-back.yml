system:
  description:
    value: >-
      <p>You create a small orb of bright red chakra, no larger than a golf ball, and shoot it at a creature in range.
      Make a Ranged Ninjutsu attack against the creature, dealing 3d8 Force damage on a hit. The target must then also
      make a Strength Saving Throw or be pushed directly back 15 feet. If they fail this Strength Save, the next attack
      to hit them also deals an additional die of damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above D-Rank, increase the cost by 3 and the damage by 2d8 and the amount pushed back by 5 feet.</p>
