system:
  description:
    value: >-
      <p>You are adept at increasing the space between you and a method of attack, using your bloodline ability as
      opposed to your physicality. When you would make a Dexterity saving throw, you may spend 5 Chakra and instead make
      a Constitution saving throw as a reaction. When you use your reaction in this way, you may immediately cast a
      Mugen Clan Jutsu with the casting time of 1 Reaction. Casting a Mugen Hijutsu in this way can only be done a
      number of times per long rest equal to your Intelligence Modifier.</p>
