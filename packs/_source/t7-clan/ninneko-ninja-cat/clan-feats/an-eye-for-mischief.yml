system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Ninneko Clan, level 4+ <br />Your eyes
      are exceptionally cute, granting you a pleasant persona to front your foes with. You gain the following
      benefits;</p><ul><li>Increase your Charisma score by 1, to a max of 20.</li><li>You can use Charisma instead of
      Wisdom as your jutsu casting ability for Ninneko Genjutsu.</li><li>You learn the <em><strong>Cat Eye
      Trick</strong></em> Ninneko Genjutsu. This jutsu now inflicts the Dazzled condition on any failed save in addition
      to the jutsu's normal effects.</li><li>When you cast a Ninneko Genjutsu, you can cause one target that failed its
      saving throw to gain one additional rank of Charmed which lasts until the end of that creature's next turn. A
      creature affected by this cannot be affected again for the next minute.</li></ul>
