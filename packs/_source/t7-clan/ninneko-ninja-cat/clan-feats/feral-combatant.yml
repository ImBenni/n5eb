system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Ninneko Clan, level 4+ <br />Your true
      ferocity is unleashed through your fiery claws. You gain the following benefits;</p><ul><li>Increase your Strength
      or Dexterity score by 1, to a max of 20.</li><li>Once per turn, when you cast a Ninneko Taijutsu that inflicts a
      condition, you can cause it to inflict an additional rank of that condition. This additional rank lasts until the
      end of the target's next turn.</li><li><p>You gain an alternative use of your <em><strong>Zoomies</strong></em>
      feature</p><ul><li><strong>Pounce</strong> You can forgo the extra speed granted by this feature to pounce on an
      enemy. When you move at least 10 feet in a straight line toward a creature and end your movement within 5 feet of
      it, you can attempt to pounce on the target. The creature must succeed on a Strength saving throw against your
      Ninneko Taijutsu save DC or be knocked prone. You can't use this feature again until you have moved 0 feet on one
      of your turns.</li></ul></li></ul>
