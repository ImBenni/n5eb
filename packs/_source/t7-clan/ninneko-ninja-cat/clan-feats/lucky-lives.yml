system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Ninneko Clan, level 8+ <br />Your
      lifeforce is tenacious and your luck is immeasurable! You gain the following benefits;</p><ul><li>You halve the
      additional damage that would be dealt as a result of a critical hit against you.</li><li>You gain an additional
      use of your <em><strong>Nine Lives</strong></em> clan feature.</li><li>You may spend a use of this feature as a
      reaction when you fail a saving throw against a hostile effect to instead succeed. When you succeed a saving throw
      this way, you are not subject to any further of its effects.</li></ul>
    chat: ''
