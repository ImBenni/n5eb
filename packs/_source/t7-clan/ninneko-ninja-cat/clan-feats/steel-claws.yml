system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Ninneko Clan, level 8+ <br />Your claws
      are akin to steel blades You gain the following benefits;</p><ul><li>Increase your Strength or Dexterity score by
      1, to a max of 20.</li><li>The base damage die of your claws becomes 2d6 slashing damage, regardless of your
      level.</li><li>Your claws gain the <em><strong>Deadly</strong></em> and <em><strong>Disarm</strong></em>
      properties.</li><li><p>Unarmed strikes using your claws can be used in place of a 'slashing' weapon for Bukijutsu
      that would require it.</p></li></ul>
