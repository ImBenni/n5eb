folder: gKZgQjVEfnl4OvOX
name: Feline Nature
type: feat
_id: K6PGhaJHXdBq1eZW
img: systems/n5eb/assets/content/clans/ninneko.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, you possess many unique features, quirks, and abilities that define you as a shinobi...
      <em>who's also a cat.</em></p><ul><li><em><strong>Claws:</strong></em> Your sharp claws serve as natural weapons
      with the Hidden and Unarmed properties, which you can use in place of unarmed attacks. These claws deal 1d6
      slashing damage, and you can use Dexterity for their attack and damage rolls, as well as for Ninneko Clan Taijutsu
      attack rolls and save DC calculations. This damage increases to 1d8 at 7th level, 1d10 at 11th level, and 1d12 at
      18th level.</li><li><em><strong>Deft:</strong></em> Due to your small size, you can squeeze through spaces
      considered to be one size category smaller than you without difficulty, and you can move through the spaces of
      creatures one size category larger than you.</li><li><em><strong>Grace:</strong></em> You are immune to damage
      from falling 30 feet or less if you aren't incapacitated, and you have resistance to any fall damage taken beyond
      30 feet. Additionally, standing up from prone costs you only 5 feet of movement.</li></ul>
    chat: ''
