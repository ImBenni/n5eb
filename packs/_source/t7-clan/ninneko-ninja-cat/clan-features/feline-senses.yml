system:
  description:
    value: >-
      <p>Beginning at 7th level, you've honed your acute feline senses with the aid of chakra. When making Perception
      checks that depend on hearing or smell, you add half your level to the roll. Your sense of smell and hearing also
      gain the benefits of chakra sense within a 60-foot range. Additionally, you have advantage on <em>Read the
      Enemy</em> checks against creatures detected within this range.</p>
