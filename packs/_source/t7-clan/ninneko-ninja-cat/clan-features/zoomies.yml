system:
  description:
    value: >-
      <p>Starting at 3rd level, as a ninja cat you've honed your reflexes and quickness to grant you bursts of speed.
      When you move on your turn, you can double your speed until the end of the turn. Once you use this trait, you
      can't use it again until you move 0 feet on one of your turns.</p><p>Starting at 11th level, this feature can be
      used twice before you must move 0 feet.</p><p>At 15th level, while benefitting from this feature your movement
      doesn't provoke opportunity attacks, and you have advantage on Acrobatics checks and Dexterity saving throws until
      the end of the turn.</p>
