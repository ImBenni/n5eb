folder: FLtYxcOBmQPNyTKg
name: Purrrgatory
type: spell
_id: z6IAZaaYKBXyTsKB
img: systems/n5eb/assets/content/clans/ninneko.webp
system:
  description:
    value: >-
      <p>You trap a creature in range within a perceived illusion of a cat-themed purgatory of your design. For the
      duration of the genjutsu, you alter the appearance of the environment surrounding the target.</p><p>Select a
      creature in range. That target must make a Wisdom saving throw.</p><p><strong>Success:</strong> The creature
      breaks the illusion and this jutsu ends.</p><p><strong>Failure:</strong> The affected creature is trapped within a
      perceived illusion of a cat-themed purgatory of your design. For the duration of the genjutsu, you alter the
      appearance of the environment surrounding the target. The target becomes otherwise blind to their surroundings. In
      the illusory area created by the jutsu, three Shadow Cats appear, occupying a space within 60 feet of the target.
      Refer to the <strong>Shadow Cat</strong> stat block. On your turn, you can use a bonus action to command each
      Shadow Cat to move up to 60 feet and make a single attack.</p><p><strong>Critical Failure:</strong> In addition to
      <em><strong>Failure</strong></em>, an affected creature also gains 1 rank of Fear and is stunned until the
      beginning of its next turn.</p><p>At the beginning of your turn while concentrating on this jutsu, you can choose
      to spend the chakra cost once more to create three additional Shadow Cats to a maximum of six (6). An affected
      target can make a Wisdom saving throw at the end of each of its turns. On a successful save it breaks free and the
      effects of the jutsu end on that target. If a target breaks out of this jutsu early, you can target another
      creature within range as an action.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above A-rank, increase the cost of this jutsu by 3 and the number of creatures you can affect at one time by
      1.</p>
