name: Cat Call
type: spell
_id: 5y5mxtpwCnS7DTyl
img: systems/n5eb/assets/content/clans/ninneko.webp
system:
  description:
    value: >-
      <p>Using a combination of wit, charm, and looks empowered by illusive genjutsu, you sway a creature to your side.
      When you cast this jutsu, choose one creature within range that can see and hear you. The creature must make a
      Wisdom saving throw:</p><p><strong>Success:</strong> The creature is unaffected.</p><p><strong>Failure:</strong>
      The affected creature gains two ranks of Charmed until this jutsu ends. While the creature is charmed this way, as
      a bonus action on subsequent turns, you can command the creature to perform any task you ask of it in a friendly
      manner, to the best of its ability. If the task might cause harm to the creature, or if it conflicts with the
      creature's normal activities and desires, the target can make another Wisdom saving throw to try to end the
      effect. If the task would result in physical harm or death obvious to the creature, the jutsu
      ends.</p><p><strong>Critical Failure:</strong> The affected creature gains the same effects as Failure except now
      has disadvantage on its Wisdom saving throw to end the jutsu on itself.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the number of creatures
      you can target with this jutsu by 1.</p>
