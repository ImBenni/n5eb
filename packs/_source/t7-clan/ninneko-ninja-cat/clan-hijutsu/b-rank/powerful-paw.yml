system:
  description:
    value: >-
      <p>You blitz toward an enemy with feline ferocity. Make a single melee taijutsu attack, dealing your unarmed
      damage + 6d6 bludgeoning damage against the target on a hit.</p><p>This jutsu gains a +1 bonus to its attack roll
      and an extra d6 damage die for every 10 feet traveled in the target's direction this turn before making the
      Taijutsu attack (to a max of 60 feet).</p><p>On a hit, the target also must make a Constitution saving throw or
      become Dazed for 1 minute. While Dazed this way, it cannot speak, only stuttering and slurring its words in
      cat-like meows.</p><p>If this jutsu is used as a Finisher, the target must make a Constitution saving throw. On a
      failure, it becomes Dazed for 1 minute, cannot move, and is incapacitated until the end of its next
      turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3, and any d6 damage rolled from this jutsu increases its damage die size by 1.</p>
