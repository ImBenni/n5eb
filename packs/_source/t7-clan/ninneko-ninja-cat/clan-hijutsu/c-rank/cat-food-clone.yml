img: systems/n5eb/assets/content/clans/ninneko.webp
system:
  description:
    value: >-
      <p>You create an identical clone of yourself made of cat food. The rules for this clone are the same as a shadow
      clone, except it has no chakra. The clone can cast any Ninneko clan jutsu with the Ninjutsu or Taijutsu keyword of
      C-Rank or lower you know twice without expending chakra. After the second casting, the clone disappears. You can
      only have one Cat Food Clone at a time. Creating another clone causes an existing clone to disappear.</p><p>As an
      action, you can see through your clone's eyes and hear what it hears until the start of your next turn. During
      this time, you are deaf and blind with regard to your own senses. As a bonus action on your turn, or a reaction
      before taking damage or making a saving throw, you can swap places with your clone if you are within 30 feet of
      it.</p>
