system:
  description:
    value: >-
      <p>You spring into the air with a flurry of swipes, unleashing your feline fury. Make three melee taijutsu attacks
      against any target(s) within range. On each hit, deal your unarmed damage + 1d4 slashing damage. If at least two
      attacks hit a single target, it gains one rank of bleeding. If all three attacks hit a single target, it gains one
      rank of lacerated.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu Finisher
      regardless of range, once per turn, using either an Action or Bonus Action, ignoring its listed casting
      time.</p><p>At Higher Ranks: For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3
      and the number of attacks by 1.</p>
