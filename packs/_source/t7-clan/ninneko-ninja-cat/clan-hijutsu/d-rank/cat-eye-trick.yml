system:
  description:
    value: >-
      <p>One creature in range that can see you is selected as the target of
      this genjutsu. You appear as an unassuming, harmlessly adorable cat to a
      creature under this genjutsu. The target must make a Wisdom saving throw,
      and does so with advantage if you or your allies are fighting it.
      Creatures that fail against this jutsu can repeat the save at the end of
      each of its turns, ending the effects on itself on a
      success.</p><ul><li><strong>Critical Success</strong>: This jutsu ends on
      the affected creature, removing all ranks of charm inflicted by this jutsu
      and is immune to the effects of this jutsu for 1
      hour.</li><li><strong>Success</strong>: Affected creature does not gain a
      rank of charmed.</li><li><strong>Failure</strong>: Affected creature gains
      1 rank of charmed against the caster until this jutsu
      ends.</li><li><strong>Critical Failure</strong>: Affected creature gains 2
      ranks of charmed against the caster until this jutsu ends and has its
      movement reduced to 0 as they are overwhelmed with
      cuteness.</li></ul><p><strong>At Higher Ranks</strong>: For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the
      number of creatures you can target by 1.</p>
