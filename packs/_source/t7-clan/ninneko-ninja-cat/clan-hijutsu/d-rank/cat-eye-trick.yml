    description: >-
      <p><strong>Max Ranks</strong>: 5</p><hr /><ul><li><p>A
      <strong>Charmed</strong> creature is partially infatuated with a
      particular target.</p></li><li><p>A <strong>Charmed</strong> creature
      increases its attitude to you, by 1 rank, for each rank of Charmed it
      has.</p></li><li><p>A <strong>Charmed</strong> creatures suffers a -2
      penalty to Intelligence &amp; Wisdom based skill checks made against its
      infatuation for each rank it has.</p></li><li><p>A
      <strong>Charmed</strong> creature cannot take hostile actions towards the
      source of its infatuations. If they would suffer a hostile effect or
      damage from the source of its infatuations or one of its infatuations
      allies, they remove all ranks of this condition.</p></li></ul>
