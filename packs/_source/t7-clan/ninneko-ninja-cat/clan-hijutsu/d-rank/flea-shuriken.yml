img: systems/n5eb/assets/content/clans/ninneko.webp
system:
  description:
    value: >-
      <p>As a ninja cat you can stretch out your body, rolling the joints of your neck to launch chakra-enhanced fleas
      at a target in range to inflict extreme irritation. Make a ranged taijutsu attack against a single creature in
      range. On a hit, a target takes 3d6 piercing damage, then must succeed a Constitution saving throw or become
      Confused on a failed save, falling prone and unable to stand. At the beginning of each of its turns the creature
      takes 2d4 piercing damage.</p><p>At the start of each of its turns, or if another creature uses the help action on
      it, the affected target can reattempt the save, ending the effects on itself on a success.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and increase
      the damage dealt by 1d6 and the number of targets hit by 1.</p>
