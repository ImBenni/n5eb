system:
  description:
    value: >-
      <div class="flex max-w-full flex-col flex-grow"><div data-message-author-role="assistant"
      data-message-id="77edc71d-4ff5-4983-aa3f-1f6afc53a2f9" dir="auto" class="min-h-8 text-message flex w-full flex-col
      items-end gap-2 whitespace-normal break-words text-start [.text-message+&amp;]:mt-5"
      data-message-model-slug="gpt-4o"><div class="flex w-full flex-col gap-1 empty:hidden first:pt-[3px]"><div
      class="markdown prose w-full break-words dark:prose-invert dark"><p>You mischievously steal away with your
      opponent's items in the cover of your attack. Make a melee taijutsu attack dealing your unarmed damage + 2d8.
      </p><p>On a hit, you can attempt to disarm or steal one item on the target's body. Make a Sleight of Hand check
      contested against the target's AC. On a success, you take the chosen item. If the target's passive perception is
      lower than your check, it's unaware the item has been stolen.</p><p>At Higher Ranks: For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage dealt by 2d8. For every two ranks this
      jutsu is cast above D-Rank, you can attempt to take an additional item, making a separate check per
      item.</p></div></div></div></div><div class="mb-2 flex gap-3 empty:hidden -ml-2"><div class="items-center
      justify-start rounded-xl p-1 flex"><div class="flex items-center"><p></p></div></div></div>
