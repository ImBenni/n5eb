system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Otogi Clan <br />You've trained your
      acute hearing to superhuman levels. You gain the following benefits;</p><ul><li>Increase your Wisdom score by 1,
      to a max of 20.</li><li>You have tremorsense in addition to blindsight at the same distance, and you increase
      those distances by 15 feet.</li><li>When you would you perceive a creature with either of these senses, it cannot
      gain advantage on attack rolls against you. Similarly, you cannot have disadvantage on attack rolls against
      it.</li></ul>
    chat: ''
