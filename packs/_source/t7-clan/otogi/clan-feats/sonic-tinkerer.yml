system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Otogi Clan, level 4+ <br />You are
      ingenious in your craftsmenship of sound-based ninja tools on the fly. You gain the following
      benefits;</p><ul><li>Increase your Intelligence score by 1, to a max of 20.</li><li>You gain proficiency in
      Crafting. If you are already proficient, you instead gain expertise.</li><li>When crafting a tool from the
      <em>Sonic Gadget</em> clan feature, you can do so during short rest now.</li><li>You can craft one additional
      Sonic Gadget which does not count against your maximum allowed. This extra gadget cannot gain the function of its
      Charge ability.</li><li>You may designate any number of allies proficient in Crafting to use your Sonic Gadget
      when you craft one following a rest.</li></ul>
