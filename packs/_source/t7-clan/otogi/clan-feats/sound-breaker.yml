system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Otogi Clan, level 12+ <br />Your mastery
      over Sound Release becomes fully realized. You gain the following benefits;</p><ul><li>Increase your Intelligence
      score by 1, to a max of 20.</li><li>When you cast a jutsu benefiting from the <em>Sound Release</em> clan feature,
      if it inflicts a condition, you can change that condition to become equal ranks of concussed, bleeding, deafened.
      If the jutsu requires a saving throw as part of gaining this condition, that saving throw becomes a constitution
      saving throw.</li><li>Creatures with enhanced or otherwise sensative hearing (ex: advantage on hearing checks,
      jutsu which modify hearing, etc.) now suffer a -1d4 to jutsu you cast that benefit from your <em>Sound
      Release</em> clan feature which require a saving throw.</li></ul>
    chat: ''
