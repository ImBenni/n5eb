img: systems/n5eb/assets/content/clans/otogi.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, your precise hearing allows you to pinpoint an enemy's exact location. You have 60 feet
      of blindsight while out of combat and half of that, while in combat, while you aren't deafened.</p><p>Starting at
      3rd level, your passive perception cannot be lowered except when unconscious. Additionally, as a bonus action, you
      can Search or make a perception check.</p><p>At 11th level your blindsight is always at 60 feet, and you are
      considered to have expertise when making Perception checks while relying on hearing. If you already have <br
      />expertise then you instead add a 1d4 to the result.</p>
