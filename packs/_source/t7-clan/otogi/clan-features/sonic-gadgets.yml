name: Sonic Gadgets
type: feat
_id: k1GwBY0D3NwS0cdg
img: systems/n5eb/assets/content/clans/otogi.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd Level, not only are the Otogi clan perceptive shinobi, but they make for devious tinkerers as
      well. When you would benefit from a long rest, you can craft a single ninja tool from the <em><strong>Sonic
      Gadgets</strong></em> table shown later. These certain ninja tools may serve as a component for your Otogi Clan
      Hijutsu. You can only have one Sonic Gadget crafted at a time. If you were to craft a different gadget, the
      previous one is rendered inert. Only you can activate or gain the benefit of a Sonic Gadget.</p><p>All Sonic
      Gadget abilities share a pool of charges equal to your proficiency bonus, which replenishes after a long rest. If
      a gadget requires a saving throw to be made, you can use either your Ninjutsu or Genjutsu save DC (your
      choice).</p><p>At 11th level, when you would benefit from a long rest, you can now craft up to two gadgets. Also,
      once per long rest, over the course of a short rest you can swap out a gadget of your choice with another
      available to you. At 18th level, you can craft up to three gadgets per long rest.</p>
