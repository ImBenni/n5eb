name: Sound Release
type: feat
_id: gpRDvDuPvXIskSTu
img: systems/n5eb/assets/content/clans/otogi.webp
system:
  description:
    value: >-
      <p>The Otogi clan are notoriously known for their deadly and unique practice of Sound Release, a lethal variant of
      Wind Release that deafens and disorients its victims. Beginning at 7th level, when casting a Ninjutsu with the
      Wind Release keyword, or a Genjutsu with the Auditory keyword, you can change the damage type to force, and attack
      rolls from jutsu you cast this way ignore two steps of cover (Quarter cover&gt;Half cover&gt;Three-quarters
      cover&gt;Full cover), and jutsu with the Auditory keyword you cast this way can affect creatures regardless if
      they're deafened or not.</p><p>Also at 7th level, your Sound release becomes deadlier with each affliction. When
      you cast a Ninjutsu with the Wind Release Keyword, or a Genjutsu with the Auditory keyword, targeting a creature
      suffering from either the Concussed, Dazed, Bleeding, or Deafened conditions you inflicted, that jutsu increases
      its critical threat range by +1 for each of the aforementioned conditions ( to a max of +3).</p><p>Beginning at
      15th level, once per turn, when you would deal force damage, you also inflict 2 ranks of Concussed.</p><p></p>
