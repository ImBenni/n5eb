folder: 1zBbnmkkGwaku5uR
name: Sound Release Whisper/Bang
type: spell
_id: wHqEI9YphvaIfYSq
img: systems/n5eb/assets/content/clans/otogi.webp
system:
  description:
    value: >-
      <p>When you cast this jutsu, you choose whether to <em>Whisper</em> or to <em>Bang</em>, either option having its
      own effect:</p><p><strong>Whisper.</strong> You create a low tone frequency which barely registers to most
      creatures. You must concentrate on this jutsu and it can last for up to 1 minute. This jutsu gains the Unaware
      Keyword. Each creature within 300 feet of you that can hear you must make on a Constitution saving throw. Choose
      two of the following effects. Each creature that fails suffers the chosen effects:</p><ul><li>Gains two ranks of
      concussed, while concussed it also has one rank of charm or fear against you (your choice).</li><li>Gains two
      ranks of bleeding, while bleeding it also has one rank of charm or fear against you (your choice).</li><li>Takes
      3d10 force damage at the start of each of its turns for the next minute.</li><li><p>Becomes deafened, while
      deafened you are considered invisible to that creature.</p><p>On a successful save, a creature only suffers one of
      these effects.</p></li></ul><p><strong>Bang.</strong> You gather your chakra into a swirling mass of resonating
      wind that grows more compressed and vibrating before it explodes in a massive boom. Each creature other than you
      within 300 feet of you must make a Constitution saving throw. On a failed save, a creature takes 10d10 force
      damage and deafened and dazed for 1 minute. On a successful save, a creature takes half damage and is only
      deafened for 1 minute. Creatures that fail this save by 5 or more also become concussed for 1 minute, suffering 1
      rank of bleeding for each rank of concussed it has.</p><p>The ground within this radius becomes difficult
      terrain.</p>
