system:
  description:
    value: >-
      <p>You weave a spiral of vibrating wind, creating a 20-foot sphere centered on a point within range. Creatures
      inside the sphere are deafened to all sounds outside of the sphere, and vice versa, creatures outside the sphere
      are deafened to all sounds within the sphere. A creature that attempts to move through the space of the sphere
      must make a Constitution saving throw, taking 6d6 force damage, is knocked back 10 feet, gains two ranks of
      concussed, and be unable to move through it on a failed save. On a successful save, it takes half as much damage
      and can move through the sphere as if it were difficult terrain.</p><p>Sound is hypnotically amplified while
      inside the sphere which causes creatures to take additional damage when they would take wind, psychic, damage dice
      per equal to the rank of the jutsu damaging them (D-Rank: 1, C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank:
      5).</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3, increase the damage by 2d6 and the size of the sphere by 5 feet.</p>
