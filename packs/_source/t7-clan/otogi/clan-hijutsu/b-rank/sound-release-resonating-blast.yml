img: systems/n5eb/assets/content/clans/otogi.webp
system:
  description:
    value: >-
      <p>You compress air into a vibrating wave of sound as your send it roaring in a 100-foot line that is 10 feet
      wide. Each creature within the line must make a Constitution saving throw. On a failed save a target takes 6d10
      force damage and becomes concussed and bleeding, and is pushed away from the line. A creature pushed away from the
      line is knocked back 20 feet on a failed save, but if it failed its save by 10 or more, it is instead knocked back
      the entire 100-foot length of the line. This jutsu deals double damage to objects and structures. Objects and
      structures reduced to 0 hit points by this jutsu are destroyed.</p><p>In addition, unsecured objects that are
      completely within the area of effect are automatically pushed the full 100 feet away from you by the jutsu's
      effect, and the blast emits a concussive boom audible out to 300 feet.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, increase the damage by 2d10.</p>
