system:
  description:
    value: >-
      <p>You must have cast Slicing Soundwaves this turn as an action. You boost the cutting power of your soundwaves
      with a concussive boom. Double the range of the jutsu, increase the critical threat range of each ranged Ninjutsu
      attack you make with Slicing Soundwaves by +1 (to a maximum of +3), increase the damage die increases by 1 step,
      and on a critical hit the target becomes lacerated.</p><p>In addition, unsecured objects that are within 5 feet of
      the target are automatically pushed 10 feet away from the target by the jutsu's effect, and the attack emits a
      concussive boom audible out to 300 feet.</p>
