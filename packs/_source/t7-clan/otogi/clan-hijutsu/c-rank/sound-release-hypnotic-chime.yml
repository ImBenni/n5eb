system:
  description:
    value: >-
      <p>You utilize your wind chakra to produce a droning sound within a 20-foot sphere centered on point you can see
      in range. The sound it makes distracts and disorients creatures within its space. When you cast this jutsu, and
      whenever a creature enters the sphere for the first time on a turn, it must make a Wisdom saving throw. Creatures
      that fail against this jutsu can repeat the save at the end of each of its turns, ending the effects on itself on
      a success.</p><p><strong>Success:</strong> Affected target does not become
      deafened.</p><p><strong>Failure:</strong> Affected targets take 2d6 force damage and become deafened as all it
      hears is the chime and you become duplicated by the soundwaves it produces, causing the target to have
      disadvantage on attacks made against you while it remains deafened.</p><p><strong>Critical Failure:</strong> Same
      as failure but affected targets now are dazed for as long as they remain deafened.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, increase the
      damage by 2d6 and the size of the sphere by 5 feet.</p>
