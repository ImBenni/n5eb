name: Sound Release Vibrating Echo Tremor
type: spell
_id: 6EOk04yUYLBdFlEz
img: systems/n5eb/assets/content/clans/otogi.webp
system:
  description:
    value: >-
      <p>You gather vibrating chakra into your fists or feet, slamming it down to create a devestating effect. Make a
      melee ninjutsu attack. On a hit, you deal 5d8 force damage and the target becomes concussed and dazed for 1
      minute. The target can make a Constitution saving throw at the end of each of its turns to end this effect on
      itself with a success.</p><p>The vibrating force of the attack ripples out from the target, causing the ground
      within 30-feet of it to become difficult terrain and all creatures except you within the radius must make a
      Constitution saving throw. On a failed save they take half the force damage and gain one rank of concussed. On a
      success, the take no effect.</p><p>In addition, unsecured objects that are completely within the area of effect
      are automatically pushed 30 feet away from its center by the jutsu's effect, and the blast emits a concussive boom
      audible out to 300 feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3, increase the damage by 1d8 and the number of ranks of concussed inflicted by
      +1. If cast to A-Rank or higher, you can make 1 additional melee ninjutsu attack.</p>
