system:
  description:
    value: >-
      <p>You shroud yourself in a static field of vibrations that absorbs incoming attacks and disorients enemies. You
      create a 10-foot sphere of interfering vibrations centered on you that reduces the damage you would receive by
      3d10, except wind damage. If this damage is either bludgeoning or earth, reduce it by twice as much.</p><p>Then
      until the beginning of your next turn, all damage except wind dealt in this sphere is reduced by -3. Creatures
      that enter the sphere for the first time on a turn or begin their turn within it must succeed a Wisdom saving
      throw or gain 1 rank of concussed until their next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and increase the damage reduction by 1d10.</p>
