system:
  description:
    value: >-
      <p>You hurl a spherical orb of compressed, vibrating wind at a target in range. On a hit, you deal 4d4 force
      damage and the target must succeed a Constitution saving throw or gain 1 rank of concussed until the end of its
      next turn. When you roll a 10 on at least two damage dice, the target also becomes deafened for as long as it
      remains concussed.</p><p>On a failed save, the target takes another 2d4 force damage at the beginning of its next
      turn as the vibrations continue to shake it.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3, also increase the damage dealt by 2d4, and the repeating
      damage by 1d4. When you cast this jutsu at B-Rank or above, the target also becomes dazed on a failed save.</p>
