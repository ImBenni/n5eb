system:
  description:
    value: >-
      <p>This is an advanced version of the 'Slicing Airwaves' jutsu. You channel compressed air through both of your
      arms as you knead chakra into it, causing that air to vibrate intensely. Make two ranged ninjutsu attacks against
      up to two targets.</p><p>On each hit, you deal 2d8 force damage, and the target gains one rank of
      bleeding.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3, also increase the damage dealt from each attack by 1d8 and the ranks of bleeding by
      +1.</p>
