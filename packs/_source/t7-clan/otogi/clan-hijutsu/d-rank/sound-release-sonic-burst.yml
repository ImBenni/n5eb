system:
  description:
    value: >-
      <p>You gather your chakra forming it into soundwaves at the palm of your hands, building it up into a concussive
      boom. All creatures 20-foot cone originating from you on you must make a Constitution saving throw. On a failed
      save, a creature takes 4d6 force damage, and is pushed back 10 feet and becomes deafened for the next minute,
      repeating the save at the end of each of its turns. On a successful save, a creature takes half damage.</p><p>In
      addition, unsecured objects that are completely within the area of effect are automatically pushed 10 feet away
      from you by the jutsu's effect, and the blast emits a concussive boom audible out to 300 feet.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, also
      increase the damage dealt by 1d6 and cone's area increases by 5 feet. When you cast this jutsu at B-Rank or above,
      creatures that fail their saving throw are also knocked prone.</p>
