system:
  description:
    value: >-
      <p>(You must have <em><strong>Latent Sound Release I</strong></em> ) Beginning at 7th level, you develop the
      variation of Wind Release known as Sound Release. When casting a Ninjutsu with the Wind Release Keyword, or
      Genjutsu with the Auditory keyword, jutsu with the Auditory keyword you cast this way can affect creatures
      regardless if they're deafened or not. When you cast a Ninjutsu with the Wind Release Keyword, or a Genjutsu with
      the Auditory keyword, targeting a creature suffering from either the Concussed, Dazed, Bleeding, or Deafened
      conditions you inflicted, that jutsu increases its critical threat range by +1.</p>
