  description:
    value: >-
      <h3 id="perfect-pitch">Perfect Pitch</h3><p>The Otogi are a clan whose members are most often described by their
      methodical precision and callus disposition. Of course this is not the case for all its members. However, one
      thing that stands true for every Otogi is they have a rhyme and reason for what they do; whether that motive be
      good or bad, they are people that stick to a plan.</p><h4 id="otogi-traits">Otogi Traits</h4><hr
      /><ul><li><strong>Ability Score Increase:</strong> +2 Wis, +1 Dex or Int.</li><li><strong>Speed:</strong> Your
      base walking speed is 30 feet.</li><li><strong>Skill Proficiencies:</strong> Perception,
      Crafting.</li><li><strong>Sound Release Affinity:</strong> You begin with Wind Release Affinity.</li></ul>
