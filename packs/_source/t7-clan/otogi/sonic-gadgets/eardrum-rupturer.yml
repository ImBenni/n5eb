system:
  description:
    value: >-
      <p>You outfit your body with a device of your own description, making your soundwaves more debilitating. You may
      use this gadget as a ninja tool component with Otogi hijutsu you cast that deals damage. When you do so, that
      jutsu deals an extra 2 force damage. As a reaction, when you deal force damage to a creature using an Otogi
      hijutsu, you can spend a charge to force one of the affected creatures to make a Constitution saving throw. The
      affected creature gains one of the following conditions of your choice on a failure, based on how much force
      damage it took; at least 10: Concussed until the end of its next turn, at least 20: Bleeding until the end of its
      next turn, at least 30: Dazed until the end of its next turn.</p>
