img: systems/n5eb/assets/content/clans/otogi.webp
system:
  description:
    value: >-
      <p>You're able to weave your unavoidable sound into your strikes. When you craft this gadget, it becomes bound to
      a melee weapon you are holding which consumes a Seal Slot. Damage rolls you make with the weapon deal an extra 1d4
      force damage, and when you make an attack roll and miss, the target still takes the 1d4 force damage. When you
      damage a creature with this weapon, you can spend a charge to cause the target to make a Constitution saving
      throw, gaining 1 rank of concussed and becoming deafened until the end of its next turn on a failure.</p>
