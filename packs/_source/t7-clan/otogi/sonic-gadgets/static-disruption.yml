system:
  description:
    value: >-
      <p>You craft a device onto your body which exudes a field of numbing static frequencies. When a creature would
      make a Chakra Control check to maintain concentration after taking force damage from you, it suffers a -1d4
      penalty to its saving throw and takes an additional amount of force damage equal to your proficiency bonus. As a
      bonus action, you can spend a charge to amplify the potency of this field until the end of the current turn,
      causing creatures you deal force damage against to be unable to concentrate on more than one jutsu at a time until
      the end of their next turn.</p>
