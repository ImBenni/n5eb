system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Ouyoku Clan, Level 12+, Immaterial Sight 1
      and Immaterial Sight 2 Junsugan features <br />Your ability to see the unseen is beyond even your other clan
      members' abilities. You gain the following benefits:</p><ul><li>Increase your Wisdom Score by 1.</li><li>When you
      use your Immaterial Sight, your blindsight range is increased to 30 feet without reducing your movement speed to
      0. If you do still reduce your movement speed to 0, your blindsight range is increased to 90 feet.</li><li>Your
      passive Perception while using Immaterial Sight is increased by 10.</li></ul><p></p>
