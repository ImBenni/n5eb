system:
  description:
    value: >-
      <p><strong>Enhanced Sight:</strong> Starting at 1st level, your sensory abilities have granted you an enhanced
      form of vision. Different Ouyoku have manifested different forms of this sight at different times, so you can
      choose one of the following forms of enhanced sight:</p><ul><li><em><strong>Magnified Sight:</strong></em> You can
      see up to 1 mile away with no difficulty, able to discern even fine details as though looking at something no more
      than 100 feet away from you.</li><li><em><strong>Bright Sight:</strong></em> Dim light doesn't impose disadvantage
      on your Wisdom (Perception) checks, and you can make out vague shapes and dim colors even in pitch
      darkness.</li><li><em><strong>Nature Sight:</strong></em> Creatures you can see give off a faint glow that tells
      you what nature releases they have.</li></ul><p>You can choose a second manifestation at 3rd level, and the final
      one at 7th level.</p>
