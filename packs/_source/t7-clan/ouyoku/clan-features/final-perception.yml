system:
  description:
    value: >-
      <p>Beginning at 18th level, your sight can be shared even beyond death. When you fail your third death saving
      throw, or would be killed outright, you momentarily wake from the unconscious condition and can choose a creature
      you can see.</p><p>You send that creature your memories, any piece of information you know. That creature also
      gains up to two Ouyoku clan Hijutsu that you know of B-Rank or lower. Once you use this feature, you cannot do so
      again.</p>
