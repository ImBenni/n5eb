name: Junsugan
type: feat
_id: zQIdGmW9R88bqu58
img: systems/n5eb/assets/content/clans/ouyoku.webp
system:
  description:
    value: >-
      <div class="page phb" id="p118"><div class="columnWrapper"><p>Starting at 3rd level, you've become able to unlock
      the Ouyoku clan's Dojutsu, the Junsugan. As a bonus action, you can spend 5 chakra to activate this glowing blue,
      far-seeing eye for the next 10 minutes.</p><p>While active, you gain chakra sight to a range of 30 feet,
      darkvision to a range of 60 feet, and one of the following features, choosing a second one at 7th
      level:</p><ul><li><em><strong>Far Sight 1:</strong></em> As a bonus action, you can choose a point you can see
      within 30 feet of you. That point becomes your new visual point of origin until the end of the current turn, being
      able to see as normal from the chosen point, but becoming blind to your own surroundings. When you would cast a
      jutsu without the Chakra Seals component while this feature is active, you can choose to cast it from that
      point.</li><li><em><strong>Distant Vision:</strong></em> Your visual ranges are all doubled, as are the normal and
      long ranges of ranged weapons. Additionally, any sensory jutsu's range or effective area is doubled, and any jutsu
      that requires you to make a ranged attack has its range increased by 10 feet.</li><li><em><strong>Immaterial Sight
      1:</strong></em> As a bonus action, you can reduce your movement speed to 0. If done in this way, you can still
      cast jutsu that have the Mobility component (as long as there is no other effect preventing your movement), and
      you gain blindsight to a range of 10 feet. This lasts until the start of your next turn. However, you can extend
      this feature's duration by using it again on your next turn.</li><li><em><strong>Speed Vision:</strong></em> You
      can pick up incredibly quick movements. Your passive Perception is increased by 5, and if a creature teleports out
      of your reach, they still provoke an opportunity attack from you.</li></ul><p>Beginning at 11th level, your
      Junsugan develops even further. You gain two additional Junsugan features while it is active, which can be chosen
      from the previous list or from the following options:</p><ul><li><em><strong>Far Sight 2:</strong></em> To take
      this feature, you must have the <em><strong>Far Sight 1</strong></em> feature. When you use your Far Sight feature
      to change your visual point of origin, it now remains until your Junsugan ends and will maintain itself as long as
      you are within 90ft of it. You return to your normal visual senses (no action required), or you use Far Sight
      again.</li><li><em><strong>Creature Vision:</strong></em> As an action, you can mingle your own sight with that of
      another creatures who you can see within 90 feet of you. If the creature is unwilling, they must succeed on a
      Wisdom saving throw against your ninjutsu or genjutsu save DC (your choice). Otherwise, you are able to see from
      the chosen creature's sight, gaining any special visual abilities they have (true sight, darkvision, chakra sight,
      etc.). However, you are blinded in regards to your own surroundings. This effect lasts until your Junsugan ends,
      you return to your normal visual senses (no action required), or you are rendered
      unconscious.</li><li><em><strong>Immaterial Sight 2:</strong></em> To take this feature, you must have the
      <em><strong>Immaterial Sight 1</strong></em> feature. You no longer need to reduce your movement speed to 0 to
      gain blindsight. However, if you still do, your blindsight's range becomes 30 feet.</li></ul></div></div><div
      class="page phb" id="p119"><div class="columnWrapper"><p>Beginning at 15th level, your Junsugan has evolved into
      near perfection. You gain one additional Junsugan feature while it is active, which can be chosen from the
      previous lists or from the following options:</p><ul><li><em><strong>Split Vision:</strong></em> To take this
      feature, you must have either of the <em><strong>Far Sight</strong></em> features or the <em><strong>Creature
      Vision</strong></em> feature. When you would use your Far Sight or Creature Vision feature, you can choose to not
      be blinded to your own surroundings. Alternatively, you can choose two points to send your vision for Far Sight,
      or two creatures to meld your vision with for Creature Vision.</li><li><em><strong>Numerical Sight:</strong></em>
      Your vision allows you to see the numerical probabilities of all things, and how to make ensure that they happen.
      When you or a creature you can see within 60 feet of you makes an attack roll, an ability check, or a saving
      throw, you can use your reaction to ignore the die roll and decide whether the number rolled is the minimum needed
      to succeed or one less than that number (your choice). You can use this feature a number of times equal to your
      Wisdom modifier (Max of 3), regaining any expended uses when you finish a long rest.</li><li><em><strong>Death
      Vision:</strong></em> Your vision allows you to see the death of all things, and how to ensure that this comes to
      pass. As a bonus action, you can choose a creature you can see within 30 feet of you, making a Wisdom (Perception)
      or Intelligence (Investigation) check against a DC of 8 + their level. On a successful check, you learn any
      resistances, immunities, vulnerabilities, and damage reductions they have, and the next time that creature takes
      damage, you can use your reaction to make the creature take the maximum amount of damage from that effect. Once
      you use this feature, you cannot do so again until you finish a short or long rest.</li></ul></div></div>
