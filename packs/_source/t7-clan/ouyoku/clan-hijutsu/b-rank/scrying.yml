name: Scrying
type: spell
_id: 2VL9aPEhtFvrbUrY
img: systems/n5eb/assets/content/clans/ouyoku.webp
system:
  description:
    value: >-
      <p>You can see and hear a particular creature you choose that is in the same dimension as you. The target must
      make a Wisdom saving throw, which is modified by how well you know the target and the sort of physical connection
      you have to it. If a target knows you're casting this jutsu, it can fail the saving throw voluntarily if it wants
      to be observed. On a successful save, the target isn't affected, and you can't use this jutsu against them again
      for 24 hours.</p><p>On a failed save, the jutsu creates an invisible sensor within 10 feet of the target. You can
      see and hear through the sensor as if you were there. The sensor moves with the target, remaining within 10 feet
      of them for the Duration. A creature that can see invisible objects sees the sensor as a luminous orb about the
      size of your fist. Instead of targeting a creature, you can choose a location you have seen before as the target
      of this jutsu. When you do, the sensor appears at that location and doesn't move.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-scrying-table.webp" />
