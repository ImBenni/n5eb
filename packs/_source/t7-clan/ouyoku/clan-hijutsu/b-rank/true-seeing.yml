system:
  description:
    value: >-
      <p>You must have your <strong>Junsugan</strong> active in order to cast this jutsu. For the Duration of the jutsu,
      you imbue yourself with true sight. You can also notice secret doors hidden by chakra, and can see ethereal
      beings, all out to a Range of 120 feet. Additionally, you ignore any effects that might make a creature immune to
      being found by jutsu with the Sensory keyword.</p><p>Finally, your Junsugan's passive bonuses persist while this
      jutsu is active, and any visual ranges are extended to 120 feet. However, you cannot use any features that require
      you to take any actions of any kind without first activating your Junsugan again.</p>
