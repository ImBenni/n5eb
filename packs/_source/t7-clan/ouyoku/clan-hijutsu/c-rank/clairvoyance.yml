system:
  description:
    value: >-
      <p>You create an invisible sensor within range in a location familiar to you (a place you have visited or seen
      before) or in an obvious location that is unfamiliar to you (such as behind a door, around a corner, or in a grove
      of trees). The sensor remains in place for the duration, and it can't be attacked or otherwise interacted with.
      You can see through the sensor as if you were in its space. If a creature's mouth is visible, anything they say is
      displayed to you as floating words above their head.</p><p>A creature that can see the sensor (such as a creature
      with true sight or chakra sight) sees a luminous, intangible orb about the size of your fist.</p>
