system:
  description:
    value: >-
      <p>You create an eye within range that hovers in the air for the duration. The eye can be invisible if you choose.
      You mentally receive visual information from the eye, which has your visual senses. The eye can look in every
      direction.</p><p>As an action, you can move the eye up to 30 feet in any direction. There is no limit to how far
      away from you the eye can move, but it can't enter another dimension. A solid barrier blocks the eye's movement,
      but the eye can pass through an opening as small as 1 inch in diameter.</p><p>While your Junsugan is active, you
      do not need to spend chakra to maintain concentration on this jutsu, and you can move the eye as a bonus action
      instead of an action.</p>
