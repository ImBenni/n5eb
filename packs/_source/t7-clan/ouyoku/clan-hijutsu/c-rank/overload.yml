system:
  description:
    value: >-
      <p>You must have your <strong>Junsugan</strong> active in order to cast this jutsu. Locking eyes with a creature
      you can see within range, you send all of the visual information you have towards them, attempting to overwhelm
      their senses. The target must make an Intelligence saving throw, taking 6d6 psychic damage on a failed save and
      half as much damage on a successful save.</p><p>On a failed save, a creature must also make a Wisdom saving throw.
      On a failed save, they are stunned until the end of their next turn.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage by 2d6. If this jutsu
      is cast at A-Rank or higher, you can target an additional creature.</p>
