system:
  description:
    value: >-
      <p>You create a Tiny incorporeal eye of shimmering light in an unoccupied space you can see within range. The eye
      exists for the duration, but it disappears if you teleport or travel to another dimension. When the eye appears,
      you name one major landmark, such as a city, mountain, castle, or battlefield on the same dimension as you.
      Someone in history must have visited the site and mapped it. If the landmark appears on no map in existence, the
      jutsu fails.</p><p>Otherwise, whenever you move toward the eye, it moves away from you at the same speed you
      moved, and it moves in the direction of the landmark, always remaining 5 feet away from you. If you don't move
      toward the eye, it remains in place until you do and flashes to have you follow it once every 1d4 minutes.</p>
