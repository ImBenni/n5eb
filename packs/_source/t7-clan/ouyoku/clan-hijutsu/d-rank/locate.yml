img: systems/n5eb/assets/content/clans/ouyoku.webp
system:
  description:
    value: >-
      <p>You describe or name an object that is familiar to you. You sense the direction to the object's location, as
      long as that object is within 1,000 feet of you. If the object is in motion, you know the direction of its
      movement. This jutsu can locate a specific object known to you, as long as you have seen it up close—within 30
      feet—at least once. Alternatively, the jutsu can locate the nearest object of a particular kind, such as a certain
      kind of apparel, jewelry, furniture, tool, or weapon. This jutsu can't locate an object if any thickness of lead,
      even a thin sheet, blocks a direct path between you and the object.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above D-Rank, increase the chakra cost of this jutsu by 3 and the range the object
      can be from you by 500 feet. If this jutsu is cast at B-Rank or higher, you can describe or name a creature
      instead of an object for this jutsu to locate.</p>
