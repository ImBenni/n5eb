name: Open Eyes
type: spell
_id: GbUVfGSzPOY8Q5C0
img: systems/n5eb/assets/content/clans/ouyoku.webp
system:
  description:
    value: >-
      <p>You focus your chakra through your visual senses, protecting yourself and any allies within 10 feet of you from
      blindness and visual illusions. For the duration, affected creatures are immune to the blinded condition and have
      advantage on saving throws against genjutsu with the Visual keyword. You do not need to spend chakra to
      concentrate on this jutsu if your Junsugan is active.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above D- Rank, increase the cost of this jutsu by 3 and the radius by 5 feet. If you cast this
      jutsu at B-Rank, it instead lasts for up to 1 hour. If you cast this jutsu at S-Rank, it no longer requires
      concentration to maintain.</p>
