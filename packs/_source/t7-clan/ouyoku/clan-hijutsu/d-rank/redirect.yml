system:
  description:
    value: >-
      <p>You must have your <strong>Junsugan</strong> active in order to cast this jutsu. To avoid any pain, you attempt
      to change the trajectory of the triggering effect to exclude you. The triggering creature must succeed on a Wisdom
      saving throw. On a failed save, the creature must change the target of all their attacks to another creature, or
      move their area of effect so that you are no longer in it. If they cannot target another creature, their attacks
      fail.</p>
