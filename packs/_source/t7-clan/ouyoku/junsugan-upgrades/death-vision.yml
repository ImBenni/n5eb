system:
  description:
    value: >-
      <p>Your vision allows you to see the death of all things, and how to ensure that this comes to pass. As a bonus
      action, you can choose a creature you can see within 30 feet of you, making a Wisdom (Perception) or Intelligence
      (Investigation) check against a DC of 8 + their level. On a successful check, you learn any resistances,
      immunities, vulnerabilities, and damage reductions they have, and the next time that creature takes damage, you
      can use your reaction to make the creature take the maximum amount of damage from that effect. Once you use this
      feature, you cannot do so again until you finish a short or long rest.</p>
