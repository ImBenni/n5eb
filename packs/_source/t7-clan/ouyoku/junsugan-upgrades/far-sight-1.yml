system:
  description:
    value: >-
      <p>As a bonus action, you can choose a point you can see within 30 feet of you. That point becomes your new visual
      point of origin until the end of the current turn, being able to see as normal from the chosen point, but becoming
      blind to your own surroundings. When you would cast a jutsu without the Chakra Seals component while this feature
      is active, you can choose to cast it from that point.</p>
