system:
  description:
    value: >-
      <p>As a bonus action, you can reduce your movement speed to 0. If done in this way, you can still cast jutsu that
      have the Mobility component (as long as there is no other effect preventing your movement), and you gain
      blindsight to a range of 10 feet. This lasts until the start of your next turn. However, you can extend this
      feature's duration by using it again on your next turn.</p>
