system:
  description:
    value: >-
      <p>Your vision allows you to see the numerical probabilities of all things, and how to make ensure that they
      happen. When you or a creature you can see within 60 feet of you makes an attack roll, an ability check, or a
      saving throw, you can use your reaction to ignore the die roll and decide whether the number rolled is the minimum
      needed to succeed or one less than that number (your choice). You can use this feature a number of times equal to
      your Wisdom modifier (Max of 3), regaining any expended uses when you finish a long rest.</p>
