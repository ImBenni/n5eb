system:
  description:
    value: >-
      <p>To take this feature, you must have either of the <em><strong>Far Sight</strong></em> features or the
      <em><strong>Creature Vision</strong></em> feature. When you would use your Far Sight or Creature Vision feature,
      you can choose to not be blinded to your own surroundings. Alternatively, you can choose two points to send your
      vision for Far Sight, or two creatures to meld your vision with for Creature Vision.</p>
