  description:
    value: >-
      <h3 id="ultimate-eye">Ultimate Eye</h3><p>The Ouyoku clan claims the furthest reaching Dojutsu of all known clans.
      While it may not be powerful like the Uchiha's Sharingan, or have the same detailed visual clarity as the Hyuga's
      Byakugan, it boasts extreme range instead. The visual prowess of this clan makes them excellent sensory ninja,
      sought after by a number of the larger nations. They rarely take sides in conflicts though, unless they see a
      larger threat in the conflict.</p><h4 id="ouyoku-traits">Ouyoku Traits</h4><p><strong>Ability Score
      Increase:</strong> +2 Wisdom, +1 Intelligence <br /><strong>Speed:</strong> Your base walking speed is 30 feet <br
      /><strong>Skill Proficiencies:</strong> Perception, Investigation<br /><strong>Tool Proficiencies:</strong>
      Tracking Kit</p>
