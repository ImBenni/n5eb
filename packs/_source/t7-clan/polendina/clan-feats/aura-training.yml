system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Polendina Clan <br />You've learned to
      focus your Aura, wrapping it into a thicker shell around yourself for more potent protection. You gain the
      following benefits:</p><ul><li>Increase your Intelligence or Constitution score by 1, to a maximum of
      20.</li><li>You add your proficiency bonus to the amount of temporary hit points granted by your <strong>Synthetic
      Aura</strong>.</li><li>While you have temporary hit points granted by this feature, you reduce all non-psychic
      damage by your Constitution or Intelligence modifier (pick one).</li></ul>
