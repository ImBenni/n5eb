system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Polendina Clan, Level 4+ <br />You've
      made too many new friends to let anyone take them away, gaining new strength to defend them. You gain the
      following benefits;</p><ul><li>Increase your Strength, Dexterity, or Intelligence score by 1, to a maximum of
      20.</li><li>You treat weapons that do not have the Heavy or Two-Handed property as if they had the Light property
      for the purpose of your <strong>Floating Array</strong> and Polendina Hijutsu.</li><li>You can learn and create
      Polendina clan Hijutsu in half the time.</li></ul>
