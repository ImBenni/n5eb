system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisites:</strong> Polendina Clan, Level 8+</p><p>Your
      construct nature has forced you to develop many kinds of skills on your own, as you were not blessed with the
      innate adaptability of normal human shinobi. This feat demonstrates your tenacity and mastery of your synthetic
      prowess. You gain the following benefits:</p><ul><li>Increase your Strength, Dexterity, or Constitution score by
      1, to a maximum of 20.</li><li>Twice per long rest, when you would roll for initiative, you may immediately
      replenish your Synthetic Aura.</li><li>When you use your Action or Bonus Action to replenish your Synthetic Aura,
      you gain twice as many temporary hit points and half as many temporary chakra points.</li><li>When a weapon is in
      your Floating Array, its weapon damage die is increased by 1 step, up to a d10.</li><li>Increase your flight speed
      by +15 ft. Once per short rest, when you begin using your flight speed on your turn, you may gain the benefits of
      the Disengage action.</li></ul>
