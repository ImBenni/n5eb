system:
  description:
    value: >-
      <p>You are a synthetic shinobi, modeled after human beings, but not quite the same. You gain the following traits
      at 1st level:</p><ul><li>You have advantage on saving throws against being poisoned, and you have resistance to
      poison damage.</li><li>You don't need to eat, drink, or breathe.</li><li>You are immune to disease.</li><li>You
      don't need to sleep, and jutsu can't put you to sleep.</li><li>When you take a long rest, you must spend at least
      six hours in an inactive, motionless state, rather than sleeping. In this state, you appear inert, but you aren't
      unconscious, and you can see and hear as normal.</li></ul>
    chat: ''
