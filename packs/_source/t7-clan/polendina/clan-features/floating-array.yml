img: systems/n5eb/assets/content/clans/polendina.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you gain access to special Chakra strings, letting you lash out weapons like a whirling
      array of whips. You can simultaneously wield a number of light weapons in your Floating Array equal to your
      proficiency bonus. You may use Intelligence instead of Strength for attack and damage rolls made with these
      weapons.</p><p>Starting at 7th level, Weapons in your Floating Array are treated as if they had the Reach property
      as well, or if they already do, the Reach increases by 1. At 15th level, the Reach increases by 1
      again.</p><p>Starting at 11th level, once per long rest you can take a special attack action, where you attack
      once with each weapon in your floating array. At 15th level, you can make this special attack action once per
      short rest.</p><p>At 18th level, your Aura allows you to supercharge your Floating Array. Once per turn when you
      make an attack with a weapon in your Floating Array, you can deal an additional amount of damage equal to your int
      mod.</p>
