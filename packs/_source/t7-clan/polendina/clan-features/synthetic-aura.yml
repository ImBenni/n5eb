system:
  description:
    value: >-
      <p>You gain access to a special manifestation of Chakra known to only a few select clans across the continent, the
      ability to wrap your body in Yang Chakra for defensive purposes. As a construct being, you were built with this
      defense integrated into your body. At the end of each long rest, you gain temp hit points 5 + your Level + your
      Constitution or Intelligence modifier (pick one). At 3rd level, you gain the temp hp on a short rest as
      well.</p><p>At 11th level, you can use an action or bonus action to refresh your Aura temp hp once per short
      rest.</p>
