system:
  description:
    value: >-
      <p>You compose your Floating Array into a circle formation in front of you, spinning it into a</p><p>You unleash a
      beam of pure chakra when you cast this jutsu and blast it outward in a line that is 100 feet long and 15 feet wide
      that persists until the start of your next turn. Any creature that starts their turn in this beam must make a
      Dexterity saving throw. On a failed save they take 10d12 force damage, or taking half as much on a successful
      save. This jutsu deals double damage to structures and constructs.</p><p>While you are concentrating on this
      jutsu, your movement speed is 5 ft. At the start of each of your turns, you can use your action to maintain the
      beam or redirect it, rotating it up to 90 degrees in any direction. Any creature the beam passes through while
      rotating (if the beam passes completely through them and they will not start their turn inside of it) must make a
      Dexterity saving throw or, take 5d12 force damage on a failed save, and taking no damage on a successful save.
      Each turn you use your action to maintain the jutsu, the damage die decreases by 1 step (min d4). If you do not
      use your action to maintain or redirect it, the jutsu ends early.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above A-Rank increase the cost of this jutsu by 3, and increase the damage by 2d12.</p>
