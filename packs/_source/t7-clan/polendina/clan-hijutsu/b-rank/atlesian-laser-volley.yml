system:
  description:
    value: >-
      <p>You generate a charge of energy in each one of your Floating Array weapons, which you can use to fire off a
      shot of pure chakra. You do not spend chakra to maintain concentration of this jutsu.</p><p>As a bonus action, you
      can expend up to two charges, making a ranged Taijutsu attack for each, which have a range of 60 feet. These
      attacks deal 2d6+Taijutsu ability modifier each. You have a total number of charges per cast equal to the weapons
      in your Floating Array.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank,
      increase the cost of this jutsu by 3, and increase the damage die by 1d6.</p>
