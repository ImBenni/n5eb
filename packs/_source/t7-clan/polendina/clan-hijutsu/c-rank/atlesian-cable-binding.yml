system:
  description:
    value: >-
      <p>You extend your Chakra Strings toward up to two targets in range, and force them to make a dexterity saving
      throw. On a failure, they are grappled in place, and restrained while grappled in this way. At the end of each of
      the grappled creatures' turns, they can make a strength saving throw, breaking free on a success.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, and
      target 1 additional creature.</p>
