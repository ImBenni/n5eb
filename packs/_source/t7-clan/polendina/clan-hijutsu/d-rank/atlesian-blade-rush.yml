system:
  description:
    value: >-
      <p><strong>(This Jutsu Cannot Score a Critical Hit)</strong></p><p>You make a flurry of attacks with your blades,
      using nigh- invisible Chakra Strings to speed your movements along.</p><p>Make two melee taijutsu attack against
      one creature you can see within range with different weapons. On a hit, you deal your weapons damage + 1d6, but
      you do not add your ability modifier to your weapons damage. If at least two hit, make one more attack with any
      weapon used, that deals your weapon damage but does not add your ability modifier.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. At B-Rank
      you make one more attack on both the primary and secondary attacks. At S-Rank you make an additional attack on
      both the primary and secondary attacks.</p>
