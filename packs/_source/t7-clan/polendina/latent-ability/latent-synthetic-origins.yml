system:
  description:
    value: >-
      <p>Beginning at 1st level, you are partially synthetic shinobi, both human and machine. How your character winded
      up this way is up to you. As a synthetic shinobi, you only need to eat and drink half as much as you normally
      would, and you can hold your breath for a number of rounds equal to twice your Constitution modifier.
      Additionally, if you can use your Intelligence modifier as your casting modifier for Polendina Hijutsu.</p>
