name: Dual Life
type: feat
_id: ImOer0MgiysYC7Wf
img: systems/n5eb/assets/content/clans/ryougi.webp
system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Ryougi Clan, level 16+, Dual Soul<br
      /><strong>Description</strong>: Your personalities have grown together, sharing success and failures together, but
      the time to part ways comes near. You gain the following benefits:</p><ul><li>The first time you would be killed,
      you do not die, instead one of your personalities die. You are resurrected with half of your hit points, end all
      conditions currently affecting you, and lose access to the <strong>Dual Mind</strong> Feature.</li><li>After being
      resurrected by this feat, you gain proficiency in the skills and saving throw your other personality had. You also
      gain any expertice your other personality had.</li><li><p>After being resurrected by this feat, you forget the
      <strong>Mental Schism</strong> genjutsu, and become unable to learn or benefit from it by any means, and learn an
      special variant of <strong>Bless</strong>, you ignore the ability score requirements for learning and casting
      Bless this way.</p><ul><li>When you cast <strong>Bless</strong> this way, it does not requires concentration, but
      cannot affect creatures other than you.</li></ul></li><li>While on <strong>Battle Trance</strong>, you add a 1d6
      bonus to charisma saving throws.</li></ul><p></p>
