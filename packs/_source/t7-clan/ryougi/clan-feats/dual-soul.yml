    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Ryougi Clan, level 12+, Dual Logic<br
      /><strong>Description</strong>: Having a split mind has reinforced your mental defences, making it harder to fall
      against illusions and other tricks. You gain the following benefits:</p><ul><li>You gain resistance to psychic
      damage.</li><li>You gain advantage on <strong>read the enemy</strong> checks.</li><li>When you succeed a
      <strong>read the enemy</strong> check made as a reaction, you recover the spent reaction.</li></ul>
