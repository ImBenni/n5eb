system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Ryougi Clan, level 8+<br
      /><strong>Description</strong>: Your experience in battle has granted you a kind of sixth sense to detect danger,
      some might even compare it to a form of future prediction. You gain the following benefits:</p><ul><li><p>When
      rolling initiative, you can spend a reaction to draw <br />a weapon you are carrying. If the weapon fulfill the
      requirements, you may activate <strong>Sword Trance</strong> as part <br />of the same
      reaction.</p></li><li><p>While benefiting from your <strong>Sword Trance</strong>, on <br />successful dexterity
      saving throws you take no damage or effect.</p></li><li>While on <strong>Battle Trance</strong>, When a creature
      would cast a reaction against a bukijutsu you cast, you can forgo adding your proficiency to damage rolls, and
      instead increase the cost of reactions against your bukijutsu by your proficiency bonus.</li></ul>
    chat: ''
