system:
  description:
    value: >-
      <p><strong>Category</strong>: Clan<br /><strong>Prerequisite</strong>: Ryougi Clan, level 4+<br
      /><strong>Description</strong>: While others where out partying, you studied the blade. You gain the following
      benefits:</p><ul><li>Increase your strength or dexterity score by 1, to a maximum of 20.</li><li>You gain
      proficiency in Chokutos.</li><li>Chokutos you wield count as Katana for Clan and Class features.</li><li>When you
      make a taijutsu attack as part of a bukijutsu while on <strong>Battle Trance</strong>, you can forgo adding your
      proficiency to damage rolls, and instead gain a bonus to attack rolls equal to 1/3 your proficiency bonus, twice
      per casting.</li></ul>
    chat: ''
