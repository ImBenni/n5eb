      <h3 id="the-duality-of-man">The Duality of Man</h3><p>The Ryougi clan is a family of espers that specialize in the
      use of self-suggestion and a secret ability passed down their bloodline. When a Ryougi is born, their body is not
      inhabited by one, but two minds that live as one.</p><h4 id="ryougi-traits">Ryougi Traits</h4><p><strong>Ability
