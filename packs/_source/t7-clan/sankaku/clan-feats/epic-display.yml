img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Sankaku Clan, Level 8+ <br />You are the
      most flashy shinobi on the team. You pride yourself on the quickest to act, having the coolest jutsu, and carrying
      the entire team. You gain the following benefits;</p><ul><li>Increase your Strength or Dexterity score by +1, up
      to a maximum of 20.</li><li>You can now recover up to 5 <strong>Danger Points</strong> in a turn.</li><li>When you
      spend <strong>Danger Points</strong> to increase a creature's skill check to assist in a Combination jutsu,
      increase their result by +2 per Danger Point spent, instead of only +1.</li><li>When you spend <strong>Danger
      Points</strong> to increase an attack roll, on a hit, ignore a number of the target's DR equal to 3 times the
      Danger Points spent.</li><li>When you spend <strong>Danger Points</strong> to increase your speed, up to 3 times
      per turn, increase your speed by +10ft, instead of 5ft. If you spend at least 4 <strong>Danger Points</strong> to
      boost your speed, you gain the benefits Disengage action and may Dodge as a bonus action on that turn.</li></ul>
    chat: ''
