img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Sankaku Clan, Level 4+</p><p>You realize
      that the best way to win a battle is to debilitate your foes to the point where they can no longer fight with
      poison. You decide that the Sankaku Clan's poison abilities only scratch the surface, so you decide to do your own
      research. You gain the following benefits:</p><ul><li>Increase your Strength or Intelligence score by +1, up to a
      maximum of 20.</li><li>You gain the ability to learn jutsu with the Medical keyword that deal Poison damage or
      inflict the Envenomed/Poisoned conditions. Danger Points may be used to increase the attack roll result of these
      jutsu.</li><li>You may use Strength as your learning score for these jutsu, as well as for the Medicine Skill and
      Medicine Kits.</li><li>Additionally, when you deal damage with a Sankaku Ninjutsu, you may change the damage type
      to Poison.</li><li>When allies assist you in casting Sankaku Combination Hijutsu, they are treated as having the
      jutsu on their known list.</li></ul>
    chat: ''
