img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p>Also at 1st level, you can use Strength for Sankaku Ninjutsu. When you participate in a Combination jutsu that
      would gain benefits depending on the highest Charisma modifier among the casters, you can instead use your
      Strength in place of your Charisma.</p><p>At 3rd level, when you cast a Sankaku Hijutsu, with the Combination
      keyword, you gain all Charisma based benefits that you qualify for, instead of only the highest.</p><p>At 7th
      level, once per round, when you or a creature would assist in casting a Sankaku Combination jutsu, you or the
      creature can opt to spend their action or bonus action for the round, instead of using their reaction.</p>
    chat: ''
