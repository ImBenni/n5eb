system:
  description:
    value: >-
      <p>Starting at 7th level, you do your best to act fast within the battle to set the precedent for victory. You
      have advantage on Initiative checks and can use Danger Points to increase your initiative result by +1 per point
      spent. You also gain a 2d6 bonus to damage rolls against creatures who have yet to act in combat.</p><p>At 11th
      level, once per short rest, you can gain an extra bonus action and reaction during the first round of
      combat.</p><p>At 15th level, you carry strong alertness. While you are above half of your max hit points, you
      cannot be <strong>Surprised</strong>.</p>
