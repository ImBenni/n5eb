system:
  description:
    value: >-
      <p>Starting at 11th level, you gain a +1 to critical threat range with Sankaku Hijutsu, Taijutsu, and attack rolls
      made with Combination jutsu. Once per round, when you score a critical hit with these listed jutsu types, you
      regain 2 Danger Points.</p><p>At 15th level, allies that assist you in casting Combination jutsu also gain this
      bonus to critical threat range.</p><p>At 18th level, this bonus becomes a +2.</p>
