system:
  description:
    value: >-
      <p>Starting at 1st level, you gain 30 feet of Blindsight. You also cannot be sensed with special sights/senses
      such as a blindsight or Chakra Sensing. This does not stop True Sight, however, until you are 18th level. You are
      also hidden from Sensory jutsu of D-Rank or lower. This increases to C-Rank at 3rd level and B-Rank at 7th
      level.</p>
