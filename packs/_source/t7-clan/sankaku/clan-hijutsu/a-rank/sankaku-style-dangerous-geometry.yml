name: Sankaku Style Dangerous Geometry
type: spell
_id: 3SJpfLAV21yzkcxf
img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast if you have 3 to 5 casters within 30 feet of you.</p><p>You release a gargantuan
      amount of chakra, emitting 30-foot bright light from yourself, which gathers and forms into a bestial effigy of
      your design that can be seen by onlookers. Your potent energy spreads to allied creatures within 30 feet of you,
      exciting their blood and intensifying their strength as they manifest their own bestial effigy.</p><p>Select a
      creature within 120 feet of you. You and all allied creatures assisting this jutsu begin circling the creature
      from a 15-foot distance with immense, unquantifiable speed, forming a shape with a number of corners equal to how
      many creatures are performing this jutsu (For example, 3 casters create a triangle, 5 casters create a
      pentagon.)</p><p>Each creature then, one by one, makes a melee taijutsu attack as they go in for a punch, kick, or
      headbutt, dealing their unarmed damage + 9d4 and knocking the creature 10 feet in a direction as the next creature
      in order goes in for their own attack. If any creature scores a critical hit, instead of doubling the damage, add
      twice their ability modifier to the damage roll.</p><p><br /><br /><br /><br /><br /><br /><br /><br /><br /><br
      /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br
      /><br /><br /><br /><br /><br />  If 2 or more casters successfully hit their attacks, you teleport back to where
      you were initially standing, all other casters teleporting next you in the closest space that can hold them,
      abreast each other facing the target. All creatures then cast a Ninjutsu of C-Rank or lower that makes a single
      attack roll or imposes a saving throw across an area of effect that is a line or cone at the creature, ignoring
      range. All Ninjutsu cast combine into one epic blast. Make a Ninjutsu attack roll using the highest Ninjutsu
      attack roll amongst all casters, affecting the creature with all Ninjutsu used on a hit that required an attack
      roll. This attack roll cannot score a critical hit. For jutsu that required a saving throw, the creature must make
      a single Constitution saving throw, suffering the damage and effects of all jutsu used that impose a saving throw
      on a failed save, or half damage on a success.</p><p>Once this jutsu concludes, all casters gain 1 rank of
      Weakened, and you gain 1 rank of Exhaustion for 1d4+2 rounds. This exhaustion cannot be removed by any means and
      must run its course. You cannot cast this jutsu again until you lose this rank of
      exhaustion.</p><p><strong>Combination:</strong> When this jutsu is cast, it gains additional effects based on who
      has the highest Charisma modifier between both casters.</p><ul><li>+0-1: No Change</li><li>+2-3: The damage of
      this jutsu increases by 1 step.</li><li>+4-5: All creatures gain a +1d4 bonus to hit with their taijutsu attack
      rolls.</li></ul>
