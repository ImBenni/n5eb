name: Crimson Comet Crash
type: spell
_id: qnXhnA0VtkpM6ufJ
img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p>You channel an intense burst of chakra into your legs, enveloping them in fiery red energy. Selecting a
      creature within 60 feet, you instantly teleport to their location and unleash a devastating flurry of
      kicks.</p><p>Upon teleporting, you make two melee taijutsu attacks against the target. Each attack deals your
      unarmed damage + 1d8. For every two attacks made, the target must succeed on a Strength saving throw, taking a -2
      penalty per successful attack, or be knocked 30 feet in any direction of your choice. A creature can only be
      knocked upwards once per use of this jutsu.</p><p>If the target fails their save and more attacks remain in this
      jutsu, you teleport to them again to continue your relentless assault.</p><p><strong>Critical Strike:</strong> If
      you score a critical hit with this jutsu, instead of doubling the damage dice, the damage dice for that critical
      attack increase to 1d12s.</p><p><strong>Danger Amplification:</strong> When you teleport to a creature, you may
      spend 2 Danger Points to attempt an Athletics check contested by the target's passive Perception. On a success,
      the target is <strong>surprised</strong> for the next two attacks you make against them this
      turn.</p><p><strong>At Higher Ranks:</strong> For each rank above B-Rank, increase the chakra cost of this jutsu
      by 3 and the number of attacks made by +2.</p>
