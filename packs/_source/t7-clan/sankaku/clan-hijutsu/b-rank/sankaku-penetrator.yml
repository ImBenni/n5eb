system:
  description:
    value: >-
      <p>You generate a red aura which cause the ground to quake and dberis to disperse. You make a fist, shifting your
      aura into it, causing your hand to radiate with a burning red glow. Make a ranged Ninjutsu attack against a target
      in range as you fire a piercing beam of chakra. On a hit, you deal 9d6 force damage, which ignores cover, damage
      reduction, and temporary hit points.</p><p>All creatures, between you and the target, must make a Dexterity save,
      taking half damage on a failure.</p><p><strong>Damage Amplification:</strong> By using <strong>Danger
      Points</strong>, you can improve this jutsu's effect. For each Danger Point you spend, increase the damage die of
      this jutsu by 1 step. If you spend at least 2 Danger Points on this jutsu, this jutsu ignores resistance and
      treats immunity as resistance (If you spend 4, this jutsu ignores resistance and immunity).</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost by 3, and gain a +2 to
      Clash checks.</p>
