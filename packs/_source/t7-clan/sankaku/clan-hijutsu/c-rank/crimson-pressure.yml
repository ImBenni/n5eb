system:
  description:
    value: >-
      <p>A more powerful, altered version of the <em>"Crimson Blaster"</em> hijutsu. Using the same technique as Crimson
      Blaster, you amplify one sphere further, making it huge. Make a ranged taijutsu attack against a creature within
      range, dealing your 4d10 force damage as you create a large explosion. The creature must make a Strength saving
      throw, becoming Deafened until the end of their next turn due to the sound of the explosion and being knocked
      prone on a failed save.</p><p>If this jutsu is cast as a <em><strong>Finisher</strong></em>, you instead deal 6d10
      force damage on hit. Regardless of a hit or miss, the area within a 15-foot radius of the creature becomes
      difficult terrain, and all creatures other than the target within this radius must succeed a Dexterity saving
      throw or take half damage.</p><p><strong>Danger Amplification:</strong> By using <strong>Danger Points</strong>,
      you can improve this jutsu's effect. You can increase the radius of this jutsu when used as a
      <em><strong>Finisher</strong></em> by 5ft per Danger Point spent, up a maximum increase of 15ft. If you spend 3
      Danger Points this way, all affected creatures must make the Strength saving throw to avoid becoming
      Deafened.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3, and the damage by 2d10.</p><p></p><p></p>
