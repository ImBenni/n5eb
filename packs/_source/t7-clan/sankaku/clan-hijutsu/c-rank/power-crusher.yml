img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p>A powerful taijutsu of the Sankaku Clan where the user channels chakra within their muscles to absorb and
      redirect the negative feedback of attacks received. This jutsu cannot be cast while wearing heavy
      armor.</p><p>When you would be damaged by an attack, you contest the attack roll with a Constitution (Chakra
      Control) check. If you have expertise in Chakra Control, you instead add a +1d4 bonus in place of expertise.
      Critical hits cause you to always roll at disadvantage unless the critical hit can be negated.</p><p>If you
      succeed this contest, you reduce the damage dealt by half and you gain 1 stack of <strong>Feedback</strong> until
      the end of the next turn. When you would make an unarmed attack, or cast a Taijutsu or Sankaku Hijutsu, you can
      convert any stacks of <strong>Feedback</strong> you have into 1 extra damage die. You also gain an extra reaction
      until the end of the turn, which you can use to cast this jutsu again at half cost.</p><p>If you fail this
      contest, you reduce the damage by 2d8, and can't use this reaction again until the start of your next
      turn.</p><p><strong>Danger Amplification:</strong> By using <strong>Danger Points</strong>, you can improve this
      jutsu's effect. When you would be critically hit while gaining this jutsu's benefits, you can spend 2 Danger
      Points to treat the critical hit as a normal hit.</p>
    chat: ''
