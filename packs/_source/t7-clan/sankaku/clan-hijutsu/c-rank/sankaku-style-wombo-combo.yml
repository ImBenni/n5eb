img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p>This jutsu can only be cast if you have one or two other casters within 30 feet of you.</p><p>You dash towards
      a creature within range and go for a punch to knock the wind out of them, followed by a grapple into a throw,
      placing trust within your allies to finish the combo. Make a melee taijutsu attack, dealing your unarmed damage on
      hit and imposing a Constitution saving throw. On a failed save, the creature gains 1 rank of Bruised. You then
      make a grappling contest against the creature, at advantage if the creature failed their Constitution saving
      throw. If you succeed, you grab the creature and spin them around rapidly.</p><p>You then throw the creature a
      space within 30 feet and the other casters of this jutsu can target them with a Taijutsu or Bukijutsu
      <em><strong>Finisher</strong></em>, with a casting time of 1 action or bonus action, once per turn, regardless of
      range, ignoring listed casting time.</p><p><strong>Combination:</strong> When this jutsu is cast, it gains
      additional effects based on who has the highest Charisma modifier between all casters.</p><ul><li>+0-1: No
      Change.</li><li>+2-3: The target makes their Constitution saving throw with a -1d4 penalty.</li><li>+4-5: The
      creature cannot take reactions against Finishers cast against them until the end of the turn if you succeeded your
      grapple contest.</li></ul>
    chat: ''
