system:
  description:
    value: >-
      <p>You take in a big gulp of air and use medical chakra to isolate the toxic carbon dioxide within the atmosphere.
      You exhale this mixture onto your fists, causing them to be surrounded in a purple smog of poisonous chakra for
      the duration. This jutsu ends early if you reach 0 hit points.</p><p>For the duration, your unarmed damage becomes
      poison damage and increases by 1 step. If this would cause your unarmed damage to go beyond a d12, your unarmed
      damage instead increases by +2.</p><p>Twice per turn, when you hit a creature with an unarmed or taijutsu attack
      using your fists, they must succeed on a Constitution saving throw or become <strong>Envenomed</strong> for the
      duration of this jutsu.</p><p>If you score a critical hit, the creature makes this saving throw at disadvantage
      and becomes <strong>Poisoned</strong> on a failed save for the duration.</p>
