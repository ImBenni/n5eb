system:
  description:
    value: >-
      <p>You rapidly form a hand sign and then jump high into the air and channel chakra into your legs, forming it into
      a sphere in front of you which you then kick towards a creature within range. Make a ranged ninjutsu attack,
      dealing 2d8 + your Ninjutsu ability modifier in force damage.</p><p><strong>Danger Amplification:</strong> By
      using <strong>Danger Points</strong>, you can improve this jutsu's effect. You can spend 3 Danger Points. When you
      do, until the end of your turn, you can target one affected creature with a Jutsu with the
      <em><strong>Finisher</strong></em> keyword regardless of range, once per turn, using either an Action or Bonus
      action, ignoring its listed casting time.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3. If cast to B-Rank, increase the number of attacks made
      by +1. If cast to S-Rank, increase the number of attacks made by +1.</p>
