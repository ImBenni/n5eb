name: Power Sledgehammer
type: spell
_id: kSEFAGQrUtMjMgV4
img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p>You perform a potential three piece combo to lock an opponent down. Make two melee taijutsu attacks, dealing
      your unarmed damage + 1d4. On each hit, the creature must succeed a Constitution saving throw or become Dazed. If
      both attacks were successful, you can follow up with a 3rd melee taijutsu attack, dealing your unarmed damage and
      knocking the creature prone on a hit. This third attack scores a critical hit on a 19-20. These attacks do not add
      your ability modifier.</p><p><strong>Danger Amplification:</strong> By using <strong>Danger Points</strong>, you
      can improve this jutsu's effect. When you impose a Constitution saving throw with this jutsu, you can spend 2
      Danger Points to cause the creature to become Weakened until the end of your next turn on a failure. You must
      declare you are spending Danger Points for this purpose before you attack.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and both instances of damage
      by 1d4. If cast to B-Rank or higher, increase the damage die by 1 step, and you can now add half your ability
      modifier to each attack. If cast to S-Rank or higher, increase the damage die by 1 step, and you now add your full
      ability modifier to each attack.</p><pre><code></code></pre>
