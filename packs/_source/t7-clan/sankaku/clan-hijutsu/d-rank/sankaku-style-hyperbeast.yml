name: Sankaku Style Hyperbeast
type: spell
_id: OzrGXBm6IVCnUrP0
img: systems/n5eb/assets/content/clans/sankaku.webp
system:
  description:
    value: >-
      <p>You boast a claim of victory, of determination, or anything you can think of to boost your allies morale. You
      raise your fist to the air and create a pulse of clear chakra to empower allied creatures within 20 feet. All
      allied creatures gain the following benefits for the duration;</p><ul><li>All creatures gain a +1 bonus to
      AC.</li><li>All creatures gain a bonus to initiative checks equal to your Strength modifier.</li><li>Once per
      turn, an affected creature can give themselves a +1d4 bonus to a single skill check, attack roll, saving throw, or
      damage roll.</li><li>All casters can spend and roll up to 2 hit die and 2 chakra die. The creatures gain temporary
      hit points equal to the result of their hit die and temporary chakra equal to the result of their chakra
      die.</li><li>All creatures know of any conditions affecting each other.</li><li>All creatures are aware of each
      other's exact location.</li></ul><p><strong>Combination:</strong> <em>If this jutsu is cast as a Combination
      jutsu, increase the duration of this jutsu by 1 round per additional caster, excluding
      yourself.</em></p><p><em>Any creature who assists in casting this jutsu as a combination jutsu increases this
      jutsu's supportive abilities based on the highest Charisma modifier within the group of casters. (+0-1: No change.
      +2: Increase the bonus to AC gained by +1. +3: Affected creatures increase their movement speed by 15 feet and
      ignore difficult terrain. +4: Affected creatures reduce the first instance of damage they take per round by -5.
      +5: Affected creatures can now roll up to 4 hit die and 4 chakra die.)</em></p>
    chat: ''
