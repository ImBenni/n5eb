system:
  description:
    value: >-
      <p>You employ a dirty tactic to catch your foes off guard. When a creature
      misses you with an attack, you can leap over the creature and land in a
      space behind them that can hold you, simultaneously exhaling a breath of
      purple mist at them. The target must succeed a Constitution saving throw,
      or become Blinded until the end of their next turn.</p><p>If the target is
      Poisoned or Envenomed, they roll with a -1d4 penalty, and gains the
      blinded condition for the duration of their Poisoned or Envenomed
      condition on a failure (whichever lasts longer).</p>
