img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Seol Clan, Level 12+ <br />Your Spirit
      Companion has reclaimed all that it has lost, and the bond between the two of you has become far more than just
      unbreakable. You gain the following benefits:</p><ul><li>Increase an ability score of your choice by 1, to a
      maximum of 20.</li><li>Once per rest, when you or your Spirit Companion would, as the result of a hostile source,
      reach 0 hit points, die, or be instantly killed, you are instead dropped to 1 hit point, and cannot go below this
      1 hit point until the end of your next turn.</li><li>When you would cast a jutsu with a range of Self, you can
      reduce the remaining duration of your Spirit Companion's Physical Manifestation by 1 minute to have that jutsu
      affect both you and your Spirit Companion.</li><li>Your Spirit Companion can benefit from allied effects that it
      normally could not due to being a Construct or Undead.</li><li>While you are within 15 feet of your Spirit
      Companion or while wielding your Ego Weapon you gain an amount of damage reduction equal to your Charisma Ability
      Modifier. This damage reduction doubles against Psychic damage.</li></ul>
    chat: ''
