img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Seol Clan, Level 8+ <br />You achieve a
      new level of harmony and cohesion with your Spirit Companion, further strengthening your Ego Weapon. You gain the
      following benefits:</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li><p>While
      you are wielding your Ego Weapon, you can choose to gain one of the following benefits: <br
      /><strong>Sight:</strong> You gain a number of feet of a sense other than true sight equal to five times your
      Proficiency Bonus. <br /><strong>Movement:</strong> You gain a number of feet of a type of movement speed other
      than walking speed equal to ten times half your proficiency bonus.</p></li><li>Once per Long Rest, when you fuse
      your Spirit into your Ego Weapon you can gain access to a Soul Invocation that you do not possess for the duration
      of that activation.</li><li>Over the course of a Long Rest, you can select one Seol Hijutsu you know that uses
      your Ego Weapon as a component. That jutsu cannot be negated, interrupted, or dispelled when cast, and you add
      your Charisma Ability Modifier to concentration checks made to maintain it.</li></ul>
