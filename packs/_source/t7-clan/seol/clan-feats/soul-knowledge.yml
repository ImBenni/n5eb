img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Seol Clan, Level 4+ <br />You've become
      able to delve deeper into the truth of your Spirit, its past, and its world. You gain the following
      benefits:</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Select one of the
      5 following Nature Releases: Fire, Water, Lightning, Wind, Earth. You are now able to add jutsu with the
      corresponding Nature Release keyword to your jutsu list, and your Shared Power feature can have the damage type
      granted be the damage type of the chosen release.</li><li>Your Spirit Companion can select another jutsu type to
      be able to cast from its Memories of Nobody feature.</li><li>Twice per rest, when you would fail a saving throw
      that you are not proficient in but your Spirit Companion is, you can gain proficiency in that saving throw for one
      round.</li><li><p>Once per rest, when you would activate your Ego Weapon while suffering the effects of a
      condition you can select one of those conditions, except Exhaustion, and roll a DC 13 + the rank of the effect
      that inflicted the condition Charisma Ability Check, ending the effects on a success. <br /><em>(D-Rank: 1,
      C-Rank: 2; B-Rank: 3; A-Rank: 4; S-Rank: 5)</em></p></li></ul>
