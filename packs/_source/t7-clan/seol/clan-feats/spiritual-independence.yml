name: Spiritual Independence
type: feat
_id: kTYuUaW8qP4h3tKM
img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Seol Clan <br />Your Spirit is more
      developed than most others, having an easier time learning and growing without your direct input. You gain the
      following benefits:</p><ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Your
      Spirit Companion gains expertise in a skill of your choice, and can speak with, be understood by creatures, and
      appear visibly to creatures other than yourself at will.</li><li>You can use your Charisma Ability Modifier for
      the purposes of learning and/or gaining jutsu of B-Rank or higher that your Spirit Companion is able to
      cast.</li><li>Your Spirit Companion learns a single Taijutsu or Weapon/Bukijutsu Stance of your
      choice.</li><li>Your Spirit can take the form of a weapon of your choice that you are proficient with in place of
      fusing with an existing one to activate Shared Power. If it does, it gains one D-Rank Weapon Seal of your choice
      for the duration. This seal can be up to C-Rank at 7th level, B-Rank at 11th level, A-Rank at 15th level, and
      S-Rank at 18th level.</li></ul>
