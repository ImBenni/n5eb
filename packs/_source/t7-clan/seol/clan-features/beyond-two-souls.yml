img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>At 7th level, the experiences both you and your Spirit have endured have deepened your bond. While holding your
      Ego Weapon, you reduce the cost of jutsu that your Spirit is able to cast by an amount equal to the rank of the
      jutsu. <br /><em>(D-Rank: 1; C-Rank: 2; B-Rank: 3; A-Rank: 4; S-Rank: 5)</em></p><p>Also, once per round while you
      and your Spirit are within 10 feet of each other (but not while Shared Power is active), you can grant an attack
      either of you would make advantage or impose disadvantage on a saving throw that a creature makes against either
      of you. You may do so a number of times equal to 1 + half your Charisma Ability Modifier per
      rest.</p><p>Additionally, once per Long Rest, if your Spirit Companion would be reduced to 0 hit points, you can
      spend Chakra Die equal to your rank to reform it with half of its hit points. <br /><em>(D-Rank: 1; C-Rank: 2;
      B-Rank: 3; A-Rank: 4; S-Rank: 5)</em></p>
