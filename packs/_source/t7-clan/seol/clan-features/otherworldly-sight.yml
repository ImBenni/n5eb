system:
  description:
    value: >-
      <p>Starting at 7th level, you learn to truly see into the world of your Spirit, attaining a new level of
      understanding of that which lies around you. You gain 15 feet of true sight, which doubles while wielding your Ego
      Weapon. You also gain advantage on checks to locate creatures within the range of this sight, and can add your
      Charisma modifier to Perception and Investigation checks you make.</p><p></p><p></p>
