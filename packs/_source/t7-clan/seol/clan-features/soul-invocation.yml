img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>At 3rd level, you further hone your ability to make weapons serve as ideal vessels for your Spirit. You gain
      access to <em><strong>Soul Invocations</strong></em>, beginning with a single one. You gain another at 7th, 11th,
      and 15th levels. If multiple Soul Invocations would benefit a jutsu you cast, you only gain the benefits of two
      Soul Invocations per casting. These only affect your Ego Weapon, and are selected from the list
      below:</p><ul><li>It treats each point of damage it deals to temporary hit points as dealing 2 points of damage to
      those hit points.</li><li>It ignores Resistance to its damage, as well as any of the conditions it or jutsu using
      it as a component would apply.</li><li>It ignores an amount of damage reduction equal to half your Proficiency
      Bonus.</li><li>It adds your highest Ability Modifier to the damage it deals to Abberations, Demons, Monstrosities,
      and Undead.</li><li>It reduces temporary AC bonuses gained against attacks made using it by half your Proficiency
      Bonus.</li><li>It reduces any temporary saving throw bonuses gained against saving throws forced using it by 1/3rd
      your Proficiency Bonus.</li></ul>
    chat: ''
