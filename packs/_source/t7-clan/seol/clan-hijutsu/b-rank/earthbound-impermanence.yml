name: Earthbound Impermanence
type: spell
_id: JLU0O7NHBsYtThDR
img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>You strike a creature with your chosen weapon, attempting to sever the ties that bind them to this world and
      send them partially to the next one. This jutsu can only be cast as a
      <em><strong>Finisher.</strong></em></p><p>Make a melee or ranged Taijutsu attack, dealing your weapon's damage +
      5d10 on a hit. A creature hit by this jutsu must make a Charisma Saving Throw, having their mind, body, and spirit
      all thrown into disarray at once on a failure.</p><p>A creature who failed their saving throw is Incapacitated,
      Blinded, and unable to move for this jutsu's duration. At the start of each of their turns, the target makes a
      Charisma Saving Throw. On a success this jutsu's effects end, but on a failure you roll 1d20. On a roll of 11 or
      higher, that creature's body and soul vanish into the other world, disappearing from their location until the
      start of their next turn. On a roll of 10 or lower, they remain in their position as usual.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost by 3 and the damage by
      1d10. If this jutsu is cast at A-Rank or higher, a number of times equal to your Ninjutsu Ability Modifier per
      casting of this jutsu, you can choose to treat the result of the d20 as if it rolled an 11.</p><p></p>
