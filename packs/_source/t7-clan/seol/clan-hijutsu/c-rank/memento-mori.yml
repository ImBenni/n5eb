system:
  description:
    value: >-
      <p>You carve into your opponent's soul, allowing your Spirit to summon forth vestiges from its world to assail
      your enemies. This jutsu can only be cast as a <em><strong>Finisher.</strong></em></p><p>Make a melee or ranged
      Taijutsu attack, dealing your weapon's damage + 4d8 on a hit. A creature hit by this jutsu must then make a Wisdom
      Saving Throw as spirits begin to tear into them.</p><p>On a failure, they become Dazed, and are marked for death
      by the otherworldly spirits. At the start of each of their turns, they take 1d10 + your Ninjutsu Ability Modifier
      in Psychic damage. If you roll a 10 on at least 1 of the d10s, the target also gains 1 rank of Slowed that remains
      for the duration. At the end of each of their turn that they remain under the effects of this jutsu, the creature
      can remake their Wisdom Saving Throw to end its effects on them. On a success, any ranks of Slowed they gained are
      also lost.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the
      cost of this jutsu by 3, the initial damage by 1d8, and the Psychic damage by 1d10.</p>
