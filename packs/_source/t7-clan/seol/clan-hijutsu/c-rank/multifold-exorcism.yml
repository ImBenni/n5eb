name: Multifold Exorcism
type: spell
_id: GXYWS6SZFHYlM5LG
img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>You tear open a rift to your Spirit's world, drawing forth a storm of blades that seek to excise the weak.
      Select a number of creatures within range equal to half your Ninjutsu Ability Modifier rounded up. Those creatures
      must make Dexterity Saving Throws, taking your weapon's damage + 3d10 Force Damage and being knocked Prone on a
      failure, or half as much damage and no effects on a success.</p><p>If this jutsu is cast using your Ego Weapon as
      a component, creatures knocked Prone by this jutsu also become Restrained for the duration that they remain prone,
      as the swords that rain down nail them to the ground.</p><p>On each of their turns that they remain Restrained,
      they can use an Action or Bonus Action to make a Strength Saving Throw, ending this jutsu's effects on them on a
      success.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the
      range by +15 and the damage by 1d10. If this jutsu is cast at B-Rank or higher, you can instead select a number of
      targets equal to your full Ninjutsu Ability Modifier. If this jutsu is cast at A-Rank or higher, if you use your
      Ego Weapon to cast this jutsu, a creature can only attempt to break free once per turn.</p>
