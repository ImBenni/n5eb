system:
  description:
    value: >-
      <p>You fully link your mind with your Spirit's, attaining a limited amount of extrasensory perception from the
      bond. You both then spring into action, expelling your energy to form a stalwart shield that protects those close
      by from harm. When you cast this jutsu, all allied creatures in range gain a +5 bonus to their AC against the
      triggering attack or gain advantage on the triggering saving throw. Then, until the start of your next turn, while
      allied creatures remain within range of this jutsu they gain a +3 bonus to their AC or a +2 bonus to all saving
      throws for this jutsu's duration. Allies cannot gain the benefit of this jutsu if they are already gaining bonuses
      to their AC or Saving Throws from a jutsu.</p>
