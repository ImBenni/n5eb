_id: 2TmXBEESFGvX2YpV
img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>You alter the properties of your Ego Weapon to better suit your situation, melding your Spirit's potential to
      your will. When you cast this jutsu, you can select a number of weapon properties equal to half your Ninjutsu
      Ability Modifier. These weapon properties must be present on other weapons that match the same type of weapon as
      your Ego Weapon. (Melee weapons can only gain properties found on melee weapons, and ranged weapons can only gain
      those that are found on ranged weapons)</p><p>For the remaining duration of your Ego Weapon's existence, it gains
      the chosen weapon properties in addition to any others it possesses.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the number of properties by
      +1. If this jutsu is cast at B-Rank or higher, you can remove up to two weapon properties your Ego Weapon
      possesses when you cast this jutsu, and you can choose to have the chosen weapon properties apply to Seol Hijutsu
      with the Bukijutsu or Taijutsu keywords that you cast.</p>
