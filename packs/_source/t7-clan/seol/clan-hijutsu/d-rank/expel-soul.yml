name: Expel Soul
type: spell
_id: BxzevvW8CSgquGjw
img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>Once per round, when you would hit a creature with a weapon attack or a Taijutsu attack you can choose to
      attempt to drive your Ego Weapon into their soul, temporarily forcing it from their body to throw them into
      disorder.</p><p>The target creature takes your Ninjutsu Ability modifier in Force damage and must make a Charisma
      saving throw, gaining Dazed on a failure.</p><p>Until the end of the current turn, you can target one affected
      creature with a <em><strong>Finisher</strong></em>, regardless of range, once per turn, using either an Action,
      Bonus Action, or Reaction, ignoring its listed casting time.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above D-Rank, increase the cost by 3, and the damage by your Ninjutsu Ability modifier.</p>
