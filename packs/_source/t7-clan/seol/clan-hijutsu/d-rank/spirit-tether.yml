img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>You perform a deadly strike against an enemy that makes it seem like
      you looked into their soul to see their weakness. This jutsu can only be
      cast as a <em><strong>Finisher</strong></em>.</p><p>Make a melee or ranged
      Taijutsu attack against a creature within range. On a successful hit, they
      take your weapon's damage + 2d8 and gain 2 ranks of Bleed. Damage dealt by
      the Bleeding condition inflicted by this jutsu is Force damage.</p><p>If
      this jutsu is used with your Ego Weapon as a component, the initial attack
      is made at advantage, and on a successful hit the creature's soul is
      marked with an tether that is only visible to those with chakra sight or
      true sight. The tether extends to the edge of this jutsu's range, and a
      creature that the tether is attached to has disadvantage on checks made to
      conceal themselves from you.</p><p>If a creature would leave the range of
      this jutsu the tether snaps and ends the effects of this jutsu on them,
      but their movement speed is halved until the end of your next
      turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3, the range by 15
      feet, and the damage by 2d8. If this jutsu is cast at B-Rank or higher, a
      creature must make a Charisma Saving Throw at the start of each of their
      turns the tether remains on them, having their movement speed halved on a
      failure.</p><p></p>
