name: Spiritual Arrest
type: spell
_id: hw2lnH9wo9tdahaU
img: systems/n5eb/assets/content/clans/seol.webp
system:
  description:
    value: >-
      <p>Your Spirit flares up its energy within your weapon, causing it to blaze with power for a short time. The next
      time you hit a creature with an attack that uses this weapon you deal an additional 2d8 damage, the damage type
      being determined by the type you selected in your Shared Power feature.</p><p>If this jutsu is cast on your Ego
      Weapon, on a successful hit ethereal chains explode outwards from the weapon, and the target creature must make a
      Strength Saving Throw, becoming Restrained on a failure. At the end of each of their turns that they remain
      Restrained, a creature must make a Strength Saving Throw to break the chains and end this jutsu's effects on
      them.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost by
      3 and the damage by 1d8. If this jutsu is cast at A-Rank or higher, you can choose to cause a creature that fails
      their saving throw to become Stunned instead of Restrained. If you do, they instead remake their saving throw at
      the start of each of their turns.</p>
