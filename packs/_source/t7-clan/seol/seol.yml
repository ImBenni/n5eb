system:
  description:
    value: >-
      <h3 id="one-body-two-minds-one-spirit">One Body, Two Minds, One Spirit</h3><p>The Seol clan are a collective of
      people that travel alongside spirits that take to their side early, usually choosing a specific one to make their
      partner. Using their bond, they are able to accomplish tasks that would otherwise be impossible without their
      help, and can wield their power with great efficiency.</p><h4 id="seol-traits">Seol Traits</h4><p><strong>Ability
      Score Increase</strong>: +2 to any ability score, +1 to any other ability score. <em>(Recommended: +2 Cha, +1
      Any)</em> <br /><strong>Speed</strong>: Your base walking speed is 30 feet. <br /><strong>Skill
      Proficiencies</strong>: Gain proficiency in 2 skills (your choice). <br /><strong>Weapon Proficiency</strong>: You
      are proficient in Martial Weapons</p>
