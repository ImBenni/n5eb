name: Controlling Seals
type: feat
_id: qQ0Q7HHZH4mknZ3F
img: systems/n5eb/assets/content/clans/shimura.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Shimura Clan, level 12+ <br />You are not
      the only one that can change the mindset of the enemy, the seals you create can as well. When taking this feat you
      gain the following benefits:</p><ul><li>Increase your Intelligence or Charisma score by 1, to a max of
      20.</li><li>The first time a creature makes a saving throw against a Shimura clan jutsu you cast, that target
      subtracts an amount equal to half your Intelligence modifier from the result. A creature can only be effected by
      this once per long rest.</li><li>When a target takes damage or is under the effects of a Shimura clan jutsu you
      cast of C-Rank or higher, you can choose to inflict 1 rank of the Charmed or Fear condition (your choice) which
      last a number of the rounds equal to your half Intelligence modifier. A creature can only be subject to this
      effect once per long rest.</li></ul>
