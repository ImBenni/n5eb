name: Pathological Deceiver
type: feat
_id: wtZDQOHzFD7YtTiZ
img: systems/n5eb/assets/content/clans/shimura.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Shimura Clan <br />Your clan's tradition
      for dark manipulation runs rich in your blood. You gain the following:</p><ul><li>Increase your Intelligence or
      Charisma score by 1, to a max of 20.</li><li>Your thoughts can't be read by telepathy or other means, unless its a
      jutsu or feature of B-rank or higher, or you allow it. You can present false thoughts to a creature who is
      attempting to read your mind with a jutsu of C-rank or lower by making a Charisma (Deception) check contested by
      the mind reader's Wisdom (Insight) check. Additionally, no matter what you say, jutsu or abilities that would
      determine if you are telling the truth indicates you are being truthful if you so choose, and you can't be
      compelled to tell the truth by such jutsu or abilities unless its B-rank or higher.</li><li>You cannot have
      disadvantage on Intelligence based skill-checks while you are conscious</li></ul>
    chat: ''
