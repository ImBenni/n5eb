system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Shimura Clan, level 4+ <br />You awaken
      an uncommon bloodline trait among the Shimura clan of Wind release. Your wind chakra infuses with your cunning
      blood and sharpened mind. You gain the following:</p><ul><li>Increase your Constitution or Intelligence score by
      1, to a max of 20.</li><li>You gain Wind Release Affinity, and learn one ninjutsu with the Wind Release keyword at
      a rank you can cast, no higher than C-Rank. This jutsu does not count against your number of jutsu
      known.</li><li>Ninjutsu you cast with the Wind Release keyword can benefit from your Master of Seals clan feature,
      and gain the Fuinjutsu keyword when you do so.</li></ul>
    chat: ''
