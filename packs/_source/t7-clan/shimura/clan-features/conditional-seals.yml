name: Conditional Seals
type: feat
_id: 9H1TZhc1XE8luKP6
img: systems/n5eb/assets/content/clans/shimura.webp
system:
  description:
    value: >-
      <p>Your prowess with fuinjutsu allows you to meticulously adjust the seals you place. At 11th level, when you
      create a seal using a Shimura clan jutsu that normally requires a bonus action to activate, you can instead remove
      that bonus action activation and replace it with a specific trigger of your choosing when the jutsu is cast. (Ex:
      An enemy draws their weapon)</p><p>At 18th level, when you cast a Ninjutsu with the Fuinjutsu keyword that would
      inflict a condition on a failed saving throw, you may spend 3 Seal Points and replace that condition with another
      Physical or Mental condition of your choice that they will instead gain. You can affect a jutsu this way twice per
      long rest.</p>
