system:
  description:
    value: >-
      <p>During an entire week of downtime, you inscribe the Mother of All Seals onto your chest. Once the seal is
      completed, you gain the ability to activate it as an Action. By doing so, you can select a target within 10 feet
      of you who is either Prone or Dazed. When the seal activates, it releases a black hole that engulfs the chosen
      target, imprisoning them within your body. This sealing process is irrevocable, permanently containing the target.
      Once this has happened, the target becomes sealed away permenantly, and you fall to 0 hit points and die. When you
      die this way, you cannot be revived by normal means.</p>
