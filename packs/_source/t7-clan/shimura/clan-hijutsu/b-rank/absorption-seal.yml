name: Absorption Seal
type: spell
_id: 3ZutGq1EgwZghbyv
img: systems/n5eb/assets/content/clans/shimura.webp
system:
  description:
    value: >-
      <p>As part of the action to cast this jutsu you place a seal on a surface, object, or willing creature within
      range.<br />  <em><strong>Activation:</strong></em> When you see the casting of a ranged Ninjutsu targeting a
      creature or space within 5 feet of this placed seal, as a reaction you can activate the seal to absorb the jutsu
      and reduce the damage taken by 5d10 + 10. Additionally, if the damage is reduced to 0, a creature who had the seal
      placed on them gains temporary Chakra Points equal to half the chakra cost of the jutsu absorbed, which last until
      the end of your next turn. After this effect has been triggered the jutsu ends.</p><p>You can only have a maximum
      of one Absorption Seal placed at one time. Casting this jutsu again while one Absorption Seal is currently paced
      causes the first placed seal to vanish.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3, damage reduction by 2d10, and the casting time by 2
      hours.</p><p></p>
