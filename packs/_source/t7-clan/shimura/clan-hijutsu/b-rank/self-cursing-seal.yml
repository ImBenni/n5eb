name: Self-Cursing Seal
type: spell
_id: aPYNpNSiQitRSJRR
img: systems/n5eb/assets/content/clans/shimura.webp
system:
  description:
    value: >-
      <p>Make a melee ninjutsu attack against a target in range. On a hit, you place a crippling seal on the target. The
      seal then conceals itself and is invisible to all creatures without Chakra Sight. Then, as a bonus action after
      the seal is placed, you can activate this seal. When activated, the seal spreads across the target's body, siezing
      its muscles in place. The target must succeed a Constitution saving throw, becoming paralyzed on a failed save, or
      no effect on a success.</p><p>At the end of the target's turns it makes a Chakra Control check against your
      Ninjutsu save DC, ending the jutsu's effects on a success.</p>
