system:
  description:
    value: >-
      <p>As part of the action to cast this jutsu you place a seal on a surface, object, or body part of your choosing
      within range. When you place this seal you choose a single nature release keyword that you can cast and it's
      damage type becomes the corresponding type. If you do not have a nature release this jutsu instead deals Force
      damage. <br />  <em><strong>Activation:</strong></em> As a bonus action on, you can activate this seal. When
      activated all creatures within 10 feet of the seal must make a Dexterity saving throw, taking 5d8 damage on a
      failed save or half as much on a success. After this effect has been triggered the jutsu ends.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and
      the damage by 2d8.</p>
