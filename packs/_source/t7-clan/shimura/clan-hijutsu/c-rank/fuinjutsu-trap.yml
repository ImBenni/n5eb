system:
  description:
    value: >-
      <p><em>A jutsu designed to be like Advanced Explosive Seal, but it sacrifices the damage to disorientate enemys
      over larger areas. </em>You place this seal on a surface within reach, and this seal expands into a 20 foot cube.
      <br />  <em><strong>Activation:</strong></em> As a bonus action, you can activate this seal causing the seal to
      implode. All creatures in the area must make a Strength saving throw. On a failed save, a target takes 4d10 Force
      Damage and gain 1 rank of Concussed, or only half damage and no further effect on a successful save. After this
      effect has been triggered the jutsu ends.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the damage by 2d10.</p>
