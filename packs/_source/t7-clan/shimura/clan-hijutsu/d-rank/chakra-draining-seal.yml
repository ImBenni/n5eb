system:
  description:
    value: >-
      <p>You attempt to place a seal on a creature to exhaust one's chakra. Make a melee ninjutsu attack against a
      creature in reach. On a hit, you deal your unarmed damage + 2d4 Chakra damage. Then for the next minute, that
      creature takes 1d4 Chakra damage at the start of its turns. At the end of the target's turns it makes a Chakra
      Control check against your Ninjutsu save DC, ending the jutsu's effects on a success.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the
      chakra damage by 1d4 and 1d4 respectively.</p>
