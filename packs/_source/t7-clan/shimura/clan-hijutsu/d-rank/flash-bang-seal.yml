system:
  description:
    value: >-
      <p>As part of the action to cast this jutsu you place a seal on a surface, object, or body part of your choosing
      within range. <br />  <em><strong>Activation:</strong></em> As a bonus action you can activate this seal. When
      activated you can cause a blinding light or loud deafening noise to emit from the seal. All creatures within 15
      feet of the seal that can see the light or hear the sound must succeed a Constitution saving throw, or become
      blinded or deafened (you pick when casting) until the end of its next turn. After this effect has been triggered
      the jutsu ends.</p>
