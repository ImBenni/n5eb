img: systems/n5eb/assets/content/clans/shimura.webp
system:
  description:
    value: >-
      <p><em>As part of casting this jutsu, you may pick up to 4 creatures who
      will not be effected by the jutsu.</em> You place a seal on a surface of
      your choosing. The seal then conceals itself and is invisible to all
      creatures without chakra sight. <br /> 
      <em><strong>Activation:</strong></em> As a bonus action on subsequent
      turns, you can trigger this seal's activation. Once activated, the seal
      conjures a lifelike mirage of the caster's choosing, manifesting within a
      10-foot radius around the seal. This illusionary display remains for one
      minute before gradually dissipating. All creatures who can see the mirage
      must make a Wisdom saving throw against your genjutsu save DC. A creature
      can only be affected by the mirage if it can see it, and the effect can
      only occur once per casting.</p><p><strong>Critical Success:</strong>
      Affected creature is able to resist this jutsu's effect, becoming immune
      to further castings of this jutsu until 3 turns have
      passed.</p><p><strong>Success:</strong> Affected creature is uneffected by
      the Genjutsu</p><p><strong>Failure:</strong> Affected creatures are fully
      convinced that what they are seeing is real. They gain 1 rank of fear or
      confused (your choice, but should be reflected in the
      mirage)</p><p><strong>Critical Failure:</strong> Same as failure, but it
      gains an extra rank of the applied condition.</p>
