img: systems/n5eb/assets/content/clans/shimura.webp
system:
  description:
    value: >-
      <p>You place a seal on the ground. The seal then conceals itself and is invisible to all creatures without chakra
      sight. <br />  <em><strong>Activation:</strong></em> As a bonus action on subsequent turns, you can trigger this
      seal's activation. When activated the seal releases a massive gust of force sending anything within range flying
      upward. Creatures within a 10 foot radius of the seal must make a Strength saving throw, taking 2d6 Force damage
      and being lifted 10 feet in the air on a failed save. Targets lifted by this jutsu remain that way until the end
      of the start of your next turn. After this effect has been triggered the jutsu ends.</p><p>Alternatively, this
      jutsu can deal no damage and instead lift willing creatures up to 30 feet in the air, but you must declare this
      during the casting of this jutsu.</p>
    chat: ''
