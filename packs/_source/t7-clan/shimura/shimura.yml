  description:
    value: >-
      <h3 id="the-power-to-get-what-you-want">The Power to Get What You Want</h3><hr /><p>The Shimura clan -- a clan
      that shocked even Madara Uchiha when he learned they were joining Konoha. Little is known of the Shimura, but what
      <em>is</em> known grants them terrifying potential. Often viewed as equals to the Sarutobi clan, this clan holds a
      considerable measure of sway in the shinobi world. The Shimura clan's true power is due to their highly developed,
      unique fuinjutsu which allows them to be an effective force of influence both on and off the battlefield.</p><h3
      id="shimura-traits">Shimura Traits</h3><hr /><ul><li><strong>Ability Score Increase:</strong> +2 Int, +1
      Cha</li><li><strong>Speed:</strong> Your base walking speed is 30 feet.</li><li><strong>Skill
      Proficiencies:</strong> Ninshou; then choose either Deception or Persuasion.</li></ul>
