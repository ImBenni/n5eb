system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Shinigami Clan, Level 16+<br />You awaken
      the 3rd and final form of your Zanpakutō, known as the Bankai. This power only emerges to the strongest of the
      Shinigami, so much so that its existence is considered a fable even amongst the clan's eldest ranks and now, this
      mythical power is yours to wield. You gain the following benefits;</p><ul><li>Once per Full Rest, while your
      Zanpakutō is in its Shikai, you can spend 5 chakra to transform it into its Bankai. Alternatively, if your
      Zanpakutō is not transformed, you can spend 10 chakra as an action to activate its Bankai form. Your Bankai
      remains active until the end of combat.</li><li>While your Bankai is active your Dexterity and Intelligence scores
      become 24.</li><li>While your Bankai is active you gain all the benefits of your Shikai.</li><li>You gain 5
      additional Shikai points to spend on Shikai upgrades that you gain access to while your Bankai is active. Once
      chosen these cannot be changed.</li><li>You gain 1 Bankai Upgrade which you gain access to while your Bankai is
      active. Once chosen this cannot be changed.</li></ul>
