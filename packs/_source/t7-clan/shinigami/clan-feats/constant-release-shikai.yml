    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Shinigami Clan, Level 8+<br />Your
      Zanpakutō can never be sealed once gaining its true form, granting it stunted growth, but more base power. You
      gain the following benefits:</p><ul><li>Increase your Strength or Dexterity score by +1, to a maximum of
      20.</li><li>Your Zanpakutō is always in its Shikai form.</li><li>Your Zanpakutō becomes Superior
      quality.</li><li>You cannot take the Shikai Growth feat.</li></ul>
