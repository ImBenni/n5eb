system:
  description:
    value: >-
      <p>At 7th level, you learn the true name of your Zanpakutō, and when you speak its name, your blade evolves into a
      new form. Once per short rest, As a Bonus Action while in combat, you can shout the name of your blade to
      transform it into its Shikai. While your weapon is in its Shikai it's look and feel evolve giving it new abilities
      or perhaps changing it completely. Discuss with your DM what your Shikai looks like. Your Shikai remains active
      for 10 minutes or until you fall unconscious.</p><p>You have 5 Shikai Points to distribute into the Shikai
      Upgrades detailed at the end of the clan, you gain the benefits of these upgrades while your Shikai is active.
      Unless otherwise stated you can only select a Shikai Upgrade once. You gain an additional 3 Shikai Points at 11th,
      and 18th level. You cannot change your selections after choosing.</p>
