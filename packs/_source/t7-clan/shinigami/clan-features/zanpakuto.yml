    value: >-
      <p>Also at the 1st level, you gain a weapon that is the manifestation of your chakra, called a Zanpakutō, which
      takes the form of a Greater Katana. Weapon attacks you make with your Zanpakutō can use Intelligence in place of
      Strength or Dexterity for attack and damage rolls. If your Zanpakutō is destroyed, you regain it fully restored on
      a rest.</p>
