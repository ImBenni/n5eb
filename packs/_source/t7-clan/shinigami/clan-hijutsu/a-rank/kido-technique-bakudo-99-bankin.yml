system:
  description:
    value: >-
      <p>You hold your palms away from yourself, with your arms extended out to the sides, before clasping your hands
      together, with the fingers intertwined intricately, causing your target's arms to be bound to their back with
      spiritual fabric and iron shafts. Select a target creature in range. They must succeed 3 saving throws in the
      following order;</p><p><strong>Strength Save:</strong> On a failed save, the creature is restrained and cannot
      weave hand seals.</p><p><strong>Dexterity Save:</strong> On a failed save, the creature takes 8d8 Piercing Damage
      as they are nailed to the ground. On a success, creatures take half damage.</p><p><strong>Constitution
      Save:</strong> On a failed save, creatures gain two ranks of Weakened and gain disadvantage on all attack rolls,
      as their body is out of sync.</p><p></p>
