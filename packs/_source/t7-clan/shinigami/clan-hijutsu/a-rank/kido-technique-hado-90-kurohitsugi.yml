system:
  description:
    value: >-
      <p>Kurohitsugi is a high-level Kidō which seals its target in a black spiritual coffin. You generate purple and
      black chakra, which envelops the target with a powerful torrent of gravity before taking the form of a box of
      black energy, covered in several spear-like protrusions which pierce the box, lacerating the one inside from head
      to toe.</p><p>Select a point in range to summon the coffin. All creatures inside when it appears must make a
      Strength saving throw and Dexterity saving throw. On a failed Strength save, the creature becomes restrained. On a
      failed Dexterity save, the creature takes 8d10 Necrotic damage, or half as much on a success. At the start of each
      creature's turn, they remake the Strength and Dexterity saving throws, continuing to be restrained on a failed
      Strength save and taking 8d10 necrotic damage on a failed Dexterity saving throw, or half as much on a
      success.</p>
