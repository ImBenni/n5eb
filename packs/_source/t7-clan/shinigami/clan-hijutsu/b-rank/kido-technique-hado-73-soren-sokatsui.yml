system:
  description:
    value: >-
      <p>An advanced form of Hado #33: Sokatsui. Generating blue energy with your index and middle fingers, you make a
      pushing motion with both palms to push the gathered energy toward a creature in a concentrated blast.</p><p>Make 2
      ranged ninjutsu attacks, either targeting the same or different creatures, dealing 4d8 + your Ninjutsu ability
      modifier Force damage on each hit. If the same creature is hit by two or more attacks from this jutsu they must
      also make a Constitution saving throw, gaining 2 ranks of burned on a failed save.</p><p>  <strong>At Higher
      Ranks</strong>: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the
      damage by 1d8. If cast at S-Rank, increase the number of attacks by +1.</p>
