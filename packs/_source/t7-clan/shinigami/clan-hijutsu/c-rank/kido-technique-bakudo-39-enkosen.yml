system:
  description:
    value: >-
      <p>Using either both hands or their Zanpakutō in a blocking motion, the practitioner generates a dull yellow
      energy, which takes the form of a large spinning disk of condensed chakra, in front of themselves, blocking an
      opponent's attack.</p><p>When you are targeted with an attack, or forced to make a saving throw from a line or
      cone area of effect, you can summon this disk, giving yourself 2d10 temporary hit points and advantage on Strength
      and Dexterity saving throws, until the start of your next turn. If you succeed on either saving throw, you take no
      damage or effects.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3 and the Disk's Hit Points by 1d10.</p>
    chat: ''
  source:
