system:
  description:
    value: >-
      <p>You aim the palm of your hand at a creature in range and generate a torrent of blue chakra at them.</p><p>Make
      a ranged ninjutsu attack against a creature in range. On a hit, you deal 6d6 Force damage and the creature must
      succeed a Constitution saving throw, becoming dazed on a failed save. If the target is restrained you can forgo
      gaining advantage to your attack roll and instead impose disadvantage on the creature's Constitution saving
      throw.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and the damage by 2d6.</p>
