system:
  description:
    value: >-
      <p>As part of casting this jutsu you must have 1 free hand for hand seals, or your Zanpakutō. Levitating your
      sheathed Zanpakutō in front of them, the practitioner lightly hits one of its ends, causing it to spin like a fan.
      Stopping it, the practitioner fires a widening tornado-like blast.</p><p>All creatures in a 30-foot cone in front
      of you must make a Strength save, taking 4d10 Wind damage and falling prone on a failed save, or half damage and
      no effects on a success.</p><p><strong>At Higher Ranks:</strong> At Higher Ranks: For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3, the length of the cone by 10 feet, and the damage by
      1d10.</p>
