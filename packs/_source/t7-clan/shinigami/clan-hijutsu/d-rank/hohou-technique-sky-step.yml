system:
  description:
    value: >-
      <p>A highly advanced, secret form of the water walking and wall walking technique most shinobi learn, you gather
      the chakra beneath your feet to run on air. Until the end of your turn, you gain a flying speed equal to your
      walking speed.</p><p>If you have not landed, the chakra slows you and brings you safely to the nearest
      surface.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      by 3. If you cast this Jutsu at A-Rank its duration becomes 10 minutes.</p>
