system:
  description:
    value: >-
      <p>You point at your target with your index finger, as a small amount of chakra is dispelled from the tip of the
      index finger with enough force to thrust a considerable amount of kinetic energy at a target.</p><p>Select a
      target creature in range. They must succeed a Strength saving throw or be knocked back by an amount equal to 5
      times your ninjutsu modifier. If a creature knocked back by this jutsu collides with a solid object, their
      movement is stopped, taking falling damage as if they had fallen an equal distance.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the range by
      10 feet, and the knockback by 10 feet.</p>
