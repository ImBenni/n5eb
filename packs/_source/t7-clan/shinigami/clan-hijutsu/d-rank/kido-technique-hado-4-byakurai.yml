system:
  description:
    value: >-
      <p>You gather high-density spiritual energy, which you discharge as you point at a creature, and generate a
      concentrated bolt of chakra.</p><p>Make a ranged ninjutsu attack against a creature in range, dealing 3d6
      lightning damage on a hit. All creatures in between you and the target must all make a Dexterity saving throw,
      taking half damage on a failed saving throw.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost by 3 and the damage by 2d6.</p>
