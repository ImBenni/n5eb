system:
  description:
    value: >-
      <p>While your Shikai is active, you gain the ability to launch a wave of chakra from your sword. As an action, you
      can spend 10 chakra to swing your sword launching a wave in either a 10-foot wide 60-foot-long line, or a 30-foot
      cone. Creatures in the area must make a Dexterity saving throw against either your Ninjutsu or Taijutsu Save DC,
      taking three times your weapon damage on a failed save. You can take this Shikai Upgrade a second time doubling
      the range of the affect.</p>
