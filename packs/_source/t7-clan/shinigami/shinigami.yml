  description:
    value: >-
      <h3 id="hell-s-butterfly">Hell's Butterfly</h3><p>The Shinigami Clan is a clan of no clear family name, although
      they are believed to have originated near the border of the Land of Iron and Fire. Members of this clan, as
      opposed to blood, are connected by similar beliefs and ideals, and wield a special sword that manifests their
      chakra and spirit, the Zanpakutō. Masters of both blade and jutsu, the Shinigami are a dominant force of the
      battlefield.</p><h4 id="shinigami-traits">Shinigami Traits</h4><p><strong>Ability Score Increase:</strong> +2 Int,
      +1 Str or Dex <br /><strong>Speed:</strong> Your base walking speed is 30 feet.<br /><strong>Skill
      Proficiencies:</strong> Ninshou, Martial Arts <br /><strong>Weapon Proficiency:</strong> Katana</p>
