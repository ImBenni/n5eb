img: systems/n5eb/assets/content/clans/silverhand.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Silverhand Clan, Level 4+ <br />All the
      parties and fame may have messed up your body and mind, but despite everything, you still know how to put on a
      bloody good show. You gain the following benefits;</p><ul><li>Increase your Charisma score by 1, up to the maximum
      of 20.</li><li>You may use Performance in place of Chakra Control for Concentration checks when concentrating on
      jutsu with the Auditory keyword.</li><li>When you cast a jutsu with your chosen branch's keyword, you may add the
      <strong>NT (Instruement)</strong> and <strong>V (Vocal)</strong> components. If you do, the jutsu is treated as
      gaining the Auditory keyword.</li><li><p>While concentrating on a jutsu with the Auditory keyword, at the start of
      each of your turns, you may spend one Hit Die or Chakra Die. One ally of your choice that can hear your
      performance within 30 feet regains either</p><ul><li>A number of chakra points equal to the result of your hit die
      + your Charisma modifier.</li><li>A number of hit points equal to the result of your chakra die + twice your
      Charisma modifier.</li></ul></li></ul>
