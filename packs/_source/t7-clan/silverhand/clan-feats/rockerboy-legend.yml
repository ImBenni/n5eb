folder: 9qHIIF0PFjCJVlqd
name: Rockerboy Legend
type: feat
_id: WAR4FWvfar6pgg1C
img: systems/n5eb/assets/content/clans/silverhand.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Silverhand Clan <br />Though you are still
      an up and in the music industry, you have a lot of connections that are willing to make an investment on you. You
      gain the following benefits;</p><ul><li>Increase your Charisma or Wisdom score by 1, up to the maximum of
      20.</li><li>When a creature would roll a check to remember you, or recall information about you, they treat any
      result of 9 or lower on the d20 as a 10. At 10th level, creatures instead treat any result below 20 on the d20, as
      a 20.</li><li>By spending 1 minute studying a piece of music, you are able to fully comprehend, and play it.
      Additionally, you are able to understand the writer's mindset when they wrote it, and small personal details about
      their life. At 10th level, you are a real natural. You can do this in just 30 seconds.</li><li>You cannot gain
      disadvantage on Performance checks related to playing music.</li><li>You may spend Downtime to run a
      <em><strong>Concert</strong></em>, shown below;</li></ul><blockquote><h5 id="running-a-concert">Running a
      Concert</h5><p>A Concert is a Downtime activity available exclusively to the Silverhand (though anyone can attend
      these concerts). They provide a great opportunity to make money, as well as make new connections that could help
      further the story. They could have a good time (or a bad time), your call. <br /> To run a concert, use the
      following rules (Credit to <a
      href="https://www.reddit.com/r/mattcolville/comments/77r0tq/rock_on_orlane_concert_rules_for_5e/">mattcolville</a>
      on Reddit for making rules for 5e):</p><ol><li><p><strong>Prepare a Concert.</strong> The first step you must take
      is to prepare the concert. Where will the location be? What will be the venue? How many seats? What songs will we
      play? These are many questions you must answer, and these questions will take <em>time</em>. <br /> You may spend
      X amount of Downtime to prepare a concert of a certain <strong>rank</strong>. You do not need to spend downtime
      all at once. The higher the rank of the concert, the more prestigious the guests may be. For instance, an S-Rank
      concert may attract the attention of the local Kage of the village, or even a Fuedal Lord. <em>(E-Rank: 2, D-Rank:
      5, B-Rank: 9, A-Rank: 14, S-Rank: 20)</em>. <br /> The rank you select will also determine your starting
      <strong>Reputation</strong>, which is how well liked you are amongst the attendents before the show <em>(E-Rank: 5
      Reputation, D/C-Rank: 4, B/A-Rank: 3, S-Rank: 2)</em></p></li><li><p><strong>Choose your Songs.</strong> You can't
      have a concert without music right? Each concert will have a 7-song set. Each song can be one of the following
      types: Each type provides an increase to the Performance check you must roll to play each song, and an increase to
      <strong>Reputation</strong> you gain (explained later):</p><ul><li><strong>Classic Song.</strong> DC: +3 / Rep:
      +1</li><li><strong>New Song.</strong> DC +7 / Rep: +2</li><li><strong>Experimental.</strong> DC +11 / Rep
      +4</li><li><strong>Personal Song.</strong> DC +15 / Rep +7</li></ul></li><li><strong>Running the Concert.</strong>
      Decide the order that you wish to play the 7-song set in. For each song, the Silverhand will make a Performance
      check vs. a DC 5 + the DT cost to run the concert for its rank + the bonus to DC from the song type. The
      Silverhand cannot cast any jutsu or use any non-Silverhand abilities to boost their result, however, one ally may
      use one jutsu or ability to boost their result, that does not affect the crowd in anyway (this will immediately
      end the Concert). On a success you gain 1 <strong>Reputation Point</strong> + the Reputation bonus from the song
      type. If you succeed by 10 or more, gain an additional 2 <strong>Reputation</strong>. If you fail, you lose -1
      <strong>Reputation</strong>. If you fail by 5 or more, lose -2. If you fail by 10 or more , you lose -3 and gain
      one <strong>Strike</strong>.</li><li><strong>Determine the Results.</strong> If your <strong>Reputation</strong>
      reaches 0 or you gain 3 <strong>Strikes</strong>, the concert ends early as you are boo'd offstage. If you
      succeed, horray! Time for profits. Roll Xd50, where X is equal to 1 + the rank of the concert <em>(E-Rank: 0,
      D-Rank: 1, C-Rank: 2,etc...)</em>. This is the number of attendees. <strong>The calculation to determine the Ryo
      gained is as follows:</strong> # of Attendees x Final Reputation x 3. Distribute as you
      wish.</li></ol></blockquote>
