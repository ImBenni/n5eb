system:
  description:
    value: >-
      <p>There are two distinct styles of Instruements that the Silverhand clan employs, <em>Violence</em> and
      <em>Melody</em>. At 1st level, select one of the following branches; You cannot change this choice later. Also,
      gain one <strong>Instrument</strong> from the <strong>Silverhand Shop Table</strong>, on the house of
      course!</p><ul><li><p><strong>Melody:</strong> Those from this branch of the clan focus more on the music. The
      message. They support their allies and keep the music rocking all night long.</p><ul><li><strong>The Finest
      Booze:</strong> At 1st level, you always keep a bottle of the finest booze with you. It fuels your melancholy
      tunes. You gain access to the <em>Medical</em> keyword, as detailed in the <em><strong>Medical Release:
      Support</strong></em> Chakra Feat. You also gain proficiency in
      Persuasion.</li></ul></li><li><p><strong>Violence:</strong> If you're looking to cause havoc, mayhem, and riots
      across the city in the name of justice, the Violence branch are the ones you want playing the music as you
      do.</p><ul><li><strong>Trusty Smokes:</strong> At 1st level, level, you always have a smoke handy. You gain the
      Fire Release affinity. You also gain proficiency in Deception.</li></ul></li></ul>
