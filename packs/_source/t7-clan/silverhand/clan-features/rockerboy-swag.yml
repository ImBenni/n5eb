system:
  description:
    value: >-
      <p>At 7th level, you have impeccable fashion choice, always knowing the best type of clothing to show that you
      mean business. You gain expertise in Performance and acquire the Rockerboy Swag outfit. This outfit may be worn
      over or under your armor.</p><p>While wearing the Rockerboy Swag, you gain expertise in the skill proficiency
      granted by your chosen branch. You also gain a +1d4 bonus to Intimidation checks.</p><p>At 18th level, this bonus
      becomes a +1d6.</p>
