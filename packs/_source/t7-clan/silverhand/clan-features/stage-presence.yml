system:
  description:
    value: >-
      <p>Also at 1st level, you may use your Charisma modifier as your casting modifier for Jutsu with the Auditory
      keyword. Jutsu of this type gain two new components: "NT (Instrument), "V (Vocal)". You must be able to utilize
      these components to use Charisma as your casting modifier for these jutsu this way.</p><p>At 3rd level, you gain
      access to new Performance-based <strong>Skill-Based Action</strong>, <em><strong>Track
      Switch.</strong></em></p><ul><li><em><strong>Track Switch.</strong></em> While benefitting from a "Live Stage"
      Silverhand Hijutsu, make a Performance check vs. a DC 10 as an Action or Bonus Action. On a pass, switch the
      jutsu's <em>Style</em>. Regain 1 <strong>Vice Point</strong> for every +10 gained over the DC, once per casting.
      On a fail the jutsu ends.</li></ul>
    chat: ''
