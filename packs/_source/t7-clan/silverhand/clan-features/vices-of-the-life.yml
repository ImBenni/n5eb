folder: uTa2Hgp80N1ix4LZ
name: Vices of the Life
type: feat
_id: zWEAIdmnmKLd0qAT
img: systems/n5eb/assets/content/clans/silverhand.webp
system:
  description:
    value: >-
      <p>At 3rd level, you recognize that all musicians need a vice to keep them going. You gain a number of
      <strong>Vice Points</strong> equal to your proficiency bonus per long rest, regaining half your spent Vice Points
      on a short rest. You may spend your Vice Points to do the following; Some options require you to be a specific
      branch. Some Silverhand Hijutsu may allow you to spend <strong>Vice Points</strong> to gain an additional
      effect.</p><ul><li><p><strong>Always Ready to Party:</strong> When you would roll for initative, you may spend any
      number of <strong>Vice Points</strong> to increase your initative result by +1 per point spent. If this allows you
      to go first in initative, you gain an additional Action which can only be used to cast a "Live Stage" Silverhand
      Hijutsu. <br /> At 11th level, you instead gain a +2 bonus to initative per <strong>Vice Point</strong>
      spent.</p></li><li><strong>Music of the Soul:</strong> When you cast a jutsu with the Auditory keyword, you may
      spend one <strong>Vice Point</strong> to double the range of the jutsu, and if it is a Silverhand Hijutsu, gaining
      a +1 to hit or Save DC against such targets in addition.</li><li><p><strong>Rock On, All Night Long (Melody
      Only):</strong> When you cast a Silverhand Hijutsu that provides hit points, temporary hit points, damage
      reduction, or a boost or boon, you may spend one <strong>Vice Point</strong> to grant all allies benefitting from
      the jutsu 2d8 hit points and 2d8 temporary hit points (which stack with other sources of temporary hit points).
      <br /> At 11th level, you may spend an additional <strong>Vice Point</strong> to grant all allies resistance to
      the next instance of damage they take within the next minute.</p></li><li><p><strong>Burning Down the House
      (Violence only):</strong> When you a Silverhand Hijutsu that deals damage, you may spend one <strong>Vice
      Point</strong> to give the jutsu the Fire Release keyword, and deal double damage to structures, constructs, and
      objects. Against all targets, increase the damage dealt by twice your Charisma modifier in fire damage. <br /> At
      11th level, you may spend an additional Vice Point to ignore the DR and resistance these structures, constructs,
      and objects may have.</p></li></ul>
    chat: ''
