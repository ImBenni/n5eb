system:
  description:
    value: >-
      <p>You unleash the rage, pain and sorrow that lies deep within your metal heart. Creating a creature that is
      formed from the pure, metallic style.</p><p>This creature can take whatever form you wish – most Silverhand
      members of the <strong>Violence</strong> branch create this image as a giant Samurai, most from the
      <strong>Melody</strong> create a giant dragon.</p><p>You summon forth a <em><strong>Metal Soul</strong></em>, the
      Metal Soul has the following in game statistics, and uses your Ninjutsu or Genjutsu ability modifier for its
      attack roll and Save DC;</p><p>You may command the Metal Soul on your turn as a Bonus action or Reaction to take
      its Action and move. The Metal Soul may take a bonus action as part of taking its Action once per round. Your
      Metal Soul may take a Reaction without any input from you.</p><p>If you cast this jutsu while concentrating on at
      least 2 Silverhand Hijutsu with the Auditory keyword, this jutsu does not count against your concentration limit,
      and its chakra cost is halved</p>
