system:
  description:
    value: >-
      <p><em>(Any creature may assist you in the casting of this jutsu, regardless of clan, if they have an
      Instrument.)</em></p><p>An advanced, and more energetic version of <em><strong>Song of War</strong></em>, you
      unleash a legendary riff to empower your allies. Each creature of your choice within 45 feet of you begins to feel
      the pounding music, giving them the energy and power to fight.</p><p>At the beginning of their turns, they may
      select one of the following bonuses, gaining it until the start of their next turn.</p><ul><li>+5 bonus to checks
      to maintain concentration, or to clash with opposing Jutsu.</li><li>+4 bonus to a saving throw of their
      choice.</li><li>+3 bonus to weapon attack and damage rolls within a specific weapon type</li><li>+3 bonus to
      Ninjutsu, Genjutsu or Taijutsu attack rolls.</li><li>+2 to Ninjutsu, Genjutsu or Taijutsu save DC</li><li>+1 to
      Critical Threat range for all attack types.</li></ul><p><strong>Combination:</strong> <em>If this Jutsu is cast as
      a Combination with two or more casters, increase its range by 20ft. Any creature who assists in casting this Jutsu
      as a combination Jutsu increases the range of this Jutsu by one step based on the highest Charisma Modifier within
      the group of casters. (+0-1: No change, +2: Increase the range by 40ft, +3-4: Increase the range by 60ft, +5:
      Increase the range by 100ft)</em></p>
