folder: fBwcvaO6P0BWGmCX
name: Live Stage Legendary Performance
type: spell
_id: fOBulPpTuaXd8vtF
img: systems/n5eb/assets/content/clans/silverhand.webp
system:
  description:
    value: >-
      <p>As a requirement to activate this Jutsu, you must have the <em><strong>Live Stage: First Chord</strong></em>
      and either <em><strong>Live Stage: A Thing of Beauty</strong></em> or <em><strong>Live Stage: Chippin'
      In</strong></em> Jutsu active. You end your concentration on that Jutsu and this one takes its place, maintaining
      the same duration limitation and Jutsu casting restrictions.</p><p>You keep all the effects of that Jutsu,
      stacking them with this Jutsu's effects. You turn up the volume, crank up the intensity, and let out everything
      you have inside of you, enhancing your performance even further.</p><p>You gain one of the following abilities,
      chosen by your choice between <em><strong>Ballad</strong></em> or
      <em><strong>Punk</strong></em>.</p><ul><li><p><em><strong>Ballad:</strong></em> On your turn, as a bonus action
      you may gift an ally within range that can hear you a <em><strong>Boon of Metal</strong></em> , this Boon of Metal
      can be expended by them at any time to grant themselves advantage on any D20 roll.<br /> For each additional
      <em><strong>Boon of Metal</strong></em> expended on a single roll, they add another d20, and may choose which one
      they keep. Creatures can have any number of Boons, and lose all of them at the end of a minute, or whenever this
      Jutsu ends. If a creature has a <em><strong>Boon of Metal</strong></em> from the <em><strong>Ballad</strong></em>
      mode of this Jutsu , and you switch to <em><strong>Punk</strong></em>, all boons they have swap their type to the
      type granted by the Punk mode of this Jutsu.</p></li><li><em><strong>Punk:</strong></em> On your turn, as a bonus
      action, you may gift an ally within range a <em><strong>Boon of Metal</strong></em>, this Boon of metal can be
      expended on their turn at any time to grant a Jutsu they cast an additional 2 die of damage. Creatures can have
      any number of Boons, and lose all of them at the end of a minute, or whenever this Jutsu ends. If a creature has a
      <em><strong>Boon of Metal</strong></em> from the <em><strong>Punk</strong></em> mode of this Jutsu , and you
      switch to <em><strong>Ballad</strong></em>, all boons they have swap their type to the type granted by the Punk
      mode of this Jutsu.</li></ul><p><strong>At Higher Ranks:</strong> For each rank above B-Rank, this Jutsu costs 3
      more chakra. At S-Rank, you instead grant your allies 1d4 <em><strong>Boons of Metal</strong></em>.</p>
