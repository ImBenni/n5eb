system:
  description:
    value: >-
      <p>As a requirement to activate this Jutsu, you must have the <em><strong>Live Stage: First Chord</strong></em>
      Jutsu active. You end your concentration on that Jutsu and this one takes its place, maintaining the same duration
      limitation and Jutsu casting restrictions. You keep all the effects of that Jutsu, stacking them with this Jutsu's
      effects. You continue your riff, opening into a deeper, more thoughtful tune as your song continues. You gain one
      of the following abilities, chosen by your choice between <strong>Ballad</strong> or
      <strong>Punk</strong>.</p><ul><li><em><strong>Ballad</strong></em>: For the duration of this Jutsu, whenever an
      allied creature that can hear you would start their turn that isn't Dying or Incapacitated within 30ft of you,
      that creature heals 1d4 hit points.</li><li><em><strong>Punk</strong></em>: Whenever you would unleash your blast
      of sound, you may choose any number of creatures within the area of effect to be unaffected by it.</li></ul>
