system:
  description:
    value: >-
      <p>As a requirement to activate this Jutsu, you must have the <em><strong>Live Stage: First Chord</strong></em>
      Jutsu active. You end your concentration on that Jutsu and this one takes its place, maintaining the same duration
      limitation and Jutsu casting restrictions. You keep all the effects of that Jutsu, stacking them with this Jutsu's
      effects. You fill your song with anger and hatred, raging against the machine that shackles you, you gain one of
      the following abilities, chosen by your choice between <em><strong>Ballad</strong></em> or
      <em><strong>Punk</strong></em>.</p><ul><li><em><strong>Ballad:</strong></em> Each ally currently gaining a bonus
      to attack and damage rolls also gains a +1 bonus to their Critical Threat range with attacks made against
      constructs, or creatures with temporary hit points or damage reduction. They ignore any damage resistances or
      reduction that objects, structures and constructs would have.</li><li><em><strong>Punk:</strong></em> Your blast
      of sound increases to a 60ft cone, and it's damage becomes 5d12. Additionally, the saving throw is made at
      disadvantage, and whenever a creature fails it, they are knocked pone. Damage dealt by this ignores damage
      resistance or reduction that structures, objects or constructs would have.</li></ul>
    chat: ''
