system:
  description:
    value: >-
      <p>You begin a melodious tune, getting your allies prepared for combat as
      the music begins to thump in the background. When you cast this Jutsu,
      choose between Ballad or Punk, your choice remains the same through all
      Jutsu with the "Live Stage:" name.</p><p>Ballad: For the duration of this
      Jutsu, whenever an allied creature within 30 feet of you that can hear you
      would make an Attack Roll, Saving Throw, or Skill Check, they add +2 to
      that roll.</p><p>Punk: For the duration of this Jutsu, on your turn as an
      action, you can unleash a blast of sound. Each creature within a 30-foot
      cone that can hear you must make a Constitution saving throw, taking 2d8
      Force damage and being Concussed and Deafened until the end of their next
      turn on a failed save. Creatures deafened this way are still able to hear
      Jutsu you cast with the Auditory keyword as your chords directly strike
      their soul.</p>
