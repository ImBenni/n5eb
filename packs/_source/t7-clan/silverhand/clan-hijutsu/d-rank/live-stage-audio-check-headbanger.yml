system:
  description:
    value: >-
      <p>You play a melodious tune, restoring life and energy to a creature that can both hear and see you.</p><p>Choose
      one willing creature within range, that creature gains 2d6 + your Genjutsu ability modifier as Temporary hit
      points. For as long as they have these temporary hit points, they gain a +4 bonus to the next three damage rolls
      they make.</p><p><em><strong>Melodic Vice.</strong></em> As part of casting this jutsu, you may spend up to 3
      <strong>Vice Points</strong>. For each Vice Point spent, increase the temporary hit points by 1 step (up a d12),
      and the damage bonus by +1.</p><p><strong>At Higher Ranks:</strong> For each rank above D-Rank, this Jutsu costs 3
      more chakra, increases it's temporary hit points by 1d8, and may target one additional creature.</p>
