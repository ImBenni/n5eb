system:
  description:
    value: >-
      <p>Though you spend a lot time around a bunch of people, you hate it when your personal space is violated and
      these haters are pushing you to your limit. Make three melee Taijutsu attacks with your Instrument. On each hit,
      you deal your [Weapon's Damage Die]. If you hit with at least two of these attacks, the target must make a
      Strength saving throw or be knocked prone. This jutsu's effects changed based on your chosen
      branch.</p><ul><li><strong>Melody:</strong> The target makes their saving throw at disadvantage, and on a failed
      save, they are also knocked back 30 feet as you play a smooth tune that produces a strong
      shockwave.</li><li><strong>Violence:</strong> Your melee attacks gain a +1 bonus to critical threat range, and add
      half your ability modifier to your damage rolls, as opposed to none.</li></ul><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If cast to B-Rank or higher,
      increase the damage die by +1. If cast to S-Rank, increase the damage die by +1.</p>
