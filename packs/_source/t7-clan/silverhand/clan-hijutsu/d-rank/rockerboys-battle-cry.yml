system:
  description:
    value: >-
      <p>You unleash a scream of hatred and violence against all those who have wronged you. Each creature of your
      choosing within 10ft of you must make a Wisdom saving throw, on a failed save they become Dazed, Deafened and gain
      1 rank of Fear.</p><p><em><strong>Violent Vice.</strong></em> As part of casting this jutsu, you may spend up to 1
      <strong>Vice Point</strong>. If you do, creatures within 5 feet of you roll at disadvantage.</p><p><strong>At
      Higher Ranks:</strong> For each rank above D-Rank, this Jutsu costs 3 more chakra, and increases its range by
      10ft.</p>
