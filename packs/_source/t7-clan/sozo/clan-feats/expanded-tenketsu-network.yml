    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Sōzō Clan<br />Some members of the clan
      possess more chakra than average as a result of having 380 Tenketsu as opposed to the regular 361, you are one of
      them.</p><ul><li>Increase your Constitution score by 1, to a maximum of 20.</li><li>Increase your Chakra Point
      total by an amount equal to your level. Thereafter, each time you gain a level, Increase your Chakra Point total
      by +1.</li><li>You gain resistance to Chakra Damage.</li></ul>
