system:
  description:
    value: >-
      <p>You begin to nurture your abilities with the Sōzō clan's dojutsu, the Naibugan, an eye of immaculate vitality
      and cellular analysis. At 1st level, you gain access to <em><strong>Sōichi</strong></em>. You gain access to more
      Naibugan advancements as you reach higher levels. You can activate the Naibugan as a bonus action and it remains
      active for up to 10 minutes. For the duration, you can deactivate and reactivate the Naibugan at no additional
      cost. You can use the Naibugan twice before needing to take a long rest to regain its uses. Once its uses are
      expended, you can activate the Naibugan again by spending 10 chakra.</p>
    chat: ''
