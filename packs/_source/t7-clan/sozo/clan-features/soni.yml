system:
  description:
    value: >-
      <p>At 3rd level, you have attained an intermediate mastery of your dojutsu. Your Naibugan gains the following
      benefits:</p><ul><li><em><strong>Interior Vision II:</strong></em> Your ability to perceive damage on creatures
      has advanced. You can now detect the presence of diseases, curses, and other afflictions on a creature that would
      be undetectable by medical jutsu. You gain a 1d6 bonus to Medicine and Insight checks when observing a
      creature.</li><li><em><strong>Restorative Power II:</strong></em> You can spend one Restoration Cell when you cast
      a Ninjutsu with the Medical Release keyword that restores hit points or removes conditions to increase its range
      to 120 feet and increase the healing die by one step.</li></ul>
