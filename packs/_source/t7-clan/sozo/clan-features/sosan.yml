system:
  description:
    value: >-
      <p>At 7th level, your Naibugan has reached full development. Once matured, it can only improve through further
      training. You now regain expended uses of your Naibugan after a short rest. Choose one of the following additional
      features. At 11th, 15th, and 18th levels, you can select another feature from this
      list.</p><ul><li><em><strong>Interior Vision III:</strong></em> You have honed your ability to perceive damage on
      creatures to its peak. You know the current hit points and total hit points of all creatures within 120 feet of
      you.</li><li><em><strong>Interior Vision IV:</strong></em> You have mastered your understanding of the body's
      twelve systems. As an action, you can focus your sight to bypass a creature's bodily defenses. While your Naibugan
      is active and you maintain concentration, damage from jutsu you cast with the Medical keyword ignores one of the
      target's resistances, and converts one immunity into a resistance.</li><li><em><strong>Restorative Power
      III:</strong></em> When you activate your Naibugan, you may spend one Restoration Cell to cause both you and a
      creature you can see within 120 feet to regain hit points by rolling a number of d4s equal to your
      level.</li><li><em><strong>Restorative Power IV:</strong></em> When you cast a jutsu with the Medical keyword that
      restores hit points, you can spend one Restoration Cell to gain temporary hit points equal to your proficiency
      bonus.</li><li><em><strong>Restorative Power V:</strong></em> You may spend one Restoration Cell when you heal a
      creature that has taken damage to grant them immunity to one of the damage types they suffered. Alternatively, if
      you remove a Physical, Elemental, or Mental condition from a creature, you can spend one Restorative Cell to make
      them immune to one of the conditions they suffered. Immunities granted this way last until the end of the
      creature's next turn.</li></ul>
