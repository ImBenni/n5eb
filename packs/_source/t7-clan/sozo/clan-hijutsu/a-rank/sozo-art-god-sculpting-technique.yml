folder: No8cS7pkf1z6jGT5
name: Sozo Art God Sculpting Technique
type: spell
_id: TWTh9mBHPuo3OCOw
img: systems/n5eb/assets/content/clans/sozo.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Naibugan</strong></em> clan feature
      active. This technique allows you to focus the full power of your Naibugan on specific cells within the body,
      enabling you to recall cellular memory and force them to replicate. This process allows you to sculpt and form new
      body parts for a creature that has suffered severe damage. This technique can even revitalize those who have
      recently died or are on the brink of death, reconstructing, repairing, and reattaching organs and
      limbs.</p><p>Select one creature within range. The target creature recovers one limb or organ that has been
      damaged or missing. If the target of this jutsu is a creature that has been dead no longer than 1 hour, the
      creature is restored to life with half its hit points. This jutsu closes all wounds, neutralizes any poison, cures
      all diseases, and lifts any jutsu affecting the creature when it died. The jutsu replaces damaged or missing
      organs and limbs. If the creature was undead, it is restored to its non-undead form.</p><p>Coming back from the
      dead is an ordeal. The target takes a −4 penalty to all attack rolls, saving throws, and ability checks. Every
      time the target finishes a long rest, the penalty is reduced by 1 until it disappears.</p><p>After using this
      jutsu, you gain four ranks of exhaustion that cannot be removed, and you are unable to cast this jutsu again until
      you complete a full rest. When you complete a full rest, you remove the ranks of exhaustion and regain the ability
      to cast this jutsu. Each subsequent casting of this jutsu beyond the first increases its chakra cost by 10.</p>
    chat: ''
