system:
  description:
    value: >-
      <p>The advanced version of the <em>Medical Haze</em> jutsu, capable of creating chemicals compounds that affects
      various systems. You perform one of the following effects:</p><ul><li><strong>Anesthesia:</strong> You release a
      transparent vapor into the air that slowly induces a sleep-like state. A creature that enters the area for the
      first time on a turn or starts its turn there must make a constitution saving throw. On a failed save, the
      creature gains 3 ranks of slowed. On a second failed save, the creature gains equal ranks of weakened. On a third
      failed save, the creature falls unconscious for the remaining duration of the jutsu. When the creature awakens, it
      has no memory of any events within the last 10 minutes.</li><li><strong>Numbing:</strong> You release a
      transparent vapor into the air, creatures coming into contact with this haze have all physical sensations numbed.
      While inside the area of the jutsu, all instance of damage forms except Psychic and Chakra damage is reduced by
      half.</li></ul>
