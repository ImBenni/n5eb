system:
  description:
    value: >-
      <p>You channel a spiral of medical chakra into a volatile sphere. When this sphere strikes a target, it disrupts
      the immune system through amnesia, causing the creature's body to "forget" how to heal.</p><p>Make a melee
      Ninjutsu attack against a creature within range. On a hit, you deal 8d8 necrotic damage, and the target must make
      a Constitution saving throw. On a failed save, the target's maximum hit points are reduced by an amount equal to
      the damage taken. Additionally, for 1 minute, the target becomes vulnerable to the envenomed
      condition.</p><p>Damage from this jutsu cannot be healed until the creature completes a rest.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3,
      increasing its damage by 2d8. If this jutsu is casted at S-Rank it gains a range of 60 feet.</p>
