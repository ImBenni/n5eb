system:
  description:
    value: >-
      <p>An advanced version of <em>Poison Mist Technique</em>, the user is capable of creating various toxins and their
      counterparts. You perform one of the following effects:</p><ul><li><strong>Antidote:</strong> You mold your
      medical chakra in order to form various compounds with the active capability of nullifying poisons. Creatures that
      inhale this mist end any condition imposed by a poison, disease, or jutsu with the Medical
      keyword.</li><li><strong>Poison:</strong> The user releases a darkened indigo colored vapor into the atmosphere,
      when a creature enters the area for the first time on a turn or starts its turn there, the creature must make a
      Constitution saving throw, taking 3d12 poison damage and gaining one rank of envenomed on a failed save, or half
      as much damage and no further effect on a successful one. Creatures are affected even if they hold their breath or
      don't need to breathe.</li></ul>
