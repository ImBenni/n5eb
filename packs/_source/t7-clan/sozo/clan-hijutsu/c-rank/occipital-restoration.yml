name: Occipital Restoration
type: spell
_id: UGqrKuSPGnI7cRlL
img: systems/n5eb/assets/content/clans/sozo.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Naibugan</strong></em> clan feature
      active. You mold medical chakra, injecting it directly into the occipital lobe -- the part of the brain
      responsible for sight. You perform one of the following effects:</p><ul><li><strong>Cleanse:</strong> You target a
      creature, restoring its eyesight and enhancing it. The creature removes the blinded condition and can see up to
      500 away with no difficulty for 1 minute.</li><li><strong>Blind:</strong> Make a melee Taijutsu or Ninjutsu attack
      against a creature within range. On a hit, you deal your unarmed damage, and the creature must succeed on a
      Constitution saving throw or be blinded for 1 minute. The creature can repeat the saving throw at the end of each
      of its turns, ending the blindness on a success. On a critical hit, the creature makes the saving throw at
      disadvantage. If it fails the saving throw, it also falls prone and is incapacitated while blinded, suffering from
      violent seizures.</li></ul><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank,
      increase the cost of this jutsu by 3. If this jutsu is casted at A-Rank, creatures you target with
      <strong>Cleanse</strong> gain immunity to the blinded condition for 1 minute.</p>
