img: systems/n5eb/assets/content/clans/sozo.webp
system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Naibugan</strong></em> clan feature
      active. This Genjutsu ensnares the target in a potent illusion with a unique effect: spontaneous self-repair.
      Under its influence, the target's body enters a temporary state of constant healing, using its own chakra to
      repair damage even when none is present.</p><p>A target creature you can see within range must succeed on a
      Constitution saving throw. On a failed save, it regains 2d4 hit points but reduces its current chakra points by an
      equal amount. While you maintain concentration, at the start of each of the creature's subsequent turns, it
      regains additional hit points equal to 2d4, plus an extra 1d4 for each turn beyond the initial turn, and reduces
      its current chakra points by an equal amount.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3, increase the jutsu's die size by one step
      (d4&lt;d6&lt;d8&lt;d10).</p><p></p>
