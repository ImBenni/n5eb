img: systems/n5eb/assets/content/clans/sozo.webp
system:
  description:
    value: >-
      <p>Originally created for non-invasive procedures, it enables the caster's hands to pass through solid objects and
      was later adapted for combat. You perform one of the following effects:</p><ul><li><strong>Harm:</strong> Make a
      melee Taijutsu or Ninjutsu attack against a target within range. This attack ignores any cover the target may have
      and treats the target's AC as 1 lower. On a hit, you deal your unarmed damage + 2d10 necrotic damage. If the
      target is a creature, it must then succeed on a Constitution saving throw or begin
      bleeding.</li><li><strong>Aid:</strong> You can use this jutsu to stabilize a creature. As part of casting this
      jutsu, you automatically stabilize a creature, removing any failed death saves.</li></ul><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase
      the damage by 2d10. For every two ranks you cast this jutsu above D-Rank, treat the target's AC as 1 lower.</p>
