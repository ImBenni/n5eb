system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Naibugan</strong></em> clan feature
      active. You combine your Interior Vision and Restorative Power to alter the cellular composition of a
      creature.</p><p>Choose a creature within range that you can see. The target must succeed on a Constitution saving
      throw. On a failed save, you can select one resistance or immunity that the creature has. The creature then loses
      the chosen resistance or has the selected immunity reduced to a resistance for the duration of this jutsu.</p>
