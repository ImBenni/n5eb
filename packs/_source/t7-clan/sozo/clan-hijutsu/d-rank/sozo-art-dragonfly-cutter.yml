system:
  description:
    value: >-
      <p>An alternate version of the chakra scalpel technique designed to inflict molecular-level damage through intense
      vibrations. For the duration, your unarmed attacks deal 2d4 + your ninjutsu modifier in necrotic damage and gain
      the Deadly property. You can use your Ninjutsu ability modifier for the attack and damage rolls for these attacks.
      This jutsu can also be applied to infuse chakra into a weapon or blade, causing the weapon to deal an extra 1d8
      necrotic damage, once per turn. Jutsu you cast that use your unarmed attack or weapon attack while this jutsu is
      active gain the Medical keyword.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank or higher, increase the damage by
      2d4 and 1d8. If this jutsu is cast at S-Rank, increase the damage by 2d4 and 1d8.</p>
