system:
  description:
    value: >-
      <p>As part of the requirements of this jutsu, you must have the <em><strong>Naibugan</strong></em> clan feature
      active. By focusing the Interior Vision granted by your Naibugan, you create an x-ray scan of a creature within
      range, revealing its vital weak points. Until the end of your turn, the next jutsu you cast or attack you make
      against the target increases its critical threat range by +1. If the jutsu has the Medical keyword or the attack
      deals necrotic damage, the critical threat range increases by an additional +1.</p><p>When you cast
      <em><strong>Casualty Palm Technique</strong></em> after this jutsu, its damage cannot be reduced. Alternatively,
      if used to stabilize a creature, that creature regains hit points equal to the jutsu's damage.</p>
