system:
  description:
    value: >-
      <p>You may spend one Restoration Cell when you heal a creature that has taken damage to grant them immunity to one
      of the damage types they suffered. Alternatively, if you remove a Physical, Elemental, or Mental condition from a
      creature, you can spend one Restorative Cell to make them immune to one of the conditions they suffered.
      Immunities granted this way last until the end of the creature's next turn.</p>
