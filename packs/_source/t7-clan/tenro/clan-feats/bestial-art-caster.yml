system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Tenrō Clan, level 8+ <br />You've honed
      mastery over bestial techniques. You gain the following benefits;</p><ul><li>Increase your Strength, Dexterity, or
      Intelligence modifier by 1, to a max of 20.</li><li>All "Bestial Art" jutsu count as Tenrō hijutsu.</li><li>Reduce
      the casting cost of Bestial Art jutsu by -1, and the concentration cost of Bestial Art jutsu by -2.</li><li>While
      gaining the benefits of your <em><strong>Bestial Transformation</strong></em> feature, when you would lose
      concentration of a Bestial Art jutsu, you may pay its chakra cost to maintain concentration instead.</li></ul>
