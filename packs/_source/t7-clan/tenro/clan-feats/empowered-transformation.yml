system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Tenrō Clan, level 4+ <br />You learn to
      more efficiently transform and conserve your chakra. You gain the following benefits;</p><ul><li>Increase your
      Constitution score by 1, to a max of 20.</li><li>Reduce the cost of your <em><strong>Bestial
      Transformation</strong></em> feature by half.</li><li>While transformed, you gain a +1 bonus to your
      AC.</li><li>While transformed, once per turn you may spend your Reaction to grant yourself advantage on a saving
      throw that uses Strength or Dexterity against a hostile effect.</li></ul>
