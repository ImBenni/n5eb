    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisites:</strong> Tenrō Clan <br />The benefits of your
      bloodline's transformation have natural altered your body. You gain the following benefits;</p><ul><li>Increase
      your Strength or Constitution score by 1, to a max of 20.</li><li>While wearing no or light armor, you can use
      your Strength or Constitution modifier instead of Dexterity when calculating your armor class.</li><li>You reduce
      all incoming bludgeoning, piercing, and slashing damage by -3.</li></ul>
