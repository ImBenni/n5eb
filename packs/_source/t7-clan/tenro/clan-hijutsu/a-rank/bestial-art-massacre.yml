name: Bestial Art Massacre
type: spell
_id: uG2g3agEICqn66dk
img: systems/n5eb/assets/content/clans/tenro.webp
system:
  description:
    value: >-
      <p><em>As a part of casting this jutsu, you must be gaining the benefits of your</em> <em><strong>Bestial
      Transformation</strong></em> <em>feature</em>. For a moment, you unshackle the true beast inside, reimagining what
      ferocity truly looks like.</p><p>You unleash an unfettered howl that chills the spine of all that hear it. All
      creatures of your choice in a 150-foot radius of you must make a Wisdom saving throw, gaining two ranks of fear
      against you for the next minute on a failed save, or 1 rank of fear on a success which lasts until the end of its
      next turn.</p><p> Then you can move up to your movement speed, making any number of melee taijutsu attacks against
      creatures within reach, dealing no more than two attacks per creature. This movement does not provoke opportunity
      attacks. The critical threat range of this attack increases by +1. On a hit, you deal your unarmed damage + 6d6
      and the target gains one rank of bruised or bleeding (your choice). If this attack crits, a creature instead
      becomes staggered or lacerated per rank of bruised or bleeding you inflicted.</p><p>Then at the conclusion of this
      jutsu, you may choose to gain 10 temporary hit points for each creature reduced to 0 hit points by this jutsu,
      which last until your next rest or until you cast this jutsu again. While you have these temporary hit points, you
      are considered <em>Frenzied</em>. While Frenzied, you suffer the Berserk condition, and all unarmed attacks and
      taijutsu you cast gain the Deadly and Lethal weapon properties.</p>
