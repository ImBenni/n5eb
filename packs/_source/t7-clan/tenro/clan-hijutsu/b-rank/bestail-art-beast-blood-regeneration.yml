system:
  description:
    value: >-
      <p><em>As a part of casting this jutsu, you must be gaining the benefits of your</em> <em><strong>Bestial
      Transformation</strong></em> <em>feature</em>. You channel a spike chakra through your heightened bloodflow
      granted by your bestial form, allowing you to recover wounds. As part of casting this jutsu, you may spend any
      number of hit dice, regaining the result in hit points.</p><p>For every five hit dice spent this way, increase
      your walking speed and jump distance by 30 feet, gain a +2 bonus to AC, and add +5 to the next attack roll, saving
      throw, or ability check you make until the end of your next turn.</p>
