img: systems/n5eb/assets/content/clans/tenro.webp
system:
  description:
    value: >-
      <p><em>As a part of casting this jutsu, you must be gaining the benefits of the <strong>Primal Fist
      Stance</strong>.</em> You channel chakra through one of your limbs, forming terrific claws of visible chakra
      coating your hand. Make a melee Taijutsu attack against a target in range. On a hit, you deal your unarmed damage
      + 8d8 slashing damage. The creature must then make a Constitution, saving throw gaining 2 ranks of bleeding on a
      failed save, or only 1 rank of the bleeding on a success. This attack ignores resistance to slashing damage and
      the bleeding condition.</p><p>If this jutsu is used as a <em><strong>Finisher</strong></em>, you deal your unarmed
      damage + 8d10 slashing damage. The creature must then make a Constitution, saving throw gaining 2 ranks of
      bleeding on a failed save, or only 1 rank of the bleeding on a success. A creature suffers the Weakened condition
      for as long as it has these ranks of bleeding.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above B-Rank, increase the cost by 3, the damage by 2d8 and 2d12 respectively. When you cast this jutsu at
      S-Rank, instead of the bleeding condition, you inflict lacerated instead.</p>
