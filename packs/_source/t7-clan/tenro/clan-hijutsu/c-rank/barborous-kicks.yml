name: Barborous Kicks
type: spell
_id: rpJs1aQxQjm3oY6d
img: systems/n5eb/assets/content/clans/tenro.webp
system:
  description:
    value: >-
      <p><em>As a part of casting this jutsu, you must be gaining the benefits of the <strong>Primal Fist
      Stance</strong>.</em> Your claws tear into the ground as you leap to strike with three deadly kicks. Make three
      melee taijutsu attacks against a target in range. On a hit, you deal your unarmed damage + 1d4. Then you may force
      the target to make a Strength saving throw, being knocked back 5 feet for each hit on a failure. If two or more
      attacks hit, the target gains one rank of bruised.</p><p><em>If this jutsu is cast while gaining the benefits of
      your</em> <em><strong>Bestial Transformation</strong></em> <em>feature, if three or more attacks hit, the target
      is also knocked prone</em>.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the bonus damage die increases by one step. When you cast this
      jutsu at A-Rank or above, you make one additional melee taijutsu attack.</p>
