name: Bestial Art Static Hide
type: spell
_id: Y6ZReVMtEMl5iDOI
img: systems/n5eb/assets/content/clans/tenro.webp
system:
  description:
    value: >-
      <p><em>As a part of casting and maintaining this jutsu, you must be gaining the benefits of your</em>
      <em><strong>Bestial Transformation</strong></em> <em>feature</em>. You cannot lose concentration on this jutsu as
      a result of taking damage. You saturate your bestial hide with chakra, causing the fur to stand up on its end. For
      the duration, you have resistance to both the bruised and bleeding conditions, and you reduce all incoming damage
      except psychic by 5. Additionally, twice per turn, when you would deal your unarmed damage, you may deal an
      additional 1d4 force damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost by 3 and increase both the damage reduction die and the additional damage die by 1 step.
      When you cast this jutsu at S-Rank, you are immune to the bruised and bleeding conditions for the duration.</p>
