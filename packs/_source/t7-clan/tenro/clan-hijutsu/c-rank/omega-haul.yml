system:
  description:
    value: >-
      <p>Gathering chakra in your lungs, you release a concussive howl to stagger your foes. When you cast this jutsu,
      you may use either your Ninjutsu or Taijutsu for its casting ability. All creatures in a 30-foot cone must make a
      Constitution saving throw. On a failed save, a creature takes 5d8 force damage and is knocked back 10 feet, or
      half as much damage and is not knocked back on a success.</p><p>A creature that fails this save that can hear you
      also becomes deafened for 1 minute, repeating the save at the end of each of its turns to end the effect on
      itself. When you cast the jutsu, your howl is audible from as far away as 300 feet.</p><p>At Higher Ranks: For
      each rank you cast this jutsu above D-Rank, increase the cost by 3, increase the damage by 2d8, and the knock back
      by 10 feet. When you cast this jutsu at A-Rank or above, a creature that fails its save that can hear you also
      gains one rank of fear against you for 1 minute, repeating the save at the end of each of its turns to end the
      condition.</p>
    chat: ''
