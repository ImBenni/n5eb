name: Bestial Art Predator Sense
type: spell
_id: Qd48q56YicXmniWc
img: systems/n5eb/assets/content/clans/tenro.webp
system:
  description:
    value: >-
      <p><em>As a part of casting this jutsu, you must be gaining the benefits of your</em> <em><strong>Bestial
      Transformation</strong></em> <em>feature</em>. Your chakra-enhanced instincts sharpen acutely as you pool chakra
      into your bestial snout.</p><p>You know the general location of all creatures with chakra in a 1-mile radius of
      you. For the duration while tracking individuals or groups of creatures with chakra, you also learn their exact
      number, sizes, a general threat level (DM discretion), and how long ago they passed through an area.</p><p>When
      you deal damage to a creature with an unarmed attack or taijutsu, that creature becomes Marked for the duration of
      this jutsu. You always know the general direction of a Marked creature if it is within 1 mile of you. You can
      sense the exact location of a Marked creature within 100 feet of you, and it cannot benefit from being hidden from
      you.</p><p>Alternatively, as a bonus action for the duration you can touch an item, such as a scrap of clothing, a
      weapon, or trace amounts of blood, and learn the general direction of the creature the item belonged to up to a 1
      mile away from you</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost by 3 and the sensing distances increase by 1 mile and 50 feet respectively.</p>
