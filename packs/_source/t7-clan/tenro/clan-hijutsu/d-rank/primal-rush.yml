img: systems/n5eb/assets/content/clans/tenro.webp
system:
  description:
    value: >-
      <p><em>As a part of casting this jutsu, you must be gaining the benefits
      of the <strong>Primal Fist Stance</strong>.</em> You let your primal
      instincts take over, rushing forward to a target in range as you attempt
      to maul them. You move up to your full walking speed to a creature you can
      sense in range. This does not provoke opportunity attacks. Then make one
      melee taijutsu attack against the target. On a hit, you deal your unarmed
      damage + 2d6, and the creature must make a strength saving throw be
      knocked prone.</p><p>Until the end of your turn, you can target one
      affected creature with a Taijutsu <em><strong>Finisher</strong></em>
      regardless of range, once per turn, using either an Action or Bonus
      action, ignoring its listed casting time.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost by 3 and the additional damage by 1d6. When you cast this jutsu
      at B-Rank or above, you instead make two melee taijutsu attacks.</p>
