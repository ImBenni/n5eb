system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Tojo Clan, Level 4+ <br />Your fighting
      spirit can burst out in a display of brute strength. You gain the following benefits;</p><ul><li>When rolling
      initiative while having no EX Dice, you immediately gain an EX Die.</li><li>At the beginning of the turn while
      having at least half your Maximum EX Dice, you enter <em><strong>EX Boost</strong></em>. While in <em>EX
      Boost</em>, increase your EX Die step by 1 and treat yourself as having max EX Dice for the purpose of Tojo Clan
      features. At the end of the round, decrease your EX dice by 1 and for the duration of <em>EX Boost</em> you cannot
      regain EX Dice through any means. You may end <em>EX Boost</em> at the beginning of your turn for no action
      required.</li><li>Increase your Maximum EX Die by 1.</li></ul>
    chat: ''
