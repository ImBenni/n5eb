system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Tojo Clan, Level 12+ <br />Your training
      has lead you to many masters, allowing you to form exalted techniques. You gain the following
      benefits;</p><ul><li>Increase your Strength or Dexterity score by 1, to a maximum of 20.</li><li>Select two Tojo
      Clan Hijutsu, they gain the <em><strong>Legendary</strong></em> keyword. While within a <em><strong>Legend
      Stance</strong></em>, these jutsu always have an EX Die spent on them. This does not spend the Dice.
      Alternatively, if it does not deal damage, decrease the cost of the juts by -2(min half). You may swap the chosen
      jutsu on a long rest.</li><li>You gain an additional amount of RP equal to your level, hereafter gain an
      additional RP every level</li></ul>
