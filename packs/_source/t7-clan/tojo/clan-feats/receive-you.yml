system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Tojo Clan, Level 16+ <br />You're the one
      who others look up to. You fight and posture yourself like a dragon. You gain the following
      benefits;</p><ul><li><em><strong>Unwavering Belief</strong></em> now applies to all Mental
      Conditions.</li><li>Select one of your <em>Legend Stances</em>. This stance becomes your <em>True Stance</em>.
      This stance gains an additional Legend Trait.</li><li>While in your <em>True Stance</em>, your EX Die are set to
      d12s and you may gain up to 3 per turn through dealing or taking damage. Additionally, increase the Attack bonus
      or DC of Tojo Clan Hijutsu by +1.</li></ul>
