system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Tojo Clan <br />You can change up your
      styles on the fly like its the 80s. You gain the following benefits;</p><ul><li>Increase your Strength or
      Dexterity score by 1, to a maximum of 20.</li><li>You learn an additional Taijutsu Stance and gain an additional
      Legend Trait.</li><li>When you take the attack action while in a <em><strong>Legend Stance</strong></em>, you may
      switch into a different <em><strong>Legend Stance</strong></em> as a part of the action. This occurs before the
      attack is made.</li><li>You may select this feat multiple times, gaining either a new stance or Trait after the
      first.</li></ul>
