system:
  description:
    value: >-
      <p>You make sure every fight has some flare in it. At 11th level, when you cast a Tojo clan Hijutsu, you may spend
      3 EX Die to cast a jutsu that requires stance as an action or bonus action. When you do this, if the stance
      requires to be used as a finisher, you may use it regardless. If the jutsu has a special effect that only
      activates due to a feature from your stance, that effect activates even if the prerequisite is not fulfilled</p>
