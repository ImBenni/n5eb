system:
  description:
    value: >-
      <p>At 3rd level, you utilize your fighting spirit to pummel your foes. You have a number of EX Die to a max of
      your proficiency modifier that are d4s. Once per turn, when you take damage or deal damage, you gain an EX Die.
      When casting a Tojo Clan hijutsu you may spend any number of EX Die, adding the result to the
      damage.</p><p>Additionally, when making a Strength or Dexterity saving throw, ability check, or skill check, you
      may spend one EX Die and gain half the result of the roll(min 1). While you have your max EX die, increase your
      movement speed by +10 and the damage of up to 3 attacks per turn by your EX Die.</p><p>At 7th level, EX Dice
      increases to a d6 and at 18th level increases to a d8. You regain all EX Die at the end of a long rest.</p>
