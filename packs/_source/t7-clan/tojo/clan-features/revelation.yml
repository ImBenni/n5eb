system:
  description:
    value: >-
      <p>You're able to come up with amazing techniques based on your combat experiences. At 1st level, you begin with 3
      <em>Revelation Points</em>(RP). You gain 3 RP every level hereafter. You may spend RP in place of DT for the sake
      of learning or creating Taiutsu/Bukijutsu. Jutsu learned with RP are considered Tojo Clan hijutsu for the sake of
      Tojo features.</p><p>If you create/learn a jutsu using RP only, you may treat the jutsu as if it benefited from
      learning with a mentor but may benefit from no other reductions.</p>
