system:
  description:
    value: >-
      <p>At 1st level, you begin forming a special fighting style that others simply can't compete with. You learn one
      Taijutsu stance of your choice and select two Legend Traits, adding it to the stance. A stance with a Legend Trait
      becomes a <em><strong>Legend Stance</strong></em> At 3rd, 11th, and 15th level, you may select an additional
      Legend Trait to add to the stance. Alternatively, you may add a Legend Trait to a different stance, making that
      stance a <em><strong>Legend Stance</strong></em>.</p><p>Additionally, you may use Dexterity instead of Strength
      for Taijutsu/Bukijutsu and unarmed/weapon Attack rolls and DCs.</p>
