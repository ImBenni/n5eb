system:
  description:
    value: >-
      <p>At 7th, your conviction is unbreakable and has become a rock for your allies to rely on. Twice per rest, when
      you or an ally within 30 feet of you would make a saving throw against mental condition, you may spend one EX Die
      and add +1d4 to the roll.</p><p>Additionally, when you are above 50% HP, you are immune to charmed, berserk, and
      frightened conditions. Additionally, you cannot be forced to directly work against your Goal, Ambition, or Drive.
      When you fall below 50% this becomes advantage against saves and checks against these effects.</p>
    chat: ''
