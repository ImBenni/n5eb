system:
  description:
    value: >-
      <p>As an action, you may taunt creatures in range. Make a Intimidation check vs the Perception or Insight(their
      choice) of up to 3 hostile creatures of your choice within 30 feet of you that can see or hear you. If you have
      expertise in place of expertise you gain a +1d4 bonus to the check. For each creature that fails, gain one EX Die.
      Creatures grappled or proned have disadvantage on this check. Creatures immune to the berserk condition cannot be
      targeted by this.</p>
    chat: ''
