system:
  description:
    value: >-
      <h3 id="stuff-of-legend">Stuff of Legend</h3><p>The Tojo clan isn't a clan in the traditional sense. You are not
      born into this clan, but are instead accepted into it. Those who are a part of this clan usually don't take
      advantage of any sort of kekkai gekkai or hidden clan teachings, even if they have it. Instead, being a part of
      this clan is a sign of skill.</p><h4 id="tojo-traits">Tojo Traits</h4><p><strong>Ability Score Increase:</strong>
      +2 Str or Dex, +1 Con<br /><strong>Speed:</strong> Your base walking speed is 30 feet.<br /><strong>Skill
      Proficiencies:</strong> Athletics, Martial Arts<br /><strong>Weapon Proficiency:</strong> You gain proficiency in
      improvised weapons.</p>
