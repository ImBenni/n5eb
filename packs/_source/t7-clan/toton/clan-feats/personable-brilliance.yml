system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Toton Clan, level 4+<br
      /><strong>Description:</strong> Light resides just beneath your skin, able to be pulled from easier than ever
      before. Granting you the following:</p><ul><li>Increase your Charisma Score by 1, to a max of 20.</li><li>You gain
      1 additional Lumen.</li><li>When you expend Lumen to increase a creature's roll, they gain temporary hitpoints
      equal to your Charisma Modifier + the amount of Lumen Expended. These temporary hitpoints stack with other
      temporary hitpoints given by you.</li></ul>
