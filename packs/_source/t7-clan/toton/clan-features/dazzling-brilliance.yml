system:
  description:
    value: >-
      <p>Also at 1st level, When you affect an allied creature, other than yourself, with a Toton clan hijutsu, the
      creature gains advantage on the next saving throw they make, before the jutsu ends. At 11th level, they also add a
      bonus to their saving throw, equal to your intelligence or charisma ability modifier. At 18th level, when you cast
      a Toton Hijutsu, you may grant a creature within 30 feet of you, except yourself, temporary hitpoints equal to the
      cost of the jutsu.</p>
    chat: ''
