system:
  description:
    value: >-
      <p>Beginning at 7th level, the light within you disorients those that try to fight against it. Once per turn, when
      you inflict the blinded condition, you can spend 3 chakra to force the blinded creature to make a Constitution
      saving throw against your ninjutsu save DC, being slowed until the end of their next turn on a failed save.</p>
