name: Luminosity
type: feat
_id: P6ggtGfgHWrJQqDi
img: systems/n5eb/assets/content/clans/toton.webp
system:
  description:
    value: >-
      <p>At 3rd level, you gain a special resource referred to as Lumen. You have an amount of Lumen equal to your
      Charisma modifier + your proficiency bonus. When a creature other than yourself would make an attack, save, or
      skill check within 30 feet of you, you may spend Lumen to increase the roll by the amount of Lumen spent as you
      give them a guiding light.</p><p>At 7th level, you gain a new use for your Lumen. When you would deal Force
      damage, you may spend an amount of Lumen equal to the rank of the Jutsu cast (<em><strong>D-Rank: 2, C-Rank: 4, B-
      Rank: 6, A-Rank: 8, S-Rank: 10</strong></em>). When you do, you may heal a creature other than yourself within 30
      feet of you by an amount equal to half the damage of the jutsu.</p><p>You regain expended Lumen on a long rest.
      You can't use more Lumen than your Charisma modifier at a time (minimum of one). At 11th level, this increases to
      twice your Charisma modifier.</p>
