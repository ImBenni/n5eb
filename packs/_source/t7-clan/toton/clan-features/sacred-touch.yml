system:
  description:
    value: >-
      <p>Beginning 1st level, you have the distinct ability to use the light within you to heal your allies. As an
      action, you can restore hit points to a creature you touch equal to your charisma <strong>ability score</strong>.
      You can use this feature a number of times equal to half your proficiency bonus per rest. At 3rd level, when you
      use this feature, you can also remove one Elemental conditions on that creature.</p>
