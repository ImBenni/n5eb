system:
  description:
    value: >-
      <p>Brilliant light washes out from you and coalesces in a soft radiance in a 30-foot radius around you. Creatures
      of your choice in that radius when you cast this jutsu shed dim light in a 5-foot radius and have advantage on all
      saving throws, and other creatures have disadvantage on all attacks against them until the jutsu ends.
      Additionally, once per turn, when an affected creature is hits by an attack, the light flares and the attacker
      must make a Wisdom saving throw, taking 6d6 force damage and being blinded on a failed save.</p>
