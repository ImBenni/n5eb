img: systems/n5eb/assets/content/clans/toton.webp
system:
  description:
    value: >-
      <p>Using a chakra seal as its base, you conjure a wall of brilliant light at a point you can see within range. The
      wall appears in any orientation you choose: horizontally, vertically, or diagonally. It can be free floating, or
      it can rest on a solid surface. The wall can be up to 60 feet long, 10 feet high, and 5 feet thick. The wall
      blocks line of sight, but creatures and objects can pass through it. It emits bright lightout to 120 feet and dim
      light for an additional 120 feet. You do not need to spend chakra to maintain concentration on this
      jutsu.</p><p>When the wall appears, each creature in its area must make a Constitution saving throw. On a failed
      save, a creature takes 5d10 force damage and gains 1 rank of the burned condition.</p><p>A creature that ends its
      turns in the wall's area takes 5d10 force damage.</p><p>Until the jutsu ends, you can use an action to fire a beam
      of light from the wall at one creature you can see within 60 feet of it. Make a ranged ninjutsu attack. On a hit,
      the target takes 5d10 force damage and gains a rank of burned. Whether you hit or miss, reduce the length of the
      wall by 10 feet. If the wall's length drops to 0 feet, the jutsu ends.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the initial damage by
      2d10.</p>
