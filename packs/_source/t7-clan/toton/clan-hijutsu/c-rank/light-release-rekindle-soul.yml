system:
  description:
    value: >-
      <p>When a creature within range would be damaged, you may use your reaction cover them in a splendid light which
      closes their wounds. The target creature regains hitpoints equal to 3d8 + your Ninjutsu Ability modifier, and
      until the start of your next turn, they heal 1d8 + your Ninjutsu Ability modifier whenever they would take
      damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      by 3 and the initial healing by 1d8.</p>
