system:
  description:
    value: >-
      <p>You create a chakra construct of light of your own description (a giant fist, a sword, an arrow, etc.),
      striking your foes with it. Make a ranged ninjutsu attack against a creature you can see within range. On a hit,
      you deal 3d10 + your ninjutsu modifier in force damage. A creature hit with an attack must make a wisdom saving
      throw, becoming dazzled on a failed save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3, starting at B-rank, you can make two attacks, which can
      be directed to the same or different creatures. Starting at S-rank, you make 3 attacks.</p>
