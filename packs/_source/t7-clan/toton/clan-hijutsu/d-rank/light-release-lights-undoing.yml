name: Light Release Light's Undoing
type: spell
_id: njrTOeYsd1sQ5tfu
img: systems/n5eb/assets/content/clans/toton.webp
system:
  description:
    value: >-
      <p>You expell your radiant chakra in an aura, undoing the binds around others. Choose a number of creatures within
      15 feet of you. They regain a number of hit points equal to 2d6 + your ninjutsu modifier. Additionally, if they
      are prone, grappled, or restrained, the condition ends.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the number of hit points each target
      regains by 2d6. If cast at B-Rank or higher, you can instead cast this jutsu as a Reaction, when a creature within
      15 feet of you would be restrained, grappled or fall prone. If cast at S-Rank, you can also end the stunned,
      paralyzed, or incapacitated condition on affected creatures.</p>
