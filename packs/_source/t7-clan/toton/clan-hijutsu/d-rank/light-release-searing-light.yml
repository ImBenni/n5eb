name: Light Release Searing Light
type: spell
_id: mJCjSHzBe39Em7ut
img: systems/n5eb/assets/content/clans/toton.webp
system:
  description:
    value: >-
      <p>(You cannot lose concentration on this jutsu as a result of damage.) You mold your chakra onto a creature you
      touch, coating it in burning light, turning it into a radiant beacon.</p><p>Once per turn, weapon attacks made by
      the creature deal an additional 1d8 force damage. A creature damaged this way must succeed a Constitution saving
      throw, gaining one rank of burned on a failed save.</p><p>For the duration, the creature emits bright light to a
      10-foot radius and dim light for an additional 10 feet. A creature can set this light on or off as a bonus
      action.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      of this jutsu by 3 and the damage by 1d8.</p>
