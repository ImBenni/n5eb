system:
  description:
    value: >-
      <p>You emit a radiant light that illuminates everything nearby. This light extends 15 feet around you as bright
      light and an additional 15 feet as dim light. Choose between instant and lasting
      effects:</p><p><strong>Instant:</strong> This jutsu lasts until the end of the current turn. All creatures within
      the bright light must make a Wisdom saving throw. Those that fail end concentration on one jutsu they are
      concentrating on and become blinded until the end of their next turn.</p><p><strong>Lasting:</strong> This jutsu
      lasts for 10 minutes. Jutsu that create darkness of the same rank or lower cannot produce darkness within this
      light.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      by 3, the dim light by 5 feet and the bright light by 5 feet.</p>
