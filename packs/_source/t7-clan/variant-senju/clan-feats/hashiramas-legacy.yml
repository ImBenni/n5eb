system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Variant Senju Clan, level 8+ <br />The
      blood of the First Hokage, runs through your veins, providing you unmatched vitality. You gain the following
      Benefits;</p><ul><li>Increase your Strength or Constitution score by 1, to a maximum of 20.</li><li>Whenever you
      would regain hit points as a result of spending Hit Die, targeting yourself with jutsu, features or Items that
      restore hit points, increase the amount of hit points regained by your proficiency bonus, once per
      casting.</li><li>Increase your Hit Point total by your level. Whenever you would gain a level here after increase
      your hit point total by +1.</li></ul>
