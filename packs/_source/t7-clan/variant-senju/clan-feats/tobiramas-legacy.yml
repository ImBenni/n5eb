    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Variant Senju Clan, level 8+ <br />The
      blood of the Second Hokage, runs through your veins, providing you unmatched Wisdom. You gain the following
      Benefits;</p><ul><li>Increase your Intelligence or Wisdom score by 1, to a maximum of 20.</li><li>You gain another
      <strong>Senju Superiority</strong> Feature.</li><li>When you create a jutsu it automatically gains the Hijutsu
      keyword for free.</li><li>Created or modified Jutsu start out at -1 chakra instead of 0 when calculating their
      cost.</li></ul>
