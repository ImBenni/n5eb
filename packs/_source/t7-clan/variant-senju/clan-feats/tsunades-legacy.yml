system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Variant Senju Clan, level 4+ <br />The
      blood of the Fifth Hokage, runs through your veins, providing you unmatched fortitude and intellect. You gain the
      following Benefits;</p><ul><li>Increase your Constitution or Intelligence score by 1, to a maximum of
      20.</li><li>You can learn and add Jutsu with the Medical Keyword to your Jutsu list.</li><li>When you would heal
      yourself or another creature using either a jutsu or feature. As a part of the same action used, you can spend 1
      hit die, adding the result to the amount healed.</li><li>You can spend your <em><strong>Senju Cells</strong></em>
      from the <strong>Mitotic Regeneration</strong> feature in the following new
      ways:</li></ul><ul><li><strong>Action:</strong> Touch a creature within range (other than you) and spend any
      number of <em><strong>Senju Cells</strong></em>. The creature removes 1 rank of any <em>Physical</em> or
      <em>Elemental</em> condition affecting them per cell spent.</li><li><strong>Action:</strong> Touch a creature
      within range (other than you) and spend any number of <em><strong>Senju Cells</strong></em>. The creature regains
      1d8 + your Constitution modifier in hit points per cell spent.</li></ul>
