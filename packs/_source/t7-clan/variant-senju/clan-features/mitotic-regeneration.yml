system:
  description:
    value: >-
      <p>Beginning at 1st level, you learn to create a reservoir of Chakra in form of <em><strong>Senju
      Cells</strong></em>. These cells are a byproduct of your exceptional bloodline which allows you to remain healthy
      and ready for battle. You have a number of Senju Cells equal to your level per long rest. You can spend these
      cells to accomplish any of the following at the start of your turn;</p><ul><li>Spend any number of cells,
      regaining 1d6 + Constitution modifier hit points, per cell spent. This increases to a d8 at 11th
      level.</li><li>Spend any number of cells to remove 1 rank of any <em>Physical</em> or <em>Elemental</em> condition
      you are under the effects of, per cell spent.</li><li>Beginning at 7th level, once per round, when your hit points
      falling to 0 or lower, you can spend 5 cells to instead fall to 1 hit point.</li></ul>
