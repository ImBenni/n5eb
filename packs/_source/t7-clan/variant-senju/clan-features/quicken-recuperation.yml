name: Quicken Recuperation
type: feat
_id: 06QfyF12l0uPdiD7
img: systems/n5eb/assets/content/clans/senju.webp
system:
  description:
    value: >-
      <p>Beginning at 15th level, your ability to rapidly recover from conflict manifests itself. When you would take a
      Short or Long Rest, you regain an additional amount of HP equal to your player level once and lose 1 additional
      rank of Exhaustion once per full rest. Furthermore, if you are suffering from any of the following conditions, you
      may make an additional save against whatever caused it at advantage:</p><ul><li><p>Poisoned (If you succeed, you
      gain the benefits of the
      rest.)</p></li><li>Blinded</li><li>Deafened</li><li>Dazed</li><li>Paralyzed</li><li>Weakened</li></ul>
