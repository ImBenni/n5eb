system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Vermillion Clan, Level 12+ <br />You are
      becoming a master of fire shaping being able to utilize your flames much more efficiently.</p><ul><li><p>You can
      hold an additional number of Flame Die equal to half your proficiency bonus rounded up.</p></li><li><p>When you
      cast a Vermillion clan jutsu that deals damage, increase the damage by your proficiency bonus once per
      casting.</p></li><li><p>You can sacrifice vitality to gain more flames. As a bonus action, you can spend up to 5
      Hit or Chakra dice to gain Flame Die. If sacrificing Hit Die, you gain 1 Flame Die for each Hit Die sacrificed. If
      sacrificing Chakra Die you gain 2 Flame Die for each Chakra die sacrificed. You can only choose to sacrifice one
      type of die with the same action.</p></li></ul><p></p><p></p>
