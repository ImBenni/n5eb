name: Burn It Down
type: feat
_id: 79qeX9m1VwcECcpy
img: systems/n5eb/assets/content/clans/vermillion.webp
system:
  description:
    value: >-
      <p>At 15th level, you have mastered the flame like no other, just so you can burn it all away. When you spend
      Flame Die, you instead gain the following effects.</p><ul><li>When you would deal Fire damage you can spend any
      number of <em><strong>Flame Die</strong></em>, adding them to the damage roll, and dealing an additional 1 damage
      for each Flame Die spent.</li><li>If you fail to deal damage with a Vermillion clan Hijutsu, you can spend 2
      <em><strong>Flame Die</strong></em> to immediately recast the jutsu as a Bonus Action.</li><li>When you would take
      damage, you can as a Reaction, spend any number of <em><strong>Flame Die</strong></em>, gaining Temporary Hit
      Points equal to the result times 8.</li><li>As a Bonus Action, you can spend 3 <em><strong>Flame Die</strong></em>
      to increase your Unarmed Damage by 2 steps for the rest of combat. (max d12)</li><li>When you cast a Vermillion
      Clan Hijutsu, you can spend 1 <em><strong>Flame Die</strong></em>, rolling it and reducing the cost by half the
      result rounded up.</li><li>When you cast a jutsu that deals Fire damage, you can spend 2 <em><strong>Flame
      Die</strong></em> to deal triple damage to constructs and structures. If the structure is comprised of mostly wood
      or other plant matter, you instead deal 6x damage.</li></ul>
    chat: ''
