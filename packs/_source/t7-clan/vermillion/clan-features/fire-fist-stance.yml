system:
  description:
    value: >-
      <p>At 1st level, you gain the signature fighting style of the Vermillion clan which makes maximum use of your
      volatile fire chakra. While in this stance, your unarmed damage becomes 1d8 and deals fire damage, and your
      unarmed attacks gain the Blazing trait. Your unarmed damage increases to 2d8 at 11th level. You can gain the
      benefits of this stance while benefiting from other stances.</p><p>At 7th level, when you cast a Vermillion clan
      Hijutsu while in this stance, you can apply the effects of the Blazing trait to the jutsu.</p><blockquote><h5
      id="blazing-trait">Blazing Trait</h5><p>Weapons with the Blazing trait deal an additional +2 damage for each rank
      of Burned the target has, once per turn.</p></blockquote>
