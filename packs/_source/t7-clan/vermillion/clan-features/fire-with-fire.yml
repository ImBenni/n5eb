system:
  description:
    value: >-
      <p>Beginning at 3rd level, you are living proof that the adage "fight fire with fire" couldn't be more wrong. You
      gain resistance to Fire Damage and Immunity to environmental conditions that deal Fire damage or rely on heat. At
      11th level, you gain immunity to the Burned condition, and at 18th level gain immunity to Fire damage.</p>
