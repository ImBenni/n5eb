system:
  description:
    value: >-
      <p>Starting at 7th level, you've learned how to add more fuel to the fire burning in your chest. When you would
      gain a Flame Die, you can choose to gain an additional Flame Die. You can do this once per short rest. At 18th
      level, this increases to twice per short rest. Additionally, you gain two new ways to use Flame
      Die:</p><ul><li>When you cast a Vermillion Clan Hijutsu, you can spend two <em><strong>Flame Die</strong></em>,
      rolling one and reducing the cost by half the result rounded up.</li><li>When you cast a jutsu that deals Fire
      damage, you can spend 2 <em><strong>Flame Die</strong></em> to deal double damage to constructs and structures. If
      the structure is comprised of mostly wood or other plant matter, you instead deal 4x damage.</li></ul>
    chat: ''
