system:
  description:
    value: >-
      <p>You invoke the forbidden jutsu of the Vermillion clan, becoming the inferno itself. You can only cast this
      jutsu if you are currently benefiting from the Kindle the Mind, Smolder the Body, and Ignite the Soul Hijutsu.
      Those jutsu immediately end and you gain the following benefits for the duration of this jutsu:</p><ul><li><p>You
      gain a +5 bonus to your AC</p></li><li><p>You cannot lose concentration on jutsu with the Fire Release keyword,
      and can concentrate on an additional jutsu so long as all jutsu you are concentrating on have the Fire Release
      keyword.</p></li><li><p>When you deal damage with a Vermillion clan Hijutsu, you deal an additional 4d10+4
      damage.</p></li><li><p>You ignore resistance and immunity to Fire damage.</p></li><li><p>When you would inflict
      the Burn condition, you inflict an additional 2 ranks.</p></li><li><p>Vermillion clan Hijutsu reduce their cost by
      5, to a minimum of 1.</p></li><li><p>You gain resistance to all damage except cold. When this jutsu ends you die,
      leaving nothing behind and being unable to be revived as the flames scatter into the wind. At the end of every
      turn, you can choose to spend 1 Flame Die to extend the duration of this jutsu by 1 round, to a maximum of 10
      minutes. You cannot gain the benefits of Kindle the Mind, Smolder the Body, or Ignite the Soul while under the
      effects of this jutsu.</p></li></ul><p></p>
    chat: ''
