system:
  description:
    value: >-
      <p>You ignite your soul, causing your chakra to become visible outside of your body consuming you in a raging
      inferno. For the duration of this jutsu, you ignore resistance to Fire and treat Immunity as Resistance. Also due
      to the intensity of the flames, whenever you would inflict a rank of burned you inflict an additional
      rank.</p><p>If you cast this jutsu while gaining the benefits of Kindle the Mind and Smolder the Body, you no
      longer need to maintain concentration on those jutsu instead gaining all the benefits for the duration of this
      jutsu, and increase the chakra cost reduction by 1.</p><p>When you cast this jutsu as a Reaction, you can spend 2
      Flame Die to immediately cast Cremate the Self as a free action if it is on your Known Jutsu List.</p>
