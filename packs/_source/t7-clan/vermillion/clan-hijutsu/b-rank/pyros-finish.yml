system:
  description:
    value: >-
      <p>You grab a target in range by their face, igniting their body in flame and slamming them into the ground. Make
      a melee Taijutsu attack against a creature in range, dealing your Unarmed Damage + 5d8, inflicting 1 rank of burn
      and knocking them prone on a hit.</p><p>If this jutsu is used as a Finisher, after slamming the target into the
      ground, a pillar of flame rises from the crater. All creatures in a 15-foot wide, 60-foot-tall cylinder other than
      yourself must make a Dexterity saving throw, taking 4d6 Fire damage on a failure or half as much on a success. The
      initial target has disadvantage on this saving throw.</p><p>You can spend 2 Flame Die when you cast this jutsu as
      a finisher to instead cause the secondary effect to target all creatures in a 30-foot radius other than
      yourself.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost by 3, and the
      damage by 2d8+2 and 1d6.</p>
