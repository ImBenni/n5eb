system:
  description:
    value: >-
      <p>You store a massive amount of chakra into your fist igniting it in vermillion flames, before slamming it into
      your opponent. Make a melee Taijutsu attack, dealing your unarmed damage + 3d8. On a successful hit you funnel
      your chakra into your opponent's body causing flames to spew forth from within. All creatures within a 60 foot
      long 5 feet wide line must make a Dexterity saving throw taking 5d4+5 fire damage on a failed save, or half as
      much on a success.</p><p>You can spend up to 4 Flame Die to increase the size of the line by 10 feet in length and
      5 feet in width per Flame Die spent.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above C-Rank, increase the cost by 3, and the damage by 2d8+2 and 1d4+1.</p>
