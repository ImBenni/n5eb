system:
  description:
    value: >-
      <p>You ignite your fist and consume yourself in flame, teleporting to your targets. Make two melee Taijutsu
      attacks on creatures of your choice within range dealing your Unarmed Damage + 2d8 and the target must make a
      Constitution saving throw, gaining 1 rank of burned on a failure, you then end this action in an adjacent space to
      the final target of the jutsu.</p><p>Until the end of your turn, you can target one affected creature with a
      Taijutsu <em><strong>Finisher</strong></em> regardless of range, once per turn, using either an Action or Bonus
      action, ignoring its listed casting time.</p><p>You can spend 3 Flame Die to instead target a 30-foot cone,
      instead making a melee Taijutsu attack on each creature of your choice in the cone, and choosing to appear in any
      unoccupied space in the cone at the conclusion of the jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above C-Rank, increase the cost by 3, and the damage by 1d8+1</p>
