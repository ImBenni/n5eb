system:
  description:
    value: >-
      <p>You send blazing chakra evenly throughout your chakra pathways, increasing the strength of your muscle and bone
      as your body becomes hot to the touch, letting off cinders. For the duration of this jutsu you gain a +30-foot
      bonus to your movement speed, and when you cast a Vermillion clan Hijutsu you deal an additional 2d8+2 damage up
      to twice per casting.</p><p>If you cast this jutsu while gaining the benefits of <strong>Kindle the Mind</strong>,
      you no longer need to maintain concentration on that jutsu instead gaining all the benefits for the duration of
      this jutsu, and increase the chakra cost reduction by 1.</p><p>When you cast this jutsu as a Bonus Action you can
      spend 2 Flame Die to immediately cast <strong>Ignite the Soul</strong> as a Reaction if it is on your Known Jutsu
      List.</p>
