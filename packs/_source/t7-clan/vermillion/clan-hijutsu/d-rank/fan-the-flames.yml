system:
  description:
    value: >-
      <p>Fueled by your blazing chakra and hot headedness you turn fear and doubt into unbridled passion. When you cast
      this jutsu, choose one type of <em>Mental</em> condition you are inflicted with as a result of a jutsu of equal
      rank or lower, removing all ranks of the selected condition. The next Vermillion Hijutsu you cast deals an
      additional 1d6 damage for each rank of a condition removed.</p><p>You can spend <em><strong>Flame
      Die</strong></em> as part of the casting of this jutsu choosing an additional condition for each die
      spent.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      by 3, and the rank of condition you can remove by 1.</p>
