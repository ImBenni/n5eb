system:
  description:
    value: >-
      <p>You vent some of the excess heat you produce in an attempt to try and
      damage those surrounding you. All creatures of your choice within range
      must attempt a Dexterity saving throw, taking 2d6 + your Taijutsu modifier
      and gaining 1 rank of burned on a failed save or half as much damage and
      no other effects on a success.</p><p>You can spend 1 <em><strong>Flame
      Die</strong></em> to change the range of this jutsu to a 15-foot cone, or
      a 30-foot long 5-foot-wide line.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost by 3,
      the range by 5 feet, and the damage by 2d6+2.</p>
