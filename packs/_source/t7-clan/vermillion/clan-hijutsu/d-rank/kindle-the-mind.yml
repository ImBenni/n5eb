system:
  description:
    value: >-
      <p>You funnel your blazing chakra into your brain, increasing your concentration and awareness as your eyes become
      ablaze. For the duration of this jutsu you gain a +2 to your AC, you cannot lose concentration on jutsu with the
      Fire Release keyword as a result of taking damage, and all Vermillion clan Hijutsu you cast reduce their cost by
      1. (min 1)</p><p>When you cast this jutsu you can spend 2 <em><strong>Flame Die</strong></em> to immediately cast
      <em>Smolder the Body</em> as a Bonus Action if it is on your Known Jutsu List.</p>
