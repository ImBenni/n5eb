  description:
    value: >-
      <h3 id="heart-of-a-lion">Heart of a Lion</h3><p>The Vermillion clan hails from the Land of Fire, named after their
      fiery hair and tempers, often seen as wild and rambunctious, other clans were weary of approaching them. The
      Vermillion clan was originally a nomadic tribe that very slowly came to terms with the thought of joining arms
      with other clans to make up a village. However, now in the modern day where the Vermillion clan has joined forces
      with others, they see them as nothing less then extensions of their family and will fight to the death to protect
      their new comrades.</p><h4 id="vermillion-traits">Vermillion Traits</h4><p><strong>Ability Score
      Increase:</strong> +2 Strength, +1 Constitution or Charisma <br /><strong>Speed:</strong> Your base walking speed
      is 30 feet<br /><strong>Skill Proficiency:</strong> Athletics, Martial Arts<br />Fire Release Affinity: You gain
      Fire Release Affinity (You can learn jutsu with the Fire Release Keyword)</p>
