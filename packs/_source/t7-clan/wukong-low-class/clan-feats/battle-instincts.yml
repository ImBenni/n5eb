img: systems/n5eb/assets/content/clans/wukong.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Low Class Wukong Clan, Level 4+ <br />Your
      adaptive prowess in battle is immense compared to the majority of your clan. Without thinking, your body moves
      instinctually, as if every part of you has a mind of its own. You gain the following benefits;</p><ul><li>Increase
      your Dexterity, Constitution, or Intelligence score by 1, to a maximum of 20.</li><li>While equipped with a
      <em>Quarterstaff</em>, you can use your Quarterstaff in place of your fists for unarmed attacks and
      Taijutsu.</li><li>When you roll your <em><strong>Adaptability Die</strong></em>, you may reroll any 1s. You must
      use the 2nd result.</li><li><p>You gain a new use for your <em><strong>Adaptability Die</strong></em> called
      <strong>Adaptive Pressure.</strong></p><ul><li><strong>Adaptive Pressure:</strong> Once per turn when a creature
      would succeed a saving throw imposed by you, you may increase the Save DC for the ability you used by half the
      result of one adaptability die until the start of your next turn. (Min. 1) You may use this feature twice per
      short rest.</li></ul></li></ul>
