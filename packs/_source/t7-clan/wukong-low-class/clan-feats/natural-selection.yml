system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan <br /><strong>Prerequisite:</strong> Low Class Wukong Clan, Level 12+ <br
      />Despite the loss of your clan's iconic power and kekkei <br />genkai, you have progressed so far in becoming a
      warrior that your ancestors still smile upon you. You gain the following benefits;</p><ul><li>Increase your
      Dexterity, Constitution, or Intelligence score by 1, to a maximum of 20.</li><li>Whenever you receive an
      <em><strong>Adaptability Die</strong></em>, you gain an additional die.</li><li>When you roll an
      <em><strong>Adaptability Die</strong></em>, you may double the result. You may do this twice per long
      rest.</li><li>Your <em><strong>Latent Zenkai Boost</strong></em> feature now recharges on a short rest.</li></ul>
