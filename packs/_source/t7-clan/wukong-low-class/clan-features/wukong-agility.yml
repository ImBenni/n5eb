    value: >-
      <p>Starting at 1st level, you gain a climbing speed equal to your walking speed and while in difficult terrain,
      your movement speed is increased by half until you exit the area designated as difficult terrain. At 7th level,
      you ignore difficult terrain and you have advantage on checks and saving throws against hostile effects that would
      reduce your movement speed in any way.</p>
