system:
  description:
    value: >-
      <p>You channel chakra into your hands and instead of condensing it, you reverse the process, while in contact with
      another creature. Make a melee Taijutsu or Ninjutsu attack. On hit, you deal 12d8 force damage to the creature's
      hit points and half the result to their chakra. If the affected creature is currently benefitting from a jutsu,
      they must make a concentration check with a penalty equal to Xd4, where X equals how many jutsu they are
      benefitting from.</p><p>This check must be rolled regardless of whether the jutsu requires concentration, and even
      if they are not the original caster of the jutsu. If the jutsu does require concentration, they make their
      concentration check at disadvantage. If the target is unable to lose concentration as the result of a jutsu,
      trait, or feature, they still must roll, but the Xd4 penalty given by this jutsu is halved. If the target is not
      benefitting from any jutsu, they must succeed a Constitution saving throw or lose the ability to concentrate on
      jutsu for 2d4 rounds.</p><p>Additionally, if the creature has stolen any form of chakra or energy from other
      creatures and still possesses it, they must make a Constitution saving throw. On a failed save, these
      chakras/energies are immediately expelled in their entirety and returned to their original owner(s). If having
      these chakras/energies returned would go beyond the owner(s) maximums, the difference becomes temporary chakra or
      a temporary form of whatever the energy may be.</p>
    chat: ''
