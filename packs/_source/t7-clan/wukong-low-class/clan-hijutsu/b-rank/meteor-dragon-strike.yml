system:
  description:
    value: >-
      <p>You begin charging forward up to 60 feet, channeling an immense amount of radiant chakra within your fist which
      explodes into a golden dragon of your description. Make a melee Taijutsu attack on up to 3 creatures of your
      choice that you would pass with your movement. On a hit, you deal your unarmed damage + 7d6 force damage as you
      strike and pass through each creature.</p><p>If this jutsu is cast as a <em><strong>Finisher</strong></em>, you
      target a single creature and make a melee taijutsu attack dealing your unarmed damage + 10d8 force damage on hit,
      ignoring resistance and treating immunity as resistance.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage die by one step.
      (d4&lt;d6&lt;d8&lt;d10&lt;d12). If upcast to S-Rank or higher as a <em><strong>Finisher</strong></em>, this jutsu
      ignores both resistance and immunity.</p>
