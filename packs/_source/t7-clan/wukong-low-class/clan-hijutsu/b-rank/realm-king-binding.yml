name: Realm King Binding
type: spell
_id: U9XtRNs15YIO8eWQ
img: systems/n5eb/assets/content/clans/wukong.webp
system:
  description:
    value: >-
      <p>You close your eyes and take in a deep breath as you channel chakra into your palms. You then quickly open your
      eyes and make an expanding circle of energy with your hands, forming a ring around a creature. Select one target
      within range. That target must make a Charisma saving throw. If the target is under the effects of the Berserk
      condition, they make their saving throw at disadvantage.</p><p>On a failed saving throw, the target creature has
      their movement speed reduced to 0 and loses the ability to take actions for the duration of this jutsu. At the end
      of each of the creature's turns, they can make a Strength or Charisma saving throw, using their physical strength
      or force of spirit to break free, ending this jutsu on a successful saving throw.</p><p>A creature under the
      effects of this jutsu has all status conditions they possess suspended for the duration of this jutsu, their
      effects not triggering. Additionally, you and all allied creatures gain a +1d6 bonus to skill checks that you
      would roll in an attempt to decieve or persuade the creature.</p><p>If an affected creature would take damage from
      a creature hostile to them, or be forced to make a saving throw against an obviously harmful effect, this jutsu
      immediately ends once they take damage or make the saving throw, gaining an additional reaction which they can use
      to move up to their movement speed.</p>
