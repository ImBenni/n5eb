name: Primal Chakra Disc
type: spell
_id: Z1ewWUNyIKcyMeQ8
img: systems/n5eb/assets/content/clans/wukong.webp
system:
  description:
    value: >-
      <p>An iconic technique of the Low-Class Wukong, rumored to have been developed to counter a mythical power of the
      Elite Wukong. You channel chakra into your hand and raise it high, forming a large razor-sharp disc of
      energy.</p><p>Make a ranged Ninjutsu attack against a creature within range. On hit, you deal 7d6 Slashing damage,
      which ignores temporary hit points. The target must also make a Constitution saving throw, gaining 2 ranks of
      bleeding on a failed save as the jutsu goes straight through them.</p><p>Additionally, if you aim this jutsu at an
      extraneous appendage the target may have, such as a horn, tail, or tentacles, and deal at least 25 damage with
      this jutsu, the creature must make a Strength saving throw, losing said extraneous appendage on a failed
      save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3, and the damage by 2d6. If upcast to A-Rank or higher, you can alternatively choose to command the
      Primal Chakra Disc like a drone, giving this jutsu a duration of Concentration, up to 1 minute. The drone has an
      AC equal to your Ninjutsu or Taijutsu Save DC, whichever is higher, and 1 hit point. As a bonus action on your
      turn, you can command the disc to move up to 60 feet and attack one creature as if you cast this jutsu at C-Rank.
      If the disc reaches 0 hit points, this jutsu immediately ends. You can also turn this jutsu into a drone upon
      missing a creature with the jutsu by spending 4 chakra.</p>
