system:
  description:
    value: >-
      <p>You concentrate chakra all around your body, extending out your arms as you send this energy outward all around
      you. If cast as an action, each creature within range must make a Dexterity saving throw, taking 6d6 force damage
      and being knocked back 20 feet on failure, or half as much damage and knockback on a success.</p><p>If cast as a
      reaction, your energy becomes so potent that it forms a dense barrier around you. You gain resistance to the
      triggering damage type until the end of the attacking creature's turn and all creatures who are within 5 feet of
      you are knocked back 5 feet. For this duration, you are also immune to non-chakra enhanced
      damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, and the damage by 2d6 or the knockback by 10 feet (pick one) if used as an action, or the
      knockback by 5 feet if used as a reaction. If upcast to A-Rank as a reaction, the resistance and immunity granted
      by this reaction lasts until the start of your next turn.</p>
