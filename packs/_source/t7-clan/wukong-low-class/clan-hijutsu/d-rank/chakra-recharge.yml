system:
  description:
    value: >-
      <p>You take in a deep breath and pull chakra from the environment, generating an aura of chakra around you of your
      chakra color. You may spend a number of Chakra Die up to half your level. For each chakra die spent, roll 2
      Adaptability Die (this does not spend any). You gain the result of all die rolled + 1 for each Adaptability Die
      rolled, as chakra. If regaining chakra this way goes beyond your maximum, the difference becomes temporary
      chakra.</p>
    chat: ''
