system:
  description:
    value: >-
      <p>You launch a flurry of punches and kicks at an opponent within range. Make 3 melee Taijutsu attacks. On each
      hit, you deal your unarmed damage + 1d4, but you do not add your ability modifier to the damage rolls. If you hit
      with at least 2 of your attacks, the target must succeed on a Constitution saving throw or become unable to take
      reactions until the end of the turn. If you hit with all 3 attacks, this save is made at disadvantage.</p><p>Until
      the end of your turn, you can target one affected creature with a Taijutsu Finisher regardless of range, once per
      turn, using either an Action or Bonus Action, ignoring its listed casting time.</p><p>At Higher Ranks: For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage die by 1 step
      (d4→d6→d8→d10→d12), and ignore 2 DR that the target may have on each hit. If cast at B-Rank or higher, this jutsu
      deals an additional die of damage on each hit.</p>
