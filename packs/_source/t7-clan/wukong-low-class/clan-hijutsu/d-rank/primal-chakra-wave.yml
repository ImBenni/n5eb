folder: O2s6iXTDe03dX1Sv
name: Primal Chakra Wave
type: spell
_id: TuVhcJzhqwhfFhQ2
img: systems/n5eb/assets/content/clans/wukong.webp
system:
  description:
    value: >-
      <p>You take a charging stance, cupping both your hands together and bringing them behind you at your side. Chakra
      collects between your palms, generating a powerful sphere in between them. While concentrating on this jutsu, both
      your hands are occupied and cannot form hand signs. You do not need to expend chakra to maintain concentration of
      this jutsu, and can stop concentrating on it at any point.</p><p>Starting from your next turn, you may use your
      action to fire a 30-foot long, 5-foot wide beam of chakra at a target. Make a ranged ninjutsu attack against a
      target within range, dealing 5d6 force damage on hit. All creatures whose space your line passes through become a
      target of this jutsu, comparing their AC vs your attack result. If you score a critical hit with this jutsu, only
      your original target suffers the effects of the critical hit.</p><p><strong>Charge:</strong> At the start of
      consecutive turns after casting this jutsu, you can choose to delay attacking with this jutsu, instead spending
      your action to continue charging<br />the attack. For each turn you spend charging this jutsu, it deals an
      additional die of damage, and increases the damage dealt by 1 step. You can charge this jutsu a number of times
      equal to half your proficiency bonus before this jutsu ends early.</p><p><strong>At Higher Ranks:</strong> For
      each rank above D-Rank, increase the cost of this jutsu by 3, the damage by 2d6, and the length by 10 feet. If
      upcast to at least C-Rank, you can attack with this jutsu the turn you cast it. If upcast to B-Rank, increase the
      width of the line by 5 feet. If upcast to S-Rank, increase the width of the line by 5 feet.</p>
