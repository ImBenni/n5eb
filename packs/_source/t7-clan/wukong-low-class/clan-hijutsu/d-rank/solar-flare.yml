system:
  description:
    value: >-
      <p>You quickly put your hands to your forehead and shut your eyes before generating an incredibly bright light.
      Each creature within range in all directions that sees the light must succeed on a Wisdom saving throw or become
      Blinded and Dazzled until the end of their next turn.</p><p>At Higher Ranks: For each rank you cast this jutsu
      above D-Rank, increase the cost of the jutsu by 3. For each rank upcast, choose between one of the following
      options: increase the radius by 15 feet, or impose a -1 penalty on creatures who make the Wisdom saving throw.</p>
