  description:
    value: >-
      <p>Timestamp is a Hijutsu made with a curated campaign in mind, and not intended to be used on West March servers
      or for unexperienced Game Masters. This is a Jutsu with the power comparable of that of a Class Mod Art. Before
      considering allowing the use of this jutsu in your game, please make sure that you, the GM, can respond with a yes
      to the following statements.</p><ul><li>You feel capable of waving the use of this jutsu into the story in a
      narrative way.</li><li>You have trust on your player not exploiting or abusing this jutsu.</li><li>You feel
      confortable of adding additional penalties or unexpected results, while communicating those posibilities clearly
      to your players.</li></ul>
