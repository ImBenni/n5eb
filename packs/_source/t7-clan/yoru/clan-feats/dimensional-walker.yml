system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Yoru Clan Level 8+, Dimensional Rift
      Hijutsu<br />Your connection with your pocket dimension has grown, and you are now able to sink deep into
      it.</p><ul><li>Increase your movement speed by 5ft.</li><li>Increase the base Duration of the
      <em><strong>Dimensional Rift</strong></em> Hijutsu to Concentration, Up to ten Minute.</li><li>You can now exit
      the <em><strong>Dimensional Rift</strong></em> as a Free Action on your turn, or as a reaction.</li><li>When using
      the <em><strong>Dimensional Rift</strong></em> Yoru Clan Hijutsu, you are now unable to be seeing or detected by
      creatures with Chakra Sight, Chakra Sense or Jutsus with the Sensory Keyword from a rank equal or lower than this
      Hijutsu.</li><li>When using the <em><strong>Dimensional Rift</strong></em> Yoru Clan Hijutsu, you ignore dificult
      terrain, and walking on walls or water no longer require twice the normal movement.</li></ul>
