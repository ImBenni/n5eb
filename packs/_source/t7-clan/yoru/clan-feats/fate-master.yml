system:
  description:
    value: >-
      <p><strong>Category:</strong> Clan<br /><strong>Prerequisite:</strong> Yoru Clan Level 4+<br />Your mind is being
      constantly bombarded with diferent outcomes, allowing you to be more in touch with alternate
      fates.</p><ul><li>Increase your Wisdom score by +1, to a maximum of 20.</li><li>You gain an additional number of
      <em><strong>Fates</strong></em> equal to your Wisdom modifier.</li><li>You can now use
      <em><strong>Fates</strong></em> to re-roll condition damage die from conditions that you have inflicted, following
      the <em><strong>Alternate Fates</strong></em> clan feature rulling. Diferent conditions counts as diferent
      sources.</li><li>You can now spend two <em><strong>Fates</strong></em> to re-roll any non-d20 dice that any
      creature has rolled, whether allied or not, as long as you have a direct line of sight to them, or they are under
      the effect of a Yoru Clan Hijutsu.</li></ul>
