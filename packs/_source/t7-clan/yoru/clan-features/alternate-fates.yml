img: systems/n5eb/assets/content/clans/yoru.webp
system:
  description:
    value: >-
      <p>When you reach 3rd level, you have constant visions of diferent outcomes for each scenario. You gain a new
      resource called <em><strong>Fates</strong></em>, you have a number of <em><strong>Fates</strong></em> equal to
      half of your level rounded up, and you regain charges at the end of a Long Rest.</p><p>After rolling any dice or
      set of dices that isnt a d20, you can spent one <em><strong>Fate</strong></em> in order to re-roll the dice or set
      of dices once, keeping the result of your choice.</p><p>When using this feature, you must decide to either roll
      one single dice, or the complete set. Dice from diferent sources count as being a diferent set.</p><p>At 7th
      level, when in a social enounter, you are able to spend one <em><strong>Fate</strong></em> to perform an Insight
      Check at advantage against a Wisdom Saving Throw of your target, in order to gain insight into their likely
      reactions to various scenarios, information, threats, or statements.</p>
