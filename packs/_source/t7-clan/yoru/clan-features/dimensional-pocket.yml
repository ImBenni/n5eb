      plane.</p><p>Starting at 1st level, you gain access to a Pocket Dimension that only you can access, allowing you
      to store objects inside of it. This dimension can store up to 15 bulk and you can store and retrieve objects as a
      Bonus Action.</p><p>The size of this dimension increases over time, ganing one bulk for each level you have.</p>
