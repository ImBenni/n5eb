system:
  description:
    value: >-
      <p>Your space-time Jutsus allow you to sense more than one reality at the time. Starting at 3rd level, whenever
      you are under the effects or concentrating on a Yoru Hijutsu, you gain resistance to Sensory
      Conditions.</p><p>When you reach 11th level, you gain immunity instead of resistance. At level 18th, you gain
      Immunity to Sensory Conditions, without needing to be under the effects or Concentrating on Yoru Hijutsus.</p>
