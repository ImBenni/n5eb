system:
  description:
    value: >-
      <p><em>In order to cast this Jutsu, you must Spend two <strong>Fates</strong> charges from your <strong>Alternate
      Fates</strong> Clan feature, in addition to this Jutsu Cost.</em></p><p>When you, or a creature within range that
      you can see would fall to 0 hit points, you may as a reaction, open a rift big enough to connect two timelines,
      breaking the boundaries of this universe as it collides with another one.</p><p>As you do, you automatically move
      into another alternate timeline, on which the thing that would have killed you or them, instead does not. The hit
      points of the creature target of this Jutsu are restored back to its value before they took the triggering
      damage.</p><p>When this Jutsu ends, you permanently lose the Hit Dice used to cast this Jutsu and your Maximum Hit
      Points are reduced equal to the maximum value of the die, as you leave a piece of you on the other universe.</p>
