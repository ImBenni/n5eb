name: Dimensional Lock
type: spell
_id: xKPyWk7TgSUS77RB
img: systems/n5eb/assets/content/clans/yoru.webp
system:
  description:
    value: >-
      <p><strong>As an Action:</strong> On your turn, you create a barrier around yourself that locks everyone and
      everything in place in the current dimension, preventing any creature or objects, including yourself, form of
      teleportation, dimensional travel, and even accessing pocket dimensions until they leave the area or the jutsu
      ends. When this jutsu is cast this way, it gains a duration of Concentration, Up to 10 minutes.</p><p><strong>As a
      Reaction:</strong> When you see a creature that's about to teleport, you bind them to this dimension, locking them
      in place. This counts as an <strong>Interrupt</strong>. The selected creature must succeed on a Charisma Saving
      Throw. On a failed save, their jutsu or feature fails to execute, and the resources spent are not
      regained.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3 and increase the range by 30ft.</p>
