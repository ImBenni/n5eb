name: Dimensional Rift
type: spell
_id: 4bDi89ClVzrEO8Wv
img: systems/n5eb/assets/content/clans/yoru.webp
system:
  description:
    value: >-
      <p>You upen a tear your pocket dimension large enough for you to step in. For the duration of this Jutsu, you
      become unable to be damaged or affected by normal means or jutsu that lack the Fuinjutsu Keyword.</p><p>Creatures
      who's passive perception is 5 or higher than your Save DC are able to catch glimpses of your essence as you move,
      allowing them to target you with diferent kind of Fuinjutsu, at disadvantage. If the Fuinjutsu would require the
      user to target you to make a Saving Throw, you gain advantage on the save.</p><p>You can still hear and see whats
      happening on the materal realm, but you are unable to interact with it.</p><p>At any point, you can as a Bonus
      Action step out of the pocket dimension, ending this Jutsu, if you do so, the next attack roll you make before the
      end of your turn is made at advantage, and has its critical range increased by 2.</p><p>If you run out of chakra,
      end concentration, or loose the ability to mold chakra, this Jutsu ends abrtuplty and you return to the material
      plane, falling prone on the last position you were in.</p><p>Creatures with Chakra Sight, Chakra Sensing or True
      Sight are able to see and/or sense you while this Jutsu is active.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and increase the duration to
      Concentration, Up to one Hour.</p><p></p>
