system:
  description:
    value: >-
      <p>You rip an unstable dimensional fragment from reality. Holding it in your hand for a brief moment before
      throwing it away to a place within range, exploding mid-air, and showing visions of alternate realities to
      creatures near it.</p><p>Select a point within range, this Jutsu can bend arround corners and structures on a 90º
      once during its movement.</p><p>All the creatures within 30ft of the fragment that have a direct line of sight of
      it must succed a Wisdom Saving throw, being Blinded until the end of their next turn. Creatures standing within
      5ft of it make this save at disadvantage.</p><p>Creatures already under the Blinded condition within range must
      perform this save anyways.</p><p>Creatures with True Sight are immune to this Jutsu.</p>
