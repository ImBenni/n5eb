system:
  description:
    value: >-
      <p><em>In order to cast this Jutsu, you must Spend one <strong>Fate</strong> charge from your <strong>Alternate
      Fates</strong> Clan feature per creature marked.</em></p><p>You generate a seal inside a hostile creature within
      range, altering their tether to this timeline.</p><p>Select one creature within range, for the duration, creatures
      Marked with this Jutsu roll their Damage Dice at disadvantage</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the number of creatures
      that you can mark by 1.</p>
