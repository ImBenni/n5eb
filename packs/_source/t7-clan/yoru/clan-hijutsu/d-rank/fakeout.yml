system:
  description:
    value: >-
      <p>You generate an echo on the space-time arround you, coating yourself in a mirror image of your person that
      moves in slighly diferent maner.</p><p>For the duration of this Jutsu, the next time you suffer damage dealt by
      another creature, the echo expands in a violent matter, showing visions of alternate realities to the creature
      that attacked you.</p><p>The creature must succed a Wisdom Saving throw, being Blinded until the end of their next
      turn. If the damage dealt to you was from a Melee Attack, the Saving Throw is made at Disadvantage. After this,
      this jutsu ends.</p><p>Creatures already under the Blinded condition within range must perform this save
      anyways.</p><p>Creatures with True Sight are immune to this Jutsu.</p>
