system:
  description:
    value: >-
      <p>You create a small tear in the fabric of space-time in a place within range that you can see. For the duration,
      you can activate again this Jutsu using either your Bonus Action or your Reaction, ending this
      jutsu.</p><p><strong>As a Bonus Action:</strong> On your turn, you can activate this Jutsu again, teleporting you
      back to the marked place, no matter how far away you were from it, if you do so, the next attack roll you make
      before the end of your turn is made at advantage.</p><p><strong>As a Reaction</strong>: As a reaction to begin hit
      with an attack, and while you are within casting range of your Mark, you can spend the Chakra Cost of this Jutsu
      again, teleporting you back to the Marked Place, avoiding the attack.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the range by
      10ft.</p>
