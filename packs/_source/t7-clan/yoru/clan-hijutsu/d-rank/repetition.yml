system:
  description:
    value: >-
      <p><em>As a requirement for casting this Jutsu, you must have already taken your action to cast a
      jutsu.</em></p><p>You are able to see diferent outcomes from the same actions, allowing you to alter the
      space-time arround you to walk the same path twice.</p><p>After casting this Jutsu, all the effects from your
      previous Jutsu are nullify, damage dealt is healed, conditions applied are removed and features with limited uses
      are regain, but chakra spent by you, and reactions taken from any creatures between the casting from your fist
      Jutsu, and this Hijutsu, are not regained.</p><p>Until the end of your current turn you gain an aditional Action,
      that you must use to cast the same Jutsu that you used before this Hijutsu, targeting the same Area or Creature,
      having to roll again the Attack Rolls, Saving Throws and Damage dice involved, you must spent chakra again to cast
      the jutsu that triggered this Hijutsu.</p>
