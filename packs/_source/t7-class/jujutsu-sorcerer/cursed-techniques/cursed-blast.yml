      feet.</p><p> On a hit you deal 3d8 force damage.</p><p> A creature hit must make a charisma saving throw or gain
      the Cursed condition.</p><p> At Higher Levels: At 5th level, this becomes 4d8.</p><p> At 9th, it becomes a 5d8, At
