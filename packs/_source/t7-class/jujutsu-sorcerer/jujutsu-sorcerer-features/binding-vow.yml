system:
  description:
    value: >-
      <p>Finally, at 1st level you are given the opportunity to take Binding Vows. These vows give you power in exchange
      for a part of you. You have 4 vow slots and gain an additional slot at 7th level, 11th level, and
      15th.</p><p>There are two types of vows. <strong>Minor</strong> vows offer small trades and cost only one slot.
      <strong>Major</strong>, however, include much more impactful bargains that require two slots.</p><p>A sorcerer can
      only handle one major vow at a time. You can select as many binding vows as your slots allow.</p><p>When you gain
      a level in this class you may either remove or add one vow.</p><p></p>
