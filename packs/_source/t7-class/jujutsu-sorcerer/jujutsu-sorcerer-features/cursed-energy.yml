system:
  description:
    value: >-
      <p>Beginning at 1st level, you begin to produce Cursed Energy.</p><p> This energy is born from negative emotions,
      and thus can only naturally be drawn out within combat.</p><p> You can have an amount of Cursed Energy equal to
      your level+5.</p><p> At the beginning and end of your turn, you gain 1 Cursed Energy.</p><p> If you have used a
      Cursed Technique or are gaining the benefits of a Cursed Technique, you do not gain Cursed Energy at the end of
      your turn.</p><p> When you complete a short rest, you gain Cursed Energy equal to half your max.</p><p> On a long
      rest, you restore all spent Cursed Energy.</p><p> At 10th level, when rolling initative, you gain an amount of
      Cursed Energy equal to half your proficiency bonus.</p><p></p>
