system:
  description:
    value: >-
      <p>At 9th level, your cursed energy has its own trait that sets itself apart. You may select one of the following
      energy traits.</p><hr /><p><strong>Standard</strong>:</p><p>Even those without a trait are unique in that their
      own energy is more focused.</p><p>Your maximum Cursed Energy increases by +4 and you learn an additional Cursed
      Technique.</p><hr /><p><strong>Sturdy</strong>:</p><p>Your Energy protects you from otherwise deadly
      blows.</p><p>You gain Damage Reduction equal to your constitution modifier.</p><p>This bonus is halved when you
      have cursed energy less than or equal to half your max.</p><hr /><p><strong>Nonstandard</strong>:</p><p>Your
      energy is threatening.</p><p>You learn the Oppressive Aura D-jutsu and may cast it for free as a bonus
      action.</p><p>You may cast it using you Highest Save DC and can spend Cursed Energy to cast the jutsu.</p><hr
      /><p><strong>Rough</strong>:</p><p>Your energy hurts to touch.</p><p>Up to 3 times per turn, when a creature makes
      a melee attack against you, the creature takes force damage equal to your constitution modifier.</p><p>This damage
      ignores DR.</p><p></p>
