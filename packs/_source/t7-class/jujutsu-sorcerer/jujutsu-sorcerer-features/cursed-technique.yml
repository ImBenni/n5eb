system:
  description:
    value: >-
      <p>Also at 1st level, your cursed energy is able to be molded into various effects, known as Cursed
      Techniques.</p><p> Unless stated otherwise, when a Cursed Technique would require you to make an attack or force a
      creature to make a save, you use your highest relevant attack or DC between your Ninjutsu, Taijutsu, and Genjutsu
      attack and Save DC.</p><p> You may use one cursed technique on a turn.</p><p> You have as many techniques as
      displayed in the class table.</p><p> You may switch out one technique for another on a rest.</p><p></p>
