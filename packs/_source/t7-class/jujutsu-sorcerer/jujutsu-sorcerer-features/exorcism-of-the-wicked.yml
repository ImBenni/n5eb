system:
  description:
    value: >-
      <p>Also at 2nd level, your cursed energy calls you to drive any and all evil creations from this plane of
      existence.</p><p> When attacking a creature with the cursed condition, an undead creature, a demon, or a
      monstrosity, you gain an additional +1 on attack rolls made against that creature.</p><p> At 9th level, when you
      deal damage to one of those creatures, you treat all 1's as 2's.</p><p> At 18th level, you can spend 5 cursed
      energy and target up to 3 of those creatures that are at least two levels lower than you within a 20-foot
      radius.</p><p> Those creatures must make a constitution save vs your highest jutsu save.</p><p> On a failed save,
      they are immediately eradicated.</p><p> This cannot be used on solos or elites.</p><p></p>
