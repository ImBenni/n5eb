name: Heavenly Restriction
type: feat
_id: c1P7g6vfwfwmJs9Z
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>A pact to reduce your natural Cursed Energy to instead increase the natural abilities of your physical
      body.</p><p>This must be selected at character creation and cannot be reversed by any normal means.</p><p>This
      pact in particular has multiple steps.</p><p>At any point when you would be able to choose binding vows, you may
      advance this binding vow up to any stage.</p><p>The first step requires one major binding vow slot, each step
      after requires an additional minor binding vow slot.</p><p></p><p>(1): Reduce your maximum Cursed Energy by half
      your level.</p><p>Increase your Maximum HP by your level.</p><p>Hereafter, every level increase your Maximum HP by
      +1.</p><p>(2): Reduce your maximum Chakra by -1.</p><p>Hereafter, every level decrease your Maximum CP by
      -1.</p><p>Increase your passive stealth(10+ Stealth Skill) by +5.</p><p>You are considered hidden to creatures who
      rely on Chakra Sensing or Chakra Sight to see you.</p><p>If the creature also has true sight, this is
      ignored.</p><p>(3): Reduce your maximum Cursed Energy by an additional -3.</p><p>Increase your unarmed
      damage/weapon die by one step and you may take the dash action as a bonus action.</p><p>(4): You no longer regain
      Cursed Energy naturally on your turn.</p><p>Increase your movement speed by +20 feet and ignore difficult
      terrain.</p><p>You also increase your Passive Perception and Insight by +5.</p><p>(5): Reduce your maximum Cursed
      Energy to 0.</p><p>At the beginning of your turn, you regain hit points equal to your Constitution
      Modifier.</p><p>Gain DR equal to half your level(min 2).</p><p></p>
