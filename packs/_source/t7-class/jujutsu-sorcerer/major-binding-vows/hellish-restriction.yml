system:
  description:
    value: >-
      <p>A pact to harm your vitality in exchange for a power up beyond your mortal understanding.</p><p> As an action,
      you may choose to enter a circle of hell.</p><p> To enter the circle you must pay a specified amount of Hit
      Points.</p><p> If you choose to skip to a higher circle, you must pay the Hit Point cost of each circle.</p><p>
      Hit Points spent cannot be recovered until you take a long rest.</p><p> 1st Circle(10): Increase your maximum
      Cursed Energy by half your level.</p><p> 2nd Circle(10): Double your movement Speed and you may dash or disengage
      as a bonus action.</p><p> 3rd Circle(15): You may dodge as a bonus action or reaction.</p><p> 4th Circle(15):
      Increase your AC and save results by +1 5th Circle(20): You're immune to all Mental Conditions.</p><p> 6th
      Circle(20): You are always under the effects of the dodge action and always under the effects of The Zone.</p><p>
      7th Circle(25): Each Cursed Energy you spent is now considered 2.</p><p></p>
