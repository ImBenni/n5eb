folder: EWA7LNq0YeYVFogx
name: 'Major Binding Vow: True Life''s Work'
type: feat
_id: 0a8wcFZ9PJRPoCPX
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>Prerequisite: Cursed Puppet Manipulation</p><p>You take upon a major vow to allow your technique to flourish
      the most it can.</p><p>Upon taking this Vow, you forgo your existing character and now play as your Cursed
      Puppet.</p><p>Your Cursed Puppet gains access to all of your senses, resources, features, jutsu, and abilities
      that do not come from your clan.</p><p>Any ability score the Cursed Puppet possesses that is less than your
      equivalent scores, becomes equal to your equivalent score.</p><p>Your Cursed Puppet's maximum hit points are also
      doubled.</p><p>Cursed Puppets are considered conscious during any form of rest.</p><p>Cursed Puppets do not
      possess death saving throws, instead, so long as a fraction of them can be recovered, they can be revived upon
      recieving hit points again.</p><p>Your motivations and actions change depending on your Divergent Path, granting
      you following esoteric benefits:</p><p></p><p>Nature and Nurture:</p><p>You believe it would be best for your
      creation to grow organically, on its own independent of you.</p><p>Your existing character becomes an NPC under
      the DMs control.</p><p>Your Cursed Puppet gains an Archetype class feat for free.</p><p>Your Cursed Puppet gains
      the Bloodline, Latent feat for free.</p><p>Reduce the cost of all Cursed Cores by -1.</p><p></p><p>Revolution and
      Industrialization:</p><p>You form a pact to bestow yourself with immense Cursed Energy, at the cost of your
      physical vitality.</p><p>While you are not an NPC, you have become completely unable to move properly, and your
      health has degraded so much to the point where even the sunlight will kill you.</p><p>You gain twice as much
      Cursed Energy.</p><p>You have access to every Cursed Technique.</p><p>Using downtime, you may craft additional
      Puppet Upgrades from the Puppet Master class.</p><p>The amount of downtime required is equal to 10 + an amount
      equal to the rank of the desired upgrade.</p><p>You can craft upgrades up to one tier higher than your highest
      known tier.</p><p>(Wood: 2, Bronze: 4, Silver: 6, Gold: 8, Platinum: 10).</p><p>You can craft an additional number
      of upgrades this way equal to your proficiency bonus.</p><p></p>
