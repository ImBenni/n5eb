img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>Prerequisite: Cursed Vessel</p><p>The Curse inhabiting your body is a threat to everyone in the
      world.</p><p>Once per long rest, at anytime you would be feeling great distress or as a Full-Turn Action, you may
      call upon your Cursed Spirit.</p><p>When this happens, you must make a DC 20 Charisma Check.</p><p>On a failure,
      the Spirit takes over and acts as it pleases(the DM controls your character).</p><p>However, it most normally
      prioritizes self preservation through any means necessary.</p><p>Regardless, you gain the following benefits for
      the next minute.</p><p>You immediately gain 15 Cursed Energy, this can surpass your maximum.</p><p>You also may
      use up to 2 Cursed Techniques per turn.</p><p>At the beginning of your turn, you may spend any amount of Cursed
      Energy and gain an equal amount in Temporary Hit Points You gain access to every Cursed Technique.</p><p>Reduce
      all damage received by your Proficency Bonus.</p><p>This ability may be used once per rest.</p><p></p>
