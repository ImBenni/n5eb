system:
  description:
    value: >-
      <p>Prerequisite: Disaster Flames</p><p>You compliment your enemy during their dying breaths;</p><p>however, it
      leads to an even stronger one setting their eyes on you. </p><p>Whenever you would kill an adversary that's an
      elite or solo you can compliment them right before death, gaining the benefits of a long rest when you do.
      </p><p>You can only do this once per rest. </p><p>Afterwards, an enemy that is overwhelmingly stronger than you is
      set to fight you in the near future, with survival not being a guarantee.</p>
