system:
  description:
    value: >-
      <p>Prerequisite: Shadow Summoning Techinque </p><p>You gain access to the final Shadow Summoning creature that no
      one can control.</p><p>As a Full-Turn Action, you may spend 10 Cursed Energy to summon Makora.</p><p>Every
      creature within 100 feet of you upon summoning is a part of the Subjugation Ritual.</p><p>Makora is controlled by
      the DM, is hostile to every creature, and moves before the summoner in turn order.</p><p>In order for the ritual
      to end, every creature's Hit Points besides Makora's must be reduced to 0 or Makora's Hit Points must be reduced
      to 0.</p><p>Anyone reduced to 0 during the ritual does not roll death saves and if they remain at 0 by the end of
      the ritual, they immediately die.</p><p>If you are alone(excluding summons/clones) when you defeat Makora, you
      gain control over it and may summon it as if it were an S-Rank summon.</p><p>If anyone else is included in the
      ritual, the ritual is seen incomplete.</p><p>Building Makora has two options.</p><p>You may either use the Jujutsu
      Sorcerer Class Mod Shikigami summon build as if it were a level 20 S-rank or use the Jujutsu Sorcerer Class Mod
      Level 6 Mahoraga stat block :).</p><p><a
      href="https://homebrewery.naturalcrit.com/share/1nEFYZRMbfs5x5XMCkuAuDXTbT-bqXwts8yK71sLpAAYF">Jujutsu Sorcerer
      Class Mod</a></p>
