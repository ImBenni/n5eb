system:
  description:
    value: >-
      <p>You gain access to a nature release of your choice.</p><p> Jutsus from the nature release increase their damage
      dealt or damage healed by two die(Once per casting).</p><p> If you are damaged by the damage type that is
      surperior to your element, you take additional damage equal to twice the caster's proficiency modifier.</p><p> For
      example, if you chose fire release and take cold damage, you take the additional damage.</p><p></p>
