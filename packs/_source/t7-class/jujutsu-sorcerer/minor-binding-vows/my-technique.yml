system:
  description:
    value: >-
      <p>As a bonus action you give away the intricacies of your jujutsu technique to up to 3 creatures within 80 feet
      of you.</p><p> A creature can only be told if they understand the language you are speaking.</p><p> Once a
      creature is informed, this cannot be used on that creature until they complete a long rest.</p><p> For 1 minute
      after being informed of your technique, features requiring Cursed Energy are automatically magnified.</p><p> If
      your technique does not have a magnification effect, it deals additional damage equal to your proficiency bonus(In
      the case of shadow summons, their attacks do additional damage equal to your proficiency Bonus) or increase their
      Save DC by +1.</p><p> Informed creatures gain a +3 to their AC and against saving throws against any attack/save
      that originates or is augmented from your Jujutsu technique.</p><p></p>
