system:
  description:
    value: >-
      <p>Prerequisite: Level 7+ </p><p>While benefitting from Rally and deal damage to a creature with Trick Weapon,
      increase the amount of hit points recovered by +1 each time you roll the maximum amount on a damage die (Ex.
      Rolling an 8 on a d8).</p><p> Additionally, when you hit a creature with your Riposte attack after Parrying, you
      recover a number if hit points equal to your proficiency.</p><p> Double this healing if your Riposte attack
      reduces the creature to 0 hit points</p>
