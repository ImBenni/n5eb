system:
  description:
    value: >-
      <p>When you would use a consumable item that provides a resource, such as a blood, chakra, or military pill, add a
      +2 to the amount gained.</p><p> When using a consumable item that deals damage, such as an explosive tool, you
      deal an additional die of damage.</p><p> You can benefit from this rune a number of times equal to your
      proficiency bonus per long rest.</p><p> At Later Levels: At 5th level, select either the Base Form or the Trick
      Form of your Trick Weapon, you may choose to replace one of the traits of that weapon with another trait of your
      choosing.</p><p> You cannot replace the Two-Handed trait with this feature.</p><p></p>
