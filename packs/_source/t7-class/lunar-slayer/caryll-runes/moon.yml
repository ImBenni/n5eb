system:
  description:
    value: >-
      <p>Prerequisite: Level 10+ </p><p>Once per full rest, when you are Dying, you can choose to begin rolling to enter
      Flora's Dream even if you haven't failed 3 Death Saves.</p><p> If you succeed, you immediately vanish into Flora's
      Dream, reappearing to a space of your choice within 20 feet of the location you vanished from in 1d4 turns, having
      gained the benefits of a Short Rest.</p><p> If you fail this check, you automatically fail the Death Save on your
      turn.</p><p> Additionally, you gain a bonus to Flora's Grace checks equal to your number of failed Death Saving
      Throws.</p><p></p>
