system:
  description:
    value: >-
      <p>Beginning at 2nd level, you gain access to Caryll Runes.</p><p> These runes have been passed down from
      generations of Lunar Slayers, and are believed to be utterings from beings from far beyond that when inspired bear
      fruit to new power.</p><p> You gain 1 Caryll Rune, and gain additional runes as indicated on the Lunar Slayer
      class table.</p><p> Caryll Runes are listed at the end of this class, and you can switch any number of Caryll
      Runes on a long rest.</p><p></p>
