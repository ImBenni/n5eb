folder: xP9kUrTIQSGTQRoK
name: Eyes On The Inside
type: feat
_id: 4UuJfF4ohYCyMOLm
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Beginning at 9th level, in your pursuit towards enlightenment, you gain access to a special resource known as
      Insightful Eyes.</p><p> You can use these eyes in the following ways to garner insights about a creature within 30
      feet of you on your turn, once per turn.</p><p> Knowledge gained from this feature miraculously comes to your
      character's mind, as they are not even sure how they know the things that they do.</p><p> You have a number of
      eyes equal to your proficiency bonus.</p><p> You regain half your spent eyes on a long rest, and all eyes on a
      full rest.</p><p> Each time you use an Insightful Eye, you gain 15 feet of true sight until the end of your next
      turn.</p><p> This becomes 30 feet at 15th level.</p><p></p><p> 1 Insightful Eye: Increase your Passive Perception
      and Passive Insight by half your Lunar Slayer level, rounded up, until the end of your next turn.</p><p> 1
      Insightful Eye: You learn your target's Ninjutsu, Genjutsu, Taijutsu Save DC (Pick one).</p><p> 2 Insightful Eye:
      You may ask your DM if the target is resistant or immune to a specific damage type.</p><p> 2 Insightful Eyes: You
      may ask your DM is the target is resistant or immune to a specific condition.</p><p> 3 Insightful Eyes: You learn
      your target's highest or lowest ability score (Pick one).</p><p> 3 Insightful Eyes: Learn the target's jutsu list
      of a specific classification (Ninjutsu, Genjutsu, Taijutsu, Bukijutsu).</p><p> 5 Insightful Eyes: You learn the
      current and maximum, hit points or chakra points of your target (Pick one).</p><p></p>
