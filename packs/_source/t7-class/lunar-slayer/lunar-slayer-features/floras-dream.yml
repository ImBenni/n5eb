folder: xP9kUrTIQSGTQRoK
name: Flora's Dream
type: feat
_id: ugBXYBpv027uYcah
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Beginning at 10th level, your journey in understanding the mysticism of the world has granted sympathy from an
      unknown force when you would be confronted with death.</p><p> After gaining this feature, the next time you would
      fail three death saving throws or die, you instead do not die.</p><p> By the mercy of the forces that guide you,
      your body and all equipment on your person vanish from the material plane, reforming in a pocket dimension known
      as Flora's Dream.</p><p> Flora's Dream is modeled after a real life location, which contains many small
      aberrations known as servants, and one humanoid servant.</p><p> Work with your DM on how to make the dream more
      fitting and unique for your character.</p><p> After one day's time, you gain the benefits of a full rest, however,
      you gain 2 ranks of exhaustion and only recover a number of hit points and chakra points equal to half your
      maximums.</p><p> You return to the real world 1 mile from your comrades during nightfall.</p><p> To trigger this
      feature again after the 1st time, you must meet the same conditions as you did before and make a Flora's Grace
      Check.</p><p> Roll a d20 and add 1/3rd your Lunar Slayer level to the result.</p><p> Your result cannot be
      increased by any jutsu, feat, or clan/class feature.</p><p> If your result is a 13 or higher, you return to the
      dream, however, you cannot leave until one week has passed.</p><p> If you desire to leave the dream early, your DM
      can impose one or more checks at their discretion to allow you to do so, however, be warned that leaving the dream
      early can and will cause your character to return in a far weaker state.</p><p> At 18th level, just like before,
      you can now leave Flora's Dream after 1 day as opposed to a week.</p><p> When you leave Flora's Dream, you
      re-enter the world within 500 feet of your comrades, at your full hit points and chakra points, with no ranks of
      exhaustion.</p><p></p>
