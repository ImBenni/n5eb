system:
  description:
    value: >-
      <p>Beginning at 2nd level, you have learned to specialize the forms of your Trick Weapon to deal with foes more
      vile than that of typical shinobi.</p><p> You gain access to two new weapon properties, Righteous and
      Serrated.</p><p> Your Trick Weapon's base form gains one of these properties, while its Trick Form gains the
      other.</p><p> These properties allow you to ignore resistance and treat immunity as resistance against specific
      types of adversaries, listed below:</p><p>Righteous: Aberrations, Celestials, Demons, Otsutsuki.</p><p>Serrated:
      Beasts, Monstrosities, Undead, Plants</p>
