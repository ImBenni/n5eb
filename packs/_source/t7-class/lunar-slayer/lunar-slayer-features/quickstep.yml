_id: HePQ4eO0v3HLCsOO
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Beginning at 6th level, you learn the iconic evasive technique used by slayers throughout the ages, known as
      Quickstep.</p><p> As a reaction and 3 chakra, you gain a +3 bonus to your AC and Dexterity saving throws until the
      start of your next turn, and immediately move up to 10 feet.</p><p> If this movement would move you outside of an
      area of effect that imposes a Dexterity saving throw, you have advantage on the saving throw.</p><p> Also, while
      benefitting from Quickstep, you can move up to 5 feet when an attack misses you.</p><p> Movement from Quickstep
      cannot provoke attacks of opportunity.</p><p> At 11th level, you can increase the cost of Quickstep to 5 chakra to
      increase the bonus to a +5.</p><p> Also, while under the effects of Quickstep, on a successful Dexterity saving
      throw you take no damage or effects, and take half damage on a fail.</p><p></p>
