system:
  description:
    value: >-
      <p>Beginning at 6th level, you have learned a tactic to mend your own wounds by extracting the life energy from
      creatures you attack.</p><p> In combat, when a hostile creature damages you, record the hit points lost.</p><p> If
      you are damaged multiple times, you must record the most recent instance of hit points lost.</p><p> Until the end
      of your next turn, when you damage a hostile creature with an unarmed, melee weapon, or melee taijutsu attack, you
      recover Xd6 hit points, where X equals half your proficiency bonus.</p><p> This healing cannot be boosted by any
      means outside of this class.</p><p> Once you recover a total number of hit points equal to your recorded value,
      this feature ends.</p><p> A creature resistant or immune to Bleeding, halves or prevents any hit point recovery
      from this feature respectively.</p><p></p>
