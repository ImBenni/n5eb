folder: xP9kUrTIQSGTQRoK
name: Slayer's Rifle
type: feat
_id: h4rhh2ng2YkDyC7X
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Beginning at 7th level, you craft a unique weapon that no other real shinobi could or would consider making; A
      Gun.</p><p> You gain the Slayer's Rifle, a ranged weapon (Properties: Ammunition, Finesse, Light, Multiattack,
      Range(30/60) that deals 2d4 piercing damage.</p><p> If ever lost, you can craft an identical rifle on a long rest
      for 100 ryo.</p><p> You wield your Slayer's Rifle in your non-dominant hand.</p><p> The Slayer's Rifle can be used
      as a component for Bukijutsu that require a bow.</p><p> The Slayer's Rifle uses a special form of ammunition known
      as Quicksilver Bullets, which only you can produce.</p><p> When your rifle runs out of ammunition, you can gain a
      full stack of Quicksilver Bullets by spending 1 hit die.</p><p> The Slayer's Rifle has access to its own set of
      tricks listed in the tricks section.</p><p> Your gun is always equipped with the Slayer's Parrying Trick, which
      does not count against your known Tricks.</p><p> You can equip the rifle with a single other Slayer's Trick in
      addition to this Trick.</p><p> Wielding the Slayer's Rifle does not prevent the use of Hand Signs with that
      hand.</p><p> At 14th level, you improve your rifle's design.</p><p> Its range becomes (60/90), it gains the
      critical property, and its damage die becomes 2d6.</p><p></p>
