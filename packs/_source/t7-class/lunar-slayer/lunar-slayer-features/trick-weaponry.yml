folder: xP9kUrTIQSGTQRoK
name: Trick Weaponry
type: feat
_id: YVSZDFoGsi3nTyYp
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Beginning at 1st level, you begin to integrate the ways of the Lunar Slayer into your kit, and forge a weapon
      that can adapt to any situation.</p><p>You gain your first Trick Weapon.</p><p>Only Lunar Slayers are proficient
      in Trick Weapons.</p><p>Trick Weapons are special in that they are able to transform between two different weapons
      by being pressed or moved in a specific way.</p><p>Select two weapons, such as a Great Axe and a Sasumata, or a
      Tanto and a Longbow.</p><p>You merge these weapons into a hybrid weapon that can switch between both
      weapons.</p><p>While formed into a Trick Weapon, both of your chosen weapons become Greater in quality and
      increase their damage die by 1 step, up to a 2d8.</p><p>One weapon is denoted as the Trick Weapon's Base Form, and
      the other its Trick Form.</p><p>The design of your hybrid weapon is up to you, though generally the more complex
      weapon of the two is listed as its Trick Form.</p><p>You can switch between both forms of your weapon during your
      turn (no action required), and can switch which weapons make up your Trick Weapon on a full rest.</p><p>Trick
      Weapons can use Strength or Dexterity for weapon and Bukijutsu attacks, and your Save DC for Bukijutsu.</p><p>You
      can also always use Bukijutsu that your weapon qualifies for, regardless of its current damage type or form (This
      does not allow you to cast Bukijutsu that require a ranged weapon with a melee weapon, and vice versa.)
      </p><p>Finally, your Trick Weapon gains access to 1 Trick of your choice, which are listed at the end of this
      class.</p><p>Your weapon gains more tricks as you level up in this class.</p><p>You may swap your any Tricks you
      have chosen on a long rest or level up.</p><p></p>
