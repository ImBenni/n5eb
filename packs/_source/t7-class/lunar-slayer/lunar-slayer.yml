            Dice:</strong> 1d10 per Lunar Slayer level<br /><strong>Hit Points at 1st Level and beyond</strong>: 10 +
            your constitution modifier</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice</strong>: 1d8 per Lunar
            Slayer level<br /><strong>Chakra Points at 1st Level</strong>: 8 + your constitution modifier<br
            /><strong>Chakra Points at Higher Levels</strong>: 1d8 (or 5) + your Constitution Modifier per Lunar Slayer
            level after 1st.</p><hr /><h3>Proficiencies</h3><p><strong>Armor</strong>: Light armor, medium armor<br
            /><strong>Weapons</strong>: All Simple and Martial Weapons<br /><strong>Ninja Tools</strong>: Alchemist Kit,
            Armorsmith Kit, Disguise Kit, Forensics Kit, Trappers Kit, Weaponsmith Kit<br /><strong>Saving
            Throws</strong>: Dexterity, Wisdom, Intelligence<br /><strong>Skills</strong>: Acrobatics, Crafting, Choose
            two from Athletics, History, Intimidation, Insight, Perception, Ninshou, Stealth, Survival, Martial
