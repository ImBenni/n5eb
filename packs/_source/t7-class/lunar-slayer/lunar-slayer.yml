system:
  description:
    value: >-
      <p>As a Lunar Slayer, you gain the following class features.</p><h3>Hit Points</h3><p><strong>Hit Dice:</strong>
      1d10 per Lunar Slayer level<br /><strong>Hit Points at 1st Level and beyond</strong>: 10 + your constitution
      modifier</p><hr /><h3>Chakra Points</h3><p><strong>Chakra Dice</strong>: 1d8 per Lunar Slayer level<br
      /><strong>Chakra Points at 1st Level</strong>: 8 + your constitution modifier<br /><strong>Chakra Points at Higher
      Levels</strong>: 1d8 (or 5) + your Constitution Modifier per Lunar Slayer level after 1st.</p><hr
      /><h3>Proficiencies</h3><p><strong>Armor</strong>: Light armor, medium armor<br /><strong>Weapons</strong>: All
      Simple and Martial Weapons<br /><strong>Ninja Tools</strong>: Alchemist Kit, Armorsmith Kit, Disguise Kit,
      Forensics Kit, Trappers Kit, Weaponsmith Kit<br /><strong>Saving Throws</strong>: Dexterity, Wisdom,
      Intelligence<br /><strong>Skills</strong>: Acrobatics, Crafting, Choose two from Athletics, History, Intimidation,
      Insight, Perception, Ninshou, Stealth, Survival, Martial Arts</p><h1>Lunar Slayer
      Advancement</h1><table><thead><tr><th>Level</th><th>Proficiency Bonus</th><th>Features</th><th>Caryll
      Runes</th><th>Tricks</th><th>Jutsu Known</th><th>Highest Rank Jutsu
      Known</th></tr></thead><tbody><tr><td>1st</td><td>+3</td><td>@UUID[Compendium.n5eb.t7-class.Item.2xEgleCyoE7lkrvj]{Wrath
