name: Slayer's Cannon Trick
type: feat
_id: 7jRLNDx4zpWHXwfT
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>You install a mechanism into your Slayer's Rifle that allows it to morph into a large, incredibly heavy, cannon
      as a bonus action.</p><p> Reverting the Slayer's Rifle also takes a bonus action.</p><p> While your rifle is in
      this state, you cannot attack with this weapon, or utilize any other tricks it may have.</p><p> It also gains the
      heavy and two-handed properties.</p><p> As an action, you can lower your ammunition die by a step to fire a shot
      from the cannon at a space within 300 feet.</p><p> All creatures within 20 feet of the space must make a Dexterity
      saving throw against your highest save DC, taking Xd10 force damage on a failed save, or half as much on a
      success, where X equals your proficiency bonus.</p><p> Each time you use this trick, the Xd10 is lowered by 1 step
      until you take a long rest.</p><p> If this damage would ever go below Xd4, this trick becomes inoperable until you
      take a long rest.</p><p></p>
