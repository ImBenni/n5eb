folder: kXHW9g8qLsRnz1ha
name: Slayer's Iron Trick
type: feat
_id: ope2sZpShPzKuvGo
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>You install some sort of mechanism such as a button to melt down your Rifle temporarily into a fist like weapon
      hardened with Quicksilver.</p><p> By lowering your ammunition die by a step, you can activate this trick until the
      end of the turn.</p><p> When you do, your Slayer's Rifle becomes a melee simple weapon, losing the range and
      ammunition properties, and gaining the unarmed property.</p><p> The damage die of your rifle also becomes
      d8s.</p><p> When you land a melee weapon attack against a creature with your Slayer's Rifle, you can impose a
      Strength saving throw, Dexterity saving throw, or Constitution saving throw.</p><p> On a failed strength saving
      throw, you hit the creature with so much force that they are knocked back 30 feet.</p><p> On a failed Dexterity
      saving throw, you quickly slam the creature to ground, knocking them prone.</p><p> On a failed Constitution saving
      throw, you hit the creature in a vital area, causing them to become Weakened until the end of your next
      turn.</p><p> You can dismiss this Trick early on your turn (no action required).</p><p></p>
