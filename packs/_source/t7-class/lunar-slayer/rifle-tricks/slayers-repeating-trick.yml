name: Slayer's Repeating Trick
type: feat
_id: cgP1aY0rswfLYfDS
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Instead of focusing on complex gadgets, you choose to improve on the basic fundamentals of your rifle.</p><p>
      Your Slayer's Rifle gains a second barrel, allowing you to make two attacks with your Rifle as a bonus action,
      instead of only one, though you must have already used your action to have the bonus action benefit from this
      trick.</p><p> If you take the attack action with your rifle, you can attack three times, instead of only twice,
      with ranged weapon attacks.</p><p> Lastly, on your turn you can lower your ammunition die by a step.</p><p> When
      you do, your Slayer's Rifle deals an additional +2 damage with ranged weapon attacks.</p><p></p>
