folder: kXHW9g8qLsRnz1ha
name: Slayer's Shielding Trick
type: feat
_id: 8bWGd6AiYVJoopRi
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>You install a mechanism to allow your rifle to transform into one of two shields.</p><p>Slayer's do not
      normally employ shields, as the greatest defense is a strong offense, but you disagree.</p><p>When you take this
      Trick, select between the Timber Shield or Crystal Lake Shield.</p><p>You gain this shield.</p><p>As a reaction,
      you can lower your ammunition die by a step to transform your Slayer's Rifle into your chosen shield and
      immediately block with it.</p><p>Once activated, on subsequent rounds you can block with your shield again as a
      reaction.</p><p>While your shield is active, you cannot use your Quickstep feature or attack with your Slayer's
      Rifle.</p><p>Reverting your shield back into your rifle takes a free action.</p><p>You can take this trick
      twice.</p><p>When you do, your Slayer's Rifle gains the ability to transform into either
      shield.</p><p></p><p>Timber Shield: </p><p>Your rifle transforms into a wooden shield with a steel
      foundation.</p><p>When you block with your shield, you gain a buffer of hit points equal to your Lunar Slayer
      level, and are resistant to Bludgeoning, Piercing, and Slashing damage while you possess these hit
      points.</p><p></p><p>Crystal Lake Shield: </p><p>Your rifle transforms into a beautiful aquamarine tinted shield
      made of a unique crystal.</p><p>When you block with your shield, you gain a buffer of hit points equal to your
      Lunar Slayer level, and are resistant to Earth, Wind, Fire, Water, and Lightning damage while you possess these
      hit points.</p><p></p>
