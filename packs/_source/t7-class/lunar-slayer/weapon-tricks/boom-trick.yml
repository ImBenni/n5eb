system:
  description:
    value: >-
      <p>You install a compartment into your Trick Weapon to store an assortment of explosive tools within your
      weapon.</p><p> During a rest, you can store an Explosive Ninja Tool in your Trick Weapon, which you can only
      access while your weapon is in its Trick Form.</p><p> At 7th, 14th, and 18th levels of this class, you can store
      an additional explosive tool.</p><p> When you declare a weapon attack against a creature, you may choose to
      consume any amount of the explosive tools stored in your Trick Weapon causing the end of your weapon to become
      emblazoned in embers.</p><p> On a successful hit, the target creature must make a Dexterity saving throw against
      highest DC of the explosive tools used, or your Taijutsu Save DC, suffering the effects of the Explosive Tool on a
      failure.</p><p></p>
