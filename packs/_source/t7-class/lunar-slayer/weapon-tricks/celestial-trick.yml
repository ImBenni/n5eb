folder: 8rjsiabZ06KBSjOa
name: Celestial Trick
type: feat
_id: VLIWchxun4Q0DBXC
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>You install a mechanism to utilize the celestial light above to empower your weapon.</p><p> Twice per rest, as
      an object interaction, you can raise your trick weapon to the sky and activate the light stored within.</p><p>
      This trick lasts for 1 minute.</p><p> For the duration an aura of turquoise chakra outlines your weapon, radiating
      a 15-foot radius of bright light and a 30- foot radius of dim light.</p><p> This light nullifies chakra enhanced
      darkness.</p><p> Your weapon damage also counts as force damage.</p><p> If your weapon is a melee weapon, at the
      start of your turn, you can spend 3 chakra to increase its range by 15 feet until the beginning of your next
      turn.</p><p> If your weapon is a ranged weapon, at the start of your turn, you can spend 3 chakra to grant
      yourself an additional amount of range equal to half your normal range until the beginning of your next
      turn.</p><p> While benefiting from this trick in sunlight, gain a +1 to weapon attacks.</p><p> In moonlight,
      ignore this trick's chakra costs.</p><p></p>
