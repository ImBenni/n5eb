name: Elemental Trick
type: feat
_id: b593AJVwyOCdWTag
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>You install a mechanism inside of your Trick Weapon that allows it to conduct elemental affinities.</p><p> If
      you do not have a nature release, select one nature release upon creating this trick, picking from Earth, Wind,
      Fire, Water, or Lightning.</p><p> On your turn (no action required), you can spend 3 chakra to make a swift motion
      with your Trick Weapon, coating it in an aura of your chosen release.</p><p> If you have a nature release, you can
      do this without spending chakra, with any nature release you have.</p><p> For 1 minute, your weapon's damage also
      counts as your element's damage type, for the purposes of overcoming resistance and immunity.</p><p> Once per
      turn, when you hit a creature with your weapon, you can spend 3 chakra to impose a Constitution saving throw,
      giving the creature one rank of a condition associated with your element on a failed save.</p><p> (Earth=Bruised,
      Wind=Bleeding, Fire=Burned, Water=Chilled, Lightning=Shocked)</p>
