name: Pragmatic Trick
type: feat
_id: 0RcsJtMqeWb9Y0lV
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Instead of using strange and outlandish mechanisms and components to improve your Trick Weapon, you instead opt
      for more functional, tried and true upgrades, select 2 of the following Mechanisms, you decide which form of your
      Trick Weapon is affected by each of these upgrades:</p><p></p><p>Deadly Mechanism:</p><p>You install a mechanism
      to improve your weapon's life-taking capabilities, such as additional blades, or a self-sharpening metallic
      scabbard.</p><p>Your Trick Weapon gains the Deadly property.</p><p>You may apply the Deadly property to
      Bukijutsu.</p><p></p><p>Defensive Mechanism:</p><p>You install a mechanism to improve your weapon's defensive
      capabilities, such as a cross guard, or blade-catching grooves along the blade.</p><p>Your weapon gains the
      Blocking property.</p><p></p><p>Extended Mechanism:</p><p>You install a mechanism to increase your weapon's reach,
      such as a larger grip, or a longer blade.</p><p>Your weapon gains the Reach 2 property.</p><p>If your weapon is a
      ranged weapon, it instead has both of its ranges increased by 15ft.</p><p>If your Weapon already has the Reach
      property, you may increase its ranks of reach by 2.</p><p></p><p>Folding Mechanism:</p><p>You install a mechanism
      within your Trick Weapon that folds inward and outward to throw enemies off balance.</p><p>Your weapon gains the
      Trip and Hidden properties.</p><p></p><p>You may select this Trick a second time, gaining 2 more
      upgrades.</p><p></p>
