system:
  description:
    value: >-
      <p>You install a mechanism to allow your Trick weapon to split into two weapons.</p><p> As bonus action, you can
      spend 5 chakra to split your Trick Weapon in two, granting you access to your Trick Weapon's base form and trick
      form at once.</p><p> You can revert your weapon back to normal on your turn (no action required).</p><p> For the
      duration, your Trick Weapon loses the Two-Handed and Heavy properties if it had them in either form, and you gain
      the benefits of Two-Weapon Fighting Stance.</p><p> While this Trick is active, you cannot use your Slayer's Rifle
      as you do not have a free hand to fire it.</p><p> Any additional tricks you possess are split between the two
      weapons.</p><p></p>
