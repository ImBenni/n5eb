name: Unarmed Trick
type: feat
_id: WTiOmvoE9X4StwPH
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>You install a mechanism to allow your Trick weapon to morph and cover one or both of your hands or legs, such
      as claws or brass knuckles.</p><p> As a bonus action, you can spend 5 chakra to activate this trick.</p><p> For
      the duration, your unarmed damage assumes the damage of either your Trick Weapon's base form or trick form,
      although the total damage die is reduced by -1 (Min. 1 die).</p><p> Your Trick Weapon also gains the unarmed
      property.</p><p> When you select this trick, you learn one taijutsu fighting stance and can automatically assume
      it as a part of activating this trick, or unassume it as part of deactivating this trick.</p><p> You ignore any
      stance restriction that states you cannot use a weapon.</p><p> Your chosen stance cannot be changed, even if you
      would reselect this trick.</p><p> You can dismiss this trick on your turn (no action required).</p><p></p>
