system:
  description:
    value: >-
      <p>You fit some kind of toxic organic matter into your Trick Weapon, like the vertebrae of a deceased mammal or
      fang of a poisonous snake.</p><p> When you first craft this trick, choose between Acid, Necrotic, or Poison
      damage.</p><p> Your weapon's damage counts as this damage type for the purposes of overcoming resistance and
      immunity.</p><p> Once per turn, when you hit with your Trick Weapon, you can spend 3 chakra to excite the living
      matter within your weapon, causing it to lash out.</p><p> On a hit, the affected creature must make a Constitution
      saving throw, gaining a special effect depending on the damage type of the weapon.</p><p></p><p> Acid: On a failed
      save, the creature gains 1 rank of Corroded.</p><p> Necrotic: On a failed save, the creature gains 1 rank of
      Lacerated.</p><p> Poison: On a failed save, the creature gains 1 rank of Envenomed.</p><p></p>
