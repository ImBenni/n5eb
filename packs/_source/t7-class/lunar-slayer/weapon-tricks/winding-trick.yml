name: Winding Trick
type: feat
_id: S2u1Xq4ZSWwTUROF
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>You install a mechanism that allows you to move your weapon with more speed in order to increase the damage
      that it deals, such as a rotating mechanism, or integrating flexible materials to allow you to take advantage of
      the Momentum of your Trick Weapon.</p><p> Select the Base form or the Trick form of your weapon, you get the
      following benefit when your weapon is in that form; As an object interaction, you can wind your trick weapon,
      gaining up to 2 stacks of Momentum, up to a maximum of 4 stacks, for every stack of Momentum you have, your Trick
      Weapon deals an additional 1 damage, and for every 2 stacks, gain a +1 to hit with attacks with your Trick
      Weapon.</p><p> However, at the beginning of your turns, you lose 1 hit point for each stack of Momentum you have,
      as your weapons' speed causes it to recoil, this damage adds to the calculation of your Rally feature.</p><p> You
      lose 1 stack of Momentum if you don't hit an attack before the end of your next turn.</p><p> You can choose to
      lose all Momentum stacks on your turn, but you can only do so after you lose hit points from any stacks of
      Momentum you have accumulated (no action needed).</p><p></p>
