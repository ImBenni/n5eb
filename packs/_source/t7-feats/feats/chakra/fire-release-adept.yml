system:
  description:
    value: >-
      <p><strong>Category:</strong> Chakra <br /><strong>Prerequisite:</strong> Level 4+, Have the Fire Release Keyword
      <br />You have trained and become well versed in Fire release putting you above the average user of the
      element.</p><ul><li>Increase your Intelligence or Constitution score by 1, to a maximum of 20.</li><li>Jutsu with
      the Fire Release Keyword gain a + 1 to their DC.</li><li>Jutsu with the Fire Release Keyword that you would create
      or modify have their Chakra cost reduced by 1.</li><li>While you are concentrating on only Jutsu that contain the
      Fire Release keyword all concentration costs are reduced by 1.</li><li>All features of this feat do not stack with
      other adept feats</li></ul>
