system:
  description:
    value: >-
      <p><strong>Category:</strong> Chakra <br /><strong>Prerequisite:</strong> Level 4+, Have the Fuinjutsu Keyword <br
      />You have trained and become well versed in Fuinjutsu jutsu putting you above the average user of the
      style.</p><ul><li>Increase your Intelligence or Charisma score by 1, to a maximum of 20.</li><li>Jutsu with the
      Fuinjutsu Keyword gain a + 1 to their DC.</li><li>Jutsu with the Fuinjutsu Keyword that you would create or modify
      have their Chakra cost reduced by 1.</li><li>While you are concentrating on only Jutsu that contain the Fuinjutsu
      keyword all concentration costs are reduced by 1.</li><li>All features of this feat do not stack with other adept
      feats</li></ul>
