system:
  description:
    value: >-
      <p><strong>Category:</strong> Chakra <br /><strong>Prerequisite:</strong> Level 4+, Have the Fuinjutsu Keyword <br
      />Your focus on Fuinjutsu jutsu has granted you a vast mastery of chakra seals.</p><ul><li>Increase your
      Intelligence score by 1, to a maximum of 20.</li><li>You learn an additional jutsu with the Fuinjutsu keyword that
      you qualify for. This does not count against your Jutsu Known.</li><li>The next time you would hit 5th, 9th, or
      13th level, you learn one additional Fuinjutsu Jutsu of 1 rank lower than your highest known jutsu
      rank.</li><li>If you take this feat after you have passed the previously stated levels, you instead gain 1
      additional D-Rank if passed 5th level, 1 additional C-Rank if passed 9th level, and one additional B-Rank if
      passed 13th level all of which must have the Fuinjutsu Keyword.</li></ul>
