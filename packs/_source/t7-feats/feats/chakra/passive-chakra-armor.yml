    value: >-
      <p><strong>Category:</strong> Chakra <br /><strong>Prerequisite:</strong> Level 4+, You must know the Chakra Skin
      Jutsu<br />You have trained your body and mind, so that you are always ready for combat.</p><ul><li>Increase your
      Constitution score by 1, to a maximum of 20.</li><li>You are always under the effects of the Jutsu Chakra skin and
      it cannot be negated or countered in any way.</li><li>When you would take damage you may use your reaction to half
      the damage you would take. You have one use of this feature per short rest.</li></ul>
