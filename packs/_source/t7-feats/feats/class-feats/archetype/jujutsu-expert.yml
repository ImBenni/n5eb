system:
  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Jujutsu Sorcerer </p><p>Prerequisite: Jujutsu Training, Level 10
      </p><p>You have continued to train to better master of the art of wielding Cursed Energy.</p><p> This training has
      culminated into you being defined as an Expert.</p><p> You gain the following benefits; You gain the ability to
      use the Black Flash but The Zone only lasts until the beginning of your next turn.</p><p> You gain the Exorcism of
      the Wicked feature as if you were a 2nd level Jujutsu Sorcerer You gain an additional Cursed Technique and,
      optionally, one Minor Binding Vow.</p><p> Cursed Techniques and Binding Vows treat your Jujutsu Sorcerer level as
      6.</p><p></p>
