  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Jujutsu Sorcerer Slayer </p><p>Prerequisite: Jujutsu Expert, Level 15+
      </p><p>You have continued to train to better master the art of exterminating curses and turning misfortune into a
      weapon.</p><p> This training has culminated into you being defined as an specialist.</p><p> You gain the Cursed
      Physique class feature.</p><p> You gain the 6th level feature from the Ever Vigilant class feature.</p><p> You
      gain 1 Cursed Technique and, optionally, 1 Major or Minor Binding Vow.</p><p> Cursed Techniques and Binding Vows
      treat your Jujutsu Sorcerer level as 10.</p><p></p>
