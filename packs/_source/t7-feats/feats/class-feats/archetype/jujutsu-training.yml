system:
  description:
    value: >-
      <p>Category: Archetype</p><p>Archetype: Jujutsu Sorcerer Prerequisite: Constitution 15, Level 5+, You cannot have
      Levels in the Jujutsu Sorcerer Class </p><p>You begin to train under Jujutsu Sorcerers, gaining access to their
      most basic techniques.</p><p>You gain the following benefits; You gain proficiency in Acrobatics.</p><p>You gain a
      number of Cursed Energy equal to your proficiency bonus.</p><p>You recover half your maximum Cursed Energy on a
      short rest, and all of it during a long rest.</p><p>At the end of your turns, you regain 1 point of Cursed
      Energy.</p><p>You gain 1 Cursed Technique and, optionally, 1 Minor Binding Vow.</p><p>Cursed Techniques and
      Binding Vows treat your Jujutsu Sorcerer level as 3.</p><p></p>
