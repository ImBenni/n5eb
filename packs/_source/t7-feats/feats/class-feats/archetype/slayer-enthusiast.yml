  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Lunar Slayer </p><p>Prerequisite: Slayer Expert </p><p>You continue your
      training to learn techniques unknowable to the normal mind.</p><p> This training has culminated into you being
      defined as an Enthusiast.</p><p> Select one Lunar Slayer Class, Slayer's Oath (Subclass).</p><p> You gain the 3rd
      level Slayer's Tool feature.</p><p> You also gain the first listed 3rd level feature of your chosen Slayer's
      Oath.</p><p> You treat your Lunar Slayer level as 6 for your Slayer's Oath's features, though you do not gain the
      2nd Slayer's Tool.</p><p></p>
