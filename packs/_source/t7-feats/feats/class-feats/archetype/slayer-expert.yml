    value: >-
      <p>Category: Archetype </p><p>Archetype: Lunar Slayer </p><p>Prerequisite: Slayer Training, Level 10+ </p><p>You
      have continued to train to hunt those beyond normal understanding.</p><p> This training has culminated into you
      being defined as an expert You gain the Hunter of the Profane feature.</p><p> You gain an additional Trick for
      your Trick Weapon.</p><p> Tricks you possess now treat your Lunar Slayer level at 6.</p><p> You gain one Caryll
      Rune from the Caryll Runes feature, treating your Lunar Slayer as 6.</p><p></p>
