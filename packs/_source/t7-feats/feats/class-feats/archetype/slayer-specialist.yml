system:
  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Lunar Slayer </p><p>Prerequisite: Slayer Expert, Level 15+ </p><p>You
      have continued to train to better master the killing those that do not belong with in this world.</p><p>This
      training has culminated into you being defined as an specialist.</p><p>You gain the Wrath of the Moon
      feature.</p><p>You can only add your proficiency bonus to damage rolls once per turn.</p><p>You gain the Slayer's
      Rifle feature as if you were 7th level.</p><p>Your Slayer's Rifle comes with the Slayer's Parrying Trick equipped,
      and cannot have its Tricks changed.</p><p>You gain an additional Trick or Caryll Rune (Pick one, this cannot be
      changed later).</p><p>All Lunar Slayer features you possess treat your Lunar Slayer level as 10.</p><p></p>
