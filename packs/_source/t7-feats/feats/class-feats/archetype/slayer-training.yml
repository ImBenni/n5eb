system:
  description:
    value: >-
      <p>Category: Archetype </p><p>Archetype: Lunar Slayer </p><p>Prerequisite: Strength or Dexterity 15 &amp;
      Intelligence or Wisdom 15, Level 5+, You cannot have Levels in the Lunar Slayer Class </p><p>You begin to train
      under Lunar Slayers, gaining access to their most basic techniques.</p><p> You gain the following benefits; You
      gain proficiency in Crafting.</p><p> You gain one Trick Weapon as stated in the Trick Weaponry feature, with minor
      adjustments.</p><p> You do not increase the damage of your weapons by 1 step.</p><p> You gain 1 Trick of your
      choice.</p><p> Tricks that refer to your level treat you as being a 3rd level Lunar Slayer.</p><p></p>
