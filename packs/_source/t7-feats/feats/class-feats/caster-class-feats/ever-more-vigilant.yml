system:
  description:
    value: >-
      <p>Category: Class</p><p>Prerequisite: At least 9+ levels in Jujutsu Sorcerer</p><p>You're not just ready for
      everything, you're super ready for anything.</p><p>You gain the following benefits; </p><p>You gain another option
      from your Ever Vigilant feature.</p><p>Using your Cursed Physique feature, you can select another saving throw to
      gain half proficiency in.</p><p>Alternatively, you can choose a saving throw you already choose to have half
      proficiency in.</p><p>If you do, you instead gain full proficiency in that saving throw.</p><p>Increase your total
      Cursed Energy by +1.</p><p></p>
