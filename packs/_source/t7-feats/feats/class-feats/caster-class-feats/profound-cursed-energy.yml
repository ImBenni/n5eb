system:
  description:
    value: >-
      <p>Category: Class </p><p>Prerequisite: At least 4+ levels in Jujutsu Sorcerer </p><p>Your Cursed Energy is much
      more potent than most, so much so that it even overwhelms you slightly.</p><p> You gain the following benefits;
      </p><p>When attacking a creature with the Cursed condition, you cannot roll at disadvantage, the DC to remove the
      condition increases by +1, and when Cursed creatures take damage from a Jujutsu Class feature, they instead take
      an additional 1d10 force damage, instead of a 1d6.</p><p> Select one Cursed Technique.</p><p> This technique has
      its Cursed Energy cost reduced by -2, to a minimum of 2 Increase your total Cursed Energy by +1.</p><p></p>
