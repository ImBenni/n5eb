name: Pale-Blood Sky
type: feat
_id: 8QyghlqdpQGpc7aa
img: icons/magic/symbols/cross-circle-blue.webp
system:
  description:
    value: >-
      <p>Category: Class </p><p>Prerequisite: At least 10+ levels in Lunar Slayer </p><p>After extensive research and
      experimentation, you decide to rest.</p><p>When you open your eyes again, instead of awakening in your resting
      place, you find yourself in Flora's Dream, however the sky appears different.</p><p>You gain the following
      benefits; </p><p>When you would encounter an Elite or Solo adversary, or a figure of great importance (as noted by
      the DM), you gain 1 Insightful Eye which can go over your maximum.</p><p>Whenever you would take a rest of any
      type, you can choose to willingly enter Flora's Dream for the remainder of your rest.</p><p>You are even able to
      bring other players with you.</p><p>This can only be done once a week.</p><p>You enter a dimension that no eyes
      can enter and can converse freely.</p><p>You cannot be surprised while in the dream this way, the only remnants of
      your presence in the physical world being your chakra signatures.</p><p>Once per month, you may as a Full Round
      Action choose to enter Flora's Dream.</p><p>If you receive any more damage before the conclusion of this effect,
      the effect is interrupted.</p><p>If you are interrupted, you can continue trying until you are
      successful.</p><p></p>
