system:
  description:
    value: >-
      <p><strong>Category:</strong> General <br />Alert to the hidden traps and secret doors found in many dungeons, you
      gain the following benefits:</p><ul><li>Increase your Intelligence or Wisdom score by 1, to a maximum of
      20.</li><li>You have advantage on Wisdom (Perception) and Intelligence (Investigation) checks made to detect the
      presence of secret doors.</li><li>You have advantage on saving throws made to avoid or resist traps.</li><li>You
      have resistance to the damage dealt by traps.</li><li>You can search for traps while traveling at a normal pace,
      instead of only at a slow pace.</li></ul>
