folder: adpy1HGzcCg26SvX
name: Genjutsu Preventionist
type: feat
_id: 24xra3Y7bZjm0usG
img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> General <br />Knowing that a skilled Genjutsu user can cripple an entire platoon of
      Shinobi in seconds, you train in the art of Genjutsu prevention to ensure you are always prepared. You gain the
      following benefits;</p><ul><li>Increase your Intelligence or Wisdom score by +1, up to the maximum of
      20.</li><li>You gain proficiency in Chakra Control.</li><li>You learn the E-Rank Genjutsu <em>Release</em>. If you
      already know this jutsu, you learn the C-Rank Genjutsu <em>Mass Release</em>.</li><li>When you cast either
      <em>Release</em> or <em>Mass Release</em>, you can use your chakra control skill in place of your Illusions
      skill.</li><li>When you cast <em>Release</em> or <em>Mass Release</em>, the jutsu are empowered in the following
      ways;</li><li><p><strong>Release:</strong> You can cast this jutsu as a bonus action.</p></li><li><p><strong>Mass
      Release:</strong> Increase the area of effect by 10 feet.</p></li></ul>
