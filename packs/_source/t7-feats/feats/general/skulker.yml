img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> General<br />You are expert at slinking through shadows. You gain the following
      benefits:</p><ul><li>Increase your Wisdom or Dexterity score by 1, to a maximum of 20.</li><li>You can try to hide
      when you are lightly obscured from the creature from which you are hiding.</li><li>When you are hidden from a
      creature and miss it with a ranged weapon attack, making the attack doesn't reveal your position.</li><li>Dim
      light doesn't impose disadvantage on your Wisdom (Perception) checks relying on sight.</li></ul>
    chat: ''
