img: icons/magic/symbols/mask-metal-silver-white.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> General <br />You've mastered a quick tongue and quicker reaction to aid your
      allies. You gain the following benefits:</p><ul><li>When an ally makes an attack roll, an ability check or a
      saving throw, you may spend your reaction to give them advantage on the roll. Once you use this ability, you can't
      use it again until you finish a short or long rest.</li><li>You can as a reaction to an ally within 30 feet of
      you, being hit with an attack, interpose, switching the target of the attack to yourself taking the damage
      instead.</li></ul>
    chat: ''
