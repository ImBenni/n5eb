img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Genjutsu <br /><strong>Prerequisite:</strong> Level 8+, Fear Monger feat <br />You
      improve upon your technique, using the terror you generate in your foes to increase the lethality of your attacks.
      You gain the following benefits;</p><ul><li>Increase your Wisdom or Charisma ability score by +1, up to the
      maximum of 20.</li><li>When you would damage a creature who has ranks of Fear against you, you deal an additional
      Xd6 psychic damage which cannot be reduced by any means, where X equals the ranks of Fear the target has. You can
      trigger this damage once per rest, per creature.</li><li>You gain a +1 to critical threat range with weapon,
      Taijutsu, and Genjutsu attack rolls against creatures who possess the Fear condition from you.</li></ul>
    chat: ''
