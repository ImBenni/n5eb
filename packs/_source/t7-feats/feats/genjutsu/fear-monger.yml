name: Fear Monger
type: feat
_id: 132FSQohnyd0cWF8
img: icons/magic/symbols/runes-star-magenta.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Genjutsu <br /><strong>Prerequisite:</strong> Level 4+ <br />You practice a
      technique that incorporates both weaponry and Genjutsu in tandem to generate fear into the hearts of your enemies.
      You gain the following benefits;</p><ul><li>Increase your Wisdom or Charisma ability score by +1, up to the
      maximum of 20.</li><li>Your Genjutsu ability score is treated as being +2 higher for the purposes of qualifying
      for Genjutsu that can give the Fear condition.</li><li>You gain a +1 to AC, and to weapon, Taijutsu and Genjutsu
      attack and damage rolls against creatures who possess the Fear condition towards you.</li><li>Creatures that would
      attempt to dispel, counter, or negate Genjutsu you cast that inflict the Fear condition make their rolls with a
      -1d4 penalty.</li></ul>
    chat: ''
