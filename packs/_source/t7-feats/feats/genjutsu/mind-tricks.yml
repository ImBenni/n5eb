system:
  description:
    value: >-
      <p><strong>Category:</strong> Genjutsu <br /><strong>Prerequisite:</strong> Level 4+ <br />You use your skills
      with stealth and illusions to magnify your Genjutsu prowess. You gain the following benefits;</p><ul><li>Increase
      your Wisdom score by 1, to a maximum of 20.</li><li>You can use illusions in place of persuasion.</li><li>When you
      cast a Genjutsu from stealth on an unaware creature they suffer a minus 1d4 to saving throws against your
      genjutsu.</li><li>If you are under the effects of a genjutsu you immediately know what genjutsu it is.</li><li>You
      have advantage on skill checks to both discover if a creature is under the effects of a genjutsu and to break a
      creature out of a genjutsu.</li></ul>
    chat: ''
