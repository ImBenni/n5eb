system:
  description:
    value: >-
      <p><strong>Category:</strong> Ninjutsu <br /><strong>Prerequisite:</strong> Level 4+ <br />You are skilled with
      stretching out the most efficiency out of your chakra with Ninjutsu. You gain the following
      benefits;</p><ul><li>Increase your Constitution score by 1, to a maximum of 20.</li><li>Select one Ninjutsu you
      know with a duration of a minute or higher and a range of self, the duration of the jutsu is doubled. You can
      switch your selected jutsu on level up.</li><li>Jutsu with a range of self have their concentration cost lowered
      by 1.</li><li>When you would be forced to make a concentration check to maintain a jutsu you may pay 5 chakra you
      grant yourself advantage on the check.</li></ul>
