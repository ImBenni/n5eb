system:
  description:
    value: >-
      <p><strong>Category:</strong> Skill <br /><strong>Prerequisite:</strong> Level 8+, Summoning Technique<br />You
      have trained well to increase the bond between you and your summons. Increasing the battle efficiency of your
      teamwork.</p><ul><li>Summoned Creatures learn one additional Jutsu of 1 rank lower than their highest known jutsu
      rank.</li><li>Summoned Creatures can now move up to 240 feet away from you.</li><li>Summoned Creatures of B-Rank
      or Higher gain 1 additional D-Rank Feature. If the creature cannot select an additional D-Rank Feature, they
      instead gain 1 additional C-Rank Feature.</li><li>Instead of using your Bonus Action to command your summon you
      may use your Reaction. You cannot command your summon more than once per turn this way.</li></ul>
