system:
  description:
    value: >-
      <p><strong>Category:</strong> Skill <br /><strong>Prerequisite:</strong> Summoning Technique <br />You research
      methods of training to improve your summon's proficiency in various Shinobi skills and tools. You gain the
      following benefits when using the Summoning Technique;</p><ul><li>Summoned Creatures gain an additional saving
      throw proficiency that they do not already possess.</li><li>Summoned Creatures gain 3 additional skill
      proficiencies.</li><li>Summoned Creatures are now proficient in all Martial and Simple weapons.</li><li>Summoned
      Creatures gain a +1 bonus to their Toughness Score. They also increase their number of Jutsu Slots by
      +2.</li></ul>
    chat: ''
