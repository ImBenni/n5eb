system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu<br /><strong>Prerequisite:</strong> Level 4+ <br />You have trained and
      become well versed in bukijutsu putting you above the average user of the style.</p><ul><li>Increase your
      Dexterity or Strength score by 1, to a maximum of 20.</li><li>Jutsu with the Bukijutsu Keyword gain a + 1 to their
      DC.</li><li>Jutsu with the Bukijutsu Keyword that you would create or modify have their Chakra cost reduced by
      1.</li><li>While you are concentrating on only Jutsu that contain the Bukijutsu keyword all concentration costs
      are reduced by 1.</li><li>All features of this feat do not stack with other adept feats</li></ul>
