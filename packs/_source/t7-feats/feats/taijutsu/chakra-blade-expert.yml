name: Chakra Blade Expert
type: feat
_id: ZPmQaglEHQDXxTpc
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu <br /><strong>Prerequisite:</strong> Chakra Blade Stance, Level 8+ <br
      />You have trained under the most professed of Combat Medics to improve your martial skills with your blade,
      gaining the following benefits;</p><ul><li>Increase your Strength or Dexterity score by 1, to a maximum of
      20.</li><li>While you are in the <em><strong>Chakra Blade Stance</strong></em>, you unarmed damage die becomes a
      d8.</li><li>Your unarmed attacks gain the <em><strong>Reach</strong></em> and <em><strong>Deadly</strong></em>
      properties.</li><li><p>Up to 3 Taijutsu or Bukijutsu (that require a melee slashing) that you know become
      <em><strong>Chakra Blade Taijutsu</strong></em>. <em><strong>Chakra Blade Taijutsu</strong></em> gain the
      <em><strong>Ninshou Slash</strong></em> trait.</p><ul><li><em><strong>Ninshou Slash.</strong></em> With jutsu with
      this trait, you may replace the Bukijutsu keyword with the Taijutsu keyword if applicable on casting, and gain the
      benefits all properties of your unarmed strikes granted by this stance. The Finesse property can apply to the Save
      DC of the jutsu as well.</li></ul></li></ul>
