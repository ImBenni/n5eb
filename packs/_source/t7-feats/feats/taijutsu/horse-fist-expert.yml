name: Horse Fist Expert
type: feat
_id: SM1U7TqMtJwlijo0
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu <br /><strong>Prerequisite:</strong> Horse Fist Stance, Level 8+ <br />You
      have trained under the teachings of the Land of Grass either directly or by descension, gaining the following
      benefits;</p><ul><li>Increase your Strength or Dexterity score by 1, to a maximum of 20.</li><li>While you are in
      the <em><strong>Horse Fist Stance</strong></em>, your unarmed damage becomes a d8.</li><li>While in the
      <em><strong>Horse Fist Stance</strong></em> and you would use its bonus action ability on unarmed attacks, for
      each attack after the first that you forgo to increase the multiplication of your ability modifier to the damage
      dealt, add your unarmed damage die once more the single unarmed attack you make.</li><li><p>Taijutsu you know that
      requires the <em><strong>Horse Fist Stance</strong></em> to be cast, and up to three additional Taijutsu that
      makes no more than 4 taijutsu attacks become <em><strong>Horse Fist Taijutsu</strong></em>. <em><strong>Horse Fist
      Taijutsu</strong></em> gain the <em><strong>Stampeding Force</strong></em>
      trait.</p><ul><li><em><strong>Stampeding Force.</strong></em> <em><strong>Horse Fist Taijutsu</strong></em> you
      cast, that would also benefit from your Horse Fist bonus action attack condensing ability, also add any remaining
      damage die that the jutsu would grant that would be lost as the result of using this ability. Additionally, for
      these Taijutsu only, twice per rest, you can activate the attack condensing ability by spending 3 chakra as
      opposed to your bonus action</li></ul></li></ul>
    chat: ''
