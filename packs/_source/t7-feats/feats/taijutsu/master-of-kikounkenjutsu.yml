name: Master of Kikounkenjutsu
type: feat
_id: obp1a4eln5zB1x7X
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu <br /><strong>Prerequisites:</strong> Kikounkenjutsu Stance, Level 8+ <br
      />You seek guidance on how to perfect your skills with chakra slashes with a renowned shinobi of the Land of
      Earth, gaining the following benefits:</p><ul><li>Increase your Strength or Dexterity score by 1, to a maximum of
      20.</li><li>While you are in the Kikounkenjutsu Stance, you do not reduce your weapon's die size to grant it up to
      reach 3.</li><li>When you would make your barrage of attacks in response to missing with a jutsu attack or a
      creature succeeding on a saving throw against a Jutsu you cast, you also deal your weapon's base damage (ignoring
      any jutsu-based damage increases) on each hit, and add a +1 to the attack roll for each subsequent attack you hit
      after the first.</li><li>You can cast any Jutsu you know of up to one rank below your Highest Rank Known if you
      hit all of your barrage's attacks, as long as the Jutsu only targets a single creature.</li></ul>
    chat: ''
