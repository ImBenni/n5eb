name: Ryukyu Fist Expert
type: feat
_id: xl5jDRBIf2ZbWFSw
img: icons/magic/symbols/runes-star-orange.webp
system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu <br /><strong>Prerequisite:</strong> Ryukyu Fist Stance, Level 8+ <br />You
      have trained under the teachings of the Land of Water either directly or by descension, gaining the following
      benefits;</p><ul><li>Increase your Strength or Dexterity score by 1, to a maximum of 20.</li><li>While you are in
      the <em><strong>Ryukyu Fist Stance</strong></em>, your unarmed damage becomes a d8. If you have two
      <strong>Tonfas</strong> in hand in addition to being in this stance, it instead becomes a d10.</li><li>While in
      the <em><strong>Ryukyu Fist Stance</strong></em>, you no longer have a use limit on Disarming, Tripping, or
      Bruising a creature on a critical hit, instead, you can benefit from this feature once per turn, per creature you
      perform a critical hit on.</li><li><p>Taijutsu you know that requires the <em><strong>Ryukyu Fist
      Stance</strong></em> to be cast, and up to two additional Taijutsu that you know, that requires you to make no
      more than three taijutsu attacks become <em><strong>Ryukyu Fist Taijutsu.</strong></em> <em><strong>Ryukyu Fist
      Taijutsu</strong></em> gain the <em><strong>Lawful Motion</strong></em> trait.</p><ul><li><em><strong>Lawful
      Motion</strong></em> The jutsu cast gains a +1 to critical threat range, and can trigger the special unarmed
      attack critical hit effects granted by the <em><strong>Ryukyu Fist Stance</strong></em>, following the same
      limitations.</li></ul></li></ul>
    chat: ''
