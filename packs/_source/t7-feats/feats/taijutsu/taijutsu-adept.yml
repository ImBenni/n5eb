system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu <br /><strong>Prerequisite:</strong> Level 4+ <br />You have trained and
      become well versed in taijutsu putting you above the average user of the style.</p><ul><li>Increase your Dexterity
      or Strength score by 1, to a maximum of 20.</li><li>Jutsu with the Taijutsu Keyword gain a + 1 to their
      DC.</li><li>Jutsu with the Taijutsu Keyword that you would create or modify have their Chakra cost reduced by
      1.</li><li>While you are concentrating on only Jutsu that contain the Taijutsu keyword all concentration costs are
      reduced by 1.</li></ul>
