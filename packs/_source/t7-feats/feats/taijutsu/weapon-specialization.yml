system:
  description:
    value: >-
      <p><strong>Category:</strong> Taijutsu <br />When you gain this feat, choose one of the following damage types:
      Bludgeoning, Piercing, or Slashing. Bukijutsu, you cast ignore resistance to damage of the chosen type.</p><p>In
      addition, when you roll damage for a bukijutsu you cast that deals damage of that type, you can reroll 1's and
      2's, keeping the second result. You can select this feat multiple times. Each time you do so, you must choose a
      different damage type.</p>
