folder: e2Nntr67SsydLxJv
name: Bear Fist Stance
type: feat
_id: hTOQTE1k3ocigdZM
img: icons/skills/melee/unarmed-punch-fist-yellow-red.webp
system:
  description:
    value: >-
      <p>You have learned to fight with ferocious brawling power of a bear. You battle with a supreme posture that is
      ideal for grappling foes and driving fear into their hearts.</p><ul><li>Your Unarmed damage die becomes a d6 while
      not wielding a weapon in either hand.</li><li>While in this stance, you gain the <em><strong>Grapple</strong></em>
      weapon property if you weren't already benefiting from it.</li><li>When you take the attack action, you can forgo
      an attack to instead intimidate a target. The target must succeed a Wisdom saving throw against your Taijutsu Save
      DC, or gain one of the following effects; You can choose to use your Charisma modifier instead of your Taijutsu
      ability modifier to calculate your Taijutsu Save DC for this ability. Once a target is affected by this ability it
      cannot be affected by it again for the next hour.</li></ul><p><em><strong>Apex Might.</strong></em> You rise to
      match your enemy's strength. You have resistance to the damage of the next attack the target makes against you
      until the end of your next turn.</p><p><em><strong>Cower in Fear.</strong></em> You compel the target to flee in
      fear from you. It must use its action next turn to dash in the opposite direction of
      you.</p><p><em><strong>Tremble in Fear.</strong></em> It gains ranks of Fear equal to half your Strength or
      Charisma modifier (rounded down) until the end of its next turn.</p><p><em><strong>Predator's Pride.</strong></em>
      You have advantage on your first attack roll against the target until the end of your next turn.</p>
