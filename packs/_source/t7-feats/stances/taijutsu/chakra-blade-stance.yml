system:
  description:
    value: >-
      <p>You coat your hand in visible chakra and sharpen it allowing you to slash through your enemies.</p><ul><li>Your
      unarmed attacks deal 1d6 slashing damage while not wielding a weapon in either hand. Your unarmed attacks also
      count as chakra enhanced.</li><li>Your unarmed attacks gain the <em><strong>Finesse</strong></em>
      property.</li><li>Your unarmed attacks can now substitute for taijutsu attacks in slashing Bukijutsu. When you do
      this you can change the <em>Bukijutsu</em> keyword into the <em>Taijutsu</em> keyword. If the jutsu was a Combo or
      a Finisher, it now turns to a Taijutsu or Bukijutsu Combo/Finisher respectively. You can do this change a number
      of times equal to your taijutsu modifier per long rest (Max 5).</li></ul>
