system:
  description:
    value: >-
      <p>You have learned how to enter a deadly stance. You utilize both your arms and legs to deliver swift and
      powerful strikes to your opponent's vitals and weapons. While in this stance you also boost your attacks with
      chakra, unleashing destructive waves that further the impact of your blows.</p><ul><li>Your unarmed damage die
      becomes a d6 and now does force damage while not wielding a weapon in either hand.</li><li>As a bonus action you
      pump more chakra into your fists, during this turn you can make your unarmed attacks at a range of 30
      feet.</li><li>When you hit your opponent with an unarmed attack you can choose to force a Strength saving throw,
      pushing your opponent 5 feet back on a failure.</li></ul>
