folder: e2Nntr67SsydLxJv
name: Horse Fist Stance
type: feat
_id: nQRBMqU8bsbv8Gkh
img: icons/skills/melee/unarmed-punch-fist-yellow-red.webp
system:
  description:
    value: >-
      <p>Often seen as a variation on Rabbit Fist, Horse Fist focuses on single, powerful kicks, rather than multiple
      light strikes. A single kick from a skilled master of this stance can be enough to crack stone and shatter trees.
      You may not make unarmed attacks with anything but your feet and legs, and you cannot gain the benefits of weapon
      properties even if you wield weapons in your hands while you are in this stance.</p><ul><li>Your unarmed attacks
      deal 1d6 bludgeoning damage.</li><li>While in this stance, you gain the <em><strong>Winding</strong></em> weapon
      property if you weren't already benefiting from it.</li><li>As a bonus action, you may add double your ability
      modifier to your damage roll. If you have extra attacks, you may forgo any number of them, increasing the
      multiplication of your ability modifier by one per attack (3x if you forgo two attacks, 4x if you forgo three,
      etc.).</li></ul>
    chat: ''
