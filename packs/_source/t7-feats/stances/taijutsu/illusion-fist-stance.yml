system:
  description:
    value: >-
      <p>A unique stance developed by the Kuru monks of the False Bell temple. The Illusion Fist combines ones martial
      talent and chakra proficiency, to unleash a hybrid fighting style that incorporates Taijutsu and Genjutsu. While a
      far cry from a true False Bell Monk, the fighting stance you have been able to learn is close
      enough;</p><ul><li>Your unarmed damage becomes a d4 while not wielding a weapon in either hand.</li><li>You can
      use your Taijutsu ability modifier to calculate the attack and damage rolls of Genjutsu with the Tactile
      keyword.</li><li>As a bonus action, you can take a deep breath and harness the flow of chakra throughout your
      body. Until the start of your next turn, you gain a +2 bonus to your AC and +2 damage reduction. This cannot stack
      with itself.</li></ul>
