system:
  description:
    value: >-
      <p>You have studied the art of the Ryukyu Fist. Your fighting style incorporates extreme force to disable your
      opponents;</p><ul><li>Weapon attacks from Tonfas count as unarmed attacks while in this stance.</li><li>While
      wielding two <em><strong>Tonfas</strong></em> in both hands, you increase your critical threat range by +1 for
      unarmed attacks.</li><li>When you score a critical hit with your unarmed damage while wielding a
      <em><strong>Tonfa</strong></em>, you can automatically disarm, trip, or give the affected creature the Bruised
      condition. You can do this twice per short rest.</li></ul>
