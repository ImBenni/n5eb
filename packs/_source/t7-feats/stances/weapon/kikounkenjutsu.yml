folder: euZi2JvSWyYBIdaj
name: Kikounkenjutsu
type: feat
_id: SZIzrjaX3Lo05lSj
img: icons/skills/melee/weapons-crossed-swords-yellow-teal.webp
system:
  description:
    value: >-
      <p><strong>Requirement:</strong> Melee, Any Weapon Group<br />You are not only a master with the blade, but your
      mastery with the blade has allowed you to use your chakra and weaponry in tandem together, allowing your swings to
      not only be swift, but to make them far more deadly, making you a noticeable threat that can be feared even by the
      mightiest foe. You gain the following benefits while wielding a melee weapon that does not have the two handed
      property if you are proficient with them.</p><ul><li>When you take the attack action, you may use a bonus action
      to give your melee weapon the reach property until the start of your next turn. You may reduce your weapon's
      damage die size by 1 step for each additional stack of reach to a minimum of a d4 (2d6&gt;1d12&gt;1d10&gt;1d8&gt;
      1d6&gt;1d4).</li><li>Once per turn, when you miss with a jutsu attack or a creature succeeds a saving throw caused
      by a Jutsu that is within your movement speed, you may spend your reaction to follow up with a barrage of attacks
      equal to half your proficiency bonus, dealing your taijutsu modifier in damage of your weapon's type on a hit. If
      you land at least two attacks (or one if your proficiency bonus is less than +4), you may cast a Jutsu you know of
      C-Rank or lower that has an attack roll and has a casting time of 1 action or 1 bonus action, as part of the same
      reaction.</li></ul><p></p>
