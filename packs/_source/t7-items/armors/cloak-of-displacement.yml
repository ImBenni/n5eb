system:
  description:
    value: >-
      <p>This cloak can be worn with Light or Medium armor.</p><p> While you wear this cloak, it projects an illusion
      that makes you appear to be standing in a place near your actual location, causing any creature to make a Wisdom
      Saving throw when they target you with an attack, having disadvantage on attack rolls against you on a failed save
      until the end of their turn.</p><p> If you take damage, the property ceases to function until the start of your
      next turn.</p><p> This property is suppressed while you are incapacitated, restrained, or otherwise unable to
      move.</p><p></p>
