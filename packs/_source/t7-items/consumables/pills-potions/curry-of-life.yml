  description:
    value: >-
      <p>A special and very spicy curry exclusively from a Shop from the Land of Rivers.</p><p> When given to an
      unconscious or dying creature, it must succeed a Constitution saving throw vs.</p><p> DC 15, ending the dying and
      Uunconscious conditions and regaining 1 hit point on a success, or failing one death saving throw on a
      failure.</p><p> If the curry is eaten by a conscious creature, it must succeed a Constitution saving throw
      vs.</p><p> DC 15, gaining 3d8 hit points on a success, or losing an amount of hit points equal to the amount they
      would've healed on a failure.</p><p></p>
