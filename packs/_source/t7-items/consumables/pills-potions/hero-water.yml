system:
  description:
    value: >-
      <p>The magic water is drawn from the hero tree once every 100 years.</p><p> Typically used as a last resort, the
      water greatly increases the user's chakra in exchange for their lifespan.</p><p> As a bonus action, you can take a
      drink of Hero Water.</p><p> The following benefits and consequences are gained per consecutive use:
      </p><p></p><p>First Drink: For one minute you gain: 100 Temporary chakra, you can cast jutsu at 1 rank higher than
      normal, and your Constitution score is increased by 2.</p><p> In exchange, you permanently lose 1 hit die + your
      constitution modifier from your max HP (and the corresponding hit die), gain one rank of exhaustion at the end of
      the duration.</p><p></p><p> Second Drink: For an additional minute you gain: 200 Temporary chakra and your
      Constitution score is increased by an additional 2.</p><p> In exchange, you permanently lose 2 hit dice + your
      constitution modifier from your max HP (and the corresponding hit die), gain two additional ranks of exhaustion at
      the end of the duration.</p><p></p><p>Third Drink: For an additional minute you gain: 300 Temporary chakra and
      your Constitution score is increased by an additional 2.</p><p> In exchange, you permanently lose 2 hit dice +
      your constitution modifier from your max HP (and the corresponding hit die), gain two additional ranks of
      exhaustion at the end of the duration.</p><p></p><p> Last Drink: For an additional minute you gain: 500 Temporary
      chakra and your Constitution score is increased by an additional 2.</p><p> In exchange, you die at the end of the
      duration.</p><p></p>
    chat: ''
