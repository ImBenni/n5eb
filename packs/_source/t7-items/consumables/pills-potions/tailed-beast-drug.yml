  description:
    value: >-
      <p>These are pills in a capsulated form created by scientist trying to get rich from war.</p><p> After the
      consumption of this drug, the user gains a heightened transformation similar to a Sealed Beast.</p><p> As Full
      turn Action this pill can be swallowed.</p><p> Once consumed the user's max chakra is reduced to 0 until they
      spend at least 2 weeks of downtime Recuperating.</p><p> They then enter Twisted Cloak Stage 2 from the Tailed
      Beast Class mod for a number of rounds equal to their max charka reduced/20(rounded up).</p><p> At the end of
      these rounds they suffer the effects of leaving Desperate Rage.</p><p></p>
