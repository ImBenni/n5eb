name: Akatsuki Rings (All)
type: equipment
_id: U6HyxlICb9d4H2ER
img: icons/equipment/finger/ring-signet-tech.webp
system:
  description:
    value: >-
      <p>The Rings of the Akatsuki are made of an unknown, but indestructible material.</p><p>They are each unique in
      their creation.</p><p>There are only 10 rings in existence and they each have a special property apart from being
      able to communicate with anyone else with a ring as long as they are on the same plane of existence.</p><p>Once
      worn, these rings cannot be taken off by any means short of dismemberment or death.</p><p>If you have both the
      ring and the cloak of the Akatsuki then it only counts as one attunement slot.</p><p></p><p>Right thumb: "zero" A
      ring with a purplish gray coloring.</p><p>While wearing this ring you gain an additional amount of chakra equal to
      your level and have advantage on all clash checks.</p><p></p><p>Right index finger: "blue", "green" A ring with a
      teal coloring.</p><p>While wearing this ring you gain advantage on saving throws for genjutsu with the visual
      keyword and all jutsu with an Area of Effect have their Area of Effect increased by 10 ft.</p><p></p><p>Right
      middle finger: "white" A ring with a white coloring.</p><p>While wearing this ring all Explosive Ninja tools gain
      an additional amount of damage die and a plus to DC based on their Rank and you can, as a free action, turn any
      piece of paper into a fully functional shuriken.</p><p>(D-Rank = 1, C-Rank = 2, B-Rank = 3, A-Rank = 4, S-Rank =
      5) </p><p></p><p>Right ring finger: "vermilion", "scarlet" A ring with a red coloring.</p><p>While wearing this
      ring you gain a +3 to your Genjutsu DC and have a plus 5 to concentration saves on Genjutsu.</p><p></p><p>Right
      little finger: "sign of the boar" A ring with a green coloring.</p><p>While wearing this ring this ring, you have
      telepathy with any creature you can see within 30 feet and you gain a burrow speed of 30 feet.</p><p>Additionally,
      you do not disturb the ground when it burrows.</p><p></p><p>Left little finger: "sky", "void" A ring with a blue
      coloring.</p><p>While wearing this ring you add a d4 to all saving throws.</p><p>Additionally, once per long rest
      you can spend 30 chakra to regain 100 hp, you may do this as a reaction to taking damage.</p><p></p><p>Left ring
      finger: "south" A ring with a yellow coloring.</p><p>While wearing this ring you gain an amount of Hp and Cp equal
      to your player level and you may pay 3 additional chakra when casting a Water Release Jutsu to treat the jutsu as
      if it was cast by a source of water.</p><p></p><p>Left middle finger: "north" A ring with an orange
      coloring.</p><p>While wearing this ring when you are reduced to 0 hit points but not killed outright, you can drop
      to 1 hit point instead once per long rest.</p><p>You can spend 20 chakra to gain another use.</p><p></p><p>Left
      index finger: "three" A ring with an orange coloring.</p><p>While wearing this ring you gain all 5 nature
      releases.</p><p></p><p>Left thumb: "jewel", "ball" A ring with a purple coloring.</p><p>While wearing this ring a
      number of times equal to your proficiency bonus per long rest you can cause any attack roll against you to be at
      disadvantage or to grant yourself advantage on a saving throw.</p><p></p>
