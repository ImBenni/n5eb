system:
  description:
    value: >-
      <p>This piece of paper comes from a unique tree that is fed chakra and can tell one's passive affinity to a Nature
      Release if they are unaware.</p><p>By using your action and 4 chakra points the paper is destroyed in one of 5
      different ways.</p><p>Depending on how it was destroyed determines your passive affinity, and if you already have
      a nature release it will be destroyed in the way that element destroys it.</p><p>Otherwise, the release is
      determined by either the player, the DM, or you can roll a d6 to randomly determine your release via the chart
      below.</p><p>Once you know what element you're attuned to it makes it easier on you to learn that element and
      jutsu's pertaining to it.</p><p>Once you've learned your affinity learning the Nature Release feat to gain that
      element has its Downtime requirement halved.</p><p></p><img
      src="systems/n5eb/assets/content/items/t7-chakra-induction-paper-lrgkv2ipbsqi5fpi.webp" />
