system:
  description:
    value: >-
      <p>This chakra-enhanced device is as effective a weapon as it is a prosthetic for player characters missing a
      hand, arm, or another appropriate appendage.</p><p> It can be made of metal or wood and is removable only by you,
      taking a bonus action to don and doff.</p><p> This device can be used in place of one unarmed strike each
      turn.</p><p> Chakra Propulsion Arm has the Unarmed, Blocking, and Thrown properties with a range of
      20/60ft.</p><p>, and deals double your unarmed damage die (or 2d6 bludgeoning, whichever is higher).</p><p></p>
