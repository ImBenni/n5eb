system:
  description:
    value: >-
      <p>Note: Should only be used in games played in the Boruto and New Era To use, Scroll Cartridges that have had
      jutsu sealed into them are loaded into the Gauntlet's chamber.</p><p>When the user wants to perform one of the
      loaded jutsu, they make a unique hand seal corresponding to the intended jutsu's nature using the hand of the arm
      that the Gauntlet is worn on.</p><p>This causes a system within the Gauntlet to read the Scroll Cartridge and
      release the stored Jutsu, firing it wherever the Gauntlet is aimed.</p><p>The chakra that fuels these jutsu is
      stored in the device's chakra condenser.</p><p>You may store up to 1 jutsu each of the 5 primary
      elements.</p><p>As an action you may cast that jutsu using chakra from the Kote.</p><p>Once cast the scroll is
      consumed.</p><p>Once it runs out of chakra, a new condenser must be brought:</p><img
      src="systems/n5eb/assets/content/items/t7-kote-5iypuag8pzbkl94r.webp" />
