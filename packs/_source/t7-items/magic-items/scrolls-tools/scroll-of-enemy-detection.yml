system:
  description:
    value: >-
      <p>This scroll has 7 charges.</p><p> While holding it, you can use an action and expend 1 charge to speak its
      command word.</p><p> For the next minute, you know the direction of the nearest creature hostile to you within 60
      feet, but not its distance from you.</p><p> The scroll can sense the presence of hostile creatures that are
      ethereal, invisible, disguised, or hidden, as well as those in plain sight.</p><p> The effect ends if you stop
      holding the scroll.</p><p> The scroll regains 1d6+1 expended charges daily at dawn.</p><p> If you expend the
      scroll's last charge, roll a d20.</p><p> On a 1, the scroll crumbles into ashes and is destroyed.</p><p></p>
