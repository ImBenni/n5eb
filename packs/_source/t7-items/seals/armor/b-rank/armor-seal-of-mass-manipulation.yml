system:
  description:
    value: >-
      <p>This is a seal that may be placed onto any armor that grants the person using the armor a unique
      benefits.</p><p>This seal allows a user to gain control of their weight.</p><p>As a free action the user of this
      seal can either increase their weight tenfold or decrease their weight tenfold until the start of their next turn,
      gaining the following benefits listed below.</p><p>This has 5 uses per day.</p><p></p><p>Weight Increased:
      </p><p>While your weight is increased, all melee attacks increase their damage die by 1 and you gain proficiency
      in Strength saving throws.</p><p> If you are already proficient, you have advantage on Strength saving
      throws.</p><p> You also gain disadvantage on Dexterity saving throws.</p><p></p><p> Weight Decreased: </p><p>While
      your weight is decreased, your AC increases by 2, your movement speed increases by 30 feet, and you gain
      proficiency in Dexterity saving throws, If you are already proficient, you have advantage on Dexterity saving
      throws.</p><p> You also gain disadvantage on Strength saving throws</p>
