system:
  description:
    value: >-
      <p>Weapon Type: Any</p><p>Weapons that can be made primarily of metal (at your GM's discretion) can also be forged
      out of a special chakra- conductive metal in place of steel, allowing the weapon to take on your chakra's nature
      and enhancing its effectiveness.</p><p>Weapons made of Chakra Metal have an innate +1 bonus to attack and damage
      rolls.</p><p>As a bonus action, you may spend 1 chakra to channel your chakra into the weapon, changing the
      weapon's damage type to the type of your nature release (if you have no nature release, this weapon deals force
      damage; if you have multiple nature releases available, you choose which to use).</p><p>This bonus lasts until the
      end of your next turn.</p>
