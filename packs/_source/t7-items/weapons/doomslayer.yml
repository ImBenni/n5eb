system:
  description:
    value: >-
      <p>Weapon Type: Odachi A weapon once wielded by a shinobi driven mad with bloodlust, his rage still echoes through
      wielders of the Doomslayer.</p><p> You gain a +3 bonus to attack and damage rolls made with this weapon, which
      deals an extra 2d6 force damage on each hit.</p><p> This weapon imbues its wielder with incredible strength and
      fortitude.</p><p> While attuned to this weapon, increase your current and maximum Strength and Constitution scores
      by +2 (to a max of 22).</p><p> You add 1d6 to all Strength and Constitution checks and saving throws.</p><p>
      Attacks made with this weapon against Fiends, Undead, and Celestials are all made with advantage and deal an extra
      4d6 force damage.</p><p></p>
