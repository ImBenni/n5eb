system:
  description:
    value: >-
      <p>Weapon Type: Any Heavy, Two-Handed, Reach(1) Weapon </p><p></p><p>The Gunbai Uchiwa gains an innate +2 to
      attack and damage rolls and deals 1d10+Taijutsu Mod Slashing Damage.</p><p>Gunbai Uchiwa is a non-folding fan,
      carved from a unique spirit tree from which only ritualistic instruments are made.</p><p>This Gunbai has been
      passed down between Uchiha clansmen for generations.</p><p>is a wide fan with tomoe on it and has a long handle
      with bandages wrapped around the base, as well as having a long chain attached to it.</p><p>It has the ability to
      convert incoming chakra into wind nature transformation, reflecting an opponent's attack back towards
      them.</p><p>As a reaction to being targeted with a melee attack or Tai/Ninjutsu B-rank or lower, make a Melee
      Attack Roll.</p><p>If your roll is higher than the target's and is higher than their AC, the target would take
      damage equal to the damage of the attack, ignoring any additional effects of the triggering attack.</p><p>If not,
      the attack is carried out as normal They also must make a Dexterity Saving Throw or be knocked back 15
      ft.</p><p></p>
