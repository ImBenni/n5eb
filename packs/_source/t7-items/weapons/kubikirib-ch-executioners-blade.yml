name: Kubikiribōchō "Executioner's Blade"
type: weapon
_id: OT6WpkojVjKA2r0L
img: systems/n5eb/assets/content/items/kubikiribocho.webp
system:
  description:
    value: >-
      <p>Weapon Type: Odachi An intimidatingly-sized Odachi forged by the Sage of the Six Paths, able to endlessly
      repair itself by consuming the iron in the blood of those slain by its edge.</p><p>You gain a +3 bonus to attack
      and damage rolls made with this weapon.</p><p>In addition to its normal weapon properties, Kubikiribōchō also has
      the Deadly and Reach properties.</p><p>While wielding Kubikiribōchō the user gains the following benefits;
      </p><p></p><p>When you would damage a creature that is below half its maximum hit points using Kubikiribōchō, you
      may reroll your weapon damage dice, taking the higher overall result.</p><p></p><p>When you apply ranks of
      Bleeding to a creature as a result of a Bukijutsu you cast, it adds 1 additional rank of
      bleeding.</p><p></p><p>When you damage a creature below 1/4th of its maximum hit points with critcal hit using
      Kubikiribōchō, you sever that creature's head, killing it instantly.</p><p>A creature is immune to this effect if
      its immune to Slashing damage, doesn't have or need a head, is a Solo Adversary, or the DM decides that the
      creature is too large for its head to be cut off with this weapon.</p><p>Such a creature instead takes an extra
      6d8 Slashing damage from the attack instead.</p><p></p><p>If Kubikiribōchō's damage is penalized or is ever
      damaged you may fully repair it by coating or laying it in at least 1 liter of blood.</p><p></p>
