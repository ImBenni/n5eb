folder: h9njv8oV9PJaipWF
name: Kuregumo
type: weapon
_id: ptn18Hhvx3sqJeFv
img: icons/weapons/swords/greatsword-crossguard-embossed-gold.webp
system:
  description:
    value: >-
      <p>Weapon Type: Katana</p><p>One of multiple swords made to end a warring period, infused with mystic power
      Kuregumo has access to multiple techniques powered by a cloud you generate from your chakra.</p><p>Kuregumo deals
      2d8 lightning damage, and possesses the Critical 1, Deadly 1, and Finesse Properties.</p><p>Once someone attunes
      to Kuregumo no one else may wield it as long as the owner is still living.</p><p></p><p>Understanding.</p><p>The
      mystic blades aren't bound by the techniques ingrained in them, but instead by the ones who wield
      them.</p><p>Using the blades and innovating with them is the path one needs to follow if they wish to strengthen
      themselves and the blade.</p><p>Users of Kuregumo gain access to Release, Mei, Yui, and Kou upon attuning to the
      blade.</p><p>Upon level up, if the user has been actively using Kuregumo they're able to deepen their
      understanding of the blade and its techniques.</p><p>They can choose between one of these four options per level
      up; Reduce the costs associated by with a technique by half.</p><p>This does not stack with other cost
      reduction.</p><p>Learn a new technique they don't have access to yet.</p><p>Be able to use one technique of their
      choosing without unsheathing Kuregumo.</p><p>However, they must still have Kuregumo on their person.</p><p>Create
      a new technique based on the previous techniques known.</p><p></p><p>Mei.</p><p>You charge into Kuregumo your
      chakra, as it builds it up like static electricity before erupting and burning through and electrifying whatever
      target is in your way.</p><p>As an Action you make an attack roll for 10 Chakra as you shoot a bolt of lightning
      at a creature within 60 feet of you.</p><p>On a hit you deal 8d6 lightning damage and the creature gains 2 ranks
      of shocked.</p><p>You can instead force a Dexterity saving throw for every creature within 30 feet of you for 6d6
      lightning damage and 1 rank of shocked, with creatures only taking half damage on a success.</p><p>However, you
      can charge Mei instead of firing it immediately.</p><p>You begin charging as an Action and can continue charging
      as a Bonus action.</p><p>You can only charge Mei up to 5 times this way before needing to fire it.</p><p>For every
      Bonus action you spent this way the damage increases by 2d6, the cost increases by 3 Chakra, and at 5 charges you
      electricity is harder to handle.</p><p>Creatures who took damage from the fully charged Mei must make a
      Constitution saving throw or become Stunned until the end of their next turn.</p><p>After attacking with Mei the
      user must use an Action to recharge it before using it again, but if they charged Mei then they must spend the
      same amount of Bonus actions charging it to recharge it before using it again.</p><p></p><p>Yui.</p><p>Ice begins
      forming from Kuregumo and you're able to throw it to freeze foes and block attacks.</p><p>As an Action or Reaction
      you create a 10-foot cube's of ice within 15 feet of you, with 20 hit points.</p><p>This cube can intercept
      attacks and act as cover as any other wall would, and is vulnerable to earth damage.</p><p>You can spend
      increments of 5 chakra to increase the cube's size by 5 feet or increase the cube's hit points by 10.</p><p>This
      cube can take any form you want as long as it's within the dimensions you can create.</p><p>Additionally, if you
      create ice where a creature is currently positioned they must make a Dexterity saving throw or become restrained
      in the ice, being able to roll a strength saving throw as an Action to break out.</p><p>You can reinforce this ice
      further if your aim is to capture a target, increase the cost of the ice by the class of the creature times
      5.</p><p>(Minion 1, Standard 2, Elite 3, Solo 5) They instead become petrified if they fail the Dexterity saving
      throw and must make a Strength saving throw at disadvantage on the end of their turn to break out.</p><p>You can
      reduce the chakra cost of Yui features by -2 by using a suitable water source.</p><p></p><p>Kou.</p><p>Water
      starts flowing out from Kuregumo in the form of mist or pure water to either support your movements or strengthen
      your techniques.</p><p>You can, as a Bonus action, have Kuregumo generate enough water to count as a sizeable
      water source for jutsu and features.</p><p>This water source can be used twice before needing to be activated
      again.</p><p>You can also cast Hidden Mist Technique through the use of Kou.</p><p>Before you cast a jutsu or deal
      lighting damage you can spend a Bonus action to splash water in your surrounding area, increasing the lightning
      damage's die step by +1, up to a d12.</p><p></p><p>Mei: Cloak.</p><p>An extension of Mei, you now cloak yourself
      within the crackling energy you generate and boost your abilities even further.</p><p>As an Action, you now
      instead quadruple your speed, become immune to effects that would lower your speed, increase your Dexterity score
      by +4, and whenever you move you now teleport there.</p><p>If this increase to Dexterity would make you go beyond
      your maximum you instead increase your movement speed by another 60 feet per each point you would go over your
      maximum Dexterity, and you inflict a rank of shocked for every two hits a creature takes from Kuregumo.</p><p>To
      keep Cloaked Mei active you must spend 15 Chakra at the start of each of your turns.</p><p></p>
