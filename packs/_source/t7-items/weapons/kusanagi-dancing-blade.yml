name: Kusanagi "Dancing" Blade
type: equipment
_id: 9qyv3c6JUl6XyiZ0
img: icons/weapons/swords/sword-gold-holy.webp
system:
  description:
    value: >-
      <p>Weapon Type: Any sword A Kusanagi Blade, also known as a Dancing Blade, is a weapon infused with powerful Wind
      Release Chakra which allows it to levitate on your command.</p><p> You can use a bonus action to toss this sword
      into the air and weave its required hand signs.</p><p> When you do so, the sword begins to hover, flies up to 30
      feet, and attacks one creature of your choice within 5 feet of it.</p><p> The sword uses your attack roll and
      ability score modifier to damage rolls.</p><p> While the sword hovers, you can use a bonus action to cause it to
      fly up to 30 feet to another spot within 30 feet of you.</p><p> As part of the same bonus action, you can cause
      the sword to attack one creature within 5 feet of it.</p><p> After the hovering sword attacks for the fourth time,
      it flies up to 30 feet and tries to return to your hand.</p><p> If you have no hand free, it falls to the ground
      at your feet.</p><p> If the sword has no unobstructed path to you, it moves as close to you as it can and then
      falls to the ground.</p><p> It also ceases to hover if you grasp it or move more than 30 feet away from
      it.</p><p></p>
    chat: ''
