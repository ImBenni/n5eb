name: Mjolnir
type: weapon
_id: QwZTBD1QGhGKgoDp
img: icons/weapons/hammers/hammer-double-stone.webp
system:
  description:
    value: >-
      <p>Weapon Type: Warhammer (Simple Weapon) </p><p>"Whosoever holds this hammer, if he be worthy, shall possess the
      power of Thor." </p><p>This weapon's damage is 2d8 Chakra Enhanced Bludgeoning, which also counts as Lightning
      damage for the purposes of overcoming resistance and immunity.</p><p>Mjolnir has the Critical, Deadly, Returning,
      Thrown(60/180) properties.</p><p>You gain a +3 bonus to attack and damage rolls made with this chakra enhanced
      weapon.</p><p>In addition, you can always have Mjolnir return to you as long as you are on the same plane of
      existence.</p><p>Mjolnir is a sentient weapon with an ability score of 22 in Intelligence, Wisdom, and
      Charisma.</p><p>Mjolnir also possess 120 feet of hearing and darkvision.</p><p>while it cannot speak, it
      understands all language.</p><p></p><p>Worthiness.</p><p>Mjolnir itself decides who is deemed worthy to wield
      it.</p><p>Typically, a worthy creature is one pure of heart, void of vanity, heroic, humble, or possesses similar
      traits.</p><p>A creature unworthy to life Mjolnir must succeed a DC 40 Strength check to do so.</p><p>On a
      success, they are able to hold Mjolnir until the end of their turn but they cannot use any of its abilities, and
      at the end of each of their turns they must remake and continue succeeding DC 40 Strength checks to continue
      holding it.</p><p></p><p>Power of Thor.</p><p>While wielding this weapon, you can expend a number of charges to
      cast the following lightning release jutsu without spending chakra.</p><p>If the jutsu requires concentration, the
      jutsu takes up one of your concentration slots as normal but you do not need to pay the chakra cost.</p><p>You can
      choose to use your Ninjutsu ability modifier or Mjolnir's to cast this jutsu.</p><p>Mjolnir has 10 charges
      .</p><p>It regains 1d4 + 2 expended charges daily at dawn.</p><p>1 Charge: Absorb Lightning, Thor's Mark</p><p>2
      Charges: Overdrive, Static Weapon, Surge</p><p>3 Charges: Chained Lightning, Lightning Spear</p><p>4 Charges: Keen
      Storm, Storm Breaker</p>
