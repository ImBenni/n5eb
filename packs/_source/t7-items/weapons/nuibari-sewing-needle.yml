system:
  description:
    value: >-
      <p>Weapon Type: Battle Wire A delicate but frightening steel wire attached to a thin, needle-like sword forged by
      the Sage of the Six Paths.</p><p>You gain a +3 bonus to attack and damage rolls made with this weapon.</p><p>In
      addition to its normal weapon properties, Nuibari also has the Critical and Deadly properties.</p><p>When you take
      the attack action using Nuibari, it deals piercing damage.</p><p>While wielding Nuibari the user gains the
      following benefits;</p><p></p><p>Increase the range of all Bukijutsu you cast using Nuibari by 1 step,
      (Touch/5ft&gt;15ft&gt;30ft) .</p><p></p><p>When you grapple a creature using Nuibari, that target is also
      considered restrained.</p><p></p><p>When you hit with an attack using this weapon against a creature, you can
      attempt to target an additional creature nearby.</p><p>If that creature is within 10 feet of the previous target,
      you may attempt a secondary attack roll against that creature.</p><p>On a hit, it and the original cannot move any
      further away from each other than they already.</p><p></p>
