    value: >-
      <p>Weapon Type: Spear </p><p>You gain a +2 bonus to attack and damage rolls made with this chakra-infused
      weapon.</p><p>Additionally, once per day you may use your action to call down a mighty lightning bolt on your
      enemies.</p><p>Select a target within 120 ft of you the target must make a Dex save of 25 or your Ninjutsu DC
      whichever is higher.</p><p>On a failed save the creature takes 20d10 lightning damage and gains the shocked
      condition for 1 minute.</p><p>On a successful save the target creature still takes half damage.</p><p></p>
