name: Samehada "Shark Skin"
type: weapon
_id: a95U7EDGs0Beurtv
img: systems/n5eb/assets/content/items/samehada.webp
system:
  description:
    value: >-
      <p>Weapon Type: Odachi A large great sword that quivers sinisterly beneath a layer of bandages forged by the Sage
      of the Six Paths, the weapon's unique hunger for chakra grants it sentience.</p><p>You gain a +3 bonus to attack
      and damage rolls made with this weapon.</p><p>In addition to its normal weapon properties, Samehada also has the
      Deadly and Grapple properties.</p><p>While wielding Samehada the user gains the following
      benefits;</p><p></p><p>At the end of each long rest, you must spend 20 chakra to continue being attuned to the
      blade.</p><p></p><p>While wielding Samehada you can speak to it telepathically, and it can understand
      you.</p><p>Samahada is of neutral-evil alignment and has an Intelligence of 20, a Wisdom of 18, and a Charisma of
      12.</p><p></p><p>When you damage a creature using Samehada you deal an additional 2d4 chakra damage, and you
      regain chakra equal to half the chakra damage dealt.</p><p>If you damage a creature who possesses a unique form of
      chakra, you instead regain chakra equal to the full amount of damage dealt.</p><p>Additionally, your chakra point
      total increases by an amount equal to twice your level, and each time you gain a level while attuned to this
      weapon you increase your chakra point total by 2.</p><p></p><p>Due to Samehada's unique nature as a weapon, it can
      be used in the casting of any melee Bukijutsu.</p><p></p><p>As a reaction to being the target of a ranged jutsu
      with the Ninjutsu keyword, you can point Samehada in between you and the jutsu.</p><p>You then make a Martial Arts
      check against the DC of the jutsu.</p><p>On a success the jutsu is absorbed into Samehada.</p><p>You then gain an
      amount of chakra equal to half the amount used to cast the jutsu.</p><p></p>
