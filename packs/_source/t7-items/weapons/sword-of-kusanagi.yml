    value: >-
      <p>Weapon Type: Katana </p><p>Weapon (Katana), Legendary Requires attunement You gain a +3 bonus to attack and
      damage rolls made with this chakra-infused weapon.</p><p>It also gains the Reach 3 property.</p><p>The Sword of
      Kusanagi is a powerful weapon that cut through almost anything, its blade can extend to reach targets impossible
      for other melee weapons.</p><p>The Katana has 4 charges, you can spend these charges as a bonus action to cast
      living weapon on the sword upcasted at S-rank, at no cost.</p><p>The sword recovers 1d4+1 charges at
      dawn.</p><p></p>
