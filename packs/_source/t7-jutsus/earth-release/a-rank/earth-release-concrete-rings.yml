folder: J5n58hwQimwIO4pd
name: Earth Release Concrete Rings
type: spell
_id: 6m9adUeUvs5CxCLO
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You create 8 rotating rings of earth around your arms that allow you to utilize a new fighting style focused on
      close range combat. Each ring can only be used once and you may recast this jutsu to regain the lost
      rings.</p><p>While wielding these rings you gain the following options using the corresponding
      actions;</p><p><strong>Action:</strong> Make a melee ninjutsu attack dealing 5d8 + your ninjutsu ability modifier
      in earth damage and the target becoming dazed on a hit.</p><p><strong>Action:</strong> Make 2 ranged ninjutsu
      attacks against creatures within 30 feet. You can fire at at the same target or different ones. Dealing 3d8 + your
      ninjutsu ability modifier in earth damage on each successful hit.</p><p><strong>Bonus Action:</strong> Make a
      ranged ninjutsu attack against a creature within 30 feet. On a hit, the creature is restrained and cannot make
      hand signs. A restrained creature can make a Strength saving throw at the start of their turn to break
      out.</p><p><strong>Bonus Action:</strong> Make a melee ninjutsu attack dealing 2d8 + your ninjutsu ability
      modifier in earth damage and knocking them back 15 feet.</p><p><strong>Reaction:</strong> When you would take
      damage that isn't psychic you can use any number of rings you have left to protect yourself. Each ring reduces the
      damage you take by 2d8. If you reduce the damage to 0 this way, you suffer no effects that would trigger if you
      failed the save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase
      the cost of this jutsu by 3 and the number of rings created increases by 2.</p>
