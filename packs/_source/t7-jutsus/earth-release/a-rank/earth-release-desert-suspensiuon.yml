system:
  description:
    value: >-
      <p>You create a platform of sand, mud, or rock that you suspend into the air that you use grant yourself a fly
      speed of 45 feet. Alternatively, you can cast this jutsu as a Full turn action. If you do so you select 2 allied
      creatures within 60 feet of you commanding the earth below them to take flight. The allied creatures you selected
      gain a fly speed of 45. All creatures granted a fly speed by this jutsu can also hover.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3. Select 2
      allied creatures within 60 feet of you. You command the earth below them forcing it to take flight. The allied
      creatures you selected gain a fly speed of 45.</p>
