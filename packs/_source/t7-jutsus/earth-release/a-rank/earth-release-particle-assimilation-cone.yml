system:
  description:
    value: >-
      <p>You form a 30-foot cone by using chakra to generate molecule sized particles. Anyone in the cone will begin to
      be deconstructed on a molecular level. Creatures in its path must succeed a Dexterity saving throw. On a failure a
      creature takes 12d6 force damage. If a creature is reduced to less than ½ of their hit points. The user decides on
      which appendage the target creature lost. (Arm or Leg). If a creature is reduced to 0 hit points, they are turned
      to dust and are immediately killed.</p>
    chat: ''
