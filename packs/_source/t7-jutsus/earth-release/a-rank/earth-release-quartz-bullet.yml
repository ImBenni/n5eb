system:
  description:
    value: >-
      <p>You create a chunk of quartz and fire it at your enemy at blistering speed. Make a ranged ninjutsu attack
      dealing 7d12 earth damage and forcing the creature to make a Strength saving throw. On a failed save the creature
      is knocked prone and gains a rank of bruised.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above <br />A-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d12.</p>
