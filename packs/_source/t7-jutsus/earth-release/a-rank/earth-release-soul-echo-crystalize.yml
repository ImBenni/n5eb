folder: J5n58hwQimwIO4pd
name: Earth Release Soul Echo Crystalize
type: spell
_id: QdURSyyPdYwEToyA
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You begin to channel earth release chakra into your palm as you begin to think of the day where the fighting
      ends. Memories of battle, feelings of resolve and perseverance. The echoes of your soul empower this jutsu as you
      bathe the weapon in your chakra. For the duration, your weapon is surrounded with hard rock like stalagmites,
      gaining the following benefits;</p><ul><li>Your weapon's damage is increased by your Ninjutsu ability modifier, in
      Earth damage.</li><li>At the start of each of your turns, you gain a number of temporary hit points equal to your
      weapon's damage (If your weapon's damage die is greater than 2 dice, you only roll 2 die's worth). While you have
      these temporary hit points, you gain a +2 bonus to Strength and Constitution saving throws.</li><li>For hit you
      land with your weapon, you ignore 3 DR. This bonus can stack up to two times against a single target with
      consecutive attacks (up to ignore 9 DR total). This ability resets to 0 at the start of your next
      turn.</li><li>Once per turn, when you cast a Jutsu with the Earth Release keyword, you may add your weapon as a
      component. If you do, the jutsu's area of effect is increase by 5 feet in all directions (if applicable), its
      range is increased by +15 feet, and the jutsu ignores all temporary hit points. Jutsu that would already use your
      weapon as a component always gain the benefits, disregarding the once per turn limitation.</li></ul><p>You cannot
      lose concentration of this jutsu as the result of failing a concentration check and it does not cost chakra to
      maintain. This jutsu ends early if you let go of your weapon.</p>
    chat: ''
