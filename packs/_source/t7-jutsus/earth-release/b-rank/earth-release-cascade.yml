system:
  description:
    value: >-
      <p>You create a pillar of condensed suffering in the form of falling rocks on your enemies, in the hope they all
      die. Choose a point you can see within range. All creatures within a 15-foot-radius, 60-foot-high cylinder
      centered on that point must make a Dexterity saving throw or take 6d6 earth damage and be knocked prone on a
      failed save. On a successful save a creature takes half as much damage and no additional effects.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above <br />B-Rank, increase the cost of this jutsu by 3
      and increase the damage by 1d6.</p>
