system:
  description:
    value: >-
      <p>You generate a massive amount of purple chakra which allows you to manipulate the earth and its gravitational
      force. You form a highly condensed sphere of earth at a point above a creature you select within 60 feet, which
      explodes into hundreds of small comets of earth.</p><p>The target creature must make a Dexterity saving throw,
      taking 4d8 earth and 4d8 force damage, being knocked prone, dazed, and gaining 2 ranks of Bruised on a failed
      save, or taking half as much damage and gaining only 1 rank of Bruised and no further effects on a
      success.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost
      of this jutsu by 3 and either increase the damage of both damage types by 1d8 or the number of targets by +1 (Pick
      one).</p>
