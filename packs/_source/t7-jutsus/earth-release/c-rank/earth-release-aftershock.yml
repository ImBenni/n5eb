system:
  description:
    value: >-
      <p>You make use of the crushing waves that still ripple in the ground from your previous jutsu. The target of your
      jutsu as well as any creature within 10 feet of its original damaging range must make a Strength saving throw. On
      a failed save, a target takes two damage dice of the previous jutsu cast and is knocked prone. On a success, the
      target takes half damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3, and increase damage dealt by 1 of the previous jutsu's damage dice and
      increase the aftershock area by 10 feet.</p>
