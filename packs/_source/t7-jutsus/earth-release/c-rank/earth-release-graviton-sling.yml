system:
  description:
    value: >-
      <p>You generate a massive amount of purple chakra which allows you to manipulate the earth and its gravitational
      force. You summon forth 3 large clumps of earth that statically hover above you. As part of casting this jutsu,
      and as a bonus action on subsequent turns, you can launch any number of clumps you have remaining at a creature
      within 90 feet. Once all of these clumps have been used, this jutsu ends.</p><p>Make a ranged ninjutsu attack for
      each clump you fire. On a hit the target takes 2d6 + your Ninjutsu ability modifier in earth damage and becomes
      Bruised until the end of their next turn.</p><p>As a reaction, on other creature's turns, you can send out all
      remaining clumps remaining at a creature.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of clumps created by +1.</p>
