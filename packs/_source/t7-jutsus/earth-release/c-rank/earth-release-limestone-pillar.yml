system:
  description:
    value: >-
      <p>You create a pillar of limestone that violently rises from the ground displacing everything around it. Each
      creature in a 15-foot radius, 60-foot-high cylinder centered on a point within range must make a Dexterity saving
      throw taking 6d6 earth damage and failing prone on a failed save. Pass or fail, all creatures are pushed to the
      edge of this cylinder. This pillar is an earthen construct and crumbles into dust after 1 minute.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above <br />C-Rank, increase the cost of this jutsu by 3
      radius by 5 feet, and damage by 1d6.</p>
