  description:
    value: >-
      <p>You create a column of earth before stomping the ground and kicking it towards your target. Make a ranged
      ninjutsu attack dealing 3d12 earth damage and creating a 10-foot radius sphere of difficult terrain on the point
      of contact. This stalactite spear remains as an earthen construct and crumbles into dust after 1
      minute.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />C-Rank, increase the
      cost of this jutsu by 3 and damage by 1d12.</p>
