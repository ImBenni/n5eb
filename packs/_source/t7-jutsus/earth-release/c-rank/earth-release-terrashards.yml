system:
  description:
    value: >-
      <p>Slamming your open palm toward the ground, you strike each of your fingers into the earth to mold a series of
      5-foot tall, 5-foot wide, and 1-foot thick walls to shield you and your allies. In addition to yourself, choose up
      to four creatures in range.</p><p>Each wall grants half cover and acts as an earthen construct occupying a space
      of your choice within 5 feet of all selected creatures, appearing right before an attack or jutsu would hit or
      harm it. It has 2d6 Hit points, Resistance to bludgeoning, piercing, slashing and Cold damage and vulnerability to
      Lightning damage.</p><p>If the damage the wall receives would exceed its hit points, when you initially conjure
      it. Any remaining damage is dealt as normal to targets and the wall is destroyed.</p><p>The wall acts as a
      structure otherwise. It does not dissolve or vanish instead remaining until destroyed.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the hit
      points of each wall by 2d6.</p>
