system:
  description:
    value: >-
      <p>You form a small sphere out of mud or sand, before pouring chakra into it to grant it the appearance of an eye.
      You may use your bonus action to have the eye move up to 20 feet. Your earthen eye will disintegrate if it goes
      more than 100 feet away from you. Creatures must pass a perception skill check against your Ninjutsu save DC to be
      able to see the earthen Eye. While this jutsu is active you are able to see what the earthen eye is able to
      see.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      the jutsu and the range before the eye disintegrates by 50 feet.</p>
