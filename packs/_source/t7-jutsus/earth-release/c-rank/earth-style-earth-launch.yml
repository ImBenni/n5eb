system:
  description:
    value: >-
      <p>You force the earth below you to rocket up, launching yourself into the air. You jump 60 feet in any direction
      of your choice. All creatures within 5 feet of your landing location must make a Constitution saving throw taking
      1d8 Earth damage and being knocked back 10 feet on a failed save.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the movement range by 10 feet, and
      the range that enemies would be knocked back by an additional 5 feet.</p>
