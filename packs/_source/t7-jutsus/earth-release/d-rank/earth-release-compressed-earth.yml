system:
  description:
    value: >-
      <p>You condense a mass of earth into a small ball, before throwing it as
      hard as you can. Make a ranged ninjutsu attack against a target you can
      see within range. On a hit, the target takes 2d8 earth damage and must
      make a Strength saving throw, being knocked back 10 feet and concussed on
      a failed save.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above <br />D-Rank, increase the cost of this jutsu by 3
      and increase the damage by 1d8.</p>
