system:
  description:
    value: >-
      <p>You create a spear made out of earth to pierce through your enemies. This spear shares all the properties as a
      normal spear and can be used in Bukijutsu. Weapon attacks using this spear use your ninjutsu attack bonus. The
      spear deals 1d8 + your ninjutsu modifier in earth damage.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above <br />D-Rank, increase the cost of this jutsu by 3. If this jutsu is cast at B-Rank or
      higher, increase the damage by 1d8. If this jutsu is cast at S-Rank increase the damage by 1d8.</p>
