system:
  description:
    value: >-
      <p>You generate a massive amount of purple chakra which allows you to manipulate the earth and its gravitational
      force. You fire a projectile of earth with a tremendous pulling force. Make a ranged ninjutsu attack, dealing 1d10
      earth and 1d10 force damage and pulling the target 20 feet closer to you on a hit.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, the damage
      of both damage types by 1d10.</p>
