system:
  description:
    value: >-
      <p>You summon a small sphere made of earth release chakra that has a
      noxious odor. You then throw the sphere at a creature or object within
      range. Make a Ranged Ninjutsu Attack against the target. On a hit, the
      target takes 2d6 Earth damage and must succeed a Constitution saving throw
      gaining 1 rank of envenomed for 1 minute on a failed
      save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and the damage by
      1d6.</p>
