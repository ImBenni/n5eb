name: Earth Release Earth Golem
type: spell
_id: syxIIbjlygGr0A4k
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You conjure a ginormous stone construct made of earth, dust, soil, and sand forming a gargantuan goldem that
      acts at the end of your turn (no action required), and uses your Ninjutsu attack bonus and Save DC for effects
      that require it.</p><p>Additionally, if you cast <strong>Earth Release: Stone Dragon</strong> while this jutsu is
      active, instead of the normal effects of Stone Dragon occuring, you can choose for the following to happen; The
      Stone Dragon grows out of your Earth Golem and wraps its body around it, granting the Earth Goldem 125 Temporary
      Hit Points and the following new attack; As part of casting <strong>Earth Release: Earth Golem</strong>, you can
      spend 5 chakra to cast <strong>Earth Release: Stone Dragon</strong> as a bonus action, paying its chakra cost as
      normal.</p><p><strong>Dust Breath (Recharge 7-8):</strong> The Dragon exhales dust in a 30- foot cone. Each
      creature in that cone must make a Dexterity saving throw, taking 66 (12d10) Earth damage on a failed save, or half
      as much damage on a successful one.</p>
    chat: ''
