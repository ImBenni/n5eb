system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu, you must have the following <strong>Earth Release:
      Graviton</strong> jutsu on your jutsu known list (<strong>Well</strong>, <strong>Sling</strong>,
      <strong>Shower</strong>, <strong>Collapse</strong>, and <strong>Meteorite</strong>).</p><p>You generate a massive
      amount of purple chakra which allows you to manipulate the earth and its gravitational force. You generate a
      massive void at a space you can see, gathering forth various different earthen materials, or just about anything
      that you seem to be beneficial. You collect these components and create a Gargantuan construct known as a
      <em><strong>Falling Star Beast</strong></em>, which you control. This construct uses your Ninjutsu attack bonus
      and Save DC for effects that require it.</p><p>The Falling Star Beast rolls its own initative as it has its own
      turns, using your Ninjutsu ability modifier + proficiency as its initative bonus.</p>
