name: Earth Release Tectonic Movement
type: spell
_id: W5svyY2gg8s5Fd3o
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You mold and send Earth Release Chakra deep into the earth directly into one of the planets tectonic plates.
      You and all casters designate a single target you can see within range. Upon casting the jutsu you force the
      tectonic plate to move causing a massive earth quake to below your target.</p><p>You force all Creatures, objects
      and Structures within 1 mile of your target including your target to make a Constitution saving throw at
      disadvantage, taking 50d10 earth damage on a failed save and hald as much on a successful save. Structures and
      Objects take double damage. Creatures who failed the constitution saving throw are knocked prone and gain the
      Dazed condition for 10 minutes.</p><p><em><strong>Combination:</strong></em> <em>If this jutsu is cast as a
      Combination jutsu with 2 or more casters reduce the cost by -2.</em></p><p><em>Any creature who assists in casting
      this jutsu as a combination jutsu increases this Jutsu's offensive abilities based on the highest Charisma
      Modifier within the group of casters. (+0-1: No Change, +2: Increase damage by 5d10 +3: Increase damage by 10d10
      +4: Increase the damage by 15d10. +5: Increase damage by 25d10.</em></p><pre><code></code></pre>
