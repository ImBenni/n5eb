name: Particle Style Particle Assimilation Sphere
type: spell
_id: zSw2q6ufbJzVzoVq
img: systems/n5eb/assets/content/jutsu-icons/earth.webp
system:
  description:
    value: >-
      <p>You raise your hand high and form a small sphere just above your palm using chakra to generate molecule sized
      earth particles, which glow white. The strongest of all particle techniques, this sphere, once fully charged, with
      utterally atomize an opponent on a sub-atomic level. You do not spend chakra to maintain concentration of this
      jutsu.</p><p>Starting from your next turn after casting this jutsu, make a ranged Ninjutsu attack at advantage as
      you throw the sphere at a target within range. This sphere travels in a straight line starting from you, and as
      such, if there is a creature in between yourself and the target caught within this line, that creature instead
      becomes the target of this jutsu.</p><p>On a hit, the sphere gently enters the target's body before erupting
      violently, dealing 25d12 Force damage, which cannot be reduced. If a creature is reduced to less than ½ of their
      hit points, the user decides on which appendage the target creature lost. (Arm or Leg). If a creature is reduced
      to 0 hit points, they are turned to dust and are immediately killed.</p>
    chat: ''
