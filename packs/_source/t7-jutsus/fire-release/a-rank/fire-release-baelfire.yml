system:
  description:
    value: >-
      <p>You invoke the fire of demons within your lungs, allowing you to spew it out like one. Until the jutsu ends,
      you can use an action to exhale fire in a 45-foot cone. Each creature in that area must make a Dexterity saving
      throw, taking 8d6+8 fire damage and inflicting a rank of burned on a failed save, or half as much damage and no
      additional effects on a successful one.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above <br />A-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6+1.</p>
