system:
  description:
    value: >-
      <p>As part of casting this jutsu you must possess at least one ounce of blood, or sacrifice 2d4 of your hit
      points. You generate a flame in hand and infuse it with blood before sending the flame in a 30-foot cone in front
      of you.</p><p>All creatures within range must make a Dexterity saving throw to avoid the sanguine flame. On a
      failed save, creatures take 5d8+5 fire and 5d8+5 necrotic damage, and gains 1 rank of Bleeding and Burned. On a
      successful save, creatures take half damage and no further effects.</p><p>After casting this jutsu, the affected
      area remains bathed in bloody fire for the next minute, causing creatures that enter or start their turns in it to
      take 10 fire and 10 necrotic damage. These flames can be dispersed early by affecting the area with a jutsu with
      the Water Release keyword and a jutsu with the Medical keyword. If this occurs, this area cannot be affected by
      this jutsu again for 1 minute.</p>
    chat: ''
