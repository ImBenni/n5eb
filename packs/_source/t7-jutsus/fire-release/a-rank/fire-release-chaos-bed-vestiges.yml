system:
  description:
    value: >-
      <p>You form a ball of fire in your hands that has the appearance of a small sun and throw it at a target within
      range. Make a ranged ninjutsu attack on a target creature within range. On a Hit, the target creature takes
      10d10+10 fire Damage and the target must make a constitution saving throw, gaining 2 ranks of burned on a failed
      save.</p><p>Compare the result of your attack roll against the AC of all creatures within 5 feet of the creature
      you hit. If your attack is greater than their AC, they take half the damage the original target took and must make
      a constitution saving throw, gaining 1 rank of burned on a failed save.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and the damage die by
      2d10+2.</p>
