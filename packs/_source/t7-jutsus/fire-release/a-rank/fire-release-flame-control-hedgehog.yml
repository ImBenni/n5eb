system:
  description:
    value: >-
      <p>You summon a sphere of fire that shoots out dozens of pillars of fire. Each creature within range must make a
      Dexterity saving throw taking 10d8+10 Fire damage and gaining 2 ranks of the burned condition on a failed save or
      half as much damage and no additonal effects on a success. Creatures within 5 feet of the center of the sphere
      must make the Dexterity saving throw at disadvantage. Objects within 10 feet of the stream of fire ignite if they
      are not being worn or held.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      A-Rank, increase the cost of this jutsu by 3 and the size of this jutsu by 5 feet and Creatures within 10 feet of
      the center of the sphere must make the Dexterity saving throw at disadvantage.</p>
