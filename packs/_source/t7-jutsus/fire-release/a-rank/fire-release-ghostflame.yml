system:
  description:
    value: >-
      <p>You create a ball of silver and black flame that strangely burns cold. It is said that this jutsu possesses the
      ability to quell the persistance of the undead to cling to this world. Make a ranged ninjutsu attack against the
      target within range, dealing 10d4+10 necrotic damage and imposing a Constitution saving throw. On a failed save,
      the target feels a deep cold swathe over their very core, becoming Chilled for the next minute. Fire damage from
      this jutsu does not end the Chilled condition on a creature.</p><p>If this jutsu is used on an undead, the damage
      die of this jutsu become d10s and you ignore reistance and immunity to necrotic damage against them. Additionally,
      if the undead target possesses the ability to resurrect and you reduce them to 0 hit points with this jutsu, you
      sever their ties to this world, immediately killing them, unable to be revived again.</p>
