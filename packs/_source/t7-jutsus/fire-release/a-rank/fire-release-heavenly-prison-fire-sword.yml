system:
  description:
    value: >-
      <p>The user brings up a large flame in his right hand, which soon after takes the form of a sword. If someone is
      hit by the sword, they will be engulfed in flames. For the duration of this jutsu, when you take the attack
      action, you make a weapon attack dealing 4d10+4 Fire damage and your target must make a Constitution saving throw
      or gain 2 ranks of burned up to a total of 4 ranks of burned. Additionally, as a Bonus Action you may choose to
      ignite a creature who has ranks of burned, when you choose to do this the target creature takes 2d8+2 fire damage
      for each rank of burned they had and loses all ranks of burned. For the duration of this jutsu one of your hands
      are occupied and cannot be used to make Hand Signs (HS).</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above A-Rank, increase the cost of this jutsu by 3, the damage by 1d10+1, and the amount of burned
      ranks a creature can gain from this jutsu by 2.</p>
