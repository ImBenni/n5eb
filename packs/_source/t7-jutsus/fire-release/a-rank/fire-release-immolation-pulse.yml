name: Fire Release Immolation Pulse
type: spell
_id: gZ9L7m3ZnHHuRWOb
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>As a prerequisite to casting this jutsu, your target must be restrained, incapacitated, or prone. You create an
      orb of vibrant fire release chakra in your hand and blast it at a vulnerable creature within 10 feet of you. Make
      a melee ninjutsu attack if within 5 feet, or a ranged ninjutsu attack if further. On a hit, you deal 7d10+7 Fire
      damage.</p><p>The ground beneath the creature begins to crack and boil, until a 5-foot wide, 40-foot-wide cylinder
      of flame and magma erupts from where they are struck. The creature must make a Dexterity saving throw. On a failed
      save, they are caught by the cylinder, taking 3d12+3 fire damage and being knocked to the top of the cylinder on a
      failed save. On a successful save, the creature avoids the cylinder, moving to a space that can hold it within 5
      feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the cost by
      3, the damage by 1d10+1 and 1d12+1 respectively, and the height of the cylinder by 20 feet.</p>
