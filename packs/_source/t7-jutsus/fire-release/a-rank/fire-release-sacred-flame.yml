system:
  description:
    value: >-
      <p>You throw your hand out to grab your opponent's faces and let out a fiery explosion. Make a melee ninjutsu
      attack on a creature within range. On a successful Hit, the target creature takes 10d10+10 Fire damage and the
      must make a Constitution saving throw gaining the dazed condition and 1 rank of burned on a failed
      save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the cost of
      this jutsu by 3 and the damage die by 2d10+2. In addition, a creature who fails the saving throw also is knocked
      back 50 feet. If a creature knocked back by this jutsu collides with a solid object, their movement is stopped,
      taking falling damage as if they had fallen an equal distance.</p>
