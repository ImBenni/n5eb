system:
  description:
    value: >-
      <p>This jutsu can only be cast after casting a Ninjutsu with the <em><strong>Fire Release</strong></em> keyword
      that makes an attack roll, or after landing an unarmed attack, or melee weapon attack with a weapon with the light
      property. You generate a super-hot flame in your hand that absorbs all light, which then combusts.</p><p>Make a
      melee ninjutsu attack at a creature within range. On hit, the creature takes 3d8+3 fire damage which ignores
      resistance and treats immunity as resistance.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage die by one step (d8&gt;d10&gt;d12). If
      cast to S-Rank, you can make two attacks with this jutsu as opposed to one.</p>
