system:
  description:
    value: >-
      <p>You generate a super-hot flame in your hand which absorbs all light, forming into an orb which you throw at a
      creature within range. Make a ranged ninjutsu attack against a creature within range, dealing 6d12+6 fire damage
      which ignores resistance and treats immunity as resistance on hit. The next saving throw the creature makes
      against a Ninjutsu with the fire release keyword is made with a -2 penalty.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, the damage
      of this jutsu by 1d12, and the range by 10 feet.</p>
