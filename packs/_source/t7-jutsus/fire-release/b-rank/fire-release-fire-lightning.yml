system:
  description:
    value: >-
      <p>You shoot out dozens of spears of fire attempting to skewer all those around you. Each creature within 10 feet
      of you must make a Dexterity saving throw taking 8d8+8 fire damage on a failed save or half as much damage on a
      success. Objects within 10 feet of the stream of fire ignite if they are not being worn or held.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and
      increase the damage by 2d8+2. If this jutsu is casted at A-Rank or Higher, you may cast this jutsu as a bonus
      Action.</p>
