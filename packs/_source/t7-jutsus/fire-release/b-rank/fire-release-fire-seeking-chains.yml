name: Fire Release Fire Seeking Chains
type: spell
_id: 5MAl6th0pgt2Pc3Z
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>Striking both palms to the ground, chain-like flames crackles around you as five streaks of fire rapidly snake
      along the ground toward up to five targets standing on the same surface as you within range, leaping towards their
      target and exploding into a column of flame upon reaching them. This jutsu ignores all cover. Each creature must
      make a Dexterity saving throw, taking 8d6+8 fire damage on a failed save, or half as much damage on a successful
      one. A target that fails this save also becomes grappled in place by the flames. A creature grappled this way can
      make a Strength saving throw at the end of each of its turns, escaping on a success. A target gains 1 rank of
      Burned at the start of each turn it is grappled.</p><p>If a single creature is targeted by all five streaks of
      fire, this jutsu instead deals 12d6+12 fire damage on a failed save, or half as much damage on a successful
      one.</p><p>The fire can travel over obstacles up to 10 feet high, and ignites flammable objects along its path
      that aren't being worn or carried.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      B-Rank, increase the cost of this jutsu by 3, and increase the damage by 2d6+2 respectively.</p>
