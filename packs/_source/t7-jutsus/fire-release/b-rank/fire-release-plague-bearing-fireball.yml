name: Fire Release Plague-Bearing Fireball
type: spell
_id: Fw3U8h46kS0WgpT7
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You focus a large amount of medical chakra within your mouth and quickly spit it outward towards a space up to
      60ft away. As you fire this blast of chakra, you simultaneously change the nature release of the chakra to fire.
      Each creature within a 15-foot radius must make a Dexterity saving throw, taking 5d10+5 Fire damage, or half
      damage and no further effects on a success.</p><p>After the blast collides with the ground, a poisonous fog
      emerges that covers the area for 1 minute unless dispelled. Each creature within the radius after the blast has
      hit must also make a constitution saving throw, gaining the envenomed and poisoned conditions on
      failure.</p><p>Creatures who were hit by this jutsu must make the Constitution save at disadvantage and creatures
      who failed their Constitution save that begin their turns in this jutsu's area take additional poison damage as if
      they had another rank of the envenomed condition.</p><p>If a creature ends or starts their turn in this jutsu's
      space, they must make the constitution save. A creature can repeat the constitution save at the start of each of
      their turns.</p>
