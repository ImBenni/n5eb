name: Fire Release Demon Lantern Swarm
type: spell
_id: h1x5Gd1MGs2rgnCj
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You Create 4 Demon Masks made of fire, that float around you. You can use a bonus action to send one of the
      globes streaking toward one creature or object within 60 Feet of you. When you do, make a ranged Ninjutsu attack.
      On a hit the target takes 2d6+2 fire damage. Whether you hit or miss you spend one Demon Mask and it vanishes
      after use. The Jutsu ends early if you expend the last Demon Mask or fall unconscious. If you have 3 or more
      globes, they shed a bright light in a 30-foot radius and dim light for an additional 30 feet. If you have less
      than 3, the remaining globes shed dim light in a 30-foot radius.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of motes created
      increases by 1. If this jutsu is casted at B-Rank or higher the damage die size is increased by 1. If this jutsu
      is casted at A-Rank or higher the damage is increased by 1d8. If this jutsu is casted at S-Rank or higher the
      damage die size is increased by 1.</p>
    chat: ''
