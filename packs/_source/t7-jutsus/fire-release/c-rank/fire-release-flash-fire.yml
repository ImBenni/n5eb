system:
  description:
    value: >-
      <p>You brightly intensify the flames of a fire jutsu you've cast. When you used your action this turn to cast a
      ninjutsu with the Fire Release keyword that deals damage to a target, that target must also make a Constitution
      saving throw, taking 2d4+2 Fire damage and becoming blind until the end of its next turn on a failed save, or half
      as much damage and not blind on a success.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank, increase the cost of this jutsu by 3, and increase the damage by 2d4+2.</p>
