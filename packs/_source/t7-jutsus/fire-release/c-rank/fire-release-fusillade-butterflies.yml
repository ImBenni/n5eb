name: Fire Release Fusillade Butterflies
type: spell
_id: 3mJjzNZemp3cVgqN
img: systems/n5eb/assets/content/jutsu-icons/fire.webp
system:
  description:
    value: >-
      <p>You ready your shuriken in hand and coat it in a layer of fire release chakra. Make a ranged ninjutsu attack
      against a creature within 30 feet, dealing your weapon's damage in fire damage. As the shuriken leaves your hand,
      the fire coating is agitated and small will-o-wisps perspire off the weapon, forming into 3 small glowing
      butterflies of fire. These butterflies emit 10 feet of bright light and immediately fly to the creature, each
      butterfly dealing 1d8+1 fire damage. These butterflies ignore cover.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the amount of butterflies
      created by +1.</p><p></p>
