system:
  description:
    value: >-
      <p>You cover your palm in fire before grabbing your opponent's face and unleashing an explosion. Make a melee
      ninjutsu attack against a target you can see within range. On a hit, the target takes 4d12+4 fire damage. A
      creature hit by this jutsu must also make a Constitution saving throw, becoming blinded on a failed save. A
      creature can repeat the saving throw at the end of each of its turns, ending the blinded condition on a success.
      If a creature is reduced to 0 hit points, their head explodes, but killing them painlessly.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and
      increase the damage by 2d12+2.</p>
