system:
  description:
    value: >-
      <p>You mold Fire release in your stomach creating a thick vicous lava like substance with a peculiar smell. Pick a
      spot within 30 feet of you, creatures within a 10-foot sphere of that spot must make a Constitution saving throw,
      taking 2d8 Fire damage and gaining 1 rank of burned on a failed save, or half as much and no conditions on a
      success. The 10-foot sphere then lingers, any creature who starts their turn or steps in the area gains 1 rank of
      burned.</p>
