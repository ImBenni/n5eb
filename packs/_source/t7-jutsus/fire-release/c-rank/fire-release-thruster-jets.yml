system:
  description:
    value: >-
      <p>You concentrate fire chakra in the soles of your feet and the palms of your hands, creating jets of exhaust
      that lift you up. While concentrating on this jutsu you have a flying speed of 40 feet and can hover. When you use
      your action to cast a jutsu with the Fire Release keyword, you can dash or disengage as a bonus
      action.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, and increase your flying speed by 10 feet.</p>
