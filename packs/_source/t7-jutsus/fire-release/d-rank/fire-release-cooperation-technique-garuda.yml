system:
  description:
    value: >-
      <p>A hot thin lines of fire spew out of the mouth of each caster that merge together to create one line of fire
      that rivals the heat of the planet's core. All creatures in a 15-foot wide, 90-foot-long line originating from you
      must succeed a Dexterity saving throw, taking 5d6+6 fire damage on a failed save or half as much on a successful
      one.</p><p><em><strong>Combination:</strong></em> <em>If this jutsu is cast as a Combination jutsu with 2 or more
      casters you increase the damage die by 3. Any creature who assists in casting this jutsu as a combination jutsu
      increases the damage of this jutsu by one step based on the highest Charisma Modifier within the group of casters.
      (+0-1: No Change, +2: D6, +3: D8, +4: D10, +5: D12).</em></p>
