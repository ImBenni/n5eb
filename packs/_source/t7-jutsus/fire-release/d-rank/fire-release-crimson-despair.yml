system:
  description:
    value: >-
      <p>You encircle yourself in a rotating ring of flames to deter anyone from getting too close. Creatures caught in
      the radius when this jutsu is cast or begins their turns there must make a Dexterity saving throw or take 1d12+1
      fire damage. Creatures who fail this saving throw must also make a Constitution saving throw or gain a rank of
      burned for the duration of this jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above <br />D-Rank, increase the cost of this jutsu by 3 and increase the radius by 5 feet. If this jutsu is cast
      at B-Rank or higher, a creature must also make a Dexterity saving throw when they enter the radius for the first
      time on any turn.</p>
