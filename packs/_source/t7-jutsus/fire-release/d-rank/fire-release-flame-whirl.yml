system:
  description:
    value: >-
      <p>You twirl your hand in front of you forming a whip of fire release chakra that strikes all creatures within a
      15-foot long, 5-foot wide line in front of you. Each creature within range must make a Strength saving throw,
      taking 4d4+4 fire damage on a failed save, or half as much damage on a success. Creatures who fail this saving
      throw by 5 or more become Burned. This jutsu leaves behind a trail of fire on the ground.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the
      damage by 2d4+2. If cast to B-Rank or higher, increase the width of this line by 5 feet. If cast to S-Rank or
      higher, increase the width of this line by 5 feet.</p>
