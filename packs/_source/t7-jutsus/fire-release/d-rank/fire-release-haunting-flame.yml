system:
  description:
    value: >-
      <p>You create a ball of flames that tethers itself to an unsuspecting enemy, following them wherever they go. You
      do not need to spend chakra to maintain concentration on this jutsu.</p><p>A creature who is being followed by
      this flame is always considered to be seen by you, for the purposes of targeting them with Ninjutsu with the Fire
      Release Keyword, as the jutsu can be originated from the flame following them. They cannot benefit from cover or
      be hidden from you. A creature who is doused with a gallon of water or is hit with a Water Release jutsu of equal
      rank or higher may clear this jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3 and increase the amount of creatures you can target by +1.</p>
