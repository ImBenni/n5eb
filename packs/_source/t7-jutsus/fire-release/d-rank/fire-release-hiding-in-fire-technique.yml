system:
  description:
    value: >-
      <p>The user of this jutsu becomes able to both take on the appearance of fire and be immune to any damage caused
      by natural fires. While hiding in a natural fire the caster of this jutsu gains a +5 to stealth checks and is
      unable to be seen with chakra sight.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above D-Rank, increase the cost of this jutsu by 3. If this jutsu is casted at C-Rank increase the Duration to 10
      minutes. If this jutsu is casted at B-Rank increase the Duration to 1 hour. If this jutsu is casted at A-Rank
      increase the Duration to 1 day. If this jutsu is casted at S-Rank increase the Duration to 1 week.</p>
