system:
  description:
    value: >-
      <p>You gather a fuming amount of fire chakra in each hand before striking your opponent in a burst of flame. Make
      a melee ninjutsu or taijutsu attack, dealing your unarmed damage + 2d6+2 Fire damage. A target hit by this attack
      must make a Strength saving throw, being pushed back 20 feet on a failed save, or half as much on a
      success.</p><p>Alternatively, you can forgo the knock back dealt to the target and instead push yourself directly
      back 20 feet. This movement does not trigger an opportunity attack from the target.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and increase
      the damage by 1d6+1 and increase the knock back distance by 10 feet.</p>
