system:
  description:
    value: >-
      <p>You summon forth the greatest power from Amon, the Flame Minister, molding your chakra into the form of a giant
      flaming swordsman, who dashes forward for a finishing strike. You shoot out a 10-foot wide 120-foot-long line
      forcing each creature within the line to make a Dexterity saving throw. On a failed save, a creature takes 20d6+20
      fire damage. A creature who is brought to 0 hit points by failing this saving throw is immediately turned to ash,
      as Amon's blade cuts through their very soul. On a successful save, a creature takes only half damage and cannot
      be turned to ash. This jutsu ignores resistance and treats immunity as resistance. Additionally, if you win a
      Clash with this jutsu, it deals double damage to the creature that lost</p>
