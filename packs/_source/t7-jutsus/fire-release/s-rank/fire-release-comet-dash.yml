system:
  description:
    value: >-
      <p>You create a ball of fire similar to a comet in the palm of your hand, before rushing forward and slamming it
      down with a powerful explosion erupting from your hand. You move up to 60 feet in a straight line ignoring all
      difficult terrain or obstructions in your path as you crash through them effortlessly. This movement does not
      provoke attacks of opportunity. Make a melee ninjutsu attack on a creature within 5 feet after your movement,
      dealing 10d10+10 fire damage on a hit.</p><p>Hit or miss, all creatures in a 30-foot cone in front of you the
      target creature must make a Dexterity saving throw, taking 10d8+10 fire damage and gaining 3 ranks of the burned
      condition on a failed save.</p>
