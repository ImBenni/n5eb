system:
  description:
    value: >-
      <p>You harness the power of a black hole and bring down the power of a celestial body down upon your enemies. The
      ambient temperature of the air rises and the sky opens its maw to bring forth death and destruction. All creatures
      objects and structures within a 100-foot-radius, 500-foot-high cylinder must make a Dexterity saving throw or take
      100d4+100 fire damage and become immolated and blinded on a failed save.</p><p>If this would reduce a creature,
      structure, or object to 0 hit points it is turned to ash and atomized. on a failed save and half as much on a
      successful save. Structures and Objects take double damage.</p><p>A creature immolated by this jutsu cannot
      extinguish the flames on their own and can only have either the burned condition or the Blinded condition ended by
      a Jutsu that removes conditions casted at no less than S-Rank.</p><p><em><strong>Combination:</strong></em> <em>If
      this jutsu is cast as a Combination jutsu with 2 or more casters reduce the cost by -2.</em></p><p><em>Any
      creature who assists in casting this jutsu as a combination jutsu increases this Jutsu's offensive abilities based
      on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2: Increase damage by 10d4+10,
      +3: Increase damage by 15d4+15, +4: Increase damage by 25d4+25, +5: Increase damage die by 1 step.</em></p>
