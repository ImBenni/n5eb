system:
  description:
    value: >-
      <p>You throw your voice and envelope your opponent's cacophonous screech disorienting them. All creatures of your
      choice within range must make a Wisdom saving throw reducing their movement to 0 and becoming incapacitated on a
      failed save. A creature who fails this saving throw increases the area by 5 feet and any creatures who previously
      passed the initial saving throw must repeat the saving throw again. An affected creature repeats this saving throw
      at the end of each of their turns for the duration. This jutsu has a maximum area of effect of 30 feet.</p>
