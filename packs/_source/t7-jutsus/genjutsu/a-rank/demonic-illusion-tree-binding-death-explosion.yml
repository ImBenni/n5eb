system:
  description:
    value: >-
      <p>To cast this jutsu you must have <em><strong>Tree binding Death</strong></em> as a part of your known jutsu
      list.</p><p>As you finish tree binding you quickly enhance the jutsu with a genjutsu, trapping the target in their
      own mind trapped by a cherry blossom tree as paper tags litter it detonating causing the Tree Binding Death
      Genjutsu to end early, The targets take 8d10 Psychic damage, and must make a Charisma saving throw. On a failed
      save, they are convinced that all trees around them will explode must immediately at the start of each of their
      turns move as far away as they can away from all types of trees. Creatures who failed can repeat the saving throw
      at the end of their turns, ending this effect on a success.</p>
    chat: ''
  source:
    custom: ''
    rules: n5eb
    book: Team 7
  activation:
    type: bonus
    cost: 1
    condition: >-
