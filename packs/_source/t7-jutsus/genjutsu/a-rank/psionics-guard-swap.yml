folder: 5fItbwmh4mPsQ1Zq
name: Psionics Guard Swap
type: spell
_id: JzkijRIHNx1p1eIc
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu, you must have at least one vulnerability, resistance, or
      immunity to a damage type as the result of a jutsu, feat, or feature. You outstretch your hand and select a target
      within range, attempting to analyze the creature's chakra network to override their senses with your own, while
      simultaneously mimicking theirs. The creature must make an Intelligence saving throw.
      </p><p><strong>Success:</strong> This jutsu ends, and the target is able to resist its effects.
      </p><p><strong>Failure:</strong> Any vulnerabilities, resistances, or immunities the target possesses as the
      result of a jutsu, feat, feature, or trait are swapped with your own. If their vulnerabilities, resistances, or
      immunities come from a jutsu with a duration, they become unable to end the jutsu(s) providing these statistics as
      you take control of it. Once this jutsu ends, both you and the creature have your statistics returned to normal.
      The target can use their action to remake the saving throw, ending this jutsu's effects on a success.
      </p><p><strong>Critical Failure:</strong> Same effects as a failure; however, the target cannot reattempt the
      saving throw.</p>
