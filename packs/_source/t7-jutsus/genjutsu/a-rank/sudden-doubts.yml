name: Sudden Doubts
type: spell
_id: DO3nHn7wA9T4JZXe
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You generate feelings of doubt and dread within a creature, causing them to think twice about their attack. The
      creature must make a Charisma saving throw.  </p><p><strong>Critical Success</strong> The creature is immune to
      this jutsu's effects and remains immune for the next minute.  </p><p><strong>Success</strong> The creature carries
      through with their action as normal but hesitates, dealing half damage and granting creatures a +1d4 bonus to any
      saving throws they make.  </p><p><strong>Failure</strong> The creature doesn't go through with their action,
      wasting it.  </p><p><strong>Critical Failure:</strong> Same effects as a failure, but the creature feels so
      concerned that they use their action to cast a jutsu or use an ability to benefit the creatures they would have
      harmed.  </p>
    chat: ''
  source:
