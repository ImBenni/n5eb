name: Demonic Culling Sleep Inducement
type: spell
_id: JXK7NpU4yZFAyvLi
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>This genjutsu targets a single target, forcing a wave of drowsiness to overtake them and knock them out. They
      then enter a dream like state, experiencing joys that they'll never want to leave. Select one creature you can see
      within range. The selected creature must make a Wisdom Saving throw. If the creature has already awoken from this
      jutsu they remake future saves at advanatge.</p><p><strong>Critical Success:</strong> Affected creature is able to
      resist this jutsu's effects and always has advantage against this jutsu for the remainder of combat.
      </p><p><strong>Success:</strong> Affected creature is able to resist this jutsu's effects.
      </p><p><strong>Failure:</strong> Affected creature becomes unconscious. At the beginning of each of their turns
      they may remake the save, waking up on a success and staying asleep on a failure. If the target takes damage while
      asleep they instantly wake up. </p><p><strong>Critical Failure:</strong> Affected creature becomes unconscious. At
      the end of each of their turns they may remake the save, waking up on a success and staying asleep on a failure.
      Whenever the target takes damage while asleep they make another save at advantage to wake up.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by and the
      number of targets by +1.</p>
