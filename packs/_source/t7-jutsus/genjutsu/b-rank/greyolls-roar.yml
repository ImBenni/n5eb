system:
  description:
    value: >-
      <p>You manifest a scarlet colored poison meant to create mass hysteria and horrific illusions at creatures within
      range. Each creature within range must make a Wisdom saving throw, taking 5d10 psychic damage on failed save plus
      additional effects depending on their results. </p><p><strong>Success:</strong> On a successful save the affected
      creature takes half damage and is able to resist this jutsu's other effects. </p><p><strong>Failure:</strong> The
      creature's vision briefly darkens and from this darkness, the head of fearsome dragon appears and emits a roar
      that disturbs the creature to its very core. The creature takes this jutsu's damage is knocked back 15 feet, falls
      prone, and gains 1 rank of Fear. </p><p><strong>Critical Failure:</strong> Same affects as a failure and the next
      damage roll the creature deals to another creature while it possesses this rank of fear is halved, as they are so
      caught up in shock and paranoia that they cannot fight properly.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3, the range by 15 feet, and the radius
      by 5 feet.</p>
