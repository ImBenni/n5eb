system:
  description:
    value: >-
      <p>You utter words that come out as a soft calming whisper, ensuring them that everything will be ok. A creature
      you can see in range must make a Wisdom saving throw. A creature charmed by this jutsu repeats their saving throw
      once per round when they take damage, or at the end of each of their turns, ending this jutsu's effects on a
      success.</p><p><strong>Critical Success:</strong> The target is able to resist this jutsu's effects and is immune
      to it for 1 minute. </p><p><strong>Success:</strong> The target gains 1 rank of charmed until the start of their
      next turn and suffers no additional effects. </p><p><strong>Failure:</strong> The target gains 2 ranks of charmed,
      and reduces their movement speed by half while they are charmed by this jutsu. </p><p><strong>Critical
      Failure:</strong> The target gains 3 ranks of charmed, drops any items they may be holding, and is slowed while
      they possess ranks of charmed from this jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above  B-Rank, increase the cost of this jutsu by 3 and number of creatures you can affect with this jutsu
      by +1.</p>
