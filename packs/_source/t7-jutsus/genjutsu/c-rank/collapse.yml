system:
  description:
    value: >-
      <p>You utter a single word that overpowers and dominates a foe's psyche. Choose one creature that you can see and
      that can hear you within range. The target creature must make a Wisdom saving throw or take 6d6 psychic damage and
      fall prone. While a creature is prone in this way they must make a Wisdom saving throw if they attempt to stand,
      staying prone on a failed save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the damage by 2d6.</p>
