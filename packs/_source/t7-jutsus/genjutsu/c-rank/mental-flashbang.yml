system:
  description:
    value: >-
      <p>You create a depraved visual, almost making sight itself seem like a curse. All creatures in a 15-foot radius
      sphere centered on a point you can see within range, must succeed a Wisdom saving throw. <br /><strong>Critical
      Success</strong>: This creature ignore the effects of this jutsu. </p><p><strong>Success</strong>: Affected
      creature gain 1 rank of dazzled. </p><p><strong>Failure</strong>: Affected creatures Blinded until the end of
      their next turn. </p><p><strong>Critical Failure</strong>: Affected creatures becomes blinded and concussed and
      must remake the Wisdom saving throw at the end of each of its turns to end the blinded condition.</p>
