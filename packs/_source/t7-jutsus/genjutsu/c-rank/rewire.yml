      creature you can see within range must make an Intelligence saving throw. </p><p><strong>Critical
      Success</strong>: Affected creature is able to resist this Jutsu's effects becoming immune to it for the next
      minute cast from the same creature. </p><p><strong>Success</strong>: Affected creature is able to resist this
      jutsu's effects.</p><p><strong>Failure</strong>: Affected creature gains 1 rank of
      confused.</p><p><strong>Critical Failure</strong>: Affected creatures gains 3 ranks of confused.</p>
