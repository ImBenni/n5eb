system:
  description:
    value: >-
      <p>You vibrate your vocal cords and augment them to a distracting hymn, temporarily inflicting amnesia. The target
      must succeed on a Wisdom saving throw or lose concentration on any jutsu or features that require concentration. A
      creature cannot begin concentrating on anything until the end of their next turn.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3 and the
      duration of this jutsu by 1 round.</p><pre><code></code></pre>
