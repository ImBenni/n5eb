system:
  description:
    value: >-
      <p>In response to a creature's attack, you attempt to cast a genjutsu to confuse and disarm your opponent in a
      rather embrassing fashion. The triggering creature must make a Charisma saving throw. <br /><strong>Critical
      Success:</strong> The creature is immune to this jutsu's effects for 1d4 rounds. </p><p><strong>Success:</strong>
      The creature is able to resist this jutsu's effects. </p><p><strong>Failure:</strong> The creature, in their mind,
      sees you break out into a dance, emitting an aura of pink dazzling chakra just before their attack connects. The
      creature gains 1 rank of Charmed until the start of their next turn against you, causing their attack to fail.
      </p><p><strong>Critical Failure:</strong> Same affects as a failure, but the creature becomes flustered. The
      creature drops whatever items it may be holding and has their movement speed reduced to 0 until the end of the
      current turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the
      cost of this jutsu by 3 and the range by 10 feet.</p>
