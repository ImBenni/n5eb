name: Mirror Wall
type: spell
_id: 0IJiA7DBfI8biILx
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>For the duration you attempt to trick all around you into believing that there is a wall where one is not. All
      creatures that would see the wall must make a Wisdom saving throw.</p><p>On a failed save, the creature sees the
      wall and believes it to be real, treating it as if it were a real indestructable wall. The illusory wall may show
      whatever the caster desires. The wall has 10 hit points and an AC equal to your Genjutsu Save DC. The wall is
      20-foot wide and 10-foot tall, and has no discernable edges. The user can choose to project onto the wall anything
      they desire, such as animated images, though this effect is purely illusory.</p>
