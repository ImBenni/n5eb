system:
  description:
    value: >-
      <p>You take in a large breath, secretly releasing an wave of invasive
      chakra at hostile creatures within 15 feet of you. You then make a loud
      battle cry, and affected hostile creatures hear the cry of a primordial
      beast, such as a dinosaur, acompany your warcry, echoing throughout the
      land and reverberating their bodies. Each affected creature must succeed a
      Charisma saving throw. Creatures under the effects of a Genjutsu you cast,
      or within 5 feet of you, roll at disadvantage. <br /><strong>Critical
      Success:</strong> The affected creature cannot be affected by this jutsu
      for 1d4 turns. </p><p><strong>Success:</strong> The affected creature
      feels a chill run down their spine, but is able to resist this jutsu's
      effects. </p><p><strong>Failure:</strong> The affected creature is
      Frightened until the end of your next turn, and on its turn must use half
      its movement speed to move away from you. </p><p><strong>Critical
      Failure:</strong> The affected creature suffers the effect of a failure,
      and also falls prone.</p>
