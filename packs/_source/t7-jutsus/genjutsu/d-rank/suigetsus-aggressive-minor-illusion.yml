system:
  description:
    value: >-
      <p>Using a modified version of<strong> Minor Illusion</strong>, you create a doppelganger illusion and erase
      yourself from the field of view of your target. Allowing you to move without being noticed.</p><p>You select a
      target within 60 feet of you to make a Wisdom saving throw. On a failed they see an illusion of you that acts in a
      manner of your choice while staying still and can no longer see the real you. Additionally, until the end of your
      turn your first attack against the target is made at advantage. Either at the end of your turn or when your target
      takes damage, your illusion fades away and your target is able to see you again.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank increase the cost of this jutsu by 3 and increase
      the number of targets by +2.</p>
