system:
  description:
    value: >-
      <p>You utter a single word of absolute dread, dredging up the innate fears of a creature. Choose up to three
      creatures you can see within range. The target(s) must make a Charisma saving throw. On a failed the target(s) are
      incapacitated, blinded, and knocked prone, as the weight of their soul crushes them.</p><p>A prone creature
      struggles to even stand and must make a Charisma saving throw to do so. On a failed save, they remain prone and
      immediately end their turn. On a successful save, the target can stand up and take one action before falling prone
      and ending their turn.</p>
