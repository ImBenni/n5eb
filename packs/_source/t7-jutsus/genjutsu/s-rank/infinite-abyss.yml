system:
  description:
    value: >-
      <p>You convince a creature they are falling forever and that there is no escape, this fear swallowing them whole.
      A creature you can see within range must make a Wisdom saving throw or gain 5 ranks of fear and they begin falling
      in a dark abyss in their minds.</p><p>For each turn this jutsu is active they take psychic damage as if they had
      fallen 100 feet. This damage does not trigger until the jutsu ends. If a creature takes psychic damage as a result
      of this jutsu the fall prone.</p>
