system:
  description:
    value: >-
      <p>As a part of the requirements to cast this jutsu, you must target a creature currently under the effects of
      <em><strong>Pain</strong></em>, <em><strong>Doubled Pain</strong></em> or <em><strong>Unlimited
      Pain.</strong></em> You end your concentration on that jutsu and this one takes its place.</p><p>You retain all
      the effects of that jutsu and add this jutsu's effects to them. You magnify the suffering of a creature, bringing
      creatures to even writhe in agony at even the thought of being subjected to this jutsu. One creature you can see
      within range must succeed an Intelligence saving throw.</p><p>On a failed save, for the duration, each time a
      creature takes damage, as a result of this jutsu are vulnerable to its damage. Additionally, they have
      disadvantage on attack rolls, ability checks, and saving throws.</p>
