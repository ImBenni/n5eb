folder: AyzMK8u6Lt1ATtpg
name: Squid Game
type: spell
_id: zTWTr95SIsitk9eT
img: systems/n5eb/assets/content/jutsu-icons/genjutsu.webp
system:
  description:
    value: >-
      <p>You invade the minds of creatures causing them to become maddened with rage and turn against each other. Select
      up to 3 creatures within 30 feet of each other that are no more than 90 feet away from you. These creatures must
      make a Charisma saving throw, becoming Berserk on a failed save. This jutsu's effects change depending on how many
      targets fail this saving throw. The eyes of affected targets glow a noticable bright red. You do not spend chakra
      to concentrate on this jutsu, however, you cannot benefit from effects that would grant you advantage on
      concentration checks or allow you automatically succeed them for the duration. If an affected creature would be
      targeted by the Genjutsu <em>Release</em>, the caster cannot gain advantage on the chakra control check, and rolls
      at disadvantage if the target it not bloodied.</p><p>If all three targets fail this saving throw, the creatures
      gain a bonus to attack and damage rolls equal to your Genjutsu ability modifier, and only attack each other on
      their turns. These creatures cannot deal non-lethal damage. If a non-affected creature attacks or makes a loud
      distraction at one or more of these creatures, they will begin attacking them, going back to killing each other if
      they successfully kill the distractor.</p><p>If only one or two creatures fail this saving throw, the affected
      creatures gain 100 temporary hit points and gain a bonus to attack and damage rolls equal to half your Genjutsu
      ability modifier, rounded up. These creatures then begin attacking the creature(s) that succeeded to the
      death.</p><p>If an affected creature would take damage while Bloodied (under 50% of their maximum hit points) from
      a creature not being affected by this jutsu, they can begin remaking the Charisma saving throw, ending this
      jutsu's effects on them on a success and becoming immune to it for 1 week.</p>
    chat: ''
