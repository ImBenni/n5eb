name: Lightning Release Soul Echo Thunder
type: spell
_id: qTxC7VWwz0v7TUad
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You begin to channel lightning release chakra within your palm as think of justice. The determination to strike
      down those who oppose the safety of those you love, one by one, until your friends and family can walk this earth
      safely. The echoes of your soul empower this jutsu as you bathe the weapon in your chakra. For the duration, your
      weapon perspires golden lightning, gaining the following benefits;</p><ul><li>Your weapon's damage is increased by
      your Ninjutsu ability modifier, in Lightning damage.</li><li>You form an electric link with your weapon, allowing
      you to call your weapon back to you on or outside of your turn (no action required), if it is within 60 feet of
      you. When you attack with your weapon, on each attack you are able to go beyond the attack's normal range and
      throw the weapon up to an additional 30 feet away, calling the weapon back to you after each attack.</li><li>When
      you hit a target with your weapon you mark them with static elecricity. At the start of their next turn, they must
      succeed a Dexterity saving throw, with a -1 penalty for each attack they were hit with on their turn. On a
      failure, they struck by lightning, taking your weapon's damage in lightning damage, and being Shocked and knocked
      prone.</li><li>Reduce the cost of all jutsu with the Lightning Release keyword that you cast by -2 (Min. half).
      Allies within 60 feet of you also reduce the cost of such jutsu by -1 (Min. half).</li></ul><p>You cannot lose
      concentration of this jutsu as the result of failing a concentration check and it does not cost chakra to
      maintain. This jutsu ends early if you let go of your weapon.</p>
    chat: ''
