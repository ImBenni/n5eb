folder: Hkrmdo00Q1MfxbW5
name: Lightning Release Zapple
type: spell
_id: WyoFUPENac074Qsf
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You prepare to summon forth lightning that brings forth the wrath of the sky. You, or allied creature(s)
      assisting you in casting this jutsu, shoot a beam of light high into the stratosphere. From the light, black
      thunderclouds form stretching a 1 mile area. You then raise your hand into the sky, calling for the lightning to
      strike as you throw your hand down pointing a creature you can see within 300 feet.</p><p>Make a ranged Ninjutsu
      attack at the target. This attack ignores cover. This jutsu also ignores armor based effects that would resist
      this jutsu in any way, such as damage reduction or saving throw bonuses. On a hit, the creature takes 40d6
      lightning damage and gains 2 ranks of Shocked. The creature must also make a Strength saving throw, becoming
      Incapacitated for 1d4 rounds on a failed save. If this jutsu scores a critical hit, instead of doubling the damage
      die, increase the damage die of this jutsu by 2 steps, and this jutsu ignores resistance and treats immunity as
      resistance. Lastly, if this jutsu reduces a creature to 0 hit points, the creature falls unconscious, but is
      stable.</p><p><em><strong>Combination:</strong></em> <em>If this jutsu is cast as a Combination jutsu with 2 or
      more casters increase the damage by 5d6 and gain a +1 bonus to critical threat range.</em></p><p><em>Any creature
      who assists in casting this jutsu as a combination jutsu increases this Jutsu's damage potential based on the
      highest Charisma Modifier within the group of casters. (+0-2: No Change, +3-4: The attack roll of this jutsu is
      always rolled at advantage, regardless of the circumstance, and gains a +1 to critical threat range +5: Increase
      the damage die of this jutsu to d8s, and gain a +1 to critical threat range. This jutsu also gains the benefits of
      having a +3-4 modifier.)</em></p>
