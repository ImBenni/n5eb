system:
  description:
    value: >-
      <p>You clap your hands together and discharge a giant wave of electrical energy to destroy your foes. Each
      creature in a 150-foot cube originating from you must make a Constitution saving throw. On a failed save, a
      creature takes 12d10 lightning damage and become shocked, weakened, and slowed. On a successful save, the creature
      takes half as much damage and no additional effects.</p><p>After casting this jutsu you cannot cast a jutsu with
      the lightning release keyword until the end of your next turn.</p><p><em><strong>Combination:</strong></em> <em>If
      this jutsu is cast as a Combination jutsu with 2 or more casters reduce the cost by -2.</em></p><p><em>Any
      creature who assists in casting this jutsu as a combination jutsu increases this Jutsu's offensive abilities based
      on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2-3: Increase damage by 5d10 and
      inflict another rank of shocked. +4-5: Increase damage by 5d10 and inflict another rank of weakened.</em></p>
