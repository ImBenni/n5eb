system:
  description:
    value: >-
      <p>You bust out a spectacular move that ends in a dazzling finish. All creatures within range must make a
      Dexterity saving throw, on a failed save they take 7d8 lightning damage, or half as much on a successful
      one.</p><p>If a creature making this saving throw has the dazed condition as a result of the jutsu
      <em><strong>Lightning Release: Electric Boogaloo</strong></em>, the affected creature instead takes 7d12 lightning
      damage on a failed save and must make also Constitution saving throw. This saving throw is made at disadvantage if
      they failed their Dexterity saving throw. On a failed Constitution save, the creature becomes stunned until the
      end of their next turn. You can only target 2 creatures that failed their saving throw against Electric Boogaloo
      with this special effect.</p>
