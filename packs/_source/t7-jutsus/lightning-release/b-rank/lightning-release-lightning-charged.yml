system:
  description:
    value: >-
      <p>You send lightning chakra through your central nervous system to massively speed up your body's response time
      and perceptive abilities.</p><p>Your movement speed is increased by 15 feet, you gain advantage in Dexterity
      Saves, Dexterity and Wisdom ability checks, and at the beginning of each of your turns you gain either an
      additional bonus action or reaction.</p><p>At the conclusion of this jutsu you gain 1 rank of Weakened and gain
      the Shocked condition for 1 hour and cannot benefit from this jutsu again until they take a full rest. This jutsu
      ends early if the target is incapacitated.</p>
