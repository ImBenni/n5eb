system:
  description:
    value: >-
      <p>You inscribe a large seal on the ground of your design, encompassing a 30-foot radius from where you stand
      before dissipating. The seal imbeds lightning release chakra into random spots of the ground below, creating an
      efficient but unassuming trap. For the duration, this jutsu's area is considered difficult terrain.</p><p>Hostile
      creatures, even if they are flying that move a space or are knocked into a space within this jutsu's radius must
      make a Dexterity saving throw. Creatures that do not have either Chakra Sight, True Sight, or Tremor Sense must
      make this saving throw at disadvantage. On a failed save, the creature takes 5d4+ your Ninjutsu modifier in
      lightning damage, is knocked prone and gains the Shocked condition until the end of their next
      turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3 and the damage by 1d4.</p>
