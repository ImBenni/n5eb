system:
  description:
    value: >-
      <p>You weave hand signs at the speed of light to summon a net made of dozens of lines of thick lightning chakra.
      The lightning net then creates a barrier protecting you and anyone within 5 feet of you from damage. The barrier
      has an AC is equal to your Ninjutsu Save DC, has 10d8 hit points, and is vulnerable to Wind Damage. The barrier
      disappears at the beginning of your next turn. Creatures benefitting from this jutsu gain the benefits of half
      cover.</p><p>At Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 5
      and the hit points of the barrier by 2d8. If this jutsu is cast at A-Rank or higher, it now protects anyone within
      10 feet of you.</p>
