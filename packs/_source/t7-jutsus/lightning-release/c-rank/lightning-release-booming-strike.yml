system:
  description:
    value: >-
      <p>You brandish a weapon in lightning and make a taijutsu attack against a creature within range. On a hit, the
      creature takes your weapon's damage + 1d10 lightning damage and becomes sheathed in booming electricity until the
      start of your next turn. If the target willingly moves 5 feet or more before the start of your next turn, they
      take 2d8 lightning damage, being struck by a bolt of lightning as they move. This jutsu then
      ends.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3, and the damage by 1d10 and 1d8 respectively.</p>
