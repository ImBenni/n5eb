system:
  description:
    value: >-
      <p>You pull off some groovy dance moves while simultaneously radiating highly volatile lightning. All creatures
      within range must make a dexterity saving throw, on a failed save the creature takes 4d8 lightning damage. If a
      creature making this saving throw has the shocked condition due to <em><strong>Lightning Release: Shocking
      Step</strong></em>, the creature also becomes dazed until the end of their next turn on a failed save. You can
      only effect 1 creature who failed their saving throw with this special effect. 0n a successful save, creatures
      takes half damage and suffers no additional effects.</p><p>If you have <em><strong>Lightning Release: Flashy
      Finale</strong></em> on your jutsu known list, you can target 1 of the creatures who failed their saving throw
      with this jutsu, casting it as a reaction.</p>
