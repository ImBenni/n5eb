system:
  description:
    value: >-
      <p>A stroke of lightning forming a line 100 feet long and 5 feet wide blasts out from you in a direction you
      choose. Each creature in the line must make a Dexterity saving throw. A creature takes 8d6 lightning damage on a
      failed save, or half as much damage on a successful one. The lightning ignites flammable objects in the area that
      aren't being worn or carried.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      C-Rank, increase the cost of this jutsu by 3 and the damage by 1d6.</p>
