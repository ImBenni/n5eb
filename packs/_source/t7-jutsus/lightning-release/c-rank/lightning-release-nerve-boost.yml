system:
  description:
    value: >-
      <p>The mental aspect of the perfected Lightning Chakra Mode created so that the user's body can keep up with the
      speed granted by enhancing your body with Lightning Chakra. By speeding up the rate at which your neurons send
      signals through your body you slow your perception of time, making both hitting and dodging easier. For the
      duration, when you would make a melee attack, add a d4 to the roll. Additionally, when you would be the target of
      a melee or ranged attack, add a d4 to you AC against the attack. This causes immense stress on your neurons. After
      this Jutsu ends, decrease all of your attack rolls by a d4 and your AC by 1 for 1 minute.</p>
