system:
  description:
    value: >-
      <p>You conjure your lightning release chakra to generate a spark of willpower from a creature within range. A
      Creature gains 1 Hit point and a number of temporary hit points equal to 2d6 + Your Ninjutsu ability Modifier.
      These Temporary hit points last for 1 minute. Additionally, the creature gains resistance to Lightning damage so
      long as they have Temporary hit points granted by this jutsu.</p><p><em><strong>Overcharge.</strong></em> When you
      cast this jutsu, as a bonus action or a reaction, you can overcharge its effects. When you do, the first time your
      target would take lightning damage while benefiting from temporary hit points (thp) as a result of this jutsu, you
      instead gain bonus thp equal to half the damage dealt.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the healing die by 1d6.</p>
