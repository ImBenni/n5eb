name: Lightning Release Vanishing Rasengan
type: spell
_id: txghugri3PTIn84Y
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>You collect chakra into your hand generating a powerful sphere of spiraling chakra, then the user adds
      Lightning Release to it before throwing it. As it glides, the nature transformation abruptly kicks in, resulting
      in the technique disappearing from sight. This adds an element of surprise to the attack, as an opponent may lower
      their guard, assuming that the technique has dispersed, only to find themselves struck by the invisible attack.
      Make a ranged ninjutsu attack against a creature within range, your target must make a Perception check opposed by
      your Ninjutsu save DC, on a failure this attack is made at advantaged. Creatures with chakra sight have advantage
      on the Perception check. On a Hit, the target takes 4d8 force damage and makes a Constitution saving throw. On a
      failed save they gain the prone condition.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above C-Rank increase the cost of this jutsu by 3, the damage by 2d8, and the range by 15 feet.</p>
