system:
  description:
    value: >-
      <p>You send small amounts of lightning release chakra through the air up to 60 feet away from you. For the
      duration, you know if there's a creature within 60 feet of you. This jutsu can penetrate most barriers but it is
      blocked by 5 feet of any material. For the duration of this jutsu, creature in range cannot gain the benefit of
      being hidden, or obscured from you. You have advantage on attack rolls against creature within range that are
      shocked.</p><p><strong>At higher ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      of this jutsu by 3. Starting at C-rank, the range of this jutsu becomes self (100 feet). Starting at B-rank, the
      range of this jutsu becomes self (1 mile) and the duration becomes 1 minute (concentration). Starting at S-rank,
      the duration becomes 1 hour.</p>
