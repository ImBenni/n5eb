system:
  description:
    value: >-
      <p>You generate a field of lightning chakra as you perform a graceful dance. All creatures in your range must make
      a constitution saving throw, becoming shocked on a failed save until the end of their next turn.</p><p>If you have
      <em><strong>Lightning Release: Electric Boogaloo</strong></em> on your jutsu known list, you can target 1 of the
      creatures who failed their saving throw with this jutsu, casting it as a bonus action.</p>
