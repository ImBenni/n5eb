folder: UVn2c27vB9Z2GRu0
name: Lightning Release Thunderwave
type: spell
_id: IaFwA8neQXTDTbM6
img: systems/n5eb/assets/content/jutsu-icons/lightning.webp
system:
  description:
    value: >-
      <p>A wave of thunderous force sweeps out from you. Each creature in a 15-foot cube originating from you must make
      a Constitution saving throw. On a failed save, a creature takes 2d8 Lightning damage and is knocked back 10 feet
      away from you. On a successful save, the creature takes half as much damage and no additional effects.</p><p>In
      addition, unsecured objects that are completely within the area of effect are automatically pushed 10 feet away
      from you by the jutsu's effect, and the jutsu emits a thunderous boom audible out to 300
      feet.</p><p><em><strong>Overcharge.</strong></em> When you cast this jutsu, as a bonus action or reaction, you can
      overcharge its effects. When you do, a creature who fails their saving throw is shocked until the end of their
      next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank, increase
      the cost of this jutsu by 3 and increase the damage by 1d8.</p>
