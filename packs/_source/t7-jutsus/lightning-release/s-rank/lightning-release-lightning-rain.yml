system:
  description:
    value: >-
      <p>An advanced form of the Thunderstorm Ninjutsu. A turbulent cloud forms made of lightning; it surges with energy
      almost breathing lightning. <em><strong>This jutsu does not cost any additional chakra while
      concentrating.</strong></em> For the duration, creatures of your choice under this cloud must succeed a Dexterity
      saving throw at the end of each of its turns taking 12d8 Lightning damage and being stunned on a failed save or
      half as much damage and no additional effects on a successful one. Creatures who attempt to cast a Ninjutsu
      without the Lightning Release Keyword must make a Constitution saving throw or their jutsu is disrupted and
      failed, as the ambient lightning chakra disrupts their chakra flow.</p><p>Additionally, jutsu with the Lightning
      Release Keyword have their cost reduced by 2, and have their damage die increase by 1 step.
      (d4&gt;d6&gt;d8&gt;d10&gt;d12)</p>
