system:
  description:
    value: >-
      <p>You create an enormous ball of lightning in the sky, that festers and rotates producing a destructive wave of
      thunder that tears the ground asunder. Choose a point within range. The bolts of lightning expand from that point
      in a 60-foot cube and all creatures in the area must make a Dexterity and Constitution saving throw. Creatures who
      fail the Dexterity saving throw take 10d10 Lightning damage and become stunned until the end of their next turn,
      or take half as much damage and no additional effects on a successful save. On a failed Constitution saving throw
      they become dazed and shocked for 1 minute.</p><p></p>
