system:
  description:
    value: >-
      <p>You temporarily transform your body into living lightning bolt. You and your equipment are immune to lightning
      damage. When you would take lightning damage or suffer an effect cause by a jutsu with only the lightning release
      keyword, you instead regain hit points equal to half the amount of damage it would normally deal.</p><p> You gain
      immunity to blindness, deafness, poison, slashing, piercing or bludgeoning damage. You gain vulnerability to earth
      damage from Earth or Earth Release Jutsu. </p><p>Your unarmed melee attacks deal 4d8 Lightning damage. If you
      would cast a Jutsu that would allow you to deal your unarmed damage that is under the effects of this jutsu, you
      only deal this jutsu's damage once, after which you default to your original unarmed damage. </p><p>Due to your
      being made of pure lightning your speed is tripled and you have advantage on all Dexterity Saving throws. Jutsu
      you cast that have the Lightning Release Keyword have their save DC's increase by +1. If you enter an area that
      has strong winds you take 4d6 wind damage each round you remain in the area afflicted by the winds.</p>
