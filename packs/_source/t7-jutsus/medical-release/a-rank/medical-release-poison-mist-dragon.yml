system:
  description:
    value: >-
      <p>You open your mouth unleashing a near endless supply of poisonous gas in the shape of a dragon. The dragon then
      attempts to ram its target. Make a Ranged ninjutsu attack on a creature in range, on a hit the target creature
      takes 14d6 Poison damage.</p><p>Afterwards the smoke dragon dissipates leaving behind a poisonous smoke cloud. All
      creatures including the target creature within 30 feet of the original target location must make a constitution
      saving throw or gain the poisoned condition for 1 minute. This jutsu rolls clash checks at disadvantage when
      clashing against a jutsu with the wind release jutsu.</p>
