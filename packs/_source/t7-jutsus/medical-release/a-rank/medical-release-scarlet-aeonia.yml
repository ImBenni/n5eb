system:
  description:
    value: >-
      <p>You gracefully jump into the air and begin forming scarlet chakra throughout your body, which gradually takes
      the appearence of a budding flower. Select a space within 60 feet. You elegantly move to your desired space,
      moving creatures that would be in your way to the side in a space that can hold them. All creatures within 15 feet
      of you when you land must succeed a Dexterity saving throw or take 2d10 acid and 2d10 poison damage and gain 1
      rank of Corroded and Envenomed.</p><p>Soon after you land, the flower fully blossoms, taking up a 30-foot sphere
      centered on you. All creatures with this radius, other than you, must make a Constitution saving throw, at
      disadvantage if they failed the Dexterity saving throw, taking 2d10 acid and 2d10 poison damage and gaining 2
      ranks of Corroded and Envenomed on a failed save, or half as much damage and no further effects on a
      success.</p><p>Creatures who would start their turn or enter this radius before the start of your next turn must
      make this Constitution saving throw, taking 2d10 acid and 2d10 poison damage and gaining 1 rank of Corroded and
      Envenomed on a failed save.</p>
