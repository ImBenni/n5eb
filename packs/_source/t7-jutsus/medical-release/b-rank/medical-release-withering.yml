folder: G9nxY3q60zNvKlWB
name: Medical Release Withering
type: spell
_id: 7VYKkxgSUxku6459
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You emit a dark aura of decay against creatures within 45 feet of you. For the duration, hostile creatures
      within range of this jutsu who gain the Envenomed condition have the duration of their condition extended until
      this jutsu ends, unless the duration is already higher. The envenomed condition now always deals its maximum
      damage and has its damage type changed to necrotic. You do not need to spend chakra to maintain concentration of
      this jutsu.</p><p>Once per turn, when you affect a hostile creature with a jutsu with the medical keyword that
      deals necrotic damage, the creature must make a Constitution saving throw, becoming poisoned and envenomed on a
      failure. If the medical jutsu used already imposes a saving throw, they gain the envenomed condition upon failing
      the jutsu's innate saving throw instead.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3 and the radius by 5 feet. If cast to A-Rank or higher,
      creatures are unable to remove the envenomed condition with a medical jutsu of a rank less than the rank that this
      jutsu was cast at.</p>
