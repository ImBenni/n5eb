system:
  description:
    value: >-
      <p>You burden yourself with another creature's pain, taking it on yourself. You touch a creature with a balance of
      yin-yang chakra to accept debilitating effects. You take all the negative effects the target is currently
      suffering from, removing them from the target. This includes reductions to ability scores, reductions to hit point
      maximum, curses that do not target the soul, and all conditions. You are cleared of all these effects after 1
      hour, as your body naturally dissipates them.</p>
