system:
  description:
    value: >-
      <p>You conjure a surge of acidic chakra between your hands, before launching it out in front of you. Each creature
      in a 30-foot cone must make a Dexterity saving throw, or take 6d6 acid damage and become corroded on a failed
      save. On a successful save, a creature takes half as much damage and no additional effects.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above <br />C-Rank, increase the cost of this jutsu by 3
      and increase the damage by 1d6.</p>
