system:
  description:
    value: >-
      <p>You excrete a mist of acidic blood from a vial that disorients and confuses opponents. When cast, the
      triggering attack rolls an additional d20, taking the lower result. For the duration, until the beginning of your
      next turn, hostile creatures have disadvantage on melee attacks against you. When a creature hits you with a melee
      attack they must succeed a Constitution saving throw or take 3d6 acid damage and be blinded until the start of
      their next turn.</p>
