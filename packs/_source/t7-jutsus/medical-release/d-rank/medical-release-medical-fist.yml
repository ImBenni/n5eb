name: Medical Release Medical Fist
type: spell
_id: a9zj6TKoUIp0dR5i
img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <p>You coat your hands in medical chakra designed to sap the life force of anyone you touch. Your unarmed damage
      becomes 1d6 and deals Necrotic damage, when you hit someone with an unarmed or melee taijutsu attack you gain
      Temporary Hit Points equal to 1/2 of the damage dealt (Rounded Down).</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above D-Rank increase the cost of the jutsu by 3. If this jutsu is cast at B-Rank
      increase the damage by 1d6. If this jutsu is cast at a A-Rank, you instead gain Temporary Hit Points equal to the
      full amount of damage dealt. If this jutsu is cast at S-Rank increase the damage by 1d6.</p>
