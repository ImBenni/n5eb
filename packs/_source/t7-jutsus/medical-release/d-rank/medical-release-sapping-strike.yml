system:
  description:
    value: >-
      <p>Your hands glow a pinkish hue as you get ready to strike your target. Choose one creature in range and make a
      melee ninjutsu attack, on a hit you deal 3d8 Necrotic damage, and regain hit points equal to half the damage
      dealt.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank increase the cost of
      the jutsu by 3 and increase the damage by 1d8. If you cast this jutsu at A-Rank or higher you instead regain hit
      point equal to the full damage dealt.</p>
