img: systems/n5eb/assets/content/jutsu-icons/medical.webp
system:
  description:
    value: >-
      <div class="page phb" id="p21"><div class="columnWrapper"><p>You stick a finger forward and release a beacon of
      golden medical chakra in front of you. From this stream, a ghostly gargantuan golden tree of medical chakra
      emerges, emitting a great rejuvinating golden aura to allied within range. For the duration, allied creatures
      within 60 feet of this tree recover 2d6+8 hit points and gain half as many temporary hit points at the start of
      each of their turns (the temporary hit points do not stack). They also ignore difficult terrain, and have
      advantage on saving throws against jutsu that would give a <em><strong>Physical</strong></em> or
      <em><strong>Elemental</strong></em> condition. This tree's space can be passed through by any creature. If a
      creature ends its turn in the tree's space, it is pushed outside of it in a space that can hold it.</p></div><div
      class="columnWrapper"><p>Creatures can target this tree in an attempt to destroy it. This tree has an AC equal to
      your Ninjutsu Save DC and 150 hit points, immunity to Acid, Necrotic, Psychic, and Poison damage, and uses the
      casters proficiency bonus for all saving throws. If this tree is destroyed, it releases a final parting gift of
      healing for your allies. Each allied creature within range recovers 50 hit points and gains 50 temporary hit
      points (these temporary hit points stack with other sources of temporary hit points). This jutsu then ends
      early.</p></div></div>
