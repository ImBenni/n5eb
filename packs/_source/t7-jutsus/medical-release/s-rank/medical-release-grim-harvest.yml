system:
  description:
    value: >-
      <p>As a part of casting this jutsu, you must be gaining the benefits of <em><strong>Grim
      Reality</strong></em>.</p><p>You coat the Reaper's blade in a coat of dark chakra. The energy resonates within the
      air, the aura of death being all but tangible. All creatures in a 60-foot cone must make a Constitution saving
      throw at disadvantage or take 20d12 necrotic damage and gain 5 ranks of the weakened and fear conditions.
      Additionally, if a creature fails this saving throw they lose 5 hit die. The destruction left in your wake is
      palpable, and all plant life in the area shrivels and dies. This area becomes permanent difficult terrain and no
      life can grow in that area for the next 100 years.</p><p>Conditions inflicted by this jutsu cannot be ignored in
      any way and cannot be healed or dispelled unless by the means of an S-Rank jutsu. If a creature dies or is reduced
      to 0 hit points by the means of this jutsu their body and soul withers away, not being able to be revived by any
      means.</p>
