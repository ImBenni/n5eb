      harmful techniques. For the duration of this jutsu your ability scores can not be lowered by features, jutsu, or
      poisons. You become immune to <em><strong>Physical</strong></em> conditions other than grappled and restrained for
      the duration.</p><p>Additionally your ability scores cannot be lowered by any means, including permenent effects
