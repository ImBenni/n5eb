system:
  description:
    value: >-
      <p>You draw a picture of a giant crab. Infusing chakra into it as it exits your scroll and stands next to
      you.</p><p>You summon a construct Ink Giant Crab. The construct crab has the following Statistics; You may command
      the Ink Giant Crab as a bonus action on your turn. The Ink Giant Crab may take an appropriate reaction if
      able.</p><p>The Ink Giant Crab uses your Ninjutsu Attack bonus for all of its attacks.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above <br />A-Rank, increase the cost of this jutsu by 3 and
      increase the hit points by 15 (3d8).</p>
