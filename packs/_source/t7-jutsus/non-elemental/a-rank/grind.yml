system:
  description:
    value: >-
      <p>You create a pure ball of chakra and attempt to ride the source of energy directed at you, towards the caster.
      Make a melee ninjutsu attack against the save DC of the jutsu. On a success, you grind on the emitted energy,
      moving to the caster and avoid the jutsu entirely. Once your movement ends you may choose to make an attack roll
      against them, using the initial attack roll of this jutsu, dealing 7d10 force damage on a hit. This movement does
      not provoke an attack of opportunity.</p>
    chat: ''
