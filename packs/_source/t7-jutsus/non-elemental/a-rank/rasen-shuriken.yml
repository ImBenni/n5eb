system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu you must have <strong>Rasengan</strong> on your jutsu known
      list. You take a shuriken in hand and begin collecting chakra within the center of it, forming a sphere of
      spiraling chakra which causes the weapon to vibrate and twirl faster than the eye can see.</p><p>Make a ranged
      ninjutsu attack against a creature within range. On hit, you deal your weapon's damage + 8d8 Force damage and the
      creature must make a Strength saving throw, being knocked back 30 feet and gaining the dazed condition on a failed
      save. This jutsu scores a critical hit on a 19-20. After colliding with the creature, the shuriken returns to your
      hand.</p>
