system:
  description:
    value: >-
      <p>You draw a picture depicting 3 wolves. Infusing chakra into it as they exits your scroll and stand next to
      you.</p><p>You summon 3 construct Ink Wolves. An Ink Wolf has the following Statistics; You may command the Ink
      <br />wolves as a bonus action on your turn. When you command them, all wolves currently active act at the same
      time, and attempt to perform the same actions against either the same creature or different creatures determined
      by you.</p><p>The Ink Wolves use your Ninjutsu Attack bonus for all of its attacks.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the hit
      points of the Ink Wolves by 10 (1d8+5).</p>
