system:
  description:
    value: >-
      <p>You create a Long-Lasting Shadow Clone. Long Lasting Shadow Clones are not created for combative means, instead
      being created to have longevity. Each clone has 1 hit point and 6 temporary chakra, and an AC equal to your
      Ninjutsu Save DC. Summoning a clone costs 10 chakra, and it lasts for 5 days. For each additional 10 chakra you
      spend the clone remains active for 5 more days. Long Lasting Shadow Clones do not require a bonus action to
      command. Once the Clone disperses you learn everything that the clone learned while it was active. While this
      clone is active your maximum chakra is lowered by half the amount of chakra used to cast this jutsu.</p>
    chat: ''
