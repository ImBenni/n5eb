system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal as you mark yourself with the seal of an alpha. Your senses get sharper,
      and you begin to notice things far more quickly than you are used to. You grow fur on your forearms, and long
      claws form at the edge of your fingertips. For this jutsu's duration, you gain the following
      benefits;</p><ul><li>Your Strength score becomes 18 if it is not already higher. If it is 18 or higher already,
      you instead increase your Strength Score by +2.</li><li>Your unarmed damage becomes 2d6 and deals slashing
      damage.</li><li>You gain a +15 bonus to movement speed.</li><li>Attacks of Opportunity you make are at
      advantage.</li></ul>
