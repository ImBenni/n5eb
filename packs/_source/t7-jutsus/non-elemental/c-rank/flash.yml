system:
  description:
    value: >-
      <p>You holds up your palms into a bird sign formation, emitting a dazzling bright light. All creatures other than
      yourself within a 30-foot radius must make a Constitution saving throw. Creatures within 10 feet roll their save
      at disadvantage, creatures more than 20 feet away roll their save at advantage. On a failed save, the creature is
      blinded for 1 minute. They may repeat the save at the end of each of their turns ending the effects on a
      success.</p>
