system:
  description:
    value: >-
      <p>You infuse chakra into a chakra seal and attempt to mark a willing creature with a seal of protection. When a
      marked creature would be the target of, or would be force to make a saving throw or ability check against a jutsu
      with the Fuinjutsu or genjutsu keyword you enact a defensive ward meant to protect, granting the following
      benefits until the beginning of your next turn; This jutsu then ends.</p><ul><li>They gain a bonus to their AC
      equal to the your Ninjutsu ability modifier against jutsu with the Fuinjutsu or Genjutsu keyword.</li><li>When
      they would make a saving throw or ability check vs a jutsu with the Fuinjutsu or genjutsu keyword, they instead
      may use half of your Intelligence (Ninshou) skill bonus.</li></ul><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the number of creatures you can
      target with this jutsu by +1</p>
