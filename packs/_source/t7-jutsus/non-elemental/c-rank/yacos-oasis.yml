system:
  description:
    value: >-
      <p>A variation of the <em><strong>Sensing Technique</strong></em> made to help locate sources of drinkable fluid.
      You make the "Tori" hand sign and briefly shut your eyes as you release a field of chakra in a 1 mile radius.
      Sources of drinkable water or other fluid safe for consimption begin to glow in a faint blue sparkly light that
      only you can see, even through walls. You can also locate sufficient sources of water, which glow in a green
      light. If any fluid sources you detect are chakra enhanced, the colors you see occasionally shift to yellow. If
      any fluid source contains poison or hostile chakra, it occassionaly shifts red.</p><p>This jutsu cannot detect
      creatures, unless the creature is classified as a suffiecient source of water, in which case they glow a bright
      blue color if friendly, or bright red if hostile.</p>
