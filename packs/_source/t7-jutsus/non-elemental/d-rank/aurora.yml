system:
  description:
    value: >-
      <p>You create an array of light encapsulating everything in sight. Each object in a 20-foot cube within range is
      illuminated in blue, green, or violet light (your choice). Any creature in the area when this jutsu is cast must
      make a Dexterity saving throw, becoming illuminated on a failed save. For the duration, objects and affected
      creatures shed dim light in a 10-foot radius.</p><p>Any attack roll against an affected creature or object has
      advantage if the attacker can see it, and the affected creature or object can't benefit from being invisible.</p>
