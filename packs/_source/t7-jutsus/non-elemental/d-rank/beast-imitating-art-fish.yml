folder: mJe8qUVtd5fPfdSO
name: Beast Imitating Art Fish
type: spell
_id: 2vcSUBgNOWQZTN6b
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You take your scroll and begin to write a message of any length that you can conceivably write within a 10
      minute or less time span. Once complete, the writings manifest into the form of a fish of your description and now
      carry themselves. You can also cast this jutsu targeting a message already written of 25 words or less.</p><p>The
      fish you create has 1 hit point and an AC of 15. Specify a location that you have previously visited and a
      recipient who matches a general description. You then let the fish swallow the scroll, tag, or similarly small
      object to deliver to this creature. The construct travels for the duration of the jutsu towards the location,
      covering no more than 50 miles per 24 hours. When the fish arrives, it turns back into the message when provided a
      scroll to be placed on and delivers any packages to the creature you described. The fish will only release the
      object to the creature you specified or if killed. The creature dissipates into non-staining ink when the message
      is delivered or it is killed.</p><p><strong>At Higher Ranks:</strong> : For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3 and duration increases by 24 hours. When casting this jutsu at B-Rank
      or Higher, the fish becomes large in size and is capable of carrying two medium size creatures on its back.</p>
