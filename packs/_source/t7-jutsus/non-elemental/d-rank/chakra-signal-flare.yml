system:
  description:
    value: >-
      <p>After forming the necessary hand signs, you point your hands towards the sky and shoot out a flare of chakra
      that shines bright 120 feet into the sky, able to be seen and heard for 5 miles. If you have a nature release
      affinity you can modify the flare with that element for 1 additional chakra. The chosen element will change the
      color of the flare. If you have more than 1 chakra affinity you can add as many as you have increasing the cost by
      1 chakra for each affinity.</p><img src="systems/n5eb/assets/content/cheat-sheets/t7-flare.webp" />
