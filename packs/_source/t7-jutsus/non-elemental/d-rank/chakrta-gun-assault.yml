system:
  description:
    value: >-
      <p>As part of casting this jutsu, you must have <strong>Chakra Gun: Transformation</strong> active. You cannot
      lose concentration on this jutsu as a result of taking damage. You extend the focus point of your chakra to cover
      your entire arm.</p><p>For the duration of this jutsu, as an Action, you can make a ranged Ninjutsu attack on a
      creature within range. On a hit you deal 1d10 + your Ninjutsu modifier Force damage. If you cast this jutsu and
      then drop Concentration, within the next minute you may recast it as a Bonus Action at half the chakra cost
      (rounded down), using the remaining duration.</p>
