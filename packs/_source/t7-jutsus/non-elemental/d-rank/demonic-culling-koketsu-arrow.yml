system:
  description:
    value: >-
      <p>You conjure nearly invisible arrows made of chakra and manipulate them by pointing your finger in the direction
      they're to go. These arrows interact with by interacting with related vectors forcing any it passes through to
      move in the desired direction.</p><p>Make a ranged ninjutsu attack, dealing 2d8 force damage on a hit. They must
      also make a Strength saving throw on a hit, being forced 15 feet into your desired direction on a failure and not
      moving any feet on a success.</p><p>If they are knocked into a solid surface, they take double falling
      damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank increase the cost
      by 3 and the number of attacks by +1. At A-Rank increase the damage this jutsu does to 3d8.</p>
