system:
  description:
    value: >-
      <p>You hold a thread of twine or scrap of cloth in hand and outstretch your hand to a willing creature you can
      touch. The material you hold begins to glow with a radiant white before soon disapearing as the hand you are
      outstretching towards the creature releases a white light which completely obscures the creature. As the light
      fades, the creature stands in a brand new set of clothing of your design. Clothes you create with this feature, no
      matter how illustrious to the eye, always appear cheaply made when inspected, giving your clothes a value of 1
      Ryo. If another creature attempts to wear clothes created with this jutsu, the clothes immediately disapear.</p>
