    value: >-
      <p>By whipping around locks of your hair, you generate high-frequency sound waves that are capable of
      simultaneously disorienting the foe by overwhelming their hearing e able to slice at the target. Every creature in
      the range of this ninjutsu must make a Constitution saving throw, gaining the Dazed condition, and taking 2d6
      Slashing damage on a failed save. On a success, they only take half the damage and suffer no additional
      effects.</p>
