system:
  description:
    value: >-
      <p>A jutsu which numbs the sporatic nature of the thoughts of the mind to allow one to focus and utilize all of
      their senses. For the duration of this jutsu, your passive perception and passive insight scores cannot be lowered
      by any effects of a rank equal to or lower than the rank of this jutsu.</p><p>Additionally, you gain a +1d4 bonus
      to Investigation, Perception, and Survial checks for the duration and cannot make checks with these skills at
      disadvantage as the result of a hostile effect of a rank equal to or lower than this jutsu.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3. If
      cast to B-Rank or higher, the bonus becomes a 1d6. If cast to S-Rank or higher, the bonus becomes a 1d8.</p>
