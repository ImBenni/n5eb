      creatures in a 25-foot cone originating from you must succeed on a Dexterity saving throw, taking 4d4 Piercing
      damage on a failed save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and increase the damage by 2d4.</p>
