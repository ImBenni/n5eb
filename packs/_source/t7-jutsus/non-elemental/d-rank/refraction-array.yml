system:
  description:
    value: >-
      <p>You rapidly refract light infusing your chakra with the water vapor in
      the air to create a burning scintillating glow in the form of a thin wire.
      Make three ranged ninjutsu attacks against a creature you can see within
      range, on a hit the target takes 1d8 force damage. If you hit with at
      least 3 of these attacks the creature is blinded until the start of their
      next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above D-Rank, increase the cost of this jutsu by 3 and increase
      the number of attacks by +1.</p>
