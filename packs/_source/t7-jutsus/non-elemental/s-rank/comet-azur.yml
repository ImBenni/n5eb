system:
  description:
    value: >-
      <p>You slowly move your hand in a spiral in front you, gathering immense chakra in your palm as your hand travels
      before firing a 120-foot long, 10-foot long line in a sudden burst of crystaline blue energy. You have a +1d4
      bonus to clash checks with this jutsu.</p><p>All creatures within range must make a Dexterity saving throw, taking
      15d10 force damage and halving their movement speed until the end of their next turn on a failed save, or only
      half damage and no further effects on a successful save. Creatures who fail this saving throw by 5 or more become
      Dazed.</p><p>After this jutsu's casting, you can choose to maintain concentration. If you do, your speed is
      permenently reduced to 0 until this jutsu ends. You can only end concentration of this jutsu on your turn.</p><p>A
      creature who enters this jutsu's area while you are concentration on this jutsu, takes 7d10 force damage, while a
      creature who starts their turn in it, takes 4d10 force damage.</p><p>At the start of each of your turns while
      concentrating on this jutsu, if you choose not to end this jutsu, you spend your full turn action again to impose
      another Dexterity saving throw, dealing the same affects as the prior Dexterity saving throw on a success or
      failure respectively.</p><p>Once this jutsu ends, the affected area becomes difficult terrain.</p>
