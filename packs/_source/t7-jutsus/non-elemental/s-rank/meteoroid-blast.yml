folder: Uhs7b3PXq5jffqWd
name: Meteoroid Blast
type: spell
_id: LYJizUyyaMibq1SE
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You begin to form a giant ball of chakra in the sky, with the intent to obliterate any opponents who dare stand
      against you. You cannot reduce the cost of this jutsu by more than half.</p><p>Select a space you can see in
      range, all creatures within a 60-foot radius centered on that space, must make a Dexterity saving throw, taking
      20d10 damage on a failed save, or half as much on a success.</p><p>If you have access to a Nature Release keyword,
      you can infuse this chakra with your elemental release, granting it increased benefits; You can only infuse one
      nature release;</p><ul><li><strong>Earth:</strong> The damage type becomes Earth and target creatures who fail
      their save gain the incapacitated and restrained condition for 1 minute as they are incased in rock, they can make
      a Strength saving throw at the end of each of their turns, breaking free on a success. If they do not succeed this
      saving throw before the minute elapses they become Petrified. Additionally, the area of this jutsu permanently
      counts as difficult terrain.</li><li><strong>Wind:</strong> The damage type becomes Wind and target creatures who
      fail their save gain 10 ranks of the Lacerated condition. Creatures who would fail their saving throw, spreads all
      Elemental conditions currently affecting them around to all creatures, excluding the caster within 60 feet of
      them. Hostile creatures within 60 feet of the failing one gain 1 rank of all elemental conditions currently
      affecting it.</li><li><strong>Fire:</strong> The damage type becomes Fire and target creatures who fail their save
      gain 5 Ranks of the Burned condition, if this jutsu reduces a creature to 0 Hit Points, they cannot be revived as
      their body is burnt to ashes.</li><li><strong>Water:</strong> The damage type becomes Cold and target creatures
      who fail their save gain 5 ranks of the chilled condition. For the next minute creatures who remain in the area,
      or enter the jutsu area, begin to suffocate as the Water stays in the area in a stasis like
      state.</li><li><strong>Lightning:</strong> The damage type becomes Lightning and target creatures who fail their
      save gain 5 ranks of shocked and become paralyzed until the end of your next turn.</li><li><strong>Force:</strong>
      If you do not infuse this jutsu with a nature release keyword it instead deals 20d12 and deals Force
      damage.</li></ul>
