system:
  description:
    value: >-
      <p>As part of the requirements to cast this jutsu, you must know the <em><strong>Shining Stars, Soaring
      Strike</strong></em> jutsu, and must currently be concentrating on <em><strong>Shining Stars, Soaring
      Strike</strong></em>. You channel chakra into your legs and backflip yourself 300 feet into the air. You raise
      both your hands above yourself and begin charging an incredible amount of chakra. Each star you possess from the
      <em><strong>Shining Stars, Soaring Strike</strong></em> jutsu shoots towards the center of your palms like a
      comet, merging together with all other stars forming a prismatic orb of pure energy which perspires an aura of
      radiant chakra. Creatures from below can see a bright light from where you are in the sky from a mile
      away.</p><p>You aim the orb down at a space within 300 feet and hundreds of stars erupt from the orb like meteors,
      targeting the space you select and affecting creatures within a 60-foot radius. For each star you had remaining
      from the <em><strong>Shining Stars, Soaring Strike</strong></em> jutsu, you cast the <em><strong>Hollow
      Stars</strong></em> jutsu at A-Rank, raising the damage die by 1 step. Each star from Hollow Stars affects this
      area, dealing its damage and conditional effects to all creatures within range, in one instance. The affected area
      permanently becomes difficult terrain. You then quickly fall down back to the Earth, using your chakra to prevent
      you from taking fall damage. This jutsu immediately ends your concentration of the <em><strong>Shining Stars,
      Soaring Strike</strong></em> jutsu upon conclusion.</p>
    chat: ''
