system:
  description:
    value: >-
      <p>You conjure a Summoning circle hundreds of feet in the sky above a target you can see within range. You conjure
      3 torii that fall down from the summoning circle slamming down around and on top of the target creature. The
      target creature must make a Strength saving throw. </p><p>On a failed Strength saving throw the target creature
      takes 10d6 bludgeoning damage, gains the restrained and prone conditions, and must make a Constitution saving
      throw. On a failed Constitution saving throw the target creature becomes unable to cast Ninjutsu or Genjutsu for
      the duration of the jutsu. A creature can attempt to end the effects of either save by spending an action to
      reattempt one of the two saving throws.</p>
