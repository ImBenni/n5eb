name: Kagura's Mind Eye
type: spell
img: systems/n5eb/assets/content/jutsu-icons/non-elemental.webp
system:
  description:
    value: >-
      <p>You force open your minds 3rd Eye greatly increasing your perceptive abilities almost 10-fold. This jutsu does
      not cost chakra to maintain concentration.</p><p>When this jutsu is cast, for the duration, you gain access to a
      unique special action called Third Eye Opening. This special action can be gained and used in addition to other
      special actions you gain and use. This special action counts as a Skill-Action and both a Constitution and Wisdom
      based skill.</p><p>Third Eye Opening. As a Bonus action, you open your metaphorical third eye gaining 120ft of
      Chakra sight and Chakra Sensing. While gaining the benefit of these senses as a result of this jutsu, you gain the
      following benefits; You can identify if a creature, object or structure has been affected by a jutsu within the
      last 24 hours, gain advantage on checks made to see if a creature is lying, and can see the echoes of chakra usage
      within the past 24 hours, while also being able to identify creatures and jutsu based on these echo's if you have
      sensed them before. These echoes can be used to help track creatures exclusively by their chakra alone.</p><p>At
      Higher Ranks: For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3. If this jutsu
      is cast at A-Rank, increase the range of Third Eye Opening's special senses to 1-Mile and the duration of this
      jutsu becomes Concentration, up to 10 minutes. If this jutsu is cast at S-Rank, it no longer requires
      concentration</p>
    chat: ''
