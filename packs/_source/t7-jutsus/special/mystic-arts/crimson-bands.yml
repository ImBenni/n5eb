system:
  description:
    value: >-
      <p>You manifest crimson bands of energy that quickly surround your wrist before lunging at a creature within 45
      feet. Make a ranged ninjutsu attack. On hit, the creature becomes restrained and if they spend chakra, you siphon
      half of their expended chakra, gaining it for yourself. At the end of the affected creatures turns and whenever
      they take damage, you can make an Athletics or Acrobatics check contested by your Ninshou check. On a success,
      they break free and this Mystic Art ends.</p><p>If you use a <em><strong>Brave Order</strong></em> to cast this
      Art you have advantage on the attack roll.</p>
