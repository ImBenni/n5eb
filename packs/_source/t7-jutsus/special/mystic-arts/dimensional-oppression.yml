name: Dimensional Oppression
type: spell
_id: 5SUW7ZEGqKucuDnL
img: icons/magic/symbols/runes-triangle-orange-purple.webp
system:
  description:
    value: >-
      <p><em>As a prerequisite to taking this Mystic Art, you must have at least 17 levels in this class.</em> You
      manifest the <strong>Mirror Dimension</strong> during combat to give yourself an edge in battle. Select 1 hostile
      creature you can see within range that is currently marked by your <em><strong>Exploit Weakness</strong></em>
      feature. This creature must make a Charisma saving throw. On a failed save, you and the creature are pulled into
      the mirror dimension.</p><p>While in the mirror dimension, your Mystic Arts deal an additional die of damage and
      have their Save DC increased by 1. Additionally, if any Mystic Arts would receive any extra benefits from you
      using a Brave Order to cast them, you do not need to expend a brave order to gain those benefits.</p><p>Nothing
      that occurs within the mirror dimension has an effect on the real world. As a bonus action, you can change an
      aspect of the mirror dimension to anything you wish. These changes can be small, such as warping the ground to
      provide a creature with cover, breaking the ground to create 30-60 ft of distance between you and an attacker, or
      just changing the landscape entirely. Anything within reason is possible.</p><p>You can dispel the mirror
      dimension as an action on your turn. An affected creature can use their action to repeat the saving throw, ending
      this Mystic Art on a success. This Art ends early if you reach 0 hit points or die. Once this Art ends, all
      creatures return to the last space they were before this Art was cast.</p><p>If you use a <em><strong>Brave
      Order</strong></em> to cast this Art, you can bring one allied creature within 30 feet with you and the hostile
      creature.</p>
    chat: ''
