system:
  description:
    value: >-
      <p><em>As a prerequisite to taking this Mystic Art, you must have at least 13 levels in this class</em>. When you
      first take this Mystic Art, you gain the <strong>Mystic Ring</strong> item.</p><p>You weave a portal to a
      different destination that you have previously marked. Whenever you take a rest of any type at a location, you can
      mark the location's name into a ring known as <strong>Mystic Ring</strong>. This ring has one bulk and when
      equipped, you can create a medium sized portal at a marked location. You can only end concentration on this Art on
      your turn.</p><p>You can mark up to 3 destinations in your <strong>Mystic Ring</strong>, and in the event you lose
      the ring, you can spend 5 weeks of downtime crafting a new one.</p>
