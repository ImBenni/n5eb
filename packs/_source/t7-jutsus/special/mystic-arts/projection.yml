name: Projection
type: spell
_id: HNRX9VFUatPJ4e9Y
img: icons/magic/symbols/runes-triangle-orange-purple.webp
system:
  description:
    value: >-
      <p><em>As a prerequisite to taking this Mystic Art, you must have at least 9 levels in this
      class</em>.</p><p>Using the power of this Mystic Art, you learn how to separate the soul from the body, displacing
      it into the Astral plane. This Art behaves differently if used on yourself (Range of Self) or on another creature
      (Range of Touch).</p><ul><li><p><strong>Self:</strong> As a full turn action, you separate your soul from your
      body to gather insight into the surrounding environment, similar to the hijutsu of the Yamanaka clan. For 1
      minute, you leave your body, rendering it unconscious. You enter a spirit form, with a flying speed equal to
      double your movement speed. Your spirit form cannot be targeted or be forced to make saving throws against hostile
      effects, however, you cannot take actions yourself. While in this state, you can phase through walls up to 15-feet
      thick, and gain Blindsight, Darkvision, and Chakra sight equal to your visual range. <br /> Creatures who do not
      possess chakra sight from a jutsu of B-Rank or higher, or True Sight, cannot detect you unless you intentionally
      reveal yourself to them. You can choose to return to your body when you are within 5 feet of it. After 1 minute
      has passed, for each round you do not return to your body, you lose 1d10 hit points. If your physical body takes
      damage, you must make a Concentration check as if you were concentrating on an A-Rank jutsu to maintain this Art's
      effects. On a failed check, you immediately return to your body with 2 ranks of the Weakened condition for 1 hour.
      You can choose to willingly fail this concentration check.</p></li><li><p><strong>Touch:</strong> As an action,
      make an unarmed attack using Intelligence for your attack roll. On a hit, the creature must make a Wisdom saving
      throw. On a failed save, their soul is pushed out of their body in a space 15 feet away. For 1 minute, their
      physical body is treated as unconscious and their soul floats in place. The creature's soul cannot be targeted or
      be forced to make any saving throws. You are the only one that can see and hear the creature's soul. <br />  On
      the creature's turn, they can move up to half their movement speed. If the creature would end its turn within 5
      feet of their body, they can repeat their saving throw, returning to their body on a success. If the creature's
      body is moved further than 90 feet away from their soul or their body takes damage, this Art immediately ends,
      returning their soul to their body and granting them an immediate reaction, which they can use to move. A creature
      who returns to their body becomes immune to this Art until they complete a short rest. <br />  If you use a
      <em><strong>Brave Order</strong></em> to cast this Art, you can be in your spirit form for 2 minutes before taking
      damage, or you impose disadvantage on the Wisdom saving throw.</p></li></ul>
