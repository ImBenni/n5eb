system:
  description:
    value: >-
      <p><em>As a prerequisite to taking this Mystic Art, you must have at least 6 levels in this class.</em></p><p>On
      your turn you can transpose a substance into some other substance of the same type, within range. For instance,
      you can change a shirt into another shirt with a different design, or change a mug of root beer into a jug of
      beer. Changing menial items such as these only costs 5 chakra.</p><p>If you use this Art on an item that would
      provide mechanical benefits, such as a Blood/Chakra Pill or Bomb of any type, you expend an amount of chakra equal
      to 1/10th of the Ryo cost of the item, changing its appearance and increasing the total dice rolled by half your
      Intelligence Modifier, or increasing the final rolled result by your full Intelligence Modifier, whichever is
      applicable.</p><p>Substances with mechanical benefits you transpose must be used/equipped within 1 minute or else
      they revert to normal. You can use this Mystic Art to transmutate substances that would provide mechanical
      benefits as listed a number of times equal to your proficiency bonus per long rest.</p>
