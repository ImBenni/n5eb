system:
  description:
    value: >-
      <p>You send your fist into the ground sending a controlled shockwave ahead of you. Creatures in a 45-footcone in
      front of you must succeed a Dexterity saving throw as the surface is destroyed and pieces of the ground shoot out
      in random directions. On a failed save you deal your 10d10 bludgeoning Damage on a failed save or half as much on
      a successful one. The affected area is counted as difficult terrain and creatures that are greater than 10 feet
      from each other are heavily obscured from one another.</p>
