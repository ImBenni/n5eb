system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Death Fist
      Stance</strong></em>.</p><p>You ready your fists with an explosive amount of chakra, and either on the ground or
      air punch your fists into the space between you and your opponent. Make three ranged taijutsu attacks, dealing
      your unarmed damage + 3d6 force damage. This jutsu cannot crit. On a hit the target is forced to make a Strength
      saving throw, being pushed back 5 feet and reducing their AC by -1 until the start of their next turn on a failure
      and nothing on a success.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu
      <em><strong>Finisher</strong></em> regardless of range, once per turn, using either an Action or Bonus action,
      ignoring its listed casting time.</p>
