system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the Death Fist Stance.</p><p>You load chakra
      into your fists and launch an unrelenting barrage of explosive punches against whatever attack is heading your
      way, destroying it before it can reach you. When an opponent targets you with an attack, up to a number of times
      equal to half your proficiency modifier, reduce the incoming attack rolls by half your Taijutsu ability modifier
      (rounded up).</p><p>If you are instead targeted by a Strength or Dexterity saving throw, you may, up to a number
      of times equal to half your Taijutsu ability modifier, add your Taijutsu attack modifier in place of your normal
      saving throw modifier.</p>
