name: Ripple of Earth Gravity Suplex
type: spell
_id: nd1N4p4PyyWsrZhA
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You make a series of melee attacks against a target, kicking up dirt, sand, and other debris into the air
      around the two you as you move. Using your control of earth release, you mold the remnants of the ground into
      weights that you place on the target with each successful strike.</p><p>Make 3 melee taijutsu attacks, dealing
      your unarmed damage + 2d10 earth damage on each hit. On your first successful attack, the creature must make a
      Strength saving throw. On a failed save, you place a small but heavy mound of earth on their body, making the
      creature Weakened until the start of their next turn.</p><p>On a second successful attack, the creature must make
      another Strength saving throw, at disadvantage if they failed their first Strength save. On a failed save, you
      place another mound of earth causing the creature to become Slowed until the start of their next turn from the
      immense weight.</p><p>On a third successful attack, you grab the creature by the waist and Supplex them into the
      ground, imbedding them into the ground as a large crack forms. The creature must make a Strength saving throw, at
      disadvantage if they failed one Strength saving throw from this jutsu, or automatically failing if they failed
      two. On a failed save, the creature becomes incapacitated until the end of their next turn, and all conditions
      gained from this jutsu last for the duration that they are incapacitated.</p>
    chat: ''
