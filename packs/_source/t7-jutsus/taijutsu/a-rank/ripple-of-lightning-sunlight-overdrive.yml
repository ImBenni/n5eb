system:
  description:
    value: >-
      <p>You may only cast this jutsu as a <em><strong>Finisher</strong></em>. You coat your entire body in glorious
      sparks of lightning, shining so bright they turn yellow as your rear your arms back and unleash a flurry of blows
      in an overdrive of speed!</p><p>Make four taijutsu attacks each dealing your unarmed damage + 3d8 Lightning
      damage. If you land at least two attacks the affected creature is knocked back 60ft, if they would crash into a
      surface you may make one final taijutsu attack against them, dealing your unarmed damage + 3d10 Lightning
      damage.</p><p>If you were to score a critical hit with this jutsu you roll an additional die for each crit instead
      of doubling your dice.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br
      />A-Rank, increase the cost of this jutsu by 3 and make an additional attack for both the original attack flurry
      and if they get knocked back.</p>
