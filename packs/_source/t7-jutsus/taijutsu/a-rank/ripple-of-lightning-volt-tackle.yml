system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of lightning release chakra throughout your entire
      body.</p><p>You take a prowling stance and begin charging wrathful jolts of energy around your entirebody of
      golden lightning. Select a creature you could reach within your full movement. You dash towards the creature
      within range in a zig-zag line with incredible speed. Make a melee taijutsu attack. On a hit the creature takes
      your unarmed damage + 11d6 lightning damage and must succeed a Constitution saving throw. On a failed save, the
      creature becomes Dazed and gains 2 ranks of shocked. This attack scores a critical hit on a 19-20.</p><p>As part
      of casting this jutsu, you can sacrifice increments of 5 hit points to increase this jutsu's critical threat range
      by +1 and the damage die by 1 step. You can do this up to 3 times.</p>
