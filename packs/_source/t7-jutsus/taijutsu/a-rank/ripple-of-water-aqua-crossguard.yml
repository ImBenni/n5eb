system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of water release chakra throughout your entire body.
      Before you or an allied creature within 30-feet would be subject to an enemy's assault, you quickly gather a
      massive amount of water release chakra and jump in front of the allied creature to impose the attack.</p><p>You
      take a cross guard stance, expelling a water barrier in two 15-foot lines at your sides. You and each creature
      within 10 feet of you or these lines gains double your unarmed damage + 50 temporary hit points until the end of
      the turn.</p><p>Each allied creature, other than yourself, gaining the benefits of this jutsu is also considered
      behind three-fourths cover until the end of the turn, and the bonus from this cover applies to Strength and
      Constitution saving throws as well.</p>
    chat: ''
