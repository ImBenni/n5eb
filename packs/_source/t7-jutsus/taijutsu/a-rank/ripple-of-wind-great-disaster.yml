system:
  description:
    value: >-
      <p><em><strong>(This jutsu cannot score a critical hit)</strong></em> <br />You inhale and take a charging stance,
      manifesting ripples of wind release chakra throughout your entire body. You take in a large breath of air and slam
      your leg against the ground with incredible force. Several cracks form all throughout a 30-foot radius and from
      those cracks wind release chakra floods through. Each creature within range must make a Dexterity saving throw,
      being thrown up 60 feet and becoming suspended in midair, restraining them, as the wind chakra pools into a sphere
      of gale energy.</p><p>You then exhale, creating cloud-like boots at your feet from wind release chakra and begin
      teleporting to each creature suspended in the air and attack. Make one melee Taijutsu attack against each creature
      within the sphere. dealing your unarmed damage + 11d4 wind damage and knocking the target 30 feet away in a
      direction opposite to your attack on a hit, causing them to fall if they go outside of the sphere.</p><p>You then
      return back to your original position and the cloud disperses, releasing all creatures and causing them to
      fall.</p>
