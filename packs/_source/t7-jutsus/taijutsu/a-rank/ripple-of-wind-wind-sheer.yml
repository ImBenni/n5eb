name: Ripple of Wind Wind Sheer
type: spell
_id: 5xyOmkqMiBbADdzd
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of wind release chakra throughout your entire body.
      You grab a creature, using wind chakra together with your grip strength to tear your target apart. Make a Strength
      (Athletics) check against your target's AC. On a successful check, the target must make a Strength saving throw.
      If you already have the target grappled, they make this save at disadvantage.</p><p>On a failed save, the target
      takes your unarmed damage + 5d10 wind damage, and gain 3 ranks of the bleeding condition.</p><p>If cast as a
      <em><strong>Finisher</strong></em>, the target takes your unarmed damage + 7d10 wind damage and the target gains 2
      ranks of lacerated and weakened until the end of their next turn, as you tear apart their body.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3, the
      damage by 1d8 and the ranks of bleeding or lacerated by +1.</p>
