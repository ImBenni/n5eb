system:
  description:
    value: >-
      <p>This jutsu can only be cast as a Taijutsu <em><strong>Finisher</strong></em>. You rush forward in a flurry of
      attacks devasting your foe, before unleashing an explosion that tears the world asunder. Make 3 melee taijutsu
      attacks each dealing your unarmed damage. Each attack knocks them back 10 feet as the force of your blows are
      staggering.</p><p>Then make a ranged taijutsu attack as you throw a ball of pure chakra at your enemy, dealing
      10d10 force damage and forcing them to make a Constitution saving throw or gain 1 rank of weakened for 1 minute.
      For every successful melee attack that hit the target creature they take a -1 penalty to their saving throw.</p>
