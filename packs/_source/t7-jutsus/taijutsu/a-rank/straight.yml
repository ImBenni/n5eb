system:
  description:
    value: >-
      <p>You plant your feet twist your body and punch with all your might in perfect form. Make a melee taijutsu attack
      against a target. On a hit you deal your unarmed damage + 8d10 and the force of the impact sends a shockwave that
      affects all creatures in a 15-foot wide, 60-foot-long line behind your initial target creature. All creatures
      behind the target creature must make a Dexterity saving throw taking 6d8 bludgeoning damage on a failed save or
      half as much on a successful one.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      <br />A-Rank, increase the cost of this jutsu by 3 and damage by 1d10 and 1d8 respectively.</p><p></p>
