system:
  description:
    value: >-
      <p>You form a spiraling drill of chakra on one of your arms, jumping forward and attempting to slam it directly
      into their chest.</p><p>Make a Melee Taijutsu attack, dealing your unarmed damage + 5d8 piercing damage. The
      target must then make a Constitution saving throw, being knocked Prone and gaining 3 ranks of Bleeding on a failed
      save.</p><p>If this jutsu is used as a <em><strong>Finisher</strong></em>, you instead deal your unarmed damage +
      8d8. The target must then make a Constitution saving throw, being knocked Prone and gaining 1 rank of Lacerated
      and Weakened.</p>
