system:
  description:
    value: >-
      <p>This jutsu can only be cast as a <em><strong>Finisher</strong></em>. You slam your fist into the ground
      creating a giant shockwave. Each creature in range must make a Dexterity saving throw, taking your unarmed damage
      + 8d8 on a failure, or half as much on a success. If a creature is prone, they have disadvantage on saving throw.
      After the conclusion of this jutsu, the area is counted as difficult terrain.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above B-Rank increase the cost of the jutsu by 3 and increase
      the damage by 2d8.</p>
