system:
  description:
    value: >-
      <p>In reaction to being knocked prone, you twist your body in mid-air, spinning and creating a huge amount of
      force. If a creature is within range, you can drive your elbow into them. Make a melee taijutsu attack, dealing
      your unarmed damage + 6d4 bludgeoning damage. The creature must then succeed on a Strength saving throw or be
      knocked prone and stunned until the start of their next turn.</p><p>If this jutsu is used as a
      <em><strong>Finisher</strong></em>, you instead deal your unarmed damage + 8d8 bludgeoning damage and the target
      must then succeed on a Constitution saving throw or be knocked prone and paralyzed until the start of their next
      turn.</p><p>Regardless of if you hit or miss with your attack, you land on your feet, avoiding the prone
      condition.</p>
