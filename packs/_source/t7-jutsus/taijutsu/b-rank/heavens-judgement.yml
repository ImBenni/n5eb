folder: Q6TSaKW4d0FkfN6g
name: Heaven's Judgement
type: spell
_id: X78t7pmNHptlGW9h
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>This jutsu can only be used as a <em><strong>Finisher</strong></em>, on a creature who is currently airborne or
      falling.</p><p>You lock eyes with a creature who is in the air that you could reach with your movement speed if
      they were on the ground. You give them a menacing glare and in a flash, you zip up to right above the creature, so
      fast that an afterimage of yourself can be seen where you last stood. Make a melee taijutsu attack at
      advantage.</p><p>On hit, you slam the creature down to the earth with incredible force, dealing your unarmed
      damage + 6d10. As the creature collides with the earth, they take the fall damage they would've taken as normal,
      and a small shockwave forms from where they hit the ground, carrying debris and smoke. The radius of this
      shockwave depends on how high the creature fell from, detailed below. Creatures within the range of this shockwave
      must make a Strength saving throw, becoming blinded and falling prone on a failed save.</p><ul><li><strong>10-30ft
      in the air:</strong> 10-foot radius shockwave</li><li><strong>31-60ft in the air:</strong> 15-foot radius
      shockwave</li><li><strong>61-90ft in the air:</strong> 20-foot radius shockwave</li><li><strong>91ft+ in the
      air:</strong> 25-foot radius shockwave</li></ul><p>You then land back down to the ground gracefully, taking no
      fall damage.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3 and the damage by 1d10.</p>
