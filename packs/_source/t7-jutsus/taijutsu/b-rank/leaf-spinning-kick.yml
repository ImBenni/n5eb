system:
  description:
    value: >-
      <p>You jump forward, doing an innumerable number of flips before crashing down onto your opponent's head with your
      momentum. Make a taijutsu attack dealing your unarmed damage + 4d10 on a hit. The target creature must also
      succeed on a Constitution saving throw, being stunned until the end of their next turn on a failed
      save.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu
      <em><strong>Finisher</strong></em> regardless of range, once per turn, using either an Action or Bonus action,
      ignoring its listed casting time.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      B-Rank, increase the cost of this jutsu by 3 and the damage by 1d8.</p>
