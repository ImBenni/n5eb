system:
  description:
    value: >-
      <p>You grab a medium or smaller object and throw it at a target creature within range. Make a single ranged
      Taijutsu attack against a target creature within range. On a hit, the you deal 8d6 bludgeoning damage and the
      target makes a constitution saving throw. On a failed save they again the dazed condition until the end of their
      next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the
      cost of this jutsu by 3, the range by 15 ft, and the amount of damage by 1d6. If this jutsu is cast to S-Rank or
      higher, you may grab and throw a large or smaller object. Additionally, if you throw a large object the damage die
      size is increased by 1.</p><p></p>
