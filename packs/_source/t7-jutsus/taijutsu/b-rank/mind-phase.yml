_id: WPQ7fyOChN6OWnwU
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>The very microsecond you feel your chakra network under attack from a Genjutsu, your muscles instinctually work
      to avoid losing full control and launch a counterattack. Make a Martial Arts check contested by the creature's
      Illusions skill. If the triggering Genjutsu is above B-Rank, you make your skill check with a -1d4
      penalty.</p><p>If you succeed this check, you gain a +5 bonus to AC and saving throws to resist Genjutsu attacks
      and saving throws only until the start of your next turn. Additionally, the next unarmed or Taijutsu attack made
      against the creature before the end of your next turn gains a +1d6 to its attack and damage roll.</p><p>If you
      fail this check, genjutsu attacks made against you have advantage and you have disadvantage on saving throws
      against Genjutsu. These effects last until the start of your next turn.</p>
