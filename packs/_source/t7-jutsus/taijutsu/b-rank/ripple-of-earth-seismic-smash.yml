name: Ripple of Earth Seismic Smash
type: spell
_id: UBVcgAxJZT8edaBu
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of earth release chakra throughout your entire body.
      You build up a seismic amount of Earth Release chakra within your arms and strike the ground with two open palms,
      causing several fractures to form throughout a 30-foot radius originating from yourself.</p><p>All creatures
      within this radius, other than you, are treated as being within difficult terrain for the duration. Soon after the
      fractures form, large rocks burst out from the cracks. Each creature within range, other than you, must make a
      Dexterity saving throw. On a failed save, the creature takes your unarmed damage + 7d6 earth damage and becomes
      Bruised. On a success, the creature takes half damage and no effects.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast above B-Rank, increase the cost of this jutsu by 3. If cast to S-Rank, the rocks you create
      from this jutsu fall back down after they shoot up from the ground. At the start of each affected creature's turn,
      they must make a 2nd Dexterity saving throw, at disadvantage if they failed the prior save. On a failed save, the
      creature suffers the same effects as a failure as the previous saving throw and is knocked prone.</p>
