folder: Q6TSaKW4d0FkfN6g
name: Ripple of Earth
type: spell
_id: KD234Q5VagPezIvS
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of earth release chakra throughout your entire body.
      You slam your fist on the ground as you crack the floor beneath someone, trying to make them fall as you
      strike.</p><p>All creatures within a 30ft long, 10ft wide line must make a Dexterity saving throw, if they fail
      they cannot gain the benefits of a reaction for this jutsu. Regardless of a success or fail, make a ranged
      taijutsu attack roll against the AC of all creatures within range, dealing your unarmed damage + 5d6 earth damage
      on a hit. If you score a critical hit with this attack, instead of doubling the damage dice, all creatures hit by
      this jutsu gain 1 rank of Bruised.</p><p>If this jutsu is cast as a <em><strong>Finisher</strong></em> creatures
      must make their Dexterity save at disadvantage and instead take your unarmed damage + 5d8 earth damage.
      Additionally, when this jutsu is used as a <em><strong>Finisher</strong></em>, if there are any non-sentient
      earthen constructs within 20 feet of the fissure, the creator of said construct may sacrifice up to 20 hit points
      to increase one damage instance on an affected creature by an amount equal to hit points sacrificed. They may
      sacrifice up to 20 hit points per creature that is damaged to increase the damage dealt this way, but the bonus to
      damage cannot exceed 20 even if multiple different constructs are used.</p>
