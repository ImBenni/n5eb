system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of fire release chakra throughout your entire body.
      You perform a powerful strike with your knee meant to send opponents flying. Make a melee taijutsu attack against
      the creature dealing unarmed damage + 4d10 bludgeoning damage and knocking them back 15 feet on a hit.</p><p>If
      this jutsu is used as a <em><strong>Finisher,</strong></em> you instead make a melee taijutsu attack against the
      target, dealing your unarmed damage + 6d12 and knocking them back 60 feet on a hit. This attack has a +1 bonus to
      its critical threat range.</p>
