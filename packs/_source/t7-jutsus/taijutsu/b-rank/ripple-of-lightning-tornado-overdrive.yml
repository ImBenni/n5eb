system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of lightning release chakra throughout your entire
      body.</p><p>You jump into the sky and coat your legs in lightning chakra as you spin like a tornado, slamming down
      on a creature. Make a melee taijutsu attack, dealing your unarmed damage + 3d10 lightning damage.</p><p>If this
      jutsu is cast as a <strong>Finisher</strong>, change the damage to your unarmed damage + 5d10, and the creature
      must succeed on a Constitution saving throw or gain a rank of <strong>Shocked</strong>.</p><p>Regardless of
      whether this jutsu is cast normally or as a Finisher, you gain a +1 to your attack rolls for each rank of
      <strong>Shocked</strong> the target has.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3, and increase the damage by 2d10 and 2d12, respectively.</p>
