system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of water release chakra throughout your entire
      body.</p><p>In response to a creature striking you with a melee attack, make a Martial Arts check vs. the attack
      roll of the triggering creature. On a success, you avoid the attack in its entirety, vanishing into a pool of
      water and moving to a space within 15 feet and making a melee taijutsu attack against a creature within your
      unarmed range. If the target is the triggering creature, make your attack roll at advantage. On a hit, you deal
      your unarmed damage + 3d8 cold damage and knocking the creature back 15 feet on hit.</p>
