system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of wind release chakra throughout your entire
      body.</p><p>You gather wind chakra behind you, blasting yourself forward at tremendous speed. You move in a
      straight line directly towards a creature you can see within range and make a melee taijutsu attack against them.
      On a hit, you deal your unarmed damage + 4d8 wind damage and the target is knocked back 30 feet.</p><p>If this
      jutsu is cast as a <em><strong>Finisher</strong></em>, you instead deal your unarmed damage + 6d8 wind damage and
      the target is knocked back 30 feet and is Dazed.</p><p><strong>At Higher Ranks:</strong> For each rank you cast
      this jutsu above B-Rank, increase the cost of this jutsu by 3, the damage by 1d8, and the distance you can move by
      15 feet.</p>
