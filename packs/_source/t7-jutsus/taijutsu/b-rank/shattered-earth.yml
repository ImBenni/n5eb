system:
  description:
    value: >-
      <p>You hit the ground and create a shockwave that destroys and shatters all around. All creatures within 10 feet
      of you, other than you must make a Strength saving throw or take your unarmed damage + 8d4 bludgeoning damage and
      be knocked prone and weakened, on a failed save. On a successful save, a creature takes half as much damage and no
      additional effects. This area remains as difficult terrain.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the damage by 2d4.</p>
