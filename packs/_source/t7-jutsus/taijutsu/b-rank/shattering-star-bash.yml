system:
  description:
    value: >-
      <p>You deliver 4 quick strikes, disrupting your opponents guard, leaving them open for more devastating attacks.
      Make 4 melee taijutsu attacks each dealing your unarmed damage. These attacks do not add your ability modifier and
      cannot score a critical hit. For every 2 successful attacks their lowers their AC by -1 until the start of your
      next turn. If all 4 attacks hit the creature, the creature is staggered until the end of the current
      turn.</p><p>Until the end of your turn, you can target one affected creature with a Taijutsu
      <em><strong>Finisher</strong></em> regardless of range, once per turn, using either an Action or Bonus action,
      ignoring its listed casting time.</p>
