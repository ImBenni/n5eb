system:
  description:
    value: >-
      <p>You throw your fist forwards attempting to strike your opponent with a mighty blow. Make a melee Taijutsu
      attack, on a hit you deal your unarmed damage + 4d8 and the target makes a constitution saving throw. On a failed
      save they are knocked back 30ft. This jutsu then ends. If a creature knocked back by this jutsu collides with a
      solid object, their movement is stopped, taking falling damage as if they had fallen an equal distance.</p><p>If
      this jutsu is used as a <em><strong>Finisher</strong></em>, the creature gains the dazed condition until the end
      of their next turn ,the knock back is increased by 30 ft, and the initial damage die size is increased to
      d10s.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank increase the cost of
      the jutsu by 3, increase the damage by 1d8, and the knock back by 10ft.</p>
