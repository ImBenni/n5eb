system:
  description:
    value: >-
      <p>You see a creature weaving hand signs and attempt to stop them by disrupting their hands. Make a melee taijutsu
      attack contested by the creature's Intelligence (Ninshou) check if Ninjutsu, or Wisdom (Illusions) check if
      Genjutsu. roll. If your roll is higher than your opponent's the jutsu fails and you may make an unarmed attack
      against the creature dealing your unarmed damage and using the same attack roll you used to disrupt this jutsu. If
      the hostile creature rolls higher, their jutsu proceeds as normal.</p>
