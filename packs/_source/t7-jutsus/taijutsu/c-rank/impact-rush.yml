system:
  description:
    value: >-
      <p>You rush forward at a target, propelling yourself with chakra from your feet, attempting to slam into them.
      Move up to 30 feet into an adjacent space next to the target creature and make a Melee Taijutsu attack against it,
      dealing your unarmed damage + 6d4 damage. A creature hit by this jutsu must make a Strength saving throw, being
      knocked into the air 30 feet and gaining a rank of Concussed on a failure.</p><p>Until the end of your turn, you
      can target one affected creature with a Taijutsu <em><strong>Finisher</strong></em> regardless of range, once per
      turn, using either an Action or Bonus Action, ignoring its listed casting time</p>
