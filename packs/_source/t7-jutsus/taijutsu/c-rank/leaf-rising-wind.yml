system:
  description:
    value: >-
      <p>This technique uses the entire body as a spring, by amassing power through taking a posture where the back of
      the body falls down. With this powerful taijutsu, the user kicks just above the head. Because the power of the
      kick from the ground is instantly converted into a blow, the enemy hit with this attack will be launched high into
      the sky.</p><p>Make a melee Taijutsu attack, on a hit the target takes 4d10 bludgeoning damage, and is launched
      into the air 15 feet.</p><p>If this jutsu is cast as a <em><strong>Finisher</strong></em>, you instead deal your
      unarmed damage + 5d10 bludgeoning and knock the creature 30 feet into the air.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the damage
      by 1d10, and the knockback by 10 feet.</p>
