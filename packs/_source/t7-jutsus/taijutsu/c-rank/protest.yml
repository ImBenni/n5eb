system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Ryukyu Fist
      Stance</strong></em>. When this jutsu is cast, and once on each of your turns, you can as a bonus action make a 2
      melee taijutsu attacks against a creature within range, dealing your unarmed damage on each hit, but do not add
      your ability modifier to the damage dealt. These attacks score a critical hit on a 19-20.</p><p>If you score a
      critical hit with these attacks you can activate the critical hit based effects of the <em><strong>Ryukyu Fist
      Stance</strong></em>, without expending your use limit of these effects.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3. If cast to B-Rank or higher,
      increase the bonus to critical threat range by +1. If cast to A-Rank or higher, increase the number of attacks by
      +1. If cast to S-Rank or higher, you may now add your ability modifier to the damage dealt.</p>
