system:
  description:
    value: >-
      <p>You flood your body with intense chakra, doubling your heart rate and speed for a moment, giving you a
      momentary red aura that radiates like fire around your body. Move to a space within your movement speed. This
      jutsu allows you to move within the air as if you were flying, ignoring difficult terrain and hostile speed
      reducing effects.</p><p>If there is a creature within your path, you make one melee taijutsu attack against them,
      dealing your unarmed damage and knocking them back 40 feet. If you score a critical hit with this attack, double
      the knockback. If you a hit a creature this way, your movement stops and this jutsu ends early.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the
      distance you can move by 30 feet, and the knockback by 15 feet.</p>
