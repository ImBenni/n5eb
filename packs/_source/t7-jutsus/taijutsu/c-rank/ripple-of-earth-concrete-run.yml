system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of earth release chakra throughout your entire
      body.</p><p>You flood earth chakra through your feet to turn the ground below you into a partially solid liquid
      akin to semi-hardened concrete. You begin to glide along this substance, moving to a space within reach of your
      movement speed, ignoring land based difficult terrain. Make a melee taijutsu attack against each creature you pass
      by, dealing your unarmed damage on hit and imposing a Constitution saving throw, where failure causes the creature
      to gain 1 rank of Bruised.</p><p>Some of the transformed earth sticks to your body as you move, granting you the
      benefits of the jutsu <em><strong>Earth Release: Bedrock Skin</strong></em> cast at D-Rank until the start of your
      next turn.</p>
