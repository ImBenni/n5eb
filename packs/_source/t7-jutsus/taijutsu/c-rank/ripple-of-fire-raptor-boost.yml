system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of fire release chakra throughout your entire body.
      You boost yourself towards your target being aided by your flames before executing a powerful uppercut. Make a
      melee taijutsu attack against the creature dealing unarmed damage + 4d6 fire damage on a hit and knocking them up
      10 feet. A creature hit by this jutsu make a Constitution saving throw, gaining the burned <br />condition on a
      failed save.</p><p>Regardless if you hit or miss, you end your movement within 5 feet of the original target.</p>
