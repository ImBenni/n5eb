system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of lightning release chakra throughout your entire
      body. You charge your hand in Lightning release chakra and then chop at an enemy disorienting them.</p><p>Make a
      melee taijutsu attack dealing your unarmed damage + 2d12 Lightning damage, a creature you affect with this jutsu
      must make a constitution saving throw or else become unable to react until the start of your next turn</p><p>Until
      the end of your turn, you can target one affected creature with a Taijutsu Finisher regardless of range, once per
      turn, using either an Action or Bonus action, ignoring its listed casting time.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above <br />C-Rank, increase the cost of this jutsu by 3 and
      increase the damage by 1d12.</p>
