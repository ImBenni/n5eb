system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of lightning release chakra throughout your entire
      body. You coat your arm in a spread lightning pattern, meant to evade obstacles and hit the target, almost as if
      it had a mind of its own.</p><p>Make a melee taijutsu attack dealing your unarmed damage + 3d6 Lightning damage,
      if you were to target a creature that is behind a wall at any point of this jutsu casting your may ignore any
      cover benefits it may give and treat it as if it wasn't there in the first place.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase
      the damage by 2d6.</p>
