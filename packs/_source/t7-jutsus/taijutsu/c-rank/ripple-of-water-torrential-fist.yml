system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of water release chakra throughout your entire body.
      You generate a water chakra within your palm and close your fist, causing it to shake due to the building pressure
      of the water. Make a melee taijutsu attack against a target within range. On a hit you deal your unarmed damage +
      4d6.</p><p>Upon hitting the creature, you upon your palm, releasing a torrent of water in a 20-foot cone
      originating from the creature. The target, and all creatures within range must make a Dexterity saving throw,
      taking 2d10 cold damage, being knocked back to the edge of the line, and gaining 1 rank of Chilled on a failed
      save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3 and the damage by 1d6 and 1d10 respectively. If cast to A-Rank or higher, creatures take half
      damage on a successful save.</p>
