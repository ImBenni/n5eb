system:
  description:
    value: >-
      <p>A daring jutsu to prevent a creature from escaping demise at the cost of your own safety. You teleport to a
      space within 5 feet of the creature that can hold you and make a melee taijutsu attack against them. On a hit, you
      deal your unarmed damage and the creature must make a Constitution saving throw, their reaction failing on a
      failed save. If you score a critical hit with this attack, the creature makes their saving throw at
      disadvantage.</p><p>You then move yourself out of harms way of your ally's jutsu, up to moving a maximum distance
      away of 30 feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3, and the range of this jutsu by 10 feet. If cast to B-Rank or higher, your attack
      scores a critical hit on a 19-20. If cast to S-Rank or higher, your attack scores a critical hit on a
      18-20.</p><p></p>
    chat: ''
