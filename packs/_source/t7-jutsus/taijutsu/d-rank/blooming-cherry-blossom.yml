system:
  description:
    value: >-
      <p>You rush towards a target before unleashing a volley of attacks. Make
      two taijutsu attacks on a creature within range. On a hit you deal your
      unarmed damage + 1d6. If you hit with two or more of these attacks the
      target is knocked prone.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above D-Rank increase the cost of the jutsu by 3
      and increase the damage by 1d6. If this jutsu is cast at B- Rank of higher
      increase the number of attacks by +1.</p>
