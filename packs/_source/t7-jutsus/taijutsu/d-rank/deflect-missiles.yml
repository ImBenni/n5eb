system:
  description:
    value: >-
      <p>When you would be damaged by a ranged weapon attack, you attempt to catch and deflect the attack back at the
      attacker with grace. Reduce the damage dealt to you by your unarmed damage die + 2d8. If you reduce the damage to
      0, you can choose to deflect the ranged attack back at the target if they are within 60 feet of you. You make the
      attack as a ranged taijutsu attack, regardless of the attack's properties.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the damage reduction by
      1d8+3. If cast to B-Rank or higher, this jutsu can be used on any type ranged attack from a weapon.</p>
