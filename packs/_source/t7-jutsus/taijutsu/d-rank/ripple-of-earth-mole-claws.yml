system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of earth release chakra throughout your entire
      body.</p><p>You form earth chakra over your hands in the shape of claws as you slash at an enemy, trying to break
      them. Make a melee taijutsu attack, dealing your unarmed damage + 2d8 Earth damage. The affected creature must
      succeed a Constitution saving throw or gain a rank of Bruised.</p><p>If there are any non-sentient earthen
      constructs within 30 feet created by an allied creature, you can choose to quickly dig and cast this jutsu as if
      you were in the constructs space, increasing the damage dealt by 1 step. You then exit the construct, appearing in
      a space within 5 feet of it.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3, and the damage by 2d8.</p>
