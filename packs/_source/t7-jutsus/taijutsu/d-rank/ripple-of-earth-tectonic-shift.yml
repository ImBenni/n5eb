system:
  description:
    value: >-
      <p>You stomp the ground with incredible force causing a boulder to be chinked from the ground in front of you. You
      then make a frontflip, channeling earth release chakra to increase your strength, grab the boulder and throw it at
      a creature within range.</p><p>Make a ranged taijutsu attack, dealing your unarmed damage + 3d6 Earth damage and
      the creature must make a Constitution saving throw, becoming Dazed on a failure.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost by 3, the damage by 2d6, and the
      range by 15ft.</p>
