system:
  description:
    value: >-
      <p>You inhale deeply and take a charging stance, manifesting ripples of Fire Release chakra throughout your entire
      body.  </p><p>You instantly teleport in a burst of flames, reappearing in another location within range. Upon
      reappearing, you strike with precision. Make a melee taijutsu attack, dealing your unarmed damage + 1d10 + 1 fire
      damage. Neither this jutsu nor its damage can be reacted to. A trail of fire is left behind from where you once
      stood to where you reappear.  </p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the chakra cost by 3 and the damage by an additional 1d10 + 1.</p>
