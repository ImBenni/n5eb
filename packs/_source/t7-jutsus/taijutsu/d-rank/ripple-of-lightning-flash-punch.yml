system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of lightning release chakra throughout your entire
      body. You rear your hand back and coat it in a controlled lighting as you dislocate your bones and keep them
      together with no pain thanks to the lightning, striking at an enemy unexpectedly.</p><p>Make a melee taijutsu
      attack dealing your unarmed damage + 2d6 Lightning damage, the creature must then make a constitution saving
      throw, gaining shocked on a failed save.</p><p><strong>Overcharge:</strong> When you cast this jutsu, as a bonus
      action or reaction, you can overcharge its effects. When you do this jutsu becomes unreactable</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above <br />D-Rank, increase the cost of this jutsu by 3
      and increase the damage by 2d6 and increase the range by 5ft</p><p></p>
