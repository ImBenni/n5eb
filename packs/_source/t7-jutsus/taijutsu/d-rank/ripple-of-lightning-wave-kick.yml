system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of lightning release chakra throughout your entire
      body. You coat your knee in a sharp coat of lightning and rapidly strike and an creature with it, hitting them
      directly in the stomach.</p><p>Make a melee taijutsu attack, dealing your unarmed damage + 3d4 Lightning damage,
      this jutsu ignores half of a creatures damage reduction.</p><p><strong>Overcharge:</strong> When you cast this
      jutsu, as a bonus action or reaction, you can overcharge its effects. When you do this the affected creature must
      make a constitution save gaining a rank of slowed on a fail.</p><p><strong>At Higher Ranks:</strong> For each rank
      you cast this jutsu above <br />D-Rank, increase the cost of this jutsu by 3 and increase the damage by 2d4, if
      this jutsu is cast at B-Rank or higher you ignore damage reduction entirely.</p>
