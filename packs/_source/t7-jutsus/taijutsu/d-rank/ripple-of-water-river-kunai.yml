system:
  description:
    value: >-
      <p>You inhale deeply and take a charging stance, manifesting ripples of
      Water Release chakra throughout your entire body. You form two kunai made
      entirely of water in both hands and slash at a creature within
      range.</p><p>Make two melee taijutsu attacks, dealing your unarmed damage
      + 1d10 on each hit. These attacks do not add your ability modifier to the
      damage roll. A creature hit by both attacks from this jutsu must make a
      Strength saving throw, gaining 1 rank of <strong>Chilled</strong> on a
      failed save.</p><p><strong>Saturation:</strong> If this jutsu is used near
      a sufficient source of water, reduce the cost of this jutsu by 2 or add
      your ability modifier to the damage rolls of this jutsu.</p><p><strong>At
      Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3. If cast to B-Rank or higher,
      increase the number of attacks made by +1. If cast to S-Rank or higher,
      increase the number of attacks made by +1.</p>
