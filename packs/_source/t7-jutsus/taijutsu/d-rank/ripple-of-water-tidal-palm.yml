system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of water release chakra throughout your entire body.
      The user solidly plants both hands directly onto a creature's torso within range, then fires a short high-pressure
      burst of water that can shatter steel. Make a melee taijutsu attack, dealing your unarmed damage + 2d4 Cold
      damage. The target must make a Strength saving throw, being knocked back 10 feet and becoming Dazed on a failed
      save.</p><p><em><strong>Saturation.</strong></em> If this jutsu is used near a sufficient source of water,
      increase the knockback of this jutsu by 10 feet or the damage by 1d6.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3, the knockback by 10 feet, the
      total damage dice by 1, and the damage die by 1 step (1d4&lt;1d6&lt;1d8&lt;1d10&lt;1d12).</p>
