name: Ripple of Wind Air Whip
type: spell
_id: tNueVGjruPD5R8Ic
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of wind
      release chakra throughout your entire body.</p><p>You whip your body
      around violently and strike a creature within range. Make a melee taijutsu
      attack. On a hit, you deal your unarmed damage and the target gains 1 rank
      of bleeding. The target must also make a Constitution saving throw,
      becoming Dazed and being knocked back 15 feet on a failed
      save.</p><p><em><strong>Swirl.</strong></em> Creatures who would fail
      their saving throw, spreads all Elemental conditions currently affecting
      them around to all creatures, excluding the caster within 5 feet of them.
      Hostile creatures within 5 feet of the failing one gains 1 rank of all
      elemental conditions currently affecting it.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3. If cast to B-Rank, multiply your unarmed
      damage by 2 when dealing damage with this jutsu. If cast to S-Rank,
      multiply your unarmed damage by 3 when dealing damage with this
      jutsu.</p><pre><code></code></pre>
