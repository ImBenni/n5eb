system:
  description:
    value: >-
      <p>You inhale and take a charging stance, manifesting ripples of wind
      release chakra throughout your entire body.</p><p>You punch the air in
      front of you with the force to create a small scale sonic boom. Make a
      melee taijutsu attack against a target within range, dealing your unarmed
      damage + 2d6 and imposing a Constitution saving throw, where failure
      causes the creature to become Deafened until the end of their next
      turn.</p><p><em><strong>Swirl.</strong></em> Creatures who would fail
      their saving throw, spreads all Elemental conditions currently affecting
      them around to all creatures, excluding the caster within 5 feet of them.
      Hostile creatures within 5 feet of the failing one gains 1 rank of all
      elemental conditions currently affecting it.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3. If cast to B-Rank or higher, increase the
      number of attacks made by +1. If cast to S-Rank or higher, increase the
      number of attacks made by +1.</p>
