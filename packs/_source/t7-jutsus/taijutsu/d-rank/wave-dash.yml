system:
  description:
    value: >-
      <p>In response to a creature aiming to take advantage of your supposed poor decision to move, you showcase that
      their counterattack was part of your plan, and move to make your own counter to their counter. Increase your AC by
      +3 against the triggering attack, after the triggering attack hits or misses, you move to a space within 15
      feet.</p><p>Regardless of whether the triggering creature hits you, you make one melee taijutsu attack against
      them as you move, dealing your unarmed damage on hit and reducing their movement speed by 5 feet until the end of
      their next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase
      the cost of this jutsu by 3, and the distance you can move by 10 feet. If cast to B-Rank or higher, you make an
      additional attack. If cast to S-Rank or higher, you make an additional attack.</p>
