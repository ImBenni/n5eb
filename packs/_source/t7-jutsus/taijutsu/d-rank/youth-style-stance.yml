img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>You put one arm behind your back and your other Infront of you. Entering the signature stance of the hidden
      leaf village. If combat begins within the next minute, you gain the following benefits:</p><ul><li>During the
      first 3 rounds of combat you may switch your taijutsu stance as a free action once per turn.</li><li>You add a +5
      bonus to your initiative roll.</li><li>During the first round of combat you may take the dash action as a free
      action.</li><li>In the first round of combat, you have advantage on all unarmed attacks, and deal an additional
      amount of damage equal to your proficiency modifier.</li></ul><p>This jutsu can only be used while you are not
      concentrating on any jutsu. If no combat begins within 1 minute, the jutsu fizzles out.</p><p></p>
