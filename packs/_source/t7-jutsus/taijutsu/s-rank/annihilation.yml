system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Death Fist
      Stance</strong></em>. This jutsu can only be cast as a <em><strong>Finisher</strong></em>.</p><p>You ready your
      chakra into your arms as you crouch down with both your arms at the sides of your body, poised for a strike. You
      then lunge forward, creating two destructive shockwaves blasting off from your hand, demolishing anyone or
      anything that was hit by it.</p><p>Make a single melee taijutsu attack, dealing your unarmed damage + 12d12 force
      damage. On a hit they must make a Constitution saving throw, becoming paralyzed until the start of their next turn
      on a failed save and nothing on a success. If you initiate a Clash with this jutsu you do half of this jutsu's
      damage on a failed check and deal double the jutsu's damage on a success.</p>
