system:
  description:
    value: >-
      <p>As a requirement to activate this jutsu, you must currently be in the <em><strong>Death Fist
      Stance</strong></em>.</p><p>You manifest a light blue snowflake-shaped compass underneath yourself, as chakra
      begins to seep into the air from it and derive information from the surroundings. The compass needle points then
      light up in accordance with your opponent's strength, the stronger they are the more that light up. Finally, after
      gauging their strength your technique focuses your body to sense their battle spirit, allowing you to target their
      vitals easier and adapt to their fighting style.</p><p>While you are under the effects of this jutsu you gain the
      following;</p><ul><li>Once per turn you may reroll a melee attack roll.</li><li>For the duration, whenever you hit
      with a melee attack you increase your melee attack rolls by +1 when hitting that same target, until the start of
      your next turn.</li><li>You gain blindsight in a 60-foot sphere originating from you.</li><li>As a reaction to
      being targeted by a melee attack you can subtract their melee attack rolls by an amount equal to half your
      proficiency bonus, until the beginning of your next turn.</li><li>For the duration, your melee attack rolls cannot
      suffer any penalties.</li></ul>
