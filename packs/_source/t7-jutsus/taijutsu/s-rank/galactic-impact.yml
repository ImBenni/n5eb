system:
  description:
    value: >-
      <p>You launch yourself into the air using all your might and then crash down in a mighty slam, shattering the
      world beneath you.</p><p>You jump up to ten times your Strength score into the air and fall to earth, forcing
      creatures in an area equal to double your Strength score to make a Dexterity saving throw. On a failed save, they
      take your unarmed damage + the falling damage you would have taken as bludgeoning damage and are knocked
      prone.</p><p>On a successful save, they take half as much damage and are still knocked prone. You leave a crater a
      number of feet deep equal to your Strength score. An area of difficult terrain is left in your wake with a radius
      three times your Strength score.</p>
