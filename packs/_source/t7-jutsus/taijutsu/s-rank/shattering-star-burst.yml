folder: iahxRYONlnFDxG3Y
name: Shattering Star Burst
type: spell
_id: XTN5hSx1IDv4dElu
img: systems/n5eb/assets/content/jutsu-icons/taijutsu.webp
system:
  description:
    value: >-
      <p>Your muscles all over your body tense up and grow in size as you intend to wreak as much havok on a creature as
      possible. Select on creature within range. You move faster than the eye can see, teleporting to a space 30 feet
      above the creature. Make a melee taijutsu attack, striking the creature directly in the head. On a hit, you deal
      your unarmed damage + 3d6.</p><p>If you hit with this attack, you then move at <br />hypersonic speeds once more,
      striking the creature <br />with punches and kicks faster than the eye can see. <br />Make a number of melee
      taijutsu attacks equal to your taijutsu ability modifier, dealing your unarmed damage <br />on each hit. Also on
      each hit, you knock the creature <br />15 feet in the direction of your attack, teleporting next to them to make
      your next attack, until you make all of your attacks.</p><p>For every attack you land, the target must make a
      Strength saving throw, becoming weakened and unable to take reactions until the end of the turn. With each
      additional attack you land after the 2nd, the target suffers a -1 to this saving throw. If you hit with at least 5
      attacks this way, the target automatically fails their saving throw.</p><p>If the creature you attacked failed
      their saving throw against this jutsu, as they are disoriented from your assault, you can target them with one
      Ninjutsu of C-Rank or lower, that requires a melee ninjutsu attack and only effects one creature, at no extra
      cost. This ninjutsu automatically hits the creature, and in addition, the jutsu generates a powerful explosion
      that knocks the creature back 30 feet.</p><p></p>
