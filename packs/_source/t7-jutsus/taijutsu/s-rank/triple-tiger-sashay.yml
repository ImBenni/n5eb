system:
  description:
    value: >-
      <p>As a requirement for activating this jutsu, there must be three hostile creatures within 30 feet of
      you.</p><p>You execute a masterful technique that combines all of your taijutsu expertise into a flawless move
      that almost looks like a dance. You dart forward and jump into the air and make a single melee taijutsu attack
      against each creature dealing your unarmed damage + 14d6. If you hit each creature with this attack you land at a
      point you can land at a point within 15 feet of the last creature hit and they must all make a Constitution saving
      throw or be stunned until the end of their next turn on a failed save.</p>
