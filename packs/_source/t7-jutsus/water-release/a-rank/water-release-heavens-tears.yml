img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <p>You create a torrential downpour of water that seeps into one creature, greatly enhancing their capabilities.
      Choose a creature a caster can see within range. For the duration, they gain the following
      benefits:</p><ul><li>Immunity to cold damage.</li><li>Vulnerability to earth damage.</li><li>All damage you deal
      is cold damage that cannot be resisted.</li><li>Advantage on Constitution saving throws.</li><li>You always count
      as being near a sufficient source of water.</li><li>Increase the DC of all jutsu with the water release keyword by
      +2.</li><li>Increase the number of damage dice rolled by 2 of all jutsu with the water release
      keyword.</li></ul><p><em><strong>Combination:</strong></em> <em>If this jutsu is cast as a Combination jutsu with
      2 or more casters reduce the cost by -2.</em></p><p><em>Any creature who assists in casting this jutsu as a
      combination jutsu increases this Jutsu's offensive abilities based on the highest Charisma Modifier within the
      group of casters. (+0-1: No Change, +2-3: Increase the number of creatures that can be affected by +1. +4-5:
      Increase the number of creatures that can be affected by +2.</em></p>
