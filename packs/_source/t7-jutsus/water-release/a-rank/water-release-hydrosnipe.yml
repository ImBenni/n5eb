system:
  description:
    value: >-
      <p>You take aim at your target as you use water chakra to pressurize a single spout of water to deadly levels. You
      launch this pressurized jet of water at a target in range, making a ranged ninjutsu attack. This attack has a
      critical threat range of 17~20, and ignores three-quarters cover. On a hit, this deals 10d10 Cold damage and the
      target gains 2 ranks of Chilled.</p><p>If used near a sufficient source of water, reduce the chakra cost of this
      jutsu by 2 or you can force the affected target to make a Constitution saving throw, gaining 2 ranks of Bleeding
      on a failed save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase
      the cost of this jutsu by 3, and increase the damage dealt by 3d10, and the critical threat range increase by
      +1.</p>
