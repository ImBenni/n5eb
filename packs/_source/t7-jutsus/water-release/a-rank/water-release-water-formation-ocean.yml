system:
  description:
    value: >-
      <p>You generate an ocean of water from your stomach and expel it onto the ground in front of you. This ocean holds
      no more than 10000 gallons of water. You can use this ocean as a source of drinking water, lay a trap, or use it
      as a source for more complex Water Ninjutsu. You may use the water this Jutsu Produces as a Source of Water for no
      more than 5 water release ninjutsu of S-Rank or Lower.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above A-Rank, increase the cost of this jutsu by 5, increase the amount of water created by 10000,
      and the amount of times the source of water can be used as a source of water by 5.</p>
