system:
  description:
    value: >-
      <p>You create a bubble that may carry 2 medium creatures. Upon casting this jutsu you are immediately placed
      within the bubble and if there is a friendly creature within 5 feet of you they may choose to also be immediately
      placed within the bubble. Otherwise, a friendly creature can walk into the bubble. You control where the bubble
      moves as a free action and the bubble has a flying movement speed of 500 feet. The Bubble has an AC of 12 and 10
      hit points. You must repay the cost of this jutsu at the end of each hour.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above B-Rank, increase the cost of this jutsu by 3 and the amount of medium
      sized creatures the bubble can carry.</p>
