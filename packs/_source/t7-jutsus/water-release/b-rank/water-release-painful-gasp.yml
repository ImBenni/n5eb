system:
  description:
    value: >-
      <p>You create pools of water in the lungs of a creature, attempting to forcefully drown them. The creature must
      make a Constitution saving throw or gain a rank of weakened and become incapacitated on a failed save. A creature
      becomes incapacitated until the start of their next turn, they must then make another saving throw or be subjected
      to this jutsu's affect again. A creature who has passed a subsequent saving throw may spend their<br />action to
      end this jutsu by forcefully expelling the water in their lungs.</p><p>Creatures who do not need to breathe air or
      can breathe in water are immune to this jutsu.</p>
