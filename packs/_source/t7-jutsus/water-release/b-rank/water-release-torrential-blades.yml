system:
  description:
    value: >-
      <p>You do not need to spend chakra to maintain concentration on this jutsu.</p><p>You create a razor-sharp pair of
      short swords capable of cutting anything in your way (Design is up to you). If you let go of either blade, it
      disperses into water, and you can summon it again on your turn (no action required). As an Action you can make 2
      melee ninjutsu attacks with these swords against a target within 5 feet, dealing 4d6+Ninjutsu Ability Modifier
      Cold Damage.</p><p>If you successfully hit a single target twice with these weapons, the target takes an
      additional 1d10 Cold Damage and must succeed on a Constitution Saving throw or gain 1 rank of the chilled and
      bleeding condition.</p><p><em><strong>Saturation:</strong></em> If used near a sufficient source of water,
      decrease the cost of the jutsu by 2 or add an additional die of damage to attacks made with the
      jutsu.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost
      of this jutsu by 3 and increase the number of attacks by +1.</p>
