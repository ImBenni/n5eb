system:
  description:
    value: >-
      <p>An advanced version of Water Shuriken, the user compresses an enormous amount of water into a single shuriken,
      engulfing everything in its range. creatures in range must succeed on a Dexterity saving throw or take 5d10 Cold
      Damage and gain 2 ranks of the chilled condition or half as much damage on a failed
      save.</p><p><em><strong>Saturation.</strong></em> If used near a sufficient source of water, reduce the chakra
      cost of this jutsu by 2 or increase the amount of damage die by 2.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d10
      and radius by 5ft. page</p>
