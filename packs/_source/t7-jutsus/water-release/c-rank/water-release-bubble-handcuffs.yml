system:
  description:
    value: >-
      <p>You create bubbles that fly towards a creature of your choice within range, attempting to stop that creature
      from using hand signs. The target creature must make a Dexterity saving throw. On a failed save that creature
      loses the ability to use hand signs or hold anything in their hands.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and the range by 10 feet. At
      A-Rank the amount of creatures that you can target with this jutsu by 1.</p>
