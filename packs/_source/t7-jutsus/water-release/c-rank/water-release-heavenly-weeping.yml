system:
  description:
    value: >-
      <p>A technique in which chakra is kneaded in the user's body, transformed into water and then shaped into Senbon
      in the mouth before finally being expelled at a high velocity. Make a Ranged Ninjutsu attack against a creature
      you can see within range, dealing 2d8 Cold damage+ 2d8 Piercing damage. If your Ninjutsu Save DC is higher than
      your target's passive perception by 5 or more you gain advantage on your attack targeting them with this
      jutsu.</p><p><em><strong>Saturation.</strong></em> If used near a sufficient source of water, reduce the chakra
      cost of this jutsu by 2 or you can choose to instead make an additional attack targeting another creature within
      range.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3 and increase the damage by 1d8 for each damage type.</p><pre><code></code></pre>
