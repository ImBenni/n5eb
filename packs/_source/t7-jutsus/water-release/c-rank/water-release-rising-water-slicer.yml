system:
  description:
    value: >-
      <p>You summon a strong thin linear wave of water that shoots outward from the ground at high speeds to its target.
      Creatures in a 5- foot wide, 60-feet-long line must succeed a Dexterity saving throw. Creatures take 4d8 Water
      damage and gain 1 rank of the bleeding condition on a failed save. On a success they take half damage and no
      further effects.</p><p><em><strong>Saturation.</strong></em> If used near a sufficient source of water, reduce the
      chakra cost of this jutsu by 2 or increase the size of the damage die by 1 step.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of this jutsu by 3 and increase
      damage by 1d8.</p>
