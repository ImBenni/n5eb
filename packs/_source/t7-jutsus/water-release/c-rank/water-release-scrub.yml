img: systems/n5eb/assets/content/jutsu-icons/water.webp
system:
  description:
    value: >-
      <div class="page phb" id="p59"><div class="columnWrapper"><p>You manifest a cube of water at a space within range
      to scrub out the competition. Choose a space within range that you can see. You create a 10 by 10 foot cube
      originating from this space, which then travels 15 feet from its outer edge before dispesing. Each creature within
      range must make a Dexterity saving throw, taking 3d10 cold damage and gaining 1 rank of chilled on a failed save,
      or half as much damage on a success. The affected area is scrubbed clean of grime and flith.</p><p>Affected
      creatures who are benefitting from a jutsu with a range of self or touch cause the original caster of the jutsu to
      make their concentration check with a -1d4 penalty as the waters of this jutsu scrub the chakra off of
      them.</p></div></div><div class="page phb" id="p60"><div class="columnWrapper"><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above <br />C-Rank, increase the cost of this jutsu by 3 and the
      damage by 1d10. If cast to B-Rank or higher, increase the distance the cube travels to 20 feet. If cast to S-Rank
      or higher, increase the distance the cube travels to 25 feet.</p></div></div>
