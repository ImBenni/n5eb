system:
  description:
    value: >-
      <p>You create a rushing current of water that flows on the ground at blistering speeds. Each creature in a
      5-foot-wide, 30-foot-long line must make a Strength saving throw or take 2d12 cold damage and be knocked prone on
      a failed save, or half as much damage and no additional effects on a successful
      one.</p><p><em><strong>Saturation.</strong></em> If used near a sufficient source of water, reduce the chakra cost
      of this jutsu by 2 or increase the width of the line by 5 feet.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above <br />D-Rank, increase the cost of this jutsu by 3 and increase the damage by
      1d12.</p>
