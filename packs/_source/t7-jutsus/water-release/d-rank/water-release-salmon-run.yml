system:
  description:
    value: >-
      <p>You unleash a small wave of water containing dozens of Salmon comprised of water rushing towards a target
      creature of your choice within range. Make a Ranged Ninjutsu attack against a creature you can see within range,
      dealing 7d4 cold damage. After the initial attack the salmon jump out of the wave attacking nearby creatures. All
      creatures within 15 feet of the target must succeed a Dexterity saving throw, taking 5d4 cold damage on a failed
      save or half as much on a successful one.</p><p><em><strong>Combination:</strong></em> <em>If this jutsu is cast
      as a Combination jutsu with 2 or more casters you increase the initial damage die by 3 and the secondary damage
      die by 2. Any creature who assists in casting this jutsu as a combination jutsu increases the damage of this jutsu
      by one step based on the highest Charisma Modifier within the group of casters. (+0-1: No Change, +2: D6, +3: D8,
      +4: D10, +5: D12).</em></p>
