system:
  description:
    value: >-
      <p>Water flows around your arms and legs to guide your strikes. Make three ninjutsu or taijutsu attacks, adding a
      1d4 to the attack roll of each strike (this jutsu cannot crit). On each hit, deal your unarmed damage + 1d4 Cold
      damage. If all three attacks hit, the target takes an extra 2d4 Cold.</p><p><em><strong>Saturation.</strong></em>
      If used near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can force the affected
      target to make a Constitution saving throw, gaining 1 rank of Chilled on a failed save.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and the
      damage by 1d4</p>
