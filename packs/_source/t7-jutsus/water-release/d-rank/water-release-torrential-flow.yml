system:
  description:
    value: >-
      <p>You create a torrent of rushing rotating water that drags enemies closer together, by any means. Each creature
      in a 15-foot radius, 60-foot-high cylinder centered on a point within range must make a Strength saving throw or
      be pulled toward the center of the radius and take 3d6 cold damage on a failed save, or half as much damage and no
      additional effects on a successful save.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above <br />D-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6.</p>
