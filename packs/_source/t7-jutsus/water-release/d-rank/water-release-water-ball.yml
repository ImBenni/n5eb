system:
  description:
    value: >-
      <p>You conjure an expanding ball of water that quickly pops splashing on everything in sight. Each creature in a
      range must succeed a Dexterity saving throw or take 3d6 cold damage and gain 1 rank of
      Chilled.</p><p><em><strong>Saturation.</strong></em> If used near a sufficient source of water, reduce the chakra
      cost of this jutsu by 2 or on a successful saving throw, creatures take half damage from this jutsu and are
      chilled until the start of their next turn.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above D-Rank, increase the cost of this jutsu by 3 and increase the damage by 1d6.</p>
