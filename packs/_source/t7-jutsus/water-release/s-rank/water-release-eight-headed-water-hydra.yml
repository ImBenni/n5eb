system:
  description:
    value: >-
      <p>You expel a massive quantity of water or pull from a nearby source, conjuring a Giant eight headed Hydra of
      your description from water. The Hydra attempts to ram its target. Make a Ranged ninjutsu attack, on a hit the
      target creature takes 20d10 Cold damage and must make a Constitution saving throw, being stunned and knocked prone
      on a failed save until the end of the creature's next turn.</p><p><em><strong>Saturation.</strong></em> If used
      near a sufficient source of water, reduce the chakra cost of this jutsu by 2 or you can choose to increase the
      damage die to a d12.</p>
