system:
  description:
    value: >-
      <p>All water in the air and earth within range collect and swirl around you before dispersing in a powerful blast.
      All creatures in a 120-foot sphere centered on you must make a Strength saving throw, taking 12d10 Cold damage and
      12d10 Bludgeoning damage on a failed save or half as much on a success.</p><p>In addition, on a failed save, a
      target also gains two ranks of both Bruised and Chilled, and is knocked back 60 feet away from the center of the
      sphere. On a successful save, a target is only knocked back 30 feet. Any surfaces caught in this  sphere are now
      difficult terrain until 1 hour passes.</p><p></p>
