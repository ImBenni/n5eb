system:
  description:
    value: >-
      <p>You snap your fingers and amplify the vibrations in the air over a hundred times to attempt to overload the
      senses. All creatures in range other than you must make a Constitution saving throw or become incapacitated,
      deafened, and gain 5 ranks of bleeding on a failed save, as you rupture their eardrums. A creature who fails this
      save is incapacitated for 1 minute, they can remake the saving throw at the end of each of their turns removing
      the effect on a success. The snap can be heard up to a mile away. A creature is deafened until they are targeted
      by a jutsu that removes deafened at A-Rank or higher.</p><p><strong>At Higher Ranks:</strong> For each rank you
      cast this jutsu above A-Rank, increase the cost of this jutsu by 3 and radius by 5 feet.</p>
