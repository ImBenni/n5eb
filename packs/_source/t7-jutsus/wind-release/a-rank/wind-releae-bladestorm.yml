system:
  description:
    value: >-
      <p>You coalesce 5 kunai made of wind, that circle around your body. You cannot lose concentration of this jutsu as
      a result of damage. You can use an action to shoot two kunai toward the same or different creatures within 90 Feet
      of you. When you do, make a ranged ninjutsu attack. On a hit the target takes 6d4 + your ninjutsu ability modifier
      in wind damage. This jutsu scores a critical hit on 19-20. Whether you hit or miss you spend the kunais vanishes
      after use. The jutsu ends early if you expend all your kunai. As a full turn action, you can shoot all your kunai
      at a single creature</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above <br />A-Rank,
      increase the cost of this jutsu by 3 and the damage by 1d4.</p>
