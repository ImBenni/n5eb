system:
  description:
    value: >-
      <p>You form a large sphere of frigid air that resembles the moon on a misty dark night. Make a ranged Ninjutsu
      attack. On a hit, the target takes 14d6 wind damage and must make a Strength saving throw. This jutsu overwhelms
      the target with freezing wind, for every 6 rolled on this jutsu's damage dice, the target suffers a -1 penalty to
      their strength saving throw. On a failed save, the target gains 2 ranks of Weakened and
      Chilled.</p><p><em><strong>Swirl.</strong></em> Creatures who would fail their saving throw, spreads all
      <em>Elemental</em> conditions currently affecting them around to all creatures, excluding the caster within 5 feet
      of them. Hostile creatures within 5 feet of the failing one gains 1 rank of all elemental conditions currently
      affecting it.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above A-Rank, increase the
      cost of this jutsu by 3, the range by 30 feet, and the damage by 1d6.</p><p></p>
