system:
  description:
    value: >-
      <p>You kick out an invisible wave of wind that rides the air currents before it expands and cuts everything around
      it like a fang. Choose a point you can see within range to send the fang to. A jarring gash of wind creates a cone
      in that space and all creatures within a 30-foot cone centered on that point must make a Dexterity saving throw or
      take 6d12 wind damage and gain 3 ranks of lacerated on a failed save.</p><p><strong>At Higher Ranks:</strong> For
      each rank you cast this jutsu above <br />A-Rank, increase the cost of this jutsu by 3 and increase the damage by
      1d12.</p>
