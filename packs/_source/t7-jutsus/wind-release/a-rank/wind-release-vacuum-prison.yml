folder: 12zv3sWHi4Z29MfM
name: Wind Release Vacuum Prison
type: spell
_id: sq4ASahWqYOQNiEt
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create a cube void of air around a creature, depraving them of any ways to breathe. Choose a creature you
      can see within range. When you cast this jutsu, that creature is surrounded by a wall of air, which can suspend
      them midair. A creature inside this prison has a movement speed of 0, cannot speak, and cannot make hand seals.
      Creatures trapped inside this prison cannot target creatures outside of it and vice versa. At the start of each of
      their turns they must make a Constitution saving throw, gaining 1 rank of weakened and losing concentration on all
      jutsu they were concentrating on, on a failed save. All ranks of weakened gained by this jutsu are removed when
      this jutsu ends.</p><p>If a creature inside or out of the prison attempts to attack the prison they take must make
      a Dexterity saving throw or take 8d8 wind damage. This prison has 100 hit points, has an AC equal to your Ninjutsu
      save DC, and is resistant to bludgeoning, piercing, and slashing damage, and has immunity to wind and lightning
      damage and vulnerability to fire damage.</p><p>A creature who does not need to breath is immune to the effects of
      being trapped inside the prison.</p>
