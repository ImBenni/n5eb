system:
  description:
    value: >-
      <p>You mold wind release chakra into the shape of a scythe before quickly swiping out attacking all within range.
      All creatures in a 10-foot cone must make a Dexterity saving throw, taking 8d10 Wind damage on a failed save and
      gaining 3 ranks of bleeding, or half as much damage on a successful save.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above A-Rank, increase the cost of this jutsu by 3, the damage by 2d10, and
      increase the ranks of bleed by +1.</p>
