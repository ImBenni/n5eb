system:
  description:
    value: >-
      <p>You coat your hand in wind chakra in the shape of claws and then swipe your hand in a wide arc, devastating the
      battlefield. Each creature in a 60-foot cone must make a Dexterity saving throw or take 9d4 wind damage and gain 1
      rank of lacerated on a failed save, or half as much damage and no additional effects on a successful save. This
      jutsu cuts up the ground in its wake, leaving an area of difficult terrain.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast this jutsu above <br />B-Rank, increase the cost of this jutsu by 3 and
      increase the damage die by 1 step. (d4&gt;d6&gt;d8&gt;d10&gt;d12)</p><p></p>
