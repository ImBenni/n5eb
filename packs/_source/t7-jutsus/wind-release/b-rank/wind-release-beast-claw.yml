name: Wind Release Beast Claw
type: spell
_id: 11mHbA0SJ4MmceOe
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You bring your hand behind you generating a torrent of wind before slashing upward, sending three vertical
      slashes of wind. You create 3 30-foot long, 5-foot wide lines in wind chakra from 180° in front of you. These
      lines may go in any direction you like along the ground, but they cannot intersect and must have 5 feet of space
      between them after they are launched from the space in front of you.</p><p>Each creature within range of a line
      must make a Dexterity saving throw, taking 7d8 in wind damage and becoming Lacerated on a failed save, or half as
      much damage and only 1 rank of bleeding on a success. The affected area becomes difficult
      terrain.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost
      of this jutsu by 3, and the damage die by 1 step (d8&lt;d10&lt;d12).</p>
