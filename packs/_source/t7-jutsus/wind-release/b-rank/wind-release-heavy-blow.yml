system:
  description:
    value: >-
      <p>You let out a strong highly condensed line of air from the palm of your hand. All creatures in a 5-foot wide
      60-foot-long line must succeed a Dexterity saving throw. Taking 8d6 Wind damage on a failed save, or half as much
      on a successful one. Additionally, You may choose to move yourself backwards up to 30 feet as the strength of the
      wind is enough to carry you backwards.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu
      above B-Rank, increase the cost of this jutsu by 3, increase the damage by 1d6, and feet you may move yourself
      backwards is increased by 10.</p>
