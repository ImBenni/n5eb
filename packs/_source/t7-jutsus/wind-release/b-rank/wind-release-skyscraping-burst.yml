  description:
    value: >-
      <p>You flick your wrist and shoot a burst of wind from under your enemies. Each creature in a 30-foot-radius,
      60-foot-high cylinder centered on that point must make a Strength saving throw being knocked up 60 feet, taking
      falling damage and being knocked prone on a failed save.</p><p>A creature who fails the initial saving throw must
      also make a Constitution saving throw becoming weakened until the end of their next turn on a failed save.</p>
