folder: ltsItsf7CgWgVORn
name: Wind Release Wind Clone
type: spell
_id: qC0xu2T5gr56r9ze
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You conjure a clone made of wind similar to the <strong>Shadow Clone Technique</strong>. <em><strong>Wind
      Clones</strong></em> have no discernable weight. You can create up to three <em><strong>Wind Clones</strong></em>
      when casting this jutsu, each costing 12 chakra to conjure.</p><p><em><strong>Wind Clones</strong></em> can cast
      ninjutsu with the <em><strong>Wind Release</strong></em> keyword that you know of C-Rank, following normal
      <strong>Clone</strong> keyword restrictions. <em><strong>Wind Clones</strong></em> have immunity to Genjutsu,
      psychic, and poison damage, resistance to piercing, wind, and lightning damage, and vulnerability to fire damage.
      <em><strong>Wind Clones</strong></em> have a flying speed equal to their walking speed. Additionally, if a
      damaging jutsu the <em><strong>Wind Clone</strong></em> casts would use a damage die larger than a d6, the damage
      die the clone uses becomes a d8 instead. If a <em><strong>Wind Clone</strong></em> uses a weapon or unarmed
      attack, regardless of the weapon the clone uses, it deals 1d8 wind damage.</p><p>If a <em><strong>Wind
      Clone</strong></em> moves through an area of dust, vapor, or gas, you can choose whether they disperse it or
      disseminate it. Dispersing it leaves an open area of the clone's size within the particulate's space, safe for
      others to move through until the end of your next turn. Disseminating it brings the particulate out behind the
      clone, increasing its size in a line behind them until they stop. This line is the same width as the clone's size.
      If a <em><strong>Wind Clone</strong></em> is destroyed or unsummoned after disseminating a particulate, the same
      particulate is blasted out in a 5-foot radius around the clone.</p><p>If a <em><strong>Wind Clone</strong></em>
      casts a jutsu that requires more than 1 attack roll upon casting, it only makes one attack. If multiple
      <em><strong>Wind Clones</strong></em> attack the same creature, you do not make multiple attack rolls. You instead
      choose a lead clone and it gains a +1d8 bonus to its damage roll(s), for each additional clone that is aiding
      it.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above B-Rank, increase the cost of
      this jutsu by 3. If this jutsu is cast at S-Rank, increase the rank of jutsu water clones can cast to B-Rank.</p>
