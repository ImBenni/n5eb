  description:
    value: >-
      <p>You create two rotating discs of wind that whir a distinct sound, almost calming the heat of battle. Make two
      ranged ninjutsu attacks. You can target one or more creatures. On a hit, the target creature takes 2d6 + your
      ninjutsu ability modifier wind damage and gains 1 rank of bleed.</p><p><strong>At Higher Ranks:</strong> For each
      rank you cast this jutsu above <br />C-Rank, increase the cost of this jutsu by 3 and the number of attacks by
      +1.</p>
