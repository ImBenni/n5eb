system:
  description:
    value: >-
      <p>You swiftly arc a powerful gust to deflect an incoming attack. Increase your AC by half of 1d6 (minimum 1). If
      the attack still hits you after this increase then you halve its damage. If this would cause the attack to miss
      you instead, you can redirect that attack to a creature within 15 feet, disarming the attacker if it was a melee
      weapon attack. The redirected target must succeed a Dexterity saving throw or suffer half the damage of the
      attack.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost
      of this jutsu by 3, and you gain a +1 bonus to AC.</p>
