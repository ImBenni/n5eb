img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You generate a powerful wind within your palm and send it spiraling outwards towards creatures within a 20-foot
      cone from you. As your wind travels, it picks up dust, dirt, and other loose debris, making the wind denser.
      Creatures who are in the affected range must make a Wisdom saving throw, becoming blinded until the end of their
      next turn on failure or no effects on a success.</p><p>The affected creatures must also make a strength saving
      throw, being knocked back 30 feet on a failed save. This save is made at disadvantage if they failed their initial
      save. On a successful save, they are only pushed back 5 feet.</p>
