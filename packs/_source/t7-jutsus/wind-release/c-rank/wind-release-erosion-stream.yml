system:
  description:
    value: >-
      <p>You release a precision stream of wind so powerful it can reduce stone to dust in an instant. The wind stream
      is a 100 feet long and 5 foot wide line that blasts out from you in a direction you choose. Each creature in the
      line must make a Dexterity saving throw. A creature takes 8d8 Wind damage on a failed save, or half as much damage
      on a successful one. The stream of wind deals double damage to objects, structures, and earthen constructs, and
      any temporary hit points granted by jutsu with the Earth Release keyword.</p><p><strong>At Higher Ranks:</strong>
      For each rank you cast this jutsu above D-Rank, increase the cost of this jutsu by 3, and increase the damage
      dealt by 2d8.</p>
