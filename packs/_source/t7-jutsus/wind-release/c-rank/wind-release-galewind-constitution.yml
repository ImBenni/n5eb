system:
  description:
    value: >-
      <div class="page phb" id="p37"><div class="columnWrapper"><p>You generate an orb of soothing wind and press it
      against your body, causing an aura of healing wind to surround you. If you possess the bleeding and/or chilled
      conditions, they are immediately removed.</p><p>For the duration, you recover 1d4+1 hit points at the start of
      each of your turns, and have advantage on saving throws to resist the bleeding and chilled
      conditions.</p></div></div><div class="page phb" id="p38"><div class="columnWrapper"><p>Additionally, effects that
      would give you either listed condition without a saving throw, instead enable you to make a Constitution saving
      throw, resisting gaining the condition(s) on a success.</p></div></div>
