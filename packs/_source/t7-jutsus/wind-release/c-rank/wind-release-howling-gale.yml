system:
  description:
    value: >-
      <p>You imbue the air passing through your vocal chords with wind chakra to release a maddening screech. All
      creatures within a 30-foot radius of you that can hear you must make a Constitution saving throw. On a failed
      save, a target takes 3d8 Wind damage + 2d6 Force damage and becomes defeaned for 1 minute. On a successful save, a
      target takes half damage. If this save is failed by 5 or more, a target also gains 1 rank of fear for 1 minute. A
      target can repeat its saving throw at the end of each of its turns, ending either effect on itself with a
      success.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above D-Rank, increase the cost
      of this jutsu by 3, and increase the damage dealt by 1d8 Wind and 1d6 Force respectively.</p>
