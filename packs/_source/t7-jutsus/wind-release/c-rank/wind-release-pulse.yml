img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You create a massive wave of wind, unleashing it in a 30-foot cone, and decide whether the force pulls or
      pushes creatures and objects. Each creature in that cone must make a Constitution saving throw. A creature takes
      4d6 wind damage on a failed save, or half as much damage on a successful one. Each creature that fails the save is
      either pulled 15 feet toward you or pushed 15 feet away from you, depending on the choice you made for the jutsu.
      In addition, unsecured objects that are completely within the cone are likewise pulled or pushed 15
      feet.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above C-Rank, increase the cost of
      this jutsu by 3, the damage by 1d6, and the distance pulled or pushed by 5 feet.</p>
