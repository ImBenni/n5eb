system:
  description:
    value: >-
      <p>You create a powerful gust of wind in front of you, that blows back your foes. Each creature in a 30-foot cone
      must make a Strength saving throw being knocked back 30 feet on a failed save, or half the distance on a
      successful one. Creatures who collide with a solid object, have their movement stopped, taking falling damage
      equal to the distance they would have fallen.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this
      jutsu above <br />D-Rank, increase the cost of this jutsu by 3 and the length of the cone and the length of the
      knockback by 5 feet.</p>
