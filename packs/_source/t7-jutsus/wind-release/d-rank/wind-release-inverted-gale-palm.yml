      creature or object in range. On a hit they take 3d6 Wind Damage and must make a Strength saving throw, on a failed
      save they are pulled towards you and end their movement within 5 feet of you.</p><p><strong>At Higher
      Ranks:</strong> For each rank you cast <br />this jutsu above D-Rank, increase the cost of this jutsu <br />by 3
      and the damage by 1d6</p>
