name: Wind Release Vortex
type: spell
_id: LGL5QTQp8lQjXyPm
img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>Choose a space within range, You create a small mote of wind that attempts to pull in all things. Each creature
      within 15-feet of the mote must make a Strength saving throw or be pulled 10 feet towards it. A creature can
      willingly fail this saving throw.</p><p><strong>At Higher Ranks:</strong> For each rank you cast this jutsu above
      D-Rank, increase the cost of this jutsu by 3. When cast at C-Rank, you can pull a creature up to 15 feet towards
      the vortex. When cast at B-Rank, you can create a second vortex within range. If a creature is in the radius of
      multiple vortexes, they are pulled towards the closest mote. When cast at A-Rank, All creatures within 20 feet of
      the vortex must now do the save throw. When cast at S-Rank, you can create a third vortex within range.</p>
