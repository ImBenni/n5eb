system:
  description:
    value: >-
      <p>As part of the requirements for casting this jutsu you must have <strong>Rasengan</strong> on your jutsu known
      list.</p><p>You create a Rasengan before adding a rotating wind of chakra shaped like a shuriken that can even
      shred cells. Make a ranged ninjutsu attack against a target you can see within range, dealing 18d12 Force damage
      on a hit. A creature who is targeted by this jutsu, cannot gain the benefit of bonuses to AC or Temporary hit
      points as a result of Armor, Jutsu, features, or traits against you until the conclusion of this jutsu.</p><p>Hit
      or miss, all creatures, except the original target, in a 15-foot radius sphere centered on the original target
      must make a Dexterity saving throw, taking half the damage of this jutsu as well on a failed save. A creature who
      is reduced to 0 hit points by this jutsu instantly dies and cannot be revived as their chakra network is
      destroyed.</p><pre><code></code></pre>
