img: systems/n5eb/assets/content/jutsu-icons/wind.webp
system:
  description:
    value: >-
      <p>You take a small object such as a rock and begin infusing your wind release chakra into it. You fill the object
      with so much chakra that the slightest touch could cause it to explode in massive explosion. Choose a space within
      500 feet. You hurl the object at this space. The object then explodes, sending a wild burst of wind chakra and
      shrapnel in 100-foot sphere.</p><p>Each creature within range must make a Strength saving throw, taking 7d10
      Bludgeoning and 7d10 Wind damage, and become weakened, as they are bombarded with debris and a force of wind so
      strong that it causes the air to be ripped from their lungs. Creatures that take more than 60 damage from this
      jutsu also become Slowed. Creatures that reach 0 hit points as a result of this jutsu are immediately killed as
      their lungs are torn to shreds.</p><p>Structures, Objects, and Constructs take triple damage from this jutsu,
      crumbling to dust if they reach 0 hit points as the air is sucked out of them.</p><p></p>
