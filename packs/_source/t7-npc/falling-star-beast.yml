  - name: Invert Gravity
    type: feat
    _id: SKc8uN317SRVRmMo
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>The Beast's speed becomes 0 until the start of its next turn as it generates a massive amount of
          gravitional force.</p><p> Each creature within 30 feet of the beast of its choice must succeed a Constitution
          saving throw.</p><p> If any creatures who would make this saving throw were affected by an Earth Release
          Ninjutsu with Gravition in the name within the previous round, they make this saving throw with a -1d6
          penalty.</p><p> On a failed save, each creature is lifted 30 feet into the air and is Stunned until the end of
          the Beast's turn.</p><p> Any a creature that enters or starts their turn in this area before the start of the
          beast's turn must also make this saving throw.</p><p> At the start of the beast's next turn, gravity reverts
          and affected creatures are slammed back down with incredible force, taking 8d10 force damage and falling
          prone.</p><p> On a successful save, a creature can move up to half its movement speed.</p><p></p>
