    system:
      description:
        value: >-
          <p>The Moon Presence has no mouth yet screams anyway, sowing despair and madness into the minds of all
          creatures close enough to feel its spychic echo.</p><p> Each creature within 30 feet of the Moon Presence must
          make a Charisma saving throw (caster's Genjutsu DC), taking 20d6 Psychic damage and 5 ranks of the Bleeding
          condtion on a failed save, or half as much damage and 2 ranks of the Bleeding condition on a success.</p><p> A
          creature that fails this save by 5 or more goes Beserk until the start of the Moon Presence's next
          turn.</p><p></p>
