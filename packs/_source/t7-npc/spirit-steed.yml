  - name: Bold Stride
    type: feat
    _id: 1PlsY1EhNJGY3mOL
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>The Spirit Steed cannot have its movement speed hindered or reduced by any means (other than conditions),
          has its maximum jump height doubled, and has a water walking speed equal to its movement speed.</p><p>The
          Spirit Steed has advantage on Dexterity saving throws.</p><p> Out of combat, riders also gain advantage on
          Dexterity saves, whilst in combat, they only gain a +2.</p><p> Lastly, on a failed Dexterity saving throw, the
          Spirit Steed takes half damage.</p><p> For both itself and its riders, on a successful Dexterity saving throw,
          both parties suffer no damage or effects.</p><p></p>
        chat: ''
      source:
        custom: ''
        rules: n5eb
        book: Team 7
