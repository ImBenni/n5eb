    _id: ZayMESCSWQP8AaSK
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>While riding on the Spirit Steed during exploration or land travel, you treat normal travel pace as fast
          travel pace, and you double fast travel pace distances.</p><p> This does not negatively affect your passive
          perception.  (See Chapter 7 Rules).</p><p> The Spirit Steed also does not take damage as the result of the
          natural environment, and protects its riders from these effects (A brutal blizzard, lava, etc)</p>
