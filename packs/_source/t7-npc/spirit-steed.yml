  - name: Adaptive Capacity
    type: feat
    _id: Aeh0gwWOeDsyF3ws
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>The Spirit Steed can carry up to 2 medium sized creatures, or 1 large creature, and has a maximum bulk of
          20.</p><p> When you summon the Spirit Steed, you can spend 5 chakra to summon the Steed with a wagon of your
          description.</p><p> This wagon increases the bulk the Steed can carry to 10 times your proficiency bonus, and
          the Steed can carry an additional number of creatures equal to your proficiency bonus.</p><p> When summoned
          with the Wagon, the Steed's movement speed is no longer innately doubled, and it no longer grants the riders
          any bonuses to saving throws while in combat.</p><p></p>
