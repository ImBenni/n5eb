  - name: Ethereal Form
    type: feat
    _id: l5iDE4sAGk5N81TV
    img: systems/n5eb/icons/svg/items/feature.svg
    system:
      description:
        value: >-
          <p>The Spirit Steed protects itself and its riders from fall damage from the first 80 feet of fall damage,
          after which it and its riders take fall damage normally.</p><p> The Spirit Steed disappears if you are
          unmounted from it and it cannot see you for an entire minute.</p><p> When the Spirit Steed disappears, all
          riders and objects it was carrying fall gently to the ground.</p><p> If the Spirit Steed dies you can no
          longer summon it again until you complete a long rest.</p><p> At 9th level, you can spend 1 Crimson Flask to
          regain the ability to summon the Spirit Steed as an action.</p><p></p>
