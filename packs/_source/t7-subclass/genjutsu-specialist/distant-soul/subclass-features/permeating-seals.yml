system:
  description:
    value: >-
      <p>Finally at 14th level, the sheer pressure of your chakra causes the defenses of creatures to cripple.</p><p>
      When you cast a Genjutsu with the Fuinjutsu keyword, you can spend 8 chakra to make the jutsu unable to be reacted
      to.</p><p> You can also infuse this chakra into a genjutsu that you seal with your Remote Trigger feature.</p><p>
      You can use this ability twice per long rest.</p><p> You can also create up to 2 seals at a time with your Remote
      Trigger feature, but you cannot affect a creature with more than 1 seal at a time.</p><p> Lastly, Genjutsu with
      the Fuinjutsu keyword you cast ignore resistance to psychic and chakra damage and treats immunity as
      resistance.</p><p></p>
