system:
  description:
    value: >-
      <p>When you choose this pledge at 2nd level, you gain the E- Rank genjutsu, True Strike.</p><p> If you already
      know this genjutsu, you learn a different E-Rank genjutsu of your choice.</p><p> This jutsu gains the Fuinjutsu
      keyword.</p><p> You can cast True Strike as a bonus action, and when you do cast it, its duration increases by 1
      round.</p><p> Genjutsu you cast with the Fuinjutsu keyword, has its DC increased by +1.</p><p> This increases to
      +2 at 10th and +3 at 19th.</p><p></p>
