name: Remote Trigger
type: feat
_id: jeymAsd28XDPnBnD
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you are able to use seals to imbue your genjutsu into creatures to either to help or
      bring despair.</p><p>When you cast a Genjutsu with the Fuinjutsu keyword on a creature (including yourself) that
      requires a saving throw, on a failed save, you can choose to store the genjutsu in a special chakra seal on the
      creature, instead of affecting them with the genjutsu.</p><p>Creatures can willingly fail their saving
      throw.</p><p>The seal appears as a small marking of your design, and carries a fragment of your chakra.</p><p>When
      you seal a genjutsu into a creature, you must establish a condition for the seal to activate and unleash the
      jutsu.</p><p>Below are a few examples of conditions you can make; The seal activates when the host of the seal
      comes into contact with X creature within the genjutsu's range.</p><p></p><p>The seal activates after X amount of
      hours.</p><p>The seal activates when the host of the seal would be damaged/placed under the effects of a type of
      jutsu.</p><p>The seal activates when the host of the seal runs out of a specific resource, such as hit points,
      chakra points, etc.</p><p></p><p>When the condition of your seal is met, your genjutsu activates as if you cast
      it, executing whatever task you set for its trigger.</p><p>If the genjutsu would affect another creature, all
      other creatures that could be affected must make a Charisma saving throw against your Genjutsu's Save DC,
      suffering the full effects on a failure.</p><p>You can only have 1 seal active at a time and each seal lasts for 1
      day.</p><p>You can also, as a reaction, manually activate the seals if you are within 60 feet of the
      creature.</p><p></p>
