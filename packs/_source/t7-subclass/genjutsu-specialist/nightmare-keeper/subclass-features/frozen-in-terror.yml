img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Beginning at 14th level, your mastery of fear can freeze your enemies in their tracks.</p><p> As a reaction to
      you or a creature you can see within 60 feet of you being targeted by an attack or effect, you can force the
      triggering creature to make a Wisdom saving throw.</p><p> On a failed save, the creature gains up to three ranks
      of fear and becomes paralyzed until the end of the current turn.</p><p> Each time the paralyzed creature is
      damaged, it can remake the saving throw, ending the effects on a successful save.</p><p> On a successful save, you
      cannot use this feature again until you finish a long rest.</p><p></p>
