name: Pure Terror
type: feat
_id: tMB3z0zZbpcBAWxo
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Also at 2nd level, when you cast a genjutsu that would inflict a Mental or Sensory condition on a creature, you
      can choose to inflict a rank of fear instead of one of the listed conditions.</p><p> The fear's duration becomes
      the duration of the condition it replaced.</p><p> You can only use this feature once per casting.</p><p>
      Additionally, when you deal psychic damage to a creature that possesses ranks of Fear, you deal an additional 1d4
      damage per rank of fear they possess, once per turn.</p><p> If the fear they possess is against you, this damage
      becomes a d6.</p><p></p>
