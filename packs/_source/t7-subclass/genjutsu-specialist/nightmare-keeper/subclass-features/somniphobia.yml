system:
  description:
    value: >-
      <p>Beginning at 10th level, when a creature would fail a saving throw against a Genjutsu you cast that inflicts
      ranks of fear, you can spend 1 Actualization Die to give all hostile creatures within 10 feet of the creature a
      number of ranks of fear equal to half the triggering creature's current ranks of fear, rounded down.</p><p> You
      can do this twice per short rest.</p><p></p>
