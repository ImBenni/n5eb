system:
  description:
    value: >-
      <p>Starting at 6th Level, when you cast a Genjutsu while your target is under the effects of Sensing Technique,
      they cannot gain advantage on the save in anyway.</p><p> Additionally, if a creature would succeed on a saving
      throw against your Genjutsu while your target is under the effects of Sensing Technique, you can force them to
      roll again, at disadvantage.</p><p> Once you use Chakra Distortion in this way you cannot do so again until you
      finish a long rest.</p><p></p>
