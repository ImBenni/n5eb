system:
  description:
    value: >-
      <p>Also, at 2nd Level if a creature is under the effects of Sensing Technique, you know an amount of their chakra
      natures equal to your Genjutsu Casting Modifier, (min of 1).</p><p> Additionally, you can use your reaction to
      give yourself advantage on any elemental jutsu they cast using a chakra nature you learned with this
      feature.</p><p> This reaction can be used an amount equal to your proficiency bonus.</p><p> You regain all
      expended uses on a long rest.</p><p></p>
