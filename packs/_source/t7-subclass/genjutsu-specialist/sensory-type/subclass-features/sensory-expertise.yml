system:
  description:
    value: >-
      <p>When you choose this path at 2nd level, you gain a unique version of the D-Rank Ninjutsu Sensing
      Technique.</p><p> It loses the Ninjutsu keyword, and gains the Genjutsu keyword.</p><p> If you already know this
      genjutsu, you learn a different E-Rank genjutsu of your choice.</p><p> You do not need to spend chakra to maintain
      concentration on this version of the Sensing Technique, and it does not count against your concentration
      limit.</p><p> The genjutsu you learn this way does not count against your number of jutsu known.</p><p> When you
      would cast Sensing Technique, you can upcast it, At Higher Ranks: For each rank you cast this jutsu above D-Rank,
      increase the cost of this jutsu by 3 and the chakra field by double.</p><p> Additionally, Genjutsu you cast while
      your target is under the effects of Sensing Technique, has its DC increased by +1.</p><p> This bonus increases to
      +2 at 10th and +3 at 19th levels.</p><p></p>
