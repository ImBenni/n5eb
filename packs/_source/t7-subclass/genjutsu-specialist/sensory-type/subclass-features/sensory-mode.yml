system:
  description:
    value: >-
      <p>Beginning at 10th level you can churn the chakra within your body to enhance your sensory capabilities.</p><p>
      You gain 30 feet of chakra sight and while a creature is within your chakra sight range you cannot be surprised by
      them.</p><p> While a creature is within your chakra sight range you can spend 1 Actualization Die to mark
      them.</p><p> While marked this way all allies can see their chakra signature and they cannot gain the benefits of
      being invisible or hidden.</p><p></p>
