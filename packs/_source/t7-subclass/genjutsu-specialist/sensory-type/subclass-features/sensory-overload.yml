name: Sensory Overload
type: feat
_id: Bl7vITXO2bXR5TvA
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>At 14th level, you have learned how to overload a creatures senses, by subtling altering their chakra flow with
      Genjutsu.</p><p> While you are using Sensing Technique, you can target a creature in range, who has at least 1
      chakra nature you can spend an action to make an Illusions Check (Wisdom) vs their Ninjutsu Save DC.</p><p> On a
      success, that creature has disadvantage using jutsu of 1 elemental keyword of your choice that they have.</p><p>
      Creatures also have advantage on saves using the associated keyword.</p><p> This effect persists, as long as they
      are under the effects of your Sensing Technique.</p><p> You can use this ability once per long rest.</p><p> Also
      at 14th level, you gain a unique version of the B-Rank Ninjutsu Kagura's Mind Eye.</p><p> It loses the Ninjutsu
      keyword, and gains the Genjutsu keyword.</p><p> If you already know this genjutsu, you learn a different B-Rank
      genjutsu of your choice.</p><p> The genjutsu you learn this way does not count against your number of jutsu
      known.</p><p> All the benefits of Sensory Type now apply to Kagura's Mind Eye as well.</p><p></p>
