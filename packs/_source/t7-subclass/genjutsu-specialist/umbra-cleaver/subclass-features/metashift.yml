system:
  description:
    value: >-
      <p>Also at 2nd level, your movement speed increases by 5 feet.</p><p>Your movement speed increases by 5 feet again
      at 6th (10ft), 10th (15ft), and 14th (20ft) levels.</p><p>While you are concentrating on a Genjutsu, on your turn
      you can choose to grant yourself the benefits of the Disengage action (no action required).</p><p>If you are
      concentrating on two Genjutsu, when you Disengage this way, you also gain the benefits of the Dash
      action.</p><p>This technique is taxing and you can only benefit from it a number of times equal to your Genjutsu
      ability modifier per rest.</p><p></p>
