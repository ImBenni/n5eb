name: Phantom Pain
type: feat
_id: ytbdLmjyXs7FVPxC
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>When you choose this pledge at 2nd level, you learn the E- Rank Genjutsu Pain.</p><p>If you already know this
      Genjutsu, you learn another E-Rank Genjutsu you qualify for.</p><p>When you cast Pain, instead of automatically
      applying its effects to a target, you can choose to make a ranged Genjutsu attack at the target within
      range.</p><p>When you do and score a hit, the effects of Pain apply first time a target takes damage on a turn for
      the duration, instead of instantly ending the first time the damage would trigger.</p><p>Scoring a critical hit
      with Pain this way, causes the creature to take the damage of Pain immediately.</p><p>(The damage can trigger
      again during this turn.) </p><p>Genjutsu you cast that require both a genjutsu attack roll and saving throw, has
      its DC increases by +1.</p><p>This bonus increases to +2 at 10th and +3 at 19th levels.</p><p></p>
