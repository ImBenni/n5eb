img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, your bonus to Genjutsu Save DC from your Phantom Pain feature now boosts Genjutsu attack
      bonus by the same amount.</p><p> Also, when you use your Actualization Die to boost the damage roll of a Genjutsu,
      increase the Genjutsu's bonus to hit by +1 for each die spent.</p><p> Also, when you would make a Genjutsu attack,
      if you possess a weapon you can change the range of the Genjutsu to the range of your weapon (the new range cannot
      be greater than the original genjutsu's range).</p><p> When you do, on a hit, you add your weapon's damage to the
      damage roll (Do not add your ability modifier), Also, Jutsu, Non-Genjutsu specialist features or feats that would
      increase your weapon's damage do not apply when using this ability.</p><p></p>
