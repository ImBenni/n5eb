system:
  description:
    value: >-
      <p>When you choose this path at 2nd Level, you gain the E-Rank Genjutsu, Mind Sliver.</p><p> If you already know
      this genjutsu, you learn a different E-Rank genjutsu of your choice.</p><p> The genjutsu you learn this way does
      not count against your number of jutsu known.</p><p> When you would cast Mind Sliver, it gains the Unaware
      keyword, and they subtract 1d6 from their next saving throw, instead of 1d4.</p><p> Genjutsu you cast with the
      Unaware keyword, has its DC increased by +1.</p><p> This bonus increases to +2 at 10th and +3 at 19th
      levels.</p><p></p>
