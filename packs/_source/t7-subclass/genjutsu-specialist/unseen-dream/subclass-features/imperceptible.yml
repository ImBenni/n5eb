system:
  description:
    value: >-
      <p>Starting at 6th level, you have begun to supress your chakra signature, allowing you to cast jutsu without
      anyone ever noticing.</p><p> You can make Genjutsu you cast with the Unaware keyword unable to be reacted to at
      casting, and unable to dispelled, countered, or negated until the end of your next turn.</p><p> You can use this
      feature a twice per long rest.</p><p> Additionally, when you cast a jutsu with the Unaware keyword you may ignore
      Hand Seal (HS) requirement.</p><p></p>
