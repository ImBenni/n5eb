name: Out Of Mind
type: feat
_id: sk1TmcPBYMM65asj
img: icons/magic/symbols/triangle-glow-purple.webp
system:
  description:
    value: >-
      <p>Starting 14th level, your stealth has grown with your Genjutsu prowess.</p><p> When you are concentrating on a
      Genjutsu you cast the Unaware keyword you gain advantage on Stealth checks.</p><p> Additionally, casting Genjutsu
      with the Unaware keyword in the first round of combat does not automatically remove you from stealth.</p><p> Also
      at 14th level, when a creature falls under a Genjutsu that battle has already been won.</p><p> When a creature
      fails a saving throw against a jutsu with the Unaware keyword they become exceedingly easy to control.</p><p> You
      can spend 3 Actualization Dice to, for the duration of the jutsu, gain advantage on ability checks and saving
      throws they force you to make, they also have disadvantage on attack rolls against you as you minutely guide their
      thoughts.</p><p> While a creature is under the effects of this feature you can hear their thoughts.</p><p></p>
