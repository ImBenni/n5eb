system:
  description:
    value: >-
      <p>Also at 7th level, when you begin a conversation with a creature you can make an Intelligence (Intimidation)
      check contested by the humanoid's Wisdom (Insight) check to exert your will over the conversation. On a success,
      they are marked as your <em><strong>Primary Target</strong></em> and gain 1 rank of fear against you and you have
      advantage on any contested checks against the target until your conversation ends.</p><p>If you engage in combat
      with a creature marked in this way, you gain advantage on initiative and the first attack made targetting your
      <em><strong>Primary Target</strong></em>.</p>
