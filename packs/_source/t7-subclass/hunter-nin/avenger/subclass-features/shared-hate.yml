system:
  description:
    value: >-
      <p>Also, at 3rd level, a creature marked by <em><strong>Primary Target</strong></em> can take additional damage
      from your allies as if they had the <em><strong>Lethal Attack</strong></em> feature. <br />You can use this a
      number of times equal to your proficiency bonus per long rest. You can use this feature once per
      round.</p><p>Additionally, as a reaction to being damaged by a creature you can see, you can mark them as your
      <em><strong>Primary Target</strong></em>. Allies can trigger <em><strong>Lethal Attack</strong></em> against a
      creature <br />who is marked in this way even if you would have disadvantage, as long as you meet the other
      requirements.</p><p>Finally, you gain exclusive access to the <em><strong>Oppressive Gaze</strong></em> Exploit.
      This does not count against your Exploit Limit.</p>
