name: Silent Rage
type: feat
_id: ZIe47PURVEWht0Xl
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Starting at 7th level, the force of your hatred can become tangible, and you can emanate pure hatred. As an
      action, you can project an aura of killing intent to every creature of your choice within 30 feet of you.
      Creatures in this aura must make a Wisdom saving throw vs your Ninjutsu or Taijutsu save DC (your choice.) Your
      <em><strong>Primary Target</strong></em> makes this save at disadvantage.</p><p>On a failed save, they suffer from
      a special rank of charmed for 1 minute called cowardice. A creature who has ranks of cowardice cannot have their
      cowardice removed by any jutsu, features, or traits. If your <em><strong>Primary Target</strong></em> is affected
      by this feature, you can immediately make an attack against them as a bonus action. They cannot react to this
      attack. A creature can only be affected by this feature once per long rest.</p><p>Starting at 15th level, at you
      ignore immunity to charmed and fear. Additionally, creatures gain a rank of fear, as well as charmed.</p><p>You
      may use this feature a number of times equal to half your Proficiency bonus per long rest.</p><p></p>
