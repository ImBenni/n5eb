system:
  description:
    value: >-
      <p>At 17th level, your focus and willpower has reached a point where it cannot be overpowered in anyway, short of
      your death. You cannot be charmed or controlled against your will, and jutsu you cast can no longer be ended as a
      result of damage or failing a concentration check.</p><p>Additionally, you gain immunity to the fear condition and
      when you would inflict a rank of charmed or fear you inflict an additional rank.</p>
