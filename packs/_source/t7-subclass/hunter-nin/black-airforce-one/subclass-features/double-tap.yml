system:
  description:
    value: >-
      <p>At 14th level, you've learned that some opps come back for round two and sometimes your team can't handle your
      light work. Time to lock in and put 'em in the dirt. When an attack you would make would cause a creature to
      become <em><strong>Hunted</strong></em> or a creature would recover Health after dropping to 0, you may
      immediately make an additional weapon attack or cast a jutsu that requires an attack roll targeting the
      creature.</p>
