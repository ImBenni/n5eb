system:
  description:
    value: >-
      <p>Ain't no way, he thought we weren't jumping? On God? At 17th level, when you are within 5 feet of a prone
      target, as a full-turn action you call your squad in to stomp them while they are down. Every allied
      creature(excluding clones) within 15 feet of you quickly run <br />over to help beat them up. Every creature who
      joins in must make a melee weapon attack.</p><p>On a hit, the creature deals your lethal attack damage to the
      target, with their damage type being the appropriate damage type of whatever weapon they used. You can use this
      feature once per long rest.</p><p></p>
