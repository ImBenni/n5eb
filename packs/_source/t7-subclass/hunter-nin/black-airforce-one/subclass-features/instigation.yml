system:
  description:
    value: >-
      <p>Also at 7th level, if you were in charge, then these problems wouldn't be happening right now. When you would
      make a check to try to convince a creature to start a fight or commit violence, you gain an additional 1d10 bonus
      to the roll. As an action, you may force any number of creatures who can hear you within 30 feet of you to make a
      charisma saving throw vs your taijutsu save dc. On a failed save, they gain the berserk condition against you.
      They must remake this save at the end of their turn to remove this condition.</p>
