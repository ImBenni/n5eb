system:
  description:
    value: >-
      <p>When you choose this Creed at 3rd level, you gain proficiency in Persuasion and Intimidation. Additionally, you
      can make an ability check using either of the skills using Strength or Charisma.</p><p>Also, you show your true
      nature and knock some heads all with one trick. You gain the martial melee weapons the <em><strong>Black Air
      Forces</strong></em>. You are proficient in wielding the <em><strong>Black Air Forces</strong></em>. They may use
      your unarmed damage die or the listed damage die. You may use the listed damage die for bukijutsu. If they would
      be destroyed or lost by any means you can rebuild them for 100 ryo on a rest.</p><p>Finally, you know some special
      techniques to make force. You can select one of the Airforce Techniques below. They only apply while you are
      wearing the <em><strong>Black Air Forces</strong></em> You can switch your Airforce Technique when you complete a
      rest of any type. You can select a second technique when you reach 10th level;</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-airforce-technique-table.webp" />
