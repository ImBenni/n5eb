system:
  description:
    value: >-
      <p>Also at 10th level, you go way too crazy when the situation does not call for it. But you always gotta keep it
      100% real. When a creature would try to threaten you or an allied creature within 10 feet of you, you start to
      press them. You may make an intimidation check vs their intimidation check. On a success they immediately gain one
      rank of fear towards you and try to calm down the situation. A creature affected by this cannot be affected again
      for 24 hours.</p>
