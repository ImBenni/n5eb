system:
  description:
    value: >-
      <p>Beginning at 3rd Level, you gain proficiency in the Crafting and Performance skills. You can make any checks
      with the aforementioned skill using Charisma or Dexterity.</p><p>Also, you've taken in the teachings of previous
      users of this creed and sensory ninja, learning how to fight and make ninja tools specialized in neutralizing an
      opponent's senses. You gain proficiency in the demolitionist kit and may make smoke bombs and shock bombs
      alongside the original options, these all become your <em><strong>Cacophony Bombs</strong></em>.
      <em><strong>Cacophony Bombs</strong></em> made from a demolitionist kit may use your Taijutsu Save DC instead of
      their original Save DC. Additionally, whenever you use explosive tag bombs creatures caught within the initial
      explosion must make a constitution save or be deafened until the end of their next turn, if you use smoke bombs,
      they must make a constitution save or be blinded until the end of its next turn. Finally, the way you use your
      bombs and weaponry is different from other combatants, you may pick one of the following Flamboyant Fighter
      Techniques, showcasing your own style of fighting. You can switch your Flamboyant Fighter Technique when you
      complete a rest of any type.</p><p>You can select a second property when you reach 10th level.;</p>
