name: Cacophony Weapon
type: feat
_id: 7VRQDCsa7oifY9RM
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, you learn to extend the range of a weapon you're using, making it accessible to be used in
      tandem with your explosions. Select 1 melee weapon you're proficient in, adding a chain to the end of the weapon.
      Your weapon now has the reach property if it didn't before, and if it had it already it gains another rank. This
      weapon becomes your <em><strong>Cacophony Weapon</strong></em> and may only have a maximum of 3 ranks of reach due
      to features from this subclass. Your <em><strong>Cacophony Weapon</strong></em> now does force damage in addition
      to its normal damage for the purposes of overcoming resistances and immunities, and every 5 explosive tag ball,
      smoke bomb, shock bomb, poison tag now counts as 1 bulk. These bombs can now be thrown using your Strength or
      Dexterity modifier. As a bonus action you may choose to throw one of these bombs or apply it to your weapon,
      causing the bomb's effects to go off on a successful weapon attack, affecting only the targeted
      creature.</p><p>Also, you gain exclusive access to the <em><strong>Flamboyant Link</strong></em>, Hunter Exploit.
      This does not count against your Exploit Limit.</p>
