name: Flamboyant Finale
type: feat
_id: A8JO9i51e49yWdi6
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <div class="page phb" id="p72"><div class="columnWrapper"><p>Starting at 17th level, you plan for one final
      bombastic display of pure flamboyance and flash, one that just might be too much for your weapon to manage. By
      spending 2 charges of a demolitionist kit and an action, you may add 2 to 3 cacophony bombs to your weapon for a
      maximum of 3. These bombs must be the same type, though they can differ in quality. When you take the attack
      action you can choose to trigger these prepared bombs, utilizing them all at once following the rules set by your
      <em><strong>Cacophony Weapon</strong></em> feature. After the effects are calculated you must make a performance
      check, adding a 1d4 instead of the normal expertise bonus, vs a DC of the highest quality bomb you
      used.</p></div></div><div class="page phb" id="p73"><div class="columnWrapper"><p>  If you used a bomb that was
      above the normal quality, the DC is increased by +1 by each stage above standard for each bomb. If you pass this
      check nothing happens, but if you fail your weapon is irreversibly destroyed. If your weapon is a higher quality
      than the standard quality, you may reduce the check by 1 for every quality higher than standard. Regardless of if
      your weapon is broken or not you may not prepare another weapon like this until you <br />take a long rest and
      have finished the use of this feature.</p></div></div>
