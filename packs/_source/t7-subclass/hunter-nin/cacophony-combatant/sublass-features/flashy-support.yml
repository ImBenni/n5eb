system:
  description:
    value: >-
      <p>Also at 10th level, the flashiness in your simply oozes out, adding an extra flash of flamboyance to whatever
      is happening around you. As a reaction to making an skill check you may, up to a number of times equal to half
      your proficiency modifier, add your performance modifier to a skill check you make, treating expertise as an extra
      1d4 instead of its normal bonus. Additionally, as a reaction, you may use this feature on a creature within 30
      feet of you. The uses of this feature reset on a long rest.</p>
