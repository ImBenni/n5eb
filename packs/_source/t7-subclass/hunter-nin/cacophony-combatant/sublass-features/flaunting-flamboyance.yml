name: Flaunting Flamboyance
type: feat
_id: wDw2W6f4N3ASZpNt
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Starting at 7th level, your mere presence in combat leads to a flamboyant aura surrounding you, drawing
      attention your way and dissuading gazes from looking away.</p><p>When you begin combat you may target all hostile
      creatures within 90 feet of you with a Performance Check vs a DC (13+ Number of targets). On a success you draw
      their attention strictly to you, making it so for their first turn during combat they have disadvantage on attack
      rolls not made against you. Alternatively, you can make this check outside of combat on any creatures of your
      choosing, using the same DC. On a success they have disadvantage on perception and insight checks not made against
      you for 10 minute.</p>
