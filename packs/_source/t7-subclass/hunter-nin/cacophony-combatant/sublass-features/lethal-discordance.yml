system:
  description:
    value: >-
      <p>Starting at 7th level you've learned to capitalize on the detriments your bombs inflict on an enemy. Whenever a
      creature is under the poisoned, blind, deafened, or shocked as a result of items, jutsu, feature, etc. that you
      inflict, you may trigger <em><strong>Lethal Attack</strong></em>. This does spend your normal once per turn
      limitation of <em><strong>Lethal Attack</strong></em>.</p>
