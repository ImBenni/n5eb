system:
  description:
    value: >-
      <p>Also at 3rd level, you've gained surface level control into the realm of time. This allows you to slow down
      time in risky scenarios. When you would be hit or targted by an attack, as a reaction you can give yourself the
      benefit of the dodge action until the beginning of your next turn.</p><p>Additionally, you gain access to the
      exploit, <em><strong>Return to Zero</strong></em>. This does not count against your known exploit
      limit.</p><pre><code></code></pre>
