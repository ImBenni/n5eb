system:
  description:
    value: >-
      <p>Starting at 7th level, your ability to modify the time stream is useful in more aspects than just
      combat.</p><p>While not in combat, when you would make an insight check against a creature, you may instead make a
      perception check in it's place. Additionally, while in a conversation, you may slow down time in your
      surroundings. You and all creatures involved in that conversation are unaffected. one minute of conversation is
      equal to six actual seconds. This ability can persist for one actual minute and can be used again in 30
      minutes.</p><p>When rolling initative at the beginning of combat, you may use your perception bonus(this does not
      benefit from expertise). If rolling for initative this way, on the first round of combat, you have +2 bonus to
      attack, damage, and saving throws against all creatures who's turn is after yours in the initative order.</p>
    chat: ''
