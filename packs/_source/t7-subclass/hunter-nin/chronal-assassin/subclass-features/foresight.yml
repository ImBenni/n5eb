system:
  description:
    value: >-
      <p>At 14th level, you are able to forsee the moves of your primary targets and make plans ahead of time. When you
      mark a creature as your primary target, you may immediately make a perception check vs their level+10. On a
      success, you may grant yourself advantage against any roll of your choice in relation to your primary target. Once
      this is used against a creature, this feature cannot affect them again until you take a rest.</p>
