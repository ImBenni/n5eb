  description:
    value: >-
      <p>Also at 10th level, you are able to learn from your mistakes and better yet you have the opportunity to fix
      things with your new knowledge. If in a conversation a creature would have a volatile reaction to something said,
      you may immediately rewind time to before the provoking words were said. Only you and the provoking creature
      remember what was said. You may do this once every 30 minutes.</p>
