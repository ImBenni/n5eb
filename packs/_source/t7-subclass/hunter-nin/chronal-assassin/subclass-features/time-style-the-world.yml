system:
  description:
    value: >-
      <p>At 17th level, your control of time has reached it's peak. Once per long rest, you can spend 15 chakra to pause
      time. You stop time for everyone but yourself for 1d4+1 turns. During this time, you can move and act as normal.
      This feature ends if you move a creature(Other than yourself) more than 30 feet from their original position or
      deal damage to a creature within the stopped time. within the stopped time. Anything you do, whether it be damage
      or some other effect cannot be reacted to. In addition, this feature ends if you move to a place more than 1,000
      feet from the location where you activated it.</p>
