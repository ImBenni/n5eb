system:
  description:
    value: >-
      <p>At 3rd level, you're able to alter the flow of time to better help you react to your surroundings. You gain
      proficiency in history and perception, you can make an ability check using either of the skills using Intelligence
      or Wisdom.</p><p>Additionally, when slow down time to avoid attacks you see the perfect chance to counterattack
      with a move of your own! Select one of the techniques below. If you would use the <em>Bullet Time</em> feature and
      cause the triggering attack to miss, you may activate one of these techniques. You may swap your selected
      technique on a rest. At 10th level, you may select another technique.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-time-assassination-technique-table.webp" />
