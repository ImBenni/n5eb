system:
  description:
    value: >-
      <p>At 7th level, you have learned how to slow down a creature's movement throughout the time stream. As an action,
      select a creature that you can see within 30 feet of you. The creature must succeed a Charisma save vs your
      ninjutsu save DC, on a fail the creature becomes slowed down by the weights of time.</p><p>Until the end of your
      next turn or until the creature takes any damage, the creature gains the slowed codition. You can use this feature
      a number of times equal to your proficiency modifier. You regain all expended uses when you finish a long
      rest.</p>
