system:
  description:
    value: >-
      <p>Your clone is no longer bound by the shackles of your regular form. At 17th level, as a full-turn action on
      your turn, you can cause your <em>multi-fold clone</em> to shift into the form of a creature within 30 feet of it.
      It gains the exact stats of the creature along with their jutsus. While this feature is active, it is treated as
      if concentrating on an S-rank jutsu. This lasts for one minute or until the clone dies. After this feature is
      used, it cannot be used again until the end of a long rest.</p>
