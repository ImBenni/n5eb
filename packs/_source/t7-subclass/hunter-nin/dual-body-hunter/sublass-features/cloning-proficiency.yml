name: Cloning Proficiency
type: feat
_id: MDrt3z9KiiWw249X
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>When you choose this Creed at 3rd level, you gain proficiency in Performance and Chakra Control. Additionally,
      you can make an ability check using either of the skills using Constitution or Charisma.</p><p>Also, You learn the
      <em><strong>Shadow Clone Technique</strong></em>. When casting this jutsu, a clone instead has 6 Health points and
      6 Chakra points, it has a duration of 24 hours, and it can produce a maximum of 10 clones. When you would summon
      more than one clone as a result of casting this jutsu, you instead only summon one clone, but this clone has the
      combined total Hit and Chakra points that all summoned clones would have separately. A clone summoned in this way
      is called a <strong>multi-fold clone</strong>. A multi-fold clone has no limits on jutsu casting and the duration
      of the jutsu This clone can trigger your lethal attack feature with a d6 die instead of a d8 and when you command
      it, the clone has an action, bonus action, and reaction. When you would take a rest, your multi-fold clone
      recovers an amount of Hit and chakra points equal to half of total that you recovered.</p><p>Finally, your finesse
      with clones have also taught you how to augment your <em>multi-fold clone</em> to be as skillful as you. Select
      one of the following Clone Assassination techniques augmenting the shadow clone technique jutsu when cast. A Jutsu
      with any of the following techniques cannot be taught to another creature and cannot be customized, modified or
      augmented using the Jutsu customization options or any Non-Hunter-Nin class features. You can switch your Clone
      Assassination Technique when you complete a rest of any type. You can select a second technique when you reach
      10th level;</p><img src="systems/n5eb/assets/content/cheat-sheets/t7-clone-assassination-technique-table.webp" />
