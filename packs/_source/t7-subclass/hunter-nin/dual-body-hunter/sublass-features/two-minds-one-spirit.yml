folder: byov5C8GUv1KGJka
name: Two Minds, One Spirit
type: feat
_id: rLOxEBj6NjzTTLCL
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also at 10th level, your clone can distract a creature, keeping them enthralled and away from your current
      position. If an aggressive creature would come to interrupt your current conversation or battle, you can send your
      clone to the creature to distract them. If it is a conversation, every minute your clone must make an performance
      roll vs the attack roll of the interrupting creature. On a fail, the clone takes the full damage of the attack and
      the same check must be made again until the clone either allows the creature to proceed or it is defeated. On a
      success, the clone continues to distract the creature and the contest can be remade after another minute has
      passed. If it is a combat, the check is made on the clone's turn, acting as it's full turn.</p>
    chat: ''
