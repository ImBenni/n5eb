system:
  description:
    value: >-
      <p>Also at 3rd level, once per casting, jutsu you cast with your chosen release's keyword add your casting
      modifier to a damage roll if it didn't already. When you would make an attack roll with a jutsu against a creature
      suffering from a condition corresponding with your <em><strong>Natural End Table</strong></em> your jutsu gains a
      +1 critical threat range.</p><p>Additionally, you gain exclusive access to the <em><strong>Natural
      Ascension</strong></em> Exploit. This does not count against your Exploit Limit.</p>
