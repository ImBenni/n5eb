system:
  description:
    value: >-
      <p>At 10th level, when you would deal damage with your <em><strong>Lethal Attack</strong></em> using the damage
      type of your chosen element against a creature, you deal an additional die of damage and leave behind a remnant of
      your nature chakra within them.</p><p>Until the end of your next turn, you may as a bonus action ignite the
      elemental chakra within them. When you do, all creatures within 5 feet of the creature must make a Dexterity
      saving throw against your Ninjutsu Save DC. On a failed save, they take the damage of your <em><strong>Lethal
      Attack</strong></em>, corresponding to the damage type of your chosen release, or half as much on a
      success.</p><p>You may use this feature a number of times equal to your Intelligence modifier per long rest.</p>
