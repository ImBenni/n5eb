system:
  description:
    value: "<p>Also at 7th level, you have learned to control your elemental prowess into more precise, and devastating attacks. When you make an attack roll against your <em><strong>Primary Target</strong></em> with a Ninjutsu with any Elemental Release Keyword, you may invoke <em><strong>Lethal Attack</strong></em> regardless of circumstance. You may use this feature a number of times equal to your half your proficiency bonus (rounded up) per short rest.</p><p>Additionally, when you score a critical hit while dealing a damage type granted you by this subclass,  \_you automatically inflict 1 rank of the condition listed on the <em><strong>Natural End\_Table</strong></em>.</p>"
