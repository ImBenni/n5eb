system:
  description:
    value: >-
      <p>When you choose this Creed at 3rd level, select one nature release. (Earth, Wind, Fire, Water, or Lightning
      Release). If you select a nature release you already have, you can instead learn one jutsu of the chosen nature
      release that you qualify for. You are now able to add jutsu with the corresponding keyword to your jutsu
      list.</p><p>Additionally, you gain proficiency in Ninshou and Chakra Control and ability checks using either of
      these skills using Constitution or Intelligence.</p><p>Finally, you have learned to augment even the most basic
      strikes into explosive displays of power. When you deal damage to a creature with <em><strong>Lethal
      Attack</strong></em> you can change the damage type to your nature release's corresponding damage type. (Water
      Release = Cold). This damage ignores resistance.</p><p>Starting at 10th level, damage dealt this feature treats
      immunity as resistance. (These do not stack.)</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-natural-end.webp" />
