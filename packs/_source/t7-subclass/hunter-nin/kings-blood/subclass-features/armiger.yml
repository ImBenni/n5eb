system:
  description:
    value: >-
      <p>At 17th level, once per Long Rest as a Full Turn Action, you summon all the Weapons from your <strong>Royal
      Armory</strong> for 10 minutes even if they've been used already. For the duration, when you take the Attack
      Action you instead gain a number of attacks equal to the amount of <strong>Royal Armory</strong> weapons you have
      active. But you may only attack once with each weapon. You cannot add outside bonus' or damage dice to these
      attacks.</p><p>Additionally, each time you make a weapon attack, you can choose to teleport to a space within 5
      feet of your target, when you do so, add a d4 to the attack and damage roll. <br />(This does not
      stack.)</p><p>Finally, as a Full Turn Action, you may summon all the weapons together for a final attack, called
      <strong>Final Prophecy.</strong> Add together all the damage dice and modifier of each weapon together, make a
      single attack using your highest weapon bonus. Once this attack is used, this feature ends.</p>
    chat: ''
