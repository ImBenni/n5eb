name: King's Blood Proficiency
type: feat
_id: StIzrnuFgihz2LqZ
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>When you choose this Creed at 3rd level, You gain proficiency in Ninshou, and Sleight of Hand skills. You can
      make any checks with the aforementioned skill using Intelligence or Dexterity.</p><p>Additionally you have begun
      the steps to harness the greatness that resides in your blood. Either by recieving it from a family member, or
      finding it in your estate. You have recieved the <strong>Ring of Kings</strong>. While you wear this
      indestructible item, you are granted access to the <strong>Royal Armory</strong>, a collection of weapons passed
      down from prior ages. As a Bonus Action, you may summon any of these weapons from your <strong>Ring</strong> into
      your hand. Each weapon can be summoned once per short rest, and last for a minute. Or until you dismiss them. You
      are considered to be proficient with each of these weapons.</p><p>You may use Dexterity or Intelligence for attack
      and damage rolls in regards to these weapons, and substitute any effects or weapon properties that would use
      another ability score for those mentioned above.</p><h4 id="king-s-knowledge">King's Knowledge</h4><p>Also at 3rd
      level, you can call upon the aid of the beings in your <strong>Ring of Kings</strong> to give you advice and
      wisdom. You can add a d4 to any Wisdom, Charisma, or Intelligence skill check, or saving throw, a number of times
      equal to your proficiency bonus per long rest. This becomes a d6 at 10th level, and a d8 at 17th
      level.</p><p>Additionally, you gain exclusive access to the <strong>Lord's Aura</strong>, Hunter Exploit. This
      does not count against your Exploit Limit.</p>
