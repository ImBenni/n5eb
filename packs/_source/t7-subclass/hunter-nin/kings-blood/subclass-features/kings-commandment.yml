system:
  description:
    value: >-
      <p>Also at 7th level, the strength of your blood can be manifsested to protect your allies in battle.</p><p>As an
      Action, choose a number of allies up to your Dexterity or Intelligence modifier, then make a Ninshou check, DC 8 +
      your level, + the number of allies affected by this feature. If you succeed, you may remove any number of ranks of
      a condition of B-Rank or lower on each ally.</p><p>Additionally, if you successfully remove a condition, you give
      them Resistance to the condition until the end of their next turn, and Temporary HP equal to your Hunter-nin
      level. you may use this feature twice per long rest.</p><pre><code></code></pre>
