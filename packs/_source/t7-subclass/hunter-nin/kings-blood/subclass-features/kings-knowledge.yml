system:
  description:
    value: >-
      <p>Also at 3rd level, you can call upon the aid of the beings in your <strong>Ring of Kings</strong> to give you
      advice and wisdom. You can add a d4 to any Wisdom, Charisma, or Intelligence skill check, or saving throw, a
      number of times equal to your proficiency bonus per long rest. This becomes a d6 at 10th level, and a d8 at 17th
      level.</p><p>Additionally, you gain exclusive access to the <strong>Lord's Aura</strong>, Hunter Exploit. This
      does not count against your Exploit Limit.</p>
