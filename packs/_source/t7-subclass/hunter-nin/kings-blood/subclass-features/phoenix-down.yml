system:
  description:
    value: >-
      <p>Beginning at 14th level, during the duration of a Long Rest, you may spend three Hit Dice, and three Chakra die
      to make a powerful healing item known as a <strong>Phoenix Down.</strong> You may only have access to three of
      these fabled items at once, and an ally may only use one per Full Rest. As an Action, you may place this item on
      an ally who is at 0 Hit Points, absorbing the energy of a Phoenix into them. This grants them the benefits of a
      Long Rest, regaining any features spent, and half their maximum Hit Points and Chakra.</p>
