system:
  description:
    value: >-
      <p>Also at 10th level, your creativity and personality have come forfth in ways you couldn't have dreamed,
      becoming a unique King as your path dictates.</p><p>As an Action on your turn, choose three weapons from your
      <strong>Royal Armory.</strong> You combine them all into a fierce weapon that only someone of your caliber could
      wield. For one minute, you gain all the effects of each of the three weapons you have chosen, using the highest
      damage dice between them for your damage rolls, but the weapon still qualifies for Buki of other damage types. At
      the end of the duration, you lose access to the three weapons you have chosen until the end of a long rest. You
      may use this feature once per long rest.</p><p>Additionally, you may cast Bukijutsu using your Intelligence score
      to calculate attack rolls and save DC when wielding a <strong>Royal Armory</strong> weapon.</p><p></p>
