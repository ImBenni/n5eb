system:
  description:
    value: >-
      <p>Starting at 10th level, you can choose the other option you didn't choose with your <em><strong>Lethal
      Precision</strong></em> feature. This grants you access to the other option with <em><strong>Self Sufficient
      Armory</strong></em>.</p><p>Additionally, you can attack with your <em><strong>Symbiotic Weapons</strong></em> as
      a bonus action when you would take the attack action or use them as a component in a Taijutsu or Bukijutsu. You
      can also change the damage type of these weapons to be Necrotic or that of a nature release you possess
      (Water=Cold).</p><p>Finally, your Passenger gains a number of seal slots equal to your proficiency bonus, which
      can only affect your <em><strong>Symbiotic Weapons.</strong></em></p>
    chat: ''
