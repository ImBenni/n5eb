name: Self-Sustaining Armory
type: feat
_id: w4R5v6fDDSboyamG
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also at 3rd level, as a token of appreciation for allowing yourself to become your Passenger's host, your
      Passenger makes certain that you never come to battle unarmed.</p><p>Depending on the option you picked with your
      <em><strong>Lethal Precision</strong></em> feature, your Passenger improves on your ability, granting you one of
      the <em><strong>Symbiotic Weapons</strong></em>;</p><ul><li><strong>Taijutsu:</strong> On your turn, you can have
      your Passenger produce a tendril on one of your arms of their physical form. Your unarmed damage die becomes 1d6
      piercing, bludgeoning, or slashing damage (pick one). If your unarmed damage is higher than a 1d6, it instead
      increases by 1 step. Your unarmed attacks also gain the reach property, of a rank equal to half your proficiency
      bonus, alongside the Critical and Deadly properties. Taijutsu you cast increase their range by 5 feet for each
      rank of reach.</li><li><strong>Bukijutsu:</strong> On your turn, you can have your Passenger produce any melee
      Simple or Martial weapon of its physical form. This weapon gains a +1 to attack and damage rolls, and the reach
      property of a rank equal to half your proficiency bonus. The range of Bukijutsu you cast increases by 5 feet for
      each rank of reach you have.</li></ul><p>Also, you gain access to the <em><strong>Consumption</strong></em> Hunter
      Exploit. This does not count against your Exploit Limit.</p>
