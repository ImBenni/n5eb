system:
  description:
    value: >-
      <p>When you choose this Creed at 3rd level, you gain proficiency in Acrobatics and Survival, and can use Dexterity
      or Charisma for ability checks made with either skill.</p><p>Also, you have discovered and bonded your body with a
      parasitic creature known as your <strong>Passenger.</strong> This creature has its own name and appearance, as
      denoted by your DM. The creature's presence begins to transmogrify your body on a cellular level. Your movement
      speed increases by 5ft, your climbing speed becomes equal to your movement speed, and your passive perception and
      passive insight increase by your Constitution modifier.</p><p>Additionally, your Passenger's species is host to a
      myriad of strange and unique abilities. You gain one <em><strong>Passenger Technique</strong></em>. You gain
      another technique at 10th level. You can switch your known techniques on a rest of any type.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-passenger-techniques-table.webp" />
