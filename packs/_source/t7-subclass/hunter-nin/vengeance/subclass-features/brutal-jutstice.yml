folder: MEjFMwZdOVorQ1oW
name: Brutal Jutstice
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also at 10th level, your experience on the battlefield has granted you immense constitution, and the knowledge
      of how to break stubborn criminals. While in combat, you reduce all damage you receive by -1 per hostile creature
      within 60 feet of you (Max. -3).</p><p>Additionally, you can choose to make any damage you deal, either physically
      or from a condition, lethal or non-lethal.</p><p>Finally, while engaged in a social encounter with a creature you
      or an ally are trying to gain information from, and you are not in combat, you can as a reaction, immediately hit
      the creature, dealing your unarmed damage, rerolling any 1s or 2s, and dealing an injury such as a broken tooth, a
      broken nose, etc. The next Persuasion, Intimidation, or Investigation check you make against this creature gains a
      bonus to the result equal to half the damage dealt. You can benefit from this feature once per hour.</p>
    chat: ''
