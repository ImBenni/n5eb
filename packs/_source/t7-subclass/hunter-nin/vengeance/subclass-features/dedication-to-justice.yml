folder: MEjFMwZdOVorQ1oW
name: Dedication to Justice
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also at 3rd level, you have adapted a fighting style that emodies your dedication to justice. Your unarmed
      damage die becomes 1d6 and counts as chakra enhanced. Your unarmed damage die increases to a 1d8 at 7th level and
      a 1d10 at 14th level.</p><p>When you would be hit by a creature, you can make an attack of opporunity, or make 1
      unarmed attack against them, once per turn, per creature. Taking an attack of opportunity this way does not expend
      a reaction, and you can move up to 10 feet to hit the triggering creature.</p><p>Also, you gain exclusive access
      to the <em><strong>Echolocation</strong></em> Hunter Exploit. This does not count against your Exploit Limit.</p>
