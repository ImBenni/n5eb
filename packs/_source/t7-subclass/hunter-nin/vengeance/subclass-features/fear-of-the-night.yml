folder: MEjFMwZdOVorQ1oW
name: Fear of the Night
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Also at 7th level, your presence causes the hearts of the feeble to quiver at just the mere thought of you. You
      gain proficiency in medium and heavy armor, ignoring any penalties you may have to stealth.</p><p>While out of
      combat and in Stealth, if you are within 5 feet of a creature and they have not spotted you, you can attempt a
      <em><strong>Takedown.</strong></em> Make a Martial Arts check vs. a DC equal to 8 + the target's level. If you
      have expertise in Martial Arts, you instead add a +1d4 to your roll in place of expertise. On a success, you sneak
      up behind the creature subduing and knocking them unconscious until they damage, are placed under a hostile
      effect, or someone goes to wake them up. A successful <em><strong>Takedown</strong></em> does not break
      stealth.</p><p>On a failed check, the creature becomes aware of your presence and you cannot attempt a
      <em><strong>Takedown</strong></em> again for 10 minutes. You cannot use <em><strong>Takedown</strong></em> on Solo
      adversaries.</p>
