folder: MEjFMwZdOVorQ1oW
name: Mortal Strength
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Starting at 10th level, your rage towards those who perform the diabolical blends with your righteous spirit,
      coverging into vilgilante that walks the path of light and dark.</p><p>When you would cast a Taijutsu that
      innately requires a single attack roll, you gain a +2 to critical threat range and increase the damage die by
      +1.</p><p>If you cast a Taijutsu that requires multiple attack rolls, you can, against your <strong>Primary
      Target</strong> make a single attack roll, dealing the damage of all of your attacks on a hit. If you score a
      critical hit using this feature you do not double the damage dice, instead, you automatically inflict a condition
      based on unarmed damage's damage type. <em>(Bludgeoning - 2 ranks of Bruised, Piercing - 1 Rank of Weakened,
      Slashing - 2 ranks of Bleeding)</em></p><p>Finally, attacks you make using your <em><strong>Dedication to
      Justice</strong></em> feature can trigger <strong>Lethal Attack</strong> any number of times per turn, however,
      you cannot perform Lethal Attack on the same creature more than once per turn.</p>
