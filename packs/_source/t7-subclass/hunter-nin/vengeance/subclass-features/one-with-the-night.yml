folder: MEjFMwZdOVorQ1oW
name: One With The Night
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Starting at 7th level, the darkness that clouds other shinobi in fear and mystery becomes your ally in your
      righteous endevors.</p><p>You gain 20 feet of blindsight and have advantage on Perception checks to locate
      creatures attempting to hide from you using darkness of any kind, of any source.</p><p>Additionally, while you are
      in a lightly obscured (Dim Light), you gain a +2 to to unarmed, Taijutsu, and Gadget attack rolls.</p><p>If you
      are instead in total darkness or a heavily obscured area, you instead gain advantage.</p><p></p>
