name: Prep Time
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>During times of rest, you prepare with maximum efficiency. Starting at 14th level, when you take a long rest,
      select one <strong>Gadget</strong>. Use of this gadget does not count against your Gadget use
      limit.</p><p>Additionally, you have advantage on rolls to prevent and/or end the Grappled or Restrained
      conditions. For every additional round you remain Grappled or Restrained, you gain a +1d4 bonus to the roll to
      free yourself (This stacks).</p>
