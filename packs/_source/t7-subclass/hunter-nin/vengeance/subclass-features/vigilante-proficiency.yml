name: Vigilante Proficiency
type: feat
img: icons/skills/targeting/crosshair-scope-sniper-green.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you gain proficiency in Perception and Martial Arts skills and you can use Strength or
      Intelligence for checks made with either skill.</p><p>Also, you have developed your own technology to help assist
      you in your endevors. Hidden throughout your clothes and/or armor are small <strong>Gadgets</strong>. Each gadget
      is a useful tool that assists you both in combat as well as finding the truth. Select two of the following
      <em><strong>Gadgets</strong></em>. You can select two more Gadgets at 10th level. You can use these gadgets a
      number of times equal to your proficiency bonus per long rest.</p>
