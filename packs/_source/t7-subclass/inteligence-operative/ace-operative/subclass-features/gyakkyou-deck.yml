system:
  description:
    value: >-
      <p>When you choose this Strategy at 3rd level, you have a knack for all card games and you know when to call
      someone's bluff. You gain proficiency in Insight and you if you already had proficiency in Insight, you instead
      gain expertise.</p><p>Additionally, your love of card games has lead you to create a special set of cards that you
      can use in battle called <em><strong>Gyakkyou</strong></em> this deck has been infused with your chakra through
      the use of seals. You can draw from this deck as a free action on your turn, once per turn.</p><p>The deck has 54
      cards, 13 in each suit and two joker cards. These cards are drawn at random facedown and you roll (1d100+1d8)/2 to
      determine which card you draw. You can benefit from these cards a number of times equal to your proficiency bonus
      per long rest. You may spend a Brave Order to draw from this deck again.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-gyakkyou-card.webp" /><p></p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-gyakkyou-card-cont.webp" /><p></p>
