system:
  description:
    value: >-
      <p>Starting at 17th level, you have embraced your <em><strong>Gyakkyou Deck</strong></em> and have begun to show
      your full hand. As an action, you may draw 5 cards from your deck, ignoring any usage limits. You gain the
      benefits of each card, but you cannot gain the benefit of any these cards again until you finish a long rest. If
      you would draw a card that you cannot gain the benefits of you may draw from the deck again, until you get a
      usable result. You may do this twice per long rest.</p><p>Additionally, when you draw a card using your free
      action you may draw an additional card.</p><p></p>
