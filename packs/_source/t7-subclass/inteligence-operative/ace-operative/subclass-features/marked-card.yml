system:
  description:
    value: >-
      <p>Starting at 6th level, you have begun to mark a single card to ensure your scheme goes according to plan.
      Choose a card from any suit that is between 2 and 6. That card becomes your <em><strong>Marked Card</strong></em>
      and you can spend a Dogma or a Brave Order to draw this card on command.</p><p>Beginning at 13th level, you also
      marked a  second card, allowing you to more reliably get more desirable outcomes. Choose a card from any suit that
      is between 7 and 10. This card shares the same benefits as the card you selected at 6th level.</p>
