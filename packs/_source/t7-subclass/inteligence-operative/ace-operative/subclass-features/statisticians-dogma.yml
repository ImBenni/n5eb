folder: 4KrEEZVdT8ToAqUm
name: Statistician's Dogma
type: feat
_id: Sz5a37qhCAtmpSll
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>Also at 3rd level, you know that certain probablities can only happen so often before a more favorable result
      becomes the more probable outcome. When you or an allied creature you can see fails an attack roll, ability check,
      or saving throw you gain a use of your <em><strong>Statistician's Dogma</strong></em>.</p><p>You can have a
      maximum number of Dogma equal to half your proficiency bonus (rounded up). You can only use this feature a number
      of times equal to your proficiency bonus per long rest. These Dogma can be spent to do the
      following;</p><ul><li>Spend 1 Dogma to impose a -1 penalty a saving throw.</li><li>Spend 1 Dogma to impose a -2
      penalty on an attack roll.</li><li>Spend 1 Dogma to impose disadvantage on an ability check.</li><li>Spend 2 Dogma
      to change the suit of a card you drew from your <em><strong>Gyakkyou</strong></em>, replacing the initial
      result.</li><li>Spend 3 Dogma to draw from your <em><strong>Gyakkyou</strong></em> deck again, replacing the
      initial result.</li></ul>
