system:
  description:
    value: >-
      <p>Also at 3rd, you're able to predict the results of your gamble and you are damn good at it. You gain
      proficiency in the performance skill. When you would use the performance skill you may use your intelligence
      instead of charisma.</p><p>Once per long rest, when you would make an ability check, saving throw, or attack roll,
      you may roll a 1d4. On a 1-2 you treat the roll as a natural 20. on a 3-4 you treat the roll as a natural 1. As a
      bonus action, you may expend a brave order to regain another use of this feature before a long rest.</p>
