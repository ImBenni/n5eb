system:
  description:
    value: >-
      <p>Starting at 3rd level, instead of going with calculated precision, you instead leave it up to fate. In your
      deck you hold many wonderous cards. At the start of your turn, you may draw a card. Roll 1d6. You gain a buff
      based on the table below. Each effect lasts for an amount of rounds equal to your intelligence modifier(min 1) and
      you may apply it to yourself or an ally within 30 feet. You may only have one card active at a time.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-luck-of-the-draw.webp" />
