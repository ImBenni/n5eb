name: Shields of Seraphim
type: feat
_id: 7kbjFIOR4ZWUEdEc
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>With the power of the mystic arts, you create a new means of defense that is the iconic stable of shinobi who
      follow this master strategy. Starting at 6th level, as an action, you spend 10 chakra or 1 Brave Order, to weave
      the hand signs to create the <em><strong>Shields of Seraphim</strong></em>.</p><p>You manifest two small circlet
      shields of your design, one in each hand, granting you a +2 bonus to AC. You also gain a number of reactions equal
      to your Intelligence modifier (Max of 4), which can only be used to perform the following; You can also use your
      standard reaction for any of these features.</p><ul><li>Using 1 reaction, when you would take damage, you can
      block with one of your shields, reducing the damage by 2d10 + your Intelligence modifier.</li><li>By using 2 of
      your reactions, when you or an ally within 10 feet would take damage, you can combine both shields to make one big
      shield in front of the creature, reducing the damage by 3d10 + your Intelligence Operative level and providing
      half cover until the end of the turn.</li><li>By using 4 of your reactions, when you or an ally within 15 feet
      would take damage or fail a saving throw, you merge both shields and weave signs to expand its cover to all allied
      creatures within 15 feet of you. Each creature gains the benefits of total cover, and automatically passes their
      saving throw. These effects last until the end of the current turn.</li></ul><p>While your shields are active, you
      use your bonus action on subsequent turns to maintain them. You are still able to use your bonus action for
      Intelligence Operative features though. This feature ends when you dispel it or use all of your reactions.</p>
    chat: ''
