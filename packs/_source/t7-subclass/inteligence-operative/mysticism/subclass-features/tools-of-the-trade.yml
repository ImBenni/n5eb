system:
  description:
    value: >-
      <p>Starting at 13th level, your broadened knowledge has led you not only to learn of the mystic ways, but to
      improve upon them. Select 1 <em><strong>Mystic Art</strong></em> you possess or the <em><strong>Shields of
      Seraphim</strong></em>. The chakra cost of your chosen ability is reduced by half, rounded down, and gains an
      additional die of damage or damage reduction. If your chosen ability doesn't deal or reduce damage, increase your
      Save DC by +1 when casting the Art.</p><p>Additionally, if you do still use a Brave Order to cast your chosen
      ability, you can automatically set one <em><strong>Plan</strong></em> you know into motion. Alternatively, you can
      pay both the chakra cost and Brave Order cost of your chosen ability to activate a plan as if you enhanced it with
      a 2nd brave order. You can activate a plan this way a number of times equal to half your proficiency bonus, per
      long rest.</p>
