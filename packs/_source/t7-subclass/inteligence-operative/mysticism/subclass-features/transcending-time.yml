system:
  description:
    value: >-
      <p>Starting at 17th level, you have learned of and mastered the most powerful <strong>Mystic Art</strong>. This
      Mystic Art allows one to capture time and manipulate it to their benefit. On your turn, you can spend 15 chakra to
      engrave this art into your body for 10 minutes.</p><p>While this seal is engraved onto you, you can spend 1 Brave
      Order to rewind time to the moment you placed the seal on yourself, returning your character to the state they
      were at the time of casting. This effect occurs automatically in the event you reach 0 hit points or are
      killed.</p><p>Once this seal activates, you cannot use this Mystic Art again for 1 week.</p><p></p>
