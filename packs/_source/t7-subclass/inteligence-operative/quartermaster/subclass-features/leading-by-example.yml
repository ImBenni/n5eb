img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you can create opening for your allies to exploit, when a creature is affected by a
      bukijutsu with the combo keyword by you, you may spend a brave order, one allied creature other than you within
      30ft of you can target the affected creature with a Bukijutsu Finisher (casted as a finisher) regardless of range,
      once per turn, using a reaction, ignoring its listed casting time.</p><p>Also at 6th level, you can attack twice,
      instead of once, whenever you take the Attack action on your turn.</p>
