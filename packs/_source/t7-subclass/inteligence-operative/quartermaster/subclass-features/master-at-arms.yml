system:
  description:
    value: >-
      <p>Starting at 3rd level, you gain proficiency in martial arts and crafting, if you have proficiency in both of
      these skills, you instead gain expertise in one of them.</p><p>Additionally, when you analyze a hostile creature,
      bukijutsu cast with weapons with the finesse property against that target may use your Intelligence modifier
      instead of Strength or Dexterity.</p>
