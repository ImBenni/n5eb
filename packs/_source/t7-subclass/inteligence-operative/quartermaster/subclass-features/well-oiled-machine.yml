system:
  description:
    value: >-
      <p>You have trained your body and mind to reach a level of Zen where attacking does not take up any of your
      concentration allowing to formulate plans while pressing the attack. Starting at 13th level, when you take the
      Attack action, you can activate one of your plans as part of the same action.</p><p>In addition, you may spend an
      action to coordinate attacks with your allies, until the end of your next turn, once per round allied creatures
      within 30 feet of you gain a bonus to their weapon and unarmed damage rolls equal to your weapon's damage dice,
      you may do this a number of times equal to your intelligence modifier.</p>
