system:
  description:
    value: >-
      <p>Starting at 17th level, your mastery over manipulating creatures has reached a point of subtly, that even to a
      trained eye your tactics are imperceivable. As a bonus action, you can spend a Brave Order and target a creature
      currently with <em><strong>Exploit Weakness</strong></em> and force them to make a Wisdom saving throw against
      your Ninjutsu Save DC, on a failure the target creature cannot add their proficiency bonus to any attack roll,
      saving throw, or ability check. The affected creature repeats this saving throw at the end of each of their turns
      for the duration.</p><p>You may use this feature twice per long rest.</p><p></p>
