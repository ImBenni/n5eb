system:
  description:
    value: >-
      <p>When you choose this Strategy at 3rd level, you have learned to pressure others to submit to your will. You can
      make an Intimidation check with Intelligence instead of Charisma.</p><p>When you see a creature currently analyzed
      with <em><strong>Exploit Weakness</strong></em> cast a jutsu or use a feature, you can spend your reaction and a
      Brave Order to make an (Intelligence) Intimidation check contested by your target's Wisdom (Insight) check. On a
      success, that creature cannot use that jutsu or feature again until they are no longer analyzed by
      <em><strong>Exploit Weakness</strong></em>.</p><p>A creature can make a Wisdom saving throw against your
      Intimidation check at the end of their turns to end this effect.</p>
