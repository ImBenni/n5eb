name: Demoralize
type: feat
_id: t0HklDnPEmQTXBeA
img: icons/sundries/gaming/chess-pawn-white-pink.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you have learned to harness plans that were created for support offensively. You may now
      target a hostile creature currently analyzed with <em><strong>Exploit Weakness</strong></em> as if they were your
      allies, except with the inverse effect. For example, if an allied creature within 90 feet of would count as being
      in three quarters cover for ranged attacks, a hostile creature within 90 feet of you would not count as being in
      three quarters cover for ranged attacks. See the <em><strong>Demoralize Plans Table</strong></em> below to see how
      plans interact with this feature (Thanks Toggy).</p><p>Beginning at 13th level, you have learned to convert even
      the most devious plans, to be beneficial. You may now target a allied creature currently analyzed with
      <em><strong>Exploit Weakness</strong></em> as if they were a hostile, except with the inverse effect.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-demoralize-plans-table-1.webp" /><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-demoralize-plans-table-2.webp" /><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-demoralize-plans-table-3.webp" />
