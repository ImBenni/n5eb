system:
  description:
    value: >-
      <p>Beginning at 13th level, you have begun to split your focus between threats to your control. When you analyze a
      creature with <em><strong>Exploit Weakness</strong></em> you may spend a Brave Order to analyze another creature
      within 30 feet of you.</p><p>Additionally, You can use <em><strong>Exploit Weakness</strong></em> a number of
      times equal to proficiency bonus instead of your Intelligence Modifier before you need a long rest.</p>
