system:
  description:
    value: >-
      <p>When you choose this Strategy at 3rd level, you have practiced the ability of thinking at minimum ten steps
      ahead. As a bonus action you can subconsciously shift your view to a third person perspective in a 30 foot radius
      cube, viewing the battlefield as a chess board. While you have this active, you no longer have to be within 5 feet
      of an enemy to give advantage on attacks, as long as they're within range of Eagle's Eye, such as gaining
      advantage with the Help action or as the result of a creature being prone.</p>
