system:
  description:
    value: >-
      <p>Beginning at 13th level, your plans are becoming easier and easier, everything falls into place on the drop of
      the dime. Your Eagle's Eye range increases to a 90 foot radius cube.</p><p>Additionally you have officially
      reached the near pinnacle of your minds eye. A <em><strong>Pawn</strong></em> may now
      <em><strong>Promote</strong></em> to a new piece. The <em><strong>Queen</strong></em>, only one ally may be a
      <em><strong>Queen</strong></em>, at a time. Whoever is gaining the benefits of this promotion, always has
      advantage on attack rolls and saving throws. While adding half of your Intelligence modifier (Rounded up) to
      attack and damage rolls. This <em><strong>Promotion</strong></em> lasts for a number of rounds equal to your
      proficiency bonus.</p>
