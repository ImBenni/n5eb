  description:
    value: >-
      <p>At 11th level, the sanctity of life finally dawns on you, but you leave no room for your enemies to
      grieve.</p><p> Twice per combat when you kill a creature, your adrenaline flows as their body turns to
      dust.</p><p> You enter The Zone until the end of your next turn.</p><p> Additionally, while you enter The Zone in
      this way you gain resistance to the next instance of damage you take while benefitting from The Zone.</p><p></p>
