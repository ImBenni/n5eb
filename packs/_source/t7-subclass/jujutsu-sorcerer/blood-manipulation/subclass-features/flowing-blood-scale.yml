system:
  description:
    value: >-
      <p>At 20th level, you are able to push your body to the peak of performance, rapidly circulating blood in all
      areas to increase your speed and power.</p><p> As an action you can spend 10 cursed energy and for the next minute
      you gain the following benefits: </p><p></p><p>Your movement speed is doubled and your movement does not provoke
      attacks of opportunity.</p><p> You have advantage on Dexterity saving throws and when you pass a Dexterity saving
      throw you instead take no damage if you otherwise would.</p><p> When you take the attack action you make an
      additional attack.</p><p> You regenerate 15 hit points at the start of each of your turns.</p><p></p>
