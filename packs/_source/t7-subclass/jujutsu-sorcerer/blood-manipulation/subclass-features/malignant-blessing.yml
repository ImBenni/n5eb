system:
  description:
    value: >-
      <p>Starting at 7th level, you can infect a creature's blood with a powerful curse, or a powerful blessing.</p><p>
      While a creature is suffering from the Cursed condition when they would regain hit points they instead take that
      amount of healing that would have been received as necrotic damage.</p><p> Once per round, when an allied creature
      other than you would hit a creature suffering from the Cursed condition they gain advantage on the next saving
      throw or attack roll they make against that creature.</p>
