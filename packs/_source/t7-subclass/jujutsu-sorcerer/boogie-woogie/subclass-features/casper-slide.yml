folder: XSLXBzAK81Am1ESf
name: Casper Slide
type: feat
_id: CBy96P4sguuEoCBs
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>When you start clapping the beat of combat steps up.</p><p>At 3rd, you gain 2 applications for the use of your
      Cursed Technique:</p><p></p><p>Slide: </p><p>As a Bonus Action, you may spend 3 Cursed Energy to swap the places
      of two creatures within 90 feet of you.</p><p>Creatures who resist must make a charisma save vs your Highest Save
      DC.</p><p>On a failure they are moved as normal but on a success they are not moved.</p><p>Creatures who do not
      understand your technique make this save at disadvantage.</p><p>When you do this, you gain one stack of
      Rhythm.</p><p></p><p>Criss Cross: </p><p>As an Action, you may spend 2 Cursed Energy to swap the places of two
      creatures within 45 feet of you.</p><p>Creatures who resist must make a charisma save vs your highest Save
      DC.</p><p>On a failure they are moved as normal but on a success they are not moved.</p><p>Creatures who do not
      understand your technique make this save at disadvantage.</p><p>Allies who swap places may make an unarmed/weapon
      attack or cast a jutsu of C-rank or lower as a reaction.</p><p>If this reaction kills a creature, you gain one
      stack of Rhythm.</p><p></p><p>When Magnified: </p><p>When magnified, you increase the Save DC to resist by
      +1.</p><p></p>
