system:
  description:
    value: >-
      <p>At 20th level, at the cost of 10 cursed energy, you can summon the Cupid Shuffle.</p><p> As a full turn action,
      you form a 120-foot radius sphere centered on yourself.</p><p> This domain creates a funky dance floor with
      flashing lights and groovy jams.</p><p> At the beginning of your turn, you may use Criss Cross or Slide on
      creatures inside the domain without expending Cursed Energy.</p><p> This Domain persists for one minute.</p><p>
      Creatures cannot enter or exit the domain and cannot see in or out of it.</p><p> However, any creature can attempt
      to end it early by destroying it.</p><p> The domain expansion has 120 Hit Points, is resistant to all damage
      types, and has an ac equal to your Highest Save DC.</p><p> You may use this once per long rest.</p><p></p>
