system:
  description:
    value: >-
      <p>Though a young sorcerer, you got the flow like a professional dancer.</p><p> Also at 3rd level, you gain the
      ability to hold Rhythm.</p><p> You may have a max of 3 Rhythm at a time.</p><p> you may spend Rhythm to do the
      following</p><p></p><p> Strong Clap(1): </p><p>The range of Criss Cross and Slide doubles.</p><p></p><p> Funky
      Clap(2): </p><p>Until the end of your next turn, you enter The Zone.</p><p></p><p> Quick Clap(2): </p><p>As a
      reaction to being targeted by an attack or being in the range of a saving throw, you may use one of the options of
      Casper Slide.<br />Swapping a creature swaps their position along with making the new creature the target of an
      attack and carrying over any knockback.</p><p></p>
