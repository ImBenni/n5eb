system:
  description:
    value: >-
      <p>At 11th level, you gotta join in on the groove or you'll be left behind.</p><p> When you use Criss Cross, you
      gain an additional action, which can be used to make an unarmed/weapon attack against a creature within
      range.</p><p> If both you and your ally attack the same creature, you gain one Rhythm.</p><p> When you use Slide,
      you gain 2 stacks of Rhythm.</p><p></p>
