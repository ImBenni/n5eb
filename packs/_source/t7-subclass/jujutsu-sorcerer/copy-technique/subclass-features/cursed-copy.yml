system:
  description:
    value: >-
      <p>Beginning at 7th level, select between the following Jujutsu Techniques (Boogie Woogie, Disaster Flames, Cursed
      Resonance, Cursed Speech, Limitless, Ratio Technique,).</p><p> You gain one of the 3rd level features of your
      chosen jutsu technique up to 3rd level.</p><p> If feature gained requires Cursed Energy to activate, increase the
      amount required by +2.</p><p> You can benefit from your chosen technique a number of times equal to your
      proficiency bonus per long rest.</p><p> You cannot change your Jujutsu Technique unless you see another technique
      used, in which case you can switch it during a long rest.</p><p> At 15th level, you can select an additional 3rd
      level feature from a different Jujutsu Technique, or the 7th level feature (up to 7th level) of the same Jujutsu
      Technique you copied at 7th.</p><p></p>
