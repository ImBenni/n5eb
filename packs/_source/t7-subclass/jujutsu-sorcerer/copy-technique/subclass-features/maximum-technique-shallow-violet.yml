system:
  description:
    value: >-
      <p>Finally at 20th level, while your Old Friend is manifested in Stage 3 and within 10 feet of you.</p><p>As a
      full turn action, you and your Old Friend can charge a dark violet 15-foot sphere of Cursed Energy in front of you
      both.</p><p>This sphere is fired in a 90-foot wide line before dissipating.</p><p>This sphere does 3d6 force
      damage for every point of Cursed Energy put into it.</p><p>Each creature must make a Dexterity saving throw
      against your highest Save DC, taking the full damage of the sphere on a failure, or half damage on a
      success.</p><p>Once this sphere is fired, your Old Friend demanifests and cannot manifest fully for 1d4
      rounds.</p><p>When Magnified: On a failed save, creatures become Cursed and Weakened.</p><p></p>
