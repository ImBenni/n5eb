system:
  description:
    value: >-
      <p>Also at 3rd level, the spirit of your Old Friend begins to haunt your everyday life, like a scary guardian
      angel.</p><p>On your turn during combat or during an uncomfortable social encounter, you can spend 3 Cursed Energy
      to have your Old Friend aid you from the shadows, out of sight, (Your character believes this is out of their
      control), giving you the following benefits for the next minute:</p><p> You gain a +1d6 bonus to Insight and
      Intimidation checks.</p><p>You gain a +2 to AC and saving throws.</p><p>Once per turn, when a creature would
      damage you from within 30 feet, they immediately take force damage equal to your proficiency bonus.</p><p>When you
      would regain Cursed Energy, you regain hit points and gain temporary hit points equal to the amount.</p><p></p>
