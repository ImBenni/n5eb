name: Old Friend, Stage 2 (Manifestation)
type: feat
_id: oiHiF7ceoAALUlFF
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>Also at 11th level, as your Cursed Energy has grown in strength, so to has your Old Friend, to the point where
      they are now able to manifest fully.</p><p> When you would activate Old Friend, Stage 1, you can choose to
      activate Stage 2 by spending an additional 3 Cursed Energy.</p><p> When you activate Stage 2, your Old Friend
      appears next to you on the battlefield, using the statblock shown on the next page.</p><p> You gain an additional
      action per turn which you can only use to command them.</p><p> You retain all the benefits of Stage 1 for the next
      minute as normal or for as long as Stage 2 is active.</p><p> Stage 2 deactivates early if you reach 0 hit
      points.</p><p></p>
