name: Old Friend, Stage 3 (Acceptance)
type: feat
_id: Qr9pefUB5duIAt06
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>Beginning at 15th level, you have learned to not fear your Old Friend and embrace the cursed relationship that
      you share.</p><p> You can manifest your Old Friend's Stage 2 as part of rolling initative.</p><p> When you do, you
      have advantage on all attack rolls and saving throws until the start of your next turn as an aura of fierce cursed
      energy surrounds you.</p><p> When your Old Friend enters Stage 2, you can spend an extra 3 Cursed Energy to have
      them enter Stage 3.</p><p> While in Stage 3, their appearence changes and they gain 6 ASI points.</p><p> Once per
      turn, when your Old Friend lands an attack, you can spend 3 Cursed Energy to impose a Constitution saving throw,
      giving the Cursed condition on a failed save.</p><p></p>
