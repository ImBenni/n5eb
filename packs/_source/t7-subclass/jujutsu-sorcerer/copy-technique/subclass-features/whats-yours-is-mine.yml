img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd level, as a reaction to seeing a jutsu casted, you may attempt to copy a jutsu you would be
      elligible to normally cast.</p><p>You temporarily add this jutsu to your list when you succeed a DC (12 + Jutsu
      Rank) Constitution check.</p><p>You can learn a number of jutsu this way equal to your proficiency bonus.</p><p>If
      you attempt to learn a jutsu while you already have the maximum possible learned from this feature, you unlearn
      one of the jutsu learned this way, replacing it.</p><p>At 7th level, jutsu you learn through this feature can be
      cast using Constitution as your casting score.</p><p>(D-Rank: 1, C-Rank: 2, B- Rank: 3, A-Rank: 4, S-Rank: 5)
      </p><p>Additionally, you gain an additional Cursed Technique that does not count against your known
      techniques.</p><p>You gain additional Cursed Techniques this way at 7th and 15th levels.</p><p></p>
