system:
  description:
    value: >-
      <p>Also at 11th level, when your Cursed Puppet would see an allied creature die or fall to 0 hit points, it can
      automatically enter The Zone for 1d4+1 rounds, twice per long rest.</p><p>Additionally, so long as your Cursed
      Puppet has Cursed Energy and is not at 0 hit points, you do not make death saving throws and can continue to
      command your Cursed Puppet as normal if you yourself enter the dying condition.</p>
