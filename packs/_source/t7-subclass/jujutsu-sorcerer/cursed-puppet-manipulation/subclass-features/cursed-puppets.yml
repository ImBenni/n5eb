folder: bYsTf8q5L3YK3yfL
name: Cursed Puppets
type: feat
_id: rqfcT4j6fsHWjPUS
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you have begin to create your main Cursed Puppet.</p><p>Your Cursed Puppet is always
      with you and gains unique benefits based on your selection with the Divergent Path feature.</p><p>Your Cursed
      Puppet operates under the following rules:</p><p>The statistics for your Cursed Puppet are listed on the following
      page.</p><p>You can command your Cursed Puppet to move on your turn, and can use your action or bonus action to
      command it to take its action.</p><p>You can also use your reaction to have it take its reaction.</p><p>Your
      Cursed Puppet shares your skill proficiencies, using its ability scores in place of your own.</p><p>Your Cursed
      Puppet begins with 5 ASI points.</p><p>Your Cursed Puppet increases one its ability scores by +2 (or two of its
      ability scores by +1) each time you gain an Ability Score Improvement/Feat in this class.</p><p>A Cursed Puppet
      can have no more than a 20 in an ability score as normal, unless otherwise specified.</p><p>Your Cursed Puppet
      uses your chakra, for any abilities that require chakra.</p><p>Your Cursed Puppet gains an amount of jutsu equal
      to a specified ability modifier (see Divergent Paths).</p><p>Your Puppet uses your maximum jutsu rank known, as
      its maximum jutsu rank known.</p><p>Cursed Puppets cannot learn Hijutsu, nor can they learn any jutsu that you
      yourself cannot learn.</p><p>Your Cursed Puppet may switch its jutsu on a full rest.</p><p>Your Cursed Puppet
      gains access to its own pool of Cursed Energy equal to 4 + your level in Jujutsu Sorceror.</p><p>Your Cursed
      Puppet follows the same rules for utilizing this cursed energy as specified in the Cursed Energy class
      feature.</p><p>At 7th level, your Cursed Puppet can take a reaction without you needing to take your
      reaction.</p><p>At 15th level, upon rolling initative, if your Cursed Puppet has no Cursed Energy remaining, it
      regains an amount of cursed energy equal to your proficiency bonus.</p><p></p>
