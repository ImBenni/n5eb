name: The Assistant And Personal Trainer
type: feat
_id: G6OVPjAQEBYBqHZF
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>At 7th level, realizing that Cursed Puppets are a major time sink and also do not aid the user itself very
      much, you craft two specific puppets to help you more personally.</p><p> You gain access to the Assistant and
      Personal Trainer.</p><p></p><p> The Assistant </p><p>A small puppet of your design to help you with everyday
      tasks.</p><p> This Puppet is proficient in every skill, using its creator's ability scores as its own.</p><p> A
      creature with this Puppet may do the following as a bonus action; Gain the benefits of the Help action.</p><p>
      Allow a damage roll to deal double damage to structures, contructs, and objects, and ignore your proficiency bonus
      in DR.</p><p> Spend and roll one Hit Die or Chakra Die, to regain hp or chakra respectively.</p><p></p><p> The
      Personal Trainer </p><p>A small puppet of your design that helps you learn and get stronger.</p><p> Select one
      classification of jutsu from the following (Ninjutsu, Genjutsu, Taijutsu, Bukijutsu).</p><p> Reduce the downtime
      needed to create and learn jutsu of your chosen classification, as well as any "Training" activity, by -2 Weeks
      (Min.</p><p> 2 Weeks).</p><p> This downtime reduction grows by 1 at 15th (-3) and 20th (-4) level of this
      class.</p><p> You may change your chosen jutsu classification on a Full Rest and this downtime reduction does not
      stack with other forms of downtime reduction.</p><p></p>
