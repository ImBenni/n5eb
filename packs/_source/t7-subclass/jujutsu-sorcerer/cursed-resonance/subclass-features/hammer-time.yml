system:
  description:
    value: >-
      <p>You have decided that that some weapons are just better than others and you know which ones you enjoy.</p><p>
      Begining at 3rd level you gain proficiency in hammers and you carry a stack of nails with you at all times.</p><p>
      This nails are identical to kunai except when you would throw them you can choose to instead hit them with your
      hammer to launch them at your opponent.</p><p> Once per turn, when you hit a creature with your hammer or nail you
      can force them to make a Constitution saving throw or inflict the bleeding condition.</p><p></p>
