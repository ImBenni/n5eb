system:
  description:
    value: >-
      <p>You have reached the pinnacle of your technique, turning even the smallest injury into a fatal strike.</p><p>
      Starting at 20th level, when you would hit a creature directly with a nail you can amplify and expand the nail,
      making it explode.</p><p> By spending 10 cursed energy, you can force all creatures within a 20-foot radius sphere
      of the triggering nail to make a Dexterity saving throw.</p><p> On a failed save a creature takes 10d12 force
      damage and they are cursed.</p><p> Creatures within 5 feet of the nail before it expanded must make this saving
      throw at disadvantage.</p><p> Additionally, for each rank of cursed or bleeding, you can end those
      conditions.</p><p> They take an additional die of damage equal to the combined ranks of the conditions you ended,
      to a maximum of 5d12.</p><p></p>
