system:
  description:
    value: >-
      <p>Through many battles you have learned to aim your strikes at vital points that would send your enemy reeling in
      pain.</p><p> Starting at 15th level, when you would hit a creature with a Cursed Blast or Cursed Strike you can
      spend 2 cursed energy to daze them on a successful hit.</p><p> When Magnified: If a creature is bleeding or cursed
      you can force them to make a Constitution saving throw or be stunned until the start of your next turn on a failed
      save.</p><p></p>
