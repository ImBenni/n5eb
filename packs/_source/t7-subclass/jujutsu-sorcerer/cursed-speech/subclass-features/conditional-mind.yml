system:
  description:
    value: >-
      <p>At 15th level, you can destroy a creature's sense of safety, making them believe that they are
      suffering.</p><p> As an action you can expend 6 Cursed Energy and force a target within 40 feet of you to make an
      Intelligence saving throw vs your genjutsu Save DC.</p><p> On a failed save, the creature gains a rank of three
      Elemental or Physical conditions for a minute.</p><p> These can only be cured by effects that end mental
      conditions.</p><p> You must make a constitution save vs your own genjutsu Save DC.</p><p> When Magnified On a
      failed save, they gain an additional rank of each condition.</p><p></p>
