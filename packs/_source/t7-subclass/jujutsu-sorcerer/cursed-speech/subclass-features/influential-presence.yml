system:
  description:
    value: >-
      <p>At 3rd level, your powers allow you to influence all those who oppose you with little contest.</p><p> You gain
      the C-rank jutsu suggestion.</p><p> When a creature gains a condition from failing a genjutsu with auditory
      keyword that you cast, they gain the Cursed condition for the duration of the condition.</p><p> Additionally, when
      using a feature provided by this subclass, you may choose to spend no Cursed Energy and instead take Xd4 Necrotic
      damage.</p><p> Where X equals the amount of Cursed Energy you would normally spend.</p><p> Necrotic damage taken
      this way cannot be reduced by any means.</p><p></p>
