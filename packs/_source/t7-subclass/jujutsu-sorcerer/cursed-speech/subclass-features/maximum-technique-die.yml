system:
  description:
    value: >-
      <p>At 20th level, you can cause a creature's body to destroy itself.</p><p> As an action you can expend 12 curse
      energy and force a target within 30 feet of you to make an Intelligence saving throw vs your genjutsu save
      DC+3.</p><p> On a failed save they take 12d10+30 necrotic damage.</p><p> You must make a constitution save vs your
      own genjutsu Save DC.</p><p> If this reduces a creature's HP to 0, they automatically die.</p><p> You may use this
      feature a number of times equal to your genjutsu modifier per long rest</p>
