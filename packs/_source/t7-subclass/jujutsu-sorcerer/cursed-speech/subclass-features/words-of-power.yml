system:
  description:
    value: >-
      <p>Also at 3rd level, your cursed speech modifies your genjutsu in terrifying ways.</p><p> When casting a genjutsu
      with the auditory keyword, you may spend 3 Cursed Energy.</p><p> When you do so, you force affected creatures to
      make a Constitution saving throw vs your genjutsu Save DC.</p><p> on a failed save, they gain a rank of chilled,
      burned, shocked, or bleeding.</p><p> The condition chosen depends on the phrase you said while casting the jutsu
      (for example "freeze!" or "burn away!").</p><p> When Magnified: You instead inflict 2 ranks of the condition on a
      failure.</p><p> On a success, you inflict 1 rank.</p><p></p>
