system:
  description:
    value: >-
      <p>Also at 11th level, your body has learned to endure powerful techniques from the curse inhabiting you.</p><p>
      Select a damage type, you gain resistance to that damage type.</p><p> Additionally, when you land Black Flash on a
      creature you may spend an additional 2 Cursed Energy, they gain the Cursed Condition.</p><p> Finally, as a
      reaction to landing a Black Flash, you may make an additional weapon/unarmed attack against the creature.</p><p>
      You may attempt Black Flash on this attack without spending Cursed Energy.</p><p></p>
