system:
  description:
    value: >-
      <p>Also at 3rd, your handle on Cursed Energy isn't nearly as trained as other sorcerers.</p><p> However, this lack
      of precision gives wake to a new technique.</p><p> When you would attempt a Black Flash and fail, you instead use
      Divergent Fist.</p><p> Divergent Fist deals an additional amount of Force damage equal to your unarmed
      damage.</p><p> When you would make an unarmed attack or a melee attack from a jutsu with the Taijutsu keyword on a
      target with the Cursed condition, Divergent Fist automatically activates.</p><p> Addiionally,you gain the Cursed
      Jutsu Cursed Technique.</p><p></p>
