system:
  description:
    value: >-
      <p>At 3rd level, the curse in your body awakens, granting you abilities that they once had.</p><p> You gain access
      to a nature release of your choice and one D-rank jutsu of the nature release.</p><p> Alternatively, you may
      choose to gain no nature release and learn 3 D-rank or lower jutsu that you're elligble to learn.</p><p>
      Additionally, the Curse inhabiting your body holds dominion over your soul.</p><p> You gain resistance to chakra
      damage and when a creature would deal chakra damage to you, they take force and chakra damage equal to your
      proficiency bonus.</p><p></p>
