system:
  description:
    value: >-
      <p>When you blast your flames in close proximity to your target, they incinerate them even further.</p><p>
      Beginning at 3rd level, whenever you deal fire damage from an unarmed strike or melee weapon attack you can force
      the affected creature to make a Constitution saving throw or gain 1 rank of burned.</p><p> If they would already
      make a saving throw to gain any ranks of burned you increase the amount they gain by 1.</p><p> Additionally, an
      amount of times equal to half your proficiency bonus, you force every creature behind that affected target in a
      15-foot cone to make a Dexterity saving throw or take half the damage you just inflicted in fire damage.</p><p> At
      7th level, you can use this feature with Taijutsu and Bukijutsu.</p><p></p>
