system:
  description:
    value: >-
      <p>mbuing your technique into a domain, you trap your opponents in a recreation of the inside of a volcano, the
      magma searing away at their flesh as you turn them into ash.</p><p> At 20th level, as a Full Turn Action and for
      20 Curse Energy, you make a 60-foot radius sphere centered on yourself.</p><p> Hostile creatures must make a
      Constitution saving throw at the beginning and end of their turns, gaining 5 ranks of burned on a failed save and
      2 ranks of burned on a success.</p><p> Whenever you deal fire damage to creatures within your domain you increase
      your damage die by the amount of burned ranks the creature has.</p><p> You remove creatures' resistance and
      immunity to fire damage and the burned condition.</p><p> If the creature would heal from fire damage they now are
      treated as vulnerable to fire damage.</p><p> Creatures cannot enter or exit the domain and cannot see in or out of
      it.</p><p> However, any creature can attempt to end it early by destroying it.</p><p> The domain expansion has 125
      hit points, is resistant to all damage types when attacked from the interior and has an AC equal to your highest
      Save DC.</p><p> This may be done once per long rest.</p><p></p>
