system:
  description:
    value: >-
      <p>Your Curse Energy takes on the properties of your Curse Technique, now becoming rampant with heat.</p><p> At
      3rd level, whenever you deal damage using Curse Energy you can deal fire damage instead of whatever damage it
      would be.</p><p> Also, twice per turn, whenever you would deal damage you can spend 2 Curse Energy and change it
      to fire damage, then increase the damage die and damage die step by 1.</p><p> (d4&gt;d6&gt;d8&gt;d10&gt;d12)</p>
