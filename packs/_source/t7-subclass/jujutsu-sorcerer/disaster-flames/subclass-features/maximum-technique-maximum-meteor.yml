system:
  description:
    value: >-
      <p>Reaching the near peak of your own sorcery, you create a giant flaming ball of destruction to crash down and
      eviscerate anything it touches.</p><p> Beginning at 15th level, as a Full Turn Action, by spending 12 Curse
      Energy, you can pick a point that's at minimum 120 feet from you to a maximum of 300 feet from you in the
      air.</p><p> From that point you create a meteor that's a 150-foot radius sphere that, on your turn, can move 90
      feet in any direction.</p><p> For every 90 feet this sphere moves you increase the damage it deals by d8.</p><p>
      When the meteor touches down onto the ground every creature within the area of the meteor must make a Dexterity
      and Constitution saving throw.</p><p> On a failed Dexterity saving throw they take 10d8 fire damage or half on a
      success.</p><p> On a failed Constitution saving throw they gain 2 ranks of burned, and nothing on a
      success.</p><p> If a creature would be in the meteor's path before it touches down onto the ground then they must
      make a Strength saving throw or be stuck to the meteor until it touches the ground as it's velocity is too hard to
      break from.</p><p> Objects and Constructs in the area of the meteor take double damage from this feature.</p><p>
      If the meteor has been summoned for longer than 1 minute then it immediately explodes.</p><p></p>
