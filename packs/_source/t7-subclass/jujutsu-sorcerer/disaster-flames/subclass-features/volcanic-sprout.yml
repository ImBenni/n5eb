system:
  description:
    value: >-
      <p>Mini volcanoes are now at your beck and call, with the concentrated firepower of your stronger attacks.</p><p>
      At 11th level, as an Action and for 5 Curse Energy, choose up to 2 spaces within 30 feet of you and choose which
      direction they face.</p><p> Whenever you make these sprouts choose a jutsu that deals fire damage and uses a Cone,
      Cube, Cylinder, Sphere, or Line for its range.</p><p> You ignore the components needed for the jutsu when using it
      this way.</p><p> These sprouts cannot be seen before they are activated, unless a creature has Chakra sight or
      True sight.</p><p> As an Action or Reaction, you can activate any amount of these sprouts, spending half the
      chakra cost, but increasing the Save DC by +1 or damage die by +2.</p><p> At 15th level, you can now summon 3 of
      these at a time, and 4 at 20th level.</p><p></p>
