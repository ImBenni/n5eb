  description:
    value: >-
      <p>At 11th level, your Cursed Weapon is able to be molded in new ways.</p><p> As a bonus action, you may choose to
      reshape a Cursed Weapon manually, changing its damage type to bludgeoning, piercing, or slashing.</p><p> Once this
      is done, it cannot be changed back unless you repair it during a rest.</p><p> Additionally, while wielding this
      weapon you may take the disengage or dodge actions as a bonus action.</p><p></p>
