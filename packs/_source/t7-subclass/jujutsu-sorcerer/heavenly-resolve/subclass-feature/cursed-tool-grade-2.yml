system:
  description:
    value: >-
      <p>At 7th level, you gain an additional Cursed Weapon.</p><p> Thia Cursed weapon becomes unbreakable, is Superior
      in quality, and when you make an attack with it, you may spend 5 Chakra.</p><p> On a hit, the target must make a
      Constitution saving throw vs Your Taijutsu Save DC.</p><p> On a failed save, they gain the Cursed
      Condition.</p><p> Additionally, you may learn an additional taijutsu/weapon stance.</p><p> You may gain the
      benefits of two stances at once.</p><p> Finally, select one adversary trait of C-rank or lower, this is applied to
      this weapon and you gain its benefits while you wield it.</p><p> This cannot be a iconic trait.</p><p> Creatures
      of a different class/subclass do not gain the benefits of this trait.</p><p></p>
