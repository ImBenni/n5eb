system:
  description:
    value: >-
      <p>Also at 3rd level, you gain proficiency in Exotic Weapons.</p><p> One weapon you are proficient in becomes
      known as your Cursed Weapon.</p><p> A Cursed Weapon can only be wielded by you or one who you grant permission and
      becomes Greater in quality.</p><p> Additionally, select one adversary trait of D-rank or lower, this is applied to
      your weapon and you gain its benefits while you wield it.</p><p> This cannot be an iconic trait.</p><p> Finally,
      you gain a Taijutsu/Weapon Stance of your choice.</p><p></p>
