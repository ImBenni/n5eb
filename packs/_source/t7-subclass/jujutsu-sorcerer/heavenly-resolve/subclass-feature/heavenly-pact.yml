system:
  description:
    value: >-
      <p>At 3rd level, the growth of your cursed energy is stunted.</p><p> However, you do your best to adapt into
      this.</p><p> You gain the Heavenly Restriction Major Binding Vow.</p><p> This vow and its grades does not cost any
      slots for you.</p><p> Additionally, you gain a bonus to HP and Chakra equal to your level.</p><p> Hereafter,
      increase your HP and Chakra each level by +1.</p><p> When a feature would require the cost of Cursed Energy, you
      may instead pay the cost in chakra.</p><p></p>
