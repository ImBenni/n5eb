system:
  description:
    value: >-
      <p>At 3rd level, you're aware of the innerworkings of the soul front to back.</p><p> You gain access to the
      medical keyword, but all medical jutsu have their range reduced to Touch.</p><p> Medical jutsu you cast may use
      Charisma as the casting modifier.</p><p> When you would heal or deal damage to a creature using medical jutsu, you
      may spend any amount of Cursed energy, adding the result to the damage/healing.</p><p> Damage you deal with
      medical also reduces the target's max Hit Points by an equal amount for one minute.</p><p></p>
