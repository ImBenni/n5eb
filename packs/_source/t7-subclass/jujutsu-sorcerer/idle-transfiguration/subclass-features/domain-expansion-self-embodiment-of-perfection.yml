name: 'Domain Expansion: Self-Embodiment Of Perfection'
type: feat
_id: FrUlFWwNDbEynMrd
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>Your prowess with the soul allowed you to unlock an ability that someone would denote as their peak, DOMAIN
      EXPANSION! At 15th level, at the cost of 20 cursed energy, you can summon your domain.</p><p> As a full turn
      action, you form a 30-foot radius sphere centered on yourself.</p><p> This domain can push all those who you
      choose outside of its range as multiple hands push them out and form the interior's design.</p><p> You may target
      any creature within your domain with Medical jutsu as if they were within 5 feet of you.</p><p> Creatures reduced
      to 0 Hit Points while in your domain may automatically be converted to Humanity.</p><p> All damage you deal
      reduces the target's maximum Hit Points by an equal amount for the duration of the Domain Expansion.</p><p>
      Creatures cannot enter or exit the domain and cannot see in or out of it.</p><p> However, any creature can attempt
      to end it early by destroying it.</p><p> The domain expansion has 125 hp, is resistant to all damage types on
      attacks from the interior, and has an AC equal to your highest Save Dc.</p><p> This may be done once per long
      rest.</p><p></p>
