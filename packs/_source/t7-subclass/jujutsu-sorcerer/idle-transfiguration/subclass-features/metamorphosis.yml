system:
  description:
    value: >-
      <p>At 20th level, you've finally grasped the true power of your soul.</p><p>As an action on your turn, you may
      spend 9 Humanity to transform to your Perfect Self.</p><p>For the next minute you gain the following
      benefits:</p><p>You may add your Charisma Modifier to all instances of damage you deal.</p><p>You reduce the cost
      of all jutsu you cast by half your Charisma Modifier.</p><p>Increase your AC by +1 and gain immunity to
      Bludgeoning, Piercing, and Slashing damage.</p><p>At the beginning of your turn, you gain your Level in Temporary
      Hit Points.</p><p>You may no longer hold Humanity.</p><p>This feature ends early if you are reduced to 0 Hit
      Points and you may use this once per long rest.</p><p></p>
