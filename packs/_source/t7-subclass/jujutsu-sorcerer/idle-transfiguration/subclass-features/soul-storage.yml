system:
  description:
    value: >-
      <p>At 7th level, you can't let a good body go to waste.</p><p> You gain a stock of Humanity equal to your
      Proficiency Bonus.</p><p> When you kill a creature with a jutsu with the medical keyword or cast a damaging
      medical jutsu on a dead body, you convert the body into a stack of Humanity.</p><p> When you would heal or deal
      damage to a creature, you may spend any amount of Humanity, adding an additional die for each Humanity
      added.</p><p> This additional damage is necrotic damage that reduces the target's maximum hitpoints an amount
      equal to the damage dealt.</p><p> You lose all Humanity on a long rest.</p><p></p>
