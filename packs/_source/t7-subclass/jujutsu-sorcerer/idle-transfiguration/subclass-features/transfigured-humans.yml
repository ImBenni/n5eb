system:
  description:
    value: >-
      <p>Also at 11th level, you use your power over the soul to craft the perfect henchmen.</p><p> You learn the Shadow
      Clone Technique.</p><p> This jutsu may use your Charisma as its casting modifier.</p><p> However, you may
      substitute the cost of each Clone with Humanity.</p><p> Clones summoned using Humanity gain temporary hit points
      equal to your level + your Proficiency Bonus, can cast an additional jutsu, and add your Charisma modifier to
      damage it deals.</p><p></p>
