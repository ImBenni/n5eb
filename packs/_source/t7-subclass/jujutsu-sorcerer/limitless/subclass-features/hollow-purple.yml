system:
  description:
    value: >-
      <p>At 15th level, as a Full-Turn Action, you combine both the attractive force of blue and the repelling force of
      red to form a 15-foot radius sphere that shoots out in a 120-foot line before dissipating.</p><p> This sphere does
      1d12 Force damage for every point of cursed energy spent.</p><p> Anything that comes into contact with the sphere
      must make a Dexterity saving throw against your Highest Save DC.</p><p> On a failed save they take the determined
      damage and gain the cursed condition, on a successful save they only take half.</p><p></p>
