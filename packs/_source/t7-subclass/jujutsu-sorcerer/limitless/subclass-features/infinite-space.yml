system:
  description:
    value: >-
      <p>At 3rd level, you are able to bring forth infinity into a tangible state.</p><p> You gain a barrier called
      Infinity.</p><p> Infinity has an amount of hit points equal to Four times your Jujutsu Sorcerer level.</p><p>
      Whenever you would take damage, Infinity takes the damage instead.</p><p> If Infinity would take all the damage,
      conditions from the attack, save, or damage does not affect you as they hadn't even reached you.</p><p> Damage
      reduction from armor does not reduce damage done to the HP of Infinity.</p><p> You may choose to deactivate
      Infinity at any time(no action required).</p><p> Reactivating it requires a bonus action.</p><p> If these hit
      points would be reduced to 0, you take the remaining damage.</p><p> As a bonus action, you may recover the HP of
      Infinity.</p><p> By spending 1 chakra, Infinity recovers 1 Hit point.</p><p> While Infinity is activated, all
      creatures of your choice within 10 feet of you move as though they're in difficult terrain as they slow down when
      they approach you.</p><p> Additionally, you gain the Cursed Defense technique.</p><p> When using the technique,
      half the damage reduction is added to the hit points of Infinity.</p><p> Infinity recovers all it's HP at the end
      of a long rest.</p><p> This becomes a short rest at 11th level.</p><p></p>
