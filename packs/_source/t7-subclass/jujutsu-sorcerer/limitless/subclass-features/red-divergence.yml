system:
  description:
    value: >-
      <p>At 7th level, your influence on infinity has become more refined, being able to control positive forces.</p><p>
      When you would cast a jutsu that forcibly moves a creature, you may spend 5 Cursed Energy to give the jutsu the
      Scarlet keyword.</p><p> Jutsu with this keyword have their inflicted fall damage increased to d8s and inflicts the
      cursed condition if they fail the jutsu's save.</p><p> Alternatively, you may activate this effect when you make
      an attack.</p><p> When you do, regardless of a hit or miss, force them to make a constitution saving throw.</p><p>
      On a failure you may push the target back up to 30 ft.</p><p> When Magnified: Increase the damage by an additional
      step and push back the target back by an additional 30 ft on a failure and 15 ft on a success.</p><p></p>
