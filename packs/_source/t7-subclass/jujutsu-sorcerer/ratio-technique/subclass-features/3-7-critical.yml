system:
  description:
    value: >-
      <p>Also, at 3rd level, you have learned to guarantee a fatal blow by hitting a creature in a specific
      point.</p><p> When you make a melee attack, you may spend 3 cursed energy to attempt to critically injure a
      target.</p><p> You may roll your 3:7 dice.</p><p> On a result of a 3 or 7, you increase the damage dealt as if you
      activated Black Flash.</p><p> If this was activated alongside the Black Flash, treat the target as if they had the
      Cursed condition.</p><p></p>
