system:
  description:
    value: >-
      <p>At 7th level, when you score a critical hit on a creature, you ignore damage reduction and deal double damage
      to objects, structures and constructs.</p><p> When Magnified: When magnified, the target and all hostile creatures
      within 20 feet must make a Constitution saving throw vs your Taijutsu Save DC.</p><p> On a failed save, they are
      knocked Prone and Dazed and that area becomes difficult terrain.</p><p></p>
