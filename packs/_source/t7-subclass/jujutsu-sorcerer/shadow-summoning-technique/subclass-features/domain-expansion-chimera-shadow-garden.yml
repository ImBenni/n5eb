system:
  description:
    value: >-
      <p>At 20th level, once per long rest as a full turn action you can spend 20 Cursed energy.</p><p>In doing so, you
      activate the Chimera Shadow Garden.</p><p>As a full turn action, you form a 60-foot radius sphere centered on
      yourself.</p><p>For the next minute, all your Shadow Summons are summoned.</p><p>You can control two creatures as
      an action, one as a bonus action, and three as your reaction.</p><p>If a shadow summon were to reach 0 HP, they
      are immediately unsummoned.</p><p>Creatures cannot enter or exit the domain and cannot see in or out of
      it.</p><p>However, any creature can attempt to end it early by destroying it.</p><p>The domain expansion has 100
      hp, is resistant to all damage types, and has an ac equal to your Highest Save DC.</p><p>Alternatively, if you are
      in an enclosed space, you may activate this domain and it cannot be broken.</p><p></p>
