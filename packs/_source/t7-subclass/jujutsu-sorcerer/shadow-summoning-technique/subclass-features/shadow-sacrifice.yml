folder: c8VNh28oxEmqFIvc
name: Shadow Sacrifice
type: feat
_id: MuUc2hc2hEmYaE5t
img: systems/n5eb/assets/content/jutsu-icons/jujutsu-sorcerer.webp
system:
  description:
    value: >-
      <p>At 7th level, when a Shadow Summon would die, you can choose to pour its power into a living shadow
      summon.</p><p> At the end of a rest, you may sacrifice a dead summon to a living one.</p><p> A shadow summon who
      is given this power gains the following benefits: </p><p></p><p>The summon is marked as a Totality The shadow
      summon's HP increases by an amount equal to half the sacrificed shadow summon's HP.</p><p> The summon also gains
      half the jutsu slots of the sacrificed summon The shadow summon gains 2 of the jutsu of the sacrificed
      summon.</p><p> The shadow summon's gains an ability score improvement of +4.</p><p> The shadow summon gains one
      feature from the sacrificed summon.</p><p> If the sacrificed shadow summon was of the same species, the shadow
      summon's rank increases by 1.</p><p> If the shadow summon is S-rank, it gains an additional 2 jutsu within its
      jutsu limitations.</p><p></p><p> If a Totality summon is involved in this process, you must select one effect and
      its result is halved(excluding the last two effects).</p><p></p>
