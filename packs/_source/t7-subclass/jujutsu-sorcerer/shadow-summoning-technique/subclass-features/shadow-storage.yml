system:
  description:
    value: >-
      <p>At 11th level, you are able to reach use shadows as a way to hold your items.</p><p> You gain access to a
      shadow pocket dimension.</p><p> This pocket dimension can hold up to 10 bulk of items.</p><p> You can draw an item
      out of the dimension by paying 2 Cursed Energy as a bonus action.</p><p> Additionally, as an action you may spend
      5 Cursed Energy to move into a shadow.</p><p> Whilist in the shadow you are fully aware of your surroundings and
      cannot take any damage.</p><p> If the shadow disappears then you are immediately ejected.</p><p> While in a
      shadow, you cannot take any actions, except leaving the shadow as an action.</p><p></p>
    chat: ''
