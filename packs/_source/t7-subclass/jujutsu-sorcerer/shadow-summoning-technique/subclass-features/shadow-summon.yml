system:
  description:
    value: >-
      <p>At 3rd level, you are able to manipulate shadows to form majestic creatures.</p><p> You learn the Summoning
      Technique Ninjutsu.</p><p> You are unable to make normal contracts with sage creatures.</p><p> Instead, you use
      the jutsu to control shadows that take the form of these creatures.</p><p> Summons from this jutsu are called
      Shadow Summons.</p><p> You begin with two different D-Rank summons.</p><p> At 6th level, you gain two C-rank
      Shadow Summons.</p><p> At 10th level you gain two B-rank Shadow Summons.</p><p> At 14th level you gain two A-rank
      Shadow Summons.</p><p> At 18th level you gain two S-rank Shadow Summons.</p><p> All these creatures are summoned
      from the same Summoning Jutsu.</p><p> You can pay the cost of the jutsu using cursed energy.</p><p> If your
      creatures were to die, you may recover one at the end of a long rest.</p><p> You may command a summon with your
      Action or Bonus Action.</p><p></p>
