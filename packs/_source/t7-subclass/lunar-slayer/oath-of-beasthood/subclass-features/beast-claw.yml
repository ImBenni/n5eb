system:
  description:
    value: >-
      <p>The claw of an ancient beast.</p><p>As a reaction when you would be targeted with an attack, you can cause the
      claw to release a powerful shockwave.</p><p>Each hostile creature within 15 feet of you must make a Strength
      saving throw, being knocked back 10 feet on a failed save, or half as much on a successful one.</p><p>If a hostile
      creature is within 5 feet of you when you use this tool, they make their saving throw at disadvantage, and
      creatures who fail this saving throw by 5 or more are knocked prone.</p><p>If this claw is used in response ranged
      attack, a clash is initiated.</p><p>Make a Martial Arts check, adding a number of d4s equal to your current stacks
      of Beasthood (Min. 1) to your roll.</p><p>On a success, the attack is deflected.</p><p>Neither you or the
      triggering creature suffer the effects of a failed clash.</p>
