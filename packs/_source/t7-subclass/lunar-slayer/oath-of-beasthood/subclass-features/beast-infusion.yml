system:
  description:
    value: >-
      <p>Starting at 6th level, your Oath grants your Trick Weaponry a rite of passage.</p><p> Each Trick Weapon you
      possess gains the Embrace property.</p><p> On your turn when equipped with a Trick Weapon with the Embrace
      property, you can ignite the power within the weapon, granting it the following benefits for 1 minute, once per
      short rest.</p><p> You can choose to spend 1 chakra die to reactivate your infusion before taking a rest.</p><p>
      Increase your weapon's damage by +1d4.</p><p> For every 2 stacks of Beasthood you have, your critical threat range
      for unarmed, melee weapon, and melee taijutsu attacks increases by +1.</p><p> Once per turn, you may make an extra
      unarmed attack as part of taking the attack action, or casting a Taijutsu or Bukijutsu.</p><p></p>
