system:
  description:
    value: >-
      <p>Starting at 3rd level, your flesh begins to embody the essence of nature, granting you her grace.</p><p> You
      gain proficiency in Martial Arts (can use Strength or Dexterity) and gain proficiency in heavy armor (You can meet
      Strength requirements for heavy armor, if your Dexterity score is +2 higher than the heavy armor Strength
      requirement).</p><p> Additionally, you also gain the Unarmed Trick, which does not count against your known
      tricks.</p><p> Finally, select one nature release, picking from Earth, Wind, Fire, Water, or Lightning.</p><p> You
      gain this nature release affinity.</p><p> If you pick a release you already possess, you gain 1 additional jutsu
      with your release's keyword.</p><p> When you deal your unarmed or weapon's damage, you can change the damage type
      to that of your chosen release.</p><p></p>
