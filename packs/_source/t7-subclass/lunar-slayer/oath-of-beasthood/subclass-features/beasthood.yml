system:
  description:
    value: >-
      <p>At 3rd level, your tenacity and battle hood prowess begins to imitate that of an apex predator.</p><p> While in
      combat, when you hit with an unarmed, melee weapon or melee taijutsu attack, you can choose to gain 1 stack of
      Beasthood.</p><p> You can gain up to 3 stacks of Beasthood.</p><p> For each stack of Beasthood you possess, you
      gain a +2 bonus to damage rolls that include your unarmed or weapon's damage.</p><p> This amount of times this
      bonus can trigger per turn is equal to how many stacks of Beasthood you have.</p><p> However, when you take damage
      from a hostile creature, you take an extra +2 damage for each stack of Beasthood you possess.</p><p> When you deal
      0 damage on your turn, or lose an amount of hit points as the result of taking damage equal to 12 + your Lunar
      Slayer level, you lose 1 stack of Beasthood.</p><p> You lose all stacks of Beasthood when you exit combat or reach
      0 hit points.</p><p></p>
