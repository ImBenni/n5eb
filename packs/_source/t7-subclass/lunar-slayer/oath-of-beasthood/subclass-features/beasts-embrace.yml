name: Beast's Embrace
type: feat
_id: z4qDRbIxTv4CZ7gu
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 11th level, the path you have followed has begun to change who you are, down to your very
      core.</p><p> As an action, you may unleash the Ghastly Beast.</p><p> Your hair grows longer, your eyes glisten
      brightly in the light, your teeth grow sharper, your hands and feet morph, gaining claws, and lastly your voice
      becomes more feral sounding in tone.</p><p> You gain the following features until you detransform as a bonus
      action, reach 0 hit points, or are killed.</p><p> You can use this form a number of minutes equal to your Lunar
      Slayer level per long rest, but you may spread out this time throughout multiple uses.</p><p> You are classified
      as a Beast creature.</p><p> You take an additional die of damage from the element superior to the one you selected
      with your Beasthide feature.</p><p> You can gain up to 4 stacks of Beasthood.</p><p> You can also choose to remove
      a single stack of beasthood at the end of your turn, and can choose to not lose a stack of Beasthood when you deal
      0 damage in a turn.</p><p> You gain a bonus to Strength, Constitution, and Wisdom saving throws equal to your
      stacks of Beasthood.</p><p> Your movement speed is increased by 20 feet (Your water/climbing/burrowing speeds
      equal your movement speed), and either as a bonus action or once per turn by spending 2 chakra, you can Dash or
      Disengage.</p><p> When you take the attack action against a bloodied creature, you can make an extra attack, once
      per turn.</p><p> Finally, while you have 2 or more stacks of Beasthood, your Taijutsu ability score increases by
      +2, up to 22.</p><p></p>
    chat: ''
