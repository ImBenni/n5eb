system:
  description:
    value: >-
      <p>Craggily urns filled with potent smoke.</p><p>As a bonus action, you can throw an urn at space within 60 feet
      of you.</p><p>The urn explodes when it hits the ground, causing a 30-foot radius of smoke to appear that heavily
      obscures all creatures that are inside of it for 5 rounds.</p><p>You are able to see through this smoke just
      fine.</p><p>This smoke is chakra enhanced, preventing creatures who possess special sights, such as chakra sight
      and blindsight (excluding True Sight), from gaining advantage or bonuses to see through the smoke.</p><p>Moderate
      wind disperses this smoke in 4 rounds.</p><p>Strong wind disperses it in one round.</p>
