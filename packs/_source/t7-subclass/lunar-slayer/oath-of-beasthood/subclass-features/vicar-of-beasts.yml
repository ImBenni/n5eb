system:
  description:
    value: >-
      <p>Starting at 15th level, your primal being attunes you further to nature.</p><p> You gain resistance to the
      damage type of the nature release affinity you selected with your Beasthide feature, and have advantage on saving
      throws against the conditions associated with your nature release.</p><p> (Earth= Bruised, Wind=Bleeding,
      Fire=Burned, Water=Chilled, Lightning=Shocked) While in your Ghastly Beast form, you instinctually manifest an
      aura of your chosen nature release affinity, granting you immunity its associated damage type and a bonus to
      concentration checks equal to your current stacks of Beasthood when you are only concentrating on jutsu with your
      chosen element's keyword.</p><p> Lastly, once per turn, when a creature hits with you with an attack roll while
      within 10 feet of you, they immediately take damage equal to your Taijutsu ability modifier of your release's
      damage type.</p><p></p>
