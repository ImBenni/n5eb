name: Atavistic Control
type: feat
_id: CV0V0YI3v9sUaq1Q
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 11th level, your dedication to the Oath of Corruption has taught you newfound ways of using your
      life force to empower your arsenal.</p><p> You have developed new arcane methods of using your Corruption
      Dice.</p><p> You can now roll your Corruption Dice to corrupt your blood, causing you to instead lose hit points
      equal to the result.</p><p> In exchange you can use one of the following abilities, up to 2 times per turn; You
      cannot be reduced below 1 hit point when using Corruption Die this way, and rolling a 6 on a die prevents it from
      being spent.</p><p> If you use any of the aforementioned features while Bloodied, you only lose hit points equal
      to half the result.</p><p> Reduce the chakra cost of a Medical jutsu that deals damage, a Bukijutsu, or a Lunar
      Slayer or Clan feature by half the result of the die (Min. 1).</p><p> You cannot use this feature to reduce a
      single cost twice on one turn.</p><p> Add the result of 1 die to a Strength, Dexterity, or Constitution saving
      throw.</p><p> Gain a bonus to a weapon, Taijutsu (Bukijutsu only), or Medical jutsu attack roll equal to the
      result of the die.</p><p> Roll 1 die and automatically end one Sensory condition, or the Bleeding, Bruised,
      Poisoned, or Envenomed conditions.</p><p></p>
