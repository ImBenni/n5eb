folder: TFdwBWz4cOrGH9P5
name: Corrupted Slayer's Tools
type: feat
_id: VtHftqD5vavq2IaK
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>As you begin to follow this Oath at 3rd level, you uncover the following tools listed below to aid you on your
      journey.</p><p>Select one tool.</p><p>You gain the other tool at 9th level.</p><p>These tools use your Taijutsu
      attack bonus and Save DC.</p><p>Each tool requires a specific amount of chakra to activate, and you can use these
      tools a total number of times equal to your proficiency bonus per long rest.</p><p>If you lose any of these tools,
      you regain them on a short rest.</p><p></p><p>Crimson Glove (5 Chakra): </p><p>An old dainty red glove, with an
      ominous aura.</p><p>As a bonus action, you can activate this tool to gain the following effects for 4
      rounds.</p><p>This duration increases to 6 rounds at 6th level, 8 rounds at 11th level, and 10 rounds at 15th
      level.</p><p>• Your movement speed increases by 10 feet and attacks of opportunity made against you have
      disadvantage.</p><p>• Once per round, when you would be hit by an attack, you can become invisible until the end
      of the turn.</p><p>• When you use the Quickstep feature, you can move up to 20 feet initially, instead of 10, and
      when an attack would miss you, you can instead move 10ft.</p><p></p><p>Nightmare Whistle (5 Chakra): </p><p>A
      deteriorated whistle with a texture reminiscent of snakeskin.</p><p>As an action, you blow on the whistle, sending
      out a wave of snakes in a 15-foot cone.</p><p>All creatures within range must make a Dexterity saving throw,
      taking Xd6 poison damage and becoming Envenomed on a failure, or only half damage on a success.</p><p>X equals
      your proficiency bonus.</p><p>For every two 6s rolled, increase the ranks of Envenomed by +1.</p><p></p>
