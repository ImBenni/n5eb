system:
  description:
    value: >-
      <p>An old dainty red glove, with an ominous aura.</p><p>As a bonus action, you can activate this tool to gain the
      following effects for 4 rounds.</p><p>This duration increases to 6 rounds at 6th level, 8 rounds at 11th level,
      and 10 rounds at 15th level.</p><p>• Your movement speed increases by 10 feet and attacks of opportunity made
      against you have disadvantage.</p><p>• Once per round, when you would be hit by an attack, you can become
      invisible until the end of the turn.</p><p>• When you use the Quickstep feature, you can move up to 20 feet
      initially, instead of 10, and when an attack would miss you, you can instead move 10ft.</p>
