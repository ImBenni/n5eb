system:
  description:
    value: >-
      <p>Also at 3rd level, your corrupted blood unlocks a path to incredible power, improving your capabilities as a
      warrior.</p><p> You gain the ability to learn jutsu with the Medical keyword that deal acid, necrotic or poison
      damage.</p><p> Medical Ninjutsu you cast use Constitution as your Ninjutsu ability modifier.</p><p> Additionally,
      you gain the Blood Rapture Caryll Rune, which does not count against your known runes.</p><p> Finally, when you
      cast a jutsu with the Medical Keyword that deals damage, you may change it to necrotic, increasing its damage die
      by 1 step.</p><p></p>
