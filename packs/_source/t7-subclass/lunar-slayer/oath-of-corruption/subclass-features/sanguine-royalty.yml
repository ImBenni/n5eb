img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Finally at 20th level, the blood that pumps through your veins is the blood that fuels the ultimate life
      form.</p><p> You gain an extra 5 Corruption Dice and you can reroll any 1s or 2s, taking the second result.</p><p>
      If you begin combat and have no Corruption Dice remaining, you can spend 10 chakra to gain a number of dice equal
      to twice your Constitution modifier, which last until the end of combat.</p><p> You can do this once per long
      rest.</p><p> Lastly, you can now use your Ritualistic Exsanguination feature with your Slayer's Rifle.</p><p> The
      die used for your Slayer's Rifle are d6s, and it costs 3 hit points per 2 die to use it on your rifle, up to 12
      hit points total.</p><p></p>
    chat: ''
