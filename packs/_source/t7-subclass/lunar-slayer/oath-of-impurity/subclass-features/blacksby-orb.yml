system:
  description:
    value: >-
      <p>A palm-sized orb of obsidian glass, the inside appearing like the night sky.</p><p>As an action, make a number
      of ranged attacks equal to half your proficiency, rounded up, at a creature within 60 feet as you fire small
      meteoric blasts.</p><p>On a hit, the creature takes 1d8 force damage and is knocked back 10ft.</p><p>Affected
      creatures must succeed a Strength save, with a -1 penalty for every attack they were hit with this tool, or fall
      prone.</p><p>The first attack made per turn, per creature, is unreactable.</p>
