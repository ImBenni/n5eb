system:
  description:
    value: >-
      <p>Starting at 20th level, your dedication to the Oath of Impurity bolsters the hearts and vigor of you and your
      allies.</p><p> When you begin combat and have no League Points remaining, you regain 3 League Points.</p><p>
      Additionally, your Slayer's Quarry feature now replenishes on a short rest, and when in your Slayer's Quarry, all
      hostile creatures count as being Marked as your Quarry.</p><p> Finally, once per long rest, if you enter your
      Slayer's Quarry feature without spending a will of fire, you gain a will of fire.</p><p></p>
