system:
  description:
    value: >-
      <p>As you begin to follow this Oath, you uncover the following tools to aid you on your journey.</p><p>Select one
      tool below.</p><p>You gain the other at 9th level.</p><p>These tools use your Taijutsu attack bonus and Save
      DC.</p><p>Each tool requires a specific amount of chakra to activate, and you can use these tools a total number
      of times equal to your proficiency bonus per long rest.</p><p>If you lose any of these tools, you regain them on a
      short rest.</p><p></p><p>Blacksky Orb (4 Chakra):</p><p>A palm-sized orb of obsidian glass, the inside appearing
      like the night sky.</p><p>As an action, make a number of ranged attacks equal to half your proficiency, rounded
      up, at a creature within 60 feet as you fire small meteoric blasts.</p><p>On a hit, the creature takes 1d8 force
      damage and is knocked back 10ft.</p><p>Affected creatures must succeed a Strength save, with a -1 penalty for
      every attack they were hit with this tool, or fall prone.</p><p>The first attack made per turn, per creature, is
      unreactable.</p><p></p><p>Silver Bell (7 Chakra):</p><p>A tiny silver bell that glistens like the moon.</p><p>As a
      bonus action, you can ring this bell, causing all creatures of your choice within a 30-foot radius that hear the
      bell recover hit points equal triple your proficiency bonus, gain temporary hit points equal to half the amount
      for 1 minute, and are cured of one Mental or Sensory condition affecting them.</p><p></p>
