name: League Infusion
type: feat
_id: SZDje9U79fSrY8ti
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, your Oath grants your Trick Weaponry a rite of passage.</p><p> Each Trick Weapon you
      possess gains the Companionship property.</p><p> On your turn when equipped with a Trick Weapon with the
      Companionship property, you can ignite the power within the weapon, granting it the following benefits for 1
      minute, once per short rest.</p><p> You can choose to spend 1 chakra die to reactivate your infusion before
      resting.</p><p> Increase your weapon's damage by +1d6 damage.</p><p> Your Trick Weapon exudes an aura of
      confidence.</p><p> Allies within 30 feet of you cannot make saving throws or skill checks at disadvantage as the
      result of a hostile creature's effect of a rank less than your highest jutsu known.</p><p> Once per round, when
      you damage a creature with your Trick Weapon, you gain a number of League Points equal to the amount of allied
      creatures within 30 feet of you.</p><p> League Points gained this way dissipate at end of your next
      turn.</p><p></p>
