system:
  description:
    value: >-
      <p>Also at 3rd level, you gain the ability to learn jutsu with the Medical keyword that restore hit points, grant
      temporary hit points, reduce damage, or provide a boost or boon to an allied creature in any way, using
      Constitution as your casting modifier.</p><p> Additionally, you learn the Gear Trick, which does not count against
      your known tricks.</p><p> Finally, you learn 2 jutsu with the Medical keyword that you qualify for.</p><p> You
      learn one more jutsu at 6th, 11th, and 15th levels of this class.</p><p> Jutsu learned from this feature do not
      count against your jutsu known, and you can switch these jutsu when you gain a level in this class.</p><p></p>
