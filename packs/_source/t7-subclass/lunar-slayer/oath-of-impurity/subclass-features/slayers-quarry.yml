folder: w9EyFBxSPwOVblB9
name: Slayer's Quarry
type: feat
_id: dqrORudRxknBnLQ4
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 11th level, you've become very attached to your fellow comrades, those who hurt them shall be
      crushed like vermin.</p><p>When an ally, other than yourself, becomes bloodied or reaches 0 hit points as the
      result of a hostile creature, you may enter a vindictive range and mark the triggering creature as your
      Quarry.</p><p>You gain the following benefits for the next minute or until your Quarry dies.</p><p>Alternatively,
      you can spend a Will of Fire to activate this feature.</p><p>When you do, you can also gain another benefit of
      using a Will of Fire alongside activating this feature.</p><p>Once this feature ends you gain 2 rank of Exhaustion
      for the next hour and cannot use this feature again until you take a long rest.</p><p>You can spend 2 chakra die
      when the conditions of this feature would be met, or spend a Will of Fire once more, to activate this feature
      before resting.</p><p></p><p>All jutsu you cast that provide healing, temporary hit points, or damage reduction,
      increase the amount given by your proficiency bonus.</p><p>You have advantage on checks to maintain concentration
      of jutsu that would provide allies, other than yourself, any form of benefit.</p><p>You gain full proficiency in
      all saving throws when making a saving throw against your Quarry.</p><p>You are always under the effects of your
      League Infusion feature for the duration, and, against your Quarry increase the damage bonus granted to a
      1d8.</p><p>All Oath of Impurity features that have a specified range, have this range doubled for the
      duration.</p><p>If you kill your Quarry in this state, a writhing worm crawls out of their corpse.</p><p>You may
      crush it (no action needed) and when you do, roll the creature's hit die.</p><p>All allies within 60 feet of you
      can recover a total number of hit points equal to the result.</p><p>This feature then ends.</p><p></p>
