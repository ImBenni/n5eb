system:
  description:
    value: >-
      <p>As you begin to follow this Oath at 3rd level, you specialize in tactics to aid your comrades and vanquish
      vermin.</p><p> You gain proficiency in Medicine and Medicine kits.</p><p> You gain access to a resource known as
      League Points, which can be used to power the following League Techniques below.</p><p> You gain a number of
      League Points equal to your proficiency bonus per long rest, regaining half of your spent Points on a short
      rest.</p><p> You begin with 2 League Techniques, and gain one more League Technique at 11th, 15th, and 20th
      levels.</p><p> You can use any number of League Techniques per turn, though you cannot use the same League
      Technique twice on one turn (no action required).</p><p></p>
