system:
  description:
    value: >-
      <p>Starting at 6th level, your oath grants you a rite of passage for your Trick Weaponry.</p><p> Each Trick Weapon
      you possess gains the Divinity property.</p><p> When using a Trick Weapon with the Divinity property, you may as a
      free action ignite the power within the weapon, granting it the following benefits for 1 minute.</p><p> You can
      use this feature once per short rest, otherwise, you must spend 1 Chakra Die to activate it again.</p><p> Increase
      your weapon's damage by +1d6 fire damage.</p><p> You halve all damage reduction effects when dealing damage with
      your Trick Weapon (excluding resistance/immunity) Once per turn, per creature, when you deal damage with your
      Trick Weapon, you may add your Charisma modifier to damage (minimum of 1).</p><p></p>
