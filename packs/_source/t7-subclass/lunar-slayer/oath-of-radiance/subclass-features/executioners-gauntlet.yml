system:
  description:
    value: >-
      <p>A strange bronze gauntlet with multiple skull adornments.</p><p> As a bonus action, you can twist the gauntlet
      and summon forth a number of ethereal skulls equal to 1/3rd your proficiency bonus.</p><p> These skulls each
      target one creature within 120 feet, dealing 1d8+4 force damage.</p><p> Affected creatures must succeed a Charisma
      saving throw or gain 1 rank of Fear against you for 1 minute on a failed save.</p><p> A creature can repeat this
      saving throw at the start of each of their turns.</p><p></p>
