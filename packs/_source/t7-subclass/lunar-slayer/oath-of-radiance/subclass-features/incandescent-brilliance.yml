system:
  description:
    value: >-
      <p>At level 20, your zeal knows no bounds, and you've become an unstoppable beacon of light.</p><p>Once per turn
      when you damage a creature you can leave a resonance of wrathful chakra which causes their soul to
      fracture.</p><p>At the start of the creature's next turn they immediately take 1 point of force damage for every
      die of damage they've taken on your turn.</p><p>(For example: 10d4 damage = 10 points of force damage.) </p><p>You
      may use this feature a number times equal to your Charisma modifier per long rest.</p><p>Finally, once per Full
      Rest, when you enter your Radiant Fervor, you can choose to spend 15 chakra to enter True Radiance, gaining the
      following benefits in addition to your Radiant Fervor: You shed bright light in a 30-foot radius, and dim light in
      an additional 30 feet.</p><p>This light dispells chakra enhanced darkness.</p><p>You halve all damage reduction
      effects when dealing damage.</p><p>While your Executioner's Infusion is active, you completely ignore damage
      reduction, temporary hit points, resistance, and treat immunity as resistance.</p><p>Increase the saving throw
      bonus from your Radiant Fervor by +1, and the damage reduction by +2.</p><p></p>
