folder: vcxEHBgQpIP48FLM
name: Luminous Defense
type: feat
_id: 5Q1F5pa1R6J1YF3z
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 11th level, your awakened insight is elevated further by your unyielding anger.</p><p> Medical
      pills you consume that provide you with hit points, chakra points, or temporary equivalents, increase the amount
      of the resource gained by your Charisma modifier.</p><p> You also gain access to the Ardeo, an odd helmet made of
      some prestigious metal in a large conical shape.</p><p> You can don or doff this helmet on your turn as a bonus
      action, or as a part of rolling initiative, gaining the following effects while worn.</p><p> Your field of vision
      is reduced to 100 feet, and you have disadvantage on perception checks.</p><p> You do not count as making direct
      eye contact when looking at a creature.</p><p> You are immune to Sensory conditions from hostile sources.</p><p>
      When a creature attacks you, it treats its critical threat range as 1 lower than what it is normally (Ex.</p><p> A
      creature that can score a critical hit on a 19-20, can only do so against you with a natural 20).</p><p> You
      reduce all damage you receive by half your Charisma modifier, rounded up.</p><p></p>
