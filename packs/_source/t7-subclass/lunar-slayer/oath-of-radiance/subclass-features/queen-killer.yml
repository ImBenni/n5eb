system:
  description:
    value: >-
      <p>Starting at 15th level, your shimmering devotion has rendered you powerful enough to take down royalty.</p><p>
      When you deal damage to a creature, it can't regain hit points until the start of your next turn.</p><p> You can
      do this a number of times equal to half your Charisma modifier, rounded up, per long rest (Min.</p><p> 1).</p><p>
      Also at 15th level, when you deal damage to a creature, within the same round if you deal damage to a different
      creature, increase all damage die rolled by 1 step.</p><p> This effect can trigger up to 2 times per
      round.</p><p></p>
