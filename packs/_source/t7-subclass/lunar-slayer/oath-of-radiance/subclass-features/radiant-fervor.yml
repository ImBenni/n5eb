system:
  description:
    value: >-
      <p>At 3rd level, as an action, you can spend 1 Chakra die to unleash your inner zeal, entering a state of zealous
      rage, gaining the following benefits for 1 minute or until you end the effects on your turn (no action needed):
      </p><p>You shed bright light in a 5-foot radius, and dim light for an additional 10 feet.</p><p>Once per turn,
      whenever you deal damage to a creature, all hostile creatures within 5 feet of them, other than them, take damage
      equal to your proficiency bonus, of your weapon's damage type.</p><p>Twice per turn, when you make an attack with
      your trick weapon, you may spend 5 chakra, giving yourself advantage on the attack roll.</p><p>You reduce all
      damage you take by -2 and gain a +1 bonus to Saving Throws.</p><p>You increase your damage reduction by 2 and
      bonuses to saving throws by 1 for every 2 hostile creatures within 60 feet of you (up to a maximum damage
      reduction of -6 and saving throw bonus of +3).</p><p></p>
