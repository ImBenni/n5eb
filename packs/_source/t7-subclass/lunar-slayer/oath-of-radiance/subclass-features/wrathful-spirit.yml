  description:
    value: >-
      <p>Also at 3rd level, your devout passion has instilled in you an increased sense of responsibility to cut down
      your foes.</p><p> You gain proficiency in Strength Saving throws.</p><p> Additionally, You gain the Winding Trick,
      and it does not count against your Tricks Known.</p><p> Lastly, while in your Radiant Fervor, increase the Save DC
      of your Radiant Slayer's Tools by 1/3rd your proficiency bonus.</p><p></p>
