system:
  description:
    value: >-
      <p>Starting at 15th level, you begin to hear voices from the beyond, the ether.</p><p> These voices begin to teach
      you a way to contact them, granting you access to their power.</p><p> As an action, you can spend 15 chakra to
      clasp your hands together above you.</p><p> In the sky, a stellar cloud appears and manifests a number of small
      comets equal to your proficiency bonus.</p><p> Select a number of creatures within 90 feet of you equal to the
      amount of comets created.</p><p> Each creature must make a Dexterity saving throw against your Mystic Focus' Save
      DC, taking 5d10 force damage, falling prone, and becoming dazed on a failed save as the meteor collides into
      them.</p><p> You can target a creature with multiple comets, increasing the damage dice by 1 for each comet after
      the first and Save DC by +1 for every 2 comets aimed at them.</p><p></p>
