system:
  description:
    value: >-
      <p>Lastly at 20th level, your ability to see into the realm beyond the mortal plane has granted you knowledge akin
      to a deity.</p><p> While in your Kin form, you gain additional benefits; You no longer have a time limit for how
      long you can stay in this form.</p><p> Choose any 3 Mental conditions.</p><p> You become immune to those
      conditions.</p><p> Twice per long rest, you can automatically succeed a saving throw against Genjutsu or
      Fuinjutsu, suffering no damage or effects.</p><p> When a creature makes a saving throw against an Oath of Milkweed
      feature or a jutsu denoted under your Mystic Focus, they cannot make the saving throw at advantage.</p><p></p>
