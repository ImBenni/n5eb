system:
  description:
    value: >-
      <p>Also at 3rd level, you form a special bond with your Trick Weapon.</p><p>You cannot be disarmed of your weapon
      unless you are incapacitated and as long as you are on the same plane of existance as your weapon, you can
      instantly teleport it to your hand as a bonus action.</p><p>Additionally, you learn the Celestial Trick, which
      does not count against your known tricks.</p><p>Lastly, when you cast a jutsu denoted under your Mystic Focus,
      reduce its chakra cost by -1 (Min.1).</p><p></p>
