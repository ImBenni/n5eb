name: Milkweed Slayer's Tools
type: feat
_id: LB0pdPu3HZlmcLSc
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>As you begin to follow this Oath, you uncover the following tools to aid you on your journey.</p><p>Select one
      tool below.</p><p>You gain the other at 9th level.</p><p>These tools use the attack bonus and Save DC attributed
      to your Mystic Focus' jutsu type.</p><p>Each tool requires a specific amount of chakra to activate, and you can
      use these tools a total number of times equal to your proficiency bonus per long rest.</p><p>If you lose any of
      these tools, you regain them on a short rest.</p><p></p><p>Phantasmic Augur (5 Chakra): </p><p>A wristband made of
      dozens of tiny phantasms, known as Augurs.</p><p>As a bonus action, or reaction when you be targeted with an
      attack, you summon forth large tentacles from your wristband in a 10-foot cone.</p><p>Make a melee attack against
      each hostile creature within range, dealing 5 + your Lunar Slayer level in force damage and imposing a Strength
      saving throw, knocking a creature back feet and prone on a failure.</p><p>Creatures damaged by this Tool reduce
      their next save against you by -1d4.</p><p></p><p>Tiny Tonitrus (5 Chakra): </p><p>As an action, you slam the
      Tonitrus to the ground and unleash a wave of chakra in a X- foot long, 5-foot wide line (X = 10 x
      proficiency).</p><p>Select a damage type listed below.</p><p>Each hostile creature within range must make a
      Dexterity saving throw.</p><p>On a failed save, creatures take twice your proficiency bonus in your chosen damage
      type and gain 1 rank of a condition associated with your chosen damage type until the end of their next turn, or
      half damage and no effects on a pass.</p><p>When you use this tool, you can spend increments of 5 chakra to
      increase the width by 5 feet (up to 15ft total).</p><p>(Earth =Bruised, Wind=Bleeding, Fire=Burned, Water=Chilled,
      Lightning=Shocked, Force=Dazed)</p>
