name: Mystic Blessings
type: feat
_id: wzoRBYdtYJqR9NHp
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you begin to miraculously uncover mystical knowledge about the world, revealing secrets
      that you could hardly fathom.</p><p> Compared to other slayers, those who follow the Milkweed Oath are blessed
      with tremendous control over more complex chakra techniques.</p><p> Choose between Ninjutsu or Genjutsu.</p><p>
      Your choice becomes known as your Mystic Focus and you gain the following benefits based on your selection;
      Ninjutsu: You find a calling with Ninjutsu.</p><p> You learn an extra C-Rank Ninjutsu of your choice that you
      qualify for, and treat your Intelligence score as +2 higher for the purposes of casting Ninjutsu through ability
      score restrictions.</p><p> You also learn one Efficient Molding of the Ninjutsu Specialist class.</p><p> At 9th
      and 15th levels, you learn another Ninjutsu you qualify for and anEfficient Molding.</p><p> Genjutsu: You find a
      calling with Genjutsu.</p><p> You learn an extra C-Rank Genjutsu of your choice that you qualify for, and treat
      your Wisdom score as +2 higher for the purpose of casting Genjutsu through ability score restrictions.</p><p> You
      also learn one Onijutsu of the Kurama Clan.</p><p> At 9th and 15th levels, you learn another Genjutsu you qualify
      for and another Onijutsu.</p><p></p>
