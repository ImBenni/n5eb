name: Parasitic Host
type: feat
_id: yyGPnwFOSUlCmJse
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 11th level, you discover a small larva of an ancient creature and gracefully agree to become its
      new host.</p><p> As an action on your turn, you can cause the larvae to manifest and change you, turning you into
      one of their Kin.</p><p> Your skin becomes a pale blue in color, your hair becomes like the tendrils of a
      squid.</p><p> When creatures gaze into your eyes, they can seemingly see a cosmos forming.</p><p> Wrapping around
      your arms and legs are pale tentacles.</p><p> You gain the following features until you detransform as a bonus
      action, reach 0 hit points, or are killed.</p><p> You can use this form a number of minutes equal to your Lunar
      Slayer level per long rest, but you may spread out this time throughout multiple uses.</p><p> You are classed as
      an Aberration.</p><p> When you take bludgeoning, piercing, or slashing damage you take an additional die of
      damage.</p><p> Increase your AC by +1.</p><p> You can spend any number of Insightful Eyes on your turn, and can
      use Insightful Eyes outside of your turn.</p><p> While in this form and have no eyes remaining, you can spend 2
      hit and chakra die to regain a number of eyes equal to half your proficiency bonus, once per long rest.</p><p>
      Increase your Passive Perception and Insight by +5.</p><p> You also become fluent in every conceivable
      language.</p><p> Increase the Save DC and reduce the cost of jutsu denoted under your Mystic Focus by +1/-1
      respectively.</p><p> Finally, you have advantage on the first saving throw you make per round against a Genjutsu
      or Fuinjutsu.</p><p></p>
