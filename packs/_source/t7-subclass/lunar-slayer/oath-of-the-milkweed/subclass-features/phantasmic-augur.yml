system:
  description:
    value: >-
      <p>A wristband made of dozens of tiny phantasms, known as Augurs.</p><p>As a bonus action, or reaction when you be
      targeted with an attack, you summon forth large tentacles from your wristband in a 10-foot cone.</p><p>Make a
      melee attack against each hostile creature within range, dealing 5 + your Lunar Slayer level in force damage and
      imposing a Strength saving throw, knocking a creature back feet and prone on a failure.</p><p>Creatures damaged by
      this Tool reduce their next save against you by -1d4.</p>
