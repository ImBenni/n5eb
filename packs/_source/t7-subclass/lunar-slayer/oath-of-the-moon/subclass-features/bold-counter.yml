system:
  description:
    value: >-
      <p>Beginning at 3rd level, you have learned how to block the tricks of man.</p><p> You learn the Chakra Shatter
      Genjutsu.</p><p> As a reaction, when a creature within your weapon's range would cast a jutsu with the HS
      component, you can make one weapon attack against them.</p><p> If you hit with this attack, you simultaneously
      cast Chakra Shatter, and use your Taijutsu ability modifier instead of your Genjutsu ability modifier.</p><p>
      Additionally, you gain a bonus to rolls to negate, counter, or dispel a chakra based effects, known as your Bold
      Counter bonus, which is a 1d4.</p><p></p>
