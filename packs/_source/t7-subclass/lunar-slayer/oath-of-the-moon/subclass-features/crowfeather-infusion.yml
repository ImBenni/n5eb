system:
  description:
    value: >-
      <p>Starting at 6th level, your Oath grants your Trick Weaponry a rite of passage.</p><p> Each Trick Weapon you
      possess gains the Mercy property.</p><p> On your turn when equipped with a Trick Weapon with the Mercy property,
      you can ignite the power within the weapon, granting it the following benefits for 1 minute, once per short
      rest.</p><p> You can choose to spend 1 chakra die to reactivate your infusion before taking a rest.</p><p>
      Increase your weapon's damage by +1d6 force damage.</p><p> When you would use your Hunter's Eye feature to ignore
      half of a creature's bonus to AC, you can spend an additional 2 chakra to ignore the entire bonus to AC.</p><p>
      Once per turn, when you hit with your weapon, decrease your target's movement speed by 10ft until the end of their
      next turn.</p><p></p>
