folder: EBCLuJnfivUcEM59
name: Crow's Agility
type: feat
_id: KaHbpmCyKj8KHQeL
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 11th level, you have developed various skills and traits to aid you in maneuvering the battlefield
      and oppressing your foes.</p><p> You become more tactical, faster, and more agile, like a crow stalking its prey
      in the night.</p><p> You gain the following benefits; Your movement speed cannot be reduced by any means (other
      than conditions) and you ignore difficult terrain.</p><p> You can Dash, Disengage, or Hide as a bonus
      action.</p><p> You have advantage on rolls to resist being Grappled, Restrained, Incapacitated, or Stunned.</p><p>
      If you would already roll at advantage to resist this condition, you can add your Bold Counter bonus to your
      roll.</p><p> You can attack twice, instead of once, when you take an attack of opportunity, once per round.</p><p>
      Finally, you can attack three times, instead of twice, whenever you take the Attack action on your
      turn.</p><p></p>
