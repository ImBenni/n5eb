system:
  description:
    value: >-
      <p>An empty, slimy invertebrate shell, it glows dimly.</p><p>As an action or bonus action, you coat your trick
      weapon with energy for 5 rounds.</p><p>For the duration your weapon emits a 10-foot radius of dim light, and, once
      per turn, when you would cause a creature to make a concentration check as the result of you hitting them with
      your Trick Weapon, they subtract your Bold Counter bonus from their next concentration check.</p><p>If this causes
      the creature to lose concentration, you gain temporary chakra equal to the cost of the jutsu.</p>
