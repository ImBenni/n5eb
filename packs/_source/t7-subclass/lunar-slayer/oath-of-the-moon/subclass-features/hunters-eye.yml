system:
  description:
    value: >-
      <p>Also at 3rd level, you ignore the bonuses of both half and partial cover that hostile creatures may be
      receiving.</p><p> When you would attack a creature benefitting from a bonus to AC from a jutsu, feature, or trait,
      on each attack you can spend 2 chakra to ignore half of this bonus to AC, per attack.</p><p> This does not count
      for changes in AC calculation.</p><p> Additionally, you also gain one Trick of your choice, which does not count
      against your known tricks.</p><p> Finally, both forms of your Trick Weapon gain the Righteous and Serrated
      properties.</p><p> These properties can stack with one another, if the conditions are met.</p><p></p>
