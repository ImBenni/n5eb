system:
  description:
    value: >-
      <p>Your ability to dispatch and disable your prey is brutally efficient.</p><p> Beginning at 15th level, when you
      hit a creature twice on your turn, you can spend 10 chakra to impose a Constitution or Charisma saving throw (your
      choice) against your Taijutsu Save DC.</p><p> On a failed saving throw, the creature loses the ability to mold
      chakra until the end of your next turn.</p><p> You can use this feature a number of times equal to half your
      proficiency bonus, per long rest.</p><p> Also at 15th level, once per turn, you may spend 1 Insightful Eye to
      activate your Hunter's Eye AC reduction feature on a single creature you can see until the end of the current
      turn.</p><p> If your Crowfeather Infusion is active you gain the benefits of the 2nd bullet when you use this
      ability.</p><p></p>
