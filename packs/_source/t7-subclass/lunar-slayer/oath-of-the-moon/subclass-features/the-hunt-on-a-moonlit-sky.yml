system:
  description:
    value: >-
      <p>Finally at 20th level, you have become an unparalleled hunter.</p><p> You gain an extra bonus action per round,
      which can only be used to Dash, Dodge, Disengage, Hide, or use a Lunar Slayer class feature.</p><p> Also, for
      every consecutive attack you land on your turn, you gain a +1 to attack rolls with attacks that would use a
      weapon.</p><p> This bonus resets at the end of the turn.</p><p></p>
