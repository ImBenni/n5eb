system:
  description:
    value: >-
      <p>Starting at 3rd level, you are adept at venturing out into the world.</p><p>You gain the following
      benefits:</p><p>You have advantage on initiative rolls.</p><p>You gain proficiency in Animal Handling and
      Survival.</p><p>You and your party cannot become lost unless by magical or chakra enhanced means.</p><p>When you
      forage, you find twice as much food and ammunition as you normally would.</p><p>You and your allies are immune to
      being surprised while within 30 feet of you and you are conscious.</p>
