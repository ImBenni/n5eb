system:
  description:
    value: >-
      <p>Starting at 3rd level, your Trick Weapon and an armor set you have gain 1 D-Rank Weapon and Armor seal
      respectively.</p><p> Your Trick Weapon is embedded with a special jutsu scroll known as an Ash of War.</p><p> Your
      Ash of War contains a jutsu with a casting time of one action, bonus action, or reaction, that you could qualify
      for.</p><p> You do not need to have this jutsu on your jutsu known list.</p><p> Your Ash of War follows the same
      casting rules as the Storing Seal, however, you cast your Ash of War with chakra instead of charges.</p><p> This
      jutsu always uses your highest attack bonus and Save DC.</p><p> You can switch this jutsu on a full rest.</p><p>
      Your Ash of War cannot have concentration unless the range is self or touch (Touch range can only affect you or
      the weapon.</p><p>)</p>
