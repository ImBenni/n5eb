name: Broadened Horizons
type: feat
_id: J65nHGUAgUgtUkip
img: systems/n5eb/assets/content/jutsu-icons/lunar-slayer.webp
system:
  description:
    value: >-
      <p>Starting at 15th level, the horizons you have explored with your trusty steed and your party has taught you
      much about the importance of coming prepared.</p><p> Once per full rest while out of combat, you can spend 5 hit
      and chakra die to create a small bonfire of your description.</p><p> You and your party can choose to rest at this
      bonfire for 1 hour.</p><p> When a creature rests at this bonfire, they gain the benefits of a long rest, even if
      they already benefitted from a long rest within the past 24 hours.</p><p> For you, this rest does not restore hit
      or chakra die.</p><p> Also, on your turn you can summon the Spirit Steed without using a bonus action or
      reaction.</p><p> While riding your Spirit Steed, you and up to a second rider gain a +1 bonus to AC while
      mounted.</p><p> As part of summoning and immediately mounting your steed, you can move up to half your movement
      speed (Movement with this feature, does not cause attacks made against you, or area of effects you are targeted
      with, to automatically be avoided if used as a reaction.)</p>
