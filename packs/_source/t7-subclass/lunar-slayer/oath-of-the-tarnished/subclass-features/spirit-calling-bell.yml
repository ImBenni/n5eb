system:
  description:
    value: >-
      <p>Starting at 11th level, you gain a new Tarnished Slayer Tool known as a Spirit Beckoning Bell.</p><p> A small
      ethereal bell infused with multiple fuinjutsu.</p><p> During a long rest, you can select one Ninjutsu with "Beast
      Imitating Art" that is of a rank equal to or less than your highest jutsu known that summons a construct.</p><p>
      Your Ninjutsu ability modifier for this tool is treated as a +4 for all calculations, unless your actual modifier
      is higher.</p><p> This bell has a number of charges equal to your proficiency bonus per long rest.</p><p> Spirit
      Beckoning Bell: As a bonus action, you can ring this bell to cast the jutsu inscribed into it, at no initial cost,
      spending a specified amount of charges based on the rank of the jutsu.</p><p> Constructs summoned by the bell
      appear as ghostly apparitions of sky blue chakra, instead of ink.</p><p> They also gain special benefits depending
      on the rank of the jutsu stored.</p><p> These constructs are not commanded by a bonus action, instead acting
      directly after your turn.</p><p> You cannot use this bell again until the constructs are killed or until you
      dispel them on your turn (no action required).</p><p> You cannot lose concentration on jutsu cast with this bell
      due to damage.</p><p> Constructs summoned with this bell are proficient in all saving throws.</p><p> D/C-Rank (3
      Charges): You gain an additional construct from this jutsu, and each construct increases its hit points by your
      Lunar Slayer level, increases its ability scores by +4, gains a +3 bonus to AC, and attack and damage
      rolls.</p><p> B/A-Rank (4 Charges): Each construct increases its hit points by your Lunar Slayer level, increases
      its ability scores by +2, gains a +2 bonus to AC, and attack and damage rolls.</p><p> S-Rank (6 Charges): Each
      construct increases its hit points by your Lunar Slayer level, increases its ability scores by +2, gains a +1
      bonus to AC, attack and damage rolls.</p><p></p>
