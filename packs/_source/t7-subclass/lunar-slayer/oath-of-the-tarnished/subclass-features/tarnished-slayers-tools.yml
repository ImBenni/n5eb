system:
  description:
    value: >-
      <p>As you begin to follow this Oath at 3rd level, you uncover the following tools to aid you on your
      journey.</p><p>Select one tool below.</p><p>You gain the other at 9th level.</p><p></p><p>Crimson/Cerulean Flasks:
      </p><p>Two unbreakable glass flasks, one containing rejuvenating red and blue chakra respectively.</p><p>As a
      bonus action, you can take a swig of one of these flasks.</p><p>The crimson flask restores a number of hit points
      equal to twice your Lunar Slayer level.</p><p>The cerulean flask restores a number of chakra points equal to twice
      your proficiency bonus.</p><p>You can use these flasks a number of times equal to half your proficiency bonus,
      rounded up, per long rest.</p><p>Only you can benefit from these flasks.</p><p></p><p>Spirit Steed Whistle (4
      Chakra): </p><p>A gilded finger whistle.</p><p>On your turn, you can summon a Spirit Steed and automatically mount
      it if you so choose, as a bonus action or reaction.</p><p>You decide the Steed's name and species.</p><p>The Steed
      uses the statistics listed at the end of this subclass.</p><p></p>
