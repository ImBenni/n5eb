system:
  description:
    value: >-
      <p>Starting at 6th level, as opposed to Infusion that most Slayer's are gifted as this stage of your journey, the
      Tarnished have no such infusion to call their own.</p><p> Instead, you gain a special flask known as the Wonderous
      Physick Flask.</p><p>During a short rest, you can equip this flask with 2 Droplets of your choice, detailed on the
      next page.</p><p> Once per short rest, on your turn (no action required) you can drink this flask, gaining the
      benefits of the chosen droplets.</p><p> Your flask can be equipped with more droplets at 11th, 15th, and 20th
      levels.</p><p></p>
