system:
  description:
    value: >-
      <p>Also at 2nd level, when you deal damage to a creature you have studied with your Biological Knowledge feature
      you can choose to split the damage between the creature's chakra and hit points.</p><p>Beginning at 5th level, if
      you deal damage with your Chakra Scalpel to a creature with 0 chakra points, they instead take double damage. Also
      at 5th level, your Chakra Scalpel damage die becomes a d8. This increases to a d10 at 11th level, and a d12 at
      18th level</p>
