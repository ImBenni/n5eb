system:
  description:
    value: >-
      <p>At 6th level, while your Chakra Scalpel is active, you gain an additional effect for your Take Life feature.
      When you use your Take Life feature, the target creature must also make a Constitution saving throw being unable
      to mold chakra for the next minute on a failed save. The creature may repeat this save at the end of each of its
      turns ending the effect on a success.</p><img
