system:
  description:
    value: >-
      <p>Also at 5th level, once per turn, when you cast a Genjutsu or Ninjutsu you cast with the Medical Keyword on a
      creature, you can choose to make the target immune to the effects from a Mental condition of your choice until the
      end of its next turn. You can do this a number of times equal to half your proficiency bonus per long
      rest.</p><p>Additionally, you have advantage on rolls to resist gaining Mental conditions.</p>
