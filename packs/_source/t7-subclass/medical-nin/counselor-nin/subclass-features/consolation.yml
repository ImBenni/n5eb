img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: >-
      <p>Also at 2nd level, when a creature benefits from your <em><strong>Rejuvenating Rest</strong></em>, it gains
      temporary hit points equal to half the amount you've restored + your Wisdom modifier. Any healing granted by your
      <em><strong>Channeled Healing</strong></em> now becomes temporary hit points.</p><p>While a creature has temporary
      hit points granted by either of these features, it also has advantage on rolls to resist gaining Mental
      conditions.</p><p>At 5th level, when you damage a creature with a Genjutsu or Ninjutsu with the medical keyword,
      you can use your reaction to spend a use of your <em><strong>Chakra Scalpel</strong></em> to shatter the mental
      integrity of a target's mind. When you damage a creature with a Genjutsu or Ninjutsu you cast with the Medical
      Keyword, that creature must succeed a Wisdom saving throw or gain 1 rank of a Mental condition of your choice. The
      creature can repeat this save at the end of each of its turns to end the effect on itself with a success.</p>
