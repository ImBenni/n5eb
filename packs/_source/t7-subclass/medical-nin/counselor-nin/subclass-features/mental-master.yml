system:
  description:
    value: >-
      <p>Starting at 17th level, Genjutsu or Ninjutsu you cast with the Medical Keyword ignore immunity to Mental
      conditions.</p><p>Additionally, you can touch a creature and spend one use of <em><strong>Channeled
      Healing</strong></em> to cure them of one Mental or Sensory condition they are under that you are aware of.
      Removing all ranks of it.</p><p>Finally, you are immune to the effects of all Mental conditions.</p>
