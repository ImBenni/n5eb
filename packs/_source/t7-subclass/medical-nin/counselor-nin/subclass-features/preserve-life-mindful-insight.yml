name: 'Preserve Life: Mindful Insight'
type: feat
_id: N82aUyzNzoNy1YyW
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: >-
      <p>At 6th level, as an action you attempt to reach into the psyche of a creature you can touch to better
      understand the truth of the matter. You instantly are made aware of the creature's surface thoughts, then it must
      succeed a Charisma saving throw. Targets under the effect of a mental condition suffer a penalty to this save
      equal to your Wisdom modifier. On a failure, it becomes unable to attack or move until the start of your next
      turn. While a creature is affected this way, you can ask it one question to which it must answer
      truthfully.</p><p>Once a target recovers from being affected with this feature, it can't be affect again for the
      next 24 hours. If the target remains hostile to you after using this feature, it gains 1 rank of Exhaustion for
      the next hour. If the target is not hostile to you after using this feature, it feels a weight lifted off its
      shoulders and becomes friendly to you for the next 24 hours.</p>
    chat: ''
