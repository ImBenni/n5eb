system:
  description:
    value: >-
      <p>Starting at 2nd level, your journey as a Counselor-Nin begins with a greater understanding of Genjutsu. You
      learn the <em><strong>Release</strong></em> jutsu, this doesn't count against your jutsu known, and you gain
      proficiency in Illusions and one Charisma skill of your choice, and you may use Wisdom instead of Charisma for
      this skill. At 9th level, you gain expertise in these skills. Additionally, you have advantage on checks to
      determine whether a Genjutsu is currently affecting a creature.</p><p>Also, you select one Genjutsu you know and
      it gains the "Medical" keyword. You select another Genjutsu to gain the Medical keyword this way again at 5th,
      9th, 13th, and 17th levels.</p>
    chat: ''
