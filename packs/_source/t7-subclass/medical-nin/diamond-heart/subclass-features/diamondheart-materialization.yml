name: Diamondheart Materialization
type: feat
_id: AfzJkXP5HQiDZubr
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: >-
      <p>Also at 2nd level, you learn a special Fuinjutsu technique to create a chakra construct known as the
      <em><strong>Diamondheart</strong></em>, an effigy of your soul's will. Your Diamond heart's appearance and name is
      up to you to decide.</p><p>You can summon your Diamond heart as a bonus action, conjuring it in a space next to
      you. While your Diamond heart is active, you can command it as a free action, and it uses your Actions, Bonus
      Actions, and Reactions as needed to perform a task. Additionally, while summoned you can use Constitution instead
      of Dexterity for your AC calculation. Your Diamond heart follows the following rules;</p><ul><li>Your Diamond
      heart can cast any jutsu you know and use any Medical-Nin class features as if you had used them.</li><li>If your
      Diamond heart moves beyond 90 feet from you, it is unsummoned.</li><li>Your Diamond heart shares your
      chakra.</li><li>If you and your Diamond heart would make a saving throw against the same effect, you make only 1
      saving throw using the higher bonus, suffering the effects of a failed saving throw once, not twice.</li><li>When
      you summon your Diamond heart, it gains proficiency in two saving throws of your choice until summoned. At 9th
      level, it gains proficiency in a 3rd save.</li></ul><p>Finally, as your will hardens, your Diamond heart's
      strength improves. For every +1 bonus you have to your Constitution modifier, you increase two of your Diamond
      heart's ability scores by 2, up to a maximum of 20. You can dismiss your Diamond heart as a free action on your
      turn or if you fall unconscious.</p>
