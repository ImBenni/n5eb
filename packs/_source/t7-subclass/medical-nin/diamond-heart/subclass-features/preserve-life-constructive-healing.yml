system:
  description:
    value: >-
      <p>Starting at 6th level, you learn the techniques required to fight on the front lines next to your allies. You
      learn jutsu as you gain levels in this class according to the Diamond Heart Chart at the top of this class
      section. Each jutsu learned also grants you an additional feature pertaining to the jutsu learned. Learned jutsu
      do not count against your jutsu known as seen on your Medical-Nin Class Chart.</p><p>Additionally, whenever you
      would affect a creature with a Medical or Earth Release jutsu that restores hit points or gives temporary hit
      points, you can spend one use of your <em><strong>Preserve Life</strong></em> feature to treat this creature as a
      construct for the purposes of Diamond heart subclass features and Earth Release jutsu that interact with
      constructs. This effect lasts for 1 minute, or until the creature loses the hit points or temporary hits you
      gave.</p><img src="systems/n5eb/assets/content/cheat-sheets/t7-diamond-heart-chart.webp" />
