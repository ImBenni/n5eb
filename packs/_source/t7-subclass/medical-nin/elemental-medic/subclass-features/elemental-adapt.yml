system:
  description:
    value: >-
      <p>Starting at 5th level, you learn the techniques required to fight on the front lines next to your allies. You
      learn jutsu as you gain levels in this class according to the Elemental Medic Chart at the top of this class
      section. Each jutsu learned also grants you an additional feature pertaining to the jutsu learned. Learned jutsu
      do not count against your jutsu known as seen on your Medical Nin Class Chart.</p><p>Also, at 5th level, when you
      cast a jutsu with the medical keyword, you may as a bonus action cast a Jutsu with your chosen Elemental Keyword
      of C-Rank or lower with a casting time of 1 action.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-elemental-medic-chart.webp" />
