system:
  description:
    value: >-
      <p>Starting at 2nd level, you have focused your efforts on harnessing your innate Nature Release. Select one
      Nature Release (Earth, Wind, Fire, Water, or Lightning Release). You gain the ability to cast Jutsu with the
      corresponding Keyword. If you could already cast jutsu with the selected keyword, you learn one jutsu with the
      corresponding keyword that you qualify for. Additionally, when you cast a jutsu of your chosen element with the
      medical keyword you choose to either heal yourself or your target for an amount of hp equal to the Jutsu's Rank.
      (D-Rank = 1, C-Rank = 2, B-Rank = 3, A-Rank = 4, S-Rank = 5)</p><p>Beginning at level 9, Jutsu with your Elemental
      Keyword no longer require the Medical Keyword for you to heal an amount of hp equal to the Jutsu's Rank.</p>
    chat: ''
