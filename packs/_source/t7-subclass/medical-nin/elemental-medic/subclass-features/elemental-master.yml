system:
  description:
    value: >-
      <p>Starting at 13th level, your mastery of your element allows you to imbue those you have healed or supported
      with your element. </p><p>When you would affect a creature with a Ninjutsu with your chosen Elemental Keyword you
      may pay 5 chakra to grant them the following benefits. The next attack that creature makes deals an additional
      amount of damage die equal to the Rank of the jutsu you healed or affected them with. (D-Rank = 1, C-Rank = 2,
      B-Rank = 3, A-Rank = 4, S-Rank = 5) You can only use this feature a number of times equal to your proficiency
      bonus per long rest.</p>
