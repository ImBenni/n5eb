name: Elemental Traces
type: feat
_id: KejWDKuOVyOqrdn8
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: >-
      <p>Also at 2nd level, Your Chosen Nature Release starts to change how your non-elemental medic jutsu perform.
      Non-Elemental Jutsu and Jutsu of your chosen element with the medical keyword may gain the following
      benefits.</p><ul><li><p><strong>Earth Release:</strong> In addition to the normal effects of the jutsu the target
      also gains a/additional number of Temp Hp equal to the rank of the jutsu cast until the end of their next turn.
      (D-Rank = 4, C-Rank = 8, B-Rank = 12, A-Rank = 16, S-Rank = 25).</p></li><li><p><strong>Wind Release:</strong> In
      addition to the normal effects of the jutsu the target also gains +10 to their movement speed and a  +2 to
      Dexterity Saving Throws until the end of their next turn.</p></li><li><p><strong>Fire Release: </strong>In
      addition to the normal effects of the jutsu the target also gains resistance to fire  damage until the end of next
      turn and may spend and roll a hit die gaining an amount of hp equal to twice the result of the
      roll.</p></li><li><strong>Water Release:</strong> In addition to the normal effects of the jutsu the target also
      heals a d8 at the beginning of their turns for a number of rounds equal to the rank of the jutsu. (D-Rank = 1,
      C-Rank = 2, B-Rank = 3, A-Rank = 4, S-Rank = 5).</li><li><strong>Lightning Release:</strong> In addition to the
      normal effects of the jutsu the target also gains a +2 to their AC until the end of their next
      turn.</li></ul><p>Starting at 5th level, your <strong>Chakra Scalpel</strong> may now deal your chosen Nature
      Release's damage type instead of slashing. Additionally, you can spend a use of <strong>Chakra Scalpel</strong> to
      empower a jutsu of your chosen element. Jutsu you cast of your chosen element have their damage/healing dice
      increased by 1 or have their DC increased by 1 until the end of your current turn. This becomes 2 at level 13.</p>
