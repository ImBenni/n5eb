name: Echoes of Life
type: feat
_id: aVWW8j29qAOQ4ct6
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: >-
      <p>Starting at 2nd level, your prowess in both medicine and sealing has led you to develop a technique to weave
      life into inorganic material to create constructs of artificial life known as <strong>Spiritual
      Golems</strong>.</p><p>As an action, you can spend 5 chakra to place a seal onto a surface you can reach. Moments
      after the seal is placed, the surface begins to warp and mold outward, forming a <em>Fighter</em>,
      <em>Guardian</em>, or <em>Swift</em> Golem. The Golems are made out of the material you placed the seal on, and
      the seal you placed can be seen in the center of their chest.</p><p>You can only command one Golem at a time, as a
      bonus action on your turn. You can use this feature a number of times equal to your Charisma modifier per long
      rest, and regain half your spent uses of this feature on a short rest. You can restore hit points to your Golems,
      even if the jutsu states it cannot heal constructs, however, the amount healed is halved.</p>
