system:
  description:
    value: >-
      <p>Beginning at 2nd level, you have learned to empower your physical body with seals that represent your
      willpower. You gain resistance to Chakra damage and you can use Charisma in place of Wisdom for your
      <em><strong>Medical Ninjutsu</strong></em> and <em><strong>Chakra Scalpel</strong></em> class
      features.</p><p>Additionally, when you are only concentrating on jutsu with the Medical or Fuinjutsu keyword, your
      AC increases by +1 and the concentration cost is reduced by -1 (Min. 1). At 9th level, if you are concentrating on
      multiple jutsu that have both the medical and Fuinjutsu keywords, the bonus to AC and cost reduction
      doubles.</p><p>Starting at 5th level, when you deal damage to a creature's hit points with a jutsu with both the
      Medical and Fuinjutsu keywords, you can halve the damage dealt to deal damage to both a creature's hit points and
      chakra points.</p>
