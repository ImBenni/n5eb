system:
  description:
    value: >-
      <p>Starting at 13th level, you have perfected the art of weaving artificial life. When you use your
      <em><strong>Echoes of Life</strong></em> feature to make a <strong>Spiritual Golem</strong>, you can spend
      increments of 5 chakra to make additional Golems at once. You can move while making these Golems, and can create a
      number of Golems equal 1/3rd your Medical-Nin level.</p><p>Additionally, you can command up to 2 Golems at once
      with your bonus action, and can spend a use of your <em><strong>Chakra Scalpel</strong></em> to command 1 Golem as
      a free action, once per turn, for 1 minute. Golems that aren't commanded to take any action, automatically take
      the dodge action.</p>
