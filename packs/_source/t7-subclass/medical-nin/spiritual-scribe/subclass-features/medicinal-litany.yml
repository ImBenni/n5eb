name: Medicinal Litany
type: feat
_id: oZV92te488g0Strk
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: >-
      <p>Starting at 5th level, you learn the techniques required to seal your absolute victory and triumph in battle.
      You learn jutsu as you gain levels in this class according to the <strong>Spiritual Scribe</strong> Medic Chart at
      the end of this class section. Each Jutsu learned also grants you an additional feature pertaining to the jutsu
      learned. Learned jutsu do not count against your jutsu known as seen on your Medical Nin Class Chart.</p><p>Also
      at 5th level, when you heal a creature with a Fuinjutsu with the Medical keyword, you can choose to give them one
      of the following effects for 1 minute; You can use this feature a number of times equal to half your proficiency
      bonus per long rest.</p><ul><li>The ally selects one type of attack roll (Unarmed, Weapon, Ninjutsu, Genjutsu, or
      Taijutsu). The first attack roll the creature makes on their turn of the type they select is made at
      advantage.</li><li>The ally selects a classification of saving throws, picking between Physical (Strength,
      Dexterity, Constitution) or Mental (Intelligence, Wisdom, Charisma). The first saving throw the creature makes on
      a turn of the classification they selected is rolled at advantage.</li></ul><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-spiritual-scribe-chart.webp" />
