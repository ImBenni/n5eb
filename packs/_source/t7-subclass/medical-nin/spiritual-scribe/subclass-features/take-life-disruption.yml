name: 'Take Life: Disruption'
type: feat
_id: uuSyrfiSTijAWE9x
img: icons/magic/life/heart-area-circle-red-green.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, as an action, you can spend a use of your <em><strong>Take Life</strong></em> feature to
      weave a gargantuan sign into the ground or air, bringing forth a wave of destruction. All creatures of your choice
      within 30 feet of you must make a Constitution saving throw against your Ninjutsu or Genjutsu Save DC. On a failed
      save, the creature takes 5d8 force damage and is marked with a seal that is a single word of your choosing,
      somewhere on their body.</p><p>For 1 minute, while a creature has this seal they take 2d8 force damage which
      ignores temporary hit points, and 2d8 chakra damage at the start of each of their turns. Creatures can repeat
      their saving throw at the start of each of their turns, dispelling the seal on a success. A creature who fails 2
      or more saving throws becomes Dazed for the duration. A creature who fails 4 or more saving throws becomes
      Weakened for the duration. A creature who fails 6 or more saving throws becomes Incapacitated for the
      duration.</p><p></p>
