system:
  description:
    value: >-
      <p>Staring at 6th level, you have begun to refine the chakra within your own internal chakra network, so much so
      that every breath and exhale vitalizes your body with fresh chakra. You learn the following efficient molding
      techniques, known as <em><strong>Adaptive Moldings</strong></em>. You can use up to 2 of these moldings on your
      turn, in addition to other moldings, however, you must always pay their alternate cost, which is 5. These moldings
      affect your physical self, so you do not need to cast a jutsu to use these moldings.</p><ul><li><strong>Overdrive
      Molding:</strong> Your movement speed increases by 10 feet and you gain the benefits of the Dash or Disengage
      action. These effects last until the start of your next turn.</li><li><strong>Rejuvenating Molding:</strong> You
      take in a replenishing breath. Spend and roll 1 hit die, adding your Ninjutsu Specialist level, and regaining the
      result as hit points.</li><li><strong>Survival Molding:</strong> You dull your body's nerves to pain. Increase
      your AC by +1, and reduce all damage you receive (excluding Psychic) by your Intelligence modifier. These effects
      last until the start of your next turn.</li><li><strong>Tactical Molding:</strong> You increase your body's
      resilience. Gain a +2 bonus to Strength, Dexterity, and Constitution saving throws until the start of your next
      turn. You can use this molding as a reaction.</li></ul>
    chat: ''
