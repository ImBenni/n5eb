img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 10th level, Taijutsu you cast that are currently benefiting from your <em><strong>Refined
      Ninjutsu</strong></em> feature gain additional benefits. You can only use one of these features once per
      casting;</p><ul><li>As a bonus action, you can make a number of unarmed attacks equal to the rank of the jutsu
      cast. These attacks do not add your ability modifier to the damage rolls. <em>(D-Rank: 1, C-Rank: 2, B-Rank: 3,
      A-Rank: 4, S-Rank: 5)</em></li><li>As part of the same action, with each attack you make using your jutsu, you
      knock the creature back 10 feet, moving with them if you wish. If the creature possesses a jutsu, feature, or
      trait that would prevent knockback, you impose a Strength saving throw on each hit, knocking them back
      regardless.</li><li>When you initiate a clash with your chosen jutsu, you make your check at advantage, and if
      your unarmed damage type is of an element that is superior to the element of the jutsu being clashed, add a
      +1d4.</li></ul>
