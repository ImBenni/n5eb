name: Brain over Brawn
type: feat
_id: r7ObdarsQjUXQ6SE
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Also at 2nd level, you have learned to train your body efficiently, planning out various routines that
      meticulously improve your physical strength in numerous ways. You gain one Taijutsu Fighting Stance from Chapter
      13. When you would make an unarmed attack, you can use Intelligence in place of Strength for unarmed attack and
      damage rolls.</p><p>At 6th and 10th level of this class, your unarmed damage die while in a Taijutsu Fighting
      stance becomes a 1d8 and 1d10 respectively.</p><p>Additionally, your learning score for Taijutsu of B-Rank or
      higher can be your Intelligence score or Taijutsu score.</p><p>Finally, you can choose to refine Taijutsu with
      your <em><strong>Refined Ninjutsu</strong></em> feature. Refined Taijutsu gain the Ninjutsu keyword, and can use
      your Ninjutsu ability modifier in place of your Taijutsu ability modifier. These Taijutsu can benefit from any
      features or effects that would interact with Ninjutsu. <em>(Excluding the <strong>Potent Molding</strong> Class
      Feature)</em></p>
