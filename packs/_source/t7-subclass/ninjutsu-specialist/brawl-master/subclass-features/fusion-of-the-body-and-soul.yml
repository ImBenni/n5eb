system:
  description:
    value: >-
      <p>Starting at 14th level, your innovating battle style puts you on par with even the most elite and legendary
      Taijutsu masters.</p><p>Select a number of Taijutsu equal to your Intelligence modifier, that are currently not
      benefitting from your <em><strong>Refined Ninjutsu</strong></em> feature. You can use Intelligence as your
      Taijutsu ability modifier for these jutsu. You can change what jutsu this feature targets on a full
      rest.</p><p>Twice per long rest, when you cast a Taijutsu benefitting from your <em><strong>Refined
      Ninjutsu</strong></em> feature, you can double the cost of the jutsu to triple its range, change its damage type
      to force, and increase the damage by 1 step. If the range is touch or 10 feet, the range becomes 45 feet. When you
      use this feature, you benefits from all of your <em><strong>Adaptive Moldings</strong></em>.</p><p>Finally, when
      you use your <em><strong>Breath of Life </strong></em>feature, its duration is doubled and costs only 1 Chakra Die
      to reactivate.</p>
