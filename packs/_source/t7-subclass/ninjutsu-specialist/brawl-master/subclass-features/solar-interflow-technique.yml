name: Solar Interflow Technique
type: feat
_id: PAIFTWRL665S3Y7n
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 18th level, you learn the ultimate molding technique for Taijutsu with the Ninjutsu keyword, known
      as <em><strong>Solar Interflow.</strong></em> When you cast a Taijutsu with the Ninjutsu keyword, you can embolden
      the jutsu cast. You can only use this molding by spending 10 chakra. You can use this molding in addition to any
      other efficient molding, or <em><strong>Adaptive Molding</strong></em>, you may be using.</p><p>Your Taijutsu
      ignores resistance and immunity. If your Taijutsu had the <em><strong>Combo</strong></em> keyword, upon landing
      your final blow you may release a shockwave of chakra, imposing all creatures within 10 feet of the triggering
      creature, excluding yourself, to make a Dexterity saving throw, taking your Ninjutsu Specialist level in your
      unarmed damage type's damage, (If the damage type is physical, this shockwave instead deals force damage.) and
      becoming Dazed until the end of the turn on a failed save.</p><p>You can target the original target of the jutsu,
      or a creature who failed their saving throw with a Taijutsu <strong>Finisher</strong> or a Ninjutsu that requires
      a melee attack. If you choose a Ninjutsu, it temporarily gains the <em><strong>Finisher</strong></em> keyword and
      deals an additional 3 die of damage. Regardless of the Finisher type you use, its cost is reduced by 1d6.</p>
