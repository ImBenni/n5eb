system:
  description:
    value: >-
      <p>When you choose this tradition at 2nd level, you learn to refine Taijutsu and add it to your arsenal. You gain
      proficiency in medium armor and gain advantage on all Martial Arts checks in regards to Taijutsu and Ninjutsu. You
      can use Intelligence for Martial Arts checks, instead of Strength.</p><p>Additionally, you learn 1 Taijutsu that
      you qualify for. This taijutsu gains the Ninjutsu keyword and gains the effects of your <em><strong>Refined
      Ninjutsu</strong></em> feature. You can switch this Taijutsu for another Taijutsu you know when you level in this
      class.</p><p>Finally, when you cast a Taijutsu with the Ninjutsu keyword, you can do one of the following, once
      per casting;</p><ul><li>Increase your bonus to hit by a +1d4.</li><li>Increase your AC by +1 until the start of
      your next turn. (This effect cannot stack more than once per round).</li></ul>
