system:
  description:
    value: >-
      <p>When you choose this tradition at 2nd level, you learn two ninjutsu that you qualify for one of which can be
      C-Rank. The chosen jutsu must require concentration.</p><p>You also gain a 1d6 bonus on all Ninshou checks related
      to ninjutsu that require concentration that you can cast.</p><p>Finally, when you cast a ninjutsu with a range of
      self or touch that requires concentration, you can do one of the following, for the duration;</p><ul><li>Gain a +1
      bonus to your AC.</li><li>Reduce the cost to cast the chosen jutsu by half of 1d4 (Min 1).</li></ul>
