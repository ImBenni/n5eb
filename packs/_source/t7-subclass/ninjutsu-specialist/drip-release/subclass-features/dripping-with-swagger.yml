system:
  description:
    value: >-
      <p>Starting at 10th level, your drip even seeps into lesser techniques, such as ninjutsu that would harm another.
      Ninjutsu you cast that are currently benefiting from your <em><strong>Refined Ninjutsu</strong></em> class feature
      gain additional benefits.</p><ul><li>You gain 1 drip point as you cannot contain your chad energy, nor do you wish
      to.</li><li>You reduce the next instance of damage you take by an amount equal to 3 times the number of drip
      points you have.</li><li>You gain advantage on the next saving throw you make until the start of your next
      turn.</li></ul>
