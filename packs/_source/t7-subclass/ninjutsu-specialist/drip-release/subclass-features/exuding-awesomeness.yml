system:
  description:
    value: >-
      <p>Also at 6th level, you learn a new and unique efficient molding technique called <strong>Concentrated
      Will</strong>. When you cast a jutsu that has a range of self or touch and has a duration of 1 minute or longer
      that doesn't require concentration, you can embolden the jutsu cast. You can use this molding in addition to any
      other moldings you are using and has an Alternate Cost of 5.</p><p>The jutsu's duration is change to
      concentration, up to 1 hour. You cannot lose concentration as a result of failing a concentration check, and it
      does cost chakra to maintain concentration. Additionally, you gain 1 drip point at the end of each of your turns,
      as the jutsu enhances your awesomeness.</p>
