name: Fashionably Late
type: feat
_id: eDUJchxri2LynaKt
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 14th level, even if you aren't on time, you still manage to show up looking great. When you roll
      initiative you may choose to roll at disadvantage. If you do so, you can cast 1 jutsu that has a range of self or
      touch on yourself when you start your first turn as a free action.</p><p>Additionally, the maximum amount of drip
      points you can have is increased to 10 and your drip points now remain for an hour, even your sweat is wetter than
      normal.</p><p>Finally, you have mastered the art of staying cool and keeping a clear mind, even under pressure.
      You gain advantage on concentration checks and you can concentrate on an additional ninjutsu as long as all jutsu
      you are concentrating on have a range of self or touch.</p>
