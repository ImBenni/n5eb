system:
  description:
    value: >-
      <p>Starting at 6th level, you are so cool, that even ice shivers in your presence. When you cast a ninjutsu that
      requires concentration, you may change the casting time to a bonus action and reduce the concentration cost to 0.
      You also gain advantage on concentration checks and you cannot gain any penalties on making these checks. You can
      enhance a ninjutsu in this way twice per rest.</p>
