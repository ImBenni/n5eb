system:
  description:
    value: >-
      <p>When you choose this tradition at 2nd level, you begin to incorporate bukijutsu into your repertoire. You learn
      one bukijutsu that you qualify for. This bukijutsu gains the Ninjutsu keyword. Also, your ability score for
      determining if you can learn and cast Bukijutsu of B-Rank or higher is your Intelligence score.</p><p>You also
      gain proficiency in medium armor, one martial weapon of your choice, and the Martial Arts skill. You can make
      Martial Arts checks using your Intelligence instead of Strength, and you gain advantage on Intelligence (Martial
      Arts) checks you make in regards to bukijutsu. Finally, when you cast a Bukijutsu with the Ninjutsu keyword, you
      can do one of the following, once per casting:</p><ul><li>Gain a +1d4 bonus to damage rolls</li><li>Take the
      Disengage action as part of the same action</li></ul>
