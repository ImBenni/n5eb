system:
  description:
    value: >-
      <p>Also at 6th level, you learn a new and unique efficient molding technique called the <strong>Charged Blade
      Technique</strong>. When you cast a bukijutsu with the ninjutsu keyword or using your Imbued Weapon as a
      component, you can embolden the jutsu you cast. You can use this molding in addition to any other moldings you are
      using and has an Alternate Cost of 5.</p><p>The bukijutsu now deals force damage or whatever damage type your
      Imbued Weapon deals. The jutsu gains the Ninjutsu keyword if it didn't have it already, and its attacks gain a +1
      bonus to attack and damage rolls for every 5 chakra spent to cast the jutsu, up to a maximum of +5.</p>
