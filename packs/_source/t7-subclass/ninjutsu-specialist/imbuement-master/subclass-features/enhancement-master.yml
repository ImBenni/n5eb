system:
  description:
    value: >-
      <p>Starting at 14th level, you have become a master of ninjutsu imbuement. When you use your <em><strong>Ninjutsu
      Imbuement</strong></em> feature, you can imbue the same weapon with a second jutsu, further enhancing its power.
      Doing so only requires you to concentrate on the feature once.</p><p>Additionally, when you would cast a bukijutsu
      with the Combo keyword using your Imbued Weapon as a component, you can give one of your imbued jutsu the
      Bukijutsu and Finisher keywords until the end of your turn. Until the end of your turn, you can cast the chosen
      jutsu at no additional chakra cost, increasing the damage by two dice, once per casting. If this jutsu requires
      concentration to maintain, you must pay chakra to maintain concentration as if you had cast it at its base
      cost.</p>
    chat: ''
