system:
  description:
    value: >-
      <p>Starting at 18th level, you learn the ultimate molding technique for nin-buki called the <strong>Imbuement
      Master</strong> technique. When you cast a bukijutsu with the ninjutsu keyword that makes taijutsu attacks, you
      can embolden the jutsu cast. You can only use this molding by spending 10 chakra. You can use this molding in
      addition to any other efficient molding you are using.</p><p>Instead of making any attacks, the jutsu instead
      forces a single Constitution saving throw from a single target. On a failed save, the target takes damage as if
      you had hit with all of your attacks, also gaining any conditions accumulated from those attacks as well. If the
      target fails this save by 5 or more, your damage is increased as if one attack had scored a critical
      hit.</p><p></p>
    chat: ''
