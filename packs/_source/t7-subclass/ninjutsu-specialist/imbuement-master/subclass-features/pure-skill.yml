system:
  description:
    value: >-
      <p>Starting at 10th level, Bukijutsu you cast with the Ninjutsu keyword that are currently benefiting from your
      <em><strong>Refined Ninjutsu</strong></em> class feature gain additional benefits.</p><ul><li>As part of the same
      action used to cast the selected jutsu, once per cast, you can increase the power behind your attacks, dealing
      extra damage equal to twice your proficiency bonus to creatures who have temporary hit points or any form of
      damage reduction or resistance to your jutsu.</li><li>You can change the initial saving throw to either Strength
      or Constitution, changing the damage type to the same damage as your weapon's damage type.</li><li>These jutsu
      gain the Clash keyword, and when you initiate a clash with a Bukijutsu with the Ninjutsu keyword against another
      Taijutsu or Bukijutsu, you make your Clash check at advantage.</li></ul><p></p>
