name: Ink Adept
type: feat
_id: o2AdqhbWnCNvYDBe
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Once per turn, when you cast a <strong>"Beast Imitating Art"</strong> or command an Ink Summon, you gain 1 ink
      <em><strong>Sketch</strong></em>. These sketches are concepts for new ink beasts or abilities to existing ink
      beasts, that keep on a seperate section of your scroll. You can have up to 5 <strong>Sketches</strong> at once,
      and keep a <em><strong>Sketch</strong></em> for 1 minute before you scrap it. When you would cast a <strong>"Beast
      Imitating Art"</strong> or command an Ink Summon, you can spend any number of Sketches. If you do so, you cannot
      gain another sketch until the beginning of your next turn. Select from one of the following;</p><ul><li>Take the
      help action to assist one of your Ink summons, from up to 30 feet away. The distance you can help your Ink Summons
      increases to 60 feet at 6th level, and at 14th level, you can help 2 of your Ink Summons at once.</li><li>When you
      would deal damage with a <strong>"Beast Imitating Art"</strong>, or when you would command an Ink Summon an deal
      damage, you can spend any number of Sketches, dealing an additional die of damage per sketch
      spent.</li><li><p>Grant an Ink Summon the benefits of the Dodge action. At 6th level, this also grants them the
      benefits of the Disengage action, and at 14th level, 2 Ink Summons may benefit from this ability at one
      time.</p></li></ul>
    chat: ''
