system:
  description:
    value: >-
      <p>When you choose this Tradition at 2nd Level, you learn a jutsu with "Beast Imitating Art" in its name. If you
      already know all Ninjutsu with "<strong>Beast Imitating Art</strong>", you instead learn a C-Rank "Beast Imitating
      Art" Ninjutsu.</p><p>You also gain advantage on Intelligence (Ninshou) Checks in regards to Fuinjutsu, and you can
      create and learn Ninjutsu that have <strong>"Beast Imitating Art"</strong> in the name in half the required
      time.</p><p>Finally, when you cast a Ninjutsu with the "<strong>Beast Imitating Art</strong>" in the name, you can
      do one of the following; Constructs summoned from Beast Imitating Arts are referred as Ink Summons within this
      subclass.</p><ul><li>Grant an Ink Summon a number of temporary hit points equal to your Ninjutsu Specialist
      level.</li><li>If the jutsu cast is a D-Rank, reduce the cost by 1. At 5th level, reduce the cost by 2 if the
      jutsu is a C-Rank. At 9th level, reduce the cost by 3 if the jutsu cast is a B-Rank. At 13th level, reduce the
      cost by 4 if the jutsu cast is a S-Rank. At 17th level, reduce the cost by 5 if the jutsu cast is an S-Rank. This
      cost reduction counts as rank based.</li></ul>
    chat: ''
