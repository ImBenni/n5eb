system:
  description:
    value: >-
      <p>Also, at 6th level, you learn a new and unique efficient molding technique called the <em><strong>Painter's
      Technique.</strong></em> When you cast a <strong>"Beast Imitating Art"</strong>, when you command an Ink Summon,
      or when an Ink Summon would be destroyed, you can embolden the jutsu cast, once per round. You can use this
      molding in addition to any other moldings you are using and has an alternate cost of 5.</p><p>All creatures within
      5 feet of your casting, or that are within 5 feet of your Ink Summon when it is commanded or destroyed must
      succeed a Wisdom saving throw or become blinded until the end of your next turn. If this molding is used when your
      Ink Summon is destroyed, this molding affects creatures within 10 feet.</p>
    chat: ''
