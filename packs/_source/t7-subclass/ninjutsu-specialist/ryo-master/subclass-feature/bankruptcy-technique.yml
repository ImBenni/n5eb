system:
  description:
    value: >-
      <p>Starting at 18th level, you learn the ultimate molding technique for jutsu emboldened by ryō called
      <em><strong>Bankruptcy</strong></em>. When you cast a ninjutsu with the ryō, you can embolden the jutsu cast. You
      can only use this molding by spending 10 chakra. You can use this molding in addition to any other efficient
      molding you are using.</p><p>This jutsu ignores resistance and immunity, and any damage dealt to their hit points
      is also dealt to their chakra pool. Additionally, they may not cast a jutsu cheaper than the jutsu you cast with
      this molding until the start of your next turn.</p>
