img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you aren't afraid to gain a little money, even at the expense of others. When you would
      deal damage to a creature with a ninjutsu, you may select 1 creature to siphon money from. You gain ryō equal to
      half the damage the creature received rounding up to the nearest ten. <em><strong>Refined Ninjutsu</strong></em>
      instead siphon the full amount.</p><p>You may use this feature a number of times equal to your Intelligence
      Modifier per long rest.</p>
