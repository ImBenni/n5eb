name: Flash the Cash
type: feat
_id: kftRB6e9vgAdBGhL
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Also, at 2nd level you have learned to harness the power of money like no other.</p><p>First, Ninjutsu you cast
      that are benefitting from your <em><strong>Refined Ninjutsu</strong></em> class feature have their upcast cost
      reduced by 1 and they may gain the benefits of 2 <em><strong>Efficient Moldings</strong></em>. Refined Ninjutsu
      and Efficient Moldings used on your Refined Ninjutsu must use ryō instead of chakra with a 1 to 10 ratio.
      Additionally, Efficient Moldings cost 1 less chakra to use.</p><p>Second, when you damage a creature with a
      Ninjutsu you cast with ryō, you can give them 1 rank of <strong>Debt.</strong> A creature is in Debt for 1 minute
      or until triggered with an <strong>Audit</strong>. A creature can have up to 5 ranks of <strong>Debt</strong> at
      once. Once per turn, when you would affect a creature with a Ninjutsu cast with ryō, you can perform an
      <strong>Audit</strong> on the creature. The creature creatures next jutsu has its cost increased by 1d8 for every
      rank of <strong>Debt</strong> they had.</p>
    chat: ''
