name: Flaunt Your Wealth
type: feat
_id: bwgGneMAn3HP0eJs
img: icons/magic/symbols/elements-air-earth-fire-water.webp
system:
  description:
    value: >-
      <p>Starting at 10th level, your wealth is overpowering, sometimes shining through your techniques, no matter what
      you do. Ninjutsu you cast that are currently benefiting from your <em><strong>Refined Ninjutsu</strong></em> class
      feature gain additional benefits.</p><ul><li>As a part of the same action used to cast the selected Ninjutsu spend
      an additional 50 ryo to give all affected creatures one additional rank of a condition, excluding
      exhaustion.</li><li>You may spend an additional 50 ryo to give creatures disadvantage on the initial saving
      throw.</li><li>You may upcast the jutsu cast by 1 rank higher than you are currently allowed, at no additional
      cost.</li></ul>
