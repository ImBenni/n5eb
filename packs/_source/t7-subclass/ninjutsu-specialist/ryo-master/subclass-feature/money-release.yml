system:
  description:
    value: >-
      <p>When you choose this Tradition at 2nd level, you gain access to a special release called Money Release. Money
      Release utilizes the power of money instead of chakra. During a short or long rest you can convert chakra into ryō
      at a rate of 1 chakra to 10 ryō. Ryō gained in this way can only be used to cast ninjutsu. Ryo gained this way
      lasts for 8 hours. Ninjutsu cast with ryō are also at a rate of 1 chakra to 10 ryō.</p><p>When you cast a ninjutsu
      with ryō, you can do one of the following, once per casting;</p><ul><li>Gain a +1d4 bonus to damage
      rolls.</li><li>Reduce the cost of the jutsu by -2 (Min. 1)</li></ul>
