system:
  description:
    value: >-
      <p>Also at 6th level, you learn a new and unique efficient molding technique called <strong>Monopolize
      Molding</strong>. When you cast a jutsu with ryō, you can embolden the jutsu cast. You can use this molding in
      addition to any other moldings you are using and has an Alternate Cost of 5.</p><p>The first time a creature takes
      damage as a result of a jutsu enhanced by this molding the next jutsu they cast has its cost doubled.</p>
