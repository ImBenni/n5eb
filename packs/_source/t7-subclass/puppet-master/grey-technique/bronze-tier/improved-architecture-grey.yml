system:
  description:
    value: >-
      <p><strong>Techniques:</strong> Grey <br />You improve upon the vessel of your Binding in various ways. The Puppet
      Tool that gains this upgrade, gains a specific benefit depending on their
      Binding;</p><ul><li><strong>Amalgamation:</strong> The Amalgamation Puppet increases the damage of its natural
      weapon by +1 die and gains 2 additional Bloodline Points. Additionally, when the Amalgamation Puppet would be
      reduced to 0 HP, it may roll a Constitution saving throw against half the damage taken to remain at 1 HP
      instead.</li><li><strong>Apparition:</strong> Your Puppet gains 2 D-Rank Jutsu of your choice, that you could also
      qualify for. At 10th level, it learns 2 C-Rank Jutsu of your choice, and 2 B-Rank Jutsu at 17th level. Your Puppet
      can use Charisma as its casting ability modifier for these Jutsu. (These jutsu follow the same casting rules as
      the Jutsu Specialization upgrade.)</li><li><strong>Machination:</strong> The Machination Puppet applies twice your
      proficiency bonus to all grapple checks, may hold up to two creatures inside of it at the same time, and gains
      Resistance to all damage done by any creature trapped inside of it.</li></ul>
