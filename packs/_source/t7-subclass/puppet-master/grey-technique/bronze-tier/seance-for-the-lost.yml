img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p><strong>Techniques:</strong> Grey <br />You've learned how to use your puppet as a spirit medium, drawing in
      the dead and allowing then to speak throught it. The activate this upgrade, you must be near a creature's corpse,
      the location in which a creature recently died, or an area of enough emotional significance to the spirit. Unless
      the spirit you wish to draw in is actively haunting a nearby location, it must have been dead for no more then two
      months for this Upgrade to work.</p><p>You can ask each willing spirit a number of questions equal to your
      profiency bonus. The spirit knows what it knew in life, including the languages it knew, and may or may not be
      able to recollect any additional information it learned after death. Answers are usually brief, cryptic, or
      repetitive, and the spirit is under no compulsion to offer a truthful answer if you are hostile to it or it
      recognizes you as an enemy. You may only call on each spirit once. You may use this Upgrade twice per rest.
      Alternatively, you can spend 10 chakra to use this upgrade without taking a rest.</p><p></p>
