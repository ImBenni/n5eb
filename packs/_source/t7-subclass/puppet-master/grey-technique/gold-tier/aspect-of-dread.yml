system:
  description:
    value: >-
      <h5 id="aspect-of-dread">Aspect of Dread</h5><p><strong>Techniques:</strong> Grey <br />Layering your Puppet
      special binding rituals and esoteric sound amplifier arrays, you allow the hungering entity within to call out
      without slipping your control.</p><p>When your puppet takes the attack action, it can spend 20 of your chakra to
      unleash a 30-foot radius scream - the true wail of a Banshee. All other creatures, excluding your puppet, must
      make a Constitution Saving Throw at disadvantage or take 10d10 psychic damage and 10 ranks of the Bleeding
      condition as the horrifying screams cause their ears, eyes, and nose to bleed, or half as much and 2 ranks of the
      Bleeding condition on success.</p><p>Additionally, all inorganic materials within range hemorrhage blood
      profusely, regardless of their capacity to do so or capacity to hold as much liquid inside. This bleeding lasts
      for the next minute. While bleeding in this way, the Spirits of the dead may reach through the material,
      stretching it out as one might rubber while they press their hands and faces against it, trying to break through
      to the other side. The area counts as difficult terrain and a sufficient water source for up to A rank Water
      Release Jutsu until the bleeding stops. Finally, Constructs and Structures that start their turn within this area
      increase all damage taken from the Bleeding condition by one step.</p>
