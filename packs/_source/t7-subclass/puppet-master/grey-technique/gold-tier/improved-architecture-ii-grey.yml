system:
  description:
    value: >-
      <p><strong>Techniques:</strong> Grey <br /><strong>Prerequisite:</strong> <em><strong>Improved Architecture I
      (Grey)</strong></em> <br />You elevate the design of your Puppet Tools even further with more innovation. Your
      Puppet Tool gains additional benefits, depending on the nature of its
      Binding.</p><ul><li><strong>Amalgamation:</strong> The Amalgamation Puppet gains 4 additional Bloodline Points
      and, when it would make an Attack Action with its natural Weapon, it may make an additional attack. Additionally,
      when the Amalgamation Puppet would fail a Constitution Saving Throw to avoid being reduced to 0 HP, it may choose
      to automatically pass the save thrice per rest.</li><li><strong>Apparition:</strong> The Apparition puppet
      increases its movement speed by 30 feet, can not have its movement speed reduced by any means, and may spend 4
      chakra to pass through surfaces, barriers, or walls made by Jutsu. Additionally, when a creature deals damage to
      the Apparition Puppet it may use its Reaction to halve all damage until the end of the turn, turning ethereal and
      intangible.</li><li><strong>Machination:</strong> The Machination Puppet may hold up to three creatures inside of
      it at the same time and no longer requires an action to Subsume creatures inside of it, instead able to
      autmatically target all creatures trapped inside of its body at the end of each of its turn. Additionally, each
      time a creature is Subsumed by the Machination Puppet it must pass a Constition Saving throw or gain 1 rank of
      Exhaustion until it excapes the Puppet's confines.</li></ul>
