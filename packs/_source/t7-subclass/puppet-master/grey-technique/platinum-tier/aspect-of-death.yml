system:
  description:
    value: >-
      <p><strong>Techniques:</strong> Grey <br />You have touched death, and throught your puppet, it has touched you
      back and seen into your soul. Your Puppet gains the ability to cast the <em><strong>Sealing Art: Gate of the
      Afterlife</strong></em> jutsu using your chakra and opening itself up as a spectral, pulsating and quasi real
      giant portal into the afterlife when it does. Rather then one year, this Jutsu only takes 1 minute to cast and
      Stuns your puppet for the full duration the portal remains open.</p><p>Spirits attempting to force their way
      throught without your permision must roll a charisma saving throw, rolling 4d20 and taking the worse result. On
      failure, they are pushed back and disallowed to try again for the next 24 hours.</p>
    chat: ''
