name: Aspect of Decay
type: feat
_id: LitZ7N13VL8M8fxb
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>You outfit your puppet with a small chamber at the back of its neck, building a device within it that holds a
      powerful Talisman matrix seal as its core designed to gather and accumulate the primordial undeath and unnatural
      decay that leaks from the entity inside your puppet. Just being close to it for too long can leave one pale, weak,
      and chilled to the bone.</p><p>As an Action, your puppet can vent the chamber containing this device by spending
      15 of your chakra. When it does, it creates a 30-foot radius sphere of sicky green-black chakra that follows it
      for a number of turns equal to half your profiency bonus (rounded up), remaining centered from the puppet as it
      moves. All creatures, excluding you and your puppet, who start their turn within this cloud or enter it during
      their turn for the first time must succeed a Constitution saving throw, taking 4d12 Necrotic damage, 2 ranks of
      the Chilled condition, and 2 ranks of the Frightened condition for the next minute on a failed save or half as
      much damage on success. Each affected creature may remake their saving throw at the end of their turn to end all
      ranks of the Frightened condition inflicted by this upgrade.</p><p>All creatures inside the 30-foot sphere gain
      <em>half cover</em> as the deathly chakra obscures them.</p>
