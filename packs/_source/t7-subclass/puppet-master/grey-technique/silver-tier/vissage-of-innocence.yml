name: Vissage Of Innocence
type: feat
_id: 3icYEfed321MgHAu
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>Techniques: Grey, Perfect You have learned to hide your Puppet's true nature, outfitting it with a transforming
      apparatus.</p><p> Your Puppet gains an alternative form.</p><p> Pick a single Puppet Chassis from Black Technique,
      Puppet Framework from Green Technique, Weapon Type from Blue Technique, or Puppet Role from Red Technique.</p><p>
      Once selected, the choice is permanent.</p><p> Your puppet tool gains the selected option as a secondary form,
      assuming an innocent and harmless visage, such as that of a lost child, while transformed into it.</p><p> This
      alternative form shares a single reaction with its main form, but has its own action.</p><p> When you gain this
      new form, you must redistribute your upgrades and Ability Score Improvements between both of your Puppets.</p><p>
      Additionally, this secondary form only gains 50% of its maximum HP and may not take any Upgrades of the
      Medium.</p><p> Instead, it gains one free upgrade from the selected Technique and a +2d6 bonus to Deception checks
      meant to convince others to follow it while it appears to be alone or the believe it is harmless.</p><p> You may
      purchase additional upgrades from the selected Technique for your Puppet's Alternative Form, increasing the tier
      of each by one (Wood upgrades take up a Bronze Upgrade slot).</p><p> Finally, you may cause your Puppet to switch
      forms as an Action on your turn.</p><p> When you do, all creatures within 20 feet of your puppet who have never
      seen your Puppet's original form before and would witness it for the first time must roll a Charisma Saving Throw
      or gain 2 ranks of Frightened for the next minute.</p><p> Each affected creature may remake their saving throw at
      the end of their turn, losing all ranks of Frightened granted by this upgrade on success.</p><p></p>
