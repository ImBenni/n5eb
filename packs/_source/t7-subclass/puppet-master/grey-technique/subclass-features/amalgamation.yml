img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>ASI: +2 to any ability score, +1 to any ability score Your Puppet is a corpse touched by undeath and imbued
      with boimechanical properties that strengthen it furhter while helping to bring it under your control.</p><p> You
      are considered as gaining the Bloodline, Latent feat, only gaining 2 Bloodline Points and distributing any
      purchased features to your Puppet.</p><p> You cannot select the Hoshigaki, Inuzuka, or Kurama clans.</p><p> If you
      opt to purchase a hijutsu feature, your Puppet can use the chosen clan's hijutsu, paying an additional 2 chakra
      unless you have the Jutsu Specialization upgrade.</p><p> At 11th and 16th levels, you gain 2 more Bloodline
      Points.</p><p> These must be from the same clan.</p><p> Your Puppet Tool gains the natural weapon
      Nourishment.</p><p> Reach 5ft , one target.</p><p> Hit: 1d8 + Strength or Constitution Modifier + your proficiency
      bonus in Chakra Damage and Necrotic Damage.</p><p> Your Puppet regains Hit Points equal to the Chakra Damage
      inflicted.</p><p></p>
