name: Apparition
type: feat
_id: nv7f2hKMgaHeyLqh
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>ASI: Strength score becomes 3, Charisma score becomes 16.</p><p> Your puppet is part incorporeal - a ghost,
      anchored to your soul and given limited ability to manipulate the world through a puppet effigy or totem under
      your control.</p><p> Your Puppet gains a flying speed equal to its movement speed and can hover.</p><p> Your
      Puppet can move through creatures, objects and walls as if they were difficult terrain.</p><p> This does not allow
      it to pass through surfaces, barriers, or walls made by Jutsu.</p><p> Your Puppet takes 2d8 Force damage if it
      ends its turn inside a creature or an object.</p><p> Your Puppet can use Charisma in place of its Strength ability
      modifier for all attack rolls and damage rolls made with its Natural Weapon.</p><p> Your Puppet Tool gains the
      natural weapon Defilement.</p><p> Reach 10ft. , one target.</p><p> Hit: 1d10 + Strength Modifier + your
      proficiency bonus in Psychic and Cold damage, counting as both for overcoming damage Resistances and interacting
      with damage Vulnerabilities.</p><p> On a roll of 17-20, your Puppet Tool inflicts 1 rank of the Chilled or
      Bleeding condition (you choose)</p>
