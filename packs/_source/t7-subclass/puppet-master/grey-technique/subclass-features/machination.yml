name: Machination
type: feat
_id: WEOP7WRoHL2OGAVv
img: icons/magic/control/control-influence-puppet.webp
system:
  description:
    value: >-
      <p>ASI: +2 to Constitution score, +1 to Strength score Your Puppet is a entity of horror imprisoned within a tomb
      of steel, fuinjutsu, and mechanical contraptions.</p><p> At times, it is known to move on its own when left
      outside your control for to long, and its fake eyes always shift to watch you.</p><p> Your Puppet gains the
      Entrapment Mechanism upgrade for free.</p><p> This does not count against your known upgrades.</p><p> Whenever
      your puppet successfully uses Entrapment Mechanism to grapple a creature, it may immediately pull it inside of its
      body so long as the creature is the same size as your puppet or smaller.</p><p> Creatures trapped inside your your
      Puppet have Total Cover against all other creatures and disavantage to all skill checks for as long as they remain
      inside its body.</p><p> Your Puppet may spend its Action to subsume a single creature trapped within its body,
      doing 2d10 Necrotic and Chakra damage in the process.</p><p> This damage increases to 4d10 Necrotic and Chakra
      damage at 10th level, and 6d10 Necrotic and Chakra damage at 17th level.</p><p> Your Puppet Tool gains the natural
      weapon Confinement.</p><p> Reach 5ft., one target.</p><p> Hit: 2d6 + Strength Modifier + your proficiency bonus in
      bludgeoning damage.</p><p> On hit, your puppet may immediately attempt to grapple the creature.</p><p></p>
