system:
  description:
    value: >-
      <p>Starting at 10th level, you have begun to move as one, as the spirit or entity within your puppet learns to
      move with your will. Once per round, you can command one Puppet Tool without using your action or bonus action.
      You cannot command this same Puppet Tool again using your action or bonus action for the remainder of the current
      round. Visually, your Puppets do not require your <em><strong>Chakra Threads</strong></em> to move.</p>
