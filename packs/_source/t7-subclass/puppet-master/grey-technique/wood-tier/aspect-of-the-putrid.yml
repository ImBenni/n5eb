system:
  description:
    value: >-
      <p>Your puppet's true nature spills out when damaged, revealing the horror within. As a Reaction to being damaged
      via a melee attack, a small section of your puppet briefly comes apart, allowing a torrent of unnatural and
      monstrous insects and vermin to pour out onto the unfortunate creature. They must roll a Charisma Saving Throw or
      take Xd8 necrotic damage and 1 rank of the Frightened Condition for the next X turns, where X equals half your
      proficiency bonus (rounded up), or half as much on success.</p><p>You may use this Upgrade twice per rest.
      Alternatively, you can spend 5 chakra to use this upgrade without taking a rest.</p>
