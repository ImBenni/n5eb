system:
  description:
    value: >-
      <p><strong>Techniques:</strong> Grey <br />Through careful tuning and tinkering, you've calibrated your puppet to
      release a tiny amount of spiritual energy at a steady rate through a carefully fabricated device, allowing it the
      subtle supernatural ability to interact with that most all haunting spirits often learn to develop, on your
      terms.</p><p>By using your puppet as medium and source of power, you can communicate with machines non-sentient
      from a distance and influence their decisions, visuals, and movements; such as making industrial grade meat
      grinder turn on without warming, cause a series of lights to burn out in a row, one after the other, or force
      cameras to flicker, either refusing to show your puppet's vissage or hiding it until your puppet is within inches
      of the device.</p><p>Additionally, your puppet may open any Poor, Simple, or Average quality locks as an Action or
      Bonus Action and is immune to the <strong>Alarming Technique</strong> Jutsu, unable to set it off unintentionally
      by any means.</p>
