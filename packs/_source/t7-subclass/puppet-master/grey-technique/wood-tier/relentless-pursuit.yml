system:
  description:
    value: >-
      <p>Techniques: Grey, Perfect</p><p> Careful to keep the entity within sedated, you modify your puppet to let a
      fraction of its awareness and bloodlust to leak out, helping to drive it forward.</p><p>Your Puppet gains two
      additional reactions which can only be used to make attacks of opportunity.</p><p>Hit or miss, your puppet may
      move up to half its full movement speed toward the triggering creature.</p><p>Additionally, whenever your puppet
      damages another creature with an attack of opportunity, they receive one rank of the Bleeding condition.</p>
