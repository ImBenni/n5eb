name: Wingman
type: feat
_id: 17SBoXPsVlSqRZhd
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, whenever you use the attack action you can replace any number of attacks with the help
      action.</p><p> Additionally, when you use the Help action to aid an ally in attacking a creature, the target of
      that attack can be within 30 feet of you, rather than 5 feet of you, if the target can see or hear you.</p><p> If
      you took Jack of All, Master of None Support you increase the range of your Help Action by 15ft instead.</p><p>
      Starting at 6th level, when an ally that is benefitting from your help action rolls a natural 20 on an attack
      roll, skill check or saving throw, you regain one spent superiority die.</p><p></p>
