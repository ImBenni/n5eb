system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>In order to use this maneuver, you must be within 5 feet of either a
      surface(Other than what you are standing on) or a creature a size.</p><p> When you would move you may roll a
      superiority die.</p><p> You bounce off the surface/creature, moving an amount of feet equal five times the result
      of the die, plus 5, in any direction.</p><p> If you run into another surface/creature you may move an additional 5
      ft.</p><p> Alternatively, when you collide with a creature you may make a melee weapon attack against that
      creature.</p><p> The creature must make a constitution saving throw vs your taijutsu save dc regardless if the
      attack hits or not.</p><p> On a failed save you push the creature 30 feet.</p><p> You can move up to 50 feet using
      this maneuver.</p><p></p>
