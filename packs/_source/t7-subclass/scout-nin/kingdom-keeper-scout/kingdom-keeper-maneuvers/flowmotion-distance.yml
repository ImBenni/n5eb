system:
  description:
    value: >-
      <p>In order to use this maneuver, you must be within 5 feet of either a surface(Other than what you are standing
      on) or a creature a size.</p><p> When you would move you may roll a superiority die.</p><p> You bounce off the
      surface/creature, moving an amount of feet equal to the result of the die*5+10 in any direction.</p><p> If you run
      into another surface/creature you may move an additional 10 ft.</p><p> You can move up to 150 feet using this
      maneuver.</p><p></p>
