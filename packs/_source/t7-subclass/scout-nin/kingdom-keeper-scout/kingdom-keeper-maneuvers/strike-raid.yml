img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>You toss your Keyblade at a creature's head in an attempt to catch it by surprise.</p><p> As an action, you can
      expend a superiority die and make a ranged weapon attack roll on a creature within 40 feet of you, with the result
      of the die being added to your attack roll.</p><p> On a successful hit you deal your weapon damage and the
      creature must make a Constitution save vs your Taijutsu Save DC, being dazed and weakened until the end of your
      next turn on a failed save.</p><p> Regardless of whether you hit or miss, your Keyblade returns to your
      hand.</p><p></p>
