name: Chosen Path
type: feat
_id: uJNezDmmri8qKIGj
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>At 9th level, your heart has attuned to one of the paths that a Keyblade wielder can walk down
      upon.</p><p>Choose one of the three paths below.</p><p>When you use the damage type listed in the path, it
      bypasses Resistance and ignores up to your Charisma modifier in DR.</p><p>You gain the benefits of that path;
      </p><p></p><p>Dawn </p><p>You may add your Charisma to initative checks.</p><p>Your keyblade may deal fire
      damage.</p><p>Weapon attacks you make gain +1 to damage for each die.</p><p></p><p>Mid-Day </p><p>When you cast
      Fuinjutsu while wielding your Keyblade, you may replace the HS or CS with the W(Keyblade) component.</p><p>Your
      keyblade may deal lightning damage.</p><p>Weapon attacks gain a +1 to attack rolls.</p><p></p><p>Dusk </p><p>When
      you must roll for death saves, you require four failed saves to die and add half your charisma modifier to death
      saving throws.</p><p>Your keyblade may deal necrotic damage.</p><p>Weapon attacks against targets with the poison,
      envenomed, or corroded deal an additional die of damage twice per turn.</p><p></p>
