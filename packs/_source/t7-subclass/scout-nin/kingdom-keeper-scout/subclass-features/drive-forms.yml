name: Drive Forms
type: feat
_id: 9DxyX3bxGaRNXBZO
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>At 6th level, your mastery of the keyblade has unlocked a new ability from within your heart.</p><p>Upon
      gaining this feature, you may pick one of the Drive Forms below.</p><p>You may pick an additional form at 9th and
      14th level.</p><p>At the start of your turn, you can enter one of your available Drive Forms, listed
      below.</p><p>The form lasts for 10 minutes after activation.</p><p>As an action on your turn you can swap your
      active form.</p><p>Swapping your form reduces the duration by 1 minute.</p><p>Alternatively, you can deactivate
      the form as a free action.</p><p>Subsequent uses of this feature add a superiority die to the cost with each use
      before taking a long rest.</p><p>Also at 6th level, while in a Drive Form, you may regain one Superiority Die,
      once per round, when you do the following based on your form; </p><p>Valor: Hit two attacks with a
      Keyblade.</p><p>Wisdom: Move your Full Movement speed, or if a creature fails a save against a Ninjutsu you cast
      by 5 or more.</p><p>Limit: Score a critical hit with a Keyblade.</p><p></p><p>Valor </p><p>Your Strength and
      Dexterity scores increase by +2 You gain a second Keyblade with the same statistics of your original Keyblade,
      including any seals.</p><p>You cannot be unwillingly disarmed of either Keyblade.</p><p>You gain the Two Weapon
      Fighting Bukijutsu stance and may switch into it upon entering the Valor form.</p><p>Anytime you would deal damage
      using your Keyblade, you deal additional damage equal to half your scout-nin level.</p><p>Your movement speed
      increases by +15ft.</p><p>You lost the ability to cast or maintain concentration
      ninjutsu/genjutsu.</p><p></p><p>Wisdom </p><p>Your Intelligence score increases by +2 Ninjutsu you cast deal an
      additional die of damage.</p><p>You are always under the effects of Wind Release: Feather Fall You ignore the
      effects of difficult terrain You ignore penalties to your water walking, climbing, and wall walking
      speed.</p><p>You gain the D-Rank ninjutsu, Hollow Stars.</p><p></p><p>Limit</p><p> Your Charisma scores increases
      by +2.</p><p>You gain the Versatile Bukijutsu stance and may switch into it upon entering the Limit
      form.</p><p>When you roll a 1 or 8 on your superiority die, you gain 1 temporary superiority die for your Drive
      Forms duration.</p><p>This die can only be used on maneuvers.</p><p>You may use two maneuvers on a turn instead of
      just one.</p><p>When you would cast a bukijutsu, you may use your Charisma modifier for the DC and Attack
      bonus.</p><p></p>
