system:
  description:
    value: >-
      <p>Beginning at 14th level, your mastery of drive forms allows you to push yourself to activate them even at your
      weakest moments.</p><p> When you would use a maneuver while having not having any more uses of your Drive Forms,
      you gain an additional use of your drive forms.</p><p> Activating a drive form through this feature takes a bonus
      action and only lasts 1 minute.</p><p> You may not swap your active form but you can still deactivate it as a free
      action.</p><p></p>
