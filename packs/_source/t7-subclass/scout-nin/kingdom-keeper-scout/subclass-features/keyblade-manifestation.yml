system:
  description:
    value: >-
      <p>At 3rd level, you materialize a blade shaped like that of a key created to triumph over evil across the
      world.</p><p> You can summon the Keyblade to your hand as a bonus action and dismiss it as a free action.</p><p>
      The blade resides in a pocket dimension where only it exists while not in use.</p><p> This blade is chakra
      enhanced and is unbreakable.</p><p> The keyblade is a melee weapon with the added benefit of being able to use
      charisma for attack and damage rolls instead of strength.</p><p> Additionally, while you are wielding this blade,
      Fuinjutsu you cast may use your charisma instead of the normal ability score.</p><p> Finally, you learn the
      ninjutsu Lock/Release.</p><p> This does not count against your total jutsu known list.</p><p></p>
