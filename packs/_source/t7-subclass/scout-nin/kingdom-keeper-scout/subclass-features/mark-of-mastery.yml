name: Mark Of Mastery
type: feat
_id: FOup3TkUDzDTPJhk
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>At 20th level, your strength of heart has peaked and thus you gain access to your final form.</p><p> Once per
      long rest you can activate your final form as a bonus action for 10 minutes Select 1 feature from each of your
      previous drive forms (excluding ASI improvements).</p><p> You gain those features in addition to the following;
      </p><p>You may pick two stats to gain a +2 between your Strength, Dexterity, Intelligence, and Charisma
      scores.</p><p> When you would take the attack action, you may make an additional attack.</p><p> You gain a second
      Keyblade with the same statistics of your original Keyblade(including any seals you equipped to the weapon).<br />
      You cannot be unwillingly disarmed of either Keyblade.<br /> Both of your Keyblade float around you.<br /> They
      gain the reach, light, and deadly property.</p><p> You gain a flight speed equal to your walking speed.</p><p>
      When you would cast a bukijutsu, you may use your charisma modifier for the DC and Attack bonus.</p><p> You may
      make an attack of opportunity once per turn without spending a reaction.</p><p></p>
