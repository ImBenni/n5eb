system:
  description:
    value: >-
      <p>At 17th level, your will to fight refuses to let you go down without a fight.</p><p> When you would be brought
      to 0 hp, you may spend a Hit Die and Chakra die to instead set your hp to 15.</p><p> You may add the result of
      both spent dice to your hp.</p><p> Each subsequent use increases the cost by one of each dice, but you still only
      roll one of each dice.</p><p> This resets on a long rest.</p><p></p>
