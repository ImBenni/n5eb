system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>When you would remove a condition on a creature, you can expend a
      superiority die.</p><p> Until the end of your next turn, you retain the knowledge of how to inflict that
      condition, and the next time you would deal damage to a creature within this duration, you also inflict one target
      creature with a number of stacks of the condition equal to a roll of your superiority die, up to its maximum
      number of stacks.</p><p> You cannot inflict any ranks of exhaustion, slowed, or weakened with this
      maneuver.</p><p></p>
