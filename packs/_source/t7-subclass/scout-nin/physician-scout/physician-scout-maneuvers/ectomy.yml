system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>As an action, you can expend a superiority die and make a melee ninjutsu
      or taijutsu attack against a creature within your unarmed reach.</p><p> Roll your superiority die.</p><p> On a
      hit, the creature has disadvantage on all attack rolls, ability checks, and saving throws using a certain ability
      score for the next minute.</p><p> The type of ability score is determined by the die roll: 1=Strength,
      2=Dexterity, 3=Constitution, 4=Intelligence, 5=Wisdom, 6=Charisma.</p><p> As an action, the target or a creature
      within 5 feet of the target can make a Wisdom (Medicine) or Dexterity (Sleight of Hand) check against your
      ninjutsu or taijutsu DC (which one is based on the melee attack you made), ending the maneuver's effect on a
      success.</p><p> The maneuver's effect on a creature also ends if you use this maneuver on the same creature
      again.</p><p></p>
