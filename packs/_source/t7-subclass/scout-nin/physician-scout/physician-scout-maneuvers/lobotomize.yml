system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>When you cast a jutsu with the medical keyword that would restore a
      creature's hit points to a creature you touch, you can instead make a melee jutsu attack (the type of attack
      depends on the jutsu type), and expend a superiority die, adding it to the attack roll.</p><p>On a hit, instead of
      restoring hit points, the target takes necrotic damage equal to the amount of hit points they would normally
      regain.</p><p></p>
