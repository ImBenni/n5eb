  description:
    value: >-
      <p>Beginning at 17th level, you can utilize your healing ability as quickly as any combatant could strike.</p><p>
      When you take the Attack action, you can replace one of your attacks to expend one of your superiority dice or one
      of your Physician Dice from your Field Surgery feature, healing a creature within 30 feet of you an amount equal
      to the die's result + your Intelligence modifier.</p><p></p>
