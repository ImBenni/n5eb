  description:
    value: >-
      <p>Beginning at 6th level, you learn to assess your situations and better prioritize those with more severe
      injuries.</p><p> You can always tell how many hit points a creature has, rounding to the nearest 10%.</p><p>
      Whenever you heal a creature with less than 30% of their maximum hit points, you can expend a superiority
      die.</p><p> When you do so, the creature heals the maximum amount possible.</p><p></p>
