system:
  description:
    value: >-
      <p>Finally, at 3rd level, you gain a pool of Physician Dice equal to 1 + half your scout-nin level which are
      d6s.</p><p> As a bonus action, you can heal one creature you can see within 30 feet of you, spending dice from the
      pool.</p><p> The maximum number of dice you can spend at once equals your Intelligence modifier (minimum of 1
      die).</p><p> Roll the dice you spend, add them together, and restore a number of hit points equal to the
      total.</p><p> You regain all your expended Physician Dice when you finish a long rest.</p><p> Alternatively, you
      can expend a superiority die, rolling it and regaining a number of Physician Dice equal to half the roll's
      result.</p><p> Beginning at 14th level, when you would roll a superiority die to regain expended dice, you regain
      a number of Physician Dice equal to the roll's result, instead of half.</p><p></p>
