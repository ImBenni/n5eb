name: Improvised Healing
type: feat
_id: Aen025CNLqBbf2sq
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 9th level, you've learned to use your usually harmful jutsu and manipulate them into healing jutsu
      instead.</p><p> As a bonus action, when you cast a jutsu that would deal damage to a creature or inflict a
      condition of some kind, you can instead heal the creature or remove a condition.</p><p> The amount of healing is
      half the amount of damage you would have dealt, and the condition you remove is the same condition the jutsu would
      have normally inflicted.</p><p> If you use this feature with a genjutsu, the target does not regain hit points,
      but instead gains temporary hit points equal to the number of hit points they would have regained.</p><p>
      Additionally, if you use this feature with a jutsu that would affect an area, all normal targets of the jutsu are
      healed.</p><p> You can use this feature a number of times equal to your Intelligence modifier, regaining all
      expended uses when you finish a long rest.</p><p> Alternatively, you can expend a superiority die to use this
      feature again.</p><p></p>
