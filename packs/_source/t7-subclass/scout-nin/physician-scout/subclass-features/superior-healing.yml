system:
  description:
    value: >-
      <p>Beginning at 3rd level, you learn maneuvers that are fueled by special dice called Superiority Dice.</p><p>
      Maneuvers: You learn two maneuvers of your choice, which are detailed in the Physician Maneuvers section at the
      end of this class.</p><p> You earn more at higher levels as shown in the "Maneuvers Known" column of the Superior
      Healing table.</p><p> Many Maneuvers enhance you or your allies in some way.</p><p> You can only use one maneuver
      per turn.</p><p> When you take a long rest, you can switch one maneuver you know for another you qualify
      for.</p><p> Superiority Dice: You have two superiority dice, which are d6s; you earn more at higher levels, as
      shown in the "Superiority Dice" column of the Superior Healing table.</p><p> A superiority die is expended when
      you use it.</p><p> You regain all of your expended superiority dice when you finish a short or long
      rest.</p><p></p><img src="systems/n5eb/assets/content/items/t7-physician-scout-table-w956wfleu7hr9ifn.webp" />
