system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>You spend 1 Superiority Die to add extra style to your moves.</p><p> Make
      a Wisdom (Persuasion) check contested by the creature's Wisdom (Illusions) check.</p><p> If you succeed this
      contest, you immediately cast a Genjutsu with the casting time of 1 action against this creature and the creature
      cannot take reactions until the conclusion of your casting.</p><p> If you succeed this check by 5 or more, on a
      successful hit with a genjutsu attack, the creature's movement speed is reduced by half, or on a failed saving
      throw against the genjutsu, the creature becomes Dazed for the duration of the jutsu.</p><p></p>
