system:
  description:
    value: >-
      <p>As a reaction, when you or an ally within 90 feet would be forced to make a Dexterity saving throw, you spend 1
      superiority die to quickly spit out a rhyme calling the caster's technique wack in the nick of time.</p><p> The
      creature who would make the saving throw becomes unable to be moved by any means and an immediate reaction that
      they use to take the dodge action, until the start of their next turn.</p><p></p>
