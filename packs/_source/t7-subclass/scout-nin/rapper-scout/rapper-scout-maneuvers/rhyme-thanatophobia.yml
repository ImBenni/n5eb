system:
  description:
    value: >-
      <p>You can spend 1 Superiority Die to tell your allies to cope with the pain.</p><p> Roll the superiority die and
      record the result.</p><p> All allied creatures within 30 feet of you gain temporary hit points equal to twice the
      result of the superiority die, and resistance to Psychic damage while they have these temporary hit points.</p><p>
      Additionally, affected creatures can add the result of the superiority die to one saving throw they would be
      forced to make from a hostile effect.</p><p> Once an allied creature uses this ability, no other allied creature
      can use it.</p><p> This maneuver's effects last until the end of your next turn.</p><p></p>
