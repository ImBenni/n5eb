system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>You send out chill vibes to yourself and allies within 30 feet.</p><p>
      When a creature affected by this maneuver chooses not to attack a creature in any way on their turn, their
      movement speed is increased by five times the result of 1 superiority die, they gain the benefits of the Disengage
      action, and they gain proficiency in Intelligence, Wisdom, or Charisma saving throws.</p><p> (Each ally selects
      one).</p><p> The effects of this maneuver last until the end of each creature's turn.</p><p></p>
