system:
  description:
    value: >-
      <p>As part of using this maneuver, you must target the creature with an attack roll.</p><p> On a hit, the creature
      must make a Charisma saving throw.</p><p> On a failed save, the creature becomes colorblind for a number of rounds
      equal to the result of 1 Superiority Die.</p><p> A colorblind creature has disadvantage on all attack rolls and
      ability checks that rely on sight.</p><p> A colorblind creature also loses immunity to the Dazed condition for the
      duration.</p><p> This maneuver can be used with another maneuver and you can only have one creature color blinded
      at a time.</p><p></p>
