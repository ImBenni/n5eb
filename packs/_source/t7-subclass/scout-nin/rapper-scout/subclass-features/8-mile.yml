system:
  description:
    value: >-
      <p>Starting at 9th level, your tenacity with genjutsu surpasses all limits.</p><p>When a creature is affected by a
      Genjutsu you cast spend 2 Superiority Die to make them unable to cast jutsu of a cost equal to or lower than the
      genjutsu cast for a number of rounds equal to half the result of one of the Die rolled (Min.1).</p><p>You can use
      this feature once per long rest.</p><p></p>
