img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Starting at 14th level, your arrogance knows no bounds and you won't stand down for anything.</p><p> You gain
      immunity to the Frightened condition.</p><p> When an allied creature within 30 feet of you is Berserk, Charmed,
      Frightened, as long as they can hear you, you can make a Wisdom (Performance) check against the Save DC of the
      effect that caused them to gain said condition as you attempt to uplift their spirits your incredible
      swagger.</p><p> If you succeed this check, the creature removes one of these conditions.</p><p> If you succeed
      this check by 5 or more, the creature becomes immune to the condition that was removed for 1 minute.</p><p> An
      allied creature can only be targeted by this ability once per short rest.</p><p></p>
