system:
  description:
    value: >-
      <p>Finally, at 20th level, no creature can compare to the power of superior vocals.</p><p> Instead of using a
      Superiority Dice for your Subliminal Messaging feature, you can instead use a d6.</p><p> Additionally, your
      critical threat range for Genjutsu, and attack rolls with your Vibratium Blade, is increased by +1.</p><p>
      Genjutsu you cast with the Auditory keyword now also deal half damage on a successful saving throw, if they didn't
      before.</p><p></p>
