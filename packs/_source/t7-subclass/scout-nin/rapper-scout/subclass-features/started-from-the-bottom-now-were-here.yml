system:
  description:
    value: >-
      <p>Starting from 17th level, you refine your Vibratium Weapon.</p><p> Your Vibratium Weapon deals psychic damage
      in addition to its listed damage for the purposes of overcoming resistance and immunity.</p><p> You also install a
      long chakra conductive coil to the hilt of the weapon.</p><p> When you take the attack action, you can spend 5
      chakra to give the weapon the Reach(2) property until the end of the current turn.</p><p> Additionally, your
      Vibratium Weapon abilities improve; Burn (Slander): When you use the insult you have stored, the creature must
      make a Charisma saving throw against your Genjutsu Save DC, taking Xd4 psychic damage on a failed save, where X is
      equal to your Slander bonus.</p><p> Bass (Amp): Genjutsu that would benefit from this ability have their casting
      cost reduced by -1.</p><p> Genjutsu with the Auditory keyword have their Save DC instead increased by
      +2.</p><p></p>
