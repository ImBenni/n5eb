system:
  description:
    value: >-
      <p>Beginning at 3rd Level you learn maneuvers that are fueled by a special dice called Superiority
      Dice.</p><p>Maneuvers: You learn two maneuvers of your choice, at the end of this Subclass.</p><p>You earn more at
      higher levels as shown in the "Maneuvers Known" Column of the Superior Vocals table.</p><p>You can only use one
      maneuver per turn.</p><p>When you take a long rest, you may switch one maneuver you know for another you qualify
      for.</p><p>Superiority Dice: You have two superiority dice, which are d8's, you earn more at higher levels, as
      shown in the Superiority Dice column of the Superior Vocals table.</p><p>A superiority die is expended when you
      use it.</p><p>You regain all of your expended superiority dice when you finish a rest.</p><p></p><img
      src="systems/n5eb/assets/content/items/t7-rapper-scout-table-oaxcvgdtiqeweffp.webp" />
