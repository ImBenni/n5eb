img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>You transfer all of your momentum into your target, launching them backward at high speed.</p><p> As an action,
      you may spend a superiority die and expend any amount of movement that is a multiple of 10 feet, targeting a
      creature within melee range.</p><p> That creature must make a Strength saving throw against your bukijutsu save
      DC.</p><p> On a failure, they are knocked back a distance equal to half the amount of movement you spent and fall
      prone.</p><p> If the creature's movement is stopped by a solid object, they take falling damage as if they fell
      the full distance they were knocked back.</p><p></p>
