system:
  description:
    value: >-
      <p>You slide your skateboard under your target, jump over them, and attack at the same time.</p><p> When you
      target a creature with an attack or jutsu, you may roll a superiority die, adding the result to the attack
      roll.</p><p> Additionally, you board your skateboard if you were not already riding it, and you pass through the
      targeted creature's space, ending on the opposite side of the creature.</p><p> Also, until the end of your turn,
      that creature cannot react to your movement.</p><p></p>
