system:
  description:
    value: >-
      <p>You perform a series of tricks, using your opponents as surfaces to trick off of.</p><p> As an action while you
      are riding your skateboard, you may spend a superiority die.</p><p> Until the end of your turn, you may pass
      through spaces that creatures occupy, and your movement does not trigger reactions.</p><p> When you pass through a
      creature in this way, that creature must make a Dexterity saving throw against your bukijutsu save DC, taking
      damage equal to the result of two superiority dice on a failed save, taking half on a success.</p><p></p>
