system:
  description:
    value: >-
      <p>Beginning at 14th level, you have developed effective techniques for avoiding damage when you fail a
      trick.</p><p> When you miss an attack using your skateboard, you may roll a superiority die, gaining DR until the
      start of your next turn equal to the result (this does not consume the die).</p><p> You can only gain DR twice per
      turn this way and only gain half the amount rolled if you're wearing Medium or Heavy armor.</p><p></p>
