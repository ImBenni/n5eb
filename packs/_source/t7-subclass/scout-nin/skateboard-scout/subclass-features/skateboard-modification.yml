system:
  description:
    value: >-
      <p>Beginning at 9th level, you have gained the knowledge required to modify your skateboard.</p><p> Pick one of
      the following benefits, gaining another at 14th level; </p><p></p><p>Hoverboard: </p><p>When you are riding your
      skateboard, your movement speed becomes a hover speed, except you can only hover no more than 5 feet off the
      ground.</p><p></p><p> Wallrider: </p><p>You gain the benefits of wall running while riding your
      skateboard.</p><p></p><p> Chakra Thrusters: </p><p>When you take the dash action while riding your skateboard, you
      gain an additional 15 feet of movement.</p><p></p><p> Trick Stabilizers: </p><p>While you are riding your
      skateboard, you may reroll 1s on your superiority dice.</p><p></p>
