system:
  description:
    value: >-
      <p>Beginning at 3rd level you learn maneuvers that are fueled by a special dice called Superiority Dice Maneuvers:
      You learn two maneuvers of your choice, which are detailed in the Skateboard Maneuvers Section at the end of this
      class.</p><p>You earn more at higher levels as shown in the "Maneuvers Known" Column of the Superior Tricks
      table.</p><p>Many Maneuvers enhance an attack in some way.</p><p>You can only use one Maneuver per
      attack.</p><p>When you take a long rest, you may switch one maneuver you know for another you qualify
      for.</p><p>Superiority Dice: You have two superiority dice, which are d6's, you earn more at higher levels, as
      shown in the Superiority Dice column of the Superior Tricks table.</p><p>A superiority die is expended when you
      use it.</p><p>You regain all of your expended superiority dice when you finish a short or long
      rest.</p><p></p><img
      src="systems/n5eb/assets/content/items/t7-skateboard-scout-superior-tricks-table-5a18t9gkztyyiugv.webp" />
