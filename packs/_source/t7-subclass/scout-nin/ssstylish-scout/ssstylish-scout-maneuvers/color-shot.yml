    value: >-
      <p>You enhance your ranged weapon, making it's power chain through multiple targets.</p><p> When you make a ranged
      weapon attack against a creature, you may spend a superiority die, all creatures within 5 feet of the original
      target must make a dexterity saving throw vs your taijutsu save dc.</p><p> On a fail they take your weapon damage
      + double the result of your superiority die.</p><p></p>
