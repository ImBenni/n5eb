system:
  description:
    value: >-
      <p>Scout Nin Keyword: Specialized </p><p>When you would make a melee weapon attack against a creature, you can
      spend a superiority die and force them to make a strength save vs your taijutsu save dc.</p><p> On a failed save
      they are knocked 20 feet in the air.</p><p> As a bonus action, you may target them with a finisher as if you had
      hit the creature with a Combo bukijutsu.</p><p> This weapon attack does not add your relevant ability modifier to
      the damage.</p><p></p>
