system:
  description:
    value: >-
      <p>At 14th level, you could never forget about your stylish weapon.</p><p> That would just be
      irresponsible.</p><p> When you would use a jutsu that enhances, buffs, or empowers a weapon you hold that isn't
      your Stylish Weapon, your Stylish Weapon has the benefit for the same duration.</p><p> Additionally, your stylish
      weapons cannot be broken by any means and you always know their location.</p><p> Finally, you can summon your
      Stylish Weapon to your hand as a free action as long as it is within 1 mile of you.</p><p></p>
