system:
  description:
    value: >-
      <p>Your combos don't just end when a creature dies.</p><p> Instead, it only makes it better.</p><p> At 17th level,
      when you reduce a creature's HP to 0, you may swap to a Stylish Weapon and make a weapon attack at advantage
      against another creature within range.</p><p> Each of your Stylish Weapons can only trigger this effect once on a
      turn.</p><p></p>
