img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 9th level, you activate an extremely stylish and powerful way to enhance your skills.</p><p>At the
      start of your turn you may roll a superiority die(this does not spend the die), activating your shinobi
      trigger.</p><p>This manifests itself as chakra gathering around you in a cloak that portrays a mythical being of
      some kind.</p><p>You remain in this form for an amount of turns equal to the result of the die(min 2).</p><p>You
      gain the following benefits: </p><p>You gain temporary HP equal to twice your scout-nin level You may switch your
      style as a free action You are always treated as having used a superiority die for your styles.</p><p>Once you
      have used shinobi trigger, you may not activate it again until the end of a rest.</p><p>Alternatively, you may
      spend two superiority die to activate it(you still only use one to determine form duration).</p><p></p>
