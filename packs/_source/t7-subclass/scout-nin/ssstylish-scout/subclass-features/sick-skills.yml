img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>At 3rd level, you can swap weapons with speed and style.</p><p> When you make the attack action, you may
      immediately swap to a different weapon.</p><p> When you do this, as a bonus action you may make an additional
      weapon attack.</p><p> When you make a weapon attack in this way, it deals an additional die of damage but does not
      add your relevant ability modifier.</p><p> Additionally, you declare two weapons as your Stylish Weapons.</p><p> A
      Stylish Weapon costs no bulk and when you swap to it, it can activate the additional damage effect of this feature
      on any weapon attack You may declare.</p><p> It may also use your charisma modifier for attack and damage
      rolls.</p><p> You can declare another weapon your stylish weapon at 6th level, 14th level, and 17th level.</p><p>
      Also, at 6th level, once per round when you hit an attack or impose a saving throw with a weapon, and then do the
      same with another weapon in the same round, regain one Superiority Die.</p><p></p>
