name: Stylish Style
type: feat
_id: KshWeomJHofC4Fgn
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>At 6th level, you have created four styles for any situation.</p><p> At the beginning of initiative you may
      adopt one of the following styles.</p><p> As a bonus action you can change to a different style.</p><p> You may
      spend a superiority die to change to one of the styles without requiring an action.</p><p> All additional effects
      for using a die last until the end of your next turn unless stated otherwise.</p><p> Trickster: You are always
      under the effects of the disengage action.</p><p> If you use a superiority die to activate this stance, you are
      under the effects of the dodge action until the end of your next turn.</p><p> Swordmaster: Melee weapon attacks
      you make deal an additional amount of damage equal to half your charisma modifier(rounded up).</p><p> If you use a
      superiority die to activate this stance, your bonus instead is equal to your full charisma modifier.</p><p> Royal
      Guard: You reduce damage you receive by half your charisma modifier(min 1).</p><p> You may cast the Royal Guard
      taijutsu, if it is already on your list it can be activated an amount of times equal to twice your taijutsu
      ability modifier.</p><p> If you spend a superiority die to activate this stance you reduce damage received by your
      charisma modifier+2 until the end of your next turn.</p><p> Gunslinger: Ranged weapon attacks you make have an
      additional critical threat range of +1 and have the deadly property.</p><p> If you use a superiority die to
      activate this stance, the critical threat range is instead equal to your charisma modifier to a max of
      +3.</p><p></p>
    chat: ''
