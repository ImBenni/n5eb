system:
  description:
    value: >-
      <p>Beginning at 3rd Level you learn stylish maneuvers that are fueled by a special dice called Superiority
      Dice.</p><p> Maneuvers: You learn three maneuvers of your choice, at the end of this Subclass.</p><p> You earn
      more at higher levels as shown in the "Maneuvers Known" Column of the Superior Style table.</p><p> You can only
      use one maneuver per attack.</p><p> When you take a rest, you may switch one maneuver you know for another you
      qualify for.</p><p> Superiority Dice: You have three superiority dice, which are d6's, you earn more at higher
      levels, as shown in the Superiority Dice column of the Superior Style table.</p><p> A superiority die is expended
      when you use it.</p><p> You regain all of your expended superiority dice when you finish a rest.</p><p></p><img
      src="systems/n5eb/assets/content/items/t7-stylish-scout-superior-style-table-flrqcuanhjiktwcw.webp" />
