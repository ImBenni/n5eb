system:
  description:
    value: >-
      <p>Starting at 20th level, you and your summon are an unstoppable force, able to demolish small armies.</p><p> All
      Summons increase their hit points by your Scout-Nin level, their total number of jutsu slots by +4, and your
      Signature Summon gains 10 ASI points, which you can distribute however you wish.</p><p> Additionally, the casting
      time of the Summoning Technique becomes 1 Action, and you can increase the cost of the jutsu by +5 to cast it as a
      Bonus Action, so long as you do not currently have a summon present.</p><p></p>
