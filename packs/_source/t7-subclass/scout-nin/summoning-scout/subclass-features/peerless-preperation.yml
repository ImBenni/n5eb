system:
  description:
    value: >-
      <p>Starting at 14th level, your summon ensures that you are always prepared, and have a backup plan in case of
      their absense.</p><p> When you cast the summoning technique, the jutsu cannot be negated, countered, or reacted to
      by a hostile creature.</p><p> Additionally, when one of your summons would die, all hostile creatures within 30
      feet must make a Dexterity saving throw vs your Summon's Save DC as it sends a final wave of chakra, taking your
      Scout-Nin level, plus any of your summon's Superiority Die it chooses to add in force damage, and being knocked
      back 30 feet and falling prone on a failed save, or half as much damage and no effects on a success.</p><p></p>
