system:
  description:
    value: >-
      <p>Also at 3rd level, you enlighten your summon to your broad jutsu techniques.</p><p> Select one summon you have
      available to you from the Summoning Technique.</p><p> This summon becomes known as your Signature Summon.</p><p>
      Select one Nature Release keyword you possess, or the Medical keyword if you have access to it in some
      capacity.</p><p> Your Signature Summon gains the ability to learn jutsu with this chosen keyword, that you could
      also learn yourself.</p><p> If you do not possess a Nature Release or the Medical keyword, your summon gains
      access to another classification of jutsu that you know, picking from Ninjutsu, Fuinjutsu, Genjutsu, Taijutsu, or
      Bukijutsu.</p><p></p>
