system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>As a reaction, you may spend one superiority die.</p><p> When you do, you
      expend an amount of chakra equal to your Summon's rank (D-Rank: 3, C-Rank: 6, B-Rank: 9, A-Rank: 12, S-Rank:
      15).</p><p> Reduce the chakra cost of this manuever by the result of the die rolled, to a minimum of half the
      normal chakra cost.</p><p> In exchange, your summon is enhanced by a surge of chakra, gaining an additional
      turn.</p><p> You can only use this maneuver once per round.</p><p></p>
