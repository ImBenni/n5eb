  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>Once per turn, when an ally within 30 feet of you or your summon would
      land an attack roll on a creature within your range of your movement, you or your summon can spend 2 Superiority
      Die to dash up to the attacked creature and make an unarmed attack, adding the result of the superiority die to
      the attack and damage roll, or cast a jutsu of D-Rank of lower that would affect the hostile creature.</p><p></p>
