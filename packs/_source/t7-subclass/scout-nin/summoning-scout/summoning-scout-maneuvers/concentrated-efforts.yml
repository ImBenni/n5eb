system:
  description:
    value: >-
      <p>When an ally within 60 feet of you would fail a check to maintain concentration, you or your summon can spend 1
      Superiority Die, adding it to their result, potentially allowing them to succeed.</p><p> If this allows them to
      succeed, they always roll concentration checks at advantage until the start of your next turn, so long as they
      remain within 60 feet.</p><p></p>
