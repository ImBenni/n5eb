system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>You can spend 1 Superiority Die.</p><p>When you do, you can spend a
      number of hit die equal to the result of the Superiority Die, allowing your summon to recover a number of hit
      points equal to the result of the hit die rolled.</p><p>Each die rolled adds a +2 to result.</p><p>Alternatively,
      you can use this maneuver to restore a number of jutsu slots for your summon equal to half the result of the
      Superiority Die (Min. 1).</p><p></p>
