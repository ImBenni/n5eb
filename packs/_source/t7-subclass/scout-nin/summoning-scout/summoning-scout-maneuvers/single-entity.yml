    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>As a bonus action, when you or your summon would cast a jutsu with the
      range of self that has a duration greater than instant, you can spend 1 Superiority Die to allow the other to
      benefit from the jutsu simultaneously.</p><p> The duration of the jutsu becomes equal to a number of rounds equal
      to the result of the Superiority Die.</p><p></p>
