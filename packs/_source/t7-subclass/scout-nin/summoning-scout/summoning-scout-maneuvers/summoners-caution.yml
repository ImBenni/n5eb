system:
  description:
    value: >-
      <p>When you or your summon would cast a jutsu that would impose a saving throws on multiple creatures that does
      not allow you to exempt allied creatures from being affected, you or your summon can spend 1 Superiority Die to
      allow allied creatures to remain unaffected.</p><p> Additionally, if the jutsu targets multiple creatures, you can
      target an additional amount of creatures equal to half the result of the Superiority Die, or if the jutsu
      possesses an area of effect such as a Cone or Line, increase the area of effect by half the result of the 5 times
      the result of the Superiority Die.</p><p></p>
