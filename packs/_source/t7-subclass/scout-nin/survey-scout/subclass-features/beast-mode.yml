name: Beast Mode
type: feat
_id: 59HaYgz08IJGw1Yu
img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Finally at 20th level, you have learned to tap into the innate, primal force that was always inside
      you.</p><p>As an action you can forcefully increase the flow of adrenaline in your body.</p><p>When you activate
      this feature it goes back to the start of your turn.</p><p>These effects last for 1 minute and ends early if you
      are knocked unconscious.</p><p>Once you've used this feature, you can't use it again until you finish a short or
      long rest.</p><p>You gain the following benefits: </p><p></p><p>Your movement speed is doubled and your movement
      does not provoke attacks of opportunity.</p><p>You have advantage on Dexterity saving throws and when you pass a
      Dexterity saving throw you instead take no damage if you otherwise would.</p><p>You can make an additional weapon
      attack when you make a weapon attack, once per turn.</p><p>You cannot be surprised and you have advantage on
      perception checks.</p><p>You can spend any number of superiority dice per turn.</p><p>Additionally, you regenerate
      1 superiority die per turn.</p><p></p>
