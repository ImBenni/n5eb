system:
  description:
    value: >-
      <p>Starting at 3rd level, your tenacity against adversity has grown into something tangible.</p><p> You gain
      proficiency in the Weaponsmith Kit and you can create weapons and you can imbue seals in half the time.</p><p>
      Additionally, you have learn the Two Weapon Fighting Weapon Stance.</p><p> If you already have this stance, you
      may pick another Weapon Stance.</p><p> Also at 6th level, once per round, when you would hit a creature with 3 or
      more attacks after moving to them with your ODM Gear in the same turn, or when you hit a creature with a size
      class above Medium, you regain 1 superiority die.</p><p></p>
