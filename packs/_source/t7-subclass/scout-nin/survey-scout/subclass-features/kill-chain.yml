  description:
    value: >-
      <p>Starting at 17th level, your prowess with your ODM Gear has reached new heights.</p><p> When you would move you
      can instead spend half your movement to shoot your grapple hook as if you had used your bonus action to do
      so.</p><p> Additionally, as a bonus action when you kill a creature on your turn you may take the dash action and
      make a weapon attack with your Blades of Retribution as a bonus action.</p><p></p>
