img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>Beginning at 3rd Level you learn maneuvers that are fueled by a special dice called Superiority Dice.</p><p>
      Maneuvers: You learn three maneuvers of your choice, which are detailed in the Surveillance Maneuvers section at
      the end of this subclass.</p><p> You earn more at higher levels as shown in the "Maneuvers Known" column of the
      Superior Surveillance table.</p><p> You can only use one maneuver per turn.</p><p> When you take a long rest, you
      may switch one maneuver you know for another you qualify for.</p><p> If a maneuver is classified as Specialized
      you must have your ODM Gear equipped to use the maneuver.</p><p> Superiority Dice: You have three superiority
      dice, which are d8's, you earn more at higher levels, as shown in the Superiority Dice column of the Superior
      Surveillance table.</p><p> A superiority die is expended when you use it.</p><p> You regain all of your expended
      superiority dice when you finish a rest.</p><p></p><img
      src="systems/n5eb/assets/content/items/t7-survey-scout-superior-surveillance-table-kqehtgg6phvhj3ud.webp" />
