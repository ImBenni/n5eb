system:
  description:
    value: >-
      <p>Beginning at 14th level, another machination has emerged from your mind.</p><p> You have created missiles
      called Thunder Spears, you have 2 on each side, and they are attached to your ODM gear.</p><p> You may fire one of
      these spears as action at a target within 60 feet, if you are grappled to the target you make this attack at
      advantage.</p><p> On a hit, the target takes 1d10 + your taijutsu ability modifier in piercing damage.</p><p> The
      spear then explodes, and each creature, object, structure, and construct within 20 feet must Dexterity saving
      throw against your Taijutsu Save DC, taking 6d8 fire damage on a failed save or half as much on a successful
      one.</p><p> These missiles are destroyed on use and you can create all lost spears during a long rest.</p><p></p>
