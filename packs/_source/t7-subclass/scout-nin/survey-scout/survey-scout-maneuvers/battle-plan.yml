img: icons/magic/control/fear-fright-white.webp
system:
  description:
    value: >-
      <p>When you score roll initiative you may spend 1 superiority die, recording the result.</p><p> You may make a
      perception check against a number of creatures equal to your proficiency bonus, adding the result of your
      superiority die to the total.</p><p> The DC is equal to the highest creature's level + the total number of
      creatures.</p><p> On a success, you gain advantage on the first saving throw you are forced to make against each
      creature.</p><p> Additionally, you gain a bonus to your initiative equal to the result of your superiority
      die.</p><p></p>
