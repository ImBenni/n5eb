system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>When you hit a creature you may spend 1 superiority die.</p><p> When you
      do so, you may shoot your grapple hook at another creature, structure, or object within 60 feet and pull you
      towards it without expending your movement.</p><p> If it would put you within 5 feet of a hostile creature when
      you end your movement you may make an attack with each your Blades of Retribution.</p><p> This movement does not
      provoke attacks of opportunity.</p><p></p>
