system:
  description:
    value: >-
      <p>You can spend 1 superiority die to use the momentum of your fall as a part of your attack.</p><p> As a
      requirement for using this maneuver you must be at least 10 feet above your target.</p><p> When you deal damage to
      a creature you deal additional damage equal to the falling damage you would have taken, up to a maximum of
      10d6.</p><p> You do not take any falling damage if you use this maneuver as it is masterfully transferred to your
      opponent.</p><p></p>
