system:
  description:
    value: >-
      <p>Scout-Nin Keyword: Specialized </p><p>When you cast a Combo and Finisher during your turn, you can spend 1
      superiority die to immediately impose a Dexterity saving throw against one affected creature, with a penalty to
      their saving throw equal to half the result of the superiority die.</p><p> On a failed save, you slash at the
      creature's eyes, dealing your weapon's damage and blinding them until the end of your next turn.</p><p> A large or
      bigger creature makes this save at disadvantage.</p><p></p>
