system:
  description:
    value: >-
      <p>You may expend 1 superiority die, recording the result.</p><p>You bolster all allied creatures within 30 feet
      of you as you shout a war cry.</p><p>When you do so, they gain advantage on saving throws against effects and
      conditions that would reduce their movement, as well as advantage on checks or saves made to break these
      effects.</p><p>Additionally, they gain immunity to the frightened, berserk, and charmed conditions.</p><p>These
      benefits last for a number of rounds equal to the result of you superiority die.</p><p></p>
