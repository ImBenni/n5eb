system:
  description:
    value: >-
      <p>Beginning at 17th level, you have learned to grapple people in quick succession, further hindering their
      movements. When you use a <em><strong>Martial Technique</strong></em> granted by this subclass you may spend 2
      additional martial die to automatically use any other <em><strong>Martial Technique</strong></em> feature granted
      by this subclass at no extra cost.</p><p>Additionally starting at 17th level, creatures cannot weave hand signs
      when grappled by you.</p>
