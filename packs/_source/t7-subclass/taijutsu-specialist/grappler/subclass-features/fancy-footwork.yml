system:
  description:
    value: >-
      <p>When you choose this Style starting at 3rd level, you have trained yourself to move in ways that extend your
      normal reach. Your unarmed attacks gain the <strong>Reach 1</strong> property, as you have learned to step in and
      out of your opponent's effective range.</p><p>Additionally, You've developed the skills necessary to hold your own
      in close-quarters grappling. You can exchange an unarmed attack to attempt to grapple an opponent.</p>
