name: Ridiculous Strength
type: feat
_id: KVZgFl2A6aVklm49
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>Starting at 9th level, your grappled opponent can be used as a glorified shield, You can grapple creatures no
      matter their size. You have advantage on Strength and Dexterity saving throws while you are grappling a creature
      that is Medium or larger and your AC is increased by 1 for each size category (Medium = 1, Large = 2,
      etc.)</p><p>Additionally, when a creature attempts to move, teleport, or otherwise break out of a grapple by using
      a feature or jutsu, you can spend 1 <em><strong>Martial Die</strong></em> to negate that effect until the start of
      your next turn.</p>
