system:
  description:
    value: >-
      <p>Also, at 3rd level, you learn to grapple opponent's with throws that will leave them staggering. You learn to
      accomplish this through a series of <em><strong>Martial Techniques</strong></em>, unique to you and your style of
      combat. You learn the following 3 <em><strong>Martial Techniques</strong></em>. A creature can only be under the
      effects of one the <em><strong>Martial Technique</strong></em> granted by this subclass at a
      time.</p><p><em><strong>German Suplex.</strong></em> When you would grapple a creature, you can spend 1 martial
      die to knock them prone, ending the grapple and dealing your unarmed damage.</p><p><em><strong>Hip
      Throw.</strong></em> When you would grapple a creature, you can spend 1 martial die to knock them prone, and throw
      them 10 feet in any direction.</p><p><em><strong>Headlock.</strong></em> When you would grapple a creature, you
      can spend 1 martial die to also make them restrained for the duration of the grapple.</p>
    chat: ''
