name: The God of Grappling
type: feat
_id: bV7vDiqxiTJPe0qB
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>Starting at 20th level, you have reached the pinnacle of grappling superiority.</p><p> When a creature would
      cast a jutsu you may spend your reaction and 2 martial die to move up to your movement speed to attempt to stop
      them, by grappling them.</p><p> You make this grapple check at advantage.</p><p> On a success a creature is
      subjected to any one of your Martial Techniques granted to you by this subclass at no additional cost.</p><p> Also
      at 20th level, your body has become accustomed to fighting on the ground, and your skin has toughened up
      considerably.</p><p> While you are unarmored you gain an amount of damage reduction equal to your Constitution
      modifier.</p><p></p>
