system:
  description:
    value: >-
      <p>Beginning at the 9th level, when you would deal bludgeoning damage to a creature with your taijutsu specialist
      weapon, you can impose a Constitution saving throw by spending 2 <em><strong>Martial Die.</strong></em> On failed
      save the target is dazed for a minute. If they are already dazed they are stunned. If they are already stunned
      they are paralyzed. A creature may remake this saving throw at the end of each of its turns.</p>
