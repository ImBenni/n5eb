system:
  description:
    value: >-
      <p>Starting at 20th level, your finesse with using weaponry in tandem with your fists in hand to hand combat
      surpasses the skill of all who only focus on one of these attributtes.</p><p> When you cast a Taijutsu or
      Bukijutsu with a Taijutsu Specialist weapon, you can spend 3 Martial Die, granting it the Martial Combat
      keyword.</p><p> Jutsu with the Martial Combat keyword cannot miss unless the attack roll is a natural
      1.</p><p></p>
