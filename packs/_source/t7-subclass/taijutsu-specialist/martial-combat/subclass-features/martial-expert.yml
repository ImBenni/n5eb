system:
  description:
    value: >-
      <p>Beginning at the 14th level, you and your weapon are one.</p><p> After constant battles, you can now further
      enhance your abilities based on your weapon choice as follows: </p><p><strong>Quarterstaff Expert</strong>: While
      benefitting from Quarterstaff's Strength, you can spend 2 Martial Die, to cause damage you inflict with your
      taijutsu specialist weapon unable to be reduced by any means, and cause enemies to roll the first saving throw
      from taijutsu you cast utilizing with your weapon at disadvantage.</p><p> <strong>Nunchaku Expert</strong>: While
      benefitting from Nunchaku's Fury, you can spend 2 Martial Die.</p><p> Whenever you successfully hit with a
      taijutsu specialist weapon, your chance to hit with taijutsu specialist weapons and taijutsu increases by +1 for
      the duration.</p><p> <strong>Tonfa Expert</strong>: While benefitting from Tonfa's Trickery you can spend 2
      Martial Die to make each successful attack you make with your weapon increase your AC by +1 for the
      duration.</p><p></p>
