folder: 2vUziTCvPDSM63DD
name: Martial Focus
type: feat
_id: rwoCCakMi1zLYfRD
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>When you choose this style, starting at the 3rd level, you gain proficiency in Quarterstaffs, Nunchaku, and
      Tonfas.</p><p> These weapons become Taijutsu Specialist weapons for you, and while you are equipped with a
      Taijutsu Specialist weapon, you are considered unarmed for the purpose of interactions with Taijutsu, Taijutsu
      Fighting Styles, and Taijutsu Specialist features.</p><p> Additionally, jutsu that would augment your unarmed
      strikes instead affect your taijutsu specialist weapon, and when you make an unarmed attack, or deal your weapon's
      damage as part of a Taijutsu, you can use your taijutsu specialist weapon's attack bonus and damage.</p><p>
      Finally, once per turn, you can enter a focused state of mind with Taijutsu Specialist weapon, gaining access to
      abilities that can be unleashed with Martial Die until the start of your next turn.</p><p> Choose from one of the
      following; </p><p><strong>Quarterstaff's Strength</strong>: While wielding your Quarterstaff with both hands you
      can spend 1 Martial Die to double your unarmed damage die.</p><p> <strong>Nunchaku's Fury</strong>: While wielding
      a Nunchaku, you can spend 1 Martial Die, whenever you would successfully hit an opponent with your taijutsu
      specialist weapon you may immediately make another attack, dealing 1d6 bludgeoning damage, up to twice per
      turn.</p><p> This damage cannot be increased or augmented by any means.</p><p> <strong>Tonfa's Trickery</strong>:
      While wielding a Tonfa in each hand, you can spend 1 Martial Die.</p><p> When you would successfully hit an
      opponent with your taijutsu specialist weapon, you may attempt to trip the target, adding the result of the
      Martial Die to your check.</p><p></p>
