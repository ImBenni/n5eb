system:
  description:
    value: >-
      <p>Starting at 9th level, reality's fabric begins to become clear to you, so clear in fact that you believe you
      can weave it.</p><p> Taijutsu you cast deal double damage to structures and constructs, and creatures with
      temporary hit points.</p><p> Your Source Code Techniques also gain the following text; </p><p><strong>Bullet
      Time</strong></p><p> The triggering creature has disadvantage on consecutive attack rolls they make against you,
      or you have advantage on consecutive saving throws they impose against you, during the turn this technique is
      activated.</p><p> <strong>There is no Chakra</strong></p><p> If the affected creature or original caster of the
      jutsu the target is benefitting from is unable to lose concentration as the result of a jutsu, feature, or trait,
      you can spend an additional Martial Die each time you would use this technique to force them to make a
      concentration check regardless.</p><p></p>
