system:
  description:
    value: >-
      <p>When you choose this Style at 3rd level, you begin to see the world as if it were a sequence of numbers and
      fight to break the boundaries set upon you. You gain proficiency in Insight and you ignore penalties and
      disadvantage on Insight rolls.</p><p>Additionally, you can use Wisdom in place of Dexterity for Taijutsu
      Specialist features that require Dexterity.</p>
