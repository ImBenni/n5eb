system:
  description:
    value: >-
      <p>Also at 3rd, you learn to use two new techniques in tandem with your manifested soul.</p><p> <strong>Autonomous
      Defense.</strong></p><p> When you would take damage, you may spend up to 3 Martial Die.</p><p> For every die
      spent, you reduce the damage dealt by the result of the die + half your charisma modifier.</p><p> If your Soul
      Manifestation feature is active and the triggering creature is within 10 feet of you, you may make an unarmed
      attack against them.</p><p> <strong>Soul Flurry.</strong></p><p> When you make an unarmed attack as an action, you
      may spend up to 2 Martial Die.</p><p> You may make an additional unarmed attack for each die spent.</p><p>
      Additional attacks made using this feature deal additional damage equal to your martial die.</p><p> If your Soul
      Manifestation feature is active then each attack adds half your charisma modifier to the damage.</p><p></p>
