system:
  description:
    value: >-
      <p>At 14th level, when you activate your Soul Manifestation feature, all creatures who take damage from the
      activation are also pushed back by 10 feet.</p><p> Additionally, as a reaction when you take damage, you may spend
      2 Martial Die and 10 chakra.</p><p> When you do, you reduce the damage by the result of the spent die + your
      Charisma modifier.</p><p> If you are not under the effects of the Soul Manifestation feature, you activate it as
      part of the reaction.</p><p></p>
