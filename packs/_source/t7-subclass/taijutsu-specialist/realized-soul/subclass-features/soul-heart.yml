name: Soul Heart
type: feat
_id: YK3bF7URn4JcAqSv
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>At 9th level, your soul becomes potent enough to maintain itself while seperated from you. When you would use
      your <em><strong>Soul Manifestation</strong></em> feature, you may spend an additional <strong>Martial
      Die</strong>. When you do this, your soul manifests itself in it's full form. During this, you gain the following
      benefits in addition to your Soul Manifestation features;</p><ul><li>Your Unarmed Attacks now have the reach 2
      property and all Taijutsu you cast have their range increased by 10 feet.</li><li>When a creature hits you with an
      attack roll, you reduce the damage taken by the result of 1 <strong>Martial Die</strong>. This does not spend the
      die.</li><li>You cannot suffer a penalty to attack bonus or saving throws from mental conditions.</li><li>When a
      taijutsu you cast would inflict a condition, you may instead inflict an equivalent amount of ranks of fear or
      charmed until the end of your next turn.</li></ul>
    chat: ''
