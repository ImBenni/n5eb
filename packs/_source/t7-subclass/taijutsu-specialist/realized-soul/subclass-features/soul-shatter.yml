system:
  description:
    value: >-
      <p>At 20th level, you're truly one with your soul. You fight together better than any old army could. You no
      longer require a <strong>Martial Die</strong> to activate your <em><strong>Soul Manifestation</strong></em>
      feature.</p><p>Additionally, when you inflict the charm or feared condition with a Taijutsu, you may spend 4
      <strong>Martial Die</strong>. The taijutsu inflicts 5 ranks of the charmed or fear condition. These ranks of fear
      or charmed disappear at the end of their next turn and their duration cannot be extended by any means.</p><p></p>
