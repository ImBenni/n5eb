system:
  description:
    value: >-
      <p>Beginning at 17th level, your movements leave a path of destruction due to your sheer speed. As an action you
      can spend 4 martial die to become an incarnate of wind itself. While you are in this form, you gain the following
      benefits;</p><ul><li>You double your movement speed and your movement does not provoke oppurtunity
      attacks.</li><li>When you take the attack action, you can use a flurry of blows without spending martial
      die.</li><li>You are counted as being under the effects of the Dodge Action.</li></ul><p>You can stay in this form
      for a number of rounds equal to your proficiency bonus and can only activate it once per long rest.</p>
