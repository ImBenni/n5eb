system:
  description:
    value: >-
      <p>Starting at 6th level, you have begun to strike at the slightest threat of danger. You ignore difficult terrain
      and your wall and water walking speed is equal to your walking speed. Additionally, you add your full proficiency
      bonus to initiative rolls instead of half.</p><p>Also at 6th level, you can spend 2 martial die to increase your
      AC by +1 for every 10 feet of movement you use if you take the dash action, to a maximum of your half your
      proficiency bonus.</p>
