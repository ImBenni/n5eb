name: Hurricane
type: feat
_id: etR5Z1yi1m4HDNDw
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>Starting at 9th level, your agility is to be acknowledged and respected. You have advantage on any saving throw
      that would reduce your movement and you spend 1 martial die to end the grappled or restrained
      conditions.</p><p>Additionally, your kicks have extra striking power. When you hit a creature with an unarmed
      attack, you can spend 2 martial die to knock them back equal to your current <em><strong>Turbulence Speed
      Chart</strong></em>. If a creature hits a wall or another creature with this effect, the creature(s) must make a
      Dexterity saving throw taking one of your unarmed damage die per every 5 feet. they would have traveled and fall
      prone on a failed save.</p>
