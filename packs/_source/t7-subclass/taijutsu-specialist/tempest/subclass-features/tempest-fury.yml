name: Tempest Fury
type: feat
_id: vY7thlkeHXEvTcvs
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, you begin to overwhelm your opponents with your blistering speed, using your swiftness to
      your advantage. You learn to accomplish this through a series of <em><strong>Martial Techniques</strong></em>,
      unique to you and your style of combat. You learn the following four <em><strong>Martial Techniques</strong></em>.
      <br /><em><strong>Hail.</strong></em> Whenever you hit a creature with one or more unarmed attacks, you may spend
      1 martial die to increase your movement by 5 feet for each successful hit, and gain a +1 bonus to AC, until the
      start of your next turn. </p><p><em><strong>Sleet.</strong></em> You move quickly making your body appear as
      sleet. You can spend 1 martial die to take the dodge action as a reaction. </p><p><em><strong>Snow.</strong></em>
      You move gracefully like snow, moving silently. As a bonus action by spending 1 martial die you gain the benefits
      of both the dodge and disengage actions. </p><p><em><strong>Rain.</strong></em> You move fluidly, allowing you to
      carry your momentum. When you cast a taijutsu, you can spend 1 martial die to take the dash action as a free
      action.</p>
    chat: ''
