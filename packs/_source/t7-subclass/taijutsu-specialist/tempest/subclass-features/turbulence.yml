system:
  description:
    value: >-
      <p>When you choose this Style starting at 3rd level, you have trained your legs until you feel the urge to run at
      all times. Your base movement speed increases by +10 feet, on top of your speed increases from the
      <em><strong>Enhanced Movement</strong></em> table. This increase in movement speed increases as you gain levels in
      this class, as indicated by the <em><strong>Turbulence Speed Chart</strong></em>.</p><p>Your unarmed attacks must
      use your legs to use any of this subclass' active features.</p><img
      src="systems/n5eb/assets/content/cheat-sheets/t7-turbulence-speed-chart.webp" />
