system:
  description:
    value: >-
      <p>Finally, at 20th level your speed has manifested into even the most simple techniques. You become immune to the
      grappled and restrained conditions. When you hit a creature with an unarmed or taijutsu attack you can spend 1
      martial die to knock them prone and deal additional damage equal to your proficiency bonus, as the force of your
      kick destroys their defenses.</p><p>Also at 20th level, choose one bullet from <em><strong>Cyclone</strong></em>
      you gain those benefits even without activating that feature.</p><p></p>
