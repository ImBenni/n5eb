name: Autonomous Ultra Instinct
type: feat
_id: sWKRdF3hs9VlxPpp
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>Starting at 9th level, you have begun to tap into a state that most Shinobi could only ever dream of,
      <em><strong>Autonomous Ultra Instinct</strong></em>. the peak of Taijutsu. However, it is incomplete. You have
      only managed to grasp half of the full power Ultra Instinct. Select either the <strong>Offensive</strong> or
      <strong>Defensive</strong> signs of Ultra Instinct. You cannot change this later. Once per rest as an action, you
      can spend 2 <strong>Martial Die</strong> to enter Ultra Instinct for 1 minute, gaining the benefits listed below.
      The form ends early if your chakra reaches 0. If you attempt to enter Ultra Instinct again before taking a rest,
      you expend 5 chakra die.</p><h5 id="offensive-sign">Offensive Sign</h5><ul><li>Your maximum <em><strong>Martial
      Die</strong></em> increases by +1.</li><li>Your unarmed damage instead adds 1.5x your ability
      mod.</li><li>Whenever a creature hits you with a melee attack, you can make one unarmed attack at them, once per
      turn.</li><li>When you land an unarmed or taijutsu attack roll, you deal an additional amount of damage equal to
      the amount your attack roll result exceeded the target's AC by (Max of +5).</li><li>While <em>bloodied</em> (Under
      50% hp), creatures cannot react to <em><strong>Finishers</strong></em> you cast, when used as a
      Finisher.</li></ul><h5 id="defensive-sign">Defensive Sign</h5><ul><li>You gain 7 temporary hit points at the start
      of your turns.</li><li>Attacks against you, and Dexterity saving throws you make, suffer a penalty equal to half
      or a bonus equal to the full result, of one <strong>Martial Die</strong>. This does not spend any.</li><li>When
      you would fail a saving throw, you can spend any number of <strong>Martial Die</strong>, adding them to
      result.</li><li>Your movement speed is doubled.</li><li>While <em>bloodied</em>, critical hits against you are
      treated as normal hits.</li></ul>
