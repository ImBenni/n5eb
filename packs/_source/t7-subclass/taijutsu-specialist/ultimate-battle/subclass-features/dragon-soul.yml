system:
  description:
    value: >-
      <p>Beginning at 3rd level, you broken past your body's limitations and have improved your phyisical strength, as
      well as your aptitude with chakra control. You can use Martial Arts in place of Chakra Control, and learn and
      create Taijutsu in half the required time (this doesn't stack with similar effects).</p><p>Using your Taijutsu
      learning score in place of your Ninjutsu learning score, you learn 1 Ninjutsu that you qualify for that requires
      an attack roll. This loses the Ninjutsu keyword, and gains the <strong>Taijutsu</strong> and
      <strong>Finisher</strong> keywords. You can use this Ninjutsu in place of a Taijutsu Finisher, and this jutsu
      deals 2 extra die of damage when used as a Finisher. You gain more Ninjutsu this way at 10th and 17th levels, and
      can switch the Ninjutsu when you gain a level in this class.</p>
    chat: ''
