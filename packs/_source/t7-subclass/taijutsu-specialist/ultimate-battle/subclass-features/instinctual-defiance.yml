system:
  description:
    value: >-
      <p>Starting at 6th level, your body's instinctual fighting style emboldens your spirit and mind, preventing your
      will from ever being triumphed over.</p><p> Once per long rest, when you would fall under the effects of a
      Genjutsu or Fuinjutsu, or gain the Berserk, Charmed, Frightened, Grappled or Restrained conditions, you can let
      out a loud battle cry, flairing an aura of chakra which expels the triggering effect(s).</p><p> All hostile
      creatures within 15 feet, are blown back 20 feet.</p><p> Until the end of your next turn, you have advantage on
      attack rolls against the creature responsible for giving you one of the aforementioned effects.</p><p> You gain an
      extra use of this feature at 14th level.</p><p></p>
