folder: rcDvNAOgYcK4v1jG
name: Limit Breaking Combat
type: feat
_id: OQcBCaY5Pr0ZxSou
img: icons/skills/melee/unarmed-punch-fist-blue.webp
system:
  description:
    value: >-
      <p>Also at 3rd level, you gain new ways to surpass your limits amidst the heat of battle using your Martial
      Die.</p><p>You learn the following Martial Techniques.</p><p><strong>Instinctual Inversion.</strong></p><p>As a
      reaction, when you would damaged by an area of effect, you can cast a Ninjutsu under the effects of your Dragon
      Soul feature, at half cost, shaping the chakra into a sphere in front of you.</p><p>Roll the jutsu's damage dice
      and reduce the incoming damage by the result.</p><p>Using this reaction prevents the area of effect from spreading
      to the space directly behind you.</p><p>If you reduce the incoming damage to 0, you gain advantage on any saving
      throws from the triggering jutsu.</p><p>If you reduce the damage by 150% or more, you instead succeed said saving
      throws.</p><p>This technique costs a number of Martial Die equal to the rank of the jutsu cast.</p><p>(D- Rank: 1,
      C-Rank: 2, B-Rank: 3, A-Rank: 4, S-Rank: 5)</p><p> <strong>Instinctual Strikes.</strong></p><p>When you cast a
      Taijutsu, you can spend 1 Martial Die to ignore any bonuses a creature may have to their AC as the result of a
      jutsu, feature, or trait until the end of your next turn.</p><p>This does not apply to changes in AC calc</p>
