system:
  description:
    value: >-
      <p>Once per turn, as an action or when you make a melee weapon or melee taijutsu attack. you may force a creature
      within 30 feet of you to make a Strength saving throw. On a failed save they take your Flurry die of damage and
      become restrained. On a success, they take half on a success with no additional effects. The creature repeats this
      save at the end of their turn, remaining restrained on a fail and removing the condition on a success.</p>
