system:
  description:
    value: >-
      <p>Starting at 3rd level, you learn additional Flurry Techniques that supplement your Alpha Omega Form.</p><p>
      <strong>Helm Breaker.</strong></p><p> Once per turn, when you would hit a creature with a weapon attack, you can
      impose a Strength saving throw.</p><p> On a failed save, the creature becomes Dazed.</p><p> <strong>Judgement
      Slash.</strong></p><p> As a bonus action, you can select a space within 60 feet of you.</p><p> Creatures within 10
      feet of that point must make a Dexterity saving throw, taking the damage of your Chakra Strike flurry technique in
      force damage on a failed save, or half as much damage on a success.</p><p> Alternatively, you can use this
      technique as an action.</p><p> When you do, double the range and triple the area of effect.</p><p></p>
    chat: ''
