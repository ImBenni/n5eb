name: Omega Styles
type: feat
_id: irKajn1g0eaN1KPI
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, you get to choose a Style that supports your combat ability. You know 1 style from the
      following list, and gain more as you gain levels in this class based on the Styles Known Table of the Weapon
      Specialist.</p><hr /><ul><li><em><strong>Blistering Swords.</strong></em> Once per turn, when you would make a
      melee weapon or melee taijutsu attack against a creature, you may make a ranged weapon attack against another
      creature within 30 feet of you as part of the same action. Dealing force damage equal to twice your Flurry die on
      hit.</li><li><em><strong>Heavy Rain Swords.</strong></em> Once per turn, as an action or when you make a melee
      weapon or melee taijutsu attack. you may force a creature within 30 feet of you to make a Strength saving throw.
      On a failed save they take your Flurry die of damage and become restrained. On a success, they take half on a
      success with no additional effects. The creature repeats this save at the end of their turn, remaining restrained
      on a fail and removing the condition on a success.</li><li><em><strong>Spiral Swords.</strong></em> As a bonus
      action on your turn you can activate swords that hover around you until the end of your next turn. Creatures of
      your choice who begin their turn within 5 feet of your space or creatures who pass within 5 feet of you take force
      damage equal to twice your Flurry die. A creature can only take damage from these swords twice on a
      turn.</li><li><em><strong>Storm Swords.</strong></em> Once per turn, when you hit with an attack with a melee
      weapon you can surround the targeted with creature with multiple floating spectral swords. If the creature
      willingly moves before the end of their next turn, they take damage equal to triple Flurry
      die.</li><li><em><strong>Summoned Sword Step.</strong></em> As a bonus action on your turn, make a ranged weapon
      attack at an unoccupied space or creature within 30 feet of you, dealing force damage equal to your Flurry die on
      hit. Regardless of a hit or miss, you may teleport to that space or to an unoccupied space within 5 feet of the
      creature.</li></ul>
    chat: ''
