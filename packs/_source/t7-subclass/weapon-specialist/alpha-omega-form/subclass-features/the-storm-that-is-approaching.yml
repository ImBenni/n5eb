system:
  description:
    value: >-
      <p>At 20th level, you're a storm of mayhem and power.</p><p> Your Dexterity and Charisma scores increase by +2, to
      a maximum of 22.</p><p> Once per long rest, as an action on your turn and 10 chakra, you activate your Sin Devil
      Trigger mode for a minute.</p><p> While in this form, you gain the following; You gain a flying speed(hover) equal
      to twice your movement speed.</p><p> You gain 2 concentration points at the beginning of your turn and you may not
      lose concentration points as a result of missing an attack.</p><p> You gain resistance to bludgeoning, piercing,
      and slashing damage.</p><p> Your weapon attacks deal additional damage equal to your flurry die.</p><p></p>
