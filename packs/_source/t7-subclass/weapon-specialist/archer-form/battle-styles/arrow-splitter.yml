  description:
    value: >-
      <p>When you would hit a creature with a ranged weapon or taijutsu attack you choose to split the arrow on your
      next attack.</p><p> Until the end of the current turn the next attack roll you make against the target uses the
      same attack roll and inflicts a rank of lacerated on a hit.</p><p> You can use this feature twice per
      rest.</p><p></p>
