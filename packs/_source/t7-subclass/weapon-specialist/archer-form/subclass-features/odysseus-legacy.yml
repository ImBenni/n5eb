system:
  description:
    value: >-
      <p>Starting at 6th level, your archery skills have surpassed even the legendary Odysseus. As a full turn action
      you can charge your bow with all your might and all creatures in a 120-foot long 15-foot wide line must make a
      Dexterity saving throw or take your weapon's damage + 6d8 and become weakened on a failed save, or half as much
      damage and no additional effects on a successful one. <strong>Arrow Volley</strong> is automatically applied to
      this feature.</p><p>You can use this feature twice per rest.</p><p>Also at 6th level any time you would roll for
      ammunition you always roll at advantage and your ammunition only goes down by a step when you roll a 1.</p>
