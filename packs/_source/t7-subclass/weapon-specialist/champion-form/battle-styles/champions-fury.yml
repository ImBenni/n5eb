system:
  description:
    value: >-
      <p>As an action, you can begin to charge chakra into a weapon and release a shockwave of energy in a 20-foot
      radius originating from you.</p><p> Alternatively, if you are using a ranged weapon, you can fire a shot/throw
      your weapon at an empty space within 30 feet to release the shockwave from.</p><p> Make a melee or ranged weapon
      attack against, whichever is appropriate, against each creature within range of the shockwave, adding half the
      result of one flurry die to each attack.</p><p> On a hit, you deal your weapon's damage in force damage.</p><p>
      You can also imbue this style with a nature release or medical keyword, that you have access to, to change the
      damage to the corresponding damage type (Water=Cold, Medical=Poison).</p><p></p>
