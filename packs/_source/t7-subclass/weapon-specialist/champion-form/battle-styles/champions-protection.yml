system:
  description:
    value: >-
      <p>As a reaction, when you would take damage, you quickly block with a weapon you are holding and form a barrier
      around you until the end of the current turn.</p><p> You gain the benefits of half cover and reduce any damage you
      would receive by the result of 3 flurry die plus half your proficiency bonus.</p><p> If you would be forced to
      make any saving throws, you roll at advantage.</p><p> You can use this style 3 times per long rest.</p><p></p>
