system:
  description:
    value: >-
      <p>As a bonus action, select one creature, structure, or object within 10 feet of you.</p><p> The target must make
      a Strength saving throw, becoming stunned until the end of the current turn on a failure.</p><p> Objects and
      structures automatically fail this saving throw.</p><p> Each attack made on the target that hits has its damage
      replaced with one flurry die, and stores 5 feet of knockback, which takes effect once your turn ends.</p><p> If
      the target was a creature, and a creature other than you damages this creature, the stun instantly ends.</p><p> If
      the target was a structure or object, at the end of the turn, the knockback is multiplied by the result of one
      flurry die (Min. 3).</p><p></p>
