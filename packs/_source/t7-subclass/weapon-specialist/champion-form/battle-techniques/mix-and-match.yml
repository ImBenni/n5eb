system:
  description:
    value: >-
      <p>Once per turn, when you would make multiple attacks with the attack action or a Bukijutsu, after making your
      first attack, you can spend 5 chakra to switch to a different weapon to make your next attack, changing the attack
      type if you go from a melee weapon to a ranged weapon (or vice versa) and adding 1 flurry die to the attack and
      damage roll.</p><p></p>
