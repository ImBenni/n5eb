name: Breath of the Wild
type: feat
_id: yMIM5i92cDUcCdyf
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Finally at 20th level, you have achieved your goal of becoming a Champion of all forms of weaponry, attaining a
      level of skill you previously thought you would spend your entire life training for.</p><p> Once per turn, you can
      spend 10 chakra to create any explosive tool of Greater quality or lower, taking the form of a small spherical
      bomb.</p><p> You can throw this bomb up to 60 feet away and detonate it as an action, bonus action, or
      reaction.</p><p> Bombs created this way last for 1 minute, and you can only have 1 bomb active at a time.</p><p>
      Also at 20th level, you are able to enter a deep state of focus.</p><p> Everything feels as though you are in slow
      motion, like if everyone around you is treading through deep water.</p><p> As a full turn action, you can spend 20
      chakra and gain the following benefits for 1 minute; Your Dexterity and Wisdom scores increase by +2.</p><p> The
      maximums for these scores also increases by +2.</p><p> You gain resistance to Slashing, Piercing, and Bludgeoning
      damage.</p><p> Your movement speed is doubled.</p><p> As a reaction, when you would be targeted by a melee or
      ranged attack, you spend 10 chakra to quickly avoid the attack in its entirety, entering a state of deeper
      focus.</p><p> You can then counter with a number of weapon attacks equal to half your proficiency bonus, the
      weapon's damage type being converted to force damage.</p><p> These attacks cannot score a critical hit.</p><p> You
      have advantage on saving throws to resist Mental conditions, and the Slowed and Weakened conditions.</p><p> If you
      gain any of the aforementioned conditions, they are automatically resolved at the end of your next turn,
      disregarding any duration.</p><p></p>
    chat: ''
