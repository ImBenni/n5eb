name: Champion Techniques
type: feat
_id: E6wO968wM7NK4UDF
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you gain a special gauntlet known as the Champion's Guard.</p><p> This gauntlet is
      attuned to you, has 3 bulk, 5 seal slots, and can be worn with any armor.</p><p> You are able to put seals onto
      this gauntlet, and if you use a weapon with no seals, regardless of its type, you treat the weapon as having the
      seals you infused into the gauntlet, although the rank of the weapon does not change.</p><p> You can remove a seal
      on the gauntlet with 1 week of downtime.</p><p> Each seal you place increases the bulk of the gauntlet by
      1.</p><p> If you lose the gauntlet, you can spend 1 week of downtime and an amount of Ryo equal to the rank of the
      highest ranking seal placed on it to create an identical one.</p><p> <strong>(D-Rank: 100, C-Rank: 200, B-Rank:
      400, A-Rank: 800, S-Rank: 1600).</strong></p><p> You also learn additional Flurry Techniques that supplement your
      Champion Form.</p><p> <strong>Champion's Light.</strong></p><p> Whenever you are holding a weapon, you can spend
      choose to imbue the weapon with light for 1 minute, granting an area of 15 feet around the weapon with bright
      light.</p><p> If you do this with a ranged weapon, fired ammunition also give off a 10-foot radius of dim
      light.</p><p> <strong>Mix and Match.</strong></p><p> Once per turn, when you would make multiple attacks with the
      attack action or a Bukijutsu, after making your first attack, you can spend 5 chakra to switch to a different
      weapon to make your next attack, changing the attack type if you go from a melee weapon to a ranged weapon (or
      vice versa) and adding 1 flurry die to the attack and damage roll.</p><p> <strong>On The Fly.</strong></p><p> When
      you are holding a weapon you are not proficient in, or an improvised weapon, you can spend 1 chakra die to become
      proficient with the weapon, and treat it as one of your Weapon Focuses for 1 minute.</p><p></p>
