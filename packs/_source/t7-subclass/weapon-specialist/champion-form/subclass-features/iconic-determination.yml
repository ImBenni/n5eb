system:
  description:
    value: >-
      <p>Starting at 6th level, your Champion spirit alights a flame within every strike you make, and your body becomes
      much more resilient and durable. You gain proficiency in all improvised weapons, and naturally start at -1 ranks
      of exhaustion, instead of 0. Additionally, when you do not have a weapon in hand, your movement speed increases by
      10 feet. Lastly, when you roll initiative, you gain temporary hit points equal to the result of 2 flurry die.</p>
