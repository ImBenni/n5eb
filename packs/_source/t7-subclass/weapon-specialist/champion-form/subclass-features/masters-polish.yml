system:
  description:
    value: >-
      <p>Starting at 13th level, when you would cast a bukijutsu without the <strong>Combo</strong> keyword, you can
      spend an amount of chakra equal to its rank to add the combo keyword at casting.</p><p>The Bukijutsu cast cannot
      have the <em>Finisher</em> keyword, must require more than 1 attack roll, and the jutsu cannot benefit from cost
      reduction of any type. You can use this feature a number of times equal to your taijutsu modifier per long rest.
      <em><strong>(D-Rank: 2, C-Rank: 4, B-Rank: 6, A-Rank: 8, S-Rank: 10)</strong></em></p><p>Also at 13th level, when
      you would roll a 1 or 2 on your ammunition die, you can spend 5 chakra to reroll the die, taking the second
      result.</p>
    chat: ''
