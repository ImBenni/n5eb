folder: LauI428VWWb0DuSz
name: Demon Slayer Styles
type: feat
_id: 9D1HTnzEoyyfWGtm
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, you get to choose a Style that supports your combat style.</p><p> You know 1 style from the
      following List, and gain more as you gain levels in this class based on the Styles Known Table of Weapon
      Specialist.</p><p> <strong>Total Concentration Breathing: Devastate.</strong></p><p> Once per turn, as part of
      landing a weapon or taijutsu attack, you can change the damage type to that of your chosen release, and impose a
      Constitution saving throw.</p><p> On a failed save, the creature becomes vulnerable to your nature release's
      damage type until the end of your turn.</p><p> You can use this style twice per long rest.</p><p> <strong>Total
      Concentration Breathing: Eternal.</strong></p><p> When you would make a death saving throw, you roll 1 flurry die
      and add half the result (Min. 0).</p><p> <strong>Total Concentration Breathing: Flow Control.</strong></p><p> As a
      full turn action, you can superheat your blood to cauterize your injuries.</p><p> You gain 4 flurry die of
      temporary hit points and you can suspend the effects of any two conditions you are under the effects of, excluding
      Grappled, Restrained, and Exhaustion, negating the condition's effects until you lose a number of hit points equal
      to 10 + your character level, after which this style ends.</p><p> You can only benefit from this style once at a
      time.</p><p> <strong>Total Concentration Breathing: Nichirin Lungs.</strong></p><p> Once per turn, when you deal
      your chosen release's damage type with a Bukijutsu, increase the damage by two flurry die.</p><p> <strong>Total
      Concentration Breathing: Shukuchi.</strong></p><p> When you use Perceptive Augmentation, it now lasts until the
      end of your next turn.</p><p> While benefitting from this style, you do not provoke attacks of
      opportunity.</p><p></p>
