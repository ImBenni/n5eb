system:
  description:
    value: >-
      <p>At 20th level, a strange mark appears somewhere on your body, traditionally on your forehead or face.</p><p>
      Its appearance varies depending on the Demon Slayer's combat style; some are flames, others are waves, etc.</p><p>
      This mark is a sign of a Demon Slayer of immense strength and power.</p><p> Your Strength and Constitution scores
      increase by 2.</p><p> Your maximum for these scores increases by 2.</p><p> Additionally, as a bonus action, you
      can spend 10 chakra to gain the following benefits for 1 minute; While in this state, your weapon glows a bright
      red.</p><p> Your weapon ignores resistance and temporary hit points, and treats immunity as resistance.</p><p> You
      have advantage on concentration checks to maintain concentration of jutsu of your chosen release.</p><p> When you
      would move, you can instead teleport.</p><p> When you deal your weapon's damage, creatures must make a
      Constitution saving throw against your Taijutsu Save DC.</p><p> On a failed save, they are unable to recover any
      hit points until the end of your next turn.</p><p> Demons automatically fail this saving throw.</p><p> Once per
      full rest, as a reaction when you would fall to 0 hit points, you can spend 15 chakra to delay falling unconscious
      and take an immediate turn after your current turn.</p><p> If you take any damage after this feature activates,
      you make a death saving throw for each instance of damage you take.</p><p></p>
