name: The Transparent World
type: feat
_id: efwzFMkCu10tURzh
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>At 13th level, you have achieved martial understanding that nears the pinnacle of human ability. While in
      combat, you can enter a transcendent state, peering into the Transparent World, becoming able to predict your
      foe's every movement.</p><p>While you are bloodied, you can choose to begin gazing into the transparent world.
      Doing so takes up a concentration slot, as if you were concentrating on a B-Rank jutsu. While in this transcendent
      awareness, you chose a hostile creature you are fighting. This creature has disadvantage on attack rolls and
      ability checks against you, and your attacks against this creature cannot be made at disadvantage by any
      means.</p>
