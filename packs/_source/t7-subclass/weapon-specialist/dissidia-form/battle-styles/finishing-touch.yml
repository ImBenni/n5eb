name: Finishing Touch
type: feat
_id: I9w6JfSUbYjQRi6T
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>As an action, you spin your melee weapon and take a step forward, generating a current that pulls creatures
      towards you.</p><p> Move 15 feet in a straight line.</p><p> All creatures within 15-foot radius of you must make a
      Dexterity saving throw, being pulled up to within 5 feet of you and taking 2 flurry die of damage on a failed
      save, or half damage and no effects on a success.</p><p> If there is a creature in front of you within 5 feet when
      you end your movement, you can make one melee weapon attack.</p><p> Ex-Finishing Touch: When you go to make a
      melee weapon attack with this style, add one flurry die to your attack and damage roll.</p><p> If you successfully
      hit the creature, you take the creature up 30 feet into the air, travelling with them as you begin spinning and
      slashing wildly.</p><p> The creature must make a Dexterity saving throw at disadvantage, taking your weapon's
      damage + your Weapon Specialist level in force damage and being knocked back 60 feet horizontally on a failure, or
      half damage and no effects on a success.</p><p></p>
