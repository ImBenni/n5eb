system:
  description:
    value: >-
      <p>Once per turn, you can spend 5 chakra to dash to a space or creature you can see within range of your movement
      speed.</p><p> You dash with incredible speed, able to move through the air as if you were flying, ignoring
      difficult terrain and not provoking opportunity attacks.</p><p> When you use this technique, you are resistant to
      falling damage and ignore the first 60 feet of falling damage until you land.</p><p></p>
