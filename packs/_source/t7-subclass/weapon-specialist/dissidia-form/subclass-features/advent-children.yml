system:
  description:
    value: >-
      <p>Finally at 20th level, your limits are practically non-existent.</p><p> You are permanently under the effects
      of the first 3 bullets of Limit Break (You gain the temporary hit points at the beginning of combat, which are
      replenished when you re-enter your Limit Break), and you gain 4 Limit Points when you would gain Limit Points,
      instead of 3.</p><p> Additionally, you can spend 3 chakra as a bonus action to gain 3 Lp.</p><p> When you enter
      your Limit Break, you gain additional benefits; You have advantage on the first weapon or Taijutsu attack roll you
      make per turn.</p><p> Your Strength and Constitution scores and their maximums increase by +2.</p><p> You gain a
      +1d4 bonus to all saving throws.</p><p> This stacks with your innate +1 bonus to saving throws from Limit
      Break.</p><p> Ex- versions of Dissidia Techniques and Styles cannot be reacted to.</p><p></p>
