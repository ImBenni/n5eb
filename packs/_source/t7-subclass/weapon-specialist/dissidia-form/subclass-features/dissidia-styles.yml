folder: Vo4C7sm6aignsIgc
name: Dissidia Styles
type: feat
_id: 6jvTWRVDtzTgA2Lg
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, you get to choose a Style that supports your combat style.</p><p> You know 1 Style from the
      following List, and gain more as you gain levels in this class based on the Styles Known Table of the Weapon
      Specialist.</p><p> <strong>Braver.</strong></p><p> Your weapon's damage deals force damage in addition to its
      listed damage type, and whenever you hit a melee attack with your weapon, you can choose to knock the creature
      back 5 feet in any direction for 2 chakra.</p><p> <strong>Chase Down.</strong></p><p> When you would knock a
      creature back more than 5 feet with a melee weapon attack or Bukijutsu, you can immediately use Brave Dash at no
      cost to dash toward the creature and make one melee weapon attack, dealing your weapon's damage + 1 flurry die on
      a hit.</p><p> The creature must then make a Dexterity saving throw, being knocked back 30 feet in any direction on
      a failed save.</p><p> You can use this style no more than once per turn.</p><p>
      <strong>Climhazzard.</strong></p><p> When you would take damage from an attack roll, as a reaction you contest the
      roll with a melee weapon attack roll.</p><p> If you succeed, you reduce the damage dealt by your weapon's damage +
      1 flurry die.</p><p> If you succeeded by 5 or more, you gain resistance to the damage, and make one melee attack
      against the creature, dealing your weapon's damage and knocking them upward 15 feet.</p><p> If you succeeded by 10
      or more, you travel with the creature on hit, and make a 2nd melee attack dealing your weapon's damage and
      slamming them to the ground on a hit. <strong>Ex-Climhazzard:</strong> Instead of the normal effects of this style
      taking place, you gain immunity to the damage dealt, and make one melee attack against the creature, dealing twice
      your weapon's damage and knocking them upward 50 feet.</p><p> <strong>Cross-Slash.</strong></p><p> When you take
      the attack action with a melee weapon, you can use your bonus action to have all weapon attacks you make be under
      the effects of Chakra Strike at 2nd level (Max of 3 attacks), and have each successful hit impose a Strength
      saving throw, where failure causes the creature to gain 1 rank of Weakened.</p><p> Once your attack action ends,
      the creature is knocked back a number of feet equal to 10 times the number of successful attacks.</p><p> You can
      use this style a number of times equal to half your proficiency bonus, rounded up, per long rest.</p><p>
      <strong>Ex-Cross Slash:</strong> You can use the Ex-Cross Slash even if you have expended all uses of this
      style.</p><p> When you use this style, you increase the number of attacks you make with the attack action by +2,
      and Chakra Strike applies to up to 5 attacks.</p><p> <strong>Finishing Touch.</strong></p><p> As an action, you
      spin your melee weapon and take a step forward, generating a current that pulls creatures towards you.</p><p> Move
      15 feet in a straight line.</p><p> All creatures within 15-foot radius of you must make a Dexterity saving throw,
      being pulled up to within 5 feet of you and taking 2 flurry die of damage on a failed save, or half damage and no
      effects on a success.</p><p> If there is a creature in front of you within 5 feet when you end your movement, you
      can make one melee weapon attack.</p><p> <strong>Ex-Finishing Touch:</strong> When you go to make a melee weapon
      attack with this style, add one flurry die to your attack and damage roll.</p><p> If you successfully hit the
      creature, you take the creature up 30 feet into the air, travelling with them as you begin spinning and slashing
      wildly.</p><p> The creature must make a Dexterity saving throw at disadvantage, taking your weapon's damage + your
      Weapon Specialist level in force damage and being knocked back 60 feet horizontally on a failure, or half damage
      and no effects on a success.</p><p></p>
