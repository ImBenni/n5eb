system:
  description:
    value: >-
      <p>Starting at 13th level, you have found a way to force your way towards manifesting skill with Ninjutsu that
      even masters of the art struggle to attain.</p><p> You gain 3 Ninjutsu of your choice that you qualify for,
      ignoring ability score restrictions.</p><p> These jutsu must impose an attack roll or saving throw against a
      creature.</p><p> These jutsu gain the Limit keyword.</p><p> Ninjutsu with the Limit Keyword change all instances
      of Ninjutsu attack to Taijutsu attack and use your Taijutsu Save DC, and count as Bukijutsu for the purposes of
      interactions with the Dissidia weapon form.</p><p> Damage dealt with these jutsu contributes towards your twice
      per turn buildup limit with Limit Break, as if you dealt damage with a weapon.</p><p> If you cast a jutsu with the
      Limit keyword while under the effects of Limit Break, these jutsu gain a +1 to attack rolls and Save DC, and
      damage die (once per turn).</p><p> You can switch these jutsu when you gain a level in this class.</p><p></p>
