name: Limit Break
type: feat
_id: LGb3vakCT0A8oLnM
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, the tension of battle causes your power to progressively surge until it ultimately
      reaches its breaking point. Twice per turn while in combat and you either take damage, or deal damage with a
      weapon you gain 3 <em><strong>Limit Points (Lp)</strong></em>. When you gain 12 Limit Points, a misty blue aura of
      chakra surrounds you. You have entered your <em><strong>Limit Break</strong></em>. While in this state, you gain
      the following benefits for 3 rounds, after which your Limit Points are reset to 0.</p><ul><li>You gain a number of
      temporary hit points equal to your Weapon Specialist level. This stacks with other sources of temporary hit
      points.</li><li>You gain a +1 bonus to AC, attack rolls made with weapons, and all saving throws.</li><li>Your
      movement speed and maximum jump height is doubled.</li><li>When you deal your weapon's damage, you add 1 flurry
      die to the damage dealt, up to 3 times per turn.</li><li>You can use the <strong>Ex-</strong> versions of Dissidia
      Techniques and Styles. Doing so immediately sets your Limit Points to 0, ending your <em><strong>Limit
      Break</strong></em>.</li></ul>
    chat: ''
