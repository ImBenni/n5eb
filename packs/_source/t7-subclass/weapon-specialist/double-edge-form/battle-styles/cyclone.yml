system:
  description:
    value: >-
      <p>As a reaction, you can spin wildly, slashing both of your weapons like a raging storm.</p><p> Make 2 weapon
      attacks against each creature of your choice within 10 feet of you, dealing the damage of one of your weapons on
      the first hit, and the damage of your other weapon on the 2nd hit.</p><p> Each creature hit by at least one of
      your attacks must make a Strength saving throw, being knocked back a number of feet equal to 5 times the result of
      one flurry die (this knockback takes effect at the conclusion of this style, or being knocked 5 feet closer to
      you, up to within 5 feet of you, on a failed save (You can choose which creatures suffer which effect.)</p>
