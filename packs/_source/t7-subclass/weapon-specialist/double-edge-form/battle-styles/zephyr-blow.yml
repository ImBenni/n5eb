system:
  description:
    value: >-
      <p>As an action you can spend 1 chakra die to send out two shockwaves from your weapons.</p><p> Each creature
      within a 20-foot long cone must make two saving throws against your Taijutsu Save DC, gaining a condition for each
      failed save.</p><p> The type of saving throw and condition depends on the damage type of your two weapons.</p><p>
      Bludgeoning: The creature must make a Strength saving throw, becoming Dazed and Bruised on a failure.</p><p>
      Slashing: The creature makes a Dexterity saving throw, gaining 2 ranks of Bleeding on a failure.</p><p> Piercing:
      The creature must make a Constitution saving throw, becoming Weakened for 1d4 rounds on a failure.</p><p></p>
