system:
  description:
    value: >-
      <p>As a bonus action on your turn when one or two of your weapons are not in your hand, you can cause the
      weapon(s) to return to your hand from up to 60 feet away.</p><p> As the weapons return to your hand, you can make
      a number of weapon attacks equal to how many weapons returned to you against a creature within your weapons
      ranges.</p><p> Add the result of 1 flurry die to the damage roll of each attack you make.</p><p></p>
