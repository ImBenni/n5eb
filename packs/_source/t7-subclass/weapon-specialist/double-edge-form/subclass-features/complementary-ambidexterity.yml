name: Complementary Ambidexterity
type: feat
_id: pEjljOBoUFx04mZp
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 6th level, you have learned to utilize various forms of jutsu in combat without dropping your
      offensive or defensive capabilities, instead fueling the jutsu with additional chakra to cast the jutsu with brute
      force. By spending 2 chakra, you can ignore the HS component when casting a jutsu, replacing it with the M
      component.</p><p>When you are wielding two weapons and would cast a Bukijutsu that would only add the weapon's
      damage of one weapon you are wielding, you can spend 5 chakra to add the weapon's damage of your second weapon.
      When you would do this, you do not add your ability modifier of either weapon to damage rolls. Jutsu that would
      increase the damage dealt of your second weapon do not apply when using this feature. You can use this feature a
      number of times equal to your Taijutsu ability modifier per long rest.</p>
    chat: ''
