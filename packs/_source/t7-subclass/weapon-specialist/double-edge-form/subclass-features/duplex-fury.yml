system:
  description:
    value: >-
      <p>Starting at 13th level, your wild nature proves to others that the perfect defense, in reality, is just a
      strong offense. When wielding two weapons, for each successful attack you make with your weapons after the first,
      you gain one of the following benefits; All of these benefits stack with one another, and last until the start of
      your next turn.</p><ul><li>You gain temporary hit points equal to your proficiency bonus.</li><li>Your critical
      threat range for the type of attack performed increases by +1, up to the maximum of 17-20.</li><li>Your movement
      speed increases by 15 feet.</li><li>Your AC increases by +1, up to a maximum equal to half your proficiency
      bonus.</li></ul><pre><code></code></pre>
