system:
  description:
    value: >-
      <p>At 20th level, you've become an example for all who seek this weapon form, you're the pathfinder, a legacy
      upholder, or just really good at hitting thing until they die.</p><p>When you use your <em><strong>Heavenly
      Spirit</strong></em> feature, you can assume up to 6th breath, instead of the fourth, and while any of the breaths
      are active, you ignore the Weakened and Slowed conditions. When you would use the 7th breath, you simply need a
      long rest to be able to use it again.</p><p>Finally, you gain a natural resistance to your chosen element and
      reduce the cost of jutsu with your element by 2 while under the effects of a jutsu with Heavenly Breath in its
      name.</p><p></p>
