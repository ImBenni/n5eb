system:
  description:
    value: >-
      <p>Starting at 3rd level, you mix specific breathing techniques and your chakra affinity in order to manifest it
      in a stronger way with weapons.</p><p> Select one Nature Release.</p><p> (Earth, Wind, Fire, Water, or Lightning
      Release).</p><p> You gain the ability to learn jutsu with the select Nature Release.</p><p> You also learn new
      Flurry Techniques that supplement your Heavenly Form.</p><p> <strong>Elemental Infusion.</strong></p><p> As a part
      of casting a bukijutsu, you can infuse your chosen nature release into it, doing this changes the jutsu's damage
      type to your chosen release.</p><p> Unlike other flurry techniques, you can benefit from this technique any number
      of times per turn.</p><p> <strong>Heavenly Strikes.</strong></p><p> When you use a Breath of Bukijutsu that
      corresponds with your chosen nature release, you may trigger the Chakra Strike Flurry as if you made a weapon
      attack, up to the level 10 bonus.</p><p> You can then spend 5 chakra to forgo its bonus action cost.</p><p>
      <strong>Surge.</strong></p><p> As a bonus action, you can spend 1 chakra die.</p><p> When you do, for 1 minute,
      your weapon's damage becomes that of your chosen release's damage type.</p><p> Once per turn, when you deal damage
      with your weapon, increase the damage by your proficiency bonus.</p><p> You ignore resistance to your element's
      damage for the duration.</p><p></p>
