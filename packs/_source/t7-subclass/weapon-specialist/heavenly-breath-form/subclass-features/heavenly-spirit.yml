system:
  description:
    value: >-
      <p>Starting at 13th level, your mastery over the heavenly breaths has become near perfect. As a full turn action,
      you can reduce your movement speed to 0, to assume up to 4th Heavenly Breath. Additionally, you suffer no
      downsides upon ending the Third or Fourth heavenly breath.</p><p>As the start of your turn, you can choose to
      change the bonus to Taijutsu attack rolls to instead boost your Weapon Attack rolls, until the end of the current
      turn.</p><p>Also at 13th level, when you cast a Ninjutsu with your chosen element while under the effects of
      <em><strong>Surge</strong></em>, you can spend 5 chakra to increase the save dc or total damage die by 1, and
      change the jutsu's range to your Weapon's Range.</p>
