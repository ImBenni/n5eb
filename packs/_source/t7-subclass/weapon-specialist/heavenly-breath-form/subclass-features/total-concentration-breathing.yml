system:
  description:
    value: >-
      <p>Starting at 6th level, you gain 1 jutsu with <strong>Heavenly Breath</strong> in the name, and you no longer
      need to pay chakra in order to concentrate on all the Heavenly Breaths.</p><p>Additionally, after through training
      you've reached a new understanding of both your breathing and natural affinity, the line of heavenly breath jutsu
      now count as <strong>Bukijutsu</strong> and they also gain your chosen release keyword. You gain the ability to
      concentrate on Ninjutsu with your nature release's keyword while concentrating on the Heavenly Breaths.</p>
