system:
  description:
    value: >-
      <p>When you would use the <strong>Chakra Strike</strong> Flurry Technique, you may create a clone as if you had
      casted <em>Shadow Clone Technique</em>. The clone created lasts for a number of rounds equal to your flurry die.
      The clone disappears at the end of the final round. Clones created this way can't cast jutsu and benefit from
      <em><strong>Weapon Focus</strong></em>.</p>
