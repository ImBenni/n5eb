system:
  description:
    value: >-
      <p>Starting at 6th level, your clones become numerous and your control has become more refined. You may have up to
      3 clones made through <strong>Memento</strong> active at once.</p><p>Additionally, you may control clones you with
      an action or a bonus action.</p><p>Lastly, a Clone may use <strong>Enhanced Deflection</strong> or
      <strong>Perceptive Augmentation</strong>, once per round. When a Clone uses a Flurry Technique, up 2 other Clones
      benefit from the Technique this round simultaniously.</p>
