system:
  description:
    value: >-
      <p>Starting at level 13th, you invest more time into your cloning techniques, allowing for clones that can persist
      for longer on the field. Clones you create through <strong>Memento</strong> gain twice your level in Temporary Hit
      Points.</p><p>Additionally, the duration of clones you create become your flurry die+2.</p><p>Finally, when you
      are adjacent to a clone you have created, increase your AC by +1. This can stack up to two times.</p>
