system:
  description:
    value: >-
      <p>When combat begins you utilize a special hand seal that actives seals infused on your weapon, causing it to
      start emitting an unnatural mist that surrounds it.</p><p> You weapon focus now deals psychic damage alongside its
      original damage type for the purposes of resistance/immunity.</p><p> Once per turn as a part of hitting a weapon
      attack you can force the target to make a Wisdom saving throw gaining the Confused condition on a failure.</p><p>
      The DC to remove and inflict mental conditions caused by this subclass is now equal to your Taijutsu or Genjutsu
      save DC.</p><p> The jutsu cost increase from the Confused condition is equal to your highest rank jutsu
      known.</p><p></p>
