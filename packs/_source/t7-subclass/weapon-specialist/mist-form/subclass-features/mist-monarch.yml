system:
  description:
    value: >-
      <p>At 20th level, you have perfect control over your illusions and the effects they force onto others, alongside a
      form all for yourself. Your Strength or Dexterity (your choice) and Wisdom scores increase by 2. Your maximum for
      those scores also increases by 2. Additionally, you can use your Bonus action and 20 chakra, irradiating a stream
      of mist surrounding you and distorting reality as you see fit, for the next minute.</p><p>For the duration of this
      feature, you ignore immunities targets have against any mental or sensory saves you inflict. Also, whenever a
      creature rolls against your taijutsu save DC you reduce their roll by one flurry die, and you now gain additional
      options to use for your <em><strong>Mist's Manipulation</strong></em>
      feature.</p><ul><li>Berserk</li><li>Charmed</li><li>Fear</li><li>Slowed</li></ul>
