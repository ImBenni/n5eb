name: Forceful Techniques
type: feat
_id: MYIPrw18Im5lxfMe
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, your Weapon Focus has been imbued with your chakra.</p><p>Your weapon passively glows
      bright light in a 5-foot radius and dim light for an additional 5 feet, and now deals force damage in addition to
      their listed damage.</p><p>The color your weapon glows matches your natural chakra color.</p><p>You also learn to
      augment your Flurry Techniques with natural energy that supplement your Quasar Form.</p><p><strong>Forceful
      Defense.</strong></p><p>When you would use the Enhanced Deflection flurry technique, you can spend 5 chakra to
      gain the benefits until the start of your next turn.</p><p><strong>Forceful Offense.</strong></p><p>When you would
      use the Chakra Strike flurry technique, you ignore the benefits of structures, constructs, or temporary hit points
      that would intercept the damage dealt.</p><p><strong>Forceful Movement.</strong></p><p>When you would use the
      Perceptive Augmentation flurry technique, you ignore movement penalties from difficult terrain, and walking on
      walls or water until the start of your next turn.</p><p></p>
