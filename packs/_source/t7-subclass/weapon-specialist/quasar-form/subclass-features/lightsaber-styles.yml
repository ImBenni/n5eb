folder: GUUnPGt49BOeWR2U
name: Lightsaber Styles
type: feat
_id: stc36pxkupZkA32X
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Also, at 3rd level, you get to choose a Style that supports your combat ability.</p><p> You know 1 style from
      the following list, and gain more as you gain levels in this class based on the Styles Known Table of the Weapon
      Specialist.</p><p> <strong>Deflecting Slash.</strong></p><p> As a reaction, when a ranged attack would target you,
      make a melee weapon attack.</p><p> If the result of your attack is greater than the triggering creatures attack,
      you reflect their attack against another creature within range.</p><p> You may use this feature twice per short
      rest.</p><p> <strong>Disarming Slash.</strong></p><p> Once per turn, when you hit a creature with a weapon or
      taijutsu attack you can force them to make a make a Dexterity saving throw against your Taijutsu save DC,
      disarming them on a failed save.</p><p> You knock their weapon a number of feet away equal to 5 x your flurry
      die.</p><p> <strong>Focused Slash.</strong></p><p> As a bonus action, you can calm your mind, allowing you to
      attack swiftly, with no margin for error.</p><p> The next weapon or taijutsu attack you make cannot be reacted to,
      and if you would have disadvantage on this attack, you instead make it as normal.</p><p> You may use this feature
      twice per short rest.</p><p> <strong>Instant Slash.</strong></p><p> When initiative is rolled you may move up to
      your full movement speed and take the attack action against one target you can see.</p><p> <strong>Mental
      Fortitude.</strong></p><p> When you would be forced to make a saving throw or be inflicted by a Mental conditions
      you gain advantage on the initial saving throw.</p><p> <strong>Pushing Slash.</strong></p><p> Once per turn, when
      you hit a creature with a weapon or taijutsu attack you can force them to make a Strength saving throw against
      your Taijutsu save DC, knocking them back a number of feet away equal to 5 x your flurry die and forcing them
      prone.</p><p></p>
