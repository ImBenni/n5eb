system:
  description:
    value: >-
      <p>Finally at 20th level, the force itself pushes back on everything that would resist your will. Whenever you or
      a friendly creature within 15 feet of you must make a saving throw, the creature gains a bonus to the saving throw
      equal to your Constitution modifier (with a minimum bonus of +1). You must be conscious to grant this
      bonus.</p><p>When you force a creature to make a saving throw you can subtract half the result of a flurry die
      from their save. (Min 1.). You can do this a number of times equal to half your proficiency bonus (rounded up) per
      long rest. In addition, you no longer take falling damage and you cannot be knocked prone, knocked back, or
      pulled, against your will.</p><p></p>
