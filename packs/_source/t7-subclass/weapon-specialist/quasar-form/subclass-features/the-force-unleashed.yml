img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 13th level, your control over the force has all but dwarfed comprehension. You gain 60ft. of chakra
      sight, as you sense the energy in life around you. You can also exert your control over the force through a
      barrier that is created with your will alone. As a reaction, you can spend 10 chakra and roll 2 of your flurry die
      taking the higher result, to create a barrier of hit points equal to 10 times the result of your flurry die roll.
      If you would be forced to make a physical saving throw (Strength, Dexterity, or Constitution) when this barrier is
      active you make the saving throw at advantage. This barrier is made of pure force that follows you and lasts until
      the start of your next turn.</p>
    chat: ''
