system:
  description:
    value: >-
      <p>When you hit a creature with a weapon attack with a weapon with the heavy property, you can force the creature
      to make a Wisdom Saving throw.</p><p> On a failed save, on their next turn, they must take the Dash action to move
      as far away from you as they can.</p><p> If they cannot move, they take the Dodge action instead.</p><p> A
      creature that has any ranks of fear against you makes this this saving throw at disadvantage.</p><p></p>
