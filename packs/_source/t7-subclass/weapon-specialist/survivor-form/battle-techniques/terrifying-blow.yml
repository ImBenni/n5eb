system:
  description:
    value: >-
      <p>When you hit a creature with a melee weapon attack, with a weapon with the heavy keyword, you can as a bonus
      action add your Chakra Strike to the damage roll.</p><p> The target must succeed a Wisdom saving throw, gaining 1
      rank of fear on a failed save.</p><p> They can repeat this saving throw at the end of their turns, removing all
      ranks of fear given by this subclass's abilities.</p><p></p>
