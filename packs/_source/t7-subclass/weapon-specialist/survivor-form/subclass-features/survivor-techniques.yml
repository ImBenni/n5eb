name: Survivor Techniques
type: feat
_id: o9civdEjeetIqQrc
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>Starting at 3rd level, you learn additional Flurry Techniques that supplement your Survivor Form.</p><p>
      <strong>Ferocious Crush.</strong></p><p> When you hit a creature with a weapon attack with a weapon with the heavy
      property, you can add 2 Flurry Die to the damage and force the creature and any other creature (no inlcuding you)
      within 5 feet of them to make a Strength saving throw.</p><p> On a failed save, a creature takes the damage of the
      flurry die and is knocked prone.</p><p> A frightened creature makes this save with disadvantage.</p><p>
      <strong>Grip of Fear.</strong></p><p> When you hit a creature with a weapon attack with a weapon with the heavy
      property, you can force the creature to make a Wisdom Saving throw.</p><p> On a failed save, on their next turn,
      they must take the Dash action to move as far away from you as they can.</p><p> If they cannot move, they take the
      Dodge action instead.</p><p> A creature that has any ranks of fear against you makes this this saving throw at
      disadvantage.</p><p> <strong>Terrifying Blow.</strong></p><p> When you hit a creature with a melee weapon attack,
      with a weapon with the heavy keyword, you can as a bonus action add your Chakra Strike to the damage roll.</p><p>
      The target must succeed a Wisdom saving throw, gaining 1 rank of fear on a failed save.</p><p> They can repeat
      this saving throw at the end of their turns, removing all ranks of fear given by this subclass's
      abilities.</p><p></p>
