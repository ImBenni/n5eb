system:
  description:
    value: >-
      <p>Starting at 6th level, your mind has hardened from many battles. you become immune to the fear or charmed
      condition (pick one). You have advantage on saving throws against the other condition you did not pick. You can
      switch your choice of condition on a long rest.</p><p>Additionally, your experience in combat as taught you that
      to win some battles, one only needs to use brute force. You can also ignore the two-handed property for weapons
      that use strength, and when making a weapon attack or Taijutsu attack as part of a Bukijutsu that uses strength,
      you add a +2 to damage rolls.</p>
