name: Unending Fury
type: feat
_id: J5vHffQAAG67Iy7T
img: icons/skills/melee/maneuver-daggers-paired-orange.webp
system:
  description:
    value: >-
      <p>At 20th level, your body has reached superhuman status and is nigh unbreakable.</p><p> Your Strength and
      Constitution scores increase by 2.</p><p> Your maximum for these scores increases by 2.</p><p> Additionally, you
      can, as a bonus action, spend 20 chakra to gather your inner rage, becoming more of a beast than a man.</p><p> For
      the next minute you gain the following benefits and cannot concentrate on any ninjutsu or genjutsu.</p><p> You
      have resistance to Slashing, Bludgeoning and Piercing damage.</p><p> When you hit a creature with a melee weapon
      attack, with a heavy weapon, you deal additional damage equal to twice the current ranks of fear they have.</p><p>
      When you reduce a creature to 0 hit points or critically hit, all creatures of your choice within 30 feet of you
      must make a Wisdom saving throw, gaining one rank of fear on a failed save.</p><p> When you are reduced to 0 hit
      points, you can choose to gain 1 HP and temporary HP up to half your maximum hit points.</p><p> These temporary
      hit points are lost at the end of this feature.</p><p> After using this benefit, you can only use it again after a
      full rest.</p><p> This feature can be used once per long rest.</p><p></p>
