name: Starting Quirks Explanation
type: feat
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><strong>THIS IS JUST A SMALL GUIDE AND NOT A TRAIT TO BE GIVEN TO PLAYERS.</strong></p><p><strong>ADDITIONALLY
      STARTING QUIRKS IS A HOMEBREW WE DECIDED TO ADD AS A
      BONUS.</strong></p><p><strong>Link:</strong></p><p><strong>https://homebrewery.naturalcrit.com/share/GohYm8VyafeF</strong></p><h2
      id="traits">Quirks</h2><p>Traits are optional Features that a player can choose to take during character creation.
      Traits offer unique benefits at the cost of a detriment. Traits seek to give players features that change how they
      play their character in and out of combat. Traits vary dramatically in power and mechanical depth. Some Traits may
      come up very often during low levels, and not often at high levels. Trait choice should be discussed with the DM
      to see if it fits with the rules or vibe of a table. Not all Traits work with all game styles. Some Traits are
      inherently not balanced as some Traits are more focused on roleplay than on combat. Many Traits rely on an honor
      system, which means it is up to the player to actually role play the negative of the quirk.</p><p></p><h3
      id="how-traits-work-in-character-creation">How Traits work in Character Creation</h3><p>Players can choose up to 2
      Traits. Although DMs can rule that players can only take one Quirk. The benefits and negatives of Traits take
      precedence. If a player has multiple features that all affect the same thing, then the effects of Traits should be
      applied before anything else. Some Traits have features that affect how a player should role play their character.
      It is up to the player and their DM to decide when and how much it should affect the player. Some Traits have
      requirements that must be met it is to be chosen. Some Traits require a certain amount in a specific stat and some
      require certain alignments. Some Traits have unique requirements that might not be possible to achieve depending
      on the world your campaign takes place in.</p><p></p><h3 id="alternate-rules">Alternate Rules</h3><p>Players only
      choose 1 quirk at character creation. At later points in the campaign such as a time skip or after an important
      point in the character's life the player chooses another quirk and/or removes a quirk. An example of this would be
      gaining the tragic backstory quirk after a tragic event in your life. This can really add to the story and growth
      of a character by blending story and gameplay</p><p></p><img
      src="systems/n5eb/assets/content/cheat-sheets/quirks-rules-and-warnings.webp" /><p></p><h2 id="rare-traits">Rare
      Quirks</h2><p>Rare traits are as the name implies rare. They do not fit every campain or world and thus players
      should ask their dm before picking one.</p>
