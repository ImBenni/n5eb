name: Artistic
type: feat
_id: ZL7lNvgV9uG034TZ
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"This is beautiful, this is true art."</em></p><h5 id="benefit">Benefit</h5><p>You view all of your jutsu
      as art and like all great artists, you can discern between something created with no care or effort, verses a true
      masterpiece. When you cast a jutsu, that does not have the Combination keyword and either deals damage, heals
      creatures, or imposes a saving throw.</p><p>With jutsu such as these, you can choose to reduce the cost of the
      jutsu by 3. When you lower the jutsu's cost this way, lower its bonus to attack rolls and Save DC by -1. You can
      inversely increase the cost of the jutsu by 3, to increase its bonus to attack and Save DC by +1. Features that
      would lower the chakra cost of a jutsu do not apply when this trait is used to lower the chakra cost.</p><h5
      id="negative">Negative</h5><p>You hate those that would mock your craft. If a creature mocks your art, you tend to
      get violent.</p>
