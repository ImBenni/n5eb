name: Bloodline Disease
type: feat
_id: MG3tWtaENJSr3Wzm
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>Keeping the Bloodline pure wasn't worth it"</em></p><h5
      id="-strong-prerequisite-strong-"><strong>Prerequisite:</strong></h5><p>You cannot be Non-Clan</p><h5
      id="benefit">Benefit</h5><p>Your bloodline is pure, which causes it to be especially strong in you. You gain
      abilities from your clan 3 levels early. </p><p>Jutsu with the Hijutsu keyword cost 1 less chakra to cast.</p><h5
      id="negative">Negative</h5><p>Your family tree doesn't have enough branches. You decrease your maximum hit points
      and chakra points by -2 and -1 respectively when you gain this trait. This reduction repeats each time you gain a
      level thereafter. Additionally, you always have 1 failed death saving throw, which cannot be removed. Lastly,
      whenever you would roll a hit or chakra die to regain hit points or chakra points respectively, reduce the result
      by -1, per die spent.</p>
