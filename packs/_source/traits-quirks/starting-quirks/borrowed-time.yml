      id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>Due to your impending demise you fight as if you
      have nothing to lose, since you kinda don't. Once per long rest when you would become bloodied you gain 1 Wof
      point.</p><h5 id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>When creating your character roll
      3d4, then record the result. <br />After a number of years equal to the result your character will die, due to a
      cause of your chosing. (Ex, illness or curse)</p>
