    value: >-
      <p><em>"Ha Ha"</em></p><h5 id="benefit">Benefit</h5><p>You have a lot of experience with getting under people's
      skin. When you use the Intimidation skill, you add a d6 to the roll. Additionally, you can use the shove action as
      a bonus action.</p><h5 id="negative">Negative</h5><p>Your entire life you have treated people like trash causing
      them to dislike and not trust you. Whenever you would make aDeception, Performance, or Persuasion skill check you
      subtract a d4 to the roll.</p>
