system:
  description:
    value: >-
      <p><em>"They say with age your reflexes slow down. I've not felt it."</em></p><h5
      id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>Your reflexes put others to shame in more ways than
      you can count. Your Dexterity score maximum is increased by 2. Once per long rest you may treat any saving throw
      as a dexterity saving throw. Additionally, you add 1d4 to saving throws to avoid gaining the surprised
      condition.</p>
