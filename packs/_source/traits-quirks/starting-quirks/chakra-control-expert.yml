system:
  description:
    value: >-
      <p><em>"it's easy to control your chakra if you don't have much"</em></p><h5
      id="prerequisites">Prerequisites</h5><p>Proficiency in chakra control</p><h5 id="benefit">Benefit</h5><p>Your
      control over your chakra is better than most who have trained for years. The chakra cost for all jutsu is lowered
      by 2 to a minimum of 1, you can use Intelligence instead of Constitution for chakra control, and you can add a d4
      to all concentration saves to continue concentrating on jutsu.</p><h5 id="negative">Negative</h5><p>You decrease
      your maximum chakra points by -2 respectively when you gain this trait. This reduction repeats each time you gain
      a level thereafter.</p>
