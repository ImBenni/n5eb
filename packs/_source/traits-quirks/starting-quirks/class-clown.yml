  description:
    value: >-
      <p><em>"I asked her what was up, then she said the sky."</em></p><h5
      id="benefit-"><strong>Benefit:</strong></h5><p>You have a way of turning everything into a joke. Your Charisma
      score maximum is increased by 2. Additionally, once per short rest you can use performance instead of intimidation
      or persuasion when making a skill check.</p><h5 id="negative-"><strong>Negative:</strong></h5><p>No one is scared
      of a clown. You subtract -1d4 from all intimidation checks.</p>
