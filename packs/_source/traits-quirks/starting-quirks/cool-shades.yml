img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>Pulls out a different pair of shades after the first ones broke "You were saying"</em></p><h5
      id="benefit">Benefit</h5><p>You are always wearing your trusty sunglasses. You gain 1d6 to saves to avoid gaining
      the blinded condition. Additionally, if your shades would ever be destroyed you can pull out another pair once per
      long rest. When you do so roll 1d4. If the result is 3 or 4, you gain 1 WOF point. If the result is 4, you gain
      additional use of this feature.</p><h5 id="negative">Negative</h5><p>Whenever you would take half your maximum hp
      in a single turn you must make a flat saving throw with a DC of 10.<br />On a failed save your shades are damaged
      to the point of being unusable. <br />On success nothing happens. <br />You cannot share your shades with other
      creatures.</p>
