  description:
    value: >-
      <p><em>"Well doggies."</em></p><h5 id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>Your experiences
      in the country have toughened you up. Your Constitution score maximum is increased by 2. Additionally, you add 1d4
      to all survival skill checks.</p><h5 id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>Your country
      upbringing leaves you naive to the ways of modern life. Your travel speed is halved, while in a large city.
      Additionally, you subtract 1d4 from all history checks.</p>
