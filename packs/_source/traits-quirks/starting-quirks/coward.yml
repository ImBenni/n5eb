name: Coward
type: feat
_id: P2WpnYTbmrhacJq1
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Fear. That is what we live with. And we live it every day. Only in death are we free of it."</em></p><h5
      id="benefit">Benefit</h5><p>Fear isn't necessarily a bad thing. It saves lives. The first time you are faced with
      an attack or jutsu that would reduce your hp to 0 per short rest, you add +2 to your AC and all saving throws
      until the start of your next turn. Additionally, once per long rest you may grant an attack aimed at you
      disadvantage as you unpredictably begin to cry and beg.</p><h5 id="negative">Negative</h5><p>You have disadvantage
      against gaining the first rank of Fear.</p>
