img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"There's no turning back. But this may be our only chance. We can't let fear stop us! I'm not afraid of the
      darkness!"</em></p><h5 id="benefit">Benefit</h5><p>Your character naturally leans towards evil choices/darkness.
      You strive to stay ahead of your peers. During Character creation, you gain 1 additional jutsu up to 1 rank higher
      than you would normally be able to select. Additionally you gain 1 feat with a level requirement of up to 4.
      Regardless of which feat you pick, you do not gain an ability score improvement from any feat you select.</p><h5
      id="negative">Negative</h5><p>Your path to power has hindered you as you focus on advanced materials, causing you
      to falter on the fundamentals. You can't learn D-Rank Jutsu through Downtime. Also you do not get a feat at 8th
      level.</p>
