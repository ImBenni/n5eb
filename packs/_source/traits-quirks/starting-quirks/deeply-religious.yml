system:
  description:
    value: >-
      <p><em>"I know it's annoying, but it's my religion!"</em></p><h5
      id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>Your god shines it favor upon you. Once per day you
      gain the ability to channel your God's divinity. When you would channel your God's divinity you either regain 1
      use of any limited use clan or class feature or lower the action cost of an clan or class feature by 1 stage.
      (Full Turn Action &gt; Action &gt; Bonus Action/Reaction )</p><h5
      id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>You must spend at least 10 minutes per day
      honoring your God by performing various rituals. If you fail to do this you lose access to the benefits from this
      trait, until you honor your God for 1 hour.</p>
