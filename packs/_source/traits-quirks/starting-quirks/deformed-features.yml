  description:
    value: >-
      <p><em>"I barely even notice it... yes it does scare away the ladies."</em></p><h5
      id="benefit">Benefit</h5><p>Your face is deformed either from birth or injury. You can use this to your advantage
      to make a point. Twice per short rest you can bring up your appearance to add a d6 to any Charisma check.</p><h5
      id="negative">Negative</h5><p>You have an iconic visage. If someone knows what you look like they have advantage
      on locating you in a crowd if you haven't made efforts to change your appearance</p>
