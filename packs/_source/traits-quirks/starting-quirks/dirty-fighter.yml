system:
  description:
    value: >-
      <p><em>"You wanna go bro?"</em></p><h5 id="-strong-benefits-strong-"><strong>Benefits</strong></h5><p>You aren't
      afraid to take cheap shots. Twice per short rest, when you roll initative, you can make a melee attack as a free
      action against a creature within your weapon's range.</p><h5
      id="-strong-negative-strong-"><strong>Negative</strong></h5><p>When you take your trick shot you leave yourself
      wide open to attack. When you would use the benefit of this trait your AC is lowered by 2 until the beginning of
      your first turn.</p>
