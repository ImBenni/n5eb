img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"You may have invaded my mind and my body, but there's one thing a Saiyan always keeps: his
      pride."</em></p><h5 id="benefit">Benefit</h5><p>You think very highly of yourself. That you're the best there ever
      was, because you are you and they are not you. A number of times per long rest equal to your proficiency you may
      add a 1d4, 1d6, or 1d8 to any 1d20 roll. When you would do, so you take damage equal to the result of the added
      die. If you use this trait multiple times on a single d20 roll, you add the highest result to your d20 roll and
      take damage equal to half the total result of all dice rolled. Additionally, you add 1d4 to all saves to avoid
      being charmed, controlled, or possessed.</p>
