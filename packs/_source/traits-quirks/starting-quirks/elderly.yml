system:
  description:
    value: >-
      <p><em>"I may have lost the power granted by youth, but I have gained wisdom granted by age"</em></p><h5
      id="prerequisites">Prerequisites</h5><p>Be older than 50.</p><h5 id="benefit">Benefit</h5><p>You start with 3
      extra jutsu up to D-Rank that are treated as being learned with downtime. You also gain an additional
      background.</p><h5 id="negative">Negative</h5><p>Your old age intensives the stress of combat. You take 1d8 Hp and
      Cp damage at the beginning of each of your turns after 3 rounds of combat has transpired.</p>
