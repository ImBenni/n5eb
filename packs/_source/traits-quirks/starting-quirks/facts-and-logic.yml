system:
  description:
    value: >-
      <p><em>"let's say hypothetically that ..."</em></p><h5 id="benefit">Benefit</h5><p>You are a true skeptic. A
      person that does not let feelings get in the way of logic. you are able to use your intelligence modifier instead
      of your charisma mod for all persuasion, deception, and intimidation skill checks.</p><h5
      id="negative">Negative</h5><p>You are unable to comprehend your precious facts being incorrect. When you would
      fail a persuasion, deception, and intimidation skill check you take 1 psychic damage and suffer a -1d4 to your
      next skill check that uses intelligence.</p>
