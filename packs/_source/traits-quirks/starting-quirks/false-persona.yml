system:
  description:
    value: >-
      <p><em>"Don't Worry I'm not drunk I'm just very boozed right now"</em></p><h5 id="benefit">Benefit</h5><p>You put
      on an act that makes others around you believe that you are much weaker and dumber than you actually are. If you
      encounter someone that believes in your false persona, you gain advantage on the first d20 roll made against them
      and they have disadvantage on the first d20 roll involving you.</p><h5 id="negative">Negative</h5><p>Your act
      spreads far and wide. Some people will refuse to work with you and some will treat you harshly for your persona.
      If you attempt to roll and Charisma check on one of these people you roll with disadvantage. On the other hand,
      many people will be able to see through your persona instantly.</p>
