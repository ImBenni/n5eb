    value: >-
      <p><em>"back in my day"</em></p><h5 id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>You have a
      certain group that you just can't stand. Choose 1 clan, village, or organization. Once per turn, when you would
      damage a member of that group you can add 1d4 to the damage roll.</p><h5
      id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>Your chosen group also dislikes you. Once per
      turn, when a member of your chosen group would damage you they add 1d4 to their damage roll.</p>
