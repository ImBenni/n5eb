system:
  description:
    value: >-
      <p><em>"No hard feelings. It's just business."</em></p><h5 id="benefit">Benefit</h5><p>You are willing to set
      aside all morals if you get paid. Your Dexterity score maximum is increased by 2. Additionally, when you would
      target a creature with the frightened condition, your critical threat range is increased by 1.</p><h5
      id="negative">Negative</h5><p>You value the dollar above all else. When a creature would attempt to bribe you,
      they add 1d8 to their persuasion check. This does not occur if the bribe is lower than a previously offered
      payment.</p>
