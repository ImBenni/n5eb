system:
  description:
    value: >-
      <p><em>"My friends are my power, and I'm theirs!"</em></p><h5 id="benefit">Benefit</h5><p>The power of your bonds
      flows through you. Your Charisma score maximum is increased to 22. Additionally, twice per long rest you can add
      your charisma modifier to any d20 roll.</p><h5 id="negative">Negative</h5><p>When you target an opponent that
      hasn't been targeted (made the target of an attack, jutsu, or feature) by one of your allies, since the beginning
      of your last turn you roll a d4 and subtract it from either your attack roll or Save DC. If you are fighting
      without any allies your DM will decide if your current fight is "for your friends" or not. If it is "for your
      friends", you suffer no negatives and if it is not "for your friends" your proficiency is counted as being 1 lower
      for the fight.</p>
