system:
  description:
    value: >-
      <p><em>"You WILL learn respect, and suffering will be your teacher!"</em></p><h5 id="benefit">Benefit</h5><p>You
      have a burning pit of hatred within you that seems to have no end. Twice per long rest, when you would make an
      attack roll, you may subtract half your proficiency bonus. When you do so, you add your level to the attacks
      damage. Additionally, the first time you would damage a creature after becoming bloodied, roll the damage twice
      and take higher result.</p>
