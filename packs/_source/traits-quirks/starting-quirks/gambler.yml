_id: YB82iqJHTsSZLQJY
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Heart of the Cards"</em></p><h5 id="benefit">Benefit</h5><p>You love games of chance and the sense of risk
      that they provide. Twice per long rest, you may create a gambit. You can create a gambit when you target a hostile
      creature with an attack, jutsu, or feature. When you create a gambit, you force all creatures that would be
      effected by your attack, jutsu, or feature into the gambit. Each of those creatures must make a DC 10 + number of
      targeted creatures flat saving throw. If none of the targeted creatures pass, your gambit is successful. If any of
      the targeted creatures pass, your gambit is unsuccessful. On a successful gambit, your attack, jutsu, or feature
      successful effects all of your targets as if you had won against them in a clash. On a unsuccessful gambit, your
      attack, jutsu, or feature fails and does not effect any of your targets.</p>
    chat: ''
