system:
  description:
    value: >-
      <p><em>"Self-Sacrifice... A nameless shinobi who protects peace within its shadow. That is a true
      shinobi"</em></p><h5 id="benefit">Benefit</h5><p>You believe yourself a force of good and thus are willing to
      sacrifice anything, even your friends to reach your goals. When you cast a Jutsu, you may pay a number of hit die
      equal to its rank to increase it's damage die step by 1 or save DC by 2 (D=1,C=1,B=1,A=2,S=2)</p><h5
      id="negative">Negative</h5><p>You are unable to deal nonlethal damage, and cannot use abilities or effects that
      would cause creatures to not take damage, or be unaffected by Jutsu you cast.</p>
