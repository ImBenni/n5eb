system:
  description:
    value: >-
      <p><em>"This is your 3rd time taking the genin exams, are you sure you want to be a ninja. There's a demand for
      bakers"</em></p><h5 id="prerequisites">Prerequisites</h5><p>Have at least one stat with a value below 10</p><h5
      id="benefit">Benefit</h5><p>You have had a much longer time to train than your peers, due to you repeating 2nd
      grade 3 times. Your maximum Hp and CP increases as if you had one extra hit die and chakra die. (You do not gain
      an extra hit die or chakra die) and you can learn 2 extra E-Rank jutsu.</p><h5 id="negative">Negative</h5><p>Your
      proficiency bonus is lowered by 1, until you reach <br />level 8.</p>
