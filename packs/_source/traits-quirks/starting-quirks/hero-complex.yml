system:
  description:
    value: >-
      <p><em>"If my actions can save any of them… Then I've gotta do something"</em></p><h5
      id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>If there is someone in danger, you must save them.
      Twice per long rest, when you see an allied creature become bloodied, you gain 1 Will of Fire point. Additionally,
      once per long rest when you would see an allied creature fall to 0 hit points, your movement speed is doubled
      until the end of your next turn.</p><h5 id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>Your true
      strength only comes out when you must protect those precious to you. You start every session with 0 Will of Fire
      points.</p>
