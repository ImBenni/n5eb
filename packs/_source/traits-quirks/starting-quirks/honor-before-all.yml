system:
  description:
    value: >-
      <p><em>"Honor is simply the morality of superior men."</em></p><h5
      id="benefit-"><strong>Benefit:</strong></h5><p>You believe that honor should rule over a persons actions at all
      times, even in combat. Thusly you rarely strike first in a fight. Once per long rest, when you would roll
      initiative you may subtract 5 from your initiative. When you would subtract 5 from your initiative you gain either
      an additional reaction on your first turn.</p><h5 id="negative-"><strong>Negative:</strong></h5><p>Others tend to
      take advantage of your honor. You subtract 1d6 from all saves made against effects that force you to target a
      specific creature such as Compelled Duel.</p>
