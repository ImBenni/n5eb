system:
  description:
    value: >-
      <p><em>"I'm so famous."</em></p><h5 id="benefit">Benefit</h5><p>You have a lot of subscribers. Your Charisma score
      maximum is increased by 2. Additionally, once per long rest you can rule that a npc you meet knows about
      you.</p><h5 id="negative">Negative</h5><p>As an influencer, you've gotten into your fair share of drama. When you
      would rule that an npc knows about you, roll a 1d4. If the result is 1 or 2, the npc dislikes you. If the result
      is 3 or 4, the npc likes you.</p>
