system:
  description:
    value: >-
      <p><em>"In another world we could have been friends"</em></p><h5 id="benefit">Benefit</h5><p>You always manage to
      find a situation that ends with everyone alive. When persuading someone to try to make a peaceful outcome, you
      roll an additional d6 to all charisma checks. You also can choose to do nonlethal damage with any damage
      type.</p><h5 id="negative">Negative</h5><p>Whenever you see someone die you must roll a d20 without any modifiers,
      If the person was an unnamed enemy the DC is 6, If the person was an unnamed ally the DC is 10, If the person was
      a named enemy the DC is 13, If the person was a named ally the DC is 16. If you roll lower than the DC you gain a
      take 1d6 psychic damage. This damage cannot be reduced in any way.</p>
    chat: ''
