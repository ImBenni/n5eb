system:
  description:
    value: >-
      <p><em>"I've Got The Caffeine Patch! It's My Invention. You Can Stay Awake For Days With No Side
      Effects."</em></p><h5 id="prerequisites"><strong>Prerequisites</strong></h5><p>Your Intelligence score must be 15
      or higher and you must have proficiency in crafting.</p><h5 id="benefit-"><strong>Benefit:</strong></h5><p>If
      given 10 minutes and proper supplies, you are able to invent tools that can help in just about any situation. When
      you invent a tool, choose 1 skill. That tool grants advantage when making skill checks of that skill. Tools you
      invent can only be used once.</p><h5 id="negative-"><strong>Negative:</strong></h5><p>When you invent a tool, you
      are forced to use some of your personal supply. Everytime you invent a tool, you spend 20 Ryo.</p>
