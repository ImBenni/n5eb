system:
  description:
    value: >-
      <p><em>"Momma never said I was the brightest"</em></p><p><strong>Prerequisite</strong></p><p>Your Intelligence
      score must be 8 or below.</p><h5 id="-strong-benefit-strong-br-"><strong>Benefit:</strong></h5><p>Your entire life
      you've toughened up yourself by making dumb decisions. Really dumb decisions. You reduce the first instance of
      damage you would take each turn by your prof. bonus.</p><h5
      id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>You cannot read and suffer a -1d4 to investigation
      and insight checks. Additionally your Intelligence score's maximum is lowered to 14.</p>
