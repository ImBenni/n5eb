img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Just living in the Database, whoa oh!"</em></p><h5
      id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>Your memory is immaculate, you remember almost
      everything that you come across. Your mind is like a database. Whenever you make an Intelligence or Wisdom check
      to recall information, you have advantage on that check. Additionally, your memory is so complex that you add 1d4
      to saving throws to resist your mind being read, or your memory being altered.</p><h5
      id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>Sometimes, a little too much information is stored
      in your head, and you almost forget the most basic things. You suffer a -1 to all ability checks that involve
      Strength or Dexterity, and have disadvantage on Sleight of Hand Checks.</p>
