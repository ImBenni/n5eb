folder: LLLEIbsd2Xhw5Exi
name: Multitasker
type: feat
_id: SeP5MstxQXqd2s2Q
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>" To do two things at once is badass"</em></p><h5 id="benefit">Benefit</h5><p>You have gotten, so good at
      multitasking that anything else would be unnatural. While you are concentrating on 2 or more jutsu at the same
      time you may add 1d4 to all chakra control checks to maintain concentration. Additionally, if you stop paying the
      chakra cost of a jutsu you are concentrating on you retain the effects of the jutsu until the end of your current
      turn instead of losing the effects immediately.</p><h5 id="negative">Negative</h5><p>When a multitasker fails,
      they fail completely. While you are only concentrating on a single jutsu you subtract 1d4 from all chakra control
      checks to maintain concentration. Additionally, when you fail a concentration check you must make a flat dc 10
      check for every other jutsu you are concentrating on. On a fail you stop concentrating on that jutsu.</p>
