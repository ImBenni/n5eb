system:
  description:
    value: >-
      <p><em>"Bro, your vibes suck... you ok?"</em></p><h5 id="benefit">Benefit</h5><p>As an action, you may switch your
      vision to Chakra Sense, while in this mode, you are able to sense all creatures within 60ft of you that have
      chakra. You are able to sense their alignment, their chakra natures, and their emotional state. This mode lasts
      until the end of turn.</p><h5 id="negative">Negative</h5><p>While in Chakra Sense mode, your movement speed is set
      to 0, and you become blinded.</p>
