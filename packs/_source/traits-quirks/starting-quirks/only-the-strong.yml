system:
  description:
    value: >-
      <p><em>" Strength is the only thing that matters in this world. Everything else is just a delusion for the
      weak."</em></p><h5 id="benefit">Benefit</h5><p>You seek true power as you understand that might makes right. Your
      strength score maximum is increased by 2. Whenever you cast a jutsu, you may upcast it for 1 rank above your
      normal max casting rank.</p><h5 id="negative">Negative</h5><p>All chakra upcast costs are increased by 1.</p>
