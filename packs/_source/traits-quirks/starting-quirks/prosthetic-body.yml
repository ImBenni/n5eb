name: Prosthetic Body
type: feat
_id: tcefveldaIDC0DZZ
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Wish that I could still swim"</em></p><h5 id="benefit">Benefit</h5><p>Due to some injury or event in your
      life parts of your body have been replaced with prosthetic parts. Due your weight you have advantage on saving
      throws to avoid being moved and you can use Strength instead of Dexterity for your AC calculation. Your Strength
      score maximum is increased by 2.</p><h5 id="negative">Negative</h5><p>Due to how heavy your body is your speed is
      lowered by 10 ft, your initiative is lowered by 1, and your bulk is lowered by 3. Also, you can no longer swim as
      your weight makes you sink.</p>
