system:
  description:
    value: >-
      <p><em>"Fire seems to fascinate you, the way it gives warmth, the smell of it, how easily it can take someone's
      life, and especially the way you mold it"</em></p><h5 id="prerequisites">Prerequisites</h5><p>You have the Fire
      Release Keyword</p><h5 id="benefit">Benefit</h5><p>The number of ranks you can give a creature the burned
      condition is raised by 1, and the DC to put out your flames is raised by 1 + The number of burn stacks they
      currently have.</p><h5 id="negative">Negative</h5><p>You stare at Fire longer than most people do and sometimes
      you're adverse to putting it out. <br />You cannot willing get rid of the burned condition from yourself unless
      you succeed a DC 12 + prof Wisdom save.</p>
