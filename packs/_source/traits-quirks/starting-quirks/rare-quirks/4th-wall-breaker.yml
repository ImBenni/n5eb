name: 4th Wall Breaker
type: feat
_id: fNbYrKsbBsk2etgg
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Chimichanga. Chimichanga. Chimichanga. Chimichanga."</em></p><h5 id="benefit">Benefit</h5><p>You hold
      knowledge that no one else seems able to grasp. That the world you inhabit is fictional. Once this insight used to
      drive you mad, but now you have learned to use it. Once per long rest, when you move a creature you may rule that
      they hit the 4th wall. You may flavor the 4th wall anyway you want. (ex, Comic panel or TV Screen) The 4th wall is
      unbreakable and either stops all movement or sends the creature flying in any direction of your choice. The
      distance the creature travels after hitting the wall is equal to the remaining knock back. Additionally, others
      that peer into your mind are unable to handle the knowledge that they are fictional. When a creature would attempt
      to access your mind or memories in any way they must make a DC 15 + your level Wisdom saving throw. On a success,
      they are successful. On a failed save they gain 1 ranked of frightened, take psychic damage equal to twice your
      level, and repress all information that they would gain from your mind.</p>
