name: Alien Anatomy
type: feat
_id: Ip9i2k63WrAOSokV
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Krypton Bred me, but it was earth that gave me all I am."</em></p><h5 id="benefit">Benefit</h5><p>Your
      foreign anatomy both makes it harder for your enemies to understand you and grants you unique benefits. Jutsu,
      Features and abilities that would grant its users information about you, such as maximum or current Hit points,
      Resistances, Jutsu known etc. have a -5 Penalty to the check needed to discern this information. If no check would
      be made, they instead must complete a DC 10 + Your level check using the appropriate ability score or skill.
      Additionally, Ninjutsu and Genjutsu you cast do not count as Jutsu, but instead innate abilities.</p><h5
      id="negative">Negative</h5><p>Your unique anatomy makes it harder for you to learn as your earthing peers do. You
      cannot reduce the time needed to learn jutsu by being taught by a master unless that master is a member of the
      same race as you. Additionally, your alien chakra network is unable to handle multiple Nature Releases. You can
      only gain a maximum of 3 nature releases.</p>
