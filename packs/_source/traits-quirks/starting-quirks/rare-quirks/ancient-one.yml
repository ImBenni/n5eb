system:
  description:
    value: >-
      <p><em>" Time is something I have plenty of."</em></p><h5 id="benefit">Benefit</h5><p>You are immortal and thus do
      not age. You have lived countless lives and have forgotten more than most ever learn. Twice per long rest you may
      call upon your nearly endless knowledge to add a d6 to any d20 roll.</p><h5 id="negative">Negative</h5><p>While
      you are not affected by time you are still able to die by other traditional means. Additionally, your soul has
      weakened over the millenniums you have lived. You subtract 1d4 from all saving throws to avoid instant death
      effects or being sealed away. (example, the yamanka A rank hijutsu MIND PUPPET SWITCH: CURSED SEAL)</p>
