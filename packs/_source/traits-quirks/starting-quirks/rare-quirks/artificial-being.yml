name: Artificial Being
type: feat
_id: joJEzcHhR2cOVccg
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"How sad, to work so hard for so little."</em></p><h5 id="benefit">Benefit</h5><p>You are an android and
      thus have various enhancements putting you above most humans. The most important being your infinite energy
      source. Due to this energy source, you are unable to die from lack of sleep or food. It also stops you from ever
      having 0 chakra. The minimum amount of chakra you can ever have equals your proficiency bonus.</p><h5
      id="negative">Negative</h5><p>It takes you much longer to regenerate your chakra, due to your over reliance on
      your energy source. You do not add your Constitution modifier to Chakra Dice you use. Additionally, you only add
      half your constitution modifier to your maximum chakra amount on level up.</p>
