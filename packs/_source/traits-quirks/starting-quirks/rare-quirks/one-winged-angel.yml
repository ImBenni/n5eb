system:
  description:
    value: >-
      <p><em>"Then what should an angel fight for Zack? What do angels dream of?! Angels dream of one thing... To be
      human."</em></p><h5 id="benefit">Benefit</h5><p>You have a single wind sprouting out of your back. Your Dexterity
      score maximum is increased by 2. You gain a glide speed equal to your movement speed. Additionally, you may use
      your bonus action to gain a flying speed equal to half your normal movement speed.</p><h5
      id="negative">Negative</h5><p>You can not wear heavy armor.</p>
