system:
  description:
    value: >-
      <p><em>"We're the only people who matter."</em></p><h5 id="benefit">Benefit</h5><p>Reality itself bends to further
      your goals. When you finish a long rest, roll two d20s and record the numbers rolled. You can replace any attack
      roll, saving throw, or ability check made by you or a creature that you can see with one of these plot rolls. You
      must choose to do so before the roll, and you can replace a roll in this way only once per turn.</p><p>Each
      foretelling roll can be used only once. When you finish a long rest, you lose any unused plot rolls.</p>
