system:
  description:
    value: >-
      <p><em>"I see dead people."</em></p><h5 id="benefit">Benefit</h5><p>You can the spirits of those who have
      deceased. This grants you access to a completely unique source of information. Additionally, your spirit is
      extraordinarily strong. Twice per long rest you may add a d4 to any wisdom save.</p><h5
      id="negative">Negative</h5><p>Not all spirits are kind. Whenever you go to an area where a large number of people
      have died at the same time within recent history, you must make a DC 8 plus double your proficiency wisdom saving
      throw gaining the feared condition on a failed save.</p>
