name: Stand User
type: feat
_id: ARji8IVNqbPakXHL
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Only a stand user can defeat a stand user"</em></p><h5 id="benefit">Benefit</h5><p>You have control over a
      spirit made of your will. The spirit counts as the origin point of all jutsu you cast. You can use your movement
      speed to have the spirit move in your stead. You and your spirit do not share movement speed. Once you or your
      spirit have moved using your movement speed, the other cannot use their movement speed for the reminder of the
      turn. You cannot cast jutsu with a range of self unless the spirit is within 5 ft of you. You can recall the
      spirit to you as a bonus action from any range. If the spirit is within 5 ft of you, when you move it follows you
      wherever you would go. Your spirit cannot be targeted by any creature or any effect.</p>
    chat: ''
