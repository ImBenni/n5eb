img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Black... I won't let you get away with this!."</em></p><h5 id="benefit">Benefit</h5><p>As you are from the
      future, you know how history was supposed to go. Once per long rest, you may make a a DC 8 plus double your
      proficiency history check. On a success, the dm gives you a vague summary of what happened in the original history
      relating to your current situation. Additionally, your knowledge from the future grants you the knowledge needed
      to defeat your enemies. Once per long rest you may ask the dm for the lowest saving throw of a creature or if a
      creature has any vulnerabilities.</p><h5 id="negative">Negative</h5><p>Your travels through time has sent ripples
      through time. There are differences between the original timeline and the present.</p>
