system:
  description:
    value: >-
      <p><em>"All a ghost is Unfinished business, nothing more. Nothing less."</em></p><h5
      id="benefit">Benefit</h5><p>You died, but for some reason are unable to leave the mortal plane. There are obvious
      signs that you are dead. ( Halo or are slightly transparent). As you are already dead, your body lacks many of the
      weaknesses of life. You gain 2 DR and reduce the chakra cost of all Jutsu of C-Rank and above by 1.</p><h5
      id="negative">Negative</h5><p>You're already dead. If you die again your soul is destroyed. Additionally, you must
      choose your unfinished business. Once you have finished your business you find peace and leave the mortal
      plane.</p>
