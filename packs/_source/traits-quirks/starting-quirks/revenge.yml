    value: >-
      <p><em>"I'm going to restore my clan, and kill a certain someone."</em></p><h5
      id="prerequisites">Prerequisites</h5><p>Have the Lethal Attack feature.</p><h5 id="benefit">Benefit</h5><p>You
      have honed your skills in the art of death. When you would activate the Lethal Attack feature you may use your
      reaction to increase the size of the die by 1.</p><h5 id="negative">Negative</h5><p>You tend to focus purely on
      increasing the odds that your revenge mission will be a successful one leading you to live a lonely life.</p>
