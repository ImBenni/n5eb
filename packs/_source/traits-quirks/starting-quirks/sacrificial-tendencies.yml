system:
  description:
    value: >-
      <p><em>"I would gladly lay down my life to protect him."</em></p><h5 id="benefit">Benefit</h5><p>Once per long
      rest you are able to use your reaction to intercept an attack or jutsu from an ally within (your movement speed)
      ft of you. Doing this causes the attack to automatically hit or for you to automatically fail the saving throw.
      All parts of the attack or jutsu automatically active and if you would be damaged by this jutsu the attack rolls
      their damage twice using the higher result.</p><h5 id="negative">Negative</h5><p>You tend to undervalue
      yourself.</p>
