name: Separate Work And Home Life
type: feat
_id: xCdmD8vrudR1BnSU
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"You leave that at the door, when you enter this place, you are happy no matter what"</em></p><h5
      id="benefit">Benefit</h5><p>You have learned how to separate your work life and your personal life. No matter what
      happens on the job you are able to push it away and think about other things. Your Charisma score Maximum is now
      22. You can mark an enemy using your bonus action a number of times equal to your Charisma mod. You add your
      Charisma mod to the first instance of damage dealt each turn against marked Enemies. The mark remains for 1
      minute. You cannot mark the same enemy more than twice.</p><h5 id="negative">Negative</h5><p>When you mark an
      enemy, you lose the ability to use persuasion on any creatures allied with that enemy for 1d4 days and suffer a
      minus 1 to all Charisma based checks for 1 day. You are also generally less sociable after marking an enemy for
      the remainder of the day.</p>
