  description:
    value: >-
      <p><em>"I have a bad feeling about this"</em></p><h5
      id="-strong-benefit-strong-br-"><strong>Benefit:</strong></h5><p>You have a wary eye, bordering on paranoia. Once
      per long rest, when you roll for initiative, you may move up to your speed. This movement happens before the
      initiative order is determined.</p><h5 id="-strong-negative-strong-"><strong>Negative:</strong></h5><p>Your quick
      movements leave you unsteady and unable to defend yourself. After using the benefit of this trait your AC is
      lowered by 2 until the beginning of your first turn.</p>
