name: Soul Dualism
type: feat
_id: GnzPY1cp2OUBRHRZ
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"If two heads are better than one than ..."</em></p><h5 id="benefit">Benefit</h5><p>Two souls occupy your
      body, vying for influence and time in control. You maintain two different sets of personality traits, ideals,
      bonds, and flaws. Your souls have different names. Your souls communicate telepathically with one another, but
      only one soul can be in control of your body at a time. The soul that is not in control of your body can see
      through your eyes and hear through your ears. When you finish a long rest, roll a d20. On an odd roll, the soul in
      control of your body switches. The two souls within you have different backgrounds, which include different skill
      and tool proficiencies and the feat granted by your background. You only have proficiency in these skills and
      tools and use the feat acquired from a soul's background while it is in control of your body. Additionally, you
      have the ability to give control of a single clone to one to the soul that is not currently in control of your
      body. This clone your other self controls does not take a bonus action to control.</p><h5
      id="negative">Negative</h5><p>Whenever you would gain Downtime, it is shared between the two personalities evenly.
      Additionally, anything gained through using Downtime is only able to be used by the soul that spent that
      downtime.</p>
