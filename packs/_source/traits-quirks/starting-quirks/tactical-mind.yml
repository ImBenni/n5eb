name: Tactical Mind
type: feat
_id: n33vjQCj26INmZEk
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Everyone watch out! The Fire is intend hot!"</em></p><h5 id="benefit">Benefit</h5><p>You are able to get
      important information out fast enough for others to benefit from it. Twice per long rest, you may read either an
      enemy or a jutsu that has been casted. When you begin to read your target, your dm privately makes a flat
      intelligence check with a DC of 10 + half the creature or casting creature's proficiency bonus rounded down for
      you. On success, if you were attempting to read a jutsu the dm gives you a brief description of the effects of the
      jutsu which should usually include the damage type, what if any saves it targets, and the it's range. If you were
      attempting to read a creature the dm gives you a brief description of the creature's history, which usually
      includes what elements the creature can use, what allies the creature has, and if the creature has any defining
      weaknesses or resistances like a strong saving throw or a weakness to a damage type. On a failed save, the dm
      gives you incorrect information.</p>
    chat: ''
