name: Team Player
type: feat
_id: 8rClaCto2skrawxa
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p><em>"Wherever, whenever, if you need me know that I'll be there"</em></p><h5 id="benefit">Benefit</h5><p>You
      are an expert team player. Whether it be in or out of combat your friends know that you always have their back.
      Once per long rest you can use your reaction to clash with a jutsu that is targeting one of your allies. You also
      gain the ability to use your Will of Fire point to affect your allies rolls as if they were your own.</p><h5
      id="negative">Negative</h5><p>You put too much focus on others to the point where sometimes you forget you take
      care of yourself. You also are unable to use WoFs to affect your own rolls.</p>
