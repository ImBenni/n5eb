system:
  description:
    value: >-
      <p><em>"His I.Q. is over 200.. He's a freakin Genius!"</em></p><h5 id="prerequisites">Prerequisites</h5><p>Have
      the Exploit Weakness feature</p><h5 id="benefit">Benefit</h5><p>You possess an unnaturally high battle I.Q. When
      targeting a creature who is under the effects of your Exploit Weakness feature, you may prematurely end its
      effects to grant yourself either +3 to a single attack against the creature who was under the effects of your
      Exploit Weakness Feature or to lower the next saving throw of the creature was under the effects of your Exploit
      Weakness feature by 2.</p>
