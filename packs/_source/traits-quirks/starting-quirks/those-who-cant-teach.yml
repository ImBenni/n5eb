system:
  description:
    value: >-
      <p><em>"YES! YES! YES! LET ME LIVE VICARIOUSLY THROUGH YOUR ACCOMPLISHMENTS!"</em></p><h5
      id="benefit">Benefit</h5><p>If you a help someone learn/create a jutsu then they can lower the downtime needed by
      2 weeks per rank. You must spend at least the first 25% of the time needed to create/learn the jutsu helping them.
      Afterwards they keep the benefits and you can leave them to continue working. Additionally, when performing the
      help action, your ally adds an additional d6 to their roll.</p><h5 id="negative">Negative</h5><p>You suffer a
      minus 2 to all d20 rolls while in combat.</p>
