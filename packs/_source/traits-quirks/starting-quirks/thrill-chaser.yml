system:
  description:
    value: >-
      <p><em>"Ever Since I was a kid, I've always been looking for the next big high"</em></p><h5
      id="benefit">Benefit</h5><p>You love the thrill of the fight. The understanding that you could die at any time.
      Whenever you roll a d20 you may use one of your hit and/or chakra die and gain amount of hp and/or cp equal to the
      amount rolled.</p><h5 id="negative">Negative</h5><p>You don't know when to stop. If given the chance to stop
      fighting a losing battle or to take a break, you are far less likely to than the average ninja.</p>
