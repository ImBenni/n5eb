system:
  description:
    value: >-
      <p><em>"SOMETHING CLEVER!" "EVERYONE'S GONNA DIE! EVERYONE!"</em></p><h5
      id="-strong-benefit-strong-"><strong>Benefit:</strong></h5><p>The bigger the fight the better. For every hostile
      creature within 10 ft of you increase your attack rolls by +1 up to a maximum of +5.</p><h5
      id="-strong-negative-strong-br-"><strong>Negative:</strong></h5><p>You tend to lose yourself in the fight. Every
      time you reduce a creatures hp to 0 you must roll a d20 without any modifiers. If the result is 4 or below you
      gain the berserk condition. Everytime you would reduce a creature to 0 hp after the first creature increase the dc
      by 1 up to a maximum of 11. This lowers by 3 at the end of every combat to a minimum of 4.</p>
    chat: ''
