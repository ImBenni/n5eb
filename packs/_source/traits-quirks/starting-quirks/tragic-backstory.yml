system:
  description:
    value: >-
      <p><em>"Bro I'm 12 how is my life already this bad"</em></p><h5 id="benefit">Benefit</h5><p>Due to a traumatic
      point in your life, you have changed how and why you work. You are more willing to push yourself than is safe. You
      can enter Hyper Mode for 1 minute with a free action. When you enter Hyper Mode, it is obvious to everyone around
      you. While in Hyper Mode your Prof. Bonus is 1 higher, you can upcast Jutsu 1 rank higher than you would normally
      be able to, and you gain 1 WoF point when entering the form. You can enter Hyper mode twice per long rest.</p><h5
      id="negative">Negative</h5><p>After Hyper Mode runs out you must make a DC 8 + double your Prof. Bonus
      Constitution saving throw. On Failure you 1 rank of the weakened condition. You can only remove weakened gained
      this way frome ither a short rest or a long rest. A short rest removes 1 instance and a long rest removes all
      instances.</p>
