name: True Patriot
type: feat
_id: JH1S73qMqU1WVbFd
img: icons/magic/symbols/star-rising-purple.webp
system:
  description:
    value: >-
      <p>"When the tree leaves dance, one shall find flames. The fire's shadow will illuminate the village, and once
      again, tree leaves shall bud anew."</p><h5 id="benefit">Benefit</h5><p>Your loyalty to the village is stronger
      than your loyalty to your friends, family, or yourself. You will risk yourself to complete the mission. You can
      enter Will of the Village Mode for 1 minute with a free action. When you enter Will of the Village Mode it is
      obvious to everyone around you. While in Will of the Village mode you have advantage to hit, you can upcast jutsu
      1 rank higher than you would normally be able to, and you gain 1 WoF point when entering the form. You can enter
      Will of the Village mode twice per long rest.</p><h5 id="negative">Negative</h5><p>The mission comes first, you
      are willing to let teammates suffer and even die to complete the mission. While in Will of the Village mode, other
      people have advantage on hitting you. After Will of the Village mode runs out you must make a DC 8 + double your
      Prof. Bonus Constitution saving throw. On Failure you 1 stack of the condition weakened. You can only remove
      weakened gained this way from either a short rest or a long rest. A short rest removes 1 instance and a long rest
      removes all instances.</p>
