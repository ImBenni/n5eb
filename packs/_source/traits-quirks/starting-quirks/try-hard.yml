system:
  description:
    value: >-
      <p><em>"A weakling like you could never win!"</em></p><h5 id="benefit">Benefit</h5><p>You are always trying to
      win, whether it be in a fight to the death or in a children's card game. You have a number of d4s equal to your
      prof. bonus that you can add to any to hit roll or any saving throw.</p><h5 id="negative">Negative</h5><p>When you
      feel like you're going to lose you start to lose your balance and start performing much worse than normal. When
      you are below 50% Hp You roll a d4 and subtract half the result from your to hit and saving throws.</p>
