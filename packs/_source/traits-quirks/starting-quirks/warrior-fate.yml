system:
  description:
    value: >-
      <p><em>"I want <strong>you</strong> to kill me."</em></p><h5 id="benefit">Benefit</h5><p>You have been searching
      your entire life for someone or something that is your equal. Something that can grant you a proper death. Your
      Strength score maximum is increased by 2. Additionally, you can give yourself a failed death save when you would
      cast a jutsu to upcast the jutsu by 2 ranks for 0 chakra. This can allow you to upcast 1 rank higher than you
      would normally be able to. You can also give yourself 2 failed death saves to ignore the effects of any jutsu or
      feature that would cause instant death.</p>
